license: MIT
tags:
  - automation
  - cli
  - google-slides
  - markdown
  - presentations
  - slides
description: Creates slide deck using Markdown and Google Slides
executables:
  - deck
provenance:
  formula: deck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
