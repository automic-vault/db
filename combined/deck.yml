    - ${XDG_STATE_HOME:-$HOME/.local/state}/deck/token.json
    - ${XDG_STATE_HOME:-$HOME/.local/state}/deck/token-{profile}.json
category: productivity
package-manager:
  brew: deck
  debian: deck
  nix: deck
  ubuntu: deck
  winget: sfx101.deck
