id: brew:deck
display-name: deck
homepage: https://github.com/k1LoW/deck
repo: https://github.com/k1LoW/deck
docs:
  - https://github.com/k1LoW/deck/tree/main/docs
  - https://github.com/k1LoW/deck#readme
config-file-location:
  unix:
    - ${XDG_CONFIG_HOME:-$HOME/.config}/deck/config.yml
    - ${XDG_CONFIG_HOME:-$HOME/.config}/deck/config-{profile}.yml
credentials-file-location:
  unix:
    - ${XDG_DATA_HOME:-$HOME/.local/share}/deck/credentials.json
