id: brew:gkrellm
display-name: GKrellM
homepage: https://billw2.github.io/gkrellm/gkrellm.html
repo: http://git.srcbox.net/gkrellm
docs:
  - https://billw2.github.io/gkrellm/gkrellm.html
config-file-location:
  unix:
    - ~/.gkrellm2/user-config
    - ~/.gkrellm2/theme_config
    - ~/.gkrellm2/plugin_enable
    - ~/.gkrellm2/plugin_placement
    - ~/.gkrellm2/themes/*/gkrellmrc
    - ~/.gkrellmd.conf
    - /etc/gkrellmd.conf
    - /usr/local/etc/gkrellmd.conf
credentials-file-location:
  unix: ~/.gkrellm2/user-config
category: system
package-manager:
  brew: gkrellm
  debian: gkrellm
  dnf: gkrellm
  macports: gkrellm
  nix: gkrellm
  ubuntu: gkrellm
  zypper: gkrellm
package-manager-url: https://formulae.brew.sh/formula/gkrellm
license: GPL-3.0-or-later
tags:
  - cli
  - desktop
  - gtk
  - plugins
  - server-monitoring
  - system-monitoring
description: Extensible GTK system monitoring application
executables:
  - gkrellm
  - gkrellmd
provenance:
  formula: gkrellm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
