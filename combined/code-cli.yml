id: brew:code-cli
display-name: Visual Studio Code CLI
homepage: https://code.visualstudio.com
repo: https://github.com/microsoft/vscode
docs:
  - https://code.visualstudio.com/docs/configure/settings
  - https://code.visualstudio.com/docs/editor/command-line
config-file-location:
  linux:
    - ~/.config/Code/User/settings.json
    - .vscode/settings.json
  macos:
    - ~/Library/Application Support/Code/User/settings.json
    - .vscode/settings.json
  windows:
    - '%APPDATA%\Code\User\settings.json'
    - .vscode\settings.json
credentials-file-location: null
category: developer-tools
package-manager:
  brew: code-cli
  nix: code
  pacman: code
package-manager-url: https://formulae.brew.sh/formula/code-cli
license: MIT
tags:
  - cli
  - developer-tools
  - editor
  - extensions
  - vscode
description: Command-line interface built-in Visual Studio Code
executables:
  - code
provenance:
  formula: code-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
