id: brew:heartbeat
display-name: Heartbeat
homepage: https://www.elastic.co/beats/heartbeat
repo: https://github.com/elastic/beats
docs:
  - https://www.elastic.co/docs/reference/beats/heartbeat
  - https://www.elastic.co/docs/reference/beats/heartbeat/command-line-options
config-file-location:
  linux: /etc/heartbeat/heartbeat.yml
  unix:
    - '{path.config}/heartbeat.yml'
    - '{path.home}/heartbeat.yml'
    - '{extract.path}/heartbeat.yml'
credentials-file-location:
  linux: /var/lib/heartbeat/heartbeat.keystore
  unix: '{path.data}/heartbeat.keystore'
category: networking
package-manager:
  brew: heartbeat
  debian: heartbeat
  nix: heartbeat
  ubuntu: heartbeat
  winget: HeartbeatChat.Heartbeat
package-manager-url: https://formulae.brew.sh/formula/heartbeat
license: Apache-2.0
tags:
  - cli
  - elastic-stack
  - network-monitoring
  - observability
  - uptime-monitoring
description: Lightweight Shipper for Uptime Monitoring
executables:
  - heartbeat
provenance:
  formula: heartbeat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
