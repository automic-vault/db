id: brew:syncthing
display-name: Syncthing
homepage: https://syncthing.net/
repo: https://github.com/syncthing/syncthing
docs:
  - https://docs.syncthing.net/
config-file-location:
  unix:
    - $XDG_STATE_HOME/syncthing/config.xml
    - ~/.local/state/syncthing/config.xml
  windows: '%LOCALAPPDATA%\Syncthing\config.xml'
credentials-file-location:
  unix:
    - $XDG_STATE_HOME/syncthing/cert.pem
    - $XDG_STATE_HOME/syncthing/key.pem
    - ~/.local/state/syncthing/cert.pem
    - ~/.local/state/syncthing/key.pem
  windows:
    - '%LOCALAPPDATA%\Syncthing\cert.pem'
    - '%LOCALAPPDATA%\Syncthing\key.pem'
category: productivity
package-manager:
  apk: syncthing
  brew: syncthing
  chocolatey: syncthing
  debian: golang-github-syncthing-syncthing-dev
  dnf: syncthing
  macports: syncthing
  nix: syncthing
  pacman: syncthing
  scoop: main/syncthing
  ubuntu: golang-github-syncthing-syncthing-dev
  winget: BillStewart.SyncthingWindowsSetup
  zypper: syncthing
package-manager-url: https://formulae.brew.sh/formula/syncthing
license: MPL-2.0
tags:
  - cli
  - continuous-sync
  - file-sync
  - open-source
  - peer-to-peer
description: Open source continuous file synchronization application
executables:
  - syncthing
provenance:
  formula: syncthing
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
