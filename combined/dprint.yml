id: brew:dprint
display-name: dprint
homepage: https://dprint.dev/
repo: https://github.com/dprint/dprint
docs:
  - https://dprint.dev/config
  - https://dprint.dev/install
config-file-location:
  linux:
    - ~/.config/dprint/dprint.jsonc
    - $XDG_CONFIG_HOME/dprint/dprint.jsonc
  macos:
    - ~/.config/dprint/dprint.jsonc
    - $XDG_CONFIG_HOME/dprint/dprint.jsonc
    - ~/Library/Application Support/dprint/dprint.jsonc
  unix:
    - dprint.json
    - dprint.jsonc
    - .dprint.json
    - .dprint.jsonc
  windows: '%APPDATA%\dprint\dprint.jsonc'
credentials-file-location: null
category: developer-tools
package-manager:
  apk: dprint
  brew: dprint
  macports: dprint
  nix: dprint
  pacman: dprint
  scoop: main/dprint
  winget: dprint.dprint
package-manager-url: https://formulae.brew.sh/formula/dprint
license: MIT
tags:
  - cli
  - code-formatter
  - formatting
  - plugins
  - rust
description: Pluggable and configurable code formatting platform written in Rust
executables:
  - dprint
provenance:
  formula: dprint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
