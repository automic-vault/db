  - elasticache
  - rds
  - session-manager
  - vpc
description: Securely connect to RDS, Elasticache, and other AWS resources in VPCs
executables:
  - basti
provenance:
  formula: basti
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
