id: brew:basti
display-name: Basti
homepage: https://www.basti.app
repo: https://github.com/basti-app/basti
docs:
  - https://github.com/basti-app/basti/tree/main/docs/reference
  - https://github.com/basti-app/basti#readme
config-file-location:
  unix:
    - ./.basti.yaml
    - ./.basti.yml
