id: brew:opencode
display-name: OpenCode
homepage: https://opencode.ai
repo: https://github.com/anomalyco/opencode
docs:
  - https://opencode.ai/docs
config-file-location: null
credentials-file-location:
  macos:
    - ~/Library/Application Support/opencode/auth.json
    - ~/Library/Application Support/opencode/account.json
  unix:
    - $XDG_DATA_HOME/opencode/auth.json
    - $XDG_DATA_HOME/opencode/account.json
    - ~/.local/share/opencode/auth.json
    - ~/.local/share/opencode/account.json
category: developer-tools
package-manager:
  brew: opencode
  chocolatey: opencode
  macports: opencode
  nix: opencode
  pacman: opencode
  scoop: main/opencode
  winget: SST.OpenCodeDesktop
package-manager-url: https://formulae.brew.sh/formula/opencode
license: MIT
tags:
  - ai-coding-agent
  - cli
  - developer-tools
  - llm
  - terminal
description: AI coding agent, built for the terminal
executables:
  - opencode
provenance:
  formula: opencode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
