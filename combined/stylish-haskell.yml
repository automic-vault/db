id: brew:stylish-haskell
display-name: stylish-haskell
homepage: https://github.com/haskell/stylish-haskell
repo: https://github.com/haskell/stylish-haskell
docs:
  - https://github.com/haskell/stylish-haskell#readme
config-file-location:
  unix:
    - .stylish-haskell.yaml
    - $XDG_CONFIG_HOME/stylish-haskell/config.yaml
    - ~/.config/stylish-haskell/config.yaml
    - ~/.stylish-haskell.yaml
  windows: '%APPDATA%/stylish-haskell/config.yaml'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: stylish-haskell
  debian: stylish-haskell
  nix: stylish-haskell
  pacman: stylish-haskell
package-manager-url: https://formulae.brew.sh/formula/stylish-haskell
license: BSD-3-Clause
tags:
  - cli
  - code-style
  - formatter
  - haskell
  - prettifier
description: Haskell code prettifier
executables:
  - stylish-haskell
provenance:
  formula: stylish-haskell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
