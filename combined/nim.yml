id: brew:nim
display-name: Nim
homepage: https://nim-lang.org/
repo: https://github.com/nim-lang/Nim
docs:
  - https://nim-lang.org/docs/manual.html
  - https://nim-lang.org/documentation.html
  - https://nim-lang.github.io/Nim
config-file-location:
  unix:
    - ~/.config/nim/config.nims
    - config.nims
    - <project>.nims
  windows:
    - '%APPDATA%\nim\config.nims'
    - config.nims
    - <project>.nims
credentials-file-location: null
category: language-runtime
package-manager:
  apk: nim
  brew: nim
  chocolatey: nim
  macports: nim
  nix: nim
  pacman: nim
  scoop: main/nim
  ubuntu: nim
  zypper: nim
package-manager-url: https://formulae.brew.sh/formula/nim
license: MIT
tags:
  - cli
  - compiler
  - nimble
  - programming-language
  - statically-typed
  - systems-programming
description: Statically typed compiled systems programming language
executables:
  - nim
  - nimble
  - nimgrep
  - nimpretty
  - nimsuggest
  - testament
provenance:
  formula: nim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
