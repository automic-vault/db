id: brew:confd
display-name: confd
homepage: https://github.com/kelseyhightower/confd
repo: https://github.com/kelseyhightower/confd
docs:
  - https://github.com/kelseyhightower/confd/tree/master/docs
  - https://github.com/kelseyhightower/confd#readme
config-file-location:
