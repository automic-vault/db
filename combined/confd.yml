  - cli
  - configuration-management
  - consul
  - etcd
  - go
  - templates
  - vault
description: Manage local application configuration files using templates
executables:
  - confd
provenance:
  formula: confd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
