id: brew:dvc
display-name: DVC
homepage: https://dvc.org
repo: https://github.com/treeverse/dvc
docs:
  - https://doc.dvc.org
config-file-location:
  linux:
    - ~/.config/dvc/config
    - /etc/xdg/dvc/config
  macos:
    - ~/Library/Application Support/dvc/config
    - /Library/Application Support/dvc/config
  unix:
    - .dvc/config.local
    - .dvc/config
  windows:
    - .dvc\config.local
    - .dvc\config
    - '%LocalAppData%\iterative\dvc\config'
    - '%AllUsersProfile%\Application Data\iterative\dvc\config'
credentials-file-location:
  unix: .dvc/config.local
category: developer-tools
package-manager:
  brew: dvc
  chocolatey: dvc
  nix: dvc
  scoop: main/dvc
  winget: Iterative.DVC
package-manager-url: https://formulae.brew.sh/formula/dvc
license: Apache-2.0
tags:
  - cli
  - data-versioning
  - experiments
  - machine-learning
  - pipelines
  - version-control
description: Git for data science projects
executables:
  - dvc
provenance:
  formula: dvc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
