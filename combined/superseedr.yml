id: brew:superseedr
display-name: SuperSeedr
homepage: https://github.com/Jagalite/superseedr
repo: https://github.com/Jagalite/superseedr
docs:
  - https://github.com/Jagalite/superseedr/tree/main/docs
  - https://github.com/Jagalite/superseedr#readme
config-file-location:
  unix:
    - <config-dir>/settings.toml
    - <config-dir>/torrent_metadata.toml
    - <mount-root>/superseedr-config/settings.toml
