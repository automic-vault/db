    - <mount-root>/superseedr-config/hosts/<host-id>/config.toml
credentials-file-location: null
category: networking
package-manager:
  brew: superseedr
package-manager-url: https://formulae.brew.sh/formula/superseedr
license: GPL-3.0-or-later
tags:
  - bittorrent
  - cli
  - file-sharing
  - terminal
  - tui
description: BitTorrent Client in your Terminal
executables:
  - superseedr
provenance:
  formula: superseedr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
