id: brew:barman
display-name: Barman
homepage: https://www.pgbarman.org/
repo: https://github.com/EnterpriseDB/barman
docs:
  - https://docs.pgbarman.org/release/3.12.0/user_guide/configuration.html
  - >
    https://www.enterprisedb.com/docs/supported-open-source/barman/single-server-streaming/step02-backup-setup
config-file-location:
  unix:
    - /etc/barman.conf
    - ~/.barman.conf
    - /etc/barman.d/*.conf
credentials-file-location:
  unix: ~/.pgpass
category: data
package-manager:
  apk: barman
  brew: barman
  debian: barman
  dnf: barman
  macports: barman
  nix: barman
  ubuntu: barman
package-manager-url: https://formulae.brew.sh/formula/barman
license: GPL-3.0-or-later
tags:
  - backup
  - cli
  - postgresql
  - recovery
  - wal
description: Backup and Recovery Manager for PostgreSQL
executables:
  - barman
  - barman-cloud-backup
  - barman-cloud-backup-delete
  - barman-cloud-backup-keep
  - barman-cloud-backup-list
  - barman-cloud-backup-show
  - barman-cloud-check-wal-archive
  - barman-cloud-restore
  - barman-cloud-wal-archive
  - barman-cloud-wal-restore
  - barman-wal-archive
  - barman-wal-restore
provenance:
  formula: barman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
