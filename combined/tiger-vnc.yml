id: brew:tiger-vnc
display-name: TigerVNC
homepage: https://tigervnc.org/
repo: https://github.com/TigerVNC/tigervnc
docs:
  - https://github.com/TigerVNC/tigervnc/wiki
  - https://tigervnc.org/doc/vncviewer.html
config-file-location:
  unix:
    - $XDG_CONFIG_HOME/tigervnc/default.tigervnc
    - ~/.config/tigervnc/default.tigervnc
credentials-file-location:
  unix:
    - $XDG_CONFIG_HOME/tigervnc/passwd
    - ~/.config/tigervnc/passwd
category: networking
package-manager:
  brew: tiger-vnc
  scoop: extras/vncviewer
  winget: RealVNC.VNCViewer
package-manager-url: https://formulae.brew.sh/formula/tiger-vnc
license: GPL-2.0-or-later
tags:
  - cli
  - client-server
  - networking
  - remote-desktop
  - vnc
description: High-performance, platform-neutral implementation of VNC
executables:
  - vncconfig
  - vncpasswd
  - vncsession
  - vncviewer
  - x0vncserver
provenance:
  formula: tiger-vnc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
