id: brew:gmsh
display-name: Gmsh
homepage: https://gmsh.info/
repo: https://gitlab.onelab.info/gmsh/gmsh
docs:
  - https://gmsh.info/doc/texinfo/gmsh.html
config-file-location:
  unix:
    - $GMSH_HOME/<General.OptionsFileName>
    - $GMSH_HOME/<General.SessionFileName>
    - ~/<General.OptionsFileName>
    - ~/<General.SessionFileName>
    - <model-file>.opt
  windows:
    - '%GMSH_HOME%\<General.OptionsFileName>'
    - '%GMSH_HOME%\<General.SessionFileName>'
    - '%APPDATA%\<General.OptionsFileName>'
    - '%APPDATA%\<General.SessionFileName>'
    - <model-file>.opt
credentials-file-location: null
category: science
package-manager:
  apk: gmsh
  brew: gmsh
  debian: gmsh
  dnf: gmsh
  macports: gmsh
  nix: gmsh
  ubuntu: gmsh
  winget: gmsh.gmsh
  zypper: gmsh
package-manager-url: https://formulae.brew.sh/formula/gmsh
license: GPL-2.0-or-later
tags:
  - api
  - cad
  - cli
  - finite-element
  - mesh-generation
  - post-processing
description: 3D finite element grid generator with CAD engine
executables:
  - gmsh
provenance:
  formula: gmsh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
