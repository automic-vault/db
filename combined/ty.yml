id: brew:ty
display-name: ty
homepage: https://docs.astral.sh/ty/
repo: https://github.com/astral-sh/ty
docs:
  - https://docs.astral.sh/ty
  - https://docs.astral.sh/ty/reference/cli
  - https://github.com/astral-sh/ty#readme
config-file-location:
  unix:
    - pyproject.toml
    - ty.toml
    - ~/.config/ty/ty.toml
