id: brew:gitui
display-name: GitUI
homepage: https://github.com/gitui-org/gitui
repo: https://github.com/gitui-org/gitui
docs:
  - https://github.com/gitui-org/gitui#readme
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/gitui/theme.ron
    - ~/.config/gitui/theme.ron
    - $XDG_CONFIG_HOME/gitui/key_bindings.ron
    - ~/.config/gitui/key_bindings.ron
    - $XDG_CONFIG_HOME/gitui/key_symbols.ron
    - ~/.config/gitui/key_symbols.ron
  macos:
    - ~/.config/gitui/theme.ron
    - ~/.config/gitui/key_bindings.ron
    - ~/.config/gitui/key_symbols.ron
  windows:
    - '%APPDATA%/gitui/theme.ron'
    - '%APPDATA%/gitui/key_bindings.ron'
    - '%APPDATA%/gitui/key_symbols.ron'
credentials-file-location: null
category: developer-tools
package-manager:
  apk: gitui
  brew: gitui
  dnf: gitui
  macports: gitui
  nix: gitui
  pacman: gitui
  scoop: main/gitui
  winget: StephanDilly.gitui
  zypper: gitui
package-manager-url: https://formulae.brew.sh/formula/gitui
license: MIT
tags:
  - cli
  - git
  - git-client
  - rust
  - terminal
  - tui
description: Blazing fast terminal-ui for git written in rust
executables:
  - gitui
provenance:
  formula: gitui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
