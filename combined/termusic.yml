id: brew:termusic
display-name: termusic
homepage: https://github.com/tramhao/termusic
repo: https://github.com/tramhao/termusic
docs:
  - https://github.com/tramhao/termusic#readme
config-file-location:
  linux:
    - ~/.config/termusic/server.toml
    - ~/.config/termusic/tui.toml
  macos:
    - ~/Library/Application Support/termusic/server.toml
    - ~/Library/Application Support/termusic/tui.toml
  windows:
    - '%APPDATA%\termusic\server.toml'
    - '%APPDATA%\termusic\tui.toml'
credentials-file-location: null
category: media
package-manager:
  brew: termusic
  macports: termusic
  nix: termusic
  pacman: termusic
  scoop: main/termusic
package-manager-url: https://formulae.brew.sh/formula/termusic
license: MIT AND GPL-3.0-or-later
tags:
  - audio
  - cli
  - music-player
  - rust
  - terminal-ui
  - tui
description: Music Player TUI written in Rust
executables:
  - termusic
  - termusic-server
provenance:
  formula: termusic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
