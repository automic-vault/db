id: brew:openal-soft
display-name: OpenAL Soft
homepage: https://openal-soft.org/
repo: https://github.com/kcat/openal-soft
docs:
  - https://github.com/kcat/openal-soft/wiki/Programmer%27s-Guide
  - https://github.com/kcat/openal-soft/wiki/User%27s-Guide
config-file-location:
  unix:
    - /etc/openal/alsoft.conf
    - $XDG_CONFIG_DIRS/alsoft.conf
    - ~/.alsoftrc
    - $XDG_CONFIG_HOME/alsoft.conf
    - ~/.config/alsoft.conf
    - $ALSOFT_CONF
  windows:
    - '%APPDATA%\alsoft.ini'
    - '%ALSOFT_CONF%'
credentials-file-location: null
category: media
package-manager:
  apk: openal-soft
  brew: openal-soft
  debian: libopenal-data
  dnf: openal-soft
  macports: openal-soft
  nix: openal-soft
  ubuntu: libopenal-data
  zypper: libopenal0
package-manager-url: https://formulae.brew.sh/formula/openal-soft
license: LGPL-2.0-or-later
tags:
  - 3d-audio
  - audio-library
  - cli
  - openal
  - spatial-audio
description: Implementation of the OpenAL 3D audio API
executables:
  - openal-info
provenance:
  formula: openal-soft
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
