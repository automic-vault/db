id: brew:buku
display-name: buku
homepage: https://github.com/jarun/buku
repo: https://github.com/jarun/buku
docs:
  - https://buku.readthedocs.io/en/latest
  - https://github.com/jarun/buku/wiki
  - https://github.com/jarun/buku#readme
  - https://github.com/jarun/buku/tree/master/bukuserver#readme
config-file-location:
  unix:
    - $BUKU_DEFAULT_DBDIR/bookmarks.db
    - $XDG_DATA_HOME/buku/bookmarks.db
    - ~/.local/share/buku/bookmarks.db
    - ./bookmarks.db
  windows:
    - '%APPDATA%\buku\bookmarks.db'
    - .\bookmarks.db
credentials-file-location: null
category: productivity
package-manager:
  apk: buku
  brew: buku
  debian: buku
  dnf: buku
  macports: buku
  nix: buku
  ubuntu: buku
package-manager-url: https://formulae.brew.sh/formula/buku
license: GPL-3.0-or-later
tags:
  - bookmark-manager
  - bookmarks
  - cli
  - sqlite
  - web-ui
description: Powerful command-line bookmark manager
executables:
  - buku
  - bukuserver
provenance:
  formula: buku
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
