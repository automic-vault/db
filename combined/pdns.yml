id: brew:pdns
display-name: PowerDNS Authoritative Server
homepage: https://www.powerdns.com
repo: https://github.com/PowerDNS/pdns
docs:
  - https://docs.powerdns.com/authoritative
config-file-location:
  unix:
    - /etc/powerdns/pdns.conf
    - ${config-dir}/pdns.conf
credentials-file-location:
  unix:
    - /etc/powerdns/pdns.conf
    - ${config-dir}/pdns.conf
category: networking
package-manager:
  apk: pdns
  brew: pdns
  debian: pdns-backend-bind
  dnf: pdns
  nix: pdns
  pacman: powerdns
  ubuntu: pdns-backend-bind
  zypper: pdns
package-manager-url: https://formulae.brew.sh/formula/pdns
license: GPL-2.0-or-later
tags:
  - authoritative-server
  - cli
  - dns
  - nameserver
  - networking
description: Authoritative nameserver
executables:
  - pdns_control
  - pdns_server
  - pdnsutil
  - zone2json
  - zone2sql
provenance:
  formula: pdns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
