id: brew:cabin
display-name: Cabin
homepage: https://cabinpkg.com
repo: https://github.com/cabinpkg/cabin
docs:
  - https://cabinpkg.com/docs
config-file-location:
  linux:
    - $CABIN_CONFIG_HOME/config.toml
    - $XDG_CONFIG_HOME/cabin/config.toml
    - ~/.config/cabin/config.toml
    - <workspace-root>/.cabin/config.toml
    - <package-root>/.cabin/config.toml
    - $CABIN_CONFIG
  macos:
    - $CABIN_CONFIG_HOME/config.toml
    - ~/Library/Application Support/cabin/config.toml
    - <workspace-root>/.cabin/config.toml
    - <package-root>/.cabin/config.toml
    - $CABIN_CONFIG
  windows:
    - $CABIN_CONFIG_HOME/config.toml
    - '%APPDATA%\cabin\config.toml'
    - <workspace-root>\.cabin\config.toml
    - <package-root>\.cabin\config.toml
    - '%CABIN_CONFIG%'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: cabin
  nix: cabin
package-manager-url: https://formulae.brew.sh/formula/cabin
license: Apache-2.0
tags:
  - build-system
  - cli
  - cpp
  - developer-tools
  - package-manager
description: Package manager and build system for C/C++
executables:
  - cabin
provenance:
  formula: cabin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
