id: brew:haskell-stack
display-name: Stack
homepage: https://haskellstack.org/
repo: https://github.com/commercialhaskell/stack
docs:
  - https://docs.haskellstack.org/
config-file-location:
  unix:
    - ./stack.yaml
    - $STACK_ROOT/config.yaml
    - /etc/stack/config.yaml
    - $XDG_CONFIG_HOME/stack/config.yaml
credentials-file-location:
  unix: $STACK_ROOT/upload/credentials.json
category: developer-tools
package-manager:
  apk: stack
  brew: haskell-stack
  chocolatey: haskell-stack
  debian: haskell-stack
  dnf: ghc-aeson-warning-parser
  macports: stack
  nix: stack
  pacman: stack
  scoop: main/stack
  ubuntu: haskell-stack
  winget: commercialhaskell.stack
package-manager-url: https://formulae.brew.sh/formula/haskell-stack
license: BSD-3-Clause
tags:
  - build-tool
  - cli
  - haskell
  - package-management
  - reproducible-builds
  - stackage
description: Cross-platform program for developing Haskell projects
executables:
  - stack
provenance:
  formula: haskell-stack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
