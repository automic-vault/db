id: brew:rhash
display-name: RHash
homepage: https://sourceforge.net/projects/rhash/
repo: https://github.com/rhash/RHash
docs:
  - https://github.com/rhash/RHash
  - https://rhash.sourceforge.io/
config-file-location:
  unix:
    - /etc/rhashrc
    - ~/.rhashrc
  windows: '%APPDATA%\RHash\rhashrc'
credentials-file-location: null
category: security
package-manager:
  apk: rhash
  brew: rhash
  debian: librhash-dev
  dnf: rhash
  macports: RHash
  nix: rhash
  pacman: rhash
  scoop: main/rhash
  ubuntu: librhash-dev
  winget: RHash.RHash
  zypper: librhash1
package-manager-url: https://formulae.brew.sh/formula/rhash
license: 0BSD
tags:
  - checksums
  - cli
  - file-integrity
  - hashing
  - magnet-links
  - message-digests
description: Utility for computing and verifying hash sums of files
executables:
  - ed2k-link
  - edonr256-hash
  - edonr512-hash
  - gost12-256-hash
  - gost12-512-hash
  - has160-hash
  - magnet-link
  - rhash
  - sfv-hash
  - tiger-hash
  - tth-hash
  - whirlpool-hash
provenance:
  formula: rhash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
