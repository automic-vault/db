id: brew:opkssh
display-name: opkssh
homepage: https://eprint.iacr.org/2023/296
repo: https://github.com/openpubkey/opkssh
docs:
  - https://github.com/openpubkey/opkssh#readme
  - https://github.com/openpubkey/opkssh/blob/main/scripts/installing.md
config-file-location:
  linux:
    - /etc/opk/providers
    - /etc/opk/auth_id
    - /etc/opk/policy.d/*.yml
  unix: ~/.opk/config.yml
  windows:
    - '%ProgramData%\opk\providers'
    - '%ProgramData%\opk\auth_id'
credentials-file-location: null
category: security
package-manager:
  brew: opkssh
  debian: golang-github-openpubkey-opkssh-dev
  dnf: opkssh
  nix: opkssh
  winget: openpubkey.opkssh
package-manager-url: https://formulae.brew.sh/formula/opkssh
license: Apache-2.0
tags:
  - authentication
  - cli
  - oidc
  - single-sign-on
  - ssh
description: Enables SSH to be used with OpenID Connect
executables:
  - opkssh
provenance:
  formula: opkssh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
