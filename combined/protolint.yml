id: brew:protolint
display-name: protolint
homepage: https://github.com/yoheimuta/protolint
repo: https://github.com/yoheimuta/protolint
docs:
  - https://github.com/yoheimuta/protolint#readme
  - https://github.com/yoheimuta/protolint/blob/master/_example/config/.protolint.yaml
config-file-location:
  unix:
    - ./.protolint.yaml
    - package.json (protolint key)
    - pyproject.toml ([tool.protolint])
credentials-file-location: null
category: developer-tools
package-manager:
  brew: protolint
  nix: protolint
  scoop: main/protolint
package-manager-url: https://formulae.brew.sh/formula/protolint
license: MIT
tags:
  - cli
  - formatter
  - linter
  - protobuf
  - static-analysis
  - style-guide
description: Pluggable linter and fixer to enforce Protocol Buffer style and conventions
executables:
  - protoc-gen-protolint
  - protolint
provenance:
  formula: protolint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
