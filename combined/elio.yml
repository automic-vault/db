id: brew:elio
display-name: Elio
homepage: https://elio-fm.github.io/
repo: https://github.com/elio-fm/elio
docs:
  - https://github.com/elio-fm/elio#readme
config-file-location:
  linux:
    - ~/.config/elio/config.toml
    - $XDG_CONFIG_HOME/elio/config.toml
    - ~/.config/elio/theme.toml
    - $XDG_CONFIG_HOME/elio/theme.toml
  macos:
    - ~/Library/Application Support/elio/config.toml
    - ~/Library/Application Support/elio/theme.toml
  windows:
    - '%APPDATA%\elio\config.toml'
    - '%APPDATA%\elio\theme.toml'
credentials-file-location: null
category: productivity
package-manager:
  brew: elio
package-manager-url: https://formulae.brew.sh/formula/elio
license: MIT
tags:
  - cli
  - file-manager
  - previews
  - terminal
  - tui
description: Batteries-included terminal file manager with rich previews
executables:
  - elio
provenance:
  formula: elio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
