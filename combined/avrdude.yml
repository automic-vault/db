id: brew:avrdude
display-name: AVRDUDE
homepage: https://www.nongnu.org/avrdude/
repo: https://github.com/avrdudes/avrdude
docs:
  - https://avrdudes.github.io/avrdude
  - https://avrdudes.github.io/avrdude/8.1/avrdude_4.html
config-file-location:
  unix:
    - <directory from which application loaded>/../etc/avrdude.conf
    - <directory from which application loaded>/avrdude.conf
    - /usr/local/etc/avrdude.conf
    - ${XDG_CONFIG_HOME}/avrdude/avrdude.rc
    - ${HOME}/.config/avrdude/avrdude.rc
    - ${HOME}/.avrduderc
  windows:
    - <directory from which avrdude.exe loaded>/avrdude.conf
    - <directory from which avrdude.exe loaded>/avrdude.rc
credentials-file-location: null
category: developer-tools
package-manager:
  apk: avrdude
  brew: avrdude
  debian: avrdude
  dnf: avrdude
  macports: avrdude
  nix: avrdude
  pacman: avrdude
  scoop: main/avrdude
  ubuntu: avrdude
  winget: AVRDudes.AVRDUDE
  zypper: avrdude
package-manager-url: https://formulae.brew.sh/formula/avrdude
license: GPL-2.0-or-later
tags:
  - avr
  - cli
  - microcontroller
  - programmer
description: Atmel AVR MCU programmer
executables:
  - avrdude
  - elf2tag
provenance:
  formula: avrdude
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
