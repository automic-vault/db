id: brew:wireshark
display-name: Wireshark
homepage: https://www.wireshark.org
repo: https://gitlab.com/wireshark/wireshark
docs:
  - https://www.wireshark.org/docs
  - https://www.wireshark.org/docs/wsdg_html
  - https://www.wireshark.org/docs/wsug_html_chunked
config-file-location:
  unix:
    - $XDG_CONFIG_HOME/wireshark/preferences
    - ~/.config/wireshark/preferences
    - ~/.wireshark/preferences
  windows:
    - '%APPDATA%\Wireshark\preferences'
    - '%USERPROFILE%\Application Data\Wireshark\preferences'
credentials-file-location: null
category: networking
package-manager:
  apk: tshark
  brew: wireshark
  chocolatey: wireshark
  debian: libwireshark-data
  dnf: wireshark
  nix: wireshark
  scoop: extras/wireshark
  ubuntu: libwireshark-data
  winget: WiresharkFoundation.Wireshark
  zypper: libwireshark19
package-manager-url: https://formulae.brew.sh/formula/wireshark
license: GPL-2.0-or-later
tags:
  - cli
  - network-debugging
  - packet-capture
  - protocol-analysis
  - tshark
description: Network analyzer and capture tool - without graphical user interface
executables:
  - capinfos
  - captype
  - dftest
  - dumpcap
  - editcap
  - idl2wrs
  - mergecap
  - mmdbresolve
  - randpkt
  - rawshark
  - reordercap
  - sharkd
  - text2pcap
  - tshark
provenance:
  formula: wireshark
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
