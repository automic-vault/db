id: brew:kimi-code
display-name: Kimi Code CLI
homepage: https://moonshotai.github.io/kimi-code/
repo: https://github.com/MoonshotAI/kimi-code
docs:
  - https://github.com/MoonshotAI/kimi-code#readme
  - https://moonshotai.github.io/kimi-code/en
config-file-location:
  unix:
    - ~/.kimi-code/config.toml
    - ~/.kimi-code/tui.toml
    - ~/.kimi-code/mcp.json
    - <project-root>/.kimi-code/local.toml
    - <project-root>/.kimi-code/mcp.json
credentials-file-location:
  unix:
    - ~/.kimi-code/config.toml
    - ~/.kimi-code/credentials/<name>.json
    - ~/.kimi-code/credentials/mcp/<key>-<suffix>.json
category: developer-tools
package-manager:
  brew: kimi-code
  winget: MoonshotAI.Kimi
package-manager-url: https://formulae.brew.sh/formula/kimi-code
license: MIT
tags:
  - ai-agent
  - cli
  - coding-agent
  - developer-tool
  - terminal
description: AI coding agent for your terminal
executables:
  - kimi
provenance:
  formula: kimi-code
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
