credentials-file-location: null
category: developer-tools
package-manager:
  brew: cargo-spellcheck
  nix: cargo-spellcheck
  pacman: cargo-spellcheck
package-manager-url: https://formulae.brew.sh/formula/cargo-spellcheck
license: Apache-2.0 OR MIT
tags:
  - cargo-plugin
  - ci
  - cli
  - documentation
  - grammar
  - rust
  - spellcheck
description: Checks rust documentation for spelling and grammar mistakes
executables:
  - cargo-spellcheck
provenance:
  formula: cargo-spellcheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
