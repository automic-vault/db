id: brew:keyutils
display-name: keyutils
homepage: https://git.kernel.org/pub/scm/linux/kernel/git/dhowells/keyutils.git
repo: https://git.kernel.org/pub/scm/linux/kernel/git/dhowells/keyutils.git
docs:
  - https://git.kernel.org/pub/scm/linux/kernel/git/dhowells/keyutils.git/tree/README
config-file-location:
  linux:
    - /etc/request-key.conf
    - /etc/request-key.d/*.conf
    - /etc/key.dns_resolver.conf
credentials-file-location: null
category: system
package-manager:
  apk: keyutils
  brew: keyutils
  debian: keyutils
  dnf: keyutils
  nix: keyutils
  pacman: keyutils
  ubuntu: keyutils
  zypper: keyutils
package-manager-url: https://formulae.brew.sh/formula/keyutils
license: GPL-2.0-or-later AND LGPL-2.0-or-later
tags:
  - cli
  - kernel
  - key-management
  - keyrings
  - library
  - linux
description: Linux key management utilities
executables:
  - key.dns_resolver
  - keyctl
  - request-key
provenance:
  formula: keyutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
