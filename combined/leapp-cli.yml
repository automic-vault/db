id: brew:leapp-cli
display-name: Leapp CLI
homepage: https://www.leapp.cloud/
repo: https://github.com/Noovolari/leapp
docs:
  - https://docs.leapp.cloud/0.11.1/cli/help
  - https://docs.leapp.cloud/0.11.1/installation/install-leapp
  - https://github.com/Noovolari/leapp#readme
config-file-location:
  unix:
    - ~/.Leapp/Leapp-lock.json
    - ~/.Leapp/Leapp-lock.backup.bin
  windows:
    - C:\Users\<USER>\.Leapp\Leapp-lock.json
    - C:\Users\<USER>\.Leapp\Leapp-lock.backup.bin
credentials-file-location:
  unix: ~/.aws
  windows: C:\Users\<USER>\.aws
category: security
package-manager:
  brew: leapp-cli
package-manager-url: https://formulae.brew.sh/formula/leapp-cli
license: MPL-2.0
tags:
  - aws
  - azure
  - cli
  - cloud-credentials
  - credential-manager
  - temporary-credentials
description: Cloud credentials manager cli
executables:
  - leapp
provenance:
  formula: leapp-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
