id: brew:jailkit
display-name: Jailkit
homepage: https://olivier.sessink.nl/jailkit/
repo: https://cvs.savannah.nongnu.org/viewvc/jailkit
docs:
  - https://olivier.sessink.nl/jailkit
  - https://olivier.sessink.nl/jailkit/jailkit.8.html
config-file-location:
  unix:
    - /etc/jailkit/
    - JAIL/etc/jailkit/
credentials-file-location: null
category: security
package-manager:
  brew: jailkit
  debian: jailkit
  macports: jailkit
  ubuntu: jailkit
package-manager-url: https://formulae.brew.sh/formula/jailkit
license: BSD-3-Clause AND LGPL-2.0-or-later
tags:
  - chroot
  - cli
  - jail
  - sandboxing
  - security
  - system-administration
  - unix
description: Utilities to create limited user accounts in a chroot jail
executables:
  - jk_check
  - jk_chrootlaunch
  - jk_chrootsh
  - jk_cp
  - jk_init
  - jk_jailuser
  - jk_list
  - jk_lsh
  - jk_socketd
  - jk_uchroot
  - jk_update
provenance:
  formula: jailkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
