id: brew:mariadb@10.6
display-name: MariaDB 10.6
homepage: https://mariadb.org/
repo: https://github.com/MariaDB/server
docs:
  - https://mariadb.com/docs/server
  - >
    https://mariadb.com/docs/server/server-management/install-and-upgrade-mariadb/configuring-mariadb/configuring-mariadb-with-option-files
config-file-location:
  unix:
    - /etc/my.cnf
    - /etc/mysql/my.cnf
    - $MARIADB_HOME/my.cnf
    - $MYSQL_HOME/my.cnf
    - ~/.my.cnf
  windows:
    - System Windows Directory\my.ini
    - System Windows Directory\my.cnf
    - Windows Directory\my.ini
    - Windows Directory\my.cnf
    - C:\my.ini
    - C:\my.cnf
    - installdir\my.ini
    - installdir\my.cnf
    - installdir\data\my.ini
    - installdir\data\my.cnf
    - '%MARIADB_HOME%\my.ini'
    - '%MARIADB_HOME%\my.cnf'
    - '%MYSQL_HOME%\my.ini'
    - '%MYSQL_HOME%\my.cnf'
credentials-file-location:
  unix:
    - /etc/my.cnf
    - /etc/mysql/my.cnf
    - $MARIADB_HOME/my.cnf
    - $MYSQL_HOME/my.cnf
    - ~/.my.cnf
  windows:
    - System Windows Directory\my.ini
    - System Windows Directory\my.cnf
    - Windows Directory\my.ini
    - Windows Directory\my.cnf
    - C:\my.ini
    - C:\my.cnf
    - installdir\my.ini
    - installdir\my.cnf
    - installdir\data\my.ini
    - installdir\data\my.cnf
    - '%MARIADB_HOME%\my.ini'
    - '%MARIADB_HOME%\my.cnf'
    - '%MYSQL_HOME%\my.ini'
    - '%MYSQL_HOME%\my.cnf'
