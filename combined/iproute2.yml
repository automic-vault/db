id: brew:iproute2
display-name: iproute2
homepage: https://wiki.linuxfoundation.org/networking/iproute2
repo: https://git.kernel.org/pub/scm/network/iproute2/iproute2.git
docs:
  - https://git.kernel.org/pub/scm/network/iproute2/iproute2.git/tree/README
  - https://wiki.linuxfoundation.org/networking/iproute2
config-file-location:
  linux:
    - /etc/iproute2/rt_tables
    - /usr/lib/iproute2/rt_tables
    - /etc/iproute2/tc_cls
credentials-file-location: null
category: networking
package-manager:
  apk: iproute2
  brew: iproute2
  debian: iproute2
  dnf: rdma-core
  nix: iproute2
  pacman: iproute2
  ubuntu: iproute2
  zypper: iproute2
package-manager-url: https://formulae.brew.sh/formula/iproute2
license: GPL-2.0-only
tags:
  - cli
  - linux
  - netlink
  - networking
  - routing
  - traffic-control
description: Linux routing utilities
executables:
  - ctstat
  - dcb
  - devlink
  - dpll
  - genl
  - lnstat
  - netshaper
  - nstat
  - rdma
  - routel
  - rtacct
  - rtmon
  - rtstat
  - tc
  - tipc
  - vdpa
provenance:
  formula: iproute2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
