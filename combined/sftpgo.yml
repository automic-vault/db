id: brew:sftpgo
display-name: SFTPGo
homepage: https://sftpgo.com/
repo: https://github.com/drakkan/sftpgo
docs:
  - https://docs.sftpgo.com/latest
  - https://github.com/drakkan/sftpgo#readme
config-file-location:
  linux:
    - ./sftpgo.json
    - ~/.config/sftpgo/sftpgo.json
    - /etc/sftpgo/sftpgo.json
    - /usr/local/etc/sftpgo/sftpgo.json
  macos:
    - ./sftpgo.json
    - ~/Library/Application Support/sftpgo/sftpgo.json
credentials-file-location: null
category: networking
package-manager:
  brew: sftpgo
  nix: sftpgo
  scoop: main/sftpgo
  winget: drakkan.SFTPGo
package-manager-url: https://formulae.brew.sh/formula/sftpgo
license: AGPL-3.0-only
tags:
  - cli
  - file-transfer-server
  - ftp
  - go
  - sftp
  - webdav
description: Fully featured SFTP server with optional HTTP/S, FTP/S and WebDAV support
executables:
  - sftpgo
provenance:
  formula: sftpgo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
