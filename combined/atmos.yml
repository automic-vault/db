id: brew:atmos
display-name: Atmos
homepage: https://atmos.tools
repo: https://github.com/cloudposse/atmos
docs:
  - https://atmos.tools/
  - https://atmos.tools/cli/configuration
config-file-location:
  unix:
    - ./atmos.yaml
    - repo-root/atmos.yaml
    - 'parent directories: atmos.yaml'
    - ~/.atmos/atmos.yaml
    - /usr/local/etc/atmos/atmos.yaml
  windows:
    - ./atmos.yaml
    - repo-root/atmos.yaml
    - 'parent directories: atmos.yaml'
    - '%LOCALAPPDATA%/atmos/atmos.yaml'
credentials-file-location: null
category: cloud-infrastructure
package-manager:
  brew: atmos
  nix: atmos
  scoop: main/atmos
package-manager-url: https://formulae.brew.sh/formula/atmos
license: Apache-2.0
tags:
  - ansible
  - cli
  - cloud-automation
  - devops
  - helmfile
  - iac
  - opentofu
  - terraform
description: Universal Tool for DevOps and Cloud Automation
executables:
  - atmos
provenance:
  formula: atmos
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
