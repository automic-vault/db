id: brew:transmission-cli
display-name: Transmission CLI
homepage: https://transmissionbt.com/
repo: https://github.com/transmission/transmission
docs:
  - https://github.com/transmission/transmission/tree/main/docs
config-file-location:
  linux:
    - ~/.config/transmission-cli/settings.json
    - ~/.config/transmission-daemon/settings.json
  macos:
    - ~/Library/Application Support/Transmission/settings.json
    - ~/Library/Preferences/org.m0k.transmission.plist
  windows:
    - '%LOCALAPPDATA%/transmission-daemon/settings.json'
    - '%LOCALAPPDATA%/transmission/settings.json'
credentials-file-location: null
category: networking
package-manager:
  apk: transmission-cli
  brew: transmission-cli
  debian: transmission-cli
  dnf: transmission-cli
  pacman: transmission-cli
  scoop: main/transmission-cli
  ubuntu: transmission-cli
  zypper: transmission-daemon
package-manager-url: https://formulae.brew.sh/formula/transmission-cli
license: GPL-2.0-only OR GPL-3.0-only
tags:
  - bittorrent
  - cli
  - daemon
  - p2p
  - torrent-client
description: Lightweight BitTorrent client
executables:
  - transmission-cli
  - transmission-create
  - transmission-daemon
  - transmission-edit
  - transmission-remote
  - transmission-show
provenance:
  formula: transmission-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
