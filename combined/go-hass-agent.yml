id: brew:go-hass-agent
display-name: Go Hass Agent
homepage: https://github.com/joshuar/go-hass-agent
repo: https://github.com/joshuar/go-hass-agent
docs:
  - https://github.com/joshuar/go-hass-agent#readme
config-file-location:
  linux:
    - ~/.config/go-hass-agent/preferences.toml
    - ~/.config/go-hass-agent/commands.toml
  macos:
    - ~/Library/Application Support/go-hass-agent/preferences.toml
    - ~/Library/Application Support/go-hass-agent/commands.toml
  windows:
    - '%LocalAppData%\go-hass-agent\preferences.toml'
    - '%LocalAppData%\go-hass-agent\commands.toml'
credentials-file-location:
  linux: ~/.config/go-hass-agent/preferences.toml
  macos: ~/Library/Application Support/go-hass-agent/preferences.toml
  windows: '%LocalAppData%\go-hass-agent\preferences.toml'
category: productivity
package-manager:
  brew: go-hass-agent
  nix: go-hass-agent
package-manager-url: https://formulae.brew.sh/formula/go-hass-agent
license: MIT
tags:
  - cli
  - desktop-agent
  - home-assistant
  - monitoring
  - mqtt
  - sensors
description: Native Home Assistant agent for desktop/laptop devices
executables:
  - go-hass-agent
provenance:
  formula: go-hass-agent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
