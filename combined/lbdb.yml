id: brew:lbdb
display-name: lbdb
homepage: https://www.spinnaker.de/lbdb/
repo: https://github.com/Rolander/lbdb
docs:
  - https://www.spinnaker.de/lbdb
  - https://www.spinnaker.de/lbdb/manpage-lbdb-fetchaddr.html
  - https://www.spinnaker.de/lbdb/manpage-lbdbq.html
  - https://www.spinnaker.de/lbdb/manpage-mutt_ldap_query.html
config-file-location:
  unix:
    - /usr/local/etc/lbdb.rc
