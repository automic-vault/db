  - mutt
description: Little brother's database for the mutt mail reader
executables:
  - lbdb-fetchaddr
  - lbdb_dotlock
  - lbdbq
  - mutt_ldap_query
  - nodelist2lbdb
provenance:
  formula: lbdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
