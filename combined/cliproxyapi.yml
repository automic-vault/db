id: brew:cliproxyapi
display-name: CLIProxyAPI
homepage: https://github.com/router-for-me/CLIProxyAPI
repo: https://github.com/router-for-me/CLIProxyAPI
docs:
  - https://github.com/router-for-me/CLIProxyAPI/tree/main/docs
  - https://help.router-for.me/
  - https://help.router-for.me/introduction/quick-start
config-file-location:
  macos:
    - $(brew --prefix)/etc/cliproxyapi.conf
    - /opt/homebrew/etc/cliproxyapi.conf
    - /usr/local/etc/cliproxyapi.conf
  unix:
    - config.yaml
    - ~/.cli-proxy-api/config.yaml
credentials-file-location:
  unix: ~/.cli-proxy-api
category: developer-tools
package-manager:
  brew: cliproxyapi
  scoop: main/cliproxyapi
package-manager-url: https://formulae.brew.sh/formula/cliproxyapi
license: MIT
tags:
  - api-proxy
  - claude
  - cli
  - codex
  - gemini
  - openai-compatible
description: Wrap Gemini CLI, Codex, Claude Code, Qwen Code as an API service
executables:
  - cliproxyapi
provenance:
  formula: cliproxyapi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
