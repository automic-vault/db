id: brew:tomcat@9
display-name: Apache Tomcat 9
homepage: https://tomcat.apache.org/
repo: https://github.com/apache/tomcat
docs:
  - https://tomcat.apache.org/tomcat-9.0-doc/config/index.html
  - https://tomcat.apache.org/tomcat-9.0-doc/index.html
config-file-location:
  unix:
    - $CATALINA_BASE/conf/server.xml
    - $CATALINA_BASE/conf/catalina.properties
credentials-file-location: null
category: developer-tools
package-manager:
  apk: tomcat9
  brew: tomcat@9
  chocolatey: Tomcat
  debian: libtomcat9-java
  dnf: tomcat
  nix: tomcat
  pacman: tomcat9
  scoop: versions/tomcat9
  ubuntu: libtomcat9-java
  zypper: tomcat
package-manager-match:
  chocolatey: fallback
  dnf: fallback
  nix: fallback
  zypper: fallback
package-manager-url: https://formulae.brew.sh/formula/tomcat@9
license: Apache-2.0
tags:
  - application-server
  - cli
  - java
  - jsp
  - servlet
  - tomcat
description: Implementation of Java Servlet and JavaServer Pages
executables:
  - catalina
provenance:
  formula: tomcat@9
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
