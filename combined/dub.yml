id: brew:dub
display-name: DUB
homepage: https://code.dlang.org/getting_started
repo: https://github.com/dlang/dub
docs:
  - https://dub.pm/
  - https://dub.pm/getting-started/install
config-file-location:
  unix:
    - /var/lib/dub/settings.json
    - <dub executable folder>/../etc/dub/settings.json
    - /etc/dub/settings.json
    - $DUB_HOME/settings.json
    - $ROOT_PACKAGE_DIR/dub.settings.json
  windows:
    - '%ProgramData%\dub\settings.json'
    - <dub executable folder>\..\etc\dub\settings.json
    - '%DUB_HOME%\settings.json'
    - '%ROOT_PACKAGE_DIR%\dub.settings.json'
credentials-file-location: null
category: developer-tools
package-manager:
  apk: dub
  brew: dub
  debian: dub
  dnf: dub
  macports: dub
  nix: dub
  pacman: dub
  ubuntu: dub
  zypper: dub
package-manager-url: https://formulae.brew.sh/formula/dub
license: MIT
tags:
  - build-tool
  - cli
  - d-language
  - package-manager
description: Build tool for D projects
executables:
  - dub
provenance:
  formula: dub
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
