id: brew:pueue
display-name: Pueue
homepage: https://github.com/Nukesor/pueue
repo: https://github.com/Nukesor/pueue
docs:
  - https://github.com/Nukesor/pueue#readme
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/pueue/pueue.yml
    - ~/.config/pueue/pueue.yml
  macos: ~/Library/Application Support/pueue/pueue.yml
  windows: '%APPDATA%\pueue\pueue.yml'
credentials-file-location:
  unix:
    - ~/.local/share/pueue/shared_secret
    - ~/.local/share/pueue/certs/daemon.cert
    - ~/.local/share/pueue/certs/daemon.key
category: system
package-manager:
  apk: pueue
  brew: pueue
  macports: pueue
  nix: pueue
  pacman: pueue
  scoop: main/pueue
  zypper: pueue
package-manager-url: https://formulae.brew.sh/formula/pueue
license: MIT
tags:
  - cli
  - daemon
  - process-management
  - shell
  - task-queue
description: Command-line tool for managing long-running shell commands
executables:
  - pueue
  - pueued
provenance:
  formula: pueue
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
