id: brew:commitlint
display-name: commitlint
homepage: https://commitlint.js.org/#/
repo: https://github.com/conventional-changelog/commitlint
docs:
  - https://commitlint.js.org/
config-file-location:
  unix:
    - ./commitlint.config.js
    - ./commitlint.config.cjs
    - ./commitlint.config.mjs
    - ./commitlint.config.ts
    - ./commitlint.config.cts
    - ./commitlint.config.mts
    - ./.commitlintrc
    - ./.commitlintrc.json
    - ./.commitlintrc.yaml
    - ./.commitlintrc.yml
    - ./.commitlintrc.js
    - ./.commitlintrc.cjs
    - ./.commitlintrc.mjs
    - ./.commitlintrc.ts
    - ./.commitlintrc.cts
    - ./.commitlintrc.mts
    - ./package.json
credentials-file-location: null
category: developer-tools
package-manager:
  brew: commitlint
  nix: commitlint
  winget: Commitlint.Commitlint
package-manager-url: https://formulae.brew.sh/formula/commitlint
license: MIT
tags:
  - cli
  - commit-messages
  - conventional-commits
  - git
  - linting
description: Lint commit messages according to a commit convention
executables:
  - commitlint
provenance:
  formula: commitlint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
