id: brew:rpm
display-name: RPM
homepage: https://rpm.org/
repo: https://github.com/rpm-software-management/rpm
docs:
  - https://rpm.org/docs
config-file-location:
  unix:
    - /usr/lib/rpm/macros
    - /usr/lib/rpm/macros.d/macros.*
    - /usr/lib/rpm/platform/%{_target}/macros
    - /usr/lib/rpm/<vendor>/macros
    - /etc/rpm/macros.*
    - /etc/rpm/macros
    - /etc/rpm/%{_target}/macros
    - ~/.config/rpm/macros
    - ~/.rpmmacros
credentials-file-location: null
category: developer-tools
package-manager:
  apk: py3-rpm
  brew: rpm
  debian: librpm-dev
  dnf: python3-rpm
  macports: rpm
  nix: rpm
  ubuntu: librpm-dev
  zypper: librpmbuild10
package-manager-url: https://formulae.brew.sh/formula/rpm
license: GPL-2.0-or-later AND LGPL-2.0-or-later
tags:
  - cli
  - package-management
  - packaging
  - rpm
description: Standard unix software packaging tool
executables:
  - gendiff
  - rpm
  - rpm2archive
  - rpm2cpio
  - rpmbuild
  - rpmdb
  - rpmgraph
  - rpmkeys
  - rpmlua
  - rpmquery
  - rpmsign
  - rpmsort
  - rpmspec
  - rpmverify
provenance:
  formula: rpm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
