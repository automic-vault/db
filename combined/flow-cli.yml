id: brew:flow-cli
display-name: Flow CLI
homepage: https://onflow.org
repo: https://github.com/onflow/flow-cli
docs:
  - https://developers.flow.com/build/tools/flow-cli
  - https://developers.flow.com/build/tools/flow-cli/install
config-file-location:
  unix:
    - flow.json
    - ~/flow.json
  windows:
    - flow.json
    - C:\Users\$USER\flow.json
credentials-file-location:
  unix:
    - flow.json
    - private.json
    - emulator-account.pkey
    - '*.pkey'
  windows:
    - flow.json
    - private.json
    - emulator-account.pkey
    - '*.pkey'
category: developer-tools
package-manager:
  brew: flow-cli
  macports: flow
  nix: flow
  scoop: main/flow
  winget: MadrasCheck.flow
package-manager-url: https://formulae.brew.sh/formula/flow-cli
license: Apache-2.0
tags:
  - blockchain
  - cadence
  - cli
  - emulator
  - flow
  - smart-contracts
description: Command-line interface that provides utilities for building Flow applications
executables:
  - flow
provenance:
  formula: flow-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
