id: brew:gammu
display-name: Gammu
homepage: https://wammu.eu/gammu/
repo: https://github.com/gammu/gammu
docs:
  - https://docs.gammu.org/
config-file-location:
  unix:
    - $XDG_CONFIG_HOME/gammu/config
    - ~/.config/gammu/config
    - ~/.gammurc
    - /etc/gammurc
    - /etc/gammu-smsdrc
  windows:
    - '%PROFILE%\Application Data\gammurc'
    - .\gammurc
credentials-file-location: null
category: system
package-manager:
  apk: gammu
  brew: gammu
  debian: gammu
  dnf: gammu
  nix: gammu
  pacman: gammu
  ubuntu: gammu
package-manager-url: https://formulae.brew.sh/formula/gammu
license: GPL-2.0-or-later
tags:
  - cli
  - hardware
  - mobile
  - phone-management
  - sms
description: Command-line utility to control a phone
executables:
  - gammu
  - gammu-config
  - gammu-detect
  - gammu-smsd
  - gammu-smsd-inject
  - gammu-smsd-monitor
  - jadmaker
provenance:
  formula: gammu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
