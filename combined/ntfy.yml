id: brew:ntfy
display-name: ntfy
homepage: https://ntfy.sh/
repo: https://github.com/binwiederhier/ntfy
docs:
  - https://docs.ntfy.sh/
config-file-location:
  linux:
    - /etc/ntfy/server.yml
    - /etc/ntfy/client.yml
    - ~/.config/ntfy/client.yml
  macos: ~/Library/Application Support/ntfy/client.yml
  windows:
    - '%ProgramData%\ntfy\server.yml'
    - '%AppData%\ntfy\client.yml'
credentials-file-location:
  linux:
    - /var/lib/ntfy/user.db
    - /etc/ntfy/client.yml
    - ~/.config/ntfy/client.yml
  macos: ~/Library/Application Support/ntfy/client.yml
  windows:
    - '%ProgramData%\ntfy\user.db'
    - '%AppData%\ntfy\client.yml'
category: networking
package-manager:
  apk: ntfy
  brew: ntfy
  debian: ntfy
  nix: ntfy
  scoop: main/ntfy
package-manager-url: https://formulae.brew.sh/formula/ntfy
license: Apache-2.0 OR GPL-2.0-only
tags:
  - cli
  - http
  - pub-sub
  - push-notifications
  - self-hosted
description: Send push notifications to your phone or desktop via PUT/POST
executables:
  - ntfy
provenance:
  formula: ntfy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
