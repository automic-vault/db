id: brew:auditbeat
display-name: Auditbeat
homepage: https://www.elastic.co/beats/auditbeat
repo: https://github.com/elastic/beats
docs:
  - https://www.elastic.co/guide/en/beats/auditbeat/8.19/configuring-howto-auditbeat.html
  - https://www.elastic.co/guide/en/beats/auditbeat/8.19/directory-layout.html
  - https://www.elastic.co/guide/en/beats/auditbeat/8.19/index.html
config-file-location:
  linux:
    - /etc/auditbeat/auditbeat.yml
    - /usr/share/auditbeat/auditbeat.yml
    - '{extract.path}/auditbeat.yml'
  macos: '{extract.path}/auditbeat.yml'
  windows: C:\Program Files\Auditbeat\auditbeat.yml
credentials-file-location: null
category: security
package-manager:
  brew: auditbeat
  chocolatey: auditbeat
  nix: auditbeat
package-manager-url: https://formulae.brew.sh/formula/auditbeat
license: Apache-2.0
tags:
  - audit
  - cli
  - elastic
  - monitoring
  - security
description: Lightweight Shipper for Audit Data
executables:
  - auditbeat
provenance:
  formula: auditbeat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
