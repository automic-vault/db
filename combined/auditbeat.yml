id: brew:auditbeat
display-name: Auditbeat
homepage: https://www.elastic.co/beats/auditbeat
repo: https://github.com/elastic/beats
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
config-file-location:
  unix:
    - ${path.config}/auditbeat.yml
    - /etc/auditbeat/auditbeat.yml
    - '{extract.path}/auditbeat.yml'
  windows: C:\Program Files\Auditbeat\auditbeat.yml
credentials-file-location:
  unix:
    - ${path.data}
    - ${path.config}/beats.keystore
category: security
package-manager:
  brew: auditbeat
  chocolatey: auditbeat
  nix: auditbeat
package-manager-url: https://formulae.brew.sh/formula/auditbeat
license: Apache-2.0
tags:
  - audit
  - cli
  - elastic
  - monitoring
  - security
  - system
description: Lightweight Shipper for Audit Data
executables:
  - auditbeat
provenance:
  formula: auditbeat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
