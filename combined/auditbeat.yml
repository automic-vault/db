id: brew:auditbeat
display-name: Auditbeat
homepage: https://www.elastic.co/beats/auditbeat
repo: https://github.com/elastic/beats
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
  - https://www.elastic.co/docs/reference/beats/auditbeat/keystore
config-file-location:
  linux:
    - /etc/auditbeat/auditbeat.yml
    - /usr/share/auditbeat/auditbeat.yml
    - '{extract.path}/auditbeat.yml'
  macos: '{extract.path}/auditbeat.yml'
credentials-file-location:
  linux:
    - /var/lib/auditbeat
    - /usr/share/auditbeat/data
    - '{extract.path}/data'
  macos: '{extract.path}/data'
category: security
package-manager:
  brew: auditbeat
  chocolatey: auditbeat
  nix: auditbeat
package-manager-url: https://formulae.brew.sh/formula/auditbeat
license: Apache-2.0
tags:
  - audit
  - cli
  - elastic
  - file-integrity
  - monitoring
  - security
description: Lightweight Shipper for Audit Data
executables:
  - auditbeat
provenance:
  formula: auditbeat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
