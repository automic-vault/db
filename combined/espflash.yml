id: brew:espflash
display-name: espflash
homepage: https://github.com/esp-rs/espflash
repo: https://github.com/esp-rs/espflash
docs:
  - https://github.com/esp-rs/espflash#readme
  - https://github.com/esp-rs/espflash/tree/main/espflash#readme
config-file-location:
  linux:
    - ~/.config/espflash/espflash.toml
    - ~/.config/espflash/espflash_ports.toml
  macos:
    - ~/Library/Application Support/rs.esp.espflash/espflash.toml
    - ~/Library/Application Support/rs.esp.espflash/espflash_ports.toml
  unix:
    - ./espflash.toml
    - ./espflash_ports.toml
  windows:
    - '%APPDATA%\esp\espflash\espflash.toml'
    - '%APPDATA%\esp\espflash\espflash_ports.toml'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: espflash
  nix: espflash
  pacman: espflash
package-manager-url: https://formulae.brew.sh/formula/espflash
license: MIT OR Apache-2.0
tags:
  - cli
  - embedded
  - esp32
  - espressif
  - rust
  - serial-flashing
description: Serial flasher utility for Espressif SoCs and modules based on esptool.py
executables:
  - espflash
provenance:
  formula: espflash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
