id: brew:gnupg@1.4
display-name: GnuPG 1.4
homepage: https://www.gnupg.org/
repo: https://dev.gnupg.org/source/gnupg
docs:
  - https://www.gnupg.org/documentation/manuals/gnupg
  - https://www.gnupg.org/documentation/manuals/gnupg/GPG-Configuration.html
config-file-location:
  unix:
    - ~/.gnupg/gpg.conf
    - ~/.gnupg/common.conf
credentials-file-location:
  unix: ~/.gnupg/secring.gpg
category: security
package-manager:
  apk: gnupg
  brew: gnupg@1.4
  chocolatey: gnupg
  debian: gpgv1
  dnf: gnupg2
  nix: gnupg
  pacman: gnupg
  scoop: main/gnupg
  ubuntu: gpgv1
  winget: GnuPG.GnuPG
  zypper: gpg2
package-manager-match:
  apk: fallback
  chocolatey: fallback
  dnf: fallback
  nix: fallback
  pacman: fallback
  scoop: fallback
  winget: fallback
  zypper: fallback
package-manager-url: https://formulae.brew.sh/formula/gnupg@1.4
license: GPL-3.0-or-later
tags:
  - cli
  - cryptography
  - encryption
  - key-management
  - openpgp
  - signing
description: GNU Privacy Guard (OpenPGP)
executables:
  - gpg-zip1
  - gpg1
  - gpgsplit1
  - gpgv1
provenance:
  formula: gnupg@1.4
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
