id: brew:ccache
display-name: ccache
homepage: https://ccache.dev/
repo: https://github.com/ccache/ccache
docs:
  - https://ccache.dev/documentation.html
  - https://ccache.dev/manual/4.13.6.html
config-file-location:
  linux:
    - $CCACHE_CONFIGPATH
    - $CCACHE_DIR/ccache.conf
    - <cache_dir>/ccache.conf
    - ~/.ccache/ccache.conf
    - $XDG_CONFIG_HOME/ccache/ccache.conf
    - ~/.config/ccache/ccache.conf
  macos:
    - $CCACHE_CONFIGPATH
    - $CCACHE_DIR/ccache.conf
    - <cache_dir>/ccache.conf
    - ~/.ccache/ccache.conf
    - $XDG_CONFIG_HOME/ccache/ccache.conf
    - ~/Library/Preferences/ccache/ccache.conf
  windows:
    - '%CCACHE_CONFIGPATH%'
    - '%CCACHE_DIR%/ccache.conf'
    - <cache_dir>\ccache.conf
    - '%USERPROFILE%\.ccache\ccache.conf'
    - '%LOCALAPPDATA%\ccache\ccache.conf'
    - '%APPDATA%\ccache\ccache.conf'
credentials-file-location: null
category: developer-tools
package-manager:
  apk: ccache
  brew: ccache
  chocolatey: ccache
  debian: ccache
  dnf: ccache
  macports: ccache
  nix: ccache
  pacman: ccache
  scoop: main/ccache
  ubuntu: ccache
  winget: Ccache.Ccache
  zypper: ccache
package-manager-url: https://formulae.brew.sh/formula/ccache
license: GPL-3.0-or-later
tags:
  - build-cache
  - c
  - c-plus-plus
  - clang
  - cli
  - compiler-cache
  - gcc
description: Object-file caching compiler wrapper
executables:
  - ccache
provenance:
  formula: ccache
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
