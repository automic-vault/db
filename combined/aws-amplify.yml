id: brew:aws-amplify
display-name: AWS Amplify CLI
homepage: https://aws.amazon.com/amplify/
repo: https://github.com/aws-amplify/amplify-cli
docs:
  - https://docs.amplify.aws/gen1/javascript/tools/cli
  - https://docs.amplify.aws/gen1/react/tools/cli/reference/files
config-file-location:
  unix:
    - amplify/.config/
    - amplify/backend/backend-config.json
    - amplify/#current-cloud-backend/backend-config.json
    - amplify/team-provider-info.json
    - amplify/cli.json
    - ~/.amplify/amplify-configuration.json
    - ~/.amplify/plugins.json
    - ~/.aws/amplify/deployment-secrets.json
credentials-file-location:
  unix: ~/.aws/credentials
  windows: '%USERPROFILE%\.aws\credentials'
category: cloud-infrastructure
package-manager:
  brew: aws-amplify
  scoop: main/aws-amplify
package-manager-url: https://formulae.brew.sh/formula/aws-amplify
license: Apache-2.0
tags:
  - amplify
  - aws
  - cli
  - cloudformation
  - serverless
description: Build full-stack web and mobile apps in hours. Easy to start, easy to scale
executables:
  - amplify
provenance:
  formula: aws-amplify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
