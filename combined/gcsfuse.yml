  - google-cloud
  - object-storage
  - storage
description: User-space file system for interacting with Google Cloud
executables:
  - gcsfuse
  - mount.fuse.gcsfuse
  - mount.gcsfuse
provenance:
  formula: gcsfuse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
