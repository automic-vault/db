id: brew:bob
display-name: Bob
homepage: https://github.com/MordechaiHadad/bob
repo: https://github.com/MordechaiHadad/bob
docs:
  - https://github.com/MordechaiHadad/bob#readme
config-file-location:
  linux:
    - /home/user/.config/bob/config.json
    - /home/user/.config/bob/config.toml
  macos:
    - /Users/user/Library/Application Support/bob/config.json
    - /Users/user/Library/Application Support/bob/config.toml
  windows:
    - C:\Users\user\AppData\Roaming\bob\config.json
    - C:\Users\user\AppData\Roaming\bob\config.toml
credentials-file-location: null
category: developer-tools
package-manager:
  brew: bob
  pacman: bob
  scoop: main/bob
package-manager-url: https://formulae.brew.sh/formula/bob
license: MIT
tags:
  - cli
  - neovim
  - rust
  - version-manager
description: Version manager for neovim
executables:
  - bob
provenance:
  formula: bob
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
