id: brew:pixi
display-name: pixi
homepage: https://pixi.sh
repo: https://github.com/prefix-dev/pixi
docs:
  - https://pixi.sh/latest
config-file-location:
  unix:
    - pixi.toml
    - pyproject.toml
    - your_project/.pixi/config.toml
    - $PIXI_HOME/config.toml
    - ~/.pixi/config.toml
    - ~/Library/Application Support/pixi/config.toml
    - $XDG_CONFIG_HOME/pixi/config.toml
    - /etc/pixi/config.toml
  windows:
    - pixi.toml
    - pyproject.toml
    - your_project\.pixi\config.toml
    - '%PIXI_HOME%\config.toml'
    - '%USERPROFILE%\.pixi\config.toml'
    - '%APPDATA%\pixi\config.toml'
    - C:\ProgramData\pixi\config.toml
credentials-file-location:
  unix:
    - ~/.rattler/credentials.json
    - ~/.netrc
  windows: '%HOME%\_netrc'
category: developer-tools
package-manager:
  apk: pixi
  brew: pixi
  nix: pixi
  pacman: pixi
  scoop: main/pixi
  winget: prefix-dev.pixi
package-manager-url: https://formulae.brew.sh/formula/pixi
license: BSD-3-Clause
tags:
  - cli
  - conda
  - cross-platform
  - developer-workflow
  - environment-management
  - package-manager
description: Package management made easy
executables:
  - pixi
provenance:
  formula: pixi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
