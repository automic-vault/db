id: brew:burp
display-name: Burp
homepage: https://burp.grke.org/
repo: https://github.com/grke/burp
docs:
  - https://burp.grke.org/docs.html
  - https://burp.grke.org/docs/add-remove.html
  - https://burp.grke.org/docs/burp_ca.html
  - https://burp.grke.org/docs/manpage.html
  - https://burp.grke.org/docs/quickstart.html
  - https://burp.grke.org/docs/server-basics.html
config-file-location:
  linux:
    - /etc/burp/burp.conf
    - /etc/burp/burp-server.conf
    - /etc/burp/clientconfdir
  macos: /usr/local/etc/burp/burp.conf
  windows:
    - '%PROGRAMFILES%\Burp\burp.conf'
    - C:/Program Files/Burp/burp.conf
credentials-file-location:
  linux:
    - /etc/burp/clientconfdir/<client>
    - /etc/burp/ssl_cert-server.key
    - /etc/burp/ssl_cert-client.key
  macos: /usr/local/etc/burp/burp.conf
  windows:
    - '%PROGRAMFILES%\Burp\burp.conf'
    - C:/Program Files/Burp/burp.conf
category: system
package-manager:
  apk: burp
  brew: burp
  debian: burp
  macports: burp
  nix: burp
  ubuntu: burp
package-manager-url: https://formulae.brew.sh/formula/burp
license: AGPL-3.0-only WITH openvpn-openssl-exception
tags:
  - backup
  - cli
  - client-server
  - compression
  - deduplication
  - network-backup
  - restore
  - scheduling
  - ssl
  - vss
description: Network backup and restore
executables:
  - bedup
  - bsigs
  - bsparse
  - burp
  - burp_ca
  - vss_strip
provenance:
  formula: burp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
