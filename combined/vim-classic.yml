id: brew:vim-classic
display-name: Vim Classic
homepage: https://vim-classic.org/
repo: https://sr.ht/~sircmpwn/vim-classic
docs:
  - https://vim-classic.org/doc
  - https://vim-classic.org/doc/starting.html
config-file-location:
  unix:
    - ~/.vimrc
    - ~/.vim/vimrc
    - $XDG_CONFIG_HOME/vim/vimrc
  windows:
    - ~/_vimrc
    - ~/vimfiles/vimrc
    - $VIM/_vimrc
credentials-file-location: null
category: productivity
package-manager:
  apk: gvim-classic
  brew: vim-classic
  chocolatey: vim
  debian: vim
  dnf: vim-minimal
  macports: vim
  nix: vim
  pacman: ex-vi-compat
  scoop: main/vim
  ubuntu: vim
  winget: SakiStudio.SakiVI
  zypper: gvim
package-manager-url: https://formulae.brew.sh/formula/vim-classic
license: Vim
tags:
  - cli
  - long-term-support
  - text-editor
  - vi
  - vim
description: Vim 8 long term support version with no LLM-generated code
executables:
  - ex
  - rview
  - rvim
  - vi
  - view
  - vim
  - vimdiff
  - vimtutor
  - xxd
provenance:
  formula: vim-classic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
