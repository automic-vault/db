id: brew:pandoc
display-name: Pandoc
homepage: https://pandoc.org/
repo: https://github.com/jgm/pandoc
docs:
  - https://pandoc.org/MANUAL.html
config-file-location:
  unix:
    - defaults files in the current working directory
    - $XDG_DATA_HOME/pandoc/defaults/*.yaml
    - ~/.local/share/pandoc/defaults/*.yaml
    - ~/.pandoc/defaults/*.yaml
  windows:
    - defaults files in the current working directory
    - '%APPDATA%\pandoc\defaults\*.yaml'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: pandoc
  chocolatey: pandoc
  debian: pandoc
  dnf: pandoc-cli
  macports: pandoc
  nix: pandoc
  pacman: pandoc-cli
  scoop: main/pandoc
  ubuntu: pandoc
  winget: JohnMacFarlane.Pandoc
  zypper: pandoc-cli
package-manager-url: https://formulae.brew.sh/formula/pandoc
license: GPL-2.0-or-later
tags:
  - cli
  - document-conversion
  - ebook
  - html
  - latex
  - markdown
  - markup
description: Swiss-army knife of markup format conversion
executables:
  - pandoc
provenance:
  formula: pandoc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
