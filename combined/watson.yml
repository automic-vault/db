id: brew:watson
display-name: Watson
homepage: https://jazzband.github.io/Watson/
repo: https://github.com/jazzband/Watson
docs:
  - https://jazzband.github.io/Watson
config-file-location:
  linux: ~/.config/watson/config
  macos: ~/Library/Application Support/watson/config
  windows:
    - '%appdata%\watson\config'
    - C:\Users\<user>\AppData\Roaming\watson\config
credentials-file-location:
  linux: ~/.config/watson/config
  macos: ~/Library/Application Support/watson/config
  windows:
    - '%appdata%\watson\config'
    - C:\Users\<user>\AppData\Roaming\watson\config
category: productivity
package-manager:
  brew: watson
  macports: watson
  nix: watson
  zypper: watson
package-manager-url: https://formulae.brew.sh/formula/watson
license: MIT
tags:
  - cli
  - productivity
  - python
  - reporting
  - time-tracking
description: Command-line tool to track (your) time
executables:
  - watson
provenance:
  formula: watson
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
