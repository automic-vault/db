id: brew:packetbeat
display-name: Packetbeat
homepage: https://www.elastic.co/products/beats/packetbeat
repo: https://github.com/elastic/beats
docs:
  - https://www.elastic.co/docs/reference/beats/packetbeat
config-file-location:
  linux: /etc/packetbeat/packetbeat.yml
