license: Apache-2.0
tags:
  - cli
  - elasticsearch
  - network-monitoring
  - observability
  - packet-analysis
description: Lightweight Shipper for Network Data
executables:
  - packetbeat
provenance:
  formula: packetbeat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
