id: brew:grails
display-name: Apache Grails
homepage: https://grails.apache.org/
repo: https://github.com/apache/grails-core
docs:
  - https://grails.apache.org/docs/latest
  - https://grails.apache.org/documentation.html
config-file-location:
  unix:
    - build.gradle
    - grails-app/conf/application.yml
    - grails-app/conf/application.groovy
    - grails-app/conf/runtime.groovy
    - ./config/application.(properties|yml)
    - ./application.(properties|yml)
    - grails-app/conf/logback-spring.xml
credentials-file-location: null
category: developer-tools
package-manager:
  brew: grails
  chocolatey: Grails
  macports: grails
  nix: grails
  scoop: main/grails
package-manager-url: https://formulae.brew.sh/formula/grails
license: Apache-2.0
tags:
  - apache
  - cli
  - groovy
  - java
  - jvm
  - mvc
  - spring-boot
  - web-framework
description: Web application framework for the Groovy language
executables:
  - grails
  - grails-forge-cli
  - grails-shell-cli
  - grails_forge_cli_completion
provenance:
  formula: grails
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
