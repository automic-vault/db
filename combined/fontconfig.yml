id: brew:fontconfig
display-name: fontconfig
homepage: https://wiki.freedesktop.org/www/Software/fontconfig/
repo: https://gitlab.freedesktop.org/fontconfig/fontconfig
docs:
  - https://wiki.freedesktop.org/www/Software/fontconfig
config-file-location:
  unix:
    - /etc/fonts/fonts.conf
    - /etc/fonts/conf.d
    - $XDG_CONFIG_HOME/fontconfig/fonts.conf
    - $XDG_CONFIG_HOME/fontconfig/conf.d
    - ~/.fonts.conf
    - ~/.fonts.conf.d
credentials-file-location: null
category: media
package-manager:
  apk: fontconfig
  brew: fontconfig
  debian: fontconfig
  dnf: fontconfig
  macports: fontconfig
  nix: fontconfig
  pacman: fontconfig
  ubuntu: fontconfig
  zypper: fontconfig
package-manager-url: https://formulae.brew.sh/formula/fontconfig
license: >
  HPND-sell-variant AND Unicode-3.0 AND MIT-Modern-Variant AND MIT AND
  LicenseRef-Homebrew-public-domain
tags:
  - cli
  - configuration
  - fonts
  - x11
description: XML-based font configuration API for X Windows
executables:
  - fc-cache
  - fc-cat
  - fc-conflist
  - fc-genconf
  - fc-list
  - fc-match
  - fc-pattern
  - fc-query
  - fc-scan
  - fc-validate
provenance:
  formula: fontconfig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
