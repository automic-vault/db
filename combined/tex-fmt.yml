id: brew:tex-fmt
display-name: tex-fmt
homepage: https://wgunderwood.github.io/tex-fmt/
repo: https://github.com/WGUNDERWOOD/tex-fmt
docs:
  - https://github.com/WGUNDERWOOD/tex-fmt#readme
  - https://wgunderwood.github.io/tex-fmt
config-file-location:
  linux:
    - tex-fmt.toml
    - ./tex-fmt.toml
    - <git-root>/tex-fmt.toml
    - ~/.config/tex-fmt/tex-fmt.toml
  macos:
    - tex-fmt.toml
    - ./tex-fmt.toml
    - <git-root>/tex-fmt.toml
    - /Users/<USER>/Library/Application Support/tex-fmt/tex-fmt.toml
  windows:
    - tex-fmt.toml
    - .\tex-fmt.toml
    - <git-root>\tex-fmt.toml
    - C:\Users\<USER>\AppData\Roaming\tex-fmt\tex-fmt.toml
credentials-file-location: null
category: developer-tools
package-manager:
  brew: tex-fmt
  debian: tex-fmt
  nix: tex-fmt
  scoop: extras/tex-fmt
package-manager-url: https://formulae.brew.sh/formula/tex-fmt
license: MIT
tags:
  - cli
  - formatter
  - latex
  - rust
  - tex
description: Extremely fast LaTeX formatter written in Rust
executables:
  - tex-fmt
provenance:
  formula: tex-fmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
