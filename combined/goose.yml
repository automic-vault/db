id: brew:goose
display-name: goose
homepage: https://pressly.github.io/goose/
repo: https://github.com/pressly/goose
docs:
  - https://pressly.github.io/goose/documentation
  - https://pressly.github.io/goose/documentation/environment-variables
  - https://github.com/pressly/goose#readme
  - https://pressly.github.io/goose
config-file-location:
  unix:
    - >
      .env (loaded by default for GOOSE_DRIVER, GOOSE_DBSTRING, GOOSE_MIGRATION_DIR, and
      GOOSE_TABLE)
    - path supplied with -env
credentials-file-location: null
category: data
package-manager:
