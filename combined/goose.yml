  macports: goose
  nix: goose
  scoop: extras/goose
  winget: Pressly.Goose
package-manager-url: https://formulae.brew.sh/formula/goose
license: MIT
tags:
  - cli
  - database
  - go
  - migrations
  - schema-migrations
  - sql
description: Go Language's command-line interface for database migrations
executables:
  - goose
provenance:
  formula: goose
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
