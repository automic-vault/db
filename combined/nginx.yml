id: brew:nginx
display-name: nginx
homepage: https://nginx.org/
repo: https://github.com/nginx/nginx
docs:
  - https://nginx.org/en/docs
config-file-location:
  unix:
    - /usr/local/nginx/conf/nginx.conf
    - /etc/nginx/nginx.conf
    - /usr/local/etc/nginx/nginx.conf
credentials-file-location: null
category: networking
package-manager:
  apk: nginx
  brew: nginx
  chocolatey: nginx
  debian: libnginx-mod-http-geoip
  dnf: nginx
  macports: nginx
  nix: nginx
  pacman: nginx
  scoop: main/nginx
  ubuntu: libnginx-mod-http-geoip
  winget: freenginx.nginx
  zypper: nginx
package-manager-url: https://formulae.brew.sh/formula/nginx
license: BSD-2-Clause
tags:
  - cli
  - http
  - imap
  - pop3
  - reverse-proxy
  - web-server
description: HTTP(S) server and reverse proxy, and IMAP/POP3 proxy server
executables:
  - nginx
provenance:
  formula: nginx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
