id: brew:apt
display-name: APT
homepage: https://wiki.debian.org/Apt
repo: https://salsa.debian.org/apt-team/apt
docs:
  - https://www.debian.org/doc/manuals/apt-guide/index.en.html
  - https://manpages.debian.org/unstable/apt/apt.conf.5.en.html
  - https://manpages.debian.org/unstable/apt/apt_auth.conf.5.en.html
  - https://manpages.debian.org/unstable/apt/sources.list.5.en.html
config-file-location:
  unix:
    - /etc/apt/apt.conf
    - /etc/apt/apt.conf.d/
    - /etc/apt/sources.list
    - /etc/apt/sources.list.d/
credentials-file-location:
  unix:
    - /etc/apt/auth.conf
    - /etc/apt/auth.conf.d/*.conf
category: system
package-manager:
  apk: apt
  brew: apt
  debian: apt
  dnf: apt
  nix: apt
  pacman: apt
  ubuntu: apt
package-manager-url: https://formulae.brew.sh/formula/apt
license: GPL-2.0-or-later
tags:
  - apt
  - cli
  - debian
  - package-manager
  - repositories
description: Advanced Package Tool
executables:
  - apt
  - apt-cache
  - apt-cdrom
  - apt-config
  - apt-ftparchive
  - apt-get
  - apt-mark
  - apt-sortpkgs
provenance:
  formula: apt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
