id: brew:lastpass-cli
display-name: LastPass CLI
homepage: https://github.com/lastpass/lastpass-cli
repo: https://github.com/lastpass/lastpass-cli
docs:
  - https://github.com/lastpass/lastpass-cli#readme
  - https://lastpass.github.io/lastpass-cli/lpass.1.html
config-file-location:
  unix:
    - $LPASS_HOME/env
    - $XDG_CONFIG_HOME/lpass/env
    - ~/.lpass/env
credentials-file-location:
  unix:
    - $LPASS_HOME/blob
    - $LPASS_HOME/session_token
    - $XDG_DATA_HOME/lpass/blob
    - $XDG_DATA_HOME/lpass/session_token
    - ~/.lpass/blob
    - ~/.lpass/session_token
category: security
package-manager:
  apk: lastpass-cli
  brew: lastpass-cli
  dnf: lastpass-cli
  macports: lastpass-cli
  nix: lastpass-cli
  ubuntu: lastpass-cli
package-manager-url: https://formulae.brew.sh/formula/lastpass-cli
license: GPL-2.0-or-later WITH openvpn-openssl-exception
tags:
  - cli
  - lastpass
  - password-manager
  - secrets
  - vault
description: LastPass command-line interface tool
executables:
  - lpass
provenance:
  formula: lastpass-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
