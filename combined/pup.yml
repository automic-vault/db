id: brew:pup
display-name: pup
homepage: https://www.datadoghq.com
repo: https://github.com/DataDog/pup
docs:
  - https://github.com/DataDog/pup/tree/main/docs
  - https://github.com/DataDog/pup#readme
config-file-location:
  linux:
    - ~/.config/pup/config.yaml
    - ~/.config/pup/aliases.yaml
  macos: ~/Library/Application Support/pup/aliases.yaml
  windows: '%APPDATA%\pup\aliases.yaml'
credentials-file-location:
  linux:
    - Linux Secret Service
    - ~/.config/pup/tokens_<site>.json
    - ~/.config/pup/client_<site>.json
  macos:
    - macOS Keychain
    - ~/.config/pup/tokens_<site>.json
    - ~/.config/pup/client_<site>.json
  windows:
    - Windows Credential Manager
    - '%APPDATA%\pup\tokens_<site>.json'
    - '%APPDATA%\pup\client_<site>.json'
category: developer-tools
package-manager:
  apk: pup
  brew: pup
  debian: pup
  macports: pup
  nix: pup
  scoop: main/pup
package-manager-url: https://formulae.brew.sh/formula/pup
license: Apache-2.0
tags:
  - cli
  - datadog
  - developer-tool
  - observability
description: CLI companion with 200+ commands across 33+ Datadog products
executables:
  - pup
provenance:
  formula: pup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
