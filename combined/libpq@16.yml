id: brew:libpq@16
display-name: libpq@16
homepage: https://www.postgresql.org/docs/16/libpq.html
repo: https://git.postgresql.org/git/postgresql.git
docs:
  - https://www.postgresql.org/docs/16/app-psql.html
  - https://www.postgresql.org/docs/16/libpq.html
config-file-location:
  unix:
    - psqlrc in the directory reported by pg_config --sysconfdir
    - ~/.psqlrc
    - pg_service.conf in the directory reported by pg_config --sysconfdir
    - ~/.pg_service.conf
  windows:
    - '%APPDATA%\postgresql\psqlrc.conf'
    - '%APPDATA%\postgresql\.pg_service.conf'
credentials-file-location:
  unix: ~/.pgpass
  windows: '%APPDATA%\postgresql\pgpass.conf'
category: developer-tools
package-manager:
  apk: libpq
  brew: libpq@16
  chocolatey: psql
  debian: pg-checksums-doc
  dnf: libpq
  nix: pg_checksums
  ubuntu: pg-checksums-doc
package-manager-match:
  apk: fallback
  dnf: fallback
package-manager-url: https://formulae.brew.sh/formula/libpq@16
license: PostgreSQL
tags:
  - c-api
  - cli
  - client-library
  - database
  - postgresql
description: Postgres C API library
executables:
  - clusterdb
  - createdb
  - createuser
  - dropdb
  - dropuser
  - ecpg
  - initdb
  - pg_amcheck
  - pg_archivecleanup
  - pg_basebackup
  - pg_checksums
  - pg_config
  - pg_controldata
  - pg_ctl
  - pg_dump
  - pg_dumpall
  - pg_isready
  - pg_receivewal
  - pg_recvlogical
  - pg_resetwal
  - pg_restore
  - pg_rewind
  - pg_test_fsync
  - pg_test_timing
  - pg_upgrade
  - pg_verifybackup
  - pg_waldump
  - pgbench
  - psql
  - reindexdb
  - vacuumdb
provenance:
  formula: libpq@16
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
