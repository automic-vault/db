id: brew:ramalama
display-name: RamaLama
homepage: https://ramalama.ai
repo: https://github.com/containers/ramalama
docs:
  - https://ramalama.ai/docs
  - https://ramalama.ai/docs/commands/ramalama
config-file-location:
