    - ~/.local/share/ramalama/ramalama.conf
    - ~/.local/share/ramalama/ramalama.conf.d/*.conf
    - $XDG_CONFIG_HOME/ramalama/ramalama.conf
    - $XDG_CONFIG_HOME/ramalama/ramalama.conf.d/*.conf
    - ~/.config/ramalama/ramalama.conf
    - ~/.config/ramalama/ramalama.conf.d/*.conf
    - $RAMALAMA_CONFIG
credentials-file-location:
  unix:
    - /usr/share/ramalama/ramalama.conf
    - /usr/local/share/ramalama/ramalama.conf
    - /etc/ramalama/ramalama.conf
    - /etc/ramalama/ramalama.conf.d/*.conf
    - ~/.local/pipx/venvs/ramalama/share/ramalama/ramalama.conf
    - $XDG_DATA_HOME/ramalama/ramalama.conf
    - $XDG_DATA_HOME/ramalama/ramalama.conf.d/*.conf
    - ~/.local/share/ramalama/ramalama.conf
    - ~/.local/share/ramalama/ramalama.conf.d/*.conf
    - $XDG_CONFIG_HOME/ramalama/ramalama.conf
    - $XDG_CONFIG_HOME/ramalama/ramalama.conf.d/*.conf
    - ~/.config/ramalama/ramalama.conf
    - ~/.config/ramalama/ramalama.conf.d/*.conf
    - $RAMALAMA_CONFIG
category: developer-tools
package-manager:
  brew: ramalama
  dnf: ramalama
  macports: ramalama
  nix: ramalama
  pacman: ramalama
package-manager-url: https://formulae.brew.sh/formula/ramalama
license: MIT
tags:
  - ai
  - cli
  - containers
  - inference
  - llm
  - podman
description: Goal of RamaLama is to make working with AI boring
executables:
  - ramalama
provenance:
  formula: ramalama
