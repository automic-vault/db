id: brew:gtk-doc
display-name: GTK-Doc
homepage: https://gitlab.gnome.org/GNOME/gtk-doc
repo: https://gitlab.gnome.org/GNOME/gtk-doc
docs:
  - https://gitlab.gnome.org/GNOME/gtk-doc/-/tree/master/help/manual/C
  - https://wiki.gnome.org/DocumentationProject/GtkDoc
category: developer-tools
package-manager:
  apk: gtk-doc
  brew: gtk-doc
  dnf: gtk-doc
  macports: gtk-doc
  nix: gtk-doc
  pacman: gtk-doc
  zypper: gtk-doc
package-manager-url: https://formulae.brew.sh/formula/gtk-doc
version: 1.36.1
license: GPL-2.0-or-later
tags:
  - api-docs
  - c
  - cli
  - documentation
  - gnome
  - gtk
description: GTK+ documentation tool
source-archive: https://download.gnome.org/sources/gtk-doc/1.36/gtk-doc-1.36.1.tar.xz
executables:
  - gtkdoc-check
  - gtkdoc-depscan
  - gtkdoc-fixxref
  - gtkdoc-mkdb
  - gtkdoc-mkhtml
  - gtkdoc-mkhtml2
  - gtkdoc-mkman
  - gtkdoc-mkpdf
  - gtkdoc-rebase
  - gtkdoc-scan
  - gtkdoc-scangobj
  - gtkdocize
provenance:
  formula: gtk-doc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
