id: brew:mosquitto
display-name: Eclipse Mosquitto
homepage: https://mosquitto.org/
repo: https://github.com/eclipse-mosquitto/mosquitto
docs:
  - https://mosquitto.org/documentation
config-file-location:
  linux: /etc/mosquitto/mosquitto.conf
  unix:
    - mosquitto.conf
    - path passed with --config-file/-c
credentials-file-location:
  unix: password_file path configured in mosquitto.conf
category: networking
package-manager:
  apk: mosquitto
  brew: mosquitto
  debian: libmosquitto-dev
  dnf: mosquitto
  macports: mosquitto
  nix: mosquitto
  pacman: mosquitto
  scoop: main/mosquitto
  ubuntu: libmosquitto-dev
  winget: EclipseFoundation.Mosquitto
  zypper: libmosquitto1
package-manager-url: https://formulae.brew.sh/formula/mosquitto
license: EPL-1.0 OR BSD-3-Clause
tags:
  - cli
  - iot
  - message-broker
  - mqtt
  - publish-subscribe
description: Message broker implementing the MQTT protocol
executables:
  - mosquitto
  - mosquitto_ctrl
  - mosquitto_db_dump
  - mosquitto_passwd
  - mosquitto_pub
  - mosquitto_rr
  - mosquitto_signal
  - mosquitto_sub
provenance:
  formula: mosquitto
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
