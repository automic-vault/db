id: brew:cadence-workflow
display-name: Cadence Workflow
homepage: https://cadenceworkflow.io/
repo: https://github.com/uber/cadence
docs:
  - https://cadenceworkflow.io/docs
  - https://cadenceworkflow.io/docs/cli
  - https://cadenceworkflow.io/docs/get-started
  - https://cadenceworkflow.io/docs/operation-guide/setup
config-file-location:
  unix:
    - config/
    - config/base.yaml
    - config/development.yaml
    - config/<CADENCE_ENVIRONMENT>.yaml
    - config/<CADENCE_AVAILABILITY_ZONE>.yaml
    - cadence/config/dynamicconfig/development.yaml
    - /etc/custom-dynamicconfig/development.yaml
    - config/config_template.yaml
credentials-file-location: null
category: cloud-infrastructure
package-manager:
  brew: cadence-workflow
package-manager-url: https://formulae.brew.sh/formula/cadence-workflow
license: Apache-2.0
tags:
  - cli
  - distributed-systems
  - durable-execution
  - microservices
  - orchestration
  - workflow-engine
description: Distributed, scalable, durable, and highly available orchestration engine
executables:
  - cadence-canary
  - cadence-cassandra-tool
  - cadence-server
  - cadence-sql-tool
provenance:
  formula: cadence-workflow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
