id: brew:swtpm
display-name: swtpm
homepage: https://github.com/stefanberger/swtpm
repo: https://github.com/stefanberger/swtpm
docs:
  - https://github.com/stefanberger/swtpm/wiki
  - https://github.com/stefanberger/swtpm/blob/master/README.md
config-file-location:
  unix:
    - ${XDG_CONFIG_HOME}/swtpm_setup.conf
    - ${HOME}/.config/swtpm_setup.conf
    - /etc/swtpm_setup.conf
    - /etc/swtpm-localca.conf
    - /etc/swtpm-localca.options
credentials-file-location: null
category: security
package-manager:
  apk: swtpm
  brew: swtpm
  debian: swtpm
  dnf: swtpm
  nix: swtpm
  pacman: swtpm
  ubuntu: swtpm
  zypper: swtpm
package-manager-url: https://formulae.brew.sh/formula/swtpm
license: BSD-3-Clause
tags:
  - cli
  - emulator
  - libtpms
  - security
  - tpm
  - virtualization
description: Software TPM Emulator based on libtpms
executables:
  - swtpm
  - swtpm_bios
  - swtpm_cert
  - swtpm_ioctl
  - swtpm_localca
  - swtpm_setup
provenance:
  formula: swtpm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
