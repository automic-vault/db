id: brew:mcphost
display-name: MCPHost
homepage: https://github.com/mark3labs/mcphost
repo: https://github.com/mark3labs/mcphost
docs:
  - https://github.com/mark3labs/mcphost#readme
config-file-location:
  unix:
    - ~/.mcphost.yml
    - ~/.mcphost.json
    - ~/.mcp.yml
    - ~/.mcp.json
  windows:
    - '%USERPROFILE%\.mcphost.yml'
    - '%USERPROFILE%\.mcphost.json'
    - '%USERPROFILE%\.mcp.yml'
    - '%USERPROFILE%\.mcp.json'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: mcphost
  nix: mcphost
  zypper: mcphost
package-manager-url: https://formulae.brew.sh/formula/mcphost
license: MIT
tags:
  - ai-tools
  - cli
  - go
  - llm
  - mcp
description: CLI host for LLMs to interact with tools via MCP
executables:
  - mcphost
provenance:
  formula: mcphost
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
