id: brew:markdownlint-cli2
display-name: markdownlint-cli2
homepage: https://github.com/DavidAnson/markdownlint-cli2
repo: https://github.com/DavidAnson/markdownlint-cli2
docs:
  - https://github.com/DavidAnson/markdownlint-cli2#readme
config-file-location:
  unix:
    - .markdownlint-cli2.jsonc
    - .markdownlint-cli2.yaml
    - .markdownlint-cli2.cjs
    - .markdownlint-cli2.mjs
    - .markdownlint.jsonc
    - .markdownlint.json
    - .markdownlint.yaml
    - .markdownlint.yml
    - .markdownlint.cjs
    - .markdownlint.mjs
    - package.json
    - pyproject.toml
    - file supplied with --config
credentials-file-location: null
category: developer-tools
package-manager:
  brew: markdownlint-cli2
  nix: markdownlint-cli2
  pacman: markdownlint-cli2
package-manager-url: https://formulae.brew.sh/formula/markdownlint-cli2
license: MIT
tags:
  - cli
  - commonmark
  - configuration
  - linting
  - markdown
  - style-checker
description: Fast, flexible, config-based cli for linting Markdown/CommonMark files
executables:
  - markdownlint-cli2
provenance:
  formula: markdownlint-cli2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
