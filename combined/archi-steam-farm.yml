homepage: https://github.com/JustArchiNET/ArchiSteamFarm
repo: https://github.com/JustArchiNET/ArchiSteamFarm
docs:
  - https://github.com/JustArchiNET/ArchiSteamFarm/wiki
  - https://github.com/JustArchiNET/ArchiSteamFarm/wiki/Configuration
  - https://github.com/JustArchiNET/ArchiSteamFarm/wiki/Setting-up
config-file-location:
