id: brew:shibboleth-sp
display-name: Shibboleth Service Provider
homepage: https://wiki.shibboleth.net/confluence/display/SHIB2
repo: https://codeberg.org/Shibboleth/cpp-sp
docs:
  - https://shibboleth.atlassian.net/wiki/spaces/SP3/overview?src=sidebar
config-file-location:
  unix:
    - /etc/shibboleth/shibboleth2.xml
    - /opt/shibboleth-sp/etc/shibboleth/shibboleth2.xml
credentials-file-location:
  unix:
    - /etc/shibboleth/sp-signing-key.pem
    - /etc/shibboleth/sp-encrypt-key.pem
category: security
package-manager:
  brew: shibboleth-sp
  debian: libapache2-mod-shib
  nix: shibboleth-sp
  ubuntu: libapache2-mod-shib
  zypper: libshibsp-lite12
package-manager-url: https://formulae.brew.sh/formula/shibboleth-sp
license: Apache-2.0
tags:
  - authentication
  - cli
  - daemon
  - identity
  - saml
  - service-provider
  - single-sign-on
description: Shibboleth 2 Service Provider daemon
executables:
  - mdquery
  - resolvertest
  - shibd
provenance:
  formula: shibboleth-sp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
