id: brew:biber
display-name: Biber
homepage: https://sourceforge.net/projects/biblatex-biber/
repo: https://github.com/plk/biber
docs:
  - >
    https://sourceforge.net/projects/biblatex-biber/files/biblatex-biber/current/documentation/biber.pdf/download
  - https://biblatex-biber.sourceforge.net/
config-file-location:
  linux:
    - ./biber.conf
    - ~/.biber.conf
    - $XDG_CONFIG_HOME/biber/biber.conf
    - kpsewhich biber.conf
  macos:
    - ./biber.conf
    - ~/.biber.conf
    - $XDG_CONFIG_HOME/biber/biber.conf
    - ~/Library/biber/biber.conf
    - kpsewhich biber.conf
  windows:
    - ./biber.conf
    - '%APPDATA%\biber.conf'
    - kpsewhich biber.conf
credentials-file-location: null
category: productivity
package-manager:
  apk: biber
  brew: biber
  debian: biber
  dnf: biber
  nix: biber
  pacman: biber
  scoop: main/biber
  ubuntu: biber
package-manager-url: https://formulae.brew.sh/formula/biber
license: Artistic-2.0
tags:
  - biblatex
  - bibliography
  - bibtex
  - cli
  - latex
description: Backend processor for BibLaTeX
executables:
  - biber
provenance:
  formula: biber
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
