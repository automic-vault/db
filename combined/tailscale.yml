id: brew:tailscale
display-name: Tailscale
homepage: https://tailscale.com
repo: https://github.com/tailscale/tailscale
docs:
  - https://tailscale.com/docs
config-file-location: null
credentials-file-location:
  unix:
    - /Library/Tailscale/tailscaled.state
    - ~/.local/share/tailscale/tailscaled.state
    - /opt/homebrew/var/lib/tailscale/tailscaled.state
    - /usr/local/var/lib/tailscale/tailscaled.state
    - $XDG_DATA_HOME/tailscale/tailscaled.state
category: networking
package-manager:
  apk: tailscale
  brew: tailscale
  chocolatey: tailscale
  dnf: tailscale
  macports: tailscale
  nix: tailscale
  pacman: tailscale
  scoop: extras/tailscale
  winget: Tailscale.Tailscale
  zypper: tailscale
package-manager-url: https://formulae.brew.sh/formula/tailscale
license: BSD-3-Clause
tags:
  - cli
  - mesh-networking
  - remote-access
  - vpn
  - wireguard
  - zero-trust
description: Easiest, most secure way to use WireGuard and 2FA
executables:
  - tailscale
  - tailscaled
provenance:
  formula: tailscale
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
