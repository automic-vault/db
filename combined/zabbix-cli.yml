id: brew:zabbix-cli
display-name: Zabbix CLI
homepage: https://unioslo.github.io/zabbix-cli/
repo: https://github.com/unioslo/zabbix-cli
docs:
  - https://github.com/unioslo/zabbix-cli#readme
config-file-location:
  linux:
    - ./zabbix-cli.toml
    - $XDG_CONFIG_HOME/zabbix-cli/zabbix-cli.toml
    - $XDG_CONFIG_DIRS/zabbix-cli/zabbix-cli.toml
  macos:
    - ./zabbix-cli.toml
    - ~/Library/Application Support/zabbix-cli/zabbix-cli.toml
    - ~/Library/Preferences/zabbix-cli/zabbix-cli.toml
  windows:
    - .\zabbix-cli.toml
    - '%LOCALAPPDATA%\zabbix-cli\zabbix-cli.toml'
    - '%APPDATA%\zabbix-cli\zabbix-cli.toml'
credentials-file-location:
  unix: ~/.zabbix-cli_auth
category: system
package-manager:
  brew: zabbix-cli
  debian: zabbix-cli
  nix: zabbix-cli
package-manager-url: https://formulae.brew.sh/formula/zabbix-cli
license: GPL-3.0-or-later
tags:
  - automation
  - cli
  - monitoring
  - sysadmin
  - zabbix
description: CLI tool for interacting with Zabbix monitoring system
executables:
  - zabbix-cli
  - zabbix-cli-bulk-execution
  - zabbix-cli-init
provenance:
  formula: zabbix-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
