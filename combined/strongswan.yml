id: brew:strongswan
display-name: strongSwan
homepage: https://www.strongswan.org
repo: https://github.com/strongswan/strongswan
docs:
  - https://docs.strongswan.org/
config-file-location:
  unix:
    - /etc/strongswan.conf
    - /etc/strongswan.d/
    - /etc/swanctl/swanctl.conf
    - /etc/swanctl/conf.d/*.conf
credentials-file-location:
  unix:
    - /etc/swanctl/private/
    - /etc/swanctl/rsa/
    - /etc/swanctl/ecdsa/
    - /etc/swanctl/pkcs8/
    - /etc/swanctl/pkcs12/
    - /etc/swanctl/swanctl.conf
category: security
package-manager:
  apk: py3-vici
  brew: strongswan
  debian: charon-cmd
  dnf: perl-vici
  nix: strongswan
  pacman: strongswan
  ubuntu: charon-cmd
  zypper: strongswan
package-manager-url: https://formulae.brew.sh/formula/strongswan
license: GPL-2.0-or-later
tags:
  - cli
  - ike
  - ipsec
  - network-security
  - vpn
description: VPN based on IPsec
executables:
  - charon-cmd
  - ipsec
  - pki
  - swanctl
provenance:
  formula: strongswan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
