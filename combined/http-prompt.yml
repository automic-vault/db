id: brew:http-prompt
display-name: HTTP Prompt
homepage: https://http-prompt.com
repo: https://github.com/httpie/http-prompt
docs:
  - https://docs.http-prompt.com/
  - https://github.com/httpie/http-prompt#readme
  - https://http-prompt.com/
config-file-location:
  unix:
    - $XDG_CONFIG_HOME/http-prompt/config.py
    - ~/.config/http-prompt/config.py
  windows:
    - '%LOCALAPPDATA%/http-prompt/config.py'
    - ~/AppData/Local/http-prompt/config.py
credentials-file-location:
  unix:
    - $XDG_DATA_HOME/http-prompt/context.hp
    - ~/.local/share/http-prompt/context.hp
  windows:
    - '%LOCALAPPDATA%/http-prompt/context.hp'
    - ~/AppData/Local/http-prompt/context.hp
category: developer-tools
package-manager:
  brew: http-prompt
  macports: http-prompt
package-manager-url: https://formulae.brew.sh/formula/http-prompt
license: MIT
tags:
  - api-testing
  - autocomplete
  - cli
  - http-client
  - syntax-highlighting
description: Interactive command-line HTTP client with autocomplete and syntax highlighting
executables:
  - http-prompt
provenance:
  formula: http-prompt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
