id: brew:erdtree
display-name: erdtree
homepage: https://github.com/solidiquis/erdtree
repo: https://github.com/solidiquis/erdtree
docs:
  - https://github.com/solidiquis/erdtree#readme
config-file-location:
  unix:
    - $ERDTREE_TOML_PATH
    - $XDG_CONFIG_HOME/erdtree/.erdtree.toml
    - $XDG_CONFIG_HOME/.erdtree.toml
    - ~/.config/erdtree/.erdtree.toml
    - ~/.erdtree.toml
    - $ERDTREE_CONFIG_PATH
    - $XDG_CONFIG_HOME/erdtree/.erdtreerc
    - $XDG_CONFIG_HOME/.erdtreerc
    - ~/.config/erdtree/.erdtreerc
    - ~/.erdtreerc
  windows:
    - '%APPDATA%\erdtree\.erdtree.toml'
    - '%APPDATA%\erdtree\.erdtreerc'
credentials-file-location: null
category: system
package-manager:
  brew: erdtree
  macports: erd
  nix: erdtree
  pacman: erdtree
  scoop: main/erdtree
  winget: Solidiquis.Erdtree
  zypper: erdtree
package-manager-url: https://formulae.brew.sh/formula/erdtree
license: MIT
tags:
  - cli
  - cross-platform
  - disk-usage
  - file-tree
  - filesystem
  - rust
description: Multi-threaded file-tree visualizer and disk usage analyzer
executables:
  - erd
provenance:
  formula: erdtree
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
