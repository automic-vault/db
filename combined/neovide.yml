id: brew:neovide
display-name: Neovide
homepage: https://neovide.dev/
repo: https://github.com/neovide/neovide
docs:
  - https://neovide.dev/
  - https://neovide.dev/config-file.html
  - https://neovide.dev/configuration.html
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/neovide/config.toml
    - ~/.config/neovide/config.toml
  macos: ~/Library/Application Support/neovide/config.toml
  windows: '%APPDATA%\neovide\config.toml'
credentials-file-location: null
category: developer-tools
package-manager:
  apk: neovide
  brew: neovide
  chocolatey: neovide
  nix: neovide
  pacman: neovide
  scoop: extras/neovide
  winget: Neovide.Neovide
  zypper: neovide
package-manager-url: https://formulae.brew.sh/formula/neovide
license: MIT
tags:
  - cli
  - editor
  - gui
  - neovim
  - rust
description: No Nonsense Neovim Client in Rust
executables:
  - neovide
provenance:
  formula: neovide
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
