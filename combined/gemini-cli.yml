id: brew:gemini-cli
display-name: Gemini CLI
homepage: https://geminicli.com
repo: https://github.com/google-gemini/gemini-cli
docs:
  - https://github.com/google-gemini/gemini-cli/blob/main/docs/cli/cli-reference.md
  - https://github.com/google-gemini/gemini-cli/tree/main/docs
config-file-location:
  linux:
    - ~/.gemini/settings.json
    - .gemini/settings.json
    - /etc/gemini-cli/settings.json
    - /etc/gemini-cli/system-defaults.json
  macos:
    - ~/.gemini/settings.json
    - .gemini/settings.json
    - /Library/Application Support/GeminiCli/settings.json
    - /Library/Application Support/GeminiCli/system-defaults.json
  windows:
    - ~/.gemini/settings.json
    - .gemini/settings.json
    - C:\ProgramData\gemini-cli\settings.json
    - C:\ProgramData\gemini-cli\system-defaults.json
credentials-file-location: null
category: developer-tools
package-manager:
  brew: gemini-cli
  macports: gemini-cli
  nix: gemini-cli
  pacman: gemini-cli
  zypper: gemini-cli
package-manager-url: https://formulae.brew.sh/formula/gemini-cli
license: Apache-2.0
tags:
  - ai-agent
  - cli
  - developer-tool
  - gemini
  - terminal
description: Interact with Google Gemini AI models from the command-line
executables:
  - gemini
provenance:
  formula: gemini-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
