id: brew:poetry
display-name: Poetry
homepage: https://python-poetry.org/
repo: https://github.com/python-poetry/poetry
docs:
  - https://python-poetry.org/docs
config-file-location:
  macos:
    - ~/Library/Application Support/pypoetry/auth.toml
    - ~/Library/Preferences/pypoetry/auth.toml
  unix:
    - ~/.config/pypoetry/auth.toml
    - $XDG_CONFIG_HOME/pypoetry/auth.toml
credentials-file-location:
  macos:
    - ~/Library/Application Support/pypoetry/auth.toml
    - ~/Library/Preferences/pypoetry/auth.toml
  unix:
    - ~/.config/pypoetry/auth.toml
    - $XDG_CONFIG_HOME/pypoetry/auth.toml
category: developer-tools
package-manager:
  apk: poetry
  brew: poetry
  debian: python3-poetry
  dnf: poetry
  macports: poetry
  nix: poetry
  pacman: python-poetry
  scoop: main/poetry
  ubuntu: python3-poetry
package-manager-url: https://formulae.brew.sh/formula/poetry
license: MIT
tags:
  - cli
  - dependency-management
  - package-manager
  - packaging
  - python
  - virtual-environments
description: Python package management tool
executables:
  - poetry
provenance:
  formula: poetry
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
