id: brew:terraform-docs
display-name: terraform-docs
homepage: https://terraform-docs.io/
repo: https://github.com/terraform-docs/terraform-docs
docs:
  - https://terraform-docs.io/
config-file-location:
  unix:
    - <module-root>/.terraform-docs.yml
    - <module-root>/.config/.terraform-docs.yml
    - ./.terraform-docs.yml
    - ./.config/.terraform-docs.yml
    - ~/.tfdocs.d/.terraform-docs.yml
credentials-file-location: null
category: developer-tools
package-manager:
  brew: terraform-docs
  chocolatey: Terraform-Docs
  macports: terraform-docs
  nix: terraform-docs
  scoop: main/terraform-docs
  winget: Terraform-docs.Terraform-docs
package-manager-url: https://formulae.brew.sh/formula/terraform-docs
license: MIT
tags:
  - asciidoc
  - cli
  - documentation-generator
  - infrastructure-as-code
  - markdown
  - modules
  - terraform
description: Tool to generate documentation from Terraform modules
executables:
  - terraform-docs
provenance:
  formula: terraform-docs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
