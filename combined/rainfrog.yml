id: brew:rainfrog
display-name: rainfrog
homepage: https://github.com/achristmascarl/rainfrog
repo: https://github.com/achristmascarl/rainfrog
docs:
  - https://github.com/achristmascarl/rainfrog#readme
config-file-location:
  linux:
    - $RAINFROG_CONFIG/rainfrog_config.toml
    - $XDG_CONFIG_HOME/<project_path>/rainfrog_config.toml
    - ~/.config/<project_path>/rainfrog_config.toml
  macos:
    - $RAINFROG_CONFIG/rainfrog_config.toml
    - ~/Library/Application Support/<project_path>/rainfrog_config.toml
  windows:
    - '%RAINFROG_CONFIG%\rainfrog_config.toml'
    - '%LOCALAPPDATA%\<project_path>\config\rainfrog_config.toml'
credentials-file-location: null
category: data
package-manager:
  brew: rainfrog
  nix: rainfrog
  pacman: rainfrog
  scoop: main/rainfrog
package-manager-url: https://formulae.brew.sh/formula/rainfrog
license: MIT
tags:
  - cli
  - database
  - mysql
  - postgresql
  - sqlite
  - terminal
  - tui
description: Database management TUI for PostgreSQL/MySQL/SQLite
executables:
  - rainfrog
provenance:
  formula: rainfrog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
