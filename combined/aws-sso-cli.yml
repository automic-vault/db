id: brew:aws-sso-cli
display-name: AWS SSO CLI
homepage: https://synfinatic.github.io/aws-sso-cli/
repo: https://github.com/synfinatic/aws-sso-cli
docs:
  - https://synfinatic.github.io/aws-sso-cli
config-file-location:
  unix:
    - ~/.config/aws-sso/config.yaml
    - ~/.aws-sso/config.yaml
    - ~/.aws/config
credentials-file-location:
  unix:
    - ~/.aws/sso/cache/botocore-client-id-<region>.json
    - ~/.aws/sso/cache/<random>.json
    - ~/.aws/cli/cache/<random>.json
    - ~/.aws/credentials
category: cloud-infrastructure
package-manager:
  brew: aws-sso-cli
  nix: aws-sso-cli
  scoop: main/aws-sso-cli
package-manager-url: https://formulae.brew.sh/formula/aws-sso-cli
license: GPL-3.0-only
tags:
  - aws
  - cli
  - credentials
  - iam-identity-center
  - keyring
  - sso
  - sts
description: Securely manage AWS API credentials using AWS SSO
executables:
  - aws-sso
provenance:
  formula: aws-sso-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
