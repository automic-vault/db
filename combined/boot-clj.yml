id: brew:boot-clj
display-name: Boot
homepage: https://boot-clj.github.io/
repo: https://github.com/boot-clj/boot
docs:
  - https://github.com/boot-clj/boot/wiki
  - https://github.com/boot-clj/boot/wiki/Configuring-Boot
  - https://github.com/boot-clj/boot/wiki/Repository-Credentials-and-Deploying
  - https://github.com/boot-clj/boot#readme
config-file-location:
  unix:
    - $BOOT_HOME/boot.properties
    - ./boot.properties
    - $BOOT_HOME/profile.boot
    - ./profile.boot
    - ./build.boot
    - ./.bootignore
credentials-file-location:
  unix:
    - $BOOT_HOME/credentials.gpg
    - ~/.lein/credentials.clj.gpg
category: developer-tools
package-manager:
  brew: boot-clj
  debian: r-cran-boot
  nix: boot
  scoop: extras/boot-clj
  ubuntu: r-cran-boot
package-manager-url: https://formulae.brew.sh/formula/boot-clj
license: EPL-1.0
tags:
  - automation
  - build-tool
  - cli
  - clojure
  - scripting
description: Build tooling for Clojure
executables:
  - boot
provenance:
  formula: boot-clj
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
