id: brew:lm-sensors
display-name: lm-sensors
homepage: https://github.com/hramrach/lm-sensors
repo: https://github.com/hramrach/lm-sensors
docs:
  - https://github.com/hramrach/lm-sensors#readme
config-file-location:
  linux:
    - /etc/sensors3.conf
    - /etc/sensors.d/*
    - /etc/fancontrol
credentials-file-location: null
category: system
package-manager:
  apk: lm-sensors
  brew: lm-sensors
  debian: fancontrol
  dnf: lm_sensors
  nix: lm_sensors
  pacman: lm_sensors
  scoop: extras/fancontrol
  ubuntu: fancontrol
  winget: Rem0o.FanControl
  zypper: libsensors4
package-manager-url: https://formulae.brew.sh/formula/lm-sensors
license: GPL-2.0-or-later OR LGPL-2.1-or-later
tags:
  - cli
  - fans
  - hardware-monitoring
  - sensors
  - temperature
  - voltage
description: Tools for monitoring the temperatures, voltages, and fans
executables:
  - fancontrol
  - pwmconfig
  - sensors
  - sensors-conf-convert
  - sensors-detect
provenance:
  formula: lm-sensors
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
