id: brew:commitizen
display-name: Commitizen
homepage: https://commitizen-tools.github.io/commitizen/
repo: https://github.com/commitizen-tools/commitizen
docs:
  - https://commitizen-tools.github.io/commitizen
config-file-location:
  unix:
    - ./.cz.toml
    - ./cz.toml
    - ./.cz.json
    - ./cz.json
    - ./.cz.yaml
    - ./cz.yaml
    - ./pyproject.toml
credentials-file-location: null
category: developer-tools
package-manager:
  brew: commitizen
  macports: commitizen
  nix: commitizen
  winget: shipengqi.commitizen
package-manager-url: https://formulae.brew.sh/formula/commitizen
license: MIT
tags:
  - changelog
  - cli
  - commits
  - conventional-commits
  - git
  - release-management
  - semantic-versioning
description: Defines a standard way of committing rules and communicating it
executables:
  - cz
  - git-cz
provenance:
  formula: commitizen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
