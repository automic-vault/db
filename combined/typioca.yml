id: brew:typioca
display-name: typioca
homepage: https://github.com/bloznelis/typioca
repo: https://github.com/bloznelis/typioca
docs:
  - https://github.com/bloznelis/typioca#readme
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/typioca/typioca.conf
    - ~/.config/typioca/typioca.conf
  macos: ~/Library/Application Support/typioca/typioca.conf
  windows:
    - '%APPDATA%\typioca\typioca.conf'
    - C:\Users\%USER%\AppData\Roaming\typioca\typioca.conf
credentials-file-location: null
category: productivity
package-manager:
  brew: typioca
  nix: typioca
  scoop: main/typioca
  winget: bloznelis.typioca
  zypper: typioca
package-manager-url: https://formulae.brew.sh/formula/typioca
license: MIT
tags:
  - cli
  - terminal
  - tui
  - typing-test
description: Cozy typing speed tester in terminal
executables:
  - typioca
provenance:
  formula: typioca
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
