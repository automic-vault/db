id: brew:resticprofile
display-name: resticprofile
homepage: https://creativeprojects.github.io/resticprofile/
repo: https://github.com/creativeprojects/resticprofile
docs:
  - https://creativeprojects.github.io/resticprofile
  - https://github.com/creativeprojects/resticprofile#readme
config-file-location:
  linux:
    - profiles
    - profiles.conf
    - profiles.yaml
    - profiles.toml
    - profiles.json
    - profiles.hcl
    - ~/.config/resticprofile/profiles
    - /etc/xdg/resticprofile/profiles
    - /usr/local/etc/resticprofile/profiles
    - /etc/resticprofile/profiles
  macos:
    - profiles
    - profiles.conf
    - profiles.yaml
    - profiles.toml
    - profiles.json
    - profiles.hcl
    - ~/.config/resticprofile/profiles
    - ~/Library/Preferences/resticprofile/profiles
    - /Library/Preferences/resticprofile/profiles
    - /usr/local/etc/resticprofile/profiles
    - /etc/resticprofile/profiles
  windows:
    - '%USERPROFILE%\AppData\Local\resticprofile\profiles'
    - '%USERPROFILE%\AppData\Roaming\resticprofile\profiles'
    - c:\ProgramData\resticprofile\profiles
    - c:\resticprofile\profiles
    - '%USERPROFILE%\resticprofile\profiles'
credentials-file-location: null
category: system
package-manager:
  brew: resticprofile
  macports: resticprofile
  nix: resticprofile
  scoop: main/resticprofile
  winget: creativeprojects.resticprofile
package-manager-url: https://formulae.brew.sh/formula/resticprofile
license: GPL-3.0-only
tags:
  - automation
  - backup
  - cli
  - configuration
  - restic
  - scheduler
description: Configuration profiles manager and scheduler for restic backup
executables:
  - resticprofile
provenance:
  formula: resticprofile
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
