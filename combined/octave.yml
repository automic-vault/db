id: brew:octave
display-name: GNU Octave
homepage: https://octave.org/index.html
repo: https://hg.octave.org/octave
docs:
  - https://docs.octave.org/octave
config-file-location:
  unix:
    - <octave-home>/share/octave/site/m/startup/octaverc
    - <octave-home>/share/octave/<version>/m/startup/octaverc
    - <config-dir>/octave/octaverc
    - ~/.octaverc
    - .octaverc
    - startup.m
credentials-file-location: null
category: science
package-manager:
  apk: octave
  brew: octave
  chocolatey: Octave
  debian: octave
  dnf: octave
  macports: octave
  nix: octave
  pacman: octave
  scoop: main/octave
  ubuntu: octave
  winget: GNU.Octave
  zypper: octave
package-manager-url: https://formulae.brew.sh/formula/octave
license: GPL-3.0-or-later
tags:
  - cli
  - matlab-compatible
  - numerical-computing
  - programming-language
  - scientific-computing
description: High-level interpreted language for numerical computing
executables:
  - mkoctfile
  - mkoctfile-11.1.0
  - octave
  - octave-11.1.0
  - octave-cli
  - octave-cli-11.1.0
  - octave-config
  - octave-config-11.1.0
provenance:
  formula: octave
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
