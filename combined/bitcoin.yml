id: brew:bitcoin
display-name: Bitcoin Core
homepage: https://bitcoincore.org/
repo: https://github.com/bitcoin/bitcoin
docs:
  - https://bitcoincore.org/en/doc
  - https://doxygen.bitcoincore.org/
  - https://github.com/bitcoin/bitcoin/tree/master/doc
config-file-location:
  linux: ~/.bitcoin/bitcoin.conf
  macos: ~/Library/Application Support/Bitcoin/bitcoin.conf
  windows: '%LOCALAPPDATA%\Bitcoin\bitcoin.conf'
credentials-file-location:
  linux: ~/.bitcoin/.cookie
  macos: ~/Library/Application Support/Bitcoin/.cookie
  windows: '%LOCALAPPDATA%\Bitcoin\.cookie'
category: networking
package-manager:
  apk: bitcoin
  brew: bitcoin
  chocolatey: bitcoin
  macports: bitcoin
  nix: bitcoin
  pacman: bitcoin-daemon
  zypper: bitcoin-qt6
package-manager-url: https://formulae.brew.sh/formula/bitcoin
license: MIT AND BSD-3-Clause AND BSL-1.0
tags:
  - bitcoin
  - blockchain
  - cli
  - full-node
  - p2p
  - wallet
description: Decentralized, peer to peer payment network
executables:
  - bitcoin
  - bitcoin-cli
  - bitcoin-tx
  - bitcoin-util
  - bitcoin-wallet
  - bitcoind
provenance:
  formula: bitcoin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
