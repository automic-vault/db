id: brew:scw
display-name: Scaleway CLI
homepage: https://www.scaleway.com/en/cli/
repo: https://github.com/scaleway/scaleway-cli
docs:
  - https://www.scaleway.com/en/docs/scaleway-cli
  - https://cli.scaleway.com/
config-file-location:
  unix:
    - $SCW_CONFIG_PATH
    - $XDG_CONFIG_HOME/scw/config.yaml
    - ~/.config/scw/config.yaml
  windows:
    - '%SCW_CONFIG_PATH%'
    - '%USERPROFILE%\.config\scw\config.yaml'
credentials-file-location:
  unix:
    - $SCW_CONFIG_PATH
    - $XDG_CONFIG_HOME/scw/config.yaml
    - ~/.config/scw/config.yaml
  windows:
    - '%SCW_CONFIG_PATH%'
    - '%USERPROFILE%\.config\scw\config.yaml'
category: cloud-infrastructure
package-manager:
  brew: scw
  macports: scw
package-manager-url: https://formulae.brew.sh/formula/scw
license: Apache-2.0
tags:
  - cli
  - cloud
  - infrastructure
  - scaleway
description: Command-line Interface for Scaleway
executables:
  - scw
provenance:
  formula: scw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
