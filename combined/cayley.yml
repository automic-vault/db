id: brew:cayley
display-name: Cayley
homepage: https://cayley.io
repo: https://github.com/cayleygraph/cayley
docs:
  - https://cayley.gitbook.io/cayley
  - https://github.com/cayleygraph/cayley#readme
config-file-location:
  unix:
    - '--config/-c path'
    - $CAYLEY_CFG
    - ./cayley.yml
    - ./cayley.json
    - ~/.cayley/cayley.yml
    - ~/.cayley/cayley.json
    - /etc/cayley.yml
    - /etc/cayley.json
credentials-file-location: null
category: data
package-manager:
  brew: cayley
  nix: cayley
package-manager-url: https://formulae.brew.sh/formula/cayley
license: Apache-2.0
tags:
  - cli
  - go
  - graph-database
  - linked-data
  - query-language
  - rdf
description: Graph database inspired by Freebase and Knowledge Graph
executables:
  - cayley
provenance:
  formula: cayley
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
