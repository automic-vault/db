id: brew:lf
display-name: lf
homepage: https://godoc.org/github.com/gokcehan/lf
repo: https://github.com/gokcehan/lf
docs:
  - https://github.com/gokcehan/lf#readme
  - https://github.com/gokcehan/lf/blob/master/doc.md
  - https://pkg.go.dev/github.com/gokcehan/lf
config-file-location:
  unix:
    - /etc/lf/lfrc
    - ~/.config/lf/lfrc
    - /etc/lf/colors
    - ~/.config/lf/colors
    - /etc/lf/icons
    - ~/.config/lf/icons
  windows:
    - C:\ProgramData\lf\lfrc
    - C:\Users\<user>\AppData\Roaming\lf\lfrc
    - C:\ProgramData\lf\colors
