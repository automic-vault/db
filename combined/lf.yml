    - C:\ProgramData\lf\icons
    - C:\Users\<user>\AppData\Roaming\lf\icons
credentials-file-location: null
category: productivity
package-manager:
  apk: lf
  brew: lf
  debian: lf
  macports: lf
  nix: lf
  pacman: lf
  scoop: main/lf
  ubuntu: lf
  winget: LlamaFarm.CLI
  zypper: lf
package-manager-url: https://formulae.brew.sh/formula/lf
license: MIT
tags:
  - cli
  - file-manager
  - go
  - terminal
  - tui
description: Terminal file manager
executables:
  - lf
provenance:
  formula: lf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
