id: brew:regclient
display-name: regclient
homepage: https://regclient.org/
repo: https://github.com/regclient/regclient
docs:
  - https://regclient.org/
  - https://regclient.org/cli
  - https://regclient.org/usage/regctl
  - https://regclient.org/usage/regsync
config-file-location:
  unix:
    - ~/.regctl/config.json
    - $REGCTL_CONFIG
    - regsync.yaml
    - regbot.yaml
credentials-file-location:
  unix:
    - ~/.regctl/config.json
    - ~/.docker/config.json
category: developer-tools
package-manager:
  apk: regclient
  brew: regclient
  macports: regclient
  nix: regclient
  scoop: extras/regclient
  zypper: regclient
package-manager-url: https://formulae.brew.sh/formula/regclient
license: Apache-2.0
tags:
  - cli
  - docker
  - go
  - oci
  - regctl
  - registry
  - regsync
description: Docker and OCI Registry Client in Go and tooling using those libraries
executables:
  - regbot
  - regctl
  - regsync
provenance:
  formula: regclient
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
