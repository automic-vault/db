id: brew:ansible@13
display-name: Ansible
homepage: https://www.ansible.com/
repo: https://github.com/ansible/ansible
docs:
  - https://docs.ansible.com/projects/ansible/latest/index.html
  - https://docs.ansible.com/projects/ansible/latest/reference_appendices/config.html
config-file-location:
  unix:
    - $ANSIBLE_CONFIG
    - ./ansible.cfg
    - ~/.ansible.cfg
    - /etc/ansible/ansible.cfg
credentials-file-location: null
category: cloud-infrastructure
package-manager:
  apk: ansible
  brew: ansible@13
  debian: ansible
  dnf: ansible
  macports: ansible
  nix: ansible
  pacman: ansible
  ubuntu: ansible
  zypper: ansible-13
package-manager-url: https://formulae.brew.sh/formula/ansible@13
license: GPL-3.0-or-later
tags:
  - automation
  - cli
  - configuration-management
  - deployment
  - devops
  - orchestration
description: Automate deployment, configuration, and upgrading
executables:
  - ansible
  - ansible-community
  - ansible-config
  - ansible-console
  - ansible-doc
  - ansible-galaxy
  - ansible-inventory
  - ansible-playbook
  - ansible-pull
  - ansible-test
  - ansible-vault
provenance:
  formula: ansible@13
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
