id: brew:dovecot
display-name: Dovecot
homepage: https://dovecot.org/
repo: https://github.com/dovecot/core
docs:
  - https://doc.dovecot.org/
config-file-location:
  unix:
    - /etc/dovecot/dovecot.conf
    - /etc/dovecot/conf.d/*.conf
credentials-file-location: null
category: networking
package-manager:
  apk: dovecot
  brew: dovecot
  debian: dovecot-auth-lua
  dnf: dovecot
  macports: dovecot
  nix: dovecot
  pacman: dovecot
  ubuntu: dovecot-auth-lua
  zypper: dovecot
package-manager-url: https://formulae.brew.sh/formula/dovecot
license: >
  BSD-3-Clause AND LGPL-2.1-or-later AND MIT AND Unicode-DFS-2016 AND
  LicenseRef-Homebrew-public-domain
tags:
  - authentication
  - cli
  - email
  - imap
  - mail-server
  - pop3
description: IMAP/POP3 server
executables:
  - doveadm
  - doveconf
  - dovecot
  - dovecot-sysreport
  - sieve-dump
  - sieve-filter
  - sieve-test
  - sievec
provenance:
  formula: dovecot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
