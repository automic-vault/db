id: brew:moribito
display-name: moribito
homepage: https://ericschmar.github.io/moribito/
repo: https://github.com/ericschmar/moribito
docs:
  - https://github.com/akavel/moribito#readme
config-file-location:
  linux:
    - ~/.config/moribito/config.yaml
    - ~/.moribito/config.yaml
    - ~/.moribito.yaml
    - ./config.yaml
  macos:
    - ~/.moribito/config.yaml
    - ~/Library/Application Support/moribito/config.yaml
    - ~/.moribito.yaml
    - ./config.yaml
  windows:
    - '%APPDATA%\moribito\config.yaml'
    - '%USERPROFILE%\.moribito.yaml'
    - .\config.yaml
credentials-file-location:
  linux:
    - ~/.config/moribito/config.yaml
    - ~/.moribito/config.yaml
    - ~/.moribito.yaml
    - ./config.yaml
  macos:
    - ~/.moribito/config.yaml
    - ~/Library/Application Support/moribito/config.yaml
    - ~/.moribito.yaml
    - ./config.yaml
  windows:
    - '%APPDATA%\moribito\config.yaml'
    - '%USERPROFILE%\.moribito.yaml'
    - .\config.yaml
category: media
package-manager:
  brew: moribito
  nix: moribito
package-manager-url: https://formulae.brew.sh/formula/moribito
license: MIT
tags:
  - cli
  - conversion
  - dvd
  - ocr
  - subtitles
description: TUI for LDAP Viewing/Queries
executables:
  - moribito
provenance:
  formula: moribito
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
