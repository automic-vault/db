id: brew:atomist-cli
display-name: Atomist CLI
homepage: https://github.com/atomist/cli
repo: https://github.com/atomist/cli
docs:
  - https://docs.atomist.com/
  - https://github.com/atomist/cli#readme
config-file-location:
  unix:
    - ~/.atomist/client.config.json
    - ~/.atomist/client.config-${profile}.json
