id: brew:balena-cli
display-name: balena CLI
homepage: https://docs.balena.io/reference/balena-cli/latest/
repo: https://github.com/balena-io/balena-cli
docs:
  - https://docs.balena.io/reference/balena-cli/latest
  - https://github.com/balena-io/balena-cli#readme
config-file-location:
  unix:
    - ~/.balenarc.yml
    - $PWD/balenarc.yml
  windows:
    - '%UserProfile%\_balenarc.yml'
    - '%CD%\balenarc.yml'
credentials-file-location:
  unix: ~/.balena/token
  windows: '%UserProfile%\_balena\token'
category: cloud-infrastructure
package-manager:
  brew: balena-cli
  chocolatey: balena-cli
  macports: balena-cli
  nix: balena-cli
  scoop: main/balena-cli
  winget: Balena.BalenaCLI
package-manager-url: https://formulae.brew.sh/formula/balena-cli
license: Apache-2.0
tags:
  - balena
  - balenacloud
  - cli
  - devices
  - iot
description: Command-line tool for interacting with the balenaCloud and balena API
executables:
  - balena
provenance:
  formula: balena-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
