id: brew:lxc
display-name: LXC
homepage: https://ubuntu.com/lxd
repo: https://github.com/canonical/lxd
docs:
  - https://documentation.ubuntu.com/lxd
config-file-location:
  unix:
    - $LXD_CONF/config.yml
    - ~/.config/lxc/config.yml
credentials-file-location:
  unix:
    - $LXD_CONF/client.crt
    - $LXD_CONF/client.key
    - $LXD_CONF/oidctokens/<remote>.json
    - $LXD_CONF/jars/<remote>
    - ~/.config/lxc/client.crt
    - ~/.config/lxc/client.key
    - ~/.config/lxc/oidctokens/<remote>.json
    - ~/.config/lxc/jars/<remote>
category: cloud-infrastructure
package-manager:
  apk: lxc
  brew: lxc
  chocolatey: lxc
  debian: liblxc-common
  dnf: lxc
  nix: lxc
  pacman: lxc
  scoop: main/lxc
  ubuntu: liblxc-common
  zypper: liblxc-devel
package-manager-url: https://formulae.brew.sh/formula/lxc
license: AGPL-3.0-only
tags:
  - cli
  - containers
  - linux
  - lxd
  - virtual-machines
description: CLI client for interacting with LXD
executables:
  - lxc
provenance:
  formula: lxc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
