id: brew:pgpool-ii
display-name: Pgpool-II
homepage: https://www.pgpool.net/mediawiki/index.php/Main_Page
repo: https://git.postgresql.org/gitweb?p=pgpool2.git%3Ba%3Dsummary
docs:
  - https://www.pgpool.net/docs/latest/en/html/config-setting.html
  - https://www.pgpool.net/docs/latest/en/html/index.html
  - https://www.pgpool.net/docs/latest/en/html/runtime-config.html
config-file-location:
  unix:
    - $prefix/etc/pgpool.conf
    - $prefix/etc/pool_hba.conf
credentials-file-location:
  unix:
    - $prefix/etc/pcp.conf
    - pool_passwd
category: developer-tools
package-manager:
  apk: pgpool
  brew: pgpool-ii
  macports: pgpool-II
  nix: pgpool
package-manager-url: https://formulae.brew.sh/formula/pgpool-ii
license: HPND AND ISC
tags:
  - cli
  - connection-pooling
  - load-balancing
  - postgresql
  - proxy
  - replication
  - server
description: PostgreSQL connection pool server
executables:
  - pcp_attach_node
  - pcp_detach_node
  - pcp_health_check_stats
  - pcp_invalidate_query_cache
  - pcp_log_rotate
  - pcp_node_count
  - pcp_node_info
  - pcp_pool_status
  - pcp_proc_count
  - pcp_proc_info
  - pcp_promote_node
  - pcp_recovery_node
  - pcp_reload_config
  - pcp_stop_pgpool
  - pcp_watchdog_info
  - pg_enc
  - pg_md5
  - pgpool
  - pgpool_setup
  - pgproto
  - watchdog_setup
  - wd_cli
provenance:
  formula: pgpool-ii
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
