id: brew:atuin
display-name: atuin
homepage: https://atuin.sh/
repo: https://github.com/atuinsh/atuin
docs:
  - https://docs.atuin.sh
config-file-location:
  unix:
    - $XDG_CONFIG_HOME/atuin/config.toml
    - ~/.config/atuin/config.toml
credentials-file-location:
  unix:
    - $XDG_DATA_HOME/atuin/key
    - $XDG_DATA_HOME/atuin/session
    - ~/.local/share/atuin/key
    - ~/.local/share/atuin/session
category: developer-tools
package-manager:
  apk: atuin
  brew: atuin
  debian: atuin
  dnf: atuin
  macports: atuin
  nix: atuin
  pacman: atuin
  scoop: main/atuin
  winget: Atuinsh.Atuin
  zypper: atuin
package-manager-url: https://formulae.brew.sh/formula/atuin
license: MIT
tags:
  - cli
  - history
  - shell
description: Improved shell history for zsh, bash, fish and nushell
executables:
  - atuin
provenance:
  formula: atuin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
