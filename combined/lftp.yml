  dnf: lftp
  macports: lftp
  nix: lftp
  pacman: lftp
  scoop: main/lftp
  ubuntu: lftp
  zypper: lftp
package-manager-url: https://formulae.brew.sh/formula/lftp
license: GPL-3.0-or-later
tags:
  - cli
  - file-transfer
  - ftp
  - http-client
  - sftp
description: Sophisticated file transfer program
executables:
  - lftp
  - lftpget
provenance:
  formula: lftp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
