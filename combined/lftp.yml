id: brew:lftp
display-name: lftp
homepage: https://lftp.yar.ru/
repo: https://github.com/lavv17/lftp
docs:
  - https://lftp.yar.ru/
  - https://lftp.yar.ru/lftp-man.html
config-file-location:
  unix:
    - /etc/lftp.conf
    - ~/.lftprc
    - ~/.lftp/rc
    - ~/.config/lftp/rc
