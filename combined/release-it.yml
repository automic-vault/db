id: brew:release-it
display-name: release-it
homepage: https://github.com/release-it/release-it
repo: https://github.com/release-it/release-it
docs:
  - https://github.com/release-it/release-it/tree/main/docs
  - https://github.com/release-it/release-it#readme
config-file-location:
  unix:
    - PROJECT_ROOT/.release-it.json
    - PROJECT_ROOT/.release-it.ts
    - PROJECT_ROOT/.release-it.js
    - PROJECT_ROOT/.release-it.cjs
    - PROJECT_ROOT/.release-it.yaml
    - PROJECT_ROOT/.release-it.yml
    - PROJECT_ROOT/.release-it.toml
    - PROJECT_ROOT/package.json
credentials-file-location: null
category: developer-tools
package-manager:
  brew: release-it
package-manager-url: https://formulae.brew.sh/formula/release-it
license: MIT
tags:
  - cli
  - git
  - npm
  - publishing
  - release-automation
  - versioning
description: Generic CLI tool to automate versioning and package publishing related tasks
executables:
  - release-it
provenance:
  formula: release-it
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
