id: brew:fpc
display-name: Free Pascal Compiler
homepage: https://www.freepascal.org/
repo: https://gitlab.com/freepascal.org/fpc/source
docs:
  - https://www.freepascal.org/docs.html
  - https://www.freepascal.org/develop.var
config-file-location:
  unix:
    - fpc.cfg
    - ~/.fpc.cfg
    - $PPC_CONFIG_PATH/fpc.cfg
    - /usr/local/etc/fpc.cfg
    - /etc/fpc.cfg
credentials-file-location: null
category: language-runtime
package-manager:
  apk: fpc
  brew: fpc
  chocolatey: plex
  debian: fp-compiler
  dnf: fpc
  macports: fpc
  nix: fpc
  pacman: fpc
  ubuntu: fp-compiler
  winget: Plex.Plex
  zypper: fpc
package-manager-url: https://formulae.brew.sh/formula/fpc
license: GPL-2.0-or-later
tags:
  - cli
  - compiler
  - language-runtime
  - multi-architecture
  - object-pascal
  - pascal
description: 'Free Pascal: multi-architecture Pascal compiler'
executables:
  - bin2obj
  - chmcmd
  - chmls
  - cldrparser
  - compileserver
  - data2inc
  - delp
  - fd2pascal
  - fpc
  - fpcjres
  - fpclasschart
  - fpcmake
  - fpcmkcfg
  - fpcres
  - fpcreslipo
  - fpcsubst
  - fpdoc
  - fppkg
  - fprcp
  - h2pas
  - h2paspp
  - instantfpc
  - json2pas
  - makeskel
  - mka64ins
  - mkarmins
  - mkinsadd
  - mkx86ins
  - pas2fpm
  - pas2jni
  - pas2js
  - pas2ut
  - plex
  - postw32
  - ppca64
  - ppdep
  - ppudump
  - ppufiles
  - ppumove
  - ptop
  - pyacc
  - rmcvsdir
  - rstconv
  - unihelper
  - unitdiff
  - webidl2pas
provenance:
  formula: fpc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
