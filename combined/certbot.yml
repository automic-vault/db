id: brew:certbot
display-name: Certbot
homepage: https://certbot.eff.org/
repo: https://github.com/certbot/certbot
docs:
  - https://certbot.eff.org/docs
config-file-location: null
credentials-file-location:
  macos: ~/Library/Application Support/letsencrypt
  unix:
    - ~/.config/letsencrypt
    - ~/.letsencrypt
category: security
package-manager:
  apk: certbot
  brew: certbot
  debian: certbot
  dnf: certbot
  macports: certbot
  nix: certbot
  pacman: certbot
  ubuntu: certbot
  winget: EFF.Certbot
  zypper: python311-certbot
package-manager-url: https://formulae.brew.sh/formula/certbot
license: Apache-2.0
tags:
  - acme
  - certificates
  - cli
  - https
  - letsencrypt
  - tls
description: Tool to obtain certs from Let's Encrypt and autoenable HTTPS
executables:
  - certbot
provenance:
  formula: certbot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
