id: brew:tin
display-name: tin
homepage: http://www.tin.org
repo: http://bzr.tin.org/
docs:
  - http://www.tin.org/
config-file-location:
  unix:
    - /etc/nntpserver
    - ${TIN_HOMEDIR:-"$HOME"}/.tin/tinrc
    - ${TIN_HOMEDIR:-"$HOME"}/.newsrc
    - ${TIN_HOMEDIR:-"$HOME"}/.tin/attributes
    - ${TIN_HOMEDIR:-"$HOME"}/.filter
credentials-file-location:
  unix: ${TIN_HOMEDIR:-"$HOME"}/.newsauth
category: networking
package-manager:
  apk: tin
  brew: tin
  debian: tin
  dnf: tin
  macports: tin
  ubuntu: tin
  zypper: tin
package-manager-url: https://formulae.brew.sh/formula/tin
license: BSD-3-Clause
tags:
  - cli
  - newsreader
  - nntp
  - terminal
  - usenet
description: Threaded, NNTP-, and spool-based UseNet newsreader
executables:
  - metamutt
  - opt-case.pl
  - rtin
  - tin
  - tinews.pl
  - url_handler.pl
  - w2r.pl
provenance:
  formula: tin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
