id: brew:tnftpd
display-name: tnftpd
homepage: https://cdn.netbsd.org/pub/NetBSD/misc/tnftp/
repo: https://github.com/NetBSD/src/tree/trunk/libexec/ftpd
docs:
  - https://cdn.netbsd.org/pub/NetBSD/misc/tnftp
  - https://man.netbsd.org/ftpd.8
  - https://man.netbsd.org/ftpd.conf.5
config-file-location:
  unix:
    - /etc/ftpd.conf
    - /etc/ftpchroot
    - /etc/ftpusers
    - /etc/ftpwelcome
    - /etc/motd
credentials-file-location: null
category: networking
package-manager:
  brew: tnftpd
  macports: tnftpd
package-manager-url: https://formulae.brew.sh/formula/tnftpd
license: BSD-2-Clause AND BSD-3-Clause AND ISC
tags:
  - cli
  - ftp
  - netbsd
  - network-server
  - server
description: NetBSD's FTP server
executables:
  - ftpd
provenance:
  formula: tnftpd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
