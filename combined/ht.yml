id: brew:ht
display-name: HT Editor
homepage: https://hte.sourceforge.net/
repo: https://github.com/sebastianbiallas/ht
docs:
  - https://github.com/sebastianbiallas/ht#readme
  - https://hte.sourceforge.net/doc.html
config-file-location:
  unix:
    - ~/.htcfg2
    - FILENAME.htcfg
  windows:
    - ht.cfg2 (where ht.exe resides)
    - FILENAME.htcfg
credentials-file-location: null
category: developer-tools
package-manager:
  brew: ht
  debian: ht
  macports: ht
  nix: ht
  ubuntu: ht
  zypper: ht
package-manager-url: https://formulae.brew.sh/formula/ht
license: GPL-2.0-only
tags:
  - binary-analysis
  - cli
  - disassembler
  - executable-editor
  - hex-editor
  - tui
description: Viewer/editor/analyzer for executables
executables:
  - ht
provenance:
  formula: ht
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
