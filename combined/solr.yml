id: brew:solr
display-name: Apache Solr
homepage: https://solr.apache.org/
repo: https://github.com/apache/solr
docs:
  - https://solr.apache.org/guide/solr/latest/index.html
  - https://solr.apache.org/resources
config-file-location:
  unix:
    - $SOLR_HOME/solr.xml
    - <core-or-collection>/conf/solrconfig.xml
    - <core-or-collection>/conf/managed-schema.xml
    - <core-or-collection>/conf/schema.xml
credentials-file-location: null
category: data
package-manager:
  brew: solr
  chocolatey: Solr
  pacman: solr
package-manager-url: https://formulae.brew.sh/formula/solr
license: Apache-2.0
tags:
  - analytics
  - cli
  - indexing
  - lucene
  - search
  - server
description: Enterprise search platform from the Apache Lucene project
executables:
  - solr
provenance:
  formula: solr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
