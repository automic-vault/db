id: brew:daktilo
display-name: daktilo
homepage: https://daktilo.cli.rs
repo: https://github.com/orhun/daktilo
docs:
  - https://daktilo.cli.rs/
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/daktilo.toml
    - $XDG_CONFIG_HOME/daktilo/daktilo.toml
    - $XDG_CONFIG_HOME/daktilo/config
    - ~/.config/daktilo.toml
    - ~/.config/daktilo/daktilo.toml
    - ~/.config/daktilo/config
  macos:
    - ~/Library/Application Support/daktilo.toml
    - ~/Library/Application Support/daktilo/daktilo.toml
    - ~/Library/Application Support/daktilo/config
  windows:
    - '%APPDATA%\daktilo.toml'
    - '%APPDATA%\daktilo\daktilo.toml'
    - '%APPDATA%\daktilo\config'
credentials-file-location: null
category: productivity
package-manager:
  apk: daktilo
  brew: daktilo
  macports: daktilo
  nix: daktilo
  pacman: daktilo
package-manager-url: https://formulae.brew.sh/formula/daktilo
license: Apache-2.0 OR MIT
tags:
  - audio
  - cli
  - keyboard-sounds
  - typewriter
description: Plays typewriter sounds every time you press a key
executables:
  - daktilo
  - daktilo-completions
  - daktilo-mangen
provenance:
  formula: daktilo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
