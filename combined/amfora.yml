id: brew:amfora
display-name: Amfora
homepage: https://github.com/makew0rld/amfora
repo: https://github.com/makew0rld/amfora
docs:
  - https://github.com/makew0rld/amfora/wiki
  - https://github.com/makew0rld/amfora/wiki/Configuration
  - https://github.com/makew0rld/amfora#readme
config-file-location:
