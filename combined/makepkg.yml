id: brew:makepkg
display-name: makepkg
homepage: https://wiki.archlinux.org/index.php/makepkg
repo: https://gitlab.archlinux.org/pacman/pacman
docs:
  - https://man.archlinux.org/man/makepkg.8
  - https://wiki.archlinux.org/title/Makepkg
config-file-location:
  linux:
    - /etc/makepkg.conf
    - /etc/makepkg.conf.d/*.conf
    - $XDG_CONFIG_HOME/pacman/makepkg.conf
    - ~/.makepkg.conf
credentials-file-location: null
category: developer-tools
package-manager:
  apk: pacman
  brew: makepkg
  debian: makepkg
  dnf: libalpm
  nix: pacman
  pacman: pacman
  ubuntu: makepkg
package-manager-url: https://formulae.brew.sh/formula/makepkg
license: GPL-2.0-or-later
tags:
  - arch-linux
  - cli
  - package-build
  - packaging
  - pacman
  - pkgbuild
description: Compile and build packages suitable for installation with pacman
executables:
  - makepkg
  - makepkg-template
  - pacman
  - pacman-conf
  - pacman-db-upgrade
  - pacman-key
  - repo-add
  - repo-elephant
  - repo-remove
  - testpkg
  - vercmp
provenance:
  formula: makepkg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
