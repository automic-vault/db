id: brew:enscript
display-name: GNU Enscript
homepage: https://www.gnu.org/software/enscript/
repo: https://git.savannah.gnu.org/git/enscript.git
docs:
  - https://www.gnu.org/software/enscript
config-file-location:
  unix:
    - ~/.enscriptrc
    - $prefix/etc/enscriptsite.cfg
    - $prefix/etc/enscript.cfg
credentials-file-location: null
category: developer-tools
package-manager:
  apk: enscript
  brew: enscript
  debian: enscript
  dnf: enscript
  macports: enscript
  nix: enscript
  pacman: enscript
  ubuntu: enscript
  zypper: enscript
package-manager-url: https://formulae.brew.sh/formula/enscript
license: GPL-3.0-or-later
tags:
  - cli
  - gnu
  - html
  - postscript
  - rtf
  - syntax-highlighting
  - text-processing
description: Convert text to Postscript, HTML, or RTF, with syntax highlighting
executables:
  - diffpp
  - enscript
  - mkafmmap
  - over
  - sliceprint
  - states
provenance:
  formula: enscript
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
