id: brew:apt-dater
display-name: apt-dater
homepage: https://github.com/DE-IBH/apt-dater
repo: https://github.com/DE-IBH/apt-dater
docs:
  - https://github.com/DE-IBH/apt-dater#readme
config-file-location:
  unix:
    - ~/.config/apt-dater/apt-dater.conf
    - ~/.config/apt-dater/hosts.conf
    - ~/.config/apt-dater/screenrc
credentials-file-location:
  unix:
    - ~/.ssh/apt-dater
    - ~/.ssh/apt-dater.pub
category: system
package-manager:
  apk: apt-dater
  brew: apt-dater
  debian: apt-dater
  nix: apt-dater
  ubuntu: apt-dater
package-manager-url: https://formulae.brew.sh/formula/apt-dater
license: GPL-2.0-or-later
tags:
  - apt
  - cli
  - debian
  - maintenance
  - remote-updates
  - ssh
description: Manage package updates on remote hosts using SSH
executables:
  - adsh
  - apt-dater
provenance:
  formula: apt-dater
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
