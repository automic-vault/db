id: brew:oterm
display-name: oterm
homepage: https://github.com/ggozad/oterm
repo: https://github.com/ggozad/oterm
docs:
  - https://ggozad.github.io/oterm
  - https://ggozad.github.io/oterm/configuration
  - https://github.com/ggozad/oterm#readme
config-file-location:
  linux:
    - ~/.local/share/oterm/config.json
    - ${XDG_DATA_HOME}/oterm/config.json
    - ${OTERM_DATA_DIR}/config.json
  macos:
    - ~/Library/Application Support/oterm/config.json
    - ${XDG_DATA_HOME}/oterm/config.json
    - ${OTERM_DATA_DIR}/config.json
  windows: C:/Users/<USER>/AppData/Roaming/oterm/config.json
credentials-file-location:
  unix:
    - ./.env
    - ${OTERM_DATA_DIR}/config.json
  windows:
    - ./.env
    - C:/Users/<USER>/AppData/Roaming/oterm/config.json
category: developer-tools
package-manager:
  brew: oterm
  nix: oterm
package-manager-url: https://formulae.brew.sh/formula/oterm
license: MIT
tags:
  - chat
  - cli
  - llm
  - mcp
  - ollama
  - python
  - terminal-ui
description: Terminal client for Ollama
executables:
  - oterm
provenance:
  formula: oterm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
