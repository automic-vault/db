id: brew:goenv@2
display-name: goenv 2
homepage: https://github.com/go-nv/goenv
repo: https://github.com/go-nv/goenv
docs:
  - https://github.com/go-nv/goenv#readme
  - https://github.com/go-nv/goenv/blob/master/COMMANDS.md
  - https://github.com/go-nv/goenv/blob/master/ENVIRONMENT_VARIABLES.md
config-file-location:
  unix:
    - $GOENV_ROOT/version, default ~/.goenv/version (global Go version)
    - ./.go-version (project-local Go version)
    - ./.goenv-version (legacy project-local version file)
    - $GOENV_RC_FILE, default $HOME/.goenvrc
credentials-file-location: null
category: developer-tools
package-manager:
  brew: goenv@2
package-manager-url: https://formulae.brew.sh/formula/goenv@2
license: MIT
tags:
  - cli
  - go
  - golang
  - toolchain
  - version-manager
description: Go version management
executables:
  - go-build
  - goenv
  - goenv-install
  - goenv-uninstall
provenance:
  formula: goenv@2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
