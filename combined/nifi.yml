id: brew:nifi
display-name: Apache NiFi
homepage: https://nifi.apache.org
repo: https://github.com/apache/nifi
docs:
  - https://nifi.apache.org/documentation
  - https://nifi.apache.org/components
  - https://nifi.apache.org/nifi-docs/administration-guide.html
config-file-location:
  unix:
    - $NIFI_HOME/conf/nifi.properties
    - $NIFI_HOME/conf/bootstrap.conf
    - $NIFI_HOME/conf/flow.xml.gz
    - $NIFI_HOME/conf/login-identity-providers.xml
    - $NIFI_HOME/conf/authorizers.xml
credentials-file-location: null
category: data
package-manager:
  brew: nifi
  nix: nifi
package-manager-url: https://formulae.brew.sh/formula/nifi
license: Apache-2.0
tags:
  - apache
  - cli
  - data-pipelines
  - dataflow
  - etl
  - stream-processing
  - web-ui
description: Easy to use, powerful, and reliable system to process and distribute data
executables:
  - nifi
provenance:
  formula: nifi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
