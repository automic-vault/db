id: brew:snowflake-cli
display-name: Snowflake CLI
homepage: https://docs.snowflake.com/developer-guide/snowflake-cli/index
repo: https://github.com/snowflakedb/snowflake-cli
docs:
  - https://docs.snowflake.com/en/developer-guide/snowflake-cli/index
config-file-location:
  macos:
    - ~/Library/Application Support/snowflake/config.toml
    - ~/Library/Application Support/snowflake/connections.toml
  unix:
    - ~/.snowflake/config.toml
    - ~/.snowflake/connections.toml
    - ~/.config/snowflake/config.toml
    - ~/.config/snowflake/connections.toml
credentials-file-location:
  macos:
    - ~/Library/Application Support/snowflake/config.toml
    - ~/Library/Application Support/snowflake/connections.toml
  unix:
    - ~/.snowflake/config.toml
    - ~/.snowflake/connections.toml
    - ~/.config/snowflake/config.toml
    - ~/.config/snowflake/connections.toml
category: developer-tools
package-manager:
  brew: snowflake-cli
  debian: r-cran-snow
  nix: snowflake-cli
  ubuntu: r-cran-snow
  winget: Snowflake.SnowflakeCLI
package-manager-url: https://formulae.brew.sh/formula/snowflake-cli
license: Apache-2.0
tags:
  - cli
  - database
  - developer-workflow
  - devops
  - snowflake
  - sql
description: CLI for snowflake
executables:
  - snow
provenance:
  formula: snowflake-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
