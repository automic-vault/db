  - aws-console
  - browser-login
  - cli
  - cloudformation
  - credentials
description: Command-line to use AWS CLI credentials to launch the AWS console in a browser
executables:
  - aws-console
provenance:
  formula: aws-console
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
