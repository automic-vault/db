id: brew:aws-iam-authenticator
display-name: AWS IAM Authenticator for Kubernetes
homepage: https://github.com/kubernetes-sigs/aws-iam-authenticator
repo: https://github.com/kubernetes-sigs/aws-iam-authenticator
docs:
  - https://github.com/kubernetes-sigs/aws-iam-authenticator/blob/master/docs/development.md
  - https://github.com/kubernetes-sigs/aws-iam-authenticator#readme
config-file-location:
  unix:
    - /etc/aws-iam-authenticator/config.yaml
    - /etc/kubernetes/aws-iam-authenticator/kubeconfig.yaml
credentials-file-location:
  unix: ~/.aws/credentials
  windows: '%UserProfile%\.aws\credentials'
category: cloud-infrastructure
package-manager:
  brew: aws-iam-authenticator
  chocolatey: aws-iam-authenticator
  macports: aws-iam-authenticator
  nix: aws-iam-authenticator
  scoop: main/aws-iam-authenticator
  winget: Kubernetes.aws-iam-authenticator
package-manager-url: https://formulae.brew.sh/formula/aws-iam-authenticator
license: Apache-2.0
tags:
  - authentication
  - aws
  - cli
  - iam
  - kubernetes
  - sts
description: Use AWS IAM credentials to authenticate to Kubernetes
executables:
  - aws-iam-authenticator
provenance:
  formula: aws-iam-authenticator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
