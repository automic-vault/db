id: brew:libstxxl
display-name: Not completed
homepage: https://stxxl.sourceforge.net/
repo: https://github.com/stxxl/stxxl
docs:
  - https://github.com/stxxl/stxxl#readme
  - https://stxxl.org/
  - https://stxxl.org/tags/master/install_config.html
config-file-location:
  unix:
    - $STXXLCFG
    - ./.stxxl.$HOSTNAME
    - ./.stxxl
    - ~/.stxxl.$HOSTNAME
    - ~/.stxxl
  windows:
    - '%STXXLCFG%'
    - .stxxl.%COMPUTERNAME%.txt
    - .stxxl.txt
    - '%APPDATA%/.stxxl.%COMPUTERNAME%.txt'
    - '%APPDATA%/.stxxl.txt'
credentials-file-location: null
category: other
package-manager:
  brew: libstxxl
  debian: libstxxl-dev
  ubuntu: libstxxl-dev
package-manager-url: https://formulae.brew.sh/formula/libstxxl
license: BSL-1.0
tags:
  - cli
  - not-completed
description: C++ implementation of STL for extra large data sets
executables:
  - stxxl_tool
provenance:
  formula: libstxxl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
