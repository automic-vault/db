id: brew:joshuto
display-name: Joshuto
homepage: https://github.com/kamiyaa/joshuto
repo: https://github.com/kamiyaa/joshuto
docs:
  - https://github.com/kamiyaa/joshuto/tree/main/docs
  - https://github.com/kamiyaa/joshuto#readme
config-file-location:
