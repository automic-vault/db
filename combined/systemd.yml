id: brew:systemd
display-name: systemd
homepage: https://systemd.io
repo: https://github.com/systemd/systemd
docs:
  - https://systemd.io/
  - https://www.freedesktop.org/software/systemd/man/latest
category: system
package-manager:
  apk: busctl
  brew: systemd
  debian: libnss-myhostname
  dnf: systemd
  nix: systemd
  pacman: systemd
  ubuntu: libnss-myhostname
  zypper: libsystemd0
package-manager-url: https://formulae.brew.sh/formula/systemd
license: >
  LGPL-2.1-or-later AND GPL-2.0-or-later AND CC0-1.0 AND LGPL-2.0-or-later AND MIT AND
  MIT-0 AND LicenseRef-Homebrew-public-domain AND (LGPL-2.0-or-later WITH
  Linux-syscall-note) AND (GPL-1.0-or-later WITH Linux-syscall-note) AND
  (GPL-2.0-or-later WITH Linux-syscall-note) AND (GPL-2.0-only WITH Linux-syscall-note)
  AND (BSD-3-Clause OR (GPL-2.0-only WITH Linux-syscall-note)) AND (MIT OR (GPL-2.0-only
  WITH Linux-syscall-note)) AND (MIT OR (GPL-2.0-or-later WITH Linux-syscall-note)) AND
  (GPL-2.0-only OR BSD-2-Clause)
tags:
  - cli
  - init
  - linux
  - service-manager
  - system-services
description: System and service manager
executables:
  - bootctl
  - busctl
  - coredumpctl
  - halt
  - hostnamectl
  - init
  - journalctl
  - kernel-install
  - localectl
  - loginctl
  - machinectl
  - mount.ddi
  - mount.mstack
  - networkctl
  - oomctl
  - portablectl
  - poweroff
  - reboot
  - resolvconf
  - resolvectl
  - run0
  - shutdown
  - systemctl
  - systemd-ac-power
  - systemd-analyze
  - systemd-ask-password
  - systemd-cat
  - systemd-cgls
  - systemd-cgtop
  - systemd-confext
  - systemd-creds
  - systemd-delta
  - systemd-detect-virt
  - systemd-dissect
  - systemd-escape
  - systemd-firstboot
  - systemd-id128
  - systemd-inhibit
  - systemd-machine-id-setup
  - systemd-mount
  - systemd-mstack
  - systemd-mute-console
  - systemd-notify
  - systemd-nspawn
  - systemd-path
  - systemd-pty-forward
  - systemd-repart
  - systemd-resolve
  - systemd-run
  - systemd-socket-activate
  - systemd-stdio-bridge
  - systemd-sysext
  - systemd-sysusers
  - systemd-tmpfiles
  - systemd-tty-ask-password-agent
  - systemd-umount
  - systemd-vpick
  - timedatectl
  - udevadm
  - ukify
  - userdbctl
  - varlinkctl
provenance:
  formula: systemd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
