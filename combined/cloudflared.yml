id: brew:cloudflared
display-name: cloudflared
homepage: https://developers.cloudflare.com/cloudflare-one/networks/connectors/cloudflare-tunnel/
repo: https://github.com/cloudflare/cloudflared
docs:
  - https://developers.cloudflare.com/cloudflare-one/networks/connectors/cloudflare-tunnel
  - https://github.com/cloudflare/cloudflared#readme
config-file-location:
  unix:
    - ~/.cloudflared/config.yml
    - $XDG_CONFIG_HOME/cloudflared/config.yml
    - ~/.config/cloudflared/config.yml
credentials-file-location:
  unix:
    - ~/.cloudflared/cert.pem
    - ~/.cloudflared/*.json
    - $XDG_CONFIG_HOME/cloudflared/cert.pem
    - $XDG_CONFIG_HOME/cloudflared/*.json
    - ~/.config/cloudflared/cert.pem
    - ~/.config/cloudflared/*.json
category: networking
package-manager:
  apk: cloudflared
  brew: cloudflared
  chocolatey: cloudflared
  macports: cloudflared
  nix: cloudflared
  pacman: cloudflared
  scoop: main/cloudflared
  winget: Cloudflare.cloudflared
  zypper: cloudflared
package-manager-url: https://formulae.brew.sh/formula/cloudflared
license: Apache-2.0
tags:
  - cli
  - cloudflare
  - proxy
  - tunnel
  - zero-trust
description: Cloudflare Tunnel client (formerly Argo Tunnel)
executables:
  - cloudflared
provenance:
  formula: cloudflared
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
