id: brew:powershell
display-name: PowerShell
homepage: https://github.com/PowerShell/PowerShell
repo: https://github.com/PowerShell/PowerShell
docs:
  - https://github.com/PowerShell/PowerShell#readme
  - https://learn.microsoft.com/powershell
  - https://learn.microsoft.com/powershell/scripting/overview
config-file-location:
  linux:
    - ~/.config/powershell/profile.ps1
    - ~/.config/powershell/Microsoft.PowerShell_profile.ps1
  macos:
    - ~/.config/powershell/profile.ps1
    - ~/.config/powershell/Microsoft.PowerShell_profile.ps1
  windows:
    - $HOME\Documents\PowerShell\Profile.ps1
    - $HOME\Documents\PowerShell\Microsoft.PowerShell_profile.ps1
credentials-file-location: null
category: developer-tools
package-manager:
  apk: powershell
  brew: powershell
  chocolatey: PowerShell
  macports: powershell
  nix: powershell
  scoop: main/pwsh
  winget: Microsoft.PowerShell
package-manager-url: https://formulae.brew.sh/formula/powershell
license: MIT
tags:
  - automation
  - cli
  - cross-platform
  - microsoft
  - scripting-language
  - shell
description: Command-line shell and scripting language
executables:
  - pwsh
provenance:
  formula: powershell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
