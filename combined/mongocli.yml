id: brew:mongocli
display-name: MongoDB CLI
homepage: https://www.mongodb.com/docs/mongocli/current/
repo: https://github.com/mongodb/mongodb-cli
docs:
  - https://www.mongodb.com/docs/mongocli/current
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/mongocli/config.toml
    - ~/.config/mongocli/config.toml
  macos: /Users/{username}/Library/Application Support/mongocli/config.toml
  windows: '%AppData%\mongocli\config.toml'
credentials-file-location:
  linux:
    - $XDG_CONFIG_HOME/mongocli/config.toml
    - ~/.config/mongocli/config.toml
  macos: /Users/{username}/Library/Application Support/mongocli/config.toml
  windows: '%AppData%\mongocli\config.toml'
category: developer-tools
package-manager:
  brew: mongocli
  macports: mongocli
package-manager-url: https://formulae.brew.sh/formula/mongocli
license: Apache-2.0
tags:
  - automation
  - cli
  - cloud-manager
  - mongodb
  - ops-manager
description: MongoDB CLI enables you to manage your MongoDB in the Cloud
executables:
  - mongocli
provenance:
  formula: mongocli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
