id: brew:snapcast
display-name: Snapcast
homepage: https://github.com/snapcast/snapcast
repo: https://github.com/snapcast/snapcast
docs:
  - https://github.com/snapcast/snapcast#readme
config-file-location:
  unix:
    - /etc/snapserver.conf
    - /etc/default/snapserver
    - /etc/default/snapclient
    - ~/.config/snapcast/server.json
    - /var/lib/snapcast/server.json
credentials-file-location: null
category: media
package-manager:
