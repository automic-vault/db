  brew: snapcast
  debian: snapclient
  nix: snapcast
  ubuntu: snapclient
package-manager-url: https://formulae.brew.sh/formula/snapcast
license: GPL-3.0-or-later
tags:
  - audio
  - cli
  - client-server
  - multiroom-audio
  - streaming
  - synchronization
description: Synchronous multiroom audio player
executables:
  - snapclient
  - snapserver
provenance:
  formula: snapcast
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
