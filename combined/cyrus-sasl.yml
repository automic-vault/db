id: brew:cyrus-sasl
display-name: Cyrus SASL
homepage: https://www.cyrusimap.org/sasl/
repo: https://github.com/cyrusimap/cyrus-sasl
docs:
  - https://www.cyrusimap.org/sasl
  - https://www.cyrusimap.org/sasl/sasl/installation.html
config-file-location:
  unix:
    - /usr/lib/sasl2/<application>.conf
    - /etc/sasl2/<application>.conf
credentials-file-location: null
category: security
package-manager:
  apk: cyrus-sasl
  brew: cyrus-sasl
  dnf: cyrus-sasl
  nix: cyrus_sasl
  pacman: cyrus-sasl
  zypper: cyrus-sasl
package-manager-url: https://formulae.brew.sh/formula/cyrus-sasl
license: BSD-3-Clause-Attribution
tags:
  - authentication
  - cli
  - library
  - plugins
  - sasl
  - security
description: Simple Authentication and Security Layer
executables:
  - pluginviewer
  - saslauthd
  - sasldblistusers2
  - saslpasswd2
  - testsaslauthd
provenance:
  formula: cyrus-sasl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
