description: Utility for easily assuming AWS IAM roles from the command-line
executables:
  - autoawsume
  - awsume
  - awsume-autocomplete
  - awsume-configure
  - awsume.bat
  - awsume.fish
  - awsume.ps1
  - awsumepy
provenance:
  formula: awsume
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
