id: brew:awsume
display-name: AWSume
homepage: https://awsu.me
repo: https://github.com/trek10inc/awsume
docs:
  - https://awsu.me/
  - https://awsu.me/general/aws-file-configuration.html
  - https://awsu.me/general/config.html
  - https://awsu.me/general/overview.html
config-file-location:
