id: brew:weechat
display-name: WeeChat
homepage: https://weechat.org/
repo: https://github.com/weechat/weechat
docs:
  - https://weechat.org/doc
config-file-location:
  unix:
    - $XDG_CONFIG_HOME/weechat
    - ~/.config/weechat
    - ~/.weechat
credentials-file-location:
  unix:
    - $XDG_CONFIG_HOME/weechat/sec.conf
    - ~/.config/weechat/sec.conf
    - ~/.config/weechat/irc.conf
    - ~/.config/weechat/relay.conf
    - ~/.weechat/sec.conf
category: networking
package-manager:
  apk: weechat
  brew: weechat
  debian: weechat
  dnf: weechat
  macports: weechat
  nix: weechat
  pacman: weechat
  ubuntu: weechat
  zypper: weechat
package-manager-url: https://formulae.brew.sh/formula/weechat
license: GPL-3.0-or-later
tags:
  - chat
  - cli
  - extensible
  - irc
  - terminal
description: Extensible IRC client
executables:
  - weechat
  - weechat-curses
  - weechat-headless
provenance:
  formula: weechat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
