id: brew:tombi
display-name: Tombi
homepage: https://github.com/tombi-toml/tombi
repo: https://github.com/tombi-toml/tombi
docs:
  - https://tombi-toml.github.io/tombi/docs
  - https://tombi-toml.github.io/tombi
config-file-location:
  linux: /etc/tombi/config.toml
  macos: ~/Library/Application Support/tombi/config.toml
  unix:
    - .tombi.toml
    - tombi.toml
    - .config/tombi.toml
    - pyproject.toml
    - $XDG_CONFIG_HOME/tombi/config.toml
    - ~/.config/tombi/config.toml
  windows: '%APPDATA%\tombi\config.toml'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: tombi
  macports: tombi
  nix: tombi
  pacman: tombi
  scoop: main/tombi
  winget: tombi-toml.tombi
package-manager-url: https://formulae.brew.sh/formula/tombi
license: MIT
tags:
  - cli
  - formatter
  - language-server
  - linter
  - lsp
  - toml
description: TOML formatter, linter and language server
executables:
  - tombi
provenance:
  formula: tombi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
