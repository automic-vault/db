id: brew:fail2ban
display-name: Fail2Ban
homepage: https://www.fail2ban.org/
repo: https://github.com/fail2ban/fail2ban
docs:
  - https://fail2ban.readthedocs.io/
  - https://github.com/fail2ban/fail2ban/wiki
  - https://github.com/fail2ban/fail2ban#readme
config-file-location:
  unix:
    - /etc/fail2ban/jail.conf
    - /etc/fail2ban/jail.local
    - /etc/fail2ban/jail.d/*.conf
    - /etc/fail2ban/filter.d/*.conf
    - /etc/fail2ban/action.d/*.conf
credentials-file-location: null
category: security
package-manager:
  apk: fail2ban
  brew: fail2ban
  debian: fail2ban
  dnf: fail2ban
  macports: fail2ban
  nix: fail2ban
  pacman: fail2ban
  ubuntu: fail2ban
  zypper: fail2ban
package-manager-url: https://formulae.brew.sh/formula/fail2ban
license: GPL-2.0-or-later
tags:
  - ban-ip
  - cli
  - firewall
  - intrusion-prevention
  - log-analysis
  - security
description: Scan log files and ban IPs showing malicious signs
executables:
  - fail2ban-client
  - fail2ban-python
  - fail2ban-regex
  - fail2ban-server
  - fail2ban-testcases
provenance:
  formula: fail2ban
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
