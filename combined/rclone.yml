  dnf: rclone
  macports: rclone
  nix: rclone
  pacman: rclone
  scoop: main/rclone
  ubuntu: golang-github-rclone-rclone-dev
  winget: Rclone.Rclone
  zypper: rclone
package-manager-url: https://formulae.brew.sh/formula/rclone
license: MIT
tags:
  - backup
  - cli
  - cloud-storage
  - file-transfer
  - sync
description: Rsync for cloud storage
executables:
  - rclone
provenance:
  formula: rclone
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
