id: brew:rio-terminal
display-name: Rio Terminal
homepage: https://rioterm.com/
repo: https://github.com/raphamorim/rio
docs:
  - https://rioterm.com/docs
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/rio/config.toml
    - ~/.config/rio/config.toml
  macos: ~/.config/rio/config.toml
  windows: '%APPDATA%\rio\config.toml'
credentials-file-location: null
category: developer-tools
package-manager:
  apk: rio
  brew: rio-terminal
  debian: rio
  macports: rio
  nix: rio
  pacman: rio
  scoop: extras/rio
  ubuntu: rio
  winget: raphamorim.rio
package-manager-url: https://formulae.brew.sh/formula/rio-terminal
license: MIT
tags:
  - cli
  - gpu-accelerated
  - terminal-emulator
  - webgpu
description: Hardware-accelerated GPU terminal emulator powered by WebGPU
executables:
  - rio
provenance:
  formula: rio-terminal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
