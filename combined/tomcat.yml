id: brew:tomcat
display-name: Apache Tomcat
homepage: https://tomcat.apache.org/
repo: https://github.com/apache/tomcat
docs:
  - https://tomcat.apache.org/
  - https://tomcat.apache.org/tomcat-11.0-doc/index.html
config-file-location:
  unix:
    - $CATALINA_BASE/conf/server.xml
    - $CATALINA_BASE/conf/catalina.properties
    - $CATALINA_BASE/conf/tomcat-users.xml
credentials-file-location:
  unix: $CATALINA_BASE/conf/tomcat-users.xml
category: cloud-infrastructure
package-manager:
  brew: tomcat
  chocolatey: Tomcat
  dnf: tomcat
  nix: tomcat
  scoop: extras/tomcat
  zypper: tomcat
package-manager-url: https://formulae.brew.sh/formula/tomcat
license: Apache-2.0
tags:
  - application-server
  - cli
  - jakarta-ee
  - java
  - jsp
  - servlet-container
  - web-server
description: Implementation of Java Servlet and JavaServer Pages
executables:
  - catalina
provenance:
  formula: tomcat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
