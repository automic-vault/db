id: brew:awscli@1
display-name: AWS CLI v1
homepage: https://aws.amazon.com/cli/
repo: https://github.com/aws/aws-cli
docs:
  - https://docs.aws.amazon.com/cli/v1/userguide/cli-chap-welcome.html
  - https://docs.aws.amazon.com/cli/v1/userguide/cli-configure-files.html
config-file-location:
  unix: ~/.aws/config
  windows: '%USERPROFILE%\.aws\config'
credentials-file-location:
  unix: ~/.aws/credentials
  windows: '%USERPROFILE%\.aws\credentials'
category: cloud-infrastructure
package-manager:
  brew: awscli@1
  chocolatey: awscli
  debian: awscli
  dnf: aws
  nix: awscli
  scoop: main/aws
  zypper: aws-cli
package-manager-match:
  chocolatey: fallback
  debian: fallback
  nix: fallback
  zypper: fallback
package-manager-url: https://formulae.brew.sh/formula/awscli@1
license: Apache-2.0
tags:
  - automation
  - aws
  - cli
  - cloud
  - python
description: Official Amazon AWS command-line interface
executables:
  - aws
  - aws_completer
provenance:
  formula: awscli@1
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
