id: brew:trzsz-ssh
display-name: tssh
homepage: https://trzsz.github.io/tssh
repo: https://github.com/trzsz/trzsz-ssh
docs:
  - https://github.com/trzsz/trzsz-ssh#readme
  - https://trzsz.github.io/ssh
config-file-location:
  unix:
    - $XDG_CONFIG_HOME/tssh/tssh.conf
    - ~/.tssh.conf
    - ~/.ssh/config
    - ~/.ssh/password
  windows:
    - C:\Users\your_name\.tssh.conf
    - C:\Users\your_name\.ssh\config
    - C:\Users\your_name\.ssh\password
credentials-file-location:
  unix:
    - ~/.ssh/config
    - ~/.ssh/password
  windows:
    - C:\Users\your_name\.ssh\config
    - C:\Users\your_name\.ssh\password
category: networking
package-manager:
  brew: trzsz-ssh
  nix: trzsz-ssh
  scoop: main/tssh
  winget: trzsz.tssh
package-manager-url: https://formulae.brew.sh/formula/trzsz-ssh
license: MIT
tags:
  - cli
  - file-transfer
  - openssh-compatible
  - ssh
  - terminal
  - trzsz
description: Highly OpenSSH-compatible client with extended features
executables:
  - tssh
provenance:
  formula: trzsz-ssh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
