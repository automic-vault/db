id: brew:mbedtls@3
display-name: Mbed TLS 3
homepage: https://www.trustedfirmware.org/projects/mbed-tls/
repo: https://github.com/Mbed-TLS/mbedtls
docs:
  - https://mbed-tls.readthedocs.io/en/latest
  - https://mbed-tls.readthedocs.io/en/latest/getting_started
  - https://mbed-tls.readthedocs.io/projects/api/en/development
config-file-location:
  unix: include/mbedtls/mbedtls_config.h
credentials-file-location: null
category: security
package-manager:
  apk: mbedtls3
  brew: mbedtls@3
  debian: libmbedcrypto16
  dnf: mbedtls
  macports: mbedtls3
  nix: mbedtls
  pacman: mbedtls3
  ubuntu: libmbedcrypto7t64
  zypper: libeverest
package-manager-match:
  debian: fallback
  dnf: fallback
  nix: fallback
  ubuntu: fallback
  zypper: fallback
package-manager-url: https://formulae.brew.sh/formula/mbedtls@3
license: Apache-2.0
