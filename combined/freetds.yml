id: brew:freetds
display-name: FreeTDS
homepage: https://www.freetds.org/
repo: https://github.com/FreeTDS/freetds
docs:
  - https://www.freetds.org/docs.html
  - https://www.freetds.org/faq.html
  - https://www.freetds.org/reference
  - https://www.freetds.org/userguide
config-file-location:
  unix:
    - ${HOME}/.freetds.conf
    - ${HOME}/.config/freetds.conf
    - ${sysconfdir}/freetds.conf (default /usr/local/etc/freetds.conf)
credentials-file-location: null
category: data
package-manager:
  apk: freetds
  brew: freetds
  debian: freetds-bin
  dnf: freetds
  macports: freetds
  nix: freetds
  pacman: freetds
  ubuntu: freetds-bin
  zypper: freetds-config
package-manager-url: https://formulae.brew.sh/formula/freetds
license: GPL-2.0-or-later
tags:
  - cli
  - database-library
  - odbc
  - sql-server
  - sybase
  - tds
description: Libraries to talk to Microsoft SQL Server and Sybase databases
executables:
  - bsqldb
  - bsqlodbc
  - datacopy
  - defncopy
  - fisql
  - freebcp
  - osql
  - tdspool
  - tsql
provenance:
  formula: freetds
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
