id: brew:imagemagick@6
display-name: ImageMagick 6
homepage: https://legacy.imagemagick.org/
repo: https://github.com/ImageMagick/ImageMagick6
docs:
  - https://legacy.imagemagick.org/script/command-line-processing.php
  - https://legacy.imagemagick.org/script/command-line-tools.php
  - https://legacy.imagemagick.org/script/resources.php
config-file-location:
  unix:
    - $MAGICK_CONFIGURE_PATH
    - $PREFIX/etc/ImageMagick-6
    - $PREFIX/share/ImageMagick-6
    - $XDG_CACHE_HOME/ImageMagick
    - ~/.config/ImageMagick
    - <client path>/etc/ImageMagick
  windows:
    - $MAGICK_CONFIGURE_PATH
    - <windows registry>
    - $PREFIX/config
    - $USERPROFILE/.config/ImageMagick
    - <client path>
credentials-file-location: null
category: media
package-manager:
  apk: imagemagick
  brew: imagemagick@6
  chocolatey: imagemagick
  debian: python3-identify
  dnf: ImageMagick
  macports: montage
  nix: conjure
  pacman: imagemagick
  scoop: main/imagemagick
  ubuntu: python3-identify
  winget: JiriPolasek.DevNumbersforCommandPalette
  zypper: ImageMagick
package-manager-match:
  apk: fallback
  chocolatey: fallback
  dnf: fallback
  pacman: fallback
  scoop: fallback
  zypper: fallback
package-manager-url: https://formulae.brew.sh/formula/imagemagick@6
license: ImageMagick
tags:
  - cli
  - graphics
  - image-conversion
  - image-processing
  - library
description: Tools and libraries to manipulate images in many formats
executables:
  - Magick++-config
  - Magick-config
  - MagickCore-config
  - MagickWand-config
  - Wand-config
  - animate
  - compare
  - composite
  - conjure
  - convert
  - display
  - identify
  - import
  - mogrify
  - montage
  - stream
provenance:
  formula: imagemagick@6
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
