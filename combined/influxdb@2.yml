id: brew:influxdb@2
display-name: InfluxDB 2
homepage: https://influxdata.com/time-series-platform/influxdb/
repo: https://github.com/influxdata/influxdb
docs:
  - https://docs.influxdata.com/influxdb/v2
  - https://docs.influxdata.com/influxdb/v2/reference/config-options
config-file-location:
  linux: /etc/influxdb/config.toml
  unix:
    - ./config.yaml
    - ./config.yml
    - ./config.toml
    - ./config.json
credentials-file-location: null
category: data
package-manager:
  brew: influxdb@2
  debian: golang-github-influxdb-influxdb-dev
  macports: influxdb
  nix: influxdb2
  pacman: influxdb
  scoop: versions/influxdb2
  ubuntu: golang-github-influxdb-influxdb-dev
  zypper: influxdb2
package-manager-match:
  debian: fallback
  macports: fallback
  pacman: fallback
  ubuntu: fallback
package-manager-url: https://formulae.brew.sh/formula/influxdb@2
license: MIT
tags:
  - cli
  - database
  - events
  - metrics
  - server
  - time-series
description: Time series, events, and metrics database
executables:
  - influxd
provenance:
  formula: influxdb@2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
