  scoop: extras/activemq
  ubuntu: activemq
package-manager-url: https://formulae.brew.sh/formula/activemq
license: Apache-2.0
tags:
  - apache
  - cli
  - jms
  - message-broker
  - messaging
  - server
description: 'Apache ActiveMQ: powerful open source messaging server'
executables:
  - activemq
provenance:
  formula: activemq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
