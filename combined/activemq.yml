id: brew:activemq
display-name: Apache ActiveMQ
homepage: https://activemq.apache.org/
repo: https://github.com/apache/activemq
docs:
  - https://activemq.apache.org/components/classic/documentation
  - https://activemq.apache.org/xml-configuration
config-file-location:
  unix:
    - ${ACTIVEMQ_HOME}/conf/activemq.xml
    - ${ACTIVEMQ_HOME}/conf/jetty.xml
credentials-file-location:
  unix: ${activemq.conf}/credentials.properties
category: data
package-manager:
