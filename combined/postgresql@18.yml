id: brew:postgresql@18
display-name: PostgreSQL 18
homepage: https://www.postgresql.org/
repo: https://git.postgresql.org/gitweb?p=postgresql.git
docs:
  - https://www.postgresql.org/docs/18/index.html
  - https://www.postgresql.org/docs/18/libpq-pgpass.html
  - https://www.postgresql.org/docs/18/runtime-config-file-locations.html
config-file-location:
  unix:
    - $PGDATA/postgresql.conf
    - $PGDATA/pg_hba.conf
    - $PGDATA/pg_ident.conf
credentials-file-location:
  unix: ~/.pgpass
  windows: '%APPDATA%\postgresql\pgpass.conf'
category: data
package-manager:
  apk: libecpg
  brew: postgresql@18
  chocolatey: postgresql18
  debian: pg-checksums-doc
  dnf: postgresql
  macports: postgresql18
  nix: pg_checksums
  pacman: postgresql
  scoop: main/postgresql
  ubuntu: pg-checksums-doc
  winget: PostgreSQL.PostgreSQL.18
  zypper: libecpg6
package-manager-match:
  pacman: fallback
  scoop: fallback
package-manager-url: https://formulae.brew.sh/formula/postgresql@18
license: PostgreSQL
tags:
  - cli
  - database
  - postgresql
  - rdbms
  - server
  - sql
description: Object-relational database system
executables:
  - clusterdb
  - createdb
  - createuser
  - dropdb
  - dropuser
  - ecpg
  - initdb
  - oid2name
  - pg_amcheck
  - pg_archivecleanup
  - pg_basebackup
  - pg_checksums
  - pg_combinebackup
  - pg_config
  - pg_controldata
  - pg_createsubscriber
  - pg_ctl
  - pg_dump
  - pg_dumpall
  - pg_isready
  - pg_receivewal
  - pg_recvlogical
  - pg_resetwal
  - pg_restore
  - pg_rewind
  - pg_test_fsync
  - pg_test_timing
  - pg_upgrade
  - pg_verifybackup
  - pg_waldump
  - pg_walsummary
  - pgbench
  - postgres
  - psql
  - reindexdb
  - vacuumdb
  - vacuumlo
provenance:
  formula: postgresql@18
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
