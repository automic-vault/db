id: brew:unbound
display-name: Unbound
homepage: https://www.unbound.net
repo: https://github.com/NLnetLabs/unbound
docs:
  - https://unbound.docs.nlnetlabs.nl/en/latest
  - https://nlnetlabs.nl/documentation/unbound
config-file-location:
  unix: /usr/local/etc/unbound/unbound.conf
credentials-file-location:
  unix:
    - /usr/local/etc/unbound/unbound_server.key
    - /usr/local/etc/unbound/unbound_control.key
    - /usr/local/etc/unbound/unbound_server.pem
    - /usr/local/etc/unbound/unbound_control.pem
category: networking
package-manager:
  apk: py3-unbound
  brew: unbound
  debian: libunbound-dev
  dnf: python3-unbound
  macports: unbound
  nix: unbound
  pacman: unbound
  scoop: main/unbound
  ubuntu: libunbound-dev
  winget: NLnetLabs.Unbound
  zypper: libunbound8
package-manager-url: https://formulae.brew.sh/formula/unbound
license: BSD-3-Clause
tags:
  - cache
  - cli
  - dns
  - dnssec
  - networking
  - recursive-dns
  - resolver
description: Validating, recursive, caching DNS resolver
executables:
  - unbound
  - unbound-anchor
  - unbound-checkconf
  - unbound-control
  - unbound-control-setup
  - unbound-host
provenance:
  formula: unbound
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
