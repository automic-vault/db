id: brew:aarch64-elf-gdb
display-name: GDB for aarch64-elf
homepage: https://www.gnu.org/software/gdb/
repo: https://sourceware.org/git/binutils-gdb.git
docs:
  - https://www.gnu.org/software/gdb/documentation
  - https://sourceware.org/gdb/current/onlinedocs/gdb.html
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/gdb/gdbearlyinit
    - ~/.config/gdb/gdbearlyinit
    - ~/.gdbearlyinit
    - $XDG_CONFIG_HOME/gdb/gdbinit
    - ~/.config/gdb/gdbinit
    - ~/.gdbinit
    - .gdbinit
  macos:
    - ~/Library/Preferences/gdb/gdbearlyinit
    - ~/.gdbearlyinit
    - ~/Library/Preferences/gdb/gdbinit
    - ~/.gdbinit
    - .gdbinit
credentials-file-location: null
category: developer-tools
package-manager:
  brew: aarch64-elf-gdb
package-manager-url: https://formulae.brew.sh/formula/aarch64-elf-gdb
license: GPL-3.0-or-later
tags:
  - aarch64
  - cli
  - cross-debugging
  - debugger
  - gdb
description: GNU debugger for aarch64-elf cross development
executables:
  - aarch64-elf-gdb
  - aarch64-elf-gdb-add-index
  - aarch64-elf-gstack
provenance:
  formula: aarch64-elf-gdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
