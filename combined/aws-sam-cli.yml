id: brew:aws-sam-cli
display-name: AWS SAM CLI
homepage: https://aws.amazon.com/serverless/sam/
repo: https://github.com/aws/aws-sam-cli
docs:
  - >
    https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html
  - >
    https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/using-sam-cli.html
config-file-location:
  unix:
    - samconfig.toml
    - samconfig.yaml
    - samconfig.yml
credentials-file-location:
  unix: ~/.aws/credentials
  windows: C:\Users\USERNAME\.aws\credentials
category: cloud-infrastructure
package-manager:
  brew: aws-sam-cli
  nix: aws-sam-cli
  scoop: main/aws-sam-cli
  winget: Amazon.SAM-CLI
package-manager-url: https://formulae.brew.sh/formula/aws-sam-cli
license: Apache-2.0
tags:
  - aws
  - cli
  - deployment
  - lambda
  - serverless
description: CLI tool to build, test, debug, and deploy Serverless applications using AWS SAM
executables:
  - sam
provenance:
  formula: aws-sam-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
