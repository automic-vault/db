id: brew:eget
display-name: eget
homepage: https://github.com/zyedidia/eget
repo: https://github.com/zyedidia/eget
docs:
  - https://github.com/zyedidia/eget#readme
config-file-location:
  unix:
    - ~/.eget.toml
    - $XDG_CONFIG_HOME/eget/eget.toml
    - ./eget.toml
    - $EGET_CONFIG
  windows:
    - '%USERPROFILE%\.eget.toml'
    - '%LOCALAPPDATA%\eget\eget.toml'
    - .\eget.toml
    - '%EGET_CONFIG%'
credentials-file-location:
  unix:
    - ~/.eget.toml
    - $XDG_CONFIG_HOME/eget/eget.toml
    - ./eget.toml
    - $EGET_CONFIG
  windows:
    - '%USERPROFILE%\.eget.toml'
    - '%LOCALAPPDATA%\eget\eget.toml'
    - .\eget.toml
    - '%EGET_CONFIG%'
category: developer-tools
package-manager:
  brew: eget
  nix: eget
  scoop: extras/eget
  winget: ZacharyYedidia.Eget
package-manager-url: https://formulae.brew.sh/formula/eget
license: MIT
tags:
  - binary-installer
  - cli
  - developer-tools
  - github-releases
  - package-management
description: Easily install prebuilt binaries from GitHub
executables:
  - eget
provenance:
  formula: eget
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
