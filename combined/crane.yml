id: brew:crane
display-name: crane
homepage: https://github.com/google/go-containerregistry
repo: https://github.com/google/go-containerregistry
docs:
  - https://github.com/google/go-containerregistry/blob/main/cmd/crane/recipes.md
  - https://github.com/google/go-containerregistry/tree/main/cmd/crane#readme
config-file-location: null
credentials-file-location:
  unix:
    - ~/.docker/config.json
    - ${DOCKER_CONFIG}/config.json
    - ${XDG_RUNTIME_DIR}/containers/auth.json
  windows: '%USERPROFILE%\.docker\config.json'
category: cloud-infrastructure
package-manager:
  apk: crane
  brew: crane
  pacman: crane
  zypper: crane
package-manager-url: https://formulae.brew.sh/formula/crane
license: Apache-2.0
tags:
  - cli
  - container-registry
  - containers
  - go
  - oci-images
description: Tool for interacting with remote images and registries
executables:
  - crane
provenance:
  formula: crane
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
