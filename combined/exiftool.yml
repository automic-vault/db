id: brew:exiftool
display-name: ExifTool
homepage: https://exiftool.org
repo: https://github.com/exiftool/exiftool
docs:
  - https://exiftool.org/
  - https://exiftool.org/exiftool_pod.html
config-file-location:
  unix:
    - ~/.ExifTool_config
    - $EXIFTOOL_HOME/.ExifTool_config
    - exiftool application directory/.ExifTool_config
  windows:
    - '%HOMEDRIVE%%HOMEPATH%\.ExifTool_config'
    - '%EXIFTOOL_HOME%\.ExifTool_config'
    - exiftool application directory\.ExifTool_config
credentials-file-location: null
category: media
package-manager:
  apk: exiftool
  brew: exiftool
  chocolatey: exiftool
  macports: exiftool
  nix: exiftool
  pacman: perl-image-exiftool
  scoop: main/exiftool
  winget: OliverBetz.ExifTool
  zypper: exiftool
package-manager-url: https://formulae.brew.sh/formula/exiftool
license: Artistic-1.0-Perl OR GPL-1.0-or-later
tags:
  - cli
  - exif
  - image-metadata
  - metadata
  - perl
description: Perl lib for reading and writing EXIF metadata
executables:
  - exiftool
provenance:
  formula: exiftool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
