id: brew:aws-cdk
display-name: AWS CDK
homepage: https://github.com/aws/aws-cdk
repo: https://github.com/aws/aws-cdk
docs:
  - https://docs.aws.amazon.com/cdk/v2/guide/cli.html
  - https://docs.aws.amazon.com/cdk/v2/guide/home.html
config-file-location:
  unix:
    - cdk.json
    - ~/.cdk.json
    - cdk.context.json
    - ~/.aws/config
  windows: '%USERPROFILE%\.aws\config'
credentials-file-location:
  unix: ~/.aws/credentials
  windows: '%USERPROFILE%\.aws\credentials'
category: cloud-infrastructure
package-manager:
  brew: aws-cdk
  debian: libcdk-java
  dnf: cdk
  nix: cdk
  ubuntu: libcdk-java
  zypper: cdk-devel
package-manager-url: https://formulae.brew.sh/formula/aws-cdk
license: Apache-2.0
tags:
  - aws
  - cdk
  - cli
  - cloudformation
  - infrastructure-as-code
description: AWS Cloud Development Kit - framework for defining AWS infra as code
executables:
  - cdk
provenance:
  formula: aws-cdk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
