id: brew:rabbitmq
display-name: RabbitMQ
homepage: https://www.rabbitmq.com
repo: https://github.com/rabbitmq/rabbitmq-server
docs:
  - https://www.rabbitmq.com/docs
config-file-location:
  linux:
    - /etc/rabbitmq/rabbitmq.conf
    - /etc/rabbitmq/advanced.config
    - /etc/rabbitmq/rabbitmq-env.conf
  macos:
    - ${install_prefix}/etc/rabbitmq/rabbitmq.conf
    - ${install_prefix}/etc/rabbitmq/advanced.config
    - ${install_prefix}/etc/rabbitmq/rabbitmq-env.conf
  unix:
    - $RABBITMQ_HOME/etc/rabbitmq/rabbitmq.conf
    - $RABBITMQ_HOME/etc/rabbitmq/advanced.config
    - $RABBITMQ_HOME/etc/rabbitmq/rabbitmq-env.conf
  windows:
    - '%APPDATA%\RabbitMQ\rabbitmq.conf'
    - '%APPDATA%\RabbitMQ\advanced.config'
    - '%APPDATA%\RabbitMQ\rabbitmq-env-conf.bat'
credentials-file-location: null
category: networking
package-manager:
  apk: rabbitmq-server
  brew: rabbitmq
  chocolatey: rabbitmq
  debian: rabbitmq-server
  dnf: rabbitmq-server
  macports: rabbitmq-server
  nix: rabbitmq-server
  pacman: rabbitmq
  scoop: extras/rabbitmq
  ubuntu: rabbitmq-server
  zypper: erlang-rabbitmq-client
package-manager-url: https://formulae.brew.sh/formula/rabbitmq
license: MPL-2.0
tags:
  - amqp
  - cli
  - message-broker
  - messaging
  - server
  - streaming
description: Messaging and streaming broker
executables:
  - rabbitmq-defaults
  - rabbitmq-diagnostics
  - rabbitmq-env
  - rabbitmq-plugins
  - rabbitmq-queues
  - rabbitmq-server
  - rabbitmq-streams
  - rabbitmq-upgrade
  - rabbitmqctl
  - vmware-rabbitmq
provenance:
  formula: rabbitmq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
