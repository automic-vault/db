id: brew:pyenv
display-name: pyenv
homepage: https://github.com/pyenv/pyenv
repo: https://github.com/pyenv/pyenv
docs:
  - https://github.com/pyenv/pyenv#readme
config-file-location:
  unix:
    - .python-version
    - $(pyenv root)/version
credentials-file-location: null
category: language-runtime
package-manager:
  brew: pyenv
  debian: pyenv
  dnf: python3-build
  nix: pyenv
  pacman: pyenv
  scoop: main/pyenv
  ubuntu: python3-build
  zypper: pyenv
package-manager-url: https://formulae.brew.sh/formula/pyenv
license: MIT
tags:
  - cli
  - python
  - runtime-management
  - shell
  - version-manager
description: Python version management
executables:
  - pyenv
  - pyenv-install
  - pyenv-uninstall
  - python-build
provenance:
  formula: pyenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
