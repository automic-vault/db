id: brew:cargo-update
display-name: cargo-update
homepage: https://github.com/nabijaczleweli/cargo-update
repo: https://github.com/nabijaczleweli/cargo-update
docs:
  - https://docs.rs/cargo-update
  - https://github.com/nabijaczleweli/cargo-update#readme
  - >
    https://rawcdn.githack.com/nabijaczleweli/cargo-update/man/cargo-install-update-config.1.html
  - https://rawcdn.githack.com/nabijaczleweli/cargo-update/man/cargo-install-update.1.html
config-file-location:
  unix:
    - $CARGO_HOME/.install_config.toml
    - ~/.cargo/.install_config.toml
credentials-file-location:
  unix:
    - $CARGO_HOME/credentials
    - $CARGO_HOME/credentials.toml
    - ~/.cargo/credentials
    - ~/.cargo/credentials.toml
category: developer-tools
package-manager:
  apk: cargo-update
  brew: cargo-update
  nix: cargo-update
  pacman: cargo-update
package-manager-url: https://formulae.brew.sh/formula/cargo-update
license: MIT
tags:
  - cargo
  - cli
  - package-updates
  - rust
description: Cargo subcommand for checking and applying updates to installed executables
executables:
  - cargo-install-update
  - cargo-install-update-config
provenance:
  formula: cargo-update
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
