category: productivity
package-manager:
  apk: gvim
  brew: vim
  chocolatey: vim
  debian: vim
  dnf: vim-X11
  macports: vim
  nix: vim
  pacman: vim
  scoop: main/vim
  ubuntu: vim
  winget: vim.vim
  zypper: gvim
package-manager-url: https://formulae.brew.sh/formula/vim
license: Vim
tags:
  - cli
  - file-manager
  - ncurses
  - terminal
  - vim-like
description: Vi 'workalike' with many additional features
executables:
  - ex
  - rview
  - rvim
  - vi
  - view
  - vim
  - vimdiff
  - vimtutor
  - xxd
provenance:
  formula: vim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
