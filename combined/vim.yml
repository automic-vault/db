id: brew:vim
display-name: Vifm
homepage: https://www.vim.org/
repo: https://github.com/vim/vim
docs:
  - https://vifm.info/docs
config-file-location:
  unix:
    - ~/.vimrc
    - ~/.vim/vimrc
    - $XDG_CONFIG_HOME/vim/vimrc
  windows:
    - ~/_vimrc
    - ~/vimfiles/vimrc
    - $VIM/_vimrc
