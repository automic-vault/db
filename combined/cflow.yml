id: brew:cflow
display-name: GNU cflow
homepage: https://www.gnu.org/software/cflow/
repo: https://git.savannah.gnu.org/cgit/cflow.git
docs:
  - https://www.gnu.org/software/cflow/manual
  - https://www.gnu.org/software/cflow
config-file-location:
  unix:
    - ~/.cflow.d/*.cfo
    - ~/.cflow.d/default.cfo
    - /usr/share/cflow/site-init/*.cfo
    - /usr/share/cflow/site-init/1.8/*.cfo
    - /usr/local/share/cflow/site-init/*.cfo
    - /usr/local/share/cflow/site-init/1.8/*.cfo
    - $CFLOWRC
    - ~/.cflowrc
credentials-file-location: null
category: developer-tools
package-manager:
  apk: cflow
  brew: cflow
  debian: cflow
  dnf: cflow
  macports: cflow
  nix: cflow
  ubuntu: cflow
  zypper: cflow
package-manager-url: https://formulae.brew.sh/formula/cflow
license: GPL-3.0-or-later
tags:
  - c
  - call-graphs
  - cli
  - gnu
  - static-analysis
description: Generate call graphs from C code
executables:
  - cflow
provenance:
  formula: cflow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
