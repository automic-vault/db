id: brew:tomcat@10
display-name: Apache Tomcat 10
homepage: https://tomcat.apache.org/
repo: https://github.com/apache/tomcat
docs:
  - https://tomcat.apache.org/
  - https://tomcat.apache.org/tomcat-10.1-doc/index.html
config-file-location:
  unix:
    - $CATALINA_BASE/conf/server.xml
    - $CATALINA_BASE/conf/catalina.properties
    - $CATALINA_BASE/conf/tomcat-users.xml
credentials-file-location:
  unix: $CATALINA_BASE/conf/tomcat-users.xml
category: cloud-infrastructure
package-manager:
  brew: tomcat@10
  chocolatey: Tomcat
  debian: libtomcat10-embed-java
  dnf: tomcat
  nix: tomcat
  pacman: tomcat10
  scoop: versions/tomcat10
  ubuntu: libtomcat10-embed-java
  zypper: tomcat10
package-manager-match:
  chocolatey: fallback
  dnf: fallback
  nix: fallback
package-manager-url: https://formulae.brew.sh/formula/tomcat@10
license: Apache-2.0
tags:
  - application-server
  - cli
  - jakarta-ee
  - java
  - jsp
  - servlet-container
  - web-server
description: Implementation of Java Servlet and JavaServer Pages
executables:
  - catalina
provenance:
  formula: tomcat@10
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
