id: brew:glances
display-name: Glances
homepage: https://nicolargo.github.io/glances/
repo: https://github.com/nicolargo/glances
docs:
  - https://glances.readthedocs.io/
  - https://nicolargo.github.io/glances
config-file-location:
  linux:
    - ~/.config/glances/glances.conf
    - /etc/glances/glances.conf
    - /usr/share/doc/glances/glances.conf
  macos:
    - ~/.config/glances/glances.conf
    - ~/Library/Application Support/glances/glances.conf
    - /usr/local/etc/glances/glances.conf
    - /usr/share/doc/glances/glances.conf
  windows: '%APPDATA%\glances\glances.conf'
credentials-file-location: null
category: system
package-manager:
  apk: glances
  brew: glances
  debian: glances
  dnf: glances
  macports: glances
  nix: glances
  pacman: glances
  ubuntu: glances
  zypper: python311-Glances
package-manager-url: https://formulae.brew.sh/formula/glances
license: LGPL-3.0-or-later
tags:
  - cli
  - cross-platform
  - python
  - system-monitoring
  - top
description: Alternative to top/htop
executables:
  - glances
provenance:
  formula: glances
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
