id: brew:spiffe-helper
display-name: SPIFFE Helper
homepage: https://github.com/spiffe/spiffe-helper
repo: https://github.com/spiffe/spiffe-helper
docs:
  - https://github.com/spiffe/spiffe-helper#readme
config-file-location:
  unix: helper.conf
credentials-file-location:
  unix:
    - certs/svid.pem
    - certs/svid_key.pem
    - certs/bundle.pem
    - certs/jwt_svid.token
category: security
package-manager:
  brew: spiffe-helper
  nix: spiffe-helper
package-manager-url: https://formulae.brew.sh/formula/spiffe-helper
license: Apache-2.0
tags:
  - cli
  - identity
  - spiffe
  - svid
  - workload-identity
  - x509
description: Tool that can be used to retrieve and manage SVIDs on behalf of a workload
executables:
  - spiffe-helper
provenance:
  formula: spiffe-helper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
