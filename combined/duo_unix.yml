id: brew:duo_unix
display-name: Duo Unix
homepage: https://www.duosecurity.com/docs/duounix
repo: https://github.com/duosecurity/duo_unix
docs:
  - https://duo.com/docs/duounix
config-file-location:
  unix:
    - /etc/duo/pam_duo.conf
    - /etc/security/pam_duo.conf
    - /etc/duo/login_duo.conf
    - /etc/security/login_duo.conf
credentials-file-location:
  unix:
    - /etc/duo/pam_duo.conf
    - /etc/security/pam_duo.conf
    - /etc/duo/login_duo.conf
    - /etc/security/login_duo.conf
category: security
package-manager:
  apk: duo_unix
  brew: duo_unix
  debian: libduo-dev
  dnf: duo_unix
  nix: duo-unix
  ubuntu: libduo-dev
package-manager-url: https://formulae.brew.sh/formula/duo_unix
license: GPL-2.0-or-later
tags:
  - cli
  - pam
  - security
  - ssh
  - two-factor-authentication
  - unix
description: Two-factor authentication for SSH
executables:
  - duo_unix_support.sh
  - login_duo
provenance:
  formula: duo_unix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
