id: brew:claws-mail
display-name: Claws Mail
homepage: https://www.claws-mail.org/
repo: https://git.claws-mail.org/?p=claws.git%3Ba%3Dsummary
docs:
  - https://www.claws-mail.org/manual/claws-mail-manual.html
  - https://www.claws-mail.org/faq/index.php/Installation_and_Configuration
config-file-location:
  unix:
    - ~/.claws-mail/clawsrc
    - ~/.claws-mail/accountrc
    - ~/.claws-mail/actionsrc
