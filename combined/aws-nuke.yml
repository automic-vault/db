id: brew:aws-nuke
display-name: AWS Nuke
homepage: https://aws-nuke.ekristen.dev
repo: https://github.com/ekristen/aws-nuke
docs:
  - https://aws-nuke.ekristen.dev/
config-file-location:
  unix: config.yaml
credentials-file-location:
  unix:
    - ~/.aws/config
    - ~/.aws/credentials
  windows:
    - C:\Users\USERNAME\.aws\config
    - C:\Users\USERNAME\.aws\credentials
category: cloud-infrastructure
package-manager:
  brew: aws-nuke
  debian: aws-nuke
  macports: aws-nuke
  nix: aws-nuke
  scoop: main/aws-nuke
  ubuntu: aws-nuke
package-manager-url: https://formulae.brew.sh/formula/aws-nuke
license: MIT
tags:
  - account-management
  - aws
  - cleanup
  - cli
  - resources
description: Nuke a whole AWS account and delete all its resources
executables:
  - aws-nuke
provenance:
  formula: aws-nuke
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
