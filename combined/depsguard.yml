id: brew:depsguard
display-name: DepsGuard
homepage: https://depsguard.com
repo: https://github.com/arnica/depsguard
docs:
  - https://depsguard.com/
  - https://github.com/arnica/depsguard#readme
config-file-location:
  linux:
    - ~/.npmrc
    - ~/.config/pnpm/rc
    - ~/.config/pnpm/config.yaml
    - ~/.yarnrc.yml
    - $XDG_CONFIG_HOME/.bunfig.toml
    - ~/.config/uv/uv.toml
    - ~/.config/pip/pip.conf
    - ~/.config/pypoetry/config.toml
  macos:
    - ~/.npmrc
    - ~/Library/Preferences/pnpm/rc
    - ~/Library/Preferences/pnpm/config.yaml
    - ~/.yarnrc.yml
    - ~/.bunfig.toml
    - ~/.config/uv/uv.toml
    - ~/Library/Application Support/pip/pip.conf
    - ~/Library/Application Support/pypoetry/config.toml
  windows:
    - '%LOCALAPPDATA%\pnpm\config\rc'
    - '%LOCALAPPDATA%\pnpm\config\config.yaml'
    - '%APPDATA%\uv\uv.toml'
    - '%APPDATA%\pip\pip.ini'
    - '%APPDATA%\pypoetry\config.toml'
credentials-file-location: null
category: security
package-manager:
  brew: depsguard
  winget: Arnica.DepsGuard
package-manager-url: https://formulae.brew.sh/formula/depsguard
license: MIT
tags:
  - cli
  - dependency-security
  - hardening
  - package-manager
  - supply-chain-security
description: Harden package manager configs against supply chain attacks
executables:
  - depsguard
provenance:
  formula: depsguard
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
