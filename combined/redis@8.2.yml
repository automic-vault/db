  nix: redis
  pacman: valkey
  scoop: main/redis
  ubuntu: redis-sentinel
  winget: Redis.Redis
  zypper: libredis++1
package-manager-match:
  apk: fallback
  chocolatey: fallback
  dnf: fallback
  macports: fallback
  nix: fallback
  pacman: fallback
  scoop: fallback
  winget: fallback
  zypper: fallback
package-manager-url: https://formulae.brew.sh/formula/redis@8.2
license: AGPL-3.0-only AND BSD-2-Clause AND BSL-1.0 AND MIT AND (CC0-1.0 OR BSD-2-Clause)
