id: brew:redis@8.2
display-name: Redis 8.2
homepage: https://redis.io/
repo: https://github.com/redis/redis
docs:
  - https://redis.io/docs/latest
  - https://redis.io/docs/latest/operate/oss_and_stack/management/config
config-file-location:
  unix:
    - redis.conf
    - redis-full.conf
