id: brew:bacon
display-name: bacon
homepage: https://dystroy.org/bacon/
repo: https://github.com/Canop/bacon
docs:
  - https://dystroy.org/bacon
  - https://dystroy.org/bacon/config
config-file-location:
  unix:
    - prefs.toml
    - $BACON_PREFS
    - Cargo.toml workspace.metadata.bacon
    - workspace-root/bacon.toml
    - workspace-root/.config/bacon.toml
    - Cargo.toml package.metadata.bacon
    - package-root/bacon.toml
    - package-root/.config/bacon.toml
    - $BACON_CONFIG
credentials-file-location: null
category: developer-tools
package-manager:
  apk: bacon
  brew: bacon
  debian: bacon
  nix: bacon
  pacman: bacon
package-manager-url: https://formulae.brew.sh/formula/bacon
license: AGPL-3.0-or-later
tags:
  - cli
  - code-check
  - rust
description: Background rust code check
executables:
  - bacon
provenance:
  formula: bacon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
