id: brew:openvpn
display-name: OpenVPN
homepage: https://openvpn.net/community/
repo: https://github.com/OpenVPN/openvpn
docs:
  - https://openvpn.github.io/openvpn
  - https://openvpn.net/community-docs
config-file-location:
  macos:
    - ~/Library/Application Support/OpenVPN
    - ~/Library/Application Support/Tunnelblick/Configurations
  unix:
    - ~/.openvpn
    - $XDG_CONFIG_HOME/openvpn
    - ~/.config/openvpn
credentials-file-location:
  macos:
    - ~/Library/Application Support/OpenVPN
    - ~/Library/Application Support/Tunnelblick/Configurations
  unix:
    - ~/.openvpn
    - $XDG_CONFIG_HOME/openvpn
    - ~/.config/openvpn
category: networking
package-manager:
  apk: openvpn
  brew: openvpn
  chocolatey: openvpn
  debian: openvpn
  dnf: openvpn
  nix: openvpn
  pacman: openvpn
  scoop: extras/openvpn
  ubuntu: openvpn
  winget: OpenVPNTechnologies.OpenVPN
  zypper: openvpn
package-manager-url: https://formulae.brew.sh/formula/openvpn
license: GPL-2.0-only WITH openvpn-openssl-exception
tags:
  - cli
  - network-security
  - tls
  - tunneling
  - vpn
description: SSL/TLS VPN implementing OSI layer 2 or 3 secure network extension
executables:
  - openvpn
provenance:
  formula: openvpn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
