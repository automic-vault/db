license: BSD-3-Clause-Modification
tags:
  - cli
  - daemon
  - process-control
  - process-management
  - python
  - unix
description: Process Control System
executables:
  - echo_supervisord_conf
  - pidproxy
  - supervisorctl
  - supervisord
provenance:
  formula: supervisor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
