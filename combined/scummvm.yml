id: brew:scummvm
display-name: ScummVM
homepage: https://www.scummvm.org/
repo: https://github.com/scummvm/scummvm
docs:
  - https://docs.scummvm.org/
config-file-location:
  linux:
    - ~/.config/scummvm/scummvm.ini
    - ~/snap/scummvm/current/.config/scummvm/scummvm.ini
    - ~/.scummvmrc
  macos:
    - ~/Library/Preferences/ScummVM Preferences
    - ~/.scummvmrc
  windows:
    - '%APPDATA%\ScummVM\scummvm.ini'
    - C:\WINDOWS\scummvm.ini
credentials-file-location: null
category: games
package-manager:
  apk: scummvm
  brew: scummvm
  debian: scummvm
  dnf: scummvm
  macports: scummvm
  nix: scummvm
  pacman: scummvm
  ubuntu: scummvm
  winget: ScummVM.ScummVM
  zypper: scummvm
package-manager-url: https://formulae.brew.sh/formula/scummvm
license: GPL-3.0-or-later
tags:
  - adventure-games
  - cli
  - cross-platform
  - emulation
  - game-interpreter
description: Graphic adventure game interpreter
executables:
  - scummvm
provenance:
  formula: scummvm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
