id: brew:notation
display-name: notation
homepage: https://notaryproject.dev/
repo: https://github.com/notaryproject/notation
docs:
  - https://notaryproject.dev/docs
  - https://github.com/notaryproject/notation#readme
config-file-location:
  linux: ~/.config/notation/config.json
  macos: ~/Library/Application Support/notation/config.json
  windows: ~/AppData/Roaming/notation/config.json
credentials-file-location:
  linux:
    - ~/.config/notation/config.json
    - ~/.config/notation/signingkeys.json
    - ~/.docker/config.json
  macos:
    - ~/Library/Application Support/notation/config.json
    - ~/Library/Application Support/notation/signingkeys.json
    - ~/.docker/config.json
  windows:
    - ~/AppData/Roaming/notation/config.json
    - ~/AppData/Roaming/notation/signingkeys.json
category: security
package-manager:
  brew: notation
  nix: notation
  winget: NotaryProject.Notation
package-manager-url: https://formulae.brew.sh/formula/notation
license: Apache-2.0
tags:
  - cli
  - container-images
  - oci
  - signatures
  - supply-chain-security
description: CLI tool to sign and verify OCI artifacts and container images
executables:
  - notation
provenance:
  formula: notation
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
