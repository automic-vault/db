id: brew:googleworkspace-cli
display-name: Google Workspace CLI
homepage: https://developers.google.com/workspace
repo: https://github.com/googleworkspace/cli
docs:
  - https://developers.google.com/workspace
  - https://github.com/googleworkspace/cli#readme
config-file-location: null
credentials-file-location:
  unix:
    - ~/.config/gws/client_secret.json
    - ~/.config/gws/credentials.json
    - $GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE
category: productivity
package-manager:
  brew: googleworkspace-cli
  macports: googleworkspace-cli
  nix: gws
  pacman: googleworkspace-cli
  winget: Google.WorkspaceCLI
package-manager-url: https://formulae.brew.sh/formula/googleworkspace-cli
license: Apache-2.0
tags:
  - automation
  - cli
  - gmail
  - google-drive
  - google-workspace
description: CLI for Drive, Gmail, Calendar, Sheets, Docs, Chat, Admin, and more
executables:
  - gws
provenance:
  formula: googleworkspace-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
