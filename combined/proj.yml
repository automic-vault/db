id: brew:proj
display-name: PROJ
homepage: https://proj.org/
repo: https://github.com/OSGeo/PROJ
docs:
  - https://proj.org/en/stable
config-file-location:
  linux:
    - $XDG_DATA_HOME/proj/proj.ini
    - ~/.local/share/proj/proj.ini
  macos: ~/Library/Application Support/proj/proj.ini
  windows: '%LOCALAPPDATA%\proj\proj.ini'
credentials-file-location: null
category: science
package-manager:
  apk: proj
  brew: proj
  debian: libproj-dev
  dnf: mingw32-proj
  macports: proj
  nix: proj
  pacman: proj
  ubuntu: libproj-dev
  zypper: libproj25
package-manager-url: https://formulae.brew.sh/formula/proj
license: MIT
tags:
  - cartography
  - cli
  - coordinate-transforms
  - geospatial
  - gis
  - projections
description: Cartographic Projections Library
executables:
  - cct
  - cs2cs
  - geod
  - gie
  - invgeod
  - invproj
  - proj
  - projinfo
  - projsync
provenance:
  formula: proj
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
