id: brew:changelogen
display-name: changelogen
homepage: https://github.com/unjs/changelogen
repo: https://github.com/unjs/changelogen
docs:
  - https://github.com/unjs/changelogen#readme
  - https://unjs.io/packages/changelogen
config-file-location:
  unix:
    - ./changelog.config.json
    - ./changelog.config.ts
    - ./changelog.config.js
    - ./changelog.config.mjs
    - ./changelog.config.cjs
    - ./.changelogrc
    - ./package.json#changelog
credentials-file-location:
  unix:
    - ./.env
    - ~/.changlogenrc
category: developer-tools
package-manager:
  brew: changelogen
  nix: changelogen
package-manager-url: https://formulae.brew.sh/formula/changelogen
license: MIT
tags:
  - changelog
  - cli
  - conventional-commits
  - github-releases
  - release-automation
  - typescript
  - versioning
description: Generate Beautiful Changelogs using Conventional Commits
executables:
  - changelogen
provenance:
  formula: changelogen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
