id: brew:hblock
display-name: hBlock
homepage: https://hblock.molinero.dev/
repo: https://github.com/hectorm/hblock
docs:
  - https://github.com/hectorm/hblock#readme
  - https://github.com/hectorm/hblock/blob/master/hblock.1.md
config-file-location:
  unix:
    - $XDG_CONFIG_HOME/hblock/sources.list
    - /etc/hblock/sources.list
    - $XDG_CONFIG_HOME/hblock/allow.list
    - /etc/hblock/allow.list
    - $XDG_CONFIG_HOME/hblock/deny.list
    - /etc/hblock/deny.list
    - $XDG_CONFIG_HOME/hblock/header
    - /etc/hblock/header
    - $XDG_CONFIG_HOME/hblock/footer
    - /etc/hblock/footer
credentials-file-location: null
category: security
package-manager:
  brew: hblock
  nix: hblock
  pacman: hblock
package-manager-url: https://formulae.brew.sh/formula/hblock
license: MIT
tags:
  - ad-blocker
  - cli
  - dns
  - hosts-file
  - malware-blocking
  - privacy
  - shell
description: Adblocker that creates a hosts file from multiple sources
executables:
  - hblock
provenance:
  formula: hblock
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
