id: brew:f3d
display-name: F3D
homepage: https://f3d.app
repo: https://github.com/f3d-app/f3d
docs:
  - https://f3d.app/doc
config-file-location:
  linux:
    - /etc/f3d/config.json
    - /etc/f3d/config.d
    - /usr/share/f3d/configs/config.json
    - /usr/share/f3d/configs/config.d
    - $XDG_CONFIG_HOME/f3d/config.json
    - $XDG_CONFIG_HOME/f3d/config.d
  macos:
    - /usr/local/etc/f3d/config.json
    - /usr/local/etc/f3d/config.d
    - ~/Library/Application Support/f3d/config.json
    - ~/Library/Application Support/f3d/config.d
  windows:
    - '%APPDATA%\f3d\config.json'
    - '%APPDATA%\f3d\config.d'
credentials-file-location: null
category: media
package-manager:
  brew: f3d
  debian: f3d
  dnf: f3d
  nix: f3d
  pacman: f3d
  scoop: extras/f3d
  ubuntu: f3d
  winget: f3d-app.f3d
  zypper: f3d
package-manager-url: https://formulae.brew.sh/formula/f3d
license: BSD-3-Clause
tags:
  - 3d-viewer
  - cli
  - desktop-viewer
  - visualization
  - vtk
description: Fast and minimalist 3D viewer
executables:
  - f3d
provenance:
  formula: f3d
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
