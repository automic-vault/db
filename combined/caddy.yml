  dnf: caddy
  macports: caddy
  nix: caddy
  pacman: caddy
  scoop: main/caddy
  ubuntu: caddy
  winget: CaddyServer.Caddy
  zypper: caddy
package-manager-url: https://formulae.brew.sh/formula/caddy
license: Apache-2.0
tags:
  - automatic-https
  - cli
  - http-server
  - reverse-proxy
  - tls
  - web-server
description: Powerful, enterprise-ready, open source web server with automatic HTTPS
executables:
  - caddy
provenance:
  formula: caddy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
