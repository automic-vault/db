id: brew:go@1.25
display-name: Go 1.25
homepage: https://go.dev/
repo: https://go.googlesource.com/go
docs:
  - https://go.dev/doc
  - https://go.dev/ref/mod
  - https://pkg.go.dev/cmd/go
config-file-location:
  linux: >
    ~/.config/go/env (default GOENV file, derived from Go docs: per-user config dir plus
    go/env)
  macos: >
    ~/Library/Application Support/go/env (default GOENV file, derived from Go docs:
    per-user config dir plus go/env)
  windows: >
    %AppData%\go\env (default GOENV file, derived from Go docs: per-user config dir plus
    go/env)
credentials-file-location: null
category: language-runtime
package-manager:
  apk: go
  brew: go@1.25
  chocolatey: go
  dnf: golang
  macports: go
  nix: go_1_25
  pacman: go
  scoop: main/go
  winget: GoLang.Go
  zypper: go1.25
package-manager-url: https://formulae.brew.sh/formula/go@1.25
license: BSD-3-Clause
tags:
  - cli
  - compiler
  - go
  - golang
  - programming-language
  - toolchain
description: Open source programming language to build simple/reliable/efficient software
executables:
  - go
  - gofmt
provenance:
  formula: go@1.25
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
