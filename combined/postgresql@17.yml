id: brew:postgresql@17
display-name: PostgreSQL 17
homepage: https://www.postgresql.org/
repo: https://git.postgresql.org/gitweb?p=postgresql.git
docs:
  - https://www.postgresql.org/docs/17/index.html
  - https://www.postgresql.org/docs/17/libpq-pgpass.html
  - https://www.postgresql.org/docs/17/runtime-config-file-locations.html
config-file-location:
  unix:
    - $PGDATA/postgresql.conf
    - $PGDATA/pg_hba.conf
    - $PGDATA/pg_ident.conf
credentials-file-location:
  unix: ~/.pgpass
  windows: '%APPDATA%\postgresql\pgpass.conf'
category: data
package-manager:
  apk: postgresql17
  brew: postgresql@17
  chocolatey: postgresql17
  debian: libecpg-compat3
  dnf: postgresql17
  macports: postgresql17
  nix: pg_checksums
  pacman: postgresql
  scoop: versions/postgresql17
  ubuntu: pg-checksums-doc
  winget: PostgreSQL.PostgreSQL.17
  zypper: postgresql17
package-manager-match:
  pacman: fallback
package-manager-url: https://formulae.brew.sh/formula/postgresql@17
license: PostgreSQL
tags:
  - cli
  - database
  - postgresql
  - rdbms
  - server
  - sql
description: Object-relational database system
executables:
  - clusterdb
  - createdb
  - createuser
  - dropdb
  - dropuser
  - ecpg
  - initdb
  - oid2name
  - pg_amcheck
  - pg_archivecleanup
  - pg_basebackup
  - pg_checksums
  - pg_combinebackup
  - pg_config
  - pg_controldata
  - pg_createsubscriber
  - pg_ctl
  - pg_dump
  - pg_dumpall
  - pg_isready
  - pg_receivewal
  - pg_recvlogical
  - pg_resetwal
  - pg_restore
  - pg_rewind
  - pg_test_fsync
  - pg_test_timing
  - pg_upgrade
  - pg_verifybackup
  - pg_waldump
  - pg_walsummary
  - pgbench
  - postgres
  - psql
  - reindexdb
  - vacuumdb
  - vacuumlo
provenance:
  formula: postgresql@17
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
