id: brew:ssh-copy-id
display-name: ssh-copy-id
homepage: https://www.openssh.com/
repo: https://github.com/openssh/openssh-portable
docs:
  - https://www.openssh.org/manual.html
  - https://github.com/openssh/openssh-portable#readme
  - https://man.openbsd.org/ssh-copy-id
config-file-location: null
credentials-file-location:
  unix:
    - ${HOME}/.ssh/id*.pub
    - ${HOME}/.ssh/id*
    - .ssh/authorized_keys
category: security
package-manager:
  brew: ssh-copy-id
  nix: ssh-copy-id
  winget: axeprpr.SSHCopyID
package-manager-url: https://formulae.brew.sh/formula/ssh-copy-id
license: SSH-OpenSSH
tags:
  - authorized-keys
  - cli
  - openssh
  - public-key-authentication
  - ssh
description: Add a public key to a remote machine's authorized_keys file
executables:
  - ssh-copy-id
provenance:
  formula: ssh-copy-id
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
