id: brew:sapling
display-name: Sapling
homepage: https://sapling-scm.com
repo: https://github.com/facebook/sapling
docs:
  - https://sapling-scm.com/docs/commands/config
  - https://sapling-scm.com/docs/introduction
  - https://sapling-scm.com/docs/introduction/getting-started
config-file-location:
  linux:
    - ~/.config/sapling/sapling.conf
    - $XDG_CONFIG_HOME/sapling/sapling.conf
