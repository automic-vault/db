  ubuntu: sl
  winget: ScaryRawr.SL
  zypper: sl
package-manager-url: https://formulae.brew.sh/formula/sapling
license: GPL-2.0-or-later
tags:
  - cli
  - git
  - mercurial
  - scm
  - source-control
  - version-control
description: Source control client
executables:
  - sl
provenance:
  formula: sapling
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
