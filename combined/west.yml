id: brew:west
display-name: west
homepage: https://github.com/zephyrproject-rtos/west
repo: https://github.com/zephyrproject-rtos/west
docs:
  - https://docs.zephyrproject.org/latest/develop/west/index.html
  - https://github.com/zephyrproject-rtos/west#readme
config-file-location:
  linux:
    - /etc/westconfig
    - ~/.westconfig
    - $XDG_CONFIG_HOME/west/config
    - <workspace-topdir>/.west/config
  macos:
    - /usr/local/etc/westconfig
    - ~/.westconfig
    - <workspace-topdir>/.west/config
  windows:
    - '%PROGRAMDATA%\west\config'
    - '%USERPROFILE%\.westconfig'
    - <workspace-topdir>\.west\config
credentials-file-location: null
category: developer-tools
package-manager:
  brew: west
  debian: west
package-manager-url: https://formulae.brew.sh/formula/west
license: Apache-2.0
tags:
  - cli
  - embedded
  - meta-tool
  - zephyr
description: Zephyr meta-tool
executables:
  - west
provenance:
  formula: west
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
