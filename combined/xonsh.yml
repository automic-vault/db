id: brew:xonsh
display-name: Xonsh
homepage: https://xon.sh
repo: https://github.com/xonsh/xonsh
docs:
  - https://xon.sh/contents.html
  - https://xon.sh/install.html
config-file-location:
  unix:
    - ~/.xonshrc
    - ~/.config/xonsh/rc.xsh
    - /etc/xonsh/xonshrc
    - ~/.config/xonsh/rc.d/
    - /etc/xonsh/rc.d/
  windows: '%ALLUSERSPROFILE%\xonsh\xonshrc'
credentials-file-location: null
category: developer-tools
package-manager:
  apk: xonsh
  brew: xonsh
  debian: xonsh
  dnf: xonsh
  macports: xonsh
  nix: xonsh
  pacman: xonsh
  ubuntu: xonsh
  zypper: xonsh
package-manager-url: https://formulae.brew.sh/formula/xonsh
license: BSD-2-Clause-Views
tags:
  - cli
  - command-prompt
  - cross-platform
  - python
  - scripting
  - shell
description: Python-powered, cross-platform, Unix-gazing shell language and command prompt
executables:
  - xonsh
  - xonsh-cat
  - xonsh-uname
  - xonsh-uptime
provenance:
  formula: xonsh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
