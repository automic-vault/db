id: brew:vivid
display-name: vivid
homepage: https://github.com/sharkdp/vivid
repo: https://github.com/sharkdp/vivid
docs:
  - https://github.com/sharkdp/vivid#readme
config-file-location:
  unix:
    - $XDG_CONFIG_HOME/vivid/filetypes.yml
    - $XDG_CONFIG_HOME/vivid/themes/*.yml
    - ~/.config/vivid/filetypes.yml
    - ~/.config/vivid/themes/*.yml
credentials-file-location: null
category: system
package-manager:
  apk: vivid
  brew: vivid
  debian: vivid
  macports: vivid
  nix: vivid
  pacman: vivid
  scoop: main/vivid
  ubuntu: vivid
  winget: sharkdp.vivid
package-manager-url: https://formulae.brew.sh/formula/vivid
license: MIT OR Apache-2.0
tags:
  - cli
  - ls-colors
  - terminal-colors
  - themes
description: Generator for LS_COLORS with support for multiple color themes
executables:
  - vivid
provenance:
  formula: vivid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
