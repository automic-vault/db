id: brew:cfssl
display-name: CFSSL
homepage: https://cfssl.org/
repo: https://github.com/cloudflare/cfssl
docs:
  - https://cfssl.org/
  - https://github.com/cloudflare/cfssl#readme
  - https://github.com/cloudflare/cfssl/tree/master/doc
config-file-location: null
credentials-file-location:
  unix:
    - ca.pem
    - ca_key.pem
category: security
package-manager:
  apk: cfssl
  brew: cfssl
  macports: cfssl
  nix: cfssl
  pacman: cfssl
  scoop: extras/cfssl
package-manager-url: https://formulae.brew.sh/formula/cfssl
license: BSD-2-Clause
tags:
  - certificates
  - cli
  - cloudflare
  - cryptography
  - pki
  - tls
description: CloudFlare's PKI toolkit
executables:
  - cfssl
  - cfssl-bundle
  - cfssl-certinfo
  - cfssl-newkey
  - cfssl-scan
  - cfssljson
  - multirootca
provenance:
  formula: cfssl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
