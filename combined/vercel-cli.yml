id: brew:vercel-cli
display-name: Vercel CLI
homepage: https://vercel.com/home
repo: https://github.com/vercel/vercel
docs:
  - https://vercel.com/docs/cli
  - https://vercel.com/docs/project-configuration
  - https://vercel.com/docs/project-configuration/global-configuration
  - https://vercel.com/docs/project-configuration/vercel-json
config-file-location:
  linux: ~/.local/share/com.vercel.cli/config.json
  macos: ~/Library/Application Support/com.vercel.cli/config.json
  windows: '%APPDATA%\Roaming\xdg.data\com.vercel.cli\config.json'
credentials-file-location:
  linux: ~/.local/share/com.vercel.cli/auth.json
  macos: ~/Library/Application Support/com.vercel.cli/auth.json
  windows: '%APPDATA%\Roaming\xdg.data\com.vercel.cli\auth.json'
category: cloud-infrastructure
package-manager:
  brew: vercel-cli
  debian: vc-dev
  macports: Vc
  nix: vc
  pacman: vc
  ubuntu: vc-dev
  zypper: Vc-devel
package-manager-url: https://formulae.brew.sh/formula/vercel-cli
license: Apache-2.0
tags:
  - cli
  - cloud
  - deployment
  - hosting
  - vercel
description: Command-line interface for Vercel
executables:
  - vc
  - vercel
provenance:
  formula: vercel-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
