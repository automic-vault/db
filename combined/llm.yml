id: brew:llm
display-name: LLM
homepage: https://llm.datasette.io/
repo: https://github.com/simonw/llm
docs:
  - https://llm.datasette.io/en/stable
config-file-location:
  linux:
    - ~/.config/io.datasette.llm/
    - ~/.config/io.datasette.llm/templates/*.yaml
    - ~/.config/io.datasette.llm/extra-openai-models.yaml
  macos:
    - ~/Library/Application Support/io.datasette.llm/
    - ~/Library/Application Support/io.datasette.llm/templates/*.yaml
    - ~/Library/Application Support/io.datasette.llm/extra-openai-models.yaml
credentials-file-location:
  linux: ~/.config/io.datasette.llm/keys.json
  macos: ~/Library/Application Support/io.datasette.llm/keys.json
category: developer-tools
package-manager:
  brew: llm
  debian: llm
  nix: llm
package-manager-url: https://formulae.brew.sh/formula/llm
license: Apache-2.0
tags:
  - ai
  - cli
  - large-language-models
  - plugins
  - python-library
description: Access large language models from the command-line
executables:
  - llm
provenance:
  formula: llm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
