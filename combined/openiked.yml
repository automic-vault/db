id: brew:openiked
display-name: OpenIKED
homepage: https://openiked.org
repo: https://github.com/openiked/openiked-portable
docs:
  - https://github.com/openiked/openiked-portable#readme
  - https://man.openbsd.org/ikectl.8
  - https://man.openbsd.org/iked.8
  - https://man.openbsd.org/iked.conf.5
  - https://openiked.org
config-file-location:
  unix:
    - /etc/iked.conf
    - /etc/examples/iked.conf
credentials-file-location:
  unix:
    - /etc/iked/private/local.key
    - /etc/iked/private/
    - /etc/iked/ca/
    - /etc/iked/certs/
    - /etc/iked/crls/
    - /etc/iked/pubkeys/
category: networking
package-manager:
  brew: openiked
  debian: openiked
  dnf: openiked
  macports: openiked
  ubuntu: openiked
package-manager-url: https://formulae.brew.sh/formula/openiked
license: ISC
tags:
  - cli
  - daemon
  - ikev2
  - ipsec
  - network-security
  - openbsd
  - vpn
description: IKEv2 daemon - portable version of OpenBSD iked
executables:
  - ikectl
  - iked
provenance:
  formula: openiked
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
