repo: https://github.com/apache/xmlgraphics-batik
docs:
  - https://xmlgraphics.apache.org/batik
  - https://xmlgraphics.apache.org/batik/javadoc
  - https://xmlgraphics.apache.org/batik/tools
  - https://xmlgraphics.apache.org/batik/using
config-file-location:
