id: brew:flexiblas
display-name: FlexiBLAS
homepage: https://www.mpi-magdeburg.mpg.de/projects/flexiblas
repo: https://gitlab.mpi-magdeburg.mpg.de/software/flexiblas-release
docs:
  - https://www.mpi-magdeburg.mpg.de/projects/flexiblas
config-file-location:
  unix:
    - CMAKE_INSTALL_PREFIX/etc/flexiblasrc
    - CMAKE_INSTALL_PREFIX/etc/flexiblasrc.d/*.conf
    - ~/.flexiblasrc
    - ~/.flexiblasrc.$(hostname)
    - $FLEXIBLAS_CONFIG
    - CMAKE_INSTALL_PREFIX/etc/flexiblasrc64
    - ~/.flexiblasrc64
credentials-file-location: null
category: science
package-manager:
  brew: flexiblas
  dnf: flexiblas
  macports: flexiblas
package-manager-url: https://formulae.brew.sh/formula/flexiblas
license: LGPL-3.0-or-later AND LGPL-2.1-or-later AND BSD-3-Clause-Open-MPI
tags:
  - blas
  - cli
  - hpc
  - lapack
  - library
  - linear-algebra
description: BLAS and LAPACK wrapper library with runtime exchangable backends
executables:
  - flexiblas
  - flexiblas-config
provenance:
  formula: flexiblas
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
