id: brew:web-ext
display-name: web-ext
homepage: https://github.com/mozilla/web-ext
repo: https://github.com/mozilla/web-ext
docs:
  - https://extensionworkshop.com/documentation/develop/getting-started-with-web-ext
  - https://extensionworkshop.com/documentation/develop/web-ext-command-reference
config-file-location:
  linux:
    - ~/.web-ext-config.mjs
    - ./web-ext-config.mjs
    - ./.web-ext-config.cjs
    - ./package.json
  macos:
    - ~/.web-ext-config.mjs
    - ./web-ext-config.mjs
    - ./.web-ext-config.cjs
    - ./package.json
  windows:
    - C:\Users\<username>\.web-ext-config.mjs
    - .\web-ext-config.mjs
    - .\.web-ext-config.cjs
    - .\package.json
credentials-file-location:
  linux:
    - ~/.web-ext-config.mjs
    - ./web-ext-config.mjs
    - ./.web-ext-config.cjs
    - ./package.json
  macos:
    - ~/.web-ext-config.mjs
    - ./web-ext-config.mjs
    - ./.web-ext-config.cjs
    - ./package.json
  windows:
    - C:\Users\<username>\.web-ext-config.mjs
    - .\web-ext-config.mjs
    - .\.web-ext-config.cjs
    - .\package.json
category: developer-tools
package-manager:
  brew: web-ext
  macports: web-ext
  nix: web-ext
package-manager-url: https://formulae.brew.sh/formula/web-ext
license: MPL-2.0
tags:
  - browser-extensions
  - cli
  - firefox
  - testing
  - webextensions
description: Command-line tool to help build, run, and test web extensions
executables:
  - web-ext
provenance:
  formula: web-ext
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
