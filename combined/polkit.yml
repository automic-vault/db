id: brew:polkit
display-name: polkit
homepage: https://github.com/polkit-org/polkit
repo: https://github.com/polkit-org/polkit
docs:
  - https://polkit.pages.freedesktop.org/polkit
config-file-location:
  linux:
    - /usr/share/polkit-1/actions/*.policy
    - /etc/polkit-1/rules.d/*.rules
    - /usr/share/polkit-1/rules.d/*.rules
credentials-file-location: null
category: system
package-manager:
  apk: polkit
  brew: polkit
  debian: pkexec
  dnf: polkit
  nix: polkit
  pacman: polkit
  ubuntu: pkexec
  zypper: libpolkit-agent-1-0
package-manager-url: https://formulae.brew.sh/formula/polkit
license: LGPL-2.0-or-later
tags:
  - authorization
  - cli
  - dbus
  - linux
  - privilege-escalation
  - system-service
description: Toolkit for defining and handling authorizations
executables:
  - pkaction
  - pkcheck
  - pkexec
  - pkttyagent
provenance:
  formula: polkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
