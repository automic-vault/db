id: brew:imagemagick-full
display-name: ImageMagick Full
homepage: https://imagemagick.org/index.php
repo: https://github.com/ImageMagick/ImageMagick
docs:
  - https://imagemagick.org/
  - https://imagemagick.org/command-line-tools
  - https://imagemagick.org/resources
  - https://imagemagick.org/security-policy
config-file-location:
  unix:
    - $MAGICK_CONFIGURE_PATH
    - $PREFIX/etc/ImageMagick-7
    - $PREFIX/share/ImageMagick-7
    - $XDG_CACHE_HOME/ImageMagick
    - ~/.config/ImageMagick
    - <client path>/etc/ImageMagick
  windows:
    - $MAGICK_CONFIGURE_PATH
    - <windows registry>
    - $PREFIX/config
    - $USERPROFILE/.config/ImageMagick
    - <client path>
credentials-file-location: null
category: media
package-manager:
  brew: imagemagick-full
  debian: python3-identify
  macports: montage
  nix: conjure
  ubuntu: python3-identify
  winget: JiriPolasek.DevNumbersforCommandPalette
package-manager-url: https://formulae.brew.sh/formula/imagemagick-full
license: ImageMagick
tags:
  - cli
  - conversion
  - graphics
  - image-processing
  - imagemagick
  - media
  - raster-images
description: Tools and libraries to manipulate images in many formats
executables:
  - Magick++-config
  - MagickCore-config
  - MagickWand-config
  - animate
  - compare
  - composite
  - conjure
  - convert
  - display
  - identify
  - import
  - magick
  - magick-script
  - mogrify
  - montage
  - stream
provenance:
  formula: imagemagick-full
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
