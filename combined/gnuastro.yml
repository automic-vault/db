id: brew:gnuastro
display-name: GNU Astronomy Utilities (Gnuastro)
homepage: https://www.gnu.org/software/gnuastro/
repo: https://git.sv.gnu.org/r/gnuastro.git
docs:
  - https://www.gnu.org/software/gnuastro/manual
category: science
package-manager:
  brew: gnuastro
  debian: gnuastro
  dnf: gnuastro
  macports: gnuastro
  nix: gnuastro
  ubuntu: gnuastro
  zypper: gnuastro
package-manager-url: https://formulae.brew.sh/formula/gnuastro
license: GPL-3.0-or-later
tags:
