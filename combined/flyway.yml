  unix: ~/flyway.conf
category: developer-tools
package-manager:
  brew: flyway
  macports: flyway
  nix: flyway
  scoop: main/flyway
package-manager-url: https://formulae.brew.sh/formula/flyway
license: Apache-2.0
tags:
  - ci-cd
  - cli
  - database-migrations
  - devops
  - schema-versioning
  - sql
description: Database version control to control migrations
executables:
  - flyway
provenance:
  formula: flyway
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
