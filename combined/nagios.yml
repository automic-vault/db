id: brew:nagios
display-name: Nagios Core
homepage: https://www.nagios.org/
repo: https://github.com/NagiosEnterprises/nagioscore
docs:
  - https://assets.nagios.com/downloads/nagioscore/docs/nagioscore/4/en
  - https://www.nagios.org/documentation
config-file-location:
  unix:
    - /usr/local/nagios/etc/nagios.cfg
    - /usr/local/nagios/etc/hosts.cfg
    - /usr/local/nagios/etc/services.cfg
    - /usr/local/nagios/etc/commands.cfg
credentials-file-location:
  unix: /usr/local/nagios/etc/resource.cfg
category: system
package-manager:
  apk: nagios
  brew: nagios
  dnf: nagios
  macports: nagios
  nix: nagios
  zypper: nagios
package-manager-url: https://formulae.brew.sh/formula/nagios
license: GPL-2.0-only
tags:
  - alerting
  - cli
  - infrastructure
  - monitoring
  - nagios
  - network-monitoring
description: Network monitoring and management system
executables:
  - archivejson.cgi
  - avail.cgi
  - cmd.cgi
  - config.cgi
  - extinfo.cgi
  - histogram.cgi
  - history.cgi
  - nagios
  - nagiostats
  - notifications.cgi
  - objectjson.cgi
  - outages.cgi
  - showlog.cgi
  - status.cgi
  - statusjson.cgi
  - statusmap.cgi
  - statuswml.cgi
  - statuswrl.cgi
  - summary.cgi
  - tac.cgi
  - trends.cgi
provenance:
  formula: nagios
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
