id: brew:kea
display-name: Kea
homepage: https://www.isc.org/kea/
repo: https://gitlab.isc.org/isc-projects/kea
docs:
  - https://kea.readthedocs.io/
  - https://www.isc.org/kea
config-file-location:
  linux:
    - /etc/kea/kea-dhcp4.conf
    - /etc/kea/kea-dhcp6.conf
    - /etc/kea/kea-dhcp-ddns.conf
    - /etc/kea/kea-ctrl-agent.conf
    - /etc/kea/keactrl.conf
  unix:
    - '[kea-install-dir]/etc/kea/kea-dhcp4.conf'
    - '[kea-install-dir]/etc/kea/kea-dhcp6.conf'
    - '[kea-install-dir]/etc/kea/kea-dhcp-ddns.conf'
    - '[kea-install-dir]/etc/kea/kea-ctrl-agent.conf'
    - '[kea-install-dir]/etc/kea/keactrl.conf'
credentials-file-location: null
category: networking
package-manager:
  apk: kea
  brew: kea
  debian: kea
  dnf: kea
  nix: kea
  pacman: kea
  ubuntu: kea
  zypper: kea
package-manager-url: https://formulae.brew.sh/formula/kea
license: MPL-2.0
tags:
  - cli
  - dhcp
  - ipv6
  - networking
  - server
description: DHCP server
executables:
  - kea-admin
  - kea-ctrl-agent
  - kea-dhcp-ddns
  - kea-dhcp4
  - kea-dhcp6
  - kea-lfc
  - kea-msg-compiler
  - kea-shell
  - keactrl
  - perfdhcp
provenance:
  formula: kea
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
