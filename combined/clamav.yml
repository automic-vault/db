id: brew:clamav
display-name: ClamAV
homepage: https://www.clamav.net/
repo: https://github.com/Cisco-Talos/clamav
docs:
  - https://docs.clamav.net/
config-file-location:
  linux:
    - /etc/clamav/freshclam.conf
    - /etc/clamav/clamd.conf
  macos:
    - /usr/local/etc/clamav/freshclam.conf
    - /usr/local/etc/clamav/clamd.conf
    - /opt/local/etc/freshclam.conf
    - /opt/local/etc/clamd.conf
  unix:
    - /usr/local/etc/freshclam.conf
    - /usr/local/etc/clamd.conf
    - /usr/local/etc/clamav-milter.conf
  windows:
    - HKEY_LOCAL_MACHINE/Software/ClamAV/ConfDir
    - C:\Program Files\ClamAV
    - C:\ClamAV
credentials-file-location: null
category: security
package-manager:
  apk: clamav
  brew: clamav
  chocolatey: clamav
  debian: clamav
  dnf: clamav
  macports: clamav
  nix: clamav
  pacman: clamav
  scoop: extras/clamav
  ubuntu: clamav
  winget: Cisco.ClamAV
  zypper: clamav
package-manager-url: https://formulae.brew.sh/formula/clamav
license: GPL-2.0-or-later
tags:
  - antivirus
  - cli
  - daemon
  - malware-detection
  - security
  - signatures
description: Anti-virus software
executables:
  - clamav-config
  - clambc
  - clamconf
  - clamd
  - clamdscan
  - clamdtop
  - clamonacc
  - clamscan
  - clamsubmit
  - freshclam
  - sigtool
provenance:
  formula: clamav
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
