id: brew:cloudflare-wrangler
display-name: Wrangler
homepage: https://developers.cloudflare.com/workers/
repo: https://github.com/cloudflare/workers-sdk
docs:
  - https://developers.cloudflare.com/workers/wrangler
config-file-location:
  macos: ~/Library/Preferences/.wrangler/config/default.toml
  unix:
    - ~/.wrangler/config/default.toml
    - ~/.config/.wrangler/config/default.toml
    - $XDG_CONFIG_HOME/.wrangler/config/default.toml
credentials-file-location:
  macos: ~/Library/Preferences/.wrangler/config/default.toml
  unix:
    - ~/.wrangler/config/default.toml
    - ~/.config/.wrangler/config/default.toml
    - $XDG_CONFIG_HOME/.wrangler/config/default.toml
category: developer-tools
package-manager:
  brew: cloudflare-wrangler
  macports: wrangler
  nix: wrangler
  pacman: wrangler
package-manager-url: https://formulae.brew.sh/formula/cloudflare-wrangler
license: Apache-2.0 OR MIT
tags:
  - cli
  - cloudflare-workers
  - deployment
  - developer-platform
  - serverless
description: CLI tool for Cloudflare Workers
executables:
  - wrangler
  - wrangler2
provenance:
  formula: cloudflare-wrangler
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
