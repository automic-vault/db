id: brew:pnpm@9
display-name: pnpm 9
homepage: https://pnpm.io/
repo: https://github.com/pnpm/pnpm
docs:
  - https://pnpm.io/
  - https://pnpm.io/cli/config
  - https://pnpm.io/npmrc
config-file-location:
  linux:
    - ~/.config/pnpm/config.yaml
    - ~/.config/pnpm/rc
  macos:
    - ~/Library/Preferences/pnpm/config.yaml
    - ~/Library/Preferences/pnpm/rc
  unix:
    - ./pnpm-workspace.yaml
    - ./.npmrc
    - $XDG_CONFIG_HOME/pnpm/config.yaml
    - $XDG_CONFIG_HOME/pnpm/rc
  windows:
    - ~/AppData/Local/pnpm/config/config.yaml
    - ~/AppData/Local/pnpm/config/rc
credentials-file-location:
  linux: ~/.config/pnpm/auth.ini
  unix:
    - ./.npmrc
    - $XDG_CONFIG_HOME/pnpm/auth.ini
    - ~/.npmrc
  windows: ~/AppData/Local/pnpm/config/auth.ini
category: developer-tools
package-manager:
  apk: pnpm
  brew: pnpm@9
  chocolatey: pnpm
  dnf: pnpm
  macports: pnpm
  nix: pnpm
  pacman: pnpm
  scoop: main/pnpm
  winget: pnpm.pnpm
  zypper: pnpm
package-manager-url: https://formulae.brew.sh/formula/pnpm@9
license: MIT
tags:
  - cli
  - javascript
  - nodejs
  - package-management
  - workspace
description: Fast, disk space efficient package manager
executables:
  - pnpm
  - pnpm@9
  - pnpx
  - pnpx@9
provenance:
  formula: pnpm@9
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
