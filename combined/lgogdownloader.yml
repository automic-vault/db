id: brew:lgogdownloader
display-name: LGOGDownloader
homepage: https://sites.google.com/site/gogdownloader/
repo: https://github.com/Sude-/lgogdownloader
docs:
  - https://github.com/Sude-/lgogdownloader#readme
config-file-location:
  unix:
    - $XDG_CONFIG_HOME/lgogdownloader/
    - ~/.config/lgogdownloader/
    - $XDG_CONFIG_HOME/lgogdownloader/blacklist.txt
