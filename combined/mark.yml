id: brew:mark
display-name: Mark
homepage: https://samizdat.dev
repo: https://github.com/kovetskiy/mark
docs:
  - https://github.com/kovetskiy/mark#readme
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/mark.toml
    - ~/.config/mark.toml
  macos: ~/Library/Application Support/mark.toml
  windows: '%AppData%\mark.toml'
credentials-file-location:
  linux:
    - $XDG_CONFIG_HOME/mark.toml
    - ~/.config/mark.toml
  macos: ~/Library/Application Support/mark.toml
  windows: '%AppData%\mark.toml'
category: productivity
package-manager:
  brew: mark
  nix: mark
package-manager-url: https://formulae.brew.sh/formula/mark
license: Apache-2.0
tags:
  - cli
  - confluence
  - documentation
  - markdown
  - publishing
  - sync
description: Sync your markdown files with Confluence pages
executables:
  - mark
provenance:
  formula: mark
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
