id: brew:arx-libertatis
display-name: Arx Libertatis
homepage: https://arx-libertatis.org/
repo: https://github.com/arx/ArxLibertatis
docs:
  - https://wiki.arx-libertatis.org/
  - https://wiki.arx-libertatis.org/FAQ
config-file-location:
  linux: ~/.config/arx/
  macos: ~/Library/Application Support/ArxLibertatis/
  windows:
    - '%USERPROFILE%\My Documents\My Games\Arx Libertatis'
    - '%USERPROFILE%\Saved Games\Arx Libertatis'
credentials-file-location: null
category: games
package-manager:
  brew: arx-libertatis
  dnf: arx-libertatis
  nix: arx-libertatis
package-manager-url: https://formulae.brew.sh/formula/arx-libertatis
license: GPL-3.0-or-later
tags:
  - arx-fatalis
  - cli
  - cross-platform
  - dungeon-crawler
  - game-engine
  - immersive-sim
  - open-source
  - role-playing-game
description: Cross-platform, open source port of Arx Fatalis
executables:
  - arx
  - arx-install-data
  - arxsavetool
  - arxunpak
provenance:
  formula: arx-libertatis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
