id: brew:liquibase
display-name: Liquibase
homepage: https://www.liquibase.org/
repo: https://github.com/liquibase/liquibase
docs:
  - https://docs.liquibase.com/
config-file-location:
  unix:
    - ./liquibase.properties
    - $LIQUIBASE_HOME/examples/<sql|xml|yaml|json>/liquibase.properties
credentials-file-location:
  unix:
    - ./liquibase.properties
    - path supplied with --driver-properties-file
category: developer-tools
package-manager:
  apk: liquibase
  brew: liquibase
  chocolatey: liquibase
  nix: liquibase
  scoop: main/liquibase
  winget: Liquibase.Liquibase
package-manager-url: https://formulae.brew.sh/formula/liquibase
license: Apache-2.0
tags:
  - change-tracking
  - cli
  - database
  - devops
  - migrations
  - schema
description: Library for database change tracking
executables:
  - liquibase
provenance:
  formula: liquibase
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
