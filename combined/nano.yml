  - console-editor
  - gnu
  - terminal
  - text-editor
description: Free (GNU) replacement for the Pico text editor
executables:
  - nano
  - rnano
provenance:
  formula: nano
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
