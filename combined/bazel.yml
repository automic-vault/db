id: brew:bazel
display-name: Bazel
homepage: https://bazel.build/
repo: https://github.com/bazelbuild/bazel
docs:
  - https://bazel.build/
  - https://bazel.build/run/bazelrc
  - https://github.com/bazelbuild/bazel
config-file-location:
  unix:
    - /etc/bazel.bazelrc
    - .bazelrc in the workspace directory
    - ~/.bazelrc
  windows:
    - '%ProgramData%\bazel.bazelrc'
    - '%USERPROFILE%\.bazelrc'
    - '%HOME%/.bazelrc'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: bazel
  chocolatey: bazel
  macports: bazel
  nix: bazel
  pacman: bazel
  scoop: main/bazel
  winget: Bazel.Bazel
  zypper: bazel8
package-manager-url: https://formulae.brew.sh/formula/bazel
license: Apache-2.0
tags:
  - build-tool
  - cli
  - google
  - monorepo
  - multi-language
description: Google's own build tool
executables:
  - bazel-9.1.0
provenance:
  formula: bazel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
