id: brew:lazyjj
display-name: lazyjj
homepage: https://github.com/Cretezy/lazyjj
repo: https://github.com/Cretezy/lazyjj
docs:
  - https://github.com/Cretezy/lazyjj/tree/main/docs
  - https://github.com/Cretezy/lazyjj#readme
config-file-location:
  linux:
    - ~/.jjconfig.toml
    - $XDG_CONFIG_HOME/jj/config.toml
    - $XDG_CONFIG_HOME/jj/conf.d/*.toml
  macos:
    - ~/.jjconfig.toml
    - $XDG_CONFIG_HOME/jj/config.toml
    - $XDG_CONFIG_HOME/jj/conf.d/*.toml
  windows:
    - '%USERPROFILE%\.jjconfig.toml'
    - '%APPDATA%\jj\config.toml'
    - '%APPDATA%\jj\conf.d\*.toml'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: lazyjj
  nix: lazyjj
  pacman: lazyjj
  winget: Cretezy.lazyjj
package-manager-url: https://formulae.brew.sh/formula/lazyjj
license: Apache-2.0
tags:
  - cli
  - jj
  - jujutsu
  - rust
  - tui
  - version-control
description: TUI for Jujutsu/jj
executables:
  - lazyjj
provenance:
  formula: lazyjj
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
