id: brew:hive
display-name: Apache Hive
homepage: https://hive.apache.org
repo: https://github.com/apache/hive
docs:
  - https://hive.apache.org/docs/latest
  - https://hive.apache.org/development/gettingstarted-latest
config-file-location:
  unix:
    - $HIVE_CONF_DIR/hive-site.xml
    - $HIVE_CONF_DIR/hivemetastore-site.xml
    - $HIVE_CONF_DIR/hiveserver2-site.xml
    - $HIVE_HOME/conf/hive-site.xml
credentials-file-location:
  unix:
    - ${user.home}/.beeline/beeline-hs2-connection.xml
    - $HIVE_CONF_DIR/beeline-hs2-connection.xml
    - /etc/hive/conf/beeline-hs2-connection.xml
  windows: ${user.home}\beeline\beeline-hs2-connection.xml
category: data
package-manager:
  brew: hive
package-manager-url: https://formulae.brew.sh/formula/hive
license: Apache-2.0
tags:
  - analytics
  - big-data
  - cli
  - data-warehouse
  - hadoop
  - sql
description: Hadoop-based data summarization, query, and analysis
executables:
  - beeline
  - hive
  - hive-config.sh
  - hiveserver2
  - hplsql
  - init-hive-dfs.sh
  - metatool
  - replstats.sh
  - schematool
provenance:
  formula: hive
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
