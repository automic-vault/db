id: brew:jenkins-lts
display-name: Jenkins LTS
homepage: https://www.jenkins.io/
repo: https://github.com/jenkinsci/jenkins
docs:
  - https://www.jenkins.io/doc
  - https://www.jenkins.io/download/lts
config-file-location:
  unix:
    - $JENKINS_HOME/config.xml
    - $JENKINS_HOME/*.xml
    - $JENKINS_HOME/jobs/[JOBNAME]/config.xml
credentials-file-location: null
category: developer-tools
package-manager:
  brew: jenkins-lts
  scoop: main/jenkins-lts
package-manager-url: https://formulae.brew.sh/formula/jenkins-lts
license: MIT
tags:
  - automation-server
  - ci-cd
  - cli
  - devops
  - java
  - jenkins
description: Extendable open source continuous integration server
executables:
  - jenkins-lts
  - jenkins-lts-cli
provenance:
  formula: jenkins-lts
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
