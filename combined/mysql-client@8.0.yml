id: brew:mysql-client@8.0
display-name: MySQL Client 8.0
homepage: https://github.com/mysql/mysql-server
repo: https://github.com/mysql/mysql-server
docs:
  - https://dev.mysql.com/doc/refman/8.0/en
  - https://dev.mysql.com/doc/refman/8.0/en/option-files.html
config-file-location:
  unix:
    - /etc/my.cnf
    - /etc/mysql/my.cnf
    - SYSCONFDIR/my.cnf
    - ~/.my.cnf
  windows:
    - '%WINDIR%\my.ini'
    - '%WINDIR%\my.cnf'
    - C:\my.ini
    - C:\my.cnf
    - '%APPDATA%\MySQL\.mylogin.cnf'
credentials-file-location:
  unix:
    - ~/.my.cnf
    - ~/.mylogin.cnf
  windows: '%APPDATA%\MySQL\.mylogin.cnf'
category: data
package-manager:
  apk: mysql
  brew: mysql-client@8.0
  chocolatey: mysql
  debian: libmysql++-dev
  dnf: mysql
  pacman: mariadb
  scoop: main/mysql
  ubuntu: mysql-client-8.0
  winget: Oracle.MySQL
  zypper: mariadb
package-manager-url: https://formulae.brew.sh/formula/mysql-client@8.0
license: GPL-2.0-only WITH Universal-FOSS-exception-1.0
tags:
  - cli
  - client
  - database
  - mysql
  - sql
description: Open source relational database management system
executables:
  - comp_err
  - lz4_decompress
  - my_print_defaults
  - mysql
  - mysql_config
  - mysql_config_editor
  - mysql_migrate_keyring
  - mysql_secure_installation
  - mysql_ssl_rsa_setup
  - mysqladmin
  - mysqlbinlog
  - mysqlcheck
  - mysqldump
  - mysqlimport
  - mysqlpump
  - mysqlshow
  - mysqlslap
  - mysqltest
  - perror
  - zlib_decompress
provenance:
  formula: mysql-client@8.0
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
