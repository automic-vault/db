id: brew:source-highlight
display-name: GNU Source-highlight
homepage: https://www.gnu.org/software/src-highlite/
repo: https://git.savannah.gnu.org/cgit/src-highlite.git
docs:
  - https://www.gnu.org/software/src-highlite/source-highlight.html
config-file-location:
  unix: ~/.source-highlight/source-highlight.conf
credentials-file-location: null
category: developer-tools
package-manager:
  apk: source-highlight
  brew: source-highlight
  debian: libsource-highlight-common
  dnf: source-highlight
  macports: source-highlight
  pacman: source-highlight
  ubuntu: libsource-highlight-common
  zypper: libsource-highlight-devel
package-manager-url: https://formulae.brew.sh/formula/source-highlight
license: GPL-3.0-or-later
tags:
  - cli
  - gnu
  - html-generation
  - source-code
  - syntax-highlighting
description: Source-code syntax highlighter
executables:
  - check-regexp
  - cpp2html
  - java2html
  - source-highlight
  - source-highlight-esc.sh
  - source-highlight-settings
  - src-hilite-lesspipe.sh
provenance:
  formula: source-highlight
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
