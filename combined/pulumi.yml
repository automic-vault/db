id: brew:pulumi
display-name: Pulumi
homepage: https://www.pulumi.com/
repo: https://github.com/pulumi/pulumi
docs:
  - https://www.pulumi.com/docs
  - https://www.pulumi.com/docs/iac/cli
  - https://www.pulumi.com/docs/iac/cli/environment-variables
  - https://www.pulumi.com/docs/iac/concepts/projects/project-file
config-file-location:
  unix: >
    ./Pulumi.yaml or ./Pulumi.yml; stack settings in ./Pulumi.<stack>.yaml or
    ./Pulumi.<stack>.yml
  windows: >
    .\Pulumi.yaml or .\Pulumi.yml; stack settings in .\Pulumi.<stack>.yaml or
    .\Pulumi.<stack>.yml
credentials-file-location:
  unix: ~/.pulumi/credentials.json
category: cloud-infrastructure
package-manager:
  apk: pulumi
  brew: pulumi
  chocolatey: pulumi
  macports: pulumi
  nix: pulumi
  pacman: pulumi
  scoop: main/pulumi
  winget: Pulumi.Pulumi
package-manager-url: https://formulae.brew.sh/formula/pulumi
license: Apache-2.0
tags:
  - automation
  - cli
  - cloud
  - devops
  - infrastructure-as-code
description: Cloud native development platform
executables:
  - pulumi
  - pulumi-language-bun
  - pulumi-language-dotnet
  - pulumi-language-go
  - pulumi-language-hcl
  - pulumi-language-java
  - pulumi-language-nodejs
  - pulumi-language-pcl
  - pulumi-language-python
  - pulumi-language-python-exec
  - pulumi-language-yaml
  - pulumi-resource-pulumi-nodejs
  - pulumi-resource-pulumi-python
  - pulumi-watch
provenance:
  formula: pulumi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
