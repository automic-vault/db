id: brew:grizzly
display-name: Grizzly
homepage: https://grafana.github.io/grizzly/
repo: https://github.com/grafana/grizzly
docs:
  - https://grafana.github.io/grizzly
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/grizzly/settings.yaml
    - ~/.config/grizzly/settings.yaml
  macos: ~/Library/Application Support/grizzly/settings.yaml
  windows: '%LOCALAPPDATA%\grizzly\settings.yaml'
credentials-file-location:
  linux:
    - $XDG_CONFIG_HOME/grizzly/settings.yaml
    - ~/.config/grizzly/settings.yaml
  macos: ~/Library/Application Support/grizzly/settings.yaml
  windows: '%LOCALAPPDATA%\grizzly\settings.yaml'
category: cloud-infrastructure
package-manager:
  brew: grizzly
  nix: grizzly
package-manager-url: https://formulae.brew.sh/formula/grizzly
license: Apache-2.0
tags:
  - cli
  - dashboards
  - grafana
  - infrastructure-as-code
  - observability
description: Command-line tool for managing and automating Grafana dashboards
executables:
  - grr
provenance:
  formula: grizzly
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
