id: brew:chdig
display-name: chdig
homepage: https://github.com/azat/chdig
repo: https://github.com/azat/chdig
docs:
  - https://github.com/azat/chdig/blob/main/Documentation/Actions.md
  - https://github.com/azat/chdig/blob/main/Documentation/FAQ.md
  - https://github.com/azat/chdig#readme
config-file-location:
  unix:
    - ./clickhouse-client.[xml|yaml|yml]
    - $XDG_CONFIG_HOME/clickhouse/config.[xml|yaml|yml]
    - ~/.config/clickhouse/config.[xml|yaml|yml]
    - ~/.clickhouse-client/config.[xml|yaml|yml]
    - /etc/clickhouse-client/config.[xml|yaml|yml]
    - path set by CLICKHOUSE_CONFIG
    - '--config'
credentials-file-location:
  unix:
    - ./clickhouse-client.[xml|yaml|yml]
    - $XDG_CONFIG_HOME/clickhouse/config.[xml|yaml|yml]
    - ~/.config/clickhouse/config.[xml|yaml|yml]
    - ~/.clickhouse-client/config.[xml|yaml|yml]
    - /etc/clickhouse-client/config.[xml|yaml|yml]
    - path set by CLICKHOUSE_CONFIG
    - '--config'
category: developer-tools
package-manager:
  brew: chdig
  scoop: extras/chdig
package-manager-url: https://formulae.brew.sh/formula/chdig
license: MIT
tags:
  - cli
  - clickhouse
  - database
  - debugging
  - flamegraphs
  - query-analysis
  - tui
description: Dig into ClickHouse with TUI interface
executables:
  - chdig
provenance:
  formula: chdig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
