id: brew:bottom
display-name: bottom
homepage: https://clementtsang.github.io/bottom/
repo: https://github.com/ClementTsang/bottom
docs:
  - https://bottom.pages.dev/stable
  - https://bottom.pages.dev/stable/configuration/config-file
config-file-location:
  linux:
    - ~/.config/bottom/bottom.toml
    - $XDG_CONFIG_HOME/bottom/bottom.toml
  macos:
    - ~/Library/Application Support/bottom/bottom.toml
    - ~/.config/bottom/bottom.toml
    - $XDG_CONFIG_HOME/bottom/bottom.toml
  windows: C:\Users\<USER>\AppData\Roaming\bottom\bottom.toml
credentials-file-location: null
category: system
package-manager:
  apk: bottom
  brew: bottom
  chocolatey: bottom
  debian: btm
  macports: bottom
  nix: bottom
  pacman: bottom
  scoop: main/bottom
  ubuntu: btm
  winget: Clement.bottom
  zypper: bottom
package-manager-url: https://formulae.brew.sh/formula/bottom
license: MIT
tags:
  - cli
  - process-monitor
  - rust
  - system-monitor
  - terminal
description: Yet another cross-platform graphical process/system monitor
executables:
  - btm
provenance:
  formula: bottom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
