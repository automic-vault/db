  chocolatey: conan
  dnf: conan
  nix: conan
  scoop: main/conan
  winget: JFrog.Conan
  zypper: conan
package-manager-url: https://formulae.brew.sh/formula/conan
license: MIT
tags:
  - build-systems
  - c
  - cli
  - cpp
  - dependency-manager
  - package-manager
  - python
description: Distributed, open source, package manager for C/C++
executables:
  - conan
provenance:
  formula: conan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
