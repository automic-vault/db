id: brew:conan
display-name: Conan
homepage: https://conan.io
repo: https://github.com/conan-io/conan
docs:
  - https://docs.conan.io/
config-file-location:
  unix:
    - ~/.conan2/global.conf
    - ~/.conan2/profiles/default
    - ~/.conan2/remotes.json
credentials-file-location:
  unix:
    - ~/.conan2/credentials.json
    - ~/.conan2/source_credentials.json
category: developer-tools
package-manager:
