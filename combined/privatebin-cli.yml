id: brew:privatebin-cli
display-name: PrivateBin CLI
homepage: https://github.com/gearnode/privatebin
repo: https://github.com/gearnode/privatebin
docs:
  - https://github.com/gearnode/privatebin#readme
  - https://github.com/gearnode/privatebin/blob/master/doc/handbook.md
config-file-location:
  macos: ~/Library/Application Support/privatebin/config.json
  unix:
    - ~/.config/privatebin/config.json
    - $XDG_CONFIG_HOME/privatebin/config.json
    - $XDG_CONFIG_DIRS/privatebin/config.json
  windows: '%AppData%\privatebin\config.json'
credentials-file-location:
  macos: ~/Library/Application Support/privatebin/config.json
  unix:
    - ~/.config/privatebin/config.json
    - $XDG_CONFIG_HOME/privatebin/config.json
    - $XDG_CONFIG_DIRS/privatebin/config.json
  windows: '%AppData%\privatebin\config.json'
category: developer-tools
package-manager:
  brew: privatebin-cli
  debian: privatebin-cli
  nix: privatebin
package-manager-url: https://formulae.brew.sh/formula/privatebin-cli
license: ISC
tags:
  - cli
  - encryption
  - pastebin
  - privatebin
  - terminal
description: CLI for creating and managing PrivateBin pastes
executables:
  - privatebin
provenance:
  formula: privatebin-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
