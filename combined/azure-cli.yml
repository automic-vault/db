id: brew:azure-cli
display-name: Azure CLI
homepage: https://docs.microsoft.com/cli/azure/overview
repo: https://github.com/Azure/azure-cli
docs:
  - https://learn.microsoft.com/en-us/cli/azure
  - https://learn.microsoft.com/en-us/cli/azure/authenticate-azure-cli?view=azure-cli-latest
  - >
    https://learn.microsoft.com/en-us/cli/azure/azure-cli-configuration?view=azure-cli-latest
config-file-location:
  unix: ~/.azure/config
  windows: '%USERPROFILE%\.azure\config'
credentials-file-location:
  unix:
    - ~/.azure/msal_token_cache.json
    - ~/.azure/service_principal_entries.json
    - ~/.azure/accessTokens.json
category: cloud-infrastructure
package-manager:
  brew: azure-cli
  chocolatey: azure-cli
  debian: azure-cli
  dnf: azure-cli
  macports: azure-cli
  nix: azure-cli
  pacman: azure-cli
  scoop: main/azure-cli
  winget: Microsoft.AzureCLI
  zypper: azure-cli
package-manager-url: https://formulae.brew.sh/formula/azure-cli
license: MIT
tags:
  - azure
  - cli
  - cloud
  - infrastructure
  - microsoft
description: Microsoft Azure CLI 2.0
executables:
  - az
provenance:
  formula: azure-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
