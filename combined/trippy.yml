id: brew:trippy
display-name: Trippy
homepage: https://trippy.rs/
repo: https://github.com/fujiapple852/trippy
docs:
  - https://trippy.rs/
config-file-location:
  unix:
    - ./trippy.toml
    - ./.trippy.toml
    - ~/trippy.toml
    - ~/.trippy.toml
    - $XDG_CONFIG_HOME/trippy.toml
    - $XDG_CONFIG_HOME/.trippy.toml
    - $XDG_CONFIG_HOME/trippy/trippy.toml
    - $XDG_CONFIG_HOME/trippy/.trippy.toml
