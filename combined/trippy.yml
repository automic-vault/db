  nix: trippy
  pacman: trippy
  scoop: main/trippy
  winget: FujiApple.Trippy
  zypper: trippy
package-manager-url: https://formulae.brew.sh/formula/trippy
license: Apache-2.0
tags:
  - cli
  - mtr
  - network-diagnostics
  - ping
  - traceroute
  - tui
description: Network diagnostic tool, inspired by mtr
executables:
  - trip
provenance:
  formula: trippy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
