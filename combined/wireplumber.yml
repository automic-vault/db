id: brew:wireplumber
display-name: WirePlumber
homepage: https://pipewire.pages.freedesktop.org/wireplumber/
repo: https://gitlab.freedesktop.org/pipewire/wireplumber
docs:
  - https://pipewire.pages.freedesktop.org/wireplumber
config-file-location:
  unix:
    - $XDG_CONFIG_HOME/wireplumber/wireplumber.conf
    - $XDG_CONFIG_HOME/wireplumber/wireplumber.conf.d/*.conf
    - $sysconfdir/wireplumber/wireplumber.conf
    - $datadir/wireplumber/wireplumber.conf
credentials-file-location: null
category: media
package-manager:
  apk: wireplumber
  brew: wireplumber
  debian: gir1.2-wp-0.5
  dnf: wireplumber
  nix: wireplumber
  pacman: wireplumber
  ubuntu: gir1.2-wp-0.4
  zypper: libwireplumber-0_5-0
package-manager-url: https://formulae.brew.sh/formula/wireplumber
license: MIT
tags:
  - audio
  - cli
  - pipewire
  - policy-manager
  - session-manager
description: Session / policy manager implementation for PipeWire
executables:
  - wireplumber
  - wpctl
  - wpexec
provenance:
  formula: wireplumber
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
