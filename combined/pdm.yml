id: brew:pdm
display-name: PDM
homepage: https://pdm-project.org
repo: https://github.com/pdm-project/pdm
docs:
  - https://pdm-project.org/en/latest
config-file-location:
  linux:
    - <PROJECT_ROOT>/pdm.toml
    - $XDG_CONFIG_HOME/pdm/config.toml
    - ~/.config/pdm/config.toml
    - $XDG_CONFIG_DIRS/pdm/config.toml
    - /etc/xdg/pdm/config.toml
    - $XDG_CONFIG_HOME/pdm/global-project/pdm.toml
  macos:
    - <PROJECT_ROOT>/pdm.toml
    - ~/Library/Application Support/pdm/config.toml
    - /Library/Application Support/pdm/config.toml
    - ~/Library/Application Support/pdm/global-project/pdm.toml
  windows:
    - <PROJECT_ROOT>\pdm.toml
    - '%USERPROFILE%\AppData\Local\pdm\pdm\config.toml'
    - '%ProgramData%\pdm\pdm\config.toml'
    - '%USERPROFILE%\AppData\Local\pdm\pdm\global-project\pdm.toml'
credentials-file-location:
  linux:
    - $XDG_CONFIG_HOME/pdm/config.toml
    - ~/.config/pdm/config.toml
  macos: ~/Library/Application Support/pdm/config.toml
  windows: '%USERPROFILE%\AppData\Local\pdm\pdm\config.toml'
category: developer-tools
package-manager:
  brew: pdm
  debian: python3-pdm
  nix: pdm
package-manager-url: https://formulae.brew.sh/formula/pdm
license: MIT
tags:
  - cli
  - dependency-management
  - package-manager
  - packaging
  - python
description: Modern Python package and dependency manager supporting the latest PEP standards
executables:
  - pdm
provenance:
  formula: pdm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
