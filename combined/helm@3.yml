id: brew:helm@3
display-name: Helm
homepage: https://helm.sh/
repo: https://github.com/helm/helm
docs:
  - https://helm.sh/docs
  - https://v3.helm.sh/docs/helm/helm
  - https://v3.helm.sh/docs/helm/helm_registry_login
config-file-location:
  linux:
    - ~/.config/helm/repositories.yaml
    - ~/.config/helm/registry/config.json
  macos:
    - ~/Library/Preferences/helm/repositories.yaml
    - ~/Library/Preferences/helm/registry/config.json
  windows:
    - '%APPDATA%\helm\repositories.yaml'
    - '%APPDATA%\helm\registry\config.json'
credentials-file-location:
  linux: ~/.config/helm/registry/config.json
  macos: ~/Library/Preferences/helm/registry/config.json
  windows: '%APPDATA%\helm\registry\config.json'
category: cloud-infrastructure
package-manager:
  apk: helm
  brew: helm@3
  debian: elpa-helm
  dnf: helm3
  macports: helm
  nix: helm
  pacman: helm
  scoop: main/helm
  ubuntu: elpa-helm
  winget: Helm.Helm
  zypper: helm3
package-manager-url: https://formulae.brew.sh/formula/helm@3
license: Apache-2.0
tags:
  - charts
  - cli
  - cncf
  - helm-charts
  - kubernetes
  - oci-registry
  - package-manager
description: Kubernetes package manager
executables:
  - helm
provenance:
  formula: helm@3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
