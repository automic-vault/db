id: brew:micasa
display-name: micasa
homepage: https://micasa.dev
repo: https://github.com/micasa-dev/micasa
docs:
  - https://micasa.dev/docs
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/micasa/config.toml
    - ~/.config/micasa/config.toml
  macos: ~/Library/Application Support/micasa/config.toml
  windows: '%APPDATA%\micasa\config.toml'
credentials-file-location:
  linux:
    - $XDG_CONFIG_HOME/micasa/config.toml
    - ~/.config/micasa/config.toml
  macos: ~/Library/Application Support/micasa/config.toml
  windows: '%APPDATA%\micasa\config.toml'
category: productivity
package-manager:
  brew: micasa
package-manager-url: https://formulae.brew.sh/formula/micasa
license: Apache-2.0
tags:
  - cli
  - home-maintenance
  - local-first
  - sqlite
  - terminal-ui
description: TUI for tracking home projects, maintenance schedules, appliances and quotes
executables:
  - micasa
provenance:
  formula: micasa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
