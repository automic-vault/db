id: brew:awscli
display-name: AWS CLI
homepage: https://aws.amazon.com/cli/
repo: https://github.com/aws/aws-cli
docs:
  - https://docs.aws.amazon.com/cli/latest/userguide
  - https://docs.aws.amazon.com/cli/latest/userguide/cli-configure-files.html
  - https://awscli.amazonaws.com/v2/documentation/api/latest/index.html
config-file-location:
  unix: ~/.aws/config
  windows: '%UserProfile%\.aws\config'
credentials-file-location:
  unix: ~/.aws/credentials
  windows: '%UserProfile%\.aws\credentials'
category: cloud-infrastructure
package-manager:
  brew: awscli
  chocolatey: awscli
  debian: awscli
  dnf: awscli2
  nix: awscli
  scoop: main/aws
  zypper: aws-cli
package-manager-url: https://formulae.brew.sh/formula/awscli
license: Apache-2.0
tags:
  - automation
  - aws
  - cli
  - cloud-management
description: Official Amazon AWS command-line interface
executables:
  - aws
  - aws_completer
provenance:
  formula: awscli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
