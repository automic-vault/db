  - chocolate-doom-setup
  - chocolate-heretic
  - chocolate-heretic-setup
  - chocolate-hexen
  - chocolate-hexen-setup
  - chocolate-server
  - chocolate-strife
  - chocolate-strife-setup
provenance:
  formula: chocolate-doom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
