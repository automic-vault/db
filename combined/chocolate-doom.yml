id: brew:chocolate-doom
display-name: Chocolate Doom
homepage: https://www.chocolate-doom.org/
repo: https://github.com/chocolate-doom/chocolate-doom
docs:
  - https://github.com/chocolate-doom/chocolate-doom#readme
  - https://www.chocolate-doom.org/wiki/index.php/Chocolate_Doom
config-file-location:
  unix:
    - SDL_GetPrefPath("", "chocolate-doom")/default.cfg
