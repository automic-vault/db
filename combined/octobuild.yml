id: brew:octobuild
display-name: octobuild
homepage: https://github.com/octobuild/octobuild
repo: https://github.com/octobuild/octobuild
docs:
  - https://github.com/octobuild/octobuild#readme
config-file-location:
  linux:
    - /etc/octobuild/octobuild.conf
    - $XDG_CONFIG_HOME/octobuild/octobuild.conf
    - ~/.config/octobuild/octobuild.conf
  macos:
    - /etc/octobuild/octobuild.conf
    - ~/Library/Application Support/octobuild/octobuild.conf
  windows:
    - '%ProgramData%\octobuild\octobuild.conf'
    - '%AppData%\octobuild\octobuild.conf'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: octobuild
  winget: octobuild.octobuild
package-manager-url: https://formulae.brew.sh/formula/octobuild
license: MIT
tags:
  - build-cache
  - cli
  - compiler-cache
  - rust
  - unreal-engine
description: Compiler cache for Unreal Engine
executables:
  - ib_console
  - octo_agent
  - octo_builder
  - octo_cl
  - octo_clang
  - octo_coordinator
  - xgConsole
provenance:
  formula: octobuild
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
