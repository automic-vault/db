id: brew:tlrc
display-name: tlrc
homepage: https://tldr.sh/tlrc/
repo: https://github.com/tldr-pages/tlrc
docs:
  - https://github.com/tldr-pages/tlrc#readme
  - https://tldr.sh/tlrc
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/tlrc/config.toml
    - ~/.config/tlrc/config.toml
  macos: ~/Library/Application Support/tlrc/config.toml
  windows: '%ROAMINGAPPDATA%\tlrc\config.toml'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: tlrc
  dnf: tldr
  macports: tlrc
  nix: tlrc
  pacman: tealdeer
  scoop: main/tlrc
  ubuntu: tldr
  winget: tldr-pages.tlrc
  zypper: tlrc
package-manager-url: https://formulae.brew.sh/formula/tlrc
license: MIT
tags:
  - cli
  - documentation
  - rust
  - terminal
  - tldr
description: Official tldr client written in Rust
executables:
  - tldr
provenance:
  formula: tlrc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
