id: brew:kotlin-language-server
display-name: Kotlin Language Server
homepage: https://github.com/fwcd/kotlin-language-server
repo: https://github.com/fwcd/kotlin-language-server
docs:
  - https://github.com/fwcd/kotlin-language-server#readme
config-file-location:
  unix:
    - '[project root]/kls-classpath'
    - '[project root]/kls-classpath.sh'
    - ~/.config/kotlin-language-server/classpath
    - ~/.config/kotlin-language-server/classpath.sh
  windows:
    - '[project root]\kls-classpath.bat'
    - '[project root]\kls-classpath.cmd'
    - '%HOMEPATH%\.config\kotlin-language-server\classpath.bat'
credentials-file-location: null
category: developer-tools
package-manager:
  apk: kotlin-language-server
  brew: kotlin-language-server
  macports: kotlin-language-server
  nix: kotlin-language-server
package-manager-url: https://formulae.brew.sh/formula/kotlin-language-server
license: MIT
tags:
  - cli
  - editor-tooling
  - kotlin
  - language-server
  - lsp
description: Intelligent Kotlin support for any editor/IDE using the Language Server Protocol
executables:
  - kotlin-language-server
provenance:
  formula: kotlin-language-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
