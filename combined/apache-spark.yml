id: brew:apache-spark
display-name: Apache Spark
homepage: https://spark.apache.org/
repo: https://github.com/apache/spark
docs:
  - https://spark.apache.org/docs/latest
  - https://spark.apache.org/docs/latest/configuration.html
config-file-location:
  unix:
    - $SPARK_HOME/conf/spark-defaults.conf
    - $SPARK_HOME/conf/spark-env.sh
    - $SPARK_HOME/conf/log4j2.properties
credentials-file-location: null
category: data
package-manager:
  brew: apache-spark
package-manager-url: https://formulae.brew.sh/formula/apache-spark
license: Apache-2.0
tags:
  - analytics
  - apache
  - cli
  - data-processing
  - distributed-computing
  - spark
description: Engine for large-scale data processing
executables:
  - docker-image-tool.sh
  - find-spark-home
  - load-spark-env.sh
  - pyspark
  - run-example
  - spark-beeline
  - spark-class
  - spark-connect-shell
  - spark-pipelines
  - spark-shell
  - spark-sql
  - spark-submit
  - sparkR
provenance:
  formula: apache-spark
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
