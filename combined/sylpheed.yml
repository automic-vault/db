id: brew:sylpheed
display-name: Sylpheed
homepage: https://sylpheed.sraoss.jp/en/
repo: https://github.com/sylpheed-mail/sylpheed
docs:
  - https://sylpheed.sraoss.jp/en/manual.html
  - https://sylpheed.sraoss.jp/en/faq.html
config-file-location:
  linux:
    - ~/.sylpheed-2.0/sylpheedrc
    - ~/.sylpheed-2.0/accountrc
  macos:
    - ~/Library/Application Support/Sylpheed/sylpheedrc
    - ~/Library/Application Support/Sylpheed/accountrc
  windows:
    - '%APPDATA%\Sylpheed\sylpheedrc'
    - '%APPDATA%\Sylpheed\accountrc'
credentials-file-location:
  linux: ~/.sylpheed-2.0/accountrc
  macos: ~/Library/Application Support/Sylpheed/accountrc
  windows: '%APPDATA%\Sylpheed\accountrc'
category: productivity
package-manager:
  brew: sylpheed
  debian: sylpheed
  dnf: sylpheed
  macports: sylpheed
  ubuntu: sylpheed
package-manager-url: https://formulae.brew.sh/formula/sylpheed
license: GPL-2.0-or-later AND LGPL-2.1-or-later AND MIT AND LicenseRef-Homebrew-public-domain
tags:
  - cli
  - desktop
  - email-client
  - gtk
  - lightweight
  - mail
description: Simple, lightweight email-client
executables:
  - sylpheed
provenance:
  formula: sylpheed
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
