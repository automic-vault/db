id: brew:coturn
display-name: coturn
homepage: https://github.com/coturn/coturn
repo: https://github.com/coturn/coturn
docs:
  - https://github.com/coturn/coturn/wiki
  - https://github.com/coturn/coturn#readme
config-file-location:
  unix:
    - turnserver.conf
    - etc/turnserver.conf
    - ../etc/turnserver.conf
    - /etc/turnserver.conf
    - /usr/local/etc/turnserver.conf
credentials-file-location:
  unix:
    - /var/db/turndb
    - /var/lib/turn/turndb
    - turnserver.conf
category: networking
package-manager:
  apk: coturn
  brew: coturn
  debian: coturn
  dnf: coturn
  nix: coturn
  pacman: coturn
  ubuntu: coturn
  zypper: coturn
package-manager-url: https://formulae.brew.sh/formula/coturn
license: BSD-3-Clause
tags:
  - cli
  - nat-traversal
  - server
  - stun
  - turn
  - webrtc
description: Free open source implementation of TURN and STUN Server
executables:
  - turnadmin
  - turnserver
  - turnutils_natdiscovery
  - turnutils_oauth
  - turnutils_peer
  - turnutils_stunclient
  - turnutils_uclient
provenance:
  formula: coturn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
