id: brew:metricbeat
display-name: Metricbeat
homepage: https://www.elastic.co/beats/metricbeat
repo: https://github.com/elastic/beats
docs:
  - https://www.elastic.co/docs/reference/beats/metricbeat
  - >
    https://www.elastic.co/docs/reference/beats/metricbeat/metricbeat-installation-configuration
config-file-location:
  linux:
    - /etc/metricbeat/metricbeat.yml
    - /etc/metricbeat/modules.d/*.yml
  unix:
    - '{path.home}/metricbeat.yml'
    - '{path.config}/modules.d/*.yml'
  windows:
    - '{path.home}\metricbeat.yml'
    - '{path.config}\modules.d\*.yml'
credentials-file-location:
  linux: /var/lib/metricbeat/metricbeat.keystore
  unix: '{path.data}/metricbeat.keystore'
  windows: '{path.data}\metricbeat.keystore'
category: system
package-manager:
  brew: metricbeat
  chocolatey: metricbeat
  nix: metricbeat
package-manager-url: https://formulae.brew.sh/formula/metricbeat
license: Apache-2.0
tags:
  - cli
  - elastic-stack
  - metrics
  - monitoring
  - observability
description: Collect metrics from your systems and services
executables:
  - metricbeat
provenance:
  formula: metricbeat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
