id: brew:oci-cli
display-name: OCI CLI
homepage: https://docs.cloud.oracle.com/iaas/Content/API/Concepts/cliconcepts.htm
repo: https://github.com/oracle/oci-cli
docs:
  - https://docs.oracle.com/en-us/iaas/Content/API/Concepts/cliconcepts.htm
  - https://docs.oracle.com/en-us/iaas/Content/API/Concepts/sdkconfig.htm
  - https://docs.oracle.com/en-us/iaas/tools/oci-cli/latest/oci_cli_docs/index.html
config-file-location:
  unix: ~/.oci/config
  windows: $Env:UserProfile\.oci\config
credentials-file-location:
  unix: ~/.oci/oci_api_key.pem
  windows: '%HOMEDRIVE%%HOMEPATH%\.oci\oci_api_key.pem'
category: cloud-infrastructure
package-manager:
  apk: oci-cli
  brew: oci-cli
  dnf: oci-cli
  macports: oci-cli
  nix: oci-cli
  scoop: main/oci-cli
  zypper: oci-cli
package-manager-url: https://formulae.brew.sh/formula/oci-cli
license: UPL-1.0 OR Apache-2.0
tags:
  - cli
  - cloud-cli
  - cloud-infrastructure
  - oci
  - oracle-cloud
description: Oracle Cloud Infrastructure CLI
executables:
  - create_backup_from_onprem
  - oci
provenance:
  formula: oci-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
