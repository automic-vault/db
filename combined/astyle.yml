id: brew:astyle
display-name: Artistic Style
homepage: https://astyle.sourceforge.net/
repo: https://gitlab.com/saalen/astyle
docs:
  - https://astyle.sourceforge.net/astyle.html
config-file-location:
  unix:
    - ~/.astylerc
    - <project>/.astylerc
    - <project>/_astylerc
  windows:
    - '%APPDATA%\astylerc'
    - <project>\.astylerc
    - <project>\_astylerc
