  brew: astyle
  chocolatey: astyle
  debian: astyle
  dnf: astyle
  macports: astyle
  nix: astyle
  pacman: astyle
  scoop: main/astyle
  ubuntu: astyle
  zypper: astyle
package-manager-url: https://formulae.brew.sh/formula/astyle
license: MIT
tags:
  - c
  - c-plus-plus
  - c-sharp
  - cli
  - code-beautifier
  - formatter
  - java
  - objective-c
description: Source code beautifier for C, C++, C#, and Java
executables:
  - astyle
provenance:
  formula: astyle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
