id: brew:gh
display-name: GitHub CLI
homepage: https://cli.github.com/
repo: https://github.com/cli/cli
docs:
  - https://docs.github.com/en/github-cli/github-cli/about-github-cli
  - https://cli.github.com/manual/gh
config-file-location:
  unix: $XDG_CONFIG_HOME/gh/config.yml or $HOME/.config/gh/config.yml
  windows: '%AppData%\GitHub CLI\config.yml'
credentials-file-location:
  unix: $XDG_CONFIG_HOME/gh/hosts.yml or $HOME/.config/gh/hosts.yml
  windows: '%AppData%\GitHub CLI\hosts.yml'
category: developer-tools
package-manager:
  brew: gh
  chocolatey: gh
  debian: gh
  dnf: gh
  macports: gh
  nix: gh
  scoop: main/gh
  ubuntu: gh
  winget: GitHub.cli
  zypper: gh
package-manager-url: https://formulae.brew.sh/formula/gh
license: MIT
tags:
  - automation
  - cli
  - developer-tools
  - git
  - github
description: GitHub command-line tool
executables:
  - gh
provenance:
  formula: gh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
