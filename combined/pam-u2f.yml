id: brew:pam-u2f
display-name: pam-u2f
homepage: https://developers.yubico.com/pam-u2f/
repo: https://github.com/Yubico/pam-u2f
docs:
  - https://developers.yubico.com/pam-u2f
config-file-location:
  unix:
    - /etc/pam.d/*
    - path supplied with pam_u2f.so conf=path/to/pam_u2f.conf
credentials-file-location:
  unix:
    - $XDG_CONFIG_HOME/Yubico/u2f_keys
    - ~/.config/Yubico/u2f_keys
    - /etc/u2f_mappings
category: security
package-manager:
  apk: pam-u2f
  brew: pam-u2f
  debian: libpam-u2f
  dnf: pam-u2f
  macports: pam-u2f
  nix: pam_u2f
  pacman: pam-u2f
  ubuntu: libpam-u2f
  zypper: pam_u2f
package-manager-url: https://formulae.brew.sh/formula/pam-u2f
license: BSD-2-Clause
tags:
  - authentication
  - cli
  - fido2
  - hardware-token
  - pam
  - u2f
description: Provides an easy way to use U2F-compliant authenticators with PAM
executables:
  - pamu2fcfg
provenance:
  formula: pam-u2f
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
