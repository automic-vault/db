id: brew:autopep8
display-name: autopep8
homepage: https://github.com/hhatto/autopep8
repo: https://github.com/hhatto/autopep8
docs:
  - https://github.com/hhatto/autopep8#readme
config-file-location:
  unix:
    - ~/.config/pycodestyle
    - setup.cfg
    - tox.ini
    - .pep8
    - .flake8
    - pyproject.toml
  windows:
    - ~\.pycodestyle
    - setup.cfg
    - tox.ini
    - .pep8
    - .flake8
    - pyproject.toml
credentials-file-location: null
category: developer-tools
package-manager:
  brew: autopep8
  debian: python3-autopep8
  pacman: autopep8
  ubuntu: python3-autopep8
package-manager-url: https://formulae.brew.sh/formula/autopep8
license: MIT
tags:
  - cli
  - formatter
  - pep8
  - python
description: Automatically formats Python code to conform to the PEP 8 style guide
executables:
  - autopep8
provenance:
  formula: autopep8
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
