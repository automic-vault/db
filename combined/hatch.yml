  dnf: hatch
  macports: hatch
  nix: hatch
  scoop: main/hatch
  winget: PyPA.Hatch
package-manager-url: https://formulae.brew.sh/formula/hatch
license: MIT
tags:
  - build-system
  - cli
  - packaging
  - project-management
  - python
  - virtual-environments
description: Modern, extensible Python project management
executables:
  - hatch
provenance:
  formula: hatch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
