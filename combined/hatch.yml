id: brew:hatch
display-name: Hatch
homepage: https://hatch.pypa.io/latest/
repo: https://github.com/pypa/hatch
docs:
  - https://hatch.pypa.io/latest
config-file-location:
  macos: ~/Library/Application Support/hatch/config.toml
  unix:
    - $XDG_CONFIG_HOME/hatch/config.toml
    - ~/.config/hatch/config.toml
  windows: '%USERPROFILE%\AppData\Local\hatch\config.toml'
credentials-file-location: null
category: developer-tools
package-manager:
