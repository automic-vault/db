id: brew:animdl
display-name: animdl
homepage: https://github.com/justfoolingaround/animdl
repo: https://github.com/justfoolingaround/animdl
docs:
  - https://github.com/justfoolingaround/animdl
config-file-location:
  unix:
    - ~/.config/animdl/config.yml
    - animdl_config.yml in the working directory
    - path specified by ANIMDL_CONFIG
  windows:
    - '%USERPROFILE%/.animdl/config.yml'
    - animdl_config.yml in the working directory
    - path specified by ANIMDL_CONFIG
credentials-file-location: null
category: media
package-manager:
  brew: animdl
  nix: animdl
package-manager-url: https://formulae.brew.sh/formula/animdl
license: GPL-3.0-only
tags:
  - anime
  - cli
  - downloader
  - streaming
description: Anime downloader and streamer
executables:
  - animdl
provenance:
  formula: animdl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
