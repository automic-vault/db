id: brew:influxdb@1
display-name: InfluxDB 1.x
homepage: https://influxdata.com/time-series-platform/influxdb/
repo: https://github.com/influxdata/influxdb
docs:
  - https://docs.influxdata.com/influxdb/v1
  - https://docs.influxdata.com/influxdb/v1/administration/config
config-file-location:
  linux: /etc/influxdb/influxdb.conf
  macos: /usr/local/etc/influxdb.conf
  windows: Same directory as influxd.exe
credentials-file-location: null
category: data
package-manager:
  brew: influxdb@1
  debian: golang-github-influxdb-influxdb-dev
  macports: influxdb
  nix: influxdb
  pacman: influxdb
  scoop: versions/influxdb1
  ubuntu: golang-github-influxdb-influxdb-dev
  zypper: influxdb
package-manager-match:
  debian: fallback
  macports: fallback
  nix: fallback
  pacman: fallback
  ubuntu: fallback
  zypper: fallback
package-manager-url: https://formulae.brew.sh/formula/influxdb@1
license: MIT
tags:
  - cli
  - database
  - events
  - metrics
  - time-series
description: Time series, events, and metrics database
executables:
  - influx
  - influx_inspect
  - influx_tools
  - influxd
provenance:
  formula: influxdb@1
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
