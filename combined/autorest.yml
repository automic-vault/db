id: brew:autorest
display-name: AutoRest
homepage: https://github.com/Azure/autorest
repo: https://github.com/Azure/autorest
docs:
  - https://github.com/Azure/autorest/blob/main/docs/generate/readme.md
  - https://github.com/Azure/autorest/blob/main/docs/user/configuration.md
  - >
    https://github.com/Azure/autorest/blob/main/docs/user/literate-file-formats/configuration.md
  - https://github.com/Azure/autorest#readme
config-file-location:
  unix:
    - ./readme.md
    - ./*.md
    - ./*.markdown
    - <config-file>.md
    - <config-file>.json
    - <config-file>.yaml
credentials-file-location: null
category: developer-tools
package-manager:
  brew: autorest
package-manager-url: https://formulae.brew.sh/formula/autorest
license: MIT
tags:
  - azure
  - cli
  - code-generation
  - openapi
  - sdk-generator
  - swagger
description: Swagger (OpenAPI) Specification code generator
executables:
  - autorest
provenance:
  formula: autorest
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
