id: brew:blast
display-name: BLAST
homepage: https://blast.ncbi.nlm.nih.gov/
repo: https://github.com/ncbi/ncbi-cxx-toolkit-public
docs:
  - https://blast.ncbi.nlm.nih.gov/doc/blast-help
  - https://blast.ncbi.nlm.nih.gov/doc/blast-help/developerinfo.html
  - https://www.ncbi.nlm.nih.gov/books/NBK279690
config-file-location:
  unix:
    - .ncbirc
    - ~/.ncbirc
    - $NCBI/.ncbirc
    - /etc/.ncbirc
  windows:
    - ncbi.ini
    - '%USERPROFILE%\ncbi.ini'
    - '%NCBI%\ncbi.ini'
