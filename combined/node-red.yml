id: brew:node-red
display-name: Node-RED
homepage: https://nodered.org/
repo: https://github.com/node-red/node-red
docs:
  - https://nodered.org/docs
config-file-location:
  unix: ~/.node-red/settings.js
  windows: '%HOMEPATH%\.node-red\settings.js'
