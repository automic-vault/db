  unix: ~/.node-red/flows_<hostname>_cred.json
  windows: '%HOMEPATH%\.node-red\flows_<hostname>_cred.json'
category: developer-tools
package-manager:
  brew: node-red
  nix: node-red
package-manager-url: https://formulae.brew.sh/formula/node-red
license: Apache-2.0
tags:
  - cli
  - event-driven
  - iot
  - low-code
  - nodejs
  - workflow-automation
description: Low-code programming for event-driven applications
executables:
  - node-red
  - node-red-pi
provenance:
  formula: node-red
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
