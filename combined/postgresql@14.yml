id: brew:postgresql@14
display-name: PostgreSQL 14
homepage: https://www.postgresql.org/
repo: https://git.postgresql.org/gitweb?p=postgresql.git
docs:
  - https://www.postgresql.org/docs/14/index.html
  - https://www.postgresql.org/docs/14/libpq-pgpass.html
  - https://www.postgresql.org/docs/14/runtime-config-file-locations.html
config-file-location:
  unix:
    - $PGDATA/postgresql.conf
    - $PGDATA/pg_hba.conf
    - $PGDATA/pg_ident.conf
credentials-file-location:
  unix: ~/.pgpass
  windows: '%APPDATA%\postgresql\pgpass.conf'
category: data
package-manager:
  brew: postgresql@14
  chocolatey: postgresql14
  debian: pg-checksums-doc
  dnf: postgresql
  macports: postgresql14
  nix: pg_checksums
  pacman: postgresql
  scoop: versions/postgresql14
  ubuntu: pg-checksums-doc
  winget: PostgreSQL.PostgreSQL.14
  zypper: postgresql14
package-manager-match:
  dnf: fallback
  pacman: fallback
package-manager-url: https://formulae.brew.sh/formula/postgresql@14
license: PostgreSQL
tags:
  - cli
  - database
  - postgresql
  - rdbms
  - server
  - sql
description: Object-relational database system
executables:
  - clusterdb
  - createdb
  - createuser
  - dropdb
  - dropuser
  - ecpg
  - initdb
  - oid2name
  - pg_amcheck
  - pg_archivecleanup
  - pg_basebackup
  - pg_checksums
  - pg_config
  - pg_controldata
  - pg_ctl
  - pg_dump
  - pg_dumpall
  - pg_isready
  - pg_receivewal
  - pg_recvlogical
  - pg_resetwal
  - pg_restore
  - pg_rewind
  - pg_test_fsync
  - pg_test_timing
  - pg_upgrade
  - pg_verifybackup
  - pg_waldump
  - pgbench
  - postgres
  - postmaster
  - psql
  - reindexdb
  - vacuumdb
  - vacuumlo
provenance:
  formula: postgresql@14
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
