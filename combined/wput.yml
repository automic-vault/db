id: brew:wput
display-name: wput
homepage: https://wput.sourceforge.net/
repo: https://sourceforge.net/p/wput/code/ci/master/tree
docs:
  - https://wput.sourceforge.net/
  - https://wput.sourceforge.net/wput.1.html
config-file-location:
  unix:
    - /etc/wputrc
    - ~/.wputrc
    - ${WPUTRC}
  windows:
    - C:\wput.ini
    - '%WPUTRC%'
credentials-file-location:
  unix:
    - ~/.netrc
    - ${PASSWORDFILE}
    - .wputpass
  windows: '%PASSWORDFILE%'
category: networking
package-manager:
  apk: wput
  brew: wput
  debian: wput
  macports: wput
  ubuntu: wput
package-manager-url: https://formulae.brew.sh/formula/wput
license: GPL-2.0-or-later
tags:
  - cli
  - file-upload
  - ftp
  - proxy
  - tls
description: Tiny, wget-like FTP client for uploading files
executables:
  - wdel
  - wput
provenance:
  formula: wput
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
