id: brew:aube
display-name: aube
homepage: https://aube.en.dev
repo: https://github.com/endevco/aube
docs:
  - https://aube.jdx.dev/
  - https://aube.jdx.dev/cli
  - https://aube.jdx.dev/package-manager/configuration.html
  - https://aube.jdx.dev/package-manager/registry-auth.html
  - https://aube.jdx.dev/settings
config-file-location:
  unix:
    - ~/.config/aube/config.toml
    - $XDG_CONFIG_HOME/aube/config.toml
    - <cwd>/.npmrc
    - <cwd>/.config/aube/config.toml
    - <project>/aube-workspace.yaml
    - <project>/pnpm-workspace.yaml
    - <project>/package.json
credentials-file-location:
  unix:
    - <project>/.npmrc
    - ~/.npmrc
    - path configured by npmrc-auth-file / npmrcAuthFile
category: developer-tools
package-manager:
  brew: aube
  nix: aube
  winget: endev.aube
package-manager-url: https://formulae.brew.sh/formula/aube
license: MIT
tags:
  - cli
  - dependency-management
  - javascript
  - nodejs
  - npm
  - package-manager
  - pnpm-compatible
  - security
description: Fast Node.js package manager
executables:
  - aube
  - aubr
  - aubx
provenance:
  formula: aube
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
