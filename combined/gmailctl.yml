id: brew:gmailctl
display-name: gmailctl
homepage: https://github.com/mbrt/gmailctl
repo: https://github.com/mbrt/gmailctl
docs:
  - https://github.com/mbrt/gmailctl#readme
config-file-location:
  unix:
    - $XDG_CONFIG_HOME/gmailctl/config.jsonnet
    - ~/.config/gmailctl/config.jsonnet
    - ~/.gmailctl/config.jsonnet
credentials-file-location:
  unix:
    - $XDG_CONFIG_HOME/gmailctl/credentials.json
    - $XDG_CONFIG_HOME/gmailctl/token.json
