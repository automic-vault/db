    - ~/.config/gmailctl/token.json
    - ~/.gmailctl/credentials.json
    - ~/.gmailctl/token.json
category: productivity
package-manager:
  brew: gmailctl
  dnf: gmailctl
  macports: gmailctl
  nix: gmailctl
package-manager-url: https://formulae.brew.sh/formula/gmailctl
license: MIT
tags:
  - automation
  - cli
  - configuration
  - email
  - filters
  - gmail
  - jsonnet
description: Declarative configuration for Gmail filters
executables:
  - gmailctl
provenance:
  formula: gmailctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
