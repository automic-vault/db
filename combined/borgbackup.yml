id: brew:borgbackup
display-name: BorgBackup
homepage: https://www.borgbackup.org/
repo: https://github.com/borgbackup/borg
docs:
  - https://borgbackup.readthedocs.io/en/stable
  - https://www.borgbackup.org/
config-file-location:
  unix:
    - <repository>/config
    - ~/.cache/borg/<repository-id>/config
credentials-file-location:
  linux: ~/.config/borg/keys/
  macos: ~/Library/Application Support/borg/keys/
  windows: C:\Users\<user>\AppData\Roaming\borg\keys\
category: system
package-manager:
  apk: borgbackup
  brew: borgbackup
  debian: borgbackup
  dnf: borgbackup
  macports: borgbackup
  nix: borgbackup
  pacman: borg
  ubuntu: borgbackup
  zypper: borgbackup
package-manager-url: https://formulae.brew.sh/formula/borgbackup
license: BSD-3-Clause
tags:
  - archive
  - backup
  - cli
  - compression
  - deduplication
  - encryption
description: Deduplicating archiver with compression and authenticated encryption
executables:
  - borg
  - borgfs
provenance:
  formula: borgbackup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
