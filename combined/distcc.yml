id: brew:distcc
display-name: distcc
homepage: https://github.com/distcc/distcc/
repo: https://github.com/distcc/distcc
docs:
  - https://github.com/distcc/distcc#readme
  - https://www.distcc.org/
config-file-location:
  unix:
    - $DISTCC_DIR/hosts
