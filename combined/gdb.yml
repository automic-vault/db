id: brew:gdb
display-name: GNU Debugger
homepage: https://www.gnu.org/software/gdb/
repo: https://sourceware.org/git/binutils-gdb.git
docs:
  - https://www.gnu.org/software/gdb/documentation
  - https://sourceware.org/gdb/current/onlinedocs/gdb
config-file-location:
  macos:
    - ~/Library/Preferences/gdb/gdbearlyinit
    - ~/.gdbearlyinit
    - ~/Library/Preferences/gdb/gdbinit
    - ~/.gdbinit
    - ./.gdbinit
  unix:
    - $XDG_CONFIG_HOME/gdb/gdbearlyinit
    - ~/.config/gdb/gdbearlyinit
    - ~/.gdbearlyinit
    - $XDG_CONFIG_HOME/gdb/gdbinit
    - ~/.config/gdb/gdbinit
    - ~/.gdbinit
    - ./.gdbinit
credentials-file-location: null
category: developer-tools
package-manager:
  apk: gdb
  brew: gdb
  debian: gdb
  dnf: gdb
  macports: gdb
  nix: gdb
  pacman: gdb
  scoop: main/gdb
  ubuntu: gdb
  zypper: gdb
package-manager-url: https://formulae.brew.sh/formula/gdb
license: GPL-3.0-or-later
tags:
  - c
  - c-plus-plus
  - cli
  - debugger
  - gdb
  - gnu
  - source-level-debugging
description: GNU debugger
executables:
  - gcore
  - gdb
  - gdb-add-index
  - gdbserver
  - gstack
provenance:
  formula: gdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
