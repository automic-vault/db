id: brew:nbdime
display-name: nbdime
homepage: https://nbdime.readthedocs.io
repo: https://github.com/jupyter/nbdime
docs:
  - https://nbdime.readthedocs.io/en/latest
config-file-location:
  unix:
    - nbdime_config.json in directories listed by `jupyter --paths`
    - ./nbdime_config.json
credentials-file-location: null
category: developer-tools
package-manager:
  brew: nbdime
  nix: nbmerge
package-manager-url: https://formulae.brew.sh/formula/nbdime
license: BSD-3-Clause
tags:
  - cli
  - diff
  - jupyter
  - merge
  - notebooks
description: Jupyter Notebook Diff and Merge tools
executables:
  - git-nbdiffdriver
  - git-nbdifftool
  - git-nbmergedriver
  - git-nbmergetool
  - hg-nbdiff
  - hg-nbdiffweb
  - hg-nbmerge
  - hg-nbmergeweb
  - nbdiff
  - nbdiff-web
  - nbdime
  - nbmerge
  - nbmerge-web
  - nbshow
provenance:
  formula: nbdime
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
