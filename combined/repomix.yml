package-manager:
  brew: repomix
  nix: repomix
package-manager-url: https://formulae.brew.sh/formula/repomix
license: MIT
tags:
  - ai
  - cli
  - code-analysis
  - llm
  - repository-packaging
description: Pack repository contents into a single AI-friendly file
executables:
  - repomix
provenance:
  formula: repomix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
