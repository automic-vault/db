    - repomix.config.json
    - ~/.config/repomix/repomix.config.ts
    - ~/.config/repomix/repomix.config.mts
    - ~/.config/repomix/repomix.config.cts
    - ~/.config/repomix/repomix.config.js
    - ~/.config/repomix/repomix.config.mjs
    - ~/.config/repomix/repomix.config.cjs
    - ~/.config/repomix/repomix.config.json5
