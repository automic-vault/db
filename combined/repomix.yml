id: brew:repomix
display-name: repomix
homepage: https://repomix.com
repo: https://github.com/yamadashy/repomix
docs:
  - https://github.com/yamadashy/repomix#readme
  - https://repomix.com/
config-file-location:
  unix:
    - repomix.config.ts
    - repomix.config.mts
    - repomix.config.cts
    - repomix.config.js
