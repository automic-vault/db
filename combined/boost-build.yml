id: brew:boost-build
display-name: B2
homepage: https://www.boost.org/build/
repo: https://github.com/boostorg/build
docs:
  - https://github.com/boostorg/build#readme
  - https://www.boost.org/doc/libs/latest/tools/build/doc/html/index.html
config-file-location:
  linux:
    - /etc/site-config.jam
    - ~/site-config.jam
    - $BOOST_BUILD_PATH/site-config.jam
    - ~/user-config.jam
    - $BOOST_BUILD_PATH/user-config.jam
    - ./project-config.jam
    - ../project-config.jam
    - ../../project-config.jam
  windows:
    - '%SystemRoot%\site-config.jam'
    - '%HOMEDRIVE%%HOMEPATH%\site-config.jam'
    - '%HOME%\site-config.jam'
    - '%BOOST_BUILD_PATH%\site-config.jam'
    - '%HOMEDRIVE%%HOMEPATH%\user-config.jam'
    - '%HOME%\user-config.jam'
    - '%BOOST_BUILD_PATH%\user-config.jam'
    - .\project-config.jam
    - ..\project-config.jam
    - ..\..\project-config.jam
credentials-file-location: null
category: developer-tools
package-manager:
  apk: boost-build
  brew: boost-build
  dnf: boost-build
  macports: boost-build
  nix: boost-build
  scoop: main/b2
package-manager-url: https://formulae.brew.sh/formula/boost-build
license: BSL-1.0
tags:
  - b2
  - boost
  - boost-build
  - build-system
  - build-tool
  - c-plus-plus
  - cli
description: C++ build system
executables:
  - b2
provenance:
  formula: boost-build
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
