id: brew:modules
display-name: Environment Modules
homepage: https://modules.sourceforge.net/
repo: https://github.com/envmodules/modules
docs:
  - https://modules.readthedocs.io/
  - https://github.com/envmodules/modules#readme
config-file-location:
  unix:
    - /etc/environment-modules/initrc
    - /etc/environment-modules/modulespath
    - /etc/environment-modules/siteconfig.tcl
    - /etc/environment-modules/rc
    - ~/.modulerc
    - <modulepath>/.modulerc
credentials-file-location: null
category: developer-tools
package-manager:
  brew: modules
  debian: environment-modules
  ubuntu: environment-modules
  zypper: Modules
package-manager-url: https://formulae.brew.sh/formula/modules
license: GPL-2.0-or-later
tags:
  - cli
  - environment-modules
  - hpc
  - modulefiles
  - shell
  - tcl
description: Dynamic modification of a user's environment via modulefiles
executables:
  - add.modules
  - envml
  - mkroot
  - modulecmd
provenance:
  formula: modules
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
