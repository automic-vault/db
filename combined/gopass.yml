id: brew:gopass
display-name: gopass
homepage: https://www.gopass.pw/
repo: https://github.com/gopasspw/gopass
docs:
  - https://github.com/gopasspw/gopass/tree/master/docs
  - https://github.com/gopasspw/gopass#readme
  - https://www.gopass.pw/
config-file-location:
  unix:
    - ~/.config/gopass/config
    - /etc/gopass/config
    - <STORE_DIR>/config
    - <STORE_DIR>/config.worktree
  windows: '%APPDATA%\gopass\config'
credentials-file-location:
  unix:
    - ~/.local/share/gopass/stores/root
    - ~/.password-store
category: security
package-manager:
  apk: gopass
  brew: gopass
  dnf: gopass
  macports: gopass
  nix: gopass
  pacman: gopass
  scoop: main/gopass
  ubuntu: golang-github-aviau-gopass-dev
  winget: gopass.gopass
  zypper: gopass
package-manager-url: https://formulae.brew.sh/formula/gopass
license: MIT
tags:
  - cli
  - git
  - gpg
  - password-manager
  - secrets
  - teams
description: Slightly more awesome Standard Unix Password Manager for Teams
executables:
  - gopass
provenance:
  formula: gopass
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
