id: brew:rootlesskit
display-name: RootlessKit
homepage: https://github.com/rootless-containers/rootlesskit
repo: https://github.com/rootless-containers/rootlesskit
docs:
  - https://github.com/rootless-containers/rootlesskit/tree/master/docs
  - https://github.com/rootless-containers/rootlesskit#readme
config-file-location:
  linux:
    - /etc/subuid
    - /etc/subgid
credentials-file-location: null
category: cloud-infrastructure
package-manager:
  apk: rootlesskit
  brew: rootlesskit
  debian: golang-github-rootless-containers-rootlesskit-dev
  dnf: rootlesskit
  nix: rootlesskit
  pacman: rootlesskit
  ubuntu: golang-github-rootless-containers-rootlesskit-dev
  zypper: rootlesskit
package-manager-url: https://formulae.brew.sh/formula/rootlesskit
license: Apache-2.0
tags:
  - cli
  - containers
  - linux
  - rootless
  - security
  - user-namespaces
description: Linux-native "fake root" for implementing rootless containers
executables:
  - rootlessctl
  - rootlesskit
provenance:
  formula: rootlesskit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
