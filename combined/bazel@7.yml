id: brew:bazel@7
display-name: Bazel 7
homepage: https://bazel.build/
repo: https://github.com/bazelbuild/bazel
docs:
  - https://bazel.build/versions/7.7.0/docs
  - https://bazel.build/versions/7.7.0/run/bazelrc
config-file-location:
  unix:
    - /etc/bazel.bazelrc
    - $workspace/.bazelrc
    - ~/.bazelrc
  windows:
    - '%ProgramData%\bazel.bazelrc'
    - '%USERPROFILE%\.bazelrc'
    - '%HOME%/.bazelrc'
credentials-file-location: null
category: developer-tools
package-manager:
  apk: bazel7
  brew: bazel@7
  chocolatey: bazel
  macports: bazel
  nix: bazel_7
  pacman: bazel
  scoop: main/bazel
  winget: Bazel.Bazel
  zypper: bazel8
package-manager-url: https://formulae.brew.sh/formula/bazel@7
license: Apache-2.0
tags:
  - bazel
  - build-system
  - cli
  - monorepo
  - multi-language
description: Google's own build tool
executables:
  - bazel
  - bazel-7.7.1
provenance:
  formula: bazel@7
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
