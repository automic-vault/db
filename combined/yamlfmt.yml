id: brew:yamlfmt
display-name: yamlfmt
homepage: https://github.com/google/yamlfmt
repo: https://github.com/google/yamlfmt
docs:
  - https://github.com/google/yamlfmt/blob/main/docs/config-file.md
  - https://github.com/google/yamlfmt#readme
config-file-location:
  unix:
    - .yamlfmt
    - yamlfmt.yml
    - yamlfmt.yaml
    - .yamlfmt.yaml
    - .yamlfmt.yml
    - $XDG_CONFIG_HOME/yamlfmt/.yamlfmt
    - ~/.config/yamlfmt/.yamlfmt
  windows: '%LOCALAPPDATA%\yamlfmt\.yamlfmt'
credentials-file-location: null
category: developer-tools
package-manager:
  apk: yamlfmt
  brew: yamlfmt
  nix: yamlfmt
  pacman: yamlfmt
  scoop: main/yamlfmt
package-manager-url: https://formulae.brew.sh/formula/yamlfmt
license: Apache-2.0
tags:
  - cli
  - configuration
  - formatter
  - go
  - yaml
description: Extensible command-line tool to format YAML files
executables:
  - yamlfmt
provenance:
  formula: yamlfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
