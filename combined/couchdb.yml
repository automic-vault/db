id: brew:couchdb
display-name: Apache CouchDB
homepage: https://couchdb.apache.org/
repo: https://github.com/apache/couchdb
docs:
  - https://docs.couchdb.org/en/stable
config-file-location:
  macos:
    - Applications/Apache CouchDB.app/Contents/Resources/couchdbx-core/etc
    - /Users/<your-user>/Library/Application Support/CouchDB2/etc/couchdb
    - /Users/<your-user>/Library/Preferences/couchdb2-local.ini
  unix:
    - etc/default.ini
    - etc/default.d/*.ini
    - etc/local.ini
    - etc/local.d/*.ini
credentials-file-location:
  macos:
    - /Users/<your-user>/Library/Application Support/CouchDB2/etc/couchdb
    - /Users/<your-user>/Library/Preferences/couchdb2-local.ini
  unix:
    - etc/local.ini
    - etc/local.d/*.ini
    - /opt/couchdb/etc/local.ini
    - /opt/couchdb/etc/local.d/10-admins.ini
category: data
package-manager:
  brew: couchdb
  macports: couchdb
  pacman: couchdb
package-manager-url: https://formulae.brew.sh/formula/couchdb
license: Apache-2.0
tags:
  - cli
  - database
  - document-database
  - http-json-api
  - nosql
  - replication
description: Apache CouchDB database server
executables:
  - couchdb
  - remsh
  - weatherreport
provenance:
  formula: couchdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
