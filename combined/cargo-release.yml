id: brew:cargo-release
display-name: cargo-release
homepage: https://github.com/crate-ci/cargo-release
repo: https://github.com/crate-ci/cargo-release
docs:
  - https://github.com/crate-ci/cargo-release/blob/master/docs/reference.md
  - https://github.com/crate-ci/cargo-release#readme
config-file-location:
  linux: ~/.config/cargo-release/release.toml
  macos: ~/Library/Application Support/cargo-release/release.toml
  unix:
    - $CRATE/Cargo.toml ([package.metadata.release])
    - $CRATE/release.toml
    - $WORKSPACE/Cargo.toml ([workspace.metadata.release])
    - $WORKSPACE/release.toml
    - ~/.release.toml
  windows: '%FOLDERID_RoamingAppData%/cargo-release/release.toml'
credentials-file-location: null
category: developer-tools
package-manager:
  apk: cargo-release
  brew: cargo-release
  nix: cargo-release
  pacman: cargo-release
package-manager-url: https://formulae.brew.sh/formula/cargo-release
license: Apache-2.0 OR MIT
tags:
  - cargo
  - cli
  - publishing
  - release-automation
  - release-management
  - rust
  - versioning
description: 'Cargo subcommand release: everything about releasing a rust crate'
executables:
  - cargo-release
provenance:
  formula: cargo-release
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
