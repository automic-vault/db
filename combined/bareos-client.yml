id: brew:bareos-client
display-name: Bareos Client
homepage: https://www.bareos.com/
repo: https://github.com/bareos/bareos
docs:
  - https://docs.bareos.org/Configuration/CustomizingTheConfiguration.html
  - https://www.bareos.com/learn/documentation
config-file-location:
  unix:
    - /etc/bareos/bareos-fd.conf
    - /etc/bareos/bareos-fd.d/
    - /etc/bareos/bconsole.conf
    - /etc/bareos/bconsole.d/
credentials-file-location:
  unix:
    - /etc/bareos/bareos-fd.conf
    - /etc/bareos/bareos-fd.d/
    - /etc/bareos/bconsole.conf
    - /etc/bareos/bconsole.d/
category: system
package-manager:
  brew: bareos-client
package-manager-url: https://formulae.brew.sh/formula/bareos-client
license: AGPL-3.0-only
tags:
  - backup
  - cli
  - client
  - daemon
  - recovery
description: Client for Bareos (Backup Archiving REcovery Open Sourced)
executables:
  - bareos-fd
  - bconsole
  - btraceback
provenance:
  formula: bareos-client
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
