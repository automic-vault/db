id: brew:jj
display-name: jj
homepage: https://github.com/jj-vcs/jj
repo: https://github.com/jj-vcs/jj
docs:
  - https://docs.jj-vcs.dev/latest
config-file-location:
  unix:
    - ~/.jjconfig.toml
    - $XDG_CONFIG_HOME/jj/config.toml
    - ~/.config/jj/config.toml
    - $XDG_CONFIG_HOME/jj/conf.d/*.toml
    - ~/.config/jj/conf.d/*.toml
    - /etc/jj/config.toml
    - /etc/jj/conf.d/*.toml
  windows: '%APPDATA%\jj\config.toml'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: jj
  macports: jj
  nix: jj
  scoop: main/jj
  winget: jj-vcs.jj
package-manager-url: https://formulae.brew.sh/formula/jj
license: Apache-2.0
tags:
  - cli
  - git-compatible
  - jujutsu
  - scm
  - version-control
description: Git-compatible distributed version control system
executables:
  - jj
provenance:
  formula: jj
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
