id: brew:dbx-cli
display-name: DBX CLI
homepage: https://dbxio.com
repo: https://github.com/t8y2/dbx
docs:
  - https://github.com/t8y2/dbx/blob/main/packages/cli/README.md
config-file-location:
  linux:
    - $DBX_DATA_DIR/dbx.db
    - ~/.local/share/com.dbx.app/dbx.db
  macos:
    - $DBX_DATA_DIR/dbx.db
    - ~/Library/Application Support/com.dbx.app/dbx.db
  windows:
    - '%DBX_DATA_DIR%\dbx.db'
    - '%APPDATA%\com.dbx.app\dbx.db'
credentials-file-location:
  linux:
    - $DBX_DATA_DIR/dbx.db
    - ~/.local/share/com.dbx.app/dbx.db
  macos:
    - $DBX_DATA_DIR/dbx.db
    - ~/Library/Application Support/com.dbx.app/dbx.db
  windows:
    - '%DBX_DATA_DIR%\dbx.db'
    - '%APPDATA%\com.dbx.app\dbx.db'
category: data
package-manager:
  brew: dbx-cli
  nix: dbx
  winget: t8y2.DBX
package-manager-url: https://formulae.brew.sh/formula/dbx-cli
license: Apache-2.0
tags:
  - cli
  - database-client
  - dbx
  - query-tool
  - schema-inspection
  - sql
description: Command-line interface for DBX database connections, schema, and safe queries
executables:
  - dbx
provenance:
  formula: dbx-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
