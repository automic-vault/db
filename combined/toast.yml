id: brew:toast
display-name: Toast
homepage: https://github.com/stepchowfun/toast
repo: https://github.com/stepchowfun/toast
docs:
  - https://github.com/stepchowfun/toast#readme
config-file-location:
  macos: ~/Library/Application Support/toast/toast.yml
  unix:
    - ./toast.yml
    - $XDG_CONFIG_HOME/toast/toast.yml
    - ~/.config/toast/toast.yml
  windows: '%APPDATA%\toast\toast.yml'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: toast
  macports: toast
  nix: toast
package-manager-url: https://formulae.brew.sh/formula/toast
license: MIT
tags:
  - cli
  - containers
  - tasks
  - workflow
  - yaml
description: Tool for running tasks in containers
executables:
  - toast
provenance:
  formula: toast
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
