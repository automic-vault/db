  - cli
  - code-quality
  - sonarcloud
  - sonarqube
  - static-analysis
description: Launcher to analyze a project with SonarQube
executables:
  - sonar-scanner
provenance:
  formula: sonar-scanner
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
