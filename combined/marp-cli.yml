id: brew:marp-cli
display-name: Marp CLI
homepage: https://github.com/marp-team/marp-cli
repo: https://github.com/marp-team/marp-cli
docs:
  - https://github.com/marp-team/marp-cli#readme
  - https://marp.app/
config-file-location:
  unix:
    - marp.config.js
    - marp.config.mjs
    - marp.config.cjs
    - marp.config.ts
    - .marprc
    - .marprc.json
    - .marprc.yaml
    - .marprc.yml
