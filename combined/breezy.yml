id: brew:breezy
display-name: Breezy
homepage: https://www.breezy-vcs.org/
repo: https://github.com/breezy-team/breezy
docs:
  - https://www.breezy-vcs.org/doc/en
  - https://www.breezy-vcs.org/doc/en/user-reference/authentication-help.html
  - https://www.breezy-vcs.org/doc/en/user-reference/configuration-help.html
config-file-location:
  unix:
    - ~/.config/breezy/breezy.conf
    - ~/.config/breezy/locations.conf
    - .bzr/branch/branch.conf
credentials-file-location:
  unix: ~/.config/breezy/authentication.conf
category: developer-tools
package-manager:
  apk: breezy
  brew: breezy
  chocolatey: bzr
  debian: brz
  dnf: breezy
  macports: bzr
  nix: breezy
  pacman: breezy
  ubuntu: brz
package-manager-url: https://formulae.brew.sh/formula/breezy
license: GPL-2.0-or-later
tags:
  - bazaar
  - brz
  - cli
  - distributed-vcs
  - git-support
  - python
  - version-control
description: Version control system implemented in Python with multi-format support
executables:
  - brz
  - bzr
  - bzr-receive-pack
  - bzr-upload-pack
  - git-remote-bzr
provenance:
  formula: breezy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
