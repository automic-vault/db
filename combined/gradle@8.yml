id: brew:gradle@8
display-name: Gradle 8
homepage: https://www.gradle.org/
repo: https://github.com/gradle/gradle
docs:
  - https://docs.gradle.org/8.14.3/dsl
  - https://docs.gradle.org/8.14.3/release-notes.html
  - https://docs.gradle.org/8.14.3/userguide/userguide.html
config-file-location:
  unix:
    - $GRADLE_USER_HOME/gradle.properties
    - ./gradle.properties
    - $GRADLE_HOME/gradle.properties
    - settings.gradle
    - settings.gradle.kts
    - build.gradle
    - build.gradle.kts
credentials-file-location: null
category: developer-tools
package-manager:
  apk: gradle
  brew: gradle@8
  chocolatey: gradle
  debian: gradle
  macports: gradle
  nix: gradle_8
  pacman: gradle
  scoop: main/gradle
  ubuntu: gradle
package-manager-url: https://formulae.brew.sh/formula/gradle@8
license: Apache-2.0
tags:
  - build-automation
  - build-tool
  - cli
  - groovy
  - jvm
  - kotlin
description: Open-source build automation tool based on the Groovy and Kotlin DSL
executables:
  - gradle
provenance:
  formula: gradle@8
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
