id: brew:openshift-cli
display-name: OpenShift CLI
homepage: https://www.openshift.com/
repo: https://github.com/openshift/oc
docs:
  - >
    https://docs.redhat.com/en/documentation/openshift_container_platform/latest/html/cli_tools/openshift-cli-oc
config-file-location: null
credentials-file-location:
  unix: ${HOME}/.kube/config
  windows: '%USERPROFILE%\.kube\config'
category: cloud-infrastructure
package-manager:
  brew: openshift-cli
  chocolatey: openshift-cli
  macports: oc
  zypper: oc
package-manager-url: https://formulae.brew.sh/formula/openshift-cli
license: Apache-2.0
tags:
  - cli
  - container-platform
  - kubernetes
  - openshift
  - red-hat
description: OpenShift command-line interface tools
executables:
  - oc
provenance:
  formula: openshift-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
