id: brew:biome
display-name: Biome
homepage: https://biomejs.dev/
repo: https://github.com/biomejs/biome
docs:
  - https://biomejs.dev/guides/configure-biome
  - https://biomejs.dev/guides/getting-started
  - https://biomejs.dev/reference/configuration
config-file-location:
  linux:
    - biome.json, biome.jsonc, .biome.json,
    - .biome.jsonc in the current working directory
    - parent folders
    - $XDG_CONFIG_HOME/biome
    - ~/.config/biome
  macos:
    - biome.json, biome.jsonc, .biome.json,
    - .biome.jsonc in the current working directory
    - parent folders
    - /Users/$USER/Library/Application Support/biome
  windows:
    - biome.json, biome.jsonc, .biome.json,
    - .biome.jsonc in the current working directory
    - parent folders
    - C:\Users\$USER\AppData\Roaming\biome\config
credentials-file-location: null
category: developer-tools
package-manager:
  apk: biome
  brew: biome
  nix: biome
  pacman: biome
  scoop: main/biome
  winget: BiomeJS.Biome
  zypper: biome
package-manager-url: https://formulae.brew.sh/formula/biome
license: Apache-2.0 OR MIT
tags:
  - cli
  - formatter
  - linter
  - web
description: Toolchain of the web
executables:
  - biome
provenance:
  formula: biome
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
