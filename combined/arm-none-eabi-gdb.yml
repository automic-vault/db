id: brew:arm-none-eabi-gdb
display-name: arm-none-eabi-gdb
homepage: https://www.gnu.org/software/gdb/
repo: https://sourceware.org/git/binutils-gdb.git
docs:
  - https://sourceware.org/gdb/documentation
  - https://sourceware.org/gdb/current/onlinedocs/gdb.html
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/gdb/gdbearlyinit
    - ~/.config/gdb/gdbearlyinit
    - ~/.gdbearlyinit
    - system.gdbinit
    - system.gdbinit.d
    - $XDG_CONFIG_HOME/gdb/gdbinit
    - ~/.config/gdb/gdbinit
    - ~/.gdbinit
    - .gdbinit
  macos:
    - ~/Library/Preferences/gdb/gdbearlyinit
    - ~/.gdbearlyinit
    - system.gdbinit
    - system.gdbinit.d
    - ~/Library/Preferences/gdb/gdbinit
    - ~/.gdbinit
    - .gdbinit
credentials-file-location: null
category: developer-tools
package-manager:
  brew: arm-none-eabi-gdb
  macports: arm-none-eabi-gdb
  pacman: arm-none-eabi-gdb
package-manager-url: https://formulae.brew.sh/formula/arm-none-eabi-gdb
license: GPL-3.0-or-later
tags:
  - arm
  - cli
  - cross-debugging
  - debugger
  - embedded
  - gdb
description: GNU debugger for arm-none-eabi cross development
executables:
  - arm-none-eabi-gdb
  - arm-none-eabi-gdb-add-index
  - arm-none-eabi-gstack
provenance:
  formula: arm-none-eabi-gdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
