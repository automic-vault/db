id: brew:docker-credential-helper-ecr
display-name: Amazon ECR Docker Credential Helper
homepage: https://github.com/awslabs/amazon-ecr-credential-helper
repo: https://github.com/awslabs/amazon-ecr-credential-helper
docs:
  - https://github.com/awslabs/amazon-ecr-credential-helper#readme
config-file-location:
  linux:
    - /home/<username>/.docker/config.json
    - /root/.docker/config.json
  unix:
    - ~/.docker/config.json
    - ~/.aws/config
  windows:
    - C:\Users\<username>\.docker\config.json
    - C:\Windows\System32\config\systemprofile\.docker\config.json
credentials-file-location:
  unix: ~/.aws/credentials
category: developer-tools
package-manager:
  apk: docker-credential-ecr-login
  brew: docker-credential-helper-ecr
  macports: docker-credential-helper-ecr
package-manager-url: https://formulae.brew.sh/formula/docker-credential-helper-ecr
license: Apache-2.0
tags:
  - amazon-ecr
  - aws
  - cli
  - containers
  - credentials
  - docker
description: Docker Credential Helper for Amazon ECR
executables:
  - docker-credential-ecr-login
provenance:
  formula: docker-credential-helper-ecr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
