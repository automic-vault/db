id: brew:mysql-client
display-name: MySQL Client
homepage: https://github.com/mysql/mysql-server
repo: https://github.com/mysql/mysql-server
docs:
  - https://dev.mysql.com/doc
  - https://dev.mysql.com/doc/refman/en
  - https://dev.mysql.com/doc/refman/en/option-files.html
config-file-location:
  unix: ~/.my.cnf
credentials-file-location:
  unix: ~/.my.cnf
category: data
package-manager:
  apk: mysql-client
  brew: mysql-client
  chocolatey: mysql
  debian: libmysql++-dev
  dnf: mysql
  pacman: mariadb
  scoop: main/mysql
  ubuntu: mysql-client
  winget: Oracle.MySQL
  zypper: mariadb-client
package-manager-url: https://formulae.brew.sh/formula/mysql-client
license: GPL-2.0-only WITH Universal-FOSS-exception-1.0
tags:
  - cli
  - client
  - database
  - mysql
  - sql
description: Open source relational database management system
executables:
  - comp_err
  - my_print_defaults
  - mysql
  - mysql_config
  - mysql_config_editor
  - mysql_migrate_keyring
  - mysql_secure_installation
  - mysqladmin
  - mysqlbinlog
  - mysqlcheck
  - mysqldump
  - mysqlimport
  - mysqlshow
  - mysqlslap
  - mysqltest
  - perror
provenance:
  formula: mysql-client
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
