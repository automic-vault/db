  - cloud-management
  - shell
description: Integrated shell for working with the AWS CLI
executables:
  - aws-shell
  - aws-shell-mkindex
provenance:
  formula: aws-shell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
