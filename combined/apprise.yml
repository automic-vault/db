id: brew:apprise
display-name: Apprise
homepage: https://pypi.org/project/apprise/
repo: https://github.com/caronc/apprise
docs:
  - https://appriseit.com/
  - https://appriseit.com/config
  - https://appriseit.com/dev
  - https://appriseit.com/guides
config-file-location:
  unix:
    - ~/.apprise
    - ~/.apprise.conf
    - ~/.apprise.yml
    - ~/.apprise.yaml
    - ~/.config/apprise
    - ~/.config/apprise.conf
    - ~/.config/apprise.yml
    - ~/.config/apprise.yaml
    - /etc/apprise
    - /etc/apprise.conf
    - /etc/apprise.yml
    - /etc/apprise.yaml
    - /etc/apprise/apprise.conf
    - /etc/apprise/apprise.yml
    - /etc/apprise/apprise.yaml
  windows:
    - '%APPDATA%/Apprise/apprise'
    - '%APPDATA%/Apprise/apprise.conf'
    - '%APPDATA%/Apprise/apprise.yml'
    - '%APPDATA%/Apprise/apprise.yaml'
    - '%LOCALAPPDATA%/Apprise/apprise'
    - '%LOCALAPPDATA%/Apprise/apprise.conf'
    - '%LOCALAPPDATA%/Apprise/apprise.yml'
    - '%LOCALAPPDATA%/Apprise/apprise.yaml'
credentials-file-location: null
category: networking
package-manager:
  apk: apprise
  brew: apprise
  debian: apprise
  dnf: apprise
  nix: apprise
  pacman: apprise
  ubuntu: apprise
package-manager-url: https://formulae.brew.sh/formula/apprise
license: BSD-3-Clause
tags:
  - automation
  - cli
  - notifications
  - webhooks
description: Send notifications from the command-line to popular notification services
executables:
  - apprise
provenance:
  formula: apprise
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
