id: brew:avahi
display-name: Avahi
homepage: https://avahi.org
repo: https://github.com/avahi/avahi
docs:
  - https://avahi.org/
  - https://avahi.org/doxygen/html
  - https://github.com/avahi/avahi#readme
config-file-location:
  unix:
    - /etc/avahi/avahi-daemon.conf
    - /etc/avahi/services/*.service
    - ~/.config/avahi/browse-domains
credentials-file-location: null
category: networking
package-manager:
  apk: avahi
  brew: avahi
  debian: avahi-autoipd
  dnf: avahi
  macports: avahi
  nix: avahi
  pacman: avahi
  ubuntu: avahi-autoipd
  zypper: avahi
package-manager-url: https://formulae.brew.sh/formula/avahi
license: LGPL-2.1-or-later
tags:
  - cli
  - dns-sd
  - mdns
  - networking
  - service-discovery
  - zeroconf
description: Service Discovery for Linux using mDNS/DNS-SD
executables:
  - avahi-autoipd
  - avahi-browse
  - avahi-browse-domains
  - avahi-daemon
  - avahi-dnsconfd
  - avahi-publish
  - avahi-publish-address
  - avahi-publish-service
  - avahi-resolve
  - avahi-resolve-address
  - avahi-resolve-host-name
  - avahi-set-host-name
provenance:
  formula: avahi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
