id: brew:gnupg
display-name: GnuPG
homepage: https://gnupg.org/
repo: https://dev.gnupg.org/source/gnupg.git
docs:
  - https://gnupg.org/documentation/index.html
  - https://gnupg.org/documentation/manuals/gnupg
config-file-location:
  unix:
    - ~/.gnupg/gpg.conf
    - ~/.gnupg/gpg-agent.conf
    - ~/.gnupg/dirmngr.conf
    - ~/.gnupg/common.conf
credentials-file-location:
  unix:
    - ~/.gnupg/private-keys-v1.d/
    - ~/.gnupg/secring.gpg
    - ~/.gnupg/trustdb.gpg
category: security
package-manager:
  apk: gnupg
  brew: gnupg
  chocolatey: gnupg
  debian: gnupg
  dnf: gnupg2
  nix: gnupg
  pacman: gnupg
  scoop: main/gnupg
  ubuntu: gnupg
  winget: GnuPG.GnuPG
  zypper: gpg2
package-manager-url: https://formulae.brew.sh/formula/gnupg
license: GPL-3.0-or-later
tags:
  - cli
  - encryption
  - gnu
  - key-management
  - openpgp
  - signing
description: GNU Privacy Guard (OpenPGP)
executables:
  - addgnupghome
  - applygnupgdefaults
  - dirmngr
  - dirmngr-client
  - gpg
  - gpg-agent
  - gpg-authcode-sign.sh
  - gpg-card
  - gpg-connect-agent
  - gpg-mail-tube
  - gpg-wks-client
  - gpg-wks-server
  - gpgconf
  - gpgparsemail
  - gpgscm
  - gpgsm
  - gpgsplit
  - gpgtar
  - gpgv
  - kbxutil
  - watchgnupg
provenance:
  formula: gnupg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
