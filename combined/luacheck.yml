id: brew:luacheck
display-name: Luacheck
homepage: https://luacheck.readthedocs.io/
repo: https://github.com/lunarmodules/luacheck
docs:
  - https://luacheck.readthedocs.io/
config-file-location:
  macos: ~/Library/Application Support/Luacheck/.luacheckrc
  unix:
    - .luacheckrc
    - $XDG_CONFIG_HOME/luacheck/.luacheckrc
    - ~/.config/luacheck/.luacheckrc
  windows: '%LOCALAPPDATA%\Luacheck\.luacheckrc'
credentials-file-location: null
category: developer-tools
package-manager:
  apk: luacheck
  brew: luacheck
  debian: lua-check
  pacman: luacheck
  scoop: main/luacheck
  ubuntu: lua-check
  zypper: lua53-luacheck
package-manager-url: https://formulae.brew.sh/formula/luacheck
license: MIT
tags:
  - cli
  - code-quality
  - linter
  - lua
  - static-analysis
description: Tool for linting and static analysis of Lua code
executables:
  - luacheck
provenance:
  formula: luacheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
