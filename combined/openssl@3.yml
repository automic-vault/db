id: brew:openssl@3
display-name: OpenSSL 3
homepage: https://openssl-library.org
repo: https://github.com/openssl/openssl
docs:
  - https://docs.openssl.org/3.6/man1/openssl
  - https://docs.openssl.org/3.6/man5/config
config-file-location:
  unix: $OPENSSLDIR/openssl.cnf
credentials-file-location:
  unix:
    - ~/.ssl
    - ~/.certs
    - ~/certs
    - ~/.config/openssl
category: security
package-manager:
  apk: libssl3
  brew: openssl@3
  chocolatey: openssl
  debian: libssl-dev
  dnf: openssl
  macports: openssl3
  nix: openssl
  pacman: openssl
  scoop: main/openssl
  ubuntu: libssl-dev
  winget: ShiningLight.OpenSSL.Dev
  zypper: libopenssl-3-devel
package-manager-url: https://formulae.brew.sh/formula/openssl@3
license: Apache-2.0
tags:
  - certificates
  - cli
  - cryptography
  - ssl
  - tls
description: Cryptography and SSL/TLS Toolkit
executables:
  - c_rehash
  - openssl
provenance:
  formula: openssl@3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
