id: brew:biodiff
display-name: biodiff
homepage: https://github.com/8051Enthusiast/biodiff
repo: https://github.com/8051Enthusiast/biodiff
docs:
  - https://github.com/8051Enthusiast/biodiff#readme
config-file-location:
  linux:
    - $BIODIFF_CONFIG_DIR/config.json
    - $XDG_CONFIG_HOME/biodiff/config.json
    - ~/.config/biodiff/config.json
  macos:
    - $BIODIFF_CONFIG_DIR/config.json
    - ~/Library/Application Support/biodiff/config.json
  windows:
    - '%BIODIFF_CONFIG_DIR%\config.json'
    - '%APPDATA%\biodiff\config.json'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: biodiff
  nix: biodiff
  pacman: biodiff
  scoop: main/biodiff
  winget: 8051Enthusiast.biodiff
  zypper: biodiff
package-manager-url: https://formulae.brew.sh/formula/biodiff
license: MIT
tags:
  - cli
  - diff
  - hex
  - reverse-engineering
  - terminal
description: Hex diff viewer using alignment algorithms from biology
executables:
  - biodiff
  - git-biodiff
provenance:
  formula: biodiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
