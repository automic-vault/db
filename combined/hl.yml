id: brew:hl
display-name: hl
homepage: https://github.com/pamburus/hl
repo: https://github.com/pamburus/hl
docs:
  - https://github.com/pamburus/hl#readme
config-file-location:
  linux:
    - /etc/hl/config.{yaml,toml,json}
    - ~/.config/hl/config.{yaml,toml,json}
  macos:
    - /etc/hl/config.{yaml,toml,json}
    - ~/.config/hl/config.{yaml,toml,json}
  windows:
    - '%PROGRAMDATA%\hl\config.{yaml,toml,json}'
    - '%USERPROFILE%\AppData\Roaming\hl\config.{yaml,toml,json}'
credentials-file-location: null
category: developer-tools
package-manager:
  brew: hl
  pacman: hl
  scoop: main/hl
package-manager-url: https://formulae.brew.sh/formula/hl
license: MIT
tags:
  - cli
  - json-logs
  - log-viewer
  - logfmt
  - logs
description: Fast and powerful log viewer and processor
executables:
  - hl
provenance:
  formula: hl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
