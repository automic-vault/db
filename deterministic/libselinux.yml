  - selabel_digest
  - selabel_get_digests_all_partial_matches
  - selabel_lookup
  - selabel_lookup_best_match
  - selabel_partial_match
  - selinux_check_access
  - selinux_check_securetty_context
  - selinuxenabled
  - selinuxexeccon
  - setenforce
  - setfilecon
  - togglesebool
  - validatetrans
provenance:
  formula: libselinux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
