id: brew:helix
display-name: helix
homepage: https://helix-editor.com
repo: https://github.com/helix-editor/helix
docs: https://helix-editor.com
package-manager:
  apk: helix
  brew: helix
  chocolatey: helix
  debian: hx
  dnf: helix
  macports: helix
  nix: helix
  pacman: helix
  scoop: main/helix
  winget: Helix.Helix
  zypper: helix
package-manager-url: https://formulae.brew.sh/formula/helix
version: 25.07.1
license: MPL-2.0
category: development
tags:
  - cli
description: Post-modern modal text editor
source-archive: >
  https://github.com/helix-editor/helix/releases/download/25.07.1/helix-25.07.1-source.tar.xz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add helix
  av: sudo av install brew:helix
  brew: brew install helix
  chocolatey: choco install helix
  debian: sudo apt install hx
  dnf: sudo dnf install helix
  macports: sudo port install helix
  nix: nix profile install nixpkgs#helix
  pacman: sudo pacman -S helix
  scoop: scoop install main/helix
  winget: winget install --id Helix.Helix -e
  zypper: sudo zypper install helix
provenance:
  formula: helix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
