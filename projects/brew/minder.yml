id: brew:minder
display-name: minder
homepage: https://mindersec.github.io/
repo: https://github.com/mindersec/minder
docs: https://mindersec.github.io/
package-manager:
  brew: minder
  debian: minder
  dnf: minder
  nix: minder
  pacman: minder
  ubuntu: minder
  winget: mindersec.minder
  zypper: minder
package-manager-url: https://formulae.brew.sh/formula/minder
version: 0.1.2
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for interacting with Stacklok's Minder platform
source-archive: https://github.com/mindersec/minder/archive/refs/tags/v0.1.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: minder
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:minder
  brew: brew install minder
  debian: sudo apt install minder
  dnf: sudo dnf install minder
  nix: nix profile install nixpkgs#minder
  pacman: sudo pacman -S minder
  ubuntu: sudo apt install minder
  winget: winget install --id mindersec.minder -e
  zypper: sudo zypper install minder
provenance:
  formula: minder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
