id: brew:easy-rsa
display-name: easy-rsa
homepage: https://github.com/OpenVPN/easy-rsa
repo: https://github.com/OpenVPN/easy-rsa
docs: https://github.com/OpenVPN/easy-rsa
package-manager:
  apk: easy-rsa
  brew: easy-rsa
  debian: easy-rsa
  dnf: easy-rsa
  macports: easy-rsa
  nix: easyrsa
  pacman: easy-rsa
  scoop: extras/easyrsa
  ubuntu: easy-rsa
  zypper: easy-rsa
package-manager-url: https://formulae.brew.sh/formula/easy-rsa
version: 3.2.6
license: GPL-2.0-only
category: development
tags:
  - cli
description: CLI utility to build and manage a PKI CA
source-archive: https://github.com/OpenVPN/easy-rsa/releases/download/v3.2.6/EasyRSA-3.2.6.tgz
dependencies:
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: easyrsa
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    By default, keys will be created in: $HOMEBREW_PREFIX/etc/easy-rsa/pki The
    configuration may be modified by editing and renaming:
    $HOMEBREW_PREFIX/etc/easy-rsa/vars.example
  post-install-defined: false
install-lines:
  apk: sudo apk add easy-rsa
  av: sudo av install brew:easy-rsa
  brew: brew install easy-rsa
  debian: sudo apt install easy-rsa
  dnf: sudo dnf install easy-rsa
  macports: sudo port install easy-rsa
  nix: nix profile install nixpkgs#easyrsa
  pacman: sudo pacman -S easy-rsa
  scoop: scoop install extras/easyrsa
  ubuntu: sudo apt install easy-rsa
  zypper: sudo zypper install easy-rsa
provenance:
  formula: easy-rsa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
