id: brew:gpg-tui
display-name: gpg-tui
homepage: https://github.com/orhun/gpg-tui
repo: https://github.com/orhun/gpg-tui
docs: https://github.com/orhun/gpg-tui
package-manager:
  apk: gpg-tui
  brew: gpg-tui
  macports: gpg-tui
  nix: gpg-tui
  pacman: gpg-tui
  zypper: gpg-tui
package-manager-url: https://formulae.brew.sh/formula/gpg-tui
version: 0.11.2
license: MIT
category: development
tags:
  - cli
description: Manage your GnuPG keys with ease!
source-archive: https://github.com/orhun/gpg-tui/archive/refs/tags/v0.11.2.tar.gz
dependencies:
  - gnupg
  - gpgme
  - libgpg-error
  - libxcb
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gpg-tui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gpg-tui
  av: sudo av install brew:gpg-tui
  brew: brew install gpg-tui
  macports: sudo port install gpg-tui
  nix: nix profile install nixpkgs#gpg-tui
  pacman: sudo pacman -S gpg-tui
  zypper: sudo zypper install gpg-tui
provenance:
  formula: gpg-tui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
