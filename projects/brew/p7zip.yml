id: brew:p7zip
display-name: p7zip
homepage: https://github.com/p7zip-project/p7zip
repo: https://github.com/p7zip-project/p7zip
docs: https://github.com/p7zip-project/p7zip
package-manager:
  brew: p7zip
  debian: p7zip
  macports: p7zip
  nix: p7zip
  ubuntu: p7zip
  winget: 7zip.7zr
package-manager-url: https://formulae.brew.sh/formula/p7zip
version: 17.06
license: LGPL-2.1-or-later AND GPL-2.0-or-later
category: development
tags:
  - cli
description: 7-Zip (high compression file archiver) implementation
source-archive: https://github.com/p7zip-project/p7zip/archive/refs/tags/v17.06.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: 7z
  - exposure: global executable
    kind: cli
    name: 7za
  - exposure: global executable
    kind: cli
    name: 7zr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:p7zip
  brew: brew install p7zip
  debian: sudo apt install p7zip
  macports: sudo port install p7zip
  nix: nix profile install nixpkgs#p7zip
  ubuntu: sudo apt install p7zip
  winget: winget install --id 7zip.7zr -e
provenance:
  formula: p7zip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
