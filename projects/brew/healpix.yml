id: brew:healpix
display-name: healpix
homepage: https://healpix.sourceforge.io
repo: >
  https://downloads.sourceforge.net/project/healpix/Healpix_3.83/Healpix_3.83_2024Nov13.tar.gz
docs: https://healpix.sourceforge.io
package-manager:
  brew: healpix
  dnf: healpix
  macports: healpix
  zypper: healpix
package-manager-url: https://formulae.brew.sh/formula/healpix
version: 3.83
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Hierarchical Equal Area isoLatitude Pixelization of a sphere
source-archive: >
  https://downloads.sourceforge.net/project/healpix/Healpix_3.83/Healpix_3.83_2024Nov13.tar.gz
dependencies:
  - cfitsio
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: alice3
  - exposure: global executable
    kind: cli
    name: alm2map_cxx
  - exposure: global executable
    kind: cli
    name: anafast_cxx
  - exposure: global executable
    kind: cli
    name: calc_powspec
  - exposure: global executable
    kind: cli
    name: compute_weights
  - exposure: global executable
    kind: cli
    name: hotspots_cxx
  - exposure: global executable
    kind: cli
    name: map2tga
  - exposure: global executable
    kind: cli
    name: median_filter_cxx
  - exposure: global executable
    kind: cli
    name: mult_alm
  - exposure: global executable
    kind: cli
    name: needlet_tool
  - exposure: global executable
    kind: cli
    name: rotalm_cxx
  - exposure: global executable
    kind: cli
    name: smoothing_cxx
  - exposure: global executable
    kind: cli
    name: syn_alm_cxx
  - exposure: global executable
    kind: cli
    name: udgrade_cxx
  - exposure: global executable
    kind: cli
    name: udgrade_harmonic_cxx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:healpix
  brew: brew install healpix
  dnf: sudo dnf install healpix
  macports: sudo port install healpix
  zypper: sudo zypper install healpix
provenance:
  formula: healpix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
