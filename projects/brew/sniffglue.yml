id: brew:sniffglue
display-name: sniffglue
homepage: https://github.com/kpcyrd/sniffglue
repo: https://github.com/kpcyrd/sniffglue
docs: https://github.com/kpcyrd/sniffglue
package-manager:
  apk: sniffglue
  brew: sniffglue
  debian: sniffglue
  macports: sniffglue
  nix: sniffglue
  pacman: sniffglue
  ubuntu: sniffglue
package-manager-url: https://formulae.brew.sh/formula/sniffglue
version: 0.16.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Secure multithreaded packet sniffer
source-archive: https://github.com/kpcyrd/sniffglue/archive/refs/tags/v0.16.2.tar.gz
build-dependencies:
  - rust
  - scdoc
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: sniffglue
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sniffglue
  av: sudo av install brew:sniffglue
  brew: brew install sniffglue
  debian: sudo apt install sniffglue
  macports: sudo port install sniffglue
  nix: nix profile install nixpkgs#sniffglue
  pacman: sudo pacman -S sniffglue
  ubuntu: sudo apt install sniffglue
provenance:
  formula: sniffglue
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
