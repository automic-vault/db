id: brew:libu2f-server
display-name: libu2f-server
homepage: https://developers.yubico.com/libu2f-server/
repo: https://developers.yubico.com/libu2f-server/Releases/libu2f-server-1.1.0.tar.xz
docs: https://developers.yubico.com/libu2f-server/
package-manager:
  apk: libu2f-server
  brew: libu2f-server
  debian: u2f-server
  dnf: libu2f-server
  macports: libu2f-server
  nix: libu2f-server
  pacman: libu2f-server
  ubuntu: u2f-server
package-manager-url: https://formulae.brew.sh/formula/libu2f-server
version: 1.1.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Server-side of the Universal 2nd Factor (U2F) protocol
source-archive: https://developers.yubico.com/libu2f-server/Releases/libu2f-server-1.1.0.tar.xz
dependencies:
  - json-c
  - openssl@3
build-dependencies:
  - check
  - gengetopt
  - help2man
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: u2f-server
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libu2f-server
  av: sudo av install brew:libu2f-server
  brew: brew install libu2f-server
  debian: sudo apt install u2f-server
  dnf: sudo dnf install libu2f-server
  macports: sudo port install libu2f-server
  nix: nix profile install nixpkgs#libu2f-server
  pacman: sudo pacman -S libu2f-server
  ubuntu: sudo apt install u2f-server
provenance:
  formula: libu2f-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
