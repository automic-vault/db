id: brew:bchunk
display-name: bchunk
homepage: http://he.fi/bchunk/
repo: https://github.com/hessu/bchunk
docs: http://he.fi/bchunk/
package-manager:
  apk: bchunk
  brew: bchunk
  debian: bchunk
  dnf: bchunk
  macports: bchunk
  nix: bchunk
  pacman: bchunk
  ubuntu: bchunk
  zypper: bchunk
package-manager-url: https://formulae.brew.sh/formula/bchunk
version: 1.2.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Convert CD images from .bin/.cue to .iso/.cdr
source-archive: https://github.com/hessu/bchunk/archive/refs/tags/release/1.2.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bchunk
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bchunk
  av: sudo av install brew:bchunk
  brew: brew install bchunk
  debian: sudo apt install bchunk
  dnf: sudo dnf install bchunk
  macports: sudo port install bchunk
  nix: nix profile install nixpkgs#bchunk
  pacman: sudo pacman -S bchunk
  ubuntu: sudo apt install bchunk
  zypper: sudo zypper install bchunk
provenance:
  formula: bchunk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
