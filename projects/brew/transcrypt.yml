id: brew:transcrypt
display-name: transcrypt
homepage: https://github.com/elasticdog/transcrypt
repo: https://github.com/elasticdog/transcrypt
docs: https://github.com/elasticdog/transcrypt
package-manager:
  brew: transcrypt
  nix: transcrypt
package-manager-url: https://formulae.brew.sh/formula/transcrypt
version: 2.3.2
license: MIT
category: security
tags:
  - cli
  - git
description: Configure transparent encryption of files in a Git repo
source-archive: https://github.com/elasticdog/transcrypt/archive/refs/tags/v2.3.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: transcrypt
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:transcrypt
  brew: brew install transcrypt
  nix: nix profile install nixpkgs#transcrypt
provenance:
  formula: transcrypt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
