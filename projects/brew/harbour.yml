id: brew:harbour
display-name: harbour
homepage: https://harbour.github.io
repo: >
  https://downloads.sourceforge.net/project/harbour-project/source/3.0.0/harbour-3.0.0.tar.bz2
docs: https://harbour.github.io
package-manager:
  brew: harbour
  winget: Harbour.Harbour
package-manager-url: https://formulae.brew.sh/formula/harbour
version: 3.0.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Portable, xBase-compatible programming language and environment
source-archive: >
  https://downloads.sourceforge.net/project/harbour-project/source/3.0.0/harbour-3.0.0.tar.bz2
dependencies:
  - jpeg-turbo
  - libharu
  - libpng
  - libxdiff
  - minizip
  - pcre
uses-from-macos:
  - bzip2
  - curl
  - expat
  - ncurses
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: harbour
  - exposure: global executable
    kind: cli
    name: hb3rdpat.hbs
  - exposure: global executable
    kind: cli
    name: hbi18n
  - exposure: global executable
    kind: cli
    name: hbmk2
  - exposure: global executable
    kind: cli
    name: hbpp
  - exposure: global executable
    kind: cli
    name: hbtest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:harbour
  brew: brew install harbour
  winget: winget install --id Harbour.Harbour -e
provenance:
  formula: harbour
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
