id: brew:graphicsmagick
display-name: graphicsmagick
homepage: https://graphicsmagick.sourceforge.io/
repo: >
  https://downloads.sourceforge.net/project/graphicsmagick/graphicsmagick/1.3.47/GraphicsMagick-1.3.47.tar.xz
docs: https://graphicsmagick.sourceforge.io/
package-manager:
  apk: graphicsmagick
  brew: graphicsmagick
  chocolatey: graphicsmagick
  debian: graphicsmagick
  dnf: GraphicsMagick
  macports: GraphicsMagick
  nix: graphicsmagick
  pacman: graphicsmagick
  scoop: main/graphicsmagick
  ubuntu: graphicsmagick
  zypper: GraphicsMagick
package-manager-url: https://formulae.brew.sh/formula/graphicsmagick
version: 1.3.47
license: MIT
category: media
tags:
  - cli
description: Image processing tools collection
source-archive: >
  https://downloads.sourceforge.net/project/graphicsmagick/graphicsmagick/1.3.47/GraphicsMagick-1.3.47.tar.xz
dependencies:
  - freetype
  - jasper
  - jpeg-turbo
  - jpeg-xl
  - libheif
  - libpng
  - libtiff
  - libtool
  - little-cms2
  - webp
  - zstd
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: GraphicsMagick++-config
  - exposure: global executable
    kind: cli
    name: GraphicsMagick-config
  - exposure: global executable
    kind: cli
    name: GraphicsMagickWand-config
  - exposure: global executable
    kind: cli
    name: gm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add graphicsmagick
  av: sudo av install brew:graphicsmagick
  brew: brew install graphicsmagick
  chocolatey: choco install graphicsmagick
  debian: sudo apt install graphicsmagick
  dnf: sudo dnf install GraphicsMagick
  macports: sudo port install GraphicsMagick
  nix: nix profile install nixpkgs#graphicsmagick
  pacman: sudo pacman -S graphicsmagick
  scoop: scoop install main/graphicsmagick
  ubuntu: sudo apt install graphicsmagick
  zypper: sudo zypper install GraphicsMagick
provenance:
  formula: graphicsmagick
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
