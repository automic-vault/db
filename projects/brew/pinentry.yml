id: brew:pinentry
display-name: pinentry
homepage: https://www.gnupg.org/related_software/pinentry/
repo: https://www.gnupg.org/ftp/gcrypt/pinentry/pinentry-1.3.2.tar.bz2
docs: https://www.gnupg.org/related_software/pinentry/
package-manager:
  apk: pinentry
  brew: pinentry
  debian: pinentry-curses
  dnf: pinentry
  macports: pinentry
  pacman: pinentry
  ubuntu: pinentry-curses
  zypper: pinentry
package-manager-url: https://formulae.brew.sh/formula/pinentry
version: 1.3.2
license: GPL-2.0-or-later
category: security
tags:
  - cli
description: Passphrase entry dialog utilizing the Assuan protocol
source-archive: https://www.gnupg.org/ftp/gcrypt/pinentry/pinentry-1.3.2.tar.bz2
dependencies:
  - libassuan
  - libgpg-error
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: pinentry
  - exposure: global executable
    kind: cli
    name: pinentry-curses
  - exposure: global executable
    kind: cli
    name: pinentry-tty
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pinentry
  av: sudo av install brew:pinentry
  brew: brew install pinentry
  debian: sudo apt install pinentry-curses
  dnf: sudo dnf install pinentry
  macports: sudo port install pinentry
  pacman: sudo pacman -S pinentry
  ubuntu: sudo apt install pinentry-curses
  zypper: sudo zypper install pinentry
provenance:
  formula: pinentry
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
