id: brew:publish
display-name: publish
homepage: https://github.com/JohnSundell/Publish
repo: https://github.com/JohnSundell/Publish
docs: https://github.com/JohnSundell/Publish
package-manager:
  brew: publish
package-manager-url: https://formulae.brew.sh/formula/publish
version: 0.9.0
license: MIT
category: development
tags:
  - cli
description: Static site generator for Swift developers
source-archive: https://github.com/JohnSundell/Publish/archive/refs/tags/0.9.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: publish
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:publish
  brew: brew install publish
provenance:
  formula: publish
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
