id: brew:gost
display-name: gost
homepage: https://gost.run/
repo: https://github.com/go-gost/gost
docs: https://gost.run/
package-manager:
  apk: gost
  brew: gost
  macports: gost
  nix: gost
  pacman: gost
  ubuntu: gost
package-manager-url: https://formulae.brew.sh/formula/gost
version: 3.2.6
license: MIT
category: development
tags:
  - cli
description: GO Simple Tunnel - a simple tunnel written in golang
source-archive: https://github.com/go-gost/gost/archive/refs/tags/v3.2.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gost
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gost
  av: sudo av install brew:gost
  brew: brew install gost
  macports: sudo port install gost
  nix: nix profile install nixpkgs#gost
  pacman: sudo pacman -S gost
  ubuntu: sudo apt install gost
provenance:
  formula: gost
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
