id: brew:augeas
display-name: augeas
homepage: https://augeas.net/
repo: https://github.com/hercules-team/augeas
docs: https://augeas.net/
package-manager:
  apk: augeas
  brew: augeas
  dnf: augeas
  macports: augeas
  nix: augeas
  pacman: augeas
  zypper: augeas
package-manager-url: https://formulae.brew.sh/formula/augeas
version: 1.14.1
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Configuration editing tool and API
source-archive: >
  https://github.com/hercules-team/augeas/releases/download/release-1.14.1/augeas-1.14.1.tar.gz
dependencies:
  - readline
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: augmatch
  - exposure: global executable
    kind: cli
    name: augparse
  - exposure: global executable
    kind: cli
    name: augprint
  - exposure: global executable
    kind: cli
    name: augtool
  - exposure: global executable
    kind: cli
    name: fadot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Lenses have been installed to: $HOMEBREW_PREFIX/share/augeas/lenses/dist'
  post-install-defined: false
install-lines:
  apk: sudo apk add augeas
  av: sudo av install brew:augeas
  brew: brew install augeas
  dnf: sudo dnf install augeas
  macports: sudo port install augeas
  nix: nix profile install nixpkgs#augeas
  pacman: sudo pacman -S augeas
  zypper: sudo zypper install augeas
provenance:
  formula: augeas
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
