id: brew:hatch
display-name: hatch
homepage: https://hatch.pypa.io/latest/
repo: >
  https://files.pythonhosted.org/packages/d2/02/ce9c4c439fa3f195b21b4b5bb18b44d1076297c86477ef7e3d2de6064ec3/hatch-1.16.5.tar.gz
docs: https://hatch.pypa.io/latest/
package-manager:
  apk: hatch
  brew: hatch
  dnf: hatch
  macports: hatch
  nix: hatch
  scoop: main/hatch
  winget: PyPA.Hatch
package-manager-url: https://formulae.brew.sh/formula/hatch
version: 1.16.5
license: MIT
category: network
tags:
  - cli
description: Modern, extensible Python project management
source-archive: >
  https://files.pythonhosted.org/packages/d2/02/ce9c4c439fa3f195b21b4b5bb18b44d1076297c86477ef7e3d2de6064ec3/hatch-1.16.5.tar.gz
dependencies:
  - certifi
  - cryptography
  - python@3.14
  - uv
executables:
  - exposure: global executable
    kind: cli
    name: hatch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hatch
  av: sudo av install brew:hatch
  brew: brew install hatch
  dnf: sudo dnf install hatch
  macports: sudo port install hatch
  nix: nix profile install nixpkgs#hatch
  scoop: scoop install main/hatch
  winget: winget install --id PyPA.Hatch -e
provenance:
  formula: hatch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
