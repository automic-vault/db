id: brew:wxwidgets
display-name: wxwidgets
homepage: https://www.wxwidgets.org
repo: https://github.com/wxWidgets/wxWidgets
docs: https://www.wxwidgets.org
package-manager:
  apk: wxwidgets
  brew: wxwidgets
package-manager-url: https://formulae.brew.sh/formula/wxwidgets
version: 3.3.2
license: LGPL-2.0-or-later WITH WxWindows-exception-3.1
category: development
tags:
  - cli
description: Cross-platform C++ GUI toolkit
source-archive: https://github.com/wxWidgets/wxWidgets/releases/download/v3.3.2/wxWidgets-3.3.2.tar.bz2
dependencies:
  - jpeg-turbo
  - libpng
  - libtiff
  - pcre2
  - webp
build-dependencies:
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: wx-config
  - exposure: global executable
    kind: cli
    name: wx-config-3.3
  - exposure: global executable
    kind: cli
    name: wxrc
  - exposure: global executable
    kind: cli
    name: wxrc-3.3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wxwidgets
  av: sudo av install brew:wxwidgets
  brew: brew install wxwidgets
provenance:
  formula: wxwidgets
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
