id: brew:dhex
display-name: dhex
homepage: https://www.dettus.net/dhex/
repo: https://www.dettus.net/dhex/dhex_0.69.tar.gz
docs: https://www.dettus.net/dhex/
package-manager:
  apk: dhex
  brew: dhex
  debian: dhex
  dnf: dhex
  macports: dhex
  nix: dhex
  pacman: dhex
  ubuntu: dhex
  zypper: dhex
package-manager-url: https://formulae.brew.sh/formula/dhex
version: 0.69
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Ncurses based advanced hex editor featuring diff mode and more
source-archive: https://www.dettus.net/dhex/dhex_0.69.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: dhex
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dhex
  av: sudo av install brew:dhex
  brew: brew install dhex
  debian: sudo apt install dhex
  dnf: sudo dnf install dhex
  macports: sudo port install dhex
  nix: nix profile install nixpkgs#dhex
  pacman: sudo pacman -S dhex
  ubuntu: sudo apt install dhex
  zypper: sudo zypper install dhex
provenance:
  formula: dhex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
