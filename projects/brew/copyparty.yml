id: brew:copyparty
display-name: copyparty
homepage: https://github.com/9001/copyparty
repo: >
  https://files.pythonhosted.org/packages/4f/0e/81965fdccef8dbd6d0ab22c421df3bc50e0bb27a5b8eaa79f046f208a4e1/copyparty-1.20.14.tar.gz
docs: https://github.com/9001/copyparty
package-manager:
  brew: copyparty
  nix: copyparty
  pacman: copyparty
  winget: 9001.copyparty
package-manager-url: https://formulae.brew.sh/formula/copyparty
version: 1.20.14
license: MIT
category: development
tags:
  - cli
description: Portable file server
source-archive: >
  https://files.pythonhosted.org/packages/4f/0e/81965fdccef8dbd6d0ab22c421df3bc50e0bb27a5b8eaa79f046f208a4e1/copyparty-1.20.14.tar.gz
dependencies:
  - cryptography
  - gettext
  - libsodium
  - pillow
  - python@3.14
  - zeromq
build-dependencies:
  - cmake
  - ninja
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: copyparty
  - exposure: global executable
    kind: cli
    name: partyfuse
  - exposure: global executable
    kind: cli
    name: u2c
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    If you need to generate thumbnails for video/audio files: brew install ffmpeg If you
    need to automatically create a CA and server-cert on startup: brew install cfssl
  post-install-defined: false
install-lines:
  av: sudo av install brew:copyparty
  brew: brew install copyparty
  nix: nix profile install nixpkgs#copyparty
  pacman: sudo pacman -S copyparty
  winget: winget install --id 9001.copyparty -e
provenance:
  formula: copyparty
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
