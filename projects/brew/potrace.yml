install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add potrace
  av: sudo av install brew:potrace
  brew: brew install potrace
  debian: sudo apt install potrace
  dnf: sudo dnf install potrace
  macports: sudo port install potrace
  nix: nix profile install nixpkgs#potrace
  pacman: sudo pacman -S potrace
  scoop: scoop install main/potrace
  ubuntu: sudo apt install potrace
  zypper: sudo zypper install potrace
provenance:
  formula: potrace
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
