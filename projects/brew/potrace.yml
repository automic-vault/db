id: brew:potrace
display-name: potrace
homepage: https://potrace.sourceforge.net/
repo: https://potrace.sourceforge.net/download/1.16/potrace-1.16.tar.gz
docs: https://potrace.sourceforge.net/
package-manager:
  apk: potrace
  brew: potrace
  debian: potrace
  dnf: potrace
  macports: potrace
  nix: potrace
  pacman: potrace
  scoop: main/potrace
  ubuntu: potrace
  zypper: potrace
package-manager-url: https://formulae.brew.sh/formula/potrace
version: 1.16
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Convert bitmaps to vector graphics
source-archive: https://potrace.sourceforge.net/download/1.16/potrace-1.16.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mkbitmap
  - exposure: global executable
    kind: cli
    name: potrace
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
