id: brew:tektoncd-cli
display-name: tektoncd-cli
homepage: https://github.com/tektoncd/cli
repo: https://github.com/tektoncd/cli
docs: https://github.com/tektoncd/cli
package-manager:
  brew: tektoncd-cli
  chocolatey: tektoncd-cli
  macports: tektoncd-cli
  nix: tektoncd-cli
  scoop: main/tektoncd-cli
package-manager-url: https://formulae.brew.sh/formula/tektoncd-cli
version: 0.45.0
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for interacting with TektonCD
source-archive: https://github.com/tektoncd/cli/archive/refs/tags/v0.45.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tkn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tektoncd-cli
  brew: brew install tektoncd-cli
  chocolatey: choco install tektoncd-cli
  macports: sudo port install tektoncd-cli
  nix: nix profile install nixpkgs#tektoncd-cli
  scoop: scoop install main/tektoncd-cli
provenance:
  formula: tektoncd-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
