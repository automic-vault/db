id: brew:distribution
display-name: distribution
homepage: https://github.com/time-less-ness/distribution
repo: https://github.com/time-less-ness/distribution
docs: https://github.com/time-less-ness/distribution
package-manager:
  brew: distribution
  nix: distribution
package-manager-url: https://formulae.brew.sh/formula/distribution
version: 1.3
license: GPL-2.0-only
category: development
tags:
  - cli
description: Create ASCII graphical histograms in the terminal
source-archive: https://github.com/time-less-ness/distribution/archive/refs/tags/1.3.tar.gz
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: distribution
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:distribution
  brew: brew install distribution
  nix: nix profile install nixpkgs#distribution
provenance:
  formula: distribution
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
