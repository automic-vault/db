id: brew:libjwt
display-name: libjwt
homepage: https://libjwt.io/
repo: https://github.com/benmcollins/libjwt
docs: https://libjwt.io/
package-manager:
  apk: libjwt
  brew: libjwt
  dnf: libjwt
  macports: libjwt
  nix: libjwt
package-manager-url: https://formulae.brew.sh/formula/libjwt
version: 3.3.3
license: MPL-2.0
category: development
tags:
  - cli
  - json
description: JSON Web Token C library
source-archive: https://github.com/benmcollins/libjwt/archive/refs/tags/v3.3.3.tar.gz
dependencies:
  - gnutls
  - jansson
  - openssl@3
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: jwk2key
  - exposure: global executable
    kind: cli
    name: jwt-generate
  - exposure: global executable
    kind: cli
    name: jwt-verify
  - exposure: global executable
    kind: cli
    name: key2jwk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libjwt
  av: sudo av install brew:libjwt
  brew: brew install libjwt
  dnf: sudo dnf install libjwt
  macports: sudo port install libjwt
  nix: nix profile install nixpkgs#libjwt
provenance:
  formula: libjwt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
