id: brew:etsh
display-name: etsh
homepage: https://etsh.dev/
repo: https://etsh.dev/src/etsh_5.4.0/etsh-5.4.0.tar.xz
docs: https://etsh.dev/
package-manager:
  brew: etsh
  macports: etsh
package-manager-url: https://formulae.brew.sh/formula/etsh
version: 5.4.0
license: BSD-2-Clause AND BSD-3-Clause AND BSD-4-Clause AND LicenseRef-Homebrew-public-domain
category: network
tags:
  - cli
description: Two ports of /bin/sh from V6 UNIX (circa 1975)
source-archive: https://etsh.dev/src/etsh_5.4.0/etsh-5.4.0.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: etsh
  - exposure: global executable
    kind: cli
    name: sh6
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:etsh
  brew: brew install etsh
  macports: sudo port install etsh
provenance:
  formula: etsh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
