id: brew:ptex
display-name: ptex
homepage: https://ptex.us/
repo: https://github.com/wdas/ptex
docs: https://ptex.us/
package-manager:
  apk: ptex
  brew: ptex
  dnf: ptex
  macports: ptex
  nix: ptex
  pacman: ptex
package-manager-url: https://formulae.brew.sh/formula/ptex
version: 2.5.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Texture mapping system
source-archive: https://github.com/wdas/ptex/archive/refs/tags/v2.5.2.tar.gz
dependencies:
  - libdeflate
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ptxinfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ptex
  av: sudo av install brew:ptex
  brew: brew install ptex
  dnf: sudo dnf install ptex
  macports: sudo port install ptex
  nix: nix profile install nixpkgs#ptex
  pacman: sudo pacman -S ptex
provenance:
  formula: ptex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
