id: brew:apptainer
display-name: apptainer
homepage: https://apptainer.org/
repo: https://github.com/apptainer/apptainer
docs: https://apptainer.org/
package-manager:
  apk: apptainer
  brew: apptainer
  debian: singularity
  dnf: apptainer
  pacman: apptainer
  ubuntu: singularity
  zypper: apptainer
package-manager-url: https://formulae.brew.sh/formula/apptainer
version: 1.5.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Application container and unprivileged sandbox platform for Linux
source-archive: https://github.com/apptainer/apptainer/releases/download/v1.5.0/apptainer-1.5.0.tar.gz
dependencies:
  - libseccomp
  - squashfs
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: apptainer
  - exposure: global executable
    kind: cli
    name: run-singularity
  - exposure: global executable
    kind: cli
    name: singularity
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add apptainer
  av: sudo av install brew:apptainer
  brew: brew install apptainer
  debian: sudo apt install singularity
  dnf: sudo dnf install apptainer
  pacman: sudo pacman -S apptainer
  ubuntu: sudo apt install singularity
  zypper: sudo zypper install apptainer
provenance:
  formula: apptainer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
