id: brew:spawn-fcgi
display-name: spawn-fcgi
homepage: https://redmine.lighttpd.net/projects/spawn-fcgi
repo: https://www.lighttpd.net/download/spawn-fcgi-1.6.6.tar.gz
docs: https://redmine.lighttpd.net/projects/spawn-fcgi
