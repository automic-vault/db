id: brew:haskell-language-server
display-name: haskell-language-server
homepage: https://github.com/haskell/haskell-language-server
repo: https://github.com/haskell/haskell-language-server
docs: https://github.com/haskell/haskell-language-server
package-manager:
  apk: haskell-language-server
  brew: haskell-language-server
  macports: haskell-language-server
  nix: haskell-language-server
  pacman: haskell-language-server
  scoop: main/haskell-language-server
package-manager-url: https://formulae.brew.sh/formula/haskell-language-server
version: 2.14.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: Integration point for ghcide and haskell-ide-engine. One IDE to rule them all
source-archive: >
  https://github.com/haskell/haskell-language-server/releases/download/2.14.0.0/haskell-language-server-2.14.0.0-src.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
  - ghc@9.12
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ghcide-bench-9.12
  - exposure: global executable
    kind: cli
    name: ghcide-bench-9.12.3
  - exposure: global executable
    kind: cli
    name: ghcide-bench-9.14
  - exposure: global executable
    kind: cli
    name: ghcide-bench-9.14.1
  - exposure: global executable
    kind: cli
    name: haskell-language-server-9.12
  - exposure: global executable
    kind: cli
    name: haskell-language-server-9.12.3
  - exposure: global executable
    kind: cli
    name: haskell-language-server-9.14
  - exposure: global executable
    kind: cli
    name: haskell-language-server-9.14.1
  - exposure: global executable
    kind: cli
    name: haskell-language-server-wrapper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    haskell-language-server is built for GHC versions 9.12.3, 9.14.1. You need to
    provide your own GHC or install one with brew install ghc
  post-install-defined: false
install-lines:
  apk: sudo apk add haskell-language-server
  av: sudo av install brew:haskell-language-server
  brew: brew install haskell-language-server
  macports: sudo port install haskell-language-server
  nix: nix profile install nixpkgs#haskell-language-server
  pacman: sudo pacman -S haskell-language-server
  scoop: scoop install main/haskell-language-server
provenance:
  formula: haskell-language-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
