id: brew:topgrade
display-name: topgrade
homepage: https://github.com/topgrade-rs/topgrade
repo: https://github.com/topgrade-rs/topgrade
docs: https://github.com/topgrade-rs/topgrade
package-manager:
  apk: topgrade
  brew: topgrade
  macports: topgrade
  nix: topgrade
  scoop: main/topgrade
  winget: topgrade-rs.topgrade
  zypper: topgrade
package-manager-url: https://formulae.brew.sh/formula/topgrade
version: 17.5.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Upgrade all the things
source-archive: https://github.com/topgrade-rs/topgrade/archive/refs/tags/v17.5.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: topgrade
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add topgrade
  av: sudo av install brew:topgrade
  brew: brew install topgrade
  macports: sudo port install topgrade
  nix: nix profile install nixpkgs#topgrade
  scoop: scoop install main/topgrade
  winget: winget install --id topgrade-rs.topgrade -e
  zypper: sudo zypper install topgrade
provenance:
  formula: topgrade
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
