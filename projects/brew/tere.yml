id: brew:tere
display-name: tere
homepage: https://github.com/mgunyho/tere
repo: https://github.com/mgunyho/tere
docs: https://github.com/mgunyho/tere
package-manager:
  apk: tere
  brew: tere
  nix: tere
  pacman: tere
  scoop: main/tere
package-manager-url: https://formulae.brew.sh/formula/tere
version: 1.6.0
license: EUPL-1.2
category: development
tags:
  - cli
description: Terminal file explorer
source-archive: https://github.com/mgunyho/tere/archive/refs/tags/v1.6.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tere
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tere
  av: sudo av install brew:tere
  brew: brew install tere
  nix: nix profile install nixpkgs#tere
  pacman: sudo pacman -S tere
  scoop: scoop install main/tere
provenance:
  formula: tere
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
