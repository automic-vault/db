id: brew:tinysearch
display-name: tinysearch
homepage: https://github.com/tinysearch/tinysearch
repo: https://github.com/tinysearch/tinysearch
docs: https://github.com/tinysearch/tinysearch
package-manager:
  brew: tinysearch
package-manager-url: https://formulae.brew.sh/formula/tinysearch
version: 0.10.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Tiny, full-text search engine for static websites built with Rust and Wasm
source-archive: https://github.com/tinysearch/tinysearch/archive/refs/tags/v0.10.0.tar.gz
dependencies:
  - rustup
  - wasm-pack
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tinysearch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tinysearch
  brew: brew install tinysearch
provenance:
  formula: tinysearch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
