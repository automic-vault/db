id: brew:havn
display-name: havn
homepage: https://github.com/mrjackwills/havn
repo: https://github.com/mrjackwills/havn
docs: https://github.com/mrjackwills/havn
package-manager:
  apk: havn
  brew: havn
  nix: havn
  pacman: havn
package-manager-url: https://formulae.brew.sh/formula/havn
version: 0.3.7
license: MIT
category: development
tags:
  - cli
description: Fast configurable port scanner with reasonable defaults
source-archive: https://github.com/mrjackwills/havn/archive/refs/tags/v0.3.7.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: havn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add havn
  av: sudo av install brew:havn
  brew: brew install havn
  nix: nix profile install nixpkgs#havn
  pacman: sudo pacman -S havn
provenance:
  formula: havn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
