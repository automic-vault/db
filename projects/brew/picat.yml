id: brew:picat
display-name: picat
homepage: https://picat-lang.org/
repo: https://picat-lang.org/download/picat398_src.tar.gz
docs: https://picat-lang.org/
package-manager:
  apk: picat
  brew: picat
  nix: picat
package-manager-url: https://formulae.brew.sh/formula/picat
version: 3.9.8
license: MPL-2.0
category: development
tags:
  - cli
description: Simple, and yet powerful, logic-based multi-paradigm programming language
source-archive: https://picat-lang.org/download/picat398_src.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: picat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add picat
  av: sudo av install brew:picat
  brew: brew install picat
  nix: nix profile install nixpkgs#picat
provenance:
  formula: picat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
