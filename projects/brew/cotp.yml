id: brew:cotp
display-name: cotp
homepage: https://github.com/replydev/cotp
repo: https://github.com/replydev/cotp
docs: https://github.com/replydev/cotp
package-manager:
  apk: cotp
  brew: cotp
  debian: cotp
  nix: cotp
  pacman: cotp
package-manager-url: https://formulae.brew.sh/formula/cotp
version: 1.9.10
license: GPL-3.0-only
category: development
tags:
  - cli
description: TOTP/HOTP authenticator app with import functionality
source-archive: https://github.com/replydev/cotp/archive/refs/tags/v1.9.10.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cotp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cotp
  av: sudo av install brew:cotp
  brew: brew install cotp
  debian: sudo apt install cotp
  nix: nix profile install nixpkgs#cotp
  pacman: sudo pacman -S cotp
provenance:
  formula: cotp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
