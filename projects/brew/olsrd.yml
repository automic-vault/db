id: brew:olsrd
display-name: olsrd
homepage: https://github.com/OLSR/olsrd
repo: https://github.com/OLSR/olsrd
docs: https://github.com/OLSR/olsrd
package-manager:
  apk: olsrd
  brew: olsrd
  nix: olsrd
package-manager-url: https://formulae.brew.sh/formula/olsrd
version: 0.9.8
license: BSD-3-Clause
category: development
tags:
  - cli
description: Implementation of the optimized link state routing protocol
source-archive: https://github.com/OLSR/olsrd/archive/refs/tags/v0.9.8.tar.gz
build-dependencies:
  - coreutils
executables:
  - exposure: global executable
    kind: cli
    name: olsrd
  - exposure: global executable
    kind: cli
    name: sgw_policy_routing_setup.sh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add olsrd
  av: sudo av install brew:olsrd
  brew: brew install olsrd
  nix: nix profile install nixpkgs#olsrd
provenance:
  formula: olsrd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
