id: brew:faad2
display-name: faad2
homepage: https://sourceforge.net/projects/faac/
repo: https://github.com/knik0/faad2
docs: https://sourceforge.net/projects/faac/
package-manager:
  apk: faad2
  brew: faad2
  debian: faad
  dnf: faad2
  macports: faad2
  nix: faad2
  pacman: faad2
  ubuntu: faad
  zypper: faad2
package-manager-url: https://formulae.brew.sh/formula/faad2
version: 2.11.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: ISO AAC audio decoder
source-archive: https://github.com/knik0/faad2/archive/refs/tags/2.11.2.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: faad
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add faad2
  av: sudo av install brew:faad2
  brew: brew install faad2
  debian: sudo apt install faad
  dnf: sudo dnf install faad2
  macports: sudo port install faad2
  nix: nix profile install nixpkgs#faad2
  pacman: sudo pacman -S faad2
  ubuntu: sudo apt install faad
  zypper: sudo zypper install faad2
provenance:
  formula: faad2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
