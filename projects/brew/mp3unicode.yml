id: brew:mp3unicode
display-name: mp3unicode
homepage: https://mp3unicode.sourceforge.net/
repo: https://github.com/alonbl/mp3unicode
docs: https://mp3unicode.sourceforge.net/
package-manager:
  brew: mp3unicode
  macports: mp3unicode
  pacman: mp3unicode
package-manager-url: https://formulae.brew.sh/formula/mp3unicode
version: 1.2.1
license: GPL-2.0-only
category: development
tags:
  - cli
description: Command-line utility to convert mp3 tags between different encodings
source-archive: >
  https://github.com/alonbl/mp3unicode/releases/download/mp3unicode-1.2.1/mp3unicode-1.2.1.tar.bz2
dependencies:
  - taglib
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mp3unicode
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mp3unicode
  brew: brew install mp3unicode
  macports: sudo port install mp3unicode
  pacman: sudo pacman -S mp3unicode
provenance:
  formula: mp3unicode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
