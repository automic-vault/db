id: brew:needle
display-name: needle
homepage: https://github.com/uber/needle
repo: https://github.com/uber/needle
docs: https://github.com/uber/needle
package-manager:
  brew: needle
  nix: needle
package-manager-url: https://formulae.brew.sh/formula/needle
version: 0.25.1
license: Apache-2.0
category: development
tags:
  - cli
description: Compile-time safe Swift dependency injection framework with real code
source-archive: https://github.com/uber/needle/archive/refs/tags/v0.25.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: needle
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:needle
  brew: brew install needle
  nix: nix profile install nixpkgs#needle
provenance:
  formula: needle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
