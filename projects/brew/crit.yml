id: brew:crit
display-name: crit
homepage: https://crit.md/
repo: https://github.com/tomasz-tomczyk/crit
docs: https://crit.md/
package-manager:
  brew: crit
  dnf: crit
package-manager-url: https://formulae.brew.sh/formula/crit
version: 0.15.4
license: MIT
category: development
tags:
  - cli
description: 'Your feedback loop with the agent: review plans and code locally'
source-archive: https://github.com/tomasz-tomczyk/crit/archive/refs/tags/v0.15.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: crit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:crit
  brew: brew install crit
  dnf: sudo dnf install crit
provenance:
  formula: crit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
