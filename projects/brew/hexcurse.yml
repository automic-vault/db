id: brew:hexcurse
display-name: hexcurse
homepage: https://github.com/LonnyGomes/hexcurse
repo: https://github.com/LonnyGomes/hexcurse
docs: https://github.com/LonnyGomes/hexcurse
package-manager:
  brew: hexcurse
  debian: hexcurse
  nix: hexcurse
  ubuntu: hexcurse
package-manager-url: https://formulae.brew.sh/formula/hexcurse
version: 1.60.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Ncurses-based console hex editor
source-archive: https://github.com/LonnyGomes/hexcurse/archive/refs/tags/v1.60.0.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: hexcurse
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hexcurse
  brew: brew install hexcurse
  debian: sudo apt install hexcurse
  nix: nix profile install nixpkgs#hexcurse
  ubuntu: sudo apt install hexcurse
provenance:
  formula: hexcurse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
