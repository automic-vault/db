id: brew:pumba
display-name: pumba
homepage: https://github.com/alexei-led/pumba
repo: https://github.com/alexei-led/pumba
docs: https://github.com/alexei-led/pumba
package-manager:
  brew: pumba
package-manager-url: https://formulae.brew.sh/formula/pumba
version: 1.1.7
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: Chaos testing tool for Docker
source-archive: https://github.com/alexei-led/pumba/archive/refs/tags/1.1.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pumba
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pumba
  brew: brew install pumba
provenance:
  formula: pumba
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
