id: brew:sollya
display-name: sollya
homepage: https://www.sollya.org/
repo: https://www.sollya.org/releases/sollya-8.0/sollya-8.0.tar.gz
docs: https://www.sollya.org/
package-manager:
  brew: sollya
  debian: sollya
  macports: sollya
  nix: sollya
  ubuntu: sollya
package-manager-url: https://formulae.brew.sh/formula/sollya
version: 8.0
license: CECILL-C
category: network
tags:
  - cli
description: Library for safe floating-point code development
source-archive: https://www.sollya.org/releases/sollya-8.0/sollya-8.0.tar.gz
dependencies:
  - fplll
  - gmp
  - mpfi
  - mpfr
build-dependencies:
  - automake
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: sollya
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sollya
  brew: brew install sollya
  debian: sudo apt install sollya
  macports: sudo port install sollya
  nix: nix profile install nixpkgs#sollya
  ubuntu: sudo apt install sollya
provenance:
  formula: sollya
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
