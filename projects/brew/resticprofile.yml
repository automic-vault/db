id: brew:resticprofile
display-name: resticprofile
homepage: https://creativeprojects.github.io/resticprofile/
repo: https://github.com/creativeprojects/resticprofile
docs: https://creativeprojects.github.io/resticprofile/
package-manager:
  brew: resticprofile
  macports: resticprofile
  nix: resticprofile
  scoop: main/resticprofile
  winget: creativeprojects.resticprofile
package-manager-url: https://formulae.brew.sh/formula/resticprofile
version: 0.33.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: Configuration profiles manager and scheduler for restic backup
source-archive: https://github.com/creativeprojects/resticprofile/archive/refs/tags/v0.33.1.tar.gz
dependencies:
  - restic
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: resticprofile
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:resticprofile
  brew: brew install resticprofile
  macports: sudo port install resticprofile
  nix: nix profile install nixpkgs#resticprofile
  scoop: scoop install main/resticprofile
  winget: winget install --id creativeprojects.resticprofile -e
provenance:
  formula: resticprofile
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
