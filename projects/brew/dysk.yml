id: brew:dysk
display-name: dysk
homepage: https://dystroy.org/dysk/
repo: https://github.com/Canop/dysk
docs: https://dystroy.org/dysk/
package-manager:
  apk: dysk
  brew: dysk
  debian: dysk
  nix: dysk
  pacman: dysk
  zypper: dysk
package-manager-url: https://formulae.brew.sh/formula/dysk
version: 3.6.1
license: MIT
category: development
tags:
  - cli
description: Linux utility to get information on filesystems, like df but better
source-archive: https://github.com/Canop/dysk/archive/refs/tags/v3.6.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dysk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dysk
  av: sudo av install brew:dysk
  brew: brew install dysk
  debian: sudo apt install dysk
  nix: nix profile install nixpkgs#dysk
  pacman: sudo pacman -S dysk
  zypper: sudo zypper install dysk
provenance:
  formula: dysk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
