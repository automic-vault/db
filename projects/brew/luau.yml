id: brew:luau
display-name: luau
homepage: https://luau.org
repo: https://github.com/luau-lang/luau
docs: https://luau.org
package-manager:
  apk: luau
  brew: luau
  nix: luau
  pacman: luau
  scoop: main/luau
package-manager-url: https://formulae.brew.sh/formula/luau
version: 0.722
license: MIT
category: development
tags:
  - cli
description: Fast, safe, gradually typed embeddable scripting language derived from Lua
source-archive: https://github.com/luau-lang/luau/archive/refs/tags/0.722.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: luau
  - exposure: global executable
    kind: cli
    name: luau-analyze
  - exposure: global executable
    kind: cli
    name: luau-ast
  - exposure: global executable
    kind: cli
    name: luau-compile
  - exposure: global executable
    kind: cli
    name: luau-reduce
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add luau
  av: sudo av install brew:luau
  brew: brew install luau
  nix: nix profile install nixpkgs#luau
  pacman: sudo pacman -S luau
  scoop: scoop install main/luau
provenance:
  formula: luau
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
