id: brew:mcp-publisher
display-name: mcp-publisher
homepage: https://github.com/modelcontextprotocol/registry
repo: https://github.com/modelcontextprotocol/registry
docs: https://github.com/modelcontextprotocol/registry
package-manager:
  brew: mcp-publisher
package-manager-url: https://formulae.brew.sh/formula/mcp-publisher
version: 1.7.9
license: MIT
category: development
tags:
  - cli
description: Publisher CLI tool for the Official Model Context Protocol (MCP) Registry
source-archive: https://github.com/modelcontextprotocol/registry/archive/refs/tags/v1.7.9.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mcp-publisher
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mcp-publisher
  brew: brew install mcp-publisher
provenance:
  formula: mcp-publisher
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
