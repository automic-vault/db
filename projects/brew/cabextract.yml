id: brew:cabextract
display-name: cabextract
homepage: https://www.cabextract.org.uk/
repo: https://www.cabextract.org.uk/cabextract-1.11.tar.gz
docs: https://www.cabextract.org.uk/
package-manager:
  apk: cabextract
  brew: cabextract
  debian: cabextract
  dnf: cabextract
  macports: cabextract
  nix: cabextract
  pacman: cabextract
  ubuntu: cabextract
  zypper: cabextract
package-manager-url: https://formulae.brew.sh/formula/cabextract
version: 1.11
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Extract files from Microsoft cabinet files
source-archive: https://www.cabextract.org.uk/cabextract-1.11.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: cabextract
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cabextract
  av: sudo av install brew:cabextract
  brew: brew install cabextract
  debian: sudo apt install cabextract
  dnf: sudo dnf install cabextract
  macports: sudo port install cabextract
  nix: nix profile install nixpkgs#cabextract
  pacman: sudo pacman -S cabextract
  ubuntu: sudo apt install cabextract
  zypper: sudo zypper install cabextract
provenance:
  formula: cabextract
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
