id: brew:fastmod
display-name: fastmod
homepage: https://github.com/facebookincubator/fastmod
repo: https://github.com/facebookincubator/fastmod
docs: https://github.com/facebookincubator/fastmod
package-manager:
  brew: fastmod
  macports: fastmod
  nix: fastmod
package-manager-url: https://formulae.brew.sh/formula/fastmod
version: 0.4.4
license: Apache-2.0
category: development
tags:
  - cli
description: Fast, partial replacement for codemod (find/replace tool for programmers)
source-archive: https://github.com/facebookincubator/fastmod/archive/refs/tags/v0.4.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fastmod
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fastmod
  brew: brew install fastmod
  macports: sudo port install fastmod
  nix: nix profile install nixpkgs#fastmod
provenance:
  formula: fastmod
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
