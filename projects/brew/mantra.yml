id: brew:mantra
display-name: mantra
homepage: https://github.com/brosck/mantra
repo: https://github.com/brosck/mantra
docs: https://github.com/brosck/mantra
package-manager:
  brew: mantra
  nix: mantra
package-manager-url: https://formulae.brew.sh/formula/mantra
version: 3.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: Tool to hunt down API key leaks in JS files and pages
source-archive: https://github.com/brosck/mantra/archive/refs/tags/v3.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mantra
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mantra
  brew: brew install mantra
  nix: nix profile install nixpkgs#mantra
provenance:
  formula: mantra
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
