id: brew:sentry-native
display-name: sentry-native
homepage: https://docs.sentry.io/platforms/native/
repo: https://github.com/getsentry/sentry-native
docs: https://docs.sentry.io/platforms/native/
package-manager:
  brew: sentry-native
  nix: sentry-native
  pacman: sentry-native
package-manager-url: https://formulae.brew.sh/formula/sentry-native
version: 0.14.2
license: MIT
category: development
tags:
  - cli
description: Sentry SDK for C, C++ and native applications
source-archive: https://github.com/getsentry/sentry-native/archive/refs/tags/0.14.2.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: crashpad_handler
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sentry-native
  brew: brew install sentry-native
  nix: nix profile install nixpkgs#sentry-native
  pacman: sudo pacman -S sentry-native
provenance:
  formula: sentry-native
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
