id: brew:ltc-tools
display-name: ltc-tools
homepage: https://github.com/x42/ltc-tools
repo: https://github.com/x42/ltc-tools
docs: https://github.com/x42/ltc-tools
package-manager:
  brew: ltc-tools
  macports: ltc-tools
  nix: ltc-tools
package-manager-url: https://formulae.brew.sh/formula/ltc-tools
version: 0.7.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Tools to deal with linear-timecode (LTC)
source-archive: https://github.com/x42/ltc-tools/archive/refs/tags/v0.7.0.tar.gz
dependencies:
  - jack
  - libltc
  - libsndfile
build-dependencies:
  - help2man
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: jltc2mtc
  - exposure: global executable
    kind: cli
    name: jltcdump
  - exposure: global executable
    kind: cli
    name: jltcgen
  - exposure: global executable
    kind: cli
    name: jltcntp
  - exposure: global executable
    kind: cli
    name: jltctrigger
  - exposure: global executable
    kind: cli
    name: ltcdump
  - exposure: global executable
    kind: cli
    name: ltcgen
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ltc-tools
  brew: brew install ltc-tools
  macports: sudo port install ltc-tools
  nix: nix profile install nixpkgs#ltc-tools
provenance:
  formula: ltc-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
