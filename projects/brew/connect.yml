id: brew:connect
display-name: connect
homepage: https://github.com/gotoh/ssh-connect
repo: https://github.com/gotoh/ssh-connect
docs: https://github.com/gotoh/ssh-connect
package-manager:
  brew: connect
  nix: connect
  scoop: main/connect
  winget: Adobe.AdobeConnect
package-manager-url: https://formulae.brew.sh/formula/connect
version: 1.106
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Provides SOCKS and HTTPS proxy support to SSH
source-archive: https://github.com/gotoh/ssh-connect/archive/refs/tags/1.106.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: connect
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:connect
  brew: brew install connect
  nix: nix profile install nixpkgs#connect
  scoop: scoop install main/connect
  winget: winget install --id Adobe.AdobeConnect -e
provenance:
  formula: connect
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
