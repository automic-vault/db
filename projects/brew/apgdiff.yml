id: brew:apgdiff
display-name: apgdiff
homepage: https://www.apgdiff.com/
repo: https://github.com/fordfrog/apgdiff
docs: https://www.apgdiff.com/
package-manager:
  brew: apgdiff
  debian: apgdiff
  macports: apgdiff
  nix: apgdiff
  ubuntu: apgdiff
package-manager-url: https://formulae.brew.sh/formula/apgdiff
version: 2.7.0
license: MIT
category: database
tags:
  - cli
description: Another PostgreSQL diff tool
source-archive: https://github.com/fordfrog/apgdiff/archive/refs/tags/release_2.7.0.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: apgdiff
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:apgdiff
  brew: brew install apgdiff
  debian: sudo apt install apgdiff
  macports: sudo port install apgdiff
  nix: nix profile install nixpkgs#apgdiff
  ubuntu: sudo apt install apgdiff
provenance:
  formula: apgdiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
