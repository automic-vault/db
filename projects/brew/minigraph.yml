id: brew:minigraph
display-name: minigraph
homepage: https://lh3.github.io/minigraph
repo: https://github.com/lh3/minigraph
docs: https://lh3.github.io/minigraph
package-manager:
  brew: minigraph
package-manager-url: https://formulae.brew.sh/formula/minigraph
version: 0.21
license: MIT
category: development
tags:
  - cli
description: Proof-of-concept seq-to-graph mapper and graph generator
source-archive: https://github.com/lh3/minigraph/archive/refs/tags/v0.21.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: minigraph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:minigraph
  brew: brew install minigraph
provenance:
  formula: minigraph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
