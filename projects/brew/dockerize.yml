id: brew:dockerize
display-name: dockerize
homepage: https://github.com/jwilder/dockerize
repo: https://github.com/jwilder/dockerize
docs: https://github.com/jwilder/dockerize
package-manager:
  apk: dockerize
  brew: dockerize
  macports: dockerize
package-manager-url: https://formulae.brew.sh/formula/dockerize
version: 0.12.0
license: MIT
category: development
tags:
  - cli
  - docker
description: Utility to simplify running applications in docker containers
source-archive: https://github.com/jwilder/dockerize/archive/refs/tags/v0.12.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dockerize
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dockerize
  av: sudo av install brew:dockerize
  brew: brew install dockerize
  macports: sudo port install dockerize
provenance:
  formula: dockerize
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
