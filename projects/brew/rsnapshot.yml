id: brew:rsnapshot
display-name: rsnapshot
homepage: https://www.rsnapshot.org/
repo: https://github.com/rsnapshot/rsnapshot
docs: https://www.rsnapshot.org/
package-manager:
  apk: rsnapshot
  brew: rsnapshot
  debian: rsnapshot
  dnf: rsnapshot
  macports: rsnapshot
  nix: rsnapshot
  pacman: rsnapshot
  ubuntu: rsnapshot
  zypper: rsnapshot
package-manager-url: https://formulae.brew.sh/formula/rsnapshot
version: 1.5.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: File system snapshot utility (based on rsync)
source-archive: https://github.com/rsnapshot/rsnapshot/releases/download/1.5.1/rsnapshot-1.5.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: rsnapshot
  - exposure: global executable
    kind: cli
    name: rsnapshot-diff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rsnapshot
  av: sudo av install brew:rsnapshot
  brew: brew install rsnapshot
  debian: sudo apt install rsnapshot
  dnf: sudo dnf install rsnapshot
  macports: sudo port install rsnapshot
  nix: nix profile install nixpkgs#rsnapshot
  pacman: sudo pacman -S rsnapshot
  ubuntu: sudo apt install rsnapshot
  zypper: sudo zypper install rsnapshot
provenance:
  formula: rsnapshot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
