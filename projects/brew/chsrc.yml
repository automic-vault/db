id: brew:chsrc
display-name: chsrc
homepage: https://github.com/RubyMetric/chsrc
repo: https://github.com/RubyMetric/chsrc
docs: https://github.com/RubyMetric/chsrc
package-manager:
  brew: chsrc
  nix: chsrc
  scoop: main/chsrc
  winget: RubyMetric.chsrc
package-manager-url: https://formulae.brew.sh/formula/chsrc
version: 0.2.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Change Source for every software on every platform from the command-line
source-archive: https://github.com/RubyMetric/chsrc/archive/refs/tags/v0.2.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: chsrc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chsrc
  brew: brew install chsrc
  nix: nix profile install nixpkgs#chsrc
  scoop: scoop install main/chsrc
  winget: winget install --id RubyMetric.chsrc -e
provenance:
  formula: chsrc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
