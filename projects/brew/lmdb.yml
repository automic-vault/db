id: brew:lmdb
display-name: lmdb
homepage: https://www.symas.com/symas-embedded-database-lmdb
repo: >
  https://git.openldap.org/openldap/openldap/-/archive/LMDB_0.9.35/openldap-LMDB_0.9.35.tar.bz2
docs: https://www.symas.com/symas-embedded-database-lmdb
package-manager:
  apk: lmdb
  brew: lmdb
  dnf: lmdb
  macports: lmdb
  nix: lmdb
  pacman: lmdb
  zypper: lmdb
package-manager-url: https://formulae.brew.sh/formula/lmdb
version: 0.9.35
license: OLDAP-2.8
category: database
tags:
  - cli
  - database
description: 'Lightning memory-mapped database: key-value data store'
source-archive: >
  https://git.openldap.org/openldap/openldap/-/archive/LMDB_0.9.35/openldap-LMDB_0.9.35.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: mdb_copy
  - exposure: global executable
    kind: cli
    name: mdb_dump
  - exposure: global executable
    kind: cli
    name: mdb_load
  - exposure: global executable
    kind: cli
    name: mdb_stat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lmdb
  av: sudo av install brew:lmdb
  brew: brew install lmdb
  dnf: sudo dnf install lmdb
  macports: sudo port install lmdb
  nix: nix profile install nixpkgs#lmdb
  pacman: sudo pacman -S lmdb
  zypper: sudo zypper install lmdb
provenance:
  formula: lmdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
