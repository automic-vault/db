id: brew:solidity
display-name: solidity
homepage: https://soliditylang.org
repo: https://github.com/argotorg/solidity
docs: https://soliditylang.org
package-manager:
  brew: solidity
  dnf: solidity
  macports: solidity
  nix: solc
  scoop: main/solidity
package-manager-url: https://formulae.brew.sh/formula/solidity
version: 0.8.35
license: GPL-3.0-or-later AND MIT AND BSD-3-Clause AND Apache-2.0 AND CC0-1.0
category: development
tags:
  - cli
description: Contract-oriented programming language
source-archive: https://github.com/argotorg/solidity/releases/download/v0.8.35/solidity_0.8.35.tar.gz
dependencies:
  - boost
  - z3
build-dependencies:
  - cmake
  - fmt
  - nlohmann-json
  - range-v3
executables:
  - exposure: global executable
    kind: cli
    name: solc
  - exposure: global executable
    kind: cli
    name: yul-phaser
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:solidity
  brew: brew install solidity
  dnf: sudo dnf install solidity
  macports: sudo port install solidity
  nix: nix profile install nixpkgs#solc
  scoop: scoop install main/solidity
provenance:
  formula: solidity
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
