id: brew:driftctl
display-name: driftctl
homepage: https://github.com/snyk/driftctl
repo: https://github.com/snyk/driftctl
docs: https://github.com/snyk/driftctl
package-manager:
  brew: driftctl
  macports: driftctl
  nix: driftctl
package-manager-url: https://formulae.brew.sh/formula/driftctl
version: 0.40.0
license: Apache-2.0
category: development
tags:
  - cli
description: Detect, track and alert on infrastructure drift
source-archive: https://github.com/snyk/driftctl/archive/refs/tags/v0.40.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: driftctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:driftctl
  brew: brew install driftctl
  macports: sudo port install driftctl
  nix: nix profile install nixpkgs#driftctl
provenance:
  formula: driftctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
