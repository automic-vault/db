id: brew:tcpdump
display-name: tcpdump
homepage: https://www.tcpdump.org/
repo: https://www.tcpdump.org/release/tcpdump-4.99.6.tar.gz
docs: https://www.tcpdump.org/
package-manager:
  apk: tcpdump
  brew: tcpdump
  debian: tcpdump
  dnf: tcpdump
  macports: tcpdump
  nix: tcpdump
  pacman: tcpdump
  ubuntu: tcpdump
  zypper: tcpdump
package-manager-url: https://formulae.brew.sh/formula/tcpdump
version: 4.99.6
license: BSD-3-Clause
category: network
tags:
  - cli
description: Command-line packet analyzer
source-archive: https://www.tcpdump.org/release/tcpdump-4.99.6.tar.gz
dependencies:
  - libpcap
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: tcpdump
  - exposure: global executable
    kind: cli
    name: tcpdump.4.99.6
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tcpdump
  av: sudo av install brew:tcpdump
  brew: brew install tcpdump
  debian: sudo apt install tcpdump
  dnf: sudo dnf install tcpdump
  macports: sudo port install tcpdump
  nix: nix profile install nixpkgs#tcpdump
  pacman: sudo pacman -S tcpdump
  ubuntu: sudo apt install tcpdump
  zypper: sudo zypper install tcpdump
provenance:
  formula: tcpdump
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
