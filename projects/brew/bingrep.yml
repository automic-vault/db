id: brew:bingrep
display-name: bingrep
homepage: https://github.com/m4b/bingrep
repo: https://github.com/m4b/bingrep
docs: https://github.com/m4b/bingrep
package-manager:
  brew: bingrep
  macports: bingrep
  nix: bingrep
  pacman: bingrep
package-manager-url: https://formulae.brew.sh/formula/bingrep
version: 0.12.1
license: MIT
category: development
tags:
  - cli
description: Greps through binaries from various OSs and architectures
source-archive: https://github.com/m4b/bingrep/archive/refs/tags/v0.12.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bingrep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bingrep
  brew: brew install bingrep
  macports: sudo port install bingrep
  nix: nix profile install nixpkgs#bingrep
  pacman: sudo pacman -S bingrep
provenance:
  formula: bingrep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
