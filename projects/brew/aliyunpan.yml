id: brew:aliyunpan
display-name: aliyunpan
homepage: https://github.com/tickstep/aliyunpan
repo: https://github.com/tickstep/aliyunpan
docs: https://github.com/tickstep/aliyunpan
package-manager:
  brew: aliyunpan
  nix: aliyunpan
  winget: tickstep.aliyunpan
package-manager-url: https://formulae.brew.sh/formula/aliyunpan
version: 0.3.9
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line client tool for Alibaba aDrive disk
source-archive: https://github.com/tickstep/aliyunpan/archive/refs/tags/v0.3.9.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aliyunpan
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aliyunpan
  brew: brew install aliyunpan
  nix: nix profile install nixpkgs#aliyunpan
  winget: winget install --id tickstep.aliyunpan -e
provenance:
  formula: aliyunpan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
