id: brew:sd
display-name: sd
homepage: https://github.com/chmln/sd
repo: https://github.com/chmln/sd
docs: https://github.com/chmln/sd
package-manager:
  apk: sd
  brew: sd
  chocolatey: sd
  debian: sd
  macports: sd
  nix: sd
  pacman: sd
  scoop: main/sd
  ubuntu: sd
  winget: chmln.sd
  zypper: sd
package-manager-url: https://formulae.brew.sh/formula/sd
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Intuitive find & replace CLI
source-archive: https://github.com/chmln/sd/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sd
  av: sudo av install brew:sd
  brew: brew install sd
  chocolatey: choco install sd
  debian: sudo apt install sd
  macports: sudo port install sd
  nix: nix profile install nixpkgs#sd
  pacman: sudo pacman -S sd
  scoop: scoop install main/sd
  ubuntu: sudo apt install sd
  winget: winget install --id chmln.sd -e
  zypper: sudo zypper install sd
provenance:
  formula: sd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
