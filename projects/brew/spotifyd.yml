id: brew:spotifyd
display-name: spotifyd
homepage: https://spotifyd.rs/
repo: https://github.com/Spotifyd/spotifyd
docs: https://spotifyd.rs/
package-manager:
  apk: spotifyd
  brew: spotifyd
  nix: spotifyd
  pacman: spotifyd
  zypper: spotifyd
package-manager-url: https://formulae.brew.sh/formula/spotifyd
version: 0.4.2
license: GPL-3.0-only
category: development
tags:
  - cli
description: Spotify daemon
source-archive: https://github.com/Spotifyd/spotifyd/archive/refs/tags/v0.4.2.tar.gz
dependencies:
  - portaudio
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: spotifyd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add spotifyd
  av: sudo av install brew:spotifyd
  brew: brew install spotifyd
  nix: nix profile install nixpkgs#spotifyd
  pacman: sudo pacman -S spotifyd
  zypper: sudo zypper install spotifyd
provenance:
  formula: spotifyd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
