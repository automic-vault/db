id: brew:swag
display-name: swag
homepage: https://github.com/swaggo/swag
repo: https://github.com/swaggo/swag
docs: https://github.com/swaggo/swag
package-manager:
  brew: swag
  zypper: swag
package-manager-url: https://formulae.brew.sh/formula/swag
version: 1.16.6
license: MIT
category: development
tags:
  - cli
description: Automatically generate RESTful API documentation with Swagger 2.0 for Go
source-archive: https://github.com/swaggo/swag/archive/refs/tags/v1.16.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: swag
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swag
  brew: brew install swag
  zypper: sudo zypper install swag
provenance:
  formula: swag
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
