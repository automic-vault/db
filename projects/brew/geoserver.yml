id: brew:geoserver
display-name: geoserver
homepage: https://geoserver.org/
repo: >
  https://downloads.sourceforge.net/project/geoserver/GeoServer/2.28.3/geoserver-2.28.3-bin.zip
docs: https://geoserver.org/
package-manager:
  brew: geoserver
  nix: geoserver
  winget: OSGeo.GeoServer
package-manager-url: https://formulae.brew.sh/formula/geoserver
version: 2.28.3
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Java server to share and edit geospatial data
source-archive: >
  https://downloads.sourceforge.net/project/geoserver/GeoServer/2.28.3/geoserver-2.28.3-bin.zip
executables:
  - exposure: global executable
    kind: cli
    name: geoserver
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'To start geoserver: geoserver path/to/data/dir'
  post-install-defined: false
install-lines:
  av: sudo av install brew:geoserver
  brew: brew install geoserver
  nix: nix profile install nixpkgs#geoserver
  winget: winget install --id OSGeo.GeoServer -e
provenance:
  formula: geoserver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
