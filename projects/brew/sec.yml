id: brew:sec
display-name: sec
homepage: https://simple-evcorr.sourceforge.net/
repo: https://github.com/simple-evcorr/sec
docs: https://simple-evcorr.sourceforge.net/
package-manager:
  brew: sec
  debian: sec
  dnf: sec
  nix: sec
  ubuntu: sec
package-manager-url: https://formulae.brew.sh/formula/sec
version: 2.9.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Event correlation tool for event processing of various kinds
source-archive: https://github.com/simple-evcorr/sec/releases/download/2.9.4/sec-2.9.4.tar.gz
executables:
