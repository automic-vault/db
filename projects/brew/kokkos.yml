id: brew:kokkos
display-name: kokkos
homepage: https://kokkos.org
repo: https://github.com/kokkos/kokkos
docs: https://kokkos.org
package-manager:
  brew: kokkos
  dnf: kokkos
  macports: kokkos
  nix: kokkos
  ubuntu: kokkos
package-manager-url: https://formulae.brew.sh/formula/kokkos
version: 5.1.1
license: Apache-2.0
category: development
tags:
  - cli
description: C++ Performance Portability Ecosystem for parallel execution and abstraction
source-archive: https://github.com/kokkos/kokkos/releases/download/5.1.1/kokkos-5.1.1.tar.gz
dependencies:
  - libomp
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: hpcbind
  - exposure: global executable
    kind: cli
    name: kokkos_launch_compiler
  - exposure: global executable
    kind: cli
    name: nvcc_wrapper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kokkos
  brew: brew install kokkos
  dnf: sudo dnf install kokkos
  macports: sudo port install kokkos
  nix: nix profile install nixpkgs#kokkos
  ubuntu: sudo apt install kokkos
provenance:
  formula: kokkos
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
