id: brew:identme
display-name: identme
homepage: https://www.ident.me
repo: https://github.com/pcarrier/ident.me
docs: https://www.ident.me
package-manager:
  apk: identme
  brew: identme
  scoop: extras/identme
package-manager-url: https://formulae.brew.sh/formula/identme
version: 0.6.0
license: 0BSD
category: development
tags:
  - cli
description: Public IP address lookup
source-archive: https://github.com/pcarrier/ident.me/archive/refs/tags/v0.6.0.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: identme
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add identme
  av: sudo av install brew:identme
  brew: brew install identme
  scoop: scoop install extras/identme
provenance:
  formula: identme
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
