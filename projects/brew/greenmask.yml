id: brew:greenmask
display-name: greenmask
homepage: https://www.greenmask.io/
repo: https://github.com/GreenmaskIO/greenmask
docs: https://www.greenmask.io/
package-manager:
  brew: greenmask
  nix: greenmask
package-manager-url: https://formulae.brew.sh/formula/greenmask
version: 0.2.20
license: Apache-2.0
category: database
tags:
  - cli
description: PostgreSQL dump and obfuscation tool
source-archive: https://github.com/GreenmaskIO/greenmask/archive/refs/tags/v0.2.20.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: greenmask
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:greenmask
  brew: brew install greenmask
  nix: nix profile install nixpkgs#greenmask
provenance:
  formula: greenmask
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
