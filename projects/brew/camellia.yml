id: brew:camellia
display-name: camellia
homepage: https://camellia.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/camellia/Unix_Linux%20Distribution/v2.7.0/CamelliaLib-2.7.0.tar.gz
docs: https://camellia.sourceforge.net/
package-manager:
  brew: camellia
package-manager-url: https://formulae.brew.sh/formula/camellia
version: 2.7.0
license: BSD-3-Clause
category: media
tags:
  - cli
description: Image Processing & Computer Vision library written in C
source-archive: >
  https://downloads.sourceforge.net/project/camellia/Unix_Linux%20Distribution/v2.7.0/CamelliaLib-2.7.0.tar.gz
executables:
  - exposure: global executable
