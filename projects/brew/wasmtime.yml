id: brew:wasmtime
display-name: wasmtime
homepage: https://wasmtime.dev/
repo: https://github.com/bytecodealliance/wasmtime
docs: https://wasmtime.dev/
package-manager:
  apk: wasmtime
  brew: wasmtime
  macports: wasmtime
  nix: wasmtime
  pacman: wasmtime
  scoop: main/wasmtime
  winget: BytecodeAlliance.Wasmtime
package-manager-url: https://formulae.brew.sh/formula/wasmtime
version: 45.0.0
license: Apache-2.0 WITH LLVM-exception
category: development
tags:
  - cli
description: Standalone JIT-style runtime for WebAssembly, using Cranelift
source-archive: https://github.com/bytecodealliance/wasmtime.git
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: wasmtime
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wasmtime
  av: sudo av install brew:wasmtime
  brew: brew install wasmtime
  macports: sudo port install wasmtime
  nix: nix profile install nixpkgs#wasmtime
  pacman: sudo pacman -S wasmtime
  scoop: scoop install main/wasmtime
  winget: winget install --id BytecodeAlliance.Wasmtime -e
provenance:
  formula: wasmtime
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
