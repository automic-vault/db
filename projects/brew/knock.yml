id: brew:knock
display-name: knock
homepage: https://github.com/jvinet/knock
repo: https://github.com/jvinet/knock
docs: https://github.com/jvinet/knock
package-manager:
  apk: knock
  brew: knock
  debian: knockd
  dnf: knock
  macports: knock
  pacman: knockd
  ubuntu: knockd
  zypper: knock
package-manager-url: https://formulae.brew.sh/formula/knock
version: 0.8
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Port-knock server
source-archive: https://github.com/jvinet/knock/releases/download/v0.8/knock-0.8.tar.gz
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: knock
  - exposure: global executable
    kind: cli
    name: knock_helper_ipt.sh
  - exposure: global executable
    kind: cli
    name: knockd
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add knock
  av: sudo av install brew:knock
  brew: brew install knock
  debian: sudo apt install knockd
  dnf: sudo dnf install knock
  macports: sudo port install knock
  pacman: sudo pacman -S knockd
  ubuntu: sudo apt install knockd
  zypper: sudo zypper install knock
provenance:
  formula: knock
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
