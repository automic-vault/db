id: brew:txr
display-name: txr
homepage: https://www.nongnu.org/txr/
repo: https://www.kylheku.com/cgit/txr/snapshot/txr-302.tar.bz2
docs: https://www.nongnu.org/txr/
package-manager:
  apk: txr
  brew: txr
  nix: txr
package-manager-url: https://formulae.brew.sh/formula/txr
version: 302
license: BSD-2-Clause
category: development
tags:
  - cli
description: Lisp-like programming language for convenient data munging
source-archive: https://www.kylheku.com/cgit/txr/snapshot/txr-302.tar.bz2
build-dependencies:
  - pkgconf
uses-from-macos:
  - libffi
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: txr
  - exposure: global executable
    kind: cli
    name: txrlisp
  - exposure: global executable
    kind: cli
    name: txrvm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add txr
  av: sudo av install brew:txr
  brew: brew install txr
  nix: nix profile install nixpkgs#txr
provenance:
  formula: txr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
