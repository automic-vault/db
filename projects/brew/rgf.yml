id: brew:rgf
display-name: rgf
homepage: https://github.com/RGF-team/rgf
repo: https://github.com/RGF-team/rgf
docs: https://github.com/RGF-team/rgf
package-manager:
  brew: rgf
package-manager-url: https://formulae.brew.sh/formula/rgf
version: 3.12.0
license: MIT
category: development
tags:
  - cli
description: Regularized Greedy Forest library
source-archive: https://github.com/RGF-team/rgf/archive/refs/tags/3.12.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: rgf
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rgf
  brew: brew install rgf
provenance:
  formula: rgf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
