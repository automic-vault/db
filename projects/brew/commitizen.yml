id: brew:commitizen
display-name: commitizen
homepage: https://commitizen-tools.github.io/commitizen/
repo: >
  https://files.pythonhosted.org/packages/09/02/e404c26bea344629fde63e511260cea9260e690e9fae46b58f2cb3efd89e/commitizen-4.16.2.tar.gz
docs: https://commitizen-tools.github.io/commitizen/
package-manager:
  brew: commitizen
  macports: commitizen
  nix: commitizen
  winget: shipengqi.commitizen
package-manager-url: https://formulae.brew.sh/formula/commitizen
version: 4.16.2
license: MIT
category: development
tags:
  - cli
description: Defines a standard way of committing rules and communicating it
source-archive: >
  https://files.pythonhosted.org/packages/09/02/e404c26bea344629fde63e511260cea9260e690e9fae46b58f2cb3efd89e/commitizen-4.16.2.tar.gz
dependencies:
  - libyaml
  - python@3.14
build-dependencies:
  - maturin
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cz
  - exposure: global executable
    kind: cli
    name: git-cz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:commitizen
  brew: brew install commitizen
  macports: sudo port install commitizen
  nix: nix profile install nixpkgs#commitizen
  winget: winget install --id shipengqi.commitizen -e
provenance:
  formula: commitizen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
