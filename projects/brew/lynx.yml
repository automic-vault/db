id: brew:lynx
display-name: lynx
homepage: https://invisible-island.net/lynx/
repo: https://invisible-mirror.net/archives/lynx/tarballs/lynx2.9.3.tar.bz2
docs: https://invisible-island.net/lynx/
package-manager:
  apk: lynx
  brew: lynx
  debian: lynx
  dnf: lynx
  macports: lynx
  nix: lynx
  pacman: lynx
  scoop: main/lynx
  ubuntu: lynx
  zypper: lynx
package-manager-url: https://formulae.brew.sh/formula/lynx
version: 2.9.3
license: GPL-2.0-only
category: network
tags:
  - cli
description: Text-based web browser
source-archive: https://invisible-mirror.net/archives/lynx/tarballs/lynx2.9.3.tar.bz2
dependencies:
  - ncurses
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: lynx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lynx
  av: sudo av install brew:lynx
  brew: brew install lynx
  debian: sudo apt install lynx
  dnf: sudo dnf install lynx
  macports: sudo port install lynx
  nix: nix profile install nixpkgs#lynx
  pacman: sudo pacman -S lynx
  scoop: scoop install main/lynx
  ubuntu: sudo apt install lynx
  zypper: sudo zypper install lynx
provenance:
  formula: lynx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
