id: brew:ola
display-name: ola
homepage: https://github.com/OpenLightingProject/ola
repo: https://github.com/OpenLightingProject/ola
docs: https://github.com/OpenLightingProject/ola
package-manager:
  brew: ola
  debian: ola
  macports: ola
  nix: ola
  ubuntu: ola
package-manager-url: https://formulae.brew.sh/formula/ola
version: 0.10.9
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: Open Lighting Architecture for lighting control information
source-archive: https://github.com/OpenLightingProject/ola/releases/download/0.10.9/ola-0.10.9.tar.gz
dependencies:
  - abseil
  - liblo
  - libmicrohttpd
  - libusb
  - numpy
  - protobuf
build-dependencies:
  - autoconf
  - automake
  - cppunit
  - libtool
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ola_artnet
  - exposure: global executable
    kind: cli
    name: ola_dev_info
  - exposure: global executable
    kind: cli
    name: ola_dmxconsole
  - exposure: global executable
    kind: cli
    name: ola_dmxmonitor
  - exposure: global executable
    kind: cli
    name: ola_e131
  - exposure: global executable
    kind: cli
    name: ola_patch
  - exposure: global executable
    kind: cli
    name: ola_plugin_info
  - exposure: global executable
    kind: cli
    name: ola_plugin_state
  - exposure: global executable
    kind: cli
    name: ola_rdm_discover
  - exposure: global executable
    kind: cli
    name: ola_rdm_get
  - exposure: global executable
    kind: cli
    name: ola_rdm_set
  - exposure: global executable
    kind: cli
    name: ola_recorder
  - exposure: global executable
    kind: cli
    name: ola_set_dmx
  - exposure: global executable
    kind: cli
    name: ola_set_priority
  - exposure: global executable
    kind: cli
    name: ola_streaming_client
  - exposure: global executable
    kind: cli
    name: ola_timecode
  - exposure: global executable
    kind: cli
    name: ola_trigger
  - exposure: global executable
    kind: cli
    name: ola_uni_info
  - exposure: global executable
    kind: cli
    name: ola_uni_merge
  - exposure: global executable
    kind: cli
    name: ola_uni_name
  - exposure: global executable
    kind: cli
    name: ola_uni_stats
  - exposure: global executable
    kind: cli
    name: ola_usbpro
  - exposure: global executable
    kind: cli
    name: olad
  - exposure: global executable
    kind: cli
    name: rdmpro_sniffer
  - exposure: global executable
    kind: cli
    name: usbpro_firmware
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Python support has been removed due to:
    https://github.com/OpenLightingProject/ola/issues/2008
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:ola
  brew: brew install ola
  debian: sudo apt install ola
  macports: sudo port install ola
  nix: nix profile install nixpkgs#ola
  ubuntu: sudo apt install ola
provenance:
  formula: ola
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
