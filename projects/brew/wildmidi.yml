id: brew:wildmidi
display-name: wildmidi
homepage: https://github.com/Mindwerks/wildmidi
repo: https://github.com/Mindwerks/wildmidi
docs: https://github.com/Mindwerks/wildmidi
package-manager:
  brew: wildmidi
  debian: wildmidi
  dnf: wildmidi
  nix: wildmidi
  pacman: wildmidi
  ubuntu: wildmidi
  zypper: wildmidi
package-manager-url: https://formulae.brew.sh/formula/wildmidi
version: 0.4.6
license: GPL-3.0-only AND LGPL-3.0-only
category: development
tags:
  - cli
description: Simple software midi player
source-archive: https://github.com/Mindwerks/wildmidi/archive/refs/tags/wildmidi-0.4.6.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: wildmidi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wildmidi
  brew: brew install wildmidi
  debian: sudo apt install wildmidi
  dnf: sudo dnf install wildmidi
  nix: nix profile install nixpkgs#wildmidi
  pacman: sudo pacman -S wildmidi
  ubuntu: sudo apt install wildmidi
  zypper: sudo zypper install wildmidi
provenance:
  formula: wildmidi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
