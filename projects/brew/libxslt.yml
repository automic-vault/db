id: brew:libxslt
display-name: libxslt
homepage: http://xmlsoft.org/XSLT/
repo: https://download.gnome.org/sources/libxslt/1.1/libxslt-1.1.45.tar.xz
docs: http://xmlsoft.org/XSLT/
package-manager:
  apk: libxslt
  brew: libxslt
  chocolatey: xsltproc
  debian: xsltproc
  dnf: libxslt
  macports: libxslt
  nix: libxslt
  pacman: libxslt
  ubuntu: xsltproc
package-manager-url: https://formulae.brew.sh/formula/libxslt
version: 1.1.45
license: X11
category: network
tags:
  - cli
description: C XSLT library for GNOME
source-archive: https://download.gnome.org/sources/libxslt/1.1/libxslt-1.1.45.tar.xz
dependencies:
  - libgcrypt
  - libgpg-error
  - libxml2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xslt-config
  - exposure: global executable
    kind: cli
    name: xsltproc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To allow the nokogiri gem to link against this libxslt run: gem install nokogiri --
    --with-xslt-dir=$HOMEBREW_PREFIX/opt/libxslt
  post-install-defined: false
install-lines:
  apk: sudo apk add libxslt
  av: sudo av install brew:libxslt
  brew: brew install libxslt
  chocolatey: choco install xsltproc
  debian: sudo apt install xsltproc
  dnf: sudo dnf install libxslt
  macports: sudo port install libxslt
  nix: nix profile install nixpkgs#libxslt
  pacman: sudo pacman -S libxslt
  ubuntu: sudo apt install xsltproc
provenance:
  formula: libxslt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
