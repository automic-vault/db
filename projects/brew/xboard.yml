id: brew:xboard
display-name: xboard
homepage: https://www.gnu.org/software/xboard/
repo: https://ftpmirror.gnu.org/gnu/xboard/xboard-4.9.1.tar.gz
docs: https://www.gnu.org/software/xboard/
package-manager:
  apk: xboard
  brew: xboard
  debian: xboard
  dnf: xboard
  macports: xboard
  nix: xboard
  pacman: xboard
  ubuntu: xboard
package-manager-url: https://formulae.brew.sh/formula/xboard
version: 4.9.1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Graphical user interface for chess
source-archive: https://ftpmirror.gnu.org/gnu/xboard/xboard-4.9.1.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - fairymax
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+
  - harfbuzz
  - librsvg
  - pango
  - polyglot
build-dependencies:
  - pkgconf
  - texinfo
executables:
  - exposure: global executable
    kind: cli
    name: xboard
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xboard
  av: sudo av install brew:xboard
  brew: brew install xboard
  debian: sudo apt install xboard
  dnf: sudo dnf install xboard
  macports: sudo port install xboard
  nix: nix profile install nixpkgs#xboard
  pacman: sudo pacman -S xboard
  ubuntu: sudo apt install xboard
provenance:
  formula: xboard
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
