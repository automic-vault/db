id: brew:eget
display-name: eget
homepage: https://github.com/zyedidia/eget
repo: https://github.com/zyedidia/eget
docs: https://github.com/zyedidia/eget
package-manager:
  brew: eget
  nix: eget
  scoop: extras/eget
  winget: ZacharyYedidia.Eget
package-manager-url: https://formulae.brew.sh/formula/eget
version: 1.3.4
license: MIT
category: development
tags:
  - cli
description: Easily install prebuilt binaries from GitHub
source-archive: https://github.com/zyedidia/eget/archive/refs/tags/v1.3.4.tar.gz
build-dependencies:
  - go
  - pandoc
executables:
  - exposure: global executable
    kind: cli
    name: eget
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:eget
  brew: brew install eget
  nix: nix profile install nixpkgs#eget
  scoop: scoop install extras/eget
  winget: winget install --id ZacharyYedidia.Eget -e
provenance:
  formula: eget
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
