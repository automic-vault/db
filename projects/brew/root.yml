  - exposure: global executable
    kind: cli
    name: rmkdepend
  - exposure: global executable
    kind: cli
    name: root
  - exposure: global executable
    kind: cli
    name: root-config
  - exposure: global executable
    kind: cli
    name: root.exe
  - exposure: global executable
    kind: cli
    name: rootbrowse
  - exposure: global executable
    kind: cli
    name: rootcint
  - exposure: global executable
    kind: cli
    name: rootcling
  - exposure: global executable
    kind: cli
    name: rootcp
  - exposure: global executable
    kind: cli
    name: rootdrawtree
  - exposure: global executable
    kind: cli
    name: rooteventselector
  - exposure: global executable
    kind: cli
    name: rootls
  - exposure: global executable
    kind: cli
    name: rootmkdir
  - exposure: global executable
    kind: cli
    name: rootmv
  - exposure: global executable
