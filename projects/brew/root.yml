    name: rootreadspeed
  - exposure: global executable
    kind: cli
    name: rootrm
  - exposure: global executable
    kind: cli
    name: roots
  - exposure: global executable
    kind: cli
    name: roots.exe
  - exposure: global executable
    kind: cli
    name: rootslimtree
  - exposure: global executable
    kind: cli
    name: rootssh
  - exposure: global executable
    kind: cli
    name: setxrd.csh
  - exposure: global executable
    kind: cli
    name: thisroot.csh
  - exposure: global executable
    kind: cli
    name: thisroot.fish
  - exposure: global executable
    kind: cli
    name: thisroot.sh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    As of ROOT 6.22, you should not need the thisroot scripts; but if you depend on the
    custom variables set by them, you can still run them: For bash users: .
    $HOMEBREW_PREFIX/bin/thisroot.sh For zsh users: pushd $HOMEBREW_PREFIX >/dev/null; .
    bin/thisroot.sh; popd >/dev/null For csh/tcsh users: source
    $HOMEBREW_PREFIX/bin/thisroot.csh For fish users: .
    $HOMEBREW_PREFIX/bin/thisroot.fish
  post-install-defined: false
install-lines:
  av: sudo av install brew:root
  brew: brew install root
  dnf: sudo dnf install root
  nix: nix profile install nixpkgs#root
  pacman: sudo pacman -S root
provenance:
  formula: root
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
