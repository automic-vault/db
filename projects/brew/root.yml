id: brew:root
display-name: root
homepage: https://root.cern
repo: https://root.cern/download/root_v6.40.00.source.tar.gz
docs: https://root.cern
package-manager:
  brew: root
  dnf: root
  nix: root
  pacman: root
package-manager-url: https://formulae.brew.sh/formula/root
version: 6.40.00
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Analyzing petabytes of data, scientifically
source-archive: https://root.cern/download/root_v6.40.00.source.tar.gz
dependencies:
  - cfitsio
  - davix
  - fftw
  - freetype
  - ftgl
  - gcc
  - giflib
  - gl2ps
  - glew
  - graphviz
  - gsl
  - jpeg-turbo
  - libpng
  - libtiff
  - lz4
  - nlohmann-json
  - numpy
  - openblas
  - openssl@3
  - pcre2
  - python@3.14
  - sqlite
  - tbb
  - xrootd
  - xxhash
  - xz
  - zstd
build-dependencies:
  - cmake
  - ninja
  - pkgconf
uses-from-macos:
  - curl
  - libxcrypt
  - libxml2
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: g2root
  - exposure: global executable
    kind: cli
    name: genreflex
  - exposure: global executable
    kind: cli
    name: h2root
  - exposure: global executable
