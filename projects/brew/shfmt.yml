id: brew:shfmt
display-name: shfmt
homepage: https://github.com/mvdan/sh
repo: https://github.com/mvdan/sh
docs: https://github.com/mvdan/sh
package-manager:
  apk: shfmt
  brew: shfmt
  debian: shfmt
  macports: shfmt
  nix: shfmt
  pacman: shfmt
  scoop: main/shfmt
  ubuntu: shfmt
  winget: mvdan.shfmt
  zypper: shfmt
package-manager-url: https://formulae.brew.sh/formula/shfmt
version: 3.13.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Autoformat shell script source code
source-archive: https://github.com/mvdan/sh/archive/refs/tags/v3.13.1.tar.gz
build-dependencies:
  - go
  - scdoc
executables:
  - exposure: global executable
    kind: cli
    name: shfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add shfmt
  av: sudo av install brew:shfmt
  brew: brew install shfmt
  debian: sudo apt install shfmt
  macports: sudo port install shfmt
  nix: nix profile install nixpkgs#shfmt
  pacman: sudo pacman -S shfmt
  scoop: scoop install main/shfmt
  ubuntu: sudo apt install shfmt
  winget: winget install --id mvdan.shfmt -e
  zypper: sudo zypper install shfmt
provenance:
  formula: shfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
