id: brew:garden
display-name: garden
homepage: https://github.com/garden-rs/garden
repo: https://github.com/garden-rs/garden
docs: https://github.com/garden-rs/garden
package-manager:
  brew: garden
  dnf: garden
package-manager-url: https://formulae.brew.sh/formula/garden
version: 2.6.0
license: MIT
category: development
tags:
  - cli
  - git
description: Grow and cultivate collections of Git trees
source-archive: https://github.com/garden-rs/garden/archive/refs/tags/v2.6.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: garden
  - exposure: global executable
    kind: cli
    name: garden-gui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:garden
  brew: brew install garden
  dnf: sudo dnf install garden
provenance:
  formula: garden
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
