id: brew:cmdshelf
display-name: cmdshelf
homepage: https://github.com/toshi0383/cmdshelf
repo: https://github.com/toshi0383/cmdshelf
docs: https://github.com/toshi0383/cmdshelf
package-manager:
  brew: cmdshelf
package-manager-url: https://formulae.brew.sh/formula/cmdshelf
version: 2.0.2
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Better scripting life with cmdshelf
source-archive: https://github.com/toshi0383/cmdshelf/archive/refs/tags/2.0.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cmdshelf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cmdshelf
  brew: brew install cmdshelf
provenance:
  formula: cmdshelf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
