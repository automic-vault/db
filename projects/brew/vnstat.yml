id: brew:vnstat
display-name: vnstat
homepage: https://humdi.net/vnstat/
repo: https://humdi.net/vnstat/vnstat-2.13.tar.gz
docs: https://humdi.net/vnstat/
package-manager:
  apk: vnstat
  brew: vnstat
  debian: vnstat
  dnf: vnstat
  macports: vnstat
  nix: vnstat
  pacman: vnstat
  ubuntu: vnstat
  zypper: vnstat
package-manager-url: https://formulae.brew.sh/formula/vnstat
version: 2.13
license: GPL-2.0-only
category: network
tags:
  - cli
description: Console-based network traffic monitor
source-archive: https://humdi.net/vnstat/vnstat-2.13.tar.gz
dependencies:
  - gd
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: vnstat
  - exposure: global executable
    kind: cli
    name: vnstatd
  - exposure: global executable
    kind: cli
    name: vnstati
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: To monitor interfaces other than "en0" edit $HOMEBREW_PREFIX/etc/vnstat.conf
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add vnstat
  av: sudo av install brew:vnstat
  brew: brew install vnstat
  debian: sudo apt install vnstat
  dnf: sudo dnf install vnstat
  macports: sudo port install vnstat
  nix: nix profile install nixpkgs#vnstat
  pacman: sudo pacman -S vnstat
  ubuntu: sudo apt install vnstat
  zypper: sudo zypper install vnstat
provenance:
  formula: vnstat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
