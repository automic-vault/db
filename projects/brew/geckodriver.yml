id: brew:geckodriver
display-name: geckodriver
homepage: https://github.com/mozilla/geckodriver
repo: >
  https://hg.mozilla.org/mozilla-central/archive/a3d508507022919429308d9c2d9cace99ff2be56.zip/testing/geckodriver/
docs: https://github.com/mozilla/geckodriver
package-manager:
  apk: geckodriver
  brew: geckodriver
  macports: geckodriver
  nix: geckodriver
  pacman: geckodriver
  scoop: main/geckodriver
  winget: Mozilla.GeckoDriver
package-manager-url: https://formulae.brew.sh/formula/geckodriver
version: 0.36.0
license: MPL-2.0
category: development
tags:
  - cli
description: WebDriver Marionette proxy
source-archive: >
  https://hg.mozilla.org/mozilla-central/archive/a3d508507022919429308d9c2d9cace99ff2be56.zip/testing/geckodriver/
build-dependencies:
  - rust
uses-from-macos:
  - unzip
executables:
  - exposure: global executable
    kind: cli
    name: geckodriver
  - exposure: global executable
    kind: cli
    name: wires
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add geckodriver
  av: sudo av install brew:geckodriver
  brew: brew install geckodriver
  macports: sudo port install geckodriver
  nix: nix profile install nixpkgs#geckodriver
  pacman: sudo pacman -S geckodriver
  scoop: scoop install main/geckodriver
  winget: winget install --id Mozilla.GeckoDriver -e
provenance:
  formula: geckodriver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
