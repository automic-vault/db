id: brew:changelogen
display-name: changelogen
homepage: https://github.com/unjs/changelogen
repo: https://registry.npmjs.org/changelogen/-/changelogen-0.6.2.tgz
docs: https://github.com/unjs/changelogen
package-manager:
  brew: changelogen
  nix: changelogen
package-manager-url: https://formulae.brew.sh/formula/changelogen
version: 0.6.2
license: MIT
category: development
tags:
  - cli
description: Generate Beautiful Changelogs using Conventional Commits
source-archive: https://registry.npmjs.org/changelogen/-/changelogen-0.6.2.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: changelogen
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:changelogen
  brew: brew install changelogen
  nix: nix profile install nixpkgs#changelogen
provenance:
  formula: changelogen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
