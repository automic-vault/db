id: brew:diskonaut
display-name: diskonaut
homepage: https://github.com/imsnif/diskonaut
repo: https://github.com/imsnif/diskonaut
docs: https://github.com/imsnif/diskonaut
package-manager:
  apk: diskonaut
  brew: diskonaut
  dnf: diskonaut
  macports: diskonaut
  pacman: diskonaut
package-manager-url: https://formulae.brew.sh/formula/diskonaut
version: 0.11.0
license: MIT
category: development
tags:
  - cli
description: Terminal visual disk space navigator
source-archive: https://github.com/imsnif/diskonaut/archive/refs/tags/0.11.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: diskonaut
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add diskonaut
  av: sudo av install brew:diskonaut
  brew: brew install diskonaut
  dnf: sudo dnf install diskonaut
  macports: sudo port install diskonaut
  pacman: sudo pacman -S diskonaut
provenance:
  formula: diskonaut
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
