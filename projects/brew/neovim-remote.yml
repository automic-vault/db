id: brew:neovim-remote
display-name: neovim-remote
homepage: https://github.com/mhinz/neovim-remote
repo: >
  https://files.pythonhosted.org/packages/69/50/4fe9ef6fd794929ceae73e476ac8a4ddbf3b0913fa248d834c9bb72978b7/neovim-remote-2.5.1.tar.gz
docs: https://github.com/mhinz/neovim-remote
package-manager:
  brew: neovim-remote
  macports: neovim-remote
  nix: neovim-remote
package-manager-url: https://formulae.brew.sh/formula/neovim-remote
version: 2.5.1
license: MIT
category: development
tags:
  - cli
description: Control nvim processes using nvr command-line tool
source-archive: >
  https://files.pythonhosted.org/packages/69/50/4fe9ef6fd794929ceae73e476ac8a4ddbf3b0913fa248d834c9bb72978b7/neovim-remote-2.5.1.tar.gz
dependencies:
  - neovim
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: nvr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:neovim-remote
  brew: brew install neovim-remote
  macports: sudo port install neovim-remote
  nix: nix profile install nixpkgs#neovim-remote
provenance:
  formula: neovim-remote
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
