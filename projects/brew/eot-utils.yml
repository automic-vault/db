id: brew:eot-utils
display-name: eot-utils
homepage: https://www.w3.org/Tools/eot-utils/
repo: https://www.w3.org/Tools/eot-utils/eot-utilities-1.1.tar.gz
docs: https://www.w3.org/Tools/eot-utils/
package-manager:
  brew: eot-utils
  debian: eot-utils
  dnf: eot-utils
  macports: eot-utils
  ubuntu: eot-utils
package-manager-url: https://formulae.brew.sh/formula/eot-utils
version: 1.1
license: W3C
category: development
tags:
  - cli
description: Tools to convert fonts from OTF/TTF to EOT format
source-archive: https://www.w3.org/Tools/eot-utils/eot-utilities-1.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: eotinfo
  - exposure: global executable
    kind: cli
    name: mkeot
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:eot-utils
  brew: brew install eot-utils
  debian: sudo apt install eot-utils
  dnf: sudo dnf install eot-utils
  macports: sudo port install eot-utils
  ubuntu: sudo apt install eot-utils
provenance:
  formula: eot-utils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
