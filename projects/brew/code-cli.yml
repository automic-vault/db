id: brew:code-cli
display-name: code-cli
homepage: https://github.com/microsoft/vscode
repo: https://github.com/microsoft/vscode
docs: https://github.com/microsoft/vscode
package-manager:
  brew: code-cli
  nix: code
  pacman: code
package-manager-url: https://formulae.brew.sh/formula/code-cli
version: 1.121.0
license: MIT
category: development
tags:
  - cli
description: Command-line interface built-in Visual Studio Code
source-archive: https://github.com/microsoft/vscode/archive/refs/tags/1.121.0.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: code
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:code-cli
  brew: brew install code-cli
  nix: nix profile install nixpkgs#code
  pacman: sudo pacman -S code
provenance:
  formula: code-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
