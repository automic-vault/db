id: brew:snitch
display-name: snitch
homepage: https://github.com/karol-broda/snitch
repo: https://github.com/karol-broda/snitch
docs: https://github.com/karol-broda/snitch
package-manager:
  brew: snitch
  nix: snitch
package-manager-url: https://formulae.brew.sh/formula/snitch
version: 0.2.2
license: MIT
category: development
tags:
  - cli
description: Prettier way to inspect network connections
source-archive: https://github.com/karol-broda/snitch/archive/refs/tags/v0.2.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: snitch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:snitch
  brew: brew install snitch
  nix: nix profile install nixpkgs#snitch
provenance:
  formula: snitch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
