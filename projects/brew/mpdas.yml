id: brew:mpdas
display-name: mpdas
homepage: https://www.50hz.ws/mpdas/
repo: https://www.50hz.ws/mpdas/mpdas-0.4.5.tar.gz
docs: https://www.50hz.ws/mpdas/
package-manager:
  brew: mpdas
  debian: mpdas
  dnf: mpdas
  nix: mpdas
  ubuntu: mpdas
package-manager-url: https://formulae.brew.sh/formula/mpdas
version: 0.4.5
license: BSD-3-Clause
category: media
tags:
  - cli
description: C++ client to submit tracks to audioscrobbler
source-archive: https://www.50hz.ws/mpdas/mpdas-0.4.5.tar.gz
dependencies:
  - libmpdclient
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: mpdas
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:mpdas
  brew: brew install mpdas
  debian: sudo apt install mpdas
  dnf: sudo dnf install mpdas
  nix: nix profile install nixpkgs#mpdas
  ubuntu: sudo apt install mpdas
provenance:
  formula: mpdas
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
