id: brew:pgweb
display-name: pgweb
homepage: https://sosedoff.github.io/pgweb/
repo: https://github.com/sosedoff/pgweb
docs: https://sosedoff.github.io/pgweb/
package-manager:
  brew: pgweb
  nix: pgweb
package-manager-url: https://formulae.brew.sh/formula/pgweb
version: 0.17.0
license: MIT
category: database
tags:
  - cli
  - database
description: Web-based PostgreSQL database browser
source-archive: https://github.com/sosedoff/pgweb/archive/refs/tags/v0.17.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pgweb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pgweb
  brew: brew install pgweb
  nix: nix profile install nixpkgs#pgweb
provenance:
  formula: pgweb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
