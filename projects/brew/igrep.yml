id: brew:igrep
display-name: igrep
homepage: https://github.com/konradsz/igrep
repo: https://github.com/konradsz/igrep
docs: https://github.com/konradsz/igrep
package-manager:
  apk: igrep
  brew: igrep
  macports: igrep
  nix: igrep
  pacman: igrep
  scoop: main/igrep
  zypper: igrep
package-manager-url: https://formulae.brew.sh/formula/igrep
version: 1.3.0
license: MIT
category: development
tags:
  - cli
description: Interactive grep
source-archive: https://github.com/konradsz/igrep/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ig
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add igrep
  av: sudo av install brew:igrep
  brew: brew install igrep
  macports: sudo port install igrep
  nix: nix profile install nixpkgs#igrep
  pacman: sudo pacman -S igrep
  scoop: scoop install main/igrep
  zypper: sudo zypper install igrep
provenance:
  formula: igrep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
