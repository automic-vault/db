id: brew:genometools
display-name: genometools
homepage: https://genometools.org/
repo: https://github.com/genometools/genometools
docs: https://genometools.org/
package-manager:
  brew: genometools
  debian: genometools
  ubuntu: genometools
package-manager-url: https://formulae.brew.sh/formula/genometools
version: 1.6.6
license: ISC
category: development
tags:
  - cli
description: Versatile open source genome analysis software
source-archive: https://github.com/genometools/genometools/archive/refs/tags/v1.6.6.tar.gz
dependencies:
  - cairo
  - gettext
  - glib
  - harfbuzz
  - pango
  - tre
build-dependencies:
  - pkgconf
  - python@3.14
uses-from-macos:
  - bzip2
  - expat
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: genometools-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:genometools
  brew: brew install genometools
  debian: sudo apt install genometools
  ubuntu: sudo apt install genometools
provenance:
  formula: genometools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
