id: brew:miniflux
display-name: miniflux
homepage: https://miniflux.app
repo: https://github.com/miniflux/v2
docs: https://miniflux.app
package-manager:
  apk: miniflux
  brew: miniflux
  debian: miniflux
  macports: miniflux
  nix: miniflux
  pacman: miniflux
  ubuntu: miniflux
package-manager-url: https://formulae.brew.sh/formula/miniflux
version: 2.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Minimalist and opinionated feed reader
source-archive: https://github.com/miniflux/v2/archive/refs/tags/2.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: miniflux
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add miniflux
  av: sudo av install brew:miniflux
  brew: brew install miniflux
  debian: sudo apt install miniflux
  macports: sudo port install miniflux
  nix: nix profile install nixpkgs#miniflux
  pacman: sudo pacman -S miniflux
  ubuntu: sudo apt install miniflux
provenance:
  formula: miniflux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
