id: brew:fastq-tools
display-name: fastq-tools
homepage: https://github.com/dcjones/fastq-tools
repo: https://github.com/dcjones/fastq-tools
docs: https://github.com/dcjones/fastq-tools
package-manager:
  brew: fastq-tools
package-manager-url: https://formulae.brew.sh/formula/fastq-tools
version: 0.8.3
license: MIT
category: development
tags:
  - cli
description: Small utilities for working with fastq sequence files
source-archive: https://github.com/dcjones/fastq-tools/archive/refs/tags/v0.8.3.tar.gz
dependencies:
  - pcre
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: fastq-grep
  - exposure: global executable
    kind: cli
    name: fastq-kmers
  - exposure: global executable
    kind: cli
    name: fastq-match
  - exposure: global executable
    kind: cli
    name: fastq-qscale
  - exposure: global executable
    kind: cli
    name: fastq-qual
  - exposure: global executable
    kind: cli
    name: fastq-qualadj
  - exposure: global executable
    kind: cli
    name: fastq-sample
  - exposure: global executable
    kind: cli
    name: fastq-sort
  - exposure: global executable
    kind: cli
    name: fastq-uniq
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fastq-tools
  brew: brew install fastq-tools
provenance:
  formula: fastq-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
