id: brew:c10t
display-name: c10t
homepage: https://github.com/udoprog/c10t
repo: https://github.com/udoprog/c10t
docs: https://github.com/udoprog/c10t
package-manager:
  brew: c10t
package-manager-url: https://formulae.brew.sh/formula/c10t
version: 1.7
license: BSD-3-Clause
category: development
tags:
  - cli
description: Minecraft cartography tool
source-archive: https://github.com/udoprog/c10t/archive/refs/tags/1.7.tar.gz
dependencies:
  - boost
  - freetype
  - libpng
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: c10t
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:c10t
  brew: brew install c10t
provenance:
  formula: c10t
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
