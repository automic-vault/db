id: brew:diffoci
display-name: diffoci
homepage: https://github.com/reproducible-containers/diffoci
repo: https://github.com/reproducible-containers/diffoci
docs: https://github.com/reproducible-containers/diffoci
package-manager:
  brew: diffoci
  nix: diffoci
  pacman: diffoci
package-manager-url: https://formulae.brew.sh/formula/diffoci
version: 0.1.8
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: Diff for Docker and OCI container images
source-archive: https://github.com/reproducible-containers/diffoci/archive/refs/tags/v0.1.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: diffoci
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:diffoci
  brew: brew install diffoci
  nix: nix profile install nixpkgs#diffoci
  pacman: sudo pacman -S diffoci
provenance:
  formula: diffoci
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
