id: brew:monit
display-name: monit
homepage: https://mmonit.com/monit/
repo: https://mmonit.com/monit/dist/monit-5.35.2.tar.gz
docs: https://mmonit.com/monit/
package-manager:
  apk: monit
  brew: monit
  debian: monit
  dnf: monit
  macports: monit
  nix: monit
  pacman: monit
  ubuntu: monit
  winget: fzf404.Monit
package-manager-url: https://formulae.brew.sh/formula/monit
version: 5.35.2
license: AGPL-3.0-or-later
category: network
tags:
  - cli
description: Manage and monitor processes, files, directories, and devices
source-archive: https://mmonit.com/monit/dist/monit-5.35.2.tar.gz
dependencies:
  - openssl@3
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: monit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add monit
  av: sudo av install brew:monit
  brew: brew install monit
  debian: sudo apt install monit
  dnf: sudo dnf install monit
  macports: sudo port install monit
  nix: nix profile install nixpkgs#monit
  pacman: sudo pacman -S monit
  ubuntu: sudo apt install monit
  winget: winget install --id fzf404.Monit -e
provenance:
  formula: monit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
