id: brew:lune
display-name: lune
homepage: https://lune-org.github.io/docs
repo: https://github.com/lune-org/lune
docs: https://lune-org.github.io/docs
package-manager:
  brew: lune
  nix: lune
  winget: Lune.Lune
package-manager-url: https://formulae.brew.sh/formula/lune
version: 0.10.4
license: MPL-2.0
category: development
tags:
  - cli
description: Standalone Luau script runtime
source-archive: https://github.com/lune-org/lune/archive/refs/tags/v0.10.4.tar.gz
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: lune
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lune
  brew: brew install lune
  nix: nix profile install nixpkgs#lune
  winget: winget install --id Lune.Lune -e
provenance:
  formula: lune
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
