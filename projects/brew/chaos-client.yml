id: brew:chaos-client
display-name: chaos-client
homepage: https://chaos.projectdiscovery.io
repo: https://github.com/projectdiscovery/chaos-client
docs: https://chaos.projectdiscovery.io
package-manager:
  brew: chaos-client
  nix: chaos
package-manager-url: https://formulae.brew.sh/formula/chaos-client
version: 0.5.2
license: MIT
category: development
tags:
  - cli
description: Client to communicate with Chaos DB API
source-archive: https://github.com/projectdiscovery/chaos-client/archive/refs/tags/v0.5.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: chaos
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chaos-client
  brew: brew install chaos-client
  nix: nix profile install nixpkgs#chaos
provenance:
  formula: chaos-client
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
