id: brew:forgejo
display-name: forgejo
homepage: https://forgejo.org/
repo: https://codeberg.org/forgejo/forgejo/releases/download/v15.0.2/forgejo-src-15.0.2.tar.gz
docs: https://forgejo.org/
package-manager:
  apk: forgejo
  brew: forgejo
  dnf: forgejo
  nix: forgejo
  pacman: forgejo
  zypper: forgejo
package-manager-url: https://formulae.brew.sh/formula/forgejo
version: 15.0.2
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Self-hosted lightweight software forge
source-archive: https://codeberg.org/forgejo/forgejo/releases/download/v15.0.2/forgejo-src-15.0.2.tar.gz
build-dependencies:
  - go
  - node
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: forgejo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add forgejo
  av: sudo av install brew:forgejo
  brew: brew install forgejo
  dnf: sudo dnf install forgejo
  nix: nix profile install nixpkgs#forgejo
  pacman: sudo pacman -S forgejo
  zypper: sudo zypper install forgejo
provenance:
  formula: forgejo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
