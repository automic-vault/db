id: brew:ccextractor
display-name: ccextractor
homepage: https://www.ccextractor.org
repo: https://github.com/CCExtractor/ccextractor
docs: https://www.ccextractor.org
package-manager:
  brew: ccextractor
  nix: ccextractor
  scoop: extras/ccextractor
  ubuntu: ccextractor
  winget: CCExtractor.CCExtractor
package-manager-url: https://formulae.brew.sh/formula/ccextractor
version: 0.96.6
license: GPL-2.0-only
category: development
tags:
  - cli
description: Tool for extracting closed captions from video files
source-archive: https://github.com/CCExtractor/ccextractor/archive/refs/tags/v0.96.6.tar.gz
dependencies:
  - freetype
  - gpac
  - libpng
  - protobuf-c
  - utf8proc
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ccextractor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ccextractor
  brew: brew install ccextractor
  nix: nix profile install nixpkgs#ccextractor
  scoop: scoop install extras/ccextractor
  ubuntu: sudo apt install ccextractor
  winget: winget install --id CCExtractor.CCExtractor -e
provenance:
  formula: ccextractor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
