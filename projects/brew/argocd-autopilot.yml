id: brew:argocd-autopilot
display-name: argocd-autopilot
homepage: https://argoproj.io
repo: https://github.com/argoproj-labs/argocd-autopilot
docs: https://argoproj.io
package-manager:
  brew: argocd-autopilot
  nix: argocd-autopilot
  scoop: main/argocd-autopilot
  zypper: argocd-autopilot
package-manager-url: https://formulae.brew.sh/formula/argocd-autopilot
version: 0.4.20
license: Apache-2.0
category: development
tags:
  - cli
description: Opinionated way of installing Argo CD and managing GitOps repositories
source-archive: https://github.com/argoproj-labs/argocd-autopilot.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: argocd-autopilot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:argocd-autopilot
  brew: brew install argocd-autopilot
  nix: nix profile install nixpkgs#argocd-autopilot
  scoop: scoop install main/argocd-autopilot
  zypper: sudo zypper install argocd-autopilot
provenance:
  formula: argocd-autopilot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
