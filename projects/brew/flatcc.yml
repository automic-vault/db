id: brew:flatcc
display-name: flatcc
homepage: https://github.com/dvidelabs/flatcc
repo: https://github.com/dvidelabs/flatcc
docs: https://github.com/dvidelabs/flatcc
package-manager:
  brew: flatcc
  nix: flatcc
package-manager-url: https://formulae.brew.sh/formula/flatcc
version: 0.6.1
license: Apache-2.0
category: development
tags:
  - cli
description: FlatBuffers Compiler and Library in C for C
source-archive: https://github.com/dvidelabs/flatcc/archive/refs/tags/v0.6.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: flatcc
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flatcc
  brew: brew install flatcc
  nix: nix profile install nixpkgs#flatcc
provenance:
  formula: flatcc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
