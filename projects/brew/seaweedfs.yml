id: brew:seaweedfs
display-name: seaweedfs
homepage: https://github.com/seaweedfs/seaweedfs
repo: https://github.com/seaweedfs/seaweedfs
docs: https://github.com/seaweedfs/seaweedfs
package-manager:
  apk: seaweedfs
  brew: seaweedfs
  nix: seaweedfs
  pacman: seaweedfs
package-manager-url: https://formulae.brew.sh/formula/seaweedfs
version: 4.29
license: Apache-2.0
category: development
tags:
  - cli
description: Fast distributed storage system
source-archive: https://github.com/seaweedfs/seaweedfs.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: weed
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
  service: declared
install-lines:
  apk: sudo apk add seaweedfs
  av: sudo av install brew:seaweedfs
  brew: brew install seaweedfs
  nix: nix profile install nixpkgs#seaweedfs
  pacman: sudo pacman -S seaweedfs
provenance:
  formula: seaweedfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
