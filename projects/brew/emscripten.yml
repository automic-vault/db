id: brew:emscripten
display-name: emscripten
homepage: https://emscripten.org/
repo: https://github.com/emscripten-core/emscripten
docs: https://emscripten.org/
package-manager:
  brew: emscripten
  chocolatey: emscripten
  debian: emscripten
  macports: emscripten
  nix: emscripten
  pacman: emscripten
  scoop: main/emscripten
  ubuntu: emscripten
package-manager-url: https://formulae.brew.sh/formula/emscripten
version: 5.0.7
license: Apache-2.0 AND (Apache-2.0 WITH LLVM-exception) AND (MIT OR NCSA)
category: development
tags:
  - cli
description: LLVM bytecode to JavaScript compiler
source-archive: https://github.com/emscripten-core/emscripten/archive/refs/tags/5.0.7.tar.gz
dependencies:
  - node
  - openjdk
  - python@3.14
  - yuicompressor
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: bootstrap
  - exposure: global executable
    kind: cli
    name: em++
  - exposure: global executable
    kind: cli
    name: em-config
  - exposure: global executable
    kind: cli
    name: emar
  - exposure: global executable
    kind: cli
    name: embuilder
  - exposure: global executable
    kind: cli
    name: emcc
  - exposure: global executable
    kind: cli
    name: emcmake
  - exposure: global executable
    kind: cli
    name: emconfigure
  - exposure: global executable
    kind: cli
    name: emdwp
  - exposure: global executable
    kind: cli
    name: emmake
  - exposure: global executable
    kind: cli
    name: emnm
  - exposure: global executable
    kind: cli
    name: empath-split
  - exposure: global executable
    kind: cli
    name: emprofile
  - exposure: global executable
    kind: cli
    name: emranlib
  - exposure: global executable
    kind: cli
    name: emrun
  - exposure: global executable
    kind: cli
    name: emscan-deps
  - exposure: global executable
    kind: cli
    name: emscons
  - exposure: global executable
    kind: cli
    name: emsize
  - exposure: global executable
    kind: cli
    name: emstrip
  - exposure: global executable
    kind: cli
    name: emsymbolizer
  - exposure: global executable
    kind: cli
    name: wasm32-clang
  - exposure: global executable
    kind: cli
    name: wasm32-clang++
  - exposure: global executable
    kind: cli
    name: wasm32-wasi-clang
  - exposure: global executable
    kind: cli
    name: wasm32-wasi-clang++
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:emscripten
  brew: brew install emscripten
  chocolatey: choco install emscripten
  debian: sudo apt install emscripten
  macports: sudo port install emscripten
  nix: nix profile install nixpkgs#emscripten
  pacman: sudo pacman -S emscripten
  scoop: scoop install main/emscripten
  ubuntu: sudo apt install emscripten
provenance:
  formula: emscripten
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
