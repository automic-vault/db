id: brew:icloudpd
display-name: icloudpd
homepage: https://github.com/icloud-photos-downloader/icloud_photos_downloader
repo: https://github.com/icloud-photos-downloader/icloud_photos_downloader
docs: https://github.com/icloud-photos-downloader/icloud_photos_downloader
package-manager:
  brew: icloudpd
  chocolatey: iCloud
  nix: icloudpd
package-manager-url: https://formulae.brew.sh/formula/icloudpd
version: 1.32.2
license: MIT
category: cloud
tags:
  - cli
description: Tool to download photos from iCloud
source-archive: https://github.com/icloud-photos-downloader/icloud_photos_downloader.git
dependencies:
  - certifi
  - python@3.14
build-dependencies:
  - gnu-sed
executables:
  - exposure: global executable
    kind: cli
    name: icloud
  - exposure: global executable
    kind: cli
    name: icloudpd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:icloudpd
  brew: brew install icloudpd
  chocolatey: choco install iCloud
  nix: nix profile install nixpkgs#icloudpd
provenance:
  formula: icloudpd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
