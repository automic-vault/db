id: brew:python-lsp-server
display-name: python-lsp-server
homepage: https://github.com/python-lsp/python-lsp-server
repo: >
  https://files.pythonhosted.org/packages/b4/b5/b989d41c63390dfc2bf63275ab543b82fed076723d912055e77ccbae1422/python_lsp_server-1.14.0.tar.gz
docs: https://github.com/python-lsp/python-lsp-server
package-manager:
  brew: python-lsp-server
  pacman: python-lsp-server
package-manager-url: https://formulae.brew.sh/formula/python-lsp-server
version: 1.14.0
license: MIT
category: development
tags:
  - cli
description: Python Language Server for the Language Server Protocol
source-archive: >
  https://files.pythonhosted.org/packages/b4/b5/b989d41c63390dfc2bf63275ab543b82fed076723d912055e77ccbae1422/python_lsp_server-1.14.0.tar.gz
dependencies:
  - python@3.14
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: pylsp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:python-lsp-server
  brew: brew install python-lsp-server
  pacman: sudo pacman -S python-lsp-server
provenance:
  formula: python-lsp-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
