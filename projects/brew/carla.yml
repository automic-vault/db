id: brew:carla
display-name: carla
homepage: https://kx.studio/Applications:Carla
repo: https://github.com/falkTX/Carla
docs: https://kx.studio/Applications:Carla
package-manager:
  apk: carla
  brew: carla
  dnf: Carla
  nix: carla
  pacman: carla
  ubuntu: carla
  zypper: carla
package-manager-url: https://formulae.brew.sh/formula/carla
version: 2.5.10
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Audio plugin host supporting LADSPA, LV2, VST2/3, SF2 and more
source-archive: https://github.com/falkTX/Carla/archive/refs/tags/v2.5.10.tar.gz
dependencies:
  - fluid-synth
  - liblo
  - libmagic
  - libsndfile
  - pyqt@5
  - python@3.14
  - qt@5
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: carla
  - exposure: global executable
    kind: cli
    name: carla-control
  - exposure: global executable
    kind: cli
    name: carla-database
  - exposure: global executable
    kind: cli
    name: carla-jack-multi
  - exposure: global executable
    kind: cli
    name: carla-jack-patchbayplugin
  - exposure: global executable
    kind: cli
    name: carla-jack-single
  - exposure: global executable
    kind: cli
    name: carla-osc-gui
  - exposure: global executable
    kind: cli
    name: carla-patchbay
  - exposure: global executable
    kind: cli
    name: carla-rack
  - exposure: global executable
    kind: cli
    name: carla-settings
  - exposure: global executable
    kind: cli
    name: carla-single
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add carla
  av: sudo av install brew:carla
  brew: brew install carla
  dnf: sudo dnf install Carla
  nix: nix profile install nixpkgs#carla
  pacman: sudo pacman -S carla
  ubuntu: sudo apt install carla
  zypper: sudo zypper install carla
provenance:
  formula: carla
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
