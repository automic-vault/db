id: brew:librasterlite2
display-name: librasterlite2
homepage: https://www.gaia-gis.it/fossil/librasterlite2/index
repo: >
  https://www.gaia-gis.it/gaia-sins/librasterlite2-sources/librasterlite2-1.1.0-beta1.tar.gz
docs: https://www.gaia-gis.it/fossil/librasterlite2/index
package-manager:
  apk: librasterlite2
  brew: librasterlite2
  dnf: librasterlite2
  macports: librasterlite2
  nix: librasterlite2
package-manager-url: https://formulae.brew.sh/formula/librasterlite2
version: 1.1.0-beta1
license: MPL-1.1 OR GPL-2.0-or-later OR LGPL-2.1-or-later
category: network
tags:
  - cli
description: Library to store and retrieve huge raster coverages
source-archive: >
  https://www.gaia-gis.it/gaia-sins/librasterlite2-sources/librasterlite2-1.1.0-beta1.tar.gz
dependencies:
  - cairo
  - fontconfig
  - freetype
  - freexl
  - geos
  - giflib
  - jpeg-turbo
  - libgeotiff
  - libpng
  - librttopo
  - libspatialite
  - libtiff
  - libxml2
  - lz4
  - minizip
  - openjpeg
  - pixman
  - proj
  - sqlite
  - webp
  - xz
  - zstd
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: rl2sniff
  - exposure: global executable
    kind: cli
    name: rl2tool
  - exposure: global executable
    kind: cli
    name: wmslite
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add librasterlite2
  av: sudo av install brew:librasterlite2
  brew: brew install librasterlite2
  dnf: sudo dnf install librasterlite2
  macports: sudo port install librasterlite2
  nix: nix profile install nixpkgs#librasterlite2
provenance:
  formula: librasterlite2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
