id: brew:cilium-cli
display-name: cilium-cli
homepage: https://cilium.io
repo: https://github.com/cilium/cilium-cli
docs: https://cilium.io
package-manager:
  apk: cilium-cli
  brew: cilium-cli
  nix: cilium-cli
  pacman: cilium-cli
  winget: Cilium.CiliumCLI
  zypper: cilium-cli
package-manager-url: https://formulae.brew.sh/formula/cilium-cli
version: 0.19.4
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: CLI to install, manage & troubleshoot Kubernetes clusters running Cilium
source-archive: https://github.com/cilium/cilium-cli/archive/refs/tags/v0.19.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cilium
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cilium-cli
  av: sudo av install brew:cilium-cli
  brew: brew install cilium-cli
  nix: nix profile install nixpkgs#cilium-cli
  pacman: sudo pacman -S cilium-cli
  winget: winget install --id Cilium.CiliumCLI -e
  zypper: sudo zypper install cilium-cli
provenance:
  formula: cilium-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
