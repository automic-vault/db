id: brew:nsnake
display-name: nsnake
homepage: https://github.com/alexdantas/nSnake
repo: https://downloads.sourceforge.net/project/nsnake/GNU-Linux/nsnake-3.0.1.tar.gz
docs: https://github.com/alexdantas/nSnake
package-manager:
  apk: nsnake
  brew: nsnake
  debian: nsnake
  dnf: nsnake
  nix: nsnake
  ubuntu: nsnake
  zypper: nsnake
package-manager-url: https://formulae.brew.sh/formula/nsnake
version: 3.0.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Classic snake game with textual interface
source-archive: https://downloads.sourceforge.net/project/nsnake/GNU-Linux/nsnake-3.0.1.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: nsnake
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nsnake
  av: sudo av install brew:nsnake
  brew: brew install nsnake
  debian: sudo apt install nsnake
  dnf: sudo dnf install nsnake
  nix: nix profile install nixpkgs#nsnake
  ubuntu: sudo apt install nsnake
  zypper: sudo zypper install nsnake
provenance:
  formula: nsnake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
