id: brew:nmail
display-name: nmail
homepage: https://github.com/d99kris/nmail
repo: https://github.com/d99kris/nmail
docs: https://github.com/d99kris/nmail
package-manager:
  apk: nmail
  brew: nmail
  macports: nmail
package-manager-url: https://formulae.brew.sh/formula/nmail
version: 5.12.6
license: MIT
category: development
tags:
  - cli
description: Terminal-based email client for Linux and macOS
source-archive: https://github.com/d99kris/nmail/archive/refs/tags/v5.12.6.tar.gz
dependencies:
  - libmagic
  - ncurses
  - openssl@3
  - xapian
build-dependencies:
  - cmake
uses-from-macos:
  - curl
  - cyrus-sasl
  - expat
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: html2nmail
  - exposure: global executable
    kind: cli
    name: nmail
  - exposure: global executable
    kind: cli
    name: oauth2nmail
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nmail
  av: sudo av install brew:nmail
  brew: brew install nmail
  macports: sudo port install nmail
provenance:
  formula: nmail
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
