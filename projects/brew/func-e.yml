id: brew:func-e
display-name: func-e
homepage: https://func-e.io
repo: https://github.com/tetratelabs/func-e
docs: https://func-e.io
package-manager:
  brew: func-e
  winget: Tetrate.func-e
package-manager-url: https://formulae.brew.sh/formula/func-e
version: 1.6.0
license: Apache-2.0
category: development
tags:
  - cli
description: Easily run Envoy
source-archive: https://github.com/tetratelabs/func-e/archive/refs/tags/v1.6.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: func-e
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:func-e
  brew: brew install func-e
  winget: winget install --id Tetrate.func-e -e
provenance:
  formula: func-e
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
