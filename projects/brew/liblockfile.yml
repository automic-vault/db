id: brew:liblockfile
display-name: liblockfile
homepage: https://tracker.debian.org/pkg/liblockfile
repo: https://deb.debian.org/debian/pool/main/libl/liblockfile/liblockfile_1.17.orig.tar.gz
docs: https://tracker.debian.org/pkg/liblockfile
package-manager:
  apk: liblockfile
  brew: liblockfile
  dnf: liblockfile
  nix: liblockfile
  pacman: liblockfile
package-manager-url: https://formulae.brew.sh/formula/liblockfile
version: 1.17
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: Library providing functions to lock standard mailboxes
source-archive: https://deb.debian.org/debian/pool/main/libl/liblockfile/liblockfile_1.17.orig.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: dotlockfile
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add liblockfile
  av: sudo av install brew:liblockfile
  brew: brew install liblockfile
  dnf: sudo dnf install liblockfile
  nix: nix profile install nixpkgs#liblockfile
  pacman: sudo pacman -S liblockfile
provenance:
  formula: liblockfile
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
