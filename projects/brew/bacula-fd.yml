id: brew:bacula-fd
display-name: bacula-fd
homepage: https://www.bacula.org/
repo: https://downloads.sourceforge.net/project/bacula/bacula/15.0.3/bacula-15.0.3.tar.gz
docs: https://www.bacula.org/
package-manager:
  apk: bacula
  brew: bacula-fd
  debian: bacula-fd
  macports: bacula
  nix: bacula
  ubuntu: bacula-fd
package-manager-url: https://formulae.brew.sh/formula/bacula-fd
version: 15.0.3
license: AGPL-3.0-only WITH openvpn-openssl-exception
category: network
tags:
  - cli
description: Network backup solution
source-archive: https://downloads.sourceforge.net/project/bacula/bacula/15.0.3/bacula-15.0.3.tar.gz
dependencies:
  - openssl@3
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: bacula
  - exposure: global executable
    kind: cli
    name: bacula-fd
  - exposure: global executable
    kind: cli
    name: bbconsjson
  - exposure: global executable
    kind: cli
    name: bfdjson
  - exposure: global executable
    kind: cli
    name: get_malware_abuse.ch
  - exposure: global executable
    kind: cli
    name: md5tobase64.py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add bacula
  av: sudo av install brew:bacula-fd
  brew: brew install bacula-fd
  debian: sudo apt install bacula-fd
  macports: sudo port install bacula
  nix: nix profile install nixpkgs#bacula
  ubuntu: sudo apt install bacula-fd
provenance:
  formula: bacula-fd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
