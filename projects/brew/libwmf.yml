id: brew:libwmf
display-name: libwmf
homepage: https://github.com/caolanm/libwmf
repo: https://github.com/caolanm/libwmf
docs: https://github.com/caolanm/libwmf
package-manager:
  apk: libwmf
  brew: libwmf
  dnf: libwmf
  macports: libwmf
  nix: libwmf
  pacman: libwmf
package-manager-url: https://formulae.brew.sh/formula/libwmf
version: 0.2.15
license: LGPL-2.0-or-later AND GPL-2.0-or-later AND GD
category: development
tags:
  - cli
description: Library for converting WMF (Window Metafile Format) files
source-archive: https://github.com/caolanm/libwmf/releases/download/v0.2.15/libwmf-0.2.15.tar.gz
dependencies:
  - freetype
  - jpeg-turbo
  - libpng
build-dependencies:
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: libwmf-config
  - exposure: global executable
    kind: cli
    name: libwmf-fontmap
  - exposure: global executable
    kind: cli
    name: wmf2eps
  - exposure: global executable
    kind: cli
    name: wmf2fig
  - exposure: global executable
    kind: cli
    name: wmf2gd
  - exposure: global executable
    kind: cli
    name: wmf2svg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libwmf
  av: sudo av install brew:libwmf
  brew: brew install libwmf
  dnf: sudo dnf install libwmf
  macports: sudo port install libwmf
  nix: nix profile install nixpkgs#libwmf
  pacman: sudo pacman -S libwmf
provenance:
  formula: libwmf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
