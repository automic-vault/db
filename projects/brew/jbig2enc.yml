id: brew:jbig2enc
display-name: jbig2enc
homepage: https://github.com/agl/jbig2enc
repo: https://github.com/agl/jbig2enc
docs: https://github.com/agl/jbig2enc
package-manager:
  apk: jbig2enc
  brew: jbig2enc
  debian: jbig2
  macports: jbig2enc
  nix: jbig2enc
  ubuntu: jbig2
package-manager-url: https://formulae.brew.sh/formula/jbig2enc
version: 0.31
license: Apache-2.0
category: development
tags:
  - cli
description: JBIG2 encoder (for monochrome documents)
source-archive: https://github.com/agl/jbig2enc/archive/refs/tags/0.31.tar.gz
dependencies:
  - giflib
  - jpeg-turbo
  - leptonica
  - libpng
  - libtiff
  - webp
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: jbig2
  - exposure: global executable
    kind: cli
    name: jbig2topdf.py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jbig2enc
  av: sudo av install brew:jbig2enc
  brew: brew install jbig2enc
  debian: sudo apt install jbig2
  macports: sudo port install jbig2enc
  nix: nix profile install nixpkgs#jbig2enc
  ubuntu: sudo apt install jbig2
provenance:
  formula: jbig2enc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
