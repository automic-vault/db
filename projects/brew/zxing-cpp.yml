id: brew:zxing-cpp
display-name: zxing-cpp
homepage: https://github.com/zxing-cpp/zxing-cpp
repo: https://github.com/zxing-cpp/zxing-cpp
docs: https://github.com/zxing-cpp/zxing-cpp
package-manager:
  apk: zxing-cpp
  brew: zxing-cpp
  dnf: zxing-cpp
  nix: zxing-cpp
  pacman: zxing-cpp
package-manager-url: https://formulae.brew.sh/formula/zxing-cpp
version: 3.0.2
license: Apache-2.0
category: development
tags:
  - cli
description: Multi-format barcode image processing library written in C++
source-archive: https://github.com/zxing-cpp/zxing-cpp/releases/download/v3.0.2/zxing-cpp-3.0.2.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ZXingReader
  - exposure: global executable
    kind: cli
    name: ZXingWriter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zxing-cpp
  av: sudo av install brew:zxing-cpp
  brew: brew install zxing-cpp
  dnf: sudo dnf install zxing-cpp
  nix: nix profile install nixpkgs#zxing-cpp
  pacman: sudo pacman -S zxing-cpp
provenance:
  formula: zxing-cpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
