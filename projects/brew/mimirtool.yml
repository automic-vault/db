id: brew:mimirtool
display-name: mimirtool
homepage: https://grafana.com/docs/mimir/latest/operators-guide/tools/mimirtool/
repo: https://github.com/grafana/mimir
docs: https://grafana.com/docs/mimir/latest/operators-guide/tools/mimirtool/
package-manager:
  brew: mimirtool
package-manager-url: https://formulae.brew.sh/formula/mimirtool
version: 3.0.6
license: AGPL-3.0-only
category: development
tags:
  - cli
description: CLI for interacting with Grafana Mimir
source-archive: https://github.com/grafana/mimir.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mimirtool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mimirtool
  brew: brew install mimirtool
provenance:
  formula: mimirtool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
