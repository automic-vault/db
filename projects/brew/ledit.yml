id: brew:ledit
display-name: ledit
homepage: https://pauillac.inria.fr/~ddr/ledit/
repo: https://github.com/chetmurthy/ledit
docs: https://pauillac.inria.fr/~ddr/ledit/
package-manager:
  brew: ledit
  debian: ledit
  macports: ledit
  nix: ledit
  ubuntu: ledit
package-manager-url: https://formulae.brew.sh/formula/ledit
version: 2-07
license: BSD-3-Clause
category: development
tags:
  - cli
description: Line editor for interactive commands
source-archive: https://github.com/chetmurthy/ledit/archive/refs/tags/ledit-2-07.tar.gz
dependencies:
  - camlp-streams
  - camlp5
  - ocaml
build-dependencies:
  - ocaml-findlib
executables:
  - exposure: global executable
    kind: cli
    name: ledit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ledit
  brew: brew install ledit
  debian: sudo apt install ledit
  macports: sudo port install ledit
  nix: nix profile install nixpkgs#ledit
  ubuntu: sudo apt install ledit
provenance:
  formula: ledit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
