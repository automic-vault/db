id: brew:file-roller
display-name: file-roller
homepage: https://wiki.gnome.org/Apps/FileRoller
repo: https://download.gnome.org/sources/file-roller/44/file-roller-44.6.tar.xz
docs: https://wiki.gnome.org/Apps/FileRoller
package-manager:
  apk: file-roller
  brew: file-roller
  debian: file-roller
  dnf: file-roller
  macports: file-roller
  nix: file-roller
  pacman: file-roller
  ubuntu: file-roller
  zypper: file-roller
package-manager-url: https://formulae.brew.sh/formula/file-roller
version: 44.6
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: GNOME archive manager
source-archive: https://download.gnome.org/sources/file-roller/44/file-roller-44.6.tar.xz
dependencies:
  - adwaita-icon-theme
  - desktop-file-utils
  - gettext
  - glib
  - gtk4
  - hicolor-icon-theme
  - json-glib
  - libadwaita
  - libarchive
  - pango
build-dependencies:
  - gettext
  - itstool
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: file-roller
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add file-roller
  av: sudo av install brew:file-roller
  brew: brew install file-roller
  debian: sudo apt install file-roller
  dnf: sudo dnf install file-roller
  macports: sudo port install file-roller
  nix: nix profile install nixpkgs#file-roller
  pacman: sudo pacman -S file-roller
  ubuntu: sudo apt install file-roller
  zypper: sudo zypper install file-roller
provenance:
  formula: file-roller
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
