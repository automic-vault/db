id: brew:gptline
display-name: gptline
homepage: https://github.com/gnachman/gptline
repo: >
  https://files.pythonhosted.org/packages/5b/28/d15a9a5b349c77a051a633e13141151314f352067ec7d516220bd6b20fcf/gptline-1.0.8.tar.gz
docs: https://github.com/gnachman/gptline
package-manager:
  brew: gptline
package-manager-url: https://formulae.brew.sh/formula/gptline
version: 1.0.8
license: GPL-3.0-only
category: development
tags:
  - cli
description: ChatGPT client with native iTerm2 support
source-archive: >
  https://files.pythonhosted.org/packages/5b/28/d15a9a5b349c77a051a633e13141151314f352067ec7d516220bd6b20fcf/gptline-1.0.8.tar.gz
dependencies:
  - certifi
  - freetype
  - jpeg-turbo
  - libraqm
  - libtiff
  - libyaml
  - little-cms2
  - pillow
  - pydantic
  - python@3.14
  - webp
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: gptline
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gptline
  brew: brew install gptline
provenance:
  formula: gptline
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
