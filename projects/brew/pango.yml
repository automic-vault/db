id: brew:pango
display-name: pango
homepage: https://www.gtk.org/docs/architecture/pango
repo: https://download.gnome.org/sources/pango/1.57/pango-1.57.1.tar.xz
docs: https://www.gtk.org/docs/architecture/pango
package-manager:
  apk: pango
  brew: pango
  dnf: pango
  macports: pango
  nix: pango
  pacman: pango
package-manager-url: https://formulae.brew.sh/formula/pango
version: 1.57.1
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: Framework for layout and rendering of i18n text
source-archive: https://download.gnome.org/sources/pango/1.57/pango-1.57.1.tar.xz
dependencies:
  - cairo
  - fontconfig
  - freetype
  - fribidi
  - glib
  - harfbuzz
  - libthai
build-dependencies:
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pango-list
  - exposure: global executable
    kind: cli
    name: pango-segmentation
  - exposure: global executable
    kind: cli
    name: pango-view
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pango
  av: sudo av install brew:pango
  brew: brew install pango
  dnf: sudo dnf install pango
  macports: sudo port install pango
  nix: nix profile install nixpkgs#pango
  pacman: sudo pacman -S pango
provenance:
  formula: pango
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
