id: brew:pdtm
display-name: pdtm
homepage: https://github.com/projectdiscovery/pdtm
repo: https://github.com/projectdiscovery/pdtm
docs: https://github.com/projectdiscovery/pdtm
package-manager:
  brew: pdtm
package-manager-url: https://formulae.brew.sh/formula/pdtm
version: 0.1.3
license: MIT
category: development
tags:
  - cli
description: ProjectDiscovery's Open Source Tool Manager
source-archive: https://github.com/projectdiscovery/pdtm/archive/refs/tags/v0.1.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pdtm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pdtm
  brew: brew install pdtm
provenance:
  formula: pdtm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
