id: brew:rpiboot
display-name: rpiboot
homepage: https://github.com/raspberrypi/usbboot
repo: https://github.com/raspberrypi/usbboot
docs: https://github.com/raspberrypi/usbboot
package-manager:
  brew: rpiboot
  nix: rpiboot
  ubuntu: rpiboot
package-manager-url: https://formulae.brew.sh/formula/rpiboot
version: 162618
license: Apache-2.0
category: development
tags:
  - cli
description: Raspberry Pi USB boot tool for Compute Modules
source-archive: https://github.com/raspberrypi/usbboot.git
dependencies:
  - libusb
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rpiboot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To boot a Compute Module with the default mass storage gadget: sudo rpiboot -d
    "$(brew --prefix rpiboot)"/share/rpiboot/mass-storage-gadget64
  post-install-defined: false
install-lines:
  av: sudo av install brew:rpiboot
  brew: brew install rpiboot
  nix: nix profile install nixpkgs#rpiboot
  ubuntu: sudo apt install rpiboot
provenance:
  formula: rpiboot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
