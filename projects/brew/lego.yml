id: brew:lego
display-name: lego
homepage: https://go-acme.github.io/lego/
repo: https://github.com/go-acme/lego
docs: https://go-acme.github.io/lego/
package-manager:
  apk: lego
  brew: lego
  debian: lego
  macports: lego
  nix: lego
  pacman: lego
  scoop: main/lego
  ubuntu: lego
  winget: GoACME.lego
  zypper: lego
package-manager-url: https://formulae.brew.sh/formula/lego
version: 5.1.0
license: MIT
category: security
tags:
  - cli
description: Let's Encrypt client and ACME library
source-archive: https://github.com/go-acme/lego/archive/refs/tags/v5.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lego
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lego
  av: sudo av install brew:lego
  brew: brew install lego
  debian: sudo apt install lego
  macports: sudo port install lego
  nix: nix profile install nixpkgs#lego
  pacman: sudo pacman -S lego
  scoop: scoop install main/lego
  ubuntu: sudo apt install lego
  winget: winget install --id GoACME.lego -e
  zypper: sudo zypper install lego
provenance:
  formula: lego
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
