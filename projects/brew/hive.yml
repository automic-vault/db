id: brew:hive
display-name: hive
homepage: https://hive.apache.org
repo: https://www.apache.org/dyn/closer.lua?path=hive/hive-4.2.0/apache-hive-4.2.0-bin.tar.gz
docs: https://hive.apache.org
package-manager:
  brew: hive
package-manager-url: https://formulae.brew.sh/formula/hive
version: 4.2.0
license: Apache-2.0
category: network
tags:
  - cli
description: Hadoop-based data summarization, query, and analysis
source-archive: https://www.apache.org/dyn/closer.lua?path=hive/hive-4.2.0/apache-hive-4.2.0-bin.tar.gz
dependencies:
  - hadoop
  - openjdk@21
executables:
  - exposure: global executable
    kind: cli
    name: beeline
  - exposure: global executable
    kind: cli
    name: hive
  - exposure: global executable
    kind: cli
    name: hive-config.sh
  - exposure: global executable
    kind: cli
    name: hiveserver2
  - exposure: global executable
    kind: cli
    name: hplsql
  - exposure: global executable
    kind: cli
    name: init-hive-dfs.sh
  - exposure: global executable
    kind: cli
    name: metatool
  - exposure: global executable
    kind: cli
    name: replstats.sh
  - exposure: global executable
    kind: cli
    name: schematool
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    If you want to use HCatalog with Pig, set $HCAT_HOME in your profile: export
    HCAT_HOME=$HOMEBREW_PREFIX/opt/hive/libexec/hcatalog
  post-install-defined: false
install-lines:
  av: sudo av install brew:hive
  brew: brew install hive
provenance:
  formula: hive
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
