id: brew:libxkbcommon
display-name: libxkbcommon
homepage: https://xkbcommon.org/
repo: https://github.com/xkbcommon/libxkbcommon
docs: https://xkbcommon.org/
package-manager:
  apk: libxkbcommon
  brew: libxkbcommon
  dnf: libxkbcommon
  macports: libxkbcommon
  nix: libxkbcommon
  pacman: libxkbcommon
package-manager-url: https://formulae.brew.sh/formula/libxkbcommon
version: 1.13.1
license: MIT
category: development
tags:
  - cli
description: Keyboard handling library
source-archive: https://github.com/xkbcommon/libxkbcommon/archive/refs/tags/xkbcommon-1.13.1.tar.gz
dependencies:
  - libxcb
  - xkeyboard-config
build-dependencies:
  - bison
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: xkbcli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libxkbcommon
  av: sudo av install brew:libxkbcommon
  brew: brew install libxkbcommon
  dnf: sudo dnf install libxkbcommon
  macports: sudo port install libxkbcommon
  nix: nix profile install nixpkgs#libxkbcommon
  pacman: sudo pacman -S libxkbcommon
provenance:
  formula: libxkbcommon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
