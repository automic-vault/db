id: brew:dezoomify-rs
display-name: dezoomify-rs
homepage: https://github.com/lovasoa/dezoomify-rs
repo: https://github.com/lovasoa/dezoomify-rs
docs: https://github.com/lovasoa/dezoomify-rs
package-manager:
  brew: dezoomify-rs
  nix: dezoomify-rs
  winget: lovasoa.dezoomify-rs
package-manager-url: https://formulae.brew.sh/formula/dezoomify-rs
version: 2.16.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Tiled image downloader
source-archive: https://github.com/lovasoa/dezoomify-rs/archive/refs/tags/v2.16.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dezoomify-rs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dezoomify-rs
  brew: brew install dezoomify-rs
  nix: nix profile install nixpkgs#dezoomify-rs
  winget: winget install --id lovasoa.dezoomify-rs -e
provenance:
  formula: dezoomify-rs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
