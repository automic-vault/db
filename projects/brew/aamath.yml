id: brew:aamath
display-name: aamath
homepage: http://fuse.superglue.se/aamath/
repo: https://cdn.netbsd.org/pub/pkgsrc/distfiles/aamath-0.3.tar.gz
docs: http://fuse.superglue.se/aamath/
package-manager:
  brew: aamath
  macports: aamath
package-manager-url: https://formulae.brew.sh/formula/aamath
version: 0.3
license: GPL-2.0-only
category: network
tags:
  - cli
description: Renders mathematical expressions as ASCII art
source-archive: https://cdn.netbsd.org/pub/pkgsrc/distfiles/aamath-0.3.tar.gz
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: aamath
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aamath
  brew: brew install aamath
  macports: sudo port install aamath
provenance:
  formula: aamath
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
