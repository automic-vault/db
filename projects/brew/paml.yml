id: brew:paml
display-name: paml
homepage: https://github.com/abacus-gene/paml
repo: https://github.com/abacus-gene/paml
docs: https://github.com/abacus-gene/paml
package-manager:
  brew: paml
  debian: paml
  nix: paml
  ubuntu: paml
package-manager-url: https://formulae.brew.sh/formula/paml
version: 4.10.10
license: GPL-3.0-only
category: development
tags:
  - cli
description: Phylogenetic analyses of DNA or protein sequences using maximum likelihood
source-archive: https://github.com/abacus-gene/paml/archive/refs/tags/v4.10.10.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: baseml
  - exposure: global executable
    kind: cli
    name: basemlg
  - exposure: global executable
    kind: cli
    name: chi2
  - exposure: global executable
    kind: cli
    name: codeml
  - exposure: global executable
    kind: cli
    name: evolver
  - exposure: global executable
    kind: cli
    name: infinitesites
  - exposure: global executable
    kind: cli
    name: mcmctree
  - exposure: global executable
    kind: cli
    name: pamp
  - exposure: global executable
    kind: cli
    name: yn00
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:paml
  brew: brew install paml
  debian: sudo apt install paml
  nix: nix profile install nixpkgs#paml
  ubuntu: sudo apt install paml
provenance:
  formula: paml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
