id: brew:fourstore
display-name: fourstore
homepage: https://github.com/4store/4store
repo: https://github.com/4store/4store
docs: https://github.com/4store/4store
package-manager:
  brew: fourstore
package-manager-url: https://formulae.brew.sh/formula/fourstore
version: 1.1.7
license: GPL-3.0-or-later
category: database
tags:
  - cli
  - database
description: Efficient, stable RDF database
source-archive: https://github.com/4store/4store/archive/refs/tags/v1.1.7.tar.gz
dependencies:
  - dbus
  - gettext
  - glib
  - pcre
  - raptor
  - rasqal
  - readline
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: 4s-admin
  - exposure: global executable
    kind: cli
    name: 4s-backend
  - exposure: global executable
    kind: cli
    name: 4s-backend-copy
  - exposure: global executable
    kind: cli
    name: 4s-backend-destroy
  - exposure: global executable
    kind: cli
    name: 4s-backend-info
  - exposure: global executable
    kind: cli
    name: 4s-backend-passwd
  - exposure: global executable
    kind: cli
    name: 4s-backend-setup
  - exposure: global executable
    kind: cli
    name: 4s-boss
  - exposure: global executable
    kind: cli
    name: 4s-cluster-copy
  - exposure: global executable
    kind: cli
    name: 4s-cluster-create
  - exposure: global executable
    kind: cli
    name: 4s-cluster-destroy
  - exposure: global executable
    kind: cli
    name: 4s-cluster-file-backup
  - exposure: global executable
    kind: cli
    name: 4s-cluster-info
  - exposure: global executable
    kind: cli
    name: 4s-cluster-start
  - exposure: global executable
    kind: cli
    name: 4s-cluster-stop
  - exposure: global executable
    kind: cli
    name: 4s-delete-model
  - exposure: global executable
    kind: cli
    name: 4s-dump
  - exposure: global executable
    kind: cli
    name: 4s-file-backup
  - exposure: global executable
    kind: cli
    name: 4s-httpd
  - exposure: global executable
    kind: cli
    name: 4s-import
  - exposure: global executable
    kind: cli
    name: 4s-info
  - exposure: global executable
    kind: cli
    name: 4s-query
  - exposure: global executable
    kind: cli
    name: 4s-restore
  - exposure: global executable
    kind: cli
    name: 4s-size
  - exposure: global executable
    kind: cli
    name: 4s-ssh-all
  - exposure: global executable
    kind: cli
    name: 4s-ssh-all-parallel
  - exposure: global executable
    kind: cli
    name: 4s-update
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Databases will be created at $HOMEBREW_PREFIX/var/fourstore. Create and start up a
    database: 4s-backend-setup mydb 4s-backend mydb Load RDF data: 4s-import mydb
    datafile.rdf Start up HTTP SPARQL server without daemonizing: 4s-httpd -p 8000 -D
    mydb See https://4store.danielknoell.de/trac/wiki/Documentation/ for more
    information.
  post-install-defined: false
install-lines:
  av: sudo av install brew:fourstore
  brew: brew install fourstore
provenance:
  formula: fourstore
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
