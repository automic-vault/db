id: brew:aftman
display-name: aftman
homepage: https://github.com/LPGhatguy/aftman
repo: https://github.com/LPGhatguy/aftman
docs: https://github.com/LPGhatguy/aftman
package-manager:
  brew: aftman
  winget: LPGhatguy.Aftman
package-manager-url: https://formulae.brew.sh/formula/aftman
version: 0.3.0
license: MIT
category: development
tags:
  - cli
description: Toolchain manager for Roblox, the prodigal sequel to Foreman
source-archive: https://github.com/LPGhatguy/aftman/archive/refs/tags/v0.3.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: aftman
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aftman
  brew: brew install aftman
  winget: winget install --id LPGhatguy.Aftman -e
provenance:
  formula: aftman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
