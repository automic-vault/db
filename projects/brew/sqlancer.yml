id: brew:sqlancer
display-name: sqlancer
homepage: https://github.com/sqlancer/sqlancer
repo: https://github.com/sqlancer/sqlancer
docs: https://github.com/sqlancer/sqlancer
package-manager:
  brew: sqlancer
package-manager-url: https://formulae.brew.sh/formula/sqlancer
version: 2.0.0
license: MIT
category: database
tags:
  - cli
description: Detecting Logic Bugs in DBMS
source-archive: https://github.com/sqlancer/sqlancer/archive/refs/tags/v2.0.0.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - maven
executables:
  - exposure: global executable
    kind: cli
    name: sqlancer
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sqlancer
  brew: brew install sqlancer
provenance:
  formula: sqlancer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
