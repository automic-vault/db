id: brew:asmfmt
display-name: asmfmt
homepage: https://github.com/klauspost/asmfmt
repo: https://github.com/klauspost/asmfmt
docs: https://github.com/klauspost/asmfmt
package-manager:
  brew: asmfmt
  macports: asmfmt
  nix: asmfmt
package-manager-url: https://formulae.brew.sh/formula/asmfmt
version: 1.3.2
license: MIT
category: development
tags:
  - cli
description: Go Assembler Formatter
source-archive: https://github.com/klauspost/asmfmt/archive/refs/tags/v1.3.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: asmfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:asmfmt
  brew: brew install asmfmt
  macports: sudo port install asmfmt
  nix: nix profile install nixpkgs#asmfmt
provenance:
  formula: asmfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
