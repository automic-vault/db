id: brew:kallisto
display-name: kallisto
homepage: https://pachterlab.github.io/kallisto/
repo: https://github.com/pachterlab/kallisto
docs: https://pachterlab.github.io/kallisto/
package-manager:
  brew: kallisto
  debian: kallisto
  nix: kallisto
  ubuntu: kallisto
package-manager-url: https://formulae.brew.sh/formula/kallisto
version: 0.52.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Quantify abundances of transcripts from RNA-Seq data
source-archive: https://github.com/pachterlab/kallisto/archive/refs/tags/v0.52.0.tar.gz
dependencies:
  - hdf5
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: kallisto
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kallisto
  brew: brew install kallisto
  debian: sudo apt install kallisto
  nix: nix profile install nixpkgs#kallisto
  ubuntu: sudo apt install kallisto
provenance:
  formula: kallisto
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
