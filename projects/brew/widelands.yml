id: brew:widelands
display-name: widelands
homepage: https://www.widelands.org/
repo: https://github.com/widelands/widelands
docs: https://www.widelands.org/
package-manager:
  apk: widelands
  brew: widelands
  debian: widelands
  dnf: widelands
  macports: widelands
  nix: widelands
  pacman: widelands
  ubuntu: widelands
  winget: WidelandsDevelopmentTeam.Widelands
  zypper: widelands
package-manager-url: https://formulae.brew.sh/formula/widelands
version: 1.3.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Free real-time strategy game like Settlers II
source-archive: https://github.com/widelands/widelands/archive/refs/tags/v1.3.1.tar.gz
dependencies:
  - gettext
  - glew
  - icu4c@78
  - libpng
  - lua
  - minizip
  - sdl2
  - sdl2_image
  - sdl2_mixer
  - sdl2_ttf
build-dependencies:
  - asio
  - cmake
  - doxygen
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: widelands
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add widelands
  av: sudo av install brew:widelands
  brew: brew install widelands
  debian: sudo apt install widelands
  dnf: sudo dnf install widelands
  macports: sudo port install widelands
  nix: nix profile install nixpkgs#widelands
  pacman: sudo pacman -S widelands
  ubuntu: sudo apt install widelands
  winget: winget install --id WidelandsDevelopmentTeam.Widelands -e
  zypper: sudo zypper install widelands
provenance:
  formula: widelands
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
