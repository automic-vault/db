id: brew:lld
display-name: lld
homepage: https://lld.llvm.org/
repo: https://github.com/llvm/llvm-project
docs: https://lld.llvm.org/
package-manager:
  brew: lld
  debian: lld
  dnf: lld
  nix: lld
  pacman: lld
  ubuntu: lld
  zypper: lld
package-manager-url: https://formulae.brew.sh/formula/lld
version: 22.1.6
license: Apache-2.0 WITH LLVM-exception
category: development
tags:
  - cli
description: LLVM Project Linker
source-archive: >
  https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.6/llvm-project-22.1.6.src.tar.xz
dependencies:
  - llvm
  - zstd
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ld.lld
  - exposure: global executable
    kind: cli
    name: ld64.lld
  - exposure: global executable
    kind: cli
    name: lld
  - exposure: global executable
    kind: cli
    name: lld-link
  - exposure: global executable
    kind: cli
    name: wasm-ld
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lld
  brew: brew install lld
  debian: sudo apt install lld
  dnf: sudo dnf install lld
  nix: nix profile install nixpkgs#lld
  pacman: sudo pacman -S lld
  ubuntu: sudo apt install lld
  zypper: sudo zypper install lld
provenance:
  formula: lld
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
