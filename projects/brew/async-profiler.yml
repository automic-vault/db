id: brew:async-profiler
display-name: async-profiler
homepage: https://github.com/async-profiler/async-profiler
repo: https://github.com/async-profiler/async-profiler
docs: https://github.com/async-profiler/async-profiler
package-manager:
  brew: async-profiler
  macports: async-profiler
  nix: async-profiler
package-manager-url: https://formulae.brew.sh/formula/async-profiler
version: 4.4
license: Apache-2.0
category: development
tags:
  - cli
description: Sampling CPU & HEAP profiler for Java using AsyncGetCallTrace + perf_events
source-archive: https://github.com/async-profiler/async-profiler/archive/refs/tags/v4.4.tar.gz
build-dependencies:
  - cmake
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: asprof
  - exposure: global executable
    kind: cli
    name: jfrconv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:async-profiler
  brew: brew install async-profiler
  macports: sudo port install async-profiler
  nix: nix profile install nixpkgs#async-profiler
provenance:
  formula: async-profiler
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
