id: brew:container-structure-test
display-name: container-structure-test
homepage: https://github.com/GoogleContainerTools/container-structure-test
repo: https://github.com/GoogleContainerTools/container-structure-test
docs: https://github.com/GoogleContainerTools/container-structure-test
package-manager:
  brew: container-structure-test
  nix: container-structure-test
package-manager-url: https://formulae.brew.sh/formula/container-structure-test
version: 1.22.1
license: Apache-2.0
category: development
tags:
  - cli
description: Validate the structure of your container images
source-archive: >
  https://github.com/GoogleContainerTools/container-structure-test/archive/refs/tags/v1.22.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: container-structure-test
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:container-structure-test
  brew: brew install container-structure-test
  nix: nix profile install nixpkgs#container-structure-test
provenance:
  formula: container-structure-test
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
