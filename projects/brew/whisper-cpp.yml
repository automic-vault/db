id: brew:whisper-cpp
display-name: whisper-cpp
homepage: https://github.com/ggml-org/whisper.cpp
repo: https://github.com/ggml-org/whisper.cpp
docs: https://github.com/ggml-org/whisper.cpp
package-manager:
  apk: whisper.cpp
  brew: whisper-cpp
  dnf: whisper-cpp
  nix: whisper-cpp
  scoop: main/whisper-cpp
package-manager-url: https://formulae.brew.sh/formula/whisper-cpp
version: 1.8.4
license: MIT
category: development
tags:
  - cli
description: Port of OpenAI's Whisper model in C/C++
source-archive: https://github.com/ggml-org/whisper.cpp/archive/refs/tags/v1.8.4.tar.gz
dependencies:
  - ggml
  - sdl2
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: whisper-bench
  - exposure: global executable
    kind: cli
    name: whisper-cli
  - exposure: global executable
    kind: cli
    name: whisper-command
  - exposure: global executable
    kind: cli
    name: whisper-lsp
  - exposure: global executable
    kind: cli
    name: whisper-quantize
  - exposure: global executable
    kind: cli
    name: whisper-server
  - exposure: global executable
    kind: cli
    name: whisper-stream
  - exposure: global executable
    kind: cli
    name: whisper-talk-llama
  - exposure: global executable
    kind: cli
    name: whisper-vad-speech-segments
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    whisper-cpp requires GGML model files to work. These are not downloaded by default.
    To obtain model files (.bin), visit one of these locations:
    https://huggingface.co/ggerganov/whisper.cpp/tree/main https://ggml.ggerganov.com/
  post-install-defined: false
install-lines:
  apk: sudo apk add whisper.cpp
  av: sudo av install brew:whisper-cpp
  brew: brew install whisper-cpp
  dnf: sudo dnf install whisper-cpp
  nix: nix profile install nixpkgs#whisper-cpp
  scoop: scoop install main/whisper-cpp
provenance:
  formula: whisper-cpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
