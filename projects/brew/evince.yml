id: brew:evince
display-name: evince
homepage: https://apps.gnome.org/Evince/
repo: https://download.gnome.org/sources/evince/48/evince-48.4.tar.xz
docs: https://apps.gnome.org/Evince/
package-manager:
  apk: evince
  brew: evince
  chocolatey: evince
  debian: evince
  dnf: evince
  macports: evince
  nix: evince
  pacman: evince
  ubuntu: evince
  zypper: evince
package-manager-url: https://formulae.brew.sh/formula/evince
version: 48.4
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: GNOME document viewer
source-archive: https://download.gnome.org/sources/evince/48/evince-48.4.tar.xz
dependencies:
  - adwaita-icon-theme
  - at-spi2-core
  - cairo
  - djvulibre
  - gdk-pixbuf
  - gettext
  - glib
  - gspell
  - gtk+3
  - hicolor-icon-theme
  - libarchive
  - libgxps
  - libhandy
  - libsecret
  - libspectre
  - libtiff
  - pango
  - poppler
build-dependencies:
  - desktop-file-utils
  - gettext
  - gobject-introspection
  - itstool
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: evince
  - exposure: global executable
    kind: cli
    name: evince-previewer
  - exposure: global executable
    kind: cli
    name: evince-thumbnailer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add evince
  av: sudo av install brew:evince
  brew: brew install evince
  chocolatey: choco install evince
  debian: sudo apt install evince
  dnf: sudo dnf install evince
  macports: sudo port install evince
  nix: nix profile install nixpkgs#evince
  pacman: sudo pacman -S evince
  ubuntu: sudo apt install evince
  zypper: sudo zypper install evince
provenance:
  formula: evince
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
