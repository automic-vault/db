id: brew:libmps
display-name: libmps
homepage: https://www.ravenbrook.com/project/mps/
repo: https://github.com/Ravenbrook/mps
docs: https://www.ravenbrook.com/project/mps/
package-manager:
  brew: libmps
package-manager-url: https://formulae.brew.sh/formula/libmps
version: 1.118.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Memory Pool System
source-archive: https://github.com/Ravenbrook/mps/archive/refs/tags/release-1.118.0.tar.gz
executables:
