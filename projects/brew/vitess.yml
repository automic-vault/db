id: brew:vitess
display-name: vitess
homepage: https://vitess.io
repo: https://github.com/vitessio/vitess
docs: https://vitess.io
package-manager:
  brew: vitess
  nix: vitess
package-manager-url: https://formulae.brew.sh/formula/vitess
version: 24.0.1
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Database clustering system for horizontal scaling of MySQL
source-archive: https://github.com/vitessio/vitess/archive/refs/tags/v24.0.1.tar.gz
dependencies:
  - etcd
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mysqlctl
  - exposure: global executable
    kind: cli
    name: mysqlctld
  - exposure: global executable
    kind: cli
    name: vtadmin
  - exposure: global executable
    kind: cli
    name: vtbackup
  - exposure: global executable
    kind: cli
    name: vtctl
  - exposure: global executable
    kind: cli
    name: vtctlclient
  - exposure: global executable
    kind: cli
    name: vtctld
  - exposure: global executable
    kind: cli
    name: vtctldclient
  - exposure: global executable
    kind: cli
    name: vtgate
  - exposure: global executable
    kind: cli
    name: vtorc
  - exposure: global executable
    kind: cli
    name: vttablet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vitess
  brew: brew install vitess
  nix: nix profile install nixpkgs#vitess
provenance:
  formula: vitess
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
