id: brew:duo_unix
display-name: duo_unix
homepage: https://www.duosecurity.com/docs/duounix
repo: https://github.com/duosecurity/duo_unix
docs: https://www.duosecurity.com/docs/duounix
package-manager:
  apk: duo_unix
  brew: duo_unix
  debian: login-duo
  dnf: duo_unix
  nix: duo-unix
  ubuntu: login-duo
package-manager-url: https://formulae.brew.sh/formula/duo_unix
version: 2.2.3
license: GPL-2.0-or-later
category: security
tags:
  - cli
description: Two-factor authentication for SSH
source-archive: https://github.com/duosecurity/duo_unix/archive/refs/tags/duo_unix-2.2.3.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: duo_unix_support.sh
  - exposure: global executable
    kind: cli
    name: login_duo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add duo_unix
  av: sudo av install brew:duo_unix
  brew: brew install duo_unix
  debian: sudo apt install login-duo
  dnf: sudo dnf install duo_unix
  nix: nix profile install nixpkgs#duo-unix
  ubuntu: sudo apt install login-duo
provenance:
  formula: duo_unix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
