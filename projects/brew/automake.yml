id: brew:automake
display-name: automake
homepage: https://www.gnu.org/software/automake/
repo: https://ftpmirror.gnu.org/gnu/automake/automake-1.18.1.tar.xz
docs: https://www.gnu.org/software/automake/
package-manager:
  apk: automake
  brew: automake
  debian: automake
  dnf: automake
  macports: automake
  nix: automake
  pacman: automake
  ubuntu: automake
  zypper: automake
package-manager-url: https://formulae.brew.sh/formula/automake
version: 1.18.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Tool for generating GNU Standards-compliant Makefiles
source-archive: https://ftpmirror.gnu.org/gnu/automake/automake-1.18.1.tar.xz
dependencies:
  - autoconf
executables:
  - exposure: global executable
    kind: cli
    name: aclocal
  - exposure: global executable
    kind: cli
    name: aclocal-1.18
  - exposure: global executable
    kind: cli
    name: automake
  - exposure: global executable
    kind: cli
    name: automake-1.18
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sequoia
    - sonoma
    - tahoe
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add automake
  av: sudo av install brew:automake
  brew: brew install automake
  debian: sudo apt install automake
  dnf: sudo dnf install automake
  macports: sudo port install automake
  nix: nix profile install nixpkgs#automake
  pacman: sudo pacman -S automake
  ubuntu: sudo apt install automake
  zypper: sudo zypper install automake
provenance:
  formula: automake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
