id: brew:cargo-edit
display-name: cargo-edit
homepage: https://killercup.github.io/cargo-edit/
repo: https://github.com/killercup/cargo-edit
docs: https://killercup.github.io/cargo-edit/
package-manager:
  apk: cargo-edit
  brew: cargo-edit
  nix: cargo-edit
  pacman: cargo-edit
package-manager-url: https://formulae.brew.sh/formula/cargo-edit
version: 0.13.10
license: MIT
category: development
tags:
  - cli
description: Utility for managing cargo dependencies from the command-line
source-archive: https://github.com/killercup/cargo-edit/archive/refs/tags/v0.13.10.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-add
  - exposure: global executable
    kind: cli
    name: cargo-rm
  - exposure: global executable
    kind: cli
    name: cargo-set-version
  - exposure: global executable
    kind: cli
    name: cargo-upgrade
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-edit
  av: sudo av install brew:cargo-edit
  brew: brew install cargo-edit
  nix: nix profile install nixpkgs#cargo-edit
  pacman: sudo pacman -S cargo-edit
provenance:
  formula: cargo-edit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
