id: brew:conan
display-name: conan
homepage: https://conan.io
repo: >
  https://files.pythonhosted.org/packages/54/89/5b9d6cca677e57b67560aa3b7f82728127889ce74bb91171ded6f28e42b8/conan-2.28.1.tar.gz
docs: https://conan.io
package-manager:
  brew: conan
  chocolatey: conan
  dnf: conan
  nix: conan
  scoop: main/conan
  winget: JFrog.Conan
  zypper: conan
package-manager-url: https://formulae.brew.sh/formula/conan
version: 2.28.1
license: MIT
category: network
tags:
  - cli
description: Distributed, open source, package manager for C/C++
source-archive: >
  https://files.pythonhosted.org/packages/54/89/5b9d6cca677e57b67560aa3b7f82728127889ce74bb91171ded6f28e42b8/conan-2.28.1.tar.gz
dependencies:
  - certifi
  - libyaml
  - python@3.14
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: conan
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:conan
  brew: brew install conan
  chocolatey: choco install conan
  dnf: sudo dnf install conan
  nix: nix profile install nixpkgs#conan
  scoop: scoop install main/conan
  winget: winget install --id JFrog.Conan -e
  zypper: sudo zypper install conan
provenance:
  formula: conan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
