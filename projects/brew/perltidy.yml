id: brew:perltidy
display-name: perltidy
homepage: https://perltidy.sourceforge.net/
repo: https://downloads.sourceforge.net/project/perltidy/20260204/Perl-Tidy-20260204.tar.gz
docs: https://perltidy.sourceforge.net/
package-manager:
  brew: perltidy
  debian: perltidy
  dnf: perltidy
  ubuntu: perltidy
package-manager-url: https://formulae.brew.sh/formula/perltidy
version: 20260204
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Indents and reformats Perl scripts to make them easier to read
source-archive: https://downloads.sourceforge.net/project/perltidy/20260204/Perl-Tidy-20260204.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: perltidy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:perltidy
  brew: brew install perltidy
  debian: sudo apt install perltidy
  dnf: sudo dnf install perltidy
  ubuntu: sudo apt install perltidy
provenance:
  formula: perltidy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
