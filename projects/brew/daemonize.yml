id: brew:daemonize
display-name: daemonize
homepage: https://software.clapper.org/daemonize/
repo: https://github.com/bmc/daemonize
docs: https://software.clapper.org/daemonize/
package-manager:
  brew: daemonize
  debian: daemonize
  dnf: daemonize
  nix: daemonize
  ubuntu: daemonize
  zypper: daemonize
package-manager-url: https://formulae.brew.sh/formula/daemonize
version: 1.7.8
license: BSD-3-Clause
category: development
tags:
  - cli
description: Run a command as a UNIX daemon
source-archive: https://github.com/bmc/daemonize/archive/refs/tags/release-1.7.8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: daemonize
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:daemonize
  brew: brew install daemonize
  debian: sudo apt install daemonize
  dnf: sudo dnf install daemonize
  nix: nix profile install nixpkgs#daemonize
  ubuntu: sudo apt install daemonize
  zypper: sudo zypper install daemonize
provenance:
  formula: daemonize
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
