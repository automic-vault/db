id: brew:rsync
display-name: rsync
homepage: https://rsync.samba.org/
repo: https://rsync.samba.org/ftp/rsync/rsync-3.4.3.tar.gz
docs: https://rsync.samba.org/
package-manager:
  apk: rsync
  brew: rsync
  chocolatey: rsync
  debian: rsync
  dnf: rsync
  macports: rsync
  nix: rsync
  pacman: rsync
  ubuntu: rsync
  zypper: rsync
package-manager-url: https://formulae.brew.sh/formula/rsync
version: 3.4.3
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Utility that provides fast incremental file transfer
source-archive: https://rsync.samba.org/ftp/rsync/rsync-3.4.3.tar.gz
dependencies:
  - lz4
  - openssl@3
  - popt
  - xxhash
  - zstd
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: rrsync
  - exposure: global executable
    kind: cli
    name: rsync
  - exposure: global executable
    kind: cli
    name: rsync-ssl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rsync
  av: sudo av install brew:rsync
  brew: brew install rsync
  chocolatey: choco install rsync
  debian: sudo apt install rsync
  dnf: sudo dnf install rsync
  macports: sudo port install rsync
  nix: nix profile install nixpkgs#rsync
  pacman: sudo pacman -S rsync
  ubuntu: sudo apt install rsync
  zypper: sudo zypper install rsync
provenance:
  formula: rsync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
