id: brew:goat
display-name: goat
homepage: https://github.com/bluesky-social/goat
repo: https://github.com/bluesky-social/goat
docs: https://github.com/bluesky-social/goat
package-manager:
  apk: goat
  brew: goat
  macports: goat
  nix: goat
package-manager-url: https://formulae.brew.sh/formula/goat
version: 0.2.3
license: MIT OR Apache-2.0
category: development
tags:
  - cli
description: General purpose AT Protocol CLI in Go
source-archive: https://github.com/bluesky-social/goat.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add goat
  av: sudo av install brew:goat
  brew: brew install goat
  macports: sudo port install goat
  nix: nix profile install nixpkgs#goat
provenance:
  formula: goat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
