id: brew:lout
display-name: lout
homepage: https://savannah.nongnu.org/projects/lout
repo: https://github.com/william8000/lout
docs: https://savannah.nongnu.org/projects/lout
package-manager:
  apk: lout
  brew: lout
  dnf: lout
  macports: lout
  nix: lout
  pacman: lout
  zypper: lout
package-manager-url: https://formulae.brew.sh/formula/lout
version: 3.43.4
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Text formatting like TeX, but simpler
source-archive: https://github.com/william8000/lout/archive/refs/tags/3.43.4.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lout
  - exposure: global executable
    kind: cli
    name: prg2lout
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lout
  av: sudo av install brew:lout
  brew: brew install lout
  dnf: sudo dnf install lout
  macports: sudo port install lout
  nix: nix profile install nixpkgs#lout
  pacman: sudo pacman -S lout
  zypper: sudo zypper install lout
provenance:
  formula: lout
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
