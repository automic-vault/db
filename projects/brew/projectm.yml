id: brew:projectm
display-name: projectm
homepage: https://github.com/projectM-visualizer/projectm
repo: https://github.com/projectM-visualizer/projectm
docs: https://github.com/projectM-visualizer/projectm
package-manager:
  apk: projectm
  brew: projectm
  pacman: projectm
  zypper: projectM
package-manager-url: https://formulae.brew.sh/formula/projectm
version: 3.1.12
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Milkdrop-compatible music visualizer
source-archive: >
  https://github.com/projectM-visualizer/projectm/releases/download/v3.1.12/projectM-3.1.12.tar.gz
dependencies:
  - sdl2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: projectM-unittest
  - exposure: global executable
    kind: cli
    name: projectMSDL
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add projectm
  av: sudo av install brew:projectm
  brew: brew install projectm
  pacman: sudo pacman -S projectm
  zypper: sudo zypper install projectM
provenance:
  formula: projectm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
