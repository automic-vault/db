id: brew:tofuenv
display-name: tofuenv
homepage: https://tofuutils.github.io/tofuenv/
repo: https://github.com/tofuutils/tofuenv
docs: https://tofuutils.github.io/tofuenv/
package-manager:
  brew: tofuenv
package-manager-url: https://formulae.brew.sh/formula/tofuenv
version: 1.0.7
license: MIT
category: development
tags:
  - cli
description: OpenTofu version manager inspired by tfenv
source-archive: https://github.com/tofuutils/tofuenv/archive/refs/tags/v1.0.7.tar.gz
dependencies:
  - grep
uses-from-macos:
  - jq
  - unzip
executables:
  - exposure: global executable
    kind: cli
    name: tofuenv
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tofuenv
  brew: brew install tofuenv
provenance:
  formula: tofuenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
