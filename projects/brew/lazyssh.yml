id: brew:lazyssh
display-name: lazyssh
homepage: https://github.com/Adembc/lazyssh
repo: https://github.com/Adembc/lazyssh
docs: https://github.com/Adembc/lazyssh
package-manager:
  brew: lazyssh
  nix: lazyssh
  scoop: main/lazyssh
  winget: Adembc.Lazyssh
package-manager-url: https://formulae.brew.sh/formula/lazyssh
version: 0.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Terminal-based SSH manager
source-archive: https://github.com/Adembc/lazyssh/archive/refs/tags/v0.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lazyssh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lazyssh
  brew: brew install lazyssh
  nix: nix profile install nixpkgs#lazyssh
  scoop: scoop install main/lazyssh
  winget: winget install --id Adembc.Lazyssh -e
provenance:
  formula: lazyssh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
