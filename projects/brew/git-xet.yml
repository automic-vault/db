id: brew:git-xet
display-name: git-xet
homepage: https://github.com/huggingface/xet-core
repo: https://github.com/huggingface/xet-core
docs: https://github.com/huggingface/xet-core
package-manager:
  brew: git-xet
  nix: git-xet
  scoop: main/git-xet
  winget: HuggingFace.Git-Xet
package-manager-url: https://formulae.brew.sh/formula/git-xet
version: 0.2.1
license: Apache-2.0
category: development
tags:
  - cli
  - git
description: Git LFS plugin that uploads and downloads using the Xet protocol
source-archive: https://github.com/huggingface/xet-core/archive/refs/tags/git-xet-v0.2.1.tar.gz
dependencies:
  - git-lfs
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: git-xet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-xet
  brew: brew install git-xet
  nix: nix profile install nixpkgs#git-xet
  scoop: scoop install main/git-xet
  winget: winget install --id HuggingFace.Git-Xet -e
provenance:
  formula: git-xet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
