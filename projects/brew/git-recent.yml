id: brew:git-recent
display-name: git-recent
homepage: https://github.com/paulirish/git-recent
repo: https://github.com/paulirish/git-recent
docs: https://github.com/paulirish/git-recent
package-manager:
  brew: git-recent
  nix: git-recent
package-manager-url: https://formulae.brew.sh/formula/git-recent
version: 2.2.0
license: MIT
category: development
tags:
  - cli
  - git
description: Browse your latest git branches, formatted real fancy
source-archive: https://github.com/paulirish/git-recent/archive/refs/tags/v2.2.0.tar.gz
dependencies:
  - fzf
executables:
  - exposure: global executable
    kind: cli
    name: git-recent
  - exposure: global executable
    kind: cli
    name: git-recent-og
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-recent
  brew: brew install git-recent
  nix: nix profile install nixpkgs#git-recent
provenance:
  formula: git-recent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
