id: brew:jnv
display-name: jnv
homepage: https://github.com/ynqa/jnv
repo: https://github.com/ynqa/jnv
docs: https://github.com/ynqa/jnv
package-manager:
  brew: jnv
  macports: jnv
  nix: jnv
  pacman: jnv
  scoop: main/jnv
package-manager-url: https://formulae.brew.sh/formula/jnv
version: 0.7.1
license: MIT
category: development
tags:
  - cli
  - json
description: Interactive JSON filter using jq
source-archive: https://github.com/ynqa/jnv/archive/refs/tags/v0.7.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: jnv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jnv
  brew: brew install jnv
  macports: sudo port install jnv
  nix: nix profile install nixpkgs#jnv
  pacman: sudo pacman -S jnv
  scoop: scoop install main/jnv
provenance:
  formula: jnv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
