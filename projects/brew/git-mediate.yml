id: brew:git-mediate
display-name: git-mediate
homepage: https://github.com/Peaker/git-mediate
repo: https://github.com/Peaker/git-mediate
docs: https://github.com/Peaker/git-mediate
package-manager:
  brew: git-mediate
  debian: git-mediate
  ubuntu: git-mediate
package-manager-url: https://formulae.brew.sh/formula/git-mediate
version: 1.1.0
license: GPL-2.0-only
category: development
tags:
  - cli
  - git
description: Utility to help resolve merge conflicts
source-archive: https://github.com/Peaker/git-mediate/archive/refs/tags/1.1.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: git-mediate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-mediate
  brew: brew install git-mediate
  debian: sudo apt install git-mediate
  ubuntu: sudo apt install git-mediate
provenance:
  formula: git-mediate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
