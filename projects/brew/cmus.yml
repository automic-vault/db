id: brew:cmus
display-name: cmus
homepage: https://cmus.github.io/
repo: https://github.com/cmus/cmus
docs: https://cmus.github.io/
package-manager:
  apk: cmus
  brew: cmus
  debian: cmus
  macports: cmus
  nix: cmus
  pacman: cmus
  ubuntu: cmus
  zypper: cmus
package-manager-url: https://formulae.brew.sh/formula/cmus
version: 2.12.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Music player with an ncurses based interface
source-archive: https://github.com/cmus/cmus/archive/refs/tags/v2.12.0.tar.gz
dependencies:
  - faad2
  - ffmpeg
  - flac
  - libao
  - libvorbis
  - mad
  - mp4v2
  - ncurses
  - opusfile
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cmus
  - exposure: global executable
    kind: cli
    name: cmus-remote
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cmus
  av: sudo av install brew:cmus
  brew: brew install cmus
  debian: sudo apt install cmus
  macports: sudo port install cmus
  nix: nix profile install nixpkgs#cmus
  pacman: sudo pacman -S cmus
  ubuntu: sudo apt install cmus
  zypper: sudo zypper install cmus
provenance:
  formula: cmus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
