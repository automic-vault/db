id: brew:wput
display-name: wput
homepage: https://wput.sourceforge.net/
repo: https://downloads.sourceforge.net/project/wput/wput/0.6.2/wput-0.6.2.tgz
docs: https://wput.sourceforge.net/
package-manager:
  apk: wput
  brew: wput
  debian: wput
  macports: wput
  ubuntu: wput
package-manager-url: https://formulae.brew.sh/formula/wput
version: 0.6.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Tiny, wget-like FTP client for uploading files
source-archive: https://downloads.sourceforge.net/project/wput/wput/0.6.2/wput-0.6.2.tgz
build-dependencies:
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: wdel
  - exposure: global executable
    kind: cli
    name: wput
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wput
  av: sudo av install brew:wput
  brew: brew install wput
  debian: sudo apt install wput
  macports: sudo port install wput
  ubuntu: sudo apt install wput
provenance:
  formula: wput
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
