id: brew:idris2
display-name: idris2
homepage: https://www.idris-lang.org/
repo: https://github.com/idris-lang/Idris2
docs: https://www.idris-lang.org/
package-manager:
  apk: idris2
  brew: idris2
  dnf: idris2
  macports: idris2
  nix: idris2
package-manager-url: https://formulae.brew.sh/formula/idris2
version: 0.8.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Pure functional programming language with dependent types
source-archive: https://github.com/idris-lang/Idris2/archive/refs/tags/v0.8.0.tar.gz
dependencies:
  - chezscheme
build-dependencies:
  - gmp
executables:
  - exposure: global executable
    kind: cli
    name: idris2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add idris2
  av: sudo av install brew:idris2
  brew: brew install idris2
  dnf: sudo dnf install idris2
  macports: sudo port install idris2
  nix: nix profile install nixpkgs#idris2
provenance:
  formula: idris2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
