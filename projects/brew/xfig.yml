id: brew:xfig
display-name: xfig
homepage: https://mcj.sourceforge.net/
repo: https://downloads.sourceforge.net/mcj/xfig-3.2.9a.tar.xz
docs: https://mcj.sourceforge.net/
package-manager:
  apk: xfig
  brew: xfig
  debian: xfig
  dnf: xfig
  macports: xfig
  nix: xfig
  ubuntu: xfig
  zypper: xfig
package-manager-url: https://formulae.brew.sh/formula/xfig
version: 3.2.9a
license: MIT
category: network
tags:
  - cli
description: Facility for interactive generation of figures
source-archive: https://downloads.sourceforge.net/mcj/xfig-3.2.9a.tar.xz
dependencies:
  - fig2dev
  - fontconfig
  - freetype
  - ghostscript
  - jpeg-turbo
  - libpng
  - libtiff
  - libx11
  - libxaw3d
  - libxft
  - libxpm
  - libxt
build-dependencies:
  - gnu-sed
executables:
  - exposure: global executable
    kind: cli
    name: xfig
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xfig
  av: sudo av install brew:xfig
  brew: brew install xfig
  debian: sudo apt install xfig
  dnf: sudo dnf install xfig
  macports: sudo port install xfig
  nix: nix profile install nixpkgs#xfig
  ubuntu: sudo apt install xfig
  zypper: sudo zypper install xfig
provenance:
  formula: xfig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
