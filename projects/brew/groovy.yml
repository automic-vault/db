id: brew:groovy
display-name: groovy
homepage: https://www.groovy-lang.org/
repo: >
  https://groovy.jfrog.io/artifactory/dist-release-local/groovy-zips/apache-groovy-binary-5.0.6.zip
docs: https://www.groovy-lang.org/
package-manager:
  brew: groovy
  chocolatey: groovy
  debian: groovy
  macports: groovy
  nix: groovy
  pacman: groovy
  scoop: main/groovy
  ubuntu: groovy
package-manager-url: https://formulae.brew.sh/formula/groovy
version: 5.0.6
license: Apache-2.0
category: development
tags:
  - cli
description: Java-based scripting language
source-archive: >
  https://groovy.jfrog.io/artifactory/dist-release-local/groovy-zips/apache-groovy-binary-5.0.6.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: grape
  - exposure: global executable
    kind: cli
    name: groovy
  - exposure: global executable
    kind: cli
    name: groovyConsole
  - exposure: global executable
    kind: cli
    name: groovyc
  - exposure: global executable
    kind: cli
    name: groovydoc
  - exposure: global executable
    kind: cli
    name: groovysh
  - exposure: global executable
    kind: cli
    name: java2groovy
  - exposure: global executable
    kind: cli
    name: startGroovy
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:groovy
  brew: brew install groovy
  chocolatey: choco install groovy
  debian: sudo apt install groovy
  macports: sudo port install groovy
  nix: nix profile install nixpkgs#groovy
  pacman: sudo pacman -S groovy
  scoop: scoop install main/groovy
  ubuntu: sudo apt install groovy
provenance:
  formula: groovy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
