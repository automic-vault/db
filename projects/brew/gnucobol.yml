id: brew:gnucobol
display-name: gnucobol
homepage: https://gnucobol.sourceforge.io/
repo: https://ftpmirror.gnu.org/gnu/gnucobol/gnucobol-3.2.tar.xz
docs: https://gnucobol.sourceforge.io/
package-manager:
  apk: gnucobol
  brew: gnucobol
  debian: gnucobol
  dnf: gnucobol
  macports: gnucobol
  nix: gnucobol
  ubuntu: gnucobol
  zypper: gnucobol
package-manager-url: https://formulae.brew.sh/formula/gnucobol
version: 3.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: COBOL85-202x compiler supporting lots of dialect specific extensions
source-archive: https://ftpmirror.gnu.org/gnu/gnucobol/gnucobol-3.2.tar.xz
dependencies:
  - berkeley-db
  - gmp
  - json-c
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cob-config
  - exposure: global executable
    kind: cli
    name: cobc
  - exposure: global executable
    kind: cli
    name: cobcrun
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gnucobol
  av: sudo av install brew:gnucobol
  brew: brew install gnucobol
  debian: sudo apt install gnucobol
  dnf: sudo dnf install gnucobol
  macports: sudo port install gnucobol
  nix: nix profile install nixpkgs#gnucobol
  ubuntu: sudo apt install gnucobol
  zypper: sudo zypper install gnucobol
provenance:
  formula: gnucobol
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
