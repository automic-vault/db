id: brew:ttf2eot
display-name: ttf2eot
homepage: https://github.com/wget/ttf2eot
repo: https://github.com/wget/ttf2eot
docs: https://github.com/wget/ttf2eot
package-manager:
  brew: ttf2eot
  macports: ttf2eot
package-manager-url: https://formulae.brew.sh/formula/ttf2eot
version: 0.0.3
license: LGPL-2.0-or-later OR BSD-2-Clause
category: development
tags:
  - cli
description: Convert TTF files to EOT
source-archive: https://github.com/wget/ttf2eot/archive/refs/tags/v0.0.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ttf2eot
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ttf2eot
  brew: brew install ttf2eot
  macports: sudo port install ttf2eot
provenance:
  formula: ttf2eot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
