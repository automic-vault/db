id: brew:gpac
display-name: gpac
homepage: https://gpac.io/
repo: https://github.com/gpac/gpac
docs: https://gpac.io/
package-manager:
  brew: gpac
  chocolatey: gpac
  dnf: gpac
  macports: gpac
  nix: gpac
  pacman: gpac
  scoop: main/gpac
  ubuntu: gpac
  winget: GPAC.GPAC
package-manager-url: https://formulae.brew.sh/formula/gpac
version: 26.02.0
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Multimedia framework for research and academic purposes
source-archive: https://github.com/gpac/gpac/archive/refs/tags/v26.02.0.tar.gz
dependencies:
  - ffmpeg
  - freetype
  - jpeg-turbo
  - libnghttp2
  - libogg
  - libpng
  - libvorbis
  - libx11
  - libxext
  - openjpeg
  - openssl@3
  - sdl2
  - theora
  - xz
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: MP4Box
  - exposure: global executable
    kind: cli
    name: gpac
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gpac
  brew: brew install gpac
  chocolatey: choco install gpac
  dnf: sudo dnf install gpac
  macports: sudo port install gpac
  nix: nix profile install nixpkgs#gpac
  pacman: sudo pacman -S gpac
  scoop: scoop install main/gpac
  ubuntu: sudo apt install gpac
  winget: winget install --id GPAC.GPAC -e
provenance:
  formula: gpac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
