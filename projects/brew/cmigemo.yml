id: brew:cmigemo
display-name: cmigemo
homepage: https://www.kaoriya.net/software/cmigemo
repo: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/cmigemo/cmigemo-default-src-20110227.zip
docs: https://www.kaoriya.net/software/cmigemo
package-manager:
  brew: cmigemo
  debian: cmigemo
  dnf: cmigemo
  nix: cmigemo
  ubuntu: cmigemo
package-manager-url: https://formulae.brew.sh/formula/cmigemo
version: 20110227
license: MIT
category: network
tags:
  - cli
description: Migemo is a tool that supports Japanese incremental search with Romaji
source-archive: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/cmigemo/cmigemo-default-src-20110227.zip
build-dependencies:
  - nkf
executables:
  - exposure: global executable
    kind: cli
    name: cmigemo
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    See also https://github.com/emacs-jp/migemo to use cmigemo with Emacs. You will have
    to save as migemo.el and put it in your load-path.
  post-install-defined: false
install-lines:
  av: sudo av install brew:cmigemo
  brew: brew install cmigemo
  debian: sudo apt install cmigemo
  dnf: sudo dnf install cmigemo
  nix: nix profile install nixpkgs#cmigemo
  ubuntu: sudo apt install cmigemo
provenance:
  formula: cmigemo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
