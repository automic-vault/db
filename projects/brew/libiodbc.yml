id: brew:libiodbc
display-name: libiodbc
homepage: https://www.iodbc.org/
repo: https://github.com/openlink/iODBC
docs: https://www.iodbc.org/
package-manager:
  brew: libiodbc
  dnf: libiodbc
  macports: libiodbc
  nix: libiodbc
  pacman: libiodbc
package-manager-url: https://formulae.brew.sh/formula/libiodbc
version: 3.52.16
license: BSD-3-Clause OR LGPL-2.0-only
category: database
tags:
  - cli
  - database
description: Database connectivity layer based on ODBC. (alternative to unixodbc)
source-archive: https://github.com/openlink/iODBC/archive/refs/tags/v3.52.16.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: iodbc-config
  - exposure: global executable
    kind: cli
    name: iodbctest
  - exposure: global executable
    kind: cli
    name: iodbctestw
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libiodbc
  brew: brew install libiodbc
  dnf: sudo dnf install libiodbc
  macports: sudo port install libiodbc
  nix: nix profile install nixpkgs#libiodbc
  pacman: sudo pacman -S libiodbc
provenance:
  formula: libiodbc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
