id: brew:hwatch
display-name: hwatch
homepage: https://github.com/blacknon/hwatch
repo: https://github.com/blacknon/hwatch
docs: https://github.com/blacknon/hwatch
package-manager:
  apk: hwatch
  brew: hwatch
  macports: hwatch
  nix: hwatch
package-manager-url: https://formulae.brew.sh/formula/hwatch
version: 0.4.2
license: MIT
category: development
tags:
  - cli
description: Modern alternative to the watch command
source-archive: https://github.com/blacknon/hwatch/archive/refs/tags/0.4.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hwatch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hwatch
  av: sudo av install brew:hwatch
  brew: brew install hwatch
  macports: sudo port install hwatch
  nix: nix profile install nixpkgs#hwatch
provenance:
  formula: hwatch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
