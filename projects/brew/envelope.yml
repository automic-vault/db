id: brew:envelope
display-name: envelope
homepage: https://github.com/mattrighetti/envelope
repo: https://github.com/mattrighetti/envelope
docs: https://github.com/mattrighetti/envelope
package-manager:
  brew: envelope
  macports: envelope
package-manager-url: https://formulae.brew.sh/formula/envelope
version: 0.8.0
license: MIT OR Unlicense
category: development
tags:
  - cli
description: Environment variables CLI tool
source-archive: https://github.com/mattrighetti/envelope/archive/refs/tags/0.8.0.tar.gz
build-dependencies:
  - pandoc
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: envelope
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:envelope
  brew: brew install envelope
  macports: sudo port install envelope
provenance:
  formula: envelope
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
