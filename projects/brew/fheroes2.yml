id: brew:fheroes2
display-name: fheroes2
homepage: https://ihhub.github.io/fheroes2/
repo: https://github.com/ihhub/fheroes2
docs: https://ihhub.github.io/fheroes2/
package-manager:
  apk: fheroes2
  brew: fheroes2
  debian: fheroes2
  dnf: fheroes2
  macports: fheroes2
  nix: fheroes2
  ubuntu: fheroes2
package-manager-url: https://formulae.brew.sh/formula/fheroes2
version: 1.1.16
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Recreation of the Heroes of Might and Magic II game engine
source-archive: https://github.com/ihhub/fheroes2/archive/refs/tags/1.1.16.tar.gz
dependencies:
  - innoextract
  - sdl2
  - sdl2_mixer
build-dependencies:
  - cmake
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: fheroes2
  - exposure: global executable
    kind: cli
    name: fheroes2-extract-resources
  - exposure: global executable
    kind: cli
    name: fheroes2-install-demo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Run fheroes2-install-demo command to download and install all the necessary files
    from the demo version of the original Heroes of Might and Magic II game. Run
    fheroes2-extract-resources command to extract all the necessary resource files from
    a legally purchased copy of the original game. Documentation is available at:
    $HOMEBREW_CELLAR/fheroes2/1.1.16/share/doc/fheroes2/README.txt
  post-install-defined: false
install-lines:
  apk: sudo apk add fheroes2
  av: sudo av install brew:fheroes2
  brew: brew install fheroes2
  debian: sudo apt install fheroes2
  dnf: sudo dnf install fheroes2
  macports: sudo port install fheroes2
  nix: nix profile install nixpkgs#fheroes2
  ubuntu: sudo apt install fheroes2
provenance:
  formula: fheroes2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
