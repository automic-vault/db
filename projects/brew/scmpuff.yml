id: brew:scmpuff
display-name: scmpuff
homepage: https://github.com/mroth/scmpuff
repo: https://github.com/mroth/scmpuff
docs: https://github.com/mroth/scmpuff
package-manager:
  brew: scmpuff
  nix: scmpuff
  pacman: scmpuff
package-manager-url: https://formulae.brew.sh/formula/scmpuff
version: 0.7.0
license: MIT
category: development
tags:
  - cli
  - git
description: Numeric file selection shortcuts for common git commands
source-archive: https://github.com/mroth/scmpuff/archive/refs/tags/v0.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: scmpuff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:scmpuff
  brew: brew install scmpuff
  nix: nix profile install nixpkgs#scmpuff
  pacman: sudo pacman -S scmpuff
provenance:
  formula: scmpuff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
