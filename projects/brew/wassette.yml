id: brew:wassette
display-name: wassette
homepage: https://github.com/microsoft/wassette
repo: https://github.com/microsoft/wassette
docs: https://github.com/microsoft/wassette
package-manager:
  brew: wassette
  winget: Microsoft.Wassette
package-manager-url: https://formulae.brew.sh/formula/wassette
version: 0.4.0
license: MIT
category: security
tags:
  - cli
  - security
description: Security-oriented runtime that runs WebAssembly Components via MCP
source-archive: https://github.com/microsoft/wassette/archive/refs/tags/v0.4.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: wassette
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wassette
  brew: brew install wassette
  winget: winget install --id Microsoft.Wassette -e
provenance:
  formula: wassette
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
