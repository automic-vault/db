id: brew:oarfish
display-name: oarfish
homepage: https://github.com/COMBINE-lab/oarfish
repo: https://github.com/COMBINE-lab/oarfish
docs: https://github.com/COMBINE-lab/oarfish
package-manager:
  brew: oarfish
package-manager-url: https://formulae.brew.sh/formula/oarfish
version: 0.9.4
license: BSD-3-Clause
category: development
tags:
  - cli
description: Long read RNA-seq quantification
source-archive: https://github.com/COMBINE-lab/oarfish/archive/refs/tags/v0.9.4.tar.gz
build-dependencies:
  - rust
uses-from-macos:
  - bzip2
  - zlib
executables:
  - exposure: global executable
    kind: cli
    name: oarfish
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oarfish
  brew: brew install oarfish
provenance:
  formula: oarfish
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
