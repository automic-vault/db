id: brew:bibtexconv
display-name: bibtexconv
homepage: https://github.com/dreibh/bibtexconv
repo: https://github.com/dreibh/bibtexconv
docs: https://github.com/dreibh/bibtexconv
package-manager:
  brew: bibtexconv
  debian: bibtexconv
  ubuntu: bibtexconv
package-manager-url: https://formulae.brew.sh/formula/bibtexconv
version: 2.2.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: BibTeX file converter
source-archive: https://github.com/dreibh/bibtexconv/archive/refs/tags/bibtexconv-2.2.1.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - bison
  - cmake
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: bibtexconv
  - exposure: global executable
    kind: cli
    name: bibtexconv-odt
  - exposure: global executable
    kind: cli
    name: ietf2bibtex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bibtexconv
  brew: brew install bibtexconv
  debian: sudo apt install bibtexconv
  ubuntu: sudo apt install bibtexconv
provenance:
  formula: bibtexconv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
