id: brew:hspell
display-name: hspell
homepage: https://hspell.sourceforge.net/
repo: https://hspell.sourceforge.net/hspell-1.4.tar.gz
docs: https://hspell.sourceforge.net/
package-manager:
  brew: hspell
  debian: hspell
  dnf: hspell
  nix: hspell
  pacman: hspell
  ubuntu: hspell
package-manager-url: https://formulae.brew.sh/formula/hspell
version: 1.4
license: AGPL-3.0-only
category: network
tags:
  - cli
description: Free Hebrew linguistic project
source-archive: https://hspell.sourceforge.net/hspell-1.4.tar.gz
build-dependencies:
  - autoconf
executables:
  - exposure: global executable
    kind: cli
    name: hspell
  - exposure: global executable
    kind: cli
    name: hspell-i
  - exposure: global executable
    kind: cli
    name: multispell
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hspell
  brew: brew install hspell
  debian: sudo apt install hspell
  dnf: sudo dnf install hspell
  nix: nix profile install nixpkgs#hspell
  pacman: sudo pacman -S hspell
  ubuntu: sudo apt install hspell
provenance:
  formula: hspell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
