id: brew:sqlc
display-name: sqlc
homepage: https://sqlc.dev/
repo: https://github.com/sqlc-dev/sqlc
docs: https://sqlc.dev/
package-manager:
  brew: sqlc
  macports: sqlc
  nix: sqlc
  pacman: sqlc
  scoop: main/sqlc
package-manager-url: https://formulae.brew.sh/formula/sqlc
version: 1.31.1
license: MIT
category: database
tags:
  - cli
description: Generate type safe Go from SQL
source-archive: https://github.com/sqlc-dev/sqlc/archive/refs/tags/v1.31.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sqlc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sqlc
  brew: brew install sqlc
  macports: sudo port install sqlc
  nix: nix profile install nixpkgs#sqlc
  pacman: sudo pacman -S sqlc
  scoop: scoop install main/sqlc
provenance:
  formula: sqlc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
