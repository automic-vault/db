id: brew:mp3blaster
display-name: mp3blaster
homepage: https://mp3blaster.sourceforge.io
repo: >
  https://downloads.sourceforge.net/project/mp3blaster/mp3blaster/mp3blaster-3.2.6/mp3blaster-3.2.6.tar.gz
docs: https://mp3blaster.sourceforge.io
package-manager:
  brew: mp3blaster
  chocolatey: mp3tag
  debian: mp3blaster
  macports: mp3blaster
  nix: mp3blaster
  scoop: extras/mp3tag
  ubuntu: mp3blaster
  winget: FlorianHeidenreich.Mp3tag
package-manager-url: https://formulae.brew.sh/formula/mp3blaster
version: 3.2.6
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Text-based mp3 player
source-archive: >
  https://downloads.sourceforge.net/project/mp3blaster/mp3blaster/mp3blaster-3.2.6/mp3blaster-3.2.6.tar.gz
dependencies:
  - sdl12-compat
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: mp3blaster
  - exposure: global executable
    kind: cli
    name: mp3tag
  - exposure: global executable
    kind: cli
    name: nmixer
  - exposure: global executable
    kind: cli
    name: splay
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mp3blaster
  brew: brew install mp3blaster
  chocolatey: choco install mp3tag
  debian: sudo apt install mp3blaster
  macports: sudo port install mp3blaster
  nix: nix profile install nixpkgs#mp3blaster
  scoop: scoop install extras/mp3tag
  ubuntu: sudo apt install mp3blaster
  winget: winget install --id FlorianHeidenreich.Mp3tag -e
provenance:
  formula: mp3blaster
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
