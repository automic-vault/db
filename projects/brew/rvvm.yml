id: brew:rvvm
display-name: rvvm
homepage: https://github.com/LekKit/RVVM
repo: https://github.com/LekKit/RVVM
docs: https://github.com/LekKit/RVVM
package-manager:
  brew: rvvm
  nix: rvvm
package-manager-url: https://formulae.brew.sh/formula/rvvm
version: 0.6
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: RISC-V Virtual Machine
source-archive: https://github.com/LekKit/RVVM/archive/refs/tags/v0.6.tar.gz
dependencies:
  - sdl2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rvvm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rvvm
  brew: brew install rvvm
  nix: nix profile install nixpkgs#rvvm
provenance:
  formula: rvvm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
