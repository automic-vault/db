id: brew:nuitka
display-name: nuitka
homepage: https://nuitka.net
repo: >
  https://files.pythonhosted.org/packages/d2/a6/8cf2a663402c057005f0328bdc691a653fa14848248358ef051f86a21880/nuitka-4.1.1.tar.gz
docs: https://nuitka.net
package-manager:
  brew: nuitka
  ubuntu: nuitka
package-manager-url: https://formulae.brew.sh/formula/nuitka
version: 4.1.1
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Python compiler written in Python
source-archive: >
  https://files.pythonhosted.org/packages/d2/a6/8cf2a663402c057005f0328bdc691a653fa14848248358ef051f86a21880/nuitka-4.1.1.tar.gz
dependencies:
  - ccache
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: compile-python-for-nuitka-linux.sh
  - exposure: global executable
    kind: cli
    name: nuitka
  - exposure: global executable
    kind: cli
    name: nuitka-run
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nuitka
  brew: brew install nuitka
  ubuntu: sudo apt install nuitka
provenance:
  formula: nuitka
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
