id: brew:openimageio
display-name: openimageio
homepage: https://openimageio.readthedocs.io/en/stable/
repo: https://github.com/AcademySoftwareFoundation/OpenImageIO
docs: https://openimageio.readthedocs.io/en/stable/
package-manager:
  apk: openimageio
  brew: openimageio
  dnf: OpenImageIO
  macports: openimageio
  nix: openimageio
  pacman: openimageio
  scoop: main/igrep
  zypper: OpenImageIO
package-manager-url: https://formulae.brew.sh/formula/openimageio
version: 3.1.13.1
license: Apache-2.0
category: development
tags:
  - cli
description: Library for reading, processing and writing images
source-archive: >
  https://github.com/AcademySoftwareFoundation/OpenImageIO/archive/refs/tags/v3.1.13.1.tar.gz
dependencies:
  - ffmpeg
  - fmt
  - freetype
  - giflib
  - imath
  - jpeg-turbo
  - jpeg-xl
  - libheif
  - libpng
  - libraw
  - libtiff
  - opencolorio
  - openexr
  - pugixml
  - python@3.14
  - tbb
  - webp
  - zlib-ng-compat
build-dependencies:
  - cmake
  - pkgconf
  - pybind11
executables:
  - exposure: global executable
    kind: cli
    name: iconvert
  - exposure: global executable
    kind: cli
    name: idiff
  - exposure: global executable
    kind: cli
    name: igrep
  - exposure: global executable
    kind: cli
    name: iinfo
  - exposure: global executable
    kind: cli
    name: maketx
  - exposure: global executable
    kind: cli
    name: oiiotool
  - exposure: global executable
    kind: cli
    name: testtex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add openimageio
  av: sudo av install brew:openimageio
  brew: brew install openimageio
  dnf: sudo dnf install OpenImageIO
  macports: sudo port install openimageio
  nix: nix profile install nixpkgs#openimageio
  pacman: sudo pacman -S openimageio
  scoop: scoop install main/igrep
  zypper: sudo zypper install OpenImageIO
provenance:
  formula: openimageio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
