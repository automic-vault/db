id: brew:rswift
display-name: rswift
homepage: https://github.com/mac-cain13/R.swift
repo: https://github.com/mac-cain13/R.swift
docs: https://github.com/mac-cain13/R.swift
package-manager:
  brew: rswift
package-manager-url: https://formulae.brew.sh/formula/rswift
version: 7.8.0
license: MIT
category: development
tags:
  - cli
description: Get strong typed, autocompleted resources like images, fonts and segues
source-archive: https://github.com/mac-cain13/R.swift/releases/download/7.8.0/rswift-7.8.0-source.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: rswift
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rswift
  brew: brew install rswift
provenance:
  formula: rswift
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
