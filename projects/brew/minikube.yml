id: brew:minikube
display-name: minikube
homepage: https://minikube.sigs.k8s.io/
repo: https://github.com/kubernetes/minikube
docs: https://minikube.sigs.k8s.io/
package-manager:
  apk: minikube
  brew: minikube
  chocolatey: Minikube
  macports: minikube
  nix: minikube
  pacman: minikube
  scoop: main/minikube
  winget: Kubernetes.minikube
  zypper: minikube
package-manager-url: https://formulae.brew.sh/formula/minikube
version: 1.38.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Run a Kubernetes cluster locally
source-archive: https://github.com/kubernetes/minikube.git
dependencies:
  - kubernetes-cli
build-dependencies:
  - go
  - go-bindata
executables:
  - exposure: global executable
    kind: cli
    name: minikube
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add minikube
  av: sudo av install brew:minikube
  brew: brew install minikube
  chocolatey: choco install Minikube
  macports: sudo port install minikube
  nix: nix profile install nixpkgs#minikube
  pacman: sudo pacman -S minikube
  scoop: scoop install main/minikube
  winget: winget install --id Kubernetes.minikube -e
  zypper: sudo zypper install minikube
provenance:
  formula: minikube
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
