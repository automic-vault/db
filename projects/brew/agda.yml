id: brew:agda
display-name: agda
homepage: https://wiki.portal.chalmers.se/agda/
repo: https://github.com/agda/agda
docs: https://wiki.portal.chalmers.se/agda/
package-manager:
  brew: agda
  debian: agda
  dnf: Agda
  nix: agda
  pacman: agda
  ubuntu: agda
package-manager-url: https://formulae.brew.sh/formula/agda
version: 2.8.0
license: MIT AND BSD-3-Clause
category: development
tags:
  - cli
description: Dependently typed functional programming language
source-archive: https://github.com/agda/agda/archive/refs/tags/v2.8.0.tar.gz
dependencies:
  - ghc@9.12
  - gmp
build-dependencies:
  - cabal-install
  - emacs
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: agda
  - exposure: global executable
    kind: cli
    name: agda-mode
  - exposure: global executable
    kind: cli
    name: agda2hs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To use the installed Agda libraries, execute the following commands: mkdir -p
    $HOME/.config/agda cp $HOMEBREW_PREFIX/opt/agda/share/agda/example-libraries
    $HOME/.config/agda/libraries cp
    $HOMEBREW_PREFIX/opt/agda/share/agda/example-defaults $HOME/.config/agda/defaults
    You can then inspect the copied files and customize them as needed. If you have
    upgraded your Agda installation from a previous version, you may need to redo this.
  post-install-defined: false
install-lines:
  av: sudo av install brew:agda
  brew: brew install agda
  debian: sudo apt install agda
  dnf: sudo dnf install Agda
  nix: nix profile install nixpkgs#agda
  pacman: sudo pacman -S agda
  ubuntu: sudo apt install agda
provenance:
  formula: agda
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
