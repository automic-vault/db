id: brew:roll
display-name: roll
homepage: https://matteocorti.github.io/roll/
repo: https://github.com/matteocorti/roll
docs: https://matteocorti.github.io/roll/
package-manager:
  apk: roll
  brew: roll
  macports: roll
package-manager-url: https://formulae.brew.sh/formula/roll
version: 2.7.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: CLI program for rolling a dice sequence
source-archive: https://github.com/matteocorti/roll/releases/download/v2.7.0/roll-2.7.0.tar.gz
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: roll
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add roll
  av: sudo av install brew:roll
  brew: brew install roll
  macports: sudo port install roll
provenance:
  formula: roll
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
