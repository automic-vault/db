id: brew:xclip
display-name: xclip
homepage: https://github.com/astrand/xclip
repo: https://github.com/astrand/xclip
docs: https://github.com/astrand/xclip
package-manager:
  apk: xclip
  brew: xclip
  debian: xclip
  dnf: xclip
  macports: xclip
  nix: xclip
  pacman: xclip
  ubuntu: xclip
  zypper: xclip
package-manager-url: https://formulae.brew.sh/formula/xclip
version: 0.13
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Access X11 clipboards from the command-line
source-archive: https://github.com/astrand/xclip/archive/refs/tags/0.13.tar.gz
dependencies:
  - libx11
  - libxmu
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: xclip
  - exposure: global executable
    kind: cli
    name: xclip-copyfile
  - exposure: global executable
    kind: cli
    name: xclip-cutfile
  - exposure: global executable
    kind: cli
    name: xclip-pastefile
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xclip
  av: sudo av install brew:xclip
  brew: brew install xclip
  debian: sudo apt install xclip
  dnf: sudo dnf install xclip
  macports: sudo port install xclip
  nix: nix profile install nixpkgs#xclip
  pacman: sudo pacman -S xclip
  ubuntu: sudo apt install xclip
  zypper: sudo zypper install xclip
provenance:
  formula: xclip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
