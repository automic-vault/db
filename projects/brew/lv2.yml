id: brew:lv2
display-name: lv2
homepage: https://lv2plug.in/
repo: https://lv2plug.in/spec/lv2-1.18.10.tar.xz
docs: https://lv2plug.in/
package-manager:
  apk: lv2
  brew: lv2
  dnf: lv2
  macports: lv2
  nix: lv2
  pacman: lv2
  zypper: lv2
package-manager-url: https://formulae.brew.sh/formula/lv2
version: 1.18.10
license: 0BSD OR ISC
category: media
tags:
  - cli
description: Portable plugin standard for audio systems
source-archive: https://lv2plug.in/spec/lv2-1.18.10.tar.xz
build-dependencies:
  - meson
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: lv2_validate
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lv2
  av: sudo av install brew:lv2
  brew: brew install lv2
  dnf: sudo dnf install lv2
  macports: sudo port install lv2
  nix: nix profile install nixpkgs#lv2
  pacman: sudo pacman -S lv2
  zypper: sudo zypper install lv2
provenance:
  formula: lv2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
