id: brew:otel-cli
display-name: otel-cli
homepage: https://github.com/equinix-labs/otel-cli
repo: https://github.com/equinix-labs/otel-cli
docs: https://github.com/equinix-labs/otel-cli
package-manager:
  brew: otel-cli
  nix: otel-cli
package-manager-url: https://formulae.brew.sh/formula/otel-cli
version: 0.4.5
license: Apache-2.0
category: development
tags:
  - cli
description: Tool for sending events from shell scripts & similar environments
source-archive: https://github.com/equinix-labs/otel-cli/archive/refs/tags/v0.4.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: otel-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:otel-cli
  brew: brew install otel-cli
  nix: nix profile install nixpkgs#otel-cli
provenance:
  formula: otel-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
