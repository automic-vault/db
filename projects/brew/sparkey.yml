id: brew:sparkey
display-name: sparkey
homepage: https://github.com/spotify/sparkey/
repo: https://github.com/spotify/sparkey
docs: https://github.com/spotify/sparkey/
package-manager:
  brew: sparkey
  macports: sparkey
package-manager-url: https://formulae.brew.sh/formula/sparkey
version: 1.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: Constant key-value store, best for frequent read/infrequent write uses
source-archive: https://github.com/spotify/sparkey/archive/refs/tags/sparkey-1.0.0.tar.gz
dependencies:
  - snappy
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: sparkey
  - exposure: global executable
    kind: cli
    name: sparkey_bench
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sparkey
  brew: brew install sparkey
  macports: sudo port install sparkey
provenance:
  formula: sparkey
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
