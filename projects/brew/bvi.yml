id: brew:bvi
display-name: bvi
homepage: https://bvi.sourceforge.net/
repo: https://downloads.sourceforge.net/project/bvi/bvi/1.5.0/bvi-1.5.0.src.tar.gz
docs: https://bvi.sourceforge.net/
package-manager:
  apk: bvi
  brew: bvi
  debian: bvi
  dnf: bvi
  macports: bvi
  nix: bvi
  ubuntu: bvi
  zypper: bvi
package-manager-url: https://formulae.brew.sh/formula/bvi
version: 1.5.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Vi-like binary file (hex) editor
source-archive: https://downloads.sourceforge.net/project/bvi/bvi/1.5.0/bvi-1.5.0.src.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: bmore
  - exposure: global executable
    kind: cli
    name: bvedit
  - exposure: global executable
    kind: cli
    name: bvi
  - exposure: global executable
    kind: cli
    name: bview
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bvi
  av: sudo av install brew:bvi
  brew: brew install bvi
  debian: sudo apt install bvi
  dnf: sudo dnf install bvi
  macports: sudo port install bvi
  nix: nix profile install nixpkgs#bvi
  ubuntu: sudo apt install bvi
  zypper: sudo zypper install bvi
provenance:
  formula: bvi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
