id: brew:zeroclaw
display-name: zeroclaw
homepage: https://github.com/zeroclaw-labs/zeroclaw
repo: https://github.com/zeroclaw-labs/zeroclaw
docs: https://github.com/zeroclaw-labs/zeroclaw
package-manager:
  brew: zeroclaw
  nix: zeroclaw
  scoop: main/zeroclaw
  winget: ZeroClawLabs.ZeroClaw
package-manager-url: https://formulae.brew.sh/formula/zeroclaw
version: 0.7.4
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Rust-first autonomous agent runtime
source-archive: https://github.com/zeroclaw-labs/zeroclaw/archive/refs/tags/v0.7.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: zeroclaw
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:zeroclaw
  brew: brew install zeroclaw
  nix: nix profile install nixpkgs#zeroclaw
  scoop: scoop install main/zeroclaw
  winget: winget install --id ZeroClawLabs.ZeroClaw -e
provenance:
  formula: zeroclaw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
