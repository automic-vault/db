id: brew:unac
display-name: unac
homepage: https://savannah.nongnu.org/projects/unac
repo: https://deb.debian.org/debian/pool/main/u/unac/unac_1.8.0.orig.tar.gz
docs: https://savannah.nongnu.org/projects/unac
package-manager:
  brew: unac
  debian: unaccent
  macports: unac
  ubuntu: unaccent
package-manager-url: https://formulae.brew.sh/formula/unac
version: 1.8.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: C library and command that removes accents from a string
source-archive: https://deb.debian.org/debian/pool/main/u/unac/unac_1.8.0.orig.tar.gz
build-dependencies:
  - autoconf
  - automake
  - gettext
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: unaccent
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:unac
  brew: brew install unac
  debian: sudo apt install unaccent
  macports: sudo port install unac
  ubuntu: sudo apt install unaccent
provenance:
  formula: unac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
