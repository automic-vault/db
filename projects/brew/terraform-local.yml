id: brew:terraform-local
display-name: terraform-local
homepage: https://localstack.cloud/
repo: >
  https://files.pythonhosted.org/packages/b9/f7/7d128b483dfd03d178c37eedc8c9329d7ee0abc4781bcfe5a0069ee63d79/terraform_local-0.26.0.tar.gz
docs: https://localstack.cloud/
package-manager:
  brew: terraform-local
  nix: terraform-local
package-manager-url: https://formulae.brew.sh/formula/terraform-local
version: 0.26.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: CLI wrapper to deploy your Terraform applications directly to LocalStack
source-archive: >
  https://files.pythonhosted.org/packages/b9/f7/7d128b483dfd03d178c37eedc8c9329d7ee0abc4781bcfe5a0069ee63d79/terraform_local-0.26.0.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: tflocal
  - exposure: global executable
    kind: cli
    name: tflocal.bat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terraform-local
  brew: brew install terraform-local
  nix: nix profile install nixpkgs#terraform-local
provenance:
  formula: terraform-local
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
