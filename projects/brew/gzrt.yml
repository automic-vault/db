id: brew:gzrt
display-name: gzrt
homepage: https://www.urbanophile.com/arenn/coding/gzrt/gzrt.html
repo: https://www.urbanophile.com/arenn/coding/gzrt/gzrt-0.8.tar.gz
docs: https://www.urbanophile.com/arenn/coding/gzrt/gzrt.html
package-manager:
  brew: gzrt
  debian: gzrt
  macports: gzrecover
  nix: gzrt
  ubuntu: gzrt
  zypper: gzrt
package-manager-url: https://formulae.brew.sh/formula/gzrt
version: 0.8
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Gzip recovery toolkit
source-archive: https://www.urbanophile.com/arenn/coding/gzrt/gzrt-0.8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: gzrecover
bottle:
