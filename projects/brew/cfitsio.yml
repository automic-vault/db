id: brew:cfitsio
display-name: cfitsio
homepage: https://heasarc.gsfc.nasa.gov/docs/software/fitsio/fitsio.html
repo: https://heasarc.gsfc.nasa.gov/FTP/software/fitsio/c/cfitsio-4.6.4.tar.gz
docs: https://heasarc.gsfc.nasa.gov/docs/software/fitsio/fitsio.html
package-manager:
  apk: cfitsio
  brew: cfitsio
  debian: fitsverify
  dnf: cfitsio
  macports: cfitsio
  nix: cfitsio
  pacman: cfitsio
  ubuntu: fitsverify
  winget: kooyoseb.VideoSpeedConversionTool
  zypper: cfitsio
package-manager-url: https://formulae.brew.sh/formula/cfitsio
version: 4.6.4
license: CFITSIO
category: network
tags:
  - cli
description: C access to FITS data files with optional Fortran wrappers
source-archive: https://heasarc.gsfc.nasa.gov/FTP/software/fitsio/c/cfitsio-4.6.4.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: fitscopy
  - exposure: global executable
    kind: cli
    name: fitsverify
  - exposure: global executable
    kind: cli
    name: fpack
  - exposure: global executable
    kind: cli
    name: funpack
  - exposure: global executable
    kind: cli
    name: imcopy
  - exposure: global executable
    kind: cli
    name: smem
  - exposure: global executable
    kind: cli
    name: speed
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cfitsio
  av: sudo av install brew:cfitsio
  brew: brew install cfitsio
  debian: sudo apt install fitsverify
  dnf: sudo dnf install cfitsio
  macports: sudo port install cfitsio
  nix: nix profile install nixpkgs#cfitsio
  pacman: sudo pacman -S cfitsio
  ubuntu: sudo apt install fitsverify
  winget: winget install --id kooyoseb.VideoSpeedConversionTool -e
  zypper: sudo zypper install cfitsio
provenance:
  formula: cfitsio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
