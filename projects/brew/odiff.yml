id: brew:odiff
display-name: odiff
homepage: https://github.com/dmtrKovalenko/odiff
repo: https://github.com/dmtrKovalenko/odiff
docs: https://github.com/dmtrKovalenko/odiff
package-manager:
  brew: odiff
  nix: odiff
package-manager-url: https://formulae.brew.sh/formula/odiff
version: 4.3.8
license: MIT
category: development
tags:
  - cli
description: Very fast SIMD-first image comparison library (with nodejs API)
source-archive: https://github.com/dmtrKovalenko/odiff/archive/refs/tags/v4.3.8.tar.gz
build-dependencies:
  - zig@0.15
executables:
  - exposure: global executable
    kind: cli
    name: odiff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:odiff
  brew: brew install odiff
  nix: nix profile install nixpkgs#odiff
provenance:
  formula: odiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
