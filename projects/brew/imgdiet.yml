    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:imgdiet
  brew: brew install imgdiet
provenance:
  formula: imgdiet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
