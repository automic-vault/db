id: brew:imgdiet
display-name: imgdiet
homepage: https://git.sr.ht/~jamesponddotco/imgdiet-go
repo: https://git.sr.ht/~jamesponddotco/imgdiet-go/archive/v0.2.0.tar.gz
docs: https://git.sr.ht/~jamesponddotco/imgdiet-go
package-manager:
  brew: imgdiet
package-manager-url: https://formulae.brew.sh/formula/imgdiet
version: 0.2.0
license: MIT
category: development
tags:
  - cli
description: Optimize and resize images
source-archive: https://git.sr.ht/~jamesponddotco/imgdiet-go/archive/v0.2.0.tar.gz
dependencies:
  - gettext
  - glib
  - vips
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: imgdiet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
