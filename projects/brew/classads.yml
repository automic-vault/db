id: brew:classads
display-name: classads
homepage: https://research.cs.wisc.edu/htcondor/classad/
repo: https://ftp.cs.wisc.edu/condor/classad/c++/classads-1.0.10.tar.gz
docs: https://research.cs.wisc.edu/htcondor/classad/
package-manager:
  brew: classads
  nix: classads
package-manager-url: https://formulae.brew.sh/formula/classads
version: 1.0.10
license: Apache-2.0
category: network
tags:
  - cli
description: Classified Advertisements (used by HTCondor Central Manager)
source-archive: https://ftp.cs.wisc.edu/condor/classad/c++/classads-1.0.10.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: classad_functional_tester
  - exposure: global executable
    kind: cli
    name: classad_functional_tester_ns
  - exposure: global executable
    kind: cli
    name: classad_version
  - exposure: global executable
    kind: cli
    name: classad_version_ns
  - exposure: global executable
    kind: cli
    name: cxi
  - exposure: global executable
    kind: cli
    name: cxi_ns
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:classads
  brew: brew install classads
  nix: nix profile install nixpkgs#classads
provenance:
  formula: classads
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
