  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libpq
  av: sudo av install brew:libpq
  brew: brew install libpq
  chocolatey: choco install psql
  dnf: sudo dnf install libpq
  nix: nix profile install nixpkgs#pg_checksums
provenance:
  formula: libpq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
