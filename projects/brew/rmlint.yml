id: brew:rmlint
display-name: rmlint
homepage: https://rmlint.readthedocs.io/en/master/
repo: https://github.com/sahib/rmlint
docs: https://rmlint.readthedocs.io/en/master/
package-manager:
  apk: rmlint
  brew: rmlint
  debian: rmlint
  dnf: rmlint
  macports: rmlint
  nix: rmlint
  ubuntu: rmlint
package-manager-url: https://formulae.brew.sh/formula/rmlint
version: 2.10.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Extremely fast tool to remove dupes and other lint from your filesystem
source-archive: https://github.com/sahib/rmlint/archive/refs/tags/v2.10.3.tar.gz
dependencies:
  - gettext
  - glib
  - json-glib
build-dependencies:
  - gettext
  - pkgconf
  - scons
  - sphinx-doc
executables:
  - exposure: global executable
    kind: cli
    name: rmlint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rmlint
  av: sudo av install brew:rmlint
  brew: brew install rmlint
  debian: sudo apt install rmlint
  dnf: sudo dnf install rmlint
  macports: sudo port install rmlint
  nix: nix profile install nixpkgs#rmlint
  ubuntu: sudo apt install rmlint
provenance:
  formula: rmlint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
