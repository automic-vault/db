id: brew:radvd
display-name: radvd
homepage: https://radvd.litech.org/
repo: https://github.com/radvd-project/radvd
docs: https://radvd.litech.org/
package-manager:
  apk: radvd
  brew: radvd
  debian: radvd
  dnf: radvd
  macports: radvd
  nix: radvd
  pacman: radvd
  ubuntu: radvd
  zypper: radvd
package-manager-url: https://formulae.brew.sh/formula/radvd
version: 2.21
license: radvd
category: development
tags:
  - cli
description: IPv6 Router Advertisement Daemon
source-archive: https://github.com/radvd-project/radvd/releases/download/v2.21/radvd-2.21.tar.xz
dependencies:
  - libbsd
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: radvd
  - exposure: global executable
    kind: cli
    name: radvdump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add radvd
  av: sudo av install brew:radvd
  brew: brew install radvd
  debian: sudo apt install radvd
  dnf: sudo dnf install radvd
  macports: sudo port install radvd
  nix: nix profile install nixpkgs#radvd
  pacman: sudo pacman -S radvd
  ubuntu: sudo apt install radvd
  zypper: sudo zypper install radvd
provenance:
  formula: radvd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
