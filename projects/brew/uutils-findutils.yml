id: brew:uutils-findutils
display-name: uutils-findutils
homepage: https://uutils.github.io/findutils/
repo: https://github.com/uutils/findutils
docs: https://uutils.github.io/findutils/
package-manager:
  brew: uutils-findutils
  nix: uutils-findutils
  scoop: main/uutils-findutils
package-manager-url: https://formulae.brew.sh/formula/uutils-findutils
version: 0.8.0
license: MIT
category: development
tags:
  - cli
description: Cross-platform Rust rewrite of the GNU findutils
source-archive: https://github.com/uutils/findutils/archive/refs/tags/0.8.0.tar.gz
dependencies:
  - oniguruma
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ufind
  - exposure: global executable
    kind: cli
    name: uu-find
  - exposure: global executable
    kind: cli
    name: uu-xargs
  - exposure: global executable
    kind: cli
    name: uxargs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Commands have been installed with the prefix "uu-". If you need to use these
    commands with their normal names, you can add a "uubin" directory to your PATH from
    your bashrc like: PATH="$HOMEBREW_PREFIX/opt/uutils-findutils/libexec/uubin:$PATH"
  post-install-defined: false
install-lines:
  av: sudo av install brew:uutils-findutils
  brew: brew install uutils-findutils
  nix: nix profile install nixpkgs#uutils-findutils
  scoop: scoop install main/uutils-findutils
provenance:
  formula: uutils-findutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
