id: brew:tsnet-serve
display-name: tsnet-serve
homepage: https://github.com/shayne/tsnet-serve
repo: https://github.com/shayne/tsnet-serve
docs: https://github.com/shayne/tsnet-serve
package-manager:
  brew: tsnet-serve
package-manager-url: https://formulae.brew.sh/formula/tsnet-serve
version: 1.3.2
license: MIT
category: development
tags:
  - cli
description: Expose HTTP applications to a Tailscale Tailnet network
source-archive: https://github.com/shayne/tsnet-serve/archive/refs/tags/v1.3.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tsnet-serve
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tsnet-serve
  brew: brew install tsnet-serve
provenance:
  formula: tsnet-serve
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
