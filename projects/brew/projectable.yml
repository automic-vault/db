id: brew:projectable
display-name: projectable
homepage: https://dzfrias.dev/blog/projectable
repo: https://github.com/dzfrias/projectable
docs: https://dzfrias.dev/blog/projectable
package-manager:
  brew: projectable
  nix: projectable
package-manager-url: https://formulae.brew.sh/formula/projectable
version: 1.3.2
license: MIT
category: development
tags:
  - cli
description: TUI file manager built for projects
source-archive: https://github.com/dzfrias/projectable/archive/refs/tags/1.3.2.tar.gz
dependencies:
  - libgit2
  - libssh2
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: prj
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:projectable
  brew: brew install projectable
  nix: nix profile install nixpkgs#projectable
provenance:
  formula: projectable
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
