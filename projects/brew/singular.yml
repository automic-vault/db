id: brew:singular
display-name: singular
homepage: https://www.singular.uni-kl.de/
repo: >
  https://www.singular.uni-kl.de/ftp/pub/Math/Singular/SOURCES/4-4-1/singular-4.4.1p5.tar.gz
docs: https://www.singular.uni-kl.de/
package-manager:
  apk: singular
  brew: singular
  debian: singular
  dnf: Singular
  macports: singular
  nix: singular
  pacman: singular
  ubuntu: singular
  zypper: singular
package-manager-url: https://formulae.brew.sh/formula/singular
version: 4.4.1p5
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Computer algebra system for polynomial computations
source-archive: >
  https://www.singular.uni-kl.de/ftp/pub/Math/Singular/SOURCES/4-4-1/singular-4.4.1p5.tar.gz
dependencies:
  - flint
  - gmp
  - mpfr
  - ntl
  - python@3.14
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: ESingular
  - exposure: global executable
    kind: cli
    name: Singular
  - exposure: global executable
    kind: cli
    name: TSingular
  - exposure: global executable
    kind: cli
    name: libpolys-config
  - exposure: global executable
    kind: cli
    name: libsingular-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add singular
  av: sudo av install brew:singular
  brew: brew install singular
  debian: sudo apt install singular
  dnf: sudo dnf install Singular
  macports: sudo port install singular
  nix: nix profile install nixpkgs#singular
  pacman: sudo pacman -S singular
  ubuntu: sudo apt install singular
  zypper: sudo zypper install singular
provenance:
  formula: singular
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
