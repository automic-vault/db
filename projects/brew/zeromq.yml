id: brew:zeromq
display-name: zeromq
homepage: https://zeromq.org/
repo: https://github.com/zeromq/libzmq
docs: https://zeromq.org/
package-manager:
  apk: zeromq
  brew: zeromq
  dnf: zeromq
  nix: zeromq
  pacman: zeromq
package-manager-url: https://formulae.brew.sh/formula/zeromq
version: 4.3.5
license: MPL-2.0
category: development
tags:
  - cli
description: High-performance, asynchronous messaging library
source-archive: https://github.com/zeromq/libzmq/releases/download/v4.3.5/zeromq-4.3.5.tar.gz
dependencies:
  - libsodium
build-dependencies:
  - asciidoc
  - pkgconf
  - xmlto
executables:
  - exposure: global executable
    kind: cli
    name: curve_keygen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zeromq
  av: sudo av install brew:zeromq
  brew: brew install zeromq
  dnf: sudo dnf install zeromq
  nix: nix profile install nixpkgs#zeromq
  pacman: sudo pacman -S zeromq
provenance:
  formula: zeromq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
