id: brew:oq
display-name: oq
homepage: https://blacksmoke16.github.io/oq
repo: https://github.com/Blacksmoke16/oq
docs: https://blacksmoke16.github.io/oq
package-manager:
  apk: oq
  brew: oq
  macports: oq
  nix: oq
package-manager-url: https://formulae.brew.sh/formula/oq
version: 1.3.5
license: MIT
category: development
tags:
  - cli
  - json
description: Performant, and portable jq wrapper to support formats other than JSON
source-archive: https://github.com/Blacksmoke16/oq/archive/refs/tags/v1.3.5.tar.gz
dependencies:
  - bdw-gc
  - libyaml
  - pcre2
build-dependencies:
  - crystal
uses-from-macos:
  - jq
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: oq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add oq
  av: sudo av install brew:oq
  brew: brew install oq
  macports: sudo port install oq
  nix: nix profile install nixpkgs#oq
provenance:
  formula: oq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
