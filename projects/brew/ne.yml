id: brew:ne
display-name: ne
homepage: https://ne.di.unimi.it/
repo: https://github.com/vigna/ne
docs: https://ne.di.unimi.it/
package-manager:
  brew: ne
  debian: ne
  dnf: ne
  macports: ne
  nix: ne
  ubuntu: ne
package-manager-url: https://formulae.brew.sh/formula/ne
version: 3.3.4
license: GPL-3.0-only
category: development
tags:
  - cli
description: Text editor based on the POSIX standard
source-archive: https://github.com/vigna/ne/archive/refs/tags/3.3.4.tar.gz
build-dependencies:
  - texinfo
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ne
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ne
  brew: brew install ne
  debian: sudo apt install ne
  dnf: sudo dnf install ne
  macports: sudo port install ne
  nix: nix profile install nixpkgs#ne
  ubuntu: sudo apt install ne
provenance:
  formula: ne
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
