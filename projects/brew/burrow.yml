id: brew:burrow
display-name: burrow
homepage: https://github.com/linkedin/Burrow
repo: https://github.com/linkedin/Burrow
docs: https://github.com/linkedin/Burrow
package-manager:
  brew: burrow
  debian: burrow
  ubuntu: burrow
package-manager-url: https://formulae.brew.sh/formula/burrow
version: 1.9.6
license: Apache-2.0
category: development
tags:
  - cli
description: Kafka Consumer Lag Checking
source-archive: https://github.com/linkedin/Burrow/archive/refs/tags/v1.9.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: burrow
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:burrow
  brew: brew install burrow
  debian: sudo apt install burrow
  ubuntu: sudo apt install burrow
provenance:
  formula: burrow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
