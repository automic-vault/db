id: brew:tomee-plume
display-name: tomee-plume
homepage: https://tomee.apache.org/
repo: >
  https://www.apache.org/dyn/closer.lua?path=tomee/tomee-10.1.5/apache-tomee-10.1.5-plume.tar.gz
docs: https://tomee.apache.org/
package-manager:
  brew: tomee-plume
package-manager-url: https://formulae.brew.sh/formula/tomee-plume
version: 10.1.5
license: Apache-2.0
category: network
tags:
  - cli
description: Apache TomEE Plume
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=tomee/tomee-10.1.5/apache-tomee-10.1.5-plume.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: catalina.sh
  - exposure: global executable
    kind: cli
    name: ciphers.sh
  - exposure: global executable
    kind: cli
    name: configtest.sh
  - exposure: global executable
    kind: cli
    name: daemon.sh
  - exposure: global executable
    kind: cli
    name: digest.sh
  - exposure: global executable
    kind: cli
    name: makebase.sh
  - exposure: global executable
    kind: cli
    name: migrate.sh
  - exposure: global executable
    kind: cli
    name: setclasspath.sh
  - exposure: global executable
    kind: cli
    name: shutdown.sh
  - exposure: global executable
    kind: cli
    name: startup.sh
  - exposure: global executable
    kind: cli
    name: tomee.sh
  - exposure: global executable
    kind: cli
    name: tool-wrapper.sh
  - exposure: global executable
    kind: cli
    name: version.sh
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The home of Apache TomEE Plume is: $HOMEBREW_PREFIX/opt/tomee-plume/libexec To run
    Apache TomEE: $HOMEBREW_PREFIX/opt/tomee-plume/bin/startup.sh
  post-install-defined: false
install-lines:
  av: sudo av install brew:tomee-plume
  brew: brew install tomee-plume
provenance:
  formula: tomee-plume
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
