id: brew:rojo
display-name: rojo
homepage: https://rojo.space/
repo: https://github.com/rojo-rbx/rojo
docs: https://rojo.space/
package-manager:
  brew: rojo
  nix: rojo
  winget: Rojo.Rojo
package-manager-url: https://formulae.brew.sh/formula/rojo
version: 7.6.1
license: MPL-2.0
category: development
tags:
  - cli
description: Professional grade Roblox development tools
source-archive: https://github.com/rojo-rbx/rojo.git
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rojo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rojo
  brew: brew install rojo
  nix: nix profile install nixpkgs#rojo
  winget: winget install --id Rojo.Rojo -e
provenance:
  formula: rojo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
