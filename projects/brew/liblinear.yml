id: brew:liblinear
display-name: liblinear
homepage: https://www.csie.ntu.edu.tw/~cjlin/liblinear/
repo: https://www.csie.ntu.edu.tw/~cjlin/liblinear/oldfiles/liblinear-2.50.tar.gz
docs: https://www.csie.ntu.edu.tw/~cjlin/liblinear/
package-manager:
  apk: predict
  brew: liblinear
  dnf: liblinear
  macports: liblinear
  nix: liblinear
  zypper: predict
package-manager-url: https://formulae.brew.sh/formula/liblinear
version: 2.50
license: BSD-3-Clause
category: network
tags:
  - cli
description: Library for large linear classification
source-archive: https://www.csie.ntu.edu.tw/~cjlin/liblinear/oldfiles/liblinear-2.50.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: predict
  - exposure: global executable
    kind: cli
    name: train
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add predict
  av: sudo av install brew:liblinear
  brew: brew install liblinear
  dnf: sudo dnf install liblinear
  macports: sudo port install liblinear
  nix: nix profile install nixpkgs#liblinear
  zypper: sudo zypper install predict
provenance:
  formula: liblinear
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
