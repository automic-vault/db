id: brew:fnt
display-name: fnt
homepage: https://github.com/alexmyczko/fnt
repo: https://github.com/alexmyczko/fnt
docs: https://github.com/alexmyczko/fnt
package-manager:
  brew: fnt
  debian: fnt
  ubuntu: fnt
package-manager-url: https://formulae.brew.sh/formula/fnt
version: 1.9.1
license: MIT
category: development
tags:
  - cli
description: Apt for fonts, the missing font manager for macOS/linux
source-archive: https://github.com/alexmyczko/fnt/archive/refs/tags/1.9.1.tar.gz
dependencies:
  - chafa
  - lcdf-typetools
  - xz
executables:
  - exposure: global executable
    kind: cli
    name: fnt
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fnt
  brew: brew install fnt
  debian: sudo apt install fnt
  ubuntu: sudo apt install fnt
provenance:
  formula: fnt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
