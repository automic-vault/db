id: brew:mp4v2
display-name: mp4v2
homepage: https://mp4v2.org
repo: https://github.com/enzo1982/mp4v2
docs: https://mp4v2.org
package-manager:
  brew: mp4v2
  macports: mp4v2
  nix: mp4v2
package-manager-url: https://formulae.brew.sh/formula/mp4v2
version: 2.1.3
license: MPL-1.1
category: development
tags:
  - cli
description: Read, create, and modify MP4 files
source-archive: https://github.com/enzo1982/mp4v2/releases/download/v2.1.3/mp4v2-2.1.3.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: mp4art
  - exposure: global executable
    kind: cli
    name: mp4chaps
  - exposure: global executable
    kind: cli
    name: mp4file
  - exposure: global executable
    kind: cli
    name: mp4subtitle
  - exposure: global executable
    kind: cli
    name: mp4tags
  - exposure: global executable
    kind: cli
    name: mp4track
  - exposure: global executable
    kind: cli
    name: mp4trackdump
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mp4v2
  brew: brew install mp4v2
  macports: sudo port install mp4v2
  nix: nix profile install nixpkgs#mp4v2
provenance:
  formula: mp4v2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
