id: brew:open-scene-graph
display-name: open-scene-graph
homepage: https://github.com/openscenegraph/OpenSceneGraph
repo: https://github.com/openscenegraph/OpenSceneGraph
docs: https://github.com/openscenegraph/OpenSceneGraph
package-manager:
  brew: open-scene-graph
package-manager-url: https://formulae.brew.sh/formula/open-scene-graph
version: 3.6.5
license: LGPL-2.1-or-later WITH WxWindows-exception-3.1
category: development
tags:
  - cli
description: 3D graphics toolkit
source-archive: >
  https://github.com/openscenegraph/OpenSceneGraph/archive/refs/tags/OpenSceneGraph-3.6.5.tar.gz
dependencies:
  - fontconfig
  - freetype
  - jpeg-turbo
  - sdl2
build-dependencies:
  - cmake
  - doxygen
  - graphviz
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: osgarchive
  - exposure: global executable
    kind: cli
    name: osgconv
  - exposure: global executable
    kind: cli
    name: osgfilecache
  - exposure: global executable
    kind: cli
    name: osgversion
  - exposure: global executable
    kind: cli
    name: osgviewer
  - exposure: global executable
    kind: cli
    name: present3D
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:open-scene-graph
  brew: brew install open-scene-graph
provenance:
  formula: open-scene-graph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
