id: brew:mk
display-name: mk
homepage: https://mk.readthedocs.io
repo: >
  https://files.pythonhosted.org/packages/75/9e/dcc7813d9f7133f8d384eca24a4d4bb0cb056abcc53f1f170b8353084feb/mk-3.0.0.tar.gz
docs: https://mk.readthedocs.io
package-manager:
  brew: mk
package-manager-url: https://formulae.brew.sh/formula/mk
version: 3.0.0
license: MIT
category: development
tags:
  - cli
description: Wrapper for auto-detecting build and test commands in a repository
source-archive: >
  https://files.pythonhosted.org/packages/75/9e/dcc7813d9f7133f8d384eca24a4d4bb0cb056abcc53f1f170b8353084feb/mk-3.0.0.tar.gz
dependencies:
  - certifi
  - libyaml
  - python@3.14
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mk
  - exposure: global executable
    kind: cli
    name: pre
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
