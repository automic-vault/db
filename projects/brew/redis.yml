id: brew:redis
display-name: redis
homepage: https://redis.io/
repo: https://download.redis.io/releases/redis-8.8.0.tar.gz
docs: https://redis.io/
package-manager:
  apk: redis
  brew: redis
  chocolatey: redis
  debian: redis
  macports: redis
  nix: redis
  scoop: main/redis
  ubuntu: redis
  winget: Redis.Redis
  zypper: redis
package-manager-url: https://formulae.brew.sh/formula/redis
version: 8.8.0
license: AGPL-3.0-only AND BSD-2-Clause AND BSL-1.0 AND MIT AND (CC0-1.0 OR BSD-2-Clause)
category: database
tags:
  - cli
  - database
description: Persistent key-value database, with built-in net interface
source-archive: https://download.redis.io/releases/redis-8.8.0.tar.gz
dependencies:
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: redis-benchmark
  - exposure: global executable
    kind: cli
    name: redis-check-aof
  - exposure: global executable
    kind: cli
    name: redis-check-rdb
  - exposure: global executable
    kind: cli
    name: redis-cli
  - exposure: global executable
    kind: cli
    name: redis-sentinel
  - exposure: global executable
    kind: cli
    name: redis-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add redis
  av: sudo av install brew:redis
  brew: brew install redis
  chocolatey: choco install redis
  debian: sudo apt install redis
  macports: sudo port install redis
  nix: nix profile install nixpkgs#redis
  scoop: scoop install main/redis
  ubuntu: sudo apt install redis
  winget: winget install --id Redis.Redis -e
  zypper: sudo zypper install redis
provenance:
  formula: redis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
