id: brew:cidr2range
display-name: cidr2range
homepage: https://ipinfo.io
repo: https://github.com/ipinfo/cli
docs: https://ipinfo.io
package-manager:
  brew: cidr2range
package-manager-url: https://formulae.brew.sh/formula/cidr2range
version: 1.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: Converts CIDRs to IP ranges
source-archive: https://github.com/ipinfo/cli/archive/refs/tags/cidr2range-1.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cidr2range
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cidr2range
  brew: brew install cidr2range
provenance:
  formula: cidr2range
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
