id: brew:oclgrind
display-name: oclgrind
homepage: https://github.com/jrprice/Oclgrind
repo: https://github.com/jrprice/Oclgrind
docs: https://github.com/jrprice/Oclgrind
package-manager:
  brew: oclgrind
  ubuntu: oclgrind
package-manager-url: https://formulae.brew.sh/formula/oclgrind
version: 26.03.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: OpenCL device simulator and debugger
source-archive: https://github.com/jrprice/Oclgrind/archive/refs/tags/v26.03.1.tar.gz
dependencies:
  - llvm@19
  - readline
  - zstd
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: oclgrind
  - exposure: global executable
    kind: cli
    name: oclgrind-kernel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oclgrind
  brew: brew install oclgrind
  ubuntu: sudo apt install oclgrind
provenance:
  formula: oclgrind
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
