id: brew:tabiew
display-name: tabiew
homepage: https://github.com/shshemi/tabiew
repo: https://github.com/shshemi/tabiew
docs: https://github.com/shshemi/tabiew
package-manager:
  apk: tabiew
  brew: tabiew
  macports: tabiew
  nix: tabiew
  pacman: tabiew
  scoop: main/tabiew
package-manager-url: https://formulae.brew.sh/formula/tabiew
version: 0.13.1
license: MIT
category: development
tags:
  - cli
description: TUI to view and query tabular files (CSV,TSV, Parquet, etc.)
source-archive: https://github.com/shshemi/tabiew/archive/refs/tags/v0.13.1.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tw
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tabiew
  av: sudo av install brew:tabiew
  brew: brew install tabiew
  macports: sudo port install tabiew
  nix: nix profile install nixpkgs#tabiew
  pacman: sudo pacman -S tabiew
  scoop: scoop install main/tabiew
provenance:
  formula: tabiew
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
