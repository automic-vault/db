id: brew:ctop
display-name: ctop
homepage: https://bcicen.github.io/ctop/
repo: https://github.com/bcicen/ctop
docs: https://bcicen.github.io/ctop/
package-manager:
  apk: ctop
  brew: ctop
  macports: ctop
  nix: ctop
  pacman: ctop
  scoop: main/ctop
  zypper: ctop
package-manager-url: https://formulae.brew.sh/formula/ctop
version: 0.7.7
license: MIT
category: development
tags:
  - cli
description: Top-like interface for container metrics
source-archive: https://github.com/bcicen/ctop.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ctop
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ctop
  av: sudo av install brew:ctop
  brew: brew install ctop
  macports: sudo port install ctop
  nix: nix profile install nixpkgs#ctop
  pacman: sudo pacman -S ctop
  scoop: scoop install main/ctop
  zypper: sudo zypper install ctop
provenance:
  formula: ctop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
