  dnf: sudo dnf install expect
  macports: sudo port install expect
  nix: nix profile install nixpkgs#expect
  pacman: sudo pacman -S expect
  ubuntu: sudo apt install expect
  winget: winget install --id FlorinZamfir.Weather -e
  zypper: sudo zypper install expect
provenance:
  formula: expect
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
