id: brew:camlp5
display-name: camlp5
homepage: https://camlp5.github.io/
repo: https://github.com/camlp5/camlp5
docs: https://camlp5.github.io/
package-manager:
  brew: camlp5
  debian: camlp5
  macports: camlp5
  pacman: camlp5
  ubuntu: camlp5
package-manager-url: https://formulae.brew.sh/formula/camlp5
version: 8.05.01
license: BSD-3-Clause
category: development
tags:
  - cli
description: Preprocessor and pretty-printer for OCaml
source-archive: https://github.com/camlp5/camlp5/archive/refs/tags/8.05.01.tar.gz
dependencies:
  - camlp-streams
  - ocaml
  - pcre2
build-dependencies:
  - ocaml-findlib
  - opam
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: camlp5
  - exposure: global executable
    kind: cli
    name: camlp5o
  - exposure: global executable
    kind: cli
    name: camlp5o.opt
  - exposure: global executable
    kind: cli
    name: camlp5r
  - exposure: global executable
    kind: cli
    name: camlp5r.opt
  - exposure: global executable
    kind: cli
    name: camlp5sch
  - exposure: global executable
    kind: cli
    name: mkcamlp5
  - exposure: global executable
    kind: cli
    name: mkcamlp5.opt
  - exposure: global executable
    kind: cli
    name: ocpp5
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:camlp5
  brew: brew install camlp5
  debian: sudo apt install camlp5
  macports: sudo port install camlp5
  pacman: sudo pacman -S camlp5
  ubuntu: sudo apt install camlp5
provenance:
  formula: camlp5
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
