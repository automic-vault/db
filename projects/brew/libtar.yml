id: brew:libtar
display-name: libtar
homepage: https://repo.or.cz/libtar.git
repo: https://repo.or.cz/libtar
docs: https://repo.or.cz/libtar.git
package-manager:
  brew: libtar
  dnf: libtar
  macports: libtar
  nix: libtar
  pacman: libtar
  zypper: libtar
package-manager-url: https://formulae.brew.sh/formula/libtar
version: 1.2.20
license: NCSA
category: development
tags:
  - cli
description: C library for manipulating POSIX tar files
source-archive: https://repo.or.cz/libtar.git
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: libtar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libtar
  brew: brew install libtar
  dnf: sudo dnf install libtar
  macports: sudo port install libtar
  nix: nix profile install nixpkgs#libtar
  pacman: sudo pacman -S libtar
  zypper: sudo zypper install libtar
provenance:
  formula: libtar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
