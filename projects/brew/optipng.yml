id: brew:optipng
display-name: optipng
homepage: https://optipng.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/optipng/OptiPNG/optipng-7.9.1/optipng-7.9.1.tar.gz
docs: https://optipng.sourceforge.net/
package-manager:
  apk: optipng
  brew: optipng
  chocolatey: OptiPNG
  debian: optipng
  dnf: optipng
  macports: optipng
  nix: optipng
  pacman: optipng
  scoop: main/optipng
  ubuntu: optipng
  winget: OptiPNG.OptiPNG
  zypper: optipng
package-manager-url: https://formulae.brew.sh/formula/optipng
version: 7.9.1
license: Zlib
category: media
tags:
  - cli
description: PNG file optimizer
source-archive: >
  https://downloads.sourceforge.net/project/optipng/OptiPNG/optipng-7.9.1/optipng-7.9.1.tar.gz
dependencies:
  - libpng
executables:
  - exposure: global executable
    kind: cli
    name: optipng
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add optipng
  av: sudo av install brew:optipng
  brew: brew install optipng
  chocolatey: choco install OptiPNG
  debian: sudo apt install optipng
  dnf: sudo dnf install optipng
  macports: sudo port install optipng
  nix: nix profile install nixpkgs#optipng
  pacman: sudo pacman -S optipng
  scoop: scoop install main/optipng
  ubuntu: sudo apt install optipng
  winget: winget install --id OptiPNG.OptiPNG -e
  zypper: sudo zypper install optipng
provenance:
  formula: optipng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
