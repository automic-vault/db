id: brew:autocorrect
display-name: autocorrect
homepage: https://huacnlee.github.io/autocorrect/
repo: https://github.com/huacnlee/autocorrect
docs: https://huacnlee.github.io/autocorrect/
package-manager:
  brew: autocorrect
  nix: autocorrect
  scoop: main/autocorrect
  winget: Texthelp.AutoCorrect
package-manager-url: https://formulae.brew.sh/formula/autocorrect
version: 2.16.3
license: MIT
category: development
tags:
  - cli
description: Linter and formatter to improve copywriting, correct spaces, words between CJK
source-archive: https://github.com/huacnlee/autocorrect/archive/refs/tags/v2.16.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: autocorrect
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:autocorrect
  brew: brew install autocorrect
  nix: nix profile install nixpkgs#autocorrect
  scoop: scoop install main/autocorrect
  winget: winget install --id Texthelp.AutoCorrect -e
provenance:
  formula: autocorrect
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
