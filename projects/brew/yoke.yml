id: brew:yoke
display-name: yoke
homepage: https://yokecd.github.io/docs/
repo: https://github.com/yokecd/yoke
docs: https://yokecd.github.io/docs/
package-manager:
  brew: yoke
  scoop: extras/yoke
package-manager-url: https://formulae.brew.sh/formula/yoke
version: 0.20.15
license: MIT
category: development
tags:
  - cli
description: Helm-inspired infrastructure-as-code package deployer
source-archive: https://github.com/yokecd/yoke.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: yoke
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yoke
  brew: brew install yoke
  scoop: scoop install extras/yoke
provenance:
  formula: yoke
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
