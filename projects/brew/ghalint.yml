id: brew:ghalint
display-name: ghalint
homepage: https://github.com/suzuki-shunsuke/ghalint
repo: https://github.com/suzuki-shunsuke/ghalint
docs: https://github.com/suzuki-shunsuke/ghalint
package-manager:
  brew: ghalint
  nix: ghalint
package-manager-url: https://formulae.brew.sh/formula/ghalint
version: 1.5.6
license: MIT
category: development
tags:
  - cli
description: GitHub Actions linter
source-archive: https://github.com/suzuki-shunsuke/ghalint/archive/refs/tags/v1.5.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ghalint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ghalint
  brew: brew install ghalint
  nix: nix profile install nixpkgs#ghalint
provenance:
  formula: ghalint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
