id: brew:apktool
display-name: apktool
homepage: https://github.com/iBotPeaches/Apktool
repo: https://github.com/iBotPeaches/Apktool
docs: https://github.com/iBotPeaches/Apktool
package-manager:
  brew: apktool
  chocolatey: apktool
  debian: apktool
  macports: apktool
  nix: apktool
  scoop: main/apktool
  ubuntu: apktool
package-manager-url: https://formulae.brew.sh/formula/apktool
version: 3.0.2
license: Apache-2.0
category: development
tags:
  - cli
description: Tool for reverse engineering 3rd party, closed, binary Android apps
source-archive: https://github.com/iBotPeaches/Apktool/releases/download/v3.0.2/apktool_3.0.2.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: apktool
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:apktool
  brew: brew install apktool
  chocolatey: choco install apktool
  debian: sudo apt install apktool
  macports: sudo port install apktool
  nix: nix profile install nixpkgs#apktool
  scoop: scoop install main/apktool
  ubuntu: sudo apt install apktool
provenance:
  formula: apktool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
