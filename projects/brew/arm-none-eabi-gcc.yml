id: brew:arm-none-eabi-gcc
display-name: arm-none-eabi-gcc
homepage: https://gcc.gnu.org
repo: https://ftpmirror.gnu.org/gnu/gcc/gcc-16.1.0/gcc-16.1.0.tar.xz
docs: https://gcc.gnu.org
package-manager:
  brew: arm-none-eabi-gcc
  macports: arm-none-eabi-gcc
  pacman: arm-none-eabi-gcc
package-manager-url: https://formulae.brew.sh/formula/arm-none-eabi-gcc
version: 16.1.0
license: GPL-3.0-or-later WITH GCC-exception-3.1
category: development
tags:
  - cli
description: GNU compiler collection for arm-none-eabi
source-archive: https://ftpmirror.gnu.org/gnu/gcc/gcc-16.1.0/gcc-16.1.0.tar.xz
dependencies:
  - arm-none-eabi-binutils
  - gmp
  - isl
  - libmpc
  - mpfr
  - zstd
executables:
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-c++
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-cpp
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-g++
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-gcc
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-gcc-16.1.0
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-gcc-ar
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-gcc-nm
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-gcc-ranlib
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-gcov
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-gcov-dump
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-gcov-tool
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-lto-dump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:arm-none-eabi-gcc
  brew: brew install arm-none-eabi-gcc
  macports: sudo port install arm-none-eabi-gcc
  pacman: sudo pacman -S arm-none-eabi-gcc
provenance:
  formula: arm-none-eabi-gcc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
