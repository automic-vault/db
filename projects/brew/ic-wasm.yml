id: brew:ic-wasm
display-name: ic-wasm
homepage: https://github.com/dfinity/ic-wasm
repo: https://github.com/dfinity/ic-wasm
docs: https://github.com/dfinity/ic-wasm
package-manager:
  brew: ic-wasm
package-manager-url: https://formulae.brew.sh/formula/ic-wasm
version: 0.9.11
license: Apache-2.0
category: development
tags:
  - cli
description: CLI tool for performing Wasm transformations specific to ICP canisters
source-archive: https://github.com/dfinity/ic-wasm/archive/refs/tags/0.9.11.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ic-wasm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ic-wasm
  brew: brew install ic-wasm
provenance:
  formula: ic-wasm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
