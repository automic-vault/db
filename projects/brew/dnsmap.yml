id: brew:dnsmap
display-name: dnsmap
homepage: https://github.com/resurrecting-open-source-projects/dnsmap
repo: https://github.com/resurrecting-open-source-projects/dnsmap
docs: https://github.com/resurrecting-open-source-projects/dnsmap
package-manager:
  brew: dnsmap
  debian: dnsmap
  dnf: dnsmap
  nix: dnsmap
  ubuntu: dnsmap
package-manager-url: https://formulae.brew.sh/formula/dnsmap
version: 0.36
license: GPL-2.0-or-later AND GPL-3.0-or-later
category: development
tags:
  - cli
description: Passive DNS network mapper (a.k.a. subdomains bruteforcer)
source-archive: >
  https://github.com/resurrecting-open-source-projects/dnsmap/archive/refs/tags/0.36.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: dnsmap
  - exposure: global executable
    kind: cli
    name: dnsmap-bulk
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dnsmap
  brew: brew install dnsmap
  debian: sudo apt install dnsmap
  dnf: sudo dnf install dnsmap
  nix: nix profile install nixpkgs#dnsmap
  ubuntu: sudo apt install dnsmap
provenance:
  formula: dnsmap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
