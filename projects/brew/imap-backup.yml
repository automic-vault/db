id: brew:imap-backup
display-name: imap-backup
homepage: https://github.com/joeyates/imap-backup
repo: https://github.com/joeyates/imap-backup
docs: https://github.com/joeyates/imap-backup
package-manager:
  brew: imap-backup
package-manager-url: https://formulae.brew.sh/formula/imap-backup
version: 16.6.0
license: MIT
category: development
tags:
  - cli
description: Backup GMail (or other IMAP) accounts to disk
source-archive: https://github.com/joeyates/imap-backup/archive/refs/tags/v16.6.0.tar.gz
dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: imap-backup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:imap-backup
  brew: brew install imap-backup
provenance:
  formula: imap-backup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
