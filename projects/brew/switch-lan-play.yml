id: brew:switch-lan-play
display-name: switch-lan-play
homepage: https://github.com/spacemeowx2/switch-lan-play
repo: https://github.com/spacemeowx2/switch-lan-play
docs: https://github.com/spacemeowx2/switch-lan-play
package-manager:
  brew: switch-lan-play
package-manager-url: https://formulae.brew.sh/formula/switch-lan-play
version: 0.2.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Make you and your friends play games like in a LAN
source-archive: https://github.com/spacemeowx2/switch-lan-play.git
build-dependencies:
  - cmake
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: lan-play
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:switch-lan-play
  brew: brew install switch-lan-play
provenance:
  formula: switch-lan-play
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
