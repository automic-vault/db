id: brew:odo-dev
display-name: odo-dev
homepage: https://odo.dev
repo: https://github.com/redhat-developer/odo
docs: https://odo.dev
package-manager:
  brew: odo-dev
  nix: odo
  scoop: main/odo
package-manager-url: https://formulae.brew.sh/formula/odo-dev
version: 3.16.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Developer-focused CLI for Kubernetes and OpenShift
source-archive: https://github.com/redhat-developer/odo.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: odo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:odo-dev
  brew: brew install odo-dev
  nix: nix profile install nixpkgs#odo
  scoop: scoop install main/odo
provenance:
  formula: odo-dev
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
