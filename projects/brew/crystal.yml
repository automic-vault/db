id: brew:crystal
display-name: crystal
homepage: https://crystal-lang.org/
repo: https://github.com/crystal-lang/crystal
docs: https://crystal-lang.org/
package-manager:
  apk: crystal
  brew: crystal
  debian: crystal
  macports: crystal
  nix: shards
  pacman: crystal
  scoop: main/crystal
  ubuntu: crystal
  winget: CrystalLang.Crystal
package-manager-url: https://formulae.brew.sh/formula/crystal
version: 1.20.2
license: Apache-2.0
category: development
tags:
  - cli
description: Fast and statically typed, compiled language with Ruby-like syntax
source-archive: https://github.com/crystal-lang/crystal/archive/refs/tags/1.20.2.tar.gz
dependencies:
  - bdw-gc
  - gmp
  - libyaml
  - llvm
  - openssl@3
  - pcre2
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: crystal
  - exposure: global executable
    kind: cli
    name: shards
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add crystal
  av: sudo av install brew:crystal
  brew: brew install crystal
  debian: sudo apt install crystal
  macports: sudo port install crystal
  nix: nix profile install nixpkgs#shards
  pacman: sudo pacman -S crystal
  scoop: scoop install main/crystal
  ubuntu: sudo apt install crystal
  winget: winget install --id CrystalLang.Crystal -e
provenance:
  formula: crystal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
