  post-install-defined: false
install-lines:
  av: sudo av install brew:libtecla
  brew: brew install libtecla
  pacman: sudo pacman -S libtecla
provenance:
  formula: libtecla
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
