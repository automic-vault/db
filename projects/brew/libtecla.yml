id: brew:libtecla
display-name: libtecla
homepage: https://sites.astro.caltech.edu/~mcs/tecla/
repo: https://sites.astro.caltech.edu/~mcs/tecla/libtecla-1.6.3.tar.gz
docs: https://sites.astro.caltech.edu/~mcs/tecla/
package-manager:
