id: brew:speex
display-name: speex
homepage: https://speex.org/
repo: https://ftp.osuosl.org/pub/xiph/releases/speex/speex-1.2.1.tar.gz
docs: https://speex.org/
package-manager:
  apk: speex
  brew: speex
  debian: speex
  dnf: speex
  macports: speex
  nix: speex
  pacman: speex
  ubuntu: speex
  zypper: speex
package-manager-url: https://formulae.brew.sh/formula/speex
version: 1.2.1
license: BSD-3-Clause
category: media
tags:
  - cli
description: Audio codec designed for speech
source-archive: https://ftp.osuosl.org/pub/xiph/releases/speex/speex-1.2.1.tar.gz
dependencies:
  - libogg
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: speexdec
  - exposure: global executable
    kind: cli
    name: speexenc
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add speex
  av: sudo av install brew:speex
  brew: brew install speex
  debian: sudo apt install speex
  dnf: sudo dnf install speex
  macports: sudo port install speex
  nix: nix profile install nixpkgs#speex
  pacman: sudo pacman -S speex
  ubuntu: sudo apt install speex
  zypper: sudo zypper install speex
provenance:
  formula: speex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
