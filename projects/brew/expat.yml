id: brew:expat
display-name: expat
homepage: https://libexpat.github.io/
repo: https://github.com/libexpat/libexpat
docs: https://libexpat.github.io/
package-manager:
  apk: expat
  brew: expat
  debian: expat
  dnf: expat
  macports: expat
  nix: expat
  pacman: expat
  ubuntu: expat
  zypper: expat
package-manager-url: https://formulae.brew.sh/formula/expat
version: 2.8.1
license: MIT
category: development
tags:
  - cli
description: XML 1.0 parser
source-archive: https://github.com/libexpat/libexpat/releases/download/R_2_8_1/expat-2.8.1.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: xmlwf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add expat
  av: sudo av install brew:expat
  brew: brew install expat
  debian: sudo apt install expat
  dnf: sudo dnf install expat
  macports: sudo port install expat
  nix: nix profile install nixpkgs#expat
  pacman: sudo pacman -S expat
  ubuntu: sudo apt install expat
  zypper: sudo zypper install expat
provenance:
  formula: expat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
