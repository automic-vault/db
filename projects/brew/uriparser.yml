id: brew:uriparser
display-name: uriparser
homepage: https://uriparser.github.io/
repo: https://github.com/uriparser/uriparser
docs: https://uriparser.github.io/
package-manager:
  apk: uriparser
  brew: uriparser
  dnf: uriparser
  macports: uriparser
  nix: uriparser
  pacman: uriparser
  zypper: uriparser
package-manager-url: https://formulae.brew.sh/formula/uriparser
version: 1.0.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: URI parsing library (strictly RFC 3986 compliant)
source-archive: >
  https://github.com/uriparser/uriparser/releases/download/uriparser-1.0.2/uriparser-1.0.2.tar.bz2
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: uriparse
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add uriparser
  av: sudo av install brew:uriparser
  brew: brew install uriparser
  dnf: sudo dnf install uriparser
  macports: sudo port install uriparser
  nix: nix profile install nixpkgs#uriparser
  pacman: sudo pacman -S uriparser
  zypper: sudo zypper install uriparser
provenance:
  formula: uriparser
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
