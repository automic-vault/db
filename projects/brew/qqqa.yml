id: brew:qqqa
display-name: qqqa
homepage: https://github.com/iagooar/qqqa
repo: https://github.com/iagooar/qqqa
docs: https://github.com/iagooar/qqqa
package-manager:
  brew: qqqa
  macports: qq
  nix: qq
  scoop: extras/qq
  winget: Tencent.QQ
package-manager-url: https://formulae.brew.sh/formula/qqqa
version: 1.0.0
license: MIT
category: development
tags:
  - cli
description: 'Fast, stateless LLM for your shell: qq answers; qa runs commands'
source-archive: https://github.com/iagooar/qqqa/archive/refs/tags/v1.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: qa
  - exposure: global executable
    kind: cli
    name: qq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qqqa
  brew: brew install qqqa
  macports: sudo port install qq
  nix: nix profile install nixpkgs#qq
  scoop: scoop install extras/qq
  winget: winget install --id Tencent.QQ -e
provenance:
  formula: qqqa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
