id: brew:multimarkdown
display-name: multimarkdown
homepage: https://fletcher.github.io/MultiMarkdown-6/
repo: https://github.com/fletcher/MultiMarkdown-6
docs: https://fletcher.github.io/MultiMarkdown-6/
package-manager:
  brew: multimarkdown
  dnf: multimarkdown
  macports: multimarkdown
  nix: multimarkdown
package-manager-url: https://formulae.brew.sh/formula/multimarkdown
version: 6.7.0
license: MIT
category: development
tags:
  - cli
description: Turn marked-up plain text into well-formatted documents
source-archive: https://github.com/fletcher/MultiMarkdown-6/archive/refs/tags/6.7.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: mmd2all
  - exposure: global executable
    kind: cli
    name: mmd2epub
  - exposure: global executable
    kind: cli
    name: mmd2fodt
  - exposure: global executable
    kind: cli
    name: mmd2odt
  - exposure: global executable
    kind: cli
    name: mmd2opml
  - exposure: global executable
    kind: cli
    name: mmd2pdf
  - exposure: global executable
    kind: cli
    name: mmd2tex
  - exposure: global executable
    kind: cli
    name: multimarkdown
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:multimarkdown
  brew: brew install multimarkdown
  dnf: sudo dnf install multimarkdown
  macports: sudo port install multimarkdown
  nix: nix profile install nixpkgs#multimarkdown
provenance:
  formula: multimarkdown
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
