id: brew:sextractor
display-name: sextractor
homepage: https://www.astromatic.net/software/sextractor/
repo: https://github.com/astromatic/sextractor
docs: https://www.astromatic.net/software/sextractor/
package-manager:
  brew: sextractor
  dnf: sextractor
package-manager-url: https://formulae.brew.sh/formula/sextractor
version: 2.28.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Extract catalogs of sources from astronomical images
source-archive: https://github.com/astromatic/sextractor/archive/refs/tags/2.28.2.tar.gz
dependencies:
  - cfitsio
  - fftw
  - openblas
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: ldactoasc
  - exposure: global executable
    kind: cli
    name: sex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sextractor
  brew: brew install sextractor
  dnf: sudo dnf install sextractor
provenance:
  formula: sextractor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
