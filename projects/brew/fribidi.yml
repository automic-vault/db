id: brew:fribidi
display-name: fribidi
homepage: https://github.com/fribidi/fribidi
repo: https://github.com/fribidi/fribidi
docs: https://github.com/fribidi/fribidi
package-manager:
  apk: fribidi
  brew: fribidi
  dnf: fribidi
  macports: fribidi
  nix: fribidi
  pacman: fribidi
  zypper: fribidi
package-manager-url: https://formulae.brew.sh/formula/fribidi
version: 1.0.16
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: Implementation of the Unicode BiDi algorithm
source-archive: https://github.com/fribidi/fribidi/releases/download/v1.0.16/fribidi-1.0.16.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: fribidi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fribidi
  av: sudo av install brew:fribidi
  brew: brew install fribidi
  dnf: sudo dnf install fribidi
  macports: sudo port install fribidi
  nix: nix profile install nixpkgs#fribidi
  pacman: sudo pacman -S fribidi
  zypper: sudo zypper install fribidi
provenance:
  formula: fribidi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
