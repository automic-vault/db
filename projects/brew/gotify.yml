id: brew:gotify
display-name: gotify
homepage: https://github.com/gotify/cli
repo: https://github.com/gotify/cli
docs: https://github.com/gotify/cli
package-manager:
  apk: gotify
  brew: gotify
package-manager-url: https://formulae.brew.sh/formula/gotify
version: 2.3.2
license: MIT
category: development
tags:
  - cli
description: Command-line interface for pushing messages to gotify/server
source-archive: https://github.com/gotify/cli/archive/refs/tags/v2.3.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gotify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gotify
  av: sudo av install brew:gotify
  brew: brew install gotify
provenance:
  formula: gotify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
