id: brew:fastlane
display-name: fastlane
homepage: https://fastlane.tools
repo: https://github.com/fastlane/fastlane
docs: https://fastlane.tools
package-manager:
  brew: fastlane
  nix: fastlane
package-manager-url: https://formulae.brew.sh/formula/fastlane
version: 2.235.0
license: MIT
category: development
tags:
  - cli
description: Easiest way to build and release mobile apps
source-archive: https://github.com/fastlane/fastlane/archive/refs/tags/2.235.0.tar.gz
dependencies:
  - ruby
  - terminal-notifier
executables:
  - exposure: global executable
    kind: cli
    name: fastlane
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Fastlane will install additional gems to FASTLANE_GEM_HOME, which defaults to
    ${HOME}/.local/share/fastlane/4.0.0
  post-install-defined: false
install-lines:
  av: sudo av install brew:fastlane
  brew: brew install fastlane
  nix: nix profile install nixpkgs#fastlane
provenance:
  formula: fastlane
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
