id: brew:juicefs
display-name: juicefs
homepage: https://juicefs.com
repo: https://github.com/juicedata/juicefs
docs: https://juicefs.com
package-manager:
  brew: juicefs
  nix: juicefs
  scoop: main/juicefs
package-manager-url: https://formulae.brew.sh/formula/juicefs
version: 1.3.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Cloud-based, distributed POSIX file system built on top of Redis and S3
source-archive: https://github.com/juicedata/juicefs/archive/refs/tags/v1.3.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: juicefs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:juicefs
  brew: brew install juicefs
  nix: nix profile install nixpkgs#juicefs
  scoop: scoop install main/juicefs
provenance:
  formula: juicefs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
