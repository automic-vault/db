install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add radare2
  av: sudo av install brew:radare2
  brew: brew install radare2
  dnf: sudo dnf install radare2
  macports: sudo port install radare2
  nix: nix profile install nixpkgs#radare2
  pacman: sudo pacman -S radare2
  scoop: scoop install main/radare2
