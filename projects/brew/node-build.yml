id: brew:node-build
display-name: node-build
homepage: https://github.com/nodenv/node-build
repo: https://github.com/nodenv/node-build
docs: https://github.com/nodenv/node-build
package-manager:
  brew: node-build
package-manager-url: https://formulae.brew.sh/formula/node-build
version: 5.4.37
license: MIT
category: development
tags:
  - cli
description: Install NodeJS versions
source-archive: https://github.com/nodenv/node-build/archive/refs/tags/v5.4.37.tar.gz
dependencies:
  - autoconf
  - openssl@3
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: node-build
  - exposure: global executable
    kind: cli
    name: nodenv-install
  - exposure: global executable
    kind: cli
    name: nodenv-uninstall
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:node-build
  brew: brew install node-build
provenance:
  formula: node-build
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
