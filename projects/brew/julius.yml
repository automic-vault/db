id: brew:julius
display-name: julius
homepage: https://github.com/julius-speech/julius
repo: https://github.com/julius-speech/julius
docs: https://github.com/julius-speech/julius
package-manager:
  brew: julius
  debian: julius
  dnf: julius
  macports: julius
  nix: julius
  pacman: julius
  ubuntu: julius
  zypper: julius
package-manager-url: https://formulae.brew.sh/formula/julius
version: 4.6
license: BSD-3-Clause
category: development
tags:
  - cli
description: Two-pass large vocabulary continuous speech recognition engine
source-archive: https://github.com/julius-speech/julius/archive/refs/tags/v4.6.tar.gz
dependencies:
  - libsndfile
executables:
  - exposure: global executable
    kind: cli
    name: accept_check
  - exposure: global executable
    kind: cli
    name: adinrec
  - exposure: global executable
    kind: cli
    name: adintool
  - exposure: global executable
    kind: cli
    name: binlm2arpa
  - exposure: global executable
    kind: cli
    name: dfa_determinize
  - exposure: global executable
    kind: cli
    name: dfa_minimize
  - exposure: global executable
    kind: cli
    name: generate
  - exposure: global executable
    kind: cli
    name: generate-ngram
  - exposure: global executable
    kind: cli
    name: gram2sapixml.pl
  - exposure: global executable
    kind: cli
    name: jclient.pl
  - exposure: global executable
    kind: cli
    name: jcontrol
  - exposure: global executable
    kind: cli
    name: julius
  - exposure: global executable
    kind: cli
    name: libjulius-config
  - exposure: global executable
    kind: cli
    name: libsent-config
  - exposure: global executable
    kind: cli
    name: mkbingram
  - exposure: global executable
    kind: cli
    name: mkbinhmm
  - exposure: global executable
    kind: cli
    name: mkbinhmmlist
  - exposure: global executable
    kind: cli
    name: mkdfa.pl
  - exposure: global executable
    kind: cli
    name: mkdfa.py
  - exposure: global executable
    kind: cli
    name: mkfa
  - exposure: global executable
    kind: cli
    name: mkgshmm
  - exposure: global executable
    kind: cli
    name: mkss
  - exposure: global executable
    kind: cli
    name: nextword
  - exposure: global executable
    kind: cli
    name: yomi2voca.pl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:julius
  brew: brew install julius
  debian: sudo apt install julius
  dnf: sudo dnf install julius
  macports: sudo port install julius
  nix: nix profile install nixpkgs#julius
  pacman: sudo pacman -S julius
  ubuntu: sudo apt install julius
  zypper: sudo zypper install julius
provenance:
  formula: julius
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
