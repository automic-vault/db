id: brew:helix-db
display-name: helix-db
homepage: https://helix-db.com
repo: https://github.com/HelixDB/helix-db
docs: https://helix-db.com
package-manager:
  apk: helix
  brew: helix-db
  chocolatey: helix
  dnf: helix
  macports: helix
  nix: helix-db
  pacman: helix
  scoop: main/helix
  winget: Helix.Helix
  zypper: helix
package-manager-url: https://formulae.brew.sh/formula/helix-db
version: 3.0.2
license: AGPL-3.0-only
category: database
tags:
  - cli
  - database
description: Open-source graph-vector database built from scratch in Rust
source-archive: https://github.com/HelixDB/helix-db/archive/refs/tags/v3.0.2.tar.gz
dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: helix
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add helix
  av: sudo av install brew:helix-db
  brew: brew install helix-db
  chocolatey: choco install helix
  dnf: sudo dnf install helix
  macports: sudo port install helix
  nix: nix profile install nixpkgs#helix-db
  pacman: sudo pacman -S helix
  scoop: scoop install main/helix
  winget: winget install --id Helix.Helix -e
  zypper: sudo zypper install helix
provenance:
  formula: helix-db
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
