id: brew:lue-reader
display-name: lue-reader
homepage: https://github.com/superstarryeyes/lue
repo: >
  https://files.pythonhosted.org/packages/a0/02/492383eb53224831f2f5ccbbc3f7aca9ba051b89e7df03233d3c41856ec3/lue_reader-0.4.0.tar.gz
docs: https://github.com/superstarryeyes/lue
package-manager:
  brew: lue-reader
  nix: lue
package-manager-url: https://formulae.brew.sh/formula/lue-reader
version: 0.4.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Terminal eBook reader with text-to-speech and multi-format support
source-archive: >
  https://files.pythonhosted.org/packages/a0/02/492383eb53224831f2f5ccbbc3f7aca9ba051b89e7df03233d3c41856ec3/lue_reader-0.4.0.tar.gz
dependencies:
  - certifi
  - ffmpeg
  - pymupdf
  - python@3.14
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: lue
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lue-reader
  brew: brew install lue-reader
  nix: nix profile install nixpkgs#lue
provenance:
  formula: lue-reader
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
