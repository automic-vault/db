id: brew:osdctl
display-name: osdctl
homepage: https://github.com/openshift/osdctl
repo: https://github.com/openshift/osdctl
docs: https://github.com/openshift/osdctl
package-manager:
  brew: osdctl
package-manager-url: https://formulae.brew.sh/formula/osdctl
version: 0.59.2
license: Apache-2.0
category: development
tags:
  - cli
description: CLI tool for managed OpenShift clusters
source-archive: https://github.com/openshift/osdctl/archive/refs/tags/v0.59.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: osdctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:osdctl
  brew: brew install osdctl
provenance:
  formula: osdctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
