id: brew:ejabberd
display-name: ejabberd
homepage: https://www.ejabberd.im
repo: https://github.com/processone/ejabberd
docs: https://www.ejabberd.im
package-manager:
  apk: ejabberd
  brew: ejabberd
  debian: ejabberd
  macports: ejabberd
  nix: ejabberd
  pacman: ejabberd
  ubuntu: ejabberd
package-manager-url: https://formulae.brew.sh/formula/ejabberd
version: 26.04
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: XMPP application server
source-archive: https://github.com/processone/ejabberd/archive/refs/tags/26.04.tar.gz
dependencies:
  - elixir
  - erlang
  - gd
  - libyaml
  - openssl@3
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: ejabberdctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    If you face nodedown problems, concat your machine name to: /private/etc/hosts after
    'localhost'.
  post-install-defined: true
  service: declared
install-lines:
  apk: sudo apk add ejabberd
  av: sudo av install brew:ejabberd
  brew: brew install ejabberd
  debian: sudo apt install ejabberd
  macports: sudo port install ejabberd
  nix: nix profile install nixpkgs#ejabberd
  pacman: sudo pacman -S ejabberd
  ubuntu: sudo apt install ejabberd
provenance:
  formula: ejabberd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
