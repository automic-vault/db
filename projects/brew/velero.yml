id: brew:velero
display-name: velero
homepage: https://velero.io/
repo: https://github.com/vmware-tanzu/velero
docs: https://velero.io/
package-manager:
  brew: velero
  chocolatey: velero
  nix: velero
  pacman: velero
  scoop: main/velero
  zypper: velero
package-manager-url: https://formulae.brew.sh/formula/velero
version: 1.18.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Disaster recovery for Kubernetes resources and persistent volumes
source-archive: https://github.com/vmware-tanzu/velero/archive/refs/tags/v1.18.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: velero
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:velero
  brew: brew install velero
  chocolatey: choco install velero
  nix: nix profile install nixpkgs#velero
  pacman: sudo pacman -S velero
  scoop: scoop install main/velero
  zypper: sudo zypper install velero
provenance:
  formula: velero
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
