id: brew:urx
display-name: urx
homepage: https://github.com/hahwul/urx
repo: https://github.com/hahwul/urx
docs: https://github.com/hahwul/urx
package-manager:
  brew: urx
  nix: urx
package-manager-url: https://formulae.brew.sh/formula/urx
version: 0.9.0
license: MIT
category: security
tags:
  - cli
  - security
description: Extracts URLs from OSINT Archives for Security Insights
source-archive: https://github.com/hahwul/urx/archive/refs/tags/0.9.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: urx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:urx
  brew: brew install urx
  nix: nix profile install nixpkgs#urx
provenance:
  formula: urx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
