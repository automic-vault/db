id: brew:media-control
display-name: media-control
homepage: https://github.com/ungive/media-control
repo: https://github.com/ungive/media-control
docs: https://github.com/ungive/media-control
package-manager:
  brew: media-control
package-manager-url: https://formulae.brew.sh/formula/media-control
version: 0.7.6
license: BSD-3-Clause
category: development
tags:
  - cli
description: Control and observe media playback from the command-line
source-archive: https://github.com/ungive/media-control.git
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: media-control
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:media-control
  brew: brew install media-control
provenance:
  formula: media-control
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
