id: brew:xterm
display-name: xterm
homepage: https://invisible-island.net/xterm/
repo: https://invisible-mirror.net/archives/xterm/xterm-410.tgz
docs: https://invisible-island.net/xterm/
package-manager:
  apk: xterm
  brew: xterm
  debian: xterm
  dnf: xterm
  macports: xterm
  nix: xterm
  pacman: xterm
  ubuntu: xterm
  zypper: xterm
package-manager-url: https://formulae.brew.sh/formula/xterm
version: 410
license: X11 AND HPND
category: network
tags:
  - cli
description: Terminal emulator for the X Window System
source-archive: https://invisible-mirror.net/archives/xterm/xterm-410.tgz
dependencies:
  - fontconfig
  - freetype
  - libice
  - libx11
  - libxaw
  - libxext
  - libxft
  - libxinerama
  - libxmu
  - libxpm
  - libxt
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: koi8rxterm
  - exposure: global executable
    kind: cli
    name: resize
  - exposure: global executable
    kind: cli
    name: uxterm
  - exposure: global executable
    kind: cli
    name: xterm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xterm
  av: sudo av install brew:xterm
  brew: brew install xterm
  debian: sudo apt install xterm
  dnf: sudo dnf install xterm
  macports: sudo port install xterm
  nix: nix profile install nixpkgs#xterm
  pacman: sudo pacman -S xterm
  ubuntu: sudo apt install xterm
  zypper: sudo zypper install xterm
provenance:
  formula: xterm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
