id: brew:cc-connect
display-name: cc-connect
homepage: https://github.com/chenhg5/cc-connect
repo: https://github.com/chenhg5/cc-connect
docs: https://github.com/chenhg5/cc-connect
package-manager:
  brew: cc-connect
package-manager-url: https://formulae.brew.sh/formula/cc-connect
version: 1.3.2
license: MIT
category: development
tags:
  - cli
description: Bridges local AI coding agents to messaging platforms
source-archive: https://github.com/chenhg5/cc-connect/archive/refs/tags/v1.3.2.tar.gz
build-dependencies:
  - go
  - node
executables:
  - exposure: global executable
    kind: cli
    name: cc-connect
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:cc-connect
  brew: brew install cc-connect
provenance:
  formula: cc-connect
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
