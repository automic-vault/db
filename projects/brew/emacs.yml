id: brew:emacs
display-name: emacs
homepage: https://www.gnu.org/software/emacs/
repo: https://ftpmirror.gnu.org/gnu/emacs/emacs-30.2.tar.xz
docs: https://www.gnu.org/software/emacs/
package-manager:
  apk: emacs
  brew: emacs
  chocolatey: Emacs
  debian: emacs
  dnf: emacs
  macports: emacs
  nix: emacs
  pacman: emacs
  scoop: extras/emacs
  ubuntu: emacs
  winget: GNU.Emacs
  zypper: emacs
package-manager-url: https://formulae.brew.sh/formula/emacs
version: 30.2
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU Emacs text editor
source-archive: https://ftpmirror.gnu.org/gnu/emacs/emacs-30.2.tar.xz
dependencies:
  - gmp
  - gnutls
  - tree-sitter@0.25
build-dependencies:
  - pkgconf
  - texinfo
uses-from-macos:
  - libxml2
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ebrowse
  - exposure: global executable
    kind: cli
    name: emacs
  - exposure: global executable
    kind: cli
    name: emacs-30.2
  - exposure: global executable
    kind: cli
    name: emacsclient
  - exposure: global executable
    kind: cli
    name: etags
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add emacs
  av: sudo av install brew:emacs
  brew: brew install emacs
  chocolatey: choco install Emacs
  debian: sudo apt install emacs
  dnf: sudo dnf install emacs
  macports: sudo port install emacs
  nix: nix profile install nixpkgs#emacs
  pacman: sudo pacman -S emacs
  scoop: scoop install extras/emacs
  ubuntu: sudo apt install emacs
  winget: winget install --id GNU.Emacs -e
  zypper: sudo zypper install emacs
provenance:
  formula: emacs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
