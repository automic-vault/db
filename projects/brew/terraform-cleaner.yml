id: brew:terraform-cleaner
display-name: terraform-cleaner
homepage: https://github.com/sylwit/terraform-cleaner
repo: https://github.com/sylwit/terraform-cleaner
docs: https://github.com/sylwit/terraform-cleaner
package-manager:
  brew: terraform-cleaner
package-manager-url: https://formulae.brew.sh/formula/terraform-cleaner
version: 0.0.4
license: MIT
category: cloud
tags:
  - cli
description: Tiny utility which detects unused variables in your terraform modules
source-archive: https://github.com/sylwit/terraform-cleaner/archive/refs/tags/v0.0.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terraform-cleaner
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terraform-cleaner
  brew: brew install terraform-cleaner
provenance:
  formula: terraform-cleaner
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
