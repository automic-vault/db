id: brew:keychain
display-name: keychain
homepage: https://www.funtoo.org/Keychain
repo: https://github.com/danielrobbins/keychain
docs: https://www.funtoo.org/Keychain
package-manager:
  apk: keychain
  brew: keychain
  debian: keychain
  dnf: keychain
  macports: keychain
  nix: keychain
  pacman: keychain
  ubuntu: keychain
  zypper: keychain
package-manager-url: https://formulae.brew.sh/formula/keychain
version: 2.9.8
license: GPL-2.0-only
category: development
tags:
  - cli
description: User-friendly front-end to ssh-agent(1)
source-archive: https://github.com/danielrobbins/keychain/archive/refs/tags/2.9.8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: keychain
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add keychain
  av: sudo av install brew:keychain
  brew: brew install keychain
  debian: sudo apt install keychain
  dnf: sudo dnf install keychain
  macports: sudo port install keychain
  nix: nix profile install nixpkgs#keychain
  pacman: sudo pacman -S keychain
  ubuntu: sudo apt install keychain
  zypper: sudo zypper install keychain
provenance:
  formula: keychain
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
