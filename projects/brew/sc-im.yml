id: brew:sc-im
display-name: sc-im
homepage: https://github.com/andmarti1424/sc-im
repo: https://github.com/andmarti1424/sc-im
docs: https://github.com/andmarti1424/sc-im
package-manager:
  apk: sc-im
  brew: sc-im
  debian: sc-im
  dnf: sc-im
  macports: sc-im
  nix: sc-im
  ubuntu: sc-im
  zypper: sc-im
package-manager-url: https://formulae.brew.sh/formula/sc-im
version: 0.8.5
license: BSD-4-Clause
category: development
tags:
  - cli
description: Spreadsheet program for the terminal, using ncurses
source-archive: https://github.com/andmarti1424/sc-im/archive/refs/tags/v0.8.5.tar.gz
dependencies:
  - libxls
  - libxlsxwriter
  - libxml2
  - libzip
  - lua
  - ncurses
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: sc-im
  - exposure: global executable
    kind: cli
    name: scopen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sc-im
  av: sudo av install brew:sc-im
  brew: brew install sc-im
  debian: sudo apt install sc-im
  dnf: sudo dnf install sc-im
  macports: sudo port install sc-im
  nix: nix profile install nixpkgs#sc-im
  ubuntu: sudo apt install sc-im
  zypper: sudo zypper install sc-im
provenance:
  formula: sc-im
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
