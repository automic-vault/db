id: brew:grafanactl
display-name: grafanactl
homepage: https://grafana.github.io/grafanactl/
repo: https://github.com/grafana/grafanactl
docs: https://grafana.github.io/grafanactl/
package-manager:
  brew: grafanactl
  nix: grafanactl
package-manager-url: https://formulae.brew.sh/formula/grafanactl
version: 0.1.10
license: Apache-2.0
category: development
tags:
  - cli
description: CLI to interact with Grafana
source-archive: https://github.com/grafana/grafanactl/archive/refs/tags/v0.1.10.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: grafanactl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:grafanactl
  brew: brew install grafanactl
  nix: nix profile install nixpkgs#grafanactl
provenance:
  formula: grafanactl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
