id: brew:libprotoident
display-name: libprotoident
homepage: https://github.com/LibtraceTeam/libprotoident
repo: https://github.com/LibtraceTeam/libprotoident
docs: https://github.com/LibtraceTeam/libprotoident
package-manager:
  brew: libprotoident
  nix: libprotoident
package-manager-url: https://formulae.brew.sh/formula/libprotoident
version: 2.0.15-2
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Performs application layer protocol identification for flows
source-archive: https://github.com/LibtraceTeam/libprotoident/archive/refs/tags/2.0.15-2.tar.gz
dependencies:
  - libflowmanager
  - libtrace
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: lpi_arff
  - exposure: global executable
    kind: cli
    name: lpi_find_unknown
  - exposure: global executable
    kind: cli
    name: lpi_protoident
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libprotoident
  brew: brew install libprotoident
  nix: nix profile install nixpkgs#libprotoident
provenance:
  formula: libprotoident
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
