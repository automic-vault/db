id: brew:manifest-tool
display-name: manifest-tool
homepage: https://github.com/estesp/manifest-tool/
repo: https://github.com/estesp/manifest-tool
docs: https://github.com/estesp/manifest-tool/
package-manager:
  apk: manifest-tool
  brew: manifest-tool
  dnf: manifest-tool
  nix: manifest-tool
package-manager-url: https://formulae.brew.sh/formula/manifest-tool
version: 2.2.2
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool to create and query container image manifest list/indexes
source-archive: https://github.com/estesp/manifest-tool/archive/refs/tags/v2.2.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: manifest-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add manifest-tool
  av: sudo av install brew:manifest-tool
  brew: brew install manifest-tool
  dnf: sudo dnf install manifest-tool
  nix: nix profile install nixpkgs#manifest-tool
provenance:
  formula: manifest-tool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
