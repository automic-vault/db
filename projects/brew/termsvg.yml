id: brew:termsvg
display-name: termsvg
homepage: https://github.com/MrMarble/termsvg
repo: https://github.com/MrMarble/termsvg
docs: https://github.com/MrMarble/termsvg
package-manager:
  brew: termsvg
  nix: termsvg
package-manager-url: https://formulae.brew.sh/formula/termsvg
version: 0.10.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Record, share and export your terminal as a animated SVG image
source-archive: https://github.com/MrMarble/termsvg/archive/refs/tags/v0.10.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: termsvg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:termsvg
  brew: brew install termsvg
  nix: nix profile install nixpkgs#termsvg
provenance:
  formula: termsvg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
