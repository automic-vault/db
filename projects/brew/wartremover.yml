homepage: https://github.com/wartremover/wartremover
repo: https://github.com/wartremover/wartremover
docs: https://github.com/wartremover/wartremover
package-manager:
  brew: wartremover
package-manager-url: https://formulae.brew.sh/formula/wartremover
