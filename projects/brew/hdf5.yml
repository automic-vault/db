id: brew:hdf5
display-name: hdf5
homepage: https://www.hdfgroup.org/solutions/hdf5/
repo: https://github.com/HDFGroup/hdf5
docs: https://www.hdfgroup.org/solutions/hdf5/
package-manager:
  apk: hdf5
  brew: hdf5
  dnf: hdf5
  macports: hdf5
  nix: hdf5
  pacman: hdf5
  zypper: hdf5
package-manager-url: https://formulae.brew.sh/formula/hdf5
version: 2.1.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: File format designed to store large amounts of data
source-archive: https://github.com/HDFGroup/hdf5/releases/download/2.1.1/hdf5-2.1.1.tar.gz
dependencies:
  - gcc
  - libaec
  - pkgconf
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: h5c++
  - exposure: global executable
    kind: cli
    name: h5cc
  - exposure: global executable
    kind: cli
    name: h5clear
  - exposure: global executable
    kind: cli
    name: h5copy
  - exposure: global executable
    kind: cli
    name: h5debug
  - exposure: global executable
    kind: cli
    name: h5delete
  - exposure: global executable
    kind: cli
    name: h5diff
  - exposure: global executable
    kind: cli
    name: h5dump
  - exposure: global executable
    kind: cli
    name: h5fc
  - exposure: global executable
    kind: cli
    name: h5format_convert
  - exposure: global executable
    kind: cli
    name: h5import
  - exposure: global executable
    kind: cli
    name: h5jam
  - exposure: global executable
    kind: cli
    name: h5ls
  - exposure: global executable
    kind: cli
    name: h5mkgrp
  - exposure: global executable
    kind: cli
    name: h5perf_serial
  - exposure: global executable
    kind: cli
    name: h5repack
  - exposure: global executable
    kind: cli
    name: h5repart
  - exposure: global executable
    kind: cli
    name: h5stat
  - exposure: global executable
    kind: cli
    name: h5unjam
  - exposure: global executable
    kind: cli
    name: h5watch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hdf5
  av: sudo av install brew:hdf5
  brew: brew install hdf5
  dnf: sudo dnf install hdf5
  macports: sudo port install hdf5
  nix: nix profile install nixpkgs#hdf5
  pacman: sudo pacman -S hdf5
  zypper: sudo zypper install hdf5
provenance:
  formula: hdf5
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
