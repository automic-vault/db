id: brew:prism-cli
display-name: prism-cli
homepage: https://stoplight.io/open-source/prism
repo: https://registry.npmjs.org/@stoplight/prism-cli/-/prism-cli-5.15.10.tgz
docs: https://stoplight.io/open-source/prism
package-manager:
  brew: prism-cli
  nix: prism
  winget: Stoplight.Prism
package-manager-url: https://formulae.brew.sh/formula/prism-cli
version: 5.15.10
license: Apache-2.0
category: network
tags:
  - cli
description: Set of packages for API mocking and contract testing
source-archive: https://registry.npmjs.org/@stoplight/prism-cli/-/prism-cli-5.15.10.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: prism
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:prism-cli
  brew: brew install prism-cli
  nix: nix profile install nixpkgs#prism
  winget: winget install --id Stoplight.Prism -e
provenance:
  formula: prism-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
