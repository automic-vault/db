id: brew:percona-xtrabackup
display-name: percona-xtrabackup
homepage: https://www.percona.com/software/mysql-database/percona-xtrabackup
repo: >
  https://downloads.percona.com/downloads/Percona-XtraBackup-8.4/Percona-XtraBackup-8.4.0-5/source/tarball/percona-xtrabackup-8.4.0-5.tar.gz
docs: https://www.percona.com/software/mysql-database/percona-xtrabackup
package-manager:
  brew: percona-xtrabackup
  pacman: xtrabackup
  ubuntu: percona-xtrabackup
package-manager-url: https://formulae.brew.sh/formula/percona-xtrabackup
version: 8.4.0-5
license: GPL-2.0-only
category: database
tags:
  - cli
description: Open source hot backup tool for InnoDB and XtraDB databases
source-archive: >
  https://downloads.percona.com/downloads/Percona-XtraBackup-8.4/Percona-XtraBackup-8.4.0-5/source/tarball/percona-xtrabackup-8.4.0-5.tar.gz
dependencies:
  - icu4c@78
  - libev
  - libgcrypt
  - lz4
  - openssl@3
  - protobuf
  - zlib-ng-compat
  - zstd
build-dependencies:
  - bison
  - cmake
  - pkgconf
  - sphinx-doc
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: xbcloud
  - exposure: global executable
    kind: cli
    name: xbcloud_osenv
  - exposure: global executable
    kind: cli
    name: xbcrypt
  - exposure: global executable
    kind: cli
    name: xbstream
  - exposure: global executable
    kind: cli
    name: xtrabackup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:percona-xtrabackup
  brew: brew install percona-xtrabackup
  pacman: sudo pacman -S xtrabackup
  ubuntu: sudo apt install percona-xtrabackup
provenance:
  formula: percona-xtrabackup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
