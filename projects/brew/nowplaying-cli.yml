id: brew:nowplaying-cli
display-name: nowplaying-cli
homepage: https://github.com/kirtan-shah/nowplaying-cli
repo: https://github.com/kirtan-shah/nowplaying-cli
docs: https://github.com/kirtan-shah/nowplaying-cli
package-manager:
  brew: nowplaying-cli
  nix: nowplaying-cli
package-manager-url: https://formulae.brew.sh/formula/nowplaying-cli
version: 2.1.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Retrieves currently playing media, and simulates media actions
source-archive: https://github.com/kirtan-shah/nowplaying-cli/archive/refs/tags/v2.1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: nowplaying-cli
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nowplaying-cli
  brew: brew install nowplaying-cli
  nix: nix profile install nixpkgs#nowplaying-cli
provenance:
  formula: nowplaying-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
