id: brew:libfyaml
display-name: libfyaml
homepage: https://github.com/pantoniou/libfyaml
repo: https://github.com/pantoniou/libfyaml
docs: https://github.com/pantoniou/libfyaml
package-manager:
  apk: libfyaml
  brew: libfyaml
  dnf: libfyaml
  macports: libfyaml
  nix: libfyaml
  pacman: libfyaml
package-manager-url: https://formulae.brew.sh/formula/libfyaml
version: 0.9.6
license: MIT
category: development
tags:
  - cli
  - yaml
description: Fully feature complete YAML parser and emitter
source-archive: https://github.com/pantoniou/libfyaml/releases/download/v0.9.6/libfyaml-0.9.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: fy-compose
  - exposure: global executable
    kind: cli
    name: fy-dump
  - exposure: global executable
    kind: cli
    name: fy-filter
  - exposure: global executable
    kind: cli
    name: fy-join
  - exposure: global executable
    kind: cli
    name: fy-testsuite
  - exposure: global executable
    kind: cli
    name: fy-tool
  - exposure: global executable
    kind: cli
    name: fy-ypath
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libfyaml
  av: sudo av install brew:libfyaml
  brew: brew install libfyaml
  dnf: sudo dnf install libfyaml
  macports: sudo port install libfyaml
  nix: nix profile install nixpkgs#libfyaml
  pacman: sudo pacman -S libfyaml
provenance:
  formula: libfyaml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
