id: brew:h3
display-name: h3
homepage: https://uber.github.io/h3/
repo: https://github.com/uber/h3
docs: https://uber.github.io/h3/
package-manager:
  brew: h3
  dnf: h3
  macports: h3
  nix: h3
package-manager-url: https://formulae.brew.sh/formula/h3
version: 4.5.0
license: Apache-2.0
category: development
tags:
  - cli
description: Hexagonal hierarchical geospatial indexing system
source-archive: https://github.com/uber/h3/archive/refs/tags/v4.5.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: cellToBoundary
  - exposure: global executable
    kind: cli
    name: cellToBoundaryHier
  - exposure: global executable
    kind: cli
    name: cellToLatLng
  - exposure: global executable
    kind: cli
    name: cellToLatLngHier
  - exposure: global executable
    kind: cli
    name: cellToLocalIj
  - exposure: global executable
    kind: cli
    name: gridDisk
  - exposure: global executable
    kind: cli
    name: gridDiskUnsafe
  - exposure: global executable
    kind: cli
    name: h3
  - exposure: global executable
    kind: cli
    name: h3ToComponents
  - exposure: global executable
    kind: cli
    name: h3ToHier
  - exposure: global executable
    kind: cli
    name: latLngToCell
  - exposure: global executable
    kind: cli
    name: localIjToCell
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:h3
  brew: brew install h3
  dnf: sudo dnf install h3
  macports: sudo port install h3
  nix: nix profile install nixpkgs#h3
provenance:
  formula: h3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
