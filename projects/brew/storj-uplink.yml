id: brew:storj-uplink
display-name: storj-uplink
homepage: https://storj.io
repo: https://github.com/storj/storj
docs: https://storj.io
package-manager:
  brew: storj-uplink
  nix: storj-uplink
  winget: Storj.Uplink
package-manager-url: https://formulae.brew.sh/formula/storj-uplink
version: 1.154.4
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Uplink CLI for the Storj network
source-archive: https://github.com/storj/storj/archive/refs/tags/v1.154.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: uplink
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:storj-uplink
  brew: brew install storj-uplink
  nix: nix profile install nixpkgs#storj-uplink
  winget: winget install --id Storj.Uplink -e
provenance:
  formula: storj-uplink
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
