id: brew:kommit
display-name: kommit
homepage: https://github.com/vigo/kommit
repo: https://github.com/vigo/kommit
docs: https://github.com/vigo/kommit
package-manager:
  apk: kommit
  brew: kommit
  dnf: kommit
  pacman: kommit
  zypper: kommit
package-manager-url: https://formulae.brew.sh/formula/kommit
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: More detailed commit messages without committing!
source-archive: https://github.com/vigo/kommit/archive/refs/tags/v1.1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: git-kommit
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kommit
  av: sudo av install brew:kommit
  brew: brew install kommit
  dnf: sudo dnf install kommit
  pacman: sudo pacman -S kommit
  zypper: sudo zypper install kommit
provenance:
  formula: kommit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
