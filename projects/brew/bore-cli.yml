id: brew:bore-cli
display-name: bore-cli
homepage: https://github.com/ekzhang/bore
repo: https://github.com/ekzhang/bore
docs: https://github.com/ekzhang/bore
package-manager:
  apk: bore
  brew: bore-cli
  macports: bore-cli
  nix: bore-cli
  pacman: bore
package-manager-url: https://formulae.brew.sh/formula/bore-cli
version: 0.6.0
license: MIT
category: development
tags:
  - cli
description: Modern, simple TCP tunnel in Rust that exposes local ports to a remote server
source-archive: https://github.com/ekzhang/bore/archive/refs/tags/v0.6.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bore
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bore
  av: sudo av install brew:bore-cli
  brew: brew install bore-cli
  macports: sudo port install bore-cli
  nix: nix profile install nixpkgs#bore-cli
  pacman: sudo pacman -S bore
provenance:
  formula: bore-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
