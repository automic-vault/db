id: brew:cadence-workflow
display-name: cadence-workflow
homepage: https://cadenceworkflow.io/
repo: https://github.com/uber/cadence
docs: https://cadenceworkflow.io/
package-manager:
  brew: cadence-workflow
package-manager-url: https://formulae.brew.sh/formula/cadence-workflow
version: 1.4.0
license: Apache-2.0
category: development
tags:
  - cli
description: Distributed, scalable, durable, and highly available orchestration engine
source-archive: https://github.com/uber/cadence.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cadence-canary
  - exposure: global executable
    kind: cli
    name: cadence-cassandra-tool
  - exposure: global executable
    kind: cli
    name: cadence-server
  - exposure: global executable
    kind: cli
    name: cadence-sql-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cadence-workflow
  brew: brew install cadence-workflow
provenance:
  formula: cadence-workflow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
