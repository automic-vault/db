id: brew:psc-package
display-name: psc-package
homepage: https://psc-package.readthedocs.io
repo: https://github.com/purescript/psc-package
docs: https://psc-package.readthedocs.io
package-manager:
  brew: psc-package
  nix: psc-package
package-manager-url: https://formulae.brew.sh/formula/psc-package
version: 0.6.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Package manager for PureScript based on package sets
source-archive: https://github.com/purescript/psc-package/archive/refs/tags/v0.6.2.tar.gz
dependencies:
  - gmp
  - purescript
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: psc-package
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:psc-package
  brew: brew install psc-package
  nix: nix profile install nixpkgs#psc-package
provenance:
  formula: psc-package
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
