id: brew:mdt
display-name: mdt
homepage: https://github.com/basilioss/mdt
repo: https://github.com/basilioss/mdt
docs: https://github.com/basilioss/mdt
package-manager:
  brew: mdt
  chocolatey: MDT
  winget: Microsoft.DeploymentToolkit
package-manager-url: https://formulae.brew.sh/formula/mdt
version: 1.4.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Command-line markdown todo list manager
source-archive: https://github.com/basilioss/mdt/archive/refs/tags/1.4.0.tar.gz
dependencies:
  - gum
executables:
  - exposure: global executable
    kind: cli
    name: mdt
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mdt
  brew: brew install mdt
  chocolatey: choco install MDT
  winget: winget install --id Microsoft.DeploymentToolkit -e
provenance:
  formula: mdt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
