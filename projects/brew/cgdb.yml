id: brew:cgdb
display-name: cgdb
homepage: https://cgdb.github.io/
repo: https://cgdb.me/files/cgdb-0.8.0.tar.gz
docs: https://cgdb.github.io/
package-manager:
  apk: cgdb
  brew: cgdb
  debian: cgdb
  dnf: cgdb
  macports: cgdb
  nix: cgdb
  pacman: cgdb
  ubuntu: cgdb
  zypper: cgdb
package-manager-url: https://formulae.brew.sh/formula/cgdb
version: 0.8.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Curses-based interface to the GNU Debugger
source-archive: https://cgdb.me/files/cgdb-0.8.0.tar.gz
dependencies:
  - readline
build-dependencies:
  - help2man
  - texinfo
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cgdb
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cgdb
  av: sudo av install brew:cgdb
  brew: brew install cgdb
  debian: sudo apt install cgdb
  dnf: sudo dnf install cgdb
  macports: sudo port install cgdb
  nix: nix profile install nixpkgs#cgdb
  pacman: sudo pacman -S cgdb
  ubuntu: sudo apt install cgdb
  zypper: sudo zypper install cgdb
provenance:
  formula: cgdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
