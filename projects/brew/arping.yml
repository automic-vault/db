id: brew:arping
display-name: arping
homepage: https://github.com/ThomasHabets/arping
repo: https://github.com/ThomasHabets/arping
docs: https://github.com/ThomasHabets/arping
package-manager:
  apk: arping
  brew: arping
  debian: arping
  macports: arping
  nix: arping
  ubuntu: arping
package-manager-url: https://formulae.brew.sh/formula/arping
version: 2.28
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Utility to check whether MAC addresses are already taken on a LAN
source-archive: https://github.com/ThomasHabets/arping/archive/refs/tags/arping-2.28.tar.gz
dependencies:
  - libnet
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: arping
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add arping
  av: sudo av install brew:arping
  brew: brew install arping
  debian: sudo apt install arping
  macports: sudo port install arping
  nix: nix profile install nixpkgs#arping
  ubuntu: sudo apt install arping
provenance:
  formula: arping
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
