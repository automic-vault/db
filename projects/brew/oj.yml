id: brew:oj
display-name: oj
homepage: https://github.com/ohler55/ojg
repo: https://github.com/ohler55/ojg
docs: https://github.com/ohler55/ojg
package-manager:
  brew: oj
package-manager-url: https://formulae.brew.sh/formula/oj
version: 1.28.1
license: MIT
category: development
tags:
  - cli
  - json
description: JSON parser and visualization tool
source-archive: https://github.com/ohler55/ojg/archive/refs/tags/v1.28.1.tar.gz
build-dependencies:
