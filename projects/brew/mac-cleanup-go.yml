id: brew:mac-cleanup-go
display-name: mac-cleanup-go
homepage: https://github.com/2ykwang/mac-cleanup-go
repo: https://github.com/2ykwang/mac-cleanup-go
docs: https://github.com/2ykwang/mac-cleanup-go
package-manager:
  brew: mac-cleanup-go
package-manager-url: https://formulae.brew.sh/formula/mac-cleanup-go
version: 1.5.0
license: MIT
category: development
tags:
  - cli
description: TUI macOS cleaner that scans caches/logs and lets you select what to delete
source-archive: https://github.com/2ykwang/mac-cleanup-go/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mac-cleanup
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mac-cleanup-go
  brew: brew install mac-cleanup-go
provenance:
  formula: mac-cleanup-go
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
