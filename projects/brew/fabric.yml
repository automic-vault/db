id: brew:fabric
display-name: fabric
homepage: https://www.fabfile.org/
repo: >
  https://files.pythonhosted.org/packages/e3/7e/29cd6237c3b7ce79c3ca945eb99ab5affd101db54b2f7a78dde0cfa19fd4/fabric-3.2.3.tar.gz
docs: https://www.fabfile.org/
package-manager:
  apk: fabric
  brew: fabric
  debian: fabric
  macports: fabric
  nix: Fabric
  pacman: fabric
  ubuntu: fabric
  winget: FabricMC.FabricInstaller
package-manager-url: https://formulae.brew.sh/formula/fabric
version: 3.2.3
license: BSD-2-Clause
category: network
tags:
  - cli
description: Library and command-line tool for SSH
source-archive: >
  https://files.pythonhosted.org/packages/e3/7e/29cd6237c3b7ce79c3ca945eb99ab5affd101db54b2f7a78dde0cfa19fd4/fabric-3.2.3.tar.gz
dependencies:
  - cryptography
  - libsodium
  - python@3.14
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fab
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fabric
  av: sudo av install brew:fabric
  brew: brew install fabric
  debian: sudo apt install fabric
  macports: sudo port install fabric
  nix: nix profile install nixpkgs#Fabric
  pacman: sudo pacman -S fabric
  ubuntu: sudo apt install fabric
  winget: winget install --id FabricMC.FabricInstaller -e
provenance:
  formula: fabric
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
