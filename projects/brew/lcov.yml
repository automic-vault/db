id: brew:lcov
display-name: lcov
homepage: https://github.com/linux-test-project/lcov
repo: https://github.com/linux-test-project/lcov
docs: https://github.com/linux-test-project/lcov
package-manager:
  apk: lcov
  brew: lcov
  chocolatey: lcov
  debian: lcov
  dnf: lcov
  macports: lcov
  nix: lcov
  pacman: lcov
  ubuntu: lcov
  zypper: lcov
package-manager-url: https://formulae.brew.sh/formula/lcov
version: 2.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Graphical front-end for GCC's coverage testing tool (gcov)
source-archive: https://github.com/linux-test-project/lcov/releases/download/v2.4/lcov-2.4.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: gendesc
  - exposure: global executable
    kind: cli
    name: genhtml
  - exposure: global executable
    kind: cli
    name: geninfo
  - exposure: global executable
    kind: cli
    name: genpng
  - exposure: global executable
    kind: cli
    name: lcov
  - exposure: global executable
    kind: cli
    name: llvm2lcov
  - exposure: global executable
    kind: cli
    name: perl2lcov
  - exposure: global executable
    kind: cli
    name: py2lcov
  - exposure: global executable
    kind: cli
    name: xml2lcov
  - exposure: global executable
    kind: cli
    name: xml2lcovutil.py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lcov
  av: sudo av install brew:lcov
  brew: brew install lcov
  chocolatey: choco install lcov
  debian: sudo apt install lcov
  dnf: sudo dnf install lcov
  macports: sudo port install lcov
  nix: nix profile install nixpkgs#lcov
  pacman: sudo pacman -S lcov
  ubuntu: sudo apt install lcov
  zypper: sudo zypper install lcov
provenance:
  formula: lcov
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
