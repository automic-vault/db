id: brew:nfpm
display-name: nfpm
homepage: https://nfpm.goreleaser.com/
repo: https://github.com/goreleaser/nfpm
docs: https://nfpm.goreleaser.com/
package-manager:
  apk: nfpm
  brew: nfpm
  macports: nfpm
  nix: nfpm
  scoop: main/nfpm
  winget: goreleaser.nfpm
  zypper: nfpm
package-manager-url: https://formulae.brew.sh/formula/nfpm
version: 2.46.3
license: MIT
category: development
tags:
  - cli
description: Simple deb and rpm packager
source-archive: https://github.com/goreleaser/nfpm/archive/refs/tags/v2.46.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nfpm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nfpm
  av: sudo av install brew:nfpm
  brew: brew install nfpm
  macports: sudo port install nfpm
  nix: nix profile install nixpkgs#nfpm
  scoop: scoop install main/nfpm
  winget: winget install --id goreleaser.nfpm -e
  zypper: sudo zypper install nfpm
provenance:
  formula: nfpm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
