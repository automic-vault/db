id: brew:volk
display-name: volk
homepage: https://www.libvolk.org/
repo: https://github.com/gnuradio/volk
docs: https://www.libvolk.org/
package-manager:
  apk: volk
  brew: volk
  dnf: volk
  macports: volk
  nix: volk
  pacman: volk
  zypper: volk
package-manager-url: https://formulae.brew.sh/formula/volk
version: 3.3.0
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Vector Optimized Library of Kernels
source-archive: https://github.com/gnuradio/volk/releases/download/v3.3.0/volk-3.3.0.tar.gz
dependencies:
  - cpu_features
  - fmt
  - orc
  - python@3.14
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: volk-config-info
  - exposure: global executable
    kind: cli
    name: volk_modtool
  - exposure: global executable
    kind: cli
    name: volk_profile
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add volk
  av: sudo av install brew:volk
  brew: brew install volk
  dnf: sudo dnf install volk
  macports: sudo port install volk
  nix: nix profile install nixpkgs#volk
  pacman: sudo pacman -S volk
  zypper: sudo zypper install volk
provenance:
  formula: volk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
