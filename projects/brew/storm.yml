id: brew:storm
display-name: storm
homepage: https://storm.apache.org
repo: >
  https://www.apache.org/dyn/closer.lua?path=storm/apache-storm-2.8.8/apache-storm-2.8.8.tar.gz
docs: https://storm.apache.org
package-manager:
  brew: storm
  nix: storm
package-manager-url: https://formulae.brew.sh/formula/storm
version: 2.8.8
license: Apache-2.0
category: network
tags:
  - cli
description: Distributed realtime computation system to process data streams
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=storm/apache-storm-2.8.8/apache-storm-2.8.8.tar.gz
dependencies:
  - openjdk
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: storm
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:storm
  brew: brew install storm
  nix: nix profile install nixpkgs#storm
provenance:
  formula: storm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
