id: brew:vips
display-name: vips
homepage: https://github.com/libvips/libvips
repo: https://github.com/libvips/libvips
docs: https://github.com/libvips/libvips
package-manager:
  apk: vips
  brew: vips
  dnf: vips
  macports: vips
  nix: vips
package-manager-url: https://formulae.brew.sh/formula/vips
version: 8.18.2
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Image processing library
source-archive: https://github.com/libvips/libvips/releases/download/v8.18.2/vips-8.18.2.tar.xz
dependencies:
  - cairo
  - cfitsio
  - cgif
  - fftw
  - fontconfig
  - gettext
  - glib
  - highway
  - imagemagick
  - jpeg-xl
  - libarchive
  - libexif
  - libheif
  - libimagequant
  - libmatio
  - libpng
  - libraw
  - librsvg
  - libtiff
  - libultrahdr
  - little-cms2
  - mozjpeg
  - openexr
  - openjpeg
  - openslide
  - pango
  - poppler
  - webp
build-dependencies:
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: vips
  - exposure: global executable
    kind: cli
    name: vipsedit
  - exposure: global executable
    kind: cli
    name: vipsheader
  - exposure: global executable
    kind: cli
    name: vipsthumbnail
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vips
  av: sudo av install brew:vips
  brew: brew install vips
  dnf: sudo dnf install vips
  macports: sudo port install vips
  nix: nix profile install nixpkgs#vips
provenance:
  formula: vips
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
