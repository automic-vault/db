id: brew:ngs
display-name: ngs
homepage: https://ngs-lang.org/
repo: https://github.com/ngs-lang/ngs
docs: https://ngs-lang.org/
package-manager:
  apk: ngs
  brew: ngs
  macports: ngs
package-manager-url: https://formulae.brew.sh/formula/ngs
version: 0.2.17
license: GPL-3.0-only
category: development
tags:
  - cli
description: Powerful programming language and shell designed specifically for Ops
source-archive: https://github.com/ngs-lang/ngs/archive/refs/tags/v0.2.17.tar.gz
dependencies:
  - bdw-gc
  - gnu-sed
  - json-c
  - pcre
  - peg
build-dependencies:
  - cmake
  - pandoc
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: ngs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ngs
  av: sudo av install brew:ngs
  brew: brew install ngs
  macports: sudo port install ngs
provenance:
  formula: ngs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
