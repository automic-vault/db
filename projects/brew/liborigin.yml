id: brew:liborigin
display-name: liborigin
homepage: https://sourceforge.net/projects/liborigin/
repo: https://downloads.sourceforge.net/project/liborigin/liborigin/3.0/liborigin-3.0.3.tar.gz
docs: https://sourceforge.net/projects/liborigin/
package-manager:
  brew: liborigin
  dnf: liborigin
  pacman: liborigin
package-manager-url: https://formulae.brew.sh/formula/liborigin
version: 3.0.3
license: GPL-2.0-or-later AND GPL-3.0-or-later
category: network
tags:
  - cli
description: Library for reading OriginLab OPJ project files
source-archive: https://downloads.sourceforge.net/project/liborigin/liborigin/3.0/liborigin-3.0.3.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: opj2dat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:liborigin
  brew: brew install liborigin
  dnf: sudo dnf install liborigin
  pacman: sudo pacman -S liborigin
provenance:
  formula: liborigin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
