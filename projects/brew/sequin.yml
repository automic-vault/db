id: brew:sequin
display-name: sequin
homepage: https://github.com/charmbracelet/sequin
repo: https://github.com/charmbracelet/sequin
docs: https://github.com/charmbracelet/sequin
package-manager:
  brew: sequin
  nix: sequin
  winget: charmbracelet.sequin
package-manager-url: https://formulae.brew.sh/formula/sequin
version: 0.3.1
license: MIT
category: development
tags:
  - cli
description: Human-readable ANSI sequences
source-archive: https://github.com/charmbracelet/sequin/archive/refs/tags/v0.3.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sequin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sequin
  brew: brew install sequin
  nix: nix profile install nixpkgs#sequin
  winget: winget install --id charmbracelet.sequin -e
provenance:
  formula: sequin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
