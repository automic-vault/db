id: brew:lychee
display-name: lychee
homepage: https://lychee.cli.rs/
repo: https://github.com/lycheeverse/lychee
docs: https://lychee.cli.rs/
package-manager:
  apk: lychee
  brew: lychee
  macports: lychee
  nix: lychee
  pacman: lychee
  scoop: main/lychee
  winget: lycheeverse.lychee
  zypper: lychee
package-manager-url: https://formulae.brew.sh/formula/lychee
version: 0.24.2
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Fast, async, resource-friendly link checker
source-archive: https://github.com/lycheeverse/lychee/archive/refs/tags/lychee-v0.24.2.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: lychee
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lychee
  av: sudo av install brew:lychee
  brew: brew install lychee
  macports: sudo port install lychee
  nix: nix profile install nixpkgs#lychee
  pacman: sudo pacman -S lychee
  scoop: scoop install main/lychee
  winget: winget install --id lycheeverse.lychee -e
  zypper: sudo zypper install lychee
provenance:
  formula: lychee
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
