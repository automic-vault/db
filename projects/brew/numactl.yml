id: brew:numactl
display-name: numactl
homepage: https://github.com/numactl/numactl
repo: https://github.com/numactl/numactl
docs: https://github.com/numactl/numactl
package-manager:
  apk: numactl
  brew: numactl
  debian: numactl
  dnf: numactl
  nix: numactl
  pacman: numactl
  ubuntu: numactl
  zypper: numactl
package-manager-url: https://formulae.brew.sh/formula/numactl
version: 2.0.19
license: >
  GPL-2.0-only AND LGPL-2.1-only AND LicenseRef-Homebrew-public-domain AND
  LicenseRef-Homebrew-cannot-represent
category: development
tags:
  - cli
description: NUMA support for Linux
source-archive: https://github.com/numactl/numactl/releases/download/v2.0.19/numactl-2.0.19.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: memhog
  - exposure: global executable
    kind: cli
    name: migratepages
  - exposure: global executable
    kind: cli
    name: migspeed
  - exposure: global executable
    kind: cli
    name: numactl
  - exposure: global executable
    kind: cli
    name: numademo
  - exposure: global executable
    kind: cli
    name: numastat
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add numactl
  av: sudo av install brew:numactl
  brew: brew install numactl
  debian: sudo apt install numactl
  dnf: sudo dnf install numactl
  nix: nix profile install nixpkgs#numactl
  pacman: sudo pacman -S numactl
  ubuntu: sudo apt install numactl
  zypper: sudo zypper install numactl
provenance:
  formula: numactl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
