id: brew:chamber
display-name: chamber
homepage: https://github.com/segmentio/chamber
repo: https://github.com/segmentio/chamber
docs: https://github.com/segmentio/chamber
package-manager:
  brew: chamber
  nix: chamber
package-manager-url: https://formulae.brew.sh/formula/chamber
version: 3.1.5
license: MIT
category: cloud
tags:
  - aws
  - cli
description: CLI for managing secrets through AWS SSM Parameter Store
source-archive: https://github.com/segmentio/chamber/archive/refs/tags/v3.1.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: chamber
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chamber
  brew: brew install chamber
  nix: nix profile install nixpkgs#chamber
provenance:
  formula: chamber
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
