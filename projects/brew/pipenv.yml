id: brew:pipenv
display-name: pipenv
homepage: https://github.com/pypa/pipenv
repo: >
  https://files.pythonhosted.org/packages/a7/ec/7f4b692962c2ac364b95adda43b3de753f4f4b7984bc21e8ca70c1d591a8/pipenv-2026.6.1.tar.gz
docs: https://github.com/pypa/pipenv
package-manager:
  brew: pipenv
  debian: pipenv
  macports: pipenv
  nix: pipenv
  ubuntu: pipenv
package-manager-url: https://formulae.brew.sh/formula/pipenv
version: 2026.6.1
license: MIT
category: development
tags:
  - cli
description: Python dependency management tool
source-archive: >
  https://files.pythonhosted.org/packages/a7/ec/7f4b692962c2ac364b95adda43b3de753f4f4b7984bc21e8ca70c1d591a8/pipenv-2026.6.1.tar.gz
dependencies:
  - certifi
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: pipenv
  - exposure: global executable
    kind: cli
    name: pipenv-resolver
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pipenv
  brew: brew install pipenv
  debian: sudo apt install pipenv
  macports: sudo port install pipenv
  nix: nix profile install nixpkgs#pipenv
  ubuntu: sudo apt install pipenv
provenance:
  formula: pipenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
