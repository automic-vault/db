id: brew:xray
display-name: xray
homepage: https://xtls.github.io/
repo: https://github.com/XTLS/Xray-core
docs: https://xtls.github.io/
package-manager:
  apk: xray
  brew: xray
  macports: xray
  nix: xray
  scoop: main/xray
  winget: XTLS.Xray-core
package-manager-url: https://formulae.brew.sh/formula/xray
version: 26.3.27
license: MPL-2.0 AND CC-BY-SA-4.0
category: security
tags:
  - cli
description: Platform for building proxies to bypass network restrictions
source-archive: https://github.com/XTLS/Xray-core/archive/refs/tags/v26.3.27.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: xray
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: An example config is installed to $HOMEBREW_PREFIX/etc/xray/config.json
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add xray
  av: sudo av install brew:xray
  brew: brew install xray
  macports: sudo port install xray
  nix: nix profile install nixpkgs#xray
  scoop: scoop install main/xray
  winget: winget install --id XTLS.Xray-core -e
provenance:
  formula: xray
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
