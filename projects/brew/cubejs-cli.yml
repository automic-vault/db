id: brew:cubejs-cli
display-name: cubejs-cli
homepage: https://cube.dev/
repo: https://registry.npmjs.org/cubejs-cli/-/cubejs-cli-1.6.50.tgz
docs: https://cube.dev/
package-manager:
  brew: cubejs-cli
package-manager-url: https://formulae.brew.sh/formula/cubejs-cli
version: 1.6.50
license: Apache-2.0
category: network
tags:
  - cli
description: Cube.js command-line interface
source-archive: https://registry.npmjs.org/cubejs-cli/-/cubejs-cli-1.6.50.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: cubejs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cubejs-cli
  brew: brew install cubejs-cli
provenance:
  formula: cubejs-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
