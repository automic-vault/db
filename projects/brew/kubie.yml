id: brew:kubie
display-name: kubie
homepage: https://sbstp.ca
repo: https://github.com/sbstp/kubie
docs: https://sbstp.ca
package-manager:
  apk: kubie
  brew: kubie
  macports: kubie
  nix: kubie
  pacman: kubie
  zypper: kubie
package-manager-url: https://formulae.brew.sh/formula/kubie
version: 0.28.0
license: Zlib
category: development
tags:
  - cli
description: Much more powerful alternative to kubectx and kubens
source-archive: https://github.com/sbstp/kubie/archive/refs/tags/v0.28.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: kubie
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kubie
  av: sudo av install brew:kubie
  brew: brew install kubie
  macports: sudo port install kubie
  nix: nix profile install nixpkgs#kubie
  pacman: sudo pacman -S kubie
  zypper: sudo zypper install kubie
provenance:
  formula: kubie
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
