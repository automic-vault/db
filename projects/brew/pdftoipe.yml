id: brew:pdftoipe
display-name: pdftoipe
homepage: https://github.com/otfried/ipe-tools
repo: https://github.com/otfried/ipe-tools
docs: https://github.com/otfried/ipe-tools
package-manager:
  brew: pdftoipe
  debian: pdftoipe
  nix: pdftoipe
  ubuntu: pdftoipe
package-manager-url: https://formulae.brew.sh/formula/pdftoipe
version: 7.2.29.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Reads arbitrary PDF files and generates an XML file readable by Ipe
source-archive: https://github.com/otfried/ipe-tools/archive/refs/tags/v7.2.29.2.tar.gz
dependencies:
  - poppler
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pdftoipe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pdftoipe
  brew: brew install pdftoipe
  debian: sudo apt install pdftoipe
  nix: nix profile install nixpkgs#pdftoipe
  ubuntu: sudo apt install pdftoipe
provenance:
  formula: pdftoipe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
