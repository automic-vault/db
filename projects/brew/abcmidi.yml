id: brew:abcmidi
display-name: abcmidi
homepage: https://ifdo.ca/~seymour/runabc/top.html
repo: https://ifdo.ca/~seymour/runabc/abcMIDI-2026.05.12.zip
docs: https://ifdo.ca/~seymour/runabc/top.html
package-manager:
  brew: abcmidi
  debian: abcmidi
  dnf: abcMIDI
  macports: abcMIDI
  nix: abcmidi
  pacman: abcmidi
  ubuntu: abcmidi
package-manager-url: https://formulae.brew.sh/formula/abcmidi
version: 2026.05.12
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Converts abc music notation files to MIDI files
source-archive: https://ifdo.ca/~seymour/runabc/abcMIDI-2026.05.12.zip
executables:
  - exposure: global executable
    kind: cli
    name: abc2abc
  - exposure: global executable
    kind: cli
    name: abc2midi
  - exposure: global executable
    kind: cli
    name: abcmatch
  - exposure: global executable
    kind: cli
    name: mftext
  - exposure: global executable
    kind: cli
    name: midi2abc
  - exposure: global executable
    kind: cli
    name: midicopy
  - exposure: global executable
    kind: cli
    name: midistats
  - exposure: global executable
    kind: cli
    name: yaps
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:abcmidi
  brew: brew install abcmidi
  debian: sudo apt install abcmidi
  dnf: sudo dnf install abcMIDI
  macports: sudo port install abcMIDI
  nix: nix profile install nixpkgs#abcmidi
  pacman: sudo pacman -S abcmidi
  ubuntu: sudo apt install abcmidi
provenance:
  formula: abcmidi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
