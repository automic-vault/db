id: brew:ucon64
display-name: ucon64
homepage: https://ucon64.sourceforge.io/
repo: >
  https://downloads.sourceforge.net/project/ucon64/ucon64/ucon64-2.2.2/ucon64-2.2.2-src.tar.gz
docs: https://ucon64.sourceforge.io/
package-manager:
  brew: ucon64
  nix: ucon64
package-manager-url: https://formulae.brew.sh/formula/ucon64
version: 2.2.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: ROM backup tool and emulator's Swiss Army knife program
source-archive: >
  https://downloads.sourceforge.net/project/ucon64/ucon64/ucon64-2.2.2/ucon64-2.2.2-src.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ucon64
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You can copy/move your DAT file collection to $HOME/.ucon64/dat Be sure to check
    $HOME/.ucon64rc for configuration after running uCON64 for the first time.
  post-install-defined: false
install-lines:
  av: sudo av install brew:ucon64
  brew: brew install ucon64
  nix: nix profile install nixpkgs#ucon64
provenance:
  formula: ucon64
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
