id: brew:fake-gcs-server
display-name: fake-gcs-server
homepage: https://github.com/fsouza/fake-gcs-server
repo: https://github.com/fsouza/fake-gcs-server
docs: https://github.com/fsouza/fake-gcs-server
package-manager:
  brew: fake-gcs-server
  nix: fake-gcs-server
  zypper: fake-gcs-server
package-manager-url: https://formulae.brew.sh/formula/fake-gcs-server
version: 1.54.0
license: BSD-2-Clause
category: cloud
tags:
  - cli
  - cloud
description: Emulator for Google Cloud Storage API
source-archive: https://github.com/fsouza/fake-gcs-server/archive/refs/tags/v1.54.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fake-gcs-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fake-gcs-server
  brew: brew install fake-gcs-server
  nix: nix profile install nixpkgs#fake-gcs-server
  zypper: sudo zypper install fake-gcs-server
provenance:
  formula: fake-gcs-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
