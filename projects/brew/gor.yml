id: brew:gor
display-name: gor
homepage: https://goreplay.org
repo: https://github.com/buger/goreplay
docs: https://goreplay.org
package-manager:
  brew: gor
package-manager-url: https://formulae.brew.sh/formula/gor
version: 1.3.3
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Real-time HTTP traffic replay tool written in Go
source-archive: https://github.com/buger/goreplay/archive/refs/tags/1.3.3.tar.gz
build-dependencies:
  - go
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: gor
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gor
  brew: brew install gor
provenance:
  formula: gor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
