id: brew:serpl
display-name: serpl
homepage: https://github.com/yassinebridi/serpl
repo: https://github.com/yassinebridi/serpl
docs: https://github.com/yassinebridi/serpl
package-manager:
  brew: serpl
  macports: serpl
  nix: serpl
  pacman: serpl
package-manager-url: https://formulae.brew.sh/formula/serpl
version: 0.3.5
license: MIT
category: development
tags:
  - cli
description: Simple terminal UI for search and replace
source-archive: https://github.com/yassinebridi/serpl/archive/refs/tags/0.3.5.tar.gz
dependencies:
  - ripgrep
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: serpl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:serpl
  brew: brew install serpl
  macports: sudo port install serpl
  nix: nix profile install nixpkgs#serpl
  pacman: sudo pacman -S serpl
provenance:
  formula: serpl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
