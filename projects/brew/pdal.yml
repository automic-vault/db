id: brew:pdal
display-name: pdal
homepage: https://pdal.org/
repo: https://github.com/PDAL/PDAL
docs: https://pdal.org/
package-manager:
  apk: pdal
  brew: pdal
  dnf: PDAL
  macports: pdal
  nix: pdal
  pacman: pdal
  zypper: PDAL
package-manager-url: https://formulae.brew.sh/formula/pdal
version: 2.10.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Point data abstraction library
source-archive: https://github.com/PDAL/PDAL/releases/download/2.10.1/PDAL-2.10.1-src.tar.bz2
dependencies:
  - apache-arrow
  - curl
  - draco
  - gdal
  - hdf5
  - libgeotiff
  - libpq
  - libxml2
  - lz4
  - numpy
  - openssl@3
  - proj
  - tiledb
  - xerces-c
  - zstd
build-dependencies:
  - cmake
  - googletest
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pdal
  - exposure: global executable
    kind: cli
    name: pdal-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pdal
  av: sudo av install brew:pdal
  brew: brew install pdal
  dnf: sudo dnf install PDAL
  macports: sudo port install pdal
  nix: nix profile install nixpkgs#pdal
  pacman: sudo pacman -S pdal
  zypper: sudo zypper install PDAL
provenance:
  formula: pdal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
