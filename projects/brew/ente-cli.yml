id: brew:ente-cli
display-name: ente-cli
homepage: https://github.com/ente-io/
repo: https://github.com/ente-io/ente
docs: https://github.com/ente-io/
package-manager:
  brew: ente-cli
  nix: ente-cli
  winget: ente-io.ente.CLI
package-manager-url: https://formulae.brew.sh/formula/ente-cli
version: 0.2.3
license: AGPL-3.0-only
category: security
tags:
  - cli
description: Utility for exporting data from Ente and decrypt the export from Ente Auth
source-archive: https://github.com/ente-io/ente/archive/refs/tags/cli-v0.2.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ente
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ente-cli
  brew: brew install ente-cli
  nix: nix profile install nixpkgs#ente-cli
  winget: winget install --id ente-io.ente.CLI -e
provenance:
  formula: ente-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
