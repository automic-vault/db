id: brew:credo
display-name: credo
homepage: https://github.com/rrrene/credo
repo: https://github.com/rrrene/credo
docs: https://github.com/rrrene/credo
package-manager:
  brew: credo
package-manager-url: https://formulae.brew.sh/formula/credo
version: 1.7.18
license: MIT
category: development
tags:
  - cli
description: Static code analysis tool for the Elixir
source-archive: https://github.com/rrrene/credo/archive/refs/tags/v1.7.18.tar.gz
dependencies:
  - elixir
executables:
  - exposure: global executable
    kind: cli
    name: credo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:credo
  brew: brew install credo
provenance:
  formula: credo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
