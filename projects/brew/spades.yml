id: brew:spades
display-name: spades
homepage: https://ablab.github.io/spades/
repo: https://github.com/ablab/spades
docs: https://ablab.github.io/spades/
package-manager:
  brew: spades
  debian: spades
  nix: spades
  ubuntu: spades
package-manager-url: https://formulae.brew.sh/formula/spades
version: 4.2.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: De novo genome sequence assembly
source-archive: https://github.com/ablab/spades/releases/download/v4.2.0/SPAdes-4.2.0.tar.gz
dependencies:
  - libomp
  - python@3.14
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: coronaspades.py
  - exposure: global executable
    kind: cli
    name: metaplasmidspades.py
  - exposure: global executable
    kind: cli
    name: metaspades.py
  - exposure: global executable
    kind: cli
    name: metaviralspades.py
  - exposure: global executable
    kind: cli
    name: plasmidspades.py
  - exposure: global executable
    kind: cli
    name: rnaspades.py
  - exposure: global executable
    kind: cli
    name: rnaviralspades.py
  - exposure: global executable
    kind: cli
    name: spades-bwa
  - exposure: global executable
    kind: cli
    name: spades-convert-bin-to-fasta
  - exposure: global executable
    kind: cli
    name: spades-core
  - exposure: global executable
    kind: cli
    name: spades-corrector-core
  - exposure: global executable
    kind: cli
    name: spades-gbuilder
  - exposure: global executable
    kind: cli
    name: spades-gfa-split
  - exposure: global executable
    kind: cli
    name: spades-gmapper
  - exposure: global executable
    kind: cli
    name: spades-gsimplifier
  - exposure: global executable
    kind: cli
    name: spades-hammer
  - exposure: global executable
    kind: cli
    name: spades-ionhammer
  - exposure: global executable
    kind: cli
    name: spades-kmer-estimating
  - exposure: global executable
    kind: cli
    name: spades-kmercount
  - exposure: global executable
    kind: cli
    name: spades-read-filter
  - exposure: global executable
    kind: cli
    name: spades.py
  - exposure: global executable
    kind: cli
    name: spades_init.py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spades
  brew: brew install spades
  debian: sudo apt install spades
  nix: nix profile install nixpkgs#spades
  ubuntu: sudo apt install spades
provenance:
  formula: spades
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
