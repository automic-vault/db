id: brew:der-ascii
display-name: der-ascii
homepage: https://github.com/google/der-ascii
repo: https://github.com/google/der-ascii
docs: https://github.com/google/der-ascii
package-manager:
  brew: der-ascii
  nix: der-ascii
package-manager-url: https://formulae.brew.sh/formula/der-ascii
version: 0.8.0
license: Apache-2.0
category: development
tags:
  - cli
description: Reversible DER and BER pretty-printer
source-archive: https://github.com/google/der-ascii/archive/refs/tags/v0.8.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ascii2der
  - exposure: global executable
    kind: cli
    name: der2ascii
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:der-ascii
  brew: brew install der-ascii
  nix: nix profile install nixpkgs#der-ascii
provenance:
  formula: der-ascii
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
