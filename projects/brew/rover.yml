id: brew:rover
display-name: rover
homepage: https://www.apollographql.com/docs/rover/
repo: https://github.com/apollographql/rover
docs: https://www.apollographql.com/docs/rover/
package-manager:
  apk: rover
  brew: rover
  debian: rover
  nix: rover
package-manager-url: https://formulae.brew.sh/formula/rover
version: 0.39.1
license: MIT
category: development
tags:
  - cli
description: CLI for managing and maintaining data graphs with Apollo Studio
source-archive: https://github.com/apollographql/rover/archive/refs/tags/v0.39.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rover
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rover
  av: sudo av install brew:rover
  brew: brew install rover
  debian: sudo apt install rover
  nix: nix profile install nixpkgs#rover
provenance:
  formula: rover
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
