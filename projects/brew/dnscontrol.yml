id: brew:dnscontrol
display-name: dnscontrol
homepage: https://dnscontrol.org/
repo: https://github.com/DNSControl/dnscontrol
docs: https://dnscontrol.org/
package-manager:
  apk: dnscontrol
  brew: dnscontrol
  macports: dnscontrol
  nix: dnscontrol
  winget: StackExchange.DNSControl
package-manager-url: https://formulae.brew.sh/formula/dnscontrol
version: 4.39.0
license: MIT
category: development
tags:
  - cli
description: Synchronize your DNS to multiple providers from a simple DSL
source-archive: https://github.com/DNSControl/dnscontrol/archive/refs/tags/v4.39.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dnscontrol
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: dnscontrol bash completion depends on the bash-completion package.
  post-install-defined: false
install-lines:
  apk: sudo apk add dnscontrol
  av: sudo av install brew:dnscontrol
  brew: brew install dnscontrol
  macports: sudo port install dnscontrol
  nix: nix profile install nixpkgs#dnscontrol
  winget: winget install --id StackExchange.DNSControl -e
provenance:
  formula: dnscontrol
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
