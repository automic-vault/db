id: brew:helidon
display-name: helidon
homepage: https://helidon.io/
repo: https://github.com/helidon-io/helidon-build-tools
docs: https://helidon.io/
package-manager:
  brew: helidon
package-manager-url: https://formulae.brew.sh/formula/helidon
version: 3.0.6
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool for Helidon application development
source-archive: https://github.com/helidon-io/helidon-build-tools/archive/refs/tags/3.0.6.tar.gz
dependencies:
  - maven
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: helidon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:helidon
  brew: brew install helidon
provenance:
  formula: helidon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
