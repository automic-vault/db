id: brew:typespeed
display-name: typespeed
homepage: https://typespeed.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/typespeed/typespeed/0.6.5/typespeed-0.6.5.tar.gz
docs: https://typespeed.sourceforge.net/
package-manager:
  brew: typespeed
  debian: typespeed
  dnf: typespeed
  nix: typespeed
  ubuntu: typespeed
package-manager-url: https://formulae.brew.sh/formula/typespeed
version: 0.6.5
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Zap words flying across the screen by typing them correctly
source-archive: >
  https://downloads.sourceforge.net/project/typespeed/typespeed/0.6.5/typespeed-0.6.5.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: typespeed
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:typespeed
  brew: brew install typespeed
  debian: sudo apt install typespeed
  dnf: sudo dnf install typespeed
  nix: nix profile install nixpkgs#typespeed
  ubuntu: sudo apt install typespeed
provenance:
  formula: typespeed
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
