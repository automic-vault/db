id: brew:xcodes
display-name: xcodes
homepage: https://github.com/XcodesOrg/xcodes
repo: https://github.com/XcodesOrg/xcodes
docs: https://github.com/XcodesOrg/xcodes
package-manager:
  brew: xcodes
  macports: xcodes
  nix: xcodes
package-manager-url: https://formulae.brew.sh/formula/xcodes
version: 1.6.2
license: MIT
category: development
tags:
  - cli
description: Best command-line tool to install and switch between multiple versions of Xcode
source-archive: https://github.com/XcodesOrg/xcodes/archive/refs/tags/1.6.2.tar.gz
uses-from-macos:
  - swift
executables:
  - exposure: global executable
    kind: cli
    name: xcodes
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xcodes
  brew: brew install xcodes
  macports: sudo port install xcodes
  nix: nix profile install nixpkgs#xcodes
provenance:
  formula: xcodes
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
