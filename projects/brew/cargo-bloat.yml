id: brew:cargo-bloat
display-name: cargo-bloat
homepage: https://github.com/RazrFalcon/cargo-bloat
repo: https://github.com/RazrFalcon/cargo-bloat
docs: https://github.com/RazrFalcon/cargo-bloat
package-manager:
  apk: cargo-bloat
  brew: cargo-bloat
  nix: cargo-bloat
  pacman: cargo-bloat
package-manager-url: https://formulae.brew.sh/formula/cargo-bloat
version: 0.12.1
license: MIT
category: development
tags:
  - cli
description: Find out what takes most of the space in your executable
source-archive: https://github.com/RazrFalcon/cargo-bloat/archive/refs/tags/v0.12.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-bloat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-bloat
  av: sudo av install brew:cargo-bloat
  brew: brew install cargo-bloat
  nix: nix profile install nixpkgs#cargo-bloat
  pacman: sudo pacman -S cargo-bloat
provenance:
  formula: cargo-bloat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
