id: brew:openjdk
display-name: openjdk
homepage: https://openjdk.org/
repo: https://github.com/openjdk/jdk26u
docs: https://openjdk.org/
package-manager:
  brew: openjdk
  chocolatey: openjdk
  nix: openjdk
  winget: Microsoft.OpenJDK.17
package-manager-url: https://formulae.brew.sh/formula/openjdk
version: 26.0.1
license: GPL-2.0-only WITH Classpath-exception-2.0
category: development
tags:
  - cli
description: Development kit for the Java programming language
source-archive: https://github.com/openjdk/jdk26u/archive/refs/tags/jdk-26.0.1-ga.tar.gz
dependencies:
  - freetype
  - giflib
  - harfbuzz
  - jpeg-turbo
  - libpng
  - little-cms2
build-dependencies:
  - autoconf
  - pkgconf
uses-from-macos:
  - cups
  - unzip
  - zip
executables:
  - exposure: global executable
    kind: cli
    name: jar
  - exposure: global executable
    kind: cli
    name: jarsigner
  - exposure: global executable
    kind: cli
    name: java
  - exposure: global executable
    kind: cli
    name: javac
  - exposure: global executable
    kind: cli
    name: javadoc
  - exposure: global executable
    kind: cli
    name: javap
  - exposure: global executable
    kind: cli
    name: jcmd
  - exposure: global executable
    kind: cli
    name: jconsole
  - exposure: global executable
    kind: cli
    name: jdb
  - exposure: global executable
    kind: cli
    name: jdeprscan
  - exposure: global executable
    kind: cli
    name: jdeps
  - exposure: global executable
    kind: cli
    name: jfr
  - exposure: global executable
    kind: cli
    name: jhsdb
  - exposure: global executable
    kind: cli
    name: jimage
  - exposure: global executable
    kind: cli
    name: jinfo
  - exposure: global executable
    kind: cli
    name: jlink
  - exposure: global executable
    kind: cli
    name: jmap
  - exposure: global executable
    kind: cli
    name: jmod
  - exposure: global executable
    kind: cli
    name: jnativescan
  - exposure: global executable
    kind: cli
    name: jpackage
  - exposure: global executable
    kind: cli
    name: jps
  - exposure: global executable
    kind: cli
    name: jshell
  - exposure: global executable
    kind: cli
    name: jstack
  - exposure: global executable
    kind: cli
    name: jstat
  - exposure: global executable
    kind: cli
    name: jstatd
  - exposure: global executable
    kind: cli
    name: jwebserver
  - exposure: global executable
    kind: cli
    name: keytool
  - exposure: global executable
    kind: cli
    name: rmiregistry
  - exposure: global executable
    kind: cli
    name: serialver
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    For the system Java wrappers to find this JDK, symlink it with sudo ln -sfn
    $HOMEBREW_PREFIX/opt/openjdk/libexec/openjdk.jdk
    /Library/Java/JavaVirtualMachines/openjdk.jdk
  post-install-defined: false
install-lines:
  av: sudo av install brew:openjdk
  brew: brew install openjdk
  chocolatey: choco install openjdk
  nix: nix profile install nixpkgs#openjdk
  winget: winget install --id Microsoft.OpenJDK.17 -e
provenance:
  formula: openjdk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
