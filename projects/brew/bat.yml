id: brew:bat
display-name: bat
homepage: https://github.com/sharkdp/bat
repo: https://github.com/sharkdp/bat
docs: https://github.com/sharkdp/bat
package-manager:
  apk: bat
  brew: bat
  chocolatey: Bat
  debian: bat
  dnf: bat
  macports: bat
  nix: bat
  pacman: bat
  scoop: main/bat
  ubuntu: bat
  winget: sharkdp.bat
  zypper: bat
package-manager-url: https://formulae.brew.sh/formula/bat
version: 0.26.1
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
  - git
description: Clone of cat(1) with syntax highlighting and Git integration
source-archive: https://github.com/sharkdp/bat/archive/refs/tags/v0.26.1.tar.gz
dependencies:
  - libgit2
  - oniguruma
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bat
  av: sudo av install brew:bat
  brew: brew install bat
  chocolatey: choco install Bat
  debian: sudo apt install bat
  dnf: sudo dnf install bat
  macports: sudo port install bat
  nix: nix profile install nixpkgs#bat
  pacman: sudo pacman -S bat
  scoop: scoop install main/bat
  ubuntu: sudo apt install bat
  winget: winget install --id sharkdp.bat -e
  zypper: sudo zypper install bat
provenance:
  formula: bat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
