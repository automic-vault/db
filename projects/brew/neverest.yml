id: brew:neverest
display-name: neverest
homepage: https://pimalaya.org
repo: https://github.com/pimalaya/neverest
docs: https://pimalaya.org
package-manager:
  brew: neverest
  nix: neverest
package-manager-url: https://formulae.brew.sh/formula/neverest
version: 0.1.0
license: MIT
category: development
tags:
  - cli
description: Synchronize, backup, and restore emails
source-archive: https://github.com/pimalaya/neverest/archive/refs/tags/v0.1.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: neverest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:neverest
  brew: brew install neverest
  nix: nix profile install nixpkgs#neverest
provenance:
  formula: neverest
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
