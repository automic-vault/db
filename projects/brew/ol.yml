id: brew:ol
display-name: ol
homepage: https://yuriy-chumak.github.io/ol/
repo: https://github.com/yuriy-chumak/ol
docs: https://yuriy-chumak.github.io/ol/
package-manager:
  apk: ol
  brew: ol
package-manager-url: https://formulae.brew.sh/formula/ol
version: 2.7
license: LGPL-3.0-or-later OR MIT
category: development
tags:
  - cli
description: Purely functional dialect of Lisp
source-archive: https://github.com/yuriy-chumak/ol/archive/refs/tags/2.7.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ol
  - exposure: global executable
    kind: cli
    name: olvm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ol
  av: sudo av install brew:ol
  brew: brew install ol
provenance:
  formula: ol
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
