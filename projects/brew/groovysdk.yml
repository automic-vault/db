id: brew:groovysdk
display-name: groovysdk
homepage: https://www.groovy-lang.org/
repo: >
  https://groovy.jfrog.io/artifactory/dist-release-local/groovy-zips/apache-groovy-sdk-5.0.6.zip
docs: https://www.groovy-lang.org/
package-manager:
  brew: groovysdk
package-manager-url: https://formulae.brew.sh/formula/groovysdk
version: 5.0.6
license: Apache-2.0
category: development
tags:
  - cli
description: 'SDK for Groovy: a Java-based scripting language'
source-archive: >
  https://groovy.jfrog.io/artifactory/dist-release-local/groovy-zips/apache-groovy-sdk-5.0.6.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: grape_completion
  - exposure: global executable
    kind: cli
    name: groovy.ico
  - exposure: global executable
    kind: cli
    name: groovyConsole_completion
  - exposure: global executable
    kind: cli
    name: groovy_completion
  - exposure: global executable
    kind: cli
    name: groovyc_completion
  - exposure: global executable
    kind: cli
    name: groovydoc_completion
  - exposure: global executable
    kind: cli
    name: groovysh_completion
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:groovysdk
  brew: brew install groovysdk
provenance:
  formula: groovysdk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
