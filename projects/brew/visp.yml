id: brew:visp
display-name: visp
homepage: https://visp.inria.fr/
repo: https://visp-doc.inria.fr/download/releases/visp-3.7.0.tar.gz
docs: https://visp.inria.fr/
package-manager:
  brew: visp
  nix: visp
package-manager-url: https://formulae.brew.sh/formula/visp
version: 3.7.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Visual Servoing Platform library
source-archive: https://visp-doc.inria.fr/download/releases/visp-3.7.0.tar.gz
dependencies:
  - boost
  - eigen
  - flann
  - glew
  - gsl
  - jpeg-turbo
  - libdc1394
  - libomp
  - libpcap
  - libpng
  - lz4
  - openblas
  - opencv
  - pcl
  - qhull
  - qtbase
  - vtk
  - zbar
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: visp-calibrate-camera
  - exposure: global executable
    kind: cli
    name: visp-compute-apriltag-poses
  - exposure: global executable
    kind: cli
    name: visp-compute-chessboard-poses
  - exposure: global executable
    kind: cli
    name: visp-compute-eye-in-hand-calibration
  - exposure: global executable
    kind: cli
    name: visp-compute-eye-to-hand-calibration
  - exposure: global executable
    kind: cli
    name: visp-config
  - exposure: global executable
    kind: cli
    name: visp-read-rs-dataset
  - exposure: global executable
    kind: cli
    name: visp-save-rs-dataset
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:visp
  brew: brew install visp
  nix: nix profile install nixpkgs#visp
provenance:
  formula: visp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
