id: brew:sniffnet
display-name: sniffnet
homepage: https://sniffnet.net/
repo: https://github.com/GyulyVGC/sniffnet
docs: https://sniffnet.net/
package-manager:
  brew: sniffnet
  nix: sniffnet
  pacman: sniffnet
  scoop: extras/sniffnet
package-manager-url: https://formulae.brew.sh/formula/sniffnet
version: 1.5.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Cross-platform application to monitor your network traffic
source-archive: https://github.com/GyulyVGC/sniffnet/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: sniffnet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sniffnet
  brew: brew install sniffnet
  nix: nix profile install nixpkgs#sniffnet
  pacman: sudo pacman -S sniffnet
  scoop: scoop install extras/sniffnet
provenance:
  formula: sniffnet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
