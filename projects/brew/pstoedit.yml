id: brew:pstoedit
display-name: pstoedit
homepage: http://www.pstoedit.net/
repo: https://github.com/woglu/pstoedit
docs: http://www.pstoedit.net/
package-manager:
  brew: pstoedit
  debian: pstoedit
  dnf: pstoedit
  macports: pstoedit
  nix: pstoedit
  pacman: pstoedit
  ubuntu: pstoedit
  winget: WGlunz.pstoedit
  zypper: pstoedit
package-manager-url: https://formulae.brew.sh/formula/pstoedit
version: 4.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Convert PostScript and PDF files to editable vector graphics
source-archive: https://github.com/woglu/pstoedit/archive/refs/tags/v4.3.tar.gz
dependencies:
  - gd
  - ghostscript
  - imagemagick
  - libzip
  - plotutils
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pstoedit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pstoedit
  brew: brew install pstoedit
  debian: sudo apt install pstoedit
  dnf: sudo dnf install pstoedit
  macports: sudo port install pstoedit
  nix: nix profile install nixpkgs#pstoedit
  pacman: sudo pacman -S pstoedit
  ubuntu: sudo apt install pstoedit
  winget: winget install --id WGlunz.pstoedit -e
  zypper: sudo zypper install pstoedit
provenance:
  formula: pstoedit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
