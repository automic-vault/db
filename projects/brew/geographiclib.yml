id: brew:geographiclib
display-name: geographiclib
homepage: https://geographiclib.sourceforge.io/
repo: https://github.com/geographiclib/geographiclib
docs: https://geographiclib.sourceforge.io/
package-manager:
  brew: geographiclib
  dnf: GeographicLib
  macports: geographiclib
  nix: geographiclib
package-manager-url: https://formulae.brew.sh/formula/geographiclib
version: 2.7
license: MIT
category: development
tags:
  - cli
description: C++ geography library
source-archive: https://github.com/geographiclib/geographiclib/archive/refs/tags/r2.7.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: Cart3Convert
  - exposure: global executable
    kind: cli
    name: CartConvert
  - exposure: global executable
    kind: cli
    name: Conformal3Proj
  - exposure: global executable
    kind: cli
    name: ConicProj
  - exposure: global executable
    kind: cli
    name: GeoConvert
  - exposure: global executable
    kind: cli
    name: Geod3Solve
  - exposure: global executable
    kind: cli
    name: GeodSolve
  - exposure: global executable
    kind: cli
    name: GeodesicProj
  - exposure: global executable
    kind: cli
    name: GeoidEval
  - exposure: global executable
    kind: cli
    name: Gravity
  - exposure: global executable
    kind: cli
    name: IntersectTool
  - exposure: global executable
    kind: cli
    name: MagneticField
  - exposure: global executable
    kind: cli
    name: Planimeter
  - exposure: global executable
    kind: cli
    name: RhumbSolve
  - exposure: global executable
    kind: cli
    name: TransverseMercatorProj
  - exposure: global executable
    kind: cli
    name: geographiclib-get-geoids
  - exposure: global executable
    kind: cli
    name: geographiclib-get-gravity
  - exposure: global executable
    kind: cli
    name: geographiclib-get-magnetic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:geographiclib
  brew: brew install geographiclib
  dnf: sudo dnf install GeographicLib
  macports: sudo port install geographiclib
  nix: nix profile install nixpkgs#geographiclib
provenance:
  formula: geographiclib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
