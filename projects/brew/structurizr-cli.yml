id: brew:structurizr-cli
display-name: structurizr-cli
homepage: https://docs.structurizr.com/cli
repo: https://github.com/structurizr/cli
docs: https://docs.structurizr.com/cli
package-manager:
  brew: structurizr-cli
  nix: structurizr-cli
  scoop: extras/structurizr-cli
package-manager-url: https://formulae.brew.sh/formula/structurizr-cli
version: 2025.11.09
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line utility for Structurizr
source-archive: https://github.com/structurizr/cli/releases/download/v2025.11.09/structurizr-cli.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: structurizr-cli
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:structurizr-cli
  brew: brew install structurizr-cli
  nix: nix profile install nixpkgs#structurizr-cli
  scoop: scoop install extras/structurizr-cli
provenance:
  formula: structurizr-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
