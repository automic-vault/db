id: brew:opensearch-dashboards
display-name: opensearch-dashboards
homepage: https://docs.opensearch.org/latest/dashboards/
repo: https://github.com/opensearch-project/OpenSearch-Dashboards
docs: https://docs.opensearch.org/latest/dashboards/
package-manager:
  brew: opensearch-dashboards
  pacman: opensearch-dashboards
package-manager-url: https://formulae.brew.sh/formula/opensearch-dashboards
version: 3.6.0
license: Apache-2.0
category: development
tags:
  - cli
description: Open source visualization dashboards for OpenSearch
source-archive: https://github.com/opensearch-project/OpenSearch-Dashboards.git
dependencies:
  - node@22
build-dependencies:
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: opensearch-dashboards
  - exposure: global executable
    kind: cli
    name: opensearch-dashboards-keystore
  - exposure: global executable
    kind: cli
    name: opensearch-dashboards-plugin
  - exposure: global executable
    kind: cli
    name: use_node
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Data: $HOMEBREW_PREFIX/var/lib/opensearch-dashboards/ Logs:
    $HOMEBREW_PREFIX/var/log/opensearch-dashboards/opensearch-dashboards.log Plugins:
    $HOMEBREW_PREFIX/var/opensearch-dashboards/plugins/ Config:
    $HOMEBREW_PREFIX/etc/opensearch-dashboards/
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:opensearch-dashboards
  brew: brew install opensearch-dashboards
  pacman: sudo pacman -S opensearch-dashboards
provenance:
  formula: opensearch-dashboards
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
