id: brew:arss
display-name: arss
homepage: https://arss.sourceforge.net/
repo: https://downloads.sourceforge.net/project/arss/arss/0.2.3/arss-0.2.3-src.tar.gz
docs: https://arss.sourceforge.net/
package-manager:
  brew: arss
package-manager-url: https://formulae.brew.sh/formula/arss
version: 0.2.3
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Analyze a sound file into a spectrogram
source-archive: https://downloads.sourceforge.net/project/arss/arss/0.2.3/arss-0.2.3-src.tar.gz
dependencies:
  - fftw
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: arss
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:arss
  brew: brew install arss
provenance:
  formula: arss
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
