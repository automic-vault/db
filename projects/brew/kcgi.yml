id: brew:kcgi
display-name: kcgi
homepage: https://kristaps.bsd.lv/kcgi/
repo: https://kristaps.bsd.lv/kcgi/snapshots/kcgi-1.0.1.tgz
docs: https://kristaps.bsd.lv/kcgi/
package-manager:
  apk: kcgi
  brew: kcgi
  nix: kcgi
package-manager-url: https://formulae.brew.sh/formula/kcgi
version: 1.0.1
license: ISC
category: network
tags:
  - cli
description: Minimal CGI and FastCGI library for C/C++
source-archive: https://kristaps.bsd.lv/kcgi/snapshots/kcgi-1.0.1.tgz
build-dependencies:
  - bmake
executables:
  - exposure: global executable
    kind: cli
    name: kfcgi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kcgi
  av: sudo av install brew:kcgi
  brew: brew install kcgi
  nix: nix profile install nixpkgs#kcgi
provenance:
  formula: kcgi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
