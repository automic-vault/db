id: brew:tfsort
display-name: tfsort
homepage: https://github.com/AlexNabokikh/tfsort
repo: https://github.com/AlexNabokikh/tfsort
docs: https://github.com/AlexNabokikh/tfsort
package-manager:
  brew: tfsort
  nix: tfsort
package-manager-url: https://formulae.brew.sh/formula/tfsort
version: 0.7.1
license: Apache-2.0
category: cloud
tags:
  - cli
description: CLI to sort Terraform variables and outputs
source-archive: https://github.com/AlexNabokikh/tfsort/archive/refs/tags/v0.7.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tfsort
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tfsort
  brew: brew install tfsort
  nix: nix profile install nixpkgs#tfsort
provenance:
  formula: tfsort
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
