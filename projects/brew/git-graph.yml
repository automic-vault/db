id: brew:git-graph
display-name: git-graph
homepage: https://github.com/mlange-42/git-graph
repo: https://github.com/mlange-42/git-graph
docs: https://github.com/mlange-42/git-graph
package-manager:
  apk: git-graph
  brew: git-graph
  nix: git-graph
  pacman: git-graph
  scoop: extras/git-graph
package-manager-url: https://formulae.brew.sh/formula/git-graph
version: 0.7.0
license: MIT
category: development
tags:
  - cli
  - git
description: Command-line tool to show clear git graphs arranged for your branching model
source-archive: https://github.com/mlange-42/git-graph/archive/refs/tags/v0.7.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: git-graph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-graph
  av: sudo av install brew:git-graph
  brew: brew install git-graph
  nix: nix profile install nixpkgs#git-graph
  pacman: sudo pacman -S git-graph
  scoop: scoop install extras/git-graph
provenance:
  formula: git-graph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
