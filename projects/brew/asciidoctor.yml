id: brew:asciidoctor
display-name: asciidoctor
homepage: https://asciidoctor.org/
repo: https://github.com/asciidoctor/asciidoctor
docs: https://asciidoctor.org/
package-manager:
  apk: asciidoctor
  brew: asciidoctor
  debian: asciidoctor
  macports: asciidoctor
  nix: asciidoctor
  pacman: asciidoctor
  ubuntu: asciidoctor
package-manager-url: https://formulae.brew.sh/formula/asciidoctor
version: 2.0.26
license: MIT
category: development
tags:
  - cli
description: Text processor and publishing toolchain for AsciiDoc
source-archive: https://github.com/asciidoctor/asciidoctor/archive/refs/tags/v2.0.26.tar.gz
dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: asciidoctor
  - exposure: global executable
    kind: cli
    name: asciidoctor-pdf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add asciidoctor
  av: sudo av install brew:asciidoctor
  brew: brew install asciidoctor
  debian: sudo apt install asciidoctor
  macports: sudo port install asciidoctor
  nix: nix profile install nixpkgs#asciidoctor
  pacman: sudo pacman -S asciidoctor
  ubuntu: sudo apt install asciidoctor
provenance:
  formula: asciidoctor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
