id: brew:cabal-install
display-name: cabal-install
homepage: https://www.haskell.org/cabal/
repo: https://hackage.haskell.org/package/cabal-install-3.16.1.0/cabal-install-3.16.1.0.tar.gz
docs: https://www.haskell.org/cabal/
package-manager:
  apk: cabal
  brew: cabal-install
  chocolatey: cabal
  debian: cabal-install
  dnf: cabal-install
  macports: cabal
  nix: cabal-install
  pacman: cabal-install
  scoop: extras/cabal
  ubuntu: cabal-install
  winget: haskell.cabal
  zypper: cabal-install
package-manager-url: https://formulae.brew.sh/formula/cabal-install
version: 3.16.1.0
license: BSD-3-Clause
category: network
tags:
  - cli
description: Command-line interface for Cabal and Hackage
source-archive: https://hackage.haskell.org/package/cabal-install-3.16.1.0/cabal-install-3.16.1.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: cabal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cabal
  av: sudo av install brew:cabal-install
  brew: brew install cabal-install
  chocolatey: choco install cabal
  debian: sudo apt install cabal-install
  dnf: sudo dnf install cabal-install
  macports: sudo port install cabal
  nix: nix profile install nixpkgs#cabal-install
  pacman: sudo pacman -S cabal-install
  scoop: scoop install extras/cabal
  ubuntu: sudo apt install cabal-install
  winget: winget install --id haskell.cabal -e
  zypper: sudo zypper install cabal-install
provenance:
  formula: cabal-install
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
