id: brew:treemd
display-name: treemd
homepage: https://github.com/epistates/treemd
repo: https://github.com/Epistates/treemd
docs: https://github.com/epistates/treemd
package-manager:
  brew: treemd
  nix: treemd
  pacman: treemd
package-manager-url: https://formulae.brew.sh/formula/treemd
version: 0.5.11
license: MIT
category: development
tags:
  - cli
description: TUI and CLI dual pane markdown viewer
source-archive: https://github.com/Epistates/treemd/archive/refs/tags/v0.5.11.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: treemd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:treemd
  brew: brew install treemd
  nix: nix profile install nixpkgs#treemd
  pacman: sudo pacman -S treemd
provenance:
  formula: treemd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
