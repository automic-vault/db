id: brew:marksman
display-name: marksman
homepage: https://github.com/artempyanykh/marksman
repo: https://github.com/artempyanykh/marksman
docs: https://github.com/artempyanykh/marksman
package-manager:
  brew: marksman
  macports: marksman
  nix: marksman
  pacman: marksman
  scoop: main/marksman
  winget: Artempyanykh.Marksman
package-manager-url: https://formulae.brew.sh/formula/marksman
version: 2026-02-08
license: MIT
category: development
tags:
  - cli
description: Language Server Protocol for Markdown
source-archive: https://github.com/artempyanykh/marksman/archive/refs/tags/2026-02-08.tar.gz
dependencies:
  - dotnet@9
executables:
  - exposure: global executable
    kind: cli
    name: marksman
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:marksman
  brew: brew install marksman
  macports: sudo port install marksman
  nix: nix profile install nixpkgs#marksman
  pacman: sudo pacman -S marksman
  scoop: scoop install main/marksman
  winget: winget install --id Artempyanykh.Marksman -e
provenance:
  formula: marksman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
