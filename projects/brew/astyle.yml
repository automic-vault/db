id: brew:astyle
display-name: astyle
homepage: https://astyle.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/astyle/astyle/astyle%203.6/astyle-3.6.16.tar.bz2
docs: https://astyle.sourceforge.net/
package-manager:
  apk: astyle
  brew: astyle
  chocolatey: astyle
  debian: astyle
  dnf: astyle
  macports: astyle
  nix: astyle
  pacman: astyle
  scoop: main/astyle
  ubuntu: astyle
  zypper: astyle
package-manager-url: https://formulae.brew.sh/formula/astyle
version: 3.6.16
license: MIT
category: network
tags:
  - cli
description: Source code beautifier for C, C++, C#, and Java
source-archive: >
  https://downloads.sourceforge.net/project/astyle/astyle/astyle%203.6/astyle-3.6.16.tar.bz2
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: astyle
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add astyle
  av: sudo av install brew:astyle
  brew: brew install astyle
  chocolatey: choco install astyle
  debian: sudo apt install astyle
  dnf: sudo dnf install astyle
  macports: sudo port install astyle
  nix: nix profile install nixpkgs#astyle
  pacman: sudo pacman -S astyle
  scoop: scoop install main/astyle
  ubuntu: sudo apt install astyle
  zypper: sudo zypper install astyle
provenance:
  formula: astyle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
