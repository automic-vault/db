id: brew:govulncheck
display-name: govulncheck
homepage: https://github.com/golang/vuln
repo: https://github.com/golang/vuln
docs: https://github.com/golang/vuln
package-manager:
  brew: govulncheck
  debian: govulncheck
  dnf: govulncheck
  macports: govulncheck
  nix: govulncheck
  pacman: govulncheck
  ubuntu: govulncheck
  zypper: govulncheck
package-manager-url: https://formulae.brew.sh/formula/govulncheck
version: 1.3.0
license: BSD-3-Clause
category: database
tags:
  - cli
  - database
description: Database client and tools for the Go vulnerability database
source-archive: https://github.com/golang/vuln/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: govulncheck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:govulncheck
  brew: brew install govulncheck
  debian: sudo apt install govulncheck
  dnf: sudo dnf install govulncheck
  macports: sudo port install govulncheck
  nix: nix profile install nixpkgs#govulncheck
  pacman: sudo pacman -S govulncheck
  ubuntu: sudo apt install govulncheck
  zypper: sudo zypper install govulncheck
provenance:
  formula: govulncheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
