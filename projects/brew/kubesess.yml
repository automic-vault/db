id: brew:kubesess
display-name: kubesess
homepage: https://github.com/Ramilito/kubesess
repo: https://github.com/Ramilito/kubesess
docs: https://github.com/Ramilito/kubesess
package-manager:
  brew: kubesess
package-manager-url: https://formulae.brew.sh/formula/kubesess
version: 3.0.0
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
description: Manage multiple kubernetes cluster at the same time
source-archive: https://github.com/Ramilito/kubesess/archive/refs/tags/3.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: kubesess
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubesess
  brew: brew install kubesess
provenance:
  formula: kubesess
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
