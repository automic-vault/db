id: brew:gtk+
display-name: gtk+
homepage: https://gtk.org/
repo: https://download.gnome.org/sources/gtk+/2.24/gtk+-2.24.33.tar.xz
docs: https://gtk.org/
package-manager:
  brew: gtk+
  dnf: gtk+
package-manager-url: https://formulae.brew.sh/formula/gtk+
version: 2.24.33
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: GUI toolkit
source-archive: https://download.gnome.org/sources/gtk+/2.24/gtk+-2.24.33.tar.xz
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - harfbuzz
  - hicolor-icon-theme
  - pango
build-dependencies:
  - gobject-introspection
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gtk-builder-convert
  - exposure: global executable
    kind: cli
    name: gtk-demo
  - exposure: global executable
    kind: cli
    name: gtk-query-immodules-2.0
  - exposure: global executable
    kind: cli
    name: gtk2-update-icon-cache
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To avoid a conflict with `gtk+3` formula, `gtk-update-icon-cache` is installed at
    $HOMEBREW_PREFIX/opt/gtk+/libexec/gtk-update-icon-cache A versioned symlink
    `gtk2-update-icon-cache` is linked for convenience.
  post-install-defined: false
install-lines:
  av: sudo av install brew:gtk+
  brew: brew install gtk+
  dnf: sudo dnf install gtk+
provenance:
  formula: gtk+
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
