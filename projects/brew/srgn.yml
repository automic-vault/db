id: brew:srgn
display-name: srgn
homepage: https://github.com/alexpovel/srgn
repo: https://github.com/alexpovel/srgn
docs: https://github.com/alexpovel/srgn
package-manager:
  brew: srgn
  macports: srgn
  nix: srgn
  pacman: srgn
package-manager-url: https://formulae.brew.sh/formula/srgn
version: 0.14.2
license: MIT
category: development
tags:
  - cli
description: Code surgeon for precise text and code transplantation
source-archive: https://github.com/alexpovel/srgn/archive/refs/tags/srgn-v0.14.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: srgn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:srgn
  brew: brew install srgn
  macports: sudo port install srgn
  nix: nix profile install nixpkgs#srgn
  pacman: sudo pacman -S srgn
provenance:
  formula: srgn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
