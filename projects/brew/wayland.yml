id: brew:wayland
display-name: wayland
homepage: https://wayland.freedesktop.org
repo: >
  https://gitlab.freedesktop.org/wayland/wayland/-/releases/1.25.0/downloads/wayland-1.25.0.tar.xz
docs: https://wayland.freedesktop.org
package-manager:
  apk: wayland
  brew: wayland
  debian: wayland-scanner++
  macports: wayland
  nix: wayland
  pacman: wayland
  ubuntu: wayland-scanner++
package-manager-url: https://formulae.brew.sh/formula/wayland
version: 1.25.0
license: MIT
category: development
tags:
  - cli
description: Protocol for a compositor to talk to its clients
source-archive: >
  https://gitlab.freedesktop.org/wayland/wayland/-/releases/1.25.0/downloads/wayland-1.25.0.tar.xz
dependencies:
  - expat
  - libffi
  - libxml2
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: wayland-scanner
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wayland
  av: sudo av install brew:wayland
  brew: brew install wayland
  debian: sudo apt install wayland-scanner++
  macports: sudo port install wayland
  nix: nix profile install nixpkgs#wayland
  pacman: sudo pacman -S wayland
  ubuntu: sudo apt install wayland-scanner++
provenance:
  formula: wayland
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
