id: brew:pius
display-name: pius
homepage: https://github.com/jaymzh/pius
repo: https://github.com/jaymzh/pius
docs: https://github.com/jaymzh/pius
package-manager:
  brew: pius
  debian: pius
  nix: pius
  pacman: pius
  ubuntu: pius
package-manager-url: https://formulae.brew.sh/formula/pius
version: 3.0.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: PGP individual UID signer
source-archive: https://github.com/jaymzh/pius/archive/refs/tags/v3.0.0.tar.gz
dependencies:
  - gnupg
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: pius
  - exposure: global executable
    kind: cli
    name: pius-keyring-mgr
  - exposure: global executable
    kind: cli
    name: pius-party-worksheet
  - exposure: global executable
    kind: cli
    name: pius-report
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The path to gpg is hardcoded in pius as `/usr/bin/env gpg`. You can specify a
    different path by editing ~/.pius: gpg-path=/path/to/gpg
  post-install-defined: false
install-lines:
  av: sudo av install brew:pius
  brew: brew install pius
  debian: sudo apt install pius
  nix: nix profile install nixpkgs#pius
  pacman: sudo pacman -S pius
  ubuntu: sudo apt install pius
provenance:
  formula: pius
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
