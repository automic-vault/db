id: brew:pam-reattach
display-name: pam-reattach
homepage: https://github.com/fabianishere/pam_reattach
repo: https://github.com/fabianishere/pam_reattach
docs: https://github.com/fabianishere/pam_reattach
package-manager:
  brew: pam-reattach
  macports: pam-reattach
  nix: pam-reattach
package-manager-url: https://formulae.brew.sh/formula/pam-reattach
version: 1.3
license: MIT
category: development
tags:
  - cli
description: PAM module for reattaching to the user's GUI (Aqua) session
source-archive: https://github.com/fabianishere/pam_reattach/archive/refs/tags/v1.3.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: reattach-to-session-namespace
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pam-reattach
  brew: brew install pam-reattach
  macports: sudo port install pam-reattach
  nix: nix profile install nixpkgs#pam-reattach
provenance:
  formula: pam-reattach
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
