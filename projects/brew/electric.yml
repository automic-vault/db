id: brew:electric
display-name: electric
homepage: https://electric-sql.com
repo: https://github.com/electric-sql/electric
docs: https://electric-sql.com
package-manager:
  brew: electric
  debian: electric
  macports: electric
  ubuntu: electric
package-manager-url: https://formulae.brew.sh/formula/electric
version: 1.6.8
license: Apache-2.0
category: database
tags:
  - cli
description: Real-time sync for Postgres
source-archive: >
  https://github.com/electric-sql/electric/archive/refs/tags/@core/sync-service@1.6.8.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - elixir
  - erlang@28
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: electric
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:electric
  brew: brew install electric
  debian: sudo apt install electric
  macports: sudo port install electric
  ubuntu: sudo apt install electric
provenance:
  formula: electric
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
