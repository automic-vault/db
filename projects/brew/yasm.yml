id: brew:yasm
display-name: yasm
homepage: https://www.tortall.net/projects/yasm/manual/html/
repo: https://www.tortall.net/projects/yasm/releases/yasm-1.3.0.tar.gz
docs: https://www.tortall.net/projects/yasm/manual/html/
package-manager:
  apk: yasm
  brew: yasm
  chocolatey: yasm
  debian: yasm
  dnf: yasm
  macports: yasm
  nix: yasm
  pacman: yasm
  scoop: main/yasm
  ubuntu: yasm
  zypper: yasm
package-manager-url: https://formulae.brew.sh/formula/yasm
version: 1.3.0
license: >
  BSD-2-Clause AND BSD-3-Clause AND LicenseRef-Homebrew-public-domain AND
  (Artistic-1.0-Perl OR GPL-2.0-or-later OR LGPL-2.0-or-later)
category: network
tags:
  - cli
description: Modular BSD reimplementation of NASM
source-archive: https://www.tortall.net/projects/yasm/releases/yasm-1.3.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: vsyasm
  - exposure: global executable
    kind: cli
    name: yasm
  - exposure: global executable
    kind: cli
    name: ytasm
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yasm
  av: sudo av install brew:yasm
  brew: brew install yasm
  chocolatey: choco install yasm
  debian: sudo apt install yasm
  dnf: sudo dnf install yasm
  macports: sudo port install yasm
  nix: nix profile install nixpkgs#yasm
  pacman: sudo pacman -S yasm
  scoop: scoop install main/yasm
  ubuntu: sudo apt install yasm
  zypper: sudo zypper install yasm
provenance:
  formula: yasm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
