id: brew:ducker
display-name: ducker
homepage: https://github.com/robertpsoane/ducker
repo: https://github.com/robertpsoane/ducker
docs: https://github.com/robertpsoane/ducker
package-manager:
  brew: ducker
  nix: ducker
  pacman: ducker
package-manager-url: https://formulae.brew.sh/formula/ducker
version: 0.6.5
license: MIT
category: development
tags:
  - cli
  - docker
description: Slightly quackers Docker TUI based on k9s
source-archive: https://github.com/robertpsoane/ducker/archive/refs/tags/v0.6.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ducker
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ducker
  brew: brew install ducker
  nix: nix profile install nixpkgs#ducker
  pacman: sudo pacman -S ducker
provenance:
  formula: ducker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
