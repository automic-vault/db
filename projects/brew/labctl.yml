id: brew:labctl
display-name: labctl
homepage: https://github.com/iximiuz/labctl
repo: https://github.com/iximiuz/labctl
docs: https://github.com/iximiuz/labctl
package-manager:
  brew: labctl
  nix: labctl
package-manager-url: https://formulae.brew.sh/formula/labctl
version: 0.1.76
license: Apache-2.0
category: development
tags:
  - cli
description: CLI tool for interacting with iximiuz labs and playgrounds
source-archive: https://github.com/iximiuz/labctl/archive/refs/tags/v0.1.76.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: labctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:labctl
  brew: brew install labctl
  nix: nix profile install nixpkgs#labctl
provenance:
  formula: labctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
