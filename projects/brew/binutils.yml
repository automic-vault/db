bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add binutils
  av: sudo av install brew:binutils
  brew: brew install binutils
  debian: sudo apt install binutils
  dnf: sudo dnf install binutils
  macports: sudo port install binutils
  nix: nix profile install nixpkgs#binutils
  pacman: sudo pacman -S binutils
  scoop: scoop install main/binutils
  ubuntu: sudo apt install binutils
  winget: winget install --id Microsoft.Sysinternals.Strings -e
  zypper: sudo zypper install binutils
provenance:
  formula: binutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
