id: brew:binutils
display-name: binutils
homepage: https://www.gnu.org/software/binutils/binutils.html
repo: https://ftpmirror.gnu.org/gnu/binutils/binutils-2.46.0.tar.bz2
docs: https://www.gnu.org/software/binutils/binutils.html
package-manager:
