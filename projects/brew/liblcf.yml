id: brew:liblcf
display-name: liblcf
homepage: https://easyrpg.org/
repo: https://easyrpg.org/downloads/player/0.8.1/liblcf-0.8.1.tar.xz
docs: https://easyrpg.org/
package-manager:
  apk: liblcf
  brew: liblcf
  dnf: liblcf
  nix: liblcf
package-manager-url: https://formulae.brew.sh/formula/liblcf
version: 0.8.1
license: MIT
category: network
tags:
  - cli
description: Library for RPG Maker 2000/2003 games data
source-archive: https://easyrpg.org/downloads/player/0.8.1/liblcf-0.8.1.tar.xz
dependencies:
  - icu4c@78
  - inih
build-dependencies:
  - cmake
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: lcf2xml
  - exposure: global executable
    kind: cli
    name: lcfstrings
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add liblcf
  av: sudo av install brew:liblcf
  brew: brew install liblcf
  dnf: sudo dnf install liblcf
  nix: nix profile install nixpkgs#liblcf
provenance:
  formula: liblcf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
