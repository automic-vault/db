id: brew:sheldon
display-name: sheldon
homepage: https://sheldon.cli.rs
repo: https://github.com/rossmacarthur/sheldon
docs: https://sheldon.cli.rs
package-manager:
  apk: sheldon
  brew: sheldon
  nix: sheldon
  pacman: sheldon
  zypper: sheldon
package-manager-url: https://formulae.brew.sh/formula/sheldon
version: 0.8.5
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Fast, configurable, shell plugin manager
source-archive: https://github.com/rossmacarthur/sheldon/archive/refs/tags/0.8.5.tar.gz
dependencies:
  - libgit2
  - libssh2
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: sheldon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sheldon
  av: sudo av install brew:sheldon
  brew: brew install sheldon
  nix: nix profile install nixpkgs#sheldon
  pacman: sudo pacman -S sheldon
  zypper: sudo zypper install sheldon
provenance:
  formula: sheldon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
