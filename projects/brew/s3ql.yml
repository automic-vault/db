id: brew:s3ql
display-name: s3ql
homepage: https://github.com/s3ql/s3ql
repo: https://github.com/s3ql/s3ql
docs: https://github.com/s3ql/s3ql
package-manager:
  brew: s3ql
  debian: s3ql
  nix: s3ql
package-manager-url: https://formulae.brew.sh/formula/s3ql
version: 6.1.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: POSIX-compliant FUSE filesystem using object store as block storage
source-archive: https://github.com/s3ql/s3ql/releases/download/s3ql-6.1.0/s3ql-6.1.0.tar.gz
dependencies:
  - certifi
  - cryptography
  - libffi
  - libfuse
  - python@3.14
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fsck.s3ql
  - exposure: global executable
    kind: cli
    name: fsck_s3ql
  - exposure: global executable
    kind: cli
    name: mkfs.s3ql
  - exposure: global executable
    kind: cli
    name: mkfs_s3ql
  - exposure: global executable
    kind: cli
    name: mount.s3ql
  - exposure: global executable
    kind: cli
    name: mount_s3ql
  - exposure: global executable
    kind: cli
    name: s3ql_oauth_client
  - exposure: global executable
    kind: cli
    name: s3ql_verify
  - exposure: global executable
    kind: cli
    name: s3qladm
  - exposure: global executable
    kind: cli
    name: s3qlcp
  - exposure: global executable
    kind: cli
    name: s3qlctrl
  - exposure: global executable
    kind: cli
    name: s3qllock
  - exposure: global executable
    kind: cli
    name: s3qlrm
  - exposure: global executable
    kind: cli
    name: s3qlstat
  - exposure: global executable
    kind: cli
    name: umount.s3ql
  - exposure: global executable
    kind: cli
    name: umount_s3ql
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:s3ql
  brew: brew install s3ql
  debian: sudo apt install s3ql
  nix: nix profile install nixpkgs#s3ql
provenance:
  formula: s3ql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
