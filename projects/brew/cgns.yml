id: brew:cgns
display-name: cgns
homepage: https://cgns.github.io/
repo: https://github.com/CGNS/CGNS
docs: https://cgns.github.io/
package-manager:
  brew: cgns
  nix: cgns
  pacman: cgns
  zypper: cgns
package-manager-url: https://formulae.brew.sh/formula/cgns
version: 4.5.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: CFD General Notation System
source-archive: https://github.com/CGNS/CGNS/archive/refs/tags/v4.5.2.tar.gz
dependencies:
  - gcc
  - hdf5
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: adf2hdf
  - exposure: global executable
    kind: cli
    name: cgnscheck
  - exposure: global executable
    kind: cli
    name: cgnscompress
  - exposure: global executable
    kind: cli
    name: cgnsconvert
  - exposure: global executable
    kind: cli
    name: cgnsdiff
  - exposure: global executable
    kind: cli
    name: cgnslist
  - exposure: global executable
    kind: cli
    name: cgnsnames
  - exposure: global executable
    kind: cli
    name: cgnsupdate
  - exposure: global executable
    kind: cli
    name: hdf2adf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cgns
  brew: brew install cgns
  nix: nix profile install nixpkgs#cgns
  pacman: sudo pacman -S cgns
  zypper: sudo zypper install cgns
provenance:
  formula: cgns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
