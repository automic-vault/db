id: brew:mmctl
display-name: mmctl
homepage: https://github.com/mattermost/mattermost
repo: https://github.com/mattermost/mattermost
docs: https://github.com/mattermost/mattermost
package-manager:
  brew: mmctl
  nix: mmctl
  pacman: mmctl
package-manager-url: https://formulae.brew.sh/formula/mmctl
version: 11.7.2
license: AGPL-3.0-only AND Apache-2.0
category: development
tags:
  - cli
description: Remote CLI tool for Mattermost server
source-archive: https://github.com/mattermost/mattermost/archive/refs/tags/v11.7.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mmctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mmctl
  brew: brew install mmctl
  nix: nix profile install nixpkgs#mmctl
  pacman: sudo pacman -S mmctl
provenance:
  formula: mmctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
