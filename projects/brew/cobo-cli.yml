id: brew:cobo-cli
display-name: cobo-cli
homepage: https://github.com/CoboGlobal/cobo-cli
repo: >
  https://files.pythonhosted.org/packages/31/5a/b46f07b2cb2e0e7583e83873f65ca0f177e1b56d5f5a5f253ba83ab4c9f7/cobo_cli-0.1.8.tar.gz
docs: https://github.com/CoboGlobal/cobo-cli
package-manager:
  brew: cobo-cli
package-manager-url: https://formulae.brew.sh/formula/cobo-cli
version: 0.1.8
license: MIT
category: development
tags:
  - cli
description: Build, test, and manage your integration with Cobo Wallet-as-a-Service
source-archive: >
  https://files.pythonhosted.org/packages/31/5a/b46f07b2cb2e0e7583e83873f65ca0f177e1b56d5f5a5f253ba83ab4c9f7/cobo_cli-0.1.8.tar.gz
dependencies:
  - certifi
  - cffi
  - libsodium
  - libyaml
  - pydantic
  - python@3.14
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: cobo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cobo-cli
  brew: brew install cobo-cli
provenance:
  formula: cobo-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
