id: brew:jrsonnet
display-name: jrsonnet
homepage: https://github.com/CertainLach/jrsonnet
repo: https://github.com/CertainLach/jrsonnet
docs: https://github.com/CertainLach/jrsonnet
package-manager:
  brew: jrsonnet
  nix: jrsonnet
package-manager-url: https://formulae.brew.sh/formula/jrsonnet
version: 0.4.2
license: MIT
category: development
tags:
  - cli
description: Rust implementation of Jsonnet language
source-archive: https://github.com/CertainLach/jrsonnet/archive/refs/tags/v0.4.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: jrsonnet
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jrsonnet
  brew: brew install jrsonnet
  nix: nix profile install nixpkgs#jrsonnet
provenance:
  formula: jrsonnet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
