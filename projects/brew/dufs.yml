id: brew:dufs
display-name: dufs
homepage: https://github.com/sigoden/dufs
repo: https://github.com/sigoden/dufs
docs: https://github.com/sigoden/dufs
package-manager:
  apk: dufs
  brew: dufs
  macports: dufs
  nix: dufs
  scoop: main/dufs
  winget: sigoden.Dufs
package-manager-url: https://formulae.brew.sh/formula/dufs
version: 0.46.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Static file server
source-archive: https://github.com/sigoden/dufs/archive/refs/tags/v0.46.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dufs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dufs
  av: sudo av install brew:dufs
  brew: brew install dufs
  macports: sudo port install dufs
  nix: nix profile install nixpkgs#dufs
  scoop: scoop install main/dufs
  winget: winget install --id sigoden.Dufs -e
provenance:
  formula: dufs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
