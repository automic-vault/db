id: brew:codequery
display-name: codequery
homepage: https://ruben2020.github.io/codequery/
repo: https://github.com/ruben2020/codequery
docs: https://ruben2020.github.io/codequery/
package-manager:
  brew: codequery
  debian: codequery
  ubuntu: codequery
package-manager-url: https://formulae.brew.sh/formula/codequery
version: 1.0.1
license: MPL-2.0
category: development
tags:
  - cli
description: Code-understanding, code-browsing or code-search tool
source-archive: https://github.com/ruben2020/codequery/archive/refs/tags/v1.0.1.tar.gz
dependencies:
  - qt5compat
  - qtbase
  - sqlite
build-dependencies:
  - cmake
  - qttools
executables:
  - exposure: global executable
    kind: cli
    name: codequery
  - exposure: global executable
    kind: cli
    name: cqmakedb
  - exposure: global executable
    kind: cli
    name: cqsearch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:codequery
  brew: brew install codequery
  debian: sudo apt install codequery
  ubuntu: sudo apt install codequery
provenance:
  formula: codequery
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
