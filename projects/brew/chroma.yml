id: brew:chroma
display-name: chroma
homepage: https://github.com/alecthomas/chroma
repo: https://github.com/alecthomas/chroma
docs: https://github.com/alecthomas/chroma
package-manager:
  brew: chroma
  debian: chroma
  nix: chroma
  scoop: main/chroma
  ubuntu: chroma
  winget: Ubisoft.Chroma
package-manager-url: https://formulae.brew.sh/formula/chroma
version: 2.25.0
license: MIT
category: development
tags:
  - cli
description: General purpose syntax highlighter in pure Go
source-archive: https://github.com/alecthomas/chroma/archive/refs/tags/v2.25.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: chroma
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chroma
  brew: brew install chroma
  debian: sudo apt install chroma
  nix: nix profile install nixpkgs#chroma
  scoop: scoop install main/chroma
  ubuntu: sudo apt install chroma
  winget: winget install --id Ubisoft.Chroma -e
provenance:
  formula: chroma
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
