id: brew:libyubikey
display-name: libyubikey
homepage: https://yubico.github.io/yubico-c/
repo: https://developers.yubico.com/yubico-c/Releases/libyubikey-1.13.tar.gz
docs: https://yubico.github.io/yubico-c/
package-manager:
  brew: libyubikey
  dnf: libyubikey
  macports: libyubikey
  nix: libyubikey
package-manager-url: https://formulae.brew.sh/formula/libyubikey
version: 1.13
license: BSD-2-Clause
category: security
tags:
  - cli
description: C library for manipulating Yubico one-time passwords
source-archive: https://developers.yubico.com/yubico-c/Releases/libyubikey-1.13.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: modhex
  - exposure: global executable
    kind: cli
    name: ykgenerate
  - exposure: global executable
    kind: cli
    name: ykparse
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libyubikey
  brew: brew install libyubikey
  dnf: sudo dnf install libyubikey
  macports: sudo port install libyubikey
  nix: nix profile install nixpkgs#libyubikey
provenance:
  formula: libyubikey
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
