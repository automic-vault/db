id: brew:spr
display-name: spr
homepage: https://spacedentist.github.io/spr/
repo: https://github.com/spacedentist/spr
docs: https://spacedentist.github.io/spr/
package-manager:
  brew: spr
  nix: spr
package-manager-url: https://formulae.brew.sh/formula/spr
version: 1.3.7
license: MIT
category: development
tags:
  - cli
description: Submit pull requests for individual, amendable, rebaseable commits to GitHub
source-archive: https://github.com/spacedentist/spr/archive/refs/tags/v1.3.7.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: spr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spr
  brew: brew install spr
  nix: nix profile install nixpkgs#spr
provenance:
  formula: spr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
