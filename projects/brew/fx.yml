id: brew:fx
display-name: fx
homepage: https://fx.wtf
repo: https://github.com/antonmedv/fx
docs: https://fx.wtf
package-manager:
  apk: fx
  brew: fx
  macports: fx
  nix: fx
  pacman: fx
  scoop: main/fx
  zypper: fx
package-manager-url: https://formulae.brew.sh/formula/fx
version: 39.2.0
license: MIT
category: development
tags:
  - cli
  - json
description: Terminal JSON viewer
source-archive: https://github.com/antonmedv/fx/archive/refs/tags/39.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fx
  av: sudo av install brew:fx
  brew: brew install fx
  macports: sudo port install fx
  nix: nix profile install nixpkgs#fx
  pacman: sudo pacman -S fx
  scoop: scoop install main/fx
  zypper: sudo zypper install fx
provenance:
  formula: fx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
