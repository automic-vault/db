id: brew:ccat
display-name: ccat
homepage: https://github.com/owenthereal/ccat
repo: https://github.com/owenthereal/ccat
docs: https://github.com/owenthereal/ccat
package-manager:
  brew: ccat
  scoop: main/ccat
package-manager-url: https://formulae.brew.sh/formula/ccat
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Like cat but displays content with syntax highlighting
source-archive: https://github.com/owenthereal/ccat/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ccat
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ccat
  brew: brew install ccat
  scoop: scoop install main/ccat
provenance:
  formula: ccat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
