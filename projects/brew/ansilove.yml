id: brew:ansilove
display-name: ansilove
homepage: https://www.ansilove.org
repo: https://github.com/ansilove/ansilove
docs: https://www.ansilove.org
package-manager:
  brew: ansilove
  debian: ansilove
  nix: ansilove
  ubuntu: ansilove
  zypper: ansilove
package-manager-url: https://formulae.brew.sh/formula/ansilove
version: 4.2.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: ANSI/ASCII art to PNG converter
source-archive: https://github.com/ansilove/ansilove/releases/download/4.2.1/ansilove-4.2.1.tar.gz
dependencies:
  - libansilove
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ansilove
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ansilove
  brew: brew install ansilove
  debian: sudo apt install ansilove
  nix: nix profile install nixpkgs#ansilove
  ubuntu: sudo apt install ansilove
  zypper: sudo zypper install ansilove
provenance:
  formula: ansilove
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
