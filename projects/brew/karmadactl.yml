id: brew:karmadactl
display-name: karmadactl
homepage: https://karmada.io/
repo: https://github.com/karmada-io/karmada
docs: https://karmada.io/
package-manager:
  brew: karmadactl
package-manager-url: https://formulae.brew.sh/formula/karmadactl
version: 1.17.2
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for Karmada control plane
source-archive: https://github.com/karmada-io/karmada/archive/refs/tags/v1.17.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: karmadactl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:karmadactl
  brew: brew install karmadactl
provenance:
  formula: karmadactl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
