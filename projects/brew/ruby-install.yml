id: brew:ruby-install
display-name: ruby-install
homepage: https://github.com/postmodern/ruby-install
repo: https://github.com/postmodern/ruby-install
docs: https://github.com/postmodern/ruby-install
package-manager:
  brew: ruby-install
  chocolatey: ruby.install
  macports: ruby-install
package-manager-url: https://formulae.brew.sh/formula/ruby-install
version: 0.10.2
license: MIT
category: development
tags:
  - cli
description: Install Ruby, JRuby, Rubinius, TruffleRuby, or mruby
source-archive: >
  https://github.com/postmodern/ruby-install/releases/download/v0.10.2/ruby-install-0.10.2.tar.gz
dependencies:
  - xz
executables:
  - exposure: global executable
    kind: cli
    name: ruby-install
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ruby-install
  brew: brew install ruby-install
  chocolatey: choco install ruby.install
  macports: sudo port install ruby-install
provenance:
  formula: ruby-install
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
