id: brew:cyme
display-name: cyme
homepage: https://github.com/tuna-f1sh/cyme
repo: https://github.com/tuna-f1sh/cyme
docs: https://github.com/tuna-f1sh/cyme
package-manager:
  apk: cyme
  brew: cyme
  debian: cyme
  nix: cyme
  pacman: cyme
  scoop: main/cyme
  winget: tuna-f1sh.cyme
package-manager-url: https://formulae.brew.sh/formula/cyme
version: 2.3.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: List system USB buses and devices
source-archive: https://github.com/tuna-f1sh/cyme/archive/refs/tags/v2.3.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cyme
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cyme
  av: sudo av install brew:cyme
  brew: brew install cyme
  debian: sudo apt install cyme
  nix: nix profile install nixpkgs#cyme
  pacman: sudo pacman -S cyme
  scoop: scoop install main/cyme
  winget: winget install --id tuna-f1sh.cyme -e
provenance:
  formula: cyme
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
