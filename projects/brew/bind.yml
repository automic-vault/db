    kind: cli
    name: named-rrchecker
  - exposure: global executable
    kind: cli
    name: nsec3hash
  - exposure: global executable
    kind: cli
    name: nslookup
  - exposure: global executable
    kind: cli
    name: nsupdate
  - exposure: global executable
    kind: cli
    name: rndc
  - exposure: global executable
    kind: cli
    name: rndc-confgen
  - exposure: global executable
    kind: cli
    name: tsig-keygen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add bind
  av: sudo av install brew:bind
  brew: brew install bind
  dnf: sudo dnf install bind
  nix: nix profile install nixpkgs#bind
  pacman: sudo pacman -S bind
  scoop: scoop install main/bind
  zypper: sudo zypper install bind
provenance:
  formula: bind
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
