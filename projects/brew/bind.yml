id: brew:bind
display-name: bind
homepage: https://www.isc.org/bind/
repo: https://downloads.isc.org/isc/bind9/9.20.23/bind-9.20.23.tar.xz
docs: https://www.isc.org/bind/
package-manager:
  apk: bind
  brew: bind
  dnf: bind
  nix: bind
  pacman: bind
  scoop: main/bind
  zypper: bind
package-manager-url: https://formulae.brew.sh/formula/bind
version: 9.20.23
license: MPL-2.0
category: network
tags:
  - cli
description: Implementation of the DNS protocols
source-archive: https://downloads.isc.org/isc/bind9/9.20.23/bind-9.20.23.tar.xz
dependencies:
  - jemalloc
  - json-c
  - libidn2
  - libnghttp2
  - libuv
  - openssl@3
  - readline
  - userspace-rcu
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: arpaname
  - exposure: global executable
    kind: cli
    name: ddns-confgen
  - exposure: global executable
    kind: cli
    name: delv
