    kind: cli
    name: dnssec-keyfromlabel
  - exposure: global executable
    kind: cli
    name: dnssec-keygen
  - exposure: global executable
    kind: cli
    name: dnssec-ksr
  - exposure: global executable
    kind: cli
    name: dnssec-revoke
  - exposure: global executable
    kind: cli
    name: dnssec-settime
  - exposure: global executable
    kind: cli
    name: dnssec-signzone
  - exposure: global executable
    kind: cli
    name: dnssec-verify
  - exposure: global executable
    kind: cli
    name: host
  - exposure: global executable
    kind: cli
    name: mdig
  - exposure: global executable
    kind: cli
    name: named
  - exposure: global executable
    kind: cli
    name: named-checkconf
  - exposure: global executable
    kind: cli
    name: named-checkzone
  - exposure: global executable
    kind: cli
    name: named-compilezone
