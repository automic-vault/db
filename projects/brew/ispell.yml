id: brew:ispell
display-name: ispell
homepage: https://www.cs.hmc.edu/~geoff/ispell.html
repo: https://www.cs.hmc.edu/~geoff/tars/ispell-3.4.06.tar.gz
docs: https://www.cs.hmc.edu/~geoff/ispell.html
package-manager:
  brew: ispell
  debian: ispell
  macports: ispell
  nix: ispell
  pacman: ispell
  ubuntu: ispell
  zypper: ispell
package-manager-url: https://formulae.brew.sh/formula/ispell
version: 3.4.06
license: LicenseRef-Homebrew-cannot-represent
category: network
tags:
  - cli
description: International Ispell
source-archive: https://www.cs.hmc.edu/~geoff/tars/ispell-3.4.06.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: buildhash
  - exposure: global executable
    kind: cli
    name: defmt-c
  - exposure: global executable
    kind: cli
    name: defmt-sh
  - exposure: global executable
    kind: cli
    name: findaffix
  - exposure: global executable
    kind: cli
    name: icombine
  - exposure: global executable
    kind: cli
    name: ijoin
  - exposure: global executable
    kind: cli
    name: ispell
  - exposure: global executable
    kind: cli
    name: munchlist
  - exposure: global executable
    kind: cli
    name: tryaffix
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ispell
  brew: brew install ispell
  debian: sudo apt install ispell
  macports: sudo port install ispell
  nix: nix profile install nixpkgs#ispell
  pacman: sudo pacman -S ispell
  ubuntu: sudo apt install ispell
  zypper: sudo zypper install ispell
provenance:
  formula: ispell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
