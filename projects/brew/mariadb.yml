bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    A "/etc/my.cnf" from another install may interfere with a Homebrew-built server
    starting up correctly. MySQL is configured to only allow connections from localhost
    by default
  post-install-defined: true
  service: declared
install-lines:
  apk: sudo apk add mariadb
  av: sudo av install brew:mariadb
  brew: brew install mariadb
  chocolatey: choco install mariadb
  debian: sudo apt install mariadb-backup
  dnf: sudo dnf install mariadb
  macports: sudo port install mariadb
  nix: nix profile install nixpkgs#mariadb
  pacman: sudo pacman -S mariadb
  scoop: scoop install main/mariadb
  ubuntu: sudo apt install mariadb-backup
  winget: winget install --id MariaDB.Server -e
  zypper: sudo zypper install mariadb
provenance:
  formula: mariadb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
