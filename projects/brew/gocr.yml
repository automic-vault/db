id: brew:gocr
display-name: gocr
homepage: https://wasd.urz.uni-magdeburg.de/jschulen/ocr/
repo: https://wasd.urz.uni-magdeburg.de/jschulen/ocr/gocr-0.52.tar.gz
docs: https://wasd.urz.uni-magdeburg.de/jschulen/ocr/
package-manager:
  brew: gocr
  debian: gocr
  dnf: gocr
  macports: gocr
  nix: gocr
  pacman: gocr
  ubuntu: gocr
  zypper: gocr
package-manager-url: https://formulae.brew.sh/formula/gocr
version: 0.52
license: GPL-2.0-or-later
category: media
tags:
  - cli
description: Optical Character Recognition (OCR), converts images back to text
source-archive: https://wasd.urz.uni-magdeburg.de/jschulen/ocr/gocr-0.52.tar.gz
dependencies:
  - jpeg-turbo
  - netpbm
executables:
  - exposure: global executable
    kind: cli
    name: gocr
  - exposure: global executable
    kind: cli
    name: gocr.tcl
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gocr
  brew: brew install gocr
  debian: sudo apt install gocr
  dnf: sudo dnf install gocr
  macports: sudo port install gocr
  nix: nix profile install nixpkgs#gocr
  pacman: sudo pacman -S gocr
  ubuntu: sudo apt install gocr
  zypper: sudo zypper install gocr
provenance:
  formula: gocr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
