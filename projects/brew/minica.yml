id: brew:minica
display-name: minica
homepage: https://github.com/jsha/minica
repo: https://github.com/jsha/minica
docs: https://github.com/jsha/minica
package-manager:
  brew: minica
  debian: minica
  nix: minica
  ubuntu: minica
package-manager-url: https://formulae.brew.sh/formula/minica
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Small, simple certificate authority
source-archive: https://github.com/jsha/minica/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: minica
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:minica
  brew: brew install minica
  debian: sudo apt install minica
  nix: nix profile install nixpkgs#minica
  ubuntu: sudo apt install minica
provenance:
  formula: minica
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
