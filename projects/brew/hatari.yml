id: brew:hatari
display-name: hatari
homepage: https://www.hatari-emu.org/
repo: https://framagit.org/hatari/releases/-/raw/main/v2.6.1/hatari-2.6.1.tar.bz2
docs: https://www.hatari-emu.org/
package-manager:
  brew: hatari
  debian: hatari
  dnf: hatari
  macports: hatari
  nix: hatari
  pacman: hatari
  ubuntu: hatari
package-manager-url: https://formulae.brew.sh/formula/hatari
version: 2.6.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Atari ST/STE/TT/Falcon emulator
source-archive: https://framagit.org/hatari/releases/-/raw/main/v2.6.1/hatari-2.6.1.tar.bz2
dependencies:
  - libpng
  - sdl2
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: atari-convert-dir
  - exposure: global executable
    kind: cli
    name: atari-hd-image
  - exposure: global executable
    kind: cli
    name: gst2ascii
  - exposure: global executable
    kind: cli
    name: hatari
  - exposure: global executable
    kind: cli
    name: hatari-prg-args
  - exposure: global executable
    kind: cli
    name: hatari_profile
  - exposure: global executable
    kind: cli
    name: hmsa
  - exposure: global executable
    kind: cli
    name: zip2st
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hatari
  brew: brew install hatari
  debian: sudo apt install hatari
  dnf: sudo dnf install hatari
  macports: sudo port install hatari
  nix: nix profile install nixpkgs#hatari
  pacman: sudo pacman -S hatari
  ubuntu: sudo apt install hatari
provenance:
  formula: hatari
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
