id: brew:omake
display-name: omake
homepage: http://projects.camlcity.org/projects/omake.html
repo: https://github.com/ocaml-omake/omake
docs: http://projects.camlcity.org/projects/omake.html
package-manager:
  brew: omake
  debian: omake
  macports: omake
  nix: omake
  ubuntu: omake
package-manager-url: https://formulae.brew.sh/formula/omake
version: 0.10.7
license: GPL-2.0-only
category: development
tags:
  - cli
description: Build system designed for scalability, portability, and concision
source-archive: https://github.com/ocaml-omake/omake/archive/refs/tags/omake-0.10.7.tar.gz
build-dependencies:
  - ocaml
executables:
  - exposure: global executable
    kind: cli
    name: omake
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:omake
  brew: brew install omake
  debian: sudo apt install omake
  macports: sudo port install omake
  nix: nix profile install nixpkgs#omake
  ubuntu: sudo apt install omake
provenance:
  formula: omake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
