id: brew:iproute2
display-name: iproute2
homepage: https://wiki.linuxfoundation.org/networking/iproute2
repo: https://mirrors.edge.kernel.org/pub/linux/utils/net/iproute2/iproute2-v7.0.0.tar.xz
docs: https://wiki.linuxfoundation.org/networking/iproute2
package-manager:
  apk: iproute2
  brew: iproute2
  debian: iproute2
  nix: iproute2
  pacman: iproute2
  ubuntu: iproute2
  zypper: iproute2
package-manager-url: https://formulae.brew.sh/formula/iproute2
version: 7.0.0
license: GPL-2.0-only
category: network
tags:
  - cli
description: Linux routing utilities
source-archive: https://mirrors.edge.kernel.org/pub/linux/utils/net/iproute2/iproute2-v7.0.0.tar.xz
dependencies:
  - elfutils
  - libbpf
  - libcap
  - libmnl
  - libtirpc
build-dependencies:
  - bison
  - flex
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ctstat
  - exposure: global executable
    kind: cli
    name: dcb
  - exposure: global executable
    kind: cli
    name: devlink
  - exposure: global executable
    kind: cli
    name: dpll
  - exposure: global executable
    kind: cli
    name: genl
  - exposure: global executable
    kind: cli
    name: lnstat
  - exposure: global executable
    kind: cli
    name: netshaper
  - exposure: global executable
    kind: cli
    name: nstat
  - exposure: global executable
    kind: cli
    name: rdma
  - exposure: global executable
    kind: cli
    name: routel
  - exposure: global executable
    kind: cli
    name: rtacct
  - exposure: global executable
    kind: cli
    name: rtmon
  - exposure: global executable
    kind: cli
    name: rtstat
  - exposure: global executable
    kind: cli
    name: tc
  - exposure: global executable
    kind: cli
    name: tipc
  - exposure: global executable
    kind: cli
    name: vdpa
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add iproute2
  av: sudo av install brew:iproute2
  brew: brew install iproute2
  debian: sudo apt install iproute2
  nix: nix profile install nixpkgs#iproute2
  pacman: sudo pacman -S iproute2
  ubuntu: sudo apt install iproute2
  zypper: sudo zypper install iproute2
provenance:
  formula: iproute2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
