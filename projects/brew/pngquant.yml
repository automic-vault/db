id: brew:pngquant
display-name: pngquant
homepage: https://pngquant.org/
repo: https://static.crates.io/crates/pngquant/pngquant-3.0.3.crate
docs: https://pngquant.org/
package-manager:
  apk: pngquant
  brew: pngquant
  chocolatey: pngquant
  debian: pngquant
  dnf: pngquant
  macports: pngquant
  nix: pngquant
  pacman: pngquant
  scoop: main/pngquant
  ubuntu: pngquant
  zypper: pngquant
package-manager-url: https://formulae.brew.sh/formula/pngquant
version: 3.0.3
license: GPL-3.0-or-later AND HPND AND BSD-2-Clause
category: media
tags:
  - cli
description: PNG image optimizing utility
source-archive: https://static.crates.io/crates/pngquant/pngquant-3.0.3.crate
dependencies:
  - libpng
  - little-cms2
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: pngquant
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pngquant
  av: sudo av install brew:pngquant
  brew: brew install pngquant
  chocolatey: choco install pngquant
  debian: sudo apt install pngquant
  dnf: sudo dnf install pngquant
  macports: sudo port install pngquant
  nix: nix profile install nixpkgs#pngquant
  pacman: sudo pacman -S pngquant
  scoop: scoop install main/pngquant
  ubuntu: sudo apt install pngquant
  zypper: sudo zypper install pngquant
provenance:
  formula: pngquant
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
