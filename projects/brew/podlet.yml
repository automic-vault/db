id: brew:podlet
display-name: podlet
homepage: https://github.com/containers/podlet
repo: https://github.com/containers/podlet
docs: https://github.com/containers/podlet
package-manager:
  brew: podlet
  dnf: podlet
  nix: podlet
  pacman: podlet
  zypper: podlet
package-manager-url: https://formulae.brew.sh/formula/podlet
version: 0.3.2
license: MPL-2.0
category: development
tags:
  - cli
description: Generate podman quadlet files from a podman command or compose file
source-archive: https://github.com/containers/podlet/archive/refs/tags/v0.3.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: podlet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:podlet
  brew: brew install podlet
  dnf: sudo dnf install podlet
  nix: nix profile install nixpkgs#podlet
  pacman: sudo pacman -S podlet
  zypper: sudo zypper install podlet
provenance:
  formula: podlet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
