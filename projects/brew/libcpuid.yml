id: brew:libcpuid
display-name: libcpuid
homepage: https://github.com/anrieff/libcpuid
repo: https://github.com/anrieff/libcpuid
docs: https://github.com/anrieff/libcpuid
package-manager:
  apk: libcpuid
  brew: libcpuid
  dnf: libcpuid
  nix: libcpuid
  pacman: libcpuid
package-manager-url: https://formulae.brew.sh/formula/libcpuid
version: 0.8.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: Small C library for x86 CPU detection and feature extraction
source-archive: https://github.com/anrieff/libcpuid/archive/refs/tags/v0.8.1.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: cpuid_tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libcpuid
  av: sudo av install brew:libcpuid
  brew: brew install libcpuid
  dnf: sudo dnf install libcpuid
  nix: nix profile install nixpkgs#libcpuid
  pacman: sudo pacman -S libcpuid
provenance:
  formula: libcpuid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
