id: brew:threemux
display-name: threemux
homepage: https://github.com/aaronjanse/3mux
repo: https://github.com/aaronjanse/3mux
docs: https://github.com/aaronjanse/3mux
package-manager:
  brew: threemux
  macports: 3mux
  nix: _3mux
package-manager-url: https://formulae.brew.sh/formula/threemux
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Terminal multiplexer inspired by i3
source-archive: https://github.com/aaronjanse/3mux/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: 3mux
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:threemux
  brew: brew install threemux
  macports: sudo port install 3mux
  nix: nix profile install nixpkgs#_3mux
provenance:
  formula: threemux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
