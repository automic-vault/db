id: brew:stoken
display-name: stoken
homepage: https://github.com/stoken-dev/stoken
repo: https://github.com/stoken-dev/stoken
docs: https://github.com/stoken-dev/stoken
package-manager:
  apk: stoken
  brew: stoken
  debian: stoken
  nix: stoken
  pacman: stoken
  ubuntu: stoken
  zypper: stoken
package-manager-url: https://formulae.brew.sh/formula/stoken
version: 0.93
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Tokencode generator compatible with RSA SecurID 128-bit (AES)
source-archive: https://github.com/stoken-dev/stoken/archive/refs/tags/v0.93.tar.gz
dependencies:
  - libtomcrypt
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: stoken
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add stoken
  av: sudo av install brew:stoken
  brew: brew install stoken
  debian: sudo apt install stoken
  nix: nix profile install nixpkgs#stoken
  pacman: sudo pacman -S stoken
  ubuntu: sudo apt install stoken
  zypper: sudo zypper install stoken
provenance:
  formula: stoken
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
