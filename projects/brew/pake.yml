id: brew:pake
display-name: pake
homepage: https://github.com/tw93/Pake
repo: https://registry.npmjs.org/pake-cli/-/pake-cli-3.11.7.tgz
docs: https://github.com/tw93/Pake
package-manager:
  brew: pake
package-manager-url: https://formulae.brew.sh/formula/pake
version: 3.11.7
license: MIT
category: development
tags:
  - cli
description: Turn any webpage into a desktop app with Rust with ease
source-archive: https://registry.npmjs.org/pake-cli/-/pake-cli-3.11.7.tgz
dependencies:
  - node
  - pnpm
  - rust
  - vips
executables:
  - exposure: global executable
    kind: cli
    name: pake
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pake
  brew: brew install pake
provenance:
  formula: pake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
