id: brew:gobuster
display-name: gobuster
homepage: https://github.com/OJ/gobuster
repo: https://github.com/OJ/gobuster
docs: https://github.com/OJ/gobuster
package-manager:
  apk: gobuster
  brew: gobuster
  debian: gobuster
  dnf: gobuster
  macports: gobuster
  nix: gobuster
  pacman: gobuster
  scoop: main/gobuster
  ubuntu: gobuster
package-manager-url: https://formulae.brew.sh/formula/gobuster
version: 3.8.2
license: Apache-2.0
category: development
tags:
  - cli
description: Directory/file & DNS busting tool written in Go
source-archive: https://github.com/OJ/gobuster/archive/refs/tags/v3.8.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gobuster
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gobuster
  av: sudo av install brew:gobuster
  brew: brew install gobuster
  debian: sudo apt install gobuster
  dnf: sudo dnf install gobuster
  macports: sudo port install gobuster
  nix: nix profile install nixpkgs#gobuster
  pacman: sudo pacman -S gobuster
  scoop: scoop install main/gobuster
  ubuntu: sudo apt install gobuster
provenance:
  formula: gobuster
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
