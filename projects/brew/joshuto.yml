id: brew:joshuto
display-name: joshuto
homepage: https://github.com/kamiyaa/joshuto
repo: https://github.com/kamiyaa/joshuto
docs: https://github.com/kamiyaa/joshuto
package-manager:
  brew: joshuto
  macports: joshuto
  nix: joshuto
package-manager-url: https://formulae.brew.sh/formula/joshuto
version: 0.9.9
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Ranger-like terminal file manager written in Rust
source-archive: https://github.com/kamiyaa/joshuto/archive/refs/tags/v0.9.9.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: joshuto
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:joshuto
  brew: brew install joshuto
  macports: sudo port install joshuto
  nix: nix profile install nixpkgs#joshuto
provenance:
  formula: joshuto
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
