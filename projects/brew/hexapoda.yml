id: brew:hexapoda
display-name: hexapoda
homepage: https://simonomi.dev/hexapoda
repo: https://github.com/simonomi/hexapoda
docs: https://simonomi.dev/hexapoda
package-manager:
  brew: hexapoda
package-manager-url: https://formulae.brew.sh/formula/hexapoda
version: 0.2.3
license: GPL-3.0-only
category: development
tags:
  - cli
description: Colorful modal hex editor
source-archive: https://github.com/simonomi/hexapoda/archive/refs/tags/v0.2.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hexapoda
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hexapoda
  brew: brew install hexapoda
provenance:
  formula: hexapoda
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
