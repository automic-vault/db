id: brew:tin
display-name: tin
homepage: http://www.tin.org
repo: https://sunsite.icm.edu.pl/pub/unix/news/tin/v2.6/tin-2.6.5.tar.xz
docs: http://www.tin.org
package-manager:
  apk: tin
  brew: tin
  debian: tin
  dnf: tin
  macports: tin
  ubuntu: tin
  zypper: tin
package-manager-url: https://formulae.brew.sh/formula/tin
version: 2.6.5
license: BSD-3-Clause
category: network
tags:
  - cli
description: Threaded, NNTP-, and spool-based UseNet newsreader
source-archive: https://sunsite.icm.edu.pl/pub/unix/news/tin/v2.6/tin-2.6.5.tar.xz
dependencies:
  - gettext
  - libunistring
  - pcre2
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: metamutt
  - exposure: global executable
    kind: cli
    name: opt-case.pl
  - exposure: global executable
    kind: cli
    name: rtin
  - exposure: global executable
    kind: cli
    name: tin
  - exposure: global executable
    kind: cli
    name: tinews.pl
  - exposure: global executable
    kind: cli
    name: url_handler.pl
  - exposure: global executable
    kind: cli
    name: w2r.pl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tin
  av: sudo av install brew:tin
  brew: brew install tin
  debian: sudo apt install tin
  dnf: sudo dnf install tin
  macports: sudo port install tin
  ubuntu: sudo apt install tin
  zypper: sudo zypper install tin
provenance:
  formula: tin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
