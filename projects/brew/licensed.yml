id: brew:licensed
display-name: licensed
homepage: https://github.com/licensee/licensed
repo: https://github.com/licensee/licensed
docs: https://github.com/licensee/licensed
package-manager:
  brew: licensed
  nix: licensed
package-manager-url: https://formulae.brew.sh/formula/licensed
version: 5.1.0
license: MIT
category: development
tags:
  - cli
description: Cache and verify the licenses of dependencies
source-archive: https://github.com/licensee/licensed.git
dependencies:
  - ruby
  - xz
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: licensed
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:licensed
  brew: brew install licensed
  nix: nix profile install nixpkgs#licensed
provenance:
  formula: licensed
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
