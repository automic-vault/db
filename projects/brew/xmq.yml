id: brew:xmq
display-name: xmq
homepage: https://libxmq.org
repo: https://github.com/libxmq/xmq
docs: https://libxmq.org
package-manager:
  brew: xmq
package-manager-url: https://formulae.brew.sh/formula/xmq
version: 4.2.0
license: MIT
category: development
tags:
  - cli
  - json
description: Tool and language to work with xml/html/json
source-archive: https://github.com/libxmq/xmq/archive/refs/tags/4.2.0.tar.gz
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: xmq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xmq
  brew: brew install xmq
provenance:
  formula: xmq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
