id: brew:kwok
display-name: kwok
homepage: https://kwok.sigs.k8s.io
repo: https://github.com/kubernetes-sigs/kwok
docs: https://kwok.sigs.k8s.io
package-manager:
  brew: kwok
  nix: kwok
  winget: Kubernetes.kwok
package-manager-url: https://formulae.brew.sh/formula/kwok
version: 0.7.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes WithOut Kubelet - Simulates thousands of Nodes and Clusters
source-archive: https://github.com/kubernetes-sigs/kwok/archive/refs/tags/v0.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kwok
  - exposure: global executable
    kind: cli
    name: kwokctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kwok
  brew: brew install kwok
  nix: nix profile install nixpkgs#kwok
  winget: winget install --id Kubernetes.kwok -e
provenance:
  formula: kwok
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
