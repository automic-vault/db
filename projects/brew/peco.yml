id: brew:peco
display-name: peco
homepage: https://github.com/peco/peco
repo: https://github.com/peco/peco
docs: https://github.com/peco/peco
package-manager:
  brew: peco
  debian: peco
  macports: peco
  nix: peco
  pacman: peco
  scoop: main/peco
  ubuntu: peco
  winget: peco.peco
package-manager-url: https://formulae.brew.sh/formula/peco
version: 0.6.0
license: MIT
category: development
tags:
  - cli
description: Simplistic interactive filtering tool
source-archive: https://github.com/peco/peco/archive/refs/tags/v0.6.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: peco
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:peco
  brew: brew install peco
  debian: sudo apt install peco
  macports: sudo port install peco
  nix: nix profile install nixpkgs#peco
  pacman: sudo pacman -S peco
  scoop: scoop install main/peco
  ubuntu: sudo apt install peco
  winget: winget install --id peco.peco -e
provenance:
  formula: peco
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
