id: brew:zabbix
display-name: zabbix
homepage: https://www.zabbix.com/
repo: https://cdn.zabbix.com/zabbix/sources/stable/7.4/zabbix-7.4.10.tar.gz
docs: https://www.zabbix.com/
package-manager:
  apk: zabbix
  brew: zabbix
  debian: zabbix-sender
  dnf: zabbix
  nix: zabbix
package-manager-url: https://formulae.brew.sh/formula/zabbix
version: 7.4.10
license: AGPL-3.0-only
category: network
tags:
  - cli
description: Availability and monitoring solution
source-archive: https://cdn.zabbix.com/zabbix/sources/stable/7.4/zabbix-7.4.10.tar.gz
dependencies:
  - openssl@4
  - pcre2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: zabbix_agentd
  - exposure: global executable
    kind: cli
    name: zabbix_get
  - exposure: global executable
    kind: cli
    name: zabbix_sender
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zabbix
  av: sudo av install brew:zabbix
  brew: brew install zabbix
  debian: sudo apt install zabbix-sender
  dnf: sudo dnf install zabbix
  nix: nix profile install nixpkgs#zabbix
provenance:
  formula: zabbix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
