id: brew:marmite
display-name: marmite
homepage: https://rochacbruno.github.io/marmite/
repo: https://github.com/rochacbruno/marmite
docs: https://rochacbruno.github.io/marmite/
package-manager:
  brew: marmite
  nix: marmite
package-manager-url: https://formulae.brew.sh/formula/marmite
version: 0.3.1
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Static Site Generator for Blogs using Markdown
source-archive: https://github.com/rochacbruno/marmite/archive/refs/tags/0.3.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: marmite
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:marmite
  brew: brew install marmite
  nix: nix profile install nixpkgs#marmite
provenance:
  formula: marmite
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
