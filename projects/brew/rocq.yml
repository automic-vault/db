id: brew:rocq
display-name: rocq
homepage: https://rocq-prover.org/
repo: https://github.com/rocq-prover/rocq
docs: https://rocq-prover.org/
package-manager:
  apk: rocq
  brew: rocq
  dnf: rocq
  pacman: rocq
  zypper: rocq
package-manager-url: https://formulae.brew.sh/formula/rocq
version: 9.1.1
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Proof assistant for higher-order logic
source-archive: https://github.com/rocq-prover/rocq/releases/download/V9.1.1/rocq-9.1.1.tar.gz
dependencies:
  - gmp
  - ocaml
  - ocaml-findlib
  - ocaml-zarith
build-dependencies:
  - dune
executables:
  - exposure: global executable
    kind: cli
    name: coq-tex
  - exposure: global executable
    kind: cli
    name: coq_makefile
  - exposure: global executable
    kind: cli
    name: coqc
  - exposure: global executable
    kind: cli
    name: coqchk
  - exposure: global executable
    kind: cli
    name: coqdep
  - exposure: global executable
    kind: cli
    name: coqdoc
  - exposure: global executable
    kind: cli
    name: coqidetop
  - exposure: global executable
    kind: cli
    name: coqnative
  - exposure: global executable
    kind: cli
    name: coqpp
  - exposure: global executable
    kind: cli
    name: coqtop
  - exposure: global executable
    kind: cli
    name: coqtop.byte
  - exposure: global executable
    kind: cli
    name: coqwc
  - exposure: global executable
    kind: cli
    name: coqworkmgr
  - exposure: global executable
    kind: cli
    name: csdpcert
  - exposure: global executable
    kind: cli
    name: ocamllibdep
  - exposure: global executable
    kind: cli
    name: rocq
  - exposure: global executable
    kind: cli
    name: rocq.byte
  - exposure: global executable
    kind: cli
    name: rocqchk
  - exposure: global executable
    kind: cli
    name: votour
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rocq
  av: sudo av install brew:rocq
  brew: brew install rocq
  dnf: sudo dnf install rocq
  pacman: sudo pacman -S rocq
  zypper: sudo zypper install rocq
provenance:
  formula: rocq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
