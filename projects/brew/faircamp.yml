id: brew:faircamp
display-name: faircamp
homepage: https://codeberg.org/simonrepp/faircamp
repo: https://codeberg.org/simonrepp/faircamp/archive/1.7.0.tar.gz
docs: https://codeberg.org/simonrepp/faircamp
package-manager:
  apk: faircamp
  brew: faircamp
  nix: faircamp
package-manager-url: https://formulae.brew.sh/formula/faircamp
version: 1.7.0
license: AGPL-3.0-or-later
category: media
tags:
  - cli
description: Static site generator for audio producers
source-archive: https://codeberg.org/simonrepp/faircamp/archive/1.7.0.tar.gz
dependencies:
  - ffmpeg
  - gettext
  - glib
  - opus
  - vips
  - xz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: faircamp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add faircamp
  av: sudo av install brew:faircamp
  brew: brew install faircamp
  nix: nix profile install nixpkgs#faircamp
provenance:
  formula: faircamp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
