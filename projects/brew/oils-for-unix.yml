id: brew:oils-for-unix
display-name: oils-for-unix
homepage: https://oils.pub/
repo: https://oils.pub/download/oils-for-unix-0.37.0.tar.gz
docs: https://oils.pub/
package-manager:
  apk: oils-for-unix
  brew: oils-for-unix
  nix: oils-for-unix
  pacman: oils-for-unix
  zypper: oils-for-unix
package-manager-url: https://formulae.brew.sh/formula/oils-for-unix
version: 0.37.0
license: Apache-2.0
category: network
tags:
  - cli
description: Bash-compatible Unix shell with more consistent syntax and semantics
source-archive: https://oils.pub/download/oils-for-unix-0.37.0.tar.gz
dependencies:
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: oils-for-unix
  - exposure: global executable
    kind: cli
    name: osh
  - exposure: global executable
    kind: cli
    name: ysh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add oils-for-unix
  av: sudo av install brew:oils-for-unix
  brew: brew install oils-for-unix
  nix: nix profile install nixpkgs#oils-for-unix
  pacman: sudo pacman -S oils-for-unix
  zypper: sudo zypper install oils-for-unix
provenance:
  formula: oils-for-unix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
