id: brew:attr
display-name: attr
homepage: https://savannah.nongnu.org/projects/attr
repo: https://download.savannah.nongnu.org/releases/attr/attr-2.5.2.tar.gz
docs: https://savannah.nongnu.org/projects/attr
package-manager:
  apk: attr
  brew: attr
  debian: attr
  dnf: attr
  nix: attr
  pacman: attr
  ubuntu: attr
  zypper: attr
package-manager-url: https://formulae.brew.sh/formula/attr
version: 2.5.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Manipulate filesystem extended attributes
source-archive: https://download.savannah.nongnu.org/releases/attr/attr-2.5.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: attr
  - exposure: global executable
    kind: cli
    name: getfattr
  - exposure: global executable
    kind: cli
    name: setfattr
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add attr
  av: sudo av install brew:attr
  brew: brew install attr
  debian: sudo apt install attr
  dnf: sudo dnf install attr
  nix: nix profile install nixpkgs#attr
  pacman: sudo pacman -S attr
  ubuntu: sudo apt install attr
  zypper: sudo zypper install attr
provenance:
  formula: attr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
