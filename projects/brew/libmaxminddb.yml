id: brew:libmaxminddb
display-name: libmaxminddb
homepage: https://github.com/maxmind/libmaxminddb
repo: https://github.com/maxmind/libmaxminddb
docs: https://github.com/maxmind/libmaxminddb
package-manager:
  apk: libmaxminddb
  brew: libmaxminddb
  dnf: libmaxminddb
  macports: libmaxminddb
  nix: libmaxminddb
  pacman: libmaxminddb
  zypper: mmdblookup
package-manager-url: https://formulae.brew.sh/formula/libmaxminddb
version: 1.13.3
license: Apache-2.0
category: development
tags:
  - cli
description: C library for the MaxMind DB file format
source-archive: >
  https://github.com/maxmind/libmaxminddb/releases/download/1.13.3/libmaxminddb-1.13.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mmdblookup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libmaxminddb
  av: sudo av install brew:libmaxminddb
  brew: brew install libmaxminddb
  dnf: sudo dnf install libmaxminddb
  macports: sudo port install libmaxminddb
  nix: nix profile install nixpkgs#libmaxminddb
  pacman: sudo pacman -S libmaxminddb
  zypper: sudo zypper install mmdblookup
provenance:
  formula: libmaxminddb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
