id: brew:sv2v
display-name: sv2v
homepage: https://github.com/zachjs/sv2v
repo: https://github.com/zachjs/sv2v
docs: https://github.com/zachjs/sv2v
package-manager:
  brew: sv2v
package-manager-url: https://formulae.brew.sh/formula/sv2v
version: 0.0.13
license: BSD-3-Clause
category: development
tags:
  - cli
description: SystemVerilog to Verilog conversion
source-archive: https://github.com/zachjs/sv2v/archive/refs/tags/v0.0.13.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: sv2v
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sv2v
  brew: brew install sv2v
provenance:
  formula: sv2v
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
