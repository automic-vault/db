id: brew:unpaper
display-name: unpaper
homepage: https://www.flameeyes.com/projects/unpaper
repo: https://www.flameeyes.com/files/unpaper-7.0.0.tar.xz
docs: https://www.flameeyes.com/projects/unpaper
package-manager:
  apk: unpaper
  brew: unpaper
  debian: unpaper
  dnf: unpaper
  macports: unpaper
  nix: unpaper
  pacman: unpaper
  ubuntu: unpaper
  zypper: unpaper
package-manager-url: https://formulae.brew.sh/formula/unpaper
version: 7.0.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Post-processing for scanned/photocopied books
source-archive: https://www.flameeyes.com/files/unpaper-7.0.0.tar.xz
dependencies:
  - ffmpeg
build-dependencies:
  - meson
  - ninja
  - pkgconf
  - sphinx-doc
executables:
  - exposure: global executable
    kind: cli
    name: unpaper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add unpaper
  av: sudo av install brew:unpaper
  brew: brew install unpaper
  debian: sudo apt install unpaper
  dnf: sudo dnf install unpaper
  macports: sudo port install unpaper
  nix: nix profile install nixpkgs#unpaper
  pacman: sudo pacman -S unpaper
  ubuntu: sudo apt install unpaper
  zypper: sudo zypper install unpaper
provenance:
  formula: unpaper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
