id: brew:sysstat
display-name: sysstat
homepage: https://sysstat.github.io/
repo: https://github.com/sysstat/sysstat
docs: https://sysstat.github.io/
package-manager:
  apk: sysstat
  brew: sysstat
  debian: sysstat
  dnf: sysstat
  nix: sysstat
  pacman: sysstat
  ubuntu: sysstat
  zypper: sysstat
package-manager-url: https://formulae.brew.sh/formula/sysstat
version: 12.7.9
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Performance monitoring tools for Linux
source-archive: https://github.com/sysstat/sysstat/archive/refs/tags/v12.7.9.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: cifsiostat
  - exposure: global executable
    kind: cli
    name: iostat
  - exposure: global executable
    kind: cli
    name: mpstat
  - exposure: global executable
    kind: cli
    name: pidstat
  - exposure: global executable
    kind: cli
    name: sadf
  - exposure: global executable
    kind: cli
    name: sar
  - exposure: global executable
    kind: cli
    name: tapestat
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sysstat
  av: sudo av install brew:sysstat
  brew: brew install sysstat
  debian: sudo apt install sysstat
  dnf: sudo dnf install sysstat
  nix: nix profile install nixpkgs#sysstat
  pacman: sudo pacman -S sysstat
  ubuntu: sudo apt install sysstat
  zypper: sudo zypper install sysstat
provenance:
  formula: sysstat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
