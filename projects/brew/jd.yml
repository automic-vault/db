id: brew:jd
display-name: jd
homepage: https://github.com/josephburnett/jd
repo: https://github.com/josephburnett/jd
docs: https://github.com/josephburnett/jd
package-manager:
  brew: jd
  dnf: jd
  macports: jd
  scoop: extras/jd
  winget: josephburnett.jd
package-manager-url: https://formulae.brew.sh/formula/jd
version: 2.5.0
license: MIT
category: development
tags:
  - cli
  - json
description: JSON diff and patch
source-archive: https://github.com/josephburnett/jd/archive/refs/tags/v2.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jd
  brew: brew install jd
  dnf: sudo dnf install jd
  macports: sudo port install jd
  scoop: scoop install extras/jd
  winget: winget install --id josephburnett.jd -e
provenance:
  formula: jd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
