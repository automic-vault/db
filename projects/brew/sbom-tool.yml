id: brew:sbom-tool
display-name: sbom-tool
homepage: https://github.com/microsoft/sbom-tool
repo: https://github.com/microsoft/sbom-tool
docs: https://github.com/microsoft/sbom-tool
package-manager:
  brew: sbom-tool
  nix: sbom-tool
  scoop: extras/sbom-tool
  winget: Microsoft.SBOMTool
package-manager-url: https://formulae.brew.sh/formula/sbom-tool
version: 4.1.5
license: MIT
category: development
tags:
  - cli
description: Scalable and enterprise ready tool to create SBOMs for any variety of artifacts
source-archive: https://github.com/microsoft/sbom-tool/archive/refs/tags/v4.1.5.tar.gz
dependencies:
  - dotnet@8
executables:
  - exposure: global executable
    kind: cli
    name: sbom-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sbom-tool
  brew: brew install sbom-tool
  nix: nix profile install nixpkgs#sbom-tool
  scoop: scoop install extras/sbom-tool
  winget: winget install --id Microsoft.SBOMTool -e
provenance:
  formula: sbom-tool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
