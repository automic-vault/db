id: brew:redwax-tool
display-name: redwax-tool
homepage: https://redwax.eu/rt/
repo: https://redwax.eu/dist/rt/redwax-tool-1.0.0.tar.bz2
docs: https://redwax.eu/rt/
package-manager:
  brew: redwax-tool
  dnf: redwax-tool
  macports: redwax-tool
  nix: redwax-tool
package-manager-url: https://formulae.brew.sh/formula/redwax-tool
version: 1.0.0
license: Apache-2.0
category: network
tags:
  - cli
description: Universal certificate conversion tool
source-archive: https://redwax.eu/dist/rt/redwax-tool-1.0.0.tar.bz2
dependencies:
  - apr
  - apr-util
  - ldns
  - libical
  - nspr
  - nss
  - openssl@3
  - p11-kit
  - unbound
build-dependencies:
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: redwax-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:redwax-tool
  brew: brew install redwax-tool
  dnf: sudo dnf install redwax-tool
  macports: sudo port install redwax-tool
  nix: nix profile install nixpkgs#redwax-tool
provenance:
  formula: redwax-tool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
