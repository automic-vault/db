id: brew:xmlrpc-c
display-name: xmlrpc-c
homepage: https://xmlrpc-c.sourceforge.io/
repo: >
  https://downloads.sourceforge.net/project/xmlrpc-c/Xmlrpc-c%20Super%20Stable/1.64.03/xmlrpc-1.64.03.tgz
docs: https://xmlrpc-c.sourceforge.io/
package-manager:
  apk: xmlrpc-c
  brew: xmlrpc-c
  dnf: xmlrpc-c
  macports: xmlrpc-c
  nix: xmlrpc_c
package-manager-url: https://formulae.brew.sh/formula/xmlrpc-c
version: 1.64.03
license: BSD-3-Clause
category: network
tags:
  - cli
description: Lightweight RPC library (based on XML and HTTP)
source-archive: >
  https://downloads.sourceforge.net/project/xmlrpc-c/Xmlrpc-c%20Super%20Stable/1.64.03/xmlrpc-1.64.03.tgz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: xmlrpc-c-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xmlrpc-c
  av: sudo av install brew:xmlrpc-c
  brew: brew install xmlrpc-c
  dnf: sudo dnf install xmlrpc-c
  macports: sudo port install xmlrpc-c
  nix: nix profile install nixpkgs#xmlrpc_c
provenance:
  formula: xmlrpc-c
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
