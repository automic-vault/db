id: brew:atari800
display-name: atari800
homepage: https://atari800.github.io/
repo: https://github.com/atari800/atari800
docs: https://atari800.github.io/
package-manager:
  apk: atari800
  brew: atari800
  debian: atari800
  dnf: atari800
  macports: atari800
  nix: atari800
  ubuntu: atari800
package-manager-url: https://formulae.brew.sh/formula/atari800
version: 5.2.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Atari 8-bit machine emulator
source-archive: >
  https://github.com/atari800/atari800/releases/download/ATARI800_5_2_0/atari800-5.2.0-src.tgz
dependencies:
  - libpng
  - sdl12-compat
executables:
  - exposure: global executable
    kind: cli
    name: atari800
  - exposure: global executable
    kind: cli
    name: cart
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add atari800
  av: sudo av install brew:atari800
  brew: brew install atari800
  debian: sudo apt install atari800
  dnf: sudo dnf install atari800
  macports: sudo port install atari800
  nix: nix profile install nixpkgs#atari800
  ubuntu: sudo apt install atari800
provenance:
  formula: atari800
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
