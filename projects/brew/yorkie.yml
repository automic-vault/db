id: brew:yorkie
display-name: yorkie
homepage: https://yorkie.dev/
repo: https://github.com/yorkie-team/yorkie
docs: https://yorkie.dev/
package-manager:
  brew: yorkie
package-manager-url: https://formulae.brew.sh/formula/yorkie
version: 0.7.10
license: Apache-2.0
category: development
tags:
  - cli
description: Document store for collaborative applications
source-archive: https://github.com/yorkie-team/yorkie/archive/refs/tags/v0.7.10.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: yorkie
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:yorkie
  brew: brew install yorkie
provenance:
  formula: yorkie
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
