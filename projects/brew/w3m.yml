id: brew:w3m
display-name: w3m
homepage: https://w3m.sourceforge.net/
repo: https://git.sr.ht/~rkta/w3m/archive/v0.5.6.tar.gz
docs: https://w3m.sourceforge.net/
package-manager:
  apk: w3m
  brew: w3m
  debian: w3m
  dnf: w3m
  macports: w3m
  nix: w3m
  pacman: w3m
  ubuntu: w3m
  zypper: w3m
package-manager-url: https://formulae.brew.sh/formula/w3m
version: 0.5.6
license: w3m
category: development
tags:
  - cli
description: Pager/text based browser
source-archive: https://git.sr.ht/~rkta/w3m/archive/v0.5.6.tar.gz
dependencies:
  - bdw-gc
  - gettext
  - openssl@3
build-dependencies:
  - gettext
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: w3m
  - exposure: global executable
    kind: cli
    name: w3mman
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add w3m
  av: sudo av install brew:w3m
  brew: brew install w3m
  debian: sudo apt install w3m
  dnf: sudo dnf install w3m
  macports: sudo port install w3m
  nix: nix profile install nixpkgs#w3m
  pacman: sudo pacman -S w3m
  ubuntu: sudo apt install w3m
  zypper: sudo zypper install w3m
provenance:
  formula: w3m
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
