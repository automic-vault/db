id: brew:jqp
display-name: jqp
homepage: https://github.com/noahgorstein/jqp
repo: https://github.com/noahgorstein/jqp
docs: https://github.com/noahgorstein/jqp
package-manager:
  brew: jqp
  debian: jqp
  macports: jqp
  nix: jqp
  scoop: extras/jqp
  ubuntu: jqp
package-manager-url: https://formulae.brew.sh/formula/jqp
version: 0.8.0
license: MIT
category: development
tags:
  - cli
description: TUI playground to experiment and play with jq
source-archive: https://github.com/noahgorstein/jqp/archive/refs/tags/v0.8.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jqp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jqp
  brew: brew install jqp
  debian: sudo apt install jqp
  macports: sudo port install jqp
  nix: nix profile install nixpkgs#jqp
  scoop: scoop install extras/jqp
  ubuntu: sudo apt install jqp
provenance:
  formula: jqp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
