id: brew:dockviz
display-name: dockviz
homepage: https://github.com/justone/dockviz
repo: https://github.com/justone/dockviz
docs: https://github.com/justone/dockviz
package-manager:
  apk: dockviz
  brew: dockviz
package-manager-url: https://formulae.brew.sh/formula/dockviz
version: 0.6.4
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: Visualizing docker data
source-archive: https://github.com/justone/dockviz/archive/refs/tags/v0.6.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dockviz
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dockviz
  av: sudo av install brew:dockviz
  brew: brew install dockviz
provenance:
  formula: dockviz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
