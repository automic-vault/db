id: brew:bareos-client
display-name: bareos-client
homepage: https://www.bareos.com/
repo: https://github.com/bareos/bareos
docs: https://www.bareos.com/
package-manager:
  brew: bareos-client
package-manager-url: https://formulae.brew.sh/formula/bareos-client
version: 25.0.3
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Client for Bareos (Backup Archiving REcovery Open Sourced)
source-archive: https://github.com/bareos/bareos/archive/refs/tags/Release/25.0.3.tar.gz
dependencies:
  - gettext
  - jansson
  - lzo
  - openssl@3
  - readline
  - xxhash
build-dependencies:
  - cli11
  - cmake
  - cpp-gsl
  - fmt
  - utf8cpp
executables:
  - exposure: global executable
    kind: cli
    name: bareos-fd
  - exposure: global executable
    kind: cli
    name: bconsole
  - exposure: global executable
    kind: cli
    name: btraceback
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
  service: declared
install-lines:
  av: sudo av install brew:bareos-client
  brew: brew install bareos-client
provenance:
  formula: bareos-client
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
