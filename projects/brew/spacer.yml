id: brew:spacer
display-name: spacer
homepage: https://github.com/samwho/spacer
repo: https://github.com/samwho/spacer
docs: https://github.com/samwho/spacer
package-manager:
  apk: spacer
  brew: spacer
  dnf: spacer
  nix: spacer
package-manager-url: https://formulae.brew.sh/formula/spacer
version: 0.5.0
license: MIT
category: development
tags:
  - cli
description: Small command-line utility for adding spacers to command output
source-archive: https://github.com/samwho/spacer/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: spacer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add spacer
  av: sudo av install brew:spacer
  brew: brew install spacer
  dnf: sudo dnf install spacer
  nix: nix profile install nixpkgs#spacer
provenance:
  formula: spacer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
