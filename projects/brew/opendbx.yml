id: brew:opendbx
display-name: opendbx
homepage: https://linuxnetworks.de/doc/index.php/OpenDBX
repo: https://linuxnetworks.de/opendbx/download/opendbx-1.4.6.tar.gz
docs: https://linuxnetworks.de/doc/index.php/OpenDBX
package-manager:
  apk: opendbx
  brew: opendbx
  dnf: opendbx
  nix: opendbx
  pacman: opendbx
package-manager-url: https://formulae.brew.sh/formula/opendbx
version: 1.4.6
license: LGPL-2.0-or-later
category: database
tags:
  - cli
  - database
description: Lightweight but extensible database access library in C
source-archive: https://linuxnetworks.de/opendbx/download/opendbx-1.4.6.tar.gz
dependencies:
  - readline
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: odbx-sql
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add opendbx
  av: sudo av install brew:opendbx
  brew: brew install opendbx
  dnf: sudo dnf install opendbx
  nix: nix profile install nixpkgs#opendbx
  pacman: sudo pacman -S opendbx
provenance:
  formula: opendbx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
