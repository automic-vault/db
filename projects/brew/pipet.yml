id: brew:pipet
display-name: pipet
homepage: https://github.com/bjesus/pipet
repo: https://github.com/bjesus/pipet
docs: https://github.com/bjesus/pipet
package-manager:
  brew: pipet
  nix: pipet
package-manager-url: https://formulae.brew.sh/formula/pipet
version: 0.3.0
license: MIT
category: development
tags:
  - cli
description: Swiss-army tool for web scraping, made for hackers
source-archive: https://github.com/bjesus/pipet/archive/refs/tags/0.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pipet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pipet
  brew: brew install pipet
  nix: nix profile install nixpkgs#pipet
provenance:
  formula: pipet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
