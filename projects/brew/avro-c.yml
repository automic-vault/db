id: brew:avro-c
display-name: avro-c
homepage: https://avro.apache.org/
repo: https://www.apache.org/dyn/closer.lua?path=avro/avro-1.12.1/c/avro-c-1.12.1.tar.gz
docs: https://avro.apache.org/
package-manager:
  brew: avro-c
  nix: avro-c
package-manager-url: https://formulae.brew.sh/formula/avro-c
version: 1.12.1
license: Apache-2.0
category: network
tags:
  - cli
description: Data serialization system
source-archive: https://www.apache.org/dyn/closer.lua?path=avro/avro-1.12.1/c/avro-c-1.12.1.tar.gz
dependencies:
  - jansson
  - snappy
  - xz
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: avroappend
  - exposure: global executable
    kind: cli
    name: avrocat
  - exposure: global executable
    kind: cli
    name: avromod
  - exposure: global executable
    kind: cli
    name: avropipe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:avro-c
  brew: brew install avro-c
  nix: nix profile install nixpkgs#avro-c
provenance:
  formula: avro-c
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
