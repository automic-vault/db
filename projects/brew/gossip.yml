id: brew:gossip
display-name: gossip
homepage: https://github.com/mikedilger/gossip
repo: https://github.com/mikedilger/gossip
docs: https://github.com/mikedilger/gossip
package-manager:
  apk: gossip
  brew: gossip
  nix: gossip
  scoop: extras/gossip
package-manager-url: https://formulae.brew.sh/formula/gossip
version: 0.14.0
license: MIT
category: development
tags:
  - cli
description: Desktop client for Nostr written in Rust
source-archive: https://github.com/mikedilger/gossip.git
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gossip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gossip
  av: sudo av install brew:gossip
  brew: brew install gossip
  nix: nix profile install nixpkgs#gossip
  scoop: scoop install extras/gossip
provenance:
  formula: gossip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
