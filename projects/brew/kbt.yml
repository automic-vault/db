id: brew:kbt
display-name: kbt
homepage: https://github.com/bloznelis/kbt
repo: https://github.com/bloznelis/kbt
docs: https://github.com/bloznelis/kbt
package-manager:
  brew: kbt
  nix: kbt
  pacman: kbt
package-manager-url: https://formulae.brew.sh/formula/kbt
version: 2.1.0
license: MIT
category: development
tags:
  - cli
description: Keyboard tester in terminal
source-archive: https://github.com/bloznelis/kbt/archive/refs/tags/2.1.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: kbt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kbt
  brew: brew install kbt
  nix: nix profile install nixpkgs#kbt
  pacman: sudo pacman -S kbt
provenance:
  formula: kbt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
