id: brew:git-secret
display-name: git-secret
homepage: https://sobolevn.me/git-secret
repo: https://github.com/sobolevn/git-secret
docs: https://sobolevn.me/git-secret
package-manager:
  apk: git-secret
  brew: git-secret
  debian: git-secret
  dnf: git-secret
  macports: git-secret
  nix: git-secret
  ubuntu: git-secret
package-manager-url: https://formulae.brew.sh/formula/git-secret
version: 0.5.0
license: MIT
category: security
tags:
  - cli
  - git
description: Bash-tool to store the private data inside a git repo
source-archive: https://github.com/sobolevn/git-secret/archive/refs/tags/v0.5.0.tar.gz
dependencies:
  - gawk
  - gnupg
executables:
  - exposure: global executable
    kind: cli
    name: git-secret
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-secret
  av: sudo av install brew:git-secret
  brew: brew install git-secret
  debian: sudo apt install git-secret
  dnf: sudo dnf install git-secret
  macports: sudo port install git-secret
  nix: nix profile install nixpkgs#git-secret
  ubuntu: sudo apt install git-secret
provenance:
  formula: git-secret
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
