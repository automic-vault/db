id: brew:mufetch
display-name: mufetch
homepage: https://github.com/ashish0kumar/mufetch
repo: https://github.com/ashish0kumar/mufetch
docs: https://github.com/ashish0kumar/mufetch
package-manager:
  brew: mufetch
  nix: mufetch
package-manager-url: https://formulae.brew.sh/formula/mufetch
version: 0.1.1
license: MIT
category: development
tags:
  - cli
description: Neofetch-style music cli
source-archive: https://github.com/ashish0kumar/mufetch/archive/refs/tags/v0.1.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mufetch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mufetch
  brew: brew install mufetch
  nix: nix profile install nixpkgs#mufetch
provenance:
  formula: mufetch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
