id: brew:cairo
display-name: cairo
homepage: https://cairographics.org/
repo: https://cairographics.org/releases/cairo-1.18.4.tar.xz
docs: https://cairographics.org/
package-manager:
  apk: cairo
  brew: cairo
  dnf: cairo
  macports: cairo
  nix: cairo
  pacman: cairo
package-manager-url: https://formulae.brew.sh/formula/cairo
version: 1.18.4
license: LGPL-2.1-only OR MPL-1.1
category: network
tags:
  - cli
description: Vector graphics library with cross-device output support
source-archive: https://cairographics.org/releases/cairo-1.18.4.tar.xz
dependencies:
  - fontconfig
  - freetype
  - gettext
  - glib
  - libpng
  - libx11
  - libxcb
  - libxext
  - libxrender
  - lzo
  - pixman
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cairo-trace
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cairo
  av: sudo av install brew:cairo
  brew: brew install cairo
  dnf: sudo dnf install cairo
  macports: sudo port install cairo
  nix: nix profile install nixpkgs#cairo
  pacman: sudo pacman -S cairo
provenance:
  formula: cairo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
