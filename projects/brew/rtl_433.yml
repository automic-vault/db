id: brew:rtl_433
display-name: rtl_433
homepage: https://github.com/merbanan/rtl_433
repo: https://github.com/merbanan/rtl_433
docs: https://github.com/merbanan/rtl_433
package-manager:
  apk: rtl_433
  brew: rtl_433
  debian: rtl-433
  dnf: rtl-433
  macports: rtl_433
  nix: rtl_433
  pacman: rtl_433
  ubuntu: rtl-433
  winget: BenjaminLarsson.Rtl_433
  zypper: rtl_433
package-manager-url: https://formulae.brew.sh/formula/rtl_433
version: 25.12
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Program to decode radio transmissions from devices
source-archive: https://github.com/merbanan/rtl_433/archive/refs/tags/25.12.tar.gz
dependencies:
  - librtlsdr
  - libusb
  - openssl@3
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rtl_433
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rtl_433
  av: sudo av install brew:rtl_433
  brew: brew install rtl_433
  debian: sudo apt install rtl-433
  dnf: sudo dnf install rtl-433
  macports: sudo port install rtl_433
  nix: nix profile install nixpkgs#rtl_433
  pacman: sudo pacman -S rtl_433
  ubuntu: sudo apt install rtl-433
  winget: winget install --id BenjaminLarsson.Rtl_433 -e
  zypper: sudo zypper install rtl_433
provenance:
  formula: rtl_433
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
