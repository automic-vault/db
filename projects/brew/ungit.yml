id: brew:ungit
display-name: ungit
homepage: https://github.com/FredrikNoren/ungit
repo: https://github.com/FredrikNoren/ungit
docs: https://github.com/FredrikNoren/ungit
package-manager:
  brew: ungit
  nix: ungit
  scoop: extras/ungit
package-manager-url: https://formulae.brew.sh/formula/ungit
version: 1.5.30
license: MIT
category: development
tags:
  - cli
  - git
description: Easiest way to use Git. On any platform. Anywhere
source-archive: https://github.com/FredrikNoren/ungit/archive/refs/tags/v1.5.30.tar.gz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: 0ungit-credentials-helper
  - exposure: global executable
    kind: cli
    name: ungit
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ungit
  brew: brew install ungit
  nix: nix profile install nixpkgs#ungit
  scoop: scoop install extras/ungit
provenance:
  formula: ungit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
