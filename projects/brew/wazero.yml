id: brew:wazero
display-name: wazero
homepage: https://wazero.io
repo: https://github.com/tetratelabs/wazero
docs: https://wazero.io
package-manager:
  apk: wazero
  brew: wazero
  nix: wazero
  winget: Tetrate.wazero
  zypper: wazero
package-manager-url: https://formulae.brew.sh/formula/wazero
version: 1.11.0
license: Apache-2.0
category: development
tags:
  - cli
description: Zero dependency WebAssembly runtime
source-archive: https://github.com/tetratelabs/wazero/archive/refs/tags/v1.11.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wazero
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wazero
  av: sudo av install brew:wazero
  brew: brew install wazero
  nix: nix profile install nixpkgs#wazero
  winget: winget install --id Tetrate.wazero -e
  zypper: sudo zypper install wazero
provenance:
  formula: wazero
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
