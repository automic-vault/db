id: brew:surelog
display-name: surelog
homepage: https://github.com/chipsalliance/Surelog
repo: https://github.com/chipsalliance/Surelog
docs: https://github.com/chipsalliance/Surelog
package-manager:
  brew: surelog
  nix: surelog
package-manager-url: https://formulae.brew.sh/formula/surelog
version: 1.86
license: Apache-2.0
category: development
tags:
  - cli
description: SystemVerilog Pre-processor, parser, elaborator, UHDM compiler
source-archive: https://github.com/chipsalliance/Surelog/archive/refs/tags/v1.86.tar.gz
dependencies:
  - antlr4-cpp-runtime
  - capnp
  - uhdm
build-dependencies:
  - antlr
  - cmake
  - nlohmann-json
  - openjdk
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: surelog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:surelog
  brew: brew install surelog
  nix: nix profile install nixpkgs#surelog
provenance:
  formula: surelog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
