id: brew:isync
display-name: isync
homepage: https://isync.sourceforge.io/
repo: https://downloads.sourceforge.net/project/isync/isync/1.5.1/isync-1.5.1.tar.gz
docs: https://isync.sourceforge.io/
package-manager:
  apk: isync
  brew: isync
  debian: isync
  dnf: isync
  macports: isync
  nix: isync
  pacman: isync
  ubuntu: isync
  zypper: isync
package-manager-url: https://formulae.brew.sh/formula/isync
version: 1.5.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Synchronize a maildir with an IMAP server
source-archive: https://downloads.sourceforge.net/project/isync/isync/1.5.1/isync-1.5.1.tar.gz
dependencies:
  - berkeley-db@5
  - openssl@3
uses-from-macos:
  - cyrus-sasl
executables:
  - exposure: global executable
    kind: cli
    name: mbsync
  - exposure: global executable
    kind: cli
    name: mbsync-get-cert
  - exposure: global executable
    kind: cli
    name: mdconvert
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add isync
  av: sudo av install brew:isync
  brew: brew install isync
  debian: sudo apt install isync
  dnf: sudo dnf install isync
  macports: sudo port install isync
  nix: nix profile install nixpkgs#isync
  pacman: sudo pacman -S isync
  ubuntu: sudo apt install isync
  zypper: sudo zypper install isync
provenance:
  formula: isync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
