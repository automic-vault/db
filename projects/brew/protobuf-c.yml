id: brew:protobuf-c
display-name: protobuf-c
homepage: https://github.com/protobuf-c/protobuf-c
repo: https://github.com/protobuf-c/protobuf-c
docs: https://github.com/protobuf-c/protobuf-c
package-manager:
  apk: protobuf-c
  brew: protobuf-c
  dnf: protobuf-c
  macports: protobuf-c
  pacman: protobuf-c
package-manager-url: https://formulae.brew.sh/formula/protobuf-c
version: 1.5.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: Protocol buffers library
source-archive: >
  https://github.com/protobuf-c/protobuf-c/releases/download/v1.5.2/protobuf-c-1.5.2.tar.gz
dependencies:
  - abseil
  - protobuf
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: protoc-c
  - exposure: global executable
    kind: cli
    name: protoc-gen-c
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add protobuf-c
  av: sudo av install brew:protobuf-c
  brew: brew install protobuf-c
  dnf: sudo dnf install protobuf-c
  macports: sudo port install protobuf-c
  pacman: sudo pacman -S protobuf-c
provenance:
  formula: protobuf-c
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
