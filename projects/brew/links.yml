id: brew:links
display-name: links
homepage: https://links.twibright.com/
repo: https://links.twibright.com/download/links-2.30.tar.bz2
docs: https://links.twibright.com/
package-manager:
  apk: links
  brew: links
  debian: links
  dnf: links
  macports: links
  pacman: links
  scoop: main/links
  ubuntu: links
  zypper: links
package-manager-url: https://formulae.brew.sh/formula/links
version: 2.30
license: GPL-2.0-or-later WITH cryptsetup-OpenSSL-exception
category: network
tags:
  - cli
description: Lynx-like WWW browser that supports tables, menus, etc.
source-archive: https://links.twibright.com/download/links-2.30.tar.bz2
dependencies:
  - openssl@4
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: links
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add links
  av: sudo av install brew:links
  brew: brew install links
  debian: sudo apt install links
  dnf: sudo dnf install links
  macports: sudo port install links
  pacman: sudo pacman -S links
  scoop: scoop install main/links
  ubuntu: sudo apt install links
  zypper: sudo zypper install links
provenance:
  formula: links
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
