id: brew:cdargs
display-name: cdargs
homepage: https://github.com/cbxbiker61/cdargs
repo: https://github.com/cbxbiker61/cdargs
docs: https://github.com/cbxbiker61/cdargs
package-manager:
  brew: cdargs
  debian: cdargs
  dnf: cdargs
  macports: cdargs
  ubuntu: cdargs
package-manager-url: https://formulae.brew.sh/formula/cdargs
version: 2.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Directory bookmarking system - Enhanced cd utilities
source-archive: https://github.com/cbxbiker61/cdargs/archive/refs/tags/2.1.tar.gz
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cdargs
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Support files for bash, tcsh, and emacs have been installed to:
    $HOMEBREW_CELLAR/cdargs/2.1/contrib
  post-install-defined: false
install-lines:
  av: sudo av install brew:cdargs
  brew: brew install cdargs
  debian: sudo apt install cdargs
  dnf: sudo dnf install cdargs
  macports: sudo port install cdargs
  ubuntu: sudo apt install cdargs
provenance:
  formula: cdargs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
