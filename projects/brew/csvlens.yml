id: brew:csvlens
display-name: csvlens
homepage: https://github.com/YS-L/csvlens
repo: https://github.com/YS-L/csvlens
docs: https://github.com/YS-L/csvlens
package-manager:
  brew: csvlens
  macports: csvlens
  nix: csvlens
  pacman: csvlens
  scoop: main/csvlens
  winget: YS-L.csvlens
package-manager-url: https://formulae.brew.sh/formula/csvlens
version: 0.15.1
license: MIT
category: development
tags:
  - cli
description: Command-line csv viewer
source-archive: https://github.com/YS-L/csvlens/archive/refs/tags/v0.15.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: csvlens
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:csvlens
  brew: brew install csvlens
  macports: sudo port install csvlens
  nix: nix profile install nixpkgs#csvlens
  pacman: sudo pacman -S csvlens
  scoop: scoop install main/csvlens
  winget: winget install --id YS-L.csvlens -e
provenance:
  formula: csvlens
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
