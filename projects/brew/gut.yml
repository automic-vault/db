id: brew:gut
display-name: gut
homepage: https://gut-cli.dev/
repo: https://github.com/julien040/gut
docs: https://gut-cli.dev/
package-manager:
  brew: gut
  nix: gut
  scoop: main/gut
package-manager-url: https://formulae.brew.sh/formula/gut
version: 0.3.2
license: MIT
category: development
tags:
  - cli
  - git
description: Beginner friendly porcelain for git
source-archive: https://github.com/julien040/gut/archive/refs/tags/0.3.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gut
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gut
  brew: brew install gut
  nix: nix profile install nixpkgs#gut
  scoop: scoop install main/gut
provenance:
  formula: gut
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
