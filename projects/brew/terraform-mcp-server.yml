id: brew:terraform-mcp-server
display-name: terraform-mcp-server
homepage: https://github.com/hashicorp/terraform-mcp-server
repo: https://github.com/hashicorp/terraform-mcp-server
docs: https://github.com/hashicorp/terraform-mcp-server
package-manager:
  brew: terraform-mcp-server
  nix: terraform-mcp-server
package-manager-url: https://formulae.brew.sh/formula/terraform-mcp-server
version: 0.5.2
license: MPL-2.0
category: cloud
tags:
  - cli
description: MCP server for Terraform
source-archive: https://github.com/hashicorp/terraform-mcp-server/archive/refs/tags/v0.5.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terraform-mcp-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
