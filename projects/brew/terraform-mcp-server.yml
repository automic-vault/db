install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terraform-mcp-server
  brew: brew install terraform-mcp-server
  nix: nix profile install nixpkgs#terraform-mcp-server
provenance:
  formula: terraform-mcp-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
