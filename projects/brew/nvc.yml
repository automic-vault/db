id: brew:nvc
display-name: nvc
homepage: https://www.nickg.me.uk/nvc/
repo: https://github.com/nickg/nvc
docs: https://www.nickg.me.uk/nvc/
package-manager:
  brew: nvc
  nix: nvc
package-manager-url: https://formulae.brew.sh/formula/nvc
version: 1.21.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: VHDL compiler and simulator
source-archive: https://github.com/nickg/nvc/releases/download/r1.21.0/nvc-1.21.0.tar.gz
dependencies:
  - llvm
  - zstd
build-dependencies:
  - check
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: nvc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nvc
  brew: brew install nvc
  nix: nix profile install nixpkgs#nvc
provenance:
  formula: nvc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
