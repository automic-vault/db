id: brew:ed
display-name: ed
homepage: https://www.gnu.org/software/ed/ed.html
repo: https://ftpmirror.gnu.org/gnu/ed/ed-1.22.5.tar.lz
docs: https://www.gnu.org/software/ed/ed.html
package-manager:
  apk: ed
  brew: ed
  debian: ed
  dnf: ed
  macports: ed
  nix: ed
  pacman: ed
  scoop: main/red
  ubuntu: ed
  zypper: ed
package-manager-url: https://formulae.brew.sh/formula/ed
version: 1.22.5
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Classic UNIX line editor
source-archive: https://ftpmirror.gnu.org/gnu/ed/ed-1.22.5.tar.lz
executables:
  - exposure: global executable
    kind: cli
    name: ed
  - exposure: global executable
    kind: cli
    name: red
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    All commands have been installed with the prefix "g". If you need to use these
    commands with their normal names, you can add a "gnubin" directory to your PATH from
    your bashrc like: PATH="$HOMEBREW_PREFIX/opt/ed/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add ed
  av: sudo av install brew:ed
  brew: brew install ed
  debian: sudo apt install ed
  dnf: sudo dnf install ed
  macports: sudo port install ed
  nix: nix profile install nixpkgs#ed
  pacman: sudo pacman -S ed
  scoop: scoop install main/red
  ubuntu: sudo apt install ed
  zypper: sudo zypper install ed
provenance:
  formula: ed
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
