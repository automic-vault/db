id: brew:vapoursynth
display-name: vapoursynth
homepage: https://www.vapoursynth.com
repo: https://github.com/vapoursynth/vapoursynth
docs: https://www.vapoursynth.com
package-manager:
  brew: vapoursynth
  macports: vapoursynth
  nix: vapoursynth
  pacman: vapoursynth
  scoop: main/vapoursynth
  winget: VapourSynth.VapourSynth
package-manager-url: https://formulae.brew.sh/formula/vapoursynth
version: 76
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Video processing framework with simplicity in mind
source-archive: https://github.com/vapoursynth/vapoursynth/archive/refs/tags/R76.tar.gz
dependencies:
  - python@3.14
  - zimg
build-dependencies:
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: vapoursynth
  - exposure: global executable
    kind: cli
    name: vspipe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This formula does not contain optional filters that require extra dependencies. To
    use vapoursynth.core.bs, execute: brew install vapoursynth-bestsource To use
    vapoursynth.core.ocr, execute: brew install vapoursynth-ocr To use
    vapoursynth.core.sub, execute: brew install vapoursynth-sub To use
    vapoursynth.core.ffms2, execute: brew install ffms2 For more information regarding
    plugins, please visit:
    https://www.vapoursynth.com/doc/installation.html#plugins-and-scripts
  post-install-defined: false
install-lines:
  av: sudo av install brew:vapoursynth
  brew: brew install vapoursynth
  macports: sudo port install vapoursynth
  nix: nix profile install nixpkgs#vapoursynth
  pacman: sudo pacman -S vapoursynth
  scoop: scoop install main/vapoursynth
  winget: winget install --id VapourSynth.VapourSynth -e
provenance:
  formula: vapoursynth
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
