id: brew:grin-wallet
display-name: grin-wallet
homepage: https://grin.mw
repo: https://github.com/mimblewimble/grin-wallet
docs: https://grin.mw
package-manager:
  brew: grin-wallet
package-manager-url: https://formulae.brew.sh/formula/grin-wallet
version: 5.3.3
license: Apache-2.0
category: security
tags:
  - cli
description: Official wallet for the cryptocurrency Grin
source-archive: https://github.com/mimblewimble/grin-wallet/archive/refs/tags/v5.3.3.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: grin-wallet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:grin-wallet
  brew: brew install grin-wallet
provenance:
  formula: grin-wallet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
