id: brew:zola
display-name: zola
homepage: https://www.getzola.org/
repo: https://github.com/getzola/zola
docs: https://www.getzola.org/
package-manager:
  apk: zola
  brew: zola
  macports: zola
  nix: zola
  pacman: zola
  scoop: main/zola
  winget: getzola.zola
  zypper: zola
package-manager-url: https://formulae.brew.sh/formula/zola
version: 0.22.1
license: EUPL-1.2
category: development
tags:
  - cli
description: Fast static site generator in a single binary with everything built-in
source-archive: https://github.com/getzola/zola/archive/refs/tags/v0.22.1.tar.gz
dependencies:
  - oniguruma
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: zola
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zola
  av: sudo av install brew:zola
  brew: brew install zola
  macports: sudo port install zola
  nix: nix profile install nixpkgs#zola
  pacman: sudo pacman -S zola
  scoop: scoop install main/zola
  winget: winget install --id getzola.zola -e
  zypper: sudo zypper install zola
provenance:
  formula: zola
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
