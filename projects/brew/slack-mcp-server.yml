id: brew:slack-mcp-server
display-name: slack-mcp-server
homepage: https://github.com/korotovsky/slack-mcp-server
repo: https://github.com/korotovsky/slack-mcp-server
docs: https://github.com/korotovsky/slack-mcp-server
package-manager:
  brew: slack-mcp-server
package-manager-url: https://formulae.brew.sh/formula/slack-mcp-server
version: 1.3.0
license: MIT
category: development
tags:
  - cli
description: Powerful MCP Slack Server with multiple transports and smart history fetch logic
source-archive: https://github.com/korotovsky/slack-mcp-server/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: slack-mcp-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:slack-mcp-server
  brew: brew install slack-mcp-server
provenance:
  formula: slack-mcp-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
