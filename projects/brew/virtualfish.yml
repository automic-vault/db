id: brew:virtualfish
display-name: virtualfish
homepage: https://virtualfish.readthedocs.io/en/latest/
repo: >
  https://files.pythonhosted.org/packages/1f/4e/343d044d61e80a44163d15ad2f6ca20eca0cb4fef4058caf8e5e55fc3dd9/virtualfish-2.5.9.tar.gz
docs: https://virtualfish.readthedocs.io/en/latest/
package-manager:
  brew: virtualfish
package-manager-url: https://formulae.brew.sh/formula/virtualfish
version: 2.5.9
license: MIT
category: network
tags:
  - cli
description: Python virtual environment manager for the fish shell
source-archive: >
  https://files.pythonhosted.org/packages/1f/4e/343d044d61e80a44163d15ad2f6ca20eca0cb4fef4058caf8e5e55fc3dd9/virtualfish-2.5.9.tar.gz
dependencies:
  - fish
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: vf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'To activate virtualfish, run the following in a fish shell: vf install'
  post-install-defined: false
install-lines:
  av: sudo av install brew:virtualfish
  brew: brew install virtualfish
provenance:
  formula: virtualfish
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
