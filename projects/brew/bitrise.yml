id: brew:bitrise
display-name: bitrise
homepage: https://github.com/bitrise-io/bitrise
repo: https://github.com/bitrise-io/bitrise
docs: https://github.com/bitrise-io/bitrise
package-manager:
  brew: bitrise
  nix: bitrise
package-manager-url: https://formulae.brew.sh/formula/bitrise
version: 2.40.3
license: MIT
category: development
tags:
  - cli
description: Command-line automation tool
source-archive: https://github.com/bitrise-io/bitrise/archive/refs/tags/v2.40.3.tar.gz
build-dependencies:
  - go
uses-from-macos:
  - rsync
executables:
  - exposure: global executable
    kind: cli
    name: bitrise
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bitrise
  brew: brew install bitrise
  nix: nix profile install nixpkgs#bitrise
provenance:
  formula: bitrise
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
