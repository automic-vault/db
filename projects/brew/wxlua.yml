id: brew:wxlua
display-name: wxlua
homepage: https://github.com/pkulchenko/wxlua
repo: https://github.com/pkulchenko/wxlua
docs: https://github.com/pkulchenko/wxlua
package-manager:
  brew: wxlua
  macports: wxLua
  zypper: wxlua
package-manager-url: https://formulae.brew.sh/formula/wxlua
version: 3.2.0.2
license: LGPL-2.0-or-later WITH WxWindows-exception-3.1
category: development
tags:
  - cli
description: Lua bindings for wxWidgets cross-platform GUI toolkit
source-archive: https://github.com/pkulchenko/wxlua/archive/refs/tags/v3.2.0.2.tar.gz
dependencies:
  - lua@5.4
  - wxwidgets@3.2
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: wxLua
  - exposure: global executable
    kind: cli
    name: wxLuaCan
  - exposure: global executable
    kind: cli
    name: wxLuaFreeze
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wxlua
  brew: brew install wxlua
  macports: sudo port install wxLua
  zypper: sudo zypper install wxlua
provenance:
  formula: wxlua
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
