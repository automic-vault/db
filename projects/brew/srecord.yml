id: brew:srecord
display-name: srecord
homepage: https://srecord.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/srecord/srecord/1.65/srecord-1.65.0-Source.tar.gz
docs: https://srecord.sourceforge.net/
package-manager:
  brew: srecord
  debian: srecord
  dnf: srecord
  macports: srecord
  nix: srecord
  scoop: main/srecord
  ubuntu: srecord
  zypper: srecord
package-manager-url: https://formulae.brew.sh/formula/srecord
version: 1.65.0
license: GPL-3.0-or-later AND LGPL-3.0-or-later
category: network
tags:
  - cli
description: Tools for manipulating EPROM load files
source-archive: >
  https://downloads.sourceforge.net/project/srecord/srecord/1.65/srecord-1.65.0-Source.tar.gz
dependencies:
  - libgcrypt
build-dependencies:
  - cmake
  - coreutils
  - doxygen
  - ghostscript
  - graphviz
  - groff
  - libpaper
  - netpbm
  - psutils
executables:
  - exposure: global executable
    kind: cli
    name: srec_cat
  - exposure: global executable
    kind: cli
    name: srec_cmp
  - exposure: global executable
    kind: cli
    name: srec_info
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:srecord
  brew: brew install srecord
  debian: sudo apt install srecord
  dnf: sudo dnf install srecord
  macports: sudo port install srecord
  nix: nix profile install nixpkgs#srecord
  scoop: scoop install main/srecord
  ubuntu: sudo apt install srecord
  zypper: sudo zypper install srecord
provenance:
  formula: srecord
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
