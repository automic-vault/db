id: brew:kyma-cli
display-name: kyma-cli
homepage: https://kyma-project.io
repo: https://github.com/kyma-project/cli
docs: https://kyma-project.io
package-manager:
  brew: kyma-cli
  chocolatey: kyma-cli
package-manager-url: https://formulae.brew.sh/formula/kyma-cli
version: 3.5.0
license: Apache-2.0
category: development
tags:
  - cli
description: Kyma command-line interface
source-archive: https://github.com/kyma-project/cli/archive/refs/tags/3.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kyma
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kyma-cli
  brew: brew install kyma-cli
  chocolatey: choco install kyma-cli
provenance:
  formula: kyma-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
