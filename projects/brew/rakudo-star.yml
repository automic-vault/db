bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rakudo-star
  av: sudo av install brew:rakudo-star
  brew: brew install rakudo-star
  debian: sudo apt install nqp
  dnf: sudo dnf install nqp
  macports: sudo port install nqp
  nix: nix profile install nixpkgs#nqp
  scoop: scoop install main/rakudo-star
  ubuntu: sudo apt install nqp
  winget: winget install --id Rakudo.Rakudo.Star -e
  zypper: sudo zypper install nqp
provenance:
  formula: rakudo-star
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
