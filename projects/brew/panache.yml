id: brew:panache
display-name: panache
homepage: https://panache.bz
repo: https://github.com/jolars/panache
docs: https://panache.bz
package-manager:
  brew: panache
  nix: panache
package-manager-url: https://formulae.brew.sh/formula/panache
version: 2.49.0
license: MIT
category: development
tags:
  - cli
description: Language server, formatter, and linter for Markdown, Quarto, and R Markdown
source-archive: https://github.com/jolars/panache/archive/refs/tags/v2.49.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: panache
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:panache
  brew: brew install panache
  nix: nix profile install nixpkgs#panache
provenance:
  formula: panache
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
