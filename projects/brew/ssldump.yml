id: brew:ssldump
display-name: ssldump
homepage: https://adulau.github.io/ssldump/
repo: https://github.com/adulau/ssldump
docs: https://adulau.github.io/ssldump/
package-manager:
  apk: ssldump
  brew: ssldump
  debian: ssldump
  dnf: ssldump
  macports: ssldump
  nix: ssldump
  ubuntu: ssldump
  zypper: ssldump
package-manager-url: https://formulae.brew.sh/formula/ssldump
version: 1.9
license: BSD-4-Clause
category: security
tags:
  - cli
description: SSLv3/TLS network protocol analyzer
source-archive: https://github.com/adulau/ssldump/archive/refs/tags/v1.9.tar.gz
dependencies:
  - json-c
  - libnet
  - libpcap
  - openssl@3
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ssldump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ssldump
  av: sudo av install brew:ssldump
  brew: brew install ssldump
  debian: sudo apt install ssldump
  dnf: sudo dnf install ssldump
  macports: sudo port install ssldump
  nix: nix profile install nixpkgs#ssldump
  ubuntu: sudo apt install ssldump
  zypper: sudo zypper install ssldump
provenance:
  formula: ssldump
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
