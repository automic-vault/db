id: brew:rekor-cli
display-name: rekor-cli
homepage: https://docs.sigstore.dev/logging/overview/
repo: https://github.com/sigstore/rekor
docs: https://docs.sigstore.dev/logging/overview/
package-manager:
  brew: rekor-cli
package-manager-url: https://formulae.brew.sh/formula/rekor-cli
version: 1.5.2
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for interacting with Rekor
source-archive: https://github.com/sigstore/rekor/archive/refs/tags/v1.5.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rekor-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rekor-cli
  brew: brew install rekor-cli
provenance:
  formula: rekor-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
