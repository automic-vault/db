id: brew:todoist-cli-go
display-name: todoist-cli-go
homepage: https://github.com/sachaos/todoist
repo: https://github.com/sachaos/todoist
docs: https://github.com/sachaos/todoist
package-manager:
  brew: todoist-cli-go
  chocolatey: todoist
  nix: todoist
  winget: Doist.Todoist
package-manager-url: https://formulae.brew.sh/formula/todoist-cli-go
version: 0.24.0
license: MIT
category: development
tags:
  - cli
description: CLI for Todoist
source-archive: https://github.com/sachaos/todoist/archive/refs/tags/v0.24.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: todoist
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This formula was renamed from "todoist-cli" to "todoist-cli-go" to free up the
    "todoist-cli" name for the official Doist CLI
    (https://github.com/Doist/todoist-cli).
  post-install-defined: false
install-lines:
  av: sudo av install brew:todoist-cli-go
  brew: brew install todoist-cli-go
  chocolatey: choco install todoist
  nix: nix profile install nixpkgs#todoist
  winget: winget install --id Doist.Todoist -e
provenance:
  formula: todoist-cli-go
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
