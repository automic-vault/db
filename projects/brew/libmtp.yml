id: brew:libmtp
display-name: libmtp
homepage: https://libmtp.sourceforge.net/
repo: https://downloads.sourceforge.net/project/libmtp/libmtp/1.1.23/libmtp-1.1.23.tar.gz
docs: https://libmtp.sourceforge.net/
package-manager:
  apk: libmtp
  brew: libmtp
  dnf: libmtp
  macports: libmtp
  nix: libmtp
  pacman: libmtp
package-manager-url: https://formulae.brew.sh/formula/libmtp
version: 1.1.23
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Implementation of Microsoft's Media Transfer Protocol (MTP)
source-archive: https://downloads.sourceforge.net/project/libmtp/libmtp/1.1.23/libmtp-1.1.23.tar.gz
dependencies:
  - libusb
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mtp-albumart
  - exposure: global executable
    kind: cli
    name: mtp-albums
  - exposure: global executable
    kind: cli
    name: mtp-connect
  - exposure: global executable
    kind: cli
    name: mtp-delfile
  - exposure: global executable
    kind: cli
    name: mtp-detect
  - exposure: global executable
    kind: cli
    name: mtp-emptyfolders
  - exposure: global executable
    kind: cli
    name: mtp-files
  - exposure: global executable
    kind: cli
    name: mtp-filetree
  - exposure: global executable
    kind: cli
    name: mtp-folders
  - exposure: global executable
    kind: cli
    name: mtp-format
  - exposure: global executable
    kind: cli
    name: mtp-getfile
  - exposure: global executable
    kind: cli
    name: mtp-getplaylist
  - exposure: global executable
    kind: cli
    name: mtp-hotplug
  - exposure: global executable
    kind: cli
    name: mtp-newfolder
  - exposure: global executable
    kind: cli
    name: mtp-newplaylist
  - exposure: global executable
    kind: cli
    name: mtp-playlists
  - exposure: global executable
    kind: cli
    name: mtp-reset
  - exposure: global executable
    kind: cli
    name: mtp-sendfile
  - exposure: global executable
    kind: cli
    name: mtp-sendtr
  - exposure: global executable
    kind: cli
    name: mtp-thumb
  - exposure: global executable
    kind: cli
    name: mtp-tracks
  - exposure: global executable
    kind: cli
    name: mtp-trexist
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libmtp
  av: sudo av install brew:libmtp
  brew: brew install libmtp
  dnf: sudo dnf install libmtp
  macports: sudo port install libmtp
  nix: nix profile install nixpkgs#libmtp
  pacman: sudo pacman -S libmtp
provenance:
  formula: libmtp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
