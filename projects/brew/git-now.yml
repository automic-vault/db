id: brew:git-now
display-name: git-now
homepage: https://github.com/iwata/git-now
repo: https://github.com/iwata/git-now
docs: https://github.com/iwata/git-now
package-manager:
  brew: git-now
package-manager-url: https://formulae.brew.sh/formula/git-now
version: 0.1.1.0
license: GPL-2.0-only
category: development
tags:
