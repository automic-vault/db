id: brew:countdown
display-name: countdown
homepage: https://github.com/antonmedv/countdown
repo: https://github.com/antonmedv/countdown
docs: https://github.com/antonmedv/countdown
package-manager:
  brew: countdown
package-manager-url: https://formulae.brew.sh/formula/countdown
version: 1.5.0
license: MIT
category: development
tags:
  - cli
description: Terminal countdown timer
source-archive: https://github.com/antonmedv/countdown/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: countdown
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:countdown
  brew: brew install countdown
provenance:
  formula: countdown
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
