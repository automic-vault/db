id: brew:devcockpit
display-name: devcockpit
homepage: https://devcockpit.app/
repo: https://github.com/caioricciuti/dev-cockpit
docs: https://devcockpit.app/
package-manager:
  brew: devcockpit
package-manager-url: https://formulae.brew.sh/formula/devcockpit
version: 2.1.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: TUI system monitor for Apple Silicon
source-archive: https://github.com/caioricciuti/dev-cockpit/archive/refs/tags/v2.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: devcockpit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:devcockpit
  brew: brew install devcockpit
provenance:
  formula: devcockpit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
