id: brew:mcfly
display-name: mcfly
homepage: https://github.com/cantino/mcfly
repo: https://github.com/cantino/mcfly
docs: https://github.com/cantino/mcfly
package-manager:
  apk: mcfly
  brew: mcfly
  macports: mcfly
  nix: mcfly
  pacman: mcfly
  scoop: main/mcfly
  winget: AndrewCantino.McFly
  zypper: mcfly
package-manager-url: https://formulae.brew.sh/formula/mcfly
version: 0.9.4
license: MIT
category: development
tags:
  - cli
description: Fly through your shell history
source-archive: https://github.com/cantino/mcfly/archive/refs/tags/v0.9.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mcfly
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mcfly
  av: sudo av install brew:mcfly
  brew: brew install mcfly
  macports: sudo port install mcfly
  nix: nix profile install nixpkgs#mcfly
  pacman: sudo pacman -S mcfly
  scoop: scoop install main/mcfly
  winget: winget install --id AndrewCantino.McFly -e
  zypper: sudo zypper install mcfly
provenance:
  formula: mcfly
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
