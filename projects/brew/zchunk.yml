id: brew:zchunk
display-name: zchunk
homepage: https://github.com/zchunk/zchunk
repo: https://github.com/zchunk/zchunk
docs: https://github.com/zchunk/zchunk
package-manager:
  brew: zchunk
  debian: zchunk
  dnf: zchunk
  nix: zchunk
  pacman: zchunk
  ubuntu: zchunk
  zypper: zchunk
package-manager-url: https://formulae.brew.sh/formula/zchunk
version: 1.5.3
license: BSD-2-Clause
category: development
tags:
  - cli
description: Compressed file format for efficient deltas
source-archive: https://github.com/zchunk/zchunk/archive/refs/tags/1.5.3.tar.gz
dependencies:
  - openssl@3
  - zstd
build-dependencies:
  - argp-standalone
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: unzck
  - exposure: global executable
    kind: cli
    name: zck
  - exposure: global executable
    kind: cli
    name: zck_delta_size
  - exposure: global executable
    kind: cli
    name: zck_gen_zdict
  - exposure: global executable
    kind: cli
    name: zck_read_header
  - exposure: global executable
    kind: cli
    name: zckdl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zchunk
  brew: brew install zchunk
  debian: sudo apt install zchunk
  dnf: sudo dnf install zchunk
  nix: nix profile install nixpkgs#zchunk
  pacman: sudo pacman -S zchunk
  ubuntu: sudo apt install zchunk
  zypper: sudo zypper install zchunk
provenance:
  formula: zchunk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
