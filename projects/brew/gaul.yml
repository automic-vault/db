id: brew:gaul
display-name: gaul
homepage: https://gaul.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/gaul/gaul-devel/0.1850-0/gaul-devel-0.1850-0.tar.gz
docs: https://gaul.sourceforge.net/
package-manager:
  brew: gaul
package-manager-url: https://formulae.brew.sh/formula/gaul
version: 0.1850-0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Genetic Algorithm Utility Library
source-archive: >
  https://downloads.sourceforge.net/project/gaul/gaul-devel/0.1850-0/gaul-devel-0.1850-0.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: gaul_diagnostics
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gaul
  brew: brew install gaul
provenance:
  formula: gaul
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
