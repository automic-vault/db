id: brew:pug
display-name: pug
homepage: https://github.com/leg100/pug
repo: https://github.com/leg100/pug
docs: https://github.com/leg100/pug
package-manager:
  apk: pug
  brew: pug
package-manager-url: https://formulae.brew.sh/formula/pug
version: 0.6.5
license: MPL-2.0
category: cloud
tags:
  - cli
description: Drive terraform at terminal velocity
source-archive: https://github.com/leg100/pug/archive/refs/tags/v0.6.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pug
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pug
  av: sudo av install brew:pug
  brew: brew install pug
provenance:
  formula: pug
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
