id: brew:pianobar
display-name: pianobar
homepage: https://6xq.net/pianobar/
repo: https://6xq.net/pianobar/pianobar-2024.12.21.tar.bz2
docs: https://6xq.net/pianobar/
package-manager:
  apk: pianobar
  brew: pianobar
  debian: pianobar
  dnf: pianobar
  macports: pianobar
  nix: pianobar
  pacman: pianobar
  scoop: extras/pianobar
  ubuntu: pianobar
  zypper: pianobar
package-manager-url: https://formulae.brew.sh/formula/pianobar
version: 2024.12.21
license: MIT
category: network
tags:
  - cli
description: Command-line player for
source-archive: https://6xq.net/pianobar/pianobar-2024.12.21.tar.bz2
dependencies:
  - ffmpeg
  - json-c
  - libao
  - libgcrypt
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: pianobar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pianobar
  av: sudo av install brew:pianobar
  brew: brew install pianobar
  debian: sudo apt install pianobar
  dnf: sudo dnf install pianobar
  macports: sudo port install pianobar
  nix: nix profile install nixpkgs#pianobar
  pacman: sudo pacman -S pianobar
  scoop: scoop install extras/pianobar
  ubuntu: sudo apt install pianobar
  zypper: sudo zypper install pianobar
provenance:
  formula: pianobar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
