id: brew:most
display-name: most
homepage: https://www.jedsoft.org/most/
repo: https://www.jedsoft.org/releases/most/most-5.2.0.tar.gz
docs: https://www.jedsoft.org/most/
package-manager:
  apk: most
  brew: most
  debian: most
  dnf: most
  macports: most
  nix: most
  pacman: most
  ubuntu: most
  zypper: most
package-manager-url: https://formulae.brew.sh/formula/most
version: 5.2.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Powerful paging program
source-archive: https://www.jedsoft.org/releases/most/most-5.2.0.tar.gz
dependencies:
  - s-lang
executables:
  - exposure: global executable
    kind: cli
    name: most
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add most
  av: sudo av install brew:most
  brew: brew install most
  debian: sudo apt install most
  dnf: sudo dnf install most
  macports: sudo port install most
  nix: nix profile install nixpkgs#most
  pacman: sudo pacman -S most
  ubuntu: sudo apt install most
  zypper: sudo zypper install most
provenance:
  formula: most
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
