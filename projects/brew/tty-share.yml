id: brew:tty-share
display-name: tty-share
homepage: https://tty-share.com/
repo: https://github.com/elisescu/tty-share
docs: https://tty-share.com/
package-manager:
  apk: tty-share
  brew: tty-share
  debian: tty-share
  nix: tty-share
  ubuntu: tty-share
package-manager-url: https://formulae.brew.sh/formula/tty-share
version: 2.4.1
license: MIT
category: development
tags:
  - cli
description: Terminal sharing over the Internet
source-archive: https://github.com/elisescu/tty-share/archive/refs/tags/v2.4.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tty-share
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tty-share
  av: sudo av install brew:tty-share
  brew: brew install tty-share
  debian: sudo apt install tty-share
  nix: nix profile install nixpkgs#tty-share
  ubuntu: sudo apt install tty-share
provenance:
  formula: tty-share
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
