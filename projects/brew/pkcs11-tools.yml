id: brew:pkcs11-tools
display-name: pkcs11-tools
homepage: https://github.com/Mastercard/pkcs11-tools
repo: https://github.com/Mastercard/pkcs11-tools
package-manager:
  brew: pkcs11-tools
package-manager-url: https://formulae.brew.sh/formula/pkcs11-tools
version: 2.6.0
license: Apache-2.0
tags:
  - cli
description: Tools to manage objects on PKCS#11 crypotographic tokens
source-archive: >
  https://github.com/Mastercard/pkcs11-tools/releases/download/v2.6.0/pkcs11-tools-2.6.0.tar.gz
executables:
