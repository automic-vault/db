    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pkcs11-tools
  brew: brew install pkcs11-tools
provenance:
  formula: pkcs11-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
