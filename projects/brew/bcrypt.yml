id: brew:bcrypt
display-name: bcrypt
homepage: https://bcrypt.sourceforge.net/
repo: https://bcrypt.sourceforge.net/bcrypt-1.1.tar.gz
docs: https://bcrypt.sourceforge.net/
package-manager:
  brew: bcrypt
  dnf: bcrypt
  macports: bcrypt
package-manager-url: https://formulae.brew.sh/formula/bcrypt
version: 1.1
license: BSD-3-Clause
category: security
tags:
  - cli
description: Cross platform file encryption utility using blowfish
source-archive: https://bcrypt.sourceforge.net/bcrypt-1.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bcrypt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bcrypt
  brew: brew install bcrypt
  dnf: sudo dnf install bcrypt
  macports: sudo port install bcrypt
provenance:
  formula: bcrypt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
