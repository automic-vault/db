id: brew:rhit
display-name: rhit
homepage: https://dystroy.org/rhit/
repo: https://github.com/Canop/rhit
docs: https://dystroy.org/rhit/
package-manager:
  brew: rhit
  macports: rhit
  pacman: rhit
package-manager-url: https://formulae.brew.sh/formula/rhit
version: 2.0.4
license: MIT
category: development
tags:
  - cli
description: Nginx log explorer
source-archive: https://github.com/Canop/rhit/archive/refs/tags/v2.0.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rhit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rhit
  brew: brew install rhit
  macports: sudo port install rhit
  pacman: sudo pacman -S rhit
provenance:
  formula: rhit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
