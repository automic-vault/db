id: brew:libvoikko
display-name: libvoikko
homepage: https://voikko.puimula.org/
repo: https://www.puimula.org/voikko-sources/libvoikko/libvoikko-4.3.3.tar.gz
docs: https://voikko.puimula.org/
package-manager:
  apk: libvoikko
  brew: libvoikko
  dnf: libvoikko
  nix: libvoikko
  pacman: libvoikko
  zypper: voikkospell
package-manager-url: https://formulae.brew.sh/formula/libvoikko
version: 4.3.3
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Linguistic software and Finnish dictionary
source-archive: https://www.puimula.org/voikko-sources/libvoikko/libvoikko-4.3.3.tar.gz
dependencies:
  - hfstospell
build-dependencies:
  - foma
  - pkgconf
executables:
