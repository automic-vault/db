    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libvoikko
  av: sudo av install brew:libvoikko
  brew: brew install libvoikko
  dnf: sudo dnf install libvoikko
  nix: nix profile install nixpkgs#libvoikko
  pacman: sudo pacman -S libvoikko
  zypper: sudo zypper install voikkospell
provenance:
  formula: libvoikko
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
