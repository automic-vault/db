id: brew:ats2-postiats
display-name: ats2-postiats
homepage: https://www.cs.bu.edu/~hwxi/atslangweb/
repo: >
  https://downloads.sourceforge.net/project/ats2-lang/ats2-lang/ats2-postiats-0.4.2/ATS2-Postiats-0.4.2.tgz
docs: https://www.cs.bu.edu/~hwxi/atslangweb/
package-manager:
  brew: ats2-postiats
package-manager-url: https://formulae.brew.sh/formula/ats2-postiats
version: 0.4.2
license: GPL-3.0-only
category: development
tags:
  - cli
description: Programming language with formal specification features
source-archive: >
  https://downloads.sourceforge.net/project/ats2-lang/ats2-lang/ats2-postiats-0.4.2/ATS2-Postiats-0.4.2.tgz
dependencies:
  - gmp
executables:
  - exposure: global executable
    kind: cli
    name: myatscc
  - exposure: global executable
    kind: cli
    name: patscc
  - exposure: global executable
    kind: cli
    name: patsopt
bottle:
