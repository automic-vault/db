id: brew:shapelib
display-name: shapelib
homepage: http://shapelib.maptools.org/
repo: https://download.osgeo.org/shapelib/shapelib-1.6.3.tar.gz
docs: http://shapelib.maptools.org/
package-manager:
  apk: shapelib
  brew: shapelib
  debian: shapelib
  dnf: shapelib
  macports: shapelib
  nix: shapelib
  pacman: shapelib
  ubuntu: shapelib
  zypper: shapelib
package-manager-url: https://formulae.brew.sh/formula/shapelib
version: 1.6.3
license: LGPL-2.0-or-later OR MIT
category: network
tags:
  - cli
description: Library for reading and writing ArcView Shapefiles
source-archive: https://download.osgeo.org/shapelib/shapelib-1.6.3.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: Shape_PointInPoly
  - exposure: global executable
    kind: cli
    name: csv2shp
  - exposure: global executable
    kind: cli
    name: dbfadd
  - exposure: global executable
    kind: cli
    name: dbfcat
  - exposure: global executable
    kind: cli
    name: dbfcreate
  - exposure: global executable
    kind: cli
    name: dbfdump
  - exposure: global executable
    kind: cli
    name: dbfinfo
  - exposure: global executable
    kind: cli
    name: shpadd
  - exposure: global executable
    kind: cli
    name: shpcat
  - exposure: global executable
    kind: cli
    name: shpcentrd
  - exposure: global executable
    kind: cli
    name: shpcreate
  - exposure: global executable
    kind: cli
    name: shpdata
  - exposure: global executable
    kind: cli
    name: shpdump
  - exposure: global executable
    kind: cli
    name: shpdxf
  - exposure: global executable
    kind: cli
    name: shpfix
  - exposure: global executable
    kind: cli
    name: shpinfo
  - exposure: global executable
    kind: cli
    name: shprewind
  - exposure: global executable
    kind: cli
    name: shpsort
  - exposure: global executable
    kind: cli
    name: shptreedump
  - exposure: global executable
    kind: cli
    name: shpwkb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add shapelib
  av: sudo av install brew:shapelib
  brew: brew install shapelib
  debian: sudo apt install shapelib
  dnf: sudo dnf install shapelib
  macports: sudo port install shapelib
  nix: nix profile install nixpkgs#shapelib
  pacman: sudo pacman -S shapelib
  ubuntu: sudo apt install shapelib
  zypper: sudo zypper install shapelib
provenance:
  formula: shapelib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
