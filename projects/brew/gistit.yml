id: brew:gistit
display-name: gistit
homepage: https://github.com/jrbasso/gistit
repo: https://github.com/jrbasso/gistit
docs: https://github.com/jrbasso/gistit
package-manager:
  brew: gistit
package-manager-url: https://formulae.brew.sh/formula/gistit
version: 0.1.4
license: MIT
category: development
tags:
  - cli
description: Command-line utility for creating Gists
source-archive: https://github.com/jrbasso/gistit/archive/refs/tags/v0.1.4.tar.gz
dependencies:
  - jansson
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: gistit
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gistit
  brew: brew install gistit
provenance:
  formula: gistit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
