id: brew:kubergrunt
display-name: kubergrunt
homepage: https://github.com/gruntwork-io/kubergrunt
repo: https://github.com/gruntwork-io/kubergrunt
docs: https://github.com/gruntwork-io/kubergrunt
package-manager:
  brew: kubergrunt
  macports: kubergrunt
  nix: kubergrunt
package-manager-url: https://formulae.brew.sh/formula/kubergrunt
version: 0.19.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Collection of commands to fill in the gaps between Terraform, Helm, and Kubectl
source-archive: https://github.com/gruntwork-io/kubergrunt/archive/refs/tags/v0.19.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubergrunt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubergrunt
  brew: brew install kubergrunt
  macports: sudo port install kubergrunt
  nix: nix profile install nixpkgs#kubergrunt
provenance:
  formula: kubergrunt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
