id: brew:flip-link
display-name: flip-link
homepage: https://github.com/knurling-rs/flip-link
repo: https://github.com/knurling-rs/flip-link
docs: https://github.com/knurling-rs/flip-link
package-manager:
  brew: flip-link
  nix: flip-link
  pacman: flip-link
package-manager-url: https://formulae.brew.sh/formula/flip-link
version: 0.1.12
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Adds zero-cost stack overflow protection to your embedded programs
source-archive: https://github.com/knurling-rs/flip-link/archive/refs/tags/v0.1.12.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: flip-link
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flip-link
  brew: brew install flip-link
  nix: nix profile install nixpkgs#flip-link
  pacman: sudo pacman -S flip-link
provenance:
  formula: flip-link
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
