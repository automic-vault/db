id: brew:cruft
display-name: cruft
homepage: https://cruft.github.io/cruft/
repo: >
  https://files.pythonhosted.org/packages/d1/7e/0e20012f2aa156e5d6a70483a8d90accb7ed4966dddb0c58987d9f6eba12/cruft-2.16.0.tar.gz
docs: https://cruft.github.io/cruft/
package-manager:
  brew: cruft
  debian: cruft
  nix: cruft
  scoop: extras/cruft
  ubuntu: cruft
package-manager-url: https://formulae.brew.sh/formula/cruft
version: 2.16.0
license: MIT
category: development
tags:
  - cli
description: Utility that creates projects from templates and maintains the cruft afterwards
source-archive: >
  https://files.pythonhosted.org/packages/d1/7e/0e20012f2aa156e5d6a70483a8d90accb7ed4966dddb0c58987d9f6eba12/cruft-2.16.0.tar.gz
dependencies:
  - certifi
  - libyaml
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: cruft
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cruft
  brew: brew install cruft
  debian: sudo apt install cruft
  nix: nix profile install nixpkgs#cruft
  scoop: scoop install extras/cruft
  ubuntu: sudo apt install cruft
provenance:
  formula: cruft
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
