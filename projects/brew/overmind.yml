id: brew:overmind
display-name: overmind
homepage: https://github.com/DarthSim/overmind
repo: https://github.com/DarthSim/overmind
docs: https://github.com/DarthSim/overmind
package-manager:
  brew: overmind
  nix: overmind
package-manager-url: https://formulae.brew.sh/formula/overmind
version: 2.5.1
license: MIT
category: development
tags:
  - cli
description: Process manager for Procfile-based applications and tmux
source-archive: https://github.com/DarthSim/overmind/archive/refs/tags/v2.5.1.tar.gz
dependencies:
  - tmux
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: overmind
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:overmind
  brew: brew install overmind
  nix: nix profile install nixpkgs#overmind
provenance:
  formula: overmind
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
