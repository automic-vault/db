id: brew:tronbyt-server
display-name: tronbyt-server
homepage: https://github.com/tronbyt/server
repo: https://github.com/tronbyt/server
docs: https://github.com/tronbyt/server
package-manager:
  brew: tronbyt-server
package-manager-url: https://formulae.brew.sh/formula/tronbyt-server
version: 2.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Manage your apps on your Tronbyt (flashed Tidbyt) completely locally
source-archive: https://github.com/tronbyt/server/archive/refs/tags/v2.3.0.tar.gz
dependencies:
  - webp
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: tronbyt-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Application configuration should be placed in: $HOMEBREW_PREFIX/var/tronbyt-server/.env'
  post-install-defined: true
  service: declared
install-lines:
  av: sudo av install brew:tronbyt-server
  brew: brew install tronbyt-server
provenance:
  formula: tronbyt-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
