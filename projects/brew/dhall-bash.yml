id: brew:dhall-bash
display-name: dhall-bash
homepage: https://github.com/dhall-lang/dhall-haskell/tree/main/dhall-bash
repo: https://hackage.haskell.org/package/dhall-bash-1.0.41/dhall-bash-1.0.41.tar.gz
docs: https://github.com/dhall-lang/dhall-haskell/tree/main/dhall-bash
package-manager:
  brew: dhall-bash
  nix: dhall-bash
  pacman: dhall-bash
package-manager-url: https://formulae.brew.sh/formula/dhall-bash
version: 1.0.41
license: BSD-3-Clause
category: development
tags:
  - cli
description: Compile Dhall to Bash
source-archive: https://hackage.haskell.org/package/dhall-bash-1.0.41/dhall-bash-1.0.41.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: dhall-to-bash
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dhall-bash
  brew: brew install dhall-bash
  nix: nix profile install nixpkgs#dhall-bash
  pacman: sudo pacman -S dhall-bash
provenance:
  formula: dhall-bash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
