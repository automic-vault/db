id: brew:rasqal
display-name: rasqal
homepage: https://librdf.org/rasqal/
repo: https://download.librdf.org/source/rasqal-0.9.33.tar.gz
docs: https://librdf.org/rasqal/
package-manager:
  apk: rasqal
  brew: rasqal
  dnf: rasqal
  macports: rasqal
  pacman: rasqal
  zypper: rasqal
package-manager-url: https://formulae.brew.sh/formula/rasqal
version: 0.9.33
license: LGPL-2.1-or-later OR GPL-2.0-or-later OR Apache-2.0
category: network
tags:
  - cli
description: RDF query library
source-archive: https://download.librdf.org/source/rasqal-0.9.33.tar.gz
dependencies:
  - raptor
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rasqal-config
  - exposure: global executable
    kind: cli
    name: roqet
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rasqal
  av: sudo av install brew:rasqal
  brew: brew install rasqal
  dnf: sudo dnf install rasqal
  macports: sudo port install rasqal
  pacman: sudo pacman -S rasqal
  zypper: sudo zypper install rasqal
provenance:
  formula: rasqal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
