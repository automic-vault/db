id: brew:httpd
display-name: httpd
homepage: https://httpd.apache.org/
repo: https://www.apache.org/dyn/closer.lua?path=httpd/httpd-2.4.67.tar.bz2
docs: https://httpd.apache.org/
package-manager:
  brew: httpd
  dnf: httpd
  scoop: main/ab
package-manager-url: https://formulae.brew.sh/formula/httpd
version: 2.4.67
license: Apache-2.0
category: network
tags:
  - cli
description: Apache HTTP server
source-archive: https://www.apache.org/dyn/closer.lua?path=httpd/httpd-2.4.67.tar.bz2
dependencies:
  - apr
  - apr-util
  - brotli
  - libnghttp2
  - openssl@3
  - pcre2
uses-from-macos:
  - libxcrypt
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: ab
  - exposure: global executable
    kind: cli
    name: apachectl
  - exposure: global executable
    kind: cli
    name: apxs
  - exposure: global executable
    kind: cli
    name: checkgid
  - exposure: global executable
    kind: cli
    name: dbmmanage
  - exposure: global executable
    kind: cli
    name: fcgistarter
  - exposure: global executable
    kind: cli
    name: htcacheclean
  - exposure: global executable
    kind: cli
    name: htdbm
  - exposure: global executable
    kind: cli
    name: htdigest
  - exposure: global executable
    kind: cli
    name: htpasswd
  - exposure: global executable
    kind: cli
    name: httpd
  - exposure: global executable
    kind: cli
    name: httxt2dbm
  - exposure: global executable
    kind: cli
    name: logresolve
  - exposure: global executable
    kind: cli
    name: rotatelogs
  - exposure: global executable
    kind: cli
    name: suexec
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    DocumentRoot is $HOMEBREW_PREFIX/var/www. The default ports have been set in
    $HOMEBREW_PREFIX/etc/httpd/httpd.conf to 8080 and in
    $HOMEBREW_PREFIX/etc/httpd/extra/httpd-ssl.conf to 8443 so that httpd can run
    without sudo.
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:httpd
  brew: brew install httpd
  dnf: sudo dnf install httpd
  scoop: scoop install main/ab
provenance:
  formula: httpd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
