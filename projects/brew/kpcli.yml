id: brew:kpcli
display-name: kpcli
homepage: https://kpcli.sourceforge.io/
repo: https://downloads.sourceforge.net/project/kpcli/kpcli-4.1.3.pl
docs: https://kpcli.sourceforge.io/
package-manager:
  brew: kpcli
  chocolatey: kpcli
  debian: kpcli
  dnf: kpcli
  nix: kpcli
  ubuntu: kpcli
package-manager-url: https://formulae.brew.sh/formula/kpcli
version: 4.1.3
license: Artistic-1.0-Perl OR GPL-1.0-or-later
category: database
tags:
  - cli
  - database
description: Command-line interface to KeePass database files
source-archive: https://downloads.sourceforge.net/project/kpcli/kpcli-4.1.3.pl
dependencies:
  - readline
uses-from-macos:
  - ncurses
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: kpcli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kpcli
  brew: brew install kpcli
  chocolatey: choco install kpcli
  debian: sudo apt install kpcli
  dnf: sudo dnf install kpcli
  nix: nix profile install nixpkgs#kpcli
  ubuntu: sudo apt install kpcli
provenance:
  formula: kpcli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
