id: brew:usbredir
display-name: usbredir
homepage: https://www.spice-space.org
repo: https://www.spice-space.org/download/usbredir/usbredir-0.15.0.tar.xz
docs: https://www.spice-space.org
package-manager:
  apk: usbredir
  brew: usbredir
  debian: usbredirect
  dnf: usbredir
  macports: usbredir
  nix: usbredir
  pacman: usbredir
  ubuntu: usbredirect
  zypper: usbredir
package-manager-url: https://formulae.brew.sh/formula/usbredir
version: 0.15.0
license: GPL-2.0-or-later AND LGPL-2.0-or-later
category: network
tags:
  - cli
description: USB traffic redirection library
source-archive: https://www.spice-space.org/download/usbredir/usbredir-0.15.0.tar.xz
dependencies:
  - glib
  - libusb
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: usbredirect
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add usbredir
  av: sudo av install brew:usbredir
  brew: brew install usbredir
  debian: sudo apt install usbredirect
  dnf: sudo dnf install usbredir
  macports: sudo port install usbredir
  nix: nix profile install nixpkgs#usbredir
  pacman: sudo pacman -S usbredir
  ubuntu: sudo apt install usbredirect
  zypper: sudo zypper install usbredir
provenance:
  formula: usbredir
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
