id: brew:pixlet
display-name: pixlet
homepage: https://github.com/tronbyt/pixlet
repo: https://github.com/tronbyt/pixlet
docs: https://github.com/tronbyt/pixlet
package-manager:
  brew: pixlet
package-manager-url: https://formulae.brew.sh/formula/pixlet
version: 0.52.0
license: Apache-2.0
category: development
tags:
  - cli
description: App runtime and UX toolkit for pixel-based apps
source-archive: https://github.com/tronbyt/pixlet/archive/refs/tags/v0.52.0.tar.gz
dependencies:
  - webp
build-dependencies:
  - go
  - node
executables:
  - exposure: global executable
    kind: cli
    name: pixlet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pixlet
  brew: brew install pixlet
provenance:
  formula: pixlet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
