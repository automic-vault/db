id: brew:sqlboiler
display-name: sqlboiler
homepage: https://github.com/volatiletech/sqlboiler
repo: https://github.com/volatiletech/sqlboiler
docs: https://github.com/volatiletech/sqlboiler
package-manager:
  brew: sqlboiler
  nix: sqlboiler
package-manager-url: https://formulae.brew.sh/formula/sqlboiler
version: 4.19.7
license: BSD-3-Clause
category: database
tags:
  - cli
  - database
description: Generate a Go ORM tailored to your database schema
source-archive: https://github.com/volatiletech/sqlboiler/archive/refs/tags/v4.19.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sqlboiler
  - exposure: global executable
    kind: cli
    name: sqlboiler-mssql
  - exposure: global executable
    kind: cli
    name: sqlboiler-mysql
  - exposure: global executable
    kind: cli
    name: sqlboiler-psql
  - exposure: global executable
    kind: cli
    name: sqlboiler-sqlite3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sqlboiler
  brew: brew install sqlboiler
  nix: nix profile install nixpkgs#sqlboiler
provenance:
  formula: sqlboiler
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
