id: brew:neomutt
display-name: neomutt
homepage: https://neomutt.org/
repo: https://github.com/neomutt/neomutt
docs: https://neomutt.org/
package-manager:
  apk: neomutt
  brew: neomutt
  debian: neomutt
  dnf: neomutt
  macports: neomutt
  nix: neomutt
  pacman: neomutt
  ubuntu: neomutt
  zypper: neomutt
package-manager-url: https://formulae.brew.sh/formula/neomutt
version: 20260504
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: E-mail reader with support for Notmuch, NNTP and much more
source-archive: https://github.com/neomutt/neomutt/archive/refs/tags/20260504.tar.gz
dependencies:
  - gettext
  - gpgme
  - libgpg-error
  - libiconv
  - libidn2
  - lmdb
  - lua
  - ncurses
  - notmuch
  - openssl@3
  - pcre2
  - sqlite
build-dependencies:
  - docbook-xsl
  - gettext
  - pkgconf
  - tcl-tk
uses-from-macos:
  - cyrus-sasl
  - krb5
executables:
  - exposure: global executable
    kind: cli
    name: neomutt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add neomutt
  av: sudo av install brew:neomutt
  brew: brew install neomutt
  debian: sudo apt install neomutt
  dnf: sudo dnf install neomutt
  macports: sudo port install neomutt
  nix: nix profile install nixpkgs#neomutt
  pacman: sudo pacman -S neomutt
  ubuntu: sudo apt install neomutt
  zypper: sudo zypper install neomutt
provenance:
  formula: neomutt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
