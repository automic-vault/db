id: brew:libkate
display-name: libkate
homepage: https://wiki.xiph.org/index.php/OggKate
repo: https://downloads.xiph.org/releases/kate/libkate-0.4.3.tar.gz
docs: https://wiki.xiph.org/index.php/OggKate
package-manager:
  brew: libkate
  dnf: libkate
  nix: libkate
  pacman: libkate
package-manager-url: https://formulae.brew.sh/formula/libkate
version: 0.4.3
license: BSD-3-Clause
category: media
tags:
  - cli
description: Overlay codec for multiplexed audio/video in Ogg
source-archive: https://downloads.xiph.org/releases/kate/libkate-0.4.3.tar.gz
dependencies:
  - libogg
  - libpng
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: katalyzer
  - exposure: global executable
    kind: cli
    name: katedec
  - exposure: global executable
    kind: cli
    name: kateenc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libkate
  brew: brew install libkate
  dnf: sudo dnf install libkate
  nix: nix profile install nixpkgs#libkate
  pacman: sudo pacman -S libkate
provenance:
  formula: libkate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
