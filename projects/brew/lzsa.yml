id: brew:lzsa
display-name: lzsa
homepage: https://github.com/emmanuel-marty/lzsa
repo: https://github.com/emmanuel-marty/lzsa
docs: https://github.com/emmanuel-marty/lzsa
package-manager:
  brew: lzsa
  nix: lzsa
package-manager-url: https://formulae.brew.sh/formula/lzsa
version: 1.4.1
license: Zlib AND CC0-1.0
category: security
tags:
  - cli
description: Lossless packer that is optimized for fast decompression on 8-bit micros
source-archive: https://github.com/emmanuel-marty/lzsa/archive/refs/tags/1.4.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lzsa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lzsa
  brew: brew install lzsa
  nix: nix profile install nixpkgs#lzsa
provenance:
  formula: lzsa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
