id: brew:fragroute
display-name: fragroute
homepage: https://www.monkey.org/~dugsong/fragroute/
repo: https://www.monkey.org/~dugsong/fragroute/fragroute-1.2.tar.gz
docs: https://www.monkey.org/~dugsong/fragroute/
package-manager:
  brew: fragroute
  macports: fragroute
package-manager-url: https://formulae.brew.sh/formula/fragroute
version: 1.2
license: BSD-3-Clause
category: network
tags:
  - cli
description: Intercepts, modifies and rewrites egress traffic for a specified host
source-archive: https://www.monkey.org/~dugsong/fragroute/fragroute-1.2.tar.gz
dependencies:
  - libdnet
  - libevent
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: fragroute
  - exposure: global executable
    kind: cli
    name: fragtest
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fragroute
  brew: brew install fragroute
  macports: sudo port install fragroute
provenance:
  formula: fragroute
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
