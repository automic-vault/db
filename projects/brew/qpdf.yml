id: brew:qpdf
display-name: qpdf
homepage: https://github.com/qpdf/qpdf
repo: https://github.com/qpdf/qpdf
docs: https://github.com/qpdf/qpdf
package-manager:
  apk: qpdf
  brew: qpdf
  chocolatey: qpdf
  debian: qpdf
  dnf: qpdf
  macports: qpdf
  nix: qpdf
  pacman: qpdf
  scoop: main/qpdf
  ubuntu: qpdf
  winget: QPDF.QPDF
  zypper: qpdf
package-manager-url: https://formulae.brew.sh/formula/qpdf
version: 12.3.2
license: Apache-2.0
category: development
tags:
  - cli
description: Tools for and transforming and inspecting PDF files
source-archive: https://github.com/qpdf/qpdf/releases/download/v12.3.2/qpdf-12.3.2.tar.gz
dependencies:
  - jpeg-turbo
  - openssl@3
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: fix-qdf
  - exposure: global executable
    kind: cli
    name: qpdf
  - exposure: global executable
    kind: cli
    name: zlib-flate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add qpdf
  av: sudo av install brew:qpdf
  brew: brew install qpdf
  chocolatey: choco install qpdf
  debian: sudo apt install qpdf
  dnf: sudo dnf install qpdf
  macports: sudo port install qpdf
  nix: nix profile install nixpkgs#qpdf
  pacman: sudo pacman -S qpdf
  scoop: scoop install main/qpdf
  ubuntu: sudo apt install qpdf
  winget: winget install --id QPDF.QPDF -e
  zypper: sudo zypper install qpdf
provenance:
  formula: qpdf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
