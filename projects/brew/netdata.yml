id: brew:netdata
display-name: netdata
homepage: https://www.netdata.cloud/
repo: https://github.com/netdata/netdata
docs: https://www.netdata.cloud/
package-manager:
  apk: netdata
  brew: netdata
  macports: netdata
  nix: netdata
  pacman: netdata
  ubuntu: netdata
package-manager-url: https://formulae.brew.sh/formula/netdata
version: 2.10.3
license: GPL-3.0-or-later
category: cloud
tags:
  - cli
description: Diagnose infrastructure problems with metrics, visualizations & alarms
source-archive: https://github.com/netdata/netdata/releases/download/v2.10.3/netdata-v2.10.3.tar.gz
dependencies:
  - abseil
  - dlib
  - json-c
  - libuv
  - libyaml
  - lz4
  - openssl@3
  - pcre2
  - protobuf
  - snappy
  - zstd
build-dependencies:
  - cmake
  - corrosion
  - go
  - pkgconf
  - rust
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: log2journal
  - exposure: global executable
    kind: cli
    name: nd-mcp
  - exposure: global executable
    kind: cli
    name: nd-run
  - exposure: global executable
    kind: cli
    name: netdata
  - exposure: global executable
    kind: cli
    name: netdata-claim.sh
  - exposure: global executable
    kind: cli
    name: netdatacli
  - exposure: global executable
    kind: cli
    name: systemd-cat-native
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add netdata
  av: sudo av install brew:netdata
  brew: brew install netdata
  macports: sudo port install netdata
  nix: nix profile install nixpkgs#netdata
  pacman: sudo pacman -S netdata
  ubuntu: sudo apt install netdata
provenance:
  formula: netdata
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
