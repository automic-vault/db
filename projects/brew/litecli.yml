id: brew:litecli
display-name: litecli
homepage: https://github.com/dbcli/litecli
repo: >
  https://files.pythonhosted.org/packages/e3/d5/afec99cc3eaba96214d77e76438d7fe5e6ea54704b0e47dd97d9696ccd6c/litecli-1.17.1.tar.gz
docs: https://github.com/dbcli/litecli
package-manager:
  apk: litecli
  brew: litecli
  debian: litecli
  dnf: litecli
  macports: litecli
  nix: litecli
  ubuntu: litecli
package-manager-url: https://formulae.brew.sh/formula/litecli
version: 1.17.1
license: BSD-3-Clause
category: database
tags:
  - cli
description: CLI for SQLite Databases with auto-completion and syntax highlighting
source-archive: >
  https://files.pythonhosted.org/packages/e3/d5/afec99cc3eaba96214d77e76438d7fe5e6ea54704b0e47dd97d9696ccd6c/litecli-1.17.1.tar.gz
dependencies:
  - certifi
  - libyaml
  - pydantic
  - python@3.14
build-dependencies:
  - rust
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: litecli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add litecli
  av: sudo av install brew:litecli
  brew: brew install litecli
  debian: sudo apt install litecli
  dnf: sudo dnf install litecli
  macports: sudo port install litecli
  nix: nix profile install nixpkgs#litecli
  ubuntu: sudo apt install litecli
provenance:
  formula: litecli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
