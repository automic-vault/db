id: brew:sslh
display-name: sslh
homepage: https://www.rutschle.net/tech/sslh.shtml
repo: https://www.rutschle.net/tech/sslh/sslh-v2.3.1.tar.gz
docs: https://www.rutschle.net/tech/sslh.shtml
package-manager:
  apk: sslh
  brew: sslh
  debian: sslh
  dnf: sslh
  macports: sslh
  nix: sslh
  pacman: sslh
  ubuntu: sslh
  zypper: sslh
package-manager-url: https://formulae.brew.sh/formula/sslh
version: 2.3.1
license: GPL-2.0-or-later AND BSD-2-Clause
category: security
tags:
  - cli
description: Forward connections based on first data packet sent by client
source-archive: https://www.rutschle.net/tech/sslh/sslh-v2.3.1.tar.gz
dependencies:
  - libconfig
  - libev
  - pcre2
executables:
  - exposure: global executable
    kind: cli
    name: sslh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sslh
  av: sudo av install brew:sslh
  brew: brew install sslh
  debian: sudo apt install sslh
  dnf: sudo dnf install sslh
  macports: sudo port install sslh
  nix: nix profile install nixpkgs#sslh
  pacman: sudo pacman -S sslh
  ubuntu: sudo apt install sslh
  zypper: sudo zypper install sslh
provenance:
  formula: sslh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
