id: brew:noseyparker
display-name: noseyparker
homepage: https://github.com/praetorian-inc/noseyparker
repo: https://github.com/praetorian-inc/noseyparker
docs: https://github.com/praetorian-inc/noseyparker
package-manager:
  brew: noseyparker
  nix: noseyparker
package-manager-url: https://formulae.brew.sh/formula/noseyparker
version: 0.24.0
license: Apache-2.0
category: security
tags:
  - cli
  - git
description: Finds secrets and sensitive information in textual data and Git history
source-archive: https://github.com/praetorian-inc/noseyparker/archive/refs/tags/v0.24.0.tar.gz
build-dependencies:
  - boost
  - cmake
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: noseyparker
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:noseyparker
  brew: brew install noseyparker
  nix: nix profile install nixpkgs#noseyparker
provenance:
  formula: noseyparker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
