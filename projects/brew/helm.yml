id: brew:helm
display-name: helm
homepage: https://helm.sh/
repo: https://github.com/helm/helm
docs: https://helm.sh/
package-manager:
  apk: helm
  brew: helm
  dnf: helm
  macports: helm
  nix: helm
  pacman: helm
  scoop: main/helm
  winget: Helm.Helm
  zypper: helm
package-manager-url: https://formulae.brew.sh/formula/helm
version: 4.2.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes package manager
source-archive: https://github.com/helm/helm.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: helm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add helm
  av: sudo av install brew:helm
  brew: brew install helm
  dnf: sudo dnf install helm
  macports: sudo port install helm
  nix: nix profile install nixpkgs#helm
  pacman: sudo pacman -S helm
  scoop: scoop install main/helm
  winget: winget install --id Helm.Helm -e
  zypper: sudo zypper install helm
provenance:
  formula: helm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
