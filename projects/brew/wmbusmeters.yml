id: brew:wmbusmeters
display-name: wmbusmeters
homepage: https://github.com/wmbusmeters/wmbusmeters
repo: https://github.com/wmbusmeters/wmbusmeters
docs: https://github.com/wmbusmeters/wmbusmeters
package-manager:
  brew: wmbusmeters
  dnf: wmbusmeters
package-manager-url: https://formulae.brew.sh/formula/wmbusmeters
version: 2.0.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Read wired or wireless mbus protocol to acquire utility meter readings
source-archive: https://github.com/wmbusmeters/wmbusmeters/archive/refs/tags/2.0.0.tar.gz
dependencies:
  - librtlsdr
  - libusb
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: wmbusmeters
  - exposure: global executable
    kind: cli
    name: wmbusmetersd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:wmbusmeters
  brew: brew install wmbusmeters
  dnf: sudo dnf install wmbusmeters
provenance:
  formula: wmbusmeters
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
