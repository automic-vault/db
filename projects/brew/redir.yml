id: brew:redir
display-name: redir
homepage: https://github.com/troglobit/redir
repo: https://github.com/troglobit/redir
docs: https://github.com/troglobit/redir
package-manager:
  brew: redir
  debian: redir
  dnf: redir
  nix: redir
  ubuntu: redir
package-manager-url: https://formulae.brew.sh/formula/redir
version: 3.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: TCP port redirector for UNIX
source-archive: https://github.com/troglobit/redir/releases/download/v3.3/redir-3.3.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: redir
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:redir
  brew: brew install redir
  debian: sudo apt install redir
  dnf: sudo dnf install redir
  nix: nix profile install nixpkgs#redir
  ubuntu: sudo apt install redir
provenance:
  formula: redir
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
