id: brew:gtk-doc
display-name: gtk-doc
homepage: https://gitlab.gnome.org/GNOME/gtk-doc
repo: https://download.gnome.org/sources/gtk-doc/1.36/gtk-doc-1.36.1.tar.xz
docs: https://gitlab.gnome.org/GNOME/gtk-doc
package-manager:
  apk: gtk-doc
  brew: gtk-doc
  dnf: gtk-doc
  macports: gtk-doc
  nix: gtk-doc
  pacman: gtk-doc
  zypper: gtk-doc
package-manager-url: https://formulae.brew.sh/formula/gtk-doc
version: 1.36.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: GTK+ documentation tool
source-archive: https://download.gnome.org/sources/gtk-doc/1.36/gtk-doc-1.36.1.tar.xz
dependencies:
  - docbook
  - docbook-xsl
  - python@3.14
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: gtkdoc-check
  - exposure: global executable
    kind: cli
    name: gtkdoc-depscan
  - exposure: global executable
    kind: cli
    name: gtkdoc-fixxref
  - exposure: global executable
    kind: cli
    name: gtkdoc-mkdb
  - exposure: global executable
    kind: cli
    name: gtkdoc-mkhtml
  - exposure: global executable
    kind: cli
    name: gtkdoc-mkhtml2
  - exposure: global executable
    kind: cli
    name: gtkdoc-mkman
  - exposure: global executable
    kind: cli
    name: gtkdoc-mkpdf
  - exposure: global executable
    kind: cli
    name: gtkdoc-rebase
  - exposure: global executable
    kind: cli
    name: gtkdoc-scan
  - exposure: global executable
    kind: cli
    name: gtkdoc-scangobj
  - exposure: global executable
    kind: cli
    name: gtkdocize
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gtk-doc
  av: sudo av install brew:gtk-doc
  brew: brew install gtk-doc
  dnf: sudo dnf install gtk-doc
  macports: sudo port install gtk-doc
  nix: nix profile install nixpkgs#gtk-doc
  pacman: sudo pacman -S gtk-doc
  zypper: sudo zypper install gtk-doc
provenance:
  formula: gtk-doc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
