id: brew:docker-credential-helper
display-name: docker-credential-helper
homepage: https://github.com/docker/docker-credential-helpers
repo: https://github.com/docker/docker-credential-helpers
docs: https://github.com/docker/docker-credential-helpers
package-manager:
  brew: docker-credential-helper
  zypper: docker-credential-secretservice
package-manager-url: https://formulae.brew.sh/formula/docker-credential-helper
version: 0.9.7
license: MIT
category: development
tags:
  - cli
  - docker
description: Platform keystore credential helper for Docker
source-archive: https://github.com/docker/docker-credential-helpers/archive/refs/tags/v0.9.7.tar.gz
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: docker-credential-pass
  - exposure: global executable
    kind: cli
    name: docker-credential-secretservice
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:docker-credential-helper
  brew: brew install docker-credential-helper
  zypper: sudo zypper install docker-credential-secretservice
provenance:
  formula: docker-credential-helper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
