id: brew:min-lang
display-name: min-lang
homepage: https://min-lang.org
repo: https://github.com/h3rald/min
docs: https://min-lang.org
package-manager:
  brew: min-lang
  nix: min
  scoop: extras/min
  winget: MinBrowser.Min
package-manager-url: https://formulae.brew.sh/formula/min-lang
version: 0.47.1
license: MIT
category: development
tags:
  - cli
description: Small but practical concatenative programming language and shell
source-archive: https://github.com/h3rald/min/archive/refs/tags/v0.47.1.tar.gz
dependencies:
  - nim
  - openssl@3
  - pcre2
executables:
  - exposure: global executable
    kind: cli
    name: min
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:min-lang
  brew: brew install min-lang
  nix: nix profile install nixpkgs#min
  scoop: scoop install extras/min
  winget: winget install --id MinBrowser.Min -e
provenance:
  formula: min-lang
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
