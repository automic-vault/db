id: brew:sftpgo
display-name: sftpgo
homepage: https://sftpgo.com/
repo: https://github.com/drakkan/sftpgo
docs: https://sftpgo.com/
package-manager:
  brew: sftpgo
  nix: sftpgo
  scoop: main/sftpgo
  winget: drakkan.SFTPGo
package-manager-url: https://formulae.brew.sh/formula/sftpgo
version: 2.7.1
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Fully featured SFTP server with optional HTTP/S, FTP/S and WebDAV support
source-archive: >
  https://github.com/drakkan/sftpgo/releases/download/v2.7.1/sftpgo_v2.7.1_src_with_deps.tar.xz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sftpgo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Default data location: $HOMEBREW_PREFIX/var/sftpgo Configuration file location:
    $HOMEBREW_PREFIX/etc/sftpgo/sftpgo.json
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:sftpgo
  brew: brew install sftpgo
  nix: nix profile install nixpkgs#sftpgo
  scoop: scoop install main/sftpgo
  winget: winget install --id drakkan.SFTPGo -e
provenance:
  formula: sftpgo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
