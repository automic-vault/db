id: brew:durdraw
display-name: durdraw
homepage: https://durdraw.org
repo: https://github.com/cmang/durdraw
docs: https://durdraw.org
package-manager:
  brew: durdraw
  debian: durdraw
  ubuntu: durdraw
package-manager-url: https://formulae.brew.sh/formula/durdraw
version: 0.29.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Versatile ASCII and ANSI Art text editor for drawing in the terminal
source-archive: https://github.com/cmang/durdraw/archive/refs/tags/0.29.0.tar.gz
dependencies:
  - ansilove
  - pillow
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: durdraw
  - exposure: global executable
    kind: cli
    name: durfetch
  - exposure: global executable
    kind: cli
    name: durview
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: Default configuration and themes are installed to $HOMEBREW_PREFIX/etc/durdraw
  post-install-defined: false
install-lines:
  av: sudo av install brew:durdraw
  brew: brew install durdraw
  debian: sudo apt install durdraw
  ubuntu: sudo apt install durdraw
provenance:
  formula: durdraw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
