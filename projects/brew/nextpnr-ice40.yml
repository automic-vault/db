id: brew:nextpnr-ice40
display-name: nextpnr-ice40
homepage: https://github.com/YosysHQ/nextpnr
repo: https://github.com/YosysHQ/nextpnr
docs: https://github.com/YosysHQ/nextpnr
package-manager:
  apk: nextpnr-ice40
  brew: nextpnr-ice40
  debian: nextpnr-ice40
  ubuntu: nextpnr-ice40
package-manager-url: https://formulae.brew.sh/formula/nextpnr-ice40
version: 0.10
license: ISC
category: development
tags:
  - cli
description: Portable FPGA place and route tool for Lattice iCE40
source-archive: https://github.com/YosysHQ/nextpnr/archive/refs/tags/nextpnr-0.10.tar.gz
dependencies:
  - boost
  - eigen
  - icestorm
  - python@3.14
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: nextpnr-ice40
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nextpnr-ice40
  av: sudo av install brew:nextpnr-ice40
  brew: brew install nextpnr-ice40
  debian: sudo apt install nextpnr-ice40
  ubuntu: sudo apt install nextpnr-ice40
provenance:
  formula: nextpnr-ice40
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
