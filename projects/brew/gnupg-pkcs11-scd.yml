id: brew:gnupg-pkcs11-scd
display-name: gnupg-pkcs11-scd
homepage: https://gnupg-pkcs11.sourceforge.net/
repo: https://github.com/alonbl/gnupg-pkcs11-scd
docs: https://gnupg-pkcs11.sourceforge.net/
package-manager:
  brew: gnupg-pkcs11-scd
  debian: gnupg-pkcs11-scd
  dnf: gnupg-pkcs11-scd
  macports: gnupg-pkcs11-scd
  nix: gnupg-pkcs11-scd
  ubuntu: gnupg-pkcs11-scd
package-manager-url: https://formulae.brew.sh/formula/gnupg-pkcs11-scd
version: 0.11.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Enable the use of PKCS#11 tokens with GnuPG
source-archive: >
  https://github.com/alonbl/gnupg-pkcs11-scd/releases/download/gnupg-pkcs11-scd-0.11.0/gnupg-pkcs11-scd-0.11.0.tar.bz2
dependencies:
  - libassuan
  - libgcrypt
  - libgpg-error
  - openssl@3
  - pkcs11-helper
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gnupg-pkcs11-scd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gnupg-pkcs11-scd
  brew: brew install gnupg-pkcs11-scd
  debian: sudo apt install gnupg-pkcs11-scd
  dnf: sudo dnf install gnupg-pkcs11-scd
  macports: sudo port install gnupg-pkcs11-scd
  nix: nix profile install nixpkgs#gnupg-pkcs11-scd
  ubuntu: sudo apt install gnupg-pkcs11-scd
provenance:
  formula: gnupg-pkcs11-scd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
