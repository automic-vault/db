id: brew:amazon-ecs-cli
display-name: amazon-ecs-cli
homepage: https://aws.amazon.com/ecs/
repo: https://github.com/aws/amazon-ecs-cli
docs: https://aws.amazon.com/ecs/
package-manager:
  brew: amazon-ecs-cli
  macports: ecs-cli
package-manager-url: https://formulae.brew.sh/formula/amazon-ecs-cli
version: 1.21.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: CLI for Amazon ECS to manage clusters and tasks for development
source-archive: https://github.com/aws/amazon-ecs-cli/archive/refs/tags/v1.21.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ecs-cli
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:amazon-ecs-cli
  brew: brew install amazon-ecs-cli
  macports: sudo port install ecs-cli
provenance:
  formula: amazon-ecs-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
