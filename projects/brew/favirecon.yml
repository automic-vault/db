id: brew:favirecon
display-name: favirecon
homepage: https://github.com/edoardottt/favirecon
repo: https://github.com/edoardottt/favirecon
docs: https://github.com/edoardottt/favirecon
package-manager:
  brew: favirecon
  nix: favirecon
package-manager-url: https://formulae.brew.sh/formula/favirecon
version: 1.0.3
license: MIT
category: development
tags:
  - cli
description: Uses favicon.ico to improve the target recon phase
source-archive: https://github.com/edoardottt/favirecon/archive/refs/tags/v1.0.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: favirecon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:favirecon
  brew: brew install favirecon
  nix: nix profile install nixpkgs#favirecon
provenance:
  formula: favirecon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
