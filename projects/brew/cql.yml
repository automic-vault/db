id: brew:cql
display-name: cql
homepage: https://covenantsql.io
repo: https://github.com/CovenantSQL/CovenantSQL
docs: https://covenantsql.io
package-manager:
  brew: cql
package-manager-url: https://formulae.brew.sh/formula/cql
version: 0.8.1
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Decentralized SQL database with blockchain features
source-archive: https://github.com/CovenantSQL/CovenantSQL/archive/refs/tags/v0.8.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cql
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cql
  brew: brew install cql
provenance:
  formula: cql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
