id: brew:flyway
display-name: flyway
homepage: https://www.red-gate.com/products/flyway/community/
repo: https://github.com/flyway/flyway
docs: https://www.red-gate.com/products/flyway/community/
package-manager:
  brew: flyway
  macports: flyway
  nix: flyway
  scoop: main/flyway
package-manager-url: https://formulae.brew.sh/formula/flyway
version: 12.6.2
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Database version control to control migrations
source-archive: >
  https://github.com/flyway/flyway/releases/download/flyway-12.6.2/flyway-commandline-12.6.2.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: flyway
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flyway
  brew: brew install flyway
  macports: sudo port install flyway
  nix: nix profile install nixpkgs#flyway
  scoop: scoop install main/flyway
provenance:
  formula: flyway
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
