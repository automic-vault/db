id: brew:navidrome
display-name: navidrome
homepage: https://www.navidrome.org
repo: https://github.com/navidrome/navidrome
docs: https://www.navidrome.org
package-manager:
  apk: navidrome
  brew: navidrome
  nix: navidrome
  pacman: navidrome
  scoop: main/navidrome
  winget: Navidrome.Navidrome
package-manager-url: https://formulae.brew.sh/formula/navidrome
version: 0.61.2
license: GPL-3.0-only
category: development
tags:
  - cli
description: Modern Music Server and Streamer compatible with Subsonic/Airsonic
source-archive: https://github.com/navidrome/navidrome/archive/refs/tags/v0.61.2.tar.gz
dependencies:
  - ffmpeg
  - taglib
build-dependencies:
  - go
  - node
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: navidrome
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add navidrome
  av: sudo av install brew:navidrome
  brew: brew install navidrome
  nix: nix profile install nixpkgs#navidrome
  pacman: sudo pacman -S navidrome
  scoop: scoop install main/navidrome
  winget: winget install --id Navidrome.Navidrome -e
provenance:
  formula: navidrome
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
