id: brew:unbound
display-name: unbound
homepage: https://www.unbound.net
repo: https://nlnetlabs.nl/downloads/unbound/unbound-1.25.1.tar.gz
docs: https://www.unbound.net
package-manager:
  apk: unbound
  brew: unbound
  debian: unbound
  dnf: unbound
  macports: unbound
  nix: unbound
  pacman: unbound
  scoop: main/unbound
  ubuntu: unbound
  winget: NLnetLabs.Unbound
  zypper: unbound
package-manager-url: https://formulae.brew.sh/formula/unbound
version: 1.25.1
license: BSD-3-Clause
category: network
tags:
  - cli
description: Validating, recursive, caching DNS resolver
source-archive: https://nlnetlabs.nl/downloads/unbound/unbound-1.25.1.tar.gz
dependencies:
  - libevent
  - libnghttp2
  - openssl@3
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: unbound
  - exposure: global executable
    kind: cli
    name: unbound-anchor
  - exposure: global executable
    kind: cli
    name: unbound-checkconf
  - exposure: global executable
    kind: cli
    name: unbound-control
  - exposure: global executable
    kind: cli
    name: unbound-control-setup
  - exposure: global executable
    kind: cli
    name: unbound-host
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
  service: declared
install-lines:
  apk: sudo apk add unbound
  av: sudo av install brew:unbound
  brew: brew install unbound
  debian: sudo apt install unbound
  dnf: sudo dnf install unbound
  macports: sudo port install unbound
  nix: nix profile install nixpkgs#unbound
  pacman: sudo pacman -S unbound
  scoop: scoop install main/unbound
  ubuntu: sudo apt install unbound
  winget: winget install --id NLnetLabs.Unbound -e
  zypper: sudo zypper install unbound
provenance:
  formula: unbound
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
