id: brew:pdfrip
display-name: pdfrip
homepage: https://github.com/mufeedvh/pdfrip
repo: https://github.com/mufeedvh/pdfrip
docs: https://github.com/mufeedvh/pdfrip
package-manager:
  brew: pdfrip
  nix: pdfrip
package-manager-url: https://formulae.brew.sh/formula/pdfrip
version: 3.0.0
license: MIT
category: security
tags:
  - cli
description: Multi-threaded PDF password cracking utility
source-archive: https://github.com/mufeedvh/pdfrip/archive/refs/tags/v3.0.0.tar.gz
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: pdfrip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pdfrip
  brew: brew install pdfrip
  nix: nix profile install nixpkgs#pdfrip
provenance:
  formula: pdfrip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
