id: brew:boxes
display-name: boxes
homepage: https://boxes.thomasjensen.com/
repo: https://github.com/ascii-boxes/boxes
docs: https://boxes.thomasjensen.com/
package-manager:
  apk: boxes
  brew: boxes
  debian: boxes
  dnf: boxes
  macports: boxes
  nix: boxes
  scoop: main/boxes
  ubuntu: boxes
package-manager-url: https://formulae.brew.sh/formula/boxes
version: 2.3.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: Draw boxes around text
source-archive: https://github.com/ascii-boxes/boxes/archive/refs/tags/v2.3.1.tar.gz
dependencies:
  - libunistring
  - pcre2
build-dependencies:
  - bison
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: boxes
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add boxes
  av: sudo av install brew:boxes
  brew: brew install boxes
  debian: sudo apt install boxes
  dnf: sudo dnf install boxes
  macports: sudo port install boxes
  nix: nix profile install nixpkgs#boxes
  scoop: scoop install main/boxes
  ubuntu: sudo apt install boxes
provenance:
  formula: boxes
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
