id: brew:sql-migrate
display-name: sql-migrate
homepage: https://github.com/rubenv/sql-migrate
repo: https://github.com/rubenv/sql-migrate
docs: https://github.com/rubenv/sql-migrate
package-manager:
  brew: sql-migrate
  debian: sql-migrate
  nix: sql-migrate
  ubuntu: sql-migrate
package-manager-url: https://formulae.brew.sh/formula/sql-migrate
version: 1.8.1
license: MIT
category: database
tags:
  - cli
description: SQL schema migration tool for Go
source-archive: https://github.com/rubenv/sql-migrate/archive/refs/tags/v1.8.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sql-migrate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sql-migrate
  brew: brew install sql-migrate
  debian: sudo apt install sql-migrate
  nix: nix profile install nixpkgs#sql-migrate
  ubuntu: sudo apt install sql-migrate
provenance:
  formula: sql-migrate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
