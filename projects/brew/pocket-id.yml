id: brew:pocket-id
display-name: pocket-id
homepage: https://pocket-id.org
repo: https://github.com/pocket-id/pocket-id
docs: https://pocket-id.org
package-manager:
  brew: pocket-id
  nix: pocket-id
package-manager-url: https://formulae.brew.sh/formula/pocket-id
version: 2.7.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Open-source identity provider for secure user authentication
source-archive: https://github.com/pocket-id/pocket-id/archive/refs/tags/v2.7.0.tar.gz
build-dependencies:
  - go
  - node
  - pnpm
executables:
  - exposure: global executable
    kind: cli
    name: pocket-id
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:pocket-id
  brew: brew install pocket-id
  nix: nix profile install nixpkgs#pocket-id
provenance:
  formula: pocket-id
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
