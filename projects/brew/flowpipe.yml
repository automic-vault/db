id: brew:flowpipe
display-name: flowpipe
homepage: https://flowpipe.io
repo: https://github.com/turbot/flowpipe
docs: https://flowpipe.io
package-manager:
  brew: flowpipe
package-manager-url: https://formulae.brew.sh/formula/flowpipe
version: 1.2.2
license: AGPL-3.0-only
category: cloud
tags:
  - cli
  - cloud
description: Cloud scripting engine
source-archive: https://github.com/turbot/flowpipe/archive/refs/tags/v1.2.2.tar.gz
build-dependencies:
  - corepack
  - go
  - node
executables:
  - exposure: global executable
    kind: cli
    name: flowpipe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flowpipe
  brew: brew install flowpipe
provenance:
  formula: flowpipe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
