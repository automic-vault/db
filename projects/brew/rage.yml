id: brew:rage
display-name: rage
homepage: https://str4d.xyz/rage
repo: https://github.com/str4d/rage
docs: https://str4d.xyz/rage
package-manager:
  apk: rage
  brew: rage
  macports: rage
  nix: rage
  pacman: rage
  scoop: main/rage
  winget: str4d.rage
  zypper: rage
package-manager-url: https://formulae.brew.sh/formula/rage
version: 0.11.2
license: MIT OR Apache-2.0
category: security
tags:
  - cli
description: Simple, modern, secure file encryption
source-archive: https://github.com/str4d/rage/archive/refs/tags/v0.11.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rage
  - exposure: global executable
    kind: cli
    name: rage-keygen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rage
  av: sudo av install brew:rage
  brew: brew install rage
  macports: sudo port install rage
  nix: nix profile install nixpkgs#rage
  pacman: sudo pacman -S rage
  scoop: scoop install main/rage
  winget: winget install --id str4d.rage -e
  zypper: sudo zypper install rage
provenance:
  formula: rage
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
