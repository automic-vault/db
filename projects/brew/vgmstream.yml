id: brew:vgmstream
display-name: vgmstream
homepage: https://vgmstream.org
repo: https://github.com/vgmstream/vgmstream
docs: https://vgmstream.org
package-manager:
  brew: vgmstream
  nix: vgmstream
  scoop: main/vgmstream
  winget: vgmstream.vgmstream
package-manager-url: https://formulae.brew.sh/formula/vgmstream
version: r2117
license: ISC
category: development
tags:
  - cli
description: Library for playing streamed audio formats from video games
source-archive: https://github.com/vgmstream/vgmstream.git
dependencies:
  - ffmpeg
  - libao
  - libogg
  - libvorbis
  - mpg123
  - speex
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: vgmstream-cli
  - exposure: global executable
    kind: cli
    name: vgmstream123
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vgmstream
  brew: brew install vgmstream
  nix: nix profile install nixpkgs#vgmstream
  scoop: scoop install main/vgmstream
  winget: winget install --id vgmstream.vgmstream -e
provenance:
  formula: vgmstream
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
