id: brew:gptsync
display-name: gptsync
homepage: https://refit.sourceforge.net/
repo: https://downloads.sourceforge.net/project/refit/rEFIt/0.14/refit-src-0.14.tar.gz
docs: https://refit.sourceforge.net/
package-manager:
  brew: gptsync
package-manager-url: https://formulae.brew.sh/formula/gptsync
version: 0.14
license: BSD-3-Clause
category: network
tags:
  - cli
description: GPT and MBR partition tables synchronization tool
source-archive: https://downloads.sourceforge.net/project/refit/rEFIt/0.14/refit-src-0.14.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: gptsync
  - exposure: global executable
    kind: cli
    name: showpart
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gptsync
  brew: brew install gptsync
provenance:
  formula: gptsync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
