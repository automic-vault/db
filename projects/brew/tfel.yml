id: brew:tfel
display-name: tfel
homepage: https://thelfer.github.io/tfel/web/index.html
repo: https://github.com/thelfer/tfel
docs: https://thelfer.github.io/tfel/web/index.html
package-manager:
  brew: tfel
package-manager-url: https://formulae.brew.sh/formula/tfel
version: 5.1.0
license: GPL-1.0-or-later
category: development
tags:
  - cli
description: Code generation tool dedicated to material knowledge for numerical mechanics
source-archive: https://github.com/thelfer/tfel/archive/refs/tags/TFEL-5.1.0.tar.gz
dependencies:
  - python@3.14
build-dependencies:
  - cmake
  - gcc
  - pybind11
executables:
  - exposure: global executable
    kind: cli
    name: mfm
  - exposure: global executable
    kind: cli
    name: mfm-test-generator
  - exposure: global executable
    kind: cli
    name: mfront
  - exposure: global executable
    kind: cli
    name: mfront-doc
  - exposure: global executable
    kind: cli
    name: mfront-query
  - exposure: global executable
    kind: cli
    name: mtest
  - exposure: global executable
    kind: cli
    name: tfel-check
  - exposure: global executable
    kind: cli
    name: tfel-config
  - exposure: global executable
    kind: cli
    name: tfel-doc
  - exposure: global executable
    kind: cli
    name: tfel-unicode-filt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tfel
  brew: brew install tfel
provenance:
  formula: tfel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
