id: brew:virtctl
display-name: virtctl
homepage: https://kubevirt.io/
repo: https://github.com/kubevirt/kubevirt
docs: https://kubevirt.io/
package-manager:
  apk: virtctl
  brew: virtctl
package-manager-url: https://formulae.brew.sh/formula/virtctl
version: 1.8.2
license: Apache-2.0
category: development
tags:
  - cli
description: Allows for using more advanced kubevirt features
source-archive: https://github.com/kubevirt/kubevirt/archive/refs/tags/v1.8.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: virtctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add virtctl
  av: sudo av install brew:virtctl
  brew: brew install virtctl
provenance:
  formula: virtctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
