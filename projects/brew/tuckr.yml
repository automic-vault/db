id: brew:tuckr
display-name: tuckr
homepage: https://raphgl.github.io/Tuckr/
repo: https://github.com/RaphGL/Tuckr
docs: https://raphgl.github.io/Tuckr/
package-manager:
  apk: tuckr
  brew: tuckr
  nix: tuckr
  winget: RaphGL.Tuckr
package-manager-url: https://formulae.brew.sh/formula/tuckr
version: 0.13.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Super powered replacement for GNU Stow
source-archive: https://github.com/RaphGL/Tuckr/archive/refs/tags/0.13.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tuckr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tuckr
  av: sudo av install brew:tuckr
  brew: brew install tuckr
  nix: nix profile install nixpkgs#tuckr
  winget: winget install --id RaphGL.Tuckr -e
provenance:
  formula: tuckr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
