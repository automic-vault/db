id: brew:sqlite-analyzer
display-name: sqlite-analyzer
homepage: https://www.sqlite.org/
repo: https://www.sqlite.org/2026/sqlite-src-3530100.zip
docs: https://www.sqlite.org/
package-manager:
  apk: sqlite-analyzer
  brew: sqlite-analyzer
  chocolatey: sqlite.analyzer
  dnf: sqlite-analyzer
  pacman: sqlite-analyzer
package-manager-url: https://formulae.brew.sh/formula/sqlite-analyzer
version: 3.53.1
license: blessing
category: database
tags:
  - cli
description: Analyze how space is allocated inside an SQLite file
source-archive: https://www.sqlite.org/2026/sqlite-src-3530100.zip
dependencies:
  - libtommath
  - tcl-tk
executables:
  - exposure: global executable
    kind: cli
    name: sqlite3_analyzer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sqlite-analyzer
  av: sudo av install brew:sqlite-analyzer
  brew: brew install sqlite-analyzer
  chocolatey: choco install sqlite.analyzer
  dnf: sudo dnf install sqlite-analyzer
  pacman: sudo pacman -S sqlite-analyzer
provenance:
  formula: sqlite-analyzer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
