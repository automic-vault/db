id: brew:bkmr
display-name: bkmr
homepage: https://github.com/sysid/bkmr
repo: https://github.com/sysid/bkmr
docs: https://github.com/sysid/bkmr
package-manager:
  brew: bkmr
package-manager-url: https://formulae.brew.sh/formula/bkmr
version: 7.6.4
license: BSD-3-Clause
category: development
tags:
  - cli
description: Unified CLI Tool for Bookmark, Snippet, and Knowledge Management
source-archive: https://github.com/sysid/bkmr/archive/refs/tags/v7.6.4.tar.gz
dependencies:
  - onnxruntime
  - openssl@3
build-dependencies:
  - rust
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: bkmr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bkmr
  brew: brew install bkmr
provenance:
  formula: bkmr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
