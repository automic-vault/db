id: brew:powerman
display-name: powerman
homepage: https://github.com/chaos/powerman
repo: https://github.com/chaos/powerman
docs: https://github.com/chaos/powerman
package-manager:
  brew: powerman
  debian: powerman
  ubuntu: powerman
  zypper: powerman
package-manager-url: https://formulae.brew.sh/formula/powerman
version: 2.4.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Control (remotely and in parallel) switched power distribution units
source-archive: https://github.com/chaos/powerman/releases/download/v2.4.4/powerman-2.4.4.tar.gz
dependencies:
  - jansson
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: httppower
  - exposure: global executable
    kind: cli
    name: plmpower
  - exposure: global executable
    kind: cli
    name: pm
  - exposure: global executable
    kind: cli
    name: powerman
  - exposure: global executable
    kind: cli
    name: powermand
  - exposure: global executable
    kind: cli
    name: redfishpower
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:powerman
  brew: brew install powerman
  debian: sudo apt install powerman
  ubuntu: sudo apt install powerman
  zypper: sudo zypper install powerman
provenance:
  formula: powerman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
