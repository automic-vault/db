id: brew:easeprobe
display-name: easeprobe
homepage: https://github.com/megaease/easeprobe
repo: https://github.com/megaease/easeprobe
docs: https://github.com/megaease/easeprobe
package-manager:
  brew: easeprobe
  nix: easeprobe
package-manager-url: https://formulae.brew.sh/formula/easeprobe
version: 2.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Simple, standalone, and lightWeight tool that can do health/status checking
source-archive: https://github.com/megaease/easeprobe/archive/refs/tags/v2.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: easeprobe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:easeprobe
  brew: brew install easeprobe
  nix: nix profile install nixpkgs#easeprobe
provenance:
  formula: easeprobe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
