id: brew:ghz-web
display-name: ghz-web
homepage: https://ghz.sh
repo: https://github.com/bojand/ghz
docs: https://ghz.sh
package-manager:
  brew: ghz-web
package-manager-url: https://formulae.brew.sh/formula/ghz-web
version: 0.121.0
license: Apache-2.0
category: development
tags:
  - cli
description: Web interface for ghz
source-archive: https://github.com/bojand/ghz/archive/refs/tags/v0.121.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ghz-web
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ghz-web
  brew: brew install ghz-web
provenance:
  formula: ghz-web
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
