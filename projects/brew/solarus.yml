id: brew:solarus
display-name: solarus
homepage: https://www.solarus-games.org/
repo: https://gitlab.com/solarus-games/solarus
docs: https://www.solarus-games.org/
package-manager:
  brew: solarus
  nix: solarus
  zypper: solarus
package-manager-url: https://formulae.brew.sh/formula/solarus
version: 2.0.4
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Action-RPG game engine
source-archive: https://gitlab.com/solarus-games/solarus.git
dependencies:
  - glm
  - libmodplug
  - libogg
  - libvorbis
  - luajit
  - openal-soft
  - physfs
  - sdl2
  - sdl2_image
  - sdl2_ttf
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: solarus-run
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:solarus
  brew: brew install solarus
  nix: nix profile install nixpkgs#solarus
  zypper: sudo zypper install solarus
provenance:
  formula: solarus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
