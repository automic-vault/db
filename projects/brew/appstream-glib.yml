id: brew:appstream-glib
display-name: appstream-glib
homepage: https://github.com/hughsie/appstream-glib
repo: https://github.com/hughsie/appstream-glib
docs: https://github.com/hughsie/appstream-glib
package-manager:
  apk: appstream-glib
  brew: appstream-glib
  debian: appstream-compose
  dnf: appstream-compose
  macports: appstream-glib
  nix: appstream-glib
  pacman: appstream-glib
  ubuntu: appstream-compose
  zypper: appstream-glib
package-manager-url: https://formulae.brew.sh/formula/appstream-glib
version: 0.8.3
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Helper library for reading and writing AppStream metadata
source-archive: https://github.com/hughsie/appstream-glib/archive/refs/tags/appstream_glib_0_8_3.tar.gz
dependencies:
  - gdk-pixbuf
  - gettext
  - glib
  - json-glib
  - libarchive
build-dependencies:
  - docbook
  - docbook-xsl
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: appstream-compose
  - exposure: global executable
    kind: cli
    name: appstream-util
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add appstream-glib
  av: sudo av install brew:appstream-glib
  brew: brew install appstream-glib
  debian: sudo apt install appstream-compose
  dnf: sudo dnf install appstream-compose
  macports: sudo port install appstream-glib
  nix: nix profile install nixpkgs#appstream-glib
  pacman: sudo pacman -S appstream-glib
  ubuntu: sudo apt install appstream-compose
  zypper: sudo zypper install appstream-glib
provenance:
  formula: appstream-glib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
