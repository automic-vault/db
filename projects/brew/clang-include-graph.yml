id: brew:clang-include-graph
display-name: clang-include-graph
homepage: https://github.com/bkryza/clang-include-graph
repo: https://github.com/bkryza/clang-include-graph
docs: https://github.com/bkryza/clang-include-graph
package-manager:
  brew: clang-include-graph
package-manager-url: https://formulae.brew.sh/formula/clang-include-graph
version: 0.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: Simple tool for visualizing and analyzing C/C++ project include graph
source-archive: https://github.com/bkryza/clang-include-graph/archive/refs/tags/0.2.0.tar.gz
dependencies:
  - boost
  - llvm
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: clang-include-graph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clang-include-graph
  brew: brew install clang-include-graph
provenance:
  formula: clang-include-graph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
