id: brew:sqlite3-to-mysql
display-name: sqlite3-to-mysql
homepage: https://github.com/techouse/sqlite3-to-mysql
repo: >
  https://files.pythonhosted.org/packages/dd/a3/a39130ba3bbd9ad22ca794fd5ef93b20492474c16879ced76c6b05e60986/sqlite3_to_mysql-2.6.0.tar.gz
docs: https://github.com/techouse/sqlite3-to-mysql
package-manager:
  brew: sqlite3-to-mysql
  nix: sqlite3-to-mysql
package-manager-url: https://formulae.brew.sh/formula/sqlite3-to-mysql
version: 2.6.0
license: MIT
category: database
tags:
  - cli
description: Transfer data from SQLite to MySQL
source-archive: >
  https://files.pythonhosted.org/packages/dd/a3/a39130ba3bbd9ad22ca794fd5ef93b20492474c16879ced76c6b05e60986/sqlite3_to_mysql-2.6.0.tar.gz
dependencies:
  - python@3.14
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: sqlite3mysql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sqlite3-to-mysql
  brew: brew install sqlite3-to-mysql
  nix: nix profile install nixpkgs#sqlite3-to-mysql
provenance:
  formula: sqlite3-to-mysql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
