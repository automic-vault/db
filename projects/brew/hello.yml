id: brew:hello
display-name: hello
homepage: https://www.gnu.org/software/hello/
repo: https://ftpmirror.gnu.org/gnu/hello/hello-2.12.3.tar.gz
docs: https://www.gnu.org/software/hello/
package-manager:
  brew: hello
  debian: hello
  dnf: hello
  macports: hello
  nix: hello
  ubuntu: hello
  zypper: hello
package-manager-url: https://formulae.brew.sh/formula/hello
version: 2.12.3
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Program providing model for GNU coding standards and practices
source-archive: https://ftpmirror.gnu.org/gnu/hello/hello-2.12.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: hello
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hello
  brew: brew install hello
  debian: sudo apt install hello
  dnf: sudo dnf install hello
  macports: sudo port install hello
  nix: nix profile install nixpkgs#hello
  ubuntu: sudo apt install hello
  zypper: sudo zypper install hello
provenance:
  formula: hello
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
