  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:apkleaks
  brew: brew install apkleaks
  nix: nix profile install nixpkgs#apkleaks
provenance:
  formula: apkleaks
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
