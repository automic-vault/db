id: brew:apkleaks
display-name: apkleaks
homepage: https://github.com/dwisiswant0/apkleaks
repo: >
  https://files.pythonhosted.org/packages/1e/e6/203661abe151dbc59096de65d6f0cf392d1aad3acba32f4e9f3f389acad0/apkleaks-2.6.3.tar.gz
docs: https://github.com/dwisiswant0/apkleaks
package-manager:
  brew: apkleaks
  nix: apkleaks
package-manager-url: https://formulae.brew.sh/formula/apkleaks
version: 2.6.3
license: Apache-2.0
category: security
tags:
  - cli
description: Scanning APK file for URIs, endpoints & secrets
source-archive: >
  https://files.pythonhosted.org/packages/1e/e6/203661abe151dbc59096de65d6f0cf392d1aad3acba32f4e9f3f389acad0/apkleaks-2.6.3.tar.gz
dependencies:
  - jadx
  - python@3.14
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: apkleaks
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
