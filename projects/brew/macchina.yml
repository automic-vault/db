id: brew:macchina
display-name: macchina
homepage: https://github.com/Macchina-CLI/macchina
repo: https://github.com/Macchina-CLI/macchina
docs: https://github.com/Macchina-CLI/macchina
package-manager:
  apk: macchina
  brew: macchina
  nix: macchina
  pacman: macchina
  scoop: main/macchina
package-manager-url: https://formulae.brew.sh/formula/macchina
version: 6.4.0
license: MIT
category: development
tags:
  - cli
description: System information fetcher, with an emphasis on performance and minimalism
source-archive: https://github.com/Macchina-CLI/macchina/archive/refs/tags/v6.4.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: macchina
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add macchina
  av: sudo av install brew:macchina
  brew: brew install macchina
  nix: nix profile install nixpkgs#macchina
  pacman: sudo pacman -S macchina
  scoop: scoop install main/macchina
provenance:
  formula: macchina
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
