id: brew:gitu
display-name: gitu
homepage: https://github.com/altsem/gitu
repo: https://github.com/altsem/gitu
docs: https://github.com/altsem/gitu
package-manager:
  apk: gitu
  brew: gitu
  macports: gitu
  nix: gitu
  pacman: gitu
  scoop: extras/gitu
package-manager-url: https://formulae.brew.sh/formula/gitu
version: 0.42.0
license: MIT
category: development
tags:
  - cli
  - git
description: TUI Git client inspired by Magit
source-archive: https://github.com/altsem/gitu/archive/refs/tags/v0.42.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gitu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gitu
  av: sudo av install brew:gitu
  brew: brew install gitu
  macports: sudo port install gitu
  nix: nix profile install nixpkgs#gitu
  pacman: sudo pacman -S gitu
  scoop: scoop install extras/gitu
provenance:
  formula: gitu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
