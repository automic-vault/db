id: brew:sha1dc
display-name: sha1dc
homepage: https://github.com/cr-marcstevens/sha1collisiondetection
repo: https://github.com/cr-marcstevens/sha1collisiondetection
docs: https://github.com/cr-marcstevens/sha1collisiondetection
package-manager:
  brew: sha1dc
package-manager-url: https://formulae.brew.sh/formula/sha1dc
version: 1.0.3
license: MIT
category: development
tags:
  - cli
description: Tool to detect SHA-1 collisions in files, including SHAttered
source-archive: >
  https://github.com/cr-marcstevens/sha1collisiondetection/archive/refs/tags/stable-v1.0.3.tar.gz
build-dependencies:
  - coreutils
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: sha1dcsum
  - exposure: global executable
    kind: cli
    name: sha1dcsum_partialcoll
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sha1dc
  brew: brew install sha1dc
provenance:
  formula: sha1dc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
