id: brew:exult
display-name: exult
homepage: https://exult.sourceforge.io/
repo: https://github.com/exult/exult
docs: https://exult.sourceforge.io/
package-manager:
  brew: exult
  debian: exult
  nix: exult
  ubuntu: exult
package-manager-url: https://formulae.brew.sh/formula/exult
version: 1.12.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Recreation of Ultima 7
source-archive: https://github.com/exult/exult/archive/refs/tags/v1.12.1.tar.gz
dependencies:
  - libogg
  - libvorbis
  - sdl2
build-dependencies:
  - autoconf
  - autoconf-archive
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cmanip
  - exposure: global executable
    kind: cli
    name: expack
  - exposure: global executable
    kind: cli
    name: exult
  - exposure: global executable
    kind: cli
    name: mklink
  - exposure: global executable
    kind: cli
    name: shp2pcx
  - exposure: global executable
    kind: cli
    name: splitshp
  - exposure: global executable
    kind: cli
    name: textpack
  - exposure: global executable
    kind: cli
    name: u7voice2syx
  - exposure: global executable
    kind: cli
    name: ucxt
  - exposure: global executable
    kind: cli
    name: wuc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This formula only includes the game engine; you will need to supply your own own
    legal copy of the Ultima 7 game files for the software to fully function. Update
    audio settings accordingly with configuration file: ~/Library/Preferences/exult.cfg
    To use CoreAudio, set `driver` to `CoreAudio`. To use audio pack, set `use_oggs` to
    `yes`.
  post-install-defined: false
install-lines:
  av: sudo av install brew:exult
  brew: brew install exult
  debian: sudo apt install exult
  nix: nix profile install nixpkgs#exult
  ubuntu: sudo apt install exult
provenance:
  formula: exult
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
