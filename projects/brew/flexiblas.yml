id: brew:flexiblas
display-name: flexiblas
homepage: https://www.mpi-magdeburg.mpg.de/projects/flexiblas
repo: https://csc.mpi-magdeburg.mpg.de/mpcsc/software/flexiblas/flexiblas-3.5.0.tar.xz
docs: https://www.mpi-magdeburg.mpg.de/projects/flexiblas
package-manager:
  brew: flexiblas
  dnf: flexiblas
  macports: flexiblas
package-manager-url: https://formulae.brew.sh/formula/flexiblas
version: 3.5.0
license: LGPL-3.0-or-later AND LGPL-2.1-or-later AND BSD-3-Clause-Open-MPI
category: network
tags:
  - cli
description: BLAS and LAPACK wrapper library with runtime exchangable backends
source-archive: https://csc.mpi-magdeburg.mpg.de/mpcsc/software/flexiblas/flexiblas-3.5.0.tar.xz
dependencies:
  - gcc
  - openblas
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: flexiblas
  - exposure: global executable
    kind: cli
    name: flexiblas-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    FlexiBLAS includes the following backends: APPLE, OpenBLASOpenMP, NETLIB APPLE has
    been set as the default in $HOMEBREW_PREFIX/etc/flexiblasrc
  post-install-defined: false
install-lines:
  av: sudo av install brew:flexiblas
  brew: brew install flexiblas
  dnf: sudo dnf install flexiblas
  macports: sudo port install flexiblas
provenance:
  formula: flexiblas
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
