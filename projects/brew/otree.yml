id: brew:otree
display-name: otree
homepage: https://github.com/fioncat/otree
repo: https://github.com/fioncat/otree
docs: https://github.com/fioncat/otree
package-manager:
  apk: otree
  brew: otree
  macports: otree
  nix: otree
package-manager-url: https://formulae.brew.sh/formula/otree
version: 0.6.5
license: MIT
category: development
tags:
  - cli
  - json
  - yaml
description: Command-line tool to view objects (JSON/YAML/TOML) in TUI tree widget
source-archive: https://github.com/fioncat/otree/archive/refs/tags/v0.6.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: otree
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add otree
  av: sudo av install brew:otree
  brew: brew install otree
  macports: sudo port install otree
  nix: nix profile install nixpkgs#otree
provenance:
  formula: otree
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
