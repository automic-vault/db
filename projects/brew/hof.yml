id: brew:hof
display-name: hof
homepage: https://hofstadter.io/
repo: https://github.com/hofstadter-io/hof
docs: https://hofstadter.io/
package-manager:
  brew: hof
  macports: hof
  nix: hof
package-manager-url: https://formulae.brew.sh/formula/hof
version: 0.6.10
license: Apache-2.0
category: development
tags:
  - cli
description: Flexible data modeling & code generation system
source-archive: https://github.com/hofstadter-io/hof/archive/refs/tags/v0.6.10.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hof
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hof
  brew: brew install hof
  macports: sudo port install hof
  nix: nix profile install nixpkgs#hof
provenance:
  formula: hof
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
