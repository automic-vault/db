id: brew:logswan
display-name: logswan
homepage: https://www.logswan.org
repo: https://github.com/fcambus/logswan
docs: https://www.logswan.org
package-manager:
  brew: logswan
  debian: logswan
  ubuntu: logswan
package-manager-url: https://formulae.brew.sh/formula/logswan
version: 2.1.16
license: BSD-2-Clause
category: development
tags:
  - cli
description: Fast Web log analyzer using probabilistic data structures
source-archive: https://github.com/fcambus/logswan/archive/refs/tags/2.1.16.tar.gz
dependencies:
  - jansson
  - libmaxminddb
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: logswan
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:logswan
  brew: brew install logswan
  debian: sudo apt install logswan
  ubuntu: sudo apt install logswan
provenance:
  formula: logswan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
