id: brew:chezmoi
display-name: chezmoi
homepage: https://chezmoi.io/
repo: https://github.com/twpayne/chezmoi
docs: https://chezmoi.io/
package-manager:
  apk: chezmoi
  brew: chezmoi
  chocolatey: chezmoi
  dnf: chezmoi
  macports: chezmoi
  nix: chezmoi
  pacman: chezmoi
  scoop: main/chezmoi
  winget: twpayne.chezmoi
  zypper: chezmoi
package-manager-url: https://formulae.brew.sh/formula/chezmoi
version: 2.70.4
license: MIT
category: development
tags:
  - cli
description: Manage your dotfiles across multiple diverse machines, securely
source-archive: https://github.com/twpayne/chezmoi/releases/download/v2.70.4/chezmoi-2.70.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: chezmoi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add chezmoi
  av: sudo av install brew:chezmoi
  brew: brew install chezmoi
  chocolatey: choco install chezmoi
  dnf: sudo dnf install chezmoi
  macports: sudo port install chezmoi
  nix: nix profile install nixpkgs#chezmoi
  pacman: sudo pacman -S chezmoi
  scoop: scoop install main/chezmoi
  winget: winget install --id twpayne.chezmoi -e
  zypper: sudo zypper install chezmoi
provenance:
  formula: chezmoi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
