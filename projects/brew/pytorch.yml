id: brew:pytorch
display-name: pytorch
homepage: https://pytorch.org/
repo: https://github.com/pytorch/pytorch
docs: https://pytorch.org/
package-manager:
  brew: pytorch
package-manager-url: https://formulae.brew.sh/formula/pytorch
version: 2.12.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Tensors and dynamic neural networks
source-archive: https://github.com/pytorch/pytorch/releases/download/v2.12.0/pytorch-v2.12.0.tar.gz
dependencies:
  - abseil
  - eigen
  - libomp
  - libuv
  - libyaml
  - numpy
  - onnx
  - openblas
  - protobuf
  - sleef
build-dependencies:
  - cmake
  - ninja
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: torchrun
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pytorch
  brew: brew install pytorch
provenance:
  formula: pytorch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
