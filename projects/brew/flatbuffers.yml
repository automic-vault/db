id: brew:flatbuffers
display-name: flatbuffers
homepage: https://google.github.io/flatbuffers
repo: https://github.com/google/flatbuffers
docs: https://google.github.io/flatbuffers
package-manager:
  apk: flatbuffers
  brew: flatbuffers
  chocolatey: flatc
  dnf: flatbuffers
  macports: flatbuffers
  nix: flatbuffers
  pacman: flatbuffers
  scoop: main/flatc
  winget: Google.flatbuffers
package-manager-url: https://formulae.brew.sh/formula/flatbuffers
version: 25.12.19
license: Apache-2.0
category: development
tags:
  - cli
description: Serialization library for C++, supporting Java, C#, and Go
source-archive: https://github.com/google/flatbuffers/archive/refs/tags/v25.12.19.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: flatc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add flatbuffers
  av: sudo av install brew:flatbuffers
  brew: brew install flatbuffers
  chocolatey: choco install flatc
  dnf: sudo dnf install flatbuffers
  macports: sudo port install flatbuffers
  nix: nix profile install nixpkgs#flatbuffers
  pacman: sudo pacman -S flatbuffers
  scoop: scoop install main/flatc
  winget: winget install --id Google.flatbuffers -e
provenance:
  formula: flatbuffers
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
