id: brew:udp2raw-multiplatform
display-name: udp2raw-multiplatform
homepage: https://github.com/wangyu-/udp2raw-multiplatform
repo: https://github.com/wangyu-/udp2raw-multiplatform
docs: https://github.com/wangyu-/udp2raw-multiplatform
package-manager:
  brew: udp2raw-multiplatform
package-manager-url: https://formulae.brew.sh/formula/udp2raw-multiplatform
version: 20230206.0
license: MIT
category: development
tags:
  - cli
description: Multi-platform(cross-platform) version of udp2raw-tunnel client
source-archive: https://github.com/wangyu-/udp2raw-multiplatform/archive/refs/tags/20230206.0.tar.gz
dependencies:
  - libnet
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: udp2raw_mp
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:udp2raw-multiplatform
  brew: brew install udp2raw-multiplatform
provenance:
  formula: udp2raw-multiplatform
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
