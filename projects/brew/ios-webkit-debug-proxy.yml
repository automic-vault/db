id: brew:ios-webkit-debug-proxy
display-name: ios-webkit-debug-proxy
homepage: https://github.com/google/ios-webkit-debug-proxy
repo: https://github.com/google/ios-webkit-debug-proxy
docs: https://github.com/google/ios-webkit-debug-proxy
package-manager:
  brew: ios-webkit-debug-proxy
  nix: ios-webkit-debug-proxy
  scoop: extras/ios-webkit-debug-proxy
package-manager-url: https://formulae.brew.sh/formula/ios-webkit-debug-proxy
version: 1.9.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: DevTools proxy for iOS devices
source-archive: https://github.com/google/ios-webkit-debug-proxy/archive/refs/tags/v1.9.2.tar.gz
dependencies:
  - libimobiledevice
  - libplist
  - libusbmuxd
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ios_webkit_debug_proxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ios-webkit-debug-proxy
  brew: brew install ios-webkit-debug-proxy
  nix: nix profile install nixpkgs#ios-webkit-debug-proxy
  scoop: scoop install extras/ios-webkit-debug-proxy
provenance:
  formula: ios-webkit-debug-proxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
