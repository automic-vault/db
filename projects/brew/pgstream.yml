id: brew:pgstream
display-name: pgstream
homepage: https://github.com/xataio/pgstream
repo: https://github.com/xataio/pgstream
docs: https://github.com/xataio/pgstream
package-manager:
  brew: pgstream
package-manager-url: https://formulae.brew.sh/formula/pgstream
version: 1.0.3
license: Apache-2.0
category: database
tags:
  - cli
description: PostgreSQL replication with DDL changes
source-archive: https://github.com/xataio/pgstream/archive/refs/tags/v1.0.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pgstream
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pgstream
  brew: brew install pgstream
provenance:
  formula: pgstream
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
