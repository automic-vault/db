id: brew:osinfo-db-tools
display-name: osinfo-db-tools
homepage: https://libosinfo.org/
repo: https://releases.pagure.org/libosinfo/osinfo-db-tools-1.12.0.tar.xz
docs: https://libosinfo.org/
package-manager:
  apk: osinfo-db-tools
  brew: osinfo-db-tools
  debian: osinfo-db-tools
  dnf: osinfo-db-tools
  macports: osinfo-db-tools
  nix: osinfo-db-tools
  pacman: osinfo-db-tools
  ubuntu: osinfo-db-tools
  zypper: osinfo-db-tools
package-manager-url: https://formulae.brew.sh/formula/osinfo-db-tools
version: 1.12.0
license: GPL-2.0-or-later
category: database
tags:
  - cli
  - database
description: Tools for managing the libosinfo database files
source-archive: https://releases.pagure.org/libosinfo/osinfo-db-tools-1.12.0.tar.xz
dependencies:
  - gettext
  - glib
  - json-glib
  - libarchive
  - libsoup
build-dependencies:
  - gettext
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: osinfo-db-export
  - exposure: global executable
    kind: cli
    name: osinfo-db-import
  - exposure: global executable
    kind: cli
    name: osinfo-db-path
  - exposure: global executable
    kind: cli
    name: osinfo-db-validate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add osinfo-db-tools
  av: sudo av install brew:osinfo-db-tools
  brew: brew install osinfo-db-tools
  debian: sudo apt install osinfo-db-tools
  dnf: sudo dnf install osinfo-db-tools
  macports: sudo port install osinfo-db-tools
  nix: nix profile install nixpkgs#osinfo-db-tools
  pacman: sudo pacman -S osinfo-db-tools
  ubuntu: sudo apt install osinfo-db-tools
  zypper: sudo zypper install osinfo-db-tools
provenance:
  formula: osinfo-db-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
