id: brew:aws-sso-cli
display-name: aws-sso-cli
homepage: https://synfinatic.github.io/aws-sso-cli/
repo: https://github.com/synfinatic/aws-sso-cli
docs: https://synfinatic.github.io/aws-sso-cli/
package-manager:
  brew: aws-sso-cli
  nix: aws-sso-cli
  scoop: main/aws-sso-cli
package-manager-url: https://formulae.brew.sh/formula/aws-sso-cli
version: 2.2.4
license: GPL-3.0-only
category: cloud
tags:
  - aws
  - cli
description: Securely manage AWS API credentials using AWS SSO
source-archive: https://github.com/synfinatic/aws-sso-cli/archive/refs/tags/v2.2.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aws-sso
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aws-sso-cli
  brew: brew install aws-sso-cli
  nix: nix profile install nixpkgs#aws-sso-cli
  scoop: scoop install main/aws-sso-cli
provenance:
  formula: aws-sso-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
