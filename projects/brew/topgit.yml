repo: https://github.com/mackyle/topgit
docs: https://github.com/mackyle/topgit
package-manager:
  apk: topgit
  brew: topgit
  debian: topgit
  dnf: topgit
  nix: tg
  ubuntu: topgit
package-manager-url: https://formulae.brew.sh/formula/topgit
version: 0.19.14
license: GPL-2.0-only
