id: brew:lizard
display-name: lizard
homepage: https://github.com/inikep/lizard
repo: https://github.com/inikep/lizard
docs: https://github.com/inikep/lizard
package-manager:
  brew: lizard
  macports: lizard
package-manager-url: https://formulae.brew.sh/formula/lizard
version: 2.1
license: BSD-2-Clause AND GPL-2.0-or-later
category: development
tags:
  - cli
description: Efficient compressor with very fast decompression
source-archive: https://github.com/inikep/lizard/archive/refs/tags/v2.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lizardcat
  - exposure: global executable
    kind: cli
    name: unlizard
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lizard
  brew: brew install lizard
  macports: sudo port install lizard
provenance:
  formula: lizard
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
