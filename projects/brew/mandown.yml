id: brew:mandown
display-name: mandown
homepage: https://github.com/Titor8115/mandown
repo: https://github.com/Titor8115/mandown
docs: https://github.com/Titor8115/mandown
package-manager:
  apk: mandown
  brew: mandown
  nix: mandown
  pacman: mandown
  zypper: mandown
package-manager-url: https://formulae.brew.sh/formula/mandown
version: 1.0.5.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Man-page inspired Markdown viewer
source-archive: https://github.com/Titor8115/mandown/archive/refs/tags/v1.0.5.2.tar.gz
dependencies:
  - libconfig
  - ncurses
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: mdn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mandown
  av: sudo av install brew:mandown
  brew: brew install mandown
  nix: nix profile install nixpkgs#mandown
  pacman: sudo pacman -S mandown
  zypper: sudo zypper install mandown
provenance:
  formula: mandown
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
