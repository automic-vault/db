id: brew:arm-linux-gnueabihf-binutils
display-name: arm-linux-gnueabihf-binutils
homepage: https://www.gnu.org/software/binutils/binutils.html
repo: https://ftpmirror.gnu.org/gnu/binutils/binutils-2.46.0.tar.bz2
docs: https://www.gnu.org/software/binutils/binutils.html
package-manager:
  brew: arm-linux-gnueabihf-binutils
package-manager-url: https://formulae.brew.sh/formula/arm-linux-gnueabihf-binutils
version: 2.46.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: FSF/GNU binutils for cross-compiling to arm-linux
source-archive: https://ftpmirror.gnu.org/gnu/binutils/binutils-2.46.0.tar.bz2
dependencies:
  - zstd
build-dependencies:
  - pkgconf
  - texinfo
executables:
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-addr2line
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-ar
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-as
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-c++filt
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-elfedit
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-gprof
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-ld
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-ld.bfd
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-nm
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-objcopy
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-objdump
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-ranlib
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-readelf
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-size
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-strings
  - exposure: global executable
    kind: cli
    name: arm-linux-gnueabihf-strip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:arm-linux-gnueabihf-binutils
  brew: brew install arm-linux-gnueabihf-binutils
provenance:
  formula: arm-linux-gnueabihf-binutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
