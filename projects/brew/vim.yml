id: brew:vim
display-name: vim
homepage: https://www.vim.org/
repo: https://github.com/vim/vim
docs: https://www.vim.org/
package-manager:
  apk: vim
  brew: vim
  chocolatey: vim
  debian: vim
  dnf: xxd
  macports: vim
  nix: vim
  pacman: vim
  scoop: main/vim
  ubuntu: vim
  winget: vim.vim
  zypper: vim
package-manager-url: https://formulae.brew.sh/formula/vim
version: 9.2.0500
license: Vim
category: development
tags:
  - cli
description: Vi 'workalike' with many additional features
source-archive: https://github.com/vim/vim/archive/refs/tags/v9.2.0500.tar.gz
dependencies:
  - gettext
  - libsodium
  - ncurses
build-dependencies:
  - gettext
  - lua
  - python@3.14
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: ex
  - exposure: global executable
    kind: cli
    name: rview
  - exposure: global executable
    kind: cli
    name: rvim
  - exposure: global executable
    kind: cli
    name: vi
  - exposure: global executable
    kind: cli
    name: view
  - exposure: global executable
    kind: cli
    name: vim
  - exposure: global executable
    kind: cli
    name: vimdiff
  - exposure: global executable
    kind: cli
    name: vimtutor
  - exposure: global executable
    kind: cli
    name: xxd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Additional features can be enabled by installing: lua, python@3.14, ruby'
  post-install-defined: false
install-lines:
  apk: sudo apk add vim
  av: sudo av install brew:vim
  brew: brew install vim
  chocolatey: choco install vim
  debian: sudo apt install vim
  dnf: sudo dnf install xxd
  macports: sudo port install vim
  nix: nix profile install nixpkgs#vim
  pacman: sudo pacman -S vim
  scoop: scoop install main/vim
  ubuntu: sudo apt install vim
  winget: winget install --id vim.vim -e
  zypper: sudo zypper install vim
provenance:
  formula: vim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
