id: brew:expert
display-name: expert
homepage: https://expert-lsp.org
repo: https://github.com/expert-lsp/expert
docs: https://expert-lsp.org
package-manager:
  brew: expert
package-manager-url: https://formulae.brew.sh/formula/expert
version: 0.1.4
license: Apache-2.0
category: development
tags:
  - cli
description: Official Elixir Language Server Protocol implementation
source-archive: https://github.com/expert-lsp/expert/archive/refs/tags/v0.1.4.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - elixir
  - erlang
  - just
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: expert
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:expert
  brew: brew install expert
provenance:
  formula: expert
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
