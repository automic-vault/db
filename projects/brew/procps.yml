id: brew:procps
display-name: procps
homepage: https://gitlab.com/procps-ng/procps
repo: https://gitlab.com/procps-ng/procps/-/archive/v4.0.6/procps-v4.0.6.tar.gz
docs: https://gitlab.com/procps-ng/procps
package-manager:
  brew: procps
  debian: procps
  nix: procps
  ubuntu: procps
  zypper: procps
package-manager-url: https://formulae.brew.sh/formula/procps
version: 4.0.6
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Utilities for browsing procfs
source-archive: https://gitlab.com/procps-ng/procps/-/archive/v4.0.6/procps-v4.0.6.tar.gz
dependencies:
  - ncurses
build-dependencies:
  - autoconf
  - automake
  - gettext
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: free
  - exposure: global executable
    kind: cli
    name: hugetop
  - exposure: global executable
    kind: cli
    name: pidwait
  - exposure: global executable
    kind: cli
    name: pmap
  - exposure: global executable
    kind: cli
    name: ps
  - exposure: global executable
    kind: cli
    name: pwdx
  - exposure: global executable
    kind: cli
    name: slabtop
  - exposure: global executable
    kind: cli
    name: sysctl
  - exposure: global executable
    kind: cli
    name: tload
  - exposure: global executable
    kind: cli
    name: top
  - exposure: global executable
    kind: cli
    name: vmstat
  - exposure: global executable
    kind: cli
    name: w
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:procps
  brew: brew install procps
  debian: sudo apt install procps
  nix: nix profile install nixpkgs#procps
  ubuntu: sudo apt install procps
  zypper: sudo zypper install procps
provenance:
  formula: procps
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
