id: brew:babelfish
display-name: babelfish
homepage: https://github.com/bouk/babelfish
repo: https://github.com/bouk/babelfish
docs: https://github.com/bouk/babelfish
package-manager:
  brew: babelfish
  nix: babelfish
package-manager-url: https://formulae.brew.sh/formula/babelfish
version: 1.2.1
license: MIT
category: development
tags:
  - cli
description: Translate bash scripts to fish
source-archive: https://github.com/bouk/babelfish/archive/refs/tags/v1.2.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: babelfish
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The shell hook has been installed, you can use it by running: $ source
    $HOMEBREW_PREFIX/share/fish/vendor_functions.d/babel.fish
  post-install-defined: false
install-lines:
  av: sudo av install brew:babelfish
  brew: brew install babelfish
  nix: nix profile install nixpkgs#babelfish
provenance:
  formula: babelfish
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
