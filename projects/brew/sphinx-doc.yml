id: brew:sphinx-doc
display-name: sphinx-doc
homepage: https://www.sphinx-doc.org/
repo: >
  https://files.pythonhosted.org/packages/cd/bd/f08eb0f4eed5c83f1ba2a3bd18f7745a2b1525fad70660a1c00224ec468a/sphinx-9.1.0.tar.gz
docs: https://www.sphinx-doc.org/
package-manager:
  brew: sphinx-doc
  debian: sphinx-doc
  ubuntu: sphinx-doc
package-manager-url: https://formulae.brew.sh/formula/sphinx-doc
version: 9.1.0
license: BSD-2-Clause
category: network
tags:
  - cli
description: Tool to create intelligent and beautiful documentation
source-archive: >
  https://files.pythonhosted.org/packages/cd/bd/f08eb0f4eed5c83f1ba2a3bd18f7745a2b1525fad70660a1c00224ec468a/sphinx-9.1.0.tar.gz
dependencies:
  - certifi
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: sphinx-apidoc
  - exposure: global executable
    kind: cli
    name: sphinx-autogen
  - exposure: global executable
    kind: cli
    name: sphinx-build
  - exposure: global executable
    kind: cli
    name: sphinx-quickstart
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sphinx-doc
  brew: brew install sphinx-doc
  debian: sudo apt install sphinx-doc
  ubuntu: sudo apt install sphinx-doc
provenance:
  formula: sphinx-doc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
