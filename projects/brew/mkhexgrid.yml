id: brew:mkhexgrid
display-name: mkhexgrid
homepage: https://www.nomic.net/~uckelman/mkhexgrid/
repo: https://www.nomic.net/~uckelman/mkhexgrid/releases/mkhexgrid-0.1.1.src.tar.bz2
docs: https://www.nomic.net/~uckelman/mkhexgrid/
package-manager:
  brew: mkhexgrid
  macports: mkhexgrid
package-manager-url: https://formulae.brew.sh/formula/mkhexgrid
version: 0.1.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Fully-configurable hex grid generator
source-archive: https://www.nomic.net/~uckelman/mkhexgrid/releases/mkhexgrid-0.1.1.src.tar.bz2
dependencies:
  - gd
build-dependencies:
  - boost
executables:
  - exposure: global executable
    kind: cli
    name: mkhexgrid
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mkhexgrid
  brew: brew install mkhexgrid
  macports: sudo port install mkhexgrid
provenance:
  formula: mkhexgrid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
