id: brew:sugarjar
display-name: sugarjar
homepage: https://github.com/jaymzh/sugarjar/
repo: https://github.com/jaymzh/sugarjar
docs: https://github.com/jaymzh/sugarjar/
package-manager:
  brew: sugarjar
  debian: sugarjar
  dnf: sugarjar
  ubuntu: sugarjar
package-manager-url: https://formulae.brew.sh/formula/sugarjar
version: 2.0.2
license: Apache-2.0
category: development
tags:
  - cli
  - git
description: Helper utility for a better Git/GitHub experience
source-archive: https://github.com/jaymzh/sugarjar/archive/refs/tags/v2.0.2.tar.gz
dependencies:
  - gh
  - ruby
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: sj
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sugarjar
  brew: brew install sugarjar
  debian: sudo apt install sugarjar
  dnf: sudo dnf install sugarjar
  ubuntu: sudo apt install sugarjar
provenance:
  formula: sugarjar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
