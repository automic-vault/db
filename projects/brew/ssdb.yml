id: brew:ssdb
display-name: ssdb
homepage: https://ssdb.io/
repo: https://github.com/ideawu/ssdb
docs: https://ssdb.io/
package-manager:
  brew: ssdb
package-manager-url: https://formulae.brew.sh/formula/ssdb
version: 1.9.9
license: BSD-3-Clause
category: database
tags:
  - cli
  - database
description: 'NoSQL database supporting many data structures: Redis alternative'
source-archive: https://github.com/ideawu/ssdb/archive/refs/tags/1.9.9.tar.gz
build-dependencies:
  - autoconf
executables:
  - exposure: global executable
    kind: cli
    name: ssdb-bench
  - exposure: global executable
    kind: cli
    name: ssdb-cli
  - exposure: global executable
    kind: cli
    name: ssdb-dump
  - exposure: global executable
    kind: cli
    name: ssdb-repair
  - exposure: global executable
    kind: cli
    name: ssdb-server
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:ssdb
  brew: brew install ssdb
provenance:
  formula: ssdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
