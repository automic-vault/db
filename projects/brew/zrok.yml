id: brew:zrok
display-name: zrok
homepage: https://zrok.io
repo: https://github.com/openziti/zrok
docs: https://zrok.io
package-manager:
  brew: zrok
  nix: zrok
  scoop: extras/zrok
package-manager-url: https://formulae.brew.sh/formula/zrok
version: 1.1.11
license: Apache-2.0 AND BSD-3-Clause AND MIT
category: development
tags:
  - cli
description: Geo-scale, next-generation sharing platform built on top of OpenZiti
source-archive: https://github.com/openziti/zrok/releases/download/v1.1.11/source-v1.1.11.tar.gz
build-dependencies:
  - go
  - node
executables:
  - exposure: global executable
    kind: cli
    name: zrok
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zrok
  brew: brew install zrok
  nix: nix profile install nixpkgs#zrok
  scoop: scoop install extras/zrok
provenance:
  formula: zrok
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
