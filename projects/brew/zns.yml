id: brew:zns
display-name: zns
homepage: https://github.com/znscli/zns
repo: https://github.com/znscli/zns
docs: https://github.com/znscli/zns
package-manager:
  brew: zns
  macports: zns
package-manager-url: https://formulae.brew.sh/formula/zns
version: 0.4.0
license: MIT
category: development
tags:
  - cli
description: CLI tool for querying DNS records with readable, colored output
source-archive: https://github.com/znscli/zns/archive/refs/tags/v0.4.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: zns
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zns
  brew: brew install zns
  macports: sudo port install zns
provenance:
  formula: zns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
