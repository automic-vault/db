id: brew:vault-cli
display-name: vault-cli
homepage: https://jackrabbit.apache.org/filevault/index.html
repo: >
  https://search.maven.org/remotecontent?filepath=org/apache/jackrabbit/vault/vault-cli/4.2.0/vault-cli-4.2.0-bin.tar.gz
docs: https://jackrabbit.apache.org/filevault/index.html
package-manager:
  brew: vault-cli
package-manager-url: https://formulae.brew.sh/formula/vault-cli
version: 4.2.0
license: Apache-2.0
category: security
tags:
  - cli
description: Subversion-like utility to work with Jackrabbit FileVault
source-archive: >
  https://search.maven.org/remotecontent?filepath=org/apache/jackrabbit/vault/vault-cli/4.2.0/vault-cli-4.2.0-bin.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: vlt
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vault-cli
  brew: brew install vault-cli
provenance:
  formula: vault-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
