id: brew:marp-cli
display-name: marp-cli
homepage: https://github.com/marp-team/marp-cli
repo: https://registry.npmjs.org/@marp-team/marp-cli/-/marp-cli-4.4.0.tgz
docs: https://github.com/marp-team/marp-cli
package-manager:
  brew: marp-cli
  nix: marp-cli
  scoop: main/marp
package-manager-url: https://formulae.brew.sh/formula/marp-cli
version: 4.4.0
license: MIT
category: development
tags:
  - cli
description: Easily convert Marp Markdown files into static HTML/CSS, PDF, PPT and images
source-archive: https://registry.npmjs.org/@marp-team/marp-cli/-/marp-cli-4.4.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: marp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:marp-cli
  brew: brew install marp-cli
  nix: nix profile install nixpkgs#marp-cli
  scoop: scoop install main/marp
provenance:
  formula: marp-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
