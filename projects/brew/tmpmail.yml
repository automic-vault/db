id: brew:tmpmail
display-name: tmpmail
homepage: https://github.com/sdushantha/tmpmail
repo: https://github.com/sdushantha/tmpmail
docs: https://github.com/sdushantha/tmpmail
package-manager:
  apk: tmpmail
  brew: tmpmail
  nix: tmpmail
package-manager-url: https://formulae.brew.sh/formula/tmpmail
version: 1.2.3
license: MIT
category: development
tags:
  - cli
description: Temporary email right from your terminal written in POSIX sh
source-archive: https://github.com/sdushantha/tmpmail/archive/refs/tags/v1.2.3.tar.gz
dependencies:
  - w3m
  - xclip
uses-from-macos:
  - jq
executables:
  - exposure: global executable
    kind: cli
    name: tmpmail
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tmpmail
  av: sudo av install brew:tmpmail
  brew: brew install tmpmail
  nix: nix profile install nixpkgs#tmpmail
provenance:
  formula: tmpmail
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
