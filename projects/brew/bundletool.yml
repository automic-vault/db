id: brew:bundletool
display-name: bundletool
homepage: https://github.com/google/bundletool
repo: https://github.com/google/bundletool
docs: https://github.com/google/bundletool
package-manager:
  brew: bundletool
  nix: bundletool
  scoop: main/bundletool
package-manager-url: https://formulae.brew.sh/formula/bundletool
version: 1.18.3
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool to manipulate Android App Bundles
source-archive: https://github.com/google/bundletool/releases/download/1.18.3/bundletool-all-1.18.3.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: bundletool
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bundletool
  brew: brew install bundletool
  nix: nix profile install nixpkgs#bundletool
  scoop: scoop install main/bundletool
provenance:
  formula: bundletool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
