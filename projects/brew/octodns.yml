id: brew:octodns
display-name: octodns
homepage: https://github.com/octodns/octodns
repo: >
  https://files.pythonhosted.org/packages/1a/5e/cb46895eda5d929b6488fbab2bcf2658272d60976e033cd9d2832a0fffcd/octodns-1.18.0.tar.gz
docs: https://github.com/octodns/octodns
package-manager:
  brew: octodns
  nix: octodns
package-manager-url: https://formulae.brew.sh/formula/octodns
version: 1.18.0
license: MIT
category: development
tags:
  - cli
description: Tools for managing DNS across multiple providers
source-archive: >
  https://files.pythonhosted.org/packages/1a/5e/cb46895eda5d929b6488fbab2bcf2658272d60976e033cd9d2832a0fffcd/octodns-1.18.0.tar.gz
dependencies:
  - libyaml
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: octodns-compare
  - exposure: global executable
    kind: cli
    name: octodns-dump
  - exposure: global executable
    kind: cli
    name: octodns-report
  - exposure: global executable
    kind: cli
    name: octodns-schema
  - exposure: global executable
    kind: cli
    name: octodns-sync
  - exposure: global executable
    kind: cli
    name: octodns-validate
  - exposure: global executable
    kind: cli
    name: octodns-versions
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:octodns
  brew: brew install octodns
  nix: nix profile install nixpkgs#octodns
provenance:
  formula: octodns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
