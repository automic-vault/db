id: brew:exact-image
display-name: exact-image
homepage: https://exactcode.com/opensource/exactimage/
repo: https://dl.exactcode.de/oss/exact-image/exact-image-1.2.1.tar.bz2
docs: https://exactcode.com/opensource/exactimage/
package-manager:
  brew: exact-image
  macports: exact-image
package-manager-url: https://formulae.brew.sh/formula/exact-image
version: 1.2.1
license: GPL-2.0-only
category: media
tags:
  - cli
description: Image processing library
source-archive: https://dl.exactcode.de/oss/exact-image/exact-image-1.2.1.tar.bz2
dependencies:
  - libagg
build-dependencies:
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: bardecode
  - exposure: global executable
    kind: cli
    name: econvert
  - exposure: global executable
    kind: cli
    name: edentify
  - exposure: global executable
    kind: cli
    name: empty-page
  - exposure: global executable
    kind: cli
    name: hocr2pdf
  - exposure: global executable
    kind: cli
    name: optimize2bw
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:exact-image
  brew: brew install exact-image
  macports: sudo port install exact-image
provenance:
  formula: exact-image
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
