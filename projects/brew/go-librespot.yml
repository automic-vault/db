id: brew:go-librespot
display-name: go-librespot
homepage: https://github.com/devgianlu/go-librespot
repo: https://github.com/devgianlu/go-librespot
docs: https://github.com/devgianlu/go-librespot
package-manager:
  brew: go-librespot
package-manager-url: https://formulae.brew.sh/formula/go-librespot
version: 0.7.3
license: GPL-3.0-only
category: development
tags:
  - cli
description: Spotify client
source-archive: https://github.com/devgianlu/go-librespot/archive/refs/tags/v0.7.3.tar.gz
dependencies:
  - flac
  - libogg
  - libvorbis
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: go-librespot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:go-librespot
  brew: brew install go-librespot
provenance:
  formula: go-librespot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
