id: brew:atuin
display-name: atuin
homepage: https://atuin.sh/
repo: https://github.com/atuinsh/atuin
docs: https://atuin.sh/
package-manager:
  apk: atuin
  brew: atuin
  debian: atuin
  dnf: atuin
  macports: atuin
  nix: atuin
  pacman: atuin
  scoop: main/atuin
  winget: Atuinsh.Atuin
  zypper: atuin
package-manager-url: https://formulae.brew.sh/formula/atuin
version: 18.16.1
license: MIT
category: development
tags:
  - cli
description: Improved shell history for zsh, bash, fish and nushell
source-archive: https://github.com/atuinsh/atuin/releases/download/v18.16.1/source.tar.gz
build-dependencies:
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: atuin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add atuin
  av: sudo av install brew:atuin
  brew: brew install atuin
  debian: sudo apt install atuin
  dnf: sudo dnf install atuin
  macports: sudo port install atuin
  nix: nix profile install nixpkgs#atuin
  pacman: sudo pacman -S atuin
  scoop: scoop install main/atuin
  winget: winget install --id Atuinsh.Atuin -e
  zypper: sudo zypper install atuin
provenance:
  formula: atuin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
