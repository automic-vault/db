id: brew:mrtg
display-name: mrtg
homepage: https://oss.oetiker.ch/mrtg/
repo: https://oss.oetiker.ch/mrtg/pub/mrtg-2.17.10.tar.gz
docs: https://oss.oetiker.ch/mrtg/
package-manager:
  apk: mrtg
  brew: mrtg
  debian: mrtg
  dnf: mrtg
  macports: mrtg
  nix: mrtg
  ubuntu: mrtg
package-manager-url: https://formulae.brew.sh/formula/mrtg
version: 2.17.10
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Multi router traffic grapher
source-archive: https://oss.oetiker.ch/mrtg/pub/mrtg-2.17.10.tar.gz
dependencies:
  - gd
  - libpng
executables:
  - exposure: global executable
    kind: cli
    name: cfgmaker
  - exposure: global executable
    kind: cli
    name: indexmaker
  - exposure: global executable
    kind: cli
    name: mrtg
  - exposure: global executable
    kind: cli
    name: mrtg-traffic-sum
  - exposure: global executable
    kind: cli
    name: rateup
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mrtg
  av: sudo av install brew:mrtg
  brew: brew install mrtg
  debian: sudo apt install mrtg
  dnf: sudo dnf install mrtg
  macports: sudo port install mrtg
  nix: nix profile install nixpkgs#mrtg
  ubuntu: sudo apt install mrtg
provenance:
  formula: mrtg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
