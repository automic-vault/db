id: brew:himalaya
display-name: himalaya
homepage: https://github.com/pimalaya/himalaya
repo: https://github.com/pimalaya/himalaya
docs: https://github.com/pimalaya/himalaya
package-manager:
  apk: himalaya
  brew: himalaya
  macports: himalaya
  nix: himalaya
  pacman: himalaya
  scoop: main/himalaya
  zypper: himalaya
package-manager-url: https://formulae.brew.sh/formula/himalaya
version: 1.2.0
license: MIT
category: development
tags:
  - cli
description: CLI email client written in Rust
source-archive: https://github.com/pimalaya/himalaya/archive/refs/tags/v1.2.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: himalaya
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add himalaya
  av: sudo av install brew:himalaya
  brew: brew install himalaya
  macports: sudo port install himalaya
  nix: nix profile install nixpkgs#himalaya
  pacman: sudo pacman -S himalaya
  scoop: scoop install main/himalaya
  zypper: sudo zypper install himalaya
provenance:
  formula: himalaya
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
