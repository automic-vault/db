id: brew:squid
display-name: squid
homepage: https://www.squid-cache.org/
repo: https://github.com/squid-cache/squid
docs: https://www.squid-cache.org/
package-manager:
  apk: squid
  brew: squid
  chocolatey: squid
  debian: squid
  dnf: squid
  macports: squid
  nix: squid
  pacman: squid
  ubuntu: squid
  zypper: squid
package-manager-url: https://formulae.brew.sh/formula/squid
version: 7.5
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Advanced proxy caching server for HTTP, HTTPS, FTP, and Gopher
source-archive: https://github.com/squid-cache/squid/releases/download/SQUID_7_5/squid-7.5.tar.bz2
dependencies:
  - openssl@3
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: squid
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add squid
  av: sudo av install brew:squid
  brew: brew install squid
  chocolatey: choco install squid
  debian: sudo apt install squid
  dnf: sudo dnf install squid
  macports: sudo port install squid
  nix: nix profile install nixpkgs#squid
  pacman: sudo pacman -S squid
  ubuntu: sudo apt install squid
  zypper: sudo zypper install squid
provenance:
  formula: squid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
