id: brew:fabio
display-name: fabio
homepage: https://github.com/fabiolb/fabio
repo: https://github.com/fabiolb/fabio
docs: https://github.com/fabiolb/fabio
package-manager:
  brew: fabio
package-manager-url: https://formulae.brew.sh/formula/fabio
version: 1.7.1
license: MIT
category: development
tags:
  - cli
description: Zero-conf load balancing HTTP(S) router
source-archive: https://github.com/fabiolb/fabio/archive/refs/tags/v1.7.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fabio
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fabio
  brew: brew install fabio
provenance:
  formula: fabio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
