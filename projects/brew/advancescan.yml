id: brew:advancescan
display-name: advancescan
homepage: https://www.advancemame.it/scan-readme.html
repo: https://github.com/amadvance/advancescan
docs: https://www.advancemame.it/scan-readme.html
package-manager:
  apk: advancescan
  brew: advancescan
  macports: advancescan
package-manager-url: https://formulae.brew.sh/formula/advancescan
version: 1.18
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Rom manager for AdvanceMAME/MESS
source-archive: https://github.com/amadvance/advancescan/releases/download/v1.18/advancescan-1.18.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: advdiff
  - exposure: global executable
    kind: cli
    name: advscan
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add advancescan
  av: sudo av install brew:advancescan
  brew: brew install advancescan
  macports: sudo port install advancescan
provenance:
  formula: advancescan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
