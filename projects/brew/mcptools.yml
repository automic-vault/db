id: brew:mcptools
display-name: mcptools
homepage: https://github.com/f/mcptools
repo: https://github.com/f/mcptools
docs: https://github.com/f/mcptools
package-manager:
  brew: mcptools
package-manager-url: https://formulae.brew.sh/formula/mcptools
version: 0.7.1
license: MIT
category: development
tags:
  - cli
description: CLI for interacting with MCP servers using both stdio and HTTP transport
source-archive: https://github.com/f/mcptools/archive/refs/tags/v0.7.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mcptools
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mcptools
  brew: brew install mcptools
provenance:
  formula: mcptools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
