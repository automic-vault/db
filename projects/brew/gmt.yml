id: brew:gmt
display-name: gmt
homepage: https://www.generic-mapping-tools.org/
repo: https://github.com/GenericMappingTools/gmt
docs: https://www.generic-mapping-tools.org/
package-manager:
  brew: gmt
  debian: gmt
  dnf: GMT
  nix: gmt
  pacman: gmt
  ubuntu: gmt
  winget: GenericMappingTools.gmt
package-manager-url: https://formulae.brew.sh/formula/gmt
version: 6.6.0
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Tools for manipulating and plotting geographic and Cartesian data
source-archive: https://github.com/GenericMappingTools/gmt/releases/download/6.6.0/gmt-6.6.0-src.tar.xz
dependencies:
  - fftw
  - gdal
  - geos
  - netcdf
  - openblas
  - pcre2
build-dependencies:
  - cmake
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: fz_funcs
  - exposure: global executable
    kind: cli
    name: fz_funcs.sh
  - exposure: global executable
    kind: cli
    name: fzmodeler
  - exposure: global executable
    kind: cli
    name: fzprofiler
  - exposure: global executable
    kind: cli
    name: gmt
  - exposure: global executable
    kind: cli
    name: gmt-config
  - exposure: global executable
    kind: cli
    name: gmt_shell_functions.sh
  - exposure: global executable
    kind: cli
    name: gmtswitch
  - exposure: global executable
    kind: cli
    name: isogmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    GMT needs Ghostscript for the 'psconvert' command to convert PostScript files to
    other formats. To use 'psconvert', please 'brew install ghostscript'. GMT needs
    FFmpeg for the 'movie' command to make movies in MP4 or WebM format. If you need
    this feature, please 'brew install ffmpeg'. GMT needs GraphicsMagick for the 'movie'
    command to make animated GIFs. If you need this feature, please 'brew install
    graphicsmagick'.
  post-install-defined: false
install-lines:
  av: sudo av install brew:gmt
  brew: brew install gmt
  debian: sudo apt install gmt
  dnf: sudo dnf install GMT
  nix: nix profile install nixpkgs#gmt
  pacman: sudo pacman -S gmt
  ubuntu: sudo apt install gmt
  winget: winget install --id GenericMappingTools.gmt -e
provenance:
  formula: gmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
