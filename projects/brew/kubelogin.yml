id: brew:kubelogin
display-name: kubelogin
homepage: https://github.com/int128/kubelogin
repo: https://github.com/int128/kubelogin
docs: https://github.com/int128/kubelogin
package-manager:
  apk: kubectl-oidc_login
  brew: kubelogin
  chocolatey: kubelogin
  nix: kubelogin
  scoop: extras/kubelogin
  winget: int128.kubelogin
  zypper: kubelogin
package-manager-url: https://formulae.brew.sh/formula/kubelogin
version: 1.36.1
license: Apache-2.0
category: development
tags:
  - cli
description: OpenID Connect authentication plugin for kubectl
source-archive: https://github.com/int128/kubelogin/archive/refs/tags/v1.36.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubectl-oidc_login
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kubectl-oidc_login
  av: sudo av install brew:kubelogin
  brew: brew install kubelogin
  chocolatey: choco install kubelogin
  nix: nix profile install nixpkgs#kubelogin
  scoop: scoop install extras/kubelogin
  winget: winget install --id int128.kubelogin -e
  zypper: sudo zypper install kubelogin
provenance:
  formula: kubelogin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
