id: brew:boring
display-name: boring
homepage: https://github.com/alebeck/boring
repo: https://github.com/alebeck/boring
docs: https://github.com/alebeck/boring
package-manager:
  brew: boring
  nix: boring
package-manager-url: https://formulae.brew.sh/formula/boring
version: 0.15.0
license: MIT
category: development
tags:
  - cli
description: Simple command-line SSH tunnel manager that just works
source-archive: https://github.com/alebeck/boring/archive/refs/tags/v0.15.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: boring
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:boring
  brew: brew install boring
  nix: nix profile install nixpkgs#boring
provenance:
  formula: boring
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
