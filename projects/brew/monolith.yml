id: brew:monolith
display-name: monolith
homepage: https://github.com/Y2Z/monolith
repo: https://github.com/Y2Z/monolith
docs: https://github.com/Y2Z/monolith
package-manager:
  apk: monolith
  brew: monolith
  macports: monolith
  nix: monolith
  pacman: monolith
  scoop: main/monolith
  winget: Y2Z.Monolith
package-manager-url: https://formulae.brew.sh/formula/monolith
version: 2.10.1
license: CC0-1.0
category: development
tags:
  - cli
description: CLI tool for saving complete web pages as a single HTML file
source-archive: https://github.com/Y2Z/monolith/archive/refs/tags/v2.10.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: monolith
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add monolith
  av: sudo av install brew:monolith
  brew: brew install monolith
  macports: sudo port install monolith
  nix: nix profile install nixpkgs#monolith
  pacman: sudo pacman -S monolith
  scoop: scoop install main/monolith
  winget: winget install --id Y2Z.Monolith -e
provenance:
  formula: monolith
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
