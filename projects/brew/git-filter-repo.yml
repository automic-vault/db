id: brew:git-filter-repo
display-name: git-filter-repo
homepage: https://github.com/newren/git-filter-repo
repo: https://github.com/newren/git-filter-repo
docs: https://github.com/newren/git-filter-repo
package-manager:
  apk: git-filter-repo
  brew: git-filter-repo
  debian: git-filter-repo
  dnf: git-filter-repo
  macports: git-filter-repo
  nix: git-filter-repo
  pacman: git-filter-repo
  scoop: main/git-filter-repo
  ubuntu: git-filter-repo
  zypper: git-filter-repo
package-manager-url: https://formulae.brew.sh/formula/git-filter-repo
version: 2.47.0
license: MIT
category: development
tags:
  - cli
  - git
description: Quickly rewrite git repository history
source-archive: >
  https://github.com/newren/git-filter-repo/releases/download/v2.47.0/git-filter-repo-2.47.0.tar.xz
uses-from-macos:
  - git
  - python
executables:
  - exposure: global executable
    kind: cli
    name: git-filter-repo
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-filter-repo
  av: sudo av install brew:git-filter-repo
  brew: brew install git-filter-repo
  debian: sudo apt install git-filter-repo
  dnf: sudo dnf install git-filter-repo
  macports: sudo port install git-filter-repo
  nix: nix profile install nixpkgs#git-filter-repo
  pacman: sudo pacman -S git-filter-repo
  scoop: scoop install main/git-filter-repo
  ubuntu: sudo apt install git-filter-repo
  zypper: sudo zypper install git-filter-repo
provenance:
  formula: git-filter-repo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
