id: brew:brev
display-name: brev
homepage: https://developer.nvidia.com/brev
repo: https://github.com/brevdev/brev-cli
docs: https://developer.nvidia.com/brev
package-manager:
  brew: brev
package-manager-url: https://formulae.brew.sh/formula/brev
version: 0.6.326
license: MIT
category: development
tags:
  - cli
description: CLI tool for managing workspaces provided by brev.dev
source-archive: https://github.com/brevdev/brev-cli/archive/refs/tags/v0.6.326.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: brev
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:brev
  brew: brew install brev
provenance:
  formula: brev
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
