id: brew:mlton
display-name: mlton
homepage: http://mlton.org
repo: https://downloads.sourceforge.net/project/mlton/mlton/20241230/mlton-20241230.src.tgz
docs: http://mlton.org
package-manager:
  brew: mlton
  dnf: mlton
  macports: mlton
  nix: mlton
  pacman: mlton
  ubuntu: mlton
package-manager-url: https://formulae.brew.sh/formula/mlton
version: 20241230
license: HPND
category: development
tags:
  - cli
description: Whole-program, optimizing compiler for Standard ML
source-archive: https://downloads.sourceforge.net/project/mlton/mlton/20241230/mlton-20241230.src.tgz
dependencies:
  - gmp
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: mllex
  - exposure: global executable
    kind: cli
    name: mlnlffigen
  - exposure: global executable
    kind: cli
    name: mlprof
  - exposure: global executable
    kind: cli
    name: mlton
  - exposure: global executable
    kind: cli
    name: mlyacc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mlton
  brew: brew install mlton
  dnf: sudo dnf install mlton
  macports: sudo port install mlton
  nix: nix profile install nixpkgs#mlton
  pacman: sudo pacman -S mlton
  ubuntu: sudo apt install mlton
provenance:
  formula: mlton
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
