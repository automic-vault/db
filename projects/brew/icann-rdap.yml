id: brew:icann-rdap
display-name: icann-rdap
homepage: https://github.com/icann/icann-rdap/wiki
repo: https://github.com/icann/icann-rdap
docs: https://github.com/icann/icann-rdap/wiki
package-manager:
  brew: icann-rdap
  debian: rdap
  macports: icann-rdap
  nix: rdap
  zypper: rdap
package-manager-url: https://formulae.brew.sh/formula/icann-rdap
version: 0.0.29
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Full-rich client for the Registry Data Access Protocol (RDAP) sponsored by ICANN
source-archive: https://github.com/icann/icann-rdap/archive/refs/tags/v0.0.29.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rdap
  - exposure: global executable
    kind: cli
    name: rdap-test
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:icann-rdap
  brew: brew install icann-rdap
  debian: sudo apt install rdap
  macports: sudo port install icann-rdap
  nix: nix profile install nixpkgs#rdap
  zypper: sudo zypper install rdap
provenance:
  formula: icann-rdap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
