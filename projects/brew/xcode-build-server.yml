id: brew:xcode-build-server
display-name: xcode-build-server
homepage: https://github.com/SolaWing/xcode-build-server
repo: https://github.com/SolaWing/xcode-build-server
docs: https://github.com/SolaWing/xcode-build-server
package-manager:
  brew: xcode-build-server
  macports: xcode-build-server
package-manager-url: https://formulae.brew.sh/formula/xcode-build-server
version: 1.3.0
license: MIT
category: development
tags:
  - cli
description: Build server protocol implementation for integrating Xcode with sourcekit-lsp
source-archive: https://github.com/SolaWing/xcode-build-server/archive/refs/tags/v1.3.0.tar.gz
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: xcode-build-server
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xcode-build-server
  brew: brew install xcode-build-server
  macports: sudo port install xcode-build-server
provenance:
  formula: xcode-build-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
