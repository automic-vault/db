id: brew:libgpg-error
display-name: libgpg-error
homepage: https://www.gnupg.org/related_software/libgpg-error/
repo: https://gnupg.org/ftp/gcrypt/libgpg-error/libgpg-error-1.61.tar.bz2
docs: https://www.gnupg.org/related_software/libgpg-error/
package-manager:
  apk: libgpg-error
  brew: libgpg-error
  dnf: libgpg-error
  macports: libgpg-error
  nix: libgpg-error
  pacman: libgpg-error
package-manager-url: https://formulae.brew.sh/formula/libgpg-error
version: 1.61
license: LGPL-2.1-or-later
category: security
tags:
  - cli
description: Common error values for all GnuPG components
source-archive: https://gnupg.org/ftp/gcrypt/libgpg-error/libgpg-error-1.61.tar.bz2
dependencies:
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: gpg-error
  - exposure: global executable
    kind: cli
    name: gpg-error-config
  - exposure: global executable
    kind: cli
    name: gpgrt-config
  - exposure: global executable
    kind: cli
    name: yat2m
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libgpg-error
  av: sudo av install brew:libgpg-error
  brew: brew install libgpg-error
  dnf: sudo dnf install libgpg-error
  macports: sudo port install libgpg-error
  nix: nix profile install nixpkgs#libgpg-error
  pacman: sudo pacman -S libgpg-error
provenance:
  formula: libgpg-error
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
