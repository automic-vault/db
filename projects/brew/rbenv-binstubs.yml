id: brew:rbenv-binstubs
display-name: rbenv-binstubs
homepage: https://github.com/Purple-Devs/rbenv-binstubs
repo: https://github.com/Purple-Devs/rbenv-binstubs
docs: https://github.com/Purple-Devs/rbenv-binstubs
package-manager:
  brew: rbenv-binstubs
package-manager-url: https://formulae.brew.sh/formula/rbenv-binstubs
version: 1.5
license: MIT
category: development
tags:
  - cli
description: Make rbenv aware of bundler binstubs
source-archive: https://github.com/Purple-Devs/rbenv-binstubs/archive/refs/tags/v1.5.tar.gz
dependencies:
  - rbenv
executables:
  - exposure: global executable
    kind: cli
    name: rbenv-bundles
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rbenv-binstubs
  brew: brew install rbenv-binstubs
provenance:
  formula: rbenv-binstubs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
