id: brew:libassuan
display-name: libassuan
homepage: https://www.gnupg.org/related_software/libassuan/
repo: https://gnupg.org/ftp/gcrypt/libassuan/libassuan-3.0.2.tar.bz2
docs: https://www.gnupg.org/related_software/libassuan/
package-manager:
  apk: libassuan
  brew: libassuan
  dnf: libassuan
  macports: libassuan
  nix: libassuan
  pacman: libassuan
package-manager-url: https://formulae.brew.sh/formula/libassuan
version: 3.0.2
license: LGPL-2.1-or-later AND GPL-3.0-or-later AND FSFULLR
category: security
tags:
  - cli
description: Assuan IPC Library
source-archive: https://gnupg.org/ftp/gcrypt/libassuan/libassuan-3.0.2.tar.bz2
dependencies:
  - libgpg-error
executables:
  - exposure: global executable
    kind: cli
    name: libassuan-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libassuan
  av: sudo av install brew:libassuan
  brew: brew install libassuan
  dnf: sudo dnf install libassuan
  macports: sudo port install libassuan
  nix: nix profile install nixpkgs#libassuan
  pacman: sudo pacman -S libassuan
provenance:
  formula: libassuan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
