id: brew:libidl
display-name: libidl
homepage: https://download.gnome.org/sources/libIDL/0.8/
repo: https://download.gnome.org/sources/libIDL/0.8/libIDL-0.8.14.tar.bz2
docs: https://download.gnome.org/sources/libIDL/0.8/
package-manager:
  brew: libidl
  dnf: libIDL
  macports: libidl
package-manager-url: https://formulae.brew.sh/formula/libidl
version: 0.8.14
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: Library for creating CORBA IDL files
source-archive: https://download.gnome.org/sources/libIDL/0.8/libIDL-0.8.14.tar.bz2
dependencies:
  - gettext
  - glib
build-dependencies:
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: libIDL-config-2
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libidl
  brew: brew install libidl
  dnf: sudo dnf install libIDL
  macports: sudo port install libidl
provenance:
  formula: libidl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
