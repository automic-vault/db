    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rtabmap
  brew: brew install rtabmap
  nix: nix profile install nixpkgs#rtabmap
provenance:
  formula: rtabmap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
