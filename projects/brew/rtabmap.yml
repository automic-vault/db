id: brew:rtabmap
display-name: rtabmap
homepage: https://introlab.github.io/rtabmap
repo: https://github.com/introlab/rtabmap
docs: https://introlab.github.io/rtabmap
package-manager:
  brew: rtabmap
  nix: rtabmap
package-manager-url: https://formulae.brew.sh/formula/rtabmap
version: 0.23.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Visual and LiDAR SLAM library and standalone application
source-archive: https://github.com/introlab/rtabmap/archive/refs/tags/0.23.1.tar.gz
dependencies:
