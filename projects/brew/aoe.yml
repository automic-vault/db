id: brew:aoe
display-name: aoe
homepage: https://github.com/njbrake/agent-of-empires
repo: https://github.com/njbrake/agent-of-empires
docs: https://github.com/njbrake/agent-of-empires
package-manager:
  brew: aoe
package-manager-url: https://formulae.brew.sh/formula/aoe
version: 1.9.3
license: MIT
category: development
tags:
  - cli
description: Terminal session manager for AI coding agents
source-archive: https://github.com/njbrake/agent-of-empires/archive/refs/tags/v1.9.3.tar.gz
dependencies:
  - openssl@3
  - tmux
build-dependencies:
  - node
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: aoe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aoe
  brew: brew install aoe
provenance:
  formula: aoe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
