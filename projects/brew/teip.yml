id: brew:teip
display-name: teip
homepage: https://github.com/greymd/teip
repo: https://github.com/greymd/teip
docs: https://github.com/greymd/teip
package-manager:
  brew: teip
  nix: teip
package-manager-url: https://formulae.brew.sh/formula/teip
version: 2.3.3
license: MIT
category: development
tags:
  - cli
description: Masking tape to help commands "do one thing well"
source-archive: https://github.com/greymd/teip/archive/refs/tags/v2.3.3.tar.gz
dependencies:
  - oniguruma
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: teip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:teip
  brew: brew install teip
  nix: nix profile install nixpkgs#teip
provenance:
  formula: teip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
