id: brew:mm-common
display-name: mm-common
homepage: https://www.gtkmm.org/
repo: https://download.gnome.org/sources/mm-common/1.0/mm-common-1.0.7.tar.xz
docs: https://www.gtkmm.org/
package-manager:
  apk: mm-common
  brew: mm-common
  debian: mm-common
  dnf: mm-common
  macports: mm-common
  nix: mm-common
  pacman: mm-common
  ubuntu: mm-common
  zypper: mm-common
package-manager-url: https://formulae.brew.sh/formula/mm-common
version: 1.0.7
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Build utilities for C++ interfaces of GTK+ and GNOME packages
source-archive: https://download.gnome.org/sources/mm-common/1.0/mm-common-1.0.7.tar.xz
dependencies:
  - python@3.14
build-dependencies:
  - meson
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: mm-common-get
  - exposure: global executable
    kind: cli
    name: mm-common-prepare
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mm-common
  av: sudo av install brew:mm-common
  brew: brew install mm-common
  debian: sudo apt install mm-common
  dnf: sudo dnf install mm-common
  macports: sudo port install mm-common
  nix: nix profile install nixpkgs#mm-common
  pacman: sudo pacman -S mm-common
  ubuntu: sudo apt install mm-common
  zypper: sudo zypper install mm-common
provenance:
  formula: mm-common
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
