id: brew:samurai
display-name: samurai
homepage: https://github.com/michaelforney/samurai
repo: https://github.com/michaelforney/samurai
docs: https://github.com/michaelforney/samurai
package-manager:
  apk: samurai
  brew: samurai
  dnf: samurai
  macports: samurai
  nix: samurai
  pacman: samurai
  zypper: samurai
package-manager-url: https://formulae.brew.sh/formula/samurai
version: 1.3
license: Apache-2.0
category: development
tags:
  - cli
description: Ninja-compatible build tool written in C
source-archive: https://github.com/michaelforney/samurai/releases/download/1.3/samurai-1.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: samu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add samurai
  av: sudo av install brew:samurai
  brew: brew install samurai
  dnf: sudo dnf install samurai
  macports: sudo port install samurai
  nix: nix profile install nixpkgs#samurai
  pacman: sudo pacman -S samurai
  zypper: sudo zypper install samurai
provenance:
  formula: samurai
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
