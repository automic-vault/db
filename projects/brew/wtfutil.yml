id: brew:wtfutil
display-name: wtfutil
homepage: https://wtfutil.com
repo: https://github.com/wtfutil/wtf
docs: https://wtfutil.com
package-manager:
  apk: wtfutil
  brew: wtfutil
  macports: wtfutil
  nix: wtfutil
package-manager-url: https://formulae.brew.sh/formula/wtfutil
version: 0.49.1
license: MPL-2.0
category: development
tags:
  - cli
description: Personal information dashboard for your terminal
source-archive: https://github.com/wtfutil/wtf/archive/refs/tags/v0.49.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wtfutil
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wtfutil
  av: sudo av install brew:wtfutil
  brew: brew install wtfutil
  macports: sudo port install wtfutil
  nix: nix profile install nixpkgs#wtfutil
provenance:
  formula: wtfutil
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
