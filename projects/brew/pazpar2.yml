id: brew:pazpar2
display-name: pazpar2
homepage: https://www.indexdata.com/resources/software/pazpar2/
repo: https://ftp.indexdata.com/pub/pazpar2/pazpar2-1.14.1.tar.gz
docs: https://www.indexdata.com/resources/software/pazpar2/
package-manager:
  brew: pazpar2
  macports: pazpar2
package-manager-url: https://formulae.brew.sh/formula/pazpar2
version: 1.14.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Metasearching middleware webservice
source-archive: https://ftp.indexdata.com/pub/pazpar2/pazpar2-1.14.1.tar.gz
dependencies:
  - icu4c@78
  - yaz
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: pazpar2
  - exposure: global executable
    kind: cli
    name: pazpar2_play
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pazpar2
  brew: brew install pazpar2
  macports: sudo port install pazpar2
provenance:
  formula: pazpar2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
