id: brew:swctl
display-name: swctl
homepage: https://skywalking.apache.org/
repo: https://github.com/apache/skywalking-cli
docs: https://skywalking.apache.org/
package-manager:
  brew: swctl
package-manager-url: https://formulae.brew.sh/formula/swctl
version: 0.14.0
license: Apache-2.0
category: development
tags:
  - cli
description: Apache SkyWalking CLI (Command-line Interface)
source-archive: https://github.com/apache/skywalking-cli/archive/refs/tags/0.14.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: swctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swctl
  brew: brew install swctl
provenance:
  formula: swctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
