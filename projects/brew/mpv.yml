id: brew:mpv
display-name: mpv
homepage: https://mpv.io
repo: https://github.com/mpv-player/mpv
docs: https://mpv.io
package-manager:
  apk: mpv
  brew: mpv
  chocolatey: mpv
  debian: mpv
  dnf: mpv
  macports: mpv
  nix: mpv
  pacman: mpv
  scoop: extras/mpv
  ubuntu: mpv
  winget: shinchiro.mpv
  zypper: mpv
package-manager-url: https://formulae.brew.sh/formula/mpv
version: 0.41.0
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: Media player based on MPlayer and mplayer2
source-archive: https://github.com/mpv-player/mpv/archive/refs/tags/v0.41.0.tar.gz
dependencies:
  - ffmpeg
  - jpeg-turbo
  - libarchive
  - libass
  - libbluray
  - libplacebo
  - little-cms2
  - luajit
  - molten-vk
  - mujs
  - rubberband
  - uchardet
  - vapoursynth
  - vulkan-loader
  - yt-dlp
  - zimg
build-dependencies:
  - docutils
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mpv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mpv
  av: sudo av install brew:mpv
  brew: brew install mpv
  chocolatey: choco install mpv
  debian: sudo apt install mpv
  dnf: sudo dnf install mpv
  macports: sudo port install mpv
  nix: nix profile install nixpkgs#mpv
  pacman: sudo pacman -S mpv
  scoop: scoop install extras/mpv
  ubuntu: sudo apt install mpv
  winget: winget install --id shinchiro.mpv -e
  zypper: sudo zypper install mpv
provenance:
  formula: mpv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
