id: brew:intltool
display-name: intltool
homepage: https://wiki.freedesktop.org/www/Software/intltool
repo: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
docs: https://wiki.freedesktop.org/www/Software/intltool
package-manager:
  apk: intltool
  brew: intltool
  debian: intltool
  dnf: intltool
  macports: intltool
  nix: intltool
  pacman: intltool
  ubuntu: intltool
  zypper: intltool
package-manager-url: https://formulae.brew.sh/formula/intltool
version: 0.51.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: String tool
source-archive: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: intltool-extract
  - exposure: global executable
    kind: cli
    name: intltool-merge
  - exposure: global executable
    kind: cli
    name: intltool-prepare
  - exposure: global executable
    kind: cli
    name: intltool-update
  - exposure: global executable
    kind: cli
    name: intltoolize
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add intltool
  av: sudo av install brew:intltool
  brew: brew install intltool
  debian: sudo apt install intltool
  dnf: sudo dnf install intltool
  macports: sudo port install intltool
  nix: nix profile install nixpkgs#intltool
  pacman: sudo pacman -S intltool
  ubuntu: sudo apt install intltool
  zypper: sudo zypper install intltool
provenance:
  formula: intltool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
