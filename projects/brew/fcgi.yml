id: brew:fcgi
display-name: fcgi
homepage: https://fastcgi-archives.github.io/
repo: https://github.com/FastCGI-Archives/fcgi2
docs: https://fastcgi-archives.github.io/
package-manager:
  apk: fcgi
  brew: fcgi
  dnf: fcgi
  macports: fcgi
  nix: fcgi
  pacman: fcgi
package-manager-url: https://formulae.brew.sh/formula/fcgi
version: 2.4.7
license: OML
category: development
tags:
  - cli
description: Protocol for interfacing interactive programs with a web server
source-archive: https://github.com/FastCGI-Archives/fcgi2/archive/refs/tags/2.4.7.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: cgi-fcgi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fcgi
  av: sudo av install brew:fcgi
  brew: brew install fcgi
  dnf: sudo dnf install fcgi
  macports: sudo port install fcgi
  nix: nix profile install nixpkgs#fcgi
  pacman: sudo pacman -S fcgi
provenance:
  formula: fcgi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
