id: brew:zerolang
display-name: zerolang
homepage: https://zerolang.ai/
repo: https://github.com/vercel-labs/zero
docs: https://zerolang.ai/
package-manager:
  brew: zerolang
package-manager-url: https://formulae.brew.sh/formula/zerolang
version: 0.1.4
license: Apache-2.0
category: development
tags:
  - cli
description: Programming language for agents with explicit effects and predictable memory
source-archive: https://github.com/vercel-labs/zero/archive/refs/tags/v0.1.4.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: zero
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zerolang
  brew: brew install zerolang
provenance:
  formula: zerolang
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
