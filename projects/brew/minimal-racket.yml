id: brew:minimal-racket
display-name: minimal-racket
homepage: https://racket-lang.org/
repo: https://mirror.racket-lang.org/installers/9.1/racket-minimal-9.1-src.tgz
docs: https://racket-lang.org/
package-manager:
  apk: racket
  brew: minimal-racket
  chocolatey: racket
  debian: racket
  dnf: racket
  macports: racket
  nix: racket
  pacman: racket
  scoop: main/racket
  ubuntu: racket
  winget: Racket.Racket
  zypper: racket
package-manager-url: https://formulae.brew.sh/formula/minimal-racket
version: 9.1
license: MIT OR Apache-2.0
category: development
tags:
  - cli
description: Modern programming language in the Lisp/Scheme family
source-archive: https://mirror.racket-lang.org/installers/9.1/racket-minimal-9.1-src.tgz
dependencies:
  - openssl@3
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: racket
  - exposure: global executable
    kind: cli
    name: raco
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This is a minimal Racket distribution. If you want to build the DrRacket IDE, you
    may run: raco pkg install --auto drracket The full Racket distribution is available
    as a cask: brew install --cask racket
  post-install-defined: true
install-lines:
  apk: sudo apk add racket
  av: sudo av install brew:minimal-racket
  brew: brew install minimal-racket
  chocolatey: choco install racket
  debian: sudo apt install racket
  dnf: sudo dnf install racket
  macports: sudo port install racket
  nix: nix profile install nixpkgs#racket
  pacman: sudo pacman -S racket
  scoop: scoop install main/racket
  ubuntu: sudo apt install racket
  winget: winget install --id Racket.Racket -e
  zypper: sudo zypper install racket
provenance:
  formula: minimal-racket
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
