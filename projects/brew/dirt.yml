id: brew:dirt
display-name: dirt
homepage: https://codeberg.org/uzu/dirt
repo: https://codeberg.org/uzu/dirt/archive/1.1.tar.gz
docs: https://codeberg.org/uzu/dirt
package-manager:
  brew: dirt
  nix: dirt
package-manager-url: https://formulae.brew.sh/formula/dirt
version: 1.1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Experimental sample playback
source-archive: https://codeberg.org/uzu/dirt/archive/1.1.tar.gz
dependencies:
  - jack
  - liblo
  - libsamplerate
  - libsndfile
executables:
  - exposure: global executable
    kind: cli
    name: dirt
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dirt
  brew: brew install dirt
  nix: nix profile install nixpkgs#dirt
provenance:
  formula: dirt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
