id: brew:fluent-bit
display-name: fluent-bit
homepage: https://github.com/fluent/fluent-bit
repo: https://github.com/fluent/fluent-bit
docs: https://github.com/fluent/fluent-bit
package-manager:
  apk: fluent-bit
  brew: fluent-bit
  dnf: fluent-bit
  macports: fluent-bit
  nix: fluent-bit
package-manager-url: https://formulae.brew.sh/formula/fluent-bit
version: 5.0.6
license: Apache-2.0
category: development
tags:
  - cli
description: Fast and Lightweight Logs and Metrics processor
source-archive: https://github.com/fluent/fluent-bit/archive/refs/tags/v5.0.6.tar.gz
dependencies:
  - libyaml
  - luajit
  - openssl@4
build-dependencies:
  - bison
  - cmake
  - flex
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fluent-bit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fluent-bit
  av: sudo av install brew:fluent-bit
  brew: brew install fluent-bit
  dnf: sudo dnf install fluent-bit
  macports: sudo port install fluent-bit
  nix: nix profile install nixpkgs#fluent-bit
provenance:
  formula: fluent-bit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
