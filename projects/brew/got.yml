id: brew:got
display-name: got
homepage: https://gameoftrees.org/
repo: https://gameoftrees.org/releases/portable/got-portable-0.126.tar.gz
docs: https://gameoftrees.org/
package-manager:
  apk: got
  brew: got
  debian: got
  macports: got
  nix: got
  ubuntu: got
package-manager-url: https://formulae.brew.sh/formula/got
version: 0.126
license: ISC
category: network
tags:
  - cli
description: Version control system
source-archive: https://gameoftrees.org/releases/portable/got-portable-0.126.tar.gz
dependencies:
  - libevent
  - libretls
  - ncurses
  - openssl@3
build-dependencies:
  - bison
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gitwrapper
  - exposure: global executable
    kind: cli
    name: got
  - exposure: global executable
    kind: cli
    name: gotadmin
  - exposure: global executable
    kind: cli
    name: gotctl
  - exposure: global executable
    kind: cli
    name: gotd
  - exposure: global executable
    kind: cli
    name: gotsh
  - exposure: global executable
    kind: cli
    name: gotwebctl
  - exposure: global executable
    kind: cli
    name: gotwebd
  - exposure: global executable
    kind: cli
    name: tog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add got
  av: sudo av install brew:got
  brew: brew install got
  debian: sudo apt install got
  macports: sudo port install got
  nix: nix profile install nixpkgs#got
  ubuntu: sudo apt install got
provenance:
  formula: got
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
