id: brew:bkcrack
display-name: bkcrack
homepage: https://github.com/kimci86/bkcrack
repo: https://github.com/kimci86/bkcrack
docs: https://github.com/kimci86/bkcrack
package-manager:
  brew: bkcrack
  nix: bkcrack
  zypper: bkcrack
package-manager-url: https://formulae.brew.sh/formula/bkcrack
version: 1.8.1
license: Zlib
category: security
tags:
  - cli
description: Crack legacy zip encryption with Biham and Kocher's known plaintext attack
source-archive: https://github.com/kimci86/bkcrack/archive/refs/tags/v1.8.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: bkcrack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bkcrack
  brew: brew install bkcrack
  nix: nix profile install nixpkgs#bkcrack
  zypper: sudo zypper install bkcrack
provenance:
  formula: bkcrack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
