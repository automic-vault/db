id: brew:dfc
display-name: dfc
homepage: https://github.com/Rolinh/dfc
repo: https://github.com/Rolinh/dfc
docs: https://github.com/Rolinh/dfc
package-manager:
  apk: dfc
  brew: dfc
  debian: dfc
  dnf: dfc
  nix: dfc
  pacman: dfc
  ubuntu: dfc
  zypper: dfc
package-manager-url: https://formulae.brew.sh/formula/dfc
version: 3.1.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Display graphs and colors of file system space/usage
source-archive: https://github.com/Rolinh/dfc/releases/download/v3.1.1/dfc-3.1.1.tar.gz
dependencies:
  - gettext
build-dependencies:
  - cmake
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: dfc
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dfc
  av: sudo av install brew:dfc
  brew: brew install dfc
  debian: sudo apt install dfc
  dnf: sudo dnf install dfc
  nix: nix profile install nixpkgs#dfc
  pacman: sudo pacman -S dfc
  ubuntu: sudo apt install dfc
  zypper: sudo zypper install dfc
provenance:
  formula: dfc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
