id: brew:flowrs
display-name: flowrs
homepage: https://github.com/jvanbuel/flowrs
repo: https://github.com/jvanbuel/flowrs
docs: https://github.com/jvanbuel/flowrs
package-manager:
  brew: flowrs
package-manager-url: https://formulae.brew.sh/formula/flowrs
version: 0.12.6
license: MIT
category: development
tags:
  - cli
description: TUI application for Apache Airflow
source-archive: https://github.com/jvanbuel/flowrs/archive/refs/tags/flowrs-tui-v0.12.6.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: flowrs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flowrs
  brew: brew install flowrs
provenance:
  formula: flowrs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
