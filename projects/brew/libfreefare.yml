id: brew:libfreefare
display-name: libfreefare
homepage: https://github.com/nfc-tools/libfreefare
repo: https://github.com/nfc-tools/libfreefare
docs: https://github.com/nfc-tools/libfreefare
package-manager:
  brew: libfreefare
  nix: libfreefare
package-manager-url: https://formulae.brew.sh/formula/libfreefare
version: 0.4.0
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: API for MIFARE card manipulations
source-archive: >
  https://github.com/nfc-tools/libfreefare/releases/download/libfreefare-0.4.0/libfreefare-0.4.0.tar.bz2
dependencies:
  - libnfc
  - libusb-compat
  - openssl@3
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mifare-classic-format
  - exposure: global executable
    kind: cli
    name: mifare-classic-read-ndef
  - exposure: global executable
    kind: cli
    name: mifare-classic-write-ndef
  - exposure: global executable
    kind: cli
    name: mifare-desfire-access
  - exposure: global executable
    kind: cli
    name: mifare-desfire-create-ndef
  - exposure: global executable
    kind: cli
    name: mifare-desfire-ev1-configure-ats
  - exposure: global executable
    kind: cli
    name: mifare-desfire-ev1-configure-default-key
  - exposure: global executable
    kind: cli
    name: mifare-desfire-ev1-configure-random-uid
  - exposure: global executable
    kind: cli
    name: mifare-desfire-format
  - exposure: global executable
    kind: cli
    name: mifare-desfire-info
  - exposure: global executable
    kind: cli
    name: mifare-desfire-read-ndef
  - exposure: global executable
    kind: cli
    name: mifare-desfire-write-ndef
  - exposure: global executable
    kind: cli
    name: mifare-ultralight-info
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libfreefare
  brew: brew install libfreefare
  nix: nix profile install nixpkgs#libfreefare
provenance:
  formula: libfreefare
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
