id: brew:spicetify-cli
display-name: spicetify-cli
homepage: https://spicetify.app/
repo: https://github.com/spicetify/cli
docs: https://spicetify.app/
package-manager:
  brew: spicetify-cli
  chocolatey: spicetify-cli
  nix: spicetify-cli
  scoop: main/spicetify-cli
  winget: Spicetify.Spicetify
  zypper: spicetify-cli
package-manager-url: https://formulae.brew.sh/formula/spicetify-cli
version: 2.43.2
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Command-line tool to customize Spotify client
source-archive: https://github.com/spicetify/cli/archive/refs/tags/v2.43.2/v2.43.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: spicetify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spicetify-cli
  brew: brew install spicetify-cli
  chocolatey: choco install spicetify-cli
  nix: nix profile install nixpkgs#spicetify-cli
  scoop: scoop install main/spicetify-cli
  winget: winget install --id Spicetify.Spicetify -e
  zypper: sudo zypper install spicetify-cli
provenance:
  formula: spicetify-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
