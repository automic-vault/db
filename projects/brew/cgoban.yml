  nix: cgoban
  ubuntu: cgoban
  winget: KGSAI.CGoban
package-manager-url: https://formulae.brew.sh/formula/cgoban
version: 1.9.14
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Go-related services
