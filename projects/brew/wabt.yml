id: brew:wabt
display-name: wabt
homepage: https://github.com/WebAssembly/wabt
repo: https://github.com/WebAssembly/wabt
docs: https://github.com/WebAssembly/wabt
package-manager:
  apk: wabt
  brew: wabt
  debian: wabt
  dnf: wabt
  macports: wabt
  nix: wabt
  pacman: wabt
  scoop: extras/wabt
  ubuntu: wabt
package-manager-url: https://formulae.brew.sh/formula/wabt
version: 1.0.41
license: Apache-2.0
category: development
tags:
  - cli
description: Web Assembly Binary Toolkit
source-archive: https://github.com/WebAssembly/wabt/releases/download/1.0.41/wabt-1.0.41.tar.xz
dependencies:
  - openssl@3
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: spectest-interp
  - exposure: global executable
    kind: cli
    name: wasm-decompile
  - exposure: global executable
    kind: cli
    name: wasm-interp
  - exposure: global executable
    kind: cli
    name: wasm-objdump
  - exposure: global executable
    kind: cli
    name: wasm-stats
  - exposure: global executable
    kind: cli
    name: wasm-strip
  - exposure: global executable
    kind: cli
    name: wasm-validate
  - exposure: global executable
    kind: cli
    name: wasm2c
  - exposure: global executable
    kind: cli
    name: wasm2wat
  - exposure: global executable
    kind: cli
    name: wast2json
  - exposure: global executable
    kind: cli
    name: wat-desugar
  - exposure: global executable
    kind: cli
    name: wat2wasm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wabt
  av: sudo av install brew:wabt
  brew: brew install wabt
  debian: sudo apt install wabt
  dnf: sudo dnf install wabt
  macports: sudo port install wabt
  nix: nix profile install nixpkgs#wabt
  pacman: sudo pacman -S wabt
  scoop: scoop install extras/wabt
  ubuntu: sudo apt install wabt
provenance:
  formula: wabt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
