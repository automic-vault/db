id: brew:skate
display-name: skate
homepage: https://github.com/charmbracelet/skate
repo: https://github.com/charmbracelet/skate
docs: https://github.com/charmbracelet/skate
package-manager:
  apk: skate
  brew: skate
  nix: skate
  pacman: skate
  winget: charmbracelet.skate
package-manager-url: https://formulae.brew.sh/formula/skate
version: 1.0.1
license: MIT
category: development
tags:
  - cli
description: Personal key value store
source-archive: https://github.com/charmbracelet/skate/archive/refs/tags/v1.0.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: skate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add skate
  av: sudo av install brew:skate
  brew: brew install skate
  nix: nix profile install nixpkgs#skate
  pacman: sudo pacman -S skate
  winget: winget install --id charmbracelet.skate -e
provenance:
  formula: skate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
