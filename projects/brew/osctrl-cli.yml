id: brew:osctrl-cli
display-name: osctrl-cli
homepage: https://osctrl.net
repo: https://github.com/jmpsec/osctrl
docs: https://osctrl.net
package-manager:
  brew: osctrl-cli
package-manager-url: https://formulae.brew.sh/formula/osctrl-cli
version: 0.5.2
license: MIT
category: development
tags:
  - cli
description: Fast and efficient osquery management
source-archive: https://github.com/jmpsec/osctrl/archive/refs/tags/v0.5.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: osctrl-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:osctrl-cli
  brew: brew install osctrl-cli
provenance:
  formula: osctrl-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
