id: brew:brainfuck
display-name: brainfuck
homepage: https://github.com/fabianishere/brainfuck
repo: https://github.com/fabianishere/brainfuck
docs: https://github.com/fabianishere/brainfuck
package-manager:
  brew: brainfuck
  dnf: brainfuck
package-manager-url: https://formulae.brew.sh/formula/brainfuck
version: 2.7.3
license: Apache-2.0
category: development
tags:
  - cli
description: Interpreter for the brainfuck language
source-archive: https://github.com/fabianishere/brainfuck/archive/refs/tags/2.7.3.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: brainfuck
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:brainfuck
  brew: brew install brainfuck
  dnf: sudo dnf install brainfuck
provenance:
  formula: brainfuck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
