id: brew:mob
display-name: mob
homepage: https://mob.sh
repo: https://github.com/remotemobprogramming/mob
docs: https://mob.sh
package-manager:
  brew: mob
  nix: mob
  scoop: main/mob
package-manager-url: https://formulae.brew.sh/formula/mob
version: 5.4.2
license: MIT
category: development
tags:
  - cli
  - git
description: Tool for smooth Git handover in mob programming sessions
source-archive: https://github.com/remotemobprogramming/mob/archive/refs/tags/5.4.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mob
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mob
  brew: brew install mob
  nix: nix profile install nixpkgs#mob
  scoop: scoop install main/mob
provenance:
  formula: mob
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
