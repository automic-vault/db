id: brew:duck
display-name: duck
homepage: https://duck.sh/
repo: https://dist.duck.sh/duck-src-9.4.1.44384.tar.gz
docs: https://duck.sh/
package-manager:
  brew: duck
  chocolatey: duck
  debian: duck
  macports: duck
  ubuntu: duck
package-manager-url: https://formulae.brew.sh/formula/duck
version: 9.4.1.44384
license: GPL-3.0-only
category: network
tags:
  - cli
description: Command-line interface for Cyberduck (a multi-protocol file transfer tool)
source-archive: https://dist.duck.sh/duck-src-9.4.1.44384.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - ant
  - maven
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: duck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:duck
  brew: brew install duck
  chocolatey: choco install duck
  debian: sudo apt install duck
  macports: sudo port install duck
  ubuntu: sudo apt install duck
provenance:
  formula: duck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
