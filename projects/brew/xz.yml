  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xz
  av: sudo av install brew:xz
  brew: brew install xz
  debian: sudo apt install lzma
  dnf: sudo dnf install xz
  macports: sudo port install xz
  nix: nix profile install nixpkgs#xz
  pacman: sudo pacman -S xz
  scoop: scoop install main/xz
  ubuntu: sudo apt install lzma
  zypper: sudo zypper install xz
provenance:
  formula: xz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
