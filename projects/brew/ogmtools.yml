id: brew:ogmtools
display-name: ogmtools
homepage: https://www.bunkus.org/videotools/ogmtools/
repo: https://www.bunkus.org/videotools/ogmtools/ogmtools-1.5.tar.bz2
docs: https://www.bunkus.org/videotools/ogmtools/
package-manager:
  brew: ogmtools
  debian: ogmtools
  dnf: ogmtools
  macports: ogmtools
  nix: ogmtools
  pacman: ogmtools
  ubuntu: ogmtools
  zypper: ogmtools
package-manager-url: https://formulae.brew.sh/formula/ogmtools
version: 1.5
license: GPL-2.0-only
category: media
tags:
  - cli
description: OGG media streams manipulation tools
source-archive: https://www.bunkus.org/videotools/ogmtools/ogmtools-1.5.tar.bz2
dependencies:
  - libogg
  - libvorbis
executables:
  - exposure: global executable
    kind: cli
    name: ogmcat
  - exposure: global executable
    kind: cli
    name: ogmdemux
  - exposure: global executable
    kind: cli
    name: ogminfo
  - exposure: global executable
    kind: cli
    name: ogmmerge
  - exposure: global executable
    kind: cli
    name: ogmsplit
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Ogmtools has not been updated since 2004 and is no longer being developed,
    maintained or supported. There are several issues, especially on 64-bit
    architectures, which the author will not fix or accept patches for. Keep this in
    mind when deciding whether to use this software.
  post-install-defined: false
install-lines:
  av: sudo av install brew:ogmtools
  brew: brew install ogmtools
  debian: sudo apt install ogmtools
  dnf: sudo dnf install ogmtools
  macports: sudo port install ogmtools
  nix: nix profile install nixpkgs#ogmtools
  pacman: sudo pacman -S ogmtools
  ubuntu: sudo apt install ogmtools
  zypper: sudo zypper install ogmtools
provenance:
  formula: ogmtools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
