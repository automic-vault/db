id: brew:counts
display-name: counts
homepage: https://github.com/nnethercote/counts
repo: https://github.com/nnethercote/counts
docs: https://github.com/nnethercote/counts
package-manager:
  brew: counts
package-manager-url: https://formulae.brew.sh/formula/counts
version: 1.0.7
license: Unlicense
category: development
tags:
  - cli
description: Tool for ad hoc profiling
source-archive: https://github.com/nnethercote/counts/archive/refs/tags/1.0.7.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: counts
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:counts
  brew: brew install counts
provenance:
  formula: counts
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
