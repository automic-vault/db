id: brew:rtorrent
display-name: rtorrent
homepage: https://github.com/rakshasa/rtorrent
repo: https://github.com/rakshasa/rtorrent
docs: https://github.com/rakshasa/rtorrent
package-manager:
  apk: rtorrent
  brew: rtorrent
  debian: rtorrent
  dnf: rtorrent
  macports: rtorrent
  nix: rtorrent
  pacman: rtorrent
  ubuntu: rtorrent
  zypper: rtorrent
package-manager-url: https://formulae.brew.sh/formula/rtorrent
version: 0.16.12
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Ncurses BitTorrent client based on libtorrent-rakshasa
source-archive: https://github.com/rakshasa/rtorrent/releases/download/v0.16.12/rtorrent-0.16.12.tar.gz
dependencies:
  - libtorrent-rakshasa
  - xmlrpc-c
build-dependencies:
  - autoconf
  - autoconf-archive
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - curl
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: rtorrent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rtorrent
  av: sudo av install brew:rtorrent
  brew: brew install rtorrent
  debian: sudo apt install rtorrent
  dnf: sudo dnf install rtorrent
  macports: sudo port install rtorrent
  nix: nix profile install nixpkgs#rtorrent
  pacman: sudo pacman -S rtorrent
  ubuntu: sudo apt install rtorrent
  zypper: sudo zypper install rtorrent
provenance:
  formula: rtorrent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
