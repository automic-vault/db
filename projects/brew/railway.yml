id: brew:railway
display-name: railway
homepage: https://railway.com/
repo: https://github.com/railwayapp/cli
docs: https://railway.com/
package-manager:
  apk: railway
  brew: railway
  nix: railway
  pacman: railway
  scoop: main/railway
package-manager-url: https://formulae.brew.sh/formula/railway
version: 4.65.0
license: MIT
category: development
tags:
  - cli
description: Develop and deploy code with zero configuration
source-archive: https://github.com/railwayapp/cli/archive/refs/tags/v4.65.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: railway
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add railway
  av: sudo av install brew:railway
  brew: brew install railway
  nix: nix profile install nixpkgs#railway
  pacman: sudo pacman -S railway
  scoop: scoop install main/railway
provenance:
  formula: railway
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
