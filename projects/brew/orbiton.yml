id: brew:orbiton
display-name: orbiton
homepage: https://roboticoverlords.org/orbiton/
repo: https://github.com/xyproto/orbiton
docs: https://roboticoverlords.org/orbiton/
package-manager:
  brew: orbiton
  macports: orbiton
  nix: orbiton
  pacman: orbiton
package-manager-url: https://formulae.brew.sh/formula/orbiton
version: 2.74.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: Fast and config-free text editor and IDE limited by VT100
source-archive: https://github.com/xyproto/orbiton/archive/refs/tags/v2.74.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: o
  - exposure: global executable
    kind: cli
    name: obuild
  - exposure: global executable
    kind: cli
    name: osudo
  - exposure: global executable
    kind: cli
    name: vs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:orbiton
  brew: brew install orbiton
  macports: sudo port install orbiton
  nix: nix profile install nixpkgs#orbiton
  pacman: sudo pacman -S orbiton
provenance:
  formula: orbiton
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
