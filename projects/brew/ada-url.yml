id: brew:ada-url
display-name: ada-url
homepage: https://github.com/ada-url/ada
repo: https://github.com/ada-url/ada
docs: https://github.com/ada-url/ada
package-manager:
  brew: ada-url
  dnf: ada-url
package-manager-url: https://formulae.brew.sh/formula/ada-url
version: 3.4.4
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: WHATWG-compliant and fast URL parser written in modern C++
source-archive: https://github.com/ada-url/ada/archive/refs/tags/v3.4.4.tar.gz
dependencies:
  - fmt
build-dependencies:
  - cmake
  - cxxopts
executables:
  - exposure: global executable
    kind: cli
    name: adaparse
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ada-url
  brew: brew install ada-url
  dnf: sudo dnf install ada-url
provenance:
  formula: ada-url
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
