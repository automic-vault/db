id: brew:glslviewer
display-name: glslviewer
homepage: https://patriciogonzalezvivo.com/2015/glslViewer/
repo: https://github.com/patriciogonzalezvivo/glslViewer
docs: https://patriciogonzalezvivo.com/2015/glslViewer/
package-manager:
  apk: glslviewer
  brew: glslviewer
  nix: glslviewer
  scoop: main/glslviewer
package-manager-url: https://formulae.brew.sh/formula/glslviewer
version: 3.5.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Live-coding console tool that renders GLSL Shaders
source-archive: https://github.com/patriciogonzalezvivo/glslViewer.git
dependencies:
  - ffmpeg
  - glfw
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: glslScreenSaver
  - exposure: global executable
    kind: cli
    name: glslThumbnailer
  - exposure: global executable
    kind: cli
    name: glslViewer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add glslviewer
  av: sudo av install brew:glslviewer
  brew: brew install glslviewer
  nix: nix profile install nixpkgs#glslviewer
  scoop: scoop install main/glslviewer
provenance:
  formula: glslviewer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
