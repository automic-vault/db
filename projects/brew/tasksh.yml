id: brew:tasksh
display-name: tasksh
homepage: https://github.com/GothenburgBitFactory/taskshell
repo: https://github.com/GothenburgBitFactory/taskshell
docs: https://github.com/GothenburgBitFactory/taskshell
package-manager:
  apk: tasksh
  brew: tasksh
  debian: tasksh
  dnf: tasksh
  macports: tasksh
  nix: tasksh
  ubuntu: tasksh
package-manager-url: https://formulae.brew.sh/formula/tasksh
version: 1.2.0
license: MIT
category: development
tags:
  - cli
description: Shell wrapper for Taskwarrior commands
source-archive: >
  https://github.com/GothenburgBitFactory/taskshell/releases/download/v1.2.0/tasksh-1.2.0.tar.gz
dependencies:
  - readline
  - task
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: tasksh
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tasksh
  av: sudo av install brew:tasksh
  brew: brew install tasksh
  debian: sudo apt install tasksh
  dnf: sudo dnf install tasksh
  macports: sudo port install tasksh
  nix: nix profile install nixpkgs#tasksh
  ubuntu: sudo apt install tasksh
provenance:
  formula: tasksh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
