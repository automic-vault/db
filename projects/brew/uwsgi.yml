id: brew:uwsgi
display-name: uwsgi
homepage: https://uwsgi-docs.readthedocs.io/en/latest/
repo: >
  https://files.pythonhosted.org/packages/9f/49/2f57640e889ba509fd1fae10cccec1b58972a07c2724486efba94c5ea448/uwsgi-2.0.31.tar.gz
docs: https://uwsgi-docs.readthedocs.io/en/latest/
package-manager:
  apk: uwsgi
  brew: uwsgi
  debian: uwsgi
  dnf: uwsgi
  nix: uwsgi
  pacman: uwsgi
  ubuntu: uwsgi
  zypper: uwsgi
package-manager-url: https://formulae.brew.sh/formula/uwsgi
version: 2.0.31
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Full stack for building hosting services
source-archive: >
  https://files.pythonhosted.org/packages/9f/49/2f57640e889ba509fd1fae10cccec1b58972a07c2724486efba94c5ea448/uwsgi-2.0.31.tar.gz
dependencies:
  - openssl@3
  - pcre2
  - python@3.14
  - sqlite
  - yajl
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
  - libxcrypt
  - libxml2
  - openldap
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: uwsgi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add uwsgi
  av: sudo av install brew:uwsgi
  brew: brew install uwsgi
  debian: sudo apt install uwsgi
  dnf: sudo dnf install uwsgi
  nix: nix profile install nixpkgs#uwsgi
  pacman: sudo pacman -S uwsgi
  ubuntu: sudo apt install uwsgi
  zypper: sudo zypper install uwsgi
provenance:
  formula: uwsgi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
