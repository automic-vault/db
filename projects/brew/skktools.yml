id: brew:skktools
display-name: skktools
homepage: https://github.com/skk-dev/skktools
repo: https://github.com/skk-dev/skktools
docs: https://github.com/skk-dev/skktools
package-manager:
  brew: skktools
  debian: skktools
  nix: skktools
  pacman: skktools
  ubuntu: skktools
package-manager-url: https://formulae.brew.sh/formula/skktools
version: 1.3.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: SKK dictionary maintenance tools
source-archive: https://github.com/skk-dev/skktools/archive/refs/tags/skktools-1_3_4.tar.gz
dependencies:
  - gettext
  - glib
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: skkdic-count
  - exposure: global executable
    kind: cli
    name: skkdic-expr
  - exposure: global executable
    kind: cli
    name: skkdic-expr2
  - exposure: global executable
    kind: cli
    name: skkdic-sort
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:skktools
  brew: brew install skktools
  debian: sudo apt install skktools
  nix: nix profile install nixpkgs#skktools
  pacman: sudo pacman -S skktools
  ubuntu: sudo apt install skktools
provenance:
  formula: skktools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
