id: brew:sile
display-name: sile
homepage: https://sile-typesetter.org
repo: https://github.com/sile-typesetter/sile
docs: https://sile-typesetter.org
package-manager:
  brew: sile
  dnf: sile
  nix: sile
  pacman: sile
  zypper: sile
package-manager-url: https://formulae.brew.sh/formula/sile
version: 0.15.13
license: MIT
category: development
tags:
  - cli
description: Modern typesetting system inspired by TeX
source-archive: https://github.com/sile-typesetter/sile/releases/download/v0.15.13/sile-0.15.13.tar.zst
dependencies:
  - fontconfig
  - freetype
  - harfbuzz
  - icu4c@78
  - libpng
  - luajit
  - luarocks
  - openssl@3
build-dependencies:
  - pkgconf
  - poppler
  - rust
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: sile
  - exposure: global executable
    kind: cli
    name: sile-lua
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    By default SILE uses the font Gentium Plus to render all documents that do not
    specifically call for something else. If this font is not available on your system
    you may encounter errors. Of lower priority depending on your use case, the math
    typesetting package defaults to using Libertinus Math and the default monospace font
    is Hack. These fonts can be installed via Homebrew: brew install --cask
    font-gentium-plus brew install --cask font-libertinus brew install --cask font-hack
    Alternatively you can download and install the fonts yourself:
    https://software.sil.org/gentium/ https://github.com/alerque/libertinus
    https://sourcefoundry.org/hack/
  post-install-defined: false
install-lines:
  av: sudo av install brew:sile
  brew: brew install sile
  dnf: sudo dnf install sile
  nix: nix profile install nixpkgs#sile
  pacman: sudo pacman -S sile
  zypper: sudo zypper install sile
provenance:
  formula: sile
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
