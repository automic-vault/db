id: brew:include-what-you-use
display-name: include-what-you-use
homepage: https://include-what-you-use.org/
repo: https://include-what-you-use.org/downloads/include-what-you-use-0.26.src.tar.gz
docs: https://include-what-you-use.org/
package-manager:
  apk: include-what-you-use
  brew: include-what-you-use
  macports: include-what-you-use
  nix: include-what-you-use
  zypper: include-what-you-use
package-manager-url: https://formulae.brew.sh/formula/include-what-you-use
version: 0.26
license: NCSA
category: network
tags:
  - cli
description: Tool to analyze #includes in C and C++ source files
source-archive: https://include-what-you-use.org/downloads/include-what-you-use-0.26.src.tar.gz
dependencies:
  - llvm
build-dependencies:
  - cmake
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: fix_includes.py
  - exposure: global executable
    kind: cli
    name: include-what-you-use
  - exposure: global executable
    kind: cli
    name: iwyu_tool.py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add include-what-you-use
  av: sudo av install brew:include-what-you-use
  brew: brew install include-what-you-use
  macports: sudo port install include-what-you-use
  nix: nix profile install nixpkgs#include-what-you-use
  zypper: sudo zypper install include-what-you-use
provenance:
  formula: include-what-you-use
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
