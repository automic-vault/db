id: brew:openjazz
display-name: openjazz
homepage: https://www.alister.eu/jazz/oj/
repo: https://github.com/AlisterT/openjazz
docs: https://www.alister.eu/jazz/oj/
package-manager:
  brew: openjazz
  debian: openjazz
  ubuntu: openjazz
  winget: AlisterT.openjazz
package-manager-url: https://formulae.brew.sh/formula/openjazz
version: 20260301
license: GPL-2.0-only
category: development
tags:
  - cli
description: Open source Jazz Jackrabit engine
source-archive: https://github.com/AlisterT/openjazz/archive/refs/tags/20260301.tar.gz
dependencies:
  - sdl2
  - sdl2_net
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: OpenJazz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The shareware version of Jazz Jackrabbit has been installed. You can install the
    full version by copying the game files to:
    $HOMEBREW_CELLAR/openjazz/20260301/share/openjazz
  post-install-defined: false
install-lines:
  av: sudo av install brew:openjazz
  brew: brew install openjazz
  debian: sudo apt install openjazz
  ubuntu: sudo apt install openjazz
  winget: winget install --id AlisterT.openjazz -e
provenance:
  formula: openjazz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
