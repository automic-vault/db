id: brew:google-java-format
display-name: google-java-format
homepage: https://github.com/google/google-java-format
repo: https://github.com/google/google-java-format
docs: https://github.com/google/google-java-format
package-manager:
  brew: google-java-format
  macports: google-java-format
  nix: google-java-format
  scoop: extras/google-java-format
package-manager-url: https://formulae.brew.sh/formula/google-java-format
version: 1.35.0
license: Apache-2.0
category: development
tags:
  - cli
description: Reformats Java source code to comply with Google Java Style
source-archive: >
  https://github.com/google/google-java-format/releases/download/v1.35.0/google-java-format-1.35.0-all-deps.jar
dependencies:
  - openjdk
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: google-java-format
  - exposure: global executable
    kind: cli
    name: google-java-format-diff
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:google-java-format
  brew: brew install google-java-format
  macports: sudo port install google-java-format
  nix: nix profile install nixpkgs#google-java-format
  scoop: scoop install extras/google-java-format
provenance:
  formula: google-java-format
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
