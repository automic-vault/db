id: brew:skinny
display-name: skinny
homepage: https://skinny-framework.github.io
repo: https://github.com/skinny-framework/skinny-framework
docs: https://skinny-framework.github.io
package-manager:
  brew: skinny
package-manager-url: https://formulae.brew.sh/formula/skinny
version: 4.0.1
license: MIT
category: development
tags:
  - cli
description: Full-stack web app framework in Scala
source-archive: >
  https://github.com/skinny-framework/skinny-framework/releases/download/4.0.1/skinny-4.0.1.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: skinny
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:skinny
  brew: brew install skinny
provenance:
  formula: skinny
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
