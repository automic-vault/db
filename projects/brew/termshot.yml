id: brew:termshot
display-name: termshot
homepage: https://github.com/homeport/termshot
repo: https://github.com/homeport/termshot
docs: https://github.com/homeport/termshot
package-manager:
  brew: termshot
  macports: termshot
  nix: termshot
package-manager-url: https://formulae.brew.sh/formula/termshot
version: 0.6.1
license: MIT
category: development
tags:
  - cli
description: Creates screenshots based on terminal command output
source-archive: https://github.com/homeport/termshot/archive/refs/tags/v0.6.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: termshot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:termshot
  brew: brew install termshot
  macports: sudo port install termshot
  nix: nix profile install nixpkgs#termshot
provenance:
  formula: termshot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
