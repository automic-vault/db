id: brew:godap
display-name: godap
homepage: https://github.com/Macmod/godap
repo: https://github.com/Macmod/godap
docs: https://github.com/Macmod/godap
package-manager:
  apk: godap
  brew: godap
package-manager-url: https://formulae.brew.sh/formula/godap
version: 2.11.0
license: MIT
category: development
tags:
  - cli
description: Complete TUI (terminal user interface) for LDAP
source-archive: https://github.com/Macmod/godap/archive/refs/tags/v2.11.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: godap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add godap
  av: sudo av install brew:godap
  brew: brew install godap
provenance:
  formula: godap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
