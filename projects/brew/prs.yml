id: brew:prs
display-name: prs
homepage: https://timvisee.com/projects/prs
repo: https://github.com/timvisee/prs
docs: https://timvisee.com/projects/prs
package-manager:
  brew: prs
  debian: prs
  nix: prs
  scoop: main/prs
package-manager-url: https://formulae.brew.sh/formula/prs
version: 0.5.7
license: GPL-3.0-only
category: security
tags:
  - cli
  - git
description: Secure, fast & convenient password manager CLI with GPG & git sync
source-archive: https://github.com/timvisee/prs/archive/refs/tags/v0.5.7.tar.gz
dependencies:
  - gpgme
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: prs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:prs
  brew: brew install prs
  debian: sudo apt install prs
  nix: nix profile install nixpkgs#prs
  scoop: scoop install main/prs
provenance:
  formula: prs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
