id: brew:syft
display-name: syft
homepage: https://github.com/anchore/syft
repo: https://github.com/anchore/syft
docs: https://github.com/anchore/syft
package-manager:
  apk: syft
  brew: syft
  chocolatey: syft
  nix: syft
  pacman: syft
  scoop: main/syft
  winget: Anchore.Syft
  zypper: syft
package-manager-url: https://formulae.brew.sh/formula/syft
version: 1.44.0
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for generating a Software Bill of Materials from container images
source-archive: https://github.com/anchore/syft/archive/refs/tags/v1.44.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: syft
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add syft
  av: sudo av install brew:syft
  brew: brew install syft
  chocolatey: choco install syft
  nix: nix profile install nixpkgs#syft
  pacman: sudo pacman -S syft
  scoop: scoop install main/syft
  winget: winget install --id Anchore.Syft -e
  zypper: sudo zypper install syft
provenance:
  formula: syft
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
