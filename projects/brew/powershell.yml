id: brew:powershell
display-name: powershell
homepage: https://github.com/PowerShell/PowerShell
repo: https://github.com/PowerShell/PowerShell
docs: https://github.com/PowerShell/PowerShell
package-manager:
  apk: powershell
  brew: powershell
  chocolatey: PowerShell
  macports: powershell
  nix: powershell
  scoop: main/pwsh
  winget: Microsoft.PowerShell
package-manager-url: https://formulae.brew.sh/formula/powershell
version: 7.6.2
license: MIT
category: development
tags:
  - cli
description: Command-line shell and scripting language
source-archive: https://github.com/PowerShell/PowerShell.git
dependencies:
  - dotnet
executables:
  - exposure: global executable
    kind: cli
    name: pwsh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add powershell
  av: sudo av install brew:powershell
  brew: brew install powershell
  chocolatey: choco install PowerShell
  macports: sudo port install powershell
  nix: nix profile install nixpkgs#powershell
  scoop: scoop install main/pwsh
  winget: winget install --id Microsoft.PowerShell -e
provenance:
  formula: powershell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
