id: brew:xtermcontrol
display-name: xtermcontrol
homepage: https://thrysoee.dk/xtermcontrol/
repo: https://thrysoee.dk/xtermcontrol/xtermcontrol-3.10.tar.gz
docs: https://thrysoee.dk/xtermcontrol/
package-manager:
  brew: xtermcontrol
  debian: xtermcontrol
  macports: xtermcontrol
  nix: xtermcontrol
  ubuntu: xtermcontrol
package-manager-url: https://formulae.brew.sh/formula/xtermcontrol
version: 3.10
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Control xterm properties such as colors, title, font and geometry
source-archive: https://thrysoee.dk/xtermcontrol/xtermcontrol-3.10.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: xtermcontrol
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xtermcontrol
  brew: brew install xtermcontrol
  debian: sudo apt install xtermcontrol
  macports: sudo port install xtermcontrol
  nix: nix profile install nixpkgs#xtermcontrol
  ubuntu: sudo apt install xtermcontrol
provenance:
  formula: xtermcontrol
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
