id: brew:buildpulse-test-reporter
display-name: buildpulse-test-reporter
homepage: https://buildpulse.io
repo: https://github.com/buildpulse/test-reporter
docs: https://buildpulse.io
package-manager:
  brew: buildpulse-test-reporter
package-manager-url: https://formulae.brew.sh/formula/buildpulse-test-reporter
version: 0.29.0
license: MIT
category: development
tags:
  - cli
description: Connect your CI to BuildPulse to detect, track, and rank flaky tests
source-archive: https://github.com/buildpulse/test-reporter/archive/refs/tags/v0.29.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: buildpulse-test-reporter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:buildpulse-test-reporter
  brew: brew install buildpulse-test-reporter
provenance:
  formula: buildpulse-test-reporter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
