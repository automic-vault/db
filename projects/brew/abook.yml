id: brew:abook
display-name: abook
homepage: https://abook.sourceforge.io/
repo: https://abook.sourceforge.io/devel/abook-0.6.2.tar.gz
docs: https://abook.sourceforge.io/
package-manager:
  apk: abook
  brew: abook
  debian: abook
  dnf: abook
  macports: abook
  nix: abook
  ubuntu: abook
  zypper: abook
package-manager-url: https://formulae.brew.sh/formula/abook
version: 0.6.2
license: GPL-3.0-only AND GPL-2.0-or-later AND LGPL-2.0-or-later AND BSD-2-Clause AND BSD-4.3RENO
category: network
tags:
  - cli
description: Address book with mutt support
source-archive: https://abook.sourceforge.io/devel/abook-0.6.2.tar.gz
dependencies:
  - gettext
  - readline
build-dependencies:
  - autoconf
  - automake
  - gettext
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: abook
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add abook
  av: sudo av install brew:abook
  brew: brew install abook
  debian: sudo apt install abook
  dnf: sudo dnf install abook
  macports: sudo port install abook
  nix: nix profile install nixpkgs#abook
  ubuntu: sudo apt install abook
  zypper: sudo zypper install abook
provenance:
  formula: abook
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
