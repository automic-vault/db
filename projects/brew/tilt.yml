id: brew:tilt
display-name: tilt
homepage: https://tilt.dev/
repo: https://github.com/tilt-dev/tilt
docs: https://tilt.dev/
package-manager:
  brew: tilt
  macports: tilt
  nix: tilt
package-manager-url: https://formulae.brew.sh/formula/tilt
version: 0.37.3
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Define your dev environment as code. For microservice apps on Kubernetes
source-archive: https://github.com/tilt-dev/tilt.git
build-dependencies:
  - go
  - node
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: tilt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tilt
  brew: brew install tilt
  macports: sudo port install tilt
  nix: nix profile install nixpkgs#tilt
provenance:
  formula: tilt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
