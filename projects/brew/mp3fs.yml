id: brew:mp3fs
display-name: mp3fs
homepage: https://khenriks.github.io/mp3fs/
repo: https://github.com/khenriks/mp3fs
docs: https://khenriks.github.io/mp3fs/
package-manager:
  brew: mp3fs
  debian: mp3fs
  dnf: mp3fs
  macports: mp3fs
  nix: mp3fs
  ubuntu: mp3fs
package-manager-url: https://formulae.brew.sh/formula/mp3fs
version: 1.1.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: 'Read-only FUSE file system: transcodes audio formats to MP3'
source-archive: https://github.com/khenriks/mp3fs/releases/download/v1.1.1/mp3fs-1.1.1.tar.gz
dependencies:
  - flac
  - lame
  - libfuse@2
  - libid3tag
  - libvorbis
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mp3fs
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mp3fs
  brew: brew install mp3fs
  debian: sudo apt install mp3fs
  dnf: sudo dnf install mp3fs
  macports: sudo port install mp3fs
  nix: nix profile install nixpkgs#mp3fs
  ubuntu: sudo apt install mp3fs
provenance:
  formula: mp3fs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
