id: brew:mask
display-name: mask
homepage: https://github.com/jacobdeichert/mask/
repo: https://github.com/jacobdeichert/mask
docs: https://github.com/jacobdeichert/mask/
package-manager:
  brew: mask
  macports: mask
  nix: mask
  scoop: main/mask
package-manager-url: https://formulae.brew.sh/formula/mask
version: 0.11.7
license: MIT
category: development
tags:
  - cli
description: CLI task runner defined by a simple markdown file
source-archive: https://github.com/jacobdeichert/mask/archive/refs/tags/mask/0.11.7.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mask
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mask
  brew: brew install mask
  macports: sudo port install mask
  nix: nix profile install nixpkgs#mask
  scoop: scoop install main/mask
provenance:
  formula: mask
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
