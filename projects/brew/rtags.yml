id: brew:rtags
display-name: rtags
homepage: https://github.com/Andersbakken/rtags
repo: https://github.com/Andersbakken/rtags
docs: https://github.com/Andersbakken/rtags
package-manager:
  brew: rtags
  chocolatey: rdm
  debian: rtags
  dnf: rc
  macports: rtags
  nix: rtags
  ubuntu: rtags
  winget: Devolutions.RemoteDesktopManager
  zypper: rtags
package-manager-url: https://formulae.brew.sh/formula/rtags
version: 2.44
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Source code cross-referencer like ctags with a clang frontend
source-archive: https://github.com/Andersbakken/rtags/releases/download/v2.44/rtags-2.44.tar.bz2
dependencies:
  - emacs
  - llvm
  - openssl@3
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: gcc-rtags-wrapper.sh
  - exposure: global executable
    kind: cli
    name: rc
  - exposure: global executable
    kind: cli
    name: rdm
  - exposure: global executable
    kind: cli
    name: rp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:rtags
  brew: brew install rtags
  chocolatey: choco install rdm
  debian: sudo apt install rtags
  dnf: sudo dnf install rc
  macports: sudo port install rtags
  nix: nix profile install nixpkgs#rtags
  ubuntu: sudo apt install rtags
  winget: winget install --id Devolutions.RemoteDesktopManager -e
  zypper: sudo zypper install rtags
provenance:
  formula: rtags
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
