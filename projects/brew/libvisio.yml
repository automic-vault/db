id: brew:libvisio
display-name: libvisio
homepage: https://wiki.documentfoundation.org/DLP/Libraries/libvisio
repo: https://dev-www.libreoffice.org/src/libvisio/libvisio-0.1.11.tar.xz
docs: https://wiki.documentfoundation.org/DLP/Libraries/libvisio
package-manager:
  apk: libvisio
  brew: libvisio
  dnf: libvisio
  nix: libvisio
  pacman: libvisio
package-manager-url: https://formulae.brew.sh/formula/libvisio
version: 0.1.11
license: MPL-2.0
category: network
tags:
  - cli
description: Interpret and import Visio diagrams
source-archive: https://dev-www.libreoffice.org/src/libvisio/libvisio-0.1.11.tar.xz
dependencies:
  - icu4c@78
  - librevenge
build-dependencies:
  - boost
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: vsd2raw
  - exposure: global executable
    kind: cli
    name: vsd2text
  - exposure: global executable
    kind: cli
    name: vsd2xhtml
  - exposure: global executable
    kind: cli
    name: vss2raw
  - exposure: global executable
    kind: cli
    name: vss2text
  - exposure: global executable
    kind: cli
    name: vss2xhtml
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libvisio
  av: sudo av install brew:libvisio
  brew: brew install libvisio
  dnf: sudo dnf install libvisio
  nix: nix profile install nixpkgs#libvisio
  pacman: sudo pacman -S libvisio
provenance:
  formula: libvisio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
