id: brew:aws-cdk
display-name: aws-cdk
homepage: https://github.com/aws/aws-cdk
repo: https://registry.npmjs.org/aws-cdk/-/aws-cdk-2.1124.1.tgz
docs: https://github.com/aws/aws-cdk
package-manager:
  brew: aws-cdk
  dnf: cdk
  nix: cdk
package-manager-url: https://formulae.brew.sh/formula/aws-cdk
version: 2.1124.1
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
  - cloud
description: AWS Cloud Development Kit - framework for defining AWS infra as code
source-archive: https://registry.npmjs.org/aws-cdk/-/aws-cdk-2.1124.1.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: cdk
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aws-cdk
  brew: brew install aws-cdk
  dnf: sudo dnf install cdk
  nix: nix profile install nixpkgs#cdk
provenance:
  formula: aws-cdk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
