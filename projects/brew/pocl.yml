id: brew:pocl
display-name: pocl
homepage: https://portablecl.org/
repo: https://github.com/pocl/pocl
docs: https://portablecl.org/
package-manager:
  brew: pocl
  dnf: pocl
  nix: pocl
  pacman: pocl
  zypper: pocl
package-manager-url: https://formulae.brew.sh/formula/pocl
version: 7.1
license: MIT
category: development
tags:
  - cli
description: Portable Computing Language
source-archive: https://github.com/pocl/pocl/archive/refs/tags/v7.1.tar.gz
dependencies:
  - hwloc
  - llvm@21
  - opencl-icd-loader
build-dependencies:
  - cmake
  - opencl-headers
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: poclcc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pocl
  brew: brew install pocl
  dnf: sudo dnf install pocl
  nix: nix profile install nixpkgs#pocl
  pacman: sudo pacman -S pocl
  zypper: sudo zypper install pocl
provenance:
  formula: pocl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
