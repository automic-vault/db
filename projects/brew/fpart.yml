id: brew:fpart
display-name: fpart
homepage: https://github.com/martymac/fpart/
repo: https://github.com/martymac/fpart
docs: https://github.com/martymac/fpart/
package-manager:
  brew: fpart
  debian: fpart
  dnf: fpart
  nix: fpart
  ubuntu: fpart
package-manager-url: https://formulae.brew.sh/formula/fpart
version: 1.7.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Sorts file trees and packs them into bags
source-archive: https://github.com/martymac/fpart/archive/refs/tags/fpart-1.7.0.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: fpart
  - exposure: global executable
    kind: cli
    name: fpsync
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fpart
  brew: brew install fpart
  debian: sudo apt install fpart
  dnf: sudo dnf install fpart
  nix: nix profile install nixpkgs#fpart
  ubuntu: sudo apt install fpart
provenance:
  formula: fpart
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
