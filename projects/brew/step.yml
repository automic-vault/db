id: brew:step
display-name: step
homepage: https://smallstep.com
repo: https://github.com/smallstep/cli
docs: https://smallstep.com
package-manager:
  apk: step
  brew: step
  debian: step
  dnf: step
  macports: step
  nix: step-ca
  pacman: step
  ubuntu: step
  winget: Smallstep.step
  zypper: step
package-manager-url: https://formulae.brew.sh/formula/step
version: 0.30.2
license: Apache-2.0
category: security
tags:
  - cli
description: Crypto and x509 Swiss-Army-Knife
source-archive: https://github.com/smallstep/cli/releases/download/v0.30.2/step_0.30.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: step
  - exposure: global executable
    kind: cli
    name: step-ca
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add step
  av: sudo av install brew:step
  brew: brew install step
  debian: sudo apt install step
  dnf: sudo dnf install step
  macports: sudo port install step
  nix: nix profile install nixpkgs#step-ca
  pacman: sudo pacman -S step
  ubuntu: sudo apt install step
  winget: winget install --id Smallstep.step -e
  zypper: sudo zypper install step
provenance:
  formula: step
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
