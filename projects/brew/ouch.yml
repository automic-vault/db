id: brew:ouch
display-name: ouch
homepage: https://github.com/ouch-org/ouch
repo: https://github.com/ouch-org/ouch
docs: https://github.com/ouch-org/ouch
package-manager:
  apk: ouch
  brew: ouch
  macports: ouch
  nix: ouch
  pacman: ouch
  scoop: main/ouch
  zypper: ouch
package-manager-url: https://formulae.brew.sh/formula/ouch
version: 0.8.0
license: MIT
category: development
tags:
  - cli
description: Painless compression and decompression for your terminal
source-archive: https://github.com/ouch-org/ouch/archive/refs/tags/0.8.0.tar.gz
build-dependencies:
  - cmake
  - rust
uses-from-macos:
  - bzip2
  - xz
executables:
  - exposure: global executable
    kind: cli
    name: ouch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ouch
  av: sudo av install brew:ouch
  brew: brew install ouch
  macports: sudo port install ouch
  nix: nix profile install nixpkgs#ouch
  pacman: sudo pacman -S ouch
  scoop: scoop install main/ouch
  zypper: sudo zypper install ouch
provenance:
  formula: ouch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
