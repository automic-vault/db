id: brew:rubyfmt
display-name: rubyfmt
homepage: https://github.com/fables-tales/rubyfmt
repo: https://github.com/fables-tales/rubyfmt
docs: https://github.com/fables-tales/rubyfmt
package-manager:
  brew: rubyfmt
  nix: rubyfmt
package-manager-url: https://formulae.brew.sh/formula/rubyfmt
version: 0.14.0
license: MIT
category: development
tags:
  - cli
description: Ruby autoformatter
source-archive: https://github.com/fables-tales/rubyfmt/archive/refs/tags/v0.14.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rubyfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rubyfmt
  brew: brew install rubyfmt
  nix: nix profile install nixpkgs#rubyfmt
provenance:
  formula: rubyfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
