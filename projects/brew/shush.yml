id: brew:shush
display-name: shush
homepage: https://github.com/realestate-com-au/shush
repo: https://github.com/realestate-com-au/shush
docs: https://github.com/realestate-com-au/shush
package-manager:
  brew: shush
  ubuntu: shush
package-manager-url: https://formulae.brew.sh/formula/shush
version: 1.5.5
license: MIT
category: cloud
tags:
  - aws
  - cli
description: Encrypt and decrypt secrets using the AWS Key Management Service
source-archive: https://github.com/realestate-com-au/shush/archive/refs/tags/v1.5.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: shush
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:shush
  brew: brew install shush
  ubuntu: sudo apt install shush
provenance:
  formula: shush
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
