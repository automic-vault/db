id: brew:matcha
display-name: matcha
homepage: https://github.com/piqoni/matcha
repo: https://github.com/piqoni/matcha
docs: https://github.com/piqoni/matcha
package-manager:
  brew: matcha
  nix: matcha
  scoop: main/matcha
  winget: floatpane.matcha
  zypper: matcha
package-manager-url: https://formulae.brew.sh/formula/matcha
version: 0.9.0
license: MIT
category: development
tags:
  - cli
description: Daily digest generator for your RSS feeds
source-archive: https://github.com/piqoni/matcha/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: matcha
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:matcha
  brew: brew install matcha
  nix: nix profile install nixpkgs#matcha
  scoop: scoop install main/matcha
  winget: winget install --id floatpane.matcha -e
  zypper: sudo zypper install matcha
provenance:
  formula: matcha
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
