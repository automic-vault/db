id: brew:duc
display-name: duc
homepage: https://github.com/zevv/duc
repo: https://github.com/zevv/duc
docs: https://github.com/zevv/duc
package-manager:
  apk: duc
  brew: duc
  debian: duc
  dnf: duc
  nix: duc
  ubuntu: duc
  zypper: duc
package-manager-url: https://formulae.brew.sh/formula/duc
version: 1.4.6
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Suite of tools for inspecting disk usage
source-archive: https://github.com/zevv/duc/releases/download/1.4.6/duc-1.4.6.tar.gz
dependencies:
  - cairo
  - gettext
  - glfw
  - glib
  - harfbuzz
  - pango
  - tokyo-cabinet
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: duc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add duc
  av: sudo av install brew:duc
  brew: brew install duc
  debian: sudo apt install duc
  dnf: sudo dnf install duc
  nix: nix profile install nixpkgs#duc
  ubuntu: sudo apt install duc
  zypper: sudo zypper install duc
provenance:
  formula: duc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
