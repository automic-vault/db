id: brew:pylint
display-name: pylint
homepage: https://github.com/pylint-dev/pylint
repo: >
  https://files.pythonhosted.org/packages/e4/b6/74d9a8a68b8067efce8d07707fe6a236324ee1e7808d2eb3646ec8517c7d/pylint-4.0.5.tar.gz
docs: https://github.com/pylint-dev/pylint
package-manager:
  brew: pylint
  debian: pylint
  dnf: pylint
  nix: pylint
  ubuntu: pylint
package-manager-url: https://formulae.brew.sh/formula/pylint
version: 4.0.5
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: It's not just a linter that annoys you!
source-archive: >
  https://files.pythonhosted.org/packages/e4/b6/74d9a8a68b8067efce8d07707fe6a236324ee1e7808d2eb3646ec8517c7d/pylint-4.0.5.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: pylint
  - exposure: global executable
    kind: cli
    name: pylint-config
  - exposure: global executable
    kind: cli
    name: pyreverse
  - exposure: global executable
    kind: cli
    name: symilar
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pylint
  brew: brew install pylint
  debian: sudo apt install pylint
  dnf: sudo dnf install pylint
  nix: nix profile install nixpkgs#pylint
  ubuntu: sudo apt install pylint
provenance:
  formula: pylint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
