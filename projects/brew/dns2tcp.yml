    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dns2tcp
  brew: brew install dns2tcp
  debian: sudo apt install dns2tcp
  macports: sudo port install dns2tcp
  nix: nix profile install nixpkgs#dns2tcp
  ubuntu: sudo apt install dns2tcp
provenance:
  formula: dns2tcp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
