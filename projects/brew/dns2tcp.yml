id: brew:dns2tcp
display-name: dns2tcp
homepage: https://packages.debian.org/sid/dns2tcp
repo: https://deb.debian.org/debian/pool/main/d/dns2tcp/dns2tcp_0.5.2.orig.tar.gz
docs: https://packages.debian.org/sid/dns2tcp
package-manager:
  brew: dns2tcp
  debian: dns2tcp
  macports: dns2tcp
  nix: dns2tcp
  ubuntu: dns2tcp
package-manager-url: https://formulae.brew.sh/formula/dns2tcp
version: 0.5.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: TCP over DNS tunnel
source-archive: https://deb.debian.org/debian/pool/main/d/dns2tcp/dns2tcp_0.5.2.orig.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: dns2tcpc
  - exposure: global executable
    kind: cli
    name: dns2tcpd
bottle:
