id: brew:shairport-sync
display-name: shairport-sync
homepage: https://github.com/mikebrady/shairport-sync
repo: https://github.com/mikebrady/shairport-sync
docs: https://github.com/mikebrady/shairport-sync
package-manager:
  apk: shairport-sync
  brew: shairport-sync
  debian: shairport-sync
  dnf: shairport-sync
  macports: shairport-sync
  nix: shairport-sync
  pacman: shairport-sync
  ubuntu: shairport-sync
  zypper: shairport-sync
package-manager-url: https://formulae.brew.sh/formula/shairport-sync
version: 5.0.4
license: MIT
category: development
tags:
  - cli
description: AirTunes emulator that adds multi-room capability
source-archive: https://github.com/mikebrady/shairport-sync/archive/refs/tags/5.0.4.tar.gz
dependencies:
  - libao
  - libconfig
  - libdaemon
  - libsoxr
  - openssl@3
  - popt
  - pulseaudio
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: shairport-sync
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add shairport-sync
  av: sudo av install brew:shairport-sync
  brew: brew install shairport-sync
  debian: sudo apt install shairport-sync
  dnf: sudo dnf install shairport-sync
  macports: sudo port install shairport-sync
  nix: nix profile install nixpkgs#shairport-sync
  pacman: sudo pacman -S shairport-sync
  ubuntu: sudo apt install shairport-sync
  zypper: sudo zypper install shairport-sync
provenance:
  formula: shairport-sync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
