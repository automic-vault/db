id: brew:octave
display-name: octave
homepage: https://octave.org/index.html
repo: https://ftpmirror.gnu.org/gnu/octave/octave-11.1.0.tar.xz
docs: https://octave.org/index.html
package-manager:
  apk: octave
  brew: octave
  chocolatey: Octave
  debian: octave
  dnf: octave
  macports: octave
  nix: octave
  pacman: octave
  scoop: main/octave
  ubuntu: octave
  winget: GNU.Octave
  zypper: octave
package-manager-url: https://formulae.brew.sh/formula/octave
version: 11.1.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: High-level interpreted language for numerical computing
source-archive: https://ftpmirror.gnu.org/gnu/octave/octave-11.1.0.tar.xz
dependencies:
  - arpack
  - epstool
  - fftw
  - fig2dev
  - fltk
  - fontconfig
  - freetype
  - gcc
  - ghostscript
  - gl2ps
  - glpk
  - graphicsmagick
  - hdf5
  - libsndfile
  - libtool
  - little-cms2
  - openblas
  - pcre2
  - portaudio
  - pstoedit
  - qhull
  - qrupdate
  - qscintilla2
  - qt5compat
  - qtbase
  - qttools
  - rapidjson
  - readline
  - suite-sparse
  - sundials
  - texinfo
build-dependencies:
  - gnu-sed
  - openjdk
  - pkgconf
uses-from-macos:
  - bzip2
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: mkoctfile
  - exposure: global executable
    kind: cli
    name: mkoctfile-11.1.0
  - exposure: global executable
    kind: cli
    name: octave
  - exposure: global executable
    kind: cli
    name: octave-11.1.0
  - exposure: global executable
    kind: cli
    name: octave-cli
  - exposure: global executable
    kind: cli
    name: octave-cli-11.1.0
  - exposure: global executable
    kind: cli
    name: octave-config
  - exposure: global executable
    kind: cli
    name: octave-config-11.1.0
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add octave
  av: sudo av install brew:octave
  brew: brew install octave
  chocolatey: choco install Octave
  debian: sudo apt install octave
  dnf: sudo dnf install octave
  macports: sudo port install octave
  nix: nix profile install nixpkgs#octave
  pacman: sudo pacman -S octave
  scoop: scoop install main/octave
  ubuntu: sudo apt install octave
  winget: winget install --id GNU.Octave -e
  zypper: sudo zypper install octave
provenance:
  formula: octave
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
