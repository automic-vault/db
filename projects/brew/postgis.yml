id: brew:postgis
display-name: postgis
homepage: https://postgis.net/
repo: https://download.osgeo.org/postgis/source/postgis-3.6.3.tar.gz
docs: https://postgis.net/
package-manager:
  apk: postgis
  brew: postgis
  debian: postgis
  dnf: postgis
  macports: postgis
  pacman: postgis
  ubuntu: postgis
package-manager-url: https://formulae.brew.sh/formula/postgis
version: 3.6.3
license: GPL-2.0-or-later
category: database
tags:
  - cli
description: Adds support for geographic objects to PostgreSQL
source-archive: https://download.osgeo.org/postgis/source/postgis-3.6.3.tar.gz
dependencies:
  - gdal
  - geos
  - gettext
  - icu4c@78
  - json-c
  - libpq
  - libxml2
  - pcre2
  - proj
  - protobuf-c
  - sfcgal
build-dependencies:
  - pkgconf
  - postgresql@17
  - postgresql@18
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: create_upgrade.pl
  - exposure: global executable
    kind: cli
    name: pgsql2shp
  - exposure: global executable
    kind: cli
    name: pgtopo_export
  - exposure: global executable
    kind: cli
    name: pgtopo_import
  - exposure: global executable
    kind: cli
    name: postgis
  - exposure: global executable
    kind: cli
    name: postgis_restore
  - exposure: global executable
    kind: cli
    name: profile_intersects.pl
  - exposure: global executable
    kind: cli
    name: raster2pgsql
  - exposure: global executable
    kind: cli
    name: shp2pgsql
  - exposure: global executable
    kind: cli
    name: test_estimation.pl
  - exposure: global executable
    kind: cli
    name: test_geography_estimation.pl
  - exposure: global executable
    kind: cli
    name: test_geography_joinestimation.pl
  - exposure: global executable
    kind: cli
    name: test_joinestimation.pl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add postgis
  av: sudo av install brew:postgis
  brew: brew install postgis
  debian: sudo apt install postgis
  dnf: sudo dnf install postgis
  macports: sudo port install postgis
  pacman: sudo pacman -S postgis
  ubuntu: sudo apt install postgis
provenance:
  formula: postgis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
