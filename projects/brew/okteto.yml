id: brew:okteto
display-name: okteto
homepage: https://okteto.com
repo: https://github.com/okteto/okteto
docs: https://okteto.com
package-manager:
  brew: okteto
  nix: okteto
  scoop: main/okteto
  winget: okteto.okteto
  zypper: okteto
package-manager-url: https://formulae.brew.sh/formula/okteto
version: 3.19.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Build better apps by developing and testing code directly in Kubernetes
source-archive: https://github.com/okteto/okteto/archive/refs/tags/3.19.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: okteto
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:okteto
  brew: brew install okteto
  nix: nix profile install nixpkgs#okteto
  scoop: scoop install main/okteto
  winget: winget install --id okteto.okteto -e
  zypper: sudo zypper install okteto
provenance:
  formula: okteto
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
