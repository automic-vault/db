id: brew:gnu-apl
display-name: gnu-apl
homepage: https://www.gnu.org/software/apl/
repo: https://ftpmirror.gnu.org/gnu/apl/apl-1.9.tar.gz
docs: https://www.gnu.org/software/apl/
package-manager:
  apk: gnu-apl
  brew: gnu-apl
  macports: gnu-apl
  nix: gtk-server
package-manager-url: https://formulae.brew.sh/formula/gnu-apl
version: 1.9
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: GNU implementation of the programming language APL
source-archive: https://ftpmirror.gnu.org/gnu/apl/apl-1.9.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - harfbuzz
  - libpng
  - libx11
  - libxcb
  - pango
  - pcre2
  - readline
  - sqlite
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: AP100
  - exposure: global executable
    kind: cli
    name: AP210
  - exposure: global executable
    kind: cli
    name: APserver
  - exposure: global executable
    kind: cli
    name: Gtk_server
  - exposure: global executable
    kind: cli
    name: apl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gnu-apl
  av: sudo av install brew:gnu-apl
  brew: brew install gnu-apl
  macports: sudo port install gnu-apl
  nix: nix profile install nixpkgs#gtk-server
provenance:
  formula: gnu-apl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
