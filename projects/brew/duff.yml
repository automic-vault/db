id: brew:duff
display-name: duff
homepage: https://github.com/elmindreda/duff
repo: https://downloads.sourceforge.net/project/duff/duff/0.5.2/duff-0.5.2.tar.gz
docs: https://github.com/elmindreda/duff
package-manager:
  brew: duff
  debian: duff
  dnf: duff
  macports: duff
  nix: duff
  ubuntu: duff
package-manager-url: https://formulae.brew.sh/formula/duff
version: 0.5.2
license: Zlib
category: development
tags:
  - cli
description: Quickly find duplicates in a set of files from the command-line
source-archive: https://downloads.sourceforge.net/project/duff/duff/0.5.2/duff-0.5.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: duff
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:duff
  brew: brew install duff
  debian: sudo apt install duff
  dnf: sudo dnf install duff
  macports: sudo port install duff
  nix: nix profile install nixpkgs#duff
  ubuntu: sudo apt install duff
provenance:
  formula: duff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
