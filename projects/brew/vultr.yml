id: brew:vultr
display-name: vultr
homepage: https://github.com/vultr/vultr-cli
repo: https://github.com/vultr/vultr-cli
docs: https://github.com/vultr/vultr-cli
package-manager:
  brew: vultr
  nix: vultr
  scoop: main/vultr
package-manager-url: https://formulae.brew.sh/formula/vultr
version: 3.10.0
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool for Vultr services
source-archive: https://github.com/vultr/vultr-cli/archive/refs/tags/v3.10.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vultr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vultr
  brew: brew install vultr
  nix: nix profile install nixpkgs#vultr
  scoop: scoop install main/vultr
provenance:
  formula: vultr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
