id: brew:hysteria
display-name: hysteria
homepage: https://hysteria.network/
repo: https://github.com/apernet/hysteria
docs: https://hysteria.network/
package-manager:
  brew: hysteria
  macports: hysteria
  nix: hysteria
  scoop: extras/hysteria
  winget: apernet.Hysteria
package-manager-url: https://formulae.brew.sh/formula/hysteria
version: 2.9.2
license: MIT
category: development
tags:
  - cli
description: Feature-packed proxy & relay tool optimized for lossy, unstable connections
source-archive: https://github.com/apernet/hysteria/archive/refs/tags/app/v2.9.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hysteria
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:hysteria
  brew: brew install hysteria
  macports: sudo port install hysteria
  nix: nix profile install nixpkgs#hysteria
  scoop: scoop install extras/hysteria
  winget: winget install --id apernet.Hysteria -e
provenance:
  formula: hysteria
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
