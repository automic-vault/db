id: brew:git-town
display-name: git-town
homepage: https://www.git-town.com/
repo: https://github.com/git-town/git-town
docs: https://www.git-town.com/
package-manager:
  brew: git-town
  macports: git-town
  nix: git-town
  pacman: git-town
  scoop: main/git-town
  zypper: git-town
package-manager-url: https://formulae.brew.sh/formula/git-town
version: 23.0.1
license: MIT
category: development
tags:
  - cli
  - git
description: High-level command-line interface for Git
source-archive: https://github.com/git-town/git-town/archive/refs/tags/v23.0.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-town
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-town
  brew: brew install git-town
  macports: sudo port install git-town
  nix: nix profile install nixpkgs#git-town
  pacman: sudo pacman -S git-town
  scoop: scoop install main/git-town
  zypper: sudo zypper install git-town
provenance:
  formula: git-town
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
