id: brew:lnk
display-name: lnk
homepage: https://github.com/yarlson/lnk
repo: https://github.com/yarlson/lnk
docs: https://github.com/yarlson/lnk
package-manager:
  brew: lnk
package-manager-url: https://formulae.brew.sh/formula/lnk
version: 0.9.1
license: MIT
category: development
tags:
  - cli
  - git
description: Git-native dotfiles management that doesn't suck
source-archive: https://github.com/yarlson/lnk/archive/refs/tags/v0.9.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lnk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lnk
  brew: brew install lnk
provenance:
  formula: lnk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
