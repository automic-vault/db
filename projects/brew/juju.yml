id: brew:juju
display-name: juju
homepage: https://canonical.com/juju
repo: https://github.com/juju/juju
docs: https://canonical.com/juju
package-manager:
  brew: juju
  chocolatey: juju
  nix: juju
  winget: Canonical.Juju
package-manager-url: https://formulae.brew.sh/formula/juju
version: 4.0.10
license: AGPL-3.0-only
category: development
tags:
  - cli
description: DevOps management tool
source-archive: https://github.com/juju/juju/archive/refs/tags/v4.0.10.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: juju
  - exposure: global executable
    kind: cli
    name: juju-metadata
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:juju
  brew: brew install juju
  chocolatey: choco install juju
  nix: nix profile install nixpkgs#juju
  winget: winget install --id Canonical.Juju -e
provenance:
  formula: juju
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
