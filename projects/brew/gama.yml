id: brew:gama
display-name: gama
homepage: https://github.com/termkit/gama
repo: https://github.com/termkit/gama
docs: https://github.com/termkit/gama
package-manager:
  brew: gama
  nix: gama
  winget: GamaPlatform.Gama
  zypper: gama
package-manager-url: https://formulae.brew.sh/formula/gama
version: 1.2.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: Manage your GitHub Actions from Terminal with great UI
source-archive: https://github.com/termkit/gama/archive/refs/tags/v1.2.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gama
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gama
  brew: brew install gama
  nix: nix profile install nixpkgs#gama
  winget: winget install --id GamaPlatform.Gama -e
  zypper: sudo zypper install gama
provenance:
  formula: gama
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
