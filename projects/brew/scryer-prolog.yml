id: brew:scryer-prolog
display-name: scryer-prolog
homepage: https://www.scryer.pl
repo: https://github.com/mthom/scryer-prolog
docs: https://www.scryer.pl
package-manager:
  apk: scryer-prolog
  brew: scryer-prolog
  nix: scryer-prolog
  winget: mthom.ScryerProlog
package-manager-url: https://formulae.brew.sh/formula/scryer-prolog
version: 0.10.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Modern ISO Prolog implementation written mostly in Rust
source-archive: https://github.com/mthom/scryer-prolog/archive/refs/tags/v0.10.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: scryer-prolog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add scryer-prolog
  av: sudo av install brew:scryer-prolog
  brew: brew install scryer-prolog
  nix: nix profile install nixpkgs#scryer-prolog
  winget: winget install --id mthom.ScryerProlog -e
provenance:
  formula: scryer-prolog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
