id: brew:cargo-instruments
display-name: cargo-instruments
homepage: https://github.com/cmyr/cargo-instruments
repo: https://github.com/cmyr/cargo-instruments
docs: https://github.com/cmyr/cargo-instruments
package-manager:
  brew: cargo-instruments
package-manager-url: https://formulae.brew.sh/formula/cargo-instruments
version: 0.4.16
license: MIT
category: development
tags:
  - cli
description: Easily generate Instruments traces for your rust crate
source-archive: https://github.com/cmyr/cargo-instruments/archive/refs/tags/v0.4.16.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-instruments
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-instruments
  brew: brew install cargo-instruments
provenance:
  formula: cargo-instruments
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
