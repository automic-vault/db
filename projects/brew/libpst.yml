id: brew:libpst
display-name: libpst
homepage: https://www.five-ten-sg.com/libpst/
repo: https://www.five-ten-sg.com/libpst/packages/libpst-0.6.76.tar.gz
docs: https://www.five-ten-sg.com/libpst/
package-manager:
  brew: libpst
  dnf: libpst
  macports: libpst
  nix: libpst
  pacman: libpst
  zypper: libpst
package-manager-url: https://formulae.brew.sh/formula/libpst
version: 0.6.76
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Utilities for the PST file format
source-archive: https://www.five-ten-sg.com/libpst/packages/libpst-0.6.76.tar.gz
dependencies:
  - gettext
  - glib
  - libgsf
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: lspst
  - exposure: global executable
    kind: cli
    name: nick2ldif
  - exposure: global executable
    kind: cli
    name: pst2ldif
  - exposure: global executable
    kind: cli
    name: readpst
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libpst
  brew: brew install libpst
  dnf: sudo dnf install libpst
  macports: sudo port install libpst
  nix: nix profile install nixpkgs#libpst
  pacman: sudo pacman -S libpst
  zypper: sudo zypper install libpst
provenance:
  formula: libpst
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
