id: brew:ahcpd
display-name: ahcpd
homepage: https://www.irif.fr/~jch/software/ahcp/
repo: https://www.irif.fr/~jch/software/files/ahcpd-0.53.tar.gz
docs: https://www.irif.fr/~jch/software/ahcp/
package-manager:
  brew: ahcpd
  debian: ahcpd
  dnf: ahcpd
  nix: ahcpd
  ubuntu: ahcpd
package-manager-url: https://formulae.brew.sh/formula/ahcpd
version: 0.53
license: MIT
category: network
tags:
  - cli
description: Autoconfiguration protocol for IPv6 and IPv6/IPv4 networks
source-archive: https://www.irif.fr/~jch/software/files/ahcpd-0.53.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ahcpd
bottle:
