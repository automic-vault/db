  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ahcpd
  brew: brew install ahcpd
  debian: sudo apt install ahcpd
  dnf: sudo dnf install ahcpd
  nix: nix profile install nixpkgs#ahcpd
  ubuntu: sudo apt install ahcpd
provenance:
  formula: ahcpd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
