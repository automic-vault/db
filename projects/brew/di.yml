id: brew:di
display-name: di
homepage: https://diskinfo-di.sourceforge.io/
repo: https://downloads.sourceforge.net/project/diskinfo-di/di-6.2.2.2.tar.gz
docs: https://diskinfo-di.sourceforge.io/
package-manager:
  brew: di
  debian: di
  macports: di
  nix: di
  ubuntu: di
  zypper: di
package-manager-url: https://formulae.brew.sh/formula/di
version: 6.2.2.2
license: Zlib
category: development
tags:
  - cli
description: Advanced df-like disk information utility
source-archive: https://downloads.sourceforge.net/project/diskinfo-di/di-6.2.2.2.tar.gz
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: di
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:di
  brew: brew install di
  debian: sudo apt install di
  macports: sudo port install di
  nix: nix profile install nixpkgs#di
  ubuntu: sudo apt install di
  zypper: sudo zypper install di
provenance:
  formula: di
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
