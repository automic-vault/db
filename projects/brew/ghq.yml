id: brew:ghq
display-name: ghq
homepage: https://github.com/x-motemen/ghq
repo: https://github.com/x-motemen/ghq
docs: https://github.com/x-motemen/ghq
package-manager:
  apk: ghq
  brew: ghq
  macports: ghq
  nix: ghq
  pacman: ghq
  scoop: main/ghq
  winget: x-motemen.ghq
package-manager-url: https://formulae.brew.sh/formula/ghq
version: 1.10.1
license: MIT
category: development
tags:
  - cli
description: Remote repository management made easy
source-archive: https://github.com/x-motemen/ghq.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ghq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ghq
  av: sudo av install brew:ghq
  brew: brew install ghq
  macports: sudo port install ghq
  nix: nix profile install nixpkgs#ghq
  pacman: sudo pacman -S ghq
  scoop: scoop install main/ghq
  winget: winget install --id x-motemen.ghq -e
provenance:
  formula: ghq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
