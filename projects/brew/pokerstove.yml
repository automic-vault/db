id: brew:pokerstove
display-name: pokerstove
homepage: https://github.com/andrewprock/pokerstove
repo: https://github.com/andrewprock/pokerstove
docs: https://github.com/andrewprock/pokerstove
package-manager:
  brew: pokerstove
package-manager-url: https://formulae.brew.sh/formula/pokerstove
version: 1.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Poker evaluation and enumeration software
source-archive: https://github.com/andrewprock/pokerstove/archive/refs/tags/v1.1.tar.gz
dependencies:
  - boost
build-dependencies:
  - cmake
  - googletest
executables:
  - exposure: global executable
    kind: cli
    name: penum_tests
  - exposure: global executable
    kind: cli
    name: peval_tests
  - exposure: global executable
    kind: cli
    name: ps-colex
  - exposure: global executable
    kind: cli
    name: ps-eval
  - exposure: global executable
    kind: cli
    name: ps-lut
  - exposure: global executable
    kind: cli
    name: util_tests
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pokerstove
  brew: brew install pokerstove
provenance:
  formula: pokerstove
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
