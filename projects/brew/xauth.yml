id: brew:xauth
display-name: xauth
homepage: https://www.x.org/
repo: https://www.x.org/pub/individual/app/xauth-1.1.5.tar.xz
docs: https://www.x.org/
package-manager:
  apk: xauth
  brew: xauth
  debian: xauth
  macports: xauth
  nix: xauth
  ubuntu: xauth
  zypper: xauth
package-manager-url: https://formulae.brew.sh/formula/xauth
version: 1.1.5
license: MIT-open-group
category: network
tags:
  - cli
description: 'X.Org Applications: xauth'
source-archive: https://www.x.org/pub/individual/app/xauth-1.1.5.tar.xz
dependencies:
  - libx11
  - libxau
  - libxext
  - libxmu
build-dependencies:
  - pkgconf
  - util-macros
executables:
  - exposure: global executable
    kind: cli
    name: xauth
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xauth
  av: sudo av install brew:xauth
  brew: brew install xauth
  debian: sudo apt install xauth
  macports: sudo port install xauth
  nix: nix profile install nixpkgs#xauth
  ubuntu: sudo apt install xauth
  zypper: sudo zypper install xauth
provenance:
  formula: xauth
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
