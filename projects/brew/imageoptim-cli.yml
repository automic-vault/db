id: brew:imageoptim-cli
display-name: imageoptim-cli
homepage: https://jamiemason.github.io/ImageOptim-CLI/
repo: https://github.com/JamieMason/ImageOptim-CLI
docs: https://jamiemason.github.io/ImageOptim-CLI/
package-manager:
  brew: imageoptim-cli
package-manager-url: https://formulae.brew.sh/formula/imageoptim-cli
version: 3.1.9
license: MIT
category: development
tags:
  - cli
description: CLI for ImageOptim, ImageAlpha and JPEGmini
source-archive: https://github.com/JamieMason/ImageOptim-CLI/archive/refs/tags/3.1.9.tar.gz
dependencies:
  - node
build-dependencies:
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: imageoptim
bottle:
