  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:imageoptim-cli
  brew: brew install imageoptim-cli
provenance:
  formula: imageoptim-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
