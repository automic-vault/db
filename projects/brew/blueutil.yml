id: brew:blueutil
display-name: blueutil
homepage: https://github.com/toy/blueutil
repo: https://github.com/toy/blueutil
docs: https://github.com/toy/blueutil
package-manager:
  brew: blueutil
  macports: blueutil
  nix: blueutil
package-manager-url: https://formulae.brew.sh/formula/blueutil
version: 2.13.0
license: MIT
category: development
tags:
  - cli
description: Get/set bluetooth power and discoverable state
source-archive: https://github.com/toy/blueutil/archive/refs/tags/v2.13.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: blueutil
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:blueutil
  brew: brew install blueutil
  macports: sudo port install blueutil
  nix: nix profile install nixpkgs#blueutil
provenance:
  formula: blueutil
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
