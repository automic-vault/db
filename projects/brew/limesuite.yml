id: brew:limesuite
display-name: limesuite
homepage: https://myriadrf.org/projects/software/lime-suite/
repo: https://github.com/myriadrf/LimeSuite
docs: https://myriadrf.org/projects/software/lime-suite/
package-manager:
  brew: limesuite
  debian: limesuite
  macports: limesuite
  nix: limesuite
  pacman: limesuite
  ubuntu: limesuite
  zypper: limesuite
package-manager-url: https://formulae.brew.sh/formula/limesuite
version: 23.11.0
license: Apache-2.0
category: development
tags:
  - cli
description: Device drivers utilities, and interface layers for LimeSDR
source-archive: https://github.com/myriadrf/LimeSuite/archive/refs/tags/v23.11.0.tar.gz
dependencies:
  - fltk
  - gnuplot
  - libusb
  - soapysdr
build-dependencies:
  - cmake
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: LimeQuickTest
  - exposure: global executable
    kind: cli
    name: LimeUtil
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:limesuite
  brew: brew install limesuite
  debian: sudo apt install limesuite
  macports: sudo port install limesuite
  nix: nix profile install nixpkgs#limesuite
  pacman: sudo pacman -S limesuite
  ubuntu: sudo apt install limesuite
  zypper: sudo zypper install limesuite
provenance:
  formula: limesuite
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
