id: brew:quint
display-name: quint
homepage: https://github.com/informalsystems/quint
repo: https://registry.npmjs.org/@informalsystems/quint/-/quint-0.32.0.tgz
docs: https://github.com/informalsystems/quint
package-manager:
  brew: quint
  nix: quint
package-manager-url: https://formulae.brew.sh/formula/quint
version: 0.32.0
license: Apache-2.0
category: development
tags:
  - cli
description: Core tool for the Quint specification language
source-archive: https://registry.npmjs.org/@informalsystems/quint/-/quint-0.32.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: quint
bottle:
