id: brew:tf-profile
display-name: tf-profile
homepage: https://github.com/datarootsio/tf-profile
repo: https://github.com/datarootsio/tf-profile
docs: https://github.com/datarootsio/tf-profile
package-manager:
  brew: tf-profile
package-manager-url: https://formulae.brew.sh/formula/tf-profile
version: 0.5.0
license: MIT
category: cloud
tags:
  - cli
description: CLI tool to profile Terraform runs
source-archive: https://github.com/datarootsio/tf-profile/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tf-profile
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tf-profile
  brew: brew install tf-profile
provenance:
  formula: tf-profile
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
