id: brew:abricate
display-name: abricate
homepage: https://github.com/tseemann/abricate
repo: https://github.com/tseemann/abricate
docs: https://github.com/tseemann/abricate
package-manager:
  brew: abricate
package-manager-url: https://formulae.brew.sh/formula/abricate
version: 1.4.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: Find antimicrobial resistance and virulence genes in contigs
source-archive: https://github.com/tseemann/abricate/archive/refs/tags/v1.4.0.tar.gz
dependencies:
  - any2fasta
  - bioperl
  - blast
uses-from-macos:
  - perl
  - unzip
executables:
  - exposure: global executable
    kind: cli
    name: abricate
  - exposure: global executable
    kind: cli
    name: abricate-get_db
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:abricate
  brew: brew install abricate
provenance:
  formula: abricate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
