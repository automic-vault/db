id: brew:innoextract
display-name: innoextract
homepage: https://constexpr.org/innoextract/
repo: https://constexpr.org/innoextract/files/innoextract-1.9.tar.gz
docs: https://constexpr.org/innoextract/
package-manager:
  apk: innoextract
  brew: innoextract
  chocolatey: innoextract
  debian: innoextract
  dnf: innoextract
  macports: innoextract
  nix: innoextract
  pacman: innoextract
  scoop: main/innoextract
  ubuntu: innoextract
  winget: dscharrer.innoextract
  zypper: innoextract
package-manager-url: https://formulae.brew.sh/formula/innoextract
version: 1.9
license: Zlib
category: network
tags:
  - cli
description: Tool to unpack installers created by Inno Setup
source-archive: https://constexpr.org/innoextract/files/innoextract-1.9.tar.gz
dependencies:
  - boost
  - xz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: innoextract
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add innoextract
  av: sudo av install brew:innoextract
  brew: brew install innoextract
  chocolatey: choco install innoextract
  debian: sudo apt install innoextract
  dnf: sudo dnf install innoextract
  macports: sudo port install innoextract
  nix: nix profile install nixpkgs#innoextract
  pacman: sudo pacman -S innoextract
  scoop: scoop install main/innoextract
  ubuntu: sudo apt install innoextract
  winget: winget install --id dscharrer.innoextract -e
  zypper: sudo zypper install innoextract
provenance:
  formula: innoextract
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
