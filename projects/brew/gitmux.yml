id: brew:gitmux
display-name: gitmux
homepage: https://github.com/arl/gitmux
repo: https://github.com/arl/gitmux
docs: https://github.com/arl/gitmux
package-manager:
  brew: gitmux
  nix: gitmux
package-manager-url: https://formulae.brew.sh/formula/gitmux
version: 0.11.5
license: MIT
category: development
tags:
  - cli
  - git
description: Git status in tmux status bar
source-archive: https://github.com/arl/gitmux/archive/refs/tags/v0.11.5.tar.gz
dependencies:
  - tmux
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gitmux
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gitmux
  brew: brew install gitmux
  nix: nix profile install nixpkgs#gitmux
provenance:
  formula: gitmux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
