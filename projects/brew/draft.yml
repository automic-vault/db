id: brew:draft
display-name: draft
homepage: https://github.com/Azure/draft
repo: https://github.com/Azure/draft
docs: https://github.com/Azure/draft
package-manager:
  brew: draft
  scoop: main/draft
package-manager-url: https://formulae.brew.sh/formula/draft
version: 0.17.14
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
description: Day 0 tool for getting your app on Kubernetes fast
source-archive: https://github.com/Azure/draft/archive/refs/tags/v0.17.14.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: draft
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:draft
  brew: brew install draft
  scoop: scoop install main/draft
provenance:
  formula: draft
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
