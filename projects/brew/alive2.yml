id: brew:alive2
display-name: alive2
homepage: https://github.com/AliveToolkit/alive2
repo: https://github.com/AliveToolkit/alive2
docs: https://github.com/AliveToolkit/alive2
package-manager:
  brew: alive2
  nix: alive2
package-manager-url: https://formulae.brew.sh/formula/alive2
version: 21.0
license: MIT
category: development
tags:
  - cli
description: Automatic verification of LLVM optimizations
source-archive: https://github.com/AliveToolkit/alive2.git
dependencies:
  - hiredis
  - llvm
  - z3
  - zstd
build-dependencies:
  - cmake
  - re2c
executables:
  - exposure: global executable
    kind: cli
    name: alive
  - exposure: global executable
    kind: cli
    name: alive-exec
  - exposure: global executable
    kind: cli
    name: alive-jobserver
  - exposure: global executable
    kind: cli
    name: alive-tv
  - exposure: global executable
    kind: cli
    name: quick-fuzz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:alive2
  brew: brew install alive2
  nix: nix profile install nixpkgs#alive2
provenance:
  formula: alive2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
