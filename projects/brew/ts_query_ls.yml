id: brew:ts_query_ls
display-name: ts_query_ls
homepage: https://github.com/ribru17/ts_query_ls
repo: https://github.com/ribru17/ts_query_ls
docs: https://github.com/ribru17/ts_query_ls
package-manager:
  brew: ts_query_ls
  nix: ts_query_ls
package-manager-url: https://formulae.brew.sh/formula/ts_query_ls
version: 3.16.0
license: MIT
category: development
tags:
  - cli
description: LSP implementation for Tree-sitter's query files
source-archive: https://github.com/ribru17/ts_query_ls/archive/refs/tags/v3.16.0.tar.gz
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ts_query_ls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ts_query_ls
  brew: brew install ts_query_ls
  nix: nix profile install nixpkgs#ts_query_ls
provenance:
  formula: ts_query_ls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
