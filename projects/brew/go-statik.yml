id: brew:go-statik
display-name: go-statik
homepage: https://github.com/rakyll/statik
repo: https://github.com/rakyll/statik
docs: https://github.com/rakyll/statik
package-manager:
  brew: go-statik
  macports: statik
  nix: statik
package-manager-url: https://formulae.brew.sh/formula/go-statik
version: 0.1.8
license: Apache-2.0
category: development
tags:
  - cli
description: Embed files into a Go executable
source-archive: https://github.com/rakyll/statik/archive/refs/tags/v0.1.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: statik
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:go-statik
  brew: brew install go-statik
  macports: sudo port install statik
  nix: nix profile install nixpkgs#statik
provenance:
  formula: go-statik
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
