id: brew:paperjam
display-name: paperjam
homepage: https://mj.ucw.cz/sw/paperjam/
repo: https://mj.ucw.cz/download/linux/paperjam-1.2.2.tar.gz
docs: https://mj.ucw.cz/sw/paperjam/
package-manager:
  brew: paperjam
  nix: paperjam
  zypper: paperjam
package-manager-url: https://formulae.brew.sh/formula/paperjam
version: 1.2.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Program for transforming PDF files
source-archive: https://mj.ucw.cz/download/linux/paperjam-1.2.2.tar.gz
dependencies:
  - libpaper
  - qpdf
build-dependencies:
  - asciidoc
  - docbook-xsl
uses-from-macos:
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: paperjam
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:paperjam
  brew: brew install paperjam
  nix: nix profile install nixpkgs#paperjam
  zypper: sudo zypper install paperjam
provenance:
  formula: paperjam
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
