id: brew:codex-acp
display-name: codex-acp
homepage: https://github.com/zed-industries/codex-acp
repo: https://github.com/zed-industries/codex-acp
docs: https://github.com/zed-industries/codex-acp
package-manager:
  brew: codex-acp
  nix: codex-acp
package-manager-url: https://formulae.brew.sh/formula/codex-acp
version: 0.15.0
license: Apache-2.0
category: development
tags:
  - cli
description: Use Codex from ACP-compatible clients such as Zed!
source-archive: https://github.com/zed-industries/codex-acp/archive/refs/tags/v0.15.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: codex-acp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:codex-acp
  brew: brew install codex-acp
  nix: nix profile install nixpkgs#codex-acp
provenance:
  formula: codex-acp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
