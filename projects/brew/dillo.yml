id: brew:dillo
display-name: dillo
homepage: https://dillo-browser.github.io/
repo: https://github.com/dillo-browser/dillo
docs: https://dillo-browser.github.io/
package-manager:
  apk: dillo
  brew: dillo
  debian: dillo
  dnf: dillo
  nix: dillo
  pacman: dillo
  ubuntu: dillo
package-manager-url: https://formulae.brew.sh/formula/dillo
version: 3.2.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Fast and small graphical web browser
source-archive: https://github.com/dillo-browser/dillo/releases/download/v3.2.0/dillo-3.2.0.tar.bz2
dependencies:
  - fltk@1.3
  - jpeg-turbo
  - libpng
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: dillo
  - exposure: global executable
    kind: cli
    name: dillo-install-hyphenation
  - exposure: global executable
    kind: cli
    name: dpid
  - exposure: global executable
    kind: cli
    name: dpidc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dillo
  av: sudo av install brew:dillo
  brew: brew install dillo
  debian: sudo apt install dillo
  dnf: sudo dnf install dillo
  nix: nix profile install nixpkgs#dillo
  pacman: sudo pacman -S dillo
  ubuntu: sudo apt install dillo
provenance:
  formula: dillo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
