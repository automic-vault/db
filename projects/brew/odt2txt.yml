id: brew:odt2txt
display-name: odt2txt
homepage: https://github.com/dstosberg/odt2txt/
repo: https://github.com/dstosberg/odt2txt
docs: https://github.com/dstosberg/odt2txt/
package-manager:
  apk: odt2txt
  brew: odt2txt
  debian: odt2txt
  dnf: odt2txt
  macports: odt2txt
  nix: odt2txt
  pacman: odt2txt
  ubuntu: odt2txt
  zypper: odt2txt
package-manager-url: https://formulae.brew.sh/formula/odt2txt
version: 0.5
license: GPL-2.0-only
category: development
tags:
  - cli
description: Convert OpenDocument files to plain text
source-archive: https://github.com/dstosberg/odt2txt/archive/refs/tags/v0.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: odt2txt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add odt2txt
  av: sudo av install brew:odt2txt
  brew: brew install odt2txt
  debian: sudo apt install odt2txt
  dnf: sudo dnf install odt2txt
  macports: sudo port install odt2txt
  nix: nix profile install nixpkgs#odt2txt
  pacman: sudo pacman -S odt2txt
  ubuntu: sudo apt install odt2txt
  zypper: sudo zypper install odt2txt
provenance:
  formula: odt2txt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
