id: brew:macmon
display-name: macmon
homepage: https://github.com/vladkens/macmon
repo: https://github.com/vladkens/macmon
docs: https://github.com/vladkens/macmon
package-manager:
  brew: macmon
  macports: macmon
  nix: macmon
package-manager-url: https://formulae.brew.sh/formula/macmon
version: 0.7.2
license: MIT
category: development
tags:
  - cli
description: Sudoless performance monitoring for Apple Silicon processors
source-archive: https://github.com/vladkens/macmon/archive/refs/tags/v0.7.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: macmon
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:macmon
  brew: brew install macmon
  macports: sudo port install macmon
  nix: nix profile install nixpkgs#macmon
provenance:
  formula: macmon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
