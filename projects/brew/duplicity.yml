id: brew:duplicity
display-name: duplicity
homepage: https://gitlab.com/duplicity/duplicity
repo: >
  https://files.pythonhosted.org/packages/16/96/fc07257297b433c19162764f8c3b8649cf788201890c2563476570e1167e/duplicity-3.0.7.tar.gz
docs: https://gitlab.com/duplicity/duplicity
package-manager:
  apk: duplicity
  brew: duplicity
  debian: duplicity
  dnf: duplicity
  macports: duplicity
  nix: duplicity
  pacman: duplicity
  ubuntu: duplicity
  zypper: duplicity
package-manager-url: https://formulae.brew.sh/formula/duplicity
version: 3.0.7
license: GPL-2.0-or-later
category: security
tags:
  - cli
description: Bandwidth-efficient encrypted backup
source-archive: >
  https://files.pythonhosted.org/packages/16/96/fc07257297b433c19162764f8c3b8649cf788201890c2563476570e1167e/duplicity-3.0.7.tar.gz
dependencies:
  - certifi
  - cryptography
  - gnupg
  - librsync
  - libsodium
  - libyaml
  - python@3.14
build-dependencies:
  - gettext
  - pkgconf
  - rust
uses-from-macos:
  - libffi
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: duplicity
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add duplicity
  av: sudo av install brew:duplicity
  brew: brew install duplicity
  debian: sudo apt install duplicity
  dnf: sudo dnf install duplicity
  macports: sudo port install duplicity
  nix: nix profile install nixpkgs#duplicity
  pacman: sudo pacman -S duplicity
  ubuntu: sudo apt install duplicity
  zypper: sudo zypper install duplicity
provenance:
  formula: duplicity
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
