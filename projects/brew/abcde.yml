id: brew:abcde
display-name: abcde
homepage: https://abcde.einval.com
repo: https://abcde.einval.com/download/abcde-2.9.3.tar.gz
docs: https://abcde.einval.com
package-manager:
  apk: abcde
  brew: abcde
  debian: abcde
  dnf: abcde
  macports: abcde
  nix: abcde
  ubuntu: abcde
  zypper: abcde
package-manager-url: https://formulae.brew.sh/formula/abcde
version: 2.9.3
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Better CD Encoder
source-archive: https://abcde.einval.com/download/abcde-2.9.3.tar.gz
dependencies:
  - cdrtools
  - eye-d3
  - flac
  - glyr
  - lame
  - libdiscid
  - mkcue
  - perl
  - vorbis-tools
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: abcde
  - exposure: global executable
    kind: cli
    name: abcde-musicbrainz-tool
  - exposure: global executable
    kind: cli
    name: cddb-tool
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add abcde
  av: sudo av install brew:abcde
  brew: brew install abcde
  debian: sudo apt install abcde
  dnf: sudo dnf install abcde
  macports: sudo port install abcde
  nix: nix profile install nixpkgs#abcde
  ubuntu: sudo apt install abcde
  zypper: sudo zypper install abcde
provenance:
  formula: abcde
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
