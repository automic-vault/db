id: brew:cfonts
display-name: cfonts
homepage: https://github.com/dominikwilkowski/cfonts
repo: https://github.com/dominikwilkowski/cfonts
docs: https://github.com/dominikwilkowski/cfonts
package-manager:
  brew: cfonts
  dnf: cfonts
  macports: cfonts
  nix: cfonts
package-manager-url: https://formulae.brew.sh/formula/cfonts
version: 1.3.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Sexy ANSI fonts for the console
source-archive: https://github.com/dominikwilkowski/cfonts/archive/refs/tags/v1.3.0rust.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cfonts
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cfonts
  brew: brew install cfonts
  dnf: sudo dnf install cfonts
  macports: sudo port install cfonts
  nix: nix profile install nixpkgs#cfonts
provenance:
  formula: cfonts
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
