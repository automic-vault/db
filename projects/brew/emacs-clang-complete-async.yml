id: brew:emacs-clang-complete-async
display-name: emacs-clang-complete-async
homepage: https://github.com/Golevka/emacs-clang-complete-async
repo: https://github.com/Golevka/emacs-clang-complete-async
docs: https://github.com/Golevka/emacs-clang-complete-async
package-manager:
  brew: emacs-clang-complete-async
package-manager-url: https://formulae.brew.sh/formula/emacs-clang-complete-async
version: 0.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Emacs plugin using libclang to complete C/C++ code
source-archive: https://github.com/Golevka/emacs-clang-complete-async/archive/refs/tags/v0.5.tar.gz
dependencies:
  - llvm
executables:
  - exposure: global executable
    kind: cli
    name: clang-complete
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:emacs-clang-complete-async
  brew: brew install emacs-clang-complete-async
provenance:
  formula: emacs-clang-complete-async
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
