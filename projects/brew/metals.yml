id: brew:metals
display-name: metals
homepage: https://github.com/scalameta/metals
repo: https://github.com/scalameta/metals
docs: https://github.com/scalameta/metals
package-manager:
  brew: metals
  nix: metals
package-manager-url: https://formulae.brew.sh/formula/metals
version: 1.6.7
license: Apache-2.0
category: development
tags:
  - cli
description: Scala language server
source-archive: https://github.com/scalameta/metals/archive/refs/tags/v1.6.7.tar.gz
dependencies:
  - openjdk@25
build-dependencies:
  - sbt
executables:
  - exposure: global executable
    kind: cli
    name: metals
  - exposure: global executable
    kind: cli
    name: metals-mcp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:metals
  brew: brew install metals
  nix: nix profile install nixpkgs#metals
provenance:
  formula: metals
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
