id: brew:cloog
display-name: cloog
homepage: https://github.com/periscop/cloog
repo: https://github.com/periscop/cloog
docs: https://github.com/periscop/cloog
package-manager:
  brew: cloog
  dnf: cloog
  macports: cloog
package-manager-url: https://formulae.brew.sh/formula/cloog
version: 0.21.1
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Generate code for scanning Z-polyhedra
source-archive: https://github.com/periscop/cloog/releases/download/cloog-0.21.1/cloog-0.21.1.tar.gz
dependencies:
  - gmp
  - isl
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cloog
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloog
  brew: brew install cloog
  dnf: sudo dnf install cloog
  macports: sudo port install cloog
provenance:
  formula: cloog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
