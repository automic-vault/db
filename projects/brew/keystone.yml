id: brew:keystone
display-name: keystone
homepage: https://github.com/keystone-engine/keystone
repo: https://github.com/keystone-engine/keystone
docs: https://github.com/keystone-engine/keystone
package-manager:
  apk: keystone
  brew: keystone
  debian: keystone
  macports: keystone
  nix: keystone
  pacman: keystone
  ubuntu: keystone
package-manager-url: https://formulae.brew.sh/formula/keystone
version: 0.9.2
license: GPL-2.0-only
category: development
tags:
  - cli
description: 'Assembler framework: Core + bindings'
source-archive: https://github.com/keystone-engine/keystone/archive/refs/tags/0.9.2.tar.gz
build-dependencies:
  - cmake
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: kstool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add keystone
  av: sudo av install brew:keystone
  brew: brew install keystone
  debian: sudo apt install keystone
  macports: sudo port install keystone
  nix: nix profile install nixpkgs#keystone
  pacman: sudo pacman -S keystone
  ubuntu: sudo apt install keystone
provenance:
  formula: keystone
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
