id: brew:multi-gitter
display-name: multi-gitter
homepage: https://github.com/lindell/multi-gitter
repo: https://github.com/lindell/multi-gitter
docs: https://github.com/lindell/multi-gitter
package-manager:
  brew: multi-gitter
  macports: multi-gitter
  scoop: main/multi-gitter
package-manager-url: https://formulae.brew.sh/formula/multi-gitter
version: 0.63.1
license: Apache-2.0
category: development
tags:
  - cli
description: Update multiple repositories in with one command
source-archive: https://github.com/lindell/multi-gitter/archive/refs/tags/v0.63.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: multi-gitter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:multi-gitter
  brew: brew install multi-gitter
  macports: sudo port install multi-gitter
  scoop: scoop install main/multi-gitter
provenance:
  formula: multi-gitter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
