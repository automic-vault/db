id: brew:riff
display-name: riff
homepage: https://github.com/walles/riff
repo: https://github.com/walles/riff
docs: https://github.com/walles/riff
package-manager:
  apk: riff
  brew: riff
  macports: riff
  nix: riff
  pacman: riff
  scoop: extras/riff
  zypper: riff
package-manager-url: https://formulae.brew.sh/formula/riff
version: 3.6.1
license: MIT
category: development
tags:
  - cli
description: Diff filter highlighting which line parts have changed
source-archive: https://github.com/walles/riff/archive/refs/tags/3.6.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: riff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add riff
  av: sudo av install brew:riff
  brew: brew install riff
  macports: sudo port install riff
  nix: nix profile install nixpkgs#riff
  pacman: sudo pacman -S riff
  scoop: scoop install extras/riff
  zypper: sudo zypper install riff
provenance:
  formula: riff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
