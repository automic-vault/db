id: brew:faac
display-name: faac
homepage: https://sourceforge.net/projects/faac/
repo: https://github.com/knik0/faac
docs: https://sourceforge.net/projects/faac/
package-manager:
  apk: faac
  brew: faac
  debian: faac
  macports: faac
  nix: faac
  pacman: faac
  ubuntu: faac
package-manager-url: https://formulae.brew.sh/formula/faac
version: 1.50
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: ISO AAC audio encoder
source-archive: https://github.com/knik0/faac/archive/refs/tags/faac-1.50.tar.gz
build-dependencies:
  - meson
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: faac
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add faac
  av: sudo av install brew:faac
  brew: brew install faac
  debian: sudo apt install faac
  macports: sudo port install faac
  nix: nix profile install nixpkgs#faac
  pacman: sudo pacman -S faac
  ubuntu: sudo apt install faac
provenance:
  formula: faac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
