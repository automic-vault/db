id: brew:alda
display-name: alda
homepage: https://alda.io
repo: https://github.com/alda-lang/alda
docs: https://alda.io
package-manager:
  apk: alda
  brew: alda
  nix: alda
package-manager-url: https://formulae.brew.sh/formula/alda
version: 2.4.3
license: EPL-2.0
category: development
tags:
  - cli
description: Music programming language for musicians
source-archive: https://github.com/alda-lang/alda/archive/refs/tags/release-2.4.3.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - go
  - gradle@8
executables:
  - exposure: global executable
    kind: cli
    name: alda
  - exposure: global executable
    kind: cli
    name: alda-player
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add alda
  av: sudo av install brew:alda
  brew: brew install alda
  nix: nix profile install nixpkgs#alda
provenance:
  formula: alda
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
