id: brew:cljfmt
display-name: cljfmt
homepage: https://github.com/weavejester/cljfmt
repo: https://github.com/weavejester/cljfmt
docs: https://github.com/weavejester/cljfmt
package-manager:
  brew: cljfmt
  nix: cljfmt
package-manager-url: https://formulae.brew.sh/formula/cljfmt
version: 0.16.4
license: EPL-1.0
category: development
tags:
  - cli
description: Formatting Clojure code
source-archive: https://github.com/weavejester/cljfmt/archive/refs/tags/0.16.4.tar.gz
build-dependencies:
  - graalvm
  - leiningen
executables:
  - exposure: global executable
    kind: cli
    name: cljfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cljfmt
  brew: brew install cljfmt
  nix: nix profile install nixpkgs#cljfmt
provenance:
  formula: cljfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
