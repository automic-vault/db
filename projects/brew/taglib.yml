id: brew:taglib
display-name: taglib
homepage: https://taglib.org/
repo: https://taglib.github.io/releases/taglib-2.3.tar.gz
docs: https://taglib.org/
package-manager:
  apk: taglib
  brew: taglib
  dnf: taglib
  macports: taglib
  nix: taglib
  pacman: taglib
  zypper: taglib
package-manager-url: https://formulae.brew.sh/formula/taglib
version: 2.3
license: LGPL-2.1-only OR MPL-1.1
category: development
tags:
  - cli
description: Audio metadata library
source-archive: https://taglib.github.io/releases/taglib-2.3.tar.gz
dependencies:
  - utf8cpp
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: taglib-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add taglib
  av: sudo av install brew:taglib
  brew: brew install taglib
  dnf: sudo dnf install taglib
  macports: sudo port install taglib
  nix: nix profile install nixpkgs#taglib
  pacman: sudo pacman -S taglib
  zypper: sudo zypper install taglib
provenance:
  formula: taglib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
