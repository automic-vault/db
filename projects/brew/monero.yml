id: brew:monero
display-name: monero
homepage: https://www.getmonero.org/downloads/#cli
repo: https://downloads.getmonero.org/cli/monero-source-v0.18.5.0.tar.bz2
docs: https://www.getmonero.org/downloads/#cli
package-manager:
  apk: monero
  brew: monero
  debian: monero
  pacman: monero
  scoop: extras/monero
  ubuntu: monero
package-manager-url: https://formulae.brew.sh/formula/monero
version: 0.18.5.0
license: BSD-3-Clause
category: network
tags:
  - cli
description: Official Monero wallet and CPU miner
source-archive: https://downloads.getmonero.org/cli/monero-source-v0.18.5.0.tar.bz2
dependencies:
  - boost
  - hidapi
  - libsodium
  - openssl@3
  - readline
  - unbound
  - zeromq
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: monero-blockchain-ancestry
  - exposure: global executable
    kind: cli
    name: monero-blockchain-depth
  - exposure: global executable
    kind: cli
    name: monero-blockchain-export
  - exposure: global executable
    kind: cli
    name: monero-blockchain-import
  - exposure: global executable
    kind: cli
    name: monero-blockchain-mark-spent-outputs
  - exposure: global executable
    kind: cli
    name: monero-blockchain-prune
  - exposure: global executable
    kind: cli
    name: monero-blockchain-prune-known-spent-data
  - exposure: global executable
    kind: cli
    name: monero-blockchain-stats
  - exposure: global executable
    kind: cli
    name: monero-blockchain-usage
  - exposure: global executable
    kind: cli
    name: monero-gen-ssl-cert
  - exposure: global executable
    kind: cli
    name: monero-gen-trusted-multisig
  - exposure: global executable
    kind: cli
    name: monero-wallet-cli
  - exposure: global executable
    kind: cli
    name: monero-wallet-rpc
  - exposure: global executable
    kind: cli
    name: monerod
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add monero
  av: sudo av install brew:monero
  brew: brew install monero
  debian: sudo apt install monero
  pacman: sudo pacman -S monero
  scoop: scoop install extras/monero
  ubuntu: sudo apt install monero
provenance:
  formula: monero
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
