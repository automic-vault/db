id: brew:spoofdpi
display-name: spoofdpi
homepage: https://spoofdpi.dev
repo: https://github.com/xvzc/SpoofDPI
docs: https://spoofdpi.dev
package-manager:
  brew: spoofdpi
  dnf: spoofdpi
  nix: spoofdpi
package-manager-url: https://formulae.brew.sh/formula/spoofdpi
version: 1.5.3
license: Apache-2.0
category: development
tags:
  - cli
description: Simple and fast anti-censorship tool written in Go
source-archive: https://github.com/xvzc/SpoofDPI/releases/download/v1.5.3/spoofdpi-1.5.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: spoofdpi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:spoofdpi
  brew: brew install spoofdpi
  dnf: sudo dnf install spoofdpi
  nix: nix profile install nixpkgs#spoofdpi
provenance:
  formula: spoofdpi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
