id: brew:qjackctl
display-name: qjackctl
homepage: https://qjackctl.sourceforge.io/
repo: https://downloads.sourceforge.net/project/qjackctl/qjackctl/1.0.6/qjackctl-1.0.6.tar.gz
docs: https://qjackctl.sourceforge.io/
package-manager:
  apk: qjackctl
  brew: qjackctl
  debian: qjackctl
  dnf: qjackctl
  macports: qjackctl
  nix: qjackctl
  pacman: qjackctl
  ubuntu: qjackctl
  zypper: qjackctl
package-manager-url: https://formulae.brew.sh/formula/qjackctl
version: 1.0.6
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Simple Qt application to control the JACK sound server daemon
source-archive: https://downloads.sourceforge.net/project/qjackctl/qjackctl/1.0.6/qjackctl-1.0.6.tar.gz
dependencies:
  - jack
  - qtbase
  - qtsvg
build-dependencies:
  - cmake
  - pkgconf
  - qttools
executables:
  - exposure: global executable
    kind: cli
    name: qjackctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add qjackctl
  av: sudo av install brew:qjackctl
  brew: brew install qjackctl
  debian: sudo apt install qjackctl
  dnf: sudo dnf install qjackctl
  macports: sudo port install qjackctl
  nix: nix profile install nixpkgs#qjackctl
  pacman: sudo pacman -S qjackctl
  ubuntu: sudo apt install qjackctl
  zypper: sudo zypper install qjackctl
provenance:
  formula: qjackctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
