id: brew:bcftools
display-name: bcftools
homepage: https://www.htslib.org/
repo: https://github.com/samtools/bcftools
docs: https://www.htslib.org/
package-manager:
  brew: bcftools
  debian: bcftools
  dnf: bcftools
  macports: bcftools
  nix: bcftools
  ubuntu: bcftools
  zypper: bcftools
package-manager-url: https://formulae.brew.sh/formula/bcftools
version: 1.23.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Tools for BCF/VCF files and variant calling from samtools
source-archive: https://github.com/samtools/bcftools/releases/download/1.23.1/bcftools-1.23.1.tar.bz2
dependencies:
  - gsl
  - htslib
executables:
  - exposure: global executable
    kind: cli
    name: bcftools
  - exposure: global executable
    kind: cli
    name: color-chrs.pl
  - exposure: global executable
    kind: cli
    name: gff2gff
  - exposure: global executable
    kind: cli
    name: gff2gff.py
  - exposure: global executable
    kind: cli
    name: guess-ploidy.py
  - exposure: global executable
    kind: cli
    name: plot-roh.py
  - exposure: global executable
    kind: cli
    name: plot-vcfstats
  - exposure: global executable
    kind: cli
    name: roh-viz
  - exposure: global executable
    kind: cli
    name: run-roh.pl
  - exposure: global executable
    kind: cli
    name: vcfutils.pl
  - exposure: global executable
    kind: cli
    name: vrfs-variances
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bcftools
  brew: brew install bcftools
  debian: sudo apt install bcftools
  dnf: sudo dnf install bcftools
  macports: sudo port install bcftools
  nix: nix profile install nixpkgs#bcftools
  ubuntu: sudo apt install bcftools
  zypper: sudo zypper install bcftools
provenance:
  formula: bcftools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
