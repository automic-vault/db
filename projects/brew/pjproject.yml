id: brew:pjproject
display-name: pjproject
homepage: https://www.pjsip.org/
repo: https://github.com/pjsip/pjproject
docs: https://www.pjsip.org/
package-manager:
  apk: pjproject
  brew: pjproject
  dnf: pjproject
package-manager-url: https://formulae.brew.sh/formula/pjproject
version: 2.17
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: C library for multimedia protocols such as SIP, SDP, RTP and more
source-archive: https://github.com/pjsip/pjproject/archive/refs/tags/2.17.tar.gz
dependencies:
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: pjsua
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pjproject
  av: sudo av install brew:pjproject
  brew: brew install pjproject
  dnf: sudo dnf install pjproject
provenance:
  formula: pjproject
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
