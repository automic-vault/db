id: brew:angband
display-name: angband
homepage: https://rephial.org/
repo: https://github.com/angband/angband
docs: https://rephial.org/
package-manager:
  apk: angband
  brew: angband
  debian: angband
  dnf: angband
  macports: angband
  nix: angband
  pacman: angband
  ubuntu: angband
package-manager-url: https://formulae.brew.sh/formula/angband
version: 4.2.6
license: GPL-2.0-only
category: development
tags:
  - cli
description: Dungeon exploration game
source-archive: https://github.com/angband/angband/releases/download/4.2.6/Angband-4.2.6.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: angband
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add angband
  av: sudo av install brew:angband
  brew: brew install angband
  debian: sudo apt install angband
  dnf: sudo dnf install angband
  macports: sudo port install angband
  nix: nix profile install nixpkgs#angband
  pacman: sudo pacman -S angband
  ubuntu: sudo apt install angband
provenance:
  formula: angband
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
