id: brew:carton
display-name: carton
homepage: https://metacpan.org/pod/Carton
repo: https://cpan.metacpan.org/authors/id/M/MI/MIYAGAWA/Carton-v1.0.35.tar.gz
docs: https://metacpan.org/pod/Carton
package-manager:
  brew: carton
  debian: carton
  ubuntu: carton
package-manager-url: https://formulae.brew.sh/formula/carton
version: 1.0.35
license: Artistic-1.0-Perl OR GPL-1.0-or-later
category: network
tags:
  - cli
description: Perl module dependency manager (aka Bundler for Perl)
source-archive: https://cpan.metacpan.org/authors/id/M/MI/MIYAGAWA/Carton-v1.0.35.tar.gz
dependencies:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: carton
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:carton
  brew: brew install carton
  debian: sudo apt install carton
  ubuntu: sudo apt install carton
provenance:
  formula: carton
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
