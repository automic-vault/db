id: brew:surfer
display-name: surfer
homepage: https://surfer-project.org/
repo: https://gitlab.com/surfer-project/surfer
docs: https://surfer-project.org/
package-manager:
  brew: surfer
  nix: surfer
package-manager-url: https://formulae.brew.sh/formula/surfer
version: 0.7.0
license: EUPL-1.2
category: development
tags:
  - cli
description: Waveform viewer, supporting VCD, FST, or GHW format
source-archive: https://gitlab.com/surfer-project/surfer.git
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: surfer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:surfer
  brew: brew install surfer
  nix: nix profile install nixpkgs#surfer
provenance:
  formula: surfer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
