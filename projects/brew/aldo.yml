id: brew:aldo
display-name: aldo
homepage: https://www.nongnu.org/aldo/
repo: https://download.savannah.gnu.org/releases/aldo/aldo-0.7.7.tar.bz2
docs: https://www.nongnu.org/aldo/
package-manager:
  brew: aldo
  debian: aldo
  dnf: aldo
  nix: aldo
  ubuntu: aldo
  zypper: aldo
package-manager-url: https://formulae.brew.sh/formula/aldo
version: 0.7.7
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Morse code learning tool released under GPL
source-archive: https://download.savannah.gnu.org/releases/aldo/aldo-0.7.7.tar.bz2
dependencies:
  - libao
executables:
  - exposure: global executable
    kind: cli
    name: aldo
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aldo
  brew: brew install aldo
  debian: sudo apt install aldo
  dnf: sudo dnf install aldo
  nix: nix profile install nixpkgs#aldo
  ubuntu: sudo apt install aldo
  zypper: sudo zypper install aldo
provenance:
  formula: aldo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
