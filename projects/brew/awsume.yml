id: brew:awsume
display-name: awsume
homepage: https://awsu.me
repo: https://github.com/trek10inc/awsume
docs: https://awsu.me
package-manager:
  brew: awsume
  nix: awsume
package-manager-url: https://formulae.brew.sh/formula/awsume
version: 4.5.5
license: MIT
category: cloud
tags:
  - aws
  - cli
description: Utility for easily assuming AWS IAM roles from the command-line
source-archive: https://github.com/trek10inc/awsume/archive/refs/tags/4.5.5.tar.gz
dependencies:
  - libyaml
  - python@3.14
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: autoawsume
  - exposure: global executable
    kind: cli
    name: awsume
  - exposure: global executable
    kind: cli
    name: awsume-autocomplete
  - exposure: global executable
    kind: cli
    name: awsume-configure
  - exposure: global executable
    kind: cli
    name: awsume.bat
  - exposure: global executable
    kind: cli
    name: awsume.fish
  - exposure: global executable
    kind: cli
    name: awsume.ps1
  - exposure: global executable
    kind: cli
    name: awsumepy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:awsume
  brew: brew install awsume
  nix: nix profile install nixpkgs#awsume
provenance:
  formula: awsume
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
