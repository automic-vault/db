id: brew:k8sgpt
display-name: k8sgpt
homepage: https://k8sgpt.ai/
repo: https://github.com/k8sgpt-ai/k8sgpt
docs: https://k8sgpt.ai/
package-manager:
  brew: k8sgpt
  nix: k8sgpt
package-manager-url: https://formulae.brew.sh/formula/k8sgpt
version: 0.4.33
license: Apache-2.0
category: development
tags:
  - cli
description: Scanning your k8s clusters, diagnosing, and triaging issues in simple English
source-archive: https://github.com/k8sgpt-ai/k8sgpt/archive/refs/tags/v0.4.33.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: k8sgpt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:k8sgpt
  brew: brew install k8sgpt
  nix: nix profile install nixpkgs#k8sgpt
provenance:
  formula: k8sgpt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
