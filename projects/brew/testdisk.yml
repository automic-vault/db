id: brew:testdisk
display-name: testdisk
homepage: https://www.cgsecurity.org/wiki/TestDisk
repo: https://www.cgsecurity.org/testdisk-7.2.tar.bz2
docs: https://www.cgsecurity.org/wiki/TestDisk
package-manager:
  apk: testdisk
  brew: testdisk
  debian: testdisk
  dnf: testdisk
  macports: testdisk
  nix: testdisk
  pacman: testdisk
  scoop: extras/testdisk
  ubuntu: testdisk
  winget: CGSecurity.TestDisk
  zypper: testdisk
package-manager-url: https://formulae.brew.sh/formula/testdisk
version: 7.2
license: GPL-2.0-or-later
category: security
tags:
  - cli
description: Powerful free data recovery utility
source-archive: https://www.cgsecurity.org/testdisk-7.2.tar.bz2
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: fidentify
  - exposure: global executable
    kind: cli
    name: photorec
  - exposure: global executable
    kind: cli
    name: testdisk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add testdisk
  av: sudo av install brew:testdisk
  brew: brew install testdisk
  debian: sudo apt install testdisk
  dnf: sudo dnf install testdisk
  macports: sudo port install testdisk
  nix: nix profile install nixpkgs#testdisk
  pacman: sudo pacman -S testdisk
  scoop: scoop install extras/testdisk
  ubuntu: sudo apt install testdisk
  winget: winget install --id CGSecurity.TestDisk -e
  zypper: sudo zypper install testdisk
provenance:
  formula: testdisk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
