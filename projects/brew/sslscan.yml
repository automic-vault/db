id: brew:sslscan
display-name: sslscan
homepage: https://github.com/rbsec/sslscan
repo: https://github.com/rbsec/sslscan
docs: https://github.com/rbsec/sslscan
package-manager:
  apk: sslscan
  brew: sslscan
  debian: sslscan
  dnf: sslscan
  macports: sslscan
  nix: sslscan
  pacman: sslscan
  scoop: main/sslscan
  ubuntu: sslscan
  zypper: sslscan
package-manager-url: https://formulae.brew.sh/formula/sslscan
version: 2.2.2
license: GPL-3.0-or-later WITH cryptsetup-OpenSSL-exception
category: security
tags:
  - cli
description: Test SSL/TLS enabled services to discover supported cipher suites
source-archive: https://github.com/rbsec/sslscan/archive/refs/tags/2.2.2.tar.gz
dependencies:
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: sslscan
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sslscan
  av: sudo av install brew:sslscan
  brew: brew install sslscan
  debian: sudo apt install sslscan
  dnf: sudo dnf install sslscan
  macports: sudo port install sslscan
  nix: nix profile install nixpkgs#sslscan
  pacman: sudo pacman -S sslscan
  scoop: scoop install main/sslscan
  ubuntu: sudo apt install sslscan
  zypper: sudo zypper install sslscan
provenance:
  formula: sslscan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
