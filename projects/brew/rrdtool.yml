id: brew:rrdtool
display-name: rrdtool
homepage: https://oss.oetiker.ch/rrdtool/
repo: https://github.com/oetiker/rrdtool-1.x
docs: https://oss.oetiker.ch/rrdtool/
package-manager:
  apk: rrdtool
  brew: rrdtool
  debian: rrdtool
  dnf: rrdtool
  macports: rrdtool
  nix: rrdtool
  pacman: rrdtool
  ubuntu: rrdtool
  zypper: rrdtool
package-manager-url: https://formulae.brew.sh/formula/rrdtool
version: 1.10.3
license: GPL-2.0-or-later WITH RRDtool-FLOSS-exception-2.0
category: database
tags:
  - cli
  - database
description: Round Robin Database
source-archive: https://github.com/oetiker/rrdtool-1.x/releases/download/v1.10.3/rrdtool-1.10.3.tar.gz
dependencies:
  - cairo
  - gettext
  - glib
  - harfbuzz
  - libpng
  - pango
build-dependencies:
  - groff
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: rrdcached
  - exposure: global executable
    kind: cli
    name: rrdcgi
  - exposure: global executable
    kind: cli
    name: rrdcreate
  - exposure: global executable
    kind: cli
    name: rrdinfo
  - exposure: global executable
    kind: cli
    name: rrdtool
  - exposure: global executable
    kind: cli
    name: rrdupdate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rrdtool
  av: sudo av install brew:rrdtool
  brew: brew install rrdtool
  debian: sudo apt install rrdtool
  dnf: sudo dnf install rrdtool
  macports: sudo port install rrdtool
  nix: nix profile install nixpkgs#rrdtool
  pacman: sudo pacman -S rrdtool
  ubuntu: sudo apt install rrdtool
  zypper: sudo zypper install rrdtool
provenance:
  formula: rrdtool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
