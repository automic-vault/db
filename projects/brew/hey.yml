id: brew:hey
display-name: hey
homepage: https://github.com/rakyll/hey
repo: https://github.com/rakyll/hey
docs: https://github.com/rakyll/hey
package-manager:
  apk: hey
  brew: hey
  debian: hey
  macports: hey
  nix: hey
  ubuntu: hey
  zypper: hey
package-manager-url: https://formulae.brew.sh/formula/hey
version: 0.1.5
license: Apache-2.0
category: development
tags:
  - cli
description: HTTP load generator, ApacheBench (ab) replacement
source-archive: https://github.com/rakyll/hey/archive/refs/tags/v0.1.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hey
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hey
  av: sudo av install brew:hey
  brew: brew install hey
  debian: sudo apt install hey
  macports: sudo port install hey
  nix: nix profile install nixpkgs#hey
  ubuntu: sudo apt install hey
  zypper: sudo zypper install hey
provenance:
  formula: hey
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
