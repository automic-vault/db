id: brew:wv2
display-name: wv2
homepage: https://wvware.sourceforge.net/
repo: https://downloads.sourceforge.net/project/wvware/wv2-0.4.2.tar.bz2
docs: https://wvware.sourceforge.net/
package-manager:
  brew: wv2
  macports: wv2
  nix: wv2
package-manager-url: https://formulae.brew.sh/formula/wv2
version: 0.4.2
license: LGPL-2.0-only AND LGPL-2.0-or-later AND LGPL-2.1-only
category: network
tags:
  - cli
description: Programs for accessing Microsoft Word documents
source-archive: https://downloads.sourceforge.net/project/wvware/wv2-0.4.2.tar.bz2
dependencies:
  - glib
  - libgsf
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: wv2-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wv2
  brew: brew install wv2
  macports: sudo port install wv2
  nix: nix profile install nixpkgs#wv2
provenance:
  formula: wv2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
