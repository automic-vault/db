id: brew:dropbear
display-name: dropbear
homepage: https://matt.ucc.asn.au/dropbear/dropbear.html
repo: https://matt.ucc.asn.au/dropbear/releases/dropbear-2026.91.tar.bz2
docs: https://matt.ucc.asn.au/dropbear/dropbear.html
package-manager:
  apk: dropbear
  brew: dropbear
  debian: dropbear
  dnf: dropbear
  nix: dropbear
  pacman: dropbear
  ubuntu: dropbear
package-manager-url: https://formulae.brew.sh/formula/dropbear
version: 2026.91
license: MIT
category: network
tags:
  - cli
description: Small SSH server/client for POSIX-based system
source-archive: https://matt.ucc.asn.au/dropbear/releases/dropbear-2026.91.tar.bz2
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: dbclient
  - exposure: global executable
    kind: cli
    name: dropbear
  - exposure: global executable
    kind: cli
    name: dropbearconvert
  - exposure: global executable
    kind: cli
    name: dropbearkey
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dropbear
  av: sudo av install brew:dropbear
  brew: brew install dropbear
  debian: sudo apt install dropbear
  dnf: sudo dnf install dropbear
  nix: nix profile install nixpkgs#dropbear
  pacman: sudo pacman -S dropbear
  ubuntu: sudo apt install dropbear
provenance:
  formula: dropbear
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
