id: brew:brightness
display-name: brightness
homepage: https://github.com/nriley/brightness
repo: https://github.com/nriley/brightness
docs: https://github.com/nriley/brightness
package-manager:
  brew: brightness
  macports: brightness
package-manager-url: https://formulae.brew.sh/formula/brightness
version: 1.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: Change macOS display brightness from the command-line
source-archive: https://github.com/nriley/brightness/archive/refs/tags/1.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: brightness
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:brightness
  brew: brew install brightness
  macports: sudo port install brightness
provenance:
  formula: brightness
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
