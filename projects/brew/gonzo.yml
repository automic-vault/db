id: brew:gonzo
display-name: gonzo
homepage: https://gonzo.controltheory.com/
repo: https://github.com/control-theory/gonzo
docs: https://gonzo.controltheory.com/
package-manager:
  brew: gonzo
  nix: gonzo
  winget: control-theory.gonzo
package-manager-url: https://formulae.brew.sh/formula/gonzo
version: 0.4.2
license: MIT
category: development
tags:
  - cli
description: Log analysis TUI
source-archive: https://github.com/control-theory/gonzo/archive/refs/tags/v0.4.2.tar.gz
build-dependencies:
  - go
  - node
executables:
  - exposure: global executable
    kind: cli
    name: gonzo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gonzo
  brew: brew install gonzo
  nix: nix profile install nixpkgs#gonzo
  winget: winget install --id control-theory.gonzo -e
provenance:
  formula: gonzo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
