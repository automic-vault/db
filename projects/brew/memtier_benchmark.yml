id: brew:memtier_benchmark
display-name: memtier_benchmark
homepage: https://github.com/RedisLabs/memtier_benchmark
repo: https://github.com/RedisLabs/memtier_benchmark
docs: https://github.com/RedisLabs/memtier_benchmark
package-manager:
  brew: memtier_benchmark
  nix: memtier-benchmark
package-manager-url: https://formulae.brew.sh/formula/memtier_benchmark
version: 2.3.1
license: (GPL-2.0-or-later WITH cryptsetup-OpenSSL-exception) AND (CC0-1.0 OR BSD-2-Clause)
category: database
tags:
  - cli
description: Redis and Memcache traffic generation and benchmarking tool
source-archive: https://github.com/RedisLabs/memtier_benchmark/archive/refs/tags/2.3.1.tar.gz
dependencies:
  - libevent
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: memtier_benchmark
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:memtier_benchmark
  brew: brew install memtier_benchmark
  nix: nix profile install nixpkgs#memtier-benchmark
provenance:
  formula: memtier_benchmark
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
