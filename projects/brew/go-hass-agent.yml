id: brew:go-hass-agent
display-name: go-hass-agent
homepage: https://github.com/joshuar/go-hass-agent
repo: https://github.com/joshuar/go-hass-agent
docs: https://github.com/joshuar/go-hass-agent
package-manager:
  brew: go-hass-agent
  nix: go-hass-agent
package-manager-url: https://formulae.brew.sh/formula/go-hass-agent
version: 14.11.0
license: MIT
category: development
tags:
  - cli
description: Native Home Assistant agent for desktop/laptop devices
source-archive: https://github.com/joshuar/go-hass-agent/archive/refs/tags/v14.11.0.tar.gz
build-dependencies:
  - go
  - node
executables:
  - exposure: global executable
    kind: cli
    name: go-hass-agent
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:go-hass-agent
  brew: brew install go-hass-agent
  nix: nix profile install nixpkgs#go-hass-agent
provenance:
  formula: go-hass-agent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
