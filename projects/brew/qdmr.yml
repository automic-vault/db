id: brew:qdmr
display-name: qdmr
homepage: https://dm3mat.darc.de/qdmr/
repo: https://github.com/hmatuschek/qdmr
docs: https://dm3mat.darc.de/qdmr/
package-manager:
  brew: qdmr
  debian: qdmr
  dnf: qdmr
  macports: qdmr
  nix: qdmr
  ubuntu: qdmr
package-manager-url: https://formulae.brew.sh/formula/qdmr
version: 0.15.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Codeplug programming tool for DMR radios
source-archive: https://github.com/hmatuschek/qdmr/archive/refs/tags/v0.15.0.tar.gz
dependencies:
  - librsvg
  - libusb
  - qtbase
  - qtmultimedia
  - qtpositioning
  - qtserialport
  - qttools
  - yaml-cpp
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: dmrconf
  - exposure: global executable
    kind: cli
    name: qdmr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qdmr
  brew: brew install qdmr
  debian: sudo apt install qdmr
  dnf: sudo dnf install qdmr
  macports: sudo port install qdmr
  nix: nix profile install nixpkgs#qdmr
  ubuntu: sudo apt install qdmr
provenance:
  formula: qdmr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
