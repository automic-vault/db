id: brew:lcs
display-name: lcs
homepage: https://sourceforge.net/projects/lcsgame/
repo: https://svn.code.sf.net/p/lcsgame/code/trunk
docs: https://sourceforge.net/projects/lcsgame/
package-manager:
  brew: lcs
package-manager-url: https://formulae.brew.sh/formula/lcs
version: 4.07.4b
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Satirical console-based political role-playing/strategy game
source-archive: https://svn.code.sf.net/p/lcsgame/code/trunk
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: crimesquad
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lcs
  brew: brew install lcs
provenance:
  formula: lcs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
