id: brew:arkade
display-name: arkade
homepage: https://blog.alexellis.io/kubernetes-marketplace-two-year-update/
repo: https://github.com/alexellis/arkade
docs: https://blog.alexellis.io/kubernetes-marketplace-two-year-update/
package-manager:
  apk: ark
  brew: arkade
  chocolatey: arkade
  debian: ark
  dnf: ark
  macports: ark
  nix: arkade
  pacman: ark
  ubuntu: ark
  winget: KDE.Ark
  zypper: arkade
package-manager-url: https://formulae.brew.sh/formula/arkade
version: 0.11.99
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
description: Open Source Kubernetes Marketplace
source-archive: https://github.com/alexellis/arkade/archive/refs/tags/0.11.99.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ark
  - exposure: global executable
    kind: cli
    name: arkade
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ark
  av: sudo av install brew:arkade
  brew: brew install arkade
  chocolatey: choco install arkade
  debian: sudo apt install ark
  dnf: sudo dnf install ark
  macports: sudo port install ark
  nix: nix profile install nixpkgs#arkade
  pacman: sudo pacman -S ark
  ubuntu: sudo apt install ark
  winget: winget install --id KDE.Ark -e
  zypper: sudo zypper install arkade
provenance:
  formula: arkade
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
