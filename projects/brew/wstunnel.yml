id: brew:wstunnel
display-name: wstunnel
homepage: https://github.com/erebe/wstunnel
repo: https://github.com/erebe/wstunnel
docs: https://github.com/erebe/wstunnel
package-manager:
  brew: wstunnel
  macports: wstunnel
  nix: wstunnel
  scoop: main/wstunnel
package-manager-url: https://formulae.brew.sh/formula/wstunnel
version: 10.5.5
license: BSD-3-Clause
category: development
tags:
  - cli
description: Tunnel all your traffic over Websocket or HTTP2
source-archive: https://github.com/erebe/wstunnel/archive/refs/tags/v10.5.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: wstunnel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wstunnel
  brew: brew install wstunnel
  macports: sudo port install wstunnel
  nix: nix profile install nixpkgs#wstunnel
  scoop: scoop install main/wstunnel
provenance:
  formula: wstunnel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
