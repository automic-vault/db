id: brew:clair
display-name: clair
homepage: https://github.com/quay/clair
repo: https://github.com/quay/clair
docs: https://github.com/quay/clair
package-manager:
  brew: clair
  nix: clair
  zypper: clair
package-manager-url: https://formulae.brew.sh/formula/clair
version: 4.8.0
license: Apache-2.0
category: development
tags:
  - cli
description: Vulnerability Static Analysis for Containers
source-archive: https://github.com/quay/clair/archive/refs/tags/v4.8.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: clair
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clair
  brew: brew install clair
  nix: nix profile install nixpkgs#clair
  zypper: sudo zypper install clair
provenance:
  formula: clair
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
