id: brew:airspyhf
display-name: airspyhf
homepage: https://airspy.com/
repo: https://github.com/airspy/airspyhf
docs: https://airspy.com/
package-manager:
  apk: airspyhf
  brew: airspyhf
  debian: airspyhf
  dnf: airspyhf
  macports: airspyhf
  nix: airspyhf
  ubuntu: airspyhf
  zypper: airspyhf
package-manager-url: https://formulae.brew.sh/formula/airspyhf
version: 1.6.8
license: BSD-3-Clause
category: development
tags:
  - cli
description: Driver and tools for a software-defined radio
source-archive: https://github.com/airspy/airspyhf/archive/refs/tags/1.6.8.tar.gz
dependencies:
  - libusb
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: airspyhf_calibrate
  - exposure: global executable
    kind: cli
    name: airspyhf_gpio
  - exposure: global executable
    kind: cli
    name: airspyhf_info
  - exposure: global executable
    kind: cli
    name: airspyhf_lib_version
  - exposure: global executable
    kind: cli
    name: airspyhf_rx
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add airspyhf
  av: sudo av install brew:airspyhf
  brew: brew install airspyhf
  debian: sudo apt install airspyhf
  dnf: sudo dnf install airspyhf
  macports: sudo port install airspyhf
  nix: nix profile install nixpkgs#airspyhf
  ubuntu: sudo apt install airspyhf
  zypper: sudo zypper install airspyhf
provenance:
  formula: airspyhf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
