id: brew:stripe-mock
display-name: stripe-mock
homepage: https://github.com/stripe/stripe-mock
repo: https://github.com/stripe/stripe-mock
docs: https://github.com/stripe/stripe-mock
package-manager:
  brew: stripe-mock
  zypper: stripe-mock
package-manager-url: https://formulae.brew.sh/formula/stripe-mock
version: 0.200.0
license: MIT
category: development
tags:
  - cli
description: Mock HTTP server that responds like the real Stripe API
source-archive: https://github.com/stripe/stripe-mock/archive/refs/tags/v0.200.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: stripe-mock
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:stripe-mock
  brew: brew install stripe-mock
  zypper: sudo zypper install stripe-mock
provenance:
  formula: stripe-mock
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
