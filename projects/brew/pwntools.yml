id: brew:pwntools
display-name: pwntools
homepage: https://github.com/Gallopsled/pwntools
repo: >
  https://files.pythonhosted.org/packages/f2/5c/9ae3d94c98b0b038ffd7f09ebdac506d346fe1b964999f71c96c8a904efd/pwntools-4.15.0.tar.gz
docs: https://github.com/Gallopsled/pwntools
package-manager:
  apk: pwntools
  brew: pwntools
  debian: checksec
  dnf: checksec
  macports: hex
  nix: pwntools
  pacman: checksec
  ubuntu: checksec
  winget: Airesoft.DisAsm
  zypper: checksec
package-manager-url: https://formulae.brew.sh/formula/pwntools
version: 4.15.0
license: MIT
category: development
tags:
  - cli
description: CTF framework used by Gallopsled in every CTF
source-archive: >
  https://files.pythonhosted.org/packages/f2/5c/9ae3d94c98b0b038ffd7f09ebdac506d346fe1b964999f71c96c8a904efd/pwntools-4.15.0.tar.gz
dependencies:
  - capstone
  - certifi
  - cryptography
  - libsodium
  - python@3.14
  - unicorn
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: asm
  - exposure: global executable
    kind: cli
    name: checksec
  - exposure: global executable
    kind: cli
    name: constgrep
  - exposure: global executable
    kind: cli
    name: cyclic
  - exposure: global executable
    kind: cli
    name: debug
  - exposure: global executable
    kind: cli
    name: disablenx
  - exposure: global executable
    kind: cli
    name: disasm
  - exposure: global executable
    kind: cli
    name: elfdiff
  - exposure: global executable
    kind: cli
    name: elfpatch
  - exposure: global executable
    kind: cli
    name: hex
  - exposure: global executable
    kind: cli
    name: libcdb
  - exposure: global executable
    kind: cli
    name: phd
  - exposure: global executable
    kind: cli
    name: pwn
  - exposure: global executable
    kind: cli
    name: pwnstrip
  - exposure: global executable
    kind: cli
    name: scramble
  - exposure: global executable
    kind: cli
    name: shellcraft
  - exposure: global executable
    kind: cli
    name: template
  - exposure: global executable
    kind: cli
    name: unhex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pwntools
  av: sudo av install brew:pwntools
  brew: brew install pwntools
  debian: sudo apt install checksec
  dnf: sudo dnf install checksec
  macports: sudo port install hex
  nix: nix profile install nixpkgs#pwntools
  pacman: sudo pacman -S checksec
  ubuntu: sudo apt install checksec
  winget: winget install --id Airesoft.DisAsm -e
  zypper: sudo zypper install checksec
provenance:
  formula: pwntools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
