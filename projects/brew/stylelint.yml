id: brew:stylelint
display-name: stylelint
homepage: https://stylelint.io/
repo: https://registry.npmjs.org/stylelint/-/stylelint-17.12.0.tgz
docs: https://stylelint.io/
package-manager:
  brew: stylelint
  nix: stylelint
package-manager-url: https://formulae.brew.sh/formula/stylelint
version: 17.12.0
license: MIT
category: development
tags:
  - cli
description: Modern CSS linter
source-archive: https://registry.npmjs.org/stylelint/-/stylelint-17.12.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: stylelint
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stylelint
  brew: brew install stylelint
  nix: nix profile install nixpkgs#stylelint
provenance:
  formula: stylelint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
