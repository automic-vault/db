id: brew:gnuastro
display-name: gnuastro
homepage: https://www.gnu.org/software/gnuastro/
repo: https://ftpmirror.gnu.org/gnuastro/gnuastro-0.24.tar.gz
docs: https://www.gnu.org/software/gnuastro/
package-manager:
  brew: gnuastro
  debian: gnuastro
  dnf: gnuastro
  macports: gnuastro
  nix: gnuastro
  ubuntu: gnuastro
  zypper: gnuastro
package-manager-url: https://formulae.brew.sh/formula/gnuastro
version: 0.24
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Astronomical data manipulation and analysis utilities and libraries
source-archive: https://ftpmirror.gnu.org/gnuastro/gnuastro-0.24.tar.gz
dependencies:
  - cfitsio
  - gsl
  - jpeg-turbo
  - libgit2
  - libtiff
  - libtool
  - wcslib
build-dependencies:
  - pkgconf
executables:
