bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gnuastro
  brew: brew install gnuastro
  debian: sudo apt install gnuastro
  dnf: sudo dnf install gnuastro
  macports: sudo port install gnuastro
  nix: nix profile install nixpkgs#gnuastro
  ubuntu: sudo apt install gnuastro
  zypper: sudo zypper install gnuastro
provenance:
  formula: gnuastro
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
