id: brew:libpaho-mqtt
display-name: libpaho-mqtt
homepage: https://eclipse-paho.github.io/paho.mqtt.c/MQTTClient/html/
repo: https://github.com/eclipse-paho/paho.mqtt.c
docs: https://eclipse-paho.github.io/paho.mqtt.c/MQTTClient/html/
package-manager:
  brew: libpaho-mqtt
package-manager-url: https://formulae.brew.sh/formula/libpaho-mqtt
version: 1.3.16
license: EPL-2.0
category: development
tags:
  - cli
description: Eclipse Paho C client library for MQTT
source-archive: https://github.com/eclipse-paho/paho.mqtt.c/archive/refs/tags/v1.3.16.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: MQTTVersion
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libpaho-mqtt
  brew: brew install libpaho-mqtt
provenance:
  formula: libpaho-mqtt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
