id: brew:souffle
display-name: souffle
homepage: https://souffle-lang.github.io
repo: https://github.com/souffle-lang/souffle
docs: https://souffle-lang.github.io
package-manager:
  brew: souffle
  nix: souffle
package-manager-url: https://formulae.brew.sh/formula/souffle
version: 2.5
license: UPL-1.0
category: development
tags:
  - cli
description: Logic Defined Static Analysis
source-archive: https://github.com/souffle-lang/souffle/archive/refs/tags/2.5.tar.gz
build-dependencies:
  - bison
  - cmake
  - mcpp
  - pkgconf
uses-from-macos:
  - libffi
  - ncurses
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: souffle
  - exposure: global executable
    kind: cli
    name: souffle-compile.py
  - exposure: global executable
    kind: cli
    name: souffleprof
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:souffle
  brew: brew install souffle
  nix: nix profile install nixpkgs#souffle
provenance:
  formula: souffle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
