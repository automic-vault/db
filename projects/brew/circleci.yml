id: brew:circleci
display-name: circleci
homepage: https://circleci.com/docs/guides/toolkit/local-cli/
repo: https://github.com/CircleCI-Public/circleci-cli
docs: https://circleci.com/docs/guides/toolkit/local-cli/
package-manager:
  brew: circleci
package-manager-url: https://formulae.brew.sh/formula/circleci
version: 0.1.36202
license: MIT
category: development
tags:
  - cli
description: Enables you to reproduce the CircleCI environment locally
source-archive: https://github.com/CircleCI-Public/circleci-cli.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: circleci
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:circleci
  brew: brew install circleci
provenance:
  formula: circleci
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
