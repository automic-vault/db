id: brew:tut
display-name: tut
homepage: https://tut.anv.nu
repo: https://github.com/RasmusLindroth/tut
docs: https://tut.anv.nu
package-manager:
  apk: tut
  brew: tut
  nix: tut
  zypper: tut
package-manager-url: https://formulae.brew.sh/formula/tut
version: 2.0.1
license: MIT
category: development
tags:
  - cli
description: TUI for Mastodon with vim inspired keys
source-archive: https://github.com/RasmusLindroth/tut/archive/refs/tags/2.0.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tut
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tut
  av: sudo av install brew:tut
  brew: brew install tut
  nix: nix profile install nixpkgs#tut
  zypper: sudo zypper install tut
provenance:
  formula: tut
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
