install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:http-prompt
  brew: brew install http-prompt
  macports: sudo port install http-prompt
provenance:
  formula: http-prompt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
