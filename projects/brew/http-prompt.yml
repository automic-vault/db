  macports: http-prompt
package-manager-url: https://formulae.brew.sh/formula/http-prompt
version: 2.1.0
license: MIT
category: network
tags:
  - cli
description: Interactive command-line HTTP client with autocomplete and syntax highlighting
source-archive: >
  https://files.pythonhosted.org/packages/bf/e2/bc5b0df107afcac65fde7015df48cbe9b4d877d1d0818203544ed1a41d4c/http-prompt-2.1.0.tar.gz
dependencies:
