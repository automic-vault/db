id: brew:http-prompt
display-name: http-prompt
homepage: https://http-prompt.com
repo: >
  https://files.pythonhosted.org/packages/bf/e2/bc5b0df107afcac65fde7015df48cbe9b4d877d1d0818203544ed1a41d4c/http-prompt-2.1.0.tar.gz
docs: https://http-prompt.com
package-manager:
