id: brew:gtk-gnutella
display-name: gtk-gnutella
homepage: https://gtk-gnutella.sourceforge.io
repo: >
  https://downloads.sourceforge.net/project/gtk-gnutella/gtk-gnutella/1.3.1/gtk-gnutella-1.3.1.tar.xz
docs: https://gtk-gnutella.sourceforge.io
package-manager:
  brew: gtk-gnutella
  dnf: gtk-gnutella
  macports: gtk-gnutella
  nix: gtk-gnutella
package-manager-url: https://formulae.brew.sh/formula/gtk-gnutella
version: 1.3.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Share files in a peer-to-peer (P2P) network
source-archive: >
  https://downloads.sourceforge.net/project/gtk-gnutella/gtk-gnutella/1.3.1/gtk-gnutella-1.3.1.tar.xz
dependencies:
  - at-spi2-core
  - dbus
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+
  - harfbuzz
  - pango
  - pcre2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gtk-gnutella
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gtk-gnutella
  brew: brew install gtk-gnutella
  dnf: sudo dnf install gtk-gnutella
  macports: sudo port install gtk-gnutella
  nix: nix profile install nixpkgs#gtk-gnutella
provenance:
  formula: gtk-gnutella
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
