id: brew:kubernetes-cli
display-name: kubernetes-cli
homepage: https://kubernetes.io/docs/reference/kubectl/
repo: https://github.com/kubernetes/kubernetes
docs: https://kubernetes.io/docs/reference/kubectl/
package-manager:
  apk: kubectl
  brew: kubernetes-cli
  chocolatey: kubernetes-cli
  debian: kubectl
  macports: kubectl
  nix: kubectl
  pacman: kubectl
  scoop: main/kubectl
  winget: Kubernetes.kubectl
package-manager-url: https://formulae.brew.sh/formula/kubernetes-cli
version: 1.36.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes command-line interface
source-archive: https://github.com/kubernetes/kubernetes.git
build-dependencies:
  - bash
  - coreutils
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubectl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kubectl
  av: sudo av install brew:kubernetes-cli
  brew: brew install kubernetes-cli
  chocolatey: choco install kubernetes-cli
  debian: sudo apt install kubectl
  macports: sudo port install kubectl
  nix: nix profile install nixpkgs#kubectl
  pacman: sudo pacman -S kubectl
  scoop: scoop install main/kubectl
  winget: winget install --id Kubernetes.kubectl -e
provenance:
  formula: kubernetes-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
