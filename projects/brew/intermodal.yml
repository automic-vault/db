id: brew:intermodal
display-name: intermodal
homepage: https://imdl.io
repo: https://github.com/casey/intermodal
docs: https://imdl.io
package-manager:
  brew: intermodal
  nix: intermodal
  scoop: main/intermodal
  winget: Casey.Intermodal
package-manager-url: https://formulae.brew.sh/formula/intermodal
version: 0.1.16
license: CC0-1.0
category: development
tags:
  - cli
description: Command-line utility for BitTorrent torrent file creation, verification, etc.
source-archive: https://github.com/casey/intermodal/archive/refs/tags/v0.1.16.tar.gz
build-dependencies:
  - help2man
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: imdl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:intermodal
  brew: brew install intermodal
  nix: nix profile install nixpkgs#intermodal
  scoop: scoop install main/intermodal
  winget: winget install --id Casey.Intermodal -e
provenance:
  formula: intermodal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
