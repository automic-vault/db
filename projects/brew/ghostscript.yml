id: brew:ghostscript
display-name: ghostscript
homepage: https://www.ghostscript.com/
repo: https://github.com/ArtifexSoftware/ghostpdl-downloads
docs: https://www.ghostscript.com/
package-manager:
  apk: ghostscript
  brew: ghostscript
  chocolatey: Ghostscript
  debian: ghostscript
  dnf: ghostscript
  macports: ghostscript
  nix: ghostscript
  pacman: ghostscript
  scoop: main/ghostscript
  ubuntu: ghostscript
  zypper: ghostscript
package-manager-url: https://formulae.brew.sh/formula/ghostscript
version: 10.07.1
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Interpreter for PostScript and PDF
source-archive: >
  https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10071/ghostpdl-10.07.1.tar.xz
dependencies:
  - fontconfig
  - freetype
  - jbig2dec
  - jpeg-turbo
  - leptonica
  - libarchive
  - libidn
  - libpng
  - libtiff
  - little-cms2
  - openjpeg
  - tesseract
build-dependencies:
  - pkgconf
uses-from-macos:
  - expat
