    kind: cli
    name: unix-lpr.sh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Ghostscript is now built `--without-versioned-path`. Temporary backwards
    compatibility symlinks exist but will be removed with 10.07.0 release.
  post-install-defined: false
install-lines:
  apk: sudo apk add ghostscript
  av: sudo av install brew:ghostscript
  brew: brew install ghostscript
  chocolatey: choco install Ghostscript
  debian: sudo apt install ghostscript
  dnf: sudo dnf install ghostscript
  macports: sudo port install ghostscript
  nix: nix profile install nixpkgs#ghostscript
  pacman: sudo pacman -S ghostscript
  scoop: scoop install main/ghostscript
  ubuntu: sudo apt install ghostscript
  zypper: sudo zypper install ghostscript
provenance:
  formula: ghostscript
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
