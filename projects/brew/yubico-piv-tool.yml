id: brew:yubico-piv-tool
display-name: yubico-piv-tool
homepage: https://developers.yubico.com/yubico-piv-tool/
repo: https://developers.yubico.com/yubico-piv-tool/Releases/yubico-piv-tool-2.7.3.tar.gz
docs: https://developers.yubico.com/yubico-piv-tool/
package-manager:
  apk: yubico-piv-tool
  brew: yubico-piv-tool
  debian: yubico-piv-tool
  dnf: yubico-piv-tool
  macports: yubico-piv-tool
  nix: yubico-piv-tool
  pacman: yubico-piv-tool
  scoop: main/yubico-piv-tool
  ubuntu: yubico-piv-tool
  winget: Yubico.PIVTool
  zypper: yubico-piv-tool
package-manager-url: https://formulae.brew.sh/formula/yubico-piv-tool
version: 2.7.3
license: BSD-2-Clause
category: development
tags:
  - cli
description: Command-line tool for the YubiKey PIV application
source-archive: https://developers.yubico.com/yubico-piv-tool/Releases/yubico-piv-tool-2.7.3.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - check
  - cmake
  - gengetopt
  - help2man
  - pkgconf
uses-from-macos:
  - pcsc-lite
executables:
  - exposure: global executable
    kind: cli
    name: yubico-piv-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yubico-piv-tool
  av: sudo av install brew:yubico-piv-tool
  brew: brew install yubico-piv-tool
  debian: sudo apt install yubico-piv-tool
  dnf: sudo dnf install yubico-piv-tool
  macports: sudo port install yubico-piv-tool
  nix: nix profile install nixpkgs#yubico-piv-tool
  pacman: sudo pacman -S yubico-piv-tool
  scoop: scoop install main/yubico-piv-tool
  ubuntu: sudo apt install yubico-piv-tool
  winget: winget install --id Yubico.PIVTool -e
  zypper: sudo zypper install yubico-piv-tool
provenance:
  formula: yubico-piv-tool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
