id: brew:cargo-all-features
display-name: cargo-all-features
homepage: https://github.com/frewsxcv/cargo-all-features
repo: https://github.com/frewsxcv/cargo-all-features
docs: https://github.com/frewsxcv/cargo-all-features
package-manager:
  brew: cargo-all-features
  nix: cargo-all-features
  pacman: cargo-all-features
package-manager-url: https://formulae.brew.sh/formula/cargo-all-features
version: 1.12.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Cargo subcommands to build and test all feature flag combinations
source-archive: https://github.com/frewsxcv/cargo-all-features/archive/refs/tags/1.12.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-all-features
  - exposure: global executable
    kind: cli
    name: cargo-build-all-features
  - exposure: global executable
    kind: cli
    name: cargo-check-all-features
  - exposure: global executable
    kind: cli
    name: cargo-test-all-features
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-all-features
  brew: brew install cargo-all-features
  nix: nix profile install nixpkgs#cargo-all-features
  pacman: sudo pacman -S cargo-all-features
provenance:
  formula: cargo-all-features
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
