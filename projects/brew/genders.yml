id: brew:genders
display-name: genders
homepage: https://github.com/chaos/genders
repo: https://github.com/chaos/genders
docs: https://github.com/chaos/genders
package-manager:
  brew: genders
  debian: genders
  dnf: genders
  macports: genders
  ubuntu: genders
  zypper: genders
package-manager-url: https://formulae.brew.sh/formula/genders
version: 1.32.1
license: GPL-2.0-or-later
category: database
tags:
  - cli
  - database
description: Static cluster configuration database for cluster management
source-archive: https://github.com/chaos/genders/archive/refs/tags/genders-1-32-1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: nodeattr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:genders
  brew: brew install genders
  debian: sudo apt install genders
  dnf: sudo dnf install genders
  macports: sudo port install genders
  ubuntu: sudo apt install genders
  zypper: sudo zypper install genders
provenance:
  formula: genders
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
