id: brew:plzip
display-name: plzip
homepage: https://www.nongnu.org/lzip/plzip.html
repo: https://download.savannah.gnu.org/releases/lzip/plzip/plzip-1.13.tar.gz
docs: https://www.nongnu.org/lzip/plzip.html
package-manager:
  apk: plzip
  brew: plzip
  debian: plzip
  nix: plzip
  ubuntu: plzip
  zypper: plzip
package-manager-url: https://formulae.brew.sh/formula/plzip
version: 1.13
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Data compressor
source-archive: https://download.savannah.gnu.org/releases/lzip/plzip/plzip-1.13.tar.gz
dependencies:
  - gcc
  - lzlib
executables:
  - exposure: global executable
    kind: cli
    name: plzip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add plzip
  av: sudo av install brew:plzip
  brew: brew install plzip
  debian: sudo apt install plzip
  nix: nix profile install nixpkgs#plzip
  ubuntu: sudo apt install plzip
  zypper: sudo zypper install plzip
provenance:
  formula: plzip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
