id: brew:gpgme
display-name: gpgme
homepage: https://www.gnupg.org/related_software/gpgme/
repo: https://www.gnupg.org/ftp/gcrypt/gpgme/gpgme-2.1.0.tar.bz2
docs: https://www.gnupg.org/related_software/gpgme/
package-manager:
  apk: gpgme
  brew: gpgme
  debian: gpgme-json
  dnf: gpgme
  macports: gpgme
  nix: gpgme
  pacman: gpgme
  ubuntu: gpgme-json
  zypper: gpgme
package-manager-url: https://formulae.brew.sh/formula/gpgme
version: 2.1.0
license: LGPL-2.1-or-later
category: security
tags:
  - cli
description: Library access to GnuPG
source-archive: https://www.gnupg.org/ftp/gcrypt/gpgme/gpgme-2.1.0.tar.bz2
dependencies:
  - gnupg
  - libassuan
  - libgpg-error
executables:
  - exposure: global executable
    kind: cli
    name: gnupg-key-manage
  - exposure: global executable
    kind: cli
    name: gpgme-config
  - exposure: global executable
    kind: cli
    name: gpgme-json
  - exposure: global executable
    kind: cli
    name: gpgme-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gpgme
  av: sudo av install brew:gpgme
  brew: brew install gpgme
  debian: sudo apt install gpgme-json
  dnf: sudo dnf install gpgme
  macports: sudo port install gpgme
  nix: nix profile install nixpkgs#gpgme
  pacman: sudo pacman -S gpgme
  ubuntu: sudo apt install gpgme-json
  zypper: sudo zypper install gpgme
provenance:
  formula: gpgme
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
