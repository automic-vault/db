id: brew:irssi
display-name: irssi
homepage: https://irssi.org/
repo: https://github.com/irssi/irssi
docs: https://irssi.org/
package-manager:
  apk: irssi
  brew: irssi
  debian: irssi
  dnf: irssi
  macports: irssi
  nix: irssi
  pacman: irssi
  ubuntu: irssi
  zypper: irssi
package-manager-url: https://formulae.brew.sh/formula/irssi
version: 1.4.5
license: GPL-2.0-or-later WITH openvpn-openssl-exception
category: development
tags:
  - cli
description: Modular IRC client
source-archive: https://github.com/irssi/irssi/releases/download/1.4.5/irssi-1.4.5.tar.xz
dependencies:
  - gettext
  - glib
  - openssl@3
  - perl
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: irssi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add irssi
  av: sudo av install brew:irssi
  brew: brew install irssi
  debian: sudo apt install irssi
  dnf: sudo dnf install irssi
  macports: sudo port install irssi
  nix: nix profile install nixpkgs#irssi
  pacman: sudo pacman -S irssi
  ubuntu: sudo apt install irssi
  zypper: sudo zypper install irssi
provenance:
  formula: irssi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
