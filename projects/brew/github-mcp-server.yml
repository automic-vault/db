id: brew:github-mcp-server
display-name: github-mcp-server
homepage: https://github.com/github/github-mcp-server
repo: https://github.com/github/github-mcp-server
docs: https://github.com/github/github-mcp-server
package-manager:
  brew: github-mcp-server
  nix: github-mcp-server
package-manager-url: https://formulae.brew.sh/formula/github-mcp-server
version: 1.0.5
license: MIT
category: development
tags:
  - cli
description: GitHub Model Context Protocol server for AI tools
source-archive: https://github.com/github/github-mcp-server/archive/refs/tags/v1.0.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: github-mcp-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:github-mcp-server
  brew: brew install github-mcp-server
  nix: nix profile install nixpkgs#github-mcp-server
provenance:
  formula: github-mcp-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
