id: brew:jenkins
display-name: jenkins
homepage: https://www.jenkins.io/
repo: https://get.jenkins.io/war/2.566/jenkins.war
docs: https://www.jenkins.io/
package-manager:
  apk: jenkins
  brew: jenkins
  chocolatey: jenkins
  macports: jenkins
  nix: jenkins
  pacman: jenkins
  scoop: main/jenkins
package-manager-url: https://formulae.brew.sh/formula/jenkins
version: 2.566
license: MIT
category: network
tags:
  - cli
description: Extendable open source continuous integration server
source-archive: https://get.jenkins.io/war/2.566/jenkins.war
dependencies:
  - openjdk@21
executables:
  - exposure: global executable
    kind: cli
    name: jenkins
  - exposure: global executable
    kind: cli
    name: jenkins-cli
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Note: When using launchctl the port will be 8080.'
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add jenkins
  av: sudo av install brew:jenkins
  brew: brew install jenkins
  chocolatey: choco install jenkins
  macports: sudo port install jenkins
  nix: nix profile install nixpkgs#jenkins
  pacman: sudo pacman -S jenkins
  scoop: scoop install main/jenkins
provenance:
  formula: jenkins
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
