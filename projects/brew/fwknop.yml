id: brew:fwknop
display-name: fwknop
homepage: https://www.cipherdyne.org/fwknop/
repo: https://www.cipherdyne.org/fwknop/download/fwknop-2.6.11.tar.gz
docs: https://www.cipherdyne.org/fwknop/
package-manager:
  apk: fwknop
  brew: fwknop
  dnf: fwknop
  macports: fwknop
  nix: fwknop
  pacman: fwknop
  zypper: fwknop
package-manager-url: https://formulae.brew.sh/formula/fwknop
version: 2.6.11
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Single Packet Authorization and Port Knocking
source-archive: https://www.cipherdyne.org/fwknop/download/fwknop-2.6.11.tar.gz
dependencies:
  - gpgme
  - libassuan
  - libgpg-error
build-dependencies:
  - texinfo
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: fwknop
  - exposure: global executable
    kind: cli
    name: fwknopd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fwknop
  av: sudo av install brew:fwknop
  brew: brew install fwknop
  dnf: sudo dnf install fwknop
  macports: sudo port install fwknop
  nix: nix profile install nixpkgs#fwknop
  pacman: sudo pacman -S fwknop
  zypper: sudo zypper install fwknop
provenance:
  formula: fwknop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
