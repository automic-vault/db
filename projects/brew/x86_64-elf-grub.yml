    kind: cli
    name: x86_64-elf-grub-file
  - exposure: global executable
    kind: cli
    name: x86_64-elf-grub-fstest
  - exposure: global executable
    kind: cli
    name: x86_64-elf-grub-glue-efi
  - exposure: global executable
    kind: cli
    name: x86_64-elf-grub-kbdcomp
  - exposure: global executable
    kind: cli
    name: x86_64-elf-grub-menulst2cfg
  - exposure: global executable
    kind: cli
    name: x86_64-elf-grub-mkfont
  - exposure: global executable
    kind: cli
    name: x86_64-elf-grub-mkimage
  - exposure: global executable
    kind: cli
    name: x86_64-elf-grub-mklayout
