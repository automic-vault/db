    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:x86_64-elf-grub
  brew: brew install x86_64-elf-grub
provenance:
  formula: x86_64-elf-grub
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
