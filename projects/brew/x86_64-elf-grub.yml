id: brew:x86_64-elf-grub
display-name: x86_64-elf-grub
homepage: https://savannah.gnu.org/projects/grub
repo: https://ftpmirror.gnu.org/gnu/grub/grub-2.12.tar.xz
docs: https://savannah.gnu.org/projects/grub
package-manager:
  brew: x86_64-elf-grub
package-manager-url: https://formulae.brew.sh/formula/x86_64-elf-grub
version: 2.12
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU GRUB bootloader for x86_64-elf
source-archive: https://ftpmirror.gnu.org/gnu/grub/grub-2.12.tar.xz
dependencies:
