id: brew:recutils
display-name: recutils
homepage: https://www.gnu.org/software/recutils/
repo: https://ftpmirror.gnu.org/gnu/recutils/recutils-1.9.tar.gz
docs: https://www.gnu.org/software/recutils/
package-manager:
  apk: recutils
  brew: recutils
  dnf: recutils
  macports: recutils
  nix: recutils
  ubuntu: recutils
package-manager-url: https://formulae.brew.sh/formula/recutils
version: 1.9
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Tools to work with human-editable, plain text data files
source-archive: https://ftpmirror.gnu.org/gnu/recutils/recutils-1.9.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: csv2rec
  - exposure: global executable
    kind: cli
    name: rec2csv
  - exposure: global executable
    kind: cli
    name: recdel
  - exposure: global executable
    kind: cli
    name: recfix
  - exposure: global executable
    kind: cli
    name: recfmt
  - exposure: global executable
    kind: cli
    name: recinf
  - exposure: global executable
    kind: cli
    name: recins
  - exposure: global executable
    kind: cli
    name: recsel
  - exposure: global executable
    kind: cli
    name: recset
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add recutils
  av: sudo av install brew:recutils
  brew: brew install recutils
  dnf: sudo dnf install recutils
  macports: sudo port install recutils
  nix: nix profile install nixpkgs#recutils
  ubuntu: sudo apt install recutils
provenance:
  formula: recutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
