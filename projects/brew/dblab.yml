id: brew:dblab
display-name: dblab
homepage: https://dblab.app/
repo: https://github.com/danvergara/dblab
docs: https://dblab.app/
package-manager:
  brew: dblab
  macports: dblab
  nix: dblab
package-manager-url: https://formulae.brew.sh/formula/dblab
version: 0.40.1
license: MIT
category: database
tags:
  - cli
  - database
description: Database client every command-line junkie deserves
source-archive: https://github.com/danvergara/dblab/archive/refs/tags/v0.40.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dblab
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dblab
  brew: brew install dblab
  macports: sudo port install dblab
  nix: nix profile install nixpkgs#dblab
provenance:
  formula: dblab
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
