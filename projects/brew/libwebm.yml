id: brew:libwebm
display-name: libwebm
homepage: https://www.webmproject.org/code/
repo: https://github.com/webmproject/libwebm
docs: https://www.webmproject.org/code/
package-manager:
  brew: libwebm
  macports: libwebm
  nix: libwebm
package-manager-url: https://formulae.brew.sh/formula/libwebm
version: 1.0.0.32
license: BSD-3-Clause
category: development
tags:
  - cli
description: WebM container
source-archive: https://github.com/webmproject/libwebm/archive/refs/tags/libwebm-1.0.0.32.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: mkvmuxer_sample
  - exposure: global executable
    kind: cli
    name: mkvparser_sample
  - exposure: global executable
    kind: cli
    name: vttdemux
  - exposure: global executable
    kind: cli
    name: webm2pes
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libwebm
  brew: brew install libwebm
  macports: sudo port install libwebm
  nix: nix profile install nixpkgs#libwebm
provenance:
  formula: libwebm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
