id: brew:clozure-cl
display-name: clozure-cl
homepage: https://ccl.clozure.com
repo: https://github.com/Clozure/ccl
docs: https://ccl.clozure.com
package-manager:
  brew: clozure-cl
package-manager-url: https://formulae.brew.sh/formula/clozure-cl
version: 1.13
license: Apache-2.0
category: development
tags:
  - cli
description: Common Lisp implementation with a long history
source-archive: https://github.com/Clozure/ccl/archive/refs/tags/v1.13.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ccl64
bottle:
  available: true
  platforms:
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clozure-cl
  brew: brew install clozure-cl
provenance:
  formula: clozure-cl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
