id: brew:minify
display-name: minify
homepage: https://go.tacodewolff.nl/minify
repo: https://github.com/tdewolff/minify
docs: https://go.tacodewolff.nl/minify
package-manager:
  apk: minify
  brew: minify
  chocolatey: minify
  debian: minify
  dnf: minify
  macports: minify
  nix: minify
  scoop: main/minify
  ubuntu: minify
package-manager-url: https://formulae.brew.sh/formula/minify
version: 2.24.13
license: MIT
category: development
tags:
  - cli
  - json
description: Minifier for HTML, CSS, JS, JSON, SVG, and XML
source-archive: https://github.com/tdewolff/minify/archive/refs/tags/v2.24.13.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: minify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add minify
  av: sudo av install brew:minify
  brew: brew install minify
  chocolatey: choco install minify
  debian: sudo apt install minify
  dnf: sudo dnf install minify
  macports: sudo port install minify
  nix: nix profile install nixpkgs#minify
  scoop: scoop install main/minify
  ubuntu: sudo apt install minify
provenance:
  formula: minify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
