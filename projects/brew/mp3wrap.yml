id: brew:mp3wrap
display-name: mp3wrap
homepage: https://mp3wrap.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/mp3wrap/mp3wrap/mp3wrap%200.5/mp3wrap-0.5-src.tar.gz
docs: https://mp3wrap.sourceforge.net/
package-manager:
  brew: mp3wrap
  debian: mp3wrap
  macports: mp3wrap
  ubuntu: mp3wrap
package-manager-url: https://formulae.brew.sh/formula/mp3wrap
version: 0.5
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: Wrap two or more mp3 files in a single large file
source-archive: >
  https://downloads.sourceforge.net/project/mp3wrap/mp3wrap/mp3wrap%200.5/mp3wrap-0.5-src.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mp3wrap
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mp3wrap
  brew: brew install mp3wrap
  debian: sudo apt install mp3wrap
  macports: sudo port install mp3wrap
  ubuntu: sudo apt install mp3wrap
provenance:
  formula: mp3wrap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
