id: brew:ant
display-name: ant
homepage: https://ant.apache.org/
repo: https://www.apache.org/dyn/closer.lua?path=ant/binaries/apache-ant-1.10.17-bin.tar.xz
docs: https://ant.apache.org/
package-manager:
  brew: ant
  chocolatey: ant
  debian: ant
  dnf: ant
  nix: ant
  pacman: ant
  scoop: main/ant
  ubuntu: ant
  zypper: ant
package-manager-url: https://formulae.brew.sh/formula/ant
version: 1.10.17
license: Apache-2.0
category: development
tags:
  - cli
description: Java build tool
source-archive: https://www.apache.org/dyn/closer.lua?path=ant/binaries/apache-ant-1.10.17-bin.tar.xz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: ant
  - exposure: global executable
    kind: cli
    name: antRun
  - exposure: global executable
    kind: cli
    name: antRun.pl
  - exposure: global executable
    kind: cli
    name: complete-ant-cmd.pl
  - exposure: global executable
    kind: cli
    name: runant.pl
  - exposure: global executable
    kind: cli
    name: runant.py
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ant
  brew: brew install ant
  chocolatey: choco install ant
  debian: sudo apt install ant
  dnf: sudo dnf install ant
  nix: nix profile install nixpkgs#ant
  pacman: sudo pacman -S ant
  scoop: scoop install main/ant
  ubuntu: sudo apt install ant
  zypper: sudo zypper install ant
provenance:
  formula: ant
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
