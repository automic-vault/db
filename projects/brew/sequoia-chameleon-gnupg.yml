id: brew:sequoia-chameleon-gnupg
display-name: sequoia-chameleon-gnupg
homepage: https://sequoia-pgp.org
repo: >
  https://gitlab.com/sequoia-pgp/sequoia-chameleon-gnupg/-/archive/v0.13.1/sequoia-chameleon-gnupg-v0.13.1.tar.bz2
docs: https://sequoia-pgp.org
package-manager:
  apk: sequoia-chameleon-gnupg
  brew: sequoia-chameleon-gnupg
  debian: sequoia-chameleon-gnupg
  dnf: sequoia-chameleon-gnupg
  macports: sequoia-chameleon-gnupg
  nix: sequoia-chameleon-gnupg
  pacman: sequoia-chameleon-gnupg
  ubuntu: sequoia-chameleon-gnupg
package-manager-url: https://formulae.brew.sh/formula/sequoia-chameleon-gnupg
version: 0.13.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Reimplementatilon of gpg and gpgv using Sequoia
source-archive: >
  https://gitlab.com/sequoia-pgp/sequoia-chameleon-gnupg/-/archive/v0.13.1/sequoia-chameleon-gnupg-v0.13.1.tar.bz2
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: gpg-sq
  - exposure: global executable
    kind: cli
    name: gpgv-sq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sequoia-chameleon-gnupg
  av: sudo av install brew:sequoia-chameleon-gnupg
  brew: brew install sequoia-chameleon-gnupg
  debian: sudo apt install sequoia-chameleon-gnupg
  dnf: sudo dnf install sequoia-chameleon-gnupg
  macports: sudo port install sequoia-chameleon-gnupg
  nix: nix profile install nixpkgs#sequoia-chameleon-gnupg
  pacman: sudo pacman -S sequoia-chameleon-gnupg
  ubuntu: sudo apt install sequoia-chameleon-gnupg
provenance:
  formula: sequoia-chameleon-gnupg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
