id: brew:gitversion
display-name: gitversion
homepage: https://gitversion.net/docs/
repo: https://github.com/GitTools/GitVersion
docs: https://gitversion.net/docs/
package-manager:
  brew: gitversion
  chocolatey: GitVersion
  scoop: main/gitversion
  winget: GitTools.GitVersion
package-manager-url: https://formulae.brew.sh/formula/gitversion
version: 6.7.0
license: MIT
category: development
tags:
  - cli
  - git
description: Easy semantic versioning for projects using Git
source-archive: https://github.com/GitTools/GitVersion/archive/refs/tags/6.7.0.tar.gz
dependencies:
  - dotnet
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: gitversion
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gitversion
  brew: brew install gitversion
  chocolatey: choco install GitVersion
  scoop: scoop install main/gitversion
  winget: winget install --id GitTools.GitVersion -e
provenance:
  formula: gitversion
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
