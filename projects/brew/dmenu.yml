id: brew:dmenu
display-name: dmenu
homepage: https://tools.suckless.org/dmenu/
repo: https://dl.suckless.org/tools/dmenu-5.4.tar.gz
docs: https://tools.suckless.org/dmenu/
package-manager:
  apk: dmenu
  brew: dmenu
  dnf: dmenu
  macports: dmenu
  nix: dmenu
  pacman: dmenu
  zypper: dmenu
package-manager-url: https://formulae.brew.sh/formula/dmenu
version: 5.4
license: MIT
category: network
tags:
  - cli
description: Dynamic menu for X11
source-archive: https://dl.suckless.org/tools/dmenu-5.4.tar.gz
dependencies:
  - fontconfig
  - libx11
  - libxft
  - libxinerama
executables:
  - exposure: global executable
    kind: cli
    name: dmenu
  - exposure: global executable
    kind: cli
    name: dmenu_path
  - exposure: global executable
    kind: cli
    name: dmenu_run
  - exposure: global executable
    kind: cli
    name: stest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dmenu
  av: sudo av install brew:dmenu
  brew: brew install dmenu
  dnf: sudo dnf install dmenu
  macports: sudo port install dmenu
  nix: nix profile install nixpkgs#dmenu
  pacman: sudo pacman -S dmenu
  zypper: sudo zypper install dmenu
provenance:
  formula: dmenu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
