id: brew:wdiff
display-name: wdiff
homepage: https://www.gnu.org/software/wdiff/
repo: https://ftpmirror.gnu.org/gnu/wdiff/wdiff-1.2.2.tar.gz
docs: https://www.gnu.org/software/wdiff/
package-manager:
  brew: wdiff
  debian: wdiff
  dnf: wdiff
  macports: wdiff
  nix: wdiff
  pacman: wdiff
  ubuntu: wdiff
  zypper: wdiff
package-manager-url: https://formulae.brew.sh/formula/wdiff
version: 1.2.2
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Display word differences between text files
source-archive: https://ftpmirror.gnu.org/gnu/wdiff/wdiff-1.2.2.tar.gz
dependencies:
  - gettext
build-dependencies:
  - texinfo
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: mdiff
  - exposure: global executable
    kind: cli
    name: unify
  - exposure: global executable
    kind: cli
    name: wdiff
  - exposure: global executable
    kind: cli
    name: wdiff2
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wdiff
  brew: brew install wdiff
  debian: sudo apt install wdiff
  dnf: sudo dnf install wdiff
  macports: sudo port install wdiff
  nix: nix profile install nixpkgs#wdiff
  pacman: sudo pacman -S wdiff
  ubuntu: sudo apt install wdiff
  zypper: sudo zypper install wdiff
provenance:
  formula: wdiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
