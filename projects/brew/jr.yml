id: brew:jr
display-name: jr
homepage: https://jrnd.io/
repo: https://github.com/jrnd-io/jr
docs: https://jrnd.io/
package-manager:
  brew: jr
package-manager-url: https://formulae.brew.sh/formula/jr
version: 0.4.0
license: MIT
category: development
tags:
  - cli
description: CLI program that helps you to create quality random data for your applications
source-archive: https://github.com/jrnd-io/jr/archive/refs/tags/v0.4.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jr
  brew: brew install jr
provenance:
  formula: jr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
