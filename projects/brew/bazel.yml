id: brew:bazel
display-name: bazel
homepage: https://bazel.build/
repo: https://github.com/bazelbuild/bazel
docs: https://bazel.build/
package-manager:
  brew: bazel
  chocolatey: bazel
  macports: bazel
  nix: bazel
  pacman: bazel
  scoop: main/bazel
  winget: Bazel.Bazel
package-manager-url: https://formulae.brew.sh/formula/bazel
version: 9.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: Google's own build tool
source-archive: https://github.com/bazelbuild/bazel/releases/download/9.1.0/bazel-9.1.0-dist.zip
dependencies:
  - openjdk@21
uses-from-macos:
  - unzip
  - zip
executables:
  - exposure: global executable
    kind: cli
    name: bazel-9.1.0
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:bazel
  brew: brew install bazel
  chocolatey: choco install bazel
  macports: sudo port install bazel
  nix: nix profile install nixpkgs#bazel
  pacman: sudo pacman -S bazel
  scoop: scoop install main/bazel
  winget: winget install --id Bazel.Bazel -e
provenance:
  formula: bazel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
