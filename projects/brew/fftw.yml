id: brew:fftw
display-name: fftw
homepage: https://fftw.org
repo: https://fftw.org/fftw-3.3.11.tar.gz
docs: https://fftw.org
package-manager:
  apk: fftw
  brew: fftw
  dnf: fftw
  macports: fftw
  nix: fftw
  pacman: fftw
package-manager-url: https://formulae.brew.sh/formula/fftw
version: 3.3.11
license: GPL-2.0-or-later AND BSD-2-Clause
category: network
tags:
  - cli
description: C routines to compute the Discrete Fourier Transform
source-archive: https://fftw.org/fftw-3.3.11.tar.gz
dependencies:
  - libomp
build-dependencies:
  - open-mpi
executables:
  - exposure: global executable
    kind: cli
    name: fftw-wisdom
  - exposure: global executable
    kind: cli
    name: fftw-wisdom-to-conf
  - exposure: global executable
    kind: cli
    name: fftwf-wisdom
  - exposure: global executable
    kind: cli
    name: fftwl-wisdom
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fftw
  av: sudo av install brew:fftw
  brew: brew install fftw
  dnf: sudo dnf install fftw
  macports: sudo port install fftw
  nix: nix profile install nixpkgs#fftw
  pacman: sudo pacman -S fftw
provenance:
  formula: fftw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
