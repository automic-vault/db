id: brew:mailpit
display-name: mailpit
homepage: https://mailpit.axllent.org/
repo: https://github.com/axllent/mailpit
docs: https://mailpit.axllent.org/
package-manager:
  brew: mailpit
  macports: mailpit
  nix: mailpit
  scoop: main/mailpit
  winget: axllent.mailpit
package-manager-url: https://formulae.brew.sh/formula/mailpit
version: 1.30.0
license: MIT
category: development
tags:
  - cli
description: Web and API based SMTP testing
source-archive: https://github.com/axllent/mailpit/archive/refs/tags/v1.30.0.tar.gz
build-dependencies:
  - go
  - node
executables:
  - exposure: global executable
    kind: cli
    name: mailpit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:mailpit
  brew: brew install mailpit
  macports: sudo port install mailpit
  nix: nix profile install nixpkgs#mailpit
  scoop: scoop install main/mailpit
  winget: winget install --id axllent.mailpit -e
provenance:
  formula: mailpit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
