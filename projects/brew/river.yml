id: brew:river
display-name: river
homepage: https://github.com/memorysafety/river
repo: https://github.com/memorysafety/river
docs: https://github.com/memorysafety/river
package-manager:
  apk: river
  brew: river
  dnf: river
  nix: river
  pacman: river
  zypper: river
package-manager-url: https://formulae.brew.sh/formula/river
version: 0.5.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Reverse proxy application, based on the pingora library from Cloudflare
source-archive: https://github.com/memorysafety/river/archive/refs/tags/v0.5.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - cmake
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: river
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add river
  av: sudo av install brew:river
  brew: brew install river
  dnf: sudo dnf install river
  nix: nix profile install nixpkgs#river
  pacman: sudo pacman -S river
  zypper: sudo zypper install river
provenance:
  formula: river
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
