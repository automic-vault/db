id: brew:exim
display-name: exim
homepage: https://exim.org
repo: https://ftp.exim.org/pub/exim/exim4/exim-4.99.3.tar.xz
docs: https://exim.org
package-manager:
  apk: exim
  brew: exim
  dnf: exim
  macports: exim
  nix: exim
  pacman: exim
  zypper: exim
package-manager-url: https://formulae.brew.sh/formula/exim
version: 4.99.3
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Complete replacement for sendmail
source-archive: https://ftp.exim.org/pub/exim/exim4/exim-4.99.3.tar.xz
dependencies:
  - openssl@3
  - pcre2
uses-from-macos:
  - libxcrypt
  - perl
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: exicyclog
  - exposure: global executable
    kind: cli
    name: exigrep
  - exposure: global executable
    kind: cli
    name: exim
  - exposure: global executable
    kind: cli
    name: exim-4.99.3-2
  - exposure: global executable
    kind: cli
    name: exim_checkaccess
  - exposure: global executable
    kind: cli
    name: exim_ctl
  - exposure: global executable
    kind: cli
    name: exim_dbmbuild
  - exposure: global executable
    kind: cli
    name: exim_dumpdb
  - exposure: global executable
    kind: cli
    name: exim_fixdb
  - exposure: global executable
    kind: cli
    name: exim_id_update
  - exposure: global executable
    kind: cli
    name: exim_lock
  - exposure: global executable
    kind: cli
    name: exim_msgdate
  - exposure: global executable
    kind: cli
    name: exim_tidydb
  - exposure: global executable
    kind: cli
    name: eximstats
  - exposure: global executable
    kind: cli
    name: exinext
  - exposure: global executable
    kind: cli
    name: exipick
  - exposure: global executable
    kind: cli
    name: exiqgrep
  - exposure: global executable
    kind: cli
    name: exiqsumm
  - exposure: global executable
    kind: cli
    name: exiwhat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: "Start with: exim_ctl start Don't forget to run it as root to be able to bind port 25."
  post-install-defined: false
install-lines:
  apk: sudo apk add exim
  av: sudo av install brew:exim
  brew: brew install exim
  dnf: sudo dnf install exim
  macports: sudo port install exim
  nix: nix profile install nixpkgs#exim
  pacman: sudo pacman -S exim
  zypper: sudo zypper install exim
provenance:
  formula: exim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
