id: brew:gti
display-name: gti
homepage: https://r-wos.org/hacks/gti
repo: https://github.com/rwos/gti
docs: https://r-wos.org/hacks/gti
package-manager:
  brew: gti
  dnf: gti
  macports: gti
  nix: gti
  zypper: gti
package-manager-url: https://formulae.brew.sh/formula/gti
version: 1.9.1
license: MIT
category: development
tags:
  - cli
description: ASCII-art displaying typo-corrector for commands
source-archive: https://github.com/rwos/gti/archive/refs/tags/v1.9.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: gti
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gti
  brew: brew install gti
  dnf: sudo dnf install gti
  macports: sudo port install gti
  nix: nix profile install nixpkgs#gti
  zypper: sudo zypper install gti
provenance:
  formula: gti
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
