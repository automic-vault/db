id: brew:ondir
display-name: ondir
homepage: https://swapoff.org/ondir.html
repo: https://swapoff.org/files/ondir/ondir-0.2.4.tar.gz
docs: https://swapoff.org/ondir.html
package-manager:
  brew: ondir
  debian: ondir
  macports: ondir
  nix: ondir
  ubuntu: ondir
package-manager-url: https://formulae.brew.sh/formula/ondir
version: 0.2.4
