    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ondir
  brew: brew install ondir
  debian: sudo apt install ondir
  macports: sudo port install ondir
  nix: nix profile install nixpkgs#ondir
  ubuntu: sudo apt install ondir
provenance:
  formula: ondir
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
