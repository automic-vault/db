id: brew:cracklib
display-name: cracklib
homepage: https://github.com/cracklib/cracklib
repo: https://github.com/cracklib/cracklib
docs: https://github.com/cracklib/cracklib
package-manager:
  apk: cracklib
  brew: cracklib
  dnf: cracklib
  macports: cracklib
  nix: cracklib
  pacman: cracklib
  zypper: cracklib
package-manager-url: https://formulae.brew.sh/formula/cracklib
version: 2.10.3
license: LGPL-2.1-only
category: security
tags:
  - cli
description: LibCrack password checking library
source-archive: https://github.com/cracklib/cracklib/releases/download/v2.10.3/cracklib-2.10.3.tar.bz2
dependencies:
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: cracklib-check
  - exposure: global executable
    kind: cli
    name: cracklib-format
  - exposure: global executable
    kind: cli
    name: cracklib-packer
  - exposure: global executable
    kind: cli
    name: cracklib-unpacker
  - exposure: global executable
    kind: cli
    name: cracklib-update
  - exposure: global executable
    kind: cli
    name: create-cracklib-dict
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add cracklib
  av: sudo av install brew:cracklib
  brew: brew install cracklib
  dnf: sudo dnf install cracklib
  macports: sudo port install cracklib
  nix: nix profile install nixpkgs#cracklib
  pacman: sudo pacman -S cracklib
  zypper: sudo zypper install cracklib
provenance:
  formula: cracklib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
