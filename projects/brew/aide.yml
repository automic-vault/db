id: brew:aide
display-name: aide
homepage: https://aide.github.io/
repo: https://github.com/aide/aide
docs: https://aide.github.io/
package-manager:
  apk: aide
  brew: aide
  debian: aide
  dnf: aide
  macports: aide
  nix: aide
  ubuntu: aide
  winget: CodeStory.Aide
  zypper: aide
package-manager-url: https://formulae.brew.sh/formula/aide
version: 0.19.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: File and directory integrity checker
source-archive: https://github.com/aide/aide/releases/download/v0.19.3/aide-0.19.3.tar.gz
dependencies:
  - libgcrypt
  - libgpg-error
  - pcre2
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: aide
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add aide
  av: sudo av install brew:aide
  brew: brew install aide
  debian: sudo apt install aide
  dnf: sudo dnf install aide
  macports: sudo port install aide
  nix: nix profile install nixpkgs#aide
  ubuntu: sudo apt install aide
  winget: winget install --id CodeStory.Aide -e
  zypper: sudo zypper install aide
provenance:
  formula: aide
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
