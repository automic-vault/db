id: brew:openstackclient
display-name: openstackclient
homepage: https://openstack.org
repo: >
  https://files.pythonhosted.org/packages/b3/f9/6e17721c9e531c61a7a6eaebb89865b95517786a27422b5e3ee586b3551b/python_openstackclient-10.0.0.tar.gz
docs: https://openstack.org
package-manager:
  brew: openstackclient
  nix: openstackclient
package-manager-url: https://formulae.brew.sh/formula/openstackclient
version: 10.0.0
license: Apache-2.0
category: network
tags:
  - cli
description: Command-line client for OpenStack
source-archive: >
  https://files.pythonhosted.org/packages/b3/f9/6e17721c9e531c61a7a6eaebb89865b95517786a27422b5e3ee586b3551b/python_openstackclient-10.0.0.tar.gz
dependencies:
  - certifi
  - cryptography
  - libyaml
  - python@3.14
  - rpds-py
executables:
  - exposure: global executable
    kind: cli
    name: openstack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:openstackclient
  brew: brew install openstackclient
  nix: nix profile install nixpkgs#openstackclient
provenance:
  formula: openstackclient
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
