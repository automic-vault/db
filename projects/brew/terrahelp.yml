id: brew:terrahelp
display-name: terrahelp
homepage: https://github.com/opencredo/terrahelp
repo: https://github.com/opencredo/terrahelp
docs: https://github.com/opencredo/terrahelp
package-manager:
  brew: terrahelp
package-manager-url: https://formulae.brew.sh/formula/terrahelp
version: 0.7.5
license: Apache-2.0
category: cloud
tags:
  - cli
description: Tool providing extra functionality for Terraform
source-archive: https://github.com/opencredo/terrahelp/archive/refs/tags/v0.7.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terrahelp
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terrahelp
  brew: brew install terrahelp
provenance:
  formula: terrahelp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
