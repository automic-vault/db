id: brew:liqoctl
display-name: liqoctl
homepage: https://liqo.io
repo: https://github.com/liqotech/liqo
docs: https://liqo.io
package-manager:
  brew: liqoctl
package-manager-url: https://formulae.brew.sh/formula/liqoctl
version: 1.1.1
license: Apache-2.0
category: development
tags:
  - cli
description: Is a CLI tool to install and manage Liqo-enabled clusters
source-archive: https://github.com/liqotech/liqo/archive/refs/tags/v1.1.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: liqoctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:liqoctl
  brew: brew install liqoctl
provenance:
  formula: liqoctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
