id: brew:litra
display-name: litra
homepage: https://github.com/timrogers/litra-rs
repo: https://github.com/timrogers/litra-rs
docs: https://github.com/timrogers/litra-rs
package-manager:
  brew: litra
package-manager-url: https://formulae.brew.sh/formula/litra
version: 3.3.0
license: MIT
category: development
tags:
  - cli
description: Control Logitech Litra lights from the command-line
source-archive: https://github.com/timrogers/litra-rs/archive/refs/tags/v3.3.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: litra
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:litra
  brew: brew install litra
provenance:
  formula: litra
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
