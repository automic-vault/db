id: brew:ps2eps
display-name: ps2eps
homepage: https://github.com/roland-bless/ps2eps
repo: https://github.com/roland-bless/ps2eps
docs: https://github.com/roland-bless/ps2eps
package-manager:
  brew: ps2eps
  debian: ps2eps
  macports: ps2eps
  nix: ps2eps
  ubuntu: ps2eps
package-manager-url: https://formulae.brew.sh/formula/ps2eps
version: 1.70
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Convert PostScript to EPS files
source-archive: https://github.com/roland-bless/ps2eps/archive/refs/tags/v1.70.tar.gz
dependencies:
  - ghostscript
executables:
  - exposure: global executable
    kind: cli
    name: bbox
  - exposure: global executable
    kind: cli
    name: ps2eps
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ps2eps
  brew: brew install ps2eps
  debian: sudo apt install ps2eps
  macports: sudo port install ps2eps
  nix: nix profile install nixpkgs#ps2eps
  ubuntu: sudo apt install ps2eps
provenance:
  formula: ps2eps
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
