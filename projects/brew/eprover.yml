id: brew:eprover
display-name: eprover
homepage: https://eprover.org/
repo: https://wwwlehre.dhbw-stuttgart.de/~sschulz/WORK/E_DOWNLOAD/V_3.2/E.tgz
docs: https://eprover.org/
package-manager:
  brew: eprover
  debian: eprover
  dnf: picosat
  macports: picosat
  nix: eprover
  ubuntu: eprover
package-manager-url: https://formulae.brew.sh/formula/eprover
version: 3.2
license: GPL-2.0-or-later OR LGPL-2.1-or-later
category: network
tags:
  - cli
description: Theorem prover for full first-order logic with equality
source-archive: https://wwwlehre.dhbw-stuttgart.de/~sschulz/WORK/E_DOWNLOAD/V_3.2/E.tgz
executables:
  - exposure: global executable
    kind: cli
    name: checkproof
  - exposure: global executable
    kind: cli
    name: e_axfilter
  - exposure: global executable
    kind: cli
    name: e_deduction_server
  - exposure: global executable
    kind: cli
    name: e_ltb_runner
  - exposure: global executable
    kind: cli
    name: e_stratpar
  - exposure: global executable
    kind: cli
    name: eground
  - exposure: global executable
    kind: cli
    name: ekb_create
  - exposure: global executable
    kind: cli
    name: ekb_delete
  - exposure: global executable
    kind: cli
    name: ekb_ginsert
  - exposure: global executable
    kind: cli
    name: ekb_insert
  - exposure: global executable
    kind: cli
    name: epclextract
  - exposure: global executable
    kind: cli
    name: eprover
  - exposure: global executable
    kind: cli
    name: picosat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:eprover
  brew: brew install eprover
  debian: sudo apt install eprover
  dnf: sudo dnf install picosat
  macports: sudo port install picosat
  nix: nix profile install nixpkgs#eprover
  ubuntu: sudo apt install eprover
provenance:
  formula: eprover
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
