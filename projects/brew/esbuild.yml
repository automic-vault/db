id: brew:esbuild
display-name: esbuild
homepage: https://esbuild.github.io/
repo: https://github.com/evanw/esbuild
docs: https://esbuild.github.io/
package-manager:
  apk: esbuild
  brew: esbuild
  debian: esbuild
  nix: esbuild
  pacman: esbuild
  ubuntu: esbuild
  zypper: esbuild
package-manager-url: https://formulae.brew.sh/formula/esbuild
version: 0.28.0
license: MIT
category: development
tags:
  - cli
description: Extremely fast JavaScript bundler and minifier
source-archive: https://github.com/evanw/esbuild/archive/refs/tags/v0.28.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: esbuild
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add esbuild
  av: sudo av install brew:esbuild
  brew: brew install esbuild
  debian: sudo apt install esbuild
  nix: nix profile install nixpkgs#esbuild
  pacman: sudo pacman -S esbuild
  ubuntu: sudo apt install esbuild
  zypper: sudo zypper install esbuild
provenance:
  formula: esbuild
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
