id: brew:lavat
display-name: lavat
homepage: https://github.com/AngelJumbo/lavat
repo: https://github.com/AngelJumbo/lavat
docs: https://github.com/AngelJumbo/lavat
package-manager:
  brew: lavat
  nix: lavat
package-manager-url: https://formulae.brew.sh/formula/lavat
version: 3.0.0
license: MIT
category: development
tags:
  - cli
description: Lava lamp simulation using metaballs in the terminal
source-archive: https://github.com/AngelJumbo/lavat/archive/refs/tags/v3.0.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lavat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lavat
  brew: brew install lavat
  nix: nix profile install nixpkgs#lavat
provenance:
  formula: lavat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
