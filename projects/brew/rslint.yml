id: brew:rslint
display-name: rslint
homepage: https://rslint.org/
repo: https://github.com/rslint/rslint
docs: https://rslint.org/
package-manager:
  brew: rslint
  nix: rslint
package-manager-url: https://formulae.brew.sh/formula/rslint
version: 0.3.2
license: MIT
category: development
tags:
  - cli
description: Extremely fast JavaScript and TypeScript linter
source-archive: https://github.com/rslint/rslint/archive/refs/tags/v0.3.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rslint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rslint
  brew: brew install rslint
  nix: nix profile install nixpkgs#rslint
provenance:
  formula: rslint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
