id: brew:kuttl
display-name: kuttl
homepage: https://github.com/kudobuilder/kuttl
repo: https://github.com/kudobuilder/kuttl
docs: https://github.com/kudobuilder/kuttl
package-manager:
  brew: kuttl
  nix: kuttl
  zypper: kuttl
package-manager-url: https://formulae.brew.sh/formula/kuttl
version: 0.26.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: KUbernetes Test TooL
source-archive: https://github.com/kudobuilder/kuttl/archive/refs/tags/v0.26.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubectl-kuttl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kuttl
  brew: brew install kuttl
  nix: nix profile install nixpkgs#kuttl
  zypper: sudo zypper install kuttl
provenance:
  formula: kuttl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
