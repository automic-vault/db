id: brew:syncthing
display-name: syncthing
homepage: https://syncthing.net/
repo: https://github.com/syncthing/syncthing
docs: https://syncthing.net/
package-manager:
  apk: syncthing
  brew: syncthing
  chocolatey: syncthing
  debian: syncthing
  dnf: syncthing
  macports: syncthing
  pacman: syncthing
  scoop: main/syncthing
  ubuntu: syncthing
  winget: BillStewart.SyncthingWindowsSetup
  zypper: syncthing
package-manager-url: https://formulae.brew.sh/formula/syncthing
version: 2.1.0
license: MPL-2.0
category: development
tags:
  - cli
description: Open source continuous file synchronization application
source-archive: https://github.com/syncthing/syncthing/archive/refs/tags/v2.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: syncthing
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add syncthing
  av: sudo av install brew:syncthing
  brew: brew install syncthing
  chocolatey: choco install syncthing
  debian: sudo apt install syncthing
  dnf: sudo dnf install syncthing
  macports: sudo port install syncthing
  pacman: sudo pacman -S syncthing
  scoop: scoop install main/syncthing
  ubuntu: sudo apt install syncthing
  winget: winget install --id BillStewart.SyncthingWindowsSetup -e
  zypper: sudo zypper install syncthing
provenance:
  formula: syncthing
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
