id: brew:vcluster
display-name: vcluster
homepage: https://www.vcluster.com
repo: https://github.com/loft-sh/vcluster
docs: https://www.vcluster.com
package-manager:
  brew: vcluster
  nix: vcluster
  scoop: main/vcluster
  winget: loft-sh.vcluster
package-manager-url: https://formulae.brew.sh/formula/vcluster
version: 0.34.0
license: Apache-2.0
category: development
tags:
  - cli
description: Creates fully functional virtual k8s cluster inside host k8s cluster's namespace
source-archive: https://github.com/loft-sh/vcluster.git
dependencies:
  - helm
  - kubernetes-cli
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vcluster
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vcluster
  brew: brew install vcluster
  nix: nix profile install nixpkgs#vcluster
  scoop: scoop install main/vcluster
  winget: winget install --id loft-sh.vcluster -e
provenance:
  formula: vcluster
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
