id: brew:pkl-lsp
display-name: pkl-lsp
homepage: https://pkl-lang.org/lsp/current/index.html
repo: https://github.com/apple/pkl-lsp
docs: https://pkl-lang.org/lsp/current/index.html
package-manager:
  brew: pkl-lsp
  nix: pkl-lsp
package-manager-url: https://formulae.brew.sh/formula/pkl-lsp
version: 0.7.0
license: Apache-2.0
category: development
tags:
  - cli
description: Language server for Pkl
source-archive: https://github.com/apple/pkl-lsp/releases/download/0.7.0/pkl-lsp-0.7.0.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: pkl-lsp
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pkl-lsp
  brew: brew install pkl-lsp
  nix: nix profile install nixpkgs#pkl-lsp
provenance:
  formula: pkl-lsp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
