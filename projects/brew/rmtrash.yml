id: brew:rmtrash
display-name: rmtrash
homepage: https://github.com/TBXark/rmtrash
repo: https://github.com/TBXark/rmtrash
docs: https://github.com/TBXark/rmtrash
package-manager:
  brew: rmtrash
  macports: rmtrash
  nix: rmtrash
package-manager-url: https://formulae.brew.sh/formula/rmtrash
version: 0.7.0
license: MIT
category: development
tags:
  - cli
description: Move files and directories to the trash
source-archive: https://github.com/TBXark/rmtrash/archive/refs/tags/0.7.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: rmtrash
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rmtrash
  brew: brew install rmtrash
  macports: sudo port install rmtrash
  nix: nix profile install nixpkgs#rmtrash
provenance:
  formula: rmtrash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
