id: brew:cppi
display-name: cppi
homepage: https://www.gnu.org/software/cppi/
repo: https://ftpmirror.gnu.org/gnu/cppi/cppi-1.18.tar.xz
docs: https://www.gnu.org/software/cppi/
package-manager:
  brew: cppi
  debian: cppi
  dnf: cppi
  nix: cppi
  zypper: cppi
package-manager-url: https://formulae.brew.sh/formula/cppi
version: 1.18
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Indent C preprocessor directives to reflect their nesting
source-archive: https://ftpmirror.gnu.org/gnu/cppi/cppi-1.18.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: cppi
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cppi
  brew: brew install cppi
  debian: sudo apt install cppi
  dnf: sudo dnf install cppi
  nix: nix profile install nixpkgs#cppi
  zypper: sudo zypper install cppi
provenance:
  formula: cppi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
