id: brew:libgfshare
display-name: libgfshare
homepage: https://github.com/kinnison/libgfshare
repo: https://github.com/kinnison/libgfshare
docs: https://github.com/kinnison/libgfshare
package-manager:
  brew: libgfshare
  macports: libgfshare
  pacman: libgfshare
package-manager-url: https://formulae.brew.sh/formula/libgfshare
version: 2.0.0
license: MIT
category: security
tags:
  - cli
description: Library for sharing secrets
source-archive: https://github.com/kinnison/libgfshare/archive/refs/tags/2.0.0.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: gfcombine
  - exposure: global executable
    kind: cli
    name: gfsplit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libgfshare
  brew: brew install libgfshare
  macports: sudo port install libgfshare
  pacman: sudo pacman -S libgfshare
provenance:
  formula: libgfshare
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
