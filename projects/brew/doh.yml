id: brew:doh
display-name: doh
homepage: https://github.com/curl/doh
repo: https://github.com/curl/doh
docs: https://github.com/curl/doh
package-manager:
  brew: doh
  dnf: doh
  zypper: doh
package-manager-url: https://formulae.brew.sh/formula/doh
version: 0.1
license: MIT
category: development
tags:
  - cli
description: Stand-alone DNS-over-HTTPS resolver using libcurl
source-archive: https://github.com/curl/doh/archive/refs/tags/doh-0.1.tar.gz
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: doh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:doh
  brew: brew install doh
  dnf: sudo dnf install doh
  zypper: sudo zypper install doh
provenance:
  formula: doh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
