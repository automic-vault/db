id: brew:nano
display-name: nano
homepage: https://www.nano-editor.org/
repo: https://www.nano-editor.org/dist/v9/nano-9.0.tar.xz
docs: https://www.nano-editor.org/
package-manager:
  apk: nano
  brew: nano
  chocolatey: nano
  debian: nano
  dnf: nano
  macports: nano
  nix: nano
  pacman: nano
  scoop: main/nano
  ubuntu: nano
  winget: GNU.Nano
  zypper: nano
package-manager-url: https://formulae.brew.sh/formula/nano
version: 9.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Free (GNU) replacement for the Pico text editor
source-archive: https://www.nano-editor.org/dist/v9/nano-9.0.tar.xz
dependencies:
  - gettext
  - ncurses
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: nano
  - exposure: global executable
    kind: cli
    name: rnano
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    A sample configuration file is available at
    $HOMEBREW_PREFIX/share/doc/nano/sample.nanorc See `man nanorc` for more information.
  post-install-defined: false
install-lines:
  apk: sudo apk add nano
  av: sudo av install brew:nano
  brew: brew install nano
  chocolatey: choco install nano
  debian: sudo apt install nano
  dnf: sudo dnf install nano
  macports: sudo port install nano
  nix: nix profile install nixpkgs#nano
  pacman: sudo pacman -S nano
  scoop: scoop install main/nano
  ubuntu: sudo apt install nano
  winget: winget install --id GNU.Nano -e
  zypper: sudo zypper install nano
provenance:
  formula: nano
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
