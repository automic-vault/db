id: brew:xcdiff
display-name: xcdiff
homepage: https://github.com/bloomberg/xcdiff
repo: https://github.com/bloomberg/xcdiff
docs: https://github.com/bloomberg/xcdiff
package-manager:
  brew: xcdiff
package-manager-url: https://formulae.brew.sh/formula/xcdiff
version: 0.14.0
