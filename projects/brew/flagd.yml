id: brew:flagd
display-name: flagd
homepage: https://github.com/open-feature/flagd
repo: https://github.com/open-feature/flagd
docs: https://github.com/open-feature/flagd
package-manager:
  brew: flagd
package-manager-url: https://formulae.brew.sh/formula/flagd
version: 0.15.5
license: Apache-2.0
category: development
tags:
  - cli
description: Feature flag daemon with a Unix philosophy
source-archive: https://github.com/open-feature/flagd.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: flagd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flagd
  brew: brew install flagd
provenance:
  formula: flagd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
