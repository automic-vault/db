id: brew:kubeshark
display-name: kubeshark
homepage: https://kubeshark.com
repo: https://github.com/kubeshark/kubeshark
docs: https://kubeshark.com
package-manager:
  brew: kubeshark
  nix: kubeshark
  scoop: main/kubeshark
package-manager-url: https://formulae.brew.sh/formula/kubeshark
version: 53.3.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: API Traffic Analyzer providing real-time visibility into Kubernetes network
source-archive: https://github.com/kubeshark/kubeshark/archive/refs/tags/v53.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubeshark
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubeshark
  brew: brew install kubeshark
  nix: nix profile install nixpkgs#kubeshark
  scoop: scoop install main/kubeshark
provenance:
  formula: kubeshark
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
