id: brew:tex-fmt
display-name: tex-fmt
homepage: https://wgunderwood.github.io/tex-fmt/
repo: https://github.com/WGUNDERWOOD/tex-fmt
docs: https://wgunderwood.github.io/tex-fmt/
package-manager:
  brew: tex-fmt
  debian: tex-fmt
  nix: tex-fmt
  scoop: extras/tex-fmt
package-manager-url: https://formulae.brew.sh/formula/tex-fmt
version: 0.5.7
license: MIT
category: development
tags:
  - cli
description: Extremely fast LaTeX formatter written in Rust
source-archive: https://github.com/WGUNDERWOOD/tex-fmt/archive/refs/tags/v0.5.7.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tex-fmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tex-fmt
  brew: brew install tex-fmt
  debian: sudo apt install tex-fmt
  nix: nix profile install nixpkgs#tex-fmt
  scoop: scoop install extras/tex-fmt
provenance:
  formula: tex-fmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
