id: brew:swift-format
display-name: swift-format
homepage: https://github.com/swiftlang/swift-format
repo: https://github.com/swiftlang/swift-format
docs: https://github.com/swiftlang/swift-format
package-manager:
  brew: swift-format
package-manager-url: https://formulae.brew.sh/formula/swift-format
version: 602.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: Formatting technology for Swift source code
source-archive: https://github.com/swiftlang/swift-format.git
executables:
  - exposure: global executable
    kind: cli
    name: swift-format
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swift-format
  brew: brew install swift-format
provenance:
  formula: swift-format
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
