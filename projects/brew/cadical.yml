id: brew:cadical
display-name: cadical
homepage: https://fmv.jku.at/cadical/
repo: https://github.com/arminbiere/cadical
docs: https://fmv.jku.at/cadical/
package-manager:
  brew: cadical
  debian: cadical
  dnf: cadical
  nix: cadical
  ubuntu: cadical
package-manager-url: https://formulae.brew.sh/formula/cadical
version: 3.0.0
license: MIT
category: development
tags:
  - cli
description: Clean and efficient state-of-the-art SAT solver
source-archive: https://github.com/arminbiere/cadical/archive/refs/tags/rel-3.0.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: cadical
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cadical
  brew: brew install cadical
  debian: sudo apt install cadical
  dnf: sudo dnf install cadical
  nix: nix profile install nixpkgs#cadical
  ubuntu: sudo apt install cadical
provenance:
  formula: cadical
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
