id: brew:marisa
display-name: marisa
homepage: https://github.com/s-yata/marisa-trie
repo: https://github.com/s-yata/marisa-trie
docs: https://github.com/s-yata/marisa-trie
package-manager:
  brew: marisa
  debian: marisa
  dnf: marisa
  nix: marisa
  pacman: marisa
  ubuntu: marisa
  zypper: marisa
package-manager-url: https://formulae.brew.sh/formula/marisa
version: 0.3.1
license: BSD-2-Clause OR LGPL-2.1-or-later
category: development
tags:
  - cli
description: Matching Algorithm with Recursively Implemented StorAge
source-archive: https://github.com/s-yata/marisa-trie/archive/refs/tags/v0.3.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: marisa-benchmark
  - exposure: global executable
    kind: cli
    name: marisa-build
  - exposure: global executable
    kind: cli
    name: marisa-common-prefix-search
  - exposure: global executable
    kind: cli
    name: marisa-dump
  - exposure: global executable
    kind: cli
    name: marisa-lookup
  - exposure: global executable
    kind: cli
    name: marisa-predictive-search
  - exposure: global executable
    kind: cli
    name: marisa-reverse-lookup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:marisa
  brew: brew install marisa
  debian: sudo apt install marisa
  dnf: sudo dnf install marisa
  nix: nix profile install nixpkgs#marisa
  pacman: sudo pacman -S marisa
  ubuntu: sudo apt install marisa
  zypper: sudo zypper install marisa
provenance:
  formula: marisa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
