id: brew:kyverno
display-name: kyverno
homepage: https://kyverno.io/
repo: https://github.com/kyverno/kyverno
docs: https://kyverno.io/
package-manager:
  brew: kyverno
  nix: kyverno
  winget: kyverno.kyverno
  zypper: kyverno
package-manager-url: https://formulae.brew.sh/formula/kyverno
version: 1.18.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes Native Policy Management
source-archive: https://github.com/kyverno/kyverno/archive/refs/tags/v1.18.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kyverno
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kyverno
  brew: brew install kyverno
  nix: nix profile install nixpkgs#kyverno
  winget: winget install --id kyverno.kyverno -e
  zypper: sudo zypper install kyverno
provenance:
  formula: kyverno
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
