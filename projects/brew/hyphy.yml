id: brew:hyphy
display-name: hyphy
homepage: https://www.hyphy.org
repo: https://github.com/veg/hyphy
docs: https://www.hyphy.org
package-manager:
  brew: hyphy
package-manager-url: https://formulae.brew.sh/formula/hyphy
version: 2.5.99
license: MIT
category: development
tags:
  - cli
description: Hypothesis testing using Phylogenies
source-archive: https://github.com/veg/hyphy/archive/refs/tags/2.5.99.tar.gz
dependencies:
  - libomp
build-dependencies:
  - cmake
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: hyphy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hyphy
  brew: brew install hyphy
provenance:
  formula: hyphy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
