id: brew:helmify
display-name: helmify
homepage: https://github.com/arttor/helmify
repo: https://github.com/arttor/helmify
docs: https://github.com/arttor/helmify
package-manager:
  brew: helmify
  zypper: helmify
package-manager-url: https://formulae.brew.sh/formula/helmify
version: 0.4.20
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
  - yaml
description: Create Helm chart from Kubernetes yaml
source-archive: https://github.com/arttor/helmify/archive/refs/tags/v0.4.20.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: helmify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:helmify
  brew: brew install helmify
  zypper: sudo zypper install helmify
provenance:
  formula: helmify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
