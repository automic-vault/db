id: brew:fileql
display-name: fileql
homepage: https://github.com/AmrDeveloper/FileQL
repo: https://github.com/AmrDeveloper/FileQL
docs: https://github.com/AmrDeveloper/FileQL
package-manager:
  brew: fileql
  winget: amrdeveloper.fileql
package-manager-url: https://formulae.brew.sh/formula/fileql
version: 0.10.0
license: MIT
category: database
tags:
  - cli
  - database
description: Run SQL-like query on local files instead of database files using the GitQL SDK
source-archive: https://github.com/AmrDeveloper/FileQL/archive/refs/tags/0.10.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fileql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fileql
  brew: brew install fileql
  winget: winget install --id amrdeveloper.fileql -e
provenance:
  formula: fileql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
