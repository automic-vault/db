id: brew:cdpr
display-name: cdpr
homepage: https://www.monkeymental.com/
repo: https://downloads.sourceforge.net/project/cdpr/cdpr/2.4/cdpr-2.4.tgz
docs: https://www.monkeymental.com/
package-manager:
  brew: cdpr
  debian: cdpr
  macports: cdpr
  nix: cdpr
  ubuntu: cdpr
package-manager-url: https://formulae.brew.sh/formula/cdpr
version: 2.4
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Cisco Discovery Protocol Reporter
source-archive: https://downloads.sourceforge.net/project/cdpr/cdpr/2.4/cdpr-2.4.tgz
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: cdpr
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    run cdpr sudo'd in order to avoid the error: 'No interfaces found! Make sure pcap is
    installed.'
  post-install-defined: false
install-lines:
  av: sudo av install brew:cdpr
  brew: brew install cdpr
  debian: sudo apt install cdpr
  macports: sudo port install cdpr
  nix: nix profile install nixpkgs#cdpr
  ubuntu: sudo apt install cdpr
provenance:
  formula: cdpr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
