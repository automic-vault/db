id: brew:sox
display-name: sox
homepage: https://sox.sourceforge.net/
repo: https://downloads.sourceforge.net/project/sox/sox/14.4.2/sox-14.4.2.tar.gz
docs: https://sox.sourceforge.net/
package-manager:
  apk: sox
  brew: sox
  debian: sox
  dnf: sox
  macports: sox
  nix: sox
  pacman: sox
  scoop: main/sox
  ubuntu: sox
  winget: ChrisBagwell.SoX
  zypper: sox
package-manager-url: https://formulae.brew.sh/formula/sox
version: 14.4.2
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: network
tags:
  - cli
description: 'SOund eXchange: universal sound sample translator'
source-archive: https://downloads.sourceforge.net/project/sox/sox/14.4.2/sox-14.4.2.tar.gz
dependencies:
  - flac
  - lame
  - libogg
  - libpng
  - libsndfile
  - libvorbis
  - mad
  - opusfile
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: play
  - exposure: global executable
    kind: cli
    name: rec
  - exposure: global executable
    kind: cli
    name: sox
  - exposure: global executable
    kind: cli
    name: soxi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sox
  av: sudo av install brew:sox
  brew: brew install sox
  debian: sudo apt install sox
  dnf: sudo dnf install sox
  macports: sudo port install sox
  nix: nix profile install nixpkgs#sox
  pacman: sudo pacman -S sox
  scoop: scoop install main/sox
  ubuntu: sudo apt install sox
  winget: winget install --id ChrisBagwell.SoX -e
  zypper: sudo zypper install sox
provenance:
  formula: sox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
