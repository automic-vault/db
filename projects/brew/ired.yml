id: brew:ired
display-name: ired
homepage: https://github.com/radare/ired
repo: https://github.com/radare/ired
docs: https://github.com/radare/ired
package-manager:
  brew: ired
package-manager-url: https://formulae.brew.sh/formula/ired
version: 0.6
license: MIT
category: development
tags:
  - cli
description: Minimalistic hexadecimal editor designed to be used in scripts
source-archive: https://github.com/radare/ired/archive/refs/tags/0.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bdiff
  - exposure: global executable
    kind: cli
    name: ired
  - exposure: global executable
    kind: cli
    name: vired
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ired
  brew: brew install ired
provenance:
  formula: ired
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
