id: brew:bitwise
display-name: bitwise
homepage: https://github.com/mellowcandle/bitwise
repo: https://github.com/mellowcandle/bitwise
docs: https://github.com/mellowcandle/bitwise
package-manager:
  apk: bitwise
  brew: bitwise
  debian: bitwise
  dnf: bitwise
  macports: bitwise
  nix: bitwise
  ubuntu: bitwise
  zypper: bitwise
package-manager-url: https://formulae.brew.sh/formula/bitwise
version: 0.50
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Terminal based bit manipulator in ncurses
source-archive: https://github.com/mellowcandle/bitwise/releases/download/v0.50/bitwise-v0.50.tar.gz
dependencies:
  - readline
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: bitwise
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bitwise
  av: sudo av install brew:bitwise
  brew: brew install bitwise
  debian: sudo apt install bitwise
  dnf: sudo dnf install bitwise
  macports: sudo port install bitwise
  nix: nix profile install nixpkgs#bitwise
  ubuntu: sudo apt install bitwise
  zypper: sudo zypper install bitwise
provenance:
  formula: bitwise
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
