id: brew:is-fast
display-name: is-fast
homepage: https://github.com/Magic-JD/is-fast
repo: https://github.com/Magic-JD/is-fast
docs: https://github.com/Magic-JD/is-fast
package-manager:
  brew: is-fast
  nix: is-fast
package-manager-url: https://formulae.brew.sh/formula/is-fast
version: 0.17.7
license: MIT
category: development
tags:
  - cli
description: Check the internet as fast as possible
source-archive: https://github.com/Magic-JD/is-fast/archive/refs/tags/v0.17.7.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: is-fast
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:is-fast
  brew: brew install is-fast
  nix: nix profile install nixpkgs#is-fast
provenance:
  formula: is-fast
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
