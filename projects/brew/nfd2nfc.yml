id: brew:nfd2nfc
display-name: nfd2nfc
homepage: https://github.com/elgar328/nfd2nfc
repo: https://github.com/elgar328/nfd2nfc
docs: https://github.com/elgar328/nfd2nfc
package-manager:
  brew: nfd2nfc
  macports: nfd2nfc
package-manager-url: https://formulae.brew.sh/formula/nfd2nfc
version: 2.1.0
license: MIT
category: development
tags:
  - cli
description: Convert filesystem entry names from NFD to NFC for cross-platform compatibility
source-archive: https://github.com/elgar328/nfd2nfc/archive/refs/tags/v2.1.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: nfd2nfc
  - exposure: global executable
    kind: cli
    name: nfd2nfc-watcher
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nfd2nfc
  brew: brew install nfd2nfc
  macports: sudo port install nfd2nfc
provenance:
  formula: nfd2nfc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
