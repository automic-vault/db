id: brew:mise
display-name: mise
homepage: https://mise.jdx.dev/
repo: https://github.com/jdx/mise
docs: https://mise.jdx.dev/
package-manager:
  apk: mise
  brew: mise
  chocolatey: mise
  macports: mise
  nix: mise
  pacman: mise
  scoop: main/mise
  winget: jdx.mise
package-manager-url: https://formulae.brew.sh/formula/mise
version: 2026.5.15
license: MIT
category: development
tags:
  - cli
description: Polyglot runtime manager (asdf rust clone)
source-archive: https://github.com/jdx/mise/archive/refs/tags/v2026.5.15.tar.gz
dependencies:
  - usage
build-dependencies:
  - cmake
  - llvm
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: mise
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: If you are using fish shell, mise will be activated for you automatically.
  post-install-defined: false
install-lines:
  apk: sudo apk add mise
  av: sudo av install brew:mise
  brew: brew install mise
  chocolatey: choco install mise
  macports: sudo port install mise
  nix: nix profile install nixpkgs#mise
  pacman: sudo pacman -S mise
  scoop: scoop install main/mise
  winget: winget install --id jdx.mise -e
provenance:
  formula: mise
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
