id: brew:yajl
display-name: yajl
homepage: https://lloyd.github.io/yajl/
repo: https://github.com/lloyd/yajl
docs: https://lloyd.github.io/yajl/
package-manager:
  apk: yajl
  brew: yajl
  dnf: yajl
  macports: yajl
  nix: yajl
  pacman: yajl
  zypper: yajl
package-manager-url: https://formulae.brew.sh/formula/yajl
version: 2.1.0
license: ISC
category: development
tags:
  - cli
  - json
description: Yet Another JSON Library
source-archive: https://github.com/lloyd/yajl/archive/refs/tags/2.1.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: json_reformat
  - exposure: global executable
    kind: cli
    name: json_verify
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yajl
  av: sudo av install brew:yajl
  brew: brew install yajl
  dnf: sudo dnf install yajl
  macports: sudo port install yajl
  nix: nix profile install nixpkgs#yajl
  pacman: sudo pacman -S yajl
  zypper: sudo zypper install yajl
provenance:
  formula: yajl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
