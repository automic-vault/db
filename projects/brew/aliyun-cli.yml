id: brew:aliyun-cli
display-name: aliyun-cli
homepage: https://github.com/aliyun/aliyun-cli
repo: https://github.com/aliyun/aliyun-cli
docs: https://github.com/aliyun/aliyun-cli
package-manager:
  brew: aliyun-cli
  nix: aliyun-cli
  pacman: aliyun-cli
  scoop: main/aliyun
  winget: Alibaba.AlibabaCloudCLI
  zypper: aliyun-cli
package-manager-url: https://formulae.brew.sh/formula/aliyun-cli
version: 3.3.16
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Universal Command-Line Interface for Alibaba Cloud
source-archive: https://github.com/aliyun/aliyun-cli.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aliyun
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aliyun-cli
  brew: brew install aliyun-cli
  nix: nix profile install nixpkgs#aliyun-cli
  pacman: sudo pacman -S aliyun-cli
  scoop: scoop install main/aliyun
  winget: winget install --id Alibaba.AlibabaCloudCLI -e
  zypper: sudo zypper install aliyun-cli
provenance:
  formula: aliyun-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
