id: brew:amfora
display-name: amfora
homepage: https://github.com/makew0rld/amfora
repo: https://github.com/makew0rld/amfora
docs: https://github.com/makew0rld/amfora
package-manager:
  apk: amfora
  brew: amfora
  debian: amfora
  macports: amfora
  nix: amfora
  pacman: amfora
  scoop: extras/amfora
  ubuntu: amfora
  zypper: amfora
package-manager-url: https://formulae.brew.sh/formula/amfora
version: 1.11.0
license: GPL-3.0-only AND (GPL-3.0-only OR MIT)
category: development
tags:
  - cli
description: Fancy terminal browser for the Gemini protocol
source-archive: https://github.com/makew0rld/amfora/archive/refs/tags/v1.11.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: amfora
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add amfora
  av: sudo av install brew:amfora
  brew: brew install amfora
  debian: sudo apt install amfora
  macports: sudo port install amfora
  nix: nix profile install nixpkgs#amfora
  pacman: sudo pacman -S amfora
  scoop: scoop install extras/amfora
  ubuntu: sudo apt install amfora
  zypper: sudo zypper install amfora
provenance:
  formula: amfora
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
