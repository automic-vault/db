id: brew:docuum
display-name: docuum
homepage: https://github.com/stepchowfun/docuum
repo: https://github.com/stepchowfun/docuum
docs: https://github.com/stepchowfun/docuum
package-manager:
  apk: docuum
  brew: docuum
  nix: docuum
package-manager-url: https://formulae.brew.sh/formula/docuum
version: 0.27.0
license: MIT
category: development
tags:
  - cli
  - docker
description: Perform least recently used (LRU) eviction of Docker images
source-archive: https://github.com/stepchowfun/docuum/archive/refs/tags/v0.27.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: docuum
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add docuum
  av: sudo av install brew:docuum
  brew: brew install docuum
  nix: nix profile install nixpkgs#docuum
provenance:
  formula: docuum
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
