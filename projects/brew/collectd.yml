id: brew:collectd
display-name: collectd
homepage: https://collectd.org/
repo: https://storage.googleapis.com/collectd-tarballs/collectd-5.12.0.tar.bz2
docs: https://collectd.org/
package-manager:
  apk: collectd
  brew: collectd
  debian: collectd
  dnf: collectd
  macports: collectd
  nix: collectd
  ubuntu: collectd
  zypper: collectd
package-manager-url: https://formulae.brew.sh/formula/collectd
version: 5.12.0
license: MIT
category: network
tags:
  - cli
description: Statistics collection and monitoring daemon
source-archive: https://storage.googleapis.com/collectd-tarballs/collectd-5.12.0.tar.bz2
dependencies:
  - libgcrypt
  - libgpg-error
  - libtool
  - net-snmp
  - protobuf-c
  - riemann-client
build-dependencies:
  - pkgconf
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: collectd
  - exposure: global executable
    kind: cli
    name: collectd-nagios
  - exposure: global executable
    kind: cli
    name: collectd-tg
  - exposure: global executable
    kind: cli
    name: collectdctl
  - exposure: global executable
    kind: cli
    name: collectdmon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add collectd
  av: sudo av install brew:collectd
  brew: brew install collectd
  debian: sudo apt install collectd
  dnf: sudo dnf install collectd
  macports: sudo port install collectd
  nix: nix profile install nixpkgs#collectd
  ubuntu: sudo apt install collectd
  zypper: sudo zypper install collectd
provenance:
  formula: collectd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
