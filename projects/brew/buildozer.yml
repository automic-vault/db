id: brew:buildozer
display-name: buildozer
homepage: https://github.com/bazelbuild/buildtools
repo: https://github.com/bazelbuild/buildtools
docs: https://github.com/bazelbuild/buildtools
package-manager:
  brew: buildozer
  nix: buildozer
package-manager-url: https://formulae.brew.sh/formula/buildozer
version: 8.5.1
license: Apache-2.0
category: development
tags:
  - cli
description: Rewrite bazel BUILD files using standard commands
source-archive: https://github.com/bazelbuild/buildtools/archive/refs/tags/v8.5.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: buildozer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:buildozer
  brew: brew install buildozer
  nix: nix profile install nixpkgs#buildozer
provenance:
  formula: buildozer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
