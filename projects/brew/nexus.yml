id: brew:nexus
display-name: nexus
homepage: https://www.sonatype.com/
repo: https://github.com/sonatype/nexus-public
docs: https://www.sonatype.com/
package-manager:
  brew: nexus
  dnf: nexus
  nix: nexus
  winget: WinStep.Nexus
package-manager-url: https://formulae.brew.sh/formula/nexus
version: 3.92.2-01
license: EPL-1.0
category: development
tags:
  - cli
description: Repository manager for binary software components
source-archive: https://github.com/sonatype/nexus-public.git
dependencies:
  - openjdk
build-dependencies:
  - maven
  - node
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: nexus
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:nexus
  brew: brew install nexus
  dnf: sudo dnf install nexus
  nix: nix profile install nixpkgs#nexus
  winget: winget install --id WinStep.Nexus -e
provenance:
  formula: nexus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
