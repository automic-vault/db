id: brew:statesmith
display-name: statesmith
homepage: https://github.com/StateSmith/StateSmith
repo: https://github.com/StateSmith/StateSmith
docs: https://github.com/StateSmith/StateSmith
package-manager:
  brew: statesmith
package-manager-url: https://formulae.brew.sh/formula/statesmith
version: 0.22.2
license: Apache-2.0
category: development
tags:
  - cli
description: State machine code generation tool suitable for bare metal, embedded and more
source-archive: https://github.com/StateSmith/StateSmith/archive/refs/tags/v0.22.2.tar.gz
dependencies:
  - dotnet@9
executables:
  - exposure: global executable
    kind: cli
    name: ss.cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:statesmith
  brew: brew install statesmith
provenance:
  formula: statesmith
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
