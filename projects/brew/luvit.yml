id: brew:luvit
display-name: luvit
homepage: https://luvit.io
repo: https://github.com/luvit/luvit
docs: https://luvit.io
package-manager:
  brew: luvit
package-manager-url: https://formulae.brew.sh/formula/luvit
version: 2.18.1
license: Apache-2.0
category: development
tags:
  - cli
description: Asynchronous I/O for Lua
source-archive: https://github.com/luvit/luvit/archive/refs/tags/2.18.1.tar.gz
dependencies:
  - libuv
  - luajit
  - openssl@3
  - pcre2
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: luvi
  - exposure: global executable
    kind: cli
    name: luvit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:luvit
  brew: brew install luvit
provenance:
  formula: luvit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
