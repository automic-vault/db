id: brew:libcddb
display-name: libcddb
homepage: https://libcddb.sourceforge.net/
repo: https://downloads.sourceforge.net/project/libcddb/libcddb/1.3.2/libcddb-1.3.2.tar.bz2
docs: https://libcddb.sourceforge.net/
package-manager:
  apk: libcddb
  brew: libcddb
  dnf: libcddb
  macports: libcddb
  nix: libcddb
  pacman: libcddb
package-manager-url: https://formulae.brew.sh/formula/libcddb
version: 1.3.2
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: CDDB server access library
source-archive: https://downloads.sourceforge.net/project/libcddb/libcddb/1.3.2/libcddb-1.3.2.tar.bz2
dependencies:
  - libcdio
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cddb_query
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libcddb
  av: sudo av install brew:libcddb
  brew: brew install libcddb
  dnf: sudo dnf install libcddb
  macports: sudo port install libcddb
  nix: nix profile install nixpkgs#libcddb
  pacman: sudo pacman -S libcddb
provenance:
  formula: libcddb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
