id: brew:httping
display-name: httping
homepage: https://github.com/folkertvanheusden/HTTPing
repo: https://github.com/folkertvanheusden/HTTPing
docs: https://github.com/folkertvanheusden/HTTPing
package-manager:
  brew: httping
  debian: httping
  dnf: httping
  macports: httping
  nix: httping
  pacman: httping
  scoop: main/httping
  ubuntu: httping
package-manager-url: https://formulae.brew.sh/formula/httping
version: 4.4.0
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Ping-like tool for HTTP requests
source-archive: https://github.com/folkertvanheusden/HTTPing/archive/refs/tags/v4.4.0.tar.gz
dependencies:
  - fftw
  - gettext
  - openssl@4
build-dependencies:
  - cmake
  - gettext
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: httping
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:httping
  brew: brew install httping
  debian: sudo apt install httping
  dnf: sudo dnf install httping
  macports: sudo port install httping
  nix: nix profile install nixpkgs#httping
  pacman: sudo pacman -S httping
  scoop: scoop install main/httping
  ubuntu: sudo apt install httping
provenance:
  formula: httping
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
