id: brew:opensca-cli
display-name: opensca-cli
homepage: https://opensca.xmirror.cn
repo: https://github.com/XmirrorSecurity/OpenSCA-cli
docs: https://opensca.xmirror.cn
package-manager:
  brew: opensca-cli
  scoop: extras/opensca-cli
  winget: XmirrorSecurity.OpenSCA-cli
package-manager-url: https://formulae.brew.sh/formula/opensca-cli
version: 3.0.11
license: Apache-2.0
category: security
tags:
  - cli
  - security
description: OpenSCA is a supply-chain security tool for security researchers and developers
source-archive: https://github.com/XmirrorSecurity/OpenSCA-cli/archive/refs/tags/v3.0.11.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: opensca-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:opensca-cli
  brew: brew install opensca-cli
  scoop: scoop install extras/opensca-cli
  winget: winget install --id XmirrorSecurity.OpenSCA-cli -e
provenance:
  formula: opensca-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
