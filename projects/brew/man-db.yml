id: brew:man-db
display-name: man-db
homepage: https://man-db.gitlab.io/man-db/
repo: https://download.savannah.gnu.org/releases/man-db/man-db-2.13.1.tar.xz
docs: https://man-db.gitlab.io/man-db/
package-manager:
  apk: man-db
  brew: man-db
  debian: man-db
  dnf: man-db
  macports: man-db
  nix: man-db
  pacman: man-db
  ubuntu: man-db
package-manager-url: https://formulae.brew.sh/formula/man-db
version: 2.13.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Unix documentation system
source-archive: https://download.savannah.gnu.org/releases/man-db/man-db-2.13.1.tar.xz
dependencies:
  - groff
  - libpipeline
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: accessdb
  - exposure: global executable
    kind: cli
    name: catman
  - exposure: global executable
    kind: cli
    name: gaccessdb
  - exposure: global executable
    kind: cli
    name: gapropos
  - exposure: global executable
    kind: cli
    name: gcatman
  - exposure: global executable
    kind: cli
    name: glexgrog
  - exposure: global executable
    kind: cli
    name: gman
  - exposure: global executable
    kind: cli
    name: gman-recode
  - exposure: global executable
    kind: cli
    name: gmandb
  - exposure: global executable
    kind: cli
    name: gmanpath
  - exposure: global executable
    kind: cli
    name: gwhatis
  - exposure: global executable
    kind: cli
    name: lexgrog
  - exposure: global executable
    kind: cli
    name: mandb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Commands also provided by macOS have been installed with the prefix "g". If you need
    to use these commands with their normal names, you can add a "bin" directory to your
    PATH from your bashrc like: PATH="$HOMEBREW_PREFIX/opt/man-db/libexec/bin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add man-db
  av: sudo av install brew:man-db
  brew: brew install man-db
  debian: sudo apt install man-db
  dnf: sudo dnf install man-db
  macports: sudo port install man-db
  nix: nix profile install nixpkgs#man-db
  pacman: sudo pacman -S man-db
  ubuntu: sudo apt install man-db
provenance:
  formula: man-db
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
