id: brew:todo-txt
display-name: todo-txt
homepage: http://todotxt.org/
repo: https://github.com/todotxt/todo.txt-cli
docs: http://todotxt.org/
package-manager:
  brew: todo-txt
package-manager-url: https://formulae.brew.sh/formula/todo-txt
version: 2.13.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Minimal, todo.txt-focused editor
source-archive: >
  https://github.com/todotxt/todo.txt-cli/releases/download/v2.13.0/todo.txt_cli-2.13.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: todo.sh
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To configure, copy the default config to your HOME and edit it: cp
    $HOMEBREW_CELLAR/todo-txt/2.13.0/todo.cfg ~/.todo.cfg
  post-install-defined: false
install-lines:
  av: sudo av install brew:todo-txt
  brew: brew install todo-txt
provenance:
  formula: todo-txt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
