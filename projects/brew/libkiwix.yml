id: brew:libkiwix
display-name: libkiwix
homepage: https://github.com/kiwix/libkiwix
repo: https://github.com/kiwix/libkiwix
docs: https://github.com/kiwix/libkiwix
package-manager:
  apk: libkiwix
  brew: libkiwix
  dnf: libkiwix
  nix: libkiwix
  pacman: libkiwix
package-manager-url: https://formulae.brew.sh/formula/libkiwix
version: 14.2.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Common code base for all Kiwix ports
source-archive: https://github.com/kiwix/libkiwix/archive/refs/tags/14.2.1.tar.gz
dependencies:
  - icu4c@78
  - libmicrohttpd
  - libzim
  - pugixml
  - xapian
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - curl
  - zlib
executables:
  - exposure: global executable
    kind: cli
    name: kiwix-compile-i18n
  - exposure: global executable
    kind: cli
    name: kiwix-compile-resources
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libkiwix
  av: sudo av install brew:libkiwix
  brew: brew install libkiwix
  dnf: sudo dnf install libkiwix
  nix: nix profile install nixpkgs#libkiwix
  pacman: sudo pacman -S libkiwix
provenance:
  formula: libkiwix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
