id: brew:lisette
display-name: lisette
homepage: https://lisette.run
repo: https://github.com/ivov/lisette
docs: https://lisette.run
package-manager:
  brew: lisette
  dnf: lis
  macports: lis
  nix: lisette
package-manager-url: https://formulae.brew.sh/formula/lisette
version: 0.2.13
license: MIT
category: development
tags:
  - cli
description: Language inspired by Rust that compiles to Go
source-archive: https://github.com/ivov/lisette/archive/refs/tags/lisette-v0.2.13.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: lis
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lisette
  brew: brew install lisette
  dnf: sudo dnf install lis
  macports: sudo port install lis
  nix: nix profile install nixpkgs#lisette
provenance:
  formula: lisette
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
