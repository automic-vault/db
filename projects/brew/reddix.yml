id: brew:reddix
display-name: reddix
homepage: https://github.com/ck-zhang/reddix
repo: https://github.com/ck-zhang/reddix
docs: https://github.com/ck-zhang/reddix
package-manager:
  brew: reddix
  nix: reddix
package-manager-url: https://formulae.brew.sh/formula/reddix
version: 0.2.9
license: MIT
category: development
tags:
  - cli
description: Reddit, refined for the terminal
source-archive: https://github.com/ck-zhang/reddix/archive/refs/tags/v0.2.9.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: reddix
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:reddix
  brew: brew install reddix
  nix: nix profile install nixpkgs#reddix
provenance:
  formula: reddix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
