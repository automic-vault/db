id: brew:kapacitor
display-name: kapacitor
homepage: https://github.com/influxdata/kapacitor
repo: https://github.com/influxdata/kapacitor
docs: https://github.com/influxdata/kapacitor
package-manager:
  brew: kapacitor
  nix: kapacitor
  scoop: main/kapacitor
  winget: InfluxData.Kapacitor
package-manager-url: https://formulae.brew.sh/formula/kapacitor
version: 1.8.6
license: MIT
category: development
tags:
  - cli
description: Open source time series data processor
source-archive: https://github.com/influxdata/kapacitor.git
build-dependencies:
  - go
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: kapacitor
  - exposure: global executable
    kind: cli
    name: kapacitord
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:kapacitor
  brew: brew install kapacitor
  nix: nix profile install nixpkgs#kapacitor
  scoop: scoop install main/kapacitor
  winget: winget install --id InfluxData.Kapacitor -e
provenance:
  formula: kapacitor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
