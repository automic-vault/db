id: brew:playwright-cli
display-name: playwright-cli
homepage: https://playwright.dev
repo: https://registry.npmjs.org/@playwright/cli/-/cli-0.1.13.tgz
docs: https://playwright.dev
package-manager:
  brew: playwright-cli
package-manager-url: https://formulae.brew.sh/formula/playwright-cli
version: 0.1.13
license: Apache-2.0
category: network
tags:
  - cli
description: 'CLI for Playwright: record/generate code, inspect selectors, take screenshots'
source-archive: https://registry.npmjs.org/@playwright/cli/-/cli-0.1.13.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: playwright-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:playwright-cli
  brew: brew install playwright-cli
provenance:
  formula: playwright-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
