id: brew:ccls
display-name: ccls
homepage: https://github.com/MaskRay/ccls
repo: https://github.com/MaskRay/ccls
docs: https://github.com/MaskRay/ccls
package-manager:
  apk: ccls
  brew: ccls
  debian: ccls
  macports: ccls
  nix: ccls
  pacman: ccls
  ubuntu: ccls
  zypper: ccls
package-manager-url: https://formulae.brew.sh/formula/ccls
version: 0.20250815.1
license: Apache-2.0
category: development
tags:
  - cli
description: C/C++/ObjC language server
source-archive: https://github.com/MaskRay/ccls/archive/refs/tags/0.20250815.1.tar.gz
dependencies:
  - llvm
build-dependencies:
  - cmake
  - rapidjson
executables:
  - exposure: global executable
    kind: cli
    name: ccls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ccls
  av: sudo av install brew:ccls
  brew: brew install ccls
  debian: sudo apt install ccls
  macports: sudo port install ccls
  nix: nix profile install nixpkgs#ccls
  pacman: sudo pacman -S ccls
  ubuntu: sudo apt install ccls
  zypper: sudo zypper install ccls
provenance:
  formula: ccls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
