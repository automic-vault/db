id: brew:patchutils
display-name: patchutils
homepage: https://cyberelk.net/tim/software/patchutils/
repo: https://github.com/twaugh/patchutils
docs: https://cyberelk.net/tim/software/patchutils/
package-manager:
  apk: patchutils
  brew: patchutils
  debian: patchutils
  dnf: patchutils
  macports: patchutils
  nix: patchutils
  pacman: patchutils
  ubuntu: patchutils
  zypper: patchutils
package-manager-url: https://formulae.brew.sh/formula/patchutils
version: 0.4.5
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: Small collection of programs that operate on patch files
source-archive: https://github.com/twaugh/patchutils/releases/download/0.4.5/patchutils-0.4.5.tar.xz
build-dependencies:
  - xmlto
executables:
  - exposure: global executable
    kind: cli
    name: combinediff
  - exposure: global executable
    kind: cli
    name: dehtmldiff
  - exposure: global executable
    kind: cli
    name: editdiff
  - exposure: global executable
    kind: cli
    name: espdiff
  - exposure: global executable
    kind: cli
    name: filterdiff
  - exposure: global executable
    kind: cli
    name: fixcvsdiff
  - exposure: global executable
    kind: cli
    name: flipdiff
  - exposure: global executable
    kind: cli
    name: gitdiff
  - exposure: global executable
    kind: cli
    name: gitdiffview
  - exposure: global executable
    kind: cli
    name: gitshow
  - exposure: global executable
    kind: cli
    name: gitshowview
  - exposure: global executable
    kind: cli
    name: grepdiff
  - exposure: global executable
    kind: cli
    name: interdiff
  - exposure: global executable
    kind: cli
    name: lsdiff
  - exposure: global executable
    kind: cli
    name: move-to-front
  - exposure: global executable
    kind: cli
    name: patchview
  - exposure: global executable
    kind: cli
    name: patchview-wrapper
  - exposure: global executable
    kind: cli
    name: recountdiff
  - exposure: global executable
    kind: cli
    name: rediff
  - exposure: global executable
    kind: cli
    name: splitdiff
  - exposure: global executable
    kind: cli
    name: svndiff
  - exposure: global executable
    kind: cli
    name: svndiffview
  - exposure: global executable
    kind: cli
    name: unwrapdiff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add patchutils
  av: sudo av install brew:patchutils
  brew: brew install patchutils
  debian: sudo apt install patchutils
  dnf: sudo dnf install patchutils
  macports: sudo port install patchutils
  nix: nix profile install nixpkgs#patchutils
  pacman: sudo pacman -S patchutils
  ubuntu: sudo apt install patchutils
  zypper: sudo zypper install patchutils
provenance:
  formula: patchutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
