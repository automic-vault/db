id: brew:csvkit
display-name: csvkit
homepage: https://csvkit.readthedocs.io/
repo: >
  https://files.pythonhosted.org/packages/9a/bf/59b035abead12d9498c96dc05b965ec77683d3c794305dec2648e23830cc/csvkit-2.2.0.tar.gz
docs: https://csvkit.readthedocs.io/
package-manager:
  brew: csvkit
  debian: csvkit
  nix: csvkit
  pacman: csvkit
  ubuntu: csvkit
package-manager-url: https://formulae.brew.sh/formula/csvkit
version: 2.2.0
license: MIT
category: network
tags:
  - cli
description: Suite of command-line tools for converting to and working with CSV
source-archive: >
  https://files.pythonhosted.org/packages/9a/bf/59b035abead12d9498c96dc05b965ec77683d3c794305dec2648e23830cc/csvkit-2.2.0.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: csvclean
  - exposure: global executable
    kind: cli
    name: csvcut
  - exposure: global executable
    kind: cli
    name: csvformat
  - exposure: global executable
    kind: cli
    name: csvgrep
  - exposure: global executable
    kind: cli
    name: csvjoin
  - exposure: global executable
    kind: cli
    name: csvjson
  - exposure: global executable
    kind: cli
    name: csvlook
  - exposure: global executable
    kind: cli
    name: csvpy
  - exposure: global executable
    kind: cli
    name: csvsort
  - exposure: global executable
    kind: cli
    name: csvsql
  - exposure: global executable
    kind: cli
    name: csvstack
  - exposure: global executable
    kind: cli
    name: csvstat
  - exposure: global executable
    kind: cli
    name: in2csv
  - exposure: global executable
    kind: cli
    name: sql2csv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:csvkit
  brew: brew install csvkit
  debian: sudo apt install csvkit
  nix: nix profile install nixpkgs#csvkit
  pacman: sudo pacman -S csvkit
  ubuntu: sudo apt install csvkit
provenance:
  formula: csvkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
