id: brew:opus-tools
display-name: opus-tools
homepage: https://www.opus-codec.org/
repo: https://ftp.osuosl.org/pub/xiph/releases/opus/opus-tools-0.2.tar.gz
docs: https://www.opus-codec.org/
package-manager:
  apk: opus-tools
  brew: opus-tools
  debian: opus-tools
  dnf: opus-tools
  macports: opus-tools
  nix: opus-tools
  pacman: opus-tools
  scoop: main/opus-tools
  ubuntu: opus-tools
  winget: Mozilla.opus-tools
  zypper: opus-tools
package-manager-url: https://formulae.brew.sh/formula/opus-tools
version: 0.2
license: BSD-2-Clause
category: network
tags:
  - cli
description: Utilities to encode, inspect, and decode .opus files
source-archive: https://ftp.osuosl.org/pub/xiph/releases/opus/opus-tools-0.2.tar.gz
dependencies:
  - flac
  - libogg
  - libopusenc
  - opus
  - opusfile
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: opusdec
  - exposure: global executable
    kind: cli
    name: opusenc
  - exposure: global executable
    kind: cli
    name: opusinfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add opus-tools
  av: sudo av install brew:opus-tools
  brew: brew install opus-tools
  debian: sudo apt install opus-tools
  dnf: sudo dnf install opus-tools
  macports: sudo port install opus-tools
  nix: nix profile install nixpkgs#opus-tools
  pacman: sudo pacman -S opus-tools
  scoop: scoop install main/opus-tools
  ubuntu: sudo apt install opus-tools
  winget: winget install --id Mozilla.opus-tools -e
  zypper: sudo zypper install opus-tools
provenance:
  formula: opus-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
