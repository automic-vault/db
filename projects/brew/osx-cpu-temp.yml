id: brew:osx-cpu-temp
display-name: osx-cpu-temp
homepage: https://github.com/lavoiesl/osx-cpu-temp
repo: https://github.com/lavoiesl/osx-cpu-temp
docs: https://github.com/lavoiesl/osx-cpu-temp
package-manager:
  brew: osx-cpu-temp
