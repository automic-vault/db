id: brew:plow
display-name: plow
homepage: https://github.com/six-ddc/plow
repo: https://github.com/six-ddc/plow
docs: https://github.com/six-ddc/plow
package-manager:
  brew: plow
  nix: plow
  scoop: main/plow
package-manager-url: https://formulae.brew.sh/formula/plow
version: 1.4.0
license: Apache-2.0
category: development
tags:
  - cli
description: High-performance and real-time metrics displaying HTTP benchmarking tool
source-archive: https://github.com/six-ddc/plow/archive/refs/tags/v1.4.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: plow
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:plow
  brew: brew install plow
  nix: nix profile install nixpkgs#plow
  scoop: scoop install main/plow
provenance:
  formula: plow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
