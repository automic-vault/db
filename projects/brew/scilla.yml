id: brew:scilla
display-name: scilla
homepage: https://github.com/edoardottt/scilla
repo: https://github.com/edoardottt/scilla
docs: https://github.com/edoardottt/scilla
package-manager:
  brew: scilla
  nix: scilla
package-manager-url: https://formulae.brew.sh/formula/scilla
version: 1.3.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: DNS, subdomain, port, directory enumeration tool
source-archive: https://github.com/edoardottt/scilla/archive/refs/tags/v1.3.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: scilla
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:scilla
  brew: brew install scilla
  nix: nix profile install nixpkgs#scilla
provenance:
  formula: scilla
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
