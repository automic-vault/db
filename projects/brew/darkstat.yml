id: brew:darkstat
display-name: darkstat
homepage: https://unix4lyfe.org/darkstat/
repo: https://github.com/emikulic/darkstat
docs: https://unix4lyfe.org/darkstat/
package-manager:
  apk: darkstat
  brew: darkstat
  debian: darkstat
  dnf: darkstat
  macports: darkstat
  nix: darkstat
  pacman: darkstat
  ubuntu: darkstat
package-manager-url: https://formulae.brew.sh/formula/darkstat
version: 3.0.722
license: GPL-2.0-only AND ISC AND BSD-2-Clause AND BSD-3-Clause
category: development
tags:
  - cli
description: Network traffic analyzer
source-archive: https://github.com/emikulic/darkstat/archive/refs/tags/3.0.722.tar.gz
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: darkstat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add darkstat
  av: sudo av install brew:darkstat
  brew: brew install darkstat
  debian: sudo apt install darkstat
  dnf: sudo dnf install darkstat
  macports: sudo port install darkstat
  nix: nix profile install nixpkgs#darkstat
  pacman: sudo pacman -S darkstat
  ubuntu: sudo apt install darkstat
provenance:
  formula: darkstat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
