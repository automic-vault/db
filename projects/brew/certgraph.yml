id: brew:certgraph
display-name: certgraph
homepage: https://github.com/lanrat/certgraph
repo: https://github.com/lanrat/certgraph
docs: https://github.com/lanrat/certgraph
package-manager:
  brew: certgraph
  macports: certgraph
  nix: certgraph
package-manager-url: https://formulae.brew.sh/formula/certgraph
version: 0.1.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Crawl the graph of certificate Alternate Names
source-archive: https://github.com/lanrat/certgraph/archive/refs/tags/v0.1.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: certgraph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:certgraph
  brew: brew install certgraph
  macports: sudo port install certgraph
  nix: nix profile install nixpkgs#certgraph
provenance:
  formula: certgraph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
