id: brew:qtads
display-name: qtads
homepage: https://realnc.github.io/qtads/
repo: https://github.com/realnc/qtads
docs: https://realnc.github.io/qtads/
package-manager:
  brew: qtads
  debian: qtads
  macports: qtads
  nix: qtads
  ubuntu: qtads
package-manager-url: https://formulae.brew.sh/formula/qtads
version: 3.4.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: TADS multimedia interpreter
source-archive: https://github.com/realnc/qtads/releases/download/v3.4.0/qtads-3.4.0-source.tar.xz
dependencies:
  - fluid-synth
  - libsndfile
  - libvorbis
  - mpg123
  - qt@5
  - sdl2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: QTads
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qtads
  brew: brew install qtads
  debian: sudo apt install qtads
  macports: sudo port install qtads
  nix: nix profile install nixpkgs#qtads
  ubuntu: sudo apt install qtads
provenance:
  formula: qtads
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
