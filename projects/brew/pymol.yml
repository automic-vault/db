id: brew:pymol
display-name: pymol
homepage: https://pymol.org/
repo: https://github.com/schrodinger/pymol-open-source
docs: https://pymol.org/
package-manager:
  brew: pymol
  debian: pymol
  dnf: pymol
  macports: pymol
  nix: pymol
  pacman: pymol
  ubuntu: pymol
  winget: Schrodinger.PyMOL
package-manager-url: https://formulae.brew.sh/formula/pymol
version: 3.1.0
license: LicenseRef-Homebrew-cannot-represent
category: development
tags:
  - cli
description: Molecular visualization system
source-archive: https://github.com/schrodinger/pymol-open-source/archive/refs/tags/v3.1.0.tar.gz
dependencies:
  - freetype
  - glew
  - libpng
  - netcdf
  - numpy
  - pyqt
  - python@3.14
build-dependencies:
  - cmake
  - glm
  - msgpack-cxx
  - python-setuptools
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: pymol
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: To generate movies, run `brew install ffmpeg`.
  post-install-defined: false
install-lines:
  av: sudo av install brew:pymol
  brew: brew install pymol
  debian: sudo apt install pymol
  dnf: sudo dnf install pymol
  macports: sudo port install pymol
  nix: nix profile install nixpkgs#pymol
  pacman: sudo pacman -S pymol
  ubuntu: sudo apt install pymol
  winget: winget install --id Schrodinger.PyMOL -e
provenance:
  formula: pymol
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
