id: brew:mupdf
display-name: mupdf
homepage: https://mupdf.com/
repo: https://mupdf.com/downloads/archive/mupdf-1.27.2-source.tar.gz
docs: https://mupdf.com/
package-manager:
  apk: mupdf
  brew: mupdf
  chocolatey: mupdf
  debian: mupdf
  dnf: mupdf
  macports: mupdf
  nix: mupdf
  pacman: mupdf
  scoop: extras/mupdf
  ubuntu: mupdf
  winget: ArtifexSoftware.mutool
  zypper: mupdf
package-manager-url: https://formulae.brew.sh/formula/mupdf
version: 1.27.2
license: AGPL-3.0-or-later
category: network
tags:
  - cli
description: Lightweight PDF and XPS viewer
source-archive: https://mupdf.com/downloads/archive/mupdf-1.27.2-source.tar.gz
dependencies:
  - brotli
  - freetype
  - gumbo-parser
  - harfbuzz
  - jbig2dec
  - jpeg-turbo
  - leptonica
  - libarchive
  - openjpeg
  - openssl@3
  - python@3.14
  - tesseract
build-dependencies:
  - llvm
  - pkgconf
  - swig
executables:
  - exposure: global executable
    kind: cli
    name: mudraw
  - exposure: global executable
    kind: cli
    name: mupdf-gl
  - exposure: global executable
    kind: cli
    name: mupdf-x11
  - exposure: global executable
    kind: cli
    name: mutool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mupdf
  av: sudo av install brew:mupdf
  brew: brew install mupdf
  chocolatey: choco install mupdf
  debian: sudo apt install mupdf
  dnf: sudo dnf install mupdf
  macports: sudo port install mupdf
  nix: nix profile install nixpkgs#mupdf
  pacman: sudo pacman -S mupdf
  scoop: scoop install extras/mupdf
  ubuntu: sudo apt install mupdf
  winget: winget install --id ArtifexSoftware.mutool -e
  zypper: sudo zypper install mupdf
provenance:
  formula: mupdf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
