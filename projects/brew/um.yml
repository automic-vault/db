id: brew:um
display-name: um
homepage: https://github.com/sinclairtarget/um
repo: https://github.com/sinclairtarget/um
docs: https://github.com/sinclairtarget/um
package-manager:
  brew: um
package-manager-url: https://formulae.brew.sh/formula/um
version: 4.2.0
license: MIT
category: development
tags:
  - cli
description: Command-line utility for creating and maintaining personal man pages
source-archive: https://github.com/sinclairtarget/um/archive/refs/tags/4.2.0.tar.gz
dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: um
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:um
  brew: brew install um
provenance:
  formula: um
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
