id: brew:patat
display-name: patat
homepage: https://github.com/jaspervdj/patat
repo: https://hackage.haskell.org/package/patat-0.15.2.0/patat-0.15.2.0.tar.gz
docs: https://github.com/jaspervdj/patat
package-manager:
  brew: patat
  debian: patat
  dnf: patat
  ubuntu: patat
package-manager-url: https://formulae.brew.sh/formula/patat
version: 0.15.2.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Terminal-based presentations using Pandoc
source-archive: https://hackage.haskell.org/package/patat-0.15.2.0/patat-0.15.2.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
  - pandoc
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: patat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:patat
  brew: brew install patat
  debian: sudo apt install patat
  dnf: sudo dnf install patat
  ubuntu: sudo apt install patat
provenance:
  formula: patat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
