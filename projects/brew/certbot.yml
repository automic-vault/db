id: brew:certbot
display-name: certbot
homepage: https://certbot.eff.org/
repo: >
  https://files.pythonhosted.org/packages/4b/c0/838942a6c5fb07e42fdf48a5cc306214fd118c98dae673f1fb0b2d1f88ef/certbot-5.6.0.tar.gz
docs: https://certbot.eff.org/
package-manager:
  apk: certbot
  brew: certbot
  debian: certbot
  dnf: certbot
  macports: certbot
  nix: certbot
  pacman: certbot
  ubuntu: certbot
  winget: EFF.Certbot
package-manager-url: https://formulae.brew.sh/formula/certbot
version: 5.6.0
license: Apache-2.0
category: security
tags:
  - cli
description: Tool to obtain certs from Let's Encrypt and autoenable HTTPS
source-archive: >
  https://files.pythonhosted.org/packages/4b/c0/838942a6c5fb07e42fdf48a5cc306214fd118c98dae673f1fb0b2d1f88ef/certbot-5.6.0.tar.gz
dependencies:
  - augeas
  - certifi
  - cryptography
  - libyaml
  - pydantic
  - python@3.14
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: certbot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add certbot
  av: sudo av install brew:certbot
  brew: brew install certbot
  debian: sudo apt install certbot
  dnf: sudo dnf install certbot
  macports: sudo port install certbot
  nix: nix profile install nixpkgs#certbot
  pacman: sudo pacman -S certbot
  ubuntu: sudo apt install certbot
  winget: winget install --id EFF.Certbot -e
provenance:
  formula: certbot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
