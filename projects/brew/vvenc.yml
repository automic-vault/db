id: brew:vvenc
display-name: vvenc
homepage: https://github.com/fraunhoferhhi/vvenc
repo: https://github.com/fraunhoferhhi/vvenc
docs: https://github.com/fraunhoferhhi/vvenc
package-manager:
  brew: vvenc
  nix: vvenc
package-manager-url: https://formulae.brew.sh/formula/vvenc
version: 1.14.0
license: BSD-3-Clause-Clear
category: development
tags:
  - cli
description: Fraunhofer Versatile Video Encoder
source-archive: https://github.com/fraunhoferhhi/vvenc/archive/refs/tags/v1.14.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: vvencFFapp
  - exposure: global executable
    kind: cli
    name: vvencapp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vvenc
  brew: brew install vvenc
  nix: nix profile install nixpkgs#vvenc
provenance:
  formula: vvenc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
