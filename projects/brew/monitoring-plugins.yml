id: brew:monitoring-plugins
display-name: monitoring-plugins
homepage: https://www.monitoring-plugins.org
repo: https://www.monitoring-plugins.org/download/monitoring-plugins-2.4.0.tar.gz
docs: https://www.monitoring-plugins.org
package-manager:
  apk: monitoring-plugins
  brew: monitoring-plugins
  debian: monitoring-plugins
  nix: monitoring-plugins
  pacman: monitoring-plugins
  ubuntu: monitoring-plugins
  zypper: monitoring-plugins
package-manager-url: https://formulae.brew.sh/formula/monitoring-plugins
version: 2.4.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Plugins for nagios compatible monitoring systems
source-archive: https://www.monitoring-plugins.org/download/monitoring-plugins-2.4.0.tar.gz
dependencies:
  - gettext
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: check_hpjd
  - exposure: global executable
    kind: cli
    name: check_ldap
  - exposure: global executable
    kind: cli
    name: check_ldaps
  - exposure: global executable
    kind: cli
    name: check_mssql
  - exposure: global executable
    kind: cli
    name: check_snmp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'All plugins have been installed in: $HOMEBREW_PREFIX/sbin'
  post-install-defined: false
install-lines:
  apk: sudo apk add monitoring-plugins
  av: sudo av install brew:monitoring-plugins
  brew: brew install monitoring-plugins
  debian: sudo apt install monitoring-plugins
  nix: nix profile install nixpkgs#monitoring-plugins
  pacman: sudo pacman -S monitoring-plugins
  ubuntu: sudo apt install monitoring-plugins
  zypper: sudo zypper install monitoring-plugins
provenance:
  formula: monitoring-plugins
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
