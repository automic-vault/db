id: brew:felinks
display-name: felinks
homepage: https://github.com/rkd77/elinks
repo: https://github.com/rkd77/elinks
docs: https://github.com/rkd77/elinks
package-manager:
  apk: elinks
  brew: felinks
  debian: elinks
  dnf: elinks
  macports: elinks
  nix: elinks
  pacman: elinks
  ubuntu: elinks
  zypper: elinks
package-manager-url: https://formulae.brew.sh/formula/felinks
version: 0.19.1
license: GPL-2.0-only
category: development
tags:
  - cli
description: Text mode browser and Gemini, NNTP, FTP, Gopher, Finger, and BitTorrent client
source-archive: https://github.com/rkd77/elinks/releases/download/v0.19.1/elinks-0.19.1.tar.xz
dependencies:
  - brotli
  - gnutls
  - libcss
  - libdom
  - libgcrypt
  - libidn2
  - libwapcaplet
  - tre
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - curl
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: elinks
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add elinks
  av: sudo av install brew:felinks
  brew: brew install felinks
  debian: sudo apt install elinks
  dnf: sudo dnf install elinks
  macports: sudo port install elinks
  nix: nix profile install nixpkgs#elinks
  pacman: sudo pacman -S elinks
  ubuntu: sudo apt install elinks
  zypper: sudo zypper install elinks
provenance:
  formula: felinks
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
