id: brew:bubblewrap
display-name: bubblewrap
homepage: https://github.com/containers/bubblewrap
repo: https://github.com/containers/bubblewrap
docs: https://github.com/containers/bubblewrap
package-manager:
  apk: bubblewrap
  brew: bubblewrap
  debian: bubblewrap
  dnf: bubblewrap
  nix: bubblewrap
  pacman: bubblewrap
  ubuntu: bubblewrap
  zypper: bubblewrap
package-manager-url: https://formulae.brew.sh/formula/bubblewrap
version: 0.11.2
license: LGPL-2.0-or-later
category: development
tags:
  - cli
description: Unprivileged sandboxing tool for Linux
source-archive: >
  https://github.com/containers/bubblewrap/releases/download/v0.11.2/bubblewrap-0.11.2.tar.xz
dependencies:
  - libcap
build-dependencies:
  - docbook-xsl
  - libxslt
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: bwrap
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bubblewrap
  av: sudo av install brew:bubblewrap
  brew: brew install bubblewrap
  debian: sudo apt install bubblewrap
  dnf: sudo dnf install bubblewrap
  nix: nix profile install nixpkgs#bubblewrap
  pacman: sudo pacman -S bubblewrap
  ubuntu: sudo apt install bubblewrap
  zypper: sudo zypper install bubblewrap
provenance:
  formula: bubblewrap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
