id: brew:kanata
display-name: kanata
homepage: https://github.com/jtroo/kanata
repo: https://github.com/jtroo/kanata
docs: https://github.com/jtroo/kanata
package-manager:
  brew: kanata
  nix: kanata
  scoop: extras/kanata
package-manager-url: https://formulae.brew.sh/formula/kanata
version: 1.11.0
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Cross-platform software keyboard remapper for Linux, macOS and Windows
source-archive: https://github.com/jtroo/kanata/archive/refs/tags/v1.11.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: kanata
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:kanata
  brew: brew install kanata
  nix: nix profile install nixpkgs#kanata
  scoop: scoop install extras/kanata
provenance:
  formula: kanata
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
