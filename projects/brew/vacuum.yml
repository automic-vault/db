id: brew:vacuum
display-name: vacuum
homepage: https://quobix.com/vacuum/
repo: https://github.com/daveshanley/vacuum
docs: https://quobix.com/vacuum/
package-manager:
  brew: vacuum
  macports: vacuum
  scoop: main/vacuum
package-manager-url: https://formulae.brew.sh/formula/vacuum
version: 0.26.8
license: MIT
category: development
tags:
  - cli
description: World's fastest OpenAPI & Swagger linter
source-archive: https://github.com/daveshanley/vacuum/archive/refs/tags/v0.26.8.tar.gz
build-dependencies:
  - go
  - node
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: vacuum
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vacuum
  brew: brew install vacuum
  macports: sudo port install vacuum
  scoop: scoop install main/vacuum
provenance:
  formula: vacuum
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
