id: brew:brpc
display-name: brpc
homepage: https://brpc.apache.org/
repo: https://www.apache.org/dyn/closer.lua?path=brpc/1.16.0/apache-brpc-1.16.0-src.tar.gz
docs: https://brpc.apache.org/
package-manager:
  brew: brpc
package-manager-url: https://formulae.brew.sh/formula/brpc
version: 1.16.0
license: Apache-2.0
category: network
tags:
  - cli
description: Better RPC framework
source-archive: https://www.apache.org/dyn/closer.lua?path=brpc/1.16.0/apache-brpc-1.16.0-src.tar.gz
dependencies:
  - abseil
  - gflags
  - leveldb
  - openssl@3
  - protobuf@33
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: parallel_http
  - exposure: global executable
    kind: cli
    name: rpc_press
  - exposure: global executable
    kind: cli
    name: rpc_replay
  - exposure: global executable
    kind: cli
    name: rpc_view
  - exposure: global executable
    kind: cli
    name: trackme_server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:brpc
  brew: brew install brpc
provenance:
  formula: brpc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
