id: brew:zstd
display-name: zstd
homepage: https://facebook.github.io/zstd/
repo: https://github.com/facebook/zstd
docs: https://facebook.github.io/zstd/
package-manager:
  apk: zstd
  brew: zstd
  debian: zstd
  dnf: zstd
  macports: zstd
  nix: zstd
  pacman: zstd
  scoop: main/zstd
  ubuntu: zstd
  winget: Meta.Zstandard
  zypper: zstd
package-manager-url: https://formulae.brew.sh/formula/zstd
version: 1.5.7
license: (BSD-3-Clause OR GPL-2.0-only) AND BSD-2-Clause AND MIT
category: development
tags:
  - cli
description: Zstandard is a real-time compression algorithm
source-archive: https://github.com/facebook/zstd/archive/refs/tags/v1.5.7.tar.gz
dependencies:
  - lz4
  - xz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: pzstd
  - exposure: global executable
    kind: cli
    name: unzstd
  - exposure: global executable
    kind: cli
    name: zstd
  - exposure: global executable
    kind: cli
    name: zstdcat
  - exposure: global executable
    kind: cli
    name: zstdgrep
  - exposure: global executable
    kind: cli
    name: zstdless
  - exposure: global executable
    kind: cli
    name: zstdmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zstd
  av: sudo av install brew:zstd
  brew: brew install zstd
  debian: sudo apt install zstd
  dnf: sudo dnf install zstd
  macports: sudo port install zstd
  nix: nix profile install nixpkgs#zstd
  pacman: sudo pacman -S zstd
  scoop: scoop install main/zstd
  ubuntu: sudo apt install zstd
  winget: winget install --id Meta.Zstandard -e
  zypper: sudo zypper install zstd
provenance:
  formula: zstd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
