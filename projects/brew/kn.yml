id: brew:kn
display-name: kn
homepage: https://github.com/knative/client
repo: https://github.com/knative/client
docs: https://github.com/knative/client
package-manager:
  brew: kn
  nix: kn
package-manager-url: https://formulae.brew.sh/formula/kn
version: 1.22.0
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line interface for managing Knative Serving and Eventing resources
source-archive: https://github.com/knative/client.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kn
  brew: brew install kn
  nix: nix profile install nixpkgs#kn
provenance:
  formula: kn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
