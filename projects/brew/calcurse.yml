id: brew:calcurse
display-name: calcurse
homepage: https://calcurse.org/
repo: https://calcurse.org/files/calcurse-4.8.2.tar.gz
docs: https://calcurse.org/
package-manager:
  apk: calcurse
  brew: calcurse
  debian: calcurse
  dnf: calcurse
  macports: calcurse
  nix: calcurse
  pacman: calcurse
  ubuntu: calcurse
  zypper: calcurse
package-manager-url: https://formulae.brew.sh/formula/calcurse
version: 4.8.2
license: BSD-2-Clause
category: network
tags:
  - cli
description: Text-based personal organizer
source-archive: https://calcurse.org/files/calcurse-4.8.2.tar.gz
dependencies:
  - gettext
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: calcurse
  - exposure: global executable
    kind: cli
    name: calcurse-caldav
  - exposure: global executable
    kind: cli
    name: calcurse-upgrade
  - exposure: global executable
    kind: cli
    name: calcurse-vdir
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add calcurse
  av: sudo av install brew:calcurse
  brew: brew install calcurse
  debian: sudo apt install calcurse
  dnf: sudo dnf install calcurse
  macports: sudo port install calcurse
  nix: nix profile install nixpkgs#calcurse
  pacman: sudo pacman -S calcurse
  ubuntu: sudo apt install calcurse
  zypper: sudo zypper install calcurse
provenance:
  formula: calcurse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
