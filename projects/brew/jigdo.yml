id: brew:jigdo
display-name: jigdo
homepage: https://www.einval.com/~steve/software/jigdo/
repo: https://www.einval.com/~steve/software/jigdo/download/jigdo-0.8.2.tar.xz
docs: https://www.einval.com/~steve/software/jigdo/
package-manager:
  brew: jigdo
  debian: jigdo-file
  dnf: jigdo
  macports: jigdo
  nix: jigdo
  ubuntu: jigdo-file
  zypper: jigdo
package-manager-url: https://formulae.brew.sh/formula/jigdo
version: 0.8.2
license: GPL-2.0-only WITH openvpn-openssl-exception
category: network
tags:
  - cli
description: Tool to distribute very large files over the internet
source-archive: https://www.einval.com/~steve/software/jigdo/download/jigdo-0.8.2.tar.xz
dependencies:
  - berkeley-db@5
  - gettext
  - wget
build-dependencies:
  - gettext
  - pkgconf
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: jigdo-file
  - exposure: global executable
    kind: cli
    name: jigdo-lite
  - exposure: global executable
    kind: cli
    name: jigdo-mirror
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jigdo
  brew: brew install jigdo
  debian: sudo apt install jigdo-file
  dnf: sudo dnf install jigdo
  macports: sudo port install jigdo
  nix: nix profile install nixpkgs#jigdo
  ubuntu: sudo apt install jigdo-file
  zypper: sudo zypper install jigdo
provenance:
  formula: jigdo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
