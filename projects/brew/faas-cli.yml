id: brew:faas-cli
display-name: faas-cli
homepage: https://www.openfaas.com/
repo: https://github.com/openfaas/faas-cli
docs: https://www.openfaas.com/
package-manager:
  brew: faas-cli
  chocolatey: faas-cli
  nix: faas-cli
  scoop: main/faas-cli
package-manager-url: https://formulae.brew.sh/formula/faas-cli
version: 0.18.8
license: MIT
category: development
tags:
  - cli
description: CLI for templating and/or deploying FaaS functions
source-archive: https://github.com/openfaas/faas-cli/archive/refs/tags/0.18.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: faas
  - exposure: global executable
    kind: cli
    name: faas-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:faas-cli
  brew: brew install faas-cli
  chocolatey: choco install faas-cli
  nix: nix profile install nixpkgs#faas-cli
  scoop: scoop install main/faas-cli
provenance:
  formula: faas-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
