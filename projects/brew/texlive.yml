bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add texlive
  av: sudo av install brew:texlive
  brew: brew install texlive
  chocolatey: choco install texlive
  debian: sudo apt install texlive
  dnf: sudo dnf install texlive
  macports: sudo port install texlive
  nix: nix profile install nixpkgs#texlive
  pacman: sudo pacman -S ptex
  scoop: scoop install main/latex
  ubuntu: sudo apt install texlive
  winget: winget install --id chezhe.Aleph -e
  zypper: sudo zypper install texlive
provenance:
  formula: texlive
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
