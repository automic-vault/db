id: brew:easy-tag
display-name: easy-tag
homepage: https://wiki.gnome.org/Apps/EasyTAG
repo: https://download.gnome.org/sources/easytag/2.4/easytag-2.4.3.tar.xz
docs: https://wiki.gnome.org/Apps/EasyTAG
package-manager:
  apk: easytag
  brew: easy-tag
  debian: easytag
  dnf: easytag
  macports: easytag
  nix: easytag
  pacman: easytag
  ubuntu: easytag
  winget: gnome.EasyTAG
  zypper: easytag
package-manager-url: https://formulae.brew.sh/formula/easy-tag
version: 2.4.3
license: GPL-2.0-or-later
category: media
tags:
  - cli
description: Application for viewing and editing audio file tags
source-archive: https://download.gnome.org/sources/easytag/2.4/easytag-2.4.3.tar.xz
dependencies:
  - adwaita-icon-theme
  - at-spi2-core
  - cairo
  - flac
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - harfbuzz
  - hicolor-icon-theme
  - id3lib
  - libid3tag
  - libogg
  - libvorbis
  - pango
  - speex
  - taglib
  - wavpack
build-dependencies:
  - appstream-glib
  - autoconf
  - automake
  - gettext
  - intltool
  - itstool
  - libtool
  - pkgconf
  - yelp-tools
executables:
  - exposure: global executable
    kind: cli
    name: easytag
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add easytag
  av: sudo av install brew:easy-tag
  brew: brew install easy-tag
  debian: sudo apt install easytag
  dnf: sudo dnf install easytag
  macports: sudo port install easytag
  nix: nix profile install nixpkgs#easytag
  pacman: sudo pacman -S easytag
  ubuntu: sudo apt install easytag
  winget: winget install --id gnome.EasyTAG -e
  zypper: sudo zypper install easytag
provenance:
  formula: easy-tag
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
