id: brew:questdb
display-name: questdb
homepage: https://questdb.io
repo: https://github.com/questdb/questdb
docs: https://questdb.io
package-manager:
  brew: questdb
  nix: questdb
  scoop: main/questdb
package-manager-url: https://formulae.brew.sh/formula/questdb
version: 9.4.0
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Time Series Database
source-archive: >
  https://github.com/questdb/questdb/releases/download/9.4.0/questdb-9.4.0-no-jre-bin.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: questdb
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:questdb
  brew: brew install questdb
  nix: nix profile install nixpkgs#questdb
  scoop: scoop install main/questdb
provenance:
  formula: questdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
