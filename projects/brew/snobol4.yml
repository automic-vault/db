id: brew:snobol4
display-name: snobol4
homepage: https://www.regressive.org/snobol4/
repo: https://ftp.regressive.org/snobol/snobol4-2.3.4.tar.gz
docs: https://www.regressive.org/snobol4/
package-manager:
  brew: snobol4
  dnf: snobol4
  macports: snobol4
  nix: snobol4
  zypper: snobol4
package-manager-url: https://formulae.brew.sh/formula/snobol4
version: 2.3.4
license: BSD-2-Clause
category: development
tags:
  - cli
description: String oriented and symbolic programming language
source-archive: https://ftp.regressive.org/snobol/snobol4-2.3.4.tar.gz
dependencies:
  - openssl@4
uses-from-macos:
  - libffi
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: sdb-2.3.4
  - exposure: global executable
    kind: cli
    name: snobol4
  - exposure: global executable
    kind: cli
    name: snobol4-2.3.4
  - exposure: global executable
    kind: cli
    name: snopea
  - exposure: global executable
    kind: cli
    name: snopea-2.3.4
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:snobol4
  brew: brew install snobol4
  dnf: sudo dnf install snobol4
  macports: sudo port install snobol4
  nix: nix profile install nixpkgs#snobol4
  zypper: sudo zypper install snobol4
provenance:
  formula: snobol4
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
