id: brew:libnice
display-name: libnice
homepage: https://wiki.freedesktop.org/nice/
repo: https://libnice.freedesktop.org/releases/libnice-0.1.23.tar.gz
docs: https://wiki.freedesktop.org/nice/
package-manager:
  apk: libnice
  brew: libnice
  dnf: libnice
  macports: libnice
  nix: libnice
  pacman: libnice
  zypper: libnice
package-manager-url: https://formulae.brew.sh/formula/libnice
version: 0.1.23
license: LGPL-2.1-or-later OR MPL-1.1
category: network
tags:
  - cli
description: GLib ICE implementation
source-archive: https://libnice.freedesktop.org/releases/libnice-0.1.23.tar.gz
dependencies:
  - gettext
  - glib
  - gnutls
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: stunbdc
  - exposure: global executable
    kind: cli
    name: stund
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libnice
  av: sudo av install brew:libnice
  brew: brew install libnice
  dnf: sudo dnf install libnice
  macports: sudo port install libnice
  nix: nix profile install nixpkgs#libnice
  pacman: sudo pacman -S libnice
  zypper: sudo zypper install libnice
provenance:
  formula: libnice
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
