id: brew:libtasn1
display-name: libtasn1
homepage: https://www.gnu.org/software/libtasn1/
repo: https://ftpmirror.gnu.org/gnu/libtasn1/libtasn1-4.21.0.tar.gz
docs: https://www.gnu.org/software/libtasn1/
package-manager:
  apk: libtasn1
  brew: libtasn1
  dnf: libtasn1
  macports: libtasn1
  nix: libtasn1
  pacman: libtasn1
package-manager-url: https://formulae.brew.sh/formula/libtasn1
version: 4.21.0
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: ASN.1 structure parser library
source-archive: https://ftpmirror.gnu.org/gnu/libtasn1/libtasn1-4.21.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: asn1Coding
  - exposure: global executable
    kind: cli
    name: asn1Decoding
  - exposure: global executable
    kind: cli
    name: asn1Parser
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libtasn1
  av: sudo av install brew:libtasn1
  brew: brew install libtasn1
  dnf: sudo dnf install libtasn1
  macports: sudo port install libtasn1
  nix: nix profile install nixpkgs#libtasn1
  pacman: sudo pacman -S libtasn1
provenance:
  formula: libtasn1
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
