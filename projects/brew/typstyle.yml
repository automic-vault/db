id: brew:typstyle
display-name: typstyle
homepage: https://typstyle-rs.github.io/typstyle/
repo: https://github.com/typstyle-rs/typstyle
docs: https://typstyle-rs.github.io/typstyle/
package-manager:
  apk: typstyle
  brew: typstyle
  nix: typstyle
  pacman: typstyle
  scoop: main/typstyle
  winget: Enter-tainer.typstyle
package-manager-url: https://formulae.brew.sh/formula/typstyle
version: 0.14.4
license: Apache-2.0
category: development
tags:
  - cli
description: Beautiful and reliable typst code formatter
source-archive: https://github.com/typstyle-rs/typstyle/archive/refs/tags/v0.14.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: typstyle
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add typstyle
  av: sudo av install brew:typstyle
  brew: brew install typstyle
  nix: nix profile install nixpkgs#typstyle
  pacman: sudo pacman -S typstyle
  scoop: scoop install main/typstyle
  winget: winget install --id Enter-tainer.typstyle -e
provenance:
  formula: typstyle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
