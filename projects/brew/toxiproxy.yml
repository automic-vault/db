id: brew:toxiproxy
display-name: toxiproxy
homepage: https://github.com/shopify/toxiproxy
repo: https://github.com/Shopify/toxiproxy
docs: https://github.com/shopify/toxiproxy
package-manager:
  brew: toxiproxy
  dnf: toxiproxy
  macports: toxiproxy
  nix: toxiproxy
package-manager-url: https://formulae.brew.sh/formula/toxiproxy
version: 2.12.0
license: MIT
category: development
tags:
  - cli
description: TCP proxy to simulate network & system conditions for chaos & resiliency testing
source-archive: https://github.com/Shopify/toxiproxy/archive/refs/tags/v2.12.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: toxiproxy-cli
  - exposure: global executable
    kind: cli
    name: toxiproxy-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:toxiproxy
  brew: brew install toxiproxy
  dnf: sudo dnf install toxiproxy
  macports: sudo port install toxiproxy
  nix: nix profile install nixpkgs#toxiproxy
provenance:
  formula: toxiproxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
