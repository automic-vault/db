id: brew:get_iplayer
display-name: get_iplayer
homepage: https://github.com/get-iplayer/get_iplayer
repo: https://github.com/get-iplayer/get_iplayer
docs: https://github.com/get-iplayer/get_iplayer
package-manager:
  brew: get_iplayer
  dnf: get_iplayer
  macports: get_iplayer
  nix: get_iplayer
  scoop: main/get-iplayer
package-manager-url: https://formulae.brew.sh/formula/get_iplayer
version: 3.36
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Utility for downloading TV and radio programmes from BBC iPlayer
source-archive: https://github.com/get-iplayer/get_iplayer/archive/refs/tags/v3.36.tar.gz
dependencies:
  - atomicparsley
  - ffmpeg
uses-from-macos:
  - libxml2
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: get_iplayer
  - exposure: global executable
    kind: cli
    name: get_iplayer.cgi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:get_iplayer
  brew: brew install get_iplayer
  dnf: sudo dnf install get_iplayer
  macports: sudo port install get_iplayer
  nix: nix profile install nixpkgs#get_iplayer
  scoop: scoop install main/get-iplayer
provenance:
  formula: get_iplayer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
