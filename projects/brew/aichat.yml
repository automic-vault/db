id: brew:aichat
display-name: aichat
homepage: https://github.com/sigoden/aichat
repo: https://github.com/sigoden/aichat
docs: https://github.com/sigoden/aichat
package-manager:
  brew: aichat
  macports: aichat
  nix: aichat
  pacman: aichat
  scoop: main/aichat
  winget: sigoden.AIChat
package-manager-url: https://formulae.brew.sh/formula/aichat
version: 0.30.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: All-in-one AI-Powered CLI Chat & Copilot
source-archive: https://github.com/sigoden/aichat/archive/refs/tags/v0.30.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: aichat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aichat
  brew: brew install aichat
  macports: sudo port install aichat
  nix: nix profile install nixpkgs#aichat
  pacman: sudo pacman -S aichat
  scoop: scoop install main/aichat
  winget: winget install --id sigoden.AIChat -e
provenance:
  formula: aichat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
