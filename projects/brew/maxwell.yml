id: brew:maxwell
display-name: maxwell
homepage: https://maxwells-daemon.io/
repo: https://github.com/zendesk/maxwell
docs: https://maxwells-daemon.io/
package-manager:
  brew: maxwell
  macports: maxwell
package-manager-url: https://formulae.brew.sh/formula/maxwell
version: 1.44.1
license: Apache-2.0
category: database
tags:
  - cli
  - json
description: Reads MySQL binlogs and writes row updates as JSON to Kafka
source-archive: https://github.com/zendesk/maxwell/releases/download/v1.44.1/maxwell-1.44.1.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: maxwell
  - exposure: global executable
    kind: cli
    name: maxwell-bootstrap
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:maxwell
  brew: brew install maxwell
  macports: sudo port install maxwell
provenance:
  formula: maxwell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
