id: brew:vtk
display-name: vtk
homepage: https://www.vtk.org/
repo: https://www.vtk.org/files/release/9.6/VTK-9.6.2.tar.gz
docs: https://www.vtk.org/
package-manager:
  apk: vtk
  brew: vtk
  dnf: vtk
  macports: vtk
  nix: vtk
  pacman: vtk
package-manager-url: https://formulae.brew.sh/formula/vtk
version: 9.6.2
license: BSD-3-Clause
category: media
tags:
  - cli
description: Toolkit for 3D computer graphics, image processing, and visualization
source-archive: https://www.vtk.org/files/release/9.6/VTK-9.6.2.tar.gz
dependencies:
  - boost
  - cgns
  - double-conversion
  - eigen
  - fontconfig
  - freetype
  - hdf5
  - jpeg-turbo
  - jsoncpp
  - libharu
  - libogg
  - libpng
  - libtiff
  - lz4
  - netcdf
  - nlohmann-json
  - proj
  - pugixml
  - python@3.14
  - qtbase
  - qtdeclarative
  - sqlite
  - theora
  - utf8cpp
  - xz
build-dependencies:
  - cmake
uses-from-macos:
  - expat
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: vtkParseJava-9.6
  - exposure: global executable
    kind: cli
    name: vtkProbeOpenGLVersion-9.6
  - exposure: global executable
    kind: cli
    name: vtkWrapHierarchy-9.6
  - exposure: global executable
    kind: cli
    name: vtkWrapJava-9.6
  - exposure: global executable
    kind: cli
    name: vtkWrapJavaScript-9.6
  - exposure: global executable
    kind: cli
    name: vtkWrapPython-9.6
  - exposure: global executable
    kind: cli
    name: vtkWrapPythonInit-9.6
  - exposure: global executable
    kind: cli
    name: vtkWrapSerDes-9.6
  - exposure: global executable
    kind: cli
    name: vtkpython
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vtk
  av: sudo av install brew:vtk
  brew: brew install vtk
  dnf: sudo dnf install vtk
  macports: sudo port install vtk
  nix: nix profile install nixpkgs#vtk
  pacman: sudo pacman -S vtk
provenance:
  formula: vtk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
