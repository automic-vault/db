id: brew:cidr
display-name: cidr
homepage: https://github.com/bschaatsbergen/cidr
repo: https://github.com/bschaatsbergen/cidr
docs: https://github.com/bschaatsbergen/cidr
package-manager:
  brew: cidr
  debian: cidr
  macports: cidr
package-manager-url: https://formulae.brew.sh/formula/cidr
version: 2.3.0
license: MIT
category: development
tags:
  - cli
description: CLI to perform various actions on CIDR ranges
source-archive: https://github.com/bschaatsbergen/cidr/archive/refs/tags/v2.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cidr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cidr
  brew: brew install cidr
  debian: sudo apt install cidr
  macports: sudo port install cidr
provenance:
  formula: cidr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
