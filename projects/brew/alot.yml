id: brew:alot
display-name: alot
homepage: https://github.com/pazz/alot
repo: https://github.com/pazz/alot
docs: https://github.com/pazz/alot
package-manager:
  brew: alot
  debian: alot
  dnf: alot
  macports: alot
  nix: alot
  pacman: alot
  ubuntu: alot
package-manager-url: https://formulae.brew.sh/formula/alot
version: 0.12
license: GPL-3.0-only
category: development
tags:
  - cli
description: Text mode MUA using notmuch mail
source-archive: https://github.com/pazz/alot.git
dependencies:
  - gpgmepy
  - libmagic
  - notmuch
  - python@3.14
build-dependencies:
  - sphinx-doc
  - swig
executables:
  - exposure: global executable
    kind: cli
    name: alot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:alot
  brew: brew install alot
  debian: sudo apt install alot
  dnf: sudo dnf install alot
  macports: sudo port install alot
  nix: nix profile install nixpkgs#alot
  pacman: sudo pacman -S alot
  ubuntu: sudo apt install alot
provenance:
  formula: alot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
