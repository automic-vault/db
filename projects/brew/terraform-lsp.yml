id: brew:terraform-lsp
display-name: terraform-lsp
homepage: https://github.com/juliosueiras/terraform-lsp
repo: https://github.com/juliosueiras/terraform-lsp
docs: https://github.com/juliosueiras/terraform-lsp
package-manager:
  brew: terraform-lsp
  nix: terraform-lsp
package-manager-url: https://formulae.brew.sh/formula/terraform-lsp
version: 0.0.12
license: MIT
category: cloud
tags:
  - cli
description: Language Server Protocol for Terraform
source-archive: https://github.com/juliosueiras/terraform-lsp.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terraform-lsp
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terraform-lsp
  brew: brew install terraform-lsp
  nix: nix profile install nixpkgs#terraform-lsp
provenance:
  formula: terraform-lsp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
