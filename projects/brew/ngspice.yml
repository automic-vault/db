id: brew:ngspice
display-name: ngspice
homepage: https://ngspice.sourceforge.io/
repo: https://downloads.sourceforge.net/project/ngspice/ng-spice-rework/46/ngspice-46.tar.gz
docs: https://ngspice.sourceforge.io/
package-manager:
  apk: ngspice
  brew: ngspice
  chocolatey: ngspice
  debian: ngspice
  dnf: ngspice
  macports: ngspice
  nix: ngspice
  pacman: ngspice
  scoop: extras/ngspice
  ubuntu: ngspice
  zypper: ngspice
package-manager-url: https://formulae.brew.sh/formula/ngspice
version: 46
license: LicenseRef-Homebrew-cannot-represent
category: network
tags:
  - cli
description: Spice circuit simulator
source-archive: https://downloads.sourceforge.net/project/ngspice/ng-spice-rework/46/ngspice-46.tar.gz
dependencies:
  - fftw
  - freetype
  - libice
  - libngspice
  - libsm
  - libx11
  - libxaw
  - libxext
  - libxmu
  - libxt
  - readline
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ngspice
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    If you need the graphical plotting functions you need to install X11 with: brew
    install --cask xquartz
  post-install-defined: false
install-lines:
  apk: sudo apk add ngspice
  av: sudo av install brew:ngspice
  brew: brew install ngspice
  chocolatey: choco install ngspice
  debian: sudo apt install ngspice
  dnf: sudo dnf install ngspice
  macports: sudo port install ngspice
  nix: nix profile install nixpkgs#ngspice
  pacman: sudo pacman -S ngspice
  scoop: scoop install extras/ngspice
  ubuntu: sudo apt install ngspice
  zypper: sudo zypper install ngspice
provenance:
  formula: ngspice
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
