id: brew:swift-protobuf
display-name: swift-protobuf
homepage: https://github.com/apple/swift-protobuf
repo: https://github.com/apple/swift-protobuf
docs: https://github.com/apple/swift-protobuf
package-manager:
  brew: swift-protobuf
  nix: protoc-gen-swift
package-manager-url: https://formulae.brew.sh/formula/swift-protobuf
version: 1.38.0
license: Apache-2.0
category: development
tags:
  - cli
description: Plugin and runtime library for using protobuf with Swift
source-archive: https://github.com/apple/swift-protobuf.git
dependencies:
  - protobuf
executables:
  - exposure: global executable
    kind: cli
    name: protoc-gen-swift
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swift-protobuf
  brew: brew install swift-protobuf
  nix: nix profile install nixpkgs#protoc-gen-swift
provenance:
  formula: swift-protobuf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
