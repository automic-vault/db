id: brew:mas
display-name: mas
homepage: https://github.com/mas-cli/mas
repo: https://github.com/mas-cli/mas
docs: https://github.com/mas-cli/mas
package-manager:
  brew: mas
  macports: mas
  nix: mas
package-manager-url: https://formulae.brew.sh/formula/mas
version: 7.0.0
license: MIT
category: development
tags:
  - cli
description: Mac App Store command-line interface
source-archive: https://github.com/mas-cli/mas.git
executables:
  - exposure: global executable
    kind: cli
    name: mas
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mas
  brew: brew install mas
  macports: sudo port install mas
  nix: nix profile install nixpkgs#mas
provenance:
  formula: mas
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
