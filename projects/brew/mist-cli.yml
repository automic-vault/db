id: brew:mist-cli
display-name: mist-cli
homepage: https://github.com/ninxsoft/mist-cli
repo: https://github.com/ninxsoft/mist-cli
docs: https://github.com/ninxsoft/mist-cli
package-manager:
  brew: mist-cli
  macports: mist-cli
  nix: mist-cli
  scoop: extras/mist
package-manager-url: https://formulae.brew.sh/formula/mist-cli
version: 2.2
license: MIT
category: development
tags:
  - cli
description: Mac command-line tool that automatically downloads macOS Firmwares / Installers
source-archive: https://github.com/ninxsoft/mist-cli/archive/refs/tags/v2.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mist
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mist-cli
  brew: brew install mist-cli
  macports: sudo port install mist-cli
  nix: nix profile install nixpkgs#mist-cli
  scoop: scoop install extras/mist
provenance:
  formula: mist-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
