id: brew:hexhog
display-name: hexhog
homepage: https://github.com/DVDTSB/hexhog
repo: https://github.com/DVDTSB/hexhog
docs: https://github.com/DVDTSB/hexhog
package-manager:
  brew: hexhog
package-manager-url: https://formulae.brew.sh/formula/hexhog
version: 0.1.3
license: MIT
category: development
tags:
  - cli
description: Hex viewer/editor
source-archive: https://github.com/DVDTSB/hexhog/archive/refs/tags/v0.1.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hexhog
bottle:
