id: brew:payload-dumper-go
display-name: payload-dumper-go
homepage: https://github.com/ssut/payload-dumper-go
repo: https://github.com/ssut/payload-dumper-go
docs: https://github.com/ssut/payload-dumper-go
package-manager:
  brew: payload-dumper-go
  macports: payload-dumper-go
  nix: payload-dumper-go
package-manager-url: https://formulae.brew.sh/formula/payload-dumper-go
version: 1.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Android OTA payload dumper written in Go
source-archive: https://github.com/ssut/payload-dumper-go/archive/refs/tags/1.3.0.tar.gz
dependencies:
  - xz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: payload-dumper-go
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:payload-dumper-go
  brew: brew install payload-dumper-go
  macports: sudo port install payload-dumper-go
  nix: nix profile install nixpkgs#payload-dumper-go
provenance:
  formula: payload-dumper-go
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
