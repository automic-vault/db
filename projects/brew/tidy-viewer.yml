id: brew:tidy-viewer
display-name: tidy-viewer
homepage: https://github.com/alexhallam/tv
repo: https://github.com/alexhallam/tv
docs: https://github.com/alexhallam/tv
package-manager:
  brew: tidy-viewer
  nix: tidy-viewer
package-manager-url: https://formulae.brew.sh/formula/tidy-viewer
version: 1.8.93
license: Unlicense
category: development
tags:
  - cli
description: CLI csv pretty printer
source-archive: https://github.com/alexhallam/tv/archive/refs/tags/1.8.93.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tidy-viewer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tidy-viewer
  brew: brew install tidy-viewer
  nix: nix profile install nixpkgs#tidy-viewer
provenance:
  formula: tidy-viewer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
