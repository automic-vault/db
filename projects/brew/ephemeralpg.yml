id: brew:ephemeralpg
display-name: ephemeralpg
homepage: https://eradman.com/ephemeralpg/
repo: https://eradman.com/ephemeralpg/code/ephemeralpg-3.4.tar.gz
docs: https://eradman.com/ephemeralpg/
package-manager:
  brew: ephemeralpg
  nix: ephemeralpg
package-manager-url: https://formulae.brew.sh/formula/ephemeralpg
version: 3.4
license: ISC
category: database
tags:
  - cli
  - database
description: Run tests on an isolated, temporary Postgres database
source-archive: https://eradman.com/ephemeralpg/code/ephemeralpg-3.4.tar.gz
dependencies:
  - libpq
executables:
  - exposure: global executable
    kind: cli
    name: getsocket
  - exposure: global executable
    kind: cli
    name: pg_tmp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ephemeralpg
  brew: brew install ephemeralpg
  nix: nix profile install nixpkgs#ephemeralpg
provenance:
  formula: ephemeralpg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
