id: brew:pinboard-notes-backup
display-name: pinboard-notes-backup
homepage: https://github.com/bdesham/pinboard-notes-backup
repo: https://github.com/bdesham/pinboard-notes-backup
docs: https://github.com/bdesham/pinboard-notes-backup
package-manager:
  brew: pinboard-notes-backup
  nix: pinboard-notes-backup
package-manager-url: https://formulae.brew.sh/formula/pinboard-notes-backup
version: 1.0.7.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Efficiently back up the notes you've saved to Pinboard
source-archive: https://github.com/bdesham/pinboard-notes-backup/archive/refs/tags/v1.0.7.1.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: pnbackup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pinboard-notes-backup
  brew: brew install pinboard-notes-backup
  nix: nix profile install nixpkgs#pinboard-notes-backup
provenance:
  formula: pinboard-notes-backup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
