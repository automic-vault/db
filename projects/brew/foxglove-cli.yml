id: brew:foxglove-cli
display-name: foxglove-cli
homepage: https://github.com/foxglove/foxglove-cli
repo: https://github.com/foxglove/foxglove-cli
docs: https://github.com/foxglove/foxglove-cli
package-manager:
  brew: foxglove-cli
  nix: foxglove-cli
package-manager-url: https://formulae.brew.sh/formula/foxglove-cli
version: 1.0.31
license: MIT
category: development
tags:
  - cli
description: Foxglove command-line tool
source-archive: https://github.com/foxglove/foxglove-cli/archive/refs/tags/v1.0.31.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: foxglove
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:foxglove-cli
  brew: brew install foxglove-cli
  nix: nix profile install nixpkgs#foxglove-cli
provenance:
  formula: foxglove-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
