id: brew:umoci
display-name: umoci
homepage: https://github.com/opencontainers/umoci
repo: https://github.com/opencontainers/umoci
docs: https://github.com/opencontainers/umoci
package-manager:
  apk: umoci
  brew: umoci
  debian: umoci
  dnf: umoci
  nix: umoci
  pacman: umoci
  ubuntu: umoci
  zypper: umoci
package-manager-url: https://formulae.brew.sh/formula/umoci
version: 0.6.0
license: Apache-2.0
category: development
tags:
  - cli
description: Reference OCI implementation for creating, modifying and inspecting images
source-archive: https://github.com/opencontainers/umoci/archive/refs/tags/v0.6.0.tar.gz
dependencies:
  - gpgme
build-dependencies:
  - go
  - go-md2man
executables:
  - exposure: global executable
    kind: cli
    name: umoci
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add umoci
  av: sudo av install brew:umoci
  brew: brew install umoci
  debian: sudo apt install umoci
  dnf: sudo dnf install umoci
  nix: nix profile install nixpkgs#umoci
  pacman: sudo pacman -S umoci
  ubuntu: sudo apt install umoci
  zypper: sudo zypper install umoci
provenance:
  formula: umoci
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
