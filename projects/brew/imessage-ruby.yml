id: brew:imessage-ruby
display-name: imessage-ruby
homepage: https://github.com/linjunpop/imessage
repo: https://github.com/linjunpop/imessage
docs: https://github.com/linjunpop/imessage
package-manager:
  brew: imessage-ruby
package-manager-url: https://formulae.brew.sh/formula/imessage-ruby
version: 0.4.0
license: MIT
category: development
tags:
  - cli
description: Command-line tool to send iMessage
source-archive: https://github.com/linjunpop/imessage/archive/refs/tags/v0.4.0.tar.gz
uses-from-macos:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: imessage
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:imessage-ruby
  brew: brew install imessage-ruby
provenance:
  formula: imessage-ruby
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
