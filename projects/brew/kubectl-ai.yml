id: brew:kubectl-ai
display-name: kubectl-ai
homepage: https://github.com/GoogleCloudPlatform/kubectl-ai
repo: https://github.com/GoogleCloudPlatform/kubectl-ai
docs: https://github.com/GoogleCloudPlatform/kubectl-ai
package-manager:
  brew: kubectl-ai
  nix: kubectl-ai
package-manager-url: https://formulae.brew.sh/formula/kubectl-ai
version: 0.0.31
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: AI powered Kubernetes Assistant
source-archive: https://github.com/GoogleCloudPlatform/kubectl-ai/archive/refs/tags/v0.0.31.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubectl-ai
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubectl-ai
  brew: brew install kubectl-ai
  nix: nix profile install nixpkgs#kubectl-ai
provenance:
  formula: kubectl-ai
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
