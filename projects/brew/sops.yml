id: brew:sops
display-name: sops
homepage: https://getsops.io/
repo: https://github.com/getsops/sops
docs: https://getsops.io/
package-manager:
  apk: sops
  brew: sops
  chocolatey: sops
  macports: sops
  nix: sops
  pacman: sops
  scoop: main/sops
  winget: Mozilla.SOPS
  zypper: sops
package-manager-url: https://formulae.brew.sh/formula/sops
version: 3.13.1
license: MPL-2.0
category: security
tags:
  - cli
description: Editor of encrypted files
source-archive: https://github.com/getsops/sops/archive/refs/tags/v3.13.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sops
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sops
  av: sudo av install brew:sops
  brew: brew install sops
  chocolatey: choco install sops
  macports: sudo port install sops
  nix: nix profile install nixpkgs#sops
  pacman: sudo pacman -S sops
  scoop: scoop install main/sops
  winget: winget install --id Mozilla.SOPS -e
  zypper: sudo zypper install sops
provenance:
  formula: sops
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
