id: brew:duckdb
display-name: duckdb
homepage: https://www.duckdb.org
repo: https://github.com/duckdb/duckdb
docs: https://www.duckdb.org
package-manager:
  apk: duckdb
  brew: duckdb
  macports: duckdb
  nix: duckdb
  pacman: duckdb
  scoop: main/duckdb
  winget: DuckDB.cli
package-manager-url: https://formulae.brew.sh/formula/duckdb
version: 1.5.3
license: MIT
category: database
tags:
  - cli
  - database
description: Embeddable SQL OLAP Database Management System
source-archive: https://github.com/duckdb/duckdb.git
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: duckdb
  - exposure: global executable
    kind: cli
    name: duckdb_cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add duckdb
  av: sudo av install brew:duckdb
  brew: brew install duckdb
  macports: sudo port install duckdb
  nix: nix profile install nixpkgs#duckdb
  pacman: sudo pacman -S duckdb
  scoop: scoop install main/duckdb
  winget: winget install --id DuckDB.cli -e
provenance:
  formula: duckdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
