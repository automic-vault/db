id: brew:yuicompressor
display-name: yuicompressor
homepage: https://yui.github.io/yuicompressor/
repo: https://github.com/yui/yuicompressor
docs: https://yui.github.io/yuicompressor/
package-manager:
  brew: yuicompressor
  macports: yuicompressor
  nix: yuicompressor
package-manager-url: https://formulae.brew.sh/formula/yuicompressor
version: 2.4.8
license: BSD-3-Clause
category: development
tags:
  - cli
description: Yahoo! JavaScript and CSS compressor
source-archive: https://github.com/yui/yuicompressor/releases/download/v2.4.8/yuicompressor-2.4.8.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: yuicompressor
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yuicompressor
  brew: brew install yuicompressor
  macports: sudo port install yuicompressor
  nix: nix profile install nixpkgs#yuicompressor
provenance:
  formula: yuicompressor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
