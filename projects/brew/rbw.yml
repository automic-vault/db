id: brew:rbw
display-name: rbw
homepage: https://github.com/doy/rbw
repo: https://github.com/doy/rbw
docs: https://github.com/doy/rbw
package-manager:
  apk: rbw
  brew: rbw
  dnf: rbw
  nix: rbw
  pacman: rbw
package-manager-url: https://formulae.brew.sh/formula/rbw
version: 1.15.0
license: MIT
category: development
tags:
  - cli
description: Unofficial Bitwarden CLI client
source-archive: https://github.com/doy/rbw/archive/refs/tags/1.15.0.tar.gz
dependencies:
  - pinentry
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rbw
  - exposure: global executable
    kind: cli
    name: rbw-agent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rbw
  av: sudo av install brew:rbw
  brew: brew install rbw
  dnf: sudo dnf install rbw
  nix: nix profile install nixpkgs#rbw
  pacman: sudo pacman -S rbw
provenance:
  formula: rbw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
