id: brew:detekt
display-name: detekt
homepage: https://github.com/detekt/detekt
repo: https://github.com/detekt/detekt
docs: https://github.com/detekt/detekt
package-manager:
  brew: detekt
  nix: detekt
  scoop: main/detekt
package-manager-url: https://formulae.brew.sh/formula/detekt
version: 1.23.8
license: Apache-2.0
category: development
tags:
