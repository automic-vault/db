id: brew:inko
display-name: inko
homepage: https://inko-lang.org/
repo: https://releases.inko-lang.org/0.20.0.tar.gz
docs: https://inko-lang.org/
package-manager:
  apk: inko
  brew: inko
  nix: inko
package-manager-url: https://formulae.brew.sh/formula/inko
version: 0.20.0
license: MPL-2.0
category: development
tags:
  - cli
description: Safe and concurrent object-oriented programming language
source-archive: https://releases.inko-lang.org/0.20.0.tar.gz
dependencies:
  - llvm
build-dependencies:
  - rust
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: inko
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add inko
  av: sudo av install brew:inko
  brew: brew install inko
  nix: nix profile install nixpkgs#inko
provenance:
  formula: inko
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
