id: brew:fpm
display-name: fpm
homepage: https://fpm.fortran-lang.org
repo: https://github.com/fortran-lang/fpm
docs: https://fpm.fortran-lang.org
package-manager:
  brew: fpm
  macports: fpm
  nix: fpm
  scoop: extras/fpm
  winget: FortranLang.fpm
package-manager-url: https://formulae.brew.sh/formula/fpm
version: 0.13.0
license: MIT
category: development
tags:
  - cli
description: Package manager and build system for Fortran
source-archive: https://github.com/fortran-lang/fpm/releases/download/v0.13.0/fpm-0.13.0.F90
dependencies:
  - gcc
executables:
  - exposure: global executable
    kind: cli
    name: fpm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fpm
  brew: brew install fpm
  macports: sudo port install fpm
  nix: nix profile install nixpkgs#fpm
  scoop: scoop install extras/fpm
  winget: winget install --id FortranLang.fpm -e
provenance:
  formula: fpm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
