id: brew:mint
display-name: mint
homepage: https://github.com/yonaskolb/Mint
repo: https://github.com/yonaskolb/Mint
docs: https://github.com/yonaskolb/Mint
package-manager:
  brew: mint
  macports: mint
  nix: mint
package-manager-url: https://formulae.brew.sh/formula/mint
version: 0.18.0
license: MIT
category: development
tags:
  - cli
description: Dependency manager that installs and runs Swift command-line tool packages
source-archive: https://github.com/yonaskolb/Mint/archive/refs/tags/0.18.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mint
  brew: brew install mint
  macports: sudo port install mint
  nix: nix profile install nixpkgs#mint
provenance:
  formula: mint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
