id: brew:fastd
display-name: fastd
homepage: https://github.com/neocturne/fastd
repo: https://github.com/neocturne/fastd
docs: https://github.com/neocturne/fastd
package-manager:
  apk: fastd
  brew: fastd
  debian: fastd
  dnf: fastd
  nix: fastd
  pacman: fastd
  ubuntu: fastd
package-manager-url: https://formulae.brew.sh/formula/fastd
version: 23
license: BSD-2-Clause
category: development
tags:
  - cli
description: Fast and Secure Tunnelling Daemon
source-archive: https://github.com/neocturne/fastd/releases/download/v23/fastd-23.tar.xz
dependencies:
  - json-c
  - libsodium
  - libuecc
  - openssl@4
build-dependencies:
  - bison
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fastd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fastd
  av: sudo av install brew:fastd
  brew: brew install fastd
  debian: sudo apt install fastd
  dnf: sudo dnf install fastd
  nix: nix profile install nixpkgs#fastd
  pacman: sudo pacman -S fastd
  ubuntu: sudo apt install fastd
provenance:
  formula: fastd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
