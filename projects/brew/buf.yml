id: brew:buf
display-name: buf
homepage: https://github.com/bufbuild/buf
repo: https://github.com/bufbuild/buf
docs: https://github.com/bufbuild/buf
package-manager:
  apk: buf
  brew: buf
  macports: buf
  nix: buf
  pacman: buf
  scoop: main/buf
  winget: bufbuild.buf
package-manager-url: https://formulae.brew.sh/formula/buf
version: 1.70.0
license: Apache-2.0
category: development
tags:
  - cli
description: New way of working with Protocol Buffers
source-archive: https://github.com/bufbuild/buf/archive/refs/tags/v1.70.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: buf
  - exposure: global executable
    kind: cli
    name: protoc-gen-buf-breaking
  - exposure: global executable
    kind: cli
    name: protoc-gen-buf-lint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add buf
  av: sudo av install brew:buf
  brew: brew install buf
  macports: sudo port install buf
  nix: nix profile install nixpkgs#buf
  pacman: sudo pacman -S buf
  scoop: scoop install main/buf
  winget: winget install --id bufbuild.buf -e
provenance:
  formula: buf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
