id: brew:tcsh
display-name: tcsh
homepage: https://www.tcsh.org/
repo: https://astron.com/pub/tcsh/tcsh-6.24.16.tar.gz
docs: https://www.tcsh.org/
package-manager:
  apk: tcsh
  brew: tcsh
  debian: tcsh
  dnf: tcsh
  macports: tcsh
  nix: tcsh
  pacman: tcsh
  ubuntu: tcsh
  zypper: tcsh
package-manager-url: https://formulae.brew.sh/formula/tcsh
version: 6.24.16
license: BSD-3-Clause
category: network
tags:
  - cli
description: Enhanced, fully compatible version of the Berkeley C shell
source-archive: https://astron.com/pub/tcsh/tcsh-6.24.16.tar.gz
uses-from-macos:
  - libxcrypt
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: csh
  - exposure: global executable
    kind: cli
    name: tcsh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tcsh
  av: sudo av install brew:tcsh
  brew: brew install tcsh
  debian: sudo apt install tcsh
  dnf: sudo dnf install tcsh
  macports: sudo port install tcsh
  nix: nix profile install nixpkgs#tcsh
  pacman: sudo pacman -S tcsh
  ubuntu: sudo apt install tcsh
  zypper: sudo zypper install tcsh
provenance:
  formula: tcsh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
