id: brew:pit
display-name: pit
homepage: https://github.com/michaeldv/pit
repo: https://github.com/michaeldv/pit
docs: https://github.com/michaeldv/pit
package-manager:
  brew: pit
package-manager-url: https://formulae.brew.sh/formula/pit
version: 0.1.0
license: BSD-2-Clause
category: development
tags:
  - cli
  - git
description: Project manager from hell (integrates with Git)
source-archive: https://github.com/michaeldv/pit/archive/refs/tags/0.1.0.tar.gz
uses-from-macos:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: pit
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pit
  brew: brew install pit
provenance:
  formula: pit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
