id: brew:woodpecker-cli
display-name: woodpecker-cli
homepage: https://woodpecker-ci.org/
repo: https://github.com/woodpecker-ci/woodpecker
docs: https://woodpecker-ci.org/
package-manager:
  apk: woodpecker-cli
  brew: woodpecker-cli
  nix: woodpecker-cli
  pacman: woodpecker-cli
  zypper: woodpecker-cli
package-manager-url: https://formulae.brew.sh/formula/woodpecker-cli
version: 3.14.1
license: Apache-2.0
category: development
tags:
  - cli
description: CLI client for the Woodpecker Continuous Integration server
source-archive: https://github.com/woodpecker-ci/woodpecker/archive/refs/tags/v3.14.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: woodpecker-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add woodpecker-cli
  av: sudo av install brew:woodpecker-cli
  brew: brew install woodpecker-cli
  nix: nix profile install nixpkgs#woodpecker-cli
  pacman: sudo pacman -S woodpecker-cli
  zypper: sudo zypper install woodpecker-cli
provenance:
  formula: woodpecker-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
