id: brew:glow
display-name: glow
homepage: https://github.com/charmbracelet/glow
repo: https://github.com/charmbracelet/glow
docs: https://github.com/charmbracelet/glow
package-manager:
  apk: glow
  brew: glow
  debian: glow
  dnf: glow
  macports: glow
  nix: glow
  pacman: glow
  scoop: main/glow
  winget: charmbracelet.glow
  zypper: glow
package-manager-url: https://formulae.brew.sh/formula/glow
version: 2.1.2
license: MIT
category: development
tags:
  - cli
description: Render markdown on the CLI
source-archive: https://github.com/charmbracelet/glow/archive/refs/tags/v2.1.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: glow
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add glow
  av: sudo av install brew:glow
  brew: brew install glow
  debian: sudo apt install glow
  dnf: sudo dnf install glow
  macports: sudo port install glow
  nix: nix profile install nixpkgs#glow
  pacman: sudo pacman -S glow
  scoop: scoop install main/glow
  winget: winget install --id charmbracelet.glow -e
  zypper: sudo zypper install glow
provenance:
  formula: glow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
