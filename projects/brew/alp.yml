id: brew:alp
display-name: alp
homepage: https://github.com/tkuchiki/alp
repo: https://github.com/tkuchiki/alp
docs: https://github.com/tkuchiki/alp
package-manager:
  brew: alp
  nix: alp
package-manager-url: https://formulae.brew.sh/formula/alp
version: 1.0.21
license: MIT
category: development
tags:
  - cli
description: Access Log Profiler
source-archive: https://github.com/tkuchiki/alp/archive/refs/tags/v1.0.21.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: alp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:alp
  brew: brew install alp
  nix: nix profile install nixpkgs#alp
provenance:
  formula: alp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
