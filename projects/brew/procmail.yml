    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:procmail
  brew: brew install procmail
  debian: sudo apt install procmail
  dnf: sudo dnf install procmail
  macports: sudo port install procmail
  nix: nix profile install nixpkgs#procmail
  ubuntu: sudo apt install procmail
  zypper: sudo zypper install procmail
provenance:
  formula: procmail
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
