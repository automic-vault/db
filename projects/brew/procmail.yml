id: brew:procmail
display-name: procmail
homepage: https://github.com/BuGlessRB/procmail
repo: https://github.com/BuGlessRB/procmail
docs: https://github.com/BuGlessRB/procmail
package-manager:
  brew: procmail
  debian: procmail
  dnf: procmail
  macports: procmail
  nix: procmail
  ubuntu: procmail
  zypper: procmail
package-manager-url: https://formulae.brew.sh/formula/procmail
version: 3.24
license: GPL-2.0-or-later OR Artistic-1.0-Perl
category: development
tags:
  - cli
description: Autonomous mail processor
source-archive: https://github.com/BuGlessRB/procmail/archive/refs/tags/v3.24.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: formail
  - exposure: global executable
    kind: cli
    name: lockfile
  - exposure: global executable
    kind: cli
    name: mailstat
  - exposure: global executable
    kind: cli
    name: procmail
bottle:
