id: brew:libnfs
display-name: libnfs
homepage: https://github.com/sahlberg/libnfs
repo: https://github.com/sahlberg/libnfs
docs: https://github.com/sahlberg/libnfs
package-manager:
  apk: libnfs
  brew: libnfs
  dnf: libnfs
  macports: libnfs
  nix: libnfs
  pacman: libnfs
package-manager-url: https://formulae.brew.sh/formula/libnfs
version: 6.0.2
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: C client library for NFS
source-archive: https://github.com/sahlberg/libnfs/archive/refs/tags/libnfs-6.0.2.tar.gz
build-dependencies:
  - cmake
  - docbook
  - docbook-xsl
executables:
  - exposure: global executable
    kind: cli
    name: nfs-cat
  - exposure: global executable
    kind: cli
    name: nfs-cp
  - exposure: global executable
    kind: cli
    name: nfs-ls
  - exposure: global executable
    kind: cli
    name: nfs-stat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libnfs
  av: sudo av install brew:libnfs
  brew: brew install libnfs
  dnf: sudo dnf install libnfs
  macports: sudo port install libnfs
  nix: nix profile install nixpkgs#libnfs
  pacman: sudo pacman -S libnfs
provenance:
  formula: libnfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
