id: brew:ttygif
display-name: ttygif
homepage: https://github.com/icholy/ttygif
repo: https://github.com/icholy/ttygif
docs: https://github.com/icholy/ttygif
package-manager:
  brew: ttygif
  debian: ttygif
  macports: ttygif
  nix: ttygif
  ubuntu: ttygif
package-manager-url: https://formulae.brew.sh/formula/ttygif
version: 1.6.0
license: MIT
category: development
tags:
  - cli
description: Converts a ttyrec file into gif files
source-archive: https://github.com/icholy/ttygif/archive/refs/tags/1.6.0.tar.gz
dependencies:
  - imagemagick
  - ttyrec
executables:
  - exposure: global executable
    kind: cli
    name: ttygif
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ttygif
  brew: brew install ttygif
  debian: sudo apt install ttygif
  macports: sudo port install ttygif
  nix: nix profile install nixpkgs#ttygif
  ubuntu: sudo apt install ttygif
provenance:
  formula: ttygif
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
