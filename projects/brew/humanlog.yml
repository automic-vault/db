id: brew:humanlog
display-name: humanlog
homepage: https://github.com/humanlogio/humanlog
repo: https://github.com/humanlogio/humanlog
docs: https://github.com/humanlogio/humanlog
package-manager:
  brew: humanlog
  debian: humanlog
  ubuntu: humanlog
package-manager-url: https://formulae.brew.sh/formula/humanlog
version: 0.8.9
license: Apache-2.0
category: development
tags:
  - cli
description: Logs for humans to read
source-archive: https://github.com/humanlogio/humanlog/archive/refs/tags/v0.8.9.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: humanlog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:humanlog
  brew: brew install humanlog
  debian: sudo apt install humanlog
  ubuntu: sudo apt install humanlog
provenance:
  formula: humanlog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
