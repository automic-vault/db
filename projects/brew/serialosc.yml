id: brew:serialosc
display-name: serialosc
homepage: https://github.com/monome/docs/blob/gh-pages/serialosc/osc.md
repo: https://github.com/monome/serialosc
docs: https://github.com/monome/docs/blob/gh-pages/serialosc/osc.md
package-manager:
  brew: serialosc
package-manager-url: https://formulae.brew.sh/formula/serialosc
version: 1.4.7
license: ISC
category: development
tags:
  - cli
description: Opensound control server for monome devices
source-archive: https://github.com/monome/serialosc.git
dependencies:
  - liblo
  - libmonome
  - libuv
executables:
  - exposure: global executable
    kind: cli
    name: serialosc-detector
  - exposure: global executable
    kind: cli
    name: serialosc-device
  - exposure: global executable
    kind: cli
    name: serialoscd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:serialosc
  brew: brew install serialosc
provenance:
  formula: serialosc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
