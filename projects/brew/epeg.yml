id: brew:epeg
display-name: epeg
homepage: https://github.com/mattes/epeg
repo: https://github.com/mattes/epeg
docs: https://github.com/mattes/epeg
package-manager:
  brew: epeg
  macports: epeg
  nix: epeg
package-manager-url: https://formulae.brew.sh/formula/epeg
version: 0.9.3
license: MIT-enna
category: development
tags:
  - cli
description: JPEG/JPG thumbnail scaling
source-archive: https://github.com/mattes/epeg/archive/refs/tags/v0.9.3.tar.gz
dependencies:
  - jpeg-turbo
  - libexif
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: epeg
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:epeg
  brew: brew install epeg
  macports: sudo port install epeg
  nix: nix profile install nixpkgs#epeg
provenance:
  formula: epeg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
