id: brew:echidna
display-name: echidna
homepage: https://github.com/crytic/echidna
repo: https://github.com/crytic/echidna
docs: https://github.com/crytic/echidna
package-manager:
  brew: echidna
  nix: echidna
package-manager-url: https://formulae.brew.sh/formula/echidna
version: 2.3.2
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Ethereum smart contract fuzzer
source-archive: https://github.com/crytic/echidna/archive/refs/tags/v2.3.2.tar.gz
dependencies:
  - crytic-compile
  - gmp
  - libff
  - secp256k1
  - slither-analyzer
build-dependencies:
  - ghc@9.10
  - haskell-stack
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: echidna
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:echidna
  brew: brew install echidna
  nix: nix profile install nixpkgs#echidna
provenance:
  formula: echidna
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
