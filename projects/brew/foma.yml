id: brew:foma
display-name: foma
homepage: https://github.com/mhulden/foma
repo: https://github.com/mhulden/foma
docs: https://github.com/mhulden/foma
package-manager:
  apk: foma
  brew: foma
  debian: foma
  dnf: foma
  nix: foma
  ubuntu: foma
  zypper: foma
package-manager-url: https://formulae.brew.sh/formula/foma
version: 0.10.0
license: Apache-2.0
category: development
tags:
  - cli
description: Finite-state compiler and C library
source-archive: https://github.com/mhulden/foma/archive/refs/tags/v0.10.0.tar.gz
build-dependencies:
  - bison
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cgflookup
  - exposure: global executable
    kind: cli
    name: flookup
  - exposure: global executable
    kind: cli
    name: foma
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add foma
  av: sudo av install brew:foma
  brew: brew install foma
  debian: sudo apt install foma
  dnf: sudo dnf install foma
  nix: nix profile install nixpkgs#foma
  ubuntu: sudo apt install foma
  zypper: sudo zypper install foma
provenance:
  formula: foma
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
