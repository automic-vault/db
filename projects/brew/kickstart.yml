id: brew:kickstart
display-name: kickstart
homepage: https://github.com/Keats/kickstart
repo: https://github.com/Keats/kickstart
docs: https://github.com/Keats/kickstart
package-manager:
  brew: kickstart
  nix: kickstart
package-manager-url: https://formulae.brew.sh/formula/kickstart
version: 0.6.0
license: MIT
category: development
tags:
  - cli
description: Scaffolding tool to get new projects up and running quickly
source-archive: https://github.com/Keats/kickstart/archive/refs/tags/v0.6.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: kickstart
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kickstart
  brew: brew install kickstart
  nix: nix profile install nixpkgs#kickstart
provenance:
  formula: kickstart
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
