id: brew:stgit
display-name: stgit
homepage: https://stacked-git.github.io
repo: https://github.com/stacked-git/stgit
docs: https://stacked-git.github.io
package-manager:
  apk: stgit
  brew: stgit
  debian: stgit
  dnf: stgit
  macports: stgit
  nix: stgit
  scoop: main/stgit
  ubuntu: stgit
  zypper: stgit
package-manager-url: https://formulae.brew.sh/formula/stgit
version: 2.6.0
license: GPL-2.0-only
category: development
tags:
  - cli
  - git
description: Manage Git commits as a stack of patches
source-archive: https://github.com/stacked-git/stgit/releases/download/v2.6.0/stgit-2.6.0.tar.gz
build-dependencies:
  - asciidoc
  - pkgconf
  - rust
  - xmlto
uses-from-macos:
  - curl
  - git
executables:
  - exposure: global executable
    kind: cli
    name: stg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add stgit
  av: sudo av install brew:stgit
  brew: brew install stgit
  debian: sudo apt install stgit
  dnf: sudo dnf install stgit
  macports: sudo port install stgit
  nix: nix profile install nixpkgs#stgit
  scoop: scoop install main/stgit
  ubuntu: sudo apt install stgit
  zypper: sudo zypper install stgit
provenance:
  formula: stgit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
