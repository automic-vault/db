id: brew:stuntman
display-name: stuntman
homepage: https://www.stunprotocol.org
repo: https://www.stunprotocol.org/stunserver-1.2.16.tgz
docs: https://www.stunprotocol.org
package-manager:
  brew: stuntman
  nix: stuntman
  zypper: stuntman
package-manager-url: https://formulae.brew.sh/formula/stuntman
version: 1.2.16
license: Apache-2.0
category: network
tags:
  - cli
description: Implementation of the STUN protocol
source-archive: https://www.stunprotocol.org/stunserver-1.2.16.tgz
build-dependencies:
  - boost
executables:
  - exposure: global executable
    kind: cli
    name: stunclient
  - exposure: global executable
    kind: cli
    name: stunserver
  - exposure: global executable
    kind: cli
    name: stuntestcode
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stuntman
  brew: brew install stuntman
  nix: nix profile install nixpkgs#stuntman
  zypper: sudo zypper install stuntman
provenance:
  formula: stuntman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
