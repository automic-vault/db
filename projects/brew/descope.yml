id: brew:descope
display-name: descope
homepage: https://www.descope.com
repo: https://github.com/descope/descopecli
docs: https://www.descope.com
package-manager:
  brew: descope
package-manager-url: https://formulae.brew.sh/formula/descope
version: 0.8.15
license: MIT
category: development
tags:
  - cli
description: Command-line utility for performing common tasks on Descope projects
source-archive: https://github.com/descope/descopecli/archive/refs/tags/v0.8.15.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: descope
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:descope
  brew: brew install descope
provenance:
  formula: descope
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
