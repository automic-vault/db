id: brew:just
display-name: just
homepage: https://github.com/casey/just
repo: https://github.com/casey/just
docs: https://github.com/casey/just
package-manager:
  apk: just
  brew: just
  chocolatey: just
  debian: just
  dnf: just
  macports: just
  nix: just
  pacman: just
  scoop: main/just
  ubuntu: just
  winget: Casey.Just
  zypper: just
package-manager-url: https://formulae.brew.sh/formula/just
version: 1.51.0
license: CC0-1.0
category: development
tags:
  - cli
description: Handy way to save and run project-specific commands
source-archive: https://github.com/casey/just/archive/refs/tags/1.51.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: just
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add just
  av: sudo av install brew:just
  brew: brew install just
  chocolatey: choco install just
  debian: sudo apt install just
  dnf: sudo dnf install just
  macports: sudo port install just
  nix: nix profile install nixpkgs#just
  pacman: sudo pacman -S just
  scoop: scoop install main/just
  ubuntu: sudo apt install just
  winget: winget install --id Casey.Just -e
  zypper: sudo zypper install just
provenance:
  formula: just
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
