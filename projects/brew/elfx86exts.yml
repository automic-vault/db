id: brew:elfx86exts
display-name: elfx86exts
homepage: https://github.com/pkgw/elfx86exts
repo: https://github.com/pkgw/elfx86exts
docs: https://github.com/pkgw/elfx86exts
package-manager:
  brew: elfx86exts
  debian: elfx86exts
  nix: elfx86exts
  pacman: elfx86exts
  ubuntu: elfx86exts
package-manager-url: https://formulae.brew.sh/formula/elfx86exts
version: 0.6.2
license: MIT
category: development
tags:
  - cli
description: Decodes x86 binaries (ELF and Mach-O) and prints out ISA extensions in use
source-archive: https://github.com/pkgw/elfx86exts/archive/refs/tags/elfx86exts@0.6.2.tar.gz
dependencies:
  - capstone
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: elfx86exts
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:elfx86exts
  brew: brew install elfx86exts
  debian: sudo apt install elfx86exts
  nix: nix profile install nixpkgs#elfx86exts
  pacman: sudo pacman -S elfx86exts
  ubuntu: sudo apt install elfx86exts
provenance:
  formula: elfx86exts
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
