id: brew:ezstream
display-name: ezstream
homepage: https://icecast.org/ezstream/
repo: https://ftp.osuosl.org/pub/xiph/releases/ezstream/ezstream-1.0.2.tar.gz
docs: https://icecast.org/ezstream/
package-manager:
  apk: ezstream
  brew: ezstream
  debian: ezstream
  dnf: ezstream
  macports: ezstream
  nix: ezstream
  ubuntu: ezstream
  zypper: ezstream
package-manager-url: https://formulae.brew.sh/formula/ezstream
version: 1.0.2
license: GPL-2.0-only
category: network
tags:
  - cli
description: Client for Icecast streaming servers
source-archive: https://ftp.osuosl.org/pub/xiph/releases/ezstream/ezstream-1.0.2.tar.gz
dependencies:
  - libshout
  - taglib
build-dependencies:
  - check
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: ezstream
  - exposure: global executable
    kind: cli
    name: ezstream-cfgmigrate
  - exposure: global executable
    kind: cli
    name: ezstream-file.sh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ezstream
  av: sudo av install brew:ezstream
  brew: brew install ezstream
  debian: sudo apt install ezstream
  dnf: sudo dnf install ezstream
  macports: sudo port install ezstream
  nix: nix profile install nixpkgs#ezstream
  ubuntu: sudo apt install ezstream
  zypper: sudo zypper install ezstream
provenance:
  formula: ezstream
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
