id: brew:tsui
display-name: tsui
homepage: https://neuralink.com/tsui
repo: https://github.com/neuralinkcorp/tsui
docs: https://neuralink.com/tsui
package-manager:
  brew: tsui
package-manager-url: https://formulae.brew.sh/formula/tsui
version: 0.2.0
license: MIT
category: development
tags:
  - cli
description: TUI for configuring and monitoring Tailscale
source-archive: https://github.com/neuralinkcorp/tsui/archive/refs/tags/v0.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tsui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tsui
  brew: brew install tsui
provenance:
  formula: tsui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
