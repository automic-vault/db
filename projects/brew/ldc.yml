id: brew:ldc
display-name: ldc
homepage: https://wiki.dlang.org/LDC
repo: https://github.com/ldc-developers/ldc
docs: https://wiki.dlang.org/LDC
package-manager:
  apk: ldc
  brew: ldc
  chocolatey: ldc
  debian: ldc
  dnf: ldc
  nix: ldc
  pacman: ldc
  scoop: main/ldc
  ubuntu: ldc
  zypper: ldc
package-manager-url: https://formulae.brew.sh/formula/ldc
version: 1.42.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Portable D programming language compiler
source-archive: https://github.com/ldc-developers/ldc/releases/download/v1.42.0/ldc-1.42.0-src.tar.gz
dependencies:
  - llvm@21
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ldc-build-plugin
  - exposure: global executable
    kind: cli
    name: ldc-build-runtime
  - exposure: global executable
    kind: cli
    name: ldc-profdata
  - exposure: global executable
    kind: cli
    name: ldc-profgen
  - exposure: global executable
    kind: cli
    name: ldc-prune-cache
  - exposure: global executable
    kind: cli
    name: ldc2
  - exposure: global executable
    kind: cli
    name: ldmd2
  - exposure: global executable
    kind: cli
    name: timetrace2txt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ldc
  av: sudo av install brew:ldc
  brew: brew install ldc
  chocolatey: choco install ldc
  debian: sudo apt install ldc
  dnf: sudo dnf install ldc
  nix: nix profile install nixpkgs#ldc
  pacman: sudo pacman -S ldc
  scoop: scoop install main/ldc
  ubuntu: sudo apt install ldc
  zypper: sudo zypper install ldc
provenance:
  formula: ldc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
