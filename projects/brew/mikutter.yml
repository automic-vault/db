id: brew:mikutter
display-name: mikutter
homepage: https://mikutter.hachune.net/
repo: https://mikutter.hachune.net/bin/mikutter-5.1.2.tar.gz
docs: https://mikutter.hachune.net/
package-manager:
  brew: mikutter
  debian: mikutter
  ubuntu: mikutter
package-manager-url: https://formulae.brew.sh/formula/mikutter
version: 5.1.2
license: MIT
category: network
tags:
  - cli
description: Extensible Twitter client
source-archive: https://mikutter.hachune.net/bin/mikutter-5.1.2.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - fontconfig
  - freetype
  - gdk-pixbuf
  - gettext
  - glib
  - gobject-introspection
  - gtk+3
  - harfbuzz
  - pango
  - ruby
  - terminal-notifier
uses-from-macos:
  - libffi
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: mikutter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mikutter
  brew: brew install mikutter
  debian: sudo apt install mikutter
  ubuntu: sudo apt install mikutter
provenance:
  formula: mikutter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
