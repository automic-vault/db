id: brew:gopls
display-name: gopls
homepage: https://github.com/golang/tools/tree/master/gopls
repo: https://github.com/golang/tools
docs: https://github.com/golang/tools/tree/master/gopls
package-manager:
  apk: gopls
  brew: gopls
  debian: gopls
  dnf: gopls
  macports: gopls
  nix: gopls
  pacman: gopls
  ubuntu: gopls
  zypper: gopls
package-manager-url: https://formulae.brew.sh/formula/gopls
version: 0.22.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Language server for the Go language
source-archive: https://github.com/golang/tools/archive/refs/tags/gopls/v0.22.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gopls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gopls
  av: sudo av install brew:gopls
  brew: brew install gopls
  debian: sudo apt install gopls
  dnf: sudo dnf install gopls
  macports: sudo port install gopls
  nix: nix profile install nixpkgs#gopls
  pacman: sudo pacman -S gopls
  ubuntu: sudo apt install gopls
  zypper: sudo zypper install gopls
provenance:
  formula: gopls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
