id: brew:dalfox
display-name: dalfox
homepage: https://dalfox.hahwul.com
repo: https://github.com/hahwul/dalfox
docs: https://dalfox.hahwul.com
package-manager:
  brew: dalfox
  macports: dalfox
  nix: dalfox
package-manager-url: https://formulae.brew.sh/formula/dalfox
version: 3.0.0
license: MIT
category: development
tags:
  - cli
description: XSS scanner and utility focused on automation
source-archive: https://github.com/hahwul/dalfox/archive/refs/tags/v3.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dalfox
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dalfox
  brew: brew install dalfox
  macports: sudo port install dalfox
  nix: nix profile install nixpkgs#dalfox
provenance:
  formula: dalfox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
