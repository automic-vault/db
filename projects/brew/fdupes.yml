id: brew:fdupes
display-name: fdupes
homepage: https://github.com/adrianlopezroche/fdupes
repo: https://github.com/adrianlopezroche/fdupes
docs: https://github.com/adrianlopezroche/fdupes
package-manager:
  apk: fdupes
  brew: fdupes
  debian: fdupes
  dnf: fdupes
  macports: fdupes
  nix: fdupes
  pacman: fdupes
  ubuntu: fdupes
  zypper: fdupes
package-manager-url: https://formulae.brew.sh/formula/fdupes
version: 2.4.0
license: MIT
category: development
tags:
  - cli
description: Identify or delete duplicate files
source-archive: https://github.com/adrianlopezroche/fdupes/releases/download/v2.4.0/fdupes-2.4.0.tar.gz
dependencies:
  - pcre2
uses-from-macos:
  - ncurses
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: fdupes
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fdupes
  av: sudo av install brew:fdupes
  brew: brew install fdupes
  debian: sudo apt install fdupes
  dnf: sudo dnf install fdupes
  macports: sudo port install fdupes
  nix: nix profile install nixpkgs#fdupes
  pacman: sudo pacman -S fdupes
  ubuntu: sudo apt install fdupes
  zypper: sudo zypper install fdupes
provenance:
  formula: fdupes
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
