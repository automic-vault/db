id: brew:libosinfo
display-name: libosinfo
homepage: https://libosinfo.org/
repo: https://releases.pagure.org/libosinfo/libosinfo-1.12.0.tar.xz
docs: https://libosinfo.org/
package-manager:
  apk: libosinfo
  brew: libosinfo
  dnf: libosinfo
  macports: libosinfo
  nix: libosinfo
  pacman: libosinfo
  zypper: libosinfo
package-manager-url: https://formulae.brew.sh/formula/libosinfo
version: 1.12.0
license: LGPL-2.0-or-later
category: database
tags:
  - cli
  - database
description: Operating System information database
source-archive: https://releases.pagure.org/libosinfo/libosinfo-1.12.0.tar.xz
dependencies:
  - gettext
  - glib
  - libsoup
  - osinfo-db
  - usb.ids
build-dependencies:
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - vala
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: osinfo-detect
  - exposure: global executable
    kind: cli
    name: osinfo-install-script
  - exposure: global executable
    kind: cli
    name: osinfo-query
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libosinfo
  av: sudo av install brew:libosinfo
  brew: brew install libosinfo
  dnf: sudo dnf install libosinfo
  macports: sudo port install libosinfo
  nix: nix profile install nixpkgs#libosinfo
  pacman: sudo pacman -S libosinfo
  zypper: sudo zypper install libosinfo
provenance:
  formula: libosinfo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
