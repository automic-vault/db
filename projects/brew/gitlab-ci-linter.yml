id: brew:gitlab-ci-linter
display-name: gitlab-ci-linter
homepage: https://gitlab.com/orobardet/gitlab-ci-linter
repo: >
  https://gitlab.com/orobardet/gitlab-ci-linter/-/archive/v2.4.0/gitlab-ci-linter-v2.4.0.tar.bz2
docs: https://gitlab.com/orobardet/gitlab-ci-linter
package-manager:
  brew: gitlab-ci-linter
  nix: gitlab-ci-linter
package-manager-url: https://formulae.brew.sh/formula/gitlab-ci-linter
version: 2.4.0
license: MIT
category: development
tags:
  - cli
  - yaml
description: Command-line tool to lint GitLab CI YAML files
source-archive: >
  https://gitlab.com/orobardet/gitlab-ci-linter/-/archive/v2.4.0/gitlab-ci-linter-v2.4.0.tar.bz2
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gitlab-ci-linter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gitlab-ci-linter
  brew: brew install gitlab-ci-linter
  nix: nix profile install nixpkgs#gitlab-ci-linter
provenance:
  formula: gitlab-ci-linter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
