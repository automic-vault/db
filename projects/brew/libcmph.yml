id: brew:libcmph
display-name: libcmph
homepage: https://cmph.sourceforge.net/
repo: https://downloads.sourceforge.net/project/cmph/v2.0.2/cmph-2.0.2.tar.gz
docs: https://cmph.sourceforge.net/
package-manager:
  apk: libcmph
  brew: libcmph
  macports: cmph
  nix: cmph
package-manager-url: https://formulae.brew.sh/formula/libcmph
version: 2.0.2
license: LGPL-2.1-only OR MPL-1.1
category: network
tags:
  - cli
description: C minimal perfect hashing library
source-archive: https://downloads.sourceforge.net/project/cmph/v2.0.2/cmph-2.0.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: cmph
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libcmph
  av: sudo av install brew:libcmph
  brew: brew install libcmph
  macports: sudo port install cmph
  nix: nix profile install nixpkgs#cmph
provenance:
  formula: libcmph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
