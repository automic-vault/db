id: brew:inotify-tools
display-name: inotify-tools
homepage: https://github.com/inotify-tools/inotify-tools
repo: https://github.com/inotify-tools/inotify-tools
docs: https://github.com/inotify-tools/inotify-tools
package-manager:
  apk: inotify-tools
  brew: inotify-tools
  debian: inotify-tools
  dnf: inotify-tools
  nix: inotify-tools
  pacman: inotify-tools
  ubuntu: inotify-tools
  winget: thekid.inotifywait
  zypper: inotify-tools
package-manager-url: https://formulae.brew.sh/formula/inotify-tools
version: 4.25.9.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: C library and command-line programs providing a simple interface to inotify
source-archive: https://github.com/inotify-tools/inotify-tools/archive/refs/tags/4.25.9.0.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: fsnotifywait
  - exposure: global executable
    kind: cli
    name: fsnotifywatch
  - exposure: global executable
    kind: cli
    name: inotifywait
  - exposure: global executable
    kind: cli
    name: inotifywatch
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add inotify-tools
  av: sudo av install brew:inotify-tools
  brew: brew install inotify-tools
  debian: sudo apt install inotify-tools
  dnf: sudo dnf install inotify-tools
  nix: nix profile install nixpkgs#inotify-tools
  pacman: sudo pacman -S inotify-tools
  ubuntu: sudo apt install inotify-tools
  winget: winget install --id thekid.inotifywait -e
  zypper: sudo zypper install inotify-tools
provenance:
  formula: inotify-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
