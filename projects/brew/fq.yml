id: brew:fq
display-name: fq
homepage: https://github.com/circonus-labs/fq
repo: https://github.com/circonus-labs/fq
docs: https://github.com/circonus-labs/fq
package-manager:
  apk: fq
  brew: fq
  debian: fq
  macports: fq
  nix: fq
  pacman: fq
  scoop: main/fq
  ubuntu: fq
  zypper: fq
package-manager-url: https://formulae.brew.sh/formula/fq
version: 0.13.12
license: MIT
category: development
tags:
  - cli
description: Brokered message queue optimized for performance
source-archive: https://github.com/circonus-labs/fq/archive/refs/tags/v0.13.12.tar.gz
dependencies:
  - concurrencykit
  - jlog
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: fq-proxy
  - exposure: global executable
    kind: cli
    name: fq-receiver
  - exposure: global executable
    kind: cli
    name: fq-sender
  - exposure: global executable
    kind: cli
    name: fq_rcvr
  - exposure: global executable
    kind: cli
    name: fq_sndr
  - exposure: global executable
    kind: cli
    name: fqc
  - exposure: global executable
    kind: cli
    name: fqd
  - exposure: global executable
    kind: cli
    name: fqs
  - exposure: global executable
    kind: cli
    name: fqtool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fq
  av: sudo av install brew:fq
  brew: brew install fq
  debian: sudo apt install fq
  macports: sudo port install fq
  nix: nix profile install nixpkgs#fq
  pacman: sudo pacman -S fq
  scoop: scoop install main/fq
  ubuntu: sudo apt install fq
  zypper: sudo zypper install fq
provenance:
  formula: fq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
