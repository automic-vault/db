id: brew:chibi-scheme
display-name: chibi-scheme
homepage: https://github.com/ashinn/chibi-scheme
repo: https://github.com/ashinn/chibi-scheme
docs: https://github.com/ashinn/chibi-scheme
package-manager:
  apk: chibi-scheme
  brew: chibi-scheme
  dnf: chibi-scheme
  ubuntu: chibi-scheme
package-manager-url: https://formulae.brew.sh/formula/chibi-scheme
version: 0.12
license: BSD-3-Clause
category: development
tags:
  - cli
description: Small footprint Scheme for use as a C Extension Language
source-archive: https://github.com/ashinn/chibi-scheme/archive/refs/tags/0.12.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: chibi-doc
  - exposure: global executable
    kind: cli
    name: chibi-ffi
  - exposure: global executable
    kind: cli
    name: chibi-scheme
  - exposure: global executable
    kind: cli
    name: snow-chibi
  - exposure: global executable
    kind: cli
    name: snow-chibi.scm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add chibi-scheme
  av: sudo av install brew:chibi-scheme
  brew: brew install chibi-scheme
  dnf: sudo dnf install chibi-scheme
  ubuntu: sudo apt install chibi-scheme
provenance:
  formula: chibi-scheme
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
