id: brew:headscale-cli
display-name: headscale-cli
homepage: https://github.com/juanfont/headscale
repo: https://github.com/juanfont/headscale
docs: https://github.com/juanfont/headscale
package-manager:
  apk: headscale
  brew: headscale-cli
  dnf: headscale
  nix: headscale
  pacman: headscale
  zypper: headscale
package-manager-url: https://formulae.brew.sh/formula/headscale-cli
version: 0.28.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: CLI for headscale, an open-source implementation of the Tailscale control server
source-archive: https://github.com/juanfont/headscale/archive/refs/tags/v0.28.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: headscale
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add headscale
  av: sudo av install brew:headscale-cli
  brew: brew install headscale-cli
  dnf: sudo dnf install headscale
  nix: nix profile install nixpkgs#headscale
  pacman: sudo pacman -S headscale
  zypper: sudo zypper install headscale
provenance:
  formula: headscale-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
