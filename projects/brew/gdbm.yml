id: brew:gdbm
display-name: gdbm
homepage: https://www.gnu.org.ua/software/gdbm/
repo: https://ftpmirror.gnu.org/gnu/gdbm/gdbm-1.26.tar.gz
docs: https://www.gnu.org.ua/software/gdbm/
package-manager:
  apk: gdbm
  brew: gdbm
  debian: gdbmtool
  dnf: gdbm
  macports: gdbm
  nix: gdbm
  pacman: gdbm
  ubuntu: gdbmtool
package-manager-url: https://formulae.brew.sh/formula/gdbm
version: 1.26
license: GPL-3.0-or-later
category: database
tags:
  - cli
  - database
description: GNU database manager
source-archive: https://ftpmirror.gnu.org/gnu/gdbm/gdbm-1.26.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: gdbm_dump
  - exposure: global executable
    kind: cli
    name: gdbm_load
  - exposure: global executable
    kind: cli
    name: gdbmtool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sequoia
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gdbm
  av: sudo av install brew:gdbm
  brew: brew install gdbm
  debian: sudo apt install gdbmtool
  dnf: sudo dnf install gdbm
  macports: sudo port install gdbm
  nix: nix profile install nixpkgs#gdbm
  pacman: sudo pacman -S gdbm
  ubuntu: sudo apt install gdbmtool
provenance:
  formula: gdbm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
