id: brew:hubble
display-name: hubble
homepage: https://github.com/cilium/hubble
repo: https://github.com/cilium/hubble
docs: https://github.com/cilium/hubble
package-manager:
  brew: hubble
  nix: hubble
  winget: Cilium.Hubble
  zypper: hubble
package-manager-url: https://formulae.brew.sh/formula/hubble
version: 1.19.3
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
  - security
description: Network, Service & Security Observability for Kubernetes using eBPF
source-archive: https://github.com/cilium/hubble/archive/refs/tags/v1.19.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hubble
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hubble
  brew: brew install hubble
  nix: nix profile install nixpkgs#hubble
  winget: winget install --id Cilium.Hubble -e
  zypper: sudo zypper install hubble
provenance:
  formula: hubble
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
