id: brew:rbenv-aliases
display-name: rbenv-aliases
homepage: https://github.com/tpope/rbenv-aliases
repo: https://github.com/tpope/rbenv-aliases
docs: https://github.com/tpope/rbenv-aliases
package-manager:
  brew: rbenv-aliases
package-manager-url: https://formulae.brew.sh/formula/rbenv-aliases
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Make aliases for Ruby versions
source-archive: https://github.com/tpope/rbenv-aliases/archive/refs/tags/v1.1.0.tar.gz
dependencies:
  - rbenv
executables:
  - exposure: global executable
    kind: cli
    name: rbenv-alias
  - exposure: global executable
    kind: cli
    name: rbenv-unalias
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rbenv-aliases
  brew: brew install rbenv-aliases
provenance:
  formula: rbenv-aliases
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
