id: brew:dar
display-name: dar
homepage: http://dar.linux.free.fr/doc/index.html
repo: https://downloads.sourceforge.net/project/dar/dar/2.8.5/dar-2.8.5.tar.gz
docs: http://dar.linux.free.fr/doc/index.html
package-manager:
  apk: dar
  brew: dar
  debian: dar
  dnf: dar
  macports: dar
  nix: dar
  ubuntu: dar
  zypper: dar
package-manager-url: https://formulae.brew.sh/formula/dar
version: 2.8.5
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Backup directory tree and files
source-archive: https://downloads.sourceforge.net/project/dar/dar/2.8.5/dar-2.8.5.tar.gz
dependencies:
  - argon2
  - gettext
  - libgcrypt
  - libgpg-error
  - lz4
  - lzo
  - xz
  - zstd
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: dar
  - exposure: global executable
    kind: cli
    name: dar_cp
  - exposure: global executable
    kind: cli
    name: dar_manager
  - exposure: global executable
    kind: cli
    name: dar_slave
  - exposure: global executable
    kind: cli
    name: dar_split
  - exposure: global executable
    kind: cli
    name: dar_xform
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dar
  av: sudo av install brew:dar
  brew: brew install dar
  debian: sudo apt install dar
  dnf: sudo dnf install dar
  macports: sudo port install dar
  nix: nix profile install nixpkgs#dar
  ubuntu: sudo apt install dar
  zypper: sudo zypper install dar
provenance:
  formula: dar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
