id: brew:fn
display-name: fn
homepage: https://fnproject.io
repo: https://github.com/fnproject/cli
docs: https://fnproject.io
package-manager:
  brew: fn
package-manager-url: https://formulae.brew.sh/formula/fn
version: 0.6.58
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool for the fn project
source-archive: https://github.com/fnproject/cli/archive/refs/tags/0.6.58.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fn
  brew: brew install fn
provenance:
  formula: fn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
