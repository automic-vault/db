id: brew:editorconfig
display-name: editorconfig
homepage: https://editorconfig.org/
repo: https://github.com/editorconfig/editorconfig-core-c
docs: https://editorconfig.org/
package-manager:
  apk: editorconfig
  brew: editorconfig
  debian: editorconfig
  dnf: editorconfig
  scoop: main/editorconfig
  ubuntu: editorconfig
  zypper: editorconfig
package-manager-url: https://formulae.brew.sh/formula/editorconfig
version: 0.12.11
license: BSD-2-Clause
category: development
tags:
  - cli
description: Maintain consistent coding style between multiple editors
source-archive: https://github.com/editorconfig/editorconfig-core-c/archive/refs/tags/v0.12.11.tar.gz
dependencies:
  - pcre2
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: editorconfig
  - exposure: global executable
    kind: cli
    name: editorconfig-0.12.11
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add editorconfig
  av: sudo av install brew:editorconfig
  brew: brew install editorconfig
  debian: sudo apt install editorconfig
  dnf: sudo dnf install editorconfig
  scoop: scoop install main/editorconfig
  ubuntu: sudo apt install editorconfig
  zypper: sudo zypper install editorconfig
provenance:
  formula: editorconfig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
