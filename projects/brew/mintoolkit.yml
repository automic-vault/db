id: brew:mintoolkit
display-name: mintoolkit
homepage: https://slimtoolkit.org/
repo: https://github.com/mintoolkit/mint
docs: https://slimtoolkit.org/
package-manager:
  apk: slim
  brew: mintoolkit
  debian: slim
  dnf: slim
  nix: docker-slim
  pacman: slim
  ubuntu: slim
  zypper: slim
package-manager-url: https://formulae.brew.sh/formula/mintoolkit
version: 1.41.8
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: Minify and secure Docker images
source-archive: https://github.com/mintoolkit/mint/archive/refs/tags/1.41.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: docker-slim
  - exposure: global executable
    kind: cli
    name: mint-sensor
  - exposure: global executable
    kind: cli
    name: slim
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add slim
  av: sudo av install brew:mintoolkit
  brew: brew install mintoolkit
  debian: sudo apt install slim
  dnf: sudo dnf install slim
  nix: nix profile install nixpkgs#docker-slim
  pacman: sudo pacman -S slim
  ubuntu: sudo apt install slim
  zypper: sudo zypper install slim
provenance:
  formula: mintoolkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
