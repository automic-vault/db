id: brew:sqlbench
display-name: sqlbench
homepage: https://github.com/felixge/sqlbench
repo: https://github.com/felixge/sqlbench
docs: https://github.com/felixge/sqlbench
package-manager:
  brew: sqlbench
package-manager-url: https://formulae.brew.sh/formula/sqlbench
version: 1.1.0
license: MIT
category: database
tags:
  - cli
description: Measures and compares the execution time of one or more SQL queries
source-archive: https://github.com/felixge/sqlbench/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sqlbench
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sqlbench
  brew: brew install sqlbench
provenance:
  formula: sqlbench
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
