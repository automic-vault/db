id: brew:rmpc
display-name: rmpc
homepage: https://mierak.github.io/rmpc/
repo: https://github.com/mierak/rmpc
docs: https://mierak.github.io/rmpc/
package-manager:
  apk: rmpc
  brew: rmpc
  nix: rmpc
  pacman: rmpc
  zypper: rmpc
package-manager-url: https://formulae.brew.sh/formula/rmpc
version: 0.11.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Terminal based Media Player Client with album art support
source-archive: https://github.com/mierak/rmpc/archive/refs/tags/v0.11.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rmpc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rmpc
  av: sudo av install brew:rmpc
  brew: brew install rmpc
  nix: nix profile install nixpkgs#rmpc
  pacman: sudo pacman -S rmpc
  zypper: sudo zypper install rmpc
provenance:
  formula: rmpc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
