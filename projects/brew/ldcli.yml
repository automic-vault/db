id: brew:ldcli
display-name: ldcli
homepage: https://launchdarkly.com/docs/home/getting-started/ldcli
repo: https://github.com/launchdarkly/ldcli
docs: https://launchdarkly.com/docs/home/getting-started/ldcli
package-manager:
  brew: ldcli
package-manager-url: https://formulae.brew.sh/formula/ldcli
version: 3.0.4
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for managing LaunchDarkly feature flags
source-archive: https://github.com/launchdarkly/ldcli/archive/refs/tags/v3.0.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ldcli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ldcli
  brew: brew install ldcli
provenance:
  formula: ldcli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
