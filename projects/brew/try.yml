id: brew:try
display-name: try
homepage: https://github.com/tobi/try
repo: https://github.com/tobi/try
docs: https://github.com/tobi/try
package-manager:
  brew: try
  nix: try
package-manager-url: https://formulae.brew.sh/formula/try
version: 1.9.3
license: MIT
category: development
tags:
  - cli
description: Quickly manage and navigate project directories for experiments
source-archive: https://github.com/tobi/try/archive/refs/tags/v1.9.3.tar.gz
dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: try
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:try
  brew: brew install try
  nix: nix profile install nixpkgs#try
provenance:
  formula: try
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
