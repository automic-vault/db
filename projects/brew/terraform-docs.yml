id: brew:terraform-docs
display-name: terraform-docs
homepage: https://terraform-docs.io/
repo: https://github.com/terraform-docs/terraform-docs
docs: https://terraform-docs.io/
package-manager:
  brew: terraform-docs
  chocolatey: Terraform-Docs
  macports: terraform-docs
  nix: terraform-docs
  scoop: main/terraform-docs
  winget: Terraform-docs.Terraform-docs
package-manager-url: https://formulae.brew.sh/formula/terraform-docs
version: 0.24.0
license: MIT
category: cloud
tags:
  - cli
description: Tool to generate documentation from Terraform modules
source-archive: https://github.com/terraform-docs/terraform-docs/archive/refs/tags/v0.24.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terraform-docs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terraform-docs
  brew: brew install terraform-docs
  chocolatey: choco install Terraform-Docs
  macports: sudo port install terraform-docs
  nix: nix profile install nixpkgs#terraform-docs
  scoop: scoop install main/terraform-docs
  winget: winget install --id Terraform-docs.Terraform-docs -e
provenance:
  formula: terraform-docs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
