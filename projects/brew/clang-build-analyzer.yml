id: brew:clang-build-analyzer
display-name: clang-build-analyzer
homepage: https://github.com/aras-p/ClangBuildAnalyzer
repo: https://github.com/aras-p/ClangBuildAnalyzer
docs: https://github.com/aras-p/ClangBuildAnalyzer
package-manager:
  brew: clang-build-analyzer
  nix: clangbuildanalyzer
package-manager-url: https://formulae.brew.sh/formula/clang-build-analyzer
version: 1.6.0
license: >
  Unlicense AND Zlib AND MIT AND BSL-1.0 AND BSD-3-Clause AND Apache-2.0 AND
  BSD-2-Clause AND (Apache-2.0 WITH LLVM-exception)
category: development
tags:
  - cli
description: Tool to analyze compilation time
source-archive: https://github.com/aras-p/ClangBuildAnalyzer/archive/refs/tags/v1.6.0.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - llvm
executables:
  - exposure: global executable
    kind: cli
    name: ClangBuildAnalyzer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clang-build-analyzer
  brew: brew install clang-build-analyzer
  nix: nix profile install nixpkgs#clangbuildanalyzer
provenance:
  formula: clang-build-analyzer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
