id: brew:semgrep
display-name: semgrep
homepage: https://semgrep.dev
repo: https://github.com/semgrep/semgrep
docs: https://semgrep.dev
package-manager:
  brew: semgrep
  macports: semgrep
  nix: semgrep
package-manager-url: https://formulae.brew.sh/formula/semgrep
version: 1.157.0
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Easily detect and prevent bugs and anti-patterns in your codebase
source-archive: https://github.com/semgrep/semgrep.git
dependencies:
  - certifi
  - cryptography
  - dwarfutils
  - gmp
  - libev
  - pcre2
  - pydantic
  - python@3.14
  - rpds-py
  - sqlite
  - tree-sitter
  - zstd
build-dependencies:
  - ocaml
  - opam
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: pysemgrep
  - exposure: global executable
    kind: cli
    name: semgrep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:semgrep
  brew: brew install semgrep
  macports: sudo port install semgrep
  nix: nix profile install nixpkgs#semgrep
provenance:
  formula: semgrep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
