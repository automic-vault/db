id: brew:lftp
display-name: lftp
homepage: https://lftp.yar.ru/
repo: https://github.com/lavv17/lftp
docs: https://lftp.yar.ru/
package-manager:
  apk: lftp
  brew: lftp
  chocolatey: lftp
  debian: lftp
  dnf: lftp
  macports: lftp
  nix: lftp
  pacman: lftp
  scoop: main/lftp
  ubuntu: lftp
  zypper: lftp
package-manager-url: https://formulae.brew.sh/formula/lftp
version: 4.9.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Sophisticated file transfer program
source-archive: https://github.com/lavv17/lftp/releases/download/v4.9.3/lftp-4.9.3.tar.gz
dependencies:
  - gettext
  - libidn2
  - openssl@3
  - readline
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: lftp
  - exposure: global executable
    kind: cli
    name: lftpget
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lftp
  av: sudo av install brew:lftp
  brew: brew install lftp
  chocolatey: choco install lftp
  debian: sudo apt install lftp
  dnf: sudo dnf install lftp
  macports: sudo port install lftp
  nix: nix profile install nixpkgs#lftp
  pacman: sudo pacman -S lftp
  scoop: scoop install main/lftp
  ubuntu: sudo apt install lftp
  zypper: sudo zypper install lftp
provenance:
  formula: lftp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
