id: brew:elvis
display-name: elvis
homepage: https://github.com/inaka/elvis
repo: https://github.com/inaka/elvis
docs: https://github.com/inaka/elvis
package-manager:
  brew: elvis
  macports: elvis
  nix: elvis
package-manager-url: https://formulae.brew.sh/formula/elvis
version: 5.0.3
license: Apache-2.0
category: development
tags:
  - cli
description: Erlang Style Reviewer
source-archive: https://github.com/inaka/elvis/archive/refs/tags/5.0.3.tar.gz
dependencies:
  - erlang
build-dependencies:
  - rebar3
executables:
  - exposure: global executable
    kind: cli
    name: elvis
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:elvis
  brew: brew install elvis
  macports: sudo port install elvis
  nix: nix profile install nixpkgs#elvis
provenance:
  formula: elvis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
