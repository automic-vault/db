id: brew:libpinyin
display-name: libpinyin
homepage: https://github.com/libpinyin/libpinyin
repo: https://github.com/libpinyin/libpinyin
docs: https://github.com/libpinyin/libpinyin
package-manager:
  apk: libpinyin
  brew: libpinyin
  dnf: libpinyin
  nix: libpinyin
  pacman: libpinyin
package-manager-url: https://formulae.brew.sh/formula/libpinyin
version: 2.10.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Library to deal with pinyin
source-archive: https://github.com/libpinyin/libpinyin/archive/refs/tags/2.10.3.tar.gz
dependencies:
  - berkeley-db
  - gettext
  - glib
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gen_binary_files
  - exposure: global executable
    kind: cli
    name: gen_unigram
  - exposure: global executable
    kind: cli
    name: import_interpolation
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: The formula will switch DBM to Tkrzw in version 2.12 which may impact user data.
  post-install-defined: false
install-lines:
  apk: sudo apk add libpinyin
  av: sudo av install brew:libpinyin
  brew: brew install libpinyin
  dnf: sudo dnf install libpinyin
  nix: nix profile install nixpkgs#libpinyin
  pacman: sudo pacman -S libpinyin
provenance:
  formula: libpinyin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
