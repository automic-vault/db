id: brew:templ
display-name: templ
homepage: https://templ.guide
repo: https://github.com/a-h/templ
docs: https://templ.guide
package-manager:
  apk: templ
  brew: templ
  nix: templ
package-manager-url: https://formulae.brew.sh/formula/templ
version: 0.3.1020
license: MIT
category: development
tags:
  - cli
description: Language for writing HTML user interfaces in Go
source-archive: https://github.com/a-h/templ/archive/refs/tags/v0.3.1020.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: templ
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add templ
  av: sudo av install brew:templ
  brew: brew install templ
  nix: nix profile install nixpkgs#templ
provenance:
  formula: templ
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
