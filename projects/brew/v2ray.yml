id: brew:v2ray
display-name: v2ray
homepage: https://v2fly.org/
repo: https://github.com/v2fly/v2ray-core
docs: https://v2fly.org/
package-manager:
  apk: v2ray
  brew: v2ray
  chocolatey: v2ray
  debian: v2ray
  macports: v2ray
  nix: v2ray
  pacman: v2ray
  scoop: main/v2ray
  ubuntu: v2ray
  winget: v2fly.v2ray-core
package-manager-url: https://formulae.brew.sh/formula/v2ray
version: 5.49.0
license: MIT AND CC-BY-SA-4.0
category: development
tags:
  - cli
description: Platform for building proxies to bypass network restrictions
source-archive: https://github.com/v2fly/v2ray-core/archive/refs/tags/v5.49.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: v2ray
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add v2ray
  av: sudo av install brew:v2ray
  brew: brew install v2ray
  chocolatey: choco install v2ray
  debian: sudo apt install v2ray
  macports: sudo port install v2ray
  nix: nix profile install nixpkgs#v2ray
  pacman: sudo pacman -S v2ray
  scoop: scoop install main/v2ray
  ubuntu: sudo apt install v2ray
  winget: winget install --id v2fly.v2ray-core -e
provenance:
  formula: v2ray
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
