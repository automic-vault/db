id: brew:shepherd
display-name: shepherd
homepage: https://www.gnu.org/software/shepherd/
repo: https://ftpmirror.gnu.org/gnu/shepherd/shepherd-1.0.9.tar.gz
docs: https://www.gnu.org/software/shepherd/
package-manager:
  brew: shepherd
  debian: shepherd
  nix: shepherd
  winget: BeyondCode.Herd
  zypper: shepherd
package-manager-url: https://formulae.brew.sh/formula/shepherd
version: 1.0.9
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Service manager that looks after the herd of system services
source-archive: https://ftpmirror.gnu.org/gnu/shepherd/shepherd-1.0.9.tar.gz
dependencies:
  - guile
  - guile-fibers
build-dependencies:
  - gnu-sed
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: herd
  - exposure: global executable
    kind: cli
    name: shepherd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:shepherd
  brew: brew install shepherd
  debian: sudo apt install shepherd
  nix: nix profile install nixpkgs#shepherd
  winget: winget install --id BeyondCode.Herd -e
  zypper: sudo zypper install shepherd
provenance:
  formula: shepherd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
