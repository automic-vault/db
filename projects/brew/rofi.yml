id: brew:rofi
display-name: rofi
homepage: https://davatorium.github.io/rofi/
repo: https://github.com/davatorium/rofi
docs: https://davatorium.github.io/rofi/
package-manager:
  apk: rofi
  brew: rofi
  debian: rofi
  dnf: rofi
  macports: rofi
  nix: rofi
  pacman: rofi
  ubuntu: rofi
  zypper: rofi
package-manager-url: https://formulae.brew.sh/formula/rofi
version: 2.0.0
license: MIT
category: development
tags:
  - cli
description: Window switcher, application launcher and dmenu replacement
source-archive: https://github.com/davatorium/rofi/releases/download/2.0.0/rofi-2.0.0.tar.gz
dependencies:
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - harfbuzz
  - libxcb
  - libxkbcommon
  - pango
  - startup-notification
  - xcb-util
  - xcb-util-cursor
  - xcb-util-wm
  - xorg-server
build-dependencies:
  - bison
  - check
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rofi
  - exposure: global executable
    kind: cli
    name: rofi-sensible-terminal
  - exposure: global executable
    kind: cli
    name: rofi-theme-selector
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rofi
  av: sudo av install brew:rofi
  brew: brew install rofi
  debian: sudo apt install rofi
  dnf: sudo dnf install rofi
  macports: sudo port install rofi
  nix: nix profile install nixpkgs#rofi
  pacman: sudo pacman -S rofi
  ubuntu: sudo apt install rofi
  zypper: sudo zypper install rofi
provenance:
  formula: rofi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
