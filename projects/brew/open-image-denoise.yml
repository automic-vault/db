id: brew:open-image-denoise
display-name: open-image-denoise
homepage: https://openimagedenoise.github.io
repo: https://github.com/RenderKit/oidn
docs: https://openimagedenoise.github.io
package-manager:
  brew: open-image-denoise
package-manager-url: https://formulae.brew.sh/formula/open-image-denoise
version: 2.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: High-performance denoising library for ray tracing
source-archive: https://github.com/RenderKit/oidn/releases/download/v2.4.1/oidn-2.4.1.src.tar.gz
dependencies:
  - tbb
build-dependencies:
  - cmake
  - ispc
executables:
  - exposure: global executable
    kind: cli
    name: oidnBenchmark
  - exposure: global executable
    kind: cli
    name: oidnDenoise
  - exposure: global executable
    kind: cli
    name: oidnTest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:open-image-denoise
  brew: brew install open-image-denoise
provenance:
  formula: open-image-denoise
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
