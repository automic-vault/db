id: brew:cargo-sweep
display-name: cargo-sweep
homepage: https://github.com/holmgr/cargo-sweep
repo: https://github.com/holmgr/cargo-sweep
docs: https://github.com/holmgr/cargo-sweep
package-manager:
  brew: cargo-sweep
  nix: cargo-sweep
  pacman: cargo-sweep
package-manager-url: https://formulae.brew.sh/formula/cargo-sweep
version: 0.8.0
license: MIT
category: development
tags:
  - cli
description: Utility for cleaning up unused build files generated by Cargo
source-archive: https://github.com/holmgr/cargo-sweep/archive/refs/tags/v0.8.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-sweep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-sweep
  brew: brew install cargo-sweep
  nix: nix profile install nixpkgs#cargo-sweep
  pacman: sudo pacman -S cargo-sweep
provenance:
  formula: cargo-sweep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
