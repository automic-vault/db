id: brew:valkey
display-name: valkey
homepage: https://valkey.io
repo: https://github.com/valkey-io/valkey
docs: https://valkey.io
package-manager:
  apk: valkey
  brew: valkey
  debian: valkey-sentinel
  dnf: valkey
  macports: valkey
  nix: valkey
  pacman: valkey
  zypper: valkey
package-manager-url: https://formulae.brew.sh/formula/valkey
version: 9.1
license: BSD-3-Clause AND BSD-2-Clause AND BSL-1.0 AND MIT AND (CC0-1.0 OR BSD-2-Clause)
category: development
tags:
  - cli
description: High-performance data structure server that primarily serves key/value workloads
source-archive: https://github.com/valkey-io/valkey/archive/refs/tags/9.1.tar.gz
dependencies:
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: valkey-benchmark
  - exposure: global executable
    kind: cli
    name: valkey-check-aof
  - exposure: global executable
    kind: cli
    name: valkey-check-rdb
  - exposure: global executable
    kind: cli
    name: valkey-cli
  - exposure: global executable
    kind: cli
    name: valkey-sentinel
  - exposure: global executable
    kind: cli
    name: valkey-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add valkey
  av: sudo av install brew:valkey
  brew: brew install valkey
  debian: sudo apt install valkey-sentinel
  dnf: sudo dnf install valkey
  macports: sudo port install valkey
  nix: nix profile install nixpkgs#valkey
  pacman: sudo pacman -S valkey
  zypper: sudo zypper install valkey
provenance:
  formula: valkey
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
