id: brew:terminal-notifier
display-name: terminal-notifier
homepage: https://github.com/julienXX/terminal-notifier
repo: https://github.com/julienXX/terminal-notifier
docs: https://github.com/julienXX/terminal-notifier
package-manager:
  brew: terminal-notifier
  macports: terminal-notifier
  nix: terminal-notifier
package-manager-url: https://formulae.brew.sh/formula/terminal-notifier
version: 2.0.0
license: MIT
category: development
tags:
  - cli
description: Send macOS User Notifications from the command-line
source-archive: https://github.com/julienXX/terminal-notifier/archive/refs/tags/2.0.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: terminal-notifier
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terminal-notifier
  brew: brew install terminal-notifier
  macports: sudo port install terminal-notifier
  nix: nix profile install nixpkgs#terminal-notifier
provenance:
  formula: terminal-notifier
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
