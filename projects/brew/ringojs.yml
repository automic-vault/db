id: brew:ringojs
display-name: ringojs
homepage: https://ringojs.org
repo: https://github.com/ringo/ringojs
docs: https://ringojs.org
package-manager:
  brew: ringojs
package-manager-url: https://formulae.brew.sh/formula/ringojs
version: 4.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: CommonJS-based JavaScript runtime
source-archive: https://github.com/ringo/ringojs/releases/download/v4.0.0/ringojs-4.0.0.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: ringo
  - exposure: global executable
    kind: cli
    name: ringo-admin
  - exposure: global executable
    kind: cli
    name: ringo-web
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ringojs
  brew: brew install ringojs
provenance:
  formula: ringojs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
