id: brew:silicon
display-name: silicon
homepage: https://github.com/Aloxaf/silicon/
repo: https://github.com/Aloxaf/silicon
docs: https://github.com/Aloxaf/silicon/
package-manager:
  brew: silicon
  macports: silicon
  nix: silicon
  pacman: silicon
  scoop: main/silicon
package-manager-url: https://formulae.brew.sh/formula/silicon
version: 0.5.3
license: MIT
category: development
tags:
  - cli
description: Create beautiful image of your source code
source-archive: https://github.com/Aloxaf/silicon/archive/refs/tags/v0.5.3.tar.gz
dependencies:
  - fontconfig
  - freetype
  - harfbuzz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: silicon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:silicon
  brew: brew install silicon
  macports: sudo port install silicon
  nix: nix profile install nixpkgs#silicon
  pacman: sudo pacman -S silicon
  scoop: scoop install main/silicon
provenance:
  formula: silicon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
