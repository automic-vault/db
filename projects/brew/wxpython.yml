id: brew:wxpython
display-name: wxpython
homepage: https://www.wxpython.org/
repo: >
  https://files.pythonhosted.org/packages/22/43/81657a6b126ffc19163500a8184d683cec08eb4e1d06905cd0c371c702d0/wxpython-4.2.5.tar.gz
docs: https://www.wxpython.org/
package-manager:
  brew: wxpython
package-manager-url: https://formulae.brew.sh/formula/wxpython
version: 4.2.5
license: LGPL-2.0-or-later WITH WxWindows-exception-3.1
category: network
tags:
  - cli
description: Python bindings for wxWidgets
source-archive: >
  https://files.pythonhosted.org/packages/22/43/81657a6b126ffc19163500a8184d683cec08eb4e1d06905cd0c371c702d0/wxpython-4.2.5.tar.gz
dependencies:
  - numpy
  - pillow
  - python@3.14
  - wxwidgets@3.2
build-dependencies:
  - cython
  - doxygen
  - python-setuptools
  - sip
executables:
  - exposure: global executable
    kind: cli
    name: helpviewer
  - exposure: global executable
    kind: cli
    name: img2png
  - exposure: global executable
    kind: cli
    name: img2py
  - exposure: global executable
    kind: cli
    name: img2xpm
  - exposure: global executable
    kind: cli
    name: pycrust
  - exposure: global executable
    kind: cli
    name: pyshell
  - exposure: global executable
    kind: cli
    name: pyslices
  - exposure: global executable
    kind: cli
    name: pyslicesshell
  - exposure: global executable
    kind: cli
    name: pywxrc
  - exposure: global executable
    kind: cli
    name: wxdemo
  - exposure: global executable
    kind: cli
    name: wxdocs
  - exposure: global executable
    kind: cli
    name: wxget
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wxpython
  brew: brew install wxpython
provenance:
  formula: wxpython
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
