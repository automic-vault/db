  dnf: sudo dnf install libmspub
  macports: sudo port install libmspub
  nix: nix profile install nixpkgs#libmspub
  pacman: sudo pacman -S libmspub
provenance:
  formula: libmspub
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
