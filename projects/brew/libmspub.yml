id: brew:libmspub
display-name: libmspub
homepage: https://wiki.documentfoundation.org/DLP/Libraries/libmspub
repo: https://dev-www.libreoffice.org/src/libmspub/libmspub-0.1.5.tar.xz
docs: https://wiki.documentfoundation.org/DLP/Libraries/libmspub
package-manager:
  apk: libmspub
  brew: libmspub
  dnf: libmspub
  macports: libmspub
  nix: libmspub
  pacman: libmspub
package-manager-url: https://formulae.brew.sh/formula/libmspub
version: 0.1.5
license: MPL-2.0
category: network
tags:
  - cli
description: Interpret and import Microsoft Publisher content
source-archive: https://dev-www.libreoffice.org/src/libmspub/libmspub-0.1.5.tar.xz
dependencies:
  - icu4c@78
  - librevenge
  - libwpd
build-dependencies:
  - boost
  - libwpg
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pub2raw
