id: brew:lazyjj
display-name: lazyjj
homepage: https://github.com/Cretezy/lazyjj
repo: https://github.com/Cretezy/lazyjj
docs: https://github.com/Cretezy/lazyjj
package-manager:
  brew: lazyjj
  nix: lazyjj
  pacman: lazyjj
  winget: Cretezy.lazyjj
package-manager-url: https://formulae.brew.sh/formula/lazyjj
version: 0.6.1
license: Apache-2.0
category: development
tags:
  - cli
description: TUI for Jujutsu/jj
source-archive: https://github.com/Cretezy/lazyjj/archive/refs/tags/v0.6.1.tar.gz
dependencies:
  - jj
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: lazyjj
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lazyjj
  brew: brew install lazyjj
  nix: nix profile install nixpkgs#lazyjj
  pacman: sudo pacman -S lazyjj
  winget: winget install --id Cretezy.lazyjj -e
provenance:
  formula: lazyjj
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
