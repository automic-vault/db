id: brew:age
display-name: age
homepage: https://github.com/FiloSottile/age
repo: https://github.com/FiloSottile/age
docs: https://github.com/FiloSottile/age
package-manager:
  apk: age
  brew: age
  debian: age
  dnf: age
  macports: age
  nix: age
  pacman: age
  scoop: extras/age
  ubuntu: age
  winget: FiloSottile.age
  zypper: age
package-manager-url: https://formulae.brew.sh/formula/age
version: 1.3.1
license: BSD-3-Clause
category: security
tags:
  - cli
description: Simple, modern, secure file encryption
source-archive: https://github.com/FiloSottile/age/archive/refs/tags/v1.3.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: age
  - exposure: global executable
    kind: cli
    name: age-inspect
  - exposure: global executable
    kind: cli
    name: age-keygen
  - exposure: global executable
    kind: cli
    name: age-plugin-batchpass
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add age
  av: sudo av install brew:age
  brew: brew install age
  debian: sudo apt install age
  dnf: sudo dnf install age
  macports: sudo port install age
  nix: nix profile install nixpkgs#age
  pacman: sudo pacman -S age
  scoop: scoop install extras/age
  ubuntu: sudo apt install age
  winget: winget install --id FiloSottile.age -e
  zypper: sudo zypper install age
provenance:
  formula: age
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
