id: brew:babeld
display-name: babeld
homepage: https://www.irif.fr/~jch/software/babel/
repo: https://www.irif.fr/~jch/software/files/babeld-1.13.1.tar.gz
docs: https://www.irif.fr/~jch/software/babel/
package-manager:
  apk: babeld
  brew: babeld
