id: brew:prr
display-name: prr
homepage: https://github.com/danobi/prr
repo: https://github.com/danobi/prr
docs: https://github.com/danobi/prr
package-manager:
  brew: prr
  debian: prr
  nix: prr
package-manager-url: https://formulae.brew.sh/formula/prr
version: 0.21.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Mailing list style code reviews for github
source-archive: https://github.com/danobi/prr/archive/refs/tags/v0.21.0.tar.gz
dependencies:
  - libgit2
  - libssh2
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: prr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:prr
  brew: brew install prr
  debian: sudo apt install prr
  nix: nix profile install nixpkgs#prr
provenance:
  formula: prr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
