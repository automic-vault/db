id: brew:vite
display-name: vite
homepage: https://vitejs.dev/
repo: https://registry.npmjs.org/vite/-/vite-8.0.14.tgz
docs: https://vitejs.dev/
package-manager:
  brew: vite
  debian: vite
  nix: vite
  ubuntu: vite
package-manager-url: https://formulae.brew.sh/formula/vite
version: 8.0.14
license: MIT
category: network
tags:
  - cli
description: Next generation frontend tooling. It's fast!
source-archive: https://registry.npmjs.org/vite/-/vite-8.0.14.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: vite
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vite
  brew: brew install vite
  debian: sudo apt install vite
  nix: nix profile install nixpkgs#vite
  ubuntu: sudo apt install vite
provenance:
  formula: vite
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
