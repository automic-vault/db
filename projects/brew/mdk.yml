id: brew:mdk
display-name: mdk
homepage: https://www.gnu.org/software/mdk/mdk.html
repo: https://ftpmirror.gnu.org/gnu/mdk/v1.3.1/mdk-1.3.1.tar.gz
docs: https://www.gnu.org/software/mdk/mdk.html
package-manager:
  brew: mdk
  debian: mdk
  dnf: mdk
  macports: mdk
  nix: mdk
  ubuntu: mdk
package-manager-url: https://formulae.brew.sh/formula/mdk
version: 1.3.1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU MIX development kit
source-archive: https://ftpmirror.gnu.org/gnu/mdk/v1.3.1/mdk-1.3.1.tar.gz
dependencies:
  - adwaita-icon-theme
  - at-spi2-core
  - bdw-gc
  - cairo
  - flex
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - guile
  - harfbuzz
  - pango
  - readline
build-dependencies:
  - gettext
  - intltool
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: gmixvm
  - exposure: global executable
    kind: cli
    name: mixasm
  - exposure: global executable
    kind: cli
    name: mixguile
  - exposure: global executable
    kind: cli
    name: mixvm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mdk
  brew: brew install mdk
  debian: sudo apt install mdk
  dnf: sudo dnf install mdk
  macports: sudo port install mdk
  nix: nix profile install nixpkgs#mdk
  ubuntu: sudo apt install mdk
provenance:
  formula: mdk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
