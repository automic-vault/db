id: brew:stress-ng
display-name: stress-ng
homepage: https://wiki.ubuntu.com/Kernel/Reference/stress-ng
repo: https://github.com/ColinIanKing/stress-ng
docs: https://wiki.ubuntu.com/Kernel/Reference/stress-ng
package-manager:
  apk: stress-ng
  brew: stress-ng
  debian: stress-ng
  dnf: stress-ng
  macports: stress-ng
  nix: stress-ng
  pacman: stress-ng
  ubuntu: stress-ng
  zypper: stress-ng
package-manager-url: https://formulae.brew.sh/formula/stress-ng
version: 0.21.01
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Stress test a computer system in various selectable ways
source-archive: https://github.com/ColinIanKing/stress-ng/archive/refs/tags/V0.21.01.tar.gz
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: stress-ng
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add stress-ng
  av: sudo av install brew:stress-ng
  brew: brew install stress-ng
  debian: sudo apt install stress-ng
  dnf: sudo dnf install stress-ng
  macports: sudo port install stress-ng
  nix: nix profile install nixpkgs#stress-ng
  pacman: sudo pacman -S stress-ng
  ubuntu: sudo apt install stress-ng
  zypper: sudo zypper install stress-ng
provenance:
  formula: stress-ng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
