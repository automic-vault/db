id: brew:oxker
display-name: oxker
homepage: https://github.com/mrjackwills/oxker
repo: https://github.com/mrjackwills/oxker
docs: https://github.com/mrjackwills/oxker
package-manager:
  brew: oxker
  macports: oxker
  nix: oxker
package-manager-url: https://formulae.brew.sh/formula/oxker
version: 0.13.2
license: MIT
category: development
tags:
  - cli
  - docker
description: Terminal User Interface (TUI) to view & control docker containers
source-archive: https://github.com/mrjackwills/oxker/archive/refs/tags/v0.13.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: oxker
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oxker
  brew: brew install oxker
  macports: sudo port install oxker
  nix: nix profile install nixpkgs#oxker
provenance:
  formula: oxker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
