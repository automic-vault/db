id: brew:lm4tools
display-name: lm4tools
homepage: https://github.com/utzig/lm4tools
repo: https://github.com/utzig/lm4tools
docs: https://github.com/utzig/lm4tools
package-manager:
  brew: lm4tools
  debian: lm4flash
  nix: lm4flash
  ubuntu: lm4flash
package-manager-url: https://formulae.brew.sh/formula/lm4tools
version: 0.1.3
license: GPL-2.0-or-later AND BSD-3-Clause
category: development
tags:
  - cli
description: Tools for TI Stellaris Launchpad boards
source-archive: https://github.com/utzig/lm4tools/archive/refs/tags/v0.1.3.tar.gz
dependencies:
  - libusb
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: lm4flash
  - exposure: global executable
    kind: cli
    name: lmicdi
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lm4tools
  brew: brew install lm4tools
  debian: sudo apt install lm4flash
  nix: nix profile install nixpkgs#lm4flash
  ubuntu: sudo apt install lm4flash
provenance:
  formula: lm4tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
