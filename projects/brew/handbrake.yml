id: brew:handbrake
display-name: handbrake
homepage: https://handbrake.fr/
repo: https://github.com/HandBrake/HandBrake
docs: https://handbrake.fr/
package-manager:
  apk: handbrake
  brew: handbrake
  chocolatey: handbrake
  debian: handbrake
  macports: HandBrake
  nix: handbrake
  pacman: handbrake
  scoop: extras/handbrake
  ubuntu: handbrake
  winget: HandBrake.HandBrake
package-manager-url: https://formulae.brew.sh/formula/handbrake
version: 1.11.1
license: GPL-2.0-only
category: development
tags:
  - cli
description: Open-source video transcoder available for Linux, Mac, and Windows
source-archive: >
  https://github.com/HandBrake/HandBrake/releases/download/1.11.1/HandBrake-1.11.1-source.tar.bz2
dependencies:
  - dav1d
  - freetype
  - fribidi
  - harfbuzz
  - jansson
  - jpeg-turbo
  - lame
  - libass
  - libbluray
  - libdvdnav
  - libdvdread
  - libogg
  - libvorbis
  - libvpx
  - libx11
  - opus
  - speex
  - svt-av1
  - theora
  - x264
  - xz
  - zimg
build-dependencies:
  - autoconf
  - automake
  - cmake
  - libtool
  - meson
  - nasm
  - ninja
  - pkgconf
uses-from-macos:
  - bzip2
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: HandBrakeCLI
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add handbrake
  av: sudo av install brew:handbrake
  brew: brew install handbrake
  chocolatey: choco install handbrake
  debian: sudo apt install handbrake
  macports: sudo port install HandBrake
  nix: nix profile install nixpkgs#handbrake
  pacman: sudo pacman -S handbrake
  scoop: scoop install extras/handbrake
  ubuntu: sudo apt install handbrake
  winget: winget install --id HandBrake.HandBrake -e
provenance:
  formula: handbrake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
