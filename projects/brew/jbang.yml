id: brew:jbang
display-name: jbang
homepage: https://jbang.dev/
repo: https://github.com/jbangdev/jbang
docs: https://jbang.dev/
package-manager:
  brew: jbang
  chocolatey: jbang
  nix: jbang
  scoop: main/jbang
package-manager-url: https://formulae.brew.sh/formula/jbang
version: 0.138.0
license: MIT
category: development
tags:
  - cli
description: Tool to create, edit and run self-contained source-only Java programs
source-archive: https://github.com/jbangdev/jbang/releases/download/v0.138.0/jbang-0.138.0.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: jbang
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jbang
  brew: brew install jbang
  chocolatey: choco install jbang
  nix: nix profile install nixpkgs#jbang
  scoop: scoop install main/jbang
provenance:
  formula: jbang
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
