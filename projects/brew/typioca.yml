id: brew:typioca
display-name: typioca
homepage: https://github.com/bloznelis/typioca
repo: https://github.com/bloznelis/typioca
docs: https://github.com/bloznelis/typioca
package-manager:
  brew: typioca
  nix: typioca
  scoop: main/typioca
  winget: bloznelis.typioca
  zypper: typioca
package-manager-url: https://formulae.brew.sh/formula/typioca
version: 3.1.0
license: MIT
category: development
tags:
  - cli
description: Cozy typing speed tester in terminal
source-archive: https://github.com/bloznelis/typioca/archive/refs/tags/3.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: typioca
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:typioca
  brew: brew install typioca
  nix: nix profile install nixpkgs#typioca
  scoop: scoop install main/typioca
  winget: winget install --id bloznelis.typioca -e
  zypper: sudo zypper install typioca
provenance:
  formula: typioca
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
