id: brew:phoneinfoga
display-name: phoneinfoga
homepage: https://sundowndev.github.io/phoneinfoga/
repo: https://github.com/sundowndev/phoneinfoga
docs: https://sundowndev.github.io/phoneinfoga/
package-manager:
  brew: phoneinfoga
package-manager-url: https://formulae.brew.sh/formula/phoneinfoga
version: 2.11.0
license: GPL-3.0-only
category: development
tags:
