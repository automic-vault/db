id: brew:convco
display-name: convco
homepage: https://convco.github.io
repo: https://github.com/convco/convco
docs: https://convco.github.io
package-manager:
  brew: convco
  nix: convco
package-manager-url: https://formulae.brew.sh/formula/convco
version: 0.6.4
license: MIT
category: development
tags:
  - cli
description: Conventional commits, changelog, versioning, validation
source-archive: https://github.com/convco/convco/archive/refs/tags/v0.6.4.tar.gz
dependencies:
  - libgit2
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: convco
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:convco
  brew: brew install convco
  nix: nix profile install nixpkgs#convco
provenance:
  formula: convco
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
