id: brew:h264bitstream
display-name: h264bitstream
homepage: https://h264bitstream.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/h264bitstream/h264bitstream/0.2.0/h264bitstream-0.2.0.tar.gz
docs: https://h264bitstream.sourceforge.net/
package-manager:
  brew: h264bitstream
package-manager-url: https://formulae.brew.sh/formula/h264bitstream
version: 0.2.0
license: LGPL-2.1-or-later
category: media
tags:
  - cli
description: Library for reading and writing H264 video streams
source-archive: >
  https://downloads.sourceforge.net/project/h264bitstream/h264bitstream/0.2.0/h264bitstream-0.2.0.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: h264_analyze
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:h264bitstream
  brew: brew install h264bitstream
provenance:
  formula: h264bitstream
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
