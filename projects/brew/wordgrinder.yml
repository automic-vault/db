id: brew:wordgrinder
display-name: wordgrinder
homepage: https://cowlark.com/wordgrinder
repo: https://github.com/davidgiven/wordgrinder
docs: https://cowlark.com/wordgrinder
package-manager:
  apk: wordgrinder
  brew: wordgrinder
  debian: wordgrinder
  dnf: wordgrinder
  macports: wordgrinder
  nix: wordgrinder
  ubuntu: wordgrinder
package-manager-url: https://formulae.brew.sh/formula/wordgrinder
version: 0.8
license: MIT
category: development
tags:
  - cli
description: Unicode-aware word processor that runs in a terminal
source-archive: https://github.com/davidgiven/wordgrinder/archive/refs/tags/0.8.tar.gz
dependencies:
  - ncurses
build-dependencies:
  - lua
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: wordgrinder
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wordgrinder
  av: sudo av install brew:wordgrinder
  brew: brew install wordgrinder
  debian: sudo apt install wordgrinder
  dnf: sudo dnf install wordgrinder
  macports: sudo port install wordgrinder
  nix: nix profile install nixpkgs#wordgrinder
  ubuntu: sudo apt install wordgrinder
provenance:
  formula: wordgrinder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
