id: brew:dwm
display-name: dwm
homepage: https://dwm.suckless.org/
repo: https://dl.suckless.org/dwm/dwm-6.8.tar.gz
docs: https://dwm.suckless.org/
package-manager:
  apk: dwm
  brew: dwm
  debian: dwm
  nix: dwm
  ubuntu: dwm
package-manager-url: https://formulae.brew.sh/formula/dwm
version: 6.8
license: MIT
category: network
tags:
  - cli
description: Dynamic window manager
source-archive: https://dl.suckless.org/dwm/dwm-6.8.tar.gz
dependencies:
  - dmenu
  - fontconfig
  - libx11
  - libxft
  - libxinerama
executables:
  - exposure: global executable
    kind: cli
    name: dwm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    In order to use the Mac OS X command key for dwm commands, change the X11 keyboard
    modifier map using xmodmap (1). e.g. by running the following command from
    $HOME/.xinitrc xmodmap -e 'remove Mod2 = Meta_L' -e 'add Mod1 = Meta_L'& See also
    https://gist.github.com/311377 for a handful of tips and tricks for running dwm on
    Mac OS X.
  post-install-defined: false
install-lines:
  apk: sudo apk add dwm
  av: sudo av install brew:dwm
  brew: brew install dwm
  debian: sudo apt install dwm
  nix: nix profile install nixpkgs#dwm
  ubuntu: sudo apt install dwm
provenance:
  formula: dwm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
