id: brew:chrome-export
display-name: chrome-export
homepage: https://github.com/bdesham/chrome-export
repo: https://github.com/bdesham/chrome-export
docs: https://github.com/bdesham/chrome-export
package-manager:
  brew: chrome-export
  nix: chrome-export
package-manager-url: https://formulae.brew.sh/formula/chrome-export
version: 2.0.2
license: ISC
category: development
tags:
  - cli
description: Convert Chrome's bookmarks and history to HTML bookmarks files
source-archive: https://github.com/bdesham/chrome-export/archive/refs/tags/v2.0.2.tar.gz
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: export-chrome-bookmarks
  - exposure: global executable
    kind: cli
    name: export-chrome-history
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chrome-export
  brew: brew install chrome-export
  nix: nix profile install nixpkgs#chrome-export
provenance:
  formula: chrome-export
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
