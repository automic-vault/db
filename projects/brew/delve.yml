id: brew:delve
display-name: delve
homepage: https://github.com/go-delve/delve
repo: https://github.com/go-delve/delve
docs: https://github.com/go-delve/delve
package-manager:
  apk: delve
  brew: delve
  debian: delve
  dnf: delve
  macports: delve
  nix: delve
  pacman: delve
  ubuntu: delve
  zypper: delve
package-manager-url: https://formulae.brew.sh/formula/delve
version: 1.26.3
license: MIT
category: development
tags:
  - cli
description: Debugger for the Go programming language
source-archive: https://github.com/go-delve/delve/archive/refs/tags/v1.26.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dlv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add delve
  av: sudo av install brew:delve
  brew: brew install delve
  debian: sudo apt install delve
  dnf: sudo dnf install delve
  macports: sudo port install delve
  nix: nix profile install nixpkgs#delve
  pacman: sudo pacman -S delve
  ubuntu: sudo apt install delve
  zypper: sudo zypper install delve
provenance:
  formula: delve
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
