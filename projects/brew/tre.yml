id: brew:tre
display-name: tre
homepage: https://github.com/laurikari/tre
repo: https://github.com/laurikari/tre
docs: https://github.com/laurikari/tre
package-manager:
  apk: tre
  brew: tre
  dnf: tre
  macports: tre
  nix: tre
  pacman: tre
  zypper: agrep
package-manager-url: https://formulae.brew.sh/formula/tre
version: 0.9.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Lightweight, POSIX-compliant regular expression (regex) library
source-archive: https://github.com/laurikari/tre/releases/download/v0.9.0/tre-0.9.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: agrep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tre
  av: sudo av install brew:tre
  brew: brew install tre
  dnf: sudo dnf install tre
  macports: sudo port install tre
  nix: nix profile install nixpkgs#tre
  pacman: sudo pacman -S tre
  zypper: sudo zypper install agrep
provenance:
  formula: tre
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
