id: brew:toxcore
display-name: toxcore
homepage: https://tox.chat/
repo: https://github.com/TokTok/c-toxcore
docs: https://tox.chat/
package-manager:
  apk: toxcore
  brew: toxcore
  dnf: toxcore
  macports: toxcore
  pacman: toxcore
package-manager-url: https://formulae.brew.sh/formula/toxcore
version: 0.2.22
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: C library implementing the Tox peer to peer network protocol
source-archive: https://github.com/TokTok/c-toxcore/releases/download/v0.2.22/c-toxcore-v0.2.22.tar.xz
dependencies:
  - libconfig
  - libsodium
  - libvpx
  - opus
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: DHT_bootstrap
  - exposure: global executable
    kind: cli
    name: tox-bootstrapd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add toxcore
  av: sudo av install brew:toxcore
  brew: brew install toxcore
  dnf: sudo dnf install toxcore
  macports: sudo port install toxcore
  pacman: sudo pacman -S toxcore
provenance:
  formula: toxcore
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
