id: brew:betterleaks
display-name: betterleaks
homepage: https://github.com/betterleaks/betterleaks
repo: https://github.com/betterleaks/betterleaks
docs: https://github.com/betterleaks/betterleaks
package-manager:
  brew: betterleaks
  dnf: betterleaks
  macports: betterleaks
  nix: betterleaks
package-manager-url: https://formulae.brew.sh/formula/betterleaks
version: 1.3.1
license: MIT
category: security
tags:
  - cli
description: Secrets scanner built for configurability and speed
source-archive: https://github.com/betterleaks/betterleaks/archive/refs/tags/v1.3.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: betterleaks
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:betterleaks
  brew: brew install betterleaks
  dnf: sudo dnf install betterleaks
  macports: sudo port install betterleaks
  nix: nix profile install nixpkgs#betterleaks
provenance:
  formula: betterleaks
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
