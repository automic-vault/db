id: brew:bc
display-name: bc
homepage: https://www.gnu.org/software/bc/
repo: https://ftpmirror.gnu.org/gnu/bc/bc-1.08.2.tar.gz
docs: https://www.gnu.org/software/bc/
package-manager:
  apk: bc
  brew: bc
  debian: bc
  dnf: bc
  macports: bc
  nix: bc
  pacman: bc
  scoop: main/bc
  ubuntu: bc
  zypper: bc
package-manager-url: https://formulae.brew.sh/formula/bc
version: 1.08.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Arbitrary precision numeric processing language
source-archive: https://ftpmirror.gnu.org/gnu/bc/bc-1.08.2.tar.gz
build-dependencies:
  - texinfo
uses-from-macos:
  - flex
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: bc
  - exposure: global executable
    kind: cli
    name: dc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bc
  av: sudo av install brew:bc
  brew: brew install bc
  debian: sudo apt install bc
  dnf: sudo dnf install bc
  macports: sudo port install bc
  nix: nix profile install nixpkgs#bc
  pacman: sudo pacman -S bc
  scoop: scoop install main/bc
  ubuntu: sudo apt install bc
  zypper: sudo zypper install bc
provenance:
  formula: bc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
