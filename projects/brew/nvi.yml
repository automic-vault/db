id: brew:nvi
display-name: nvi
homepage: https://repo.or.cz/nvi.git
repo: https://deb.debian.org/debian/pool/main/n/nvi/nvi_1.81.6.orig.tar.gz
docs: https://repo.or.cz/nvi.git
package-manager:
  brew: nvi
  debian: nvi
  dnf: nex
  macports: nvi
  nix: nvi
  ubuntu: nvi
package-manager-url: https://formulae.brew.sh/formula/nvi
version: 1.81.6
license: BSD-3-Clause
category: development
tags:
  - cli
description: 44BSD re-implementation of vi
source-archive: https://deb.debian.org/debian/pool/main/n/nvi/nvi_1.81.6.orig.tar.gz
dependencies:
  - berkeley-db@5
build-dependencies:
  - autoconf
  - automake
  - libtool
  - xz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: nex
  - exposure: global executable
    kind: cli
    name: nvi
  - exposure: global executable
    kind: cli
    name: nview
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nvi
  brew: brew install nvi
  debian: sudo apt install nvi
  dnf: sudo dnf install nex
  macports: sudo port install nvi
  nix: nix profile install nixpkgs#nvi
  ubuntu: sudo apt install nvi
provenance:
  formula: nvi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
