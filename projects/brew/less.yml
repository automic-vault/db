id: brew:less
display-name: less
homepage: https://www.greenwoodsoftware.com/less/index.html
repo: https://www.greenwoodsoftware.com/less/less-702.tar.gz
docs: https://www.greenwoodsoftware.com/less/index.html
package-manager:
  apk: less
  brew: less
  chocolatey: Less
  debian: less
  dnf: less
  macports: less
  nix: less
  pacman: less
  scoop: main/less
  ubuntu: less
  winget: jftuga.less
  zypper: less
package-manager-url: https://formulae.brew.sh/formula/less
version: 702
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Pager program similar to more
source-archive: https://www.greenwoodsoftware.com/less/less-702.tar.gz
dependencies:
  - ncurses
  - pcre2
executables:
  - exposure: global executable
    kind: cli
    name: less
  - exposure: global executable
    kind: cli
    name: lesskey
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add less
  av: sudo av install brew:less
  brew: brew install less
  chocolatey: choco install Less
  debian: sudo apt install less
  dnf: sudo dnf install less
  macports: sudo port install less
  nix: nix profile install nixpkgs#less
  pacman: sudo pacman -S less
  scoop: scoop install main/less
  ubuntu: sudo apt install less
  winget: winget install --id jftuga.less -e
  zypper: sudo zypper install less
provenance:
  formula: less
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
