id: brew:cargo-bundle
display-name: cargo-bundle
homepage: https://github.com/burtonageo/cargo-bundle
repo: https://github.com/burtonageo/cargo-bundle
docs: https://github.com/burtonageo/cargo-bundle
package-manager:
  brew: cargo-bundle
  nix: cargo-bundle
package-manager-url: https://formulae.brew.sh/formula/cargo-bundle
version: 0.9.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Wrap rust executables in OS-specific app bundles
source-archive: https://github.com/burtonageo/cargo-bundle/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-bundle
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-bundle
  brew: brew install cargo-bundle
  nix: nix profile install nixpkgs#cargo-bundle
provenance:
  formula: cargo-bundle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
