id: brew:fsw
display-name: fsw
homepage: https://emcrisostomo.github.io/fsw/
repo: https://github.com/emcrisostomo/fsw
docs: https://emcrisostomo.github.io/fsw/
package-manager:
  brew: fsw
package-manager-url: https://formulae.brew.sh/formula/fsw
version: 1.3.9
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: File change monitor with multiple backends
source-archive: https://github.com/emcrisostomo/fsw/releases/download/1.3.9/fsw-1.3.9.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: fsw
  - exposure: global executable
    kind: cli
    name: fswatch-run
  - exposure: global executable
    kind: cli
    name: fswatch-run-bash
  - exposure: global executable
    kind: cli
    name: fswatch-run-zsh
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fsw
  brew: brew install fsw
provenance:
  formula: fsw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
