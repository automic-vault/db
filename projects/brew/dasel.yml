id: brew:dasel
display-name: dasel
homepage: https://github.com/TomWright/dasel
repo: https://github.com/TomWright/dasel
docs: https://github.com/TomWright/dasel
package-manager:
  apk: dasel
  brew: dasel
  debian: dasel
  macports: dasel
  nix: dasel
  scoop: extras/dasel
  ubuntu: dasel
package-manager-url: https://formulae.brew.sh/formula/dasel
version: 3.11.0
license: MIT
category: development
tags:
  - cli
  - json
  - yaml
description: JSON, YAML, TOML, XML, and CSV query and modification tool
source-archive: https://github.com/TomWright/dasel/archive/refs/tags/v3.11.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dasel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dasel
  av: sudo av install brew:dasel
  brew: brew install dasel
  debian: sudo apt install dasel
  macports: sudo port install dasel
  nix: nix profile install nixpkgs#dasel
  scoop: scoop install extras/dasel
  ubuntu: sudo apt install dasel
provenance:
  formula: dasel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
