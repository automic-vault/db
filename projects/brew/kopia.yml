id: brew:kopia
display-name: kopia
homepage: https://kopia.io
repo: https://github.com/kopia/kopia
docs: https://kopia.io
package-manager:
  apk: kopia
  brew: kopia
  nix: kopia
  scoop: main/kopia
  zypper: kopia
package-manager-url: https://formulae.brew.sh/formula/kopia
version: 0.23.0
license: Apache-2.0
category: development
tags:
  - cli
description: Fast and secure open-source backup
source-archive: https://github.com/kopia/kopia.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kopia
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kopia
  av: sudo av install brew:kopia
  brew: brew install kopia
  nix: nix profile install nixpkgs#kopia
  scoop: scoop install main/kopia
  zypper: sudo zypper install kopia
provenance:
  formula: kopia
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
