id: brew:watchman
display-name: watchman
homepage: https://github.com/facebook/watchman
repo: https://github.com/facebook/watchman
docs: https://github.com/facebook/watchman
package-manager:
  brew: watchman
  chocolatey: watchman
  macports: watchman
  nix: watchman
  scoop: main/watchman
  ubuntu: watchman
  winget: facebook.watchman
package-manager-url: https://formulae.brew.sh/formula/watchman
version: 2026.05.25.00
license: MIT
category: development
tags:
  - cli
description: Watch files and take action when they change
source-archive: https://github.com/facebook/watchman/archive/refs/tags/v2026.05.25.00.tar.gz
dependencies:
  - edencommon
  - fb303
  - fbthrift
  - fmt
  - folly
  - glog
  - pcre2
  - python@3.14
build-dependencies:
  - cmake
  - cpptoml
  - gflags
  - googletest
  - libevent
  - mvfst
  - openssl@4
  - pkgconf
  - python-setuptools
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: watchman
  - exposure: global executable
    kind: cli
    name: watchman-diag
  - exposure: global executable
    kind: cli
    name: watchman-make
  - exposure: global executable
    kind: cli
    name: watchman-replicate-subscription
  - exposure: global executable
    kind: cli
    name: watchman-wait
  - exposure: global executable
    kind: cli
    name: watchmanctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:watchman
  brew: brew install watchman
  chocolatey: choco install watchman
  macports: sudo port install watchman
  nix: nix profile install nixpkgs#watchman
  scoop: scoop install main/watchman
  ubuntu: sudo apt install watchman
  winget: winget install --id facebook.watchman -e
provenance:
  formula: watchman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
