id: brew:hoverfly
display-name: hoverfly
homepage: https://hoverfly.io/
repo: https://github.com/SpectoLabs/hoverfly
docs: https://hoverfly.io/
package-manager:
  brew: hoverfly
package-manager-url: https://formulae.brew.sh/formula/hoverfly
version: 1.12.7
license: Apache-2.0
category: development
tags:
  - cli
description: API simulations for development and testing
source-archive: https://github.com/SpectoLabs/hoverfly/archive/refs/tags/v1.12.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hoverfly
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hoverfly
  brew: brew install hoverfly
provenance:
  formula: hoverfly
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
