id: brew:git-xargs
display-name: git-xargs
homepage: https://github.com/gruntwork-io/git-xargs
repo: https://github.com/gruntwork-io/git-xargs
docs: https://github.com/gruntwork-io/git-xargs
package-manager:
  brew: git-xargs
  scoop: main/git-xargs
package-manager-url: https://formulae.brew.sh/formula/git-xargs
version: 0.1.16
license: Apache-2.0
category: development
tags:
  - cli
  - git
description: CLI for making updates across multiple Github repositories with a single command
source-archive: https://github.com/gruntwork-io/git-xargs/archive/refs/tags/v0.1.16.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-xargs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-xargs
  brew: brew install git-xargs
  scoop: scoop install main/git-xargs
provenance:
  formula: git-xargs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
