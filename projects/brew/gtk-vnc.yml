id: brew:gtk-vnc
display-name: gtk-vnc
homepage: https://gitlab.gnome.org/GNOME/gtk-vnc
repo: https://download.gnome.org/sources/gtk-vnc/1.5/gtk-vnc-1.5.0.tar.xz
docs: https://gitlab.gnome.org/GNOME/gtk-vnc
package-manager:
  apk: gtk-vnc
  brew: gtk-vnc
  macports: gtk-vnc
  nix: gtk-vnc
  pacman: gtk-vnc
package-manager-url: https://formulae.brew.sh/formula/gtk-vnc
version: 1.5.0
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: VNC viewer widget for GTK
source-archive: https://download.gnome.org/sources/gtk-vnc/1.5/gtk-vnc-1.5.0.tar.xz
dependencies:
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gmp
  - gnutls
  - gtk+3
build-dependencies:
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gvnccapture
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gtk-vnc
  av: sudo av install brew:gtk-vnc
  brew: brew install gtk-vnc
  macports: sudo port install gtk-vnc
  nix: nix profile install nixpkgs#gtk-vnc
  pacman: sudo pacman -S gtk-vnc
provenance:
  formula: gtk-vnc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
