id: brew:minicom
display-name: minicom
homepage: https://packages.debian.org/sid/minicom
repo: https://deb.debian.org/debian/pool/main/m/minicom/minicom_2.10.orig.tar.bz2
docs: https://packages.debian.org/sid/minicom
package-manager:
  apk: minicom
  brew: minicom
  debian: minicom
  dnf: minicom
  macports: minicom
  nix: minicom
  pacman: minicom
  ubuntu: minicom
  zypper: minicom
package-manager-url: https://formulae.brew.sh/formula/minicom
version: 2.10
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Menu-driven communications program
source-archive: https://deb.debian.org/debian/pool/main/m/minicom/minicom_2.10.orig.tar.bz2
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ascii-xfr
  - exposure: global executable
    kind: cli
    name: minicom
  - exposure: global executable
    kind: cli
    name: runscript
  - exposure: global executable
    kind: cli
    name: xminicom
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Terminal Compatibility ====================== If minicom doesn't see the LANG
    variable, it will try to fallback to make the layout more compatible, but uglier.
    Certain unsupported encodings will completely render the UI useless, so if the UI
    looks strange, try setting the following environment variable: LANG="en_US.UTF-8"
    Text Input Not Working ====================== Most development boards require Serial
    port setup -> Hardware Flow Control to be set to "No" to input text.
  post-install-defined: false
install-lines:
  apk: sudo apk add minicom
  av: sudo av install brew:minicom
  brew: brew install minicom
  debian: sudo apt install minicom
  dnf: sudo dnf install minicom
  macports: sudo port install minicom
  nix: nix profile install nixpkgs#minicom
  pacman: sudo pacman -S minicom
  ubuntu: sudo apt install minicom
  zypper: sudo zypper install minicom
provenance:
  formula: minicom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
