id: brew:naml
display-name: naml
homepage: https://github.com/krisnova/naml
repo: https://github.com/krisnova/naml
docs: https://github.com/krisnova/naml
package-manager:
  brew: naml
package-manager-url: https://formulae.brew.sh/formula/naml
version: 1.0.3
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
  - yaml
description: Convert Kubernetes YAML to Golang
source-archive: https://github.com/krisnova/naml/archive/refs/tags/v1.0.3.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: naml
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:naml
  brew: brew install naml
provenance:
  formula: naml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
