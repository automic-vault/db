id: brew:lldpd
display-name: lldpd
homepage: https://lldpd.github.io/
repo: https://media.luffy.cx/files/lldpd/lldpd-1.0.21.tar.gz
docs: https://lldpd.github.io/
package-manager:
  apk: lldpd
  brew: lldpd
  debian: lldpd
  dnf: lldpd
  macports: lldpd
  nix: lldpd
  pacman: lldpd
  ubuntu: lldpd
  zypper: lldpd
package-manager-url: https://formulae.brew.sh/formula/lldpd
version: 1.0.21
license: ISC
category: development
tags:
  - cli
description: Implementation of IEEE 802.1ab (LLDP)
source-archive: https://media.luffy.cx/files/lldpd/lldpd-1.0.21.tar.gz
dependencies:
  - libevent
  - readline
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: lldpcli
  - exposure: global executable
    kind: cli
    name: lldpctl
  - exposure: global executable
    kind: cli
    name: lldpd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add lldpd
  av: sudo av install brew:lldpd
  brew: brew install lldpd
  debian: sudo apt install lldpd
  dnf: sudo dnf install lldpd
  macports: sudo port install lldpd
  nix: nix profile install nixpkgs#lldpd
  pacman: sudo pacman -S lldpd
  ubuntu: sudo apt install lldpd
  zypper: sudo zypper install lldpd
provenance:
  formula: lldpd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
