id: brew:cppman
display-name: cppman
homepage: https://github.com/aitjcize/cppman
repo: >
  https://files.pythonhosted.org/packages/bd/f7/3fe2da627877a1b091d9f00fa494bc62a2eea1cad27a4fd64c23bd29a4fd/cppman-0.6.0.tar.gz
docs: https://github.com/aitjcize/cppman
package-manager:
  brew: cppman
  debian: cppman
  macports: cppman
  nix: cppman
  ubuntu: cppman
package-manager-url: https://formulae.brew.sh/formula/cppman
version: 0.6.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: C++ 98/11/14/17/20 manual pages from cplusplus.com and cppreference.com
source-archive: >
  https://files.pythonhosted.org/packages/bd/f7/3fe2da627877a1b091d9f00fa494bc62a2eea1cad27a4fd64c23bd29a4fd/cppman-0.6.0.tar.gz
dependencies:
  - groff
  - python@3.14
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: cppman
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cppman
  brew: brew install cppman
  debian: sudo apt install cppman
  macports: sudo port install cppman
  nix: nix profile install nixpkgs#cppman
  ubuntu: sudo apt install cppman
provenance:
  formula: cppman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
