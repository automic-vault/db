id: brew:blisp
display-name: blisp
homepage: https://github.com/pine64/blisp
repo: https://github.com/pine64/blisp
docs: https://github.com/pine64/blisp
package-manager:
  brew: blisp
  macports: blisp
  nix: blisp
  pacman: blisp
package-manager-url: https://formulae.brew.sh/formula/blisp
version: 0.0.5
license: MIT
category: development
tags:
  - cli
description: ISP tool & library for Bouffalo Labs RISC-V Microcontrollers and SoCs
source-archive: https://github.com/pine64/blisp/archive/refs/tags/v0.0.5.tar.gz
dependencies:
  - argtable3
  - libserialport
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: blisp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:blisp
  brew: brew install blisp
  macports: sudo port install blisp
  nix: nix profile install nixpkgs#blisp
  pacman: sudo pacman -S blisp
provenance:
  formula: blisp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
