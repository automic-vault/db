id: brew:openjph
display-name: openjph
homepage: https://github.com/aous72/OpenJPH
repo: https://github.com/aous72/OpenJPH
docs: https://github.com/aous72/OpenJPH
package-manager:
  brew: openjph
  dnf: openjph
  macports: OpenJPH
  nix: openjph
  pacman: openjph
  zypper: openjph
package-manager-url: https://formulae.brew.sh/formula/openjph
version: 0.27.3
license: BSD-2-Clause
category: development
tags:
  - cli
description: Open-source implementation of JPEG2000 Part-15 (or JPH or HTJ2K)
source-archive: https://github.com/aous72/OpenJPH/archive/refs/tags/0.27.3.tar.gz
dependencies:
  - libtiff
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ojph_compress
  - exposure: global executable
    kind: cli
    name: ojph_expand
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:openjph
  brew: brew install openjph
  dnf: sudo dnf install openjph
  macports: sudo port install OpenJPH
  nix: nix profile install nixpkgs#openjph
  pacman: sudo pacman -S openjph
  zypper: sudo zypper install openjph
provenance:
  formula: openjph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
