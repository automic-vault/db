id: brew:ramalama
display-name: ramalama
homepage: https://github.com/containers/ramalama
repo: >
  https://files.pythonhosted.org/packages/93/54/0cb849ecca09f127dcb221293bca15e7fddf57d749d4783b0a6f77b6dba7/ramalama-0.21.0.tar.gz
docs: https://github.com/containers/ramalama
package-manager:
  brew: ramalama
  dnf: ramalama
  macports: ramalama
  nix: ramalama
  pacman: ramalama
package-manager-url: https://formulae.brew.sh/formula/ramalama
version: 0.21.0
license: MIT
category: development
tags:
  - cli
description: Goal of RamaLama is to make working with AI boring
source-archive: >
  https://files.pythonhosted.org/packages/93/54/0cb849ecca09f127dcb221293bca15e7fddf57d749d4783b0a6f77b6dba7/ramalama-0.21.0.tar.gz
dependencies:
  - libyaml
  - llama.cpp
  - python@3.14
  - rpds-py
executables:
  - exposure: global executable
    kind: cli
    name: ramalama
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ramalama
  brew: brew install ramalama
  dnf: sudo dnf install ramalama
  macports: sudo port install ramalama
  nix: nix profile install nixpkgs#ramalama
  pacman: sudo pacman -S ramalama
provenance:
  formula: ramalama
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
