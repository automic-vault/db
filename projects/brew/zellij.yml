id: brew:zellij
display-name: zellij
homepage: https://zellij.dev
repo: https://github.com/zellij-org/zellij
docs: https://zellij.dev
package-manager:
  apk: zellij
  brew: zellij
  macports: zellij
  nix: zellij
  pacman: zellij
  scoop: main/zellij
  winget: Zellij.Zellij
  zypper: zellij
package-manager-url: https://formulae.brew.sh/formula/zellij
version: 0.44.3
license: MIT
category: development
tags:
  - cli
description: Pluggable terminal workspace, with terminal multiplexer as the base feature
source-archive: https://github.com/zellij-org/zellij/archive/refs/tags/v0.44.3.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: zellij
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zellij
  av: sudo av install brew:zellij
  brew: brew install zellij
  macports: sudo port install zellij
  nix: nix profile install nixpkgs#zellij
  pacman: sudo pacman -S zellij
  scoop: scoop install main/zellij
  winget: winget install --id Zellij.Zellij -e
  zypper: sudo zypper install zellij
provenance:
  formula: zellij
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
