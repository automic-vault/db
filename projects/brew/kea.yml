id: brew:kea
display-name: kea
homepage: https://www.isc.org/kea/
repo: https://ftp.isc.org/isc/kea/3.0.3/kea-3.0.3.tar.xz
docs: https://www.isc.org/kea/
package-manager:
  apk: kea
  brew: kea
  debian: kea
  dnf: kea
  nix: kea
  pacman: kea
  ubuntu: kea
  zypper: kea
package-manager-url: https://formulae.brew.sh/formula/kea
version: 3.0.3
license: MPL-2.0
category: network
tags:
  - cli
description: DHCP server
source-archive: https://ftp.isc.org/isc/kea/3.0.3/kea-3.0.3.tar.xz
dependencies:
  - boost
  - log4cplus
  - openssl@3
build-dependencies:
  - bison
  - meson
  - ninja
  - pkgconf
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: kea-admin
  - exposure: global executable
    kind: cli
    name: kea-ctrl-agent
  - exposure: global executable
    kind: cli
    name: kea-dhcp-ddns
  - exposure: global executable
    kind: cli
    name: kea-dhcp4
  - exposure: global executable
    kind: cli
    name: kea-dhcp6
  - exposure: global executable
    kind: cli
    name: kea-lfc
  - exposure: global executable
    kind: cli
    name: kea-msg-compiler
  - exposure: global executable
    kind: cli
    name: kea-shell
  - exposure: global executable
    kind: cli
    name: keactrl
  - exposure: global executable
    kind: cli
    name: perfdhcp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kea
  av: sudo av install brew:kea
  brew: brew install kea
  debian: sudo apt install kea
  dnf: sudo dnf install kea
  nix: nix profile install nixpkgs#kea
  pacman: sudo pacman -S kea
  ubuntu: sudo apt install kea
  zypper: sudo zypper install kea
provenance:
  formula: kea
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
