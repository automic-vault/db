id: brew:bit
display-name: bit
homepage: https://bit.dev
repo: https://registry.npmjs.org/bit-bin/-/bit-bin-14.8.8.tgz
docs: https://bit.dev
package-manager:
  brew: bit
  macports: bit
  nix: bit
  scoop: main/bit
package-manager-url: https://formulae.brew.sh/formula/bit
version: 14.8.8
license: Apache-2.0
category: network
tags:
  - cli
description: Distributed Code Component Manager
source-archive: https://registry.npmjs.org/bit-bin/-/bit-bin-14.8.8.tgz
dependencies:
  - node
  - terminal-notifier
executables:
  - exposure: global executable
    kind: cli
    name: bit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bit
  brew: brew install bit
  macports: sudo port install bit
  nix: nix profile install nixpkgs#bit
  scoop: scoop install main/bit
provenance:
  formula: bit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
