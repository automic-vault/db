id: brew:diskus
display-name: diskus
homepage: https://github.com/sharkdp/diskus
repo: https://github.com/sharkdp/diskus
docs: https://github.com/sharkdp/diskus
package-manager:
  apk: diskus
  brew: diskus
  dnf: diskus
  macports: diskus
  nix: diskus
  pacman: diskus
package-manager-url: https://formulae.brew.sh/formula/diskus
version: 0.9.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Minimal, fast alternative to 'du -sh'
source-archive: https://github.com/sharkdp/diskus/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: diskus
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add diskus
  av: sudo av install brew:diskus
  brew: brew install diskus
  dnf: sudo dnf install diskus
  macports: sudo port install diskus
  nix: nix profile install nixpkgs#diskus
  pacman: sudo pacman -S diskus
provenance:
  formula: diskus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
