id: brew:millet
display-name: millet
homepage: https://github.com/azdavis/millet
repo: https://github.com/azdavis/millet
docs: https://github.com/azdavis/millet
package-manager:
  brew: millet
  nix: millet
package-manager-url: https://formulae.brew.sh/formula/millet
version: 0.15.1
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Language server for Standard ML (SML)
source-archive: https://github.com/azdavis/millet/archive/refs/tags/v0.15.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: millet-ls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:millet
  brew: brew install millet
  nix: nix profile install nixpkgs#millet
provenance:
  formula: millet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
