id: brew:diffr
display-name: diffr
homepage: https://github.com/mookid/diffr
repo: https://github.com/mookid/diffr
docs: https://github.com/mookid/diffr
package-manager:
  brew: diffr
  debian: diffr
  macports: diffr
  nix: diffr
  ubuntu: diffr
package-manager-url: https://formulae.brew.sh/formula/diffr
version: 0.1.5
license: MIT
category: development
tags:
  - cli
description: LCS based diff highlighting tool to ease code review from your terminal
source-archive: https://github.com/mookid/diffr/archive/refs/tags/v0.1.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: diffr
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:diffr
  brew: brew install diffr
  debian: sudo apt install diffr
  macports: sudo port install diffr
  nix: nix profile install nixpkgs#diffr
  ubuntu: sudo apt install diffr
provenance:
  formula: diffr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
