id: brew:midnight-commander
display-name: midnight-commander
homepage: https://www.midnight-commander.org/
repo: https://ftp.osuosl.org/pub/midnightcommander/mc-4.8.33.tar.xz
docs: https://www.midnight-commander.org/
package-manager:
  apk: mc
  brew: midnight-commander
  chocolatey: mc
  debian: mc
  dnf: mc
  macports: mc
  nix: mc
  pacman: mc
  scoop: extras/mc
  ubuntu: mc
  winget: GNU.MidnightCommander
  zypper: mc
package-manager-url: https://formulae.brew.sh/formula/midnight-commander
version: 4.8.33
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Terminal-based visual file manager
source-archive: https://ftp.osuosl.org/pub/midnightcommander/mc-4.8.33.tar.xz
dependencies:
  - diffutils
  - gettext
  - glib
  - libssh2
  - openssl@3
  - s-lang
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mc
  - exposure: global executable
    kind: cli
    name: mcdiff
  - exposure: global executable
    kind: cli
    name: mcedit
  - exposure: global executable
    kind: cli
    name: mcview
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mc
  av: sudo av install brew:midnight-commander
  brew: brew install midnight-commander
  chocolatey: choco install mc
  debian: sudo apt install mc
  dnf: sudo dnf install mc
  macports: sudo port install mc
  nix: nix profile install nixpkgs#mc
  pacman: sudo pacman -S mc
  scoop: scoop install extras/mc
  ubuntu: sudo apt install mc
  winget: winget install --id GNU.MidnightCommander -e
  zypper: sudo zypper install mc
provenance:
  formula: midnight-commander
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
