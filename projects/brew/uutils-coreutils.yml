bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Commands have been installed with the prefix "uu-". If you need to use these
    commands with their normal names, you can add a "uubin" directory to your PATH from
    your bashrc like: PATH="$HOMEBREW_PREFIX/opt/uutils-coreutils/libexec/uubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add uutils-coreutils
  av: sudo av install brew:uutils-coreutils
  brew: brew install uutils-coreutils
  dnf: sudo dnf install uutils-coreutils
  nix: nix profile install nixpkgs#uutils-coreutils
  pacman: sudo pacman -S uutils-coreutils
  scoop: scoop install main/uutils-coreutils
  winget: winget install --id uutils.coreutils -e
provenance:
  formula: uutils-coreutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
