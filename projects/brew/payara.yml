id: brew:payara
display-name: payara
homepage: https://www.payara.fish
repo: >
  https://search.maven.org/remotecontent?filepath=fish/payara/distributions/payara/7.2026.5/payara-7.2026.5.zip
docs: https://www.payara.fish
package-manager:
  brew: payara
package-manager-url: https://formulae.brew.sh/formula/payara
version: 7.2026.5
license: CDDL-1.1 OR (GPL-2.0-only WITH Classpath-exception-2.0)
category: network
tags:
  - cli
description: Java EE application server forked from GlassFish
source-archive: >
  https://search.maven.org/remotecontent?filepath=fish/payara/distributions/payara/7.2026.5/payara-7.2026.5.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: letsencrypt.py
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You may want to add the following to your .bash_profile: export
    GLASSFISH_HOME=$HOMEBREW_PREFIX/opt/payara/libexec/glassfish export
    PATH=${PATH}:${GLASSFISH_HOME}/bin
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:payara
  brew: brew install payara
provenance:
  formula: payara
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
