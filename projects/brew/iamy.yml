id: brew:iamy
display-name: iamy
homepage: https://github.com/99designs/iamy
repo: https://github.com/99designs/iamy
docs: https://github.com/99designs/iamy
package-manager:
  brew: iamy
  nix: iamy
package-manager-url: https://formulae.brew.sh/formula/iamy
version: 2.4.0
license: MIT
category: cloud
tags:
  - aws
  - cli
description: AWS IAM import and export tool
source-archive: https://github.com/99designs/iamy/archive/refs/tags/v2.4.0.tar.gz
dependencies:
  - awscli
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: iamy
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:iamy
  brew: brew install iamy
  nix: nix profile install nixpkgs#iamy
provenance:
  formula: iamy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
