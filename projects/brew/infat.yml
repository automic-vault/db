id: brew:infat
display-name: infat
homepage: https://github.com/philocalyst/infat
repo: https://github.com/philocalyst/infat
docs: https://github.com/philocalyst/infat
package-manager:
  brew: infat
  nix: infat
package-manager-url: https://formulae.brew.sh/formula/infat
version: 3.1.2
license: BlueOak-1.0.0
category: development
tags:
  - cli
description: Tool to set default openers for file formats and url schemes on macOS
source-archive: https://github.com/philocalyst/infat/archive/refs/tags/v3.1.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: infat
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:infat
  brew: brew install infat
  nix: nix profile install nixpkgs#infat
provenance:
  formula: infat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
