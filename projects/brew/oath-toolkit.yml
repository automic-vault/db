id: brew:oath-toolkit
display-name: oath-toolkit
homepage: https://www.nongnu.org/oath-toolkit/
repo: >
  https://download-mirror.savannah.gnu.org/releases/oath-toolkit/oath-toolkit-2.6.14.tar.gz
docs: https://www.nongnu.org/oath-toolkit/
package-manager:
  apk: oath-toolkit
  brew: oath-toolkit
  debian: oathtool
  dnf: oathtool
  macports: oath-toolkit
  nix: oath-toolkit
  pacman: oath-toolkit
  ubuntu: oathtool
  zypper: oath-toolkit
package-manager-url: https://formulae.brew.sh/formula/oath-toolkit
version: 2.6.14
license: GPL-3.0-or-later AND LGPL-2.1-or-later
category: security
tags:
  - cli
description: Tools for one-time password authentication systems
source-archive: >
  https://download-mirror.savannah.gnu.org/releases/oath-toolkit/oath-toolkit-2.6.14.tar.gz
dependencies:
  - libxml2
  - libxmlsec1
  - openssl@3
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: oathtool
  - exposure: global executable
    kind: cli
    name: pskctool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add oath-toolkit
  av: sudo av install brew:oath-toolkit
  brew: brew install oath-toolkit
  debian: sudo apt install oathtool
  dnf: sudo dnf install oathtool
  macports: sudo port install oath-toolkit
  nix: nix profile install nixpkgs#oath-toolkit
  pacman: sudo pacman -S oath-toolkit
  ubuntu: sudo apt install oathtool
  zypper: sudo zypper install oath-toolkit
provenance:
  formula: oath-toolkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
