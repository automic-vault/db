id: brew:crates-tui
display-name: crates-tui
homepage: https://github.com/ratatui/crates-tui
repo: https://github.com/ratatui/crates-tui
docs: https://github.com/ratatui/crates-tui
package-manager:
  brew: crates-tui
  nix: crates-tui
package-manager-url: https://formulae.brew.sh/formula/crates-tui
version: 0.1.25
license: MIT
category: development
tags:
  - cli
description: TUI for exploring crates.io using Ratatui
source-archive: https://github.com/ratatui/crates-tui/archive/refs/tags/v0.1.25.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: crates-tui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:crates-tui
  brew: brew install crates-tui
  nix: nix profile install nixpkgs#crates-tui
provenance:
  formula: crates-tui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
