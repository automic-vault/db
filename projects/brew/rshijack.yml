id: brew:rshijack
display-name: rshijack
homepage: https://github.com/kpcyrd/rshijack
repo: https://github.com/kpcyrd/rshijack
docs: https://github.com/kpcyrd/rshijack
package-manager:
  apk: rshijack
  brew: rshijack
  nix: rshijack
  pacman: rshijack
package-manager-url: https://formulae.brew.sh/formula/rshijack
version: 0.5.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: TCP connection hijacker
source-archive: https://github.com/kpcyrd/rshijack/archive/refs/tags/v0.5.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rshijack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
