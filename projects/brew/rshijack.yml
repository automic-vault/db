    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rshijack
  av: sudo av install brew:rshijack
  brew: brew install rshijack
  nix: nix profile install nixpkgs#rshijack
  pacman: sudo pacman -S rshijack
provenance:
  formula: rshijack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
