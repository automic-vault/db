id: brew:snyk-cli
display-name: snyk-cli
homepage: https://snyk.io
repo: https://registry.npmjs.org/snyk/-/snyk-1.1305.0.tgz
docs: https://snyk.io
package-manager:
  brew: snyk-cli
  nix: snyk
  winget: Snyk.Snyk
package-manager-url: https://formulae.brew.sh/formula/snyk-cli
version: 1.1305.0
license: Apache-2.0
category: security
tags:
  - cli
  - security
description: Scans and monitors projects for security vulnerabilities
source-archive: https://registry.npmjs.org/snyk/-/snyk-1.1305.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: snyk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:snyk-cli
  brew: brew install snyk-cli
  nix: nix profile install nixpkgs#snyk
  winget: winget install --id Snyk.Snyk -e
provenance:
  formula: snyk-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
