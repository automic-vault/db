id: brew:git-svn
display-name: git-svn
homepage: https://git-scm.com
repo: https://mirrors.edge.kernel.org/pub/software/scm/git/git-2.54.0.tar.xz
docs: https://git-scm.com
package-manager:
  apk: git-svn
  brew: git-svn
  debian: git-svn
  dnf: git-svn
  ubuntu: git-svn
  zypper: git-svn
package-manager-url: https://formulae.brew.sh/formula/git-svn
version: 2.54.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
  - git
description: Bidirectional operation between a Subversion repository and Git
source-archive: https://mirrors.edge.kernel.org/pub/software/scm/git/git-2.54.0.tar.xz
dependencies:
  - git
  - subversion
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: git-svn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-svn
  av: sudo av install brew:git-svn
  brew: brew install git-svn
  debian: sudo apt install git-svn
  dnf: sudo dnf install git-svn
  ubuntu: sudo apt install git-svn
  zypper: sudo zypper install git-svn
provenance:
  formula: git-svn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
