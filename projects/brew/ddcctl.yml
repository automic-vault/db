id: brew:ddcctl
display-name: ddcctl
homepage: https://github.com/kfix/ddcctl
repo: https://github.com/kfix/ddcctl
docs: https://github.com/kfix/ddcctl
package-manager:
  brew: ddcctl
  macports: ddcctl
package-manager-url: https://formulae.brew.sh/formula/ddcctl
version: 1
license: GPL-3.0-only
category: development
tags:
  - cli
description: DDC monitor controls (brightness) for Mac OSX command-line
source-archive: https://github.com/kfix/ddcctl/archive/refs/tags/v1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ddcctl
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ddcctl
  brew: brew install ddcctl
  macports: sudo port install ddcctl
provenance:
  formula: ddcctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
