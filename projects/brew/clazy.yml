id: brew:clazy
display-name: clazy
homepage: https://www.kdab.com/
repo: https://invent.kde.org/sdk/clazy/-/archive/v1.17.1/clazy-v1.17.1.tar.gz
docs: https://www.kdab.com/
package-manager:
  apk: clazy
  brew: clazy
  debian: clazy
  dnf: clazy
  nix: clazy
  pacman: clazy
  ubuntu: clazy
  zypper: clazy
package-manager-url: https://formulae.brew.sh/formula/clazy
version: 1.17.1
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: Qt oriented static code analyzer
source-archive: https://invent.kde.org/sdk/clazy/-/archive/v1.17.1/clazy-v1.17.1.tar.gz
dependencies:
  - coreutils
  - llvm
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: clazy
  - exposure: global executable
    kind: cli
    name: clazy-standalone
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add clazy
  av: sudo av install brew:clazy
  brew: brew install clazy
  debian: sudo apt install clazy
  dnf: sudo dnf install clazy
  nix: nix profile install nixpkgs#clazy
  pacman: sudo pacman -S clazy
  ubuntu: sudo apt install clazy
  zypper: sudo zypper install clazy
provenance:
  formula: clazy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
