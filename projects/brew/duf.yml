id: brew:duf
display-name: duf
homepage: https://github.com/muesli/duf
repo: https://github.com/muesli/duf
docs: https://github.com/muesli/duf
package-manager:
  apk: duf
  brew: duf
  debian: duf
  dnf: duf
  macports: duf
  nix: duf
  pacman: duf
  scoop: main/duf
  ubuntu: duf
  winget: muesli.duf
  zypper: duf
package-manager-url: https://formulae.brew.sh/formula/duf
version: 0.9.1
license: MIT
category: development
tags:
  - cli
description: Disk Usage/Free Utility - a better 'df' alternative
source-archive: https://github.com/muesli/duf/archive/refs/tags/v0.9.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: duf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add duf
  av: sudo av install brew:duf
  brew: brew install duf
  debian: sudo apt install duf
  dnf: sudo dnf install duf
  macports: sudo port install duf
  nix: nix profile install nixpkgs#duf
  pacman: sudo pacman -S duf
  scoop: scoop install main/duf
  ubuntu: sudo apt install duf
  winget: winget install --id muesli.duf -e
  zypper: sudo zypper install duf
provenance:
  formula: duf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
