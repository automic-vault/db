id: brew:tmux
display-name: tmux
homepage: https://tmux.github.io/
repo: https://github.com/tmux/tmux
docs: https://tmux.github.io/
package-manager:
  apk: tmux
  brew: tmux
  debian: tmux
  dnf: tmux
  macports: tmux
  nix: tmux
  pacman: tmux
  ubuntu: tmux
  zypper: tmux
package-manager-url: https://formulae.brew.sh/formula/tmux
version: 3.6b
license: ISC
category: development
tags:
  - cli
description: Terminal multiplexer
source-archive: https://github.com/tmux/tmux/releases/download/3.6b/tmux-3.6b.tar.gz
dependencies:
  - libevent
  - ncurses
  - utf8proc
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: tmux
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Example configuration has been installed to: $HOMEBREW_PREFIX/opt/tmux/share/tmux'
  post-install-defined: false
install-lines:
  apk: sudo apk add tmux
  av: sudo av install brew:tmux
  brew: brew install tmux
  debian: sudo apt install tmux
  dnf: sudo dnf install tmux
  macports: sudo port install tmux
  nix: nix profile install nixpkgs#tmux
  pacman: sudo pacman -S tmux
  ubuntu: sudo apt install tmux
  zypper: sudo zypper install tmux
provenance:
  formula: tmux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
