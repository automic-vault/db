id: brew:telnet
display-name: telnet
homepage: https://opensource.apple.com/
repo: https://github.com/apple-oss-distributions/remote_cmds
docs: https://opensource.apple.com/
package-manager:
  brew: telnet
  chocolatey: telnet
  debian: telnet
  dnf: telnet
  scoop: main/telnet
  ubuntu: telnet
  zypper: telnet
package-manager-url: https://formulae.brew.sh/formula/telnet
version: 308
license: BSD-4-Clause-UC AND APSL-1.0
category: development
tags:
  - cli
description: User interface to the TELNET protocol
source-archive: >
  https://github.com/apple-oss-distributions/remote_cmds/archive/refs/tags/remote_cmds-308.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: telnet
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:telnet
  brew: brew install telnet
  chocolatey: choco install telnet
  debian: sudo apt install telnet
  dnf: sudo dnf install telnet
  scoop: scoop install main/telnet
  ubuntu: sudo apt install telnet
  zypper: sudo zypper install telnet
provenance:
  formula: telnet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
