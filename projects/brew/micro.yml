id: brew:micro
display-name: micro
homepage: https://github.com/zyedidia/micro
repo: https://github.com/zyedidia/micro
docs: https://github.com/zyedidia/micro
package-manager:
  apk: micro
  brew: micro
  chocolatey: micro
  debian: micro
  dnf: micro
  macports: micro
  nix: micro
  pacman: micro
  scoop: main/micro
  ubuntu: micro
  winget: zyedidia.micro
package-manager-url: https://formulae.brew.sh/formula/micro
version: 2.0.15
license: MIT
category: development
tags:
  - cli
description: Modern and intuitive terminal-based text editor
source-archive: https://github.com/zyedidia/micro.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: micro
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add micro
  av: sudo av install brew:micro
  brew: brew install micro
  chocolatey: choco install micro
  debian: sudo apt install micro
  dnf: sudo dnf install micro
  macports: sudo port install micro
  nix: nix profile install nixpkgs#micro
  pacman: sudo pacman -S micro
  scoop: scoop install main/micro
  ubuntu: sudo apt install micro
  winget: winget install --id zyedidia.micro -e
provenance:
  formula: micro
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
