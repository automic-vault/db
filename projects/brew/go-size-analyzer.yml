id: brew:go-size-analyzer
display-name: go-size-analyzer
homepage: https://github.com/Zxilly/go-size-analyzer
repo: https://github.com/Zxilly/go-size-analyzer
docs: https://github.com/Zxilly/go-size-analyzer
package-manager:
  apk: gsa
  brew: go-size-analyzer
  scoop: main/go-size-analyzer
package-manager-url: https://formulae.brew.sh/formula/go-size-analyzer
version: 1.13.0
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Analyzing the dependencies in compiled Golang binaries
source-archive: https://github.com/Zxilly/go-size-analyzer/archive/refs/tags/v1.13.0.tar.gz
build-dependencies:
  - go
  - node
  - pnpm
executables:
  - exposure: global executable
    kind: cli
    name: gsa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gsa
  av: sudo av install brew:go-size-analyzer
  brew: brew install go-size-analyzer
  scoop: scoop install main/go-size-analyzer
provenance:
  formula: go-size-analyzer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
