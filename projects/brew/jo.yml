id: brew:jo
display-name: jo
homepage: https://github.com/jpmens/jo
repo: https://github.com/jpmens/jo
docs: https://github.com/jpmens/jo
package-manager:
  apk: jo
  brew: jo
  debian: jo
  dnf: jo
  macports: jo
  nix: jo
  pacman: jo
  scoop: main/jo
  ubuntu: jo
  winget: jpmens.jo
  zypper: jo
package-manager-url: https://formulae.brew.sh/formula/jo
version: 1.9
license: GPL-2.0-or-later AND MIT
category: development
tags:
  - cli
  - json
description: JSON output from a shell
source-archive: https://github.com/jpmens/jo/releases/download/1.9/jo-1.9.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: jo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jo
  av: sudo av install brew:jo
  brew: brew install jo
  debian: sudo apt install jo
  dnf: sudo dnf install jo
  macports: sudo port install jo
  nix: nix profile install nixpkgs#jo
  pacman: sudo pacman -S jo
  scoop: scoop install main/jo
  ubuntu: sudo apt install jo
  winget: winget install --id jpmens.jo -e
  zypper: sudo zypper install jo
provenance:
  formula: jo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
