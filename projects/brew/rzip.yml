id: brew:rzip
display-name: rzip
homepage: https://rzip.samba.org/
repo: https://rzip.samba.org/ftp/rzip/rzip-2.1.tar.gz
docs: https://rzip.samba.org/
package-manager:
  brew: rzip
  debian: rzip
  dnf: rzip
  macports: rzip
  nix: rzip
  ubuntu: rzip
  zypper: rzip
package-manager-url: https://formulae.brew.sh/formula/rzip
version: 2.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: File compression tool (like gzip or bzip2)
source-archive: https://rzip.samba.org/ftp/rzip/rzip-2.1.tar.gz
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: runzip
  - exposure: global executable
    kind: cli
    name: rzip
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rzip
  brew: brew install rzip
  debian: sudo apt install rzip
  dnf: sudo dnf install rzip
  macports: sudo port install rzip
  nix: nix profile install nixpkgs#rzip
  ubuntu: sudo apt install rzip
  zypper: sudo zypper install rzip
provenance:
  formula: rzip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
