id: brew:cloudprober
display-name: cloudprober
homepage: https://cloudprober.org
repo: https://github.com/cloudprober/cloudprober
docs: https://cloudprober.org
package-manager:
  brew: cloudprober
  nix: cloudprober
package-manager-url: https://formulae.brew.sh/formula/cloudprober
version: 0.14.3
license: Apache-2.0
category: cloud
tags:
  - cli
description: Active monitoring software to detect failures before your customers do
source-archive: https://github.com/cloudprober/cloudprober/archive/refs/tags/v0.14.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cloudprober
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloudprober
  brew: brew install cloudprober
  nix: nix profile install nixpkgs#cloudprober
provenance:
  formula: cloudprober
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
