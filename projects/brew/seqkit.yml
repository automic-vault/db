id: brew:seqkit
display-name: seqkit
homepage: https://bioinf.shenwei.me/seqkit
repo: https://github.com/shenwei356/seqkit
docs: https://bioinf.shenwei.me/seqkit
package-manager:
  brew: seqkit
  debian: seqkit
  nix: seqkit
  ubuntu: seqkit
package-manager-url: https://formulae.brew.sh/formula/seqkit
version: 2.13.0
license: MIT
category: development
tags:
  - cli
description: Cross-platform and ultrafast toolkit for FASTA/Q file manipulation in Golang
source-archive: https://github.com/shenwei356/seqkit/archive/refs/tags/v2.13.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: seqkit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:seqkit
  brew: brew install seqkit
  debian: sudo apt install seqkit
  nix: nix profile install nixpkgs#seqkit
  ubuntu: sudo apt install seqkit
provenance:
  formula: seqkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
