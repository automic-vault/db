id: brew:libaacs
display-name: libaacs
homepage: https://www.videolan.org/developers/libaacs.html
repo: https://get.videolan.org/libaacs/0.11.1/libaacs-0.11.1.tar.bz2
docs: https://www.videolan.org/developers/libaacs.html
package-manager:
  apk: libaacs
  brew: libaacs
  macports: libaacs
  nix: libaacs
  pacman: libaacs
package-manager-url: https://formulae.brew.sh/formula/libaacs
version: 0.11.1
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Implements the Advanced Access Content System specification
source-archive: https://get.videolan.org/libaacs/0.11.1/libaacs-0.11.1.tar.bz2
dependencies:
  - libgcrypt
  - libgpg-error
build-dependencies:
  - bison
executables:
  - exposure: global executable
    kind: cli
    name: aacs_info
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libaacs
  av: sudo av install brew:libaacs
  brew: brew install libaacs
  macports: sudo port install libaacs
  nix: nix profile install nixpkgs#libaacs
  pacman: sudo pacman -S libaacs
provenance:
  formula: libaacs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
