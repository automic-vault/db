id: brew:coccinelle
display-name: coccinelle
homepage: https://coccinelle.gitlabpages.inria.fr/website/
repo: https://coccinelle.gitlabpages.inria.fr/website/distrib/coccinelle-1.3.1.tar.gz
docs: https://coccinelle.gitlabpages.inria.fr/website/
package-manager:
  apk: coccinelle
  brew: coccinelle
  debian: coccinelle
  dnf: coccinelle
  macports: coccinelle
  nix: coccinelle
  ubuntu: coccinelle
  zypper: coccinelle
package-manager-url: https://formulae.brew.sh/formula/coccinelle
version: 1.3.1
license: GPL-2.0-only
category: development
tags:
  - cli
description: Program matching and transformation engine for C code
source-archive: https://coccinelle.gitlabpages.inria.fr/website/distrib/coccinelle-1.3.1.tar.gz
build-dependencies:
  - autoconf
  - automake
  - menhir
  - ocaml
  - ocaml-findlib
executables:
  - exposure: global executable
    kind: cli
    name: spatch
  - exposure: global executable
    kind: cli
    name: spgen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add coccinelle
  av: sudo av install brew:coccinelle
  brew: brew install coccinelle
  debian: sudo apt install coccinelle
  dnf: sudo dnf install coccinelle
  macports: sudo port install coccinelle
  nix: nix profile install nixpkgs#coccinelle
  ubuntu: sudo apt install coccinelle
  zypper: sudo zypper install coccinelle
provenance:
  formula: coccinelle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
