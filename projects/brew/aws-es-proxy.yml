id: brew:aws-es-proxy
display-name: aws-es-proxy
homepage: https://github.com/abutaha/aws-es-proxy
repo: https://github.com/abutaha/aws-es-proxy
docs: https://github.com/abutaha/aws-es-proxy
package-manager:
  brew: aws-es-proxy
package-manager-url: https://formulae.brew.sh/formula/aws-es-proxy
version: 1.5
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: Small proxy between HTTP client and AWS Elasticsearch
source-archive: https://github.com/abutaha/aws-es-proxy/archive/refs/tags/v1.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aws-es-proxy
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Before you can use these tools you must export some variables to your $SHELL. export
    AWS_ACCESS_KEY="<Your AWS Access ID>" export AWS_SECRET_KEY="<Your AWS Secret Key>"
    export AWS_CREDENTIAL_FILE="<Path to the credentials file>"
  post-install-defined: false
install-lines:
  av: sudo av install brew:aws-es-proxy
  brew: brew install aws-es-proxy
provenance:
  formula: aws-es-proxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
