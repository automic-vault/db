id: brew:lerna
display-name: lerna
homepage: https://lerna.js.org
repo: https://registry.npmjs.org/lerna/-/lerna-9.0.7.tgz
docs: https://lerna.js.org
package-manager:
  brew: lerna
  nix: lerna
package-manager-url: https://formulae.brew.sh/formula/lerna
version: 9.0.7
license: MIT
category: network
tags:
  - cli
description: Tool for managing JavaScript projects with multiple packages
source-archive: https://registry.npmjs.org/lerna/-/lerna-9.0.7.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: lerna
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lerna
  brew: brew install lerna
  nix: nix profile install nixpkgs#lerna
provenance:
  formula: lerna
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
