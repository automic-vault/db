id: brew:repo
display-name: repo
homepage: https://source.android.com/source/developing.html
repo: https://gerrit.googlesource.com/git-repo
docs: https://source.android.com/source/developing.html
package-manager:
  apk: repo
  brew: repo
  debian: repo
  dnf: repo
  macports: repo
  pacman: repo
  ubuntu: repo
package-manager-url: https://formulae.brew.sh/formula/repo
version: 2.64
license: Apache-2.0
category: development
tags:
  - cli
description: Repository tool for Android development
source-archive: https://gerrit.googlesource.com/git-repo.git
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: repo
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add repo
  av: sudo av install brew:repo
  brew: brew install repo
  debian: sudo apt install repo
  dnf: sudo dnf install repo
  macports: sudo port install repo
  pacman: sudo pacman -S repo
  ubuntu: sudo apt install repo
provenance:
  formula: repo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
