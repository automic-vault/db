id: brew:jot
display-name: jot
homepage: https://github.com/shashwatah/jot
repo: https://github.com/shashwatah/jot
docs: https://github.com/shashwatah/jot
package-manager:
  brew: jot
  macports: jot
  nix: jot
package-manager-url: https://formulae.brew.sh/formula/jot
version: 0.1.2
license: MIT
category: development
tags:
  - cli
description: Rapid note management for the terminal
source-archive: https://github.com/shashwatah/jot/archive/refs/tags/v0.1.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: jt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jot
  brew: brew install jot
  macports: sudo port install jot
  nix: nix profile install nixpkgs#jot
provenance:
  formula: jot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
