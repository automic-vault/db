id: brew:swift-sh
display-name: swift-sh
homepage: https://github.com/mxcl/swift-sh
repo: https://github.com/mxcl/swift-sh
docs: https://github.com/mxcl/swift-sh
package-manager:
  brew: swift-sh
package-manager-url: https://formulae.brew.sh/formula/swift-sh
version: 2.5.0
license: Unlicense
category: development
tags:
  - cli
description: Scripting with easy zero-conf dependency imports
source-archive: https://github.com/mxcl/swift-sh/archive/refs/tags/2.5.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: swift-sh
  - exposure: global executable
    kind: cli
    name: swift-sh-edit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swift-sh
  brew: brew install swift-sh
provenance:
  formula: swift-sh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
