id: brew:terminator
display-name: terminator
homepage: https://gnome-terminator.org
repo: https://github.com/gnome-terminator/terminator
docs: https://gnome-terminator.org
package-manager:
  apk: terminator
  brew: terminator
  debian: terminator
  dnf: terminator
  macports: terminator
  nix: terminator
  pacman: terminator
  ubuntu: terminator
  zypper: terminator
package-manager-url: https://formulae.brew.sh/formula/terminator
version: 2.1.5
license: GPL-2.0-only
category: development
tags:
  - cli
description: Multiple GNOME terminals in one window
source-archive: https://github.com/gnome-terminator/terminator/archive/refs/tags/v2.1.5.tar.gz
dependencies:
  - pygobject3
  - python@3.14
  - vte3
executables:
  - exposure: global executable
    kind: cli
    name: remotinator
  - exposure: global executable
    kind: cli
    name: terminator
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add terminator
  av: sudo av install brew:terminator
  brew: brew install terminator
  debian: sudo apt install terminator
  dnf: sudo dnf install terminator
  macports: sudo port install terminator
  nix: nix profile install nixpkgs#terminator
  pacman: sudo pacman -S terminator
  ubuntu: sudo apt install terminator
  zypper: sudo zypper install terminator
provenance:
  formula: terminator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
