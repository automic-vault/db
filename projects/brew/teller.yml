id: brew:teller
display-name: teller
homepage: https://github.com/tellerops/teller
repo: https://github.com/tellerops/teller
docs: https://github.com/tellerops/teller
package-manager:
  brew: teller
  nix: teller
package-manager-url: https://formulae.brew.sh/formula/teller
version: 2.0.7
license: Apache-2.0
category: security
tags:
  - cli
description: Secrets management tool for developers
source-archive: https://github.com/tellerops/teller/archive/refs/tags/v2.0.7.tar.gz
build-dependencies:
  - pkgconf
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: teller
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:teller
  brew: brew install teller
  nix: nix profile install nixpkgs#teller
provenance:
  formula: teller
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
