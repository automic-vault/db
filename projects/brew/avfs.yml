id: brew:avfs
display-name: avfs
homepage: https://avf.sourceforge.net/
repo: https://downloads.sourceforge.net/project/avf/avfs/1.3.0/avfs-1.3.0.tar.bz2
docs: https://avf.sourceforge.net/
package-manager:
  apk: avfs
  brew: avfs
  debian: avfs
  nix: avfs
  pacman: avfs
  ubuntu: avfs
  zypper: avfs
package-manager-url: https://formulae.brew.sh/formula/avfs
version: 1.3.0
license: GPL-2.0-only AND LGPL-2.0-only AND GPL-2.0-or-later AND Zlib
category: network
tags:
  - cli
description: Virtual file system that facilitates looking inside archives
source-archive: https://downloads.sourceforge.net/project/avf/avfs/1.3.0/avfs-1.3.0.tar.bz2
dependencies:
  - bzip2
  - libfuse
  - xz
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: avfs-config
  - exposure: global executable
    kind: cli
    name: avfsd
  - exposure: global executable
    kind: cli
    name: davpass
  - exposure: global executable
    kind: cli
    name: ftppass
  - exposure: global executable
    kind: cli
    name: mountavfs
  - exposure: global executable
    kind: cli
    name: umountavfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add avfs
  av: sudo av install brew:avfs
  brew: brew install avfs
  debian: sudo apt install avfs
  nix: nix profile install nixpkgs#avfs
  pacman: sudo pacman -S avfs
  ubuntu: sudo apt install avfs
  zypper: sudo zypper install avfs
provenance:
  formula: avfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
