id: brew:wishlist
display-name: wishlist
homepage: https://github.com/charmbracelet/wishlist
repo: https://github.com/charmbracelet/wishlist
docs: https://github.com/charmbracelet/wishlist
package-manager:
  brew: wishlist
  nix: wishlist
  pacman: wishlist
  winget: charmbracelet.wishlist
package-manager-url: https://formulae.brew.sh/formula/wishlist
version: 0.15.2
license: MIT
category: development
tags:
  - cli
description: Single entrypoint for multiple SSH endpoints
source-archive: https://github.com/charmbracelet/wishlist/archive/refs/tags/v0.15.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wishlist
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wishlist
  brew: brew install wishlist
  nix: nix profile install nixpkgs#wishlist
  pacman: sudo pacman -S wishlist
  winget: winget install --id charmbracelet.wishlist -e
provenance:
  formula: wishlist
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
