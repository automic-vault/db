id: brew:ircii
display-name: ircii
homepage: http://www.eterna23.net/ircii/
repo: https://ircii.warped.com/ircii-20260115.tar.bz2
docs: http://www.eterna23.net/ircii/
package-manager:
  apk: ircii
  brew: ircii
  debian: ircii
  macports: ircii
