id: brew:go-blueprint
display-name: go-blueprint
homepage: https://docs.go-blueprint.dev/
repo: https://github.com/Melkeydev/go-blueprint
docs: https://docs.go-blueprint.dev/
package-manager:
  brew: go-blueprint
  nix: go-blueprint
package-manager-url: https://formulae.brew.sh/formula/go-blueprint
version: 0.10.11
license: MIT
category: development
tags:
  - cli
description: CLI to streamline Go project setup with standardized structure
source-archive: https://github.com/Melkeydev/go-blueprint/archive/refs/tags/v0.10.11.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: go-blueprint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:go-blueprint
  brew: brew install go-blueprint
  nix: nix profile install nixpkgs#go-blueprint
provenance:
  formula: go-blueprint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
