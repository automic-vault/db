id: brew:qcachegrind
display-name: qcachegrind
homepage: https://apps.kde.org/kcachegrind/
repo: https://download.kde.org/stable/release-service/26.04.1/src/kcachegrind-26.04.1.tar.xz
docs: https://apps.kde.org/kcachegrind/
package-manager:
  brew: qcachegrind
  dnf: qcachegrind
  macports: qcachegrind
  pacman: qcachegrind
package-manager-url: https://formulae.brew.sh/formula/qcachegrind
version: 26.04.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Visualize data generated by Cachegrind and Calltree
source-archive: https://download.kde.org/stable/release-service/26.04.1/src/kcachegrind-26.04.1.tar.xz
dependencies:
  - graphviz
  - qtbase
executables:
  - exposure: global executable
    kind: cli
    name: qcachegrind
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qcachegrind
  brew: brew install qcachegrind
  dnf: sudo dnf install qcachegrind
  macports: sudo port install qcachegrind
  pacman: sudo pacman -S qcachegrind
provenance:
  formula: qcachegrind
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
