id: brew:zyre
display-name: zyre
homepage: https://github.com/zeromq/zyre
repo: https://github.com/zeromq/zyre
docs: https://github.com/zeromq/zyre
package-manager:
  brew: zyre
package-manager-url: https://formulae.brew.sh/formula/zyre
version: 2.0.1
license: MPL-2.0
category: development
tags:
  - cli
description: Local Area Clustering for Peer-to-Peer Applications
source-archive: https://github.com/zeromq/zyre/releases/download/v2.0.1/zyre-2.0.1.tar.gz
dependencies:
  - czmq
  - zeromq
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: zpinger
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zyre
  brew: brew install zyre
provenance:
  formula: zyre
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
