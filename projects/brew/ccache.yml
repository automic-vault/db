id: brew:ccache
display-name: ccache
homepage: https://ccache.dev/
repo: https://github.com/ccache/ccache
docs: https://ccache.dev/
package-manager:
  apk: ccache
  brew: ccache
  chocolatey: ccache
  debian: ccache
  dnf: ccache
  macports: ccache
  nix: ccache
  pacman: ccache
  scoop: main/ccache
  ubuntu: ccache
  winget: Ccache.Ccache
  zypper: ccache
package-manager-url: https://formulae.brew.sh/formula/ccache
version: 4.13.6
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Object-file caching compiler wrapper
source-archive: https://github.com/ccache/ccache/releases/download/v4.13.6/ccache-4.13.6.tar.xz
dependencies:
  - blake3
  - fmt
  - hiredis
  - openssl@3
  - xxhash
  - zstd
build-dependencies:
  - asciidoctor
  - cmake
  - cpp-httplib
  - doctest
  - pkgconf
  - span-lite
  - tl-expected
executables:
  - exposure: global executable
    kind: cli
    name: ccache
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To install symlinks for compilers that will automatically use ccache, prepend this
    directory to your PATH: $HOMEBREW_PREFIX/opt/ccache/libexec If this is an upgrade
    and you have previously added the symlinks to your PATH, you may need to modify it
    to the path specified above so it points to the current version. NOTE: ccache can
    prevent some software from compiling. ALSO NOTE: The brew command, by design, will
    never use ccache.
  post-install-defined: false
install-lines:
  apk: sudo apk add ccache
  av: sudo av install brew:ccache
  brew: brew install ccache
  chocolatey: choco install ccache
  debian: sudo apt install ccache
  dnf: sudo dnf install ccache
  macports: sudo port install ccache
  nix: nix profile install nixpkgs#ccache
  pacman: sudo pacman -S ccache
  scoop: scoop install main/ccache
  ubuntu: sudo apt install ccache
  winget: winget install --id Ccache.Ccache -e
  zypper: sudo zypper install ccache
provenance:
  formula: ccache
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
