id: brew:freesasa
display-name: freesasa
homepage: https://freesasa.github.io/
repo: https://github.com/mittinatten/freesasa
docs: https://freesasa.github.io/
package-manager:
  brew: freesasa
  debian: freesasa
  nix: freesasa
  ubuntu: freesasa
package-manager-url: https://formulae.brew.sh/formula/freesasa
version: 2.1.3
license: MIT
category: development
tags:
  - cli
description: Solvent Accessible Surface Area calculations
source-archive: https://github.com/mittinatten/freesasa/archive/refs/tags/2.1.3.tar.gz
dependencies:
  - json-c
build-dependencies:
  - autoconf
  - automake
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: freesasa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:freesasa
  brew: brew install freesasa
  debian: sudo apt install freesasa
  nix: nix profile install nixpkgs#freesasa
  ubuntu: sudo apt install freesasa
provenance:
  formula: freesasa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
