id: brew:lwtools
display-name: lwtools
homepage: https://www.lwtools.ca/
repo: https://www.lwtools.ca/releases/lwtools/lwtools-4.24.tar.gz
docs: https://www.lwtools.ca/
package-manager:
  brew: lwtools
  dnf: lwtools
package-manager-url: https://formulae.brew.sh/formula/lwtools
version: 4.24
license: GPL-3.0-only
category: network
tags:
  - cli
description: Cross-development tools for Motorola 6809 and Hitachi 6309
source-archive: https://www.lwtools.ca/releases/lwtools/lwtools-4.24.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lwar
  - exposure: global executable
    kind: cli
    name: lwasm
  - exposure: global executable
    kind: cli
    name: lwcc-cpp
  - exposure: global executable
    kind: cli
    name: lwlink
  - exposure: global executable
    kind: cli
    name: lwobjdump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lwtools
  brew: brew install lwtools
  dnf: sudo dnf install lwtools
provenance:
  formula: lwtools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
