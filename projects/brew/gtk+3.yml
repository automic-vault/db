id: brew:gtk+3
display-name: gtk+3
homepage: https://gtk.org/
repo: https://download.gnome.org/sources/gtk/3.24/gtk-3.24.52.tar.xz
docs: https://gtk.org/
package-manager:
  apk: gtk-update-icon-cache
  brew: gtk+3
  debian: gtk-update-icon-cache
  dnf: gtk-update-icon-cache
  pacman: gtk-update-icon-cache
  ubuntu: gtk-update-icon-cache
package-manager-url: https://formulae.brew.sh/formula/gtk+3
version: 3.24.52
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: Toolkit for creating graphical user interfaces
source-archive: https://download.gnome.org/sources/gtk/3.24/gtk-3.24.52.tar.xz
dependencies:
  - at-spi2-core
  - cairo
  - fribidi
  - gdk-pixbuf
  - gettext
  - glib
  - gsettings-desktop-schemas
  - harfbuzz
  - hicolor-icon-theme
  - libepoxy
  - pango
build-dependencies:
  - docbook
  - docbook-xsl
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gtk-builder-tool
  - exposure: global executable
    kind: cli
    name: gtk-encode-symbolic-svg
  - exposure: global executable
    kind: cli
    name: gtk-launch
  - exposure: global executable
    kind: cli
    name: gtk-query-immodules-3.0
  - exposure: global executable
    kind: cli
    name: gtk-query-settings
  - exposure: global executable
    kind: cli
    name: gtk-update-icon-cache
  - exposure: global executable
    kind: cli
    name: gtk3-demo
  - exposure: global executable
    kind: cli
    name: gtk3-demo-application
  - exposure: global executable
    kind: cli
    name: gtk3-icon-browser
  - exposure: global executable
    kind: cli
    name: gtk3-update-icon-cache
  - exposure: global executable
    kind: cli
    name: gtk3-widget-factory
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add gtk-update-icon-cache
  av: sudo av install brew:gtk+3
  brew: brew install gtk+3
  debian: sudo apt install gtk-update-icon-cache
  dnf: sudo dnf install gtk-update-icon-cache
  pacman: sudo pacman -S gtk-update-icon-cache
  ubuntu: sudo apt install gtk-update-icon-cache
provenance:
  formula: gtk+3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
