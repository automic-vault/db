id: brew:rattler-build
display-name: rattler-build
homepage: https://rattler.build
repo: https://github.com/prefix-dev/rattler-build
docs: https://rattler.build
package-manager:
  apk: rattler-build
  brew: rattler-build
  nix: rattler-build
  pacman: rattler-build
package-manager-url: https://formulae.brew.sh/formula/rattler-build
version: 0.65.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Universal conda package builder
source-archive: https://github.com/prefix-dev/rattler-build/archive/refs/tags/v0.65.0.tar.gz
dependencies:
  - openssl@3
  - xz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: patch-apply-gen-test-data
  - exposure: global executable
    kind: cli
    name: rattler-build
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rattler-build
  av: sudo av install brew:rattler-build
  brew: brew install rattler-build
  nix: nix profile install nixpkgs#rattler-build
  pacman: sudo pacman -S rattler-build
provenance:
  formula: rattler-build
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
