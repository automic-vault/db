id: brew:infracost
display-name: infracost
homepage: https://www.infracost.io/docs/
repo: https://github.com/infracost/cli
docs: https://www.infracost.io/docs/
package-manager:
  brew: infracost
  chocolatey: infracost
  macports: infracost
  nix: infracost
  winget: Infracost.Infracost
package-manager-url: https://formulae.brew.sh/formula/infracost
version: 2.1.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Cost estimates for Terraform, Terragrunt, and CloudFormation
source-archive: https://github.com/infracost/cli/archive/refs/tags/v2.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: infracost
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:infracost
  brew: brew install infracost
  chocolatey: choco install infracost
  macports: sudo port install infracost
  nix: nix profile install nixpkgs#infracost
  winget: winget install --id Infracost.Infracost -e
provenance:
  formula: infracost
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
