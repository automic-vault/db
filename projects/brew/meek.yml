id: brew:meek
display-name: meek
homepage: https://www.torproject.org
repo: >
  https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/meek/-/archive/v0.38.0/meek-v0.38.0.tar.gz
docs: https://www.torproject.org
package-manager:
  apk: meek
  brew: meek
  nix: meek
  pacman: meek
package-manager-url: https://formulae.brew.sh/formula/meek
version: 0.38.0
license: CC0-1.0
category: development
tags:
  - cli
description: Blocking-resistant pluggable transport for Tor
source-archive: >
  https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/meek/-/archive/v0.38.0/meek-v0.38.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: meek-client
  - exposure: global executable
    kind: cli
    name: meek-server
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add meek
  av: sudo av install brew:meek
  brew: brew install meek
  nix: nix profile install nixpkgs#meek
  pacman: sudo pacman -S meek
provenance:
  formula: meek
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
