id: brew:yetris
display-name: yetris
homepage: https://github.com/alexdantas/yetris
repo: https://github.com/alexdantas/yetris
docs: https://github.com/alexdantas/yetris
package-manager:
  brew: yetris
  nix: yetris
package-manager-url: https://formulae.brew.sh/formula/yetris
version: 2.3.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Customizable Tetris for the terminal
source-archive: https://github.com/alexdantas/yetris/archive/refs/tags/v2.3.0.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: yetris
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yetris
  brew: brew install yetris
  nix: nix profile install nixpkgs#yetris
provenance:
  formula: yetris
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
