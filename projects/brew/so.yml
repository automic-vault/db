id: brew:so
display-name: so
homepage: https://github.com/samtay/so
repo: https://github.com/samtay/so
docs: https://github.com/samtay/so
package-manager:
  apk: so
  brew: so
  macports: so
  nix: so
  scoop: extras/so
package-manager-url: https://formulae.brew.sh/formula/so
version: 0.4.10
license: MIT
category: development
tags:
  - cli
description: Terminal interface for StackOverflow
source-archive: https://github.com/samtay/so/archive/refs/tags/v0.4.10.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: so
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add so
  av: sudo av install brew:so
  brew: brew install so
  macports: sudo port install so
  nix: nix profile install nixpkgs#so
  scoop: scoop install extras/so
provenance:
  formula: so
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
