id: brew:television
display-name: television
homepage: https://github.com/alexpasmantier/television
repo: https://github.com/alexpasmantier/television
docs: https://github.com/alexpasmantier/television
package-manager:
  brew: television
  macports: tv
  nix: television
  pacman: television
  scoop: extras/television
  winget: alexpasmantier.television
package-manager-url: https://formulae.brew.sh/formula/television
version: 0.15.7
license: MIT
category: development
tags:
  - cli
description: General purpose fuzzy finder TUI
source-archive: https://github.com/alexpasmantier/television/archive/refs/tags/0.15.7.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:television
  brew: brew install television
  macports: sudo port install tv
  nix: nix profile install nixpkgs#television
  pacman: sudo pacman -S television
  scoop: scoop install extras/television
  winget: winget install --id alexpasmantier.television -e
provenance:
  formula: television
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
