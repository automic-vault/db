id: brew:cvsutils
display-name: cvsutils
homepage: https://www.red-bean.com/cvsutils/
repo: https://www.red-bean.com/cvsutils/releases/cvsutils-0.2.6.tar.gz
docs: https://www.red-bean.com/cvsutils/
package-manager:
  brew: cvsutils
  debian: cvsutils
  dnf: cvsutils
  ubuntu: cvsutils
package-manager-url: https://formulae.brew.sh/formula/cvsutils
version: 0.2.6
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: CVS utilities for use in working directories
source-archive: https://www.red-bean.com/cvsutils/releases/cvsutils-0.2.6.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: cvschroot
  - exposure: global executable
    kind: cli
    name: cvsco
  - exposure: global executable
    kind: cli
    name: cvsdiscard
  - exposure: global executable
    kind: cli
    name: cvsdo
  - exposure: global executable
    kind: cli
    name: cvspurge
  - exposure: global executable
    kind: cli
    name: cvstrim
  - exposure: global executable
    kind: cli
    name: cvsu
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cvsutils
  brew: brew install cvsutils
  debian: sudo apt install cvsutils
  dnf: sudo dnf install cvsutils
  ubuntu: sudo apt install cvsutils
provenance:
  formula: cvsutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
