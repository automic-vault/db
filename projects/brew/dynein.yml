id: brew:dynein
display-name: dynein
homepage: https://github.com/awslabs/dynein
repo: https://github.com/awslabs/dynein
docs: https://github.com/awslabs/dynein
package-manager:
  brew: dynein
  nix: dynein
package-manager-url: https://formulae.brew.sh/formula/dynein
version: 0.3.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: DynamoDB CLI
source-archive: https://github.com/awslabs/dynein/archive/refs/tags/v0.3.0.tar.gz
build-dependencies:
  - cmake
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: dy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dynein
  brew: brew install dynein
  nix: nix profile install nixpkgs#dynein
provenance:
  formula: dynein
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
