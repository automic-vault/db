id: brew:clusterctl
display-name: clusterctl
homepage: https://cluster-api.sigs.k8s.io
repo: https://github.com/kubernetes-sigs/cluster-api
docs: https://cluster-api.sigs.k8s.io
package-manager:
  brew: clusterctl
  nix: clusterctl
  winget: Kubernetes.clusterctl
  zypper: clusterctl
package-manager-url: https://formulae.brew.sh/formula/clusterctl
version: 1.13.2
license: Apache-2.0
category: cloud
tags:
  - cli
description: Home for the Cluster Management API work, a subproject of sig-cluster-lifecycle
source-archive: https://github.com/kubernetes-sigs/cluster-api/archive/refs/tags/v1.13.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: clusterctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clusterctl
  brew: brew install clusterctl
  nix: nix profile install nixpkgs#clusterctl
  winget: winget install --id Kubernetes.clusterctl -e
  zypper: sudo zypper install clusterctl
provenance:
  formula: clusterctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
