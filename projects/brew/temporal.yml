id: brew:temporal
display-name: temporal
homepage: https://temporal.io/
repo: https://github.com/temporalio/cli
docs: https://temporal.io/
package-manager:
  brew: temporal
  macports: temporal
  nix: temporal
package-manager-url: https://formulae.brew.sh/formula/temporal
version: 1.7.0
license: MIT
category: development
tags:
  - cli
description: Command-line interface for running and interacting with Temporal Server and UI
source-archive: https://github.com/temporalio/cli/archive/refs/tags/v1.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: temporal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:temporal
  brew: brew install temporal
  macports: sudo port install temporal
  nix: nix profile install nixpkgs#temporal
provenance:
  formula: temporal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
