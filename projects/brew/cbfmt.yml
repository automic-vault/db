id: brew:cbfmt
display-name: cbfmt
homepage: https://github.com/lukas-reineke/cbfmt
repo: https://github.com/lukas-reineke/cbfmt
docs: https://github.com/lukas-reineke/cbfmt
package-manager:
  brew: cbfmt
  nix: cbfmt
package-manager-url: https://formulae.brew.sh/formula/cbfmt
version: 0.2.0
license: MIT
category: development
tags:
  - cli
description: Format codeblocks inside markdown and org documents
source-archive: https://github.com/lukas-reineke/cbfmt/archive/refs/tags/v0.2.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cbfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cbfmt
  brew: brew install cbfmt
  nix: nix profile install nixpkgs#cbfmt
provenance:
  formula: cbfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
