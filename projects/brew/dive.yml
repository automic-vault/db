id: brew:dive
display-name: dive
homepage: https://github.com/wagoodman/dive
repo: https://github.com/wagoodman/dive
docs: https://github.com/wagoodman/dive
package-manager:
  apk: dive
  brew: dive
  macports: dive
  nix: dive
  pacman: dive
  scoop: main/dive
  winget: OpenAgentPlatform.Dive
  zypper: dive
package-manager-url: https://formulae.brew.sh/formula/dive
version: 0.13.1
license: MIT
category: development
tags:
  - cli
  - docker
description: Tool for exploring each layer in a docker image
source-archive: https://github.com/wagoodman/dive/archive/refs/tags/v0.13.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dive
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dive
  av: sudo av install brew:dive
  brew: brew install dive
  macports: sudo port install dive
  nix: nix profile install nixpkgs#dive
  pacman: sudo pacman -S dive
  scoop: scoop install main/dive
  winget: winget install --id OpenAgentPlatform.Dive -e
  zypper: sudo zypper install dive
provenance:
  formula: dive
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
