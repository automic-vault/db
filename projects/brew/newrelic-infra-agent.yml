id: brew:newrelic-infra-agent
display-name: newrelic-infra-agent
homepage: https://github.com/newrelic/infrastructure-agent
repo: https://github.com/newrelic/infrastructure-agent
docs: https://github.com/newrelic/infrastructure-agent
package-manager:
  brew: newrelic-infra-agent
  chocolatey: newrelic-infra
package-manager-url: https://formulae.brew.sh/formula/newrelic-infra-agent
version: 1.76.0
license: Apache-2.0
category: development
tags:
  - cli
description: New Relic infrastructure agent
source-archive: https://github.com/newrelic/infrastructure-agent.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: newrelic-infra
  - exposure: global executable
    kind: cli
    name: newrelic-infra-ctl
  - exposure: global executable
    kind: cli
    name: newrelic-infra-service
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:newrelic-infra-agent
  brew: brew install newrelic-infra-agent
  chocolatey: choco install newrelic-infra
provenance:
  formula: newrelic-infra-agent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
