id: brew:dhcpdump
display-name: dhcpdump
homepage: https://github.com/bbonev/dhcpdump
repo: https://github.com/bbonev/dhcpdump
docs: https://github.com/bbonev/dhcpdump
package-manager:
  brew: dhcpdump
  debian: dhcpdump
  dnf: dhcpdump
  nix: dhcpdump
  ubuntu: dhcpdump
package-manager-url: https://formulae.brew.sh/formula/dhcpdump
version: 1.10
license: BSD-2-Clause
category: development
tags:
  - cli
description: Monitor DHCP traffic for debugging purposes
source-archive: https://github.com/bbonev/dhcpdump/releases/download/v1.10/dhcpdump-1.10.tar.xz
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: dhcpdump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dhcpdump
  brew: brew install dhcpdump
  debian: sudo apt install dhcpdump
  dnf: sudo dnf install dhcpdump
  nix: nix profile install nixpkgs#dhcpdump
  ubuntu: sudo apt install dhcpdump
provenance:
  formula: dhcpdump
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
