id: brew:jcal
display-name: jcal
homepage: https://savannah.nongnu.org/projects/jcal/
repo: https://download.savannah.gnu.org/releases/jcal/jcal-0.6.0.tar.gz
docs: https://savannah.nongnu.org/projects/jcal/
package-manager:
  brew: jcal
  debian: jcal
  dnf: jcal
  nix: jcal
  ubuntu: jcal
package-manager-url: https://formulae.brew.sh/formula/jcal
version: 0.6.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: UNIX-cal-like tool to display Jalali calendar
source-archive: https://download.savannah.gnu.org/releases/jcal/jcal-0.6.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: jcal
  - exposure: global executable
    kind: cli
    name: jdate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jcal
  brew: brew install jcal
  debian: sudo apt install jcal
  dnf: sudo dnf install jcal
  nix: nix profile install nixpkgs#jcal
  ubuntu: sudo apt install jcal
provenance:
  formula: jcal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
