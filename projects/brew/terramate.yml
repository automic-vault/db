id: brew:terramate
display-name: terramate
homepage: https://terramate.io/docs/
repo: https://github.com/terramate-io/terramate
docs: https://terramate.io/docs/
package-manager:
  brew: terramate
  nix: terramate
  winget: Terramate.CLI
package-manager-url: https://formulae.brew.sh/formula/terramate
version: 0.17.1
license: MPL-2.0
category: cloud
tags:
  - cli
description: Managing Terraform stacks with change detections and code generations
source-archive: https://github.com/terramate-io/terramate/archive/refs/tags/v0.17.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terramate-ls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terramate
  brew: brew install terramate
  nix: nix profile install nixpkgs#terramate
  winget: winget install --id Terramate.CLI -e
provenance:
  formula: terramate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
