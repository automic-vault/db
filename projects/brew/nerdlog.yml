id: brew:nerdlog
display-name: nerdlog
homepage: https://dmitryfrank.com/projects/nerdlog/article
repo: https://github.com/dimonomid/nerdlog
docs: https://dmitryfrank.com/projects/nerdlog/article
package-manager:
  apk: nerdlog
  brew: nerdlog
  macports: nerdlog
package-manager-url: https://formulae.brew.sh/formula/nerdlog
version: 1.10.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: TUI log viewer with timeline histogram and no central server
source-archive: https://github.com/dimonomid/nerdlog/archive/refs/tags/v1.10.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nerdlog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nerdlog
  av: sudo av install brew:nerdlog
  brew: brew install nerdlog
  macports: sudo port install nerdlog
provenance:
  formula: nerdlog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
