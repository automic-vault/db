id: brew:weighttp
display-name: weighttp
homepage: https://redmine.lighttpd.net/projects/weighttp/wiki
repo: https://github.com/lighttpd/weighttp
docs: https://redmine.lighttpd.net/projects/weighttp/wiki
package-manager:
  brew: weighttp
package-manager-url: https://formulae.brew.sh/formula/weighttp
version: 0.5
license: MIT
category: development
tags:
  - cli
description: Webserver benchmarking tool that supports multithreading
source-archive: https://github.com/lighttpd/weighttp/archive/refs/tags/weighttp-0.5.tar.gz
dependencies:
  - libev
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: weighttp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:weighttp
  brew: brew install weighttp
provenance:
  formula: weighttp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
