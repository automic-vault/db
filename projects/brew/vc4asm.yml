id: brew:vc4asm
display-name: vc4asm
homepage: https://maazl.de/project/vc4asm/doc/index.html
repo: https://github.com/maazl/vc4asm
docs: https://maazl.de/project/vc4asm/doc/index.html
package-manager:
  brew: vc4asm
package-manager-url: https://formulae.brew.sh/formula/vc4asm
version: 0.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Macro assembler for Broadcom VideoCore IV aka Raspberry Pi GPU
source-archive: https://github.com/maazl/vc4asm/archive/refs/tags/V0.3.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: vc4asm
  - exposure: global executable
    kind: cli
    name: vc4dis
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vc4asm
  brew: brew install vc4asm
provenance:
  formula: vc4asm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
