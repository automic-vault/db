id: brew:yara
display-name: yara
homepage: https://github.com/VirusTotal/yara/
repo: https://github.com/VirusTotal/yara
docs: https://github.com/VirusTotal/yara/
package-manager:
  apk: yara
  brew: yara
  chocolatey: yara
  debian: yara
  dnf: yara
  macports: yara
  nix: yara
  pacman: yara
  scoop: main/yara
  ubuntu: yara
  winget: VirusTotal.YARA
  zypper: yara
package-manager-url: https://formulae.brew.sh/formula/yara
version: 4.5.5
license: BSD-3-Clause
category: development
tags:
  - cli
description: Malware identification and classification tool
source-archive: https://github.com/VirusTotal/yara/archive/refs/tags/v4.5.5.tar.gz
dependencies:
  - jansson
  - libmagic
  - openssl@3
  - protobuf-c
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: yara
  - exposure: global executable
    kind: cli
    name: yarac
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yara
  av: sudo av install brew:yara
  brew: brew install yara
  chocolatey: choco install yara
  debian: sudo apt install yara
  dnf: sudo dnf install yara
  macports: sudo port install yara
  nix: nix profile install nixpkgs#yara
  pacman: sudo pacman -S yara
  scoop: scoop install main/yara
  ubuntu: sudo apt install yara
  winget: winget install --id VirusTotal.YARA -e
  zypper: sudo zypper install yara
provenance:
  formula: yara
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
