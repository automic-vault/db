id: brew:primer3
display-name: primer3
homepage: https://primer3.org/
repo: https://github.com/primer3-org/primer3
docs: https://primer3.org/
package-manager:
  brew: primer3
  debian: primer3
  dnf: primer3
  ubuntu: primer3
package-manager-url: https://formulae.brew.sh/formula/primer3
version: 2.6.1
license: GPL-2.0-or-later AND GPL-3.0-or-later
category: development
tags:
  - cli
description: Program for designing PCR primers
source-archive: https://github.com/primer3-org/primer3/archive/refs/tags/v2.6.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: amplicon3_core
  - exposure: global executable
    kind: cli
    name: long_seq_tm_test
  - exposure: global executable
    kind: cli
    name: ntdpal
  - exposure: global executable
    kind: cli
    name: ntthal
  - exposure: global executable
    kind: cli
    name: oligotm
  - exposure: global executable
    kind: cli
    name: primer3_core
  - exposure: global executable
    kind: cli
    name: primer3_masker
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:primer3
  brew: brew install primer3
  debian: sudo apt install primer3
  dnf: sudo dnf install primer3
  ubuntu: sudo apt install primer3
provenance:
  formula: primer3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
