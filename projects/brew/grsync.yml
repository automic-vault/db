id: brew:grsync
display-name: grsync
homepage: https://www.opbyte.it/grsync/
repo: https://downloads.sourceforge.net/project/grsync/grsync-1.3.1.tar.gz
docs: https://www.opbyte.it/grsync/
package-manager:
  brew: grsync
  debian: grsync
  dnf: grsync
  macports: grsync
  nix: grsync
  pacman: grsync
  ubuntu: grsync
  zypper: grsync
package-manager-url: https://formulae.brew.sh/formula/grsync
version: 1.3.1
license: GPL-2.0-only
category: network
tags:
  - cli
description: GUI for rsync
source-archive: https://downloads.sourceforge.net/project/grsync/grsync-1.3.1.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - harfbuzz
  - pango
build-dependencies:
  - gettext
  - intltool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: grsync
  - exposure: global executable
    kind: cli
    name: grsync-batch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:grsync
  brew: brew install grsync
  debian: sudo apt install grsync
  dnf: sudo dnf install grsync
  macports: sudo port install grsync
  nix: nix profile install nixpkgs#grsync
  pacman: sudo pacman -S grsync
  ubuntu: sudo apt install grsync
  zypper: sudo zypper install grsync
provenance:
  formula: grsync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
