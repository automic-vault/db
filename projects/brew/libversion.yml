id: brew:libversion
display-name: libversion
homepage: https://github.com/repology/libversion
repo: https://github.com/repology/libversion
docs: https://github.com/repology/libversion
package-manager:
  brew: libversion
  nix: libversion
  zypper: libversion
package-manager-url: https://formulae.brew.sh/formula/libversion
version: 3.0.4
license: MIT
category: development
tags:
  - cli
description: Advanced version string comparison library
source-archive: https://github.com/repology/libversion/archive/refs/tags/3.0.4.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: version_compare
  - exposure: global executable
    kind: cli
    name: version_sort
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libversion
  brew: brew install libversion
  nix: nix profile install nixpkgs#libversion
  zypper: sudo zypper install libversion
provenance:
  formula: libversion
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
