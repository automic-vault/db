id: brew:onedrive-cli
display-name: onedrive-cli
homepage: https://github.com/abraunegg/onedrive
repo: https://github.com/abraunegg/onedrive
docs: https://github.com/abraunegg/onedrive
package-manager:
  apk: onedrive
  brew: onedrive-cli
  chocolatey: onedrive
  debian: onedrive
  dnf: onedrive
  nix: onedrive
  ubuntu: onedrive
  winget: Microsoft.OneDrive
  zypper: onedrive
package-manager-url: https://formulae.brew.sh/formula/onedrive-cli
version: 2.5.10
license: GPL-3.0-only
category: development
tags:
  - cli
description: Folder synchronization with OneDrive
source-archive: https://github.com/abraunegg/onedrive/archive/refs/tags/v2.5.10.tar.gz
dependencies:
  - curl
  - dbus
  - sqlite
  - systemd
build-dependencies:
  - ldc
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: onedrive
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add onedrive
  av: sudo av install brew:onedrive-cli
  brew: brew install onedrive-cli
  chocolatey: choco install onedrive
  debian: sudo apt install onedrive
  dnf: sudo dnf install onedrive
  nix: nix profile install nixpkgs#onedrive
  ubuntu: sudo apt install onedrive
  winget: winget install --id Microsoft.OneDrive -e
  zypper: sudo zypper install onedrive
provenance:
  formula: onedrive-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
