id: brew:pioneer
display-name: pioneer
homepage: https://pioneerspacesim.net/
repo: https://github.com/pioneerspacesim/pioneer
docs: https://pioneerspacesim.net/
package-manager:
  brew: pioneer
  dnf: pioneer
  nix: pioneer
  pacman: pioneer
  winget: PioneerDevelopers.Pioneer
package-manager-url: https://formulae.brew.sh/formula/pioneer
version: 20260203
license: GPL-3.0-only
category: development
tags:
  - cli
description: Game of lonely space adventure
source-archive: https://github.com/pioneerspacesim/pioneer/archive/refs/tags/20260203.tar.gz
dependencies:
  - assimp
  - freetype
  - glew
  - libpng
  - libsigc++@2
  - libvorbis
  - sdl2
  - sdl2_image
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: editor
  - exposure: global executable
    kind: cli
    name: modelcompiler
  - exposure: global executable
    kind: cli
    name: pioneer
  - exposure: global executable
    kind: cli
    name: savegamedump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pioneer
  brew: brew install pioneer
  dnf: sudo dnf install pioneer
  nix: nix profile install nixpkgs#pioneer
  pacman: sudo pacman -S pioneer
  winget: winget install --id PioneerDevelopers.Pioneer -e
provenance:
  formula: pioneer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
