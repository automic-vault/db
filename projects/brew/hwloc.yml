id: brew:hwloc
display-name: hwloc
homepage: https://www.open-mpi.org/projects/hwloc/
repo: https://download.open-mpi.org/release/hwloc/v2.13/hwloc-2.13.0.tar.bz2
docs: https://www.open-mpi.org/projects/hwloc/
package-manager:
  apk: hwloc
  brew: hwloc
  debian: hwloc
  dnf: hwloc
  macports: hwloc
  nix: hwloc
  pacman: hwloc
  ubuntu: hwloc
  zypper: hwloc
package-manager-url: https://formulae.brew.sh/formula/hwloc
version: 2.13.0
license: BSD-3-Clause
category: network
tags:
  - cli
description: Portable abstraction of the hierarchical topology of modern architectures
source-archive: https://download.open-mpi.org/release/hwloc/v2.13/hwloc-2.13.0.tar.bz2
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: hwloc-annotate
  - exposure: global executable
    kind: cli
    name: hwloc-bind
  - exposure: global executable
    kind: cli
    name: hwloc-calc
  - exposure: global executable
    kind: cli
    name: hwloc-compress-dir
  - exposure: global executable
    kind: cli
    name: hwloc-diff
  - exposure: global executable
    kind: cli
    name: hwloc-distrib
  - exposure: global executable
    kind: cli
    name: hwloc-gather-topology
  - exposure: global executable
    kind: cli
    name: hwloc-info
  - exposure: global executable
    kind: cli
    name: hwloc-ls
  - exposure: global executable
    kind: cli
    name: hwloc-patch
  - exposure: global executable
    kind: cli
    name: hwloc-ps
  - exposure: global executable
    kind: cli
    name: lstopo
  - exposure: global executable
    kind: cli
    name: lstopo-no-graphics
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hwloc
  av: sudo av install brew:hwloc
  brew: brew install hwloc
  debian: sudo apt install hwloc
  dnf: sudo dnf install hwloc
  macports: sudo port install hwloc
  nix: nix profile install nixpkgs#hwloc
  pacman: sudo pacman -S hwloc
  ubuntu: sudo apt install hwloc
  zypper: sudo zypper install hwloc
provenance:
  formula: hwloc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
