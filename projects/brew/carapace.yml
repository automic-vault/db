id: brew:carapace
display-name: carapace
homepage: https://carapace.sh
repo: https://github.com/carapace-sh/carapace-bin
docs: https://carapace.sh
package-manager:
  apk: carapace
  brew: carapace
  macports: carapace
  nix: carapace
  winget: rsteube.Carapace
package-manager-url: https://formulae.brew.sh/formula/carapace
version: 1.6.6
license: MIT
category: development
tags:
  - cli
description: Multi-shell multi-command argument completer
source-archive: https://github.com/carapace-sh/carapace-bin/archive/refs/tags/v1.6.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: carapace
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add carapace
  av: sudo av install brew:carapace
  brew: brew install carapace
  macports: sudo port install carapace
  nix: nix profile install nixpkgs#carapace
  winget: winget install --id rsteube.Carapace -e
provenance:
  formula: carapace
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
