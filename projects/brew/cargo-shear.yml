id: brew:cargo-shear
display-name: cargo-shear
homepage: https://github.com/Boshen/cargo-shear
repo: https://github.com/Boshen/cargo-shear
docs: https://github.com/Boshen/cargo-shear
package-manager:
  brew: cargo-shear
  nix: cargo-shear
  winget: Boshen.cargo-shear
package-manager-url: https://formulae.brew.sh/formula/cargo-shear
version: 1.12.4
license: MIT
category: development
tags:
  - cli
description: Detect and remove unused dependencies from Cargo.toml in Rust projects
source-archive: https://github.com/Boshen/cargo-shear/archive/refs/tags/v1.12.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-shear
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-shear
  brew: brew install cargo-shear
  nix: nix profile install nixpkgs#cargo-shear
  winget: winget install --id Boshen.cargo-shear -e
provenance:
  formula: cargo-shear
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
