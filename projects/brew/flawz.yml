id: brew:flawz
display-name: flawz
homepage: https://github.com/orhun/flawz
repo: https://github.com/orhun/flawz
docs: https://github.com/orhun/flawz
package-manager:
  apk: flawz
  brew: flawz
  macports: flawz
  nix: flawz
  pacman: flawz
package-manager-url: https://formulae.brew.sh/formula/flawz
version: 0.3.0
license: Apache-2.0 OR MIT
category: security
tags:
  - cli
  - security
description: Terminal UI for browsing security vulnerabilities (CVEs)
source-archive: https://github.com/orhun/flawz/archive/refs/tags/v0.3.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: flawz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add flawz
  av: sudo av install brew:flawz
  brew: brew install flawz
  macports: sudo port install flawz
  nix: nix profile install nixpkgs#flawz
  pacman: sudo pacman -S flawz
provenance:
  formula: flawz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
