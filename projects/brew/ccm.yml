id: brew:ccm
display-name: ccm
homepage: https://github.com/apache/cassandra-ccm
repo: >
  https://files.pythonhosted.org/packages/f1/12/091e82033d53b3802e1ead6b16045c5ecfb03374f8586a4ae4673a914c1a/ccm-3.1.5.tar.gz
