id: brew:hlint
display-name: hlint
homepage: https://github.com/ndmitchell/hlint
repo: https://hackage.haskell.org/package/hlint-3.10/hlint-3.10.tar.gz
docs: https://github.com/ndmitchell/hlint
package-manager:
  apk: hlint
  brew: hlint
  debian: hlint
  dnf: hlint
  macports: hlint
  nix: hlint
  pacman: hlint
  ubuntu: hlint
  zypper: hlint
package-manager-url: https://formulae.brew.sh/formula/hlint
version: 3.10
license: BSD-3-Clause
category: development
tags:
  - cli
description: Haskell source code suggestions
source-archive: https://hackage.haskell.org/package/hlint-3.10/hlint-3.10.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc@9.12
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: hlint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hlint
  av: sudo av install brew:hlint
  brew: brew install hlint
  debian: sudo apt install hlint
  dnf: sudo dnf install hlint
  macports: sudo port install hlint
  nix: nix profile install nixpkgs#hlint
  pacman: sudo pacman -S hlint
  ubuntu: sudo apt install hlint
  zypper: sudo zypper install hlint
provenance:
  formula: hlint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
