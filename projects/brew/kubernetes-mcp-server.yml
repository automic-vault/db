id: brew:kubernetes-mcp-server
display-name: kubernetes-mcp-server
homepage: https://github.com/containers/kubernetes-mcp-server
repo: https://github.com/containers/kubernetes-mcp-server
docs: https://github.com/containers/kubernetes-mcp-server
package-manager:
  brew: kubernetes-mcp-server
package-manager-url: https://formulae.brew.sh/formula/kubernetes-mcp-server
version: 0.0.62
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: MCP server for Kubernetes
source-archive: https://github.com/containers/kubernetes-mcp-server/archive/refs/tags/v0.0.62.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubernetes-mcp-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubernetes-mcp-server
  brew: brew install kubernetes-mcp-server
provenance:
  formula: kubernetes-mcp-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
