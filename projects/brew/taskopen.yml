id: brew:taskopen
display-name: taskopen
homepage: https://github.com/jschlatow/taskopen
repo: https://github.com/jschlatow/taskopen
docs: https://github.com/jschlatow/taskopen
package-manager:
  brew: taskopen
  dnf: taskopen
  macports: taskopen
  nix: taskopen
package-manager-url: https://formulae.brew.sh/formula/taskopen
version: 2.0.3
license: GPL-2.0-only
category: development
tags:
  - cli
description: Tool for taking notes and open urls with taskwarrior
source-archive: https://github.com/jschlatow/taskopen/archive/refs/tags/v2.0.3.tar.gz
dependencies:
  - task
build-dependencies:
  - nim
executables:
  - exposure: global executable
    kind: cli
    name: taskopen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:taskopen
  brew: brew install taskopen
  dnf: sudo dnf install taskopen
  macports: sudo port install taskopen
  nix: nix profile install nixpkgs#taskopen
provenance:
  formula: taskopen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
