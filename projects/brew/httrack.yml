id: brew:httrack
display-name: httrack
homepage: https://www.httrack.com/
repo: https://mirror.httrack.com/historical/httrack-3.49.2.tar.gz
docs: https://www.httrack.com/
package-manager:
  apk: httrack
  brew: httrack
  chocolatey: httrack
  debian: httrack
  dnf: httrack
  macports: httrack
  nix: httrack
  pacman: httrack
  scoop: extras/httrack
  ubuntu: httrack
  zypper: httrack
package-manager-url: https://formulae.brew.sh/formula/httrack
version: 3.49.2
license: GPL-3.0-or-later WITH openvpn-openssl-exception
category: network
tags:
  - cli
description: Website copier/offline browser
source-archive: https://mirror.httrack.com/historical/httrack-3.49.2.tar.gz
dependencies:
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: htsserver
  - exposure: global executable
    kind: cli
    name: httrack
  - exposure: global executable
    kind: cli
    name: proxytrack
  - exposure: global executable
    kind: cli
    name: webhttrack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add httrack
  av: sudo av install brew:httrack
  brew: brew install httrack
  chocolatey: choco install httrack
  debian: sudo apt install httrack
  dnf: sudo dnf install httrack
  macports: sudo port install httrack
  nix: nix profile install nixpkgs#httrack
  pacman: sudo pacman -S httrack
  scoop: scoop install extras/httrack
  ubuntu: sudo apt install httrack
  zypper: sudo zypper install httrack
provenance:
  formula: httrack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
