id: brew:sparse
display-name: sparse
homepage: https://sparse.wiki.kernel.org/
repo: https://mirrors.edge.kernel.org/pub/software/devel/sparse/dist/sparse-0.6.4.tar.xz
docs: https://sparse.wiki.kernel.org/
package-manager:
  apk: sparse
  brew: sparse
  debian: sparse
  dnf: sparse
  nix: sparse
  pacman: sparse
  ubuntu: sparse
  zypper: sparse
package-manager-url: https://formulae.brew.sh/formula/sparse
version: 0.6.4
license: MIT
category: network
tags:
  - cli
description: Static C code analysis tool
source-archive: https://mirrors.edge.kernel.org/pub/software/devel/sparse/dist/sparse-0.6.4.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: cgcc
  - exposure: global executable
    kind: cli
    name: sparse
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sparse
  av: sudo av install brew:sparse
  brew: brew install sparse
  debian: sudo apt install sparse
  dnf: sudo dnf install sparse
  nix: nix profile install nixpkgs#sparse
  pacman: sudo pacman -S sparse
  ubuntu: sudo apt install sparse
  zypper: sudo zypper install sparse
provenance:
  formula: sparse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
