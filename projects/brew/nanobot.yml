id: brew:nanobot
display-name: nanobot
homepage: https://www.nanobot.ai/
repo: https://github.com/obot-platform/nanobot
docs: https://www.nanobot.ai/
package-manager:
  brew: nanobot
package-manager-url: https://formulae.brew.sh/formula/nanobot
version: 0.0.82
license: Apache-2.0
category: development
tags:
  - cli
description: Build MCP Agents
source-archive: https://github.com/obot-platform/nanobot/archive/refs/tags/v0.0.82.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nanobot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nanobot
  brew: brew install nanobot
provenance:
  formula: nanobot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
