id: brew:gnu-shogi
display-name: gnu-shogi
homepage: https://www.gnu.org/software/gnushogi/
repo: https://ftpmirror.gnu.org/gnu/gnushogi/gnushogi-1.4.2.tar.gz
docs: https://www.gnu.org/software/gnushogi/
package-manager:
  brew: gnu-shogi
  debian: gnushogi
  dnf: gnushogi
  macports: gnushogi
  nix: gnushogi
  ubuntu: gnushogi
package-manager-url: https://formulae.brew.sh/formula/gnu-shogi
version: 1.4.2
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Japanese Chess
source-archive: https://ftpmirror.gnu.org/gnu/gnushogi/gnushogi-1.4.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: gnushogi
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gnu-shogi
  brew: brew install gnu-shogi
  debian: sudo apt install gnushogi
  dnf: sudo dnf install gnushogi
  macports: sudo port install gnushogi
  nix: nix profile install nixpkgs#gnushogi
  ubuntu: sudo apt install gnushogi
provenance:
  formula: gnu-shogi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
