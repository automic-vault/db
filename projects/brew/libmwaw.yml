id: brew:libmwaw
display-name: libmwaw
homepage: https://sourceforge.net/p/libmwaw/wiki/Home/
repo: >
  https://downloads.sourceforge.net/project/libmwaw/libmwaw/libmwaw-0.3.22/libmwaw-0.3.22.tar.xz
docs: https://sourceforge.net/p/libmwaw/wiki/Home/
package-manager:
  apk: libmwaw
  brew: libmwaw
  dnf: libmwaw
  macports: libmwaw
  nix: libmwaw
  pacman: libmwaw
package-manager-url: https://formulae.brew.sh/formula/libmwaw
version: 0.3.22
license: LGPL-2.1-or-later OR MPL-2.0
category: development
tags:
  - cli
description: Library for converting legacy Mac document formats
source-archive: >
  https://downloads.sourceforge.net/project/libmwaw/libmwaw/libmwaw-0.3.22/libmwaw-0.3.22.tar.xz
dependencies:
  - librevenge
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mwaw2csv
  - exposure: global executable
    kind: cli
    name: mwaw2html
  - exposure: global executable
    kind: cli
    name: mwaw2raw
  - exposure: global executable
    kind: cli
    name: mwaw2svg
  - exposure: global executable
    kind: cli
    name: mwaw2text
  - exposure: global executable
    kind: cli
    name: mwawFile
  - exposure: global executable
    kind: cli
    name: mwawZip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libmwaw
  av: sudo av install brew:libmwaw
  brew: brew install libmwaw
  dnf: sudo dnf install libmwaw
  macports: sudo port install libmwaw
  nix: nix profile install nixpkgs#libmwaw
  pacman: sudo pacman -S libmwaw
provenance:
  formula: libmwaw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
