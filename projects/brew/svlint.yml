id: brew:svlint
display-name: svlint
homepage: https://github.com/dalance/svlint
repo: https://github.com/dalance/svlint
docs: https://github.com/dalance/svlint
package-manager:
  brew: svlint
  nix: svlint
package-manager-url: https://formulae.brew.sh/formula/svlint
version: 0.9.5
license: MIT
category: development
tags:
  - cli
description: SystemVerilog linter
source-archive: https://github.com/dalance/svlint/archive/refs/tags/v0.9.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: svlint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:svlint
  brew: brew install svlint
  nix: nix profile install nixpkgs#svlint
provenance:
  formula: svlint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
