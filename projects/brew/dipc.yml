id: brew:dipc
display-name: dipc
homepage: https://github.com/doprz/dipc
repo: https://github.com/doprz/dipc
docs: https://github.com/doprz/dipc
package-manager:
  brew: dipc
  nix: dipc
package-manager-url: https://formulae.brew.sh/formula/dipc
version: 1.2.0
license: MIT OR Apache-2.0
category: development
tags:
  - cli
description: Convert your favorite images/wallpapers with your favorite color palettes/themes
source-archive: https://github.com/doprz/dipc/archive/refs/tags/v1.2.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dipc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dipc
  brew: brew install dipc
  nix: nix profile install nixpkgs#dipc
provenance:
  formula: dipc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
