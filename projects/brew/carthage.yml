id: brew:carthage
display-name: carthage
homepage: https://github.com/Carthage/Carthage
repo: https://github.com/Carthage/Carthage
docs: https://github.com/Carthage/Carthage
package-manager:
  brew: carthage
  macports: carthage
package-manager-url: https://formulae.brew.sh/formula/carthage
version: 0.40.0
license: MIT
category: development
tags:
  - cli
description: Decentralized dependency manager for Cocoa
source-archive: https://github.com/Carthage/Carthage.git
executables:
  - exposure: global executable
    kind: cli
    name: carthage
bottle:
  available: true
  platforms:
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:carthage
  brew: brew install carthage
  macports: sudo port install carthage
provenance:
  formula: carthage
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
