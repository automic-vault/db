id: brew:hqx
display-name: hqx
homepage: https://github.com/grom358/hqx
repo: https://github.com/grom358/hqx
docs: https://github.com/grom358/hqx
package-manager:
  brew: hqx
  dnf: hqx
package-manager-url: https://formulae.brew.sh/formula/hqx
version: 1.2
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Magnification filter designed for pixel art
source-archive: https://github.com/grom358/hqx.git
dependencies:
  - devil
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: hqx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hqx
  brew: brew install hqx
  dnf: sudo dnf install hqx
provenance:
  formula: hqx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
