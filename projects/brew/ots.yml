id: brew:ots
display-name: ots
homepage: https://ots.sniptt.com
repo: https://github.com/sniptt-official/ots
docs: https://ots.sniptt.com
package-manager:
  brew: ots
  debian: ots
  dnf: ots
  nix: ots
  ubuntu: ots
package-manager-url: https://formulae.brew.sh/formula/ots
version: 0.3.1
license: Apache-2.0
category: security
tags:
  - cli
description: Share end-to-end encrypted secrets with others via a one-time URL
source-archive: https://github.com/sniptt-official/ots/archive/refs/tags/v0.3.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ots
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ots
  brew: brew install ots
  debian: sudo apt install ots
  dnf: sudo dnf install ots
  nix: nix profile install nixpkgs#ots
  ubuntu: sudo apt install ots
provenance:
  formula: ots
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
