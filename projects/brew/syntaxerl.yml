id: brew:syntaxerl
display-name: syntaxerl
homepage: https://github.com/ten0s/syntaxerl
repo: https://github.com/ten0s/syntaxerl
docs: https://github.com/ten0s/syntaxerl
package-manager:
  brew: syntaxerl
package-manager-url: https://formulae.brew.sh/formula/syntaxerl
version: 0.15.0
license: MIT
category: development
tags:
  - cli
description: Syntax checker for Erlang code and config files
source-archive: https://github.com/ten0s/syntaxerl/archive/refs/tags/0.15.0.tar.gz
dependencies:
  - erlang
build-dependencies:
  - rebar3
executables:
  - exposure: global executable
    kind: cli
    name: syntaxerl
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:syntaxerl
  brew: brew install syntaxerl
provenance:
  formula: syntaxerl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
