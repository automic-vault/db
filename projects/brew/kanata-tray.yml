id: brew:kanata-tray
display-name: kanata-tray
homepage: https://github.com/rszyma/kanata-tray
repo: https://github.com/rszyma/kanata-tray
docs: https://github.com/rszyma/kanata-tray
package-manager:
  brew: kanata-tray
package-manager-url: https://formulae.brew.sh/formula/kanata-tray
version: 0.8.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: System tray for kanata keyboard remapper
source-archive: https://github.com/rszyma/kanata-tray/archive/refs/tags/v0.8.0.tar.gz
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: kanata-tray
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kanata-tray
  brew: brew install kanata-tray
provenance:
  formula: kanata-tray
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
