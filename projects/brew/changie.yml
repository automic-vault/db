id: brew:changie
display-name: changie
homepage: https://changie.dev/
repo: https://github.com/miniscruff/changie
docs: https://changie.dev/
package-manager:
  brew: changie
  nix: changie
  winget: miniscruff.changie
package-manager-url: https://formulae.brew.sh/formula/changie
version: 1.24.0
license: MIT
category: development
tags:
  - cli
description: Automated changelog tool for preparing releases
source-archive: https://github.com/miniscruff/changie/archive/refs/tags/v1.24.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: changie
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:changie
  brew: brew install changie
  nix: nix profile install nixpkgs#changie
  winget: winget install --id miniscruff.changie -e
provenance:
  formula: changie
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
