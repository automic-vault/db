id: brew:tectonic
display-name: tectonic
homepage: https://tectonic-typesetting.github.io/
repo: https://github.com/tectonic-typesetting/tectonic
docs: https://tectonic-typesetting.github.io/
package-manager:
  apk: tectonic
  brew: tectonic
  macports: tectonic
  nix: tectonic
  pacman: tectonic
  scoop: main/tectonic
package-manager-url: https://formulae.brew.sh/formula/tectonic
version: 0.16.9
license: MIT
category: development
tags:
  - cli
description: Modernized, complete, self-contained TeX/LaTeX engine
source-archive: >
  https://github.com/tectonic-typesetting/tectonic/archive/refs/tags/tectonic@0.16.9.tar.gz
dependencies:
  - freetype
  - graphite2
  - harfbuzz
  - icu4c@78
  - libpng
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: nextonic
  - exposure: global executable
    kind: cli
    name: tectonic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tectonic
  av: sudo av install brew:tectonic
  brew: brew install tectonic
  macports: sudo port install tectonic
  nix: nix profile install nixpkgs#tectonic
  pacman: sudo pacman -S tectonic
  scoop: scoop install main/tectonic
provenance:
  formula: tectonic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
