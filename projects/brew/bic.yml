id: brew:bic
display-name: bic
homepage: https://github.com/hexagonal-sun/bic
repo: https://github.com/hexagonal-sun/bic
docs: https://github.com/hexagonal-sun/bic
package-manager:
  brew: bic
  nix: bic
package-manager-url: https://formulae.brew.sh/formula/bic
version: 1.0.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: C interpreter and API explorer
source-archive: https://github.com/hexagonal-sun/bic/archive/refs/tags/v1.0.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - autoconf
  - autoconf-archive
  - automake
  - bison
  - libtool
  - pkgconf
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: bic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bic
  brew: brew install bic
  nix: nix profile install nixpkgs#bic
provenance:
  formula: bic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
