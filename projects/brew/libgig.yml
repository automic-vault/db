id: brew:libgig
display-name: libgig
homepage: https://www.linuxsampler.org/libgig/
repo: https://download.linuxsampler.org/packages/libgig-4.5.2.tar.bz2
docs: https://www.linuxsampler.org/libgig/
package-manager:
  brew: libgig
  macports: libgig
  nix: libgig
  pacman: libgig
package-manager-url: https://formulae.brew.sh/formula/libgig
version: 4.5.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Library for Gigasampler and DLS (Downloadable Sounds) Level 1/2 files
source-archive: https://download.linuxsampler.org/packages/libgig-4.5.2.tar.bz2
dependencies:
  - libsndfile
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: akaidump
  - exposure: global executable
    kind: cli
    name: akaiextract
  - exposure: global executable
    kind: cli
    name: dlsdump
  - exposure: global executable
    kind: cli
    name: gig2mono
  - exposure: global executable
    kind: cli
    name: gig2stereo
  - exposure: global executable
    kind: cli
    name: gigdump
  - exposure: global executable
    kind: cli
    name: gigextract
  - exposure: global executable
    kind: cli
    name: gigmerge
  - exposure: global executable
    kind: cli
    name: korg2gig
  - exposure: global executable
    kind: cli
    name: korgdump
  - exposure: global executable
    kind: cli
    name: rifftree
  - exposure: global executable
    kind: cli
    name: sf2dump
  - exposure: global executable
    kind: cli
    name: sf2extract
  - exposure: global executable
    kind: cli
    name: wav2gig
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libgig
  brew: brew install libgig
  macports: sudo port install libgig
  nix: nix profile install nixpkgs#libgig
  pacman: sudo pacman -S libgig
provenance:
  formula: libgig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
