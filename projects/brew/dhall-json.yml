id: brew:dhall-json
display-name: dhall-json
homepage: https://github.com/dhall-lang/dhall-haskell/tree/master/dhall-json
repo: https://hackage.haskell.org/package/dhall-json-1.7.12/dhall-json-1.7.12.tar.gz
docs: https://github.com/dhall-lang/dhall-haskell/tree/master/dhall-json
package-manager:
  brew: dhall-json
  dnf: dhall-json
  nix: dhall-json
  pacman: dhall-json
package-manager-url: https://formulae.brew.sh/formula/dhall-json
version: 1.7.12
license: BSD-3-Clause
category: development
tags:
  - cli
  - json
  - yaml
description: Dhall to JSON compiler and a Dhall to YAML compiler
source-archive: https://hackage.haskell.org/package/dhall-json-1.7.12/dhall-json-1.7.12.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: dhall-to-json
  - exposure: global executable
    kind: cli
    name: dhall-to-yaml
  - exposure: global executable
    kind: cli
    name: json-to-dhall
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dhall-json
  brew: brew install dhall-json
  dnf: sudo dnf install dhall-json
  nix: nix profile install nixpkgs#dhall-json
  pacman: sudo pacman -S dhall-json
provenance:
  formula: dhall-json
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
