id: brew:libarchive
display-name: libarchive
homepage: https://www.libarchive.org
repo: https://www.libarchive.org/downloads/libarchive-3.8.7.tar.xz
docs: https://www.libarchive.org
package-manager:
  apk: libarchive
  brew: libarchive
  dnf: libarchive
  macports: libarchive
  nix: libarchive
  pacman: libarchive
  zypper: bsdtar
package-manager-url: https://formulae.brew.sh/formula/libarchive
version: 3.8.7
license: BSD-2-Clause
category: development
tags:
  - cli
description: Multi-format archive and compression library
source-archive: https://www.libarchive.org/downloads/libarchive-3.8.7.tar.xz
dependencies:
  - libb2
  - lz4
  - xz
  - zstd
uses-from-macos:
  - bzip2
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: bsdcat
  - exposure: global executable
    kind: cli
    name: bsdcpio
  - exposure: global executable
    kind: cli
    name: bsdtar
  - exposure: global executable
    kind: cli
    name: bsdunzip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libarchive
  av: sudo av install brew:libarchive
  brew: brew install libarchive
  dnf: sudo dnf install libarchive
  macports: sudo port install libarchive
  nix: nix profile install nixpkgs#libarchive
  pacman: sudo pacman -S libarchive
  zypper: sudo zypper install bsdtar
provenance:
  formula: libarchive
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
