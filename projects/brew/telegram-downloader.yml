id: brew:telegram-downloader
display-name: telegram-downloader
homepage: https://docs.iyear.me/tdl/
repo: https://github.com/iyear/tdl
docs: https://docs.iyear.me/tdl/
package-manager:
  brew: telegram-downloader
  nix: tdl
  scoop: extras/telegram-downloader
package-manager-url: https://formulae.brew.sh/formula/telegram-downloader
version: 0.20.3
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Telegram Messenger downloader/tools written in Golang
source-archive: https://github.com/iyear/tdl/archive/refs/tags/v0.20.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tdl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:telegram-downloader
  brew: brew install telegram-downloader
  nix: nix profile install nixpkgs#tdl
  scoop: scoop install extras/telegram-downloader
provenance:
  formula: telegram-downloader
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
