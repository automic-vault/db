id: brew:odbc2parquet
display-name: odbc2parquet
homepage: https://github.com/pacman82/odbc2parquet
repo: https://github.com/pacman82/odbc2parquet
docs: https://github.com/pacman82/odbc2parquet
package-manager:
  brew: odbc2parquet
  scoop: main/odbc2parquet
package-manager-url: https://formulae.brew.sh/formula/odbc2parquet
version: 11.0.0
license: MIT
category: development
tags:
  - cli
description: CLI to query an ODBC data source and write the result into a Parquet file
source-archive: https://github.com/pacman82/odbc2parquet/archive/refs/tags/v11.0.0.tar.gz
dependencies:
  - unixodbc
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: odbc2parquet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:odbc2parquet
  brew: brew install odbc2parquet
  scoop: scoop install main/odbc2parquet
provenance:
  formula: odbc2parquet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
