id: brew:avrdude
display-name: avrdude
homepage: https://www.nongnu.org/avrdude/
repo: https://github.com/avrdudes/avrdude
docs: https://www.nongnu.org/avrdude/
package-manager:
  apk: avrdude
  brew: avrdude
  debian: avrdude
  dnf: avrdude
  macports: avrdude
  nix: avrdude
  pacman: avrdude
  scoop: main/avrdude
  ubuntu: avrdude
  winget: AVRDudes.AVRDUDE
  zypper: avrdude
package-manager-url: https://formulae.brew.sh/formula/avrdude
version: 8.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Atmel AVR MCU programmer
source-archive: https://github.com/avrdudes/avrdude/archive/refs/tags/v8.1.tar.gz
dependencies:
  - hidapi
  - libftdi
  - libusb
  - libusb-compat
build-dependencies:
  - cmake
  - libelf
executables:
  - exposure: global executable
    kind: cli
    name: avrdude
  - exposure: global executable
    kind: cli
    name: elf2tag
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add avrdude
  av: sudo av install brew:avrdude
  brew: brew install avrdude
  debian: sudo apt install avrdude
  dnf: sudo dnf install avrdude
  macports: sudo port install avrdude
  nix: nix profile install nixpkgs#avrdude
  pacman: sudo pacman -S avrdude
  scoop: scoop install main/avrdude
  ubuntu: sudo apt install avrdude
  winget: winget install --id AVRDudes.AVRDUDE -e
  zypper: sudo zypper install avrdude
provenance:
  formula: avrdude
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
