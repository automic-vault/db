id: brew:gerbil-scheme
display-name: gerbil-scheme
homepage: https://cons.io
repo: https://github.com/mighty-gerbils/gerbil
docs: https://cons.io
package-manager:
  brew: gerbil-scheme
  macports: gerbil
  nix: gerbil
package-manager-url: https://formulae.brew.sh/formula/gerbil-scheme
version: 0.18.2
license: LGPL-2.1-or-later OR Apache-2.0
category: development
tags:
  - cli
description: Opinionated dialect of Scheme designed for Systems Programming
source-archive: https://github.com/mighty-gerbils/gerbil/archive/refs/tags/v0.18.2.tar.gz
dependencies:
  - gcc
  - openssl@3
build-dependencies:
  - pkgconf
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: gerbil
  - exposure: global executable
    kind: cli
    name: gxc
  - exposure: global executable
    kind: cli
    name: gxensemble
  - exposure: global executable
    kind: cli
    name: gxensemble-test
  - exposure: global executable
    kind: cli
    name: gxhttpd
  - exposure: global executable
    kind: cli
    name: gxhttpd-ensemble-test
  - exposure: global executable
    kind: cli
    name: gxhttpd-test
  - exposure: global executable
    kind: cli
    name: gxi
  - exposure: global executable
    kind: cli
    name: gxpkg
  - exposure: global executable
    kind: cli
    name: gxprof
  - exposure: global executable
    kind: cli
    name: gxtags
  - exposure: global executable
    kind: cli
    name: gxtest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gerbil-scheme
  brew: brew install gerbil-scheme
  macports: sudo port install gerbil
  nix: nix profile install nixpkgs#gerbil
provenance:
  formula: gerbil-scheme
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
