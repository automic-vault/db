id: brew:committed
display-name: committed
homepage: https://github.com/crate-ci/committed
repo: https://github.com/crate-ci/committed
docs: https://github.com/crate-ci/committed
package-manager:
  apk: committed
  brew: committed
  macports: committed
  nix: committed
  pacman: committed
package-manager-url: https://formulae.brew.sh/formula/committed
version: 1.1.11
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Nitpicking commit history since beabf39
source-archive: https://github.com/crate-ci/committed/archive/refs/tags/v1.1.11.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: committed
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add committed
  av: sudo av install brew:committed
  brew: brew install committed
  macports: sudo port install committed
  nix: nix profile install nixpkgs#committed
  pacman: sudo pacman -S committed
provenance:
  formula: committed
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
