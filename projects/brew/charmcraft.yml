id: brew:charmcraft
display-name: charmcraft
homepage: https://charmhub.io
repo: >
  https://files.pythonhosted.org/packages/fa/77/cc5efd656ece6d18ee7481b2aad7c4d1d60fa0f29b4d37637b902f305ee7/charmcraft-4.2.1.tar.gz
docs: https://charmhub.io
package-manager:
  brew: charmcraft
package-manager-url: https://formulae.brew.sh/formula/charmcraft
version: 4.2.1
license: Apache-2.0
category: development
tags:
  - cli
description: Tool to build charms and publish them on Charmhub
source-archive: >
  https://files.pythonhosted.org/packages/fa/77/cc5efd656ece6d18ee7481b2aad7c4d1d60fa0f29b4d37637b902f305ee7/charmcraft-4.2.1.tar.gz
dependencies:
  - certifi
  - cryptography
  - libsodium
  - libyaml
  - pydantic
  - pygit2
  - python@3.14
  - rpds-py
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: charmcraft
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:charmcraft
  brew: brew install charmcraft
provenance:
  formula: charmcraft
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
