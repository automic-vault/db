id: brew:xlsxio
display-name: xlsxio
homepage: https://github.com/brechtsanders/xlsxio
repo: https://github.com/brechtsanders/xlsxio
docs: https://github.com/brechtsanders/xlsxio
package-manager:
  brew: xlsxio
package-manager-url: https://formulae.brew.sh/formula/xlsxio
version: 0.2.36
license: MIT
category: development
tags:
  - cli
description: C library for reading values from and writing values to .xlsx files
source-archive: https://github.com/brechtsanders/xlsxio/archive/refs/tags/0.2.36.tar.gz
dependencies:
  - libzip
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: xlsxio_csv2xlsx
  - exposure: global executable
    kind: cli
    name: xlsxio_xlsx2csv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xlsxio
  brew: brew install xlsxio
provenance:
  formula: xlsxio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
