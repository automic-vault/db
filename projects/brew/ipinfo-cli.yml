id: brew:ipinfo-cli
display-name: ipinfo-cli
homepage: https://ipinfo.io/
repo: https://github.com/ipinfo/cli
docs: https://ipinfo.io/
package-manager:
  brew: ipinfo-cli
  nix: ipinfo
  scoop: main/ipinfo-cli
  winget: ipinfo.ipinfo
package-manager-url: https://formulae.brew.sh/formula/ipinfo-cli
version: 3.3.2
license: Apache-2.0
category: development
tags:
  - cli
description: Official CLI for the IPinfo IP Address API
source-archive: https://github.com/ipinfo/cli/archive/refs/tags/ipinfo-3.3.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ipinfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ipinfo-cli
  brew: brew install ipinfo-cli
  nix: nix profile install nixpkgs#ipinfo
  scoop: scoop install main/ipinfo-cli
  winget: winget install --id ipinfo.ipinfo -e
provenance:
  formula: ipinfo-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
