id: brew:pcb2gcode
display-name: pcb2gcode
homepage: https://github.com/pcb2gcode/pcb2gcode
repo: https://github.com/pcb2gcode/pcb2gcode
docs: https://github.com/pcb2gcode/pcb2gcode
package-manager:
  brew: pcb2gcode
  nix: pcb2gcode
package-manager-url: https://formulae.brew.sh/formula/pcb2gcode
version: 3.0.4
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Command-line tool for isolation, routing and drilling of PCBs
source-archive: https://github.com/pcb2gcode/pcb2gcode/archive/refs/tags/v3.0.4.tar.gz
dependencies:
  - boost
  - gerbv
  - glib
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pcb2gcode
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pcb2gcode
  brew: brew install pcb2gcode
  nix: nix profile install nixpkgs#pcb2gcode
provenance:
  formula: pcb2gcode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
