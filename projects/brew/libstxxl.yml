id: brew:libstxxl
display-name: libstxxl
homepage: https://stxxl.sourceforge.net/
repo: https://downloads.sourceforge.net/project/stxxl/stxxl/1.4.1/stxxl-1.4.1.tar.gz
docs: https://stxxl.sourceforge.net/
package-manager:
  brew: libstxxl
package-manager-url: https://formulae.brew.sh/formula/libstxxl
version: 1.4.1
license: BSL-1.0
category: network
tags:
  - cli
description: C++ implementation of STL for extra large data sets
source-archive: https://downloads.sourceforge.net/project/stxxl/stxxl/1.4.1/stxxl-1.4.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: stxxl_tool
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libstxxl
  brew: brew install libstxxl
provenance:
  formula: libstxxl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
