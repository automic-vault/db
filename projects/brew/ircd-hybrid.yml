id: brew:ircd-hybrid
display-name: ircd-hybrid
homepage: https://www.ircd-hybrid.org/
repo: >
  https://downloads.sourceforge.net/project/ircd-hybrid/ircd-hybrid/ircd-hybrid-8.2.47/ircd-hybrid-8.2.47.tgz
docs: https://www.ircd-hybrid.org/
package-manager:
  brew: ircd-hybrid
  debian: ircd-hybrid
  nix: ircd-hybrid
  ubuntu: ircd-hybrid
package-manager-url: https://formulae.brew.sh/formula/ircd-hybrid
version: 8.2.47
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: High-performance secure IRC server
source-archive: >
  https://downloads.sourceforge.net/project/ircd-hybrid/ircd-hybrid/ircd-hybrid-8.2.47/ircd-hybrid-8.2.47.tgz
dependencies:
  - jansson
  - openssl@3
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: ircd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You'll more than likely need to edit the default settings in the config file:
    $HOMEBREW_PREFIX/etc/ircd.conf
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:ircd-hybrid
  brew: brew install ircd-hybrid
  debian: sudo apt install ircd-hybrid
  nix: nix profile install nixpkgs#ircd-hybrid
  ubuntu: sudo apt install ircd-hybrid
provenance:
  formula: ircd-hybrid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
