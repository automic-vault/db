id: brew:pkgx
display-name: pkgx
homepage: https://pkgx.sh
repo: https://github.com/pkgxdev/pkgx
docs: https://pkgx.sh
package-manager:
  brew: pkgx
package-manager-url: https://formulae.brew.sh/formula/pkgx
version: 2.10.3
license: Apache-2.0
category: development
tags:
  - cli
description: Standalone binary that can run anything
source-archive: https://github.com/pkgxdev/pkgx/archive/refs/tags/v2.10.3.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: pkgx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pkgx
  brew: brew install pkgx
provenance:
  formula: pkgx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
