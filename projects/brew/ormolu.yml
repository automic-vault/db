id: brew:ormolu
display-name: ormolu
homepage: https://github.com/tweag/ormolu
repo: https://hackage.haskell.org/package/ormolu-0.8.1.0/ormolu-0.8.1.0.tar.gz
docs: https://github.com/tweag/ormolu
package-manager:
  apk: ormolu
  brew: ormolu
  debian: ormolu
  dnf: ormolu
  nix: ormolu
  ubuntu: ormolu
package-manager-url: https://formulae.brew.sh/formula/ormolu
version: 0.8.1.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Formatter for Haskell source code
source-archive: https://hackage.haskell.org/package/ormolu-0.8.1.0/ormolu-0.8.1.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc@9.12
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: ormolu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ormolu
  av: sudo av install brew:ormolu
  brew: brew install ormolu
  debian: sudo apt install ormolu
  dnf: sudo dnf install ormolu
  nix: nix profile install nixpkgs#ormolu
  ubuntu: sudo apt install ormolu
provenance:
  formula: ormolu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
