id: brew:chafa
display-name: chafa
homepage: https://hpjansson.org/chafa/
repo: https://hpjansson.org/chafa/releases/chafa-1.18.2.tar.xz
docs: https://hpjansson.org/chafa/
package-manager:
  apk: chafa
  brew: chafa
  debian: chafa
  dnf: chafa
  macports: chafa
  nix: chafa
  pacman: chafa
  scoop: main/chafa
  ubuntu: chafa
  winget: hpjansson.Chafa
  zypper: chafa
package-manager-url: https://formulae.brew.sh/formula/chafa
version: 1.18.2
license: LGPL-3.0-or-later
category: network
tags:
  - cli
description: Versatile and fast Unicode/ASCII/ANSI graphics renderer
source-archive: https://hpjansson.org/chafa/releases/chafa-1.18.2.tar.xz
dependencies:
  - cairo
  - freetype
  - gdk-pixbuf
  - gettext
  - glib
  - jpeg-turbo
  - jpeg-xl
  - libavif
  - librsvg
  - libtiff
  - webp
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: chafa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add chafa
  av: sudo av install brew:chafa
  brew: brew install chafa
  debian: sudo apt install chafa
  dnf: sudo dnf install chafa
  macports: sudo port install chafa
  nix: nix profile install nixpkgs#chafa
  pacman: sudo pacman -S chafa
  scoop: scoop install main/chafa
  ubuntu: sudo apt install chafa
  winget: winget install --id hpjansson.Chafa -e
  zypper: sudo zypper install chafa
provenance:
  formula: chafa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
