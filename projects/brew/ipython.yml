id: brew:ipython
display-name: ipython
homepage: https://ipython.org/
repo: >
  https://files.pythonhosted.org/packages/cd/c4/87cda5842cf5c31837c06ddb588e11c3c35d8ece89b7a0108c06b8c9b00a/ipython-9.13.0.tar.gz
docs: https://ipython.org/
package-manager:
  apk: ipython
  brew: ipython
