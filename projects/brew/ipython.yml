  pacman: ipython
  ubuntu: ipython3
package-manager-url: https://formulae.brew.sh/formula/ipython
version: 9.13.0
license: BSD-3-Clause
category: network
tags:
  - cli
description: Interactive computing in Python
source-archive: >
