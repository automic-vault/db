id: brew:juise
display-name: juise
homepage: https://github.com/Juniper/juise/wiki
repo: https://github.com/Juniper/juise
docs: https://github.com/Juniper/juise/wiki
package-manager:
  brew: juise
package-manager-url: https://formulae.brew.sh/formula/juise
version: 3.0.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: JUNOS user interface scripting environment
source-archive: https://github.com/Juniper/juise/releases/download/3.0.0/juise-3.0.0.tar.gz
dependencies:
  - libslax
build-dependencies:
  - libssh2
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: juise
  - exposure: global executable
    kind: cli
    name: juise-config
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:juise
  brew: brew install juise
provenance:
  formula: juise
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
