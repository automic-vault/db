id: brew:bold
display-name: bold
homepage: https://codeberg.org/kubkon/bold
repo: https://codeberg.org/kubkon/bold/archive/v0.2.0.tar.gz
docs: https://codeberg.org/kubkon/bold
package-manager:
  brew: bold
  nix: bold
package-manager-url: https://formulae.brew.sh/formula/bold
version: 0.2.0
license: MIT
category: network
tags:
  - cli
description: Drop-in replacement for Apple system linker ld
source-archive: https://codeberg.org/kubkon/bold/archive/v0.2.0.tar.gz
build-dependencies:
  - zig@0.14
executables:
  - exposure: global executable
    kind: cli
    name: bold
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bold
  brew: brew install bold
  nix: nix profile install nixpkgs#bold
provenance:
  formula: bold
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
