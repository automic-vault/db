id: brew:netatalk
display-name: netatalk
homepage: https://netatalk.io
repo: https://github.com/Netatalk/netatalk
docs: https://netatalk.io
package-manager:
  apk: netatalk
  brew: netatalk
  debian: netatalk
  dnf: netatalk
  macports: netatalk
  nix: netatalk
  ubuntu: netatalk
package-manager-url: https://formulae.brew.sh/formula/netatalk
version: 4.4.3
license: >
  GPL-2.0-or-later AND BSD-2-Clause AND BSD-3-Clause AND HPND AND HPND-Pbmplus AND
  Kazlib AND LGPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: File server for Macs, compliant with Apple Filing Protocol (AFP)
source-archive: >
  https://github.com/Netatalk/netatalk/releases/download/netatalk-4-4-3/netatalk-4.4.3.tar.xz
dependencies:
  - berkeley-db@5
  - bstring
  - cracklib
  - iniparser
  - libevent
  - libgcrypt
  - mariadb-connector-c
  - openldap
build-dependencies:
  - cmark-gfm
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - krb5
  - libxcrypt
  - perl
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: a2boot
  - exposure: global executable
    kind: cli
    name: addump
  - exposure: global executable
    kind: cli
    name: aecho
  - exposure: global executable
    kind: cli
    name: afp_lantest
  - exposure: global executable
    kind: cli
    name: afp_logintest
  - exposure: global executable
    kind: cli
    name: afp_spectest
  - exposure: global executable
    kind: cli
    name: afp_speedtest
  - exposure: global executable
    kind: cli
    name: afparg
  - exposure: global executable
    kind: cli
    name: afpd
  - exposure: global executable
    kind: cli
    name: afpldaptest
  - exposure: global executable
    kind: cli
    name: afppasswd
  - exposure: global executable
    kind: cli
    name: afpstats
  - exposure: global executable
    kind: cli
    name: asip-status
  - exposure: global executable
    kind: cli
    name: atalkd
  - exposure: global executable
    kind: cli
    name: cnid_dbd
  - exposure: global executable
    kind: cli
    name: cnid_metad
  - exposure: global executable
    kind: cli
    name: dbd
  - exposure: global executable
    kind: cli
    name: fce_listen
  - exposure: global executable
    kind: cli
    name: getzones
  - exposure: global executable
    kind: cli
    name: macipgw
  - exposure: global executable
    kind: cli
    name: macusers
  - exposure: global executable
    kind: cli
    name: nad
  - exposure: global executable
    kind: cli
    name: nbplkup
  - exposure: global executable
    kind: cli
    name: nbprgstr
  - exposure: global executable
    kind: cli
    name: nbpunrgstr
  - exposure: global executable
    kind: cli
    name: netatalk
  - exposure: global executable
    kind: cli
    name: pap
  - exposure: global executable
    kind: cli
    name: papd
  - exposure: global executable
    kind: cli
    name: papstatus
  - exposure: global executable
    kind: cli
    name: rtmpqry
  - exposure: global executable
    kind: cli
    name: timelord
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Authenticating as a system user requires manually installing the PAM configuration
    file to a predetermined location by running: sudo install -d -o $USER -g admin
    /usr/local/etc mkdir -p /usr/local/etc/pam.d cp $(brew --prefix)/etc/pam.d/netatalk
    /usr/local/etc/pam.d See `man pam.conf` for more information.
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add netatalk
  av: sudo av install brew:netatalk
  brew: brew install netatalk
  debian: sudo apt install netatalk
  dnf: sudo dnf install netatalk
  macports: sudo port install netatalk
  nix: nix profile install nixpkgs#netatalk
  ubuntu: sudo apt install netatalk
provenance:
  formula: netatalk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
