id: brew:swi-prolog
display-name: swi-prolog
homepage: https://www.swi-prolog.org/
repo: https://www.swi-prolog.org/download/stable/src/swipl-10.0.2.tar.gz
docs: https://www.swi-prolog.org/
package-manager:
  apk: swi-prolog
  brew: swi-prolog
  chocolatey: SWI-Prolog
  debian: swi-prolog
  dnf: swi-prolog
  macports: swi-prolog
  nix: swi-prolog
  pacman: swi-prolog
  scoop: extras/swipl
  ubuntu: swi-prolog
  winget: SWI-Prolog.SWI-Prolog
  zypper: swipl
package-manager-url: https://formulae.brew.sh/formula/swi-prolog
version: 10.0.2
license: BSD-2-Clause
category: network
tags:
  - cli
description: ISO/Edinburgh-style Prolog interpreter
source-archive: https://www.swi-prolog.org/download/stable/src/swipl-10.0.2.tar.gz
dependencies:
  - berkeley-db@5
  - gmp
  - libarchive
  - libyaml
  - openssl@3
  - pcre2
  - unixodbc
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - libedit
  - libxcrypt
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: swipl
  - exposure: global executable
    kind: cli
    name: swipl-ld
  - exposure: global executable
    kind: cli
    name: swipl-win
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add swi-prolog
  av: sudo av install brew:swi-prolog
  brew: brew install swi-prolog
  chocolatey: choco install SWI-Prolog
  debian: sudo apt install swi-prolog
  dnf: sudo dnf install swi-prolog
  macports: sudo port install swi-prolog
  nix: nix profile install nixpkgs#swi-prolog
  pacman: sudo pacman -S swi-prolog
  scoop: scoop install extras/swipl
  ubuntu: sudo apt install swi-prolog
  winget: winget install --id SWI-Prolog.SWI-Prolog -e
  zypper: sudo zypper install swipl
provenance:
  formula: swi-prolog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
