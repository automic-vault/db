id: brew:media-info
display-name: media-info
homepage: https://mediaarea.net/
repo: https://mediaarea.net/download/source/mediainfo/26.05/mediainfo_26.05.tar.xz
docs: https://mediaarea.net/
package-manager:
  apk: mediainfo
  brew: media-info
  chocolatey: mediainfo
  debian: mediainfo
  dnf: mediainfo
  macports: mediainfo
  nix: mediainfo
  pacman: mediainfo
  scoop: main/mediainfo
  ubuntu: mediainfo
  winget: MediaArea.MediaInfo
  zypper: mediainfo
package-manager-url: https://formulae.brew.sh/formula/media-info
version: 26.05
license: BSD-2-Clause
category: media
tags:
  - cli
description: Unified display of technical and tag data for audio/video
source-archive: https://mediaarea.net/download/source/mediainfo/26.05/mediainfo_26.05.tar.xz
dependencies:
  - libmediainfo
  - libzen
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mediainfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mediainfo
  av: sudo av install brew:media-info
  brew: brew install media-info
  chocolatey: choco install mediainfo
  debian: sudo apt install mediainfo
  dnf: sudo dnf install mediainfo
  macports: sudo port install mediainfo
  nix: nix profile install nixpkgs#mediainfo
  pacman: sudo pacman -S mediainfo
  scoop: scoop install main/mediainfo
  ubuntu: sudo apt install mediainfo
  winget: winget install --id MediaArea.MediaInfo -e
  zypper: sudo zypper install mediainfo
provenance:
  formula: media-info
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
