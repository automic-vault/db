id: brew:doxymacs
display-name: doxymacs
homepage: https://doxymacs.sourceforge.net/
repo: https://downloads.sourceforge.net/project/doxymacs/doxymacs/1.8.0/doxymacs-1.8.0.tar.gz
docs: https://doxymacs.sourceforge.net/
package-manager:
  brew: doxymacs
package-manager-url: https://formulae.brew.sh/formula/doxymacs
version: 1.8.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Elisp package for using doxygen under Emacs
source-archive: https://downloads.sourceforge.net/project/doxymacs/doxymacs/1.8.0/doxymacs-1.8.0.tar.gz
dependencies:
  - doxygen
  - emacs
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: doxymacs_parser
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:doxymacs
  brew: brew install doxymacs
provenance:
  formula: doxymacs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
