id: brew:stuffbin
display-name: stuffbin
homepage: https://github.com/knadh/stuffbin
repo: https://github.com/knadh/stuffbin
docs: https://github.com/knadh/stuffbin
package-manager:
  brew: stuffbin
  nix: stuffbin
package-manager-url: https://formulae.brew.sh/formula/stuffbin
version: 1.3.0
license: MIT
category: development
tags:
  - cli
description: Compress and embed static files and assets into Go binaries
source-archive: https://github.com/knadh/stuffbin/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: stuffbin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stuffbin
  brew: brew install stuffbin
  nix: nix profile install nixpkgs#stuffbin
provenance:
  formula: stuffbin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
