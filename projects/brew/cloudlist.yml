id: brew:cloudlist
display-name: cloudlist
homepage: https://github.com/projectdiscovery/cloudlist
repo: https://github.com/projectdiscovery/cloudlist
docs: https://github.com/projectdiscovery/cloudlist
package-manager:
  brew: cloudlist
  nix: cloudlist
package-manager-url: https://formulae.brew.sh/formula/cloudlist
version: 1.4.0
license: MIT
category: cloud
tags:
  - cli
  - cloud
description: Tool for listing assets from multiple cloud providers
source-archive: https://github.com/projectdiscovery/cloudlist/archive/refs/tags/v1.4.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cloudlist
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloudlist
  brew: brew install cloudlist
  nix: nix profile install nixpkgs#cloudlist
provenance:
  formula: cloudlist
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
