id: brew:uftp
display-name: uftp
homepage: https://uftp-multicast.sourceforge.net/
repo: https://downloads.sourceforge.net/project/uftp-multicast/source-tar/uftp-5.0.3.tar.gz
docs: https://uftp-multicast.sourceforge.net/
package-manager:
  brew: uftp
  debian: uftp
  nix: uftp
  ubuntu: uftp
  zypper: uftpd
package-manager-url: https://formulae.brew.sh/formula/uftp
version: 5.0.3
license: GPL-3.0-or-later WITH openvpn-openssl-exception
category: network
tags:
  - cli
description: Secure, reliable, efficient multicast file transfer program
source-archive: https://downloads.sourceforge.net/project/uftp-multicast/source-tar/uftp-5.0.3.tar.gz
dependencies:
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: uftp
  - exposure: global executable
    kind: cli
    name: uftp_keymgt
  - exposure: global executable
    kind: cli
    name: uftpd
  - exposure: global executable
    kind: cli
    name: uftpproxyd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:uftp
  brew: brew install uftp
  debian: sudo apt install uftp
  nix: nix profile install nixpkgs#uftp
  ubuntu: sudo apt install uftp
  zypper: sudo zypper install uftpd
provenance:
  formula: uftp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
