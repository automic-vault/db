id: brew:ocm
display-name: ocm
homepage: https://www.openshift.com/
repo: https://github.com/openshift-online/ocm-cli
docs: https://www.openshift.com/
package-manager:
  brew: ocm
  nix: ocm
package-manager-url: https://formulae.brew.sh/formula/ocm
version: 1.0.15
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for the Red Hat OpenShift Cluster Manager
source-archive: https://github.com/openshift-online/ocm-cli/archive/refs/tags/v1.0.15.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ocm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ocm
  brew: brew install ocm
  nix: nix profile install nixpkgs#ocm
provenance:
  formula: ocm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
