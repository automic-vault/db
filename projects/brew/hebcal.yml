id: brew:hebcal
display-name: hebcal
homepage: https://github.com/hebcal/hebcal
repo: https://github.com/hebcal/hebcal
docs: https://github.com/hebcal/hebcal
package-manager:
  brew: hebcal
  debian: hebcal
  nix: hebcal
  ubuntu: hebcal
package-manager-url: https://formulae.brew.sh/formula/hebcal
version: 5.9.8
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Perpetual Jewish calendar for the command-line
source-archive: https://github.com/hebcal/hebcal/archive/refs/tags/v5.9.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hebcal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hebcal
  brew: brew install hebcal
  debian: sudo apt install hebcal
  nix: nix profile install nixpkgs#hebcal
  ubuntu: sudo apt install hebcal
provenance:
  formula: hebcal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
