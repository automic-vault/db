id: brew:pmd
display-name: pmd
homepage: https://pmd.github.io
repo: https://github.com/pmd/pmd
docs: https://pmd.github.io
package-manager:
  brew: pmd
  chocolatey: pmd
  macports: pmd
  nix: pmd
package-manager-url: https://formulae.brew.sh/formula/pmd
version: 7.24.0
license: BSD-4-Clause
category: development
tags:
  - cli
description: Source code analyzer for Java, JavaScript, and more
source-archive: >
  https://github.com/pmd/pmd/releases/download/pmd_releases%2F7.24.0/pmd-dist-7.24.0-bin.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: pmd
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pmd
  brew: brew install pmd
  chocolatey: choco install pmd
  macports: sudo port install pmd
  nix: nix profile install nixpkgs#pmd
provenance:
  formula: pmd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
