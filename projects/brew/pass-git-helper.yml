id: brew:pass-git-helper
display-name: pass-git-helper
homepage: https://github.com/languitar/pass-git-helper
repo: https://github.com/languitar/pass-git-helper
docs: https://github.com/languitar/pass-git-helper
package-manager:
  apk: pass-git-helper
  brew: pass-git-helper
  debian: pass-git-helper
  nix: pass-git-helper
  ubuntu: pass-git-helper
package-manager-url: https://formulae.brew.sh/formula/pass-git-helper
version: 4.3.0
license: LGPL-3.0-or-later
category: development
tags:
  - cli
