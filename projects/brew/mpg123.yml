id: brew:mpg123
display-name: mpg123
homepage: https://www.mpg123.de/
repo: https://www.mpg123.de/download/mpg123-1.33.5.tar.bz2
docs: https://www.mpg123.de/
package-manager:
  apk: mpg123
  brew: mpg123
  debian: mpg123
  dnf: mpg123
  macports: mpg123
  nix: mpg123
  pacman: mpg123
  scoop: main/mpg123
  ubuntu: mpg123
  zypper: mpg123
package-manager-url: https://formulae.brew.sh/formula/mpg123
version: 1.33.5
license: LGPL-2.1-only
category: network
tags:
  - cli
description: MP3 player for Linux and UNIX
source-archive: https://www.mpg123.de/download/mpg123-1.33.5.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: mpg123
  - exposure: global executable
    kind: cli
    name: mpg123-id3dump
  - exposure: global executable
    kind: cli
    name: mpg123-strip
  - exposure: global executable
    kind: cli
    name: out123
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mpg123
  av: sudo av install brew:mpg123
  brew: brew install mpg123
  debian: sudo apt install mpg123
  dnf: sudo dnf install mpg123
  macports: sudo port install mpg123
  nix: nix profile install nixpkgs#mpg123
  pacman: sudo pacman -S mpg123
  scoop: scoop install main/mpg123
  ubuntu: sudo apt install mpg123
  zypper: sudo zypper install mpg123
provenance:
  formula: mpg123
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
