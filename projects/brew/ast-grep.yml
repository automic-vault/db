id: brew:ast-grep
display-name: ast-grep
homepage: https://github.com/ast-grep/ast-grep
repo: https://github.com/ast-grep/ast-grep
docs: https://github.com/ast-grep/ast-grep
package-manager:
  apk: ast-grep
  brew: ast-grep
  macports: ast-grep
  nix: ast-grep
  pacman: ast-grep
  scoop: main/ast-grep
  winget: ast-grep.ast-grep
  zypper: ast-grep
package-manager-url: https://formulae.brew.sh/formula/ast-grep
version: 0.43.0
license: MIT
category: development
tags:
  - cli
description: Code searching, linting, rewriting
source-archive: https://github.com/ast-grep/ast-grep/archive/refs/tags/0.43.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ast-grep
  - exposure: global executable
    kind: cli
    name: sg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ast-grep
  av: sudo av install brew:ast-grep
  brew: brew install ast-grep
  macports: sudo port install ast-grep
  nix: nix profile install nixpkgs#ast-grep
  pacman: sudo pacman -S ast-grep
  scoop: scoop install main/ast-grep
  winget: winget install --id ast-grep.ast-grep -e
  zypper: sudo zypper install ast-grep
provenance:
  formula: ast-grep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
