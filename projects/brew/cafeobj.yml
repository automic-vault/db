id: brew:cafeobj
display-name: cafeobj
homepage: https://cafeobj.org/
repo: https://github.com/CafeOBJ/cafeobj
docs: https://cafeobj.org/
package-manager:
  brew: cafeobj
  ubuntu: cafeobj
package-manager-url: https://formulae.brew.sh/formula/cafeobj
version: 1.6.2
license: BSD-2-Clause AND LicenseRef-Homebrew-public-domain AND MIT
category: development
tags:
  - cli
description: New generation algebraic specification and programming language
source-archive: https://github.com/CafeOBJ/cafeobj/archive/refs/tags/v1.6.2.tar.gz
dependencies:
  - zstd
build-dependencies:
  - sbcl
executables:
  - exposure: global executable
    kind: cli
    name: cafeobj
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:cafeobj
  brew: brew install cafeobj
  ubuntu: sudo apt install cafeobj
provenance:
  formula: cafeobj
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
