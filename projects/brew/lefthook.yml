id: brew:lefthook
display-name: lefthook
homepage: https://github.com/evilmartians/lefthook
repo: https://github.com/evilmartians/lefthook
docs: https://github.com/evilmartians/lefthook
package-manager:
  apk: lefthook
  brew: lefthook
  macports: lefthook
  nix: lefthook
  scoop: main/lefthook
  winget: evilmartians.lefthook
package-manager-url: https://formulae.brew.sh/formula/lefthook
version: 2.1.8
license: MIT
category: development
tags:
  - cli
  - git
description: Fast and powerful Git hooks manager for any type of projects
source-archive: https://github.com/evilmartians/lefthook/archive/refs/tags/v2.1.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lefthook
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lefthook
  av: sudo av install brew:lefthook
  brew: brew install lefthook
  macports: sudo port install lefthook
  nix: nix profile install nixpkgs#lefthook
  scoop: scoop install main/lefthook
  winget: winget install --id evilmartians.lefthook -e
provenance:
  formula: lefthook
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
