id: brew:mktorrent
display-name: mktorrent
homepage: https://github.com/pobrn/mktorrent/wiki
repo: https://github.com/pobrn/mktorrent
docs: https://github.com/pobrn/mktorrent/wiki
package-manager:
  apk: mktorrent
  brew: mktorrent
  debian: mktorrent
  dnf: mktorrent
  macports: mktorrent
  nix: mktorrent
  pacman: mktorrent
  ubuntu: mktorrent
  zypper: mktorrent
package-manager-url: https://formulae.brew.sh/formula/mktorrent
version: 1.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Create BitTorrent metainfo files
source-archive: https://github.com/pobrn/mktorrent/archive/refs/tags/v1.1.tar.gz
dependencies:
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: mktorrent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mktorrent
  av: sudo av install brew:mktorrent
  brew: brew install mktorrent
  debian: sudo apt install mktorrent
  dnf: sudo dnf install mktorrent
  macports: sudo port install mktorrent
  nix: nix profile install nixpkgs#mktorrent
  pacman: sudo pacman -S mktorrent
  ubuntu: sudo apt install mktorrent
  zypper: sudo zypper install mktorrent
provenance:
  formula: mktorrent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
