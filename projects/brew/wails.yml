id: brew:wails
display-name: wails
homepage: https://wails.io
repo: https://github.com/wailsapp/wails
docs: https://wails.io
package-manager:
  brew: wails
  macports: wails
  nix: wails
package-manager-url: https://formulae.brew.sh/formula/wails
version: 2.12.0
license: MIT
category: development
tags:
  - cli
description: Create beautiful applications using Go
source-archive: https://github.com/wailsapp/wails/archive/refs/tags/v2.12.0.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wails
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wails
  brew: brew install wails
  macports: sudo port install wails
  nix: nix profile install nixpkgs#wails
provenance:
  formula: wails
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
