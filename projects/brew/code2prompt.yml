id: brew:code2prompt
display-name: code2prompt
homepage: https://code2prompt.dev/
repo: https://github.com/mufeedvh/code2prompt
docs: https://code2prompt.dev/
package-manager:
  brew: code2prompt
  nix: code2prompt
package-manager-url: https://formulae.brew.sh/formula/code2prompt
version: 4.2.0
license: MIT
category: development
tags:
  - cli
description: CLI tool to convert your codebase into a single LLM prompt
source-archive: https://github.com/mufeedvh/code2prompt/archive/refs/tags/v4.2.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: code2prompt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:code2prompt
  brew: brew install code2prompt
  nix: nix profile install nixpkgs#code2prompt
provenance:
  formula: code2prompt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
