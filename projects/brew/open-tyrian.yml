id: brew:open-tyrian
display-name: open-tyrian
homepage: https://github.com/opentyrian/opentyrian
repo: https://github.com/opentyrian/opentyrian
docs: https://github.com/opentyrian/opentyrian
package-manager:
  brew: open-tyrian
  debian: opentyrian
  nix: opentyrian
  ubuntu: opentyrian
  zypper: opentyrian
package-manager-url: https://formulae.brew.sh/formula/open-tyrian
version: 2.1.20221123
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Open-source port of Tyrian
source-archive: https://github.com/opentyrian/opentyrian/archive/refs/tags/v2.1.20221123.tar.gz
dependencies:
  - sdl2
  - sdl2_net
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: opentyrian
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: Save games will be put in ~/.opentyrian
  post-install-defined: false
install-lines:
  av: sudo av install brew:open-tyrian
  brew: brew install open-tyrian
  debian: sudo apt install opentyrian
  nix: nix profile install nixpkgs#opentyrian
  ubuntu: sudo apt install opentyrian
  zypper: sudo zypper install opentyrian
provenance:
  formula: open-tyrian
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
