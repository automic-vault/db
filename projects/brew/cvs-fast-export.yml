id: brew:cvs-fast-export
display-name: cvs-fast-export
homepage: http://www.catb.org/~esr/cvs-fast-export/
repo: https://gitlab.com/esr/cvs-fast-export/-/archive/2.0/cvs-fast-export-2.0.tar.bz2
docs: http://www.catb.org/~esr/cvs-fast-export/
package-manager:
  apk: cvs-fast-export
  brew: cvs-fast-export
  debian: cvs-fast-export
  macports: cvs-fast-export
  nix: cvs-fast-export
  ubuntu: cvs-fast-export
package-manager-url: https://formulae.brew.sh/formula/cvs-fast-export
version: 2.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Export an RCS or CVS history as a fast-import stream
source-archive: https://gitlab.com/esr/cvs-fast-export/-/archive/2.0/cvs-fast-export-2.0.tar.bz2
build-dependencies:
  - asciidoctor
  - go
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: cvs-fast-export
  - exposure: global executable
    kind: cli
    name: cvsconvert
  - exposure: global executable
    kind: cli
    name: cvssync
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cvs-fast-export
  av: sudo av install brew:cvs-fast-export
  brew: brew install cvs-fast-export
  debian: sudo apt install cvs-fast-export
  macports: sudo port install cvs-fast-export
  nix: nix profile install nixpkgs#cvs-fast-export
  ubuntu: sudo apt install cvs-fast-export
provenance:
  formula: cvs-fast-export
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
