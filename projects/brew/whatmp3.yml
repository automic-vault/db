id: brew:whatmp3
display-name: whatmp3
homepage: https://github.com/RecursiveForest/whatmp3
repo: https://github.com/RecursiveForest/whatmp3
docs: https://github.com/RecursiveForest/whatmp3
package-manager:
  brew: whatmp3
package-manager-url: https://formulae.brew.sh/formula/whatmp3
version: 3.9
license: MIT
category: development
tags:
  - cli
description: Small script to create mp3 torrents out of FLACs
source-archive: https://github.com/RecursiveForest/whatmp3/archive/refs/tags/v3.9.tar.gz
dependencies:
  - flac
  - lame
  - mktorrent
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: whatmp3
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:whatmp3
  brew: brew install whatmp3
provenance:
  formula: whatmp3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
