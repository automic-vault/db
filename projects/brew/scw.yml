id: brew:scw
display-name: scw
homepage: https://www.scaleway.com/en/cli/
repo: https://github.com/scaleway/scaleway-cli
docs: https://www.scaleway.com/en/cli/
package-manager:
  brew: scw
  macports: scw
package-manager-url: https://formulae.brew.sh/formula/scw
version: 2.56.1
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line Interface for Scaleway
source-archive: https://github.com/scaleway/scaleway-cli/archive/refs/tags/v2.56.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: scw
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:scw
  brew: brew install scw
  macports: sudo port install scw
provenance:
  formula: scw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
