id: brew:ffmpeg2theora
display-name: ffmpeg2theora
homepage: https://gitlab.xiph.org/xiph/ffmpeg2theora
repo: https://gitlab.xiph.org/xiph/ffmpeg2theora/-/archive/0.30/ffmpeg2theora-0.30.tar.gz
docs: https://gitlab.xiph.org/xiph/ffmpeg2theora
package-manager:
  brew: ffmpeg2theora
package-manager-url: https://formulae.brew.sh/formula/ffmpeg2theora
version: 0.30
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Convert video files to Ogg Theora format
source-archive: https://gitlab.xiph.org/xiph/ffmpeg2theora/-/archive/0.30/ffmpeg2theora-0.30.tar.gz
dependencies:
  - ffmpeg@4
  - libkate
  - libogg
  - libvorbis
  - theora
build-dependencies:
  - pkgconf
  - scons
executables:
  - exposure: global executable
    kind: cli
    name: ffmpeg2theora
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ffmpeg2theora
  brew: brew install ffmpeg2theora
provenance:
  formula: ffmpeg2theora
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
