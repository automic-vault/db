id: brew:scorecard
display-name: scorecard
homepage: https://github.com/ossf/scorecard
repo: https://github.com/ossf/scorecard
docs: https://github.com/ossf/scorecard
package-manager:
  brew: scorecard
  nix: scorecard
package-manager-url: https://formulae.brew.sh/formula/scorecard
version: 5.5.0
license: Apache-2.0
category: security
tags:
  - cli
  - security
description: Security health metrics for Open Source
source-archive: https://github.com/ossf/scorecard.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: scorecard
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:scorecard
  brew: brew install scorecard
  nix: nix profile install nixpkgs#scorecard
provenance:
  formula: scorecard
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
