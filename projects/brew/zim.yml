id: brew:zim
display-name: zim
homepage: https://zim-wiki.org/
repo: https://github.com/zim-desktop-wiki/zim-desktop-wiki
docs: https://zim-wiki.org/
package-manager:
  apk: zim
  brew: zim
  debian: zim
  dnf: Zim
  macports: zim
  nix: zim
  pacman: zim
  scoop: extras/zim
  ubuntu: zim
  zypper: zim
package-manager-url: https://formulae.brew.sh/formula/zim
version: 0.76.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Graphical text editor used to maintain a collection of wiki pages
source-archive: https://github.com/zim-desktop-wiki/zim-desktop-wiki/archive/refs/tags/0.76.3.tar.gz
dependencies:
  - adwaita-icon-theme
  - graphviz
  - gtk+3
  - gtksourceview4
  - pygobject3
  - python@3.14
build-dependencies:
  - pkgconf
  - python-setuptools
executables:
  - exposure: global executable
    kind: cli
    name: zim
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zim
  av: sudo av install brew:zim
  brew: brew install zim
  debian: sudo apt install zim
  dnf: sudo dnf install Zim
  macports: sudo port install zim
  nix: nix profile install nixpkgs#zim
  pacman: sudo pacman -S zim
  scoop: scoop install extras/zim
  ubuntu: sudo apt install zim
  zypper: sudo zypper install zim
provenance:
  formula: zim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
