id: brew:pythran
display-name: pythran
homepage: https://pythran.readthedocs.io/
repo: >
  https://files.pythonhosted.org/packages/d4/84/17c4c44a24f5ec709991e603e601bf316d09c4fe915fbe348c689dede998/pythran-0.18.1.tar.gz
docs: https://pythran.readthedocs.io/
package-manager:
  apk: pythran
  brew: pythran
  dnf: pythran
package-manager-url: https://formulae.brew.sh/formula/pythran
version: 0.18.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Ahead of Time compiler for numeric kernels
source-archive: >
  https://files.pythonhosted.org/packages/d4/84/17c4c44a24f5ec709991e603e601bf316d09c4fe915fbe348c689dede998/pythran-0.18.1.tar.gz
dependencies:
  - boost
  - numpy
  - openblas
  - python@3.14
  - xsimd
executables:
  - exposure: global executable
    kind: cli
    name: pythran
  - exposure: global executable
    kind: cli
    name: pythran-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pythran
  av: sudo av install brew:pythran
  brew: brew install pythran
  dnf: sudo dnf install pythran
provenance:
  formula: pythran
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
