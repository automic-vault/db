id: brew:pip-audit
display-name: pip-audit
homepage: https://pypi.org/project/pip-audit/
repo: >
  https://files.pythonhosted.org/packages/bd/89/0e999b413facab81c33d118f3ac3739fd02c0622ccf7c4e82e37cebd8447/pip_audit-2.10.0.tar.gz
