id: brew:bowtie2
display-name: bowtie2
homepage: https://bowtie-bio.sourceforge.net/bowtie2/index.shtml
repo: https://github.com/BenLangmead/bowtie2
docs: https://bowtie-bio.sourceforge.net/bowtie2/index.shtml
package-manager:
  brew: bowtie2
  debian: bowtie2
  dnf: bowtie2
  macports: bowtie2
  nix: bowtie2
  ubuntu: bowtie2
  zypper: bowtie2
package-manager-url: https://formulae.brew.sh/formula/bowtie2
version: 2.5.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Fast and sensitive gapped read aligner
source-archive: https://github.com/BenLangmead/bowtie2/archive/refs/tags/v2.5.5.tar.gz
build-dependencies:
  - simde
uses-from-macos:
  - perl
  - python
executables:
  - exposure: global executable
    kind: cli
    name: bowtie2
  - exposure: global executable
    kind: cli
    name: bowtie2-align-l
  - exposure: global executable
    kind: cli
    name: bowtie2-align-s
  - exposure: global executable
    kind: cli
    name: bowtie2-build
  - exposure: global executable
    kind: cli
    name: bowtie2-build-l
  - exposure: global executable
    kind: cli
    name: bowtie2-build-s
  - exposure: global executable
    kind: cli
    name: bowtie2-inspect
  - exposure: global executable
    kind: cli
    name: bowtie2-inspect-l
  - exposure: global executable
    kind: cli
    name: bowtie2-inspect-s
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bowtie2
  brew: brew install bowtie2
  debian: sudo apt install bowtie2
  dnf: sudo dnf install bowtie2
  macports: sudo port install bowtie2
  nix: nix profile install nixpkgs#bowtie2
  ubuntu: sudo apt install bowtie2
  zypper: sudo zypper install bowtie2
provenance:
  formula: bowtie2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
