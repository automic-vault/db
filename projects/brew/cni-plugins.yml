id: brew:cni-plugins
display-name: cni-plugins
homepage: https://www.cni.dev
repo: https://github.com/containernetworking/plugins
docs: https://www.cni.dev
package-manager:
  apk: cni-plugins
  brew: cni-plugins
  debian: vlan
  macports: dhcp
  nix: cni-plugins
  pacman: cni-plugins
  ubuntu: vlan
  zypper: cni-plugins
package-manager-url: https://formulae.brew.sh/formula/cni-plugins
version: 1.9.1
license: Apache-2.0
category: development
tags:
  - cli
description: Container Network Interface plugins
source-archive: https://github.com/containernetworking/plugins/archive/refs/tags/v1.9.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bandwidth
  - exposure: global executable
    kind: cli
    name: dhcp
  - exposure: global executable
    kind: cli
    name: dummy
  - exposure: global executable
    kind: cli
    name: firewall
  - exposure: global executable
    kind: cli
    name: host-device
  - exposure: global executable
    kind: cli
    name: host-local
  - exposure: global executable
    kind: cli
    name: ipvlan
  - exposure: global executable
    kind: cli
    name: loopback
  - exposure: global executable
    kind: cli
    name: macvlan
  - exposure: global executable
    kind: cli
    name: portmap
  - exposure: global executable
    kind: cli
    name: ptp
  - exposure: global executable
    kind: cli
    name: sbr
  - exposure: global executable
    kind: cli
    name: static
  - exposure: global executable
    kind: cli
    name: tap
  - exposure: global executable
    kind: cli
    name: tuning
  - exposure: global executable
    kind: cli
    name: vlan
  - exposure: global executable
    kind: cli
    name: vrf
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cni-plugins
  av: sudo av install brew:cni-plugins
  brew: brew install cni-plugins
  debian: sudo apt install vlan
  macports: sudo port install dhcp
  nix: nix profile install nixpkgs#cni-plugins
  pacman: sudo pacman -S cni-plugins
  ubuntu: sudo apt install vlan
  zypper: sudo zypper install cni-plugins
provenance:
  formula: cni-plugins
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
