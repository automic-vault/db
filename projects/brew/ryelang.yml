id: brew:ryelang
display-name: ryelang
homepage: https://ryelang.org/
repo: https://github.com/refaktor/rye
docs: https://ryelang.org/
package-manager:
  brew: ryelang
package-manager-url: https://formulae.brew.sh/formula/ryelang
version: 0.2.8
license: BSD-3-Clause
category: development
tags:
  - cli
description: Rye is a homoiconic programming language focused on fluid expressions
source-archive: https://github.com/refaktor/rye/archive/refs/tags/v0.2.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ryelang
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ryelang
  brew: brew install ryelang
provenance:
  formula: ryelang
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
