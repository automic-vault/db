id: brew:findent
display-name: findent
homepage: https://www.ratrabbit.nl/ratrabbit/findent/index.html
repo: https://downloads.sourceforge.net/project/findent/findent-4.3.7.tar.gz
docs: https://www.ratrabbit.nl/ratrabbit/findent/index.html
package-manager:
  brew: findent
  debian: findent
  nix: findent
  ubuntu: findent
package-manager-url: https://formulae.brew.sh/formula/findent
version: 4.3.7
license: BSD-3-Clause
category: development
tags:
  - cli
description: Indent and beautify Fortran sources and generate dependency information
source-archive: https://downloads.sourceforge.net/project/findent/findent-4.3.7.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: findent
  - exposure: global executable
    kind: cli
    name: wfindent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:findent
  brew: brew install findent
  debian: sudo apt install findent
  nix: nix profile install nixpkgs#findent
  ubuntu: sudo apt install findent
provenance:
  formula: findent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
