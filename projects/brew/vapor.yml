id: brew:vapor
display-name: vapor
homepage: https://vapor.codes
repo: https://github.com/vapor/toolbox
docs: https://vapor.codes
package-manager:
  brew: vapor
  macports: vapor
package-manager-url: https://formulae.brew.sh/formula/vapor
version: 20.0.0
license: MIT
category: development
tags:
  - cli
description: Command-line tool for Vapor (Server-side Swift web framework)
source-archive: https://github.com/vapor/toolbox/archive/refs/tags/20.0.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: vapor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vapor
  brew: brew install vapor
  macports: sudo port install vapor
provenance:
  formula: vapor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
