id: brew:packmol
display-name: packmol
homepage: https://www.ime.unicamp.br/~martinez/packmol/
repo: https://github.com/m3g/packmol
docs: https://www.ime.unicamp.br/~martinez/packmol/
package-manager:
  brew: packmol
  debian: packmol
  dnf: packmol
  ubuntu: packmol
package-manager-url: https://formulae.brew.sh/formula/packmol
version: 21.2.1
license: MIT
category: development
tags:
  - cli
description: Packing optimization for molecular dynamics simulations
source-archive: https://github.com/m3g/packmol/archive/refs/tags/v21.2.1.tar.gz
dependencies:
  - gcc
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: packmol
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:packmol
  brew: brew install packmol
  debian: sudo apt install packmol
  dnf: sudo dnf install packmol
  ubuntu: sudo apt install packmol
provenance:
  formula: packmol
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
