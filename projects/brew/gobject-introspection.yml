id: brew:gobject-introspection
display-name: gobject-introspection
homepage: https://gi.readthedocs.io/en/latest/
repo: >
  https://download.gnome.org/sources/gobject-introspection/1.86/gobject-introspection-1.86.0.tar.xz
docs: https://gi.readthedocs.io/en/latest/
package-manager:
  apk: gobject-introspection
  brew: gobject-introspection
  debian: gobject-introspection
  dnf: gobject-introspection
  macports: gobject-introspection
  nix: gobject-introspection
  pacman: gobject-introspection
  ubuntu: gobject-introspection
  zypper: gobject-introspection
package-manager-url: https://formulae.brew.sh/formula/gobject-introspection
version: 1.86.0
license: GPL-2.0-or-later AND LGPL-2.0-or-later AND MIT
category: network
tags:
  - cli
description: Generate introspection data for GObject libraries
source-archive: >
  https://download.gnome.org/sources/gobject-introspection/1.86/gobject-introspection-1.86.0.tar.xz
dependencies:
  - cairo
  - glib
  - pkgconf
  - python@3.14
build-dependencies:
  - bison
  - meson
  - ninja
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: g-ir-annotation-tool
  - exposure: global executable
    kind: cli
    name: g-ir-compiler
  - exposure: global executable
    kind: cli
    name: g-ir-doc-tool
  - exposure: global executable
    kind: cli
    name: g-ir-generate
  - exposure: global executable
    kind: cli
    name: g-ir-inspect
  - exposure: global executable
    kind: cli
    name: g-ir-scanner
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gobject-introspection
  av: sudo av install brew:gobject-introspection
  brew: brew install gobject-introspection
  debian: sudo apt install gobject-introspection
  dnf: sudo dnf install gobject-introspection
  macports: sudo port install gobject-introspection
  nix: nix profile install nixpkgs#gobject-introspection
  pacman: sudo pacman -S gobject-introspection
  ubuntu: sudo apt install gobject-introspection
  zypper: sudo zypper install gobject-introspection
provenance:
  formula: gobject-introspection
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
