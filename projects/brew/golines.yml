id: brew:golines
display-name: golines
homepage: https://github.com/segmentio/golines
repo: https://github.com/segmentio/golines
docs: https://github.com/segmentio/golines
package-manager:
  brew: golines
  macports: golines
  nix: golines
package-manager-url: https://formulae.brew.sh/formula/golines
version: 0.13.0
license: MIT
category: development
tags:
  - cli
description: Golang formatter that fixes long lines
source-archive: https://github.com/segmentio/golines/archive/refs/tags/v0.13.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: golines
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:golines
  brew: brew install golines
  macports: sudo port install golines
  nix: nix profile install nixpkgs#golines
provenance:
  formula: golines
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
