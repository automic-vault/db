id: brew:boringtun
display-name: boringtun
homepage: https://github.com/cloudflare/boringtun
repo: https://github.com/cloudflare/boringtun
docs: https://github.com/cloudflare/boringtun
package-manager:
  brew: boringtun
  nix: boringtun
package-manager-url: https://formulae.brew.sh/formula/boringtun
version: 0.7.1
license: BSD-3-Clause
category: cloud
tags:
  - cli
description: Userspace WireGuard implementation in Rust
source-archive: https://github.com/cloudflare/boringtun/archive/refs/tags/boringtun-0.7.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: boringtun-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    boringtun-cli requires root privileges so you will need to run `sudo boringtun-cli
    utun`. You should be certain that you trust any software you grant root privileges.
  post-install-defined: false
install-lines:
  av: sudo av install brew:boringtun
  brew: brew install boringtun
  nix: nix profile install nixpkgs#boringtun
provenance:
  formula: boringtun
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
