id: brew:vcprompt
display-name: vcprompt
homepage: https://github.com/powerman/vcprompt
repo: https://github.com/powerman/vcprompt
docs: https://github.com/powerman/vcprompt
package-manager:
  brew: vcprompt
  nix: vcprompt
package-manager-url: https://formulae.brew.sh/formula/vcprompt
version: 1.3.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Provide version control info in shell prompts
source-archive: https://github.com/powerman/vcprompt/archive/refs/tags/v1.3.0.tar.gz
dependencies:
  - sqlite
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: vcprompt
  - exposure: global executable
    kind: cli
    name: vcprompt-hgst
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vcprompt
  brew: brew install vcprompt
  nix: nix profile install nixpkgs#vcprompt
provenance:
  formula: vcprompt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
