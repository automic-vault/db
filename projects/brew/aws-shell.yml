id: brew:aws-shell
display-name: aws-shell
homepage: https://github.com/awslabs/aws-shell
repo: >
  https://files.pythonhosted.org/packages/01/31/ee166a91c865a855af4f15e393974eadf57762629fc2a163a3eb3f470ac5/aws-shell-0.2.2.tar.gz
docs: https://github.com/awslabs/aws-shell
package-manager:
