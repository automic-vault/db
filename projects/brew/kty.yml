id: brew:kty
display-name: kty
homepage: https://kty.dev
repo: https://github.com/grampelberg/kty
docs: https://kty.dev
package-manager:
  brew: kty
  macports: kty
  nix: kty
package-manager-url: https://formulae.brew.sh/formula/kty
version: 0.3.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Terminal for Kubernetes
source-archive: https://github.com/grampelberg/kty/archive/refs/tags/v0.3.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: kty
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kty
  brew: brew install kty
  macports: sudo port install kty
  nix: nix profile install nixpkgs#kty
provenance:
  formula: kty
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
