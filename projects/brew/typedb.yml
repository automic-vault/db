id: brew:typedb
display-name: typedb
homepage: https://typedb.com/
repo: https://github.com/typedb/typedb
docs: https://typedb.com/
package-manager:
  brew: typedb
package-manager-url: https://formulae.brew.sh/formula/typedb
version: 3.11.1
license: MPL-2.0
category: database
tags:
  - cli
  - database
description: Strongly-typed database with a rich and logical type system
source-archive: https://github.com/typedb/typedb/archive/refs/tags/3.11.1.tar.gz
build-dependencies:
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: typedb
  - exposure: global executable
    kind: cli
    name: typedb_server_bin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:typedb
  brew: brew install typedb
provenance:
  formula: typedb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
