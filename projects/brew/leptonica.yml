id: brew:leptonica
display-name: leptonica
homepage: http://www.leptonica.org/
repo: https://github.com/DanBloomberg/leptonica
docs: http://www.leptonica.org/
package-manager:
  apk: leptonica
  brew: leptonica
  dnf: leptonica
  macports: leptonica
  nix: leptonica
  pacman: leptonica
package-manager-url: https://formulae.brew.sh/formula/leptonica
version: 1.87.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Image processing and image analysis library
source-archive: >
  https://github.com/DanBloomberg/leptonica/releases/download/1.87.0/leptonica-1.87.0.tar.gz
dependencies:
  - giflib
  - jpeg-turbo
  - libpng
  - libtiff
  - openjpeg
  - webp
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: convertfilestopdf
  - exposure: global executable
    kind: cli
    name: convertfilestops
  - exposure: global executable
    kind: cli
    name: convertformat
  - exposure: global executable
    kind: cli
    name: convertsegfilestopdf
  - exposure: global executable
    kind: cli
    name: convertsegfilestops
  - exposure: global executable
    kind: cli
    name: converttopdf
  - exposure: global executable
    kind: cli
    name: converttops
  - exposure: global executable
    kind: cli
    name: fileinfo
  - exposure: global executable
    kind: cli
    name: imagetops
  - exposure: global executable
    kind: cli
    name: xtractprotos
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add leptonica
  av: sudo av install brew:leptonica
  brew: brew install leptonica
  dnf: sudo dnf install leptonica
  macports: sudo port install leptonica
  nix: nix profile install nixpkgs#leptonica
  pacman: sudo pacman -S leptonica
provenance:
  formula: leptonica
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
