id: brew:flashrom
display-name: flashrom
homepage: https://flashrom.org/
repo: https://download.flashrom.org/releases/flashrom-v1.7.0.tar.xz
docs: https://flashrom.org/
package-manager:
  apk: flashrom
  brew: flashrom
  debian: flashrom
  dnf: flashrom
  macports: flashrom
  nix: flashrom
  pacman: flashrom
  ubuntu: flashrom
  zypper: flashrom
package-manager-url: https://formulae.brew.sh/formula/flashrom
version: 1.7.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Identify, read, write, verify, and erase flash chips
source-archive: https://download.flashrom.org/releases/flashrom-v1.7.0.tar.xz
dependencies:
  - libftdi
  - libusb
  - openssl@3
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: flashrom
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add flashrom
  av: sudo av install brew:flashrom
  brew: brew install flashrom
  debian: sudo apt install flashrom
  dnf: sudo dnf install flashrom
  macports: sudo port install flashrom
  nix: nix profile install nixpkgs#flashrom
  pacman: sudo pacman -S flashrom
  ubuntu: sudo apt install flashrom
  zypper: sudo zypper install flashrom
provenance:
  formula: flashrom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
