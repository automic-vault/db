id: brew:goenv
display-name: goenv
homepage: https://github.com/go-nv/goenv
repo: https://github.com/go-nv/goenv
docs: https://github.com/go-nv/goenv
package-manager:
  brew: goenv
package-manager-url: https://formulae.brew.sh/formula/goenv
version: 3.1.1
license: MIT
category: development
tags:
  - cli
description: Go version management
source-archive: https://github.com/go-nv/goenv/archive/refs/tags/3.1.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goenv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    If you are upgrading from goenv v2, you may need to remove the stale shim: rm -f
    "${GOENV_ROOT:-$HOME/.goenv}/shims/goenv"
  post-install-defined: false
install-lines:
  av: sudo av install brew:goenv
  brew: brew install goenv
provenance:
  formula: goenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
