id: brew:cargo-public-api
display-name: cargo-public-api
homepage: https://github.com/cargo-public-api/cargo-public-api
repo: https://github.com/cargo-public-api/cargo-public-api
docs: https://github.com/cargo-public-api/cargo-public-api
package-manager:
  brew: cargo-public-api
  nix: cargo-public-api
  pacman: cargo-public-api
package-manager-url: https://formulae.brew.sh/formula/cargo-public-api
version: 0.52.0
license: MIT
category: development
tags:
  - cli
description: List and diff the public API of Rust library crates
source-archive: https://github.com/cargo-public-api/cargo-public-api/archive/refs/tags/v0.52.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: cargo-public-api
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-public-api
  brew: brew install cargo-public-api
  nix: nix profile install nixpkgs#cargo-public-api
  pacman: sudo pacman -S cargo-public-api
provenance:
  formula: cargo-public-api
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
