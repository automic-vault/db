id: brew:firebase-cli
display-name: firebase-cli
homepage: https://firebase.google.com/docs/cli/
repo: https://registry.npmjs.org/firebase-tools/-/firebase-tools-15.18.0.tgz
docs: https://firebase.google.com/docs/cli/
package-manager:
  brew: firebase-cli
  scoop: main/firebase
  winget: Google.FirebaseCLI
package-manager-url: https://formulae.brew.sh/formula/firebase-cli
version: 15.18.0
license: MIT
category: network
tags:
  - cli
description: Firebase command-line tools
source-archive: https://registry.npmjs.org/firebase-tools/-/firebase-tools-15.18.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: firebase
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:firebase-cli
  brew: brew install firebase-cli
  scoop: scoop install main/firebase
  winget: winget install --id Google.FirebaseCLI -e
provenance:
  formula: firebase-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
