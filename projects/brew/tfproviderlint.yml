id: brew:tfproviderlint
display-name: tfproviderlint
homepage: https://github.com/bflad/tfproviderlint
repo: https://github.com/bflad/tfproviderlint
docs: https://github.com/bflad/tfproviderlint
package-manager:
  brew: tfproviderlint
package-manager-url: https://formulae.brew.sh/formula/tfproviderlint
version: 0.31.0
license: MPL-2.0
category: cloud
tags:
  - cli
description: Terraform Provider Lint Tool
source-archive: https://github.com/bflad/tfproviderlint/archive/refs/tags/v0.31.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tfproviderlint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tfproviderlint
  brew: brew install tfproviderlint
provenance:
  formula: tfproviderlint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
