id: brew:leapp-cli
display-name: leapp-cli
homepage: https://github.com/noovolari/leapp
repo: https://registry.npmjs.org/@noovolari/leapp-cli/-/leapp-cli-0.1.65.tgz
docs: https://github.com/noovolari/leapp
package-manager:
  brew: leapp-cli
package-manager-url: https://formulae.brew.sh/formula/leapp-cli
version: 0.1.65
license: MPL-2.0
category: cloud
tags:
  - cli
  - cloud
description: Cloud credentials manager cli
source-archive: https://registry.npmjs.org/@noovolari/leapp-cli/-/leapp-cli-0.1.65.tgz
dependencies:
  - node
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: leapp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Only the `leap` CLI is installed. For Leapp.app: brew install --cask leapp'
  post-install-defined: false
install-lines:
  av: sudo av install brew:leapp-cli
  brew: brew install leapp-cli
provenance:
  formula: leapp-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
