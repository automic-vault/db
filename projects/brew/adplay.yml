id: brew:adplay
display-name: adplay
homepage: https://adplug.github.io
repo: https://github.com/adplug/adplay-unix
docs: https://adplug.github.io
package-manager:
  brew: adplay
  debian: adplay
  ubuntu: adplay
package-manager-url: https://formulae.brew.sh/formula/adplay
version: 1.9
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Command-line player for OPL2 music
source-archive: https://github.com/adplug/adplay-unix/releases/download/v1.9/adplay-1.9.tar.bz2
dependencies:
  - adplug
  - libbinio
  - sdl2
build-dependencies:
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: adplay
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:adplay
  brew: brew install adplay
  debian: sudo apt install adplay
  ubuntu: sudo apt install adplay
provenance:
  formula: adplay
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
