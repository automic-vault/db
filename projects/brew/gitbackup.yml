id: brew:gitbackup
display-name: gitbackup
homepage: https://github.com/amitsaha/gitbackup
repo: https://github.com/amitsaha/gitbackup
docs: https://github.com/amitsaha/gitbackup
package-manager:
  brew: gitbackup
package-manager-url: https://formulae.brew.sh/formula/gitbackup
version: 1.1
license: MIT
category: development
tags:
  - cli
description: Tool to backup your Bitbucket, GitHub and GitLab repositories
source-archive: https://github.com/amitsaha/gitbackup/archive/refs/tags/v1.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gitbackup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gitbackup
  brew: brew install gitbackup
provenance:
  formula: gitbackup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
