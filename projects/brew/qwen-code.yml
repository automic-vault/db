id: brew:qwen-code
display-name: qwen-code
homepage: https://github.com/QwenLM/qwen-code
repo: https://registry.npmjs.org/@qwen-code/qwen-code/-/qwen-code-0.16.1.tgz
docs: https://github.com/QwenLM/qwen-code
package-manager:
  brew: qwen-code
  nix: qwen-code
  pacman: qwen-code
  winget: Alibaba.Qwen
package-manager-url: https://formulae.brew.sh/formula/qwen-code
version: 0.16.1
license: Apache-2.0
category: development
tags:
  - cli
description: AI-powered command-line workflow tool for developers
source-archive: https://registry.npmjs.org/@qwen-code/qwen-code/-/qwen-code-0.16.1.tgz
dependencies:
  - node
  - ripgrep
executables:
  - exposure: global executable
    kind: cli
    name: qwen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qwen-code
  brew: brew install qwen-code
  nix: nix profile install nixpkgs#qwen-code
  pacman: sudo pacman -S qwen-code
  winget: winget install --id Alibaba.Qwen -e
provenance:
  formula: qwen-code
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
