id: brew:brotli
display-name: brotli
homepage: https://github.com/google/brotli
repo: https://github.com/google/brotli
docs: https://github.com/google/brotli
package-manager:
  apk: brotli
  brew: brotli
  debian: brotli
  dnf: brotli
  macports: brotli
  nix: brotli
  pacman: brotli
  scoop: main/brotli
  ubuntu: brotli
  winget: Google.Brotli
  zypper: brotli
package-manager-url: https://formulae.brew.sh/formula/brotli
version: 1.2.0
license: MIT
category: security
tags:
  - cli
description: Generic-purpose lossless compression algorithm by Google
source-archive: https://github.com/google/brotli/archive/refs/tags/v1.2.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: brotli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add brotli
  av: sudo av install brew:brotli
  brew: brew install brotli
  debian: sudo apt install brotli
  dnf: sudo dnf install brotli
  macports: sudo port install brotli
  nix: nix profile install nixpkgs#brotli
  pacman: sudo pacman -S brotli
  scoop: scoop install main/brotli
  ubuntu: sudo apt install brotli
  winget: winget install --id Google.Brotli -e
  zypper: sudo zypper install brotli
provenance:
  formula: brotli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
