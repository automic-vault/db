id: brew:victoriametrics
display-name: victoriametrics
homepage: https://victoriametrics.com/
repo: https://github.com/VictoriaMetrics/VictoriaMetrics
docs: https://victoriametrics.com/
package-manager:
  apk: victoria-metrics
  brew: victoriametrics
  debian: victoria-metrics
  nix: victoriametrics
  ubuntu: victoria-metrics
package-manager-url: https://formulae.brew.sh/formula/victoriametrics
version: 1.144.0
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Cost-effective and scalable monitoring solution and time series database
source-archive: https://github.com/VictoriaMetrics/VictoriaMetrics/archive/refs/tags/v1.144.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: victoria-metrics
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add victoria-metrics
  av: sudo av install brew:victoriametrics
  brew: brew install victoriametrics
  debian: sudo apt install victoria-metrics
  nix: nix profile install nixpkgs#victoriametrics
  ubuntu: sudo apt install victoria-metrics
provenance:
  formula: victoriametrics
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
