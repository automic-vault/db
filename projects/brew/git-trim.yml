id: brew:git-trim
display-name: git-trim
homepage: https://github.com/foriequal0/git-trim
repo: https://github.com/foriequal0/git-trim
docs: https://github.com/foriequal0/git-trim
package-manager:
  brew: git-trim
  nix: git-trim
package-manager-url: https://formulae.brew.sh/formula/git-trim
version: 0.4.4
license: MIT
category: development
tags:
  - cli
  - git
description: Trim your git remote tracking branches that are merged or gone
source-archive: https://github.com/foriequal0/git-trim.git
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: git-trim
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-trim
  brew: brew install git-trim
  nix: nix profile install nixpkgs#git-trim
provenance:
  formula: git-trim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
