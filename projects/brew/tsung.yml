id: brew:tsung
display-name: tsung
homepage: https://github.com/processone/tsung
repo: https://github.com/processone/tsung
docs: https://github.com/processone/tsung
package-manager:
  apk: tsung
  brew: tsung
  dnf: tsung
  macports: tsung
  nix: tsung
  ubuntu: tsung
  zypper: tsung
package-manager-url: https://formulae.brew.sh/formula/tsung
version: 1.8.0
license: GPL-2.0-or-later
category: database
tags:
  - cli
description: Load testing for HTTP, PostgreSQL, Jabber, and others
source-archive: https://github.com/processone/tsung/archive/refs/tags/v1.8.0.tar.gz
dependencies:
  - erlang
  - gnuplot
executables:
  - exposure: global executable
    kind: cli
    name: tsplot
  - exposure: global executable
    kind: cli
    name: tsung
  - exposure: global executable
    kind: cli
    name: tsung-recorder
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tsung
  av: sudo av install brew:tsung
  brew: brew install tsung
  dnf: sudo dnf install tsung
  macports: sudo port install tsung
  nix: nix profile install nixpkgs#tsung
  ubuntu: sudo apt install tsung
  zypper: sudo zypper install tsung
provenance:
  formula: tsung
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
