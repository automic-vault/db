id: brew:strongswan
display-name: strongswan
homepage: https://www.strongswan.org
repo: https://download.strongswan.org/strongswan-6.0.6.tar.bz2
docs: https://www.strongswan.org
package-manager:
  apk: strongswan
  brew: strongswan
  debian: strongswan
  dnf: strongswan
  nix: strongswan
  pacman: strongswan
  ubuntu: strongswan
  zypper: strongswan
package-manager-url: https://formulae.brew.sh/formula/strongswan
version: 6.0.6
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: VPN based on IPsec
source-archive: https://download.strongswan.org/strongswan-6.0.6.tar.bz2
dependencies:
  - openssl@3
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: charon-cmd
  - exposure: global executable
    kind: cli
    name: ipsec
  - exposure: global executable
    kind: cli
    name: pki
  - exposure: global executable
    kind: cli
    name: swanctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: You will have to run both "ipsec" and "charon-cmd" with "sudo".
  post-install-defined: false
install-lines:
  apk: sudo apk add strongswan
  av: sudo av install brew:strongswan
  brew: brew install strongswan
  debian: sudo apt install strongswan
  dnf: sudo dnf install strongswan
  nix: nix profile install nixpkgs#strongswan
  pacman: sudo pacman -S strongswan
  ubuntu: sudo apt install strongswan
  zypper: sudo zypper install strongswan
provenance:
  formula: strongswan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
