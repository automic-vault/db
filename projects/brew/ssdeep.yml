id: brew:ssdeep
display-name: ssdeep
homepage: https://ssdeep-project.github.io/ssdeep/
repo: https://github.com/ssdeep-project/ssdeep
docs: https://ssdeep-project.github.io/ssdeep/
package-manager:
  apk: ssdeep
  brew: ssdeep
  debian: ssdeep
  dnf: ssdeep
  macports: ssdeep
  nix: ssdeep
  pacman: ssdeep
  ubuntu: ssdeep
  zypper: ssdeep
package-manager-url: https://formulae.brew.sh/formula/ssdeep
version: 2.14.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Recursive piecewise hashing tool
source-archive: >
  https://github.com/ssdeep-project/ssdeep/releases/download/release-2.14.1/ssdeep-2.14.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ssdeep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ssdeep
  av: sudo av install brew:ssdeep
  brew: brew install ssdeep
  debian: sudo apt install ssdeep
  dnf: sudo dnf install ssdeep
  macports: sudo port install ssdeep
  nix: nix profile install nixpkgs#ssdeep
  pacman: sudo pacman -S ssdeep
  ubuntu: sudo apt install ssdeep
  zypper: sudo zypper install ssdeep
provenance:
  formula: ssdeep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
