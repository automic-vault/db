id: brew:fricas
display-name: fricas
homepage: https://fricas.github.io
repo: https://github.com/fricas/fricas
docs: https://fricas.github.io
package-manager:
  brew: fricas
  debian: fricas
  macports: fricas
  nix: fricas
  pacman: fricas
  scoop: extras/fricas
  ubuntu: fricas
package-manager-url: https://formulae.brew.sh/formula/fricas
version: 1.3.13
license: BSD-3-Clause
category: development
tags:
  - cli
description: Advanced computer algebra system
source-archive: https://github.com/fricas/fricas/archive/refs/tags/1.3.13.tar.gz
dependencies:
  - gmp
  - libice
  - libsm
  - libx11
  - libxau
  - libxdmcp
  - libxpm
  - libxt
  - sbcl
  - zstd
executables:
  - exposure: global executable
    kind: cli
    name: efricas
  - exposure: global executable
    kind: cli
    name: fricas
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fricas
  brew: brew install fricas
  debian: sudo apt install fricas
  macports: sudo port install fricas
  nix: nix profile install nixpkgs#fricas
  pacman: sudo pacman -S fricas
  scoop: scoop install extras/fricas
  ubuntu: sudo apt install fricas
provenance:
  formula: fricas
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
