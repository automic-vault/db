id: brew:wasm-tools
display-name: wasm-tools
homepage: https://github.com/bytecodealliance/wasm-tools
repo: https://github.com/bytecodealliance/wasm-tools
docs: https://github.com/bytecodealliance/wasm-tools
package-manager:
  apk: wasm-tools
  brew: wasm-tools
  nix: wasm-tools
  pacman: wasm-tools
package-manager-url: https://formulae.brew.sh/formula/wasm-tools
version: 1.250.0
license: Apache-2.0 WITH LLVM-exception
category: development
tags:
  - cli
description: Low level tooling for WebAssembly in Rust
source-archive: https://github.com/bytecodealliance/wasm-tools/archive/refs/tags/v1.250.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: wasm-tools
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wasm-tools
  av: sudo av install brew:wasm-tools
  brew: brew install wasm-tools
  nix: nix profile install nixpkgs#wasm-tools
  pacman: sudo pacman -S wasm-tools
provenance:
  formula: wasm-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
