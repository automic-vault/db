id: brew:matterbridge
display-name: matterbridge
homepage: https://github.com/42wim/matterbridge
repo: https://github.com/42wim/matterbridge
docs: https://github.com/42wim/matterbridge
package-manager:
  apk: matterbridge
  brew: matterbridge
  dnf: matterbridge
  macports: matterbridge
  nix: matterbridge
  pacman: matterbridge
  scoop: extras/matterbridge
package-manager-url: https://formulae.brew.sh/formula/matterbridge
version: 1.26.0
license: Apache-2.0
category: development
tags:
  - cli
description: Protocol bridge for multiple chat platforms
source-archive: https://github.com/42wim/matterbridge/archive/refs/tags/v1.26.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: matterbridge
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add matterbridge
  av: sudo av install brew:matterbridge
  brew: brew install matterbridge
  dnf: sudo dnf install matterbridge
  macports: sudo port install matterbridge
  nix: nix profile install nixpkgs#matterbridge
  pacman: sudo pacman -S matterbridge
  scoop: scoop install extras/matterbridge
provenance:
  formula: matterbridge
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
