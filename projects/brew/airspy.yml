id: brew:airspy
display-name: airspy
homepage: https://airspy.com/
repo: https://github.com/airspy/airspyone_host
docs: https://airspy.com/
package-manager:
  brew: airspy
  debian: airspy
  macports: airspy
  nix: airspy
  pacman: airspy
  ubuntu: airspy
  zypper: airspy
package-manager-url: https://formulae.brew.sh/formula/airspy
version: 1.0.10
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Driver and tools for a software-defined radio
source-archive: https://github.com/airspy/airspyone_host/archive/refs/tags/v1.0.10.tar.gz
dependencies:
  - libusb
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: airspy_gpio
  - exposure: global executable
    kind: cli
    name: airspy_gpiodir
  - exposure: global executable
    kind: cli
    name: airspy_info
  - exposure: global executable
    kind: cli
    name: airspy_lib_version
  - exposure: global executable
    kind: cli
    name: airspy_r820t
  - exposure: global executable
    kind: cli
    name: airspy_rx
  - exposure: global executable
    kind: cli
    name: airspy_si5351c
  - exposure: global executable
    kind: cli
    name: airspy_spiflash
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:airspy
  brew: brew install airspy
  debian: sudo apt install airspy
  macports: sudo port install airspy
  nix: nix profile install nixpkgs#airspy
  pacman: sudo pacman -S airspy
  ubuntu: sudo apt install airspy
  zypper: sudo zypper install airspy
provenance:
  formula: airspy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
