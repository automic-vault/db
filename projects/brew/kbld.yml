id: brew:kbld
display-name: kbld
homepage: https://carvel.dev/kbld/
repo: https://github.com/carvel-dev/kbld
docs: https://carvel.dev/kbld/
package-manager:
  brew: kbld
  nix: kbld
package-manager-url: https://formulae.brew.sh/formula/kbld
version: 0.48.0
license: Apache-2.0
category: development
tags:
  - cli
description: Tool for building and pushing container images in development workflows
source-archive: https://github.com/carvel-dev/kbld/archive/refs/tags/v0.48.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kbld
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kbld
  brew: brew install kbld
  nix: nix profile install nixpkgs#kbld
provenance:
  formula: kbld
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
