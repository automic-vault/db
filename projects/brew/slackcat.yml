id: brew:slackcat
display-name: slackcat
homepage: https://github.com/bcicen/slackcat
repo: https://github.com/bcicen/slackcat
docs: https://github.com/bcicen/slackcat
package-manager:
  brew: slackcat
package-manager-url: https://formulae.brew.sh/formula/slackcat
version: 1.7.3
license: MIT
category: development
tags:
  - cli
description: Command-line utility for posting snippets to Slack
source-archive: https://github.com/bcicen/slackcat/archive/refs/tags/1.7.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: slackcat
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:slackcat
  brew: brew install slackcat
provenance:
  formula: slackcat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
