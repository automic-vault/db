id: brew:sic
display-name: sic
homepage: https://tools.suckless.org/sic/
repo: https://dl.suckless.org/tools/sic-1.3.tar.gz
docs: https://tools.suckless.org/sic/
package-manager:
  apk: sic
  brew: sic
  debian: sic
  macports: sic
  nix: sic
  ubuntu: sic
  winget: Oire.Sic
package-manager-url: https://formulae.brew.sh/formula/sic
version: 1.3
license: MIT
category: network
tags:
  - cli
description: Minimal multiplexing IRC client
source-archive: https://dl.suckless.org/tools/sic-1.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: sic
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sic
  av: sudo av install brew:sic
  brew: brew install sic
  debian: sudo apt install sic
  macports: sudo port install sic
  nix: nix profile install nixpkgs#sic
  ubuntu: sudo apt install sic
  winget: winget install --id Oire.Sic -e
provenance:
  formula: sic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
