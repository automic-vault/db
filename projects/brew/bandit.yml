  - security
description: Security-oriented static analyser for Python code
source-archive: >
  https://files.pythonhosted.org/packages/aa/c3/0cb80dfe0f3076e5da7e4c5ad8e57bac6ac357ff4a6406205501cade4965/bandit-1.9.4.tar.gz
dependencies:
  - libyaml
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: bandit
  - exposure: global executable
    kind: cli
    name: bandit-baseline
