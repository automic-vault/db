id: brew:bandit
display-name: bandit
homepage: https://github.com/PyCQA/bandit
repo: >
  https://files.pythonhosted.org/packages/aa/c3/0cb80dfe0f3076e5da7e4c5ad8e57bac6ac357ff4a6406205501cade4965/bandit-1.9.4.tar.gz
docs: https://github.com/PyCQA/bandit
package-manager:
  brew: bandit
  debian: bandit
