id: brew:chadwick
display-name: chadwick
homepage: https://chadwick.readthedocs.io
repo: https://github.com/chadwickbureau/chadwick
docs: https://chadwick.readthedocs.io
package-manager:
  brew: chadwick
package-manager-url: https://formulae.brew.sh/formula/chadwick
version: 0.10.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Tools for manipulating baseball data
source-archive: >
  https://github.com/chadwickbureau/chadwick/releases/download/v0.10.0/chadwick-0.10.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: cwbox
  - exposure: global executable
    kind: cli
    name: cwcomment
  - exposure: global executable
    kind: cli
    name: cwdaily
  - exposure: global executable
    kind: cli
    name: cwevent
  - exposure: global executable
    kind: cli
    name: cwgame
  - exposure: global executable
    kind: cli
    name: cwsub
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chadwick
  brew: brew install chadwick
provenance:
  formula: chadwick
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
