id: brew:bmake
display-name: bmake
homepage: https://www.crufty.net/help/sjg/bmake.html
repo: https://www.crufty.net/ftp/pub/sjg/bmake-20260508.tar.gz
docs: https://www.crufty.net/help/sjg/bmake.html
package-manager:
  apk: bmake
  brew: bmake
  debian: bmake
  dnf: bmake
  macports: bmake
  nix: bmake
  pacman: bmake
  ubuntu: bmake
  zypper: bmake
package-manager-url: https://formulae.brew.sh/formula/bmake
version: 20260508
license: BSD-3-Clause
category: network
tags:
  - cli
description: Portable version of NetBSD make(1)
source-archive: https://www.crufty.net/ftp/pub/sjg/bmake-20260508.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bmake
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bmake
  av: sudo av install brew:bmake
  brew: brew install bmake
  debian: sudo apt install bmake
  dnf: sudo dnf install bmake
  macports: sudo port install bmake
  nix: nix profile install nixpkgs#bmake
  pacman: sudo pacman -S bmake
  ubuntu: sudo apt install bmake
  zypper: sudo zypper install bmake
provenance:
  formula: bmake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
