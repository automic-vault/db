id: brew:pinfo
display-name: pinfo
homepage: https://packages.debian.org/sid/pinfo
repo: https://github.com/baszoetekouw/pinfo
docs: https://packages.debian.org/sid/pinfo
package-manager:
  brew: pinfo
  debian: pinfo
  dnf: pinfo
  macports: pinfo
  nix: pinfo
  ubuntu: pinfo
  zypper: pinfo
package-manager-url: https://formulae.brew.sh/formula/pinfo
version: 0.6.13
license: GPL-2.0-only
category: development
tags:
  - cli
description: User-friendly, console-based viewer for Info documents
source-archive: https://github.com/baszoetekouw/pinfo/archive/refs/tags/v0.6.13.tar.gz
dependencies:
  - gettext
build-dependencies:
  - autoconf
  - automake
  - gettext
  - libtool
  - texinfo
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: pinfo
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pinfo
  brew: brew install pinfo
  debian: sudo apt install pinfo
  dnf: sudo dnf install pinfo
  macports: sudo port install pinfo
  nix: nix profile install nixpkgs#pinfo
  ubuntu: sudo apt install pinfo
  zypper: sudo zypper install pinfo
provenance:
  formula: pinfo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
