id: brew:remake
display-name: remake
homepage: https://bashdb.sourceforge.net/remake/
repo: >
  https://downloads.sourceforge.net/project/bashdb/remake/4.3%2Bdbg-1.6/remake-4.3%2Bdbg-1.6.tar.gz
docs: https://bashdb.sourceforge.net/remake/
package-manager:
  apk: remake
