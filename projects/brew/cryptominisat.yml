id: brew:cryptominisat
display-name: cryptominisat
homepage: https://www.msoos.org/cryptominisat5/
repo: https://github.com/msoos/cryptominisat
docs: https://www.msoos.org/cryptominisat5/
package-manager:
  brew: cryptominisat
  debian: cryptominisat
  dnf: cryptominisat
  nix: cryptominisat
  pacman: cryptominisat
  ubuntu: cryptominisat
package-manager-url: https://formulae.brew.sh/formula/cryptominisat
version: 5.14.5
license: MIT
category: security
tags:
  - cli
description: Advanced SAT solver
source-archive: https://github.com/msoos/cryptominisat/archive/refs/tags/release/v5.14.5.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cmake
  - pkgconf
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: cryptominisat5
  - exposure: global executable
    kind: cli
    name: oracle
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cryptominisat
  brew: brew install cryptominisat
  debian: sudo apt install cryptominisat
  dnf: sudo dnf install cryptominisat
  nix: nix profile install nixpkgs#cryptominisat
  pacman: sudo pacman -S cryptominisat
  ubuntu: sudo apt install cryptominisat
provenance:
  formula: cryptominisat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
