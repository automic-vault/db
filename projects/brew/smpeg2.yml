id: brew:smpeg2
display-name: smpeg2
homepage: https://icculus.org/smpeg/
repo: https://github.com/icculus/smpeg
docs: https://icculus.org/smpeg/
package-manager:
  brew: smpeg2
  macports: smpeg2
  nix: smpeg2
package-manager-url: https://formulae.brew.sh/formula/smpeg2
version: 2.0.0
license: LGPL-2.0-or-later
category: development
tags:
  - cli
description: SDL MPEG Player Library
source-archive: https://github.com/icculus/smpeg/archive/refs/tags/release_2_0_0.tar.gz
dependencies:
  - sdl2
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: plaympeg2
  - exposure: global executable
    kind: cli
    name: smpeg2-config
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:smpeg2
  brew: brew install smpeg2
  macports: sudo port install smpeg2
  nix: nix profile install nixpkgs#smpeg2
provenance:
  formula: smpeg2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
