id: brew:kotlin-language-server
display-name: kotlin-language-server
homepage: https://github.com/fwcd/kotlin-language-server
repo: https://github.com/fwcd/kotlin-language-server
docs: https://github.com/fwcd/kotlin-language-server
package-manager:
  apk: kotlin-language-server
  brew: kotlin-language-server
  macports: kotlin-language-server
  nix: kotlin-language-server
package-manager-url: https://formulae.brew.sh/formula/kotlin-language-server
version: 1.3.13
license: MIT
category: development
tags:
  - cli
description: Intelligent Kotlin support for any editor/IDE using the Language Server Protocol
source-archive: https://github.com/fwcd/kotlin-language-server/archive/refs/tags/1.3.13.tar.gz
dependencies:
  - openjdk@21
build-dependencies:
  - gradle
executables:
  - exposure: global executable
    kind: cli
    name: kotlin-language-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kotlin-language-server
  av: sudo av install brew:kotlin-language-server
  brew: brew install kotlin-language-server
  macports: sudo port install kotlin-language-server
  nix: nix profile install nixpkgs#kotlin-language-server
provenance:
  formula: kotlin-language-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
