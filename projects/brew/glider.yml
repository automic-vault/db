id: brew:glider
display-name: glider
homepage: https://github.com/nadoo/glider
repo: https://github.com/nadoo/glider
docs: https://github.com/nadoo/glider
package-manager:
  brew: glider
  macports: glider
  nix: glider
  pacman: glider
package-manager-url: https://formulae.brew.sh/formula/glider
version: 0.16.4
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Forward proxy with multiple protocols support
source-archive: https://github.com/nadoo/glider/archive/refs/tags/v0.16.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: glider
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:glider
  brew: brew install glider
  macports: sudo port install glider
  nix: nix profile install nixpkgs#glider
  pacman: sudo pacman -S glider
provenance:
  formula: glider
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
