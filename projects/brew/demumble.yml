id: brew:demumble
display-name: demumble
homepage: https://github.com/nico/demumble
repo: https://github.com/nico/demumble
docs: https://github.com/nico/demumble
package-manager:
  brew: demumble
  zypper: demumble
package-manager-url: https://formulae.brew.sh/formula/demumble
version: 1.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: More powerful symbol demangler (a la c++filt)
source-archive: https://github.com/nico/demumble/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: demumble
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:demumble
  brew: brew install demumble
  zypper: sudo zypper install demumble
provenance:
  formula: demumble
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
