id: brew:inadyn
display-name: inadyn
homepage: https://troglobit.com/projects/inadyn/
repo: https://github.com/troglobit/inadyn
docs: https://troglobit.com/projects/inadyn/
package-manager:
  apk: inadyn
  brew: inadyn
  debian: inadyn
  macports: inadyn
  nix: inadyn
  ubuntu: inadyn
package-manager-url: https://formulae.brew.sh/formula/inadyn
version: 2.13.0
license: GPL-2.0-or-later AND ISC AND MIT
category: security
tags:
  - cli
description: Dynamic DNS client with IPv4, IPv6, and SSL/TLS support
source-archive: https://github.com/troglobit/inadyn/releases/download/v2.13.0/inadyn-2.13.0.tar.xz
dependencies:
  - confuse
  - openssl@4
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: inadyn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add inadyn
  av: sudo av install brew:inadyn
  brew: brew install inadyn
  debian: sudo apt install inadyn
  macports: sudo port install inadyn
  nix: nix profile install nixpkgs#inadyn
  ubuntu: sudo apt install inadyn
provenance:
  formula: inadyn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
