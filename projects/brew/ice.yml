id: brew:ice
display-name: ice
homepage: https://zeroc.com
repo: https://github.com/zeroc-ice/ice
docs: https://zeroc.com
package-manager:
  brew: ice
  macports: Ice
package-manager-url: https://formulae.brew.sh/formula/ice
version: 3.8.1
license: GPL-2.0-only
category: development
tags:
  - cli
description: Comprehensive RPC framework
source-archive: https://github.com/zeroc-ice/ice/archive/refs/tags/v3.8.1.tar.gz
dependencies:
  - lmdb
  - mcpp
uses-from-macos:
  - bzip2
  - expat
  - libedit
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: dsnode
  - exposure: global executable
    kind: cli
    name: glacier2router
  - exposure: global executable
    kind: cli
    name: ice2slice
  - exposure: global executable
    kind: cli
    name: icebox
  - exposure: global executable
    kind: cli
    name: iceboxadmin
  - exposure: global executable
    kind: cli
    name: icebridge
  - exposure: global executable
    kind: cli
    name: icegridadmin
  - exposure: global executable
    kind: cli
    name: icegriddb
  - exposure: global executable
    kind: cli
    name: icegridnode
  - exposure: global executable
    kind: cli
    name: icegridregistry
  - exposure: global executable
    kind: cli
    name: icestormadmin
  - exposure: global executable
    kind: cli
    name: icestormdb
  - exposure: global executable
    kind: cli
    name: slice2cpp
  - exposure: global executable
    kind: cli
    name: slice2php
  - exposure: global executable
    kind: cli
    name: slice2py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ice
  brew: brew install ice
  macports: sudo port install Ice
provenance:
  formula: ice
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
