id: brew:poke
display-name: poke
homepage: https://jemarch.net/poke
repo: https://ftpmirror.gnu.org/gnu/poke/poke-4.3.tar.gz
docs: https://jemarch.net/poke
package-manager:
  apk: poke
  brew: poke
  debian: poke
  dnf: poke
  macports: poke
  nix: poke
  pacman: poke
  ubuntu: poke
  zypper: poke
package-manager-url: https://formulae.brew.sh/formula/poke
version: 4.3
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Extensible editor for structured binary data
source-archive: https://ftpmirror.gnu.org/gnu/poke/poke-4.3.tar.gz
dependencies:
  - bdw-gc
  - gettext
  - readline
build-dependencies:
  - autoconf
  - automake
  - help2man
  - libtool
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: pk-bin2poke
  - exposure: global executable
    kind: cli
    name: pk-jojopatch
  - exposure: global executable
    kind: cli
    name: pk-strings
  - exposure: global executable
    kind: cli
    name: poke
  - exposure: global executable
    kind: cli
    name: poked
  - exposure: global executable
    kind: cli
    name: pokefmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add poke
  av: sudo av install brew:poke
  brew: brew install poke
  debian: sudo apt install poke
  dnf: sudo dnf install poke
  macports: sudo port install poke
  nix: nix profile install nixpkgs#poke
  pacman: sudo pacman -S poke
  ubuntu: sudo apt install poke
  zypper: sudo zypper install poke
provenance:
  formula: poke
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
