id: brew:ocaml-findlib
display-name: ocaml-findlib
homepage: http://projects.camlcity.org/projects/findlib.html
repo: https://github.com/ocaml/ocamlfind
docs: http://projects.camlcity.org/projects/findlib.html
package-manager:
  apk: ocaml-findlib
  brew: ocaml-findlib
  debian: ocaml-findlib
  dnf: ocaml-findlib
  macports: ocaml-findlib
  pacman: ocaml-findlib
  ubuntu: ocaml-findlib
  zypper: ocaml-findlib
package-manager-url: https://formulae.brew.sh/formula/ocaml-findlib
version: 1.9.8
license: MIT
category: development
tags:
  - cli
description: OCaml library manager
source-archive: https://github.com/ocaml/ocamlfind/archive/refs/tags/findlib-1.9.8.tar.gz
dependencies:
  - ocaml
executables:
  - exposure: global executable
    kind: cli
    name: ocamlfind
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ocaml-findlib
  av: sudo av install brew:ocaml-findlib
  brew: brew install ocaml-findlib
  debian: sudo apt install ocaml-findlib
  dnf: sudo dnf install ocaml-findlib
  macports: sudo port install ocaml-findlib
  pacman: sudo pacman -S ocaml-findlib
  ubuntu: sudo apt install ocaml-findlib
  zypper: sudo zypper install ocaml-findlib
provenance:
  formula: ocaml-findlib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
