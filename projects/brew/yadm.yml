id: brew:yadm
display-name: yadm
homepage: https://yadm.io/
repo: https://github.com/yadm-dev/yadm
docs: https://yadm.io/
package-manager:
  apk: yadm
  brew: yadm
  debian: yadm
  macports: yadm
  nix: yadm
  pacman: yadm
  ubuntu: yadm
  zypper: yadm
package-manager-url: https://formulae.brew.sh/formula/yadm
version: 3.5.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Yet Another Dotfiles Manager
source-archive: https://github.com/yadm-dev/yadm/archive/refs/tags/3.5.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: yadm
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yadm
  av: sudo av install brew:yadm
  brew: brew install yadm
  debian: sudo apt install yadm
  macports: sudo port install yadm
  nix: nix profile install nixpkgs#yadm
  pacman: sudo pacman -S yadm
  ubuntu: sudo apt install yadm
  zypper: sudo zypper install yadm
provenance:
  formula: yadm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
