id: brew:bulk_extractor
display-name: bulk_extractor
homepage: https://github.com/simsong/bulk_extractor/wiki
repo: https://github.com/simsong/bulk_extractor
docs: https://github.com/simsong/bulk_extractor/wiki
package-manager:
  brew: bulk_extractor
  macports: bulk_extractor
  nix: bulk_extractor
  zypper: bulk_extractor
package-manager-url: https://formulae.brew.sh/formula/bulk_extractor
version: 2.1.1
license: MIT
category: development
tags:
  - cli
description: Stream-based forensics tool
source-archive: >
  https://github.com/simsong/bulk_extractor/releases/download/v2.1.1/bulk_extractor-2.1.1.tar.gz
build-dependencies:
  - pkgconf
  - re2
uses-from-macos:
  - expat
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: bulk_extractor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bulk_extractor
  brew: brew install bulk_extractor
  macports: sudo port install bulk_extractor
  nix: nix profile install nixpkgs#bulk_extractor
  zypper: sudo zypper install bulk_extractor
provenance:
  formula: bulk_extractor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
