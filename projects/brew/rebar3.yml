id: brew:rebar3
display-name: rebar3
homepage: https://rebar3.org
repo: https://github.com/erlang/rebar3
docs: https://rebar3.org
package-manager:
  apk: rebar3
  brew: rebar3
  debian: rebar3
  macports: rebar3
  pacman: rebar3
  scoop: main/rebar3
  ubuntu: rebar3
package-manager-url: https://formulae.brew.sh/formula/rebar3
version: 3.27.0
license: Apache-2.0
category: development
tags:
  - cli
description: Erlang build tool
source-archive: https://github.com/erlang/rebar3/archive/refs/tags/3.27.0.tar.gz
build-dependencies:
  - erlang@27
executables:
  - exposure: global executable
    kind: cli
    name: rebar3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rebar3
  av: sudo av install brew:rebar3
  brew: brew install rebar3
  debian: sudo apt install rebar3
  macports: sudo port install rebar3
  pacman: sudo pacman -S rebar3
  scoop: scoop install main/rebar3
  ubuntu: sudo apt install rebar3
provenance:
  formula: rebar3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
