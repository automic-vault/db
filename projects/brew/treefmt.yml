id: brew:treefmt
display-name: treefmt
homepage: https://treefmt.com/latest/
repo: https://github.com/numtide/treefmt
docs: https://treefmt.com/latest/
package-manager:
  brew: treefmt
  macports: treefmt
  nix: treefmt
package-manager-url: https://formulae.brew.sh/formula/treefmt
version: 2.5.0
license: MIT
category: development
tags:
  - cli
description: One CLI to format the code tree
source-archive: https://github.com/numtide/treefmt/archive/refs/tags/v2.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: treefmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:treefmt
  brew: brew install treefmt
  macports: sudo port install treefmt
  nix: nix profile install nixpkgs#treefmt
provenance:
  formula: treefmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
