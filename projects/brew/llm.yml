id: brew:llm
display-name: llm
homepage: https://llm.datasette.io/
repo: >
  https://files.pythonhosted.org/packages/7d/f2/3a81744fdaf3a92fe9020dc298dd2e4c144e2e7fcab863e1a132ea537cab/llm-0.31.tar.gz
