install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tfplugingen-openapi
  brew: brew install tfplugingen-openapi
provenance:
  formula: tfplugingen-openapi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
