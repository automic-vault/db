id: brew:tfplugingen-openapi
display-name: tfplugingen-openapi
homepage: https://github.com/hashicorp/terraform-plugin-codegen-openapi
repo: https://github.com/hashicorp/terraform-plugin-codegen-openapi
docs: https://github.com/hashicorp/terraform-plugin-codegen-openapi
package-manager:
  brew: tfplugingen-openapi
package-manager-url: https://formulae.brew.sh/formula/tfplugingen-openapi
version: 0.3.0
license: MPL-2.0
category: cloud
tags:
  - cli
description: OpenAPI to Terraform Provider Code Generation Specification
source-archive: >
  https://github.com/hashicorp/terraform-plugin-codegen-openapi/archive/refs/tags/v0.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tfplugingen-openapi
bottle:
