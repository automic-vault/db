id: brew:yj
display-name: yj
homepage: https://github.com/sclevine/yj
repo: https://github.com/sclevine/yj
docs: https://github.com/sclevine/yj
package-manager:
  apk: yj
  brew: yj
  macports: yj
  nix: yj
package-manager-url: https://formulae.brew.sh/formula/yj
version: 5.1.0
license: Apache-2.0
category: development
tags:
  - cli
  - json
  - yaml
description: CLI to convert between YAML, TOML, JSON and HCL
source-archive: https://github.com/sclevine/yj/archive/refs/tags/v5.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: yj
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yj
  av: sudo av install brew:yj
  brew: brew install yj
  macports: sudo port install yj
  nix: nix profile install nixpkgs#yj
provenance:
  formula: yj
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
