id: brew:cdi
display-name: cdi
homepage: https://code.mpimet.mpg.de/projects/cdi
repo: https://code.mpimet.mpg.de/attachments/download/30199/cdi-2.6.1.tar.gz
docs: https://code.mpimet.mpg.de/projects/cdi
package-manager:
  brew: cdi
package-manager-url: https://formulae.brew.sh/formula/cdi
version: 2.6.1
license: BSD-3-Clause
category: network
tags:
  - cli
description: C and Fortran Interface to access Climate and NWP model Data
source-archive: https://code.mpimet.mpg.de/attachments/download/30199/cdi-2.6.1.tar.gz
dependencies:
  - eccodes
  - libaec
  - netcdf
executables:
  - exposure: global executable
    kind: cli
    name: cdi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cdi
  brew: brew install cdi
provenance:
  formula: cdi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
