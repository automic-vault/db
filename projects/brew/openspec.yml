id: brew:openspec
display-name: openspec
homepage: https://openspec.dev/
repo: https://registry.npmjs.org/@fission-ai/openspec/-/openspec-1.3.1.tgz
docs: https://openspec.dev/
package-manager:
  brew: openspec
  macports: openspec
  nix: openspec
package-manager-url: https://formulae.brew.sh/formula/openspec
version: 1.3.1
license: MIT
category: network
tags:
  - cli
description: Spec-driven development (SDD) for AI coding assistants
source-archive: https://registry.npmjs.org/@fission-ai/openspec/-/openspec-1.3.1.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: openspec
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:openspec
  brew: brew install openspec
  macports: sudo port install openspec
  nix: nix profile install nixpkgs#openspec
provenance:
  formula: openspec
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
