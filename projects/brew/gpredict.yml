id: brew:gpredict
display-name: gpredict
homepage: https://oz9aec.dk/gpredict/
repo: https://github.com/csete/gpredict
docs: https://oz9aec.dk/gpredict/
package-manager:
  brew: gpredict
  debian: gpredict
  dnf: gpredict
  macports: gpredict
  nix: gpredict
  ubuntu: gpredict
  winget: AlexandruCsete.Gpredict
  zypper: gpredict
package-manager-url: https://formulae.brew.sh/formula/gpredict
version: 2.5.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Real-time satellite tracking/prediction application
source-archive: https://github.com/csete/gpredict/releases/download/v2.5.1/gpredict-2.5.1.tar.bz2
dependencies:
  - adwaita-icon-theme
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - goocanvas
  - gtk+3
  - hamlib
  - harfbuzz
  - pango
build-dependencies:
  - gettext
  - intltool
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: gpredict
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gpredict
  brew: brew install gpredict
  debian: sudo apt install gpredict
  dnf: sudo dnf install gpredict
  macports: sudo port install gpredict
  nix: nix profile install nixpkgs#gpredict
  ubuntu: sudo apt install gpredict
  winget: winget install --id AlexandruCsete.Gpredict -e
  zypper: sudo zypper install gpredict
provenance:
  formula: gpredict
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
