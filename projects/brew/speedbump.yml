id: brew:speedbump
display-name: speedbump
homepage: https://github.com/kffl/speedbump
repo: https://github.com/kffl/speedbump
docs: https://github.com/kffl/speedbump
package-manager:
  brew: speedbump
  macports: speedbump
package-manager-url: https://formulae.brew.sh/formula/speedbump
version: 1.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: TCP proxy for simulating variable, yet predictable network latency
source-archive: https://github.com/kffl/speedbump/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: speedbump
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:speedbump
  brew: brew install speedbump
  macports: sudo port install speedbump
provenance:
  formula: speedbump
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
