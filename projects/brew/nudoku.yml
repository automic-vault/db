id: brew:nudoku
display-name: nudoku
homepage: https://jubalh.github.io/nudoku/
repo: https://github.com/jubalh/nudoku
docs: https://jubalh.github.io/nudoku/
package-manager:
  brew: nudoku
  debian: nudoku
  dnf: nudoku
  nix: nudoku
  ubuntu: nudoku
  zypper: nudoku
package-manager-url: https://formulae.brew.sh/formula/nudoku
version: 8.0.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Ncurses based sudoku game
source-archive: https://github.com/jubalh/nudoku/archive/refs/tags/8.0.0.tar.gz
dependencies:
  - cairo
  - gettext
build-dependencies:
  - autoconf
  - automake
  - gettext
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: nudoku
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nudoku
  brew: brew install nudoku
  debian: sudo apt install nudoku
  dnf: sudo dnf install nudoku
  nix: nix profile install nixpkgs#nudoku
  ubuntu: sudo apt install nudoku
  zypper: sudo zypper install nudoku
provenance:
  formula: nudoku
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
