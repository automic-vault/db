package-manager-url: https://formulae.brew.sh/formula/hfsutils
version: 3.2.6
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Tools for reading and writing Macintosh volumes
source-archive: https://ftp.osuosl.org/pub/clfs/conglomeration/hfsutils/hfsutils-3.2.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: hattrib
  - exposure: global executable
    kind: cli
    name: hcd
  - exposure: global executable
    kind: cli
    name: hcopy
  - exposure: global executable
    kind: cli
    name: hdel
  - exposure: global executable
    kind: cli
    name: hdir
  - exposure: global executable
    kind: cli
    name: hformat
  - exposure: global executable
    kind: cli
    name: hls
  - exposure: global executable
    kind: cli
    name: hmkdir
  - exposure: global executable
    kind: cli
    name: hmount
  - exposure: global executable
    kind: cli
    name: hpwd
  - exposure: global executable
    kind: cli
    name: hrename
  - exposure: global executable
    kind: cli
    name: hrmdir
  - exposure: global executable
    kind: cli
    name: humount
  - exposure: global executable
    kind: cli
    name: hvol
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hfsutils
  brew: brew install hfsutils
  dnf: sudo dnf install hfsutils
  macports: sudo port install hfsutils
  nix: nix profile install nixpkgs#hfsutils
  ubuntu: sudo apt install hfsutils
  zypper: sudo zypper install hfsutils
provenance:
  formula: hfsutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
