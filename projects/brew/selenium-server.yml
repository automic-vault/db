id: brew:selenium-server
display-name: selenium-server
homepage: https://www.selenium.dev/
repo: https://github.com/SeleniumHQ/selenium
docs: https://www.selenium.dev/
package-manager:
  brew: selenium-server
package-manager-url: https://formulae.brew.sh/formula/selenium-server
version: 4.44.0
license: Apache-2.0
category: development
tags:
  - cli
description: Browser automation for testing purposes
source-archive: >
  https://github.com/SeleniumHQ/selenium/releases/download/selenium-4.44.0/selenium-server-4.44.0.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: selenium-server
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:selenium-server
  brew: brew install selenium-server
provenance:
  formula: selenium-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
