id: brew:trivy
display-name: trivy
homepage: https://trivy.dev/
repo: https://github.com/aquasecurity/trivy
docs: https://trivy.dev/
package-manager:
  apk: trivy
  brew: trivy
  chocolatey: trivy
  dnf: trivy
  macports: trivy
  nix: trivy
  pacman: trivy
  scoop: main/trivy
  winget: AquaSecurity.Trivy
  zypper: trivy
package-manager-url: https://formulae.brew.sh/formula/trivy
version: 0.70.0
license: Apache-2.0
category: security
tags:
  - cli
  - git
description: Vulnerability scanner for container images, file systems, and Git repos
source-archive: https://github.com/aquasecurity/trivy/archive/refs/tags/v0.70.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: trivy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add trivy
  av: sudo av install brew:trivy
  brew: brew install trivy
  chocolatey: choco install trivy
  dnf: sudo dnf install trivy
  macports: sudo port install trivy
  nix: nix profile install nixpkgs#trivy
  pacman: sudo pacman -S trivy
  scoop: scoop install main/trivy
  winget: winget install --id AquaSecurity.Trivy -e
  zypper: sudo zypper install trivy
provenance:
  formula: trivy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
