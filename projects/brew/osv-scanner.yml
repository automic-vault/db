id: brew:osv-scanner
display-name: osv-scanner
homepage: https://github.com/google/osv-scanner
repo: https://github.com/google/osv-scanner
docs: https://github.com/google/osv-scanner
package-manager:
  apk: osv-scanner
  brew: osv-scanner
  nix: osv-scanner
  pacman: osv-scanner
  scoop: main/osv-scanner
  winget: Google.OSVScanner
  zypper: osv-scanner
package-manager-url: https://formulae.brew.sh/formula/osv-scanner
version: 2.3.8
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Vulnerability scanner which uses the OSV database
source-archive: https://github.com/google/osv-scanner/archive/refs/tags/v2.3.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: osv-scanner
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add osv-scanner
  av: sudo av install brew:osv-scanner
  brew: brew install osv-scanner
  nix: nix profile install nixpkgs#osv-scanner
  pacman: sudo pacman -S osv-scanner
  scoop: scoop install main/osv-scanner
  winget: winget install --id Google.OSVScanner -e
  zypper: sudo zypper install osv-scanner
provenance:
  formula: osv-scanner
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
