id: brew:kcov
display-name: kcov
homepage: https://simonkagstrom.github.io/kcov/
repo: https://github.com/SimonKagstrom/kcov
docs: https://simonkagstrom.github.io/kcov/
package-manager:
  brew: kcov
  debian: kcov
  dnf: kcov
  macports: kcov
  nix: kcov
  pacman: kcov
  zypper: kcov
package-manager-url: https://formulae.brew.sh/formula/kcov
version: 43
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Code coverage tester for compiled programs, Python, and shell scripts
source-archive: https://github.com/SimonKagstrom/kcov/archive/refs/tags/v43.tar.gz
dependencies:
  - dwarfutils
  - openssl@3
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: kcov
  - exposure: global executable
    kind: cli
    name: kcov-system-daemon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kcov
  brew: brew install kcov
  debian: sudo apt install kcov
  dnf: sudo dnf install kcov
  macports: sudo port install kcov
  nix: nix profile install nixpkgs#kcov
  pacman: sudo pacman -S kcov
  zypper: sudo zypper install kcov
provenance:
  formula: kcov
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
