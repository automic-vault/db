id: brew:bazel-diff
display-name: bazel-diff
homepage: https://github.com/Tinder/bazel-diff/
repo: https://github.com/Tinder/bazel-diff
docs: https://github.com/Tinder/bazel-diff/
package-manager:
  brew: bazel-diff
package-manager-url: https://formulae.brew.sh/formula/bazel-diff
version: 25.0.0
license: BSD-3-Clause
category: development
tags:
  - cli
  - git
description: Performs Bazel Target Diffing between two revisions in Git
source-archive: https://github.com/Tinder/bazel-diff/archive/refs/tags/v25.0.0.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - bazel
executables:
  - exposure: global executable
    kind: cli
    name: bazel-diff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bazel-diff
  brew: brew install bazel-diff
provenance:
  formula: bazel-diff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
