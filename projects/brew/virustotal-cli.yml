id: brew:virustotal-cli
display-name: virustotal-cli
homepage: https://github.com/VirusTotal/vt-cli
repo: https://github.com/VirusTotal/vt-cli
docs: https://github.com/VirusTotal/vt-cli
package-manager:
  brew: virustotal-cli
  debian: vt
  ubuntu: vt
  winget: VirusTotal.vt-cli
package-manager-url: https://formulae.brew.sh/formula/virustotal-cli
version: 1.3.1
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line interface for VirusTotal
source-archive: https://github.com/VirusTotal/vt-cli/archive/refs/tags/1.3.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:virustotal-cli
  brew: brew install virustotal-cli
  debian: sudo apt install vt
  ubuntu: sudo apt install vt
  winget: winget install --id VirusTotal.vt-cli -e
provenance:
  formula: virustotal-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
