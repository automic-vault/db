id: brew:ttfautohint
display-name: ttfautohint
homepage: https://www.freetype.org/ttfautohint/
repo: >
  https://downloads.sourceforge.net/project/freetype/ttfautohint/1.8.4/ttfautohint-1.8.4.tar.gz
docs: https://www.freetype.org/ttfautohint/
package-manager:
  apk: ttfautohint
  brew: ttfautohint
  debian: ttfautohint
  dnf: ttfautohint
  macports: ttfautohint
  nix: ttfautohint
  ubuntu: ttfautohint
package-manager-url: https://formulae.brew.sh/formula/ttfautohint
version: 1.8.4
license: FTL OR GPL-2.0-or-later
category: network
tags:
  - cli
description: Auto-hinter for TrueType fonts
source-archive: >
  https://downloads.sourceforge.net/project/freetype/ttfautohint/1.8.4/ttfautohint-1.8.4.tar.gz
dependencies:
  - freetype
  - harfbuzz
  - libpng
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ttfautohint
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ttfautohint
  av: sudo av install brew:ttfautohint
  brew: brew install ttfautohint
  debian: sudo apt install ttfautohint
  dnf: sudo dnf install ttfautohint
  macports: sudo port install ttfautohint
  nix: nix profile install nixpkgs#ttfautohint
  ubuntu: sudo apt install ttfautohint
provenance:
  formula: ttfautohint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
