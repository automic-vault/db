id: brew:tfupdate
display-name: tfupdate
homepage: https://github.com/minamijoyo/tfupdate
repo: https://github.com/minamijoyo/tfupdate
docs: https://github.com/minamijoyo/tfupdate
package-manager:
  apk: tfupdate
  brew: tfupdate
  macports: tfupdate
  nix: tfupdate
  zypper: tfupdate
package-manager-url: https://formulae.brew.sh/formula/tfupdate
version: 0.9.4
license: MIT
category: cloud
tags:
  - cli
description: Update version constraints in your Terraform configurations
source-archive: https://github.com/minamijoyo/tfupdate/archive/refs/tags/v0.9.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tfupdate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tfupdate
  av: sudo av install brew:tfupdate
  brew: brew install tfupdate
  macports: sudo port install tfupdate
  nix: nix profile install nixpkgs#tfupdate
  zypper: sudo zypper install tfupdate
provenance:
  formula: tfupdate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
