id: brew:pandoc-plot
display-name: pandoc-plot
homepage: https://github.com/LaurentRDC/pandoc-plot
repo: https://hackage.haskell.org/package/pandoc-plot-1.9.1/pandoc-plot-1.9.1.tar.gz
docs: https://github.com/LaurentRDC/pandoc-plot
package-manager:
  brew: pandoc-plot
  pacman: pandoc-plot
  winget: LaurentPRenedeCotret.pandoc-plot
package-manager-url: https://formulae.brew.sh/formula/pandoc-plot
version: 1.9.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Render and include figures in Pandoc documents using many plotting toolkits
source-archive: https://hackage.haskell.org/package/pandoc-plot-1.9.1/pandoc-plot-1.9.1.tar.gz
dependencies:
  - gmp
  - pandoc
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: pandoc-plot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pandoc-plot
  brew: brew install pandoc-plot
  pacman: sudo pacman -S pandoc-plot
  winget: winget install --id LaurentPRenedeCotret.pandoc-plot -e
provenance:
  formula: pandoc-plot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
