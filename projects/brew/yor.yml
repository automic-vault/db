id: brew:yor
display-name: yor
homepage: https://yor.io/
repo: https://github.com/bridgecrewio/yor
docs: https://yor.io/
package-manager:
  brew: yor
  nix: yor
package-manager-url: https://formulae.brew.sh/formula/yor
version: 0.1.200
license: Apache-2.0
category: development
tags:
  - cli
description: Extensible auto-tagger for your IaC files
source-archive: https://github.com/bridgecrewio/yor/archive/refs/tags/0.1.200.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: yor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yor
  brew: brew install yor
  nix: nix profile install nixpkgs#yor
provenance:
  formula: yor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
