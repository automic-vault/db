id: brew:rqbit
display-name: rqbit
homepage: https://github.com/ikatson/rqbit
repo: https://github.com/ikatson/rqbit
docs: https://github.com/ikatson/rqbit
package-manager:
  brew: rqbit
  nix: rqbit
  pacman: rqbit
package-manager-url: https://formulae.brew.sh/formula/rqbit
version: 8.1.1
license: Apache-2.0
category: development
tags:
  - cli
description: Fast command-line bittorrent client and server
source-archive: https://github.com/ikatson/rqbit/archive/refs/tags/v8.1.1.tar.gz
build-dependencies:
  - node
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rqbit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rqbit
  brew: brew install rqbit
  nix: nix profile install nixpkgs#rqbit
  pacman: sudo pacman -S rqbit
provenance:
  formula: rqbit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
