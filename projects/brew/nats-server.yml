id: brew:nats-server
display-name: nats-server
homepage: https://nats.io
repo: https://github.com/nats-io/nats-server
docs: https://nats.io
package-manager:
  apk: nats-server
  brew: nats-server
  debian: nats-server
  nix: nats-server
  scoop: main/nats-server
  ubuntu: nats-server
  winget: NATSAuthors.NATSServer
package-manager-url: https://formulae.brew.sh/formula/nats-server
version: 2.14.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Lightweight cloud messaging system
source-archive: https://github.com/nats-io/nats-server/archive/refs/tags/v2.14.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nats-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add nats-server
  av: sudo av install brew:nats-server
  brew: brew install nats-server
  debian: sudo apt install nats-server
  nix: nix profile install nixpkgs#nats-server
  scoop: scoop install main/nats-server
  ubuntu: sudo apt install nats-server
  winget: winget install --id NATSAuthors.NATSServer -e
provenance:
  formula: nats-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
