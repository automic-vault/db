id: brew:oslo
display-name: oslo
homepage: https://openslo.com/
repo: https://github.com/OpenSLO/oslo
docs: https://openslo.com/
package-manager:
  brew: oslo
package-manager-url: https://formulae.brew.sh/formula/oslo
version: 0.13.0
license: Apache-2.0
category: development
tags:
  - cli
description: CLI tool for the OpenSLO spec
source-archive: https://github.com/OpenSLO/oslo/archive/refs/tags/v0.13.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: oslo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oslo
  brew: brew install oslo
provenance:
  formula: oslo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
