id: brew:quick-lint-js
display-name: quick-lint-js
homepage: https://quick-lint-js.com/
repo: https://c.quick-lint-js.com/releases/3.2.0/source/quick-lint-js-3.2.0.tar.gz
docs: https://quick-lint-js.com/
package-manager:
  apk: quick-lint-js
  brew: quick-lint-js
  nix: quick-lint-js
  scoop: main/quick-lint-js
  winget: quick-lint.quick-lint-js
package-manager-url: https://formulae.brew.sh/formula/quick-lint-js
version: 3.2.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Find bugs in your JavaScript code
source-archive: https://c.quick-lint-js.com/releases/3.2.0/source/quick-lint-js-3.2.0.tar.gz
dependencies:
  - simdjson
build-dependencies:
  - cmake
  - googletest
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: quick-lint-js
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add quick-lint-js
  av: sudo av install brew:quick-lint-js
  brew: brew install quick-lint-js
  nix: nix profile install nixpkgs#quick-lint-js
  scoop: scoop install main/quick-lint-js
  winget: winget install --id quick-lint.quick-lint-js -e
provenance:
  formula: quick-lint-js
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
