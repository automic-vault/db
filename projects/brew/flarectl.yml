id: brew:flarectl
display-name: flarectl
homepage: https://github.com/cloudflare/cloudflare-go/tree/v0/cmd/flarectl
repo: https://github.com/cloudflare/cloudflare-go
docs: https://github.com/cloudflare/cloudflare-go/tree/v0/cmd/flarectl
package-manager:
  apk: flarectl
  brew: flarectl
  nix: flarectl
package-manager-url: https://formulae.brew.sh/formula/flarectl
version: 0.117.0
license: BSD-3-Clause
category: cloud
tags:
  - cli
description: CLI application for interacting with a Cloudflare account
source-archive: https://github.com/cloudflare/cloudflare-go/archive/refs/tags/v0.117.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: flarectl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add flarectl
  av: sudo av install brew:flarectl
  brew: brew install flarectl
  nix: nix profile install nixpkgs#flarectl
provenance:
  formula: flarectl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
