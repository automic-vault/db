id: brew:spatialite-gui
display-name: spatialite-gui
homepage: https://www.gaia-gis.it/fossil/spatialite_gui/index
repo: >
  https://www.gaia-gis.it/gaia-sins/spatialite-gui-sources/spatialite_gui-2.1.0-beta1.tar.gz
docs: https://www.gaia-gis.it/fossil/spatialite_gui/index
package-manager:
  brew: spatialite-gui
  debian: spatialite-gui
  dnf: spatialite-gui
  nix: spatialite-gui
  ubuntu: spatialite-gui
package-manager-url: https://formulae.brew.sh/formula/spatialite-gui
version: 2.1.0-beta1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GUI tool supporting SpatiaLite
source-archive: >
  https://www.gaia-gis.it/gaia-sins/spatialite-gui-sources/spatialite_gui-2.1.0-beta1.tar.gz
dependencies:
  - freexl
  - geos
  - libpq
  - librasterlite2
  - librttopo
  - libspatialite
  - libtiff
  - libxlsxwriter
  - libxml2
  - lz4
  - minizip
  - openjpeg
  - proj
  - sqlite
  - virtualpg
  - webp
  - wxwidgets@3.2
  - xz
  - zstd
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: spatialite_gui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spatialite-gui
  brew: brew install spatialite-gui
  debian: sudo apt install spatialite-gui
  dnf: sudo dnf install spatialite-gui
  nix: nix profile install nixpkgs#spatialite-gui
  ubuntu: sudo apt install spatialite-gui
provenance:
  formula: spatialite-gui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
