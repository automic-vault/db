id: brew:linkerd
display-name: linkerd
homepage: https://linkerd.io
repo: https://github.com/linkerd/linkerd2
docs: https://linkerd.io
package-manager:
  brew: linkerd
  nix: linkerd
  scoop: extras/linkerd
package-manager-url: https://formulae.brew.sh/formula/linkerd
version: 2.14.10
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line utility to interact with linkerd
source-archive: https://github.com/linkerd/linkerd2.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: linkerd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:linkerd
  brew: brew install linkerd
  nix: nix profile install nixpkgs#linkerd
  scoop: scoop install extras/linkerd
provenance:
  formula: linkerd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
