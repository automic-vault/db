id: brew:oauth2l
display-name: oauth2l
homepage: https://github.com/google/oauth2l
repo: https://github.com/google/oauth2l
docs: https://github.com/google/oauth2l
package-manager:
  brew: oauth2l
  nix: oauth2l
package-manager-url: https://formulae.brew.sh/formula/oauth2l
version: 1.3.3
license: Apache-2.0
category: development
tags:
  - cli
description: Simple CLI for interacting with Google oauth tokens
source-archive: https://github.com/google/oauth2l/archive/refs/tags/v1.3.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: oauth2l
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oauth2l
  brew: brew install oauth2l
  nix: nix profile install nixpkgs#oauth2l
provenance:
  formula: oauth2l
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
