id: brew:algolia
display-name: algolia
homepage: https://www.algolia.com/doc/tools/cli/get-started
repo: https://github.com/algolia/cli
docs: https://www.algolia.com/doc/tools/cli/get-started
package-manager:
  brew: algolia
package-manager-url: https://formulae.brew.sh/formula/algolia
version: 1.10.5
license: MIT
category: development
tags:
  - cli
description: CLI for Algolia
source-archive: https://github.com/algolia/cli/archive/refs/tags/v1.10.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: algolia
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:algolia
  brew: brew install algolia
provenance:
  formula: algolia
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
