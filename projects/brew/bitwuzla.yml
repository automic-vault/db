id: brew:bitwuzla
display-name: bitwuzla
homepage: https://bitwuzla.github.io
repo: https://github.com/bitwuzla/bitwuzla
docs: https://bitwuzla.github.io
package-manager:
  brew: bitwuzla
  nix: bitwuzla
package-manager-url: https://formulae.brew.sh/formula/bitwuzla
version: 0.9.1
license: MIT
category: development
tags:
  - cli
description: SMT solver for bit-vectors, floating-points, arrays and uninterpreted functions
source-archive: https://github.com/bitwuzla/bitwuzla/archive/refs/tags/0.9.1.tar.gz
dependencies:
  - gmp
  - mpfr
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: bitwuzla
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bitwuzla
  brew: brew install bitwuzla
  nix: nix profile install nixpkgs#bitwuzla
provenance:
  formula: bitwuzla
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
