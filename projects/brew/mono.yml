bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To use the assemblies from other formulae you need to set: export
    MONO_GAC_PREFIX="$HOMEBREW_PREFIX"
  post-install-defined: true
install-lines:
  apk: sudo apk add mono
  av: sudo av install brew:mono
  brew: brew install mono
  chocolatey: choco install mono
  dnf: sudo dnf install xsd
  macports: sudo port install mono
  nix: nix profile install nixpkgs#mono
  pacman: sudo pacman -S mono
  scoop: scoop install main/mono
  ubuntu: sudo apt install sn
  winget: winget install --id Mono.Mono -e
provenance:
  formula: mono
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
