id: brew:lla
display-name: lla
homepage: https://github.com/chaqchase/lla
repo: https://github.com/chaqchase/lla
docs: https://github.com/chaqchase/lla
package-manager:
  brew: lla
  nix: lla
package-manager-url: https://formulae.brew.sh/formula/lla
version: 0.5.7
license: MIT
category: development
tags:
  - cli
description: High-performance, extensible alternative to ls
source-archive: https://github.com/chaqchase/lla/archive/refs/tags/v0.5.7.tar.gz
build-dependencies:
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: lla
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The Lla plugins have been installed in the following directory:
    $HOMEBREW_PREFIX/opt/lla/lib
  post-install-defined: false
install-lines:
  av: sudo av install brew:lla
  brew: brew install lla
  nix: nix profile install nixpkgs#lla
provenance:
  formula: lla
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
