    kind: cli
    name: FederationStateStore
  - exposure: global executable
    kind: cli
    name: distribute-exclude.sh
  - exposure: global executable
    kind: cli
    name: hadoop
  - exposure: global executable
    kind: cli
    name: hadoop-daemon.sh
  - exposure: global executable
    kind: cli
    name: hadoop-daemons.sh
  - exposure: global executable
    kind: cli
    name: hdfs
  - exposure: global executable
    kind: cli
    name: httpfs.sh
  - exposure: global executable
    kind: cli
    name: kms.sh
  - exposure: global executable
    kind: cli
    name: mapred
  - exposure: global executable
    kind: cli
    name: mr-jobhistory-daemon.sh
  - exposure: global executable
    kind: cli
    name: refresh-namenodes.sh
  - exposure: global executable
    kind: cli
    name: start-all.sh
  - exposure: global executable
    kind: cli
    name: start-balancer.sh
  - exposure: global executable
    kind: cli
    name: start-dfs.sh
  - exposure: global executable
    kind: cli
    name: start-secure-dns.sh
  - exposure: global executable
    kind: cli
    name: start-yarn.sh
  - exposure: global executable
    kind: cli
    name: stop-all.sh
