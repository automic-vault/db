    name: workers.sh
  - exposure: global executable
    kind: cli
    name: yarn-daemon.sh
  - exposure: global executable
    kind: cli
    name: yarn-daemons.sh
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hadoop
  brew: brew install hadoop
  chocolatey: choco install hadoop
  macports: sudo port install hadoop
  nix: nix profile install nixpkgs#hadoop
provenance:
  formula: hadoop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
