id: brew:hadoop
display-name: hadoop
homepage: https://hadoop.apache.org/
repo: >
  https://www.apache.org/dyn/closer.lua?path=hadoop/common/hadoop-3.5.0/hadoop-3.5.0.tar.gz
docs: https://hadoop.apache.org/
package-manager:
  brew: hadoop
  chocolatey: hadoop
  macports: hadoop
  nix: hadoop
package-manager-url: https://formulae.brew.sh/formula/hadoop
version: 3.5.0
license: Apache-2.0
category: network
tags:
  - cli
description: Framework for distributed processing of large data sets
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=hadoop/common/hadoop-3.5.0/hadoop-3.5.0.tar.gz
dependencies:
  - openjdk@17
executables:
