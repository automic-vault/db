id: brew:dockerfilegraph
display-name: dockerfilegraph
homepage: https://github.com/patrickhoefler/dockerfilegraph
repo: https://github.com/patrickhoefler/dockerfilegraph
docs: https://github.com/patrickhoefler/dockerfilegraph
package-manager:
  brew: dockerfilegraph
package-manager-url: https://formulae.brew.sh/formula/dockerfilegraph
version: 0.21.0
license: MIT
category: development
tags:
  - cli
description: Visualize your multi-stage Dockerfiles
source-archive: https://github.com/patrickhoefler/dockerfilegraph/archive/refs/tags/v0.21.0.tar.gz
dependencies:
  - graphviz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dockerfilegraph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dockerfilegraph
  brew: brew install dockerfilegraph
provenance:
  formula: dockerfilegraph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
