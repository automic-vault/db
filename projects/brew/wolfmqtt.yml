id: brew:wolfmqtt
display-name: wolfmqtt
homepage: https://github.com/wolfSSL/wolfMQTT
repo: https://github.com/wolfSSL/wolfMQTT
docs: https://github.com/wolfSSL/wolfMQTT
package-manager:
  brew: wolfmqtt
package-manager-url: https://formulae.brew.sh/formula/wolfmqtt
version: 2.0.0
license: GPL-3.0-or-later
category: security
tags:
  - cli
description: Small, fast, portable MQTT client C implementation
source-archive: https://github.com/wolfSSL/wolfMQTT/archive/refs/tags/v2.0.0.tar.gz
dependencies:
  - wolfssl
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: wolfmqtt-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wolfmqtt
  brew: brew install wolfmqtt
provenance:
  formula: wolfmqtt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
