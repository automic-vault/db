id: brew:yacas
display-name: yacas
homepage: https://www.yacas.org/
repo: https://github.com/grzegorzmazur/yacas
docs: https://www.yacas.org/
package-manager:
  brew: yacas
  debian: yacas
  macports: yacas
  nix: yacas
  ubuntu: yacas
package-manager-url: https://formulae.brew.sh/formula/yacas
version: 1.9.1
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: General purpose computer algebra system
source-archive: https://github.com/grzegorzmazur/yacas/archive/refs/tags/v1.9.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: yacas
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yacas
  brew: brew install yacas
  debian: sudo apt install yacas
  macports: sudo port install yacas
  nix: nix profile install nixpkgs#yacas
  ubuntu: sudo apt install yacas
provenance:
  formula: yacas
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
