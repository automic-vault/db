id: brew:ode
display-name: ode
homepage: https://www.ode.org/
repo: https://bitbucket.org/odedevs/ode/downloads/ode-0.16.6.tar.gz
docs: https://www.ode.org/
package-manager:
  apk: ode
  brew: ode
  dnf: ode
  macports: ode
  nix: ode
  pacman: ode
package-manager-url: https://formulae.brew.sh/formula/ode
version: 0.16.6
license: LGPL-2.1-or-later OR BSD-3-Clause
category: network
tags:
  - cli
description: Simulating articulated rigid body dynamics
source-archive: https://bitbucket.org/odedevs/ode/downloads/ode-0.16.6.tar.gz
dependencies:
  - libccd
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ode-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ode
  av: sudo av install brew:ode
  brew: brew install ode
  dnf: sudo dnf install ode
  macports: sudo port install ode
  nix: nix profile install nixpkgs#ode
  pacman: sudo pacman -S ode
provenance:
  formula: ode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
