id: brew:dpp
display-name: dpp
homepage: https://github.com/atilaneves/dpp
repo: https://github.com/atilaneves/dpp
docs: https://github.com/atilaneves/dpp
package-manager:
  brew: dpp
  nix: dpp
package-manager-url: https://formulae.brew.sh/formula/dpp
version: 0.6.0
license: BSL-1.0
category: development
tags:
  - cli
description: Directly include C headers in D source code
source-archive: https://github.com/atilaneves/dpp.git
build-dependencies:
  - dtools
  - dub
  - ldc
uses-from-macos:
  - llvm
executables:
  - exposure: global executable
    kind: cli
    name: d++
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dpp
  brew: brew install dpp
  nix: nix profile install nixpkgs#dpp
provenance:
  formula: dpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
