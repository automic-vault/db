id: brew:libofx
display-name: libofx
homepage: https://github.com/libofx/libofx
repo: https://github.com/libofx/libofx
docs: https://github.com/libofx/libofx
package-manager:
  apk: libofx
  brew: libofx
  dnf: libofx
  macports: libofx
  nix: libofx
  pacman: libofx
  zypper: libofx
package-manager-url: https://formulae.brew.sh/formula/libofx
version: 0.10.9
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Library to support OFX command responses
source-archive: https://github.com/libofx/libofx/releases/download/0.10.9/libofx-0.10.9.tar.gz
dependencies:
  - open-sp
executables:
  - exposure: global executable
    kind: cli
    name: ofx2qif
  - exposure: global executable
    kind: cli
    name: ofxdump
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libofx
  av: sudo av install brew:libofx
  brew: brew install libofx
  dnf: sudo dnf install libofx
  macports: sudo port install libofx
  nix: nix profile install nixpkgs#libofx
  pacman: sudo pacman -S libofx
  zypper: sudo zypper install libofx
provenance:
  formula: libofx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
