id: brew:dtools
display-name: dtools
homepage: https://dlang.org/
repo: https://github.com/dlang/tools
docs: https://dlang.org/
package-manager:
  apk: dtools
  brew: dtools
  debian: dustmite
  nix: dtools
  pacman: dtools
  ubuntu: dustmite
package-manager-url: https://formulae.brew.sh/formula/dtools
version: 2.112.0
license: BSL-1.0
category: development
tags:
  - cli
description: D programming language tools
source-archive: https://github.com/dlang/tools/archive/refs/tags/v2.112.0.tar.gz
build-dependencies:
  - dub
  - ldc
executables:
  - exposure: global executable
    kind: cli
    name: ddemangle
  - exposure: global executable
    kind: cli
    name: dustmite
  - exposure: global executable
    kind: cli
    name: rdmd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dtools
  av: sudo av install brew:dtools
  brew: brew install dtools
  debian: sudo apt install dustmite
  nix: nix profile install nixpkgs#dtools
  pacman: sudo pacman -S dtools
  ubuntu: sudo apt install dustmite
provenance:
  formula: dtools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
