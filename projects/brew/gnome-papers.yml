id: brew:gnome-papers
display-name: gnome-papers
homepage: https://apps.gnome.org/Papers/
repo: https://download.gnome.org/sources/papers/50/papers-50.2.tar.xz
docs: https://apps.gnome.org/Papers/
package-manager:
  apk: papers
  brew: gnome-papers
  debian: papers
  dnf: papers
  nix: papers
  pacman: papers
  winget: DigitalScience.Papers
  zypper: papers
package-manager-url: https://formulae.brew.sh/formula/gnome-papers
version: 50.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Document viewer for PDF and other document formats aimed at the GNOME desktop
source-archive: https://download.gnome.org/sources/papers/50/papers-50.2.tar.xz
dependencies:
  - adwaita-icon-theme
  - cairo
  - djvulibre
  - exempi
  - gdk-pixbuf
  - gettext
  - glib
  - graphene
  - gtk4
  - gtksourceview5
  - harfbuzz
  - hicolor-icon-theme
  - libadwaita
  - libarchive
  - libspelling
  - libtiff
  - pango
  - poppler
build-dependencies:
  - blueprint-compiler
  - desktop-file-utils
  - gettext
  - gobject-introspection
  - itstool
  - meson
  - ninja
  - pkgconf
  - python@3.14
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: papers
  - exposure: global executable
    kind: cli
    name: papers-previewer
  - exposure: global executable
    kind: cli
    name: papers-thumbnailer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add papers
  av: sudo av install brew:gnome-papers
  brew: brew install gnome-papers
  debian: sudo apt install papers
  dnf: sudo dnf install papers
  nix: nix profile install nixpkgs#papers
  pacman: sudo pacman -S papers
  winget: winget install --id DigitalScience.Papers -e
  zypper: sudo zypper install papers
provenance:
  formula: gnome-papers
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
