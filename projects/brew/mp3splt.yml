id: brew:mp3splt
display-name: mp3splt
homepage: https://mp3splt.sourceforge.net/mp3splt_page/home.php
repo: https://downloads.sourceforge.net/project/mp3splt/mp3splt/2.6.2/mp3splt-2.6.2.tar.gz
docs: https://mp3splt.sourceforge.net/mp3splt_page/home.php
package-manager:
  apk: mp3splt
  brew: mp3splt
  debian: mp3splt
  macports: mp3splt
  ubuntu: mp3splt
package-manager-url: https://formulae.brew.sh/formula/mp3splt
version: 2.6.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Command-line interface to split MP3 and Ogg Vorbis files
source-archive: https://downloads.sourceforge.net/project/mp3splt/mp3splt/2.6.2/mp3splt-2.6.2.tar.gz
dependencies:
  - gettext
  - libmp3splt
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mp3splt
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mp3splt
  av: sudo av install brew:mp3splt
  brew: brew install mp3splt
  debian: sudo apt install mp3splt
  macports: sudo port install mp3splt
  ubuntu: sudo apt install mp3splt
provenance:
  formula: mp3splt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
