id: brew:codec2
display-name: codec2
homepage: https://www.rowetel.com/?page_id=452
repo: https://github.com/drowe67/codec2
docs: https://www.rowetel.com/?page_id=452
package-manager:
  apk: codec2
  brew: codec2
  debian: codec2
  dnf: codec2
  macports: codec2
  nix: codec2
  pacman: codec2
  ubuntu: codec2
  zypper: codec2
package-manager-url: https://formulae.brew.sh/formula/codec2
version: 1.2.0
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Open source speech codec
source-archive: https://github.com/drowe67/codec2/archive/refs/tags/1.2.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: c2dec
  - exposure: global executable
    kind: cli
    name: c2demo
  - exposure: global executable
    kind: cli
    name: c2enc
  - exposure: global executable
    kind: cli
    name: c2sim
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add codec2
  av: sudo av install brew:codec2
  brew: brew install codec2
  debian: sudo apt install codec2
  dnf: sudo dnf install codec2
  macports: sudo port install codec2
  nix: nix profile install nixpkgs#codec2
  pacman: sudo pacman -S codec2
  ubuntu: sudo apt install codec2
  zypper: sudo zypper install codec2
provenance:
  formula: codec2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
