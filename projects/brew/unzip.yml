id: brew:unzip
display-name: unzip
homepage: https://infozip.sourceforge.net/UnZip.html
repo: >
  https://downloads.sourceforge.net/project/infozip/UnZip%206.x%20%28latest%29/UnZip%206.0/unzip60.tar.gz
docs: https://infozip.sourceforge.net/UnZip.html
package-manager:
  apk: unzip
  brew: unzip
  chocolatey: unzip
  debian: unzip
  dnf: unzip
  macports: unzip
  nix: unzip
  pacman: unzip
  scoop: main/unzip
  ubuntu: unzip
  zypper: unzip
package-manager-url: https://formulae.brew.sh/formula/unzip
version: 6.0
license: Info-ZIP
category: network
tags:
  - cli
description: Extraction utility for .zip compressed archives
source-archive: >
  https://downloads.sourceforge.net/project/infozip/UnZip%206.x%20%28latest%29/UnZip%206.0/unzip60.tar.gz
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: funzip
  - exposure: global executable
    kind: cli
    name: unzip
  - exposure: global executable
    kind: cli
    name: unzipsfx
  - exposure: global executable
    kind: cli
    name: zipgrep
  - exposure: global executable
    kind: cli
    name: zipinfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add unzip
  av: sudo av install brew:unzip
  brew: brew install unzip
  chocolatey: choco install unzip
  debian: sudo apt install unzip
  dnf: sudo dnf install unzip
  macports: sudo port install unzip
  nix: nix profile install nixpkgs#unzip
  pacman: sudo pacman -S unzip
  scoop: scoop install main/unzip
  ubuntu: sudo apt install unzip
  zypper: sudo zypper install unzip
provenance:
  formula: unzip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
