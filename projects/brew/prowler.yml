id: brew:prowler
display-name: prowler
homepage: https://prowler.com/
repo: >
  https://files.pythonhosted.org/packages/5f/4b/ec01e785f372984ad181034431c106d6e23512b9fcefa613d73e496d5c96/prowler-5.28.0.tar.gz
docs: https://prowler.com/
package-manager:
  brew: prowler
  nix: prowler
package-manager-url: https://formulae.brew.sh/formula/prowler
version: 5.28.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
  - security
description: Tool for cloud security assessments, audits, incident response, and more
source-archive: >
  https://files.pythonhosted.org/packages/5f/4b/ec01e785f372984ad181034431c106d6e23512b9fcefa613d73e496d5c96/prowler-5.28.0.tar.gz
dependencies:
  - certifi
  - libsodium
  - libyaml
  - lz4
  - openssl@3
  - python@3.12
build-dependencies:
  - cmake
  - meson
  - ninja
  - pkgconf
  - rust
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: prowler
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:prowler
  brew: brew install prowler
  nix: nix profile install nixpkgs#prowler
provenance:
  formula: prowler
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
