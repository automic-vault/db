id: brew:bitwarden-cli
display-name: bitwarden-cli
homepage: https://bitwarden.com/
repo: https://github.com/bitwarden/clients
docs: https://bitwarden.com/
package-manager:
  brew: bitwarden-cli
  chocolatey: bitwarden-cli
  macports: bitwarden-cli
  nix: bitwarden-cli
  pacman: bitwarden-cli
  scoop: main/bitwarden-cli
  winget: Bitwarden.CLI
package-manager-url: https://formulae.brew.sh/formula/bitwarden-cli
version: 2026.4.2
license: GPL-3.0-only
category: security
tags:
  - cli
description: Secure and free password manager for all of your devices
source-archive: https://github.com/bitwarden/clients/archive/refs/tags/cli-v2026.4.2.tar.gz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: bw
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bitwarden-cli
  brew: brew install bitwarden-cli
  chocolatey: choco install bitwarden-cli
  macports: sudo port install bitwarden-cli
  nix: nix profile install nixpkgs#bitwarden-cli
  pacman: sudo pacman -S bitwarden-cli
  scoop: scoop install main/bitwarden-cli
  winget: winget install --id Bitwarden.CLI -e
provenance:
  formula: bitwarden-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
