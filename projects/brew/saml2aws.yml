id: brew:saml2aws
display-name: saml2aws
homepage: https://github.com/Versent/saml2aws
repo: https://github.com/Versent/saml2aws
docs: https://github.com/Versent/saml2aws
package-manager:
  brew: saml2aws
  chocolatey: saml2aws
  macports: saml2aws
  nix: saml2aws
  scoop: main/saml2aws
  winget: Versent.saml2aws
package-manager-url: https://formulae.brew.sh/formula/saml2aws
version: 2.36.19
license: MIT
category: cloud
tags:
  - aws
  - cli
description: Login and retrieve AWS temporary credentials using a SAML IDP
source-archive: https://github.com/Versent/saml2aws/archive/refs/tags/v2.36.19.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: saml2aws
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:saml2aws
  brew: brew install saml2aws
  chocolatey: choco install saml2aws
  macports: sudo port install saml2aws
  nix: nix profile install nixpkgs#saml2aws
  scoop: scoop install main/saml2aws
  winget: winget install --id Versent.saml2aws -e
provenance:
  formula: saml2aws
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
