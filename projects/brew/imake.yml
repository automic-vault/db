id: brew:imake
display-name: imake
homepage: https://xorg.freedesktop.org
repo: https://xorg.freedesktop.org/releases/individual/util/imake-1.0.11.tar.xz
docs: https://xorg.freedesktop.org
package-manager:
  apk: imake
  brew: imake
  dnf: imake
  macports: imake
  nix: imake
  pacman: imake
  zypper: imake
package-manager-url: https://formulae.brew.sh/formula/imake
version: 1.0.11
license: MIT
category: development
tags:
  - cli
description: Build automation system written for X11
source-archive: https://xorg.freedesktop.org/releases/individual/util/imake-1.0.11.tar.xz
dependencies:
  - tradcpp
build-dependencies:
  - meson
  - ninja
  - pkgconf
  - xorgproto
executables:
  - exposure: global executable
    kind: cli
    name: ccmakedep
  - exposure: global executable
    kind: cli
    name: cleanlinks
  - exposure: global executable
    kind: cli
    name: imake
  - exposure: global executable
    kind: cli
    name: makeg
  - exposure: global executable
    kind: cli
    name: mergelib
  - exposure: global executable
    kind: cli
    name: mkdirhier
  - exposure: global executable
    kind: cli
    name: mkhtmlindex
  - exposure: global executable
    kind: cli
    name: revpath
  - exposure: global executable
    kind: cli
    name: xmkmf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add imake
  av: sudo av install brew:imake
  brew: brew install imake
  dnf: sudo dnf install imake
  macports: sudo port install imake
  nix: nix profile install nixpkgs#imake
  pacman: sudo pacman -S imake
  zypper: sudo zypper install imake
provenance:
  formula: imake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
