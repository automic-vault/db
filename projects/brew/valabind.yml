id: brew:valabind
display-name: valabind
homepage: https://github.com/radare/valabind
repo: https://github.com/radare/valabind
docs: https://github.com/radare/valabind
package-manager:
  brew: valabind
  debian: valabind
  macports: valabind
  pacman: valabind
  ubuntu: valabind
package-manager-url: https://formulae.brew.sh/formula/valabind
version: 2.1.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Vala bindings for radare, reverse engineering framework
source-archive: https://github.com/radare/valabind/archive/refs/tags/2.1.0.tar.gz
dependencies:
  - gettext
  - glib
  - swig
  - vala
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: valabind
  - exposure: global executable
    kind: cli
    name: valabind-cc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:valabind
  brew: brew install valabind
  debian: sudo apt install valabind
  macports: sudo port install valabind
  pacman: sudo pacman -S valabind
  ubuntu: sudo apt install valabind
provenance:
  formula: valabind
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
