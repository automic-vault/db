id: brew:borgbackup
display-name: borgbackup
homepage: https://www.borgbackup.org/
repo: >
  https://files.pythonhosted.org/packages/eb/38/7fc8c8c7d9dba455f0e29f2ab5b77109313f4e58fe5014d0e1b7855de3cd/borgbackup-1.4.4.tar.gz
docs: https://www.borgbackup.org/
package-manager:
  apk: borgbackup
  brew: borgbackup
  debian: borgbackup
  dnf: borgbackup
  macports: borgbackup
  nix: borgbackup
  pacman: borg
  ubuntu: borgbackup
  zypper: borgbackup
package-manager-url: https://formulae.brew.sh/formula/borgbackup
version: 1.4.4
license: BSD-3-Clause
category: security
tags:
  - cli
description: Deduplicating archiver with compression and authenticated encryption
source-archive: >
  https://files.pythonhosted.org/packages/eb/38/7fc8c8c7d9dba455f0e29f2ab5b77109313f4e58fe5014d0e1b7855de3cd/borgbackup-1.4.4.tar.gz
dependencies:
  - libb2
  - lz4
  - openssl@3
  - python@3.14
  - xxhash
  - zstd
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: borg
  - exposure: global executable
    kind: cli
    name: borgfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add borgbackup
  av: sudo av install brew:borgbackup
  brew: brew install borgbackup
  debian: sudo apt install borgbackup
  dnf: sudo dnf install borgbackup
  macports: sudo port install borgbackup
  nix: nix profile install nixpkgs#borgbackup
  pacman: sudo pacman -S borg
  ubuntu: sudo apt install borgbackup
  zypper: sudo zypper install borgbackup
provenance:
  formula: borgbackup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
