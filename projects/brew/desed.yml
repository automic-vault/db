id: brew:desed
display-name: desed
homepage: https://soptik.tech/articles/building-desed-the-sed-debugger.html
repo: https://github.com/SoptikHa2/desed
docs: https://soptik.tech/articles/building-desed-the-sed-debugger.html
package-manager:
  apk: desed
  brew: desed
  dnf: desed
  nix: desed
package-manager-url: https://formulae.brew.sh/formula/desed
version: 1.2.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Debugger for Sed
source-archive: https://github.com/SoptikHa2/desed/archive/refs/tags/v1.2.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: desed
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add desed
  av: sudo av install brew:desed
  brew: brew install desed
  dnf: sudo dnf install desed
  nix: nix profile install nixpkgs#desed
provenance:
  formula: desed
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
