id: brew:wayback
display-name: wayback
homepage: https://docs.wabarc.eu.org
repo: https://github.com/wabarc/wayback
docs: https://docs.wabarc.eu.org
package-manager:
  apk: wayback
  brew: wayback
  dnf: wayback
  nix: wayback
  zypper: wayback
package-manager-url: https://formulae.brew.sh/formula/wayback
version: 0.20.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Archiving tool integrated with various archival services
source-archive: https://github.com/wabarc/wayback/archive/refs/tags/v0.20.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wayback
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wayback
  av: sudo av install brew:wayback
  brew: brew install wayback
  dnf: sudo dnf install wayback
  nix: nix profile install nixpkgs#wayback
  zypper: sudo zypper install wayback
provenance:
  formula: wayback
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
