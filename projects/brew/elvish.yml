id: brew:elvish
display-name: elvish
homepage: https://elv.sh/
repo: https://github.com/elves/elvish
docs: https://elv.sh/
package-manager:
  apk: elvish
  brew: elvish
  debian: elvish
  dnf: elvish
  macports: elvish
  nix: elvish
  pacman: elvish
  scoop: main/elvish
  ubuntu: elvish
  winget: elves.elvish
package-manager-url: https://formulae.brew.sh/formula/elvish
version: 0.21.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Friendly and expressive shell
source-archive: https://github.com/elves/elvish/archive/refs/tags/v0.21.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: elvish
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add elvish
  av: sudo av install brew:elvish
  brew: brew install elvish
  debian: sudo apt install elvish
  dnf: sudo dnf install elvish
  macports: sudo port install elvish
  nix: nix profile install nixpkgs#elvish
  pacman: sudo pacman -S elvish
  scoop: scoop install main/elvish
  ubuntu: sudo apt install elvish
  winget: winget install --id elves.elvish -e
provenance:
  formula: elvish
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
