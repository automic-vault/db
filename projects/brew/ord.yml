id: brew:ord
display-name: ord
homepage: https://ordinals.com/
repo: https://github.com/ordinals/ord
docs: https://ordinals.com/
package-manager:
  brew: ord
  nix: ord
package-manager-url: https://formulae.brew.sh/formula/ord
version: 0.27.1
license: CC0-1.0
category: development
tags:
  - cli
description: Index, block explorer, and command-line wallet
source-archive: https://github.com/ordinals/ord/archive/refs/tags/0.27.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ord
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ord
  brew: brew install ord
  nix: nix profile install nixpkgs#ord
provenance:
  formula: ord
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
