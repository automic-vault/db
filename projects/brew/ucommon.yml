id: brew:ucommon
display-name: ucommon
homepage: https://www.gnu.org/software/commoncpp/
repo: https://ftp.debian.org/debian/pool/main/u/ucommon/ucommon_7.0.1.orig.tar.gz
docs: https://www.gnu.org/software/commoncpp/
package-manager:
  brew: ucommon
  dnf: ucommon
  macports: ucommon
  nix: ucommon
  zypper: ucommon
package-manager-url: https://formulae.brew.sh/formula/ucommon
version: 7.0.1
license: LGPL-3.0-or-later AND (GPL-2.0-or-later WITH mif-exception)
category: network
tags:
  - cli
description: GNU C++ runtime library for threads, sockets, and parsing
source-archive: https://ftp.debian.org/debian/pool/main/u/ucommon/ucommon_7.0.1.orig.tar.gz
dependencies:
  - gettext
  - gnutls
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: args
  - exposure: global executable
    kind: cli
    name: car
  - exposure: global executable
    kind: cli
    name: commoncpp-config
  - exposure: global executable
    kind: cli
    name: keywait
  - exposure: global executable
    kind: cli
    name: mdsum
  - exposure: global executable
    kind: cli
    name: pdetach
  - exposure: global executable
    kind: cli
    name: scrub-files
  - exposure: global executable
    kind: cli
    name: sockaddr
  - exposure: global executable
    kind: cli
    name: ucommon-config
  - exposure: global executable
    kind: cli
    name: urlout
  - exposure: global executable
    kind: cli
    name: zerofill
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ucommon
  brew: brew install ucommon
  dnf: sudo dnf install ucommon
  macports: sudo port install ucommon
  nix: nix profile install nixpkgs#ucommon
  zypper: sudo zypper install ucommon
provenance:
  formula: ucommon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
