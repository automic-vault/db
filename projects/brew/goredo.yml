id: brew:goredo
display-name: goredo
homepage: https://goredo.dabase.com/
repo: https://goredo.dabase.com/download/goredo-2.9.1.tar.zst
docs: https://goredo.dabase.com/
package-manager:
  brew: goredo
  nix: goredo
package-manager-url: https://formulae.brew.sh/formula/goredo
version: 2.9.1
license: GPL-3.0-only
category: network
tags:
  - cli
description: Go implementation of djb's redo, a Makefile replacement that sucks less
source-archive: https://goredo.dabase.com/download/goredo-2.9.1.tar.zst
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goredo
  - exposure: global executable
    kind: cli
    name: redo-affects
  - exposure: global executable
    kind: cli
    name: redo-cleanup
  - exposure: global executable
    kind: cli
    name: redo-dep2rec
  - exposure: global executable
    kind: cli
    name: redo-depfix
  - exposure: global executable
    kind: cli
    name: redo-dot
  - exposure: global executable
    kind: cli
    name: redo-inode
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:goredo
  brew: brew install goredo
  nix: nix profile install nixpkgs#goredo
provenance:
  formula: goredo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
