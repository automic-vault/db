id: brew:gwyddion
display-name: gwyddion
homepage: https://gwyddion.net/
repo: https://downloads.sourceforge.net/project/gwyddion/gwyddion/2.71/gwyddion-2.71.tar.xz
docs: https://gwyddion.net/
package-manager:
  brew: gwyddion
  debian: gwyddion
  macports: gwyddion
  nix: gwyddion
  ubuntu: gwyddion
package-manager-url: https://formulae.brew.sh/formula/gwyddion
version: 2.71
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Scanning Probe Microscopy visualization and analysis tool
source-archive: https://downloads.sourceforge.net/project/gwyddion/gwyddion/2.71/gwyddion-2.71.tar.xz
dependencies:
  - at-spi2-core
  - cairo
  - fftw
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+
  - harfbuzz
  - libpng
  - libxml2
  - libzip
  - pango
  - zstd
build-dependencies:
  - autoconf
  - automake
  - gtk-doc
  - libtool
  - pkgconf
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: gwyddion
  - exposure: global executable
    kind: cli
    name: gwyddion-thumbnailer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gwyddion
  brew: brew install gwyddion
  debian: sudo apt install gwyddion
  macports: sudo port install gwyddion
  nix: nix profile install nixpkgs#gwyddion
  ubuntu: sudo apt install gwyddion
provenance:
  formula: gwyddion
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
