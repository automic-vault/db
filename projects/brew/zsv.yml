id: brew:zsv
display-name: zsv
homepage: https://github.com/liquidaty/zsv
repo: https://github.com/liquidaty/zsv
docs: https://github.com/liquidaty/zsv
package-manager:
  brew: zsv
  macports: zsv
  nix: zsv
  winget: liquidaty.zsv
package-manager-url: https://formulae.brew.sh/formula/zsv
version: 1.4.2
license: MIT
category: development
tags:
  - cli
description: Tabular data swiss-army knife CLI
source-archive: https://github.com/liquidaty/zsv/archive/refs/tags/v1.4.2.tar.gz
dependencies:
  - jq
  - pcre2
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: zsv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zsv
  brew: brew install zsv
  macports: sudo port install zsv
  nix: nix profile install nixpkgs#zsv
  winget: winget install --id liquidaty.zsv -e
provenance:
  formula: zsv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
