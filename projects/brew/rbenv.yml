id: brew:rbenv
display-name: rbenv
homepage: https://rbenv.org
repo: https://github.com/rbenv/rbenv
docs: https://rbenv.org
package-manager:
  brew: rbenv
  debian: rbenv
  dnf: rbenv
  macports: rbenv
  nix: rbenv
  pacman: rbenv
  ubuntu: rbenv
  zypper: rbenv
package-manager-url: https://formulae.brew.sh/formula/rbenv
version: 1.3.2
license: MIT
category: development
tags:
  - cli
description: Ruby version manager
source-archive: https://github.com/rbenv/rbenv/archive/refs/tags/v1.3.2.tar.gz
dependencies:
  - ruby-build
executables:
  - exposure: global executable
    kind: cli
    name: rbenv
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rbenv
  brew: brew install rbenv
  debian: sudo apt install rbenv
  dnf: sudo dnf install rbenv
  macports: sudo port install rbenv
  nix: nix profile install nixpkgs#rbenv
  pacman: sudo pacman -S rbenv
  ubuntu: sudo apt install rbenv
  zypper: sudo zypper install rbenv
provenance:
  formula: rbenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
