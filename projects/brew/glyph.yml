id: brew:glyph
display-name: glyph
homepage: https://github.com/seatedro/glyph
repo: https://github.com/seatedro/glyph
docs: https://github.com/seatedro/glyph
package-manager:
  brew: glyph
  winget: HasNate618.Glyph
package-manager-url: https://formulae.brew.sh/formula/glyph
version: 1.0.11
license: MIT
category: development
tags:
  - cli
description: Converts images/video to ASCII art
source-archive: https://github.com/seatedro/glyph/archive/refs/tags/v1.0.11.tar.gz
dependencies:
  - ffmpeg
build-dependencies:
  - pkgconf
  - zig@0.14
executables:
  - exposure: global executable
    kind: cli
    name: glyph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:glyph
  brew: brew install glyph
  winget: winget install --id HasNate618.Glyph -e
provenance:
  formula: glyph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
