id: brew:i2c-tools
display-name: i2c-tools
homepage: https://i2c.wiki.kernel.org/index.php/I2C_Tools
repo: https://mirrors.edge.kernel.org/pub/software/utils/i2c-tools/i2c-tools-4.4.tar.xz
docs: https://i2c.wiki.kernel.org/index.php/I2C_Tools
package-manager:
  apk: i2c-tools
  brew: i2c-tools
  debian: i2c-tools
  dnf: i2c-tools
  nix: i2c-tools
  pacman: i2c-tools
  ubuntu: i2c-tools
  zypper: i2c-tools
package-manager-url: https://formulae.brew.sh/formula/i2c-tools
version: 4.4
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: network
tags:
  - cli
description: Heterogeneous set of I2C tools for Linux
source-archive: https://mirrors.edge.kernel.org/pub/software/utils/i2c-tools/i2c-tools-4.4.tar.xz
build-dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: ddcmon
  - exposure: global executable
    kind: cli
    name: decode-dimms
  - exposure: global executable
    kind: cli
    name: decode-edid
  - exposure: global executable
    kind: cli
    name: decode-vaio
  - exposure: global executable
    kind: cli
    name: eeprog
  - exposure: global executable
    kind: cli
    name: i2c-stub-from-dump
  - exposure: global executable
    kind: cli
    name: i2cdetect
  - exposure: global executable
    kind: cli
    name: i2cdump
  - exposure: global executable
    kind: cli
    name: i2cget
  - exposure: global executable
    kind: cli
    name: i2cset
  - exposure: global executable
    kind: cli
    name: i2ctransfer
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add i2c-tools
  av: sudo av install brew:i2c-tools
  brew: brew install i2c-tools
  debian: sudo apt install i2c-tools
  dnf: sudo dnf install i2c-tools
  nix: nix profile install nixpkgs#i2c-tools
  pacman: sudo pacman -S i2c-tools
  ubuntu: sudo apt install i2c-tools
  zypper: sudo zypper install i2c-tools
provenance:
  formula: i2c-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
