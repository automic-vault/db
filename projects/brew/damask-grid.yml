id: brew:damask-grid
display-name: damask-grid
homepage: https://damask-multiphysics.org
repo: https://damask-multiphysics.org/download/damask-3.0.2.tar.xz
docs: https://damask-multiphysics.org
package-manager:
  brew: damask-grid
package-manager-url: https://formulae.brew.sh/formula/damask-grid
version: 3.0.2
license: AGPL-3.0-only
category: network
tags:
  - cli
description: Grid solver of DAMASK - Multi-physics crystal plasticity simulation package
source-archive: https://damask-multiphysics.org/download/damask-3.0.2.tar.xz
dependencies:
  - fftw
  - gcc
  - hdf5-mpi
  - libomp
  - metis
  - open-mpi
  - openblas
  - petsc
  - scalapack
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: DAMASK_grid
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:damask-grid
  brew: brew install damask-grid
provenance:
  formula: damask-grid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
