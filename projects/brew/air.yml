id: brew:air
display-name: air
homepage: https://github.com/posit-dev/air
repo: https://github.com/posit-dev/air
docs: https://github.com/posit-dev/air
package-manager:
  brew: air
  macports: air
  nix: air
  scoop: main/air
  winget: Posit.Air
package-manager-url: https://formulae.brew.sh/formula/air
version: 0.9.0
license: MIT
category: development
tags:
  - cli
description: Fast and opinionated formatter for R code
source-archive: https://github.com/posit-dev/air/archive/refs/tags/0.9.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: air
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:air
  brew: brew install air
  macports: sudo port install air
  nix: nix profile install nixpkgs#air
  scoop: scoop install main/air
  winget: winget install --id Posit.Air -e
provenance:
  formula: air
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
