id: brew:limine
display-name: limine
homepage: https://github.com/Limine-Bootloader/Limine
repo: https://github.com/Limine-Bootloader/Limine
docs: https://github.com/Limine-Bootloader/Limine
package-manager:
  apk: limine
  brew: limine
  nix: limine
  pacman: limine
  zypper: limine
package-manager-url: https://formulae.brew.sh/formula/limine
version: 12.3.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: Modern, advanced, portable, multiprotocol bootloader and boot manager
source-archive: >
  https://github.com/Limine-Bootloader/Limine/releases/download/v12.3.1/limine-12.3.1.tar.gz
build-dependencies:
  - lld
  - llvm
  - mtools
  - nasm
executables:
  - exposure: global executable
    kind: cli
    name: limine
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add limine
  av: sudo av install brew:limine
  brew: brew install limine
  nix: nix profile install nixpkgs#limine
  pacman: sudo pacman -S limine
  zypper: sudo zypper install limine
provenance:
  formula: limine
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
