id: brew:qmmp
display-name: qmmp
homepage: https://qmmp.ylsoftware.com/
repo: https://qmmp.ylsoftware.com/files/qmmp/2.3/qmmp-2.3.2.tar.bz2
docs: https://qmmp.ylsoftware.com/
package-manager:
  brew: qmmp
  chocolatey: qmmp
  debian: qmmp
  dnf: qmmp
  macports: qmmp
  nix: qmmp
  pacman: qmmp
  ubuntu: qmmp
  winget: QmmpDevelopmentTeam.qmmp
  zypper: qmmp
package-manager-url: https://formulae.brew.sh/formula/qmmp
version: 2.3.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Qt-based Multimedia Player
source-archive: https://qmmp.ylsoftware.com/files/qmmp/2.3/qmmp-2.3.2.tar.bz2
dependencies:
  - faad2
  - ffmpeg
  - flac
  - game-music-emu
  - gettext
  - glib
  - jack
  - libarchive
  - libbs2b
  - libcddb
  - libcdio
  - libcdio-paranoia
  - libmms
  - libmodplug
  - libogg
  - libsamplerate
  - libshout
  - libsndfile
  - libsoxr
  - libvorbis
  - libxmp
  - mad
  - mpg123
  - mplayer
  - musepack
  - opus
  - opusfile
  - projectm
  - pulseaudio
  - qtbase
  - qtmultimedia
  - taglib
  - wavpack
  - wildmidi
build-dependencies:
  - cmake
  - pkgconf
  - qttools
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: qmmp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qmmp
  brew: brew install qmmp
  chocolatey: choco install qmmp
  debian: sudo apt install qmmp
  dnf: sudo dnf install qmmp
  macports: sudo port install qmmp
  nix: nix profile install nixpkgs#qmmp
  pacman: sudo pacman -S qmmp
  ubuntu: sudo apt install qmmp
  winget: winget install --id QmmpDevelopmentTeam.qmmp -e
  zypper: sudo zypper install qmmp
provenance:
  formula: qmmp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
