id: brew:curlftpfs
display-name: curlftpfs
homepage: https://curlftpfs.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/curlftpfs/curlftpfs/0.9.2/curlftpfs-0.9.2.tar.gz
docs: https://curlftpfs.sourceforge.net/
package-manager:
  apk: curlftpfs
  brew: curlftpfs
  debian: curlftpfs
  dnf: curlftpfs
  macports: curlftpfs
  nix: curlftpfs
  pacman: curlftpfs
package-manager-url: https://formulae.brew.sh/formula/curlftpfs
version: 0.9.2
license: GPL-2.0-only
category: network
tags:
  - cli
description: Filesystem for accessing FTP hosts based on FUSE and libcurl
source-archive: >
  https://downloads.sourceforge.net/project/curlftpfs/curlftpfs/0.9.2/curlftpfs-0.9.2.tar.gz
dependencies:
  - curl
  - glib
  - libfuse@2
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: curlftpfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add curlftpfs
  av: sudo av install brew:curlftpfs
  brew: brew install curlftpfs
  debian: sudo apt install curlftpfs
  dnf: sudo dnf install curlftpfs
  macports: sudo port install curlftpfs
  nix: nix profile install nixpkgs#curlftpfs
  pacman: sudo pacman -S curlftpfs
provenance:
  formula: curlftpfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
