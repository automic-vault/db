id: brew:reposurgeon
display-name: reposurgeon
homepage: http://www.catb.org/esr/reposurgeon/
repo: https://gitlab.com/esr/reposurgeon/-/archive/5.7/reposurgeon-5.7.tar.gz
docs: http://www.catb.org/esr/reposurgeon/
package-manager:
  brew: reposurgeon
  debian: reposurgeon
  dnf: reposurgeon
  macports: reposurgeon
  nix: reposurgeon
  ubuntu: reposurgeon
package-manager-url: https://formulae.brew.sh/formula/reposurgeon
version: 5.7
license: BSD-2-Clause
category: development
tags:
  - cli
description: Edit version-control repository history
source-archive: https://gitlab.com/esr/reposurgeon/-/archive/5.7/reposurgeon-5.7.tar.gz
build-dependencies:
  - asciidoctor
  - go
uses-from-macos:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: repobench
  - exposure: global executable
    kind: cli
    name: repocutter
  - exposure: global executable
    kind: cli
    name: repomapper
  - exposure: global executable
    kind: cli
    name: reposurgeon
  - exposure: global executable
    kind: cli
    name: repotool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:reposurgeon
  brew: brew install reposurgeon
  debian: sudo apt install reposurgeon
  dnf: sudo dnf install reposurgeon
  macports: sudo port install reposurgeon
  nix: nix profile install nixpkgs#reposurgeon
  ubuntu: sudo apt install reposurgeon
provenance:
  formula: reposurgeon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
