id: brew:writerperfect
display-name: writerperfect
homepage: https://sourceforge.net/p/libwpd/wiki/writerperfect/
repo: >
  https://downloads.sourceforge.net/project/libwpd/writerperfect/writerperfect-0.9.6/writerperfect-0.9.6.tar.xz
docs: https://sourceforge.net/p/libwpd/wiki/writerperfect/
package-manager:
  brew: writerperfect
  debian: wks2ods
  dnf: writerperfect
  ubuntu: wks2ods
  zypper: writerperfect
package-manager-url: https://formulae.brew.sh/formula/writerperfect
version: 0.9.6
license: LGPL-2.1-or-later OR MPL-2.0
category: network
tags:
  - cli
description: Library for importing WordPerfect documents
source-archive: >
  https://downloads.sourceforge.net/project/libwpd/writerperfect/writerperfect-0.9.6/writerperfect-0.9.6.tar.xz
dependencies:
  - libodfgen
  - librevenge
  - libwpd
  - libwpg
  - libwps
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: wks2ods
  - exposure: global executable
    kind: cli
    name: wpd2odt
  - exposure: global executable
    kind: cli
    name: wpft2odf
  - exposure: global executable
    kind: cli
    name: wpg2odg
  - exposure: global executable
    kind: cli
    name: wps2odt
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:writerperfect
  brew: brew install writerperfect
  debian: sudo apt install wks2ods
  dnf: sudo dnf install writerperfect
  ubuntu: sudo apt install wks2ods
  zypper: sudo zypper install writerperfect
provenance:
  formula: writerperfect
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
