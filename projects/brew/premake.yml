id: brew:premake
display-name: premake
homepage: https://premake.github.io/
repo: https://github.com/premake/premake-core
docs: https://premake.github.io/
package-manager:
  brew: premake
  dnf: premake
  macports: premake
  nix: premake
  pacman: premake
  scoop: main/premake
package-manager-url: https://formulae.brew.sh/formula/premake
version: 5.0.0-beta8
license: BSD-3-Clause
category: development
tags:
  - cli
description: Write once, build anywhere Lua-based build system
source-archive: https://github.com/premake/premake-core/archive/refs/tags/v5.0.0-beta8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: premake5
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:premake
  brew: brew install premake
  dnf: sudo dnf install premake
  macports: sudo port install premake
  nix: nix profile install nixpkgs#premake
  pacman: sudo pacman -S premake
  scoop: scoop install main/premake
provenance:
  formula: premake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
