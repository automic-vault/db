id: brew:opensubdiv
display-name: opensubdiv
homepage: https://www.opensubdiv.org/
repo: https://github.com/PixarAnimationStudios/OpenSubdiv
docs: https://www.opensubdiv.org/
package-manager:
  apk: opensubdiv
  brew: opensubdiv
  dnf: opensubdiv
  macports: opensubdiv
  nix: opensubdiv
  pacman: opensubdiv
package-manager-url: https://formulae.brew.sh/formula/opensubdiv
version: 3.7.0
license: Apache-2.0
category: development
tags:
  - cli
description: Open-source subdivision surface library
source-archive: https://github.com/PixarAnimationStudios/OpenSubdiv/archive/refs/tags/v3_7_0.tar.gz
dependencies:
  - glfw
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: bfr_evaluate
  - exposure: global executable
    kind: cli
    name: far_perf
  - exposure: global executable
    kind: cli
    name: far_regression
  - exposure: global executable
    kind: cli
    name: hbr_baseline
  - exposure: global executable
    kind: cli
    name: hbr_regression
  - exposure: global executable
    kind: cli
    name: osd_regression
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add opensubdiv
  av: sudo av install brew:opensubdiv
  brew: brew install opensubdiv
  dnf: sudo dnf install opensubdiv
  macports: sudo port install opensubdiv
  nix: nix profile install nixpkgs#opensubdiv
  pacman: sudo pacman -S opensubdiv
provenance:
  formula: opensubdiv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
