id: brew:lazyjournal
display-name: lazyjournal
homepage: https://github.com/Lifailon/lazyjournal
repo: https://github.com/Lifailon/lazyjournal
docs: https://github.com/Lifailon/lazyjournal
package-manager:
  brew: lazyjournal
  nix: lazyjournal
package-manager-url: https://formulae.brew.sh/formula/lazyjournal
version: 0.8.6
license: MIT
category: cloud
tags:
  - cli
  - docker
  - kubernetes
description: TUI for logs from journalctl, file system, Docker, Podman and Kubernetes pods
source-archive: https://github.com/Lifailon/lazyjournal/archive/refs/tags/0.8.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lazyjournal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lazyjournal
  brew: brew install lazyjournal
  nix: nix profile install nixpkgs#lazyjournal
provenance:
  formula: lazyjournal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
