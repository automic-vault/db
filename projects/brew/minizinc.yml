id: brew:minizinc
display-name: minizinc
homepage: https://www.minizinc.org/
repo: https://github.com/MiniZinc/libminizinc
docs: https://www.minizinc.org/
package-manager:
  brew: minizinc
  debian: minizinc
  macports: minizinc
  nix: minizinc
  ubuntu: minizinc
  zypper: minizinc
package-manager-url: https://formulae.brew.sh/formula/minizinc
version: 2.9.7
license: MPL-2.0
category: development
tags:
  - cli
description: Medium-level constraint modeling language
source-archive: https://github.com/MiniZinc/libminizinc/archive/refs/tags/2.9.7.tar.gz
dependencies:
  - cbc
  - cgl
  - clp
  - coinutils
  - gecode
  - osi
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: minizinc
  - exposure: global executable
    kind: cli
    name: mzn2doc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:minizinc
  brew: brew install minizinc
  debian: sudo apt install minizinc
  macports: sudo port install minizinc
  nix: nix profile install nixpkgs#minizinc
  ubuntu: sudo apt install minizinc
  zypper: sudo zypper install minizinc
provenance:
  formula: minizinc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
