id: brew:rpl
display-name: rpl
homepage: https://github.com/rrthomas/rpl
repo: https://github.com/rrthomas/rpl
docs: https://github.com/rrthomas/rpl
package-manager:
  brew: rpl
  debian: rpl
  dnf: rpl
  macports: rpl
  nix: rpl
  ubuntu: rpl
package-manager-url: https://formulae.brew.sh/formula/rpl
version: 2.0.4
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Text replacement utility
source-archive: https://github.com/rrthomas/rpl/releases/download/v2.0.4/rpl-2.0.4.tar.gz
dependencies:
  - gettext
  - glib
  - pcre2
  - uchardet
build-dependencies:
  - help2man
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: rpl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rpl
  brew: brew install rpl
  debian: sudo apt install rpl
  dnf: sudo dnf install rpl
  macports: sudo port install rpl
  nix: nix profile install nixpkgs#rpl
  ubuntu: sudo apt install rpl
provenance:
  formula: rpl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
