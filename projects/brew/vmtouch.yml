id: brew:vmtouch
display-name: vmtouch
homepage: https://hoytech.com/vmtouch/
repo: https://github.com/hoytech/vmtouch
docs: https://hoytech.com/vmtouch/
package-manager:
  apk: vmtouch
  brew: vmtouch
  debian: vmtouch
  dnf: vmtouch
  macports: vmtouch
  nix: vmtouch
  ubuntu: vmtouch
  zypper: vmtouch
package-manager-url: https://formulae.brew.sh/formula/vmtouch
version: 1.3.1
license: BSD-3-Clause
category: development
tags:
