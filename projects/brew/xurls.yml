id: brew:xurls
display-name: xurls
homepage: https://github.com/mvdan/xurls
repo: https://github.com/mvdan/xurls
docs: https://github.com/mvdan/xurls
package-manager:
  brew: xurls
  nix: xurls
package-manager-url: https://formulae.brew.sh/formula/xurls
version: 2.6.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Extract urls from text
source-archive: https://github.com/mvdan/xurls/archive/refs/tags/v2.6.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: xurls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xurls
  brew: brew install xurls
  nix: nix profile install nixpkgs#xurls
provenance:
  formula: xurls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
