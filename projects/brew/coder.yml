id: brew:coder
display-name: coder
homepage: https://coder.com
repo: https://github.com/coder/coder
docs: https://coder.com
package-manager:
  brew: coder
  nix: coder
  scoop: main/coder
  winget: Coder.Coder
package-manager-url: https://formulae.brew.sh/formula/coder
version: 2.32.4
license: AGPL-3.0-only
category: cloud
tags:
  - cli
description: Tool for provisioning self-hosted development environments with Terraform
source-archive: https://github.com/coder/coder/archive/refs/tags/v2.32.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: coder
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:coder
  brew: brew install coder
  nix: nix profile install nixpkgs#coder
  scoop: scoop install main/coder
  winget: winget install --id Coder.Coder -e
provenance:
  formula: coder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
