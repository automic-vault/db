id: brew:lbdb
display-name: lbdb
homepage: https://www.spinnaker.de/lbdb/
repo: https://www.spinnaker.de/lbdb/download/lbdb-0.57.tar.gz
docs: https://www.spinnaker.de/lbdb/
package-manager:
  brew: lbdb
  debian: lbdb
  dnf: lbdb
  macports: lbdb
  nix: lbdb
  ubuntu: lbdb
  zypper: lbdb
package-manager-url: https://formulae.brew.sh/formula/lbdb
version: 0.57
license: GPL-2.0-or-later
category: database
tags:
  - cli
  - database
description: Little brother's database for the mutt mail reader
source-archive: https://www.spinnaker.de/lbdb/download/lbdb-0.57.tar.gz
dependencies:
  - abook
  - khard
executables:
  - exposure: global executable
    kind: cli
    name: lbdb-fetchaddr
  - exposure: global executable
    kind: cli
    name: lbdb_dotlock
  - exposure: global executable
    kind: cli
    name: lbdbq
  - exposure: global executable
    kind: cli
    name: mutt_ldap_query
  - exposure: global executable
    kind: cli
    name: nodelist2lbdb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lbdb
  brew: brew install lbdb
  debian: sudo apt install lbdb
  dnf: sudo dnf install lbdb
  macports: sudo port install lbdb
  nix: nix profile install nixpkgs#lbdb
  ubuntu: sudo apt install lbdb
  zypper: sudo zypper install lbdb
provenance:
  formula: lbdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
