id: brew:legba
display-name: legba
homepage: https://github.com/evilsocket/legba
repo: https://github.com/evilsocket/legba
docs: https://github.com/evilsocket/legba
package-manager:
  brew: legba
  nix: legba
  pacman: legba
package-manager-url: https://formulae.brew.sh/formula/legba
version: 1.3.0
license: AGPL-3.0-only
category: security
tags:
  - cli
description: Multiprotocol credentials bruteforcer/password sprayer and enumerator
source-archive: https://github.com/evilsocket/legba/archive/refs/tags/1.3.0.tar.gz
dependencies:
  - openssl@3
  - samba
build-dependencies:
  - cmake
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: legba
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:legba
  brew: brew install legba
  nix: nix profile install nixpkgs#legba
  pacman: sudo pacman -S legba
provenance:
  formula: legba
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
