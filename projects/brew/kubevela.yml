id: brew:kubevela
display-name: kubevela
homepage: https://kubevela.io
repo: https://github.com/kubevela/kubevela
docs: https://kubevela.io
package-manager:
  brew: kubevela
  nix: kubevela
package-manager-url: https://formulae.brew.sh/formula/kubevela
version: 1.10.8
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Application Platform based on Kubernetes and Open Application Model
source-archive: https://github.com/kubevela/kubevela.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vela
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubevela
  brew: brew install kubevela
  nix: nix profile install nixpkgs#kubevela
provenance:
  formula: kubevela
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
