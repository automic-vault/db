id: brew:slirp4netns
display-name: slirp4netns
homepage: https://github.com/rootless-containers/slirp4netns
repo: https://github.com/rootless-containers/slirp4netns
docs: https://github.com/rootless-containers/slirp4netns
package-manager:
  apk: slirp4netns
  brew: slirp4netns
  debian: slirp4netns
  dnf: slirp4netns
  nix: slirp4netns
  pacman: slirp4netns
  ubuntu: slirp4netns
  zypper: slirp4netns
package-manager-url: https://formulae.brew.sh/formula/slirp4netns
version: 1.3.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: User-mode networking for unprivileged network namespaces
source-archive: https://github.com/rootless-containers/slirp4netns/archive/refs/tags/v1.3.4.tar.gz
dependencies:
  - glib
  - libcap
  - libseccomp
  - libslirp
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: slirp4netns
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add slirp4netns
  av: sudo av install brew:slirp4netns
  brew: brew install slirp4netns
  debian: sudo apt install slirp4netns
  dnf: sudo dnf install slirp4netns
  nix: nix profile install nixpkgs#slirp4netns
  pacman: sudo pacman -S slirp4netns
  ubuntu: sudo apt install slirp4netns
  zypper: sudo zypper install slirp4netns
provenance:
  formula: slirp4netns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
