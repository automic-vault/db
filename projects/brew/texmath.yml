id: brew:texmath
display-name: texmath
homepage: https://johnmacfarlane.net/texmath.html
repo: https://hackage.haskell.org/package/texmath-0.13.1.1/texmath-0.13.1.1.tar.gz
docs: https://johnmacfarlane.net/texmath.html
package-manager:
  brew: texmath
  zypper: texmath
package-manager-url: https://formulae.brew.sh/formula/texmath
version: 0.13.1.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Haskell library for converting LaTeX math to MathML
source-archive: https://hackage.haskell.org/package/texmath-0.13.1.1/texmath-0.13.1.1.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: texmath
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:texmath
  brew: brew install texmath
  zypper: sudo zypper install texmath
provenance:
  formula: texmath
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
