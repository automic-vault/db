id: brew:libgtop
display-name: libgtop
homepage: https://gitlab.gnome.org/GNOME/libgtop
repo: https://download.gnome.org/sources/libgtop/2.40/libgtop-2.40.0.tar.xz
docs: https://gitlab.gnome.org/GNOME/libgtop
package-manager:
  apk: libgtop
  brew: libgtop
  macports: libgtop
  nix: libgtop
  pacman: libgtop
  zypper: libgtop
package-manager-url: https://formulae.brew.sh/formula/libgtop
version: 2.40.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Library for portably obtaining information about processes
source-archive: https://download.gnome.org/sources/libgtop/2.40/libgtop-2.40.0.tar.xz
dependencies:
  - gettext
  - glib
  - libxau
build-dependencies:
  - gobject-introspection
  - intltool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: libgtop_daemon2
  - exposure: global executable
    kind: cli
    name: libgtop_server2
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libgtop
  av: sudo av install brew:libgtop
  brew: brew install libgtop
  macports: sudo port install libgtop
  nix: nix profile install nixpkgs#libgtop
  pacman: sudo pacman -S libgtop
  zypper: sudo zypper install libgtop
provenance:
  formula: libgtop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
