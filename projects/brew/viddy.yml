id: brew:viddy
display-name: viddy
homepage: https://github.com/sachaos/viddy
repo: https://github.com/sachaos/viddy
docs: https://github.com/sachaos/viddy
package-manager:
  apk: viddy
  brew: viddy
  macports: viddy
  nix: viddy
  scoop: extras/viddy
  zypper: viddy
package-manager-url: https://formulae.brew.sh/formula/viddy
version: 1.3.0
license: MIT
category: development
tags:
  - cli
description: Modern watch command
source-archive: https://github.com/sachaos/viddy/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: viddy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add viddy
  av: sudo av install brew:viddy
  brew: brew install viddy
  macports: sudo port install viddy
  nix: nix profile install nixpkgs#viddy
  scoop: scoop install extras/viddy
  zypper: sudo zypper install viddy
provenance:
  formula: viddy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
