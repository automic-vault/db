id: brew:gitbatch
display-name: gitbatch
homepage: https://github.com/isacikgoz/gitbatch
repo: https://github.com/isacikgoz/gitbatch
docs: https://github.com/isacikgoz/gitbatch
package-manager:
  brew: gitbatch
  debian: gitbatch
  nix: gitbatch
  ubuntu: gitbatch
package-manager-url: https://formulae.brew.sh/formula/gitbatch
version: 0.6.1
license: MIT
category: development
tags:
  - cli
  - git
description: Manage your git repositories in one place
source-archive: https://github.com/isacikgoz/gitbatch/archive/refs/tags/v0.6.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gitbatch
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gitbatch
  brew: brew install gitbatch
  debian: sudo apt install gitbatch
  nix: nix profile install nixpkgs#gitbatch
  ubuntu: sudo apt install gitbatch
provenance:
  formula: gitbatch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
