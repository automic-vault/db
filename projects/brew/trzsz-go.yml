id: brew:trzsz-go
display-name: trzsz-go
homepage: https://trzsz.github.io
repo: https://github.com/trzsz/trzsz-go
docs: https://trzsz.github.io
package-manager:
  brew: trzsz-go
  scoop: main/trzsz
  winget: trzsz.trzsz
package-manager-url: https://formulae.brew.sh/formula/trzsz-go
version: 1.2.0
license: MIT
category: development
tags:
  - cli
description: Simple file transfer tools, similar to lrzsz (rz/sz), and compatible with tmux
source-archive: https://github.com/trzsz/trzsz-go/archive/refs/tags/v1.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: trzsz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:trzsz-go
  brew: brew install trzsz-go
  scoop: scoop install main/trzsz
  winget: winget install --id trzsz.trzsz -e
provenance:
  formula: trzsz-go
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
