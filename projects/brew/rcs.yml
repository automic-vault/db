id: brew:rcs
display-name: rcs
homepage: https://www.gnu.org/software/rcs/
repo: https://ftpmirror.gnu.org/gnu/rcs/rcs-5.10.1.tar.lz
docs: https://www.gnu.org/software/rcs/
package-manager:
  apk: rcs
  brew: rcs
  debian: rcs
  dnf: rcs
  macports: rcs
  nix: rcs
  pacman: rcs
  ubuntu: rcs
  winget: Araxis.Merge
  zypper: rcs
package-manager-url: https://formulae.brew.sh/formula/rcs
version: 5.10.1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU revision control system
source-archive: https://ftpmirror.gnu.org/gnu/rcs/rcs-5.10.1.tar.lz
executables:
  - exposure: global executable
    kind: cli
    name: ci
  - exposure: global executable
    kind: cli
    name: co
  - exposure: global executable
    kind: cli
    name: ident
  - exposure: global executable
    kind: cli
    name: merge
  - exposure: global executable
    kind: cli
    name: rcs
  - exposure: global executable
    kind: cli
    name: rcsclean
  - exposure: global executable
    kind: cli
    name: rcsdiff
  - exposure: global executable
    kind: cli
    name: rcsmerge
  - exposure: global executable
    kind: cli
    name: rlog
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rcs
  av: sudo av install brew:rcs
  brew: brew install rcs
  debian: sudo apt install rcs
  dnf: sudo dnf install rcs
  macports: sudo port install rcs
  nix: nix profile install nixpkgs#rcs
  pacman: sudo pacman -S rcs
  ubuntu: sudo apt install rcs
  winget: winget install --id Araxis.Merge -e
  zypper: sudo zypper install rcs
provenance:
  formula: rcs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
