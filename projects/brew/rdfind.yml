id: brew:rdfind
display-name: rdfind
homepage: https://rdfind.pauldreik.se/
repo: https://rdfind.pauldreik.se/rdfind-1.8.0.tar.gz
docs: https://rdfind.pauldreik.se/
package-manager:
  apk: rdfind
  brew: rdfind
  debian: rdfind
  dnf: rdfind
  macports: rdfind
  nix: rdfind
  pacman: rdfind
  ubuntu: rdfind
  zypper: rdfind
package-manager-url: https://formulae.brew.sh/formula/rdfind
version: 1.8.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Find duplicate files based on content (NOT file names)
source-archive: https://rdfind.pauldreik.se/rdfind-1.8.0.tar.gz
dependencies:
  - nettle
executables:
  - exposure: global executable
    kind: cli
    name: rdfind
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rdfind
  av: sudo av install brew:rdfind
  brew: brew install rdfind
  debian: sudo apt install rdfind
  dnf: sudo dnf install rdfind
  macports: sudo port install rdfind
  nix: nix profile install nixpkgs#rdfind
  pacman: sudo pacman -S rdfind
  ubuntu: sudo apt install rdfind
  zypper: sudo zypper install rdfind
provenance:
  formula: rdfind
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
