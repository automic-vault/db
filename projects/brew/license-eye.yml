id: brew:license-eye
display-name: license-eye
homepage: https://github.com/apache/skywalking-eyes
repo: >
  https://www.apache.org/dyn/closer.lua?path=skywalking/eyes/0.8.0/skywalking-license-eye-0.8.0-src.tgz
docs: https://github.com/apache/skywalking-eyes
package-manager:
  brew: license-eye
package-manager-url: https://formulae.brew.sh/formula/license-eye
version: 0.8.0
license: Apache-2.0
category: development
tags:
  - cli
description: Tool to check and fix license headers and resolve dependency licenses
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=skywalking/eyes/0.8.0/skywalking-license-eye-0.8.0-src.tgz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: license-eye
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:license-eye
  brew: brew install license-eye
provenance:
  formula: license-eye
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
