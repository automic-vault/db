id: brew:clusterawsadm
display-name: clusterawsadm
homepage: https://cluster-api-aws.sigs.k8s.io/clusterawsadm/clusterawsadm.html
repo: https://github.com/kubernetes-sigs/cluster-api-provider-aws
docs: https://cluster-api-aws.sigs.k8s.io/clusterawsadm/clusterawsadm.html
package-manager:
  brew: clusterawsadm
package-manager-url: https://formulae.brew.sh/formula/clusterawsadm
version: 2.11.1
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: Home for bootstrapping, AMI, EKS, and other helpers in Cluster API Provider AWS
source-archive: https://github.com/kubernetes-sigs/cluster-api-provider-aws.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: clusterawsadm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clusterawsadm
  brew: brew install clusterawsadm
provenance:
  formula: clusterawsadm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
