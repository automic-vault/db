id: brew:postgres-language-server
display-name: postgres-language-server
homepage: https://pg-language-server.com/
repo: https://github.com/supabase-community/postgres-language-server
docs: https://pg-language-server.com/
package-manager:
  brew: postgres-language-server
  nix: postgres-language-server
  scoop: main/postgres-language-server
package-manager-url: https://formulae.brew.sh/formula/postgres-language-server
version: 0.25.0
license: MIT
category: database
tags:
  - cli
description: Language Server for Postgres
source-archive: >
  https://github.com/supabase-community/postgres-language-server/archive/refs/tags/0.25.0.tar.gz
dependencies:
  - libpg_query
build-dependencies:
  - llvm
  - node
  - rust
  - tree-sitter
  - tree-sitter-cli
executables:
  - exposure: global executable
    kind: cli
    name: postgres-language-server
  - exposure: global executable
    kind: cli
    name: postgrestools
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:postgres-language-server
  brew: brew install postgres-language-server
  nix: nix profile install nixpkgs#postgres-language-server
  scoop: scoop install main/postgres-language-server
provenance:
  formula: postgres-language-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
