id: brew:bibtex-tidy
display-name: bibtex-tidy
homepage: https://github.com/FlamingTempura/bibtex-tidy
repo: https://registry.npmjs.org/bibtex-tidy/-/bibtex-tidy-1.14.0.tgz
docs: https://github.com/FlamingTempura/bibtex-tidy
package-manager:
  brew: bibtex-tidy
  nix: bibtex-tidy
package-manager-url: https://formulae.brew.sh/formula/bibtex-tidy
version: 1.14.0
license: MIT
category: development
tags:
  - cli
description: Cleaner and Formatter for BibTeX files
source-archive: https://registry.npmjs.org/bibtex-tidy/-/bibtex-tidy-1.14.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: bibtex-tidy
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bibtex-tidy
  brew: brew install bibtex-tidy
  nix: nix profile install nixpkgs#bibtex-tidy
provenance:
  formula: bibtex-tidy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
