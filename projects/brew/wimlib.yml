id: brew:wimlib
display-name: wimlib
homepage: https://wimlib.net/
repo: https://wimlib.net/downloads/wimlib-1.14.5.tar.gz
docs: https://wimlib.net/
package-manager:
  apk: wimlib
  brew: wimlib
  dnf: wimlib
  macports: wimlib
  nix: wimlib
  pacman: wimlib
  scoop: main/wimlib
package-manager-url: https://formulae.brew.sh/formula/wimlib
version: 1.14.5
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Library to create, extract, and modify Windows Imaging files
source-archive: https://wimlib.net/downloads/wimlib-1.14.5.tar.gz
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mkwinpeimg
  - exposure: global executable
    kind: cli
    name: wimappend
  - exposure: global executable
    kind: cli
    name: wimapply
  - exposure: global executable
    kind: cli
    name: wimcapture
  - exposure: global executable
    kind: cli
    name: wimdelete
  - exposure: global executable
    kind: cli
    name: wimdir
  - exposure: global executable
    kind: cli
    name: wimexport
  - exposure: global executable
    kind: cli
    name: wimextract
  - exposure: global executable
    kind: cli
    name: wiminfo
  - exposure: global executable
    kind: cli
    name: wimjoin
  - exposure: global executable
    kind: cli
    name: wimlib-imagex
  - exposure: global executable
    kind: cli
    name: wimmount
  - exposure: global executable
    kind: cli
    name: wimmountrw
  - exposure: global executable
    kind: cli
    name: wimoptimize
  - exposure: global executable
    kind: cli
    name: wimsplit
  - exposure: global executable
    kind: cli
    name: wimunmount
  - exposure: global executable
    kind: cli
    name: wimupdate
  - exposure: global executable
    kind: cli
    name: wimverify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wimlib
  av: sudo av install brew:wimlib
  brew: brew install wimlib
  dnf: sudo dnf install wimlib
  macports: sudo port install wimlib
  nix: nix profile install nixpkgs#wimlib
  pacman: sudo pacman -S wimlib
  scoop: scoop install main/wimlib
provenance:
  formula: wimlib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
