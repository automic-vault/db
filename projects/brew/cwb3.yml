id: brew:cwb3
display-name: cwb3
homepage: https://cwb.sourceforge.io/
repo: https://downloads.sourceforge.net/project/cwb/cwb/cwb-3.5/source/cwb-3.5.0-src.tar.gz
docs: https://cwb.sourceforge.io/
package-manager:
  brew: cwb3
package-manager-url: https://formulae.brew.sh/formula/cwb3
version: 3.5.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Tools for managing and querying large text corpora with linguistic annotations
source-archive: https://downloads.sourceforge.net/project/cwb/cwb/cwb-3.5/source/cwb-3.5.0-src.tar.gz
dependencies:
  - gettext
  - glib
  - pcre2
  - readline
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cqp
  - exposure: global executable
    kind: cli
    name: cqpcl
  - exposure: global executable
    kind: cli
    name: cqpserver
  - exposure: global executable
    kind: cli
    name: cwb-align
  - exposure: global executable
    kind: cli
    name: cwb-align-decode
  - exposure: global executable
    kind: cli
    name: cwb-align-encode
  - exposure: global executable
    kind: cli
    name: cwb-align-show
  - exposure: global executable
    kind: cli
    name: cwb-atoi
  - exposure: global executable
    kind: cli
    name: cwb-compress-rdx
  - exposure: global executable
    kind: cli
    name: cwb-config
  - exposure: global executable
    kind: cli
    name: cwb-decode
  - exposure: global executable
    kind: cli
    name: cwb-decode-nqrfile
  - exposure: global executable
    kind: cli
    name: cwb-describe-corpus
  - exposure: global executable
    kind: cli
    name: cwb-encode
  - exposure: global executable
    kind: cli
    name: cwb-huffcode
  - exposure: global executable
    kind: cli
    name: cwb-itoa
  - exposure: global executable
    kind: cli
    name: cwb-lexdecode
  - exposure: global executable
    kind: cli
    name: cwb-makeall
  - exposure: global executable
    kind: cli
    name: cwb-s-decode
  - exposure: global executable
    kind: cli
    name: cwb-s-encode
  - exposure: global executable
    kind: cli
    name: cwb-scan-corpus
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'CWB default registry directory: $HOMEBREW_PREFIX/share/cwb/registry'
  post-install-defined: true
install-lines:
  av: sudo av install brew:cwb3
  brew: brew install cwb3
provenance:
  formula: cwb3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
