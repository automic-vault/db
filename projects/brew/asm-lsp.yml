id: brew:asm-lsp
display-name: asm-lsp
homepage: https://github.com/bergercookie/asm-lsp
repo: https://github.com/bergercookie/asm-lsp
docs: https://github.com/bergercookie/asm-lsp
package-manager:
  brew: asm-lsp
  nix: asm-lsp
package-manager-url: https://formulae.brew.sh/formula/asm-lsp
version: 0.10.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: Language server for NASM/GAS/GO Assembly
source-archive: https://github.com/bergercookie/asm-lsp/archive/refs/tags/v0.10.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: asm-lsp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:asm-lsp
  brew: brew install asm-lsp
  nix: nix profile install nixpkgs#asm-lsp
provenance:
  formula: asm-lsp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
