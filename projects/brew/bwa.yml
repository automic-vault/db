id: brew:bwa
display-name: bwa
homepage: https://github.com/lh3/bwa
repo: https://github.com/lh3/bwa
docs: https://github.com/lh3/bwa
package-manager:
  brew: bwa
  debian: bwa
  dnf: bwa
  nix: bwa
  ubuntu: bwa
package-manager-url: https://formulae.brew.sh/formula/bwa
version: 0.7.19
license: GPL-3.0-or-later AND MIT
category: development
tags:
  - cli
description: Burrow-Wheeler Aligner for pairwise alignment of DNA
source-archive: https://github.com/lh3/bwa/archive/refs/tags/v0.7.19.tar.gz
build-dependencies:
  - sse2neon
executables:
  - exposure: global executable
    kind: cli
    name: bwa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bwa
  brew: brew install bwa
  debian: sudo apt install bwa
  dnf: sudo dnf install bwa
  nix: nix profile install nixpkgs#bwa
  ubuntu: sudo apt install bwa
provenance:
  formula: bwa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
