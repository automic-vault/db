id: brew:rootlesskit
display-name: rootlesskit
homepage: https://github.com/rootless-containers/rootlesskit
repo: https://github.com/rootless-containers/rootlesskit
docs: https://github.com/rootless-containers/rootlesskit
package-manager:
  apk: rootlesskit
  brew: rootlesskit
  debian: rootlesskit
  dnf: rootlesskit
  nix: rootlesskit
  pacman: rootlesskit
  ubuntu: rootlesskit
  zypper: rootlesskit
package-manager-url: https://formulae.brew.sh/formula/rootlesskit
version: 3.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: Linux-native "fake root" for implementing rootless containers
source-archive: https://github.com/rootless-containers/rootlesskit/archive/refs/tags/v3.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rootlessctl
  - exposure: global executable
    kind: cli
    name: rootlesskit
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Depending on the kernel configuration, you may need to add the following line to
    /etc/sysctl.d/99-rootless.conf, and run `sysctl -a`:
    kernel.apparmor_restrict_unprivileged_userns = 0
  post-install-defined: false
install-lines:
  apk: sudo apk add rootlesskit
  av: sudo av install brew:rootlesskit
  brew: brew install rootlesskit
  debian: sudo apt install rootlesskit
  dnf: sudo dnf install rootlesskit
  nix: nix profile install nixpkgs#rootlesskit
  pacman: sudo pacman -S rootlesskit
  ubuntu: sudo apt install rootlesskit
  zypper: sudo zypper install rootlesskit
provenance:
  formula: rootlesskit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
