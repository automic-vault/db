id: brew:wasm3
display-name: wasm3
homepage: https://github.com/wasm3/wasm3
repo: https://github.com/wasm3/wasm3
docs: https://github.com/wasm3/wasm3
package-manager:
  brew: wasm3
  macports: wasm3
  nix: wasm3
package-manager-url: https://formulae.brew.sh/formula/wasm3
version: 0.5.0
license: MIT
category: development
tags:
  - cli
description: High performance WebAssembly interpreter
source-archive: https://github.com/wasm3/wasm3/archive/refs/tags/v0.5.0.tar.gz
dependencies:
  - uvwasi
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: wasm3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wasm3
  brew: brew install wasm3
  macports: sudo port install wasm3
  nix: nix profile install nixpkgs#wasm3
provenance:
  formula: wasm3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
