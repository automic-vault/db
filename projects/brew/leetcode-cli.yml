id: brew:leetcode-cli
display-name: leetcode-cli
homepage: https://github.com/clearloop/leetcode-cli
repo: https://github.com/clearloop/leetcode-cli
docs: https://github.com/clearloop/leetcode-cli
package-manager:
  brew: leetcode-cli
  nix: leetcode-cli
package-manager-url: https://formulae.brew.sh/formula/leetcode-cli
version: 0.5.0
license: MIT
category: development
tags:
  - cli
description: May the code be with you
source-archive: https://github.com/clearloop/leetcode-cli/archive/refs/tags/v0.5.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: leetcode
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:leetcode-cli
  brew: brew install leetcode-cli
  nix: nix profile install nixpkgs#leetcode-cli
provenance:
  formula: leetcode-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
