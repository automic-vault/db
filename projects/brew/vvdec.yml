id: brew:vvdec
display-name: vvdec
homepage: https://github.com/fraunhoferhhi/vvdec
repo: https://github.com/fraunhoferhhi/vvdec
docs: https://github.com/fraunhoferhhi/vvdec
package-manager:
  brew: vvdec
package-manager-url: https://formulae.brew.sh/formula/vvdec
version: 3.1.0
license: BSD-3-Clause-Clear
category: development
tags:
  - cli
description: Fraunhofer Versatile Video Decoder
source-archive: https://github.com/fraunhoferhhi/vvdec/archive/refs/tags/v3.1.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: vvdecapp
bottle:
