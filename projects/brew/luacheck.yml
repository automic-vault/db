id: brew:luacheck
display-name: luacheck
homepage: https://luacheck.readthedocs.io/
repo: https://github.com/lunarmodules/luacheck
docs: https://luacheck.readthedocs.io/
package-manager:
  apk: luacheck
  brew: luacheck
  pacman: luacheck
  scoop: main/luacheck
package-manager-url: https://formulae.brew.sh/formula/luacheck
version: 1.2.0
license: MIT
category: development
tags:
  - cli
description: Tool for linting and static analysis of Lua code
source-archive: https://github.com/lunarmodules/luacheck/archive/refs/tags/v1.2.0.tar.gz
dependencies:
  - lua@5.4
build-dependencies:
  - luarocks
executables:
  - exposure: global executable
    kind: cli
    name: luacheck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add luacheck
  av: sudo av install brew:luacheck
  brew: brew install luacheck
  pacman: sudo pacman -S luacheck
  scoop: scoop install main/luacheck
provenance:
  formula: luacheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
