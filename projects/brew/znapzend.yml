id: brew:znapzend
display-name: znapzend
homepage: https://www.znapzend.org/
repo: https://github.com/oetiker/znapzend
docs: https://www.znapzend.org/
package-manager:
  brew: znapzend
  nix: znapzend
package-manager-url: https://formulae.brew.sh/formula/znapzend
version: 0.23.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: ZFS backup with remote capabilities and mbuffer integration
source-archive: https://github.com/oetiker/znapzend/releases/download/v0.23.2/znapzend-0.23.2.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: znapzend
  - exposure: global executable
    kind: cli
    name: znapzendzetup
  - exposure: global executable
    kind: cli
    name: znapzendztatz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:znapzend
  brew: brew install znapzend
  nix: nix profile install nixpkgs#znapzend
provenance:
  formula: znapzend
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
