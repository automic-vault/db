id: brew:yaf
display-name: yaf
homepage: https://tools.netsa.cert.org/yaf/
repo: https://tools.netsa.cert.org/releases/yaf-2.19.2.tar.gz
docs: https://tools.netsa.cert.org/yaf/
package-manager:
  brew: yaf
package-manager-url: https://formulae.brew.sh/formula/yaf
version: 2.19.2
license: GPL-2.0-only
category: network
tags:
  - cli
description: 'Yet another flowmeter: processes packet data from pcap(3)'
source-archive: https://tools.netsa.cert.org/releases/yaf-2.19.2.tar.gz
dependencies:
  - gettext
  - glib
  - libfixbuf
  - libtool
  - pcre2
build-dependencies:
  - pkgconf
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: airdaemon
  - exposure: global executable
    kind: cli
    name: filedaemon
  - exposure: global executable
    kind: cli
    name: getFlowKeyHash
  - exposure: global executable
    kind: cli
    name: yaf
  - exposure: global executable
    kind: cli
    name: yafMeta2Pcap
  - exposure: global executable
    kind: cli
    name: yafcollect
  - exposure: global executable
    kind: cli
    name: yafscii
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yaf
  brew: brew install yaf
provenance:
  formula: yaf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
