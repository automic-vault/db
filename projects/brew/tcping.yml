id: brew:tcping
display-name: tcping
homepage: https://github.com/mkirchner/tcping
repo: https://github.com/mkirchner/tcping
docs: https://github.com/mkirchner/tcping
package-manager:
  brew: tcping
  chocolatey: tcping
  macports: tcping
  scoop: main/tcping
  winget: EliFulkerson.tcping
  zypper: tcping
package-manager-url: https://formulae.brew.sh/formula/tcping
version: 2.1.0
license: MIT
category: development
tags:
  - cli
description: TCP connect to the given IP/port combo
source-archive: https://github.com/mkirchner/tcping/archive/refs/tags/2.1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: tcping
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tcping
  brew: brew install tcping
  chocolatey: choco install tcping
  macports: sudo port install tcping
  scoop: scoop install main/tcping
  winget: winget install --id EliFulkerson.tcping -e
  zypper: sudo zypper install tcping
provenance:
  formula: tcping
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
