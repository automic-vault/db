id: brew:cvs
display-name: cvs
homepage: https://www.nongnu.org/cvs/
repo: https://ftpmirror.gnu.org/non-gnu/cvs/source/feature/1.12.13/cvs-1.12.13.tar.bz2
docs: https://www.nongnu.org/cvs/
package-manager:
  apk: cvs
  brew: cvs
  debian: cvs
  dnf: cvs
  macports: cvs
  nix: cvs
  pacman: cvs
  scoop: main/cvs
  ubuntu: cvs
  zypper: cvs
package-manager-url: https://formulae.brew.sh/formula/cvs
version: 1.12.13
license: GPL-2.0-or-later AND LGPL-2.0-or-later
category: network
tags:
  - cli
description: Version control system
source-archive: https://ftpmirror.gnu.org/non-gnu/cvs/source/feature/1.12.13/cvs-1.12.13.tar.bz2
dependencies:
  - gettext
build-dependencies:
  - autoconf
  - automake
  - gettext
uses-from-macos:
  - krb5
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: cvs
  - exposure: global executable
    kind: cli
    name: cvsbug
  - exposure: global executable
    kind: cli
    name: rcs2log
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cvs
  av: sudo av install brew:cvs
  brew: brew install cvs
  debian: sudo apt install cvs
  dnf: sudo dnf install cvs
  macports: sudo port install cvs
  nix: nix profile install nixpkgs#cvs
  pacman: sudo pacman -S cvs
  scoop: scoop install main/cvs
  ubuntu: sudo apt install cvs
  zypper: sudo zypper install cvs
provenance:
  formula: cvs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
