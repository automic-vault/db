id: brew:serve
display-name: serve
homepage: https://github.com/syntaqx/serve
repo: https://github.com/syntaqx/serve
docs: https://github.com/syntaqx/serve
package-manager:
  brew: serve
  nix: serve
  scoop: main/serve
package-manager-url: https://formulae.brew.sh/formula/serve
version: 0.7.1
license: MIT
category: development
tags:
  - cli
description: Static http server anywhere you need one
source-archive: https://github.com/syntaqx/serve/archive/refs/tags/v0.7.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: serve
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:serve
  brew: brew install serve
  nix: nix profile install nixpkgs#serve
  scoop: scoop install main/serve
provenance:
  formula: serve
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
