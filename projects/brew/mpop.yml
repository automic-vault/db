id: brew:mpop
display-name: mpop
homepage: https://marlam.de/mpop/
repo: https://marlam.de/mpop/releases/mpop-1.4.21.tar.xz
docs: https://marlam.de/mpop/
package-manager:
  apk: mpop
  brew: mpop
  debian: mpop
  dnf: mpop
  macports: mpop
  nix: mpop
  pacman: mpop
  ubuntu: mpop
  zypper: mpop
package-manager-url: https://formulae.brew.sh/formula/mpop
version: 1.4.21
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: POP3 client
source-archive: https://marlam.de/mpop/releases/mpop-1.4.21.tar.xz
dependencies:
  - gettext
  - gnutls
  - libidn2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mpop
  - exposure: global executable
    kind: cli
    name: mpopd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mpop
  av: sudo av install brew:mpop
  brew: brew install mpop
  debian: sudo apt install mpop
  dnf: sudo dnf install mpop
  macports: sudo port install mpop
  nix: nix profile install nixpkgs#mpop
  pacman: sudo pacman -S mpop
  ubuntu: sudo apt install mpop
  zypper: sudo zypper install mpop
provenance:
  formula: mpop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
