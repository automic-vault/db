id: brew:alass
display-name: alass
homepage: https://github.com/kaegi/alass
repo: https://github.com/kaegi/alass
docs: https://github.com/kaegi/alass
package-manager:
  brew: alass
  scoop: main/alass
package-manager-url: https://formulae.brew.sh/formula/alass
version: 2.0.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Automatic Language-Agnostic Subtitle Synchronization
source-archive: https://github.com/kaegi/alass/archive/refs/tags/v2.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: alass-cli
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:alass
  brew: brew install alass
  scoop: scoop install main/alass
provenance:
  formula: alass
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
