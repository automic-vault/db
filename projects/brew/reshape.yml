id: brew:reshape
display-name: reshape
homepage: https://github.com/fabianlindfors/reshape
repo: https://github.com/fabianlindfors/reshape
docs: https://github.com/fabianlindfors/reshape
package-manager:
  brew: reshape
  nix: reshape
package-manager-url: https://formulae.brew.sh/formula/reshape
version: 0.9.1
license: MIT
category: database
tags:
  - cli
description: Easy-to-use, zero-downtime schema migration tool for Postgres
source-archive: https://github.com/fabianlindfors/reshape/archive/refs/tags/v0.9.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: reshape
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:reshape
  brew: brew install reshape
  nix: nix profile install nixpkgs#reshape
provenance:
  formula: reshape
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
