id: brew:pacvim
display-name: pacvim
homepage: https://github.com/jmoon018/PacVim
repo: https://github.com/jmoon018/PacVim
docs: https://github.com/jmoon018/PacVim
package-manager:
  brew: pacvim
  debian: pacvim
  macports: pacvim
  nix: pacvim
  ubuntu: pacvim
package-manager-url: https://formulae.brew.sh/formula/pacvim
version: 1.1.1
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Learn vim commands via a game
source-archive: https://github.com/jmoon018/PacVim/archive/refs/tags/v1.1.1.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: pacvim
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pacvim
  brew: brew install pacvim
  debian: sudo apt install pacvim
  macports: sudo port install pacvim
  nix: nix profile install nixpkgs#pacvim
  ubuntu: sudo apt install pacvim
provenance:
  formula: pacvim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
