id: brew:libcec
display-name: libcec
homepage: https://libcec.pulse-eight.com/
repo: https://github.com/Pulse-Eight/libcec
docs: https://libcec.pulse-eight.com/
package-manager:
  apk: libcec
  brew: libcec
  dnf: libcec
  macports: libcec
  nix: libcec
  pacman: libcec
  zypper: cec-client
package-manager-url: https://formulae.brew.sh/formula/libcec
version: 7.1.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Control devices with TV remote control and HDMI cabling
source-archive: https://github.com/Pulse-Eight/libcec/archive/refs/tags/libcec-7.1.1.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cec-client
  - exposure: global executable
    kind: cli
    name: cec-client-7.1.1
  - exposure: global executable
    kind: cli
    name: cecc-client
  - exposure: global executable
    kind: cli
    name: cecc-client-7.1.1
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libcec
  av: sudo av install brew:libcec
  brew: brew install libcec
  dnf: sudo dnf install libcec
  macports: sudo port install libcec
  nix: nix profile install nixpkgs#libcec
  pacman: sudo pacman -S libcec
  zypper: sudo zypper install cec-client
provenance:
  formula: libcec
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
