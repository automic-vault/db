id: brew:skm
display-name: skm
homepage: https://timothyye.github.io/skm
repo: https://github.com/TimothyYe/skm
docs: https://timothyye.github.io/skm
package-manager:
  brew: skm
package-manager-url: https://formulae.brew.sh/formula/skm
version: 0.9.3
license: MIT
category: development
tags:
  - cli
description: Simple and powerful SSH keys manager
source-archive: https://github.com/TimothyYe/skm/archive/refs/tags/v0.9.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: skm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:skm
  brew: brew install skm
provenance:
  formula: skm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
