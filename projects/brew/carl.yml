id: brew:carl
display-name: carl
homepage: https://codeberg.org/birger/carl
repo: https://static.crates.io/crates/carl/carl-0.6.0.crate
docs: https://codeberg.org/birger/carl
package-manager:
  brew: carl
  macports: carl
  nix: carl
package-manager-url: https://formulae.brew.sh/formula/carl
version: 0.6.0
license: MIT
category: network
tags:
  - cli
description: Calendar for the command-line
source-archive: https://static.crates.io/crates/carl/carl-0.6.0.crate
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: carl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:carl
  brew: brew install carl
  macports: sudo port install carl
  nix: nix profile install nixpkgs#carl
provenance:
  formula: carl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
