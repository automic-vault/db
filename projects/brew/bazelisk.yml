id: brew:bazelisk
display-name: bazelisk
homepage: https://github.com/bazelbuild/bazelisk/
repo: https://github.com/bazelbuild/bazelisk
docs: https://github.com/bazelbuild/bazelisk/
package-manager:
  brew: bazelisk
  chocolatey: bazelisk
  macports: bazelisk
  nix: bazelisk
  pacman: bazelisk
  scoop: main/bazelisk
  winget: Bazel.Bazelisk
package-manager-url: https://formulae.brew.sh/formula/bazelisk
version: 1.29.0
license: Apache-2.0
category: development
tags:
  - cli
description: User-friendly launcher for Bazel
source-archive: https://github.com/bazelbuild/bazelisk/archive/refs/tags/v1.29.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bazel
  - exposure: global executable
    kind: cli
    name: bazelisk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bazelisk
  brew: brew install bazelisk
  chocolatey: choco install bazelisk
  macports: sudo port install bazelisk
  nix: nix profile install nixpkgs#bazelisk
  pacman: sudo pacman -S bazelisk
  scoop: scoop install main/bazelisk
  winget: winget install --id Bazel.Bazelisk -e
provenance:
  formula: bazelisk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
