id: brew:go-bindata
display-name: go-bindata
homepage: https://github.com/kevinburke/go-bindata
repo: https://github.com/kevinburke/go-bindata
docs: https://github.com/kevinburke/go-bindata
package-manager:
  apk: go-bindata
  brew: go-bindata
  debian: go-bindata
  macports: go-bindata
  nix: go-bindata
  ubuntu: go-bindata
package-manager-url: https://formulae.brew.sh/formula/go-bindata
version: 4.0.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: Small utility that generates Go code from any file
source-archive: https://github.com/kevinburke/go-bindata/archive/refs/tags/v4.0.2.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: go-bindata
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add go-bindata
  av: sudo av install brew:go-bindata
  brew: brew install go-bindata
  debian: sudo apt install go-bindata
  macports: sudo port install go-bindata
  nix: nix profile install nixpkgs#go-bindata
  ubuntu: sudo apt install go-bindata
provenance:
  formula: go-bindata
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
