id: brew:tag
display-name: tag
homepage: https://github.com/jdberry/tag/
repo: https://github.com/jdberry/tag
docs: https://github.com/jdberry/tag/
package-manager:
  brew: tag
  macports: tag
package-manager-url: https://formulae.brew.sh/formula/tag
version: 0.10
license: MIT
category: development
tags:
  - cli
description: Manipulate and query tags on macOS files
source-archive: https://github.com/jdberry/tag/archive/refs/tags/v0.10.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: tag
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tag
  brew: brew install tag
  macports: sudo port install tag
provenance:
  formula: tag
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
