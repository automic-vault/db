id: brew:renameutils
display-name: renameutils
homepage: https://www.nongnu.org/renameutils/
repo: https://download.savannah.gnu.org/releases/renameutils/renameutils-0.12.0.tar.gz
docs: https://www.nongnu.org/renameutils/
package-manager:
  apk: imv
  brew: renameutils
  debian: renameutils
  dnf: renameutils
  macports: renameutils
  nix: renameutils
  pacman: renameutils
  ubuntu: renameutils
  zypper: renameutils
package-manager-url: https://formulae.brew.sh/formula/renameutils
version: 0.12.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Tools for file renaming
source-archive: https://download.savannah.gnu.org/releases/renameutils/renameutils-0.12.0.tar.gz
dependencies:
  - coreutils
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: deurlname
  - exposure: global executable
    kind: cli
    name: icmd
  - exposure: global executable
    kind: cli
    name: icp
  - exposure: global executable
    kind: cli
    name: imv
  - exposure: global executable
    kind: cli
    name: qcmd
  - exposure: global executable
    kind: cli
    name: qcp
  - exposure: global executable
    kind: cli
    name: qmv
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add imv
  av: sudo av install brew:renameutils
  brew: brew install renameutils
  debian: sudo apt install renameutils
  dnf: sudo dnf install renameutils
  macports: sudo port install renameutils
  nix: nix profile install nixpkgs#renameutils
  pacman: sudo pacman -S renameutils
  ubuntu: sudo apt install renameutils
  zypper: sudo zypper install renameutils
provenance:
  formula: renameutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
