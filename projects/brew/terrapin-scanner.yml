id: brew:terrapin-scanner
display-name: terrapin-scanner
homepage: https://terrapin-attack.com/
repo: https://github.com/RUB-NDS/Terrapin-Scanner
docs: https://terrapin-attack.com/
package-manager:
  brew: terrapin-scanner
  nix: terrapin-scanner
package-manager-url: https://formulae.brew.sh/formula/terrapin-scanner
version: 1.1.3
license: Apache-2.0
category: development
tags:
  - cli
description: Vulnerability scanner for the Terrapin attack
source-archive: https://github.com/RUB-NDS/Terrapin-Scanner/archive/refs/tags/v1.1.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: Terrapin-Scanner
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terrapin-scanner
  brew: brew install terrapin-scanner
  nix: nix profile install nixpkgs#terrapin-scanner
provenance:
  formula: terrapin-scanner
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
