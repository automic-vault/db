id: brew:hivex
display-name: hivex
homepage: https://libguestfs.org
repo: https://download.libguestfs.org/hivex/hivex-1.3.24.tar.gz
docs: https://libguestfs.org
package-manager:
  apk: hivex
  brew: hivex
  dnf: hivex
  macports: hivex
  nix: hivex
  pacman: hivex
  zypper: hivex
package-manager-url: https://formulae.brew.sh/formula/hivex
version: 1.3.24
license: GPL-2.0-or-later AND LGPL-2.1-only
category: network
tags:
  - cli
description: Library and tools for extracting the contents of Windows Registry hive files
source-archive: https://download.libguestfs.org/hivex/hivex-1.3.24.tar.gz
dependencies:
  - gettext
  - readline
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: hivexget
  - exposure: global executable
    kind: cli
    name: hivexml
  - exposure: global executable
    kind: cli
    name: hivexsh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hivex
  av: sudo av install brew:hivex
  brew: brew install hivex
  dnf: sudo dnf install hivex
  macports: sudo port install hivex
  nix: nix profile install nixpkgs#hivex
  pacman: sudo pacman -S hivex
  zypper: sudo zypper install hivex
provenance:
  formula: hivex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
