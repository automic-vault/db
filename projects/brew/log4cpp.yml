id: brew:log4cpp
display-name: log4cpp
homepage: https://log4cpp.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/log4cpp/log4cpp-1.1.x%20%28new%29/log4cpp-1.1/log4cpp-1.1.6.tar.gz
docs: https://log4cpp.sourceforge.net/
package-manager:
  apk: log4cpp
  brew: log4cpp
  macports: log4cpp
  nix: log4cpp
package-manager-url: https://formulae.brew.sh/formula/log4cpp
version: 1.1.6
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Configurable logging for C++
source-archive: >
  https://downloads.sourceforge.net/project/log4cpp/log4cpp-1.1.x%20%28new%29/log4cpp-1.1/log4cpp-1.1.6.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: log4cpp-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add log4cpp
  av: sudo av install brew:log4cpp
  brew: brew install log4cpp
  macports: sudo port install log4cpp
  nix: nix profile install nixpkgs#log4cpp
provenance:
  formula: log4cpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
