id: brew:zopfli
display-name: zopfli
homepage: https://github.com/google/zopfli
repo: https://github.com/google/zopfli
docs: https://github.com/google/zopfli
package-manager:
  apk: zopfli
  brew: zopfli
  debian: zopfli
  dnf: zopfli
  macports: zopfli
  nix: zopfli
  pacman: zopfli
  ubuntu: zopfli
  zypper: zopfli
package-manager-url: https://formulae.brew.sh/formula/zopfli
version: 1.0.3
license: Apache-2.0
category: development
tags:
  - cli
description: New zlib (gzip, deflate) compatible compressor
source-archive: https://github.com/google/zopfli/archive/refs/tags/zopfli-1.0.3.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: zopfli
  - exposure: global executable
    kind: cli
    name: zopflipng
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zopfli
  av: sudo av install brew:zopfli
  brew: brew install zopfli
  debian: sudo apt install zopfli
  dnf: sudo dnf install zopfli
  macports: sudo port install zopfli
  nix: nix profile install nixpkgs#zopfli
  pacman: sudo pacman -S zopfli
  ubuntu: sudo apt install zopfli
  zypper: sudo zypper install zopfli
provenance:
  formula: zopfli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
