id: brew:scrypt
display-name: scrypt
homepage: https://www.tarsnap.com/scrypt.html
repo: https://www.tarsnap.com/scrypt/scrypt-1.3.3.tgz
docs: https://www.tarsnap.com/scrypt.html
package-manager:
  brew: scrypt
  debian: scrypt
  macports: scrypt
  nix: scrypt
  pacman: scrypt
  ubuntu: scrypt
  zypper: scrypt
package-manager-url: https://formulae.brew.sh/formula/scrypt
version: 1.3.3
license: BSD-2-Clause
category: security
tags:
  - cli
description: Encrypt and decrypt files using memory-hard password function
source-archive: https://www.tarsnap.com/scrypt/scrypt-1.3.3.tgz
dependencies:
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: scrypt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:scrypt
  brew: brew install scrypt
  debian: sudo apt install scrypt
  macports: sudo port install scrypt
  nix: nix profile install nixpkgs#scrypt
  pacman: sudo pacman -S scrypt
  ubuntu: sudo apt install scrypt
  zypper: sudo zypper install scrypt
provenance:
  formula: scrypt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
