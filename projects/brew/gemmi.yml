id: brew:gemmi
display-name: gemmi
homepage: https://project-gemmi.github.io/
repo: https://github.com/project-gemmi/gemmi
docs: https://project-gemmi.github.io/
package-manager:
  brew: gemmi
  debian: gemmi
  macports: gemmi
  nix: gemmi
  ubuntu: gemmi
package-manager-url: https://formulae.brew.sh/formula/gemmi
version: 0.7.5
license: MPL-2.0
category: development
tags:
  - cli
description: Macromolecular crystallography library and utilities
source-archive: https://github.com/project-gemmi/gemmi/archive/refs/tags/v0.7.5.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - zlib
executables:
  - exposure: global executable
    kind: cli
    name: gemmi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gemmi
  brew: brew install gemmi
  debian: sudo apt install gemmi
  macports: sudo port install gemmi
  nix: nix profile install nixpkgs#gemmi
  ubuntu: sudo apt install gemmi
provenance:
  formula: gemmi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
