id: brew:cdebug
display-name: cdebug
homepage: https://github.com/iximiuz/cdebug
repo: https://github.com/iximiuz/cdebug
docs: https://github.com/iximiuz/cdebug
package-manager:
  brew: cdebug
  macports: cdebug
package-manager-url: https://formulae.brew.sh/formula/cdebug
version: 0.0.19
license: Apache-2.0
category: development
tags:
  - cli
description: Swiss army knife of container debugging
source-archive: https://github.com/iximiuz/cdebug/archive/refs/tags/v0.0.19.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cdebug
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cdebug
  brew: brew install cdebug
  macports: sudo port install cdebug
provenance:
  formula: cdebug
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
