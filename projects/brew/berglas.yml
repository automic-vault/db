id: brew:berglas
display-name: berglas
homepage: https://github.com/GoogleCloudPlatform/berglas
repo: https://github.com/GoogleCloudPlatform/berglas
docs: https://github.com/GoogleCloudPlatform/berglas
package-manager:
  brew: berglas
  nix: berglas
package-manager-url: https://formulae.brew.sh/formula/berglas
version: 2.0.13
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Tool for managing secrets on Google Cloud
source-archive: https://github.com/GoogleCloudPlatform/berglas/archive/refs/tags/v2.0.13.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: berglas
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:berglas
  brew: brew install berglas
  nix: nix profile install nixpkgs#berglas
provenance:
  formula: berglas
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
