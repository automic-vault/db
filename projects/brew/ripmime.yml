id: brew:ripmime
display-name: ripmime
homepage: https://pldaniels.com/ripmime/
repo: https://github.com/inflex/ripMIME
docs: https://pldaniels.com/ripmime/
package-manager:
  apk: ripmime
  brew: ripmime
  debian: ripmime
  dnf: ripmime
  macports: ripmime
  nix: ripmime
  ubuntu: ripmime
package-manager-url: https://formulae.brew.sh/formula/ripmime
version: 1.4.1.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Extract attachments out of MIME encoded email packages
source-archive: https://github.com/inflex/ripMIME/archive/refs/tags/1.4.1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ripmime
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ripmime
  av: sudo av install brew:ripmime
  brew: brew install ripmime
  debian: sudo apt install ripmime
  dnf: sudo dnf install ripmime
  macports: sudo port install ripmime
  nix: nix profile install nixpkgs#ripmime
  ubuntu: sudo apt install ripmime
provenance:
  formula: ripmime
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
