id: brew:auditbeat
display-name: auditbeat
homepage: https://www.elastic.co/beats/auditbeat
repo: https://github.com/elastic/beats
docs: https://www.elastic.co/beats/auditbeat
package-manager:
  brew: auditbeat
  chocolatey: auditbeat
  nix: auditbeat
package-manager-url: https://formulae.brew.sh/formula/auditbeat
version: 9.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: Lightweight Shipper for Audit Data
source-archive: https://github.com/elastic/beats.git
build-dependencies:
  - go
  - mage
executables:
  - exposure: global executable
    kind: cli
    name: auditbeat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:auditbeat
  brew: brew install auditbeat
  chocolatey: choco install auditbeat
  nix: nix profile install nixpkgs#auditbeat
provenance:
  formula: auditbeat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
