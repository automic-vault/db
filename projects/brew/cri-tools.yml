id: brew:cri-tools
display-name: cri-tools
homepage: https://github.com/kubernetes-sigs/cri-tools
repo: https://github.com/kubernetes-sigs/cri-tools
docs: https://github.com/kubernetes-sigs/cri-tools
package-manager:
  apk: cri-tools
  brew: cri-tools
  dnf: cri-tools
  nix: cri-tools
  pacman: crictl
  zypper: cri-tools
package-manager-url: https://formulae.brew.sh/formula/cri-tools
version: 1.36.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: CLI and validation tools for Kubelet Container Runtime Interface (CRI)
source-archive: https://github.com/kubernetes-sigs/cri-tools/archive/refs/tags/v1.36.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: crictl
  - exposure: global executable
    kind: cli
    name: critest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cri-tools
  av: sudo av install brew:cri-tools
  brew: brew install cri-tools
  dnf: sudo dnf install cri-tools
  nix: nix profile install nixpkgs#cri-tools
  pacman: sudo pacman -S crictl
  zypper: sudo zypper install cri-tools
provenance:
  formula: cri-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
