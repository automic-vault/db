id: brew:capnp
display-name: capnp
homepage: https://capnproto.org/
repo: https://github.com/capnproto/capnproto
docs: https://capnproto.org/
package-manager:
  brew: capnp
  scoop: main/capnp
package-manager-url: https://formulae.brew.sh/formula/capnp
version: 1.4.0
license: MIT
category: development
tags:
  - cli
description: Data interchange format and capability-based RPC system
source-archive: https://github.com/capnproto/capnproto/archive/refs/tags/v1.4.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: capnp
  - exposure: global executable
    kind: cli
    name: capnpc
  - exposure: global executable
    kind: cli
    name: capnpc-c++
  - exposure: global executable
    kind: cli
    name: capnpc-capnp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:capnp
  brew: brew install capnp
  scoop: scoop install main/capnp
provenance:
  formula: capnp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
