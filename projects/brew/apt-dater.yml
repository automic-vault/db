id: brew:apt-dater
display-name: apt-dater
homepage: https://github.com/DE-IBH/apt-dater
repo: https://github.com/DE-IBH/apt-dater
docs: https://github.com/DE-IBH/apt-dater
package-manager:
  apk: apt-dater
  brew: apt-dater
  debian: apt-dater
  nix: apt-dater
  ubuntu: apt-dater
package-manager-url: https://formulae.brew.sh/formula/apt-dater
version: 1.0.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Manage package updates on remote hosts using SSH
source-archive: https://github.com/DE-IBH/apt-dater/archive/refs/tags/v1.0.4.tar.gz
dependencies:
  - gettext
  - glib
  - popt
build-dependencies:
  - autoconf
  - automake
  - coreutils
  - gettext
  - pkgconf
uses-from-macos:
  - libxml2
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: adsh
  - exposure: global executable
    kind: cli
    name: apt-dater
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add apt-dater
  av: sudo av install brew:apt-dater
  brew: brew install apt-dater
  debian: sudo apt install apt-dater
  nix: nix profile install nixpkgs#apt-dater
  ubuntu: sudo apt install apt-dater
provenance:
  formula: apt-dater
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
