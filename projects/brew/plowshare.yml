id: brew:plowshare
display-name: plowshare
homepage: https://github.com/mcrapet/plowshare
repo: https://github.com/mcrapet/plowshare
docs: https://github.com/mcrapet/plowshare
package-manager:
  brew: plowshare
  nix: plowshare
  zypper: plowshare
package-manager-url: https://formulae.brew.sh/formula/plowshare
version: 2.1.7
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Download/upload tool for popular file sharing websites
source-archive: https://github.com/mcrapet/plowshare/archive/refs/tags/v2.1.7.tar.gz
dependencies:
  - bash
  - coreutils
  - feh
  - gnu-sed
  - libcaca
  - recode
  - spidermonkey
executables:
  - exposure: global executable
    kind: cli
    name: plowdel
  - exposure: global executable
    kind: cli
    name: plowdown
  - exposure: global executable
    kind: cli
    name: plowlist
  - exposure: global executable
    kind: cli
    name: plowmod
  - exposure: global executable
    kind: cli
    name: plowprobe
  - exposure: global executable
    kind: cli
    name: plowup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:plowshare
  brew: brew install plowshare
  nix: nix profile install nixpkgs#plowshare
  zypper: sudo zypper install plowshare
provenance:
  formula: plowshare
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
