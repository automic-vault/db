id: brew:ctemplate
display-name: ctemplate
homepage: https://github.com/olafvdspek/ctemplate
repo: https://github.com/OlafvdSpek/ctemplate
docs: https://github.com/olafvdspek/ctemplate
package-manager:
  brew: ctemplate
  pacman: ctemplate
package-manager-url: https://formulae.brew.sh/formula/ctemplate
version: 2.4
license: BSD-3-Clause
category: development
tags:
  - cli
description: Template language for C++
source-archive: https://github.com/OlafvdSpek/ctemplate/archive/refs/tags/ctemplate-2.4.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: diff_tpl_auto_escape
  - exposure: global executable
    kind: cli
    name: make_tpl_varnames_h
  - exposure: global executable
    kind: cli
    name: template-converter
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ctemplate
  brew: brew install ctemplate
  pacman: sudo pacman -S ctemplate
provenance:
  formula: ctemplate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
