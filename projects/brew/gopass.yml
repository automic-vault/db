id: brew:gopass
display-name: gopass
homepage: https://www.gopass.pw/
repo: https://github.com/gopasspw/gopass
docs: https://www.gopass.pw/
package-manager:
  apk: gopass
  brew: gopass
  dnf: gopass
  macports: gopass
  nix: gopass
  pacman: gopass
  scoop: main/gopass
  ubuntu: gopass
  winget: gopass.gopass
  zypper: gopass
package-manager-url: https://formulae.brew.sh/formula/gopass
version: 1.16.1
license: MIT
category: security
tags:
  - cli
description: Slightly more awesome Standard Unix Password Manager for Teams
source-archive: https://github.com/gopasspw/gopass/releases/download/v1.16.1/gopass-1.16.1.tar.gz
dependencies:
  - gnupg
  - terminal-notifier
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gopass
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gopass
  av: sudo av install brew:gopass
  brew: brew install gopass
  dnf: sudo dnf install gopass
  macports: sudo port install gopass
  nix: nix profile install nixpkgs#gopass
  pacman: sudo pacman -S gopass
  scoop: scoop install main/gopass
  ubuntu: sudo apt install gopass
  winget: winget install --id gopass.gopass -e
  zypper: sudo zypper install gopass
provenance:
  formula: gopass
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
