id: brew:libidn2
display-name: libidn2
homepage: https://www.gnu.org/software/libidn/#libidn2
repo: https://ftpmirror.gnu.org/gnu/libidn/libidn2-2.3.8.tar.gz
docs: https://www.gnu.org/software/libidn/#libidn2
package-manager:
  apk: libidn2
  brew: libidn2
  debian: idn2
  dnf: libidn2
  macports: libidn2
  nix: libidn2
  pacman: libidn2
  ubuntu: idn2
package-manager-url: https://formulae.brew.sh/formula/libidn2
version: 2.3.8
license: >
  (GPL-2.0-or-later OR LGPL-3.0-or-later) AND (Unicode-TOU AND Unicode-DFS-2016) AND
  GPL-3.0-or-later AND LGPL-2.1-or-later AND FSFAP-no-warranty-disclaimer
category: network
tags:
  - cli
description: International domain name library (IDNA2008, Punycode and TR46)
source-archive: https://ftpmirror.gnu.org/gnu/libidn/libidn2-2.3.8.tar.gz
dependencies:
  - gettext
  - libunistring
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: idn2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libidn2
  av: sudo av install brew:libidn2
  brew: brew install libidn2
  debian: sudo apt install idn2
  dnf: sudo dnf install libidn2
  macports: sudo port install libidn2
  nix: nix profile install nixpkgs#libidn2
  pacman: sudo pacman -S libidn2
  ubuntu: sudo apt install idn2
provenance:
  formula: libidn2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
