id: brew:json2hcl
display-name: json2hcl
homepage: https://github.com/kvz/json2hcl
repo: https://github.com/kvz/json2hcl
docs: https://github.com/kvz/json2hcl
package-manager:
  brew: json2hcl
  nix: json2hcl
package-manager-url: https://formulae.brew.sh/formula/json2hcl
version: 0.2.0
license: MIT
category: development
tags:
  - cli
  - json
description: Convert JSON to HCL, and vice versa
source-archive: https://github.com/kvz/json2hcl/archive/refs/tags/v0.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: json2hcl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:json2hcl
  brew: brew install json2hcl
  nix: nix profile install nixpkgs#json2hcl
provenance:
  formula: json2hcl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
