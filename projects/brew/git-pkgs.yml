id: brew:git-pkgs
display-name: git-pkgs
homepage: https://github.com/git-pkgs/git-pkgs
repo: https://github.com/git-pkgs/git-pkgs
docs: https://github.com/git-pkgs/git-pkgs
package-manager:
  brew: git-pkgs
  nix: git-pkgs
  scoop: main/git-pkgs
package-manager-url: https://formulae.brew.sh/formula/git-pkgs
version: 0.16.2
license: MIT
category: development
tags:
  - cli
  - git
description: Track package dependencies across git history
source-archive: https://github.com/git-pkgs/git-pkgs/archive/refs/tags/v0.16.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-pkgs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-pkgs
  brew: brew install git-pkgs
  nix: nix profile install nixpkgs#git-pkgs
  scoop: scoop install main/git-pkgs
provenance:
  formula: git-pkgs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
