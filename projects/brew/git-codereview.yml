id: brew:git-codereview
display-name: git-codereview
homepage: https://pkg.go.dev/golang.org/x/review/git-codereview
repo: https://github.com/golang/review
docs: https://pkg.go.dev/golang.org/x/review/git-codereview
package-manager:
  brew: git-codereview
  nix: git-codereview
package-manager-url: https://formulae.brew.sh/formula/git-codereview
version: 1.20.0
license: BSD-3-Clause
category: development
tags:
  - cli
  - git
description: Tool for working with Gerrit code reviews
source-archive: https://github.com/golang/review/archive/refs/tags/v1.20.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-codereview
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-codereview
  brew: brew install git-codereview
  nix: nix profile install nixpkgs#git-codereview
provenance:
  formula: git-codereview
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
