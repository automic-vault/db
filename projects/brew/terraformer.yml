id: brew:terraformer
display-name: terraformer
homepage: https://github.com/GoogleCloudPlatform/terraformer
repo: https://github.com/GoogleCloudPlatform/terraformer
docs: https://github.com/GoogleCloudPlatform/terraformer
package-manager:
  brew: terraformer
  chocolatey: terraformer
  macports: terraformer
  nix: terraformer
  scoop: main/terraformer
  winget: WazeSRE.Terraformer
package-manager-url: https://formulae.brew.sh/formula/terraformer
version: 0.8.30
license: Apache-2.0
category: cloud
tags:
  - cli
description: CLI tool to generate terraform files from existing infrastructure
source-archive: https://github.com/GoogleCloudPlatform/terraformer/archive/refs/tags/0.8.30.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terraformer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terraformer
  brew: brew install terraformer
  chocolatey: choco install terraformer
  macports: sudo port install terraformer
  nix: nix profile install nixpkgs#terraformer
  scoop: scoop install main/terraformer
  winget: winget install --id WazeSRE.Terraformer -e
provenance:
  formula: terraformer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
