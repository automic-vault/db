id: brew:lib3ds
display-name: lib3ds
homepage: https://code.google.com/archive/p/lib3ds/
repo: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/lib3ds/lib3ds-1.3.0.zip
docs: https://code.google.com/archive/p/lib3ds/
package-manager:
  brew: lib3ds
  dnf: lib3ds
  macports: lib3ds
  nix: lib3ds
package-manager-url: https://formulae.brew.sh/formula/lib3ds
version: 1.3.0
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Library for managing 3D-Studio Release 3 and 4 '.3DS' files
source-archive: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/lib3ds/lib3ds-1.3.0.zip
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: 3dsdump
  - exposure: global executable
    kind: cli
    name: lib3ds-config
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lib3ds
  brew: brew install lib3ds
  dnf: sudo dnf install lib3ds
  macports: sudo port install lib3ds
  nix: nix profile install nixpkgs#lib3ds
provenance:
  formula: lib3ds
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
