id: brew:imposm3
display-name: imposm3
homepage: https://imposm.org/docs/imposm3/latest/
repo: https://github.com/omniscale/imposm3
docs: https://imposm.org/docs/imposm3/latest/
package-manager:
  brew: imposm3
  macports: imposm
  nix: imposm
package-manager-url: https://formulae.brew.sh/formula/imposm3
version: 0.14.2
license: Apache-2.0
category: database
tags:
  - cli
description: Imports OpenStreetMap data into PostgreSQL/PostGIS databases
source-archive: https://github.com/omniscale/imposm3/archive/refs/tags/v0.14.2.tar.gz
dependencies:
  - geos
  - leveldb
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: imposm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:imposm3
  brew: brew install imposm3
  macports: sudo port install imposm
  nix: nix profile install nixpkgs#imposm
provenance:
  formula: imposm3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
