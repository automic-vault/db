id: brew:uptimed
display-name: uptimed
homepage: https://github.com/rpodgorny/uptimed/
repo: https://github.com/rpodgorny/uptimed
docs: https://github.com/rpodgorny/uptimed/
package-manager:
  apk: uptimed
  brew: uptimed
  debian: uptimed
  dnf: uptimed
  macports: uptimed
  nix: uptimed
  pacman: uptimed
  ubuntu: uptimed
package-manager-url: https://formulae.brew.sh/formula/uptimed
version: 0.4.7
license: GPL-2.0-only
category: development
tags:
  - cli
description: Utility to track your highest uptimes
source-archive: https://github.com/rpodgorny/uptimed/archive/refs/tags/v0.4.7.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: uprecords
  - exposure: global executable
    kind: cli
    name: uptimed
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add uptimed
  av: sudo av install brew:uptimed
  brew: brew install uptimed
  debian: sudo apt install uptimed
  dnf: sudo dnf install uptimed
  macports: sudo port install uptimed
  nix: nix profile install nixpkgs#uptimed
  pacman: sudo pacman -S uptimed
  ubuntu: sudo apt install uptimed
provenance:
  formula: uptimed
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
