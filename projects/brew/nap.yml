id: brew:nap
display-name: nap
homepage: https://github.com/maaslalani/nap
repo: https://github.com/maaslalani/nap
docs: https://github.com/maaslalani/nap
package-manager:
  brew: nap
  nix: nap
package-manager-url: https://formulae.brew.sh/formula/nap
version: 0.1.1
license: MIT
category: development
tags:
  - cli
description: Code snippets in your terminal
source-archive: https://github.com/maaslalani/nap/archive/refs/tags/v0.1.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nap
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nap
  brew: brew install nap
  nix: nix profile install nixpkgs#nap
provenance:
  formula: nap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
