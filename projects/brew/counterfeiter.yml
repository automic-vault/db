id: brew:counterfeiter
display-name: counterfeiter
homepage: https://github.com/maxbrunsfeld/counterfeiter
repo: https://github.com/maxbrunsfeld/counterfeiter
docs: https://github.com/maxbrunsfeld/counterfeiter
package-manager:
  brew: counterfeiter
package-manager-url: https://formulae.brew.sh/formula/counterfeiter
version: 6.12.2
license: MIT
category: development
tags:
