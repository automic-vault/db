install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:counterfeiter
  brew: brew install counterfeiter
provenance:
  formula: counterfeiter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
