id: brew:jack
display-name: jack
homepage: https://jackaudio.org/
repo: https://github.com/jackaudio/jack2
docs: https://jackaudio.org/
package-manager:
  apk: jack
  brew: jack
  chocolatey: jack
  debian: jack
  macports: jack
  ubuntu: jackd
  zypper: jack
package-manager-url: https://formulae.brew.sh/formula/jack
version: 1.9.22
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Audio Connection Kit
source-archive: https://github.com/jackaudio/jack2/archive/refs/tags/v1.9.22.tar.gz
dependencies:
  - aften
  - berkeley-db@5
  - libsamplerate
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: jackd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add jack
  av: sudo av install brew:jack
  brew: brew install jack
  chocolatey: choco install jack
  debian: sudo apt install jack
  macports: sudo port install jack
  ubuntu: sudo apt install jackd
  zypper: sudo zypper install jack
provenance:
  formula: jack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
