id: brew:nwchem
display-name: nwchem
homepage: https://nwchemgit.github.io
repo: https://github.com/nwchemgit/nwchem
docs: https://nwchemgit.github.io
package-manager:
  brew: nwchem
  debian: nwchem
  dnf: nwchem
  nix: nwchem
  ubuntu: nwchem
package-manager-url: https://formulae.brew.sh/formula/nwchem
version: 7.3.1
license: ECL-2.0
category: development
tags:
  - cli
description: High-performance computational chemistry tools
source-archive: >
  https://github.com/nwchemgit/nwchem/releases/download/v7.3.1-release/nwchem-7.3.1-release.revision-23c3b41b-src.2025-11-06.tar.xz
dependencies:
  - gcc
  - hwloc
  - libomp
  - libxc
  - open-mpi
  - openblas
  - pkgconf
  - python@3.14
  - scalapack
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: nwchem
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nwchem
  brew: brew install nwchem
  debian: sudo apt install nwchem
  dnf: sudo dnf install nwchem
  nix: nix profile install nixpkgs#nwchem
  ubuntu: sudo apt install nwchem
provenance:
  formula: nwchem
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
