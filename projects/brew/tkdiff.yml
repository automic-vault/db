repo: https://downloads.sourceforge.net/project/tkdiff/tkdiff/6.0/tkdiff-6-0.zip
docs: https://tkdiff.sourceforge.io/
package-manager:
  brew: tkdiff
  macports: tkdiff
  nix: tkdiff
  zypper: tkdiff
package-manager-url: https://formulae.brew.sh/formula/tkdiff
version: 6.0
license: GPL-2.0-only
category: network
tags:
