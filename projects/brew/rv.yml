id: brew:rv
display-name: rv
homepage: https://github.com/spinel-coop/rv
repo: https://github.com/spinel-coop/rv
docs: https://github.com/spinel-coop/rv
package-manager:
  brew: rv
  dnf: rv
  scoop: main/rv
  winget: A2-Ai.rv
package-manager-url: https://formulae.brew.sh/formula/rv
version: 0.5.3
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Ruby version manager
source-archive: https://github.com/spinel-coop/rv/archive/refs/tags/v0.5.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rv
  - exposure: global executable
    kind: cli
    name: rvw
  - exposure: global executable
    kind: cli
    name: rvx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rv
  brew: brew install rv
  dnf: sudo dnf install rv
  scoop: scoop install main/rv
  winget: winget install --id A2-Ai.rv -e
provenance:
  formula: rv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
