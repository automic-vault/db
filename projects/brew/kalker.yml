id: brew:kalker
display-name: kalker
homepage: https://kalker.strct.net
repo: https://github.com/PaddiM8/kalker
docs: https://kalker.strct.net
package-manager:
  apk: kalker
  brew: kalker
  macports: kalker
  nix: kalker
  scoop: main/kalker
  winget: PaddiM8.kalker
package-manager-url: https://formulae.brew.sh/formula/kalker
version: 2.2.2
license: MIT
category: development
tags:
  - cli
description: Full-featured calculator with math syntax
source-archive: https://github.com/PaddiM8/kalker/archive/refs/tags/v2.2.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: kalker
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kalker
  av: sudo av install brew:kalker
  brew: brew install kalker
  macports: sudo port install kalker
  nix: nix profile install nixpkgs#kalker
  scoop: scoop install main/kalker
  winget: winget install --id PaddiM8.kalker -e
provenance:
  formula: kalker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
