id: brew:tinysvm
display-name: tinysvm
homepage: http://chasen.org/~taku/software/TinySVM/
repo: https://cdn.netbsd.org/pub/pkgsrc/distfiles/TinySVM-0.09.tar.gz
docs: http://chasen.org/~taku/software/TinySVM/
package-manager:
  brew: tinysvm
  macports: TinySVM
package-manager-url: https://formulae.brew.sh/formula/tinysvm
version: 0.09
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Support vector machine library for pattern recognition
source-archive: https://cdn.netbsd.org/pub/pkgsrc/distfiles/TinySVM-0.09.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: svm_classify
  - exposure: global executable
    kind: cli
    name: svm_learn
  - exposure: global executable
    kind: cli
    name: svm_model
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tinysvm
  brew: brew install tinysvm
  macports: sudo port install TinySVM
provenance:
  formula: tinysvm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
