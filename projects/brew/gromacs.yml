id: brew:gromacs
display-name: gromacs
homepage: https://www.gromacs.org/
repo: https://ftp.gromacs.org/pub/gromacs/gromacs-2026.2.tar.gz
docs: https://www.gromacs.org/
package-manager:
  brew: gromacs
  debian: gromacs
  dnf: gromacs
  macports: gromacs
  nix: gromacs
  ubuntu: gromacs
  zypper: gromacs
package-manager-url: https://formulae.brew.sh/formula/gromacs
version: 2026.2
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Versatile package for molecular dynamics calculations
source-archive: https://ftp.gromacs.org/pub/gromacs/gromacs-2026.2.tar.gz
dependencies:
  - fftw
  - libomp
  - lmfit
  - muparser
  - openblas
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gmx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'GMXRC and other scripts installed to: $HOMEBREW_PREFIX/share/gromacs'
  post-install-defined: false
install-lines:
  av: sudo av install brew:gromacs
  brew: brew install gromacs
  debian: sudo apt install gromacs
  dnf: sudo dnf install gromacs
  macports: sudo port install gromacs
  nix: nix profile install nixpkgs#gromacs
  ubuntu: sudo apt install gromacs
  zypper: sudo zypper install gromacs
provenance:
  formula: gromacs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
