id: brew:binocle
display-name: binocle
homepage: https://github.com/sharkdp/binocle
repo: https://github.com/sharkdp/binocle
docs: https://github.com/sharkdp/binocle
package-manager:
  brew: binocle
  macports: binocle
  nix: binocle
  pacman: binocle
package-manager-url: https://formulae.brew.sh/formula/binocle
version: 0.3.2
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Graphical tool to visualize binary data
source-archive: https://github.com/sharkdp/binocle/archive/refs/tags/v0.3.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: binocle
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:binocle
  brew: brew install binocle
  macports: sudo port install binocle
  nix: nix profile install nixpkgs#binocle
  pacman: sudo pacman -S binocle
provenance:
  formula: binocle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
