id: brew:pg_top
display-name: pg_top
homepage: https://pg_top.gitlab.io
repo: https://ftp.postgresql.org/pub/projects/pgFoundry/ptop/pg_top/3.7.0/pg_top-3.7.0.tar.bz2
docs: https://pg_top.gitlab.io
package-manager:
  apk: pg_top
  brew: pg_top
  dnf: pg_top
  nix: pg_top
  zypper: pg_top
package-manager-url: https://formulae.brew.sh/formula/pg_top
version: 3.7.0
license: BSD-3-Clause
category: database
tags:
  - cli
description: Monitor PostgreSQL processes
source-archive: https://ftp.postgresql.org/pub/projects/pgFoundry/ptop/pg_top/3.7.0/pg_top-3.7.0.tar.bz2
dependencies:
  - libpq
build-dependencies:
  - autoconf
  - automake
  - libtool
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: pg_top
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pg_top
  av: sudo av install brew:pg_top
  brew: brew install pg_top
  dnf: sudo dnf install pg_top
  nix: nix profile install nixpkgs#pg_top
  zypper: sudo zypper install pg_top
provenance:
  formula: pg_top
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
