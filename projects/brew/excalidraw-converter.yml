id: brew:excalidraw-converter
display-name: excalidraw-converter
homepage: https://github.com/sindrel/excalidraw-converter
repo: https://github.com/sindrel/excalidraw-converter
docs: https://github.com/sindrel/excalidraw-converter
package-manager:
  brew: excalidraw-converter
package-manager-url: https://formulae.brew.sh/formula/excalidraw-converter
version: 1.5.6
license: MIT
category: development
tags:
  - cli
description: Command-line tool for porting Excalidraw diagrams to Gliffy
source-archive: https://github.com/sindrel/excalidraw-converter/archive/refs/tags/v1.5.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: excalidraw-converter
  - exposure: global executable
    kind: cli
    name: exconv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:excalidraw-converter
  brew: brew install excalidraw-converter
provenance:
  formula: excalidraw-converter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
