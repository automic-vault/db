id: brew:pgformatter
display-name: pgformatter
homepage: https://sqlformat.darold.net/
repo: https://github.com/darold/pgFormatter
docs: https://sqlformat.darold.net/
package-manager:
  brew: pgformatter
  debian: pgformatter
  macports: pgFormatter
  nix: pgformatter
  pacman: pgformatter
  ubuntu: pgformatter
package-manager-url: https://formulae.brew.sh/formula/pgformatter
version: 5.10
license: PostgreSQL
category: database
tags:
  - cli
description: PostgreSQL syntax beautifier
source-archive: https://github.com/darold/pgFormatter/archive/refs/tags/v5.10.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: pg_format
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pgformatter
  brew: brew install pgformatter
  debian: sudo apt install pgformatter
  macports: sudo port install pgFormatter
  nix: nix profile install nixpkgs#pgformatter
  pacman: sudo pacman -S pgformatter
  ubuntu: sudo apt install pgformatter
provenance:
  formula: pgformatter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
