id: brew:ocamlbuild
display-name: ocamlbuild
homepage: https://github.com/ocaml/ocamlbuild
repo: https://github.com/ocaml/ocamlbuild
docs: https://github.com/ocaml/ocamlbuild
package-manager:
  apk: ocamlbuild
  brew: ocamlbuild
  debian: ocamlbuild
  pacman: ocamlbuild
  ubuntu: ocamlbuild
package-manager-url: https://formulae.brew.sh/formula/ocamlbuild
version: 0.16.1
license: LGPL-2.0-only WITH OCaml-LGPL-linking-exception
category: development
tags:
  - cli
description: Generic build tool for OCaml
source-archive: https://github.com/ocaml/ocamlbuild/archive/refs/tags/0.16.1.tar.gz
dependencies:
  - ocaml
executables:
  - exposure: global executable
    kind: cli
    name: ocamlbuild
  - exposure: global executable
    kind: cli
    name: ocamlbuild.byte
  - exposure: global executable
    kind: cli
    name: ocamlbuild.native
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ocamlbuild
  av: sudo av install brew:ocamlbuild
  brew: brew install ocamlbuild
  debian: sudo apt install ocamlbuild
  pacman: sudo pacman -S ocamlbuild
  ubuntu: sudo apt install ocamlbuild
provenance:
  formula: ocamlbuild
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
