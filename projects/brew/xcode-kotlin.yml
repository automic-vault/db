id: brew:xcode-kotlin
display-name: xcode-kotlin
homepage: https://github.com/touchlab/xcode-kotlin
repo: https://github.com/touchlab/xcode-kotlin
docs: https://github.com/touchlab/xcode-kotlin
package-manager:
  brew: xcode-kotlin
package-manager-url: https://formulae.brew.sh/formula/xcode-kotlin
version: 2.2.1
license: Apache-2.0
category: development
tags:
  - cli
description: Kotlin Native Xcode Plugin
source-archive: https://github.com/touchlab/xcode-kotlin/archive/refs/tags/2.2.1.tar.gz
build-dependencies:
  - gradle
executables:
  - exposure: global executable
    kind: cli
    name: xcode-kotlin
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xcode-kotlin
  brew: brew install xcode-kotlin
provenance:
  formula: xcode-kotlin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
