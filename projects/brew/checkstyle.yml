id: brew:checkstyle
display-name: checkstyle
homepage: https://checkstyle.sourceforge.io/
repo: https://github.com/checkstyle/checkstyle
docs: https://checkstyle.sourceforge.io/
package-manager:
  brew: checkstyle
  debian: checkstyle
  macports: checkstyle
  nix: checkstyle
  ubuntu: checkstyle
package-manager-url: https://formulae.brew.sh/formula/checkstyle
version: 13.4.2
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Check Java source against a coding standard
source-archive: >
  https://github.com/checkstyle/checkstyle/releases/download/checkstyle-13.4.2/checkstyle-13.4.2-all.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: checkstyle
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:checkstyle
  brew: brew install checkstyle
  debian: sudo apt install checkstyle
  macports: sudo port install checkstyle
  nix: nix profile install nixpkgs#checkstyle
  ubuntu: sudo apt install checkstyle
provenance:
  formula: checkstyle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
