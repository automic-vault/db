id: brew:gravitino
display-name: gravitino
homepage: https://gravitino.apache.org
repo: https://github.com/apache/gravitino
docs: https://gravitino.apache.org
package-manager:
  brew: gravitino
package-manager-url: https://formulae.brew.sh/formula/gravitino
version: 1.2.1
license: Apache-2.0
category: development
tags:
  - cli
description: High-performance, geo-distributed, and federated metadata lake
source-archive: https://github.com/apache/gravitino/archive/refs/tags/v1.2.1.tar.gz
dependencies:
  - openjdk@17
build-dependencies:
  - gradle@8
  - node
executables:
  - exposure: global executable
    kind: cli
    name: gravitino-iceberg-rest-server.sh
  - exposure: global executable
    kind: cli
    name: gravitino.sh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:gravitino
  brew: brew install gravitino
provenance:
  formula: gravitino
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
