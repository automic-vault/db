id: brew:tre-command
display-name: tre-command
homepage: https://github.com/dduan/tre
repo: https://github.com/dduan/tre
docs: https://github.com/dduan/tre
package-manager:
  apk: tre
  brew: tre-command
  debian: tre-command
  dnf: tre
  macports: tre
  nix: tre-command
  pacman: tre
  scoop: main/tre-command
  ubuntu: tre-command
  winget: duan.tre
package-manager-url: https://formulae.brew.sh/formula/tre-command
version: 0.4.0
license: MIT
category: development
tags:
  - cli
description: Tree command, improved
source-archive: https://github.com/dduan/tre/archive/refs/tags/v0.4.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tre
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tre
  av: sudo av install brew:tre-command
  brew: brew install tre-command
  debian: sudo apt install tre-command
  dnf: sudo dnf install tre
  macports: sudo port install tre
  nix: nix profile install nixpkgs#tre-command
  pacman: sudo pacman -S tre
  scoop: scoop install main/tre-command
  ubuntu: sudo apt install tre-command
  winget: winget install --id duan.tre -e
provenance:
  formula: tre-command
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
