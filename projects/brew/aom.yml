id: brew:aom
display-name: aom
homepage: https://aomedia.googlesource.com/aom
repo: https://aomedia.googlesource.com/aom
docs: https://aomedia.googlesource.com/aom
package-manager:
  apk: aom
  brew: aom
  dnf: aom
  macports: aom
  pacman: aom
package-manager-url: https://formulae.brew.sh/formula/aom
version: 3.14.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: Codec library for encoding and decoding AV1 video streams
source-archive: https://aomedia.googlesource.com/aom.git
dependencies:
  - libvmaf
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: aomdec
  - exposure: global executable
    kind: cli
    name: aomenc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add aom
  av: sudo av install brew:aom
  brew: brew install aom
  dnf: sudo dnf install aom
  macports: sudo port install aom
  pacman: sudo pacman -S aom
provenance:
  formula: aom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
