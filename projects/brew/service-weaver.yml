id: brew:service-weaver
display-name: service-weaver
homepage: https://serviceweaver.dev/
repo: https://github.com/ServiceWeaver/weaver
docs: https://serviceweaver.dev/
package-manager:
  brew: service-weaver
package-manager-url: https://formulae.brew.sh/formula/service-weaver
version: 0.24.6
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Programming framework for writing and deploying cloud applications
source-archive: https://github.com/ServiceWeaver/weaver/archive/refs/tags/v0.24.6.tar.gz
build-dependencies:
  - go@1.23
executables:
  - exposure: global executable
    kind: cli
    name: weaver-gke
  - exposure: global executable
    kind: cli
    name: weaver-gke-local
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:service-weaver
  brew: brew install service-weaver
provenance:
  formula: service-weaver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
