id: brew:xe
display-name: xe
homepage: https://github.com/leahneukirchen/xe
repo: https://github.com/leahneukirchen/xe
docs: https://github.com/leahneukirchen/xe
package-manager:
  brew: xe
  debian: xe
  nix: xe
  ubuntu: xe
package-manager-url: https://formulae.brew.sh/formula/xe
version: 1.0
license: LicenseRef-Homebrew-public-domain
category: development
tags:
  - cli
description: Simple xargs and apply replacement
source-archive: https://github.com/leahneukirchen/xe/archive/refs/tags/v1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: xe
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xe
  brew: brew install xe
  debian: sudo apt install xe
  nix: nix profile install nixpkgs#xe
  ubuntu: sudo apt install xe
provenance:
  formula: xe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
