id: brew:pwnat
display-name: pwnat
homepage: https://samy.pl/pwnat/
repo: https://github.com/samyk/pwnat
docs: https://samy.pl/pwnat/
package-manager:
  brew: pwnat
  nix: pwnat
package-manager-url: https://formulae.brew.sh/formula/pwnat
version: 0.3.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Proxy server that works behind a NAT
source-archive: https://github.com/samyk/pwnat/archive/refs/tags/v0.3.0.tar.gz
executables:
