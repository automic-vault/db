    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pwnat
  brew: brew install pwnat
  nix: nix profile install nixpkgs#pwnat
provenance:
  formula: pwnat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
