id: brew:liblouis
display-name: liblouis
homepage: https://liblouis.io
repo: https://github.com/liblouis/liblouis
docs: https://liblouis.io
package-manager:
  apk: liblouis
  brew: liblouis
  dnf: liblouis
  macports: liblouis
  nix: liblouis
  pacman: liblouis
package-manager-url: https://formulae.brew.sh/formula/liblouis
version: 3.37.0
license: GPL-3.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: Open-source braille translator and back-translator
source-archive: https://github.com/liblouis/liblouis/releases/download/v3.37.0/liblouis-3.37.0.tar.gz
dependencies:
  - python@3.14
build-dependencies:
  - help2man
  - pkgconf
uses-from-macos:
  - m4
executables:
  - exposure: global executable
    kind: cli
    name: lou_allround
  - exposure: global executable
    kind: cli
    name: lou_checkhyphens
  - exposure: global executable
    kind: cli
    name: lou_checktable
  - exposure: global executable
    kind: cli
    name: lou_debug
  - exposure: global executable
    kind: cli
    name: lou_tableinfo
  - exposure: global executable
    kind: cli
    name: lou_trace
  - exposure: global executable
    kind: cli
    name: lou_translate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add liblouis
  av: sudo av install brew:liblouis
  brew: brew install liblouis
  dnf: sudo dnf install liblouis
  macports: sudo port install liblouis
  nix: nix profile install nixpkgs#liblouis
  pacman: sudo pacman -S liblouis
provenance:
  formula: liblouis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
