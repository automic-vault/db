id: brew:ncdu
display-name: ncdu
homepage: https://dev.yorhel.nl/ncdu
repo: https://dev.yorhel.nl/download/ncdu-2.9.2.tar.gz
docs: https://dev.yorhel.nl/ncdu
package-manager:
  apk: ncdu
  brew: ncdu
  debian: ncdu
  dnf: ncdu
  macports: ncdu
  nix: ncdu
  pacman: ncdu
  ubuntu: ncdu
  zypper: ncdu
package-manager-url: https://formulae.brew.sh/formula/ncdu
version: 2.9.2
license: MIT
category: network
tags:
  - cli
description: NCurses Disk Usage
source-archive: https://dev.yorhel.nl/download/ncdu-2.9.2.tar.gz
dependencies:
  - ncurses
  - zstd
build-dependencies:
  - pkgconf
  - zig@0.15
executables:
  - exposure: global executable
    kind: cli
    name: ncdu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ncdu
  av: sudo av install brew:ncdu
  brew: brew install ncdu
  debian: sudo apt install ncdu
  dnf: sudo dnf install ncdu
  macports: sudo port install ncdu
  nix: nix profile install nixpkgs#ncdu
  pacman: sudo pacman -S ncdu
  ubuntu: sudo apt install ncdu
  zypper: sudo zypper install ncdu
provenance:
  formula: ncdu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
