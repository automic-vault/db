id: brew:asuka
display-name: asuka
homepage: https://sr.ht/~julienxx/Asuka/
repo: https://git.sr.ht/~julienxx/asuka/archive/0.8.5.tar.gz
docs: https://sr.ht/~julienxx/Asuka/
package-manager:
  brew: asuka
  nix: asuka
package-manager-url: https://formulae.brew.sh/formula/asuka
version: 0.8.5
license: MIT
category: development
tags:
  - cli
description: Gemini Project client written in Rust with NCurses
source-archive: https://git.sr.ht/~julienxx/asuka/archive/0.8.5.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: asuka
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:asuka
  brew: brew install asuka
  nix: nix profile install nixpkgs#asuka
provenance:
  formula: asuka
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
