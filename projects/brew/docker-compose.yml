id: brew:docker-compose
display-name: docker-compose
homepage: https://docs.docker.com/compose/
repo: https://github.com/docker/compose
docs: https://docs.docker.com/compose/
package-manager:
  brew: docker-compose
  chocolatey: docker-compose
  debian: docker-compose
  dnf: docker-compose
  macports: docker-compose
  nix: docker-compose
  pacman: docker-compose
  scoop: main/docker-compose
  ubuntu: docker-compose
  winget: Docker.DockerCompose
  zypper: docker-compose
package-manager-url: https://formulae.brew.sh/formula/docker-compose
version: 5.1.4
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: Isolated development environments using Docker
source-archive: https://github.com/docker/compose/archive/refs/tags/v5.1.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: docker-compose
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Compose is a Docker plugin. For Docker to find the plugin, add "cliPluginsExtraDirs"
    to ~/.docker/config.json: "cliPluginsExtraDirs": [
    "$HOMEBREW_PREFIX/lib/docker/cli-plugins" ]
  post-install-defined: false
install-lines:
  av: sudo av install brew:docker-compose
  brew: brew install docker-compose
  chocolatey: choco install docker-compose
  debian: sudo apt install docker-compose
  dnf: sudo dnf install docker-compose
  macports: sudo port install docker-compose
  nix: nix profile install nixpkgs#docker-compose
  pacman: sudo pacman -S docker-compose
  scoop: scoop install main/docker-compose
  ubuntu: sudo apt install docker-compose
  winget: winget install --id Docker.DockerCompose -e
  zypper: sudo zypper install docker-compose
provenance:
  formula: docker-compose
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
