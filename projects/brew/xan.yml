id: brew:xan
display-name: xan
homepage: https://github.com/medialab/xan
repo: https://github.com/medialab/xan
docs: https://github.com/medialab/xan
package-manager:
  brew: xan
  macports: xan
  nix: xan
  pacman: xan
  scoop: extras/xan
  winget: medialab.xan
package-manager-url: https://formulae.brew.sh/formula/xan
version: 0.57.1
license: MIT OR Unlicense
category: development
tags:
  - cli
description: CSV CLI magician written in Rust
source-archive: https://github.com/medialab/xan/archive/refs/tags/0.57.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: xan
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xan
  brew: brew install xan
  macports: sudo port install xan
  nix: nix profile install nixpkgs#xan
  pacman: sudo pacman -S xan
  scoop: scoop install extras/xan
  winget: winget install --id medialab.xan -e
provenance:
  formula: xan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
