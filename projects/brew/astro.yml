id: brew:astro
display-name: astro
homepage: https://www.astronomer.io/
repo: https://github.com/astronomer/astro-cli
docs: https://www.astronomer.io/
package-manager:
  brew: astro
  winget: Astronomer.Astro
package-manager-url: https://formulae.brew.sh/formula/astro
version: 1.42.1
license: Apache-2.0
category: development
tags:
  - cli
description: To build and run Airflow DAGs locally and interact with the Astronomer API
source-archive: https://github.com/astronomer/astro-cli/archive/refs/tags/v1.42.1.tar.gz
dependencies:
  - podman
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: astro
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:astro
  brew: brew install astro
  winget: winget install --id Astronomer.Astro -e
provenance:
  formula: astro
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
