id: brew:libmikmod
display-name: libmikmod
homepage: https://mikmod.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/mikmod/libmikmod/3.3.13/libmikmod-3.3.13.tar.gz
docs: https://mikmod.sourceforge.net/
package-manager:
  apk: libmikmod
  brew: libmikmod
  dnf: libmikmod
  macports: libmikmod
  nix: libmikmod
  pacman: libmikmod
  ubuntu: libmikmod-config
package-manager-url: https://formulae.brew.sh/formula/libmikmod
version: 3.3.13
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: Portable sound library
source-archive: >
  https://downloads.sourceforge.net/project/mikmod/libmikmod/3.3.13/libmikmod-3.3.13.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: libmikmod-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libmikmod
  av: sudo av install brew:libmikmod
  brew: brew install libmikmod
  dnf: sudo dnf install libmikmod
  macports: sudo port install libmikmod
  nix: nix profile install nixpkgs#libmikmod
  pacman: sudo pacman -S libmikmod
  ubuntu: sudo apt install libmikmod-config
provenance:
  formula: libmikmod
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
