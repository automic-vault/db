id: brew:cayley
display-name: cayley
homepage: https://github.com/cayleygraph/cayley
repo: https://github.com/cayleygraph/cayley
docs: https://github.com/cayleygraph/cayley
package-manager:
  brew: cayley
  nix: cayley
package-manager-url: https://formulae.brew.sh/formula/cayley
version: 0.7.7
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Graph database inspired by Freebase and Knowledge Graph
source-archive: https://github.com/cayleygraph/cayley.git
build-dependencies:
  - breezy
  - go
  - mercurial
executables:
  - exposure: global executable
    kind: cli
    name: cayley
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
  service: declared
install-lines:
  av: sudo av install brew:cayley
  brew: brew install cayley
  nix: nix profile install nixpkgs#cayley
provenance:
  formula: cayley
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
