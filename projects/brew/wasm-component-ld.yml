id: brew:wasm-component-ld
display-name: wasm-component-ld
homepage: https://wasi.dev
repo: https://github.com/bytecodealliance/wasm-component-ld
docs: https://wasi.dev
package-manager:
  apk: wasm-component-ld
  brew: wasm-component-ld
  macports: wasm-component-ld
  pacman: wasm-component-ld
package-manager-url: https://formulae.brew.sh/formula/wasm-component-ld
version: 0.5.22
license: Apache-2.0
category: development
tags:
  - cli
description: Linker for creating WebAssembly components
source-archive: https://github.com/bytecodealliance/wasm-component-ld/archive/refs/tags/v0.5.22.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: wasm-component-ld
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wasm-component-ld
  av: sudo av install brew:wasm-component-ld
  brew: brew install wasm-component-ld
  macports: sudo port install wasm-component-ld
  pacman: sudo pacman -S wasm-component-ld
provenance:
  formula: wasm-component-ld
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
