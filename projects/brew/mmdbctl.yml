id: brew:mmdbctl
display-name: mmdbctl
homepage: https://github.com/ipinfo/mmdbctl
repo: https://github.com/ipinfo/mmdbctl
docs: https://github.com/ipinfo/mmdbctl
package-manager:
  brew: mmdbctl
  nix: mmdbctl
package-manager-url: https://formulae.brew.sh/formula/mmdbctl
version: 1.4.10
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: MMDB file management CLI supporting various operations on MMDB database files
source-archive: https://github.com/ipinfo/mmdbctl/archive/refs/tags/mmdbctl-1.4.10.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mmdbctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mmdbctl
  brew: brew install mmdbctl
  nix: nix profile install nixpkgs#mmdbctl
provenance:
  formula: mmdbctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
