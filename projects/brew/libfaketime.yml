id: brew:libfaketime
display-name: libfaketime
homepage: https://github.com/wolfcw/libfaketime
repo: https://github.com/wolfcw/libfaketime
docs: https://github.com/wolfcw/libfaketime
package-manager:
  apk: libfaketime
  brew: libfaketime
  debian: libfaketime
  dnf: libfaketime
  macports: libfaketime
  nix: libfaketime
  pacman: libfaketime
  ubuntu: libfaketime
  zypper: libfaketime
package-manager-url: https://formulae.brew.sh/formula/libfaketime
version: 0.9.12
license: GPL-2.0-only
category: development
tags:
  - cli
description: Report faked system time to programs
source-archive: https://github.com/wolfcw/libfaketime/archive/refs/tags/v0.9.12.tar.gz
dependencies:
  - coreutils
executables:
  - exposure: global executable
    kind: cli
    name: faketime
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libfaketime
  av: sudo av install brew:libfaketime
  brew: brew install libfaketime
  debian: sudo apt install libfaketime
  dnf: sudo dnf install libfaketime
  macports: sudo port install libfaketime
  nix: nix profile install nixpkgs#libfaketime
  pacman: sudo pacman -S libfaketime
  ubuntu: sudo apt install libfaketime
  zypper: sudo zypper install libfaketime
provenance:
  formula: libfaketime
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
