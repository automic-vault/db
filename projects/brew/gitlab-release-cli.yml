id: brew:gitlab-release-cli
display-name: gitlab-release-cli
homepage: https://gitlab.com/gitlab-org/release-cli
repo: https://gitlab.com/gitlab-org/release-cli/-/archive/v0.24.0/release-cli-v0.24.0.tar.bz2
docs: https://gitlab.com/gitlab-org/release-cli
package-manager:
  apk: gitlab-release-cli
  brew: gitlab-release-cli
  nix: gitlab-release-cli
  pacman: release-cli
  scoop: main/gitlab-release-cli
package-manager-url: https://formulae.brew.sh/formula/gitlab-release-cli
version: 0.24.0
license: MIT
category: development
tags:
  - cli
description: Toolset to create, retrieve and update releases on GitLab
source-archive: https://gitlab.com/gitlab-org/release-cli/-/archive/v0.24.0/release-cli-v0.24.0.tar.bz2
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: release-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gitlab-release-cli
  av: sudo av install brew:gitlab-release-cli
  brew: brew install gitlab-release-cli
  nix: nix profile install nixpkgs#gitlab-release-cli
  pacman: sudo pacman -S release-cli
  scoop: scoop install main/gitlab-release-cli
provenance:
  formula: gitlab-release-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
