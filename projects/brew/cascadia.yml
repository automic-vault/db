id: brew:cascadia
display-name: cascadia
homepage: https://github.com/suntong/cascadia
repo: https://github.com/suntong/cascadia
docs: https://github.com/suntong/cascadia
package-manager:
  brew: cascadia
package-manager-url: https://formulae.brew.sh/formula/cascadia
version: 1.5.0
license: MIT
category: development
tags:
  - cli
description: Go cascadia package command-line CSS selector
source-archive: https://github.com/suntong/cascadia/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cascadia
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cascadia
  brew: brew install cascadia
provenance:
  formula: cascadia
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
