id: brew:gsmartcontrol
display-name: gsmartcontrol
homepage: https://gsmartcontrol.shaduri.dev/
repo: https://downloads.sourceforge.net/project/gsmartcontrol/2.0.2/gsmartcontrol-2.0.2.tar.gz
docs: https://gsmartcontrol.shaduri.dev/
package-manager:
  brew: gsmartcontrol
  chocolatey: gsmartcontrol
  debian: gsmartcontrol
  dnf: gsmartcontrol
  macports: gsmartcontrol
  nix: gsmartcontrol
  pacman: gsmartcontrol
  scoop: extras/gsmartcontrol
  ubuntu: gsmartcontrol
  winget: AlexanderShaduri.GSmartControl
  zypper: gsmartcontrol
package-manager-url: https://formulae.brew.sh/formula/gsmartcontrol
version: 2.0.2
license: GPL-2.0-only OR GPL-3.0-only
category: network
tags:
  - cli
description: Graphical user interface for smartctl
source-archive: https://downloads.sourceforge.net/project/gsmartcontrol/2.0.2/gsmartcontrol-2.0.2.tar.gz
dependencies:
  - at-spi2-core
  - atkmm@2.28
  - cairo
  - cairomm@1.14
  - gdk-pixbuf
  - gettext
  - glib
  - glibmm@2.66
  - gtk+3
  - gtkmm3
  - harfbuzz
  - libsigc++@2
  - pango
  - pangomm@2.46
  - pcre2
  - smartmontools
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gsmartcontrol
  - exposure: global executable
    kind: cli
    name: gsmartcontrol-root
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gsmartcontrol
  brew: brew install gsmartcontrol
  chocolatey: choco install gsmartcontrol
  debian: sudo apt install gsmartcontrol
  dnf: sudo dnf install gsmartcontrol
  macports: sudo port install gsmartcontrol
  nix: nix profile install nixpkgs#gsmartcontrol
  pacman: sudo pacman -S gsmartcontrol
  scoop: scoop install extras/gsmartcontrol
  ubuntu: sudo apt install gsmartcontrol
  winget: winget install --id AlexanderShaduri.GSmartControl -e
  zypper: sudo zypper install gsmartcontrol
provenance:
  formula: gsmartcontrol
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
