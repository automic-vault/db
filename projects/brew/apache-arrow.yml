id: brew:apache-arrow
display-name: apache-arrow
homepage: https://arrow.apache.org/
repo: https://www.apache.org/dyn/closer.lua?path=arrow/arrow-24.0.0/apache-arrow-24.0.0.tar.gz
docs: https://arrow.apache.org/
package-manager:
  apk: apache-arrow
  brew: apache-arrow
  macports: apache-arrow
  zypper: apache-arrow
package-manager-url: https://formulae.brew.sh/formula/apache-arrow
version: 24.0.0
license: Apache-2.0
category: network
tags:
  - cli
description: Columnar in-memory analytics layer designed to accelerate big data
source-archive: https://www.apache.org/dyn/closer.lua?path=arrow/arrow-24.0.0/apache-arrow-24.0.0.tar.gz
dependencies:
  - abseil
  - aws-crt-cpp
  - aws-sdk-cpp
  - brotli
  - grpc
  - llvm
  - lz4
  - openssl@3
  - protobuf
  - re2
  - snappy
  - thrift
  - utf8proc
  - zstd
build-dependencies:
  - boost
  - cmake
  - gflags
  - rapidjson
  - xsimd
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: parquet-dump-arrow-statistics
  - exposure: global executable
    kind: cli
    name: parquet-dump-footer
  - exposure: global executable
    kind: cli
    name: parquet-dump-schema
  - exposure: global executable
    kind: cli
    name: parquet-reader
  - exposure: global executable
    kind: cli
    name: parquet-scan
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add apache-arrow
  av: sudo av install brew:apache-arrow
  brew: brew install apache-arrow
  macports: sudo port install apache-arrow
  zypper: sudo zypper install apache-arrow
provenance:
  formula: apache-arrow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
