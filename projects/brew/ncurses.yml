id: brew:ncurses
display-name: ncurses
homepage: https://invisible-island.net/ncurses/announce.html
repo: https://ftpmirror.gnu.org/gnu/ncurses/ncurses-6.6.tar.gz
docs: https://invisible-island.net/ncurses/announce.html
package-manager:
  apk: ncurses
  brew: ncurses
  dnf: ncurses
  macports: ncurses
  nix: ncurses
  pacman: ncurses
package-manager-url: https://formulae.brew.sh/formula/ncurses
version: 6.6
license: X11-distribute-modifications-variant
category: network
tags:
  - cli
description: Text-based UI library
source-archive: https://ftpmirror.gnu.org/gnu/ncurses/ncurses-6.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: captoinfo
  - exposure: global executable
    kind: cli
    name: clear
  - exposure: global executable
    kind: cli
    name: infocmp
  - exposure: global executable
    kind: cli
    name: infotocap
  - exposure: global executable
    kind: cli
    name: ncurses6-config
  - exposure: global executable
    kind: cli
    name: ncursesw6-config
  - exposure: global executable
    kind: cli
    name: reset
  - exposure: global executable
    kind: cli
    name: tabs
  - exposure: global executable
    kind: cli
    name: tic
  - exposure: global executable
    kind: cli
    name: toe
  - exposure: global executable
    kind: cli
    name: tput
  - exposure: global executable
    kind: cli
    name: tset
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ncurses
  av: sudo av install brew:ncurses
  brew: brew install ncurses
  dnf: sudo dnf install ncurses
  macports: sudo port install ncurses
  nix: nix profile install nixpkgs#ncurses
  pacman: sudo pacman -S ncurses
provenance:
  formula: ncurses
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
