id: brew:screenfetch
display-name: screenfetch
homepage: https://github.com/KittyKatt/screenFetch
repo: https://github.com/KittyKatt/screenFetch
docs: https://github.com/KittyKatt/screenFetch
package-manager:
  brew: screenfetch
  debian: screenfetch
  dnf: screenfetch
  macports: screenfetch
  nix: screenfetch
  pacman: screenfetch
  ubuntu: screenfetch
  zypper: screenfetch
package-manager-url: https://formulae.brew.sh/formula/screenfetch
version: 3.9.9
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Generate ASCII art with terminal, shell, and OS info
source-archive: https://github.com/KittyKatt/screenFetch/archive/refs/tags/v3.9.9.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: screenfetch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:screenfetch
  brew: brew install screenfetch
  debian: sudo apt install screenfetch
  dnf: sudo dnf install screenfetch
  macports: sudo port install screenfetch
  nix: nix profile install nixpkgs#screenfetch
  pacman: sudo pacman -S screenfetch
  ubuntu: sudo apt install screenfetch
  zypper: sudo zypper install screenfetch
provenance:
  formula: screenfetch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
