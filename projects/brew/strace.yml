id: brew:strace
display-name: strace
homepage: https://strace.io/
repo: https://github.com/strace/strace
docs: https://strace.io/
package-manager:
  apk: strace
  brew: strace
  debian: strace
  dnf: strace
  nix: strace
  pacman: strace
  ubuntu: strace
  zypper: strace
package-manager-url: https://formulae.brew.sh/formula/strace
version: 7.0
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Diagnostic, instructional, and debugging tool for the Linux kernel
source-archive: https://github.com/strace/strace/releases/download/v7.0/strace-7.0.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: strace
  - exposure: global executable
    kind: cli
    name: strace-log-merge
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add strace
  av: sudo av install brew:strace
  brew: brew install strace
  debian: sudo apt install strace
  dnf: sudo dnf install strace
  nix: nix profile install nixpkgs#strace
  pacman: sudo pacman -S strace
  ubuntu: sudo apt install strace
  zypper: sudo zypper install strace
provenance:
  formula: strace
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
