id: brew:jove
display-name: jove
homepage: https://directory.fsf.org/wiki/Jove
repo: https://github.com/jonmacs/jove
docs: https://directory.fsf.org/wiki/Jove
package-manager:
  brew: jove
  debian: jove
  macports: jove
  nix: jove
  ubuntu: jove
package-manager-url: https://formulae.brew.sh/formula/jove
version: 4.17.5.5
license: jove
category: development
tags:
  - cli
description: Emacs-style editor with vi-like memory, CPU, and size requirements
source-archive: https://github.com/jonmacs/jove/archive/refs/tags/4.17.5.5.tar.gz
build-dependencies:
  - groff
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: jove
  - exposure: global executable
    kind: cli
    name: teachjove
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jove
  brew: brew install jove
  debian: sudo apt install jove
  macports: sudo port install jove
  nix: nix profile install nixpkgs#jove
  ubuntu: sudo apt install jove
provenance:
  formula: jove
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
