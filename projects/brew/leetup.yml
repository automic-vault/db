id: brew:leetup
display-name: leetup
homepage: https://github.com/dragfire/leetup
repo: https://github.com/dragfire/leetup
docs: https://github.com/dragfire/leetup
package-manager:
  brew: leetup
package-manager-url: https://formulae.brew.sh/formula/leetup
version: 1.2.5
license: MIT
category: development
tags:
  - cli
description: Command-line tool to solve Leetcode problems
source-archive: https://github.com/dragfire/leetup/archive/refs/tags/v1.2.5.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: leetup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:leetup
  brew: brew install leetup
provenance:
  formula: leetup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
