id: brew:mcap
display-name: mcap
homepage: https://mcap.dev
repo: https://github.com/foxglove/mcap
docs: https://mcap.dev
package-manager:
  brew: mcap
package-manager-url: https://formulae.brew.sh/formula/mcap
version: 0.0.62
license: MIT
category: development
tags:
  - cli
description: Serialization-agnostic container file format for pub/sub messages
source-archive: https://github.com/foxglove/mcap/archive/refs/tags/releases/mcap-cli/v0.0.62.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mcap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mcap
  brew: brew install mcap
provenance:
  formula: mcap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
