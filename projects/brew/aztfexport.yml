id: brew:aztfexport
display-name: aztfexport
homepage: https://azure.github.io/aztfexport/
repo: https://github.com/Azure/aztfexport
docs: https://azure.github.io/aztfexport/
package-manager:
  brew: aztfexport
  nix: aztfexport
  scoop: main/aztfexport
  winget: Microsoft.Azure.AztfExport
package-manager-url: https://formulae.brew.sh/formula/aztfexport
version: 0.19.0
license: MPL-2.0
category: cloud
tags:
  - cli
description: Bring your existing Azure resources under the management of Terraform
source-archive: https://github.com/Azure/aztfexport.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aztfexport
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aztfexport
  brew: brew install aztfexport
  nix: nix profile install nixpkgs#aztfexport
  scoop: scoop install main/aztfexport
  winget: winget install --id Microsoft.Azure.AztfExport -e
provenance:
  formula: aztfexport
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
