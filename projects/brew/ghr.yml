id: brew:ghr
display-name: ghr
homepage: https://github.com/tcnksm/ghr
repo: https://github.com/tcnksm/ghr
docs: https://github.com/tcnksm/ghr
package-manager:
  brew: ghr
  nix: ghr
  winget: cataggar.ghr
package-manager-url: https://formulae.brew.sh/formula/ghr
version: 0.18.3
license: MIT
category: development
tags:
  - cli
description: Upload multiple artifacts to GitHub Release in parallel
source-archive: https://github.com/tcnksm/ghr/archive/refs/tags/v0.18.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ghr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ghr
  brew: brew install ghr
  nix: nix profile install nixpkgs#ghr
  winget: winget install --id cataggar.ghr -e
provenance:
  formula: ghr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
