id: brew:ksh93
display-name: ksh93
homepage: https://github.com/ksh93/ksh
repo: https://github.com/ksh93/ksh
docs: https://github.com/ksh93/ksh
package-manager:
  brew: ksh93
  debian: ksh
  dnf: ksh
  macports: ksh93
  nix: ksh
  pacman: ksh
  ubuntu: ksh
  zypper: ksh
package-manager-url: https://formulae.brew.sh/formula/ksh93
version: 1.0.10
license: EPL-2.0
category: development
tags:
  - cli
description: KornShell, ksh93
source-archive: https://github.com/ksh93/ksh/archive/refs/tags/v1.0.10.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ksh
  - exposure: global executable
    kind: cli
    name: ksh93
  - exposure: global executable
    kind: cli
    name: rksh
  - exposure: global executable
    kind: cli
    name: rksh93
  - exposure: global executable
    kind: cli
    name: shcomp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ksh93
  brew: brew install ksh93
  debian: sudo apt install ksh
  dnf: sudo dnf install ksh
  macports: sudo port install ksh93
  nix: nix profile install nixpkgs#ksh
  pacman: sudo pacman -S ksh
  ubuntu: sudo apt install ksh
  zypper: sudo zypper install ksh
provenance:
  formula: ksh93
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
