id: brew:zizmor
display-name: zizmor
homepage: https://docs.zizmor.sh/
repo: https://github.com/zizmorcore/zizmor
docs: https://docs.zizmor.sh/
package-manager:
  apk: zizmor
  brew: zizmor
  macports: zizmor
  nix: zizmor
  pacman: zizmor
  scoop: main/zizmor
  winget: zizmor.zizmor
  zypper: zizmor
package-manager-url: https://formulae.brew.sh/formula/zizmor
version: 1.25.2
license: MIT
category: security
tags:
  - cli
  - security
description: Find security issues in GitHub Actions setups
source-archive: https://github.com/zizmorcore/zizmor/archive/refs/tags/v1.25.2.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: zizmor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zizmor
  av: sudo av install brew:zizmor
  brew: brew install zizmor
  macports: sudo port install zizmor
  nix: nix profile install nixpkgs#zizmor
  pacman: sudo pacman -S zizmor
  scoop: scoop install main/zizmor
  winget: winget install --id zizmor.zizmor -e
  zypper: sudo zypper install zizmor
provenance:
  formula: zizmor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
