id: brew:never
display-name: never
homepage: https://never-lang.readthedocs.io/en/latest/
repo: https://github.com/never-lang/never
docs: https://never-lang.readthedocs.io/en/latest/
package-manager:
  brew: never
package-manager-url: https://formulae.brew.sh/formula/never
version: 2.3.9
license: MIT
category: development
tags:
  - cli
description: Statically typed, embedded functional programming language
source-archive: https://github.com/never-lang/never/archive/refs/tags/v2.3.9.tar.gz
build-dependencies:
  - bison
  - cmake
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: never
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:never
  brew: brew install never
provenance:
  formula: never
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
