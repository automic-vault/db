id: brew:rtmpdump
display-name: rtmpdump
homepage: https://rtmpdump.mplayerhq.hu/
repo: https://git.ffmpeg.org/rtmpdump
docs: https://rtmpdump.mplayerhq.hu/
package-manager:
  apk: rtmpdump
  brew: rtmpdump
  debian: rtmpdump
  macports: rtmpdump
  nix: rtmpdump
  pacman: rtmpdump
  scoop: main/rtmpdump
  ubuntu: rtmpdump
package-manager-url: https://formulae.brew.sh/formula/rtmpdump
version: 2.6
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: Tool for downloading RTMP streaming media
source-archive: https://git.ffmpeg.org/rtmpdump.git
dependencies:
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: rtmpdump
  - exposure: global executable
    kind: cli
    name: rtmpgw
  - exposure: global executable
    kind: cli
    name: rtmpsrv
  - exposure: global executable
    kind: cli
    name: rtmpsuck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rtmpdump
  av: sudo av install brew:rtmpdump
  brew: brew install rtmpdump
  debian: sudo apt install rtmpdump
  macports: sudo port install rtmpdump
  nix: nix profile install nixpkgs#rtmpdump
  pacman: sudo pacman -S rtmpdump
  scoop: scoop install main/rtmpdump
  ubuntu: sudo apt install rtmpdump
provenance:
  formula: rtmpdump
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
