id: brew:cig
display-name: cig
homepage: https://github.com/stevenjack/cig
repo: https://github.com/stevenjack/cig
docs: https://github.com/stevenjack/cig
package-manager:
  brew: cig
package-manager-url: https://formulae.brew.sh/formula/cig
version: 0.1.5
license: MIT
category: development
tags:
  - cli
  - git
description: CLI app for checking the state of your git repositories
source-archive: https://github.com/stevenjack/cig/archive/refs/tags/v0.1.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cig
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cig
  brew: brew install cig
provenance:
  formula: cig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
