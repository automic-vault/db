id: brew:cql-proxy
display-name: cql-proxy
homepage: https://github.com/datastax/cql-proxy
repo: https://github.com/datastax/cql-proxy
docs: https://github.com/datastax/cql-proxy
package-manager:
  brew: cql-proxy
package-manager-url: https://formulae.brew.sh/formula/cql-proxy
version: 0.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: DataStax cql-proxy enables Cassandra apps to use Astra DB without code changes
source-archive: https://github.com/datastax/cql-proxy/archive/refs/tags/v0.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cql-proxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cql-proxy
  brew: brew install cql-proxy
provenance:
  formula: cql-proxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
