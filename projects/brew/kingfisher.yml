id: brew:kingfisher
display-name: kingfisher
homepage: https://github.com/mongodb/kingfisher
repo: https://github.com/mongodb/kingfisher
docs: https://github.com/mongodb/kingfisher
package-manager:
  brew: kingfisher
package-manager-url: https://formulae.brew.sh/formula/kingfisher
version: 1.101.0
license: Apache-2.0
category: database
tags:
  - cli
description: MongoDB's blazingly fast secret scanning and validation tool
source-archive: https://github.com/mongodb/kingfisher/archive/refs/tags/v1.101.0.tar.gz
build-dependencies:
  - boost
  - cmake
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: kingfisher
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kingfisher
  brew: brew install kingfisher
provenance:
  formula: kingfisher
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
