id: brew:minio-warp
display-name: minio-warp
homepage: https://github.com/minio/warp
repo: https://github.com/minio/warp
docs: https://github.com/minio/warp
package-manager:
  apk: warp
  brew: minio-warp
  chocolatey: warp
  debian: warp
  nix: minio-warp
  pacman: warp
  scoop: main/warp
  winget: Cloudflare.Warp
  zypper: warp
package-manager-url: https://formulae.brew.sh/formula/minio-warp
version: 1.5.0
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: S3 benchmarking tool
source-archive: https://github.com/minio/warp/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: warp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add warp
  av: sudo av install brew:minio-warp
  brew: brew install minio-warp
  chocolatey: choco install warp
  debian: sudo apt install warp
  nix: nix profile install nixpkgs#minio-warp
  pacman: sudo pacman -S warp
  scoop: scoop install main/warp
  winget: winget install --id Cloudflare.Warp -e
  zypper: sudo zypper install warp
provenance:
  formula: minio-warp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
