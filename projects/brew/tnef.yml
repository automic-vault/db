id: brew:tnef
display-name: tnef
homepage: https://github.com/verdammelt/tnef
repo: https://github.com/verdammelt/tnef
docs: https://github.com/verdammelt/tnef
package-manager:
  apk: tnef
  brew: tnef
  debian: tnef
  dnf: tnef
  macports: tnef
  nix: tnef
  ubuntu: tnef
  zypper: tnef
package-manager-url: https://formulae.brew.sh/formula/tnef
version: 1.4.18
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Microsoft MS-TNEF attachment unpacker
source-archive: https://github.com/verdammelt/tnef/archive/refs/tags/1.4.18.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: tnef
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tnef
  av: sudo av install brew:tnef
  brew: brew install tnef
  debian: sudo apt install tnef
  dnf: sudo dnf install tnef
  macports: sudo port install tnef
  nix: nix profile install nixpkgs#tnef
  ubuntu: sudo apt install tnef
  zypper: sudo zypper install tnef
provenance:
  formula: tnef
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
