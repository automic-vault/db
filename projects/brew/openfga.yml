id: brew:openfga
display-name: openfga
homepage: https://openfga.dev/
repo: https://github.com/openfga/openfga
docs: https://openfga.dev/
package-manager:
  brew: openfga
  nix: openfga
  scoop: main/openfga
package-manager-url: https://formulae.brew.sh/formula/openfga
version: 1.16.0
license: Apache-2.0
category: development
tags:
  - cli
description: High performance and flexible authorization/permission engine
source-archive: https://github.com/openfga/openfga/archive/refs/tags/v1.16.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: openfga
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:openfga
  brew: brew install openfga
  nix: nix profile install nixpkgs#openfga
  scoop: scoop install main/openfga
provenance:
  formula: openfga
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
