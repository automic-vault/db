id: brew:ffms2
display-name: ffms2
homepage: https://github.com/FFMS/ffms2
repo: https://github.com/FFMS/ffms2
docs: https://github.com/FFMS/ffms2
package-manager:
  apk: ffms2
  brew: ffms2
  debian: ffmsindex
  dnf: ffms2
  macports: ffms2
  pacman: ffms2
  ubuntu: ffmsindex
  zypper: ffmsindex
package-manager-url: https://formulae.brew.sh/formula/ffms2
version: 5.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Libav/ffmpeg based source library and Avisynth plugin
source-archive: https://github.com/FFMS/ffms2/archive/refs/tags/5.0.tar.gz
dependencies:
  - ffmpeg
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: ffmsindex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ffms2
  av: sudo av install brew:ffms2
  brew: brew install ffms2
  debian: sudo apt install ffmsindex
  dnf: sudo dnf install ffms2
  macports: sudo port install ffms2
  pacman: sudo pacman -S ffms2
  ubuntu: sudo apt install ffmsindex
  zypper: sudo zypper install ffmsindex
provenance:
  formula: ffms2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
