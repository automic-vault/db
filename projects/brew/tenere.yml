id: brew:tenere
display-name: tenere
homepage: https://github.com/pythops/tenere
repo: https://github.com/pythops/tenere
docs: https://github.com/pythops/tenere
package-manager:
  brew: tenere
  nix: tenere
package-manager-url: https://formulae.brew.sh/formula/tenere
version: 0.11.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: TUI interface for LLMs written in Rust
source-archive: https://github.com/pythops/tenere/archive/refs/tags/v0.11.3.tar.gz
dependencies:
  - libgit2
  - oniguruma
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tenere
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tenere
  brew: brew install tenere
  nix: nix profile install nixpkgs#tenere
provenance:
  formula: tenere
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
