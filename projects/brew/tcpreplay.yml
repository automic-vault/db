id: brew:tcpreplay
display-name: tcpreplay
homepage: https://tcpreplay.appneta.com/
repo: https://github.com/appneta/tcpreplay
docs: https://tcpreplay.appneta.com/
package-manager:
  apk: tcpreplay
  brew: tcpreplay
  debian: tcpreplay
  dnf: tcpreplay
  macports: tcpreplay
  nix: tcpreplay
  pacman: tcpreplay
  ubuntu: tcpreplay
  zypper: tcpreplay
package-manager-url: https://formulae.brew.sh/formula/tcpreplay
version: 4.5.2
license: BSD-2-Clause AND BSD-3-Clause AND BSD-4-Clause AND GPL-3.0-or-later AND ISC
category: development
tags:
  - cli
description: Replay saved tcpdump files at arbitrary speeds
source-archive: https://github.com/appneta/tcpreplay/releases/download/v4.5.2/tcpreplay-4.5.2.tar.gz
dependencies:
  - libdnet
build-dependencies:
  - autoconf
  - automake
  - libtool
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: tcpbridge
  - exposure: global executable
    kind: cli
    name: tcpcapinfo
  - exposure: global executable
    kind: cli
    name: tcpliveplay
  - exposure: global executable
    kind: cli
    name: tcpprep
  - exposure: global executable
    kind: cli
    name: tcpreplay
  - exposure: global executable
    kind: cli
    name: tcpreplay-edit
  - exposure: global executable
    kind: cli
    name: tcprewrite
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tcpreplay
  av: sudo av install brew:tcpreplay
  brew: brew install tcpreplay
  debian: sudo apt install tcpreplay
  dnf: sudo dnf install tcpreplay
  macports: sudo port install tcpreplay
  nix: nix profile install nixpkgs#tcpreplay
  pacman: sudo pacman -S tcpreplay
  ubuntu: sudo apt install tcpreplay
  zypper: sudo zypper install tcpreplay
provenance:
  formula: tcpreplay
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
