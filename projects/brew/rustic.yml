id: brew:rustic
display-name: rustic
homepage: https://rustic.cli.rs
repo: https://github.com/rustic-rs/rustic
docs: https://rustic.cli.rs
package-manager:
  apk: rustic
  brew: rustic
  macports: rustic
  nix: rustic
  pacman: rustic
  scoop: main/rustic
package-manager-url: https://formulae.brew.sh/formula/rustic
version: 0.11.2
license: Apache-2.0
category: security
tags:
  - cli
description: Fast, encrypted, and deduplicated backups powered by Rust
source-archive: https://github.com/rustic-rs/rustic/archive/refs/tags/v0.11.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rustic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rustic
  av: sudo av install brew:rustic
  brew: brew install rustic
  macports: sudo port install rustic
  nix: nix profile install nixpkgs#rustic
  pacman: sudo pacman -S rustic
  scoop: scoop install main/rustic
provenance:
  formula: rustic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
