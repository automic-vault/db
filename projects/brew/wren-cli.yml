id: brew:wren-cli
display-name: wren-cli
homepage: https://github.com/wren-lang/wren-cli
repo: https://github.com/wren-lang/wren-cli
docs: https://github.com/wren-lang/wren-cli
package-manager:
  brew: wren-cli
  macports: wren-cli
package-manager-url: https://formulae.brew.sh/formula/wren-cli
version: 0.4.0
license: MIT
category: development
tags:
  - cli
description: Simple REPL and CLI tool for running Wren scripts
source-archive: https://github.com/wren-lang/wren-cli/archive/refs/tags/0.4.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: wren_cli
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wren-cli
  brew: brew install wren-cli
  macports: sudo port install wren-cli
provenance:
  formula: wren-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
