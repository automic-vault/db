id: brew:rospo
display-name: rospo
homepage: https://github.com/ferama/rospo
repo: https://github.com/ferama/rospo
docs: https://github.com/ferama/rospo
package-manager:
  brew: rospo
  nix: rospo
package-manager-url: https://formulae.brew.sh/formula/rospo
version: 0.15.3
license: MIT
category: development
tags:
  - cli
description: Simple, reliable, persistent ssh tunnels with embedded ssh server
source-archive: https://github.com/ferama/rospo/archive/refs/tags/v0.15.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rospo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rospo
  brew: brew install rospo
  nix: nix profile install nixpkgs#rospo
provenance:
  formula: rospo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
