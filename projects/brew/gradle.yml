id: brew:gradle
display-name: gradle
homepage: https://www.gradle.org/
repo: https://services.gradle.org/distributions/gradle-9.5.1-all.zip
docs: https://www.gradle.org/
package-manager:
  apk: gradle
  brew: gradle
  chocolatey: gradle
  debian: gradle
  macports: gradle
  nix: gradle
  pacman: gradle
  scoop: main/gradle
  ubuntu: gradle
package-manager-url: https://formulae.brew.sh/formula/gradle
version: 9.5.1
license: Apache-2.0
category: development
tags:
  - cli
description: Open-source build automation tool based on the Groovy and Kotlin DSL
source-archive: https://services.gradle.org/distributions/gradle-9.5.1-all.zip
dependencies:
  - gradle-completion
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: gradle
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gradle
  av: sudo av install brew:gradle
  brew: brew install gradle
  chocolatey: choco install gradle
  debian: sudo apt install gradle
  macports: sudo port install gradle
  nix: nix profile install nixpkgs#gradle
  pacman: sudo pacman -S gradle
  scoop: scoop install main/gradle
  ubuntu: sudo apt install gradle
provenance:
  formula: gradle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
