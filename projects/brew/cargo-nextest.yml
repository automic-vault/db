id: brew:cargo-nextest
display-name: cargo-nextest
homepage: https://nexte.st
repo: https://github.com/nextest-rs/nextest
docs: https://nexte.st
package-manager:
  apk: cargo-nextest
  brew: cargo-nextest
  nix: cargo-nextest
  pacman: cargo-nextest
  winget: nextest.cargo-nextest
package-manager-url: https://formulae.brew.sh/formula/cargo-nextest
version: 0.9.137
license: Apache-2.0
category: development
tags:
  - cli
description: Next-generation test runner for Rust
source-archive: https://github.com/nextest-rs/nextest/archive/refs/tags/cargo-nextest-0.9.137.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-nextest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-nextest
  av: sudo av install brew:cargo-nextest
  brew: brew install cargo-nextest
  nix: nix profile install nixpkgs#cargo-nextest
  pacman: sudo pacman -S cargo-nextest
  winget: winget install --id nextest.cargo-nextest -e
provenance:
  formula: cargo-nextest
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
