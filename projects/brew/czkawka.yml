id: brew:czkawka
display-name: czkawka
homepage: https://github.com/qarmin/czkawka
repo: https://github.com/qarmin/czkawka
docs: https://github.com/qarmin/czkawka
package-manager:
  apk: czkawka
  brew: czkawka
  chocolatey: czkawka
  debian: czkawka-cli
  macports: czkawka
  nix: czkawka
  scoop: main/czkawka
  winget: qarmin.czkawka.cli
package-manager-url: https://formulae.brew.sh/formula/czkawka
version: 11.0.1
license: MIT AND CC-BY-4.0
category: development
tags:
  - cli
description: Duplicate file utility
source-archive: https://github.com/qarmin/czkawka/archive/refs/tags/11.0.1.tar.gz
dependencies:
  - adwaita-icon-theme
  - cairo
  - dav1d
  - ffmpeg
  - gdk-pixbuf
  - gettext
  - glib
  - graphene
  - gtk4
  - harfbuzz
  - libheif
  - librsvg
  - pango
  - pkgconf
  - webp-pixbuf-loader
build-dependencies:
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: czkawka_cli
  - exposure: global executable
    kind: cli
    name: czkawka_gui
  - exposure: global executable
    kind: cli
    name: krokiet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: czkawka_gui requires $XDG_DATA_DIRS to contain "$HOMEBREW_PREFIX/share".
  post-install-defined: true
install-lines:
  apk: sudo apk add czkawka
  av: sudo av install brew:czkawka
  brew: brew install czkawka
  chocolatey: choco install czkawka
  debian: sudo apt install czkawka-cli
  macports: sudo port install czkawka
  nix: nix profile install nixpkgs#czkawka
  scoop: scoop install main/czkawka
  winget: winget install --id qarmin.czkawka.cli -e
provenance:
  formula: czkawka
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
