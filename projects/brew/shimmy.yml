id: brew:shimmy
display-name: shimmy
homepage: https://github.com/Michael-A-Kuykendall/shimmy
repo: https://github.com/Michael-A-Kuykendall/shimmy
docs: https://github.com/Michael-A-Kuykendall/shimmy
package-manager:
  brew: shimmy
package-manager-url: https://formulae.brew.sh/formula/shimmy
version: 1.9.0
license: Apache-2.0
category: development
tags:
  - cli
description: Small local inference server with OpenAI-compatible GGUF endpoints
source-archive: https://github.com/Michael-A-Kuykendall/shimmy/archive/refs/tags/v1.9.0.tar.gz
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: create_realistic_safetensors
  - exposure: global executable
    kind: cli
    name: create_test_safetensors
  - exposure: global executable
    kind: cli
    name: shimmy
  - exposure: global executable
    kind: cli
    name: test_real_safetensors
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:shimmy
  brew: brew install shimmy
provenance:
  formula: shimmy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
