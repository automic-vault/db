id: brew:pipelight
display-name: pipelight
homepage: https://pipelight.dev
repo: https://github.com/pipelight/pipelight
docs: https://pipelight.dev
package-manager:
  brew: pipelight
  nix: pipelight
package-manager-url: https://formulae.brew.sh/formula/pipelight
version: 0.10.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: Self-hosted, lightweight CI/CD pipelines for small projects via CLI
source-archive: https://github.com/pipelight/pipelight/archive/refs/tags/v0.10.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: pipelight
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pipelight
  brew: brew install pipelight
  nix: nix profile install nixpkgs#pipelight
provenance:
  formula: pipelight
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
