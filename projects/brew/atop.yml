id: brew:atop
display-name: atop
homepage: https://www.atoptool.nl
repo: https://github.com/Atoptool/atop
docs: https://www.atoptool.nl
package-manager:
  apk: atop
  brew: atop
  debian: atop
  dnf: atop
  nix: atop
  pacman: atop
  ubuntu: atop
  zypper: atop
package-manager-url: https://formulae.brew.sh/formula/atop
version: 2.12.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Advanced system and process monitor for Linux using process events
source-archive: https://github.com/Atoptool/atop/archive/refs/tags/v2.12.1.tar.gz
dependencies:
  - glib
  - ncurses
  - zlib-ng-compat
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: atop
  - exposure: global executable
    kind: cli
    name: atop-2.12.1
  - exposure: global executable
    kind: cli
    name: atopacctd
  - exposure: global executable
    kind: cli
    name: atopcat
  - exposure: global executable
    kind: cli
    name: atopconvert
  - exposure: global executable
    kind: cli
    name: atopgpud
  - exposure: global executable
    kind: cli
    name: atophide
  - exposure: global executable
    kind: cli
    name: atopsar
  - exposure: global executable
    kind: cli
    name: atopsar-2.12.1
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add atop
  av: sudo av install brew:atop
  brew: brew install atop
  debian: sudo apt install atop
  dnf: sudo dnf install atop
  nix: nix profile install nixpkgs#atop
  pacman: sudo pacman -S atop
  ubuntu: sudo apt install atop
  zypper: sudo zypper install atop
provenance:
  formula: atop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
