id: brew:gphoto2
display-name: gphoto2
homepage: http://www.gphoto.org/
repo: https://downloads.sourceforge.net/project/gphoto/gphoto/2.5.32/gphoto2-2.5.32.tar.bz2
docs: http://www.gphoto.org/
package-manager:
  apk: gphoto2
  brew: gphoto2
  debian: gphoto2
  dnf: gphoto2
  macports: gphoto2
  nix: gphoto2
  pacman: gphoto2
  ubuntu: gphoto2
package-manager-url: https://formulae.brew.sh/formula/gphoto2
version: 2.5.32
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Command-line interface to libgphoto2
source-archive: https://downloads.sourceforge.net/project/gphoto/gphoto/2.5.32/gphoto2-2.5.32.tar.bz2
dependencies:
  - gettext
  - jpeg-turbo
  - libexif
  - libgphoto2
  - popt
  - readline
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gphoto2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gphoto2
  av: sudo av install brew:gphoto2
  brew: brew install gphoto2
  debian: sudo apt install gphoto2
  dnf: sudo dnf install gphoto2
  macports: sudo port install gphoto2
  nix: nix profile install nixpkgs#gphoto2
  pacman: sudo pacman -S gphoto2
  ubuntu: sudo apt install gphoto2
provenance:
  formula: gphoto2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
