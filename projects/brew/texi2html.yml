id: brew:texi2html
display-name: texi2html
homepage: https://www.nongnu.org/texi2html/
repo: https://download.savannah.gnu.org/releases/texi2html/texi2html-5.0.tar.gz
docs: https://www.nongnu.org/texi2html/
package-manager:
  brew: texi2html
  debian: texi2html
  dnf: texi2html
  macports: texi2html
  nix: texi2html
  pacman: texi2html
  ubuntu: texi2html
  zypper: texi2html
package-manager-url: https://formulae.brew.sh/formula/texi2html
version: 5.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Convert TeXinfo files to HTML
source-archive: https://download.savannah.gnu.org/releases/texi2html/texi2html-5.0.tar.gz
dependencies:
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: texi2html
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:texi2html
  brew: brew install texi2html
  debian: sudo apt install texi2html
  dnf: sudo dnf install texi2html
  macports: sudo port install texi2html
  nix: nix profile install nixpkgs#texi2html
  pacman: sudo pacman -S texi2html
  ubuntu: sudo apt install texi2html
  zypper: sudo zypper install texi2html
provenance:
  formula: texi2html
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
