id: brew:direvent
display-name: direvent
homepage: https://www.gnu.org.ua/software/direvent/direvent.html
repo: https://ftpmirror.gnu.org/gnu/direvent/direvent-5.4.tar.gz
docs: https://www.gnu.org.ua/software/direvent/direvent.html
package-manager:
  brew: direvent
  debian: direvent
  nix: direvent
  ubuntu: direvent
  zypper: direvent
package-manager-url: https://formulae.brew.sh/formula/direvent
version: 5.4
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Monitors events in the file system directories
source-archive: https://ftpmirror.gnu.org/gnu/direvent/direvent-5.4.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: direvent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:direvent
  brew: brew install direvent
  debian: sudo apt install direvent
  nix: nix profile install nixpkgs#direvent
  ubuntu: sudo apt install direvent
  zypper: sudo zypper install direvent
provenance:
  formula: direvent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
