id: brew:fish
display-name: fish
homepage: https://fishshell.com
repo: https://github.com/fish-shell/fish-shell
docs: https://fishshell.com
package-manager:
  apk: fish
  brew: fish
  debian: fish
  dnf: fish
  macports: fish
  nix: fish
  pacman: fish
  ubuntu: fish
  zypper: fish
package-manager-url: https://formulae.brew.sh/formula/fish
version: 4.7.1
license: GPL-2.0-only
category: development
tags:
  - cli
description: User-friendly command-line shell for UNIX-like operating systems
source-archive: https://github.com/fish-shell/fish-shell/releases/download/4.7.1/fish-4.7.1.tar.xz
dependencies:
  - pcre2
build-dependencies:
  - cmake
  - rust
  - sphinx-doc
executables:
  - exposure: global executable
    kind: cli
    name: fish
  - exposure: global executable
    kind: cli
    name: fish_indent
  - exposure: global executable
    kind: cli
    name: fish_key_reader
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add fish
  av: sudo av install brew:fish
  brew: brew install fish
  debian: sudo apt install fish
  dnf: sudo dnf install fish
  macports: sudo port install fish
  nix: nix profile install nixpkgs#fish
  pacman: sudo pacman -S fish
  ubuntu: sudo apt install fish
  zypper: sudo zypper install fish
provenance:
  formula: fish
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
