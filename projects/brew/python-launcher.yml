id: brew:python-launcher
display-name: python-launcher
homepage: https://github.com/brettcannon/python-launcher
repo: https://github.com/brettcannon/python-launcher
docs: https://github.com/brettcannon/python-launcher
package-manager:
  brew: python-launcher
  dnf: python-launcher
  nix: python-launcher
  winget: OleksisFraga.PythonLauncher
package-manager-url: https://formulae.brew.sh/formula/python-launcher
version: 1.0.1
license: MIT
category: development
tags:
  - cli
description: Launch your Python interpreter the lazy/smart way
source-archive: https://github.com/brettcannon/python-launcher/archive/refs/tags/v1.0.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:python-launcher
  brew: brew install python-launcher
  dnf: sudo dnf install python-launcher
  nix: nix profile install nixpkgs#python-launcher
  winget: winget install --id OleksisFraga.PythonLauncher -e
provenance:
  formula: python-launcher
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
