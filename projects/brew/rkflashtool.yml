id: brew:rkflashtool
display-name: rkflashtool
homepage: https://sourceforge.net/projects/rkflashtool/
repo: >
  https://downloads.sourceforge.net/project/rkflashtool/rkflashtool-6.1/rkflashtool-6.1-src.tar.bz2
docs: https://sourceforge.net/projects/rkflashtool/
package-manager:
  brew: rkflashtool
  debian: rkflashtool
  nix: rkflashtool
  ubuntu: rkflashtool
package-manager-url: https://formulae.brew.sh/formula/rkflashtool
version: 6.1
license: BSD-2-Clause
category: network
tags:
  - cli
description: Tools for flashing Rockchip devices
source-archive: >
  https://downloads.sourceforge.net/project/rkflashtool/rkflashtool-6.1/rkflashtool-6.1-src.tar.bz2
dependencies:
  - libusb
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rkcrc
  - exposure: global executable
    kind: cli
    name: rkflashtool
  - exposure: global executable
    kind: cli
    name: rkmisc
  - exposure: global executable
    kind: cli
    name: rkpad
  - exposure: global executable
    kind: cli
    name: rkparameters
  - exposure: global executable
    kind: cli
    name: rkparametersblock
  - exposure: global executable
    kind: cli
    name: rkunpack
  - exposure: global executable
    kind: cli
    name: rkunsign
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rkflashtool
  brew: brew install rkflashtool
  debian: sudo apt install rkflashtool
  nix: nix profile install nixpkgs#rkflashtool
  ubuntu: sudo apt install rkflashtool
provenance:
  formula: rkflashtool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
