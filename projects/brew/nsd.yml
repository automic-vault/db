id: brew:nsd
display-name: nsd
homepage: https://www.nlnetlabs.nl/projects/nsd/
repo: https://www.nlnetlabs.nl/downloads/nsd/nsd-4.14.2.tar.gz
docs: https://www.nlnetlabs.nl/projects/nsd/
package-manager:
  apk: nsd
  brew: nsd
  debian: nsd
  dnf: nsd
  macports: nsd
  nix: nsd
  pacman: nsd
  ubuntu: nsd
  zypper: nsd
package-manager-url: https://formulae.brew.sh/formula/nsd
version: 4.14.2
license: BSD-3-Clause
category: network
tags:
  - cli
description: Name server daemon
source-archive: https://www.nlnetlabs.nl/downloads/nsd/nsd-4.14.2.tar.gz
dependencies:
  - libevent
  - openssl@3
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: nsd
  - exposure: global executable
    kind: cli
    name: nsd-checkconf
  - exposure: global executable
    kind: cli
    name: nsd-checkzone
  - exposure: global executable
    kind: cli
    name: nsd-control
  - exposure: global executable
    kind: cli
    name: nsd-control-setup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nsd
  av: sudo av install brew:nsd
  brew: brew install nsd
  debian: sudo apt install nsd
  dnf: sudo dnf install nsd
  macports: sudo port install nsd
  nix: nix profile install nixpkgs#nsd
  pacman: sudo pacman -S nsd
  ubuntu: sudo apt install nsd
  zypper: sudo zypper install nsd
provenance:
  formula: nsd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
