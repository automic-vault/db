id: brew:ali
display-name: ali
homepage: https://github.com/nakabonne/ali
repo: https://github.com/nakabonne/ali
docs: https://github.com/nakabonne/ali
package-manager:
  apk: ali
  brew: ali
  macports: ali
  nix: ali
  pacman: ali
package-manager-url: https://formulae.brew.sh/formula/ali
version: 0.8.0
license: MIT
category: development
tags:
  - cli
description: Generate HTTP load and plot the results in real-time
source-archive: https://github.com/nakabonne/ali/archive/refs/tags/v0.8.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ali
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ali
  av: sudo av install brew:ali
  brew: brew install ali
  macports: sudo port install ali
  nix: nix profile install nixpkgs#ali
  pacman: sudo pacman -S ali
provenance:
  formula: ali
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
