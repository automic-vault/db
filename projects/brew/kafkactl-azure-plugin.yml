id: brew:kafkactl-azure-plugin
display-name: kafkactl-azure-plugin
homepage: https://deviceinsight.github.io/kafkactl/
repo: https://github.com/deviceinsight/kafkactl-plugins
docs: https://deviceinsight.github.io/kafkactl/
package-manager:
  brew: kafkactl-azure-plugin
  winget: deviceinsight.kafkactl-azure-plugin
package-manager-url: https://formulae.brew.sh/formula/kafkactl-azure-plugin
version: 1.3.1
license: Apache-2.0
category: cloud
tags:
  - cli
description: Azure Plugin for kafkactl
source-archive: https://github.com/deviceinsight/kafkactl-plugins/archive/refs/tags/v1.3.1.tar.gz
dependencies:
  - kafkactl
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kafkactl-azure-plugin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kafkactl-azure-plugin
  brew: brew install kafkactl-azure-plugin
  winget: winget install --id deviceinsight.kafkactl-azure-plugin -e
provenance:
  formula: kafkactl-azure-plugin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
