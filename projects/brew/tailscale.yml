id: brew:tailscale
display-name: tailscale
homepage: https://tailscale.com
repo: https://github.com/tailscale/tailscale
docs: https://tailscale.com
package-manager:
  apk: tailscale
  brew: tailscale
  chocolatey: tailscale
  dnf: tailscale
  macports: tailscale
  nix: tailscale
  pacman: tailscale
  scoop: extras/tailscale
  winget: Tailscale.Tailscale
  zypper: tailscale
package-manager-url: https://formulae.brew.sh/formula/tailscale
version: 1.98.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: Easiest, most secure way to use WireGuard and 2FA
source-archive: https://github.com/tailscale/tailscale.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tailscale
  - exposure: global executable
    kind: cli
    name: tailscaled
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add tailscale
  av: sudo av install brew:tailscale
  brew: brew install tailscale
  chocolatey: choco install tailscale
  dnf: sudo dnf install tailscale
  macports: sudo port install tailscale
  nix: nix profile install nixpkgs#tailscale
  pacman: sudo pacman -S tailscale
  scoop: scoop install extras/tailscale
  winget: winget install --id Tailscale.Tailscale -e
  zypper: sudo zypper install tailscale
provenance:
  formula: tailscale
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
