id: brew:keyutils
display-name: keyutils
homepage: https://git.kernel.org/pub/scm/linux/kernel/git/dhowells/keyutils.git
repo: >
  https://git.kernel.org/pub/scm/linux/kernel/git/dhowells/keyutils.git/snapshot/keyutils-1.6.3.tar.gz
docs: https://git.kernel.org/pub/scm/linux/kernel/git/dhowells/keyutils.git
package-manager:
  apk: keyutils
  brew: keyutils
  debian: keyutils
  dnf: keyutils
  nix: keyutils
  pacman: keyutils
  ubuntu: keyutils
  zypper: keyutils
package-manager-url: https://formulae.brew.sh/formula/keyutils
version: 1.6.3
license: GPL-2.0-or-later AND LGPL-2.0-or-later
category: development
tags:
  - cli
description: Linux key management utilities
source-archive: >
  https://git.kernel.org/pub/scm/linux/kernel/git/dhowells/keyutils.git/snapshot/keyutils-1.6.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: key.dns_resolver
  - exposure: global executable
    kind: cli
    name: keyctl
  - exposure: global executable
    kind: cli
    name: request-key
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add keyutils
  av: sudo av install brew:keyutils
  brew: brew install keyutils
  debian: sudo apt install keyutils
  dnf: sudo dnf install keyutils
  nix: nix profile install nixpkgs#keyutils
  pacman: sudo pacman -S keyutils
  ubuntu: sudo apt install keyutils
  zypper: sudo zypper install keyutils
provenance:
  formula: keyutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
