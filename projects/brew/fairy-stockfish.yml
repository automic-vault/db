id: brew:fairy-stockfish
display-name: fairy-stockfish
homepage: https://fairy-stockfish.github.io/
repo: https://github.com/fairy-stockfish/Fairy-Stockfish
docs: https://fairy-stockfish.github.io/
package-manager:
  brew: fairy-stockfish
  debian: fairy-stockfish
  ubuntu: fairy-stockfish
package-manager-url: https://formulae.brew.sh/formula/fairy-stockfish
version: 14.0.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Strong open source chess variant engine (with largeboards support)
source-archive: >
  https://github.com/fairy-stockfish/Fairy-Stockfish/archive/refs/tags/fairy_sf_14_0_1_xq.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: fairy-stockfish
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fairy-stockfish
  brew: brew install fairy-stockfish
  debian: sudo apt install fairy-stockfish
  ubuntu: sudo apt install fairy-stockfish
provenance:
  formula: fairy-stockfish
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
