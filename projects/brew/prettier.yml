id: brew:prettier
display-name: prettier
homepage: https://prettier.io/
repo: https://registry.npmjs.org/prettier/-/prettier-3.8.3.tgz
docs: https://prettier.io/
package-manager:
  apk: prettier
  brew: prettier
  nix: prettier
  pacman: prettier
package-manager-url: https://formulae.brew.sh/formula/prettier
version: 3.8.3
license: MIT
category: development
tags:
  - cli
  - json
  - yaml
description: Code formatter for JavaScript, CSS, JSON, GraphQL, Markdown, YAML
source-archive: https://registry.npmjs.org/prettier/-/prettier-3.8.3.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: prettier
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add prettier
  av: sudo av install brew:prettier
  brew: brew install prettier
  nix: nix profile install nixpkgs#prettier
  pacman: sudo pacman -S prettier
provenance:
  formula: prettier
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
