id: brew:werf
display-name: werf
homepage: https://werf.io/
repo: https://github.com/werf/werf
docs: https://werf.io/
package-manager:
  brew: werf
  nix: werf
  zypper: werf
package-manager-url: https://formulae.brew.sh/formula/werf
version: 2.68.2
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Consistent delivery tool for Kubernetes
source-archive: https://github.com/werf/werf/archive/refs/tags/v2.68.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: werf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:werf
  brew: brew install werf
  nix: nix profile install nixpkgs#werf
  zypper: sudo zypper install werf
provenance:
  formula: werf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
