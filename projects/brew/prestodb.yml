id: brew:prestodb
display-name: prestodb
homepage: https://prestodb.io
repo: >
  https://search.maven.org/remotecontent?filepath=com/facebook/presto/presto-server/0.297/presto-server-0.297.tar.gz
docs: https://prestodb.io
package-manager:
  brew: prestodb
  debian: presto
  ubuntu: presto
package-manager-url: https://formulae.brew.sh/formula/prestodb
version: 0.297
license: Apache-2.0
category: database
tags:
  - cli
description: Distributed SQL query engine for big data
source-archive: >
  https://search.maven.org/remotecontent?filepath=com/facebook/presto/presto-server/0.297/presto-server-0.297.tar.gz
dependencies:
  - openjdk@17
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: presto
  - exposure: global executable
    kind: cli
    name: presto-server
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Add connectors to $HOMEBREW_PREFIX/opt/prestodb/libexec/etc/catalog/. See:
    https://prestodb.io/docs/current/connector.html
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:prestodb
  brew: brew install prestodb
  debian: sudo apt install presto
  ubuntu: sudo apt install presto
provenance:
  formula: prestodb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
