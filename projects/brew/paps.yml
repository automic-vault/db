id: brew:paps
display-name: paps
homepage: https://github.com/dov/paps
repo: https://github.com/dov/paps
docs: https://github.com/dov/paps
package-manager:
  brew: paps
  debian: paps
  dnf: paps
  macports: paps
  nix: paps
  ubuntu: paps
  zypper: paps
package-manager-url: https://formulae.brew.sh/formula/paps
version: 0.8.0
license: LGPL-2.0-or-later
category: development
tags:
  - cli
description: Pango to PostScript converter
source-archive: https://github.com/dov/paps/archive/refs/tags/v0.8.0.tar.gz
dependencies:
  - cairo
  - fmt
  - gettext
  - glib
  - pango
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: paps
  - exposure: global executable
    kind: cli
    name: src-to-paps
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:paps
  brew: brew install paps
  debian: sudo apt install paps
  dnf: sudo dnf install paps
  macports: sudo port install paps
  nix: nix profile install nixpkgs#paps
  ubuntu: sudo apt install paps
  zypper: sudo zypper install paps
provenance:
  formula: paps
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
