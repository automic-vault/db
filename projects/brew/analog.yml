id: brew:analog
display-name: analog
homepage: https://www.c-amie.co.uk/software/analog/
repo: https://github.com/c-amie/analog-ce
docs: https://www.c-amie.co.uk/software/analog/
package-manager:
  brew: analog
  debian: analog
  macports: analog
  nix: analog
  ubuntu: analog
package-manager-url: https://formulae.brew.sh/formula/analog
version: 6.0.18
license: GPL-2.0-only
category: development
tags:
  - cli
description: Logfile analyzer
source-archive: https://github.com/c-amie/analog-ce/archive/refs/tags/6.0.18.tar.gz
dependencies:
  - gd
  - jpeg-turbo
  - libpng
  - minizip
  - pcre2
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: analog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:analog
  brew: brew install analog
  debian: sudo apt install analog
  macports: sudo port install analog
  nix: nix profile install nixpkgs#analog
  ubuntu: sudo apt install analog
provenance:
  formula: analog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
