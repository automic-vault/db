id: brew:cryptol
display-name: cryptol
homepage: https://galoisinc.github.io/cryptol/master/RefMan.html
repo: https://hackage.haskell.org/package/cryptol-3.5.0/cryptol-3.5.0.tar.gz
docs: https://galoisinc.github.io/cryptol/master/RefMan.html
package-manager:
  brew: cryptol
  pacman: cryptol
  ubuntu: cryptol
package-manager-url: https://formulae.brew.sh/formula/cryptol
version: 3.5.0
license: BSD-3-Clause
category: security
tags:
  - cli
description: Domain-specific language for specifying cryptographic algorithms
source-archive: https://hackage.haskell.org/package/cryptol-3.5.0/cryptol-3.5.0.tar.gz
dependencies:
  - gmp
  - z3
build-dependencies:
  - cabal-install
  - ghc@9.12
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: check-exercises
  - exposure: global executable
    kind: cli
    name: cryptol
  - exposure: global executable
    kind: cli
    name: cryptol-html
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cryptol
  brew: brew install cryptol
  pacman: sudo pacman -S cryptol
  ubuntu: sudo apt install cryptol
provenance:
  formula: cryptol
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
