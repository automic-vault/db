id: brew:atomist-cli
display-name: atomist-cli
homepage: https://github.com/atomist/cli
repo: https://registry.npmjs.org/@atomist/cli/-/cli-1.8.0.tgz
docs: https://github.com/atomist/cli
package-manager:
  brew: atomist-cli
package-manager-url: https://formulae.brew.sh/formula/atomist-cli
version: 1.8.0
license: Apache-2.0
category: development
tags:
  - cli
description: Unified command-line tool for interacting with Atomist services
source-archive: https://registry.npmjs.org/@atomist/cli/-/cli-1.8.0.tgz
dependencies:
  - macos-term-size
  - node
executables:
  - exposure: global executable
    kind: cli
    name: '@atomist'
  - exposure: global executable
    kind: cli
    name: atomist
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:atomist-cli
  brew: brew install atomist-cli
provenance:
  formula: atomist-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
