id: brew:nagios
display-name: nagios
homepage: https://www.nagios.org/
repo: https://github.com/NagiosEnterprises/nagioscore
docs: https://www.nagios.org/
package-manager:
  apk: nagios
  brew: nagios
  dnf: nagios
  macports: nagios
  nix: nagios
  zypper: nagios
package-manager-url: https://formulae.brew.sh/formula/nagios
version: 4.5.12
license: GPL-2.0-only
category: development
tags:
  - cli
description: Network monitoring and management system
source-archive: >
  https://github.com/NagiosEnterprises/nagioscore/releases/download/nagios-4.5.12/nagios-4.5.12.tar.gz
dependencies:
  - gd
  - jpeg-turbo
  - libpng
  - openssl@4
uses-from-macos:
  - unzip
executables:
  - exposure: global executable
    kind: cli
    name: archivejson.cgi
  - exposure: global executable
    kind: cli
    name: avail.cgi
  - exposure: global executable
    kind: cli
    name: cmd.cgi
  - exposure: global executable
    kind: cli
    name: config.cgi
  - exposure: global executable
    kind: cli
    name: extinfo.cgi
  - exposure: global executable
    kind: cli
    name: histogram.cgi
  - exposure: global executable
    kind: cli
    name: history.cgi
  - exposure: global executable
    kind: cli
    name: nagios
  - exposure: global executable
    kind: cli
    name: nagiostats
  - exposure: global executable
    kind: cli
    name: notifications.cgi
  - exposure: global executable
    kind: cli
    name: objectjson.cgi
  - exposure: global executable
    kind: cli
    name: outages.cgi
  - exposure: global executable
    kind: cli
    name: showlog.cgi
  - exposure: global executable
    kind: cli
    name: status.cgi
  - exposure: global executable
    kind: cli
    name: statusjson.cgi
  - exposure: global executable
    kind: cli
    name: statusmap.cgi
  - exposure: global executable
    kind: cli
    name: statuswml.cgi
  - exposure: global executable
    kind: cli
    name: statuswrl.cgi
  - exposure: global executable
    kind: cli
    name: summary.cgi
  - exposure: global executable
    kind: cli
    name: tac.cgi
  - exposure: global executable
    kind: cli
    name: trends.cgi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
  service: declared
install-lines:
  apk: sudo apk add nagios
  av: sudo av install brew:nagios
  brew: brew install nagios
  dnf: sudo dnf install nagios
  macports: sudo port install nagios
  nix: nix profile install nixpkgs#nagios
  zypper: sudo zypper install nagios
provenance:
  formula: nagios
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
