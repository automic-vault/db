id: brew:brew-php-switcher
display-name: brew-php-switcher
homepage: https://github.com/philcook/brew-php-switcher
repo: https://github.com/philcook/brew-php-switcher
docs: https://github.com/philcook/brew-php-switcher
package-manager:
  brew: brew-php-switcher
package-manager-url: https://formulae.brew.sh/formula/brew-php-switcher
version: 2.6
license: MIT
category: development
tags:
  - cli
description: Switch Apache / Valet / CLI configs between PHP versions
source-archive: https://github.com/philcook/brew-php-switcher/archive/refs/tags/v2.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: brew-php-switcher
  - exposure: global executable
    kind: cli
    name: phpswitch.sh
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:brew-php-switcher
  brew: brew install brew-php-switcher
provenance:
  formula: brew-php-switcher
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
