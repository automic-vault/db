id: brew:clipsafe
display-name: clipsafe
homepage: https://waxandwane.org/clipsafe.html
repo: https://waxandwane.org/download/clipsafe-1.1.tar.gz
docs: https://waxandwane.org/clipsafe.html
package-manager:
  brew: clipsafe
package-manager-url: https://formulae.brew.sh/formula/clipsafe
version: 1.1
license: GPL-2.0-or-later
category: security
tags:
