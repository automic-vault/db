id: brew:rogcat
display-name: rogcat
homepage: https://github.com/flxo/rogcat
repo: https://github.com/flxo/rogcat
docs: https://github.com/flxo/rogcat
package-manager:
  brew: rogcat
  nix: rogcat
package-manager-url: https://formulae.brew.sh/formula/rogcat
version: 0.5.0
license: MIT
category: development
tags:
  - cli
description: Adb logcat wrapper
source-archive: https://github.com/flxo/rogcat/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: rogcat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    At runtime, adb must be accessible from your PATH. You can install adb from Homebrew
    Cask: brew install --cask android-platform-tools
  post-install-defined: false
install-lines:
  av: sudo av install brew:rogcat
  brew: brew install rogcat
  nix: nix profile install nixpkgs#rogcat
provenance:
  formula: rogcat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
