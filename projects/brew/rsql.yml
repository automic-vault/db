id: brew:rsql
display-name: rsql
homepage: https://github.com/theseus-rs/rsql
repo: https://github.com/theseus-rs/rsql
docs: https://github.com/theseus-rs/rsql
package-manager:
  brew: rsql
package-manager-url: https://formulae.brew.sh/formula/rsql
version: 0.19.4
license: Apache-2.0 OR MIT
category: database
tags:
  - cli
description: CLI for relational databases and common data file formats
source-archive: https://github.com/theseus-rs/rsql/archive/refs/tags/v0.19.4.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rsql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rsql
  brew: brew install rsql
provenance:
  formula: rsql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
