id: brew:snowflake-cli
display-name: snowflake-cli
homepage: https://docs.snowflake.com/developer-guide/snowflake-cli/index
repo: >
  https://files.pythonhosted.org/packages/8c/4a/170986f7e78a4c88d7207928e0774cdbe7cf7aef1fad044d6c0909c1c5db/snowflake_cli-3.18.0.tar.gz
docs: https://docs.snowflake.com/developer-guide/snowflake-cli/index
package-manager:
  brew: snowflake-cli
  nix: snowflake-cli
  winget: Snowflake.SnowflakeCLI
package-manager-url: https://formulae.brew.sh/formula/snowflake-cli
version: 3.18.0
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for snowflake
source-archive: >
  https://files.pythonhosted.org/packages/8c/4a/170986f7e78a4c88d7207928e0774cdbe7cf7aef1fad044d6c0909c1c5db/snowflake_cli-3.18.0.tar.gz
dependencies:
  - certifi
  - cryptography
  - libyaml
  - pydantic
  - python@3.13
build-dependencies:
  - protobuf
executables:
  - exposure: global executable
    kind: cli
    name: snow
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:snowflake-cli
  brew: brew install snowflake-cli
  nix: nix profile install nixpkgs#snowflake-cli
  winget: winget install --id Snowflake.SnowflakeCLI -e
provenance:
  formula: snowflake-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
