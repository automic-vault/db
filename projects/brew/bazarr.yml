id: brew:bazarr
display-name: bazarr
homepage: https://www.bazarr.media
repo: https://github.com/morpheus65535/bazarr
docs: https://www.bazarr.media
package-manager:
  brew: bazarr
  nix: bazarr
  winget: Morpheus.Bazarr
package-manager-url: https://formulae.brew.sh/formula/bazarr
version: 1.5.6
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Companion to Sonarr and Radarr for managing and downloading subtitles
source-archive: https://github.com/morpheus65535/bazarr/releases/download/v1.5.6/bazarr.zip
dependencies:
  - ffmpeg
  - numpy
  - pillow
  - python@3.14
  - unar
build-dependencies:
  - node
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: bazarr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:bazarr
  brew: brew install bazarr
  nix: nix profile install nixpkgs#bazarr
  winget: winget install --id Morpheus.Bazarr -e
provenance:
  formula: bazarr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
