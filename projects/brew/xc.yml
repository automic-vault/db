id: brew:xc
display-name: xc
homepage: https://xcfile.dev/
repo: https://github.com/joerdav/xc
docs: https://xcfile.dev/
package-manager:
  brew: xc
  macports: xc
  nix: xc
  scoop: extras/xc
package-manager-url: https://formulae.brew.sh/formula/xc
version: 0.9.0
license: MIT
category: development
tags:
  - cli
description: Markdown defined task runner
source-archive: https://github.com/joerdav/xc/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: xc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xc
  brew: brew install xc
  macports: sudo port install xc
  nix: nix profile install nixpkgs#xc
  scoop: scoop install extras/xc
provenance:
  formula: xc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
