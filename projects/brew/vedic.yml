id: brew:vedic
display-name: vedic
homepage: https://vedic-lang.github.io/
repo: https://github.com/vedic-lang/vedic
docs: https://vedic-lang.github.io/
package-manager:
  brew: vedic
package-manager-url: https://formulae.brew.sh/formula/vedic
version: 2.0.6
license: MIT
category: development
tags:
  - cli
description: Simple Sanskrit programming language
source-archive: https://github.com/vedic-lang/vedic/archive/refs/tags/v2.0.6.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: vedic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vedic
  brew: brew install vedic
provenance:
  formula: vedic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
