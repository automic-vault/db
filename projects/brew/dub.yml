id: brew:dub
display-name: dub
homepage: https://code.dlang.org/getting_started
repo: https://github.com/dlang/dub
docs: https://code.dlang.org/getting_started
package-manager:
  apk: dub
  brew: dub
  debian: dub
  dnf: dub
  macports: dub
  nix: dub
  pacman: dub
  ubuntu: dub
  zypper: dub
package-manager-url: https://formulae.brew.sh/formula/dub
version: 1.41.0
license: MIT
category: development
tags:
  - cli
description: Build tool for D projects
source-archive: https://github.com/dlang/dub/archive/refs/tags/v1.41.0.tar.gz
dependencies:
  - pkgconf
build-dependencies:
  - ldc
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: dub
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dub
  av: sudo av install brew:dub
  brew: brew install dub
  debian: sudo apt install dub
  dnf: sudo dnf install dub
  macports: sudo port install dub
  nix: nix profile install nixpkgs#dub
  pacman: sudo pacman -S dub
  ubuntu: sudo apt install dub
  zypper: sudo zypper install dub
provenance:
  formula: dub
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
