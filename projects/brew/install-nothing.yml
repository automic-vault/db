id: brew:install-nothing
display-name: install-nothing
homepage: https://github.com/buyukakyuz/install-nothing
repo: https://github.com/buyukakyuz/install-nothing
docs: https://github.com/buyukakyuz/install-nothing
package-manager:
  brew: install-nothing
  nix: install-nothing
  winget: buyukakyuz.install-nothing
package-manager-url: https://formulae.brew.sh/formula/install-nothing
version: 0.5.0
license: MIT
category: development
tags:
  - cli
description: Simulates installing things but doesn't actually install anything
source-archive: https://github.com/buyukakyuz/install-nothing/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: install-nothing
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:install-nothing
  brew: brew install install-nothing
  nix: nix profile install nixpkgs#install-nothing
  winget: winget install --id buyukakyuz.install-nothing -e
provenance:
  formula: install-nothing
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
