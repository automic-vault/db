id: brew:ucloud
display-name: ucloud
homepage: https://www.ucloud.cn
repo: https://github.com/ucloud/ucloud-cli
docs: https://www.ucloud.cn
package-manager:
  brew: ucloud
package-manager-url: https://formulae.brew.sh/formula/ucloud
version: 0.3.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Official tool for managing UCloud services
source-archive: https://github.com/ucloud/ucloud-cli/archive/refs/tags/v0.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ucloud
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ucloud
  brew: brew install ucloud
provenance:
  formula: ucloud
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
