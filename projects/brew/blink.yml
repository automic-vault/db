id: brew:blink
display-name: blink
homepage: https://github.com/jart/blink
repo: https://github.com/jart/blink
docs: https://github.com/jart/blink
package-manager:
  brew: blink
  macports: blink
  nix: blink
  winget: AGProjects.Blink
package-manager-url: https://formulae.brew.sh/formula/blink
version: 1.1.0
license: ISC
category: development
tags:
  - cli
description: Tiniest x86-64-linux emulator
source-archive: https://github.com/jart/blink/archive/refs/tags/1.1.0.tar.gz
build-dependencies:
  - make
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: blink
  - exposure: global executable
    kind: cli
    name: blinkenlights
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:blink
  brew: brew install blink
  macports: sudo port install blink
  nix: nix profile install nixpkgs#blink
  winget: winget install --id AGProjects.Blink -e
provenance:
  formula: blink
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
