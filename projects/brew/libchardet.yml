id: brew:libchardet
display-name: libchardet
homepage: https://github.com/Joungkyun/libchardet
repo: https://github.com/Joungkyun/libchardet
docs: https://github.com/Joungkyun/libchardet
package-manager:
  brew: libchardet
  dnf: libchardet
  nix: libchardet
  pacman: libchardet
package-manager-url: https://formulae.brew.sh/formula/libchardet
version: 1.0.6
license: MPL-1.1 OR LGPL-2.1-only
category: development
tags:
  - cli
description: Mozilla's Universal Charset Detector C/C++ API
source-archive: https://github.com/Joungkyun/libchardet/archive/refs/tags/1.0.6.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: chardet-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libchardet
  brew: brew install libchardet
  dnf: sudo dnf install libchardet
  nix: nix profile install nixpkgs#libchardet
  pacman: sudo pacman -S libchardet
provenance:
  formula: libchardet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
