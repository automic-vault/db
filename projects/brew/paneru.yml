id: brew:paneru
display-name: paneru
homepage: https://github.com/karinushka/paneru
repo: https://github.com/karinushka/paneru
docs: https://github.com/karinushka/paneru
package-manager:
  brew: paneru
package-manager-url: https://formulae.brew.sh/formula/paneru
version: 0.4.2
license: MIT
category: development
tags:
