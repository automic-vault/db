description: Sliding, tiling window manager for MacOS
source-archive: https://github.com/karinushka/paneru/archive/refs/tags/v0.4.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: paneru
bottle:
