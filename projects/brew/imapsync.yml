id: brew:imapsync
display-name: imapsync
homepage: https://imapsync.lamiral.info/
repo: https://imapsync.lamiral.info/dist2/imapsync-2.314.tgz
docs: https://imapsync.lamiral.info/
package-manager:
  apk: imapsync
  brew: imapsync
  dnf: imapsync
  macports: imapsync
  nix: imapsync
  pacman: imapsync
package-manager-url: https://formulae.brew.sh/formula/imapsync
version: 2.314
license: NLPL
category: network
tags:
  - cli
description: Migrate or backup IMAP mail accounts
source-archive: https://imapsync.lamiral.info/dist2/imapsync-2.314.tgz
build-dependencies:
  - pod2man
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: imapsync
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add imapsync
  av: sudo av install brew:imapsync
  brew: brew install imapsync
  dnf: sudo dnf install imapsync
  macports: sudo port install imapsync
  nix: nix profile install nixpkgs#imapsync
  pacman: sudo pacman -S imapsync
provenance:
  formula: imapsync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
