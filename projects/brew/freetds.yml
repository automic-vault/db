id: brew:freetds
display-name: freetds
homepage: https://www.freetds.org/
repo: https://www.freetds.org/files/stable/freetds-1.5.18.tar.bz2
docs: https://www.freetds.org/
package-manager:
  apk: freetds
  brew: freetds
  dnf: freetds
  macports: freetds
  nix: freetds
  pacman: freetds
package-manager-url: https://formulae.brew.sh/formula/freetds
version: 1.5.18
license: GPL-2.0-or-later
category: database
tags:
  - cli
description: Libraries to talk to Microsoft SQL Server and Sybase databases
source-archive: https://www.freetds.org/files/stable/freetds-1.5.18.tar.bz2
dependencies:
  - openssl@3
  - unixodbc
build-dependencies:
  - pkgconf
uses-from-macos:
  - krb5
executables:
  - exposure: global executable
    kind: cli
    name: bsqldb
  - exposure: global executable
    kind: cli
    name: bsqlodbc
  - exposure: global executable
    kind: cli
    name: datacopy
  - exposure: global executable
    kind: cli
    name: defncopy
  - exposure: global executable
    kind: cli
    name: fisql
  - exposure: global executable
    kind: cli
    name: freebcp
  - exposure: global executable
    kind: cli
    name: osql
  - exposure: global executable
    kind: cli
    name: tdspool
  - exposure: global executable
    kind: cli
    name: tsql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add freetds
  av: sudo av install brew:freetds
  brew: brew install freetds
  dnf: sudo dnf install freetds
  macports: sudo port install freetds
  nix: nix profile install nixpkgs#freetds
  pacman: sudo pacman -S freetds
provenance:
  formula: freetds
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
