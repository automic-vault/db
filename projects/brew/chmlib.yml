id: brew:chmlib
display-name: chmlib
homepage: https://www.jedrea.com/chmlib/
repo: https://www.jedrea.com/chmlib/chmlib-0.40.tar.gz
docs: https://www.jedrea.com/chmlib/
package-manager:
  brew: chmlib
  dnf: chmlib
  macports: chmlib
  nix: chmlib
  pacman: chmlib
package-manager-url: https://formulae.brew.sh/formula/chmlib
version: 0.40
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Library for dealing with Microsoft ITSS/CHM files
source-archive: https://www.jedrea.com/chmlib/chmlib-0.40.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: chm_http
  - exposure: global executable
    kind: cli
    name: enum_chmLib
  - exposure: global executable
    kind: cli
    name: enumdir_chmLib
  - exposure: global executable
    kind: cli
    name: extract_chmLib
  - exposure: global executable
    kind: cli
    name: test_chmLib
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chmlib
  brew: brew install chmlib
  dnf: sudo dnf install chmlib
  macports: sudo port install chmlib
  nix: nix profile install nixpkgs#chmlib
  pacman: sudo pacman -S chmlib
provenance:
  formula: chmlib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
