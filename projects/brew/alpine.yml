id: brew:alpine
display-name: alpine
homepage: https://alpineapp.email
repo: https://alpineapp.email/alpine/release/src/alpine-2.26.tar.xz
docs: https://alpineapp.email
package-manager:
  apk: alpine
  brew: alpine
  debian: alpine
  dnf: alpine
  macports: alpine
  nix: alpine
  ubuntu: alpine
  zypper: alpine
package-manager-url: https://formulae.brew.sh/formula/alpine
version: 2.26
license: Apache-2.0
category: network
tags:
  - cli
description: News and email agent
source-archive: https://alpineapp.email/alpine/release/src/alpine-2.26.tar.xz
dependencies:
  - openssl@3
uses-from-macos:
  - krb5
  - ncurses
  - openldap
executables:
  - exposure: global executable
    kind: cli
    name: pico
  - exposure: global executable
    kind: cli
    name: pilot
  - exposure: global executable
    kind: cli
    name: rpdump
  - exposure: global executable
    kind: cli
    name: rpload
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add alpine
  av: sudo av install brew:alpine
  brew: brew install alpine
  debian: sudo apt install alpine
  dnf: sudo dnf install alpine
  macports: sudo port install alpine
  nix: nix profile install nixpkgs#alpine
  ubuntu: sudo apt install alpine
  zypper: sudo zypper install alpine
provenance:
  formula: alpine
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
