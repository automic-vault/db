id: brew:gabo
display-name: gabo
homepage: https://github.com/ashishb/gabo
repo: https://github.com/ashishb/gabo
docs: https://github.com/ashishb/gabo
package-manager:
  brew: gabo
package-manager-url: https://formulae.brew.sh/formula/gabo
version: 1.10.0
license: Apache-2.0
category: development
tags:
  - cli
description: Generates GitHub Actions boilerplate
source-archive: https://github.com/ashishb/gabo/archive/refs/tags/v1.10.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gabo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gabo
  brew: brew install gabo
provenance:
  formula: gabo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
