id: brew:swftools
display-name: swftools
homepage: https://github.com/swftools/swftools
repo: https://distfiles.macports.org/swftools/swftools-0.9.2.tar.gz
docs: https://github.com/swftools/swftools
package-manager:
  brew: swftools
  macports: swftools
  nix: swftools
package-manager-url: https://formulae.brew.sh/formula/swftools
version: 0.9.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: SWF manipulation and generation tools
source-archive: https://distfiles.macports.org/swftools/swftools-0.9.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: as3compile
  - exposure: global executable
    kind: cli
    name: font2swf
  - exposure: global executable
    kind: cli
    name: png2swf
  - exposure: global executable
    kind: cli
    name: swfbbox
  - exposure: global executable
    kind: cli
    name: swfc
  - exposure: global executable
    kind: cli
    name: swfcombine
  - exposure: global executable
    kind: cli
    name: swfdump
  - exposure: global executable
    kind: cli
    name: swfextract
  - exposure: global executable
    kind: cli
    name: swfrender
  - exposure: global executable
    kind: cli
    name: swfstrings
  - exposure: global executable
    kind: cli
    name: wav2swf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swftools
  brew: brew install swftools
  macports: sudo port install swftools
  nix: nix profile install nixpkgs#swftools
provenance:
  formula: swftools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
