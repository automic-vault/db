id: brew:kubectx
display-name: kubectx
homepage: https://github.com/ahmetb/kubectx
repo: https://github.com/ahmetb/kubectx
docs: https://github.com/ahmetb/kubectx
package-manager:
  apk: kubectx
  brew: kubectx
  chocolatey: kubectx
  debian: kubectx
  macports: kubectx
  nix: kubectx
  pacman: kubectx
  scoop: main/kubectx
  ubuntu: kubectx
  winget: ahmetb.kubectx
  zypper: kubectx
package-manager-url: https://formulae.brew.sh/formula/kubectx
version: 0.11.0
license: Apache-2.0
category: development
tags:
  - cli
description: Tool that can switch between kubectl contexts easily and create aliases
source-archive: https://github.com/ahmetb/kubectx/archive/refs/tags/v0.11.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubectl-ctx
  - exposure: global executable
    kind: cli
    name: kubectl-ns
  - exposure: global executable
    kind: cli
    name: kubectx
  - exposure: global executable
    kind: cli
    name: kubens
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kubectx
  av: sudo av install brew:kubectx
  brew: brew install kubectx
  chocolatey: choco install kubectx
  debian: sudo apt install kubectx
  macports: sudo port install kubectx
  nix: nix profile install nixpkgs#kubectx
  pacman: sudo pacman -S kubectx
  scoop: scoop install main/kubectx
  ubuntu: sudo apt install kubectx
  winget: winget install --id ahmetb.kubectx -e
  zypper: sudo zypper install kubectx
provenance:
  formula: kubectx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
