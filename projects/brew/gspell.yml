id: brew:gspell
display-name: gspell
homepage: https://gitlab.gnome.org/GNOME/gspell
repo: https://download.gnome.org/sources/gspell/1.14/gspell-1.14.3.tar.xz
docs: https://gitlab.gnome.org/GNOME/gspell
package-manager:
  apk: gspell
  brew: gspell
  dnf: gspell
  macports: gspell
  nix: gspell
  pacman: gspell
  zypper: gspell
package-manager-url: https://formulae.brew.sh/formula/gspell
version: 1.14.3
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Flexible API to implement spellchecking in GTK+ applications
source-archive: https://download.gnome.org/sources/gspell/1.14/gspell-1.14.3.tar.xz
dependencies:
  - at-spi2-core
  - cairo
  - enchant
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - harfbuzz
  - icu4c@78
  - pango
build-dependencies:
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: gspell-app1
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gspell
  av: sudo av install brew:gspell
  brew: brew install gspell
  dnf: sudo dnf install gspell
  macports: sudo port install gspell
  nix: nix profile install nixpkgs#gspell
  pacman: sudo pacman -S gspell
  zypper: sudo zypper install gspell
provenance:
  formula: gspell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
