id: brew:epubcheck
display-name: epubcheck
homepage: https://github.com/w3c/epubcheck
repo: https://github.com/w3c/epubcheck
docs: https://github.com/w3c/epubcheck
package-manager:
  brew: epubcheck
  debian: epubcheck
  macports: epubcheck
  nix: epubcheck
  pacman: epubcheck
  ubuntu: epubcheck
package-manager-url: https://formulae.brew.sh/formula/epubcheck
version: 5.3.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Validate EPUB files, version 2.0 and later
source-archive: https://github.com/w3c/epubcheck/releases/download/v5.3.0/epubcheck-5.3.0.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: epubcheck
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:epubcheck
  brew: brew install epubcheck
  debian: sudo apt install epubcheck
  macports: sudo port install epubcheck
  nix: nix profile install nixpkgs#epubcheck
  pacman: sudo pacman -S epubcheck
  ubuntu: sudo apt install epubcheck
provenance:
  formula: epubcheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
