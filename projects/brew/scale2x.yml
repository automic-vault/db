id: brew:scale2x
display-name: scale2x
homepage: https://www.scale2x.it/
repo: https://github.com/amadvance/scale2x
docs: https://www.scale2x.it/
package-manager:
  brew: scale2x
  macports: scale2x
package-manager-url: https://formulae.brew.sh/formula/scale2x
version: 4.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Real-time graphics effect
source-archive: https://github.com/amadvance/scale2x/releases/download/v4.0/scale2x-4.0.tar.gz
dependencies:
  - libpng
executables:
  - exposure: global executable
    kind: cli
    name: scalerx
  - exposure: global executable
    kind: cli
    name: scalex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:scale2x
  brew: brew install scale2x
  macports: sudo port install scale2x
provenance:
  formula: scale2x
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
