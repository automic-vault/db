id: brew:stu
display-name: stu
homepage: https://github.com/lusingander/stu
repo: https://github.com/lusingander/stu
docs: https://github.com/lusingander/stu
package-manager:
  apk: stu
  brew: stu
  nix: stu
package-manager-url: https://formulae.brew.sh/formula/stu
version: 0.7.6
license: MIT
category: cloud
tags:
  - aws
  - cli
description: TUI explorer application for Amazon S3 (AWS S3)
source-archive: https://github.com/lusingander/stu/archive/refs/tags/v0.7.6.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: stu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add stu
  av: sudo av install brew:stu
  brew: brew install stu
  nix: nix profile install nixpkgs#stu
provenance:
  formula: stu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
