id: brew:config-file-validator
display-name: config-file-validator
homepage: https://boeing.github.io/config-file-validator/
repo: https://github.com/Boeing/config-file-validator
docs: https://boeing.github.io/config-file-validator/
package-manager:
  brew: config-file-validator
  macports: config-file-validator
  scoop: main/config-file-validator
  winget: Boeing.config-file-validator
package-manager-url: https://formulae.brew.sh/formula/config-file-validator
version: 2.2.1
license: Apache-2.0
category: development
tags:
  - cli
description: CLI tool to validate different configuration file types
source-archive: https://github.com/Boeing/config-file-validator/archive/refs/tags/v2.2.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: validator
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:config-file-validator
  brew: brew install config-file-validator
  macports: sudo port install config-file-validator
  scoop: scoop install main/config-file-validator
  winget: winget install --id Boeing.config-file-validator -e
provenance:
  formula: config-file-validator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
