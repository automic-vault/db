id: brew:pivit
display-name: pivit
homepage: https://github.com/cashapp/pivit
repo: https://github.com/cashapp/pivit
docs: https://github.com/cashapp/pivit
package-manager:
  brew: pivit
package-manager-url: https://formulae.brew.sh/formula/pivit
version: 0.9.3
license: MIT
category: development
tags:
  - cli
description: Sign and verify data using hardware (Yubikey) backed x509 certificates (PIV)
source-archive: https://github.com/cashapp/pivit/archive/refs/tags/v0.9.3.tar.gz
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pivit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pivit
  brew: brew install pivit
provenance:
  formula: pivit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
