id: brew:ytt
display-name: ytt
homepage: https://carvel.dev/ytt/
repo: https://github.com/carvel-dev/ytt
docs: https://carvel.dev/ytt/
package-manager:
  apk: ytt
  brew: ytt
  macports: ytt
  nix: ytt
  scoop: main/ytt
  winget: Carvel.ytt
package-manager-url: https://formulae.brew.sh/formula/ytt
version: 0.55.0
license: Apache-2.0
category: development
tags:
  - cli
  - yaml
description: YAML templating tool that works on YAML structure instead of text
source-archive: https://github.com/carvel-dev/ytt/archive/refs/tags/v0.55.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ytt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ytt
  av: sudo av install brew:ytt
  brew: brew install ytt
  macports: sudo port install ytt
  nix: nix profile install nixpkgs#ytt
  scoop: scoop install main/ytt
  winget: winget install --id Carvel.ytt -e
provenance:
  formula: ytt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
