id: brew:sagittarius-scheme
display-name: sagittarius-scheme
homepage: https://github.com/ktakashi/sagittarius-scheme
repo: https://github.com/ktakashi/sagittarius-scheme
docs: https://github.com/ktakashi/sagittarius-scheme
package-manager:
  brew: sagittarius-scheme
  debian: sash
  nix: sagittarius-scheme
  ubuntu: sash
package-manager-url: https://formulae.brew.sh/formula/sagittarius-scheme
version: 0.9.14
license: BSD-2-Clause
category: development
tags:
  - cli
description: Free Scheme implementation supporting R6RS and R7RS
source-archive: >
  https://github.com/ktakashi/sagittarius-scheme/releases/download/v0.9.14/sagittarius-0.9.14.tar.gz
dependencies:
  - bdw-gc
  - openssl@3
  - unixodbc
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: compile-r7rs
  - exposure: global executable
    kind: cli
    name: compile-sagittarius
  - exposure: global executable
    kind: cli
    name: sagittarius
  - exposure: global executable
    kind: cli
    name: sagittarius-config
  - exposure: global executable
    kind: cli
    name: sagittarius-package
  - exposure: global executable
    kind: cli
    name: sash
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sagittarius-scheme
  brew: brew install sagittarius-scheme
  debian: sudo apt install sash
  nix: nix profile install nixpkgs#sagittarius-scheme
  ubuntu: sudo apt install sash
provenance:
  formula: sagittarius-scheme
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
