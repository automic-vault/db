id: brew:vespa-cli
display-name: vespa-cli
homepage: https://vespa.ai
repo: https://github.com/vespa-engine/vespa
docs: https://vespa.ai
package-manager:
  brew: vespa-cli
  nix: vespa-cli
package-manager-url: https://formulae.brew.sh/formula/vespa-cli
version: 8.694.53
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool for Vespa.ai
source-archive: https://github.com/vespa-engine/vespa/archive/refs/tags/v8.694.53.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vespa
  - exposure: global executable
    kind: cli
    name: vespa-wrapper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vespa-cli
  brew: brew install vespa-cli
  nix: nix profile install nixpkgs#vespa-cli
provenance:
  formula: vespa-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
