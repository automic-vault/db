id: brew:libiptcdata
display-name: libiptcdata
homepage: https://libiptcdata.sourceforge.net/
repo: https://github.com/ianw/libiptcdata
docs: https://libiptcdata.sourceforge.net/
package-manager:
  apk: libiptcdata
  brew: libiptcdata
  dnf: libiptcdata
  macports: libiptcdata
  nix: libiptcdata
  pacman: libiptcdata
  zypper: libiptcdata
package-manager-url: https://formulae.brew.sh/formula/libiptcdata
version: 1.0.5
license: LGPL-2.0-only
category: development
tags:
  - cli
description: Virtual package provided by libiptcdata0
source-archive: >
  https://github.com/ianw/libiptcdata/releases/download/release_1_0_5/libiptcdata-1.0.5.tar.gz
dependencies:
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: iptc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libiptcdata
  av: sudo av install brew:libiptcdata
  brew: brew install libiptcdata
  dnf: sudo dnf install libiptcdata
  macports: sudo port install libiptcdata
  nix: nix profile install nixpkgs#libiptcdata
  pacman: sudo pacman -S libiptcdata
  zypper: sudo zypper install libiptcdata
provenance:
  formula: libiptcdata
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
