id: brew:tree-sitter-cli
display-name: tree-sitter-cli
homepage: https://tree-sitter.github.io
repo: https://github.com/tree-sitter/tree-sitter
docs: https://tree-sitter.github.io
package-manager:
  apk: tree-sitter-cli
  brew: tree-sitter-cli
  chocolatey: tree-sitter
  debian: tree-sitter-cli
  dnf: tree-sitter-cli
  macports: tree-sitter
  nix: tree-sitter
  pacman: tree-sitter-cli
  scoop: main/tree-sitter
  ubuntu: tree-sitter-cli
  winget: tree-sitter.tree-sitter-cli
  zypper: tree-sitter
package-manager-url: https://formulae.brew.sh/formula/tree-sitter-cli
version: 0.26.9
license: MIT
category: development
tags:
  - cli
description: Parser generator tool
source-archive: https://github.com/tree-sitter/tree-sitter/archive/refs/tags/v0.26.9.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tree-sitter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tree-sitter-cli
  av: sudo av install brew:tree-sitter-cli
  brew: brew install tree-sitter-cli
  chocolatey: choco install tree-sitter
  debian: sudo apt install tree-sitter-cli
  dnf: sudo dnf install tree-sitter-cli
  macports: sudo port install tree-sitter
  nix: nix profile install nixpkgs#tree-sitter
  pacman: sudo pacman -S tree-sitter-cli
  scoop: scoop install main/tree-sitter
  ubuntu: sudo apt install tree-sitter-cli
  winget: winget install --id tree-sitter.tree-sitter-cli -e
  zypper: sudo zypper install tree-sitter
provenance:
  formula: tree-sitter-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
