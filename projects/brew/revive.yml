id: brew:revive
display-name: revive
homepage: https://revive.run
repo: https://github.com/mgechev/revive
docs: https://revive.run
package-manager:
  brew: revive
  macports: revive
  nix: revive
  pacman: revive
package-manager-url: https://formulae.brew.sh/formula/revive
version: 1.15.0
license: MIT
category: development
tags:
  - cli
description: Fast, configurable, extensible, flexible, and beautiful linter for Go
source-archive: https://github.com/mgechev/revive.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: revive
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:revive
  brew: brew install revive
  macports: sudo port install revive
  nix: nix profile install nixpkgs#revive
  pacman: sudo pacman -S revive
provenance:
  formula: revive
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
