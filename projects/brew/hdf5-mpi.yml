id: brew:hdf5-mpi
display-name: hdf5-mpi
homepage: https://www.hdfgroup.org/solutions/hdf5/
repo: https://github.com/HDFGroup/hdf5
docs: https://www.hdfgroup.org/solutions/hdf5/
package-manager:
  brew: hdf5-mpi
  nix: hdf5-mpi
package-manager-url: https://formulae.brew.sh/formula/hdf5-mpi
version: 2.1.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: File format designed to store large amounts of data
source-archive: https://github.com/HDFGroup/hdf5/releases/download/2.1.1/hdf5-2.1.1.tar.gz
dependencies:
  - gcc
  - libaec
  - open-mpi
  - pkgconf
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: h5pcc
  - exposure: global executable
    kind: cli
    name: h5perf
  - exposure: global executable
    kind: cli
    name: h5pfc
  - exposure: global executable
    kind: cli
    name: ph5diff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hdf5-mpi
  brew: brew install hdf5-mpi
  nix: nix profile install nixpkgs#hdf5-mpi
provenance:
  formula: hdf5-mpi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
