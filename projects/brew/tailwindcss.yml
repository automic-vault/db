id: brew:tailwindcss
display-name: tailwindcss
homepage: https://tailwindcss.com
repo: https://registry.npmjs.org/@tailwindcss/cli/-/cli-4.3.0.tgz
docs: https://tailwindcss.com
package-manager:
  brew: tailwindcss
  nix: tailwindcss
  scoop: main/tailwindcss
package-manager-url: https://formulae.brew.sh/formula/tailwindcss
version: 4.3.0
license: MIT
category: network
tags:
  - cli
description: Utility-first CSS framework
source-archive: https://registry.npmjs.org/@tailwindcss/cli/-/cli-4.3.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: tailwindcss
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tailwindcss
  brew: brew install tailwindcss
  nix: nix profile install nixpkgs#tailwindcss
  scoop: scoop install main/tailwindcss
provenance:
  formula: tailwindcss
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
