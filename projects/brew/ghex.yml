id: brew:ghex
display-name: ghex
homepage: https://wiki.gnome.org/Apps/Ghex
repo: https://download.gnome.org/sources/ghex/50/ghex-50.1.tar.xz
docs: https://wiki.gnome.org/Apps/Ghex
package-manager:
  apk: ghex
  brew: ghex
  debian: ghex
  dnf: ghex
  macports: ghex
  nix: ghex
  pacman: ghex
  ubuntu: ghex
  zypper: ghex
package-manager-url: https://formulae.brew.sh/formula/ghex
version: 50.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: GNOME hex editor
source-archive: https://download.gnome.org/sources/ghex/50/ghex-50.1.tar.xz
dependencies:
  - cairo
  - gettext
  - glib
  - gtk4
  - hicolor-icon-theme
  - libadwaita
  - pango
build-dependencies:
  - desktop-file-utils
  - gettext
  - itstool
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ghex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add ghex
  av: sudo av install brew:ghex
  brew: brew install ghex
  debian: sudo apt install ghex
  dnf: sudo dnf install ghex
  macports: sudo port install ghex
  nix: nix profile install nixpkgs#ghex
  pacman: sudo pacman -S ghex
  ubuntu: sudo apt install ghex
  zypper: sudo zypper install ghex
provenance:
  formula: ghex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
