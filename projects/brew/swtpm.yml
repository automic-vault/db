id: brew:swtpm
display-name: swtpm
homepage: https://github.com/stefanberger/swtpm
repo: https://github.com/stefanberger/swtpm
docs: https://github.com/stefanberger/swtpm
package-manager:
  apk: swtpm
  brew: swtpm
  debian: swtpm
  dnf: swtpm
  nix: swtpm
  pacman: swtpm
  ubuntu: swtpm
  zypper: swtpm
package-manager-url: https://formulae.brew.sh/formula/swtpm
version: 0.10.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Software TPM Emulator based on libtpms
source-archive: https://github.com/stefanberger/swtpm/archive/refs/tags/v0.10.1.tar.gz
dependencies:
  - gettext
  - glib
  - gmp
  - json-glib
  - libtasn1
  - libtpms
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - gawk
  - libtool
  - pkgconf
  - socat
uses-from-macos:
  - expect
executables:
  - exposure: global executable
    kind: cli
    name: swtpm
  - exposure: global executable
    kind: cli
    name: swtpm_bios
  - exposure: global executable
    kind: cli
    name: swtpm_cert
  - exposure: global executable
    kind: cli
    name: swtpm_ioctl
  - exposure: global executable
    kind: cli
    name: swtpm_localca
  - exposure: global executable
    kind: cli
    name: swtpm_setup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add swtpm
  av: sudo av install brew:swtpm
  brew: brew install swtpm
  debian: sudo apt install swtpm
  dnf: sudo dnf install swtpm
  nix: nix profile install nixpkgs#swtpm
  pacman: sudo pacman -S swtpm
  ubuntu: sudo apt install swtpm
  zypper: sudo zypper install swtpm
provenance:
  formula: swtpm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
