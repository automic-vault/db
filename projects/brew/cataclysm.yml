id: brew:cataclysm
display-name: cataclysm
homepage: https://github.com/CleverRaven/Cataclysm-DDA
repo: https://github.com/CleverRaven/Cataclysm-DDA
docs: https://github.com/CleverRaven/Cataclysm-DDA
package-manager:
  brew: cataclysm
package-manager-url: https://formulae.brew.sh/formula/cataclysm
version: 0.H
license: CC-BY-SA-3.0
category: development
tags:
  - cli
description: Fork/variant of Cataclysm Roguelike
source-archive: https://github.com/CleverRaven/Cataclysm-DDA/archive/refs/tags/0.H-RELEASE.tar.gz
dependencies:
  - gettext
  - libogg
  - libvorbis
  - sdl2
  - sdl2_image
  - sdl2_mixer
  - sdl2_ttf
build-dependencies:
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cataclysm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cataclysm
  brew: brew install cataclysm
provenance:
  formula: cataclysm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
