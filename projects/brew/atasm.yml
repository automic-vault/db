id: brew:atasm
display-name: atasm
homepage: https://sourceforge.net/projects/atasm/
repo: https://github.com/CycoPH/atasm
docs: https://sourceforge.net/projects/atasm/
package-manager:
  brew: atasm
  dnf: atasm
  nix: atasm
package-manager-url: https://formulae.brew.sh/formula/atasm
version: 1.30
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Atari MAC/65 compatible assembler for Unix
source-archive: https://github.com/CycoPH/atasm/archive/refs/tags/V1.30.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: atasm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:atasm
  brew: brew install atasm
  dnf: sudo dnf install atasm
  nix: nix profile install nixpkgs#atasm
provenance:
  formula: atasm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
