id: brew:operator-sdk
display-name: operator-sdk
homepage: https://sdk.operatorframework.io/
repo: https://github.com/operator-framework/operator-sdk
docs: https://sdk.operatorframework.io/
package-manager:
  brew: operator-sdk
  macports: operator-sdk
  nix: operator-sdk
  pacman: operator-sdk
  zypper: operator-sdk
package-manager-url: https://formulae.brew.sh/formula/operator-sdk
version: 1.42.2
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: SDK for building Kubernetes applications
source-archive: https://github.com/operator-framework/operator-sdk.git
dependencies:
  - go
  - gpgme
  - libassuan
  - libgpg-error
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: helm-operator
  - exposure: global executable
    kind: cli
    name: operator-sdk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:operator-sdk
  brew: brew install operator-sdk
  macports: sudo port install operator-sdk
  nix: nix profile install nixpkgs#operator-sdk
  pacman: sudo pacman -S operator-sdk
  zypper: sudo zypper install operator-sdk
provenance:
  formula: operator-sdk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
