id: brew:ltex-ls
display-name: ltex-ls
homepage: https://valentjn.github.io/ltex/
repo: https://github.com/valentjn/ltex-ls
docs: https://valentjn.github.io/ltex/
package-manager:
  brew: ltex-ls
  macports: ltex-ls
  nix: ltex-ls
package-manager-url: https://formulae.brew.sh/formula/ltex-ls
version: 16.0.0
license: MPL-2.0
category: development
tags:
  - cli
description: LSP for LanguageTool with support for Latex, Markdown and Others
source-archive: https://github.com/valentjn/ltex-ls/archive/refs/tags/16.0.0.tar.gz
dependencies:
  - openjdk@21
build-dependencies:
  - maven
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: ltex-cli
  - exposure: global executable
    kind: cli
    name: ltex-ls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ltex-ls
  brew: brew install ltex-ls
  macports: sudo port install ltex-ls
  nix: nix profile install nixpkgs#ltex-ls
provenance:
  formula: ltex-ls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
