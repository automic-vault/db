id: brew:man2html
display-name: man2html
homepage: https://savannah.nongnu.org/projects/man2html/
repo: https://www.mhonarc.org/release/misc/man2html3.0.1.tar.gz
docs: https://savannah.nongnu.org/projects/man2html/
package-manager:
