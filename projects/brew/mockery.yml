id: brew:mockery
display-name: mockery
homepage: https://github.com/vektra/mockery
repo: https://github.com/vektra/mockery
docs: https://github.com/vektra/mockery
package-manager:
  brew: mockery
  debian: mockery
  macports: mockery
  scoop: main/mockery
  ubuntu: mockery
  zypper: mockery
package-manager-url: https://formulae.brew.sh/formula/mockery
version: 3.7.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Mock code autogenerator for Golang
source-archive: https://github.com/vektra/mockery/archive/refs/tags/v3.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mockery
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mockery
  brew: brew install mockery
  debian: sudo apt install mockery
  macports: sudo port install mockery
  scoop: scoop install main/mockery
  ubuntu: sudo apt install mockery
  zypper: sudo zypper install mockery
provenance:
  formula: mockery
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
