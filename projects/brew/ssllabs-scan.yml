id: brew:ssllabs-scan
display-name: ssllabs-scan
homepage: https://www.ssllabs.com/projects/ssllabs-apis/
repo: https://github.com/ssllabs/ssllabs-scan
docs: https://www.ssllabs.com/projects/ssllabs-apis/
package-manager:
  brew: ssllabs-scan
package-manager-url: https://formulae.brew.sh/formula/ssllabs-scan
version: 1.5.0
license: Apache-2.0
category: security
tags:
  - cli
description: This tool is a command-line client for the SSL Labs APIs
source-archive: https://github.com/ssllabs/ssllabs-scan/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ssllabs-scan
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    By installing this package you agree to the Terms and Conditions defined by Qualys.
    You can find the terms and conditions at this link:
    https://www.ssllabs.com/about/terms.html If you do not agree with those you should
    uninstall the formula.
  post-install-defined: false
install-lines:
  av: sudo av install brew:ssllabs-scan
  brew: brew install ssllabs-scan
provenance:
  formula: ssllabs-scan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
