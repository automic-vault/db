id: brew:openapi-generator
display-name: openapi-generator
homepage: https://openapi-generator.tech/
repo: >
  https://search.maven.org/remotecontent?filepath=org/openapitools/openapi-generator-cli/7.22.0/openapi-generator-cli-7.22.0.jar
docs: https://openapi-generator.tech/
package-manager:
  brew: openapi-generator
  pacman: openapi-generator
package-manager-url: https://formulae.brew.sh/formula/openapi-generator
version: 7.22.0
license: Apache-2.0
category: network
tags:
  - cli
description: Generate clients, server & docs from an OpenAPI spec (v2, v3)
source-archive: >
  https://search.maven.org/remotecontent?filepath=org/openapitools/openapi-generator-cli/7.22.0/openapi-generator-cli-7.22.0.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: openapi-generator
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:openapi-generator
  brew: brew install openapi-generator
  pacman: sudo pacman -S openapi-generator
provenance:
  formula: openapi-generator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
