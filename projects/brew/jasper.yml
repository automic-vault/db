id: brew:jasper
display-name: jasper
homepage: https://ece.engr.uvic.ca/~frodo/jasper/
repo: https://github.com/jasper-software/jasper
docs: https://ece.engr.uvic.ca/~frodo/jasper/
package-manager:
  apk: jasper
  brew: jasper
  dnf: jasper
  macports: jasper
  nix: jasper
  pacman: jasper
  scoop: extras/jasper
  ubuntu: jasper
  winget: jasperapp.jasper
  zypper: jasper
package-manager-url: https://formulae.brew.sh/formula/jasper
version: 4.2.9
license: JasPer-2.0
category: development
tags:
  - cli
description: Library for manipulating JPEG-2000 images
source-archive: >
  https://github.com/jasper-software/jasper/releases/download/version-4.2.9/jasper-4.2.9.tar.gz
dependencies:
  - jpeg-turbo
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: imgcmp
  - exposure: global executable
    kind: cli
    name: imginfo
  - exposure: global executable
    kind: cli
    name: jasper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jasper
  av: sudo av install brew:jasper
  brew: brew install jasper
  dnf: sudo dnf install jasper
  macports: sudo port install jasper
  nix: nix profile install nixpkgs#jasper
  pacman: sudo pacman -S jasper
  scoop: scoop install extras/jasper
  ubuntu: sudo apt install jasper
  winget: winget install --id jasperapp.jasper -e
  zypper: sudo zypper install jasper
provenance:
  formula: jasper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
