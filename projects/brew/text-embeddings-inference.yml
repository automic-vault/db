id: brew:text-embeddings-inference
display-name: text-embeddings-inference
homepage: https://huggingface.co/docs/text-embeddings-inference/quick_tour
repo: https://github.com/huggingface/text-embeddings-inference
docs: https://huggingface.co/docs/text-embeddings-inference/quick_tour
package-manager:
  brew: text-embeddings-inference
package-manager-url: https://formulae.brew.sh/formula/text-embeddings-inference
version: 1.9.3
license: Apache-2.0
category: development
tags:
  - cli
description: Blazing fast inference solution for text embeddings models
source-archive: https://github.com/huggingface/text-embeddings-inference/archive/refs/tags/v1.9.3.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: text-embeddings-router
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:text-embeddings-inference
  brew: brew install text-embeddings-inference
provenance:
  formula: text-embeddings-inference
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
