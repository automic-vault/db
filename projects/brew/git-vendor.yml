id: brew:git-vendor
display-name: git-vendor
homepage: https://brettlangdon.github.io/git-vendor
repo: https://github.com/brettlangdon/git-vendor
docs: https://brettlangdon.github.io/git-vendor
package-manager:
  brew: git-vendor
  nix: git-vendor
package-manager-url: https://formulae.brew.sh/formula/git-vendor
version: 1.3.0
license: MIT
category: development
tags:
  - cli
  - git
description: Command for managing git vendored dependencies
source-archive: https://github.com/brettlangdon/git-vendor/archive/refs/tags/v1.3.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: git-vendor
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-vendor
  brew: brew install git-vendor
  nix: nix profile install nixpkgs#git-vendor
provenance:
  formula: git-vendor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
