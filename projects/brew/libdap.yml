id: brew:libdap
display-name: libdap
homepage: https://www.opendap.org/
repo: https://www.opendap.org/pub/source/libdap-3.21.1.tar.gz
docs: https://www.opendap.org/
package-manager:
  brew: libdap
  dnf: libdap
  macports: libdap
package-manager-url: https://formulae.brew.sh/formula/libdap
version: 3.21.1
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Framework for scientific data networking
source-archive: https://www.opendap.org/pub/source/libdap-3.21.1.tar.gz
dependencies:
  - libxml2
  - openssl@3
build-dependencies:
  - bison
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: dap-config
  - exposure: global executable
    kind: cli
    name: dap-config-pkgconfig
  - exposure: global executable
    kind: cli
    name: getdap
  - exposure: global executable
    kind: cli
    name: getdap4
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libdap
  brew: brew install libdap
  dnf: sudo dnf install libdap
  macports: sudo port install libdap
provenance:
  formula: libdap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
