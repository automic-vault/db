id: brew:ike-scan
display-name: ike-scan
homepage: https://github.com/royhills/ike-scan
repo: https://github.com/royhills/ike-scan
docs: https://github.com/royhills/ike-scan
package-manager:
  brew: ike-scan
  debian: ike-scan
  macports: ike-scan
  nix: ike-scan
  ubuntu: ike-scan
package-manager-url: https://formulae.brew.sh/formula/ike-scan
version: 1.9.5
license: GPL-3.0-or-later WITH openvpn-openssl-exception
category: development
tags:
  - cli
description: Discover and fingerprint IKE hosts
source-archive: https://github.com/royhills/ike-scan/archive/refs/tags/1.9.5.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: ike-scan
  - exposure: global executable
    kind: cli
    name: psk-crack
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ike-scan
  brew: brew install ike-scan
  debian: sudo apt install ike-scan
  macports: sudo port install ike-scan
  nix: nix profile install nixpkgs#ike-scan
  ubuntu: sudo apt install ike-scan
provenance:
  formula: ike-scan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
