id: brew:dovi_tool
display-name: dovi_tool
homepage: https://github.com/quietvoid/dovi_tool/
repo: https://github.com/quietvoid/dovi_tool
docs: https://github.com/quietvoid/dovi_tool/
package-manager:
  apk: dovi-tool
  brew: dovi_tool
  nix: dovi-tool
  pacman: dovi-tool
  scoop: extras/dovi-tool
package-manager-url: https://formulae.brew.sh/formula/dovi_tool
version: 2.3.2
license: MIT
category: development
tags:
  - cli
description: CLI tool for Dolby Vision metadata on video streams
source-archive: https://github.com/quietvoid/dovi_tool/archive/refs/tags/2.3.2.tar.gz
build-dependencies:
  - cargo-c
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dovi_tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dovi-tool
  av: sudo av install brew:dovi_tool
  brew: brew install dovi_tool
  nix: nix profile install nixpkgs#dovi-tool
  pacman: sudo pacman -S dovi-tool
  scoop: scoop install extras/dovi-tool
provenance:
  formula: dovi_tool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
