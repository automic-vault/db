id: brew:unrtf
display-name: unrtf
homepage: https://www.gnu.org/software/unrtf/
repo: https://ftpmirror.gnu.org/gnu/unrtf/unrtf-0.21.10.tar.gz
docs: https://www.gnu.org/software/unrtf/
package-manager:
  apk: unrtf
  brew: unrtf
  debian: unrtf
  dnf: unrtf
  macports: unrtf
  nix: unrtf
  pacman: unrtf
  ubuntu: unrtf
package-manager-url: https://formulae.brew.sh/formula/unrtf
version: 0.21.10
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: RTF to other formats converter
source-archive: https://ftpmirror.gnu.org/gnu/unrtf/unrtf-0.21.10.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: unrtf
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add unrtf
  av: sudo av install brew:unrtf
  brew: brew install unrtf
  debian: sudo apt install unrtf
  dnf: sudo dnf install unrtf
  macports: sudo port install unrtf
  nix: nix profile install nixpkgs#unrtf
  pacman: sudo pacman -S unrtf
  ubuntu: sudo apt install unrtf
provenance:
  formula: unrtf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
