id: brew:swiftformat
display-name: swiftformat
homepage: https://github.com/nicklockwood/SwiftFormat
repo: https://github.com/nicklockwood/SwiftFormat
docs: https://github.com/nicklockwood/SwiftFormat
package-manager:
  brew: swiftformat
  macports: swiftformat
  nix: swiftformat
package-manager-url: https://formulae.brew.sh/formula/swiftformat
version: 0.61.1
license: MIT
category: development
tags:
  - cli
description: Formatting tool for reformatting Swift code
source-archive: https://github.com/nicklockwood/SwiftFormat/archive/refs/tags/0.61.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: swiftformat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swiftformat
  brew: brew install swiftformat
  macports: sudo port install swiftformat
  nix: nix profile install nixpkgs#swiftformat
provenance:
  formula: swiftformat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
