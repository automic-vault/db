id: brew:xorgrgb
display-name: xorgrgb
homepage: https://www.x.org/
repo: https://xorg.freedesktop.org/archive/individual/app/rgb-1.1.1.tar.gz
docs: https://www.x.org/
package-manager:
  brew: xorgrgb
package-manager-url: https://formulae.brew.sh/formula/xorgrgb
version: 1.1.1
license: MIT
category: database
tags:
