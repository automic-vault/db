id: brew:ooniprobe
display-name: ooniprobe
homepage: https://ooni.org/
repo: https://github.com/ooni/probe-cli
docs: https://ooni.org/
package-manager:
  brew: ooniprobe
package-manager-url: https://formulae.brew.sh/formula/ooniprobe
version: 3.29.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Network interference detection tool
source-archive: https://github.com/ooni/probe-cli/archive/refs/tags/v3.29.1.tar.gz
dependencies:
  - tor
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ooniprobe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ooniprobe
  brew: brew install ooniprobe
provenance:
  formula: ooniprobe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
