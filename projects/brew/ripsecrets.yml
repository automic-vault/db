id: brew:ripsecrets
display-name: ripsecrets
homepage: https://github.com/sirwart/ripsecrets
repo: https://github.com/sirwart/ripsecrets
docs: https://github.com/sirwart/ripsecrets
package-manager:
  brew: ripsecrets
  nix: ripsecrets
package-manager-url: https://formulae.brew.sh/formula/ripsecrets
version: 0.1.11
license: MIT
category: security
tags:
  - cli
description: Prevent committing secret keys into your source code
source-archive: https://github.com/sirwart/ripsecrets/archive/refs/tags/v0.1.11.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ripsecrets
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ripsecrets
  brew: brew install ripsecrets
  nix: nix profile install nixpkgs#ripsecrets
provenance:
  formula: ripsecrets
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
