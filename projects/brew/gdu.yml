id: brew:gdu
display-name: gdu
homepage: https://github.com/dundee/gdu
repo: https://github.com/dundee/gdu
docs: https://github.com/dundee/gdu
package-manager:
  apk: gdu
  brew: gdu
  chocolatey: gdu
  debian: gdu
  dnf: gdu
  macports: gdu
  nix: gdu
  pacman: gdu
  scoop: main/gdu
  ubuntu: gdu
  winget: dundee.gdu
  zypper: gdu
package-manager-url: https://formulae.brew.sh/formula/gdu
version: 5.36.1
license: MIT
category: development
tags:
  - cli
description: Disk usage analyzer with console interface written in Go
source-archive: https://github.com/dundee/gdu/archive/refs/tags/v5.36.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gdu-go
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: To avoid a conflict with `coreutils`, `gdu` has been installed as `gdu-go`.
  post-install-defined: false
install-lines:
  apk: sudo apk add gdu
  av: sudo av install brew:gdu
  brew: brew install gdu
  chocolatey: choco install gdu
  debian: sudo apt install gdu
  dnf: sudo dnf install gdu
  macports: sudo port install gdu
  nix: nix profile install nixpkgs#gdu
  pacman: sudo pacman -S gdu
  scoop: scoop install main/gdu
  ubuntu: sudo apt install gdu
  winget: winget install --id dundee.gdu -e
  zypper: sudo zypper install gdu
provenance:
  formula: gdu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
