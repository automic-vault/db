id: brew:talisman
display-name: talisman
homepage: https://thoughtworks.github.io/talisman/
repo: https://github.com/thoughtworks/talisman
docs: https://thoughtworks.github.io/talisman/
package-manager:
  brew: talisman
  macports: talisman
  winget: Thoughtworks.Talisman
package-manager-url: https://formulae.brew.sh/formula/talisman
version: 1.37.0
license: MIT
category: security
tags:
  - cli
description: Tool to detect and prevent secrets from getting checked in
source-archive: https://github.com/thoughtworks/talisman/archive/refs/tags/v1.37.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: talisman
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:talisman
  brew: brew install talisman
  macports: sudo port install talisman
  winget: winget install --id Thoughtworks.Talisman -e
provenance:
  formula: talisman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
