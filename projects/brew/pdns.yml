id: brew:pdns
display-name: pdns
homepage: https://www.powerdns.com
repo: https://downloads.powerdns.com/releases/pdns-5.0.5.tar.bz2
docs: https://www.powerdns.com
package-manager:
  apk: pdns
  brew: pdns
  debian: pdns-server
  dnf: pdns
  nix: pdns
  ubuntu: pdns-server
  zypper: pdns
package-manager-url: https://formulae.brew.sh/formula/pdns
version: 5.0.5
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Authoritative nameserver
source-archive: https://downloads.powerdns.com/releases/pdns-5.0.5.tar.bz2
dependencies:
  - boost
  - lua
  - openssl@3
  - sqlite
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: pdns_control
  - exposure: global executable
    kind: cli
    name: pdns_server
  - exposure: global executable
    kind: cli
    name: pdnsutil
  - exposure: global executable
    kind: cli
    name: zone2json
  - exposure: global executable
    kind: cli
    name: zone2sql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add pdns
  av: sudo av install brew:pdns
  brew: brew install pdns
  debian: sudo apt install pdns-server
  dnf: sudo dnf install pdns
  nix: nix profile install nixpkgs#pdns
  ubuntu: sudo apt install pdns-server
  zypper: sudo zypper install pdns
provenance:
  formula: pdns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
