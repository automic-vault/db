id: brew:cflow
display-name: cflow
homepage: https://www.gnu.org/software/cflow/
repo: https://ftpmirror.gnu.org/gnu/cflow/cflow-1.8.tar.bz2
docs: https://www.gnu.org/software/cflow/
package-manager:
  apk: cflow
  brew: cflow
  debian: cflow
  dnf: cflow
  macports: cflow
  nix: cflow
  ubuntu: cflow
  zypper: cflow
package-manager-url: https://formulae.brew.sh/formula/cflow
version: 1.8
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Generate call graphs from C code
source-archive: https://ftpmirror.gnu.org/gnu/cflow/cflow-1.8.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: cflow
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cflow
  av: sudo av install brew:cflow
  brew: brew install cflow
  debian: sudo apt install cflow
  dnf: sudo dnf install cflow
  macports: sudo port install cflow
  nix: nix profile install nixpkgs#cflow
  ubuntu: sudo apt install cflow
  zypper: sudo zypper install cflow
provenance:
  formula: cflow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
