id: brew:scooter
display-name: scooter
homepage: https://github.com/thomasschafer/scooter
repo: https://github.com/thomasschafer/scooter
docs: https://github.com/thomasschafer/scooter
package-manager:
  apk: scooter
  brew: scooter
  nix: scooter
  scoop: main/scooter
  winget: thomasschafer.scooter
package-manager-url: https://formulae.brew.sh/formula/scooter
version: 0.9.1
license: MIT
category: development
tags:
  - cli
description: Interactive find and replace in the terminal
source-archive: https://github.com/thomasschafer/scooter/archive/refs/tags/v0.9.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: scooter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add scooter
  av: sudo av install brew:scooter
  brew: brew install scooter
  nix: nix profile install nixpkgs#scooter
  scoop: scoop install main/scooter
  winget: winget install --id thomasschafer.scooter -e
provenance:
  formula: scooter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
