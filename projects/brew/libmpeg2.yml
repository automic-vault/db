id: brew:libmpeg2
display-name: libmpeg2
homepage: https://libmpeg2.sourceforge.io/
repo: https://download.videolan.org/contrib/libmpeg2/libmpeg2-0.5.1.tar.gz
docs: https://libmpeg2.sourceforge.io/
package-manager:
  apk: libmpeg2
  brew: libmpeg2
  debian: mpeg2dec
  dnf: libmpeg2
  macports: libmpeg2
  nix: libmpeg2
  pacman: libmpeg2
  ubuntu: mpeg2dec
  zypper: mpeg2dec
package-manager-url: https://formulae.brew.sh/formula/libmpeg2
version: 0.5.1
license: GPL-2.0-or-later
category: media
tags:
  - cli
description: Library to decode mpeg-2 and mpeg-1 video streams
source-archive: https://download.videolan.org/contrib/libmpeg2/libmpeg2-0.5.1.tar.gz
dependencies:
  - sdl12-compat
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: corrupt_mpeg2
  - exposure: global executable
    kind: cli
    name: extract_mpeg2
  - exposure: global executable
    kind: cli
    name: mpeg2dec
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libmpeg2
  av: sudo av install brew:libmpeg2
  brew: brew install libmpeg2
  debian: sudo apt install mpeg2dec
  dnf: sudo dnf install libmpeg2
  macports: sudo port install libmpeg2
  nix: nix profile install nixpkgs#libmpeg2
  pacman: sudo pacman -S libmpeg2
  ubuntu: sudo apt install mpeg2dec
  zypper: sudo zypper install mpeg2dec
provenance:
  formula: libmpeg2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
