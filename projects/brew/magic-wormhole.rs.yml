id: brew:magic-wormhole.rs
display-name: magic-wormhole.rs
homepage: https://github.com/magic-wormhole/magic-wormhole.rs
repo: https://github.com/magic-wormhole/magic-wormhole.rs
docs: https://github.com/magic-wormhole/magic-wormhole.rs
package-manager:
  apk: magic-wormhole-rs
  brew: magic-wormhole.rs
  debian: wormhole-rs
  nix: magic-wormhole-rs
  scoop: main/magic-wormhole-rs
  zypper: magic-wormhole.rs
package-manager-url: https://formulae.brew.sh/formula/magic-wormhole.rs
version: 0.8.1
license: EUPL-1.2
category: development
tags:
  - cli
description: Rust implementation of Magic Wormhole, with new features and enhancements
source-archive: https://github.com/magic-wormhole/magic-wormhole.rs/archive/refs/tags/0.8.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: wormhole-rs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add magic-wormhole-rs
  av: sudo av install brew:magic-wormhole.rs
  brew: brew install magic-wormhole.rs
  debian: sudo apt install wormhole-rs
  nix: nix profile install nixpkgs#magic-wormhole-rs
  scoop: scoop install main/magic-wormhole-rs
  zypper: sudo zypper install magic-wormhole.rs
provenance:
  formula: magic-wormhole.rs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
