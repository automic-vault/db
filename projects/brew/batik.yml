id: brew:batik
display-name: batik
homepage: https://xmlgraphics.apache.org/batik/
repo: >
  https://www.apache.org/dyn/closer.lua?path=xmlgraphics/batik/binaries/batik-bin-1.19.tar.gz
docs: https://xmlgraphics.apache.org/batik/
package-manager:
  brew: batik
  dnf: batik
  macports: batik
  nix: batik
package-manager-url: https://formulae.brew.sh/formula/batik
version: 1.19
license: Apache-2.0
category: media
tags:
  - cli
description: Java-based toolkit for SVG images
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=xmlgraphics/batik/binaries/batik-bin-1.19.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: batik-rasterizer
  - exposure: global executable
    kind: cli
    name: batik-slideshow
  - exposure: global executable
    kind: cli
    name: batik-squiggle
  - exposure: global executable
    kind: cli
    name: batik-svgpp
  - exposure: global executable
    kind: cli
    name: batik-ttf2svg
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:batik
  brew: brew install batik
  dnf: sudo dnf install batik
  macports: sudo port install batik
  nix: nix profile install nixpkgs#batik
provenance:
  formula: batik
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
