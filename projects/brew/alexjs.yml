id: brew:alexjs
display-name: alexjs
homepage: https://alexjs.com
repo: https://github.com/get-alex/alex
docs: https://alexjs.com
package-manager:
  apk: alex
  brew: alexjs
  debian: alex
  dnf: alex
  macports: alex
  nix: alex
  pacman: alex
  ubuntu: alex
  zypper: alex
package-manager-url: https://formulae.brew.sh/formula/alexjs
version: 11.0.1
license: MIT
category: development
tags:
  - cli
description: Catch insensitive, inconsiderate writing
source-archive: https://github.com/get-alex/alex/archive/refs/tags/11.0.1.tar.gz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: alex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add alex
  av: sudo av install brew:alexjs
  brew: brew install alexjs
  debian: sudo apt install alex
  dnf: sudo dnf install alex
  macports: sudo port install alex
  nix: nix profile install nixpkgs#alex
  pacman: sudo pacman -S alex
  ubuntu: sudo apt install alex
  zypper: sudo zypper install alex
provenance:
  formula: alexjs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
