id: brew:pnetcdf
display-name: pnetcdf
homepage: https://parallel-netcdf.github.io/index.html
repo: https://parallel-netcdf.github.io/Release/pnetcdf-1.14.1.tar.gz
docs: https://parallel-netcdf.github.io/index.html
package-manager:
  brew: pnetcdf
  macports: pnetcdf
  nix: pnetcdf
package-manager-url: https://formulae.brew.sh/formula/pnetcdf
version: 1.14.1
license: NetCDF
category: development
tags:
  - cli
description: Parallel netCDF library for scientific data using the OpenMPI library
source-archive: https://parallel-netcdf.github.io/Release/pnetcdf-1.14.1.tar.gz
dependencies:
  - gcc
  - open-mpi
executables:
  - exposure: global executable
    kind: cli
    name: cdfdiff
  - exposure: global executable
    kind: cli
    name: ncmpidiff
  - exposure: global executable
    kind: cli
    name: ncmpidump
  - exposure: global executable
    kind: cli
    name: ncmpigen
  - exposure: global executable
    kind: cli
    name: ncoffsets
  - exposure: global executable
    kind: cli
    name: ncvalidator
  - exposure: global executable
    kind: cli
    name: pnetcdf-config
  - exposure: global executable
    kind: cli
    name: pnetcdf_version
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pnetcdf
  brew: brew install pnetcdf
  macports: sudo port install pnetcdf
  nix: nix profile install nixpkgs#pnetcdf
provenance:
  formula: pnetcdf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
