repo: https://github.com/bugzmanov/bookokrat
docs: https://bugzmanov.github.io/bookokrat/index.html
package-manager:
  brew: bookokrat
package-manager-url: https://formulae.brew.sh/formula/bookokrat
version: 0.3.11
license: AGPL-3.0-or-later
