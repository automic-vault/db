id: brew:jaguar
display-name: jaguar
homepage: https://toitlang.org/
repo: https://github.com/toitlang/jaguar
docs: https://toitlang.org/
package-manager:
  brew: jaguar
  debian: jag
  ubuntu: jag
  winget: Toit.Jaguar
  zypper: jag
package-manager-url: https://formulae.brew.sh/formula/jaguar
version: 1.65.0
license: MIT
category: development
tags:
  - cli
description: Live reloading for your ESP32
source-archive: https://github.com/toitlang/jaguar/archive/refs/tags/v1.65.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jag
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jaguar
  brew: brew install jaguar
  debian: sudo apt install jag
  ubuntu: sudo apt install jag
  winget: winget install --id Toit.Jaguar -e
  zypper: sudo zypper install jag
provenance:
  formula: jaguar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
