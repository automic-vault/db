id: brew:sstp-client
display-name: sstp-client
homepage: https://gitlab.com/sstp-project/sstp-client
repo: >
  https://gitlab.com/sstp-project/sstp-client/-/releases/1.0.20/downloads/dist-gzip/sstp-client-1.0.20.tar.gz
docs: https://gitlab.com/sstp-project/sstp-client
package-manager:
  apk: sstp-client
  brew: sstp-client
  debian: sstp-client
  dnf: sstp-client
  macports: sstp-client
  pacman: sstp-client
  ubuntu: sstp-client
package-manager-url: https://formulae.brew.sh/formula/sstp-client
version: 1.0.20
license: GPL-2.0-or-later
category: security
tags:
  - cli
description: SSTP (Microsoft's Remote Access Solution for PPP over SSL) client
source-archive: >
  https://gitlab.com/sstp-project/sstp-client/-/releases/1.0.20/downloads/dist-gzip/sstp-client-1.0.20.tar.gz
dependencies:
  - libevent
  - openssl@3
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: sstpc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    sstpc reads PPP configuration options from /etc/ppp/options. If this file does not
    exist yet, type the following command to create it: sudo touch /etc/ppp/options
  post-install-defined: false
install-lines:
  apk: sudo apk add sstp-client
  av: sudo av install brew:sstp-client
  brew: brew install sstp-client
  debian: sudo apt install sstp-client
  dnf: sudo dnf install sstp-client
  macports: sudo port install sstp-client
  pacman: sudo pacman -S sstp-client
  ubuntu: sudo apt install sstp-client
provenance:
  formula: sstp-client
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
