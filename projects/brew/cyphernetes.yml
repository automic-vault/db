id: brew:cyphernetes
display-name: cyphernetes
homepage: https://cyphernet.es
repo: https://github.com/AvitalTamir/cyphernetes
docs: https://cyphernet.es
package-manager:
  brew: cyphernetes
package-manager-url: https://formulae.brew.sh/formula/cyphernetes
version: 0.18.2
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes Query Language
source-archive: https://github.com/AvitalTamir/cyphernetes/archive/refs/tags/v0.18.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cyphernetes
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cyphernetes
  brew: brew install cyphernetes
provenance:
  formula: cyphernetes
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
