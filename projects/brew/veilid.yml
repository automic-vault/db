id: brew:veilid
display-name: veilid
homepage: https://veilid.com/
repo: https://gitlab.com/veilid/veilid/-/archive/v0.5.3/veilid-v0.5.3.tar.bz2
docs: https://veilid.com/
package-manager:
  brew: veilid
  nix: veilid
package-manager-url: https://formulae.brew.sh/formula/veilid
version: 0.5.3
license: MPL-2.0
category: development
tags:
  - cli
description: Peer-to-peer network for easily sharing various kinds of data
source-archive: https://gitlab.com/veilid/veilid/-/archive/v0.5.3/veilid-v0.5.3.tar.bz2
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: veilid-cli
  - exposure: global executable
    kind: cli
    name: veilid-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:veilid
  brew: brew install veilid
  nix: nix profile install nixpkgs#veilid
provenance:
  formula: veilid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
