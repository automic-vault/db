id: brew:nrpe
display-name: nrpe
homepage: https://www.nagios.org/
repo: https://github.com/NagiosEnterprises/nrpe
docs: https://www.nagios.org/
package-manager:
  apk: nrpe
  brew: nrpe
  dnf: nrpe
  zypper: nrpe
package-manager-url: https://formulae.brew.sh/formula/nrpe
version: 4.1.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Nagios remote plugin executor
source-archive: https://github.com/NagiosEnterprises/nrpe/releases/download/nrpe-4.1.3/nrpe-4.1.3.tar.gz
dependencies:
  - nagios-plugins
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: check_nrpe
  - exposure: global executable
    kind: cli
    name: nrpe
  - exposure: global executable
    kind: cli
    name: nrpe-uninstall
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add nrpe
  av: sudo av install brew:nrpe
  brew: brew install nrpe
  dnf: sudo dnf install nrpe
  zypper: sudo zypper install nrpe
provenance:
  formula: nrpe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
