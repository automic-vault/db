id: brew:baresip
display-name: baresip
homepage: https://github.com/baresip/baresip
repo: https://github.com/baresip/baresip
docs: https://github.com/baresip/baresip
package-manager:
  apk: baresip
  brew: baresip
  debian: baresip
  dnf: baresip
  macports: baresip
  nix: baresip
  pacman: baresip
  ubuntu: baresip
  zypper: baresip
package-manager-url: https://formulae.brew.sh/formula/baresip
version: 4.8.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Modular SIP useragent
source-archive: https://github.com/baresip/baresip/archive/refs/tags/v4.8.0.tar.gz
dependencies:
  - libre
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: baresip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add baresip
  av: sudo av install brew:baresip
  brew: brew install baresip
  debian: sudo apt install baresip
  dnf: sudo dnf install baresip
  macports: sudo port install baresip
  nix: nix profile install nixpkgs#baresip
  pacman: sudo pacman -S baresip
  ubuntu: sudo apt install baresip
  zypper: sudo zypper install baresip
provenance:
  formula: baresip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
