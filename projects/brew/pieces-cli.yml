id: brew:pieces-cli
display-name: pieces-cli
homepage: https://docs.pieces.app/products/cli
repo: >
  https://files.pythonhosted.org/packages/d4/28/e5c3d511e6a81b06f0c293909dfb138fd10d28979968e4a4ad12cf671f73/pieces_cli-1.20.1.tar.gz
