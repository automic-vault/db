id: brew:rocksdb
display-name: rocksdb
homepage: https://rocksdb.org/
repo: https://github.com/facebook/rocksdb
docs: https://rocksdb.org/
package-manager:
  apk: rocksdb
  brew: rocksdb
  dnf: rocksdb
  macports: rocksdb
  nix: rocksdb
  pacman: rocksdb
package-manager-url: https://formulae.brew.sh/formula/rocksdb
version: 11.1.1
license: GPL-2.0-only OR Apache-2.0
category: development
tags:
  - cli
description: Embeddable, persistent key-value store for fast storage
source-archive: https://github.com/facebook/rocksdb/archive/refs/tags/v11.1.1.tar.gz
dependencies:
  - gflags
  - lz4
  - snappy
  - zstd
build-dependencies:
  - cmake
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: rocksdb_dump
  - exposure: global executable
    kind: cli
    name: rocksdb_ldb
  - exposure: global executable
    kind: cli
    name: rocksdb_repl_stress
  - exposure: global executable
    kind: cli
    name: rocksdb_sanity_test
  - exposure: global executable
    kind: cli
    name: rocksdb_sst_dump
  - exposure: global executable
    kind: cli
    name: rocksdb_stress
  - exposure: global executable
    kind: cli
    name: rocksdb_undump
  - exposure: global executable
    kind: cli
    name: rocksdb_write_stress
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rocksdb
  av: sudo av install brew:rocksdb
  brew: brew install rocksdb
  dnf: sudo dnf install rocksdb
  macports: sudo port install rocksdb
  nix: nix profile install nixpkgs#rocksdb
  pacman: sudo pacman -S rocksdb
provenance:
  formula: rocksdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
