id: brew:dotter
display-name: dotter
homepage: https://github.com/SuperCuber/dotter
repo: https://github.com/SuperCuber/dotter
docs: https://github.com/SuperCuber/dotter
package-manager:
  brew: dotter
  debian: dotter
  nix: dotter
  scoop: main/dotter
  ubuntu: dotter
  winget: SuperCuber.Dotter
package-manager-url: https://formulae.brew.sh/formula/dotter
version: 0.13.4
license: Unlicense
category: development
tags:
  - cli
description: Dotfile manager and templater written in rust
source-archive: https://github.com/SuperCuber/dotter/archive/refs/tags/v0.13.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dotter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dotter
  brew: brew install dotter
  debian: sudo apt install dotter
  nix: nix profile install nixpkgs#dotter
  scoop: scoop install main/dotter
  ubuntu: sudo apt install dotter
  winget: winget install --id SuperCuber.Dotter -e
provenance:
  formula: dotter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
