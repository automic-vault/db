id: brew:gibo
display-name: gibo
homepage: https://github.com/simonwhitaker/gibo
repo: https://github.com/simonwhitaker/gibo
docs: https://github.com/simonwhitaker/gibo
package-manager:
  brew: gibo
  nix: gibo
  scoop: main/gibo
package-manager-url: https://formulae.brew.sh/formula/gibo
version: 3.0.22
license: Unlicense
category: development
tags:
  - cli
description: Access GitHub's .gitignore boilerplates
source-archive: https://github.com/simonwhitaker/gibo/archive/refs/tags/v3.0.22.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gibo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gibo
  brew: brew install gibo
  nix: nix profile install nixpkgs#gibo
  scoop: scoop install main/gibo
provenance:
  formula: gibo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
