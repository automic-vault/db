id: brew:kahip
display-name: kahip
homepage: https://algo2.iti.kit.edu/documents/kahip/index.html
repo: https://github.com/KaHIP/KaHIP
docs: https://algo2.iti.kit.edu/documents/kahip/index.html
package-manager:
  brew: kahip
  nix: kahip
package-manager-url: https://formulae.brew.sh/formula/kahip
version: 3.25
license: MIT
category: development
tags:
  - cli
description: Karlsruhe High Quality Partitioning
source-archive: https://github.com/KaHIP/KaHIP/archive/refs/tags/v3.25.tar.gz
dependencies:
  - libomp
  - open-mpi
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: dspac
  - exposure: global executable
    kind: cli
    name: edge_evaluator
  - exposure: global executable
    kind: cli
    name: edge_list_to_metis_graph
  - exposure: global executable
    kind: cli
    name: edge_partitioning
  - exposure: global executable
    kind: cli
    name: evaluator
  - exposure: global executable
    kind: cli
    name: global_multisection
  - exposure: global executable
    kind: cli
    name: graph2binary
  - exposure: global executable
    kind: cli
    name: graph2binary_external
  - exposure: global executable
    kind: cli
    name: graphchecker
  - exposure: global executable
    kind: cli
    name: interface_test
  - exposure: global executable
    kind: cli
    name: kaffpa
  - exposure: global executable
    kind: cli
    name: kaffpaE
  - exposure: global executable
    kind: cli
    name: label_propagation
  - exposure: global executable
    kind: cli
    name: node_ordering
  - exposure: global executable
    kind: cli
    name: node_separator
  - exposure: global executable
    kind: cli
    name: parhip
  - exposure: global executable
    kind: cli
    name: partition_to_vertex_separator
  - exposure: global executable
    kind: cli
    name: readbgf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kahip
  brew: brew install kahip
  nix: nix profile install nixpkgs#kahip
provenance:
  formula: kahip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
