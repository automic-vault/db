id: brew:dprint
display-name: dprint
homepage: https://dprint.dev/
repo: https://github.com/dprint/dprint
docs: https://dprint.dev/
package-manager:
  apk: dprint
  brew: dprint
  macports: dprint
  nix: dprint
  pacman: dprint
  scoop: main/dprint
  winget: dprint.dprint
package-manager-url: https://formulae.brew.sh/formula/dprint
version: 0.54.0
license: MIT
category: development
tags:
  - cli
description: Pluggable and configurable code formatting platform written in Rust
source-archive: https://github.com/dprint/dprint/archive/refs/tags/0.54.0.tar.gz
dependencies:
  - xz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dprint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dprint
  av: sudo av install brew:dprint
  brew: brew install dprint
  macports: sudo port install dprint
  nix: nix profile install nixpkgs#dprint
  pacman: sudo pacman -S dprint
  scoop: scoop install main/dprint
  winget: winget install --id dprint.dprint -e
provenance:
  formula: dprint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
