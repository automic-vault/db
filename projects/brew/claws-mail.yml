id: brew:claws-mail
display-name: claws-mail
homepage: https://www.claws-mail.org/
repo: https://www.claws-mail.org/releases/claws-mail-4.4.0.tar.gz
docs: https://www.claws-mail.org/
package-manager:
  apk: claws-mail
  brew: claws-mail
  debian: claws-mail
  dnf: claws-mail
  macports: claws-mail
  nix: claws-mail
  pacman: claws-mail
  scoop: extras/claws-mail
  ubuntu: claws-mail
  winget: ClawsMail.ClawsMail
  zypper: claws-mail
package-manager-url: https://formulae.brew.sh/formula/claws-mail
version: 4.4.0
license: GPL-3.0-or-later
category: cloud
tags:
  - cli
description: User-friendly, lightweight, and fast email client
source-archive: https://www.claws-mail.org/releases/claws-mail-4.4.0.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gnutls
  - gtk+3
  - harfbuzz
  - libetpan
  - nettle
  - openssl@3
  - pango
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: claws-mail
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add claws-mail
  av: sudo av install brew:claws-mail
  brew: brew install claws-mail
  debian: sudo apt install claws-mail
  dnf: sudo dnf install claws-mail
  macports: sudo port install claws-mail
  nix: nix profile install nixpkgs#claws-mail
  pacman: sudo pacman -S claws-mail
  scoop: scoop install extras/claws-mail
  ubuntu: sudo apt install claws-mail
  winget: winget install --id ClawsMail.ClawsMail -e
  zypper: sudo zypper install claws-mail
provenance:
  formula: claws-mail
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
