id: brew:ncmdump
display-name: ncmdump
homepage: https://github.com/taurusxin/ncmdump
repo: https://github.com/taurusxin/ncmdump
docs: https://github.com/taurusxin/ncmdump
package-manager:
  brew: ncmdump
  macports: ncmdump
  winget: TaurusXin.ncmdump
package-manager-url: https://formulae.brew.sh/formula/ncmdump
version: 1.5.1
license: MIT
category: cloud
tags:
  - cli
  - cloud
description: Convert Netease Cloud Music ncm files to mp3/flac files
source-archive: https://github.com/taurusxin/ncmdump/archive/refs/tags/1.5.1.tar.gz
dependencies:
  - taglib
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ncmdump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ncmdump
  brew: brew install ncmdump
  macports: sudo port install ncmdump
  winget: winget install --id TaurusXin.ncmdump -e
provenance:
  formula: ncmdump
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
