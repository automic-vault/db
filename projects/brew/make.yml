id: brew:make
display-name: make
homepage: https://www.gnu.org/software/make/
repo: https://ftpmirror.gnu.org/gnu/make/make-4.4.1.tar.lz
docs: https://www.gnu.org/software/make/
package-manager:
  apk: make
  brew: make
  chocolatey: make
  debian: make
  dnf: make
  macports: gmake
  pacman: make
  scoop: main/make
  ubuntu: make
  winget: ezwinports.make
  zypper: make
package-manager-url: https://formulae.brew.sh/formula/make
version: 4.4.1
license: GPL-3.0-only
category: network
tags:
  - cli
description: Utility for directing compilation
source-archive: https://ftpmirror.gnu.org/gnu/make/make-4.4.1.tar.lz
executables:
  - exposure: global executable
    kind: cli
    name: gmake
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sequoia
    - sonoma
    - tahoe
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    GNU "make" has been installed as "gmake". If you need to use it as "make", you can
    add a "gnubin" directory to your PATH from your bashrc like:
    PATH="$HOMEBREW_PREFIX/opt/make/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add make
  av: sudo av install brew:make
  brew: brew install make
  chocolatey: choco install make
  debian: sudo apt install make
  dnf: sudo dnf install make
  macports: sudo port install gmake
  pacman: sudo pacman -S make
  scoop: scoop install main/make
  ubuntu: sudo apt install make
  winget: winget install --id ezwinports.make -e
  zypper: sudo zypper install make
provenance:
  formula: make
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
