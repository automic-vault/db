id: brew:htslib
display-name: htslib
homepage: https://www.htslib.org/
repo: https://github.com/samtools/htslib
docs: https://www.htslib.org/
package-manager:
  brew: htslib
  debian: tabix
  dnf: htslib
  macports: htslib
  nix: htslib
  ubuntu: tabix
  zypper: bgzip
package-manager-url: https://formulae.brew.sh/formula/htslib
version: 1.23.1
license: MIT AND BSD-3-Clause
category: development
tags:
  - cli
description: C library for high-throughput sequencing data formats
source-archive: https://github.com/samtools/htslib/releases/download/1.23.1/htslib-1.23.1.tar.bz2
dependencies:
  - libdeflate
  - xz
uses-from-macos:
  - bzip2
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: annot-tsv
  - exposure: global executable
    kind: cli
    name: bgzip
  - exposure: global executable
    kind: cli
    name: htsfile
  - exposure: global executable
    kind: cli
    name: ref-cache
  - exposure: global executable
    kind: cli
    name: tabix
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:htslib
  brew: brew install htslib
  debian: sudo apt install tabix
  dnf: sudo dnf install htslib
  macports: sudo port install htslib
  nix: nix profile install nixpkgs#htslib
  ubuntu: sudo apt install tabix
  zypper: sudo zypper install bgzip
provenance:
  formula: htslib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
