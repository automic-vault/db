id: brew:iamb
display-name: iamb
homepage: https://iamb.chat
repo: https://github.com/ulyssa/iamb
docs: https://iamb.chat
package-manager:
  apk: iamb
  brew: iamb
  nix: iamb
  winget: ulyssa.iamb
  zypper: iamb
package-manager-url: https://formulae.brew.sh/formula/iamb
version: 0.0.11
license: Apache-2.0
category: development
tags:
  - cli
description: Matrix client for Vim addicts
source-archive: https://github.com/ulyssa/iamb/archive/refs/tags/v0.0.11.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: iamb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add iamb
  av: sudo av install brew:iamb
  brew: brew install iamb
  nix: nix profile install nixpkgs#iamb
  winget: winget install --id ulyssa.iamb -e
  zypper: sudo zypper install iamb
provenance:
  formula: iamb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
