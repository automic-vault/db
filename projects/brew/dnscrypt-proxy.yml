id: brew:dnscrypt-proxy
display-name: dnscrypt-proxy
homepage: https://dnscrypt.info
repo: https://github.com/DNSCrypt/dnscrypt-proxy
docs: https://dnscrypt.info
package-manager:
  apk: dnscrypt-proxy
  brew: dnscrypt-proxy
  chocolatey: dnscrypt-proxy
  debian: dnscrypt-proxy
  dnf: dnscrypt-proxy
  macports: dnscrypt-proxy
  nix: dnscrypt-proxy
  pacman: dnscrypt-proxy
  scoop: main/dnscrypt-proxy
  ubuntu: dnscrypt-proxy
  winget: DNSCrypt.dnscrypt-proxy
  zypper: dnscrypt-proxy
package-manager-url: https://formulae.brew.sh/formula/dnscrypt-proxy
version: 2.1.16
license: ISC
category: security
tags:
  - cli
description: Secure communications between a client and a DNS resolver
source-archive: https://github.com/DNSCrypt/dnscrypt-proxy/archive/refs/tags/2.1.16.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dnscrypt-proxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    After starting dnscrypt-proxy, you will need to point your local DNS server to
    127.0.0.1. You can do this by going to System Preferences > "Network" and clicking
    the "Advanced..." button for your interface. You will see a "DNS" tab where you can
    click "+" and enter 127.0.0.1 in the "DNS Servers" section. By default,
    dnscrypt-proxy runs on localhost (127.0.0.1), port 53, balancing traffic across a
    set of resolvers. If you would like to change these settings, you will have to edit
    the configuration file: $HOMEBREW_PREFIX/etc/dnscrypt-proxy.toml To check that
    dnscrypt-proxy is working correctly, open Terminal and enter the following command.
    Replace en1 with whatever network interface you're using: sudo tcpdump -i en1 -vvv
    'port 443' You should see a line in the result that looks like this:
    resolver.dnscrypt.info
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add dnscrypt-proxy
  av: sudo av install brew:dnscrypt-proxy
  brew: brew install dnscrypt-proxy
  chocolatey: choco install dnscrypt-proxy
  debian: sudo apt install dnscrypt-proxy
  dnf: sudo dnf install dnscrypt-proxy
  macports: sudo port install dnscrypt-proxy
  nix: nix profile install nixpkgs#dnscrypt-proxy
  pacman: sudo pacman -S dnscrypt-proxy
  scoop: scoop install main/dnscrypt-proxy
  ubuntu: sudo apt install dnscrypt-proxy
  winget: winget install --id DNSCrypt.dnscrypt-proxy -e
  zypper: sudo zypper install dnscrypt-proxy
provenance:
  formula: dnscrypt-proxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
