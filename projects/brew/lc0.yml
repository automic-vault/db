id: brew:lc0
display-name: lc0
homepage: https://lczero.org/
repo: https://github.com/LeelaChessZero/lc0
docs: https://lczero.org/
package-manager:
  brew: lc0
  nix: lc0
package-manager-url: https://formulae.brew.sh/formula/lc0
version: 0.32.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Open source neural network based chess engine
source-archive: https://github.com/LeelaChessZero/lc0.git
dependencies:
  - eigen
build-dependencies:
  - cmake
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: lc0
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lc0
  brew: brew install lc0
  nix: nix profile install nixpkgs#lc0
provenance:
  formula: lc0
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
