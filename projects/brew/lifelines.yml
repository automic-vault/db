id: brew:lifelines
display-name: lifelines
homepage: https://lifelines.github.io/lifelines/
repo: https://github.com/lifelines/lifelines
docs: https://lifelines.github.io/lifelines/
package-manager:
  brew: lifelines
  debian: lifelines
  macports: lifelines
  nix: lifelines
  ubuntu: lifelines
  zypper: lifelines
package-manager-url: https://formulae.brew.sh/formula/lifelines
version: 3.1.1
license: MIT
category: development
tags:
  - cli
description: Text-based genealogy software
source-archive: https://github.com/lifelines/lifelines/releases/download/3.1.1/lifelines-3.1.1.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: btedit
  - exposure: global executable
    kind: cli
    name: dbverify
  - exposure: global executable
    kind: cli
    name: llexec
  - exposure: global executable
    kind: cli
    name: llines
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lifelines
  brew: brew install lifelines
  debian: sudo apt install lifelines
  macports: sudo port install lifelines
  nix: nix profile install nixpkgs#lifelines
  ubuntu: sudo apt install lifelines
  zypper: sudo zypper install lifelines
provenance:
  formula: lifelines
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
