id: brew:no-more-secrets
display-name: no-more-secrets
homepage: https://github.com/bartobri/no-more-secrets
repo: https://github.com/bartobri/no-more-secrets
docs: https://github.com/bartobri/no-more-secrets
package-manager:
  brew: no-more-secrets
  dnf: no-more-secrets
  macports: no-more-secrets
  nix: nms
  zypper: no-more-secrets
package-manager-url: https://formulae.brew.sh/formula/no-more-secrets
version: 1.0.1
license: GPL-3.0-or-later
category: security
tags:
  - cli
description: Recreates the SETEC ASTRONOMY effect from 'Sneakers'
source-archive: https://github.com/bartobri/no-more-secrets/archive/refs/tags/v1.0.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: nms
  - exposure: global executable
    kind: cli
    name: sneakers
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:no-more-secrets
  brew: brew install no-more-secrets
  dnf: sudo dnf install no-more-secrets
  macports: sudo port install no-more-secrets
  nix: nix profile install nixpkgs#nms
  zypper: sudo zypper install no-more-secrets
provenance:
  formula: no-more-secrets
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
