id: brew:sss-cli
display-name: sss-cli
homepage: https://github.com/dsprenkels/sss-cli
repo: https://github.com/dsprenkels/sss-cli
docs: https://github.com/dsprenkels/sss-cli
package-manager:
  brew: sss-cli
  nix: sss-cli
package-manager-url: https://formulae.brew.sh/formula/sss-cli
version: 0.1.1
license: MIT
category: security
tags:
  - cli
description: Shamir secret share command-line interface
source-archive: https://github.com/dsprenkels/sss-cli/archive/refs/tags/v0.1.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: secret-share-combine
  - exposure: global executable
    kind: cli
    name: secret-share-split
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sss-cli
  brew: brew install sss-cli
  nix: nix profile install nixpkgs#sss-cli
provenance:
  formula: sss-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
