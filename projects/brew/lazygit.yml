id: brew:lazygit
display-name: lazygit
homepage: https://github.com/jesseduffield/lazygit/
repo: https://github.com/jesseduffield/lazygit
docs: https://github.com/jesseduffield/lazygit/
package-manager:
  apk: lazygit
  brew: lazygit
  chocolatey: lazygit
  debian: lazygit
  macports: lazygit
  nix: lazygit
  pacman: lazygit
  scoop: extras/lazygit
  winget: JesseDuffield.lazygit
  zypper: lazygit
package-manager-url: https://formulae.brew.sh/formula/lazygit
version: 0.61.1
license: MIT
category: development
tags:
  - cli
  - git
description: Simple terminal UI for git commands
source-archive: https://github.com/jesseduffield/lazygit/archive/refs/tags/v0.61.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lazygit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lazygit
  av: sudo av install brew:lazygit
  brew: brew install lazygit
  chocolatey: choco install lazygit
  debian: sudo apt install lazygit
  macports: sudo port install lazygit
  nix: nix profile install nixpkgs#lazygit
  pacman: sudo pacman -S lazygit
  scoop: scoop install extras/lazygit
  winget: winget install --id JesseDuffield.lazygit -e
  zypper: sudo zypper install lazygit
provenance:
  formula: lazygit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
