id: brew:git-absorb
display-name: git-absorb
homepage: https://github.com/tummychow/git-absorb
repo: https://github.com/tummychow/git-absorb
docs: https://github.com/tummychow/git-absorb
package-manager:
  apk: git-absorb
  brew: git-absorb
  debian: git-absorb
  macports: git-absorb
  nix: git-absorb
  pacman: git-absorb
  scoop: main/git-absorb
  ubuntu: git-absorb
  winget: tummychow.git-absorb
  zypper: git-absorb
package-manager-url: https://formulae.brew.sh/formula/git-absorb
version: 0.9.0
license: BSD-3-Clause
category: development
tags:
  - cli
  - git
description: Automatic git commit --fixup
source-archive: https://github.com/tummychow/git-absorb/archive/refs/tags/0.9.0.tar.gz
dependencies:
  - libgit2
build-dependencies:
  - asciidoctor
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: git-absorb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-absorb
  av: sudo av install brew:git-absorb
  brew: brew install git-absorb
  debian: sudo apt install git-absorb
  macports: sudo port install git-absorb
  nix: nix profile install nixpkgs#git-absorb
  pacman: sudo pacman -S git-absorb
  scoop: scoop install main/git-absorb
  ubuntu: sudo apt install git-absorb
  winget: winget install --id tummychow.git-absorb -e
  zypper: sudo zypper install git-absorb
provenance:
  formula: git-absorb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
