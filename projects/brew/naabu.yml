id: brew:naabu
display-name: naabu
homepage: https://docs.projectdiscovery.io/tools/naabu/overview
repo: https://github.com/projectdiscovery/naabu
docs: https://docs.projectdiscovery.io/tools/naabu/overview
package-manager:
  apk: naabu
  brew: naabu
  nix: naabu
package-manager-url: https://formulae.brew.sh/formula/naabu
version: 2.6.1
license: MIT
category: development
tags:
  - cli
description: Fast port scanner
source-archive: https://github.com/projectdiscovery/naabu/archive/refs/tags/v2.6.1.tar.gz
build-dependencies:
  - go
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: naabu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add naabu
  av: sudo av install brew:naabu
  brew: brew install naabu
  nix: nix profile install nixpkgs#naabu
provenance:
  formula: naabu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
