id: brew:skeema
display-name: skeema
homepage: https://www.skeema.io/
repo: https://github.com/skeema/skeema
docs: https://www.skeema.io/
package-manager:
  brew: skeema
  debian: skeema
  nix: skeema
  ubuntu: skeema
package-manager-url: https://formulae.brew.sh/formula/skeema
version: 1.13.2
license: Apache-2.0
category: database
tags:
  - cli
description: Declarative pure-SQL schema management for MySQL and MariaDB
source-archive: https://github.com/skeema/skeema/archive/refs/tags/v1.13.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: skeema
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:skeema
  brew: brew install skeema
  debian: sudo apt install skeema
  nix: nix profile install nixpkgs#skeema
  ubuntu: sudo apt install skeema
provenance:
  formula: skeema
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
