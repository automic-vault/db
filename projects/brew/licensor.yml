id: brew:licensor
display-name: licensor
homepage: https://github.com/raftario/licensor
repo: https://github.com/raftario/licensor
docs: https://github.com/raftario/licensor
package-manager:
  brew: licensor
package-manager-url: https://formulae.brew.sh/formula/licensor
version: 2.1.0
license: MIT
category: development
tags:
  - cli
description: Write licenses to stdout
source-archive: https://github.com/raftario/licensor/archive/refs/tags/v2.1.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: licensor
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:licensor
  brew: brew install licensor
provenance:
  formula: licensor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
