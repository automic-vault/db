id: brew:cabocha
display-name: cabocha
homepage: https://taku910.github.io/cabocha/
repo: https://distfiles.macports.org/cabocha/cabocha-0.69.tar.bz2
docs: https://taku910.github.io/cabocha/
package-manager:
  brew: cabocha
  macports: cabocha
package-manager-url: https://formulae.brew.sh/formula/cabocha
version: 0.69
license: BSD-3-Clause OR LGPL-2.1-or-later
category: development
tags:
  - cli
description: Yet Another Japanese Dependency Structure Analyzer
source-archive: https://distfiles.macports.org/cabocha/cabocha-0.69.tar.bz2
dependencies:
  - crf++
  - mecab
  - mecab-ipadic
executables:
  - exposure: global executable
    kind: cli
    name: cabocha
  - exposure: global executable
    kind: cli
    name: cabocha-config
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cabocha
  brew: brew install cabocha
  macports: sudo port install cabocha
provenance:
  formula: cabocha
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
