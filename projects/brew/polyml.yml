id: brew:polyml
display-name: polyml
homepage: https://www.polyml.org/
repo: https://github.com/polyml/polyml
docs: https://www.polyml.org/
package-manager:
  apk: polyml
  brew: polyml
  dnf: polyml
  macports: polyml
  nix: polyml
  pacman: polyml
  ubuntu: polyml
package-manager-url: https://formulae.brew.sh/formula/polyml
version: 5.9.2
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Standard ML implementation
source-archive: https://github.com/polyml/polyml/archive/refs/tags/v5.9.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: poly
  - exposure: global executable
    kind: cli
    name: polyc
  - exposure: global executable
    kind: cli
    name: polyimport
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add polyml
  av: sudo av install brew:polyml
  brew: brew install polyml
  dnf: sudo dnf install polyml
  macports: sudo port install polyml
  nix: nix profile install nixpkgs#polyml
  pacman: sudo pacman -S polyml
  ubuntu: sudo apt install polyml
provenance:
  formula: polyml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
