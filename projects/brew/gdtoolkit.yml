id: brew:gdtoolkit
display-name: gdtoolkit
homepage: https://github.com/Scony/godot-gdscript-toolkit
repo: >
  https://files.pythonhosted.org/packages/de/39/041c1705dba6450c67e23be0c70d0fcff035e7d240b6695fc59efd8dafb6/gdtoolkit-4.5.0.tar.gz
docs: https://github.com/Scony/godot-gdscript-toolkit
