id: brew:invoice
display-name: invoice
homepage: https://github.com/maaslalani/invoice
repo: https://github.com/maaslalani/invoice
docs: https://github.com/maaslalani/invoice
package-manager:
  brew: invoice
  nix: invoice
package-manager-url: https://formulae.brew.sh/formula/invoice
version: 0.1.0
license: MIT
category: development
tags:
  - cli
description: Command-line invoice generator
source-archive: https://github.com/maaslalani/invoice/archive/refs/tags/v0.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: invoice
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:invoice
  brew: brew install invoice
  nix: nix profile install nixpkgs#invoice
provenance:
  formula: invoice
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
