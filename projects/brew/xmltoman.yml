id: brew:xmltoman
display-name: xmltoman
homepage: https://sourceforge.net/projects/xmltoman/
repo: >
  https://downloads.sourceforge.net/project/xmltoman/xmltoman/xmltoman-0.4.tar.gz/xmltoman-0.4.tar.gz
docs: https://sourceforge.net/projects/xmltoman/
package-manager:
  apk: xmltoman
  brew: xmltoman
  debian: xmltoman
  dnf: xmltoman
  macports: xmltoman
  nix: xmltoman
  pacman: xmltoman
  ubuntu: xmltoman
  zypper: xmltoman
package-manager-url: https://formulae.brew.sh/formula/xmltoman
version: 0.4
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: XML to manpage converter
source-archive: >
  https://downloads.sourceforge.net/project/xmltoman/xmltoman/xmltoman-0.4.tar.gz/xmltoman-0.4.tar.gz
uses-from-macos:
  - expat
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: xmlmantohtml
  - exposure: global executable
    kind: cli
    name: xmltoman
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xmltoman
  av: sudo av install brew:xmltoman
  brew: brew install xmltoman
  debian: sudo apt install xmltoman
  dnf: sudo dnf install xmltoman
  macports: sudo port install xmltoman
  nix: nix profile install nixpkgs#xmltoman
  pacman: sudo pacman -S xmltoman
  ubuntu: sudo apt install xmltoman
  zypper: sudo zypper install xmltoman
provenance:
  formula: xmltoman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
