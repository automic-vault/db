id: brew:nebula
display-name: nebula
homepage: https://github.com/slackhq/nebula
repo: https://github.com/slackhq/nebula
docs: https://github.com/slackhq/nebula
package-manager:
  apk: nebula
  brew: nebula
  debian: nebula
  dnf: nebula
  macports: nebula
  nix: nebula
  pacman: nebula
  ubuntu: nebula
  zypper: nebula
package-manager-url: https://formulae.brew.sh/formula/nebula
version: 1.10.3
license: MIT
category: development
tags:
  - cli
description: Scalable overlay networking tool for connecting computers anywhere
source-archive: https://github.com/slackhq/nebula/archive/refs/tags/v1.10.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nebula
  - exposure: global executable
    kind: cli
    name: nebula-cert
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add nebula
  av: sudo av install brew:nebula
  brew: brew install nebula
  debian: sudo apt install nebula
  dnf: sudo dnf install nebula
  macports: sudo port install nebula
  nix: nix profile install nixpkgs#nebula
  pacman: sudo pacman -S nebula
  ubuntu: sudo apt install nebula
  zypper: sudo zypper install nebula
provenance:
  formula: nebula
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
