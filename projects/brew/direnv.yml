id: brew:direnv
display-name: direnv
homepage: https://direnv.net/
repo: https://github.com/direnv/direnv
docs: https://direnv.net/
package-manager:
  apk: direnv
  brew: direnv
  debian: direnv
  dnf: direnv
  macports: direnv
  nix: direnv
  pacman: direnv
  scoop: main/direnv
  ubuntu: direnv
  winget: direnv.direnv
  zypper: direnv
package-manager-url: https://formulae.brew.sh/formula/direnv
version: 2.37.1
license: MIT
category: development
tags:
  - cli
description: Load/unload environment variables based on $PWD
source-archive: https://github.com/direnv/direnv/archive/refs/tags/v2.37.1.tar.gz
dependencies:
  - bash
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: direnv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add direnv
  av: sudo av install brew:direnv
  brew: brew install direnv
  debian: sudo apt install direnv
  dnf: sudo dnf install direnv
  macports: sudo port install direnv
  nix: nix profile install nixpkgs#direnv
  pacman: sudo pacman -S direnv
  scoop: scoop install main/direnv
  ubuntu: sudo apt install direnv
  winget: winget install --id direnv.direnv -e
  zypper: sudo zypper install direnv
provenance:
  formula: direnv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
