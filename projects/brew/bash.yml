id: brew:bash
display-name: bash
homepage: https://www.gnu.org/software/bash/
repo: https://ftpmirror.gnu.org/gnu/bash/bash-5.3.tar.gz
docs: https://www.gnu.org/software/bash/
package-manager:
  apk: bash
  brew: bash
  debian: bash
  dnf: bash
  macports: bash
  nix: bash
  pacman: bash
  ubuntu: bash
  zypper: bash
package-manager-url: https://formulae.brew.sh/formula/bash
version: 5.3.9
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Bourne-Again SHell, a UNIX command interpreter
source-archive: https://ftpmirror.gnu.org/gnu/bash/bash-5.3.tar.gz
dependencies:
  - gettext
  - ncurses
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: bash
  - exposure: global executable
    kind: cli
    name: bashbug
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    DEFAULT_LOADABLE_BUILTINS_PATH:
    $HOMEBREW_PREFIX/lib/bash:/usr/local/lib/bash:/usr/lib/bash:/opt/local/lib/bash:/usr/pkg/lib/bash:/opt/pkg/lib/bash:.
  post-install-defined: false
install-lines:
  apk: sudo apk add bash
  av: sudo av install brew:bash
  brew: brew install bash
  debian: sudo apt install bash
  dnf: sudo dnf install bash
  macports: sudo port install bash
  nix: nix profile install nixpkgs#bash
  pacman: sudo pacman -S bash
  ubuntu: sudo apt install bash
  zypper: sudo zypper install bash
provenance:
  formula: bash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
