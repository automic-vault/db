id: brew:wskdeploy
display-name: wskdeploy
homepage: https://openwhisk.apache.org/
repo: https://github.com/apache/openwhisk-wskdeploy
docs: https://openwhisk.apache.org/
package-manager:
  brew: wskdeploy
package-manager-url: https://formulae.brew.sh/formula/wskdeploy
version: 1.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: Apache OpenWhisk project deployment utility
source-archive: https://github.com/apache/openwhisk-wskdeploy/archive/refs/tags/1.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wskdeploy
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wskdeploy
  brew: brew install wskdeploy
provenance:
  formula: wskdeploy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
