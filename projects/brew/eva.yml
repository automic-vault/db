id: brew:eva
display-name: eva
homepage: https://github.com/oppiliappan/eva/
repo: https://github.com/oppiliappan/eva
docs: https://github.com/oppiliappan/eva/
package-manager:
  apk: eva
  brew: eva
  macports: eva
  nix: eva
  pacman: eva
  scoop: main/eva
package-manager-url: https://formulae.brew.sh/formula/eva
version: 0.3.1
license: MIT
category: development
tags:
  - cli
description: Calculator REPL, similar to bc(1)
source-archive: https://github.com/oppiliappan/eva/archive/refs/tags/v0.3.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: eva
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add eva
  av: sudo av install brew:eva
  brew: brew install eva
  macports: sudo port install eva
  nix: nix profile install nixpkgs#eva
  pacman: sudo pacman -S eva
  scoop: scoop install main/eva
provenance:
  formula: eva
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
