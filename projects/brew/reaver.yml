id: brew:reaver
display-name: reaver
homepage: https://github.com/t6x/reaver-wps-fork-t6x
repo: https://github.com/t6x/reaver-wps-fork-t6x
docs: https://github.com/t6x/reaver-wps-fork-t6x
package-manager:
  brew: reaver
  debian: reaver
  dnf: reaver
  macports: reaver
  pacman: reaver
  ubuntu: reaver
  winget: wasmCloud.wash
package-manager-url: https://formulae.brew.sh/formula/reaver
version: 1.6.6
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Implements brute force attack to recover WPA/WPA2 passkeys
source-archive: https://github.com/t6x/reaver-wps-fork-t6x/releases/download/v1.6.6/reaver-1.6.6.tar.xz
dependencies:
  - pixiewps
uses-from-macos:
  - libpcap
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: reaver
  - exposure: global executable
    kind: cli
    name: wash
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:reaver
  brew: brew install reaver
  debian: sudo apt install reaver
  dnf: sudo dnf install reaver
  macports: sudo port install reaver
  pacman: sudo pacman -S reaver
  ubuntu: sudo apt install reaver
  winget: winget install --id wasmCloud.wash -e
provenance:
  formula: reaver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
