id: brew:mpdscribble
display-name: mpdscribble
homepage: https://www.musicpd.org/clients/mpdscribble/
repo: https://www.musicpd.org/download/mpdscribble/0.25/mpdscribble-0.25.tar.xz
docs: https://www.musicpd.org/clients/mpdscribble/
package-manager:
  apk: mpdscribble
  brew: mpdscribble
  debian: mpdscribble
  dnf: mpdscribble
  nix: mpdscribble
  pacman: mpdscribble
  ubuntu: mpdscribble
package-manager-url: https://formulae.brew.sh/formula/mpdscribble
version: 0.25
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Last.fm reporting client for mpd
source-archive: https://www.musicpd.org/download/mpdscribble/0.25/mpdscribble-0.25.tar.xz
dependencies:
  - libgcrypt
  - libmpdclient
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: mpdscribble
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: The configuration file has been placed in $HOMEBREW_PREFIX/etc/mpdscribble.conf.
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add mpdscribble
  av: sudo av install brew:mpdscribble
  brew: brew install mpdscribble
  debian: sudo apt install mpdscribble
  dnf: sudo dnf install mpdscribble
  nix: nix profile install nixpkgs#mpdscribble
  pacman: sudo pacman -S mpdscribble
  ubuntu: sudo apt install mpdscribble
provenance:
  formula: mpdscribble
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
