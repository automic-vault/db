id: brew:foreman
display-name: foreman
homepage: https://ddollar.github.io/foreman/
repo: https://github.com/ddollar/foreman
docs: https://ddollar.github.io/foreman/
package-manager:
  brew: foreman
  nix: foreman
package-manager-url: https://formulae.brew.sh/formula/foreman
version: 0.90.0
license: MIT
category: development
tags:
  - cli
description: Manage Procfile-based applications
source-archive: https://github.com/ddollar/foreman/archive/refs/tags/v0.90.0.tar.gz
dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: foreman
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:foreman
  brew: brew install foreman
  nix: nix profile install nixpkgs#foreman
provenance:
  formula: foreman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
