id: brew:libcdr
display-name: libcdr
homepage: https://wiki.documentfoundation.org/DLP/Libraries/libcdr
repo: https://dev-www.libreoffice.org/src/libcdr/libcdr-0.1.9.tar.xz
docs: https://wiki.documentfoundation.org/DLP/Libraries/libcdr
package-manager:
  apk: libcdr
  brew: libcdr
  dnf: libcdr
  nix: libcdr
  pacman: libcdr
package-manager-url: https://formulae.brew.sh/formula/libcdr
version: 0.1.9
license: MPL-2.0
category: development
tags:
  - cli
description: C++ library to parse the file format of CorelDRAW documents
source-archive: https://dev-www.libreoffice.org/src/libcdr/libcdr-0.1.9.tar.xz
dependencies:
  - icu4c@78
  - librevenge
  - little-cms2
build-dependencies:
  - boost
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cdr2raw
  - exposure: global executable
    kind: cli
    name: cdr2text
  - exposure: global executable
    kind: cli
    name: cdr2xhtml
  - exposure: global executable
    kind: cli
    name: cmx2raw
  - exposure: global executable
    kind: cli
    name: cmx2text
  - exposure: global executable
    kind: cli
    name: cmx2xhtml
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libcdr
  av: sudo av install brew:libcdr
  brew: brew install libcdr
  dnf: sudo dnf install libcdr
  nix: nix profile install nixpkgs#libcdr
  pacman: sudo pacman -S libcdr
provenance:
  formula: libcdr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
