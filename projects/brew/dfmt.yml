id: brew:dfmt
display-name: dfmt
homepage: https://github.com/dlang-community/dfmt
repo: https://github.com/dlang-community/dfmt
docs: https://github.com/dlang-community/dfmt
package-manager:
  brew: dfmt
  nix: dfmt
  pacman: dfmt
package-manager-url: https://formulae.brew.sh/formula/dfmt
version: 0.15.2
license: BSL-1.0
category: development
tags:
  - cli
description: Formatter for D source code
source-archive: https://github.com/dlang-community/dfmt.git
build-dependencies:
  - ldc
executables:
  - exposure: global executable
    kind: cli
    name: dfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dfmt
  brew: brew install dfmt
  nix: nix profile install nixpkgs#dfmt
  pacman: sudo pacman -S dfmt
provenance:
  formula: dfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
