id: brew:pkl
display-name: pkl
homepage: https://pkl-lang.org
repo: https://github.com/apple/pkl
docs: https://pkl-lang.org
package-manager:
  brew: pkl
  macports: pkl
  nix: pkl
  winget: Apple.Pkl
package-manager-url: https://formulae.brew.sh/formula/pkl
version: 0.31.1
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for the Pkl programming language
source-archive: https://github.com/apple/pkl/archive/refs/tags/0.31.1.tar.gz
build-dependencies:
  - gradle
  - openjdk@21
executables:
  - exposure: global executable
    kind: cli
    name: pkl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pkl
  brew: brew install pkl
  macports: sudo port install pkl
  nix: nix profile install nixpkgs#pkl
  winget: winget install --id Apple.Pkl -e
provenance:
  formula: pkl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
