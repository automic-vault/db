id: brew:crd2pulumi
display-name: crd2pulumi
homepage: https://github.com/pulumi/crd2pulumi
repo: https://github.com/pulumi/crd2pulumi
docs: https://github.com/pulumi/crd2pulumi
package-manager:
  brew: crd2pulumi
  nix: crd2pulumi
package-manager-url: https://formulae.brew.sh/formula/crd2pulumi
version: 1.6.2
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Generate typed CustomResources from a Kubernetes CustomResourceDefinition
source-archive: https://github.com/pulumi/crd2pulumi/archive/refs/tags/v1.6.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: crd2pulumi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:crd2pulumi
  brew: brew install crd2pulumi
  nix: nix profile install nixpkgs#crd2pulumi
provenance:
  formula: crd2pulumi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
