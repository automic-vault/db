id: brew:x264
display-name: x264
homepage: https://www.videolan.org/developers/x264.html
repo: https://code.videolan.org/videolan/x264
docs: https://www.videolan.org/developers/x264.html
package-manager:
  apk: x264
  brew: x264
  debian: x264
  macports: x264
  nix: x264
  pacman: x264
  scoop: main/x264
  ubuntu: x264
  winget: VideoLAN.x264
package-manager-url: https://formulae.brew.sh/formula/x264
version: r3222
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: H.264/AVC encoder
source-archive: https://code.videolan.org/videolan/x264.git
executables:
  - exposure: global executable
    kind: cli
    name: x264
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add x264
  av: sudo av install brew:x264
  brew: brew install x264
  debian: sudo apt install x264
  macports: sudo port install x264
  nix: nix profile install nixpkgs#x264
  pacman: sudo pacman -S x264
  scoop: scoop install main/x264
  ubuntu: sudo apt install x264
  winget: winget install --id VideoLAN.x264 -e
provenance:
  formula: x264
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
