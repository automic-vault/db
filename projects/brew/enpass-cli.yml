id: brew:enpass-cli
display-name: enpass-cli
homepage: https://github.com/hazcod/enpass-cli
repo: https://github.com/hazcod/enpass-cli
docs: https://github.com/hazcod/enpass-cli
package-manager:
  brew: enpass-cli
  nix: enpass-cli
package-manager-url: https://formulae.brew.sh/formula/enpass-cli
version: 1.9.0
license: MIT
category: development
tags:
  - cli
description: Enpass command-line client
source-archive: https://github.com/hazcod/enpass-cli/archive/refs/tags/v1.9.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: enpass-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:enpass-cli
  brew: brew install enpass-cli
  nix: nix profile install nixpkgs#enpass-cli
provenance:
  formula: enpass-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
