id: brew:bear
display-name: bear
homepage: https://github.com/rizsotto/Bear
repo: https://github.com/rizsotto/Bear
docs: https://github.com/rizsotto/Bear
package-manager:
  apk: bear
  brew: bear
  debian: bear
  dnf: bear
  macports: Bear
  nix: bear
  pacman: bear
  ubuntu: bear
  winget: the-sz.Bear
  zypper: Bear
package-manager-url: https://formulae.brew.sh/formula/bear
version: 4.1.3
license: GPL-3.0-or-later
category: database
tags:
  - cli
  - database
description: Generate compilation database for clang tooling
source-archive: https://github.com/rizsotto/Bear/archive/refs/tags/4.1.3.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bear
  - exposure: global executable
    kind: cli
    name: bear-driver
  - exposure: global executable
    kind: cli
    name: bear-wrapper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bear
  av: sudo av install brew:bear
  brew: brew install bear
  debian: sudo apt install bear
  dnf: sudo dnf install bear
  macports: sudo port install Bear
  nix: nix profile install nixpkgs#bear
  pacman: sudo pacman -S bear
  ubuntu: sudo apt install bear
  winget: winget install --id the-sz.Bear -e
  zypper: sudo zypper install Bear
provenance:
  formula: bear
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
