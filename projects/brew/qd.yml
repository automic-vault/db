id: brew:qd
display-name: qd
homepage: https://www.davidhbailey.com/dhbsoftware/
repo: https://www.davidhbailey.com/dhbsoftware/qd-2.3.24.tar.gz
docs: https://www.davidhbailey.com/dhbsoftware/
package-manager:
  brew: qd
  dnf: qd
  macports: qd
  pacman: qd
package-manager-url: https://formulae.brew.sh/formula/qd
version: 2.3.24
license: BSD-3-Clause-LBNL
category: network
tags:
  - cli
description: C++/Fortran-90 double-double and quad-double package
source-archive: https://www.davidhbailey.com/dhbsoftware/qd-2.3.24.tar.gz
dependencies:
  - gcc
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: qd-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qd
  brew: brew install qd
  dnf: sudo dnf install qd
  macports: sudo port install qd
  pacman: sudo pacman -S qd
provenance:
  formula: qd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
