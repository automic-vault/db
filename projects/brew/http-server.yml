id: brew:http-server
display-name: http-server
homepage: https://github.com/http-party/http-server
repo: https://registry.npmjs.org/http-server/-/http-server-14.1.1.tgz
docs: https://github.com/http-party/http-server
package-manager:
  brew: http-server
  nix: http-server
package-manager-url: https://formulae.brew.sh/formula/http-server
version: 14.1.1
license: MIT
category: development
tags:
  - cli
description: Simple zero-configuration command-line HTTP server
source-archive: https://registry.npmjs.org/http-server/-/http-server-14.1.1.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: http-server
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:http-server
  brew: brew install http-server
  nix: nix profile install nixpkgs#http-server
provenance:
  formula: http-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
