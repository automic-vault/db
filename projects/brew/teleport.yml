id: brew:teleport
display-name: teleport
homepage: https://goteleport.com/
repo: https://github.com/gravitational/teleport
docs: https://goteleport.com/
package-manager:
  brew: teleport
  macports: teleport
  nix: teleport
  scoop: main/teleport
  winget: Gravitational.Teleport
  zypper: teleport
package-manager-url: https://formulae.brew.sh/formula/teleport
version: 18.8.2
license: AGPL-3.0-or-later AND Apache-2.0
category: development
tags:
  - cli
description: Modern SSH server for teams managing distributed infrastructure
source-archive: https://github.com/gravitational/teleport/archive/refs/tags/v18.8.2.tar.gz
dependencies:
  - libfido2
build-dependencies:
  - binaryen
  - go
  - node
  - pkgconf
  - pnpm
  - rust
  - rustup
executables:
  - exposure: global executable
    kind: cli
    name: fdpass-teleport
  - exposure: global executable
    kind: cli
    name: sessionhelper
  - exposure: global executable
    kind: cli
    name: tbot
  - exposure: global executable
    kind: cli
    name: tctl
  - exposure: global executable
    kind: cli
    name: teleport
  - exposure: global executable
    kind: cli
    name: teleport-update
  - exposure: global executable
    kind: cli
    name: tsh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:teleport
  brew: brew install teleport
  macports: sudo port install teleport
  nix: nix profile install nixpkgs#teleport
  scoop: scoop install main/teleport
  winget: winget install --id Gravitational.Teleport -e
  zypper: sudo zypper install teleport
provenance:
  formula: teleport
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
