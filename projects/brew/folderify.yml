id: brew:folderify
display-name: folderify
homepage: https://github.com/lgarron/folderify
repo: https://github.com/lgarron/folderify
docs: https://github.com/lgarron/folderify
package-manager:
  brew: folderify
  macports: folderify
package-manager-url: https://formulae.brew.sh/formula/folderify
version: 4.1.3
license: MIT
category: development
tags:
  - cli
description: Generate pixel-perfect macOS folder icons in the native style
source-archive: https://github.com/lgarron/folderify/archive/refs/tags/v4.1.3.tar.gz
dependencies:
  - imagemagick
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: folderify
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:folderify
  brew: brew install folderify
  macports: sudo port install folderify
provenance:
  formula: folderify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
