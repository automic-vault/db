id: brew:static-web-server
display-name: static-web-server
homepage: https://static-web-server.net
repo: https://github.com/static-web-server/static-web-server
docs: https://static-web-server.net
package-manager:
  brew: static-web-server
  nix: static-web-server
  scoop: main/static-web-server
package-manager-url: https://formulae.brew.sh/formula/static-web-server
version: 2.42.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: High-performance and asynchronous web server for static files-serving
source-archive: https://github.com/static-web-server/static-web-server/archive/refs/tags/v2.42.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: static-web-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:static-web-server
  brew: brew install static-web-server
  nix: nix profile install nixpkgs#static-web-server
  scoop: scoop install main/static-web-server
provenance:
  formula: static-web-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
