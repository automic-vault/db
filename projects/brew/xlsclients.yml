id: brew:xlsclients
display-name: xlsclients
homepage: https://gitlab.freedesktop.org/xorg/app/xlsclients
repo: https://www.x.org/archive/individual/app/xlsclients-1.1.6.tar.xz
docs: https://gitlab.freedesktop.org/xorg/app/xlsclients
package-manager:
  brew: xlsclients
  dnf: xlsclients
  macports: xlsclients
  nix: xlsclients
  zypper: xlsclients
package-manager-url: https://formulae.brew.sh/formula/xlsclients
version: 1.1.6
license: MIT
category: development
tags:
  - cli
description: List client applications running on a display
source-archive: https://www.x.org/archive/individual/app/xlsclients-1.1.6.tar.xz
dependencies:
  - libxcb
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xlsclients
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xlsclients
  brew: brew install xlsclients
  dnf: sudo dnf install xlsclients
  macports: sudo port install xlsclients
  nix: nix profile install nixpkgs#xlsclients
  zypper: sudo zypper install xlsclients
provenance:
  formula: xlsclients
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
