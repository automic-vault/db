id: brew:kops
display-name: kops
homepage: https://kops.sigs.k8s.io/
repo: https://github.com/kubernetes/kops
docs: https://kops.sigs.k8s.io/
package-manager:
  brew: kops
  macports: kops
  nix: kops
  scoop: main/kops
package-manager-url: https://formulae.brew.sh/formula/kops
version: 1.35.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Production Grade K8s Installation, Upgrades, and Management
source-archive: https://github.com/kubernetes/kops/archive/refs/tags/v1.35.0.tar.gz
dependencies:
  - kubernetes-cli
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kops
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kops
  brew: brew install kops
  macports: sudo port install kops
  nix: nix profile install nixpkgs#kops
  scoop: scoop install main/kops
provenance:
  formula: kops
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
