id: brew:poppler
display-name: poppler
homepage: https://poppler.freedesktop.org/
repo: https://poppler.freedesktop.org/poppler-26.04.0.tar.xz
docs: https://poppler.freedesktop.org/
package-manager:
  apk: poppler
  brew: poppler
  chocolatey: poppler
  dnf: poppler
  macports: poppler
  nix: poppler
  pacman: poppler
  scoop: main/poppler
  winget: oschwartz10612.Poppler
package-manager-url: https://formulae.brew.sh/formula/poppler
version: 26.04.0
license: GPL-2.0-only OR GPL-3.0-only
category: network
tags:
  - cli
description: PDF rendering library (based on the xpdf-3.0 code base)
source-archive: https://poppler.freedesktop.org/poppler-26.04.0.tar.xz
dependencies:
  - cairo
  - fontconfig
  - freetype
  - gettext
  - glib
  - gpgme
  - gpgmepp
  - jpeg-turbo
  - libpng
  - libtiff
  - little-cms2
  - nspr
  - nss
  - openjpeg
build-dependencies:
  - cmake
  - gettext
  - gobject-introspection
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: pdfattach
  - exposure: global executable
    kind: cli
    name: pdfdetach
  - exposure: global executable
    kind: cli
    name: pdffonts
  - exposure: global executable
    kind: cli
    name: pdfimages
  - exposure: global executable
    kind: cli
    name: pdfinfo
  - exposure: global executable
    kind: cli
    name: pdfseparate
  - exposure: global executable
    kind: cli
    name: pdfsig
  - exposure: global executable
    kind: cli
    name: pdftocairo
  - exposure: global executable
    kind: cli
    name: pdftohtml
  - exposure: global executable
    kind: cli
    name: pdftoppm
  - exposure: global executable
    kind: cli
    name: pdftops
  - exposure: global executable
    kind: cli
    name: pdftotext
  - exposure: global executable
    kind: cli
    name: pdfunite
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add poppler
  av: sudo av install brew:poppler
  brew: brew install poppler
  chocolatey: choco install poppler
  dnf: sudo dnf install poppler
  macports: sudo port install poppler
  nix: nix profile install nixpkgs#poppler
  pacman: sudo pacman -S poppler
  scoop: scoop install main/poppler
  winget: winget install --id oschwartz10612.Poppler -e
provenance:
  formula: poppler
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
