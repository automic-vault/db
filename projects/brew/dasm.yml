id: brew:dasm
display-name: dasm
homepage: https://dasm-assembler.github.io/
repo: https://github.com/dasm-assembler/dasm
docs: https://dasm-assembler.github.io/
package-manager:
  brew: dasm
  debian: dasm
  nix: dasm
  ubuntu: dasm
package-manager-url: https://formulae.brew.sh/formula/dasm
version: 2.20.14.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Macro assembler with support for several 8-bit microprocessors
source-archive: https://github.com/dasm-assembler/dasm/archive/refs/tags/2.20.14.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: dasm
  - exposure: global executable
    kind: cli
    name: ftohex
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dasm
  brew: brew install dasm
  debian: sudo apt install dasm
  nix: nix profile install nixpkgs#dasm
  ubuntu: sudo apt install dasm
provenance:
  formula: dasm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
