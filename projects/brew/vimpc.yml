id: brew:vimpc
display-name: vimpc
homepage: https://sourceforge.net/projects/vimpc/
repo: https://github.com/boysetsfrog/vimpc
docs: https://sourceforge.net/projects/vimpc/
package-manager:
  brew: vimpc
  nix: vimpc
package-manager-url: https://formulae.brew.sh/formula/vimpc
version: 0.09.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Ncurses based mpd client with vi like key bindings
source-archive: https://github.com/boysetsfrog/vimpc/archive/refs/tags/v0.09.2.tar.gz
dependencies:
  - libmpdclient
  - pcre
  - taglib
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - curl
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: vimpc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vimpc
  brew: brew install vimpc
  nix: nix profile install nixpkgs#vimpc
provenance:
  formula: vimpc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
