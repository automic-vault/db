id: brew:unnethack
display-name: unnethack
homepage: https://unnethack.wordpress.com/
repo: https://github.com/UnNetHack/UnNetHack
docs: https://unnethack.wordpress.com/
package-manager:
  brew: unnethack
  nix: unnethack
package-manager-url: https://formulae.brew.sh/formula/unnethack
version: 5.3.2
license: NGPL
category: development
tags:
  - cli
description: Fork of Nethack
source-archive: https://github.com/UnNetHack/UnNetHack/archive/refs/tags/5.3.2.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: unnethack
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:unnethack
  brew: brew install unnethack
  nix: nix profile install nixpkgs#unnethack
provenance:
  formula: unnethack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
