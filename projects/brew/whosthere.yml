id: brew:whosthere
display-name: whosthere
homepage: https://github.com/ramonvermeulen/whosthere
repo: https://github.com/ramonvermeulen/whosthere
docs: https://github.com/ramonvermeulen/whosthere
package-manager:
  brew: whosthere
  nix: whosthere
  scoop: main/whosthere
package-manager-url: https://formulae.brew.sh/formula/whosthere
version: 0.8.2
license: Apache-2.0
category: development
tags:
  - cli
description: LAN discovery tool with a modern TUI written in Go
source-archive: https://github.com/ramonvermeulen/whosthere/archive/refs/tags/v0.8.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: whosthere
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:whosthere
  brew: brew install whosthere
  nix: nix profile install nixpkgs#whosthere
  scoop: scoop install main/whosthere
provenance:
  formula: whosthere
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
