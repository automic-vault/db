id: brew:pqiv
display-name: pqiv
homepage: https://github.com/phillipberndt/pqiv
repo: https://github.com/phillipberndt/pqiv
docs: https://github.com/phillipberndt/pqiv
package-manager:
  apk: pqiv
  brew: pqiv
  debian: pqiv
  macports: pqiv
  nix: pqiv
  pacman: pqiv
  ubuntu: pqiv
  zypper: pqiv
package-manager-url: https://formulae.brew.sh/formula/pqiv
version: 2.13.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Powerful image viewer with minimal UI
source-archive: https://github.com/phillipberndt/pqiv/archive/refs/tags/2.13.3.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - harfbuzz
  - imagemagick
  - libarchive
  - libspectre
  - pango
  - poppler
  - webp
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pqiv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pqiv
  av: sudo av install brew:pqiv
  brew: brew install pqiv
  debian: sudo apt install pqiv
  macports: sudo port install pqiv
  nix: nix profile install nixpkgs#pqiv
  pacman: sudo pacman -S pqiv
  ubuntu: sudo apt install pqiv
  zypper: sudo zypper install pqiv
provenance:
  formula: pqiv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
