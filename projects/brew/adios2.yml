id: brew:adios2
display-name: adios2
homepage: https://adios2.readthedocs.io
repo: https://github.com/ornladios/ADIOS2
docs: https://adios2.readthedocs.io
package-manager:
  brew: adios2
  nix: adios2
  pacman: adios2
package-manager-url: https://formulae.brew.sh/formula/adios2
version: 2.12.1
license: Apache-2.0
category: development
tags:
  - cli
description: Next generation of ADIOS developed in the Exascale Computing Program
source-archive: https://github.com/ornladios/ADIOS2/archive/refs/tags/v2.12.1.tar.gz
dependencies:
  - c-blosc2
  - gcc
  - libfabric
  - libpng
  - libsodium
  - lz4
  - mpi4py
  - nanobind
  - numpy
  - open-mpi
  - openssl@3
  - pugixml
  - python@3.14
  - sqlite
  - yaml-cpp
  - zeromq
  - zstd
build-dependencies:
  - cmake
  - nlohmann-json
  - pybind11
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: adios2-config
  - exposure: global executable
    kind: cli
    name: adios2_deactivate_bp
  - exposure: global executable
    kind: cli
    name: adios2_iotest
  - exposure: global executable
    kind: cli
    name: adios2_json_pp
  - exposure: global executable
    kind: cli
    name: adios2_remote_server
  - exposure: global executable
    kind: cli
    name: adios2_reorganize
  - exposure: global executable
    kind: cli
    name: adios2_reorganize_mpi
  - exposure: global executable
    kind: cli
    name: bp4dbg
  - exposure: global executable
    kind: cli
    name: bp5dbg
  - exposure: global executable
    kind: cli
    name: bpls
  - exposure: global executable
    kind: cli
    name: sst_conn_tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:adios2
  brew: brew install adios2
  nix: nix profile install nixpkgs#adios2
  pacman: sudo pacman -S adios2
provenance:
  formula: adios2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
