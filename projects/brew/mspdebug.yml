id: brew:mspdebug
display-name: mspdebug
homepage: https://dlbeer.co.nz/mspdebug/
repo: https://github.com/dlbeer/mspdebug
docs: https://dlbeer.co.nz/mspdebug/
package-manager:
  apk: mspdebug
  brew: mspdebug
  debian: mspdebug
  macports: mspdebug
  nix: mspdebug
  ubuntu: mspdebug
package-manager-url: https://formulae.brew.sh/formula/mspdebug
version: 0.26
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Debugger for use with MSP430 MCUs
source-archive: https://github.com/dlbeer/mspdebug/archive/refs/tags/v0.26.tar.gz
dependencies:
  - hidapi
  - libusb-compat
executables:
  - exposure: global executable
    kind: cli
    name: mspdebug
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You may need to install a kernel extension if you're having trouble with RF2500-like
    devices such as the TI Launchpad: https://dlbeer.co.nz/mspdebug/faq.html#rf2500_osx
  post-install-defined: false
install-lines:
  apk: sudo apk add mspdebug
  av: sudo av install brew:mspdebug
  brew: brew install mspdebug
  debian: sudo apt install mspdebug
  macports: sudo port install mspdebug
  nix: nix profile install nixpkgs#mspdebug
  ubuntu: sudo apt install mspdebug
provenance:
  formula: mspdebug
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
