id: brew:worktrunk
display-name: worktrunk
homepage: https://worktrunk.dev
repo: https://github.com/max-sixty/worktrunk
docs: https://worktrunk.dev
package-manager:
  apk: wt
  brew: worktrunk
  macports: wt
  nix: worktrunk
  pacman: worktrunk
  scoop: main/worktrunk
  winget: max-sixty.worktrunk
  zypper: wt
package-manager-url: https://formulae.brew.sh/formula/worktrunk
version: 0.54.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
  - git
description: CLI for Git worktree management, designed for parallel AI agent workflows
source-archive: https://github.com/max-sixty/worktrunk/archive/refs/tags/v0.54.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: wt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wt
  av: sudo av install brew:worktrunk
  brew: brew install worktrunk
  macports: sudo port install wt
  nix: nix profile install nixpkgs#worktrunk
  pacman: sudo pacman -S worktrunk
  scoop: scoop install main/worktrunk
  winget: winget install --id max-sixty.worktrunk -e
  zypper: sudo zypper install wt
provenance:
  formula: worktrunk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
