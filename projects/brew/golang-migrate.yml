id: brew:golang-migrate
display-name: golang-migrate
homepage: https://github.com/golang-migrate/migrate
repo: https://github.com/golang-migrate/migrate
docs: https://github.com/golang-migrate/migrate
package-manager:
  brew: golang-migrate
  dnf: migrate
  nix: migrate
  scoop: main/migrate
package-manager-url: https://formulae.brew.sh/formula/golang-migrate
version: 4.19.1
license: MIT
category: database
tags:
  - cli
  - database
description: Database migrations CLI tool
source-archive: https://github.com/golang-migrate/migrate/archive/refs/tags/v4.19.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: migrate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:golang-migrate
  brew: brew install golang-migrate
  dnf: sudo dnf install migrate
  nix: nix profile install nixpkgs#migrate
  scoop: scoop install main/migrate
provenance:
  formula: golang-migrate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
