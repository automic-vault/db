id: brew:hurl
display-name: hurl
homepage: https://hurl.dev
repo: https://github.com/Orange-OpenSource/hurl
docs: https://hurl.dev
package-manager:
  apk: hurl
  brew: hurl
  macports: hurl
  nix: hurl
  pacman: hurl
  scoop: main/hurl
  winget: Orange-OpenSource.Hurl
  zypper: hurl
package-manager-url: https://formulae.brew.sh/formula/hurl
version: 8.0.1
license: Apache-2.0
category: development
tags:
  - cli
description: Run and Test HTTP Requests with plain text and curl
source-archive: https://github.com/Orange-OpenSource/hurl/archive/refs/tags/8.0.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - curl
  - libxml2
  - llvm
executables:
  - exposure: global executable
    kind: cli
    name: hurl
  - exposure: global executable
    kind: cli
    name: hurlfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hurl
  av: sudo av install brew:hurl
  brew: brew install hurl
  macports: sudo port install hurl
  nix: nix profile install nixpkgs#hurl
  pacman: sudo pacman -S hurl
  scoop: scoop install main/hurl
  winget: winget install --id Orange-OpenSource.Hurl -e
  zypper: sudo zypper install hurl
provenance:
  formula: hurl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
