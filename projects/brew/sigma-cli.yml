id: brew:sigma-cli
display-name: sigma-cli
homepage: https://github.com/SigmaHQ/sigma-cli
repo: >
  https://files.pythonhosted.org/packages/1b/de/eb5f4f643aa24d7dee1066ace1a1e2e7264c8089ebb85ffb8016761e654a/sigma_cli-3.0.2.tar.gz
docs: https://github.com/SigmaHQ/sigma-cli
package-manager:
  apk: sigma
  brew: sigma-cli
  nix: sigma-cli
  winget: AlekseyHoffman.Sigma-File-Manager
package-manager-url: https://formulae.brew.sh/formula/sigma-cli
version: 3.0.2
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: CLI based on pySigma
source-archive: >
  https://files.pythonhosted.org/packages/1b/de/eb5f4f643aa24d7dee1066ace1a1e2e7264c8089ebb85ffb8016761e654a/sigma_cli-3.0.2.tar.gz
dependencies:
  - certifi
  - libyaml
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: sigma
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sigma
  av: sudo av install brew:sigma-cli
  brew: brew install sigma-cli
  nix: nix profile install nixpkgs#sigma-cli
  winget: winget install --id AlekseyHoffman.Sigma-File-Manager -e
provenance:
  formula: sigma-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
