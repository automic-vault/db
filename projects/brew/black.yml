  dnf: sudo dnf install black
  nix: nix profile install nixpkgs#black
  ubuntu: sudo apt install black
  winget: winget install --id psf.black -e
provenance:
  formula: black
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
