id: brew:erdtree
display-name: erdtree
homepage: https://github.com/solidiquis/erdtree
repo: https://github.com/solidiquis/erdtree
docs: https://github.com/solidiquis/erdtree
package-manager:
  brew: erdtree
  macports: erd
  nix: erdtree
  pacman: erdtree
  scoop: main/erdtree
  winget: Solidiquis.Erdtree
  zypper: erdtree
package-manager-url: https://formulae.brew.sh/formula/erdtree
version: 3.1.2
license: MIT
category: development
tags:
  - cli
description: Multi-threaded file-tree visualizer and disk usage analyzer
source-archive: https://github.com/solidiquis/erdtree/archive/refs/tags/v3.1.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: erd
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:erdtree
  brew: brew install erdtree
  macports: sudo port install erd
  nix: nix profile install nixpkgs#erdtree
  pacman: sudo pacman -S erdtree
  scoop: scoop install main/erdtree
  winget: winget install --id Solidiquis.Erdtree -e
  zypper: sudo zypper install erdtree
provenance:
  formula: erdtree
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
