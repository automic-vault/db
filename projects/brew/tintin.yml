id: brew:tintin
display-name: tintin
homepage: https://tintin.mudhalla.net/
repo: https://github.com/scandum/tintin
docs: https://tintin.mudhalla.net/
package-manager:
  apk: tintin
  brew: tintin
  debian: tintin++
  dnf: tintin
  nix: tintin
  ubuntu: tintin++
package-manager-url: https://formulae.brew.sh/formula/tintin
version: 2.02.61
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: MUD client
source-archive: https://github.com/scandum/tintin/releases/download/2.02.61/tintin-2.02.61.tar.gz
dependencies:
  - gnutls
  - pcre2
executables:
  - exposure: global executable
    kind: cli
    name: tt++
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tintin
  av: sudo av install brew:tintin
  brew: brew install tintin
  debian: sudo apt install tintin++
  dnf: sudo dnf install tintin
  nix: nix profile install nixpkgs#tintin
  ubuntu: sudo apt install tintin++
provenance:
  formula: tintin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
