id: brew:lanraragi
display-name: lanraragi
homepage: https://github.com/Difegue/LANraragi
repo: https://github.com/Difegue/LANraragi
docs: https://github.com/Difegue/LANraragi
package-manager:
  brew: lanraragi
  nix: lanraragi
package-manager-url: https://formulae.brew.sh/formula/lanraragi
version: 0.9.71
license: MIT
category: development
tags:
  - cli
description: Web application for archival and reading of manga/doujinshi
source-archive: https://github.com/Difegue/LANraragi/archive/refs/tags/v.0.9.71.tar.gz
dependencies:
  - ghostscript
  - imagemagick
  - libarchive
  - node
  - openssl@3
  - perl
  - redis
  - zstd
build-dependencies:
  - cpanminus
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: lanraragi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lanraragi
  brew: brew install lanraragi
  nix: nix profile install nixpkgs#lanraragi
provenance:
  formula: lanraragi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
