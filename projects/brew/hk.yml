id: brew:hk
display-name: hk
homepage: https://hk.jdx.dev
repo: https://github.com/jdx/hk
docs: https://hk.jdx.dev
package-manager:
  brew: hk
  macports: hk
  scoop: main/hk
package-manager-url: https://formulae.brew.sh/formula/hk
version: 1.45.0
license: MIT
category: development
tags:
  - cli
  - git
description: Git hook and pre-commit lint manager
source-archive: https://github.com/jdx/hk.git
dependencies:
  - openssl@3
  - pkl
  - usage
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: generate-docs
  - exposure: global executable
    kind: cli
    name: hk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hk
  brew: brew install hk
  macports: sudo port install hk
  scoop: scoop install main/hk
provenance:
  formula: hk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
