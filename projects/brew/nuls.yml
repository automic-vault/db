id: brew:nuls
display-name: nuls
homepage: https://github.com/cesarferreira/nuls
repo: https://static.crates.io/crates/nuls/nuls-0.2.0.crate
docs: https://github.com/cesarferreira/nuls
package-manager:
  brew: nuls
package-manager-url: https://formulae.brew.sh/formula/nuls
version: 0.2.0
license: MIT
category: development
tags:
  - cli
description: NuShell-inspired ls with colorful table output
source-archive: https://static.crates.io/crates/nuls/nuls-0.2.0.crate
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: nuls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nuls
  brew: brew install nuls
provenance:
  formula: nuls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
