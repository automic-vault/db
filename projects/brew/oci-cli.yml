id: brew:oci-cli
display-name: oci-cli
homepage: https://docs.cloud.oracle.com/iaas/Content/API/Concepts/cliconcepts.htm
repo: >
  https://files.pythonhosted.org/packages/f8/56/1bfa4fca77ee8ad4fee72e9ba8ad3cd439f070773784ba20be7bb98ed3c2/oci_cli-3.83.0.tar.gz
docs: https://docs.cloud.oracle.com/iaas/Content/API/Concepts/cliconcepts.htm
package-manager:
  apk: oci-cli
  brew: oci-cli
  dnf: oci-cli
  macports: oci-cli
  nix: oci-cli
  scoop: main/oci-cli
  zypper: oci-cli
package-manager-url: https://formulae.brew.sh/formula/oci-cli
version: 3.83.0
license: UPL-1.0 OR Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Oracle Cloud Infrastructure CLI
source-archive: >
  https://files.pythonhosted.org/packages/f8/56/1bfa4fca77ee8ad4fee72e9ba8ad3cd439f070773784ba20be7bb98ed3c2/oci_cli-3.83.0.tar.gz
dependencies:
  - certifi
  - cryptography
  - libyaml
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: create_backup_from_onprem
  - exposure: global executable
    kind: cli
    name: oci
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add oci-cli
  av: sudo av install brew:oci-cli
  brew: brew install oci-cli
  dnf: sudo dnf install oci-cli
  macports: sudo port install oci-cli
  nix: nix profile install nixpkgs#oci-cli
  scoop: scoop install main/oci-cli
  zypper: sudo zypper install oci-cli
provenance:
  formula: oci-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
