id: brew:cargo-component
display-name: cargo-component
homepage: https://github.com/bytecodealliance/cargo-component
repo: https://github.com/bytecodealliance/cargo-component
docs: https://github.com/bytecodealliance/cargo-component
package-manager:
  brew: cargo-component
  nix: cargo-component
package-manager-url: https://formulae.brew.sh/formula/cargo-component
version: 0.21.1
license: Apache-2.0
category: development
tags:
  - cli
description: Create WebAssembly components based on the component model proposal
source-archive: https://github.com/bytecodealliance/cargo-component/archive/refs/tags/v0.21.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-component
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-component
  brew: brew install cargo-component
  nix: nix profile install nixpkgs#cargo-component
provenance:
  formula: cargo-component
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
