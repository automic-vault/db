id: brew:orc
display-name: orc
homepage: https://gstreamer.freedesktop.org/modules/orc.html
repo: https://gstreamer.freedesktop.org/src/orc/orc-0.4.42.tar.xz
docs: https://gstreamer.freedesktop.org/modules/orc.html
package-manager:
  apk: orc
  brew: orc
  dnf: orc
  macports: orc
  nix: orc
  pacman: orc
  zypper: orc
package-manager-url: https://formulae.brew.sh/formula/orc
version: 0.4.42
license: BSD-2-Clause AND BSD-3-Clause
category: development
tags:
  - cli
description: Oil Runtime Compiler (ORC)
source-archive: https://gstreamer.freedesktop.org/src/orc/orc-0.4.42.tar.xz
build-dependencies:
  - meson
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: orc-bugreport
  - exposure: global executable
    kind: cli
    name: orcc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add orc
  av: sudo av install brew:orc
  brew: brew install orc
  dnf: sudo dnf install orc
  macports: sudo port install orc
  nix: nix profile install nixpkgs#orc
  pacman: sudo pacman -S orc
  zypper: sudo zypper install orc
provenance:
  formula: orc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
