id: brew:libcoap
display-name: libcoap
homepage: https://github.com/obgm/libcoap
repo: https://github.com/obgm/libcoap
docs: https://github.com/obgm/libcoap
package-manager:
  apk: libcoap
  brew: libcoap
  dnf: libcoap
  nix: libcoap
package-manager-url: https://formulae.brew.sh/formula/libcoap
version: 4.3.5b
license: BSD-2-Clause
category: development
tags:
  - cli
description: Lightweight application-protocol for resource-constrained devices
source-archive: https://github.com/obgm/libcoap/archive/refs/tags/v4.3.5b.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: coap-client
  - exposure: global executable
    kind: cli
    name: coap-client-openssl
  - exposure: global executable
    kind: cli
    name: coap-rd
  - exposure: global executable
    kind: cli
    name: coap-rd-openssl
  - exposure: global executable
    kind: cli
    name: coap-server
  - exposure: global executable
    kind: cli
    name: coap-server-openssl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libcoap
  av: sudo av install brew:libcoap
  brew: brew install libcoap
  dnf: sudo dnf install libcoap
  nix: nix profile install nixpkgs#libcoap
provenance:
  formula: libcoap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
