id: brew:openlist
display-name: openlist
homepage: https://doc.oplist.org/
repo: https://github.com/OpenListTeam/OpenList
docs: https://doc.oplist.org/
package-manager:
  brew: openlist
  nix: openlist
  scoop: main/openlist
  winget: OpenListTeam.OpenList
package-manager-url: https://formulae.brew.sh/formula/openlist
version: 4.2.2
license: AGPL-3.0-only
category: development
tags:
  - cli
description: New AList fork addressing anti-trust issues
source-archive: https://github.com/OpenListTeam/OpenList/archive/refs/tags/v4.2.2.tar.gz
build-dependencies:
  - go
  - node
  - pnpm
executables:
  - exposure: global executable
    kind: cli
    name: openlist
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:openlist
  brew: brew install openlist
  nix: nix profile install nixpkgs#openlist
  scoop: scoop install main/openlist
  winget: winget install --id OpenListTeam.OpenList -e
provenance:
  formula: openlist
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
