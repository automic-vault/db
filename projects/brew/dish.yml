id: brew:dish
display-name: dish
homepage: https://github.com/thevxn/dish
repo: https://github.com/thevxn/dish
docs: https://github.com/thevxn/dish
package-manager:
  brew: dish
  debian: dish
  ubuntu: dish
package-manager-url: https://formulae.brew.sh/formula/dish
version: 1.12.0
license: MIT
category: development
tags:
  - cli
description: Lightweight monitoring service that efficiently checks socket connections
source-archive: https://github.com/thevxn/dish/archive/refs/tags/v1.12.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dish
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dish
  brew: brew install dish
  debian: sudo apt install dish
  ubuntu: sudo apt install dish
provenance:
  formula: dish
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
