id: brew:uni
display-name: uni
homepage: https://github.com/arp242/uni
repo: https://github.com/arp242/uni
docs: https://github.com/arp242/uni
package-manager:
  apk: uni
  brew: uni
  macports: uni
  nix: uni
package-manager-url: https://formulae.brew.sh/formula/uni
version: 2.9.0
license: MIT
category: database
tags:
  - cli
  - database
description: Unicode database query tool for the command-line
source-archive: https://github.com/arp242/uni/archive/refs/tags/v2.9.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: uni
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add uni
  av: sudo av install brew:uni
  brew: brew install uni
  macports: sudo port install uni
  nix: nix profile install nixpkgs#uni
provenance:
  formula: uni
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
