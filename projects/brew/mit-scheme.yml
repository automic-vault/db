id: brew:mit-scheme
display-name: mit-scheme
homepage: https://www.gnu.org/software/mit-scheme/
repo: >
  https://ftpmirror.gnu.org/gnu/mit-scheme/stable.pkg/12.1/mit-scheme-12.1-svm1-64le.tar.gz
docs: https://www.gnu.org/software/mit-scheme/
package-manager:
  brew: mit-scheme
  debian: mit-scheme
  macports: mit-scheme
  ubuntu: mit-scheme
package-manager-url: https://formulae.brew.sh/formula/mit-scheme
version: 12.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: MIT/GNU Scheme development tools and runtime library
source-archive: >
  https://ftpmirror.gnu.org/gnu/mit-scheme/stable.pkg/12.1/mit-scheme-12.1-svm1-64le.tar.gz
build-dependencies:
  - texinfo
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: mit-scheme
  - exposure: global executable
    kind: cli
    name: mit-scheme-svm1-64le
  - exposure: global executable
    kind: cli
    name: mit-scheme-svm1-64le-12.1
  - exposure: global executable
    kind: cli
    name: scheme
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mit-scheme
  brew: brew install mit-scheme
  debian: sudo apt install mit-scheme
  macports: sudo port install mit-scheme
  ubuntu: sudo apt install mit-scheme
provenance:
  formula: mit-scheme
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
