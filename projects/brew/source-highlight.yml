id: brew:source-highlight
display-name: source-highlight
homepage: https://www.gnu.org/software/src-highlite/
repo: https://ftpmirror.gnu.org/gnu/src-highlite/source-highlight-3.1.9.tar.gz
docs: https://www.gnu.org/software/src-highlite/
package-manager:
  apk: source-highlight
  brew: source-highlight
  debian: source-highlight
  dnf: source-highlight
  macports: source-highlight
  pacman: source-highlight
  ubuntu: source-highlight
  zypper: source-highlight
package-manager-url: https://formulae.brew.sh/formula/source-highlight
version: 3.1.9
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Source-code syntax highlighter
source-archive: https://ftpmirror.gnu.org/gnu/src-highlite/source-highlight-3.1.9.tar.gz
dependencies:
  - boost
executables:
  - exposure: global executable
    kind: cli
    name: check-regexp
  - exposure: global executable
    kind: cli
    name: cpp2html
  - exposure: global executable
    kind: cli
    name: java2html
  - exposure: global executable
    kind: cli
    name: source-highlight
  - exposure: global executable
    kind: cli
    name: source-highlight-esc.sh
  - exposure: global executable
    kind: cli
    name: source-highlight-settings
  - exposure: global executable
    kind: cli
    name: src-hilite-lesspipe.sh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add source-highlight
  av: sudo av install brew:source-highlight
  brew: brew install source-highlight
  debian: sudo apt install source-highlight
  dnf: sudo dnf install source-highlight
  macports: sudo port install source-highlight
  pacman: sudo pacman -S source-highlight
  ubuntu: sudo apt install source-highlight
  zypper: sudo zypper install source-highlight
provenance:
  formula: source-highlight
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
