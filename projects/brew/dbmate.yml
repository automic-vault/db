id: brew:dbmate
display-name: dbmate
homepage: https://github.com/amacneil/dbmate
repo: https://github.com/amacneil/dbmate
docs: https://github.com/amacneil/dbmate
package-manager:
  apk: dbmate
  brew: dbmate
  nix: dbmate
  pacman: dbmate
  scoop: main/dbmate
  winget: amacneil.dbmate
package-manager-url: https://formulae.brew.sh/formula/dbmate
version: 2.33.0
license: MIT
category: database
tags:
  - cli
  - database
description: Lightweight, framework-agnostic database migration tool
source-archive: https://github.com/amacneil/dbmate/archive/refs/tags/v2.33.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dbmate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dbmate
  av: sudo av install brew:dbmate
  brew: brew install dbmate
  nix: nix profile install nixpkgs#dbmate
  pacman: sudo pacman -S dbmate
  scoop: scoop install main/dbmate
  winget: winget install --id amacneil.dbmate -e
provenance:
  formula: dbmate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
