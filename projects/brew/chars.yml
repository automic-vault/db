id: brew:chars
display-name: chars
homepage: https://github.com/boinkor-net/chars/
repo: https://github.com/boinkor-net/chars
docs: https://github.com/boinkor-net/chars/
package-manager:
  brew: chars
  nix: chars
package-manager-url: https://formulae.brew.sh/formula/chars
version: 0.7.0
license: MIT
category: development
tags:
  - cli
description: Command-line tool to display information about unicode characters
source-archive: https://github.com/boinkor-net/chars/archive/refs/tags/v0.7.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: chars
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chars
  brew: brew install chars
  nix: nix profile install nixpkgs#chars
provenance:
  formula: chars
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
