id: brew:jed
display-name: jed
homepage: https://www.jedsoft.org/jed/
repo: https://www.jedsoft.org/releases/jed/jed-0.99-19.tar.gz
docs: https://www.jedsoft.org/jed/
package-manager:
  brew: jed
  debian: jed
  dnf: jed
  macports: jed
  nix: jed
  ubuntu: jed
  zypper: jed
package-manager-url: https://formulae.brew.sh/formula/jed
version: 0.99-19
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Powerful editor for programmers
source-archive: https://www.jedsoft.org/releases/jed/jed-0.99-19.tar.gz
dependencies:
  - s-lang
executables:
  - exposure: global executable
    kind: cli
    name: jed
  - exposure: global executable
    kind: cli
    name: jed-script
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jed
  brew: brew install jed
  debian: sudo apt install jed
  dnf: sudo dnf install jed
  macports: sudo port install jed
  nix: nix profile install nixpkgs#jed
  ubuntu: sudo apt install jed
  zypper: sudo zypper install jed
provenance:
  formula: jed
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
