id: brew:vsce
display-name: vsce
homepage: https://code.visualstudio.com/api/working-with-extensions/publishing-extension#vsce
repo: https://registry.npmjs.org/@vscode/vsce/-/vsce-3.9.1.tgz
docs: https://code.visualstudio.com/api/working-with-extensions/publishing-extension#vsce
package-manager:
  brew: vsce
  nix: vsce
package-manager-url: https://formulae.brew.sh/formula/vsce
version: 3.9.1
license: MIT
category: network
tags:
  - cli
description: Tool for packaging, publishing and managing VS Code extensions
source-archive: https://registry.npmjs.org/@vscode/vsce/-/vsce-3.9.1.tgz
dependencies:
  - node
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: vsce
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vsce
  brew: brew install vsce
  nix: nix profile install nixpkgs#vsce
provenance:
  formula: vsce
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
