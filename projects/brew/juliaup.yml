id: brew:juliaup
display-name: juliaup
homepage: https://github.com/JuliaLang/juliaup
repo: https://github.com/JuliaLang/juliaup
docs: https://github.com/JuliaLang/juliaup
package-manager:
  brew: juliaup
  scoop: main/juliaup
  zypper: juliaup
package-manager-url: https://formulae.brew.sh/formula/juliaup
version: 1.20.1
license: MIT
category: development
tags:
  - cli
description: Julia installer and version multiplexer
source-archive: https://github.com/JuliaLang/juliaup/archive/refs/tags/v1.20.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: julialauncher
  - exposure: global executable
    kind: cli
    name: juliaup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:juliaup
  brew: brew install juliaup
  scoop: scoop install main/juliaup
  zypper: sudo zypper install juliaup
provenance:
  formula: juliaup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
