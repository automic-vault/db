id: brew:smlfmt
display-name: smlfmt
homepage: https://github.com/shwestrick/smlfmt
repo: https://github.com/shwestrick/smlfmt
docs: https://github.com/shwestrick/smlfmt
package-manager:
  brew: smlfmt
  nix: smlfmt
package-manager-url: https://formulae.brew.sh/formula/smlfmt
version: 1.3.0
license: MIT
category: development
tags:
  - cli
description: Custom parser and code formatter for Standard ML
source-archive: https://github.com/shwestrick/smlfmt/archive/refs/tags/v1.3.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - mlton
executables:
  - exposure: global executable
    kind: cli
    name: smlfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:smlfmt
  brew: brew install smlfmt
  nix: nix profile install nixpkgs#smlfmt
provenance:
  formula: smlfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
