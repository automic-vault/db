id: brew:kubebuilder
display-name: kubebuilder
homepage: https://github.com/kubernetes-sigs/kubebuilder
repo: https://github.com/kubernetes-sigs/kubebuilder
docs: https://github.com/kubernetes-sigs/kubebuilder
package-manager:
  brew: kubebuilder
  nix: kubebuilder
package-manager-url: https://formulae.brew.sh/formula/kubebuilder
version: 4.14.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: SDK for building Kubernetes APIs using CRDs
source-archive: https://github.com/kubernetes-sigs/kubebuilder.git
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubebuilder
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubebuilder
  brew: brew install kubebuilder
  nix: nix profile install nixpkgs#kubebuilder
provenance:
  formula: kubebuilder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
