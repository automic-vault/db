id: brew:tomee-plus
display-name: tomee-plus
homepage: https://tomee.apache.org/
repo: >
  https://www.apache.org/dyn/closer.lua?path=tomee/tomee-10.1.5/apache-tomee-10.1.5-plus.tar.gz
docs: https://tomee.apache.org/
package-manager:
  brew: tomee-plus
package-manager-url: https://formulae.brew.sh/formula/tomee-plus
version: 10.1.5
license: Apache-2.0
category: network
tags:
  - cli
description: Everything in TomEE Web Profile and JAX-RS, plus more
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=tomee/tomee-10.1.5/apache-tomee-10.1.5-plus.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: tomee-plus-startup
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The home of Apache TomEE Plus is: $HOMEBREW_PREFIX/opt/tomee-plus/libexec To run
    Apache TomEE: $HOMEBREW_PREFIX/opt/tomee-plus/libexec/bin/tomee-plus-startup
  post-install-defined: false
install-lines:
  av: sudo av install brew:tomee-plus
  brew: brew install tomee-plus
provenance:
  formula: tomee-plus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
