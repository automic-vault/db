id: brew:bower
display-name: bower
homepage: https://bower.io/
repo: https://registry.npmjs.org/bower/-/bower-1.8.14.tgz
docs: https://bower.io/
package-manager:
  apk: bower
  brew: bower
  chocolatey: bower
  pacman: bower
package-manager-url: https://formulae.brew.sh/formula/bower
version: 1.8.14
license: MIT
category: network
tags:
  - cli
description: Package manager for the web
source-archive: https://registry.npmjs.org/bower/-/bower-1.8.14.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: bower
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bower
  av: sudo av install brew:bower
  brew: brew install bower
  chocolatey: choco install bower
  pacman: sudo pacman -S bower
provenance:
  formula: bower
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
