id: brew:zsh-history-enquirer
display-name: zsh-history-enquirer
homepage: https://zsh-history-enquirer.zthxxx.me
repo: https://registry.npmjs.org/zsh-history-enquirer/-/zsh-history-enquirer-1.3.1.tgz
docs: https://zsh-history-enquirer.zthxxx.me
package-manager:
  brew: zsh-history-enquirer
package-manager-url: https://formulae.brew.sh/formula/zsh-history-enquirer
version: 1.3.1
license: MIT
category: network
tags:
  - cli
description: Zsh plugin that enhances history search interaction
source-archive: https://registry.npmjs.org/zsh-history-enquirer/-/zsh-history-enquirer-1.3.1.tgz
dependencies:
  - node
uses-from-macos:
  - zsh
executables:
  - exposure: global executable
    kind: cli
    name: zsh-history-enquirer
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To activate zsh-history-enquirer, add the following to your .zshrc: autoload -U
    history_enquire history_enquire
  post-install-defined: false
install-lines:
  av: sudo av install brew:zsh-history-enquirer
  brew: brew install zsh-history-enquirer
provenance:
  formula: zsh-history-enquirer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
