id: brew:enchive
display-name: enchive
homepage: https://github.com/skeeto/enchive
repo: https://github.com/skeeto/enchive
docs: https://github.com/skeeto/enchive
package-manager:
  brew: enchive
  nix: enchive
  zypper: enchive
package-manager-url: https://formulae.brew.sh/formula/enchive
version: 3.5
license: Unlicense
category: security
tags:
  - cli
description: Encrypted personal archives
source-archive: https://github.com/skeeto/enchive/releases/download/3.5/enchive-3.5.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: enchive
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:enchive
  brew: brew install enchive
  nix: nix profile install nixpkgs#enchive
  zypper: sudo zypper install enchive
provenance:
  formula: enchive
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
