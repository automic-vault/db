id: brew:dscanner
display-name: dscanner
homepage: https://github.com/dlang-community/D-Scanner
repo: https://github.com/dlang-community/D-Scanner
docs: https://github.com/dlang-community/D-Scanner
package-manager:
  brew: dscanner
  nix: dscanner
  pacman: dscanner
package-manager-url: https://formulae.brew.sh/formula/dscanner
version: 0.15.2
license: BSL-1.0
category: development
tags:
  - cli
description: Analyses e.g. the style and syntax of D code
source-archive: https://github.com/dlang-community/D-Scanner.git
build-dependencies:
  - ldc
executables:
  - exposure: global executable
    kind: cli
    name: dscanner
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dscanner
  brew: brew install dscanner
  nix: nix profile install nixpkgs#dscanner
  pacman: sudo pacman -S dscanner
provenance:
  formula: dscanner
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
