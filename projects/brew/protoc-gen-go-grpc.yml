id: brew:protoc-gen-go-grpc
display-name: protoc-gen-go-grpc
homepage: https://github.com/grpc/grpc-go
repo: https://github.com/grpc/grpc-go
docs: https://github.com/grpc/grpc-go
package-manager:
  apk: protoc-gen-go-grpc
  brew: protoc-gen-go-grpc
  debian: protoc-gen-go-grpc
  nix: protoc-gen-go-grpc
  ubuntu: protoc-gen-go-grpc
package-manager-url: https://formulae.brew.sh/formula/protoc-gen-go-grpc
version: 1.6.2
license: Apache-2.0
category: development
tags:
  - cli
description: Protoc plugin that generates code for gRPC-Go clients
source-archive: https://github.com/grpc/grpc-go/archive/refs/tags/cmd/protoc-gen-go-grpc/v1.6.2.tar.gz
dependencies:
  - protobuf
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: protoc-gen-go-grpc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add protoc-gen-go-grpc
  av: sudo av install brew:protoc-gen-go-grpc
  brew: brew install protoc-gen-go-grpc
  debian: sudo apt install protoc-gen-go-grpc
  nix: nix profile install nixpkgs#protoc-gen-go-grpc
  ubuntu: sudo apt install protoc-gen-go-grpc
provenance:
  formula: protoc-gen-go-grpc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
