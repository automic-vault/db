id: brew:qca
display-name: qca
homepage: https://userbase.kde.org/QCA
repo: https://download.kde.org/stable/qca/2.3.10/qca-2.3.10.tar.xz
docs: https://userbase.kde.org/QCA
package-manager:
  apk: qca
  brew: qca
  macports: qca
package-manager-url: https://formulae.brew.sh/formula/qca
version: 2.3.10
license: LGPL-2.1-or-later
category: security
tags:
  - cli
description: Qt Cryptographic Architecture (QCA)
source-archive: https://download.kde.org/stable/qca/2.3.10/qca-2.3.10.tar.xz
dependencies:
  - botan
  - ca-certificates
  - gnupg
  - libgcrypt
  - nspr
  - nss
  - openssl@3
  - pkcs11-helper
  - qt5compat
  - qtbase
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - cyrus-sasl
executables:
  - exposure: global executable
    kind: cli
    name: mozcerts-qt6
  - exposure: global executable
    kind: cli
    name: qcatool-qt6
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add qca
  av: sudo av install brew:qca
  brew: brew install qca
  macports: sudo port install qca
provenance:
  formula: qca
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
