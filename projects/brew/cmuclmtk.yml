id: brew:cmuclmtk
display-name: cmuclmtk
homepage: https://cmusphinx.sourceforge.net/
repo: https://downloads.sourceforge.net/project/cmusphinx/cmuclmtk/0.7/cmuclmtk-0.7.tar.gz
docs: https://cmusphinx.sourceforge.net/
package-manager:
  brew: cmuclmtk
  macports: cmuclmtk
  zypper: cmuclmtk
package-manager-url: https://formulae.brew.sh/formula/cmuclmtk
version: 0.7
license: BSD-2-Clause
category: development
tags:
  - cli
description: Language model tools (from CMU Sphinx)
source-archive: https://downloads.sourceforge.net/project/cmusphinx/cmuclmtk/0.7/cmuclmtk-0.7.tar.gz
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: evallm
  - exposure: global executable
    kind: cli
    name: idngram2lm
  - exposure: global executable
    kind: cli
    name: idngram2stats
  - exposure: global executable
    kind: cli
    name: lm_combine
  - exposure: global executable
    kind: cli
    name: lm_interpolate
  - exposure: global executable
    kind: cli
    name: mergeidngram
  - exposure: global executable
    kind: cli
    name: ngram2mgram
  - exposure: global executable
    kind: cli
    name: text2idngram
  - exposure: global executable
    kind: cli
    name: text2wfreq
  - exposure: global executable
    kind: cli
    name: text2wngram
  - exposure: global executable
    kind: cli
    name: wfreq2vocab
  - exposure: global executable
    kind: cli
    name: wngram2idngram
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cmuclmtk
  brew: brew install cmuclmtk
  macports: sudo port install cmuclmtk
  zypper: sudo zypper install cmuclmtk
provenance:
  formula: cmuclmtk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
