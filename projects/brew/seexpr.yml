id: brew:seexpr
display-name: seexpr
homepage: https://wdas.github.io/SeExpr/
repo: https://github.com/wdas/SeExpr
docs: https://wdas.github.io/SeExpr/
package-manager:
  brew: seexpr
package-manager-url: https://formulae.brew.sh/formula/seexpr
version: 3.0.1
license: Apache-2.0
category: development
tags:
  - cli
description: Embeddable expression evaluation engine
source-archive: https://github.com/wdas/SeExpr/archive/refs/tags/v3.0.1.tar.gz
dependencies:
  - libpng
build-dependencies:
  - cmake
  - doxygen
executables:
  - exposure: global executable
    kind: cli
    name: asciiCalc2
  - exposure: global executable
    kind: cli
    name: asciiGraph2
  - exposure: global executable
    kind: cli
    name: imageSynth2
  - exposure: global executable
    kind: cli
    name: imageSynthPaint3d2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:seexpr
  brew: brew install seexpr
provenance:
  formula: seexpr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
