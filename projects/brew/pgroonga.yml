id: brew:pgroonga
display-name: pgroonga
homepage: https://pgroonga.github.io/
repo: https://packages.groonga.org/source/pgroonga/pgroonga-4.0.6.tar.gz
docs: https://pgroonga.github.io/
package-manager:
  brew: pgroonga
package-manager-url: https://formulae.brew.sh/formula/pgroonga
version: 4.0.6
license: PostgreSQL
category: database
tags:
  - cli
description: PostgreSQL plugin to use Groonga as index
source-archive: https://packages.groonga.org/source/pgroonga/pgroonga-4.0.6.tar.gz
dependencies:
  - groonga
  - msgpack
  - xxhash
build-dependencies:
  - meson
  - ninja
  - pkgconf
  - postgresql@17
  - postgresql@18
executables:
  - exposure: global executable
    kind: cli
    name: pgroonga-generate-primary-maintainer-service.sh
  - exposure: global executable
    kind: cli
    name: pgroonga-generate-primary-maintainer-timer.sh
  - exposure: global executable
    kind: cli
    name: pgroonga-primary-maintainer.sh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pgroonga
  brew: brew install pgroonga
provenance:
  formula: pgroonga
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
