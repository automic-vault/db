id: brew:micronaut
display-name: micronaut
homepage: https://micronaut.io/
repo: https://github.com/micronaut-projects/micronaut-starter
docs: https://micronaut.io/
package-manager:
  brew: micronaut
  chocolatey: micronaut
  macports: micronaut
  nix: micronaut
  scoop: main/micronaut
  winget: Micronaut.Launch
package-manager-url: https://formulae.brew.sh/formula/micronaut
version: 5.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: Modern JVM-based framework for building modular microservices
source-archive: https://github.com/micronaut-projects/micronaut-starter/archive/refs/tags/v5.0.0.tar.gz
dependencies:
  - openjdk@25
build-dependencies:
  - gradle
executables:
  - exposure: global executable
    kind: cli
    name: mn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:micronaut
  brew: brew install micronaut
  chocolatey: choco install micronaut
  macports: sudo port install micronaut
  nix: nix profile install nixpkgs#micronaut
  scoop: scoop install main/micronaut
  winget: winget install --id Micronaut.Launch -e
provenance:
  formula: micronaut
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
