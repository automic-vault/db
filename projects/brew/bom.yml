id: brew:bom
display-name: bom
homepage: https://kubernetes-sigs.github.io/bom/
repo: https://github.com/kubernetes-sigs/bom
docs: https://kubernetes-sigs.github.io/bom/
package-manager:
  brew: bom
  nix: bom
  scoop: main/bom
  zypper: bom
package-manager-url: https://formulae.brew.sh/formula/bom
version: 0.7.1
license: Apache-2.0
category: cloud
tags:
  - cli
description: Utility to generate SPDX-compliant Bill of Materials manifests
source-archive: https://github.com/kubernetes-sigs/bom/archive/refs/tags/v0.7.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bom
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bom
  brew: brew install bom
  nix: nix profile install nixpkgs#bom
  scoop: scoop install main/bom
  zypper: sudo zypper install bom
provenance:
  formula: bom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
