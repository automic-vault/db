id: brew:libbs2b
display-name: libbs2b
homepage: https://bs2b.sourceforge.net/
repo: https://downloads.sourceforge.net/project/bs2b/libbs2b/3.1.0/libbs2b-3.1.0.tar.gz
docs: https://bs2b.sourceforge.net/
package-manager:
  apk: libbs2b
  brew: libbs2b
  dnf: libbs2b
  macports: libbs2b
  nix: libbs2b
  pacman: libbs2b
package-manager-url: https://formulae.brew.sh/formula/libbs2b
version: 3.1.0
license: MIT
category: network
tags:
  - cli
description: Bauer stereophonic-to-binaural DSP
source-archive: https://downloads.sourceforge.net/project/bs2b/libbs2b/3.1.0/libbs2b-3.1.0.tar.gz
dependencies:
  - libsndfile
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: bs2bconvert
  - exposure: global executable
    kind: cli
    name: bs2bstream
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libbs2b
  av: sudo av install brew:libbs2b
  brew: brew install libbs2b
  dnf: sudo dnf install libbs2b
  macports: sudo port install libbs2b
  nix: nix profile install nixpkgs#libbs2b
  pacman: sudo pacman -S libbs2b
provenance:
  formula: libbs2b
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
