id: brew:toilet
display-name: toilet
homepage: http://caca.zoy.org/wiki/toilet
repo: https://deb.debian.org/debian/pool/main/t/toilet/toilet_0.3.orig.tar.gz
docs: http://caca.zoy.org/wiki/toilet
package-manager:
  brew: toilet
  debian: toilet
  dnf: toilet
  macports: toilet
  nix: toilet
  pacman: toilet
  ubuntu: toilet
  zypper: toilet
package-manager-url: https://formulae.brew.sh/formula/toilet
version: 0.3
license: WTFPL
category: network
tags:
  - cli
description: Color-based alternative to figlet (uses libcaca)
source-archive: https://deb.debian.org/debian/pool/main/t/toilet/toilet_0.3.orig.tar.gz
dependencies:
  - libcaca
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: toilet
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:toilet
  brew: brew install toilet
  debian: sudo apt install toilet
  dnf: sudo dnf install toilet
  macports: sudo port install toilet
  nix: nix profile install nixpkgs#toilet
  pacman: sudo pacman -S toilet
  ubuntu: sudo apt install toilet
  zypper: sudo zypper install toilet
provenance:
  formula: toilet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
