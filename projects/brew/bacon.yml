id: brew:bacon
display-name: bacon
homepage: https://dystroy.org/bacon/
repo: https://github.com/Canop/bacon
docs: https://dystroy.org/bacon/
package-manager:
  apk: bacon
  brew: bacon
  debian: bacon
  nix: bacon
  pacman: bacon
package-manager-url: https://formulae.brew.sh/formula/bacon
version: 3.23.0
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Background rust code check
source-archive: https://github.com/Canop/bacon/archive/refs/tags/v3.23.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bacon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bacon
  av: sudo av install brew:bacon
  brew: brew install bacon
  debian: sudo apt install bacon
  nix: nix profile install nixpkgs#bacon
  pacman: sudo pacman -S bacon
provenance:
  formula: bacon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
