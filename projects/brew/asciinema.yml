id: brew:asciinema
display-name: asciinema
homepage: https://asciinema.org
repo: https://github.com/asciinema/asciinema
docs: https://asciinema.org
package-manager:
  apk: asciinema
  brew: asciinema
  debian: asciinema
  dnf: asciinema
  macports: asciinema
  nix: asciinema
  pacman: asciinema
  ubuntu: asciinema
  zypper: asciinema
package-manager-url: https://formulae.brew.sh/formula/asciinema
version: 3.2.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Record and share terminal sessions
source-archive: https://github.com/asciinema/asciinema/archive/refs/tags/v3.2.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: asciinema
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add asciinema
  av: sudo av install brew:asciinema
  brew: brew install asciinema
  debian: sudo apt install asciinema
  dnf: sudo dnf install asciinema
  macports: sudo port install asciinema
  nix: nix profile install nixpkgs#asciinema
  pacman: sudo pacman -S asciinema
  ubuntu: sudo apt install asciinema
  zypper: sudo zypper install asciinema
provenance:
  formula: asciinema
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
