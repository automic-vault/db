id: brew:libunicode
display-name: libunicode
homepage: https://github.com/contour-terminal/libunicode
repo: https://github.com/contour-terminal/libunicode
docs: https://github.com/contour-terminal/libunicode
package-manager:
  apk: libunicode
  brew: libunicode
  dnf: libunicode
  nix: libunicode
  pacman: libunicode
package-manager-url: https://formulae.brew.sh/formula/libunicode
version: 0.9.0
license: Apache-2.0
category: development
tags:
  - cli
description: Modern C++20 Unicode library
source-archive: https://github.com/contour-terminal/libunicode/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: unicode-query
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libunicode
  av: sudo av install brew:libunicode
  brew: brew install libunicode
  dnf: sudo dnf install libunicode
  nix: nix profile install nixpkgs#libunicode
  pacman: sudo pacman -S libunicode
provenance:
  formula: libunicode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
