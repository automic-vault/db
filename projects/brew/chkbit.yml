id: brew:chkbit
display-name: chkbit
homepage: https://github.com/laktak/chkbit
repo: https://github.com/laktak/chkbit
docs: https://github.com/laktak/chkbit
package-manager:
  brew: chkbit
  nix: chkbit
package-manager-url: https://formulae.brew.sh/formula/chkbit
version: 6.6.0
license: MIT
category: development
tags:
  - cli
description: Check your files for data corruption
source-archive: https://github.com/laktak/chkbit/archive/refs/tags/v6.6.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: chkbit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chkbit
  brew: brew install chkbit
  nix: nix profile install nixpkgs#chkbit
provenance:
  formula: chkbit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
