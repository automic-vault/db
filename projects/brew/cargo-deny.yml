id: brew:cargo-deny
display-name: cargo-deny
homepage: https://github.com/EmbarkStudios/cargo-deny
repo: https://github.com/EmbarkStudios/cargo-deny
docs: https://github.com/EmbarkStudios/cargo-deny
package-manager:
  apk: cargo-deny
  brew: cargo-deny
  dnf: cargo-deny
  nix: cargo-deny
  pacman: cargo-deny
package-manager-url: https://formulae.brew.sh/formula/cargo-deny
version: 0.19.7
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Cargo plugin for linting your dependencies
source-archive: https://github.com/EmbarkStudios/cargo-deny/archive/refs/tags/0.19.7.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-deny
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-deny
  av: sudo av install brew:cargo-deny
  brew: brew install cargo-deny
  dnf: sudo dnf install cargo-deny
  nix: nix profile install nixpkgs#cargo-deny
  pacman: sudo pacman -S cargo-deny
provenance:
  formula: cargo-deny
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
