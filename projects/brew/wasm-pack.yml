id: brew:wasm-pack
display-name: wasm-pack
homepage: https://wasm-bindgen.github.io/wasm-pack/
repo: https://github.com/wasm-bindgen/wasm-pack
docs: https://wasm-bindgen.github.io/wasm-pack/
package-manager:
  apk: wasm-pack
  brew: wasm-pack
  macports: wasm-pack
  nix: wasm-pack
  pacman: wasm-pack
  zypper: wasm-pack
package-manager-url: https://formulae.brew.sh/formula/wasm-pack
version: 0.15.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Your favorite rust -> wasm workflow tool!
source-archive: https://github.com/wasm-bindgen/wasm-pack/archive/refs/tags/v0.15.0.tar.gz
dependencies:
  - rustup
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: wasm-pack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wasm-pack
  av: sudo av install brew:wasm-pack
  brew: brew install wasm-pack
  macports: sudo port install wasm-pack
  nix: nix profile install nixpkgs#wasm-pack
  pacman: sudo pacman -S wasm-pack
  zypper: sudo zypper install wasm-pack
provenance:
  formula: wasm-pack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
