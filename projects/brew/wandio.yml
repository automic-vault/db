id: brew:wandio
display-name: wandio
homepage: https://github.com/LibtraceTeam/wandio
repo: https://github.com/LibtraceTeam/wandio
docs: https://github.com/LibtraceTeam/wandio
package-manager:
  brew: wandio
  macports: wandio
  nix: wandio
package-manager-url: https://formulae.brew.sh/formula/wandio
version: 4.2.6
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Transparently read from and write to zip, bzip2, lzma or zstd archives
source-archive: https://github.com/LibtraceTeam/wandio/archive/refs/tags/4.2.6-1.tar.gz
dependencies:
  - lz4
  - lzo
  - xz
  - zstd
build-dependencies:
  - autoconf
  - automake
  - libtool
uses-from-macos:
  - bzip2
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: wandiocat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wandio
  brew: brew install wandio
  macports: sudo port install wandio
  nix: nix profile install nixpkgs#wandio
provenance:
  formula: wandio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
