id: brew:beancount
display-name: beancount
homepage: https://beancount.github.io/
repo: >
  https://files.pythonhosted.org/packages/eb/21/ed48e671a5e474c620762a7ea9c6b7f402f847d74dd2b73ceb5d2dec79a3/beancount-3.2.3.tar.gz
docs: https://beancount.github.io/
package-manager:
  apk: beancount
  brew: beancount
  debian: beancount
  dnf: beancount
  nix: beancount
  pacman: treeify
  ubuntu: beancount
package-manager-url: https://formulae.brew.sh/formula/beancount
version: 3.2.3
license: GPL-2.0-only
category: development
tags:
  - cli
description: Double-entry accounting tool that works on plain text files
source-archive: >
  https://files.pythonhosted.org/packages/eb/21/ed48e671a5e474c620762a7ea9c6b7f402f847d74dd2b73ceb5d2dec79a3/beancount-3.2.3.tar.gz
dependencies:
  - certifi
  - python@3.14
build-dependencies:
  - bison
  - meson
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: bean-check
  - exposure: global executable
    kind: cli
    name: bean-doctor
  - exposure: global executable
    kind: cli
    name: bean-example
  - exposure: global executable
    kind: cli
    name: bean-format
  - exposure: global executable
    kind: cli
    name: treeify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add beancount
  av: sudo av install brew:beancount
  brew: brew install beancount
  debian: sudo apt install beancount
  dnf: sudo dnf install beancount
  nix: nix profile install nixpkgs#beancount
  pacman: sudo pacman -S treeify
  ubuntu: sudo apt install beancount
provenance:
  formula: beancount
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
