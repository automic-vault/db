id: brew:daemonlogger
display-name: daemonlogger
homepage: https://sourceforge.net/projects/daemonlogger/
repo: https://downloads.sourceforge.net/project/daemonlogger/daemonlogger-1.2.1.tar.gz
docs: https://sourceforge.net/projects/daemonlogger/
package-manager:
  brew: daemonlogger
  debian: daemonlogger
  macports: daemonlogger
  ubuntu: daemonlogger
package-manager-url: https://formulae.brew.sh/formula/daemonlogger
version: 1.2.1
license: GPL-2.0-only
category: network
tags:
  - cli
description: Network packet logger and soft tap daemon
source-archive: https://downloads.sourceforge.net/project/daemonlogger/daemonlogger-1.2.1.tar.gz
dependencies:
  - libdnet
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: daemonlogger
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:daemonlogger
  brew: brew install daemonlogger
  debian: sudo apt install daemonlogger
  macports: sudo port install daemonlogger
  ubuntu: sudo apt install daemonlogger
provenance:
  formula: daemonlogger
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
