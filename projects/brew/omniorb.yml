id: brew:omniorb
display-name: omniorb
homepage: https://omniorb.sourceforge.io/
repo: >
  https://downloads.sourceforge.net/project/omniorb/omniORB/omniORB-4.3.4/omniORB-4.3.4.tar.bz2
docs: https://omniorb.sourceforge.io/
package-manager:
  brew: omniorb
  debian: omniorb
  dnf: omniORB
  macports: omniORB
  nix: omniorb
  ubuntu: omniorb
  zypper: omniORB
package-manager-url: https://formulae.brew.sh/formula/omniorb
version: 4.3.4
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: network
tags:
  - cli
description: IOR and naming service utilities for omniORB
source-archive: >
  https://downloads.sourceforge.net/project/omniorb/omniORB/omniORB-4.3.4/omniORB-4.3.4.tar.bz2
dependencies:
  - openssl@3
  - python@3.14
  - zstd
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: catior
  - exposure: global executable
    kind: cli
    name: convertior
  - exposure: global executable
    kind: cli
    name: genior
  - exposure: global executable
    kind: cli
    name: nameclt
  - exposure: global executable
    kind: cli
    name: omkdepend
  - exposure: global executable
    kind: cli
    name: omniMapper
  - exposure: global executable
    kind: cli
    name: omniNames
  - exposure: global executable
    kind: cli
    name: omnicpp
  - exposure: global executable
    kind: cli
    name: omniidl
  - exposure: global executable
    kind: cli
    name: omniidlrun.py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:omniorb
  brew: brew install omniorb
  debian: sudo apt install omniorb
  dnf: sudo dnf install omniORB
  macports: sudo port install omniORB
  nix: nix profile install nixpkgs#omniorb
  ubuntu: sudo apt install omniorb
  zypper: sudo zypper install omniORB
provenance:
  formula: omniorb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
