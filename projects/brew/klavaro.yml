id: brew:klavaro
display-name: klavaro
homepage: https://klavaro.sourceforge.io/
repo: https://downloads.sourceforge.net/project/klavaro/klavaro-3.14.tar.bz2
docs: https://klavaro.sourceforge.io/
package-manager:
  brew: klavaro
  debian: klavaro
  dnf: klavaro
  macports: klavaro
  nix: klavaro
  pacman: klavaro
  ubuntu: klavaro
  winget: FelipeEFdeCastro.Klavaro
  zypper: klavaro
package-manager-url: https://formulae.brew.sh/formula/klavaro
version: 3.14
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Free touch typing tutor program
source-archive: https://downloads.sourceforge.net/project/klavaro/klavaro-3.14.tar.bz2
dependencies:
  - adwaita-icon-theme
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - gtkdatabox
  - harfbuzz
  - pango
build-dependencies:
  - gettext
  - intltool
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: klavaro
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:klavaro
  brew: brew install klavaro
  debian: sudo apt install klavaro
  dnf: sudo dnf install klavaro
  macports: sudo port install klavaro
  nix: nix profile install nixpkgs#klavaro
  pacman: sudo pacman -S klavaro
  ubuntu: sudo apt install klavaro
  winget: winget install --id FelipeEFdeCastro.Klavaro -e
  zypper: sudo zypper install klavaro
provenance:
  formula: klavaro
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
