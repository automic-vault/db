id: brew:open-simh
display-name: open-simh
homepage: https://opensimh.org/
repo: https://github.com/open-simh/simh
docs: https://opensimh.org/
package-manager:
  brew: open-simh
  chocolatey: eclipse
  debian: gri
  macports: gri
  nix: altair
  scoop: extras/altair
  ubuntu: gri
  winget: altair-graphql.altair
  zypper: gri
package-manager-url: https://formulae.brew.sh/formula/open-simh
version: 3.12-3
license: MIT
category: development
tags:
  - cli
description: Multi-system computer simulator
source-archive: https://github.com/open-simh/simh/archive/refs/tags/v3.12-3.tar.gz
dependencies:
  - libpng
  - vde
uses-from-macos:
  - libedit
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: altair
  - exposure: global executable
    kind: cli
    name: eclipse
  - exposure: global executable
    kind: cli
    name: gri
  - exposure: global executable
    kind: cli
    name: h316
  - exposure: global executable
    kind: cli
    name: i1401
  - exposure: global executable
    kind: cli
    name: i1620
  - exposure: global executable
    kind: cli
    name: i7094
  - exposure: global executable
    kind: cli
    name: id16
  - exposure: global executable
    kind: cli
    name: id32
  - exposure: global executable
    kind: cli
    name: lgp
  - exposure: global executable
    kind: cli
    name: pdp1
  - exposure: global executable
    kind: cli
    name: pdp10
  - exposure: global executable
    kind: cli
    name: pdp11
  - exposure: global executable
    kind: cli
    name: pdp15
  - exposure: global executable
    kind: cli
    name: pdp4
  - exposure: global executable
    kind: cli
    name: pdp7
  - exposure: global executable
    kind: cli
    name: pdp8
  - exposure: global executable
    kind: cli
    name: pdp9
  - exposure: global executable
    kind: cli
    name: sds
  - exposure: global executable
    kind: cli
    name: uc15
  - exposure: global executable
    kind: cli
    name: vax
  - exposure: global executable
    kind: cli
    name: vax780
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:open-simh
  brew: brew install open-simh
  chocolatey: choco install eclipse
  debian: sudo apt install gri
  macports: sudo port install gri
  nix: nix profile install nixpkgs#altair
  scoop: scoop install extras/altair
  ubuntu: sudo apt install gri
  winget: winget install --id altair-graphql.altair -e
  zypper: sudo zypper install gri
provenance:
  formula: open-simh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
