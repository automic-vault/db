id: brew:chdig
display-name: chdig
homepage: https://github.com/azat/chdig
repo: https://github.com/azat/chdig
docs: https://github.com/azat/chdig
package-manager:
  brew: chdig
  scoop: extras/chdig
package-manager-url: https://formulae.brew.sh/formula/chdig
version: 26.5.1
license: MIT
category: development
tags:
  - cli
description: Dig into ClickHouse with TUI interface
source-archive: https://github.com/azat/chdig/archive/refs/tags/v26.5.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: chdig
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chdig
  brew: brew install chdig
  scoop: scoop install extras/chdig
provenance:
  formula: chdig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
