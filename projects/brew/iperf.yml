id: brew:iperf
display-name: iperf
homepage: https://sourceforge.net/projects/iperf2/
repo: https://downloads.sourceforge.net/project/iperf2/iperf-2.2.1.tar.gz
docs: https://sourceforge.net/projects/iperf2/
package-manager:
  apk: iperf
  brew: iperf
  debian: iperf
  dnf: iperf
  nix: iperf
  pacman: iperf
  ubuntu: iperf
  zypper: iperf
package-manager-url: https://formulae.brew.sh/formula/iperf
version: 2.2.1
license: BSD-3-Clause
category: network
tags:
  - cli
description: Tool to measure maximum TCP and UDP bandwidth
source-archive: https://downloads.sourceforge.net/project/iperf2/iperf-2.2.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: iperf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add iperf
  av: sudo av install brew:iperf
  brew: brew install iperf
  debian: sudo apt install iperf
  dnf: sudo dnf install iperf
  nix: nix profile install nixpkgs#iperf
  pacman: sudo pacman -S iperf
  ubuntu: sudo apt install iperf
  zypper: sudo zypper install iperf
provenance:
  formula: iperf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
