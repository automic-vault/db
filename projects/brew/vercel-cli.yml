id: brew:vercel-cli
display-name: vercel-cli
homepage: https://vercel.com/home
repo: https://registry.npmjs.org/vercel/-/vercel-54.4.1.tgz
docs: https://vercel.com/home
package-manager:
  brew: vercel-cli
  macports: Vc
  nix: vc
  pacman: vc
package-manager-url: https://formulae.brew.sh/formula/vercel-cli
version: 54.4.1
license: Apache-2.0
category: network
tags:
  - cli
description: Command-line interface for Vercel
source-archive: https://registry.npmjs.org/vercel/-/vercel-54.4.1.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: vc
  - exposure: global executable
    kind: cli
    name: vercel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vercel-cli
  brew: brew install vercel-cli
  macports: sudo port install Vc
  nix: nix profile install nixpkgs#vc
  pacman: sudo pacman -S vc
provenance:
  formula: vercel-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
