id: brew:zig
display-name: zig
homepage: https://ziglang.org/
repo: https://ziglang.org/download/0.16.0/zig-0.16.0.tar.xz
docs: https://ziglang.org/
package-manager:
  apk: zig
  brew: zig
  chocolatey: zig
  dnf: zig
  macports: zig
  nix: zig
  pacman: zig
  scoop: main/zig
  winget: zig.zig
  zypper: zig
package-manager-url: https://formulae.brew.sh/formula/zig
version: 0.16.0
license: MIT
category: development
tags:
  - cli
description: Programming language designed for robustness, optimality, and clarity
source-archive: https://ziglang.org/download/0.16.0/zig-0.16.0.tar.xz
dependencies:
  - lld@21
  - llvm@21
  - zstd
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: zig
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zig
  av: sudo av install brew:zig
  brew: brew install zig
  chocolatey: choco install zig
  dnf: sudo dnf install zig
  macports: sudo port install zig
  nix: nix profile install nixpkgs#zig
  pacman: sudo pacman -S zig
  scoop: scoop install main/zig
  winget: winget install --id zig.zig -e
  zypper: sudo zypper install zig
provenance:
  formula: zig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
