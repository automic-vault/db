id: brew:curl
display-name: curl
homepage: https://curl.se
repo: https://curl.se/download/curl-8.20.0.tar.bz2
docs: https://curl.se
package-manager:
  apk: curl
  brew: curl
  chocolatey: curl
  debian: curl
  dnf: curl
  macports: curl
  nix: curl
  pacman: curl
  scoop: main/curl
  ubuntu: curl
  winget: cURL.cURL
  zypper: curl
package-manager-url: https://formulae.brew.sh/formula/curl
version: 8.20.0
license: curl
category: network
tags:
  - cli
description: Get a file from an HTTP, HTTPS or FTP server
source-archive: https://curl.se/download/curl-8.20.0.tar.bz2
dependencies:
  - brotli
  - libnghttp2
  - libnghttp3
  - libngtcp2
  - libssh2
  - openssl@3
  - zstd
build-dependencies:
  - pkgconf
uses-from-macos:
  - krb5
  - openldap
executables:
  - exposure: global executable
    kind: cli
    name: curl
  - exposure: global executable
    kind: cli
    name: curl-config
  - exposure: global executable
    kind: cli
    name: wcurl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add curl
  av: sudo av install brew:curl
  brew: brew install curl
  chocolatey: choco install curl
  debian: sudo apt install curl
  dnf: sudo dnf install curl
  macports: sudo port install curl
  nix: nix profile install nixpkgs#curl
  pacman: sudo pacman -S curl
  scoop: scoop install main/curl
  ubuntu: sudo apt install curl
  winget: winget install --id cURL.cURL -e
  zypper: sudo zypper install curl
provenance:
  formula: curl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
