id: brew:wireguard-tools
display-name: wireguard-tools
homepage: https://www.wireguard.com/
repo: https://git.zx2c4.com/wireguard-tools/snapshot/wireguard-tools-1.0.20260223.tar.xz
docs: https://www.wireguard.com/
package-manager:
  apk: wireguard-tools
  brew: wireguard-tools
  debian: wireguard-tools
  dnf: wireguard-tools
  macports: wireguard-tools
  nix: wireguard-tools
  pacman: wireguard-tools
  ubuntu: wireguard-tools
  zypper: wireguard-tools
package-manager-url: https://formulae.brew.sh/formula/wireguard-tools
version: 1.0.20260223
license: GPL-2.0-only
category: development
tags:
  - cli
description: Tools for the WireGuard secure network tunnel
source-archive: https://git.zx2c4.com/wireguard-tools/snapshot/wireguard-tools-1.0.20260223.tar.xz
dependencies:
  - bash
  - wireguard-go
executables:
  - exposure: global executable
    kind: cli
    name: wg
  - exposure: global executable
    kind: cli
    name: wg-quick
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wireguard-tools
  av: sudo av install brew:wireguard-tools
  brew: brew install wireguard-tools
  debian: sudo apt install wireguard-tools
  dnf: sudo dnf install wireguard-tools
  macports: sudo port install wireguard-tools
  nix: nix profile install nixpkgs#wireguard-tools
  pacman: sudo pacman -S wireguard-tools
  ubuntu: sudo apt install wireguard-tools
  zypper: sudo zypper install wireguard-tools
provenance:
  formula: wireguard-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
