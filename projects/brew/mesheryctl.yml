id: brew:mesheryctl
display-name: mesheryctl
homepage: https://meshery.io
repo: https://github.com/meshery/meshery
docs: https://meshery.io
package-manager:
  brew: mesheryctl
  zypper: mesheryctl
package-manager-url: https://formulae.brew.sh/formula/mesheryctl
version: 1.0.31
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Command-line utility for Meshery, the cloud native management plane
source-archive: https://github.com/meshery/meshery.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mesheryctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mesheryctl
  brew: brew install mesheryctl
  zypper: sudo zypper install mesheryctl
provenance:
  formula: mesheryctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
