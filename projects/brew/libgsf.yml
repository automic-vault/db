id: brew:libgsf
display-name: libgsf
homepage: https://gitlab.gnome.org/GNOME/libgsf
repo: https://download.gnome.org/sources/libgsf/1.14/libgsf-1.14.58.tar.xz
docs: https://gitlab.gnome.org/GNOME/libgsf
package-manager:
  apk: libgsf
  brew: libgsf
  dnf: libgsf
  macports: libgsf
  nix: libgsf
  pacman: libgsf
  zypper: gsf-office-thumbnailer
package-manager-url: https://formulae.brew.sh/formula/libgsf
version: 1.14.58
license: LGPL-2.1-only
category: development
tags:
  - cli
description: I/O abstraction library for dealing with structured file formats
source-archive: https://download.gnome.org/sources/libgsf/1.14/libgsf-1.14.58.tar.xz
dependencies:
  - gettext
  - glib
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: gsf
  - exposure: global executable
    kind: cli
    name: gsf-office-thumbnailer
  - exposure: global executable
    kind: cli
    name: gsf-vba-dump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libgsf
  av: sudo av install brew:libgsf
  brew: brew install libgsf
  dnf: sudo dnf install libgsf
  macports: sudo port install libgsf
  nix: nix profile install nixpkgs#libgsf
  pacman: sudo pacman -S libgsf
  zypper: sudo zypper install gsf-office-thumbnailer
provenance:
  formula: libgsf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
