id: brew:cargo-dist
display-name: cargo-dist
homepage: https://axodotdev.github.io/cargo-dist/
repo: https://github.com/axodotdev/cargo-dist
docs: https://axodotdev.github.io/cargo-dist/
package-manager:
  brew: cargo-dist
  debian: dist
  nix: cargo-dist
  pacman: cargo-dist
  ubuntu: dist
  winget: axodotdev.dist
package-manager-url: https://formulae.brew.sh/formula/cargo-dist
version: 0.32.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Tool for building final distributable artifacts and uploading them to an archive
source-archive: https://github.com/axodotdev/cargo-dist/archive/refs/tags/v0.32.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dist
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-dist
  brew: brew install cargo-dist
  debian: sudo apt install dist
  nix: nix profile install nixpkgs#cargo-dist
  pacman: sudo pacman -S cargo-dist
  ubuntu: sudo apt install dist
  winget: winget install --id axodotdev.dist -e
provenance:
  formula: cargo-dist
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
