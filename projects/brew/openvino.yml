id: brew:openvino
display-name: openvino
homepage: https://docs.openvino.ai
repo: https://github.com/openvinotoolkit/openvino
docs: https://docs.openvino.ai
package-manager:
  brew: openvino
  dnf: openvino
  nix: openvino
package-manager-url: https://formulae.brew.sh/formula/openvino
version: 2026.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: Open Visual Inference And Optimization toolkit for AI inference
source-archive: https://github.com/openvinotoolkit/openvino/archive/refs/tags/2026.1.0.tar.gz
dependencies:
  - abseil
  - nlohmann-json
  - numpy
  - onnx
  - protobuf
  - pugixml
  - snappy
  - tbb
build-dependencies:
  - cmake
  - flatbuffers
  - pkgconf
  - python@3.14
  - scons
executables:
  - exposure: global executable
    kind: cli
    name: benchmark_app
  - exposure: global executable
    kind: cli
    name: ovc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:openvino
  brew: brew install openvino
  dnf: sudo dnf install openvino
  nix: nix profile install nixpkgs#openvino
provenance:
  formula: openvino
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
