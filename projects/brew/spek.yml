id: brew:spek
display-name: spek
homepage: https://www.spek.cc
repo: https://github.com/alexkay/spek
docs: https://www.spek.cc
package-manager:
  brew: spek
  debian: spek
  nix: spek
  scoop: extras/spek
  ubuntu: spek
  winget: AlexanderKojevnikov.Spek
  zypper: spek
package-manager-url: https://formulae.brew.sh/formula/spek
version: 0.8.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Acoustic spectrum analyser
source-archive: https://github.com/alexkay/spek/releases/download/v0.8.5/spek-0.8.5.tar.xz
dependencies:
  - ffmpeg
  - wxwidgets
build-dependencies:
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: spek
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spek
  brew: brew install spek
  debian: sudo apt install spek
  nix: nix profile install nixpkgs#spek
  scoop: scoop install extras/spek
  ubuntu: sudo apt install spek
  winget: winget install --id AlexanderKojevnikov.Spek -e
  zypper: sudo zypper install spek
provenance:
  formula: spek
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
