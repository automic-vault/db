id: brew:codevis
display-name: codevis
homepage: https://github.com/sloganking/codevis
repo: https://github.com/sloganking/codevis
docs: https://github.com/sloganking/codevis
package-manager:
  brew: codevis
  nix: codevis
package-manager-url: https://formulae.brew.sh/formula/codevis
version: 0.8.4
license: MIT
category: development
tags:
  - cli
description: Turns your code into one large image
source-archive: https://github.com/sloganking/codevis/archive/refs/tags/v0.8.4.tar.gz
dependencies:
  - oniguruma
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: codevis
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:codevis
  brew: brew install codevis
  nix: nix profile install nixpkgs#codevis
provenance:
  formula: codevis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
