id: brew:curlie
display-name: curlie
homepage: https://rs.github.io/curlie/
repo: https://github.com/rs/curlie
docs: https://rs.github.io/curlie/
package-manager:
  apk: curlie
  brew: curlie
  macports: curlie
  nix: curlie
  pacman: curlie
  scoop: main/curlie
  zypper: curlie
package-manager-url: https://formulae.brew.sh/formula/curlie
version: 1.8.2
license: MIT
category: development
tags:
  - cli
description: Power of curl, ease of use of httpie
source-archive: https://github.com/rs/curlie/archive/refs/tags/v1.8.2.tar.gz
build-dependencies:
  - go
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: curlie
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add curlie
  av: sudo av install brew:curlie
  brew: brew install curlie
  macports: sudo port install curlie
  nix: nix profile install nixpkgs#curlie
  pacman: sudo pacman -S curlie
  scoop: scoop install main/curlie
  zypper: sudo zypper install curlie
provenance:
  formula: curlie
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
