id: brew:wuppiefuzz
display-name: wuppiefuzz
homepage: https://github.com/TNO-S3/WuppieFuzz
repo: https://github.com/TNO-S3/WuppieFuzz
docs: https://github.com/TNO-S3/WuppieFuzz
package-manager:
  brew: wuppiefuzz
package-manager-url: https://formulae.brew.sh/formula/wuppiefuzz
version: 1.5.1
license: Apache-2.0
category: development
tags:
  - cli
description: Coverage-guided REST API fuzzer developed on top of LibAFL
source-archive: https://github.com/TNO-S3/WuppieFuzz/releases/download/v1.5.1/source.tar.gz
dependencies:
  - z3
build-dependencies:
  - cmake
  - pkgconf
  - rust
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: wuppiefuzz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wuppiefuzz
  brew: brew install wuppiefuzz
provenance:
  formula: wuppiefuzz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
