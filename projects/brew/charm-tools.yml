id: brew:charm-tools
display-name: charm-tools
homepage: https://github.com/juju/charm-tools
repo: >
  https://files.pythonhosted.org/packages/da/8c/26dcc9b99c6fbacd989f5d54b7a3a976cfa5b8ac26f6992d134091add085/charm_tools-3.0.8.tar.gz
docs: https://github.com/juju/charm-tools
package-manager:
  brew: charm-tools
package-manager-url: https://formulae.brew.sh/formula/charm-tools
version: 3.0.8
license: GPL-3.0-only
category: development
tags:
  - cli
description: Tools for authoring and maintaining juju charms
source-archive: >
  https://files.pythonhosted.org/packages/da/8c/26dcc9b99c6fbacd989f5d54b7a3a976cfa5b8ac26f6992d134091add085/charm_tools-3.0.8.tar.gz
dependencies:
