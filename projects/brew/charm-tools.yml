  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: charm-build
  - exposure: global executable
    kind: cli
    name: charm-create
  - exposure: global executable
    kind: cli
    name: charm-help
  - exposure: global executable
    kind: cli
    name: charm-layers
  - exposure: global executable
    kind: cli
    name: charm-proof
  - exposure: global executable
    kind: cli
    name: charm-pull-source
