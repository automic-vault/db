    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:charm-tools
  brew: brew install charm-tools
provenance:
  formula: charm-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
