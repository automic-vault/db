id: brew:asn
display-name: asn
homepage: https://github.com/nitefood/asn
repo: https://github.com/nitefood/asn
docs: https://github.com/nitefood/asn
package-manager:
  apk: asn
  brew: asn
  debian: asn
  nix: asn
  ubuntu: asn
package-manager-url: https://formulae.brew.sh/formula/asn
version: 0.81.0
license: MIT
category: development
tags:
  - cli
description: Organization lookup and server tool (ASN / IPv4 / IPv6 / Prefix / AS Path)
source-archive: https://github.com/nitefood/asn/archive/refs/tags/v0.81.0.tar.gz
dependencies:
  - aha
  - bash
  - coreutils
  - grepcidr
  - ipcalc
  - mtr
  - nmap
uses-from-macos:
  - jq
  - whois
executables:
  - exposure: global executable
    kind: cli
    name: asn
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add asn
  av: sudo av install brew:asn
  brew: brew install asn
  debian: sudo apt install asn
  nix: nix profile install nixpkgs#asn
  ubuntu: sudo apt install asn
provenance:
  formula: asn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
