id: brew:zet
display-name: zet
homepage: https://github.com/yarrow/zet
repo: https://github.com/yarrow/zet
docs: https://github.com/yarrow/zet
package-manager:
  brew: zet
  nix: zet
package-manager-url: https://formulae.brew.sh/formula/zet
version: 2.0.1
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: CLI utility to find the union, intersection, and set difference of files
source-archive: https://github.com/yarrow/zet/archive/refs/tags/v2.0.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: zet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zet
  brew: brew install zet
  nix: nix profile install nixpkgs#zet
provenance:
  formula: zet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
