id: brew:tidy-html5
display-name: tidy-html5
homepage: https://www.html-tidy.org/
repo: https://github.com/htacg/tidy-html5
docs: https://www.html-tidy.org/
package-manager:
  brew: tidy-html5
  debian: tidy
  dnf: tidy
  macports: tidy
  pacman: tidy
  scoop: main/tidy
  ubuntu: tidy
  winget: HTACG.tidy
  zypper: tidy
package-manager-url: https://formulae.brew.sh/formula/tidy-html5
version: 5.8.0
license: Zlib
category: development
tags:
  - cli
description: Granddaddy of HTML tools, with support for modern standards
source-archive: https://github.com/htacg/tidy-html5/archive/refs/tags/5.8.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: tidy
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tidy-html5
  brew: brew install tidy-html5
  debian: sudo apt install tidy
  dnf: sudo dnf install tidy
  macports: sudo port install tidy
  pacman: sudo pacman -S tidy
  scoop: scoop install main/tidy
  ubuntu: sudo apt install tidy
  winget: winget install --id HTACG.tidy -e
  zypper: sudo zypper install tidy
provenance:
  formula: tidy-html5
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
