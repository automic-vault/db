id: brew:gtmess
display-name: gtmess
homepage: https://gtmess.sourceforge.net/
repo: https://downloads.sourceforge.net/project/gtmess/gtmess/0.97/gtmess-0.97.tar.gz
docs: https://gtmess.sourceforge.net/
package-manager:
  brew: gtmess
package-manager-url: https://formulae.brew.sh/formula/gtmess
version: 0.97
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Console MSN messenger client
source-archive: https://downloads.sourceforge.net/project/gtmess/gtmess/0.97/gtmess-0.97.tar.gz
dependencies:
  - openssl@3
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: gtmess
  - exposure: global executable
    kind: cli
    name: gtmess-notify
  - exposure: global executable
    kind: cli
    name: gtmess_w
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gtmess
  brew: brew install gtmess
provenance:
  formula: gtmess
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
