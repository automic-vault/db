id: brew:happy-coder
display-name: happy-coder
homepage: https://happy.engineering
repo: https://github.com/slopus/happy-cli
docs: https://happy.engineering
package-manager:
  apk: happy
  brew: happy-coder
  debian: happy
  dnf: happy
  macports: happy
  nix: happy-coder
  pacman: happy
  ubuntu: happy
  zypper: happy
package-manager-url: https://formulae.brew.sh/formula/happy-coder
version: 0.13.0
license: MIT
category: development
tags:
  - cli
description: CLI for operating AI coding agents from mobile devices
source-archive: https://github.com/slopus/happy-cli/archive/refs/tags/v0.13.0.tar.gz
dependencies:
  - difftastic
  - node
  - ripgrep
build-dependencies:
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: happy
  - exposure: global executable
    kind: cli
    name: happy-mcp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add happy
  av: sudo av install brew:happy-coder
  brew: brew install happy-coder
  debian: sudo apt install happy
  dnf: sudo dnf install happy
  macports: sudo port install happy
  nix: nix profile install nixpkgs#happy-coder
  pacman: sudo pacman -S happy
  ubuntu: sudo apt install happy
  zypper: sudo zypper install happy
provenance:
  formula: happy-coder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
