id: brew:syslog-ng
display-name: syslog-ng
homepage: https://www.syslog-ng.com
repo: https://github.com/syslog-ng/syslog-ng
docs: https://www.syslog-ng.com
package-manager:
  apk: syslog-ng
  brew: syslog-ng
  debian: syslog-ng
  dnf: syslog-ng
  macports: syslog-ng
  pacman: syslog-ng
  ubuntu: syslog-ng
  zypper: syslog-ng
package-manager-url: https://formulae.brew.sh/formula/syslog-ng
version: 4.11.0
license: LGPL-2.1-or-later AND GPL-2.0-or-later
category: development
tags:
  - cli
description: Log daemon with advanced processing pipeline and a wide range of I/O methods
source-archive: >
  https://github.com/syslog-ng/syslog-ng/releases/download/syslog-ng-4.11.0/syslog-ng-4.11.0.tar.gz
dependencies:
  - abseil
  - gettext
  - glib
  - grpc
  - hiredis
  - ivykis
  - json-c
  - libdbi
  - libmaxminddb
  - libnet
  - libpaho-mqtt
  - librdkafka
  - mongo-c-driver
  - net-snmp
  - openssl@3
  - pcre2
  - protobuf
  - python@3.14
  - rabbitmq-c
  - riemann-client
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: dqtool
  - exposure: global executable
    kind: cli
    name: loggen
  - exposure: global executable
    kind: cli
    name: pdbtool
  - exposure: global executable
    kind: cli
    name: persist-tool
  - exposure: global executable
    kind: cli
    name: slogencrypt
  - exposure: global executable
    kind: cli
    name: slogkey
  - exposure: global executable
    kind: cli
    name: slogverify
  - exposure: global executable
    kind: cli
    name: syslog-ng
  - exposure: global executable
    kind: cli
    name: syslog-ng-ctl
  - exposure: global executable
    kind: cli
    name: syslog-ng-debun
  - exposure: global executable
    kind: cli
    name: syslog-ng-update-virtualenv
  - exposure: global executable
    kind: cli
    name: update-patterndb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add syslog-ng
  av: sudo av install brew:syslog-ng
  brew: brew install syslog-ng
  debian: sudo apt install syslog-ng
  dnf: sudo dnf install syslog-ng
  macports: sudo port install syslog-ng
  pacman: sudo pacman -S syslog-ng
  ubuntu: sudo apt install syslog-ng
  zypper: sudo zypper install syslog-ng
provenance:
  formula: syslog-ng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
