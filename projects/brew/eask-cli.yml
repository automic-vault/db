id: brew:eask-cli
display-name: eask-cli
homepage: https://emacs-eask.github.io/
repo: https://registry.npmjs.org/@emacs-eask/cli/-/cli-0.12.9.tgz
docs: https://emacs-eask.github.io/
package-manager:
  brew: eask-cli
  dnf: eask
  macports: eask-cli
  nix: eask-cli
  scoop: extras/eask-cli
  winget: eask.cli
package-manager-url: https://formulae.brew.sh/formula/eask-cli
version: 0.12.9
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: CLI for building, running, testing, and managing your Emacs Lisp dependencies
source-archive: https://registry.npmjs.org/@emacs-eask/cli/-/cli-0.12.9.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: eask
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:eask-cli
  brew: brew install eask-cli
  dnf: sudo dnf install eask
  macports: sudo port install eask-cli
  nix: nix profile install nixpkgs#eask-cli
  scoop: scoop install extras/eask-cli
  winget: winget install --id eask.cli -e
provenance:
  formula: eask-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
