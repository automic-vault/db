id: brew:unifdef
display-name: unifdef
homepage: https://dotat.at/prog/unifdef/
repo: https://dotat.at/prog/unifdef/unifdef-2.12.tar.gz
docs: https://dotat.at/prog/unifdef/
package-manager:
  apk: unifdef
  brew: unifdef
  debian: unifdef
  dnf: unifdef
  macports: unifdef
  nix: unifdef
  pacman: unifdef
  ubuntu: unifdef
  zypper: unifdef
package-manager-url: https://formulae.brew.sh/formula/unifdef
version: 2.12
license: BSD-2-Clause AND BSD-3-Clause
category: network
tags:
  - cli
description: Selectively process conditional C preprocessor directives
source-archive: https://dotat.at/prog/unifdef/unifdef-2.12.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: unifdef
  - exposure: global executable
    kind: cli
    name: unifdefall
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add unifdef
  av: sudo av install brew:unifdef
  brew: brew install unifdef
  debian: sudo apt install unifdef
  dnf: sudo dnf install unifdef
  macports: sudo port install unifdef
  nix: nix profile install nixpkgs#unifdef
  pacman: sudo pacman -S unifdef
  ubuntu: sudo apt install unifdef
  zypper: sudo zypper install unifdef
provenance:
  formula: unifdef
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
