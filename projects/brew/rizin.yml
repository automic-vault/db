id: brew:rizin
display-name: rizin
homepage: https://rizin.re
repo: https://github.com/rizinorg/rizin
docs: https://rizin.re
package-manager:
  apk: rizin
  brew: rizin
  dnf: rizin
  macports: rizin
  nix: rizin
  pacman: rizin
  scoop: main/rizin
  winget: Rizin.Rizin
  zypper: rizin
package-manager-url: https://formulae.brew.sh/formula/rizin
version: 0.8.2
license: LGPL-3.0-only
category: development
tags:
  - cli
description: UNIX-like reverse engineering framework and command-line toolset
source-archive: https://github.com/rizinorg/rizin/releases/download/v0.8.2/rizin-src-v0.8.2.tar.xz
dependencies:
  - capstone
  - libmagic
  - libzip
  - lz4
  - openssl@3
  - pcre2
  - tree-sitter
  - xxhash
  - xz
  - zstd
build-dependencies:
  - cmake
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rizin
  - exposure: global executable
    kind: cli
    name: rz-asm
  - exposure: global executable
    kind: cli
    name: rz-ax
  - exposure: global executable
    kind: cli
    name: rz-bin
  - exposure: global executable
    kind: cli
    name: rz-diff
  - exposure: global executable
    kind: cli
    name: rz-find
  - exposure: global executable
    kind: cli
    name: rz-gg
  - exposure: global executable
    kind: cli
    name: rz-hash
  - exposure: global executable
    kind: cli
    name: rz-run
  - exposure: global executable
    kind: cli
    name: rz-sign
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Plugins, extras and bindings will installed at: $HOMEBREW_PREFIX/lib/rizin'
  post-install-defined: true
install-lines:
  apk: sudo apk add rizin
  av: sudo av install brew:rizin
  brew: brew install rizin
  dnf: sudo dnf install rizin
  macports: sudo port install rizin
  nix: nix profile install nixpkgs#rizin
  pacman: sudo pacman -S rizin
  scoop: scoop install main/rizin
  winget: winget install --id Rizin.Rizin -e
  zypper: sudo zypper install rizin
provenance:
  formula: rizin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
