id: brew:argus-clients
display-name: argus-clients
homepage: https://openargus.org
repo: https://github.com/openargus/clients
docs: https://openargus.org
package-manager:
  brew: argus-clients
  dnf: argus-clients
  macports: argus-clients
  nix: argus-clients
package-manager-url: https://formulae.brew.sh/formula/argus-clients
version: 5.0.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Audit Record Generation and Utilization System clients
source-archive: https://github.com/openargus/clients/archive/refs/tags/v5.0.0.tar.gz
dependencies:
  - readline
  - rrdtool
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: argusclientbug
  - exposure: global executable
    kind: cli
    name: ra
  - exposure: global executable
    kind: cli
    name: rabins
  - exposure: global executable
    kind: cli
    name: racluster
  - exposure: global executable
    kind: cli
    name: racount
  - exposure: global executable
    kind: cli
    name: radium
  - exposure: global executable
    kind: cli
    name: ramanage
  - exposure: global executable
    kind: cli
    name: ranonymize
  - exposure: global executable
    kind: cli
    name: rasort
  - exposure: global executable
    kind: cli
    name: rastream
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:argus-clients
  brew: brew install argus-clients
  dnf: sudo dnf install argus-clients
  macports: sudo port install argus-clients
  nix: nix profile install nixpkgs#argus-clients
provenance:
  formula: argus-clients
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
