id: brew:mscgen
display-name: mscgen
homepage: https://www.mcternan.me.uk/mscgen/
repo: https://www.mcternan.me.uk/mscgen/software/mscgen-src-0.20.tar.gz
docs: https://www.mcternan.me.uk/mscgen/
package-manager:
  brew: mscgen
  debian: mscgen
  dnf: mscgen
  macports: mscgen
  nix: mscgen
  ubuntu: mscgen
  zypper: mscgen
package-manager-url: https://formulae.brew.sh/formula/mscgen
version: 0.20
license: GPL-2.0-or-later
category: media
tags:
  - cli
description: Parses Message Sequence Chart descriptions and produces images
source-archive: https://www.mcternan.me.uk/mscgen/software/mscgen-src-0.20.tar.gz
dependencies:
  - freetype
  - gd
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mscgen
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mscgen
  brew: brew install mscgen
  debian: sudo apt install mscgen
  dnf: sudo dnf install mscgen
  macports: sudo port install mscgen
  nix: nix profile install nixpkgs#mscgen
  ubuntu: sudo apt install mscgen
  zypper: sudo zypper install mscgen
provenance:
  formula: mscgen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
