id: brew:libabigail
display-name: libabigail
homepage: https://sourceware.org/libabigail/
repo: https://mirrors.kernel.org/sourceware/libabigail/libabigail-2.10.tar.xz
docs: https://sourceware.org/libabigail/
package-manager:
  apk: libabigail
  brew: libabigail
  dnf: libabigail
  nix: libabigail
  pacman: libabigail
package-manager-url: https://formulae.brew.sh/formula/libabigail
version: 2.10
license: Apache-2.0 WITH LLVM-exception
category: network
tags:
  - cli
description: ABI Generic Analysis and Instrumentation Library
source-archive: https://mirrors.kernel.org/sourceware/libabigail/libabigail-2.10.tar.xz
dependencies:
  - elfutils
  - libxml2
  - xxhash
  - xz
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: abicompat
  - exposure: global executable
    kind: cli
    name: abidiff
  - exposure: global executable
    kind: cli
    name: abidw
  - exposure: global executable
    kind: cli
    name: abilint
  - exposure: global executable
    kind: cli
    name: abipkgdiff
  - exposure: global executable
    kind: cli
    name: kmidiff
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libabigail
  av: sudo av install brew:libabigail
  brew: brew install libabigail
  dnf: sudo dnf install libabigail
  nix: nix profile install nixpkgs#libabigail
  pacman: sudo pacman -S libabigail
provenance:
  formula: libabigail
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
