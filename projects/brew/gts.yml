id: brew:gts
display-name: gts
homepage: https://gts.sourceforge.net/
repo: https://downloads.sourceforge.net/project/gts/gts/0.7.6/gts-0.7.6.tar.gz
docs: https://gts.sourceforge.net/
package-manager:
  brew: gts
  dnf: gts
  macports: gts
  nix: gts
  pacman: gts
  zypper: gts
package-manager-url: https://formulae.brew.sh/formula/gts
version: 0.7.6
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: GNU triangulated surface library
source-archive: https://downloads.sourceforge.net/project/gts/gts/0.7.6/gts-0.7.6.tar.gz
dependencies:
  - gettext
  - glib
  - netpbm
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: delaunay
  - exposure: global executable
    kind: cli
    name: gts-config
  - exposure: global executable
    kind: cli
    name: gts2dxf
  - exposure: global executable
    kind: cli
    name: gts2oogl
  - exposure: global executable
    kind: cli
    name: gts2stl
  - exposure: global executable
    kind: cli
    name: gtscheck
  - exposure: global executable
    kind: cli
    name: gtscompare
  - exposure: global executable
    kind: cli
    name: gtstemplate
  - exposure: global executable
    kind: cli
    name: happrox
  - exposure: global executable
    kind: cli
    name: stl2gts
  - exposure: global executable
    kind: cli
    name: transform
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gts
  brew: brew install gts
  dnf: sudo dnf install gts
  macports: sudo port install gts
  nix: nix profile install nixpkgs#gts
  pacman: sudo pacman -S gts
  zypper: sudo zypper install gts
provenance:
  formula: gts
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
