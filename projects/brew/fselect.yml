id: brew:fselect
display-name: fselect
homepage: https://github.com/jhspetersson/fselect
repo: https://github.com/jhspetersson/fselect
docs: https://github.com/jhspetersson/fselect
package-manager:
  brew: fselect
  macports: fselect
  nix: fselect
  scoop: main/fselect
  winget: fselect.fselect
package-manager-url: https://formulae.brew.sh/formula/fselect
version: 0.10.0
license: Apache-2.0 OR MIT
category: database
tags:
  - cli
description: Find files with SQL-like queries
source-archive: https://github.com/jhspetersson/fselect/archive/refs/tags/0.10.0.tar.gz
dependencies:
  - libgit2
build-dependencies:
  - cmake
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: fselect
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fselect
  brew: brew install fselect
  macports: sudo port install fselect
  nix: nix profile install nixpkgs#fselect
  scoop: scoop install main/fselect
  winget: winget install --id fselect.fselect -e
provenance:
  formula: fselect
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
