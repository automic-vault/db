id: brew:mycorrhiza
display-name: mycorrhiza
homepage: https://mycorrhiza.wiki
repo: https://github.com/bouncepaw/mycorrhiza
docs: https://mycorrhiza.wiki
package-manager:
  apk: mycorrhiza
  brew: mycorrhiza
  nix: mycorrhiza
package-manager-url: https://formulae.brew.sh/formula/mycorrhiza
version: 1.15.1
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Lightweight wiki engine with hierarchy support
source-archive: https://github.com/bouncepaw/mycorrhiza/archive/refs/tags/v1.15.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mycorrhiza
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add mycorrhiza
  av: sudo av install brew:mycorrhiza
  brew: brew install mycorrhiza
  nix: nix profile install nixpkgs#mycorrhiza
provenance:
  formula: mycorrhiza
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
