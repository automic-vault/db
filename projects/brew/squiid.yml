id: brew:squiid
display-name: squiid
homepage: https://imaginaryinfinity.net/projects/squiid/
repo: >
  https://gitlab.com/ImaginaryInfinity/squiid-calculator/squiid/-/archive/1.3.0/squiid-1.3.0.tar.gz
docs: https://imaginaryinfinity.net/projects/squiid/
package-manager:
  brew: squiid
  winget: ImaginaryInfinity.Squiid
package-manager-url: https://formulae.brew.sh/formula/squiid
version: 1.3.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Do advanced algebraic and RPN calculations
source-archive: >
  https://gitlab.com/ImaginaryInfinity/squiid-calculator/squiid/-/archive/1.3.0/squiid-1.3.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: squiid
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:squiid
  brew: brew install squiid
  winget: winget install --id ImaginaryInfinity.Squiid -e
provenance:
  formula: squiid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
