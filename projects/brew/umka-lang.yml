id: brew:umka-lang
display-name: umka-lang
homepage: https://github.com/vtereshkov/umka-lang
repo: https://github.com/vtereshkov/umka-lang
docs: https://github.com/vtereshkov/umka-lang
package-manager:
  brew: umka-lang
  nix: umka-lang
package-manager-url: https://formulae.brew.sh/formula/umka-lang
version: 1.5.6
license: BSD-2-Clause
category: development
tags:
  - cli
description: Statically typed embeddable scripting language
source-archive: https://github.com/vtereshkov/umka-lang/archive/refs/tags/v1.5.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: umka
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:umka-lang
  brew: brew install umka-lang
  nix: nix profile install nixpkgs#umka-lang
provenance:
  formula: umka-lang
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
