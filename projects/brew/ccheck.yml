id: brew:ccheck
display-name: ccheck
homepage: https://github.com/nerdlem/ccheck
repo: https://github.com/nerdlem/ccheck
docs: https://github.com/nerdlem/ccheck
package-manager:
  brew: ccheck
package-manager-url: https://formulae.brew.sh/formula/ccheck
version: 1.0.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Check X509 certificate expiration from the command-line, with TAP output
source-archive: https://github.com/nerdlem/ccheck/archive/refs/tags/v1.0.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ccheck
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ccheck
  brew: brew install ccheck
provenance:
  formula: ccheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
