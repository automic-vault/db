id: brew:oha
display-name: oha
homepage: https://github.com/hatoo/oha/
repo: https://github.com/hatoo/oha
docs: https://github.com/hatoo/oha/
package-manager:
  apk: oha
  brew: oha
  macports: oha
  nix: oha
  pacman: oha
  scoop: main/oha
  winget: hatoo.oha
package-manager-url: https://formulae.brew.sh/formula/oha
version: 1.14.0
license: MIT
category: development
tags:
  - cli
description: HTTP load generator, inspired by rakyll/hey with tui animation
source-archive: https://github.com/hatoo/oha/archive/refs/tags/v1.14.0.tar.gz
build-dependencies:
  - cmake
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: oha
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add oha
  av: sudo av install brew:oha
  brew: brew install oha
  macports: sudo port install oha
  nix: nix profile install nixpkgs#oha
  pacman: sudo pacman -S oha
  scoop: scoop install main/oha
  winget: winget install --id hatoo.oha -e
provenance:
  formula: oha
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
