id: brew:hack-browser-data
display-name: hack-browser-data
homepage: https://github.com/moonD4rk/HackBrowserData
repo: https://github.com/moonD4rk/HackBrowserData
docs: https://github.com/moonD4rk/HackBrowserData
package-manager:
  brew: hack-browser-data
package-manager-url: https://formulae.brew.sh/formula/hack-browser-data
version: 1.0.0
license: MIT
category: security
tags:
  - cli
description: Command-line tool for decrypting and exporting browser data
source-archive: https://github.com/moonD4rk/HackBrowserData/archive/refs/tags/v1.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hack-browser-data
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hack-browser-data
  brew: brew install hack-browser-data
provenance:
  formula: hack-browser-data
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
