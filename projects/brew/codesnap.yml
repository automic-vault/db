id: brew:codesnap
display-name: codesnap
homepage: https://github.com/codesnap-rs/codesnap
repo: https://github.com/codesnap-rs/codesnap
docs: https://github.com/codesnap-rs/codesnap
package-manager:
  brew: codesnap
  nix: codesnap
  pacman: codesnap
  scoop: extras/codesnap
package-manager-url: https://formulae.brew.sh/formula/codesnap
version: 0.13.1
license: MIT
category: development
tags:
  - cli
description: Generates code snapshots in various formats
source-archive: https://github.com/codesnap-rs/codesnap/archive/refs/tags/v0.13.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: codesnap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:codesnap
  brew: brew install codesnap
  nix: nix profile install nixpkgs#codesnap
  pacman: sudo pacman -S codesnap
  scoop: scoop install extras/codesnap
provenance:
  formula: codesnap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
