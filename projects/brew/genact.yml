id: brew:genact
display-name: genact
homepage: https://github.com/svenstaro/genact
repo: https://github.com/svenstaro/genact
docs: https://github.com/svenstaro/genact
package-manager:
  apk: genact
  brew: genact
  macports: genact
  nix: genact
  pacman: genact
  scoop: main/genact
  winget: svenstaro.genact
package-manager-url: https://formulae.brew.sh/formula/genact
version: 1.5.1
license: MIT
category: development
tags:
  - cli
description: Nonsense activity generator
source-archive: https://github.com/svenstaro/genact/archive/refs/tags/v1.5.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: genact
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add genact
  av: sudo av install brew:genact
  brew: brew install genact
  macports: sudo port install genact
  nix: nix profile install nixpkgs#genact
  pacman: sudo pacman -S genact
  scoop: scoop install main/genact
  winget: winget install --id svenstaro.genact -e
provenance:
  formula: genact
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
