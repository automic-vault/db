id: brew:c7n
display-name: c7n
homepage: https://github.com/cloud-custodian/cloud-custodian
repo: https://github.com/cloud-custodian/cloud-custodian
docs: https://github.com/cloud-custodian/cloud-custodian
package-manager:
  brew: c7n
package-manager-url: https://formulae.brew.sh/formula/c7n
version: 0.9.50.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
  - security
description: Rules engine for cloud security, cost optimization, and governance
source-archive: https://github.com/cloud-custodian/cloud-custodian/archive/refs/tags/0.9.50.0.tar.gz
dependencies:
  - cryptography
  - libyaml
  - python@3.14
  - rpds-py
executables:
  - exposure: global executable
    kind: cli
    name: custodian
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:c7n
  brew: brew install c7n
provenance:
  formula: c7n
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
