id: brew:fossil
display-name: fossil
homepage: https://www.fossil-scm.org/home/
repo: https://fossil-scm.org/home/tarball/version-2.28/fossil-src-2.28.tar.gz
docs: https://www.fossil-scm.org/home/
package-manager:
  apk: fossil
  brew: fossil
  chocolatey: fossil
  debian: fossil
  dnf: fossil
  macports: fossil
  nix: fossil
  pacman: fossil
  scoop: main/fossil
  ubuntu: fossil
  winget: Fossil.Fossil
  zypper: fossil
package-manager-url: https://formulae.brew.sh/formula/fossil
version: 2.28
license: BSD-2-Clause
category: network
tags:
  - cli
description: Distributed software configuration management
source-archive: https://fossil-scm.org/home/tarball/version-2.28/fossil-src-2.28.tar.gz
dependencies:
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: fossil
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fossil
  av: sudo av install brew:fossil
  brew: brew install fossil
  chocolatey: choco install fossil
  debian: sudo apt install fossil
  dnf: sudo dnf install fossil
  macports: sudo port install fossil
  nix: nix profile install nixpkgs#fossil
  pacman: sudo pacman -S fossil
  scoop: scoop install main/fossil
  ubuntu: sudo apt install fossil
  winget: winget install --id Fossil.Fossil -e
  zypper: sudo zypper install fossil
provenance:
  formula: fossil
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
