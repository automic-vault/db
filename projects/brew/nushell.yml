id: brew:nushell
display-name: nushell
homepage: https://www.nushell.sh
repo: https://github.com/nushell/nushell
docs: https://www.nushell.sh
package-manager:
  apk: nushell
  brew: nushell
  chocolatey: nushell
  dnf: nu
  macports: nushell
  nix: nushell
  pacman: nushell
  scoop: main/nu
  winget: Nushell.Nushell
  zypper: nushell
package-manager-url: https://formulae.brew.sh/formula/nushell
version: 0.113.0
license: MIT
category: development
tags:
  - cli
description: Modern shell for the GitHub era
source-archive: https://github.com/nushell/nushell/archive/refs/tags/0.113.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: nu
  - exposure: global executable
    kind: cli
    name: nu_plugin_custom_values
  - exposure: global executable
    kind: cli
    name: nu_plugin_example
  - exposure: global executable
    kind: cli
    name: nu_plugin_formats
  - exposure: global executable
    kind: cli
    name: nu_plugin_gstat
  - exposure: global executable
    kind: cli
    name: nu_plugin_inc
  - exposure: global executable
    kind: cli
    name: nu_plugin_polars
  - exposure: global executable
    kind: cli
    name: nu_plugin_query
  - exposure: global executable
    kind: cli
    name: nu_plugin_stress_internals
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nushell
  av: sudo av install brew:nushell
  brew: brew install nushell
  chocolatey: choco install nushell
  dnf: sudo dnf install nu
  macports: sudo port install nushell
  nix: nix profile install nixpkgs#nushell
  pacman: sudo pacman -S nushell
  scoop: scoop install main/nu
  winget: winget install --id Nushell.Nushell -e
  zypper: sudo zypper install nushell
provenance:
  formula: nushell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
