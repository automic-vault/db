id: brew:recoverjpeg
display-name: recoverjpeg
homepage: https://rfc1149.net/devel/recoverjpeg.html
repo: https://rfc1149.net/download/recoverjpeg/recoverjpeg-2.6.3.tar.gz
docs: https://rfc1149.net/devel/recoverjpeg.html
package-manager:
  brew: recoverjpeg
  debian: recoverjpeg
  nix: recoverjpeg
  ubuntu: recoverjpeg
package-manager-url: https://formulae.brew.sh/formula/recoverjpeg
version: 2.6.3
license: GPL-2.0-only
category: media
tags:
  - cli
description: Tool to recover JPEG images from a file system image
source-archive: https://rfc1149.net/download/recoverjpeg/recoverjpeg-2.6.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: recoverjpeg
  - exposure: global executable
    kind: cli
    name: recovermov
  - exposure: global executable
    kind: cli
    name: remove-duplicates
