id: brew:ddd
display-name: ddd
homepage: https://www.gnu.org/software/ddd/
repo: https://ftpmirror.gnu.org/gnu/ddd/ddd-3.4.1.tar.gz
docs: https://www.gnu.org/software/ddd/
package-manager:
  brew: ddd
  debian: ddd
  dnf: ddd
  macports: ddd
  nix: ddd
  ubuntu: ddd
package-manager-url: https://formulae.brew.sh/formula/ddd
version: 3.4.1
license: >
  GPL-3.0-or-later AND GFDL-1.1-no-invariants-or-later AND
  GFDL-1.3-no-invariants-or-later AND HPND-sell-variant AND MIT-open-group
category: network
tags:
  - cli
description: Graphical front-end for command-line debuggers
source-archive: https://ftpmirror.gnu.org/gnu/ddd/ddd-3.4.1.tar.gz
dependencies:
  - fontconfig
  - libice
  - libsm
  - libx11
  - libxaw
  - libxext
  - libxft
  - libxmu
  - libxp
  - libxpm
  - libxt
  - openmotif
build-dependencies:
  - gnu-sed
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ddd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ddd
  brew: brew install ddd
  debian: sudo apt install ddd
  dnf: sudo dnf install ddd
  macports: sudo port install ddd
  nix: nix profile install nixpkgs#ddd
  ubuntu: sudo apt install ddd
provenance:
  formula: ddd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
