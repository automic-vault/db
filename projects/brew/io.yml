id: brew:io
display-name: io
homepage: http://iolanguage.com/
repo: https://github.com/IoLanguage/io
docs: http://iolanguage.com/
package-manager:
  brew: io
  macports: Io
  nix: io
package-manager-url: https://formulae.brew.sh/formula/io
version: 2017.09.06
license: BSD-3-Clause
category: development
tags:
  - cli
description: Small prototype-based programming language
source-archive: https://github.com/IoLanguage/io/archive/refs/tags/2017.09.06.tar.gz
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: io
  - exposure: global executable
    kind: cli
    name: io_static
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:io
  brew: brew install io
  macports: sudo port install Io
  nix: nix profile install nixpkgs#io
provenance:
  formula: io
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
