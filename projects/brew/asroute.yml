id: brew:asroute
display-name: asroute
homepage: https://github.com/stevenpack/asroute
repo: https://github.com/stevenpack/asroute
docs: https://github.com/stevenpack/asroute
package-manager:
  brew: asroute
package-manager-url: https://formulae.brew.sh/formula/asroute
version: 0.1.0
license: MIT
category: development
tags:
  - cli
description: CLI to interpret traceroute -a output to show AS names traversed
source-archive: https://github.com/stevenpack/asroute/archive/refs/tags/v0.1.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: asroute
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:asroute
  brew: brew install asroute
provenance:
  formula: asroute
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
