  brew: brew install virtualenv
  debian: sudo apt install virtualenv
  nix: nix profile install nixpkgs#virtualenv
  ubuntu: sudo apt install virtualenv
provenance:
  formula: virtualenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
