  debian: virtualenv
  nix: virtualenv
  ubuntu: virtualenv
package-manager-url: https://formulae.brew.sh/formula/virtualenv
version: 21.3.3
license: MIT
category: network
tags:
  - cli
description: Tool for creating isolated virtual python environments
source-archive: >
  https://files.pythonhosted.org/packages/15/ba/1f6e8c957e4932be060dcdc482d339c12e0216351478add3645cdaa53c05/virtualenv-21.3.3.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: virtualenv
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
