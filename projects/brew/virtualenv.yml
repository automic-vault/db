id: brew:virtualenv
display-name: virtualenv
homepage: https://virtualenv.pypa.io/
repo: >
  https://files.pythonhosted.org/packages/15/ba/1f6e8c957e4932be060dcdc482d339c12e0216351478add3645cdaa53c05/virtualenv-21.3.3.tar.gz
docs: https://virtualenv.pypa.io/
package-manager:
