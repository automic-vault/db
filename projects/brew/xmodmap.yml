id: brew:xmodmap
display-name: xmodmap
homepage: https://gitlab.freedesktop.org/xorg/app/xmodmap
repo: https://www.x.org/releases/individual/app/xmodmap-1.0.11.tar.xz
docs: https://gitlab.freedesktop.org/xorg/app/xmodmap
package-manager:
  apk: xmodmap
  brew: xmodmap
  dnf: xmodmap
  macports: xmodmap
  nix: xmodmap
  zypper: xmodmap
package-manager-url: https://formulae.brew.sh/formula/xmodmap
version: 1.0.11
license: MIT-open-group
category: development
tags:
  - cli
description: Modify keymaps and pointer button mappings in X
source-archive: https://www.x.org/releases/individual/app/xmodmap-1.0.11.tar.xz
dependencies:
  - libx11
build-dependencies:
  - pkgconf
  - xorgproto
executables:
  - exposure: global executable
    kind: cli
    name: xmodmap
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xmodmap
  av: sudo av install brew:xmodmap
  brew: brew install xmodmap
  dnf: sudo dnf install xmodmap
  macports: sudo port install xmodmap
  nix: nix profile install nixpkgs#xmodmap
  zypper: sudo zypper install xmodmap
provenance:
  formula: xmodmap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
