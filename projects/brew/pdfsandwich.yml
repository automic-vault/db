id: brew:pdfsandwich
display-name: pdfsandwich
homepage: http://www.tobias-elze.de/pdfsandwich/
repo: >
  https://downloads.sourceforge.net/project/pdfsandwich/pdfsandwich%200.1.7/pdfsandwich-0.1.7.tar.bz2
docs: http://www.tobias-elze.de/pdfsandwich/
package-manager:
  brew: pdfsandwich
  debian: pdfsandwich
  macports: pdfsandwich
  nix: pdfsandwich
  ubuntu: pdfsandwich
package-manager-url: https://formulae.brew.sh/formula/pdfsandwich
version: 0.1.7
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Generate sandwich OCR PDFs from scanned file
source-archive: >
  https://downloads.sourceforge.net/project/pdfsandwich/pdfsandwich%200.1.7/pdfsandwich-0.1.7.tar.bz2
dependencies:
  - exact-image
  - ghostscript
  - imagemagick
  - poppler
  - tesseract
  - unpaper
build-dependencies:
  - gawk
  - ocaml
executables:
  - exposure: global executable
    kind: cli
    name: pdfsandwich
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pdfsandwich
  brew: brew install pdfsandwich
  debian: sudo apt install pdfsandwich
  macports: sudo port install pdfsandwich
  nix: nix profile install nixpkgs#pdfsandwich
  ubuntu: sudo apt install pdfsandwich
provenance:
  formula: pdfsandwich
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
