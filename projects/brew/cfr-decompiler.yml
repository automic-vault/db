id: brew:cfr-decompiler
display-name: cfr-decompiler
homepage: https://www.benf.org/other/cfr/
repo: https://github.com/leibnitz27/cfr
docs: https://www.benf.org/other/cfr/
package-manager:
  brew: cfr-decompiler
package-manager-url: https://formulae.brew.sh/formula/cfr-decompiler
version: 0.152
license: MIT
category: development
tags:
  - cli
description: Yet Another Java Decompiler
source-archive: https://github.com/leibnitz27/cfr.git
dependencies:
