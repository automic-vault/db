id: brew:progressline
display-name: progressline
homepage: https://github.com/kattouf/ProgressLine
repo: https://github.com/kattouf/ProgressLine
docs: https://github.com/kattouf/ProgressLine
package-manager:
  brew: progressline
package-manager-url: https://formulae.brew.sh/formula/progressline
version: 0.2.4
license: MIT
category: security
tags:
  - cli
description: Track commands progress in a compact one-line format
source-archive: https://github.com/kattouf/ProgressLine/archive/refs/tags/0.2.4.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: progressline
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:progressline
  brew: brew install progressline
provenance:
  formula: progressline
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
