id: brew:minijinja-cli
display-name: minijinja-cli
homepage: https://docs.rs/minijinja/latest/minijinja/
repo: https://github.com/mitsuhiko/minijinja
docs: https://docs.rs/minijinja/latest/minijinja/
package-manager:
  apk: minijinja-cli
  brew: minijinja-cli
package-manager-url: https://formulae.brew.sh/formula/minijinja-cli
version: 2.20.0
license: Apache-2.0
category: development
tags:
  - cli
description: Render Jinja2 templates directly from the command-line to stdout
source-archive: https://github.com/mitsuhiko/minijinja/archive/refs/tags/2.20.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: minijinja-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add minijinja-cli
  av: sudo av install brew:minijinja-cli
  brew: brew install minijinja-cli
provenance:
  formula: minijinja-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
