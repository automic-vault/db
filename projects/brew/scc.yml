id: brew:scc
display-name: scc
homepage: https://github.com/boyter/scc/
repo: https://github.com/boyter/scc
docs: https://github.com/boyter/scc/
package-manager:
  apk: scc
  brew: scc
  macports: scc
  nix: scc
  scoop: main/scc
  winget: BenBoyter.scc
  zypper: scc
package-manager-url: https://formulae.brew.sh/formula/scc
version: 3.7.0
license: MIT OR Unlicense
category: development
tags:
  - cli
description: Fast and accurate code counter with complexity and COCOMO estimates
source-archive: https://github.com/boyter/scc/archive/refs/tags/v3.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: scc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add scc
  av: sudo av install brew:scc
  brew: brew install scc
  macports: sudo port install scc
  nix: nix profile install nixpkgs#scc
  scoop: scoop install main/scc
  winget: winget install --id BenBoyter.scc -e
  zypper: sudo zypper install scc
provenance:
  formula: scc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
