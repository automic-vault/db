id: brew:mgba
display-name: mgba
homepage: https://mgba.io/
repo: https://github.com/mgba-emu/mgba
docs: https://mgba.io/
package-manager:
  apk: mgba
  brew: mgba
  nix: mgba
  winget: JeffreyPfau.mGBA
package-manager-url: https://formulae.brew.sh/formula/mgba
version: 0.10.5
license: MPL-2.0
category: development
tags:
  - cli
description: Game Boy Advance emulator
source-archive: https://github.com/mgba-emu/mgba/archive/refs/tags/0.10.5.tar.gz
dependencies:
  - ffmpeg
  - libepoxy
  - libpng
  - libzip
  - lua
  - qt@5
  - sdl2
  - sqlite
build-dependencies:
  - cmake
  - libelf
  - pkgconf
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: mGBA
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mgba
  av: sudo av install brew:mgba
  brew: brew install mgba
  nix: nix profile install nixpkgs#mgba
  winget: winget install --id JeffreyPfau.mGBA -e
provenance:
  formula: mgba
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
