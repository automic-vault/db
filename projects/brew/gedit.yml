id: brew:gedit
display-name: gedit
homepage: https://gedit-technology.github.io/apps/gedit/
repo: https://gitlab.gnome.org/World/gedit/gedit/-/archive/50.0/gedit-50.0.tar.bz2
docs: https://gedit-technology.github.io/apps/gedit/
package-manager:
  apk: gedit
  brew: gedit
  debian: gedit
  dnf: gedit
  macports: gedit
  nix: gedit
  pacman: gedit
  scoop: extras/gedit
  ubuntu: gedit
  zypper: gedit
package-manager-url: https://formulae.brew.sh/formula/gedit
version: 50.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: GNOME text editor
source-archive: https://gitlab.gnome.org/World/gedit/gedit/-/archive/50.0/gedit-50.0.tar.bz2
dependencies:
  - adwaita-icon-theme
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gobject-introspection
  - gsettings-desktop-schemas
  - gspell
  - gtk+3
  - gtk-mac-integration
  - libgedit-amtk
  - libgedit-gfls
  - libgedit-gtksourceview
  - libgedit-tepl
  - libpeas@1
  - pango
build-dependencies:
  - desktop-file-utils
  - docbook-xsl
  - gettext
  - gtk-doc
  - itstool
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gedit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add gedit
  av: sudo av install brew:gedit
  brew: brew install gedit
  debian: sudo apt install gedit
  dnf: sudo dnf install gedit
  macports: sudo port install gedit
  nix: nix profile install nixpkgs#gedit
  pacman: sudo pacman -S gedit
  scoop: scoop install extras/gedit
  ubuntu: sudo apt install gedit
  zypper: sudo zypper install gedit
provenance:
  formula: gedit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
