id: brew:sysbench
display-name: sysbench
homepage: https://github.com/akopytov/sysbench
repo: https://github.com/akopytov/sysbench
docs: https://github.com/akopytov/sysbench
package-manager:
  apk: sysbench
  brew: sysbench
  debian: sysbench
  dnf: sysbench
  macports: sysbench
  nix: sysbench
  pacman: sysbench
  ubuntu: sysbench
  zypper: sysbench
package-manager-url: https://formulae.brew.sh/formula/sysbench
version: 1.0.20
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: System performance benchmark tool
source-archive: https://github.com/akopytov/sysbench/archive/refs/tags/1.0.20.tar.gz
dependencies:
  - libpq
  - luajit
  - mariadb-connector-c
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - vim
executables:
  - exposure: global executable
    kind: cli
    name: sysbench
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sysbench
  av: sudo av install brew:sysbench
  brew: brew install sysbench
  debian: sudo apt install sysbench
  dnf: sudo dnf install sysbench
  macports: sudo port install sysbench
  nix: nix profile install nixpkgs#sysbench
  pacman: sudo pacman -S sysbench
  ubuntu: sudo apt install sysbench
  zypper: sudo zypper install sysbench
provenance:
  formula: sysbench
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
