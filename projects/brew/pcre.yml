id: brew:pcre
display-name: pcre
homepage: https://www.pcre.org/
repo: https://downloads.sourceforge.net/project/pcre/pcre/8.45/pcre-8.45.tar.bz2
docs: https://www.pcre.org/
package-manager:
  apk: pcre
  brew: pcre
  macports: pcre
  nix: pcre
  pacman: pcre
  scoop: main/pcregrep
  ubuntu: pcregrep
package-manager-url: https://formulae.brew.sh/formula/pcre
version: 8.45
license: BSD-3-Clause
category: network
tags:
  - cli
description: Perl compatible regular expressions library
source-archive: https://downloads.sourceforge.net/project/pcre/pcre/8.45/pcre-8.45.tar.bz2
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: pcre-config
  - exposure: global executable
    kind: cli
    name: pcregrep
  - exposure: global executable
    kind: cli
    name: pcretest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pcre
  av: sudo av install brew:pcre
  brew: brew install pcre
  macports: sudo port install pcre
  nix: nix profile install nixpkgs#pcre
  pacman: sudo pacman -S pcre
  scoop: scoop install main/pcregrep
  ubuntu: sudo apt install pcregrep
provenance:
  formula: pcre
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
