id: brew:suricata
display-name: suricata
homepage: https://suricata.io
repo: https://www.openinfosecfoundation.org/download/suricata-8.0.5.tar.gz
docs: https://suricata.io
package-manager:
  apk: suricata
  brew: suricata
  debian: suricata
  dnf: suricata
  macports: suricata
  nix: suricata
  ubuntu: suricata
  zypper: suricata
package-manager-url: https://formulae.brew.sh/formula/suricata
version: 8.0.5
license: GPL-2.0-only
category: security
tags:
  - cli
  - security
description: Network IDS, IPS, and security monitoring engine
source-archive: https://www.openinfosecfoundation.org/download/suricata-8.0.5.tar.gz
dependencies:
  - jansson
  - libmagic
  - libnet
  - libyaml
  - lz4
  - pcre2
  - python@3.14
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: suricata
  - exposure: global executable
    kind: cli
    name: suricata-update
  - exposure: global executable
    kind: cli
    name: suricatactl
  - exposure: global executable
    kind: cli
    name: suricatasc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add suricata
  av: sudo av install brew:suricata
  brew: brew install suricata
  debian: sudo apt install suricata
  dnf: sudo dnf install suricata
  macports: sudo port install suricata
  nix: nix profile install nixpkgs#suricata
  ubuntu: sudo apt install suricata
  zypper: sudo zypper install suricata
provenance:
  formula: suricata
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
