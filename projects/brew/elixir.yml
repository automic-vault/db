id: brew:elixir
display-name: elixir
homepage: https://elixir-lang.org/
repo: https://github.com/elixir-lang/elixir
docs: https://elixir-lang.org/
package-manager:
  apk: elixir
  brew: elixir
  chocolatey: Elixir
  debian: elixir
  dnf: elixir
  macports: elixir
  pacman: elixir
  scoop: main/elixir
  ubuntu: elixir
  zypper: elixir
package-manager-url: https://formulae.brew.sh/formula/elixir
version: 1.19.5
license: Apache-2.0
category: development
tags:
  - cli
description: Functional metaprogramming aware language built on Erlang VM
source-archive: https://github.com/elixir-lang/elixir/archive/refs/tags/v1.19.5.tar.gz
dependencies:
  - erlang
executables:
  - exposure: global executable
    kind: cli
    name: elixir
  - exposure: global executable
    kind: cli
    name: elixirc
  - exposure: global executable
    kind: cli
    name: iex
  - exposure: global executable
    kind: cli
    name: mix
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add elixir
  av: sudo av install brew:elixir
  brew: brew install elixir
  chocolatey: choco install Elixir
  debian: sudo apt install elixir
  dnf: sudo dnf install elixir
  macports: sudo port install elixir
  pacman: sudo pacman -S elixir
  scoop: scoop install main/elixir
  ubuntu: sudo apt install elixir
  zypper: sudo zypper install elixir
provenance:
  formula: elixir
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
