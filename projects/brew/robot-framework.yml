id: brew:robot-framework
display-name: robot-framework
homepage: https://robotframework.org/
repo: >
  https://files.pythonhosted.org/packages/19/f3/ad51daf85d95848831601851598640f951a47a9f9de88039235cf58c5bb9/robotframework-7.4.2.tar.gz
docs: https://robotframework.org/
package-manager:
  brew: robot-framework
package-manager-url: https://formulae.brew.sh/formula/robot-framework
version: 7.4.2
license: Apache-2.0
category: network
tags:
  - cli
description: Open source test framework for acceptance testing
source-archive: >
  https://files.pythonhosted.org/packages/19/f3/ad51daf85d95848831601851598640f951a47a9f9de88039235cf58c5bb9/robotframework-7.4.2.tar.gz
dependencies:
  - certifi
  - cryptography
  - libsodium
  - python@3.14
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: libdoc
  - exposure: global executable
    kind: cli
    name: rebot
  - exposure: global executable
    kind: cli
    name: robot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:robot-framework
  brew: brew install robot-framework
provenance:
  formula: robot-framework
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
