id: brew:apr-util
display-name: apr-util
homepage: https://apr.apache.org/
repo: https://www.apache.org/dyn/closer.lua?path=apr/apr-util-1.6.3.tar.bz2
docs: https://apr.apache.org/
package-manager:
  apk: apr-util
  brew: apr-util
  dnf: apr-util
  macports: apr-util
  pacman: apr-util
package-manager-url: https://formulae.brew.sh/formula/apr-util
version: 1.6.3
license: Apache-2.0
category: network
tags:
  - cli
description: Companion library to apr, the Apache Portable Runtime library
source-archive: https://www.apache.org/dyn/closer.lua?path=apr/apr-util-1.6.3.tar.bz2
dependencies:
  - apr
  - openssl@3
uses-from-macos:
  - expat
  - libxcrypt
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: apu-1-config
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add apr-util
  av: sudo av install brew:apr-util
  brew: brew install apr-util
  dnf: sudo dnf install apr-util
  macports: sudo port install apr-util
  pacman: sudo pacman -S apr-util
provenance:
  formula: apr-util
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
