id: brew:libgsm
display-name: libgsm
homepage: https://www.quut.com/gsm/
repo: https://www.quut.com/gsm/gsm-1.0.24.tar.gz
docs: https://www.quut.com/gsm/
package-manager:
  brew: libgsm
  macports: libgsm
  nix: tcat
package-manager-url: https://formulae.brew.sh/formula/libgsm
version: 1.0.24
license: TU-Berlin-2.0
category: network
tags:
  - cli
description: Lossy speech compression library
source-archive: https://www.quut.com/gsm/gsm-1.0.24.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: tcat
  - exposure: global executable
    kind: cli
    name: toast
  - exposure: global executable
    kind: cli
    name: untoast
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libgsm
  brew: brew install libgsm
  macports: sudo port install libgsm
  nix: nix profile install nixpkgs#tcat
provenance:
  formula: libgsm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
