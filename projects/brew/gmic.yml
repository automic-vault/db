id: brew:gmic
display-name: gmic
homepage: https://gmic.eu/
repo: https://gmic.eu/files/source/gmic_3.7.6.tar.gz
docs: https://gmic.eu/
package-manager:
  apk: gmic
  brew: gmic
  debian: gmic
  dnf: gmic
  macports: gmic
  nix: gmic
  pacman: gmic
  ubuntu: gmic
  zypper: gmic
package-manager-url: https://formulae.brew.sh/formula/gmic
version: 3.7.6
license: CECILL-2.1
category: media
tags:
  - cli
description: Full-Featured Open-Source Framework for Image Processing
source-archive: https://gmic.eu/files/source/gmic_3.7.6.tar.gz
dependencies:
  - cimg
  - fftw
  - imath
  - jpeg-turbo
  - libomp
  - libpng
  - libtiff
  - openexr
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: gmic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gmic
  av: sudo av install brew:gmic
  brew: brew install gmic
  debian: sudo apt install gmic
  dnf: sudo dnf install gmic
  macports: sudo port install gmic
  nix: nix profile install nixpkgs#gmic
  pacman: sudo pacman -S gmic
  ubuntu: sudo apt install gmic
  zypper: sudo zypper install gmic
provenance:
  formula: gmic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
