id: brew:haiti
display-name: haiti
homepage: https://noraj.github.io/haiti/#/
repo: https://github.com/noraj/haiti
docs: https://noraj.github.io/haiti/#/
package-manager:
  brew: haiti
  nix: haiti
package-manager-url: https://formulae.brew.sh/formula/haiti
version: 4.0.0
license: MIT
category: development
tags:
  - cli
description: Hash type identifier
source-archive: https://github.com/noraj/haiti/archive/refs/tags/v4.0.0.tar.gz
dependencies:
  - ruby
build-dependencies:
  - rust
uses-from-macos:
  - llvm
executables:
  - exposure: global executable
    kind: cli
    name: haiti
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:haiti
  brew: brew install haiti
  nix: nix profile install nixpkgs#haiti
provenance:
  formula: haiti
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
