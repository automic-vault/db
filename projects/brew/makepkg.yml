id: brew:makepkg
display-name: makepkg
homepage: https://wiki.archlinux.org/index.php/makepkg
repo: https://gitlab.archlinux.org/pacman/pacman
docs: https://wiki.archlinux.org/index.php/makepkg
package-manager:
  apk: pacman
  brew: makepkg
  debian: makepkg
  dnf: pacman
  nix: pacman
  pacman: pacman
  ubuntu: makepkg
package-manager-url: https://formulae.brew.sh/formula/makepkg
version: 7.1.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Compile and build packages suitable for installation with pacman
source-archive: https://gitlab.archlinux.org/pacman/pacman.git
dependencies:
  - bash
  - fakeroot
  - libarchive
  - openssl@3
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: makepkg
  - exposure: global executable
    kind: cli
    name: makepkg-template
  - exposure: global executable
    kind: cli
    name: pacman
  - exposure: global executable
    kind: cli
    name: pacman-conf
  - exposure: global executable
    kind: cli
    name: pacman-db-upgrade
  - exposure: global executable
    kind: cli
    name: pacman-key
  - exposure: global executable
    kind: cli
    name: repo-add
  - exposure: global executable
    kind: cli
    name: repo-elephant
  - exposure: global executable
    kind: cli
    name: repo-remove
  - exposure: global executable
    kind: cli
    name: testpkg
  - exposure: global executable
    kind: cli
    name: vercmp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pacman
  av: sudo av install brew:makepkg
  brew: brew install makepkg
  debian: sudo apt install makepkg
  dnf: sudo dnf install pacman
  nix: nix profile install nixpkgs#pacman
  pacman: sudo pacman -S pacman
  ubuntu: sudo apt install makepkg
provenance:
  formula: makepkg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
