id: brew:lolcode
display-name: lolcode
homepage: http://www.lolcode.org/
repo: https://github.com/justinmeza/lci
docs: http://www.lolcode.org/
package-manager:
  brew: lolcode
  nix: lolcode
package-manager-url: https://formulae.brew.sh/formula/lolcode
version: 1.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Esoteric programming language
source-archive: https://github.com/justinmeza/lci/archive/refs/tags/v1.3.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: lci
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lolcode
  brew: brew install lolcode
  nix: nix profile install nixpkgs#lolcode
provenance:
  formula: lolcode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
