id: brew:ocrad
display-name: ocrad
homepage: https://www.gnu.org/software/ocrad/
repo: https://ftpmirror.gnu.org/gnu/ocrad/ocrad-0.29.tar.lz
docs: https://www.gnu.org/software/ocrad/
package-manager:
  brew: ocrad
  debian: ocrad
  dnf: ocrad
  macports: ocrad
  nix: ocrad
  pacman: ocrad
  ubuntu: ocrad
  zypper: ocrad
package-manager-url: https://formulae.brew.sh/formula/ocrad
version: 0.29
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Optical character recognition (OCR) program
source-archive: https://ftpmirror.gnu.org/gnu/ocrad/ocrad-0.29.tar.lz
dependencies:
  - libpng
executables:
  - exposure: global executable
    kind: cli
    name: ocrad
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ocrad
  brew: brew install ocrad
  debian: sudo apt install ocrad
  dnf: sudo dnf install ocrad
  macports: sudo port install ocrad
  nix: nix profile install nixpkgs#ocrad
  pacman: sudo pacman -S ocrad
  ubuntu: sudo apt install ocrad
  zypper: sudo zypper install ocrad
provenance:
  formula: ocrad
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
