id: brew:dagger
display-name: dagger
homepage: https://dagger.io
repo: https://github.com/dagger/dagger
docs: https://dagger.io
package-manager:
  brew: dagger
  macports: dagger
  pacman: dagger
  scoop: main/dagger
  winget: Dagger.Cli
package-manager-url: https://formulae.brew.sh/formula/dagger
version: 0.21.0
license: Apache-2.0
category: development
tags:
  - cli
description: Portable devkit for CI/CD pipelines
source-archive: https://github.com/dagger/dagger/archive/refs/tags/v0.21.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dagger
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dagger
  brew: brew install dagger
  macports: sudo port install dagger
  pacman: sudo pacman -S dagger
  scoop: scoop install main/dagger
  winget: winget install --id Dagger.Cli -e
provenance:
  formula: dagger
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
