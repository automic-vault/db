bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-binutils
  brew: brew install cargo-binutils
  debian: sudo apt install cargo-binutils
  nix: nix profile install nixpkgs#cargo-binutils
  pacman: sudo pacman -S cargo-binutils
  ubuntu: sudo apt install cargo-binutils
provenance:
  formula: cargo-binutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
