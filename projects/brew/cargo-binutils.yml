id: brew:cargo-binutils
display-name: cargo-binutils
homepage: https://github.com/rust-embedded/cargo-binutils
repo: https://static.crates.io/crates/cargo-binutils/cargo-binutils-0.4.0.crate
docs: https://github.com/rust-embedded/cargo-binutils
package-manager:
  brew: cargo-binutils
  debian: cargo-binutils
  nix: cargo-binutils
  pacman: cargo-binutils
  ubuntu: cargo-binutils
package-manager-url: https://formulae.brew.sh/formula/cargo-binutils
version: 0.4.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Cargo subcommands to invoke the LLVM tools shipped with the Rust toolchain
source-archive: https://static.crates.io/crates/cargo-binutils/cargo-binutils-0.4.0.crate
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-cov
  - exposure: global executable
    kind: cli
    name: cargo-nm
  - exposure: global executable
    kind: cli
    name: cargo-objcopy
  - exposure: global executable
    kind: cli
    name: cargo-objdump
  - exposure: global executable
    kind: cli
    name: cargo-profdata
  - exposure: global executable
    kind: cli
    name: cargo-readobj
  - exposure: global executable
    kind: cli
    name: cargo-size
  - exposure: global executable
    kind: cli
    name: cargo-strip
  - exposure: global executable
    kind: cli
    name: rust-ar
  - exposure: global executable
    kind: cli
    name: rust-as
  - exposure: global executable
    kind: cli
    name: rust-cov
  - exposure: global executable
    kind: cli
    name: rust-ld
  - exposure: global executable
    kind: cli
    name: rust-lld
  - exposure: global executable
    kind: cli
    name: rust-nm
