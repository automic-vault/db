id: brew:ldpl
display-name: ldpl
homepage: https://www.ldpl-lang.org/
repo: https://github.com/Lartu/ldpl
docs: https://www.ldpl-lang.org/
package-manager:
  brew: ldpl
package-manager-url: https://formulae.brew.sh/formula/ldpl
version: 5.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: COBOL-like programming language that compiles to C++
source-archive: https://github.com/Lartu/ldpl/archive/refs/tags/LDPL-5.1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ldpl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ldpl
  brew: brew install ldpl
provenance:
  formula: ldpl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
