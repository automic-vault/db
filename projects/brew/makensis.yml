repo: https://downloads.sourceforge.net/project/nsis/NSIS%203/3.12/nsis-3.12-src.tar.bz2
docs: https://nsis.sourceforge.net/
package-manager:
  brew: makensis
package-manager-url: https://formulae.brew.sh/formula/makensis
version: 3.12
license: Zlib
category: network
tags:
