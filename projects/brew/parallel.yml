    name: env_parallel.mksh
  - exposure: global executable
    kind: cli
    name: env_parallel.pdksh
  - exposure: global executable
    kind: cli
    name: env_parallel.sh
  - exposure: global executable
    kind: cli
    name: env_parallel.tcsh
  - exposure: global executable
    kind: cli
    name: env_parallel.zsh
  - exposure: global executable
    kind: cli
