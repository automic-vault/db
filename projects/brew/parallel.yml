    kind: cli
    name: sql
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To use the --csv option, the Perl Text::CSV module has to be installed. You can
    install it via: perl -MCPAN -e'install Text::CSV'
  post-install-defined: false
install-lines:
  apk: sudo apk add parallel
  av: sudo av install brew:parallel
  brew: brew install parallel
  debian: sudo apt install parallel
  dnf: sudo dnf install parallel
  macports: sudo port install parallel
  nix: nix profile install nixpkgs#parallel
  pacman: sudo pacman -S parallel
  ubuntu: sudo apt install parallel
provenance:
  formula: parallel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
