id: brew:zxc
display-name: zxc
homepage: https://github.com/hellobertrand/zxc
repo: https://github.com/hellobertrand/zxc
docs: https://github.com/hellobertrand/zxc
package-manager:
  brew: zxc
package-manager-url: https://formulae.brew.sh/formula/zxc
version: 0.11.0
license: BSD-3-Clause
category: security
tags:
  - cli
description: High-performance asymmetric lossless compression library
source-archive: https://github.com/hellobertrand/zxc/archive/refs/tags/v0.11.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: zxc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zxc
  brew: brew install zxc
provenance:
  formula: zxc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
