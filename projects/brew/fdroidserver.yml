id: brew:fdroidserver
display-name: fdroidserver
homepage: https://f-droid.org
repo: >
  https://files.pythonhosted.org/packages/32/c6/f4b247069f703b765037888a24e0fa9508ea9590e78cb344908c90d6e7bd/fdroidserver-2.4.4.tar.gz
docs: https://f-droid.org
package-manager:
  brew: fdroidserver
  debian: fdroidserver
  macports: fdroidserver
  nix: fdroidserver
  ubuntu: fdroidserver
package-manager-url: https://formulae.brew.sh/formula/fdroidserver
version: 2.4.4
license: AGPL-3.0-or-later
category: network
tags:
  - cli
description: Create and manage Android app repositories for F-Droid
source-archive: >
  https://files.pythonhosted.org/packages/32/c6/f4b247069f703b765037888a24e0fa9508ea9590e78cb344908c90d6e7bd/fdroidserver-2.4.4.tar.gz
dependencies:
  - certifi
  - cryptography
  - freetype
  - libmagic
  - libsodium
  - libyaml
  - numpy
  - pillow
  - python@3.14
  - qhull
  - rclone
  - s3cmd
build-dependencies:
  - cmake
  - ninja
  - pkgconf
  - pybind11
  - rust
uses-from-macos:
  - libffi
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: fdroid
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    For complete functionality, fdroidserver requires that the Android SDK's
    "build-tools" and "platform-tools" are installed, and those require a Java JDK.
    Also, it is best if the base path of the Android SDK is set in the environment
    variable ANDROID_HOME. To do this all from the command line, run: brew install
    --cask android-commandlinetools temurin export
    ANDROID_HOME=$HOMEBREW_CELLAR/fdroidserver/2.4.4_3/share/android-commandlinetools
    $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools"
    "build-tools;34.0.0"
  post-install-defined: false
install-lines:
  av: sudo av install brew:fdroidserver
  brew: brew install fdroidserver
  debian: sudo apt install fdroidserver
  macports: sudo port install fdroidserver
  nix: nix profile install nixpkgs#fdroidserver
  ubuntu: sudo apt install fdroidserver
provenance:
  formula: fdroidserver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
