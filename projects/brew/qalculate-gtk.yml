id: brew:qalculate-gtk
display-name: qalculate-gtk
homepage: https://qalculate.github.io/
repo: https://github.com/Qalculate/qalculate-gtk
docs: https://qalculate.github.io/
package-manager:
  apk: qalculate-gtk
  brew: qalculate-gtk
  debian: qalculate-gtk
  dnf: qalculate-gtk
  macports: qalculate-gtk
  nix: qalculate-gtk
  pacman: qalculate-gtk
  ubuntu: qalculate-gtk
  zypper: qalculate-gtk
package-manager-url: https://formulae.brew.sh/formula/qalculate-gtk
version: 5.11.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Multi-purpose desktop calculator
source-archive: >
  https://github.com/Qalculate/qalculate-gtk/releases/download/v5.11.0/qalculate-gtk-5.11.0.tar.gz
dependencies:
  - adwaita-icon-theme
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - gtk-mac-integration
  - harfbuzz
  - libqalculate
  - pango
build-dependencies:
  - gettext
  - intltool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: qalculate-gtk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add qalculate-gtk
  av: sudo av install brew:qalculate-gtk
  brew: brew install qalculate-gtk
  debian: sudo apt install qalculate-gtk
  dnf: sudo dnf install qalculate-gtk
  macports: sudo port install qalculate-gtk
  nix: nix profile install nixpkgs#qalculate-gtk
  pacman: sudo pacman -S qalculate-gtk
  ubuntu: sudo apt install qalculate-gtk
  zypper: sudo zypper install qalculate-gtk
provenance:
  formula: qalculate-gtk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
