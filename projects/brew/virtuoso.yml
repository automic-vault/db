id: brew:virtuoso
display-name: virtuoso
homepage: https://virtuoso.openlinksw.com
repo: https://github.com/openlink/virtuoso-opensource
docs: https://virtuoso.openlinksw.com
package-manager:
  brew: virtuoso
  macports: virtuoso
package-manager-url: https://formulae.brew.sh/formula/virtuoso
version: 7.2.17
license: GPL-2.0-only WITH x11vnc-openssl-exception
category: database
tags:
  - cli
  - database
description: High-performance object-relational SQL database
source-archive: >
  https://github.com/openlink/virtuoso-opensource/releases/download/v7.2.17/virtuoso-opensource-7.2.17.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - gawk
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: inifile
  - exposure: global executable
    kind: cli
    name: isqlw
  - exposure: global executable
    kind: cli
    name: virt_mail
  - exposure: global executable
    kind: cli
    name: virtuoso-t
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    NOTE: the Virtuoso server will start up several times on port 1111 during the
    install process.
  post-install-defined: false
install-lines:
  av: sudo av install brew:virtuoso
  brew: brew install virtuoso
  macports: sudo port install virtuoso
provenance:
  formula: virtuoso
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
