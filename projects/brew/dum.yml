id: brew:dum
display-name: dum
homepage: https://github.com/egoist/dum
repo: https://github.com/egoist/dum
docs: https://github.com/egoist/dum
package-manager:
  apk: dum
  brew: dum
  nix: dum
  scoop: main/dum
package-manager-url: https://formulae.brew.sh/formula/dum
version: 0.1.20
license: MIT
category: development
tags:
  - cli
description: Npm scripts runner written in Rust
source-archive: https://github.com/egoist/dum/archive/refs/tags/v0.1.20.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dum
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dum
  av: sudo av install brew:dum
  brew: brew install dum
  nix: nix profile install nixpkgs#dum
  scoop: scoop install main/dum
provenance:
  formula: dum
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
