id: brew:ttyd
display-name: ttyd
homepage: https://tsl0922.github.io/ttyd/
repo: https://github.com/tsl0922/ttyd
docs: https://tsl0922.github.io/ttyd/
package-manager:
  apk: ttyd
  brew: ttyd
  dnf: ttyd
  macports: ttyd
  nix: ttyd
  pacman: ttyd
  scoop: main/ttyd
  ubuntu: ttyd
  winget: tsl0922.ttyd
  zypper: ttyd
package-manager-url: https://formulae.brew.sh/formula/ttyd
version: 1.7.7
license: MIT
category: development
tags:
  - cli
description: Command-line tool for sharing terminal over the web
source-archive: https://github.com/tsl0922/ttyd/archive/refs/tags/1.7.7.tar.gz
dependencies:
  - json-c
  - libevent
  - libuv
  - libwebsockets
  - openssl@3
build-dependencies:
  - cmake
uses-from-macos:
  - vim
executables:
  - exposure: global executable
    kind: cli
    name: ttyd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ttyd
  av: sudo av install brew:ttyd
  brew: brew install ttyd
  dnf: sudo dnf install ttyd
  macports: sudo port install ttyd
  nix: nix profile install nixpkgs#ttyd
  pacman: sudo pacman -S ttyd
  scoop: scoop install main/ttyd
  ubuntu: sudo apt install ttyd
  winget: winget install --id tsl0922.ttyd -e
  zypper: sudo zypper install ttyd
provenance:
  formula: ttyd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
