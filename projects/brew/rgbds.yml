id: brew:rgbds
display-name: rgbds
homepage: https://rgbds.gbdev.io
repo: https://github.com/gbdev/rgbds
docs: https://rgbds.gbdev.io
package-manager:
  apk: rgbds
  brew: rgbds
  dnf: rgbds
  nix: rgbds
  pacman: rgbds
  zypper: rgbds
package-manager-url: https://formulae.brew.sh/formula/rgbds
version: 1.0.1
license: MIT
category: development
tags:
  - cli
description: Rednex GameBoy Development System
source-archive: https://github.com/gbdev/rgbds/archive/refs/tags/v1.0.1.tar.gz
dependencies:
  - libpng
build-dependencies:
  - bison
  - cmake
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rgbasm
  - exposure: global executable
    kind: cli
    name: rgbfix
  - exposure: global executable
    kind: cli
    name: rgbgfx
  - exposure: global executable
    kind: cli
    name: rgblink
  - exposure: global executable
    kind: cli
    name: rgbobj
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rgbds
  av: sudo av install brew:rgbds
  brew: brew install rgbds
  dnf: sudo dnf install rgbds
  nix: nix profile install nixpkgs#rgbds
  pacman: sudo pacman -S rgbds
  zypper: sudo zypper install rgbds
provenance:
  formula: rgbds
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
