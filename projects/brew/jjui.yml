id: brew:jjui
display-name: jjui
homepage: https://github.com/idursun/jjui
repo: https://github.com/idursun/jjui
docs: https://github.com/idursun/jjui
package-manager:
  brew: jjui
  macports: jjui
  nix: jjui
  scoop: extras/jjui
  winget: IbrahimDursun.jjui
package-manager-url: https://formulae.brew.sh/formula/jjui
version: 0.10.6
license: MIT
category: development
tags:
  - cli
description: TUI for interacting with the Jujutsu version control system
source-archive: https://github.com/idursun/jjui/archive/refs/tags/v0.10.6.tar.gz
dependencies:
  - jj
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jjui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jjui
  brew: brew install jjui
  macports: sudo port install jjui
  nix: nix profile install nixpkgs#jjui
  scoop: scoop install extras/jjui
  winget: winget install --id IbrahimDursun.jjui -e
provenance:
  formula: jjui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
