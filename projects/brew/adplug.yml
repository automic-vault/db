id: brew:adplug
display-name: adplug
homepage: https://adplug.github.io
repo: https://github.com/adplug/adplug
docs: https://adplug.github.io
package-manager:
  brew: adplug
  dnf: adplug
  macports: adplug
  zypper: adplugdb
package-manager-url: https://formulae.brew.sh/formula/adplug
version: 2.4
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Free, hardware independent AdLib sound player library
source-archive: https://github.com/adplug/adplug/releases/download/adplug-2.4/adplug-2.4.tar.bz2
dependencies:
  - libbinio
build-dependencies:
  - pkgconf
  - texinfo
executables:
  - exposure: global executable
    kind: cli
    name: adplugdb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:adplug
  brew: brew install adplug
  dnf: sudo dnf install adplug
  macports: sudo port install adplug
  zypper: sudo zypper install adplugdb
provenance:
  formula: adplug
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
