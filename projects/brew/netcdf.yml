id: brew:netcdf
display-name: netcdf
homepage: https://www.unidata.ucar.edu/software/netcdf/
repo: https://github.com/Unidata/netcdf-c
docs: https://www.unidata.ucar.edu/software/netcdf/
package-manager:
  apk: netcdf
  brew: netcdf
  dnf: netcdf
  macports: netcdf
  nix: netcdf
  pacman: netcdf
  winget: Unidata.NetCDF
  zypper: netcdf
package-manager-url: https://formulae.brew.sh/formula/netcdf
version: 4.10.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Libraries and data formats for array-oriented scientific data
source-archive: https://github.com/Unidata/netcdf-c/archive/refs/tags/v4.10.0.tar.gz
dependencies:
  - hdf5
  - libaec
  - zstd
build-dependencies:
  - cmake
uses-from-macos:
  - bzip2
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: nc-config
  - exposure: global executable
    kind: cli
    name: nccopy
  - exposure: global executable
    kind: cli
    name: ncdump
  - exposure: global executable
    kind: cli
    name: ncgen
  - exposure: global executable
    kind: cli
    name: ncgen3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add netcdf
  av: sudo av install brew:netcdf
  brew: brew install netcdf
  dnf: sudo dnf install netcdf
  macports: sudo port install netcdf
  nix: nix profile install nixpkgs#netcdf
  pacman: sudo pacman -S netcdf
  winget: winget install --id Unidata.NetCDF -e
  zypper: sudo zypper install netcdf
provenance:
  formula: netcdf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
