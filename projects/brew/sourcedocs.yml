id: brew:sourcedocs
display-name: sourcedocs
homepage: https://github.com/SourceDocs/SourceDocs
repo: https://github.com/SourceDocs/SourceDocs
docs: https://github.com/SourceDocs/SourceDocs
package-manager:
  brew: sourcedocs
package-manager-url: https://formulae.brew.sh/formula/sourcedocs
version: 2.0.1
license: MIT
category: development
tags:
  - cli
description: Generate Markdown files from inline source code documentation
source-archive: https://github.com/SourceDocs/SourceDocs/archive/refs/tags/2.0.1.tar.gz
uses-from-macos:
  - swift
executables:
  - exposure: global executable
    kind: cli
    name: sourcedocs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sourcedocs
  brew: brew install sourcedocs
provenance:
  formula: sourcedocs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
