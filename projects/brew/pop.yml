id: brew:pop
display-name: pop
homepage: https://github.com/charmbracelet/pop
repo: https://github.com/charmbracelet/pop
docs: https://github.com/charmbracelet/pop
package-manager:
  brew: pop
  nix: pop
  winget: charmbracelet.pop
  zypper: pop
package-manager-url: https://formulae.brew.sh/formula/pop
version: 0.2.1
license: MIT
category: development
tags:
  - cli
description: Send emails from your terminal
source-archive: https://github.com/charmbracelet/pop/archive/refs/tags/v0.2.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pop
  brew: brew install pop
  nix: nix profile install nixpkgs#pop
  winget: winget install --id charmbracelet.pop -e
  zypper: sudo zypper install pop
provenance:
  formula: pop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
