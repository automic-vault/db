id: brew:mplayer
display-name: mplayer
homepage: https://mplayerhq.hu/
repo: https://mplayerhq.hu/MPlayer/releases/MPlayer-1.5.tar.xz
docs: https://mplayerhq.hu/
package-manager:
  apk: mplayer
  brew: mplayer
  debian: mplayer
  macports: MPlayer
  nix: mplayer
  pacman: mplayer
  scoop: extras/mplayer
  ubuntu: mplayer
package-manager-url: https://formulae.brew.sh/formula/mplayer
version: 1.5
license: GPL-2.0-only AND GPL-2.0-or-later
category: network
tags:
  - cli
description: UNIX movie player
source-archive: https://mplayerhq.hu/MPlayer/releases/MPlayer-1.5.tar.xz
dependencies:
  - fontconfig
  - freetype
  - jpeg-turbo
  - libcaca
  - libpng
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
  - libxml2
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: mencoder
  - exposure: global executable
    kind: cli
    name: mplayer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mplayer
  av: sudo av install brew:mplayer
  brew: brew install mplayer
  debian: sudo apt install mplayer
  macports: sudo port install MPlayer
  nix: nix profile install nixpkgs#mplayer
  pacman: sudo pacman -S mplayer
  scoop: scoop install extras/mplayer
  ubuntu: sudo apt install mplayer
provenance:
  formula: mplayer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
