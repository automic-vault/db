id: brew:epinio
display-name: epinio
homepage: https://epinio.io/
repo: https://github.com/epinio/epinio
docs: https://epinio.io/
package-manager:
  brew: epinio
package-manager-url: https://formulae.brew.sh/formula/epinio
version: 1.13.10
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: CLI for Epinio, the Application Development Engine for Kubernetes
source-archive: https://github.com/epinio/epinio/archive/refs/tags/v1.13.10.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: epinio
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:epinio
  brew: brew install epinio
provenance:
  formula: epinio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
