id: brew:comtrya
display-name: comtrya
homepage: https://comtrya.dev
repo: https://github.com/comtrya/comtrya
docs: https://comtrya.dev
package-manager:
  brew: comtrya
  winget: Comtrya.Comtrya
package-manager-url: https://formulae.brew.sh/formula/comtrya
version: 0.9.2
license: MIT
category: development
tags:
  - cli
description: Configuration and dotfile management tool
source-archive: https://github.com/comtrya/comtrya/archive/refs/tags/v0.9.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: comtrya
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:comtrya
  brew: brew install comtrya
  winget: winget install --id Comtrya.Comtrya -e
provenance:
  formula: comtrya
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
