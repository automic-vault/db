id: brew:aws-nuke
display-name: aws-nuke
homepage: https://github.com/ekristen/aws-nuke
repo: https://github.com/ekristen/aws-nuke
docs: https://github.com/ekristen/aws-nuke
package-manager:
  brew: aws-nuke
  debian: aws-nuke
  macports: aws-nuke
  nix: aws-nuke
  scoop: main/aws-nuke
  ubuntu: aws-nuke
package-manager-url: https://formulae.brew.sh/formula/aws-nuke
version: 3.65.0
license: MIT
category: cloud
tags:
  - aws
  - cli
description: Nuke a whole AWS account and delete all its resources
source-archive: https://github.com/ekristen/aws-nuke/archive/refs/tags/v3.65.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aws-nuke
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aws-nuke
  brew: brew install aws-nuke
  debian: sudo apt install aws-nuke
  macports: sudo port install aws-nuke
  nix: nix profile install nixpkgs#aws-nuke
  scoop: scoop install main/aws-nuke
  ubuntu: sudo apt install aws-nuke
provenance:
  formula: aws-nuke
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
