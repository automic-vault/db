id: brew:lnav
display-name: lnav
homepage: https://lnav.org/
repo: https://github.com/tstack/lnav
docs: https://lnav.org/
package-manager:
  apk: lnav
  brew: lnav
  debian: lnav
  dnf: lnav
  macports: lnav
  nix: lnav
  pacman: lnav
  scoop: main/lnav
  ubuntu: lnav
  winget: tstack.lnav
  zypper: lnav
package-manager-url: https://formulae.brew.sh/formula/lnav
version: 0.14.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Curses-based tool for viewing and analyzing log files
source-archive: https://github.com/tstack/lnav/releases/download/v0.14.0/lnav-0.14.0.tar.gz
dependencies:
  - libarchive
  - libunistring
  - pcre2
  - sqlite
build-dependencies:
  - autoconf
  - automake
  - rust
uses-from-macos:
  - bzip2
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: lnav
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lnav
  av: sudo av install brew:lnav
  brew: brew install lnav
  debian: sudo apt install lnav
  dnf: sudo dnf install lnav
  macports: sudo port install lnav
  nix: nix profile install nixpkgs#lnav
  pacman: sudo pacman -S lnav
  scoop: scoop install main/lnav
  ubuntu: sudo apt install lnav
  winget: winget install --id tstack.lnav -e
  zypper: sudo zypper install lnav
provenance:
  formula: lnav
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
