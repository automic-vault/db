id: brew:tofrodos
display-name: tofrodos
homepage: https://github.com/ChristopherHeng/tofrodos
repo: https://github.com/ChristopherHeng/tofrodos
docs: https://github.com/ChristopherHeng/tofrodos
package-manager:
  brew: tofrodos
  debian: tofrodos
  dnf: tofrodos
  ubuntu: tofrodos
package-manager-url: https://formulae.brew.sh/formula/tofrodos
version: 2.1.1
license: GPL-2.0-only
category: development
tags:
  - cli
description: Converts DOS UNIX text files, alias tofromdos
source-archive: https://github.com/ChristopherHeng/tofrodos/archive/refs/tags/2.1.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: fromdos
  - exposure: global executable
    kind: cli
    name: todos
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tofrodos
  brew: brew install tofrodos
  debian: sudo apt install tofrodos
  dnf: sudo dnf install tofrodos
  ubuntu: sudo apt install tofrodos
provenance:
  formula: tofrodos
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
