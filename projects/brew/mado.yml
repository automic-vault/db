id: brew:mado
display-name: mado
homepage: https://github.com/akiomik/mado
repo: https://github.com/akiomik/mado
docs: https://github.com/akiomik/mado
package-manager:
  apk: mado
  brew: mado
  nix: mado
  pacman: mado
package-manager-url: https://formulae.brew.sh/formula/mado
version: 0.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Fast Markdown linter written in Rust
source-archive: https://github.com/akiomik/mado/archive/refs/tags/v0.3.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mado
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mado
  av: sudo av install brew:mado
  brew: brew install mado
  nix: nix profile install nixpkgs#mado
  pacman: sudo pacman -S mado
provenance:
  formula: mado
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
