id: brew:pybind11
display-name: pybind11
homepage: https://github.com/pybind/pybind11
repo: https://github.com/pybind/pybind11
docs: https://github.com/pybind/pybind11
package-manager:
  brew: pybind11
  macports: pybind11
  pacman: pybind11
package-manager-url: https://formulae.brew.sh/formula/pybind11
version: 3.0.4
license: BSD-3-Clause
category: development
tags:
  - cli
description: Seamless operability between C++11 and Python
source-archive: https://github.com/pybind/pybind11/archive/refs/tags/v3.0.4.tar.gz
build-dependencies:
  - cmake
  - python@3.13
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: pybind11-config
  - exposure: global executable
    kind: cli
    name: pybind11-config-3.13
  - exposure: global executable
    kind: cli
    name: pybind11-config-3.14
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pybind11
  brew: brew install pybind11
  macports: sudo port install pybind11
  pacman: sudo pacman -S pybind11
provenance:
  formula: pybind11
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
