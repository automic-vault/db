id: brew:terraform-provider-libvirt
display-name: terraform-provider-libvirt
homepage: https://github.com/dmacvicar/terraform-provider-libvirt
repo: https://github.com/dmacvicar/terraform-provider-libvirt
docs: https://github.com/dmacvicar/terraform-provider-libvirt
package-manager:
  brew: terraform-provider-libvirt
package-manager-url: https://formulae.brew.sh/formula/terraform-provider-libvirt
version: 0.9.7
license: Apache-2.0
category: cloud
tags:
  - cli
description: Terraform provisioning with Linux KVM using libvirt
source-archive: https://github.com/dmacvicar/terraform-provider-libvirt/archive/refs/tags/v0.9.7.tar.gz
dependencies:
  - libvirt
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: terraform-provider-libvirt
bottle:
  available: true
  platforms:
    - arm64_linux
