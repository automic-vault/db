install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terraform-provider-libvirt
  brew: brew install terraform-provider-libvirt
provenance:
  formula: terraform-provider-libvirt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
