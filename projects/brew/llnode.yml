id: brew:llnode
display-name: llnode
homepage: https://github.com/nodejs/llnode
repo: https://github.com/nodejs/llnode
docs: https://github.com/nodejs/llnode
package-manager:
  brew: llnode
package-manager-url: https://formulae.brew.sh/formula/llnode
version: 4.0.0
license: MIT
category: development
tags:
  - cli
description: LLDB plugin for live/post-mortem debugging of node.js apps
source-archive: https://github.com/nodejs/llnode/archive/refs/tags/v4.0.0.tar.gz
build-dependencies:
  - llvm
  - node
uses-from-macos:
  - llvm
executables:
  - exposure: global executable
    kind: cli
    name: llnode
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    `brew install llnode` does not link the plugin to LLDB PlugIns dir. To load this
    plugin in LLDB, one will need to either * Type `plugin load
    $HOMEBREW_PREFIX/opt/llnode/lib/llnode/llnode.dylib` on each run of lldb * Install
    plugin into PlugIns dir manually (macOS only): mkdir -p "$HOME/Library/Application
    Support/LLDB/PlugIns" ln -sf '$HOMEBREW_PREFIX/opt/llnode/lib/llnode/llnode.dylib'
    "$HOME/Library/Application Support/LLDB/PlugIns/"
  post-install-defined: false
install-lines:
  av: sudo av install brew:llnode
  brew: brew install llnode
provenance:
  formula: llnode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
