id: brew:diffutils
display-name: diffutils
homepage: https://www.gnu.org/software/diffutils/
repo: https://ftpmirror.gnu.org/gnu/diffutils/diffutils-3.12.tar.xz
docs: https://www.gnu.org/software/diffutils/
package-manager:
  apk: diffutils
  brew: diffutils
  chocolatey: diffutils
  debian: diffutils
  dnf: diffutils
  macports: diffutils
  nix: diffutils
  pacman: diffutils
  scoop: main/diffutils
  ubuntu: diffutils
  winget: uutils.diffutils
  zypper: diffutils
package-manager-url: https://formulae.brew.sh/formula/diffutils
version: 3.12
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: File comparison utilities
source-archive: https://ftpmirror.gnu.org/gnu/diffutils/diffutils-3.12.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: cmp
  - exposure: global executable
    kind: cli
    name: diff
  - exposure: global executable
    kind: cli
    name: diff3
  - exposure: global executable
    kind: cli
    name: sdiff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add diffutils
  av: sudo av install brew:diffutils
  brew: brew install diffutils
  chocolatey: choco install diffutils
  debian: sudo apt install diffutils
  dnf: sudo dnf install diffutils
  macports: sudo port install diffutils
  nix: nix profile install nixpkgs#diffutils
  pacman: sudo pacman -S diffutils
  scoop: scoop install main/diffutils
  ubuntu: sudo apt install diffutils
  winget: winget install --id uutils.diffutils -e
  zypper: sudo zypper install diffutils
provenance:
  formula: diffutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
