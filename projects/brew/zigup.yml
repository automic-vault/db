id: brew:zigup
display-name: zigup
homepage: https://github.com/marler8997/zigup
repo: https://github.com/marler8997/zigup
docs: https://github.com/marler8997/zigup
package-manager:
  brew: zigup
  scoop: main/zigup
package-manager-url: https://formulae.brew.sh/formula/zigup
version: 2025.05.24
license: MIT-0
category: development
tags:
