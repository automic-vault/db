id: brew:mongo-c-driver
display-name: mongo-c-driver
homepage: https://github.com/mongodb/mongo-c-driver
repo: https://github.com/mongodb/mongo-c-driver
docs: https://github.com/mongodb/mongo-c-driver
package-manager:
  apk: mongo-c-driver
  brew: mongo-c-driver
  dnf: mongo-c-driver
  macports: mongo-c-driver
  pacman: mongo-c-driver
package-manager-url: https://formulae.brew.sh/formula/mongo-c-driver
version: 2.3.0
license: Apache-2.0
category: database
tags:
  - cli
description: C driver for MongoDB
source-archive: https://github.com/mongodb/mongo-c-driver/archive/refs/tags/2.3.0.tar.gz
dependencies:
  - openssl@3
  - zstd
build-dependencies:
  - cmake
  - pkgconf
  - sphinx-doc
executables:
  - exposure: global executable
    kind: cli
    name: mongoc2-stat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mongo-c-driver
  av: sudo av install brew:mongo-c-driver
  brew: brew install mongo-c-driver
  dnf: sudo dnf install mongo-c-driver
  macports: sudo port install mongo-c-driver
  pacman: sudo pacman -S mongo-c-driver
provenance:
  formula: mongo-c-driver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
