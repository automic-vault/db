id: brew:osm-pbf
display-name: osm-pbf
homepage: https://wiki.openstreetmap.org/wiki/PBF_Format
repo: https://github.com/openstreetmap/OSM-binary
docs: https://wiki.openstreetmap.org/wiki/PBF_Format
package-manager:
  brew: osm-pbf
package-manager-url: https://formulae.brew.sh/formula/osm-pbf
version: 1.6.1
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Tools related to PBF (an alternative to XML format)
source-archive: https://github.com/openstreetmap/OSM-binary/archive/refs/tags/v1.6.1.tar.gz
dependencies:
  - abseil
  - protobuf
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: osmpbf-outline
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:osm-pbf
  brew: brew install osm-pbf
provenance:
  formula: osm-pbf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
