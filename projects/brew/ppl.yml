id: brew:ppl
display-name: ppl
homepage: https://www.bugseng.com/ppl
repo: https://deb.debian.org/debian/pool/main/p/ppl/ppl_1.2.orig.tar.xz
docs: https://www.bugseng.com/ppl
package-manager:
  brew: ppl
  dnf: ppl
  macports: ppl
  nix: ppl
  pacman: ppl
  zypper: ppl
package-manager-url: https://formulae.brew.sh/formula/ppl
version: 1.2
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: 'Parma Polyhedra Library: numerical abstractions for analysis, verification'
source-archive: https://deb.debian.org/debian/pool/main/p/ppl/ppl_1.2.orig.tar.xz
dependencies:
  - gmp
executables:
  - exposure: global executable
    kind: cli
    name: ppl-config
  - exposure: global executable
    kind: cli
    name: ppl_lcdd
  - exposure: global executable
    kind: cli
    name: ppl_pips
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ppl
  brew: brew install ppl
  dnf: sudo dnf install ppl
  macports: sudo port install ppl
  nix: nix profile install nixpkgs#ppl
  pacman: sudo pacman -S ppl
  zypper: sudo zypper install ppl
provenance:
  formula: ppl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
