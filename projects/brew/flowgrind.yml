id: brew:flowgrind
display-name: flowgrind
homepage: https://flowgrind.github.io
repo: https://github.com/flowgrind/flowgrind
docs: https://flowgrind.github.io
package-manager:
  brew: flowgrind
  debian: flowgrind
  ubuntu: flowgrind
  zypper: flowgrind
package-manager-url: https://formulae.brew.sh/formula/flowgrind
version: 0.8.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: TCP measurement tool, similar to iperf or netperf
source-archive: >
  https://github.com/flowgrind/flowgrind/releases/download/flowgrind-0.8.2/flowgrind-0.8.2.tar.bz2
dependencies:
  - gsl
  - xmlrpc-c
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: flowgrind
  - exposure: global executable
    kind: cli
    name: flowgrind-stop
  - exposure: global executable
    kind: cli
    name: flowgrindd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flowgrind
  brew: brew install flowgrind
  debian: sudo apt install flowgrind
  ubuntu: sudo apt install flowgrind
  zypper: sudo zypper install flowgrind
provenance:
  formula: flowgrind
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
