id: brew:mutt
display-name: mutt
homepage: http://www.mutt.org/
repo: https://ftp.osuosl.org/pub/mutt/mutt-2.3.2.tar.gz
docs: http://www.mutt.org/
package-manager:
  apk: mutt
  brew: mutt
  debian: mutt
  dnf: mutt
  macports: mutt
  nix: mutt
  pacman: mutt
  ubuntu: mutt
  zypper: mutt
package-manager-url: https://formulae.brew.sh/formula/mutt
version: 2.3.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Mongrel of mail user agents (part elm, pine, mush, mh, etc.)
source-archive: https://ftp.osuosl.org/pub/mutt/mutt-2.3.2.tar.gz
dependencies:
  - gettext
  - gpgme
  - libgpg-error
  - libidn2
  - libunistring
  - lmdb
  - ncurses
  - openssl@3
uses-from-macos:
  - bzip2
  - cyrus-sasl
  - krb5
executables:
  - exposure: global executable
    kind: cli
    name: flea
  - exposure: global executable
    kind: cli
    name: mutt
  - exposure: global executable
    kind: cli
    name: mutt_dotlock
  - exposure: global executable
    kind: cli
    name: mutt_pgpring
  - exposure: global executable
    kind: cli
    name: muttbug
  - exposure: global executable
    kind: cli
    name: pgpewrap
  - exposure: global executable
    kind: cli
    name: smime_keys
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    mutt_dotlock(1) has been installed, but does not have the permissions to lock spool
    files in /var/mail. To grant the necessary permissions, run sudo chgrp mail
    $HOMEBREW_CELLAR/mutt/2.3.2/bin/mutt_dotlock sudo chmod g+s
    $HOMEBREW_CELLAR/mutt/2.3.2/bin/mutt_dotlock Alternatively, you may configure
    `spoolfile` in your .muttrc to a file inside your home directory.
  post-install-defined: false
install-lines:
  apk: sudo apk add mutt
  av: sudo av install brew:mutt
  brew: brew install mutt
  debian: sudo apt install mutt
  dnf: sudo dnf install mutt
  macports: sudo port install mutt
  nix: nix profile install nixpkgs#mutt
  pacman: sudo pacman -S mutt
  ubuntu: sudo apt install mutt
  zypper: sudo zypper install mutt
provenance:
  formula: mutt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
