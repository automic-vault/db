id: brew:orogene
display-name: orogene
homepage: https://orogene.dev
repo: https://github.com/orogene/orogene
docs: https://orogene.dev
package-manager:
  brew: orogene
  zypper: oro
package-manager-url: https://formulae.brew.sh/formula/orogene
version: 0.3.34
license: Apache-2.0
category: development
tags:
  - cli
description: node_modules/ package manager and utility toolkit
source-archive: https://github.com/orogene/orogene/archive/refs/tags/v0.3.34.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: oro
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:orogene
  brew: brew install orogene
  zypper: sudo zypper install oro
provenance:
  formula: orogene
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
