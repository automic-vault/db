id: brew:nuspell
display-name: nuspell
homepage: https://nuspell.github.io/
repo: https://github.com/nuspell/nuspell
docs: https://nuspell.github.io/
package-manager:
  apk: nuspell
  brew: nuspell
  debian: nuspell
  dnf: nuspell
  macports: nuspell
  nix: nuspell
  pacman: nuspell
  ubuntu: nuspell
  zypper: nuspell
package-manager-url: https://formulae.brew.sh/formula/nuspell
version: 5.1.7
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Fast and safe spellchecking C++ library
source-archive: https://github.com/nuspell/nuspell/archive/refs/tags/v5.1.7.tar.gz
dependencies:
  - icu4c@78
build-dependencies:
  - cmake
  - doxygen
  - pandoc
executables:
  - exposure: global executable
    kind: cli
    name: nuspell
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nuspell
  av: sudo av install brew:nuspell
  brew: brew install nuspell
  debian: sudo apt install nuspell
  dnf: sudo dnf install nuspell
  macports: sudo port install nuspell
  nix: nix profile install nixpkgs#nuspell
  pacman: sudo pacman -S nuspell
  ubuntu: sudo apt install nuspell
  zypper: sudo zypper install nuspell
provenance:
  formula: nuspell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
