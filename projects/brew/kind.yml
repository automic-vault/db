id: brew:kind
display-name: kind
homepage: https://kind.sigs.k8s.io/
repo: https://github.com/kubernetes-sigs/kind
docs: https://kind.sigs.k8s.io/
package-manager:
  apk: kind
  brew: kind
  chocolatey: kind
  debian: kind
  dnf: kind
  macports: kind
  nix: kind
  scoop: main/kind
  winget: Kubernetes.kind
  zypper: kind
package-manager-url: https://formulae.brew.sh/formula/kind
version: 0.31.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - docker
  - kubernetes
description: Run local Kubernetes cluster in Docker
source-archive: https://github.com/kubernetes-sigs/kind/archive/refs/tags/v0.31.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kind
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kind
  av: sudo av install brew:kind
  brew: brew install kind
  chocolatey: choco install kind
  debian: sudo apt install kind
  dnf: sudo dnf install kind
  macports: sudo port install kind
  nix: nix profile install nixpkgs#kind
  scoop: scoop install main/kind
  winget: winget install --id Kubernetes.kind -e
  zypper: sudo zypper install kind
provenance:
  formula: kind
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
