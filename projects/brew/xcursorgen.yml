id: brew:xcursorgen
display-name: xcursorgen
homepage: https://gitlab.freedesktop.org/xorg/app/xcursorgen
repo: >
  https://gitlab.freedesktop.org/xorg/app/xcursorgen/-/archive/xcursorgen-1.0.9/xcursorgen-xcursorgen-1.0.9.tar.bz2
docs: https://gitlab.freedesktop.org/xorg/app/xcursorgen
package-manager:
  apk: xcursorgen
  brew: xcursorgen
  dnf: xcursorgen
  macports: xcursorgen
  nix: xcursorgen
  zypper: xcursorgen
package-manager-url: https://formulae.brew.sh/formula/xcursorgen
version: 1.0.9
license: MIT
category: development
tags:
  - cli
description: Create an X cursor file from a collection of PNG images
source-archive: >
  https://gitlab.freedesktop.org/xorg/app/xcursorgen/-/archive/xcursorgen-1.0.9/xcursorgen-xcursorgen-1.0.9.tar.bz2
dependencies:
  - libpng
  - libx11
  - libxcursor
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xcursorgen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xcursorgen
  av: sudo av install brew:xcursorgen
  brew: brew install xcursorgen
  dnf: sudo dnf install xcursorgen
  macports: sudo port install xcursorgen
  nix: nix profile install nixpkgs#xcursorgen
  zypper: sudo zypper install xcursorgen
provenance:
  formula: xcursorgen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
