id: brew:stencil
display-name: stencil
homepage: https://stencil.rgst.io
repo: https://github.com/rgst-io/stencil
docs: https://stencil.rgst.io
package-manager:
  brew: stencil
  winget: rgst-io.stencil
package-manager-url: https://formulae.brew.sh/formula/stencil
version: 2.18.0
license: Apache-2.0
category: development
tags:
  - cli
description: Modern living-template engine for evolving repositories
source-archive: https://github.com/rgst-io/stencil/archive/refs/tags/v2.18.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: stencil
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stencil
  brew: brew install stencil
  winget: winget install --id rgst-io.stencil -e
provenance:
  formula: stencil
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
