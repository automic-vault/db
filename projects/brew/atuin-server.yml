id: brew:atuin-server
display-name: atuin-server
homepage: https://atuin.sh
repo: https://github.com/atuinsh/atuin
docs: https://atuin.sh
package-manager:
  apk: atuin-server
  brew: atuin-server
  pacman: atuin-server
package-manager-url: https://formulae.brew.sh/formula/atuin-server
version: 18.16.1
license: MIT
category: development
tags:
  - cli
description: Sync server for atuin - Improved shell history for zsh, bash, fish and nushell
source-archive: https://github.com/atuinsh/atuin/releases/download/v18.16.1/source.tar.gz
build-dependencies:
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: atuin-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'The configuration file is located at: $HOMEBREW_PREFIX/etc/atuin-server/server.toml'
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add atuin-server
  av: sudo av install brew:atuin-server
  brew: brew install atuin-server
  pacman: sudo pacman -S atuin-server
provenance:
  formula: atuin-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
