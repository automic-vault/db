id: brew:pioneers
display-name: pioneers
homepage: https://pio.sourceforge.net/
repo: https://downloads.sourceforge.net/project/pio/Source/pioneers-15.6.tar.gz
docs: https://pio.sourceforge.net/
package-manager:
  brew: pioneers
  debian: pioneers
  dnf: pioneers
  macports: pioneers
  nix: pioneers
  ubuntu: pioneers
package-manager-url: https://formulae.brew.sh/formula/pioneers
version: 15.6
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Settlers of Catan clone
source-archive: https://downloads.sourceforge.net/project/pio/Source/pioneers-15.6.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - harfbuzz
  - librsvg
  - pango
build-dependencies:
  - gettext
  - intltool
  - itstool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pioneers
  - exposure: global executable
    kind: cli
    name: pioneers-editor
  - exposure: global executable
    kind: cli
    name: pioneers-metaserver
  - exposure: global executable
    kind: cli
    name: pioneers-server-console
  - exposure: global executable
    kind: cli
    name: pioneers-server-gtk
  - exposure: global executable
    kind: cli
    name: pioneersai
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pioneers
  brew: brew install pioneers
  debian: sudo apt install pioneers
  dnf: sudo dnf install pioneers
  macports: sudo port install pioneers
  nix: nix profile install nixpkgs#pioneers
  ubuntu: sudo apt install pioneers
provenance:
  formula: pioneers
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
