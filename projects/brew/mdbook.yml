id: brew:mdbook
display-name: mdbook
homepage: https://rust-lang.github.io/mdBook/
repo: https://github.com/rust-lang/mdBook
docs: https://rust-lang.github.io/mdBook/
package-manager:
  apk: mdbook
  brew: mdbook
  debian: mdbook
  macports: mdbook
  nix: mdbook
  pacman: mdbook
  scoop: main/mdbook
  winget: Rustlang.mdBook
  zypper: mdbook
package-manager-url: https://formulae.brew.sh/formula/mdbook
version: 0.5.3
license: MPL-2.0
category: development
tags:
  - cli
description: Create modern online books from Markdown files
source-archive: https://github.com/rust-lang/mdBook/archive/refs/tags/v0.5.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mdbook
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mdbook
  av: sudo av install brew:mdbook
  brew: brew install mdbook
  debian: sudo apt install mdbook
  macports: sudo port install mdbook
  nix: nix profile install nixpkgs#mdbook
  pacman: sudo pacman -S mdbook
  scoop: scoop install main/mdbook
  winget: winget install --id Rustlang.mdBook -e
  zypper: sudo zypper install mdbook
provenance:
  formula: mdbook
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
