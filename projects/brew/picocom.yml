id: brew:picocom
display-name: picocom
homepage: https://github.com/npat-efault/picocom
repo: https://github.com/npat-efault/picocom
docs: https://github.com/npat-efault/picocom
package-manager:
  apk: picocom
  brew: picocom
  debian: picocom
  dnf: picocom
  macports: picocom
  nix: picocom
  pacman: picocom
  ubuntu: picocom
  zypper: picocom
package-manager-url: https://formulae.brew.sh/formula/picocom
version: 3.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Minimal dumb-terminal emulation program
source-archive: https://github.com/npat-efault/picocom/archive/refs/tags/3.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: picocom
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add picocom
  av: sudo av install brew:picocom
  brew: brew install picocom
  debian: sudo apt install picocom
  dnf: sudo dnf install picocom
  macports: sudo port install picocom
  nix: nix profile install nixpkgs#picocom
  pacman: sudo pacman -S picocom
  ubuntu: sudo apt install picocom
  zypper: sudo zypper install picocom
provenance:
  formula: picocom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
