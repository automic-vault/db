id: brew:allure
display-name: allure
homepage: https://github.com/allure-framework/allure2
repo: >
  https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.42.0/allure-commandline-2.42.0.zip
docs: https://github.com/allure-framework/allure2
package-manager:
  brew: allure
  debian: allure
  nix: allure
  pacman: allure
  scoop: main/allure
  ubuntu: allure
package-manager-url: https://formulae.brew.sh/formula/allure
version: 2.42.0
license: Apache-2.0
category: development
tags:
  - cli
description: Flexible lightweight test report tool
source-archive: >
  https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.42.0/allure-commandline-2.42.0.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: allure
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:allure
  brew: brew install allure
  debian: sudo apt install allure
  nix: nix profile install nixpkgs#allure
  pacman: sudo pacman -S allure
  scoop: scoop install main/allure
  ubuntu: sudo apt install allure
provenance:
  formula: allure
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
