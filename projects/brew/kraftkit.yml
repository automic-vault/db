id: brew:kraftkit
display-name: kraftkit
homepage: https://unikraft.org/docs/cli
repo: https://github.com/unikraft/kraftkit
docs: https://unikraft.org/docs/cli
package-manager:
  apk: kraftkit
  brew: kraftkit
  nix: kraft
  ubuntu: kraft
  zypper: kraft
package-manager-url: https://formulae.brew.sh/formula/kraftkit
version: 0.12.11
license: BSD-3-Clause
category: development
tags:
  - cli
description: Build and use highly customized and ultra-lightweight unikernel VMs
source-archive: https://github.com/unikraft/kraftkit/archive/refs/tags/v0.12.11.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kraft
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kraftkit
  av: sudo av install brew:kraftkit
  brew: brew install kraftkit
  nix: nix profile install nixpkgs#kraft
  ubuntu: sudo apt install kraft
  zypper: sudo zypper install kraft
provenance:
  formula: kraftkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
