id: brew:golangci-lint-langserver
display-name: golangci-lint-langserver
homepage: https://github.com/nametake/golangci-lint-langserver
repo: https://github.com/nametake/golangci-lint-langserver
docs: https://github.com/nametake/golangci-lint-langserver
package-manager:
  brew: golangci-lint-langserver
  nix: golangci-lint-langserver
package-manager-url: https://formulae.brew.sh/formula/golangci-lint-langserver
version: 0.0.12
license: MIT
category: development
tags:
  - cli
description: Language server for golangci-lint
source-archive: https://github.com/nametake/golangci-lint-langserver/archive/refs/tags/v0.0.12.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: golangci-lint-langserver
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:golangci-lint-langserver
  brew: brew install golangci-lint-langserver
  nix: nix profile install nixpkgs#golangci-lint-langserver
provenance:
  formula: golangci-lint-langserver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
