id: brew:rpg-cli
display-name: rpg-cli
homepage: https://github.com/facundoolano/rpg-cli
repo: https://github.com/facundoolano/rpg-cli
docs: https://github.com/facundoolano/rpg-cli
package-manager:
  apk: rpg-cli
  brew: rpg-cli
  macports: rpg-cli
  nix: rpg-cli
  pacman: rpg-cli
package-manager-url: https://formulae.brew.sh/formula/rpg-cli
version: 1.2.0
license: MIT
category: development
tags:
  - cli
description: Your filesystem as a dungeon!
source-archive: https://github.com/facundoolano/rpg-cli/archive/refs/tags/1.2.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rpg-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rpg-cli
  av: sudo av install brew:rpg-cli
  brew: brew install rpg-cli
  macports: sudo port install rpg-cli
  nix: nix profile install nixpkgs#rpg-cli
  pacman: sudo pacman -S rpg-cli
provenance:
  formula: rpg-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
