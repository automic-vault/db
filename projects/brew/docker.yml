id: brew:docker
display-name: docker
homepage: https://www.docker.com/
repo: https://github.com/docker/cli
docs: https://www.docker.com/
package-manager:
  apk: docker
  brew: docker
  chocolatey: docker
  macports: docker
  nix: docker
  pacman: docker
  scoop: main/docker
  winget: Docker.DockerDesktop
  zypper: docker
package-manager-url: https://formulae.brew.sh/formula/docker
version: 29.5.2
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: Pack, ship and run any application as a lightweight container
source-archive: https://github.com/docker/cli.git
dependencies:
  - docker-completion
build-dependencies:
  - go
  - go-md2man
executables:
  - exposure: global executable
    kind: cli
    name: docker
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add docker
  av: sudo av install brew:docker
  brew: brew install docker
  chocolatey: choco install docker
  macports: sudo port install docker
  nix: nix profile install nixpkgs#docker
  pacman: sudo pacman -S docker
  scoop: scoop install main/docker
  winget: winget install --id Docker.DockerDesktop -e
  zypper: sudo zypper install docker
provenance:
  formula: docker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
