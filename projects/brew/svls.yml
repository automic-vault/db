id: brew:svls
display-name: svls
homepage: https://github.com/dalance/svls
repo: https://github.com/dalance/svls
docs: https://github.com/dalance/svls
package-manager:
  apk: svls
  brew: svls
  nix: svls
package-manager-url: https://formulae.brew.sh/formula/svls
version: 0.2.14
license: MIT
category: development
tags:
  - cli
description: SystemVerilog language server
source-archive: https://github.com/dalance/svls/archive/refs/tags/v0.2.14.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: svls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add svls
  av: sudo av install brew:svls
  brew: brew install svls
  nix: nix profile install nixpkgs#svls
provenance:
  formula: svls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
