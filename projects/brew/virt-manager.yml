id: brew:virt-manager
display-name: virt-manager
homepage: https://virt-manager.org/
repo: https://releases.pagure.org/virt-manager/virt-manager-5.1.0.tar.xz
docs: https://virt-manager.org/
package-manager:
  apk: virt-manager
  brew: virt-manager
  debian: virt-manager
  dnf: virt-manager
  macports: virt-manager
  nix: virt-manager
  pacman: virt-manager
  ubuntu: virt-manager
  zypper: virt-manager
package-manager-url: https://formulae.brew.sh/formula/virt-manager
version: 5.1.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: App for managing virtual machines
source-archive: https://releases.pagure.org/virt-manager/virt-manager-5.1.0.tar.xz
dependencies:
  - adwaita-icon-theme
  - certifi
  - cpio
  - gtk-vnc
  - gtksourceview4
  - libosinfo
  - libvirt-glib
  - libvirt-python
  - osinfo-db
  - py3cairo
  - pygobject3
  - python@3.14
  - spice-gtk
  - vte3
build-dependencies:
  - docutils
  - intltool
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: virt-clone
  - exposure: global executable
    kind: cli
    name: virt-install
  - exposure: global executable
    kind: cli
    name: virt-manager
  - exposure: global executable
    kind: cli
    name: virt-xml
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add virt-manager
  av: sudo av install brew:virt-manager
  brew: brew install virt-manager
  debian: sudo apt install virt-manager
  dnf: sudo dnf install virt-manager
  macports: sudo port install virt-manager
  nix: nix profile install nixpkgs#virt-manager
  pacman: sudo pacman -S virt-manager
  ubuntu: sudo apt install virt-manager
  zypper: sudo zypper install virt-manager
provenance:
  formula: virt-manager
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
