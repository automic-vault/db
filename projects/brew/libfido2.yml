id: brew:libfido2
display-name: libfido2
homepage: https://developers.yubico.com/libfido2/
repo: https://github.com/Yubico/libfido2
docs: https://developers.yubico.com/libfido2/
package-manager:
  apk: libfido2
  brew: libfido2
  dnf: libfido2
  macports: libfido2
  nix: libfido2
  pacman: libfido2
package-manager-url: https://formulae.brew.sh/formula/libfido2
version: 1.17.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Provides library functionality for FIDO U2F & FIDO 2.0, including USB
source-archive: https://github.com/Yubico/libfido2/archive/refs/tags/1.17.0.tar.gz
dependencies:
  - libcbor
  - openssl@3
build-dependencies:
  - cmake
  - mandoc
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fido2-assert
  - exposure: global executable
    kind: cli
    name: fido2-cred
  - exposure: global executable
    kind: cli
    name: fido2-token
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libfido2
  av: sudo av install brew:libfido2
  brew: brew install libfido2
  dnf: sudo dnf install libfido2
  macports: sudo port install libfido2
  nix: nix profile install nixpkgs#libfido2
  pacman: sudo pacman -S libfido2
provenance:
  formula: libfido2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
