id: brew:lp_solve
display-name: lp_solve
homepage: https://lp-solve.github.io/
repo: https://github.com/lp-solve/lp_solve
docs: https://lp-solve.github.io/
package-manager:
  brew: lp_solve
  debian: lp-solve
  macports: lp_solve
  nix: lp_solve
  ubuntu: lp-solve
package-manager-url: https://formulae.brew.sh/formula/lp_solve
version: 5.5.2.14
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Mixed integer linear programming solver
source-archive: >
  https://github.com/lp-solve/lp_solve/releases/download/5.5.2.14/lp_solve_5.5.2.14_source.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lp_solve
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lp_solve
  brew: brew install lp_solve
  debian: sudo apt install lp-solve
  macports: sudo port install lp_solve
  nix: nix profile install nixpkgs#lp_solve
  ubuntu: sudo apt install lp-solve
provenance:
  formula: lp_solve
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
