id: brew:youplot
display-name: youplot
homepage: https://github.com/red-data-tools/YouPlot/
repo: https://github.com/red-data-tools/YouPlot
docs: https://github.com/red-data-tools/YouPlot/
package-manager:
  brew: youplot
  debian: youplot
  nix: youplot
package-manager-url: https://formulae.brew.sh/formula/youplot
version: 0.5.0
license: MIT
category: development
tags:
  - cli
description: Command-line tool that draw plots on the terminal
source-archive: https://github.com/red-data-tools/YouPlot/archive/refs/tags/v0.5.0.tar.gz
dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: uplot
  - exposure: global executable
    kind: cli
    name: youplot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:youplot
  brew: brew install youplot
  debian: sudo apt install youplot
  nix: nix profile install nixpkgs#youplot
provenance:
  formula: youplot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
