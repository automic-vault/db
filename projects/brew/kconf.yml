id: brew:kconf
display-name: kconf
homepage: https://github.com/particledecay/kconf
repo: https://github.com/particledecay/kconf
docs: https://github.com/particledecay/kconf
package-manager:
  brew: kconf
  nix: kconf
package-manager-url: https://formulae.brew.sh/formula/kconf
version: 2.0.0
license: MIT
category: development
tags:
  - cli
description: CLI for managing multiple kubeconfigs
source-archive: https://github.com/particledecay/kconf/archive/refs/tags/v2.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kconf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kconf
  brew: brew install kconf
  nix: nix profile install nixpkgs#kconf
provenance:
  formula: kconf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
