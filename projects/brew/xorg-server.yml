id: brew:xorg-server
display-name: xorg-server
homepage: https://www.x.org
repo: https://www.x.org/releases/individual/xserver/xorg-server-21.1.22.tar.xz
docs: https://www.x.org
package-manager:
  apk: xorg-server
  brew: xorg-server
  debian: xnest
  macports: xorg-server
  nix: xorg-server
  pacman: xorg-server
  ubuntu: xnest
  zypper: xvfb-run
package-manager-url: https://formulae.brew.sh/formula/xorg-server
version: 21.1.22
license: MIT AND APSL-2.0
category: network
tags:
  - cli
description: X Window System display server
source-archive: https://www.x.org/releases/individual/xserver/xorg-server-21.1.22.tar.xz
dependencies:
  - libapplewm
  - libx11
  - libxau
  - libxcb
  - libxdmcp
  - libxext
  - libxfixes
  - libxfont2
  - mesa
  - pixman
  - xauth
  - xcb-util
  - xcb-util-image
  - xcb-util-keysyms
  - xcb-util-renderutil
  - xcb-util-wm
  - xkbcomp
  - xkeyboard-config
build-dependencies:
  - font-util
  - libxkbfile
  - meson
  - ninja
  - pkgconf
  - util-macros
  - xorgproto
  - xtrans
executables:
  - exposure: global executable
    kind: cli
    name: X
  - exposure: global executable
    kind: cli
    name: Xephyr
  - exposure: global executable
    kind: cli
    name: Xnest
  - exposure: global executable
    kind: cli
    name: Xorg
  - exposure: global executable
    kind: cli
    name: Xvfb
  - exposure: global executable
    kind: cli
    name: gtf
  - exposure: global executable
    kind: cli
    name: xvfb-run
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To launch X server, it is recommend to install xinit, especially on macOS, otherwise
    X11.app will not work: brew install xinit If cask xquartz is installed, this link
    may be helpful: https://www.xquartz.org/FAQs.html#want-another-x11app-server
  post-install-defined: false
install-lines:
  apk: sudo apk add xorg-server
  av: sudo av install brew:xorg-server
  brew: brew install xorg-server
  debian: sudo apt install xnest
  macports: sudo port install xorg-server
  nix: nix profile install nixpkgs#xorg-server
  pacman: sudo pacman -S xorg-server
  ubuntu: sudo apt install xnest
  zypper: sudo zypper install xvfb-run
provenance:
  formula: xorg-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
