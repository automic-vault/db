id: brew:vitetris
display-name: vitetris
homepage: https://www.victornils.net/tetris/
repo: https://github.com/vicgeralds/vitetris
docs: https://www.victornils.net/tetris/
package-manager:
  brew: vitetris
  debian: vitetris
  nix: vitetris
  ubuntu: vitetris
  zypper: vitetris
package-manager-url: https://formulae.brew.sh/formula/vitetris
version: 0.59.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: Terminal-based Tetris clone
source-archive: https://github.com/vicgeralds/vitetris/archive/refs/tags/v0.59.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: tetris
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vitetris
  brew: brew install vitetris
  debian: sudo apt install vitetris
  nix: nix profile install nixpkgs#vitetris
  ubuntu: sudo apt install vitetris
  zypper: sudo zypper install vitetris
provenance:
  formula: vitetris
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
