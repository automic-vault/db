id: brew:neko
display-name: neko
homepage: https://nekovm.org/
repo: https://github.com/HaxeFoundation/neko
docs: https://nekovm.org/
package-manager:
  apk: neko
  brew: neko
  chocolatey: neko
  debian: neko
  macports: neko
  nix: neko
  pacman: neko
  scoop: main/neko
  ubuntu: neko
  zypper: neko
package-manager-url: https://formulae.brew.sh/formula/neko
version: 2.4.1
license: MIT
category: development
tags:
  - cli
description: High-level, dynamically typed programming language
source-archive: https://github.com/HaxeFoundation/neko/archive/refs/tags/v2-4-1.tar.gz
dependencies:
  - bdw-gc
  - mariadb-connector-c
  - mbedtls@3
  - pcre2
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - apr
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: neko
  - exposure: global executable
    kind: cli
    name: nekoc
  - exposure: global executable
    kind: cli
    name: nekoml
  - exposure: global executable
    kind: cli
    name: nekotools
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You must add the following line to your .bashrc or equivalent: export
    NEKOPATH="$HOMEBREW_PREFIX/lib/neko"
  post-install-defined: false
install-lines:
  apk: sudo apk add neko
  av: sudo av install brew:neko
  brew: brew install neko
  chocolatey: choco install neko
  debian: sudo apt install neko
  macports: sudo port install neko
  nix: nix profile install nixpkgs#neko
  pacman: sudo pacman -S neko
  scoop: scoop install main/neko
  ubuntu: sudo apt install neko
  zypper: sudo zypper install neko
provenance:
  formula: neko
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
