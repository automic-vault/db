id: brew:httpie
display-name: httpie
homepage: https://httpie.io/
repo: https://github.com/httpie/cli
docs: https://httpie.io/
package-manager:
  apk: httpie
  brew: httpie
  chocolatey: httpie
  debian: httpie
  dnf: httpie
  macports: httpie
  nix: httpie
  pacman: httpie
  ubuntu: httpie
  winget: HTTPie.HTTPie
  zypper: httpie
package-manager-url: https://formulae.brew.sh/formula/httpie
version: 3.2.4
license: BSD-3-Clause
category: development
tags:
  - cli
description: User-friendly cURL replacement (command-line HTTP client)
source-archive: https://github.com/httpie/cli/archive/refs/tags/3.2.4.tar.gz
dependencies:
  - certifi
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: http
  - exposure: global executable
    kind: cli
    name: httpie
  - exposure: global executable
    kind: cli
    name: https
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add httpie
  av: sudo av install brew:httpie
  brew: brew install httpie
  chocolatey: choco install httpie
  debian: sudo apt install httpie
  dnf: sudo dnf install httpie
  macports: sudo port install httpie
  nix: nix profile install nixpkgs#httpie
  pacman: sudo pacman -S httpie
  ubuntu: sudo apt install httpie
  winget: winget install --id HTTPie.HTTPie -e
  zypper: sudo zypper install httpie
provenance:
  formula: httpie
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
