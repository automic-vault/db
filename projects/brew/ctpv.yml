id: brew:ctpv
display-name: ctpv
homepage: https://github.com/NikitaIvanovV/ctpv
repo: https://github.com/NikitaIvanovV/ctpv
docs: https://github.com/NikitaIvanovV/ctpv
package-manager:
  brew: ctpv
  macports: ctpv
  nix: ctpv
package-manager-url: https://formulae.brew.sh/formula/ctpv
version: 1.1
license: MIT
category: development
tags:
  - cli
description: Image previews for lf file manager
source-archive: https://github.com/NikitaIvanovV/ctpv/archive/refs/tags/v1.1.tar.gz
dependencies:
  - libmagic
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: ctpv
  - exposure: global executable
    kind: cli
    name: ctpvclear
  - exposure: global executable
    kind: cli
    name: ctpvquit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ctpv
  brew: brew install ctpv
  macports: sudo port install ctpv
  nix: nix profile install nixpkgs#ctpv
provenance:
  formula: ctpv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
