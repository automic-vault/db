id: brew:csmith
display-name: csmith
homepage: https://github.com/csmith-project/csmith
repo: https://github.com/csmith-project/csmith
docs: https://github.com/csmith-project/csmith
package-manager:
  apk: csmith
  brew: csmith
  debian: csmith
  dnf: csmith
  nix: csmith
  ubuntu: csmith
  zypper: csmith
package-manager-url: https://formulae.brew.sh/formula/csmith
version: 2.3.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Generates random C programs conforming to the C99 standard
source-archive: https://github.com/csmith-project/csmith/archive/refs/tags/csmith-2.3.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: compiler_test.pl
  - exposure: global executable
    kind: cli
    name: csmith
  - exposure: global executable
    kind: cli
    name: launchn.pl
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    It is recommended that you set the environment variable 'CSMITH_PATH' to
    $HOMEBREW_CELLAR/csmith/2.3.0/include/csmith-2.3.0
  post-install-defined: false
install-lines:
  apk: sudo apk add csmith
  av: sudo av install brew:csmith
  brew: brew install csmith
  debian: sudo apt install csmith
  dnf: sudo dnf install csmith
  nix: nix profile install nixpkgs#csmith
  ubuntu: sudo apt install csmith
  zypper: sudo zypper install csmith
provenance:
  formula: csmith
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
