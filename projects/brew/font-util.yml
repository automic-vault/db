id: brew:font-util
display-name: font-util
homepage: https://www.x.org/
repo: https://www.x.org/archive/individual/font/font-util-1.4.2.tar.xz
docs: https://www.x.org/
package-manager:
  apk: font-util
  brew: font-util
  nix: font-util
  zypper: font-util
package-manager-url: https://formulae.brew.sh/formula/font-util
version: 1.4.2
license: MIT
category: network
tags:
  - cli
description: 'X.Org: Font package creation/installation utilities'
source-archive: https://www.x.org/archive/individual/font/font-util-1.4.2.tar.xz
build-dependencies:
  - pkgconf
  - util-macros
executables:
  - exposure: global executable
    kind: cli
    name: bdftruncate
  - exposure: global executable
    kind: cli
    name: ucs2any
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add font-util
  av: sudo av install brew:font-util
  brew: brew install font-util
  nix: nix profile install nixpkgs#font-util
  zypper: sudo zypper install font-util
provenance:
  formula: font-util
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
