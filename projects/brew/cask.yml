id: brew:cask
display-name: cask
homepage: https://cask.readthedocs.io/
repo: https://github.com/cask/cask
docs: https://cask.readthedocs.io/
package-manager:
  brew: cask
  macports: cask
package-manager-url: https://formulae.brew.sh/formula/cask
version: 0.9.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Emacs dependency management
source-archive: https://github.com/cask/cask/archive/refs/tags/v0.9.1.tar.gz
dependencies:
  - coreutils
  - emacs
executables:
  - exposure: global executable
    kind: cli
    name: cask
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cask
  brew: brew install cask
  macports: sudo port install cask
provenance:
  formula: cask
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
