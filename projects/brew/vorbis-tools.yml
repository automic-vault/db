id: brew:vorbis-tools
display-name: vorbis-tools
homepage: https://github.com/xiph/vorbis-tools
repo: https://ftp.osuosl.org/pub/xiph/releases/vorbis/vorbis-tools-1.4.3.tar.gz
docs: https://github.com/xiph/vorbis-tools
package-manager:
  apk: vorbis-tools
  brew: vorbis-tools
  debian: vorbis-tools
  dnf: vorbis-tools
  macports: vorbis-tools
  nix: vorbis-tools
  pacman: vorbis-tools
  ubuntu: vorbis-tools
  zypper: vorbis-tools
package-manager-url: https://formulae.brew.sh/formula/vorbis-tools
version: 1.4.3
license: LGPL-2.0-or-later AND GPL-2.0-or-later AND GPL-2.0-only
category: development
tags:
  - cli
description: Ogg Vorbis CODEC tools
source-archive: https://ftp.osuosl.org/pub/xiph/releases/vorbis/vorbis-tools-1.4.3.tar.gz
dependencies:
  - flac
  - libao
  - libogg
  - libvorbis
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: ogg123
  - exposure: global executable
    kind: cli
    name: oggdec
  - exposure: global executable
    kind: cli
    name: oggenc
  - exposure: global executable
    kind: cli
    name: ogginfo
  - exposure: global executable
    kind: cli
    name: vcut
  - exposure: global executable
    kind: cli
    name: vorbiscomment
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vorbis-tools
  av: sudo av install brew:vorbis-tools
  brew: brew install vorbis-tools
  debian: sudo apt install vorbis-tools
  dnf: sudo dnf install vorbis-tools
  macports: sudo port install vorbis-tools
  nix: nix profile install nixpkgs#vorbis-tools
  pacman: sudo pacman -S vorbis-tools
  ubuntu: sudo apt install vorbis-tools
  zypper: sudo zypper install vorbis-tools
provenance:
  formula: vorbis-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
