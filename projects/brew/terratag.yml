id: brew:terratag
display-name: terratag
homepage: https://www.terratag.io/
repo: https://github.com/env0/terratag
docs: https://www.terratag.io/
package-manager:
  brew: terratag
package-manager-url: https://formulae.brew.sh/formula/terratag
version: 0.7.6
license: MPL-2.0
category: cloud
tags:
  - aws
  - cli
description: CLI to automate tagging for AWS, Azure & GCP resources in Terraform
source-archive: https://github.com/env0/terratag/archive/refs/tags/v0.7.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terratag
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terratag
  brew: brew install terratag
provenance:
  formula: terratag
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
