id: brew:log4c
display-name: log4c
homepage: https://log4c.sourceforge.net/
repo: https://downloads.sourceforge.net/project/log4c/log4c/1.2.4/log4c-1.2.4.tar.gz
docs: https://log4c.sourceforge.net/
package-manager:
  brew: log4c
  dnf: log4c
  macports: log4c
package-manager-url: https://formulae.brew.sh/formula/log4c
version: 1.2.4
license: LGPL-2.1-only
category: network
tags:
  - cli
description: Logging Framework for C
source-archive: https://downloads.sourceforge.net/project/log4c/log4c/1.2.4/log4c-1.2.4.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: log4c-config
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:log4c
  brew: brew install log4c
  dnf: sudo dnf install log4c
  macports: sudo port install log4c
provenance:
  formula: log4c
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
