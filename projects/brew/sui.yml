id: brew:sui
display-name: sui
homepage: https://sui.io
repo: https://github.com/MystenLabs/sui
docs: https://sui.io
package-manager:
  brew: sui
  chocolatey: sui
package-manager-url: https://formulae.brew.sh/formula/sui
version: 1.73.0
license: Apache-2.0
category: development
tags:
  - cli
description: Next-generation smart contract platform powered by the Move programming language
source-archive: https://github.com/MystenLabs/sui/archive/refs/tags/testnet-v1.73.0.tar.gz
build-dependencies:
  - cmake
  - libpq
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sui
  brew: brew install sui
  chocolatey: choco install sui
provenance:
  formula: sui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
