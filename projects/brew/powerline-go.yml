id: brew:powerline-go
display-name: powerline-go
homepage: https://github.com/justjanne/powerline-go
repo: https://github.com/justjanne/powerline-go
docs: https://github.com/justjanne/powerline-go
package-manager:
  brew: powerline-go
  debian: powerline-go
  dnf: powerline-go
  nix: powerline-go
  scoop: main/powerline-go
  zypper: powerline-go
package-manager-url: https://formulae.brew.sh/formula/powerline-go
version: 1.26
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Beautiful and useful low-latency prompt for your shell
source-archive: https://github.com/justjanne/powerline-go/archive/refs/tags/v1.26.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: powerline-go
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:powerline-go
  brew: brew install powerline-go
  debian: sudo apt install powerline-go
  dnf: sudo dnf install powerline-go
  nix: nix profile install nixpkgs#powerline-go
  scoop: scoop install main/powerline-go
  zypper: sudo zypper install powerline-go
provenance:
  formula: powerline-go
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
