id: brew:diff-pdf
display-name: diff-pdf
homepage: https://vslavik.github.io/diff-pdf/
repo: https://github.com/vslavik/diff-pdf
docs: https://vslavik.github.io/diff-pdf/
package-manager:
  apk: diff-pdf
  brew: diff-pdf
  dnf: diff-pdf
  macports: diff-pdf
  nix: diff-pdf
  pacman: diff-pdf
  scoop: extras/diff-pdf
  zypper: diff-pdf
package-manager-url: https://formulae.brew.sh/formula/diff-pdf
version: 0.5.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Visually compare two PDF files
source-archive: https://github.com/vslavik/diff-pdf/releases/download/v0.5.3/diff-pdf-0.5.3.tar.gz
dependencies:
  - cairo
  - gettext
  - glib
  - poppler
  - wxwidgets@3.2
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: diff-pdf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add diff-pdf
  av: sudo av install brew:diff-pdf
  brew: brew install diff-pdf
  dnf: sudo dnf install diff-pdf
  macports: sudo port install diff-pdf
  nix: nix profile install nixpkgs#diff-pdf
  pacman: sudo pacman -S diff-pdf
  scoop: scoop install extras/diff-pdf
  zypper: sudo zypper install diff-pdf
provenance:
  formula: diff-pdf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
