id: brew:fastnetmon
display-name: fastnetmon
homepage: https://github.com/pavel-odintsov/fastnetmon/
repo: https://github.com/pavel-odintsov/fastnetmon
docs: https://github.com/pavel-odintsov/fastnetmon/
package-manager:
  brew: fastnetmon
  debian: fastnetmon
  dnf: fastnetmon
  ubuntu: fastnetmon
package-manager-url: https://formulae.brew.sh/formula/fastnetmon
version: 1.2.8
license: GPL-2.0-only
category: development
tags:
  - cli
description: DDoS detection tool with sFlow, Netflow, IPFIX and port mirror support
source-archive: https://github.com/pavel-odintsov/fastnetmon/archive/refs/tags/v1.2.8.tar.gz
dependencies:
  - abseil
  - boost
  - capnp
  - grpc
  - hiredis
  - log4cpp
  - mongo-c-driver
  - openssl@3
  - protobuf
build-dependencies:
  - cmake
uses-from-macos:
  - libpcap
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: fastnetmon
  - exposure: global executable
    kind: cli
    name: fastnetmon_api_client
  - exposure: global executable
    kind: cli
    name: fastnetmon_client
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:fastnetmon
  brew: brew install fastnetmon
  debian: sudo apt install fastnetmon
  dnf: sudo dnf install fastnetmon
  ubuntu: sudo apt install fastnetmon
provenance:
  formula: fastnetmon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
