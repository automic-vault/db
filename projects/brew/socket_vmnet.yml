id: brew:socket_vmnet
display-name: socket_vmnet
homepage: https://github.com/lima-vm/socket_vmnet
repo: https://github.com/lima-vm/socket_vmnet
docs: https://github.com/lima-vm/socket_vmnet
package-manager:
  brew: socket_vmnet
  macports: socket_vmnet
package-manager-url: https://formulae.brew.sh/formula/socket_vmnet
version: 1.2.2
license: Apache-2.0
category: development
tags:
  - cli
description: Daemon to provide vmnet.framework support for rootless QEMU
source-archive: https://github.com/lima-vm/socket_vmnet/archive/refs/tags/v1.2.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: socket_vmnet
  - exposure: global executable
    kind: cli
    name: socket_vmnet_client
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    socket_vmnet requires root privileges so you will need to run `sudo
    $HOMEBREW_PREFIX/opt/socket_vmnet/socket_vmnet` or `sudo brew services start
    socket_vmnet`. You should be certain that you trust any software you grant root
    privileges.
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:socket_vmnet
  brew: brew install socket_vmnet
  macports: sudo port install socket_vmnet
provenance:
  formula: socket_vmnet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
