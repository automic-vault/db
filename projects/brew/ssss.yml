id: brew:ssss
display-name: ssss
homepage: http://point-at-infinity.org/ssss/
repo: https://deb.debian.org/debian/pool/main/s/ssss/ssss_0.5.orig.tar.gz
docs: http://point-at-infinity.org/ssss/
package-manager:
  apk: ssss
  brew: ssss
  debian: ssss
  dnf: ssss
  macports: ssss
  nix: ssss
  ubuntu: ssss
package-manager-url: https://formulae.brew.sh/formula/ssss
version: 0.5
license: GPL-2.0-or-later
category: security
tags:
  - cli
description: Shamir's secret sharing scheme implementation
source-archive: https://deb.debian.org/debian/pool/main/s/ssss/ssss_0.5.orig.tar.gz
dependencies:
  - gmp
  - xmltoman
executables:
  - exposure: global executable
    kind: cli
    name: ssss-combine
  - exposure: global executable
    kind: cli
    name: ssss-split
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ssss
  av: sudo av install brew:ssss
  brew: brew install ssss
  debian: sudo apt install ssss
  dnf: sudo dnf install ssss
  macports: sudo port install ssss
  nix: nix profile install nixpkgs#ssss
  ubuntu: sudo apt install ssss
provenance:
  formula: ssss
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
