id: brew:gnuplot
display-name: gnuplot
homepage: http://www.gnuplot.info/
repo: https://downloads.sourceforge.net/project/gnuplot/gnuplot/6.0.4/gnuplot-6.0.4.tar.gz
docs: http://www.gnuplot.info/
package-manager:
  apk: gnuplot
  brew: gnuplot
  chocolatey: gnuplot
  debian: gnuplot
  dnf: gnuplot
  macports: gnuplot
  nix: gnuplot
  pacman: gnuplot
  scoop: main/gnuplot
  ubuntu: gnuplot
  winget: gnuplot.gnuplot
  zypper: gnuplot
package-manager-url: https://formulae.brew.sh/formula/gnuplot
version: 6.0.4
license: gnuplot
category: network
tags:
  - cli
description: Command-driven, interactive function plotting
source-archive: https://downloads.sourceforge.net/project/gnuplot/gnuplot/6.0.4/gnuplot-6.0.4.tar.gz
dependencies:
  - cairo
  - gd
  - gettext
  - glib
  - harfbuzz
  - libcerf
  - lua
  - pango
  - qt5compat
  - qtbase
  - qtsvg
  - readline
  - webp
build-dependencies:
  - pkgconf
  - qttools
executables:
  - exposure: global executable
    kind: cli
    name: gnuplot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gnuplot
  av: sudo av install brew:gnuplot
  brew: brew install gnuplot
  chocolatey: choco install gnuplot
  debian: sudo apt install gnuplot
  dnf: sudo dnf install gnuplot
  macports: sudo port install gnuplot
  nix: nix profile install nixpkgs#gnuplot
  pacman: sudo pacman -S gnuplot
  scoop: scoop install main/gnuplot
  ubuntu: sudo apt install gnuplot
  winget: winget install --id gnuplot.gnuplot -e
  zypper: sudo zypper install gnuplot
provenance:
  formula: gnuplot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
