id: brew:nak
display-name: nak
homepage: https://github.com/fiatjaf/nak
repo: https://github.com/fiatjaf/nak
docs: https://github.com/fiatjaf/nak
package-manager:
  brew: nak
  nix: nak
package-manager-url: https://formulae.brew.sh/formula/nak
version: 0.19.10
license: Unlicense
category: development
tags:
  - cli
description: CLI for doing all things nostr
source-archive: https://github.com/fiatjaf/nak/archive/refs/tags/v0.19.10.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nak
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nak
  brew: brew install nak
  nix: nix profile install nixpkgs#nak
provenance:
  formula: nak
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
