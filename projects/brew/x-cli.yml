id: brew:x-cli
display-name: x-cli
homepage: https://github.com/sferik/x-cli
repo: https://github.com/sferik/x-cli
docs: https://github.com/sferik/x-cli
package-manager:
  brew: x-cli
package-manager-url: https://formulae.brew.sh/formula/x-cli
version: 5.0.0
license: MIT
category: development
tags:
  - cli
description: Command-line power tool for Twitter
source-archive: https://github.com/sferik/x-cli/archive/refs/tags/v5.0.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: x
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:x-cli
  brew: brew install x-cli
provenance:
  formula: x-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
