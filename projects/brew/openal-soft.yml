id: brew:openal-soft
display-name: openal-soft
homepage: https://openal-soft.org/
repo: https://openal-soft.org/openal-releases/openal-soft-1.25.2.tar.bz2
docs: https://openal-soft.org/
package-manager:
  apk: openal-soft
  brew: openal-soft
  dnf: openal-soft
  macports: openal-soft
  nix: openal-soft
package-manager-url: https://formulae.brew.sh/formula/openal-soft
version: 1.25.2
license: LGPL-2.0-or-later
category: media
tags:
  - cli
description: Implementation of the OpenAL 3D audio API
source-archive: https://openal-soft.org/openal-releases/openal-soft-1.25.2.tar.bz2
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: openal-info
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add openal-soft
  av: sudo av install brew:openal-soft
  brew: brew install openal-soft
  dnf: sudo dnf install openal-soft
  macports: sudo port install openal-soft
  nix: nix profile install nixpkgs#openal-soft
provenance:
  formula: openal-soft
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
