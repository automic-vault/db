id: brew:orientdb
display-name: orientdb
homepage: https://github.com/orientechnologies/orientdb/
repo: >
  https://search.maven.org/remotecontent?filepath=com/orientechnologies/orientdb-community/3.2.52/orientdb-community-3.2.52.zip
docs: https://github.com/orientechnologies/orientdb/
package-manager:
  brew: orientdb
  chocolatey: orientdb
package-manager-url: https://formulae.brew.sh/formula/orientdb
version: 3.2.52
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Graph database
source-archive: >
  https://search.maven.org/remotecontent?filepath=com/orientechnologies/orientdb-community/3.2.52/orientdb-community-3.2.52.zip
dependencies:
  - openjdk
build-dependencies:
  - maven
executables:
  - exposure: global executable
    kind: cli
    name: orientdb
  - exposure: global executable
    kind: cli
    name: orientdb-console
  - exposure: global executable
    kind: cli
    name: orientdb-gremlin
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The OrientDB root password was set to 'orientdb'. To reset it:
    https://orientdb.org/docs/3.1.x/security/Server-Security.html#restoring-the-servers-user-root
  post-install-defined: true
  service: declared
install-lines:
  av: sudo av install brew:orientdb
  brew: brew install orientdb
  chocolatey: choco install orientdb
provenance:
  formula: orientdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
