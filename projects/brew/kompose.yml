id: brew:kompose
display-name: kompose
homepage: https://kompose.io/
repo: https://github.com/kubernetes/kompose
docs: https://kompose.io/
package-manager:
  apk: kompose
  brew: kompose
  macports: kompose
  nix: kompose
  pacman: kompose
  scoop: main/kompose
  winget: Kubernetes.kompose
  zypper: kompose
package-manager-url: https://formulae.brew.sh/formula/kompose
version: 1.38.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - docker
  - kubernetes
description: Tool to move from docker-compose to Kubernetes
source-archive: https://github.com/kubernetes/kompose/archive/refs/tags/v1.38.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kompose
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kompose
  av: sudo av install brew:kompose
  brew: brew install kompose
  macports: sudo port install kompose
  nix: nix profile install nixpkgs#kompose
  pacman: sudo pacman -S kompose
  scoop: scoop install main/kompose
  winget: winget install --id Kubernetes.kompose -e
  zypper: sudo zypper install kompose
provenance:
  formula: kompose
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
