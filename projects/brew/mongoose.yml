id: brew:mongoose
display-name: mongoose
homepage: https://mongoose.ws/
repo: https://github.com/cesanta/mongoose
docs: https://mongoose.ws/
package-manager:
  brew: mongoose
  debian: mongoose
  dnf: mongoose
  macports: mongoose
  nix: mongoose
  ubuntu: mongoose
package-manager-url: https://formulae.brew.sh/formula/mongoose
version: 7.21
license: GPL-2.0-only
category: development
tags:
  - cli
description: Web server build on top of Libmongoose embedded library
source-archive: https://github.com/cesanta/mongoose/archive/refs/tags/7.21.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mongoose
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mongoose
  brew: brew install mongoose
  debian: sudo apt install mongoose
  dnf: sudo dnf install mongoose
  macports: sudo port install mongoose
  nix: nix profile install nixpkgs#mongoose
  ubuntu: sudo apt install mongoose
provenance:
  formula: mongoose
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
