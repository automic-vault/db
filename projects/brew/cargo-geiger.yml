id: brew:cargo-geiger
display-name: cargo-geiger
homepage: https://github.com/geiger-rs/cargo-geiger
repo: https://github.com/geiger-rs/cargo-geiger
docs: https://github.com/geiger-rs/cargo-geiger
package-manager:
  apk: cargo-geiger
  brew: cargo-geiger
  nix: cargo-geiger
  pacman: cargo-geiger
package-manager-url: https://formulae.brew.sh/formula/cargo-geiger
version: 0.13.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Detects usage of unsafe Rust in a Rust crate and its dependencies
source-archive: https://github.com/geiger-rs/cargo-geiger/archive/refs/tags/cargo-geiger-0.13.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-geiger
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-geiger
  av: sudo av install brew:cargo-geiger
  brew: brew install cargo-geiger
  nix: nix profile install nixpkgs#cargo-geiger
  pacman: sudo pacman -S cargo-geiger
provenance:
  formula: cargo-geiger
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
