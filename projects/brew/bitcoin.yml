id: brew:bitcoin
display-name: bitcoin
homepage: https://bitcoincore.org/
repo: https://bitcoincore.org/bin/bitcoin-core-31.0/bitcoin-31.0.tar.gz
docs: https://bitcoincore.org/
package-manager:
  apk: bitcoin
  brew: bitcoin
  chocolatey: bitcoin
  macports: bitcoin
  nix: bitcoin
  pacman: bitcoin-tx
  zypper: bitcoind
package-manager-url: https://formulae.brew.sh/formula/bitcoin
version: 31.0
license: MIT AND BSD-3-Clause AND BSL-1.0
category: network
tags:
  - cli
description: Decentralized, peer to peer payment network
source-archive: https://bitcoincore.org/bin/bitcoin-core-31.0/bitcoin-31.0.tar.gz
dependencies:
  - capnp
  - libevent
  - zeromq
build-dependencies:
  - boost
  - cmake
  - pkgconf
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: bitcoin
  - exposure: global executable
    kind: cli
    name: bitcoin-cli
  - exposure: global executable
    kind: cli
    name: bitcoin-tx
  - exposure: global executable
    kind: cli
    name: bitcoin-util
  - exposure: global executable
    kind: cli
    name: bitcoin-wallet
  - exposure: global executable
    kind: cli
    name: bitcoind
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add bitcoin
  av: sudo av install brew:bitcoin
  brew: brew install bitcoin
  chocolatey: choco install bitcoin
  macports: sudo port install bitcoin
  nix: nix profile install nixpkgs#bitcoin
  pacman: sudo pacman -S bitcoin-tx
  zypper: sudo zypper install bitcoind
provenance:
  formula: bitcoin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
