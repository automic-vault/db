id: brew:osmfilter
display-name: osmfilter
homepage: https://wiki.openstreetmap.org/wiki/Osmfilter
repo: https://gitlab.com/osm-c-tools/osmctools
docs: https://wiki.openstreetmap.org/wiki/Osmfilter
package-manager:
  brew: osmfilter
package-manager-url: https://formulae.brew.sh/formula/osmfilter
version: 0.9
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Command-line tool to filter OpenStreetMap files for specific tags
source-archive: https://gitlab.com/osm-c-tools/osmctools.git
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: osmconvert
  - exposure: global executable
    kind: cli
    name: osmfilter
  - exposure: global executable
    kind: cli
    name: osmupdate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:osmfilter
  brew: brew install osmfilter
provenance:
  formula: osmfilter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
