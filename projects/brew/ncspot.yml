id: brew:ncspot
display-name: ncspot
homepage: https://github.com/hrkfdn/ncspot
repo: https://github.com/hrkfdn/ncspot
docs: https://github.com/hrkfdn/ncspot
package-manager:
  apk: ncspot
  brew: ncspot
  nix: ncspot
  pacman: ncspot
  scoop: main/ncspot
  winget: hrkfdn.ncspot
  zypper: ncspot
package-manager-url: https://formulae.brew.sh/formula/ncspot
version: 1.3.4
license: BSD-2-Clause
category: development
tags:
  - cli
description: Cross-platform ncurses Spotify client written in Rust
source-archive: https://github.com/hrkfdn/ncspot/archive/refs/tags/v1.3.4.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ncspot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ncspot
  av: sudo av install brew:ncspot
  brew: brew install ncspot
  nix: nix profile install nixpkgs#ncspot
  pacman: sudo pacman -S ncspot
  scoop: scoop install main/ncspot
  winget: winget install --id hrkfdn.ncspot -e
  zypper: sudo zypper install ncspot
provenance:
  formula: ncspot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
