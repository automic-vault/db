id: brew:libewf
display-name: libewf
homepage: https://github.com/libyal/libewf
repo: https://github.com/libyal/libewf-legacy
docs: https://github.com/libyal/libewf
package-manager:
  apk: libewf
  brew: libewf
  dnf: libewf
  macports: libewf
  nix: libewf
  pacman: libewf
package-manager-url: https://formulae.brew.sh/formula/libewf
version: 20140816
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Library for support of the Expert Witness Compression Format
source-archive: >
  https://github.com/libyal/libewf-legacy/releases/download/20140816/libewf-20140816.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: ewfacquire
  - exposure: global executable
    kind: cli
    name: ewfacquirestream
  - exposure: global executable
    kind: cli
    name: ewfdebug
  - exposure: global executable
    kind: cli
    name: ewfexport
  - exposure: global executable
    kind: cli
    name: ewfinfo
  - exposure: global executable
    kind: cli
    name: ewfmount
  - exposure: global executable
    kind: cli
    name: ewfrecover
  - exposure: global executable
    kind: cli
    name: ewfverify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libewf
  av: sudo av install brew:libewf
  brew: brew install libewf
  dnf: sudo dnf install libewf
  macports: sudo port install libewf
  nix: nix profile install nixpkgs#libewf
  pacman: sudo pacman -S libewf
provenance:
  formula: libewf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
