id: brew:nuttcp
display-name: nuttcp
homepage: https://www.nuttcp.net/nuttcp/
repo: https://www.nuttcp.net/nuttcp/nuttcp-8.2.2.tar.bz2
docs: https://www.nuttcp.net/nuttcp/
package-manager:
