id: brew:firefly
display-name: firefly
homepage: https://hyperledger.github.io/firefly/latest/
repo: https://github.com/hyperledger/firefly-cli
docs: https://hyperledger.github.io/firefly/latest/
package-manager:
  brew: firefly
  nix: firefly
package-manager-url: https://formulae.brew.sh/formula/firefly
version: 1.4.0
license: Apache-2.0
category: development
tags:
  - cli
description: Create and manage the Hyperledger FireFly stack for blockchain interaction
source-archive: https://github.com/hyperledger/firefly-cli/archive/refs/tags/v1.4.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: firefly
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:firefly
  brew: brew install firefly
  nix: nix profile install nixpkgs#firefly
provenance:
  formula: firefly
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
