id: brew:httpry
display-name: httpry
homepage: https://github.com/jbittel/httpry
repo: https://github.com/jbittel/httpry
docs: https://github.com/jbittel/httpry
package-manager:
  apk: httpry
  brew: httpry
  debian: httpry
  dnf: httpry
  ubuntu: httpry
package-manager-url: https://formulae.brew.sh/formula/httpry
version: 0.1.8
license: GPL-2.0-only
category: development
tags:
  - cli
description: Packet sniffer for displaying and logging HTTP traffic
source-archive: https://github.com/jbittel/httpry/archive/refs/tags/httpry-0.1.8.tar.gz
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: httpry
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add httpry
  av: sudo av install brew:httpry
  brew: brew install httpry
  debian: sudo apt install httpry
  dnf: sudo dnf install httpry
  ubuntu: sudo apt install httpry
provenance:
  formula: httpry
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
