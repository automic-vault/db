id: brew:zbar
display-name: zbar
homepage: https://github.com/mchehab/zbar
repo: https://linuxtv.org/downloads/zbar/zbar-0.23.93.tar.bz2
docs: https://github.com/mchehab/zbar
package-manager:
  apk: zbar
  brew: zbar
  dnf: zbar
  macports: zbar
  nix: zbar
  pacman: zbar
  zypper: zbar
package-manager-url: https://formulae.brew.sh/formula/zbar
version: 0.23.93
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Suite of barcodes-reading tools
source-archive: https://linuxtv.org/downloads/zbar/zbar-0.23.93.tar.bz2
dependencies:
  - fontconfig
  - freetype
  - gettext
  - glib
  - imagemagick
  - jpeg-turbo
  - liblqr
  - libomp
  - libtool
  - little-cms2
build-dependencies:
  - pkgconf
  - xmlto
executables:
  - exposure: global executable
    kind: cli
    name: zbarimg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zbar
  av: sudo av install brew:zbar
  brew: brew install zbar
  dnf: sudo dnf install zbar
  macports: sudo port install zbar
  nix: nix profile install nixpkgs#zbar
  pacman: sudo pacman -S zbar
  zypper: sudo zypper install zbar
provenance:
  formula: zbar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
