id: brew:tfprovidercheck
display-name: tfprovidercheck
homepage: https://github.com/suzuki-shunsuke/tfprovidercheck
repo: https://github.com/suzuki-shunsuke/tfprovidercheck
docs: https://github.com/suzuki-shunsuke/tfprovidercheck
package-manager:
  brew: tfprovidercheck
package-manager-url: https://formulae.brew.sh/formula/tfprovidercheck
version: 1.0.7
license: MIT
category: cloud
tags:
  - cli
description: CLI to prevent malicious Terraform Providers from being executed
source-archive: https://github.com/suzuki-shunsuke/tfprovidercheck/archive/refs/tags/v1.0.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tfprovidercheck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tfprovidercheck
  brew: brew install tfprovidercheck
provenance:
  formula: tfprovidercheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
