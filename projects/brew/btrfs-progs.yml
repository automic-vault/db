id: brew:btrfs-progs
display-name: btrfs-progs
homepage: https://btrfs.readthedocs.io/en/latest/
repo: >
  https://mirrors.edge.kernel.org/pub/linux/kernel/people/kdave/btrfs-progs/btrfs-progs-v7.0.tar.xz
docs: https://btrfs.readthedocs.io/en/latest/
package-manager:
  apk: btrfs-progs
  brew: btrfs-progs
  debian: btrfs-progs
  dnf: btrfs-progs
  nix: btrfs-progs
  pacman: btrfs-progs
  ubuntu: btrfs-progs
package-manager-url: https://formulae.brew.sh/formula/btrfs-progs
version: 7.0
license: GPL-2.0-only AND LGPL-2.1-or-later
category: network
tags:
  - cli
description: Userspace utilities to manage btrfs filesystems
source-archive: >
  https://mirrors.edge.kernel.org/pub/linux/kernel/people/kdave/btrfs-progs/btrfs-progs-v7.0.tar.xz
dependencies:
  - e2fsprogs
  - lzo
  - systemd
  - util-linux
  - zlib-ng-compat
  - zstd
build-dependencies:
  - pkgconf
  - python-setuptools
  - python@3.14
  - sphinx-doc
executables:
  - exposure: global executable
    kind: cli
    name: btrfs
  - exposure: global executable
    kind: cli
    name: btrfs-convert
  - exposure: global executable
    kind: cli
    name: btrfs-find-root
  - exposure: global executable
    kind: cli
    name: btrfs-image
  - exposure: global executable
    kind: cli
    name: btrfs-map-logical
  - exposure: global executable
    kind: cli
    name: btrfs-select-super
  - exposure: global executable
    kind: cli
    name: btrfsck
  - exposure: global executable
    kind: cli
    name: btrfstune
  - exposure: global executable
    kind: cli
    name: fsck.btrfs
  - exposure: global executable
    kind: cli
    name: mkfs.btrfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add btrfs-progs
  av: sudo av install brew:btrfs-progs
  brew: brew install btrfs-progs
  debian: sudo apt install btrfs-progs
  dnf: sudo dnf install btrfs-progs
  nix: nix profile install nixpkgs#btrfs-progs
  pacman: sudo pacman -S btrfs-progs
  ubuntu: sudo apt install btrfs-progs
provenance:
  formula: btrfs-progs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
