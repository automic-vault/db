id: brew:render
display-name: render
homepage: https://render.com/docs/cli
repo: https://github.com/render-oss/cli
docs: https://render.com/docs/cli
package-manager:
  brew: render
package-manager-url: https://formulae.brew.sh/formula/render
version: 2.18.0
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line interface for Render
source-archive: https://github.com/render-oss/cli/archive/refs/tags/v2.18.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: render
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:render
  brew: brew install render
provenance:
  formula: render
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
