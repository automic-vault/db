id: brew:funzzy
display-name: funzzy
homepage: https://github.com/cristianoliveira/funzzy
repo: https://github.com/cristianoliveira/funzzy
docs: https://github.com/cristianoliveira/funzzy
package-manager:
  brew: funzzy
  nix: funzzy
package-manager-url: https://formulae.brew.sh/formula/funzzy
version: 1.5.0
license: MIT
category: development
tags:
  - cli
description: Lightweight file watcher
source-archive: https://github.com/cristianoliveira/funzzy/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: funzzy
  - exposure: global executable
    kind: cli
    name: fzz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:funzzy
  brew: brew install funzzy
  nix: nix profile install nixpkgs#funzzy
provenance:
  formula: funzzy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
