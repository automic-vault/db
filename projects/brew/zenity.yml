id: brew:zenity
display-name: zenity
homepage: https://gitlab.gnome.org/GNOME/zenity
repo: https://download.gnome.org/sources/zenity/4.2/zenity-4.2.2.tar.xz
docs: https://gitlab.gnome.org/GNOME/zenity
package-manager:
  apk: zenity
  brew: zenity
  debian: zenity
  dnf: zenity
  macports: zenity
  nix: zenity
  pacman: zenity
  ubuntu: zenity
  zypper: zenity
package-manager-url: https://formulae.brew.sh/formula/zenity
version: 4.2.2
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: GTK+ dialog boxes for the command-line
source-archive: https://download.gnome.org/sources/zenity/4.2/zenity-4.2.2.tar.xz
dependencies:
  - gettext
  - glib
  - gtk4
  - libadwaita
  - pango
build-dependencies:
  - gettext
  - help2man
  - itstool
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: zenity
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add zenity
  av: sudo av install brew:zenity
  brew: brew install zenity
  debian: sudo apt install zenity
  dnf: sudo dnf install zenity
  macports: sudo port install zenity
  nix: nix profile install nixpkgs#zenity
  pacman: sudo pacman -S zenity
  ubuntu: sudo apt install zenity
  zypper: sudo zypper install zenity
provenance:
  formula: zenity
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
