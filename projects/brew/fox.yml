id: brew:fox
display-name: fox
homepage: http://fox-toolkit.org/
repo: https://distfiles.macports.org/fox/fox-1.6.59.tar.gz
docs: http://fox-toolkit.org/
package-manager:
  apk: fox
  brew: fox
  dnf: fox
  macports: fox
  nix: fox
  pacman: fox
package-manager-url: https://formulae.brew.sh/formula/fox
version: 1.6.59
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Toolkit for developing Graphical User Interfaces easily
source-archive: https://distfiles.macports.org/fox/fox-1.6.59.tar.gz
dependencies:
  - fontconfig
  - freetype
  - jpeg-turbo
  - libpng
  - libtiff
  - libx11
  - libxcursor
  - libxext
  - libxfixes
  - libxft
  - libxi
  - libxrandr
  - libxrender
  - mesa
  - mesa-glu
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: PathFinder
  - exposure: global executable
    kind: cli
    name: adie
  - exposure: global executable
    kind: cli
    name: calculator
  - exposure: global executable
    kind: cli
    name: fox-config
  - exposure: global executable
    kind: cli
    name: reswrap
  - exposure: global executable
    kind: cli
    name: shutterbug
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fox
  av: sudo av install brew:fox
  brew: brew install fox
  dnf: sudo dnf install fox
  macports: sudo port install fox
  nix: nix profile install nixpkgs#fox
  pacman: sudo pacman -S fox
provenance:
  formula: fox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
