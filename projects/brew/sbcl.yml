id: brew:sbcl
display-name: sbcl
homepage: https://www.sbcl.org/
repo: https://downloads.sourceforge.net/project/sbcl/sbcl/2.6.4/sbcl-2.6.4-source.tar.bz2
docs: https://www.sbcl.org/
package-manager:
  apk: sbcl
  brew: sbcl
  chocolatey: sbcl
  debian: sbcl
  dnf: sbcl
  macports: sbcl
  nix: sbcl
  pacman: sbcl
  scoop: main/sbcl
  ubuntu: sbcl
  winget: SBCL.SBCL
  zypper: sbcl
package-manager-url: https://formulae.brew.sh/formula/sbcl
version: 2.6.4
license: LicenseRef-Homebrew-public-domain AND MIT AND Xerox AND BSD-3-Clause
category: network
tags:
  - cli
description: Steel Bank Common Lisp system
source-archive: https://downloads.sourceforge.net/project/sbcl/sbcl/2.6.4/sbcl-2.6.4-source.tar.bz2
dependencies:
  - zstd
build-dependencies:
  - ecl
executables:
  - exposure: global executable
    kind: cli
    name: sbcl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sbcl
  av: sudo av install brew:sbcl
  brew: brew install sbcl
  chocolatey: choco install sbcl
  debian: sudo apt install sbcl
  dnf: sudo dnf install sbcl
  macports: sudo port install sbcl
  nix: nix profile install nixpkgs#sbcl
  pacman: sudo pacman -S sbcl
  scoop: scoop install main/sbcl
  ubuntu: sudo apt install sbcl
  winget: winget install --id SBCL.SBCL -e
  zypper: sudo zypper install sbcl
provenance:
  formula: sbcl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
