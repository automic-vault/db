id: brew:kubetrim
display-name: kubetrim
homepage: https://github.com/alexellis/kubetrim
repo: https://github.com/alexellis/kubetrim
docs: https://github.com/alexellis/kubetrim
package-manager:
  brew: kubetrim
  nix: kubetrim
  zypper: kubetrim
package-manager-url: https://formulae.brew.sh/formula/kubetrim
version: 0.0.2
license: MIT
category: development
tags:
  - cli
description: Trim your KUBECONFIG automatically
source-archive: https://github.com/alexellis/kubetrim/archive/refs/tags/v0.0.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubetrim
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubetrim
  brew: brew install kubetrim
  nix: nix profile install nixpkgs#kubetrim
  zypper: sudo zypper install kubetrim
provenance:
  formula: kubetrim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
