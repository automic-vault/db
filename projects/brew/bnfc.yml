id: brew:bnfc
display-name: bnfc
homepage: https://github.com/BNFC/bnfc
repo: https://github.com/BNFC/bnfc
docs: https://github.com/BNFC/bnfc
package-manager:
  brew: bnfc
  debian: bnfc
  pacman: bnfc
  ubuntu: bnfc
package-manager-url: https://formulae.brew.sh/formula/bnfc
version: 2.9.6.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: BNF Converter
source-archive: https://github.com/BNFC/bnfc/archive/refs/tags/v2.9.6.3.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
  - sphinx-doc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: bnfc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bnfc
  brew: brew install bnfc
  debian: sudo apt install bnfc
  pacman: sudo pacman -S bnfc
  ubuntu: sudo apt install bnfc
provenance:
  formula: bnfc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
