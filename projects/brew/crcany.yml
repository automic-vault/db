    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:crcany
  brew: brew install crcany
provenance:
  formula: crcany
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
