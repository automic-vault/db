id: brew:crcany
display-name: crcany
homepage: https://github.com/madler/crcany
repo: https://github.com/madler/crcany
docs: https://github.com/madler/crcany
package-manager:
  brew: crcany
package-manager-url: https://formulae.brew.sh/formula/crcany
version: 2.1
license: Zlib
category: development
tags:
