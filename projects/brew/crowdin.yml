id: brew:crowdin
display-name: crowdin
homepage: https://support.crowdin.com/cli-tool/
repo: https://github.com/crowdin/crowdin-cli
docs: https://support.crowdin.com/cli-tool/
package-manager:
  brew: crowdin
  winget: Crowdin.CrowdinCLI
package-manager-url: https://formulae.brew.sh/formula/crowdin
version: 4.14.2
license: MIT
category: development
tags:
  - cli
description: Command-line tool that allows to manage your resources with crowdin.com
source-archive: https://github.com/crowdin/crowdin-cli/releases/download/4.14.2/crowdin-cli.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: crowdin
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:crowdin
  brew: brew install crowdin
  winget: winget install --id Crowdin.CrowdinCLI -e
provenance:
  formula: crowdin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
