id: brew:azion
display-name: azion
homepage: https://github.com/aziontech/azion
repo: https://github.com/aziontech/azion
docs: https://github.com/aziontech/azion
package-manager:
  brew: azion
package-manager-url: https://formulae.brew.sh/formula/azion
version: 4.21.0
license: MIT
category: development
tags:
  - cli
description: CLI for the Azion service
source-archive: https://github.com/aziontech/azion/archive/refs/tags/4.21.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: azion
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:azion
  brew: brew install azion
provenance:
  formula: azion
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
