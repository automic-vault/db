id: brew:brush
display-name: brush
homepage: https://github.com/reubeno/brush
repo: https://github.com/reubeno/brush
docs: https://github.com/reubeno/brush
package-manager:
  brew: brush
  macports: brush
  nix: brush
  pacman: brush
package-manager-url: https://formulae.brew.sh/formula/brush
version: 0.4.0
license: MIT
category: development
tags:
  - cli
description: Bourne RUsty SHell (command interpreter)
source-archive: https://github.com/reubeno/brush/archive/refs/tags/brush-shell-v0.4.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: brush
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:brush
  brew: brew install brush
  macports: sudo port install brush
  nix: nix profile install nixpkgs#brush
  pacman: sudo pacman -S brush
provenance:
  formula: brush
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
