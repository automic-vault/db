id: brew:hf-mount
display-name: hf-mount
homepage: https://github.com/huggingface/hf-mount
repo: https://github.com/huggingface/hf-mount
docs: https://github.com/huggingface/hf-mount
package-manager:
  brew: hf-mount
package-manager-url: https://formulae.brew.sh/formula/hf-mount
version: 0.6.5
license: Apache-2.0
category: development
tags:
  - cli
description: Mount Hugging Face Buckets and repos as local filesystems
source-archive: https://github.com/huggingface/hf-mount/archive/refs/tags/v0.6.5.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hf-mount
  - exposure: global executable
    kind: cli
    name: hf-mount-fuse
  - exposure: global executable
    kind: cli
    name: hf-mount-nfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hf-mount
  brew: brew install hf-mount
provenance:
  formula: hf-mount
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
