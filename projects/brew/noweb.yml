id: brew:noweb
display-name: noweb
homepage: https://www.cs.tufts.edu/~nr/noweb/
repo: https://github.com/nrnrnr/noweb
docs: https://www.cs.tufts.edu/~nr/noweb/
package-manager:
  brew: noweb
  debian: noweb
  macports: noweb
  nix: noweb
  ubuntu: noweb
package-manager-url: https://formulae.brew.sh/formula/noweb
version: 2.13
license: BSD-2-Clause
category: development
tags:
  - cli
description: WEB-like literate-programming tool
source-archive: https://github.com/nrnrnr/noweb/archive/refs/tags/v2_13.tar.gz
dependencies:
  - icon
build-dependencies:
  - gnu-sed
executables:
  - exposure: global executable
    kind: cli
    name: cpif
  - exposure: global executable
    kind: cli
    name: htmltoc
  - exposure: global executable
    kind: cli
    name: nodefs
  - exposure: global executable
    kind: cli
    name: noindex
  - exposure: global executable
    kind: cli
    name: noroff
  - exposure: global executable
    kind: cli
    name: noroots
  - exposure: global executable
    kind: cli
    name: notangle
  - exposure: global executable
    kind: cli
    name: nountangle
  - exposure: global executable
    kind: cli
    name: noweave
  - exposure: global executable
    kind: cli
    name: noweb
  - exposure: global executable
    kind: cli
    name: nuweb2noweb
  - exposure: global executable
    kind: cli
    name: sl2h
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    TeX support files are installed in the directory:
    $HOMEBREW_CELLAR/noweb/2.13/tex/generic/noweb You may need to add the directory to
    TEXINPUTS to run noweb properly.
  post-install-defined: false
install-lines:
  av: sudo av install brew:noweb
  brew: brew install noweb
  debian: sudo apt install noweb
  macports: sudo port install noweb
  nix: nix profile install nixpkgs#noweb
  ubuntu: sudo apt install noweb
provenance:
  formula: noweb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
