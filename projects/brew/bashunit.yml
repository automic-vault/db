id: brew:bashunit
display-name: bashunit
homepage: https://bashunit.typeddevs.com
repo: https://github.com/TypedDevs/bashunit
docs: https://bashunit.typeddevs.com
package-manager:
  brew: bashunit
  macports: bashunit
  nix: bashunit
package-manager-url: https://formulae.brew.sh/formula/bashunit
version: 0.36.0
license: MIT
category: development
tags:
  - cli
description: Simple testing library for bash scripts
source-archive: https://github.com/TypedDevs/bashunit/releases/download/0.36.0/bashunit
executables:
  - exposure: global executable
    kind: cli
    name: bashunit
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bashunit
  brew: brew install bashunit
  macports: sudo port install bashunit
  nix: nix profile install nixpkgs#bashunit
provenance:
  formula: bashunit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
