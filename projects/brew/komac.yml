id: brew:komac
display-name: komac
homepage: https://github.com/russellbanks/Komac
repo: https://github.com/russellbanks/Komac
docs: https://github.com/russellbanks/Komac
package-manager:
  brew: komac
  nix: komac
  scoop: extras/komac
  winget: RussellBanks.Komac
package-manager-url: https://formulae.brew.sh/formula/komac
version: 2.16.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Community Manifest Creator for Windows Package Manager (WinGet)
source-archive: https://github.com/russellbanks/Komac/archive/refs/tags/v2.16.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: komac
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:komac
  brew: brew install komac
  nix: nix profile install nixpkgs#komac
  scoop: scoop install extras/komac
  winget: winget install --id RussellBanks.Komac -e
provenance:
  formula: komac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
