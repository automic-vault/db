id: brew:gnuradio
display-name: gnuradio
homepage: https://www.gnuradio.org/
repo: https://github.com/gnuradio/gnuradio
docs: https://www.gnuradio.org/
package-manager:
  apk: gnuradio
  brew: gnuradio
  debian: gnuradio
  dnf: gnuradio
  macports: gnuradio
  nix: gnuradio
  pacman: gnuradio
  ubuntu: gnuradio
  zypper: gnuradio
package-manager-url: https://formulae.brew.sh/formula/gnuradio
version: 3.10.12.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: SDK for signal processing blocks to implement software radios
source-archive: https://github.com/gnuradio/gnuradio/archive/refs/tags/v3.10.12.0.tar.gz
dependencies:
  - adwaita-icon-theme
  - boost
  - cppzmq
  - fftw
  - fmt
  - gmp
  - gsl
  - gtk+3
  - jack
  - libsndfile
  - libyaml
  - numpy
  - portaudio
  - pygobject3
  - pyqt@5
  - python@3.14
  - qt@5
  - qwt-qt5
  - rpds-py
  - soapyrtlsdr
  - soapysdr
  - spdlog
  - uhd
  - volk
  - zeromq
build-dependencies:
  - cmake
  - doxygen
  - pkgconf
  - pybind11
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: gnuradio-companion
  - exposure: global executable
    kind: cli
    name: gnuradio-config-info
  - exposure: global executable
    kind: cli
    name: gr_filter_design
  - exposure: global executable
    kind: cli
    name: gr_modtool
  - exposure: global executable
    kind: cli
    name: gr_plot
  - exposure: global executable
    kind: cli
    name: gr_plot_const
  - exposure: global executable
    kind: cli
    name: gr_plot_fft
  - exposure: global executable
    kind: cli
    name: gr_plot_iq
  - exposure: global executable
    kind: cli
    name: gr_plot_psd
  - exposure: global executable
    kind: cli
    name: gr_plot_qt
  - exposure: global executable
    kind: cli
    name: gr_read_file_metadata
  - exposure: global executable
    kind: cli
    name: grcc
  - exposure: global executable
    kind: cli
    name: polar_channel_construction
  - exposure: global executable
    kind: cli
    name: uhd_fft
  - exposure: global executable
    kind: cli
    name: uhd_rx_cfile
  - exposure: global executable
    kind: cli
    name: uhd_rx_nogui
  - exposure: global executable
    kind: cli
    name: uhd_siggen
  - exposure: global executable
    kind: cli
    name: uhd_siggen_gui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gnuradio
  av: sudo av install brew:gnuradio
  brew: brew install gnuradio
  debian: sudo apt install gnuradio
  dnf: sudo dnf install gnuradio
  macports: sudo port install gnuradio
  nix: nix profile install nixpkgs#gnuradio
  pacman: sudo pacman -S gnuradio
  ubuntu: sudo apt install gnuradio
  zypper: sudo zypper install gnuradio
provenance:
  formula: gnuradio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
