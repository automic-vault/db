id: brew:bigquery-emulator
display-name: bigquery-emulator
homepage: https://github.com/goccy/bigquery-emulator
repo: https://github.com/goccy/bigquery-emulator
docs: https://github.com/goccy/bigquery-emulator
package-manager:
  brew: bigquery-emulator
  nix: bigquery-emulator
package-manager-url: https://formulae.brew.sh/formula/bigquery-emulator
version: 0.7.2
license: MIT
category: development
tags:
  - cli
description: Emulate a GCP BigQuery server on your local machine
source-archive: https://github.com/goccy/bigquery-emulator/archive/refs/tags/v0.7.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bigquery-emulator
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bigquery-emulator
  brew: brew install bigquery-emulator
  nix: nix profile install nixpkgs#bigquery-emulator
provenance:
  formula: bigquery-emulator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
