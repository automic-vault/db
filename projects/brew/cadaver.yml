id: brew:cadaver
display-name: cadaver
homepage: https://notroj.github.io/cadaver/
repo: https://notroj.github.io/cadaver/cadaver-0.28.tar.gz
docs: https://notroj.github.io/cadaver/
package-manager:
  apk: cadaver
  brew: cadaver
  debian: cadaver
  dnf: cadaver
  macports: cadaver
  nix: cadaver
  pacman: cadaver
  ubuntu: cadaver
  zypper: cadaver
package-manager-url: https://formulae.brew.sh/formula/cadaver
version: 0.28
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Command-line client for DAV
source-archive: https://notroj.github.io/cadaver/cadaver-0.28.tar.gz
dependencies:
  - gettext
  - neon
  - openssl@3
  - readline
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cadaver
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cadaver
  av: sudo av install brew:cadaver
  brew: brew install cadaver
  debian: sudo apt install cadaver
  dnf: sudo dnf install cadaver
  macports: sudo port install cadaver
  nix: nix profile install nixpkgs#cadaver
  pacman: sudo pacman -S cadaver
  ubuntu: sudo apt install cadaver
  zypper: sudo zypper install cadaver
provenance:
  formula: cadaver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
