id: brew:rcm
display-name: rcm
homepage: https://thoughtbot.github.io/rcm/rcm.7.html
repo: https://thoughtbot.github.io/rcm/dist/rcm-1.3.6.tar.gz
docs: https://thoughtbot.github.io/rcm/rcm.7.html
package-manager:
  apk: rcm
  brew: rcm
  debian: rcm
  dnf: rcm
  macports: rcm
  nix: rcm
  ubuntu: rcm
  zypper: rcm
package-manager-url: https://formulae.brew.sh/formula/rcm
version: 1.3.6
license: BSD-3-Clause
category: development
tags:
  - cli
description: RC file (dotfile) management
source-archive: https://thoughtbot.github.io/rcm/dist/rcm-1.3.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lsrc
  - exposure: global executable
    kind: cli
    name: mkrc
  - exposure: global executable
    kind: cli
    name: rcdn
  - exposure: global executable
    kind: cli
    name: rcup
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rcm
  av: sudo av install brew:rcm
  brew: brew install rcm
  debian: sudo apt install rcm
  dnf: sudo dnf install rcm
  macports: sudo port install rcm
  nix: nix profile install nixpkgs#rcm
  ubuntu: sudo apt install rcm
  zypper: sudo zypper install rcm
provenance:
  formula: rcm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
