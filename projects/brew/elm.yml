id: brew:elm
display-name: elm
homepage: https://elm-lang.org
repo: https://github.com/elm/compiler
docs: https://elm-lang.org
package-manager:
  brew: elm
  scoop: main/elm
  winget: EvanCzaplicki.Elm
package-manager-url: https://formulae.brew.sh/formula/elm
version: 0.19.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Functional programming language for building browser-based GUIs
source-archive: https://github.com/elm/compiler/archive/refs/tags/0.19.1.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: elm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:elm
  brew: brew install elm
  scoop: scoop install main/elm
  winget: winget install --id EvanCzaplicki.Elm -e
provenance:
  formula: elm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
