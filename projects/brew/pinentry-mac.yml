id: brew:pinentry-mac
display-name: pinentry-mac
homepage: https://github.com/GPGTools/pinentry
repo: https://github.com/GPGTools/pinentry
docs: https://github.com/GPGTools/pinentry
package-manager:
  brew: pinentry-mac
  macports: pinentry-mac
  nix: pinentry_mac
package-manager-url: https://formulae.brew.sh/formula/pinentry-mac
version: 1.3.1.1
license: GPL-2.0-or-later AND GPL-3.0-or-later
category: development
tags:
  - cli
description: Pinentry for GPG on Mac
source-archive: https://github.com/GPGTools/pinentry/archive/refs/tags/v1.3.1.1.tar.gz
dependencies:
  - libassuan
  - libgpg-error
build-dependencies:
  - autoconf
  - automake
  - gettext
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: pinentry-mac
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You can now set this as your pinentry program like ~/.gnupg/gpg-agent.conf
    pinentry-program $HOMEBREW_PREFIX/bin/pinentry-mac
  post-install-defined: false
install-lines:
  av: sudo av install brew:pinentry-mac
  brew: brew install pinentry-mac
  macports: sudo port install pinentry-mac
  nix: nix profile install nixpkgs#pinentry_mac
provenance:
  formula: pinentry-mac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
