id: brew:dtm
display-name: dtm
homepage: https://en.dtm.pub/
repo: https://github.com/dtm-labs/dtm
docs: https://en.dtm.pub/
package-manager:
  brew: dtm
package-manager-url: https://formulae.brew.sh/formula/dtm
version: 1.19.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Cross-language distributed transaction manager
source-archive: https://github.com/dtm-labs/dtm/archive/refs/tags/v1.19.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dtm
  - exposure: global executable
    kind: cli
    name: dtm-qs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dtm
  brew: brew install dtm
provenance:
  formula: dtm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
