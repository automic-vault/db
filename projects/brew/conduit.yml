id: brew:conduit
display-name: conduit
homepage: https://conduit.io/
repo: https://github.com/ConduitIO/conduit
docs: https://conduit.io/
package-manager:
  apk: conduit
  brew: conduit
  nix: conduit
  winget: Icehunter.conduit
package-manager-url: https://formulae.brew.sh/formula/conduit
version: 0.14.0
license: Apache-2.0
category: development
tags:
  - cli
description: Streams data between data stores. Kafka Connect replacement. No JVM required
source-archive: https://github.com/ConduitIO/conduit/archive/refs/tags/v0.14.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: conduit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add conduit
  av: sudo av install brew:conduit
  brew: brew install conduit
  nix: nix profile install nixpkgs#conduit
  winget: winget install --id Icehunter.conduit -e
provenance:
  formula: conduit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
