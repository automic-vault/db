id: brew:tftp-now
display-name: tftp-now
homepage: https://github.com/puhitaku/tftp-now
repo: https://github.com/puhitaku/tftp-now
docs: https://github.com/puhitaku/tftp-now
package-manager:
  brew: tftp-now
package-manager-url: https://formulae.brew.sh/formula/tftp-now
version: 1.2.0
license: MIT
category: development
tags:
  - cli
description: Single-binary TFTP server and client that you can use right now
source-archive: https://github.com/puhitaku/tftp-now/archive/refs/tags/1.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tftp-now
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tftp-now
  brew: brew install tftp-now
provenance:
  formula: tftp-now
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
