id: brew:libesedb
display-name: libesedb
homepage: https://github.com/libyal/libesedb
repo: https://github.com/libyal/libesedb
docs: https://github.com/libyal/libesedb
package-manager:
  brew: libesedb
  dnf: libesedb
package-manager-url: https://formulae.brew.sh/formula/libesedb
version: 20240420
license: LGPL-3.0-or-later
category: database
tags:
  - cli
  - database
description: Library and tools for Extensible Storage Engine (ESE) Database files
source-archive: >
  https://github.com/libyal/libesedb/releases/download/20240420/libesedb-experimental-20240420.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: esedbexport
  - exposure: global executable
    kind: cli
    name: esedbinfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libesedb
  brew: brew install libesedb
  dnf: sudo dnf install libesedb
provenance:
  formula: libesedb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
