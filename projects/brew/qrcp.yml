id: brew:qrcp
display-name: qrcp
homepage: https://qrcp.sh
repo: https://github.com/claudiodangelis/qrcp
docs: https://qrcp.sh
package-manager:
  brew: qrcp
  macports: qrcp
  nix: qrcp
  scoop: main/qrcp
  winget: claudiodangelis.qrcp
package-manager-url: https://formulae.brew.sh/formula/qrcp
version: 0.11.6
license: MIT
category: development
tags:
  - cli
description: Transfer files to and from your computer by scanning a QR code
source-archive: https://github.com/claudiodangelis/qrcp/archive/refs/tags/v0.11.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: qrcp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qrcp
  brew: brew install qrcp
  macports: sudo port install qrcp
  nix: nix profile install nixpkgs#qrcp
  scoop: scoop install main/qrcp
  winget: winget install --id claudiodangelis.qrcp -e
provenance:
  formula: qrcp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
