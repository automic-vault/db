id: brew:autojump
display-name: autojump
homepage: https://github.com/wting/autojump
repo: https://github.com/wting/autojump
docs: https://github.com/wting/autojump
package-manager:
  brew: autojump
  debian: autojump
  dnf: autojump
  macports: autojump
  nix: autojump
  scoop: extras/autojump
  ubuntu: autojump
  zypper: autojump
package-manager-url: https://formulae.brew.sh/formula/autojump
version: 22.5.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Shell extension to jump to frequently used directories
source-archive: https://github.com/wting/autojump/archive/refs/tags/release-v22.5.3.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: autojump
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Add the following line to your ~/.bash_profile or ~/.zshrc file: [ -f
    $HOMEBREW_PREFIX/etc/profile.d/autojump.sh ] && .
    $HOMEBREW_PREFIX/etc/profile.d/autojump.sh If you use the Fish shell then add the
    following line to your ~/.config/fish/config.fish: [ -f
    $HOMEBREW_PREFIX/share/autojump/autojump.fish ]; and source
    $HOMEBREW_PREFIX/share/autojump/autojump.fish Restart your terminal for the settings
    to take effect.
  post-install-defined: false
install-lines:
  av: sudo av install brew:autojump
  brew: brew install autojump
  debian: sudo apt install autojump
  dnf: sudo dnf install autojump
  macports: sudo port install autojump
  nix: nix profile install nixpkgs#autojump
  scoop: scoop install extras/autojump
  ubuntu: sudo apt install autojump
  zypper: sudo zypper install autojump
provenance:
  formula: autojump
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
