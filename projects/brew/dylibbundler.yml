id: brew:dylibbundler
display-name: dylibbundler
homepage: https://github.com/auriamg/macdylibbundler
repo: https://github.com/auriamg/macdylibbundler
docs: https://github.com/auriamg/macdylibbundler
package-manager:
  brew: dylibbundler
  macports: dylibbundler
package-manager-url: https://formulae.brew.sh/formula/dylibbundler
version: 1.0.5
license: MIT
category: development
tags:
  - cli
description: Utility to bundle libraries into executables for macOS
source-archive: https://github.com/auriamg/macdylibbundler/archive/refs/tags/1.0.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: dylibbundler
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dylibbundler
  brew: brew install dylibbundler
  macports: sudo port install dylibbundler
provenance:
  formula: dylibbundler
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
