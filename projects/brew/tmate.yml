id: brew:tmate
display-name: tmate
homepage: https://tmate.io/
repo: https://github.com/tmate-io/tmate
docs: https://tmate.io/
package-manager:
  apk: tmate
  brew: tmate
  debian: tmate
  dnf: tmate
  macports: tmate
  nix: tmate
  pacman: tmate
  ubuntu: tmate
  zypper: tmate
package-manager-url: https://formulae.brew.sh/formula/tmate
version: 2.4.0
license: ISC
category: development
tags:
  - cli
description: Instant terminal sharing
source-archive: https://github.com/tmate-io/tmate/archive/refs/tags/2.4.0.tar.gz
dependencies:
  - libevent
  - libssh
  - msgpack
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: tmate
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tmate
  av: sudo av install brew:tmate
  brew: brew install tmate
  debian: sudo apt install tmate
  dnf: sudo dnf install tmate
  macports: sudo port install tmate
  nix: nix profile install nixpkgs#tmate
  pacman: sudo pacman -S tmate
  ubuntu: sudo apt install tmate
  zypper: sudo zypper install tmate
provenance:
  formula: tmate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
