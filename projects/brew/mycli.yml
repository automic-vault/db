id: brew:mycli
display-name: mycli
homepage: https://www.mycli.net/
repo: >
  https://files.pythonhosted.org/packages/99/6b/1eb91cb05765fa25c9fd11c37e52c515afacaba0f27fd496888197fa2f84/mycli-1.72.1.tar.gz
docs: https://www.mycli.net/
package-manager:
  apk: mycli
  brew: mycli
  debian: mycli
  dnf: mycli
  macports: mycli
  nix: mycli
  ubuntu: mycli
package-manager-url: https://formulae.brew.sh/formula/mycli
version: 1.72.1
license: BSD-3-Clause
category: database
tags:
  - cli
description: CLI for MySQL with auto-completion and syntax highlighting
source-archive: >
  https://files.pythonhosted.org/packages/99/6b/1eb91cb05765fa25c9fd11c37e52c515afacaba0f27fd496888197fa2f84/mycli-1.72.1.tar.gz
dependencies:
  - certifi
  - cryptography
  - libyaml
  - pydantic
  - python@3.14
build-dependencies:
  - rust
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: mycli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mycli
  av: sudo av install brew:mycli
  brew: brew install mycli
  debian: sudo apt install mycli
  dnf: sudo dnf install mycli
  macports: sudo port install mycli
  nix: nix profile install nixpkgs#mycli
  ubuntu: sudo apt install mycli
provenance:
  formula: mycli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
