id: brew:pg_partman
display-name: pg_partman
homepage: https://github.com/pgpartman/pg_partman
repo: https://github.com/pgpartman/pg_partman
docs: https://github.com/pgpartman/pg_partman
package-manager:
  brew: pg_partman
  dnf: pg_partman
package-manager-url: https://formulae.brew.sh/formula/pg_partman
version: 5.4.3
license: PostgreSQL
category: database
tags:
  - cli
description: Partition management extension for PostgreSQL
source-archive: https://github.com/pgpartman/pg_partman/archive/refs/tags/v5.4.3.tar.gz
build-dependencies:
  - postgresql@17
  - postgresql@18
executables:
  - exposure: global executable
    kind: cli
    name: check_unique_constraint.py
  - exposure: global executable
    kind: cli
    name: dump_partition.py
  - exposure: global executable
    kind: cli
    name: vacuum_maintenance.py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pg_partman
  brew: brew install pg_partman
  dnf: sudo dnf install pg_partman
provenance:
  formula: pg_partman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
