id: brew:circumflex
display-name: circumflex
homepage: https://github.com/bensadeh/circumflex
repo: https://github.com/bensadeh/circumflex
docs: https://github.com/bensadeh/circumflex
package-manager:
  brew: circumflex
  nix: circumflex
package-manager-url: https://formulae.brew.sh/formula/circumflex
version: 4.2
license: MIT
category: development
tags:
  - cli
description: Hacker News in your terminal
source-archive: https://github.com/bensadeh/circumflex/archive/refs/tags/4.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: clx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:circumflex
  brew: brew install circumflex
  nix: nix profile install nixpkgs#circumflex
provenance:
  formula: circumflex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
