id: brew:ddh
display-name: ddh
homepage: https://github.com/darakian/ddh
repo: https://github.com/darakian/ddh
docs: https://github.com/darakian/ddh
package-manager:
  brew: ddh
  macports: ddh
  nix: ddh
package-manager-url: https://formulae.brew.sh/formula/ddh
version: 0.13.0
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Fast duplicate file finder
source-archive: https://github.com/darakian/ddh/archive/refs/tags/0.13.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ddh
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ddh
  brew: brew install ddh
  macports: sudo port install ddh
  nix: nix profile install nixpkgs#ddh
provenance:
  formula: ddh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
