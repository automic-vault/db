id: brew:memcacheq
display-name: memcacheq
homepage: https://github.com/stvchu/memcacheq
repo: https://github.com/stvchu/memcacheq
docs: https://github.com/stvchu/memcacheq
package-manager:
  brew: memcacheq
  macports: memcacheq
package-manager-url: https://formulae.brew.sh/formula/memcacheq
version: 0.2.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Queue service for memcache
source-archive: https://github.com/stvchu/memcacheq/archive/refs/tags/v0.2.1.tar.gz
dependencies:
  - berkeley-db@5
  - libevent
executables:
  - exposure: global executable
    kind: cli
    name: memcacheq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:memcacheq
  brew: brew install memcacheq
  macports: sudo port install memcacheq
provenance:
  formula: memcacheq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
