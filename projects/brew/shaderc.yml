id: brew:shaderc
display-name: shaderc
homepage: https://github.com/google/shaderc
repo: https://github.com/google/shaderc
docs: https://github.com/google/shaderc
package-manager:
  apk: shaderc
  brew: shaderc
  debian: glslc
  dnf: glslc
  macports: shaderc
  nix: shaderc
  pacman: shaderc
  ubuntu: glslc
  zypper: shaderc
package-manager-url: https://formulae.brew.sh/formula/shaderc
version: 2026.2
license: Apache-2.0
category: development
tags:
  - cli
description: Collection of tools, libraries, and tests for Vulkan shader compilation
source-archive: https://github.com/google/shaderc/archive/refs/tags/v2026.2.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: glslc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add shaderc
  av: sudo av install brew:shaderc
  brew: brew install shaderc
  debian: sudo apt install glslc
  dnf: sudo dnf install glslc
  macports: sudo port install shaderc
  nix: nix profile install nixpkgs#shaderc
  pacman: sudo pacman -S shaderc
  ubuntu: sudo apt install glslc
  zypper: sudo zypper install shaderc
provenance:
  formula: shaderc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
