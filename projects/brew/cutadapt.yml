id: brew:cutadapt
display-name: cutadapt
homepage: https://cutadapt.readthedocs.io
repo: https://github.com/marcelm/cutadapt
docs: https://cutadapt.readthedocs.io
package-manager:
  brew: cutadapt
  debian: cutadapt
  ubuntu: cutadapt
package-manager-url: https://formulae.brew.sh/formula/cutadapt
version: 5.2
license: MIT
category: development
tags:
  - cli
description: Removes adapter sequences from sequencing reads
source-archive: https://github.com/marcelm/cutadapt.git
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: cutadapt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cutadapt
  brew: brew install cutadapt
  debian: sudo apt install cutadapt
  ubuntu: sudo apt install cutadapt
provenance:
  formula: cutadapt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
