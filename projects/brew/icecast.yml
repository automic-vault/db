id: brew:icecast
display-name: icecast
homepage: https://icecast.org/
repo: https://ftp.osuosl.org/pub/xiph/releases/icecast/icecast-2.4.4.tar.gz
docs: https://icecast.org/
package-manager:
  apk: icecast
  brew: icecast
  dnf: icecast
  macports: icecast
  nix: icecast
  scoop: extras/icecast
  zypper: icecast
package-manager-url: https://formulae.brew.sh/formula/icecast
version: 2.4.4
license: GPL-2.0-only
category: media
tags:
  - cli
description: Streaming MP3 audio server
source-archive: https://ftp.osuosl.org/pub/xiph/releases/icecast/icecast-2.4.4.tar.gz
dependencies:
  - libogg
  - libvorbis
  - openssl@3
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: icecast
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add icecast
  av: sudo av install brew:icecast
  brew: brew install icecast
  dnf: sudo dnf install icecast
  macports: sudo port install icecast
  nix: nix profile install nixpkgs#icecast
  scoop: scoop install extras/icecast
  zypper: sudo zypper install icecast
provenance:
  formula: icecast
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
