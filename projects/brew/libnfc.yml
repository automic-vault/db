id: brew:libnfc
display-name: libnfc
homepage: https://github.com/nfc-tools/libnfc
repo: https://github.com/nfc-tools/libnfc
docs: https://github.com/nfc-tools/libnfc
package-manager:
  apk: libnfc
  brew: libnfc
  dnf: libnfc
  macports: libnfc
  nix: libnfc
  pacman: libnfc
package-manager-url: https://formulae.brew.sh/formula/libnfc
version: 1.8.0
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Low level NFC SDK and Programmers API
source-archive: https://github.com/nfc-tools/libnfc/releases/download/libnfc-1.8.0/libnfc-1.8.0.tar.bz2
dependencies:
  - libusb-compat
build-dependencies:
  - pkgconf
uses-from-macos:
  - pcsc-lite
executables:
  - exposure: global executable
    kind: cli
    name: nfc-anticol
  - exposure: global executable
    kind: cli
    name: nfc-barcode
  - exposure: global executable
    kind: cli
    name: nfc-dep-initiator
  - exposure: global executable
    kind: cli
    name: nfc-dep-target
  - exposure: global executable
    kind: cli
    name: nfc-emulate-forum-tag2
  - exposure: global executable
    kind: cli
    name: nfc-emulate-forum-tag4
  - exposure: global executable
    kind: cli
    name: nfc-emulate-tag
  - exposure: global executable
    kind: cli
    name: nfc-emulate-uid
  - exposure: global executable
    kind: cli
    name: nfc-jewel
  - exposure: global executable
    kind: cli
    name: nfc-list
  - exposure: global executable
    kind: cli
    name: nfc-mfclassic
  - exposure: global executable
    kind: cli
    name: nfc-mfsetuid
  - exposure: global executable
    kind: cli
    name: nfc-mfultralight
  - exposure: global executable
    kind: cli
    name: nfc-poll
  - exposure: global executable
    kind: cli
    name: nfc-read-forum-tag3
  - exposure: global executable
    kind: cli
    name: nfc-relay
  - exposure: global executable
    kind: cli
    name: nfc-relay-picc
  - exposure: global executable
    kind: cli
    name: nfc-scan-device
  - exposure: global executable
    kind: cli
    name: pn53x-diagnose
  - exposure: global executable
    kind: cli
    name: pn53x-sam
  - exposure: global executable
    kind: cli
    name: pn53x-tamashell
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libnfc
  av: sudo av install brew:libnfc
  brew: brew install libnfc
  dnf: sudo dnf install libnfc
  macports: sudo port install libnfc
  nix: nix profile install nixpkgs#libnfc
  pacman: sudo pacman -S libnfc
provenance:
  formula: libnfc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
