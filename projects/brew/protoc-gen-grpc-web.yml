id: brew:protoc-gen-grpc-web
display-name: protoc-gen-grpc-web
homepage: https://github.com/grpc/grpc-web
repo: https://github.com/grpc/grpc-web
docs: https://github.com/grpc/grpc-web
package-manager:
  brew: protoc-gen-grpc-web
  nix: protoc-gen-grpc-web
  scoop: main/protoc-gen-grpc-web
package-manager-url: https://formulae.brew.sh/formula/protoc-gen-grpc-web
version: 2.0.2
license: Apache-2.0
category: development
tags:
  - cli
description: Protoc plugin that generates code for gRPC-Web clients
source-archive: https://github.com/grpc/grpc-web/archive/refs/tags/2.0.2.tar.gz
dependencies:
  - abseil
  - protobuf
  - protoc-gen-js
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: protoc-gen-grpc-web
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:protoc-gen-grpc-web
  brew: brew install protoc-gen-grpc-web
  nix: nix profile install nixpkgs#protoc-gen-grpc-web
  scoop: scoop install main/protoc-gen-grpc-web
provenance:
  formula: protoc-gen-grpc-web
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
