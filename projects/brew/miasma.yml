id: brew:miasma
display-name: miasma
homepage: https://github.com/austin-weeks/miasma
repo: https://github.com/austin-weeks/miasma
docs: https://github.com/austin-weeks/miasma
package-manager:
  brew: miasma
package-manager-url: https://formulae.brew.sh/formula/miasma
version: 0.2.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Trap AI web scrapers in an endless poison pit
source-archive: https://github.com/austin-weeks/miasma/archive/refs/tags/v0.2.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: miasma
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:miasma
  brew: brew install miasma
provenance:
  formula: miasma
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
