id: brew:i2pd
display-name: i2pd
homepage: https://i2pd.website/
repo: https://github.com/PurpleI2P/i2pd
docs: https://i2pd.website/
package-manager:
  apk: i2pd
  brew: i2pd
  chocolatey: i2pd
  debian: i2pd
  macports: i2pd
  nix: i2pd
  pacman: i2pd
  scoop: extras/i2pd
  ubuntu: i2pd
  winget: PurpleI2P.i2pd
  zypper: i2pd
package-manager-url: https://formulae.brew.sh/formula/i2pd
version: 2.60.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Full-featured C++ implementation of I2P client
source-archive: https://github.com/PurpleI2P/i2pd/archive/refs/tags/2.60.0.tar.gz
dependencies:
  - boost
  - miniupnpc
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: i2pd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
  service: declared
install-lines:
  apk: sudo apk add i2pd
  av: sudo av install brew:i2pd
  brew: brew install i2pd
  chocolatey: choco install i2pd
  debian: sudo apt install i2pd
  macports: sudo port install i2pd
  nix: nix profile install nixpkgs#i2pd
  pacman: sudo pacman -S i2pd
  scoop: scoop install extras/i2pd
  ubuntu: sudo apt install i2pd
  winget: winget install --id PurpleI2P.i2pd -e
  zypper: sudo zypper install i2pd
provenance:
  formula: i2pd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
