id: brew:inlyne
display-name: inlyne
homepage: https://github.com/Inlyne-Project/inlyne
repo: https://github.com/Inlyne-Project/inlyne
docs: https://github.com/Inlyne-Project/inlyne
package-manager:
  apk: inlyne
  brew: inlyne
  nix: inlyne
package-manager-url: https://formulae.brew.sh/formula/inlyne
version: 0.5.2
license: MIT
category: development
tags:
  - cli
description: GPU powered yet browserless tool to help you quickly view markdown files
source-archive: https://github.com/Inlyne-Project/inlyne/archive/refs/tags/v0.5.2.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: inlyne
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add inlyne
  av: sudo av install brew:inlyne
  brew: brew install inlyne
  nix: nix profile install nixpkgs#inlyne
provenance:
  formula: inlyne
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
