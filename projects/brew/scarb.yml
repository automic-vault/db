id: brew:scarb
display-name: scarb
homepage: https://docs.swmansion.com/scarb/
repo: https://github.com/software-mansion/scarb
docs: https://docs.swmansion.com/scarb/
package-manager:
  brew: scarb
package-manager-url: https://formulae.brew.sh/formula/scarb
version: 2.18.0
license: MIT
category: development
tags:
  - cli
description: Cairo package manager
source-archive: https://github.com/software-mansion/scarb/archive/refs/tags/v2.18.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: scarb
  - exposure: global executable
    kind: cli
    name: scarb-cairo-language-server
  - exposure: global executable
    kind: cli
    name: scarb-cairo-test
  - exposure: global executable
    kind: cli
    name: scarb-doc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:scarb
  brew: brew install scarb
provenance:
  formula: scarb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
