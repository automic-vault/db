id: brew:wp-cli
display-name: wp-cli
homepage: https://wp-cli.org/
repo: https://github.com/wp-cli/wp-cli
docs: https://wp-cli.org/
package-manager:
  brew: wp-cli
  dnf: wp-cli
  macports: wp-cli
  nix: wp-cli
  pacman: wp-cli
  scoop: main/wp-cli
  zypper: wp-cli
package-manager-url: https://formulae.brew.sh/formula/wp-cli
version: 2.12.0
license: MIT
category: development
tags:
  - cli
description: Command-line interface for WordPress
source-archive: https://github.com/wp-cli/wp-cli/releases/download/v2.12.0/wp-cli-2.12.0.phar
dependencies:
  - php
executables:
  - exposure: global executable
    kind: cli
    name: wp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wp-cli
  brew: brew install wp-cli
  dnf: sudo dnf install wp-cli
  macports: sudo port install wp-cli
  nix: nix profile install nixpkgs#wp-cli
  pacman: sudo pacman -S wp-cli
  scoop: scoop install main/wp-cli
  zypper: sudo zypper install wp-cli
provenance:
  formula: wp-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
