id: brew:plutobook
display-name: plutobook
homepage: https://github.com/plutoprint/plutobook
repo: https://github.com/plutoprint/plutobook
docs: https://github.com/plutoprint/plutobook
package-manager:
  brew: plutobook
  nix: html2pdf
package-manager-url: https://formulae.brew.sh/formula/plutobook
version: 0.17.0
license: MPL-2.0
category: development
tags:
  - cli
description: Paged HTML Rendering Library
source-archive: https://github.com/plutoprint/plutobook/archive/refs/tags/v0.17.0.tar.gz
dependencies:
  - cairo
  - fontconfig
  - freetype
  - harfbuzz
  - icu4c@78
  - jpeg-turbo
  - libidn2
  - webp
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: html2pdf
  - exposure: global executable
    kind: cli
    name: html2png
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:plutobook
  brew: brew install plutobook
  nix: nix profile install nixpkgs#html2pdf
provenance:
  formula: plutobook
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
