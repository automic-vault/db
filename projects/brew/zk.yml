id: brew:zk
display-name: zk
homepage: https://zk-org.github.io/zk/
repo: https://github.com/zk-org/zk
docs: https://zk-org.github.io/zk/
package-manager:
  apk: zk
  brew: zk
  macports: zk
  nix: zk
  pacman: zk
  scoop: main/zk
  zypper: zk
package-manager-url: https://formulae.brew.sh/formula/zk
version: 0.15.4
license: GPL-3.0-only
category: development
tags:
  - cli
description: Plain text note-taking assistant
source-archive: https://github.com/zk-org/zk/archive/refs/tags/v0.15.4.tar.gz
dependencies:
  - icu4c@78
build-dependencies:
  - go
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: zk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zk
  av: sudo av install brew:zk
  brew: brew install zk
  macports: sudo port install zk
  nix: nix profile install nixpkgs#zk
  pacman: sudo pacman -S zk
  scoop: scoop install main/zk
  zypper: sudo zypper install zk
provenance:
  formula: zk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
