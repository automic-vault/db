id: brew:druid
display-name: druid
homepage: https://druid.apache.org/
repo: https://www.apache.org/dyn/closer.lua?path=druid/37.0.0/apache-druid-37.0.0-bin.tar.gz
docs: https://druid.apache.org/
package-manager:
  brew: druid
  nix: druid
package-manager-url: https://formulae.brew.sh/formula/druid
version: 37.0.0
license: Apache-2.0
category: network
tags:
  - cli
description: High-performance, column-oriented, distributed data store
source-archive: https://www.apache.org/dyn/closer.lua?path=druid/37.0.0/apache-druid-37.0.0-bin.tar.gz
dependencies:
  - openjdk@21
executables:
  - exposure: global executable
    kind: cli
    name: druid-broker.sh
  - exposure: global executable
    kind: cli
    name: druid-coordinator.sh
  - exposure: global executable
    kind: cli
    name: druid-historical.sh
  - exposure: global executable
    kind: cli
    name: druid-jconsole.sh
  - exposure: global executable
    kind: cli
    name: druid-middleManager.sh
  - exposure: global executable
    kind: cli
    name: druid-node.sh
  - exposure: global executable
    kind: cli
    name: druid-overlord.sh
  - exposure: global executable
    kind: cli
    name: druid-router.sh
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:druid
  brew: brew install druid
  nix: nix profile install nixpkgs#druid
provenance:
  formula: druid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
