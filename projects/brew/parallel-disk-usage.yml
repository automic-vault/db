id: brew:parallel-disk-usage
display-name: parallel-disk-usage
homepage: https://github.com/KSXGitHub/parallel-disk-usage
repo: https://github.com/KSXGitHub/parallel-disk-usage
docs: https://github.com/KSXGitHub/parallel-disk-usage
package-manager:
  brew: parallel-disk-usage
  nix: parallel-disk-usage
  pacman: parallel-disk-usage
package-manager-url: https://formulae.brew.sh/formula/parallel-disk-usage
version: 0.23.0
license: Apache-2.0
category: development
tags:
  - cli
description: Highly parallelized, blazing fast directory tree analyzer
source-archive: https://github.com/KSXGitHub/parallel-disk-usage/archive/refs/tags/0.23.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: pdu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:parallel-disk-usage
  brew: brew install parallel-disk-usage
  nix: nix profile install nixpkgs#parallel-disk-usage
  pacman: sudo pacman -S parallel-disk-usage
provenance:
  formula: parallel-disk-usage
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
