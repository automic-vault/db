id: brew:termbg
display-name: termbg
homepage: https://github.com/dalance/termbg
repo: https://github.com/dalance/termbg
docs: https://github.com/dalance/termbg
package-manager:
  brew: termbg
  dnf: termbg
  nix: termbg
package-manager-url: https://formulae.brew.sh/formula/termbg
version: 0.6.2
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Rust library for terminal background color detection
source-archive: https://github.com/dalance/termbg/archive/refs/tags/v0.6.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: termbg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:termbg
  brew: brew install termbg
  dnf: sudo dnf install termbg
  nix: nix profile install nixpkgs#termbg
provenance:
  formula: termbg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
