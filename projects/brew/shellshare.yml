id: brew:shellshare
display-name: shellshare
homepage: https://github.com/vitorbaptista/shellshare
repo: https://github.com/vitorbaptista/shellshare
docs: https://github.com/vitorbaptista/shellshare
package-manager:
  brew: shellshare
package-manager-url: https://formulae.brew.sh/formula/shellshare
version: 2.0.5
license: Apache-2.0
category: development
tags:
  - cli
description: Live Terminal Broadcast
source-archive: https://github.com/vitorbaptista/shellshare/archive/refs/tags/v2.0.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: shellshare
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:shellshare
  brew: brew install shellshare
provenance:
  formula: shellshare
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
