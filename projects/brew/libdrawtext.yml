id: brew:libdrawtext
display-name: libdrawtext
homepage: http://nuclear.mutantstargoat.com/sw/libdrawtext/
repo: https://github.com/jtsiomb/libdrawtext
docs: http://nuclear.mutantstargoat.com/sw/libdrawtext/
package-manager:
  brew: libdrawtext
package-manager-url: https://formulae.brew.sh/formula/libdrawtext
version: 0.6
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Library for anti-aliased text rendering in OpenGL
source-archive: https://github.com/jtsiomb/libdrawtext/archive/refs/tags/v0.6.tar.gz
dependencies:
  - freetype
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: font2glyphmap
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libdrawtext
  brew: brew install libdrawtext
provenance:
  formula: libdrawtext
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
