id: brew:dotslash
display-name: dotslash
homepage: https://dotslash-cli.com
repo: https://github.com/facebook/dotslash
docs: https://dotslash-cli.com
package-manager:
  brew: dotslash
  nix: dotslash
  pacman: dotslash
  scoop: main/dotslash
package-manager-url: https://formulae.brew.sh/formula/dotslash
version: 0.5.9
license: Apache-2.0
category: development
tags:
  - cli
description: Simplified executable deployment
source-archive: https://github.com/facebook/dotslash/archive/refs/tags/v0.5.9.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dotslash
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dotslash
  brew: brew install dotslash
  nix: nix profile install nixpkgs#dotslash
  pacman: sudo pacman -S dotslash
  scoop: scoop install main/dotslash
provenance:
  formula: dotslash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
