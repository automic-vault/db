id: brew:ettercap
display-name: ettercap
homepage: https://ettercap.github.io/ettercap/
repo: https://github.com/Ettercap/ettercap
docs: https://ettercap.github.io/ettercap/
package-manager:
  apk: ettercap
  brew: ettercap
  dnf: ettercap
  macports: ettercap
  nix: ettercap
  pacman: ettercap
package-manager-url: https://formulae.brew.sh/formula/ettercap
version: 0.8.4.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Multipurpose sniffer/interceptor/logger for switched LAN
source-archive: https://github.com/Ettercap/ettercap/archive/refs/tags/v0.8.4.1.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - freetype
  - gdk-pixbuf
  - glib
  - gtk+3
  - libmaxminddb
  - libnet
  - ncurses
  - openssl@3
  - pango
  - pcre2
build-dependencies:
  - cmake
uses-from-macos:
  - curl
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: ettercap
  - exposure: global executable
    kind: cli
    name: ettercap-pkexec
  - exposure: global executable
    kind: cli
    name: etterfilter
  - exposure: global executable
    kind: cli
    name: etterlog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ettercap
  av: sudo av install brew:ettercap
  brew: brew install ettercap
  dnf: sudo dnf install ettercap
  macports: sudo port install ettercap
  nix: nix profile install nixpkgs#ettercap
  pacman: sudo pacman -S ettercap
provenance:
  formula: ettercap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
