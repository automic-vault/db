id: brew:spoa
display-name: spoa
homepage: https://github.com/rvaser/spoa
repo: https://github.com/rvaser/spoa
docs: https://github.com/rvaser/spoa
package-manager:
  brew: spoa
  debian: spoa
  ubuntu: spoa
package-manager-url: https://formulae.brew.sh/formula/spoa
version: 4.1.5
license: MIT
category: development
tags:
  - cli
description: SIMD partial order alignment tool/library
source-archive: https://github.com/rvaser/spoa/archive/refs/tags/4.1.5.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - zlib
executables:
  - exposure: global executable
    kind: cli
    name: spoa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spoa
  brew: brew install spoa
  debian: sudo apt install spoa
  ubuntu: sudo apt install spoa
provenance:
  formula: spoa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
