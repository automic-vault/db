id: brew:dory
display-name: dory
homepage: https://github.com/freedomben/dory
repo: https://github.com/FreedomBen/dory
docs: https://github.com/freedomben/dory
package-manager:
  brew: dory
package-manager-url: https://formulae.brew.sh/formula/dory
version: 1.2.0
license: MIT
category: development
tags:
  - cli
  - docker
description: Development proxy for docker
source-archive: https://github.com/FreedomBen/dory/archive/refs/tags/v1.2.0.tar.gz
dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: dory
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dory
  brew: brew install dory
provenance:
  formula: dory
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
