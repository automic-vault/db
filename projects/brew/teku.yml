id: brew:teku
display-name: teku
homepage: https://docs.teku.consensys.net/
repo: https://github.com/ConsenSys/teku
docs: https://docs.teku.consensys.net/
package-manager:
  brew: teku
package-manager-url: https://formulae.brew.sh/formula/teku
version: 26.4.0
license: Apache-2.0
category: development
tags:
  - cli
description: Java Implementation of the Ethereum 2.0 Beacon Chain
source-archive: https://github.com/ConsenSys/teku.git
dependencies:
  - openjdk
build-dependencies:
  - gradle@8
executables:
  - exposure: global executable
    kind: cli
    name: teku
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:teku
  brew: brew install teku
provenance:
  formula: teku
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
