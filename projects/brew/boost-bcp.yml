id: brew:boost-bcp
display-name: boost-bcp
homepage: https://github.com/boostorg/bcp
repo: https://github.com/boostorg/boost
docs: https://github.com/boostorg/bcp
package-manager:
  brew: boost-bcp
package-manager-url: https://formulae.brew.sh/formula/boost-bcp
version: 1.90.0
license: BSL-1.0
category: development
tags:
  - cli
description: Utility for extracting subsets of the Boost library
source-archive: >
  https://github.com/boostorg/boost/releases/download/boost-1.90.0/boost-1.90.0-b2-nodocs.tar.xz
build-dependencies:
  - boost-build
executables:
  - exposure: global executable
    kind: cli
    name: bcp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:boost-bcp
  brew: brew install boost-bcp
provenance:
  formula: boost-bcp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
