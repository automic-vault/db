id: brew:argo
display-name: argo
homepage: https://argoproj.io
repo: https://github.com/argoproj/argo-workflows
docs: https://argoproj.io
package-manager:
  brew: argo
  scoop: main/argo
package-manager-url: https://formulae.brew.sh/formula/argo
version: 4.0.5
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Get stuff done with container-native workflows for Kubernetes
source-archive: https://github.com/argoproj/argo-workflows.git
build-dependencies:
  - go
  - node
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: argo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:argo
  brew: brew install argo
  scoop: scoop install main/argo
provenance:
  formula: argo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
