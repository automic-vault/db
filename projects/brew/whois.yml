id: brew:whois
display-name: whois
homepage: https://github.com/rfc1036/whois
repo: https://github.com/rfc1036/whois
docs: https://github.com/rfc1036/whois
package-manager:
  apk: whois
  brew: whois
  chocolatey: whois
  debian: whois
  dnf: whois
  macports: whois
  nix: whois
  pacman: whois
  ubuntu: whois
  winget: Microsoft.Sysinternals.Whois
  zypper: whois
package-manager-url: https://formulae.brew.sh/formula/whois
version: 5.6.6
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Lookup tool for domain names and other internet resources
source-archive: https://github.com/rfc1036/whois/archive/refs/tags/v5.6.6.tar.gz
dependencies:
  - libidn2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: whois
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add whois
  av: sudo av install brew:whois
  brew: brew install whois
  chocolatey: choco install whois
  debian: sudo apt install whois
  dnf: sudo dnf install whois
  macports: sudo port install whois
  nix: nix profile install nixpkgs#whois
  pacman: sudo pacman -S whois
  ubuntu: sudo apt install whois
  winget: winget install --id Microsoft.Sysinternals.Whois -e
  zypper: sudo zypper install whois
provenance:
  formula: whois
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
