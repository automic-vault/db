id: brew:itk
display-name: itk
homepage: https://itk.org
repo: https://github.com/InsightSoftwareConsortium/ITK
docs: https://itk.org
package-manager:
  brew: itk
  dnf: itk
  macports: itk
  nix: itk
  pacman: itk
  zypper: itk
package-manager-url: https://formulae.brew.sh/formula/itk
version: 5.4.6
license: Apache-2.0
category: development
tags:
  - cli
description: Insight Toolkit is a toolkit for performing registration and segmentation
source-archive: >
  https://github.com/InsightSoftwareConsortium/ITK/releases/download/v5.4.6/InsightToolkit-5.4.6.tar.gz
dependencies:
  - double-conversion
  - fftw
  - freetype
  - gdcm
  - glew
  - hdf5
  - jpeg-turbo
  - libpng
  - libtiff
  - vtk
build-dependencies:
  - cmake
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: itkTestDriver
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:itk
  brew: brew install itk
  dnf: sudo dnf install itk
  macports: sudo port install itk
  nix: nix profile install nixpkgs#itk
  pacman: sudo pacman -S itk
  zypper: sudo zypper install itk
provenance:
  formula: itk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
