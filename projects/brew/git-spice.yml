id: brew:git-spice
display-name: git-spice
homepage: https://abhinav.github.io/git-spice/
repo: https://github.com/abhinav/git-spice
docs: https://abhinav.github.io/git-spice/
package-manager:
  brew: git-spice
  nix: git-spice
package-manager-url: https://formulae.brew.sh/formula/git-spice
version: 0.29.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
  - git
description: Manage stacked Git branches
source-archive: https://github.com/abhinav/git-spice/archive/refs/tags/v0.29.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-spice
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The 'gs' executable has been renamed to 'git-spice'. If you prefer to use 'gs', add
    an alias to your shell configuration: alias gs='git-spice'
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-spice
  brew: brew install git-spice
  nix: nix profile install nixpkgs#git-spice
provenance:
  formula: git-spice
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
