id: brew:radicle
display-name: radicle
homepage: https://radicle.xyz
repo: https://files.radicle.xyz/releases/latest/heartwood-1.9.1.tar.gz
docs: https://radicle.xyz
package-manager:
  brew: radicle
  nix: radicle-node
  pacman: radicle
package-manager-url: https://formulae.brew.sh/formula/radicle
version: 1.9.1
license: MIT AND Apache-2.0
category: development
tags:
  - cli
  - git
description: Sovereign code forge built on Git
source-archive: https://files.radicle.xyz/releases/latest/heartwood-1.9.1.tar.gz
build-dependencies:
  - asciidoctor
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: git-remote-rad
  - exposure: global executable
    kind: cli
    name: radicle-node
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:radicle
  brew: brew install radicle
  nix: nix profile install nixpkgs#radicle-node
  pacman: sudo pacman -S radicle
provenance:
  formula: radicle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
