id: brew:sng
display-name: sng
homepage: https://sng.sourceforge.net/
repo: https://downloads.sourceforge.net/project/sng/sng-1.1.1.tar.xz
docs: https://sng.sourceforge.net/
package-manager:
  brew: sng
  debian: sng
  dnf: sng
  nix: sng
  ubuntu: sng
package-manager-url: https://formulae.brew.sh/formula/sng
version: 1.1.1
license: Zlib
category: security
tags:
  - cli
description: Enable lossless editing of PNGs via a textual representation
source-archive: https://downloads.sourceforge.net/project/sng/sng-1.1.1.tar.xz
dependencies:
  - libpng
  - xorgrgb
executables:
  - exposure: global executable
    kind: cli
    name: sng
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sng
  brew: brew install sng
  debian: sudo apt install sng
  dnf: sudo dnf install sng
  nix: nix profile install nixpkgs#sng
  ubuntu: sudo apt install sng
provenance:
  formula: sng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
