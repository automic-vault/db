id: brew:feluda
display-name: feluda
homepage: https://github.com/anistark/feluda
repo: https://github.com/anistark/feluda
docs: https://github.com/anistark/feluda
package-manager:
  brew: feluda
package-manager-url: https://formulae.brew.sh/formula/feluda
version: 1.13.0
license: MIT
category: development
tags:
  - cli
description: Detect license usage restrictions in your project
source-archive: https://github.com/anistark/feluda/archive/refs/tags/v1.13.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: feluda
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:feluda
  brew: brew install feluda
provenance:
  formula: feluda
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
