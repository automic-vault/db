id: brew:brigade-cli
display-name: brigade-cli
homepage: https://brigade.sh
repo: https://github.com/brigadecore/brigade
docs: https://brigade.sh
package-manager:
  brew: brigade-cli
  debian: brig
  nix: brig
  ubuntu: brig
package-manager-url: https://formulae.brew.sh/formula/brigade-cli
version: 2.6.0
license: Apache-2.0
category: development
tags:
  - cli
description: Brigade command-line interface
source-archive: https://github.com/brigadecore/brigade.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: brig
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:brigade-cli
  brew: brew install brigade-cli
  debian: sudo apt install brig
  nix: nix profile install nixpkgs#brig
  ubuntu: sudo apt install brig
provenance:
  formula: brigade-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
