id: brew:rargs
display-name: rargs
homepage: https://github.com/lotabout/rargs
repo: https://github.com/lotabout/rargs
docs: https://github.com/lotabout/rargs
package-manager:
  brew: rargs
package-manager-url: https://formulae.brew.sh/formula/rargs
version: 0.3.0
license: MIT
category: development
tags:
  - cli
description: Util like xargs + awk with pattern matching support
source-archive: https://github.com/lotabout/rargs/archive/refs/tags/v0.3.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rargs
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rargs
  brew: brew install rargs
provenance:
  formula: rargs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
