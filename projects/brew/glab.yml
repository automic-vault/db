id: brew:glab
display-name: glab
homepage: https://gitlab.com/gitlab-org/cli
repo: https://gitlab.com/gitlab-org/cli
docs: https://gitlab.com/gitlab-org/cli
package-manager:
  apk: glab
  brew: glab
  chocolatey: glab
  debian: glab
  dnf: glab
  macports: glab
  nix: glab
  pacman: glab
  scoop: main/glab
  ubuntu: glab
  winget: GLab.GLab
  zypper: glab
package-manager-url: https://formulae.brew.sh/formula/glab
version: 1.99.0
license: MIT
category: development
tags:
  - cli
description: Open-source GitLab command-line tool
source-archive: https://gitlab.com/gitlab-org/cli.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: glab
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add glab
  av: sudo av install brew:glab
  brew: brew install glab
  chocolatey: choco install glab
  debian: sudo apt install glab
  dnf: sudo dnf install glab
  macports: sudo port install glab
  nix: nix profile install nixpkgs#glab
  pacman: sudo pacman -S glab
  scoop: scoop install main/glab
  ubuntu: sudo apt install glab
  winget: winget install --id GLab.GLab -e
  zypper: sudo zypper install glab
provenance:
  formula: glab
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
