id: brew:sourcekitten
display-name: sourcekitten
homepage: https://github.com/jpsim/SourceKitten
repo: https://github.com/jpsim/SourceKitten
docs: https://github.com/jpsim/SourceKitten
package-manager:
  brew: sourcekitten
  macports: SourceKitten
package-manager-url: https://formulae.brew.sh/formula/sourcekitten
version: 0.37.3
license: MIT
category: development
tags:
  - cli
description: Framework and command-line tool for interacting with SourceKit
source-archive: https://github.com/jpsim/SourceKitten.git
uses-from-macos:
  - swift
executables:
  - exposure: global executable
    kind: cli
    name: sourcekitten
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sourcekitten
  brew: brew install sourcekitten
  macports: sudo port install SourceKitten
provenance:
  formula: sourcekitten
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
