id: brew:cdo
display-name: cdo
homepage: https://code.mpimet.mpg.de/projects/cdo
repo: https://code.mpimet.mpg.de/attachments/download/30210/cdo-2.6.1.tar.gz
docs: https://code.mpimet.mpg.de/projects/cdo
package-manager:
  brew: cdo
  debian: cdo
  macports: cdo
  nix: cdo
  ubuntu: cdo
package-manager-url: https://formulae.brew.sh/formula/cdo
version: 2.6.1
license: BSD-3-Clause
category: network
tags:
  - cli
description: Climate Data Operators
source-archive: https://code.mpimet.mpg.de/attachments/download/30210/cdo-2.6.1.tar.gz
dependencies:
  - eccodes
  - hdf5
  - libaec
  - netcdf
  - proj
executables:
  - exposure: global executable
    kind: cli
    name: cdo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cdo
  brew: brew install cdo
  debian: sudo apt install cdo
  macports: sudo port install cdo
  nix: nix profile install nixpkgs#cdo
  ubuntu: sudo apt install cdo
provenance:
  formula: cdo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
