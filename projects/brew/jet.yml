id: brew:jet
display-name: jet
homepage: https://github.com/go-jet/jet
repo: https://github.com/go-jet/jet
docs: https://github.com/go-jet/jet
package-manager:
  brew: jet
  macports: jet
  nix: jet
package-manager-url: https://formulae.brew.sh/formula/jet
version: 2.15.0
license: Apache-2.0
category: database
tags:
  - cli
description: Type safe SQL builder with code generation and auto query result data mapping
source-archive: https://github.com/go-jet/jet/archive/refs/tags/v2.15.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jet
  brew: brew install jet
  macports: sudo port install jet
  nix: nix profile install nixpkgs#jet
provenance:
  formula: jet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
