id: brew:chunkah
display-name: chunkah
homepage: https://github.com/coreos/chunkah
repo: https://github.com/coreos/chunkah
docs: https://github.com/coreos/chunkah
package-manager:
  brew: chunkah
  dnf: chunkah
package-manager-url: https://formulae.brew.sh/formula/chunkah
version: 0.5.0
license: Apache-2.0
category: development
tags:
  - cli
description: OCI building tool for content-based layers
source-archive: https://github.com/coreos/chunkah/releases/download/v0.5.0/chunkah-0.5.0.tar.gz
dependencies:
  - openssl@3
  - zlib-ng-compat
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: chunkah
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chunkah
  brew: brew install chunkah
  dnf: sudo dnf install chunkah
provenance:
  formula: chunkah
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
