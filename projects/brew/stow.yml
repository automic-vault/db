id: brew:stow
display-name: stow
homepage: https://www.gnu.org/software/stow/
repo: https://ftpmirror.gnu.org/gnu/stow/stow-2.4.1.tar.gz
docs: https://www.gnu.org/software/stow/
package-manager:
  apk: stow
  brew: stow
  debian: stow
  dnf: stow
  macports: stow
  nix: stow
  pacman: stow
  ubuntu: stow
  zypper: stow
package-manager-url: https://formulae.brew.sh/formula/stow
version: 2.4.1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Organize software neatly under a single directory tree (e.g. /usr/local)
source-archive: https://ftpmirror.gnu.org/gnu/stow/stow-2.4.1.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: chkstow
  - exposure: global executable
    kind: cli
    name: stow
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add stow
  av: sudo av install brew:stow
  brew: brew install stow
  debian: sudo apt install stow
  dnf: sudo dnf install stow
  macports: sudo port install stow
  nix: nix profile install nixpkgs#stow
  pacman: sudo pacman -S stow
  ubuntu: sudo apt install stow
  zypper: sudo zypper install stow
provenance:
  formula: stow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
