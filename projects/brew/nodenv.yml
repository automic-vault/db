id: brew:nodenv
display-name: nodenv
homepage: https://github.com/nodenv/nodenv
repo: https://github.com/nodenv/nodenv
docs: https://github.com/nodenv/nodenv
package-manager:
  brew: nodenv
  nix: nodenv
package-manager-url: https://formulae.brew.sh/formula/nodenv
version: 1.6.2
license: MIT
category: development
tags:
  - cli
description: Node.js version manager
source-archive: https://github.com/nodenv/nodenv/archive/refs/tags/v1.6.2.tar.gz
dependencies:
  - node-build
executables:
  - exposure: global executable
    kind: cli
    name: nodenv
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nodenv
  brew: brew install nodenv
  nix: nix profile install nixpkgs#nodenv
provenance:
  formula: nodenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
