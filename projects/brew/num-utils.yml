id: brew:num-utils
display-name: num-utils
homepage: https://suso.suso.org/xulu/Num-utils
repo: https://suso.suso.org/programs/num-utils/downloads/num-utils-0.5.tar.gz
docs: https://suso.suso.org/xulu/Num-utils
package-manager:
  brew: num-utils
  debian: num-utils
  dnf: normalize
  macports: num-utils
  nix: num-utils
  ubuntu: num-utils
package-manager-url: https://formulae.brew.sh/formula/num-utils
version: 0.5
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Programs for dealing with numbers from the command-line
source-archive: https://suso.suso.org/programs/num-utils/downloads/num-utils-0.5.tar.gz
build-dependencies:
  - pod2man
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: bound
  - exposure: global executable
    kind: cli
    name: interval
  - exposure: global executable
    kind: cli
    name: normalize
  - exposure: global executable
    kind: cli
    name: numgrep
  - exposure: global executable
    kind: cli
    name: numprocess
  - exposure: global executable
    kind: cli
    name: numsum
  - exposure: global executable
    kind: cli
    name: random
  - exposure: global executable
    kind: cli
    name: round
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:num-utils
  brew: brew install num-utils
  debian: sudo apt install num-utils
  dnf: sudo dnf install normalize
  macports: sudo port install num-utils
  nix: nix profile install nixpkgs#num-utils
  ubuntu: sudo apt install num-utils
provenance:
  formula: num-utils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
