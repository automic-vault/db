id: brew:libfabric
display-name: libfabric
homepage: https://ofiwg.github.io/libfabric/
repo: https://github.com/ofiwg/libfabric
docs: https://ofiwg.github.io/libfabric/
package-manager:
  brew: libfabric
  dnf: libfabric
  nix: libfabric
  pacman: libfabric
  zypper: libfabric
package-manager-url: https://formulae.brew.sh/formula/libfabric
version: 2.5.1
license: BSD-2-Clause OR GPL-2.0-only
category: development
tags:
  - cli
description: OpenFabrics libfabric
source-archive: https://github.com/ofiwg/libfabric/releases/download/v2.5.1/libfabric-2.5.1.tar.bz2
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: fi_info
  - exposure: global executable
    kind: cli
    name: fi_mon_sampler
  - exposure: global executable
    kind: cli
    name: fi_pingpong
  - exposure: global executable
    kind: cli
    name: fi_strerror
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libfabric
  brew: brew install libfabric
  dnf: sudo dnf install libfabric
  nix: nix profile install nixpkgs#libfabric
  pacman: sudo pacman -S libfabric
  zypper: sudo zypper install libfabric
provenance:
  formula: libfabric
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
