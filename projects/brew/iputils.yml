id: brew:iputils
display-name: iputils
homepage: https://github.com/iputils/iputils
repo: https://github.com/iputils/iputils
docs: https://github.com/iputils/iputils
package-manager:
  apk: iputils
  brew: iputils
  dnf: iputils
  nix: iputils
  pacman: iputils
  winget: WhoElse.Ping
  zypper: iputils
package-manager-url: https://formulae.brew.sh/formula/iputils
version: 20250605
license: GPL-2.0-or-later AND BSD-3-Clause
category: development
tags:
  - cli
description: Set of small useful utilities for Linux networking
source-archive: https://github.com/iputils/iputils/archive/refs/tags/20250605.tar.gz
dependencies:
  - libxslt
build-dependencies:
  - meson
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: clockdiff
  - exposure: global executable
    kind: cli
    name: ping
  - exposure: global executable
    kind: cli
    name: tracepath
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add iputils
  av: sudo av install brew:iputils
  brew: brew install iputils
  dnf: sudo dnf install iputils
  nix: nix profile install nixpkgs#iputils
  pacman: sudo pacman -S iputils
  winget: winget install --id WhoElse.Ping -e
  zypper: sudo zypper install iputils
provenance:
  formula: iputils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
