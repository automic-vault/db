id: brew:martin
display-name: martin
homepage: https://martin.maplibre.org
repo: https://github.com/maplibre/martin
docs: https://martin.maplibre.org
package-manager:
  brew: martin
  nix: martin
package-manager-url: https://formulae.brew.sh/formula/martin
version: 1.10.1
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Blazing fast tile server, tile generation, and mbtiles tooling
source-archive: https://github.com/maplibre/martin/archive/refs/tags/martin-v1.10.1.tar.gz
build-dependencies:
  - node
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: martin
  - exposure: global executable
    kind: cli
    name: martin-cp
  - exposure: global executable
    kind: cli
    name: mbtiles
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:martin
  brew: brew install martin
  nix: nix profile install nixpkgs#martin
provenance:
  formula: martin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
