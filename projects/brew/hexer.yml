id: brew:hexer
display-name: hexer
homepage: https://devel.ringlet.net/editors/hexer/
repo: https://devel.ringlet.net/files/editors/hexer/hexer-1.0.7.tar.gz
docs: https://devel.ringlet.net/editors/hexer/
package-manager:
  brew: hexer
  debian: hexer
  dnf: hexer
  pacman: hexer
  ubuntu: hexer
package-manager-url: https://formulae.brew.sh/formula/hexer
version: 1.0.7
license: BSD-3-Clause
category: network
tags:
  - cli
description: Hex editor for the terminal with vi-like interface
source-archive: https://devel.ringlet.net/files/editors/hexer/hexer-1.0.7.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: hexer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hexer
  brew: brew install hexer
  debian: sudo apt install hexer
  dnf: sudo dnf install hexer
  pacman: sudo pacman -S hexer
  ubuntu: sudo apt install hexer
provenance:
  formula: hexer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
