id: brew:cvsync
display-name: cvsync
homepage: https://www.cvsync.org/
repo: https://www.cvsync.org/dist/cvsync-0.24.20.tar.bz2
docs: https://www.cvsync.org/
package-manager:
  brew: cvsync
  macports: cvsync
package-manager-url: https://formulae.brew.sh/formula/cvsync
version: 0.24.20
license: BSD-3-Clause
category: network
tags:
  - cli
description: Portable CVS repository synchronization utility
source-archive: https://www.cvsync.org/dist/cvsync-0.24.20.tar.bz2
dependencies:
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: cvscan
  - exposure: global executable
    kind: cli
    name: cvsup2cvsync
  - exposure: global executable
    kind: cli
    name: cvsync
  - exposure: global executable
    kind: cli
    name: cvsync2cvsup
  - exposure: global executable
    kind: cli
    name: cvsyncd
  - exposure: global executable
    kind: cli
    name: rcscan
  - exposure: global executable
    kind: cli
    name: rcscmp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cvsync
  brew: brew install cvsync
  macports: sudo port install cvsync
provenance:
  formula: cvsync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
