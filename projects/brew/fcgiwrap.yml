id: brew:fcgiwrap
display-name: fcgiwrap
homepage: https://www.nginx.com/resources/wiki/start/topics/examples/fcgiwrap/
repo: https://github.com/gnosek/fcgiwrap
docs: https://www.nginx.com/resources/wiki/start/topics/examples/fcgiwrap/
package-manager:
  apk: fcgiwrap
  brew: fcgiwrap
  debian: fcgiwrap
  dnf: fcgiwrap
  macports: fcgiwrap
  nix: fcgiwrap
  pacman: fcgiwrap
  ubuntu: fcgiwrap
  zypper: fcgiwrap
package-manager-url: https://formulae.brew.sh/formula/fcgiwrap
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: CGI support for Nginx
source-archive: https://github.com/gnosek/fcgiwrap/archive/refs/tags/1.1.0.tar.gz
dependencies:
  - fcgi
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fcgiwrap
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fcgiwrap
  av: sudo av install brew:fcgiwrap
  brew: brew install fcgiwrap
  debian: sudo apt install fcgiwrap
  dnf: sudo dnf install fcgiwrap
  macports: sudo port install fcgiwrap
  nix: nix profile install nixpkgs#fcgiwrap
  pacman: sudo pacman -S fcgiwrap
  ubuntu: sudo apt install fcgiwrap
  zypper: sudo zypper install fcgiwrap
provenance:
  formula: fcgiwrap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
