id: brew:mergiraf
display-name: mergiraf
homepage: https://mergiraf.org
repo: https://codeberg.org/mergiraf/mergiraf/archive/v0.17.0.tar.gz
docs: https://mergiraf.org
package-manager:
  apk: mergiraf
  brew: mergiraf
  macports: mergiraf
  nix: mergiraf
  pacman: mergiraf
  scoop: main/mergiraf
  winget: Mergiraf.Mergiraf
  zypper: mergiraf
package-manager-url: https://formulae.brew.sh/formula/mergiraf
version: 0.17.0
license: GPL-3.0-only
category: development
tags:
  - cli
  - git
description: Syntax-aware git merge driver
source-archive: https://codeberg.org/mergiraf/mergiraf/archive/v0.17.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mergiraf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mergiraf
  av: sudo av install brew:mergiraf
  brew: brew install mergiraf
  macports: sudo port install mergiraf
  nix: nix profile install nixpkgs#mergiraf
  pacman: sudo pacman -S mergiraf
  scoop: scoop install main/mergiraf
  winget: winget install --id Mergiraf.Mergiraf -e
  zypper: sudo zypper install mergiraf
provenance:
  formula: mergiraf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
