id: brew:ipv6toolkit
display-name: ipv6toolkit
homepage: https://www.si6networks.com/research/tools/ipv6toolkit/
repo: https://github.com/fgont/ipv6toolkit
docs: https://www.si6networks.com/research/tools/ipv6toolkit/
package-manager:
  brew: ipv6toolkit
  debian: ipv6toolkit
  dnf: ipv6toolkit
  ubuntu: ipv6toolkit
  zypper: ipv6toolkit
package-manager-url: https://formulae.brew.sh/formula/ipv6toolkit
version: 2.2
license: GPL-3.0-or-later
category: security
tags:
  - cli
  - security
description: Security assessment and troubleshooting tool for IPv6
source-archive: https://github.com/fgont/ipv6toolkit/archive/refs/tags/v2.2.tar.gz
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: addr6
  - exposure: global executable
    kind: cli
    name: blackhole6
  - exposure: global executable
    kind: cli
    name: flow6
  - exposure: global executable
    kind: cli
    name: frag6
  - exposure: global executable
    kind: cli
    name: icmp6
  - exposure: global executable
    kind: cli
    name: jumbo6
  - exposure: global executable
    kind: cli
    name: messi
  - exposure: global executable
    kind: cli
    name: mldq6
  - exposure: global executable
    kind: cli
    name: na6
  - exposure: global executable
    kind: cli
    name: ni6
  - exposure: global executable
    kind: cli
    name: ns6
  - exposure: global executable
    kind: cli
    name: path6
  - exposure: global executable
    kind: cli
    name: ra6
  - exposure: global executable
    kind: cli
    name: rd6
  - exposure: global executable
    kind: cli
    name: rs6
  - exposure: global executable
    kind: cli
    name: scan6
  - exposure: global executable
    kind: cli
    name: script6
  - exposure: global executable
    kind: cli
    name: tcp6
  - exposure: global executable
    kind: cli
    name: udp6
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ipv6toolkit
  brew: brew install ipv6toolkit
  debian: sudo apt install ipv6toolkit
  dnf: sudo dnf install ipv6toolkit
  ubuntu: sudo apt install ipv6toolkit
  zypper: sudo zypper install ipv6toolkit
provenance:
  formula: ipv6toolkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
