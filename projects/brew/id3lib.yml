id: brew:id3lib
display-name: id3lib
homepage: https://id3lib.sourceforge.net/
repo: https://downloads.sourceforge.net/project/id3lib/id3lib/3.8.3/id3lib-3.8.3.tar.gz
docs: https://id3lib.sourceforge.net/
package-manager:
  apk: id3lib
  brew: id3lib
  dnf: id3lib
  macports: id3lib
  nix: id3lib
  pacman: id3lib
package-manager-url: https://formulae.brew.sh/formula/id3lib
version: 3.8.3
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: ID3 tag manipulation
source-archive: https://downloads.sourceforge.net/project/id3lib/id3lib/3.8.3/id3lib-3.8.3.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: id3convert
  - exposure: global executable
    kind: cli
    name: id3cp
  - exposure: global executable
    kind: cli
    name: id3info
  - exposure: global executable
    kind: cli
    name: id3tag
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add id3lib
  av: sudo av install brew:id3lib
  brew: brew install id3lib
  dnf: sudo dnf install id3lib
  macports: sudo port install id3lib
  nix: nix profile install nixpkgs#id3lib
  pacman: sudo pacman -S id3lib
provenance:
  formula: id3lib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
