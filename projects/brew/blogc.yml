id: brew:blogc
display-name: blogc
homepage: https://blogc.rgm.io/
repo: https://github.com/blogc/blogc
docs: https://blogc.rgm.io/
package-manager:
  brew: blogc
  dnf: blogc
  nix: blogc
  zypper: blogc
package-manager-url: https://formulae.brew.sh/formula/blogc
version: 0.20.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Blog compiler with template engine and markup language
source-archive: https://github.com/blogc/blogc/releases/download/v0.20.1/blogc-0.20.1.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: blogc
  - exposure: global executable
    kind: cli
    name: blogc-git-receiver
  - exposure: global executable
    kind: cli
    name: blogc-make
  - exposure: global executable
    kind: cli
    name: blogc-runserver
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:blogc
  brew: brew install blogc
  dnf: sudo dnf install blogc
  nix: nix profile install nixpkgs#blogc
  zypper: sudo zypper install blogc
provenance:
  formula: blogc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
