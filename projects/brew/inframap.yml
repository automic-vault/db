id: brew:inframap
display-name: inframap
homepage: https://github.com/cycloidio/inframap
repo: https://github.com/cycloidio/inframap
docs: https://github.com/cycloidio/inframap
package-manager:
  brew: inframap
  nix: inframap
package-manager-url: https://formulae.brew.sh/formula/inframap
version: 0.8.1
license: MIT
category: development
tags:
  - cli
description: Read your tfstate or HCL to generate a graph
source-archive: https://github.com/cycloidio/inframap/archive/refs/tags/v0.8.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: inframap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:inframap
  brew: brew install inframap
  nix: nix profile install nixpkgs#inframap
provenance:
  formula: inframap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
