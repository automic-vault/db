id: brew:neovim-qt
display-name: neovim-qt
homepage: https://github.com/equalsraf/neovim-qt
repo: https://github.com/equalsraf/neovim-qt
docs: https://github.com/equalsraf/neovim-qt
package-manager:
  brew: neovim-qt
  debian: neovim-qt
  dnf: neovim-qt
  macports: neovim-qt
  nix: neovim-qt
  pacman: neovim-qt
  scoop: extras/neovim-qt
  ubuntu: neovim-qt
  winget: equalsraf.neovim-qt
package-manager-url: https://formulae.brew.sh/formula/neovim-qt
version: 0.2.19
license: ISC
category: development
tags:
  - cli
description: Neovim GUI, in Qt
source-archive: https://github.com/equalsraf/neovim-qt/archive/refs/tags/v0.2.19.tar.gz
dependencies:
  - msgpack
  - neovim
  - qtbase
  - qtsvg
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: nvim-qt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:neovim-qt
  brew: brew install neovim-qt
  debian: sudo apt install neovim-qt
  dnf: sudo dnf install neovim-qt
  macports: sudo port install neovim-qt
  nix: nix profile install nixpkgs#neovim-qt
  pacman: sudo pacman -S neovim-qt
  scoop: scoop install extras/neovim-qt
  ubuntu: sudo apt install neovim-qt
  winget: winget install --id equalsraf.neovim-qt -e
provenance:
  formula: neovim-qt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
