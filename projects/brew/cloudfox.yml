id: brew:cloudfox
display-name: cloudfox
homepage: https://github.com/BishopFox/cloudfox
repo: https://github.com/BishopFox/cloudfox
docs: https://github.com/BishopFox/cloudfox
package-manager:
  brew: cloudfox
  nix: cloudfox
package-manager-url: https://formulae.brew.sh/formula/cloudfox
version: 2.0.5
license: MIT
category: cloud
tags:
  - cli
  - cloud
description: Automating situational awareness for cloud penetration tests
source-archive: https://github.com/BishopFox/cloudfox/archive/refs/tags/v2.0.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cloudfox
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloudfox
  brew: brew install cloudfox
  nix: nix profile install nixpkgs#cloudfox
provenance:
  formula: cloudfox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
