id: brew:cppcheck
display-name: cppcheck
homepage: https://sourceforge.net/projects/cppcheck/
repo: https://github.com/danmar/cppcheck
docs: https://sourceforge.net/projects/cppcheck/
package-manager:
  apk: cppcheck
  brew: cppcheck
  chocolatey: cppcheck
  debian: cppcheck
  dnf: cppcheck
  macports: cppcheck
  nix: cppcheck
  pacman: cppcheck
  scoop: main/cppcheck
  ubuntu: cppcheck
  winget: Cppcheck.Cppcheck
  zypper: cppcheck
package-manager-url: https://formulae.brew.sh/formula/cppcheck
version: 2.20.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Static analysis of C and C++ code
source-archive: https://github.com/danmar/cppcheck/archive/refs/tags/2.20.0.tar.gz
dependencies:
  - tinyxml2
build-dependencies:
  - cmake
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: cppcheck
  - exposure: global executable
    kind: cli
    name: cppcheck-htmlreport
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cppcheck
  av: sudo av install brew:cppcheck
  brew: brew install cppcheck
  chocolatey: choco install cppcheck
  debian: sudo apt install cppcheck
  dnf: sudo dnf install cppcheck
  macports: sudo port install cppcheck
  nix: nix profile install nixpkgs#cppcheck
  pacman: sudo pacman -S cppcheck
  scoop: scoop install main/cppcheck
  ubuntu: sudo apt install cppcheck
  winget: winget install --id Cppcheck.Cppcheck -e
  zypper: sudo zypper install cppcheck
provenance:
  formula: cppcheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
