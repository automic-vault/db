id: brew:decker
display-name: decker
homepage: https://beyondloom.com/decker/
repo: https://github.com/JohnEarnest/Decker
docs: https://beyondloom.com/decker/
package-manager:
  brew: decker
  nix: decker
  zypper: decker
package-manager-url: https://formulae.brew.sh/formula/decker
version: 1.66
license: MIT
category: development
tags:
  - cli
description: HyperCard-like multimedia sketchpad
source-archive: https://github.com/JohnEarnest/Decker/archive/refs/tags/v1.66.tar.gz
dependencies:
  - sdl2
  - sdl2_image
executables:
  - exposure: global executable
    kind: cli
    name: decker
  - exposure: global executable
    kind: cli
    name: lilt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:decker
  brew: brew install decker
  nix: nix profile install nixpkgs#decker
  zypper: sudo zypper install decker
provenance:
  formula: decker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
