id: brew:simple-mtpfs
display-name: simple-mtpfs
homepage: https://github.com/phatina/simple-mtpfs
repo: https://github.com/phatina/simple-mtpfs
docs: https://github.com/phatina/simple-mtpfs
package-manager:
  brew: simple-mtpfs
  nix: simple-mtpfs
  zypper: simple-mtpfs
package-manager-url: https://formulae.brew.sh/formula/simple-mtpfs
version: 0.4.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Simple MTP fuse filesystem driver
source-archive: https://github.com/phatina/simple-mtpfs/archive/refs/tags/v0.4.0.tar.gz
dependencies:
  - libfuse@2
  - libmtp
  - libusb
build-dependencies:
  - autoconf
  - autoconf-archive
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: simple-mtpfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:simple-mtpfs
  brew: brew install simple-mtpfs
  nix: nix profile install nixpkgs#simple-mtpfs
  zypper: sudo zypper install simple-mtpfs
provenance:
  formula: simple-mtpfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
