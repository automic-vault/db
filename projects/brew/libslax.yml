id: brew:libslax
display-name: libslax
homepage: https://github.com/Juniper/libslax/wiki
repo: https://github.com/Juniper/libslax
docs: https://github.com/Juniper/libslax/wiki
package-manager:
  brew: libslax
package-manager-url: https://formulae.brew.sh/formula/libslax
version: 3.1.6
license: BSD-3-Clause
category: development
tags:
  - cli
description: Implementation of the SLAX language (an XSLT alternative)
source-archive: https://github.com/Juniper/libslax/releases/download/3.1.6/libslax-3.1.6.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - bison
  - libtool
uses-from-macos:
  - curl
  - libedit
  - libxml2
  - libxslt
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: slax-config
  - exposure: global executable
    kind: cli
    name: slaxproc
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libslax
  brew: brew install libslax
provenance:
  formula: libslax
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
