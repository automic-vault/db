id: brew:antlr
display-name: antlr
homepage: https://www.antlr.org/
repo: https://www.antlr.org/download/antlr-4.13.2-complete.jar
docs: https://www.antlr.org/
package-manager:
  brew: antlr
  debian: antlr
  macports: antlr
  nix: antlr
  ubuntu: antlr
  zypper: antlr
package-manager-url: https://formulae.brew.sh/formula/antlr
version: 4.13.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: ANother Tool for Language Recognition
source-archive: https://www.antlr.org/download/antlr-4.13.2-complete.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: antlr
  - exposure: global executable
    kind: cli
    name: grun
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:antlr
  brew: brew install antlr
  debian: sudo apt install antlr
  macports: sudo port install antlr
  nix: nix profile install nixpkgs#antlr
  ubuntu: sudo apt install antlr
  zypper: sudo zypper install antlr
provenance:
  formula: antlr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
