id: brew:iftop
display-name: iftop
homepage: https://pdw.ex-parrot.com/iftop/
repo: https://pdw.ex-parrot.com/iftop/download/iftop-1.0pre4.tar.gz
docs: https://pdw.ex-parrot.com/iftop/
package-manager:
  apk: iftop
  brew: iftop
  debian: iftop
  dnf: iftop
  macports: iftop
  nix: iftop
  pacman: iftop
  ubuntu: iftop
  zypper: iftop
package-manager-url: https://formulae.brew.sh/formula/iftop
version: 1.0pre4
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Display an interface's bandwidth usage
source-archive: https://pdw.ex-parrot.com/iftop/download/iftop-1.0pre4.tar.gz
uses-from-macos:
  - libpcap
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: iftop
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    iftop requires root privileges so you will need to run `sudo iftop`. You should be
    certain that you trust any software you grant root privileges.
  post-install-defined: false
install-lines:
  apk: sudo apk add iftop
  av: sudo av install brew:iftop
  brew: brew install iftop
  debian: sudo apt install iftop
  dnf: sudo dnf install iftop
  macports: sudo port install iftop
  nix: nix profile install nixpkgs#iftop
  pacman: sudo pacman -S iftop
  ubuntu: sudo apt install iftop
  zypper: sudo zypper install iftop
provenance:
  formula: iftop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
