id: brew:clipboard
display-name: clipboard
homepage: https://getclipboard.app
repo: https://github.com/Slackadays/Clipboard
docs: https://getclipboard.app
package-manager:
  apk: clipboard
  brew: clipboard
  scoop: main/clipboard
  winget: Slackadays.Clipboard
package-manager-url: https://formulae.brew.sh/formula/clipboard
version: 0.10.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Cut, copy, and paste anything, anywhere, all from the terminal
source-archive: https://github.com/Slackadays/Clipboard/archive/refs/tags/0.10.0.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add clipboard
  av: sudo av install brew:clipboard
  brew: brew install clipboard
  scoop: scoop install main/clipboard
  winget: winget install --id Slackadays.Clipboard -e
provenance:
  formula: clipboard
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
