id: brew:superhtml
display-name: superhtml
homepage: https://github.com/kristoff-it/superhtml
repo: https://github.com/kristoff-it/superhtml
docs: https://github.com/kristoff-it/superhtml
package-manager:
  apk: superhtml
  brew: superhtml
  nix: superhtml
  scoop: main/superhtml
package-manager-url: https://formulae.brew.sh/formula/superhtml
version: 0.6.2
license: MIT
category: development
tags:
  - cli
description: HTML Language Server & Templating Language Library
source-archive: https://github.com/kristoff-it/superhtml/archive/refs/tags/v0.6.2.tar.gz
build-dependencies:
  - zig
executables:
  - exposure: global executable
    kind: cli
    name: superhtml
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add superhtml
  av: sudo av install brew:superhtml
  brew: brew install superhtml
  nix: nix profile install nixpkgs#superhtml
  scoop: scoop install main/superhtml
provenance:
  formula: superhtml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
