id: brew:historian
display-name: historian
homepage: https://github.com/jcsalterego/historian
repo: https://github.com/jcsalterego/historian
docs: https://github.com/jcsalterego/historian
package-manager:
  brew: historian
  macports: hist
package-manager-url: https://formulae.brew.sh/formula/historian
version: 0.0.2
license: BSD-2-Clause
category: database
tags:
  - cli
  - database
description: Command-line utility for managing shell history in a SQLite database
source-archive: https://github.com/jcsalterego/historian/archive/refs/tags/0.0.2.tar.gz
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: hist
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:historian
  brew: brew install historian
  macports: sudo port install hist
provenance:
  formula: historian
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
