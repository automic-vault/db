package-manager-url: https://formulae.brew.sh/formula/moto
version: 5.2.1
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: Mock AWS services
source-archive: >
  https://files.pythonhosted.org/packages/f6/e9/c38202162db2e76623176be9f1dbc9aa41228ffa91ee8da2d3986082c3e3/moto-5.2.1.tar.gz
dependencies:
