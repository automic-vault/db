id: brew:polaris
display-name: polaris
homepage: https://www.fairwinds.com/polaris
repo: https://github.com/FairwindsOps/polaris
docs: https://www.fairwinds.com/polaris
package-manager:
  brew: polaris
  nix: polaris
  scoop: main/polaris
  zypper: polaris
package-manager-url: https://formulae.brew.sh/formula/polaris
version: 10.2.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Validation of best practices in your Kubernetes clusters
source-archive: https://github.com/FairwindsOps/polaris/archive/refs/tags/v10.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: polaris
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:polaris
  brew: brew install polaris
  nix: nix profile install nixpkgs#polaris
  scoop: scoop install main/polaris
  zypper: sudo zypper install polaris
provenance:
  formula: polaris
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
