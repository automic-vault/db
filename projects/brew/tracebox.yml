id: brew:tracebox
display-name: tracebox
homepage: https://github.com/tracebox/tracebox
repo: https://github.com/tracebox/tracebox
docs: https://github.com/tracebox/tracebox
package-manager:
  brew: tracebox
  nix: tracebox
package-manager-url: https://formulae.brew.sh/formula/tracebox
version: 0.4.4
license: GPL-2.0-only AND BSD-3-Clause
category: development
tags:
  - cli
description: Middlebox detection tool
source-archive: https://github.com/tracebox/tracebox.git
dependencies:
  - json-c
  - lua
build-dependencies:
  - autoconf
  - automake
  - libtool
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: luatracebox
  - exposure: global executable
    kind: cli
    name: tracebox
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Tracebox requires superuser privileges e.g. run with sudo. You should be certain
    that you trust any software you are executing with elevated privileges.
  post-install-defined: false
install-lines:
  av: sudo av install brew:tracebox
  brew: brew install tracebox
  nix: nix profile install nixpkgs#tracebox
provenance:
  formula: tracebox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
