id: brew:dwarf
display-name: dwarf
homepage: https://github.com/elboza/dwarf-ng/
repo: https://github.com/elboza/dwarf-ng
docs: https://github.com/elboza/dwarf-ng/
package-manager:
  brew: dwarf
  macports: dwarf
package-manager-url: https://formulae.brew.sh/formula/dwarf
version: 0.4.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Object file manipulation tool
source-archive: https://github.com/elboza/dwarf-ng/archive/refs/tags/dwarf-0.4.0.tar.gz
dependencies:
  - flex
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: dwarf
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dwarf
  brew: brew install dwarf
  macports: sudo port install dwarf
provenance:
  formula: dwarf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
