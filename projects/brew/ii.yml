id: brew:ii
display-name: ii
homepage: https://tools.suckless.org/ii/
repo: https://dl.suckless.org/tools/ii-2.0.tar.gz
docs: https://tools.suckless.org/ii/
package-manager:
  apk: ii
  brew: ii
  debian: ii
  dnf: ii
  macports: ii
  nix: ii
  ubuntu: ii
package-manager-url: https://formulae.brew.sh/formula/ii
version: 2.0
license: MIT
category: network
tags:
  - cli
description: Minimalist IRC client
source-archive: https://dl.suckless.org/tools/ii-2.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ii
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ii
  av: sudo av install brew:ii
  brew: brew install ii
  debian: sudo apt install ii
  dnf: sudo dnf install ii
  macports: sudo port install ii
  nix: nix profile install nixpkgs#ii
  ubuntu: sudo apt install ii
provenance:
  formula: ii
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
