id: brew:unshield
display-name: unshield
homepage: https://github.com/twogood/unshield
repo: https://github.com/twogood/unshield
docs: https://github.com/twogood/unshield
package-manager:
  apk: unshield
  brew: unshield
  debian: unshield
  dnf: unshield
  macports: unshield
  nix: unshield
  pacman: unshield
  scoop: main/unshield
  ubuntu: unshield
  zypper: unshield
package-manager-url: https://formulae.brew.sh/formula/unshield
version: 1.6.2
license: MIT
category: development
tags:
  - cli
description: Extract files from InstallShield cabinet files
source-archive: https://github.com/twogood/unshield/archive/refs/tags/1.6.2.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: unshield
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add unshield
  av: sudo av install brew:unshield
  brew: brew install unshield
  debian: sudo apt install unshield
  dnf: sudo dnf install unshield
  macports: sudo port install unshield
  nix: nix profile install nixpkgs#unshield
  pacman: sudo pacman -S unshield
  scoop: scoop install main/unshield
  ubuntu: sudo apt install unshield
  zypper: sudo zypper install unshield
provenance:
  formula: unshield
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
