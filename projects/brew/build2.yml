id: brew:build2
display-name: build2
homepage: https://build2.org
repo: https://download.build2.org/0.18.1/build2-toolchain-0.18.1.tar.xz
docs: https://build2.org
package-manager:
  brew: build2
  dnf: build2
  nix: build2
  winget: build2.build2.MSVC
package-manager-url: https://formulae.brew.sh/formula/build2
version: 0.18.1
license: MIT
category: development
tags:
  - cli
description: C/C++ Build Toolchain
source-archive: https://download.build2.org/0.18.1/build2-toolchain-0.18.1.tar.xz
uses-from-macos:
  - curl
  - openssl
executables:
  - exposure: global executable
    kind: cli
    name: b
  - exposure: global executable
    kind: cli
    name: bdep
  - exposure: global executable
    kind: cli
    name: bpkg
  - exposure: global executable
    kind: cli
    name: bx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:build2
  brew: brew install build2
  dnf: sudo dnf install build2
  nix: nix profile install nixpkgs#build2
  winget: winget install --id build2.build2.MSVC -e
provenance:
  formula: build2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
