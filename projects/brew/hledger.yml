id: brew:hledger
display-name: hledger
homepage: https://hledger.org/
repo: https://github.com/simonmichael/hledger
docs: https://hledger.org/
package-manager:
  apk: hledger
  brew: hledger
  debian: hledger
  dnf: hledger
  macports: hledger
  nix: hledger
  pacman: hledger
  scoop: main/hledger
  ubuntu: hledger
  winget: simonmichael.hledger
  zypper: hledger
package-manager-url: https://formulae.brew.sh/formula/hledger
version: 1.52.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Easy plain text accounting with command-line, terminal and web UIs
source-archive: https://github.com/simonmichael/hledger/archive/refs/tags/1.52.1.tar.gz
dependencies:
  - gmp
build-dependencies:
  - ghc
  - haskell-stack
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: hledger
  - exposure: global executable
    kind: cli
    name: hledger-ui
  - exposure: global executable
    kind: cli
    name: hledger-web
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hledger
  av: sudo av install brew:hledger
  brew: brew install hledger
  debian: sudo apt install hledger
  dnf: sudo dnf install hledger
  macports: sudo port install hledger
  nix: nix profile install nixpkgs#hledger
  pacman: sudo pacman -S hledger
  scoop: scoop install main/hledger
  ubuntu: sudo apt install hledger
  winget: winget install --id simonmichael.hledger -e
  zypper: sudo zypper install hledger
provenance:
  formula: hledger
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
