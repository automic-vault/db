id: brew:libproxy
display-name: libproxy
homepage: https://libproxy.github.io/libproxy/
repo: https://github.com/libproxy/libproxy
docs: https://libproxy.github.io/libproxy/
package-manager:
  apk: libproxy
  brew: libproxy
  dnf: libproxy
  macports: libproxy
  nix: libproxy
  pacman: libproxy
package-manager-url: https://formulae.brew.sh/formula/libproxy
version: 0.5.12
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Library that provides automatic proxy configuration management
source-archive: https://github.com/libproxy/libproxy/archive/refs/tags/0.5.12.tar.gz
dependencies:
  - duktape
  - glib
build-dependencies:
  - gobject-introspection
  - gsettings-desktop-schemas
  - meson
  - ninja
  - pkgconf
  - vala
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: proxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libproxy
  av: sudo av install brew:libproxy
  brew: brew install libproxy
  dnf: sudo dnf install libproxy
  macports: sudo port install libproxy
  nix: nix profile install nixpkgs#libproxy
  pacman: sudo pacman -S libproxy
provenance:
  formula: libproxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
