id: brew:kissat
display-name: kissat
homepage: https://github.com/arminbiere/kissat
repo: https://github.com/arminbiere/kissat
docs: https://github.com/arminbiere/kissat
package-manager:
  brew: kissat
  debian: kissat
  dnf: kissat
  nix: kissat
package-manager-url: https://formulae.brew.sh/formula/kissat
version: 4.0.4
license: MIT
category: development
tags:
  - cli
description: Bare metal SAT solver
source-archive: https://github.com/arminbiere/kissat/archive/refs/tags/rel-4.0.4.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: kissat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kissat
  brew: brew install kissat
  debian: sudo apt install kissat
  dnf: sudo dnf install kissat
  nix: nix profile install nixpkgs#kissat
provenance:
  formula: kissat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
