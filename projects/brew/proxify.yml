id: brew:proxify
display-name: proxify
homepage: https://github.com/projectdiscovery/proxify
repo: https://github.com/projectdiscovery/proxify
docs: https://github.com/projectdiscovery/proxify
package-manager:
  brew: proxify
  macports: proxify
  nix: proxify
package-manager-url: https://formulae.brew.sh/formula/proxify
version: 0.0.16
license: MIT
category: development
tags:
  - cli
description: Portable proxy for capturing, manipulating, and replaying HTTP/HTTPS traffic
source-archive: https://github.com/projectdiscovery/proxify/archive/refs/tags/v0.0.16.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: proxify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:proxify
  brew: brew install proxify
  macports: sudo port install proxify
  nix: nix profile install nixpkgs#proxify
provenance:
  formula: proxify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
