id: brew:abpoa
display-name: abpoa
homepage: https://github.com/yangao07/abPOA
repo: https://github.com/yangao07/abPOA
docs: https://github.com/yangao07/abPOA
package-manager:
  brew: abpoa
  debian: abpoa
  nix: abpoa
  ubuntu: abpoa
package-manager-url: https://formulae.brew.sh/formula/abpoa
version: 1.5.6
license: MIT
category: development
tags:
  - cli
description: SIMD-based C library for fast partial order alignment using adaptive band
source-archive: https://github.com/yangao07/abPOA/releases/download/v1.5.6/abPOA-v1.5.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: abpoa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
