  brew: brew install abpoa
  debian: sudo apt install abpoa
  nix: nix profile install nixpkgs#abpoa
  ubuntu: sudo apt install abpoa
provenance:
  formula: abpoa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
