bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add gcc
  av: sudo av install brew:gcc
  brew: brew install gcc
  debian: sudo apt install gcc
  dnf: sudo dnf install gcc
  nix: nix profile install nixpkgs#gcc
  pacman: sudo pacman -S gcc
  scoop: scoop install main/gcc
  ubuntu: sudo apt install gcc
  zypper: sudo zypper install gcc
provenance:
  formula: gcc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
