id: brew:precious
display-name: precious
homepage: https://github.com/houseabsolute/precious
repo: https://github.com/houseabsolute/precious
docs: https://github.com/houseabsolute/precious
package-manager:
  brew: precious
  debian: precious
  nix: precious
  ubuntu: precious
package-manager-url: https://formulae.brew.sh/formula/precious
version: 0.10.2
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: One code quality tool to rule them all
source-archive: https://github.com/houseabsolute/precious/archive/refs/tags/v0.10.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: precious
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:precious
  brew: brew install precious
  debian: sudo apt install precious
  nix: nix profile install nixpkgs#precious
  ubuntu: sudo apt install precious
provenance:
  formula: precious
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
