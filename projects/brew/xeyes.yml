id: brew:xeyes
display-name: xeyes
homepage: https://gitlab.freedesktop.org/xorg/app/xeyes
repo: https://www.x.org/archive/individual/app/xeyes-1.3.1.tar.xz
docs: https://gitlab.freedesktop.org/xorg/app/xeyes
package-manager:
  apk: xeyes
  brew: xeyes
  dnf: xeyes
  macports: xeyes
  nix: xeyes
  zypper: xeyes
package-manager-url: https://formulae.brew.sh/formula/xeyes
version: 1.3.1
license: X11
category: development
tags:
  - cli
description: Follow the mouse X demo using the X SHAPE extension
source-archive: https://www.x.org/archive/individual/app/xeyes-1.3.1.tar.xz
dependencies:
  - libx11
  - libxcb
  - libxext
  - libxi
  - libxmu
  - libxrender
  - libxt
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xeyes
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xeyes
  av: sudo av install brew:xeyes
  brew: brew install xeyes
  dnf: sudo dnf install xeyes
  macports: sudo port install xeyes
  nix: nix profile install nixpkgs#xeyes
  zypper: sudo zypper install xeyes
provenance:
  formula: xeyes
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
