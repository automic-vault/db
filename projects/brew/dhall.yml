id: brew:dhall
display-name: dhall
homepage: https://dhall-lang.org/
repo: https://hackage.haskell.org/package/dhall-1.42.3/dhall-1.42.3.tar.gz
docs: https://dhall-lang.org/
package-manager:
  brew: dhall
  debian: dhall
  dnf: dhall
  nix: dhall
  pacman: dhall
  scoop: main/dhall
  ubuntu: dhall
package-manager-url: https://formulae.brew.sh/formula/dhall
version: 1.42.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: Interpreter for the Dhall language
source-archive: https://hackage.haskell.org/package/dhall-1.42.3/dhall-1.42.3.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: dhall
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dhall
  brew: brew install dhall
  debian: sudo apt install dhall
  dnf: sudo dnf install dhall
  nix: nix profile install nixpkgs#dhall
  pacman: sudo pacman -S dhall
  scoop: scoop install main/dhall
  ubuntu: sudo apt install dhall
provenance:
  formula: dhall
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
