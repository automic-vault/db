id: brew:ktor
display-name: ktor
homepage: https://github.com/ktorio/ktor-cli
repo: https://github.com/ktorio/ktor-cli
docs: https://github.com/ktorio/ktor-cli
package-manager:
  brew: ktor
package-manager-url: https://formulae.brew.sh/formula/ktor
version: 0.5.0
license: Apache-2.0
category: development
tags:
  - cli
description: Generates Ktor projects through the command-line interface
source-archive: https://github.com/ktorio/ktor-cli/archive/refs/tags/0.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ktor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ktor
  brew: brew install ktor
provenance:
  formula: ktor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
