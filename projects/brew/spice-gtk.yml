id: brew:spice-gtk
display-name: spice-gtk
homepage: https://www.spice-space.org
repo: https://www.spice-space.org/download/gtk/spice-gtk-0.42.tar.xz
docs: https://www.spice-space.org
package-manager:
  apk: spice-gtk
  brew: spice-gtk
  dnf: spice-gtk
  macports: spice-gtk
  nix: spice-gtk
  pacman: spice-gtk
  zypper: spice-gtk
package-manager-url: https://formulae.brew.sh/formula/spice-gtk
version: 0.42
license: GPL-2.0-or-later AND LGPL-2.1-or-later AND BSD-3-Clause
category: network
tags:
  - cli
description: GTK client/libraries for SPICE
source-archive: https://www.spice-space.org/download/gtk/spice-gtk-0.42.tar.xz
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gobject-introspection
  - gstreamer
  - gtk+3
  - harfbuzz
  - jpeg-turbo
  - json-glib
  - libepoxy
  - libsoup
  - libusb
  - libx11
  - lz4
  - openssl@3
  - opus
  - pango
  - phodav
  - pixman
  - spice-protocol
  - usbredir
build-dependencies:
  - gobject-introspection
  - intltool
  - libtool
  - meson
  - ninja
  - pkgconf
  - python@3.14
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: spicy
  - exposure: global executable
    kind: cli
    name: spicy-screenshot
  - exposure: global executable
    kind: cli
    name: spicy-stats
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add spice-gtk
  av: sudo av install brew:spice-gtk
  brew: brew install spice-gtk
  dnf: sudo dnf install spice-gtk
  macports: sudo port install spice-gtk
  nix: nix profile install nixpkgs#spice-gtk
  pacman: sudo pacman -S spice-gtk
  zypper: sudo zypper install spice-gtk
provenance:
  formula: spice-gtk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
