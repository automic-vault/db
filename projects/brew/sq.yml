id: brew:sq
display-name: sq
homepage: https://sq.io
repo: https://github.com/neilotoole/sq
docs: https://sq.io
package-manager:
  apk: sq
  brew: sq
  debian: sq
  macports: sq
  nix: sq
  scoop: main/sq
  ubuntu: sq
package-manager-url: https://formulae.brew.sh/formula/sq
version: 0.53.0
license: MIT
category: development
tags:
  - cli
description: Data wrangler with jq-like query language
source-archive: https://github.com/neilotoole/sq/archive/refs/tags/v0.53.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sq
  av: sudo av install brew:sq
  brew: brew install sq
  debian: sudo apt install sq
  macports: sudo port install sq
  nix: nix profile install nixpkgs#sq
  scoop: scoop install main/sq
  ubuntu: sudo apt install sq
provenance:
  formula: sq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
