id: brew:modsurfer
display-name: modsurfer
homepage: https://dylibso.com/products/modsurfer/
repo: https://github.com/dylibso/modsurfer
docs: https://dylibso.com/products/modsurfer/
package-manager:
  brew: modsurfer
package-manager-url: https://formulae.brew.sh/formula/modsurfer
version: 0.0.10
license: Apache-2.0
category: development
tags:
  - cli
description: Validate, audit and investigate WebAssembly binaries
source-archive: https://github.com/dylibso/modsurfer/archive/refs/tags/v0.0.10.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: modsurfer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:modsurfer
  brew: brew install modsurfer
provenance:
  formula: modsurfer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
