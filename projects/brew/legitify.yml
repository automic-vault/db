id: brew:legitify
display-name: legitify
homepage: https://legitify.dev/
repo: https://github.com/Legit-Labs/legitify
docs: https://legitify.dev/
package-manager:
  brew: legitify
  nix: legitify
package-manager-url: https://formulae.brew.sh/formula/legitify
version: 1.0.11
license: Apache-2.0
category: security
tags:
  - cli
  - security
description: Tool to detect/remediate misconfig and security risks of GitHub/GitLab assets
source-archive: https://github.com/Legit-Labs/legitify/archive/refs/tags/v1.0.11.tar.gz
build-dependencies:
  - go@1.24
executables:
  - exposure: global executable
    kind: cli
    name: legitify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:legitify
  brew: brew install legitify
  nix: nix profile install nixpkgs#legitify
provenance:
  formula: legitify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
