id: brew:patchelf
display-name: patchelf
homepage: https://github.com/NixOS/patchelf
repo: https://github.com/NixOS/patchelf
docs: https://github.com/NixOS/patchelf
package-manager:
  apk: patchelf
  brew: patchelf
  debian: patchelf
  dnf: patchelf
  macports: patchelf
  nix: patchelf
  pacman: patchelf
  ubuntu: patchelf
  zypper: patchelf
package-manager-url: https://formulae.brew.sh/formula/patchelf
version: 0.18.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Modify dynamic ELF executables
source-archive: https://github.com/NixOS/patchelf/releases/download/0.18.0/patchelf-0.18.0.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: patchelf
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add patchelf
  av: sudo av install brew:patchelf
  brew: brew install patchelf
  debian: sudo apt install patchelf
  dnf: sudo dnf install patchelf
  macports: sudo port install patchelf
  nix: nix profile install nixpkgs#patchelf
  pacman: sudo pacman -S patchelf
  ubuntu: sudo apt install patchelf
  zypper: sudo zypper install patchelf
provenance:
  formula: patchelf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
