id: brew:cheat
display-name: cheat
homepage: https://github.com/cheat/cheat
repo: https://github.com/cheat/cheat
docs: https://github.com/cheat/cheat
package-manager:
  brew: cheat
  dnf: cheat
  macports: cheat
  nix: cheat
  scoop: main/cheat
  zypper: cheat
package-manager-url: https://formulae.brew.sh/formula/cheat
version: 5.1.0
license: MIT
category: development
tags:
  - cli
description: Create and view interactive cheat sheets for *nix commands
source-archive: https://github.com/cheat/cheat/archive/refs/tags/5.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cheat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cheat
  brew: brew install cheat
  dnf: sudo dnf install cheat
  macports: sudo port install cheat
  nix: nix profile install nixpkgs#cheat
  scoop: scoop install main/cheat
  zypper: sudo zypper install cheat
provenance:
  formula: cheat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
