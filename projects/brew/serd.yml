id: brew:serd
display-name: serd
homepage: https://drobilla.net/software/serd.html
repo: https://download.drobilla.net/serd-0.32.8.tar.xz
docs: https://drobilla.net/software/serd.html
package-manager:
  apk: serd
  brew: serd
  debian: serdi
  dnf: serd
  macports: serd
  nix: serd
  pacman: serd
  ubuntu: serdi
  zypper: serdi
package-manager-url: https://formulae.brew.sh/formula/serd
version: 0.32.8
license: ISC
category: network
tags:
  - cli
description: C library for RDF syntax
source-archive: https://download.drobilla.net/serd-0.32.8.tar.xz
build-dependencies:
  - meson
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: serdi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add serd
  av: sudo av install brew:serd
  brew: brew install serd
  debian: sudo apt install serdi
  dnf: sudo dnf install serd
  macports: sudo port install serd
  nix: nix profile install nixpkgs#serd
  pacman: sudo pacman -S serd
  ubuntu: sudo apt install serdi
  zypper: sudo zypper install serdi
provenance:
  formula: serd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
