id: brew:aklomp-base64
display-name: aklomp-base64
homepage: https://github.com/aklomp/base64
repo: https://github.com/aklomp/base64
docs: https://github.com/aklomp/base64
package-manager:
  apk: base64
  brew: aklomp-base64
  chocolatey: base64
  macports: base64
  scoop: main/base64
package-manager-url: https://formulae.brew.sh/formula/aklomp-base64
version: 0.5.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: Fast Base64 stream encoder/decoder in C99, with SIMD acceleration
source-archive: https://github.com/aklomp/base64/archive/refs/tags/v0.5.2.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: base64
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add base64
  av: sudo av install brew:aklomp-base64
  brew: brew install aklomp-base64
  chocolatey: choco install base64
  macports: sudo port install base64
  scoop: scoop install main/base64
provenance:
  formula: aklomp-base64
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
