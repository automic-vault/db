id: brew:numbat
display-name: numbat
homepage: https://numbat.dev/
repo: https://github.com/sharkdp/numbat
docs: https://numbat.dev/
package-manager:
  apk: numbat
  brew: numbat
  debian: numbat
  macports: numbat
  nix: numbat
  pacman: numbat
  scoop: main/numbat
  zypper: numbat
package-manager-url: https://formulae.brew.sh/formula/numbat
version: 1.23.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Statically typed programming language for scientific computations
source-archive: https://github.com/sharkdp/numbat/archive/refs/tags/v1.23.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: numbat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add numbat
  av: sudo av install brew:numbat
  brew: brew install numbat
  debian: sudo apt install numbat
  macports: sudo port install numbat
  nix: nix profile install nixpkgs#numbat
  pacman: sudo pacman -S numbat
  scoop: scoop install main/numbat
  zypper: sudo zypper install numbat
provenance:
  formula: numbat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
