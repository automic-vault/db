id: brew:switchaudio-osx
display-name: switchaudio-osx
homepage: https://github.com/deweller/switchaudio-osx/
repo: https://github.com/deweller/switchaudio-osx
docs: https://github.com/deweller/switchaudio-osx/
package-manager:
  brew: switchaudio-osx
  macports: switchaudio-osx
  nix: switchaudio-osx
package-manager-url: https://formulae.brew.sh/formula/switchaudio-osx
version: 1.2.2
license: MIT
category: development
tags:
  - cli
description: Change macOS audio source from the command-line
source-archive: https://github.com/deweller/switchaudio-osx/archive/refs/tags/1.2.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: SwitchAudioSource
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:switchaudio-osx
  brew: brew install switchaudio-osx
  macports: sudo port install switchaudio-osx
  nix: nix profile install nixpkgs#switchaudio-osx
provenance:
  formula: switchaudio-osx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
