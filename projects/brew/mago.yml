id: brew:mago
display-name: mago
homepage: https://github.com/carthage-software/mago
repo: https://github.com/carthage-software/mago
docs: https://github.com/carthage-software/mago
package-manager:
  brew: mago
  nix: mago
  winget: CarthageSoftware.Mago
package-manager-url: https://formulae.brew.sh/formula/mago
version: 1.29.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Toolchain for PHP to help developers write better code
source-archive: https://github.com/carthage-software/mago/releases/download/1.29.0/source-code.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mago
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mago
  brew: brew install mago
  nix: nix profile install nixpkgs#mago
  winget: winget install --id CarthageSoftware.Mago -e
provenance:
  formula: mago
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
