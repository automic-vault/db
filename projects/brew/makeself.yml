id: brew:makeself
display-name: makeself
homepage: https://makeself.io/
repo: https://github.com/megastep/makeself
docs: https://makeself.io/
package-manager:
  apk: makeself
  brew: makeself
  debian: makeself
  dnf: makeself
  macports: makeself
  nix: makeself
  ubuntu: makeself
  zypper: makeself
package-manager-url: https://formulae.brew.sh/formula/makeself
version: 2.7.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Generates a self-extracting compressed tar archive
source-archive: https://github.com/megastep/makeself/archive/refs/tags/release-2.7.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: makeself
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add makeself
  av: sudo av install brew:makeself
  brew: brew install makeself
  debian: sudo apt install makeself
  dnf: sudo dnf install makeself
  macports: sudo port install makeself
  nix: nix profile install nixpkgs#makeself
  ubuntu: sudo apt install makeself
  zypper: sudo zypper install makeself
provenance:
  formula: makeself
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
