id: brew:vgrep
display-name: vgrep
homepage: https://github.com/vrothberg/vgrep
repo: https://github.com/vrothberg/vgrep
docs: https://github.com/vrothberg/vgrep
package-manager:
  brew: vgrep
  dnf: vgrep
  macports: vgrep
  nix: vgrep
  zypper: vgrep
package-manager-url: https://formulae.brew.sh/formula/vgrep
version: 2.8.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: User-friendly pager for grep
source-archive: https://github.com/vrothberg/vgrep/archive/refs/tags/v2.8.0.tar.gz
build-dependencies:
  - go
  - go-md2man
executables:
  - exposure: global executable
    kind: cli
    name: vgrep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vgrep
  brew: brew install vgrep
  dnf: sudo dnf install vgrep
  macports: sudo port install vgrep
  nix: nix profile install nixpkgs#vgrep
  zypper: sudo zypper install vgrep
provenance:
  formula: vgrep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
