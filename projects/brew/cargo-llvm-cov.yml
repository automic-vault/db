id: brew:cargo-llvm-cov
display-name: cargo-llvm-cov
homepage: https://github.com/taiki-e/cargo-llvm-cov
repo: https://static.crates.io/crates/cargo-llvm-cov/cargo-llvm-cov-0.8.7.crate
docs: https://github.com/taiki-e/cargo-llvm-cov
package-manager:
  brew: cargo-llvm-cov
  nix: cargo-llvm-cov
  pacman: cargo-llvm-cov
package-manager-url: https://formulae.brew.sh/formula/cargo-llvm-cov
version: 0.8.7
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Cargo subcommand to easily use LLVM source-based code coverage
source-archive: https://static.crates.io/crates/cargo-llvm-cov/cargo-llvm-cov-0.8.7.crate
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-llvm-cov
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-llvm-cov
  brew: brew install cargo-llvm-cov
  nix: nix profile install nixpkgs#cargo-llvm-cov
  pacman: sudo pacman -S cargo-llvm-cov
provenance:
  formula: cargo-llvm-cov
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
