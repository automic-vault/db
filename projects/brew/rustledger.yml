id: brew:rustledger
display-name: rustledger
homepage: https://rustledger.github.io
repo: https://github.com/rustledger/rustledger
docs: https://rustledger.github.io
package-manager:
  brew: rustledger
package-manager-url: https://formulae.brew.sh/formula/rustledger
version: 0.15.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Fast, pure Rust implementation of Beancount double-entry accounting
source-archive: https://github.com/rustledger/rustledger/archive/refs/tags/v0.15.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rledger
  - exposure: global executable
    kind: cli
    name: rledger-lsp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rustledger
  brew: brew install rustledger
provenance:
  formula: rustledger
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
