id: brew:opa
display-name: opa
homepage: https://www.openpolicyagent.org
repo: https://github.com/open-policy-agent/opa
docs: https://www.openpolicyagent.org
package-manager:
  apk: opa
  brew: opa
  scoop: main/opa
  zypper: opa
package-manager-url: https://formulae.brew.sh/formula/opa
version: 1.16.2
license: Apache-2.0
category: development
tags:
  - cli
description: Open source, general-purpose policy engine
source-archive: https://github.com/open-policy-agent/opa/archive/refs/tags/v1.16.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: opa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add opa
  av: sudo av install brew:opa
  brew: brew install opa
  scoop: scoop install main/opa
  zypper: sudo zypper install opa
provenance:
  formula: opa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
