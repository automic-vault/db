id: brew:yank
display-name: yank
homepage: https://github.com/mptre/yank
repo: https://github.com/mptre/yank
docs: https://github.com/mptre/yank
package-manager:
  apk: yank
  brew: yank
  debian: yank
  dnf: yank
  macports: yank
  nix: yank
  pacman: yank
  ubuntu: yank
  winget: nasiridrishi.Yank
  zypper: yank
package-manager-url: https://formulae.brew.sh/formula/yank
version: 1.3.0
license: MIT
category: development
tags:
  - cli
description: Copy terminal output to clipboard
source-archive: https://github.com/mptre/yank/archive/refs/tags/v1.3.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: yank
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yank
  av: sudo av install brew:yank
  brew: brew install yank
  debian: sudo apt install yank
  dnf: sudo dnf install yank
  macports: sudo port install yank
  nix: nix profile install nixpkgs#yank
  pacman: sudo pacman -S yank
  ubuntu: sudo apt install yank
  winget: winget install --id nasiridrishi.Yank -e
  zypper: sudo zypper install yank
provenance:
  formula: yank
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
