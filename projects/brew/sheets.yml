id: brew:sheets
display-name: sheets
homepage: https://github.com/maaslalani/sheets
repo: https://github.com/maaslalani/sheets
docs: https://github.com/maaslalani/sheets
package-manager:
  brew: sheets
  macports: sheets
package-manager-url: https://formulae.brew.sh/formula/sheets
version: 0.2.0
license: MIT
category: development
tags:
  - cli
description: Terminal based spreadsheet tool
source-archive: https://github.com/maaslalani/sheets/archive/refs/tags/v0.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sheets
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sheets
  brew: brew install sheets
  macports: sudo port install sheets
provenance:
  formula: sheets
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
