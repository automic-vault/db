id: brew:ispc
display-name: ispc
homepage: https://ispc.github.io
repo: https://github.com/ispc/ispc
docs: https://ispc.github.io
package-manager:
  apk: ispc
  brew: ispc
  debian: ispc
  dnf: ispc
  macports: ispc
  nix: ispc
  pacman: ispc
  scoop: main/ispc
  ubuntu: ispc
  zypper: ispc
package-manager-url: https://formulae.brew.sh/formula/ispc
version: 1.30.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Compiler for SIMD programming on the CPU
source-archive: https://github.com/ispc/ispc/archive/refs/tags/v1.30.0.tar.gz
dependencies:
  - llvm
build-dependencies:
  - bison
  - cmake
  - flex
executables:
  - exposure: global executable
    kind: cli
    name: ispc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ispc
  av: sudo av install brew:ispc
  brew: brew install ispc
  debian: sudo apt install ispc
  dnf: sudo dnf install ispc
  macports: sudo port install ispc
  nix: nix profile install nixpkgs#ispc
  pacman: sudo pacman -S ispc
  scoop: scoop install main/ispc
  ubuntu: sudo apt install ispc
  zypper: sudo zypper install ispc
provenance:
  formula: ispc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
