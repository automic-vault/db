id: brew:mapserver
display-name: mapserver
homepage: https://mapserver.org/
repo: https://download.osgeo.org/mapserver/mapserver-8.6.2.tar.gz
docs: https://mapserver.org/
package-manager:
  apk: mapserver
  brew: mapserver
  dnf: mapserver
  macports: mapserver
  nix: mapserver
  zypper: mapserver
package-manager-url: https://formulae.brew.sh/formula/mapserver
version: 8.6.2
license: MIT
category: network
tags:
  - cli
description: Publish spatial data and interactive mapping apps to the web
source-archive: https://download.osgeo.org/mapserver/mapserver-8.6.2.tar.gz
dependencies:
  - cairo
  - fcgi
  - freetype
  - gdal
  - geos
  - giflib
  - jpeg-turbo
  - libpng
  - libpq
  - libxml2
  - pcre2
  - proj
  - protobuf-c
  - python@3.14
build-dependencies:
  - cmake
  - pkgconf
  - swig
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: coshp
  - exposure: global executable
    kind: cli
    name: legend
  - exposure: global executable
    kind: cli
    name: map2img
  - exposure: global executable
    kind: cli
    name: mapserv
  - exposure: global executable
    kind: cli
    name: msencrypt
  - exposure: global executable
    kind: cli
    name: scalebar
  - exposure: global executable
    kind: cli
    name: shptree
  - exposure: global executable
    kind: cli
    name: shptreetst
  - exposure: global executable
    kind: cli
    name: shptreevis
  - exposure: global executable
    kind: cli
    name: sortshp
  - exposure: global executable
    kind: cli
    name: tile4ms
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mapserver
  av: sudo av install brew:mapserver
  brew: brew install mapserver
  dnf: sudo dnf install mapserver
  macports: sudo port install mapserver
  nix: nix profile install nixpkgs#mapserver
  zypper: sudo zypper install mapserver
provenance:
  formula: mapserver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
