id: brew:rsgain
display-name: rsgain
homepage: https://github.com/complexlogic/rsgain
repo: https://github.com/complexlogic/rsgain
docs: https://github.com/complexlogic/rsgain
package-manager:
  apk: rsgain
  brew: rsgain
  debian: rsgain
  dnf: rsgain
  macports: rsgain
  nix: rsgain
  scoop: extras/rsgain
  ubuntu: rsgain
package-manager-url: https://formulae.brew.sh/formula/rsgain
version: 3.7
license: BSD-2-Clause
category: development
tags:
  - cli
description: ReplayGain 2.0 tagging utility
source-archive: https://github.com/complexlogic/rsgain/archive/refs/tags/v3.7.tar.gz
dependencies:
  - ffmpeg
  - fmt
  - inih
  - libebur128
  - taglib
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rsgain
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rsgain
  av: sudo av install brew:rsgain
  brew: brew install rsgain
  debian: sudo apt install rsgain
  dnf: sudo dnf install rsgain
  macports: sudo port install rsgain
  nix: nix profile install nixpkgs#rsgain
  scoop: scoop install extras/rsgain
  ubuntu: sudo apt install rsgain
provenance:
  formula: rsgain
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
