id: brew:graalvm
display-name: graalvm
homepage: https://www.graalvm.org/
repo: https://github.com/oracle/graal
docs: https://www.graalvm.org/
package-manager:
  brew: graalvm
  chocolatey: graalvm
package-manager-url: https://formulae.brew.sh/formula/graalvm
version: 25.0.2
license: GPL-2.0-only WITH Classpath-exception-2.0
category: development
tags:
  - cli
description: JDK distribution with Graal compiler and Native Image
source-archive: https://github.com/oracle/graal/archive/refs/tags/graal-25.0.2.tar.gz
dependencies:
  - freetype
  - giflib
  - harfbuzz
  - jpeg-turbo
  - libpng
  - little-cms2
build-dependencies:
  - autoconf
  - mx
  - ninja
  - openjdk@25
  - pkgconf
uses-from-macos:
  - cups
  - unzip
  - zip
executables:
  - exposure: global executable
    kind: cli
    name: native-image
  - exposure: global executable
    kind: cli
    name: native-image-configure
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:graalvm
  brew: brew install graalvm
  chocolatey: choco install graalvm
provenance:
  formula: graalvm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
