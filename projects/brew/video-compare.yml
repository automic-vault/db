id: brew:video-compare
display-name: video-compare
homepage: https://github.com/pixop/video-compare
repo: https://github.com/pixop/video-compare
docs: https://github.com/pixop/video-compare
package-manager:
  brew: video-compare
  macports: video-compare
  nix: video-compare
  scoop: extras/video-compare
package-manager-url: https://formulae.brew.sh/formula/video-compare
version: 20260502
license: GPL-2.0-only
category: development
tags:
  - cli
description: Split screen video comparison tool using FFmpeg and SDL2
source-archive: https://github.com/pixop/video-compare/archive/refs/tags/20260502.tar.gz
dependencies:
  - ffmpeg
  - sdl2
  - sdl2_ttf
executables:
  - exposure: global executable
    kind: cli
    name: video-compare
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:video-compare
  brew: brew install video-compare
  macports: sudo port install video-compare
  nix: nix profile install nixpkgs#video-compare
  scoop: scoop install extras/video-compare
provenance:
  formula: video-compare
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
