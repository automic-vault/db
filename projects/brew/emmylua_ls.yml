id: brew:emmylua_ls
display-name: emmylua_ls
homepage: https://github.com/EmmyLuaLs/emmylua-analyzer-rust
repo: https://github.com/EmmyLuaLs/emmylua-analyzer-rust
docs: https://github.com/EmmyLuaLs/emmylua-analyzer-rust
package-manager:
  apk: emmylua-ls
  brew: emmylua_ls
  nix: emmylua-ls
package-manager-url: https://formulae.brew.sh/formula/emmylua_ls
version: 0.23.1
license: MIT
category: development
tags:
  - cli
description: Lua Language Server
source-archive: https://github.com/EmmyLuaLs/emmylua-analyzer-rust/archive/refs/tags/0.23.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: emmylua_check
  - exposure: global executable
    kind: cli
    name: emmylua_doc_cli
  - exposure: global executable
    kind: cli
    name: emmylua_ls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add emmylua-ls
  av: sudo av install brew:emmylua_ls
  brew: brew install emmylua_ls
  nix: nix profile install nixpkgs#emmylua-ls
provenance:
  formula: emmylua_ls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
