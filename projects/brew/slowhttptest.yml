id: brew:slowhttptest
display-name: slowhttptest
homepage: https://github.com/shekyan/slowhttptest
repo: https://github.com/shekyan/slowhttptest
docs: https://github.com/shekyan/slowhttptest
package-manager:
  brew: slowhttptest
  debian: slowhttptest
  macports: slowhttptest
  nix: slowhttptest
  pacman: slowhttptest
  ubuntu: slowhttptest
package-manager-url: https://formulae.brew.sh/formula/slowhttptest
version: 1.9.0
license: Apache-2.0
category: development
tags:
  - cli
description: Simulates application layer denial of service attacks
source-archive: https://github.com/shekyan/slowhttptest/archive/refs/tags/v1.9.0.tar.gz
dependencies:
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: slowhttptest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:slowhttptest
  brew: brew install slowhttptest
  debian: sudo apt install slowhttptest
  macports: sudo port install slowhttptest
  nix: nix profile install nixpkgs#slowhttptest
  pacman: sudo pacman -S slowhttptest
  ubuntu: sudo apt install slowhttptest
provenance:
  formula: slowhttptest
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
