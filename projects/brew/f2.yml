id: brew:f2
display-name: f2
homepage: https://github.com/ayoisaiah/f2
repo: https://github.com/ayoisaiah/f2
docs: https://github.com/ayoisaiah/f2
package-manager:
  brew: f2
  nix: f2
  scoop: main/f2
  winget: ayoisaiah.f2
package-manager-url: https://formulae.brew.sh/formula/f2
version: 2.2.2
license: MIT
category: development
tags:
  - cli
description: Command-line batch renaming tool
source-archive: https://github.com/ayoisaiah/f2/archive/refs/tags/v2.2.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: f2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:f2
  brew: brew install f2
  nix: nix profile install nixpkgs#f2
  scoop: scoop install main/f2
  winget: winget install --id ayoisaiah.f2 -e
provenance:
  formula: f2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
