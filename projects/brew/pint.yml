id: brew:pint
display-name: pint
homepage: https://cloudflare.github.io/pint/
repo: https://github.com/cloudflare/pint
docs: https://cloudflare.github.io/pint/
package-manager:
  brew: pint
  pacman: pint
package-manager-url: https://formulae.brew.sh/formula/pint
version: 0.84.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Prometheus rule linter/validator
source-archive: https://github.com/cloudflare/pint/archive/refs/tags/v0.84.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pint
  brew: brew install pint
  pacman: sudo pacman -S pint
provenance:
  formula: pint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
