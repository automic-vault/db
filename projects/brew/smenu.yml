id: brew:smenu
display-name: smenu
homepage: https://github.com/p-gen/smenu
repo: https://github.com/p-gen/smenu
docs: https://github.com/p-gen/smenu
package-manager:
  apk: smenu
  brew: smenu
  debian: smenu
  nix: smenu
  ubuntu: smenu
  zypper: smenu
package-manager-url: https://formulae.brew.sh/formula/smenu
version: 1.5.0
license: MPL-2.0
category: development
tags:
  - cli
description: Powerful and versatile CLI selection tool for interactive or scripting use
source-archive: https://github.com/p-gen/smenu/releases/download/v1.5.0/smenu-1.5.0.tar.bz2
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: smenu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add smenu
  av: sudo av install brew:smenu
  brew: brew install smenu
  debian: sudo apt install smenu
  nix: nix profile install nixpkgs#smenu
  ubuntu: sudo apt install smenu
  zypper: sudo zypper install smenu
provenance:
  formula: smenu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
