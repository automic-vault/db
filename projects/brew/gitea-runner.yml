id: brew:gitea-runner
display-name: gitea-runner
homepage: https://gitea.com/gitea/runner
repo: https://gitea.com/gitea/runner/archive/v1.0.6.tar.gz
docs: https://gitea.com/gitea/runner
package-manager:
  apk: gitea-runner
  brew: gitea-runner
  pacman: gitea-runner
  winget: Gitea.Runner
package-manager-url: https://formulae.brew.sh/formula/gitea-runner
version: 1.0.6
license: MIT
category: development
tags:
  - cli
description: Official Actions runner for Gitea
source-archive: https://gitea.com/gitea/runner/archive/v1.0.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gitea-runner
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Config file: $HOMEBREW_PREFIX/etc/gitea-runner/config.yaml'
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add gitea-runner
  av: sudo av install brew:gitea-runner
  brew: brew install gitea-runner
  pacman: sudo pacman -S gitea-runner
  winget: winget install --id Gitea.Runner -e
provenance:
  formula: gitea-runner
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
