id: brew:devspace
display-name: devspace
homepage: https://devspace.sh/
repo: https://github.com/devspace-sh/devspace
docs: https://devspace.sh/
package-manager:
  brew: devspace
  nix: devspace
  scoop: main/devspace
package-manager-url: https://formulae.brew.sh/formula/devspace
version: 6.3.21
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: CLI helps develop/deploy/debug apps with Docker and k8s
source-archive: https://github.com/devspace-sh/devspace/archive/refs/tags/v6.3.21.tar.gz
dependencies:
  - kubernetes-cli
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: devspace
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:devspace
  brew: brew install devspace
  nix: nix profile install nixpkgs#devspace
  scoop: scoop install main/devspace
provenance:
  formula: devspace
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
