id: brew:mergelog
display-name: mergelog
homepage: https://mergelog.sourceforge.net/
repo: https://downloads.sourceforge.net/project/mergelog/mergelog/4.5/mergelog-4.5.tar.gz
docs: https://mergelog.sourceforge.net/
package-manager:
  brew: mergelog
  ubuntu: mergelog
package-manager-url: https://formulae.brew.sh/formula/mergelog
version: 4.5
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Merges httpd logs from web servers behind round-robin DNS
source-archive: https://downloads.sourceforge.net/project/mergelog/mergelog/4.5/mergelog-4.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mergelog
  - exposure: global executable
    kind: cli
    name: zmergelog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mergelog
  brew: brew install mergelog
  ubuntu: sudo apt install mergelog
provenance:
  formula: mergelog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
