id: brew:benchi
display-name: benchi
homepage: https://github.com/ConduitIO/benchi
repo: https://github.com/ConduitIO/benchi
docs: https://github.com/ConduitIO/benchi
package-manager:
  brew: benchi
package-manager-url: https://formulae.brew.sh/formula/benchi
version: 0.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: Benchmarking tool for data pipelines
source-archive: https://github.com/ConduitIO/benchi/archive/refs/tags/v0.4.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: benchi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:benchi
  brew: brew install benchi
provenance:
  formula: benchi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
