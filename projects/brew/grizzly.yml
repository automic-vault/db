id: brew:grizzly
display-name: grizzly
homepage: https://grafana.github.io/grizzly/
repo: https://github.com/grafana/grizzly
docs: https://grafana.github.io/grizzly/
package-manager:
  brew: grizzly
  nix: grizzly
package-manager-url: https://formulae.brew.sh/formula/grizzly
version: 0.7.1
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool for managing and automating Grafana dashboards
source-archive: https://github.com/grafana/grizzly/archive/refs/tags/v0.7.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: grr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:grizzly
  brew: brew install grizzly
  nix: nix profile install nixpkgs#grizzly
provenance:
  formula: grizzly
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
