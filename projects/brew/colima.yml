id: brew:colima
display-name: colima
homepage: https://colima.run
repo: https://github.com/abiosoft/colima
docs: https://colima.run
package-manager:
  brew: colima
  macports: colima
  nix: colima
package-manager-url: https://formulae.brew.sh/formula/colima
version: 0.10.1
license: MIT
category: development
tags:
  - cli
description: Container runtimes on MacOS (and Linux) with minimal setup
source-archive: https://github.com/abiosoft/colima.git
dependencies:
  - lima
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: colima
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:colima
  brew: brew install colima
  macports: sudo port install colima
  nix: nix profile install nixpkgs#colima
provenance:
  formula: colima
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
