id: brew:newt
display-name: newt
homepage: https://pagure.io/newt
repo: https://releases.pagure.org/newt/newt-0.52.25.tar.gz
docs: https://pagure.io/newt
package-manager:
  apk: newt
  brew: newt
  debian: whiptail
  dnf: newt
  nix: newt
  ubuntu: whiptail
  zypper: newt
package-manager-url: https://formulae.brew.sh/formula/newt
version: 0.52.25
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: Library for color text mode, widget based user interfaces
source-archive: https://releases.pagure.org/newt/newt-0.52.25.tar.gz
dependencies:
  - gettext
  - popt
  - python@3.14
  - s-lang
executables:
  - exposure: global executable
    kind: cli
    name: whiptail
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add newt
  av: sudo av install brew:newt
  brew: brew install newt
  debian: sudo apt install whiptail
  dnf: sudo dnf install newt
  nix: nix profile install nixpkgs#newt
  ubuntu: sudo apt install whiptail
  zypper: sudo zypper install newt
provenance:
  formula: newt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
