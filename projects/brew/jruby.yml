id: brew:jruby
display-name: jruby
homepage: https://www.jruby.org/
repo: >
  https://search.maven.org/remotecontent?filepath=org/jruby/jruby-dist/10.1.0.0/jruby-dist-10.1.0.0-src.zip
docs: https://www.jruby.org/
package-manager:
  apk: jruby
  brew: jruby
  chocolatey: jruby
  debian: jruby
  dnf: ast
  macports: jruby
  nix: jruby
  pacman: jruby
  scoop: main/jruby
  ubuntu: jruby
package-manager-url: https://formulae.brew.sh/formula/jruby
version: 10.1.0.0
license: EPL-2.0 OR GPL-2.0-only OR LGPL-2.1-only
category: network
tags:
  - cli
description: Ruby implementation in pure Java
source-archive: >
  https://search.maven.org/remotecontent?filepath=org/jruby/jruby-dist/10.1.0.0/jruby-dist-10.1.0.0-src.zip
dependencies:
  - libfixposix
  - openjdk
build-dependencies:
  - ant
  - maven
  - pkgconf
  - ruby
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: ast
  - exposure: global executable
    kind: cli
    name: install_doc
  - exposure: global executable
    kind: cli
    name: jbundle
  - exposure: global executable
    kind: cli
    name: jbundler
  - exposure: global executable
    kind: cli
    name: jerb
  - exposure: global executable
    kind: cli
    name: jgem
  - exposure: global executable
    kind: cli
    name: jirb
  - exposure: global executable
    kind: cli
    name: jirb_swing
  - exposure: global executable
    kind: cli
    name: jminitest
  - exposure: global executable
    kind: cli
    name: jracc
  - exposure: global executable
    kind: cli
    name: jrake
  - exposure: global executable
    kind: cli
    name: jrdoc
  - exposure: global executable
    kind: cli
    name: jri
  - exposure: global executable
    kind: cli
    name: jruby
  - exposure: global executable
    kind: cli
    name: jruby.sh
  - exposure: global executable
    kind: cli
    name: jrubyc
  - exposure: global executable
    kind: cli
    name: jsyntax_suggest
  - exposure: global executable
    kind: cli
    name: jtest-unit
  - exposure: global executable
    kind: cli
    name: lock_jars
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jruby
  av: sudo av install brew:jruby
  brew: brew install jruby
  chocolatey: choco install jruby
  debian: sudo apt install jruby
  dnf: sudo dnf install ast
  macports: sudo port install jruby
  nix: nix profile install nixpkgs#jruby
  pacman: sudo pacman -S jruby
  scoop: scoop install main/jruby
  ubuntu: sudo apt install jruby
provenance:
  formula: jruby
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
