id: brew:permify
display-name: permify
homepage: https://github.com/Permify/permify
repo: https://github.com/Permify/permify
docs: https://github.com/Permify/permify
package-manager:
  brew: permify
package-manager-url: https://formulae.brew.sh/formula/permify
version: 1.7.0
license: AGPL-3.0-only
category: development
tags:
