id: brew:libdivecomputer
display-name: libdivecomputer
homepage: https://www.libdivecomputer.org/
repo: https://www.libdivecomputer.org/releases/libdivecomputer-0.9.0.tar.gz
docs: https://www.libdivecomputer.org/
package-manager:
  brew: libdivecomputer
  macports: libdivecomputer
  nix: libdivecomputer
package-manager-url: https://formulae.brew.sh/formula/libdivecomputer
version: 0.9.0
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Library for communication with various dive computers
source-archive: https://www.libdivecomputer.org/releases/libdivecomputer-0.9.0.tar.gz
dependencies:
  - libusb
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dctool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libdivecomputer
  brew: brew install libdivecomputer
  macports: sudo port install libdivecomputer
  nix: nix profile install nixpkgs#libdivecomputer
provenance:
  formula: libdivecomputer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
