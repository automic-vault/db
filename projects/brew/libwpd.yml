id: brew:libwpd
display-name: libwpd
homepage: https://libwpd.sourceforge.net/
repo: https://dev-www.libreoffice.org/src/libwpd-0.10.3.tar.xz
docs: https://libwpd.sourceforge.net/
package-manager:
  apk: libwpd
  brew: libwpd
  dnf: libwpd
  nix: libwpd
  pacman: libwpd
package-manager-url: https://formulae.brew.sh/formula/libwpd
version: 0.10.3
license: MPL-2.0 OR LGPL-2.1-or-later
category: network
tags:
  - cli
description: General purpose library for reading WordPerfect files
source-archive: https://dev-www.libreoffice.org/src/libwpd-0.10.3.tar.xz
dependencies:
  - glib
  - libgsf
  - librevenge
build-dependencies:
  - boost
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: wpd2html
  - exposure: global executable
    kind: cli
    name: wpd2raw
  - exposure: global executable
    kind: cli
    name: wpd2text
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libwpd
  av: sudo av install brew:libwpd
  brew: brew install libwpd
  dnf: sudo dnf install libwpd
  nix: nix profile install nixpkgs#libwpd
  pacman: sudo pacman -S libwpd
provenance:
  formula: libwpd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
