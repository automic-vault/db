id: brew:libgit2
display-name: libgit2
homepage: https://libgit2.org/
repo: https://github.com/libgit2/libgit2
docs: https://libgit2.org/
package-manager:
  apk: libgit2
  brew: libgit2
  dnf: libgit2
  macports: libgit2
  nix: libgit2
  pacman: libgit2
package-manager-url: https://formulae.brew.sh/formula/libgit2
version: 1.9.4
license: GPL-2.0-only WITH GCC-exception-2.0
category: development
tags:
  - cli
  - git
description: C library of Git core methods that is re-entrant and linkable
source-archive: https://github.com/libgit2/libgit2/archive/refs/tags/v1.9.4.tar.gz
dependencies:
  - libssh2
  - llhttp
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: git2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libgit2
  av: sudo av install brew:libgit2
  brew: brew install libgit2
  dnf: sudo dnf install libgit2
  macports: sudo port install libgit2
  nix: nix profile install nixpkgs#libgit2
  pacman: sudo pacman -S libgit2
provenance:
  formula: libgit2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
