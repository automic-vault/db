id: brew:sacad
display-name: sacad
homepage: https://github.com/desbma/sacad
repo: >
  https://files.pythonhosted.org/packages/df/39/3ec259100446937a0c36c14e1bc0794e990259100e90f5b83463b23c740d/sacad-2.8.3.tar.gz
docs: https://github.com/desbma/sacad
package-manager:
  brew: sacad
  debian: sacad
  nix: sacad
  scoop: main/sacad
  zypper: sacad
package-manager-url: https://formulae.brew.sh/formula/sacad
version: 2.8.3
license: MPL-2.0
category: development
tags:
  - cli
description: Automatic cover art downloader
source-archive: >
  https://files.pythonhosted.org/packages/df/39/3ec259100446937a0c36c14e1bc0794e990259100e90f5b83463b23c740d/sacad-2.8.3.tar.gz
dependencies:
  - pillow
  - python@3.14
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: sacad
  - exposure: global executable
    kind: cli
    name: sacad_r
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sacad
  brew: brew install sacad
  debian: sudo apt install sacad
  nix: nix profile install nixpkgs#sacad
  scoop: scoop install main/sacad
  zypper: sudo zypper install sacad
provenance:
  formula: sacad
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
