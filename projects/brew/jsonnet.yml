id: brew:jsonnet
display-name: jsonnet
homepage: https://jsonnet.org/
repo: https://github.com/google/jsonnet
docs: https://jsonnet.org/
package-manager:
  apk: jsonnet
  brew: jsonnet
  debian: jsonnet
  dnf: jsonnet
  macports: jsonnet
  nix: jsonnet
  ubuntu: jsonnet
package-manager-url: https://formulae.brew.sh/formula/jsonnet
version: 0.22.0
license: Apache-2.0
category: development
tags:
  - cli
  - json
description: Domain specific configuration language for defining JSON data
source-archive: https://github.com/google/jsonnet/archive/refs/tags/v0.22.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: jsonnet
  - exposure: global executable
    kind: cli
    name: jsonnetfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jsonnet
  av: sudo av install brew:jsonnet
  brew: brew install jsonnet
  debian: sudo apt install jsonnet
  dnf: sudo dnf install jsonnet
  macports: sudo port install jsonnet
  nix: nix profile install nixpkgs#jsonnet
  ubuntu: sudo apt install jsonnet
provenance:
  formula: jsonnet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
