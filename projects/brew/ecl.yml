id: brew:ecl
display-name: ecl
homepage: https://ecl.common-lisp.dev
repo: https://ecl.common-lisp.dev/static/files/release/ecl-26.5.5.tgz
docs: https://ecl.common-lisp.dev
package-manager:
  apk: ecl
  brew: ecl
  debian: ecl
  macports: ecl
  nix: ecl
  pacman: ecl
  ubuntu: ecl
  zypper: ecl
package-manager-url: https://formulae.brew.sh/formula/ecl
version: 26.5.5
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Embeddable Common Lisp
source-archive: https://ecl.common-lisp.dev/static/files/release/ecl-26.5.5.tgz
dependencies:
  - bdw-gc
  - gmp
build-dependencies:
  - texinfo
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: ecl
  - exposure: global executable
    kind: cli
    name: ecl-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ecl
  av: sudo av install brew:ecl
  brew: brew install ecl
  debian: sudo apt install ecl
  macports: sudo port install ecl
  nix: nix profile install nixpkgs#ecl
  pacman: sudo pacman -S ecl
  ubuntu: sudo apt install ecl
  zypper: sudo zypper install ecl
provenance:
  formula: ecl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
