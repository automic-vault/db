id: brew:kustomizer
display-name: kustomizer
homepage: https://github.com/stefanprodan/kustomizer
repo: https://github.com/stefanprodan/kustomizer
docs: https://github.com/stefanprodan/kustomizer
package-manager:
  brew: kustomizer
package-manager-url: https://formulae.brew.sh/formula/kustomizer
version: 2.2.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Package manager for distributing Kubernetes configuration as OCI artifacts
source-archive: https://github.com/stefanprodan/kustomizer/archive/refs/tags/v2.2.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kustomizer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kustomizer
  brew: brew install kustomizer
provenance:
  formula: kustomizer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
