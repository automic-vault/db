id: brew:grin
display-name: grin
homepage: https://grin.mw/
repo: https://github.com/mimblewimble/grin
docs: https://grin.mw/
package-manager:
  brew: grin
  dnf: grin
  nix: grin
package-manager-url: https://formulae.brew.sh/formula/grin
version: 5.4.0
license: Apache-2.0
category: development
tags:
  - cli
description: Minimal implementation of the Mimblewimble protocol
source-archive: https://github.com/mimblewimble/grin/archive/refs/tags/v5.4.0.tar.gz
build-dependencies:
  - rust
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: grin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:grin
  brew: brew install grin
  dnf: sudo dnf install grin
  nix: nix profile install nixpkgs#grin
provenance:
  formula: grin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
