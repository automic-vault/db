id: brew:toipe
display-name: toipe
homepage: https://github.com/Samyak2/toipe
repo: https://github.com/Samyak2/toipe
docs: https://github.com/Samyak2/toipe
package-manager:
  brew: toipe
  nix: toipe
  zypper: toipe
package-manager-url: https://formulae.brew.sh/formula/toipe
version: 0.5.0
license: MIT
category: development
tags:
  - cli
description: Yet another typing test, but crab flavoured
source-archive: https://github.com/Samyak2/toipe/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: randomword
  - exposure: global executable
    kind: cli
    name: toipe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:toipe
  brew: brew install toipe
  nix: nix profile install nixpkgs#toipe
  zypper: sudo zypper install toipe
provenance:
  formula: toipe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
