id: brew:hyperfine
display-name: hyperfine
homepage: https://github.com/sharkdp/hyperfine
repo: https://github.com/sharkdp/hyperfine
docs: https://github.com/sharkdp/hyperfine
package-manager:
  apk: hyperfine
  brew: hyperfine
  debian: hyperfine
  dnf: hyperfine
  macports: hyperfine
  nix: hyperfine
  pacman: hyperfine
  scoop: main/hyperfine
  ubuntu: hyperfine
  winget: sharkdp.hyperfine
  zypper: hyperfine
package-manager-url: https://formulae.brew.sh/formula/hyperfine
version: 1.20.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Command-line benchmarking tool
source-archive: https://github.com/sharkdp/hyperfine/archive/refs/tags/v1.20.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hyperfine
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hyperfine
  av: sudo av install brew:hyperfine
  brew: brew install hyperfine
  debian: sudo apt install hyperfine
  dnf: sudo dnf install hyperfine
  macports: sudo port install hyperfine
  nix: nix profile install nixpkgs#hyperfine
  pacman: sudo pacman -S hyperfine
  scoop: scoop install main/hyperfine
  ubuntu: sudo apt install hyperfine
  winget: winget install --id sharkdp.hyperfine -e
  zypper: sudo zypper install hyperfine
provenance:
  formula: hyperfine
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
