    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:numdiff
  brew: brew install numdiff
  debian: sudo apt install numdiff
  macports: sudo port install numdiff
  nix: nix profile install nixpkgs#numdiff
  ubuntu: sudo apt install numdiff
provenance:
  formula: numdiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
