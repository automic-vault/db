id: brew:numdiff
display-name: numdiff
homepage: https://www.nongnu.org/numdiff
repo: https://download.savannah.gnu.org/releases/numdiff/numdiff-5.9.0.tar.gz
docs: https://www.nongnu.org/numdiff
package-manager:
  brew: numdiff
  debian: numdiff
  macports: numdiff
  nix: numdiff
  ubuntu: numdiff
package-manager-url: https://formulae.brew.sh/formula/numdiff
version: 5.9.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Putative files comparison tool
source-archive: https://download.savannah.gnu.org/releases/numdiff/numdiff-5.9.0.tar.gz
