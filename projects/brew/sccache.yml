id: brew:sccache
display-name: sccache
homepage: https://github.com/mozilla/sccache
repo: https://github.com/mozilla/sccache
docs: https://github.com/mozilla/sccache
package-manager:
  apk: sccache
  brew: sccache
  chocolatey: sccache
  debian: sccache
  dnf: sccache
  macports: sccache
  nix: sccache
  pacman: sccache
  scoop: main/sccache
  ubuntu: sccache
  winget: Mozilla.sccache
  zypper: sccache
package-manager-url: https://formulae.brew.sh/formula/sccache
version: 0.15.0
license: Apache-2.0
category: development
tags:
  - cli
description: Used as a compiler wrapper and avoids compilation when possible
source-archive: https://github.com/mozilla/sccache/archive/refs/tags/v0.15.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sccache
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sccache
  av: sudo av install brew:sccache
  brew: brew install sccache
  chocolatey: choco install sccache
  debian: sudo apt install sccache
  dnf: sudo dnf install sccache
  macports: sudo port install sccache
  nix: nix profile install nixpkgs#sccache
  pacman: sudo pacman -S sccache
  scoop: scoop install main/sccache
  ubuntu: sudo apt install sccache
  winget: winget install --id Mozilla.sccache -e
  zypper: sudo zypper install sccache
provenance:
  formula: sccache
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
