id: brew:runme
display-name: runme
homepage: https://runme.dev/
repo: https://github.com/runmedev/runme
docs: https://runme.dev/
package-manager:
  brew: runme
  nix: runme
package-manager-url: https://formulae.brew.sh/formula/runme
version: 3.16.11
license: Apache-2.0
category: development
tags:
  - cli
description: Execute commands inside your runbooks, docs, and READMEs
source-archive: https://github.com/runmedev/runme/archive/refs/tags/v3.16.11.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: runme
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:runme
  brew: brew install runme
  nix: nix profile install nixpkgs#runme
provenance:
  formula: runme
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
