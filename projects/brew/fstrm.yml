id: brew:fstrm
display-name: fstrm
homepage: https://github.com/farsightsec/fstrm
repo: https://dl.farsightsecurity.com/dist/fstrm/fstrm-0.6.1.tar.gz
docs: https://github.com/farsightsec/fstrm
package-manager:
  apk: fstrm
  brew: fstrm
  dnf: fstrm
  macports: fstrm
  nix: fstrm
  pacman: fstrm
  zypper: fstrm
package-manager-url: https://formulae.brew.sh/formula/fstrm
version: 0.6.1
license: MIT
category: security
tags:
  - cli
description: Frame Streams implementation in C
source-archive: https://dl.farsightsecurity.com/dist/fstrm/fstrm-0.6.1.tar.gz
dependencies:
  - libevent
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fstrm_capture
  - exposure: global executable
    kind: cli
    name: fstrm_dump
  - exposure: global executable
    kind: cli
    name: fstrm_replay
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fstrm
  av: sudo av install brew:fstrm
  brew: brew install fstrm
  dnf: sudo dnf install fstrm
  macports: sudo port install fstrm
  nix: nix profile install nixpkgs#fstrm
  pacman: sudo pacman -S fstrm
  zypper: sudo zypper install fstrm
provenance:
  formula: fstrm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
