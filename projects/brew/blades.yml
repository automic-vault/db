id: brew:blades
display-name: blades
homepage: https://www.getblades.org/
repo: https://github.com/grego/blades
docs: https://www.getblades.org/
package-manager:
  brew: blades
  macports: blades
package-manager-url: https://formulae.brew.sh/formula/blades
version: 0.6.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Blazing fast dead simple static site generator
source-archive: https://github.com/grego/blades/archive/refs/tags/v0.6.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: blades
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:blades
  brew: brew install blades
  macports: sudo port install blades
provenance:
  formula: blades
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
