id: brew:msolve
display-name: msolve
homepage: https://msolve.lip6.fr
repo: https://github.com/algebraic-solving/msolve
docs: https://msolve.lip6.fr
package-manager:
  brew: msolve
  debian: msolve
  dnf: msolve
  nix: msolve
  pacman: msolve
  ubuntu: msolve
package-manager-url: https://formulae.brew.sh/formula/msolve
version: 0.9.5
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Library for Polynomial System Solving through Algebraic Methods
source-archive: https://github.com/algebraic-solving/msolve/archive/refs/tags/v0.9.5.tar.gz
dependencies:
  - flint
  - gmp
  - libomp
  - mpfr
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: msolve
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:msolve
  brew: brew install msolve
  debian: sudo apt install msolve
  dnf: sudo dnf install msolve
  nix: nix profile install nixpkgs#msolve
  pacman: sudo pacman -S msolve
  ubuntu: sudo apt install msolve
provenance:
  formula: msolve
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
