package-manager-url: https://formulae.brew.sh/formula/streamripper
version: 1.64.6
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Separate tracks via Shoutcasts title-streaming
source-archive: >
  https://downloads.sourceforge.net/project/streamripper/streamripper%20%28current%29/1.64.6/streamripper-1.64.6.tar.gz
dependencies:
  - gettext
  - glib
