id: brew:streamripper
display-name: streamripper
homepage: https://streamripper.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/streamripper/streamripper%20%28current%29/1.64.6/streamripper-1.64.6.tar.gz
docs: https://streamripper.sourceforge.net/
package-manager:
  brew: streamripper
  debian: streamripper
