id: brew:mq
display-name: mq
homepage: https://mqlang.org/
repo: https://github.com/harehare/mq
docs: https://mqlang.org/
package-manager:
  brew: mq
package-manager-url: https://formulae.brew.sh/formula/mq
version: 0.5.31
license: MIT
category: development
tags:
  - cli
description: Jq-like command-line tool for markdown processing
source-archive: https://github.com/harehare/mq/archive/refs/tags/v0.5.31.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mq
  - exposure: global executable
    kind: cli
    name: mq-lsp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mq
  brew: brew install mq
provenance:
  formula: mq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
