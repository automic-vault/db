id: brew:sntop
display-name: sntop
homepage: https://sntop.sourceforge.net/
repo: https://downloads.sourceforge.net/project/sntop/sntop/1.4.3/sntop-1.4.3.tar.gz
docs: https://sntop.sourceforge.net/
package-manager:
  brew: sntop
  debian: sntop
  ubuntu: sntop
package-manager-url: https://formulae.brew.sh/formula/sntop
version: 1.4.3
license: GPL-2.0-only
category: network
tags:
  - cli
description: Curses-based utility that polls hosts to determine connectivity
source-archive: https://downloads.sourceforge.net/project/sntop/sntop/1.4.3/sntop-1.4.3.tar.gz
dependencies:
  - fping
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: sntop
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    sntop uses fping by default and fping can only be run by root by default. You can
    run `sudo sntop` (or `sntop -p` which uses standard ping). You should be certain
    that you trust any software you grant root privileges.
  post-install-defined: false
install-lines:
  av: sudo av install brew:sntop
  brew: brew install sntop
  debian: sudo apt install sntop
  ubuntu: sudo apt install sntop
provenance:
  formula: sntop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
