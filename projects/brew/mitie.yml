id: brew:mitie
display-name: mitie
homepage: https://github.com/mit-nlp/MITIE/
repo: https://github.com/mit-nlp/MITIE
docs: https://github.com/mit-nlp/MITIE/
package-manager:
  brew: mitie
package-manager-url: https://formulae.brew.sh/formula/mitie
version: 0.7
license: BSL-1.0
category: development
tags:
  - cli
description: Library and tools for information extraction
source-archive: https://github.com/mit-nlp/MITIE/archive/refs/tags/v0.7.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: ner_example
  - exposure: global executable
    kind: cli
    name: ner_stream
  - exposure: global executable
    kind: cli
    name: relation_extraction_example
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mitie
  brew: brew install mitie
provenance:
  formula: mitie
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
