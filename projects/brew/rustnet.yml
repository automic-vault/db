id: brew:rustnet
display-name: rustnet
homepage: https://github.com/domcyrus/rustnet
repo: https://github.com/domcyrus/rustnet
docs: https://github.com/domcyrus/rustnet
package-manager:
  brew: rustnet
  nix: rustnet
  pacman: rustnet
  scoop: main/rustnet
package-manager-url: https://formulae.brew.sh/formula/rustnet
version: 1.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Cross-platform network monitoring terminal UI with deep packet inspection
source-archive: https://github.com/domcyrus/rustnet/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - rust
uses-from-macos:
  - libpcap
  - zlib
executables:
  - exposure: global executable
    kind: cli
    name: rustnet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rustnet
  brew: brew install rustnet
  nix: nix profile install nixpkgs#rustnet
  pacman: sudo pacman -S rustnet
  scoop: scoop install main/rustnet
provenance:
  formula: rustnet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
