id: brew:whalebrew
display-name: whalebrew
homepage: https://github.com/whalebrew/whalebrew
repo: https://github.com/whalebrew/whalebrew
docs: https://github.com/whalebrew/whalebrew
package-manager:
  brew: whalebrew
package-manager-url: https://formulae.brew.sh/formula/whalebrew
version: 0.5.0
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: Homebrew, but with Docker images
source-archive: https://github.com/whalebrew/whalebrew/archive/refs/tags/0.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: whalebrew
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:whalebrew
  brew: brew install whalebrew
provenance:
  formula: whalebrew
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
