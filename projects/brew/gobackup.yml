id: brew:gobackup
display-name: gobackup
homepage: https://gobackup.github.io
repo: https://github.com/gobackup/gobackup
docs: https://gobackup.github.io
package-manager:
  brew: gobackup
package-manager-url: https://formulae.brew.sh/formula/gobackup
version: 3.1.0
license: MIT
category: cloud
tags:
  - cli
  - cloud
description: CLI tool for backup your databases, files to cloud storages
source-archive: https://github.com/gobackup/gobackup/archive/refs/tags/v3.1.0.tar.gz
build-dependencies:
  - go
  - node
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: gobackup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gobackup
  brew: brew install gobackup
provenance:
  formula: gobackup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
