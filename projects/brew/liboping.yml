id: brew:liboping
display-name: liboping
homepage: https://noping.cc/
repo: https://noping.cc/files/liboping-1.10.0.tar.bz2
docs: https://noping.cc/
package-manager:
  apk: liboping
  brew: liboping
  debian: oping
  dnf: liboping
  macports: liboping
  nix: liboping
  ubuntu: oping
  zypper: noping
package-manager-url: https://formulae.brew.sh/formula/liboping
version: 1.10.0
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: C library to generate ICMP echo requests
source-archive: https://noping.cc/files/liboping-1.10.0.tar.bz2
uses-from-macos:
  - ncurses
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: noping
  - exposure: global executable
    kind: cli
    name: oping
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: Run oping and noping sudo'ed in order to avoid the 'Operation not permitted'
  post-install-defined: false
install-lines:
  apk: sudo apk add liboping
  av: sudo av install brew:liboping
  brew: brew install liboping
  debian: sudo apt install oping
  dnf: sudo dnf install liboping
  macports: sudo port install liboping
  nix: nix profile install nixpkgs#liboping
  ubuntu: sudo apt install oping
  zypper: sudo zypper install noping
provenance:
  formula: liboping
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
