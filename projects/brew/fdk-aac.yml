id: brew:fdk-aac
display-name: fdk-aac
homepage: https://sourceforge.net/projects/opencore-amr/
repo: https://downloads.sourceforge.net/project/opencore-amr/fdk-aac/fdk-aac-2.0.3.tar.gz
docs: https://sourceforge.net/projects/opencore-amr/
package-manager:
  apk: fdk-aac
  brew: fdk-aac
  debian: aac-enc
  nix: fdk_aac
  ubuntu: aac-enc
package-manager-url: https://formulae.brew.sh/formula/fdk-aac
version: 2.0.3
license: Apache-2.0
category: network
tags:
  - cli
description: Standalone library of the Fraunhofer FDK AAC code from Android
source-archive: https://downloads.sourceforge.net/project/opencore-amr/fdk-aac/fdk-aac-2.0.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: aac-enc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fdk-aac
  av: sudo av install brew:fdk-aac
  brew: brew install fdk-aac
  debian: sudo apt install aac-enc
  nix: nix profile install nixpkgs#fdk_aac
  ubuntu: sudo apt install aac-enc
provenance:
  formula: fdk-aac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
