id: brew:transmission-cli
display-name: transmission-cli
homepage: https://transmissionbt.com/
repo: https://github.com/transmission/transmission
docs: https://transmissionbt.com/
package-manager:
  apk: transmission-cli
  brew: transmission-cli
  debian: transmission-cli
  dnf: transmission-cli
  pacman: transmission-cli
  scoop: main/transmission-cli
  ubuntu: transmission-cli
  zypper: transmission-daemon
package-manager-url: https://formulae.brew.sh/formula/transmission-cli
version: 4.1.1
license: GPL-2.0-only OR GPL-3.0-only
category: development
tags:
  - cli
description: Lightweight BitTorrent client
source-archive: >
  https://github.com/transmission/transmission/releases/download/4.1.1/transmission-4.1.1.tar.xz
dependencies:
  - libevent
  - miniupnpc
build-dependencies:
  - cmake
  - gettext
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: transmission-cli
  - exposure: global executable
    kind: cli
    name: transmission-create
  - exposure: global executable
    kind: cli
    name: transmission-daemon
  - exposure: global executable
    kind: cli
    name: transmission-edit
  - exposure: global executable
    kind: cli
    name: transmission-remote
  - exposure: global executable
    kind: cli
    name: transmission-show
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This formula only installs the command line utilities. Transmission.app can be
    downloaded directly from the website: https://www.transmissionbt.com/ Alternatively,
    install with Homebrew Cask: brew install --cask transmission
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add transmission-cli
  av: sudo av install brew:transmission-cli
  brew: brew install transmission-cli
  debian: sudo apt install transmission-cli
  dnf: sudo dnf install transmission-cli
  pacman: sudo pacman -S transmission-cli
  scoop: scoop install main/transmission-cli
  ubuntu: sudo apt install transmission-cli
  zypper: sudo zypper install transmission-daemon
provenance:
  formula: transmission-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
