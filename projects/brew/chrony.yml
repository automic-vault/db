id: brew:chrony
display-name: chrony
homepage: https://chrony-project.org
repo: https://chrony-project.org/releases/chrony-4.8.tar.gz
docs: https://chrony-project.org
package-manager:
  apk: chrony
  brew: chrony
  debian: chrony
  dnf: chrony
  macports: chrony
  nix: chrony
  pacman: chrony
  ubuntu: chrony
  zypper: chrony
package-manager-url: https://formulae.brew.sh/formula/chrony
version: 4.8
license: GPL-2.0-only
category: network
tags:
  - cli
description: Versatile implementation of the Network Time Protocol (NTP)
source-archive: https://chrony-project.org/releases/chrony-4.8.tar.gz
dependencies:
  - gnutls
  - nettle
build-dependencies:
  - pkgconf
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: chronyc
  - exposure: global executable
    kind: cli
    name: chronyd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add chrony
  av: sudo av install brew:chrony
  brew: brew install chrony
  debian: sudo apt install chrony
  dnf: sudo dnf install chrony
  macports: sudo port install chrony
  nix: nix profile install nixpkgs#chrony
  pacman: sudo pacman -S chrony
  ubuntu: sudo apt install chrony
  zypper: sudo zypper install chrony
provenance:
  formula: chrony
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
