id: brew:katago
display-name: katago
homepage: https://github.com/lightvector/KataGo
repo: https://github.com/lightvector/KataGo
docs: https://github.com/lightvector/KataGo
package-manager:
  brew: katago
  dnf: katago
  nix: katago
package-manager-url: https://formulae.brew.sh/formula/katago
version: 1.16.4
license: MIT AND CC0-1.0
category: development
tags:
  - cli
description: Neural Network Go engine with no human-provided knowledge
source-archive: https://github.com/lightvector/KataGo/archive/refs/tags/v1.16.4.tar.gz
dependencies:
  - libzip
build-dependencies:
  - cmake
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: katago
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:katago
  brew: brew install katago
  dnf: sudo dnf install katago
  nix: nix profile install nixpkgs#katago
provenance:
  formula: katago
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
