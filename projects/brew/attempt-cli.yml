id: brew:attempt-cli
display-name: attempt-cli
homepage: https://github.com/MaxBondABE/attempt
repo: https://github.com/MaxBondABE/attempt
docs: https://github.com/MaxBondABE/attempt
package-manager:
  brew: attempt-cli
package-manager-url: https://formulae.brew.sh/formula/attempt-cli
version: 1.1.1
license: Unlicense
category: development
tags:
  - cli
description: CLI for retrying fallible commands
source-archive: https://github.com/MaxBondABE/attempt/archive/refs/tags/v1.1.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: attempt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:attempt-cli
  brew: brew install attempt-cli
provenance:
  formula: attempt-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
