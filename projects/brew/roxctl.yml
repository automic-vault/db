id: brew:roxctl
display-name: roxctl
homepage: https://www.stackrox.io/
repo: https://github.com/stackrox/stackrox
docs: https://www.stackrox.io/
package-manager:
  brew: roxctl
  nix: roxctl
package-manager-url: https://formulae.brew.sh/formula/roxctl
version: 4.10.3
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for Stackrox
source-archive: https://github.com/stackrox/stackrox/archive/refs/tags/4.10.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: roxctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:roxctl
  brew: brew install roxctl
  nix: nix profile install nixpkgs#roxctl
provenance:
  formula: roxctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
