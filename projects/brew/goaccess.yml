id: brew:goaccess
display-name: goaccess
homepage: https://goaccess.io/
repo: https://tar.goaccess.io/goaccess-1.10.2.tar.gz
docs: https://goaccess.io/
package-manager:
  apk: goaccess
  brew: goaccess
  debian: goaccess
  dnf: goaccess
  macports: goaccess
  nix: goaccess
  pacman: goaccess
  ubuntu: goaccess
  zypper: goaccess
package-manager-url: https://formulae.brew.sh/formula/goaccess
version: 1.10.2
license: MIT
category: network
tags:
  - cli
description: Log analyzer and interactive viewer for the Apache Webserver
source-archive: https://tar.goaccess.io/goaccess-1.10.2.tar.gz
dependencies:
  - gettext
  - libmaxminddb
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: goaccess
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add goaccess
  av: sudo av install brew:goaccess
  brew: brew install goaccess
  debian: sudo apt install goaccess
  dnf: sudo dnf install goaccess
  macports: sudo port install goaccess
  nix: nix profile install nixpkgs#goaccess
  pacman: sudo pacman -S goaccess
  ubuntu: sudo apt install goaccess
  zypper: sudo zypper install goaccess
provenance:
  formula: goaccess
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
