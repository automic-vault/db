id: brew:ddrescue
display-name: ddrescue
homepage: https://www.gnu.org/software/ddrescue/ddrescue.html
repo: https://ftpmirror.gnu.org/gnu/ddrescue/ddrescue-1.30.tar.lz
docs: https://www.gnu.org/software/ddrescue/ddrescue.html
package-manager:
  apk: ddrescue
  brew: ddrescue
  dnf: ddrescue
  macports: ddrescue
  nix: ddrescue
  pacman: ddrescue
package-manager-url: https://formulae.brew.sh/formula/ddrescue
version: 1.30
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: GNU data recovery tool
source-archive: https://ftpmirror.gnu.org/gnu/ddrescue/ddrescue-1.30.tar.lz
executables:
  - exposure: global executable
    kind: cli
    name: ddrescue
  - exposure: global executable
    kind: cli
    name: ddrescuelog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ddrescue
  av: sudo av install brew:ddrescue
  brew: brew install ddrescue
  dnf: sudo dnf install ddrescue
  macports: sudo port install ddrescue
  nix: nix profile install nixpkgs#ddrescue
  pacman: sudo pacman -S ddrescue
provenance:
  formula: ddrescue
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
