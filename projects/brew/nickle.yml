id: brew:nickle
display-name: nickle
homepage: https://www.nickle.org/
repo: https://nickle.org/release/nickle-2.108.tar.xz
docs: https://www.nickle.org/
package-manager:
  apk: nickle
  brew: nickle
  debian: nickle
  dnf: nickle
  macports: nickle
  pacman: nickle
  ubuntu: nickle
package-manager-url: https://formulae.brew.sh/formula/nickle
version: 2.108
license: MIT
category: development
tags:
  - cli
description: Desk calculator language
source-archive: https://nickle.org/release/nickle-2.108.tar.xz
dependencies:
  - gmp
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: nickle
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nickle
  av: sudo av install brew:nickle
  brew: brew install nickle
  debian: sudo apt install nickle
  dnf: sudo dnf install nickle
  macports: sudo port install nickle
  pacman: sudo pacman -S nickle
  ubuntu: sudo apt install nickle
provenance:
  formula: nickle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
