id: brew:bartib
display-name: bartib
homepage: https://github.com/nikolassv/bartib
repo: https://github.com/nikolassv/bartib
docs: https://github.com/nikolassv/bartib
package-manager:
  apk: bartib
  brew: bartib
  macports: bartib
  nix: bartib
package-manager-url: https://formulae.brew.sh/formula/bartib
version: 1.1.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Simple timetracker for the command-line
source-archive: https://github.com/nikolassv/bartib/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bartib
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bartib
  av: sudo av install brew:bartib
  brew: brew install bartib
  macports: sudo port install bartib
  nix: nix profile install nixpkgs#bartib
provenance:
  formula: bartib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
