id: brew:dug
display-name: dug
homepage: https://dug.unfrl.com
repo: https://github.com/unfrl/dug
docs: https://dug.unfrl.com
package-manager:
  brew: dug
package-manager-url: https://formulae.brew.sh/formula/dug
version: 0.0.100
license: MIT
category: development
tags:
  - cli
description: Global DNS propagation checker that gives pretty output
source-archive: https://github.com/unfrl/dug/archive/refs/tags/0.0.100.tar.gz
dependencies:
  - dotnet
executables:
  - exposure: global executable
    kind: cli
    name: dug
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dug
  brew: brew install dug
provenance:
  formula: dug
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
