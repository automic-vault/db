id: brew:fzf
display-name: fzf
homepage: https://github.com/junegunn/fzf
repo: https://github.com/junegunn/fzf
docs: https://github.com/junegunn/fzf
package-manager:
  apk: fzf
  brew: fzf
  chocolatey: fzf
  debian: fzf
  dnf: fzf
  macports: fzf
  nix: fzf
  pacman: fzf
  scoop: main/fzf
  ubuntu: fzf
  winget: junegunn.fzf
  zypper: fzf
package-manager-url: https://formulae.brew.sh/formula/fzf
version: 0.73.1
license: MIT
category: development
tags:
  - cli
description: Command-line fuzzy finder written in Go
source-archive: https://github.com/junegunn/fzf/archive/refs/tags/v0.73.1.tar.gz
build-dependencies:
  - go
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: fzf
  - exposure: global executable
    kind: cli
    name: fzf-preview.sh
  - exposure: global executable
    kind: cli
    name: fzf-tmux
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To set up shell integration, see:
    https://github.com/junegunn/fzf#setting-up-shell-integration To use fzf in Vim, add
    the following line to your .vimrc: set rtp+=$HOMEBREW_PREFIX/opt/fzf
  post-install-defined: false
install-lines:
  apk: sudo apk add fzf
  av: sudo av install brew:fzf
  brew: brew install fzf
  chocolatey: choco install fzf
  debian: sudo apt install fzf
  dnf: sudo dnf install fzf
  macports: sudo port install fzf
  nix: nix profile install nixpkgs#fzf
  pacman: sudo pacman -S fzf
  scoop: scoop install main/fzf
  ubuntu: sudo apt install fzf
  winget: winget install --id junegunn.fzf -e
  zypper: sudo zypper install fzf
provenance:
  formula: fzf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
