id: brew:jaq
display-name: jaq
homepage: https://github.com/01mf02/jaq
repo: https://github.com/01mf02/jaq
docs: https://github.com/01mf02/jaq
package-manager:
  apk: jaq
  brew: jaq
  macports: jaq
  nix: jaq
  pacman: jaq
  scoop: main/jaq
  zypper: jaq
package-manager-url: https://formulae.brew.sh/formula/jaq
version: 3.0.0
license: MIT
category: development
tags:
  - cli
description: JQ clone focussed on correctness, speed, and simplicity
source-archive: https://github.com/01mf02/jaq/archive/refs/tags/v3.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: jaq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jaq
  av: sudo av install brew:jaq
  brew: brew install jaq
  macports: sudo port install jaq
  nix: nix profile install nixpkgs#jaq
  pacman: sudo pacman -S jaq
  scoop: scoop install main/jaq
  zypper: sudo zypper install jaq
provenance:
  formula: jaq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
