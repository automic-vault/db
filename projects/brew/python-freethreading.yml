id: brew:python-freethreading
display-name: python-freethreading
homepage: https://www.python.org/
repo: https://www.python.org/ftp/python/3.14.5/Python-3.14.5.tgz
docs: https://www.python.org/
package-manager:
  brew: python-freethreading
package-manager-url: https://formulae.brew.sh/formula/python-freethreading
version: 3.14.5
license: Python-2.0
category: development
tags:
  - cli
description: Interpreted, interactive, object-oriented programming language
source-archive: https://www.python.org/ftp/python/3.14.5/Python-3.14.5.tgz
dependencies:
  - mpdecimal
  - openssl@3
  - sqlite
  - xz
  - zstd
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
  - expat
  - libedit
  - libffi
  - libxcrypt
  - ncurses
  - unzip
executables:
  - exposure: global executable
    kind: cli
    name: idle3.14t
  - exposure: global executable
    kind: cli
    name: pip3.14t
  - exposure: global executable
    kind: cli
    name: pydoc3.14t
  - exposure: global executable
    kind: cli
    name: python3.14t
  - exposure: global executable
    kind: cli
    name: python3.14t-config
  - exposure: global executable
    kind: cli
    name: wheel3.14t
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Python has been installed as $HOMEBREW_PREFIX/bin/python3.14t See:
    https://docs.brew.sh/Homebrew-and-Python
  post-install-defined: false
install-lines:
  av: sudo av install brew:python-freethreading
  brew: brew install python-freethreading
provenance:
  formula: python-freethreading
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
