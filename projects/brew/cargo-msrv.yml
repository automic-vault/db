id: brew:cargo-msrv
display-name: cargo-msrv
homepage: https://foresterre.github.io/cargo-msrv
repo: https://github.com/foresterre/cargo-msrv
docs: https://foresterre.github.io/cargo-msrv
package-manager:
  brew: cargo-msrv
  nix: cargo-msrv
  pacman: cargo-msrv
package-manager-url: https://formulae.brew.sh/formula/cargo-msrv
version: 0.19.3
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Find the minimum supported Rust version (MSRV) for your project
source-archive: https://github.com/foresterre/cargo-msrv/archive/refs/tags/v0.19.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-msrv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-msrv
  brew: brew install cargo-msrv
  nix: nix profile install nixpkgs#cargo-msrv
  pacman: sudo pacman -S cargo-msrv
provenance:
  formula: cargo-msrv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
