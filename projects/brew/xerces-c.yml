id: brew:xerces-c
display-name: xerces-c
homepage: https://xerces.apache.org/xerces-c/
repo: https://www.apache.org/dyn/closer.lua?path=xerces/c/3/sources/xerces-c-3.3.0.tar.gz
docs: https://xerces.apache.org/xerces-c/
package-manager:
  apk: xerces-c
  brew: xerces-c
  dnf: xerces-c
  pacman: xerces-c
  zypper: xerces-c
package-manager-url: https://formulae.brew.sh/formula/xerces-c
version: 3.3.0
license: Apache-2.0
category: network
tags:
  - cli
description: Validating XML parser
source-archive: https://www.apache.org/dyn/closer.lua?path=xerces/c/3/sources/xerces-c-3.3.0.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: CreateDOMDocument
  - exposure: global executable
    kind: cli
    name: DOMCount
  - exposure: global executable
    kind: cli
    name: DOMPrint
  - exposure: global executable
    kind: cli
    name: EnumVal
  - exposure: global executable
    kind: cli
    name: PParse
  - exposure: global executable
    kind: cli
    name: PSVIWriter
  - exposure: global executable
    kind: cli
    name: Redirect
  - exposure: global executable
    kind: cli
    name: SAX2Count
  - exposure: global executable
    kind: cli
    name: SAX2Print
  - exposure: global executable
    kind: cli
    name: SAXCount
  - exposure: global executable
    kind: cli
    name: SAXPrint
  - exposure: global executable
    kind: cli
    name: SCMPrint
  - exposure: global executable
    kind: cli
    name: SEnumVal
  - exposure: global executable
    kind: cli
    name: StdInParse
  - exposure: global executable
    kind: cli
    name: XInclude
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xerces-c
  av: sudo av install brew:xerces-c
  brew: brew install xerces-c
  dnf: sudo dnf install xerces-c
  pacman: sudo pacman -S xerces-c
  zypper: sudo zypper install xerces-c
provenance:
  formula: xerces-c
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
