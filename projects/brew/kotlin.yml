id: brew:kotlin
display-name: kotlin
homepage: https://kotlinlang.org/
repo: https://github.com/JetBrains/kotlin
docs: https://kotlinlang.org/
package-manager:
  brew: kotlin
  chocolatey: kotlinc
  debian: kotlin
  macports: kotlin
  nix: kotlin
  pacman: kotlin
  scoop: main/kotlin
  ubuntu: kotlin
package-manager-url: https://formulae.brew.sh/formula/kotlin
version: 2.3.21
license: Apache-2.0
category: development
tags:
  - cli
description: Statically typed programming language for the JVM
source-archive: https://github.com/JetBrains/kotlin/releases/download/v2.3.21/kotlin-compiler-2.3.21.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: kapt
  - exposure: global executable
    kind: cli
    name: kotlin
  - exposure: global executable
    kind: cli
    name: kotlinc
  - exposure: global executable
    kind: cli
    name: kotlinc-js
  - exposure: global executable
    kind: cli
    name: kotlinc-jvm
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kotlin
  brew: brew install kotlin
  chocolatey: choco install kotlinc
  debian: sudo apt install kotlin
  macports: sudo port install kotlin
  nix: nix profile install nixpkgs#kotlin
  pacman: sudo pacman -S kotlin
  scoop: scoop install main/kotlin
  ubuntu: sudo apt install kotlin
provenance:
  formula: kotlin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
