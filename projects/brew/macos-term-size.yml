    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:macos-term-size
  brew: brew install macos-term-size
provenance:
  formula: macos-term-size
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
