id: brew:macos-term-size
display-name: macos-term-size
homepage: https://github.com/sindresorhus/macos-terminal-size
repo: https://github.com/sindresorhus/macos-terminal-size
docs: https://github.com/sindresorhus/macos-terminal-size
package-manager:
  brew: macos-term-size
package-manager-url: https://formulae.brew.sh/formula/macos-term-size
version: 1.0.0
license: MIT
category: development
tags:
  - cli
description: Get the terminal window size on macOS
source-archive: https://github.com/sindresorhus/macos-terminal-size/archive/refs/tags/v1.0.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: term-size
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
