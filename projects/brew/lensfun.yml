id: brew:lensfun
display-name: lensfun
homepage: https://lensfun.github.io/
repo: https://github.com/lensfun/lensfun
docs: https://lensfun.github.io/
package-manager:
  apk: lensfun
  brew: lensfun
  dnf: lensfun
  macports: lensfun
  nix: lensfun
  pacman: lensfun
package-manager-url: https://formulae.brew.sh/formula/lensfun
version: 0.3.4
license: LGPL-3.0-only AND GPL-3.0-only AND CC-BY-3.0 AND LicenseRef-Homebrew-public-domain
category: development
tags:
  - cli
description: Remove defects from digital images
source-archive: https://github.com/lensfun/lensfun/archive/refs/tags/v0.3.4.tar.gz
dependencies:
  - gettext
  - glib
  - libpng
  - python@3.14
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: g-lensfun-update-data
  - exposure: global executable
    kind: cli
    name: lensfun-add-adapter
  - exposure: global executable
    kind: cli
    name: lensfun-update-data
  - exposure: global executable
    kind: cli
    name: lenstool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lensfun
  av: sudo av install brew:lensfun
  brew: brew install lensfun
  dnf: sudo dnf install lensfun
  macports: sudo port install lensfun
  nix: nix profile install nixpkgs#lensfun
  pacman: sudo pacman -S lensfun
provenance:
  formula: lensfun
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
