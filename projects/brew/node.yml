id: brew:node
display-name: node
homepage: https://nodejs.org/
repo: https://nodejs.org/dist/v26.0.0/node-v26.0.0.tar.xz
docs: https://nodejs.org/
package-manager:
  apk: nodejs
  brew: node
  chocolatey: nodejs
  debian: nodejs
  dnf: nodejs24
  macports: nodejs24
  nix: nodejs
  pacman: nodejs
  scoop: main/nodejs
  ubuntu: nodejs
  winget: OpenJS.NodeJS
  zypper: nodejs24
package-manager-url: https://formulae.brew.sh/formula/node
version: 26.0.0
license: MIT
category: network
tags:
  - cli
description: Open-source, cross-platform JavaScript runtime environment
source-archive: https://nodejs.org/dist/v26.0.0/node-v26.0.0.tar.xz
dependencies:
  - ada-url
  - brotli
  - c-ares
  - hdrhistogram_c
  - icu4c@78
  - libnghttp2
  - libnghttp3
  - libngtcp2
  - libuv
  - llhttp
  - merve
  - nbytes
  - openssl@3
  - simdjson
  - sqlite
  - uvwasi
  - zstd
build-dependencies:
  - pkgconf
  - python@3.14
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: node
  - exposure: global executable
    kind: cli
    name: npm
  - exposure: global executable
    kind: cli
    name: npx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add nodejs
  av: sudo av install brew:node
  brew: brew install node
  chocolatey: choco install nodejs
  debian: sudo apt install nodejs
  dnf: sudo dnf install nodejs24
  macports: sudo port install nodejs24
  nix: nix profile install nixpkgs#nodejs
  pacman: sudo pacman -S nodejs
  scoop: scoop install main/nodejs
  ubuntu: sudo apt install nodejs
  winget: winget install --id OpenJS.NodeJS -e
  zypper: sudo zypper install nodejs24
provenance:
  formula: node
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
