id: brew:derby
display-name: derby
homepage: https://db.apache.org/derby/
repo: >
  https://www.apache.org/dyn/closer.lua?path=db/derby/db-derby-10.17.1.0/db-derby-10.17.1.0-bin.tar.gz
docs: https://db.apache.org/derby/
package-manager:
  brew: derby
  macports: derby
  zypper: sysinfo
package-manager-url: https://formulae.brew.sh/formula/derby
version: 10.17.1.0
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Apache Derby is an embedded relational database running on JVM
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=db/derby/db-derby-10.17.1.0/db-derby-10.17.1.0-bin.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: NetworkServerControl
  - exposure: global executable
    kind: cli
    name: dblook
  - exposure: global executable
    kind: cli
    name: ij
  - exposure: global executable
    kind: cli
    name: setEmbeddedCP
  - exposure: global executable
    kind: cli
    name: setNetworkClientCP
  - exposure: global executable
    kind: cli
    name: setNetworkServerCP
  - exposure: global executable
    kind: cli
    name: startNetworkServer
  - exposure: global executable
    kind: cli
    name: stopNetworkServer
  - exposure: global executable
    kind: cli
    name: sysinfo
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:derby
  brew: brew install derby
  macports: sudo port install derby
  zypper: sudo zypper install sysinfo
provenance:
  formula: derby
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
