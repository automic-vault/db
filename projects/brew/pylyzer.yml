id: brew:pylyzer
display-name: pylyzer
homepage: https://github.com/mtshiba/pylyzer
repo: https://github.com/mtshiba/pylyzer
docs: https://github.com/mtshiba/pylyzer
package-manager:
  brew: pylyzer
  nix: pylyzer
package-manager-url: https://formulae.brew.sh/formula/pylyzer
version: 0.0.82
license: MIT
category: development
tags:
  - cli
description: Fast static code analyzer & language server for Python
source-archive: https://github.com/mtshiba/pylyzer/archive/refs/tags/v0.0.82.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: pylyzer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pylyzer
  brew: brew install pylyzer
  nix: nix profile install nixpkgs#pylyzer
provenance:
  formula: pylyzer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
