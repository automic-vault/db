id: brew:vmdktool
display-name: vmdktool
homepage: https://manned.org/vmdktool
repo: https://people.freebsd.org/~brian/vmdktool/vmdktool-1.4.tar.gz
docs: https://manned.org/vmdktool
package-manager:
  brew: vmdktool
  macports: vmdktool
package-manager-url: https://formulae.brew.sh/formula/vmdktool
version: 1.4
license: BSD-2-Clause
category: network
tags:
  - cli
description: Converts raw filesystems to VMDK files and vice versa
source-archive: https://people.freebsd.org/~brian/vmdktool/vmdktool-1.4.tar.gz
build-dependencies:
  - groff
executables:
  - exposure: global executable
    kind: cli
    name: vmdktool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vmdktool
  brew: brew install vmdktool
  macports: sudo port install vmdktool
provenance:
  formula: vmdktool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
