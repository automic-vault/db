id: brew:screen
display-name: screen
homepage: https://www.gnu.org/software/screen/
repo: https://ftpmirror.gnu.org/gnu/screen/screen-5.0.1.tar.gz
docs: https://www.gnu.org/software/screen/
package-manager:
  apk: screen
  brew: screen
  debian: screen
  dnf: screen
  macports: screen
  nix: screen
  pacman: screen
  ubuntu: screen
  zypper: screen
package-manager-url: https://formulae.brew.sh/formula/screen
version: 5.0.1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Terminal multiplexer with VT100/ANSI terminal emulation
source-archive: https://ftpmirror.gnu.org/gnu/screen/screen-5.0.1.tar.gz
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - libxcrypt
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: screen
  - exposure: global executable
    kind: cli
    name: screen-5.0.1
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add screen
  av: sudo av install brew:screen
  brew: brew install screen
  debian: sudo apt install screen
  dnf: sudo dnf install screen
  macports: sudo port install screen
  nix: nix profile install nixpkgs#screen
  pacman: sudo pacman -S screen
  ubuntu: sudo apt install screen
  zypper: sudo zypper install screen
provenance:
  formula: screen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
