id: brew:pixi-pack
display-name: pixi-pack
homepage: https://pixi.sh/latest/advanced/production_deployment/#pixi-pack
repo: https://github.com/quantco/pixi-pack
docs: https://pixi.sh/latest/advanced/production_deployment/#pixi-pack
package-manager:
  brew: pixi-pack
  nix: pixi-pack
package-manager-url: https://formulae.brew.sh/formula/pixi-pack
version: 0.7.9
license: BSD-3-Clause
category: development
tags:
  - cli
description: Pack and unpack conda environments created with pixi
source-archive: https://github.com/quantco/pixi-pack/archive/refs/tags/v0.7.9.tar.gz
build-dependencies:
  - cmake
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: pixi-pack
  - exposure: global executable
    kind: cli
    name: pixi-unpack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pixi-pack
  brew: brew install pixi-pack
  nix: nix profile install nixpkgs#pixi-pack
provenance:
  formula: pixi-pack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
