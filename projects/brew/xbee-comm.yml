id: brew:xbee-comm
display-name: xbee-comm
homepage: https://github.com/guyzmo/xbee-comm
repo: https://github.com/guyzmo/xbee-comm
docs: https://github.com/guyzmo/xbee-comm
package-manager:
  brew: xbee-comm
package-manager-url: https://formulae.brew.sh/formula/xbee-comm
version: 1.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: XBee communication libraries and utilities
source-archive: https://github.com/guyzmo/xbee-comm/archive/refs/tags/v1.5.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: xbfwup
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xbee-comm
  brew: brew install xbee-comm
provenance:
  formula: xbee-comm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
