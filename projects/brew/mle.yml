id: brew:mle
display-name: mle
homepage: https://github.com/adsr/mle
repo: https://github.com/adsr/mle
docs: https://github.com/adsr/mle
package-manager:
  apk: mle
  brew: mle
  debian: mle
  dnf: mle
  macports: mle
  nix: mle
  ubuntu: mle
package-manager-url: https://formulae.brew.sh/formula/mle
version: 1.8.1
license: Apache-2.0
category: development
tags:
  - cli
description: Flexible terminal-based text editor
source-archive: https://github.com/adsr/mle/archive/refs/tags/v1.8.1.tar.gz
dependencies:
  - lua
  - pcre2
build-dependencies:
  - uthash
executables:
  - exposure: global executable
    kind: cli
    name: mle
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mle
  av: sudo av install brew:mle
  brew: brew install mle
  debian: sudo apt install mle
  dnf: sudo dnf install mle
  macports: sudo port install mle
  nix: nix profile install nixpkgs#mle
  ubuntu: sudo apt install mle
provenance:
  formula: mle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
