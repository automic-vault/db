id: brew:wget2
display-name: wget2
homepage: https://gitlab.com/gnuwget/wget2
repo: https://ftpmirror.gnu.org/gnu/wget/wget2-2.2.1.tar.gz
docs: https://gitlab.com/gnuwget/wget2
package-manager:
  apk: wget2
  brew: wget2
  debian: wget2
  dnf: wget2
  macports: wget2
  nix: wget2
  scoop: main/wget2
  ubuntu: wget2
  winget: GNU.Wget2
  zypper: wget2
package-manager-url: https://formulae.brew.sh/formula/wget2
version: 2.2.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Successor of GNU Wget, a file and recursive website downloader
source-archive: https://ftpmirror.gnu.org/gnu/wget/wget2-2.2.1.tar.gz
dependencies:
  - brotli
  - gettext
  - gnutls
  - gpgme
  - libidn2
  - libnghttp2
  - libpsl
  - lzlib
  - pcre2
  - xz
  - zstd
build-dependencies:
  - doxygen
  - gnu-sed
  - graphviz
  - pandoc
  - pkgconf
  - texinfo
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: wget2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wget2
  av: sudo av install brew:wget2
  brew: brew install wget2
  debian: sudo apt install wget2
  dnf: sudo dnf install wget2
  macports: sudo port install wget2
  nix: nix profile install nixpkgs#wget2
  scoop: scoop install main/wget2
  ubuntu: sudo apt install wget2
  winget: winget install --id GNU.Wget2 -e
  zypper: sudo zypper install wget2
provenance:
  formula: wget2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
