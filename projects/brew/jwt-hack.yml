id: brew:jwt-hack
display-name: jwt-hack
homepage: https://github.com/hahwul/jwt-hack
repo: https://github.com/hahwul/jwt-hack
docs: https://github.com/hahwul/jwt-hack
package-manager:
  brew: jwt-hack
  nix: jwt-hack
package-manager-url: https://formulae.brew.sh/formula/jwt-hack
version: 2.5.0
license: MIT
category: development
tags:
  - cli
  - json
description: JSON Web Token Hack Toolkit
source-archive: https://github.com/hahwul/jwt-hack/archive/refs/tags/v2.5.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: jwt-hack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jwt-hack
  brew: brew install jwt-hack
  nix: nix profile install nixpkgs#jwt-hack
provenance:
  formula: jwt-hack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
