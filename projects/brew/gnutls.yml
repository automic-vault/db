id: brew:gnutls
display-name: gnutls
homepage: https://gnutls.org/
repo: https://www.gnupg.org/ftp/gcrypt/gnutls/v3.8/gnutls-3.8.13.tar.xz
docs: https://gnutls.org/
package-manager:
  apk: gnutls
  brew: gnutls
  dnf: gnutls
  macports: gnutls
  nix: gnutls
  pacman: gnutls
  scoop: main/gnutls
  zypper: gnutls
package-manager-url: https://formulae.brew.sh/formula/gnutls
version: 3.8.13
license: LGPL-2.1-or-later AND GPL-3.0-only
category: security
tags:
  - cli
  - security
description: GNU Transport Layer Security (TLS) Library
source-archive: https://www.gnupg.org/ftp/gcrypt/gnutls/v3.8/gnutls-3.8.13.tar.xz
dependencies:
  - ca-certificates
  - gettext
  - gmp
  - libidn2
  - libtasn1
  - libunistring
  - nettle
  - p11-kit
build-dependencies:
  - pkgconf
  - texinfo
executables:
  - exposure: global executable
    kind: cli
    name: gnutls-certtool
  - exposure: global executable
    kind: cli
    name: gnutls-cli
  - exposure: global executable
    kind: cli
    name: gnutls-cli-debug
  - exposure: global executable
    kind: cli
    name: gnutls-serv
  - exposure: global executable
    kind: cli
    name: ocsptool
  - exposure: global executable
    kind: cli
    name: p11tool
  - exposure: global executable
    kind: cli
    name: psktool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: Guile bindings are now in the `guile-gnutls` formula.
  post-install-defined: true
install-lines:
  apk: sudo apk add gnutls
  av: sudo av install brew:gnutls
  brew: brew install gnutls
  dnf: sudo dnf install gnutls
  macports: sudo port install gnutls
  nix: nix profile install nixpkgs#gnutls
  pacman: sudo pacman -S gnutls
  scoop: scoop install main/gnutls
  zypper: sudo zypper install gnutls
provenance:
  formula: gnutls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
