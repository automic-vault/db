id: brew:comby
display-name: comby
homepage: https://comby.dev
repo: https://github.com/comby-tools/comby
docs: https://comby.dev
package-manager:
  brew: comby
  nix: comby
package-manager-url: https://formulae.brew.sh/formula/comby
version: 1.8.1
license: Apache-2.0
category: development
tags:
  - cli
description: Tool for changing code across many languages
source-archive: https://github.com/comby-tools/comby/archive/refs/tags/1.8.1.tar.gz
dependencies:
  - gmp
  - libev
  - pcre
build-dependencies:
  - autoconf
  - gmp
  - ocaml@4
  - opam
  - pkgconf
uses-from-macos:
  - m4
  - sqlite
  - unzip
executables:
  - exposure: global executable
    kind: cli
    name: comby
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:comby
  brew: brew install comby
  nix: nix profile install nixpkgs#comby
provenance:
  formula: comby
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
