id: brew:pam-u2f
display-name: pam-u2f
homepage: https://developers.yubico.com/pam-u2f/
repo: https://developers.yubico.com/pam-u2f/Releases/pam_u2f-1.4.0.tar.gz
docs: https://developers.yubico.com/pam-u2f/
package-manager:
  apk: pam-u2f
  brew: pam-u2f
  debian: pamu2fcfg
  dnf: pam-u2f
  macports: pam-u2f
  nix: pam_u2f
  pacman: pam-u2f
  ubuntu: pamu2fcfg
  zypper: pam_u2f
package-manager-url: https://formulae.brew.sh/formula/pam-u2f
version: 1.4.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Provides an easy way to use U2F-compliant authenticators with PAM
source-archive: https://developers.yubico.com/pam-u2f/Releases/pam_u2f-1.4.0.tar.gz
dependencies:
  - libfido2
  - openssl@3
build-dependencies:
  - asciidoc
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pamu2fcfg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To use a U2F key for PAM authentication, specify the full path to the module
    ($HOMEBREW_PREFIX/opt/pam-u2f/lib/pam/pam_u2f.so) in a PAM configuration. You can
    find all PAM configurations in /etc/pam.d. For further installation instructions,
    please visit https://developers.yubico.com/pam-u2f/#installation.
  post-install-defined: false
install-lines:
  apk: sudo apk add pam-u2f
  av: sudo av install brew:pam-u2f
  brew: brew install pam-u2f
  debian: sudo apt install pamu2fcfg
  dnf: sudo dnf install pam-u2f
  macports: sudo port install pam-u2f
  nix: nix profile install nixpkgs#pam_u2f
  pacman: sudo pacman -S pam-u2f
  ubuntu: sudo apt install pamu2fcfg
  zypper: sudo zypper install pam_u2f
provenance:
  formula: pam-u2f
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
