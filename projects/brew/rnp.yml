id: brew:rnp
display-name: rnp
homepage: https://github.com/rnpgp/rnp
repo: https://github.com/rnpgp/rnp
docs: https://github.com/rnpgp/rnp
package-manager:
  apk: rnp
  brew: rnp
  debian: rnp
  dnf: rnp
  nix: rnp
  ubuntu: rnp
  winget: r12f.Rnp
  zypper: rnp
package-manager-url: https://formulae.brew.sh/formula/rnp
version: 0.18.1
license: MIT AND BSD-2-Clause AND BSD-3-Clause
category: development
tags:
  - cli
description: High performance C++ OpenPGP library used by Mozilla Thunderbird
source-archive: https://github.com/rnpgp/rnp/releases/download/v0.18.1/rnp-v0.18.1.tar.gz
dependencies:
  - botan
  - json-c
build-dependencies:
  - cmake
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: rnp
  - exposure: global executable
    kind: cli
    name: rnpkeys
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rnp
  av: sudo av install brew:rnp
  brew: brew install rnp
  debian: sudo apt install rnp
  dnf: sudo dnf install rnp
  nix: nix profile install nixpkgs#rnp
  ubuntu: sudo apt install rnp
  winget: winget install --id r12f.Rnp -e
  zypper: sudo zypper install rnp
provenance:
  formula: rnp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
