id: brew:topfew
display-name: topfew
homepage: https://github.com/timbray/topfew
repo: https://github.com/timbray/topfew
docs: https://github.com/timbray/topfew
package-manager:
  brew: topfew
  macports: topfew
  nix: topfew
package-manager-url: https://formulae.brew.sh/formula/topfew
version: 2.0.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Finds the field values which appear most often in a stream of records
source-archive: https://github.com/timbray/topfew/archive/refs/tags/v2.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: topfew
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:topfew
  brew: brew install topfew
  macports: sudo port install topfew
  nix: nix profile install nixpkgs#topfew
provenance:
  formula: topfew
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
