id: brew:vtable-dumper
display-name: vtable-dumper
homepage: https://github.com/lvc/vtable-dumper
repo: https://github.com/lvc/vtable-dumper
docs: https://github.com/lvc/vtable-dumper
package-manager:
  apk: vtable-dumper
  brew: vtable-dumper
  debian: vtable-dumper
  dnf: vtable-dumper
  nix: vtable-dumper
  pacman: vtable-dumper
  ubuntu: vtable-dumper
  zypper: vtable-dumper
package-manager-url: https://formulae.brew.sh/formula/vtable-dumper
version: 1.2
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: List contents of virtual tables in a shared library
source-archive: https://github.com/lvc/vtable-dumper/archive/refs/tags/1.2.tar.gz
dependencies:
  - elfutils
executables:
  - exposure: global executable
    kind: cli
    name: vtable-dumper
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vtable-dumper
  av: sudo av install brew:vtable-dumper
  brew: brew install vtable-dumper
  debian: sudo apt install vtable-dumper
  dnf: sudo dnf install vtable-dumper
  nix: nix profile install nixpkgs#vtable-dumper
  pacman: sudo pacman -S vtable-dumper
  ubuntu: sudo apt install vtable-dumper
  zypper: sudo zypper install vtable-dumper
provenance:
  formula: vtable-dumper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
