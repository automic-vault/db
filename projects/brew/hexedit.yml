id: brew:hexedit
display-name: hexedit
homepage: https://rigaux.org/hexedit.html
repo: https://github.com/pixel/hexedit
docs: https://rigaux.org/hexedit.html
package-manager:
  apk: hexedit
  brew: hexedit
  debian: hexedit
  dnf: hexedit
  macports: hexedit
  nix: hexedit
  pacman: hexedit
  ubuntu: hexedit
  zypper: hexedit
package-manager-url: https://formulae.brew.sh/formula/hexedit
version: 1.6
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: View and edit files in hexadecimal or ASCII
source-archive: https://github.com/pixel/hexedit/archive/refs/tags/1.6.tar.gz
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: hexedit
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hexedit
  av: sudo av install brew:hexedit
  brew: brew install hexedit
  debian: sudo apt install hexedit
  dnf: sudo dnf install hexedit
  macports: sudo port install hexedit
  nix: nix profile install nixpkgs#hexedit
  pacman: sudo pacman -S hexedit
  ubuntu: sudo apt install hexedit
  zypper: sudo zypper install hexedit
provenance:
  formula: hexedit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
