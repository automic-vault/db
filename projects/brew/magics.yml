id: brew:magics
display-name: magics
homepage: https://confluence.ecmwf.int/display/MAGP/Magics
repo: https://confluence.ecmwf.int/download/attachments/3473464/Magics-4.16.0-Source.tar.gz
docs: https://confluence.ecmwf.int/display/MAGP/Magics
package-manager:
  brew: magics
  debian: magics++
  ubuntu: magics++
package-manager-url: https://formulae.brew.sh/formula/magics
version: 4.16.0
license: Apache-2.0
category: network
tags:
  - cli
description: ECMWF's meteorological plotting software
source-archive: https://confluence.ecmwf.int/download/attachments/3473464/Magics-4.16.0-Source.tar.gz
dependencies:
  - cairo
  - eccodes
  - gettext
  - glib
  - harfbuzz
  - netcdf
  - pango
  - proj
  - qtbase
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: magics
  - exposure: global executable
    kind: cli
    name: magicsCompatibilityChecker
  - exposure: global executable
    kind: cli
    name: magjson
  - exposure: global executable
    kind: cli
    name: magjsonx
  - exposure: global executable
    kind: cli
    name: magml
  - exposure: global executable
    kind: cli
    name: magmlx
  - exposure: global executable
    kind: cli
    name: metgram
  - exposure: global executable
    kind: cli
    name: metgram.sh
  - exposure: global executable
    kind: cli
    name: metgramx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:magics
  brew: brew install magics
  debian: sudo apt install magics++
  ubuntu: sudo apt install magics++
provenance:
  formula: magics
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
