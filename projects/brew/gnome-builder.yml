id: brew:gnome-builder
display-name: gnome-builder
homepage: https://apps.gnome.org/Builder/
repo: https://download.gnome.org/sources/gnome-builder/50/gnome-builder-50.0.tar.xz
docs: https://apps.gnome.org/Builder/
package-manager:
  apk: gnome-builder
  brew: gnome-builder
  debian: gnome-builder
  dnf: gnome-builder
  nix: gnome-builder
  pacman: gnome-builder
  ubuntu: gnome-builder
  zypper: gnome-builder
package-manager-url: https://formulae.brew.sh/formula/gnome-builder
version: 50.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Develop software for GNOME
source-archive: https://download.gnome.org/sources/gnome-builder/50/gnome-builder-50.0.tar.xz
dependencies:
  - adwaita-icon-theme
  - cairo
  - cmark
  - editorconfig
  - gettext
  - glib
  - gobject-introspection
  - gtk4
  - gtksourceview5
  - json-glib
  - jsonrpc-glib
  - libadwaita
  - libdex
  - libgit2
  - libgit2-glib
  - libpanel
  - libpeas
  - libspelling
  - libyaml
  - llvm
  - pango
  - template-glib
  - vte3
build-dependencies:
  - desktop-file-utils
  - gettext
  - meson
  - ninja
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: gnome-builder
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add gnome-builder
  av: sudo av install brew:gnome-builder
  brew: brew install gnome-builder
  debian: sudo apt install gnome-builder
  dnf: sudo dnf install gnome-builder
  nix: nix profile install nixpkgs#gnome-builder
  pacman: sudo pacman -S gnome-builder
  ubuntu: sudo apt install gnome-builder
  zypper: sudo zypper install gnome-builder
provenance:
  formula: gnome-builder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
