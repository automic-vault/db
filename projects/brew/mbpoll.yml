id: brew:mbpoll
display-name: mbpoll
homepage: https://epsilonrt.fr
repo: https://github.com/epsilonrt/mbpoll
docs: https://epsilonrt.fr
package-manager:
  brew: mbpoll
  debian: mbpoll
  dnf: mbpoll
  nix: mbpoll
  ubuntu: mbpoll
  zypper: mbpoll
package-manager-url: https://formulae.brew.sh/formula/mbpoll
version: 1.5.4
license: GPL-3.0-only
category: development
tags:
  - cli
description: Command-line utility to communicate with ModBus slave (RTU or TCP)
source-archive: https://github.com/epsilonrt/mbpoll/archive/refs/tags/v1.5.4.tar.gz
dependencies:
  - libmodbus
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mbpoll
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mbpoll
  brew: brew install mbpoll
  debian: sudo apt install mbpoll
  dnf: sudo dnf install mbpoll
  nix: nix profile install nixpkgs#mbpoll
  ubuntu: sudo apt install mbpoll
  zypper: sudo zypper install mbpoll
provenance:
  formula: mbpoll
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
