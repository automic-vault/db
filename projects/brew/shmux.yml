id: brew:shmux
display-name: shmux
homepage: https://github.com/shmux/shmux
repo: https://github.com/shmux/shmux
docs: https://github.com/shmux/shmux
package-manager:
  brew: shmux
  macports: shmux
package-manager-url: https://formulae.brew.sh/formula/shmux
version: 1.0.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: Execute the same command on many hosts in parallel
source-archive: https://github.com/shmux/shmux/archive/refs/tags/v1.0.3.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: shmux
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:shmux
  brew: brew install shmux
  macports: sudo port install shmux
provenance:
  formula: shmux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
