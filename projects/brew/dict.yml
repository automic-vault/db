id: brew:dict
display-name: dict
homepage: https://dict.org/bin/Dict
repo: https://downloads.sourceforge.net/project/dict/dictd/dictd-1.13.3/dictd-1.13.3.tar.gz
docs: https://dict.org/bin/Dict
package-manager:
  brew: dict
  debian: dict
  dnf: dictd
  macports: dict
  nix: dict
  pacman: dictd
  ubuntu: dict
  zypper: dictd
package-manager-url: https://formulae.brew.sh/formula/dict
version: 1.13.3
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Dictionary Server Protocol (RFC2229) client
source-archive: https://downloads.sourceforge.net/project/dict/dictd/dictd-1.13.3/dictd-1.13.3.tar.gz
dependencies:
  - libmaa
build-dependencies:
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: colorit
  - exposure: global executable
    kind: cli
    name: dict
  - exposure: global executable
    kind: cli
    name: dict_lookup
  - exposure: global executable
    kind: cli
    name: dictd
  - exposure: global executable
    kind: cli
    name: dictdplugin-config
  - exposure: global executable
    kind: cli
    name: dictfmt
  - exposure: global executable
    kind: cli
    name: dictfmt_index2suffix
  - exposure: global executable
    kind: cli
    name: dictfmt_index2word
  - exposure: global executable
    kind: cli
    name: dictl
  - exposure: global executable
    kind: cli
    name: dictunformat
  - exposure: global executable
    kind: cli
    name: dictzip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dict
  brew: brew install dict
  debian: sudo apt install dict
  dnf: sudo dnf install dictd
  macports: sudo port install dict
  nix: nix profile install nixpkgs#dict
  pacman: sudo pacman -S dictd
  ubuntu: sudo apt install dict
  zypper: sudo zypper install dictd
provenance:
  formula: dict
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
