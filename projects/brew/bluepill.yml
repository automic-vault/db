id: brew:bluepill
display-name: bluepill
homepage: https://github.com/MobileNativeFoundation/bluepill
repo: https://github.com/MobileNativeFoundation/bluepill
docs: https://github.com/MobileNativeFoundation/bluepill
package-manager:
  brew: bluepill
  winget: Ukhirani.Bp
package-manager-url: https://formulae.brew.sh/formula/bluepill
version: 5.13.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Testing tool for iOS that runs UI tests using multiple simulators
source-archive: https://github.com/MobileNativeFoundation/bluepill.git
executables:
  - exposure: global executable
    kind: cli
    name: bluepill
  - exposure: global executable
    kind: cli
    name: bp
bottle:
  available: true
  platforms:
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bluepill
  brew: brew install bluepill
  winget: winget install --id Ukhirani.Bp -e
provenance:
  formula: bluepill
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
