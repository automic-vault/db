id: brew:check
display-name: check
homepage: https://libcheck.github.io/check/
repo: https://github.com/libcheck/check
docs: https://libcheck.github.io/check/
package-manager:
  apk: check
  brew: check
  debian: check
  dnf: check
  macports: check
  nix: check
  pacman: check
  ubuntu: check
package-manager-url: https://formulae.brew.sh/formula/check
version: 0.15.2
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: C unit testing framework
source-archive: https://github.com/libcheck/check/releases/download/0.15.2/check-0.15.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: checkmk
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add check
  av: sudo av install brew:check
  brew: brew install check
  debian: sudo apt install check
  dnf: sudo dnf install check
  macports: sudo port install check
  nix: nix profile install nixpkgs#check
  pacman: sudo pacman -S check
  ubuntu: sudo apt install check
provenance:
  formula: check
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
