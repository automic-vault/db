id: brew:gsoap
display-name: gsoap
homepage: https://www.genivia.com/products.html
repo: https://downloads.sourceforge.net/project/gsoap2/gsoap_2.8.142.zip
docs: https://www.genivia.com/products.html
package-manager:
  apk: gsoap
  brew: gsoap
  debian: gsoap
  dnf: gsoap
  macports: gsoap
  nix: gsoap
  pacman: gsoap
  ubuntu: gsoap
package-manager-url: https://formulae.brew.sh/formula/gsoap
version: 2.8.142
license: GPL-2.0-or-later WITH openvpn-openssl-exception
category: development
tags:
  - cli
description: SOAP stub and skeleton compiler for C and C++
source-archive: https://downloads.sourceforge.net/project/gsoap2/gsoap_2.8.142.zip
dependencies:
  - openssl@3
build-dependencies:
  - autoconf
executables:
  - exposure: global executable
    kind: cli
    name: soapcpp2
  - exposure: global executable
    kind: cli
    name: wsdl2h
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gsoap
  av: sudo av install brew:gsoap
  brew: brew install gsoap
  debian: sudo apt install gsoap
  dnf: sudo dnf install gsoap
  macports: sudo port install gsoap
  nix: nix profile install nixpkgs#gsoap
  pacman: sudo pacman -S gsoap
  ubuntu: sudo apt install gsoap
provenance:
  formula: gsoap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
