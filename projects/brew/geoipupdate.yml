id: brew:geoipupdate
display-name: geoipupdate
homepage: https://github.com/maxmind/geoipupdate
repo: https://github.com/maxmind/geoipupdate
docs: https://github.com/maxmind/geoipupdate
package-manager:
  brew: geoipupdate
  debian: geoipupdate
  dnf: geoipupdate
  macports: geoipupdate
  nix: geoipupdate
  pacman: geoipupdate
  scoop: main/geoipupdate
  ubuntu: geoipupdate
  zypper: geoipupdate
package-manager-url: https://formulae.brew.sh/formula/geoipupdate
version: 7.1.1
license: Apache-2.0
category: database
tags:
  - cli
description: Automatic updates of GeoIP2 and GeoIP Legacy databases
source-archive: https://github.com/maxmind/geoipupdate/archive/refs/tags/v7.1.1.tar.gz
build-dependencies:
  - go
  - pandoc
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: geoipupdate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:geoipupdate
  brew: brew install geoipupdate
  debian: sudo apt install geoipupdate
  dnf: sudo dnf install geoipupdate
  macports: sudo port install geoipupdate
  nix: nix profile install nixpkgs#geoipupdate
  pacman: sudo pacman -S geoipupdate
  scoop: scoop install main/geoipupdate
  ubuntu: sudo apt install geoipupdate
  zypper: sudo zypper install geoipupdate
provenance:
  formula: geoipupdate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
