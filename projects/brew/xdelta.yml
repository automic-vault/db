id: brew:xdelta
display-name: xdelta
homepage: https://github.com/jmacd/xdelta
repo: https://github.com/jmacd/xdelta
docs: https://github.com/jmacd/xdelta
package-manager:
  apk: xdelta3
  brew: xdelta
  debian: xdelta
  dnf: xdelta
  macports: xdelta
  nix: xdelta
  pacman: xdelta3
  scoop: main/xdelta
  ubuntu: xdelta
  zypper: xdelta3
package-manager-url: https://formulae.brew.sh/formula/xdelta
version: 3.1.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Binary diff, differential compression tools
source-archive: https://github.com/jmacd/xdelta/archive/refs/tags/v3.1.0.tar.gz
dependencies:
  - xz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: xdelta3
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xdelta3
  av: sudo av install brew:xdelta
  brew: brew install xdelta
  debian: sudo apt install xdelta
  dnf: sudo dnf install xdelta
  macports: sudo port install xdelta
  nix: nix profile install nixpkgs#xdelta
  pacman: sudo pacman -S xdelta3
  scoop: scoop install main/xdelta
  ubuntu: sudo apt install xdelta
  zypper: sudo zypper install xdelta3
provenance:
  formula: xdelta
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
