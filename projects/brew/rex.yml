id: brew:rex
display-name: rex
homepage: https://www.rexify.org
repo: https://cpan.metacpan.org/authors/id/F/FE/FERKI/Rex-1.16.1.tar.gz
docs: https://www.rexify.org
package-manager:
  brew: rex
  debian: rex
  dnf: Rex
  macports: rex
  nix: rex
  ubuntu: rex
package-manager-url: https://formulae.brew.sh/formula/rex
version: 1.16.1
license: Apache-2.0
category: network
tags:
  - cli
description: Command-line tool which executes commands on remote servers
source-archive: https://cpan.metacpan.org/authors/id/F/FE/FERKI/Rex-1.16.1.tar.gz
uses-from-macos:
  - expat
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: rex
  - exposure: global executable
    kind: cli
    name: rexify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rex
  brew: brew install rex
  debian: sudo apt install rex
  dnf: sudo dnf install Rex
  macports: sudo port install rex
  nix: nix profile install nixpkgs#rex
  ubuntu: sudo apt install rex
provenance:
  formula: rex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
