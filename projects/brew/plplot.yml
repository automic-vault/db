id: brew:plplot
display-name: plplot
homepage: https://plplot.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/plplot/plplot/5.15.0%20Source/plplot-5.15.0.tar.gz
docs: https://plplot.sourceforge.net/
package-manager:
  apk: plplot
  brew: plplot
  dnf: plplot
  macports: plplot
  nix: plplot
package-manager-url: https://formulae.brew.sh/formula/plplot
version: 5.15.0
license: LGPL-2.0-or-later AND BSD-3-Clause AND HPND AND LicenseRef-Homebrew-cannot-represent
category: network
tags:
  - cli
description: Cross-platform software package for creating scientific plots
source-archive: >
  https://downloads.sourceforge.net/project/plplot/plplot/5.15.0%20Source/plplot-5.15.0.tar.gz
dependencies:
  - cairo
  - freetype
  - gcc
  - gettext
  - glib
  - harfbuzz
  - pango
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pltek
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add plplot
  av: sudo av install brew:plplot
  brew: brew install plplot
  dnf: sudo dnf install plplot
  macports: sudo port install plplot
  nix: nix profile install nixpkgs#plplot
provenance:
  formula: plplot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
