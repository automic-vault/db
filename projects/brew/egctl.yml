id: brew:egctl
display-name: egctl
homepage: https://gateway.envoyproxy.io/
repo: https://github.com/envoyproxy/gateway
docs: https://gateway.envoyproxy.io/
package-manager:
  brew: egctl
  debian: egctl
  nix: egctl
  ubuntu: egctl
package-manager-url: https://formulae.brew.sh/formula/egctl
version: 1.8.0
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line utility for operating Envoy Gateway
source-archive: https://github.com/envoyproxy/gateway/archive/refs/tags/v1.8.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: egctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:egctl
  brew: brew install egctl
  debian: sudo apt install egctl
  nix: nix profile install nixpkgs#egctl
  ubuntu: sudo apt install egctl
provenance:
  formula: egctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
