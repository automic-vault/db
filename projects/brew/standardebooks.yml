id: brew:standardebooks
display-name: standardebooks
homepage: https://github.com/standardebooks/tools
repo: >
  https://files.pythonhosted.org/packages/87/e3/5ab87cbbe9acaaa2d7cd059636c009aadd053473052e9383c640a5ea91d0/standardebooks-3.0.4.tar.gz
docs: https://github.com/standardebooks/tools
package-manager:
  brew: standardebooks
package-manager-url: https://formulae.brew.sh/formula/standardebooks
version: 3.0.4
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Tools for producing ebook files
source-archive: >
  https://files.pythonhosted.org/packages/87/e3/5ab87cbbe9acaaa2d7cd059636c009aadd053473052e9383c640a5ea91d0/standardebooks-3.0.4.tar.gz
dependencies:
  - certifi
  - cffi
  - openjdk
  - pillow
  - py3cairo
  - pycparser
  - python@3.14
build-dependencies:
  - rust
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: se
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:standardebooks
  brew: brew install standardebooks
provenance:
  formula: standardebooks
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
