id: brew:libdicom
display-name: libdicom
homepage: https://github.com/ImagingDataCommons/libdicom
repo: https://github.com/ImagingDataCommons/libdicom
docs: https://github.com/ImagingDataCommons/libdicom
package-manager:
  brew: libdicom
  dnf: libdicom
  macports: libdicom
  nix: libdicom
package-manager-url: https://formulae.brew.sh/formula/libdicom
version: 1.2.1
license: MIT
category: development
tags:
  - cli
description: DICOM WSI read library
source-archive: >
  https://github.com/ImagingDataCommons/libdicom/releases/download/v1.2.1/libdicom-1.2.1.tar.xz
dependencies:
  - uthash
build-dependencies:
  - meson
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: dcm-dump
  - exposure: global executable
    kind: cli
    name: dcm-getframe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libdicom
  brew: brew install libdicom
  dnf: sudo dnf install libdicom
  macports: sudo port install libdicom
  nix: nix profile install nixpkgs#libdicom
provenance:
  formula: libdicom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
