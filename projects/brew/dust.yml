id: brew:dust
display-name: dust
homepage: https://github.com/bootandy/dust
repo: https://github.com/bootandy/dust
docs: https://github.com/bootandy/dust
package-manager:
  apk: dust
  brew: dust
  macports: dust
  nix: dust
  pacman: dust
  scoop: main/dust
  winget: bootandy.dust
  zypper: dust
package-manager-url: https://formulae.brew.sh/formula/dust
version: 1.2.4
license: Apache-2.0
category: development
tags:
  - cli
description: More intuitive version of du in rust
source-archive: https://github.com/bootandy/dust/archive/refs/tags/v1.2.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dust
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dust
  av: sudo av install brew:dust
  brew: brew install dust
  macports: sudo port install dust
  nix: nix profile install nixpkgs#dust
  pacman: sudo pacman -S dust
  scoop: scoop install main/dust
  winget: winget install --id bootandy.dust -e
  zypper: sudo zypper install dust
provenance:
  formula: dust
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
