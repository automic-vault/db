id: brew:lesspipe
display-name: lesspipe
homepage: https://www-zeuthen.desy.de/~friebel/unix/lesspipe.html
repo: https://github.com/wofr06/lesspipe
docs: https://www-zeuthen.desy.de/~friebel/unix/lesspipe.html
package-manager:
  brew: lesspipe
  macports: lesspipe
  nix: lesspipe
  pacman: lesspipe
package-manager-url: https://formulae.brew.sh/formula/lesspipe
version: 2.25
license: GPL-2.0-only AND GPL-2.0-or-later AND MIT AND (Artistic-1.0-Perl OR GPL-1.0-or-later)
category: development
tags:
  - cli
description: Input filter for the pager less
source-archive: https://github.com/wofr06/lesspipe/archive/refs/tags/v2.25.tar.gz
dependencies:
  - bash
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: archive_color
  - exposure: global executable
    kind: cli
    name: lesspipe.sh
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    add the following to your shell profile e.g. ~/.profile or ~/.zshrc: export
    LESSOPEN="|$HOMEBREW_PREFIX/bin/lesspipe.sh %s"
  post-install-defined: false
install-lines:
  av: sudo av install brew:lesspipe
  brew: brew install lesspipe
  macports: sudo port install lesspipe
  nix: nix profile install nixpkgs#lesspipe
  pacman: sudo pacman -S lesspipe
provenance:
  formula: lesspipe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
