id: brew:cmctl
display-name: cmctl
homepage: https://cert-manager.io
repo: https://github.com/cert-manager/cmctl
docs: https://cert-manager.io
package-manager:
  apk: cmctl
  brew: cmctl
  macports: cmctl
  nix: cmctl
  pacman: cmctl
  scoop: main/cmctl
  zypper: cmctl
package-manager-url: https://formulae.brew.sh/formula/cmctl
version: 2.5.0
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool to manage cert-manager
source-archive: https://github.com/cert-manager/cmctl/archive/refs/tags/v2.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cmctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cmctl
  av: sudo av install brew:cmctl
  brew: brew install cmctl
  macports: sudo port install cmctl
  nix: nix profile install nixpkgs#cmctl
  pacman: sudo pacman -S cmctl
  scoop: scoop install main/cmctl
  zypper: sudo zypper install cmctl
provenance:
  formula: cmctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
