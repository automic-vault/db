id: brew:libcap-ng
display-name: libcap-ng
homepage: https://people.redhat.com/sgrubb/libcap-ng/
repo: https://github.com/stevegrubb/libcap-ng
docs: https://people.redhat.com/sgrubb/libcap-ng/
package-manager:
  apk: libcap-ng
  brew: libcap-ng
  dnf: libcap-ng
  nix: libcap_ng
  pacman: libcap-ng
package-manager-url: https://formulae.brew.sh/formula/libcap-ng
version: 0.9.3
license: LGPL-2.1-or-later AND GPL-2.0-or-later
category: development
tags:
  - cli
description: Library for Linux that makes using posix capabilities easy
source-archive: https://github.com/stevegrubb/libcap-ng/archive/refs/tags/v0.9.3.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
  - m4
  - pkgconf
  - python-setuptools
  - python@3.14
  - swig
executables:
  - exposure: global executable
    kind: cli
    name: filecap
  - exposure: global executable
    kind: cli
    name: netcap
  - exposure: global executable
    kind: cli
    name: pscap
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libcap-ng
  av: sudo av install brew:libcap-ng
  brew: brew install libcap-ng
  dnf: sudo dnf install libcap-ng
  nix: nix profile install nixpkgs#libcap_ng
  pacman: sudo pacman -S libcap-ng
provenance:
  formula: libcap-ng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
