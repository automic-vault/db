id: brew:cntb
display-name: cntb
homepage: https://github.com/contabo/cntb
repo: https://github.com/contabo/cntb
docs: https://github.com/contabo/cntb
package-manager:
  brew: cntb
  nix: cntb
package-manager-url: https://formulae.brew.sh/formula/cntb
version: 1.6
license: GPL-3.0-only
category: development
tags:
  - cli
description: Contabo Command-Line Interface (CLI)
source-archive: https://github.com/contabo/cntb/archive/refs/tags/v1.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cntb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cntb
  brew: brew install cntb
  nix: nix profile install nixpkgs#cntb
provenance:
  formula: cntb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
