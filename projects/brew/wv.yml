id: brew:wv
display-name: wv
homepage: https://wvware.sourceforge.net/
repo: https://deb.debian.org/debian/pool/main/w/wv/wv_1.2.9.orig.tar.gz
docs: https://wvware.sourceforge.net/
package-manager:
  apk: wv
  brew: wv
  debian: wv
  dnf: wv
  macports: wv
  nix: wv
  pacman: wv
  ubuntu: wv
  zypper: wv
package-manager-url: https://formulae.brew.sh/formula/wv
version: 1.2.9
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Programs for accessing Microsoft Word documents
source-archive: https://deb.debian.org/debian/pool/main/w/wv/wv_1.2.9.orig.tar.gz
dependencies:
  - gettext
  - glib
  - libgsf
  - libpng
  - libwmf
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: wvAbw
  - exposure: global executable
    kind: cli
    name: wvCleanLatex
  - exposure: global executable
    kind: cli
    name: wvConvert
  - exposure: global executable
    kind: cli
    name: wvDVI
  - exposure: global executable
    kind: cli
    name: wvDocBook
  - exposure: global executable
    kind: cli
    name: wvHtml
  - exposure: global executable
    kind: cli
    name: wvLatex
  - exposure: global executable
    kind: cli
    name: wvMime
  - exposure: global executable
    kind: cli
    name: wvPDF
  - exposure: global executable
    kind: cli
    name: wvPS
  - exposure: global executable
    kind: cli
    name: wvRTF
  - exposure: global executable
    kind: cli
    name: wvSummary
  - exposure: global executable
    kind: cli
    name: wvText
  - exposure: global executable
    kind: cli
    name: wvVersion
  - exposure: global executable
    kind: cli
    name: wvWare
  - exposure: global executable
    kind: cli
    name: wvWml
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wv
  av: sudo av install brew:wv
  brew: brew install wv
  debian: sudo apt install wv
  dnf: sudo dnf install wv
  macports: sudo port install wv
  nix: nix profile install nixpkgs#wv
  pacman: sudo pacman -S wv
  ubuntu: sudo apt install wv
  zypper: sudo zypper install wv
provenance:
  formula: wv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
