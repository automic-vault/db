bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gdal
  av: sudo av install brew:gdal
  brew: brew install gdal
  dnf: sudo dnf install gdal
  macports: sudo port install gdal
  nix: nix profile install nixpkgs#gdal
  pacman: sudo pacman -S gdal
  winget: winget install --id GISInternals.GDAL -e
  zypper: sudo zypper install gdal
provenance:
  formula: gdal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
