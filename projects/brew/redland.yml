id: brew:redland
display-name: redland
homepage: https://librdf.org/
repo: https://download.librdf.org/source/redland-1.0.17.tar.gz
docs: https://librdf.org/
package-manager:
  apk: redland
  brew: redland
  dnf: redland
  macports: redland
  nix: redland
  pacman: redland
  zypper: redland
package-manager-url: https://formulae.brew.sh/formula/redland
version: 1.0.17
license: LGPL-2.1-or-later OR GPL-2.0-or-later OR Apache-2.0
category: network
tags:
  - cli
description: RDF Library
source-archive: https://download.librdf.org/source/redland-1.0.17.tar.gz
dependencies:
  - libtool
  - raptor
  - rasqal
  - sqlite
  - unixodbc
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rdfproc
  - exposure: global executable
    kind: cli
    name: redland-config
  - exposure: global executable
    kind: cli
    name: redland-db-upgrade
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add redland
  av: sudo av install brew:redland
  brew: brew install redland
  dnf: sudo dnf install redland
  macports: sudo port install redland
  nix: nix profile install nixpkgs#redland
  pacman: sudo pacman -S redland
  zypper: sudo zypper install redland
provenance:
  formula: redland
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
