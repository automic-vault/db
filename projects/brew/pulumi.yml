id: brew:pulumi
display-name: pulumi
homepage: https://www.pulumi.com/
repo: https://github.com/pulumi/pulumi
docs: https://www.pulumi.com/
package-manager:
  apk: pulumi
  brew: pulumi
  chocolatey: pulumi
  macports: pulumi
  nix: pulumi
  pacman: pulumi
  scoop: main/pulumi
  winget: Pulumi.Pulumi
package-manager-url: https://formulae.brew.sh/formula/pulumi
version: 3.243.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Cloud native development platform
source-archive: https://github.com/pulumi/pulumi.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pulumi
  - exposure: global executable
    kind: cli
    name: pulumi-language-bun
  - exposure: global executable
    kind: cli
    name: pulumi-language-dotnet
  - exposure: global executable
    kind: cli
    name: pulumi-language-go
  - exposure: global executable
    kind: cli
    name: pulumi-language-hcl
  - exposure: global executable
    kind: cli
    name: pulumi-language-java
  - exposure: global executable
    kind: cli
    name: pulumi-language-nodejs
  - exposure: global executable
    kind: cli
    name: pulumi-language-pcl
  - exposure: global executable
    kind: cli
    name: pulumi-language-python
  - exposure: global executable
    kind: cli
    name: pulumi-language-python-exec
  - exposure: global executable
    kind: cli
    name: pulumi-language-yaml
  - exposure: global executable
    kind: cli
    name: pulumi-resource-pulumi-nodejs
  - exposure: global executable
    kind: cli
    name: pulumi-resource-pulumi-python
  - exposure: global executable
    kind: cli
    name: pulumi-watch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pulumi
  av: sudo av install brew:pulumi
  brew: brew install pulumi
  chocolatey: choco install pulumi
  macports: sudo port install pulumi
  nix: nix profile install nixpkgs#pulumi
  pacman: sudo pacman -S pulumi
  scoop: scoop install main/pulumi
  winget: winget install --id Pulumi.Pulumi -e
provenance:
  formula: pulumi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
