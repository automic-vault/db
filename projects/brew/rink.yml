id: brew:rink
display-name: rink
homepage: https://rinkcalc.app/about
repo: https://github.com/tiffany352/rink-rs
docs: https://rinkcalc.app/about
package-manager:
  brew: rink
  nix: rink
  pacman: rink
  scoop: main/rink
package-manager-url: https://formulae.brew.sh/formula/rink
version: 0.9.0
license: MPL-2.0 AND GPL-3.0-or-later
category: development
tags:
  - cli
description: Unit conversion tool and library written in rust
source-archive: https://github.com/tiffany352/rink-rs/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - asciidoctor
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rink
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rink
  brew: brew install rink
  nix: nix profile install nixpkgs#rink
  pacman: sudo pacman -S rink
  scoop: scoop install main/rink
provenance:
  formula: rink
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
