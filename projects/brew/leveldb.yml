id: brew:leveldb
display-name: leveldb
homepage: https://github.com/google/leveldb/
repo: https://github.com/google/leveldb
docs: https://github.com/google/leveldb/
package-manager:
  apk: leveldb
  brew: leveldb
  dnf: leveldb
  macports: leveldb
  nix: leveldb
  pacman: leveldb
  zypper: leveldb
package-manager-url: https://formulae.brew.sh/formula/leveldb
version: 1.23
license: BSD-3-Clause
category: development
tags:
  - cli
description: Key-value storage library with ordered mapping
source-archive: https://github.com/google/leveldb/archive/refs/tags/1.23.tar.gz
dependencies:
  - snappy
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: leveldbutil
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add leveldb
  av: sudo av install brew:leveldb
  brew: brew install leveldb
  dnf: sudo dnf install leveldb
  macports: sudo port install leveldb
  nix: nix profile install nixpkgs#leveldb
  pacman: sudo pacman -S leveldb
  zypper: sudo zypper install leveldb
provenance:
  formula: leveldb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
