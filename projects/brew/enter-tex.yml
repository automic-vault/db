id: brew:enter-tex
display-name: enter-tex
homepage: https://gitlab.gnome.org/swilmet/enter-tex
repo: https://gitlab.gnome.org/swilmet/enter-tex/-/archive/3.49.0/enter-tex-3.49.0.tar.bz2
docs: https://gitlab.gnome.org/swilmet/enter-tex
package-manager:
  brew: enter-tex
  debian: enter-tex
  nix: enter-tex
  pacman: enter-tex
package-manager-url: https://formulae.brew.sh/formula/enter-tex
version: 3.49.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: TeX/LaTeX text editor
source-archive: https://gitlab.gnome.org/swilmet/enter-tex/-/archive/3.49.0/enter-tex-3.49.0.tar.bz2
dependencies:
  - adwaita-icon-theme
  - gdk-pixbuf
  - gettext
  - glib
  - gspell
  - gtk+3
  - libgedit-amtk
  - libgedit-gtksourceview
  - libgedit-tepl
  - libgee
  - pango
build-dependencies:
  - desktop-file-utils
  - gettext
  - gobject-introspection
  - itstool
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: enter-tex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:enter-tex
  brew: brew install enter-tex
  debian: sudo apt install enter-tex
  nix: nix profile install nixpkgs#enter-tex
  pacman: sudo pacman -S enter-tex
provenance:
  formula: enter-tex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
