id: brew:mkvalidator
display-name: mkvalidator
homepage: https://www.matroska.org/downloads/mkvalidator.html
repo: https://downloads.sourceforge.net/project/matroska/mkvalidator/mkvalidator-0.6.0.tar.bz2
docs: https://www.matroska.org/downloads/mkvalidator.html
package-manager:
  brew: mkvalidator
package-manager-url: https://formulae.brew.sh/formula/mkvalidator
version: 0.6.0
license: BSD-3-Clause
category: network
tags:
  - cli
description: Tool to verify Matroska and WebM files for spec conformance
source-archive: https://downloads.sourceforge.net/project/matroska/mkvalidator/mkvalidator-0.6.0.tar.bz2
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: mkvalidator
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mkvalidator
  brew: brew install mkvalidator
provenance:
  formula: mkvalidator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
