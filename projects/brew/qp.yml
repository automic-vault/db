id: brew:qp
display-name: qp
homepage: https://github.com/f5io/qp
repo: https://github.com/f5io/qp
docs: https://github.com/f5io/qp
package-manager:
  brew: qp
package-manager-url: https://formulae.brew.sh/formula/qp
version: 1.0.1
license: MIT
category: development
tags:
  - cli
  - json
description: Command-line (ND)JSON querying
source-archive: https://github.com/f5io/qp/archive/refs/tags/1.0.1.tar.gz
build-dependencies:
  - quickjs
executables:
  - exposure: global executable
    kind: cli
    name: qp
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qp
  brew: brew install qp
provenance:
  formula: qp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
