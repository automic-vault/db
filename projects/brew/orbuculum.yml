id: brew:orbuculum
display-name: orbuculum
homepage: https://github.com/orbcode/orbuculum
repo: https://github.com/orbcode/orbuculum
docs: https://github.com/orbcode/orbuculum
package-manager:
  brew: orbuculum
  nix: orbuculum
package-manager-url: https://formulae.brew.sh/formula/orbuculum
version: 2.2.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Arm Cortex-M SWO/SWV Demux and Postprocess
source-archive: https://github.com/orbcode/orbuculum/archive/refs/tags/V2.2.0.tar.gz
dependencies:
  - capstone
  - dwarfutils
  - libusb
  - sdl2
  - zeromq
build-dependencies:
  - libelf
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: orbcat
  - exposure: global executable
    kind: cli
    name: orbdump
  - exposure: global executable
    kind: cli
    name: orbfifo
  - exposure: global executable
    kind: cli
    name: orblcd
  - exposure: global executable
    kind: cli
    name: orbmortem
  - exposure: global executable
    kind: cli
    name: orbprofile
  - exposure: global executable
    kind: cli
    name: orbstat
  - exposure: global executable
    kind: cli
    name: orbtop
  - exposure: global executable
    kind: cli
    name: orbtrace
  - exposure: global executable
    kind: cli
    name: orbuculum
  - exposure: global executable
    kind: cli
    name: orbzmq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:orbuculum
  brew: brew install orbuculum
  nix: nix profile install nixpkgs#orbuculum
provenance:
  formula: orbuculum
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
