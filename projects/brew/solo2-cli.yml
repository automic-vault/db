id: brew:solo2-cli
display-name: solo2-cli
homepage: https://solokeys.com/
repo: https://github.com/solokeys/solo2-cli
docs: https://solokeys.com/
package-manager:
  brew: solo2-cli
  nix: solo2-cli
package-manager-url: https://formulae.brew.sh/formula/solo2-cli
version: 0.2.2
license: Apache-2.0 OR MIT
category: security
tags:
  - cli
  - security
description: CLI to update and use Solo 2 security keys
source-archive: https://github.com/solokeys/solo2-cli/archive/refs/tags/v0.2.2.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: solo2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:solo2-cli
  brew: brew install solo2-cli
  nix: nix profile install nixpkgs#solo2-cli
provenance:
  formula: solo2-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
