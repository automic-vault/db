id: brew:bib-tool
display-name: bib-tool
homepage: https://www.gerd-neugebauer.de/software/TeX/BibTool/en/
repo: https://github.com/ge-ne/bibtool
docs: https://www.gerd-neugebauer.de/software/TeX/BibTool/en/
package-manager:
  brew: bib-tool
  debian: bibtool
  dnf: BibTool
  macports: BibTool
  nix: bibtool
  pacman: bibtool
  ubuntu: bibtool
  zypper: bibtool
package-manager-url: https://formulae.brew.sh/formula/bib-tool
version: 2.68
license: GPL-2.0-or-later
category: database
tags:
  - cli
description: Manipulates BibTeX databases
source-archive: https://github.com/ge-ne/bibtool/releases/download/BibTool_2_68/BibTool-2.68.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bibtool
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bib-tool
  brew: brew install bib-tool
  debian: sudo apt install bibtool
  dnf: sudo dnf install BibTool
  macports: sudo port install BibTool
  nix: nix profile install nixpkgs#bibtool
  pacman: sudo pacman -S bibtool
  ubuntu: sudo apt install bibtool
  zypper: sudo zypper install bibtool
provenance:
  formula: bib-tool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
