id: brew:scrcpy
display-name: scrcpy
homepage: https://github.com/Genymobile/scrcpy
repo: https://github.com/Genymobile/scrcpy
docs: https://github.com/Genymobile/scrcpy
package-manager:
  apk: scrcpy
  brew: scrcpy
  chocolatey: scrcpy
  macports: scrcpy
  nix: scrcpy
  pacman: scrcpy
  scoop: main/scrcpy
  ubuntu: scrcpy
  winget: Frontesque.scrcpy+
  zypper: scrcpy
package-manager-url: https://formulae.brew.sh/formula/scrcpy
version: 4.0
license: Apache-2.0
category: development
tags:
  - cli
description: Display and control your Android device
source-archive: https://github.com/Genymobile/scrcpy/archive/refs/tags/v4.0.tar.gz
dependencies:
  - ffmpeg
  - libusb
  - sdl3
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: scrcpy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    At runtime, adb must be accessible from your PATH. You can install adb from Homebrew
    Cask: brew install --cask android-platform-tools
  post-install-defined: false
install-lines:
  apk: sudo apk add scrcpy
  av: sudo av install brew:scrcpy
  brew: brew install scrcpy
  chocolatey: choco install scrcpy
  macports: sudo port install scrcpy
  nix: nix profile install nixpkgs#scrcpy
  pacman: sudo pacman -S scrcpy
  scoop: scoop install main/scrcpy
  ubuntu: sudo apt install scrcpy
  winget: winget install --id Frontesque.scrcpy+ -e
  zypper: sudo zypper install scrcpy
provenance:
  formula: scrcpy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
