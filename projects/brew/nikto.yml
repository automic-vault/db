id: brew:nikto
display-name: nikto
homepage: https://cirt.net/nikto/
repo: https://github.com/sullo/nikto
docs: https://cirt.net/nikto/
package-manager:
  apk: nikto
  brew: nikto
  debian: nikto
  macports: nikto
  nix: nikto
  pacman: nikto
  ubuntu: nikto
package-manager-url: https://formulae.brew.sh/formula/nikto
version: 2.6.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Web server scanner
source-archive: https://github.com/sullo/nikto/archive/refs/tags/2.6.0.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: nikto
  - exposure: global executable
    kind: cli
    name: replay.pl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nikto
  av: sudo av install brew:nikto
  brew: brew install nikto
  debian: sudo apt install nikto
  macports: sudo port install nikto
  nix: nix profile install nixpkgs#nikto
  pacman: sudo pacman -S nikto
  ubuntu: sudo apt install nikto
provenance:
  formula: nikto
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
