id: brew:kuzco
display-name: kuzco
homepage: https://github.com/RoseSecurity/Kuzco
repo: https://github.com/RoseSecurity/Kuzco
docs: https://github.com/RoseSecurity/Kuzco
package-manager:
  brew: kuzco
package-manager-url: https://formulae.brew.sh/formula/kuzco
version: 1.9.1
license: Apache-2.0
category: cloud
tags:
  - cli
description: Reviews Terraform and OpenTofu resources and uses AI to suggest improvements
