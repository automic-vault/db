id: brew:bbot
display-name: bbot
homepage: https://github.com/blacklanternsecurity/bbot
repo: >
  https://files.pythonhosted.org/packages/6a/83/24a0087894d853703f64ab2044927ef56c831edb379295a873b05f34eb92/bbot-2.8.4.tar.gz
docs: https://github.com/blacklanternsecurity/bbot
package-manager:
  brew: bbot
  nix: bbot
package-manager-url: https://formulae.brew.sh/formula/bbot
version: 2.8.4
license: AGPL-3.0-only
category: security
tags:
  - cli
description: OSINT automation tool
source-archive: >
  https://files.pythonhosted.org/packages/6a/83/24a0087894d853703f64ab2044927ef56c831edb379295a873b05f34eb92/bbot-2.8.4.tar.gz
dependencies:
  - certifi
  - cryptography
  - libyaml
  - openssl@3
  - pydantic
  - python@3.14
  - zeromq
build-dependencies:
  - cmake
  - ninja
  - openjdk
  - pkgconf
  - rust
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: bbot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bbot
  brew: brew install bbot
  nix: nix profile install nixpkgs#bbot
provenance:
  formula: bbot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
