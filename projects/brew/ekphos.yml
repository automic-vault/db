id: brew:ekphos
display-name: ekphos
homepage: https://ekphos.xyz
repo: https://github.com/hanebox/ekphos
docs: https://ekphos.xyz
package-manager:
  apk: ekphos
  brew: ekphos
package-manager-url: https://formulae.brew.sh/formula/ekphos
version: 0.20.10
license: MIT
category: development
tags:
  - cli
description: Terminal-based markdown research tool inspired by Obsidian
source-archive: https://github.com/hanebox/ekphos/archive/refs/tags/v0.20.10.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ekphos
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ekphos
  av: sudo av install brew:ekphos
  brew: brew install ekphos
provenance:
  formula: ekphos
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
