id: brew:bunster
display-name: bunster
homepage: https://bunster.netlify.app/
repo: https://github.com/yassinebenaid/bunster
docs: https://bunster.netlify.app/
package-manager:
  brew: bunster
  nix: bunster
package-manager-url: https://formulae.brew.sh/formula/bunster
version: 0.14.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Compile shell scripts to static binaries
source-archive: https://github.com/yassinebenaid/bunster/archive/refs/tags/v0.14.0.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bunster
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bunster
  brew: brew install bunster
  nix: nix profile install nixpkgs#bunster
provenance:
  formula: bunster
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
