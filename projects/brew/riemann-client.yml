id: brew:riemann-client
display-name: riemann-client
homepage: https://git.madhouse-project.org/algernon/riemann-c-client
repo: >
  https://git.madhouse-project.org/algernon/riemann-c-client/archive/riemann-c-client-2.2.2.tar.gz
docs: https://git.madhouse-project.org/algernon/riemann-c-client
package-manager:
  brew: riemann-client
package-manager-url: https://formulae.brew.sh/formula/riemann-client
version: 2.2.2
license: EUPL-1.2
category: development
tags:
  - cli
description: C client library for the Riemann monitoring system
source-archive: >
  https://git.madhouse-project.org/algernon/riemann-c-client/archive/riemann-c-client-2.2.2.tar.gz
dependencies:
  - json-c
  - openssl@3
  - protobuf-c
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: riemann-client
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:riemann-client
  brew: brew install riemann-client
provenance:
  formula: riemann-client
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
