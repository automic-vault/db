id: brew:jenkins-cli
display-name: jenkins-cli
homepage: https://github.com/jenkins-zh/jenkins-cli
repo: https://github.com/jenkins-zh/jenkins-cli
docs: https://github.com/jenkins-zh/jenkins-cli
package-manager:
  brew: jenkins-cli
  macports: jenkins-cli
  nix: jcli
  scoop: main/jcli
package-manager-url: https://formulae.brew.sh/formula/jenkins-cli
version: 0.0.47
license: MIT
category: development
tags:
  - cli
description: CLI for jenkins
source-archive: https://github.com/jenkins-zh/jenkins-cli/archive/refs/tags/v0.0.47.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jcli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jenkins-cli
  brew: brew install jenkins-cli
  macports: sudo port install jenkins-cli
  nix: nix profile install nixpkgs#jcli
  scoop: scoop install main/jcli
provenance:
  formula: jenkins-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
