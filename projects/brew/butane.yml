id: brew:butane
display-name: butane
homepage: https://github.com/coreos/butane
repo: https://github.com/coreos/butane
docs: https://github.com/coreos/butane
package-manager:
  apk: butane
  brew: butane
  dnf: butane
  macports: butane
  nix: butane
  scoop: extras/butane
  winget: Fedora.CoreOS.butane
  zypper: butane
package-manager-url: https://formulae.brew.sh/formula/butane
version: 0.28.0
license: Apache-2.0
category: development
tags:
  - cli
description: Translates human-readable Butane Configs into machine-readable Ignition Configs
source-archive: https://github.com/coreos/butane/archive/refs/tags/v0.28.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: butane
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add butane
  av: sudo av install brew:butane
  brew: brew install butane
  dnf: sudo dnf install butane
  macports: sudo port install butane
  nix: nix profile install nixpkgs#butane
  scoop: scoop install extras/butane
  winget: winget install --id Fedora.CoreOS.butane -e
  zypper: sudo zypper install butane
provenance:
  formula: butane
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
