id: brew:oauth2_proxy
display-name: oauth2_proxy
homepage: https://oauth2-proxy.github.io/oauth2-proxy/
repo: https://github.com/oauth2-proxy/oauth2-proxy
docs: https://oauth2-proxy.github.io/oauth2-proxy/
package-manager:
  apk: oauth2-proxy
  brew: oauth2_proxy
  macports: oauth2-proxy
  nix: oauth2-proxy
package-manager-url: https://formulae.brew.sh/formula/oauth2_proxy
version: 7.15.2
license: MIT
category: development
tags:
  - cli
description: Reverse proxy for authenticating users via OAuth 2 providers
source-archive: https://github.com/oauth2-proxy/oauth2-proxy/archive/refs/tags/v7.15.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: oauth2-proxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: $HOMEBREW_PREFIX/etc/oauth2-proxy/oauth2-proxy.cfg must be filled in.
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add oauth2-proxy
  av: sudo av install brew:oauth2_proxy
  brew: brew install oauth2_proxy
  macports: sudo port install oauth2-proxy
  nix: nix profile install nixpkgs#oauth2-proxy
provenance:
  formula: oauth2_proxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
