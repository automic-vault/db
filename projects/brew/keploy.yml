id: brew:keploy
display-name: keploy
homepage: https://keploy.io
repo: https://github.com/keploy/keploy
docs: https://keploy.io
package-manager:
  brew: keploy
package-manager-url: https://formulae.brew.sh/formula/keploy
version: 3.5.51
license: Apache-2.0
category: development
tags:
  - cli
description: Testing Toolkit creates test-cases and data mocks from API calls, DB queries
source-archive: https://github.com/keploy/keploy/archive/refs/tags/v3.5.51.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: keploy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:keploy
  brew: brew install keploy
provenance:
  formula: keploy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
