id: brew:swift-outdated
display-name: swift-outdated
homepage: https://github.com/kiliankoe/swift-outdated
repo: https://github.com/kiliankoe/swift-outdated
docs: https://github.com/kiliankoe/swift-outdated
package-manager:
  brew: swift-outdated
package-manager-url: https://formulae.brew.sh/formula/swift-outdated
version: 0.12.0
license: MIT
category: development
tags:
  - cli
description: Check for outdated Swift package manager dependencies
source-archive: https://github.com/kiliankoe/swift-outdated/archive/refs/tags/0.12.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: swift-outdated
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swift-outdated
  brew: brew install swift-outdated
provenance:
  formula: swift-outdated
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
