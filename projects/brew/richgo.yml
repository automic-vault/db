id: brew:richgo
display-name: richgo
homepage: https://github.com/kyoh86/richgo
repo: https://github.com/kyoh86/richgo
docs: https://github.com/kyoh86/richgo
package-manager:
  brew: richgo
  nix: richgo
package-manager-url: https://formulae.brew.sh/formula/richgo
version: 0.3.12
license: MIT
category: development
tags:
  - cli
description: Enrich go test outputs with text decorations
source-archive: https://github.com/kyoh86/richgo/archive/refs/tags/v0.3.12.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: richgo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:richgo
  brew: brew install richgo
  nix: nix profile install nixpkgs#richgo
provenance:
  formula: richgo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
