id: brew:distill-cli
display-name: distill-cli
homepage: https://www.allthingsdistributed.com/2024/06/introducing-distill-cli.html
repo: https://github.com/awslabs/distill-cli
docs: https://www.allthingsdistributed.com/2024/06/introducing-distill-cli.html
package-manager:
  brew: distill-cli
package-manager-url: https://formulae.brew.sh/formula/distill-cli
version: 0.2.0
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: Use AWS Transcribe and Bedrock to create summaries of your audio recordings
source-archive: https://github.com/awslabs/distill-cli/archive/refs/tags/v0.2.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: distill-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:distill-cli
  brew: brew install distill-cli
provenance:
  formula: distill-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
