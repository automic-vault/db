id: brew:xmlto
display-name: xmlto
homepage: https://pagure.io/xmlto/
repo: https://pagure.io/xmlto/archive/0.0.29/xmlto-0.0.29.tar.gz
docs: https://pagure.io/xmlto/
package-manager:
  apk: xmlto
  brew: xmlto
  debian: xmlto
  dnf: xmlto
  macports: xmlto
  nix: xmlto
  pacman: xmlto
  ubuntu: xmlto
  zypper: xmlto
package-manager-url: https://formulae.brew.sh/formula/xmlto
version: 0.0.29
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Convert XML to another format (based on XSL or other tools)
source-archive: https://pagure.io/xmlto/archive/0.0.29/xmlto-0.0.29.tar.gz
dependencies:
  - docbook
  - docbook-xsl
  - gnu-getopt
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: xmlif
  - exposure: global executable
    kind: cli
    name: xmlto
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xmlto
  av: sudo av install brew:xmlto
  brew: brew install xmlto
  debian: sudo apt install xmlto
  dnf: sudo dnf install xmlto
  macports: sudo port install xmlto
  nix: nix profile install nixpkgs#xmlto
  pacman: sudo pacman -S xmlto
  ubuntu: sudo apt install xmlto
  zypper: sudo zypper install xmlto
provenance:
  formula: xmlto
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
