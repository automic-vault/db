id: brew:mpich
display-name: mpich
homepage: https://www.mpich.org/
repo: https://www.mpich.org/static/downloads/5.0.1/mpich-5.0.1.tar.gz
docs: https://www.mpich.org/
package-manager:
  brew: mpich
  debian: mpich
  dnf: mpich
  macports: mpich
  nix: mpich
  ubuntu: mpich
  zypper: mpich
package-manager-url: https://formulae.brew.sh/formula/mpich
version: 5.0.1
license: mpich2
category: network
tags:
  - cli
description: Implementation of the MPI Message Passing Interface standard
source-archive: https://www.mpich.org/static/downloads/5.0.1/mpich-5.0.1.tar.gz
dependencies:
  - gcc
  - hwloc
executables:
  - exposure: global executable
    kind: cli
    name: hydra_nameserver
  - exposure: global executable
    kind: cli
    name: hydra_persist
  - exposure: global executable
    kind: cli
    name: hydra_pmi_proxy
  - exposure: global executable
    kind: cli
    name: mpichversion
  - exposure: global executable
    kind: cli
    name: mpiexec.hydra
  - exposure: global executable
    kind: cli
    name: mpivars
  - exposure: global executable
    kind: cli
    name: parkill
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mpich
  brew: brew install mpich
  debian: sudo apt install mpich
  dnf: sudo dnf install mpich
  macports: sudo port install mpich
  nix: nix profile install nixpkgs#mpich
  ubuntu: sudo apt install mpich
  zypper: sudo zypper install mpich
provenance:
  formula: mpich
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
