id: brew:libgr
display-name: libgr
homepage: https://gr-framework.org/
repo: https://github.com/sciapp/gr
docs: https://gr-framework.org/
package-manager:
  brew: libgr
package-manager-url: https://formulae.brew.sh/formula/libgr
version: 0.73.24
license: MIT
category: development
tags:
  - cli
description: 'GR framework: a graphics library for visualisation applications'
source-archive: https://github.com/sciapp/gr/archive/refs/tags/v0.73.24.tar.gz
dependencies:
  - cairo
  - ffmpeg
  - freetype
  - glfw
  - jpeg-turbo
  - libpng
  - libtiff
  - pixman
  - qhull
  - qtbase
  - zeromq
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: gksqt
  - exposure: global executable
    kind: cli
    name: grplot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libgr
  brew: brew install libgr
provenance:
  formula: libgr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
