id: brew:stern
display-name: stern
homepage: https://github.com/stern/stern
repo: https://github.com/stern/stern
docs: https://github.com/stern/stern
package-manager:
  apk: stern
  brew: stern
  chocolatey: stern
  macports: stern
  nix: stern
  pacman: stern
  scoop: main/stern
  winget: stern.stern
  zypper: stern
package-manager-url: https://formulae.brew.sh/formula/stern
version: 1.34.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Tail multiple Kubernetes pods & their containers
source-archive: https://github.com/stern/stern/archive/refs/tags/v1.34.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: stern
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add stern
  av: sudo av install brew:stern
  brew: brew install stern
  chocolatey: choco install stern
  macports: sudo port install stern
  nix: nix profile install nixpkgs#stern
  pacman: sudo pacman -S stern
  scoop: scoop install main/stern
  winget: winget install --id stern.stern -e
  zypper: sudo zypper install stern
provenance:
  formula: stern
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
