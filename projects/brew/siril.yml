id: brew:siril
display-name: siril
homepage: https://www.siril.org
repo: https://free-astro.org/download/siril-1.4.3.tar.bz2
docs: https://www.siril.org
package-manager:
  apk: siril
  brew: siril
  debian: siril
  dnf: siril
  nix: siril
  ubuntu: siril
  winget: Free-Astro.Siril
  zypper: siril
package-manager-url: https://formulae.brew.sh/formula/siril
version: 1.4.3
license: GPL-3.0-or-later
category: media
tags:
  - cli
description: Astronomical image processing tool
source-archive: https://free-astro.org/download/siril-1.4.3.tar.bz2
dependencies:
  - cairo
  - cfitsio
  - exiv2
  - ffmpeg
  - ffms2
  - fftw
  - gdk-pixbuf
  - gettext
  - glib
  - gnuplot
  - gsl
  - gtk+3
  - gtksourceview4
  - healpix
  - jpeg-turbo
  - jpeg-xl
  - json-glib
  - libgit2
  - libheif
  - libomp
  - libpng
  - libraw
  - librsvg
  - libtiff
  - little-cms2
  - netpbm
  - opencv
  - pango
  - wcslib
  - yyjson
build-dependencies:
  - cmake
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: siril
  - exposure: global executable
    kind: cli
    name: siril-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add siril
  av: sudo av install brew:siril
  brew: brew install siril
  debian: sudo apt install siril
  dnf: sudo dnf install siril
  nix: nix profile install nixpkgs#siril
  ubuntu: sudo apt install siril
  winget: winget install --id Free-Astro.Siril -e
  zypper: sudo zypper install siril
provenance:
  formula: siril
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
