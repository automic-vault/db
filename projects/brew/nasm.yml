id: brew:nasm
display-name: nasm
homepage: https://www.nasm.us/
repo: https://www.nasm.us/pub/nasm/releasebuilds/3.01/nasm-3.01.tar.xz
docs: https://www.nasm.us/
package-manager:
  apk: nasm
  brew: nasm
  chocolatey: nasm
  debian: nasm
  dnf: nasm
  macports: nasm
  nix: nasm
  pacman: nasm
  scoop: main/nasm
  ubuntu: nasm
  winget: NASM.NASM
  zypper: nasm
package-manager-url: https://formulae.brew.sh/formula/nasm
version: 3.01
license: BSD-2-Clause
category: development
tags:
  - cli
description: Netwide Assembler (NASM) is an 80x86 assembler
source-archive: https://www.nasm.us/pub/nasm/releasebuilds/3.01/nasm-3.01.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: nasm
  - exposure: global executable
    kind: cli
    name: ndisasm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nasm
  av: sudo av install brew:nasm
  brew: brew install nasm
  chocolatey: choco install nasm
  debian: sudo apt install nasm
  dnf: sudo dnf install nasm
  macports: sudo port install nasm
  nix: nix profile install nixpkgs#nasm
  pacman: sudo pacman -S nasm
  scoop: scoop install main/nasm
  ubuntu: sudo apt install nasm
  winget: winget install --id NASM.NASM -e
  zypper: sudo zypper install nasm
provenance:
  formula: nasm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
