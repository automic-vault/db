id: brew:ipsumdump
display-name: ipsumdump
homepage: https://read.seas.harvard.edu/~kohler/ipsumdump/
repo: https://read.seas.harvard.edu/~kohler/ipsumdump/ipsumdump-1.86.tar.gz
docs: https://read.seas.harvard.edu/~kohler/ipsumdump/
package-manager:
  brew: ipsumdump
package-manager-url: https://formulae.brew.sh/formula/ipsumdump
version: 1.86
license: MIT
category: development
tags:
  - cli
description: Summarizes TCP/IP dump files into a self-describing ASCII format
source-archive: https://read.seas.harvard.edu/~kohler/ipsumdump/ipsumdump-1.86.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ipaggcreate
  - exposure: global executable
    kind: cli
    name: ipaggmanip
  - exposure: global executable
    kind: cli
    name: ipsumdump
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ipsumdump
  brew: brew install ipsumdump
provenance:
  formula: ipsumdump
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
