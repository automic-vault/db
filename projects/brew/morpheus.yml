id: brew:morpheus
display-name: morpheus
homepage: https://morpheus.gitlab.io/
repo: https://gitlab.com/morpheus.lab/morpheus/-/archive/v2.4.1/morpheus-v2.4.1.tar.gz
docs: https://morpheus.gitlab.io/
package-manager:
  brew: morpheus
package-manager-url: https://formulae.brew.sh/formula/morpheus
version: 2.4.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Modeling environment for multi-cellular systems biology
source-archive: https://gitlab.com/morpheus.lab/morpheus/-/archive/v2.4.1/morpheus-v2.4.1.tar.gz
dependencies:
  - boost
  - ffmpeg
  - graphviz
  - libomp
  - libtiff
  - qt@5
build-dependencies:
  - cmake
  - doxygen
  - ninja
uses-from-macos:
  - bzip2
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: morpheus
  - exposure: global executable
    kind: cli
    name: morpheus-gui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:morpheus
  brew: brew install morpheus
provenance:
  formula: morpheus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
