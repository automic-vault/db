id: brew:funcoeszz
display-name: funcoeszz
homepage: https://funcoeszz.net/
repo: https://funcoeszz.net/download/funcoeszz-21.1.sh
docs: https://funcoeszz.net/
package-manager:
  brew: funcoeszz
  debian: funcoeszz
  ubuntu: funcoeszz
package-manager-url: https://formulae.brew.sh/formula/funcoeszz
version: 21.1
license: GPL-2.0-only
category: network
tags:
  - cli
description: Dozens of command-line mini-applications (Portuguese)
source-archive: https://funcoeszz.net/download/funcoeszz-21.1.sh
dependencies:
  - bash
executables:
  - exposure: global executable
    kind: cli
    name: funcoeszz
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To use this software add to your profile: export
    ZZPATH="$HOMEBREW_PREFIX/opt/funcoeszz/bin/funcoeszz" source "$ZZPATH" Usage of a
    newer Bash than the macOS default is required.
  post-install-defined: false
install-lines:
  av: sudo av install brew:funcoeszz
  brew: brew install funcoeszz
  debian: sudo apt install funcoeszz
  ubuntu: sudo apt install funcoeszz
provenance:
  formula: funcoeszz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
