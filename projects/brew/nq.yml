id: brew:nq
display-name: nq
homepage: https://github.com/leahneukirchen/nq
repo: https://github.com/leahneukirchen/nq
docs: https://github.com/leahneukirchen/nq
package-manager:
  apk: nq
  brew: nq
  debian: nq
  dnf: nq
  macports: nq
  nix: nq
  ubuntu: nq
package-manager-url: https://formulae.brew.sh/formula/nq
version: 1.0
license: CC0-1.0
category: development
tags:
  - cli
description: Unix command-line queue utility
source-archive: https://github.com/leahneukirchen/nq/archive/refs/tags/v1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: nq
  - exposure: global executable
    kind: cli
    name: nqtail
  - exposure: global executable
    kind: cli
    name: nqterm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nq
  av: sudo av install brew:nq
  brew: brew install nq
  debian: sudo apt install nq
  dnf: sudo dnf install nq
  macports: sudo port install nq
  nix: nix profile install nixpkgs#nq
  ubuntu: sudo apt install nq
provenance:
  formula: nq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
