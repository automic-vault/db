id: brew:git-gui
display-name: git-gui
homepage: https://git-scm.com
repo: https://mirrors.edge.kernel.org/pub/software/scm/git/git-2.54.0.tar.xz
docs: https://git-scm.com
package-manager:
  apk: git-gui
  brew: git-gui
  debian: git-gui
  dnf: git-gui
  ubuntu: git-gui
  zypper: git-gui
package-manager-url: https://formulae.brew.sh/formula/git-gui
version: 2.54.0
license: GPL-2.0-only
category: development
tags:
  - cli
  - git
description: Tcl/Tk UI for the git revision control system
source-archive: https://mirrors.edge.kernel.org/pub/software/scm/git/git-2.54.0.tar.xz
dependencies:
  - tcl-tk
executables:
  - exposure: global executable
    kind: cli
    name: git-citool
  - exposure: global executable
    kind: cli
    name: git-gui
  - exposure: global executable
    kind: cli
    name: git-gui--askpass
  - exposure: global executable
    kind: cli
    name: git-gui--askyesno
  - exposure: global executable
    kind: cli
    name: gitk
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-gui
  av: sudo av install brew:git-gui
  brew: brew install git-gui
  debian: sudo apt install git-gui
  dnf: sudo dnf install git-gui
  ubuntu: sudo apt install git-gui
  zypper: sudo zypper install git-gui
provenance:
  formula: git-gui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
