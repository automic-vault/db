id: brew:skopeo
display-name: skopeo
homepage: https://github.com/containers/skopeo
repo: https://github.com/containers/skopeo
docs: https://github.com/containers/skopeo
package-manager:
  apk: skopeo
  brew: skopeo
  debian: skopeo
  dnf: skopeo
  macports: skopeo
  nix: skopeo
  pacman: skopeo
  ubuntu: skopeo
  zypper: skopeo
package-manager-url: https://formulae.brew.sh/formula/skopeo
version: 1.22.2
license: Apache-2.0
category: development
tags:
  - cli
description: Work with remote images registries
source-archive: https://github.com/containers/skopeo/archive/refs/tags/v1.22.2.tar.gz
dependencies:
  - gpgme
build-dependencies:
  - go
  - go-md2man
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: skopeo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add skopeo
  av: sudo av install brew:skopeo
  brew: brew install skopeo
  debian: sudo apt install skopeo
  dnf: sudo dnf install skopeo
  macports: sudo port install skopeo
  nix: nix profile install nixpkgs#skopeo
  pacman: sudo pacman -S skopeo
  ubuntu: sudo apt install skopeo
  zypper: sudo zypper install skopeo
provenance:
  formula: skopeo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
