id: brew:typescript
display-name: typescript
homepage: https://www.typescriptlang.org/
repo: https://registry.npmjs.org/typescript/-/typescript-6.0.3.tgz
docs: https://www.typescriptlang.org/
package-manager:
  apk: typescript
  brew: typescript
  chocolatey: typescript
  dnf: typescript
  macports: typescript
  nix: typescript
  pacman: typescript
  zypper: typescript
package-manager-url: https://formulae.brew.sh/formula/typescript
version: 6.0.3
license: Apache-2.0
category: development
tags:
  - cli
description: Language for application scale JavaScript development
source-archive: https://registry.npmjs.org/typescript/-/typescript-6.0.3.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: tsc
  - exposure: global executable
    kind: cli
    name: tsserver
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add typescript
  av: sudo av install brew:typescript
  brew: brew install typescript
  chocolatey: choco install typescript
  dnf: sudo dnf install typescript
  macports: sudo port install typescript
  nix: nix profile install nixpkgs#typescript
  pacman: sudo pacman -S typescript
  zypper: sudo zypper install typescript
provenance:
  formula: typescript
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
