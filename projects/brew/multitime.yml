id: brew:multitime
display-name: multitime
homepage: https://tratt.net/laurie/src/multitime/
repo: https://github.com/ltratt/multitime
docs: https://tratt.net/laurie/src/multitime/
package-manager:
  brew: multitime
  nix: multitime
  ubuntu: multitime
package-manager-url: https://formulae.brew.sh/formula/multitime
version: 1.5
license: MIT
category: development
tags:
  - cli
description: Time command execution over multiple executions
source-archive: https://github.com/ltratt/multitime/archive/refs/tags/multitime-1.5.tar.gz
build-dependencies:
  - autoconf
executables:
  - exposure: global executable
    kind: cli
    name: multitime
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:multitime
  brew: brew install multitime
  nix: nix profile install nixpkgs#multitime
  ubuntu: sudo apt install multitime
provenance:
  formula: multitime
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
