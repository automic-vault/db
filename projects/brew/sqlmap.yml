id: brew:sqlmap
display-name: sqlmap
homepage: https://sqlmap.org
repo: https://github.com/sqlmapproject/sqlmap
docs: https://sqlmap.org
package-manager:
  apk: sqlmap
  brew: sqlmap
  debian: sqlmap
  macports: sqlmap
  nix: sqlmap
  pacman: sqlmap
  ubuntu: sqlmap
  zypper: sqlmap
package-manager-url: https://formulae.brew.sh/formula/sqlmap
version: 1.10.5
license: GPL-2.0-or-later
category: database
tags:
  - cli
  - database
description: Penetration testing for SQL injection and database servers
source-archive: https://github.com/sqlmapproject/sqlmap/archive/refs/tags/1.10.5.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: sqlmap
  - exposure: global executable
    kind: cli
    name: sqlmap.py
  - exposure: global executable
    kind: cli
    name: sqlmapapi
  - exposure: global executable
    kind: cli
    name: sqlmapapi.py
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sqlmap
  av: sudo av install brew:sqlmap
  brew: brew install sqlmap
  debian: sudo apt install sqlmap
  macports: sudo port install sqlmap
  nix: nix profile install nixpkgs#sqlmap
  pacman: sudo pacman -S sqlmap
  ubuntu: sudo apt install sqlmap
  zypper: sudo zypper install sqlmap
provenance:
  formula: sqlmap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
