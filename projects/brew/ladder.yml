id: brew:ladder
display-name: ladder
homepage: https://github.com/everywall/ladder
repo: https://github.com/everywall/ladder
docs: https://github.com/everywall/ladder
package-manager:
  brew: ladder
package-manager-url: https://formulae.brew.sh/formula/ladder
version: 0.0.23
license: GPL-3.0-only
category: development
tags:
  - cli
description: Selfhosted alternative to 12ft.io and 1ft.io HTTP web proxies
source-archive: https://github.com/everywall/ladder/archive/refs/tags/v0.0.23.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ladder
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ladder
  brew: brew install ladder
provenance:
  formula: ladder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
