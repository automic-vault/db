id: brew:simutrans
display-name: simutrans
homepage: https://www.simutrans.com/
repo: svn://servers.simutrans.org/simutrans/trunk/
docs: https://www.simutrans.com/
package-manager:
  brew: simutrans
  debian: simutrans
  macports: simutrans
  nix: simutrans
  pacman: simutrans
  ubuntu: simutrans
  zypper: simutrans
package-manager-url: https://formulae.brew.sh/formula/simutrans
version: 124.3.1
license: Artistic-1.0
category: network
tags:
  - cli
description: Transport simulator
source-archive: svn://servers.simutrans.org/simutrans/trunk/
dependencies:
  - fluid-synth
  - fontconfig
  - freetype
  - libpng
  - miniupnpc
  - sdl2
  - zstd
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - bzip2
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: makeobj
  - exposure: global executable
    kind: cli
    name: nettool
  - exposure: global executable
    kind: cli
    name: simutrans
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:simutrans
  brew: brew install simutrans
  debian: sudo apt install simutrans
  macports: sudo port install simutrans
  nix: nix profile install nixpkgs#simutrans
  pacman: sudo pacman -S simutrans
  ubuntu: sudo apt install simutrans
  zypper: sudo zypper install simutrans
provenance:
  formula: simutrans
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
