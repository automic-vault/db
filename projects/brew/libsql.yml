id: brew:libsql
display-name: libsql
homepage: https://turso.tech/libsql
repo: https://github.com/tursodatabase/libsql
docs: https://turso.tech/libsql
package-manager:
  brew: libsql
  macports: libsql
  nix: sqld
package-manager-url: https://formulae.brew.sh/formula/libsql
version: 0.24.32
license: MIT
category: database
tags:
  - cli
description: Fork of SQLite that is both Open Source, and Open Contributions
source-archive: >
  https://github.com/tursodatabase/libsql/releases/download/libsql-server-v0.24.32/source.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sqld
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libsql
  brew: brew install libsql
  macports: sudo port install libsql
  nix: nix profile install nixpkgs#sqld
provenance:
  formula: libsql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
