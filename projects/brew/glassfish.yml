id: brew:glassfish
display-name: glassfish
homepage: https://glassfish.org/
repo: https://download.eclipse.org/ee4j/glassfish/glassfish-8.0.2.zip
docs: https://glassfish.org/
package-manager:
  brew: glassfish
package-manager-url: https://formulae.brew.sh/formula/glassfish
version: 8.0.2
license: EPL-2.0
category: network
tags:
  - cli
description: Java EE application server
source-archive: https://download.eclipse.org/ee4j/glassfish/glassfish-8.0.2.zip
dependencies:
  - openjdk@25
executables:
  - exposure: global executable
    kind: cli
    name: asadmin
  - exposure: global executable
    kind: cli
    name: asadmin.java
  - exposure: global executable
    kind: cli
    name: debug-asadmin
  - exposure: global executable
    kind: cli
    name: startserv
  - exposure: global executable
    kind: cli
    name: stopserv
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You may want to add the following to your .bash_profile: export
    GLASSFISH_HOME=$HOMEBREW_PREFIX/opt/glassfish/libexec
  post-install-defined: false
install-lines:
  av: sudo av install brew:glassfish
  brew: brew install glassfish
provenance:
  formula: glassfish
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
