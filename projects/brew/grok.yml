id: brew:grok
display-name: grok
homepage: https://github.com/jordansissel/grok
repo: https://github.com/jordansissel/grok
docs: https://github.com/jordansissel/grok
package-manager:
  brew: grok
  macports: grok
package-manager-url: https://formulae.brew.sh/formula/grok
version: 0.9.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: DRY and RAD for regular expressions and then some
source-archive: https://github.com/jordansissel/grok/archive/refs/tags/v0.9.2.tar.gz
dependencies:
  - libevent
  - pcre
  - tokyo-cabinet
executables:
  - exposure: global executable
    kind: cli
    name: discogrok
  - exposure: global executable
    kind: cli
    name: grok
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:grok
  brew: brew install grok
  macports: sudo port install grok
provenance:
  formula: grok
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
