id: brew:chaiscript
display-name: chaiscript
homepage: https://chaiscript.com/
repo: https://github.com/ChaiScript/ChaiScript
docs: https://chaiscript.com/
package-manager:
  brew: chaiscript
  debian: chai
  macports: chai
  ubuntu: chai
package-manager-url: https://formulae.brew.sh/formula/chaiscript
version: 6.1.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Easy to use embedded scripting language for C++
source-archive: https://github.com/ChaiScript/ChaiScript/archive/refs/tags/v6.1.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: chai
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chaiscript
  brew: brew install chaiscript
  debian: sudo apt install chai
  macports: sudo port install chai
  ubuntu: sudo apt install chai
provenance:
  formula: chaiscript
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
