id: brew:difftastic
display-name: difftastic
homepage: https://github.com/Wilfred/difftastic
repo: https://github.com/Wilfred/difftastic
docs: https://github.com/Wilfred/difftastic
package-manager:
  apk: difftastic
  brew: difftastic
  dnf: difftastic
  macports: difftastic
  nix: difftastic
  pacman: difftastic
  scoop: main/difftastic
  winget: Wilfred.difftastic
  zypper: difftastic
package-manager-url: https://formulae.brew.sh/formula/difftastic
version: 0.69.0
license: MIT
category: development
tags:
  - cli
description: Diff that understands syntax
source-archive: https://github.com/Wilfred/difftastic/archive/refs/tags/0.69.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: difft
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add difftastic
  av: sudo av install brew:difftastic
  brew: brew install difftastic
  dnf: sudo dnf install difftastic
  macports: sudo port install difftastic
  nix: nix profile install nixpkgs#difftastic
  pacman: sudo pacman -S difftastic
  scoop: scoop install main/difftastic
  winget: winget install --id Wilfred.difftastic -e
  zypper: sudo zypper install difftastic
provenance:
  formula: difftastic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
