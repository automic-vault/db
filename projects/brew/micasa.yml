id: brew:micasa
display-name: micasa
homepage: https://micasa.dev
repo: https://github.com/micasa-dev/micasa
docs: https://micasa.dev
package-manager:
  brew: micasa
package-manager-url: https://formulae.brew.sh/formula/micasa
version: 2.8.0
license: Apache-2.0
category: development
tags:
  - cli
description: TUI for tracking home projects, maintenance schedules, appliances and quotes
source-archive: https://github.com/micasa-dev/micasa/archive/refs/tags/v2.8.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: micasa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:micasa
  brew: brew install micasa
provenance:
  formula: micasa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
