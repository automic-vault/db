id: brew:malcontent
display-name: malcontent
homepage: https://github.com/chainguard-dev/malcontent
repo: https://github.com/chainguard-dev/malcontent
docs: https://github.com/chainguard-dev/malcontent
package-manager:
  apk: malcontent
  brew: malcontent
  debian: malcontent
  dnf: malcontent
  nix: malcontent
  pacman: malcontent
  ubuntu: malcontent
  zypper: malcontent
package-manager-url: https://formulae.brew.sh/formula/malcontent
version: 1.23.1
license: Apache-2.0
category: development
tags:
  - cli
description: Supply Chain Attack Detection, via context differential analysis and YARA
source-archive: https://github.com/chainguard-dev/malcontent/archive/refs/tags/v1.23.1.tar.gz
dependencies:
  - yara-x
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add malcontent
  av: sudo av install brew:malcontent
  brew: brew install malcontent
  debian: sudo apt install malcontent
  dnf: sudo dnf install malcontent
  nix: nix profile install nixpkgs#malcontent
  pacman: sudo pacman -S malcontent
  ubuntu: sudo apt install malcontent
  zypper: sudo zypper install malcontent
provenance:
  formula: malcontent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
