id: brew:gopass-jsonapi
display-name: gopass-jsonapi
homepage: https://github.com/gopasspw/gopass-jsonapi
repo: https://github.com/gopasspw/gopass-jsonapi
docs: https://github.com/gopasspw/gopass-jsonapi
package-manager:
  brew: gopass-jsonapi
  dnf: gopass-jsonapi
  macports: gopass-jsonapi
  nix: gopass-jsonapi
  pacman: gopass-jsonapi
  scoop: main/gopass-jsonapi
  winget: gopass.gopass-jsonapi
package-manager-url: https://formulae.brew.sh/formula/gopass-jsonapi
version: 1.16.1
license: MIT
category: development
tags:
  - cli
description: Gopass Browser Bindings
source-archive: https://github.com/gopasspw/gopass-jsonapi/archive/refs/tags/v1.16.1.tar.gz
dependencies:
  - gopass
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gopass-jsonapi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gopass-jsonapi
  brew: brew install gopass-jsonapi
  dnf: sudo dnf install gopass-jsonapi
  macports: sudo port install gopass-jsonapi
  nix: nix profile install nixpkgs#gopass-jsonapi
  pacman: sudo pacman -S gopass-jsonapi
  scoop: scoop install main/gopass-jsonapi
  winget: winget install --id gopass.gopass-jsonapi -e
provenance:
  formula: gopass-jsonapi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
