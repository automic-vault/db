id: brew:pan
display-name: pan
homepage: https://gitlab.gnome.org/GNOME/pan
repo: https://gitlab.gnome.org/GNOME/pan/-/archive/v0.165/pan-v0.165.tar.bz2
docs: https://gitlab.gnome.org/GNOME/pan
package-manager:
  brew: pan
  debian: pan
  nix: pan
  pacman: pan
  ubuntu: pan
  zypper: pan
package-manager-url: https://formulae.brew.sh/formula/pan
version: 0.165
license: GPL-2.0-only
category: development
tags:
  - cli
description: Usenet newsreader that's good at both text and binaries
source-archive: https://gitlab.gnome.org/GNOME/pan/-/archive/v0.165/pan-v0.165.tar.bz2
dependencies:
  - adwaita-icon-theme
  - at-spi2-core
  - cairo
  - enchant
  - gdk-pixbuf
  - gettext
  - glib
  - gmime
  - gnutls
  - gspell
  - gtk+3
  - gtkspell3
  - harfbuzz
  - pango
build-dependencies:
  - cmake
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pan
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pan
  brew: brew install pan
  debian: sudo apt install pan
  nix: nix profile install nixpkgs#pan
  pacman: sudo pacman -S pan
  ubuntu: sudo apt install pan
  zypper: sudo zypper install pan
provenance:
  formula: pan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
