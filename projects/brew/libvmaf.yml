id: brew:libvmaf
display-name: libvmaf
homepage: https://github.com/Netflix/vmaf
repo: https://github.com/Netflix/vmaf
docs: https://github.com/Netflix/vmaf
package-manager:
  apk: libvmaf
  brew: libvmaf
  dnf: libvmaf
  macports: libvmaf
  nix: libvmaf
  pacman: vmaf
  scoop: main/vmaf
  zypper: vmaf
package-manager-url: https://formulae.brew.sh/formula/libvmaf
version: 3.1.0
license: BSD-2-Clause-Patent
category: development
tags:
  - cli
description: Perceptual video quality assessment based on multi-method fusion
source-archive: https://github.com/Netflix/vmaf/archive/refs/tags/v3.1.0.tar.gz
build-dependencies:
  - meson
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: vmaf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libvmaf
  av: sudo av install brew:libvmaf
  brew: brew install libvmaf
  dnf: sudo dnf install libvmaf
  macports: sudo port install libvmaf
  nix: nix profile install nixpkgs#libvmaf
  pacman: sudo pacman -S vmaf
  scoop: scoop install main/vmaf
  zypper: sudo zypper install vmaf
provenance:
  formula: libvmaf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
