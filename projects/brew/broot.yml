id: brew:broot
display-name: broot
homepage: https://dystroy.org/broot/
repo: https://github.com/Canop/broot
docs: https://dystroy.org/broot/
package-manager:
  apk: broot
  brew: broot
  debian: broot
  macports: broot
  nix: broot
  pacman: broot
  scoop: main/broot
  winget: Dystroy.broot
  zypper: broot
package-manager-url: https://formulae.brew.sh/formula/broot
version: 1.56.4
license: MIT
category: development
tags:
  - cli
description: New way to see and navigate directory trees
source-archive: https://github.com/Canop/broot/archive/refs/tags/v1.56.4.tar.gz
dependencies:
  - libxcb
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: broot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add broot
  av: sudo av install brew:broot
  brew: brew install broot
  debian: sudo apt install broot
  macports: sudo port install broot
  nix: nix profile install nixpkgs#broot
  pacman: sudo pacman -S broot
  scoop: scoop install main/broot
  winget: winget install --id Dystroy.broot -e
  zypper: sudo zypper install broot
provenance:
  formula: broot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
