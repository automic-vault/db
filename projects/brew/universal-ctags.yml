id: brew:universal-ctags
display-name: universal-ctags
homepage: https://ctags.io/
repo: https://github.com/universal-ctags/ctags
docs: https://ctags.io/
package-manager:
  apk: ctags
  brew: universal-ctags
  chocolatey: universal-ctags
  debian: universal-ctags
  dnf: ctags
  macports: universal-ctags
  nix: universal-ctags
  pacman: ctags
  scoop: extras/universal-ctags
  ubuntu: universal-ctags
  winget: UniversalCtags.Ctags
  zypper: universal-ctags
package-manager-url: https://formulae.brew.sh/formula/universal-ctags
version: 6.2.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Maintained ctags implementation
source-archive: >
  https://github.com/universal-ctags/ctags/releases/download/v6.2.1/universal-ctags-6.2.1.tar.gz
dependencies:
  - jansson
  - libyaml
  - pcre2
build-dependencies:
  - docutils
  - pkgconf
  - python@3.14
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: ctags
  - exposure: global executable
    kind: cli
    name: optscript
  - exposure: global executable
    kind: cli
    name: readtags
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ctags
  av: sudo av install brew:universal-ctags
  brew: brew install universal-ctags
  chocolatey: choco install universal-ctags
  debian: sudo apt install universal-ctags
  dnf: sudo dnf install ctags
  macports: sudo port install universal-ctags
  nix: nix profile install nixpkgs#universal-ctags
  pacman: sudo pacman -S ctags
  scoop: scoop install extras/universal-ctags
  ubuntu: sudo apt install universal-ctags
  winget: winget install --id UniversalCtags.Ctags -e
  zypper: sudo zypper install universal-ctags
provenance:
  formula: universal-ctags
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
