id: brew:gdrive
display-name: gdrive
homepage: https://github.com/glotlabs/gdrive
repo: https://github.com/glotlabs/gdrive
docs: https://github.com/glotlabs/gdrive
package-manager:
  brew: gdrive
  macports: gdrive
  nix: gdrive
  scoop: main/gdrive
package-manager-url: https://formulae.brew.sh/formula/gdrive
version: 3.9.1
license: MIT
category: development
tags:
  - cli
description: Google Drive CLI Client
source-archive: https://github.com/glotlabs/gdrive/archive/refs/tags/3.9.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gdrive
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gdrive
  brew: brew install gdrive
  macports: sudo port install gdrive
  nix: nix profile install nixpkgs#gdrive
  scoop: scoop install main/gdrive
provenance:
  formula: gdrive
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
