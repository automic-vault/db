id: brew:git-ftp
display-name: git-ftp
homepage: https://git-ftp.github.io/
repo: https://github.com/git-ftp/git-ftp
docs: https://git-ftp.github.io/
package-manager:
  brew: git-ftp
  debian: git-ftp
  dnf: git-ftp
  macports: git-ftp
  nix: git-ftp
  ubuntu: git-ftp
package-manager-url: https://formulae.brew.sh/formula/git-ftp
version: 1.6.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
  - git
description: Git-powered FTP client
source-archive: https://github.com/git-ftp/git-ftp/archive/refs/tags/1.6.0.tar.gz
dependencies:
  - curl
  - libssh2
build-dependencies:
  - pandoc
executables:
  - exposure: global executable
    kind: cli
    name: git-ftp
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-ftp
  brew: brew install git-ftp
  debian: sudo apt install git-ftp
  dnf: sudo dnf install git-ftp
  macports: sudo port install git-ftp
  nix: nix profile install nixpkgs#git-ftp
  ubuntu: sudo apt install git-ftp
provenance:
  formula: git-ftp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
