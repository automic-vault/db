id: brew:ack
display-name: ack
homepage: https://beyondgrep.com/
repo: https://beyondgrep.com/ack-v3.9.0
docs: https://beyondgrep.com/
package-manager:
  apk: ack
  brew: ack
  chocolatey: ack
  debian: ack
  dnf: ack
  macports: ack
  nix: ack
  scoop: main/ack
  ubuntu: ack
  zypper: ack
package-manager-url: https://formulae.brew.sh/formula/ack
version: 3.9.0
license: Artistic-2.0
category: network
tags:
  - cli
description: Search tool like grep, but optimized for programmers
source-archive: https://beyondgrep.com/ack-v3.9.0
build-dependencies:
  - pod2man
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: ack
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ack
  av: sudo av install brew:ack
  brew: brew install ack
  chocolatey: choco install ack
  debian: sudo apt install ack
  dnf: sudo dnf install ack
  macports: sudo port install ack
  nix: nix profile install nixpkgs#ack
  scoop: scoop install main/ack
  ubuntu: sudo apt install ack
  zypper: sudo zypper install ack
provenance:
  formula: ack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
