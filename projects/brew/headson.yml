id: brew:headson
display-name: headson
homepage: https://docs.rs/headson/latest/headson/
repo: https://github.com/kantord/headson
docs: https://docs.rs/headson/latest/headson/
package-manager:
  brew: headson
package-manager-url: https://formulae.brew.sh/formula/headson
version: 0.17.0
license: MIT
category: development
tags:
  - cli
description: Head/tail for structured data
source-archive: https://github.com/kantord/headson/archive/refs/tags/headson-v0.17.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hson
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:headson
  brew: brew install headson
provenance:
  formula: headson
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
