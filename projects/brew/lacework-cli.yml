id: brew:lacework-cli
display-name: lacework-cli
homepage: https://docs.lacework.com/cli
repo: https://github.com/lacework/go-sdk
docs: https://docs.lacework.com/cli
package-manager:
  brew: lacework-cli
package-manager-url: https://formulae.brew.sh/formula/lacework-cli
version: 2.13.0
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for managing Lacework
source-archive: https://github.com/lacework/go-sdk.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lacework
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lacework-cli
  brew: brew install lacework-cli
provenance:
  formula: lacework-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
