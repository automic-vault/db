id: brew:screenresolution
display-name: screenresolution
homepage: https://github.com/jhford/screenresolution
repo: https://github.com/jhford/screenresolution
docs: https://github.com/jhford/screenresolution
package-manager:
  brew: screenresolution
  macports: screenresolution
package-manager-url: https://formulae.brew.sh/formula/screenresolution
version: 1.6
license: GPL-2.0-only
category: development
tags:
  - cli
description: Get, set, and list display resolution
source-archive: https://github.com/jhford/screenresolution/archive/refs/tags/v1.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: screenresolution
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:screenresolution
  brew: brew install screenresolution
  macports: sudo port install screenresolution
provenance:
  formula: screenresolution
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
