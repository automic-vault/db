id: brew:sourcery
display-name: sourcery
homepage: https://github.com/krzysztofzablocki/Sourcery
repo: https://github.com/krzysztofzablocki/Sourcery
docs: https://github.com/krzysztofzablocki/Sourcery
package-manager:
  brew: sourcery
  nix: sourcery
package-manager-url: https://formulae.brew.sh/formula/sourcery
version: 2.3.0
license: MIT
category: development
tags:
  - cli
description: Meta-programming for Swift, stop writing boilerplate code
source-archive: https://github.com/krzysztofzablocki/Sourcery/archive/refs/tags/2.3.0.tar.gz
uses-from-macos:
  - curl
  - libxml2
  - ncurses
  - sqlite
  - swift
executables:
  - exposure: global executable
    kind: cli
    name: sourcery
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sourcery
  brew: brew install sourcery
  nix: nix profile install nixpkgs#sourcery
provenance:
  formula: sourcery
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
