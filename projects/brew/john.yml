id: brew:john
display-name: john
homepage: https://www.openwall.com/john/
repo: https://www.openwall.com/john/k/john-1.9.0.tar.xz
docs: https://www.openwall.com/john/
package-manager:
  apk: john
  brew: john
  debian: john
  dnf: john
  macports: john
  nix: john
  pacman: john
  ubuntu: john
  zypper: john
package-manager-url: https://formulae.brew.sh/formula/john
version: 1.9.0
license: GPL-2.0-or-later
category: security
tags:
  - cli
description: Featureful UNIX password cracker
source-archive: https://www.openwall.com/john/k/john-1.9.0.tar.xz
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: john
  - exposure: global executable
    kind: cli
    name: unafs
  - exposure: global executable
    kind: cli
    name: unique
  - exposure: global executable
    kind: cli
    name: unshadow
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add john
  av: sudo av install brew:john
  brew: brew install john
  debian: sudo apt install john
  dnf: sudo dnf install john
  macports: sudo port install john
  nix: nix profile install nixpkgs#john
  pacman: sudo pacman -S john
  ubuntu: sudo apt install john
  zypper: sudo zypper install john
provenance:
  formula: john
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
