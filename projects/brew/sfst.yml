  - exposure: global executable
    kind: cli
    name: fst-generate
  - exposure: global executable
    kind: cli
    name: fst-infl
  - exposure: global executable
    kind: cli
    name: fst-infl2
  - exposure: global executable
    kind: cli
    name: fst-infl2-daemon
  - exposure: global executable
    kind: cli
    name: fst-infl3
  - exposure: global executable
    kind: cli
    name: fst-lattice
  - exposure: global executable
    kind: cli
    name: fst-lowmem
  - exposure: global executable
    kind: cli
    name: fst-match
