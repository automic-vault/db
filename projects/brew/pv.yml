id: brew:pv
display-name: pv
homepage: https://www.ivarch.com/programs/pv.shtml
repo: https://www.ivarch.com/programs/sources/pv-1.10.5.tar.gz
docs: https://www.ivarch.com/programs/pv.shtml
package-manager:
  apk: pv
  brew: pv
  debian: pv
  dnf: pv
  macports: pv
  nix: pv
  pacman: pv
  ubuntu: pv
  zypper: pv
package-manager-url: https://formulae.brew.sh/formula/pv
version: 1.10.5
license: Artistic-2.0
category: network
tags:
  - cli
description: Monitor data's progress through a pipe
source-archive: https://www.ivarch.com/programs/sources/pv-1.10.5.tar.gz
dependencies:
  - gettext
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: pv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pv
  av: sudo av install brew:pv
  brew: brew install pv
  debian: sudo apt install pv
  dnf: sudo dnf install pv
  macports: sudo port install pv
  nix: nix profile install nixpkgs#pv
  pacman: sudo pacman -S pv
  ubuntu: sudo apt install pv
  zypper: sudo zypper install pv
provenance:
  formula: pv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
