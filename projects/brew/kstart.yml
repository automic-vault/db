id: brew:kstart
display-name: kstart
homepage: https://www.eyrie.org/~eagle/software/kstart/
repo: https://archives.eyrie.org/software/kerberos/kstart-4.3.tar.xz
docs: https://www.eyrie.org/~eagle/software/kstart/
package-manager:
  apk: kstart
  brew: kstart
  debian: kstart
  dnf: kstart
  nix: kstart
  ubuntu: kstart
package-manager-url: https://formulae.brew.sh/formula/kstart
version: 4.3
license: MIT AND FSFAP AND ISC
category: network
tags:
  - cli
description: Modified version of kinit that can use keytabs to authenticate
source-archive: https://archives.eyrie.org/software/kerberos/kstart-4.3.tar.xz
uses-from-macos:
  - krb5
executables:
  - exposure: global executable
    kind: cli
    name: k5start
  - exposure: global executable
    kind: cli
    name: krenew
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kstart
  av: sudo av install brew:kstart
  brew: brew install kstart
  debian: sudo apt install kstart
  dnf: sudo dnf install kstart
  nix: nix profile install nixpkgs#kstart
  ubuntu: sudo apt install kstart
provenance:
  formula: kstart
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
