id: brew:cmark
display-name: cmark
homepage: https://commonmark.org/
repo: https://github.com/commonmark/cmark
docs: https://commonmark.org/
package-manager:
  apk: cmark
  brew: cmark
  debian: cmark
  dnf: cmark
  macports: cmark
  nix: cmark
  pacman: cmark
  ubuntu: cmark
  zypper: cmark
package-manager-url: https://formulae.brew.sh/formula/cmark
version: 0.31.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: Strongly specified, highly compatible implementation of Markdown
source-archive: https://github.com/commonmark/cmark/archive/refs/tags/0.31.2.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: cmark
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cmark
  av: sudo av install brew:cmark
  brew: brew install cmark
  debian: sudo apt install cmark
  dnf: sudo dnf install cmark
  macports: sudo port install cmark
  nix: nix profile install nixpkgs#cmark
  pacman: sudo pacman -S cmark
  ubuntu: sudo apt install cmark
  zypper: sudo zypper install cmark
provenance:
  formula: cmark
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
