id: brew:synfig
display-name: synfig
homepage: https://www.synfig.org/
repo: https://github.com/synfig/synfig
docs: https://www.synfig.org/
package-manager:
  brew: synfig
  chocolatey: synfig
  dnf: synfig
  macports: synfig
  pacman: synfig
  ubuntu: synfig
package-manager-url: https://formulae.brew.sh/formula/synfig
version: 1.5.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Command-line renderer
source-archive: https://github.com/synfig/synfig/releases/download/v1.5.5/synfig-1.5.5.tar.gz
dependencies:
  - cairo
  - etl
  - ffmpeg
  - fftw
  - fontconfig
  - freetype
  - fribidi
  - gettext
  - glib
  - glibmm@2.66
  - harfbuzz
  - imagemagick
  - imath
  - liblqr
  - libmng
  - libomp
  - libpng
  - libsigc++@2
  - libtool
  - libxml++
  - libzip
  - little-cms2
  - mlt
  - openexr
  - pango
build-dependencies:
  - autoconf
  - automake
  - gettext
  - intltool
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: synfig
  - exposure: global executable
    kind: cli
    name: synfig-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:synfig
  brew: brew install synfig
  chocolatey: choco install synfig
  dnf: sudo dnf install synfig
  macports: sudo port install synfig
  pacman: sudo pacman -S synfig
  ubuntu: sudo apt install synfig
provenance:
  formula: synfig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
