id: brew:gtop
display-name: gtop
homepage: https://github.com/aksakalli/gtop
repo: https://registry.npmjs.org/gtop/-/gtop-1.1.5.tgz
docs: https://github.com/aksakalli/gtop
package-manager:
  brew: gtop
  nix: gtop
  pacman: gtop
package-manager-url: https://formulae.brew.sh/formula/gtop
version: 1.1.5
license: MIT
category: development
tags:
  - cli
description: System monitoring dashboard for terminal
source-archive: https://registry.npmjs.org/gtop/-/gtop-1.1.5.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: gtop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gtop
  brew: brew install gtop
  nix: nix profile install nixpkgs#gtop
  pacman: sudo pacman -S gtop
provenance:
  formula: gtop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
