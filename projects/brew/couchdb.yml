id: brew:couchdb
display-name: couchdb
homepage: https://couchdb.apache.org/
repo: >
  https://www.apache.org/dyn/closer.lua?path=couchdb/source/3.5.2/apache-couchdb-3.5.2.tar.gz
docs: https://couchdb.apache.org/
package-manager:
  brew: couchdb
  macports: couchdb
  pacman: couchdb
package-manager-url: https://formulae.brew.sh/formula/couchdb
version: 3.5.2
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Apache CouchDB database server
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=couchdb/source/3.5.2/apache-couchdb-3.5.2.tar.gz
dependencies:
  - icu4c@78
  - openssl@3
build-dependencies:
  - autoconf
  - autoconf-archive
  - automake
  - erlang@28
  - libtool
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: couchdb
  - exposure: global executable
    kind: cli
    name: remsh
  - exposure: global executable
    kind: cli
    name: weatherreport
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    CouchDB 3.x requires a set admin password set before startup. Add one to your
    $HOMEBREW_PREFIX/etc/local.ini before starting CouchDB e.g.: [admins] admin =
    youradminpassword
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:couchdb
  brew: brew install couchdb
  macports: sudo port install couchdb
  pacman: sudo pacman -S couchdb
provenance:
  formula: couchdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
