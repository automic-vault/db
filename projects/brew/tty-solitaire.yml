id: brew:tty-solitaire
display-name: tty-solitaire
homepage: https://github.com/mpereira/tty-solitaire
repo: https://github.com/mpereira/tty-solitaire
docs: https://github.com/mpereira/tty-solitaire
package-manager:
  apk: tty-solitaire
  brew: tty-solitaire
  debian: tty-solitaire
  nix: tty-solitaire
  pacman: tty-solitaire
  ubuntu: tty-solitaire
package-manager-url: https://formulae.brew.sh/formula/tty-solitaire
version: 1.4.1
license: MIT
category: development
tags:
  - cli
description: Ncurses-based klondike solitaire game
source-archive: https://github.com/mpereira/tty-solitaire/archive/refs/tags/v1.4.1.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ttysolitaire
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tty-solitaire
  av: sudo av install brew:tty-solitaire
  brew: brew install tty-solitaire
  debian: sudo apt install tty-solitaire
  nix: nix profile install nixpkgs#tty-solitaire
  pacman: sudo pacman -S tty-solitaire
  ubuntu: sudo apt install tty-solitaire
provenance:
  formula: tty-solitaire
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
