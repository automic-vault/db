id: brew:licenseplist
display-name: licenseplist
homepage: >
  https://www.slideshare.net/mono0926/licenseplist-a-license-list-generator-of-all-your-dependencies-for-ios-applications
repo: https://github.com/mono0926/LicensePlist
docs: >
  https://www.slideshare.net/mono0926/licenseplist-a-license-list-generator-of-all-your-dependencies-for-ios-applications
package-manager:
  brew: licenseplist
package-manager-url: https://formulae.brew.sh/formula/licenseplist
version: 3.27.9
license: MIT
category: development
tags:
  - cli
description: License list generator of all your dependencies for iOS applications
source-archive: https://github.com/mono0926/LicensePlist/archive/refs/tags/3.27.9.tar.gz
executables:
