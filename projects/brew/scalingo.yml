id: brew:scalingo
display-name: scalingo
homepage: https://doc.scalingo.com/cli
repo: https://github.com/Scalingo/cli
docs: https://doc.scalingo.com/cli
package-manager:
  apk: scalingo
  brew: scalingo
  nix: scalingo
package-manager-url: https://formulae.brew.sh/formula/scalingo
version: 1.44.1
license: BSD-4-Clause
category: development
tags:
  - cli
description: CLI for working with Scalingo's PaaS
source-archive: https://github.com/Scalingo/cli/archive/refs/tags/1.44.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: scalingo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add scalingo
  av: sudo av install brew:scalingo
  brew: brew install scalingo
  nix: nix profile install nixpkgs#scalingo
provenance:
  formula: scalingo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
