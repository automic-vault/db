id: brew:cpu_features
display-name: cpu_features
homepage: https://github.com/google/cpu_features
repo: https://github.com/google/cpu_features
docs: https://github.com/google/cpu_features
package-manager:
  brew: cpu_features
  nix: cpu_features
package-manager-url: https://formulae.brew.sh/formula/cpu_features
version: 0.10.1
license: Apache-2.0
category: development
tags:
  - cli
description: Cross platform C99 library to get cpu features at runtime
source-archive: https://github.com/google/cpu_features/archive/refs/tags/v0.10.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: list_cpu_features
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cpu_features
  brew: brew install cpu_features
  nix: nix profile install nixpkgs#cpu_features
provenance:
  formula: cpu_features
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
