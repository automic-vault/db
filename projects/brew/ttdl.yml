id: brew:ttdl
display-name: ttdl
homepage: https://github.com/VladimirMarkelov/ttdl
repo: https://github.com/VladimirMarkelov/ttdl
docs: https://github.com/VladimirMarkelov/ttdl
package-manager:
  apk: ttdl
  brew: ttdl
  nix: ttdl
  scoop: extras/ttdl
package-manager-url: https://formulae.brew.sh/formula/ttdl
version: 6.1.1
license: MIT
category: development
tags:
  - cli
description: Terminal Todo List Manager
source-archive: https://github.com/VladimirMarkelov/ttdl/archive/refs/tags/v6.1.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ttdl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ttdl
  av: sudo av install brew:ttdl
  brew: brew install ttdl
  nix: nix profile install nixpkgs#ttdl
  scoop: scoop install extras/ttdl
provenance:
  formula: ttdl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
