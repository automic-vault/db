id: brew:diagram
display-name: diagram
homepage: https://github.com/esimov/diagram
repo: https://github.com/esimov/diagram
docs: https://github.com/esimov/diagram
package-manager:
  brew: diagram
package-manager-url: https://formulae.brew.sh/formula/diagram
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: CLI app to convert ASCII arts into hand drawn diagrams
source-archive: https://github.com/esimov/diagram/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: diagram
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:diagram
  brew: brew install diagram
provenance:
  formula: diagram
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
