id: brew:nesc
display-name: nesc
homepage: https://github.com/tinyos/nesc
repo: https://github.com/tinyos/nesc
docs: https://github.com/tinyos/nesc
package-manager:
  brew: nesc
  macports: nesc
package-manager-url: https://formulae.brew.sh/formula/nesc
version: 1.4.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: Programming language for deeply networked systems
source-archive: https://github.com/tinyos/nesc/archive/refs/tags/v1.4.0.tar.gz
dependencies:
  - emacs
build-dependencies:
  - autoconf
  - automake
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: nescc
  - exposure: global executable
    kind: cli
    name: nescc-mig
  - exposure: global executable
    kind: cli
    name: nescc-ncg
  - exposure: global executable
    kind: cli
    name: nescc-wiring
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nesc
  brew: brew install nesc
  macports: sudo port install nesc
provenance:
  formula: nesc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
