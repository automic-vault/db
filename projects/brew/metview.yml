id: brew:metview
display-name: metview
homepage: https://metview.readthedocs.io/en/latest/
repo: https://confluence.ecmwf.int/download/attachments/3964985/Metview-5.26.2-Source.tar.gz
docs: https://metview.readthedocs.io/en/latest/
package-manager:
  brew: metview
  debian: metview
  macports: metview
  ubuntu: metview
package-manager-url: https://formulae.brew.sh/formula/metview
version: 5.26.2
license: Apache-2.0
category: network
tags:
  - cli
description: Meteorological workstation software
source-archive: https://confluence.ecmwf.int/download/attachments/3964985/Metview-5.26.2-Source.tar.gz
dependencies:
  - cairo
  - eccodes
  - eigen
  - fftw
  - gcc
  - gdbm
  - gettext
  - glib
  - harfbuzz
  - libaec
  - lz4
  - magics
  - netcdf
  - netcdf-cxx
  - pango
  - qt5compat
  - qtbase
  - qtsvg
  - snappy
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - bzip2
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: metview
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:metview
  brew: brew install metview
  debian: sudo apt install metview
  macports: sudo port install metview
  ubuntu: sudo apt install metview
provenance:
  formula: metview
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
