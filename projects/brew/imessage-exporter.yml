id: brew:imessage-exporter
display-name: imessage-exporter
homepage: https://github.com/ReagentX/imessage-exporter
repo: https://github.com/ReagentX/imessage-exporter
docs: https://github.com/ReagentX/imessage-exporter
package-manager:
  brew: imessage-exporter
package-manager-url: https://formulae.brew.sh/formula/imessage-exporter
version: 4.0.0
license: GPL-3.0-only
category: database
tags:
  - cli
  - database
description: Command-line tool to export and inspect local iMessage database
source-archive: https://github.com/ReagentX/imessage-exporter/archive/refs/tags/4.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: imessage-exporter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:imessage-exporter
  brew: brew install imessage-exporter
provenance:
  formula: imessage-exporter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
