id: brew:vite-plus
display-name: vite-plus
homepage: https://viteplus.dev
repo: https://github.com/voidzero-dev/vite-plus
docs: https://viteplus.dev
package-manager:
  brew: vite-plus
  nix: vp
package-manager-url: https://formulae.brew.sh/formula/vite-plus
version: 0.1.22
license: MIT
category: development
tags:
  - cli
description: Unified toolchain and entry point for web development
source-archive: https://github.com/voidzero-dev/vite-plus/archive/refs/tags/v0.1.22.tar.gz
dependencies:
  - node
build-dependencies:
  - cmake
  - just
  - pnpm
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: vp
  - exposure: global executable
    kind: cli
    name: vpr
  - exposure: global executable
    kind: cli
    name: vpx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vite-plus
  brew: brew install vite-plus
  nix: nix profile install nixpkgs#vp
provenance:
  formula: vite-plus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
