id: brew:wthrr
display-name: wthrr
homepage: https://github.com/ttytm/wthrr-the-weathercrab
repo: https://github.com/ttytm/wthrr-the-weathercrab
docs: https://github.com/ttytm/wthrr-the-weathercrab
package-manager:
  brew: wthrr
  nix: wthrr
package-manager-url: https://formulae.brew.sh/formula/wthrr
version: 1.2.1
license: MIT
category: development
tags:
  - cli
description: Weather Companion for the Terminal
source-archive: https://github.com/ttytm/wthrr-the-weathercrab/archive/refs/tags/v1.2.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: wthrr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wthrr
  brew: brew install wthrr
  nix: nix profile install nixpkgs#wthrr
provenance:
  formula: wthrr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
