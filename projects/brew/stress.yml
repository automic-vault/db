id: brew:stress
display-name: stress
homepage: https://github.com/resurrecting-open-source-projects/stress
repo: https://github.com/resurrecting-open-source-projects/stress
docs: https://github.com/resurrecting-open-source-projects/stress
package-manager:
  brew: stress
  debian: stress
  dnf: stress
  nix: stress
  pacman: stress
  ubuntu: stress
package-manager-url: https://formulae.brew.sh/formula/stress
version: 1.0.7
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Tool to impose load on and stress test a computer system
source-archive: >
  https://github.com/resurrecting-open-source-projects/stress/archive/refs/tags/1.0.7.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: stress
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stress
  brew: brew install stress
  debian: sudo apt install stress
  dnf: sudo dnf install stress
  nix: nix profile install nixpkgs#stress
  pacman: sudo pacman -S stress
  ubuntu: sudo apt install stress
provenance:
  formula: stress
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
