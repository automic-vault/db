id: brew:chromaprint
display-name: chromaprint
homepage: https://acoustid.org/chromaprint
repo: https://github.com/acoustid/chromaprint
docs: https://acoustid.org/chromaprint
package-manager:
  apk: chromaprint
  brew: chromaprint
  macports: chromaprint
  nix: chromaprint
  pacman: chromaprint
  scoop: main/chromaprint
  winget: AcoustID.Chromaprint
package-manager-url: https://formulae.brew.sh/formula/chromaprint
version: 1.6.0
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Core component of the AcoustID project (Audio fingerprinting)
source-archive: >
  https://github.com/acoustid/chromaprint/releases/download/v1.6.0/chromaprint-1.6.0.tar.gz
dependencies:
  - ffmpeg
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: fpcalc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add chromaprint
  av: sudo av install brew:chromaprint
  brew: brew install chromaprint
  macports: sudo port install chromaprint
  nix: nix profile install nixpkgs#chromaprint
  pacman: sudo pacman -S chromaprint
  scoop: scoop install main/chromaprint
  winget: winget install --id AcoustID.Chromaprint -e
provenance:
  formula: chromaprint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
