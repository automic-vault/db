id: brew:packetbeat
display-name: packetbeat
homepage: https://www.elastic.co/products/beats/packetbeat
repo: https://github.com/elastic/beats
docs: https://www.elastic.co/products/beats/packetbeat
package-manager:
  brew: packetbeat
  chocolatey: packetbeat
  nix: packetbeat
package-manager-url: https://formulae.brew.sh/formula/packetbeat
version: 9.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: Lightweight Shipper for Network Data
source-archive: https://github.com/elastic/beats.git
build-dependencies:
  - go
  - mage
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: packetbeat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:packetbeat
  brew: brew install packetbeat
  chocolatey: choco install packetbeat
  nix: nix profile install nixpkgs#packetbeat
provenance:
  formula: packetbeat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
