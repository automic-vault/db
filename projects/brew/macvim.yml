id: brew:macvim
display-name: macvim
homepage: https://github.com/macvim-dev/macvim
repo: https://github.com/macvim-dev/macvim
docs: https://github.com/macvim-dev/macvim
package-manager:
  apk: gvim
  brew: macvim
  macports: MacVim
  nix: macvim
  pacman: gvim
  zypper: gvim
package-manager-url: https://formulae.brew.sh/formula/macvim
version: 9.2.0321
license: Vim
category: development
tags:
  - cli
description: GUI for vim, made for macOS
source-archive: https://github.com/macvim-dev/macvim/archive/refs/tags/release-183.tar.gz
dependencies:
  - cscope
  - lua@5.4
  - python@3.14
  - ruby
build-dependencies:
  - gettext
  - libsodium
executables:
  - exposure: global executable
    kind: cli
    name: gview
  - exposure: global executable
    kind: cli
    name: gvim
  - exposure: global executable
    kind: cli
    name: gvimdiff
  - exposure: global executable
    kind: cli
    name: gvimex
  - exposure: global executable
    kind: cli
    name: gvimtutor
  - exposure: global executable
    kind: cli
    name: mview
  - exposure: global executable
    kind: cli
    name: mvim
  - exposure: global executable
    kind: cli
    name: mvimdiff
  - exposure: global executable
    kind: cli
    name: mvimex
  - exposure: global executable
    kind: cli
    name: vimex
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gvim
  av: sudo av install brew:macvim
  brew: brew install macvim
  macports: sudo port install MacVim
  nix: nix profile install nixpkgs#macvim
  pacman: sudo pacman -S gvim
  zypper: sudo zypper install gvim
provenance:
  formula: macvim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
