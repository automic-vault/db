id: brew:ncftp
display-name: ncftp
homepage: https://www.ncftp.com/
repo: https://www.ncftp.com/public_ftp/ncftp/ncftp-3.3.0-src.tar.gz
docs: https://www.ncftp.com/
package-manager:
  apk: ncftp
  brew: ncftp
  debian: ncftp
  dnf: ncftp
  macports: ncftp
  nix: ncftp
  pacman: ncftp
  ubuntu: ncftp
package-manager-url: https://formulae.brew.sh/formula/ncftp
version: 3.3.0
license: ClArtistic
category: network
tags:
  - cli
description: FTP client with an advanced user interface
source-archive: https://www.ncftp.com/public_ftp/ncftp/ncftp-3.3.0-src.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ncftp
  - exposure: global executable
    kind: cli
    name: ncftpbatch
  - exposure: global executable
    kind: cli
    name: ncftpbookmarks
  - exposure: global executable
    kind: cli
    name: ncftpget
  - exposure: global executable
    kind: cli
    name: ncftpls
  - exposure: global executable
    kind: cli
    name: ncftpput
  - exposure: global executable
    kind: cli
    name: ncftpspooler
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ncftp
  av: sudo av install brew:ncftp
  brew: brew install ncftp
  debian: sudo apt install ncftp
  dnf: sudo dnf install ncftp
  macports: sudo port install ncftp
  nix: nix profile install nixpkgs#ncftp
  pacman: sudo pacman -S ncftp
  ubuntu: sudo apt install ncftp
provenance:
  formula: ncftp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
