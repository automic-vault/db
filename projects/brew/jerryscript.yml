id: brew:jerryscript
display-name: jerryscript
homepage: https://jerryscript.net
repo: https://github.com/jerryscript-project/jerryscript
docs: https://jerryscript.net
package-manager:
  brew: jerryscript
  nix: jerryscript
package-manager-url: https://formulae.brew.sh/formula/jerryscript
version: 3.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: Ultra-lightweight JavaScript engine for the Internet of Things
source-archive: https://github.com/jerryscript-project/jerryscript/archive/refs/tags/v3.0.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: jerry
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jerryscript
  brew: brew install jerryscript
  nix: nix profile install nixpkgs#jerryscript
provenance:
  formula: jerryscript
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
