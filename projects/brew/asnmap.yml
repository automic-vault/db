id: brew:asnmap
display-name: asnmap
homepage: https://github.com/projectdiscovery/asnmap
repo: https://github.com/projectdiscovery/asnmap
docs: https://github.com/projectdiscovery/asnmap
package-manager:
  brew: asnmap
  dnf: asnmap
  nix: asnmap
package-manager-url: https://formulae.brew.sh/formula/asnmap
version: 1.1.1
license: MIT
category: development
tags:
  - cli
description: Quickly map organization network ranges using ASN information
source-archive: https://github.com/projectdiscovery/asnmap/archive/refs/tags/v1.1.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: asnmap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:asnmap
  brew: brew install asnmap
  dnf: sudo dnf install asnmap
  nix: nix profile install nixpkgs#asnmap
provenance:
  formula: asnmap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
