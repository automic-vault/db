id: brew:dockcheck
display-name: dockcheck
homepage: https://github.com/mag37/dockcheck
repo: https://github.com/mag37/dockcheck
docs: https://github.com/mag37/dockcheck
package-manager:
  brew: dockcheck
package-manager-url: https://formulae.brew.sh/formula/dockcheck
version: 0.7.8
license: GPL-3.0-only
category: development
tags:
  - cli
  - docker
description: CLI tool to automate docker image updates
source-archive: https://github.com/mag37/dockcheck/archive/refs/tags/v0.7.8.tar.gz
dependencies:
  - regclient
uses-from-macos:
  - jq
executables:
  - exposure: global executable
    kind: cli
    name: dockcheck
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dockcheck
  brew: brew install dockcheck
provenance:
  formula: dockcheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
