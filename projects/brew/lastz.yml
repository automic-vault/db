id: brew:lastz
display-name: lastz
homepage: https://lastz.github.io/lastz/
repo: https://github.com/lastz/lastz
docs: https://lastz.github.io/lastz/
package-manager:
  brew: lastz
  debian: lastz
  ubuntu: lastz
package-manager-url: https://formulae.brew.sh/formula/lastz
version: 1.04.52
license: MIT
category: development
tags:
  - cli
description: Pairwise aligner for DNA sequences
source-archive: https://github.com/lastz/lastz/archive/refs/tags/1.04.52.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lastz
  - exposure: global executable
    kind: cli
    name: lastz_D
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lastz
  brew: brew install lastz
  debian: sudo apt install lastz
  ubuntu: sudo apt install lastz
provenance:
  formula: lastz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
