id: brew:libfreenect
display-name: libfreenect
homepage: https://openkinect.org/
repo: https://github.com/OpenKinect/libfreenect
docs: https://openkinect.org/
package-manager:
  brew: libfreenect
  dnf: libfreenect
package-manager-url: https://formulae.brew.sh/formula/libfreenect
version: 0.7.5
license: Apache-2.0 OR GPL-2.0-only
category: development
tags:
  - cli
description: Drivers and libraries for the Xbox Kinect device
source-archive: https://github.com/OpenKinect/libfreenect/archive/refs/tags/v0.7.5.tar.gz
dependencies:
  - libusb
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: fakenect
  - exposure: global executable
    kind: cli
    name: fakenect-record
  - exposure: global executable
    kind: cli
    name: freenect-camtest
  - exposure: global executable
    kind: cli
    name: freenect-chunkview
  - exposure: global executable
    kind: cli
    name: freenect-cpp_pcview
  - exposure: global executable
    kind: cli
    name: freenect-cppview
  - exposure: global executable
    kind: cli
    name: freenect-glpclview
  - exposure: global executable
    kind: cli
    name: freenect-glview
  - exposure: global executable
    kind: cli
    name: freenect-hiview
  - exposure: global executable
    kind: cli
    name: freenect-micview
  - exposure: global executable
    kind: cli
    name: freenect-regtest
  - exposure: global executable
    kind: cli
    name: freenect-regview
  - exposure: global executable
    kind: cli
    name: freenect-tiltdemo
  - exposure: global executable
    kind: cli
    name: freenect-wavrecord
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libfreenect
  brew: brew install libfreenect
  dnf: sudo dnf install libfreenect
provenance:
  formula: libfreenect
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
