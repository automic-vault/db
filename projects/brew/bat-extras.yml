id: brew:bat-extras
display-name: bat-extras
homepage: https://github.com/eth-p/bat-extras
repo: https://github.com/eth-p/bat-extras
docs: https://github.com/eth-p/bat-extras
package-manager:
  apk: bat-extras
  brew: bat-extras
  macports: bat-extras
  nix: bat-extras
  pacman: bat-extras
  zypper: bat-extras
package-manager-url: https://formulae.brew.sh/formula/bat-extras
version: 2024.08.24
license: MIT
category: development
tags:
  - cli
description: Bash scripts that integrate bat with various command-line tools
source-archive: https://github.com/eth-p/bat-extras/archive/refs/tags/v2024.08.24.tar.gz
build-dependencies:
  - bat
  - shfmt
executables:
  - exposure: global executable
    kind: cli
    name: bat-modules
  - exposure: global executable
    kind: cli
    name: batdiff
  - exposure: global executable
    kind: cli
    name: batgrep
  - exposure: global executable
    kind: cli
    name: batman
  - exposure: global executable
    kind: cli
    name: batpipe
  - exposure: global executable
    kind: cli
    name: batwatch
  - exposure: global executable
    kind: cli
    name: prettybat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bat-extras
  av: sudo av install brew:bat-extras
  brew: brew install bat-extras
  macports: sudo port install bat-extras
  nix: nix profile install nixpkgs#bat-extras
  pacman: sudo pacman -S bat-extras
  zypper: sudo zypper install bat-extras
provenance:
  formula: bat-extras
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
