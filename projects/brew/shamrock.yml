id: brew:shamrock
display-name: shamrock
homepage: https://github.com/Shamrock-code/Shamrock
repo: https://github.com/Shamrock-code/Shamrock
docs: https://github.com/Shamrock-code/Shamrock
package-manager:
  brew: shamrock
package-manager-url: https://formulae.brew.sh/formula/shamrock
version: 2025.10.0
license: CECILL-2.1
category: development
tags:
  - cli
description: Astrophysical hydrodynamics using SYCL
source-archive: >
  https://github.com/Shamrock-code/Shamrock/releases/download/v2025.10.0/shamrock-2025.10.0.tar
dependencies:
  - adaptivecpp
  - boost
  - libomp
  - open-mpi
  - python@3.14
build-dependencies:
  - cmake
  - fmt
  - nlohmann-json
  - pybind11
executables:
  - exposure: global executable
    kind: cli
    name: shamrock
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:shamrock
  brew: brew install shamrock
provenance:
  formula: shamrock
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
