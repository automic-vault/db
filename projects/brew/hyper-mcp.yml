id: brew:hyper-mcp
display-name: hyper-mcp
homepage: https://github.com/hyper-mcp-rs/hyper-mcp
repo: https://github.com/hyper-mcp-rs/hyper-mcp
docs: https://github.com/hyper-mcp-rs/hyper-mcp
package-manager:
  brew: hyper-mcp
package-manager-url: https://formulae.brew.sh/formula/hyper-mcp
version: 0.7.1
license: Apache-2.0
category: development
tags:
  - cli
description: MCP server that extends its capabilities through WebAssembly plugins
source-archive: https://github.com/hyper-mcp-rs/hyper-mcp/archive/refs/tags/v0.7.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hyper-mcp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hyper-mcp
  brew: brew install hyper-mcp
provenance:
  formula: hyper-mcp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
