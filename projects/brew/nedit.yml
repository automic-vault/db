id: brew:nedit
display-name: nedit
homepage: https://sourceforge.net/projects/nedit/
repo: https://downloads.sourceforge.net/project/nedit/nedit-source/nedit-5.8-src.tar.gz
docs: https://sourceforge.net/projects/nedit/
package-manager:
  apk: nedit
  brew: nedit
  debian: nedit
  dnf: nedit
  macports: nedit
  nix: nedit
  ubuntu: nedit
  zypper: nedit
package-manager-url: https://formulae.brew.sh/formula/nedit
version: 5.8
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Fast, compact Motif/X11 plain text editor
source-archive: https://downloads.sourceforge.net/project/nedit/nedit-source/nedit-5.8-src.tar.gz
dependencies:
  - libice
  - libsm
  - libx11
  - libxext
  - libxp
  - libxpm
  - libxt
  - openmotif
executables:
  - exposure: global executable
    kind: cli
    name: ncl
  - exposure: global executable
    kind: cli
    name: nedit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nedit
  av: sudo av install brew:nedit
  brew: brew install nedit
  debian: sudo apt install nedit
  dnf: sudo dnf install nedit
  macports: sudo port install nedit
  nix: nix profile install nixpkgs#nedit
  ubuntu: sudo apt install nedit
  zypper: sudo zypper install nedit
provenance:
  formula: nedit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
