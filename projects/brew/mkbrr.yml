id: brew:mkbrr
display-name: mkbrr
homepage: https://mkbrr.com/introduction
repo: https://github.com/autobrr/mkbrr
docs: https://mkbrr.com/introduction
package-manager:
  apk: mkbrr
  brew: mkbrr
  nix: mkbrr
  winget: autobrr.mkbrr
package-manager-url: https://formulae.brew.sh/formula/mkbrr
version: 1.23.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Is a tool to create, modify and inspect torrent files. Fast
source-archive: https://github.com/autobrr/mkbrr/archive/refs/tags/v1.23.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mkbrr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mkbrr
  av: sudo av install brew:mkbrr
  brew: brew install mkbrr
  nix: nix profile install nixpkgs#mkbrr
  winget: winget install --id autobrr.mkbrr -e
provenance:
  formula: mkbrr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
