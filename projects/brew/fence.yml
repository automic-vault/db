id: brew:fence
display-name: fence
homepage: https://github.com/Use-Tusk/fence
repo: https://github.com/Use-Tusk/fence
docs: https://github.com/Use-Tusk/fence
package-manager:
  brew: fence
  nix: fence
package-manager-url: https://formulae.brew.sh/formula/fence
version: 0.1.58
license: Apache-2.0
category: development
tags:
  - cli
description: Lightweight sandbox for commands with network and filesystem restrictions
source-archive: https://github.com/Use-Tusk/fence/archive/refs/tags/v0.1.58.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fence
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fence
  brew: brew install fence
  nix: nix profile install nixpkgs#fence
provenance:
  formula: fence
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
