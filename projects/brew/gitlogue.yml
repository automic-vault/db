id: brew:gitlogue
display-name: gitlogue
homepage: https://github.com/unhappychoice/gitlogue
repo: https://github.com/unhappychoice/gitlogue
docs: https://github.com/unhappychoice/gitlogue
package-manager:
  brew: gitlogue
  nix: gitlogue
  pacman: gitlogue
package-manager-url: https://formulae.brew.sh/formula/gitlogue
version: 0.9.0
license: ISC
category: development
tags:
  - cli
  - git
description: Cinematic Git commit replay tool
source-archive: https://github.com/unhappychoice/gitlogue/archive/refs/tags/v0.9.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gitlogue
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gitlogue
  brew: brew install gitlogue
  nix: nix profile install nixpkgs#gitlogue
  pacman: sudo pacman -S gitlogue
provenance:
  formula: gitlogue
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
