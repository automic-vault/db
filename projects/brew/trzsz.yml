id: brew:trzsz
display-name: trzsz
homepage: https://trzsz.github.io
repo: >
  https://files.pythonhosted.org/packages/22/1e/40a495c84a0dc625a4d97638c5cae308306718c493f480ee5ac64801947b/trzsz-1.1.5.tar.gz
docs: https://trzsz.github.io
package-manager:
  brew: trzsz
  scoop: main/trzsz
  winget: trzsz.trzsz
package-manager-url: https://formulae.brew.sh/formula/trzsz
version: 1.1.5
license: MIT
category: development
tags:
  - cli
description: Simple file transfer tools, similar to lrzsz (rz/sz), and compatible with tmux
source-archive: >
  https://files.pythonhosted.org/packages/22/1e/40a495c84a0dc625a4d97638c5cae308306718c493f480ee5ac64801947b/trzsz-1.1.5.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: trz
  - exposure: global executable
    kind: cli
    name: trzsz-iterm2
  - exposure: global executable
    kind: cli
    name: tsz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:trzsz
  brew: brew install trzsz
  scoop: scoop install main/trzsz
  winget: winget install --id trzsz.trzsz -e
provenance:
  formula: trzsz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
