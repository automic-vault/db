    name: ni
  - exposure: global executable
    kind: cli
    name: nlx
  - exposure: global executable
    kind: cli
    name: nr
  - exposure: global executable
    kind: cli
    name: nun
  - exposure: global executable
    kind: cli
    name: nup
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ni
  brew: brew install ni
  debian: sudo apt install nd
  nix: nix profile install nixpkgs#ni
  ubuntu: sudo apt install nd
provenance:
  formula: ni
