id: brew:git-credential-libsecret
display-name: git-credential-libsecret
homepage: https://git-scm.com
repo: https://mirrors.edge.kernel.org/pub/software/scm/git/git-2.54.0.tar.xz
docs: https://git-scm.com
package-manager:
  apk: git-credential-libsecret
  brew: git-credential-libsecret
  dnf: git-credential-libsecret
  zypper: git-credential-libsecret
package-manager-url: https://formulae.brew.sh/formula/git-credential-libsecret
version: 2.54.0
license: GPL-2.0-or-later
category: security
tags:
  - cli
  - git
description: Git helper for accessing credentials via libsecret
source-archive: https://mirrors.edge.kernel.org/pub/software/scm/git/git-2.54.0.tar.xz
dependencies:
  - gettext
  - glib
  - libsecret
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: git-credential-libsecret
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-credential-libsecret
  av: sudo av install brew:git-credential-libsecret
  brew: brew install git-credential-libsecret
  dnf: sudo dnf install git-credential-libsecret
  zypper: sudo zypper install git-credential-libsecret
provenance:
  formula: git-credential-libsecret
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
