id: brew:timewarrior
display-name: timewarrior
homepage: https://timewarrior.net/
repo: https://github.com/GothenburgBitFactory/timewarrior
docs: https://timewarrior.net/
package-manager:
  apk: timewarrior
  brew: timewarrior
  debian: timewarrior
  dnf: timew
  macports: timewarrior
  nix: timewarrior
  pacman: timew
  ubuntu: timewarrior
  zypper: timewarrior
package-manager-url: https://formulae.brew.sh/formula/timewarrior
version: 1.9.1
license: MIT
category: development
tags:
  - cli
description: Command-line time tracking application
source-archive: >
  https://github.com/GothenburgBitFactory/timewarrior/releases/download/v1.9.1/timew-1.9.1.tar.gz
build-dependencies:
  - asciidoctor
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: timew
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add timewarrior
  av: sudo av install brew:timewarrior
  brew: brew install timewarrior
  debian: sudo apt install timewarrior
  dnf: sudo dnf install timew
  macports: sudo port install timewarrior
  nix: nix profile install nixpkgs#timewarrior
  pacman: sudo pacman -S timew
  ubuntu: sudo apt install timewarrior
  zypper: sudo zypper install timewarrior
provenance:
  formula: timewarrior
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
