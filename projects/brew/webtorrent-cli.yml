id: brew:webtorrent-cli
display-name: webtorrent-cli
homepage: https://webtorrent.io/
repo: https://registry.npmjs.org/webtorrent-cli/-/webtorrent-cli-6.0.0.tgz
docs: https://webtorrent.io/
package-manager:
  brew: webtorrent-cli
  scoop: extras/webtorrent
package-manager-url: https://formulae.brew.sh/formula/webtorrent-cli
version: 6.0.0
license: MIT
category: network
tags:
  - cli
description: Command-line streaming torrent client
source-archive: https://registry.npmjs.org/webtorrent-cli/-/webtorrent-cli-6.0.0.tgz
dependencies:
  - node@20
build-dependencies:
  - cmake
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: webtorrent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:webtorrent-cli
  brew: brew install webtorrent-cli
  scoop: scoop install extras/webtorrent
provenance:
  formula: webtorrent-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
