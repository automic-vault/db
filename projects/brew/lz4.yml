id: brew:lz4
display-name: lz4
homepage: https://lz4.github.io/lz4/
repo: https://github.com/lz4/lz4
docs: https://lz4.github.io/lz4/
package-manager:
  apk: lz4
  brew: lz4
  debian: lz4
  dnf: lz4
  macports: lz4
  nix: lz4
  pacman: lz4
  scoop: main/lz4
  ubuntu: lz4
  zypper: lz4
package-manager-url: https://formulae.brew.sh/formula/lz4
version: 1.10.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Extremely Fast Compression algorithm
source-archive: https://github.com/lz4/lz4/archive/refs/tags/v1.10.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lz4
  - exposure: global executable
    kind: cli
    name: lz4c
  - exposure: global executable
    kind: cli
    name: lz4cat
  - exposure: global executable
    kind: cli
    name: unlz4
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sequoia
    - sonoma
    - tahoe
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lz4
  av: sudo av install brew:lz4
  brew: brew install lz4
  debian: sudo apt install lz4
  dnf: sudo dnf install lz4
  macports: sudo port install lz4
  nix: nix profile install nixpkgs#lz4
  pacman: sudo pacman -S lz4
  scoop: scoop install main/lz4
  ubuntu: sudo apt install lz4
  zypper: sudo zypper install lz4
provenance:
  formula: lz4
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
