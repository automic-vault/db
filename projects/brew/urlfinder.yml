id: brew:urlfinder
display-name: urlfinder
homepage: https://github.com/pingc0y/URLFinder
repo: https://github.com/pingc0y/URLFinder
docs: https://github.com/pingc0y/URLFinder
package-manager:
  brew: urlfinder
  nix: urlfinder
package-manager-url: https://formulae.brew.sh/formula/urlfinder
version: 2023.9.9
license: MIT
category: development
tags:
  - cli
description: Extracting URLs and subdomains from JS files on a website
source-archive: https://github.com/pingc0y/URLFinder/archive/refs/tags/2023.9.9.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: urlfinder
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:urlfinder
  brew: brew install urlfinder
  nix: nix profile install nixpkgs#urlfinder
provenance:
  formula: urlfinder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
