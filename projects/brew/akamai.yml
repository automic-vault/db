id: brew:akamai
display-name: akamai
homepage: https://github.com/akamai/cli
repo: https://github.com/akamai/cli
docs: https://github.com/akamai/cli
package-manager:
  brew: akamai
package-manager-url: https://formulae.brew.sh/formula/akamai
version: 2.0.3
license: Apache-2.0
category: development
tags:
  - cli
description: CLI toolkit for working with Akamai's APIs
source-archive: https://github.com/akamai/cli/archive/refs/tags/v2.0.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: akamai
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:akamai
  brew: brew install akamai
provenance:
  formula: akamai
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
