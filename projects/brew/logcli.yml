id: brew:logcli
display-name: logcli
homepage: https://grafana.com/loki
repo: https://github.com/grafana/loki
docs: https://grafana.com/loki
package-manager:
  brew: logcli
  pacman: logcli
  scoop: main/logcli
  zypper: logcli
package-manager-url: https://formulae.brew.sh/formula/logcli
version: 3.7.2
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Run LogQL queries against a Loki server
source-archive: https://github.com/grafana/loki/archive/refs/tags/v3.7.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: logcli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:logcli
  brew: brew install logcli
  pacman: sudo pacman -S logcli
  scoop: scoop install main/logcli
  zypper: sudo zypper install logcli
provenance:
  formula: logcli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
