id: brew:saldl
display-name: saldl
homepage: https://saldl.github.io/
repo: https://github.com/saldl/saldl
docs: https://saldl.github.io/
package-manager:
  brew: saldl
  nix: saldl
package-manager-url: https://formulae.brew.sh/formula/saldl
version: 41
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: CLI downloader optimized for speed and early preview
source-archive: https://github.com/saldl/saldl/archive/refs/tags/v41.tar.gz
dependencies:
  - libevent
build-dependencies:
  - asciidoc
  - docbook-xsl
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: saldl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:saldl
  brew: brew install saldl
  nix: nix profile install nixpkgs#saldl
provenance:
  formula: saldl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
