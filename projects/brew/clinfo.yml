id: brew:clinfo
display-name: clinfo
homepage: https://github.com/Oblomov/clinfo
repo: https://github.com/Oblomov/clinfo
docs: https://github.com/Oblomov/clinfo
package-manager:
  apk: clinfo
  brew: clinfo
  debian: clinfo
  dnf: clinfo
  nix: clinfo
  pacman: clinfo
  ubuntu: clinfo
  zypper: clinfo
package-manager-url: https://formulae.brew.sh/formula/clinfo
version: 3.0.25.02.14
license: CC0-1.0
category: development
tags:
  - cli
description: Print information about OpenCL platforms and devices
source-archive: https://github.com/Oblomov/clinfo/archive/refs/tags/3.0.25.02.14.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: clinfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add clinfo
  av: sudo av install brew:clinfo
  brew: brew install clinfo
  debian: sudo apt install clinfo
  dnf: sudo dnf install clinfo
  nix: nix profile install nixpkgs#clinfo
  pacman: sudo pacman -S clinfo
  ubuntu: sudo apt install clinfo
  zypper: sudo zypper install clinfo
provenance:
  formula: clinfo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
