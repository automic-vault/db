id: brew:nerdfix
display-name: nerdfix
homepage: https://github.com/loichyan/nerdfix
repo: https://github.com/loichyan/nerdfix
docs: https://github.com/loichyan/nerdfix
package-manager:
  brew: nerdfix
  nix: nerdfix
package-manager-url: https://formulae.brew.sh/formula/nerdfix
version: 0.4.2
license: MIT OR Apache-2.0
category: development
tags:
  - cli
description: Find/fix obsolete Nerd Font icons
source-archive: https://github.com/loichyan/nerdfix/archive/refs/tags/v0.4.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: nerdfix
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nerdfix
  brew: brew install nerdfix
  nix: nix profile install nixpkgs#nerdfix
provenance:
  formula: nerdfix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
