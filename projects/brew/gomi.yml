id: brew:gomi
display-name: gomi
homepage: https://gomi.dev
repo: https://github.com/babarot/gomi
docs: https://gomi.dev
package-manager:
  brew: gomi
  nix: gomi
package-manager-url: https://formulae.brew.sh/formula/gomi
version: 1.6.3
license: MIT
category: development
tags:
  - cli
description: Functions like rm but with the ability to restore files
source-archive: https://github.com/babarot/gomi/archive/refs/tags/v1.6.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gomi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gomi
  brew: brew install gomi
  nix: nix profile install nixpkgs#gomi
provenance:
  formula: gomi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
