id: brew:nyan
display-name: nyan
homepage: https://github.com/toshimaru/nyan
repo: https://github.com/toshimaru/nyan
docs: https://github.com/toshimaru/nyan
package-manager:
  brew: nyan
  nix: nyan
package-manager-url: https://formulae.brew.sh/formula/nyan
version: 1.2.6
license: MIT
category: development
tags:
  - cli
description: Colorizing cat command with syntax highlighting
source-archive: https://github.com/toshimaru/nyan/archive/refs/tags/v1.2.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nyan
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nyan
  brew: brew install nyan
  nix: nix profile install nixpkgs#nyan
provenance:
  formula: nyan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
