id: brew:tgpt
display-name: tgpt
homepage: https://github.com/aandrew-me/tgpt
repo: https://github.com/aandrew-me/tgpt
docs: https://github.com/aandrew-me/tgpt
package-manager:
  brew: tgpt
  nix: tgpt
  pacman: tgpt
package-manager-url: https://formulae.brew.sh/formula/tgpt
version: 2.11.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: AI Chatbots in terminal without needing API keys
source-archive: https://github.com/aandrew-me/tgpt/archive/refs/tags/v2.11.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tgpt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tgpt
  brew: brew install tgpt
  nix: nix profile install nixpkgs#tgpt
  pacman: sudo pacman -S tgpt
provenance:
  formula: tgpt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
