id: brew:hickory-dns
display-name: hickory-dns
homepage: https://github.com/hickory-dns/hickory-dns
repo: https://github.com/hickory-dns/hickory-dns
docs: https://github.com/hickory-dns/hickory-dns
package-manager:
  apk: hickory-dns
  brew: hickory-dns
  debian: hickory-dns
  nix: hickory-dns
package-manager-url: https://formulae.brew.sh/formula/hickory-dns
version: 0.26.1
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Rust based DNS client, server, and resolver
source-archive: https://github.com/hickory-dns/hickory-dns/archive/refs/tags/v0.26.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hickory-dns
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hickory-dns
  av: sudo av install brew:hickory-dns
  brew: brew install hickory-dns
  debian: sudo apt install hickory-dns
  nix: nix profile install nixpkgs#hickory-dns
provenance:
  formula: hickory-dns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
