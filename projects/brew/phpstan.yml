id: brew:phpstan
display-name: phpstan
homepage: https://github.com/phpstan/phpstan
repo: https://github.com/phpstan/phpstan
docs: https://github.com/phpstan/phpstan
package-manager:
  brew: phpstan
  nix: phpstan
package-manager-url: https://formulae.brew.sh/formula/phpstan
version: 2.1.56
license: MIT
category: development
tags:
  - cli
description: PHP Static Analysis Tool
source-archive: https://github.com/phpstan/phpstan/releases/download/2.1.56/phpstan.phar
executables:
  - exposure: global executable
    kind: cli
    name: phpstan
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:phpstan
  brew: brew install phpstan
  nix: nix profile install nixpkgs#phpstan
provenance:
  formula: phpstan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
