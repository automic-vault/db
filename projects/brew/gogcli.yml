id: brew:gogcli
display-name: gogcli
homepage: https://gogcli.sh
repo: https://github.com/steipete/gogcli
docs: https://gogcli.sh
package-manager:
  brew: gogcli
  nix: gogcli
  scoop: main/gogcli
  winget: steipete.gogcli
package-manager-url: https://formulae.brew.sh/formula/gogcli
version: 0.19.0
license: MIT
category: development
tags:
  - cli
description: Google Suite CLI
source-archive: https://github.com/steipete/gogcli/archive/refs/tags/v0.19.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gogcli
  brew: brew install gogcli
  nix: nix profile install nixpkgs#gogcli
  scoop: scoop install main/gogcli
  winget: winget install --id steipete.gogcli -e
provenance:
  formula: gogcli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
