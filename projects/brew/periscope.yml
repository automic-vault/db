id: brew:periscope
display-name: periscope
homepage: https://github.com/anishathalye/periscope
repo: https://github.com/anishathalye/periscope
docs: https://github.com/anishathalye/periscope
package-manager:
  brew: periscope
package-manager-url: https://formulae.brew.sh/formula/periscope
version: 1.0.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: Organize and de-duplicate your files without losing data
source-archive: https://github.com/anishathalye/periscope.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: psc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:periscope
  brew: brew install periscope
provenance:
  formula: periscope
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
