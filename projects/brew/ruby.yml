id: brew:ruby
display-name: ruby
homepage: https://www.ruby-lang.org/
repo: https://cache.ruby-lang.org/pub/ruby/4.0/ruby-4.0.5.tar.gz
docs: https://www.ruby-lang.org/
package-manager:
  apk: ruby
  brew: ruby
  chocolatey: ruby
  debian: ruby
  dnf: ruby
  macports: ruby
  nix: ruby
  pacman: ruby
  scoop: main/ruby
  ubuntu: ruby
  zypper: ruby
package-manager-url: https://formulae.brew.sh/formula/ruby
version: 4.0.5
license: Ruby
category: development
tags:
  - cli
description: Powerful, clean, object-oriented scripting language
source-archive: https://cache.ruby-lang.org/pub/ruby/4.0/ruby-4.0.5.tar.gz
dependencies:
  - libyaml
  - openssl@3
build-dependencies:
  - autoconf
  - pkgconf
  - rust
uses-from-macos:
  - gperf
  - libffi
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: bundle
  - exposure: global executable
    kind: cli
    name: bundler
  - exposure: global executable
    kind: cli
    name: erb
  - exposure: global executable
    kind: cli
    name: gem
  - exposure: global executable
    kind: cli
    name: irb
  - exposure: global executable
    kind: cli
    name: minitest
  - exposure: global executable
    kind: cli
    name: racc
  - exposure: global executable
    kind: cli
    name: rake
  - exposure: global executable
    kind: cli
    name: rbs
  - exposure: global executable
    kind: cli
    name: rdbg
  - exposure: global executable
    kind: cli
    name: rdoc
  - exposure: global executable
    kind: cli
    name: ri
  - exposure: global executable
    kind: cli
    name: ruby
  - exposure: global executable
    kind: cli
    name: syntax_suggest
  - exposure: global executable
    kind: cli
    name: test-unit
  - exposure: global executable
    kind: cli
    name: typeprof
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    By default, binaries installed by gem will be placed into:
    $HOMEBREW_PREFIX/lib/ruby/gems/4.0.0/bin You may want to add this to your PATH.
  post-install-defined: true
install-lines:
  apk: sudo apk add ruby
  av: sudo av install brew:ruby
  brew: brew install ruby
  chocolatey: choco install ruby
  debian: sudo apt install ruby
  dnf: sudo dnf install ruby
  macports: sudo port install ruby
  nix: nix profile install nixpkgs#ruby
  pacman: sudo pacman -S ruby
  scoop: scoop install main/ruby
  ubuntu: sudo apt install ruby
  zypper: sudo zypper install ruby
provenance:
  formula: ruby
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
