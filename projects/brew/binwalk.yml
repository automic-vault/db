id: brew:binwalk
display-name: binwalk
homepage: https://github.com/ReFirmLabs/binwalk
repo: https://github.com/ReFirmLabs/binwalk
docs: https://github.com/ReFirmLabs/binwalk
package-manager:
  apk: binwalk
  brew: binwalk
  debian: binwalk
  dnf: binwalk
  macports: binwalk
  nix: binwalk
  pacman: binwalk
  ubuntu: binwalk
  zypper: binwalk
package-manager-url: https://formulae.brew.sh/formula/binwalk
version: 3.1.0
license: MIT
category: development
tags:
  - cli
description: Searches a binary image for embedded files and executable code
source-archive: https://github.com/ReFirmLabs/binwalk/archive/refs/tags/v3.1.0.tar.gz
dependencies:
  - p7zip
  - xz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: binwalk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add binwalk
  av: sudo av install brew:binwalk
  brew: brew install binwalk
  debian: sudo apt install binwalk
  dnf: sudo dnf install binwalk
  macports: sudo port install binwalk
  nix: nix profile install nixpkgs#binwalk
  pacman: sudo pacman -S binwalk
  ubuntu: sudo apt install binwalk
  zypper: sudo zypper install binwalk
provenance:
  formula: binwalk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
