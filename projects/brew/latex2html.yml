id: brew:latex2html
display-name: latex2html
homepage: https://www.latex2html.org
repo: https://github.com/latex2html/latex2html
docs: https://www.latex2html.org
package-manager:
  brew: latex2html
  debian: latex2html
  dnf: latex2html
  macports: latex2html
  nix: latex2html
  pacman: latex2html
  ubuntu: latex2html
  zypper: latex2html
package-manager-url: https://formulae.brew.sh/formula/latex2html
version: 2026
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: LaTeX-to-HTML translator
source-archive: https://github.com/latex2html/latex2html/archive/refs/tags/v2026.tar.gz
dependencies:
  - ghostscript
  - netpbm
executables:
  - exposure: global executable
    kind: cli
    name: latex2html
  - exposure: global executable
    kind: cli
    name: pstoimg
  - exposure: global executable
    kind: cli
    name: texexpand
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:latex2html
  brew: brew install latex2html
  debian: sudo apt install latex2html
  dnf: sudo dnf install latex2html
  macports: sudo port install latex2html
  nix: nix profile install nixpkgs#latex2html
  pacman: sudo pacman -S latex2html
  ubuntu: sudo apt install latex2html
  zypper: sudo zypper install latex2html
provenance:
  formula: latex2html
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
