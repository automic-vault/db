id: brew:gensio
display-name: gensio
homepage: https://github.com/cminyard/gensio
repo: https://github.com/cminyard/gensio
docs: https://github.com/cminyard/gensio
package-manager:
  apk: gensio
  brew: gensio
  dnf: gensio
  macports: gsh
  nix: gensio
  pacman: gensio
  zypper: gensio
package-manager-url: https://formulae.brew.sh/formula/gensio
version: 3.0.2
license: LGPL-2.1-only AND GPL-2.0-only AND Apache-2.0
category: development
tags:
  - cli
description: Stream I/O Library
source-archive: https://github.com/cminyard/gensio/releases/download/v3.0.2/gensio-3.0.2.tar.gz
dependencies:
  - gettext
  - glib
  - openssl@3
  - portaudio
  - python@3.14
  - tcl-tk
build-dependencies:
  - go
  - pkgconf
  - swig
executables:
  - exposure: global executable
    kind: cli
    name: gagwpe
  - exposure: global executable
    kind: cli
    name: gensiot
  - exposure: global executable
    kind: cli
    name: gmdns
  - exposure: global executable
    kind: cli
    name: greflector
  - exposure: global executable
    kind: cli
    name: gsh
  - exposure: global executable
    kind: cli
    name: gsound
  - exposure: global executable
    kind: cli
    name: gtlssh
  - exposure: global executable
    kind: cli
    name: gtlssh-keygen
  - exposure: global executable
    kind: cli
    name: gtlsshd
  - exposure: global executable
    kind: cli
    name: gtlssync
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add gensio
  av: sudo av install brew:gensio
  brew: brew install gensio
  dnf: sudo dnf install gensio
  macports: sudo port install gsh
  nix: nix profile install nixpkgs#gensio
  pacman: sudo pacman -S gensio
  zypper: sudo zypper install gensio
provenance:
  formula: gensio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
