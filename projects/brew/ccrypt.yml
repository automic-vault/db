repo: https://downloads.sourceforge.net/project/ccrypt/1.11/ccrypt-1.11.tar.gz
docs: https://ccrypt.sourceforge.net/
package-manager:
  brew: ccrypt
  debian: ccrypt
  macports: ccrypt
  nix: ccrypt
  ubuntu: ccrypt
