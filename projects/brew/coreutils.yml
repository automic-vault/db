bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Commands also provided by macOS and the commands dir, dircolors, vdir have been
    installed with the prefix "g". If you need to use these commands with their normal
    names, you can add a "gnubin" directory to your PATH with:
    PATH="$HOMEBREW_PREFIX/opt/coreutils/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add coreutils
  av: sudo av install brew:coreutils
  brew: brew install coreutils
  chocolatey: choco install gdu
  debian: sudo apt install coreutils
  dnf: sudo dnf install coreutils
  macports: sudo port install coreutils
  nix: nix profile install nixpkgs#coreutils
  pacman: sudo pacman -S coreutils
  scoop: scoop install main/coreutils
  ubuntu: sudo apt install coreutils
  winget: winget install --id uutils.coreutils -e
  zypper: sudo zypper install coreutils
provenance:
  formula: coreutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
