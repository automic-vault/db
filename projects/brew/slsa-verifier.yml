id: brew:slsa-verifier
display-name: slsa-verifier
homepage: https://github.com/slsa-framework/slsa-verifier
repo: https://github.com/slsa-framework/slsa-verifier
docs: https://github.com/slsa-framework/slsa-verifier
package-manager:
  brew: slsa-verifier
  nix: slsa-verifier
  zypper: slsa-verifier
package-manager-url: https://formulae.brew.sh/formula/slsa-verifier
version: 2.7.1
license: Apache-2.0
category: development
tags:
  - cli
description: Verify provenance from SLSA compliant builders
source-archive: https://github.com/slsa-framework/slsa-verifier/archive/refs/tags/v2.7.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: slsa-verifier
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:slsa-verifier
  brew: brew install slsa-verifier
  nix: nix profile install nixpkgs#slsa-verifier
  zypper: sudo zypper install slsa-verifier
provenance:
  formula: slsa-verifier
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
