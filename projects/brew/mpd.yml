id: brew:mpd
display-name: mpd
homepage: https://www.musicpd.org/
repo: https://github.com/MusicPlayerDaemon/MPD
docs: https://www.musicpd.org/
package-manager:
  apk: mpd
  brew: mpd
  chocolatey: mpd
  debian: mpd
  dnf: mpd
  macports: mpd
  nix: mpd
  pacman: mpd
  scoop: main/mpd
  ubuntu: mpd
  zypper: mpd
package-manager-url: https://formulae.brew.sh/formula/mpd
version: 0.24.12
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Music Player Daemon
source-archive: https://github.com/MusicPlayerDaemon/MPD/archive/refs/tags/v0.24.12.tar.gz
dependencies:
  - chromaprint
  - faad2
  - ffmpeg
  - flac
  - fluid-synth
  - fmt
  - game-music-emu
  - icu4c@78
  - lame
  - libao
  - libid3tag
  - libmikmod
  - libmpdclient
  - libnfs
  - libnpupnp
  - libogg
  - libsamplerate
  - libshout
  - libsndfile
  - libsoxr
  - libvorbis
  - mpg123
  - opus
  - pcre2
  - sqlite
  - wavpack
build-dependencies:
  - meson
  - ninja
  - nlohmann-json
  - pkgconf
uses-from-macos:
  - bzip2
  - curl
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: mpd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    MPD requires a config file to start. Please copy it from
    $HOMEBREW_PREFIX/etc/mpd/mpd.conf into one of these paths: - ~/.mpd/mpd.conf -
    ~/.mpdconf and tailor it to your needs.
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add mpd
  av: sudo av install brew:mpd
  brew: brew install mpd
  chocolatey: choco install mpd
  debian: sudo apt install mpd
  dnf: sudo dnf install mpd
  macports: sudo port install mpd
  nix: nix profile install nixpkgs#mpd
  pacman: sudo pacman -S mpd
  scoop: scoop install main/mpd
  ubuntu: sudo apt install mpd
  zypper: sudo zypper install mpd
provenance:
  formula: mpd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
