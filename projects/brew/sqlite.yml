id: brew:sqlite
display-name: sqlite
homepage: https://sqlite.org/index.html
repo: https://www.sqlite.org/2026/sqlite-autoconf-3530100.tar.gz
docs: https://sqlite.org/index.html
package-manager:
  apk: sqlite
  brew: sqlite
  chocolatey: SQLite
  debian: sqlite3
  dnf: sqlite
  macports: sqlite3
  nix: sqlite
  pacman: sqlite
  scoop: main/sqlite
  ubuntu: sqlite3
  winget: SQLite.SQLite
  zypper: sqlite3
package-manager-url: https://formulae.brew.sh/formula/sqlite
version: 3.53.1
license: blessing
category: database
tags:
  - cli
description: Command-line interface for SQLite
source-archive: https://www.sqlite.org/2026/sqlite-autoconf-3530100.tar.gz
dependencies:
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: sqlite3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sqlite
  av: sudo av install brew:sqlite
  brew: brew install sqlite
  chocolatey: choco install SQLite
  debian: sudo apt install sqlite3
  dnf: sudo dnf install sqlite
  macports: sudo port install sqlite3
  nix: nix profile install nixpkgs#sqlite
  pacman: sudo pacman -S sqlite
  scoop: scoop install main/sqlite
  ubuntu: sudo apt install sqlite3
  winget: winget install --id SQLite.SQLite -e
  zypper: sudo zypper install sqlite3
provenance:
  formula: sqlite
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
