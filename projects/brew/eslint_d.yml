id: brew:eslint_d
display-name: eslint_d
homepage: https://github.com/mantoni/eslint_d.js
repo: https://registry.npmjs.org/eslint_d/-/eslint_d-15.0.2.tgz
docs: https://github.com/mantoni/eslint_d.js
package-manager:
  brew: eslint_d
  nix: eslint_d
  pacman: eslint_d
package-manager-url: https://formulae.brew.sh/formula/eslint_d
version: 15.0.2
license: MIT
category: development
tags:
  - cli
description: Speed up eslint to accelerate your development workflow
source-archive: https://registry.npmjs.org/eslint_d/-/eslint_d-15.0.2.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: eslint_d
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:eslint_d
  brew: brew install eslint_d
  nix: nix profile install nixpkgs#eslint_d
  pacman: sudo pacman -S eslint_d
provenance:
  formula: eslint_d
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
