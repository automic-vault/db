id: brew:tcl-tk
display-name: tcl-tk
homepage: https://www.tcl-lang.org
repo: https://downloads.sourceforge.net/project/tcl/Tcl/9.0.3/tcl9.0.3-src.tar.gz
docs: https://www.tcl-lang.org
package-manager:
  apk: critcl
  brew: tcl-tk
  debian: critcl
  macports: critcl
  nix: page
  scoop: main/pt
  ubuntu: critcl
package-manager-url: https://formulae.brew.sh/formula/tcl-tk
version: 9.0.3
license: TCL
category: development
tags:
  - cli
description: Tool Command Language
source-archive: https://downloads.sourceforge.net/project/tcl/Tcl/9.0.3/tcl9.0.3-src.tar.gz
dependencies:
  - libtommath
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: critcl
  - exposure: global executable
    kind: cli
    name: dtplite
  - exposure: global executable
    kind: cli
    name: mkdoc
  - exposure: global executable
    kind: cli
    name: nns
  - exposure: global executable
    kind: cli
    name: nnsd
  - exposure: global executable
    kind: cli
    name: nnslog
  - exposure: global executable
    kind: cli
    name: page
  - exposure: global executable
    kind: cli
    name: pt
  - exposure: global executable
    kind: cli
    name: tcldocstrip
  - exposure: global executable
    kind: cli
    name: tclsh
  - exposure: global executable
    kind: cli
    name: tclsh9.0
  - exposure: global executable
    kind: cli
    name: wish
  - exposure: global executable
    kind: cli
    name: wish9.0
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: The sqlite3_analyzer binary is in the `sqlite-analyzer` formula.
  post-install-defined: false
install-lines:
  apk: sudo apk add critcl
  av: sudo av install brew:tcl-tk
  brew: brew install tcl-tk
  debian: sudo apt install critcl
  macports: sudo port install critcl
  nix: nix profile install nixpkgs#page
  scoop: scoop install main/pt
  ubuntu: sudo apt install critcl
provenance:
  formula: tcl-tk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
