id: brew:cargo-about
display-name: cargo-about
homepage: https://github.com/EmbarkStudios/cargo-about
repo: https://github.com/EmbarkStudios/cargo-about
docs: https://github.com/EmbarkStudios/cargo-about
package-manager:
  brew: cargo-about
  nix: cargo-about
  pacman: cargo-about
package-manager-url: https://formulae.brew.sh/formula/cargo-about
version: 0.9.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Cargo plugin to generate list of all licenses for a crate
source-archive: https://github.com/EmbarkStudios/cargo-about/archive/refs/tags/0.9.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-about
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-about
  brew: brew install cargo-about
  nix: nix profile install nixpkgs#cargo-about
  pacman: sudo pacman -S cargo-about
provenance:
  formula: cargo-about
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
