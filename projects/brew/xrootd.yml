id: brew:xrootd
display-name: xrootd
homepage: https://xrootd.slac.stanford.edu/
repo: https://github.com/xrootd/xrootd
docs: https://xrootd.slac.stanford.edu/
package-manager:
  brew: xrootd
  dnf: xrootd
  macports: xrootd
  nix: xrootd
  pacman: xrootd
package-manager-url: https://formulae.brew.sh/formula/xrootd
version: 6.0.2
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: High performance, scalable, fault-tolerant access to data
source-archive: https://github.com/xrootd/xrootd/releases/download/v6.0.2/xrootd-6.0.2.tar.gz
dependencies:
  - davix
  - krb5
  - libzip
  - openssl@3
  - readline
build-dependencies:
  - cmake
  - pkgconf
  - python@3.14
uses-from-macos:
  - curl
  - libxcrypt
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: cconfig
  - exposure: global executable
    kind: cli
    name: cmsd
  - exposure: global executable
    kind: cli
    name: frm_admin
  - exposure: global executable
    kind: cli
    name: frm_purged
  - exposure: global executable
    kind: cli
    name: frm_xfragent
  - exposure: global executable
    kind: cli
    name: frm_xfrd
  - exposure: global executable
    kind: cli
    name: mpxstats
  - exposure: global executable
    kind: cli
    name: wait41
  - exposure: global executable
    kind: cli
    name: xrdacctest
  - exposure: global executable
    kind: cli
    name: xrdadler32
  - exposure: global executable
    kind: cli
    name: xrdcks
  - exposure: global executable
    kind: cli
    name: xrdcopy
  - exposure: global executable
    kind: cli
    name: xrdcp
  - exposure: global executable
    kind: cli
    name: xrdcrc32c
  - exposure: global executable
    kind: cli
    name: xrdfs
  - exposure: global executable
    kind: cli
    name: xrdgsiproxy
  - exposure: global executable
    kind: cli
    name: xrdgsitest
  - exposure: global executable
    kind: cli
    name: xrdmapc
  - exposure: global executable
    kind: cli
    name: xrdpfc_print
  - exposure: global executable
    kind: cli
    name: xrdpinls
  - exposure: global executable
    kind: cli
    name: xrdpwdadmin
  - exposure: global executable
    kind: cli
    name: xrdreplay
  - exposure: global executable
    kind: cli
    name: xrdsssadmin
  - exposure: global executable
    kind: cli
    name: xrootd
  - exposure: global executable
    kind: cli
    name: xrootd-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xrootd
  brew: brew install xrootd
  dnf: sudo dnf install xrootd
  macports: sudo port install xrootd
  nix: nix profile install nixpkgs#xrootd
  pacman: sudo pacman -S xrootd
provenance:
  formula: xrootd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
