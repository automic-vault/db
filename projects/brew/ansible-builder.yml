id: brew:ansible-builder
display-name: ansible-builder
homepage: https://ansible-builder.readthedocs.io/
repo: >
  https://files.pythonhosted.org/packages/fe/6b/0525894e5dd510c3a67da0b8819209333ca939cfa94b7f0d3ef041a628ec/ansible_builder-3.1.1.tar.gz
docs: https://ansible-builder.readthedocs.io/
package-manager:
  brew: ansible-builder
  dnf: ansible-builder
  nix: ansible-builder
  zypper: ansible-builder
package-manager-url: https://formulae.brew.sh/formula/ansible-builder
version: 3.1.1
license: Apache-2.0
category: development
tags:
  - cli
description: CLI tool for building Ansible Execution Environments (Containers)
source-archive: >
  https://files.pythonhosted.org/packages/fe/6b/0525894e5dd510c3a67da0b8819209333ca939cfa94b7f0d3ef041a628ec/ansible_builder-3.1.1.tar.gz
dependencies:
  - libyaml
  - python@3.14
  - rpds-py
executables:
  - exposure: global executable
    kind: cli
    name: ansible-builder
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ansible-builder
  brew: brew install ansible-builder
  dnf: sudo dnf install ansible-builder
  nix: nix profile install nixpkgs#ansible-builder
  zypper: sudo zypper install ansible-builder
provenance:
  formula: ansible-builder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
