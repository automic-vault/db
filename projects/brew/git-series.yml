id: brew:git-series
display-name: git-series
homepage: https://github.com/git-series/git-series
repo: https://github.com/git-series/git-series
docs: https://github.com/git-series/git-series
package-manager:
  brew: git-series
  nix: git-series
package-manager-url: https://formulae.brew.sh/formula/git-series
version: 0.9.1
license: MIT
category: development
tags:
  - cli
  - git
description: Track changes to a patch series over time
source-archive: https://github.com/git-series/git-series/archive/refs/tags/0.9.1.tar.gz
dependencies:
  - libgit2
  - libssh2
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: git-series
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-series
  brew: brew install git-series
  nix: nix profile install nixpkgs#git-series
provenance:
  formula: git-series
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
