id: brew:nextflow
display-name: nextflow
homepage: https://nextflow.io
repo: https://github.com/nextflow-io/nextflow
docs: https://nextflow.io
package-manager:
  brew: nextflow
  nix: nextflow
package-manager-url: https://formulae.brew.sh/formula/nextflow
version: 26.04.2
license: Apache-2.0
category: development
tags:
  - cli
description: Reproducible scientific workflows
source-archive: https://github.com/nextflow-io/nextflow/archive/refs/tags/v26.04.2.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - gradle
executables:
  - exposure: global executable
    kind: cli
    name: nextflow
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nextflow
  brew: brew install nextflow
  nix: nix profile install nixpkgs#nextflow
provenance:
  formula: nextflow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
