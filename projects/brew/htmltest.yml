id: brew:htmltest
display-name: htmltest
homepage: https://github.com/wjdp/htmltest
repo: https://github.com/wjdp/htmltest
docs: https://github.com/wjdp/htmltest
package-manager:
  brew: htmltest
  dnf: htmltest
  nix: htmltest
package-manager-url: https://formulae.brew.sh/formula/htmltest
version: 0.17.0
license: MIT
category: development
tags:
  - cli
description: HTML validator written in Go
source-archive: https://github.com/wjdp/htmltest/archive/refs/tags/v0.17.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: htmltest
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:htmltest
  brew: brew install htmltest
  dnf: sudo dnf install htmltest
  nix: nix profile install nixpkgs#htmltest
provenance:
  formula: htmltest
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
