id: brew:kalign
display-name: kalign
homepage: https://github.com/TimoLassmann/kalign
repo: https://github.com/TimoLassmann/kalign
docs: https://github.com/TimoLassmann/kalign
package-manager:
  brew: kalign
  debian: kalign
  nix: kalign
  ubuntu: kalign
package-manager-url: https://formulae.brew.sh/formula/kalign
version: 3.5.1
license: Apache-2.0
category: development
tags:
  - cli
description: Fast multiple sequence alignment program for biological sequences
source-archive: https://github.com/TimoLassmann/kalign/archive/refs/tags/v3.5.1.tar.gz
dependencies:
  - libomp
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: kalign
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kalign
  brew: brew install kalign
  debian: sudo apt install kalign
  nix: nix profile install nixpkgs#kalign
  ubuntu: sudo apt install kalign
provenance:
  formula: kalign
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
