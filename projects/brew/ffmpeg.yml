  debian: ffmpeg
  macports: ffmpeg
  pacman: ffmpeg
  scoop: main/ffmpeg
  ubuntu: ffmpeg
  winget: Gyan.FFmpeg
package-manager-url: https://formulae.brew.sh/formula/ffmpeg
version: 8.1.1
license: GPL-3.0-or-later
category: media
tags:
