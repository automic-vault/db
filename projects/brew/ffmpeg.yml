bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    ffmpeg-full includes additional tools and libraries that are not included in the
    regular ffmpeg formula.
  post-install-defined: false
install-lines:
  apk: sudo apk add ffmpeg
  av: sudo av install brew:ffmpeg
  brew: brew install ffmpeg
  chocolatey: choco install ffmpeg
  debian: sudo apt install ffmpeg
  macports: sudo port install ffmpeg
  pacman: sudo pacman -S ffmpeg
  scoop: scoop install main/ffmpeg
  ubuntu: sudo apt install ffmpeg
  winget: winget install --id Gyan.FFmpeg -e
provenance:
  formula: ffmpeg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
