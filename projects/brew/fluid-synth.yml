id: brew:fluid-synth
display-name: fluid-synth
homepage: https://www.fluidsynth.org
repo: https://github.com/FluidSynth/fluidsynth
docs: https://www.fluidsynth.org
package-manager:
  apk: fluidsynth
  brew: fluid-synth
  debian: fluidsynth
  dnf: fluidsynth
  macports: fluidsynth
  nix: fluidsynth
  pacman: fluidsynth
  scoop: extras/fluidsynth
  ubuntu: fluidsynth
  zypper: fluidsynth
package-manager-url: https://formulae.brew.sh/formula/fluid-synth
version: 2.5.4
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Real-time software synthesizer based on the SoundFont 2 specs
source-archive: https://github.com/FluidSynth/fluidsynth/archive/refs/tags/v2.5.4.tar.gz
dependencies:
  - gettext
  - glib
  - libsndfile
  - portaudio
  - readline
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fluidsynth
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fluidsynth
  av: sudo av install brew:fluid-synth
  brew: brew install fluid-synth
  debian: sudo apt install fluidsynth
  dnf: sudo dnf install fluidsynth
  macports: sudo port install fluidsynth
  nix: nix profile install nixpkgs#fluidsynth
  pacman: sudo pacman -S fluidsynth
  scoop: scoop install extras/fluidsynth
  ubuntu: sudo apt install fluidsynth
  zypper: sudo zypper install fluidsynth
provenance:
  formula: fluid-synth
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
