id: brew:murex
display-name: murex
homepage: https://murex.rocks
repo: https://github.com/lmorg/murex
docs: https://murex.rocks
package-manager:
  apk: murex
  brew: murex
  macports: murex
  nix: murex
package-manager-url: https://formulae.brew.sh/formula/murex
version: 7.2.1001
license: GPL-2.0-only
category: development
tags:
  - cli
description: Bash-like shell designed for greater command-line productivity and safer scripts
source-archive: https://github.com/lmorg/murex/archive/refs/tags/v7.2.1001.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: murex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add murex
  av: sudo av install brew:murex
  brew: brew install murex
  macports: sudo port install murex
  nix: nix profile install nixpkgs#murex
provenance:
  formula: murex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
