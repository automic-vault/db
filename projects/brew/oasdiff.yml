id: brew:oasdiff
display-name: oasdiff
homepage: https://www.oasdiff.com/
repo: https://github.com/oasdiff/oasdiff
docs: https://www.oasdiff.com/
package-manager:
  brew: oasdiff
  macports: oasdiff
package-manager-url: https://formulae.brew.sh/formula/oasdiff
version: 1.16.0
license: Apache-2.0
category: development
tags:
  - cli
description: OpenAPI Diff and Breaking Changes
source-archive: https://github.com/oasdiff/oasdiff/archive/refs/tags/v1.16.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: oasdiff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oasdiff
  brew: brew install oasdiff
  macports: sudo port install oasdiff
provenance:
  formula: oasdiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
