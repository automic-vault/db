id: brew:purescript
display-name: purescript
homepage: https://www.purescript.org/
repo: https://github.com/purescript/purescript
docs: https://www.purescript.org/
package-manager:
  brew: purescript
  nix: purescript
  scoop: main/purescript
package-manager-url: https://formulae.brew.sh/formula/purescript
version: 0.15.15
license: BSD-3-Clause
category: development
tags:
  - cli
description: Strongly typed programming language that compiles to JavaScript
source-archive: https://github.com/purescript/purescript/archive/refs/tags/v0.15.15.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: purs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:purescript
  brew: brew install purescript
  nix: nix profile install nixpkgs#purescript
  scoop: scoop install main/purescript
provenance:
  formula: purescript
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
