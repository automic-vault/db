id: brew:ipinfo
display-name: ipinfo
homepage: https://kyberdigi.cz/projects/ipinfo/
repo: https://kyberdigi.cz/projects/ipinfo/files/ipinfo-1.2.tar.gz
docs: https://kyberdigi.cz/projects/ipinfo/
package-manager:
  brew: ipinfo
  nix: ipinfo
  winget: ipinfo.ipinfo
package-manager-url: https://formulae.brew.sh/formula/ipinfo
version: 1.2
license: Beerware
category: network
tags:
  - cli
description: Tool for calculation of IP networks
source-archive: https://kyberdigi.cz/projects/ipinfo/files/ipinfo-1.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ipmatch
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ipinfo
  brew: brew install ipinfo
  nix: nix profile install nixpkgs#ipinfo
  winget: winget install --id ipinfo.ipinfo -e
provenance:
  formula: ipinfo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
