id: brew:yeet
display-name: yeet
homepage: https://github.com/TecharoHQ/yeet
repo: https://github.com/TecharoHQ/yeet
docs: https://github.com/TecharoHQ/yeet
package-manager:
  brew: yeet
package-manager-url: https://formulae.brew.sh/formula/yeet
version: 0.11.0
license: MIT
category: development
tags:
  - cli
description: Packaging tool that lets you declare build instructions in JavaScript
source-archive: https://github.com/TecharoHQ/yeet/archive/refs/tags/v0.11.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: yeet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yeet
  brew: brew install yeet
provenance:
  formula: yeet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
