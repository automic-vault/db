id: brew:punktf
display-name: punktf
homepage: https://shemnei.github.io/punktf/
repo: https://github.com/Shemnei/punktf
docs: https://shemnei.github.io/punktf/
package-manager:
  brew: punktf
  winget: Shemnei.punktf
package-manager-url: https://formulae.brew.sh/formula/punktf
version: 3.1.2
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Cross-platform multi-target dotfiles manager
source-archive: https://github.com/Shemnei/punktf/archive/refs/tags/v3.1.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: punktf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:punktf
  brew: brew install punktf
  winget: winget install --id Shemnei.punktf -e
provenance:
  formula: punktf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
