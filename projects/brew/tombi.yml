id: brew:tombi
display-name: tombi
homepage: https://github.com/tombi-toml/tombi
repo: https://github.com/tombi-toml/tombi
docs: https://github.com/tombi-toml/tombi
package-manager:
  brew: tombi
  macports: tombi
  nix: tombi
  pacman: tombi
  scoop: main/tombi
  winget: tombi-toml.tombi
package-manager-url: https://formulae.brew.sh/formula/tombi
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: TOML formatter, linter and language server
source-archive: https://github.com/tombi-toml/tombi/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tombi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tombi
  brew: brew install tombi
  macports: sudo port install tombi
  nix: nix profile install nixpkgs#tombi
  pacman: sudo pacman -S tombi
  scoop: scoop install main/tombi
  winget: winget install --id tombi-toml.tombi -e
provenance:
  formula: tombi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
