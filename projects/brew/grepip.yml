id: brew:grepip
display-name: grepip
homepage: https://ipinfo.io
repo: https://github.com/ipinfo/cli
docs: https://ipinfo.io
package-manager:
  brew: grepip
package-manager-url: https://formulae.brew.sh/formula/grepip
version: 1.2.2
license: Apache-2.0
category: development
tags:
  - cli
description: Filters IPv4 & IPv6 addresses with a grep-compatible interface
source-archive: https://github.com/ipinfo/cli/archive/refs/tags/grepip-1.2.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: grepip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:grepip
  brew: brew install grepip
provenance:
  formula: grepip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
