id: brew:erofs-utils
display-name: erofs-utils
homepage: https://git.kernel.org/pub/scm/linux/kernel/git/xiang/erofs-utils.git
repo: >
  https://git.kernel.org/pub/scm/linux/kernel/git/xiang/erofs-utils.git/snapshot/erofs-utils-1.9.1.tar.gz
docs: https://git.kernel.org/pub/scm/linux/kernel/git/xiang/erofs-utils.git
package-manager:
  apk: erofs-utils
  brew: erofs-utils
  debian: erofs-utils
  dnf: erofs-utils
  macports: erofs-utils
  nix: erofs-utils
  pacman: erofs-utils
  ubuntu: erofs-utils
  zypper: erofs-utils
package-manager-url: https://formulae.brew.sh/formula/erofs-utils
version: 1.9.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Utilities for Enhanced Read-Only File System
source-archive: >
  https://git.kernel.org/pub/scm/linux/kernel/git/xiang/erofs-utils.git/snapshot/erofs-utils-1.9.1.tar.gz
dependencies:
  - lz4
  - xz
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dump.erofs
  - exposure: global executable
    kind: cli
    name: erofsfuse
  - exposure: global executable
    kind: cli
    name: fsck.erofs
  - exposure: global executable
    kind: cli
    name: mkfs.erofs
  - exposure: global executable
    kind: cli
    name: mount.erofs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add erofs-utils
  av: sudo av install brew:erofs-utils
  brew: brew install erofs-utils
  debian: sudo apt install erofs-utils
  dnf: sudo dnf install erofs-utils
  macports: sudo port install erofs-utils
  nix: nix profile install nixpkgs#erofs-utils
  pacman: sudo pacman -S erofs-utils
  ubuntu: sudo apt install erofs-utils
  zypper: sudo zypper install erofs-utils
provenance:
  formula: erofs-utils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
