id: brew:rustscan
display-name: rustscan
homepage: https://github.com/bee-san/RustScan
repo: https://github.com/bee-san/RustScan
docs: https://github.com/bee-san/RustScan
package-manager:
  apk: rustscan
  brew: rustscan
  macports: rustscan
  nix: rustscan
  pacman: rustscan
  zypper: rustscan
package-manager-url: https://formulae.brew.sh/formula/rustscan
version: 2.4.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Modern Day Portscanner
source-archive: https://github.com/bee-san/RustScan/archive/refs/tags/2.4.1.tar.gz
dependencies:
  - nmap
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rustscan
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rustscan
  av: sudo av install brew:rustscan
  brew: brew install rustscan
  macports: sudo port install rustscan
  nix: nix profile install nixpkgs#rustscan
  pacman: sudo pacman -S rustscan
  zypper: sudo zypper install rustscan
provenance:
  formula: rustscan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
