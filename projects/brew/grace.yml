id: brew:grace
display-name: grace
homepage: https://plasma-gate.weizmann.ac.il/Grace/
repo: https://deb.debian.org/debian/pool/main/g/grace/grace_5.1.25.orig.tar.gz
docs: https://plasma-gate.weizmann.ac.il/Grace/
package-manager:
  brew: grace
  debian: grace
  dnf: grace
  macports: grace
  ubuntu: grace
  zypper: xmgrace
package-manager-url: https://formulae.brew.sh/formula/grace
version: 5.1.25
license: GPL-2.0-only
category: network
tags:
  - cli
description: WYSIWYG 2D plotting tool for X11
source-archive: https://deb.debian.org/debian/pool/main/g/grace/grace_5.1.25.orig.tar.gz
dependencies:
  - fftw
  - jpeg-turbo
  - libice
  - libpng
  - libsm
  - libx11
  - libxext
  - libxmu
  - libxp
  - libxpm
  - libxt
  - openmotif
executables:
  - exposure: global executable
    kind: cli
    name: convcal
  - exposure: global executable
    kind: cli
    name: fdf2fit
  - exposure: global executable
    kind: cli
    name: gracebat
  - exposure: global executable
    kind: cli
    name: grconvert
  - exposure: global executable
    kind: cli
    name: xmgrace
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:grace
  brew: brew install grace
  debian: sudo apt install grace
  dnf: sudo dnf install grace
  macports: sudo port install grace
  ubuntu: sudo apt install grace
  zypper: sudo zypper install xmgrace
provenance:
  formula: grace
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
