id: brew:pcapmirror
display-name: pcapmirror
homepage: https://git.freestone.net/cramer/pcapmirror
repo: https://git.freestone.net/cramer/pcapmirror/-/archive/0.6.1/pcapmirror-0.6.1.tar.gz
docs: https://git.freestone.net/cramer/pcapmirror
package-manager:
  brew: pcapmirror
package-manager-url: https://formulae.brew.sh/formula/pcapmirror
version: 0.6.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Tool for capturing network traffic on remote host using TZSP or ERSPAN
source-archive: https://git.freestone.net/cramer/pcapmirror/-/archive/0.6.1/pcapmirror-0.6.1.tar.gz
build-dependencies:
  - make
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: pcapmirror
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pcapmirror
  brew: brew install pcapmirror
provenance:
  formula: pcapmirror
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
