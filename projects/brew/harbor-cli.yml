id: brew:harbor-cli
display-name: harbor-cli
homepage: https://github.com/goharbor/harbor-cli
repo: https://github.com/goharbor/harbor-cli
docs: https://github.com/goharbor/harbor-cli
package-manager:
  brew: harbor-cli
  nix: harbor-cli
  winget: GoHarbor.Harbor
  zypper: harbor-cli
package-manager-url: https://formulae.brew.sh/formula/harbor-cli
version: 0.0.22
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for Harbor container registry
source-archive: https://github.com/goharbor/harbor-cli/archive/refs/tags/v0.0.22.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: harbor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:harbor-cli
  brew: brew install harbor-cli
  nix: nix profile install nixpkgs#harbor-cli
  winget: winget install --id GoHarbor.Harbor -e
  zypper: sudo zypper install harbor-cli
provenance:
  formula: harbor-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
