id: brew:itpp
display-name: itpp
homepage: https://itpp.sourceforge.net/
repo: https://downloads.sourceforge.net/project/itpp/itpp/4.3.1/itpp-4.3.1.tar.bz2
docs: https://itpp.sourceforge.net/
package-manager:
  brew: itpp
  macports: itpp
package-manager-url: https://formulae.brew.sh/formula/itpp
version: 4.3.1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Library of math, signal, and communication classes and functions
source-archive: https://downloads.sourceforge.net/project/itpp/itpp/4.3.1/itpp-4.3.1.tar.bz2
dependencies:
  - fftw
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: itpp-config
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:itpp
  brew: brew install itpp
  macports: sudo port install itpp
provenance:
  formula: itpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
