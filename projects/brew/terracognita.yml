id: brew:terracognita
display-name: terracognita
homepage: https://github.com/cycloidio/terracognita
repo: https://github.com/cycloidio/terracognita
docs: https://github.com/cycloidio/terracognita
package-manager:
  brew: terracognita
  nix: terracognita
package-manager-url: https://formulae.brew.sh/formula/terracognita
version: 0.8.4
license: MIT
category: cloud
tags:
  - cli
  - cloud
description: Reads from existing Cloud Providers and generates Terraform code
source-archive: https://github.com/cycloidio/terracognita/archive/refs/tags/v0.8.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terracognita
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terracognita
  brew: brew install terracognita
  nix: nix profile install nixpkgs#terracognita
provenance:
  formula: terracognita
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
