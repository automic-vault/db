id: brew:qrtool
display-name: qrtool
homepage: https://sorairolake.github.io/qrtool/book/index.html
repo: https://github.com/sorairolake/qrtool
docs: https://sorairolake.github.io/qrtool/book/index.html
package-manager:
  brew: qrtool
  macports: qrtool
  nix: qrtool
  pacman: qrtool
  winget: sorairolake.qrtool
  zypper: qrtool
package-manager-url: https://formulae.brew.sh/formula/qrtool
version: 0.13.2
license: CC-BY-4.0 AND (Apache-2.0 OR MIT)
category: development
tags:
  - cli
description: Utility for encoding or decoding QR code
source-archive: https://github.com/sorairolake/qrtool/archive/refs/tags/v0.13.2.tar.gz
build-dependencies:
  - asciidoctor
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: qrtool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qrtool
  brew: brew install qrtool
  macports: sudo port install qrtool
  nix: nix profile install nixpkgs#qrtool
  pacman: sudo pacman -S qrtool
  winget: winget install --id sorairolake.qrtool -e
  zypper: sudo zypper install qrtool
provenance:
  formula: qrtool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
