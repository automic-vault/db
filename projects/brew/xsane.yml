id: brew:xsane
display-name: xsane
homepage: https://gitlab.com/sane-project/frontend/xsane
repo: https://ftp.osuosl.org/pub/blfs/conglomeration/xsane/xsane-0.999.tar.gz
docs: https://gitlab.com/sane-project/frontend/xsane
package-manager:
  apk: xsane
  brew: xsane
  debian: xsane
  dnf: xsane
  macports: xsane
  nix: xsane
  ubuntu: xsane
  zypper: xsane
package-manager-url: https://formulae.brew.sh/formula/xsane
version: 0.999
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Graphical scanning frontend
source-archive: https://ftp.osuosl.org/pub/blfs/conglomeration/xsane/xsane-0.999.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+
  - harfbuzz
  - jpeg-turbo
  - libpng
  - libtiff
  - pango
  - sane-backends
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xsane
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xsane
  av: sudo av install brew:xsane
  brew: brew install xsane
  debian: sudo apt install xsane
  dnf: sudo dnf install xsane
  macports: sudo port install xsane
  nix: nix profile install nixpkgs#xsane
  ubuntu: sudo apt install xsane
  zypper: sudo zypper install xsane
provenance:
  formula: xsane
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
