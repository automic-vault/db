id: brew:ntp
display-name: ntp
homepage: https://www.ntp.org
repo: https://downloads.nwtime.org/ntp/4.2.8/ntp-4.2.8p18.tar.gz
docs: https://www.ntp.org
package-manager:
  brew: ntp
  macports: ntp
  nix: ntp
  pacman: ntp
  ubuntu: ntp
  zypper: ntp
package-manager-url: https://formulae.brew.sh/formula/ntp
version: 4.2.8p18
license: BSD-2-Clause AND NTP
category: network
tags:
  - cli
description: Network Time Protocol (NTP) Distribution
source-archive: https://downloads.nwtime.org/ntp/4.2.8/ntp-4.2.8p18.tar.gz
dependencies:
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: ntp-keygen
  - exposure: global executable
    kind: cli
    name: ntp-wait
  - exposure: global executable
    kind: cli
    name: ntpd
  - exposure: global executable
    kind: cli
    name: ntpdate
  - exposure: global executable
    kind: cli
    name: ntpdc
  - exposure: global executable
    kind: cli
    name: ntpq
  - exposure: global executable
    kind: cli
    name: ntptime
  - exposure: global executable
    kind: cli
    name: ntptrace
  - exposure: global executable
    kind: cli
    name: sntp
  - exposure: global executable
    kind: cli
    name: update-leap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ntp
  brew: brew install ntp
  macports: sudo port install ntp
  nix: nix profile install nixpkgs#ntp
  pacman: sudo pacman -S ntp
  ubuntu: sudo apt install ntp
  zypper: sudo zypper install ntp
provenance:
  formula: ntp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
