id: brew:dstp
display-name: dstp
homepage: https://github.com/ycd/dstp
repo: https://github.com/ycd/dstp
docs: https://github.com/ycd/dstp
package-manager:
  brew: dstp
  nix: dstp
package-manager-url: https://formulae.brew.sh/formula/dstp
version: 0.4.23
license: MIT
category: development
tags:
  - cli
description: Run common networking tests against your site
source-archive: https://github.com/ycd/dstp/archive/refs/tags/v0.4.23.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dstp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dstp
  brew: brew install dstp
  nix: nix profile install nixpkgs#dstp
provenance:
  formula: dstp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
