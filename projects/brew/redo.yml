id: brew:redo
display-name: redo
homepage: https://redo.rtfd.io/
repo: https://github.com/apenwarr/redo
docs: https://redo.rtfd.io/
package-manager:
  brew: redo
  macports: redo
  nix: redo
package-manager-url: https://formulae.brew.sh/formula/redo
version: 0.42d
license: Apache-2.0
category: development
tags:
  - cli
description: "Implements djb's redo: an alternative to make"
source-archive: https://github.com/apenwarr/redo/archive/refs/tags/redo-0.42d.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: redo
  - exposure: global executable
    kind: cli
    name: redo-always
  - exposure: global executable
    kind: cli
    name: redo-ifchange
  - exposure: global executable
    kind: cli
    name: redo-ifcreate
  - exposure: global executable
    kind: cli
    name: redo-log
  - exposure: global executable
    kind: cli
    name: redo-ood
  - exposure: global executable
    kind: cli
    name: redo-sources
  - exposure: global executable
    kind: cli
    name: redo-stamp
  - exposure: global executable
    kind: cli
    name: redo-targets
  - exposure: global executable
    kind: cli
    name: redo-unlocked
  - exposure: global executable
    kind: cli
    name: redo-whichdo
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:redo
  brew: brew install redo
  macports: sudo port install redo
  nix: nix profile install nixpkgs#redo
provenance:
  formula: redo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
