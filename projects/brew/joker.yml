id: brew:joker
display-name: joker
homepage: https://joker-lang.org/
repo: https://github.com/candid82/joker
docs: https://joker-lang.org/
package-manager:
  apk: joker
  brew: joker
  nix: joker
  zypper: joker
package-manager-url: https://formulae.brew.sh/formula/joker
version: 1.8.0
license: EPL-1.0
category: development
tags:
  - cli
description: Small Clojure interpreter, linter and formatter
source-archive: https://github.com/candid82/joker/archive/refs/tags/v1.8.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: joker
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add joker
  av: sudo av install brew:joker
  brew: brew install joker
  nix: nix profile install nixpkgs#joker
  zypper: sudo zypper install joker
provenance:
  formula: joker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
