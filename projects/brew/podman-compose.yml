id: brew:podman-compose
display-name: podman-compose
homepage: https://github.com/containers/podman-compose
repo: >
  https://files.pythonhosted.org/packages/24/91/b168a685ca6813ff9b467d76a7365a099aec16a1032b6edf39b0cd19f6c3/podman_compose-1.5.0.tar.gz
docs: https://github.com/containers/podman-compose
package-manager:
  apk: podman-compose
  brew: podman-compose
  debian: podman-compose
  dnf: podman-compose
  macports: podman-compose
  nix: podman-compose
  pacman: podman-compose
  ubuntu: podman-compose
package-manager-url: https://formulae.brew.sh/formula/podman-compose
version: 1.5.0
license: GPL-2.0-only
category: development
tags:
  - cli
  - docker
description: Alternative to docker-compose using podman
source-archive: >
  https://files.pythonhosted.org/packages/24/91/b168a685ca6813ff9b467d76a7365a099aec16a1032b6edf39b0cd19f6c3/podman_compose-1.5.0.tar.gz
dependencies:
  - libyaml
  - podman
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: podman-compose
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
