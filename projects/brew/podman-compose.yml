  dnf: sudo dnf install podman-compose
  macports: sudo port install podman-compose
  nix: nix profile install nixpkgs#podman-compose
  pacman: sudo pacman -S podman-compose
  ubuntu: sudo apt install podman-compose
provenance:
  formula: podman-compose
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
