id: brew:ry
display-name: ry
homepage: https://github.com/jneen/ry
repo: https://github.com/jneen/ry
docs: https://github.com/jneen/ry
package-manager:
  apk: ry
  brew: ry
package-manager-url: https://formulae.brew.sh/formula/ry
version: 0.5.2
license: MIT
category: development
tags:
  - cli
description: Ruby virtual env tool
source-archive: https://github.com/jneen/ry/archive/refs/tags/v0.5.2.tar.gz
dependencies:
  - bash-completion
  - ruby-build
executables:
  - exposure: global executable
    kind: cli
    name: ry
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Please add to your profile: which ry &>/dev/null && eval "$(ry setup)" If you want
    your Rubies to persist across updates you should set the `RY_RUBIES` variable in
    your profile, i.e. export RY_RUBIES="$HOMEBREW_PREFIX/var/ry/rubies"
  post-install-defined: false
install-lines:
  apk: sudo apk add ry
  av: sudo av install brew:ry
  brew: brew install ry
provenance:
  formula: ry
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
