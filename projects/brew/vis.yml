id: brew:vis
display-name: vis
homepage: https://github.com/martanne/vis
repo: https://github.com/martanne/vis
docs: https://github.com/martanne/vis
package-manager:
  apk: vis
  brew: vis
  debian: vis
  dnf: vis
  macports: vis
  nix: vis
  pacman: vis
  ubuntu: vis
  zypper: vis
package-manager-url: https://formulae.brew.sh/formula/vis
version: 0.9
license: ISC
category: development
tags:
  - cli
description: Vim-like text editor
source-archive: https://github.com/martanne/vis/archive/refs/tags/v0.9.tar.gz
dependencies:
  - libtermkey
  - lpeg
  - lua@5.4
  - tre
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: vis
  - exposure: global executable
    kind: cli
    name: vis-clipboard
  - exposure: global executable
    kind: cli
    name: vis-complete
  - exposure: global executable
    kind: cli
    name: vis-digraph
  - exposure: global executable
    kind: cli
    name: vis-menu
  - exposure: global executable
    kind: cli
    name: vis-open
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To avoid a name conflict with the macOS system utility /usr/bin/vis, this text
    editor must be invoked by calling `vise` ("vis-editor").
  post-install-defined: false
install-lines:
  apk: sudo apk add vis
  av: sudo av install brew:vis
  brew: brew install vis
  debian: sudo apt install vis
  dnf: sudo dnf install vis
  macports: sudo port install vis
  nix: nix profile install nixpkgs#vis
  pacman: sudo pacman -S vis
  ubuntu: sudo apt install vis
  zypper: sudo zypper install vis
provenance:
  formula: vis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
