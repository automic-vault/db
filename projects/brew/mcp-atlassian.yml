id: brew:mcp-atlassian
display-name: mcp-atlassian
homepage: https://github.com/sooperset/mcp-atlassian
repo: >
  https://files.pythonhosted.org/packages/c3/44/d879210be4178c408fbd8971f8dd36e9abc7ba3d729f7ccd4b790e73c1f6/mcp_atlassian-0.21.1.tar.gz
docs: https://github.com/sooperset/mcp-atlassian
