id: brew:aptly
display-name: aptly
homepage: https://www.aptly.info/
repo: https://github.com/aptly-dev/aptly
docs: https://www.aptly.info/
package-manager:
  brew: aptly
  debian: aptly
  nix: aptly
  ubuntu: aptly
package-manager-url: https://formulae.brew.sh/formula/aptly
version: 1.6.2
license: MIT
category: development
tags:
  - cli
description: Swiss army knife for Debian repository management
source-archive: https://github.com/aptly-dev/aptly/archive/refs/tags/v1.6.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aptly
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aptly
  brew: brew install aptly
  debian: sudo apt install aptly
  nix: nix profile install nixpkgs#aptly
  ubuntu: sudo apt install aptly
provenance:
  formula: aptly
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
