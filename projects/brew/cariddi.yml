id: brew:cariddi
display-name: cariddi
homepage: https://github.com/edoardottt/cariddi
repo: https://github.com/edoardottt/cariddi
docs: https://github.com/edoardottt/cariddi
package-manager:
  apk: cariddi
  brew: cariddi
  nix: cariddi
package-manager-url: https://formulae.brew.sh/formula/cariddi
version: 1.4.6
license: GPL-3.0-or-later
category: security
tags:
  - cli
description: Scan for endpoints, secrets, API keys, file extensions, tokens and more
source-archive: https://github.com/edoardottt/cariddi/archive/refs/tags/v1.4.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cariddi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cariddi
  av: sudo av install brew:cariddi
  brew: brew install cariddi
  nix: nix profile install nixpkgs#cariddi
provenance:
  formula: cariddi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
