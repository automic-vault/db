id: brew:shpotify
display-name: shpotify
homepage: https://harishnarayanan.org/projects/shpotify/
repo: https://github.com/hnarayanan/shpotify
docs: https://harishnarayanan.org/projects/shpotify/
package-manager:
  brew: shpotify
  chocolatey: spotify
  nix: spotify
  scoop: extras/spotify
  winget: Spotify.Spotify
package-manager-url: https://formulae.brew.sh/formula/shpotify
version: 2.1
license: MIT
category: development
tags:
  - cli
description: Command-line interface for Spotify on a Mac
source-archive: https://github.com/hnarayanan/shpotify/archive/refs/tags/2.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: spotify
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:shpotify
  brew: brew install shpotify
  chocolatey: choco install spotify
  nix: nix profile install nixpkgs#spotify
  scoop: scoop install extras/spotify
  winget: winget install --id Spotify.Spotify -e
provenance:
  formula: shpotify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
