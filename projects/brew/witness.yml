id: brew:witness
display-name: witness
homepage: https://witness.dev
repo: https://github.com/in-toto/witness
docs: https://witness.dev
package-manager:
  brew: witness
  nix: witness
package-manager-url: https://formulae.brew.sh/formula/witness
version: 0.11.0
license: Apache-2.0
category: development
tags:
  - cli
description: Automates, normalizes, and verifies software artifact provenance
source-archive: https://github.com/in-toto/witness/archive/refs/tags/v0.11.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: witness
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:witness
  brew: brew install witness
  nix: nix profile install nixpkgs#witness
provenance:
  formula: witness
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
