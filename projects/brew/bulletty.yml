id: brew:bulletty
display-name: bulletty
homepage: https://bulletty.croci.dev/
repo: https://github.com/CrociDB/bulletty
docs: https://bulletty.croci.dev/
package-manager:
  brew: bulletty
  nix: bulletty
  pacman: bulletty
package-manager-url: https://formulae.brew.sh/formula/bulletty
version: 0.2.2
license: MIT
category: development
tags:
  - cli
description: Pretty feed reader (ATOM/RSS) that stores articles in Markdown files
source-archive: https://github.com/CrociDB/bulletty/archive/refs/tags/v0.2.2.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bulletty
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bulletty
  brew: brew install bulletty
  nix: nix profile install nixpkgs#bulletty
  pacman: sudo pacman -S bulletty
provenance:
  formula: bulletty
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
