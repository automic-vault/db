id: brew:gloox
display-name: gloox
homepage: https://camaya.net/gloox/
repo: https://camaya.net/download/gloox-1.0.28.tar.bz2
docs: https://camaya.net/gloox/
package-manager:
  apk: gloox
  brew: gloox
  dnf: gloox
  macports: gloox
  nix: gloox
  pacman: gloox
package-manager-url: https://formulae.brew.sh/formula/gloox
version: 1.0.28
license: GPL-3.0-only WITH openvpn-openssl-exception
category: network
tags:
  - cli
description: C++ Jabber/XMPP library that handles the low-level protocol
source-archive: https://camaya.net/download/gloox-1.0.28.tar.bz2
dependencies:
  - libidn
  - openssl@3
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gloox-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gloox
  av: sudo av install brew:gloox
  brew: brew install gloox
  dnf: sudo dnf install gloox
  macports: sudo port install gloox
  nix: nix profile install nixpkgs#gloox
  pacman: sudo pacman -S gloox
provenance:
  formula: gloox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
