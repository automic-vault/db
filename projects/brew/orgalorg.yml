    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:orgalorg
  brew: brew install orgalorg
provenance:
  formula: orgalorg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
