id: brew:orgalorg
display-name: orgalorg
homepage: https://github.com/reconquest/orgalorg
repo: https://github.com/reconquest/orgalorg
docs: https://github.com/reconquest/orgalorg
package-manager:
  brew: orgalorg
package-manager-url: https://formulae.brew.sh/formula/orgalorg
version: 1.3.1
license: MIT
category: development
tags:
  - cli
