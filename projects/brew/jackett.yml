id: brew:jackett
display-name: jackett
homepage: https://github.com/Jackett/Jackett
repo: https://github.com/Jackett/Jackett
docs: https://github.com/Jackett/Jackett
package-manager:
  apk: jackett
  brew: jackett
  chocolatey: jackett
  nix: jackett
  scoop: extras/jackett
  winget: Jackett.Jackett
package-manager-url: https://formulae.brew.sh/formula/jackett
version: 0.24.1957
license: GPL-2.0-only
category: development
tags:
  - cli
description: API Support for your favorite torrent trackers
source-archive: https://github.com/Jackett/Jackett/archive/refs/tags/v0.24.1957.tar.gz
dependencies:
  - dotnet@9
executables:
  - exposure: global executable
    kind: cli
    name: jackett
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add jackett
  av: sudo av install brew:jackett
  brew: brew install jackett
  chocolatey: choco install jackett
  nix: nix profile install nixpkgs#jackett
  scoop: scoop install extras/jackett
  winget: winget install --id Jackett.Jackett -e
provenance:
  formula: jackett
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
