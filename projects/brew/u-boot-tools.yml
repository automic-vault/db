id: brew:u-boot-tools
display-name: u-boot-tools
homepage: https://www.denx.de/wiki/U-Boot/
repo: https://ftp.denx.de/pub/u-boot/u-boot-2026.04.tar.bz2
docs: https://www.denx.de/wiki/U-Boot/
package-manager:
  apk: u-boot-tools
  brew: u-boot-tools
  debian: u-boot-tools
  ubuntu: u-boot-tools
  zypper: u-boot-tools
package-manager-url: https://formulae.brew.sh/formula/u-boot-tools
version: 2026.04
license: GPL-2.0-only AND GPL-2.0-or-later AND BSD-3-Clause
category: network
tags:
  - cli
description: Universal boot loader
source-archive: https://ftp.denx.de/pub/u-boot/u-boot-2026.04.tar.bz2
dependencies:
  - openssl@3
build-dependencies:
  - coreutils
executables:
  - exposure: global executable
    kind: cli
    name: dumpimage
  - exposure: global executable
    kind: cli
    name: mkenvimage
  - exposure: global executable
    kind: cli
    name: mkimage
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add u-boot-tools
  av: sudo av install brew:u-boot-tools
  brew: brew install u-boot-tools
  debian: sudo apt install u-boot-tools
  ubuntu: sudo apt install u-boot-tools
  zypper: sudo zypper install u-boot-tools
provenance:
  formula: u-boot-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
