id: brew:sql-lint
display-name: sql-lint
homepage: https://github.com/joereynolds/sql-lint
repo: https://registry.npmjs.org/sql-lint/-/sql-lint-1.0.2.tgz
docs: https://github.com/joereynolds/sql-lint
package-manager:
  brew: sql-lint
package-manager-url: https://formulae.brew.sh/formula/sql-lint
version: 1.0.2
license: MIT
category: database
tags:
  - cli
description: SQL linter to do sanity checks on your queries and bring errors back from the DB
source-archive: https://registry.npmjs.org/sql-lint/-/sql-lint-1.0.2.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: sql-lint
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sql-lint
  brew: brew install sql-lint
provenance:
  formula: sql-lint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
