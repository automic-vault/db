id: brew:lua
display-name: lua
homepage: https://www.lua.org/
repo: https://www.lua.org/ftp/lua-5.5.0.tar.gz
docs: https://www.lua.org/
package-manager:
  apk: lua5.5
  brew: lua
  chocolatey: Lua
  dnf: lua
  macports: lua
  nix: lua
  pacman: lua
  scoop: main/lua
  winget: DEVCOM.Lua
package-manager-url: https://formulae.brew.sh/formula/lua
version: 5.5.0
license: MIT
category: development
tags:
  - cli
description: Powerful, lightweight programming language
source-archive: https://www.lua.org/ftp/lua-5.5.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lua
  - exposure: global executable
    kind: cli
    name: lua-5.5
  - exposure: global executable
    kind: cli
    name: lua5.5
  - exposure: global executable
    kind: cli
    name: luac
  - exposure: global executable
    kind: cli
    name: luac-5.5
  - exposure: global executable
    kind: cli
    name: luac5.5
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'You may also want luarocks: brew install luarocks'
  post-install-defined: false
install-lines:
  apk: sudo apk add lua5.5
  av: sudo av install brew:lua
  brew: brew install lua
  chocolatey: choco install Lua
  dnf: sudo dnf install lua
  macports: sudo port install lua
  nix: nix profile install nixpkgs#lua
  pacman: sudo pacman -S lua
  scoop: scoop install main/lua
  winget: winget install --id DEVCOM.Lua -e
provenance:
  formula: lua
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
