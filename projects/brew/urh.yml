id: brew:urh
display-name: urh
homepage: https://github.com/jopohl/urh
repo: >
  https://files.pythonhosted.org/packages/dd/75/e3ce1cd756dc47ab42166d1ecfb9a9f5e34e2fcf78aeed0b9392313dc057/urh-2.10.0.tar.gz
docs: https://github.com/jopohl/urh
package-manager:
  brew: urh
  dnf: urh
  nix: urh
  pacman: urh
  zypper: urh
package-manager-url: https://formulae.brew.sh/formula/urh
version: 2.10.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Universal Radio Hacker
source-archive: >
  https://files.pythonhosted.org/packages/dd/75/e3ce1cd756dc47ab42166d1ecfb9a9f5e34e2fcf78aeed0b9392313dc057/urh-2.10.0.tar.gz
dependencies:
  - hackrf
  - numpy
  - pyqt
  - python@3.14
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: urh
  - exposure: global executable
    kind: cli
    name: urh_cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:urh
  brew: brew install urh
  dnf: sudo dnf install urh
  nix: nix profile install nixpkgs#urh
  pacman: sudo pacman -S urh
  zypper: sudo zypper install urh
provenance:
  formula: urh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
