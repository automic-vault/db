id: brew:ipopt
display-name: ipopt
homepage: https://coin-or.github.io/Ipopt/
repo: https://github.com/coin-or/Ipopt
docs: https://coin-or.github.io/Ipopt/
package-manager:
  brew: ipopt
  macports: ipopt
  nix: ipopt
  scoop: main/ipopt
package-manager-url: https://formulae.brew.sh/formula/ipopt
version: 3.14.19
license: EPL-2.0
category: development
tags:
  - cli
description: Interior point optimizer
source-archive: https://github.com/coin-or/Ipopt/archive/refs/tags/releases/3.14.19.tar.gz
dependencies:
  - ampl-asl
  - gcc
  - openblas
build-dependencies:
  - openjdk
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ipopt
  - exposure: global executable
    kind: cli
    name: ipopt_sens
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ipopt
  brew: brew install ipopt
  macports: sudo port install ipopt
  nix: nix profile install nixpkgs#ipopt
  scoop: scoop install main/ipopt
provenance:
  formula: ipopt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
