id: brew:owamp
display-name: owamp
homepage: https://www.internet2.edu/products-services/performance-analytics/performance-tools/
repo: https://software.internet2.edu/sources/owamp/owamp-3.4-10.tar.gz
docs: https://www.internet2.edu/products-services/performance-analytics/performance-tools/
package-manager:
  brew: owamp
  nix: owamp
package-manager-url: https://formulae.brew.sh/formula/owamp
version: 3.4-10
license: Apache-2.0
category: network
tags:
  - cli
description: Implementation of the One-Way Active Measurement Protocol
source-archive: https://software.internet2.edu/sources/owamp/owamp-3.4-10.tar.gz
dependencies:
  - i2util
executables:
  - exposure: global executable
    kind: cli
    name: owampd
  - exposure: global executable
    kind: cli
    name: owfetch
  - exposure: global executable
    kind: cli
    name: owping
  - exposure: global executable
    kind: cli
    name: owstats
  - exposure: global executable
    kind: cli
    name: owtvec
  - exposure: global executable
    kind: cli
    name: owup
  - exposure: global executable
    kind: cli
    name: powstream
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:owamp
  brew: brew install owamp
  nix: nix profile install nixpkgs#owamp
provenance:
  formula: owamp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
