id: brew:afsctool
display-name: afsctool
homepage: https://brkirch.wordpress.com/afsctool/
repo: https://github.com/RJVB/afsctool
docs: https://brkirch.wordpress.com/afsctool/
package-manager:
  brew: afsctool
  macports: afsctool
  nix: afsctool
package-manager-url: https://formulae.brew.sh/formula/afsctool
version: 1.7.3
license: GPL-3.0-only AND BSL-1.0
category: development
tags:
  - cli
description: Utility for manipulating APFS and ZFS compressed files
source-archive: https://github.com/RJVB/afsctool/archive/refs/tags/v1.7.3.tar.gz
build-dependencies:
  - cmake
  - google-sparsehash
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: afsctool
  - exposure: global executable
    kind: cli
    name: zfsctool
bottle:
  available: true
  platforms:
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:afsctool
  brew: brew install afsctool
  macports: sudo port install afsctool
  nix: nix profile install nixpkgs#afsctool
provenance:
  formula: afsctool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
