id: brew:gcalcli
display-name: gcalcli
homepage: https://github.com/insanum/gcalcli
repo: >
  https://files.pythonhosted.org/packages/68/b8/c3f3b8c73c9740eeb592e31f3f1092485ce8809fd7137d7c776a0b0d3567/gcalcli-4.5.1.tar.gz
docs: https://github.com/insanum/gcalcli
package-manager:
  brew: gcalcli
  debian: gcalcli
  macports: gcalcli
  nix: gcalcli
  ubuntu: gcalcli
  zypper: gcalcli
package-manager-url: https://formulae.brew.sh/formula/gcalcli
version: 4.5.1
license: MIT
category: development
tags:
  - cli
description: Easily access your Google Calendar(s) from a command-line
source-archive: >
  https://files.pythonhosted.org/packages/68/b8/c3f3b8c73c9740eeb592e31f3f1092485ce8809fd7137d7c776a0b0d3567/gcalcli-4.5.1.tar.gz
dependencies:
  - certifi
  - cryptography
  - pycparser
  - pydantic
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: gcalcli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gcalcli
  brew: brew install gcalcli
  debian: sudo apt install gcalcli
  macports: sudo port install gcalcli
  nix: nix profile install nixpkgs#gcalcli
  ubuntu: sudo apt install gcalcli
  zypper: sudo zypper install gcalcli
provenance:
  formula: gcalcli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
