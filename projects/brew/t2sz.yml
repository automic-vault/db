id: brew:t2sz
display-name: t2sz
homepage: https://github.com/martinellimarco/t2sz
repo: https://github.com/martinellimarco/t2sz
docs: https://github.com/martinellimarco/t2sz
package-manager:
  apk: t2sz
  brew: t2sz
package-manager-url: https://formulae.brew.sh/formula/t2sz
version: 1.2.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Compress a file into a seekable zstd with per-file seeking for tar archives
source-archive: https://github.com/martinellimarco/t2sz/archive/refs/tags/v1.2.5.tar.gz
dependencies:
  - zstd
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: t2sz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add t2sz
  av: sudo av install brew:t2sz
  brew: brew install t2sz
provenance:
  formula: t2sz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
