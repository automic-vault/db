id: brew:apkeep
display-name: apkeep
homepage: https://github.com/EFForg/apkeep
repo: https://github.com/EFForg/apkeep
docs: https://github.com/EFForg/apkeep
package-manager:
  brew: apkeep
  nix: apkeep
  scoop: extras/apkeep
package-manager-url: https://formulae.brew.sh/formula/apkeep
version: 1.0.0
license: MIT
category: development
tags:
  - cli
description: Command-line tool for downloading APK files from various sources
source-archive: https://github.com/EFForg/apkeep/archive/refs/tags/1.0.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: apkeep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:apkeep
  brew: brew install apkeep
  nix: nix profile install nixpkgs#apkeep
  scoop: scoop install extras/apkeep
provenance:
  formula: apkeep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
