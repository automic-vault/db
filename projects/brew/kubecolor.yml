id: brew:kubecolor
display-name: kubecolor
homepage: https://kubecolor.github.io/
repo: https://github.com/kubecolor/kubecolor
docs: https://kubecolor.github.io/
package-manager:
  brew: kubecolor
  debian: kubecolor
  macports: kubecolor
  nix: kubecolor
  scoop: main/kubecolor
  ubuntu: kubecolor
  winget: Kubecolor.kubecolor
  zypper: kubecolor
package-manager-url: https://formulae.brew.sh/formula/kubecolor
version: 0.6.0
license: MIT
category: development
tags:
  - cli
description: Colorize your kubectl output
source-archive: https://github.com/kubecolor/kubecolor/archive/refs/tags/v0.6.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubecolor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubecolor
  brew: brew install kubecolor
  debian: sudo apt install kubecolor
  macports: sudo port install kubecolor
  nix: nix profile install nixpkgs#kubecolor
  scoop: scoop install main/kubecolor
  ubuntu: sudo apt install kubecolor
  winget: winget install --id Kubecolor.kubecolor -e
  zypper: sudo zypper install kubecolor
provenance:
  formula: kubecolor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
