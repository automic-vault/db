id: brew:fail2ban
display-name: fail2ban
homepage: https://www.fail2ban.org/
repo: https://github.com/fail2ban/fail2ban
docs: https://www.fail2ban.org/
package-manager:
  apk: fail2ban
  brew: fail2ban
  debian: fail2ban
  dnf: fail2ban
  macports: fail2ban
  nix: fail2ban
  pacman: fail2ban
  ubuntu: fail2ban
  zypper: fail2ban
package-manager-url: https://formulae.brew.sh/formula/fail2ban
version: 1.1.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Scan log files and ban IPs showing malicious signs
source-archive: https://github.com/fail2ban/fail2ban/archive/refs/tags/1.1.0.tar.gz
dependencies:
  - python@3.14
build-dependencies:
  - sphinx-doc
executables:
  - exposure: global executable
    kind: cli
    name: fail2ban-client
  - exposure: global executable
    kind: cli
    name: fail2ban-python
  - exposure: global executable
    kind: cli
    name: fail2ban-regex
  - exposure: global executable
    kind: cli
    name: fail2ban-server
  - exposure: global executable
    kind: cli
    name: fail2ban-testcases
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You must enable any jails by editing: $HOMEBREW_PREFIX/etc/fail2ban/jail.conf Other
    configuration files are in $HOMEBREW_PREFIX/etc/fail2ban. See more instructions at
    https://github.com/fail2ban/fail2ban/wiki/Proper-fail2ban-configuration.
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add fail2ban
  av: sudo av install brew:fail2ban
  brew: brew install fail2ban
  debian: sudo apt install fail2ban
  dnf: sudo dnf install fail2ban
  macports: sudo port install fail2ban
  nix: nix profile install nixpkgs#fail2ban
  pacman: sudo pacman -S fail2ban
  ubuntu: sudo apt install fail2ban
  zypper: sudo zypper install fail2ban
provenance:
  formula: fail2ban
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
