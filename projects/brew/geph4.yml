id: brew:geph4
display-name: geph4
homepage: https://geph.io/
repo: https://github.com/geph-official/geph4-client
docs: https://geph.io/
package-manager:
  brew: geph4
package-manager-url: https://formulae.brew.sh/formula/geph4
version: 4.99.32
license: GPL-3.0-only
category: development
tags:
  - cli
description: Modular Internet censorship circumvention system to deal with national filtering
source-archive: https://github.com/geph-official/geph4-client/archive/refs/tags/v4.99.32.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: geph4-client
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:geph4
  brew: brew install geph4
provenance:
  formula: geph4
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
