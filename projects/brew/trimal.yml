id: brew:trimal
display-name: trimal
homepage: https://trimal.readthedocs.io/
repo: https://github.com/inab/trimal
docs: https://trimal.readthedocs.io/
package-manager:
  brew: trimal
  nix: trimal
package-manager-url: https://formulae.brew.sh/formula/trimal
version: 1.5.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: Automated alignment trimming in large-scale phylogenetic analyses
source-archive: https://github.com/inab/trimal/archive/refs/tags/v1.5.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: readal
  - exposure: global executable
    kind: cli
    name: statal
  - exposure: global executable
    kind: cli
    name: trimal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:trimal
  brew: brew install trimal
  nix: nix profile install nixpkgs#trimal
provenance:
  formula: trimal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
