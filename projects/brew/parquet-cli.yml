id: brew:parquet-cli
display-name: parquet-cli
homepage: https://parquet.apache.org/
repo: https://github.com/apache/parquet-java
docs: https://parquet.apache.org/
package-manager:
  brew: parquet-cli
package-manager-url: https://formulae.brew.sh/formula/parquet-cli
version: 1.17.1
license: Apache-2.0
category: development
tags:
  - cli
description: Apache Parquet command-line tools and utilities
source-archive: https://github.com/apache/parquet-java/archive/refs/tags/apache-parquet-1.17.1.tar.gz
dependencies:
  - openjdk@21
build-dependencies:
  - maven
executables:
  - exposure: global executable
    kind: cli
    name: parquet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:parquet-cli
  brew: brew install parquet-cli
provenance:
  formula: parquet-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
