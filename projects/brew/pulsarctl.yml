id: brew:pulsarctl
display-name: pulsarctl
homepage: https://streamnative.io/
repo: https://github.com/streamnative/pulsarctl
docs: https://streamnative.io/
package-manager:
  brew: pulsarctl
  nix: pulsarctl
package-manager-url: https://formulae.brew.sh/formula/pulsarctl
version: 4.2.0.8
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for Apache Pulsar written in Go
source-archive: https://github.com/streamnative/pulsarctl/archive/refs/tags/v4.2.0.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pulsarctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pulsarctl
  brew: brew install pulsarctl
  nix: nix profile install nixpkgs#pulsarctl
provenance:
  formula: pulsarctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
