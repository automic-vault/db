id: brew:pgpool-ii
display-name: pgpool-ii
homepage: https://www.pgpool.net/mediawiki/index.php/Main_Page
repo: https://www.pgpool.net/mediawiki/images/pgpool-II-4.7.1.tar.gz
docs: https://www.pgpool.net/mediawiki/index.php/Main_Page
package-manager:
  apk: pgpool
  brew: pgpool-ii
  macports: pgpool-II
  nix: pgpool
package-manager-url: https://formulae.brew.sh/formula/pgpool-ii
version: 4.7.1
license: HPND AND ISC
category: database
tags:
  - cli
description: PostgreSQL connection pool server
source-archive: https://www.pgpool.net/mediawiki/images/pgpool-II-4.7.1.tar.gz
dependencies:
  - libmemcached
  - libpq
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: pcp_attach_node
  - exposure: global executable
    kind: cli
    name: pcp_detach_node
  - exposure: global executable
    kind: cli
    name: pcp_health_check_stats
  - exposure: global executable
    kind: cli
    name: pcp_invalidate_query_cache
  - exposure: global executable
    kind: cli
    name: pcp_log_rotate
  - exposure: global executable
    kind: cli
    name: pcp_node_count
  - exposure: global executable
    kind: cli
    name: pcp_node_info
  - exposure: global executable
    kind: cli
    name: pcp_pool_status
  - exposure: global executable
    kind: cli
    name: pcp_proc_count
  - exposure: global executable
    kind: cli
    name: pcp_proc_info
  - exposure: global executable
    kind: cli
    name: pcp_promote_node
  - exposure: global executable
    kind: cli
    name: pcp_recovery_node
  - exposure: global executable
    kind: cli
    name: pcp_reload_config
  - exposure: global executable
    kind: cli
    name: pcp_stop_pgpool
  - exposure: global executable
    kind: cli
    name: pcp_watchdog_info
  - exposure: global executable
    kind: cli
    name: pg_enc
  - exposure: global executable
    kind: cli
    name: pg_md5
  - exposure: global executable
    kind: cli
    name: pgpool
  - exposure: global executable
    kind: cli
    name: pgpool_setup
  - exposure: global executable
    kind: cli
    name: pgproto
  - exposure: global executable
    kind: cli
    name: watchdog_setup
  - exposure: global executable
    kind: cli
    name: wd_cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add pgpool
  av: sudo av install brew:pgpool-ii
  brew: brew install pgpool-ii
  macports: sudo port install pgpool-II
  nix: nix profile install nixpkgs#pgpool
provenance:
  formula: pgpool-ii
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
