id: brew:zebra
display-name: zebra
homepage: https://www.indexdata.com/resources/software/zebra/
repo: https://ftp.indexdata.com/pub/zebra/idzebra-2.2.11.tar.gz
docs: https://www.indexdata.com/resources/software/zebra/
package-manager:
  brew: zebra
  macports: zebra
package-manager-url: https://formulae.brew.sh/formula/zebra
version: 2.2.11
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Information management system
source-archive: https://ftp.indexdata.com/pub/zebra/idzebra-2.2.11.tar.gz
dependencies:
  - icu4c@78
  - yaz
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
  - expat
  - libxcrypt
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: idzebra-abs2dom
  - exposure: global executable
    kind: cli
    name: idzebra-config-2.0
  - exposure: global executable
    kind: cli
    name: zebraidx
  - exposure: global executable
    kind: cli
    name: zebraidx-2.0
  - exposure: global executable
    kind: cli
    name: zebrasrv
  - exposure: global executable
    kind: cli
    name: zebrasrv-2.0
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zebra
  brew: brew install zebra
  macports: sudo port install zebra
provenance:
  formula: zebra
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
