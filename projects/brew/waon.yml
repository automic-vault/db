id: brew:waon
display-name: waon
homepage: https://kichiki.github.io/WaoN/
repo: https://github.com/kichiki/WaoN
docs: https://kichiki.github.io/WaoN/
package-manager:
  brew: waon
  nix: waon
package-manager-url: https://formulae.brew.sh/formula/waon
version: 0.11
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Wave-to-notes transcriber
source-archive: https://github.com/kichiki/WaoN/archive/refs/tags/v0.11.tar.gz
dependencies:
  - fftw
  - libsndfile
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: waon
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:waon
  brew: brew install waon
  nix: nix profile install nixpkgs#waon
provenance:
  formula: waon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
