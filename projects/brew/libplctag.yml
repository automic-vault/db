id: brew:libplctag
display-name: libplctag
homepage: https://github.com/libplctag/libplctag
repo: https://github.com/libplctag/libplctag
docs: https://github.com/libplctag/libplctag
package-manager:
  brew: libplctag
  nix: libplctag
package-manager-url: https://formulae.brew.sh/formula/libplctag
version: 2.7.0
license: LGPL-2.0-or-later OR MPL-2.0
category: development
tags:
  - cli
description: Portable and simple API for accessing AB PLC data over Ethernet
source-archive: https://github.com/libplctag/libplctag/archive/refs/tags/v2.7.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: modbus_server
  - exposure: global executable
    kind: cli
    name: tag_rw2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libplctag
  brew: brew install libplctag
  nix: nix profile install nixpkgs#libplctag
provenance:
  formula: libplctag
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
