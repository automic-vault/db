id: brew:png2ico
display-name: png2ico
homepage: https://www.freshports.org/graphics/png2ico/
repo: https://pkg.freebsd.org/ports-distfiles/png2ico-src-2002-12-08.tar.gz
docs: https://www.freshports.org/graphics/png2ico/
package-manager:
  brew: png2ico
  chocolatey: png2ico
  macports: png2ico
  winget: KevinBralten.Png2Ico
package-manager-url: https://formulae.brew.sh/formula/png2ico
version: 2002-12-08
license: GPL-2.0-only
category: media
tags:
  - cli
description: PNG to icon converter
source-archive: https://pkg.freebsd.org/ports-distfiles/png2ico-src-2002-12-08.tar.gz
dependencies:
  - libpng
executables:
  - exposure: global executable
    kind: cli
    name: png2ico
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:png2ico
  brew: brew install png2ico
  chocolatey: choco install png2ico
  macports: sudo port install png2ico
  winget: winget install --id KevinBralten.Png2Ico -e
provenance:
  formula: png2ico
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
