id: brew:pgrok
display-name: pgrok
homepage: https://github.com/pgrok/pgrok
repo: https://github.com/pgrok/pgrok
docs: https://github.com/pgrok/pgrok
package-manager:
  brew: pgrok
  nix: pgrok
package-manager-url: https://formulae.brew.sh/formula/pgrok
version: 1.5.0
license: MIT
category: development
tags:
  - cli
description: Poor man's ngrok, multi-tenant HTTP/TCP reverse tunnel solution
source-archive: https://github.com/pgrok/pgrok/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pgrok
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pgrok
  brew: brew install pgrok
  nix: nix profile install nixpkgs#pgrok
provenance:
  formula: pgrok
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
