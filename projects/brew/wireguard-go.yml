id: brew:wireguard-go
display-name: wireguard-go
homepage: https://www.wireguard.com/
repo: https://git.zx2c4.com/wireguard-go/snapshot/wireguard-go-0.0.20250522.tar.xz
docs: https://www.wireguard.com/
package-manager:
  apk: wireguard-go
  brew: wireguard-go
  debian: wireguard-go
  macports: wireguard-go
  nix: wireguard-go
  ubuntu: wireguard-go
package-manager-url: https://formulae.brew.sh/formula/wireguard-go
version: 0.0.20250522
license: MIT
category: development
tags:
  - cli
description: Userspace Go implementation of WireGuard
source-archive: https://git.zx2c4.com/wireguard-go/snapshot/wireguard-go-0.0.20250522.tar.xz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wireguard-go
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wireguard-go
  av: sudo av install brew:wireguard-go
  brew: brew install wireguard-go
  debian: sudo apt install wireguard-go
  macports: sudo port install wireguard-go
  nix: nix profile install nixpkgs#wireguard-go
  ubuntu: sudo apt install wireguard-go
provenance:
  formula: wireguard-go
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
