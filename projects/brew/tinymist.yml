id: brew:tinymist
display-name: tinymist
homepage: https://myriad-dreamin.github.io/tinymist/
repo: https://github.com/Myriad-Dreamin/tinymist
docs: https://myriad-dreamin.github.io/tinymist/
package-manager:
  apk: tinymist
  brew: tinymist
  nix: tinymist
  pacman: tinymist
  scoop: main/tinymist
  winget: Myriad-Dreamin.Tinymist
package-manager-url: https://formulae.brew.sh/formula/tinymist
version: 0.14.18
license: Apache-2.0
category: development
tags:
  - cli
description: Services for Typst
source-archive: https://github.com/Myriad-Dreamin/tinymist/archive/refs/tags/v0.14.18.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tinymist
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tinymist
  av: sudo av install brew:tinymist
  brew: brew install tinymist
  nix: nix profile install nixpkgs#tinymist
  pacman: sudo pacman -S tinymist
  scoop: scoop install main/tinymist
  winget: winget install --id Myriad-Dreamin.Tinymist -e
provenance:
  formula: tinymist
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
