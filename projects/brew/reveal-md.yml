id: brew:reveal-md
display-name: reveal-md
homepage: https://github.com/webpro/reveal-md
repo: https://registry.npmjs.org/reveal-md/-/reveal-md-6.1.4.tgz
docs: https://github.com/webpro/reveal-md
package-manager:
  brew: reveal-md
  nix: reveal-md
package-manager-url: https://formulae.brew.sh/formula/reveal-md
version: 6.1.4
license: MIT
category: development
tags:
