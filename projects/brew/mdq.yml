id: brew:mdq
display-name: mdq
homepage: https://github.com/yshavit/mdq
repo: https://github.com/yshavit/mdq
docs: https://github.com/yshavit/mdq
package-manager:
  brew: mdq
  nix: mdq
  scoop: main/mdq
  winget: Whiteknight.Mdq
package-manager-url: https://formulae.brew.sh/formula/mdq
version: 0.10.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Like jq but for Markdown
source-archive: https://github.com/yshavit/mdq/archive/refs/tags/v0.10.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mdq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mdq
  brew: brew install mdq
  nix: nix profile install nixpkgs#mdq
  scoop: scoop install main/mdq
  winget: winget install --id Whiteknight.Mdq -e
provenance:
  formula: mdq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
