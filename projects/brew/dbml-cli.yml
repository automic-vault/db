id: brew:dbml-cli
display-name: dbml-cli
homepage: https://www.dbml.org/cli/
repo: https://registry.npmjs.org/@dbml/cli/-/cli-8.2.1.tgz
docs: https://www.dbml.org/cli/
package-manager:
  brew: dbml-cli
package-manager-url: https://formulae.brew.sh/formula/dbml-cli
version: 8.2.1
license: Apache-2.0
category: database
tags:
  - cli
description: Convert DBML file to SQL and vice versa
source-archive: https://registry.npmjs.org/@dbml/cli/-/cli-8.2.1.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: db2dbml
  - exposure: global executable
    kind: cli
    name: dbml2sql
  - exposure: global executable
    kind: cli
    name: sql2dbml
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dbml-cli
  brew: brew install dbml-cli
provenance:
  formula: dbml-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
