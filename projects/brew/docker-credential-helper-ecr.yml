id: brew:docker-credential-helper-ecr
display-name: docker-credential-helper-ecr
homepage: https://github.com/awslabs/amazon-ecr-credential-helper
repo: https://github.com/awslabs/amazon-ecr-credential-helper
docs: https://github.com/awslabs/amazon-ecr-credential-helper
package-manager:
  apk: docker-credential-ecr-login
  brew: docker-credential-helper-ecr
  macports: docker-credential-helper-ecr
package-manager-url: https://formulae.brew.sh/formula/docker-credential-helper-ecr
version: 0.12.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - docker
description: Docker Credential Helper for Amazon ECR
source-archive: https://github.com/awslabs/amazon-ecr-credential-helper/archive/refs/tags/v0.12.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: docker-credential-ecr-login
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add docker-credential-ecr-login
  av: sudo av install brew:docker-credential-helper-ecr
  brew: brew install docker-credential-helper-ecr
  macports: sudo port install docker-credential-helper-ecr
provenance:
  formula: docker-credential-helper-ecr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
