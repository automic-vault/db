id: brew:topicctl
display-name: topicctl
homepage: https://github.com/segmentio/topicctl
repo: https://github.com/segmentio/topicctl
docs: https://github.com/segmentio/topicctl
package-manager:
  brew: topicctl
  nix: topicctl
package-manager-url: https://formulae.brew.sh/formula/topicctl
version: 2.0.2
license: MIT
category: development
tags:
  - cli
description: Declarative Kafka topic management
source-archive: https://github.com/segmentio/topicctl/archive/refs/tags/v2.0.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: topicctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:topicctl
  brew: brew install topicctl
  nix: nix profile install nixpkgs#topicctl
provenance:
  formula: topicctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
