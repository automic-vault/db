id: brew:prometheus
display-name: prometheus
homepage: https://prometheus.io/
repo: https://github.com/prometheus/prometheus
docs: https://prometheus.io/
package-manager:
  apk: prometheus
  brew: prometheus
  debian: prometheus
  dnf: prometheus
  macports: prometheus
  nix: prometheus
  pacman: prometheus
  scoop: main/prometheus
  ubuntu: prometheus
package-manager-url: https://formulae.brew.sh/formula/prometheus
version: 3.11.3
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Service monitoring system and time series database
source-archive: https://github.com/prometheus/prometheus/archive/refs/tags/v3.11.3.tar.gz
build-dependencies:
  - gnu-tar
  - go
  - node
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: prometheus
  - exposure: global executable
    kind: cli
    name: prometheus_brew_services
  - exposure: global executable
    kind: cli
    name: promtool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    When run from `brew services`, `prometheus` is run from `prometheus_brew_services`
    and uses the flags in: $HOMEBREW_PREFIX/etc/prometheus.args
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add prometheus
  av: sudo av install brew:prometheus
  brew: brew install prometheus
  debian: sudo apt install prometheus
  dnf: sudo dnf install prometheus
  macports: sudo port install prometheus
  nix: nix profile install nixpkgs#prometheus
  pacman: sudo pacman -S prometheus
  scoop: scoop install main/prometheus
  ubuntu: sudo apt install prometheus
provenance:
  formula: prometheus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
