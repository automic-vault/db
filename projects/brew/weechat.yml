id: brew:weechat
display-name: weechat
homepage: https://weechat.org/
repo: https://weechat.org/files/src/weechat-4.9.0.tar.xz
docs: https://weechat.org/
package-manager:
  apk: weechat
  brew: weechat
  debian: weechat
  dnf: weechat
  macports: weechat
  nix: weechat
  pacman: weechat
  ubuntu: weechat
  zypper: weechat
package-manager-url: https://formulae.brew.sh/formula/weechat
version: 4.9.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Extensible IRC client
source-archive: https://weechat.org/files/src/weechat-4.9.0.tar.xz
dependencies:
  - cjson
  - enchant
  - gettext
  - gnutls
  - libgcrypt
  - libgpg-error
  - lua
  - ncurses
  - python@3.14
  - ruby
  - tcl-tk
  - zstd
build-dependencies:
  - asciidoctor
  - cmake
  - gettext
  - pkgconf
uses-from-macos:
  - curl
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: weechat
  - exposure: global executable
    kind: cli
    name: weechat-curses
  - exposure: global executable
    kind: cli
    name: weechat-headless
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add weechat
  av: sudo av install brew:weechat
  brew: brew install weechat
  debian: sudo apt install weechat
  dnf: sudo dnf install weechat
  macports: sudo port install weechat
  nix: nix profile install nixpkgs#weechat
  pacman: sudo pacman -S weechat
  ubuntu: sudo apt install weechat
  zypper: sudo zypper install weechat
provenance:
  formula: weechat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
