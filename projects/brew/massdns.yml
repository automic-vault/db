id: brew:massdns
display-name: massdns
homepage: https://github.com/blechschmidt/massdns
repo: https://github.com/blechschmidt/massdns
docs: https://github.com/blechschmidt/massdns
package-manager:
  brew: massdns
  dnf: massdns
  nix: massdns
package-manager-url: https://formulae.brew.sh/formula/massdns
version: 1.1.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: High-performance DNS stub resolver
source-archive: https://github.com/blechschmidt/massdns/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: massdns
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:massdns
  brew: brew install massdns
  dnf: sudo dnf install massdns
  nix: nix profile install nixpkgs#massdns
provenance:
  formula: massdns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
