id: brew:ijq
display-name: ijq
homepage: https://codeberg.org/gpanders/ijq
repo: https://codeberg.org/gpanders/ijq/archive/v1.3.0.tar.gz
docs: https://codeberg.org/gpanders/ijq
package-manager:
  apk: ijq
  brew: ijq
  macports: ijq
  nix: ijq
  pacman: ijq
package-manager-url: https://formulae.brew.sh/formula/ijq
version: 1.3.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Interactive jq
source-archive: https://codeberg.org/gpanders/ijq/archive/v1.3.0.tar.gz
build-dependencies:
  - go
  - scdoc
uses-from-macos:
  - jq
executables:
  - exposure: global executable
    kind: cli
    name: ijq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ijq
  av: sudo av install brew:ijq
  brew: brew install ijq
  macports: sudo port install ijq
  nix: nix profile install nixpkgs#ijq
  pacman: sudo pacman -S ijq
provenance:
  formula: ijq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
