id: brew:swiftlint
display-name: swiftlint
homepage: https://github.com/realm/SwiftLint
repo: https://github.com/realm/SwiftLint
docs: https://github.com/realm/SwiftLint
package-manager:
  brew: swiftlint
  dnf: swiftlint
  macports: swiftlint
  nix: swiftlint
package-manager-url: https://formulae.brew.sh/formula/swiftlint
version: 0.63.2
license: MIT
category: development
tags:
  - cli
description: Tool to enforce Swift style and conventions
source-archive: https://github.com/realm/SwiftLint.git
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: swiftlint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swiftlint
  brew: brew install swiftlint
  dnf: sudo dnf install swiftlint
  macports: sudo port install swiftlint
  nix: nix profile install nixpkgs#swiftlint
provenance:
  formula: swiftlint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
