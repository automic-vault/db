id: brew:i2p
display-name: i2p
homepage: https://geti2p.net
repo: https://github.com/i2p/i2p.i2p
docs: https://geti2p.net
package-manager:
  brew: i2p
  chocolatey: i2p
  nix: i2p
  scoop: main/i2p
package-manager-url: https://formulae.brew.sh/formula/i2p
version: 2.12.0
license: LicenseRef-Homebrew-cannot-represent
category: development
tags:
  - cli
description: Anonymous overlay network - a network within a network
source-archive: https://github.com/i2p/i2p.i2p/archive/refs/tags/i2p-2.12.0.tar.gz
dependencies:
  - java-service-wrapper
  - openjdk
build-dependencies:
  - ant
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: eepget
  - exposure: global executable
    kind: cli
    name: i2prouter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:i2p
  brew: brew install i2p
  chocolatey: choco install i2p
  nix: nix profile install nixpkgs#i2p
  scoop: scoop install main/i2p
provenance:
  formula: i2p
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
