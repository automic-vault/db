repo: https://publish.djl.ai/djl-serving/serving-0.36.0.tar
docs: https://github.com/deepjavalibrary/djl-serving
package-manager:
  brew: djl-serving
package-manager-url: https://formulae.brew.sh/formula/djl-serving
version: 0.36.0
