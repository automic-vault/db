id: brew:moc
display-name: moc
homepage: https://moc.daper.net/
repo: https://ftp.daper.net/pub/soft/moc/stable/moc-2.5.2.tar.bz2
docs: https://moc.daper.net/
package-manager:
  brew: moc
  debian: moc
  macports: moc
  nix: moc
  ubuntu: moc
  zypper: moc
package-manager-url: https://formulae.brew.sh/formula/moc
version: 2.5.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Terminal-based music player
source-archive: https://ftp.daper.net/pub/soft/moc/stable/moc-2.5.2.tar.bz2
dependencies:
  - berkeley-db@5
  - ffmpeg@4
  - flac
  - jack
  - libmodplug
  - libogg
  - libsamplerate
  - libsndfile
  - libtool
  - libvorbis
  - ncurses
  - speex
build-dependencies:
  - autoconf
  - automake
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mocp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: You must start the jack daemon prior to running mocp.
  post-install-defined: false
install-lines:
  av: sudo av install brew:moc
  brew: brew install moc
  debian: sudo apt install moc
  macports: sudo port install moc
  nix: nix profile install nixpkgs#moc
  ubuntu: sudo apt install moc
  zypper: sudo zypper install moc
provenance:
  formula: moc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
