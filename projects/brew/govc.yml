id: brew:govc
display-name: govc
homepage: https://github.com/vmware/govmomi/tree/main/govc
repo: https://github.com/vmware/govmomi
docs: https://github.com/vmware/govmomi/tree/main/govc
package-manager:
  apk: govc
  brew: govc
  nix: govc
  scoop: main/govc
  zypper: govc
package-manager-url: https://formulae.brew.sh/formula/govc
version: 0.54.0
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool for VMware vSphere
source-archive: https://github.com/vmware/govmomi/archive/refs/tags/v0.54.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: govc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add govc
  av: sudo av install brew:govc
  brew: brew install govc
  nix: nix profile install nixpkgs#govc
  scoop: scoop install main/govc
  zypper: sudo zypper install govc
provenance:
  formula: govc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
