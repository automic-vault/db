id: brew:csvtk
display-name: csvtk
homepage: https://bioinf.shenwei.me/csvtk
repo: https://github.com/shenwei356/csvtk
docs: https://bioinf.shenwei.me/csvtk
package-manager:
  brew: csvtk
  macports: csvtk
  nix: csvtk
package-manager-url: https://formulae.brew.sh/formula/csvtk
version: 0.37.0
license: MIT
category: development
tags:
  - cli
description: Cross-platform, efficient and practical CSV/TSV toolkit in Golang
source-archive: https://github.com/shenwei356/csvtk/archive/refs/tags/v0.37.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: csvtk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:csvtk
  brew: brew install csvtk
  macports: sudo port install csvtk
  nix: nix profile install nixpkgs#csvtk
provenance:
  formula: csvtk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
