id: brew:havener
display-name: havener
homepage: https://github.com/homeport/havener
repo: https://github.com/homeport/havener
docs: https://github.com/homeport/havener
package-manager:
  brew: havener
  macports: havener
package-manager-url: https://formulae.brew.sh/formula/havener
version: 2.2.7
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
description: Swiss army knife for Kubernetes tasks
source-archive: https://github.com/homeport/havener/archive/refs/tags/v2.2.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: havener
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:havener
  brew: brew install havener
  macports: sudo port install havener
provenance:
  formula: havener
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
