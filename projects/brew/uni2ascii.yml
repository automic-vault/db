id: brew:uni2ascii
display-name: uni2ascii
homepage: https://billposer.org/Software/uni2ascii.html
repo: https://billposer.org/Software/Downloads/uni2ascii-4.20.tar.bz2
docs: https://billposer.org/Software/uni2ascii.html
package-manager:
  brew: uni2ascii
  debian: uni2ascii
  macports: uni2ascii
  nix: uni2ascii
  ubuntu: uni2ascii
package-manager-url: https://formulae.brew.sh/formula/uni2ascii
version: 4.20
license: GPL-3.0-only
category: network
tags:
  - cli
description: Bi-directional conversion between UTF-8 and various ASCII flavors
source-archive: https://billposer.org/Software/Downloads/uni2ascii-4.20.tar.bz2
dependencies:
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: ascii2uni
  - exposure: global executable
    kind: cli
    name: u2a
  - exposure: global executable
    kind: cli
    name: uni2ascii
bottle:
