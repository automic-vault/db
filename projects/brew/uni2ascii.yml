    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:uni2ascii
  brew: brew install uni2ascii
  debian: sudo apt install uni2ascii
  macports: sudo port install uni2ascii
  nix: nix profile install nixpkgs#uni2ascii
  ubuntu: sudo apt install uni2ascii
provenance:
  formula: uni2ascii
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
