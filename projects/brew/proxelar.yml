id: brew:proxelar
display-name: proxelar
homepage: https://github.com/emanuele-em/proxelar
repo: https://github.com/emanuele-em/proxelar
docs: https://github.com/emanuele-em/proxelar
package-manager:
  brew: proxelar
  nix: proxelar
package-manager-url: https://formulae.brew.sh/formula/proxelar
version: 0.4.5
license: MIT
category: development
tags:
  - cli
description: Man-in-the-Middle proxy for HTTP/HTTPS traffic
source-archive: https://github.com/emanuele-em/proxelar/archive/refs/tags/v0.4.5.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: proxelar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:proxelar
  brew: brew install proxelar
  nix: nix profile install nixpkgs#proxelar
provenance:
  formula: proxelar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
