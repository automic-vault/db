id: brew:forcecli
display-name: forcecli
homepage: https://force-cli.herokuapp.com/
repo: https://github.com/ForceCLI/force
docs: https://force-cli.herokuapp.com/
package-manager:
  brew: forcecli
  scoop: main/force
package-manager-url: https://formulae.brew.sh/formula/forcecli
version: 1.10.1
license: MIT
category: development
tags:
  - cli
description: Command-line interface to Force.com
source-archive: https://github.com/ForceCLI/force/archive/refs/tags/v1.10.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: force
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:forcecli
  brew: brew install forcecli
  scoop: scoop install main/force
provenance:
  formula: forcecli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
