id: brew:inspircd
display-name: inspircd
homepage: https://www.inspircd.org/
repo: https://github.com/inspircd/inspircd
docs: https://www.inspircd.org/
package-manager:
  apk: inspircd
  brew: inspircd
  debian: inspircd
  nix: inspircd
  ubuntu: inspircd
package-manager-url: https://formulae.brew.sh/formula/inspircd
version: 4.10.1
license: GPL-2.0-only
category: development
tags:
  - cli
description: Modular C++ Internet Relay Chat daemon
source-archive: https://github.com/inspircd/inspircd/archive/refs/tags/v4.10.1.tar.gz
dependencies:
  - argon2
  - gnutls
  - libpq
  - mariadb-connector-c
build-dependencies:
  - pkgconf
uses-from-macos:
  - openldap
executables:
  - exposure: global executable
    kind: cli
    name: inspircd
  - exposure: global executable
    kind: cli
    name: inspircd-testssl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add inspircd
  av: sudo av install brew:inspircd
  brew: brew install inspircd
  debian: sudo apt install inspircd
  nix: nix profile install nixpkgs#inspircd
  ubuntu: sudo apt install inspircd
provenance:
  formula: inspircd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
