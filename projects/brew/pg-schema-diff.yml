id: brew:pg-schema-diff
display-name: pg-schema-diff
homepage: https://github.com/stripe/pg-schema-diff
repo: https://github.com/stripe/pg-schema-diff
docs: https://github.com/stripe/pg-schema-diff
package-manager:
  brew: pg-schema-diff
  nix: pg-schema-diff
package-manager-url: https://formulae.brew.sh/formula/pg-schema-diff
version: 1.0.5
license: MIT
category: database
tags:
  - cli
description: Diff Postgres schemas and generating SQL migrations
source-archive: https://github.com/stripe/pg-schema-diff/archive/refs/tags/v1.0.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pg-schema-diff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pg-schema-diff
  brew: brew install pg-schema-diff
  nix: nix profile install nixpkgs#pg-schema-diff
provenance:
  formula: pg-schema-diff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
