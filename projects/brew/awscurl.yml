id: brew:awscurl
display-name: awscurl
homepage: https://github.com/okigan/awscurl
repo: >
  https://files.pythonhosted.org/packages/54/a3/fcbc64c5e038b87394e72a03131643109e451a697d467a7f90c6b6413ee9/awscurl-0.42.tar.gz
docs: https://github.com/okigan/awscurl
package-manager:
  brew: awscurl
package-manager-url: https://formulae.brew.sh/formula/awscurl
version: 0.42
license: MIT
category: cloud
tags:
  - aws
  - cli
description: Curl like simplicity to access AWS resources
source-archive: >
  https://files.pythonhosted.org/packages/54/a3/fcbc64c5e038b87394e72a03131643109e451a697d467a7f90c6b6413ee9/awscurl-0.42.tar.gz
dependencies:
  - aws-c-auth
  - aws-c-cal
  - aws-c-common
  - aws-c-compression
  - aws-c-event-stream
  - aws-c-http
  - aws-c-io
  - aws-c-mqtt
  - aws-c-s3
  - aws-c-sdkutils
  - aws-checksums
  - certifi
  - cryptography
  - openssl@3
  - python@3.14
build-dependencies:
  - cmake
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: awscurl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:awscurl
  brew: brew install awscurl
provenance:
  formula: awscurl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
