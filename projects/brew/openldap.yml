id: brew:openldap
display-name: openldap
homepage: https://www.openldap.org/software/
repo: https://www.openldap.org/software/download/OpenLDAP/openldap-release/openldap-2.6.13.tgz
docs: https://www.openldap.org/software/
package-manager:
  apk: openldap
  brew: openldap
  dnf: openldap
  macports: openldap
  nix: openldap
  pacman: openldap
package-manager-url: https://formulae.brew.sh/formula/openldap
version: 2.6.13
license: OLDAP-2.8
category: network
tags:
  - cli
description: Open source suite of directory software
source-archive: https://www.openldap.org/software/download/OpenLDAP/openldap-release/openldap-2.6.13.tgz
dependencies:
  - openssl@3
uses-from-macos:
  - cyrus-sasl
executables:
  - exposure: global executable
    kind: cli
    name: ldapadd
  - exposure: global executable
    kind: cli
    name: ldapcompare
  - exposure: global executable
    kind: cli
    name: ldapdelete
  - exposure: global executable
    kind: cli
    name: ldapexop
  - exposure: global executable
    kind: cli
    name: ldapmodify
  - exposure: global executable
    kind: cli
    name: ldapmodrdn
  - exposure: global executable
    kind: cli
    name: ldappasswd
  - exposure: global executable
    kind: cli
    name: ldapsearch
  - exposure: global executable
    kind: cli
    name: ldapurl
  - exposure: global executable
    kind: cli
    name: ldapvc
  - exposure: global executable
    kind: cli
    name: ldapwhoami
  - exposure: global executable
    kind: cli
    name: slapacl
  - exposure: global executable
    kind: cli
    name: slapadd
  - exposure: global executable
    kind: cli
    name: slapauth
  - exposure: global executable
    kind: cli
    name: slapcat
  - exposure: global executable
    kind: cli
    name: slapdn
  - exposure: global executable
    kind: cli
    name: slapindex
  - exposure: global executable
    kind: cli
    name: slapmodify
  - exposure: global executable
    kind: cli
    name: slappasswd
  - exposure: global executable
    kind: cli
    name: slapschema
  - exposure: global executable
    kind: cli
    name: slaptest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add openldap
  av: sudo av install brew:openldap
  brew: brew install openldap
  dnf: sudo dnf install openldap
  macports: sudo port install openldap
  nix: nix profile install nixpkgs#openldap
  pacman: sudo pacman -S openldap
provenance:
  formula: openldap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
