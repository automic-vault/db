id: brew:dexter
display-name: dexter
homepage: https://github.com/ankane/dexter
repo: https://github.com/ankane/dexter
docs: https://github.com/ankane/dexter
package-manager:
  brew: dexter
  nix: dexter
package-manager-url: https://formulae.brew.sh/formula/dexter
version: 0.6.3
license: MIT
category: database
tags:
  - cli
description: Automatic indexer for Postgres
source-archive: https://github.com/ankane/dexter/archive/refs/tags/v0.6.3.tar.gz
dependencies:
  - libpq
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: dexter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dexter
  brew: brew install dexter
  nix: nix profile install nixpkgs#dexter
provenance:
  formula: dexter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
