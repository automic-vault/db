id: brew:poetry
display-name: poetry
homepage: https://python-poetry.org/
repo: >
  https://files.pythonhosted.org/packages/c0/02/a309e58943f77f1947e4a658a9606933ab4a7b9f040025f4e25daf5fafbb/poetry-2.4.1.tar.gz
docs: https://python-poetry.org/
package-manager:
  apk: poetry
  brew: poetry
  dnf: poetry
  macports: poetry
  nix: poetry
  scoop: main/poetry
package-manager-url: https://formulae.brew.sh/formula/poetry
version: 2.4.1
license: MIT
category: network
tags:
  - cli
description: Python package management tool
source-archive: >
  https://files.pythonhosted.org/packages/c0/02/a309e58943f77f1947e4a658a9606933ab4a7b9f040025f4e25daf5fafbb/poetry-2.4.1.tar.gz
dependencies:
  - certifi
  - cffi
  - python@3.14
  - zstd
build-dependencies:
  - cmake
  - ninja
  - rust
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: poetry
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add poetry
  av: sudo av install brew:poetry
  brew: brew install poetry
  dnf: sudo dnf install poetry
  macports: sudo port install poetry
  nix: nix profile install nixpkgs#poetry
  scoop: scoop install main/poetry
provenance:
  formula: poetry
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
