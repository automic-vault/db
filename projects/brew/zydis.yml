id: brew:zydis
display-name: zydis
homepage: https://zydis.re
repo: https://github.com/zyantific/zydis
docs: https://zydis.re
package-manager:
  apk: zydis
  brew: zydis
  dnf: zydis
  nix: zydis
  pacman: zydis
package-manager-url: https://formulae.brew.sh/formula/zydis
version: 4.1.1
license: MIT
category: development
tags:
  - cli
description: Fast and lightweight x86/x86_64 disassembler library
source-archive: https://github.com/zyantific/zydis/archive/refs/tags/v4.1.1.tar.gz
dependencies:
  - zycore-c
build-dependencies:
  - cmake
  - ronn-ng
executables:
  - exposure: global executable
    kind: cli
    name: ZydisDisasm
  - exposure: global executable
    kind: cli
    name: ZydisInfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zydis
  av: sudo av install brew:zydis
  brew: brew install zydis
  dnf: sudo dnf install zydis
  nix: nix profile install nixpkgs#zydis
  pacman: sudo pacman -S zydis
provenance:
  formula: zydis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
