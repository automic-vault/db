id: brew:llgo
display-name: llgo
homepage: https://github.com/goplus/llgo
repo: https://github.com/goplus/llgo
docs: https://github.com/goplus/llgo
package-manager:
  brew: llgo
package-manager-url: https://formulae.brew.sh/formula/llgo
version: 0.12.2
license: Apache-2.0
category: development
tags:
  - cli
description: Go compiler based on LLVM integrate with the C ecosystem and Python
source-archive: https://github.com/goplus/llgo/archive/refs/tags/v0.12.2.tar.gz
dependencies:
  - bdw-gc
  - go@1.25
  - libuv
  - lld@19
  - llvm@19
  - openssl@3
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: llgo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:llgo
  brew: brew install llgo
provenance:
  formula: llgo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
