id: brew:ansible
display-name: ansible
homepage: https://www.ansible.com/
repo: >
  https://files.pythonhosted.org/packages/d8/d0/b083e41b4653ba3ab542c2b58c71afee8a2317a2b23ffe00f574152b53ad/ansible-13.7.0.tar.gz
docs: https://www.ansible.com/
package-manager:
  apk: ansible
  brew: ansible
  debian: ansible
  dnf: ansible
  macports: ansible
  nix: ansible
  pacman: ansible
  ubuntu: ansible
  zypper: ansible
package-manager-url: https://formulae.brew.sh/formula/ansible
version: 13.7.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Automate deployment, configuration, and upgrading
source-archive: >
  https://files.pythonhosted.org/packages/d8/d0/b083e41b4653ba3ab542c2b58c71afee8a2317a2b23ffe00f574152b53ad/ansible-13.7.0.tar.gz
dependencies:
  - certifi
  - cryptography
  - libsodium
  - libssh
  - libyaml
  - python@3.14
  - tree
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - krb5
  - libxml2
  - libxslt
  - openldap
executables:
  - exposure: global executable
    kind: cli
    name: ansible
  - exposure: global executable
    kind: cli
    name: ansible-community
  - exposure: global executable
    kind: cli
    name: ansible-config
  - exposure: global executable
    kind: cli
    name: ansible-console
  - exposure: global executable
    kind: cli
    name: ansible-doc
  - exposure: global executable
    kind: cli
    name: ansible-galaxy
  - exposure: global executable
    kind: cli
    name: ansible-inventory
  - exposure: global executable
    kind: cli
    name: ansible-playbook
  - exposure: global executable
    kind: cli
    name: ansible-pull
  - exposure: global executable
    kind: cli
    name: ansible-test
  - exposure: global executable
    kind: cli
    name: ansible-vault
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ansible
  av: sudo av install brew:ansible
  brew: brew install ansible
  debian: sudo apt install ansible
  dnf: sudo dnf install ansible
  macports: sudo port install ansible
  nix: nix profile install nixpkgs#ansible
  pacman: sudo pacman -S ansible
  ubuntu: sudo apt install ansible
  zypper: sudo zypper install ansible
provenance:
  formula: ansible
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
