id: brew:lm-sensors
display-name: lm-sensors
homepage: https://github.com/hramrach/lm-sensors
repo: https://github.com/hramrach/lm-sensors
docs: https://github.com/hramrach/lm-sensors
package-manager:
  apk: lm-sensors
  brew: lm-sensors
  debian: lm-sensors
  dnf: lm_sensors
  nix: lm_sensors
  pacman: lm_sensors
  scoop: extras/fancontrol
  ubuntu: lm-sensors
  winget: Rem0o.FanControl
  zypper: sensors
package-manager-url: https://formulae.brew.sh/formula/lm-sensors
version: 3.6.2
license: GPL-2.0-or-later OR LGPL-2.1-or-later
category: development
tags:
  - cli
description: Tools for monitoring the temperatures, voltages, and fans
source-archive: https://github.com/hramrach/lm-sensors/archive/refs/tags/V3-6-2.tar.gz
build-dependencies:
  - bison
  - flex
executables:
  - exposure: global executable
    kind: cli
    name: fancontrol
  - exposure: global executable
    kind: cli
    name: pwmconfig
  - exposure: global executable
    kind: cli
    name: sensors
  - exposure: global executable
    kind: cli
    name: sensors-conf-convert
  - exposure: global executable
    kind: cli
    name: sensors-detect
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lm-sensors
  av: sudo av install brew:lm-sensors
  brew: brew install lm-sensors
  debian: sudo apt install lm-sensors
  dnf: sudo dnf install lm_sensors
  nix: nix profile install nixpkgs#lm_sensors
  pacman: sudo pacman -S lm_sensors
  scoop: scoop install extras/fancontrol
  ubuntu: sudo apt install lm-sensors
  winget: winget install --id Rem0o.FanControl -e
  zypper: sudo zypper install sensors
provenance:
  formula: lm-sensors
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
