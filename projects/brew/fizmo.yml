id: brew:fizmo
display-name: fizmo
homepage: https://fizmo.spellbreaker.org
repo: https://fizmo.spellbreaker.org/source/fizmo-0.8.5.tar.gz
docs: https://fizmo.spellbreaker.org
package-manager:
  brew: fizmo
  debian: fizmo-console
  macports: fizmo
  ubuntu: fizmo-console
package-manager-url: https://formulae.brew.sh/formula/fizmo
version: 0.8.5
license: BSD-3-Clause
category: network
tags:
  - cli
description: Z-Machine interpreter
source-archive: https://fizmo.spellbreaker.org/source/fizmo-0.8.5.tar.gz
dependencies:
  - freetype
  - jpeg-turbo
  - libpng
  - libsndfile
  - libx11
  - sdl2
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: fizmo-console
  - exposure: global executable
    kind: cli
    name: fizmo-ncursesw
  - exposure: global executable
    kind: cli
    name: fizmo-sdl2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fizmo
  brew: brew install fizmo
  debian: sudo apt install fizmo-console
  macports: sudo port install fizmo
  ubuntu: sudo apt install fizmo-console
provenance:
  formula: fizmo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
