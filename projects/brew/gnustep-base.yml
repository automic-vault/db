id: brew:gnustep-base
display-name: gnustep-base
homepage: https://github.com/gnustep/libs-base
repo: https://github.com/gnustep/libs-base
docs: https://github.com/gnustep/libs-base
package-manager:
  brew: gnustep-base
  dnf: gnustep-base
  macports: gnustep-base
  nix: gnustep-base
  pacman: gnustep-base
  zypper: gnustep-base
package-manager-url: https://formulae.brew.sh/formula/gnustep-base
version: 1.31.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Library of general-purpose, non-graphical Objective C objects
source-archive: >
  https://github.com/gnustep/libs-base/releases/download/base-1_31_1/gnustep-base-1.31.1.tar.gz
dependencies:
  - gmp
  - gnutls
build-dependencies:
  - gnustep-make
  - pkgconf
uses-from-macos:
  - libffi
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: HTMLLinker
  - exposure: global executable
    kind: cli
    name: autogsdoc
  - exposure: global executable
    kind: cli
    name: classes
  - exposure: global executable
    kind: cli
    name: cvtenc
  - exposure: global executable
    kind: cli
    name: defaults
  - exposure: global executable
    kind: cli
    name: gdnc
  - exposure: global executable
    kind: cli
    name: gdomap
  - exposure: global executable
    kind: cli
    name: gspath
  - exposure: global executable
    kind: cli
    name: make_strings
  - exposure: global executable
    kind: cli
    name: pl
  - exposure: global executable
    kind: cli
    name: pl2link
  - exposure: global executable
    kind: cli
    name: pldes
  - exposure: global executable
    kind: cli
    name: plget
  - exposure: global executable
    kind: cli
    name: plmerge
  - exposure: global executable
    kind: cli
    name: plparse
  - exposure: global executable
    kind: cli
    name: plser
  - exposure: global executable
    kind: cli
    name: plutil
  - exposure: global executable
    kind: cli
    name: sfparse
  - exposure: global executable
    kind: cli
    name: xmlparse
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gnustep-base
  brew: brew install gnustep-base
  dnf: sudo dnf install gnustep-base
  macports: sudo port install gnustep-base
  nix: nix profile install nixpkgs#gnustep-base
  pacman: sudo pacman -S gnustep-base
  zypper: sudo zypper install gnustep-base
provenance:
  formula: gnustep-base
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
