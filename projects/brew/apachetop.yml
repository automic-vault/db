id: brew:apachetop
display-name: apachetop
homepage: https://github.com/tessus/apachetop
repo: https://github.com/tessus/apachetop
docs: https://github.com/tessus/apachetop
package-manager:
  brew: apachetop
  debian: apachetop
  dnf: apachetop
  macports: apachetop
  ubuntu: apachetop
package-manager-url: https://formulae.brew.sh/formula/apachetop
version: 0.23.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Top-like display of Apache log
source-archive: https://github.com/tessus/apachetop/releases/download/0.23.2/apachetop-0.23.2.tar.gz
dependencies:
  - adns
  - ncurses
  - pcre2
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: apachetop
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:apachetop
  brew: brew install apachetop
  debian: sudo apt install apachetop
  dnf: sudo dnf install apachetop
  macports: sudo port install apachetop
  ubuntu: sudo apt install apachetop
provenance:
  formula: apachetop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
