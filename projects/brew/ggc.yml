id: brew:ggc
display-name: ggc
homepage: https://github.com/bmf-san/ggc
repo: https://github.com/bmf-san/ggc
docs: https://github.com/bmf-san/ggc
package-manager:
  brew: ggc
  macports: ggc
package-manager-url: https://formulae.brew.sh/formula/ggc
version: 8.6.4
license: MIT
category: development
tags:
  - cli
  - git
description: Modern Git CLI
source-archive: https://github.com/bmf-san/ggc/archive/refs/tags/v8.6.4.tar.gz
build-dependencies:
  - go
uses-from-macos:
  - vim
executables:
  - exposure: global executable
    kind: cli
    name: ggc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ggc
  brew: brew install ggc
  macports: sudo port install ggc
provenance:
  formula: ggc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
