id: brew:calicoctl
display-name: calicoctl
homepage: https://www.tigera.io/project-calico/
repo: https://github.com/projectcalico/calico
docs: https://www.tigera.io/project-calico/
package-manager:
  brew: calicoctl
package-manager-url: https://formulae.brew.sh/formula/calicoctl
version: 3.32.0
license: Apache-2.0
category: development
tags:
  - cli
description: Calico CLI tool
source-archive: https://github.com/projectcalico/calico.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: calicoctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:calicoctl
  brew: brew install calicoctl
provenance:
  formula: calicoctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
