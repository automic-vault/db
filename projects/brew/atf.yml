id: brew:atf
display-name: atf
homepage: https://github.com/freebsd/atf
repo: https://github.com/freebsd/atf
docs: https://github.com/freebsd/atf
package-manager:
  apk: atf
  brew: atf
  debian: atf-sh
  macports: atf
  nix: atf
  ubuntu: atf-sh
package-manager-url: https://formulae.brew.sh/formula/atf
version: 0.23
license: BSD-2-Clause
category: development
tags:
  - cli
description: Automated testing framework
source-archive: https://github.com/freebsd/atf/releases/download/atf-0.23/atf-0.23.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: atf-sh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add atf
  av: sudo av install brew:atf
  brew: brew install atf
  debian: sudo apt install atf-sh
  macports: sudo port install atf
  nix: nix profile install nixpkgs#atf
  ubuntu: sudo apt install atf-sh
provenance:
  formula: atf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
