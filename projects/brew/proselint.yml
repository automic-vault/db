id: brew:proselint
display-name: proselint
homepage: https://github.com/amperser/proselint
repo: >
  https://files.pythonhosted.org/packages/1f/95/0cec6b32b3031613468df80c94fbced8f3c3e38ff7f0101645c0acde6bd6/proselint-0.16.0.tar.gz
docs: https://github.com/amperser/proselint
package-manager:
  brew: proselint
  dnf: proselint
  macports: proselint
  nix: proselint
package-manager-url: https://formulae.brew.sh/formula/proselint
version: 0.16.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Linter for prose
source-archive: >
  https://files.pythonhosted.org/packages/1f/95/0cec6b32b3031613468df80c94fbced8f3c3e38ff7f0101645c0acde6bd6/proselint-0.16.0.tar.gz
dependencies:
  - python@3.14
  - re2
build-dependencies:
