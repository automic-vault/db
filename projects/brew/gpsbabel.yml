id: brew:gpsbabel
display-name: gpsbabel
homepage: https://www.gpsbabel.org/
repo: https://github.com/GPSBabel/gpsbabel
docs: https://www.gpsbabel.org/
package-manager:
  apk: gpsbabel
  brew: gpsbabel
  debian: gpsbabel
  dnf: gpsbabel
  macports: gpsbabel
  nix: gpsbabel
  pacman: gpsbabel
  ubuntu: gpsbabel
  zypper: gpsbabel
package-manager-url: https://formulae.brew.sh/formula/gpsbabel
version: 1.10.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Converts/uploads GPS waypoints, tracks, and routes
source-archive: https://github.com/GPSBabel/gpsbabel/archive/refs/tags/gpsbabel_1_10_0.tar.gz
dependencies:
  - libusb
  - qt5compat
  - qtbase
  - shapelib
build-dependencies:
  - cmake
  - pkgconf
  - qtserialport
executables:
  - exposure: global executable
    kind: cli
    name: gpsbabel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gpsbabel
  av: sudo av install brew:gpsbabel
  brew: brew install gpsbabel
  debian: sudo apt install gpsbabel
  dnf: sudo dnf install gpsbabel
  macports: sudo port install gpsbabel
  nix: nix profile install nixpkgs#gpsbabel
  pacman: sudo pacman -S gpsbabel
  ubuntu: sudo apt install gpsbabel
  zypper: sudo zypper install gpsbabel
provenance:
  formula: gpsbabel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
