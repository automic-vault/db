id: brew:busted
display-name: busted
homepage: https://lunarmodules.github.io/busted/
repo: https://github.com/lunarmodules/busted
docs: https://lunarmodules.github.io/busted/
package-manager:
  brew: busted
  pacman: busted
package-manager-url: https://formulae.brew.sh/formula/busted
version: 2.3.0
license: MIT
category: development
tags:
  - cli
description: Elegant Lua unit testing
source-archive: https://github.com/lunarmodules/busted/archive/refs/tags/v2.3.0.tar.gz
dependencies:
  - lua
build-dependencies:
  - luarocks
executables:
  - exposure: global executable
    kind: cli
    name: busted
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:busted
  brew: brew install busted
  pacman: sudo pacman -S busted
provenance:
  formula: busted
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
