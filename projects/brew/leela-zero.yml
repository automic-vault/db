id: brew:leela-zero
display-name: leela-zero
homepage: https://zero.sjeng.org/
repo: https://github.com/leela-zero/leela-zero
docs: https://zero.sjeng.org/
package-manager:
  brew: leela-zero
  debian: leela-zero
  nix: leela-zero
  ubuntu: leela-zero
package-manager-url: https://formulae.brew.sh/formula/leela-zero
version: 0.17
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Neural Network Go engine with no human-provided knowledge
source-archive: https://github.com/leela-zero/leela-zero.git
dependencies:
  - boost
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: leelaz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:leela-zero
  brew: brew install leela-zero
  debian: sudo apt install leela-zero
  nix: nix profile install nixpkgs#leela-zero
  ubuntu: sudo apt install leela-zero
provenance:
  formula: leela-zero
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
