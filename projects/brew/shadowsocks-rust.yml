id: brew:shadowsocks-rust
display-name: shadowsocks-rust
homepage: https://shadowsocks.org/
repo: https://github.com/shadowsocks/shadowsocks-rust
docs: https://shadowsocks.org/
package-manager:
  apk: shadowsocks-rust
  brew: shadowsocks-rust
  macports: shadowsocks-rust
  nix: shadowsocks-rust
  pacman: shadowsocks-rust
  scoop: main/shadowsocks-rust
  zypper: shadowsocks-rust
package-manager-url: https://formulae.brew.sh/formula/shadowsocks-rust
version: 1.24.0
license: MIT
category: development
tags:
  - cli
description: Rust port of Shadowsocks
source-archive: https://github.com/shadowsocks/shadowsocks-rust/archive/refs/tags/v1.24.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sslocal
  - exposure: global executable
    kind: cli
    name: ssmanager
  - exposure: global executable
    kind: cli
    name: ssserver
  - exposure: global executable
    kind: cli
    name: ssservice
  - exposure: global executable
    kind: cli
    name: ssurl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add shadowsocks-rust
  av: sudo av install brew:shadowsocks-rust
  brew: brew install shadowsocks-rust
  macports: sudo port install shadowsocks-rust
  nix: nix profile install nixpkgs#shadowsocks-rust
  pacman: sudo pacman -S shadowsocks-rust
  scoop: scoop install main/shadowsocks-rust
  zypper: sudo zypper install shadowsocks-rust
provenance:
  formula: shadowsocks-rust
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
