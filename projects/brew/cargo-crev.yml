id: brew:cargo-crev
display-name: cargo-crev
homepage: https://github.com/crev-dev/cargo-crev
repo: https://github.com/crev-dev/cargo-crev
docs: https://github.com/crev-dev/cargo-crev
package-manager:
  apk: cargo-crev
  brew: cargo-crev
  nix: cargo-crev
  pacman: cargo-crev
package-manager-url: https://formulae.brew.sh/formula/cargo-crev
version: 0.27.1
license: Apache-2.0
category: development
tags:
  - cli
description: Code review system for the cargo package manager
source-archive: https://github.com/crev-dev/cargo-crev/archive/refs/tags/v0.27.1.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-crev
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-crev
  av: sudo av install brew:cargo-crev
  brew: brew install cargo-crev
  nix: nix profile install nixpkgs#cargo-crev
  pacman: sudo pacman -S cargo-crev
provenance:
  formula: cargo-crev
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
