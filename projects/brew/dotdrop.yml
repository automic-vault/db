id: brew:dotdrop
display-name: dotdrop
homepage: https://github.com/deadc0de6/dotdrop
repo: https://github.com/deadc0de6/dotdrop
docs: https://github.com/deadc0de6/dotdrop
package-manager:
  brew: dotdrop
  debian: dotdrop
  ubuntu: dotdrop
package-manager-url: https://formulae.brew.sh/formula/dotdrop
version: 1.16.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Save your dotfiles once, deploy them everywhere
source-archive: https://github.com/deadc0de6/dotdrop/archive/refs/tags/v1.16.2.tar.gz
dependencies:
  - certifi
  - libmagic
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: dotdrop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dotdrop
  brew: brew install dotdrop
  debian: sudo apt install dotdrop
  ubuntu: sudo apt install dotdrop
provenance:
  formula: dotdrop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
