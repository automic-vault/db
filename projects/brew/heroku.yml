id: brew:heroku
display-name: heroku
homepage: https://www.npmjs.com/package/heroku/
repo: https://registry.npmjs.org/heroku/-/heroku-11.4.0.tgz
docs: https://www.npmjs.com/package/heroku/
package-manager:
  brew: heroku
  nix: heroku
  winget: Heroku.HerokuCLI
package-manager-url: https://formulae.brew.sh/formula/heroku
version: 11.4.0
license: ISC
category: network
tags:
  - cli
description: CLI for Heroku
source-archive: https://registry.npmjs.org/heroku/-/heroku-11.4.0.tgz
dependencies:
  - node
  - terminal-notifier
executables:
  - exposure: global executable
    kind: cli
    name: heroku
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:heroku
  brew: brew install heroku
  nix: nix profile install nixpkgs#heroku
  winget: winget install --id Heroku.HerokuCLI -e
provenance:
  formula: heroku
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
