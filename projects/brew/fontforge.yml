id: brew:fontforge
display-name: fontforge
homepage: https://fontforge.github.io
repo: https://github.com/fontforge/fontforge
docs: https://fontforge.github.io
package-manager:
  apk: fontforge
  brew: fontforge
  chocolatey: fontforge
  debian: fontforge
  dnf: fontforge
  macports: fontforge
  nix: fontforge
  pacman: fontforge
  scoop: extras/fontforge
  ubuntu: fontforge
  winget: FontForge.FontForge
  zypper: fontforge
package-manager-url: https://formulae.brew.sh/formula/fontforge
version: 20251009
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Command-line outline and bitmap font editor/converter
source-archive: >
  https://github.com/fontforge/fontforge/releases/download/20251009/fontforge-20251009.tar.xz
dependencies:
  - brotli
  - cairo
  - fontconfig
  - freetype
  - gettext
  - giflib
  - glib
  - jpeg-turbo
  - libpng
  - libspiro
  - libtiff
  - libtool
  - libuninameslist
  - pango
  - python@3.14
  - readline
  - woff2
build-dependencies:
  - cmake
  - gettext
  - ninja
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: acorn2sfd
  - exposure: global executable
    kind: cli
    name: dewoff
  - exposure: global executable
    kind: cli
    name: findtable
  - exposure: global executable
    kind: cli
    name: fontforge
  - exposure: global executable
    kind: cli
    name: fontimage
  - exposure: global executable
    kind: cli
    name: fontlint
  - exposure: global executable
    kind: cli
    name: pcl2ttf
  - exposure: global executable
    kind: cli
    name: pfadecrypt
  - exposure: global executable
    kind: cli
    name: rmligamarks
  - exposure: global executable
    kind: cli
    name: sfddiff
  - exposure: global executable
    kind: cli
    name: showttf
  - exposure: global executable
    kind: cli
    name: stripttc
  - exposure: global executable
    kind: cli
    name: ttf2eps
  - exposure: global executable
    kind: cli
    name: woff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This formula only installs the command line utilities. FontForge.app can be
    downloaded directly from the website: https://fontforge.github.io Alternatively,
    install with Homebrew Cask: brew install --cask fontforge
  post-install-defined: false
install-lines:
  apk: sudo apk add fontforge
  av: sudo av install brew:fontforge
  brew: brew install fontforge
  chocolatey: choco install fontforge
  debian: sudo apt install fontforge
  dnf: sudo dnf install fontforge
  macports: sudo port install fontforge
  nix: nix profile install nixpkgs#fontforge
  pacman: sudo pacman -S fontforge
  scoop: scoop install extras/fontforge
  ubuntu: sudo apt install fontforge
  winget: winget install --id FontForge.FontForge -e
  zypper: sudo zypper install fontforge
provenance:
  formula: fontforge
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
