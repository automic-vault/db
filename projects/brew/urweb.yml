id: brew:urweb
display-name: urweb
homepage: http://www.impredicative.com/ur/
repo: https://github.com/urweb/urweb
docs: http://www.impredicative.com/ur/
package-manager:
  brew: urweb
  nix: urweb
package-manager-url: https://formulae.brew.sh/formula/urweb
version: 20200209
license: BSD-3-Clause
category: development
tags:
  - cli
description: Ur/Web programming language
source-archive: https://github.com/urweb/urweb/releases/download/20200209/urweb-20200209.tar.gz
dependencies:
  - gmp
  - icu4c@78
  - openssl@4
build-dependencies:
  - autoconf
  - automake
  - libtool
  - mlton
executables:
  - exposure: global executable
    kind: cli
    name: urweb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:urweb
  brew: brew install urweb
  nix: nix profile install nixpkgs#urweb
provenance:
  formula: urweb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
