id: brew:libraw
display-name: libraw
homepage: https://www.libraw.org/
repo: https://www.libraw.org/data/LibRaw-0.22.1.tar.gz
docs: https://www.libraw.org/
package-manager:
  apk: libraw
  brew: libraw
  dnf: LibRaw
  macports: libraw
  nix: libraw
  pacman: libraw
package-manager-url: https://formulae.brew.sh/formula/libraw
version: 0.22.1
license: LGPL-2.1-only OR CDDL-1.0
category: development
tags:
  - cli
description: Library for reading RAW files from digital photo cameras
source-archive: https://www.libraw.org/data/LibRaw-0.22.1.tar.gz
dependencies:
  - jpeg-turbo
  - libomp
  - little-cms2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: 4channels
  - exposure: global executable
    kind: cli
    name: dcraw_emu
  - exposure: global executable
    kind: cli
    name: dcraw_half
  - exposure: global executable
    kind: cli
    name: half_mt
  - exposure: global executable
    kind: cli
    name: mem_image
  - exposure: global executable
    kind: cli
    name: multirender_test
  - exposure: global executable
    kind: cli
    name: postprocessing_benchmark
  - exposure: global executable
    kind: cli
    name: raw-identify
  - exposure: global executable
    kind: cli
    name: rawtextdump
  - exposure: global executable
    kind: cli
    name: simple_dcraw
  - exposure: global executable
    kind: cli
    name: unprocessed_raw
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libraw
  av: sudo av install brew:libraw
  brew: brew install libraw
  dnf: sudo dnf install LibRaw
  macports: sudo port install libraw
  nix: nix profile install nixpkgs#libraw
  pacman: sudo pacman -S libraw
provenance:
  formula: libraw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
