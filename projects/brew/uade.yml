id: brew:uade
display-name: uade
homepage: https://zakalwe.fi/uade/
repo: https://zakalwe.fi/uade/uade3/uade-3.05.tar.bz2
docs: https://zakalwe.fi/uade/
package-manager:
  brew: uade
  nix: uade
package-manager-url: https://formulae.brew.sh/formula/uade
version: 3.05
license: GPL-2.0-only
category: network
tags:
  - cli
description: Play Amiga tunes through UAE emulation
source-archive: https://zakalwe.fi/uade/uade3/uade-3.05.tar.bz2
dependencies:
  - libao
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: bencat
  - exposure: global executable
    kind: cli
    name: mod2ogg2.sh
  - exposure: global executable
    kind: cli
    name: uade123
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:uade
  brew: brew install uade
  nix: nix profile install nixpkgs#uade
provenance:
  formula: uade
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
