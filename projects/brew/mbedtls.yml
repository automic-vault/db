id: brew:mbedtls
display-name: mbedtls
homepage: https://tls.mbed.org/
repo: https://github.com/Mbed-TLS/mbedtls
package-manager:
  apk: mbedtls
  brew: mbedtls
  dnf: mbedtls
  macports: mbedtls
  nix: mbedtls
  pacman: mbedtls
package-manager-url: https://formulae.brew.sh/formula/mbedtls
version: 4.1.0
license: Apache-2.0
tags:
  - cli
description: Cryptographic & SSL/TLS library
source-archive: >
  https://github.com/Mbed-TLS/mbedtls/releases/download/mbedtls-4.1.0/mbedtls-4.1.0.tar.bz2
executables:
  - aead_demo
  - cert_app
  - cert_req
  - cert_write
  - crl_app
  - crypto_examples
  - dtls_client
  - dtls_server
  - generate_random_uuid
  - hmac_demo
  - key_ladder_demo
  - key_ladder_demo.sh
  - load_roots
  - metatest
  - mini_client
  - pem2der
  - psa_constant_names
  - psa_hash
  - query_compile_time_config
  - query_included_headers
  - req_app
  - selftest
  - ssl_client1
  - ssl_client2
  - ssl_context_info
  - ssl_fork_server
  - ssl_mail_client
  - ssl_pthread_server
  - ssl_server
  - ssl_server2
  - strerror
  - udp_proxy
  - zeroize
provenance:
  formula: mbedtls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
