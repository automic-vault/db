id: brew:mbedtls
display-name: mbedtls
homepage: https://tls.mbed.org/
repo: https://github.com/Mbed-TLS/mbedtls
docs: https://tls.mbed.org/
package-manager:
  apk: mbedtls
  brew: mbedtls
  dnf: mbedtls
  macports: mbedtls
  nix: mbedtls
  pacman: mbedtls
package-manager-url: https://formulae.brew.sh/formula/mbedtls
version: 4.1.0
license: Apache-2.0
category: security
tags:
  - cli
description: Cryptographic & SSL/TLS library
source-archive: >
  https://github.com/Mbed-TLS/mbedtls/releases/download/mbedtls-4.1.0/mbedtls-4.1.0.tar.bz2
build-dependencies:
