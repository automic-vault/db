bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mbedtls
  av: sudo av install brew:mbedtls
  brew: brew install mbedtls
  dnf: sudo dnf install mbedtls
  macports: sudo port install mbedtls
  nix: nix profile install nixpkgs#mbedtls
  pacman: sudo pacman -S mbedtls
provenance:
  formula: mbedtls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
