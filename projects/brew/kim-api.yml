id: brew:kim-api
display-name: kim-api
homepage: https://openkim.org
repo: https://s3.openkim.org/kim-api/kim-api-2.4.2.txz
docs: https://openkim.org
package-manager:
  brew: kim-api
  zypper: kim-api
package-manager-url: https://formulae.brew.sh/formula/kim-api
version: 2.4.2
license: CDDL-1.0
category: network
tags:
  - cli
description: Knowledgebase of Interatomic Models (KIM) API
source-archive: https://s3.openkim.org/kim-api/kim-api-2.4.2.txz
dependencies:
  - gcc
build-dependencies:
  - cmake
  - doxygen
uses-from-macos:
  - xz
executables:
  - exposure: global executable
    kind: cli
    name: kim-api-activate
  - exposure: global executable
    kind: cli
    name: kim-api-collections-management
  - exposure: global executable
    kind: cli
    name: kim-api-deactivate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kim-api
  brew: brew install kim-api
  zypper: sudo zypper install kim-api
provenance:
  formula: kim-api
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
