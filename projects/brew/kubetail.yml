id: brew:kubetail
display-name: kubetail
homepage: https://www.kubetail.com/
repo: https://github.com/kubetail-org/kubetail
docs: https://www.kubetail.com/
package-manager:
  apk: kubetail
  brew: kubetail
  debian: kubetail
  macports: kubetail
  nix: kubetail
  scoop: main/kubetail
  ubuntu: kubetail
  winget: Kubetail.Kubetail
package-manager-url: https://formulae.brew.sh/formula/kubetail
version: 0.17.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Logging tool for Kubernetes with a real-time web dashboard
source-archive: https://github.com/kubetail-org/kubetail/archive/refs/tags/cli/v0.17.0.tar.gz
build-dependencies:
  - go
  - node
  - pnpm
executables:
  - exposure: global executable
    kind: cli
    name: kubetail
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kubetail
  av: sudo av install brew:kubetail
  brew: brew install kubetail
  debian: sudo apt install kubetail
  macports: sudo port install kubetail
  nix: nix profile install nixpkgs#kubetail
  scoop: scoop install main/kubetail
  ubuntu: sudo apt install kubetail
  winget: winget install --id Kubetail.Kubetail -e
provenance:
  formula: kubetail
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
