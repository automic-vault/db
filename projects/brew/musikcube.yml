id: brew:musikcube
display-name: musikcube
homepage: https://musikcube.com
repo: https://github.com/clangen/musikcube
docs: https://musikcube.com
package-manager:
  apk: musikcube
  brew: musikcube
  macports: musikcube
  nix: musikcube
  scoop: extras/musikcube
package-manager-url: https://formulae.brew.sh/formula/musikcube
version: 3.0.5
license: >
  BSD-3-Clause AND GPL-2.0-or-later AND LGPL-2.1-or-later AND BSL-1.0 AND MIT AND Zlib
  AND bcrypt-Solar-Designer AND blessing
category: development
tags:
  - cli
description: Terminal-based audio engine, library, player and server
source-archive: https://github.com/clangen/musikcube/archive/refs/tags/3.0.5.tar.gz
dependencies:
  - ffmpeg
  - game-music-emu
  - gnutls
  - lame
  - libev
  - libmicrohttpd
  - libopenmpt
  - mpg123
  - ncurses
  - openssl@3
  - portaudio
  - taglib
build-dependencies:
  - asio
  - cmake
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: musikcube
  - exposure: global executable
    kind: cli
    name: musikcubed
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add musikcube
  av: sudo av install brew:musikcube
  brew: brew install musikcube
  macports: sudo port install musikcube
  nix: nix profile install nixpkgs#musikcube
  scoop: scoop install extras/musikcube
provenance:
  formula: musikcube
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
