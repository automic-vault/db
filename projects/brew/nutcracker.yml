id: brew:nutcracker
display-name: nutcracker
homepage: https://github.com/twitter/twemproxy
repo: https://github.com/twitter/twemproxy
docs: https://github.com/twitter/twemproxy
package-manager:
  brew: nutcracker
  debian: nutcracker
  ubuntu: nutcracker
package-manager-url: https://formulae.brew.sh/formula/nutcracker
version: 0.5.0
license: Apache-2.0
category: database
tags:
  - cli
description: Proxy for memcached and redis
source-archive: https://github.com/twitter/twemproxy/archive/refs/tags/0.5.0.tar.gz
dependencies:
  - libyaml
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: nutcracker
  - exposure: global executable
    kind: cli
    name: test_all
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nutcracker
  brew: brew install nutcracker
  debian: sudo apt install nutcracker
  ubuntu: sudo apt install nutcracker
provenance:
  formula: nutcracker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
