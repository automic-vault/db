id: brew:psql2csv
display-name: psql2csv
homepage: https://github.com/fphilipe/psql2csv
repo: https://github.com/fphilipe/psql2csv
docs: https://github.com/fphilipe/psql2csv
package-manager:
  brew: psql2csv
  nix: psql2csv
package-manager-url: https://formulae.brew.sh/formula/psql2csv
version: 0.12
license: MIT
category: database
tags:
  - cli
description: Run a query in psql and output the result as CSV
source-archive: https://github.com/fphilipe/psql2csv/archive/refs/tags/v0.12.tar.gz
dependencies:
  - libpq
executables:
  - exposure: global executable
    kind: cli
    name: psql2csv
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:psql2csv
  brew: brew install psql2csv
  nix: nix profile install nixpkgs#psql2csv
provenance:
  formula: psql2csv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
