id: brew:kyua
display-name: kyua
homepage: https://github.com/freebsd/kyua
repo: https://github.com/freebsd/kyua
docs: https://github.com/freebsd/kyua
package-manager:
  apk: kyua
  brew: kyua
  debian: kyua
  dnf: kyua
  macports: kyua
  nix: kyua
  ubuntu: kyua
package-manager-url: https://formulae.brew.sh/formula/kyua
version: 0.14.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Testing framework for infrastructure software
source-archive: https://github.com/freebsd/kyua/releases/download/kyua-0.14.1/kyua-0.14.1.tar.gz
dependencies:
  - atf
  - lua
  - lutok
build-dependencies:
  - pkgconf
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: kyua
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kyua
  av: sudo av install brew:kyua
  brew: brew install kyua
  debian: sudo apt install kyua
  dnf: sudo dnf install kyua
  macports: sudo port install kyua
  nix: nix profile install nixpkgs#kyua
  ubuntu: sudo apt install kyua
provenance:
  formula: kyua
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
