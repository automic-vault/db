id: brew:qcli
display-name: qcli
homepage: https://bavc.org/preserve-media/preservation-tools
repo: https://github.com/bavc/qctools
docs: https://bavc.org/preserve-media/preservation-tools
package-manager:
  brew: qcli
package-manager-url: https://formulae.brew.sh/formula/qcli
version: 1.4
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Report audiovisual metrics via libavfilter
source-archive: https://github.com/bavc/qctools.git
dependencies:
  - ffmpeg@6
  - qtbase
build-dependencies:
  - pkgconf
  - qtmultimedia
  - qwt
executables:
  - exposure: global executable
    kind: cli
    name: qcli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qcli
  brew: brew install qcli
provenance:
  formula: qcli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
