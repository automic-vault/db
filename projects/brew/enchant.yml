id: brew:enchant
display-name: enchant
homepage: https://rrthomas.github.io/enchant/
repo: https://github.com/rrthomas/enchant
docs: https://rrthomas.github.io/enchant/
package-manager:
  brew: enchant
  debian: enchant-2
  dnf: enchant
  macports: enchant
  nix: enchant
  pacman: enchant
  ubuntu: enchant-2
package-manager-url: https://formulae.brew.sh/formula/enchant
version: 2.8.16
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Spellchecker wrapping library
source-archive: https://github.com/rrthomas/enchant/releases/download/v2.8.16/enchant-2.8.16.tar.gz
dependencies:
  - aspell
  - gettext
  - glib
build-dependencies:
  - groff
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: enchant-2
  - exposure: global executable
    kind: cli
    name: enchant-lsmod-2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:enchant
  brew: brew install enchant
  debian: sudo apt install enchant-2
  dnf: sudo dnf install enchant
  macports: sudo port install enchant
  nix: nix profile install nixpkgs#enchant
  pacman: sudo pacman -S enchant
  ubuntu: sudo apt install enchant-2
provenance:
  formula: enchant
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
