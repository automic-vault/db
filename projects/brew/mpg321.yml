id: brew:mpg321
display-name: mpg321
homepage: https://mpg321.sourceforge.net/
repo: https://downloads.sourceforge.net/project/mpg321/mpg321/0.3.2/mpg321_0.3.2.orig.tar.gz
docs: https://mpg321.sourceforge.net/
package-manager:
  brew: mpg321
  debian: mpg321
  ubuntu: mpg321
package-manager-url: https://formulae.brew.sh/formula/mpg321
version: 0.3.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Command-line MP3 player
source-archive: https://downloads.sourceforge.net/project/mpg321/mpg321/0.3.2/mpg321_0.3.2.orig.tar.gz
dependencies:
  - libao
  - libid3tag
  - mad
executables:
  - exposure: global executable
    kind: cli
    name: mpg321
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mpg321
  brew: brew install mpg321
  debian: sudo apt install mpg321
  ubuntu: sudo apt install mpg321
provenance:
  formula: mpg321
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
