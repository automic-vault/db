id: brew:pyoxidizer
display-name: pyoxidizer
homepage: https://github.com/indygreg/PyOxidizer
repo: https://github.com/indygreg/PyOxidizer
docs: https://github.com/indygreg/PyOxidizer
package-manager:
  brew: pyoxidizer
  scoop: main/pyoxidizer
package-manager-url: https://formulae.brew.sh/formula/pyoxidizer
version: 0.24.0
license: MPL-2.0
category: development
tags:
