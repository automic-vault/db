id: brew:git-credential-oauth
display-name: git-credential-oauth
homepage: https://github.com/hickford/git-credential-oauth
repo: https://github.com/hickford/git-credential-oauth
docs: https://github.com/hickford/git-credential-oauth
package-manager:
  apk: git-credential-oauth
  brew: git-credential-oauth
  debian: git-credential-oauth
  dnf: git-credential-oauth
  macports: git-credential-oauth
  nix: git-credential-oauth
  pacman: git-credential-oauth
  scoop: main/git-credential-oauth
  ubuntu: git-credential-oauth
  winget: hickford.git-credential-oauth
  zypper: git-credential-oauth
package-manager-url: https://formulae.brew.sh/formula/git-credential-oauth
version: 0.17.2
license: Apache-2.0
category: development
tags:
  - cli
  - git
description: Git credential helper that authenticates in browser using OAuth
source-archive: https://github.com/hickford/git-credential-oauth/archive/refs/tags/v0.17.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-credential-oauth
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-credential-oauth
  av: sudo av install brew:git-credential-oauth
  brew: brew install git-credential-oauth
  debian: sudo apt install git-credential-oauth
  dnf: sudo dnf install git-credential-oauth
  macports: sudo port install git-credential-oauth
  nix: nix profile install nixpkgs#git-credential-oauth
  pacman: sudo pacman -S git-credential-oauth
  scoop: scoop install main/git-credential-oauth
  ubuntu: sudo apt install git-credential-oauth
  winget: winget install --id hickford.git-credential-oauth -e
  zypper: sudo zypper install git-credential-oauth
provenance:
  formula: git-credential-oauth
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
