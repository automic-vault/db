id: brew:fetchmail
display-name: fetchmail
homepage: https://www.fetchmail.info/
repo: https://downloads.sourceforge.net/project/fetchmail/branch_6.6/fetchmail-6.6.4.tar.xz
docs: https://www.fetchmail.info/
package-manager:
  apk: fetchmail
  brew: fetchmail
  debian: fetchmail
  dnf: fetchmail
  macports: fetchmail
  nix: fetchmail
  pacman: fetchmail
  ubuntu: fetchmail
  zypper: fetchmail
package-manager-url: https://formulae.brew.sh/formula/fetchmail
version: 6.6.4
license: >
  LGPL-2.1-or-later AND ISC AND BSD-3-Clause AND LicenseRef-Homebrew-public-domain AND
  (GPL-2.0-or-later WITH openvpn-openssl-exception)
category: network
tags:
  - cli
description: Client for fetching mail from POP, IMAP, ETRN or ODMR-capable servers
source-archive: https://downloads.sourceforge.net/project/fetchmail/branch_6.6/fetchmail-6.6.4.tar.xz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fetchmail
  - exposure: global executable
    kind: cli
    name: fetchmailconf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fetchmail
  av: sudo av install brew:fetchmail
  brew: brew install fetchmail
  debian: sudo apt install fetchmail
  dnf: sudo dnf install fetchmail
  macports: sudo port install fetchmail
  nix: nix profile install nixpkgs#fetchmail
  pacman: sudo pacman -S fetchmail
  ubuntu: sudo apt install fetchmail
  zypper: sudo zypper install fetchmail
provenance:
  formula: fetchmail
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
