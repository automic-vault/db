id: brew:yazi
display-name: yazi
homepage: https://github.com/sxyazi/yazi
repo: https://github.com/sxyazi/yazi
docs: https://github.com/sxyazi/yazi
package-manager:
  apk: yazi
  brew: yazi
  macports: yazi
  nix: yazi
  pacman: yazi
  scoop: main/yazi
  winget: sxyazi.yazi
  zypper: yazi
package-manager-url: https://formulae.brew.sh/formula/yazi
version: 26.5.6
license: MIT
category: development
tags:
  - cli
description: Blazing fast terminal file manager written in Rust, based on async I/O
source-archive: https://github.com/sxyazi/yazi/archive/refs/tags/v26.5.6.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ya
  - exposure: global executable
    kind: cli
    name: yazi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yazi
  av: sudo av install brew:yazi
  brew: brew install yazi
  macports: sudo port install yazi
  nix: nix profile install nixpkgs#yazi
  pacman: sudo pacman -S yazi
  scoop: scoop install main/yazi
  winget: winget install --id sxyazi.yazi -e
  zypper: sudo zypper install yazi
provenance:
  formula: yazi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
