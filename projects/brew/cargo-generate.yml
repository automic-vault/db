id: brew:cargo-generate
display-name: cargo-generate
homepage: https://github.com/cargo-generate/cargo-generate
repo: https://github.com/cargo-generate/cargo-generate
docs: https://github.com/cargo-generate/cargo-generate
package-manager:
  apk: cargo-generate
  brew: cargo-generate
  macports: cargo-generate
  nix: cargo-generate
  pacman: cargo-generate
package-manager-url: https://formulae.brew.sh/formula/cargo-generate
version: 0.23.10
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
  - git
description: Use pre-existing git repositories as templates
source-archive: https://github.com/cargo-generate/cargo-generate/archive/refs/tags/v0.23.10.tar.gz
dependencies:
  - libgit2
  - libssh2
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-generate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-generate
  av: sudo av install brew:cargo-generate
  brew: brew install cargo-generate
  macports: sudo port install cargo-generate
  nix: nix profile install nixpkgs#cargo-generate
  pacman: sudo pacman -S cargo-generate
provenance:
  formula: cargo-generate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
