id: brew:p11-kit
display-name: p11-kit
homepage: https://p11-glue.github.io/p11-glue/p11-kit.html
repo: https://github.com/p11-glue/p11-kit
docs: https://p11-glue.github.io/p11-glue/p11-kit.html
package-manager:
  apk: p11-kit
  brew: p11-kit
  debian: p11-kit
  dnf: p11-kit
  macports: p11-kit
  nix: p11-kit
  pacman: p11-kit
  ubuntu: p11-kit
  zypper: p11-kit
package-manager-url: https://formulae.brew.sh/formula/p11-kit
version: 0.26.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Library to load and enumerate PKCS#11 modules
source-archive: https://github.com/p11-glue/p11-kit/releases/download/0.26.2/p11-kit-0.26.2.tar.xz
dependencies:
  - ca-certificates
  - libtasn1
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: p11-kit
  - exposure: global executable
    kind: cli
    name: trust
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add p11-kit
  av: sudo av install brew:p11-kit
  brew: brew install p11-kit
  debian: sudo apt install p11-kit
  dnf: sudo dnf install p11-kit
  macports: sudo port install p11-kit
  nix: nix profile install nixpkgs#p11-kit
  pacman: sudo pacman -S p11-kit
  ubuntu: sudo apt install p11-kit
  zypper: sudo zypper install p11-kit
provenance:
  formula: p11-kit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
