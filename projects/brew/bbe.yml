id: brew:bbe
display-name: bbe
homepage: https://sourceforge.net/projects/bbe-/
repo: https://downloads.sourceforge.net/project/bbe-/bbe/0.2.2/bbe-0.2.2.tar.gz
docs: https://sourceforge.net/projects/bbe-/
package-manager:
  brew: bbe
  debian: bbe
  macports: bbe
  nix: bbe
  ubuntu: bbe
  zypper: bbe
package-manager-url: https://formulae.brew.sh/formula/bbe
version: 0.2.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Sed-like editor for binary files
source-archive: https://downloads.sourceforge.net/project/bbe-/bbe/0.2.2/bbe-0.2.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bbe
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bbe
  brew: brew install bbe
  debian: sudo apt install bbe
  macports: sudo port install bbe
  nix: nix profile install nixpkgs#bbe
  ubuntu: sudo apt install bbe
  zypper: sudo zypper install bbe
provenance:
  formula: bbe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
