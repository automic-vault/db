id: brew:redshift
display-name: redshift
homepage: https://github.com/jonls/redshift
repo: https://github.com/jonls/redshift
docs: https://github.com/jonls/redshift
package-manager:
  apk: redshift
  brew: redshift
  debian: redshift
  dnf: redshift
  pacman: redshift
  scoop: main/redshift
  ubuntu: redshift
  zypper: redshift
package-manager-url: https://formulae.brew.sh/formula/redshift
version: 1.12
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Adjust color temperature of your screen according to your surroundings
source-archive: https://github.com/jonls/redshift/releases/download/v1.12/redshift-1.12.tar.xz
dependencies:
  - gettext
  - glib
build-dependencies:
  - gettext
  - intltool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: redshift
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    A sample .conf file has been installed to
    $HOMEBREW_PREFIX/opt/redshift/share/redshift. Please note redshift expects to read
    its configuration file from /$HOME/.config/redshift/redshift.conf
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add redshift
  av: sudo av install brew:redshift
  brew: brew install redshift
  debian: sudo apt install redshift
  dnf: sudo dnf install redshift
  pacman: sudo pacman -S redshift
  scoop: scoop install main/redshift
  ubuntu: sudo apt install redshift
  zypper: sudo zypper install redshift
provenance:
  formula: redshift
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
