id: brew:flye
display-name: flye
homepage: https://github.com/mikolmogorov/Flye
repo: https://github.com/mikolmogorov/Flye
docs: https://github.com/mikolmogorov/Flye
package-manager:
  brew: flye
  debian: flye
  nix: flye
  ubuntu: flye
package-manager-url: https://formulae.brew.sh/formula/flye
version: 2.9.6
license: BSD-3-Clause AND Apache-2.0 AND BSL-1.0 AND CC-BY-3.0 AND MIT
category: development
tags:
  - cli
description: De novo assembler for single molecule sequencing reads using repeat graphs
source-archive: https://github.com/mikolmogorov/Flye/archive/refs/tags/2.9.6.tar.gz
dependencies:
  - python@3.14
  - samtools
executables:
  - exposure: global executable
    kind: cli
    name: flye
  - exposure: global executable
    kind: cli
    name: flye-minimap2
  - exposure: global executable
    kind: cli
    name: flye-modules
  - exposure: global executable
    kind: cli
    name: flye-samtools
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flye
  brew: brew install flye
  debian: sudo apt install flye
  nix: nix profile install nixpkgs#flye
  ubuntu: sudo apt install flye
provenance:
  formula: flye
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
