id: brew:dnote
display-name: dnote
homepage: https://www.getdnote.com
repo: https://github.com/dnote/dnote
docs: https://www.getdnote.com
package-manager:
  apk: dnote
  brew: dnote
  nix: dnote
package-manager-url: https://formulae.brew.sh/formula/dnote
version: 0.16.0
license: Apache-2.0
category: development
tags:
  - cli
description: Simple command-line notebook
source-archive: https://github.com/dnote/dnote/archive/refs/tags/cli-v0.16.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dnote
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dnote
  av: sudo av install brew:dnote
  brew: brew install dnote
  nix: nix profile install nixpkgs#dnote
provenance:
  formula: dnote
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
