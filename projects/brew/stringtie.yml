id: brew:stringtie
display-name: stringtie
homepage: https://github.com/gpertea/stringtie
repo: https://github.com/gpertea/stringtie
docs: https://github.com/gpertea/stringtie
package-manager:
  brew: stringtie
  debian: stringtie
  ubuntu: stringtie
package-manager-url: https://formulae.brew.sh/formula/stringtie
version: 3.0.3
license: MIT
category: development
tags:
  - cli
description: Transcript assembly and quantification for RNA-Seq
source-archive: https://github.com/gpertea/stringtie/archive/refs/tags/v3.0.3.tar.gz
dependencies:
  - htslib
executables:
  - exposure: global executable
    kind: cli
    name: stringtie
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stringtie
  brew: brew install stringtie
  debian: sudo apt install stringtie
  ubuntu: sudo apt install stringtie
provenance:
  formula: stringtie
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
