id: brew:vile
display-name: vile
homepage: https://invisible-island.net/vile/
repo: https://invisible-island.net/archives/vile/current/vile-9.8zb.tgz
docs: https://invisible-island.net/vile/
package-manager:
  apk: vile
  brew: vile
  debian: vile
  dnf: vile
  macports: vile
