id: brew:git-bug
display-name: git-bug
homepage: https://github.com/git-bug/git-bug
repo: https://github.com/git-bug/git-bug
docs: https://github.com/git-bug/git-bug
package-manager:
  apk: git-bug
  brew: git-bug
  nix: git-bug
  pacman: git-bug
  scoop: main/git-bug
  zypper: git-bug
package-manager-url: https://formulae.brew.sh/formula/git-bug
version: 0.10.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
  - git
description: Distributed, offline-first bug tracker embedded in git, with bridges
source-archive: https://github.com/git-bug/git-bug/archive/refs/tags/v0.10.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-bug
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-bug
  av: sudo av install brew:git-bug
  brew: brew install git-bug
  nix: nix profile install nixpkgs#git-bug
  pacman: sudo pacman -S git-bug
  scoop: scoop install main/git-bug
  zypper: sudo zypper install git-bug
provenance:
  formula: git-bug
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
