id: brew:ncview
display-name: ncview
homepage: https://cirrus.ucsd.edu/ncview/
repo: https://cirrus.ucsd.edu/~pierce/ncview/ncview-2.1.11.tar.gz
docs: https://cirrus.ucsd.edu/ncview/
package-manager:
  brew: ncview
  debian: ncview
  dnf: ncview
  macports: ncview
  nix: ncview
  ubuntu: ncview
package-manager-url: https://formulae.brew.sh/formula/ncview
version: 2.1.11
license: GPL-3.0-only
category: development
tags:
  - cli
description: Visual browser for netCDF format files
source-archive: https://cirrus.ucsd.edu/~pierce/ncview/ncview-2.1.11.tar.gz
dependencies:
  - libice
  - libpng
  - libsm
  - libx11
  - libxaw
  - libxt
  - netcdf
  - udunits
executables:
  - exposure: global executable
    kind: cli
    name: ncview
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ncview
  brew: brew install ncview
  debian: sudo apt install ncview
  dnf: sudo dnf install ncview
  macports: sudo port install ncview
  nix: nix profile install nixpkgs#ncview
  ubuntu: sudo apt install ncview
provenance:
  formula: ncview
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
