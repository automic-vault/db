id: brew:oxen
display-name: oxen
homepage: https://www.oxen.ai/
repo: https://github.com/Oxen-AI/Oxen
docs: https://www.oxen.ai/
package-manager:
  brew: oxen
package-manager-url: https://formulae.brew.sh/formula/oxen
version: 0.50.0
license: Apache-2.0
category: development
tags:
  - cli
description: Data VCS for structured and unstructured machine learning datasets
source-archive: https://github.com/Oxen-AI/Oxen/archive/refs/tags/v0.50.0.tar.gz
dependencies:
  - rocksdb
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: oxen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oxen
  brew: brew install oxen
provenance:
  formula: oxen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
