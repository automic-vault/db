id: brew:xidel
display-name: xidel
homepage: https://www.videlibri.de/xidel.html
repo: https://github.com/benibela/xidel
docs: https://www.videlibri.de/xidel.html
package-manager:
  brew: xidel
  chocolatey: xidel
  nix: xidel
  scoop: main/xidel
package-manager-url: https://formulae.brew.sh/formula/xidel
version: 0.9.8
license: GPL-3.0-or-later
category: development
tags:
  - cli
  - json
description: XPath/XQuery 3.0, JSONiq interpreter to extract data from HTML/XML/JSON
source-archive: https://github.com/benibela/xidel/releases/download/Xidel_0.9.8/xidel-0.9.8.src.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - fpc
executables:
  - exposure: global executable
    kind: cli
    name: xidel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xidel
  brew: brew install xidel
  chocolatey: choco install xidel
  nix: nix profile install nixpkgs#xidel
  scoop: scoop install main/xidel
provenance:
  formula: xidel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
