id: brew:hopenpgp-tools
display-name: hopenpgp-tools
homepage: https://hackage.haskell.org/package/hopenpgp-tools
repo: https://hackage.haskell.org/package/hopenpgp-tools-0.23.11/hopenpgp-tools-0.23.11.tar.gz
docs: https://hackage.haskell.org/package/hopenpgp-tools
package-manager:
  brew: hopenpgp-tools
  debian: hopenpgp-tools
  pacman: hopenpgp-tools
  ubuntu: hopenpgp-tools
package-manager-url: https://formulae.brew.sh/formula/hopenpgp-tools
version: 0.23.11
license: AGPL-3.0-or-later
category: network
tags:
  - cli
description: Command-line tools for OpenPGP-related operations
source-archive: https://hackage.haskell.org/package/hopenpgp-tools-0.23.11/hopenpgp-tools-0.23.11.tar.gz
dependencies:
  - gmp
  - nettle@3
build-dependencies:
  - cabal-install
  - ghc
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: hkt
  - exposure: global executable
    kind: cli
    name: hokey
  - exposure: global executable
    kind: cli
    name: hop
  - exposure: global executable
    kind: cli
    name: hot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hopenpgp-tools
  brew: brew install hopenpgp-tools
  debian: sudo apt install hopenpgp-tools
  pacman: sudo pacman -S hopenpgp-tools
  ubuntu: sudo apt install hopenpgp-tools
provenance:
  formula: hopenpgp-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
