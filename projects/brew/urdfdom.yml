id: brew:urdfdom
display-name: urdfdom
homepage: https://wiki.ros.org/urdf/
repo: https://github.com/ros/urdfdom
docs: https://wiki.ros.org/urdf/
package-manager:
  brew: urdfdom
  nix: urdfdom
package-manager-url: https://formulae.brew.sh/formula/urdfdom
version: 6.0.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Unified Robot Description Format (URDF) parser
source-archive: https://github.com/ros/urdfdom/archive/refs/tags/6.0.0.tar.gz
dependencies:
  - console_bridge
  - tinyxml2
  - urdfdom_headers
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: check_urdf
  - exposure: global executable
    kind: cli
    name: urdf_mem_test
  - exposure: global executable
    kind: cli
    name: urdf_to_graphviz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:urdfdom
  brew: brew install urdfdom
  nix: nix profile install nixpkgs#urdfdom
provenance:
  formula: urdfdom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
