id: brew:mongodb-atlas-cli
display-name: mongodb-atlas-cli
homepage: https://www.mongodb.com/docs/atlas/cli/stable/
repo: https://github.com/mongodb/mongodb-atlas-cli
docs: https://www.mongodb.com/docs/atlas/cli/stable/
package-manager:
  brew: mongodb-atlas-cli
  dnf: atlas
  macports: atlas
  nix: mongodb-atlas-cli
  scoop: main/mongodb-atlas-cli
  winget: MongoDB.MongoDBAtlasCLI
package-manager-url: https://formulae.brew.sh/formula/mongodb-atlas-cli
version: 1.55.0
license: Apache-2.0
category: database
tags:
  - cli
description: Atlas CLI enables you to manage your MongoDB Atlas
source-archive: https://github.com/mongodb/mongodb-atlas-cli/archive/refs/tags/atlascli/v1.55.0.tar.gz
dependencies:
  - mongosh
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: atlas
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mongodb-atlas-cli
  brew: brew install mongodb-atlas-cli
  dnf: sudo dnf install atlas
  macports: sudo port install atlas
  nix: nix profile install nixpkgs#mongodb-atlas-cli
  scoop: scoop install main/mongodb-atlas-cli
  winget: winget install --id MongoDB.MongoDBAtlasCLI -e
provenance:
  formula: mongodb-atlas-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
