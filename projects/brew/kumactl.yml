id: brew:kumactl
display-name: kumactl
homepage: https://kuma.io/
repo: https://github.com/kumahq/kuma
docs: https://kuma.io/
package-manager:
  apk: kumactl
  brew: kumactl
  nix: kumactl
  zypper: kumactl
package-manager-url: https://formulae.brew.sh/formula/kumactl
version: 2.13.6
license: Apache-2.0
category: development
tags:
  - cli
description: Kuma control plane command-line utility
source-archive: https://github.com/kumahq/kuma/archive/refs/tags/v2.13.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kumactl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kumactl
  av: sudo av install brew:kumactl
  brew: brew install kumactl
  nix: nix profile install nixpkgs#kumactl
  zypper: sudo zypper install kumactl
provenance:
  formula: kumactl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
