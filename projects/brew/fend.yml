id: brew:fend
display-name: fend
homepage: https://printfn.github.io/fend
repo: https://github.com/printfn/fend
docs: https://printfn.github.io/fend
package-manager:
  brew: fend
  macports: fend
  nix: fend
  scoop: main/fend
  winget: printfn.fend
package-manager-url: https://formulae.brew.sh/formula/fend
version: 1.5.8
license: MIT
category: development
tags:
  - cli
description: Arbitrary-precision unit-aware calculator
source-archive: https://github.com/printfn/fend/archive/refs/tags/v1.5.8.tar.gz
build-dependencies:
  - pandoc
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fend
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fend
  brew: brew install fend
  macports: sudo port install fend
  nix: nix profile install nixpkgs#fend
  scoop: scoop install main/fend
  winget: winget install --id printfn.fend -e
provenance:
  formula: fend
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
