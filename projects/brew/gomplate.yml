id: brew:gomplate
display-name: gomplate
homepage: https://gomplate.ca/
repo: https://github.com/hairyhenderson/gomplate
docs: https://gomplate.ca/
package-manager:
  apk: gomplate
  brew: gomplate
  macports: gomplate
  nix: gomplate
  scoop: main/gomplate
package-manager-url: https://formulae.brew.sh/formula/gomplate
version: 5.1.0
license: MIT
category: development
tags:
  - cli
description: Command-line Golang template processor
source-archive: https://github.com/hairyhenderson/gomplate/archive/refs/tags/v5.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gomplate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gomplate
  av: sudo av install brew:gomplate
  brew: brew install gomplate
  macports: sudo port install gomplate
  nix: nix profile install nixpkgs#gomplate
  scoop: scoop install main/gomplate
provenance:
  formula: gomplate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
