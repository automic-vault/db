id: brew:ingress2gateway
display-name: ingress2gateway
homepage: https://github.com/kubernetes-sigs/ingress2gateway
repo: https://github.com/kubernetes-sigs/ingress2gateway
docs: https://github.com/kubernetes-sigs/ingress2gateway
package-manager:
  brew: ingress2gateway
  nix: ingress2gateway
  winget: Kubernetes.ingress2gateway
  zypper: ingress2gateway
package-manager-url: https://formulae.brew.sh/formula/ingress2gateway
version: 1.1.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Convert Kubernetes Ingress resources to Kubernetes Gateway API resources
source-archive: https://github.com/kubernetes-sigs/ingress2gateway/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ingress2gateway
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ingress2gateway
  brew: brew install ingress2gateway
  nix: nix profile install nixpkgs#ingress2gateway
  winget: winget install --id Kubernetes.ingress2gateway -e
  zypper: sudo zypper install ingress2gateway
provenance:
  formula: ingress2gateway
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
