id: brew:fresh-editor
display-name: fresh-editor
homepage: https://sinelaw.github.io/fresh/
repo: https://github.com/sinelaw/fresh
docs: https://sinelaw.github.io/fresh/
package-manager:
  brew: fresh-editor
  nix: fresh-editor
  scoop: main/fresh
  winget: sinelaw.fresh-editor
  zypper: fresh-editor
package-manager-url: https://formulae.brew.sh/formula/fresh-editor
version: 0.3.9
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: 'Text editor for your terminal: easy, powerful and fast'
source-archive: https://github.com/sinelaw/fresh/archive/refs/tags/v0.3.9.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fresh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fresh-editor
  brew: brew install fresh-editor
  nix: nix profile install nixpkgs#fresh-editor
  scoop: scoop install main/fresh
  winget: winget install --id sinelaw.fresh-editor -e
  zypper: sudo zypper install fresh-editor
provenance:
  formula: fresh-editor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
