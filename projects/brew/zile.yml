id: brew:zile
display-name: zile
homepage: https://www.gnu.org/software/zile/
repo: https://ftpmirror.gnu.org/gnu/zile/zile-2.6.4.tar.gz
docs: https://www.gnu.org/software/zile/
package-manager:
  apk: zile
  brew: zile
  debian: zile
  dnf: zile
  macports: zile
  nix: zile
  ubuntu: zile
  zypper: zile
package-manager-url: https://formulae.brew.sh/formula/zile
version: 2.6.4
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Text editor development kit
source-archive: https://ftpmirror.gnu.org/gnu/zile/zile-2.6.4.tar.gz
dependencies:
  - bdw-gc
  - gettext
  - glib
  - libgee
build-dependencies:
  - help2man
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: zile
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zile
  av: sudo av install brew:zile
  brew: brew install zile
  debian: sudo apt install zile
  dnf: sudo dnf install zile
  macports: sudo port install zile
  nix: nix profile install nixpkgs#zile
  ubuntu: sudo apt install zile
  zypper: sudo zypper install zile
provenance:
  formula: zile
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
