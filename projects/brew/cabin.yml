id: brew:cabin
display-name: cabin
homepage: https://github.com/cabinpkg/cabin
repo: https://github.com/cabinpkg/cabin
docs: https://github.com/cabinpkg/cabin
package-manager:
  brew: cabin
  nix: cabin
package-manager-url: https://formulae.brew.sh/formula/cabin
version: 0.13.0
license: Apache-2.0
category: development
tags:
  - cli
description: Package manager and build system for C++
source-archive: https://github.com/cabinpkg/cabin/archive/refs/tags/0.13.0.tar.gz
dependencies:
  - fmt
  - libgit2
  - pkgconf
  - spdlog
  - tbb
build-dependencies:
  - mitama-cpp-result
  - nlohmann-json
  - pkgconf
  - toml11
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: cabin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cabin
  brew: brew install cabin
  nix: nix profile install nixpkgs#cabin
provenance:
  formula: cabin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
