id: brew:monika
display-name: monika
homepage: https://monika.hyperjump.tech
repo: https://registry.npmjs.org/@hyperjumptech/monika/-/monika-1.22.0.tgz
docs: https://monika.hyperjump.tech
package-manager:
  brew: monika
package-manager-url: https://formulae.brew.sh/formula/monika
version: 1.22.0
