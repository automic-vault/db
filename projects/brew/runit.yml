id: brew:runit
display-name: runit
homepage: https://smarden.org/runit/
repo: https://smarden.org/runit/runit-2.3.1.tar.gz
docs: https://smarden.org/runit/
package-manager:
  apk: runit
  brew: runit
  debian: runit
  macports: runit
  nix: runit
  ubuntu: runit
package-manager-url: https://formulae.brew.sh/formula/runit
version: 2.3.1
license: BSD-3-Clause
category: network
tags:
  - cli
description: Collection of tools for managing UNIX services
source-archive: https://smarden.org/runit/runit-2.3.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: chpst
  - exposure: global executable
    kind: cli
    name: runit
  - exposure: global executable
    kind: cli
    name: runit-init
  - exposure: global executable
    kind: cli
    name: runsv
  - exposure: global executable
    kind: cli
    name: runsvchdir
  - exposure: global executable
    kind: cli
    name: runsvdir
  - exposure: global executable
    kind: cli
    name: svlogd
  - exposure: global executable
    kind: cli
    name: utmpset
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This formula does not install runit as a replacement for init. The service directory
    is $HOMEBREW_PREFIX/var/service instead of /service. A system service that runs
    runsvdir with the default service directory is provided. Alternatively you can run
    runsvdir manually: runsvdir -P $HOMEBREW_PREFIX/var/service Depending on the
    services managed by runit, this may need to start as root.
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add runit
  av: sudo av install brew:runit
  brew: brew install runit
  debian: sudo apt install runit
  macports: sudo port install runit
  nix: nix profile install nixpkgs#runit
  ubuntu: sudo apt install runit
provenance:
  formula: runit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
