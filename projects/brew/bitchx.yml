id: brew:bitchx
display-name: bitchx
homepage: https://bitchx.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/bitchx/ircii-pana/bitchx-1.2.1/bitchx-1.2.1.tar.gz
docs: https://bitchx.sourceforge.net/
package-manager:
  brew: bitchx
  macports: bitchx
package-manager-url: https://formulae.brew.sh/formula/bitchx
version: 1.2.1
license: BSD-3-Clause
category: network
tags:
  - cli
description: Text-based, scriptable IRC client
source-archive: >
  https://downloads.sourceforge.net/project/bitchx/ircii-pana/bitchx-1.2.1/bitchx-1.2.1.tar.gz
dependencies:
  - openssl@4
uses-from-macos:
  - libxcrypt
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: BitchX
  - exposure: global executable
    kind: cli
    name: BitchX-1.2.1
  - exposure: global executable
    kind: cli
    name: scr-bx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bitchx
  brew: brew install bitchx
  macports: sudo port install bitchx
provenance:
  formula: bitchx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
