id: brew:julia
display-name: julia
homepage: https://julialang.org/
repo: https://github.com/JuliaLang/julia
docs: https://julialang.org/
package-manager:
  brew: julia
  chocolatey: Julia
  dnf: julia
  macports: julia
  nix: julia
  pacman: julia
  scoop: main/julia
  winget: Julialang.Julia
package-manager-url: https://formulae.brew.sh/formula/julia
version: 1.12.6
license: MIT AND BSD-3-Clause AND Apache-2.0 AND BSL-1.0
category: development
tags:
  - cli
description: Fast, Dynamic Programming Language
source-archive: https://github.com/JuliaLang/julia/releases/download/v1.12.6/julia-1.12.6-full.tar.gz
dependencies:
  - ca-certificates
  - curl
  - gcc
  - gmp
  - libblastrampoline
  - libgit2
  - libnghttp2
  - libssh2
  - mpfr
  - openblas64
  - openlibm
  - openssl@3
  - p7zip
  - pcre2
  - suite-sparse
  - utf8proc
  - zstd
build-dependencies:
  - cmake
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: julia
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:julia
  brew: brew install julia
  chocolatey: choco install Julia
  dnf: sudo dnf install julia
  macports: sudo port install julia
  nix: nix profile install nixpkgs#julia
  pacman: sudo pacman -S julia
  scoop: scoop install main/julia
  winget: winget install --id Julialang.Julia -e
provenance:
  formula: julia
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
