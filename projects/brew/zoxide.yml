id: brew:zoxide
display-name: zoxide
homepage: https://github.com/ajeetdsouza/zoxide
repo: https://github.com/ajeetdsouza/zoxide
docs: https://github.com/ajeetdsouza/zoxide
package-manager:
  apk: zoxide
  brew: zoxide
  chocolatey: zoxide
  debian: zoxide
  dnf: zoxide
  macports: zoxide
  nix: zoxide
  pacman: zoxide
  scoop: main/zoxide
  ubuntu: zoxide
  winget: ajeetdsouza.zoxide
  zypper: zoxide
package-manager-url: https://formulae.brew.sh/formula/zoxide
version: 0.9.9
license: MIT
category: development
tags:
  - cli
description: Shell extension to navigate your filesystem faster
source-archive: https://github.com/ajeetdsouza/zoxide/archive/refs/tags/v0.9.9.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: zoxide
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zoxide
  av: sudo av install brew:zoxide
  brew: brew install zoxide
  chocolatey: choco install zoxide
  debian: sudo apt install zoxide
  dnf: sudo dnf install zoxide
  macports: sudo port install zoxide
  nix: nix profile install nixpkgs#zoxide
  pacman: sudo pacman -S zoxide
  scoop: scoop install main/zoxide
  ubuntu: sudo apt install zoxide
  winget: winget install --id ajeetdsouza.zoxide -e
  zypper: sudo zypper install zoxide
provenance:
  formula: zoxide
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
