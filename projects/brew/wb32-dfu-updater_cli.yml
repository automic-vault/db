id: brew:wb32-dfu-updater_cli
display-name: wb32-dfu-updater_cli
homepage: https://github.com/WestberryTech/wb32-dfu-updater
repo: https://github.com/WestberryTech/wb32-dfu-updater
docs: https://github.com/WestberryTech/wb32-dfu-updater
