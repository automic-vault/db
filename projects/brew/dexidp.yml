id: brew:dexidp
display-name: dexidp
homepage: https://dexidp.io
repo: https://github.com/dexidp/dex
docs: https://dexidp.io
package-manager:
  apk: dex
  brew: dexidp
  debian: dex
  nix: dex
  pacman: dex
  ubuntu: dex
  zypper: dex
package-manager-url: https://formulae.brew.sh/formula/dexidp
version: 2.45.1
license: Apache-2.0
category: development
tags:
  - cli
description: OpenID Connect Identity and OAuth 2.0 Provider
source-archive: https://github.com/dexidp/dex/archive/refs/tags/v2.45.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add dex
  av: sudo av install brew:dexidp
  brew: brew install dexidp
  debian: sudo apt install dex
  nix: nix profile install nixpkgs#dex
  pacman: sudo pacman -S dex
  ubuntu: sudo apt install dex
  zypper: sudo zypper install dex
provenance:
  formula: dexidp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
