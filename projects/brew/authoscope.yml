id: brew:authoscope
display-name: authoscope
homepage: https://github.com/kpcyrd/authoscope
repo: https://github.com/kpcyrd/authoscope
docs: https://github.com/kpcyrd/authoscope
package-manager:
  brew: authoscope
  nix: authoscope
  pacman: authoscope
package-manager-url: https://formulae.brew.sh/formula/authoscope
version: 0.8.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Scriptable network authentication cracker
source-archive: https://github.com/kpcyrd/authoscope/archive/refs/tags/v0.8.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: authoscope
  - exposure: global executable
    kind: cli
    name: badtouch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:authoscope
  brew: brew install authoscope
  nix: nix profile install nixpkgs#authoscope
  pacman: sudo pacman -S authoscope
provenance:
  formula: authoscope
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
