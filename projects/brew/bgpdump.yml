id: brew:bgpdump
display-name: bgpdump
homepage: https://github.com/RIPE-NCC/bgpdump/wiki
repo: https://github.com/RIPE-NCC/bgpdump
docs: https://github.com/RIPE-NCC/bgpdump/wiki
package-manager:
  brew: bgpdump
  debian: bgpdump
  dnf: bgpdump
  nix: bgpdump
  ubuntu: bgpdump
package-manager-url: https://formulae.brew.sh/formula/bgpdump
version: 1.6.2
license: GPL-2.0-only
category: development
tags:
  - cli
description: C library for analyzing MRT/Zebra/Quagga dump files
source-archive: https://github.com/RIPE-NCC/bgpdump/archive/refs/tags/v1.6.2.tar.gz
build-dependencies:
  - autoconf
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: bgpdump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bgpdump
  brew: brew install bgpdump
  debian: sudo apt install bgpdump
  dnf: sudo dnf install bgpdump
  nix: nix profile install nixpkgs#bgpdump
  ubuntu: sudo apt install bgpdump
provenance:
  formula: bgpdump
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
