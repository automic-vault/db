id: brew:somo
display-name: somo
homepage: https://github.com/theopfr/somo
repo: https://github.com/theopfr/somo
docs: https://github.com/theopfr/somo
package-manager:
  brew: somo
  nix: somo
package-manager-url: https://formulae.brew.sh/formula/somo
version: 1.3.3
license: MIT
category: development
tags:
  - cli
description: Human-friendly alternative to netstat for socket and port monitoring
source-archive: https://github.com/theopfr/somo/archive/refs/tags/v1.3.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: somo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:somo
  brew: brew install somo
  nix: nix profile install nixpkgs#somo
provenance:
  formula: somo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
