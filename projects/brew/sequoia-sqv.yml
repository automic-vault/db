id: brew:sequoia-sqv
display-name: sequoia-sqv
homepage: https://sequoia-pgp.org/
repo: https://gitlab.com/sequoia-pgp/sequoia-sqv/-/archive/v1.3.0/sequoia-sqv-v1.3.0.tar.bz2
docs: https://sequoia-pgp.org/
package-manager:
  apk: sequoia-sqv
  brew: sequoia-sqv
  debian: sqv
  dnf: sequoia-sqv
  nix: sequoia-sqv
  pacman: sequoia-sqv
  ubuntu: sqv
  zypper: sequoia-sqv
package-manager-url: https://formulae.brew.sh/formula/sequoia-sqv
version: 1.3.0
license: LGPL-2.0-or-later
category: development
tags:
  - cli
description: Simple OpenPGP signature verification program
source-archive: https://gitlab.com/sequoia-pgp/sequoia-sqv/-/archive/v1.3.0/sequoia-sqv-v1.3.0.tar.bz2
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sqv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sequoia-sqv
  av: sudo av install brew:sequoia-sqv
  brew: brew install sequoia-sqv
  debian: sudo apt install sqv
  dnf: sudo dnf install sequoia-sqv
  nix: nix profile install nixpkgs#sequoia-sqv
  pacman: sudo pacman -S sequoia-sqv
  ubuntu: sudo apt install sqv
  zypper: sudo zypper install sequoia-sqv
provenance:
  formula: sequoia-sqv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
