id: brew:tailwindcss-language-server
display-name: tailwindcss-language-server
homepage: >
  https://github.com/tailwindlabs/tailwindcss-intellisense/tree/HEAD/packages/tailwindcss-language-server
repo: https://github.com/tailwindlabs/tailwindcss-intellisense
docs: >
  https://github.com/tailwindlabs/tailwindcss-intellisense/tree/HEAD/packages/tailwindcss-language-server
package-manager:
  brew: tailwindcss-language-server
  nix: tailwindcss-language-server
  pacman: tailwindcss-language-server
package-manager-url: https://formulae.brew.sh/formula/tailwindcss-language-server
version: 0.14.29
license: MIT
category: development
tags:
  - cli
description: LSP for TailwindCSS
source-archive: >
  https://github.com/tailwindlabs/tailwindcss-intellisense/archive/refs/tags/v0.14.29.tar.gz
dependencies:
  - node
build-dependencies:
  - pnpm
executables:
  - exposure: global executable
    kind: cli
    name: tailwindcss-language-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tailwindcss-language-server
  brew: brew install tailwindcss-language-server
  nix: nix profile install nixpkgs#tailwindcss-language-server
  pacman: sudo pacman -S tailwindcss-language-server
provenance:
  formula: tailwindcss-language-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
