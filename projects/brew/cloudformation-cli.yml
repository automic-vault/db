id: brew:cloudformation-cli
display-name: cloudformation-cli
homepage: https://github.com/aws-cloudformation/cloudformation-cli/
repo: >
  https://files.pythonhosted.org/packages/12/ed/36f14b63957e99d9f2cbb5ac5671eed9fb93569e57add60534d47fc630e4/cloudformation-cli-0.2.39.tar.gz
docs: https://github.com/aws-cloudformation/cloudformation-cli/
package-manager:
  brew: cloudformation-cli
package-manager-url: https://formulae.brew.sh/formula/cloudformation-cli
version: 0.2.39
license: Apache-2.0
category: cloud
tags:
  - cli
description: CloudFormation Provider Development Toolkit
source-archive: >
  https://files.pythonhosted.org/packages/12/ed/36f14b63957e99d9f2cbb5ac5671eed9fb93569e57add60534d47fc630e4/cloudformation-cli-0.2.39.tar.gz
dependencies:
  - certifi
  - libyaml
  - pydantic
  - python@3.13
executables:
  - exposure: global executable
    kind: cli
    name: cfn
  - exposure: global executable
    kind: cli
    name: cfn-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    cloudformation java, go, python plugins are installed, but the Go and Java are not
    bundled with the installation.
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloudformation-cli
  brew: brew install cloudformation-cli
provenance:
  formula: cloudformation-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
