id: brew:austin
display-name: austin
homepage: https://github.com/P403n1x87/austin
repo: https://github.com/P403n1x87/austin
docs: https://github.com/P403n1x87/austin
package-manager:
  brew: austin
  debian: austin
  scoop: main/austin
  ubuntu: austin
  winget: P403n1x87.austin
package-manager-url: https://formulae.brew.sh/formula/austin
version: 4.0.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Python frame stack sampler for CPython
source-archive: https://github.com/P403n1x87/austin/archive/refs/tags/v4.0.0.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: austin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:austin
  brew: brew install austin
  debian: sudo apt install austin
  scoop: scoop install main/austin
  ubuntu: sudo apt install austin
  winget: winget install --id P403n1x87.austin -e
provenance:
  formula: austin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
