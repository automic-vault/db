id: brew:wiggle
display-name: wiggle
homepage: https://github.com/neilbrown/wiggle
repo: https://github.com/neilbrown/wiggle
docs: https://github.com/neilbrown/wiggle
package-manager:
  apk: wiggle
  brew: wiggle
  debian: wiggle
  macports: wiggle
  nix: wiggle
  ubuntu: wiggle
  zypper: wiggle
package-manager-url: https://formulae.brew.sh/formula/wiggle
version: 1.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Program for applying patches with conflicting changes
source-archive: https://github.com/neilbrown/wiggle/archive/refs/tags/v1.3.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: wiggle
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wiggle
  av: sudo av install brew:wiggle
  brew: brew install wiggle
  debian: sudo apt install wiggle
  macports: sudo port install wiggle
  nix: nix profile install nixpkgs#wiggle
  ubuntu: sudo apt install wiggle
  zypper: sudo zypper install wiggle
provenance:
  formula: wiggle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
