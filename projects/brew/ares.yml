id: brew:ares
display-name: ares
homepage: https://github.com/bee-san/Ares
repo: https://github.com/bee-san/Ares
docs: https://github.com/bee-san/Ares
package-manager:
  brew: ares
  debian: ares
  macports: ares
  nix: ares
  ubuntu: ares
  winget: Ares.Ares
package-manager-url: https://formulae.brew.sh/formula/ares
version: 0.11.0
license: MIT
category: security
tags:
  - cli
description: Automated decoding of encrypted text
source-archive: https://github.com/bee-san/Ares/archive/refs/tags/0.11.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ares
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ares
  brew: brew install ares
  debian: sudo apt install ares
  macports: sudo port install ares
  nix: nix profile install nixpkgs#ares
  ubuntu: sudo apt install ares
  winget: winget install --id Ares.Ares -e
provenance:
  formula: ares
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
