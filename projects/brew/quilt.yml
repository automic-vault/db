id: brew:quilt
display-name: quilt
homepage: https://savannah.nongnu.org/projects/quilt
repo: https://download.savannah.gnu.org/releases/quilt/quilt-0.69.tar.gz
docs: https://savannah.nongnu.org/projects/quilt
package-manager:
  apk: quilt
  brew: quilt
  debian: quilt
  dnf: quilt
  macports: quilt
  nix: quilt
  pacman: quilt
  ubuntu: quilt
  zypper: quilt
package-manager-url: https://formulae.brew.sh/formula/quilt
version: 0.69
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Work with series of patches
source-archive: https://download.savannah.gnu.org/releases/quilt/quilt-0.69.tar.gz
dependencies:
  - coreutils
  - diffutils
  - gnu-sed
  - gpatch
executables:
  - exposure: global executable
    kind: cli
    name: guards
  - exposure: global executable
    kind: cli
    name: quilt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add quilt
  av: sudo av install brew:quilt
  brew: brew install quilt
  debian: sudo apt install quilt
  dnf: sudo dnf install quilt
  macports: sudo port install quilt
  nix: nix profile install nixpkgs#quilt
  pacman: sudo pacman -S quilt
  ubuntu: sudo apt install quilt
  zypper: sudo zypper install quilt
provenance:
  formula: quilt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
