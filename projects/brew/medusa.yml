id: brew:medusa
display-name: medusa
homepage: https://github.com/crytic/medusa
repo: https://github.com/crytic/medusa
docs: https://github.com/crytic/medusa
package-manager:
  brew: medusa
  debian: medusa
  dnf: medusa
  macports: medusa
  nix: medusa
  pacman: medusa
  ubuntu: medusa
package-manager-url: https://formulae.brew.sh/formula/medusa
version: 1.5.1
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Solidity smart contract fuzzer powered by go-ethereum
source-archive: https://github.com/crytic/medusa/archive/refs/tags/v1.5.1.tar.gz
dependencies:
  - crytic-compile
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: medusa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:medusa
  brew: brew install medusa
  debian: sudo apt install medusa
  dnf: sudo dnf install medusa
  macports: sudo port install medusa
  nix: nix profile install nixpkgs#medusa
  pacman: sudo pacman -S medusa
  ubuntu: sudo apt install medusa
provenance:
  formula: medusa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
