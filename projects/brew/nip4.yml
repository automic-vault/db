id: brew:nip4
display-name: nip4
homepage: https://github.com/jcupitt/nip4
repo: https://github.com/jcupitt/nip4
docs: https://github.com/jcupitt/nip4
package-manager:
  brew: nip4
  dnf: snip
  nix: snip
package-manager-url: https://formulae.brew.sh/formula/nip4
version: 9.1.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Image processing spreadsheet
source-archive: https://github.com/jcupitt/nip4/releases/download/v9.1.3/nip4-9.1.3.tar.xz
dependencies:
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - graphene
  - gsl
  - gtk4
  - hicolor-icon-theme
  - libxml2
  - pango
  - vips
build-dependencies:
  - bison
  - flex
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: nip4
  - exposure: global executable
    kind: cli
    name: snip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:nip4
  brew: brew install nip4
  dnf: sudo dnf install snip
  nix: nix profile install nixpkgs#snip
provenance:
  formula: nip4
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
