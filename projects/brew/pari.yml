id: brew:pari
display-name: pari
homepage: https://pari.math.u-bordeaux.fr/
repo: https://pari.math.u-bordeaux.fr/pub/pari/unix/pari-2.17.3.tar.gz
docs: https://pari.math.u-bordeaux.fr/
package-manager:
  apk: pari
  brew: pari
  dnf: pari
  macports: pari
  nix: pari
  pacman: pari
package-manager-url: https://formulae.brew.sh/formula/pari
version: 2.17.3
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Computer algebra system designed for fast computations in number theory
source-archive: https://pari.math.u-bordeaux.fr/pub/pari/unix/pari-2.17.3.tar.gz
dependencies:
  - gmp
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: gp
  - exposure: global executable
    kind: cli
    name: gp-2.17
  - exposure: global executable
    kind: cli
    name: gphelp
  - exposure: global executable
    kind: cli
    name: tex2mail
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    If you need the graphical plotting functions you need to install X11 with: brew
    install --cask xquartz
  post-install-defined: false
install-lines:
  apk: sudo apk add pari
  av: sudo av install brew:pari
  brew: brew install pari
  dnf: sudo dnf install pari
  macports: sudo port install pari
  nix: nix profile install nixpkgs#pari
  pacman: sudo pacman -S pari
provenance:
  formula: pari
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
