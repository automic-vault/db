id: brew:restic
display-name: restic
homepage: https://restic.net/
repo: https://github.com/restic/restic
docs: https://restic.net/
package-manager:
  apk: restic
  brew: restic
  chocolatey: restic
  debian: restic
  dnf: restic
  macports: restic
  nix: restic
  pacman: restic
  scoop: main/restic
  ubuntu: restic
  winget: restic.restic
  zypper: restic
package-manager-url: https://formulae.brew.sh/formula/restic
version: 0.18.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: Fast, efficient and secure backup program
source-archive: https://github.com/restic/restic/archive/refs/tags/v0.18.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: restic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add restic
  av: sudo av install brew:restic
  brew: brew install restic
  chocolatey: choco install restic
  debian: sudo apt install restic
  dnf: sudo dnf install restic
  macports: sudo port install restic
  nix: nix profile install nixpkgs#restic
  pacman: sudo pacman -S restic
  scoop: scoop install main/restic
  ubuntu: sudo apt install restic
  winget: winget install --id restic.restic -e
  zypper: sudo zypper install restic
provenance:
  formula: restic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
