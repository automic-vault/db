id: brew:gauche
display-name: gauche
homepage: https://practical-scheme.net/gauche/
repo: https://github.com/shirok/Gauche
docs: https://practical-scheme.net/gauche/
package-manager:
  brew: gauche
  debian: gauche
  dnf: gauche
  macports: gauche
  nix: gauche
  scoop: main/gauche
package-manager-url: https://formulae.brew.sh/formula/gauche
version: 0.9.15
license: BSD-3-Clause
category: development
tags:
  - cli
description: R7RS Scheme implementation, developed to be a handy script interpreter
source-archive: https://github.com/shirok/Gauche/releases/download/release0_9_15/Gauche-0.9.15.tgz
dependencies:
  - ca-certificates
  - mbedtls@3
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: gauche-cesconv
  - exposure: global executable
    kind: cli
    name: gauche-config
  - exposure: global executable
    kind: cli
    name: gauche-install
  - exposure: global executable
    kind: cli
    name: gauche-package
  - exposure: global executable
    kind: cli
    name: gosh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gauche
  brew: brew install gauche
  debian: sudo apt install gauche
  dnf: sudo dnf install gauche
  macports: sudo port install gauche
  nix: nix profile install nixpkgs#gauche
  scoop: scoop install main/gauche
provenance:
  formula: gauche
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
