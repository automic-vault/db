id: brew:gf
display-name: gf
homepage: https://goframe.org
repo: https://github.com/gogf/gf
docs: https://goframe.org
package-manager:
  brew: gf
  macports: gf
  nix: gf
package-manager-url: https://formulae.brew.sh/formula/gf
version: 2.10.2
license: MIT
category: development
tags:
  - cli
description: App development framework of Golang
source-archive: https://github.com/gogf/gf/archive/refs/tags/v2.10.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gf
  brew: brew install gf
  macports: sudo port install gf
  nix: nix profile install nixpkgs#gf
provenance:
  formula: gf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
