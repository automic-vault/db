id: brew:kool
display-name: kool
homepage: https://kool.dev
repo: https://github.com/kool-dev/kool
docs: https://kool.dev
package-manager:
  brew: kool
  nix: kool
package-manager-url: https://formulae.brew.sh/formula/kool
version: 3.6.0
license: MIT
category: development
tags:
  - cli
description: Web apps development with containers made easy
source-archive: https://github.com/kool-dev/kool/archive/refs/tags/3.6.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kool
  brew: brew install kool
  nix: nix profile install nixpkgs#kool
provenance:
  formula: kool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
