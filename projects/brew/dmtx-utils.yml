id: brew:dmtx-utils
display-name: dmtx-utils
homepage: https://github.com/dmtx/dmtx-utils
repo: https://github.com/dmtx/dmtx-utils
docs: https://github.com/dmtx/dmtx-utils
package-manager:
  brew: dmtx-utils
  debian: dmtx-utils
  dnf: dmtx-utils
  macports: dmtx-utils
  nix: dmtx-utils
  ubuntu: dmtx-utils
package-manager-url: https://formulae.brew.sh/formula/dmtx-utils
version: 0.7.6
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: Read and write data matrix barcodes
source-archive: https://github.com/dmtx/dmtx-utils/archive/refs/tags/v0.7.6.tar.gz
dependencies:
  - fontconfig
  - freetype
  - gettext
  - glib
  - imagemagick
  - libdmtx
  - liblqr
  - libomp
  - libtool
  - little-cms2
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dmtxquery
  - exposure: global executable
    kind: cli
    name: dmtxread
  - exposure: global executable
    kind: cli
    name: dmtxwrite
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dmtx-utils
  brew: brew install dmtx-utils
  debian: sudo apt install dmtx-utils
  dnf: sudo dnf install dmtx-utils
  macports: sudo port install dmtx-utils
  nix: nix profile install nixpkgs#dmtx-utils
  ubuntu: sudo apt install dmtx-utils
provenance:
  formula: dmtx-utils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
