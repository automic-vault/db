id: brew:xkcd
display-name: xkcd
homepage: https://git.hanabi.in/xkcd-go
repo: https://git.hanabi.in/repos/xkcd-go
docs: https://git.hanabi.in/xkcd-go
package-manager:
  brew: xkcd
package-manager-url: https://formulae.brew.sh/formula/xkcd
version: 2.0.0
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Fetch latest, random or any particular xkcd comic right in your terminal
source-archive: https://git.hanabi.in/repos/xkcd-go.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: xkcd
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xkcd
  brew: brew install xkcd
provenance:
  formula: xkcd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
