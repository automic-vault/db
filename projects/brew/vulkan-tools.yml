id: brew:vulkan-tools
display-name: vulkan-tools
homepage: https://github.com/KhronosGroup/Vulkan-Tools
repo: https://github.com/KhronosGroup/Vulkan-Tools
docs: https://github.com/KhronosGroup/Vulkan-Tools
package-manager:
  apk: vulkan-tools
  brew: vulkan-tools
  debian: vulkan-tools
  dnf: vulkan-tools
  macports: vulkan-tools
  nix: vulkan-tools
  pacman: vulkan-tools
  ubuntu: vulkan-tools
  zypper: vulkan-tools
package-manager-url: https://formulae.brew.sh/formula/vulkan-tools
version: 1.4.350.0
license: Apache-2.0
category: development
tags:
  - cli
description: Vulkan utilities and tools
source-archive: >
  https://github.com/KhronosGroup/Vulkan-Tools/archive/refs/tags/vulkan-sdk-1.4.350.0.tar.gz
dependencies:
  - glslang
  - molten-vk
  - vulkan-headers
  - vulkan-loader
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: vkcube
  - exposure: global executable
    kind: cli
    name: vkcubepp
  - exposure: global executable
    kind: cli
    name: vulkaninfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The mock ICD files have been installed in
    $HOMEBREW_PREFIX/opt/vulkan-tools/lib/mock_icd You can use them with the Vulkan
    Loader by setting export
    VK_ICD_FILENAMES=$HOMEBREW_PREFIX/opt/vulkan-tools/lib/mock_icd/VkICD_mock_icd.json
  post-install-defined: false
install-lines:
  apk: sudo apk add vulkan-tools
  av: sudo av install brew:vulkan-tools
  brew: brew install vulkan-tools
  debian: sudo apt install vulkan-tools
  dnf: sudo dnf install vulkan-tools
  macports: sudo port install vulkan-tools
  nix: nix profile install nixpkgs#vulkan-tools
  pacman: sudo pacman -S vulkan-tools
  ubuntu: sudo apt install vulkan-tools
  zypper: sudo zypper install vulkan-tools
provenance:
  formula: vulkan-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
