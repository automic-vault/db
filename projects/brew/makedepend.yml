id: brew:makedepend
display-name: makedepend
homepage: https://x.org/
repo: https://xorg.freedesktop.org/releases/individual/util/makedepend-1.0.9.tar.xz
docs: https://x.org/
package-manager:
  apk: makedepend
  brew: makedepend
  macports: makedepend
  nix: makedepend
  zypper: makedepend
package-manager-url: https://formulae.brew.sh/formula/makedepend
version: 1.0.9
license: MIT
category: network
tags:
  - cli
description: Creates dependencies in makefiles
source-archive: https://xorg.freedesktop.org/releases/individual/util/makedepend-1.0.9.tar.xz
dependencies:
  - util-macros
  - xorgproto
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: makedepend
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add makedepend
  av: sudo av install brew:makedepend
  brew: brew install makedepend
  macports: sudo port install makedepend
  nix: nix profile install nixpkgs#makedepend
  zypper: sudo zypper install makedepend
provenance:
  formula: makedepend
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
