id: brew:sesh
display-name: sesh
homepage: https://github.com/joshmedeski/sesh
repo: https://github.com/joshmedeski/sesh
docs: https://github.com/joshmedeski/sesh
package-manager:
  brew: sesh
  nix: sesh
package-manager-url: https://formulae.brew.sh/formula/sesh
version: 2.26.2
license: MIT
category: development
tags:
  - cli
description: Smart session manager for the terminal
source-archive: https://github.com/joshmedeski/sesh/archive/refs/tags/v2.26.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sesh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sesh
  brew: brew install sesh
  nix: nix profile install nixpkgs#sesh
provenance:
  formula: sesh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
