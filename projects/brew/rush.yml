id: brew:rush
display-name: rush
homepage: https://www.gnu.org.ua/software/rush/
repo: https://ftpmirror.gnu.org/gnu/rush/rush-2.4.tar.xz
docs: https://www.gnu.org.ua/software/rush/
package-manager:
  brew: rush
  debian: rush
  dnf: rush
  macports: rush
