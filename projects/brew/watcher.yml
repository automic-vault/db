id: brew:watcher
display-name: watcher
homepage: https://github.com/e-dant/watcher
repo: https://github.com/e-dant/watcher
docs: https://github.com/e-dant/watcher
package-manager:
  brew: watcher
  nix: watcher
package-manager-url: https://formulae.brew.sh/formula/watcher
version: 0.14.5
license: MIT
category: development
tags:
  - cli
description: Filesystem watcher, works anywhere, simple, efficient and friendly
source-archive: https://github.com/e-dant/watcher/archive/refs/tags/0.14.5.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: wtr.watcher
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:watcher
  brew: brew install watcher
  nix: nix profile install nixpkgs#watcher
provenance:
  formula: watcher
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
