id: brew:pdfgrep
display-name: pdfgrep
homepage: https://pdfgrep.org/
repo: https://pdfgrep.org/download/pdfgrep-2.2.0.tar.gz
docs: https://pdfgrep.org/
package-manager:
  apk: pdfgrep
  brew: pdfgrep
  debian: pdfgrep
  dnf: pdfgrep
  macports: pdfgrep
  nix: pdfgrep
  pacman: pdfgrep
  ubuntu: pdfgrep
  zypper: pdfgrep
package-manager-url: https://formulae.brew.sh/formula/pdfgrep
version: 2.2.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Search PDFs for strings matching a regular expression
source-archive: https://pdfgrep.org/download/pdfgrep-2.2.0.tar.gz
dependencies:
  - libgcrypt
  - libgpg-error
  - pcre2
  - poppler
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pdfgrep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pdfgrep
  av: sudo av install brew:pdfgrep
  brew: brew install pdfgrep
  debian: sudo apt install pdfgrep
  dnf: sudo dnf install pdfgrep
  macports: sudo port install pdfgrep
  nix: nix profile install nixpkgs#pdfgrep
  pacman: sudo pacman -S pdfgrep
  ubuntu: sudo apt install pdfgrep
  zypper: sudo zypper install pdfgrep
provenance:
  formula: pdfgrep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
