id: brew:dpic
display-name: dpic
homepage: https://ece.uwaterloo.ca/~aplevich/dpic/
repo: https://ece.uwaterloo.ca/~aplevich/dpic/dpic-2025.08.01.tar.gz
docs: https://ece.uwaterloo.ca/~aplevich/dpic/
package-manager:
  brew: dpic
  debian: dpic
  nix: dpic
  ubuntu: dpic
  zypper: dpic
package-manager-url: https://formulae.brew.sh/formula/dpic
version: 2025.08.01
license: BSD-2-Clause
category: development
tags:
  - cli
description: Implementation of the GNU pic "little language"
source-archive: https://ece.uwaterloo.ca/~aplevich/dpic/dpic-2025.08.01.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: dpic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dpic
  brew: brew install dpic
  debian: sudo apt install dpic
  nix: nix profile install nixpkgs#dpic
  ubuntu: sudo apt install dpic
  zypper: sudo zypper install dpic
provenance:
  formula: dpic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
