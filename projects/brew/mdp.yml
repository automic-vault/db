id: brew:mdp
display-name: mdp
homepage: https://github.com/visit1985/mdp
repo: https://github.com/visit1985/mdp
docs: https://github.com/visit1985/mdp
package-manager:
  apk: mdp
  brew: mdp
  debian: mdp
  macports: mdp
  nix: mdp
  pacman: mdp
  ubuntu: mdp
package-manager-url: https://formulae.brew.sh/formula/mdp
version: 1.0.18
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Command-line based markdown presentation tool
source-archive: https://github.com/visit1985/mdp/archive/refs/tags/1.0.18.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: mdp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mdp
  av: sudo av install brew:mdp
  brew: brew install mdp
  debian: sudo apt install mdp
  macports: sudo port install mdp
  nix: nix profile install nixpkgs#mdp
  pacman: sudo pacman -S mdp
  ubuntu: sudo apt install mdp
provenance:
  formula: mdp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
