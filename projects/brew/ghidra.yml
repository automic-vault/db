id: brew:ghidra
display-name: ghidra
homepage: https://github.com/NationalSecurityAgency/ghidra
repo: https://github.com/NationalSecurityAgency/ghidra
docs: https://github.com/NationalSecurityAgency/ghidra
package-manager:
  apk: ghidra
  brew: ghidra
  chocolatey: ghidra
  macports: ghidra
  nix: ghidra
  pacman: ghidra
  scoop: extras/ghidra
package-manager-url: https://formulae.brew.sh/formula/ghidra
version: 12.1
license: Apache-2.0
category: security
tags:
  - cli
description: Multi-platform software reverse engineering framework
source-archive: >
  https://github.com/NationalSecurityAgency/ghidra/archive/refs/tags/Ghidra_12.1_build.tar.gz
dependencies:
  - openjdk@21
build-dependencies:
  - gradle
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: ghidraRun
  - exposure: global executable
    kind: cli
    name: pyghidraRun
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ghidra
  av: sudo av install brew:ghidra
  brew: brew install ghidra
  chocolatey: choco install ghidra
  macports: sudo port install ghidra
  nix: nix profile install nixpkgs#ghidra
  pacman: sudo pacman -S ghidra
  scoop: scoop install extras/ghidra
provenance:
  formula: ghidra
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
