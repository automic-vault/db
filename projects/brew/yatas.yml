id: brew:yatas
display-name: yatas
homepage: https://github.com/padok-team/yatas
repo: https://github.com/padok-team/yatas
docs: https://github.com/padok-team/yatas
package-manager:
  brew: yatas
  nix: yatas
package-manager-url: https://formulae.brew.sh/formula/yatas
version: 1.6.1
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
  - security
description: Tool to audit AWS/GCP infrastructure for misconfiguration or security issues
source-archive: https://github.com/padok-team/yatas/archive/refs/tags/v1.6.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: yatas
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yatas
  brew: brew install yatas
  nix: nix profile install nixpkgs#yatas
provenance:
  formula: yatas
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
