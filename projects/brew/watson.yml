id: brew:watson
display-name: watson
homepage: https://jazzband.github.io/Watson/
repo: >
  https://files.pythonhosted.org/packages/a9/61/868892a19ad9f7e74f9821c259702c3630138ece45bab271e876b24bb381/td-watson-2.1.0.tar.gz
docs: https://jazzband.github.io/Watson/
package-manager:
  brew: watson
  macports: watson
  nix: watson
  zypper: watson
package-manager-url: https://formulae.brew.sh/formula/watson
version: 2.1.0
license: MIT
category: development
tags:
  - cli
description: Command-line tool to track (your) time
source-archive: >
  https://files.pythonhosted.org/packages/a9/61/868892a19ad9f7e74f9821c259702c3630138ece45bab271e876b24bb381/td-watson-2.1.0.tar.gz
dependencies:
  - certifi
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: watson
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:watson
  brew: brew install watson
  macports: sudo port install watson
  nix: nix profile install nixpkgs#watson
  zypper: sudo zypper install watson
provenance:
  formula: watson
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
