id: brew:ktlint
display-name: ktlint
homepage: https://ktlint.github.io/
repo: https://github.com/pinterest/ktlint
docs: https://ktlint.github.io/
package-manager:
  brew: ktlint
  macports: ktlint
  nix: ktlint
  pacman: ktlint
  scoop: main/ktlint
package-manager-url: https://formulae.brew.sh/formula/ktlint
version: 1.8.0
license: MIT
category: development
tags:
  - cli
description: Anti-bikeshedding Kotlin linter with built-in formatter
source-archive: https://github.com/pinterest/ktlint/releases/download/1.8.0/ktlint-1.8.0.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: ktlint
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ktlint
  brew: brew install ktlint
  macports: sudo port install ktlint
  nix: nix profile install nixpkgs#ktlint
  pacman: sudo pacman -S ktlint
  scoop: scoop install main/ktlint
provenance:
  formula: ktlint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
