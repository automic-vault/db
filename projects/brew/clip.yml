id: brew:clip
display-name: clip
homepage: https://github.com/asmuth/clip
repo: https://github.com/asmuth/clip
docs: https://github.com/asmuth/clip
package-manager:
  brew: clip
package-manager-url: https://formulae.brew.sh/formula/clip
version: 0.7
license: Apache-2.0
category: development
tags:
  - cli
description: Create high-quality charts from the command-line
source-archive: https://github.com/asmuth/clip/archive/refs/tags/v0.7.tar.gz
dependencies:
  - cairo
  - fmt
  - fontconfig
  - freetype
  - fribidi
  - harfbuzz
  - libpng
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: clip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clip
  brew: brew install clip
provenance:
  formula: clip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
