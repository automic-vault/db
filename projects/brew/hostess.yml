id: brew:hostess
display-name: hostess
homepage: https://github.com/cbednarski/hostess
repo: https://github.com/cbednarski/hostess
docs: https://github.com/cbednarski/hostess
package-manager:
  brew: hostess
  nix: hostess
  pacman: hostess
package-manager-url: https://formulae.brew.sh/formula/hostess
version: 0.5.2
license: MIT
category: development
tags:
  - cli
description: Idempotent command-line utility for managing your /etc/hosts file
source-archive: https://github.com/cbednarski/hostess/archive/refs/tags/v0.5.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hostess
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hostess
  brew: brew install hostess
  nix: nix profile install nixpkgs#hostess
  pacman: sudo pacman -S hostess
provenance:
  formula: hostess
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
