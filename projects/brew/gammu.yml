id: brew:gammu
display-name: gammu
homepage: https://wammu.eu/gammu/
repo: https://github.com/gammu/gammu
docs: https://wammu.eu/gammu/
package-manager:
  apk: gammu
  brew: gammu
  debian: gammu
  dnf: gammu
  nix: gammu
  pacman: gammu
  ubuntu: gammu
package-manager-url: https://formulae.brew.sh/formula/gammu
version: 1.43.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Command-line utility to control a phone
source-archive: https://github.com/gammu/gammu/releases/download/1.43.2/Gammu-1.43.2.tar.gz
dependencies:
  - gettext
  - glib
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: gammu
  - exposure: global executable
    kind: cli
    name: gammu-config
  - exposure: global executable
    kind: cli
    name: gammu-detect
  - exposure: global executable
    kind: cli
    name: gammu-smsd
  - exposure: global executable
    kind: cli
    name: gammu-smsd-inject
  - exposure: global executable
    kind: cli
    name: gammu-smsd-monitor
  - exposure: global executable
    kind: cli
    name: jadmaker
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gammu
  av: sudo av install brew:gammu
  brew: brew install gammu
  debian: sudo apt install gammu
  dnf: sudo dnf install gammu
  nix: nix profile install nixpkgs#gammu
  pacman: sudo pacman -S gammu
  ubuntu: sudo apt install gammu
provenance:
  formula: gammu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
