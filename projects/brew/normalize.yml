id: brew:normalize
display-name: normalize
homepage: https://www.nongnu.org/normalize/
repo: https://download.savannah.nongnu.org/releases/normalize/normalize-0.7.7.tar.gz
docs: https://www.nongnu.org/normalize/
package-manager:
  brew: normalize
  dnf: normalize
  macports: normalize
  nix: normalize
package-manager-url: https://formulae.brew.sh/formula/normalize
version: 0.7.7
license: GPL-2.0-or-later
category: media
tags:
  - cli
description: Adjust volume of audio files to a standard level
source-archive: https://download.savannah.nongnu.org/releases/normalize/normalize-0.7.7.tar.gz
dependencies:
  - mad
executables:
  - exposure: global executable
    kind: cli
    name: normalize-mp3
  - exposure: global executable
    kind: cli
    name: normalize-ogg
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:normalize
  brew: brew install normalize
  dnf: sudo dnf install normalize
  macports: sudo port install normalize
  nix: nix profile install nixpkgs#normalize
provenance:
  formula: normalize
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
