id: brew:gif2png
display-name: gif2png
homepage: http://www.catb.org/~esr/gif2png/
repo: https://gitlab.com/esr/gif2png/-/archive/3.0.3/gif2png-3.0.3.tar.bz2
docs: http://www.catb.org/~esr/gif2png/
package-manager:
  brew: gif2png
  dnf: gif2png
  pacman: gif2png
package-manager-url: https://formulae.brew.sh/formula/gif2png
version: 3.0.3
license: BSD-2-Clause
category: development
tags:
  - cli
description: Convert GIFs to PNGs
source-archive: https://gitlab.com/esr/gif2png/-/archive/3.0.3/gif2png-3.0.3.tar.bz2
build-dependencies:
  - go
  - xmlto
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: gif2png
  - exposure: global executable
    kind: cli
    name: web2png
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gif2png
  brew: brew install gif2png
  dnf: sudo dnf install gif2png
  pacman: sudo pacman -S gif2png
provenance:
  formula: gif2png
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
