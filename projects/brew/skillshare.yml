id: brew:skillshare
display-name: skillshare
homepage: https://skillshare.runkids.cc
repo: https://github.com/runkids/skillshare
docs: https://skillshare.runkids.cc
package-manager:
  brew: skillshare
package-manager-url: https://formulae.brew.sh/formula/skillshare
version: 0.19.24
license: MIT
category: development
tags:
  - cli
description: Sync skills across AI CLI tools
source-archive: https://github.com/runkids/skillshare/archive/refs/tags/v0.19.24.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: skillshare
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:skillshare
  brew: brew install skillshare
provenance:
  formula: skillshare
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
