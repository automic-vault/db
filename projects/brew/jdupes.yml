id: brew:jdupes
display-name: jdupes
homepage: https://codeberg.org/jbruchon/jdupes
repo: https://codeberg.org/jbruchon/jdupes/archive/v1.31.1.tar.gz
docs: https://codeberg.org/jbruchon/jdupes
package-manager:
  apk: jdupes
  brew: jdupes
  debian: jdupes
  dnf: jdupes
  macports: jdupes
  nix: jdupes
  scoop: main/jdupes
  ubuntu: jdupes
  zypper: jdupes
package-manager-url: https://formulae.brew.sh/formula/jdupes
version: 1.31.1
license: MIT
category: network
tags:
  - cli
description: Duplicate file finder and an enhanced fork of 'fdupes'
source-archive: https://codeberg.org/jbruchon/jdupes/archive/v1.31.1.tar.gz
dependencies:
  - libjodycode
executables:
  - exposure: global executable
    kind: cli
    name: jdupes
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jdupes
  av: sudo av install brew:jdupes
  brew: brew install jdupes
  debian: sudo apt install jdupes
  dnf: sudo dnf install jdupes
  macports: sudo port install jdupes
  nix: nix profile install nixpkgs#jdupes
  scoop: scoop install main/jdupes
  ubuntu: sudo apt install jdupes
  zypper: sudo zypper install jdupes
provenance:
  formula: jdupes
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
