id: brew:crun
display-name: crun
homepage: https://github.com/containers/crun
repo: https://github.com/containers/crun
docs: https://github.com/containers/crun
package-manager:
  apk: crun
  brew: crun
  debian: crun
  dnf: crun
  nix: crun
  pacman: crun
  ubuntu: crun
  zypper: crun
package-manager-url: https://formulae.brew.sh/formula/crun
version: 1.27.1
license: GPL-2.0-or-later OR LGPL-2.1-or-later
category: development
tags:
  - cli
description: Fast and lightweight fully featured OCI runtime and C library
source-archive: https://github.com/containers/crun/releases/download/1.27.1/crun-1.27.1.tar.zst
dependencies:
  - libcap
  - libseccomp
  - systemd
  - yajl
build-dependencies:
  - autoconf
  - automake
  - go-md2man
  - libtool
  - pkgconf
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: crun
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add crun
  av: sudo av install brew:crun
  brew: brew install crun
  debian: sudo apt install crun
  dnf: sudo dnf install crun
  nix: nix profile install nixpkgs#crun
  pacman: sudo pacman -S crun
  ubuntu: sudo apt install crun
  zypper: sudo zypper install crun
provenance:
  formula: crun
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
