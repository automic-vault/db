id: brew:fnox
display-name: fnox
homepage: https://fnox.jdx.dev/
repo: https://github.com/jdx/fnox
docs: https://fnox.jdx.dev/
package-manager:
  brew: fnox
  macports: fnox
package-manager-url: https://formulae.brew.sh/formula/fnox
version: 1.25.1
license: MIT
category: security
tags:
  - cli
description: Fort Knox for your secrets - flexible secret management tool
source-archive: https://github.com/jdx/fnox/archive/refs/tags/v1.25.1.tar.gz
dependencies:
  - usage
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fnox
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fnox
  brew: brew install fnox
  macports: sudo port install fnox
provenance:
  formula: fnox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
