id: brew:giflib
display-name: giflib
homepage: https://giflib.sourceforge.net/
repo: https://downloads.sourceforge.net/project/giflib/giflib-6.x/giflib-6.1.3.tar.gz
docs: https://giflib.sourceforge.net/
package-manager:
  apk: giflib
  brew: giflib
  dnf: giflib
  macports: giflib
  nix: giflib
  pacman: giflib
package-manager-url: https://formulae.brew.sh/formula/giflib
version: 6.1.3
license: MIT
category: network
tags:
  - cli
description: Library and utilities for processing GIFs
source-archive: https://downloads.sourceforge.net/project/giflib/giflib-6.x/giflib-6.1.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: gifbuild
  - exposure: global executable
    kind: cli
    name: gifclrmp
  - exposure: global executable
    kind: cli
    name: giffix
  - exposure: global executable
    kind: cli
    name: giftext
  - exposure: global executable
    kind: cli
    name: giftool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add giflib
  av: sudo av install brew:giflib
  brew: brew install giflib
  dnf: sudo dnf install giflib
  macports: sudo port install giflib
  nix: nix profile install nixpkgs#giflib
  pacman: sudo pacman -S giflib
provenance:
  formula: giflib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
