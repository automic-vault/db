id: brew:tealdeer
display-name: tealdeer
homepage: https://tealdeer-rs.github.io/tealdeer/
repo: https://github.com/tealdeer-rs/tealdeer
docs: https://tealdeer-rs.github.io/tealdeer/
package-manager:
  apk: tealdeer
  brew: tealdeer
  debian: tealdeer
  dnf: tealdeer
  macports: tealdeer
  nix: tealdeer
  pacman: tealdeer
  scoop: main/tealdeer
  ubuntu: tealdeer
  winget: dbrgn.tealdeer
  zypper: tealdeer
package-manager-url: https://formulae.brew.sh/formula/tealdeer
version: 1.8.1
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Very fast implementation of tldr in Rust
source-archive: https://github.com/tealdeer-rs/tealdeer/archive/refs/tags/v1.8.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tldr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tealdeer
  av: sudo av install brew:tealdeer
  brew: brew install tealdeer
  debian: sudo apt install tealdeer
  dnf: sudo dnf install tealdeer
  macports: sudo port install tealdeer
  nix: nix profile install nixpkgs#tealdeer
  pacman: sudo pacman -S tealdeer
  scoop: scoop install main/tealdeer
  ubuntu: sudo apt install tealdeer
  winget: winget install --id dbrgn.tealdeer -e
  zypper: sudo zypper install tealdeer
provenance:
  formula: tealdeer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
