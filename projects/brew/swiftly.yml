id: brew:swiftly
display-name: swiftly
homepage: https://github.com/swiftlang/swiftly
repo: https://github.com/swiftlang/swiftly
docs: https://github.com/swiftlang/swiftly
package-manager:
  brew: swiftly
package-manager-url: https://formulae.brew.sh/formula/swiftly
version: 1.1.1
license: Apache-2.0
category: development
tags:
  - cli
description: Swift toolchain installer and manager
source-archive: https://github.com/swiftlang/swiftly.git
executables:
  - exposure: global executable
    kind: cli
    name: swiftly
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swiftly
  brew: brew install swiftly
provenance:
  formula: swiftly
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
