id: brew:tern
display-name: tern
homepage: https://github.com/tern-tools/tern
repo: >
  https://files.pythonhosted.org/packages/f8/4b/123b2ca469126b45e61853acf028fe1d466f4fe1d5e7afd1d4972c151b4d/tern-2.12.1.tar.gz
docs: https://github.com/tern-tools/tern
package-manager:
  brew: tern
package-manager-url: https://formulae.brew.sh/formula/tern
version: 2.12.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: Software Bill of Materials (SBOM) tool
source-archive: >
  https://files.pythonhosted.org/packages/f8/4b/123b2ca469126b45e61853acf028fe1d466f4fe1d5e7afd1d4972c151b4d/tern-2.12.1.tar.gz
dependencies:
  - certifi
  - libyaml
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: tern
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    tern requires root privileges so you will need to run `sudo tern`. You should be
    certain that you trust any software you grant root privileges.
  post-install-defined: false
install-lines:
  av: sudo av install brew:tern
  brew: brew install tern
provenance:
  formula: tern
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
