id: brew:buffrs
display-name: buffrs
homepage: https://github.com/helsing-ai/buffrs
repo: https://github.com/helsing-ai/buffrs
docs: https://github.com/helsing-ai/buffrs
package-manager:
  brew: buffrs
  nix: buffrs
package-manager-url: https://formulae.brew.sh/formula/buffrs
version: 0.13.2
license: Apache-2.0
category: development
tags:
  - cli
description: Modern protobuf package management
source-archive: https://github.com/helsing-ai/buffrs/archive/refs/tags/v0.13.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: buffrs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:buffrs
  brew: brew install buffrs
  nix: nix profile install nixpkgs#buffrs
provenance:
  formula: buffrs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
