id: brew:gitea-mcp-server
display-name: gitea-mcp-server
homepage: https://gitea.com/gitea/gitea-mcp
repo: https://gitea.com/gitea/gitea-mcp/archive/v1.3.0.tar.gz
docs: https://gitea.com/gitea/gitea-mcp
package-manager:
  brew: gitea-mcp-server
  nix: gitea-mcp-server
package-manager-url: https://formulae.brew.sh/formula/gitea-mcp-server
version: 1.3.0
license: MIT
category: development
tags:
  - cli
description: Interactive with Gitea instances with MCP
source-archive: https://gitea.com/gitea/gitea-mcp/archive/v1.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gitea-mcp-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gitea-mcp-server
  brew: brew install gitea-mcp-server
  nix: nix profile install nixpkgs#gitea-mcp-server
provenance:
  formula: gitea-mcp-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
