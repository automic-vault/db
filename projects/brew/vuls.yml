id: brew:vuls
display-name: vuls
homepage: https://vuls.io/
repo: https://github.com/future-architect/vuls
docs: https://vuls.io/
package-manager:
  brew: vuls
  nix: vuls
  ubuntu: vuls
package-manager-url: https://formulae.brew.sh/formula/vuls
version: 0.39.2
license: GPL-3.0-only
category: development
tags:
  - cli
description: Agentless Vulnerability Scanner for Linux/FreeBSD
source-archive: https://github.com/future-architect/vuls/archive/refs/tags/v0.39.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: future-vuls
  - exposure: global executable
    kind: cli
    name: snmp2cpe
  - exposure: global executable
    kind: cli
    name: trivy-to-vuls
  - exposure: global executable
    kind: cli
    name: vuls
  - exposure: global executable
    kind: cli
    name: vuls-scanner
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vuls
  brew: brew install vuls
  nix: nix profile install nixpkgs#vuls
  ubuntu: sudo apt install vuls
provenance:
  formula: vuls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
