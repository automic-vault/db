id: brew:libsndfile
display-name: libsndfile
homepage: https://libsndfile.github.io/libsndfile/
repo: https://github.com/libsndfile/libsndfile
docs: https://libsndfile.github.io/libsndfile/
package-manager:
  apk: libsndfile
  brew: libsndfile
  chocolatey: libsndfile
  dnf: libsndfile
  macports: libsndfile
  nix: libsndfile
  pacman: libsndfile
  scoop: extras/libsndfile
package-manager-url: https://formulae.brew.sh/formula/libsndfile
version: 1.2.2
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: C library for files containing sampled sound
source-archive: https://github.com/libsndfile/libsndfile/releases/download/1.2.2/libsndfile-1.2.2.tar.xz
dependencies:
  - flac
  - lame
  - libogg
  - libvorbis
  - mpg123
  - opus
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: sndfile-cmp
  - exposure: global executable
    kind: cli
    name: sndfile-concat
  - exposure: global executable
    kind: cli
    name: sndfile-convert
  - exposure: global executable
    kind: cli
    name: sndfile-deinterleave
  - exposure: global executable
    kind: cli
    name: sndfile-info
  - exposure: global executable
    kind: cli
    name: sndfile-interleave
  - exposure: global executable
    kind: cli
    name: sndfile-metadata-get
  - exposure: global executable
    kind: cli
    name: sndfile-metadata-set
  - exposure: global executable
    kind: cli
    name: sndfile-play
  - exposure: global executable
    kind: cli
    name: sndfile-salvage
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libsndfile
  av: sudo av install brew:libsndfile
  brew: brew install libsndfile
  chocolatey: choco install libsndfile
  dnf: sudo dnf install libsndfile
  macports: sudo port install libsndfile
  nix: nix profile install nixpkgs#libsndfile
  pacman: sudo pacman -S libsndfile
  scoop: scoop install extras/libsndfile
provenance:
  formula: libsndfile
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
