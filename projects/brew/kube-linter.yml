id: brew:kube-linter
display-name: kube-linter
homepage: https://github.com/stackrox/kube-linter
repo: https://github.com/stackrox/kube-linter
docs: https://github.com/stackrox/kube-linter
package-manager:
  brew: kube-linter
  macports: kube-linter
  nix: kube-linter
  pacman: kube-linter
  scoop: main/kube-linter
  zypper: kube-linter
package-manager-url: https://formulae.brew.sh/formula/kube-linter
version: 0.8.3
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
  - yaml
description: Static analysis tool for Kubernetes YAML files and Helm charts
source-archive: https://github.com/stackrox/kube-linter/archive/refs/tags/v0.8.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kube-linter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kube-linter
  brew: brew install kube-linter
  macports: sudo port install kube-linter
  nix: nix profile install nixpkgs#kube-linter
  pacman: sudo pacman -S kube-linter
  scoop: scoop install main/kube-linter
  zypper: sudo zypper install kube-linter
provenance:
  formula: kube-linter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
