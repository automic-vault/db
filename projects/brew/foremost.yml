id: brew:foremost
display-name: foremost
homepage: https://foremost.sourceforge.net/
repo: https://foremost.sourceforge.net/pkg/foremost-1.5.7.tar.gz
docs: https://foremost.sourceforge.net/
package-manager:
  brew: foremost
  debian: foremost
  dnf: foremost
  macports: foremost
  nix: foremost
  pacman: foremost
  ubuntu: foremost
package-manager-url: https://formulae.brew.sh/formula/foremost
version: 1.5.7
license: LicenseRef-Homebrew-public-domain
category: network
tags:
  - cli
description: Console program to recover files based on their headers and footers
source-archive: https://foremost.sourceforge.net/pkg/foremost-1.5.7.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: foremost
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:foremost
  brew: brew install foremost
  debian: sudo apt install foremost
  dnf: sudo dnf install foremost
  macports: sudo port install foremost
  nix: nix profile install nixpkgs#foremost
  pacman: sudo pacman -S foremost
  ubuntu: sudo apt install foremost
provenance:
  formula: foremost
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
