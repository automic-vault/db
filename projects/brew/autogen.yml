id: brew:autogen
display-name: autogen
homepage: https://autogen.sourceforge.net/
repo: https://ftpmirror.gnu.org/gnu/autogen/rel5.18.16/autogen-5.18.16.tar.xz
docs: https://autogen.sourceforge.net/
package-manager:
  brew: autogen
  debian: autogen
  dnf: autogen
  macports: autogen
  nix: autogen
  pacman: autogen
  ubuntu: autogen
  zypper: autogen
package-manager-url: https://formulae.brew.sh/formula/autogen
version: 5.18.16
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Automated text file generator
source-archive: https://ftpmirror.gnu.org/gnu/autogen/rel5.18.16/autogen-5.18.16.tar.xz
dependencies:
  - bdw-gc
  - guile
build-dependencies:
  - coreutils
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: autogen
  - exposure: global executable
    kind: cli
    name: autoopts-config
  - exposure: global executable
    kind: cli
    name: columns
  - exposure: global executable
    kind: cli
    name: getdefs
  - exposure: global executable
    kind: cli
    name: xml2ag
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:autogen
  brew: brew install autogen
  debian: sudo apt install autogen
  dnf: sudo dnf install autogen
  macports: sudo port install autogen
  nix: nix profile install nixpkgs#autogen
  pacman: sudo pacman -S autogen
  ubuntu: sudo apt install autogen
  zypper: sudo zypper install autogen
provenance:
  formula: autogen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
