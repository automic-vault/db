id: brew:gatsby-cli
display-name: gatsby-cli
homepage: https://www.gatsbyjs.com/docs/reference/gatsby-cli/
repo: https://registry.npmjs.org/gatsby-cli/-/gatsby-cli-5.16.0.tgz
docs: https://www.gatsbyjs.com/docs/reference/gatsby-cli/
package-manager:
  brew: gatsby-cli
  nix: gatsby-cli
package-manager-url: https://formulae.brew.sh/formula/gatsby-cli
version: 5.16.0
license: MIT
category: network
tags:
  - cli
description: Gatsby command-line interface
source-archive: https://registry.npmjs.org/gatsby-cli/-/gatsby-cli-5.16.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: gatsby
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gatsby-cli
  brew: brew install gatsby-cli
  nix: nix profile install nixpkgs#gatsby-cli
provenance:
  formula: gatsby-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
