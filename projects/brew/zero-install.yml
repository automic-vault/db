id: brew:zero-install
display-name: zero-install
homepage: https://0install.net/
repo: https://github.com/0install/0install
docs: https://0install.net/
package-manager:
  brew: zero-install
  chocolatey: 0install
  debian: 0install
  ubuntu: 0install
  winget: ZeroInstall.ZeroInstall
package-manager-url: https://formulae.brew.sh/formula/zero-install
version: 2.18
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Decentralised cross-platform software installation system
source-archive: https://github.com/0install/0install/releases/download/v2.18/0install-2.18.tbz
dependencies:
  - gnupg
build-dependencies:
  - ocaml
  - opam
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: 0alias
  - exposure: global executable
    kind: cli
    name: 0desktop
  - exposure: global executable
    kind: cli
    name: 0install
  - exposure: global executable
    kind: cli
    name: 0launch
  - exposure: global executable
    kind: cli
    name: 0store
  - exposure: global executable
    kind: cli
    name: 0store-secure-add
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zero-install
  brew: brew install zero-install
  chocolatey: choco install 0install
  debian: sudo apt install 0install
  ubuntu: sudo apt install 0install
  winget: winget install --id ZeroInstall.ZeroInstall -e
provenance:
  formula: zero-install
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
