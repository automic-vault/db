id: brew:varnish
display-name: varnish
homepage: https://www.varnish-cache.org/
repo: https://github.com/varnish/varnish
docs: https://www.varnish-cache.org/
package-manager:
  apk: varnish
  brew: varnish
  debian: varnish
  dnf: varnish
  macports: varnish
  nix: varnish
  ubuntu: varnish
package-manager-url: https://formulae.brew.sh/formula/varnish
version: 9.0.3
license: BSD-2-Clause
category: development
tags:
  - cli
description: High-performance HTTP accelerator
source-archive: https://github.com/varnish/varnish/releases/download/varnish-9.0.3/varnish-9.0.3.tar.gz
dependencies:
  - openssl@3
  - pcre2
build-dependencies:
  - docutils
  - graphviz
  - pkgconf
  - sphinx-doc
uses-from-macos:
  - libedit
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: varnishadm
  - exposure: global executable
    kind: cli
    name: varnishd
  - exposure: global executable
    kind: cli
    name: varnishhist
  - exposure: global executable
    kind: cli
    name: varnishlog
  - exposure: global executable
    kind: cli
    name: varnishlog-json
  - exposure: global executable
    kind: cli
    name: varnishncsa
  - exposure: global executable
    kind: cli
    name: varnishstat
  - exposure: global executable
    kind: cli
    name: varnishstat_help_gen
  - exposure: global executable
    kind: cli
    name: varnishtest
  - exposure: global executable
    kind: cli
    name: varnishtop
  - exposure: global executable
    kind: cli
    name: vtest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add varnish
  av: sudo av install brew:varnish
  brew: brew install varnish
  debian: sudo apt install varnish
  dnf: sudo dnf install varnish
  macports: sudo port install varnish
  nix: nix profile install nixpkgs#varnish
  ubuntu: sudo apt install varnish
provenance:
  formula: varnish
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
