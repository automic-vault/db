  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:red-tldr
  brew: brew install red-tldr
provenance:
  formula: red-tldr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
