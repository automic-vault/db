id: brew:red-tldr
display-name: red-tldr
homepage: https://payloads.online/red-tldr/
repo: https://github.com/Rvn0xsy/red-tldr
docs: https://payloads.online/red-tldr/
package-manager:
  brew: red-tldr
package-manager-url: https://formulae.brew.sh/formula/red-tldr
version: 0.5.0
license: MIT
category: development
tags:
  - cli
description: Used to help red team staff quickly find the commands and key points
source-archive: https://github.com/Rvn0xsy/red-tldr/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: red-tldr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
