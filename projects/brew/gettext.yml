id: brew:gettext
display-name: gettext
homepage: https://www.gnu.org/software/gettext/
repo: https://ftpmirror.gnu.org/gnu/gettext/gettext-1.0.tar.gz
docs: https://www.gnu.org/software/gettext/
package-manager:
  apk: gettext
  brew: gettext
  debian: gettext
  dnf: gettext
  macports: gettext
  nix: gettext
  pacman: gettext
  scoop: main/gettext
  ubuntu: gettext
  winget: mlocati.GetText
  zypper: envsubst
package-manager-url: https://formulae.brew.sh/formula/gettext
version: 1.0
license: GPL-3.0-or-later AND LGPL-2.1-or-later
category: network
tags:
  - cli
description: GNU internationalization (i18n) and localization (l10n) library
source-archive: https://ftpmirror.gnu.org/gnu/gettext/gettext-1.0.tar.gz
dependencies:
  - libunistring
uses-from-macos:
  - libxml2
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: autopoint
  - exposure: global executable
    kind: cli
    name: envsubst
  - exposure: global executable
    kind: cli
    name: gettext
  - exposure: global executable
    kind: cli
    name: gettext.sh
  - exposure: global executable
    kind: cli
    name: gettextize
  - exposure: global executable
    kind: cli
    name: msgattrib
  - exposure: global executable
    kind: cli
    name: msgcat
  - exposure: global executable
    kind: cli
    name: msgcmp
  - exposure: global executable
    kind: cli
    name: msgcomm
  - exposure: global executable
    kind: cli
    name: msgconv
  - exposure: global executable
    kind: cli
    name: msgen
  - exposure: global executable
    kind: cli
    name: msgexec
  - exposure: global executable
    kind: cli
    name: msgfilter
  - exposure: global executable
    kind: cli
    name: msgfmt
  - exposure: global executable
    kind: cli
    name: msggrep
  - exposure: global executable
    kind: cli
    name: msginit
  - exposure: global executable
    kind: cli
    name: msgmerge
  - exposure: global executable
    kind: cli
    name: msgpre
  - exposure: global executable
    kind: cli
    name: msgunfmt
  - exposure: global executable
    kind: cli
    name: msguniq
  - exposure: global executable
    kind: cli
    name: ngettext
  - exposure: global executable
    kind: cli
    name: po-fetch
  - exposure: global executable
    kind: cli
    name: printf_gettext
  - exposure: global executable
    kind: cli
    name: printf_ngettext
  - exposure: global executable
    kind: cli
    name: recode-sr-latin
  - exposure: global executable
    kind: cli
    name: spit
  - exposure: global executable
    kind: cli
    name: xgettext
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gettext
  av: sudo av install brew:gettext
  brew: brew install gettext
  debian: sudo apt install gettext
  dnf: sudo dnf install gettext
  macports: sudo port install gettext
  nix: nix profile install nixpkgs#gettext
  pacman: sudo pacman -S gettext
  scoop: scoop install main/gettext
  ubuntu: sudo apt install gettext
  winget: winget install --id mlocati.GetText -e
  zypper: sudo zypper install envsubst
provenance:
  formula: gettext
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
