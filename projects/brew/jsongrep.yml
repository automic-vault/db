id: brew:jsongrep
display-name: jsongrep
homepage: https://github.com/micahkepe/jsongrep
repo: https://github.com/micahkepe/jsongrep
docs: https://github.com/micahkepe/jsongrep
package-manager:
  brew: jsongrep
  nix: jsongrep
  scoop: main/jsongrep
  winget: micahkepe.jsongrep
  zypper: jsongrep
package-manager-url: https://formulae.brew.sh/formula/jsongrep
version: 0.9.0
license: MIT
category: development
tags:
  - cli
  - json
  - yaml
description: Query tool for JSON, YAML, TOML, and other structured formats
source-archive: https://github.com/micahkepe/jsongrep/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: jg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jsongrep
  brew: brew install jsongrep
  nix: nix profile install nixpkgs#jsongrep
  scoop: scoop install main/jsongrep
  winget: winget install --id micahkepe.jsongrep -e
  zypper: sudo zypper install jsongrep
provenance:
  formula: jsongrep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
