id: brew:git-cliff
display-name: git-cliff
homepage: https://git-cliff.org/
repo: https://github.com/orhun/git-cliff
docs: https://git-cliff.org/
package-manager:
  apk: git-cliff
  brew: git-cliff
  macports: git-cliff
  nix: git-cliff
  pacman: git-cliff
  scoop: main/git-cliff
  winget: orhun.git-cliff
  zypper: git-cliff
package-manager-url: https://formulae.brew.sh/formula/git-cliff
version: 2.13.1
license: Apache-2.0 AND MIT
category: development
tags:
  - cli
  - git
description: Highly customizable changelog generator
source-archive: https://github.com/orhun/git-cliff/archive/refs/tags/v2.13.1.tar.gz
dependencies:
  - libgit2
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: git-cliff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-cliff
  av: sudo av install brew:git-cliff
  brew: brew install git-cliff
  macports: sudo port install git-cliff
  nix: nix profile install nixpkgs#git-cliff
  pacman: sudo pacman -S git-cliff
  scoop: scoop install main/git-cliff
  winget: winget install --id orhun.git-cliff -e
  zypper: sudo zypper install git-cliff
provenance:
  formula: git-cliff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
