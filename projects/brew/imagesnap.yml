id: brew:imagesnap
display-name: imagesnap
homepage: https://github.com/rharder/imagesnap
repo: https://github.com/rharder/imagesnap
docs: https://github.com/rharder/imagesnap
package-manager:
  brew: imagesnap
  macports: ImageSnap
package-manager-url: https://formulae.brew.sh/formula/imagesnap
version: 0.3.0.2
license: LicenseRef-Homebrew-public-domain
category: development
tags:
