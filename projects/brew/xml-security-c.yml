id: brew:xml-security-c
display-name: xml-security-c
homepage: https://santuario.apache.org/
repo: https://shibboleth.net/downloads/xml-security-c/3.0.0/xml-security-c-3.0.0.tar.bz2
docs: https://santuario.apache.org/
package-manager:
  brew: xml-security-c
  dnf: xml-security-c
  macports: xml-security-c
  nix: xml-security-c
package-manager-url: https://formulae.brew.sh/formula/xml-security-c
version: 3.0.0
license: Apache-2.0
category: security
tags:
  - cli
  - security
description: Implementation of primary security standards for XML
source-archive: https://shibboleth.net/downloads/xml-security-c/3.0.0/xml-security-c-3.0.0.tar.bz2
dependencies:
  - openssl@3
  - xerces-c
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xsec-c14n
  - exposure: global executable
    kind: cli
    name: xsec-checksig
  - exposure: global executable
    kind: cli
    name: xsec-cipher
  - exposure: global executable
    kind: cli
    name: xsec-siginf
  - exposure: global executable
    kind: cli
    name: xsec-templatesign
  - exposure: global executable
    kind: cli
    name: xsec-txfmout
  - exposure: global executable
    kind: cli
    name: xsec-xtest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xml-security-c
  brew: brew install xml-security-c
  dnf: sudo dnf install xml-security-c
  macports: sudo port install xml-security-c
  nix: nix profile install nixpkgs#xml-security-c
provenance:
  formula: xml-security-c
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
