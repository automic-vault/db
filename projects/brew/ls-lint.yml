id: brew:ls-lint
display-name: ls-lint
homepage: https://ls-lint.org/
repo: https://github.com/loeffel-io/ls-lint
docs: https://ls-lint.org/
package-manager:
  brew: ls-lint
  nix: ls-lint
  scoop: main/ls-lint
package-manager-url: https://formulae.brew.sh/formula/ls-lint
version: 2.3.1
license: MIT
category: development
tags:
  - cli
description: Extremely fast file and directory name linter
source-archive: https://github.com/loeffel-io/ls-lint/archive/refs/tags/v2.3.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ls-lint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ls-lint
  brew: brew install ls-lint
  nix: nix profile install nixpkgs#ls-lint
  scoop: scoop install main/ls-lint
provenance:
  formula: ls-lint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
