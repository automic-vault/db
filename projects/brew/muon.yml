id: brew:muon
display-name: muon
homepage: https://muon.build
repo: https://git.sr.ht/~lattis/muon/archive/0.5.0.tar.gz
docs: https://muon.build
package-manager:
  apk: muon
  brew: muon
  nix: muon
  zypper: muon
package-manager-url: https://formulae.brew.sh/formula/muon
version: 0.5.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Meson-compatible build system
source-archive: https://git.sr.ht/~lattis/muon/archive/0.5.0.tar.gz
dependencies:
  - libarchive
  - ninja
  - pkgconf
build-dependencies:
  - meson
  - scdoc
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: muon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add muon
  av: sudo av install brew:muon
  brew: brew install muon
  nix: nix profile install nixpkgs#muon
  zypper: sudo zypper install muon
provenance:
  formula: muon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
