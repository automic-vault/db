id: brew:cargo-audit
display-name: cargo-audit
homepage: https://rustsec.org/
repo: https://github.com/rustsec/rustsec
docs: https://rustsec.org/
package-manager:
  apk: cargo-audit
  brew: cargo-audit
  nix: cargo-audit
  pacman: cargo-audit
  zypper: cargo-audit
package-manager-url: https://formulae.brew.sh/formula/cargo-audit
version: 0.22.1
license: Apache-2.0 OR MIT
category: security
tags:
  - cli
  - security
description: Audit Cargo.lock files for crates with security vulnerabilities
source-archive: https://github.com/rustsec/rustsec/archive/refs/tags/cargo-audit/v0.22.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-audit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-audit
  av: sudo av install brew:cargo-audit
  brew: brew install cargo-audit
  nix: nix profile install nixpkgs#cargo-audit
  pacman: sudo pacman -S cargo-audit
  zypper: sudo zypper install cargo-audit
provenance:
  formula: cargo-audit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
