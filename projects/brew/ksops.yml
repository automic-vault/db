id: brew:ksops
display-name: ksops
homepage: https://github.com/viaduct-ai/kustomize-sops
repo: https://github.com/viaduct-ai/kustomize-sops
docs: https://github.com/viaduct-ai/kustomize-sops
package-manager:
  brew: ksops
package-manager-url: https://formulae.brew.sh/formula/ksops
version: 4.5.1
license: Apache-2.0
category: security
tags:
  - cli
description: Flexible Kustomize Plugin for SOPS Encrypted Resources
source-archive: https://github.com/viaduct-ai/kustomize-sops/archive/refs/tags/v4.5.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ksops
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ksops
  brew: brew install ksops
provenance:
  formula: ksops
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
