id: brew:argocd-vault-plugin
display-name: argocd-vault-plugin
homepage: https://argocd-vault-plugin.readthedocs.io
repo: https://github.com/argoproj-labs/argocd-vault-plugin
docs: https://argocd-vault-plugin.readthedocs.io
package-manager:
  brew: argocd-vault-plugin
  nix: argocd-vault-plugin
package-manager-url: https://formulae.brew.sh/formula/argocd-vault-plugin
version: 1.18.1
license: Apache-2.0
category: security
tags:
  - cli
description: Argo CD plugin to retrieve secrets from Secret Management tools
source-archive: https://github.com/argoproj-labs/argocd-vault-plugin.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: argocd-vault-plugin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:argocd-vault-plugin
  brew: brew install argocd-vault-plugin
  nix: nix profile install nixpkgs#argocd-vault-plugin
provenance:
  formula: argocd-vault-plugin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
