id: brew:jsonlint
display-name: jsonlint
homepage: https://github.com/zaach/jsonlint
repo: https://registry.npmjs.org/jsonlint/-/jsonlint-1.6.3.tgz
docs: https://github.com/zaach/jsonlint
package-manager:
  brew: jsonlint
  debian: jsonlint
  ubuntu: jsonlint
package-manager-url: https://formulae.brew.sh/formula/jsonlint
version: 1.6.3
license: MIT
category: development
tags:
  - cli
  - json
description: JSON parser and validator with a CLI
source-archive: https://registry.npmjs.org/jsonlint/-/jsonlint-1.6.3.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: jsonlint
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jsonlint
  brew: brew install jsonlint
  debian: sudo apt install jsonlint
  ubuntu: sudo apt install jsonlint
provenance:
  formula: jsonlint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
