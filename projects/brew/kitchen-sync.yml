id: brew:kitchen-sync
display-name: kitchen-sync
homepage: https://github.com/willbryant/kitchen_sync
repo: https://github.com/willbryant/kitchen_sync
docs: https://github.com/willbryant/kitchen_sync
package-manager:
  brew: kitchen-sync
  chocolatey: KS
  nix: ks
package-manager-url: https://formulae.brew.sh/formula/kitchen-sync
version: 2.21
license: MIT
category: database
tags:
  - cli
  - database
description: Fast efficiently sync database without dumping & reloading
source-archive: https://github.com/willbryant/kitchen_sync/archive/refs/tags/v2.21.tar.gz
dependencies:
  - libpq
  - mariadb-connector-c
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ks
  - exposure: global executable
    kind: cli
    name: ks_mysql
  - exposure: global executable
    kind: cli
    name: ks_postgresql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kitchen-sync
  brew: brew install kitchen-sync
  chocolatey: choco install KS
  nix: nix profile install nixpkgs#ks
provenance:
  formula: kitchen-sync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
