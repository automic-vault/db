id: brew:aws-rotate-key
display-name: aws-rotate-key
homepage: https://github.com/stefansundin/aws-rotate-key
repo: https://github.com/stefansundin/aws-rotate-key
docs: https://github.com/stefansundin/aws-rotate-key
package-manager:
  brew: aws-rotate-key
  nix: aws-rotate-key
package-manager-url: https://formulae.brew.sh/formula/aws-rotate-key
version: 1.2.0
license: MIT
category: cloud
tags:
  - aws
  - cli
description: Easily rotate your AWS access key
source-archive: https://github.com/stefansundin/aws-rotate-key/archive/refs/tags/v1.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aws-rotate-key
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aws-rotate-key
  brew: brew install aws-rotate-key
  nix: nix profile install nixpkgs#aws-rotate-key
provenance:
  formula: aws-rotate-key
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
