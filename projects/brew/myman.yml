id: brew:myman
display-name: myman
homepage: https://myman.sourceforge.io/
repo: >
  https://downloads.sourceforge.net/project/myman/myman-cvs/myman-cvs-2009-10-30/myman-wip-2009-10-30.tar.gz
docs: https://myman.sourceforge.io/
package-manager:
  brew: myman
  nix: myman
  zypper: myman
package-manager-url: https://formulae.brew.sh/formula/myman
version: 2009-10-30
license: MIT
category: media
tags:
  - cli
description: Text-mode videogame inspired by Namco's Pac-Man
source-archive: >
  https://downloads.sourceforge.net/project/myman/myman-cvs/myman-cvs-2009-10-30/myman-wip-2009-10-30.tar.gz
build-dependencies:
  - coreutils
  - gnu-sed
  - groff
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: myman
  - exposure: global executable
    kind: cli
    name: myman-0.7.1
  - exposure: global executable
    kind: cli
    name: myman.command
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:myman
  brew: brew install myman
  nix: nix profile install nixpkgs#myman
  zypper: sudo zypper install myman
provenance:
  formula: myman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
