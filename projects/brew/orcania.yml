id: brew:orcania
display-name: orcania
homepage: https://babelouest.github.io/orcania/
repo: https://github.com/babelouest/orcania
docs: https://babelouest.github.io/orcania/
package-manager:
  brew: orcania
  nix: orcania
  pacman: orcania
package-manager-url: https://formulae.brew.sh/formula/orcania
version: 2.3.3
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Potluck with different functions for different purposes in C
source-archive: https://github.com/babelouest/orcania/archive/refs/tags/v2.3.3.tar.gz
build-dependencies:
  - cmake
  - doxygen
executables:
  - exposure: global executable
    kind: cli
    name: base64url
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:orcania
  brew: brew install orcania
  nix: nix profile install nixpkgs#orcania
  pacman: sudo pacman -S orcania
provenance:
  formula: orcania
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
