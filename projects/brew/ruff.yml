id: brew:ruff
display-name: ruff
homepage: https://docs.astral.sh/ruff/
repo: https://github.com/astral-sh/ruff
docs: https://docs.astral.sh/ruff/
package-manager:
  apk: ruff
  brew: ruff
  chocolatey: ruff
  dnf: ruff
  macports: ruff
  nix: ruff
  pacman: ruff
  scoop: main/ruff
  winget: astral-sh.ruff
package-manager-url: https://formulae.brew.sh/formula/ruff
version: 0.15.14
license: MIT
category: development
tags:
  - cli
description: Extremely fast Python linter, written in Rust
source-archive: https://github.com/astral-sh/ruff/archive/refs/tags/0.15.14.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ruff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ruff
  av: sudo av install brew:ruff
  brew: brew install ruff
  chocolatey: choco install ruff
  dnf: sudo dnf install ruff
  macports: sudo port install ruff
  nix: nix profile install nixpkgs#ruff
  pacman: sudo pacman -S ruff
  scoop: scoop install main/ruff
  winget: winget install --id astral-sh.ruff -e
provenance:
  formula: ruff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
