id: brew:meta-package-manager
display-name: meta-package-manager
homepage: https://kdeldycke.github.io/meta-package-manager/
repo: >
  https://files.pythonhosted.org/packages/ca/0b/2cf6ba01673095c6a291364e3a6e0fc3ac56069cbcca22908921e3923835/meta_package_manager-6.5.0.tar.gz
docs: https://kdeldycke.github.io/meta-package-manager/
package-manager:
  brew: meta-package-manager
  scoop: main/meta-package-manager
package-manager-url: https://formulae.brew.sh/formula/meta-package-manager
version: 6.5.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Wrapper around all package managers with a unifying CLI
source-archive: >
  https://files.pythonhosted.org/packages/ca/0b/2cf6ba01673095c6a291364e3a6e0fc3ac56069cbcca22908921e3923835/meta_package_manager-6.5.0.tar.gz
dependencies:
  - certifi
  - libyaml
  - python@3.14
  - rpds-py
build-dependencies:
  - rust
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: meta-package-manager
  - exposure: global executable
    kind: cli
    name: mpm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:meta-package-manager
  brew: brew install meta-package-manager
  scoop: scoop install main/meta-package-manager
provenance:
  formula: meta-package-manager
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
