id: brew:pyenv-virtualenv
display-name: pyenv-virtualenv
homepage: https://github.com/pyenv/pyenv-virtualenv
repo: https://github.com/pyenv/pyenv-virtualenv
docs: https://github.com/pyenv/pyenv-virtualenv
package-manager:
  brew: pyenv-virtualenv
package-manager-url: https://formulae.brew.sh/formula/pyenv-virtualenv
version: 1.4.0
license: MIT
category: development
tags:
  - cli
description: Pyenv plugin to manage virtualenv
source-archive: https://github.com/pyenv/pyenv-virtualenv/archive/refs/tags/v1.4.0.tar.gz
dependencies:
  - coreutils
  - pyenv
executables:
  - exposure: global executable
    kind: cli
    name: pyenv-activate
  - exposure: global executable
    kind: cli
    name: pyenv-deactivate
  - exposure: global executable
    kind: cli
    name: pyenv-sh-activate
  - exposure: global executable
    kind: cli
    name: pyenv-sh-deactivate
  - exposure: global executable
    kind: cli
    name: pyenv-virtualenv
  - exposure: global executable
    kind: cli
    name: pyenv-virtualenv-delete
  - exposure: global executable
    kind: cli
    name: pyenv-virtualenv-init
  - exposure: global executable
    kind: cli
    name: pyenv-virtualenv-prefix
  - exposure: global executable
    kind: cli
    name: pyenv-virtualenvs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pyenv-virtualenv
  brew: brew install pyenv-virtualenv
provenance:
  formula: pyenv-virtualenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
