id: brew:php-code-sniffer
display-name: php-code-sniffer
homepage: https://github.com/PHPCSStandards/PHP_CodeSniffer
repo: https://github.com/PHPCSStandards/PHP_CodeSniffer
docs: https://github.com/PHPCSStandards/PHP_CodeSniffer
package-manager:
  brew: php-code-sniffer
package-manager-url: https://formulae.brew.sh/formula/php-code-sniffer
version: 4.0.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Check coding standards in PHP, JavaScript and CSS
source-archive: https://github.com/PHPCSStandards/PHP_CodeSniffer/releases/download/4.0.1/phpcs.phar
dependencies:
  - php
executables:
  - exposure: global executable
    kind: cli
    name: phpcbf
  - exposure: global executable
    kind: cli
    name: phpcs
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:php-code-sniffer
  brew: brew install php-code-sniffer
provenance:
  formula: php-code-sniffer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
