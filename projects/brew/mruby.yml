id: brew:mruby
display-name: mruby
homepage: https://mruby.org/
repo: https://github.com/mruby/mruby
docs: https://mruby.org/
package-manager:
  apk: mruby
  brew: mruby
  debian: mruby
  macports: mruby
  nix: mruby
  pacman: mruby
  ubuntu: mruby
  zypper: mruby
package-manager-url: https://formulae.brew.sh/formula/mruby
version: 4.0.0
license: MIT
category: development
tags:
  - cli
description: Lightweight implementation of the Ruby language
source-archive: https://github.com/mruby/mruby/archive/refs/tags/4.0.0.tar.gz
build-dependencies:
  - bison
executables:
  - exposure: global executable
    kind: cli
    name: mirb
  - exposure: global executable
    kind: cli
    name: mrbc
  - exposure: global executable
    kind: cli
    name: mruby
  - exposure: global executable
    kind: cli
    name: mruby-config
  - exposure: global executable
    kind: cli
    name: mruby-strip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mruby
  av: sudo av install brew:mruby
  brew: brew install mruby
  debian: sudo apt install mruby
  macports: sudo port install mruby
  nix: nix profile install nixpkgs#mruby
  pacman: sudo pacman -S mruby
  ubuntu: sudo apt install mruby
  zypper: sudo zypper install mruby
provenance:
  formula: mruby
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
