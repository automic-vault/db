id: brew:opensearch
display-name: opensearch
homepage: https://github.com/opensearch-project/OpenSearch
repo: https://github.com/opensearch-project/OpenSearch
docs: https://github.com/opensearch-project/OpenSearch
package-manager:
  brew: opensearch
  nix: opensearch
  pacman: opensearch
package-manager-url: https://formulae.brew.sh/formula/opensearch
version: 3.6.0
license: Apache-2.0
category: development
tags:
  - cli
description: Open source distributed and RESTful search engine
source-archive: https://github.com/opensearch-project/OpenSearch.git
dependencies:
  - openjdk@25
executables:
  - exposure: global executable
    kind: cli
    name: opensearch
  - exposure: global executable
    kind: cli
    name: opensearch-keystore
  - exposure: global executable
    kind: cli
    name: opensearch-plugin
  - exposure: global executable
    kind: cli
    name: opensearch-shard
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Data: $HOMEBREW_PREFIX/var/lib/opensearch/ Logs:
    $HOMEBREW_PREFIX/var/log/opensearch/opensearch_homebrew.log Plugins:
    $HOMEBREW_PREFIX/var/opensearch/plugins/ Config: $HOMEBREW_PREFIX/etc/opensearch/
  post-install-defined: true
  service: declared
install-lines:
  av: sudo av install brew:opensearch
  brew: brew install opensearch
  nix: nix profile install nixpkgs#opensearch
  pacman: sudo pacman -S opensearch
provenance:
  formula: opensearch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
