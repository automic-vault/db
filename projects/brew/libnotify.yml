id: brew:libnotify
display-name: libnotify
homepage: https://gitlab.gnome.org/GNOME/libnotify
repo: https://download.gnome.org/sources/libnotify/0.8/libnotify-0.8.8.tar.xz
docs: https://gitlab.gnome.org/GNOME/libnotify
package-manager:
  apk: libnotify
  brew: libnotify
  dnf: libnotify
  macports: libnotify
  nix: libnotify
  pacman: libnotify
package-manager-url: https://formulae.brew.sh/formula/libnotify
version: 0.8.8
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Library that sends desktop notifications to a notification daemon
source-archive: https://download.gnome.org/sources/libnotify/0.8/libnotify-0.8.8.tar.xz
dependencies:
  - gdk-pixbuf
  - gettext
  - glib
build-dependencies:
  - docbook-xsl
  - gobject-introspection
  - gtk-doc
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: notify-send
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libnotify
  av: sudo av install brew:libnotify
  brew: brew install libnotify
  dnf: sudo dnf install libnotify
  macports: sudo port install libnotify
  nix: nix profile install nixpkgs#libnotify
  pacman: sudo pacman -S libnotify
provenance:
  formula: libnotify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
