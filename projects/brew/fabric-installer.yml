id: brew:fabric-installer
display-name: fabric-installer
homepage: https://fabricmc.net/
repo: >
  https://maven.fabricmc.net/net/fabricmc/fabric-installer/1.1.1/fabric-installer-1.1.1.jar
docs: https://fabricmc.net/
package-manager:
  brew: fabric-installer
  nix: fabric-installer
  winget: FabricMC.FabricInstaller
package-manager-url: https://formulae.brew.sh/formula/fabric-installer
version: 1.1.1
license: Apache-2.0
category: network
tags:
  - cli
description: Installer for Fabric for the vanilla launcher
source-archive: >
  https://maven.fabricmc.net/net/fabricmc/fabric-installer/1.1.1/fabric-installer-1.1.1.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: fabric-installer
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fabric-installer
  brew: brew install fabric-installer
  nix: nix profile install nixpkgs#fabric-installer
  winget: winget install --id FabricMC.FabricInstaller -e
provenance:
  formula: fabric-installer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
