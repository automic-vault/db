id: brew:fuse-zip
display-name: fuse-zip
homepage: https://bitbucket.org/agalanin/fuse-zip
repo: https://bitbucket.org/agalanin/fuse-zip/downloads/fuse-zip-0.7.2.tar.gz
docs: https://bitbucket.org/agalanin/fuse-zip
package-manager:
  brew: fuse-zip
  debian: fuse-zip
  dnf: fuse-zip
  pacman: fuse-zip
  ubuntu: fuse-zip
  zypper: fuse-zip
package-manager-url: https://formulae.brew.sh/formula/fuse-zip
version: 0.7.2
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: FUSE file system to create & manipulate ZIP archives
source-archive: https://bitbucket.org/agalanin/fuse-zip/downloads/fuse-zip-0.7.2.tar.gz
dependencies:
  - libfuse@2
  - libzip
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fuse-zip
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fuse-zip
  brew: brew install fuse-zip
  debian: sudo apt install fuse-zip
  dnf: sudo dnf install fuse-zip
  pacman: sudo pacman -S fuse-zip
  ubuntu: sudo apt install fuse-zip
  zypper: sudo zypper install fuse-zip
provenance:
  formula: fuse-zip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
