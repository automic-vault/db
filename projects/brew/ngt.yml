id: brew:ngt
display-name: ngt
homepage: https://github.com/NGT-labs/NGT
repo: https://github.com/NGT-labs/NGT
docs: https://github.com/NGT-labs/NGT
package-manager:
  brew: ngt
  nix: ngt
package-manager-url: https://formulae.brew.sh/formula/ngt
version: 2.7.4
license: Apache-2.0
category: development
tags:
  - cli
description: Neighborhood graph and tree for indexing high-dimensional data
source-archive: https://github.com/NGT-labs/NGT/archive/refs/tags/v2.7.4.tar.gz
dependencies:
  - libomp
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ngt
  - exposure: global executable
    kind: cli
    name: qbg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ngt
  brew: brew install ngt
  nix: nix profile install nixpkgs#ngt
provenance:
  formula: ngt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
