id: brew:tock
display-name: tock
homepage: https://github.com/kriuchkov/tock
repo: https://github.com/kriuchkov/tock
docs: https://github.com/kriuchkov/tock
package-manager:
  brew: tock
package-manager-url: https://formulae.brew.sh/formula/tock
version: 1.9.8
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Powerful time tracking tool for the command-line
source-archive: https://github.com/kriuchkov/tock/archive/refs/tags/v1.9.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tock
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tock
  brew: brew install tock
provenance:
  formula: tock
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
