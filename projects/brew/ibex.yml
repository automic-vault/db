id: brew:ibex
display-name: ibex
homepage: https://ibex-team.github.io/ibex-lib/
repo: https://github.com/ibex-team/ibex-lib
docs: https://ibex-team.github.io/ibex-lib/
package-manager:
  brew: ibex
package-manager-url: https://formulae.brew.sh/formula/ibex
version: 2.9.1
license: LGPL-3.0-only
category: development
tags:
  - cli
description: C++ library for constraint processing over real numbers
source-archive: https://github.com/ibex-team/ibex-lib/archive/refs/tags/ibex-2.9.1.tar.gz
build-dependencies:
  - bison
  - cmake
  - flex
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ibexopt
  - exposure: global executable
    kind: cli
    name: ibexsolve
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ibex
  brew: brew install ibex
provenance:
  formula: ibex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
