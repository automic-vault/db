id: brew:svt-av1
display-name: svt-av1
homepage: https://gitlab.com/AOMediaCodec/SVT-AV1
repo: https://gitlab.com/AOMediaCodec/SVT-AV1/-/archive/v4.1.0/SVT-AV1-v4.1.0.tar.bz2
docs: https://gitlab.com/AOMediaCodec/SVT-AV1
package-manager:
