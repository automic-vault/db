  nix: svt-av1
  pacman: svt-av1
  ubuntu: svt-av1
  zypper: SVT-AV1
package-manager-url: https://formulae.brew.sh/formula/svt-av1
version: 4.1.0
license: BSD-3-Clause
category: development
tags:
