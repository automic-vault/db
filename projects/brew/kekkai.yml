id: brew:kekkai
display-name: kekkai
homepage: https://github.com/catatsuy/kekkai
repo: https://github.com/catatsuy/kekkai
docs: https://github.com/catatsuy/kekkai
package-manager:
  brew: kekkai
package-manager-url: https://formulae.brew.sh/formula/kekkai
version: 0.2.7
license: MIT
category: development
tags:
  - cli
description: File integrity monitoring tool
source-archive: https://github.com/catatsuy/kekkai/archive/refs/tags/v0.2.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kekkai
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kekkai
  brew: brew install kekkai
provenance:
  formula: kekkai
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
