id: brew:unp
display-name: unp
homepage: https://tracker.debian.org/pkg/unp
repo: https://deb.debian.org/debian/pool/main/u/unp/unp_2.0.tar.xz
docs: https://tracker.debian.org/pkg/unp
package-manager:
  brew: unp
  debian: unp
  macports: unp
  nix: unp
  pacman: unp
  ubuntu: unp
package-manager-url: https://formulae.brew.sh/formula/unp
version: 2.0
license: GPL-2.0-only
category: network
tags:
  - cli
description: Unpack everything with one command
source-archive: https://deb.debian.org/debian/pool/main/u/unp/unp_2.0.tar.xz
dependencies:
  - p7zip
executables:
  - exposure: global executable
    kind: cli
    name: ucat
  - exposure: global executable
    kind: cli
    name: unp
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:unp
  brew: brew install unp
  debian: sudo apt install unp
  macports: sudo port install unp
  nix: nix profile install nixpkgs#unp
  pacman: sudo pacman -S unp
  ubuntu: sudo apt install unp
provenance:
  formula: unp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
