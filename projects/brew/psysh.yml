id: brew:psysh
display-name: psysh
homepage: https://psysh.org/
repo: https://github.com/bobthecow/psysh
docs: https://psysh.org/
package-manager:
  brew: psysh
  nix: psysh
package-manager-url: https://formulae.brew.sh/formula/psysh
version: 0.12.23
license: MIT
category: development
tags:
  - cli
description: Runtime developer console, interactive debugger and REPL for PHP
source-archive: https://github.com/bobthecow/psysh/releases/download/v0.12.23/psysh-v0.12.23.tar.gz
dependencies:
  - php
executables:
  - exposure: global executable
    kind: cli
    name: psysh
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:psysh
  brew: brew install psysh
  nix: nix profile install nixpkgs#psysh
provenance:
  formula: psysh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
