id: brew:tiger-vnc
display-name: tiger-vnc
homepage: https://tigervnc.org/
repo: https://github.com/TigerVNC/tigervnc
docs: https://tigervnc.org/
package-manager:
  brew: tiger-vnc
  scoop: extras/vncviewer
  winget: RealVNC.VNCViewer
package-manager-url: https://formulae.brew.sh/formula/tiger-vnc
version: 1.16.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: High-performance, platform-neutral implementation of VNC
source-archive: https://github.com/TigerVNC/tigervnc/archive/refs/tags/v1.16.2.tar.gz
dependencies:
  - fltk@1.3
  - gettext
  - gmp
  - gnutls
  - jpeg-turbo
  - nettle
  - pixman
build-dependencies:
  - cmake
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: vncconfig
  - exposure: global executable
    kind: cli
    name: vncpasswd
  - exposure: global executable
    kind: cli
    name: vncsession
  - exposure: global executable
    kind: cli
    name: vncviewer
  - exposure: global executable
    kind: cli
    name: x0vncserver
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tiger-vnc
  brew: brew install tiger-vnc
  scoop: scoop install extras/vncviewer
  winget: winget install --id RealVNC.VNCViewer -e
provenance:
  formula: tiger-vnc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
