id: brew:wakeonlan
display-name: wakeonlan
homepage: https://github.com/jpoliv/wakeonlan
repo: https://github.com/jpoliv/wakeonlan
docs: https://github.com/jpoliv/wakeonlan
package-manager:
  apk: wakeonlan
  brew: wakeonlan
  debian: wakeonlan
  macports: wakeonlan
  nix: wakeonlan
  pacman: wakeonlan
  ubuntu: wakeonlan
  winget: NewCloud.WakeOnLan
package-manager-url: https://formulae.brew.sh/formula/wakeonlan
version: 0.42
license: Artistic-1.0-Perl
category: development
tags:
  - cli
description: Sends magic packets to wake up network-devices
source-archive: https://github.com/jpoliv/wakeonlan/archive/refs/tags/v0.42.tar.gz
build-dependencies:
  - perl
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: wakeonlan
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wakeonlan
  av: sudo av install brew:wakeonlan
  brew: brew install wakeonlan
  debian: sudo apt install wakeonlan
  macports: sudo port install wakeonlan
  nix: nix profile install nixpkgs#wakeonlan
  pacman: sudo pacman -S wakeonlan
  ubuntu: sudo apt install wakeonlan
  winget: winget install --id NewCloud.WakeOnLan -e
provenance:
  formula: wakeonlan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
