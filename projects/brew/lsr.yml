id: brew:lsr
display-name: lsr
homepage: https://tangled.sh/@rockorager.dev/lsr
repo: https://tangled.sh/@rockorager.dev/lsr
docs: https://tangled.sh/@rockorager.dev/lsr
package-manager:
  brew: lsr
  nix: lsr
package-manager-url: https://formulae.brew.sh/formula/lsr
version: 1.0.0
license: MIT
category: network
tags:
  - cli
description: Ls but with io_uring
source-archive: https://tangled.sh/@rockorager.dev/lsr
build-dependencies:
  - zig@0.14
executables:
  - exposure: global executable
    kind: cli
    name: lsr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lsr
  brew: brew install lsr
  nix: nix profile install nixpkgs#lsr
provenance:
  formula: lsr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
