id: brew:mu
display-name: mu
homepage: https://www.djcbsoftware.nl/code/mu/
repo: https://github.com/djcb/mu
docs: https://www.djcbsoftware.nl/code/mu/
package-manager:
  apk: mu
  brew: mu
  macports: mu
  nix: mu
  winget: Mu.Mu
package-manager-url: https://formulae.brew.sh/formula/mu
version: 1.14.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Tool for searching e-mail messages stored in the maildir-format
source-archive: https://github.com/djcb/mu/releases/download/v1.14.1/mu-1.14.1.tar.xz
dependencies:
  - fmt
  - gettext
  - glib
  - gmime
  - guile
  - xapian
build-dependencies:
  - cli11
  - emacs
  - libgpg-error
  - libtool
  - meson
  - ninja
  - pkgconf
  - texinfo
executables:
  - exposure: global executable
    kind: cli
    name: mu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mu
  av: sudo av install brew:mu
  brew: brew install mu
  macports: sudo port install mu
  nix: nix profile install nixpkgs#mu
  winget: winget install --id Mu.Mu -e
provenance:
  formula: mu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
