id: brew:netfetch
display-name: netfetch
homepage: https://github.com/deggja/netfetch
repo: https://github.com/deggja/netfetch
docs: https://github.com/deggja/netfetch
package-manager:
  brew: netfetch
  nix: netfetch
  zypper: netfetch
package-manager-url: https://formulae.brew.sh/formula/netfetch
version: 0.5.4
license: MIT
category: development
tags:
  - cli
description: K8s tool to scan clusters for network policies and unprotected workloads
source-archive: https://github.com/deggja/netfetch/archive/refs/tags/v0.5.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: netfetch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:netfetch
  brew: brew install netfetch
  nix: nix profile install nixpkgs#netfetch
  zypper: sudo zypper install netfetch
provenance:
  formula: netfetch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
