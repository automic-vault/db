id: brew:molten-vk
display-name: molten-vk
homepage: https://github.com/KhronosGroup/MoltenVK
repo: https://github.com/KhronosGroup/MoltenVK
docs: https://github.com/KhronosGroup/MoltenVK
package-manager:
  brew: molten-vk
package-manager-url: https://formulae.brew.sh/formula/molten-vk
version: 1.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: Implementation of the Vulkan graphics and compute API on top of Metal
source-archive: https://github.com/KhronosGroup/MoltenVK/archive/refs/tags/v1.4.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: MoltenVKShaderConverter
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:molten-vk
  brew: brew install molten-vk
provenance:
  formula: molten-vk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
