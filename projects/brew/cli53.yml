id: brew:cli53
display-name: cli53
homepage: https://github.com/barnybug/cli53
repo: https://github.com/barnybug/cli53
docs: https://github.com/barnybug/cli53
package-manager:
  brew: cli53
  nix: cli53
package-manager-url: https://formulae.brew.sh/formula/cli53
version: 0.9.0
license: MIT
category: development
tags:
  - cli
description: Command-line tool for Amazon Route 53
source-archive: https://github.com/barnybug/cli53/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cli53
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cli53
  brew: brew install cli53
  nix: nix profile install nixpkgs#cli53
provenance:
  formula: cli53
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
