id: brew:git-grab
display-name: git-grab
homepage: https://github.com/wezm/git-grab
repo: https://github.com/wezm/git-grab
docs: https://github.com/wezm/git-grab
package-manager:
  brew: git-grab
  pacman: git-grab
  winget: wezm.git-grab
package-manager-url: https://formulae.brew.sh/formula/git-grab
version: 4.0.1
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
  - git
description: Clone a git repository into a standard location organised by domain and path
source-archive: https://github.com/wezm/git-grab/archive/refs/tags/4.0.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: git-grab
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-grab
  brew: brew install git-grab
  pacman: sudo pacman -S git-grab
  winget: winget install --id wezm.git-grab -e
provenance:
  formula: git-grab
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
