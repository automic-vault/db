id: brew:ssocr
display-name: ssocr
homepage: https://www.unix-ag.uni-kl.de/~auerswal/ssocr/
repo: https://www.unix-ag.uni-kl.de/~auerswal/ssocr/ssocr-2.25.1.tar.bz2
docs: https://www.unix-ag.uni-kl.de/~auerswal/ssocr/
package-manager:
  brew: ssocr
  debian: ssocr
  nix: ssocr
  ubuntu: ssocr
package-manager-url: https://formulae.brew.sh/formula/ssocr
version: 2.25.1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Seven Segment Optical Character Recognition
source-archive: https://www.unix-ag.uni-kl.de/~auerswal/ssocr/ssocr-2.25.1.tar.bz2
dependencies:
  - imlib2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ssocr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ssocr
  brew: brew install ssocr
  debian: sudo apt install ssocr
  nix: nix profile install nixpkgs#ssocr
  ubuntu: sudo apt install ssocr
provenance:
  formula: ssocr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
