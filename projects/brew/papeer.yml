id: brew:papeer
display-name: papeer
homepage: https://papeer.tech
repo: https://github.com/lapwat/papeer
docs: https://papeer.tech
package-manager:
  brew: papeer
  nix: papeer
package-manager-url: https://formulae.brew.sh/formula/papeer
version: 0.8.8
license: GPL-3.0-only
category: development
tags:
  - cli
description: Convert websites into eBooks and Markdown
source-archive: https://github.com/lapwat/papeer/archive/refs/tags/v0.8.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: papeer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:papeer
  brew: brew install papeer
  nix: nix profile install nixpkgs#papeer
provenance:
  formula: papeer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
