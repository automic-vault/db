id: brew:swig
display-name: swig
homepage: https://www.swig.org/
repo: https://downloads.sourceforge.net/project/swig/swig/swig-4.4.1/swig-4.4.1.tar.gz
docs: https://www.swig.org/
package-manager:
  apk: swig
  brew: swig
  chocolatey: swig
  debian: swig
  dnf: swig
  macports: swig
  nix: swig
  pacman: swig
  scoop: main/swig
  ubuntu: swig
  winget: SWIG.SWIG
  zypper: swig
package-manager-url: https://formulae.brew.sh/formula/swig
version: 4.4.1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Generate scripting interfaces to C/C++ code
source-archive: https://downloads.sourceforge.net/project/swig/swig/swig-4.4.1/swig-4.4.1.tar.gz
dependencies:
  - pcre2
executables:
  - exposure: global executable
    kind: cli
    name: ccache-swig
  - exposure: global executable
    kind: cli
    name: swig
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add swig
  av: sudo av install brew:swig
  brew: brew install swig
  chocolatey: choco install swig
  debian: sudo apt install swig
  dnf: sudo dnf install swig
  macports: sudo port install swig
  nix: nix profile install nixpkgs#swig
  pacman: sudo pacman -S swig
  scoop: scoop install main/swig
  ubuntu: sudo apt install swig
  winget: winget install --id SWIG.SWIG -e
  zypper: sudo zypper install swig
provenance:
  formula: swig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
