id: brew:mupen64plus
display-name: mupen64plus
homepage: https://www.mupen64plus.org/
repo: https://github.com/mupen64plus/mupen64plus-core
docs: https://www.mupen64plus.org/
package-manager:
  apk: mupen64plus
  brew: mupen64plus
  dnf: mupen64plus
  nix: mupen64plus
  pacman: mupen64plus
package-manager-url: https://formulae.brew.sh/formula/mupen64plus
version: 2.6.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Cross-platform plugin-based N64 emulator
source-archive: >
  https://github.com/mupen64plus/mupen64plus-core/releases/download/2.6.0/mupen64plus-bundle-src-2.6.0.tar.gz
dependencies:
  - freetype
  - libpng
  - sdl2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mupen64plus
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mupen64plus
  av: sudo av install brew:mupen64plus
  brew: brew install mupen64plus
  dnf: sudo dnf install mupen64plus
  nix: nix profile install nixpkgs#mupen64plus
  pacman: sudo pacman -S mupen64plus
provenance:
  formula: mupen64plus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
