id: brew:github-markdown-toc
display-name: github-markdown-toc
homepage: https://github.com/ekalinin/github-markdown-toc.go
repo: https://github.com/ekalinin/github-markdown-toc.go
docs: https://github.com/ekalinin/github-markdown-toc.go
package-manager:
  brew: github-markdown-toc
package-manager-url: https://formulae.brew.sh/formula/github-markdown-toc
version: 2.0.1
license: MIT
category: development
tags:
  - cli
description: Easy TOC creation for GitHub README.md (in go)
source-archive: https://github.com/ekalinin/github-markdown-toc.go/archive/refs/tags/v2.0.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gh-md-toc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:github-markdown-toc
  brew: brew install github-markdown-toc
provenance:
  formula: github-markdown-toc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
