id: brew:macpine
display-name: macpine
homepage: https://beringresearch.github.io/macpine/
repo: https://github.com/beringresearch/macpine
docs: https://beringresearch.github.io/macpine/
package-manager:
  apk: alpine
  brew: macpine
  debian: alpine
  dnf: alpine
  macports: macpine
  nix: alpine
  ubuntu: alpine
  zypper: alpine
package-manager-url: https://formulae.brew.sh/formula/macpine
version: 1.1.5
license: Apache-2.0
category: development
tags:
  - cli
description: Lightweight Linux VMs on MacOS
source-archive: https://github.com/beringresearch/macpine/archive/refs/tags/v1.1.5.tar.gz
dependencies:
  - qemu
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: alpine
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add alpine
  av: sudo av install brew:macpine
  brew: brew install macpine
  debian: sudo apt install alpine
  dnf: sudo dnf install alpine
  macports: sudo port install macpine
  nix: nix profile install nixpkgs#alpine
  ubuntu: sudo apt install alpine
  zypper: sudo zypper install alpine
provenance:
  formula: macpine
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
