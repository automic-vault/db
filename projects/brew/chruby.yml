id: brew:chruby
display-name: chruby
homepage: https://github.com/postmodern/chruby
repo: https://github.com/postmodern/chruby
docs: https://github.com/postmodern/chruby
package-manager:
  brew: chruby
  macports: chruby
  nix: chruby
package-manager-url: https://formulae.brew.sh/formula/chruby
version: 0.3.9
license: MIT
category: development
tags:
  - cli
description: Ruby environment tool
source-archive: https://github.com/postmodern/chruby/releases/download/v0.3.9/chruby-0.3.9.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: chruby-exec
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Add the following to the ~/.bash_profile or ~/.zshrc file: source
    $HOMEBREW_PREFIX/opt/chruby/share/chruby/chruby.sh To enable auto-switching of
    Rubies specified by .ruby-version files, add the following to ~/.bash_profile or
    ~/.zshrc: source $HOMEBREW_PREFIX/opt/chruby/share/chruby/auto.sh
  post-install-defined: false
install-lines:
  av: sudo av install brew:chruby
  brew: brew install chruby
  macports: sudo port install chruby
  nix: nix profile install nixpkgs#chruby
provenance:
  formula: chruby
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
