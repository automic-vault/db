id: brew:ansible-lint
display-name: ansible-lint
homepage: https://ansible-lint.readthedocs.io/
repo: >
  https://files.pythonhosted.org/packages/e4/39/54f7cc264f7f02c635af786c4a57da4ab993865140f90e031cdec39dd514/ansible_lint-26.4.0.tar.gz
docs: https://ansible-lint.readthedocs.io/
package-manager:
  apk: ansible-lint
  brew: ansible-lint
  debian: ansible-lint
  macports: ansible-lint
  nix: ansible-lint
  pacman: ansible-lint
  ubuntu: ansible-lint
  zypper: ansible-lint
package-manager-url: https://formulae.brew.sh/formula/ansible-lint
version: 26.4.0
license: MIT AND GPL-3.0-or-later
category: development
tags:
  - cli
description: Checks ansible playbooks for practices and behaviour
source-archive: >
  https://files.pythonhosted.org/packages/e4/39/54f7cc264f7f02c635af786c4a57da4ab993865140f90e031cdec39dd514/ansible_lint-26.4.0.tar.gz
dependencies:
  - cryptography
  - libyaml
  - python@3.14
  - rpds-py
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ansible-lint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ansible-lint
  av: sudo av install brew:ansible-lint
  brew: brew install ansible-lint
  debian: sudo apt install ansible-lint
  macports: sudo port install ansible-lint
  nix: nix profile install nixpkgs#ansible-lint
  pacman: sudo pacman -S ansible-lint
  ubuntu: sudo apt install ansible-lint
  zypper: sudo zypper install ansible-lint
provenance:
  formula: ansible-lint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
