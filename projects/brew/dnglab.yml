id: brew:dnglab
display-name: dnglab
homepage: https://github.com/dnglab/dnglab
repo: https://github.com/dnglab/dnglab
docs: https://github.com/dnglab/dnglab
package-manager:
  brew: dnglab
  nix: dnglab
  zypper: dnglab
package-manager-url: https://formulae.brew.sh/formula/dnglab
version: 0.7.2
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Camera RAW to DNG file format converter
source-archive: https://github.com/dnglab/dnglab/archive/refs/tags/v0.7.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dnglab
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dnglab
  brew: brew install dnglab
  nix: nix profile install nixpkgs#dnglab
  zypper: sudo zypper install dnglab
provenance:
  formula: dnglab
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
