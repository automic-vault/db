id: brew:ironclaw
display-name: ironclaw
homepage: https://github.com/nearai/ironclaw
repo: https://github.com/nearai/ironclaw
docs: https://github.com/nearai/ironclaw
package-manager:
  brew: ironclaw
  scoop: main/ironclaw
  winget: NearAI.IronClaw
package-manager-url: https://formulae.brew.sh/formula/ironclaw
version: 0.29.0
license: MIT OR Apache-2.0
category: security
tags:
  - cli
  - security
description: Security-first personal AI assistant with WASM sandbox channels
source-archive: https://github.com/nearai/ironclaw/archive/refs/tags/ironclaw-v0.29.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ironclaw
  - exposure: global executable
    kind: cli
    name: sandbox_daemon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:ironclaw
  brew: brew install ironclaw
  scoop: scoop install main/ironclaw
  winget: winget install --id NearAI.IronClaw -e
provenance:
  formula: ironclaw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
