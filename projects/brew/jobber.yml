id: brew:jobber
display-name: jobber
homepage: https://dshearer.github.io/jobber/
repo: https://github.com/dshearer/jobber
docs: https://dshearer.github.io/jobber/
package-manager:
  brew: jobber
  nix: jobber
package-manager-url: https://formulae.brew.sh/formula/jobber
version: 1.4.4
license: MIT
category: development
tags:
  - cli
description: Alternative to cron, with better status-reporting and error-handling
source-archive: https://github.com/dshearer/jobber/archive/refs/tags/v1.4.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jobber
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:jobber
  brew: brew install jobber
  nix: nix profile install nixpkgs#jobber
provenance:
  formula: jobber
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
