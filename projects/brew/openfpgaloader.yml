id: brew:openfpgaloader
display-name: openfpgaloader
homepage: https://github.com/trabucayre/openFPGALoader
repo: https://github.com/trabucayre/openFPGALoader
docs: https://github.com/trabucayre/openFPGALoader
package-manager:
  apk: openfpgaloader
  brew: openfpgaloader
  debian: openfpgaloader
  nix: openfpgaloader
  pacman: openfpgaloader
  ubuntu: openfpgaloader
package-manager-url: https://formulae.brew.sh/formula/openfpgaloader
version: 1.1.1
license: Apache-2.0
category: development
tags:
  - cli
description: Universal utility for programming FPGA
source-archive: https://github.com/trabucayre/openFPGALoader/archive/refs/tags/v1.1.1.tar.gz
dependencies:
  - libftdi
  - libusb
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: openFPGALoader
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add openfpgaloader
  av: sudo av install brew:openfpgaloader
  brew: brew install openfpgaloader
  debian: sudo apt install openfpgaloader
  nix: nix profile install nixpkgs#openfpgaloader
  pacman: sudo pacman -S openfpgaloader
  ubuntu: sudo apt install openfpgaloader
provenance:
  formula: openfpgaloader
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
