id: brew:immortal
display-name: immortal
homepage: https://immortal.run/
repo: https://github.com/immortal/immortal
docs: https://immortal.run/
package-manager:
  brew: immortal
package-manager-url: https://formulae.brew.sh/formula/immortal
version: 0.24.6
license: BSD-3-Clause
category: development
tags:
  - cli
description: OS agnostic (*nix) cross-platform supervisor
source-archive: https://github.com/immortal/immortal/archive/refs/tags/v0.24.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: immortal
  - exposure: global executable
    kind: cli
    name: immortalctl
  - exposure: global executable
    kind: cli
    name: immortaldir
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:immortal
  brew: brew install immortal
provenance:
  formula: immortal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
