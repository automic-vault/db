id: brew:amtterm
display-name: amtterm
homepage: https://www.kraxel.org/blog/linux/amtterm/
repo: https://gitlab.com/kraxel/amtterm/-/archive/amtterm-1.8-1/amtterm-amtterm-1.8-1.tar.bz2
docs: https://www.kraxel.org/blog/linux/amtterm/
package-manager:
  brew: amtterm
  debian: amtterm
  dnf: amtterm
  nix: amtterm
  ubuntu: amtterm
  zypper: amtterm
package-manager-url: https://formulae.brew.sh/formula/amtterm
version: 1.8-1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Serial-over-LAN (sol) client for Intel AMT
source-archive: https://gitlab.com/kraxel/amtterm/-/archive/amtterm-1.8-1/amtterm-amtterm-1.8-1.tar.bz2
dependencies:
  - glib
  - gnutls
  - meson
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: amtider
  - exposure: global executable
    kind: cli
    name: amtterm
  - exposure: global executable
    kind: cli
    name: amttool
  - exposure: global executable
    kind: cli
    name: gamt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:amtterm
  brew: brew install amtterm
  debian: sudo apt install amtterm
  dnf: sudo dnf install amtterm
  nix: nix profile install nixpkgs#amtterm
  ubuntu: sudo apt install amtterm
  zypper: sudo zypper install amtterm
provenance:
  formula: amtterm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
