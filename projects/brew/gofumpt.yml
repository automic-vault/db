id: brew:gofumpt
display-name: gofumpt
homepage: https://github.com/mvdan/gofumpt
repo: https://github.com/mvdan/gofumpt
docs: https://github.com/mvdan/gofumpt
package-manager:
  brew: gofumpt
  nix: gofumpt
  pacman: gofumpt
package-manager-url: https://formulae.brew.sh/formula/gofumpt
version: 0.10.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Stricter gofmt
source-archive: https://github.com/mvdan/gofumpt/archive/refs/tags/v0.10.0.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gofumpt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gofumpt
  brew: brew install gofumpt
  nix: nix profile install nixpkgs#gofumpt
  pacman: sudo pacman -S gofumpt
provenance:
  formula: gofumpt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
