id: brew:rpcsvc-proto
display-name: rpcsvc-proto
homepage: https://github.com/thkukuk/rpcsvc-proto
repo: https://github.com/thkukuk/rpcsvc-proto
docs: https://github.com/thkukuk/rpcsvc-proto
package-manager:
  apk: rpcsvc-proto
  brew: rpcsvc-proto
  debian: rpcsvc-proto
  dnf: rpcgen
  nix: rpcsvc-proto
  pacman: rpcsvc-proto
  ubuntu: rpcsvc-proto
  zypper: rpcgen
package-manager-url: https://formulae.brew.sh/formula/rpcsvc-proto
version: 1.4.4
license: BSD-3-Clause
category: development
tags:
  - cli
description: Rpcsvc protocol definitions from glibc
source-archive: >
  https://github.com/thkukuk/rpcsvc-proto/releases/download/v1.4.4/rpcsvc-proto-1.4.4.tar.xz
dependencies:
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: rpcgen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rpcsvc-proto
  av: sudo av install brew:rpcsvc-proto
  brew: brew install rpcsvc-proto
  debian: sudo apt install rpcsvc-proto
  dnf: sudo dnf install rpcgen
  nix: nix profile install nixpkgs#rpcsvc-proto
  pacman: sudo pacman -S rpcsvc-proto
  ubuntu: sudo apt install rpcsvc-proto
  zypper: sudo zypper install rpcgen
provenance:
  formula: rpcsvc-proto
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
