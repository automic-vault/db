id: brew:cpuid
display-name: cpuid
homepage: https://github.com/klauspost/cpuid
repo: https://github.com/klauspost/cpuid
docs: https://github.com/klauspost/cpuid
package-manager:
  brew: cpuid
  debian: cpuid
  dnf: cpuid
  macports: cpuid
  nix: cpuid
  ubuntu: cpuid
  zypper: cpuid
package-manager-url: https://formulae.brew.sh/formula/cpuid
version: 2.3.0
license: MIT
category: development
tags:
  - cli
description: CPU feature identification for Go
source-archive: https://github.com/klauspost/cpuid/archive/refs/tags/v2.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cpuid
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cpuid
  brew: brew install cpuid
  debian: sudo apt install cpuid
  dnf: sudo dnf install cpuid
  macports: sudo port install cpuid
  nix: nix profile install nixpkgs#cpuid
  ubuntu: sudo apt install cpuid
  zypper: sudo zypper install cpuid
provenance:
  formula: cpuid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
