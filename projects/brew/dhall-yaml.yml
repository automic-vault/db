id: brew:dhall-yaml
display-name: dhall-yaml
homepage: https://github.com/dhall-lang/dhall-haskell/tree/main/dhall-yaml
repo: https://hackage.haskell.org/package/dhall-yaml-1.2.12/dhall-yaml-1.2.12.tar.gz
docs: https://github.com/dhall-lang/dhall-haskell/tree/main/dhall-yaml
package-manager:
  brew: dhall-yaml
  nix: dhall-yaml
  pacman: dhall-yaml
package-manager-url: https://formulae.brew.sh/formula/dhall-yaml
version: 1.2.12
license: BSD-3-Clause
category: development
tags:
  - cli
  - yaml
description: Convert between Dhall and YAML
source-archive: https://hackage.haskell.org/package/dhall-yaml-1.2.12/dhall-yaml-1.2.12.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: dhall-to-yaml-ng
  - exposure: global executable
    kind: cli
    name: yaml-to-dhall
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dhall-yaml
  brew: brew install dhall-yaml
  nix: nix profile install nixpkgs#dhall-yaml
  pacman: sudo pacman -S dhall-yaml
provenance:
  formula: dhall-yaml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
