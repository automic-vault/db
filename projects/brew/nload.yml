id: brew:nload
display-name: nload
homepage: https://www.roland-riegel.de/nload/
repo: https://www.roland-riegel.de/nload/nload-0.7.4.tar.gz
docs: https://www.roland-riegel.de/nload/
package-manager:
  apk: nload
  brew: nload
  debian: nload
  dnf: nload
  macports: nload
  nix: nload
  pacman: nload
  ubuntu: nload
  zypper: nload
package-manager-url: https://formulae.brew.sh/formula/nload
version: 0.7.4
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Realtime console network usage monitor
source-archive: https://www.roland-riegel.de/nload/nload-0.7.4.tar.gz
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: nload
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nload
  av: sudo av install brew:nload
  brew: brew install nload
  debian: sudo apt install nload
  dnf: sudo dnf install nload
  macports: sudo port install nload
  nix: nix profile install nixpkgs#nload
  pacman: sudo pacman -S nload
  ubuntu: sudo apt install nload
  zypper: sudo zypper install nload
provenance:
  formula: nload
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
