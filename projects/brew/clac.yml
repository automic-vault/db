id: brew:clac
display-name: clac
homepage: https://github.com/soveran/clac
repo: https://github.com/soveran/clac
docs: https://github.com/soveran/clac
package-manager:
  brew: clac
  macports: clac
  nix: clac
package-manager-url: https://formulae.brew.sh/formula/clac
version: 0.3.5
license: BSD-2-Clause
category: development
tags:
  - cli
description: Command-line, stack-based calculator with postfix notation
source-archive: https://github.com/soveran/clac/archive/refs/tags/0.3.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: clac
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clac
  brew: brew install clac
  macports: sudo port install clac
  nix: nix profile install nixpkgs#clac
provenance:
  formula: clac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
