id: brew:k9s
display-name: k9s
homepage: https://k9scli.io/
repo: https://github.com/derailed/k9s
docs: https://k9scli.io/
package-manager:
  apk: k9s
  brew: k9s
  chocolatey: k9s
  dnf: k9s
  macports: k9s
  nix: k9s
  pacman: k9s
  scoop: main/k9s
  winget: Derailed.k9s
  zypper: k9s
package-manager-url: https://formulae.brew.sh/formula/k9s
version: 0.50.18
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes CLI To Manage Your Clusters In Style!
source-archive: https://github.com/derailed/k9s.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: k9s
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add k9s
  av: sudo av install brew:k9s
  brew: brew install k9s
  chocolatey: choco install k9s
  dnf: sudo dnf install k9s
  macports: sudo port install k9s
  nix: nix profile install nixpkgs#k9s
  pacman: sudo pacman -S k9s
  scoop: scoop install main/k9s
  winget: winget install --id Derailed.k9s -e
  zypper: sudo zypper install k9s
provenance:
  formula: k9s
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
