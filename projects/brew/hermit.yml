id: brew:hermit
display-name: hermit
homepage: https://cashapp.github.io/hermit
repo: https://github.com/cashapp/hermit
docs: https://cashapp.github.io/hermit
package-manager:
  brew: hermit
  macports: hermit
  nix: hermit
package-manager-url: https://formulae.brew.sh/formula/hermit
version: 0.52.1
license: Apache-2.0
category: development
tags:
  - cli
description: Manages isolated, self-bootstrapping sets of tools in software projects
source-archive: https://github.com/cashapp/hermit/archive/refs/tags/v0.52.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hermit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    For shell integration hooks, add the following to your shell configuration: For
    bash, add the following command to your .bashrc: eval "$(test -x $(brew
    --prefix)/bin/hermit && $(brew --prefix)/bin/hermit shell-hooks --print --bash)" For
    zsh, add the following command to your .zshrc: eval "$(test -x $(brew
    --prefix)/bin/hermit && $(brew --prefix)/bin/hermit shell-hooks --print --zsh)"
  post-install-defined: false
install-lines:
  av: sudo av install brew:hermit
  brew: brew install hermit
  macports: sudo port install hermit
  nix: nix profile install nixpkgs#hermit
provenance:
  formula: hermit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
