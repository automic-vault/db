id: brew:portal
display-name: portal
homepage: https://github.com/SpatiumPortae/portal
repo: https://github.com/SpatiumPortae/portal
docs: https://github.com/SpatiumPortae/portal
package-manager:
  brew: portal
  nix: portal
  scoop: main/portal
  winget: SpatiumPortae.portal
package-manager-url: https://formulae.brew.sh/formula/portal
version: 1.2.3
license: MIT
category: development
tags:
  - cli
description: Quick and easy command-line file transfer utility from any computer to another
source-archive: https://github.com/SpatiumPortae/portal/archive/refs/tags/v1.2.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: portal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:portal
  brew: brew install portal
  nix: nix profile install nixpkgs#portal
  scoop: scoop install main/portal
  winget: winget install --id SpatiumPortae.portal -e
provenance:
  formula: portal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
