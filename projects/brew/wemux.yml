id: brew:wemux
display-name: wemux
homepage: https://github.com/zolrath/wemux
repo: https://github.com/zolrath/wemux
docs: https://github.com/zolrath/wemux
package-manager:
  brew: wemux
  dnf: wemux
  macports: wemux
  nix: wemux
package-manager-url: https://formulae.brew.sh/formula/wemux
version: 3.2.0
license: MIT
category: development
tags:
  - cli
description: Enhances tmux's to provide multiuser terminal multiplexing
source-archive: https://github.com/zolrath/wemux/archive/refs/tags/v3.2.0.tar.gz
dependencies:
  - tmux
executables:
  - exposure: global executable
    kind: cli
    name: wemux
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Your current user account has been automatically added as a wemux host. To give a
    user the ability to host wemux sessions add them to the host_list array in:
    $HOMEBREW_PREFIX/etc/wemux.conf Either edit the file in your text editor of choice
    or run `wemux conf` to open the file in your $EDITOR.
  post-install-defined: true
install-lines:
  av: sudo av install brew:wemux
  brew: brew install wemux
  dnf: sudo dnf install wemux
  macports: sudo port install wemux
  nix: nix profile install nixpkgs#wemux
provenance:
  formula: wemux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
