id: brew:frum
display-name: frum
homepage: https://github.com/TaKO8Ki/frum/
repo: https://github.com/TaKO8Ki/frum
docs: https://github.com/TaKO8Ki/frum/
package-manager:
  brew: frum
package-manager-url: https://formulae.brew.sh/formula/frum
version: 0.1.2
license: MIT
category: development
tags:
  - cli
description: Fast and modern Ruby version manager written in Rust
source-archive: https://github.com/TaKO8Ki/frum/archive/refs/tags/v0.1.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: frum
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:frum
  brew: brew install frum
provenance:
  formula: frum
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
