id: brew:libxo
display-name: libxo
homepage: https://juniper.github.io/libxo/libxo-manual.html
repo: https://github.com/Juniper/libxo
docs: https://juniper.github.io/libxo/libxo-manual.html
package-manager:
  apk: libxo
  brew: libxo
  dnf: libxo
  macports: libxo
  nix: libxo
package-manager-url: https://formulae.brew.sh/formula/libxo
version: 1.7.5
license: BSD-2-Clause
category: development
tags:
  - cli
  - json
description: Allows an application to generate text, XML, JSON, and HTML output
source-archive: https://github.com/Juniper/libxo/releases/download/1.7.5/libxo-1.7.5.tar.gz
build-dependencies:
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: libxo-config
  - exposure: global executable
    kind: cli
    name: xo
  - exposure: global executable
    kind: cli
    name: xohtml
  - exposure: global executable
    kind: cli
    name: xolint
  - exposure: global executable
    kind: cli
    name: xopo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libxo
  av: sudo av install brew:libxo
  brew: brew install libxo
  dnf: sudo dnf install libxo
  macports: sudo port install libxo
  nix: nix profile install nixpkgs#libxo
provenance:
  formula: libxo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
