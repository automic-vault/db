id: brew:gecode
display-name: gecode
homepage: https://www.gecode.org/
repo: https://github.com/Gecode/gecode
docs: https://www.gecode.org/
package-manager:
  brew: gecode
  macports: gecode
  nix: gecode
package-manager-url: https://formulae.brew.sh/formula/gecode
version: 6.2.0
license: MIT
category: development
tags:
  - cli
description: Toolkit for developing constraint-based systems and applications
source-archive: https://github.com/Gecode/gecode/archive/refs/tags/release-6.2.0.tar.gz
dependencies:
  - qtbase
executables:
  - exposure: global executable
    kind: cli
    name: fzn-gecode
  - exposure: global executable
    kind: cli
    name: mzn-gecode
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gecode
  brew: brew install gecode
  macports: sudo port install gecode
  nix: nix profile install nixpkgs#gecode
provenance:
  formula: gecode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
