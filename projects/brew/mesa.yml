id: brew:mesa
display-name: mesa
homepage: https://www.mesa3d.org/
repo: https://archive.mesa3d.org/mesa-26.0.6.tar.xz
docs: https://www.mesa3d.org/
package-manager:
  apk: mesa
  brew: mesa
  macports: mesa
  nix: mesa
  pacman: mesa
  zypper: Mesa
package-manager-url: https://formulae.brew.sh/formula/mesa
version: 26.0.6
license: >
  MIT AND Apache-2.0 AND BSD-2-Clause AND BSD-3-Clause AND BSL-1.0 AND HPND AND
  HPND-sell-variant AND ICU AND MIT-Khronos-old AND SGI-B-2.0 AND
  LicenseRef-Homebrew-public-domain AND (GPL-1.0-or-later WITH Linux-syscall-note) AND
  (GPL-2.0-only WITH Linux-syscall-note)
category: network
tags:
  - cli
description: Graphics Library
source-archive: https://archive.mesa3d.org/mesa-26.0.6.tar.xz
dependencies:
  - libclc
  - libpng
  - libx11
  - libxcb
  - libxext
  - libxfixes
  - llvm
  - molten-vk
  - spirv-llvm-translator
  - spirv-tools
  - xcb-util-keysyms
  - zstd
build-dependencies:
  - bindgen
  - bison
  - glslang
  - libxrandr
  - libxrender
  - libxshmfence
  - libyaml
  - meson
  - ninja
  - pkgconf
  - python@3.14
  - rust
  - xorgproto
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: afuc-asm
  - exposure: global executable
    kind: cli
    name: afuc-disasm
  - exposure: global executable
    kind: cli
    name: aubinator
  - exposure: global executable
    kind: cli
    name: aubinator_error_decode
  - exposure: global executable
    kind: cli
    name: brw_asm
  - exposure: global executable
    kind: cli
    name: brw_disasm
  - exposure: global executable
    kind: cli
    name: computerator
  - exposure: global executable
    kind: cli
    name: elk_asm
  - exposure: global executable
    kind: cli
    name: elk_disasm
  - exposure: global executable
    kind: cli
    name: glsl_compiler
  - exposure: global executable
    kind: cli
    name: intel_dev_info
  - exposure: global executable
    kind: cli
    name: intel_dump_gpu
  - exposure: global executable
    kind: cli
    name: intel_error2aub
  - exposure: global executable
    kind: cli
    name: intel_error2hangdump
  - exposure: global executable
    kind: cli
    name: intel_hang_replay
  - exposure: global executable
    kind: cli
    name: intel_measure.py
  - exposure: global executable
    kind: cli
    name: intel_monitor
  - exposure: global executable
    kind: cli
    name: intel_sanitize_gpu
  - exposure: global executable
    kind: cli
    name: intel_stub_gpu
  - exposure: global executable
    kind: cli
    name: lima_disasm
  - exposure: global executable
    kind: cli
    name: mda
  - exposure: global executable
    kind: cli
    name: mesa-overlay-control.py
  - exposure: global executable
    kind: cli
    name: mesa-screenshot-control.py
  - exposure: global executable
    kind: cli
    name: nv_push_dump
  - exposure: global executable
    kind: cli
    name: panfrost_texfeatures
  - exposure: global executable
    kind: cli
    name: panfrostdump
  - exposure: global executable
    kind: cli
    name: spirv2nir
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mesa
  av: sudo av install brew:mesa
  brew: brew install mesa
  macports: sudo port install mesa
  nix: nix profile install nixpkgs#mesa
  pacman: sudo pacman -S mesa
  zypper: sudo zypper install Mesa
provenance:
  formula: mesa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
