id: brew:mrbayes
display-name: mrbayes
homepage: https://nbisweden.github.io/MrBayes/
repo: https://github.com/NBISweden/MrBayes
docs: https://nbisweden.github.io/MrBayes/
package-manager:
  brew: mrbayes
  debian: mrbayes
  nix: mrbayes
  ubuntu: mrbayes
  winget: NBIS.MrBayes
package-manager-url: https://formulae.brew.sh/formula/mrbayes
version: 3.2.7a
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Bayesian inference of phylogenies and evolutionary models
source-archive: https://github.com/NBISweden/MrBayes/archive/refs/tags/v3.2.7a.tar.gz
dependencies:
  - beagle
  - open-mpi
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mrbayes
  brew: brew install mrbayes
  debian: sudo apt install mrbayes
  nix: nix profile install nixpkgs#mrbayes
  ubuntu: sudo apt install mrbayes
  winget: winget install --id NBIS.MrBayes -e
provenance:
  formula: mrbayes
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
