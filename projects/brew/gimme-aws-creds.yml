id: brew:gimme-aws-creds
display-name: gimme-aws-creds
homepage: https://github.com/Nike-Inc/gimme-aws-creds
repo: >
  https://files.pythonhosted.org/packages/63/73/9e508d37d4d301f6a3811fdc0b0a076696de87f82ad8a81ec28c3e6befb5/gimme_aws_creds-2.8.2.tar.gz
docs: https://github.com/Nike-Inc/gimme-aws-creds
package-manager:
