id: brew:yazpp
display-name: yazpp
homepage: https://www.indexdata.com/resources/software/yazpp/
repo: https://ftp.indexdata.com/pub/yazpp/yazpp-1.9.2.tar.gz
docs: https://www.indexdata.com/resources/software/yazpp/
package-manager:
  brew: yazpp
  macports: yazpp
package-manager-url: https://formulae.brew.sh/formula/yazpp
version: 1.9.2
license: BSD-3-Clause
category: network
tags:
  - cli
description: C++ API for the Yaz toolkit
source-archive: https://ftp.indexdata.com/pub/yazpp/yazpp-1.9.2.tar.gz
dependencies:
  - yaz
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: yazpp-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yazpp
  brew: brew install yazpp
  macports: sudo port install yazpp
provenance:
  formula: yazpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
