id: brew:git-annex
display-name: git-annex
homepage: https://git-annex.branchable.com/
repo: https://hackage.haskell.org/package/git-annex-10.20260525/git-annex-10.20260525.tar.gz
docs: https://git-annex.branchable.com/
package-manager:
  apk: git-annex
  brew: git-annex
  chocolatey: git-annex
  debian: git-annex
  dnf: git-annex
  macports: git-annex
  pacman: git-annex
  scoop: main/git-annex
  ubuntu: git-annex
  zypper: git-annex
package-manager-url: https://formulae.brew.sh/formula/git-annex
version: 10.20260525
license: >
  AGPL-3.0-or-later AND BSD-2-Clause AND BSD-3-Clause AND GPL-2.0-only AND
  GPL-3.0-or-later AND MIT
category: development
tags:
  - cli
  - git
description: Manage files with git without checking in file contents
source-archive: https://hackage.haskell.org/package/git-annex-10.20260525/git-annex-10.20260525.tar.gz
dependencies:
  - gmp
  - libmagic
build-dependencies:
  - cabal-install
  - ghc
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: git-annex
  - exposure: global executable
    kind: cli
    name: git-annex-shell
  - exposure: global executable
    kind: cli
    name: git-remote-annex
  - exposure: global executable
    kind: cli
    name: git-remote-tor-annex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add git-annex
  av: sudo av install brew:git-annex
  brew: brew install git-annex
  chocolatey: choco install git-annex
  debian: sudo apt install git-annex
  dnf: sudo dnf install git-annex
  macports: sudo port install git-annex
  pacman: sudo pacman -S git-annex
  scoop: scoop install main/git-annex
  ubuntu: sudo apt install git-annex
  zypper: sudo zypper install git-annex
provenance:
  formula: git-annex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
