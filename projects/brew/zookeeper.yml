id: brew:zookeeper
display-name: zookeeper
homepage: https://zookeeper.apache.org/
repo: >
  https://www.apache.org/dyn/closer.lua?path=zookeeper/zookeeper-3.9.5/apache-zookeeper-3.9.5.tar.gz
docs: https://zookeeper.apache.org/
package-manager:
  brew: zookeeper
  debian: zookeeper
  nix: zookeeper
  scoop: main/zookeeper
  ubuntu: zookeeper
package-manager-url: https://formulae.brew.sh/formula/zookeeper
version: 3.9.5
license: Apache-2.0
category: network
tags:
  - cli
description: Centralized server for distributed coordination of services
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=zookeeper/zookeeper-3.9.5/apache-zookeeper-3.9.5.tar.gz
dependencies:
  - openjdk
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - cppunit
  - libtool
  - maven
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: zkCleanup
  - exposure: global executable
    kind: cli
    name: zkCli
  - exposure: global executable
    kind: cli
    name: zkServer
  - exposure: global executable
    kind: cli
    name: zkServer-initialize
  - exposure: global executable
    kind: cli
    name: zkSnapShotToolkit
  - exposure: global executable
    kind: cli
    name: zkSnapshotComparer
  - exposure: global executable
    kind: cli
    name: zkSnapshotRecursiveSummaryToolkit
  - exposure: global executable
    kind: cli
    name: zkTxnLogToolkit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:zookeeper
  brew: brew install zookeeper
  debian: sudo apt install zookeeper
  nix: nix profile install nixpkgs#zookeeper
  scoop: scoop install main/zookeeper
  ubuntu: sudo apt install zookeeper
provenance:
  formula: zookeeper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
