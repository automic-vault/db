id: brew:asyncapi
display-name: asyncapi
homepage: https://github.com/asyncapi/cli
repo: https://registry.npmjs.org/@asyncapi/cli/-/cli-6.0.0.tgz
docs: https://github.com/asyncapi/cli
package-manager:
  brew: asyncapi
  nix: asyncapi
package-manager-url: https://formulae.brew.sh/formula/asyncapi
version: 6.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: All in one CLI for all AsyncAPI tools
source-archive: https://registry.npmjs.org/@asyncapi/cli/-/cli-6.0.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: asyncapi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:asyncapi
  brew: brew install asyncapi
  nix: nix profile install nixpkgs#asyncapi
provenance:
  formula: asyncapi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
