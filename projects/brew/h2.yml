id: brew:h2
display-name: h2
homepage: https://www.h2database.com/
repo: https://github.com/h2database/h2database
docs: https://www.h2database.com/
package-manager:
  brew: h2
  nix: h2
package-manager-url: https://formulae.brew.sh/formula/h2
version: 2.4.240
license: MPL-2.0
category: database
tags:
  - cli
  - database
description: Java SQL database
source-archive: >
  https://github.com/h2database/h2database/releases/download/version-2.4.240/h2-2025-09-22.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: h2
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:h2
  brew: brew install h2
  nix: nix profile install nixpkgs#h2
provenance:
  formula: h2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
