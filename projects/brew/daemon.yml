id: brew:daemon
display-name: daemon
homepage: https://libslack.org/daemon/
repo: https://libslack.org/daemon/download/daemon-0.8.4.tar.gz
docs: https://libslack.org/daemon/
package-manager:
  brew: daemon
  debian: daemon
  macports: daemon
  nix: daemon
  ubuntu: daemon
package-manager-url: https://formulae.brew.sh/formula/daemon
version: 0.8.4
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Turn other processes into daemons
source-archive: https://libslack.org/daemon/download/daemon-0.8.4.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: daemon
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:daemon
  brew: brew install daemon
  debian: sudo apt install daemon
  macports: sudo port install daemon
  nix: nix profile install nixpkgs#daemon
  ubuntu: sudo apt install daemon
provenance:
  formula: daemon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
