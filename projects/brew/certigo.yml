id: brew:certigo
display-name: certigo
homepage: https://github.com/square/certigo
repo: https://github.com/square/certigo
docs: https://github.com/square/certigo
package-manager:
  apk: certigo
  brew: certigo
  macports: certigo
  nix: certigo
  scoop: main/certigo
package-manager-url: https://formulae.brew.sh/formula/certigo
version: 1.18.0
license: Apache-2.0
category: development
tags:
  - cli
description: Utility to examine and validate certificates in a variety of formats
source-archive: https://github.com/square/certigo/archive/refs/tags/v1.18.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: certigo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add certigo
  av: sudo av install brew:certigo
  brew: brew install certigo
  macports: sudo port install certigo
  nix: nix profile install nixpkgs#certigo
  scoop: scoop install main/certigo
provenance:
  formula: certigo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
