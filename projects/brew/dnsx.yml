id: brew:dnsx
display-name: dnsx
homepage: https://github.com/projectdiscovery/dnsx
repo: https://github.com/projectdiscovery/dnsx
docs: https://github.com/projectdiscovery/dnsx
package-manager:
  brew: dnsx
  dnf: dnsx
  nix: dnsx
package-manager-url: https://formulae.brew.sh/formula/dnsx
version: 1.2.3
license: MIT
category: development
tags:
  - cli
description: DNS query and resolution tool
source-archive: https://github.com/projectdiscovery/dnsx/archive/refs/tags/v1.2.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dnsx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dnsx
  brew: brew install dnsx
  dnf: sudo dnf install dnsx
  nix: nix profile install nixpkgs#dnsx
provenance:
  formula: dnsx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
