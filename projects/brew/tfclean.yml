id: brew:tfclean
display-name: tfclean
homepage: https://github.com/takaishi/tfclean
repo: https://github.com/takaishi/tfclean
docs: https://github.com/takaishi/tfclean
package-manager:
  brew: tfclean
package-manager-url: https://formulae.brew.sh/formula/tfclean
version: 0.0.18
license: MIT
category: development
tags:
  - cli
description: Remove applied moved block, import block, etc
source-archive: https://github.com/takaishi/tfclean/archive/refs/tags/v0.0.18.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tfclean
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tfclean
  brew: brew install tfclean
provenance:
  formula: tfclean
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
