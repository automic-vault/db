id: brew:nuxeo
display-name: nuxeo
homepage: https://nuxeo.github.io/
repo: >
  https://packages.nuxeo.com/repository/maven-public/org/nuxeo/ecm/distribution/nuxeo-server-tomcat/11.4.42/nuxeo-server-tomcat-11.4.42.zip
docs: https://nuxeo.github.io/
package-manager:
  brew: nuxeo
package-manager-url: https://formulae.brew.sh/formula/nuxeo
version: 11.4.42
license: Apache-2.0
category: development
tags:
  - cli
description: Enterprise Content Management
source-archive: >
  https://packages.nuxeo.com/repository/maven-public/org/nuxeo/ecm/distribution/nuxeo-server-tomcat/11.4.42/nuxeo-server-tomcat-11.4.42.zip
dependencies:
  - exiftool
  - ghostscript
  - imagemagick
  - libwpd
  - openjdk
  - poppler
executables:
  - exposure: global executable
    kind: cli
    name: nuxeoctl
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You need to edit $HOMEBREW_PREFIX/etc/nuxeo.conf file to configure manually the
    server. Also, in case of upgrade, run 'nuxeoctl mp-upgrade' to ensure all downloaded
    addons are up to date.
  post-install-defined: false
install-lines:
  av: sudo av install brew:nuxeo
  brew: brew install nuxeo
provenance:
  formula: nuxeo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
