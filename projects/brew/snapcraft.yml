id: brew:snapcraft
display-name: snapcraft
homepage: https://snapcraft.io/
repo: https://github.com/canonical/snapcraft
docs: https://snapcraft.io/
package-manager:
  brew: snapcraft
package-manager-url: https://formulae.brew.sh/formula/snapcraft
version: 9.0.0
license: GPL-3.0-only
category: cloud
tags:
  - cli
  - cloud
description: Package any app for every Linux desktop, server, cloud or device
source-archive: https://github.com/canonical/snapcraft.git
dependencies:
  - certifi
  - cryptography
  - libsodium
  - libyaml
  - lxc
  - pydantic
  - pygit2
  - python@3.14
  - snap
  - xdelta
uses-from-macos:
  - libffi
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: snapcraft
  - exposure: global executable
    kind: cli
    name: snapcraftctl
  - exposure: global executable
    kind: cli
    name: snapcraftctl-compat
  - exposure: global executable
    kind: cli
    name: versioneer.py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:snapcraft
  brew: brew install snapcraft
provenance:
  formula: snapcraft
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
