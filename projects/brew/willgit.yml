id: brew:willgit
display-name: willgit
homepage: https://github.com/DanielVartanov/willgit
repo: https://github.com/DanielVartanov/willgit
docs: https://github.com/DanielVartanov/willgit
package-manager:
  brew: willgit
package-manager-url: https://formulae.brew.sh/formula/willgit
version: 1.0.0
license: MIT
category: development
tags:
  - cli
  - git
description: William's miscellaneous git tools
source-archive: https://github.com/DanielVartanov/willgit/archive/refs/tags/1.0.0.tar.gz
uses-from-macos:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: git-publish-branch
  - exposure: global executable
    kind: cli
    name: git-rank-contributors
  - exposure: global executable
    kind: cli
    name: git-show-merges
  - exposure: global executable
    kind: cli
    name: git-wt-add
  - exposure: global executable
    kind: cli
    name: git-wtf
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:willgit
  brew: brew install willgit
provenance:
  formula: willgit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
