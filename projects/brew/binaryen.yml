id: brew:binaryen
display-name: binaryen
homepage: https://webassembly.org/
repo: https://github.com/WebAssembly/binaryen
docs: https://webassembly.org/
package-manager:
  apk: binaryen
  brew: binaryen
  debian: binaryen
  dnf: binaryen
  macports: binaryen
  nix: binaryen
  pacman: binaryen
  scoop: main/binaryen
  ubuntu: binaryen
  zypper: binaryen
package-manager-url: https://formulae.brew.sh/formula/binaryen
version: 129
license: Apache-2.0
category: development
tags:
  - cli
description: Compiler infrastructure and toolchain library for WebAssembly
source-archive: https://github.com/WebAssembly/binaryen/archive/refs/tags/version_129.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: wasm-as
  - exposure: global executable
    kind: cli
    name: wasm-ctor-eval
  - exposure: global executable
    kind: cli
    name: wasm-dis
  - exposure: global executable
    kind: cli
    name: wasm-emscripten-finalize
  - exposure: global executable
    kind: cli
    name: wasm-fuzz-lattices
  - exposure: global executable
    kind: cli
    name: wasm-fuzz-types
  - exposure: global executable
    kind: cli
    name: wasm-merge
  - exposure: global executable
    kind: cli
    name: wasm-metadce
  - exposure: global executable
    kind: cli
    name: wasm-opt
  - exposure: global executable
    kind: cli
    name: wasm-reduce
  - exposure: global executable
    kind: cli
    name: wasm-shell
  - exposure: global executable
    kind: cli
    name: wasm-split
  - exposure: global executable
    kind: cli
    name: wasm2js
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add binaryen
  av: sudo av install brew:binaryen
  brew: brew install binaryen
  debian: sudo apt install binaryen
  dnf: sudo dnf install binaryen
  macports: sudo port install binaryen
  nix: nix profile install nixpkgs#binaryen
  pacman: sudo pacman -S binaryen
  scoop: scoop install main/binaryen
  ubuntu: sudo apt install binaryen
  zypper: sudo zypper install binaryen
provenance:
  formula: binaryen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
