id: brew:intelli-shell
display-name: intelli-shell
homepage: https://lasantosr.github.io/intelli-shell/
repo: https://github.com/lasantosr/intelli-shell
docs: https://lasantosr.github.io/intelli-shell/
package-manager:
  brew: intelli-shell
  nix: intelli-shell
  pacman: intelli-shell
package-manager-url: https://formulae.brew.sh/formula/intelli-shell
version: 3.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: Like IntelliSense, but for shells
source-archive: https://github.com/lasantosr/intelli-shell/archive/refs/tags/v3.4.1.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: intelli-shell
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:intelli-shell
  brew: brew install intelli-shell
  nix: nix profile install nixpkgs#intelli-shell
  pacman: sudo pacman -S intelli-shell
provenance:
  formula: intelli-shell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
