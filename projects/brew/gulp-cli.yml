id: brew:gulp-cli
display-name: gulp-cli
homepage: https://github.com/gulpjs/gulp-cli
repo: https://registry.npmjs.org/gulp-cli/-/gulp-cli-3.1.0.tgz
docs: https://github.com/gulpjs/gulp-cli
package-manager:
  brew: gulp-cli
  chocolatey: gulp-cli
  debian: gulp
  pacman: gulp
  ubuntu: gulp
package-manager-url: https://formulae.brew.sh/formula/gulp-cli
version: 3.1.0
license: MIT
category: development
tags:
  - cli
description: Command-line utility for Gulp
source-archive: https://registry.npmjs.org/gulp-cli/-/gulp-cli-3.1.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: gulp
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gulp-cli
  brew: brew install gulp-cli
  chocolatey: choco install gulp-cli
  debian: sudo apt install gulp
  pacman: sudo pacman -S gulp
  ubuntu: sudo apt install gulp
provenance:
  formula: gulp-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
