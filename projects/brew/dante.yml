id: brew:dante
display-name: dante
homepage: https://www.inet.no/dante/
repo: https://www.inet.no/dante/files/dante-1.4.4.tar.gz
docs: https://www.inet.no/dante/
package-manager:
  apk: dante
  brew: dante
  dnf: dante
  macports: dante
  nix: dante
  pacman: dante
  zypper: dante
package-manager-url: https://formulae.brew.sh/formula/dante
version: 1.4.4
license: BSD-Inferno-Nettverk
category: network
tags:
  - cli
description: SOCKS server and client, implementing RFC 1928 and related standards
source-archive: https://www.inet.no/dante/files/dante-1.4.4.tar.gz
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: sockd
  - exposure: global executable
    kind: cli
    name: socksify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dante
  av: sudo av install brew:dante
  brew: brew install dante
  dnf: sudo dnf install dante
  macports: sudo port install dante
  nix: nix profile install nixpkgs#dante
  pacman: sudo pacman -S dante
  zypper: sudo zypper install dante
provenance:
  formula: dante
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
