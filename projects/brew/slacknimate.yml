id: brew:slacknimate
display-name: slacknimate
homepage: https://github.com/mroth/slacknimate
repo: https://github.com/mroth/slacknimate
docs: https://github.com/mroth/slacknimate
package-manager:
  brew: slacknimate
package-manager-url: https://formulae.brew.sh/formula/slacknimate
version: 1.1.0
license: MPL-2.0
category: development
tags:
  - cli
description: Text animation for Slack messages
source-archive: https://github.com/mroth/slacknimate/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: slacknimate
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:slacknimate
  brew: brew install slacknimate
provenance:
  formula: slacknimate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
