id: brew:cadence
display-name: cadence
homepage: https://cadence-lang.org/
repo: https://github.com/onflow/cadence
docs: https://cadence-lang.org/
package-manager:
  brew: cadence
  zypper: Cadence
package-manager-url: https://formulae.brew.sh/formula/cadence
version: 1.10.3
license: Apache-2.0
category: development
tags:
  - cli
description: Resource-oriented smart contract programming language
source-archive: https://github.com/onflow/cadence/archive/refs/tags/v1.10.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cadence
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cadence
  brew: brew install cadence
  zypper: sudo zypper install Cadence
provenance:
  formula: cadence
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
