id: brew:mlt
display-name: mlt
homepage: https://www.mltframework.org/
repo: https://github.com/mltframework/mlt
docs: https://www.mltframework.org/
package-manager:
  apk: mlt
  brew: mlt
  debian: melt
  dnf: mlt
  macports: mlt
  nix: mlt
  pacman: mlt
  ubuntu: melt
  winget: charmbracelet.melt
  zypper: melt
package-manager-url: https://formulae.brew.sh/formula/mlt
version: 7.38.0
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Author, manage, and run multitrack audio/video compositions
source-archive: https://github.com/mltframework/mlt/releases/download/v7.38.0/mlt-7.38.0.tar.gz
dependencies:
  - ffmpeg
  - fftw
  - fontconfig
  - freetype
  - frei0r
  - gdk-pixbuf
  - gettext
  - glib
  - harfbuzz
  - libdv
  - libexif
  - libomp
  - libsamplerate
  - libvidstab
  - libvorbis
  - opencv
  - pango
  - qt5compat
  - qtbase
  - qtsvg
  - rubberband
  - sdl2
  - sox
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: melt
  - exposure: global executable
    kind: cli
    name: melt-7
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mlt
  av: sudo av install brew:mlt
  brew: brew install mlt
  debian: sudo apt install melt
  dnf: sudo dnf install mlt
  macports: sudo port install mlt
  nix: nix profile install nixpkgs#mlt
  pacman: sudo pacman -S mlt
  ubuntu: sudo apt install melt
  winget: winget install --id charmbracelet.melt -e
  zypper: sudo zypper install melt
provenance:
  formula: mlt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
