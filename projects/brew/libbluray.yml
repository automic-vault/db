id: brew:libbluray
display-name: libbluray
homepage: https://www.videolan.org/developers/libbluray.html
repo: https://download.videolan.org/videolan/libbluray/1.4.1/libbluray-1.4.1.tar.xz
docs: https://www.videolan.org/developers/libbluray.html
package-manager:
  apk: libbluray
  brew: libbluray
  dnf: libbluray
  macports: libbluray
  nix: libbluray
  pacman: libbluray
package-manager-url: https://formulae.brew.sh/formula/libbluray
version: 1.4.1
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Blu-Ray disc playback library for media players like VLC
source-archive: https://download.videolan.org/videolan/libbluray/1.4.1/libbluray-1.4.1.tar.xz
dependencies:
  - fontconfig
  - freetype
  - libudfread
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: bd_info
  - exposure: global executable
    kind: cli
    name: bd_list_titles
  - exposure: global executable
    kind: cli
    name: bd_splice
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libbluray
  av: sudo av install brew:libbluray
  brew: brew install libbluray
  dnf: sudo dnf install libbluray
  macports: sudo port install libbluray
  nix: nix profile install nixpkgs#libbluray
  pacman: sudo pacman -S libbluray
provenance:
  formula: libbluray
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
