id: brew:goimports
display-name: goimports
homepage: https://pkg.go.dev/golang.org/x/tools/cmd/goimports
repo: https://github.com/golang/tools
docs: https://pkg.go.dev/golang.org/x/tools/cmd/goimports
package-manager:
  brew: goimports
package-manager-url: https://formulae.brew.sh/formula/goimports
version: 0.45.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Go formatter that additionally inserts import statements
source-archive: https://github.com/golang/tools/archive/refs/tags/v0.45.0.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goimports
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:goimports
  brew: brew install goimports
provenance:
  formula: goimports
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
