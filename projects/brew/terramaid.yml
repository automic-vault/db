id: brew:terramaid
display-name: terramaid
homepage: https://github.com/RoseSecurity/Terramaid
repo: https://github.com/RoseSecurity/Terramaid
docs: https://github.com/RoseSecurity/Terramaid
package-manager:
  brew: terramaid
package-manager-url: https://formulae.brew.sh/formula/terramaid
version: 2.14.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Utility for generating Mermaid diagrams from Terraform configurations
source-archive: https://github.com/RoseSecurity/Terramaid/archive/refs/tags/v2.14.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terramaid
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terramaid
  brew: brew install terramaid
provenance:
  formula: terramaid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
