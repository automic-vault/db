id: brew:sl
display-name: sl
homepage: https://github.com/mtoyoda/sl
repo: https://github.com/mtoyoda/sl
docs: https://github.com/mtoyoda/sl
package-manager:
  apk: sl
  brew: sl
  debian: sl
  dnf: sl
  macports: sl
  nix: sl
  pacman: sl
  ubuntu: sl
  winget: ScaryRawr.SL
  zypper: sl
package-manager-url: https://formulae.brew.sh/formula/sl
version: 5.02
license: MIT
category: development
tags:
  - cli
description: Prints a steam locomotive if you type sl instead of ls
source-archive: https://github.com/mtoyoda/sl/archive/refs/tags/5.02.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: sl
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sl
  av: sudo av install brew:sl
  brew: brew install sl
  debian: sudo apt install sl
  dnf: sudo dnf install sl
  macports: sudo port install sl
  nix: nix profile install nixpkgs#sl
  pacman: sudo pacman -S sl
  ubuntu: sudo apt install sl
  winget: winget install --id ScaryRawr.SL -e
  zypper: sudo zypper install sl
provenance:
  formula: sl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
