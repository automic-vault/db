id: brew:dvdauthor
display-name: dvdauthor
homepage: https://dvdauthor.sourceforge.net/
repo: https://downloads.sourceforge.net/project/dvdauthor/dvdauthor-0.7.2.tar.gz
docs: https://dvdauthor.sourceforge.net/
package-manager:
  apk: dvdauthor
  brew: dvdauthor
  debian: dvdauthor
  dnf: dvdauthor
  macports: dvdauthor
  nix: dvdauthor
  pacman: dvdauthor
  ubuntu: dvdauthor
  zypper: dvdauthor
package-manager-url: https://formulae.brew.sh/formula/dvdauthor
version: 0.7.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: DVD-authoring toolset
source-archive: https://downloads.sourceforge.net/project/dvdauthor/dvdauthor-0.7.2.tar.gz
dependencies:
  - freetype
  - libdvdread
  - libpng
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: dvdauthor
  - exposure: global executable
    kind: cli
    name: dvddirdel
  - exposure: global executable
    kind: cli
    name: dvdunauthor
  - exposure: global executable
    kind: cli
    name: mpeg2desc
  - exposure: global executable
    kind: cli
    name: spumux
  - exposure: global executable
    kind: cli
    name: spuunmux
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dvdauthor
  av: sudo av install brew:dvdauthor
  brew: brew install dvdauthor
  debian: sudo apt install dvdauthor
  dnf: sudo dnf install dvdauthor
  macports: sudo port install dvdauthor
  nix: nix profile install nixpkgs#dvdauthor
  pacman: sudo pacman -S dvdauthor
  ubuntu: sudo apt install dvdauthor
  zypper: sudo zypper install dvdauthor
provenance:
  formula: dvdauthor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
