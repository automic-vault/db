id: brew:jq-lsp
display-name: jq-lsp
homepage: https://github.com/wader/jq-lsp
repo: https://github.com/wader/jq-lsp
docs: https://github.com/wader/jq-lsp
package-manager:
  brew: jq-lsp
  nix: jq-lsp
package-manager-url: https://formulae.brew.sh/formula/jq-lsp
version: 0.1.17
license: MIT
category: development
tags:
  - cli
description: Jq language server
source-archive: https://github.com/wader/jq-lsp/archive/refs/tags/v0.1.17.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jq-lsp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jq-lsp
  brew: brew install jq-lsp
  nix: nix profile install nixpkgs#jq-lsp
provenance:
  formula: jq-lsp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
