id: brew:espeak-ng
display-name: espeak-ng
homepage: https://github.com/espeak-ng/espeak-ng
repo: https://github.com/espeak-ng/espeak-ng
docs: https://github.com/espeak-ng/espeak-ng
package-manager:
  apk: espeak-ng
  brew: espeak-ng
  debian: espeak-ng
  dnf: espeak-ng
  macports: espeak-ng
  nix: espeak-ng
  pacman: espeak-ng
  scoop: main/espeak-ng
  ubuntu: espeak-ng
  winget: eSpeak-NG.eSpeak-NG
  zypper: espeak-ng
package-manager-url: https://formulae.brew.sh/formula/espeak-ng
version: 1.52.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Speech synthesizer that supports more than hundred languages and accents
source-archive: https://github.com/espeak-ng/espeak-ng/archive/refs/tags/1.52.0.tar.gz
dependencies:
  - pcaudiolib
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: espeak
  - exposure: global executable
    kind: cli
    name: espeak-ng
  - exposure: global executable
    kind: cli
    name: speak
  - exposure: global executable
    kind: cli
    name: speak-ng
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add espeak-ng
  av: sudo av install brew:espeak-ng
  brew: brew install espeak-ng
  debian: sudo apt install espeak-ng
  dnf: sudo dnf install espeak-ng
  macports: sudo port install espeak-ng
  nix: nix profile install nixpkgs#espeak-ng
  pacman: sudo pacman -S espeak-ng
  scoop: scoop install main/espeak-ng
  ubuntu: sudo apt install espeak-ng
  winget: winget install --id eSpeak-NG.eSpeak-NG -e
  zypper: sudo zypper install espeak-ng
provenance:
  formula: espeak-ng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
