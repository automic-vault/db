id: brew:gitleaks
display-name: gitleaks
homepage: https://gitleaks.io/
repo: https://github.com/gitleaks/gitleaks
docs: https://gitleaks.io/
package-manager:
  brew: gitleaks
  chocolatey: gitleaks
  debian: gitleaks
  dnf: gitleaks
  macports: gitleaks
  nix: gitleaks
  pacman: gitleaks
  scoop: main/gitleaks
  ubuntu: gitleaks
  winget: Gitleaks.Gitleaks
  zypper: gitleaks
package-manager-url: https://formulae.brew.sh/formula/gitleaks
version: 8.30.1
license: MIT
category: security
tags:
  - cli
  - git
description: Audit git repos for secrets
source-archive: https://github.com/gitleaks/gitleaks/archive/refs/tags/v8.30.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gitleaks
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gitleaks
  brew: brew install gitleaks
  chocolatey: choco install gitleaks
  debian: sudo apt install gitleaks
  dnf: sudo dnf install gitleaks
  macports: sudo port install gitleaks
  nix: nix profile install nixpkgs#gitleaks
  pacman: sudo pacman -S gitleaks
  scoop: scoop install main/gitleaks
  ubuntu: sudo apt install gitleaks
  winget: winget install --id Gitleaks.Gitleaks -e
  zypper: sudo zypper install gitleaks
provenance:
  formula: gitleaks
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
