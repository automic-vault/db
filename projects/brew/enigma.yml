id: brew:enigma
display-name: enigma
homepage: https://www.nongnu.org/enigma/
repo: https://github.com/Enigma-Game/Enigma
docs: https://www.nongnu.org/enigma/
package-manager:
  apk: enigma
  brew: enigma
  debian: enigma
  dnf: enigma
  macports: enigma
  nix: enigma
  pacman: enigma
  ubuntu: enigma
  winget: Enigma.VirtualBox
  zypper: enigma
package-manager-url: https://formulae.brew.sh/formula/enigma
version: 1.30
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Puzzle game inspired by Oxyd and Rock'n'Roll
source-archive: https://github.com/Enigma-Game/Enigma/releases/download/1.30/Enigma-1.30-src.tar.gz
dependencies:
  - enet
  - freetype
  - gettext
  - libpng
  - sdl2
  - sdl2_image
  - sdl2_mixer
  - sdl2_ttf
  - xerces-c
build-dependencies:
  - imagemagick
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: enigma
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add enigma
  av: sudo av install brew:enigma
  brew: brew install enigma
  debian: sudo apt install enigma
  dnf: sudo dnf install enigma
  macports: sudo port install enigma
  nix: nix profile install nixpkgs#enigma
  pacman: sudo pacman -S enigma
  ubuntu: sudo apt install enigma
  winget: winget install --id Enigma.VirtualBox -e
  zypper: sudo zypper install enigma
provenance:
  formula: enigma
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
