id: brew:markdownlint-cli2
display-name: markdownlint-cli2
homepage: https://github.com/DavidAnson/markdownlint-cli2
repo: https://registry.npmjs.org/markdownlint-cli2/-/markdownlint-cli2-0.22.1.tgz
docs: https://github.com/DavidAnson/markdownlint-cli2
package-manager:
  brew: markdownlint-cli2
  nix: markdownlint-cli2
  pacman: markdownlint-cli2
package-manager-url: https://formulae.brew.sh/formula/markdownlint-cli2
version: 0.22.1
license: MIT
category: development
tags:
  - cli
description: Fast, flexible, config-based cli for linting Markdown/CommonMark files
source-archive: https://registry.npmjs.org/markdownlint-cli2/-/markdownlint-cli2-0.22.1.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: markdownlint-cli2
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:markdownlint-cli2
  brew: brew install markdownlint-cli2
  nix: nix profile install nixpkgs#markdownlint-cli2
  pacman: sudo pacman -S markdownlint-cli2
provenance:
  formula: markdownlint-cli2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
