id: brew:crip
display-name: crip
homepage: https://github.com/Hakky54/certificate-ripper
repo: https://github.com/Hakky54/certificate-ripper
docs: https://github.com/Hakky54/certificate-ripper
package-manager:
  brew: crip
  debian: crip
  nix: crip
  scoop: extras/crip
  ubuntu: crip
package-manager-url: https://formulae.brew.sh/formula/crip
version: 2.7.1
license: Apache-2.0
category: development
tags:
  - cli
description: Tool to extract server certificates
source-archive: https://github.com/Hakky54/certificate-ripper/archive/refs/tags/2.7.1.tar.gz
build-dependencies:
  - graalvm
  - maven
executables:
  - exposure: global executable
    kind: cli
    name: crip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:crip
  brew: brew install crip
  debian: sudo apt install crip
  nix: nix profile install nixpkgs#crip
  scoop: scoop install extras/crip
  ubuntu: sudo apt install crip
provenance:
  formula: crip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
