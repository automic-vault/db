id: brew:tabixpp
display-name: tabixpp
homepage: https://github.com/vcflib/tabixpp
repo: https://github.com/vcflib/tabixpp
docs: https://github.com/vcflib/tabixpp
package-manager:
  brew: tabixpp
  debian: tabix
  ubuntu: tabix
  zypper: tabix
package-manager-url: https://formulae.brew.sh/formula/tabixpp
version: 1.1.2
license: MIT
category: development
tags:
  - cli
description: C++ wrapper to tabix indexer
source-archive: https://github.com/vcflib/tabixpp/archive/refs/tags/v1.1.2.tar.gz
dependencies:
  - htslib
  - xz
executables:
  - exposure: global executable
    kind: cli
    name: tabix++
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tabixpp
  brew: brew install tabixpp
  debian: sudo apt install tabix
  ubuntu: sudo apt install tabix
  zypper: sudo zypper install tabix
provenance:
  formula: tabixpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
