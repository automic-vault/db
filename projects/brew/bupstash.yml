id: brew:bupstash
display-name: bupstash
homepage: https://bupstash.io
repo: https://github.com/andrewchambers/bupstash
docs: https://bupstash.io
package-manager:
  apk: bupstash
  brew: bupstash
  macports: bupstash
  nix: bupstash
  pacman: bupstash
package-manager-url: https://formulae.brew.sh/formula/bupstash
version: 0.12.0
license: MIT
category: security
tags:
  - cli
description: Easy and efficient encrypted backups
source-archive: >
  https://github.com/andrewchambers/bupstash/releases/download/v0.12.0/bupstash-v0.12.0-src+deps.tar.gz
dependencies:
  - libsodium
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bupstash
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bupstash
  av: sudo av install brew:bupstash
  brew: brew install bupstash
  macports: sudo port install bupstash
  nix: nix profile install nixpkgs#bupstash
  pacman: sudo pacman -S bupstash
provenance:
  formula: bupstash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
