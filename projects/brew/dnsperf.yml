id: brew:dnsperf
display-name: dnsperf
homepage: https://www.dns-oarc.net/tools/dnsperf
repo: https://www.dns-oarc.net/files/dnsperf/dnsperf-2.15.1.tar.gz
docs: https://www.dns-oarc.net/tools/dnsperf
package-manager:
  apk: dnsperf
  brew: dnsperf
  debian: dnsperf
  dnf: dnsperf
  macports: dnsperf
  nix: dnsperf
  ubuntu: dnsperf
package-manager-url: https://formulae.brew.sh/formula/dnsperf
version: 2.15.1
license: Apache-2.0
category: network
tags:
  - cli
description: Measure DNS performance by simulating network conditions
source-archive: https://www.dns-oarc.net/files/dnsperf/dnsperf-2.15.1.tar.gz
dependencies:
  - concurrencykit
  - ldns
  - libnghttp2
  - openssl@3
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dnsperf
  - exposure: global executable
    kind: cli
    name: resperf
  - exposure: global executable
    kind: cli
    name: resperf-report
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dnsperf
  av: sudo av install brew:dnsperf
  brew: brew install dnsperf
  debian: sudo apt install dnsperf
  dnf: sudo dnf install dnsperf
  macports: sudo port install dnsperf
  nix: nix profile install nixpkgs#dnsperf
  ubuntu: sudo apt install dnsperf
provenance:
  formula: dnsperf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
