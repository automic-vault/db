id: brew:cherrytree
display-name: cherrytree
homepage: https://www.giuspen.com/cherrytree/
repo: https://www.giuspen.com/software/cherrytree_1.7.0.tar.xz
docs: https://www.giuspen.com/cherrytree/
package-manager:
  apk: cherrytree
  brew: cherrytree
  chocolatey: cherrytree
  debian: cherrytree
  macports: cherrytree
  nix: cherrytree
  pacman: cherrytree
  scoop: extras/cherrytree
  ubuntu: cherrytree
  winget: Giuspen.Cherrytree
  zypper: cherrytree
package-manager-url: https://formulae.brew.sh/formula/cherrytree
version: 1.7.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Hierarchical note taking application featuring rich text and syntax highlighting
source-archive: https://www.giuspen.com/software/cherrytree_1.7.0.tar.xz
dependencies:
  - adwaita-icon-theme
  - at-spi2-core
  - atkmm@2.28
  - cairo
  - cairomm@1.14
  - enchant
  - fmt
  - fribidi
  - gdk-pixbuf
  - gettext
  - glib
  - glibmm@2.66
  - gspell
  - gtk+3
  - gtkmm3
  - gtksourceview4
  - harfbuzz
  - libsigc++@2
  - libxml++
  - pango
  - pangomm@2.46
  - spdlog
  - sqlite
  - uchardet
  - vte3
build-dependencies:
  - cmake
  - gettext
  - pkgconf
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: cherrytree
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cherrytree
  av: sudo av install brew:cherrytree
  brew: brew install cherrytree
  chocolatey: choco install cherrytree
  debian: sudo apt install cherrytree
  macports: sudo port install cherrytree
  nix: nix profile install nixpkgs#cherrytree
  pacman: sudo pacman -S cherrytree
  scoop: scoop install extras/cherrytree
  ubuntu: sudo apt install cherrytree
  winget: winget install --id Giuspen.Cherrytree -e
  zypper: sudo zypper install cherrytree
provenance:
  formula: cherrytree
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
