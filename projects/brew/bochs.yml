id: brew:bochs
display-name: bochs
homepage: https://bochs.sourceforge.io/
repo: https://downloads.sourceforge.net/project/bochs/bochs/3.0/bochs-3.0.tar.gz
docs: https://bochs.sourceforge.io/
package-manager:
  apk: bochs
  brew: bochs
  debian: bochs
  dnf: bochs
  macports: bochs
  nix: bochs
  scoop: main/bochs
  ubuntu: bochs
  winget: Bochs.Bochs
package-manager-url: https://formulae.brew.sh/formula/bochs
version: 3.0
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: Open source IA-32 (x86) PC emulator written in C++
source-archive: https://downloads.sourceforge.net/project/bochs/bochs/3.0/bochs-3.0.tar.gz
dependencies:
  - libtool
  - sdl2
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: bochs
  - exposure: global executable
    kind: cli
    name: bximage
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bochs
  av: sudo av install brew:bochs
  brew: brew install bochs
  debian: sudo apt install bochs
  dnf: sudo dnf install bochs
  macports: sudo port install bochs
  nix: nix profile install nixpkgs#bochs
  scoop: scoop install main/bochs
  ubuntu: sudo apt install bochs
  winget: winget install --id Bochs.Bochs -e
provenance:
  formula: bochs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
