id: brew:aspectj
display-name: aspectj
homepage: https://eclipse.dev/aspectj/
repo: https://github.com/eclipse-aspectj/aspectj
docs: https://eclipse.dev/aspectj/
package-manager:
  brew: aspectj
  debian: aspectj
  macports: aspectj
  nix: aspectj
  ubuntu: aspectj
package-manager-url: https://formulae.brew.sh/formula/aspectj
version: 1.9.25.1
license: EPL-2.0
category: development
tags:
  - cli
description: Aspect-oriented programming for Java
source-archive: >
  https://github.com/eclipse-aspectj/aspectj/releases/download/V1_9_25_1/aspectj-1.9.25.1.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: aj
  - exposure: global executable
    kind: cli
    name: aj5
  - exposure: global executable
    kind: cli
    name: ajc
  - exposure: global executable
    kind: cli
    name: ajdoc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aspectj
  brew: brew install aspectj
  debian: sudo apt install aspectj
  macports: sudo port install aspectj
  nix: nix profile install nixpkgs#aspectj
  ubuntu: sudo apt install aspectj
provenance:
  formula: aspectj
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
