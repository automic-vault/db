id: brew:aerleon
display-name: aerleon
homepage: https://aerleon.readthedocs.io/en/latest/
repo: >
  https://files.pythonhosted.org/packages/91/27/aeaf0098e517f9eeda65e71f5764f3913d465d2c7557281f69b43a66d83c/aerleon-1.16.0.tar.gz
