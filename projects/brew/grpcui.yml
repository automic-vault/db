id: brew:grpcui
display-name: grpcui
homepage: https://github.com/fullstorydev/grpcui
repo: https://github.com/fullstorydev/grpcui
docs: https://github.com/fullstorydev/grpcui
package-manager:
  apk: grpcui
  brew: grpcui
  nix: grpcui
package-manager-url: https://formulae.brew.sh/formula/grpcui
version: 1.4.3
license: MIT
category: development
tags:
  - cli
description: Interactive web UI for gRPC, along the lines of postman
source-archive: https://github.com/fullstorydev/grpcui/archive/refs/tags/v1.4.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: grpcui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add grpcui
  av: sudo av install brew:grpcui
  brew: brew install grpcui
  nix: nix profile install nixpkgs#grpcui
provenance:
  formula: grpcui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
