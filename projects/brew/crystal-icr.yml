id: brew:crystal-icr
display-name: crystal-icr
homepage: https://github.com/crystal-community/icr
repo: https://github.com/crystal-community/icr
docs: https://github.com/crystal-community/icr
package-manager:
  brew: crystal-icr
  nix: icr
package-manager-url: https://formulae.brew.sh/formula/crystal-icr
version: 0.9.0
license: MIT
category: development
tags:
  - cli
description: Interactive console for Crystal programming language
source-archive: https://github.com/crystal-community/icr/archive/refs/tags/v0.9.0.tar.gz
dependencies:
  - bdw-gc
  - crystal
  - libevent
  - libyaml
  - openssl@3
  - pcre2
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: icr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:crystal-icr
  brew: brew install crystal-icr
  nix: nix profile install nixpkgs#icr
provenance:
  formula: crystal-icr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
