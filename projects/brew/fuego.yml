id: brew:fuego
display-name: fuego
homepage: https://fuego.sourceforge.net/
repo: https://svn.code.sf.net/p/fuego/code/trunk
docs: https://fuego.sourceforge.net/
package-manager:
  brew: fuego
package-manager-url: https://formulae.brew.sh/formula/fuego
version: 1.1
license: GPL-3.0-only OR LGPL-3.0-only
category: network
tags:
  - cli
description: Collection of C++ libraries for the game of Go
source-archive: https://svn.code.sf.net/p/fuego/code/trunk
dependencies:
  - boost
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: fuego
  - exposure: global executable
    kind: cli
    name: fuego_test
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fuego
  brew: brew install fuego
provenance:
  formula: fuego
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
