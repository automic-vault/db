id: brew:saf-cli
display-name: saf-cli
homepage: https://saf-cli.mitre.org
repo: https://registry.npmjs.org/@mitre/saf/-/saf-1.6.0.tgz
docs: https://saf-cli.mitre.org
package-manager:
  brew: saf-cli
package-manager-url: https://formulae.brew.sh/formula/saf-cli
version: 1.6.0
license: Apache-2.0
category: security
tags:
  - cli
  - security
description: CLI for the MITRE Security Automation Framework (SAF)
source-archive: https://registry.npmjs.org/@mitre/saf/-/saf-1.6.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: saf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:saf-cli
  brew: brew install saf-cli
provenance:
  formula: saf-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
