id: brew:bmon
display-name: bmon
homepage: https://github.com/tgraf/bmon
repo: https://github.com/tgraf/bmon
docs: https://github.com/tgraf/bmon
package-manager:
  apk: bmon
  brew: bmon
  debian: bmon
  dnf: bmon
  macports: bmon
  nix: bmon
  pacman: bmon
  ubuntu: bmon
  zypper: bmon
package-manager-url: https://formulae.brew.sh/formula/bmon
version: 4.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Interface bandwidth monitor
source-archive: https://github.com/tgraf/bmon/releases/download/v4.0/bmon-4.0.tar.gz
dependencies:
  - confuse
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: bmon
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bmon
  av: sudo av install brew:bmon
  brew: brew install bmon
  debian: sudo apt install bmon
  dnf: sudo dnf install bmon
  macports: sudo port install bmon
  nix: nix profile install nixpkgs#bmon
  pacman: sudo pacman -S bmon
  ubuntu: sudo apt install bmon
  zypper: sudo zypper install bmon
provenance:
  formula: bmon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
