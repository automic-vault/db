id: brew:wasmedge
display-name: wasmedge
homepage: https://WasmEdge.org/
repo: https://github.com/WasmEdge/WasmEdge
docs: https://WasmEdge.org/
package-manager:
  brew: wasmedge
  debian: wasmedge
  dnf: wasmedge
  macports: wasmedge
  nix: wasmedge
  scoop: main/wasmedge
  ubuntu: wasmedge
  winget: WasmEdge.WasmEdge
  zypper: wasmedge
package-manager-url: https://formulae.brew.sh/formula/wasmedge
version: 0.17.0
license: Apache-2.0
category: development
tags:
  - cli
description: Lightweight, high-performance, and extensible WebAssembly runtime
source-archive: https://github.com/WasmEdge/WasmEdge/releases/download/0.17.0/WasmEdge-0.17.0-src.tar.gz
dependencies:
  - fmt
  - lld
  - llvm
  - spdlog
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: wasmedge
  - exposure: global executable
    kind: cli
    name: wasmedgec
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wasmedge
  brew: brew install wasmedge
  debian: sudo apt install wasmedge
  dnf: sudo dnf install wasmedge
  macports: sudo port install wasmedge
  nix: nix profile install nixpkgs#wasmedge
  scoop: scoop install main/wasmedge
  ubuntu: sudo apt install wasmedge
  winget: winget install --id WasmEdge.WasmEdge -e
  zypper: sudo zypper install wasmedge
provenance:
  formula: wasmedge
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
