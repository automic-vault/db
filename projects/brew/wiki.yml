id: brew:wiki
display-name: wiki
homepage: https://github.com/walle/wiki
repo: https://github.com/walle/wiki
docs: https://github.com/walle/wiki
package-manager:
  brew: wiki
  winget: RCharan.wiki
package-manager-url: https://formulae.brew.sh/formula/wiki
version: 1.4.1
license: MIT
category: development
tags:
  - cli
description: Fetch summaries from MediaWiki wikis, like Wikipedia
source-archive: https://github.com/walle/wiki/archive/refs/tags/v1.4.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wiki
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wiki
  brew: brew install wiki
  winget: winget install --id RCharan.wiki -e
provenance:
  formula: wiki
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
