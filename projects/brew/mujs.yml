id: brew:mujs
display-name: mujs
homepage: https://www.mujs.com/
repo: https://mujs.com/downloads/mujs-1.3.9.tar.gz
docs: https://www.mujs.com/
package-manager:
  apk: mujs
  brew: mujs
  debian: mujs
  dnf: mujs
  nix: mujs
  pacman: mujs
  ubuntu: mujs
  zypper: mujs
package-manager-url: https://formulae.brew.sh/formula/mujs
version: 1.3.9
license: ISC
category: network
tags:
  - cli
description: Embeddable Javascript interpreter
source-archive: https://mujs.com/downloads/mujs-1.3.9.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mujs
  - exposure: global executable
    kind: cli
    name: mujs-pp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mujs
  av: sudo av install brew:mujs
  brew: brew install mujs
  debian: sudo apt install mujs
  dnf: sudo dnf install mujs
  nix: nix profile install nixpkgs#mujs
  pacman: sudo pacman -S mujs
  ubuntu: sudo apt install mujs
  zypper: sudo zypper install mujs
provenance:
  formula: mujs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
