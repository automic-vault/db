id: brew:omega
display-name: omega
homepage: https://xapian.org/
repo: https://oligarchy.co.uk/xapian/2.0.0/xapian-omega-2.0.0.tar.xz
docs: https://xapian.org/
package-manager:
  brew: omega
  macports: Omega
package-manager-url: https://formulae.brew.sh/formula/omega
version: 2.0.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Packaged search engine for websites, built on top of Xapian
source-archive: https://oligarchy.co.uk/xapian/2.0.0/xapian-omega-2.0.0.tar.xz
dependencies:
  - libmagic
  - pcre2
  - xapian
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dbi2omega
  - exposure: global executable
    kind: cli
    name: mbox2omega
  - exposure: global executable
    kind: cli
    name: omindex
  - exposure: global executable
    kind: cli
    name: omindex-list
  - exposure: global executable
    kind: cli
    name: scriptindex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:omega
  brew: brew install omega
  macports: sudo port install Omega
provenance:
  formula: omega
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
