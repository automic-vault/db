id: brew:rmw
display-name: rmw
homepage: https://theimpossibleastronaut.github.io/rmw-website/
repo: https://github.com/theimpossibleastronaut/rmw
docs: https://theimpossibleastronaut.github.io/rmw-website/
package-manager:
  brew: rmw
  nix: rmw
  zypper: rmw
package-manager-url: https://formulae.brew.sh/formula/rmw
version: 0.9.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Trashcan/recycle bin utility for the command-line
source-archive: https://github.com/theimpossibleastronaut/rmw/releases/download/v0.9.5/rmw-0.9.5.tar.xz
dependencies:
  - canfigger
  - gettext
  - ncurses
build-dependencies:
  - gettext
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rmw
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rmw
  brew: brew install rmw
  nix: nix profile install nixpkgs#rmw
  zypper: sudo zypper install rmw
provenance:
  formula: rmw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
