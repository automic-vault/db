id: brew:sdl12-compat
display-name: sdl12-compat
homepage: https://github.com/libsdl-org/sdl12-compat
repo: https://github.com/libsdl-org/sdl12-compat
docs: https://github.com/libsdl-org/sdl12-compat
package-manager:
  apk: sdl12-compat
  brew: sdl12-compat
  dnf: sdl12-compat
  macports: sdl12-compat
  pacman: sdl12-compat
package-manager-url: https://formulae.brew.sh/formula/sdl12-compat
version: 1.2.76
license: Zlib AND MIT-0
category: development
tags:
  - cli
description: SDL 1.2 compatibility layer that uses SDL 2.0 behind the scenes
source-archive: https://github.com/libsdl-org/sdl12-compat/archive/refs/tags/release-1.2.76.tar.gz
dependencies:
  - sdl2
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: sdl-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sdl12-compat
  av: sudo av install brew:sdl12-compat
  brew: brew install sdl12-compat
  dnf: sudo dnf install sdl12-compat
  macports: sudo port install sdl12-compat
  pacman: sudo pacman -S sdl12-compat
provenance:
  formula: sdl12-compat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
