id: brew:kdoctor
display-name: kdoctor
homepage: https://github.com/kotlin/kdoctor
repo: https://github.com/Kotlin/kdoctor
docs: https://github.com/kotlin/kdoctor
package-manager:
  brew: kdoctor
  nix: kdoctor
package-manager-url: https://formulae.brew.sh/formula/kdoctor
version: 1.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: Environment diagnostics for Kotlin Multiplatform Mobile app development
source-archive: https://github.com/Kotlin/kdoctor/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - gradle@8
  - openjdk@21
executables:
  - exposure: global executable
    kind: cli
    name: kdoctor
bottle:
  available: true
  platforms:
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kdoctor
  brew: brew install kdoctor
  nix: nix profile install nixpkgs#kdoctor
provenance:
  formula: kdoctor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
