id: brew:pkgdiff
display-name: pkgdiff
homepage: https://lvc.github.io/pkgdiff/
repo: https://github.com/lvc/pkgdiff
docs: https://lvc.github.io/pkgdiff/
package-manager:
  brew: pkgdiff
  debian: pkgdiff
  dnf: pkgdiff
  nix: pkgdiff
  pacman: pkgdiff
  ubuntu: pkgdiff
  zypper: pkgdiff
package-manager-url: https://formulae.brew.sh/formula/pkgdiff
version: 1.8
license: GPL-2.0-only
category: development
tags:
  - cli
description: Tool for analyzing changes in software packages (e.g. RPM, DEB, TAR.GZ)
source-archive: https://github.com/lvc/pkgdiff/archive/refs/tags/1.8.tar.gz
dependencies:
  - binutils
  - gawk
  - wdiff
executables:
  - exposure: global executable
    kind: cli
    name: pkgdiff
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pkgdiff
  brew: brew install pkgdiff
  debian: sudo apt install pkgdiff
  dnf: sudo dnf install pkgdiff
  nix: nix profile install nixpkgs#pkgdiff
  pacman: sudo pacman -S pkgdiff
  ubuntu: sudo apt install pkgdiff
  zypper: sudo zypper install pkgdiff
provenance:
  formula: pkgdiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
