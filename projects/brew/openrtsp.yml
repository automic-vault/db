id: brew:openrtsp
display-name: openrtsp
homepage: http://www.live555.com/openRTSP
repo: https://download.live555.com/live.2026.04.22.tar.gz
docs: http://www.live555.com/openRTSP
package-manager:
  brew: openrtsp
package-manager-url: https://formulae.brew.sh/formula/openrtsp
version: 2026.04.22
license: LGPL-3.0-or-later
category: network
tags:
  - cli
description: Command-line RTSP client
source-archive: https://download.live555.com/live.2026.04.22.tar.gz
dependencies:
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: MPEG2TransportStreamIndexer
  - exposure: global executable
    kind: cli
    name: live555HLSProxy
  - exposure: global executable
    kind: cli
    name: live555MediaServer
  - exposure: global executable
    kind: cli
    name: live555ProxyServer
  - exposure: global executable
    kind: cli
    name: mikeyParse
  - exposure: global executable
    kind: cli
    name: openRTSP
  - exposure: global executable
    kind: cli
    name: playSIP
  - exposure: global executable
    kind: cli
    name: registerRTSPStream
  - exposure: global executable
    kind: cli
    name: sapWatch
  - exposure: global executable
    kind: cli
    name: vobStreamer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Testing executables have been placed in: $HOMEBREW_CELLAR/openrtsp/2026.04.22/libexec'
  post-install-defined: false
install-lines:
  av: sudo av install brew:openrtsp
  brew: brew install openrtsp
provenance:
  formula: openrtsp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
