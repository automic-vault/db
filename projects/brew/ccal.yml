id: brew:ccal
display-name: ccal
homepage: https://ccal.chinesebay.com/ccal/ccal.htm
repo: https://ccal.chinesebay.com/ccal/ccal-2.5.3.tar.gz
docs: https://ccal.chinesebay.com/ccal/ccal.htm
package-manager:
  brew: ccal
  debian: ccal
  macports: ccal
  nix: ccal
  ubuntu: ccal
package-manager-url: https://formulae.brew.sh/formula/ccal
version: 2.5.3
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Create Chinese calendars for print or browsing
source-archive: https://ccal.chinesebay.com/ccal/ccal-2.5.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ccal
  - exposure: global executable
    kind: cli
    name: ccalpdf
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ccal
  brew: brew install ccal
  debian: sudo apt install ccal
  macports: sudo port install ccal
  nix: nix profile install nixpkgs#ccal
  ubuntu: sudo apt install ccal
provenance:
  formula: ccal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
