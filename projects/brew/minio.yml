id: brew:minio
display-name: minio
homepage: https://min.io
repo: https://github.com/minio/minio
docs: https://min.io
package-manager:
  apk: minio
  brew: minio
  macports: minio
  nix: minio
  scoop: main/minio
  winget: MinIO.Server
package-manager-url: https://formulae.brew.sh/formula/minio
version: 2025-10-15T17-29-55Z
license: AGPL-3.0-or-later
category: cloud
tags:
  - cli
  - kubernetes
description: High Performance, Kubernetes Native Object Storage
source-archive: https://github.com/minio/minio.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: minio
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
  service: declared
install-lines:
  apk: sudo apk add minio
  av: sudo av install brew:minio
  brew: brew install minio
  macports: sudo port install minio
  nix: nix profile install nixpkgs#minio
  scoop: scoop install main/minio
  winget: winget install --id MinIO.Server -e
provenance:
  formula: minio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
