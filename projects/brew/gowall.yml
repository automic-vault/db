id: brew:gowall
display-name: gowall
homepage: https://achno.github.io/gowall-docs/
repo: https://github.com/Achno/gowall
docs: https://achno.github.io/gowall-docs/
package-manager:
  brew: gowall
  nix: gowall
package-manager-url: https://formulae.brew.sh/formula/gowall
version: 0.2.4
license: MIT
category: development
tags:
  - cli
description: Tool to convert a Wallpaper's color scheme / palette
source-archive: https://github.com/Achno/gowall/archive/refs/tags/v0.2.4.tar.gz
dependencies:
  - mupdf
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gowall
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gowall
  brew: brew install gowall
  nix: nix profile install nixpkgs#gowall
provenance:
  formula: gowall
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
