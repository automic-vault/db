id: brew:flamegraph
display-name: flamegraph
homepage: https://github.com/brendangregg/FlameGraph
repo: https://github.com/brendangregg/FlameGraph
docs: https://github.com/brendangregg/FlameGraph
package-manager:
  brew: flamegraph
  dnf: flamegraph
  macports: flamegraph
  nix: flamegraph
package-manager-url: https://formulae.brew.sh/formula/flamegraph
version: 1.0
license: CDDL-1.0
category: development
tags:
  - cli
description: Stack trace visualizer
source-archive: https://github.com/brendangregg/FlameGraph/archive/refs/tags/v1.0.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: difffolded.pl
  - exposure: global executable
    kind: cli
    name: files.pl
  - exposure: global executable
    kind: cli
    name: flamegraph.pl
  - exposure: global executable
    kind: cli
    name: pkgsplit-perf.pl
  - exposure: global executable
    kind: cli
    name: range-perf.pl
  - exposure: global executable
    kind: cli
    name: stackcollapse-aix.pl
  - exposure: global executable
    kind: cli
    name: stackcollapse-elfutils.pl
  - exposure: global executable
    kind: cli
    name: stackcollapse-gdb.pl
  - exposure: global executable
    kind: cli
    name: stackcollapse-go.pl
  - exposure: global executable
    kind: cli
    name: stackcollapse-instruments.pl
  - exposure: global executable
    kind: cli
    name: stackcollapse-jstack.pl
  - exposure: global executable
    kind: cli
    name: stackcollapse-ljp.awk
  - exposure: global executable
    kind: cli
    name: stackcollapse-perf-sched.awk
  - exposure: global executable
    kind: cli
    name: stackcollapse-perf.pl
  - exposure: global executable
    kind: cli
    name: stackcollapse-pmc.pl
  - exposure: global executable
    kind: cli
    name: stackcollapse-recursive.pl
  - exposure: global executable
    kind: cli
    name: stackcollapse-sample.awk
  - exposure: global executable
    kind: cli
    name: stackcollapse-stap.pl
  - exposure: global executable
    kind: cli
    name: stackcollapse-vsprof.pl
  - exposure: global executable
    kind: cli
    name: stackcollapse-vtune.pl
  - exposure: global executable
    kind: cli
    name: stackcollapse.pl
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flamegraph
  brew: brew install flamegraph
  dnf: sudo dnf install flamegraph
  macports: sudo port install flamegraph
  nix: nix profile install nixpkgs#flamegraph
provenance:
  formula: flamegraph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
