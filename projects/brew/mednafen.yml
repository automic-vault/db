id: brew:mednafen
display-name: mednafen
homepage: https://mednafen.github.io/
repo: https://mednafen.github.io/releases/files/mednafen-1.32.1.tar.xz
docs: https://mednafen.github.io/
package-manager:
  apk: mednafen
  brew: mednafen
  debian: mednafen
  dnf: mednafen
  macports: mednafen
  nix: mednafen
  pacman: mednafen
  scoop: extras/mednafen
  ubuntu: mednafen
  winget: MednafenTeam.Mednafen
  zypper: mednafen
package-manager-url: https://formulae.brew.sh/formula/mednafen
version: 1.32.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Multi-system emulator
source-archive: https://mednafen.github.io/releases/files/mednafen-1.32.1.tar.xz
dependencies:
  - flac
  - gettext
  - libsndfile
  - lzo
  - musepack
  - sdl2
  - zstd
build-dependencies:
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mednafen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mednafen
  av: sudo av install brew:mednafen
  brew: brew install mednafen
  debian: sudo apt install mednafen
  dnf: sudo dnf install mednafen
  macports: sudo port install mednafen
  nix: nix profile install nixpkgs#mednafen
  pacman: sudo pacman -S mednafen
  scoop: scoop install extras/mednafen
  ubuntu: sudo apt install mednafen
  winget: winget install --id MednafenTeam.Mednafen -e
  zypper: sudo zypper install mednafen
provenance:
  formula: mednafen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
