id: brew:easyrpg-player
display-name: easyrpg-player
homepage: https://easyrpg.org/
repo: https://easyrpg.org/downloads/player/0.8.1.1/easyrpg-player-0.8.1.1.tar.xz
docs: https://easyrpg.org/
package-manager:
  apk: easyrpg-player
  brew: easyrpg-player
  dnf: easyrpg-player
  nix: easyrpg-player
package-manager-url: https://formulae.brew.sh/formula/easyrpg-player
version: 0.8.1.1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: RPG Maker 2000/2003 games interpreter
source-archive: https://easyrpg.org/downloads/player/0.8.1.1/easyrpg-player-0.8.1.1.tar.xz
dependencies:
  - fmt
  - freetype
  - harfbuzz
  - icu4c@78
  - inih
  - liblcf
  - libogg
  - libpng
  - libsndfile
  - libvorbis
  - libxmp
  - mpg123
  - pixman
  - sdl2
  - speexdsp
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: easyrpg-player
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add easyrpg-player
  av: sudo av install brew:easyrpg-player
  brew: brew install easyrpg-player
  dnf: sudo dnf install easyrpg-player
  nix: nix profile install nixpkgs#easyrpg-player
provenance:
  formula: easyrpg-player
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
