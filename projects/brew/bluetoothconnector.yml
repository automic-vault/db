id: brew:bluetoothconnector
display-name: bluetoothconnector
homepage: https://github.com/lapfelix/BluetoothConnector
repo: https://github.com/lapfelix/BluetoothConnector
docs: https://github.com/lapfelix/BluetoothConnector
package-manager:
  brew: bluetoothconnector
package-manager-url: https://formulae.brew.sh/formula/bluetoothconnector
version: 2.1.0
license: MIT
category: development
tags:
  - cli
description: Connect and disconnect Bluetooth devices
source-archive: https://github.com/lapfelix/BluetoothConnector/archive/refs/tags/2.1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: BluetoothConnector
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bluetoothconnector
  brew: brew install bluetoothconnector
provenance:
  formula: bluetoothconnector
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
