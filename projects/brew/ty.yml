id: brew:ty
display-name: ty
homepage: https://docs.astral.sh/ty/
repo: >
  https://files.pythonhosted.org/packages/d0/8d/7b5c74dc287fbcb37bae9853cec13bf44717c1735298500e4aeba31579a9/ty-0.0.39.tar.gz
docs: https://docs.astral.sh/ty/
package-manager:
  apk: ty
  brew: ty
  dnf: ty
  nix: ty
  pacman: ty
  scoop: main/ty
  winget: astral-sh.ty
package-manager-url: https://formulae.brew.sh/formula/ty
version: 0.0.39
license: MIT
category: network
tags:
  - cli
description: Extremely fast Python type checker, written in Rust
source-archive: >
  https://files.pythonhosted.org/packages/d0/8d/7b5c74dc287fbcb37bae9853cec13bf44717c1735298500e4aeba31579a9/ty-0.0.39.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ty
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ty
  av: sudo av install brew:ty
  brew: brew install ty
  dnf: sudo dnf install ty
  nix: nix profile install nixpkgs#ty
  pacman: sudo pacman -S ty
  scoop: scoop install main/ty
  winget: winget install --id astral-sh.ty -e
provenance:
  formula: ty
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
