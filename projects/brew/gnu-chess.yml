id: brew:gnu-chess
display-name: gnu-chess
homepage: https://www.gnu.org/software/chess/
repo: https://ftpmirror.gnu.org/gnu/chess/gnuchess-6.3.0.tar.gz
docs: https://www.gnu.org/software/chess/
package-manager:
  apk: gnuchess
  brew: gnu-chess
  debian: gnuchess
  dnf: gnuchess
  macports: gnuchess
  nix: gnuchess
  pacman: gnuchess
  ubuntu: gnuchess
  zypper: gnuchess
package-manager-url: https://formulae.brew.sh/formula/gnu-chess
version: 6.3.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Chess-playing program
source-archive: https://ftpmirror.gnu.org/gnu/chess/gnuchess-6.3.0.tar.gz
dependencies:
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: gnuchess
  - exposure: global executable
    kind: cli
    name: gnuchessu
  - exposure: global executable
    kind: cli
    name: gnuchessx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This formula also downloads the additional opening book. The opening book is a PGN
    file located in $HOMEBREW_CELLAR/gnu-chess/6.3.0/share/doc/gnu-chess that can be
    added using gnuchess commands.
  post-install-defined: false
install-lines:
  apk: sudo apk add gnuchess
  av: sudo av install brew:gnu-chess
  brew: brew install gnu-chess
  debian: sudo apt install gnuchess
  dnf: sudo dnf install gnuchess
  macports: sudo port install gnuchess
  nix: nix profile install nixpkgs#gnuchess
  pacman: sudo pacman -S gnuchess
  ubuntu: sudo apt install gnuchess
  zypper: sudo zypper install gnuchess
provenance:
  formula: gnu-chess
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
