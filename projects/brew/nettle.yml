id: brew:nettle
display-name: nettle
homepage: https://www.lysator.liu.se/~nisse/nettle/
repo: https://ftpmirror.gnu.org/gnu/nettle/nettle-4.0.tar.gz
docs: https://www.lysator.liu.se/~nisse/nettle/
package-manager:
  apk: nettle
  brew: nettle
  dnf: nettle
  macports: nettle
  nix: nettle
  pacman: nettle
  zypper: nettle
package-manager-url: https://formulae.brew.sh/formula/nettle
version: 4.0
license: GPL-2.0-or-later OR LGPL-3.0-or-later
category: security
tags:
  - cli
description: Low-level cryptographic library
source-archive: https://ftpmirror.gnu.org/gnu/nettle/nettle-4.0.tar.gz
dependencies:
  - gmp
executables:
  - exposure: global executable
    kind: cli
    name: nettle-hash
  - exposure: global executable
    kind: cli
    name: nettle-lfib-stream
  - exposure: global executable
    kind: cli
    name: nettle-pbkdf2
  - exposure: global executable
    kind: cli
    name: pkcs1-conv
  - exposure: global executable
    kind: cli
    name: sexp-conv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nettle
  av: sudo av install brew:nettle
  brew: brew install nettle
  dnf: sudo dnf install nettle
  macports: sudo port install nettle
  nix: nix profile install nixpkgs#nettle
  pacman: sudo pacman -S nettle
  zypper: sudo zypper install nettle
provenance:
  formula: nettle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
