id: brew:gojq
display-name: gojq
homepage: https://github.com/itchyny/gojq
repo: https://github.com/itchyny/gojq
docs: https://github.com/itchyny/gojq
package-manager:
  apk: gojq
  brew: gojq
  debian: gojq
  dnf: gojq
  macports: gojq
  nix: gojq
  ubuntu: gojq
  zypper: gojq
package-manager-url: https://formulae.brew.sh/formula/gojq
version: 0.12.19
license: MIT
category: development
tags:
  - cli
description: Pure Go implementation of jq
source-archive: https://github.com/itchyny/gojq.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gojq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gojq
  av: sudo av install brew:gojq
  brew: brew install gojq
  debian: sudo apt install gojq
  dnf: sudo dnf install gojq
  macports: sudo port install gojq
  nix: nix profile install nixpkgs#gojq
  ubuntu: sudo apt install gojq
  zypper: sudo zypper install gojq
provenance:
  formula: gojq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
