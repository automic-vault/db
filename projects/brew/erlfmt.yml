id: brew:erlfmt
display-name: erlfmt
homepage: https://github.com/WhatsApp/erlfmt
repo: https://github.com/WhatsApp/erlfmt
docs: https://github.com/WhatsApp/erlfmt
package-manager:
  brew: erlfmt
package-manager-url: https://formulae.brew.sh/formula/erlfmt
version: 1.8.0
license: Apache-2.0
category: development
tags:
  - cli
description: Automated code formatter for Erlang
source-archive: https://github.com/WhatsApp/erlfmt/archive/refs/tags/v1.8.0.tar.gz
dependencies:
  - erlang
build-dependencies:
  - rebar3
executables:
  - exposure: global executable
    kind: cli
    name: erlfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:erlfmt
  brew: brew install erlfmt
provenance:
  formula: erlfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
