id: brew:minimodem
display-name: minimodem
homepage: http://www.whence.com/minimodem/
repo: https://deb.debian.org/debian/pool/main/m/minimodem/minimodem_0.24.orig.tar.gz
docs: http://www.whence.com/minimodem/
package-manager:
  apk: minimodem
  brew: minimodem
  debian: minimodem
  macports: minimodem
  nix: minimodem
  ubuntu: minimodem
  zypper: minimodem
package-manager-url: https://formulae.brew.sh/formula/minimodem
version: 0.24
license: GPL-3.0-or-later
category: media
tags:
  - cli
description: General-purpose software audio FSK modem
source-archive: https://deb.debian.org/debian/pool/main/m/minimodem/minimodem_0.24.orig.tar.gz
dependencies:
  - fftw
  - libsndfile
  - pulseaudio
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: minimodem
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add minimodem
  av: sudo av install brew:minimodem
  brew: brew install minimodem
  debian: sudo apt install minimodem
  macports: sudo port install minimodem
  nix: nix profile install nixpkgs#minimodem
  ubuntu: sudo apt install minimodem
  zypper: sudo zypper install minimodem
provenance:
  formula: minimodem
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
