id: brew:git-octopus
display-name: git-octopus
homepage: https://github.com/lesfurets/git-octopus
repo: https://github.com/lesfurets/git-octopus
docs: https://github.com/lesfurets/git-octopus
package-manager:
  brew: git-octopus
  dnf: git-octopus
  nix: git-octopus
package-manager-url: https://formulae.brew.sh/formula/git-octopus
version: 1.4
license: LGPL-3.0-only
category: development
tags:
  - cli
  - git
description: Continuous merge workflow
source-archive: https://github.com/lesfurets/git-octopus/archive/refs/tags/v1.4.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: git-apply-conflict-resolution
  - exposure: global executable
    kind: cli
    name: git-conflict
  - exposure: global executable
    kind: cli
    name: git-octopus
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-octopus
  brew: brew install git-octopus
  dnf: sudo dnf install git-octopus
  nix: nix profile install nixpkgs#git-octopus
provenance:
  formula: git-octopus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
