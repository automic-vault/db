id: brew:rtptools
display-name: rtptools
homepage: https://github.com/irtlab/rtptools
repo: https://github.com/irtlab/rtptools
docs: https://github.com/irtlab/rtptools
package-manager:
  apk: rtptools
  brew: rtptools
  macports: rtptools
  nix: rtptools
package-manager-url: https://formulae.brew.sh/formula/rtptools
version: 1.22
license: BSD-3-Clause
category: development
tags:
  - cli
description: Set of tools for processing RTP data
source-archive: https://github.com/irtlab/rtptools/archive/refs/tags/1.22.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: multidump
  - exposure: global executable
    kind: cli
    name: multiplay
  - exposure: global executable
    kind: cli
    name: rtpdump
  - exposure: global executable
    kind: cli
    name: rtpplay
  - exposure: global executable
    kind: cli
    name: rtpsend
  - exposure: global executable
    kind: cli
    name: rtptrans
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rtptools
  av: sudo av install brew:rtptools
  brew: brew install rtptools
  macports: sudo port install rtptools
  nix: nix profile install nixpkgs#rtptools
provenance:
  formula: rtptools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
