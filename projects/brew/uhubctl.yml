id: brew:uhubctl
display-name: uhubctl
homepage: https://github.com/mvp/uhubctl
repo: https://github.com/mvp/uhubctl
docs: https://github.com/mvp/uhubctl
package-manager:
  apk: uhubctl
  brew: uhubctl
  debian: uhubctl
  dnf: uhubctl
  macports: uhubctl
  nix: uhubctl
  ubuntu: uhubctl
  zypper: uhubctl
package-manager-url: https://formulae.brew.sh/formula/uhubctl
version: 2.6.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: USB hub per-port power control
source-archive: https://github.com/mvp/uhubctl/archive/refs/tags/v2.6.0.tar.gz
dependencies:
  - libusb
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: uhubctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add uhubctl
  av: sudo av install brew:uhubctl
  brew: brew install uhubctl
  debian: sudo apt install uhubctl
  dnf: sudo dnf install uhubctl
  macports: sudo port install uhubctl
  nix: nix profile install nixpkgs#uhubctl
  ubuntu: sudo apt install uhubctl
  zypper: sudo zypper install uhubctl
provenance:
  formula: uhubctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
