id: brew:onlykey-agent
display-name: onlykey-agent
homepage: https://docs.crp.to/onlykey-agent.html
repo: >
  https://files.pythonhosted.org/packages/68/80/e89b6c3680bedb1e14e99f0539ac805bddc7d8dd87c58805c64484966b7c/onlykey-agent-1.1.15.tar.gz
docs: https://docs.crp.to/onlykey-agent.html
package-manager:
  brew: onlykey-agent
  nix: onlykey-agent
package-manager-url: https://formulae.brew.sh/formula/onlykey-agent
version: 1.1.15
license: LGPL-3.0-only
category: network
tags:
  - cli
description: Middleware that lets you use OnlyKey as a hardware SSH/GPG device
source-archive: >
  https://files.pythonhosted.org/packages/68/80/e89b6c3680bedb1e14e99f0539ac805bddc7d8dd87c58805c64484966b7c/onlykey-agent-1.1.15.tar.gz
dependencies:
  - certifi
  - cryptography
  - gnupg
  - hidapi
  - libsodium
  - libusb
  - python@3.14
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: onlykey-agent
  - exposure: global executable
    kind: cli
    name: onlykey-gpg
  - exposure: global executable
    kind: cli
    name: onlykey-gpg-agent
  - exposure: global executable
    kind: cli
    name: onlykey_agent.py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:onlykey-agent
  brew: brew install onlykey-agent
  nix: nix profile install nixpkgs#onlykey-agent
provenance:
  formula: onlykey-agent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
