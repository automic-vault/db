bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To load Zsh completions, add the following to your .zshrc: source
    $HOMEBREW_PREFIX/opt/git-extras/share/git-extras/git-extras-completion.zsh
  post-install-defined: false
install-lines:
  apk: sudo apk add git-extras
  av: sudo av install brew:git-extras
  brew: brew install git-extras
  chocolatey: choco install git-fork
  debian: sudo apt install git-extras
  dnf: sudo dnf install git-extras
  macports: sudo port install git-extras
  nix: nix profile install nixpkgs#git-extras
  pacman: sudo pacman -S git-delta
  ubuntu: sudo apt install git-extras
  winget: winget install --id Fork.Fork -e
  zypper: sudo zypper install git-delta
provenance:
  formula: git-extras
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
