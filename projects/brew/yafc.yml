id: brew:yafc
display-name: yafc
homepage: https://github.com/sebastinas/yafc
repo: https://deb.debian.org/debian/pool/main/y/yafc/yafc_1.3.7.orig.tar.xz
docs: https://github.com/sebastinas/yafc
package-manager:
  brew: yafc
  debian: yafc
  macports: yafc
  ubuntu: yafc
package-manager-url: https://formulae.brew.sh/formula/yafc
version: 1.3.7
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Command-line FTP client
source-archive: https://deb.debian.org/debian/pool/main/y/yafc/yafc_1.3.7.orig.tar.xz
dependencies:
  - libssh
  - openssl@3
  - readline
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: yafc
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yafc
  brew: brew install yafc
  debian: sudo apt install yafc
  macports: sudo port install yafc
  ubuntu: sudo apt install yafc
provenance:
  formula: yafc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
