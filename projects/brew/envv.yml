id: brew:envv
display-name: envv
homepage: https://github.com/jakewendt/envv
repo: https://github.com/jakewendt/envv
docs: https://github.com/jakewendt/envv
package-manager:
  brew: envv
package-manager-url: https://formulae.brew.sh/formula/envv
version: 1.7
license: MIT
category: development
tags:
  - cli
description: Shell-independent handling of environment variables
source-archive: https://github.com/jakewendt/envv/archive/refs/tags/v1.7.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: envv
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:envv
  brew: brew install envv
provenance:
  formula: envv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
