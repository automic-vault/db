id: brew:depot
display-name: depot
homepage: https://depot.dev/
repo: https://github.com/depot/cli
docs: https://depot.dev/
package-manager:
  brew: depot
package-manager-url: https://formulae.brew.sh/formula/depot
version: 2.101.63
license: MIT
category: cloud
tags:
  - cli
  - cloud
  - docker
description: Build your Docker images in the cloud
source-archive: https://github.com/depot/cli/archive/refs/tags/v2.101.63.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: depot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:depot
  brew: brew install depot
provenance:
  formula: depot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
