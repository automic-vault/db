id: brew:hexyl
display-name: hexyl
homepage: https://github.com/sharkdp/hexyl
repo: https://github.com/sharkdp/hexyl
docs: https://github.com/sharkdp/hexyl
package-manager:
  apk: hexyl
  brew: hexyl
  debian: hexyl
  dnf: hexyl
  macports: hexyl
  nix: hexyl
  pacman: hexyl
  scoop: main/hexyl
  ubuntu: hexyl
  winget: sharkdp.hexyl
  zypper: hexyl
package-manager-url: https://formulae.brew.sh/formula/hexyl
version: 0.17.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Command-line hex viewer
source-archive: https://github.com/sharkdp/hexyl/archive/refs/tags/v0.17.0.tar.gz
build-dependencies:
  - pandoc
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hexyl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hexyl
  av: sudo av install brew:hexyl
  brew: brew install hexyl
  debian: sudo apt install hexyl
  dnf: sudo dnf install hexyl
  macports: sudo port install hexyl
  nix: nix profile install nixpkgs#hexyl
  pacman: sudo pacman -S hexyl
  scoop: scoop install main/hexyl
  ubuntu: sudo apt install hexyl
  winget: winget install --id sharkdp.hexyl -e
  zypper: sudo zypper install hexyl
provenance:
  formula: hexyl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
