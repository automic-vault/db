id: brew:monkeysphere
display-name: monkeysphere
homepage: https://tracker.debian.org/pkg/monkeysphere
repo: https://deb.debian.org/debian/pool/main/m/monkeysphere/monkeysphere_0.44.orig.tar.gz
docs: https://tracker.debian.org/pkg/monkeysphere
package-manager:
  apk: monkeysphere
  brew: monkeysphere
  nix: monkeysphere
package-manager-url: https://formulae.brew.sh/formula/monkeysphere
version: 0.44
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Use the OpenPGP web of trust to verify ssh connections
source-archive: https://deb.debian.org/debian/pool/main/m/monkeysphere/monkeysphere_0.44.orig.tar.gz
dependencies:
  - gnupg
  - libassuan
  - libgcrypt
  - libgpg-error
  - openssl@3
build-dependencies:
  - gnu-sed
  - pkgconf
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: agent-transfer
  - exposure: global executable
    kind: cli
    name: monkeysphere
  - exposure: global executable
    kind: cli
    name: monkeysphere-authentication
  - exposure: global executable
    kind: cli
    name: monkeysphere-host
  - exposure: global executable
    kind: cli
    name: openpgp2pem
  - exposure: global executable
    kind: cli
    name: openpgp2spki
  - exposure: global executable
    kind: cli
    name: openpgp2ssh
  - exposure: global executable
    kind: cli
    name: pem2openpgp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add monkeysphere
  av: sudo av install brew:monkeysphere
  brew: brew install monkeysphere
  nix: nix profile install nixpkgs#monkeysphere
provenance:
  formula: monkeysphere
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
