id: brew:libtensorflow
display-name: libtensorflow
homepage: https://www.tensorflow.org/
repo: https://github.com/tensorflow/tensorflow
docs: https://www.tensorflow.org/
package-manager:
  brew: libtensorflow
  nix: libtensorflow
package-manager-url: https://formulae.brew.sh/formula/libtensorflow
version: 2.21.0
license: Apache-2.0
category: development
tags:
  - cli
description: C interface for Google's OS library for Machine Intelligence
source-archive: https://github.com/tensorflow/tensorflow/archive/refs/tags/v2.21.0.tar.gz
build-dependencies:
  - bazelisk
  - gnu-getopt
  - numpy
  - python@3.13
executables:
  - exposure: global executable
    kind: cli
    name: benchmark_model
  - exposure: global executable
    kind: cli
    name: summarize_graph
  - exposure: global executable
    kind: cli
    name: transform_graph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libtensorflow
  brew: brew install libtensorflow
  nix: nix profile install nixpkgs#libtensorflow
provenance:
  formula: libtensorflow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
