id: brew:salt-lint
display-name: salt-lint
homepage: https://github.com/warpnet/salt-lint
repo: >
  https://files.pythonhosted.org/packages/e5/e9/4df64ca147c084ca1cdbea9210549758d07f4ed94ac37d1cd1c99288ef5c/salt-lint-0.9.2.tar.gz
docs: https://github.com/warpnet/salt-lint
package-manager:
  brew: salt-lint
  dnf: salt-lint
  nix: salt-lint
  zypper: salt-lint
package-manager-url: https://formulae.brew.sh/formula/salt-lint
version: 0.9.2
license: MIT
category: development
tags:
  - cli
description: Check for best practices in SaltStack
source-archive: >
  https://files.pythonhosted.org/packages/e5/e9/4df64ca147c084ca1cdbea9210549758d07f4ed94ac37d1cd1c99288ef5c/salt-lint-0.9.2.tar.gz
dependencies:
  - libyaml
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: salt-lint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:salt-lint
  brew: brew install salt-lint
  dnf: sudo dnf install salt-lint
  nix: nix profile install nixpkgs#salt-lint
  zypper: sudo zypper install salt-lint
provenance:
  formula: salt-lint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
