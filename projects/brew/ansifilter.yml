id: brew:ansifilter
display-name: ansifilter
homepage: http://andre-simon.de/doku/ansifilter/en/ansifilter.php
repo: https://gitlab.com/saalen/ansifilter/-/archive/2.22/ansifilter-2.22.tar.bz2
docs: http://andre-simon.de/doku/ansifilter/en/ansifilter.php
package-manager:
  apk: ansifilter
  brew: ansifilter
  debian: ansifilter
  dnf: ansifilter
  macports: ansifilter
  nix: ansifilter
  ubuntu: ansifilter
  zypper: ansifilter
package-manager-url: https://formulae.brew.sh/formula/ansifilter
version: 2.22
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Strip or convert ANSI codes into HTML, (La)Tex, RTF, or BBCode
source-archive: https://gitlab.com/saalen/ansifilter/-/archive/2.22/ansifilter-2.22.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: ansifilter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ansifilter
  av: sudo av install brew:ansifilter
  brew: brew install ansifilter
  debian: sudo apt install ansifilter
  dnf: sudo dnf install ansifilter
  macports: sudo port install ansifilter
  nix: nix profile install nixpkgs#ansifilter
  ubuntu: sudo apt install ansifilter
  zypper: sudo zypper install ansifilter
provenance:
  formula: ansifilter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
