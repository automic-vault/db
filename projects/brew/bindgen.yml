id: brew:bindgen
display-name: bindgen
homepage: https://rust-lang.github.io/rust-bindgen/
repo: https://github.com/rust-lang/rust-bindgen
docs: https://rust-lang.github.io/rust-bindgen/
package-manager:
  brew: bindgen
  debian: bindgen
  ubuntu: bindgen
package-manager-url: https://formulae.brew.sh/formula/bindgen
version: 0.72.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Automatically generates Rust FFI bindings to C (and some C++) libraries
source-archive: https://github.com/rust-lang/rust-bindgen/archive/refs/tags/v0.72.1.tar.gz
build-dependencies:
  - rust
uses-from-macos:
  - llvm
executables:
  - exposure: global executable
    kind: cli
    name: bindgen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bindgen
  brew: brew install bindgen
  debian: sudo apt install bindgen
  ubuntu: sudo apt install bindgen
provenance:
  formula: bindgen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
