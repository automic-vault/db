id: brew:tdb
display-name: tdb
homepage: https://tdb.samba.org/
repo: https://www.samba.org/ftp/tdb/tdb-1.4.15.tar.gz
docs: https://tdb.samba.org/
package-manager:
  apk: tdb
  brew: tdb
  macports: tdb
  nix: tdb
  pacman: tdb
package-manager-url: https://formulae.brew.sh/formula/tdb
version: 1.4.15
license: LGPL-3.0-or-later AND GPL-3.0-or-later
category: database
tags:
  - cli
  - database
description: Trivial DataBase, by the Samba project
source-archive: https://www.samba.org/ftp/tdb/tdb-1.4.15.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: tdbbackup
  - exposure: global executable
    kind: cli
    name: tdbdump
  - exposure: global executable
    kind: cli
    name: tdbrestore
  - exposure: global executable
    kind: cli
    name: tdbtool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tdb
  av: sudo av install brew:tdb
  brew: brew install tdb
  macports: sudo port install tdb
  nix: nix profile install nixpkgs#tdb
  pacman: sudo pacman -S tdb
provenance:
  formula: tdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
