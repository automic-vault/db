id: brew:roadrunner
display-name: roadrunner
homepage: https://docs.roadrunner.dev/docs
repo: https://github.com/roadrunner-server/roadrunner
docs: https://docs.roadrunner.dev/docs
package-manager:
  brew: roadrunner
  debian: rr
  dnf: rr
  macports: roadrunner
  nix: roadrunner
  ubuntu: rr
  zypper: rr
package-manager-url: https://formulae.brew.sh/formula/roadrunner
version: 2025.1.14
license: MIT
category: development
tags:
  - cli
description: High-performance PHP application server, load-balancer and process manager
source-archive: https://github.com/roadrunner-server/roadrunner/archive/refs/tags/v2025.1.14.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:roadrunner
  brew: brew install roadrunner
  debian: sudo apt install rr
  dnf: sudo dnf install rr
  macports: sudo port install roadrunner
  nix: nix profile install nixpkgs#roadrunner
  ubuntu: sudo apt install rr
  zypper: sudo zypper install rr
provenance:
  formula: roadrunner
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
