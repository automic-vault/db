id: brew:tnftp
display-name: tnftp
homepage: https://cdn.netbsd.org/pub/NetBSD/misc/tnftp/
repo: https://cdn.netbsd.org/pub/NetBSD/misc/tnftp/tnftp-20260211.tar.gz
docs: https://cdn.netbsd.org/pub/NetBSD/misc/tnftp/
package-manager:
  brew: tnftp
  debian: tnftp
  dnf: tnftp
  macports: tnftp
  pacman: tnftp
  ubuntu: tnftp
  zypper: tnftp
package-manager-url: https://formulae.brew.sh/formula/tnftp
version: 20260211
license: BSD-2-Clause AND BSD-3-Clause AND ISC
category: network
tags:
  - cli
description: NetBSD's FTP client
source-archive: https://cdn.netbsd.org/pub/NetBSD/misc/tnftp/tnftp-20260211.tar.gz
uses-from-macos:
  - libedit
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: tnftp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tnftp
  brew: brew install tnftp
  debian: sudo apt install tnftp
  dnf: sudo dnf install tnftp
  macports: sudo port install tnftp
  pacman: sudo pacman -S tnftp
  ubuntu: sudo apt install tnftp
  zypper: sudo zypper install tnftp
provenance:
  formula: tnftp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
