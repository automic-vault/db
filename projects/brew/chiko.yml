id: brew:chiko
display-name: chiko
homepage: https://github.com/felangga/chiko
repo: https://github.com/felangga/chiko
docs: https://github.com/felangga/chiko
package-manager:
  brew: chiko
package-manager-url: https://formulae.brew.sh/formula/chiko
version: 0.2.0
license: MIT
category: development
tags:
  - cli
description: Ultimate Beauty gRPC Client for your Terminal
source-archive: https://github.com/felangga/chiko/archive/refs/tags/v0.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: chiko
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chiko
  brew: brew install chiko
provenance:
  formula: chiko
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
