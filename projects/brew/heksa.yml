id: brew:heksa
display-name: heksa
homepage: https://github.com/raspi/heksa
repo: https://github.com/raspi/heksa
docs: https://github.com/raspi/heksa
package-manager:
  brew: heksa
package-manager-url: https://formulae.brew.sh/formula/heksa
version: 1.14.0
license: Apache-2.0
category: development
tags:
  - cli
description: CLI hex dumper with colors
source-archive: https://github.com/raspi/heksa.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: heksa
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:heksa
  brew: brew install heksa
provenance:
  formula: heksa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
