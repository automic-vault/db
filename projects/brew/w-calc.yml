id: brew:w-calc
display-name: w-calc
homepage: https://w-calc.sourceforge.net/
repo: https://downloads.sourceforge.net/project/w-calc/Wcalc/2.5/wcalc-2.5.tar.bz2
docs: https://w-calc.sourceforge.net/
package-manager:
  brew: w-calc
  debian: wcalc
  macports: wcalc
  nix: wcalc
  ubuntu: wcalc
package-manager-url: https://formulae.brew.sh/formula/w-calc
version: 2.5
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Very capable calculator
source-archive: https://downloads.sourceforge.net/project/w-calc/Wcalc/2.5/wcalc-2.5.tar.bz2
dependencies:
  - gmp
  - mpfr
executables:
  - exposure: global executable
    kind: cli
    name: wcalc
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:w-calc
  brew: brew install w-calc
  debian: sudo apt install wcalc
  macports: sudo port install wcalc
  nix: nix profile install nixpkgs#wcalc
  ubuntu: sudo apt install wcalc
provenance:
  formula: w-calc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
