id: brew:container-canary
display-name: container-canary
homepage: https://github.com/NVIDIA/container-canary
repo: https://github.com/NVIDIA/container-canary
docs: https://github.com/NVIDIA/container-canary
package-manager:
  brew: container-canary
package-manager-url: https://formulae.brew.sh/formula/container-canary
version: 0.5.0
license: Apache-2.0
category: development
tags:
  - cli
description: Test and validate container requirements against versioned manifests
source-archive: https://github.com/NVIDIA/container-canary/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: canary
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:container-canary
  brew: brew install container-canary
provenance:
  formula: container-canary
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
