id: brew:spiffe-helper
display-name: spiffe-helper
homepage: https://github.com/spiffe/spiffe-helper
repo: https://github.com/spiffe/spiffe-helper
docs: https://github.com/spiffe/spiffe-helper
package-manager:
  brew: spiffe-helper
  nix: spiffe-helper
package-manager-url: https://formulae.brew.sh/formula/spiffe-helper
version: 0.11.0
license: Apache-2.0
category: development
tags:
  - cli
description: Tool that can be used to retrieve and manage SVIDs on behalf of a workload
source-archive: https://github.com/spiffe/spiffe-helper/archive/refs/tags/v0.11.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: spiffe-helper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spiffe-helper
  brew: brew install spiffe-helper
  nix: nix profile install nixpkgs#spiffe-helper
provenance:
  formula: spiffe-helper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
