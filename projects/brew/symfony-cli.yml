id: brew:symfony-cli
display-name: symfony-cli
homepage: https://github.com/symfony-cli/symfony-cli
repo: https://github.com/symfony-cli/symfony-cli
docs: https://github.com/symfony-cli/symfony-cli
package-manager:
  brew: symfony-cli
  chocolatey: symfony-cli
  macports: symfony-cli
  nix: symfony-cli
  scoop: main/symfony-cli
package-manager-url: https://formulae.brew.sh/formula/symfony-cli
version: 5.17.1
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Build, run, and manage Symfony applications
source-archive: https://github.com/symfony-cli/symfony-cli/archive/refs/tags/v5.17.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: symfony
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:symfony-cli
  brew: brew install symfony-cli
  chocolatey: choco install symfony-cli
  macports: sudo port install symfony-cli
  nix: nix profile install nixpkgs#symfony-cli
  scoop: scoop install main/symfony-cli
provenance:
  formula: symfony-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
