id: brew:libdv
display-name: libdv
homepage: https://libdv.sourceforge.net/
repo: https://downloads.sourceforge.net/project/libdv/libdv/1.0.0/libdv-1.0.0.tar.gz
docs: https://libdv.sourceforge.net/
package-manager:
  apk: libdv
  brew: libdv
  dnf: libdv
  macports: libdv
  nix: libdv
  pacman: libdv
  zypper: libdv
package-manager-url: https://formulae.brew.sh/formula/libdv
version: 1.0.0
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Codec for DV video encoding format
source-archive: https://downloads.sourceforge.net/project/libdv/libdv/1.0.0/libdv-1.0.0.tar.gz
dependencies:
  - popt
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dubdv
  - exposure: global executable
    kind: cli
    name: dvconnect
  - exposure: global executable
    kind: cli
    name: encodedv
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libdv
  av: sudo av install brew:libdv
  brew: brew install libdv
  dnf: sudo dnf install libdv
  macports: sudo port install libdv
  nix: nix profile install nixpkgs#libdv
  pacman: sudo pacman -S libdv
  zypper: sudo zypper install libdv
provenance:
  formula: libdv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
