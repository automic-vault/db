id: brew:ktfmt
display-name: ktfmt
homepage: https://facebook.github.io/ktfmt/
repo: https://github.com/facebook/ktfmt
docs: https://facebook.github.io/ktfmt/
package-manager:
  brew: ktfmt
  nix: ktfmt
package-manager-url: https://formulae.brew.sh/formula/ktfmt
version: 0.63
license: Apache-2.0
category: development
tags:
  - cli
description: Kotlin code formatter
source-archive: https://github.com/facebook/ktfmt/archive/refs/tags/v0.63.tar.gz
dependencies:
  - openjdk@17
build-dependencies:
  - gradle
executables:
  - exposure: global executable
    kind: cli
    name: ktfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ktfmt
  brew: brew install ktfmt
  nix: nix profile install nixpkgs#ktfmt
provenance:
  formula: ktfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
