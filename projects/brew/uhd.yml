id: brew:uhd
display-name: uhd
homepage: https://files.ettus.com/manual/
repo: https://github.com/EttusResearch/uhd
docs: https://files.ettus.com/manual/
package-manager:
  apk: uhd
  brew: uhd
  dnf: uhd
  macports: uhd
  nix: uhd
package-manager-url: https://formulae.brew.sh/formula/uhd
version: 4.10.0.0
license: GPL-3.0-or-later AND LGPL-3.0-or-later AND MIT AND BSD-3-Clause AND Apache-2.0
category: development
tags:
  - cli
description: Hardware driver for all USRP devices
source-archive: https://github.com/EttusResearch/uhd/archive/refs/tags/v4.10.0.0.tar.gz
dependencies:
  - boost
  - libusb
  - python@3.14
build-dependencies:
  - cmake
  - doxygen
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: uhd_adc_self_cal
  - exposure: global executable
    kind: cli
    name: uhd_cal_rx_iq_balance
  - exposure: global executable
    kind: cli
    name: uhd_cal_tx_dc_offset
  - exposure: global executable
    kind: cli
    name: uhd_cal_tx_iq_balance
  - exposure: global executable
    kind: cli
    name: uhd_config_info
  - exposure: global executable
    kind: cli
    name: uhd_find_devices
  - exposure: global executable
    kind: cli
    name: uhd_image_loader
  - exposure: global executable
    kind: cli
    name: uhd_images_downloader
  - exposure: global executable
    kind: cli
    name: uhd_usrp_probe
  - exposure: global executable
    kind: cli
    name: usrp2_card_burner
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add uhd
  av: sudo av install brew:uhd
  brew: brew install uhd
  dnf: sudo dnf install uhd
  macports: sudo port install uhd
  nix: nix profile install nixpkgs#uhd
provenance:
  formula: uhd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
