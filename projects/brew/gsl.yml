id: brew:gsl
display-name: gsl
homepage: https://www.gnu.org/software/gsl/
repo: https://ftpmirror.gnu.org/gnu/gsl/gsl-2.8.tar.gz
docs: https://www.gnu.org/software/gsl/
package-manager:
  apk: gsl
  brew: gsl
  dnf: gsl
  macports: gsl
  nix: gsl
  pacman: gsl
  zypper: gsl
package-manager-url: https://formulae.brew.sh/formula/gsl
version: 2.8
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Numerical library for C and C++
source-archive: https://ftpmirror.gnu.org/gnu/gsl/gsl-2.8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: gsl-config
  - exposure: global executable
    kind: cli
    name: gsl-histogram
  - exposure: global executable
    kind: cli
    name: gsl-randist
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gsl
  av: sudo av install brew:gsl
  brew: brew install gsl
  dnf: sudo dnf install gsl
  macports: sudo port install gsl
  nix: nix profile install nixpkgs#gsl
  pacman: sudo pacman -S gsl
  zypper: sudo zypper install gsl
provenance:
  formula: gsl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
