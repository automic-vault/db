id: brew:lndir
display-name: lndir
homepage: https://gitlab.freedesktop.org/xorg/util/lndir
repo: https://www.x.org/releases/individual/util/lndir-1.0.5.tar.xz
docs: https://gitlab.freedesktop.org/xorg/util/lndir
package-manager:
  brew: lndir
  macports: lndir
  nix: lndir
  zypper: lndir
package-manager-url: https://formulae.brew.sh/formula/lndir
version: 1.0.5
license: MIT-open-group
category: development
tags:
  - cli
description: Create a shadow directory of symbolic links to another directory tree
source-archive: https://www.x.org/releases/individual/util/lndir-1.0.5.tar.xz
build-dependencies:
  - pkgconf
  - xorgproto
executables:
  - exposure: global executable
    kind: cli
    name: lndir
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lndir
  brew: brew install lndir
  macports: sudo port install lndir
  nix: nix profile install nixpkgs#lndir
  zypper: sudo zypper install lndir
provenance:
  formula: lndir
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
