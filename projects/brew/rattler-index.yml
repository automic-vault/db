id: brew:rattler-index
display-name: rattler-index
homepage: https://github.com/conda/rattler
repo: https://github.com/conda/rattler
docs: https://github.com/conda/rattler
package-manager:
  brew: rattler-index
package-manager-url: https://formulae.brew.sh/formula/rattler-index
version: 0.30.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Index conda channels using rattler
source-archive: https://github.com/conda/rattler/archive/refs/tags/rattler_index-v0.30.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rattler-index
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rattler-index
  brew: brew install rattler-index
provenance:
  formula: rattler-index
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
