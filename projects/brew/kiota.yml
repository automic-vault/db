id: brew:kiota
display-name: kiota
homepage: https://aka.ms/kiota/docs
repo: https://github.com/microsoft/kiota
docs: https://aka.ms/kiota/docs
package-manager:
  brew: kiota
  scoop: main/kiota
  winget: Microsoft.OpenAPI.Kiota
package-manager-url: https://formulae.brew.sh/formula/kiota
version: 1.30.0
license: MIT
category: development
tags:
  - cli
description: OpenAPI based HTTP Client code generator
source-archive: https://github.com/microsoft/kiota/archive/refs/tags/v1.30.0.tar.gz
dependencies:
  - dotnet
executables:
  - exposure: global executable
    kind: cli
    name: kiota
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kiota
  brew: brew install kiota
  scoop: scoop install main/kiota
  winget: winget install --id Microsoft.OpenAPI.Kiota -e
provenance:
  formula: kiota
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
