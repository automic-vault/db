id: brew:esphome
display-name: esphome
homepage: https://github.com/esphome/esphome
repo: >
  https://files.pythonhosted.org/packages/f2/33/2e58efe6242791821d5c8aee8e0d14a638f01f13f9bd43e84898ac72f6c8/esphome-2026.5.0.tar.gz
docs: https://github.com/esphome/esphome
package-manager:
