id: brew:fst
display-name: fst
homepage: https://github.com/BurntSushi/fst
repo: https://github.com/BurntSushi/fst
docs: https://github.com/BurntSushi/fst
package-manager:
  brew: fst
  nix: fst
package-manager-url: https://formulae.brew.sh/formula/fst
version: 0.4.3
license: Unlicense OR MIT
category: development
tags:
  - cli
description: Represent large sets and maps compactly with finite state transducers
source-archive: https://github.com/BurntSushi/fst/archive/refs/tags/fst-bin-0.4.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fst
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fst
  brew: brew install fst
  nix: nix profile install nixpkgs#fst
provenance:
  formula: fst
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
