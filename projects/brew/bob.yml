id: brew:bob
display-name: bob
homepage: https://github.com/MordechaiHadad/bob
repo: https://github.com/MordechaiHadad/bob
docs: https://github.com/MordechaiHadad/bob
package-manager:
  brew: bob
  pacman: bob
package-manager-url: https://formulae.brew.sh/formula/bob
version: 4.1.7
license: MIT
category: development
tags:
  - cli
description: Version manager for neovim
source-archive: https://github.com/MordechaiHadad/bob/archive/refs/tags/v4.1.7.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bob
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bob
  brew: brew install bob
  pacman: sudo pacman -S bob
provenance:
  formula: bob
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
