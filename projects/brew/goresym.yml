id: brew:goresym
display-name: goresym
homepage: https://github.com/mandiant/GoReSym
repo: https://github.com/mandiant/GoReSym
docs: https://github.com/mandiant/GoReSym
package-manager:
  brew: goresym
  nix: goresym
package-manager-url: https://formulae.brew.sh/formula/goresym
version: 3.3
license: MIT
category: development
tags:
  - cli
description: Go symbol recovery tool
source-archive: https://github.com/mandiant/GoReSym/archive/refs/tags/v3.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goresym
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:goresym
  brew: brew install goresym
  nix: nix profile install nixpkgs#goresym
provenance:
  formula: goresym
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
