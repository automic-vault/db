id: brew:libvirt
display-name: libvirt
homepage: https://libvirt.org/
repo: https://download.libvirt.org/libvirt-12.3.0.tar.xz
docs: https://libvirt.org/
package-manager:
  apk: libvirt
  brew: libvirt
  dnf: libvirt
  macports: libvirt
  nix: libvirt
  pacman: libvirt
  zypper: libvirt
package-manager-url: https://formulae.brew.sh/formula/libvirt
version: 12.3.0
license: LGPL-2.1-or-later AND GPL-2.0-or-later
category: network
tags:
  - cli
description: C virtualization API
source-archive: https://download.libvirt.org/libvirt-12.3.0.tar.xz
dependencies:
  - gettext
  - glib
  - gnutls
  - json-c
  - libiscsi
  - libssh2
  - readline
build-dependencies:
  - docutils
  - gettext
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: libvirtd
  - exposure: global executable
    kind: cli
    name: virsh
  - exposure: global executable
    kind: cli
    name: virt-admin
  - exposure: global executable
    kind: cli
    name: virt-host-validate
  - exposure: global executable
    kind: cli
    name: virt-login-shell
  - exposure: global executable
    kind: cli
    name: virt-pki-query-dn
  - exposure: global executable
    kind: cli
    name: virt-pki-validate
  - exposure: global executable
    kind: cli
    name: virt-qemu-qmp-proxy
  - exposure: global executable
    kind: cli
    name: virt-qemu-run
  - exposure: global executable
    kind: cli
    name: virt-qemu-sev-validate
  - exposure: global executable
    kind: cli
    name: virt-ssh-helper
  - exposure: global executable
    kind: cli
    name: virt-xml-validate
  - exposure: global executable
    kind: cli
    name: virtchd
  - exposure: global executable
    kind: cli
    name: virtlockd
  - exposure: global executable
    kind: cli
    name: virtlogd
  - exposure: global executable
    kind: cli
    name: virtlxcd
  - exposure: global executable
    kind: cli
    name: virtnetworkd
  - exposure: global executable
    kind: cli
    name: virtnwfilterd
  - exposure: global executable
    kind: cli
    name: virtproxyd
  - exposure: global executable
    kind: cli
    name: virtqemud
  - exposure: global executable
    kind: cli
    name: virtsecretd
  - exposure: global executable
    kind: cli
    name: virtstoraged
  - exposure: global executable
    kind: cli
    name: virtvboxd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add libvirt
  av: sudo av install brew:libvirt
  brew: brew install libvirt
  dnf: sudo dnf install libvirt
  macports: sudo port install libvirt
  nix: nix profile install nixpkgs#libvirt
  pacman: sudo pacman -S libvirt
  zypper: sudo zypper install libvirt
provenance:
  formula: libvirt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
