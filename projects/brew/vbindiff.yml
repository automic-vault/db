id: brew:vbindiff
display-name: vbindiff
homepage: https://www.cjmweb.net/vbindiff/
repo: https://www.cjmweb.net/vbindiff/vbindiff-3.0_beta5.tar.gz
docs: https://www.cjmweb.net/vbindiff/
package-manager:
  apk: vbindiff
  brew: vbindiff
  debian: vbindiff
  dnf: vbindiff
  macports: vbindiff
  nix: vbindiff
  pacman: vbindiff
  scoop: main/vbindiff
  ubuntu: vbindiff
  winget: Madsen.VBinDiff
package-manager-url: https://formulae.brew.sh/formula/vbindiff
version: 3.0_beta5
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Visual Binary Diff
source-archive: https://www.cjmweb.net/vbindiff/vbindiff-3.0_beta5.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: vbindiff
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vbindiff
  av: sudo av install brew:vbindiff
  brew: brew install vbindiff
  debian: sudo apt install vbindiff
  dnf: sudo dnf install vbindiff
  macports: sudo port install vbindiff
  nix: nix profile install nixpkgs#vbindiff
  pacman: sudo pacman -S vbindiff
  scoop: scoop install main/vbindiff
  ubuntu: sudo apt install vbindiff
  winget: winget install --id Madsen.VBinDiff -e
provenance:
  formula: vbindiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
