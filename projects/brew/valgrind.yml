id: brew:valgrind
display-name: valgrind
homepage: https://www.valgrind.org/
repo: https://sourceware.org/pub/valgrind/valgrind-3.27.1.tar.bz2
docs: https://www.valgrind.org/
package-manager:
  apk: valgrind
  brew: valgrind
  debian: valgrind
  dnf: valgrind
  macports: valgrind
  nix: valgrind
  pacman: valgrind
  ubuntu: valgrind
  zypper: valgrind
package-manager-url: https://formulae.brew.sh/formula/valgrind
version: 3.27.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Dynamic analysis tools (memory, debug, profiling)
source-archive: https://sourceware.org/pub/valgrind/valgrind-3.27.1.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: callgrind_annotate
  - exposure: global executable
    kind: cli
    name: callgrind_control
  - exposure: global executable
    kind: cli
    name: cg_annotate
  - exposure: global executable
    kind: cli
    name: cg_diff
  - exposure: global executable
    kind: cli
    name: cg_merge
  - exposure: global executable
    kind: cli
    name: ms_print
  - exposure: global executable
    kind: cli
    name: valgrind
  - exposure: global executable
    kind: cli
    name: valgrind-di-server
  - exposure: global executable
    kind: cli
    name: valgrind-listener
  - exposure: global executable
    kind: cli
    name: vgdb
  - exposure: global executable
    kind: cli
    name: vgstack
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add valgrind
  av: sudo av install brew:valgrind
  brew: brew install valgrind
  debian: sudo apt install valgrind
  dnf: sudo dnf install valgrind
  macports: sudo port install valgrind
  nix: nix profile install nixpkgs#valgrind
  pacman: sudo pacman -S valgrind
  ubuntu: sudo apt install valgrind
  zypper: sudo zypper install valgrind
provenance:
  formula: valgrind
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
