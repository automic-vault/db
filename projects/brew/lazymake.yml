id: brew:lazymake
display-name: lazymake
homepage: https://lazymake.vercel.app/
repo: https://github.com/rshelekhov/lazymake
docs: https://lazymake.vercel.app/
package-manager:
  brew: lazymake
package-manager-url: https://formulae.brew.sh/formula/lazymake
version: 0.4.1
license: MIT
category: development
tags:
  - cli
description: Modern TUI for Makefiles
source-archive: https://github.com/rshelekhov/lazymake/archive/refs/tags/v0.4.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lazymake
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lazymake
  brew: brew install lazymake
provenance:
  formula: lazymake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
