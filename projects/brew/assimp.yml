id: brew:assimp
display-name: assimp
homepage: https://www.assimp.org/
repo: https://github.com/assimp/assimp
docs: https://www.assimp.org/
package-manager:
  apk: assimp
  brew: assimp
  dnf: assimp
  macports: assimp
  nix: assimp
  pacman: assimp
package-manager-url: https://formulae.brew.sh/formula/assimp
version: 6.0.5
license: BSD-3-Clause AND CC-PDDC AND MIT AND BSL-1.0 AND Unlicense AND Zlib
category: development
tags:
  - cli
description: Portable library for importing many well-known 3D model formats
source-archive: https://github.com/assimp/assimp/archive/refs/tags/v6.0.5.tar.gz
build-dependencies:
  - cmake
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: assimp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add assimp
  av: sudo av install brew:assimp
  brew: brew install assimp
  dnf: sudo dnf install assimp
  macports: sudo port install assimp
  nix: nix profile install nixpkgs#assimp
  pacman: sudo pacman -S assimp
provenance:
  formula: assimp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
