id: brew:ktea
display-name: ktea
homepage: https://github.com/jonas-grgt/ktea
repo: https://github.com/jonas-grgt/ktea
docs: https://github.com/jonas-grgt/ktea
package-manager:
  brew: ktea
package-manager-url: https://formulae.brew.sh/formula/ktea
version: 0.8.0
license: Apache-2.0
category: development
tags:
  - cli
description: Kafka TUI client
source-archive: https://github.com/jonas-grgt/ktea/archive/refs/tags/v0.8.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ktea
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ktea
  brew: brew install ktea
provenance:
  formula: ktea
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
