id: brew:recc
display-name: recc
homepage: https://buildgrid.gitlab.io/recc
repo: https://gitlab.com/BuildGrid/buildbox/buildbox/-/archive/1.4.7/buildbox-1.4.7.tar.gz
docs: https://buildgrid.gitlab.io/recc
package-manager:
  brew: recc
package-manager-url: https://formulae.brew.sh/formula/recc
version: 1.4.7
license: Apache-2.0
category: development
tags:
  - cli
description: Remote Execution Caching Compiler
source-archive: https://gitlab.com/BuildGrid/buildbox/buildbox/-/archive/1.4.7/buildbox-1.4.7.tar.gz
dependencies:
  - abseil
  - c-ares
  - grpc
  - openssl@3
  - protobuf
  - re2
build-dependencies:
  - cmake
  - gettext
  - nlohmann-json
  - pkgconf
  - tomlplusplus
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: buildbox-casd
  - exposure: global executable
    kind: cli
    name: buildbox-casd-wrap
  - exposure: global executable
    kind: cli
    name: buildbox-run-hosttools
  - exposure: global executable
    kind: cli
    name: casupload-oci
  - exposure: global executable
    kind: cli
    name: recc
  - exposure: global executable
    kind: cli
    name: recc-c++
  - exposure: global executable
    kind: cli
    name: recc-cc
  - exposure: global executable
    kind: cli
    name: recc-server
  - exposure: global executable
    kind: cli
    name: rumbad
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To launch a compiler with recc, set the following variables:
    CC=$HOMEBREW_PREFIX/opt/recc/bin/recc-cc CXX=$HOMEBREW_PREFIX/opt/recc/bin/recc-c++
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:recc
  brew: brew install recc
provenance:
  formula: recc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
