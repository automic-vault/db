id: brew:libusbmuxd
display-name: libusbmuxd
homepage: https://www.libimobiledevice.org/
repo: https://github.com/libimobiledevice/libusbmuxd
docs: https://www.libimobiledevice.org/
package-manager:
  apk: libusbmuxd
  brew: libusbmuxd
  dnf: libusbmuxd
  macports: libusbmuxd
  nix: libusbmuxd
  pacman: libusbmuxd
package-manager-url: https://formulae.brew.sh/formula/libusbmuxd
version: 2.1.1
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: USB multiplexor library for iOS devices
source-archive: >
  https://github.com/libimobiledevice/libusbmuxd/releases/download/2.1.1/libusbmuxd-2.1.1.tar.bz2
dependencies:
  - libimobiledevice-glue
  - libplist
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: inetcat
  - exposure: global executable
    kind: cli
    name: iproxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libusbmuxd
  av: sudo av install brew:libusbmuxd
  brew: brew install libusbmuxd
  dnf: sudo dnf install libusbmuxd
  macports: sudo port install libusbmuxd
  nix: nix profile install nixpkgs#libusbmuxd
  pacman: sudo pacman -S libusbmuxd
provenance:
  formula: libusbmuxd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
