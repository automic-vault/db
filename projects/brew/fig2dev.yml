id: brew:fig2dev
display-name: fig2dev
homepage: https://mcj.sourceforge.net/
repo: https://downloads.sourceforge.net/project/mcj/fig2dev-3.2.9a.tar.xz
docs: https://mcj.sourceforge.net/
package-manager:
  apk: fig2dev
  brew: fig2dev
  debian: fig2dev
  dnf: transfig
  macports: fig2dev
  nix: fig2dev
  pacman: fig2dev
  ubuntu: fig2dev
  zypper: transfig
package-manager-url: https://formulae.brew.sh/formula/fig2dev
version: 3.2.9a
license: MIT
category: development
tags:
  - cli
description: Translates figures generated by xfig to other formats
source-archive: https://downloads.sourceforge.net/project/mcj/fig2dev-3.2.9a.tar.xz
dependencies:
  - ghostscript
  - libpng
  - netpbm
executables:
  - exposure: global executable
    kind: cli
    name: fig2dev
  - exposure: global executable
    kind: cli
    name: fig2ps2tex
  - exposure: global executable
    kind: cli
    name: pic2tpic
  - exposure: global executable
    kind: cli
    name: transfig
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fig2dev
  av: sudo av install brew:fig2dev
  brew: brew install fig2dev
  debian: sudo apt install fig2dev
  dnf: sudo dnf install transfig
  macports: sudo port install fig2dev
  nix: nix profile install nixpkgs#fig2dev
  pacman: sudo pacman -S fig2dev
  ubuntu: sudo apt install fig2dev
  zypper: sudo zypper install transfig
provenance:
  formula: fig2dev
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
