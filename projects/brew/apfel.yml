id: brew:apfel
display-name: apfel
homepage: https://apfel.franzai.com
repo: https://github.com/Arthur-Ficial/apfel
docs: https://apfel.franzai.com
package-manager:
  brew: apfel
  macports: apfel
  nix: apfel
package-manager-url: https://formulae.brew.sh/formula/apfel
version: 1.3.8
license: MIT
category: development
tags:
  - cli
description: Apple Intelligence from the command-line, with OpenAi-compatible API server
source-archive: https://github.com/Arthur-Ficial/apfel/archive/refs/tags/v1.3.8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: apfel
bottle:
  available: true
  platforms:
    - arm64_tahoe
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:apfel
  brew: brew install apfel
  macports: sudo port install apfel
  nix: nix profile install nixpkgs#apfel
provenance:
  formula: apfel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
