id: brew:frizbee
display-name: frizbee
homepage: https://github.com/stacklok/frizbee
repo: https://github.com/stacklok/frizbee
docs: https://github.com/stacklok/frizbee
package-manager:
  brew: frizbee
  winget: stacklok.frizbee
  zypper: frizbee
package-manager-url: https://formulae.brew.sh/formula/frizbee
version: 0.1.10
license: Apache-2.0
category: development
tags:
  - cli
description: Throw a tag at and it comes back with a checksum
source-archive: https://github.com/stacklok/frizbee/archive/refs/tags/v0.1.10.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: frizbee
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:frizbee
  brew: brew install frizbee
  winget: winget install --id stacklok.frizbee -e
  zypper: sudo zypper install frizbee
provenance:
  formula: frizbee
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
