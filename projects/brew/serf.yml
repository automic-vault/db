id: brew:serf
display-name: serf
homepage: https://github.com/hashicorp/serf
repo: https://github.com/hashicorp/serf
docs: https://github.com/hashicorp/serf
package-manager:
  apk: serf
  brew: serf
  debian: serf
  nix: serf
  pacman: serf
  ubuntu: serf
package-manager-url: https://formulae.brew.sh/formula/serf
version: 0.10.2
license: MPL-2.0
category: development
tags:
  - cli
description: Service orchestration and management tool
source-archive: https://github.com/hashicorp/serf/archive/refs/tags/v0.10.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: serf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add serf
  av: sudo av install brew:serf
  brew: brew install serf
  debian: sudo apt install serf
  nix: nix profile install nixpkgs#serf
  pacman: sudo pacman -S serf
  ubuntu: sudo apt install serf
provenance:
  formula: serf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
