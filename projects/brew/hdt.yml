id: brew:hdt
display-name: hdt
homepage: https://github.com/rdfhdt/hdt-cpp
repo: https://github.com/rdfhdt/hdt-cpp
docs: https://github.com/rdfhdt/hdt-cpp
package-manager:
  brew: hdt
  nix: hdt
package-manager-url: https://formulae.brew.sh/formula/hdt
version: 1.3.3
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Header Dictionary Triples (HDT) is a compression format for RDF data
source-archive: https://github.com/rdfhdt/hdt-cpp/archive/refs/tags/v1.3.3.tar.gz
dependencies:
  - serd
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: hdt2rdf
  - exposure: global executable
    kind: cli
    name: hdtInfo
  - exposure: global executable
    kind: cli
    name: hdtSearch
  - exposure: global executable
    kind: cli
    name: modifyHeader
  - exposure: global executable
    kind: cli
    name: rdf2hdt
  - exposure: global executable
    kind: cli
    name: replaceHeader
  - exposure: global executable
    kind: cli
    name: searchHeader
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hdt
  brew: brew install hdt
  nix: nix profile install nixpkgs#hdt
provenance:
  formula: hdt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
