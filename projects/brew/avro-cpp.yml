id: brew:avro-cpp
display-name: avro-cpp
homepage: https://avro.apache.org/
repo: https://www.apache.org/dyn/closer.lua?path=avro/avro-1.12.1/cpp/avro-cpp-1.12.1.tar.gz
docs: https://avro.apache.org/
package-manager:
  brew: avro-cpp
  nix: avro-cpp
package-manager-url: https://formulae.brew.sh/formula/avro-cpp
version: 1.12.1
license: Apache-2.0
category: network
tags:
  - cli
description: Data serialization system
source-archive: https://www.apache.org/dyn/closer.lua?path=avro/avro-1.12.1/cpp/avro-cpp-1.12.1.tar.gz
dependencies:
  - boost
  - zstd
build-dependencies:
  - cmake
  - fmt
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: avrogencpp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:avro-cpp
  brew: brew install avro-cpp
  nix: nix profile install nixpkgs#avro-cpp
provenance:
  formula: avro-cpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
