id: brew:certstrap
display-name: certstrap
homepage: https://github.com/square/certstrap
repo: https://github.com/square/certstrap
docs: https://github.com/square/certstrap
package-manager:
  apk: certstrap
  brew: certstrap
  macports: certstrap
  nix: certstrap
  scoop: main/certstrap
package-manager-url: https://formulae.brew.sh/formula/certstrap
version: 1.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Tools to bootstrap CAs, certificate requests, and signed certificates
source-archive: https://github.com/square/certstrap/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: certstrap
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add certstrap
  av: sudo av install brew:certstrap
  brew: brew install certstrap
  macports: sudo port install certstrap
  nix: nix profile install nixpkgs#certstrap
  scoop: scoop install main/certstrap
provenance:
  formula: certstrap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
