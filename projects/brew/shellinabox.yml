id: brew:shellinabox
display-name: shellinabox
homepage: https://github.com/shellinabox/shellinabox
repo: https://github.com/shellinabox/shellinabox
docs: https://github.com/shellinabox/shellinabox
package-manager:
  apk: shellinabox
  brew: shellinabox
  debian: shellinabox
  dnf: shellinabox
  macports: shellinabox
  ubuntu: shellinabox
package-manager-url: https://formulae.brew.sh/formula/shellinabox
version: 2.21
license: GPL-2.0-only WITH GPL-3.0-linking-source-exception
category: development
tags:
  - cli
description: Export command-line tools to web based terminal emulator
source-archive: https://github.com/shellinabox/shellinabox/archive/refs/tags/v2.21.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: shellinaboxd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add shellinabox
  av: sudo av install brew:shellinabox
  brew: brew install shellinabox
  debian: sudo apt install shellinabox
  dnf: sudo dnf install shellinabox
  macports: sudo port install shellinabox
  ubuntu: sudo apt install shellinabox
provenance:
  formula: shellinabox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
