id: brew:clive
display-name: clive
homepage: https://github.com/koki-develop/clive
repo: https://github.com/koki-develop/clive
docs: https://github.com/koki-develop/clive
package-manager:
  brew: clive
  macports: clive
  nix: clive
package-manager-url: https://formulae.brew.sh/formula/clive
version: 0.12.17
license: MIT
category: development
tags:
  - cli
description: Automates terminal operations
source-archive: https://github.com/koki-develop/clive/archive/refs/tags/v0.12.17.tar.gz
dependencies:
  - ttyd
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: clive
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clive
  brew: brew install clive
  macports: sudo port install clive
  nix: nix profile install nixpkgs#clive
provenance:
  formula: clive
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
