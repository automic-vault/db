id: brew:aliddns
display-name: aliddns
homepage: https://github.com/OpenIoTHub/aliddns
repo: https://github.com/OpenIoTHub/aliddns
docs: https://github.com/OpenIoTHub/aliddns
package-manager:
  brew: aliddns
package-manager-url: https://formulae.brew.sh/formula/aliddns
version: 0.0.23
license: MIT
category: cloud
tags:
  - cli
  - cloud
description: Aliyun(Alibaba Cloud) ddns for golang
source-archive: https://github.com/OpenIoTHub/aliddns.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aliddns
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:aliddns
  brew: brew install aliddns
provenance:
  formula: aliddns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
