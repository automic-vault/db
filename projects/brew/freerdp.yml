id: brew:freerdp
display-name: freerdp
homepage: https://www.freerdp.com/
repo: https://github.com/FreeRDP/FreeRDP
docs: https://www.freerdp.com/
package-manager:
  apk: freerdp
  brew: freerdp
  chocolatey: freerdp
  dnf: freerdp
  macports: FreeRDP
  nix: freerdp
  pacman: freerdp
  zypper: freerdp
package-manager-url: https://formulae.brew.sh/formula/freerdp
version: 3.26.0
license: Apache-2.0
category: development
tags:
  - cli
description: X11 implementation of the Remote Desktop Protocol (RDP)
source-archive: https://github.com/FreeRDP/FreeRDP/archive/refs/tags/3.26.0.tar.gz
dependencies:
  - cjson
  - ffmpeg
  - jansson
  - jpeg-turbo
  - libusb
  - libx11
  - libxcursor
  - libxext
  - libxfixes
  - libxi
  - libxinerama
  - libxrandr
  - libxrender
  - libxv
  - openssl@3
  - pkcs11-helper
  - sdl3
  - sdl3_ttf
  - uriparser
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - cups
executables:
  - exposure: global executable
    kind: cli
    name: freerdp-proxy
  - exposure: global executable
    kind: cli
    name: freerdp-shadow-cli
  - exposure: global executable
    kind: cli
    name: sdl-freerdp
  - exposure: global executable
    kind: cli
    name: sfreerdp
  - exposure: global executable
    kind: cli
    name: sfreerdp-server
  - exposure: global executable
    kind: cli
    name: winpr-hash
  - exposure: global executable
    kind: cli
    name: winpr-makecert
  - exposure: global executable
    kind: cli
    name: xfreerdp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    xfreerdp is an X11 application that requires an XServer be installed and running.
    Lack of a running XServer will cause a "$DISPLAY" error. XQuartz provides an XServer
    for macOS. The XQuartz can be installed as a package from www.xquartz.org or as a
    Homebrew cask: brew install --cask xquartz
  post-install-defined: false
install-lines:
  apk: sudo apk add freerdp
  av: sudo av install brew:freerdp
  brew: brew install freerdp
  chocolatey: choco install freerdp
  dnf: sudo dnf install freerdp
  macports: sudo port install FreeRDP
  nix: nix profile install nixpkgs#freerdp
  pacman: sudo pacman -S freerdp
  zypper: sudo zypper install freerdp
provenance:
  formula: freerdp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
