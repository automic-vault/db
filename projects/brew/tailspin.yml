id: brew:tailspin
display-name: tailspin
homepage: https://github.com/bensadeh/tailspin
repo: https://github.com/bensadeh/tailspin
docs: https://github.com/bensadeh/tailspin
package-manager:
  apk: tailspin
  brew: tailspin
  debian: tailspin
  nix: tailspin
  pacman: tailspin
  scoop: main/tailspin
  ubuntu: tailspin
package-manager-url: https://formulae.brew.sh/formula/tailspin
version: 6.1.0
license: MIT
category: development
tags:
  - cli
description: Log file highlighter
source-archive: https://github.com/bensadeh/tailspin/archive/refs/tags/6.1.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tspin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tailspin
  av: sudo av install brew:tailspin
  brew: brew install tailspin
  debian: sudo apt install tailspin
  nix: nix profile install nixpkgs#tailspin
  pacman: sudo pacman -S tailspin
  scoop: scoop install main/tailspin
  ubuntu: sudo apt install tailspin
provenance:
  formula: tailspin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
