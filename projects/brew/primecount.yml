id: brew:primecount
display-name: primecount
homepage: https://github.com/kimwalisch/primecount
repo: https://github.com/kimwalisch/primecount
docs: https://github.com/kimwalisch/primecount
package-manager:
  apk: primecount
  brew: primecount
  debian: primecount
  dnf: primecount
  nix: primecount
  pacman: primecount
  ubuntu: primecount
  winget: Primecount.Primecount
  zypper: primecount
package-manager-url: https://formulae.brew.sh/formula/primecount
version: 8.5
license: BSD-2-Clause
category: development
tags:
  - cli
description: Fast prime counting function program and C/C++ library
source-archive: https://github.com/kimwalisch/primecount/archive/refs/tags/v8.5.tar.gz
dependencies:
  - libomp
  - primesieve
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: primecount
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add primecount
  av: sudo av install brew:primecount
  brew: brew install primecount
  debian: sudo apt install primecount
  dnf: sudo dnf install primecount
  nix: nix profile install nixpkgs#primecount
  pacman: sudo pacman -S primecount
  ubuntu: sudo apt install primecount
  winget: winget install --id Primecount.Primecount -e
  zypper: sudo zypper install primecount
provenance:
  formula: primecount
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
