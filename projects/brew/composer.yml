id: brew:composer
display-name: composer
homepage: https://getcomposer.org/
repo: https://getcomposer.org/download/2.9.8/composer.phar
docs: https://getcomposer.org/
package-manager:
  apk: composer
  brew: composer
  chocolatey: composer
  debian: composer
  dnf: composer
  pacman: composer
  scoop: main/composer
  ubuntu: composer
package-manager-url: https://formulae.brew.sh/formula/composer
version: 2.9.8
license: MIT
category: network
tags:
  - cli
description: Dependency Manager for PHP
source-archive: https://getcomposer.org/download/2.9.8/composer.phar
dependencies:
  - php
executables:
  - exposure: global executable
    kind: cli
    name: composer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add composer
  av: sudo av install brew:composer
  brew: brew install composer
  chocolatey: choco install composer
  debian: sudo apt install composer
  dnf: sudo dnf install composer
  pacman: sudo pacman -S composer
  scoop: scoop install main/composer
  ubuntu: sudo apt install composer
provenance:
  formula: composer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
