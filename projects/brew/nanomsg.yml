id: brew:nanomsg
display-name: nanomsg
homepage: https://nanomsg.org/
repo: https://github.com/nanomsg/nanomsg
docs: https://nanomsg.org/
package-manager:
  apk: nanomsg
  brew: nanomsg
  dnf: nanomsg
  nix: nanomsg
  pacman: nanomsg
package-manager-url: https://formulae.brew.sh/formula/nanomsg
version: 1.2.2
license: MIT
category: development
tags:
  - cli
description: Socket library in C
source-archive: https://github.com/nanomsg/nanomsg/archive/refs/tags/1.2.2.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: nanocat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nanomsg
  av: sudo av install brew:nanomsg
  brew: brew install nanomsg
  dnf: sudo dnf install nanomsg
  nix: nix profile install nixpkgs#nanomsg
  pacman: sudo pacman -S nanomsg
provenance:
  formula: nanomsg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
