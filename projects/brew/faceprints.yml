id: brew:faceprints
display-name: faceprints
homepage: https://github.com/Nexuist/faceprints
repo: https://github.com/Nexuist/faceprints
docs: https://github.com/Nexuist/faceprints
package-manager:
  brew: faceprints
package-manager-url: https://formulae.brew.sh/formula/faceprints
version: 1.1.2
license: MIT
category: development
tags:
  - cli
description: Detect and label images of faces using local Vision.framework models
source-archive: https://github.com/Nexuist/faceprints/archive/refs/tags/1.1.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: faceprints
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:faceprints
  brew: brew install faceprints
provenance:
  formula: faceprints
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
