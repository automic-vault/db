id: brew:gnu-indent
display-name: gnu-indent
homepage: https://www.gnu.org/software/indent/
repo: https://ftpmirror.gnu.org/gnu/indent/indent-2.2.13.tar.gz
docs: https://www.gnu.org/software/indent/
package-manager:
  brew: gnu-indent
  macports: gindent
package-manager-url: https://formulae.brew.sh/formula/gnu-indent
version: 2.2.13
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: C code prettifier
source-archive: https://ftpmirror.gnu.org/gnu/indent/indent-2.2.13.tar.gz
dependencies:
  - gettext
build-dependencies:
  - texinfo
executables:
  - exposure: global executable
    kind: cli
    name: gindent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    GNU "indent" has been installed as "gindent". If you need to use it as "indent", you
    can add a "gnubin" directory to your PATH from your bashrc like:
    PATH="$HOMEBREW_PREFIX/opt/gnu-indent/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  av: sudo av install brew:gnu-indent
  brew: brew install gnu-indent
  macports: sudo port install gindent
provenance:
  formula: gnu-indent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
