id: brew:badread
display-name: badread
homepage: https://github.com/rrwick/Badread
repo: https://github.com/rrwick/Badread
docs: https://github.com/rrwick/Badread
package-manager:
  brew: badread
package-manager-url: https://formulae.brew.sh/formula/badread
version: 0.4.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Long read simulator that can imitate many types of read problems
source-archive: https://github.com/rrwick/Badread/archive/refs/tags/v0.4.2.tar.gz
dependencies:
  - numpy
  - python@3.14
  - scipy
executables:
  - exposure: global executable
    kind: cli
    name: badread
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:badread
  brew: brew install badread
provenance:
  formula: badread
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
