id: brew:idutils
display-name: idutils
homepage: https://www.gnu.org/software/idutils/
repo: https://ftpmirror.gnu.org/gnu/idutils/idutils-4.6.tar.xz
docs: https://www.gnu.org/software/idutils/
package-manager:
  brew: idutils
  macports: idutils
  nix: idutils
  zypper: idutils
package-manager-url: https://formulae.brew.sh/formula/idutils
version: 4.6
license: GPL-3.0-or-later
category: database
tags:
  - cli
  - database
description: ID database and query tools
source-archive: https://ftpmirror.gnu.org/gnu/idutils/idutils-4.6.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: aid
  - exposure: global executable
    kind: cli
    name: defid
  - exposure: global executable
    kind: cli
    name: eid
  - exposure: global executable
    kind: cli
    name: fid
  - exposure: global executable
    kind: cli
    name: fnid
  - exposure: global executable
    kind: cli
    name: lid
  - exposure: global executable
    kind: cli
    name: mkid
  - exposure: global executable
    kind: cli
    name: xtokid
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:idutils
  brew: brew install idutils
  macports: sudo port install idutils
  nix: nix profile install nixpkgs#idutils
  zypper: sudo zypper install idutils
provenance:
  formula: idutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
