id: brew:reg
display-name: reg
homepage: https://github.com/genuinetools/reg
repo: https://github.com/genuinetools/reg
docs: https://github.com/genuinetools/reg
package-manager:
  apk: reg
  brew: reg
  nix: reg
package-manager-url: https://formulae.brew.sh/formula/reg
version: 0.16.1
license: MIT
category: development
tags:
  - cli
  - docker
description: Docker registry v2 command-line client
source-archive: https://github.com/genuinetools/reg/archive/refs/tags/v0.16.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: reg
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add reg
  av: sudo av install brew:reg
  brew: brew install reg
  nix: nix profile install nixpkgs#reg
provenance:
  formula: reg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
