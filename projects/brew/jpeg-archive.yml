id: brew:jpeg-archive
display-name: jpeg-archive
homepage: https://github.com/danielgtaylor/jpeg-archive
repo: https://github.com/danielgtaylor/jpeg-archive
docs: https://github.com/danielgtaylor/jpeg-archive
package-manager:
  brew: jpeg-archive
  nix: jpeg-archive
  pacman: jpeg-archive
package-manager-url: https://formulae.brew.sh/formula/jpeg-archive
version: 2.2.0
license: MIT
category: development
tags:
  - cli
description: Utilities for archiving JPEGs for long term storage
source-archive: https://github.com/danielgtaylor/jpeg-archive/archive/refs/tags/v2.2.0.tar.gz
dependencies:
  - mozjpeg
executables:
  - exposure: global executable
    kind: cli
    name: jpeg-archive
  - exposure: global executable
    kind: cli
    name: jpeg-compare
  - exposure: global executable
    kind: cli
    name: jpeg-hash
  - exposure: global executable
    kind: cli
    name: jpeg-recompress
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jpeg-archive
  brew: brew install jpeg-archive
  nix: nix profile install nixpkgs#jpeg-archive
  pacman: sudo pacman -S jpeg-archive
provenance:
  formula: jpeg-archive
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
