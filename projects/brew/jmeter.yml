id: brew:jmeter
display-name: jmeter
homepage: https://jmeter.apache.org/
repo: https://www.apache.org/dyn/closer.lua?path=jmeter/binaries/apache-jmeter-5.6.3.tgz
docs: https://jmeter.apache.org/
package-manager:
  brew: jmeter
  chocolatey: jmeter
