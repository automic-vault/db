id: brew:bpm-tools
display-name: bpm-tools
homepage: https://www.pogo.org.uk/~mark/bpm-tools/
repo: https://www.pogo.org.uk/~mark/bpm-tools/releases/bpm-tools-0.3.tar.gz
docs: https://www.pogo.org.uk/~mark/bpm-tools/
package-manager:
  brew: bpm-tools
  debian: bpm-tools
  nix: bpm-tools
  ubuntu: bpm-tools
  zypper: bpm-tools
package-manager-url: https://formulae.brew.sh/formula/bpm-tools
version: 0.3
license: GPL-2.0-only
category: media
tags:
  - cli
description: Detect tempo of audio files using beats-per-minute (BPM)
source-archive: https://www.pogo.org.uk/~mark/bpm-tools/releases/bpm-tools-0.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bpm
  - exposure: global executable
    kind: cli
    name: bpm-tag
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bpm-tools
  brew: brew install bpm-tools
  debian: sudo apt install bpm-tools
  nix: nix profile install nixpkgs#bpm-tools
  ubuntu: sudo apt install bpm-tools
  zypper: sudo zypper install bpm-tools
provenance:
  formula: bpm-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
