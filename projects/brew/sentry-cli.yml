id: brew:sentry-cli
display-name: sentry-cli
homepage: https://docs.sentry.io/cli/
repo: https://github.com/getsentry/sentry-cli
docs: https://docs.sentry.io/cli/
package-manager:
  brew: sentry-cli
  nix: sentry-cli
  pacman: sentry-cli
  scoop: main/sentry-cli
  winget: Sentry.sentry-cli
package-manager-url: https://formulae.brew.sh/formula/sentry-cli
version: 3.4.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: Command-line utility to interact with Sentry
source-archive: https://github.com/getsentry/sentry-cli/archive/refs/tags/3.4.3.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: sentry-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sentry-cli
  brew: brew install sentry-cli
  nix: nix profile install nixpkgs#sentry-cli
  pacman: sudo pacman -S sentry-cli
  scoop: scoop install main/sentry-cli
  winget: winget install --id Sentry.sentry-cli -e
provenance:
  formula: sentry-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
