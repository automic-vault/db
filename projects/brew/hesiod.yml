id: brew:hesiod
display-name: hesiod
homepage: https://github.com/achernya/hesiod
repo: https://github.com/achernya/hesiod
docs: https://github.com/achernya/hesiod
package-manager:
  brew: hesiod
  debian: hesiod
  ubuntu: hesiod
package-manager-url: https://formulae.brew.sh/formula/hesiod
version: 3.2.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: Library for the simple string lookup service built on top of DNS
source-archive: https://github.com/achernya/hesiod/archive/refs/tags/hesiod-3.2.1.tar.gz
dependencies:
  - libidn
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: hesinfo
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hesiod
  brew: brew install hesiod
  debian: sudo apt install hesiod
  ubuntu: sudo apt install hesiod
provenance:
  formula: hesiod
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
