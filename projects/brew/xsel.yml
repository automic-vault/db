id: brew:xsel
display-name: xsel
homepage: https://www.vergenet.net/~conrad/software/xsel/
repo: https://github.com/kfish/xsel
docs: https://www.vergenet.net/~conrad/software/xsel/
package-manager:
  apk: xsel
  brew: xsel
  debian: xsel
  dnf: xsel
  macports: xsel
  nix: xsel
  pacman: xsel
  ubuntu: xsel
  zypper: xsel
package-manager-url: https://formulae.brew.sh/formula/xsel
version: 1.2.1
license: HPND-sell-variant
category: development
tags:
  - cli
description: Command-line program for getting and setting the contents of the X selection
source-archive: https://github.com/kfish/xsel/archive/refs/tags/1.2.1.tar.gz
dependencies:
  - libx11
build-dependencies:
  - autoconf
  - automake
  - libtool
  - libxt
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xsel
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xsel
  av: sudo av install brew:xsel
  brew: brew install xsel
  debian: sudo apt install xsel
  dnf: sudo dnf install xsel
  macports: sudo port install xsel
  nix: nix profile install nixpkgs#xsel
  pacman: sudo pacman -S xsel
  ubuntu: sudo apt install xsel
  zypper: sudo zypper install xsel
provenance:
  formula: xsel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
