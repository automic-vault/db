id: brew:dumbpipe
display-name: dumbpipe
homepage: https://dumbpipe.dev
repo: https://github.com/n0-computer/dumbpipe
docs: https://dumbpipe.dev
package-manager:
  brew: dumbpipe
  nix: dumbpipe
  scoop: main/dumbpipe
package-manager-url: https://formulae.brew.sh/formula/dumbpipe
version: 0.37.0
license: MIT OR Apache-2.0
category: development
tags:
  - cli
description: Unix pipes between devices
source-archive: https://github.com/n0-computer/dumbpipe/archive/refs/tags/v0.37.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dumbpipe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dumbpipe
  brew: brew install dumbpipe
  nix: nix profile install nixpkgs#dumbpipe
  scoop: scoop install main/dumbpipe
provenance:
  formula: dumbpipe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
