id: brew:stp
display-name: stp
homepage: https://stp.github.io/
repo: https://github.com/stp/stp
docs: https://stp.github.io/
package-manager:
  brew: stp
  dnf: stp
  macports: stp
  nix: stp
  pacman: stp
  zypper: stp
package-manager-url: https://formulae.brew.sh/formula/stp
version: 2.3.4
license: MIT
category: development
tags:
  - cli
description: Simple Theorem Prover, an efficient SMT solver for bitvectors
source-archive: https://github.com/stp/stp/archive/refs/tags/2.3.4.tar.gz
dependencies:
  - boost
  - cryptominisat
  - gmp
  - minisat
  - python@3.14
build-dependencies:
  - bison
  - cmake
  - flex
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: stp
  - exposure: global executable
    kind: cli
    name: stp_simple
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stp
  brew: brew install stp
  dnf: sudo dnf install stp
  macports: sudo port install stp
  nix: nix profile install nixpkgs#stp
  pacman: sudo pacman -S stp
  zypper: sudo zypper install stp
provenance:
  formula: stp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
