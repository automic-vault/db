id: brew:blockhash
display-name: blockhash
homepage: https://github.com/commonsmachinery/blockhash
repo: https://github.com/commonsmachinery/blockhash
docs: https://github.com/commonsmachinery/blockhash
package-manager:
  brew: blockhash
  nix: blockhash
package-manager-url: https://formulae.brew.sh/formula/blockhash
version: 0.3.3
license: MIT
category: development
tags:
  - cli
description: Perceptual image hash calculation tool
source-archive: https://github.com/commonsmachinery/blockhash/archive/refs/tags/v0.3.3.tar.gz
dependencies:
  - imagemagick
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: blockhash
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:blockhash
  brew: brew install blockhash
  nix: nix profile install nixpkgs#blockhash
provenance:
  formula: blockhash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
