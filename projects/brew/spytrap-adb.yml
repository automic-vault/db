id: brew:spytrap-adb
display-name: spytrap-adb
homepage: https://github.com/spytrap-org/spytrap-adb
repo: https://github.com/spytrap-org/spytrap-adb
docs: https://github.com/spytrap-org/spytrap-adb
package-manager:
  brew: spytrap-adb
  debian: spytrap-adb
  nix: spytrap-adb
  pacman: spytrap-adb
package-manager-url: https://formulae.brew.sh/formula/spytrap-adb
version: 0.3.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Test a phone for stalkerware and suspicious configuration using usb debugging
source-archive: >
  https://github.com/spytrap-org/spytrap-adb/releases/download/v0.3.5/spytrap-adb-0.3.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: spytrap-adb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    At runtime, adb must be accessible from your PATH. You can install adb from Homebrew
    Cask: brew install --cask android-platform-tools
  post-install-defined: false
install-lines:
  av: sudo av install brew:spytrap-adb
  brew: brew install spytrap-adb
  debian: sudo apt install spytrap-adb
  nix: nix profile install nixpkgs#spytrap-adb
  pacman: sudo pacman -S spytrap-adb
provenance:
  formula: spytrap-adb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
