id: brew:joplin-cli
display-name: joplin-cli
homepage: https://joplinapp.org/
repo: https://registry.npmjs.org/joplin/-/joplin-3.5.1.tgz
docs: https://joplinapp.org/
package-manager:
  brew: joplin-cli
  chocolatey: joplin
  nix: joplin-cli
  scoop: extras/joplin
  winget: Joplin.Joplin
package-manager-url: https://formulae.brew.sh/formula/joplin-cli
version: 3.5.1
license: MIT
category: network
tags:
  - cli
description: Note taking and to-do application with synchronization capabilities
source-archive: https://registry.npmjs.org/joplin/-/joplin-3.5.1.tgz
dependencies:
  - gettext
  - glib
  - node
  - sqlite
  - terminal-notifier
  - vips
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: joplin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:joplin-cli
  brew: brew install joplin-cli
  chocolatey: choco install joplin
  nix: nix profile install nixpkgs#joplin-cli
  scoop: scoop install extras/joplin
  winget: winget install --id Joplin.Joplin -e
provenance:
  formula: joplin-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
