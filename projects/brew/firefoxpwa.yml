id: brew:firefoxpwa
display-name: firefoxpwa
homepage: https://pwasforfirefox.filips.si/
repo: https://github.com/filips123/PWAsForFirefox
docs: https://pwasforfirefox.filips.si/
package-manager:
  brew: firefoxpwa
  chocolatey: firefoxpwa
  nix: firefoxpwa
  pacman: firefoxpwa
  scoop: extras/firefoxpwa
  winget: filips.FirefoxPWA
package-manager-url: https://formulae.brew.sh/formula/firefoxpwa
version: 2.18.2
license: MPL-2.0
category: development
tags:
  - cli
description: Tool to install, manage and use Progressive Web Apps in Mozilla Firefox
source-archive: https://github.com/filips123/PWAsForFirefox/archive/refs/tags/v2.18.2.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: firefoxpwa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To use the browser extension, manually link the app manifest with: sudo mkdir -p
    "/Library/Application Support/Mozilla/NativeMessagingHosts" sudo ln -sf
    "$HOMEBREW_PREFIX/opt/firefoxpwa/share/firefoxpwa.json" "/Library/Application
    Support/Mozilla/NativeMessagingHosts/firefoxpwa.json"
  post-install-defined: false
install-lines:
  av: sudo av install brew:firefoxpwa
  brew: brew install firefoxpwa
  chocolatey: choco install firefoxpwa
  nix: nix profile install nixpkgs#firefoxpwa
  pacman: sudo pacman -S firefoxpwa
  scoop: scoop install extras/firefoxpwa
  winget: winget install --id filips.FirefoxPWA -e
provenance:
  formula: firefoxpwa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
