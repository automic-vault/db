id: brew:apko
display-name: apko
homepage: https://github.com/chainguard-dev/apko
repo: https://github.com/chainguard-dev/apko
docs: https://github.com/chainguard-dev/apko
package-manager:
  apk: apko
  brew: apko
  nix: apko
  pacman: apko
  zypper: apko
package-manager-url: https://formulae.brew.sh/formula/apko
version: 1.2.14
license: Apache-2.0
category: development
tags:
  - cli
description: Build OCI images from APK packages directly without Dockerfile
source-archive: https://github.com/chainguard-dev/apko/archive/refs/tags/v1.2.14.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: apko
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add apko
  av: sudo av install brew:apko
  brew: brew install apko
  nix: nix profile install nixpkgs#apko
  pacman: sudo pacman -S apko
  zypper: sudo zypper install apko
provenance:
  formula: apko
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
