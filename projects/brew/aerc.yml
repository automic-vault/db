id: brew:aerc
display-name: aerc
homepage: https://aerc-mail.org/
repo: https://git.sr.ht/~rjarry/aerc/archive/0.21.0.tar.gz
docs: https://aerc-mail.org/
package-manager:
  apk: aerc
  brew: aerc
  debian: aerc
  dnf: aerc
  macports: aerc
  nix: aerc
  pacman: aerc
  ubuntu: aerc
  zypper: aerc
package-manager-url: https://formulae.brew.sh/formula/aerc
version: 0.21.0
license: MIT
category: development
tags:
  - cli
description: Email client that runs in your terminal
source-archive: https://git.sr.ht/~rjarry/aerc/archive/0.21.0.tar.gz
dependencies:
  - notmuch
build-dependencies:
  - go
  - scdoc
executables:
  - exposure: global executable
    kind: cli
    name: aerc
  - exposure: global executable
    kind: cli
    name: carddav-query
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add aerc
  av: sudo av install brew:aerc
  brew: brew install aerc
  debian: sudo apt install aerc
  dnf: sudo dnf install aerc
  macports: sudo port install aerc
  nix: nix profile install nixpkgs#aerc
  pacman: sudo pacman -S aerc
  ubuntu: sudo apt install aerc
  zypper: sudo zypper install aerc
provenance:
  formula: aerc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
