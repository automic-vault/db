id: brew:gtranslator
display-name: gtranslator
homepage: https://wiki.gnome.org/Design/Apps/Translator
repo: https://download.gnome.org/sources/gtranslator/50/gtranslator-50.0.tar.xz
docs: https://wiki.gnome.org/Design/Apps/Translator
package-manager:
  apk: gtranslator
  brew: gtranslator
  debian: gtranslator
  dnf: gtranslator
  nix: gtranslator
  pacman: gtranslator
  ubuntu: gtranslator
  zypper: gtranslator
package-manager-url: https://formulae.brew.sh/formula/gtranslator
version: 50.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNOME gettext PO file editor
source-archive: https://download.gnome.org/sources/gtranslator/50/gtranslator-50.0.tar.xz
dependencies:
  - adwaita-icon-theme
  - cairo
  - gettext
  - glib
  - gtk4
  - gtksourceview5
  - json-glib
  - libadwaita
  - libsoup
  - libspelling
  - pango
  - sqlite
build-dependencies:
  - desktop-file-utils
  - itstool
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: gtranslator
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add gtranslator
  av: sudo av install brew:gtranslator
  brew: brew install gtranslator
  debian: sudo apt install gtranslator
  dnf: sudo dnf install gtranslator
  nix: nix profile install nixpkgs#gtranslator
  pacman: sudo pacman -S gtranslator
  ubuntu: sudo apt install gtranslator
  zypper: sudo zypper install gtranslator
provenance:
  formula: gtranslator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
