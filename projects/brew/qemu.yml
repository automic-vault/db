bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add qemu
  av: sudo av install brew:qemu
  brew: brew install qemu
  chocolatey: choco install Qemu
  debian: sudo apt install qemu-system-arm
  dnf: sudo dnf install qemu
  macports: sudo port install qemu
  nix: nix profile install nixpkgs#qemu
  pacman: sudo pacman -S qemu-img
  scoop: scoop install main/qemu
  ubuntu: sudo apt install qemu-system-arm
  winget: winget install --id SoftwareFreedomConservancy.QEMU -e
  zypper: sudo zypper install qemu
provenance:
  formula: qemu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
