id: brew:pdftk-java
display-name: pdftk-java
homepage: https://gitlab.com/pdftk-java/pdftk
repo: https://gitlab.com/pdftk-java/pdftk/-/archive/v3.3.3/pdftk-v3.3.3.tar.gz
docs: https://gitlab.com/pdftk-java/pdftk
package-manager:
  brew: pdftk-java
  chocolatey: pdftk
  debian: pdftk-java
  dnf: pdftk-java
  macports: pdftk-java
  nix: pdftk
  pacman: pdftk
  scoop: main/pdftk
  ubuntu: pdftk-java
  zypper: pdftk
package-manager-url: https://formulae.brew.sh/formula/pdftk-java
version: 3.3.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Port of pdftk in java
source-archive: https://gitlab.com/pdftk-java/pdftk/-/archive/v3.3.3/pdftk-v3.3.3.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - gradle@8
executables:
  - exposure: global executable
    kind: cli
    name: pdftk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pdftk-java
  brew: brew install pdftk-java
  chocolatey: choco install pdftk
  debian: sudo apt install pdftk-java
  dnf: sudo dnf install pdftk-java
  macports: sudo port install pdftk-java
  nix: nix profile install nixpkgs#pdftk
  pacman: sudo pacman -S pdftk
  scoop: scoop install main/pdftk
  ubuntu: sudo apt install pdftk-java
  zypper: sudo zypper install pdftk
provenance:
  formula: pdftk-java
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
