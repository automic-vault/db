id: brew:redu
display-name: redu
homepage: https://github.com/drdo/redu
repo: https://github.com/drdo/redu
docs: https://github.com/drdo/redu
package-manager:
  brew: redu
  nix: redu
package-manager-url: https://formulae.brew.sh/formula/redu
version: 0.2.15
license: MIT
category: development
tags:
  - cli
description: Ncdu for your restic repository
source-archive: https://github.com/drdo/redu/archive/refs/tags/v0.2.15.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: redu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:redu
  brew: brew install redu
  nix: nix profile install nixpkgs#redu
provenance:
  formula: redu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
