id: brew:dry
display-name: dry
homepage: https://moncho.github.io/dry/
repo: https://github.com/moncho/dry
docs: https://moncho.github.io/dry/
package-manager:
  brew: dry
  nix: dry
package-manager-url: https://formulae.brew.sh/formula/dry
version: 0.13.0
license: MIT
category: development
tags:
  - cli
  - docker
description: Terminal application to manage Docker and Docker Swarm
source-archive: https://github.com/moncho/dry/archive/refs/tags/v0.13.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dry
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dry
  brew: brew install dry
  nix: nix profile install nixpkgs#dry
provenance:
  formula: dry
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
