id: brew:epsilon
display-name: epsilon
homepage: https://sourceforge.net/projects/epsilon-project/
repo: >
  https://downloads.sourceforge.net/project/epsilon-project/epsilon/0.9.2/epsilon-0.9.2.tar.gz
docs: https://sourceforge.net/projects/epsilon-project/
package-manager:
  brew: epsilon
package-manager-url: https://formulae.brew.sh/formula/epsilon
version: 0.9.2
license: BSD-3-Clause AND (GPL-3.0-or-later OR LGPL-3.0-or-later)
category: media
tags:
  - cli
description: Powerful wavelet image compressor
source-archive: >
  https://downloads.sourceforge.net/project/epsilon-project/epsilon/0.9.2/epsilon-0.9.2.tar.gz
dependencies:
  - popt
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: epsilon
  - exposure: global executable
    kind: cli
    name: start_epsilon_nodes.pl
  - exposure: global executable
    kind: cli
    name: stop_epsilon_nodes.pl
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:epsilon
  brew: brew install epsilon
provenance:
  formula: epsilon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
