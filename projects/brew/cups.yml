id: brew:cups
display-name: cups
homepage: https://github.com/OpenPrinting/cups
repo: https://github.com/OpenPrinting/cups
docs: https://github.com/OpenPrinting/cups
package-manager:
  apk: cups
  brew: cups
  debian: cups
  dnf: cups
  nix: cups
  pacman: cups
  ubuntu: cups
  zypper: cups
package-manager-url: https://formulae.brew.sh/formula/cups
version: 2.4.19
license: Apache-2.0 WITH LLVM-exception
category: development
tags:
  - cli
description: Common UNIX Printing System
source-archive: https://github.com/OpenPrinting/cups/releases/download/v2.4.19/cups-2.4.19-source.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cups-config
  - exposure: global executable
    kind: cli
    name: ippeveprinter
  - exposure: global executable
    kind: cli
    name: ipptool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cups
  av: sudo av install brew:cups
  brew: brew install cups
  debian: sudo apt install cups
  dnf: sudo dnf install cups
  nix: nix profile install nixpkgs#cups
  pacman: sudo pacman -S cups
  ubuntu: sudo apt install cups
  zypper: sudo zypper install cups
provenance:
  formula: cups
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
