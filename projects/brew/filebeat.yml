id: brew:filebeat
display-name: filebeat
homepage: https://www.elastic.co/products/beats/filebeat
repo: https://github.com/elastic/beats
docs: https://www.elastic.co/products/beats/filebeat
package-manager:
  brew: filebeat
  chocolatey: filebeat
  nix: filebeat
package-manager-url: https://formulae.brew.sh/formula/filebeat
version: 9.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: File harvester to ship log files to Elasticsearch or Logstash
source-archive: https://github.com/elastic/beats.git
build-dependencies:
  - go
  - mage
executables:
  - exposure: global executable
    kind: cli
    name: filebeat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:filebeat
  brew: brew install filebeat
  chocolatey: choco install filebeat
  nix: nix profile install nixpkgs#filebeat
provenance:
  formula: filebeat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
