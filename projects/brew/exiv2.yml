id: brew:exiv2
display-name: exiv2
homepage: https://exiv2.org/
repo: https://github.com/Exiv2/exiv2
docs: https://exiv2.org/
package-manager:
  apk: exiv2
  brew: exiv2
  debian: exiv2
  dnf: exiv2
  macports: exiv2
  nix: exiv2
  pacman: exiv2
  ubuntu: exiv2
  winget: Exiv2.Exiv2
  zypper: exiv2
package-manager-url: https://formulae.brew.sh/formula/exiv2
version: 0.28.8
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: EXIF and IPTC metadata manipulation library and tools
source-archive: https://github.com/Exiv2/exiv2/archive/refs/tags/v0.28.8.tar.gz
dependencies:
  - brotli
  - gettext
  - inih
  - libssh
build-dependencies:
  - cmake
  - gettext
uses-from-macos:
  - curl
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: exiv2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add exiv2
  av: sudo av install brew:exiv2
  brew: brew install exiv2
  debian: sudo apt install exiv2
  dnf: sudo dnf install exiv2
  macports: sudo port install exiv2
  nix: nix profile install nixpkgs#exiv2
  pacman: sudo pacman -S exiv2
  ubuntu: sudo apt install exiv2
  winget: winget install --id Exiv2.Exiv2 -e
  zypper: sudo zypper install exiv2
provenance:
  formula: exiv2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
