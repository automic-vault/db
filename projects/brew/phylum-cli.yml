id: brew:phylum-cli
display-name: phylum-cli
homepage: https://www.phylum.io
repo: https://github.com/phylum-dev/cli
docs: https://www.phylum.io
package-manager:
  brew: phylum-cli
package-manager-url: https://formulae.brew.sh/formula/phylum-cli
version: 7.5.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Command-line interface for the Phylum API
source-archive: https://github.com/phylum-dev/cli/archive/refs/tags/v7.5.0.tar.gz
build-dependencies:
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: phylum
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: No official extensions have been preinstalled.
  post-install-defined: false
install-lines:
  av: sudo av install brew:phylum-cli
  brew: brew install phylum-cli
provenance:
  formula: phylum-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
