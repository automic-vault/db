id: brew:softhsm
display-name: softhsm
homepage: https://www.softhsm.org/
repo: https://github.com/softhsm/SoftHSMv2
docs: https://www.softhsm.org/
package-manager:
  apk: softhsm
  brew: softhsm
  dnf: softhsm
  macports: softhsm
  nix: softhsm
  pacman: softhsm
  zypper: softhsm
package-manager-url: https://formulae.brew.sh/formula/softhsm
version: 2.7.0
license: BSD-2-Clause
category: security
tags:
  - cli
description: Cryptographic store accessible through a PKCS#11 interface
source-archive: https://github.com/softhsm/SoftHSMv2/archive/refs/tags/2.7.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: softhsm2-dump-file
  - exposure: global executable
    kind: cli
    name: softhsm2-keyconv
  - exposure: global executable
    kind: cli
    name: softhsm2-util
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add softhsm
  av: sudo av install brew:softhsm
  brew: brew install softhsm
  dnf: sudo dnf install softhsm
  macports: sudo port install softhsm
  nix: nix profile install nixpkgs#softhsm
  pacman: sudo pacman -S softhsm
  zypper: sudo zypper install softhsm
provenance:
  formula: softhsm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
