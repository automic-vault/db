id: brew:htmlq
display-name: htmlq
homepage: https://github.com/mgdm/htmlq
repo: https://github.com/mgdm/htmlq
docs: https://github.com/mgdm/htmlq
package-manager:
  apk: htmlq
  brew: htmlq
  macports: htmlq
  nix: htmlq
  pacman: htmlq
  scoop: main/htmlq
package-manager-url: https://formulae.brew.sh/formula/htmlq
version: 0.4.0
license: MIT
category: development
tags:
  - cli
description: Uses CSS selectors to extract bits content from HTML files
source-archive: https://github.com/mgdm/htmlq/archive/refs/tags/v0.4.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: htmlq
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add htmlq
  av: sudo av install brew:htmlq
  brew: brew install htmlq
  macports: sudo port install htmlq
  nix: nix profile install nixpkgs#htmlq
  pacman: sudo pacman -S htmlq
  scoop: scoop install main/htmlq
provenance:
  formula: htmlq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
