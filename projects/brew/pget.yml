id: brew:pget
display-name: pget
homepage: https://github.com/Code-Hex/pget
repo: https://github.com/Code-Hex/pget
docs: https://github.com/Code-Hex/pget
package-manager:
  brew: pget
  nix: pget
  scoop: main/pget
package-manager-url: https://formulae.brew.sh/formula/pget
version: 0.2.1
license: MIT
category: development
tags:
  - cli
description: File download client
source-archive: https://github.com/Code-Hex/pget/archive/refs/tags/v0.2.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pget
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pget
  brew: brew install pget
  nix: nix profile install nixpkgs#pget
  scoop: scoop install main/pget
provenance:
  formula: pget
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
