version: 7.25.4
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Command-line and local web note-taking, bookmarking, and archiving
source-archive: https://github.com/xwmx/nb/archive/refs/tags/7.25.4.tar.gz
