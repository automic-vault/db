id: brew:awsdac
display-name: awsdac
homepage: https://github.com/awslabs/diagram-as-code
repo: https://github.com/awslabs/diagram-as-code
docs: https://github.com/awslabs/diagram-as-code
package-manager:
  brew: awsdac
package-manager-url: https://formulae.brew.sh/formula/awsdac
version: 0.23
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: CLI tool for drawing AWS architecture
source-archive: https://github.com/awslabs/diagram-as-code/archive/refs/tags/v0.23.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: awsdac
  - exposure: global executable
    kind: cli
    name: awsdac-mcp-server
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:awsdac
  brew: brew install awsdac
provenance:
  formula: awsdac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
