id: brew:c2patool
display-name: c2patool
homepage: https://contentauthenticity.org
repo: https://github.com/contentauth/c2pa-rs
docs: https://contentauthenticity.org
package-manager:
  brew: c2patool
  nix: c2patool
package-manager-url: https://formulae.brew.sh/formula/c2patool
version: 0.26.59
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: CLI for working with C2PA manifests and media assets
source-archive: https://github.com/contentauth/c2pa-rs/archive/refs/tags/c2patool-v0.26.59.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: c2patool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:c2patool
  brew: brew install c2patool
  nix: nix profile install nixpkgs#c2patool
provenance:
  formula: c2patool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
