id: brew:f3d
display-name: f3d
homepage: https://f3d.app
repo: https://github.com/f3d-app/f3d
docs: https://f3d.app
package-manager:
  brew: f3d
  debian: f3d
  dnf: f3d
  nix: f3d
  pacman: f3d
  scoop: extras/f3d
  ubuntu: f3d
  winget: f3d-app.f3d
  zypper: f3d
package-manager-url: https://formulae.brew.sh/formula/f3d
version: 3.5.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Fast and minimalist 3D viewer
source-archive: https://github.com/f3d-app/f3d/archive/refs/tags/v3.5.0.tar.gz
dependencies:
  - alembic
  - assimp
  - freetype
  - glew
  - hdf5
  - imath
  - jsoncpp
  - libaec
  - netcdf
  - opencascade
  - tbb
  - tcl-tk@8
  - vtk
  - zstd
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: f3d
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:f3d
  brew: brew install f3d
  debian: sudo apt install f3d
  dnf: sudo dnf install f3d
  nix: nix profile install nixpkgs#f3d
  pacman: sudo pacman -S f3d
  scoop: scoop install extras/f3d
  ubuntu: sudo apt install f3d
  winget: winget install --id f3d-app.f3d -e
  zypper: sudo zypper install f3d
provenance:
  formula: f3d
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
