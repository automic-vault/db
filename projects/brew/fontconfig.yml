id: brew:fontconfig
display-name: fontconfig
homepage: https://wiki.freedesktop.org/www/Software/fontconfig/
repo: >
  https://gitlab.freedesktop.org/fontconfig/fontconfig/-/archive/2.18.0/fontconfig-2.18.0.tar.gz
docs: https://wiki.freedesktop.org/www/Software/fontconfig/
package-manager:
  apk: fontconfig
  brew: fontconfig
  debian: fontconfig
  dnf: fontconfig
  macports: fontconfig
  nix: fontconfig
  pacman: fontconfig
  ubuntu: fontconfig
  zypper: fontconfig
package-manager-url: https://formulae.brew.sh/formula/fontconfig
version: 2.18.0
license: >
  HPND-sell-variant AND Unicode-3.0 AND MIT-Modern-Variant AND MIT AND
  LicenseRef-Homebrew-public-domain
category: development
tags:
  - cli
description: XML-based font configuration API for X Windows
source-archive: >
  https://gitlab.freedesktop.org/fontconfig/fontconfig/-/archive/2.18.0/fontconfig-2.18.0.tar.gz
dependencies:
  - freetype
  - gettext
build-dependencies:
  - gettext
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: fc-cache
  - exposure: global executable
    kind: cli
    name: fc-cat
  - exposure: global executable
    kind: cli
    name: fc-conflist
  - exposure: global executable
    kind: cli
    name: fc-genconf
  - exposure: global executable
    kind: cli
    name: fc-list
  - exposure: global executable
    kind: cli
    name: fc-match
  - exposure: global executable
    kind: cli
    name: fc-pattern
  - exposure: global executable
    kind: cli
    name: fc-query
  - exposure: global executable
    kind: cli
    name: fc-scan
  - exposure: global executable
    kind: cli
    name: fc-validate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add fontconfig
  av: sudo av install brew:fontconfig
  brew: brew install fontconfig
  debian: sudo apt install fontconfig
  dnf: sudo dnf install fontconfig
  macports: sudo port install fontconfig
  nix: nix profile install nixpkgs#fontconfig
  pacman: sudo pacman -S fontconfig
  ubuntu: sudo apt install fontconfig
  zypper: sudo zypper install fontconfig
provenance:
  formula: fontconfig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
