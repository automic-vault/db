id: brew:docker-ls
display-name: docker-ls
homepage: https://github.com/mayflower/docker-ls
repo: https://github.com/mayflower/docker-ls
docs: https://github.com/mayflower/docker-ls
package-manager:
  brew: docker-ls
  nix: docker-ls
package-manager-url: https://formulae.brew.sh/formula/docker-ls
version: 0.5.1
license: MIT
category: development
tags:
  - cli
  - docker
description: Tools for browsing and manipulating docker registries
source-archive: https://github.com/mayflower/docker-ls.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: docker-ls
  - exposure: global executable
    kind: cli
    name: docker-rm
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:docker-ls
  brew: brew install docker-ls
  nix: nix profile install nixpkgs#docker-ls
provenance:
  formula: docker-ls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
