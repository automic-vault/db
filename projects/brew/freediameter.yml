id: brew:freediameter
display-name: freediameter
homepage: https://github.com/freeDiameter/freeDiameter
repo: https://github.com/freeDiameter/freeDiameter
docs: https://github.com/freeDiameter/freeDiameter
package-manager:
  apk: freediameter
  brew: freediameter
  debian: freediameter
  dnf: freeDiameter
  nix: freediameter
  ubuntu: freediameter
package-manager-url: https://formulae.brew.sh/formula/freediameter
version: 1.6.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Open source Diameter (Authentication) protocol implementation
source-archive: https://github.com/freeDiameter/freeDiameter/archive/refs/tags/1.6.0.tar.gz
dependencies:
  - gnutls
  - libgcrypt
  - libidn2
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: freeDiameterd
  - exposure: global executable
    kind: cli
    name: freeDiameterd-1.6.0
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To configure freeDiameter, edit $HOMEBREW_PREFIX/etc/freeDiameter.conf to taste.
    Sample configuration files can be found in
    $HOMEBREW_CELLAR/freediameter/1.6.0/share/doc/freediameter. For more information
    about freeDiameter configuration options, read:
    http://www.freediameter.net/trac/wiki/Configuration Other potentially useful files
    can be found in $HOMEBREW_PREFIX/opt/freediameter/share/freediameter/contrib.
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add freediameter
  av: sudo av install brew:freediameter
  brew: brew install freediameter
  debian: sudo apt install freediameter
  dnf: sudo dnf install freeDiameter
  nix: nix profile install nixpkgs#freediameter
  ubuntu: sudo apt install freediameter
provenance:
  formula: freediameter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
