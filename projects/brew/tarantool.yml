id: brew:tarantool
display-name: tarantool
homepage: https://tarantool.org/
repo: https://download.tarantool.org/tarantool/src/tarantool-3.7.0.tar.gz
docs: https://tarantool.org/
package-manager:
  brew: tarantool
  debian: tarantool
  dnf: tarantool
  nix: tarantool
  ubuntu: tarantool
package-manager-url: https://formulae.brew.sh/formula/tarantool
version: 3.7.0
license: BSD-2-Clause
category: database
tags:
  - cli
  - database
description: In-memory database and Lua application server
source-archive: https://download.tarantool.org/tarantool/src/tarantool-3.7.0.tar.gz
dependencies:
  - icu4c@78
  - libyaml
  - openssl@3
  - readline
  - zstd
build-dependencies:
  - cmake
uses-from-macos:
  - curl
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: tarantool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tarantool
  brew: brew install tarantool
  debian: sudo apt install tarantool
  dnf: sudo dnf install tarantool
  nix: nix profile install nixpkgs#tarantool
  ubuntu: sudo apt install tarantool
provenance:
  formula: tarantool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
