id: brew:logtalk
display-name: logtalk
homepage: https://logtalk.org/
repo: https://github.com/LogtalkDotOrg/logtalk3
docs: https://logtalk.org/
package-manager:
  brew: logtalk
  macports: logtalk
  winget: Logtalk.Logtalk
package-manager-url: https://formulae.brew.sh/formula/logtalk
version: 3.100.1
license: Apache-2.0
category: development
tags:
  - cli
description: Declarative object-oriented logic programming language
source-archive: https://github.com/LogtalkDotOrg/logtalk3/archive/refs/tags/lgt31001stable.tar.gz
dependencies:
