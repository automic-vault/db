bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Logtalk has been configured with the following environment variables:
    LOGTALKHOME=$HOMEBREW_PREFIX/share/logtalk LOGTALKUSER=$HOME/logtalk
  post-install-defined: false
install-lines:
  av: sudo av install brew:logtalk
  brew: brew install logtalk
  macports: sudo port install logtalk
  winget: winget install --id Logtalk.Logtalk -e
provenance:
  formula: logtalk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
