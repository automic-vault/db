id: brew:libidn
display-name: libidn
homepage: https://www.gnu.org/software/libidn/
repo: https://ftpmirror.gnu.org/gnu/libidn/libidn-1.43.tar.gz
docs: https://www.gnu.org/software/libidn/
package-manager:
  apk: libidn
  brew: libidn
  debian: idn
  dnf: libidn
  macports: libidn
  nix: libidn
  pacman: libidn
  ubuntu: idn
package-manager-url: https://formulae.brew.sh/formula/libidn
version: 1.43
license: GPL-2.0-or-later OR LGPL-3.0-or-later
category: network
tags:
  - cli
description: International domain name library
source-archive: https://ftpmirror.gnu.org/gnu/libidn/libidn-1.43.tar.gz
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: idn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libidn
  av: sudo av install brew:libidn
  brew: brew install libidn
  debian: sudo apt install idn
  dnf: sudo dnf install libidn
  macports: sudo port install libidn
  nix: nix profile install nixpkgs#libidn
  pacman: sudo pacman -S libidn
  ubuntu: sudo apt install idn
provenance:
  formula: libidn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
