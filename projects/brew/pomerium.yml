id: brew:pomerium
display-name: pomerium
homepage: https://www.pomerium.com
repo: https://github.com/pomerium/pomerium
docs: https://www.pomerium.com
package-manager:
  brew: pomerium
  nix: pomerium
package-manager-url: https://formulae.brew.sh/formula/pomerium
version: 0.32.7
license: Apache-2.0
category: development
tags:
  - cli
description: Identity and context-aware access proxy
source-archive: https://github.com/pomerium/pomerium/archive/refs/tags/v0.32.7.tar.gz
build-dependencies:
  - go
  - node
executables:
  - exposure: global executable
    kind: cli
    name: pomerium
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:pomerium
  brew: brew install pomerium
  nix: nix profile install nixpkgs#pomerium
provenance:
  formula: pomerium
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
