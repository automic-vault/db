id: brew:cconv
display-name: cconv
homepage: https://github.com/xiaoyjy/cconv
repo: https://github.com/xiaoyjy/cconv
docs: https://github.com/xiaoyjy/cconv
package-manager:
  brew: cconv
  debian: cconv
  nix: cconv
  ubuntu: cconv
package-manager-url: https://formulae.brew.sh/formula/cconv
version: 0.6.3
license: MIT
category: development
tags:
  - cli
description: Iconv based simplified-traditional Chinese conversion tool
source-archive: https://github.com/xiaoyjy/cconv/archive/refs/tags/v0.6.3.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: cconv
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cconv
  brew: brew install cconv
  debian: sudo apt install cconv
  nix: nix profile install nixpkgs#cconv
  ubuntu: sudo apt install cconv
provenance:
  formula: cconv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
