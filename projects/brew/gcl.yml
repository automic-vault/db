id: brew:gcl
display-name: gcl
homepage: https://www.gnu.org/software/gcl/
repo: https://ftpmirror.gnu.org/gcl/gcl-2.7.1.tar.gz
docs: https://www.gnu.org/software/gcl/
package-manager:
  brew: gcl
  debian: gcl
  dnf: gcl
  macports: gcl
  nix: gcl
  ubuntu: gcl
package-manager-url: https://formulae.brew.sh/formula/gcl
version: 2.7.1
license: LGPL-2.0-or-later AND GPL-1.0-or-later AND LOOP
category: network
tags:
  - cli
description: GNU Common Lisp
source-archive: https://ftpmirror.gnu.org/gcl/gcl-2.7.1.tar.gz
dependencies:
  - gmp
  - libtirpc
executables:
  - exposure: global executable
    kind: cli
    name: gcl
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gcl
  brew: brew install gcl
  debian: sudo apt install gcl
  dnf: sudo dnf install gcl
  macports: sudo port install gcl
  nix: nix profile install nixpkgs#gcl
  ubuntu: sudo apt install gcl
provenance:
  formula: gcl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
