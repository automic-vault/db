id: brew:cliam
display-name: cliam
homepage: https://github.com/securisec/cliam
repo: https://github.com/securisec/cliam
docs: https://github.com/securisec/cliam
package-manager:
  brew: cliam
  nix: cliam
package-manager-url: https://formulae.brew.sh/formula/cliam
version: 2.2.0
license: GPL-3.0-or-later
category: cloud
tags:
  - cli
  - cloud
description: Cloud agnostic IAM permissions enumerator
source-archive: https://github.com/securisec/cliam/archive/refs/tags/2.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cliam
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cliam
  brew: brew install cliam
  nix: nix profile install nixpkgs#cliam
provenance:
  formula: cliam
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
