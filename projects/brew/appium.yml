id: brew:appium
display-name: appium
homepage: https://appium.io/
repo: https://registry.npmjs.org/appium/-/appium-3.4.2.tgz
docs: https://appium.io/
package-manager:
  brew: appium
  winget: JSFoundation.Appium
package-manager-url: https://formulae.brew.sh/formula/appium
version: 3.4.2
license: Apache-2.0
category: network
tags:
  - cli
description: Automation for Apps
source-archive: https://registry.npmjs.org/appium/-/appium-3.4.2.tgz
dependencies:
  - gettext
  - glib
  - node
  - vips
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: appium
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:appium
  brew: brew install appium
  winget: winget install --id JSFoundation.Appium -e
provenance:
  formula: appium
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
