id: brew:webfs
display-name: webfs
homepage: https://linux.bytesex.org/misc/webfs.html
repo: https://www.kraxel.org/releases/webfs/webfs-1.21.tar.gz
docs: https://linux.bytesex.org/misc/webfs.html
package-manager:
  brew: webfs
  debian: webfs
  macports: webfs
  nix: webfs
  ubuntu: webfs
package-manager-url: https://formulae.brew.sh/formula/webfs
version: 1.21
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: HTTP server for purely static content
source-archive: https://www.kraxel.org/releases/webfs/webfs-1.21.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - httpd
executables:
  - exposure: global executable
    kind: cli
    name: webfsd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:webfs
  brew: brew install webfs
  debian: sudo apt install webfs
  macports: sudo port install webfs
  nix: nix profile install nixpkgs#webfs
  ubuntu: sudo apt install webfs
provenance:
  formula: webfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
