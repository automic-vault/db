id: brew:qstat
display-name: qstat
homepage: https://github.com/Unity-Technologies/qstat
repo: https://github.com/Unity-Technologies/qstat
docs: https://github.com/Unity-Technologies/qstat
package-manager:
  brew: qstat
  debian: qstat
  dnf: qstat
  macports: qstat
  ubuntu: qstat
package-manager-url: https://formulae.brew.sh/formula/qstat
version: 2.18
license: Artistic-2.0
category: development
tags:
  - cli
description: Query Quake servers from the command-line
source-archive: https://github.com/Unity-Technologies/qstat/archive/refs/tags/v2.18.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: qstat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qstat
  brew: brew install qstat
  debian: sudo apt install qstat
  dnf: sudo dnf install qstat
  macports: sudo port install qstat
  ubuntu: sudo apt install qstat
provenance:
  formula: qstat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
