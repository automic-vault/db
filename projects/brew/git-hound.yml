id: brew:git-hound
display-name: git-hound
homepage: https://github.com/ezekg/git-hound
repo: https://github.com/ezekg/git-hound
docs: https://github.com/ezekg/git-hound
package-manager:
  brew: git-hound
  nix: git-hound
package-manager-url: https://formulae.brew.sh/formula/git-hound
version: 1.0.0
license: MIT
category: development
tags:
  - cli
  - git
description: Git plugin that prevents sensitive data from being committed
source-archive: https://github.com/ezekg/git-hound/archive/refs/tags/1.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-hound
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-hound
  brew: brew install git-hound
  nix: nix profile install nixpkgs#git-hound
provenance:
  formula: git-hound
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
