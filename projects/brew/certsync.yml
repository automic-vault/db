id: brew:certsync
display-name: certsync
homepage: https://github.com/zblurx/certsync
repo: >
  https://files.pythonhosted.org/packages/c8/75/3928920bdbfb0af317446236fad17b47a1d6aad507f1ae2eed6bbf7e7ad9/certsync-0.1.6.tar.gz
docs: https://github.com/zblurx/certsync
package-manager:
  brew: certsync
  macports: certsync
  nix: certsync
package-manager-url: https://formulae.brew.sh/formula/certsync
version: 0.1.6
license: MIT
category: development
tags:
  - cli
description: Dump NTDS with golden certificates and UnPAC the hash
source-archive: >
  https://files.pythonhosted.org/packages/c8/75/3928920bdbfb0af317446236fad17b47a1d6aad507f1ae2eed6bbf7e7ad9/certsync-0.1.6.tar.gz
dependencies:
  - certifi
  - cryptography
  - python@3.14
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: certsync
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:certsync
  brew: brew install certsync
  macports: sudo port install certsync
  nix: nix profile install nixpkgs#certsync
provenance:
  formula: certsync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
