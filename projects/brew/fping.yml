id: brew:fping
display-name: fping
homepage: https://fping.org/
repo: https://fping.org/dist/fping-5.5.tar.gz
docs: https://fping.org/
package-manager:
  apk: fping
  brew: fping
  debian: fping
  dnf: fping
  macports: fping
  nix: fping
  pacman: fping
  ubuntu: fping
  zypper: fping
package-manager-url: https://formulae.brew.sh/formula/fping
version: 5.5
license: BSD-3-Clause
category: network
tags:
  - cli
description: Scriptable ping program for checking if multiple hosts are up
source-archive: https://fping.org/dist/fping-5.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: fping
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fping
  av: sudo av install brew:fping
  brew: brew install fping
  debian: sudo apt install fping
  dnf: sudo dnf install fping
  macports: sudo port install fping
  nix: nix profile install nixpkgs#fping
  pacman: sudo pacman -S fping
  ubuntu: sudo apt install fping
  zypper: sudo zypper install fping
provenance:
  formula: fping
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
