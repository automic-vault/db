id: brew:ffmate
display-name: ffmate
homepage: https://docs.ffmate.io
repo: https://github.com/welovemedia/ffmate
docs: https://docs.ffmate.io
package-manager:
  brew: ffmate
package-manager-url: https://formulae.brew.sh/formula/ffmate
version: 2.0.18
license: AGPL-3.0-only
category: development
tags:
  - cli
description: FFmpeg automation layer
source-archive: https://github.com/welovemedia/ffmate.git
build-dependencies:
  - go
  - node
  - pnpm
executables:
  - exposure: global executable
    kind: cli
    name: ffmate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ffmate
  brew: brew install ffmate
provenance:
  formula: ffmate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
