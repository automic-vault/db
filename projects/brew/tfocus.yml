id: brew:tfocus
display-name: tfocus
homepage: https://github.com/nwiizo/tfocus
repo: https://github.com/nwiizo/tfocus
docs: https://github.com/nwiizo/tfocus
package-manager:
  brew: tfocus
package-manager-url: https://formulae.brew.sh/formula/tfocus
version: 0.1.5
license: MIT
category: cloud
tags:
  - cli
description: Tool for selecting and executing terraform plan/apply on specific resources
source-archive: https://github.com/nwiizo/tfocus/archive/refs/tags/v0.1.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tfocus
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tfocus
  brew: brew install tfocus
provenance:
  formula: tfocus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
