id: brew:libcdio
display-name: libcdio
homepage: https://savannah.gnu.org/projects/libcdio/
repo: https://github.com/libcdio/libcdio
docs: https://savannah.gnu.org/projects/libcdio/
package-manager:
  apk: libcdio
  brew: libcdio
  dnf: libcdio
  macports: libcdio
  nix: libcdio
  pacman: libcdio
package-manager-url: https://formulae.brew.sh/formula/libcdio
version: 2.3.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Compact Disc Input and Control Library
source-archive: https://github.com/libcdio/libcdio/releases/download/2.3.0/libcdio-2.3.0.tar.gz
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cd-drive
  - exposure: global executable
    kind: cli
    name: cd-info
  - exposure: global executable
    kind: cli
    name: cd-read
  - exposure: global executable
    kind: cli
    name: iso-info
  - exposure: global executable
    kind: cli
    name: iso-read
  - exposure: global executable
    kind: cli
    name: mmc-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libcdio
  av: sudo av install brew:libcdio
  brew: brew install libcdio
  dnf: sudo dnf install libcdio
  macports: sudo port install libcdio
  nix: nix profile install nixpkgs#libcdio
  pacman: sudo pacman -S libcdio
provenance:
  formula: libcdio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
