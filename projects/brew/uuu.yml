id: brew:uuu
display-name: uuu
homepage: https://github.com/nxp-imx/mfgtools
repo: https://github.com/nxp-imx/mfgtools
docs: https://github.com/nxp-imx/mfgtools
package-manager:
  brew: uuu
  debian: uuu
  nix: uuu
  ubuntu: uuu
package-manager-url: https://formulae.brew.sh/formula/uuu
version: 1.5.243
license: BSD-3-Clause
category: development
tags:
  - cli
description: Universal Update Utility, mfgtools 3.0. NXP I.MX Chip image deploy tools
source-archive: >
  https://github.com/nxp-imx/mfgtools/releases/download/uuu_1.5.243/uuu_source-uuu_1.5.243.tar.gz
dependencies:
  - libusb
  - libzip
  - openssl@3
  - tinyxml2
  - zstd
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: uuu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:uuu
  brew: brew install uuu
  debian: sudo apt install uuu
  nix: nix profile install nixpkgs#uuu
  ubuntu: sudo apt install uuu
provenance:
  formula: uuu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
