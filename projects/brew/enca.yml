id: brew:enca
display-name: enca
homepage: https://cihar.com/software/enca/
repo: https://github.com/Project-OSS-Revival/enca
docs: https://cihar.com/software/enca/
package-manager:
  apk: enca
  brew: enca
  debian: enca
  dnf: enca
  macports: enca
  nix: enca
  pacman: enca
  ubuntu: enca
  zypper: enca
package-manager-url: https://formulae.brew.sh/formula/enca
version: 1.22
license: GPL-2.0-only
category: development
tags:
  - cli
description: Charset analyzer and converter
source-archive: https://github.com/Project-OSS-Revival/enca/releases/download/1.22/enca-1.22.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: enca
  - exposure: global executable
    kind: cli
    name: enconv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add enca
  av: sudo av install brew:enca
  brew: brew install enca
  debian: sudo apt install enca
  dnf: sudo dnf install enca
  macports: sudo port install enca
  nix: nix profile install nixpkgs#enca
  pacman: sudo pacman -S enca
  ubuntu: sudo apt install enca
  zypper: sudo zypper install enca
provenance:
  formula: enca
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
