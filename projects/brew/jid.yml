id: brew:jid
display-name: jid
homepage: https://github.com/simeji/jid
repo: https://github.com/simeji/jid
docs: https://github.com/simeji/jid
package-manager:
  brew: jid
  debian: jid
  dnf: jid
  macports: jid
  nix: jid
  scoop: main/jid
  ubuntu: jid
package-manager-url: https://formulae.brew.sh/formula/jid
version: 1.1.2
license: MIT
category: development
tags:
  - cli
  - json
description: Json incremental digger
source-archive: https://github.com/simeji/jid/archive/refs/tags/v1.1.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jid
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jid
  brew: brew install jid
  debian: sudo apt install jid
  dnf: sudo dnf install jid
  macports: sudo port install jid
  nix: nix profile install nixpkgs#jid
  scoop: scoop install main/jid
  ubuntu: sudo apt install jid
provenance:
  formula: jid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
