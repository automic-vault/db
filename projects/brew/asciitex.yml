id: brew:asciitex
display-name: asciitex
homepage: https://asciitex.sourceforge.net/
repo: https://downloads.sourceforge.net/project/asciitex/asciiTeX-0.21.tar.gz
docs: https://asciitex.sourceforge.net/
package-manager:
  brew: asciitex
package-manager-url: https://formulae.brew.sh/formula/asciitex
version: 0.21
license: GPL-2.0-only
category: network
tags:
  - cli
description: Generate ASCII-art representations of mathematical equations
source-archive: https://downloads.sourceforge.net/project/asciitex/asciiTeX-0.21.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: asciiTeX
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:asciitex
  brew: brew install asciitex
provenance:
  formula: asciitex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
