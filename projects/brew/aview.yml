id: brew:aview
display-name: aview
homepage: https://aa-project.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/aa-project/aview/1.3.0rc1/aview-1.3.0rc1.tar.gz
docs: https://aa-project.sourceforge.net/
package-manager:
  brew: aview
  debian: aview
  ubuntu: aview
package-manager-url: https://formulae.brew.sh/formula/aview
version: 1.3.0rc1
license: GPL-2.0-only
category: media
tags:
  - cli
description: ASCII-art image browser and animation viewer
source-archive: >
  https://downloads.sourceforge.net/project/aa-project/aview/1.3.0rc1/aview-1.3.0rc1.tar.gz
dependencies:
