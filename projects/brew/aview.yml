    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aview
  brew: brew install aview
  debian: sudo apt install aview
  ubuntu: sudo apt install aview
provenance:
  formula: aview
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
