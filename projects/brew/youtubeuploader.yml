id: brew:youtubeuploader
display-name: youtubeuploader
homepage: https://github.com/porjo/youtubeuploader
repo: https://github.com/porjo/youtubeuploader
docs: https://github.com/porjo/youtubeuploader
package-manager:
  brew: youtubeuploader
  nix: youtubeuploader
package-manager-url: https://formulae.brew.sh/formula/youtubeuploader
version: 1.25.5
license: Apache-2.0
category: development
tags:
  - cli
description: Scripted uploads to Youtube
source-archive: https://github.com/porjo/youtubeuploader/archive/refs/tags/v1.25.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: youtubeuploader
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:youtubeuploader
  brew: brew install youtubeuploader
  nix: nix profile install nixpkgs#youtubeuploader
provenance:
  formula: youtubeuploader
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
