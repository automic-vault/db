id: brew:cyclonedx-python
display-name: cyclonedx-python
homepage: https://cyclonedx.org/
repo: >
  https://files.pythonhosted.org/packages/6c/e1/700aea05811f8988a60636e045914ffb155ce5318879f14b5c9016a12da5/cyclonedx_bom-7.3.0.tar.gz
docs: https://cyclonedx.org/
package-manager:
