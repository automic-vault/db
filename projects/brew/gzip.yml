id: brew:gzip
display-name: gzip
homepage: https://www.gnu.org/software/gzip/
repo: https://ftpmirror.gnu.org/gnu/gzip/gzip-1.14.tar.gz
docs: https://www.gnu.org/software/gzip/
package-manager:
  apk: gzip
  brew: gzip
  chocolatey: gzip
  debian: gzip
  dnf: gzip
  macports: gzip
  nix: gzip
  pacman: gzip
  scoop: main/gzip
  ubuntu: gzip
  winget: GnuWin32.Gzip
  zypper: gzip
package-manager-url: https://formulae.brew.sh/formula/gzip
version: 1.14
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Popular GNU data compression program
source-archive: https://ftpmirror.gnu.org/gnu/gzip/gzip-1.14.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: gunzip
  - exposure: global executable
    kind: cli
    name: gzexe
  - exposure: global executable
    kind: cli
    name: gzip
  - exposure: global executable
    kind: cli
    name: uncompress
  - exposure: global executable
    kind: cli
    name: zcat
  - exposure: global executable
    kind: cli
    name: zcmp
  - exposure: global executable
    kind: cli
    name: zdiff
  - exposure: global executable
    kind: cli
    name: zegrep
  - exposure: global executable
    kind: cli
    name: zfgrep
  - exposure: global executable
    kind: cli
    name: zforce
  - exposure: global executable
    kind: cli
    name: zgrep
  - exposure: global executable
    kind: cli
    name: zless
  - exposure: global executable
    kind: cli
    name: zmore
  - exposure: global executable
    kind: cli
    name: znew
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gzip
  av: sudo av install brew:gzip
  brew: brew install gzip
  chocolatey: choco install gzip
  debian: sudo apt install gzip
  dnf: sudo dnf install gzip
  macports: sudo port install gzip
  nix: nix profile install nixpkgs#gzip
  pacman: sudo pacman -S gzip
  scoop: scoop install main/gzip
  ubuntu: sudo apt install gzip
  winget: winget install --id GnuWin32.Gzip -e
  zypper: sudo zypper install gzip
provenance:
  formula: gzip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
