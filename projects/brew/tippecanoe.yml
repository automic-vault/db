id: brew:tippecanoe
display-name: tippecanoe
homepage: https://github.com/felt/tippecanoe
repo: https://github.com/felt/tippecanoe
docs: https://github.com/felt/tippecanoe
package-manager:
  brew: tippecanoe
  debian: tippecanoe
  macports: tippecanoe
  nix: tippecanoe
  ubuntu: tippecanoe
package-manager-url: https://formulae.brew.sh/formula/tippecanoe
version: 2.79.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Build vector tilesets from collections of GeoJSON features
source-archive: https://github.com/felt/tippecanoe/archive/refs/tags/2.79.0.tar.gz
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: tile-join
  - exposure: global executable
    kind: cli
    name: tippecanoe
  - exposure: global executable
    kind: cli
    name: tippecanoe-decode
  - exposure: global executable
    kind: cli
    name: tippecanoe-enumerate
  - exposure: global executable
    kind: cli
    name: tippecanoe-json-tool
  - exposure: global executable
    kind: cli
    name: tippecanoe-overzoom
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tippecanoe
  brew: brew install tippecanoe
  debian: sudo apt install tippecanoe
  macports: sudo port install tippecanoe
  nix: nix profile install nixpkgs#tippecanoe
  ubuntu: sudo apt install tippecanoe
provenance:
  formula: tippecanoe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
