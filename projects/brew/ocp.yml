id: brew:ocp
display-name: ocp
homepage: https://stian.cubic.org/project-ocp.php
repo: https://stian.cubic.org/ocp/ocp-3.3.1.tar.xz
docs: https://stian.cubic.org/project-ocp.php
package-manager:
  brew: ocp
  dnf: ocp
  macports: ocp
  zypper: ocp
package-manager-url: https://formulae.brew.sh/formula/ocp
version: 3.3.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: UNIX port of the Open Cubic Player
source-archive: https://stian.cubic.org/ocp/ocp-3.3.1.tar.xz
dependencies:
  - ancient
  - cjson
  - flac
  - freetype
  - game-music-emu
  - jpeg-turbo
  - libdiscid
  - libogg
  - libpng
  - libvorbis
  - mad
  - sdl3
build-dependencies:
  - pkgconf
  - xa
uses-from-macos:
  - bzip2
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ocp
  - exposure: global executable
    kind: cli
    name: ocp-curses
  - exposure: global executable
    kind: cli
    name: ocp-sdl3
  - exposure: global executable
    kind: cli
    name: ocp-vcsa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ocp
  brew: brew install ocp
  dnf: sudo dnf install ocp
  macports: sudo port install ocp
  zypper: sudo zypper install ocp
provenance:
  formula: ocp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
