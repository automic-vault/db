id: brew:pidgin
display-name: pidgin
homepage: https://pidgin.im/
repo: https://downloads.sourceforge.net/project/pidgin/Pidgin/2.14.14/pidgin-2.14.14.tar.bz2
docs: https://pidgin.im/
package-manager:
  apk: pidgin
  brew: pidgin
  chocolatey: pidgin
  debian: pidgin
  dnf: pidgin
  macports: pidgin
  scoop: extras/pidgin
  ubuntu: pidgin
  winget: Pidgin.Pidgin
  zypper: pidgin
package-manager-url: https://formulae.brew.sh/formula/pidgin
version: 2.14.14
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Multi-protocol chat client
source-archive: https://downloads.sourceforge.net/project/pidgin/Pidgin/2.14.14/pidgin-2.14.14.tar.bz2
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gnutls
  - gtk+
  - harfbuzz
  - libgcrypt
  - libgnt
  - libgpg-error
  - libidn
  - libotr
  - ncurses
  - pango
  - tcl-tk@8
build-dependencies:
  - gettext
  - intltool
  - pkgconf
uses-from-macos:
  - cyrus-sasl
  - expat
  - libxml2
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: finch
  - exposure: global executable
    kind: cli
    name: pidgin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add pidgin
  av: sudo av install brew:pidgin
  brew: brew install pidgin
  chocolatey: choco install pidgin
  debian: sudo apt install pidgin
  dnf: sudo dnf install pidgin
  macports: sudo port install pidgin
  scoop: scoop install extras/pidgin
  ubuntu: sudo apt install pidgin
  winget: winget install --id Pidgin.Pidgin -e
  zypper: sudo zypper install pidgin
provenance:
  formula: pidgin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
