id: brew:keep-sorted
display-name: keep-sorted
homepage: https://github.com/google/keep-sorted
repo: https://github.com/google/keep-sorted
docs: https://github.com/google/keep-sorted
package-manager:
  brew: keep-sorted
  nix: keep-sorted
package-manager-url: https://formulae.brew.sh/formula/keep-sorted
version: 0.8.0
license: Apache-2.0
category: development
tags:
  - cli
description: Language-agnostic formatter that sorts selected lines
source-archive: https://github.com/google/keep-sorted.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: keep-sorted
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:keep-sorted
  brew: brew install keep-sorted
  nix: nix profile install nixpkgs#keep-sorted
provenance:
  formula: keep-sorted
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
