id: brew:katana
display-name: katana
homepage: https://github.com/projectdiscovery/katana
repo: https://github.com/projectdiscovery/katana
docs: https://github.com/projectdiscovery/katana
package-manager:
  apk: katana
  brew: katana
  macports: katana
  nix: katana
  winget: HiroyukiFuruno.katana-desktop
package-manager-url: https://formulae.brew.sh/formula/katana
version: 1.6.1
license: MIT
category: development
tags:
  - cli
description: Crawling and spidering framework
source-archive: https://github.com/projectdiscovery/katana/archive/refs/tags/v1.6.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: katana
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add katana
  av: sudo av install brew:katana
  brew: brew install katana
  macports: sudo port install katana
  nix: nix profile install nixpkgs#katana
  winget: winget install --id HiroyukiFuruno.katana-desktop -e
provenance:
  formula: katana
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
