id: brew:typst
display-name: typst
homepage: https://typst.app/
repo: https://github.com/typst/typst
docs: https://typst.app/
package-manager:
  apk: typst
  brew: typst
  macports: typst
  nix: typst
  pacman: typst
  scoop: main/typst
  winget: Typst.Typst
  zypper: typst
package-manager-url: https://formulae.brew.sh/formula/typst
version: 0.14.2
license: Apache-2.0
category: development
tags:
  - cli
description: Markup-based typesetting system
source-archive: https://github.com/typst/typst/archive/refs/tags/v0.14.2.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: typst
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add typst
  av: sudo av install brew:typst
  brew: brew install typst
  macports: sudo port install typst
  nix: nix profile install nixpkgs#typst
  pacman: sudo pacman -S typst
  scoop: scoop install main/typst
  winget: winget install --id Typst.Typst -e
  zypper: sudo zypper install typst
provenance:
  formula: typst
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
