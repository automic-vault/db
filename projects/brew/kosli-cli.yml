id: brew:kosli-cli
display-name: kosli-cli
homepage: https://docs.kosli.com
repo: https://github.com/kosli-dev/cli
docs: https://docs.kosli.com
package-manager:
  brew: kosli-cli
package-manager-url: https://formulae.brew.sh/formula/kosli-cli
version: 2.21.0
license: MIT
category: development
tags:
  - cli
description: CLI for managing Kosli
source-archive: https://github.com/kosli-dev/cli/archive/refs/tags/v2.21.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kosli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kosli-cli
  brew: brew install kosli-cli
provenance:
  formula: kosli-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
