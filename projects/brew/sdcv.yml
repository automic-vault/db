id: brew:sdcv
display-name: sdcv
homepage: https://dushistov.github.io/sdcv/
repo: https://github.com/Dushistov/sdcv
docs: https://dushistov.github.io/sdcv/
package-manager:
  apk: sdcv
  brew: sdcv
  debian: sdcv
  dnf: sdcv
  macports: sdcv
  nix: sdcv
  pacman: sdcv
  ubuntu: sdcv
  zypper: sdcv
package-manager-url: https://formulae.brew.sh/formula/sdcv
version: 0.5.5
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: StarDict Console Version
source-archive: https://github.com/Dushistov/sdcv/archive/refs/tags/v0.5.5.tar.gz
dependencies:
  - gettext
  - glib
  - readline
build-dependencies:
  - cmake
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: sdcv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sdcv
  av: sudo av install brew:sdcv
  brew: brew install sdcv
  debian: sudo apt install sdcv
  dnf: sudo dnf install sdcv
  macports: sudo port install sdcv
  nix: nix profile install nixpkgs#sdcv
  pacman: sudo pacman -S sdcv
  ubuntu: sudo apt install sdcv
  zypper: sudo zypper install sdcv
provenance:
  formula: sdcv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
