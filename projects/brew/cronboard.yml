id: brew:cronboard
display-name: cronboard
homepage: https://github.com/antoniorodr/cronboard
repo: https://github.com/antoniorodr/cronboard
docs: https://github.com/antoniorodr/cronboard
package-manager:
  brew: cronboard
package-manager-url: https://formulae.brew.sh/formula/cronboard
version: 0.6.2
license: Apache-2.0
category: development
tags:
  - cli
description: Terminal-based dashboard for managing cron jobs locally and on servers
source-archive: https://github.com/antoniorodr/cronboard/archive/refs/tags/v0.6.2.tar.gz
dependencies:
  - cryptography
  - libsodium
  - python@3.14
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cronboard
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cronboard
  brew: brew install cronboard
provenance:
  formula: cronboard
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
