id: brew:planus
display-name: planus
homepage: https://github.com/planus-org/planus
repo: https://github.com/planus-org/planus
docs: https://github.com/planus-org/planus
package-manager:
  brew: planus
  nix: planus
package-manager-url: https://formulae.brew.sh/formula/planus
version: 1.3.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Alternative compiler for flatbuffers
source-archive: https://github.com/planus-org/planus/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: planus
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:planus
  brew: brew install planus
  nix: nix profile install nixpkgs#planus
provenance:
  formula: planus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
