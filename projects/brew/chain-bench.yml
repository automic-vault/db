id: brew:chain-bench
display-name: chain-bench
homepage: https://github.com/aquasecurity/chain-bench
repo: https://github.com/aquasecurity/chain-bench
docs: https://github.com/aquasecurity/chain-bench
package-manager:
  brew: chain-bench
  nix: chain-bench
package-manager-url: https://formulae.brew.sh/formula/chain-bench
version: 0.1.10
license: Apache-2.0
category: security
tags:
  - cli
description: Software supply chain auditing tool based on CIS benchmark
source-archive: https://github.com/aquasecurity/chain-bench/archive/refs/tags/v0.1.10.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: chain-bench
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chain-bench
  brew: brew install chain-bench
  nix: nix profile install nixpkgs#chain-bench
provenance:
  formula: chain-bench
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
