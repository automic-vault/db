id: brew:daq
display-name: daq
homepage: https://www.snort.org/
repo: https://github.com/snort3/libdaq
docs: https://www.snort.org/
package-manager:
  apk: daq
  brew: daq
  dnf: daq
  macports: daq
package-manager-url: https://formulae.brew.sh/formula/daq
version: 3.0.27
license: GPL-2.0-only
category: development
tags:
  - cli
description: Network intrusion prevention and detection system
source-archive: https://github.com/snort3/libdaq/archive/refs/tags/v3.0.27.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: daqtest
  - exposure: global executable
    kind: cli
    name: daqtest-static
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add daq
  av: sudo av install brew:daq
  brew: brew install daq
  dnf: sudo dnf install daq
  macports: sudo port install daq
provenance:
  formula: daq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
