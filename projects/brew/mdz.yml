id: brew:mdz
display-name: mdz
homepage: https://github.com/LerianStudio/midaz
repo: https://github.com/LerianStudio/midaz
docs: https://github.com/LerianStudio/midaz
package-manager:
  brew: mdz
package-manager-url: https://formulae.brew.sh/formula/mdz
version: 3.4.8
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for the mdz ledger Open Source
source-archive: https://github.com/LerianStudio/midaz/archive/refs/tags/v3.4.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mdz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mdz
  brew: brew install mdz
provenance:
  formula: mdz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
