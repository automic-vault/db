id: brew:koka
display-name: koka
homepage: http://koka-lang.org
repo: https://github.com/koka-lang/koka
docs: http://koka-lang.org
package-manager:
  apk: koka
  brew: koka
  nix: koka
package-manager-url: https://formulae.brew.sh/formula/koka
version: 3.2.3
license: Apache-2.0
category: development
tags:
  - cli
description: Compiler for the Koka language
source-archive: https://github.com/koka-lang/koka.git
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
  - pcre2
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: koka
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add koka
  av: sudo av install brew:koka
  brew: brew install koka
  nix: nix profile install nixpkgs#koka
provenance:
  formula: koka
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
