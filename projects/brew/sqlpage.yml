id: brew:sqlpage
display-name: sqlpage
homepage: https://sql-page.com/
repo: https://github.com/sqlpage/SQLpage
docs: https://sql-page.com/
package-manager:
  brew: sqlpage
  nix: sqlpage
  scoop: main/sqlpage
package-manager-url: https://formulae.brew.sh/formula/sqlpage
version: 0.43.0
license: MIT
category: database
tags:
  - cli
description: Web app builder using SQL queries to create dynamic webapps quickly
source-archive: https://github.com/sqlpage/SQLpage/archive/refs/tags/v0.43.0.tar.gz
dependencies:
  - unixodbc
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sqlpage
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sqlpage
  brew: brew install sqlpage
  nix: nix profile install nixpkgs#sqlpage
  scoop: scoop install main/sqlpage
provenance:
  formula: sqlpage
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
