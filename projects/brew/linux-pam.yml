id: brew:linux-pam
display-name: linux-pam
homepage: https://github.com/linux-pam/linux-pam
repo: https://github.com/linux-pam/linux-pam
docs: https://github.com/linux-pam/linux-pam
package-manager:
  apk: linux-pam
  brew: linux-pam
  nix: linux-pam
package-manager-url: https://formulae.brew.sh/formula/linux-pam
version: 1.7.2
license: BSD-3-Clause OR GPL-1.0-only
category: development
tags:
  - cli
description: Pluggable Authentication Modules for Linux
source-archive: https://github.com/linux-pam/linux-pam/releases/download/v1.7.2/Linux-PAM-1.7.2.tar.xz
dependencies:
  - libnsl
  - libtirpc
  - libxcrypt
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: faillock
  - exposure: global executable
    kind: cli
    name: mkhomedir_helper
  - exposure: global executable
    kind: cli
    name: pam_namespace_helper
  - exposure: global executable
    kind: cli
    name: pam_timestamp_check
  - exposure: global executable
    kind: cli
    name: pwhistory_helper
  - exposure: global executable
    kind: cli
    name: unix_chkpwd
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add linux-pam
  av: sudo av install brew:linux-pam
  brew: brew install linux-pam
  nix: nix profile install nixpkgs#linux-pam
provenance:
  formula: linux-pam
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
