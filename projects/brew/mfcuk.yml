id: brew:mfcuk
display-name: mfcuk
homepage: https://github.com/nfc-tools/mfcuk
repo: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/mfcuk/mfcuk-0.3.8.tar.gz
docs: https://github.com/nfc-tools/mfcuk
package-manager:
  brew: mfcuk
  debian: mfcuk
  nix: mfcuk
  ubuntu: mfcuk
package-manager-url: https://formulae.brew.sh/formula/mfcuk
version: 0.3.8
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: MiFare Classic Universal toolKit
source-archive: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/mfcuk/mfcuk-0.3.8.tar.gz
dependencies:
  - libnfc
  - libusb
  - libusb-compat
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mfcuk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mfcuk
  brew: brew install mfcuk
  debian: sudo apt install mfcuk
  nix: nix profile install nixpkgs#mfcuk
  ubuntu: sudo apt install mfcuk
provenance:
  formula: mfcuk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
