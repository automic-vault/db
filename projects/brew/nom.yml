id: brew:nom
display-name: nom
homepage: https://github.com/guyfedwards/nom
repo: https://github.com/guyfedwards/nom
docs: https://github.com/guyfedwards/nom
package-manager:
  apk: nom
  brew: nom
  debian: nom
  nix: nom
  ubuntu: nom
package-manager-url: https://formulae.brew.sh/formula/nom
version: 3.3.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: RSS reader for the terminal
source-archive: https://github.com/guyfedwards/nom/archive/refs/tags/v3.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nom
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nom
  av: sudo av install brew:nom
  brew: brew install nom
  debian: sudo apt install nom
  nix: nix profile install nixpkgs#nom
  ubuntu: sudo apt install nom
provenance:
  formula: nom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
