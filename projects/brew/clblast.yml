id: brew:clblast
display-name: clblast
homepage: https://github.com/CNugteren/CLBlast
repo: https://github.com/CNugteren/CLBlast
docs: https://github.com/CNugteren/CLBlast
package-manager:
  brew: clblast
  dnf: clblast
  macports: clblast
  nix: clblast
  pacman: clblast
package-manager-url: https://formulae.brew.sh/formula/clblast
version: 1.7.0
license: Apache-2.0
category: development
tags:
  - cli
description: Tuned OpenCL BLAS library
source-archive: https://github.com/CNugteren/CLBlast/archive/refs/tags/1.7.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: clblast_tuner_copy_fast
  - exposure: global executable
    kind: cli
    name: clblast_tuner_copy_pad
  - exposure: global executable
    kind: cli
    name: clblast_tuner_invert
  - exposure: global executable
    kind: cli
    name: clblast_tuner_routine_xgemm
  - exposure: global executable
    kind: cli
    name: clblast_tuner_routine_xtrsv
  - exposure: global executable
    kind: cli
    name: clblast_tuner_transpose_fast
  - exposure: global executable
    kind: cli
    name: clblast_tuner_transpose_pad
  - exposure: global executable
    kind: cli
    name: clblast_tuner_xaxpy
  - exposure: global executable
    kind: cli
    name: clblast_tuner_xconvgemm
  - exposure: global executable
    kind: cli
    name: clblast_tuner_xdot
  - exposure: global executable
    kind: cli
    name: clblast_tuner_xgemm
  - exposure: global executable
    kind: cli
    name: clblast_tuner_xgemm_direct
  - exposure: global executable
    kind: cli
    name: clblast_tuner_xgemv
  - exposure: global executable
    kind: cli
    name: clblast_tuner_xger
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clblast
  brew: brew install clblast
  dnf: sudo dnf install clblast
  macports: sudo port install clblast
  nix: nix profile install nixpkgs#clblast
  pacman: sudo pacman -S clblast
provenance:
  formula: clblast
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
