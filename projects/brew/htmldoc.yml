id: brew:htmldoc
display-name: htmldoc
homepage: https://www.msweet.org/htmldoc/
repo: https://github.com/michaelrsweet/htmldoc
docs: https://www.msweet.org/htmldoc/
package-manager:
  apk: htmldoc
  brew: htmldoc
  debian: htmldoc
  macports: htmldoc
  nix: htmldoc
  pacman: htmldoc
  ubuntu: htmldoc
  zypper: htmldoc
package-manager-url: https://formulae.brew.sh/formula/htmldoc
version: 1.9.23
license: GPL-2.0-only
category: development
tags:
  - cli
description: Convert HTML to PDF or PostScript
source-archive: https://github.com/michaelrsweet/htmldoc/archive/refs/tags/v1.9.23.tar.gz
dependencies:
  - jpeg-turbo
  - libpng
build-dependencies:
  - pkgconf
uses-from-macos:
  - cups
executables:
  - exposure: global executable
    kind: cli
    name: htmldoc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add htmldoc
  av: sudo av install brew:htmldoc
  brew: brew install htmldoc
  debian: sudo apt install htmldoc
  macports: sudo port install htmldoc
  nix: nix profile install nixpkgs#htmldoc
  pacman: sudo pacman -S htmldoc
  ubuntu: sudo apt install htmldoc
  zypper: sudo zypper install htmldoc
provenance:
  formula: htmldoc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
