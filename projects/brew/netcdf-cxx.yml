id: brew:netcdf-cxx
display-name: netcdf-cxx
homepage: https://www.unidata.ucar.edu/software/netcdf/
repo: https://github.com/Unidata/netcdf-cxx4
docs: https://www.unidata.ucar.edu/software/netcdf/
package-manager:
  brew: netcdf-cxx
  dnf: netcdf-cxx
  macports: netcdf-cxx
  pacman: netcdf-cxx
package-manager-url: https://formulae.brew.sh/formula/netcdf-cxx
version: 4.3.1
license: NetCDF
category: development
tags:
  - cli
description: C++ libraries and utilities for NetCDF
source-archive: https://github.com/Unidata/netcdf-cxx4/archive/refs/tags/v4.3.1.tar.gz
dependencies:
  - hdf5
  - netcdf
  - zstd
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ncxx4-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:netcdf-cxx
  brew: brew install netcdf-cxx
  dnf: sudo dnf install netcdf-cxx
  macports: sudo port install netcdf-cxx
  pacman: sudo pacman -S netcdf-cxx
provenance:
  formula: netcdf-cxx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
