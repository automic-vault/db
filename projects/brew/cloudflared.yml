id: brew:cloudflared
display-name: cloudflared
homepage: https://developers.cloudflare.com/cloudflare-one/networks/connectors/cloudflare-tunnel/
repo: https://github.com/cloudflare/cloudflared
docs: https://developers.cloudflare.com/cloudflare-one/networks/connectors/cloudflare-tunnel/
package-manager:
  apk: cloudflared
  brew: cloudflared
  chocolatey: cloudflared
  macports: cloudflared
  nix: cloudflared
  pacman: cloudflared
  scoop: main/cloudflared
  winget: Cloudflare.cloudflared
  zypper: cloudflared
package-manager-url: https://formulae.brew.sh/formula/cloudflared
version: 2026.5.2
license: Apache-2.0
category: cloud
tags:
  - cli
description: Cloudflare Tunnel client (formerly Argo Tunnel)
source-archive: https://github.com/cloudflare/cloudflared/archive/refs/tags/2026.5.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cloudflared
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add cloudflared
  av: sudo av install brew:cloudflared
  brew: brew install cloudflared
  chocolatey: choco install cloudflared
  macports: sudo port install cloudflared
  nix: nix profile install nixpkgs#cloudflared
  pacman: sudo pacman -S cloudflared
  scoop: scoop install main/cloudflared
  winget: winget install --id Cloudflare.cloudflared -e
  zypper: sudo zypper install cloudflared
provenance:
  formula: cloudflared
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
