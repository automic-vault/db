id: brew:qrencode
display-name: qrencode
homepage: https://fukuchi.org/works/qrencode/index.html.en
repo: https://github.com/fukuchi/libqrencode
docs: https://fukuchi.org/works/qrencode/index.html.en
package-manager:
  brew: qrencode
  debian: qrencode
  dnf: qrencode
  macports: qrencode
  nix: qrencode
  pacman: qrencode
  scoop: main/qrencode
  ubuntu: qrencode
  zypper: qrencode
package-manager-url: https://formulae.brew.sh/formula/qrencode
version: 4.1.1
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: QR Code generation
source-archive: https://github.com/fukuchi/libqrencode/archive/refs/tags/v4.1.1.tar.gz
dependencies:
  - libpng
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: qrencode
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qrencode
  brew: brew install qrencode
  debian: sudo apt install qrencode
  dnf: sudo dnf install qrencode
  macports: sudo port install qrencode
  nix: nix profile install nixpkgs#qrencode
  pacman: sudo pacman -S qrencode
  scoop: scoop install main/qrencode
  ubuntu: sudo apt install qrencode
  zypper: sudo zypper install qrencode
provenance:
  formula: qrencode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
