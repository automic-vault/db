id: brew:manticoresearch
display-name: manticoresearch
homepage: https://manticoresearch.com
repo: https://github.com/manticoresoftware/manticoresearch
docs: https://manticoresearch.com
package-manager:
  brew: manticoresearch
  nix: manticoresearch
package-manager-url: https://formulae.brew.sh/formula/manticoresearch
version: 25.0.0
license: >
  GPL-3.0-or-later AND GPL-2.0-only AND (GPL-2.0-only WITH x11vnc-openssl-exception) AND
  (Unlicense OR MIT)
category: development
tags:
  - cli
description: Open source text search engine
source-archive: https://github.com/manticoresoftware/manticoresearch/archive/refs/tags/25.0.0.tar.gz
dependencies:
  - boost
  - cctz
  - icu4c@78
  - libpq
  - mariadb-connector-c
  - openssl@3
  - re2
  - unixodbc
  - xxhash
  - zstd
build-dependencies:
  - cmake
  - nlohmann-json
  - snowball
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: index_converter
  - exposure: global executable
    kind: cli
    name: indexer
  - exposure: global executable
    kind: cli
    name: indextool
  - exposure: global executable
    kind: cli
    name: searchd
  - exposure: global executable
    kind: cli
    name: spelldump
  - exposure: global executable
    kind: cli
    name: wordbreaker
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:manticoresearch
  brew: brew install manticoresearch
  nix: nix profile install nixpkgs#manticoresearch
provenance:
  formula: manticoresearch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
