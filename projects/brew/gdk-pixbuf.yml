id: brew:gdk-pixbuf
display-name: gdk-pixbuf
homepage: https://gtk.org
repo: https://download.gnome.org/sources/gdk-pixbuf/2.44/gdk-pixbuf-2.44.6.tar.xz
docs: https://gtk.org
package-manager:
  apk: gdk-pixbuf
  brew: gdk-pixbuf
  nix: gdk-pixbuf
  zypper: gdk-pixbuf-query-loaders
package-manager-url: https://formulae.brew.sh/formula/gdk-pixbuf
version: 2.44.6
license: LGPL-2.1-or-later
category: media
tags:
  - cli
description: Toolkit for image loading and pixel buffer manipulation
source-archive: https://download.gnome.org/sources/gdk-pixbuf/2.44/gdk-pixbuf-2.44.6.tar.xz
dependencies:
  - gettext
  - glib
  - jpeg-turbo
  - libpng
  - libtiff
build-dependencies:
  - docutils
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gdk-pixbuf-csource
  - exposure: global executable
    kind: cli
    name: gdk-pixbuf-pixdata
  - exposure: global executable
    kind: cli
    name: gdk-pixbuf-query-loaders
  - exposure: global executable
    kind: cli
    name: gdk-pixbuf-thumbnailer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add gdk-pixbuf
  av: sudo av install brew:gdk-pixbuf
  brew: brew install gdk-pixbuf
  nix: nix profile install nixpkgs#gdk-pixbuf
  zypper: sudo zypper install gdk-pixbuf-query-loaders
provenance:
  formula: gdk-pixbuf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
