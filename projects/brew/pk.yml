id: brew:pk
display-name: pk
homepage: https://github.com/johnmorrow/pk
repo: https://github.com/johnmorrow/pk
docs: https://github.com/johnmorrow/pk
package-manager:
  brew: pk
package-manager-url: https://formulae.brew.sh/formula/pk
version: 2.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: Field extractor command-line utility
source-archive: https://github.com/johnmorrow/pk/archive/refs/tags/v2.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: pk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pk
  brew: brew install pk
provenance:
  formula: pk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
