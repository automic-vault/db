id: brew:vsd
display-name: vsd
homepage: https://github.com/clitic/vsd
repo: https://github.com/clitic/vsd
docs: https://github.com/clitic/vsd
package-manager:
  brew: vsd
package-manager-url: https://formulae.brew.sh/formula/vsd
version: 0.4.3
license: MIT
category: development
tags:
  - cli
description: Download video streams over HTTP, DASH (.mpd), and HLS (.m3u8)
source-archive: https://github.com/clitic/vsd/archive/refs/tags/vsd-0.4.3.tar.gz
dependencies:
  - ffmpeg
build-dependencies:
  - pkgconf
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: vsd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vsd
  brew: brew install vsd
provenance:
  formula: vsd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
