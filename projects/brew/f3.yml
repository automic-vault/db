id: brew:f3
display-name: f3
homepage: https://fight-flash-fraud.readthedocs.io/en/latest/
repo: https://github.com/AltraMayor/f3
docs: https://fight-flash-fraud.readthedocs.io/en/latest/
package-manager:
  apk: f3
  brew: f3
  debian: f3
  dnf: f3
  macports: f3
  nix: f3
  ubuntu: f3
  zypper: f3
package-manager-url: https://formulae.brew.sh/formula/f3
version: 10.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Test various flash cards
source-archive: https://github.com/AltraMayor/f3/archive/refs/tags/v10.0.tar.gz
dependencies:
  - argp-standalone
executables:
  - exposure: global executable
    kind: cli
    name: f3read
  - exposure: global executable
    kind: cli
    name: f3write
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add f3
  av: sudo av install brew:f3
  brew: brew install f3
  debian: sudo apt install f3
  dnf: sudo dnf install f3
  macports: sudo port install f3
  nix: nix profile install nixpkgs#f3
  ubuntu: sudo apt install f3
  zypper: sudo zypper install f3
provenance:
  formula: f3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
