id: brew:docfx
display-name: docfx
homepage: https://dotnet.github.io/docfx/
repo: https://github.com/dotnet/docfx
docs: https://dotnet.github.io/docfx/
package-manager:
  brew: docfx
  chocolatey: docfx
  nix: docfx
  scoop: main/docfx
package-manager-url: https://formulae.brew.sh/formula/docfx
version: 2.78.5
license: MIT
category: development
tags:
  - cli
description: Tools for building and publishing API documentation for .NET projects
source-archive: https://github.com/dotnet/docfx/archive/refs/tags/v2.78.5.tar.gz
dependencies:
  - dotnet
build-dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: docfx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:docfx
  brew: brew install docfx
  chocolatey: choco install docfx
  nix: nix profile install nixpkgs#docfx
  scoop: scoop install main/docfx
provenance:
  formula: docfx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
