id: brew:vsftpd
display-name: vsftpd
homepage: https://security.appspot.com/vsftpd.html
repo: https://security.appspot.com/downloads/vsftpd-3.0.5.tar.gz
docs: https://security.appspot.com/vsftpd.html
package-manager:
  apk: vsftpd
  brew: vsftpd
  debian: vsftpd
  dnf: vsftpd
  macports: vsftpd
  nix: vsftpd
  pacman: vsftpd
  ubuntu: vsftpd
  zypper: vsftpd
package-manager-url: https://formulae.brew.sh/formula/vsftpd
version: 3.0.5
license: GPL-2.0-only
category: security
tags:
  - cli
description: Secure FTP server for UNIX
source-archive: https://security.appspot.com/downloads/vsftpd-3.0.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: vsftpd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To use chroot, vsftpd requires root privileges, so you will need to run `sudo
    vsftpd`. You should be certain that you trust any software you grant root
    privileges. The vsftpd.conf file must be owned by root or vsftpd will refuse to
    start: sudo chown root $HOMEBREW_PREFIX/etc/vsftpd.conf
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add vsftpd
  av: sudo av install brew:vsftpd
  brew: brew install vsftpd
  debian: sudo apt install vsftpd
  dnf: sudo dnf install vsftpd
  macports: sudo port install vsftpd
  nix: nix profile install nixpkgs#vsftpd
  pacman: sudo pacman -S vsftpd
  ubuntu: sudo apt install vsftpd
  zypper: sudo zypper install vsftpd
provenance:
  formula: vsftpd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
