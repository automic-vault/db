id: brew:cmu-pocketsphinx
display-name: cmu-pocketsphinx
homepage: https://cmusphinx.github.io/
repo: https://github.com/cmusphinx/pocketsphinx
docs: https://cmusphinx.github.io/
package-manager:
  brew: cmu-pocketsphinx
  debian: pocketsphinx
  dnf: pocketsphinx
  macports: pocketsphinx
  nix: pocketsphinx
  scoop: extras/pocketsphinx
  ubuntu: pocketsphinx
  zypper: pocketsphinx
package-manager-url: https://formulae.brew.sh/formula/cmu-pocketsphinx
version: 5.1.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Lightweight speech recognition engine for mobile devices
source-archive: https://github.com/cmusphinx/pocketsphinx/archive/refs/tags/v5.1.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: pocketsphinx
  - exposure: global executable
    kind: cli
    name: pocketsphinx_batch
  - exposure: global executable
    kind: cli
    name: pocketsphinx_jsgf2fsg
  - exposure: global executable
    kind: cli
    name: pocketsphinx_lm_convert
  - exposure: global executable
    kind: cli
    name: pocketsphinx_lm_eval
  - exposure: global executable
    kind: cli
    name: pocketsphinx_mdef_convert
  - exposure: global executable
    kind: cli
    name: pocketsphinx_pitch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cmu-pocketsphinx
  brew: brew install cmu-pocketsphinx
  debian: sudo apt install pocketsphinx
  dnf: sudo dnf install pocketsphinx
  macports: sudo port install pocketsphinx
  nix: nix profile install nixpkgs#pocketsphinx
  scoop: scoop install extras/pocketsphinx
  ubuntu: sudo apt install pocketsphinx
  zypper: sudo zypper install pocketsphinx
provenance:
  formula: cmu-pocketsphinx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
