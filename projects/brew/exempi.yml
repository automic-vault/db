id: brew:exempi
display-name: exempi
homepage: https://libopenraw.freedesktop.org/exempi/
repo: https://libopenraw.freedesktop.org/download/exempi-2.6.6.tar.bz2
docs: https://libopenraw.freedesktop.org/exempi/
package-manager:
  apk: exempi
  brew: exempi
  debian: exempi
  dnf: exempi
  macports: exempi
  nix: exempi
  pacman: exempi
  ubuntu: exempi
package-manager-url: https://formulae.brew.sh/formula/exempi
version: 2.6.6
license: BSD-3-Clause
category: network
tags:
  - cli
description: Library to parse XMP metadata
source-archive: https://libopenraw.freedesktop.org/download/exempi-2.6.6.tar.bz2
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: exempi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add exempi
  av: sudo av install brew:exempi
  brew: brew install exempi
  debian: sudo apt install exempi
  dnf: sudo dnf install exempi
  macports: sudo port install exempi
  nix: nix profile install nixpkgs#exempi
  pacman: sudo pacman -S exempi
  ubuntu: sudo apt install exempi
provenance:
  formula: exempi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
