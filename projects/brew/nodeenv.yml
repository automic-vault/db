id: brew:nodeenv
display-name: nodeenv
homepage: https://ekalinin.github.io/nodeenv/
repo: https://github.com/ekalinin/nodeenv
docs: https://ekalinin.github.io/nodeenv/
package-manager:
  brew: nodeenv
  debian: nodeenv
  nix: nodeenv
  ubuntu: nodeenv
package-manager-url: https://formulae.brew.sh/formula/nodeenv
version: 1.10.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Node.js virtual environment builder
source-archive: https://github.com/ekalinin/nodeenv/archive/refs/tags/1.10.0.tar.gz
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: nodeenv
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nodeenv
  brew: brew install nodeenv
  debian: sudo apt install nodeenv
  nix: nix profile install nixpkgs#nodeenv
  ubuntu: sudo apt install nodeenv
provenance:
  formula: nodeenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
