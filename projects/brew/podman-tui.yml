id: brew:podman-tui
display-name: podman-tui
homepage: https://github.com/containers/podman-tui
repo: https://github.com/containers/podman-tui
docs: https://github.com/containers/podman-tui
package-manager:
  apk: podman-tui
  brew: podman-tui
  dnf: podman-tui
  nix: podman-tui
  scoop: main/podman-tui
package-manager-url: https://formulae.brew.sh/formula/podman-tui
version: 1.11.1
license: Apache-2.0
category: development
tags:
  - cli
description: Podman Terminal User Interface
source-archive: https://github.com/containers/podman-tui/archive/refs/tags/v1.11.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: podman-tui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add podman-tui
  av: sudo av install brew:podman-tui
  brew: brew install podman-tui
  dnf: sudo dnf install podman-tui
  nix: nix profile install nixpkgs#podman-tui
  scoop: scoop install main/podman-tui
provenance:
  formula: podman-tui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
