id: brew:volcano-cli
display-name: volcano-cli
homepage: https://volcano.sh
repo: https://github.com/volcano-sh/volcano
docs: https://volcano.sh
package-manager:
  brew: volcano-cli
package-manager-url: https://formulae.brew.sh/formula/volcano-cli
version: 1.14.2
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: CLI for Volcano, Cloud Native Batch System
source-archive: https://github.com/volcano-sh/volcano/archive/refs/tags/v1.14.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vcctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:volcano-cli
  brew: brew install volcano-cli
provenance:
  formula: volcano-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
