id: brew:cargo-auditable
display-name: cargo-auditable
homepage: https://github.com/rust-secure-code/cargo-auditable
repo: https://github.com/rust-secure-code/cargo-auditable
docs: https://github.com/rust-secure-code/cargo-auditable
package-manager:
  apk: cargo-auditable
  brew: cargo-auditable
  debian: cargo-auditable
  nix: cargo-auditable
  pacman: cargo-auditable
  ubuntu: cargo-auditable
  zypper: cargo-auditable
package-manager-url: https://formulae.brew.sh/formula/cargo-auditable
version: 0.7.5
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Make production Rust binaries auditable
source-archive: https://github.com/rust-secure-code/cargo-auditable/archive/refs/tags/v0.7.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-auditable
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-auditable
  av: sudo av install brew:cargo-auditable
  brew: brew install cargo-auditable
  debian: sudo apt install cargo-auditable
  nix: nix profile install nixpkgs#cargo-auditable
  pacman: sudo pacman -S cargo-auditable
  ubuntu: sudo apt install cargo-auditable
  zypper: sudo zypper install cargo-auditable
provenance:
  formula: cargo-auditable
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
