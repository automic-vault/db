id: brew:aqbanking
display-name: aqbanking
homepage: https://www.aquamaniac.de/rdm/projects/aqbanking
repo: https://www.aquamaniac.de/rdm/attachments/download/654/aqbanking-6.9.2.tar.gz
docs: https://www.aquamaniac.de/rdm/projects/aqbanking
package-manager:
  apk: aqbanking
  brew: aqbanking
  dnf: aqbanking
  nix: aqbanking
  pacman: aqbanking
  zypper: aqbanking
package-manager-url: https://formulae.brew.sh/formula/aqbanking
version: 6.9.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Generic online banking interface
source-archive: https://www.aquamaniac.de/rdm/attachments/download/654/aqbanking-6.9.2.tar.gz
dependencies:
  - gettext
  - gmp
  - gwenhywfar
  - ktoblzcheck
  - libxml2
  - libxmlsec1
  - libxslt
  - openssl@3
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: aqbanking-cli
  - exposure: global executable
    kind: cli
    name: aqbanking-config
  - exposure: global executable
    kind: cli
    name: aqebics-tool
  - exposure: global executable
    kind: cli
    name: aqhbci-tool4
  - exposure: global executable
    kind: cli
    name: aqofxconnect-tool
  - exposure: global executable
    kind: cli
    name: aqpaypal-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add aqbanking
  av: sudo av install brew:aqbanking
  brew: brew install aqbanking
  dnf: sudo dnf install aqbanking
  nix: nix profile install nixpkgs#aqbanking
  pacman: sudo pacman -S aqbanking
  zypper: sudo zypper install aqbanking
provenance:
  formula: aqbanking
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
