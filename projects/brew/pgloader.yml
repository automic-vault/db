id: brew:pgloader
display-name: pgloader
homepage: https://github.com/dimitri/pgloader
repo: https://github.com/dimitri/pgloader
docs: https://github.com/dimitri/pgloader
package-manager:
  apk: pgloader
  brew: pgloader
  debian: pgloader
  nix: pgloader
  ubuntu: pgloader
  zypper: pgloader
package-manager-url: https://formulae.brew.sh/formula/pgloader
version: 3.6.10
license: PostgreSQL
category: database
tags:
  - cli
description: Data loading tool for PostgreSQL
source-archive: https://github.com/dimitri/pgloader.git
dependencies:
  - freetds
  - openssl@3
  - zstd
build-dependencies:
  - buildapp
  - sbcl
executables:
  - exposure: global executable
    kind: cli
    name: pgloader
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add pgloader
  av: sudo av install brew:pgloader
  brew: brew install pgloader
  debian: sudo apt install pgloader
  nix: nix profile install nixpkgs#pgloader
  ubuntu: sudo apt install pgloader
  zypper: sudo zypper install pgloader
provenance:
  formula: pgloader
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
