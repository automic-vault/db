id: brew:nali
display-name: nali
homepage: https://github.com/zu1k/nali
repo: https://github.com/zu1k/nali
docs: https://github.com/zu1k/nali
package-manager:
  brew: nali
  macports: nali
  nix: nali
  scoop: main/nali
package-manager-url: https://formulae.brew.sh/formula/nali
version: 0.8.1
license: MIT
category: development
tags:
  - cli
description: Tool for querying IP geographic information and CDN provider
source-archive: https://github.com/zu1k/nali/archive/refs/tags/v0.8.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nali
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nali
  brew: brew install nali
  macports: sudo port install nali
  nix: nix profile install nixpkgs#nali
  scoop: scoop install main/nali
provenance:
  formula: nali
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
