id: brew:walk
display-name: walk
homepage: https://github.com/antonmedv/walk
repo: https://github.com/antonmedv/walk
docs: https://github.com/antonmedv/walk
package-manager:
  apk: walk
  brew: walk
  nix: walk
  scoop: main/walk
  winget: antonmedv.walk
package-manager-url: https://formulae.brew.sh/formula/walk
version: 1.13.0
license: MIT
category: development
tags:
  - cli
description: Terminal navigator
source-archive: https://github.com/antonmedv/walk/archive/refs/tags/v1.13.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: walk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add walk
  av: sudo av install brew:walk
  brew: brew install walk
  nix: nix profile install nixpkgs#walk
  scoop: scoop install main/walk
  winget: winget install --id antonmedv.walk -e
provenance:
  formula: walk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
