id: brew:corkscrew
display-name: corkscrew
homepage: https://packages.debian.org/sid/corkscrew
repo: https://deb.debian.org/debian/pool/main/c/corkscrew/corkscrew_2.0.orig.tar.gz
docs: https://packages.debian.org/sid/corkscrew
package-manager:
  apk: corkscrew
  brew: corkscrew
  debian: corkscrew
  dnf: corkscrew
  macports: corkscrew
  nix: corkscrew
  pacman: corkscrew
