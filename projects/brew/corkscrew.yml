    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add corkscrew
  av: sudo av install brew:corkscrew
  brew: brew install corkscrew
  debian: sudo apt install corkscrew
  dnf: sudo dnf install corkscrew
  macports: sudo port install corkscrew
  nix: nix profile install nixpkgs#corkscrew
  pacman: sudo pacman -S corkscrew
  ubuntu: sudo apt install corkscrew
  winget: winget install --id androidWG.Corkscrew -e
provenance:
  formula: corkscrew
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
