id: brew:xplanet
display-name: xplanet
homepage: https://xplanet.sourceforge.net/
repo: https://downloads.sourceforge.net/project/xplanet/xplanet/1.3.1/xplanet-1.3.1.tar.gz
docs: https://xplanet.sourceforge.net/
package-manager:
  brew: xplanet
  debian: xplanet
  dnf: xplanet
  macports: xplanet
  nix: xplanet
  pacman: xplanet
  ubuntu: xplanet
  zypper: xplanet
package-manager-url: https://formulae.brew.sh/formula/xplanet
version: 1.3.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Create HQ wallpapers of planet Earth
source-archive: https://downloads.sourceforge.net/project/xplanet/xplanet/1.3.1/xplanet-1.3.1.tar.gz
dependencies:
  - freetype
  - giflib
  - jpeg-turbo
  - libpng
  - libtiff
build-dependencies:
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xplanet
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xplanet
  brew: brew install xplanet
  debian: sudo apt install xplanet
  dnf: sudo dnf install xplanet
  macports: sudo port install xplanet
  nix: nix profile install nixpkgs#xplanet
  pacman: sudo pacman -S xplanet
  ubuntu: sudo apt install xplanet
  zypper: sudo zypper install xplanet
provenance:
  formula: xplanet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
