id: brew:openmsx
display-name: openmsx
homepage: https://openmsx.org/
repo: https://github.com/openMSX/openMSX
docs: https://openmsx.org/
package-manager:
  brew: openmsx
  debian: openmsx
  dnf: openmsx
  nix: openmsx
  ubuntu: openmsx
  winget: openMSX.openMSX
package-manager-url: https://formulae.brew.sh/formula/openmsx
version: 21.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: MSX emulator
source-archive: https://github.com/openMSX/openMSX/releases/download/RELEASE_21_0/openmsx-21.0.tar.gz
dependencies:
  - freetype
  - glew
  - libogg
  - libpng
  - libvorbis
  - sdl2
  - sdl2_ttf
  - tcl-tk
  - theora
executables:
  - exposure: global executable
    kind: cli
    name: openmsx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:openmsx
  brew: brew install openmsx
  debian: sudo apt install openmsx
  dnf: sudo dnf install openmsx
  nix: nix profile install nixpkgs#openmsx
  ubuntu: sudo apt install openmsx
  winget: winget install --id openMSX.openMSX -e
provenance:
  formula: openmsx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
