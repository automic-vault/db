id: brew:ghcup
display-name: ghcup
homepage: https://www.haskell.org/ghcup/
repo: https://github.com/haskell/ghcup-hs
docs: https://www.haskell.org/ghcup/
package-manager:
  brew: ghcup
  scoop: main/ghcup
package-manager-url: https://formulae.brew.sh/formula/ghcup
version: 0.2.5.0
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Installer for the general purpose language Haskell
source-archive: https://github.com/haskell/ghcup-hs/archive/refs/tags/v0.2.5.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - bzip2
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ghcup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ghcup
  brew: brew install ghcup
  scoop: scoop install main/ghcup
provenance:
  formula: ghcup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
