id: brew:rio-terminal
display-name: rio-terminal
homepage: https://rioterm.com/
repo: https://github.com/raphamorim/rio
docs: https://rioterm.com/
package-manager:
  apk: rio
  brew: rio-terminal
  debian: rio
  macports: rio
  nix: rio
  pacman: rio
  scoop: extras/rio
  ubuntu: rio
  winget: raphamorim.rio
package-manager-url: https://formulae.brew.sh/formula/rio-terminal
version: 0.4.5
license: MIT
category: development
tags:
  - cli
description: Hardware-accelerated GPU terminal emulator powered by WebGPU
source-archive: https://github.com/raphamorim/rio/archive/refs/tags/v0.4.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rio
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rio
  av: sudo av install brew:rio-terminal
  brew: brew install rio-terminal
  debian: sudo apt install rio
  macports: sudo port install rio
  nix: nix profile install nixpkgs#rio
  pacman: sudo pacman -S rio
  scoop: scoop install extras/rio
  ubuntu: sudo apt install rio
  winget: winget install --id raphamorim.rio -e
provenance:
  formula: rio-terminal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
