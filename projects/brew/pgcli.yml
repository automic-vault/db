id: brew:pgcli
display-name: pgcli
homepage: https://pgcli.com/
repo: >
  https://files.pythonhosted.org/packages/98/9d/193acc7d3236e5941c02044787bd33afb668d33f72375d1ba3b4f5e92128/pgcli-4.4.0.tar.gz
docs: https://pgcli.com/
package-manager:
  apk: pgcli
  brew: pgcli
  debian: pgcli
  dnf: pgcli
  macports: pgcli
  nix: pgcli
  pacman: pgcli
  ubuntu: pgcli
package-manager-url: https://formulae.brew.sh/formula/pgcli
version: 4.4.0
license: BSD-3-Clause
category: database
tags:
  - cli
description: CLI for Postgres with auto-completion and syntax highlighting
source-archive: >
  https://files.pythonhosted.org/packages/98/9d/193acc7d3236e5941c02044787bd33afb668d33f72375d1ba3b4f5e92128/pgcli-4.4.0.tar.gz
dependencies:
  - libpq
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: pgcli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pgcli
  av: sudo av install brew:pgcli
  brew: brew install pgcli
  debian: sudo apt install pgcli
  dnf: sudo dnf install pgcli
  macports: sudo port install pgcli
  nix: nix profile install nixpkgs#pgcli
  pacman: sudo pacman -S pgcli
  ubuntu: sudo apt install pgcli
provenance:
  formula: pgcli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
