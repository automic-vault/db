id: brew:logstalgia
display-name: logstalgia
homepage: https://logstalgia.io/
repo: https://github.com/acaudwell/Logstalgia
docs: https://logstalgia.io/
package-manager:
  apk: logstalgia
  brew: logstalgia
  debian: logstalgia
  dnf: logstalgia
  macports: logstalgia
  nix: logstalgia
  scoop: extras/logstalgia
  ubuntu: logstalgia
  zypper: logstalgia
package-manager-url: https://formulae.brew.sh/formula/logstalgia
version: 1.1.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Web server access log visualizer with retro style
source-archive: >
  https://github.com/acaudwell/Logstalgia/releases/download/logstalgia-1.1.5/logstalgia-1.1.5.tar.gz
dependencies:
  - boost
  - freetype
  - glew
  - libpng
  - pcre2
  - sdl2
  - sdl2_image
build-dependencies:
  - autoconf
  - automake
  - glm
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: logstalgia
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add logstalgia
  av: sudo av install brew:logstalgia
  brew: brew install logstalgia
  debian: sudo apt install logstalgia
  dnf: sudo dnf install logstalgia
  macports: sudo port install logstalgia
  nix: nix profile install nixpkgs#logstalgia
  scoop: scoop install extras/logstalgia
  ubuntu: sudo apt install logstalgia
  zypper: sudo zypper install logstalgia
provenance:
  formula: logstalgia
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
