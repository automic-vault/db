id: brew:frotz
display-name: frotz
homepage: https://661.org/proj/if/frotz/
repo: https://gitlab.com/DavidGriffith/frotz/-/archive/2.55/frotz-2.55.tar.bz2
docs: https://661.org/proj/if/frotz/
package-manager:
  apk: frotz
  brew: frotz
  debian: frotz
  dnf: frotz
  macports: frotz
  nix: frotz
  ubuntu: frotz
package-manager-url: https://formulae.brew.sh/formula/frotz
version: 2.55
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Infocom-style interactive fiction player
source-archive: https://gitlab.com/DavidGriffith/frotz/-/archive/2.55/frotz-2.55.tar.bz2
dependencies:
  - freetype
  - jpeg-turbo
  - libao
  - libmodplug
  - libpng
  - libsamplerate
  - libsndfile
  - libvorbis
  - ncurses
  - sdl2
  - sdl2_mixer
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dfrotz
  - exposure: global executable
    kind: cli
    name: frotz
  - exposure: global executable
    kind: cli
    name: sfrotz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add frotz
  av: sudo av install brew:frotz
  brew: brew install frotz
  debian: sudo apt install frotz
  dnf: sudo dnf install frotz
  macports: sudo port install frotz
  nix: nix profile install nixpkgs#frotz
  ubuntu: sudo apt install frotz
provenance:
  formula: frotz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
