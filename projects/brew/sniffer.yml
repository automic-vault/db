id: brew:sniffer
display-name: sniffer
homepage: https://github.com/chenjiandongx/sniffer
repo: https://github.com/chenjiandongx/sniffer
docs: https://github.com/chenjiandongx/sniffer
package-manager:
  brew: sniffer
package-manager-url: https://formulae.brew.sh/formula/sniffer
version: 0.6.3
license: MIT
category: development
tags:
  - cli
description: Modern alternative network traffic sniffer
source-archive: https://github.com/chenjiandongx/sniffer/archive/refs/tags/v0.6.3.tar.gz
build-dependencies:
  - go
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: sniffer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sniffer
  brew: brew install sniffer
provenance:
  formula: sniffer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
