id: brew:uncover
display-name: uncover
homepage: https://github.com/projectdiscovery/uncover
repo: https://github.com/projectdiscovery/uncover
docs: https://github.com/projectdiscovery/uncover
package-manager:
  brew: uncover
  nix: uncover
package-manager-url: https://formulae.brew.sh/formula/uncover
version: 1.2.1
license: MIT
category: development
tags:
  - cli
description: Tool to discover exposed hosts on the internet using multiple search engines
source-archive: https://github.com/projectdiscovery/uncover/archive/refs/tags/v1.2.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: uncover
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:uncover
  brew: brew install uncover
  nix: nix profile install nixpkgs#uncover
provenance:
  formula: uncover
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
