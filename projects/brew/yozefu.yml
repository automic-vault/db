id: brew:yozefu
display-name: yozefu
homepage: https://github.com/MAIF/yozefu
repo: https://github.com/MAIF/yozefu
docs: https://github.com/MAIF/yozefu
package-manager:
  brew: yozefu
package-manager-url: https://formulae.brew.sh/formula/yozefu
version: 0.0.29
license: Apache-2.0
category: development
tags:
  - cli
description: TUI for exploring data in a Kafka cluster
source-archive: https://github.com/MAIF/yozefu/archive/refs/tags/v0.0.29.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - cmake
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: yozf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yozefu
  brew: brew install yozefu
provenance:
  formula: yozefu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
