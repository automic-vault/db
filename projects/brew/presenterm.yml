id: brew:presenterm
display-name: presenterm
homepage: https://github.com/mfontanini/presenterm
repo: https://github.com/mfontanini/presenterm
docs: https://github.com/mfontanini/presenterm
package-manager:
  brew: presenterm
  macports: presenterm
  nix: presenterm
  pacman: presenterm
  scoop: main/presenterm
  winget: mfontanini.presenterm
  zypper: presenterm
package-manager-url: https://formulae.brew.sh/formula/presenterm
version: 0.16.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: Terminal slideshow tool
source-archive: https://github.com/mfontanini/presenterm/archive/refs/tags/v0.16.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: presenterm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:presenterm
  brew: brew install presenterm
  macports: sudo port install presenterm
  nix: nix profile install nixpkgs#presenterm
  pacman: sudo pacman -S presenterm
  scoop: scoop install main/presenterm
  winget: winget install --id mfontanini.presenterm -e
  zypper: sudo zypper install presenterm
provenance:
  formula: presenterm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
