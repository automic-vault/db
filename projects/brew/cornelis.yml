id: brew:cornelis
display-name: cornelis
homepage: https://github.com/agda/cornelis
repo: https://github.com/agda/cornelis
docs: https://github.com/agda/cornelis
package-manager:
  brew: cornelis
  nix: cornelis
package-manager-url: https://formulae.brew.sh/formula/cornelis
version: 2.8.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Neovim support for Agda
source-archive: https://github.com/agda/cornelis/archive/refs/tags/v2.8.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
  - hpack
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: cornelis
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cornelis
  brew: brew install cornelis
  nix: nix profile install nixpkgs#cornelis
provenance:
  formula: cornelis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
