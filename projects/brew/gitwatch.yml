id: brew:gitwatch
display-name: gitwatch
homepage: https://github.com/gitwatch/gitwatch
repo: https://github.com/gitwatch/gitwatch
docs: https://github.com/gitwatch/gitwatch
package-manager:
  brew: gitwatch
  nix: gitwatch
package-manager-url: https://formulae.brew.sh/formula/gitwatch
version: 0.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
  - git
description: Watch a file or folder and automatically commit changes to a git repo easily
source-archive: https://github.com/gitwatch/gitwatch/archive/refs/tags/v0.5.tar.gz
dependencies:
  - coreutils
  - fswatch
executables:
  - exposure: global executable
    kind: cli
    name: gitwatch
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gitwatch
  brew: brew install gitwatch
  nix: nix profile install nixpkgs#gitwatch
provenance:
  formula: gitwatch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
