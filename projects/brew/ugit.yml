id: brew:ugit
display-name: ugit
homepage: https://bhupesh.me/undo-your-last-git-mistake-with-ugit/
repo: https://github.com/Bhupesh-V/ugit
docs: https://bhupesh.me/undo-your-last-git-mistake-with-ugit/
package-manager:
  brew: ugit
  macports: ugit
  nix: ugit
package-manager-url: https://formulae.brew.sh/formula/ugit
version: 5.9
license: MIT
category: development
tags:
  - cli
  - git
description: Undo git commands. Your damage control git buddy
source-archive: https://github.com/Bhupesh-V/ugit/archive/refs/tags/v5.9.tar.gz
dependencies:
  - bash
  - fzf
executables:
  - exposure: global executable
    kind: cli
    name: ugit
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ugit
  brew: brew install ugit
  macports: sudo port install ugit
  nix: nix profile install nixpkgs#ugit
provenance:
  formula: ugit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
