id: brew:mklittlefs
display-name: mklittlefs
homepage: https://github.com/earlephilhower/mklittlefs
repo: https://github.com/earlephilhower/mklittlefs
docs: https://github.com/earlephilhower/mklittlefs
package-manager:
  brew: mklittlefs
  nix: mklittlefs
package-manager-url: https://formulae.brew.sh/formula/mklittlefs
version: 4.1.0
license: MIT
category: development
tags:
  - cli
description: Creates LittleFS images for ESP8266, ESP32, Pico RP2040, and RP2350
source-archive: >
  https://github.com/earlephilhower/mklittlefs/releases/download/4.1.0/mklittlefs-source.zip
executables:
  - exposure: global executable
    kind: cli
    name: mklittlefs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mklittlefs
  brew: brew install mklittlefs
  nix: nix profile install nixpkgs#mklittlefs
provenance:
  formula: mklittlefs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
