id: brew:subnetcalc
display-name: subnetcalc
homepage: https://www.nntb.no/~dreibh/subnetcalc/index.html
repo: https://github.com/dreibh/subnetcalc
docs: https://www.nntb.no/~dreibh/subnetcalc/index.html
package-manager:
  brew: subnetcalc
  debian: subnetcalc
  dnf: subnetcalc
  nix: subnetcalc
  ubuntu: subnetcalc
  zypper: subnetcalc
package-manager-url: https://formulae.brew.sh/formula/subnetcalc
version: 2.6.6
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: IPv4/IPv6 subnet calculator
source-archive: https://github.com/dreibh/subnetcalc/archive/refs/tags/subnetcalc-2.6.6.tar.gz
dependencies:
  - gettext
build-dependencies:
  - cmake
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: subnetcalc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:subnetcalc
  brew: brew install subnetcalc
  debian: sudo apt install subnetcalc
  dnf: sudo dnf install subnetcalc
  nix: nix profile install nixpkgs#subnetcalc
  ubuntu: sudo apt install subnetcalc
  zypper: sudo zypper install subnetcalc
provenance:
  formula: subnetcalc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
