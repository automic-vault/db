id: brew:libilbc
display-name: libilbc
homepage: https://github.com/TimothyGu/libilbc
repo: https://github.com/TimothyGu/libilbc
docs: https://github.com/TimothyGu/libilbc
package-manager:
  brew: libilbc
  nix: libilbc
  pacman: libilbc
package-manager-url: https://formulae.brew.sh/formula/libilbc
version: 3.0.4
license: BSD-3-Clause
category: development
tags:
  - cli
description: Packaged version of iLBC codec from the WebRTC project
source-archive: https://github.com/TimothyGu/libilbc/releases/download/v3.0.4/libilbc-3.0.4.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ilbc_test
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libilbc
  brew: brew install libilbc
  nix: nix profile install nixpkgs#libilbc
  pacman: sudo pacman -S libilbc
provenance:
  formula: libilbc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
