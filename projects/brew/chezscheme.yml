id: brew:chezscheme
display-name: chezscheme
homepage: https://cisco.github.io/ChezScheme/
repo: https://github.com/cisco/ChezScheme
docs: https://cisco.github.io/ChezScheme/
package-manager:
  brew: chezscheme
  debian: chezscheme
  nix: chez
  scoop: main/chezscheme
  ubuntu: chezscheme
  winget: Cisco.ChezScheme
  zypper: chezscheme
package-manager-url: https://formulae.brew.sh/formula/chezscheme
version: 10.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: Implementation of the Chez Scheme language
source-archive: https://github.com/cisco/ChezScheme/releases/download/v10.4.1/csv10.4.1.tar.gz
build-dependencies:
  - libx11
  - xterm
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: chez
  - exposure: global executable
    kind: cli
    name: petite
  - exposure: global executable
    kind: cli
    name: scheme-script
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chezscheme
  brew: brew install chezscheme
  debian: sudo apt install chezscheme
  nix: nix profile install nixpkgs#chez
  scoop: scoop install main/chezscheme
  ubuntu: sudo apt install chezscheme
  winget: winget install --id Cisco.ChezScheme -e
  zypper: sudo zypper install chezscheme
provenance:
  formula: chezscheme
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
