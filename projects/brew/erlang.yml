id: brew:erlang
display-name: erlang
homepage: https://www.erlang.org/
repo: https://github.com/erlang/otp
docs: https://www.erlang.org/
package-manager:
  brew: erlang
  chocolatey: erlang
  debian: erlang
  dnf: erlang
  macports: erlang
  nix: typer
  pacman: erlang
  scoop: main/erlang
  ubuntu: erlang
  winget: Erlang.ErlangOTP
  zypper: erlang
package-manager-url: https://formulae.brew.sh/formula/erlang
version: 29.0
license: Apache-2.0
category: development
tags:
  - cli
description: Programming language for highly scalable real-time systems
source-archive: https://github.com/erlang/otp/releases/download/OTP-29.0/otp_src_29.0.tar.gz
dependencies:
  - openssl@3
  - unixodbc
  - wxwidgets@3.2
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ct_run
  - exposure: global executable
    kind: cli
    name: dialyzer
  - exposure: global executable
    kind: cli
    name: epmd
  - exposure: global executable
    kind: cli
    name: erl
  - exposure: global executable
    kind: cli
    name: erlc
  - exposure: global executable
    kind: cli
    name: escript
  - exposure: global executable
    kind: cli
    name: run_erl
  - exposure: global executable
    kind: cli
    name: to_erl
  - exposure: global executable
    kind: cli
    name: typer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Man pages can be found in: $HOMEBREW_PREFIX/opt/erlang/lib/erlang/man Access them
    with `erl -man`, or add this directory to MANPATH.
  post-install-defined: false
install-lines:
  av: sudo av install brew:erlang
  brew: brew install erlang
  chocolatey: choco install erlang
  debian: sudo apt install erlang
  dnf: sudo dnf install erlang
  macports: sudo port install erlang
  nix: nix profile install nixpkgs#typer
  pacman: sudo pacman -S erlang
  scoop: scoop install main/erlang
  ubuntu: sudo apt install erlang
  winget: winget install --id Erlang.ErlangOTP -e
  zypper: sudo zypper install erlang
provenance:
  formula: erlang
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
