id: brew:ipsw
display-name: ipsw
homepage: https://blacktop.github.io/ipsw
repo: https://github.com/blacktop/ipsw
docs: https://blacktop.github.io/ipsw
package-manager:
  brew: ipsw
  macports: ipsw
  nix: ipsw
  winget: blacktop.ipsw
package-manager-url: https://formulae.brew.sh/formula/ipsw
version: 3.1.685
license: MIT
category: development
tags:
  - cli
description: Research tool for iOS & macOS devices
source-archive: https://github.com/blacktop/ipsw/archive/refs/tags/v3.1.685.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ipsw
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ipsw
  brew: brew install ipsw
  macports: sudo port install ipsw
  nix: nix profile install nixpkgs#ipsw
  winget: winget install --id blacktop.ipsw -e
provenance:
  formula: ipsw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
