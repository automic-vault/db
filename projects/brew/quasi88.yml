id: brew:quasi88
display-name: quasi88
homepage: https://www.eonet.ne.jp/~showtime/quasi88/
repo: https://www.eonet.ne.jp/~showtime/quasi88/release/quasi88-0.7.4.zip
docs: https://www.eonet.ne.jp/~showtime/quasi88/
package-manager:
  brew: quasi88
package-manager-url: https://formulae.brew.sh/formula/quasi88
version: 0.7.4
license: BSD-3-Clause
category: network
tags:
  - cli
description: PC-8801 emulator
source-archive: https://www.eonet.ne.jp/~showtime/quasi88/release/quasi88-0.7.4.zip
dependencies:
  - sdl2
executables:
  - exposure: global executable
    kind: cli
    name: quasi88
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You will need to place ROM and disk files. Default arguments for the directories
    are: -romdir ~/quasi88/rom/ -diskdir ~/quasi88/disk/ -tapedir ~/quasi88/tape/
  post-install-defined: false
install-lines:
  av: sudo av install brew:quasi88
  brew: brew install quasi88
provenance:
  formula: quasi88
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
