  zypper: bzip2
package-manager-url: https://formulae.brew.sh/formula/bzip2
version: 1.0.8
license: bzip2-1.0.6
category: network
tags:
  - cli
description: Freely available high-quality data compressor
source-archive: https://sourceware.org/pub/bzip2/bzip2-1.0.8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bunzip2
  - exposure: global executable
    kind: cli
    name: bzcat
  - exposure: global executable
    kind: cli
    name: bzcmp
  - exposure: global executable
    kind: cli
    name: bzdiff
  - exposure: global executable
    kind: cli
    name: bzegrep
  - exposure: global executable
    kind: cli
    name: bzfgrep
  - exposure: global executable
    kind: cli
    name: bzgrep
  - exposure: global executable
    kind: cli
    name: bzip2
  - exposure: global executable
    kind: cli
    name: bzip2recover
  - exposure: global executable
    kind: cli
    name: bzless
  - exposure: global executable
    kind: cli
    name: bzmore
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bzip2
  av: sudo av install brew:bzip2
  brew: brew install bzip2
  chocolatey: choco install bzip2
  debian: sudo apt install bzip2
  dnf: sudo dnf install bzip2
  macports: sudo port install bzip2
  nix: nix profile install nixpkgs#bzip2
  pacman: sudo pacman -S bzip2
  scoop: scoop install main/bzip2
  ubuntu: sudo apt install bzip2
  zypper: sudo zypper install bzip2
provenance:
  formula: bzip2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
