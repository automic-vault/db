id: brew:ppsspp
display-name: ppsspp
homepage: https://ppsspp.org/
repo: https://github.com/hrydgard/ppsspp
docs: https://ppsspp.org/
package-manager:
  apk: ppsspp
  brew: ppsspp
  chocolatey: PPSSPP
  nix: ppsspp
  pacman: ppsspp
  winget: PPSSPPTeam.PPSSPP
  zypper: ppsspp
package-manager-url: https://formulae.brew.sh/formula/ppsspp
version: 1.20.4
license: GPL-2.0-or-later AND BSD-3-Clause
category: development
tags:
  - cli
description: PlayStation Portable emulator
source-archive: https://github.com/hrydgard/ppsspp/releases/download/v1.20.4/ppsspp-1.20.4.tar.xz
dependencies:
  - libzip
  - miniupnpc
  - molten-vk
  - sdl2
  - snappy
  - zstd
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: PPSSPPSDL
  - exposure: global executable
    kind: cli
    name: ppsspp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ppsspp
  av: sudo av install brew:ppsspp
  brew: brew install ppsspp
  chocolatey: choco install PPSSPP
  nix: nix profile install nixpkgs#ppsspp
  pacman: sudo pacman -S ppsspp
  winget: winget install --id PPSSPPTeam.PPSSPP -e
  zypper: sudo zypper install ppsspp
provenance:
  formula: ppsspp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
