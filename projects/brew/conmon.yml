id: brew:conmon
display-name: conmon
homepage: https://github.com/containers/conmon
repo: https://github.com/containers/conmon
docs: https://github.com/containers/conmon
package-manager:
  apk: conmon
  brew: conmon
  debian: conmon
  dnf: conmon
  nix: conmon
  pacman: conmon
  ubuntu: conmon
  zypper: conmon
package-manager-url: https://formulae.brew.sh/formula/conmon
version: 2.2.1
license: Apache-2.0
category: development
tags:
  - cli
description: OCI container runtime monitor
source-archive: https://github.com/containers/conmon/archive/refs/tags/v2.2.1.tar.gz
dependencies:
  - glib
  - libseccomp
  - systemd
build-dependencies:
  - go
  - go-md2man
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: conmon
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add conmon
  av: sudo av install brew:conmon
  brew: brew install conmon
  debian: sudo apt install conmon
  dnf: sudo dnf install conmon
  nix: nix profile install nixpkgs#conmon
  pacman: sudo pacman -S conmon
  ubuntu: sudo apt install conmon
  zypper: sudo zypper install conmon
provenance:
  formula: conmon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
