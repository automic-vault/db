id: brew:yarn
display-name: yarn
homepage: https://yarnpkg.com/
repo: https://yarnpkg.com/downloads/1.22.22/yarn-v1.22.22.tar.gz
docs: https://yarnpkg.com/
package-manager:
  apk: yarn
  brew: yarn
  chocolatey: yarn
  debian: yarnpkg
  dnf: yarnpkg
  macports: yarn
  nix: yarn
  pacman: yarn
  scoop: main/yarn
  ubuntu: yarnpkg
  winget: Yarn.Yarn
  zypper: yarn
package-manager-url: https://formulae.brew.sh/formula/yarn
version: 1.22.22
license: BSD-2-Clause
category: network
tags:
  - cli
description: JavaScript package manager
source-archive: https://yarnpkg.com/downloads/1.22.22/yarn-v1.22.22.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: yarn
  - exposure: global executable
    kind: cli
    name: yarnpkg
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    yarn requires a Node installation to function. You can install one with: brew
    install node
  post-install-defined: false
install-lines:
  apk: sudo apk add yarn
  av: sudo av install brew:yarn
  brew: brew install yarn
  chocolatey: choco install yarn
  debian: sudo apt install yarnpkg
  dnf: sudo dnf install yarnpkg
  macports: sudo port install yarn
  nix: nix profile install nixpkgs#yarn
  pacman: sudo pacman -S yarn
  scoop: scoop install main/yarn
  ubuntu: sudo apt install yarnpkg
  winget: winget install --id Yarn.Yarn -e
  zypper: sudo zypper install yarn
provenance:
  formula: yarn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
