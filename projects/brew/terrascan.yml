id: brew:terrascan
display-name: terrascan
homepage: https://runterrascan.io/
repo: https://github.com/tenable/terrascan
docs: https://runterrascan.io/
package-manager:
  brew: terrascan
  macports: terrascan
  nix: terrascan
  scoop: main/terrascan
package-manager-url: https://formulae.brew.sh/formula/terrascan
version: 1.19.9
license: Apache-2.0
category: security
tags:
  - cli
  - security
description: Detect compliance and security violations across Infrastructure as Code
source-archive: https://github.com/tenable/terrascan/archive/refs/tags/v1.19.9.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terrascan
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terrascan
  brew: brew install terrascan
  macports: sudo port install terrascan
  nix: nix profile install nixpkgs#terrascan
  scoop: scoop install main/terrascan
provenance:
  formula: terrascan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
