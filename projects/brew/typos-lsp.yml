id: brew:typos-lsp
display-name: typos-lsp
homepage: https://github.com/tekumara/typos-lsp
repo: https://github.com/tekumara/typos-lsp
docs: https://github.com/tekumara/typos-lsp
package-manager:
  apk: typos-lsp
  brew: typos-lsp
  nix: typos-lsp
  pacman: typos-lsp
package-manager-url: https://formulae.brew.sh/formula/typos-lsp
version: 0.1.52
license: MIT
category: development
tags:
  - cli
description: Language Server for typos-cli
source-archive: https://github.com/tekumara/typos-lsp/archive/refs/tags/v0.1.52.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: typos-lsp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add typos-lsp
  av: sudo av install brew:typos-lsp
  brew: brew install typos-lsp
  nix: nix profile install nixpkgs#typos-lsp
  pacman: sudo pacman -S typos-lsp
provenance:
  formula: typos-lsp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
