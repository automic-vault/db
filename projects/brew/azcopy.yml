id: brew:azcopy
display-name: azcopy
homepage: https://github.com/Azure/azure-storage-azcopy
repo: https://github.com/Azure/azure-storage-azcopy
docs: https://github.com/Azure/azure-storage-azcopy
package-manager:
  brew: azcopy
  chocolatey: azcopy
  pacman: azcopy
  scoop: main/azcopy
  winget: Microsoft.Azure.AZCopy.10
package-manager-url: https://formulae.brew.sh/formula/azcopy
version: 10.32.4
license: MIT
category: cloud
tags:
  - cli
description: Azure Storage data transfer utility
source-archive: https://github.com/Azure/azure-storage-azcopy/archive/refs/tags/v10.32.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: azcopy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:azcopy
  brew: brew install azcopy
  chocolatey: choco install azcopy
  pacman: sudo pacman -S azcopy
  scoop: scoop install main/azcopy
  winget: winget install --id Microsoft.Azure.AZCopy.10 -e
provenance:
  formula: azcopy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
