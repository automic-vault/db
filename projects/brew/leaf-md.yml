id: brew:leaf-md
display-name: leaf-md
homepage: https://leaf.rivolink.mg/
repo: https://github.com/RivoLink/leaf
docs: https://leaf.rivolink.mg/
package-manager:
  brew: leaf-md
  macports: leaf
  nix: leaf
  scoop: main/leaf
package-manager-url: https://formulae.brew.sh/formula/leaf-md
version: 1.23.1
license: MIT
category: development
tags:
  - cli
description: Terminal Markdown previewer with a GUI-like experience
source-archive: https://github.com/RivoLink/leaf/archive/refs/tags/1.23.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: leaf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:leaf-md
  brew: brew install leaf-md
  macports: sudo port install leaf
  nix: nix profile install nixpkgs#leaf
  scoop: scoop install main/leaf
provenance:
  formula: leaf-md
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
