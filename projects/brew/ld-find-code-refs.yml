id: brew:ld-find-code-refs
display-name: ld-find-code-refs
homepage: https://github.com/launchdarkly/ld-find-code-refs
repo: https://github.com/launchdarkly/ld-find-code-refs
docs: https://github.com/launchdarkly/ld-find-code-refs
package-manager:
  brew: ld-find-code-refs
package-manager-url: https://formulae.brew.sh/formula/ld-find-code-refs
version: 2.14.0
license: Apache-2.0
category: development
tags:
  - cli
description: Build tool for sending feature flag code references to LaunchDarkly
source-archive: https://github.com/launchdarkly/ld-find-code-refs/archive/refs/tags/v2.14.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ld-find-code-refs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ld-find-code-refs
  brew: brew install ld-find-code-refs
provenance:
  formula: ld-find-code-refs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
