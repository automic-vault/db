id: brew:pass-import
display-name: pass-import
homepage: https://github.com/roddhjav/pass-import
repo: >
  https://files.pythonhosted.org/packages/f1/69/1d763287f49eb2d43f14280a1af9f6c2aa54a306071a4723a9723a6fb613/pass-import-3.5.tar.gz
docs: https://github.com/roddhjav/pass-import
package-manager:
