id: brew:krane
display-name: krane
homepage: https://github.com/Shopify/krane
repo: https://rubygems.org/downloads/krane-3.9.1.gem
docs: https://github.com/Shopify/krane
package-manager:
  apk: krane
  brew: krane
  nix: krane
package-manager-url: https://formulae.brew.sh/formula/krane
version: 3.9.1
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes deploy tool with rollout verification
source-archive: https://rubygems.org/downloads/krane-3.9.1.gem
dependencies:
  - kubernetes-cli
  - ruby
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: krane
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add krane
  av: sudo av install brew:krane
  brew: brew install krane
  nix: nix profile install nixpkgs#krane
provenance:
  formula: krane
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
