id: brew:picoclaw
display-name: picoclaw
homepage: https://picoclaw.io/
repo: https://github.com/sipeed/picoclaw
docs: https://picoclaw.io/
package-manager:
  brew: picoclaw
  nix: picoclaw
  winget: Sipeed.PicoClaw
package-manager-url: https://formulae.brew.sh/formula/picoclaw
version: 0.2.9
license: MIT
category: development
tags:
  - cli
description: Ultra-efficient personal AI assistant in Go
source-archive: https://github.com/sipeed/picoclaw/archive/refs/tags/v0.2.9.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: picoclaw
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:picoclaw
  brew: brew install picoclaw
  nix: nix profile install nixpkgs#picoclaw
  winget: winget install --id Sipeed.PicoClaw -e
provenance:
  formula: picoclaw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
