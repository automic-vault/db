id: brew:mdless
display-name: mdless
homepage: https://github.com/ttscoff/mdless
repo: https://github.com/ttscoff/mdless
docs: https://github.com/ttscoff/mdless
package-manager:
  brew: mdless
package-manager-url: https://formulae.brew.sh/formula/mdless
version: 2.1.65
license: MIT
category: development
tags:
  - cli
description: Provides a formatted and highlighted view of Markdown files in Terminal
source-archive: https://github.com/ttscoff/mdless/archive/refs/tags/2.1.65.tar.gz
dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: mdless
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mdless
  brew: brew install mdless
provenance:
  formula: mdless
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
