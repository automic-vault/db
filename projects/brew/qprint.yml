id: brew:qprint
display-name: qprint
homepage: https://www.fourmilab.ch/webtools/qprint/
repo: https://www.fourmilab.ch/webtools/qprint/qprint-1.1.tar.gz
docs: https://www.fourmilab.ch/webtools/qprint/
package-manager:
  brew: qprint
  debian: qprint
  macports: qprint
  nix: qprint
  pacman: qprint
  ubuntu: qprint
  zypper: qprint
package-manager-url: https://formulae.brew.sh/formula/qprint
version: 1.1
license: LicenseRef-Homebrew-public-domain
category: network
tags:
  - cli
description: Encoder and decoder for quoted-printable encoding
source-archive: https://www.fourmilab.ch/webtools/qprint/qprint-1.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: qprint
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qprint
  brew: brew install qprint
  debian: sudo apt install qprint
  macports: sudo port install qprint
  nix: nix profile install nixpkgs#qprint
  pacman: sudo pacman -S qprint
  ubuntu: sudo apt install qprint
  zypper: sudo zypper install qprint
provenance:
  formula: qprint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
