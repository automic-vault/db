id: brew:liquidctl
display-name: liquidctl
homepage: https://github.com/liquidctl/liquidctl
repo: >
  https://files.pythonhosted.org/packages/7f/9c/11f37716eeeccc72a781c80e76021a33cafa35578627263199ea62b2eb2d/liquidctl-1.16.0.tar.gz
docs: https://github.com/liquidctl/liquidctl
package-manager:
  apk: liquidctl
  brew: liquidctl
  debian: liquidctl
  dnf: liquidctl
  nix: liquidctl
  pacman: liquidctl
  ubuntu: liquidctl
package-manager-url: https://formulae.brew.sh/formula/liquidctl
version: 1.16.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Cross-platform tool and drivers for liquid coolers and other devices
source-archive: >
  https://files.pythonhosted.org/packages/7f/9c/11f37716eeeccc72a781c80e76021a33cafa35578627263199ea62b2eb2d/liquidctl-1.16.0.tar.gz
dependencies:
  - hidapi
  - libusb
  - pillow
  - python@3.14
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: liquidctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add liquidctl
  av: sudo av install brew:liquidctl
  brew: brew install liquidctl
  debian: sudo apt install liquidctl
  dnf: sudo dnf install liquidctl
  nix: nix profile install nixpkgs#liquidctl
  pacman: sudo pacman -S liquidctl
  ubuntu: sudo apt install liquidctl
provenance:
  formula: liquidctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
