id: brew:quilt-installer
display-name: quilt-installer
homepage: https://quiltmc.org/
repo: >
  https://maven.quiltmc.org/repository/release/org/quiltmc/quilt-installer/0.13.1/quilt-installer-0.13.1.jar
docs: https://quiltmc.org/
package-manager:
  brew: quilt-installer
package-manager-url: https://formulae.brew.sh/formula/quilt-installer
version: 0.13.1
license: Apache-2.0
category: network
tags:
  - cli
description: Installer for Quilt for the vanilla launcher
source-archive: >
  https://maven.quiltmc.org/repository/release/org/quiltmc/quilt-installer/0.13.1/quilt-installer-0.13.1.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: quilt-installer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:quilt-installer
  brew: brew install quilt-installer
provenance:
  formula: quilt-installer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
