id: brew:ltex-ls-plus
display-name: ltex-ls-plus
homepage: https://ltex-plus.github.io/ltex-plus/
repo: https://github.com/ltex-plus/ltex-ls-plus
docs: https://ltex-plus.github.io/ltex-plus/
package-manager:
  brew: ltex-ls-plus
  nix: ltex-ls-plus
package-manager-url: https://formulae.brew.sh/formula/ltex-ls-plus
version: 18.6.1
license: MPL-2.0
category: development
tags:
  - cli
description: 'LTeX+ Language Server: maintained fork of LTeX Language Server'
source-archive: https://github.com/ltex-plus/ltex-ls-plus/archive/refs/tags/18.6.1.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - maven
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: ltex-cli-plus
  - exposure: global executable
    kind: cli
    name: ltex-cli-plus.bat
  - exposure: global executable
    kind: cli
    name: ltex-ls-plus
  - exposure: global executable
    kind: cli
    name: ltex-ls-plus.bat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ltex-ls-plus
  brew: brew install ltex-ls-plus
  nix: nix profile install nixpkgs#ltex-ls-plus
provenance:
  formula: ltex-ls-plus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
