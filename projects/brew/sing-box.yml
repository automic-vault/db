id: brew:sing-box
display-name: sing-box
homepage: https://sing-box.sagernet.org
repo: https://github.com/SagerNet/sing-box
docs: https://sing-box.sagernet.org
package-manager:
  apk: sing-box
  brew: sing-box
  nix: sing-box
  scoop: main/sing-box
  winget: SagerNet.sing-box
package-manager-url: https://formulae.brew.sh/formula/sing-box
version: 1.13.12
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Universal proxy platform
source-archive: https://github.com/SagerNet/sing-box/archive/refs/tags/v1.13.12.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sing-box
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add sing-box
  av: sudo av install brew:sing-box
  brew: brew install sing-box
  nix: nix profile install nixpkgs#sing-box
  scoop: scoop install main/sing-box
  winget: winget install --id SagerNet.sing-box -e
provenance:
  formula: sing-box
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
