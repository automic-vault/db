id: brew:jira-cli
display-name: jira-cli
homepage: https://github.com/ankitpokhrel/jira-cli
repo: https://github.com/ankitpokhrel/jira-cli
docs: https://github.com/ankitpokhrel/jira-cli
package-manager:
  brew: jira-cli
  macports: jira-cli
  scoop: extras/jira-cli
  zypper: jira-cli
package-manager-url: https://formulae.brew.sh/formula/jira-cli
version: 1.7.0
license: MIT
category: development
tags:
  - cli
description: Feature-rich interactive Jira CLI
source-archive: https://github.com/ankitpokhrel/jira-cli/archive/refs/tags/v1.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jira
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jira-cli
  brew: brew install jira-cli
  macports: sudo port install jira-cli
  scoop: scoop install extras/jira-cli
  zypper: sudo zypper install jira-cli
provenance:
  formula: jira-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
