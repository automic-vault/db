id: brew:stylish-haskell
display-name: stylish-haskell
homepage: https://github.com/haskell/stylish-haskell
repo: https://github.com/haskell/stylish-haskell
docs: https://github.com/haskell/stylish-haskell
package-manager:
  brew: stylish-haskell
  debian: stylish-haskell
  nix: stylish-haskell
  pacman: stylish-haskell
package-manager-url: https://formulae.brew.sh/formula/stylish-haskell
version: 0.15.1.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Haskell code prettifier
source-archive: https://github.com/haskell/stylish-haskell/archive/refs/tags/v0.15.1.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: stylish-haskell
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stylish-haskell
  brew: brew install stylish-haskell
  debian: sudo apt install stylish-haskell
  nix: nix profile install nixpkgs#stylish-haskell
  pacman: sudo pacman -S stylish-haskell
provenance:
  formula: stylish-haskell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
