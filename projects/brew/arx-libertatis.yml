id: brew:arx-libertatis
display-name: arx-libertatis
homepage: https://arx-libertatis.org/
repo: https://arx-libertatis.org/files/arx-libertatis-1.2.1/arx-libertatis-1.2.1.tar.xz
docs: https://arx-libertatis.org/
package-manager:
  brew: arx-libertatis
  dnf: arx-libertatis
  nix: arx-libertatis
package-manager-url: https://formulae.brew.sh/formula/arx-libertatis
version: 1.2.1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Cross-platform, open source port of Arx Fatalis
source-archive: https://arx-libertatis.org/files/arx-libertatis-1.2.1/arx-libertatis-1.2.1.tar.xz
dependencies:
  - freetype
  - glew
  - innoextract
  - sdl2
build-dependencies:
  - boost
  - cmake
  - glm
executables:
  - exposure: global executable
    kind: cli
    name: arx
  - exposure: global executable
    kind: cli
    name: arx-install-data
  - exposure: global executable
    kind: cli
    name: arxsavetool
  - exposure: global executable
    kind: cli
    name: arxunpak
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This package only contains the Arx Libertatis binary, not the game data. To play Arx
    Fatalis you will need to obtain the game from GOG.com and install the game data
    with: arx-install-data /path/to/setup_arx_fatalis.exe
  post-install-defined: false
install-lines:
  av: sudo av install brew:arx-libertatis
  brew: brew install arx-libertatis
  dnf: sudo dnf install arx-libertatis
  nix: nix profile install nixpkgs#arx-libertatis
provenance:
  formula: arx-libertatis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
