id: brew:transifex-cli
display-name: transifex-cli
homepage: https://github.com/transifex/cli
repo: https://github.com/transifex/cli
docs: https://github.com/transifex/cli
package-manager:
  brew: transifex-cli
  nix: transifex-cli
  pacman: transifex-cli
package-manager-url: https://formulae.brew.sh/formula/transifex-cli
version: 1.6.17
license: Apache-2.0
category: development
tags:
  - cli
description: Transifex command-line client
source-archive: https://github.com/transifex/cli/archive/refs/tags/v1.6.17.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:transifex-cli
  brew: brew install transifex-cli
  nix: nix profile install nixpkgs#transifex-cli
  pacman: sudo pacman -S transifex-cli
provenance:
  formula: transifex-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
