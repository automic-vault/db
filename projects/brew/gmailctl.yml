id: brew:gmailctl
display-name: gmailctl
homepage: https://github.com/mbrt/gmailctl
repo: https://github.com/mbrt/gmailctl
docs: https://github.com/mbrt/gmailctl
package-manager:
  brew: gmailctl
  dnf: gmailctl
  macports: gmailctl
  nix: gmailctl
package-manager-url: https://formulae.brew.sh/formula/gmailctl
version: 0.12.0
license: MIT
category: development
tags:
  - cli
description: Declarative configuration for Gmail filters
source-archive: https://github.com/mbrt/gmailctl/archive/refs/tags/v0.12.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gmailctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gmailctl
  brew: brew install gmailctl
  dnf: sudo dnf install gmailctl
  macports: sudo port install gmailctl
  nix: nix profile install nixpkgs#gmailctl
provenance:
  formula: gmailctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
