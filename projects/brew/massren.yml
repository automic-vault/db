id: brew:massren
display-name: massren
homepage: https://github.com/laurent22/massren
repo: https://github.com/laurent22/massren
docs: https://github.com/laurent22/massren
package-manager:
  brew: massren
  nix: massren
package-manager-url: https://formulae.brew.sh/formula/massren
version: 1.5.7
license: MIT
category: development
tags:
  - cli
description: Easily rename multiple files using your text editor
source-archive: https://github.com/laurent22/massren/archive/refs/tags/v1.5.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: massren
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:massren
  brew: brew install massren
  nix: nix profile install nixpkgs#massren
provenance:
  formula: massren
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
