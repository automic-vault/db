id: brew:req
display-name: req
homepage: https://github.com/andrewpillar/req
repo: https://github.com/andrewpillar/req
docs: https://github.com/andrewpillar/req
package-manager:
  brew: req
package-manager-url: https://formulae.brew.sh/formula/req
version: 1.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: Simple and opinionated HTTP scripting language
source-archive: https://github.com/andrewpillar/req/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: req
bottle:
