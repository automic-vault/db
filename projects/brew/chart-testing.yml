id: brew:chart-testing
display-name: chart-testing
homepage: https://github.com/helm/chart-testing
repo: https://github.com/helm/chart-testing
docs: https://github.com/helm/chart-testing
package-manager:
  brew: chart-testing
  nix: chart-testing
  pacman: ct
  zypper: chart-testing
package-manager-url: https://formulae.brew.sh/formula/chart-testing
version: 3.14.0
license: Apache-2.0
category: development
tags:
  - cli
description: Testing and linting Helm charts
source-archive: https://github.com/helm/chart-testing.git
dependencies:
  - yamale
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ct
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chart-testing
  brew: brew install chart-testing
  nix: nix profile install nixpkgs#chart-testing
  pacman: sudo pacman -S ct
  zypper: sudo zypper install chart-testing
provenance:
  formula: chart-testing
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
