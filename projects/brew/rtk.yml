id: brew:rtk
display-name: rtk
homepage: https://www.rtk-ai.app/
repo: https://github.com/rtk-ai/rtk
docs: https://www.rtk-ai.app/
package-manager:
  brew: rtk
  nix: rtk
  scoop: main/rtk
  winget: rtk-ai.rtk
package-manager-url: https://formulae.brew.sh/formula/rtk
version: 0.42.0
license: Apache-2.0
category: development
tags:
  - cli
description: CLI proxy to minimize LLM token consumption
source-archive: https://github.com/rtk-ai/rtk/archive/refs/tags/v0.42.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rtk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rtk
  brew: brew install rtk
  nix: nix profile install nixpkgs#rtk
  scoop: scoop install main/rtk
  winget: winget install --id rtk-ai.rtk -e
provenance:
  formula: rtk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
