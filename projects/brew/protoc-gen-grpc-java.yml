id: brew:protoc-gen-grpc-java
display-name: protoc-gen-grpc-java
homepage: https://grpc.io/docs/languages/java/
repo: https://github.com/grpc/grpc-java
docs: https://grpc.io/docs/languages/java/
package-manager:
  brew: protoc-gen-grpc-java
  nix: protoc-gen-grpc-java
package-manager-url: https://formulae.brew.sh/formula/protoc-gen-grpc-java
version: 1.81.0
license: Apache-2.0
category: development
tags:
  - cli
description: Protoc plugin for gRPC Java
source-archive: https://github.com/grpc/grpc-java/archive/refs/tags/v1.81.0.tar.gz
dependencies:
  - abseil
  - protobuf
build-dependencies:
  - gradle@8
  - openjdk
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: protoc-gen-grpc-java
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:protoc-gen-grpc-java
  brew: brew install protoc-gen-grpc-java
  nix: nix profile install nixpkgs#protoc-gen-grpc-java
provenance:
  formula: protoc-gen-grpc-java
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
