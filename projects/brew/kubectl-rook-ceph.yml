id: brew:kubectl-rook-ceph
display-name: kubectl-rook-ceph
homepage: https://rook.io/
repo: https://github.com/rook/kubectl-rook-ceph
docs: https://rook.io/
package-manager:
  brew: kubectl-rook-ceph
  nix: kubectl-rook-ceph
  zypper: kubectl-rook-ceph
package-manager-url: https://formulae.brew.sh/formula/kubectl-rook-ceph
version: 0.9.6
license: Apache-2.0
category: development
tags:
  - cli
description: Rook plugin for Ceph management
source-archive: https://github.com/rook/kubectl-rook-ceph/archive/refs/tags/v0.9.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubectl-rook_ceph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubectl-rook-ceph
  brew: brew install kubectl-rook-ceph
  nix: nix profile install nixpkgs#kubectl-rook-ceph
  zypper: sudo zypper install kubectl-rook-ceph
provenance:
  formula: kubectl-rook-ceph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
