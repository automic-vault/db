id: brew:xplr
display-name: xplr
homepage: https://github.com/sayanarijit/xplr
repo: https://github.com/sayanarijit/xplr
docs: https://github.com/sayanarijit/xplr
package-manager:
  apk: xplr
  brew: xplr
  macports: xplr
  nix: xplr
  pacman: xplr
  zypper: xplr
package-manager-url: https://formulae.brew.sh/formula/xplr
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Hackable, minimal, fast TUI file explorer
source-archive: https://github.com/sayanarijit/xplr/archive/refs/tags/v1.1.0.tar.gz
dependencies:
  - luajit
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: xplr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xplr
  av: sudo av install brew:xplr
  brew: brew install xplr
  macports: sudo port install xplr
  nix: nix profile install nixpkgs#xplr
  pacman: sudo pacman -S xplr
  zypper: sudo zypper install xplr
provenance:
  formula: xplr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
