id: brew:pyqt
display-name: pyqt
homepage: https://www.riverbankcomputing.com/software/pyqt/intro
repo: >
  https://files.pythonhosted.org/packages/8b/47/b25c13eca5bebc6505394d0223e46d7ebf0c57dcac2ed908d7d19b18ab6b/pyqt6-6.11.0.tar.gz
docs: https://www.riverbankcomputing.com/software/pyqt/intro
package-manager:
  brew: pyqt
package-manager-url: https://formulae.brew.sh/formula/pyqt
version: 6.11.0
license: GPL-3.0-only
category: network
tags:
  - cli
description: Python bindings for v6 of Qt
source-archive: >
  https://files.pythonhosted.org/packages/8b/47/b25c13eca5bebc6505394d0223e46d7ebf0c57dcac2ed908d7d19b18ab6b/pyqt6-6.11.0.tar.gz
dependencies:
  - python@3.14
  - qt3d
  - qtbase
  - qtcharts
  - qtconnectivity
  - qtdatavis3d
  - qtdeclarative
  - qtmultimedia
  - qtnetworkauth
  - qtpositioning
  - qtquick3d
  - qtremoteobjects
  - qtscxml
  - qtsensors
  - qtserialport
  - qtshadertools
  - qtspeech
  - qtsvg
  - qttools
  - qtwebchannel
  - qtwebengine
  - qtwebsockets
build-dependencies:
  - pyqt-builder
executables:
  - exposure: global executable
    kind: cli
    name: pylupdate6
  - exposure: global executable
    kind: cli
    name: pyuic6
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pyqt
  brew: brew install pyqt
provenance:
  formula: pyqt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
