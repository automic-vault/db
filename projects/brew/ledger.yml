id: brew:ledger
display-name: ledger
homepage: https://ledger-cli.org/
repo: https://github.com/ledger/ledger
docs: https://ledger-cli.org/
package-manager:
  apk: ledger
  brew: ledger
  debian: ledger
  dnf: ledger
  macports: ledger
  nix: ledger
  pacman: ledger
  ubuntu: ledger
  zypper: ledger
package-manager-url: https://formulae.brew.sh/formula/ledger
version: 3.4.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Command-line, double-entry accounting tool
source-archive: https://github.com/ledger/ledger/archive/refs/tags/v3.4.1.tar.gz
dependencies:
  - boost
  - gmp
  - gpgme
  - gpgmepp
  - libassuan
  - mpfr
  - python@3.14
build-dependencies:
  - cmake
  - texinfo
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: ledger
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ledger
  av: sudo av install brew:ledger
  brew: brew install ledger
  debian: sudo apt install ledger
  dnf: sudo dnf install ledger
  macports: sudo port install ledger
  nix: nix profile install nixpkgs#ledger
  pacman: sudo pacman -S ledger
  ubuntu: sudo apt install ledger
  zypper: sudo zypper install ledger
provenance:
  formula: ledger
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
