id: brew:sane-backends
display-name: sane-backends
homepage: http://www.sane-project.org/
repo: >
  https://gitlab.com/-/project/429008/uploads/843c156420e211859e974f78f64c3ea3/sane-backends-1.4.0.tar.gz
docs: http://www.sane-project.org/
package-manager:
  apk: sane-backends
  brew: sane-backends
  dnf: sane-backends
  macports: sane-backends
  nix: sane-backends
  zypper: sane-backends
package-manager-url: https://formulae.brew.sh/formula/sane-backends
version: 1.4.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Backends for scanner access
source-archive: >
  https://gitlab.com/-/project/429008/uploads/843c156420e211859e974f78f64c3ea3/sane-backends-1.4.0.tar.gz
dependencies:
  - jpeg-turbo
  - libpng
  - libtiff
  - libusb
  - net-snmp
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: gamma4scanimage
  - exposure: global executable
    kind: cli
    name: sane-config
  - exposure: global executable
    kind: cli
    name: sane-find-scanner
  - exposure: global executable
    kind: cli
    name: saned
  - exposure: global executable
    kind: cli
    name: scanimage
  - exposure: global executable
    kind: cli
    name: umax_pp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sane-backends
  av: sudo av install brew:sane-backends
  brew: brew install sane-backends
  dnf: sudo dnf install sane-backends
  macports: sudo port install sane-backends
  nix: nix profile install nixpkgs#sane-backends
  zypper: sudo zypper install sane-backends
provenance:
  formula: sane-backends
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
