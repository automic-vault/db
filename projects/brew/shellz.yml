id: brew:shellz
display-name: shellz
homepage: https://github.com/evilsocket/shellz
repo: https://github.com/evilsocket/shellz
docs: https://github.com/evilsocket/shellz
package-manager:
  brew: shellz
  nix: shellz
package-manager-url: https://formulae.brew.sh/formula/shellz
version: 1.6.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Small utility to track and control custom shellz
source-archive: https://github.com/evilsocket/shellz/archive/refs/tags/v1.6.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: shellz
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:shellz
  brew: brew install shellz
  nix: nix profile install nixpkgs#shellz
provenance:
  formula: shellz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
