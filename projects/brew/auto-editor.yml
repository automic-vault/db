id: brew:auto-editor
display-name: auto-editor
homepage: https://auto-editor.com
repo: https://github.com/WyattBlue/auto-editor
docs: https://auto-editor.com
package-manager:
  brew: auto-editor
  debian: auto-editor
  nix: auto-editor
  ubuntu: auto-editor
package-manager-url: https://formulae.brew.sh/formula/auto-editor
version: 30.3.0
license: Unlicense
category: development
tags:
  - cli
description: Effort free video editing!
source-archive: https://github.com/WyattBlue/auto-editor/archive/refs/tags/30.3.0.tar.gz
dependencies:
  - ffmpeg
build-dependencies:
  - nim
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: auto-editor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:auto-editor
  brew: brew install auto-editor
  debian: sudo apt install auto-editor
  nix: nix profile install nixpkgs#auto-editor
  ubuntu: sudo apt install auto-editor
provenance:
  formula: auto-editor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
