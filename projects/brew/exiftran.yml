id: brew:exiftran
display-name: exiftran
homepage: https://www.kraxel.org/blog/linux/fbida/
repo: https://www.kraxel.org/releases/fbida/fbida-2.14.tar.gz
docs: https://www.kraxel.org/blog/linux/fbida/
package-manager:
  brew: exiftran
  debian: exiftran
  macports: exiftran
  ubuntu: exiftran
package-manager-url: https://formulae.brew.sh/formula/exiftran
version: 2.14
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Transform digital camera jpegs and their EXIF data
source-archive: https://www.kraxel.org/releases/fbida/fbida-2.14.tar.gz
dependencies:
  - jpeg-turbo
  - libexif
  - pixman
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: exiftran
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:exiftran
  brew: brew install exiftran
  debian: sudo apt install exiftran
  macports: sudo port install exiftran
  ubuntu: sudo apt install exiftran
provenance:
  formula: exiftran
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
