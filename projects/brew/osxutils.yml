bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:osxutils
  brew: brew install osxutils
  debian: sudo apt install mkalias
  macports: sudo port install osxutils
  nix: nix profile install nixpkgs#mkalias
  ubuntu: sudo apt install mkalias
  winget: winget install --id Google.JapaneseIME -e
provenance:
  formula: osxutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
