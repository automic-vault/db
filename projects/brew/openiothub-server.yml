id: brew:openiothub-server
display-name: openiothub-server
homepage: https://github.com/OpenIoTHub/server-go
repo: https://github.com/OpenIoTHub/server-go
docs: https://github.com/OpenIoTHub/server-go
package-manager:
  brew: openiothub-server
package-manager-url: https://formulae.brew.sh/formula/openiothub-server
version: 1.2.25
license: MIT
category: development
tags:
  - cli
description: Server for OpenIoTHub
source-archive: https://github.com/OpenIoTHub/server-go.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: openiothub-server
  - exposure: global executable
    kind: cli
    name: server-go
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:openiothub-server
  brew: brew install openiothub-server
provenance:
  formula: openiothub-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
