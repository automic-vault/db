id: brew:repeater
display-name: repeater
homepage: https://shaankhosla.github.io/repeater/
repo: https://github.com/shaankhosla/repeater
docs: https://shaankhosla.github.io/repeater/
package-manager:
  brew: repeater
package-manager-url: https://formulae.brew.sh/formula/repeater
version: 0.1.10
license: Apache-2.0
category: development
tags:
  - cli
description: Flashcard program that uses spaced repetition
source-archive: https://github.com/shaankhosla/repeater/archive/refs/tags/v0.1.10.tar.gz
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: repeater
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:repeater
  brew: brew install repeater
provenance:
  formula: repeater
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
