id: brew:stylua
display-name: stylua
homepage: https://github.com/JohnnyMorganz/StyLua
repo: https://github.com/JohnnyMorganz/StyLua
docs: https://github.com/JohnnyMorganz/StyLua
package-manager:
  apk: stylua
  brew: stylua
  macports: stylua
  nix: stylua
  pacman: stylua
  scoop: main/stylua
  zypper: StyLua
package-manager-url: https://formulae.brew.sh/formula/stylua
version: 2.5.2
license: MPL-2.0
category: development
tags:
  - cli
description: Opinionated Lua code formatter
source-archive: https://github.com/JohnnyMorganz/StyLua/archive/refs/tags/v2.5.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: stylua
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add stylua
  av: sudo av install brew:stylua
  brew: brew install stylua
  macports: sudo port install stylua
  nix: nix profile install nixpkgs#stylua
  pacman: sudo pacman -S stylua
  scoop: scoop install main/stylua
  zypper: sudo zypper install StyLua
provenance:
  formula: stylua
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
