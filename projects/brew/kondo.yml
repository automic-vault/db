id: brew:kondo
display-name: kondo
homepage: https://github.com/tbillington/kondo
repo: https://github.com/tbillington/kondo
docs: https://github.com/tbillington/kondo
package-manager:
  apk: kondo
  brew: kondo
  macports: kondo
  nix: kondo
  pacman: kondo
  scoop: main/kondo
  winget: tbillington.kondo
package-manager-url: https://formulae.brew.sh/formula/kondo
version: 0.9
license: MIT
category: development
tags:
  - cli
description: Save disk space by cleaning non-essential files from software projects
source-archive: https://github.com/tbillington/kondo/archive/refs/tags/v0.9.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: kondo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kondo
  av: sudo av install brew:kondo
  brew: brew install kondo
  macports: sudo port install kondo
  nix: nix profile install nixpkgs#kondo
  pacman: sudo pacman -S kondo
  scoop: scoop install main/kondo
  winget: winget install --id tbillington.kondo -e
provenance:
  formula: kondo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
