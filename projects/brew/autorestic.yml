id: brew:autorestic
display-name: autorestic
homepage: https://autorestic.vercel.app/
repo: https://github.com/cupcakearmy/autorestic
docs: https://autorestic.vercel.app/
package-manager:
  apk: autorestic
  brew: autorestic
  dnf: autorestic
  macports: autorestic
  nix: autorestic
package-manager-url: https://formulae.brew.sh/formula/autorestic
version: 1.8.3
license: Apache-2.0
category: development
tags:
  - cli
description: High level CLI utility for restic
source-archive: https://github.com/cupcakearmy/autorestic/archive/refs/tags/v1.8.3.tar.gz
dependencies:
  - restic
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: autorestic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add autorestic
  av: sudo av install brew:autorestic
  brew: brew install autorestic
  dnf: sudo dnf install autorestic
  macports: sudo port install autorestic
  nix: nix profile install nixpkgs#autorestic
provenance:
  formula: autorestic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
