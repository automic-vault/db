id: brew:jj
display-name: jj
homepage: https://github.com/jj-vcs/jj
repo: https://github.com/jj-vcs/jj
docs: https://github.com/jj-vcs/jj
package-manager:
  brew: jj
  macports: jj
  nix: jj
  scoop: main/jj
  winget: jj-vcs.jj
package-manager-url: https://formulae.brew.sh/formula/jj
version: 0.41.0
license: Apache-2.0
category: development
tags:
  - cli
  - git
description: Git-compatible distributed version control system
source-archive: https://github.com/jj-vcs/jj/archive/refs/tags/v0.41.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: jj
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jj
  brew: brew install jj
  macports: sudo port install jj
  nix: nix profile install nixpkgs#jj
  scoop: scoop install main/jj
  winget: winget install --id jj-vcs.jj -e
provenance:
  formula: jj
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
