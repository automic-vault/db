id: brew:kubeconform
display-name: kubeconform
homepage: https://github.com/yannh/kubeconform
repo: https://github.com/yannh/kubeconform
docs: https://github.com/yannh/kubeconform
package-manager:
  apk: kubeconform
  brew: kubeconform
  macports: kubeconform
  nix: kubeconform
  pacman: kubeconform
  scoop: main/kubeconform
  winget: YannHamon.kubeconform
  zypper: kubeconform
package-manager-url: https://formulae.brew.sh/formula/kubeconform
version: 0.7.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: FAST Kubernetes manifests validator, with support for Custom Resources!
source-archive: https://github.com/yannh/kubeconform/archive/refs/tags/v0.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubeconform
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kubeconform
  av: sudo av install brew:kubeconform
  brew: brew install kubeconform
  macports: sudo port install kubeconform
  nix: nix profile install nixpkgs#kubeconform
  pacman: sudo pacman -S kubeconform
  scoop: scoop install main/kubeconform
  winget: winget install --id YannHamon.kubeconform -e
  zypper: sudo zypper install kubeconform
provenance:
  formula: kubeconform
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
