id: brew:fwup
display-name: fwup
homepage: https://github.com/fwup-home/fwup
repo: https://github.com/fwup-home/fwup
docs: https://github.com/fwup-home/fwup
package-manager:
  apk: fwup
  brew: fwup
  macports: fwup
  nix: fwup
  scoop: extras/fwup
package-manager-url: https://formulae.brew.sh/formula/fwup
version: 1.16.0
license: Apache-2.0
category: development
tags:
  - cli
description: Configurable embedded Linux firmware update creator and runner
source-archive: https://github.com/fwup-home/fwup/releases/download/v1.16.0/fwup-1.16.0.tar.gz
dependencies:
  - confuse
  - libarchive
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fwup
  - exposure: global executable
    kind: cli
    name: img2fwup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fwup
  av: sudo av install brew:fwup
  brew: brew install fwup
  macports: sudo port install fwup
  nix: nix profile install nixpkgs#fwup
  scoop: scoop install extras/fwup
provenance:
  formula: fwup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
