id: brew:planck
display-name: planck
homepage: https://planck-repl.org/
repo: https://github.com/planck-repl/planck
docs: https://planck-repl.org/
package-manager:
  brew: planck
package-manager-url: https://formulae.brew.sh/formula/planck
version: 2.28.0
license: EPL-1.0
category: development
tags:
  - cli
description: Stand-alone ClojureScript REPL
source-archive: https://github.com/planck-repl/planck/archive/refs/tags/2.28.0.tar.gz
dependencies:
  - icu4c@78
  - libzip
build-dependencies:
  - clojure
  - cmake
  - pkgconf
uses-from-macos:
  - curl
  - zlib
executables:
  - exposure: global executable
    kind: cli
    name: planck
  - exposure: global executable
    kind: cli
    name: plk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:planck
  brew: brew install planck
provenance:
  formula: planck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
