id: brew:shared-mime-info
display-name: shared-mime-info
homepage: https://wiki.freedesktop.org/www/Software/shared-mime-info
repo: >
  https://gitlab.freedesktop.org/xdg/shared-mime-info/-/archive/2.4/shared-mime-info-2.4.tar.bz2
docs: https://wiki.freedesktop.org/www/Software/shared-mime-info
package-manager:
  apk: shared-mime-info
  brew: shared-mime-info
  debian: shared-mime-info
  dnf: shared-mime-info
  macports: shared-mime-info
  nix: shared-mime-info
  pacman: shared-mime-info
  ubuntu: shared-mime-info
  zypper: shared-mime-info
package-manager-url: https://formulae.brew.sh/formula/shared-mime-info
version: 2.4
license: GPL-2.0-only
category: database
tags:
  - cli
  - database
description: Database of common MIME types
source-archive: >
  https://gitlab.freedesktop.org/xdg/shared-mime-info/-/archive/2.4/shared-mime-info-2.4.tar.bz2
dependencies:
  - glib
build-dependencies:
  - gettext
  - itstool
  - meson
  - ninja
  - pkgconf
  - xmlto
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: update-mime-database
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add shared-mime-info
  av: sudo av install brew:shared-mime-info
  brew: brew install shared-mime-info
  debian: sudo apt install shared-mime-info
  dnf: sudo dnf install shared-mime-info
  macports: sudo port install shared-mime-info
  nix: nix profile install nixpkgs#shared-mime-info
  pacman: sudo pacman -S shared-mime-info
  ubuntu: sudo apt install shared-mime-info
  zypper: sudo zypper install shared-mime-info
provenance:
  formula: shared-mime-info
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
