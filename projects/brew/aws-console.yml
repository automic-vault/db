id: brew:aws-console
display-name: aws-console
homepage: https://github.com/aws-cloudformation/rain
repo: https://github.com/aws-cloudformation/rain
docs: https://github.com/aws-cloudformation/rain
package-manager:
  brew: aws-console
package-manager-url: https://formulae.brew.sh/formula/aws-console
version: 1.24.4
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: Command-line to use AWS CLI credentials to launch the AWS console in a browser
source-archive: https://github.com/aws-cloudformation/rain/archive/refs/tags/v1.24.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aws-console
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aws-console
  brew: brew install aws-console
provenance:
  formula: aws-console
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
