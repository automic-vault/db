id: brew:texlab
display-name: texlab
homepage: https://github.com/latex-lsp/texlab/
repo: https://github.com/latex-lsp/texlab
docs: https://github.com/latex-lsp/texlab/
package-manager:
  apk: texlab
  brew: texlab
  macports: texlab
  nix: texlab
  pacman: texlab
  scoop: main/texlab
  zypper: texlab
package-manager-url: https://formulae.brew.sh/formula/texlab
version: 5.25.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: Implementation of the Language Server Protocol for LaTeX
source-archive: https://github.com/latex-lsp/texlab/archive/refs/tags/v5.25.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: texlab
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add texlab
  av: sudo av install brew:texlab
  brew: brew install texlab
  macports: sudo port install texlab
  nix: nix profile install nixpkgs#texlab
  pacman: sudo pacman -S texlab
  scoop: scoop install main/texlab
  zypper: sudo zypper install texlab
provenance:
  formula: texlab
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
