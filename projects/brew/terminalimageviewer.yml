id: brew:terminalimageviewer
display-name: terminalimageviewer
homepage: https://github.com/stefanhaustein/TerminalImageViewer
repo: https://github.com/stefanhaustein/TerminalImageViewer
docs: https://github.com/stefanhaustein/TerminalImageViewer
package-manager:
  brew: terminalimageviewer
  debian: tiv
  macports: tiv
  nix: tiv
  ubuntu: tiv
package-manager-url: https://formulae.brew.sh/formula/terminalimageviewer
version: 1.2.1
license: Apache-2.0
category: development
tags:
  - cli
description: Display images in a terminal using block graphic characters
source-archive: https://github.com/stefanhaustein/TerminalImageViewer/archive/refs/tags/v1.2.1.tar.gz
dependencies:
  - imagemagick
executables:
  - exposure: global executable
    kind: cli
    name: tiv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terminalimageviewer
  brew: brew install terminalimageviewer
  debian: sudo apt install tiv
  macports: sudo port install tiv
  nix: nix profile install nixpkgs#tiv
  ubuntu: sudo apt install tiv
provenance:
  formula: terminalimageviewer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
