id: brew:gpx
display-name: gpx
homepage: https://github.com/markwal/GPX/blob/HEAD/README.md
repo: https://github.com/markwal/GPX
docs: https://github.com/markwal/GPX/blob/HEAD/README.md
package-manager:
  brew: gpx
  debian: gpx
  nix: gpx
  ubuntu: gpx
package-manager-url: https://formulae.brew.sh/formula/gpx
version: 2.6.8
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Gcode to x3g converter for 3D printers running Sailfish
source-archive: https://github.com/markwal/GPX/archive/refs/tags/2.6.8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: gpx
  - exposure: global executable
    kind: cli
    name: machines
  - exposure: global executable
    kind: cli
    name: s3gdump
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gpx
  brew: brew install gpx
  debian: sudo apt install gpx
  nix: nix profile install nixpkgs#gpx
  ubuntu: sudo apt install gpx
provenance:
  formula: gpx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
