id: brew:slurm
display-name: slurm
homepage: https://github.com/mattthias/slurm/wiki/
repo: https://github.com/mattthias/slurm
docs: https://github.com/mattthias/slurm/wiki/
package-manager:
  apk: slurm
  brew: slurm
  debian: slurm
  dnf: slurm
  macports: slurm
  nix: slurm
  ubuntu: slurm
  zypper: slurm
package-manager-url: https://formulae.brew.sh/formula/slurm
version: 0.4.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Yet another network load monitor
source-archive: https://github.com/mattthias/slurm/archive/refs/tags/upstream/0.4.4.tar.gz
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: slurm
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add slurm
  av: sudo av install brew:slurm
  brew: brew install slurm
  debian: sudo apt install slurm
  dnf: sudo dnf install slurm
  macports: sudo port install slurm
  nix: nix profile install nixpkgs#slurm
  ubuntu: sudo apt install slurm
  zypper: sudo zypper install slurm
provenance:
  formula: slurm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
