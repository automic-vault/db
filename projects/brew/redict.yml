id: brew:redict
display-name: redict
homepage: https://redict.io/
repo: https://codeberg.org/redict/redict/archive/7.3.6.tar.gz
docs: https://redict.io/
package-manager:
  apk: redict
  brew: redict
  dnf: redict
package-manager-url: https://formulae.brew.sh/formula/redict
version: 7.3.6
license: LGPL-3.0-only
category: database
tags:
  - cli
  - database
description: Distributed key/value database
source-archive: https://codeberg.org/redict/redict/archive/7.3.6.tar.gz
dependencies:
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: redict-benchmark
  - exposure: global executable
    kind: cli
    name: redict-check-aof
  - exposure: global executable
    kind: cli
    name: redict-check-rdb
  - exposure: global executable
    kind: cli
    name: redict-cli
  - exposure: global executable
    kind: cli
    name: redict-sentinel
  - exposure: global executable
    kind: cli
    name: redict-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add redict
  av: sudo av install brew:redict
  brew: brew install redict
  dnf: sudo dnf install redict
provenance:
  formula: redict
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
