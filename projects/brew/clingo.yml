id: brew:clingo
display-name: clingo
homepage: https://potassco.org/clingo/
repo: https://github.com/potassco/clingo
docs: https://potassco.org/clingo/
package-manager:
  apk: clingo
  brew: clingo
  debian: clasp
  dnf: clingo
  macports: clingo
  nix: clingo
  scoop: extras/clingo
  ubuntu: clasp
  zypper: clingo
package-manager-url: https://formulae.brew.sh/formula/clingo
version: 5.8.0
license: MIT
category: development
tags:
  - cli
description: ASP system to ground and solve logic programs
source-archive: https://github.com/potassco/clingo/archive/refs/tags/v5.8.0.tar.gz
dependencies:
  - cffi
  - lua
  - python@3.14
build-dependencies:
  - cmake
  - doxygen
executables:
  - exposure: global executable
    kind: cli
    name: clasp
  - exposure: global executable
    kind: cli
    name: clingo
  - exposure: global executable
    kind: cli
    name: gringo
  - exposure: global executable
    kind: cli
    name: lpconvert
  - exposure: global executable
    kind: cli
    name: reify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add clingo
  av: sudo av install brew:clingo
  brew: brew install clingo
  debian: sudo apt install clasp
  dnf: sudo dnf install clingo
  macports: sudo port install clingo
  nix: nix profile install nixpkgs#clingo
  scoop: scoop install extras/clingo
  ubuntu: sudo apt install clasp
  zypper: sudo zypper install clingo
provenance:
  formula: clingo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
