id: brew:afuse
display-name: afuse
homepage: https://github.com/pcarrier/afuse/
repo: https://github.com/pcarrier/afuse
docs: https://github.com/pcarrier/afuse/
package-manager:
  brew: afuse
  debian: afuse
  dnf: afuse
  nix: afuse
  ubuntu: afuse
package-manager-url: https://formulae.brew.sh/formula/afuse
version: 0.5.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: Automounting file system implemented in userspace with FUSE
source-archive: https://github.com/pcarrier/afuse/archive/refs/tags/v0.5.0.tar.gz
dependencies:
  - libfuse@2
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: afuse
  - exposure: global executable
    kind: cli
    name: afuse-avahissh
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:afuse
  brew: brew install afuse
  debian: sudo apt install afuse
  dnf: sudo dnf install afuse
  nix: nix profile install nixpkgs#afuse
  ubuntu: sudo apt install afuse
provenance:
  formula: afuse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
