id: brew:libgeotiff
display-name: libgeotiff
homepage: https://github.com/OSGeo/libgeotiff
repo: https://github.com/OSGeo/libgeotiff
docs: https://github.com/OSGeo/libgeotiff
package-manager:
  apk: libgeotiff
  brew: libgeotiff
  dnf: libgeotiff
  macports: libgeotiff
  nix: libgeotiff
  pacman: libgeotiff
package-manager-url: https://formulae.brew.sh/formula/libgeotiff
version: 1.7.4
license: MIT
category: development
tags:
  - cli
description: Library and tools for dealing with GeoTIFF
source-archive: https://github.com/OSGeo/libgeotiff/releases/download/1.7.4/libgeotiff-1.7.4.tar.gz
dependencies:
  - jpeg-turbo
  - libtiff
  - proj
executables:
  - exposure: global executable
    kind: cli
    name: applygeo
  - exposure: global executable
    kind: cli
    name: geotifcp
  - exposure: global executable
    kind: cli
    name: listgeo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libgeotiff
  av: sudo av install brew:libgeotiff
  brew: brew install libgeotiff
  dnf: sudo dnf install libgeotiff
  macports: sudo port install libgeotiff
  nix: nix profile install nixpkgs#libgeotiff
  pacman: sudo pacman -S libgeotiff
provenance:
  formula: libgeotiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
