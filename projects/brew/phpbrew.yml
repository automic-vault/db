id: brew:phpbrew
display-name: phpbrew
homepage: https://phpbrew.github.io/phpbrew
repo: https://github.com/phpbrew/phpbrew
docs: https://phpbrew.github.io/phpbrew
package-manager:
  brew: phpbrew
package-manager-url: https://formulae.brew.sh/formula/phpbrew
version: 2.2.0
license: MIT
category: development
tags:
  - cli
description: Brew & manage PHP versions in pure PHP at HOME
source-archive: https://github.com/phpbrew/phpbrew/releases/download/2.2.0/phpbrew.phar
dependencies:
  - php@8.4
executables:
  - exposure: global executable
    kind: cli
    name: phpbrew
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:phpbrew
  brew: brew install phpbrew
provenance:
  formula: phpbrew
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
