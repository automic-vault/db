id: brew:when
display-name: when
homepage: https://www.lightandmatter.com/when/when.html
repo: https://bitbucket.org/ben-crowell/when/get/1.1.45.tar.bz2
docs: https://www.lightandmatter.com/when/when.html
package-manager:
  apk: when
  brew: when
  debian: when
  macports: when
  nix: when
  pacman: when
  ubuntu: when
package-manager-url: https://formulae.brew.sh/formula/when
version: 1.1.45
license: GPL-2.0-only
category: network
tags:
  - cli
description: Tiny personal calendar
source-archive: https://bitbucket.org/ben-crowell/when/get/1.1.45.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: when
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add when
  av: sudo av install brew:when
  brew: brew install when
  debian: sudo apt install when
  macports: sudo port install when
  nix: nix profile install nixpkgs#when
  pacman: sudo pacman -S when
  ubuntu: sudo apt install when
provenance:
  formula: when
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
