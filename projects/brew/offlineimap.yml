id: brew:offlineimap
display-name: offlineimap
homepage: https://github.com/OfflineIMAP/offlineimap3
repo: https://github.com/OfflineIMAP/offlineimap3
docs: https://github.com/OfflineIMAP/offlineimap3
package-manager:
  apk: offlineimap
  brew: offlineimap
  debian: offlineimap
  dnf: offlineimap
  macports: offlineimap
  nix: offlineimap
  pacman: offlineimap
  ubuntu: offlineimap
package-manager-url: https://formulae.brew.sh/formula/offlineimap
version: 8.0.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Synchronizes emails between two repositories
source-archive: https://github.com/OfflineIMAP/offlineimap3/archive/refs/tags/v8.0.2.tar.gz
dependencies:
  - certifi
  - python@3.14
uses-from-macos:
  - krb5
executables:
  - exposure: global executable
    kind: cli
    name: offlineimap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To get started, copy one of these configurations to ~/.offlineimaprc: * minimal
    configuration: cp -n $HOMEBREW_PREFIX/etc/offlineimap.conf.minimal ~/.offlineimaprc
    * advanced configuration: cp -n $HOMEBREW_PREFIX/etc/offlineimap.conf
    ~/.offlineimaprc
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add offlineimap
  av: sudo av install brew:offlineimap
  brew: brew install offlineimap
  debian: sudo apt install offlineimap
  dnf: sudo dnf install offlineimap
  macports: sudo port install offlineimap
  nix: nix profile install nixpkgs#offlineimap
  pacman: sudo pacman -S offlineimap
  ubuntu: sudo apt install offlineimap
provenance:
  formula: offlineimap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
