id: brew:somagic
display-name: somagic
homepage: https://code.google.com/archive/p/easycap-somagic-linux/
repo: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/easycap-somagic-linux/somagic-easycap_1.1.tar.gz
docs: https://code.google.com/archive/p/easycap-somagic-linux/
package-manager:
  brew: somagic
package-manager-url: https://formulae.brew.sh/formula/somagic
version: 1.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Linux capture program for the Somagic variants of EasyCAP
source-archive: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/easycap-somagic-linux/somagic-easycap_1.1.tar.gz
dependencies:
  - libgcrypt
  - libusb
  - somagic-tools
executables:
  - exposure: global executable
    kind: cli
    name: somagic-capture
  - exposure: global executable
    kind: cli
    name: somagic-init
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Before running somagic-capture you must extract the official firmware from the CD.
    See
    https://code.google.com/archive/p/easycap-somagic-linux/wikis/GettingStarted.wiki
    for details.
  post-install-defined: false
install-lines:
  av: sudo av install brew:somagic
  brew: brew install somagic
provenance:
  formula: somagic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
