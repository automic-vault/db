install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:watch
  brew: brew install watch
  macports: sudo port install watch
  winget: winget install --id 54145a.145watch -e
provenance:
  formula: watch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
