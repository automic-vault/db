id: brew:watch
display-name: watch
homepage: https://gitlab.com/procps-ng/procps
repo: https://downloads.sourceforge.net/project/procps-ng/Production/procps-ng-4.0.6.tar.xz
docs: https://gitlab.com/procps-ng/procps
package-manager:
  brew: watch
  macports: watch
  winget: 54145a.145watch
package-manager-url: https://formulae.brew.sh/formula/watch
version: 4.0.6
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: Executes a program periodically, showing output fullscreen
source-archive: https://downloads.sourceforge.net/project/procps-ng/Production/procps-ng-4.0.6.tar.xz
dependencies:
  - ncurses
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: watch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
