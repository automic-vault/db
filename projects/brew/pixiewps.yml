id: brew:pixiewps
display-name: pixiewps
homepage: https://github.com/wiire-a/pixiewps
repo: https://github.com/wiire-a/pixiewps
docs: https://github.com/wiire-a/pixiewps
package-manager:
  apk: pixiewps
  brew: pixiewps
  debian: pixiewps
  dnf: pixiewps
  nix: pixiewps
  pacman: pixiewps
  ubuntu: pixiewps
package-manager-url: https://formulae.brew.sh/formula/pixiewps
version: 1.4.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Offline Wi-Fi Protected Setup brute-force utility
source-archive: https://github.com/wiire-a/pixiewps/releases/download/v1.4.2/pixiewps-1.4.2.tar.xz
dependencies:
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: pixiewps
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pixiewps
  av: sudo av install brew:pixiewps
  brew: brew install pixiewps
  debian: sudo apt install pixiewps
  dnf: sudo dnf install pixiewps
  nix: nix profile install nixpkgs#pixiewps
  pacman: sudo pacman -S pixiewps
  ubuntu: sudo apt install pixiewps
provenance:
  formula: pixiewps
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
