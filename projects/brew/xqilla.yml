id: brew:xqilla
display-name: xqilla
homepage: https://xqilla.sourceforge.net/
repo: https://downloads.sourceforge.net/project/xqilla/XQilla-2.3.4.tar.gz
docs: https://xqilla.sourceforge.net/
package-manager:
  brew: xqilla
  macports: xqilla
  nix: xqilla
package-manager-url: https://formulae.brew.sh/formula/xqilla
version: 2.3.4
license: Apache-2.0
category: network
tags:
  - cli
description: XQuery and XPath 2 command-line interpreter
source-archive: https://downloads.sourceforge.net/project/xqilla/XQilla-2.3.4.tar.gz
dependencies:
  - xerces-c
executables:
  - exposure: global executable
    kind: cli
    name: xqilla
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xqilla
  brew: brew install xqilla
  macports: sudo port install xqilla
  nix: nix profile install nixpkgs#xqilla
provenance:
  formula: xqilla
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
