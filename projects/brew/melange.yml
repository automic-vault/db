id: brew:melange
display-name: melange
homepage: https://github.com/chainguard-dev/melange
repo: https://github.com/chainguard-dev/melange
docs: https://github.com/chainguard-dev/melange
package-manager:
  apk: melange
  brew: melange
  nix: melange
  pacman: melange
  zypper: melange
package-manager-url: https://formulae.brew.sh/formula/melange
version: 0.50.8
license: Apache-2.0
category: development
tags:
  - cli
description: Build APKs from source code
source-archive: https://github.com/chainguard-dev/melange/archive/refs/tags/v0.50.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: melange
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add melange
  av: sudo av install brew:melange
  brew: brew install melange
  nix: nix profile install nixpkgs#melange
  pacman: sudo pacman -S melange
  zypper: sudo zypper install melange
provenance:
  formula: melange
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
