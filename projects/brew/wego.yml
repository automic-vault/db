id: brew:wego
display-name: wego
homepage: https://github.com/schachmat/wego
repo: https://github.com/schachmat/wego
docs: https://github.com/schachmat/wego
package-manager:
  apk: wego
  brew: wego
  debian: wego
  nix: wego
package-manager-url: https://formulae.brew.sh/formula/wego
version: 2.4
license: ISC
category: development
tags:
  - cli
description: Weather app for the terminal
source-archive: https://github.com/schachmat/wego/archive/refs/tags/2.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wego
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wego
  av: sudo av install brew:wego
  brew: brew install wego
  debian: sudo apt install wego
  nix: nix profile install nixpkgs#wego
provenance:
  formula: wego
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
