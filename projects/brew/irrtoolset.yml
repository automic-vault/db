id: brew:irrtoolset
display-name: irrtoolset
homepage: https://github.com/irrtoolset/irrtoolset
repo: https://github.com/irrtoolset/irrtoolset
docs: https://github.com/irrtoolset/irrtoolset
package-manager:
  brew: irrtoolset
  macports: irrtoolset
package-manager-url: https://formulae.brew.sh/formula/irrtoolset
version: 5.1.3
license: MIT AND HPND AND GPL-2.0-or-later AND LGPL-2.0-or-later
category: development
tags:
  - cli
description: Tools to work with Internet routing policies
source-archive: https://github.com/irrtoolset/irrtoolset/archive/refs/tags/release-5.1.3.tar.gz
build-dependencies:
  - autoconf
  - automake
  - bison
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: peval
  - exposure: global executable
    kind: cli
    name: rpslcheck
  - exposure: global executable
    kind: cli
    name: rtconfig
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:irrtoolset
  brew: brew install irrtoolset
  macports: sudo port install irrtoolset
provenance:
  formula: irrtoolset
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
