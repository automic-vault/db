id: brew:jenv
display-name: jenv
homepage: https://github.com/jenv/jenv
repo: https://github.com/jenv/jenv
docs: https://github.com/jenv/jenv
package-manager:
  brew: jenv
  macports: jenv
  pacman: jenv
  scoop: extras/jenv
package-manager-url: https://formulae.brew.sh/formula/jenv
version: 0.6.0
license: MIT
category: development
tags:
  - cli
description: Manage your Java environment
source-archive: https://github.com/jenv/jenv/archive/refs/tags/0.6.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: jenv
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To activate jenv, add the following to your shell profile e.g. ~/.profile or
    ~/.zshrc: export PATH="$HOME/.jenv/bin:$PATH" eval "$(jenv init -)"
  post-install-defined: false
install-lines:
  av: sudo av install brew:jenv
  brew: brew install jenv
  macports: sudo port install jenv
  pacman: sudo pacman -S jenv
  scoop: scoop install extras/jenv
provenance:
  formula: jenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
