id: brew:openfast
display-name: openfast
homepage: https://openfast.readthedocs.io
repo: https://github.com/openfast/openfast
docs: https://openfast.readthedocs.io
package-manager:
  brew: openfast
package-manager-url: https://formulae.brew.sh/formula/openfast
version: 5.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: NREL-supported OpenFAST whole-turbine simulation code
source-archive: https://github.com/openfast/openfast.git
dependencies:
  - gcc
  - openblas
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: openfast
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:openfast
  brew: brew install openfast
provenance:
  formula: openfast
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
