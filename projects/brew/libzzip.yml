id: brew:libzzip
display-name: libzzip
homepage: https://github.com/gdraheim/zziplib
repo: https://github.com/gdraheim/zziplib
docs: https://github.com/gdraheim/zziplib
package-manager:
  brew: libzzip
  macports: libzzip
package-manager-url: https://formulae.brew.sh/formula/libzzip
version: 0.13.80
license: LGPL-2.0-or-later OR MPL-1.1
category: development
tags:
  - cli
description: Library providing read access on ZIP-archives
source-archive: https://github.com/gdraheim/zziplib/archive/refs/tags/v0.13.80.tar.gz
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: unzip-mem
  - exposure: global executable
    kind: cli
    name: unzzip
  - exposure: global executable
    kind: cli
    name: unzzip-big
  - exposure: global executable
    kind: cli
    name: unzzip-mem
  - exposure: global executable
    kind: cli
    name: unzzip-mix
  - exposure: global executable
    kind: cli
    name: zzcat
  - exposure: global executable
    kind: cli
    name: zzdir
  - exposure: global executable
    kind: cli
    name: zzxorcat
  - exposure: global executable
    kind: cli
    name: zzxorcopy
  - exposure: global executable
    kind: cli
    name: zzxordir
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libzzip
  brew: brew install libzzip
  macports: sudo port install libzzip
provenance:
  formula: libzzip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
