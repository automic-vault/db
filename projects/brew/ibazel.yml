id: brew:ibazel
display-name: ibazel
homepage: https://github.com/bazelbuild/bazel-watcher
repo: https://github.com/bazelbuild/bazel-watcher
docs: https://github.com/bazelbuild/bazel-watcher
package-manager:
  brew: ibazel
  scoop: extras/ibazel
package-manager-url: https://formulae.brew.sh/formula/ibazel
version: 0.29.0
license: Apache-2.0
category: development
tags:
  - cli
description: Tools for building Bazel targets when source files change
source-archive: https://github.com/bazelbuild/bazel-watcher/archive/refs/tags/v0.29.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ibazel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ibazel
  brew: brew install ibazel
  scoop: scoop install extras/ibazel
provenance:
  formula: ibazel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
