id: brew:deadfinder
display-name: deadfinder
homepage: https://github.com/hahwul/deadfinder
repo: https://github.com/hahwul/deadfinder
docs: https://github.com/hahwul/deadfinder
package-manager:
  brew: deadfinder
package-manager-url: https://formulae.brew.sh/formula/deadfinder
version: 2.0.2
license: MIT
category: development
tags:
  - cli
description: Finds broken links
source-archive: https://github.com/hahwul/deadfinder/archive/refs/tags/2.0.2.tar.gz
dependencies:
  - bdw-gc
  - libevent
  - libyaml
  - openssl@3
  - pcre2
build-dependencies:
  - cmake
  - crystal
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: deadfinder
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:deadfinder
  brew: brew install deadfinder
provenance:
  formula: deadfinder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
