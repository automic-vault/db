id: brew:bomber
display-name: bomber
homepage: https://github.com/devops-kung-fu/bomber
repo: https://github.com/devops-kung-fu/bomber
docs: https://github.com/devops-kung-fu/bomber
package-manager:
  brew: bomber
  debian: bomber
  dnf: bomber
  macports: bomber
  pacman: bomber
  ubuntu: bomber
  winget: KDE.Bomber
  zypper: bomber
package-manager-url: https://formulae.brew.sh/formula/bomber
version: 0.5.1
license: MPL-2.0
category: security
tags:
  - cli
  - security
description: Scans Software Bill of Materials for security vulnerabilities
source-archive: https://github.com/devops-kung-fu/bomber/archive/refs/tags/v0.5.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bomber
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bomber
  brew: brew install bomber
  debian: sudo apt install bomber
  dnf: sudo dnf install bomber
  macports: sudo port install bomber
  pacman: sudo pacman -S bomber
  ubuntu: sudo apt install bomber
  winget: winget install --id KDE.Bomber -e
  zypper: sudo zypper install bomber
provenance:
  formula: bomber
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
