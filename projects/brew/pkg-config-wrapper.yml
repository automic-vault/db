id: brew:pkg-config-wrapper
display-name: pkg-config-wrapper
homepage: https://github.com/influxdata/pkg-config
repo: https://github.com/influxdata/pkg-config
docs: https://github.com/influxdata/pkg-config
package-manager:
  brew: pkg-config-wrapper
package-manager-url: https://formulae.brew.sh/formula/pkg-config-wrapper
version: 0.3.0
license: MIT
category: development
tags:
  - cli
description: Easier way to include C code in your Go program
source-archive: https://github.com/influxdata/pkg-config/archive/refs/tags/v0.3.0.tar.gz
dependencies:
  - pkgconf
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pkg-config-wrapper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pkg-config-wrapper
  brew: brew install pkg-config-wrapper
provenance:
  formula: pkg-config-wrapper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
