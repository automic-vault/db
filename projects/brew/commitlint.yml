id: brew:commitlint
display-name: commitlint
homepage: https://commitlint.js.org/#/
repo: https://registry.npmjs.org/commitlint/-/commitlint-21.0.1.tgz
docs: https://commitlint.js.org/#/
package-manager:
  brew: commitlint
  nix: commitlint
  winget: Commitlint.Commitlint
package-manager-url: https://formulae.brew.sh/formula/commitlint
version: 21.0.1
license: MIT
category: development
tags:
  - cli
description: Lint commit messages according to a commit convention
source-archive: https://registry.npmjs.org/commitlint/-/commitlint-21.0.1.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: commitlint
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:commitlint
  brew: brew install commitlint
  nix: nix profile install nixpkgs#commitlint
  winget: winget install --id Commitlint.Commitlint -e
provenance:
  formula: commitlint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
