id: brew:whisperkit-cli
display-name: whisperkit-cli
homepage: https://github.com/argmaxinc/argmax-oss-swift
repo: https://github.com/argmaxinc/argmax-oss-swift
docs: https://github.com/argmaxinc/argmax-oss-swift
package-manager:
  brew: whisperkit-cli
package-manager-url: https://formulae.brew.sh/formula/whisperkit-cli
version: 1.0.0
license: MIT
category: development
tags:
  - cli
description: Swift native on-device speech recognition with Whisper for Apple Silicon
source-archive: https://github.com/argmaxinc/argmax-oss-swift/archive/refs/tags/v1.0.0.tar.gz
uses-from-macos:
  - swift
executables:
  - exposure: global executable
    kind: cli
    name: whisperkit-cli
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:whisperkit-cli
  brew: brew install whisperkit-cli
provenance:
  formula: whisperkit-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
