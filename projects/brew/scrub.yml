id: brew:scrub
display-name: scrub
homepage: https://github.com/chaos/scrub
repo: https://github.com/chaos/scrub
docs: https://github.com/chaos/scrub
package-manager:
  brew: scrub
  debian: scrub
  dnf: scrub
  macports: scrub
  nix: scrub
  ubuntu: scrub
  zypper: scrub
package-manager-url: https://formulae.brew.sh/formula/scrub
version: 2.6.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Writes patterns on magnetic media to thwart data recovery
source-archive: https://github.com/chaos/scrub/releases/download/2.6.1/scrub-2.6.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: scrub
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:scrub
  brew: brew install scrub
  debian: sudo apt install scrub
  dnf: sudo dnf install scrub
  macports: sudo port install scrub
  nix: nix profile install nixpkgs#scrub
  ubuntu: sudo apt install scrub
  zypper: sudo zypper install scrub
provenance:
  formula: scrub
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
