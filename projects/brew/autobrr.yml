id: brew:autobrr
display-name: autobrr
homepage: https://autobrr.com/
repo: https://github.com/autobrr/autobrr
docs: https://autobrr.com/
package-manager:
  apk: autobrr
  brew: autobrr
  nix: autobrr
package-manager-url: https://formulae.brew.sh/formula/autobrr
version: 1.79.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Modern, easy to use download automation for torrents and usenet
source-archive: https://github.com/autobrr/autobrr/archive/refs/tags/v1.79.0.tar.gz
build-dependencies:
  - go
  - node
  - pnpm
executables:
  - exposure: global executable
    kind: cli
    name: autobrr
  - exposure: global executable
    kind: cli
    name: autobrrctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add autobrr
  av: sudo av install brew:autobrr
  brew: brew install autobrr
  nix: nix profile install nixpkgs#autobrr
provenance:
  formula: autobrr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
