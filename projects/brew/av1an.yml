id: brew:av1an
display-name: av1an
homepage: https://github.com/rust-av/Av1an
repo: https://github.com/rust-av/Av1an
docs: https://github.com/rust-av/Av1an
package-manager:
  brew: av1an
  macports: av1an
  nix: av1an
  pacman: av1an
package-manager-url: https://formulae.brew.sh/formula/av1an
version: 0.5.2
license: GPL-3.0-only
category: development
tags:
  - cli
description: Cross-platform command-line encoding framework
source-archive: https://github.com/rust-av/Av1an/archive/refs/tags/v0.5.2.tar.gz
dependencies:
  - ffmpeg
  - mkvtoolnix
  - vapoursynth
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: av1an
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:av1an
  brew: brew install av1an
  macports: sudo port install av1an
  nix: nix profile install nixpkgs#av1an
  pacman: sudo pacman -S av1an
provenance:
  formula: av1an
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
