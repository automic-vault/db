id: brew:toml-test
display-name: toml-test
homepage: https://github.com/toml-lang/toml-test
repo: https://github.com/toml-lang/toml-test
docs: https://github.com/toml-lang/toml-test
package-manager:
  brew: toml-test
  nix: toml-test
package-manager-url: https://formulae.brew.sh/formula/toml-test
version: 2.2.0
license: MIT
category: development
tags:
  - cli
description: Language agnostic test suite for TOML parsers
source-archive: https://github.com/toml-lang/toml-test/archive/refs/tags/v2.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: toml-test
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:toml-test
  brew: brew install toml-test
  nix: nix profile install nixpkgs#toml-test
provenance:
  formula: toml-test
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
