id: brew:ldid
display-name: ldid
homepage: https://cydia.saurik.com/info/ldid/
repo: git://git.saurik.com/ldid
docs: https://cydia.saurik.com/info/ldid/
package-manager:
  brew: ldid
  macports: ldid
  nix: ldid
package-manager-url: https://formulae.brew.sh/formula/ldid
version: 2.1.5
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Lets you manipulate the signature block in a Mach-O binary
source-archive: git://git.saurik.com/ldid.git
dependencies:
  - libplist
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: ldid
  - exposure: global executable
    kind: cli
    name: ldid2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ldid
  brew: brew install ldid
  macports: sudo port install ldid
  nix: nix profile install nixpkgs#ldid
provenance:
  formula: ldid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
