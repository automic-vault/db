id: brew:liboil
display-name: liboil
homepage: https://wiki.freedesktop.org/liboil/
repo: https://liboil.freedesktop.org/download/liboil-0.3.17.tar.gz
docs: https://wiki.freedesktop.org/liboil/
package-manager:
  brew: liboil
  dnf: liboil
  macports: liboil
  nix: liboil
package-manager-url: https://formulae.brew.sh/formula/liboil
version: 0.3.17
license: BSD-2-Clause AND BSD-3-Clause
category: network
tags:
  - cli
description: C library of simple functions optimized for various CPUs
source-archive: https://liboil.freedesktop.org/download/liboil-0.3.17.tar.gz
build-dependencies:
  - autoconf
  - automake
  - gtk-doc
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: oil-bugreport
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:liboil
  brew: brew install liboil
  dnf: sudo dnf install liboil
  macports: sudo port install liboil
  nix: nix profile install nixpkgs#liboil
provenance:
  formula: liboil
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
