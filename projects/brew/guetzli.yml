id: brew:guetzli
display-name: guetzli
homepage: https://github.com/google/guetzli
repo: https://github.com/google/guetzli
docs: https://github.com/google/guetzli
package-manager:
  apk: guetzli
  brew: guetzli
  debian: guetzli
  macports: guetzli
  nix: guetzli
  pacman: guetzli
  scoop: main/guetzli
  ubuntu: guetzli
package-manager-url: https://formulae.brew.sh/formula/guetzli
version: 1.0.1
license: Apache-2.0
category: development
tags:
  - cli
description: Perceptual JPEG encoder
source-archive: https://github.com/google/guetzli/archive/refs/tags/v1.0.1.tar.gz
dependencies:
  - libpng
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: guetzli
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add guetzli
  av: sudo av install brew:guetzli
  brew: brew install guetzli
  debian: sudo apt install guetzli
  macports: sudo port install guetzli
  nix: nix profile install nixpkgs#guetzli
  pacman: sudo pacman -S guetzli
  scoop: scoop install main/guetzli
  ubuntu: sudo apt install guetzli
provenance:
  formula: guetzli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
