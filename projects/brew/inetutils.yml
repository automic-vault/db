    kind: cli
    name: gping
  - exposure: global executable
    kind: cli
    name: gping6
  - exposure: global executable
    kind: cli
    name: grcp
  - exposure: global executable
    kind: cli
    name: grexec
  - exposure: global executable
    kind: cli
    name: grlogin
  - exposure: global executable
    kind: cli
    name: grsh
  - exposure: global executable
    kind: cli
    name: gtalk
  - exposure: global executable
    kind: cli
    name: gtelnet
  - exposure: global executable
    kind: cli
    name: gtftp
  - exposure: global executable
    kind: cli
    name: gtraceroute
  - exposure: global executable
    kind: cli
    name: gwhois
  - exposure: global executable
