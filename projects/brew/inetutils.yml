id: brew:inetutils
display-name: inetutils
homepage: https://www.gnu.org/software/inetutils/
repo: https://ftpmirror.gnu.org/gnu/inetutils/inetutils-2.8.tar.gz
docs: https://www.gnu.org/software/inetutils/
package-manager:
  apk: gping
  brew: inetutils
  chocolatey: gping
  debian: ftp
  dnf: ftp
  macports: inetutils
  nix: inetutils
  pacman: inetutils
  scoop: main/gping
  ubuntu: ftp
  winget: orf.gping
  zypper: ftp
package-manager-url: https://formulae.brew.sh/formula/inetutils
version: 2.8
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU utilities for networking
source-archive: https://ftpmirror.gnu.org/gnu/inetutils/inetutils-2.8.tar.gz
dependencies:
  - libidn2
build-dependencies:
  - help2man
uses-from-macos:
  - libxcrypt
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ftp
  - exposure: global executable
    kind: cli
    name: ftpd
  - exposure: global executable
    kind: cli
    name: gdnsdomainname
