    kind: cli
    name: rlogind
  - exposure: global executable
    kind: cli
    name: rsh
  - exposure: global executable
    kind: cli
    name: rshd
  - exposure: global executable
    kind: cli
    name: syslogd
  - exposure: global executable
    kind: cli
    name: talk
  - exposure: global executable
    kind: cli
    name: talkd
  - exposure: global executable
