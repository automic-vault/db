  - exposure: global executable
    kind: cli
    name: uucpd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Only the following commands have been installed without the prefix 'g'.
    dnsdomainname ftp rcp rexec rlogin rsh telnet If you really need to use other
    commands with their normal names, you can add a "gnubin" directory to your PATH from
    your bashrc like: PATH="$HOMEBREW_PREFIX/opt/inetutils/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add gping
  av: sudo av install brew:inetutils
  brew: brew install inetutils
  chocolatey: choco install gping
  debian: sudo apt install ftp
  dnf: sudo dnf install ftp
  macports: sudo port install inetutils
  nix: nix profile install nixpkgs#inetutils
  pacman: sudo pacman -S inetutils
  scoop: scoop install main/gping
  ubuntu: sudo apt install ftp
  winget: winget install --id orf.gping -e
  zypper: sudo zypper install ftp
provenance:
  formula: inetutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
