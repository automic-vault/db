    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mailutils
  av: sudo av install brew:mailutils
  brew: brew install mailutils
  debian: sudo apt install mailutils
  macports: sudo port install mailutils
  nix: nix profile install nixpkgs#mailutils
  pacman: sudo pacman -S mailutils
  ubuntu: sudo apt install mailutils
  zypper: sudo zypper install mailutils
provenance:
  formula: mailutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
