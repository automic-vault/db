    kind: cli
    name: dotlock
  - exposure: global executable
    kind: cli
    name: frm
  - exposure: global executable
    kind: cli
    name: from
  - exposure: global executable
    kind: cli
    name: imap4d
  - exposure: global executable
    kind: cli
    name: lmtpd
  - exposure: global executable
    kind: cli
    name: mail
  - exposure: global executable
    kind: cli
    name: mailutils
  - exposure: global executable
    kind: cli
    name: mailutils-config
  - exposure: global executable
    kind: cli
