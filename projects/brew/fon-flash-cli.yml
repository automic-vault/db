id: brew:fon-flash-cli
display-name: fon-flash-cli
homepage: https://www.gargoyle-router.com/wiki/doku.php?id=fon_flash
repo: https://github.com/ericpaulbishop/gargoyle
docs: https://www.gargoyle-router.com/wiki/doku.php?id=fon_flash
package-manager:
  brew: fon-flash-cli
package-manager-url: https://formulae.brew.sh/formula/fon-flash-cli
version: 1.14.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Flash La Fonera and Atheros chipset compatible devices
source-archive: https://github.com/ericpaulbishop/gargoyle/archive/refs/tags/1.14.0.tar.gz
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: fon-flash
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fon-flash-cli
  brew: brew install fon-flash-cli
provenance:
  formula: fon-flash-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
