id: brew:bioawk
display-name: bioawk
homepage: https://github.com/lh3/bioawk
repo: https://github.com/lh3/bioawk
docs: https://github.com/lh3/bioawk
package-manager:
  brew: bioawk
  debian: bioawk
  nix: bioawk
  ubuntu: bioawk
package-manager-url: https://formulae.brew.sh/formula/bioawk
version: 1.0
license: HPND
category: development
tags:
  - cli
description: AWK modified for biological data
source-archive: https://github.com/lh3/bioawk/archive/refs/tags/v1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bioawk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bioawk
  brew: brew install bioawk
  debian: sudo apt install bioawk
  nix: nix profile install nixpkgs#bioawk
  ubuntu: sudo apt install bioawk
provenance:
  formula: bioawk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
