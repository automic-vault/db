id: brew:zls
display-name: zls
homepage: https://zigtools.org/zls/
repo: https://github.com/zigtools/zls
docs: https://zigtools.org/zls/
package-manager:
  apk: zls
  brew: zls
  nix: zls
  pacman: zls
  scoop: main/zls
  winget: zigtools.zls
  zypper: zls
package-manager-url: https://formulae.brew.sh/formula/zls
version: 0.16.0
license: MIT
category: development
tags:
  - cli
description: Language Server for Zig
source-archive: https://github.com/zigtools/zls/archive/refs/tags/0.16.0.tar.gz
dependencies:
  - zig
executables:
  - exposure: global executable
    kind: cli
    name: zls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zls
  av: sudo av install brew:zls
  brew: brew install zls
  nix: nix profile install nixpkgs#zls
  pacman: sudo pacman -S zls
  scoop: scoop install main/zls
  winget: winget install --id zigtools.zls -e
  zypper: sudo zypper install zls
provenance:
  formula: zls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
