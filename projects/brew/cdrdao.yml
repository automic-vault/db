id: brew:cdrdao
display-name: cdrdao
homepage: https://cdrdao.sourceforge.net/
repo: https://github.com/cdrdao/cdrdao
docs: https://cdrdao.sourceforge.net/
package-manager:
  apk: cdrdao
  brew: cdrdao
  debian: cdrdao
  dnf: cdrdao
  macports: cdrdao
  nix: cdrdao
  pacman: cdrdao
  ubuntu: cdrdao
  zypper: cdrdao
package-manager-url: https://formulae.brew.sh/formula/cdrdao
version: 1.2.6
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Record CDs in Disk-At-Once mode
source-archive: https://github.com/cdrdao/cdrdao/archive/refs/tags/rel_1_2_6.tar.gz
dependencies:
  - lame
  - libao
  - libvorbis
  - mad
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cdrdao
  - exposure: global executable
    kind: cli
    name: cue2toc
  - exposure: global executable
    kind: cli
    name: toc2cddb
  - exposure: global executable
    kind: cli
    name: toc2cue
  - exposure: global executable
    kind: cli
    name: toc2mp3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cdrdao
  av: sudo av install brew:cdrdao
  brew: brew install cdrdao
  debian: sudo apt install cdrdao
  dnf: sudo dnf install cdrdao
  macports: sudo port install cdrdao
  nix: nix profile install nixpkgs#cdrdao
  pacman: sudo pacman -S cdrdao
  ubuntu: sudo apt install cdrdao
  zypper: sudo zypper install cdrdao
provenance:
  formula: cdrdao
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
