id: brew:uftrace
display-name: uftrace
homepage: https://uftrace.github.io/slide/
repo: https://github.com/namhyung/uftrace
docs: https://uftrace.github.io/slide/
package-manager:
  brew: uftrace
  debian: uftrace
  nix: uftrace
  ubuntu: uftrace
  zypper: uftrace
package-manager-url: https://formulae.brew.sh/formula/uftrace
version: 0.19
license: GPL-2.0-only
category: development
tags:
  - cli
description: Function graph tracer for C/C++/Rust
source-archive: https://github.com/namhyung/uftrace/archive/refs/tags/v0.19.tar.gz
dependencies:
  - capstone
  - elfutils
  - libunwind
  - luajit
  - ncurses
  - python@3.14
build-dependencies:
  - pandoc
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: uftrace
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:uftrace
  brew: brew install uftrace
  debian: sudo apt install uftrace
  nix: nix profile install nixpkgs#uftrace
  ubuntu: sudo apt install uftrace
  zypper: sudo zypper install uftrace
provenance:
  formula: uftrace
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
