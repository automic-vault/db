id: brew:abi-dumper
display-name: abi-dumper
homepage: https://github.com/lvc/abi-dumper
repo: https://github.com/lvc/abi-dumper
docs: https://github.com/lvc/abi-dumper
package-manager:
  apk: abi-dumper
  brew: abi-dumper
  debian: abi-dumper
  dnf: abi-dumper
  nix: abi-dumper
  pacman: abi-dumper
  ubuntu: abi-dumper
  zypper: abi-dumper
package-manager-url: https://formulae.brew.sh/formula/abi-dumper
version: 1.4
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Dump ABI of an ELF object containing DWARF debug info
source-archive: https://github.com/lvc/abi-dumper/archive/refs/tags/1.4.tar.gz
dependencies:
  - elfutils
  - perl
  - universal-ctags
  - vtable-dumper
executables:
  - exposure: global executable
    kind: cli
    name: abi-dumper
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add abi-dumper
  av: sudo av install brew:abi-dumper
  brew: brew install abi-dumper
  debian: sudo apt install abi-dumper
  dnf: sudo dnf install abi-dumper
  nix: nix profile install nixpkgs#abi-dumper
  pacman: sudo pacman -S abi-dumper
  ubuntu: sudo apt install abi-dumper
  zypper: sudo zypper install abi-dumper
provenance:
  formula: abi-dumper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
