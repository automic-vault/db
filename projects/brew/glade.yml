id: brew:glade
display-name: glade
homepage: https://glade.gnome.org/
repo: https://download.gnome.org/sources/glade/3.40/glade-3.40.0.tar.xz
docs: https://glade.gnome.org/
package-manager:
  apk: glade
  brew: glade
  debian: glade
  dnf: glade
  macports: glade
  nix: glade
  pacman: glade
  ubuntu: glade
  winget: gnome.Glade
  zypper: glade
package-manager-url: https://formulae.brew.sh/formula/glade
version: 3.40.0
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: RAD tool for the GTK+ and GNOME environment
source-archive: https://download.gnome.org/sources/glade/3.40/glade-3.40.0.tar.xz
dependencies:
  - adwaita-icon-theme
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - hicolor-icon-theme
  - libxml2
  - pango
build-dependencies:
  - docbook-xsl
  - gettext
  - gobject-introspection
  - itstool
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: glade
  - exposure: global executable
    kind: cli
    name: glade-previewer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add glade
  av: sudo av install brew:glade
  brew: brew install glade
  debian: sudo apt install glade
  dnf: sudo dnf install glade
  macports: sudo port install glade
  nix: nix profile install nixpkgs#glade
  pacman: sudo pacman -S glade
  ubuntu: sudo apt install glade
  winget: winget install --id gnome.Glade -e
  zypper: sudo zypper install glade
provenance:
  formula: glade
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
