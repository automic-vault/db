id: brew:goshs
display-name: goshs
homepage: https://goshs.de
repo: https://github.com/patrickhener/goshs
docs: https://goshs.de
package-manager:
  apk: goshs
  brew: goshs
  nix: goshs
  scoop: extras/goshs
  winget: PatrickHener.Goshs
  zypper: goshs
package-manager-url: https://formulae.brew.sh/formula/goshs
version: 2.0.8
license: MIT
category: development
tags:
  - cli
description: Simple, yet feature-rich web server written in Go
source-archive: https://github.com/patrickhener/goshs/archive/refs/tags/v2.0.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goshs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add goshs
  av: sudo av install brew:goshs
  brew: brew install goshs
  nix: nix profile install nixpkgs#goshs
  scoop: scoop install extras/goshs
  winget: winget install --id PatrickHener.Goshs -e
  zypper: sudo zypper install goshs
provenance:
  formula: goshs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
