id: brew:mmseqs2
display-name: mmseqs2
homepage: https://mmseqs.com/
repo: https://github.com/soedinglab/MMseqs2
docs: https://mmseqs.com/
package-manager:
  brew: mmseqs2
  debian: mmseqs2
  nix: mmseqs2
  ubuntu: mmseqs2
package-manager-url: https://formulae.brew.sh/formula/mmseqs2
version: 18-8cc5c
license: MIT
category: development
tags:
  - cli
description: Software suite for very fast sequence search and clustering
source-archive: https://github.com/soedinglab/MMseqs2/archive/refs/tags/18-8cc5c.tar.gz
dependencies:
  - libomp
  - wget
build-dependencies:
  - cmake
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: mmseqs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mmseqs2
  brew: brew install mmseqs2
  debian: sudo apt install mmseqs2
  nix: nix profile install nixpkgs#mmseqs2
  ubuntu: sudo apt install mmseqs2
provenance:
  formula: mmseqs2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
