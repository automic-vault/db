id: brew:endlessh
display-name: endlessh
homepage: https://github.com/skeeto/endlessh
repo: https://github.com/skeeto/endlessh
docs: https://github.com/skeeto/endlessh
package-manager:
  apk: endlessh
  brew: endlessh
  debian: endlessh
  dnf: endlessh
  nix: endlessh
  ubuntu: endlessh
