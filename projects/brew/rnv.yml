id: brew:rnv
display-name: rnv
homepage: https://sourceforge.net/projects/rnv/
repo: https://downloads.sourceforge.net/project/rnv/Sources/1.7.11/rnv-1.7.11.tar.bz2
docs: https://sourceforge.net/projects/rnv/
package-manager:
  brew: rnv
  nix: rnv
package-manager-url: https://formulae.brew.sh/formula/rnv
version: 1.7.11
license: BSD-3-Clause
category: network
tags:
  - cli
description: Implementation of Relax NG Compact Syntax validator
source-archive: https://downloads.sourceforge.net/project/rnv/Sources/1.7.11/rnv-1.7.11.tar.bz2
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: rnv
  - exposure: global executable
    kind: cli
    name: rvp
  - exposure: global executable
    kind: cli
    name: xsdck
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rnv
  brew: brew install rnv
  nix: nix profile install nixpkgs#rnv
provenance:
  formula: rnv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
