id: brew:gpsim
display-name: gpsim
homepage: https://gpsim.sourceforge.net/
repo: https://downloads.sourceforge.net/project/gpsim/gpsim/0.32.0/gpsim-0.32.1.tar.gz
docs: https://gpsim.sourceforge.net/
package-manager:
  brew: gpsim
  debian: gpsim
  dnf: gpsim
  macports: gpsim
  pacman: gpsim
  ubuntu: gpsim
package-manager-url: https://formulae.brew.sh/formula/gpsim
version: 0.32.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Simulator for Microchip's PIC microcontrollers
source-archive: https://downloads.sourceforge.net/project/gpsim/gpsim/0.32.0/gpsim-0.32.1.tar.gz
dependencies:
  - gettext
  - glib
  - popt
  - readline
build-dependencies:
  - gputils
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gpsim
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gpsim
  brew: brew install gpsim
  debian: sudo apt install gpsim
  dnf: sudo dnf install gpsim
  macports: sudo port install gpsim
  pacman: sudo pacman -S gpsim
  ubuntu: sudo apt install gpsim
provenance:
  formula: gpsim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
