id: brew:jadx
display-name: jadx
homepage: https://github.com/skylot/jadx
repo: https://github.com/skylot/jadx
docs: https://github.com/skylot/jadx
package-manager:
  apk: jadx
  brew: jadx
  nix: jadx
  pacman: jadx
  scoop: extras/jadx
  winget: Skylot.jadx
package-manager-url: https://formulae.brew.sh/formula/jadx
version: 1.5.5
license: Apache-2.0
category: development
tags:
  - cli
description: Dex to Java decompiler
source-archive: https://github.com/skylot/jadx/archive/refs/tags/v1.5.5.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - gradle
executables:
  - exposure: global executable
    kind: cli
    name: jadx
  - exposure: global executable
    kind: cli
    name: jadx-gui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jadx
  av: sudo av install brew:jadx
  brew: brew install jadx
  nix: nix profile install nixpkgs#jadx
  pacman: sudo pacman -S jadx
  scoop: scoop install extras/jadx
  winget: winget install --id Skylot.jadx -e
provenance:
  formula: jadx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
