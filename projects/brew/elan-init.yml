id: brew:elan-init
display-name: elan-init
homepage: https://github.com/leanprover/elan
repo: https://github.com/leanprover/elan
docs: https://github.com/leanprover/elan
package-manager:
  brew: elan-init
  debian: elan
  macports: lean
  nix: elan
  scoop: main/elan
  ubuntu: elan
  winget: Lean.Elan
package-manager-url: https://formulae.brew.sh/formula/elan-init
version: 4.2.1
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Lean Theorem Prover installer and version manager
source-archive: https://github.com/leanprover/elan/archive/refs/tags/v4.2.1.tar.gz
dependencies:
  - coreutils
  - gmp
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: elan
  - exposure: global executable
    kind: cli
    name: elan-init
  - exposure: global executable
    kind: cli
    name: lake
  - exposure: global executable
    kind: cli
    name: lean
  - exposure: global executable
    kind: cli
    name: leanc
  - exposure: global executable
    kind: cli
    name: leanchecker
  - exposure: global executable
    kind: cli
    name: leanmake
  - exposure: global executable
    kind: cli
    name: leanpkg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:elan-init
  brew: brew install elan-init
  debian: sudo apt install elan
  macports: sudo port install lean
  nix: nix profile install nixpkgs#elan
  scoop: scoop install main/elan
  ubuntu: sudo apt install elan
  winget: winget install --id Lean.Elan -e
provenance:
  formula: elan-init
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
