id: brew:coin3d
display-name: coin3d
homepage: https://coin3d.github.io/
repo: https://github.com/coin3d/coin
docs: https://coin3d.github.io/
package-manager:
  brew: coin3d
  nix: coin3d
package-manager-url: https://formulae.brew.sh/formula/coin3d
version: 4.0.8
license: BSD-3-Clause
category: development
tags:
  - cli
description: Open Inventor 2.1 API implementation (Coin)
source-archive: https://github.com/coin3d/coin/releases/download/v4.0.8/coin-4.0.8-src.tar.gz
dependencies:
  - qtbase
build-dependencies:
  - boost
  - cmake
  - doxygen
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: coin-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: The Python bindings (Pivy) are now in the `pivy` formula.
  post-install-defined: false
install-lines:
  av: sudo av install brew:coin3d
  brew: brew install coin3d
  nix: nix profile install nixpkgs#coin3d
provenance:
  formula: coin3d
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
