id: brew:sslsplit
display-name: sslsplit
homepage: https://www.roe.ch/SSLsplit
repo: https://github.com/droe/sslsplit
docs: https://www.roe.ch/SSLsplit
package-manager:
  brew: sslsplit
  debian: sslsplit
  dnf: sslsplit
  nix: sslsplit
  pacman: sslsplit
  ubuntu: sslsplit
package-manager-url: https://formulae.brew.sh/formula/sslsplit
version: 0.5.5
license: BSD-2-Clause
category: security
tags:
  - cli
description: Man-in-the-middle attacks against SSL encrypted network connections
source-archive: https://github.com/droe/sslsplit/archive/refs/tags/0.5.5.tar.gz
dependencies:
  - libevent
  - libnet
  - libpcap
  - openssl@3
build-dependencies:
  - check
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: sslsplit
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sslsplit
  brew: brew install sslsplit
  debian: sudo apt install sslsplit
  dnf: sudo dnf install sslsplit
  nix: nix profile install nixpkgs#sslsplit
  pacman: sudo pacman -S sslsplit
  ubuntu: sudo apt install sslsplit
provenance:
  formula: sslsplit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
