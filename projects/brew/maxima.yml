id: brew:maxima
display-name: maxima
homepage: https://maxima.sourceforge.io/
repo: >
  https://downloads.sourceforge.net/project/maxima/Maxima-source/5.49.0-source/maxima-5.49.0.tar.gz
docs: https://maxima.sourceforge.io/
package-manager:
  apk: maxima
  brew: maxima
  chocolatey: maxima
  debian: maxima
  dnf: maxima
  macports: maxima
  nix: maxima
  pacman: maxima
  scoop: extras/maxima
  ubuntu: maxima
  winget: MaximaTeam.Maxima
  zypper: maxima
package-manager-url: https://formulae.brew.sh/formula/maxima
version: 5.49.0
license: GPL-2.0-only
category: network
tags:
  - cli
description: Computer algebra system
source-archive: >
  https://downloads.sourceforge.net/project/maxima/Maxima-source/5.49.0-source/maxima-5.49.0.tar.gz
dependencies:
  - gettext
  - gnuplot
  - rlwrap
  - sbcl
build-dependencies:
  - gawk
  - gnu-sed
  - texinfo
executables:
  - exposure: global executable
    kind: cli
    name: maxima
  - exposure: global executable
    kind: cli
    name: rmaxima
  - exposure: global executable
    kind: cli
    name: xmaxima
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add maxima
  av: sudo av install brew:maxima
  brew: brew install maxima
  chocolatey: choco install maxima
  debian: sudo apt install maxima
  dnf: sudo dnf install maxima
  macports: sudo port install maxima
  nix: nix profile install nixpkgs#maxima
  pacman: sudo pacman -S maxima
  scoop: scoop install extras/maxima
  ubuntu: sudo apt install maxima
  winget: winget install --id MaximaTeam.Maxima -e
  zypper: sudo zypper install maxima
provenance:
  formula: maxima
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
