id: brew:openslide
display-name: openslide
homepage: https://openslide.org/
repo: https://github.com/openslide/openslide
docs: https://openslide.org/
package-manager:
  brew: openslide
  dnf: openslide
  macports: openslide
  nix: openslide
  pacman: openslide
package-manager-url: https://formulae.brew.sh/formula/openslide
version: 4.0.0
license: LGPL-2.1-only
category: development
tags:
  - cli
description: C library to read whole-slide images (a.k.a. virtual slides)
source-archive: https://github.com/openslide/openslide/releases/download/v4.0.0/openslide-4.0.0.tar.xz
dependencies:
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - jpeg-turbo
  - libdicom
  - libpng
  - libtiff
  - libxml2
  - openjpeg
  - sqlite
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: openslide-quickhash1sum
  - exposure: global executable
    kind: cli
    name: openslide-show-properties
  - exposure: global executable
    kind: cli
    name: openslide-write-png
  - exposure: global executable
    kind: cli
    name: slidetool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:openslide
  brew: brew install openslide
  dnf: sudo dnf install openslide
  macports: sudo port install openslide
  nix: nix profile install nixpkgs#openslide
  pacman: sudo pacman -S openslide
provenance:
  formula: openslide
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
