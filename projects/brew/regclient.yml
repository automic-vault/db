id: brew:regclient
display-name: regclient
homepage: https://regclient.org/
repo: https://github.com/regclient/regclient
docs: https://regclient.org/
package-manager:
  apk: regclient
  brew: regclient
  macports: regclient
  nix: regclient
  scoop: extras/regclient
  zypper: regclient
package-manager-url: https://formulae.brew.sh/formula/regclient
version: 0.11.5
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: Docker and OCI Registry Client in Go and tooling using those libraries
source-archive: https://github.com/regclient/regclient/archive/refs/tags/v0.11.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: regbot
  - exposure: global executable
    kind: cli
    name: regctl
  - exposure: global executable
    kind: cli
    name: regsync
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add regclient
  av: sudo av install brew:regclient
  brew: brew install regclient
  macports: sudo port install regclient
  nix: nix profile install nixpkgs#regclient
  scoop: scoop install extras/regclient
  zypper: sudo zypper install regclient
provenance:
  formula: regclient
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
