id: brew:iblinter
display-name: iblinter
homepage: https://github.com/IBDecodable/IBLinter
repo: https://github.com/IBDecodable/IBLinter
docs: https://github.com/IBDecodable/IBLinter
package-manager:
  brew: iblinter
package-manager-url: https://formulae.brew.sh/formula/iblinter
version: 0.5.0
license: MIT
category: development
tags:
  - cli
description: Linter tool for Interface Builder
source-archive: https://github.com/IBDecodable/IBLinter/archive/refs/tags/0.5.0.tar.gz
uses-from-macos:
  - swift
executables:
  - exposure: global executable
    kind: cli
    name: iblinter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:iblinter
  brew: brew install iblinter
provenance:
  formula: iblinter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
