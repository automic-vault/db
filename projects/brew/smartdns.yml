id: brew:smartdns
display-name: smartdns
homepage: https://github.com/mokeyish/smartdns-rs
repo: https://github.com/mokeyish/smartdns-rs
docs: https://github.com/mokeyish/smartdns-rs
package-manager:
  brew: smartdns
  debian: smartdns
  nix: smartdns
  pacman: smartdns
  ubuntu: smartdns
package-manager-url: https://formulae.brew.sh/formula/smartdns
version: 0.13.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Rule-based DNS server for fast IP resolution, DoT/DoQ/DoH/DoH3 supported
source-archive: https://github.com/mokeyish/smartdns-rs/archive/refs/tags/v0.13.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: smartdns
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:smartdns
  brew: brew install smartdns
  debian: sudo apt install smartdns
  nix: nix profile install nixpkgs#smartdns
  pacman: sudo pacman -S smartdns
  ubuntu: sudo apt install smartdns
provenance:
  formula: smartdns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
