id: brew:senpai
display-name: senpai
homepage: https://sr.ht/~delthas/senpai/
repo: https://git.sr.ht/~delthas/senpai/archive/v0.4.1.tar.gz
docs: https://sr.ht/~delthas/senpai/
package-manager:
  apk: senpai
  brew: senpai
  debian: senpai
  macports: senpai
  nix: senpai
  pacman: senpai
  zypper: senpai
package-manager-url: https://formulae.brew.sh/formula/senpai
version: 0.4.1
license: MIT
category: development
tags:
  - cli
description: Modern terminal IRC client
source-archive: https://git.sr.ht/~delthas/senpai/archive/v0.4.1.tar.gz
build-dependencies:
  - go
  - scdoc
executables:
  - exposure: global executable
    kind: cli
    name: senpai
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add senpai
  av: sudo av install brew:senpai
  brew: brew install senpai
  debian: sudo apt install senpai
  macports: sudo port install senpai
  nix: nix profile install nixpkgs#senpai
  pacman: sudo pacman -S senpai
  zypper: sudo zypper install senpai
provenance:
  formula: senpai
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
