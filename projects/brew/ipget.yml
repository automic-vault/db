id: brew:ipget
display-name: ipget
homepage: https://github.com/ipfs/ipget/
repo: https://github.com/ipfs/ipget
docs: https://github.com/ipfs/ipget/
package-manager:
  brew: ipget
  nix: ipget
package-manager-url: https://formulae.brew.sh/formula/ipget
version: 0.13.1
license: MIT
category: development
tags:
  - cli
description: Retrieve files over IPFS and save them locally
source-archive: https://github.com/ipfs/ipget/archive/refs/tags/v0.13.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ipget
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ipget
  brew: brew install ipget
  nix: nix profile install nixpkgs#ipget
provenance:
  formula: ipget
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
