install-lines:
  av: sudo av install brew:cyan
  brew: brew install cyan
  macports: sudo port install cyan
  nix: nix profile install nixpkgs#cyan
provenance:
  formula: cyan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
