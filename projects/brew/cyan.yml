id: brew:cyan
display-name: cyan
homepage: https://github.com/asdfzxcvbn/pyzule-rw
repo: https://github.com/asdfzxcvbn/pyzule-rw
docs: https://github.com/asdfzxcvbn/pyzule-rw
package-manager:
  brew: cyan
  macports: cyan
  nix: cyan
package-manager-url: https://formulae.brew.sh/formula/cyan
version: 1.4.4
license: Unlicense
category: development
tags:
  - cli
description: iOS app injector and modifier
source-archive: https://github.com/asdfzxcvbn/pyzule-rw/archive/refs/tags/v1.4.4.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: cgen
  - exposure: global executable
    kind: cli
    name: cyan
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
