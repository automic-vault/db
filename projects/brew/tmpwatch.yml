    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tmpwatch
  brew: brew install tmpwatch
  dnf: sudo dnf install tmpwatch
  nix: nix profile install nixpkgs#tmpwatch
  zypper: sudo zypper install tmpwatch
provenance:
  formula: tmpwatch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
