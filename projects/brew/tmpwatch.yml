id: brew:tmpwatch
display-name: tmpwatch
homepage: https://pagure.io/tmpwatch
repo: https://releases.pagure.org/tmpwatch/tmpwatch-2.11.tar.bz2
docs: https://pagure.io/tmpwatch
package-manager:
  brew: tmpwatch
  dnf: tmpwatch
  nix: tmpwatch
  zypper: tmpwatch
package-manager-url: https://formulae.brew.sh/formula/tmpwatch
version: 2.11
license: GPL-2.0-only
category: network
tags:
