id: brew:distrobox
display-name: distrobox
homepage: https://distrobox.privatedns.org/
repo: https://github.com/89luca89/distrobox
docs: https://distrobox.privatedns.org/
package-manager:
  apk: distrobox
  brew: distrobox
  debian: distrobox
  dnf: distrobox
  nix: distrobox
  pacman: distrobox
  ubuntu: distrobox
  zypper: distrobox
package-manager-url: https://formulae.brew.sh/formula/distrobox
version: 1.8.2.5
license: GPL-3.0-only
category: development
tags:
  - cli
description: Use any Linux distribution inside your terminal
source-archive: https://github.com/89luca89/distrobox/archive/refs/tags/1.8.2.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: distrobox
  - exposure: global executable
    kind: cli
    name: distrobox-assemble
  - exposure: global executable
    kind: cli
    name: distrobox-create
  - exposure: global executable
    kind: cli
    name: distrobox-enter
  - exposure: global executable
    kind: cli
    name: distrobox-ephemeral
  - exposure: global executable
    kind: cli
    name: distrobox-export
  - exposure: global executable
    kind: cli
    name: distrobox-generate-entry
  - exposure: global executable
    kind: cli
    name: distrobox-host-exec
  - exposure: global executable
    kind: cli
    name: distrobox-init
  - exposure: global executable
    kind: cli
    name: distrobox-list
  - exposure: global executable
    kind: cli
    name: distrobox-rm
  - exposure: global executable
    kind: cli
    name: distrobox-stop
  - exposure: global executable
    kind: cli
    name: distrobox-upgrade
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Distrobox requires one of podman or docker. Do brew install podman or consult the
    documentation for details.
  post-install-defined: false
install-lines:
  apk: sudo apk add distrobox
  av: sudo av install brew:distrobox
  brew: brew install distrobox
  debian: sudo apt install distrobox
  dnf: sudo dnf install distrobox
  nix: nix profile install nixpkgs#distrobox
  pacman: sudo pacman -S distrobox
  ubuntu: sudo apt install distrobox
  zypper: sudo zypper install distrobox
provenance:
  formula: distrobox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
