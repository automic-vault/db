id: brew:tweak
display-name: tweak
homepage: https://www.chiark.greenend.org.uk/~sgtatham/tweak/
repo: https://www.chiark.greenend.org.uk/~sgtatham/tweak/tweak-3.02.tar.gz
docs: https://www.chiark.greenend.org.uk/~sgtatham/tweak/
package-manager:
  brew: tweak
  debian: tweak
  dnf: tweak
  nix: tweak
  ubuntu: tweak
package-manager-url: https://formulae.brew.sh/formula/tweak
version: 3.02
license: MIT
category: network
tags:
  - cli
description: Command-line, ncurses library based hex editor
source-archive: https://www.chiark.greenend.org.uk/~sgtatham/tweak/tweak-3.02.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: tweak
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tweak
  brew: brew install tweak
  debian: sudo apt install tweak
  dnf: sudo dnf install tweak
  nix: nix profile install nixpkgs#tweak
  ubuntu: sudo apt install tweak
provenance:
  formula: tweak
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
