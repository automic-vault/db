id: brew:fswatch
display-name: fswatch
homepage: https://github.com/emcrisostomo/fswatch
repo: https://github.com/emcrisostomo/fswatch
docs: https://github.com/emcrisostomo/fswatch
package-manager:
  brew: fswatch
  debian: fswatch
  dnf: fswatch
  macports: fswatch
  nix: fswatch
  ubuntu: fswatch
  winget: emcrisostomo.fswatch
  zypper: fswatch
package-manager-url: https://formulae.brew.sh/formula/fswatch
version: 1.21.0
license: GPL-3.0-or-later AND Apache-2.0
category: development
tags:
  - cli
description: Monitor a directory for changes and run a shell command
source-archive: https://github.com/emcrisostomo/fswatch/releases/download/1.21.0/fswatch-1.21.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: fswatch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fswatch
  brew: brew install fswatch
  debian: sudo apt install fswatch
  dnf: sudo dnf install fswatch
  macports: sudo port install fswatch
  nix: nix profile install nixpkgs#fswatch
  ubuntu: sudo apt install fswatch
  winget: winget install --id emcrisostomo.fswatch -e
  zypper: sudo zypper install fswatch
provenance:
  formula: fswatch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
