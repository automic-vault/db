id: brew:pgcopydb
display-name: pgcopydb
homepage: https://github.com/dimitri/pgcopydb
repo: https://github.com/dimitri/pgcopydb
docs: https://github.com/dimitri/pgcopydb
package-manager:
  brew: pgcopydb
  debian: pgcopydb
  nix: pgcopydb
  ubuntu: pgcopydb
package-manager-url: https://formulae.brew.sh/formula/pgcopydb
version: 0.17
license: PostgreSQL
category: database
tags:
  - cli
  - database
description: Copy a Postgres database to a target Postgres server
source-archive: https://github.com/dimitri/pgcopydb/archive/refs/tags/v0.17.tar.gz
dependencies:
  - bdw-gc
  - libpq
build-dependencies:
  - sphinx-doc
executables:
  - exposure: global executable
    kind: cli
    name: pgcopydb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Pgcopydb searches for PostgreSQL command-line tools in your system's PATH
    environment variable. To use a specific PostgreSQL version's command-line tools,
    ensure they are accessible in your PATH. When no PostgreSQL tools are found in PATH,
    pgcopydb defaults to using the command-line tools provided by the libpq formula.
  post-install-defined: false
install-lines:
  av: sudo av install brew:pgcopydb
  brew: brew install pgcopydb
  debian: sudo apt install pgcopydb
  nix: nix profile install nixpkgs#pgcopydb
  ubuntu: sudo apt install pgcopydb
provenance:
  formula: pgcopydb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
