id: brew:azurite
display-name: azurite
homepage: https://github.com/Azure/Azurite
repo: https://registry.npmjs.org/azurite/-/azurite-3.35.0.tgz
docs: https://github.com/Azure/Azurite
package-manager:
  brew: azurite
  nix: azurite
package-manager-url: https://formulae.brew.sh/formula/azurite
version: 3.35.0
license: MIT
category: cloud
tags:
  - cli
description: Lightweight server clone of Azure Storage that simulates it locally
source-archive: https://registry.npmjs.org/azurite/-/azurite-3.35.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: azurite
  - exposure: global executable
    kind: cli
    name: azurite-blob
  - exposure: global executable
    kind: cli
    name: azurite-queue
  - exposure: global executable
    kind: cli
    name: azurite-table
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:azurite
  brew: brew install azurite
  nix: nix profile install nixpkgs#azurite
provenance:
  formula: azurite
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
