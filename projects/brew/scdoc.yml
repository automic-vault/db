id: brew:scdoc
display-name: scdoc
homepage: https://sr.ht/~sircmpwn/scdoc/
repo: https://git.sr.ht/~sircmpwn/scdoc/archive/1.11.4.tar.gz
docs: https://sr.ht/~sircmpwn/scdoc/
package-manager:
  apk: scdoc
  brew: scdoc
  debian: scdoc
  dnf: scdoc
  macports: scdoc
  nix: scdoc
  pacman: scdoc
  ubuntu: scdoc
  zypper: scdoc
package-manager-url: https://formulae.brew.sh/formula/scdoc
version: 1.11.4
license: MIT
category: development
tags:
  - cli
description: Small man page generator
source-archive: https://git.sr.ht/~sircmpwn/scdoc/archive/1.11.4.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: scdoc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add scdoc
  av: sudo av install brew:scdoc
  brew: brew install scdoc
  debian: sudo apt install scdoc
  dnf: sudo dnf install scdoc
  macports: sudo port install scdoc
  nix: nix profile install nixpkgs#scdoc
  pacman: sudo pacman -S scdoc
  ubuntu: sudo apt install scdoc
  zypper: sudo zypper install scdoc
provenance:
  formula: scdoc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
