id: brew:goku
display-name: goku
homepage: https://github.com/jcaromiq/goku
repo: https://github.com/jcaromiq/goku
docs: https://github.com/jcaromiq/goku
package-manager:
  brew: goku
  macports: goku
  nix: goku
package-manager-url: https://formulae.brew.sh/formula/goku
version: 3.0.0
license: MIT
category: development
tags:
  - cli
description: HTTP load testing tool
source-archive: https://github.com/jcaromiq/goku/archive/refs/tags/v3.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: goku
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:goku
  brew: brew install goku
  macports: sudo port install goku
  nix: nix profile install nixpkgs#goku
provenance:
  formula: goku
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
