id: brew:deployer
display-name: deployer
homepage: https://deployer.org/
repo: https://github.com/deployphp/deployer
docs: https://deployer.org/
package-manager:
  brew: deployer
  chocolatey: dep
  macports: dep
  nix: deployer
  scoop: main/dep
package-manager-url: https://formulae.brew.sh/formula/deployer
version: 8.0.5
license: MIT
category: development
tags:
  - cli
description: Deployment tool written in PHP with support for popular frameworks
source-archive: https://github.com/deployphp/deployer/releases/download/v8.0.5/deployer.phar
dependencies:
  - php
executables:
  - exposure: global executable
    kind: cli
    name: dep
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:deployer
  brew: brew install deployer
  chocolatey: choco install dep
  macports: sudo port install dep
  nix: nix profile install nixpkgs#deployer
  scoop: scoop install main/dep
provenance:
  formula: deployer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
