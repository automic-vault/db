id: brew:tarsnap-gui
display-name: tarsnap-gui
homepage: https://www.tarsnap.com/
repo: https://github.com/Tarsnap/tarsnap-gui
docs: https://www.tarsnap.com/
package-manager:
  brew: tarsnap-gui
package-manager-url: https://formulae.brew.sh/formula/tarsnap-gui
version: 1.0.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: Cross-platform GUI for the Tarsnap command-line client
source-archive: https://github.com/Tarsnap/tarsnap-gui/archive/refs/tags/v1.0.2.tar.gz
dependencies:
  - qt@5
  - tarsnap
executables:
  - exposure: global executable
    kind: cli
    name: tarsnap-gui
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tarsnap-gui
  brew: brew install tarsnap-gui
provenance:
  formula: tarsnap-gui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
