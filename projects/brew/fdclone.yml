id: brew:fdclone
display-name: fdclone
homepage: https://hp.vector.co.jp/authors/VA012337/soft/fd/
repo: https://deb.debian.org/debian/pool/main/f/fdclone/fdclone_3.01j.orig.tar.gz
docs: https://hp.vector.co.jp/authors/VA012337/soft/fd/
package-manager:
  brew: fdclone
  debian: fdclone
  macports: FDclone
  ubuntu: fdclone
package-manager-url: https://formulae.brew.sh/formula/fdclone
version: 3.01j
license: LicenseRef-Homebrew-cannot-represent
category: network
tags:
  - cli
description: Console-based file manager
source-archive: https://deb.debian.org/debian/pool/main/f/fdclone/fdclone_3.01j.orig.tar.gz
build-dependencies:
  - nkf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: fdsh
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sonoma
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To install the initial config file: install -c -m 0644
    $HOMEBREW_PREFIX/opt/fdclone/share/fdclone/fd2rc.dist ~/.fd2rc To set application
    messages to Japanese, edit your .fd2rc: MESSAGELANG="ja"
  post-install-defined: false
install-lines:
  av: sudo av install brew:fdclone
  brew: brew install fdclone
  debian: sudo apt install fdclone
  macports: sudo port install FDclone
  ubuntu: sudo apt install fdclone
provenance:
  formula: fdclone
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
