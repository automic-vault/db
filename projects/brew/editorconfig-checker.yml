id: brew:editorconfig-checker
display-name: editorconfig-checker
homepage: https://github.com/editorconfig-checker/editorconfig-checker
repo: https://github.com/editorconfig-checker/editorconfig-checker
docs: https://github.com/editorconfig-checker/editorconfig-checker
package-manager:
  apk: editorconfig-checker
  brew: editorconfig-checker
  macports: editorconfig-checker
  nix: editorconfig-checker
  pacman: editorconfig-checker
  winget: EditorConfig-Checker.EditorConfig-Checker
  zypper: editorconfig-checker
package-manager-url: https://formulae.brew.sh/formula/editorconfig-checker
version: 3.7.0
license: MIT
category: development
tags:
  - cli
description: Tool to verify that your files are in harmony with your .editorconfig
source-archive: >
  https://github.com/editorconfig-checker/editorconfig-checker/archive/refs/tags/v3.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: editorconfig-checker
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add editorconfig-checker
  av: sudo av install brew:editorconfig-checker
  brew: brew install editorconfig-checker
  macports: sudo port install editorconfig-checker
  nix: nix profile install nixpkgs#editorconfig-checker
  pacman: sudo pacman -S editorconfig-checker
  winget: winget install --id EditorConfig-Checker.EditorConfig-Checker -e
  zypper: sudo zypper install editorconfig-checker
provenance:
  formula: editorconfig-checker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
