id: brew:uncrustify
display-name: uncrustify
homepage: https://uncrustify.sourceforge.net/
repo: https://github.com/uncrustify/uncrustify
docs: https://uncrustify.sourceforge.net/
package-manager:
  apk: uncrustify
  brew: uncrustify
  chocolatey: uncrustify
  debian: uncrustify
  dnf: uncrustify
  macports: uncrustify
  nix: uncrustify
  pacman: uncrustify
  scoop: main/uncrustify
  ubuntu: uncrustify
  zypper: uncrustify
package-manager-url: https://formulae.brew.sh/formula/uncrustify
version: 0.83.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Source code beautifier
source-archive: https://github.com/uncrustify/uncrustify/archive/refs/tags/uncrustify-0.83.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: uncrustify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add uncrustify
  av: sudo av install brew:uncrustify
  brew: brew install uncrustify
  chocolatey: choco install uncrustify
  debian: sudo apt install uncrustify
  dnf: sudo dnf install uncrustify
  macports: sudo port install uncrustify
  nix: nix profile install nixpkgs#uncrustify
  pacman: sudo pacman -S uncrustify
  scoop: scoop install main/uncrustify
  ubuntu: sudo apt install uncrustify
  zypper: sudo zypper install uncrustify
provenance:
  formula: uncrustify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
