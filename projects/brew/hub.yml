id: brew:hub
display-name: hub
homepage: https://hub.github.com/
repo: https://github.com/mislav/hub
docs: https://hub.github.com/
package-manager:
  apk: hub
  brew: hub
  chocolatey: hub
  debian: hub
  macports: hub
  nix: hub
  pacman: hub
  scoop: main/hub
  ubuntu: hub
  winget: GitHub.hub
  zypper: hub
package-manager-url: https://formulae.brew.sh/formula/hub
version: 2.14.2
license: MIT
category: development
tags:
  - cli
  - git
description: Add GitHub support to git on the command-line
source-archive: https://github.com/mislav/hub/archive/refs/tags/v2.14.2.tar.gz
build-dependencies:
  - go
  - groff
executables:
  - exposure: global executable
    kind: cli
    name: hub
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hub
  av: sudo av install brew:hub
  brew: brew install hub
  chocolatey: choco install hub
  debian: sudo apt install hub
  macports: sudo port install hub
  nix: nix profile install nixpkgs#hub
  pacman: sudo pacman -S hub
  scoop: scoop install main/hub
  ubuntu: sudo apt install hub
  winget: winget install --id GitHub.hub -e
  zypper: sudo zypper install hub
provenance:
  formula: hub
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
