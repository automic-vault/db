id: brew:cscope
display-name: cscope
homepage: https://cscope.sourceforge.net/
repo: https://downloads.sourceforge.net/project/cscope/cscope/v15.9/cscope-15.9.tar.gz
docs: https://cscope.sourceforge.net/
package-manager:
  apk: cscope
  brew: cscope
  debian: cscope
  dnf: cscope
  macports: cscope
  nix: cscope
  pacman: cscope
  scoop: main/cscope
  ubuntu: cscope
  zypper: cscope
package-manager-url: https://formulae.brew.sh/formula/cscope
version: 15.9
license: BSD-3-Clause
category: network
tags:
  - cli
description: Tool for browsing source code
source-archive: https://downloads.sourceforge.net/project/cscope/cscope/v15.9/cscope-15.9.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cscope
  - exposure: global executable
    kind: cli
    name: ocs
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cscope
  av: sudo av install brew:cscope
  brew: brew install cscope
  debian: sudo apt install cscope
  dnf: sudo dnf install cscope
  macports: sudo port install cscope
  nix: nix profile install nixpkgs#cscope
  pacman: sudo pacman -S cscope
  scoop: scoop install main/cscope
  ubuntu: sudo apt install cscope
  zypper: sudo zypper install cscope
provenance:
  formula: cscope
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
