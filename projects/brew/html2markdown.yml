id: brew:html2markdown
display-name: html2markdown
homepage: https://html-to-markdown.com
repo: https://github.com/JohannesKaufmann/html-to-markdown
docs: https://html-to-markdown.com
package-manager:
  brew: html2markdown
package-manager-url: https://formulae.brew.sh/formula/html2markdown
version: 2.5.1
license: MIT
category: development
tags:
  - cli
description: Convert HTML to Markdown
source-archive: https://github.com/JohannesKaufmann/html-to-markdown/archive/refs/tags/v2.5.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: html2markdown
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:html2markdown
  brew: brew install html2markdown
provenance:
  formula: html2markdown
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
