id: brew:proftpd
display-name: proftpd
homepage: http://www.proftpd.org/
repo: https://github.com/proftpd/proftpd
docs: http://www.proftpd.org/
package-manager:
  apk: proftpd
  brew: proftpd
  dnf: proftpd
  macports: proftpd
  nix: proftpd
  zypper: proftpd
package-manager-url: https://formulae.brew.sh/formula/proftpd
version: 1.3.9a
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Highly configurable GPL-licensed FTP server software
source-archive: https://github.com/proftpd/proftpd/archive/refs/tags/v1.3.9a.tar.gz
dependencies:
  - gettext
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: ftpasswd
  - exposure: global executable
    kind: cli
    name: ftpcount
  - exposure: global executable
    kind: cli
    name: ftpdctl
  - exposure: global executable
    kind: cli
    name: ftpmail
  - exposure: global executable
    kind: cli
    name: ftpquota
  - exposure: global executable
    kind: cli
    name: ftpscrub
  - exposure: global executable
    kind: cli
    name: ftpshut
  - exposure: global executable
    kind: cli
    name: ftptop
  - exposure: global executable
    kind: cli
    name: ftpwho
  - exposure: global executable
    kind: cli
    name: in.proftpd
  - exposure: global executable
    kind: cli
    name: proftpd
  - exposure: global executable
    kind: cli
    name: prxs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add proftpd
  av: sudo av install brew:proftpd
  brew: brew install proftpd
  dnf: sudo dnf install proftpd
  macports: sudo port install proftpd
  nix: nix profile install nixpkgs#proftpd
  zypper: sudo zypper install proftpd
provenance:
  formula: proftpd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
