id: brew:cxgo
display-name: cxgo
homepage: https://github.com/gotranspile/cxgo
repo: https://github.com/gotranspile/cxgo
docs: https://github.com/gotranspile/cxgo
package-manager:
  brew: cxgo
package-manager-url: https://formulae.brew.sh/formula/cxgo
version: 0.5.2
license: MIT
category: development
tags:
  - cli
description: Transpiling C to Go
source-archive: https://github.com/gotranspile/cxgo/archive/refs/tags/v0.5.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cxgo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cxgo
  brew: brew install cxgo
provenance:
  formula: cxgo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
