id: brew:vde
display-name: vde
homepage: https://github.com/virtualsquare/vde-2
repo: https://github.com/virtualsquare/vde-2
docs: https://github.com/virtualsquare/vde-2
package-manager:
  brew: vde
  debian: vde-switch
  ubuntu: vde-switch
package-manager-url: https://formulae.brew.sh/formula/vde
version: 2.3.3
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: Ethernet compliant virtual network
source-archive: https://github.com/virtualsquare/vde-2/archive/refs/tags/v2.3.3.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: dpipe
  - exposure: global executable
    kind: cli
    name: unixcmd
  - exposure: global executable
    kind: cli
    name: vde_autolink
  - exposure: global executable
    kind: cli
    name: vde_over_ns
  - exposure: global executable
    kind: cli
    name: vde_pcapplug
  - exposure: global executable
    kind: cli
    name: vde_plug
  - exposure: global executable
    kind: cli
    name: vde_plug2tap
  - exposure: global executable
    kind: cli
    name: vde_router
  - exposure: global executable
    kind: cli
    name: vde_switch
  - exposure: global executable
    kind: cli
    name: vdecmd
  - exposure: global executable
    kind: cli
    name: vdeterm
  - exposure: global executable
    kind: cli
    name: wirefilter
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vde
  brew: brew install vde
  debian: sudo apt install vde-switch
  ubuntu: sudo apt install vde-switch
provenance:
  formula: vde
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
