id: brew:arpoison
display-name: arpoison
homepage: http://www.arpoison.net/
repo: https://dev.gentoo.org/~jsmolic/distfiles/arpoison-0.7.tar.gz
docs: http://www.arpoison.net/
package-manager:
  brew: arpoison
  nix: arpoison
package-manager-url: https://formulae.brew.sh/formula/arpoison
version: 0.7
license: GPL-2.0-only
category: network
tags:
  - cli
description: UNIX arp cache update utility
source-archive: https://dev.gentoo.org/~jsmolic/distfiles/arpoison-0.7.tar.gz
dependencies:
  - libnet
executables:
  - exposure: global executable
    kind: cli
    name: arpoison
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:arpoison
  brew: brew install arpoison
  nix: nix profile install nixpkgs#arpoison
provenance:
  formula: arpoison
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
