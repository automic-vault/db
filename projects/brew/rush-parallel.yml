id: brew:rush-parallel
display-name: rush-parallel
homepage: https://github.com/shenwei356/rush
repo: https://github.com/shenwei356/rush
docs: https://github.com/shenwei356/rush
package-manager:
  brew: rush-parallel
  debian: rush
  dnf: rush
  macports: rush
  nix: rush-parallel
  ubuntu: rush
package-manager-url: https://formulae.brew.sh/formula/rush-parallel
version: 0.9.0
license: MIT
category: development
tags:
  - cli
description: Cross-platform command-line tool for executing jobs in parallel
source-archive: https://github.com/shenwei356/rush/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rush
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rush-parallel
  brew: brew install rush-parallel
  debian: sudo apt install rush
  dnf: sudo dnf install rush
  macports: sudo port install rush
  nix: nix profile install nixpkgs#rush-parallel
  ubuntu: sudo apt install rush
provenance:
  formula: rush-parallel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
