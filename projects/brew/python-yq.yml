id: brew:python-yq
display-name: python-yq
homepage: https://kislyuk.github.io/yq/
repo: >
  https://files.pythonhosted.org/packages/38/6a/eb9721ed0929d0f55d167c2222d288b529723afbef0a07ed7aa6cca72380/yq-3.4.3.tar.gz
docs: https://kislyuk.github.io/yq/
package-manager:
  apk: xq
  brew: python-yq
  debian: xq
  dnf: xq
  macports: xq
  nix: tomlq
  scoop: main/xq
  ubuntu: xq
package-manager-url: https://formulae.brew.sh/formula/python-yq
version: 3.4.3
license: Apache-2.0
category: development
tags:
  - cli
  - yaml
description: Command-line YAML and XML processor that wraps jq
source-archive: >
  https://files.pythonhosted.org/packages/38/6a/eb9721ed0929d0f55d167c2222d288b529723afbef0a07ed7aa6cca72380/yq-3.4.3.tar.gz
dependencies:
  - libyaml
  - python@3.14
uses-from-macos:
  - jq
executables:
  - exposure: global executable
    kind: cli
    name: tomlq
  - exposure: global executable
    kind: cli
    name: xq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xq
  av: sudo av install brew:python-yq
  brew: brew install python-yq
  debian: sudo apt install xq
  dnf: sudo dnf install xq
  macports: sudo port install xq
  nix: nix profile install nixpkgs#tomlq
  scoop: scoop install main/xq
  ubuntu: sudo apt install xq
provenance:
  formula: python-yq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
