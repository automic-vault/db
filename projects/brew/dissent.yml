id: brew:dissent
display-name: dissent
homepage: https://github.com/diamondburned/dissent
repo: https://github.com/diamondburned/dissent
docs: https://github.com/diamondburned/dissent
package-manager:
  apk: dissent
  brew: dissent
  nix: dissent
  winget: diamondburned.Dissent
package-manager-url: https://formulae.brew.sh/formula/dissent
version: 0.0.37
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: GTK4 Discord client in Go
source-archive: https://github.com/diamondburned/dissent/archive/refs/tags/v0.0.37.tar.gz
dependencies:
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gobject-introspection
  - graphene
  - gtk4
  - gtksourceview5
  - harfbuzz
  - libadwaita
  - libcanberra
  - libspelling
  - pango
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dissent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dissent
  av: sudo av install brew:dissent
  brew: brew install dissent
  nix: nix profile install nixpkgs#dissent
  winget: winget install --id diamondburned.Dissent -e
provenance:
  formula: dissent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
