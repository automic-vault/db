id: brew:chrome-cli
display-name: chrome-cli
homepage: https://github.com/prasmussen/chrome-cli
repo: https://github.com/prasmussen/chrome-cli
docs: https://github.com/prasmussen/chrome-cli
package-manager:
  brew: chrome-cli
  macports: chrome-cli
