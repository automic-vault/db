id: brew:libadwaita
display-name: libadwaita
homepage: https://gnome.pages.gitlab.gnome.org/libadwaita/
repo: https://download.gnome.org/sources/libadwaita/1.9/libadwaita-1.9.1.tar.xz
docs: https://gnome.pages.gitlab.gnome.org/libadwaita/
package-manager:
  apk: libadwaita
  brew: libadwaita
  dnf: libadwaita
  macports: libadwaita
  nix: libadwaita
  pacman: libadwaita
package-manager-url: https://formulae.brew.sh/formula/libadwaita
version: 1.9.1
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Building blocks for modern adaptive GNOME applications
source-archive: https://download.gnome.org/sources/libadwaita/1.9/libadwaita-1.9.1.tar.xz
dependencies:
  - appstream
  - fribidi
  - gettext
  - glib
  - graphene
  - gtk4
  - pango
build-dependencies:
  - dart-sass
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: adwaita-1-demo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libadwaita
  av: sudo av install brew:libadwaita
  brew: brew install libadwaita
  dnf: sudo dnf install libadwaita
  macports: sudo port install libadwaita
  nix: nix profile install nixpkgs#libadwaita
  pacman: sudo pacman -S libadwaita
provenance:
  formula: libadwaita
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
