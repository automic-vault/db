id: brew:smimesign
display-name: smimesign
homepage: https://github.com/github/smimesign
repo: https://github.com/github/smimesign
docs: https://github.com/github/smimesign
package-manager:
  brew: smimesign
  macports: smimesign
  nix: smimesign
  scoop: main/smimesign
  winget: GitHub.smimesign
package-manager-url: https://formulae.brew.sh/formula/smimesign
version: 0.2.0
license: MIT
category: development
tags:
  - cli
  - git
description: S/MIME signing utility for use with Git
source-archive: https://github.com/github/smimesign/archive/refs/tags/v0.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: smimesign
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:smimesign
  brew: brew install smimesign
  macports: sudo port install smimesign
  nix: nix profile install nixpkgs#smimesign
  scoop: scoop install main/smimesign
  winget: winget install --id GitHub.smimesign -e
provenance:
  formula: smimesign
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
