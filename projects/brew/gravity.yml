id: brew:gravity
display-name: gravity
homepage: https://www.gravity-lang.org/
repo: https://github.com/marcobambini/gravity
docs: https://www.gravity-lang.org/
package-manager:
  brew: gravity
  macports: gravity
package-manager-url: https://formulae.brew.sh/formula/gravity
version: 0.9.7
license: MIT
category: development
tags:
  - cli
description: Embeddable programming language
source-archive: https://github.com/marcobambini/gravity/archive/refs/tags/0.9.7.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: gravity
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gravity
  brew: brew install gravity
  macports: sudo port install gravity
provenance:
  formula: gravity
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
