id: brew:jython
display-name: jython
homepage: https://www.jython.org/
repo: >
  https://search.maven.org/remotecontent?filepath=org/python/jython-installer/2.7.4/jython-installer-2.7.4.jar
docs: https://www.jython.org/
package-manager:
  brew: jython
  debian: jython
  macports: jython
  nix: jython
  pacman: jython
  ubuntu: jython
package-manager-url: https://formulae.brew.sh/formula/jython
version: 2.7.4
license: PSF-2.0
category: network
tags:
  - cli
description: Python implementation written in Java (successor to JPython)
source-archive: >
  https://search.maven.org/remotecontent?filepath=org/python/jython-installer/2.7.4/jython-installer-2.7.4.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: jython
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jython
  brew: brew install jython
  debian: sudo apt install jython
  macports: sudo port install jython
  nix: nix profile install nixpkgs#jython
  pacman: sudo pacman -S jython
  ubuntu: sudo apt install jython
provenance:
  formula: jython
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
