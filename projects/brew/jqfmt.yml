id: brew:jqfmt
display-name: jqfmt
homepage: https://github.com/noperator/jqfmt
repo: https://github.com/noperator/jqfmt
docs: https://github.com/noperator/jqfmt
package-manager:
  brew: jqfmt
  nix: jqfmt
package-manager-url: https://formulae.brew.sh/formula/jqfmt
version: 0.1.0
license: MIT
category: development
tags:
  - cli
description: Opinionated formatter for jq
source-archive: https://github.com/noperator/jqfmt/archive/refs/tags/v0.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jqfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jqfmt
  brew: brew install jqfmt
  nix: nix profile install nixpkgs#jqfmt
provenance:
  formula: jqfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
