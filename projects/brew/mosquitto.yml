id: brew:mosquitto
display-name: mosquitto
homepage: https://mosquitto.org/
repo: https://mosquitto.org/files/source/mosquitto-2.1.2.tar.gz
docs: https://mosquitto.org/
package-manager:
  apk: mosquitto
  brew: mosquitto
  debian: mosquitto
  dnf: mosquitto
  macports: mosquitto
  nix: mosquitto
  pacman: mosquitto
  scoop: main/mosquitto
  ubuntu: mosquitto
  winget: EclipseFoundation.Mosquitto
  zypper: mosquitto
package-manager-url: https://formulae.brew.sh/formula/mosquitto
version: 2.1.2
license: EPL-1.0 OR BSD-3-Clause
category: network
tags:
  - cli
description: Message broker implementing the MQTT protocol
source-archive: https://mosquitto.org/files/source/mosquitto-2.1.2.tar.gz
dependencies:
  - cjson
  - libwebsockets
  - openssl@3
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - libedit
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: mosquitto
  - exposure: global executable
    kind: cli
    name: mosquitto_ctrl
  - exposure: global executable
    kind: cli
    name: mosquitto_db_dump
  - exposure: global executable
    kind: cli
    name: mosquitto_passwd
  - exposure: global executable
    kind: cli
    name: mosquitto_pub
  - exposure: global executable
    kind: cli
    name: mosquitto_rr
  - exposure: global executable
    kind: cli
    name: mosquitto_signal
  - exposure: global executable
    kind: cli
    name: mosquitto_sub
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    mosquitto has been installed with a default configuration file. You can make changes
    to the configuration by editing: $HOMEBREW_PREFIX/etc/mosquitto/mosquitto.conf
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add mosquitto
  av: sudo av install brew:mosquitto
  brew: brew install mosquitto
  debian: sudo apt install mosquitto
  dnf: sudo dnf install mosquitto
  macports: sudo port install mosquitto
  nix: nix profile install nixpkgs#mosquitto
  pacman: sudo pacman -S mosquitto
  scoop: scoop install main/mosquitto
  ubuntu: sudo apt install mosquitto
  winget: winget install --id EclipseFoundation.Mosquitto -e
  zypper: sudo zypper install mosquitto
provenance:
  formula: mosquitto
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
