id: brew:licensefinder
display-name: licensefinder
homepage: https://github.com/pivotal/LicenseFinder
repo: https://github.com/pivotal/LicenseFinder
docs: https://github.com/pivotal/LicenseFinder
package-manager:
  brew: licensefinder
  nix: license_finder
package-manager-url: https://formulae.brew.sh/formula/licensefinder
version: 7.2.1
license: MIT
category: development
tags:
  - cli
description: Find licenses for your project's dependencies
source-archive: https://github.com/pivotal/LicenseFinder.git
dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: license_finder
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:licensefinder
  brew: brew install licensefinder
  nix: nix profile install nixpkgs#license_finder
provenance:
  formula: licensefinder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
