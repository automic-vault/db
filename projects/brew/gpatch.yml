id: brew:gpatch
display-name: gpatch
homepage: https://savannah.gnu.org/projects/patch/
repo: https://ftpmirror.gnu.org/gnu/patch/patch-2.8.tar.xz
docs: https://savannah.gnu.org/projects/patch/
package-manager:
  apk: patch
  brew: gpatch
  chocolatey: patch
  debian: patch
  dnf: patch
  macports: gpatch
  nix: patch
  pacman: patch
  scoop: main/patch
  ubuntu: patch
  winget: GnuWin32.Patch
  zypper: patch
package-manager-url: https://formulae.brew.sh/formula/gpatch
version: 2.8
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Apply a diff file to an original
source-archive: https://ftpmirror.gnu.org/gnu/patch/patch-2.8.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: patch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    GNU "patch" has been installed as "gpatch". If you need to use it as "patch", you
    can add a "gnubin" directory to your PATH from your bashrc like:
    PATH="$HOMEBREW_PREFIX/opt/gpatch/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add patch
  av: sudo av install brew:gpatch
  brew: brew install gpatch
  chocolatey: choco install patch
  debian: sudo apt install patch
  dnf: sudo dnf install patch
  macports: sudo port install gpatch
  nix: nix profile install nixpkgs#patch
  pacman: sudo pacman -S patch
  scoop: scoop install main/patch
  ubuntu: sudo apt install patch
  winget: winget install --id GnuWin32.Patch -e
  zypper: sudo zypper install patch
provenance:
  formula: gpatch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
