id: brew:libnova
display-name: libnova
homepage: https://libnova.sourceforge.net/
repo: https://git.code.sf.net/p/libnova/libnova
docs: https://libnova.sourceforge.net/
package-manager:
  apk: libnova
  brew: libnova
  dnf: libnova
  macports: libnova
  nix: libnova
  pacman: libnova
package-manager-url: https://formulae.brew.sh/formula/libnova
version: 0.16
license: LGPL-2.0-or-later AND GPL-2.0-or-later
category: development
tags:
  - cli
description: Celestial mechanics, astrometry and astrodynamics library
source-archive: https://git.code.sf.net/p/libnova/libnova.git
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: libnovaconfig
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libnova
  av: sudo av install brew:libnova
  brew: brew install libnova
  dnf: sudo dnf install libnova
  macports: sudo port install libnova
  nix: nix profile install nixpkgs#libnova
  pacman: sudo pacman -S libnova
provenance:
  formula: libnova
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
