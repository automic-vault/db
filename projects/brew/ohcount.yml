id: brew:ohcount
display-name: ohcount
homepage: https://github.com/blackducksoftware/ohcount
repo: https://github.com/blackducksoftware/ohcount
docs: https://github.com/blackducksoftware/ohcount
package-manager:
  brew: ohcount
  debian: ohcount
  macports: ohcount
  ubuntu: ohcount
  zypper: ohcount
package-manager-url: https://formulae.brew.sh/formula/ohcount
version: 4.0.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: Source code line counter
source-archive: https://github.com/blackducksoftware/ohcount/archive/refs/tags/4.0.0.tar.gz
dependencies:
  - libmagic
  - pcre2
  - ragel
build-dependencies:
  - gperf
executables:
  - exposure: global executable
    kind: cli
    name: ohcount
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ohcount
  brew: brew install ohcount
  debian: sudo apt install ohcount
  macports: sudo port install ohcount
  ubuntu: sudo apt install ohcount
  zypper: sudo zypper install ohcount
provenance:
  formula: ohcount
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
