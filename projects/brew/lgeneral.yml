id: brew:lgeneral
display-name: lgeneral
homepage: https://lgames.sourceforge.io/LGeneral/
repo: https://downloads.sourceforge.net/lgeneral/lgeneral/lgeneral-1.4.4.tar.gz
docs: https://lgames.sourceforge.io/LGeneral/
package-manager:
  brew: lgeneral
  debian: lgeneral
  macports: lgeneral
  ubuntu: lgeneral
package-manager-url: https://formulae.brew.sh/formula/lgeneral
version: 1.4.4
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Turn-based strategy engine heavily inspired by Panzer General
source-archive: https://downloads.sourceforge.net/lgeneral/lgeneral/lgeneral-1.4.4.tar.gz
dependencies:
  - gettext
  - sdl12-compat
  - sdl2
executables:
  - exposure: global executable
    kind: cli
    name: lgc-pg
  - exposure: global executable
    kind: cli
    name: lged
  - exposure: global executable
    kind: cli
    name: lgeneral
  - exposure: global executable
    kind: cli
    name: ltrextract
  - exposure: global executable
    kind: cli
    name: shptool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Requires pg-data.tar.gz or the original DOS version of Panzer General. Can be
    downloaded from
    https://sourceforge.net/projects/lgeneral/files/lgeneral-data/pg-data.tar.gz/download
    To install use: lgc-pg -s <pg-data-unzipped-dir> -d
    $HOMEBREW_PREFIX/opt/lgeneral/share/lgeneral ⚠️ Note: Sound and music are not
    supported in this build
  post-install-defined: false
install-lines:
  av: sudo av install brew:lgeneral
  brew: brew install lgeneral
  debian: sudo apt install lgeneral
  macports: sudo port install lgeneral
  ubuntu: sudo apt install lgeneral
provenance:
  formula: lgeneral
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
