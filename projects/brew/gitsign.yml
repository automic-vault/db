id: brew:gitsign
display-name: gitsign
homepage: https://github.com/sigstore/gitsign
repo: https://github.com/sigstore/gitsign
docs: https://github.com/sigstore/gitsign
package-manager:
  brew: gitsign
  debian: gitsign
  macports: gitsign
  nix: gitsign
  pacman: gitsign
  scoop: main/gitsign
  zypper: gitsign
package-manager-url: https://formulae.brew.sh/formula/gitsign
version: 0.16.0
license: Apache-2.0
category: development
tags:
  - cli
  - git
description: Keyless Git signing using Sigstore
source-archive: https://github.com/sigstore/gitsign/archive/refs/tags/v0.16.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gitsign
  - exposure: global executable
    kind: cli
    name: gitsign-credential-cache
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gitsign
  brew: brew install gitsign
  debian: sudo apt install gitsign
  macports: sudo port install gitsign
  nix: nix profile install nixpkgs#gitsign
  pacman: sudo pacman -S gitsign
  scoop: scoop install main/gitsign
  zypper: sudo zypper install gitsign
provenance:
  formula: gitsign
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
