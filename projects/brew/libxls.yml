id: brew:libxls
display-name: libxls
homepage: https://github.com/libxls/libxls
repo: https://github.com/libxls/libxls
docs: https://github.com/libxls/libxls
package-manager:
  brew: libxls
  dnf: libxls
  macports: libxls
  nix: libxls
package-manager-url: https://formulae.brew.sh/formula/libxls
version: 1.6.3
license: BSD-2-Clause
category: development
tags:
  - cli
description: Read binary Excel files from C/C++
source-archive: https://github.com/libxls/libxls/releases/download/v1.6.3/libxls-1.6.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: libxls2csv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libxls
  brew: brew install libxls
  dnf: sudo dnf install libxls
  macports: sudo port install libxls
  nix: nix profile install nixpkgs#libxls
provenance:
  formula: libxls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
