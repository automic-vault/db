id: brew:libultrahdr
display-name: libultrahdr
homepage: https://developer.android.com/media/platform/hdr-image-format
repo: https://github.com/google/libultrahdr
docs: https://developer.android.com/media/platform/hdr-image-format
package-manager:
  brew: libultrahdr
  dnf: libultrahdr
  nix: libultrahdr
  pacman: libultrahdr
package-manager-url: https://formulae.brew.sh/formula/libultrahdr
version: 1.4.0
license: Apache-2.0
category: development
tags:
  - cli
description: Reference codec for the Ultra HDR format
source-archive: https://github.com/google/libultrahdr/archive/refs/tags/v1.4.0.tar.gz
dependencies:
  - jpeg-turbo
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ultrahdr_app
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libultrahdr
  brew: brew install libultrahdr
  dnf: sudo dnf install libultrahdr
  nix: nix profile install nixpkgs#libultrahdr
  pacman: sudo pacman -S libultrahdr
provenance:
  formula: libultrahdr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
