id: brew:gkrellm
display-name: gkrellm
homepage: https://billw2.github.io/gkrellm/gkrellm.html
repo: https://gkrellm.srcbox.net/releases/gkrellm-2.5.1.tar.bz2
docs: https://billw2.github.io/gkrellm/gkrellm.html
package-manager:
  brew: gkrellm
  debian: gkrellm
  dnf: gkrellm
  macports: gkrellm
  nix: gkrellm
  ubuntu: gkrellm
  zypper: gkrellm
package-manager-url: https://formulae.brew.sh/formula/gkrellm
version: 2.5.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Extensible GTK system monitoring application
source-archive: https://gkrellm.srcbox.net/releases/gkrellm-2.5.1.tar.bz2
dependencies:
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+
  - openssl@3
  - pango
build-dependencies:
  - gettext
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gkrellm
  - exposure: global executable
    kind: cli
    name: gkrellmd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gkrellm
  brew: brew install gkrellm
  debian: sudo apt install gkrellm
  dnf: sudo dnf install gkrellm
  macports: sudo port install gkrellm
  nix: nix profile install nixpkgs#gkrellm
  ubuntu: sudo apt install gkrellm
  zypper: sudo zypper install gkrellm
provenance:
  formula: gkrellm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
