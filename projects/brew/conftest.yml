id: brew:conftest
display-name: conftest
homepage: https://www.conftest.dev/
repo: https://github.com/open-policy-agent/conftest
docs: https://www.conftest.dev/
package-manager:
  brew: conftest
  nix: conftest
  scoop: main/conftest
  zypper: conftest
package-manager-url: https://formulae.brew.sh/formula/conftest
version: 0.68.2
license: Apache-2.0
category: development
tags:
  - cli
description: Test your configuration files using Open Policy Agent
source-archive: https://github.com/open-policy-agent/conftest/archive/refs/tags/v0.68.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: conftest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:conftest
  brew: brew install conftest
  nix: nix profile install nixpkgs#conftest
  scoop: scoop install main/conftest
  zypper: sudo zypper install conftest
provenance:
  formula: conftest
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
