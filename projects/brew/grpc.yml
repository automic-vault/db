id: brew:grpc
display-name: grpc
homepage: https://grpc.io/
repo: https://github.com/grpc/grpc
docs: https://grpc.io/
package-manager:
  apk: grpc
  brew: grpc
  dnf: grpc
  macports: grpc
  nix: grpc
  pacman: grpc
package-manager-url: https://formulae.brew.sh/formula/grpc
version: 1.80.0
license: Apache-2.0
category: development
tags:
  - cli
description: Next generation open source RPC library and framework
source-archive: https://github.com/grpc/grpc.git
dependencies:
  - abseil
  - c-ares
  - openssl@3
  - protobuf
  - re2
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: grpc_cpp_plugin
  - exposure: global executable
    kind: cli
    name: grpc_csharp_plugin
  - exposure: global executable
    kind: cli
    name: grpc_node_plugin
  - exposure: global executable
    kind: cli
    name: grpc_objective_c_plugin
  - exposure: global executable
    kind: cli
    name: grpc_php_plugin
  - exposure: global executable
    kind: cli
    name: grpc_python_plugin
  - exposure: global executable
    kind: cli
    name: grpc_ruby_plugin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add grpc
  av: sudo av install brew:grpc
  brew: brew install grpc
  dnf: sudo dnf install grpc
  macports: sudo port install grpc
  nix: nix profile install nixpkgs#grpc
  pacman: sudo pacman -S grpc
provenance:
  formula: grpc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
