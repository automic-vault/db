id: brew:bison
display-name: bison
homepage: https://www.gnu.org/software/bison/
repo: https://ftpmirror.gnu.org/gnu/bison/bison-3.8.2.tar.xz
docs: https://www.gnu.org/software/bison/
package-manager:
  apk: bison
  brew: bison
  debian: bison
  dnf: bison
  macports: bison
  nix: bison
  pacman: bison
  scoop: main/bison
  ubuntu: bison
  zypper: bison
package-manager-url: https://formulae.brew.sh/formula/bison
version: 3.8.2
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Parser generator
source-archive: https://ftpmirror.gnu.org/gnu/bison/bison-3.8.2.tar.xz
uses-from-macos:
  - m4
executables:
  - exposure: global executable
    kind: cli
    name: bison
  - exposure: global executable
    kind: cli
    name: yacc
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bison
  av: sudo av install brew:bison
  brew: brew install bison
  debian: sudo apt install bison
  dnf: sudo dnf install bison
  macports: sudo port install bison
  nix: nix profile install nixpkgs#bison
  pacman: sudo pacman -S bison
  scoop: scoop install main/bison
  ubuntu: sudo apt install bison
  zypper: sudo zypper install bison
provenance:
  formula: bison
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
