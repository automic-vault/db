id: brew:statix
display-name: statix
homepage: https://github.com/oppiliappan/statix
repo: https://github.com/oppiliappan/statix
docs: https://github.com/oppiliappan/statix
package-manager:
  brew: statix
  nix: statix
package-manager-url: https://formulae.brew.sh/formula/statix
version: 0.5.8
license: MIT
category: development
tags:
  - cli
description: Lints and suggestions for the nix programming language
source-archive: https://github.com/oppiliappan/statix/archive/refs/tags/v0.5.8.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: statix
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:statix
  brew: brew install statix
  nix: nix profile install nixpkgs#statix
provenance:
  formula: statix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
