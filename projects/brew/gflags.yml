id: brew:gflags
display-name: gflags
homepage: https://gflags.github.io/gflags/
repo: https://github.com/gflags/gflags
docs: https://gflags.github.io/gflags/
package-manager:
  apk: gflags
  brew: gflags
  dnf: gflags
  macports: gflags
  nix: gflags
  pacman: gflags
  zypper: gflags
package-manager-url: https://formulae.brew.sh/formula/gflags
version: 2.3.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Library for processing command-line flags
source-archive: https://github.com/gflags/gflags/archive/refs/tags/v2.3.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: gflags_completions.sh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gflags
  av: sudo av install brew:gflags
  brew: brew install gflags
  dnf: sudo dnf install gflags
  macports: sudo port install gflags
  nix: nix profile install nixpkgs#gflags
  pacman: sudo pacman -S gflags
  zypper: sudo zypper install gflags
provenance:
  formula: gflags
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
