id: brew:yices2
display-name: yices2
homepage: https://yices.csl.sri.com/
repo: https://github.com/SRI-CSL/yices2
docs: https://yices.csl.sri.com/
package-manager:
  apk: yices2
  brew: yices2
  dnf: yices
  macports: yices
  nix: yices
  pacman: yices
package-manager-url: https://formulae.brew.sh/formula/yices2
version: 2.7.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Yices SMT Solver
source-archive: https://github.com/SRI-CSL/yices2/archive/refs/tags/yices-2.7.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - autoconf
  - gperf
executables:
  - exposure: global executable
    kind: cli
    name: yices
  - exposure: global executable
    kind: cli
    name: yices-sat
  - exposure: global executable
    kind: cli
    name: yices-smt
  - exposure: global executable
    kind: cli
    name: yices-smt2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yices2
  av: sudo av install brew:yices2
  brew: brew install yices2
  dnf: sudo dnf install yices
  macports: sudo port install yices
  nix: nix profile install nixpkgs#yices
  pacman: sudo pacman -S yices
provenance:
  formula: yices2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
