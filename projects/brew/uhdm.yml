id: brew:uhdm
display-name: uhdm
homepage: https://github.com/chipsalliance/UHDM
repo: https://github.com/chipsalliance/UHDM
docs: https://github.com/chipsalliance/UHDM
package-manager:
  brew: uhdm
  nix: uhdm
package-manager-url: https://formulae.brew.sh/formula/uhdm
version: 1.86
license: Apache-2.0
category: development
tags:
  - cli
description: Universal Hardware Data Model, modeling of the SystemVerilog Object Model
source-archive: https://github.com/chipsalliance/UHDM/archive/refs/tags/v1.86.tar.gz
dependencies:
  - capnp
build-dependencies:
  - cmake
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: uhdm-cmp
  - exposure: global executable
    kind: cli
    name: uhdm-dump
  - exposure: global executable
    kind: cli
    name: uhdm-hier
  - exposure: global executable
    kind: cli
    name: uhdm-lint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:uhdm
  brew: brew install uhdm
  nix: nix profile install nixpkgs#uhdm
provenance:
  formula: uhdm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
