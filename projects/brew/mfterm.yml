id: brew:mfterm
display-name: mfterm
homepage: https://github.com/4ZM/mfterm
repo: https://github.com/4ZM/mfterm
docs: https://github.com/4ZM/mfterm
package-manager:
  brew: mfterm
package-manager-url: https://formulae.brew.sh/formula/mfterm
version: 1.0.7
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Terminal for working with Mifare Classic 1-4k Tags
source-archive: https://github.com/4ZM/mfterm/releases/download/v1.0.7/mfterm-1.0.7.tar.gz
dependencies:
  - libnfc
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: mfterm
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mfterm
  brew: brew install mfterm
provenance:
  formula: mfterm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
