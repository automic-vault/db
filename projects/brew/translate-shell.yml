id: brew:translate-shell
display-name: translate-shell
homepage: https://www.soimort.org/translate-shell
repo: https://github.com/soimort/translate-shell
docs: https://www.soimort.org/translate-shell
package-manager:
  apk: translate-shell
  brew: translate-shell
  debian: translate-shell
  dnf: translate-shell
  macports: translate-shell
  nix: translate-shell
  pacman: translate-shell
  ubuntu: translate-shell
  zypper: translate-shell
package-manager-url: https://formulae.brew.sh/formula/translate-shell
version: 0.9.7.1
license: Unlicense
category: development
tags:
  - cli
description: Command-line translator using Google Translate and more
source-archive: https://github.com/soimort/translate-shell/archive/refs/tags/v0.9.7.1.tar.gz
dependencies:
  - fribidi
  - gawk
  - rlwrap
executables:
  - exposure: global executable
    kind: cli
    name: trans
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    By default, text-to-speech functionality is provided by macOS's builtin `say'
    command. This functionality may be improved in certain cases by installing one of
    mplayer, mpv, or mpg123, all of which are available through `brew install'.
  post-install-defined: false
install-lines:
  apk: sudo apk add translate-shell
  av: sudo av install brew:translate-shell
  brew: brew install translate-shell
  debian: sudo apt install translate-shell
  dnf: sudo dnf install translate-shell
  macports: sudo port install translate-shell
  nix: nix profile install nixpkgs#translate-shell
  pacman: sudo pacman -S translate-shell
  ubuntu: sudo apt install translate-shell
  zypper: sudo zypper install translate-shell
provenance:
  formula: translate-shell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
