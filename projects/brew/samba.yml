bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To avoid conflicting with macOS system binaries, some files were installed with
    non-standard name: - smbd: $HOMEBREW_PREFIX/sbin/samba-dot-org-smbd - profiles:
    $HOMEBREW_PREFIX/bin/samba-dot-org-profiles
  post-install-defined: false
install-lines:
  apk: sudo apk add samba
  av: sudo av install brew:samba
  brew: brew install samba
  debian: sudo apt install samba
  dnf: sudo dnf install samba
  nix: nix profile install nixpkgs#samba
  pacman: sudo pacman -S samba
  ubuntu: sudo apt install samba
  zypper: sudo zypper install samba
provenance:
  formula: samba
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
