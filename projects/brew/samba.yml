id: brew:samba
display-name: samba
homepage: https://www.samba.org/
repo: https://download.samba.org/pub/samba/stable/samba-4.24.3.tar.gz
docs: https://www.samba.org/
package-manager:
  apk: samba
  brew: samba
  debian: samba
  dnf: samba
  nix: samba
  pacman: samba
  ubuntu: samba
  zypper: samba
package-manager-url: https://formulae.brew.sh/formula/samba
version: 4.24.3
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: SMB/CIFS file, print, and login server for UNIX
source-archive: https://download.samba.org/pub/samba/stable/samba-4.24.3.tar.gz
dependencies:
  - gettext
  - gnutls
  - icu4c@78
  - krb5
  - libtasn1
  - libxcrypt
  - lmdb
  - openssl@3
  - popt
  - readline
  - talloc
  - tdb
  - tevent
build-dependencies:
  - bison
  - cmocka
  - pkgconf
uses-from-macos:
  - libxcrypt
