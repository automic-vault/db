id: brew:pciutils
display-name: pciutils
homepage: https://github.com/pciutils/pciutils
repo: https://github.com/pciutils/pciutils
docs: https://github.com/pciutils/pciutils
package-manager:
  apk: pciutils
  brew: pciutils
  debian: pciutils
  dnf: pciutils
  macports: pciutils
  nix: pciutils
  pacman: pciutils
  scoop: main/pciutils
  ubuntu: pciutils
  zypper: pciutils
package-manager-url: https://formulae.brew.sh/formula/pciutils
version: 3.15.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: PCI utilities
source-archive: https://github.com/pciutils/pciutils/archive/refs/tags/v3.15.0.tar.gz
dependencies:
  - zlib-ng-compat
executables:
  - exposure: global executable
    kind: cli
    name: lspci
  - exposure: global executable
    kind: cli
    name: pcilmr
  - exposure: global executable
    kind: cli
    name: setpci
  - exposure: global executable
    kind: cli
    name: update-pciids
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pciutils
  av: sudo av install brew:pciutils
  brew: brew install pciutils
  debian: sudo apt install pciutils
  dnf: sudo dnf install pciutils
  macports: sudo port install pciutils
  nix: nix profile install nixpkgs#pciutils
  pacman: sudo pacman -S pciutils
  scoop: scoop install main/pciutils
  ubuntu: sudo apt install pciutils
  zypper: sudo zypper install pciutils
provenance:
  formula: pciutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
