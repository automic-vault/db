id: brew:porter
display-name: porter
homepage: https://porter.sh
repo: https://github.com/getporter/porter
docs: https://porter.sh
package-manager:
  brew: porter
package-manager-url: https://formulae.brew.sh/formula/porter
version: 1.5.0
license: Apache-2.0
category: development
tags:
  - cli
description: App artifacts, tools, configs, and logic packaged as distributable installer
source-archive: https://github.com/getporter/porter/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: porter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:porter
  brew: brew install porter
provenance:
  formula: porter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
