id: brew:wrk
display-name: wrk
homepage: https://github.com/wg/wrk
repo: https://github.com/wg/wrk
docs: https://github.com/wg/wrk
package-manager:
  apk: wrk
  brew: wrk
  debian: wrk
  macports: wrk
  nix: wrk
  ubuntu: wrk
  zypper: wrk
package-manager-url: https://formulae.brew.sh/formula/wrk
version: 4.2.0
license: LicenseRef-Homebrew-cannot-represent
category: development
tags:
  - cli
description: HTTP benchmarking tool
source-archive: https://github.com/wg/wrk/archive/refs/tags/4.2.0.tar.gz
dependencies:
  - luajit
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: wrk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wrk
  av: sudo av install brew:wrk
  brew: brew install wrk
  debian: sudo apt install wrk
  macports: sudo port install wrk
  nix: nix profile install nixpkgs#wrk
  ubuntu: sudo apt install wrk
  zypper: sudo zypper install wrk
provenance:
  formula: wrk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
