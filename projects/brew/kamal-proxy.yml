id: brew:kamal-proxy
display-name: kamal-proxy
homepage: https://kamal-deploy.org/
repo: https://github.com/basecamp/kamal-proxy
docs: https://kamal-deploy.org/
package-manager:
  brew: kamal-proxy
  nix: kamal-proxy
package-manager-url: https://formulae.brew.sh/formula/kamal-proxy
version: 0.9.2
license: MIT
category: development
tags:
  - cli
description: Lightweight proxy server for Kamal
source-archive: https://github.com/basecamp/kamal-proxy/archive/refs/tags/v0.9.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kamal-proxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kamal-proxy
  brew: brew install kamal-proxy
  nix: nix profile install nixpkgs#kamal-proxy
provenance:
  formula: kamal-proxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
