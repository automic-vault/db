id: brew:mftrace
display-name: mftrace
homepage: https://lilypond.org/mftrace/
repo: https://lilypond.org/downloads/sources/mftrace/mftrace-1.2.20.tar.gz
docs: https://lilypond.org/mftrace/
package-manager:
  brew: mftrace
  debian: mftrace
  dnf: mftrace
  macports: mftrace
  nix: mftrace
  ubuntu: mftrace
  zypper: mftrace
package-manager-url: https://formulae.brew.sh/formula/mftrace
version: 1.2.20
license: GPL-2.0-only
category: network
tags:
  - cli
