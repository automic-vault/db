  dnf: sudo dnf install mftrace
  macports: sudo port install mftrace
  nix: nix profile install nixpkgs#mftrace
  ubuntu: sudo apt install mftrace
  zypper: sudo zypper install mftrace
provenance:
  formula: mftrace
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
