id: brew:rxvt-unicode
display-name: rxvt-unicode
homepage: https://software.schmorp.de/pkg/rxvt-unicode.html
repo: https://dist.schmorp.de/rxvt-unicode/rxvt-unicode-9.31.tar.bz2
docs: https://software.schmorp.de/pkg/rxvt-unicode.html
package-manager:
  apk: rxvt-unicode
  brew: rxvt-unicode
  debian: rxvt-unicode
  dnf: rxvt-unicode
  macports: rxvt-unicode
  nix: rxvt-unicode
  pacman: rxvt-unicode
  ubuntu: rxvt-unicode
  zypper: rxvt-unicode
package-manager-url: https://formulae.brew.sh/formula/rxvt-unicode
version: 9.31
license: GPL-3.0-only
category: network
tags:
  - cli
description: Rxvt fork with Unicode support
source-archive: https://dist.schmorp.de/rxvt-unicode/rxvt-unicode-9.31.tar.bz2
dependencies:
  - fontconfig
  - freetype
  - libx11
  - libxext
  - libxft
  - libxmu
  - libxrender
  - libxt
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: urclock
  - exposure: global executable
    kind: cli
    name: urxvt
  - exposure: global executable
    kind: cli
    name: urxvtc
  - exposure: global executable
    kind: cli
    name: urxvtd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rxvt-unicode
  av: sudo av install brew:rxvt-unicode
  brew: brew install rxvt-unicode
  debian: sudo apt install rxvt-unicode
  dnf: sudo dnf install rxvt-unicode
  macports: sudo port install rxvt-unicode
  nix: nix profile install nixpkgs#rxvt-unicode
  pacman: sudo pacman -S rxvt-unicode
  ubuntu: sudo apt install rxvt-unicode
  zypper: sudo zypper install rxvt-unicode
provenance:
  formula: rxvt-unicode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
