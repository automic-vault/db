id: brew:libcap
display-name: libcap
homepage: https://sites.google.com/site/fullycapable/
repo: >
  https://mirrors.edge.kernel.org/pub/linux/libs/security/linux-privs/libcap2/libcap-2.78.tar.xz
docs: https://sites.google.com/site/fullycapable/
package-manager:
  apk: libcap
  brew: libcap
  dnf: libcap
  nix: libcap
  pacman: libcap
package-manager-url: https://formulae.brew.sh/formula/libcap
version: 2.78
license: BSD-3-Clause AND GPL-2.0-or-later
category: security
tags:
  - cli
description: User-space interfaces to POSIX 1003.1e capabilities
source-archive: >
  https://mirrors.edge.kernel.org/pub/linux/libs/security/linux-privs/libcap2/libcap-2.78.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: capsh
  - exposure: global executable
    kind: cli
    name: getcap
  - exposure: global executable
    kind: cli
    name: getpcaps
  - exposure: global executable
    kind: cli
    name: setcap
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libcap
  av: sudo av install brew:libcap
  brew: brew install libcap
  dnf: sudo dnf install libcap
  nix: nix profile install nixpkgs#libcap
  pacman: sudo pacman -S libcap
provenance:
  formula: libcap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
