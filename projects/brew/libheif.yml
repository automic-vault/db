id: brew:libheif
display-name: libheif
homepage: https://www.libde265.org/
repo: https://github.com/strukturag/libheif
docs: https://www.libde265.org/
package-manager:
  apk: libheif
  brew: libheif
  debian: heif-thumbnailer
  dnf: libheif
  macports: libheif
  nix: libheif
  pacman: libheif
  ubuntu: heif-thumbnailer
package-manager-url: https://formulae.brew.sh/formula/libheif
version: 1.22.2
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: ISO/IEC 23008-12:2017 HEIF file format decoder and encoder
source-archive: https://github.com/strukturag/libheif/releases/download/v1.22.2/libheif-1.22.2.tar.gz
dependencies:
  - aom
  - jpeg-turbo
  - libde265
  - libpng
  - libtiff
  - webp
  - x265
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: heif-convert
  - exposure: global executable
    kind: cli
    name: heif-dec
  - exposure: global executable
    kind: cli
    name: heif-enc
  - exposure: global executable
    kind: cli
    name: heif-info
  - exposure: global executable
    kind: cli
    name: heif-thumbnailer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: Additional codecs can be enabled by `brew install libheif-plugins`
  post-install-defined: false
install-lines:
  apk: sudo apk add libheif
  av: sudo av install brew:libheif
  brew: brew install libheif
  debian: sudo apt install heif-thumbnailer
  dnf: sudo dnf install libheif
  macports: sudo port install libheif
  nix: nix profile install nixpkgs#libheif
  pacman: sudo pacman -S libheif
  ubuntu: sudo apt install heif-thumbnailer
provenance:
  formula: libheif
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
