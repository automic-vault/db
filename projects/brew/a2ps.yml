  dnf: sudo dnf install a2ps
  macports: sudo port install a2ps
  nix: nix profile install nixpkgs#a2ps
  pacman: sudo pacman -S a2ps
  ubuntu: sudo apt install a2ps
  zypper: sudo zypper install a2ps
provenance:
  formula: a2ps
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
