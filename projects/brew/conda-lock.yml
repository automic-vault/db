id: brew:conda-lock
display-name: conda-lock
homepage: https://github.com/conda/conda-lock
repo: >
  https://files.pythonhosted.org/packages/96/5d/fed650427a858cacf41f2827d8c00e5fcc6619c05d17ce352f3960bcaea3/conda_lock-4.0.0.tar.gz
docs: https://github.com/conda/conda-lock
package-manager:
  brew: conda-lock
package-manager-url: https://formulae.brew.sh/formula/conda-lock
version: 4.0.0
license: MIT
category: development
tags:
  - cli
description: Lightweight lockfile for conda environments
source-archive: >
  https://files.pythonhosted.org/packages/96/5d/fed650427a858cacf41f2827d8c00e5fcc6619c05d17ce352f3960bcaea3/conda_lock-4.0.0.tar.gz
dependencies:
  - certifi
  - libyaml
  - pydantic
  - python@3.14
  - zstd
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: conda-lock
bottle:
