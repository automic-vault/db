id: brew:swiftdraw
display-name: swiftdraw
homepage: https://github.com/swhitty/SwiftDraw
repo: https://github.com/swhitty/SwiftDraw
docs: https://github.com/swhitty/SwiftDraw
package-manager:
  brew: swiftdraw
package-manager-url: https://formulae.brew.sh/formula/swiftdraw
version: 0.27.0
license: Zlib
category: development
tags:
  - cli
description: Convert SVG into PDF, PNG, JPEG or SF Symbol
source-archive: https://github.com/swhitty/SwiftDraw/archive/refs/tags/0.27.0.tar.gz
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: swiftdraw
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swiftdraw
  brew: brew install swiftdraw
provenance:
  formula: swiftdraw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
