id: brew:wireshark
display-name: wireshark
homepage: https://www.wireshark.org
repo: https://www.wireshark.org/download/src/all-versions/wireshark-4.6.6.tar.xz
docs: https://www.wireshark.org
package-manager:
  apk: wireshark
  brew: wireshark
  chocolatey: wireshark
  debian: wireshark
  dnf: wireshark
  nix: wireshark
  scoop: extras/wireshark
  ubuntu: wireshark
  winget: WiresharkFoundation.Wireshark
  zypper: wireshark
package-manager-url: https://formulae.brew.sh/formula/wireshark
version: 4.6.6
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Network analyzer and capture tool - without graphical user interface
source-archive: https://www.wireshark.org/download/src/all-versions/wireshark-4.6.6.tar.xz
dependencies:
  - c-ares
  - glib
  - gnutls
  - libgcrypt
  - libgpg-error
  - libmaxminddb
  - libnghttp2
  - libnghttp3
  - libsmi
  - libssh
  - lua
  - lz4
  - pcre2
  - speexdsp
  - zstd
build-dependencies:
  - cmake
uses-from-macos:
  - krb5
  - libpcap
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: capinfos
  - exposure: global executable
    kind: cli
    name: captype
  - exposure: global executable
    kind: cli
    name: dftest
  - exposure: global executable
    kind: cli
    name: dumpcap
  - exposure: global executable
    kind: cli
    name: editcap
  - exposure: global executable
    kind: cli
    name: idl2wrs
  - exposure: global executable
    kind: cli
    name: mergecap
  - exposure: global executable
    kind: cli
    name: mmdbresolve
  - exposure: global executable
    kind: cli
    name: randpkt
  - exposure: global executable
    kind: cli
    name: rawshark
  - exposure: global executable
    kind: cli
    name: reordercap
  - exposure: global executable
    kind: cli
    name: sharkd
  - exposure: global executable
    kind: cli
    name: text2pcap
  - exposure: global executable
    kind: cli
    name: tshark
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This formula only installs the command-line utilities by default. Install
    Wireshark.app with Homebrew Cask: brew install wireshark-app If your list of
    available capture interfaces is empty (default macOS behavior), install ChmodBPF:
    brew install --cask wireshark-chmodbpf
  post-install-defined: false
install-lines:
  apk: sudo apk add wireshark
  av: sudo av install brew:wireshark
  brew: brew install wireshark
  chocolatey: choco install wireshark
  debian: sudo apt install wireshark
  dnf: sudo dnf install wireshark
  nix: nix profile install nixpkgs#wireshark
  scoop: scoop install extras/wireshark
  ubuntu: sudo apt install wireshark
  winget: winget install --id WiresharkFoundation.Wireshark -e
  zypper: sudo zypper install wireshark
provenance:
  formula: wireshark
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
