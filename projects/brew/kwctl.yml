id: brew:kwctl
display-name: kwctl
homepage: https://www.kubewarden.io/
repo: https://github.com/kubewarden/kubewarden-controller
docs: https://www.kubewarden.io/
package-manager:
  brew: kwctl
  zypper: kwctl
package-manager-url: https://formulae.brew.sh/formula/kwctl
version: 1.35.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: CLI tool for the Kubewarden policy engine for Kubernetes
source-archive: https://github.com/kubewarden/kubewarden-controller/archive/refs/tags/v1.35.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: kwctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kwctl
  brew: brew install kwctl
  zypper: sudo zypper install kwctl
provenance:
  formula: kwctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
