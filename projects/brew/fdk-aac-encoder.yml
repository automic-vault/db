id: brew:fdk-aac-encoder
display-name: fdk-aac-encoder
homepage: https://github.com/nu774/fdkaac
repo: https://github.com/nu774/fdkaac
docs: https://github.com/nu774/fdkaac
package-manager:
  apk: fdkaac
  brew: fdk-aac-encoder
  debian: fdkaac
  dnf: fdkaac
  nix: fdk-aac-encoder
  pacman: fdkaac
  ubuntu: fdkaac
package-manager-url: https://formulae.brew.sh/formula/fdk-aac-encoder
version: 1.0.7
license: Zlib
category: development
tags:
  - cli
description: Command-line encoder frontend for libfdk-aac
source-archive: https://github.com/nu774/fdkaac/archive/refs/tags/v1.0.7.tar.gz
dependencies:
  - fdk-aac
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fdkaac
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fdkaac
  av: sudo av install brew:fdk-aac-encoder
  brew: brew install fdk-aac-encoder
  debian: sudo apt install fdkaac
  dnf: sudo dnf install fdkaac
  nix: nix profile install nixpkgs#fdk-aac-encoder
  pacman: sudo pacman -S fdkaac
  ubuntu: sudo apt install fdkaac
provenance:
  formula: fdk-aac-encoder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
