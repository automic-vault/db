id: brew:eiffelstudio
display-name: eiffelstudio
homepage: https://www.eiffel.com
repo: https://ftp.eiffel.com/pub/download/25.02/pp/PorterPackage_25.02_rev_98732.tar
docs: https://www.eiffel.com
package-manager:
  brew: eiffelstudio
  macports: eiffelstudio
  nix: ec
  pacman: ecb
package-manager-url: https://formulae.brew.sh/formula/eiffelstudio
version: 25.02.98732
license: GPL-2.0-only
category: development
tags:
  - cli
description: Development environment for the Eiffel language
source-archive: https://ftp.eiffel.com/pub/download/25.02/pp/PorterPackage_25.02_rev_98732.tar
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - harfbuzz
  - libx11
  - pango
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: compile_all
  - exposure: global executable
    kind: cli
    name: ec
  - exposure: global executable
    kind: cli
    name: ecb
  - exposure: global executable
    kind: cli
    name: estudio
  - exposure: global executable
    kind: cli
    name: finish_freezing
  - exposure: global executable
    kind: cli
    name: iron
  - exposure: global executable
    kind: cli
    name: syntax_updater
  - exposure: global executable
    kind: cli
    name: vision2_demo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:eiffelstudio
  brew: brew install eiffelstudio
  macports: sudo port install eiffelstudio
  nix: nix profile install nixpkgs#ec
  pacman: sudo pacman -S ecb
provenance:
  formula: eiffelstudio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
