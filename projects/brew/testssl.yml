id: brew:testssl
display-name: testssl
homepage: https://testssl.sh/
repo: https://github.com/testssl/testssl.sh
docs: https://testssl.sh/
package-manager:
  brew: testssl
  debian: testssl.sh
  dnf: testssl
  macports: testssl
  nix: testssl
  pacman: testssl.sh
  ubuntu: testssl.sh
  zypper: testssl.sh
package-manager-url: https://formulae.brew.sh/formula/testssl
version: 3.2.3
license: GPL-2.0-only
category: cloud
tags:
  - cli
description: Tool which checks for the support of TLS/SSL ciphers and flaws
source-archive: https://github.com/testssl/testssl.sh/archive/refs/tags/v3.2.3.tar.gz
dependencies:
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: testssl.sh
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:testssl
  brew: brew install testssl
  debian: sudo apt install testssl.sh
  dnf: sudo dnf install testssl
  macports: sudo port install testssl
  nix: nix profile install nixpkgs#testssl
  pacman: sudo pacman -S testssl.sh
  ubuntu: sudo apt install testssl.sh
  zypper: sudo zypper install testssl.sh
provenance:
  formula: testssl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
