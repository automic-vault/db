id: brew:aqtinstall
display-name: aqtinstall
homepage: https://github.com/miurahr/aqtinstall
repo: >
  https://files.pythonhosted.org/packages/76/19/24a588de6c25d43169d172dab47e63a63cd0d8f90e98cf86487acbf00ac7/aqtinstall-3.3.0.tar.gz
docs: https://github.com/miurahr/aqtinstall
package-manager:
  brew: aqtinstall
  chocolatey: aqt
  nix: aqtinstall
  scoop: main/aqtinstall
  winget: miurahr.aqtinstall
package-manager-url: https://formulae.brew.sh/formula/aqtinstall
version: 3.3.0
license: MIT
category: development
tags:
  - cli
description: Another unofficial Qt installer
source-archive: >
  https://files.pythonhosted.org/packages/76/19/24a588de6c25d43169d172dab47e63a63cd0d8f90e98cf86487acbf00ac7/aqtinstall-3.3.0.tar.gz
dependencies:
  - certifi
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: aqt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aqtinstall
  brew: brew install aqtinstall
  chocolatey: choco install aqt
  nix: nix profile install nixpkgs#aqtinstall
  scoop: scoop install main/aqtinstall
  winget: winget install --id miurahr.aqtinstall -e
provenance:
  formula: aqtinstall
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
