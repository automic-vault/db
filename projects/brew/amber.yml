id: brew:amber
display-name: amber
homepage: https://amberframework.org/
repo: https://github.com/amberframework/amber
docs: https://amberframework.org/
package-manager:
  apk: amber
  brew: amber
  debian: amber
  macports: amber
  nix: amber
  scoop: extras/amber
  ubuntu: amber
package-manager-url: https://formulae.brew.sh/formula/amber
version: 1.4.1
license: MIT
category: development
tags:
  - cli
description: Crystal web framework. Bare metal performance, productivity and happiness
source-archive: https://github.com/amberframework/amber/archive/refs/tags/v1.4.1.tar.gz
dependencies:
  - bdw-gc
  - crystal
  - libevent
  - libyaml
  - openssl@3
  - pcre2
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: amber
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add amber
  av: sudo av install brew:amber
  brew: brew install amber
  debian: sudo apt install amber
  macports: sudo port install amber
  nix: nix profile install nixpkgs#amber
  scoop: scoop install extras/amber
  ubuntu: sudo apt install amber
provenance:
  formula: amber
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
