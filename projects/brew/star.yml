id: brew:star
display-name: star
homepage: https://codeberg.org/schilytools/schilytools
repo: https://codeberg.org/schilytools/schilytools/archive/2024-03-21.tar.gz
docs: https://codeberg.org/schilytools/schilytools
package-manager:
  brew: star
  dnf: star
  macports: star
  nix: star
  zypper: star
package-manager-url: https://formulae.brew.sh/formula/star
version: 2024-03-21
license: CDDL-1.0
category: network
tags:
