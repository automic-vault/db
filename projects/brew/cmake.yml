id: brew:cmake
display-name: cmake
homepage: https://www.cmake.org/
repo: https://github.com/Kitware/CMake
docs: https://www.cmake.org/
package-manager:
  apk: cmake
  brew: cmake
  chocolatey: cmake
  debian: cmake
  dnf: cmake
  macports: cmake
  nix: cmake
  pacman: cmake
  scoop: main/cmake
  ubuntu: cmake
  winget: Kitware.CMake
  zypper: cmake
package-manager-url: https://formulae.brew.sh/formula/cmake
version: 4.3.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Cross-platform make
source-archive: https://github.com/Kitware/CMake/releases/download/v4.3.2/cmake-4.3.2.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ccmake
  - exposure: global executable
    kind: cli
    name: cmake
  - exposure: global executable
    kind: cli
    name: cpack
  - exposure: global executable
    kind: cli
    name: ctest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'To install the CMake documentation, run: brew install cmake-docs'
  post-install-defined: false
install-lines:
  apk: sudo apk add cmake
  av: sudo av install brew:cmake
  brew: brew install cmake
  chocolatey: choco install cmake
  debian: sudo apt install cmake
  dnf: sudo dnf install cmake
  macports: sudo port install cmake
  nix: nix profile install nixpkgs#cmake
  pacman: sudo pacman -S cmake
  scoop: scoop install main/cmake
  ubuntu: sudo apt install cmake
  winget: winget install --id Kitware.CMake -e
  zypper: sudo zypper install cmake
provenance:
  formula: cmake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
