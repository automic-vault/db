id: brew:knot-resolver
display-name: knot-resolver
homepage: https://www.knot-resolver.cz
repo: https://secure.nic.cz/files/knot-resolver/knot-resolver-6.3.0.tar.xz
docs: https://www.knot-resolver.cz
package-manager:
  apk: knot-resolver
  brew: knot-resolver
  debian: knot-resolver
  dnf: knot-resolver
  macports: knot-resolver
  pacman: knot-resolver
  ubuntu: knot-resolver
package-manager-url: https://formulae.brew.sh/formula/knot-resolver
version: 6.3.0
license: CC0-1.0 AND GPL-3.0-or-later AND LGPL-2.1-or-later AND MIT
category: network
tags:
  - cli
description: Minimalistic, caching, DNSSEC-validating DNS resolver
source-archive: https://secure.nic.cz/files/knot-resolver/knot-resolver-6.3.0.tar.xz
dependencies:
  - fstrm
  - gnutls
  - knot
  - libnghttp2
  - libuv
  - libyaml
  - lmdb
  - luajit
  - protobuf-c
  - python@3.14
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: knot-resolver
  - exposure: global executable
    kind: cli
    name: kres-cache-gc
  - exposure: global executable
    kind: cli
    name: kresctl
  - exposure: global executable
    kind: cli
    name: kresd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add knot-resolver
  av: sudo av install brew:knot-resolver
  brew: brew install knot-resolver
  debian: sudo apt install knot-resolver
  dnf: sudo dnf install knot-resolver
  macports: sudo port install knot-resolver
  pacman: sudo pacman -S knot-resolver
  ubuntu: sudo apt install knot-resolver
provenance:
  formula: knot-resolver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
