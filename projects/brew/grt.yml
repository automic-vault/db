id: brew:grt
display-name: grt
homepage: https://nickgillian.com/grt/
repo: https://github.com/nickgillian/grt
docs: https://nickgillian.com/grt/
package-manager:
  brew: grt
package-manager-url: https://formulae.brew.sh/formula/grt
version: 0.2.4
license: MIT
category: development
tags:
  - cli
description: Gesture Recognition Toolkit for real-time machine learning
source-archive: https://github.com/nickgillian/grt/archive/refs/tags/v0.2.4.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: grt-lin-reg-tool
  - exposure: global executable
    kind: cli
    name: grt-log-reg-tool
  - exposure: global executable
    kind: cli
    name: grt-merge-tool
  - exposure: global executable
    kind: cli
    name: grt-mlp-tool
  - exposure: global executable
    kind: cli
    name: grt-rf-tool
  - exposure: global executable
    kind: cli
    name: grt-softmax-tool
  - exposure: global executable
    kind: cli
    name: grt-split-tool
  - exposure: global executable
    kind: cli
    name: grt-svm-tool
  - exposure: global executable
    kind: cli
    name: grt-test-tool
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:grt
  brew: brew install grt
provenance:
  formula: grt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
