id: brew:vimpager
display-name: vimpager
homepage: https://github.com/rkitover/vimpager
repo: https://github.com/rkitover/vimpager
docs: https://github.com/rkitover/vimpager
package-manager:
  brew: vimpager
  macports: vimpager
  nix: vimpager
  pacman: vimpager
package-manager-url: https://formulae.brew.sh/formula/vimpager
version: 2.06
license: BSD-2-Clause
category: development
tags:
  - cli
description: Use ViM as PAGER
source-archive: https://github.com/rkitover/vimpager/archive/refs/tags/2.06.tar.gz
build-dependencies:
  - pandoc
executables:
  - exposure: global executable
    kind: cli
    name: vimcat
  - exposure: global executable
    kind: cli
    name: vimpager
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To use vimpager as your default pager, add `export PAGER=vimpager` to your shell
    configuration.
  post-install-defined: false
install-lines:
  av: sudo av install brew:vimpager
  brew: brew install vimpager
  macports: sudo port install vimpager
  nix: nix profile install nixpkgs#vimpager
  pacman: sudo pacman -S vimpager
provenance:
  formula: vimpager
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
