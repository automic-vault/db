id: brew:eatmemory
display-name: eatmemory
homepage: https://github.com/julman99/eatmemory
repo: https://github.com/julman99/eatmemory
docs: https://github.com/julman99/eatmemory
package-manager:
  apk: eatmemory
  brew: eatmemory
  macports: eatmemory
package-manager-url: https://formulae.brew.sh/formula/eatmemory
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Simple program to allocate memory from the command-line
source-archive: https://github.com/julman99/eatmemory/archive/refs/tags/v1.1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: eatmemory
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add eatmemory
  av: sudo av install brew:eatmemory
  brew: brew install eatmemory
  macports: sudo port install eatmemory
provenance:
  formula: eatmemory
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
