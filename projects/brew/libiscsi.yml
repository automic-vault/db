id: brew:libiscsi
display-name: libiscsi
homepage: https://github.com/sahlberg/libiscsi
repo: https://github.com/sahlberg/libiscsi
docs: https://github.com/sahlberg/libiscsi
package-manager:
  apk: libiscsi
  brew: libiscsi
  dnf: libiscsi
  nix: libiscsi
  pacman: libiscsi
package-manager-url: https://formulae.brew.sh/formula/libiscsi
version: 1.20.3
license: LicenseRef-Homebrew-public-domain AND LGPL-2.1-or-later AND GPL-2.0-or-later
category: development
tags:
  - cli
description: Client library and utilities for iscsi
source-archive: https://github.com/sahlberg/libiscsi/archive/refs/tags/1.20.3.tar.gz
dependencies:
  - cunit
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: iscsi-discard
  - exposure: global executable
    kind: cli
    name: iscsi-inq
  - exposure: global executable
    kind: cli
    name: iscsi-ls
  - exposure: global executable
    kind: cli
    name: iscsi-md5sum
  - exposure: global executable
    kind: cli
    name: iscsi-perf
  - exposure: global executable
    kind: cli
    name: iscsi-pr
  - exposure: global executable
    kind: cli
    name: iscsi-readcapacity16
  - exposure: global executable
    kind: cli
    name: iscsi-rtpg
  - exposure: global executable
    kind: cli
    name: iscsi-swp
  - exposure: global executable
    kind: cli
    name: iscsi-test-cu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libiscsi
  av: sudo av install brew:libiscsi
  brew: brew install libiscsi
  dnf: sudo dnf install libiscsi
  nix: nix profile install nixpkgs#libiscsi
  pacman: sudo pacman -S libiscsi
provenance:
  formula: libiscsi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
