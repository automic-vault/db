id: brew:dbxml
display-name: dbxml
homepage: https://www.oracle.com/database/technologies/related/berkeleydb.html
repo: https://download.oracle.com/berkeley-db/dbxml-6.1.4.tar.gz
docs: https://www.oracle.com/database/technologies/related/berkeleydb.html
package-manager:
  brew: dbxml
  nix: dbxml
package-manager-url: https://formulae.brew.sh/formula/dbxml
version: 6.1.4
license: AGPL-3.0-only
category: database
tags:
  - cli
  - database
description: Embeddable XML database with XQuery support and other advanced features
source-archive: https://download.oracle.com/berkeley-db/dbxml-6.1.4.tar.gz
dependencies:
  - berkeley-db
  - xerces-c
  - xqilla
executables:
  - exposure: global executable
    kind: cli
    name: dbxml
  - exposure: global executable
    kind: cli
    name: dbxml_dump
  - exposure: global executable
    kind: cli
    name: dbxml_load
  - exposure: global executable
    kind: cli
    name: dbxml_load_container
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dbxml
  brew: brew install dbxml
  nix: nix profile install nixpkgs#dbxml
provenance:
  formula: dbxml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
