id: brew:ddate
display-name: ddate
homepage: https://github.com/bo0ts/ddate
repo: https://github.com/bo0ts/ddate
docs: https://github.com/bo0ts/ddate
package-manager:
  apk: ddate
  brew: ddate
  debian: ddate
  dnf: ddate
  nix: ddate
  ubuntu: ddate
package-manager-url: https://formulae.brew.sh/formula/ddate
version: 0.2.2
license: LicenseRef-Homebrew-public-domain
category: development
tags:
  - cli
description: Converts boring normal dates to fun Discordian Date
source-archive: https://github.com/bo0ts/ddate/archive/refs/tags/v0.2.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ddate
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ddate
  av: sudo av install brew:ddate
  brew: brew install ddate
  debian: sudo apt install ddate
  dnf: sudo dnf install ddate
  nix: nix profile install nixpkgs#ddate
  ubuntu: sudo apt install ddate
provenance:
  formula: ddate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
