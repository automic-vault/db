id: brew:mplayershell
display-name: mplayershell
homepage: https://github.com/lisamelton/MPlayerShell
repo: https://github.com/lisamelton/MPlayerShell
docs: https://github.com/lisamelton/MPlayerShell
package-manager:
  brew: mplayershell
  nix: mps
  scoop: extras/mps
package-manager-url: https://formulae.brew.sh/formula/mplayershell
version: 0.9.3
license: MIT
category: development
tags:
  - cli
description: Improved visual experience for MPlayer on macOS
source-archive: https://github.com/lisamelton/MPlayerShell/archive/refs/tags/0.9.3.tar.gz
dependencies:
  - mplayer
executables:
  - exposure: global executable
    kind: cli
    name: mps
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mplayershell
  brew: brew install mplayershell
  nix: nix profile install nixpkgs#mps
  scoop: scoop install extras/mps
provenance:
  formula: mplayershell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
