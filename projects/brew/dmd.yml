id: brew:dmd
display-name: dmd
homepage: https://dlang.org/
repo: https://github.com/dlang/dmd
docs: https://dlang.org/
package-manager:
  apk: dmd
  brew: dmd
  chocolatey: dmd
  macports: dmd
  nix: dmd
  pacman: dmd
  scoop: main/dmd
  winget: Dlang.DMD
  zypper: dmd
package-manager-url: https://formulae.brew.sh/formula/dmd
version: 2.112.0
license: BSL-1.0
category: development
tags:
  - cli
description: Digital Mars D compiler
source-archive: https://github.com/dlang/dmd/archive/refs/tags/v2.112.0.tar.gz
build-dependencies:
  - ldc
executables:
  - exposure: global executable
    kind: cli
    name: dmd
bottle:
  available: true
  platforms:
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: Ancillary tools (e.g. ddemangle, dustmite, rdmd) are now in the `dtools` formula.
  post-install-defined: true
install-lines:
  apk: sudo apk add dmd
  av: sudo av install brew:dmd
  brew: brew install dmd
  chocolatey: choco install dmd
  macports: sudo port install dmd
  nix: nix profile install nixpkgs#dmd
  pacman: sudo pacman -S dmd
  scoop: scoop install main/dmd
  winget: winget install --id Dlang.DMD -e
  zypper: sudo zypper install dmd
provenance:
  formula: dmd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
