id: brew:babl
display-name: babl
homepage: https://www.gegl.org/babl/
repo: https://download.gimp.org/pub/babl/0.1/babl-0.1.126.tar.xz
docs: https://www.gegl.org/babl/
package-manager:
  apk: babl
  brew: babl
  dnf: babl
  macports: babl
  nix: babl
  pacman: babl
package-manager-url: https://formulae.brew.sh/formula/babl
version: 0.1.126
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Dynamic, any-to-any, pixel format translation library
source-archive: https://download.gimp.org/pub/babl/0.1/babl-0.1.126.tar.xz
dependencies:
  - little-cms2
build-dependencies:
  - glib
  - gobject-introspection
  - meson
  - ninja
  - pcre2
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: babl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add babl
  av: sudo av install brew:babl
  brew: brew install babl
  dnf: sudo dnf install babl
  macports: sudo port install babl
  nix: nix profile install nixpkgs#babl
  pacman: sudo pacman -S babl
provenance:
  formula: babl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
