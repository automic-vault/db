id: brew:phodav
display-name: phodav
homepage: https://gitlab.gnome.org/GNOME/phodav
repo: https://download.gnome.org/sources/phodav/3.0/phodav-3.0.tar.xz
docs: https://gitlab.gnome.org/GNOME/phodav
package-manager:
  apk: phodav
  brew: phodav
  debian: chezdav
  dnf: chezdav
  nix: phodav
  pacman: phodav
  ubuntu: chezdav
  winget: Spice.SpiceWebDAVd
  zypper: chezdav
package-manager-url: https://formulae.brew.sh/formula/phodav
version: 3.0
license: LGPL-2.1-only
category: development
tags:
  - cli
description: WebDav server implementation using libsoup (RFC 4918)
source-archive: https://download.gnome.org/sources/phodav/3.0/phodav-3.0.tar.xz
dependencies:
  - gettext
  - glib
  - libsoup
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: chezdav
  - exposure: global executable
    kind: cli
    name: spice-webdavd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add phodav
  av: sudo av install brew:phodav
  brew: brew install phodav
  debian: sudo apt install chezdav
  dnf: sudo dnf install chezdav
  nix: nix profile install nixpkgs#phodav
  pacman: sudo pacman -S phodav
  ubuntu: sudo apt install chezdav
  winget: winget install --id Spice.SpiceWebDAVd -e
  zypper: sudo zypper install chezdav
provenance:
  formula: phodav
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
