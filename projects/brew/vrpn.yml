id: brew:vrpn
display-name: vrpn
homepage: https://github.com/vrpn/vrpn/wiki
repo: https://github.com/vrpn/vrpn
docs: https://github.com/vrpn/vrpn/wiki
package-manager:
  brew: vrpn
  dnf: vrpn
  macports: vrpn
  nix: vrpn
package-manager-url: https://formulae.brew.sh/formula/vrpn
version: 07.36
license: BSL-1.0
category: development
tags:
  - cli
description: Virtual reality peripheral network
source-archive: https://github.com/vrpn/vrpn/archive/refs/tags/v07.36.tar.gz
dependencies:
  - hidapi
  - jsoncpp
  - libusb
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: vrpn_server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vrpn
  brew: brew install vrpn
  dnf: sudo dnf install vrpn
  macports: sudo port install vrpn
  nix: nix profile install nixpkgs#vrpn
provenance:
  formula: vrpn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
