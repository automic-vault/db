id: brew:yamlfmt
display-name: yamlfmt
homepage: https://github.com/google/yamlfmt
repo: https://github.com/google/yamlfmt
docs: https://github.com/google/yamlfmt
package-manager:
  apk: yamlfmt
  brew: yamlfmt
  nix: yamlfmt
  pacman: yamlfmt
  scoop: main/yamlfmt
package-manager-url: https://formulae.brew.sh/formula/yamlfmt
version: 0.21.0
license: Apache-2.0
category: development
tags:
  - cli
  - yaml
description: Extensible command-line tool to format YAML files
source-archive: https://github.com/google/yamlfmt/archive/refs/tags/v0.21.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: yamlfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yamlfmt
  av: sudo av install brew:yamlfmt
  brew: brew install yamlfmt
  nix: nix profile install nixpkgs#yamlfmt
  pacman: sudo pacman -S yamlfmt
  scoop: scoop install main/yamlfmt
provenance:
  formula: yamlfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
