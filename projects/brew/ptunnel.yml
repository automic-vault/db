id: brew:ptunnel
display-name: ptunnel
homepage: https://www.cs.uit.no/~daniels/PingTunnel/
repo: https://www.cs.uit.no/~daniels/PingTunnel/PingTunnel-0.72.tar.gz
docs: https://www.cs.uit.no/~daniels/PingTunnel/
package-manager:
  brew: ptunnel
  debian: ptunnel
  macports: ptunnel
  nix: ptunnel
  pacman: ptunnel
  ubuntu: ptunnel
package-manager-url: https://formulae.brew.sh/formula/ptunnel
version: 0.72
license: BSD-3-Clause
category: network
tags:
  - cli
description: Tunnel over ICMP
source-archive: https://www.cs.uit.no/~daniels/PingTunnel/PingTunnel-0.72.tar.gz
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: ptunnel
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Normally, ptunnel uses raw sockets and must be run as root (using sudo, for
    example). Alternatively, you can try using the -u flag to start ptunnel in
    'unprivileged' mode, but this is not recommended. See
    https://www.cs.uit.no/~daniels/PingTunnel/ for details.
  post-install-defined: false
install-lines:
  av: sudo av install brew:ptunnel
  brew: brew install ptunnel
  debian: sudo apt install ptunnel
  macports: sudo port install ptunnel
  nix: nix profile install nixpkgs#ptunnel
  pacman: sudo pacman -S ptunnel
  ubuntu: sudo apt install ptunnel
provenance:
  formula: ptunnel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
