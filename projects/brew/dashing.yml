id: brew:dashing
display-name: dashing
homepage: https://github.com/technosophos/dashing
repo: https://github.com/technosophos/dashing
docs: https://github.com/technosophos/dashing
package-manager:
  brew: dashing
  macports: dashing
  nix: dashing
package-manager-url: https://formulae.brew.sh/formula/dashing
version: 0.4.0
license: MIT
category: development
tags:
  - cli
description: Generate Dash documentation from HTML files
source-archive: https://github.com/technosophos/dashing/archive/refs/tags/0.4.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dashing
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dashing
  brew: brew install dashing
  macports: sudo port install dashing
  nix: nix profile install nixpkgs#dashing
provenance:
  formula: dashing
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
