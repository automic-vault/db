id: brew:audacious
display-name: audacious
homepage: https://audacious-media-player.org/
repo: https://distfiles.audacious-media-player.org/audacious-4.5.1.tar.bz2
docs: https://audacious-media-player.org/
package-manager:
  apk: audacious
  brew: audacious
  chocolatey: audacious
  debian: audacious
  dnf: audacious
  macports: audacious
  nix: audacious
  pacman: audacious
  scoop: extras/audacious
  ubuntu: audacious
  winget: Audacious.MediaPlayer
  zypper: audacious
package-manager-url: https://formulae.brew.sh/formula/audacious
version: 4.5.1
license: BSD-2-Clause
category: media
tags:
  - cli
description: Lightweight and versatile audio player
source-archive: https://distfiles.audacious-media-player.org/audacious-4.5.1.tar.bz2
dependencies:
  - faad2
  - ffmpeg
  - flac
  - fluid-synth
  - gdk-pixbuf
  - gettext
  - glib
  - lame
  - libbs2b
  - libcue
  - libmodplug
  - libnotify
  - libogg
  - libopenmpt
  - libsamplerate
  - libsndfile
  - libsoxr
  - libvorbis
  - mpg123
  - neon
  - opusfile
  - qtbase
  - qtimageformats
  - qtmultimedia
  - qtsvg
  - sdl3
  - wavpack
build-dependencies:
  - gettext
  - meson
  - ninja
  - pkgconf
  - qttools
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: audacious
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    audtool does not work due to a broken dbus implementation on macOS, so it is not
    built. GTK+ GUI is not built by default as the Qt GUI has better integration with
    macOS, and the GTK GUI would take precedence if present.
  post-install-defined: false
install-lines:
  apk: sudo apk add audacious
  av: sudo av install brew:audacious
  brew: brew install audacious
  chocolatey: choco install audacious
  debian: sudo apt install audacious
  dnf: sudo dnf install audacious
  macports: sudo port install audacious
  nix: nix profile install nixpkgs#audacious
  pacman: sudo pacman -S audacious
  scoop: scoop install extras/audacious
  ubuntu: sudo apt install audacious
  winget: winget install --id Audacious.MediaPlayer -e
  zypper: sudo zypper install audacious
provenance:
  formula: audacious
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
