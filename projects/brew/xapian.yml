id: brew:xapian
display-name: xapian
homepage: https://xapian.org/
repo: https://oligarchy.co.uk/xapian/2.0.0/xapian-core-2.0.0.tar.xz
docs: https://xapian.org/
package-manager:
  brew: xapian
  nix: xapian
package-manager-url: https://formulae.brew.sh/formula/xapian
version: 2.0.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: C++ search engine library
source-archive: https://oligarchy.co.uk/xapian/2.0.0/xapian-core-2.0.0.tar.xz
build-dependencies:
  - python@3.14
  - sphinx-doc
executables:
  - exposure: global executable
    kind: cli
    name: copydatabase
  - exposure: global executable
    kind: cli
    name: simpleexpand
  - exposure: global executable
    kind: cli
    name: simpleindex
  - exposure: global executable
    kind: cli
    name: simplesearch
  - exposure: global executable
    kind: cli
    name: xapian-check
  - exposure: global executable
    kind: cli
    name: xapian-compact
  - exposure: global executable
    kind: cli
    name: xapian-config
  - exposure: global executable
    kind: cli
    name: xapian-delve
  - exposure: global executable
    kind: cli
    name: xapian-metadata
  - exposure: global executable
    kind: cli
    name: xapian-pos
  - exposure: global executable
    kind: cli
    name: xapian-progsrv
  - exposure: global executable
    kind: cli
    name: xapian-quest
  - exposure: global executable
    kind: cli
    name: xapian-replicate
  - exposure: global executable
    kind: cli
    name: xapian-replicate-server
  - exposure: global executable
    kind: cli
    name: xapian-tcpsrv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xapian
  brew: brew install xapian
  nix: nix profile install nixpkgs#xapian
provenance:
  formula: xapian
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
