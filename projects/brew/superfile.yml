id: brew:superfile
display-name: superfile
homepage: https://superfile.netlify.app/
repo: https://github.com/yorukot/superfile
docs: https://superfile.netlify.app/
package-manager:
  brew: superfile
  macports: superfile
  nix: superfile
  pacman: superfile
  scoop: main/superfile
  winget: yorukot.superfile
package-manager-url: https://formulae.brew.sh/formula/superfile
version: 1.5.0
license: MIT
category: development
tags:
  - cli
description: Modern and pretty fancy file manager for the terminal
source-archive: https://github.com/yorukot/superfile/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: spf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:superfile
  brew: brew install superfile
  macports: sudo port install superfile
  nix: nix profile install nixpkgs#superfile
  pacman: sudo pacman -S superfile
  scoop: scoop install main/superfile
  winget: winget install --id yorukot.superfile -e
provenance:
  formula: superfile
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
