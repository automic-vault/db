id: brew:loc
display-name: loc
homepage: https://github.com/cgag/loc
repo: https://github.com/cgag/loc
docs: https://github.com/cgag/loc
package-manager:
  brew: loc
package-manager-url: https://formulae.brew.sh/formula/loc
version: 0.4.1
license: MIT
category: development
tags:
  - cli
description: Count lines of code quickly
source-archive: https://github.com/cgag/loc/archive/refs/tags/v0.4.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: loc
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:loc
  brew: brew install loc
provenance:
  formula: loc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
