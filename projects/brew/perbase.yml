id: brew:perbase
display-name: perbase
homepage: https://github.com/sstadick/perbase
repo: https://github.com/sstadick/perbase
docs: https://github.com/sstadick/perbase
package-manager:
  brew: perbase
package-manager-url: https://formulae.brew.sh/formula/perbase
version: 1.4.0
license: MIT
category: development
tags:
  - cli
description: Fast and correct perbase BAM/CRAM analysis
source-archive: https://github.com/sstadick/perbase/archive/refs/tags/v1.4.0.tar.gz
build-dependencies:
  - cmake
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
  - curl
  - llvm
executables:
  - exposure: global executable
    kind: cli
    name: perbase
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:perbase
  brew: brew install perbase
provenance:
  formula: perbase
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
