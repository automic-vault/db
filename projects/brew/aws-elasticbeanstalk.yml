id: brew:aws-elasticbeanstalk
display-name: aws-elasticbeanstalk
homepage: https://docs.aws.amazon.com/elasticbeanstalk/latest/dg/eb-cli3.html
repo: >
  https://files.pythonhosted.org/packages/9d/a4/662a766f2c975c2b09ea5d4b1367492df74678e2844050be7b5fc2bb38eb/awsebcli-3.27.2.tar.gz
docs: https://docs.aws.amazon.com/elasticbeanstalk/latest/dg/eb-cli3.html
package-manager:
  brew: aws-elasticbeanstalk
  dnf: eb
  macports: eb
  zypper: eb
package-manager-url: https://formulae.brew.sh/formula/aws-elasticbeanstalk
version: 3.27.2
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: Client for Amazon Elastic Beanstalk web service
source-archive: >
  https://files.pythonhosted.org/packages/9d/a4/662a766f2c975c2b09ea5d4b1367492df74678e2844050be7b5fc2bb38eb/awsebcli-3.27.2.tar.gz
dependencies:
  - certifi
  - cryptography
  - libsodium
  - libyaml
  - python@3.14
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: eb
  - exposure: global executable
    kind: cli
    name: ebp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aws-elasticbeanstalk
  brew: brew install aws-elasticbeanstalk
  dnf: sudo dnf install eb
  macports: sudo port install eb
  zypper: sudo zypper install eb
provenance:
  formula: aws-elasticbeanstalk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
