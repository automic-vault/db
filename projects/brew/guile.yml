id: brew:guile
display-name: guile
homepage: https://www.gnu.org/software/guile/
repo: https://ftpmirror.gnu.org/gnu/guile/guile-3.0.11.tar.xz
docs: https://www.gnu.org/software/guile/
package-manager:
  apk: guile
  brew: guile
  macports: guile
  nix: guile
  pacman: guile
  zypper: guile
package-manager-url: https://formulae.brew.sh/formula/guile
version: 3.0.11
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: GNU Ubiquitous Intelligent Language for Extensions
source-archive: https://ftpmirror.gnu.org/gnu/guile/guile-3.0.11.tar.xz
dependencies:
  - bdw-gc
  - gmp
  - libtool
  - libunistring
  - pkgconf
  - readline
build-dependencies:
  - gnu-sed
uses-from-macos:
  - gperf
  - libffi
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: guild
  - exposure: global executable
    kind: cli
    name: guile
  - exposure: global executable
    kind: cli
    name: guile-config
  - exposure: global executable
    kind: cli
    name: guile-snarf
  - exposure: global executable
    kind: cli
    name: guile-tools
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Guile libraries can now be installed here: Source files:
    $HOMEBREW_PREFIX/share/guile/site/3.0 Compiled files:
    $HOMEBREW_PREFIX/lib/guile/3.0/site-ccache Extensions:
    $HOMEBREW_PREFIX/lib/guile/3.0/extensions Add the following to your .bashrc or
    equivalent: export GUILE_LOAD_PATH="$HOMEBREW_PREFIX/share/guile/site/3.0" export
    GUILE_LOAD_COMPILED_PATH="$HOMEBREW_PREFIX/lib/guile/3.0/site-ccache" export
    GUILE_SYSTEM_EXTENSIONS_PATH="$HOMEBREW_PREFIX/lib/guile/3.0/extensions"
  post-install-defined: true
install-lines:
  apk: sudo apk add guile
  av: sudo av install brew:guile
  brew: brew install guile
  macports: sudo port install guile
  nix: nix profile install nixpkgs#guile
  pacman: sudo pacman -S guile
  zypper: sudo zypper install guile
provenance:
  formula: guile
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
