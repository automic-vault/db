id: brew:spatialite-tools
display-name: spatialite-tools
homepage: https://www.gaia-gis.it/fossil/spatialite-tools/index
repo: >
  https://www.gaia-gis.it/gaia-sins/spatialite-tools-sources/spatialite-tools-5.1.0a.tar.gz
docs: https://www.gaia-gis.it/fossil/spatialite-tools/index
package-manager:
  brew: spatialite-tools
  dnf: spatialite-tools
  macports: spatialite-tools
  nix: spatialite-tools
package-manager-url: https://formulae.brew.sh/formula/spatialite-tools
version: 5.1.0a
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: CLI tools supporting SpatiaLite
source-archive: >
  https://www.gaia-gis.it/gaia-sins/spatialite-tools-sources/spatialite-tools-5.1.0a.tar.gz
dependencies:
  - freexl
  - geos
  - librttopo
  - libspatialite
  - libxml2
  - minizip
  - proj
  - readline
  - readosm
  - sqlite
build-dependencies:
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: exif_loader
  - exposure: global executable
    kind: cli
    name: shp_doctor
  - exposure: global executable
    kind: cli
    name: shp_sanitize
  - exposure: global executable
    kind: cli
    name: spatialite
  - exposure: global executable
    kind: cli
    name: spatialite_convert
  - exposure: global executable
    kind: cli
    name: spatialite_dem
  - exposure: global executable
    kind: cli
    name: spatialite_dxf
  - exposure: global executable
    kind: cli
    name: spatialite_gml
  - exposure: global executable
    kind: cli
    name: spatialite_network
  - exposure: global executable
    kind: cli
    name: spatialite_osm_filter
  - exposure: global executable
    kind: cli
    name: spatialite_osm_map
  - exposure: global executable
    kind: cli
    name: spatialite_osm_net
  - exposure: global executable
    kind: cli
    name: spatialite_osm_overpass
  - exposure: global executable
    kind: cli
    name: spatialite_osm_raw
  - exposure: global executable
    kind: cli
    name: spatialite_tool
  - exposure: global executable
    kind: cli
    name: spatialite_xml2utf8
  - exposure: global executable
    kind: cli
    name: spatialite_xml_collapse
  - exposure: global executable
    kind: cli
    name: spatialite_xml_load
  - exposure: global executable
    kind: cli
    name: spatialite_xml_print
  - exposure: global executable
    kind: cli
    name: spatialite_xml_validator
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spatialite-tools
  brew: brew install spatialite-tools
  dnf: sudo dnf install spatialite-tools
  macports: sudo port install spatialite-tools
  nix: nix profile install nixpkgs#spatialite-tools
provenance:
  formula: spatialite-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
