id: brew:gh
display-name: gh
homepage: https://cli.github.com/
repo: https://github.com/cli/cli
docs: https://cli.github.com/
package-manager:
  brew: gh
  chocolatey: gh
  debian: gh
  dnf: gh
  macports: gh
  nix: gh
  scoop: main/gh
  ubuntu: gh
  winget: GitHub.cli
  zypper: gh
package-manager-url: https://formulae.brew.sh/formula/gh
version: 2.92.0
license: MIT
category: development
tags:
  - cli
description: GitHub command-line tool
source-archive: https://github.com/cli/cli/archive/refs/tags/v2.92.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gh
  brew: brew install gh
  chocolatey: choco install gh
  debian: sudo apt install gh
  dnf: sudo dnf install gh
  macports: sudo port install gh
  nix: nix profile install nixpkgs#gh
  scoop: scoop install main/gh
  ubuntu: sudo apt install gh
  winget: winget install --id GitHub.cli -e
  zypper: sudo zypper install gh
provenance:
  formula: gh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
