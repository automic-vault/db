id: brew:anubis
display-name: anubis
homepage: https://anubis.techaro.lol
repo: https://github.com/TecharoHQ/anubis
docs: https://anubis.techaro.lol
package-manager:
  apk: anubis
  brew: anubis
  dnf: anubis
  macports: anubis
  nix: anubis
  pacman: anubis
  zypper: anubis
package-manager-url: https://formulae.brew.sh/formula/anubis
version: 1.25.0
license: MIT
category: development
tags:
  - cli
description: Protect resources from scraper bots
source-archive: https://github.com/TecharoHQ/anubis/archive/refs/tags/v1.25.0.tar.gz
build-dependencies:
  - bash
  - brotli
  - go
  - node
  - zstd
executables:
  - exposure: global executable
    kind: cli
    name: anubis
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add anubis
  av: sudo av install brew:anubis
  brew: brew install anubis
  dnf: sudo dnf install anubis
  macports: sudo port install anubis
  nix: nix profile install nixpkgs#anubis
  pacman: sudo pacman -S anubis
  zypper: sudo zypper install anubis
provenance:
  formula: anubis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
