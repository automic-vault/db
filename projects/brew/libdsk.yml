id: brew:libdsk
display-name: libdsk
homepage: https://www.seasip.info/Unix/LibDsk/
repo: https://www.seasip.info/Unix/LibDsk/libdsk-1.4.2.tar.gz
docs: https://www.seasip.info/Unix/LibDsk/
package-manager:
  brew: libdsk
  dnf: libdsk
  macports: libdsk
  nix: libdsk
package-manager-url: https://formulae.brew.sh/formula/libdsk
version: 1.4.2
license: LGPL-2.0-or-later
category: media
tags:
  - cli
description: Library for accessing discs and disc image files
source-archive: https://www.seasip.info/Unix/LibDsk/libdsk-1.4.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: apriboot
  - exposure: global executable
    kind: cli
    name: dskdump
  - exposure: global executable
    kind: cli
    name: dskform
  - exposure: global executable
    kind: cli
    name: dskid
  - exposure: global executable
    kind: cli
    name: dskscan
  - exposure: global executable
    kind: cli
    name: dsktrans
  - exposure: global executable
    kind: cli
    name: dskutil
  - exposure: global executable
    kind: cli
    name: md3serial
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libdsk
  brew: brew install libdsk
  dnf: sudo dnf install libdsk
  macports: sudo port install libdsk
  nix: nix profile install nixpkgs#libdsk
provenance:
  formula: libdsk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
