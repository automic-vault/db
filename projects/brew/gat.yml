id: brew:gat
display-name: gat
homepage: https://github.com/koki-develop/gat
repo: https://github.com/koki-develop/gat
docs: https://github.com/koki-develop/gat
package-manager:
  brew: gat
  macports: gat
  nix: gat
package-manager-url: https://formulae.brew.sh/formula/gat
version: 0.27.2
license: MIT
category: development
tags:
  - cli
description: Cat alternative written in Go
source-archive: https://github.com/koki-develop/gat/archive/refs/tags/v0.27.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gat
  brew: brew install gat
  macports: sudo port install gat
  nix: nix profile install nixpkgs#gat
provenance:
  formula: gat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
