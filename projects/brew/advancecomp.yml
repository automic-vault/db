id: brew:advancecomp
display-name: advancecomp
homepage: https://www.advancemame.it/comp-readme.html
repo: https://github.com/amadvance/advancecomp
docs: https://www.advancemame.it/comp-readme.html
package-manager:
  apk: advancecomp
  brew: advancecomp
  debian: advancecomp
  dnf: advancecomp
  macports: advancecomp
  nix: advancecomp
  ubuntu: advancecomp
package-manager-url: https://formulae.brew.sh/formula/advancecomp
version: 2.6
license: GPL-3.0-only
category: development
tags:
  - cli
description: Recompression utilities for .PNG, .MNG, .ZIP, and .GZ files
source-archive: https://github.com/amadvance/advancecomp/releases/download/v2.6/advancecomp-2.6.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: advdef
  - exposure: global executable
    kind: cli
    name: advmng
  - exposure: global executable
    kind: cli
    name: advpng
  - exposure: global executable
    kind: cli
    name: advzip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add advancecomp
  av: sudo av install brew:advancecomp
  brew: brew install advancecomp
  debian: sudo apt install advancecomp
  dnf: sudo dnf install advancecomp
  macports: sudo port install advancecomp
  nix: nix profile install nixpkgs#advancecomp
  ubuntu: sudo apt install advancecomp
provenance:
  formula: advancecomp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
