id: brew:sassc
display-name: sassc
homepage: https://github.com/sass/sassc
repo: https://github.com/sass/sassc
docs: https://github.com/sass/sassc
package-manager:
  apk: sassc
  brew: sassc
  debian: sassc
  dnf: sassc
  macports: sassc
  nix: sassc
  pacman: sassc
  ubuntu: sassc
  zypper: sassc
package-manager-url: https://formulae.brew.sh/formula/sassc
version: 3.6.2
license: MIT
category: development
tags:
  - cli
description: Wrapper around libsass that helps to create command-line apps
source-archive: https://github.com/sass/sassc.git
dependencies:
  - libsass
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: sassc
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sassc
  av: sudo av install brew:sassc
  brew: brew install sassc
  debian: sudo apt install sassc
  dnf: sudo dnf install sassc
  macports: sudo port install sassc
  nix: nix profile install nixpkgs#sassc
  pacman: sudo pacman -S sassc
  ubuntu: sudo apt install sassc
  zypper: sudo zypper install sassc
provenance:
  formula: sassc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
