id: brew:cloudflare-quiche
display-name: cloudflare-quiche
homepage: https://docs.quic.tech/quiche/
repo: https://github.com/cloudflare/quiche
docs: https://docs.quic.tech/quiche/
package-manager:
  brew: cloudflare-quiche
package-manager-url: https://formulae.brew.sh/formula/cloudflare-quiche
version: 0.29.0
license: BSD-2-Clause
category: cloud
tags:
  - cli
description: Savoury implementation of the QUIC transport protocol and HTTP/3
source-archive: https://github.com/cloudflare/quiche.git
dependencies:
  - fontconfig
build-dependencies:
  - cmake
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: quiche-client
  - exposure: global executable
    kind: cli
    name: quiche-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloudflare-quiche
  brew: brew install cloudflare-quiche
provenance:
  formula: cloudflare-quiche
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
