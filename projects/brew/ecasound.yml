id: brew:ecasound
display-name: ecasound
homepage: https://nosignal.fi/ecasound/
repo: https://nosignal.fi/download/ecasound-2.9.3.tar.gz
docs: https://nosignal.fi/ecasound/
package-manager:
  apk: ecasound
  brew: ecasound
  debian: ecasound
  nix: ecasound
  pacman: ecasound
  ubuntu: ecasound
package-manager-url: https://formulae.brew.sh/formula/ecasound
version: 2.9.3
license: GPL-2.0-or-later
category: media
tags:
  - cli
description: Multitrack-capable audio recorder and effect processor
source-archive: https://nosignal.fi/download/ecasound-2.9.3.tar.gz
dependencies:
  - jack
  - libsamplerate
  - libsndfile
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ecaconvert
  - exposure: global executable
    kind: cli
    name: ecafixdc
  - exposure: global executable
    kind: cli
    name: ecalength
  - exposure: global executable
    kind: cli
    name: ecamonitor
  - exposure: global executable
    kind: cli
    name: ecanormalize
  - exposure: global executable
    kind: cli
    name: ecaplay
  - exposure: global executable
    kind: cli
    name: ecasignalview
  - exposure: global executable
    kind: cli
    name: ecasound
  - exposure: global executable
    kind: cli
    name: libecasound-config
  - exposure: global executable
    kind: cli
    name: libecasoundc-config
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ecasound
  av: sudo av install brew:ecasound
  brew: brew install ecasound
  debian: sudo apt install ecasound
  nix: nix profile install nixpkgs#ecasound
  pacman: sudo pacman -S ecasound
  ubuntu: sudo apt install ecasound
provenance:
  formula: ecasound
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
