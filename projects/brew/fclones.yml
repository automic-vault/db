id: brew:fclones
display-name: fclones
homepage: https://github.com/pkolaczk/fclones
repo: https://github.com/pkolaczk/fclones
docs: https://github.com/pkolaczk/fclones
package-manager:
  apk: fclones
  brew: fclones
  macports: fclones
  nix: fclones
  pacman: fclones
  scoop: extras/fclones
  zypper: fclones
package-manager-url: https://formulae.brew.sh/formula/fclones
version: 0.35.0
license: MIT
category: development
tags:
  - cli
description: Efficient Duplicate File Finder
source-archive: https://github.com/pkolaczk/fclones/archive/refs/tags/v0.35.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fclones
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fclones
  av: sudo av install brew:fclones
  brew: brew install fclones
  macports: sudo port install fclones
  nix: nix profile install nixpkgs#fclones
  pacman: sudo pacman -S fclones
  scoop: scoop install extras/fclones
  zypper: sudo zypper install fclones
provenance:
  formula: fclones
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
