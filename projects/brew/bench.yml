id: brew:bench
display-name: bench
homepage: https://github.com/Gabriella439/bench
repo: https://hackage.haskell.org/package/bench-1.0.13/bench-1.0.13.tar.gz
docs: https://github.com/Gabriella439/bench
package-manager:
  brew: bench
  dnf: bench
  nix: bench
package-manager-url: https://formulae.brew.sh/formula/bench
version: 1.0.13
license: BSD-3-Clause
category: development
tags:
  - cli
description: Command-line benchmark tool
source-archive: https://hackage.haskell.org/package/bench-1.0.13/bench-1.0.13.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: bench
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bench
  brew: brew install bench
  dnf: sudo dnf install bench
  nix: nix profile install nixpkgs#bench
provenance:
  formula: bench
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
