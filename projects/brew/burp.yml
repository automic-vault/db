id: brew:burp
display-name: burp
homepage: https://burp.grke.org/
repo: https://github.com/grke/burp
docs: https://burp.grke.org/
package-manager:
  apk: burp
  brew: burp
  debian: burp
  macports: burp
  nix: burp
  ubuntu: burp
package-manager-url: https://formulae.brew.sh/formula/burp
version: 3.2.0
license: AGPL-3.0-only WITH openvpn-openssl-exception
category: development
tags:
  - cli
description: Network backup and restore
source-archive: https://github.com/grke/burp/releases/download/3.2.0/burp-3.2.0.tar.bz2
dependencies:
  - librsync
  - openssl@4
build-dependencies:
  - pkgconf
  - uthash
uses-from-macos:
  - libxcrypt
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: bedup
  - exposure: global executable
    kind: cli
    name: bsigs
  - exposure: global executable
    kind: cli
    name: bsparse
  - exposure: global executable
    kind: cli
    name: burp
  - exposure: global executable
    kind: cli
    name: burp_ca
  - exposure: global executable
    kind: cli
    name: vss_strip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Before installing the launchd entry you should configure your burp client in
    $HOMEBREW_PREFIX/etc/burp/burp.conf
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add burp
  av: sudo av install brew:burp
  brew: brew install burp
  debian: sudo apt install burp
  macports: sudo port install burp
  nix: nix profile install nixpkgs#burp
  ubuntu: sudo apt install burp
provenance:
  formula: burp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
