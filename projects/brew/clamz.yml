id: brew:clamz
display-name: clamz
homepage: https://code.google.com/archive/p/clamz/
repo: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/clamz/clamz-0.5.tar.gz
docs: https://code.google.com/archive/p/clamz/
package-manager:
  brew: clamz
  dnf: clamz
  ubuntu: clamz
package-manager-url: https://formulae.brew.sh/formula/clamz
version: 0.5
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Download MP3 files from Amazon's music store
source-archive: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/clamz/clamz-0.5.tar.gz
dependencies:
  - libgcrypt
  - libgpg-error
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: clamz
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clamz
  brew: brew install clamz
  dnf: sudo dnf install clamz
  ubuntu: sudo apt install clamz
provenance:
  formula: clamz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
