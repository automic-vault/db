id: brew:cpmtools
display-name: cpmtools
homepage: https://www.moria.de/~michael/cpmtools/
repo: https://www.moria.de/~michael/cpmtools/files/cpmtools-2.23.tar.gz
docs: https://www.moria.de/~michael/cpmtools/
package-manager:
  brew: cpmtools
  debian: cpmtools
  dnf: cpmtools
  macports: cpmtools
  ubuntu: cpmtools
package-manager-url: https://formulae.brew.sh/formula/cpmtools
version: 2.23
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Tools to access CP/M file systems
source-archive: https://www.moria.de/~michael/cpmtools/files/cpmtools-2.23.tar.gz
dependencies:
  - libdsk
build-dependencies:
  - autoconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cpmchattr
  - exposure: global executable
    kind: cli
    name: cpmchmod
  - exposure: global executable
    kind: cli
    name: cpmcp
  - exposure: global executable
    kind: cli
    name: cpmls
  - exposure: global executable
    kind: cli
    name: cpmrm
  - exposure: global executable
    kind: cli
    name: fsck.cpm
  - exposure: global executable
    kind: cli
    name: fsed.cpm
  - exposure: global executable
    kind: cli
    name: mkfs.cpm
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cpmtools
  brew: brew install cpmtools
  debian: sudo apt install cpmtools
  dnf: sudo dnf install cpmtools
  macports: sudo port install cpmtools
  ubuntu: sudo apt install cpmtools
provenance:
  formula: cpmtools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
