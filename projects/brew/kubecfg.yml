id: brew:kubecfg
display-name: kubecfg
homepage: https://github.com/kubecfg/kubecfg
repo: https://github.com/kubecfg/kubecfg
docs: https://github.com/kubecfg/kubecfg
package-manager:
  brew: kubecfg
  nix: kubecfg
package-manager-url: https://formulae.brew.sh/formula/kubecfg
version: 0.36.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Manage complex enterprise Kubernetes environments as code
source-archive: https://github.com/kubecfg/kubecfg/archive/refs/tags/v0.36.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubecfg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubecfg
  brew: brew install kubecfg
  nix: nix profile install nixpkgs#kubecfg
provenance:
  formula: kubecfg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
