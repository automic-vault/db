id: brew:et
display-name: et
homepage: https://mistertea.github.io/EternalTerminal/
repo: https://github.com/MisterTea/EternalTerminal
docs: https://mistertea.github.io/EternalTerminal/
package-manager:
  brew: et
  dnf: et
  macports: et
  nix: et
package-manager-url: https://formulae.brew.sh/formula/et
version: 6.2.11
license: Apache-2.0
category: development
tags:
  - cli
description: Remote terminal with IP roaming
source-archive: https://github.com/MisterTea/EternalTerminal/archive/refs/tags/et-v6.2.11.tar.gz
dependencies:
  - libsodium
  - openssl@4
  - protobuf
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: et
  - exposure: global executable
    kind: cli
    name: etserver
  - exposure: global executable
    kind: cli
    name: etterminal
  - exposure: global executable
    kind: cli
    name: htm
  - exposure: global executable
    kind: cli
    name: htmd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:et
  brew: brew install et
  dnf: sudo dnf install et
  macports: sudo port install et
  nix: nix profile install nixpkgs#et
provenance:
  formula: et
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
