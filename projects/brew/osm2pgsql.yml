id: brew:osm2pgsql
display-name: osm2pgsql
homepage: https://osm2pgsql.org
repo: https://github.com/osm2pgsql-dev/osm2pgsql
docs: https://osm2pgsql.org
package-manager:
  brew: osm2pgsql
  debian: osm2pgsql
  dnf: osm2pgsql
  macports: osm2pgsql
  nix: osm2pgsql
  pacman: osm2pgsql
  ubuntu: osm2pgsql
package-manager-url: https://formulae.brew.sh/formula/osm2pgsql
version: 2.2.0
license: GPL-2.0-or-later
category: database
tags:
  - cli
description: OpenStreetMap data to PostgreSQL converter
source-archive: https://github.com/osm2pgsql-dev/osm2pgsql/archive/refs/tags/2.2.0.tar.gz
dependencies:
  - libpq
  - luajit
  - proj
build-dependencies:
  - boost
  - cli11
  - cmake
  - libosmium
  - lua
  - nlohmann-json
  - protozero
uses-from-macos:
  - bzip2
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: osm2pgsql
  - exposure: global executable
    kind: cli
    name: osm2pgsql-replication
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:osm2pgsql
  brew: brew install osm2pgsql
  debian: sudo apt install osm2pgsql
  dnf: sudo dnf install osm2pgsql
  macports: sudo port install osm2pgsql
  nix: nix profile install nixpkgs#osm2pgsql
  pacman: sudo pacman -S osm2pgsql
  ubuntu: sudo apt install osm2pgsql
provenance:
  formula: osm2pgsql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
