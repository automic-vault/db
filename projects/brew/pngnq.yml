id: brew:pngnq
display-name: pngnq
homepage: https://pngnq.sourceforge.net/
repo: https://downloads.sourceforge.net/project/pngnq/pngnq/1.1/pngnq-1.1.tar.gz
docs: https://pngnq.sourceforge.net/
package-manager:
  brew: pngnq
  debian: pngnq
  dnf: pngnq
  nix: pngnq
  ubuntu: pngnq
package-manager-url: https://formulae.brew.sh/formula/pngnq
version: 1.1
license: BSD-3-Clause
category: media
tags:
  - cli
description: Tool for optimizing PNG images
source-archive: https://downloads.sourceforge.net/project/pngnq/pngnq/1.1/pngnq-1.1.tar.gz
dependencies:
  - libpng
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pngcomp
  - exposure: global executable
    kind: cli
    name: pngnq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pngnq
  brew: brew install pngnq
  debian: sudo apt install pngnq
  dnf: sudo dnf install pngnq
  nix: nix profile install nixpkgs#pngnq
  ubuntu: sudo apt install pngnq
provenance:
  formula: pngnq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
