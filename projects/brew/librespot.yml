id: brew:librespot
display-name: librespot
homepage: https://github.com/librespot-org/librespot
repo: https://github.com/librespot-org/librespot
docs: https://github.com/librespot-org/librespot
package-manager:
  apk: librespot
  brew: librespot
  nix: librespot
  pacman: librespot
package-manager-url: https://formulae.brew.sh/formula/librespot
version: 0.8.0
license: MIT
category: development
tags:
  - cli
description: Open Source Spotify client library
source-archive: https://github.com/librespot-org/librespot/archive/refs/tags/v0.8.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: librespot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add librespot
  av: sudo av install brew:librespot
  brew: brew install librespot
  nix: nix profile install nixpkgs#librespot
  pacman: sudo pacman -S librespot
provenance:
  formula: librespot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
