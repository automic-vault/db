id: brew:ctags-lsp
display-name: ctags-lsp
homepage: https://github.com/netmute/ctags-lsp
repo: https://github.com/netmute/ctags-lsp
docs: https://github.com/netmute/ctags-lsp
package-manager:
  apk: ctags-lsp
  brew: ctags-lsp
  nix: ctags-lsp
package-manager-url: https://formulae.brew.sh/formula/ctags-lsp
version: 0.11.0
license: MIT
category: development
tags:
  - cli
description: LSP implementation using universal-ctags as backend
source-archive: https://github.com/netmute/ctags-lsp/archive/refs/tags/v0.11.0.tar.gz
dependencies:
  - universal-ctags
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ctags-lsp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ctags-lsp
  av: sudo av install brew:ctags-lsp
  brew: brew install ctags-lsp
  nix: nix profile install nixpkgs#ctags-lsp
provenance:
  formula: ctags-lsp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
