id: brew:libmemcached
display-name: libmemcached
homepage: https://libmemcached.org/
repo: https://launchpad.net/libmemcached/1.0/1.0.18/+download/libmemcached-1.0.18.tar.gz
docs: https://libmemcached.org/
package-manager:
  apk: libmemcached
  brew: libmemcached
  debian: memdump
  macports: libmemcached
  nix: libmemcached
  ubuntu: memdump
  zypper: libmemcached
package-manager-url: https://formulae.brew.sh/formula/libmemcached
version: 1.0.18
license: BSD-3-Clause
category: network
tags:
  - cli
description: C and C++ client library to the memcached server
source-archive: https://launchpad.net/libmemcached/1.0/1.0.18/+download/libmemcached-1.0.18.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: memcapable
  - exposure: global executable
    kind: cli
    name: memcat
  - exposure: global executable
    kind: cli
    name: memcp
  - exposure: global executable
    kind: cli
    name: memdump
  - exposure: global executable
    kind: cli
    name: memerror
  - exposure: global executable
    kind: cli
    name: memexist
  - exposure: global executable
    kind: cli
    name: memflush
  - exposure: global executable
    kind: cli
    name: memparse
  - exposure: global executable
    kind: cli
    name: memping
  - exposure: global executable
    kind: cli
    name: memrm
  - exposure: global executable
    kind: cli
    name: memslap
  - exposure: global executable
    kind: cli
    name: memstat
  - exposure: global executable
    kind: cli
    name: memtouch
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libmemcached
  av: sudo av install brew:libmemcached
  brew: brew install libmemcached
  debian: sudo apt install memdump
  macports: sudo port install libmemcached
  nix: nix profile install nixpkgs#libmemcached
  ubuntu: sudo apt install memdump
  zypper: sudo zypper install libmemcached
provenance:
  formula: libmemcached
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
