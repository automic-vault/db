id: brew:runitor
display-name: runitor
homepage: https://github.com/bdd/runitor
repo: https://github.com/bdd/runitor
docs: https://github.com/bdd/runitor
package-manager:
  brew: runitor
  nix: runitor
package-manager-url: https://formulae.brew.sh/formula/runitor
version: 1.4.1
license: 0BSD
category: development
tags:
  - cli
description: Command runner with healthchecks.io integration
source-archive: https://github.com/bdd/runitor/archive/refs/tags/v1.4.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: runitor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:runitor
  brew: brew install runitor
  nix: nix profile install nixpkgs#runitor
provenance:
  formula: runitor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
