id: brew:git-flow
display-name: git-flow
homepage: https://github.com/nvie/gitflow
repo: https://github.com/nvie/gitflow
docs: https://github.com/nvie/gitflow
package-manager:
  apk: git-flow
  brew: git-flow
  debian: git-flow
  macports: git-flow
  ubuntu: git-flow
  winget: GitTower.GitFlowNext
package-manager-url: https://formulae.brew.sh/formula/git-flow
version: 0.4.1
license: BSD-2-Clause
category: development
tags:
  - cli
  - git
description: Extensions to follow Vincent Driessen's branching model
source-archive: https://github.com/nvie/gitflow/archive/refs/tags/0.4.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: git-flow
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'To install Zsh completions: brew install zsh-completions'
  post-install-defined: false
install-lines:
  apk: sudo apk add git-flow
  av: sudo av install brew:git-flow
  brew: brew install git-flow
  debian: sudo apt install git-flow
  macports: sudo port install git-flow
  ubuntu: sudo apt install git-flow
  winget: winget install --id GitTower.GitFlowNext -e
provenance:
  formula: git-flow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
