id: brew:skip
display-name: skip
homepage: https://skip.dev
repo: https://github.com/skiptools/skipstone
docs: https://skip.dev
package-manager:
  brew: skip
package-manager-url: https://formulae.brew.sh/formula/skip
version: 1.9.2
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Tool for building Swift apps for Android
source-archive: https://github.com/skiptools/skipstone/archive/refs/tags/1.9.2.tar.gz
dependencies:
  - gradle
  - openjdk
  - swiftly
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: skip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:skip
  brew: brew install skip
provenance:
  formula: skip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
