id: brew:pacapt
display-name: pacapt
homepage: https://github.com/icy/pacapt
repo: https://github.com/icy/pacapt
docs: https://github.com/icy/pacapt
package-manager:
  brew: pacapt
package-manager-url: https://formulae.brew.sh/formula/pacapt
version: 3.0.7
license: Fair
category: development
tags:
  - cli
description: Package manager in the style of Arch's pacman
source-archive: https://github.com/icy/pacapt/archive/refs/tags/v3.0.7.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: pacapt
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pacapt
  brew: brew install pacapt
provenance:
  formula: pacapt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
