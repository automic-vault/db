id: brew:q
display-name: q
homepage: https://github.com/natesales/q
repo: https://github.com/natesales/q
docs: https://github.com/natesales/q
package-manager:
  brew: q
  macports: q
  nix: q
  scoop: main/q
  winget: natesales.q
package-manager-url: https://formulae.brew.sh/formula/q
version: 0.19.12
license: GPL-3.0-only
category: development
tags:
  - cli
description: Tiny command-line DNS client with support for UDP, TCP, DoT, DoH, DoQ and ODoH
source-archive: https://github.com/natesales/q/archive/refs/tags/v0.19.12.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: q
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:q
  brew: brew install q
  macports: sudo port install q
  nix: nix profile install nixpkgs#q
  scoop: scoop install main/q
  winget: winget install --id natesales.q -e
provenance:
  formula: q
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
