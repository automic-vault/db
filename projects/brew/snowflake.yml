id: brew:snowflake
display-name: snowflake
homepage: https://www.torproject.org
repo: >
  https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/snowflake/-/archive/v2.13.1/snowflake-v2.13.1.tar.gz
docs: https://www.torproject.org
package-manager:
  apk: snowflake
  brew: snowflake
  debian: snowflake-client
  nix: snowflake
  ubuntu: snowflake-client
  zypper: snowflake
package-manager-url: https://formulae.brew.sh/formula/snowflake
version: 2.13.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Pluggable Transport using WebRTC, inspired by Flashproxy
source-archive: >
  https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/snowflake/-/archive/v2.13.1/snowflake-v2.13.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: snowflake-broker
  - exposure: global executable
    kind: cli
    name: snowflake-client
  - exposure: global executable
    kind: cli
    name: snowflake-proxy
  - exposure: global executable
    kind: cli
    name: snowflake-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add snowflake
  av: sudo av install brew:snowflake
  brew: brew install snowflake
  debian: sudo apt install snowflake-client
  nix: nix profile install nixpkgs#snowflake
  ubuntu: sudo apt install snowflake-client
  zypper: sudo zypper install snowflake
provenance:
  formula: snowflake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
