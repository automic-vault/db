id: brew:vcdimager
display-name: vcdimager
homepage: https://www.gnu.org/software/vcdimager/
repo: https://ftpmirror.gnu.org/gnu/vcdimager/vcdimager-2.0.1.tar.gz
docs: https://www.gnu.org/software/vcdimager/
package-manager:
  apk: vcdimager
  brew: vcdimager
  debian: vcdimager
  dnf: vcdimager
  macports: vcdimager
  nix: vcdimager
  pacman: vcdimager
  ubuntu: vcdimager
  zypper: vcdimager
package-manager-url: https://formulae.brew.sh/formula/vcdimager
version: 2.0.1
license: GPL-2.0-or-later
category: media
tags:
  - cli
description: (Super) video CD authoring solution
source-archive: https://ftpmirror.gnu.org/gnu/vcdimager/vcdimager-2.0.1.tar.gz
dependencies:
  - libcdio
  - popt
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cdxa2mpeg
  - exposure: global executable
    kind: cli
    name: vcd-info
  - exposure: global executable
    kind: cli
    name: vcdimager
  - exposure: global executable
    kind: cli
    name: vcdxbuild
  - exposure: global executable
    kind: cli
    name: vcdxgen
  - exposure: global executable
    kind: cli
    name: vcdxminfo
  - exposure: global executable
    kind: cli
    name: vcdxrip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vcdimager
  av: sudo av install brew:vcdimager
  brew: brew install vcdimager
  debian: sudo apt install vcdimager
  dnf: sudo dnf install vcdimager
  macports: sudo port install vcdimager
  nix: nix profile install nixpkgs#vcdimager
  pacman: sudo pacman -S vcdimager
  ubuntu: sudo apt install vcdimager
  zypper: sudo zypper install vcdimager
provenance:
  formula: vcdimager
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
