id: brew:apibuilder-cli
display-name: apibuilder-cli
homepage: https://www.apibuilder.io
repo: https://github.com/apicollective/apibuilder-cli
docs: https://www.apibuilder.io
package-manager:
  brew: apibuilder-cli
package-manager-url: https://formulae.brew.sh/formula/apibuilder-cli
version: 0.2.4
license: MIT
category: development
tags:
  - cli
description: Command-line interface to generate clients for api builder
source-archive: https://github.com/apicollective/apibuilder-cli/archive/refs/tags/0.2.4.tar.gz
uses-from-macos:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: apibuilder
  - exposure: global executable
    kind: cli
    name: create-config
  - exposure: global executable
    kind: cli
    name: read-config
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:apibuilder-cli
  brew: brew install apibuilder-cli
provenance:
  formula: apibuilder-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
