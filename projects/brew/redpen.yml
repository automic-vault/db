id: brew:redpen
display-name: redpen
homepage: https://redpen.cc/
repo: https://github.com/redpen-cc/redpen
docs: https://redpen.cc/
package-manager:
  brew: redpen
  scoop: main/redpen
package-manager-url: https://formulae.brew.sh/formula/redpen
version: 1.10.4
license: Apache-2.0
category: development
tags:
  - cli
description: Proofreading tool to help writers of technical documentation
source-archive: https://github.com/redpen-cc/redpen/releases/download/redpen-1.10.4/redpen-1.10.4.tar.gz
dependencies:
  - openjdk@11
executables:
  - exposure: global executable
    kind: cli
    name: redpen
  - exposure: global executable
    kind: cli
    name: redpen-server
  - exposure: global executable
    kind: cli
    name: redpen-server.war
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:redpen
  brew: brew install redpen
  scoop: scoop install main/redpen
provenance:
  formula: redpen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
