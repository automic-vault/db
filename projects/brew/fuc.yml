id: brew:fuc
display-name: fuc
homepage: https://github.com/supercilex/fuc
repo: https://github.com/supercilex/fuc
docs: https://github.com/supercilex/fuc
package-manager:
  brew: fuc
  nix: fuc
  zypper: fuc
package-manager-url: https://formulae.brew.sh/formula/fuc
version: 3.1.1
license: Apache-2.0
category: development
tags:
  - cli
description: Modern, performance focused unix commands
source-archive: https://github.com/supercilex/fuc/archive/refs/tags/3.1.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cpz
  - exposure: global executable
    kind: cli
    name: rmz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fuc
  brew: brew install fuc
  nix: nix profile install nixpkgs#fuc
  zypper: sudo zypper install fuc
provenance:
  formula: fuc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
