id: brew:libmatio
display-name: libmatio
homepage: https://matio.sourceforge.net/
repo: https://downloads.sourceforge.net/project/matio/matio/1.5.30/matio-1.5.30.tar.gz
docs: https://matio.sourceforge.net/
package-manager:
  brew: libmatio
  pacman: libmatio
package-manager-url: https://formulae.brew.sh/formula/libmatio
version: 1.5.30
license: BSD-2-Clause
category: network
tags:
  - cli
description: C library for reading and writing MATLAB MAT files
source-archive: https://downloads.sourceforge.net/project/matio/matio/1.5.30/matio-1.5.30.tar.gz
dependencies:
  - hdf5
executables:
  - exposure: global executable
    kind: cli
    name: matdump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libmatio
  brew: brew install libmatio
  pacman: sudo pacman -S libmatio
provenance:
  formula: libmatio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
