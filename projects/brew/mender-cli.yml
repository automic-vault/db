id: brew:mender-cli
display-name: mender-cli
homepage: https://mender.io
repo: https://github.com/mendersoftware/mender-cli
docs: https://mender.io
package-manager:
  brew: mender-cli
  debian: mender-cli
  ubuntu: mender-cli
package-manager-url: https://formulae.brew.sh/formula/mender-cli
version: 2.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: General-purpose CLI tool for the Mender backend
source-archive: https://github.com/mendersoftware/mender-cli/archive/refs/tags/2.0.0.tar.gz
dependencies:
  - openssl@3
  - xz
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mender-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mender-cli
  brew: brew install mender-cli
  debian: sudo apt install mender-cli
  ubuntu: sudo apt install mender-cli
provenance:
  formula: mender-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
