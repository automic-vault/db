id: brew:picotool
display-name: picotool
homepage: https://github.com/raspberrypi/picotool
repo: https://github.com/raspberrypi/picotool
docs: https://github.com/raspberrypi/picotool
package-manager:
  brew: picotool
  debian: picotool
  nix: picotool
  zypper: picotool
package-manager-url: https://formulae.brew.sh/formula/picotool
version: 2.2.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Tool for interacting with RP2040/RP2350 devices and binaries
source-archive: https://github.com/raspberrypi/picotool/archive/refs/tags/2.2.0.tar.gz
dependencies:
  - libusb
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: picotool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:picotool
  brew: brew install picotool
  debian: sudo apt install picotool
  nix: nix profile install nixpkgs#picotool
  zypper: sudo zypper install picotool
provenance:
  formula: picotool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
