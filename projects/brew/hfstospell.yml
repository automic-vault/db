id: brew:hfstospell
display-name: hfstospell
homepage: https://hfst.github.io/
repo: https://github.com/hfst/hfst-ospell
docs: https://hfst.github.io/
package-manager:
  brew: hfstospell
  debian: hfst-ospell
  nix: hfst-ospell
  ubuntu: hfst-ospell
  zypper: hfst-ospell
package-manager-url: https://formulae.brew.sh/formula/hfstospell
version: 0.5.4
license: Apache-2.0
category: development
tags:
  - cli
description: Helsinki Finite-State Technology ospell
source-archive: https://github.com/hfst/hfst-ospell/releases/download/v0.5.4/hfst-ospell-0.5.4.tar.bz2
dependencies:
  - icu4c@78
  - libarchive
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: hfst-ospell
  - exposure: global executable
    kind: cli
    name: hfst-ospell-office
  - exposure: global executable
    kind: cli
    name: hfst-ospell-predict
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hfstospell
  brew: brew install hfstospell
  debian: sudo apt install hfst-ospell
  nix: nix profile install nixpkgs#hfst-ospell
  ubuntu: sudo apt install hfst-ospell
  zypper: sudo zypper install hfst-ospell
provenance:
  formula: hfstospell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
