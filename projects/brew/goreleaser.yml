id: brew:goreleaser
display-name: goreleaser
homepage: https://goreleaser.com/
repo: https://github.com/goreleaser/goreleaser
docs: https://goreleaser.com/
package-manager:
  brew: goreleaser
  macports: goreleaser
  nix: goreleaser
  pacman: goreleaser
  scoop: main/goreleaser
  winget: goreleaser.goreleaser
  zypper: goreleaser
package-manager-url: https://formulae.brew.sh/formula/goreleaser
version: 2.16.0
license: MIT
category: development
tags:
  - cli
description: Deliver Go binaries as fast and easily as possible
source-archive: https://github.com/goreleaser/goreleaser.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goreleaser
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:goreleaser
  brew: brew install goreleaser
  macports: sudo port install goreleaser
  nix: nix profile install nixpkgs#goreleaser
  pacman: sudo pacman -S goreleaser
  scoop: scoop install main/goreleaser
  winget: winget install --id goreleaser.goreleaser -e
  zypper: sudo zypper install goreleaser
provenance:
  formula: goreleaser
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
