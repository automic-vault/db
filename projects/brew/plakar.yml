id: brew:plakar
display-name: plakar
homepage: https://plakar.io
repo: https://github.com/PlakarKorp/plakar
docs: https://plakar.io
package-manager:
  apk: plakar
  brew: plakar
  nix: plakar
  scoop: extras/plakar
package-manager-url: https://formulae.brew.sh/formula/plakar
version: 1.0.6
license: ISC
category: security
tags:
  - cli
description: Create backups with compression, encryption and deduplication
source-archive: https://github.com/PlakarKorp/plakar/archive/refs/tags/v1.0.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: plakar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add plakar
  av: sudo av install brew:plakar
  brew: brew install plakar
  nix: nix profile install nixpkgs#plakar
  scoop: scoop install extras/plakar
provenance:
  formula: plakar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
