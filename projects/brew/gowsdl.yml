id: brew:gowsdl
display-name: gowsdl
homepage: https://github.com/hooklift/gowsdl
repo: https://github.com/hooklift/gowsdl
docs: https://github.com/hooklift/gowsdl
package-manager:
  brew: gowsdl
package-manager-url: https://formulae.brew.sh/formula/gowsdl
version: 0.5.0
license: MPL-2.0
category: development
tags:
  - cli
description: WSDL2Go code generation as well as its SOAP proxy
source-archive: https://github.com/hooklift/gowsdl.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gowsdl
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gowsdl
  brew: brew install gowsdl
provenance:
  formula: gowsdl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
