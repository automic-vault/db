id: brew:tor
display-name: tor
homepage: https://www.torproject.org/
repo: https://www.torproject.org/dist/tor-0.4.9.8.tar.gz
docs: https://www.torproject.org/
package-manager:
  apk: tor
  brew: tor
  chocolatey: tor
  debian: tor
  dnf: tor
  macports: tor
  nix: tor
  pacman: tor
  scoop: main/tor
  ubuntu: tor
  zypper: tor
package-manager-url: https://formulae.brew.sh/formula/tor
version: 0.4.9.8
license: BSD-2-Clause AND BSD-3-Clause AND MIT AND NCSA
category: network
tags:
  - cli
description: Anonymizing overlay network for TCP
source-archive: https://www.torproject.org/dist/tor-0.4.9.8.tar.gz
dependencies:
  - libevent
  - libscrypt
  - openssl@3
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: tor
  - exposure: global executable
    kind: cli
    name: tor-gencert
  - exposure: global executable
    kind: cli
    name: tor-print-ed-signing-cert
  - exposure: global executable
    kind: cli
    name: tor-resolve
  - exposure: global executable
    kind: cli
    name: torify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add tor
  av: sudo av install brew:tor
  brew: brew install tor
  chocolatey: choco install tor
  debian: sudo apt install tor
  dnf: sudo dnf install tor
  macports: sudo port install tor
  nix: nix profile install nixpkgs#tor
  pacman: sudo pacman -S tor
  scoop: scoop install main/tor
  ubuntu: sudo apt install tor
  zypper: sudo zypper install tor
provenance:
  formula: tor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
