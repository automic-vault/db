id: brew:bottom
display-name: bottom
homepage: https://clementtsang.github.io/bottom/
repo: https://github.com/ClementTsang/bottom
docs: https://clementtsang.github.io/bottom/
package-manager:
  apk: bottom
  brew: bottom
  chocolatey: bottom
  debian: btm
  macports: bottom
  nix: bottom
  pacman: bottom
  scoop: main/bottom
  ubuntu: btm
  winget: Clement.bottom
  zypper: bottom
package-manager-url: https://formulae.brew.sh/formula/bottom
version: 0.12.3
license: MIT
category: development
tags:
  - cli
description: Yet another cross-platform graphical process/system monitor
source-archive: https://github.com/ClementTsang/bottom/archive/refs/tags/0.12.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: btm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bottom
  av: sudo av install brew:bottom
  brew: brew install bottom
  chocolatey: choco install bottom
  debian: sudo apt install btm
  macports: sudo port install bottom
  nix: nix profile install nixpkgs#bottom
  pacman: sudo pacman -S bottom
  scoop: scoop install main/bottom
  ubuntu: sudo apt install btm
  winget: winget install --id Clement.bottom -e
  zypper: sudo zypper install bottom
provenance:
  formula: bottom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
