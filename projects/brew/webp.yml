id: brew:webp
display-name: webp
homepage: https://developers.google.com/speed/webp/
repo: >
  https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-1.6.0.tar.gz
docs: https://developers.google.com/speed/webp/
package-manager:
  brew: webp
  chocolatey: webp
  debian: webp
  macports: webp
  ubuntu: webp
package-manager-url: https://formulae.brew.sh/formula/webp
version: 1.6.0
license: BSD-3-Clause
category: security
tags:
  - cli
description: Image format providing lossless and lossy compression for web images
source-archive: >
  https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-1.6.0.tar.gz
dependencies:
  - giflib
  - jpeg-turbo
  - libpng
  - libtiff
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: cwebp
  - exposure: global executable
    kind: cli
    name: dwebp
  - exposure: global executable
    kind: cli
    name: gif2webp
  - exposure: global executable
    kind: cli
    name: img2webp
  - exposure: global executable
    kind: cli
    name: webpinfo
  - exposure: global executable
    kind: cli
    name: webpmux
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:webp
  brew: brew install webp
  chocolatey: choco install webp
  debian: sudo apt install webp
  macports: sudo port install webp
  ubuntu: sudo apt install webp
provenance:
  formula: webp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
