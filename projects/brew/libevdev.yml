id: brew:libevdev
display-name: libevdev
homepage: https://www.freedesktop.org/wiki/Software/libevdev/
repo: https://www.freedesktop.org/software/libevdev/libevdev-1.13.6.tar.xz
docs: https://www.freedesktop.org/wiki/Software/libevdev/
package-manager:
  apk: libevdev
  brew: libevdev
  dnf: libevdev
  nix: libevdev
  pacman: libevdev
package-manager-url: https://formulae.brew.sh/formula/libevdev
version: 1.13.6
license: MIT
category: network
tags:
  - cli
description: Wrapper library for evdev devices
source-archive: https://www.freedesktop.org/software/libevdev/libevdev-1.13.6.tar.xz
build-dependencies:
  - pkgconf
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: libevdev-tweak-device
  - exposure: global executable
    kind: cli
    name: mouse-dpi-tool
  - exposure: global executable
    kind: cli
    name: touchpad-edge-detector
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libevdev
  av: sudo av install brew:libevdev
  brew: brew install libevdev
  dnf: sudo dnf install libevdev
  nix: nix profile install nixpkgs#libevdev
  pacman: sudo pacman -S libevdev
provenance:
  formula: libevdev
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
