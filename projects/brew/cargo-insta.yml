id: brew:cargo-insta
display-name: cargo-insta
homepage: https://insta.rs
repo: https://github.com/mitsuhiko/insta
docs: https://insta.rs
package-manager:
  apk: cargo-insta
  brew: cargo-insta
  dnf: cargo-insta
  nix: cargo-insta
  pacman: cargo-insta
package-manager-url: https://formulae.brew.sh/formula/cargo-insta
version: 1.47.2
license: Apache-2.0
category: development
tags:
  - cli
description: Snapshot testing CLI for Rust
source-archive: https://github.com/mitsuhiko/insta/archive/refs/tags/1.47.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-insta
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-insta
  av: sudo av install brew:cargo-insta
  brew: brew install cargo-insta
  dnf: sudo dnf install cargo-insta
  nix: nix profile install nixpkgs#cargo-insta
  pacman: sudo pacman -S cargo-insta
provenance:
  formula: cargo-insta
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
