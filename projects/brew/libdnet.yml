id: brew:libdnet
display-name: libdnet
homepage: https://github.com/ofalk/libdnet
repo: https://github.com/ofalk/libdnet
docs: https://github.com/ofalk/libdnet
package-manager:
  apk: libdnet
  brew: libdnet
  dnf: libdnet
  macports: libdnet
  nix: libdnet
  pacman: libdnet
package-manager-url: https://formulae.brew.sh/formula/libdnet
version: 1.18.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Portable low-level networking library
source-archive: https://github.com/ofalk/libdnet/archive/refs/tags/libdnet-1.18.2.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dnet
  - exposure: global executable
    kind: cli
    name: dnet-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libdnet
  av: sudo av install brew:libdnet
  brew: brew install libdnet
  dnf: sudo dnf install libdnet
  macports: sudo port install libdnet
  nix: nix profile install nixpkgs#libdnet
  pacman: sudo pacman -S libdnet
provenance:
  formula: libdnet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
