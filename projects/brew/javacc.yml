id: brew:javacc
display-name: javacc
homepage: https://javacc.github.io/javacc/
repo: https://github.com/javacc/javacc
docs: https://javacc.github.io/javacc/
package-manager:
  brew: javacc
  debian: javacc
  dnf: javacc
  macports: javacc
  nix: javacc
  ubuntu: javacc
  zypper: javacc
package-manager-url: https://formulae.brew.sh/formula/javacc
version: 7.0.13
license: BSD-3-Clause
category: development
tags:
  - cli
description: Parser generator for use with Java applications
source-archive: https://github.com/javacc/javacc/archive/refs/tags/javacc-7.0.13.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - ant
executables:
  - exposure: global executable
    kind: cli
    name: javacc
  - exposure: global executable
    kind: cli
    name: jjdoc
  - exposure: global executable
    kind: cli
    name: jjtree
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:javacc
  brew: brew install javacc
  debian: sudo apt install javacc
  dnf: sudo dnf install javacc
  macports: sudo port install javacc
  nix: nix profile install nixpkgs#javacc
  ubuntu: sudo apt install javacc
  zypper: sudo zypper install javacc
provenance:
  formula: javacc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
