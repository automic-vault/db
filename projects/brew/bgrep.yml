id: brew:bgrep
display-name: bgrep
homepage: https://github.com/tmbinc/bgrep
repo: https://github.com/tmbinc/bgrep
docs: https://github.com/tmbinc/bgrep
package-manager:
  brew: bgrep
package-manager-url: https://formulae.brew.sh/formula/bgrep
version: 0.2
license: BSD-2-Clause
category: development
tags:
