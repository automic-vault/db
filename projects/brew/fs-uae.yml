id: brew:fs-uae
display-name: fs-uae
homepage: https://fs-uae.net/
repo: https://github.com/FrodeSolheim/fs-uae
docs: https://fs-uae.net/
package-manager:
  apk: fs-uae
  brew: fs-uae
  debian: fs-uae
  pacman: fs-uae
  ubuntu: fs-uae
  zypper: fs-uae
package-manager-url: https://formulae.brew.sh/formula/fs-uae
version: 3.2.35
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Amiga emulator
source-archive: https://github.com/FrodeSolheim/fs-uae/releases/download/v3.2.35/fs-uae-3.2.35.tar.xz
dependencies:
  - freetype
  - gettext
  - glew
  - glib
  - libmpeg2
  - libpng
  - sdl2
build-dependencies:
  - gettext
  - pkgconf
uses-from-macos:
  - zip
executables:
  - exposure: global executable
    kind: cli
    name: fs-uae
  - exposure: global executable
    kind: cli
    name: fs-uae-device-helper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fs-uae
  av: sudo av install brew:fs-uae
  brew: brew install fs-uae
  debian: sudo apt install fs-uae
  pacman: sudo pacman -S fs-uae
  ubuntu: sudo apt install fs-uae
  zypper: sudo zypper install fs-uae
provenance:
  formula: fs-uae
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
