id: brew:sonic
display-name: sonic
homepage: https://github.com/valeriansaliou/sonic
repo: https://github.com/valeriansaliou/sonic
docs: https://github.com/valeriansaliou/sonic
package-manager:
  brew: sonic
  debian: sonic
  dnf: sonic
  macports: sonic
  nix: sonic
  pacman: sonic
  ubuntu: sonic
package-manager-url: https://formulae.brew.sh/formula/sonic
version: 1.5.1
license: MPL-2.0
category: development
tags:
  - cli
description: Fast, lightweight & schema-less search backend
source-archive: https://github.com/valeriansaliou/sonic/archive/refs/tags/v1.5.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sonic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:sonic
  brew: brew install sonic
  debian: sudo apt install sonic
  dnf: sudo dnf install sonic
  macports: sudo port install sonic
  nix: nix profile install nixpkgs#sonic
  pacman: sudo pacman -S sonic
  ubuntu: sudo apt install sonic
provenance:
  formula: sonic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
