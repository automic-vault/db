  av: sudo av install brew:comrak
  brew: brew install comrak
  nix: nix profile install nixpkgs#comrak
  scoop: scoop install main/comrak
provenance:
  formula: comrak
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
