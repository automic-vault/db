id: brew:comrak
display-name: comrak
homepage: https://github.com/kivikakk/comrak
repo: https://github.com/kivikakk/comrak
docs: https://github.com/kivikakk/comrak
package-manager:
  apk: comrak
  brew: comrak
  nix: comrak
  scoop: main/comrak
package-manager-url: https://formulae.brew.sh/formula/comrak
version: 0.52.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: CommonMark + GFM compatible Markdown parser and renderer
source-archive: https://github.com/kivikakk/comrak/archive/refs/tags/v0.52.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: comrak
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
