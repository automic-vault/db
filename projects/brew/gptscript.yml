id: brew:gptscript
display-name: gptscript
homepage: https://docs.gptscript.ai/
repo: https://github.com/gptscript-ai/gptscript
docs: https://docs.gptscript.ai/
package-manager:
  brew: gptscript
  nix: gptscript
  scoop: extras/gptscript
  winget: gptscript-ai.gptscript
package-manager-url: https://formulae.brew.sh/formula/gptscript
version: 0.9.9
license: Apache-2.0
category: development
tags:
  - cli
description: Develop LLM Apps in Natural Language
source-archive: https://github.com/gptscript-ai/gptscript/archive/refs/tags/v0.9.9.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gptscript
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gptscript
  brew: brew install gptscript
  nix: nix profile install nixpkgs#gptscript
  scoop: scoop install extras/gptscript
  winget: winget install --id gptscript-ai.gptscript -e
provenance:
  formula: gptscript
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
