id: brew:istioctl
display-name: istioctl
homepage: https://istio.io/
repo: https://github.com/istio/istio
docs: https://istio.io/
package-manager:
  brew: istioctl
  chocolatey: istioctl
  macports: istioctl
  nix: istioctl
  scoop: main/istioctl
  zypper: istioctl
package-manager-url: https://formulae.brew.sh/formula/istioctl
version: 1.30.0
license: Apache-2.0
category: development
tags:
  - cli
description: Istio configuration command-line utility
source-archive: https://github.com/istio/istio/archive/refs/tags/1.30.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: istioctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:istioctl
  brew: brew install istioctl
  chocolatey: choco install istioctl
  macports: sudo port install istioctl
  nix: nix profile install nixpkgs#istioctl
  scoop: scoop install main/istioctl
  zypper: sudo zypper install istioctl
provenance:
  formula: istioctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
