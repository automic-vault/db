id: brew:objc-codegenutils
display-name: objc-codegenutils
homepage: https://github.com/puls/objc-codegenutils
repo: https://github.com/puls/objc-codegenutils
docs: https://github.com/puls/objc-codegenutils
package-manager:
  brew: objc-codegenutils
package-manager-url: https://formulae.brew.sh/formula/objc-codegenutils
version: 1.0
license: Apache-2.0
category: development
tags:
  - cli
description: Three small tools to help work with XCode
source-archive: https://github.com/puls/objc-codegenutils/archive/refs/tags/v1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: objc-assetgen
  - exposure: global executable
    kind: cli
    name: objc-colordump
  - exposure: global executable
    kind: cli
    name: objc-identifierconstants
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:objc-codegenutils
  brew: brew install objc-codegenutils
provenance:
  formula: objc-codegenutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
