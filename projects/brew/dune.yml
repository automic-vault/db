id: brew:dune
display-name: dune
homepage: https://dune.build/
repo: https://github.com/ocaml/dune
docs: https://dune.build/
package-manager:
  apk: dune
  brew: dune
  macports: dune
  nix: dune
  pacman: dune
package-manager-url: https://formulae.brew.sh/formula/dune
version: 3.23.1
license: MIT
category: development
tags:
  - cli
description: Composable build system for OCaml
source-archive: https://github.com/ocaml/dune/releases/download/3.23.1/dune-3.23.1.tbz
build-dependencies:
  - ocaml
executables:
  - exposure: global executable
    kind: cli
    name: dune
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dune
  av: sudo av install brew:dune
  brew: brew install dune
  macports: sudo port install dune
  nix: nix profile install nixpkgs#dune
  pacman: sudo pacman -S dune
provenance:
  formula: dune
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
