id: brew:automysqlbackup
display-name: automysqlbackup
homepage: https://sourceforge.net/projects/automysqlbackup/
repo: >
  https://downloads.sourceforge.net/project/automysqlbackup/AutoMySQLBackup/AutoMySQLBackup%20VER%203.0/automysqlbackup-v3.0_rc6.tar.gz
docs: https://sourceforge.net/projects/automysqlbackup/
package-manager:
  brew: automysqlbackup
  debian: automysqlbackup
  nix: automysqlbackup
  ubuntu: automysqlbackup
package-manager-url: https://formulae.brew.sh/formula/automysqlbackup
version: 3.0-rc6
license: GPL-2.0-or-later
category: database
tags:
  - cli
description: Automate MySQL backups
source-archive: >
  https://downloads.sourceforge.net/project/automysqlbackup/AutoMySQLBackup/AutoMySQLBackup%20VER%203.0/automysqlbackup-v3.0_rc6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: automysqlbackup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You will have to edit $HOMEBREW_PREFIX/etc/automysqlbackup/automysqlbackup.conf to
    set AutoMySQLBackup up to find your database and backup directory. The included
    service will run AutoMySQLBackup every day at 04:00.
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:automysqlbackup
  brew: brew install automysqlbackup
  debian: sudo apt install automysqlbackup
  nix: nix profile install nixpkgs#automysqlbackup
  ubuntu: sudo apt install automysqlbackup
provenance:
  formula: automysqlbackup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
