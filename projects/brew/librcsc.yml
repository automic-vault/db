id: brew:librcsc
display-name: librcsc
homepage: https://github.com/helios-base/librcsc
repo: https://github.com/helios-base/librcsc
docs: https://github.com/helios-base/librcsc
package-manager:
  brew: librcsc
package-manager-url: https://formulae.brew.sh/formula/librcsc
version: 2024
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: RoboCup Soccer Simulator library
source-archive: https://github.com/helios-base/librcsc/archive/refs/tags/rc2024.tar.gz
dependencies:
  - simdjson
build-dependencies:
  - autoconf
  - automake
  - boost
  - libtool
  - nlohmann-json
executables:
  - exposure: global executable
    kind: cli
    name: librcsc-config
  - exposure: global executable
    kind: cli
    name: librcscenv
  - exposure: global executable
    kind: cli
    name: rcg2csv
  - exposure: global executable
    kind: cli
    name: rcg2txt
  - exposure: global executable
    kind: cli
    name: rcgrenameteam
  - exposure: global executable
    kind: cli
    name: rcgresultprinter
  - exposure: global executable
    kind: cli
    name: rcgreverse
  - exposure: global executable
    kind: cli
    name: rcgverconv
  - exposure: global executable
    kind: cli
    name: rcgversion
  - exposure: global executable
    kind: cli
    name: rclmscheduler
  - exposure: global executable
    kind: cli
    name: rclmtableprinter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:librcsc
  brew: brew install librcsc
provenance:
  formula: librcsc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
