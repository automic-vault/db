id: brew:libsail
display-name: libsail
homepage: https://github.com/HappySeaFox/sail
repo: https://github.com/HappySeaFox/sail
docs: https://github.com/HappySeaFox/sail
package-manager:
  brew: libsail
package-manager-url: https://formulae.brew.sh/formula/libsail
version: 0.9.10
license: MIT
category: development
tags:
  - cli
description: Missing small and fast image decoding library for humans (not for machines)
source-archive: https://github.com/HappySeaFox/sail/archive/refs/tags/v0.9.10.tar.gz
dependencies:
  - brotli
  - giflib
  - highway
  - imath
  - jpeg-turbo
  - jpeg-xl
  - libavif
  - libheif
  - libpng
  - libtiff
  - little-cms2
  - openexr
  - openjpeg
  - resvg
  - webp
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: sail-imaging
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libsail
  brew: brew install libsail
provenance:
  formula: libsail
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
