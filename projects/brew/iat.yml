  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:iat
  brew: brew install iat
  debian: sudo apt install iat
  nix: nix profile install nixpkgs#iat
  ubuntu: sudo apt install iat
provenance:
  formula: iat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
