id: brew:iat
display-name: iat
homepage: https://sourceforge.net/projects/iat.berlios/
repo: https://downloads.sourceforge.net/project/iat.berlios/iat-0.1.7.tar.bz2
docs: https://sourceforge.net/projects/iat.berlios/
package-manager:
  brew: iat
  debian: iat
  nix: iat
  ubuntu: iat
package-manager-url: https://formulae.brew.sh/formula/iat
version: 0.1.7
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Converts many CD-ROM image formats to ISO9660
source-archive: https://downloads.sourceforge.net/project/iat.berlios/iat-0.1.7.tar.bz2
executables:
