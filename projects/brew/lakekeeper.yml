id: brew:lakekeeper
display-name: lakekeeper
homepage: https://github.com/lakekeeper/lakekeeper
repo: https://github.com/lakekeeper/lakekeeper
docs: https://github.com/lakekeeper/lakekeeper
package-manager:
  brew: lakekeeper
package-manager-url: https://formulae.brew.sh/formula/lakekeeper
version: 0.12.2
license: Apache-2.0
category: development
tags:
  - cli
description: Apache Iceberg REST Catalog
source-archive: https://github.com/lakekeeper/lakekeeper/archive/refs/tags/v0.12.2.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: lakekeeper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lakekeeper
  brew: brew install lakekeeper
provenance:
  formula: lakekeeper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
