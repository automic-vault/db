id: brew:etcd
display-name: etcd
homepage: https://github.com/etcd-io/etcd
repo: https://github.com/etcd-io/etcd
docs: https://github.com/etcd-io/etcd
package-manager:
  apk: etcd
  brew: etcd
  chocolatey: etcd
  nix: etcd
  pacman: etcd
  scoop: main/etcd
  winget: etcd-io.etcd
  zypper: etcd
package-manager-url: https://formulae.brew.sh/formula/etcd
version: 3.6.11
license: Apache-2.0
category: development
tags:
  - cli
description: Key value store for shared configuration and service discovery
source-archive: https://github.com/etcd-io/etcd.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: etcd
  - exposure: global executable
    kind: cli
    name: etcdctl
  - exposure: global executable
    kind: cli
    name: etcdutl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add etcd
  av: sudo av install brew:etcd
  brew: brew install etcd
  chocolatey: choco install etcd
  nix: nix profile install nixpkgs#etcd
  pacman: sudo pacman -S etcd
  scoop: scoop install main/etcd
  winget: winget install --id etcd-io.etcd -e
  zypper: sudo zypper install etcd
provenance:
  formula: etcd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
