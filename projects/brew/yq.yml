id: brew:yq
display-name: yq
homepage: https://github.com/mikefarah/yq
repo: https://github.com/mikefarah/yq
docs: https://github.com/mikefarah/yq
package-manager:
  brew: yq
  chocolatey: yq
  debian: yq
  dnf: yq
  macports: yq
  nix: yq
  pacman: yq
  scoop: main/yq
  ubuntu: yq
  winget: MikeFarah.yq
  zypper: yq
package-manager-url: https://formulae.brew.sh/formula/yq
version: 4.53.2
license: MIT
category: development
tags:
  - cli
  - json
  - yaml
description: Process YAML, JSON, XML, CSV and properties documents from the CLI
source-archive: https://github.com/mikefarah/yq/archive/refs/tags/v4.53.2.tar.gz
build-dependencies:
  - go
  - pandoc
executables:
  - exposure: global executable
    kind: cli
    name: yq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yq
  brew: brew install yq
  chocolatey: choco install yq
  debian: sudo apt install yq
  dnf: sudo dnf install yq
  macports: sudo port install yq
  nix: nix profile install nixpkgs#yq
  pacman: sudo pacman -S yq
  scoop: scoop install main/yq
  ubuntu: sudo apt install yq
  winget: winget install --id MikeFarah.yq -e
  zypper: sudo zypper install yq
provenance:
  formula: yq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
