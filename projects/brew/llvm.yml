bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    CLANG_CONFIG_FILE_SYSTEM_DIR: $HOMEBREW_PREFIX/etc/clang CLANG_CONFIG_FILE_USER_DIR:
    ~/.config/clang LLD is now provided in a separate formula: brew install lld Using
    `clang`, `clang++`, etc., requires a CLT installation at
    `/Library/Developer/CommandLineTools`. If you don't want to install the CLT, you can
    write appropriate configuration files pointing to your SDK at ~/.config/clang. To
    use the bundled libunwind please use the following LDFLAGS:
    LDFLAGS="-L$HOMEBREW_PREFIX/opt/llvm/lib/unwind -lunwind" To use the bundled libc++
    please use the following LDFLAGS: LDFLAGS="-L$HOMEBREW_PREFIX/opt/llvm/lib/c++
    -L$HOMEBREW_PREFIX/opt/llvm/lib/unwind -lunwind" Features newer than system libc++
    will require the following define to enable (support for this may be removed in a
    future major LLVM release): CPPFLAGS="-D_LIBCPP_DISABLE_AVAILABILITY" NOTE: You
    probably want to use the libunwind and libc++ provided by macOS unless you know what
    you're doing.
  post-install-defined: true
install-lines:
  apk: sudo apk add llvm
  av: sudo av install brew:llvm
  brew: brew install llvm
  chocolatey: choco install llvm
  debian: sudo apt install llvm
  dnf: sudo dnf install llvm
  nix: nix profile install nixpkgs#llvm
  pacman: sudo pacman -S llvm
  scoop: scoop install main/llvm
  ubuntu: sudo apt install llvm
  winget: winget install --id LLVM.LLVM -e
  zypper: sudo zypper install llvm
provenance:
  formula: llvm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
