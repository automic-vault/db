id: brew:navi
display-name: navi
homepage: https://github.com/denisidoro/navi
repo: https://github.com/denisidoro/navi
docs: https://github.com/denisidoro/navi
package-manager:
  apk: navi
  brew: navi
  dnf: navi
  macports: navi
  nix: navi
  pacman: navi
  scoop: main/navi
package-manager-url: https://formulae.brew.sh/formula/navi
version: 2.24.0
license: Apache-2.0
category: development
tags:
  - cli
description: Interactive cheatsheet tool for the command-line
source-archive: https://github.com/denisidoro/navi/archive/refs/tags/v2.24.0.tar.gz
dependencies:
  - fzf
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: navi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add navi
  av: sudo av install brew:navi
  brew: brew install navi
  dnf: sudo dnf install navi
  macports: sudo port install navi
  nix: nix profile install nixpkgs#navi
  pacman: sudo pacman -S navi
  scoop: scoop install main/navi
provenance:
  formula: navi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
