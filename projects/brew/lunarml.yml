id: brew:lunarml
display-name: lunarml
homepage: https://github.com/minoki/LunarML
repo: https://github.com/minoki/LunarML
docs: https://github.com/minoki/LunarML
package-manager:
  brew: lunarml
  nix: lunarml
package-manager-url: https://formulae.brew.sh/formula/lunarml
version: 0.3.0
license: MIT
category: development
tags:
  - cli
description: Standard ML compiler that produces Lua/JavaScript
source-archive: https://github.com/minoki/LunarML/archive/refs/tags/v0.3.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - mlton
executables:
  - exposure: global executable
    kind: cli
    name: lunarml
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lunarml
  brew: brew install lunarml
  nix: nix profile install nixpkgs#lunarml
provenance:
  formula: lunarml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
