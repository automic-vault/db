id: brew:cloud-sql-proxy
display-name: cloud-sql-proxy
homepage: https://github.com/GoogleCloudPlatform/cloud-sql-proxy
repo: https://github.com/GoogleCloudPlatform/cloud-sql-proxy
docs: https://github.com/GoogleCloudPlatform/cloud-sql-proxy
package-manager:
  brew: cloud-sql-proxy
  scoop: main/cloud-sql-proxy
package-manager-url: https://formulae.brew.sh/formula/cloud-sql-proxy
version: 2.22.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Utility for connecting securely to your Cloud SQL instances
source-archive: https://github.com/GoogleCloudPlatform/cloud-sql-proxy/archive/refs/tags/v2.22.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cloud-sql-proxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloud-sql-proxy
  brew: brew install cloud-sql-proxy
  scoop: scoop install main/cloud-sql-proxy
provenance:
  formula: cloud-sql-proxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
