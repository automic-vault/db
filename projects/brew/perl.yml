bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    By default non-brewed cpan modules are installed to the Cellar. If you wish for your
    modules to persist across updates we recommend using `local::lib`. You can set that
    up like this: PERL_MM_OPT="INSTALL_BASE=$HOME/perl5" cpan local::lib And add the
    following to your shell profile e.g. ~/.profile or ~/.zshrc eval "$(perl
    -I$HOME/perl5/lib/perl5 -Mlocal::lib=$HOME/perl5)"
  post-install-defined: false
install-lines:
  apk: sudo apk add perl
  av: sudo av install brew:perl
  brew: brew install perl
  debian: sudo apt install perl
  dnf: sudo dnf install perl
  nix: nix profile install nixpkgs#perl
  pacman: sudo pacman -S perl
  scoop: scoop install main/perl
  ubuntu: sudo apt install perl
  zypper: sudo zypper install perl
provenance:
  formula: perl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
