id: brew:gptfdisk
display-name: gptfdisk
homepage: https://www.rodsbooks.com/gdisk/
repo: >
  https://downloads.sourceforge.net/project/gptfdisk/gptfdisk/1.0.10/gptfdisk-1.0.10.tar.gz
docs: https://www.rodsbooks.com/gdisk/
package-manager:
  apk: gptfdisk
  brew: gptfdisk
  debian: gdisk
  dnf: gdisk
  macports: gptfdisk
  nix: gptfdisk
  pacman: gptfdisk
  scoop: main/gdisk
  ubuntu: gdisk
  zypper: gptfdisk
package-manager-url: https://formulae.brew.sh/formula/gptfdisk
version: 1.0.10
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Text-mode partitioning tools
source-archive: >
  https://downloads.sourceforge.net/project/gptfdisk/gptfdisk/1.0.10/gptfdisk-1.0.10.tar.gz
dependencies:
  - popt
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cgdisk
  - exposure: global executable
    kind: cli
    name: fixparts
  - exposure: global executable
    kind: cli
    name: gdisk
  - exposure: global executable
    kind: cli
    name: sgdisk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gptfdisk
  av: sudo av install brew:gptfdisk
  brew: brew install gptfdisk
  debian: sudo apt install gdisk
  dnf: sudo dnf install gdisk
  macports: sudo port install gptfdisk
  nix: nix profile install nixpkgs#gptfdisk
  pacman: sudo pacman -S gptfdisk
  scoop: scoop install main/gdisk
  ubuntu: sudo apt install gdisk
  zypper: sudo zypper install gptfdisk
provenance:
  formula: gptfdisk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
