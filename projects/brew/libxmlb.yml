id: brew:libxmlb
display-name: libxmlb
homepage: https://github.com/hughsie/libxmlb
repo: https://github.com/hughsie/libxmlb
docs: https://github.com/hughsie/libxmlb
package-manager:
  apk: libxmlb
  brew: libxmlb
  dnf: libxmlb
  macports: libxmlb
  nix: libxmlb
  pacman: libxmlb
package-manager-url: https://formulae.brew.sh/formula/libxmlb
version: 0.3.27
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Library for querying compressed XML metadata
source-archive: https://github.com/hughsie/libxmlb/releases/download/0.3.27/libxmlb-0.3.27.tar.xz
dependencies:
  - glib
  - xz
  - zstd
build-dependencies:
  - gi-docgen
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - python@3.14
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: xb-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libxmlb
  av: sudo av install brew:libxmlb
  brew: brew install libxmlb
  dnf: sudo dnf install libxmlb
  macports: sudo port install libxmlb
  nix: nix profile install nixpkgs#libxmlb
  pacman: sudo pacman -S libxmlb
provenance:
  formula: libxmlb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
