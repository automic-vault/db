id: brew:filebrowser
display-name: filebrowser
homepage: https://filebrowser.org/
repo: https://github.com/filebrowser/filebrowser
docs: https://filebrowser.org/
package-manager:
  apk: filebrowser
  brew: filebrowser
  macports: filebrowser
  nix: filebrowser
package-manager-url: https://formulae.brew.sh/formula/filebrowser
version: 2.63.5
license: Apache-2.0
category: development
tags:
  - cli
description: Web File Browser
source-archive: https://github.com/filebrowser/filebrowser/archive/refs/tags/v2.63.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: filebrowser
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add filebrowser
  av: sudo av install brew:filebrowser
  brew: brew install filebrowser
  macports: sudo port install filebrowser
  nix: nix profile install nixpkgs#filebrowser
provenance:
  formula: filebrowser
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
