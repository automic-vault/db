id: brew:git-sizer
display-name: git-sizer
homepage: https://github.com/github/git-sizer
repo: https://github.com/github/git-sizer
docs: https://github.com/github/git-sizer
package-manager:
  apk: git-sizer
  brew: git-sizer
  chocolatey: git-sizer
  debian: git-sizer
  macports: git-sizer
  nix: git-sizer
  pacman: git-sizer
  scoop: main/git-sizer
  ubuntu: git-sizer
  winget: GitHub.git-sizer
package-manager-url: https://formulae.brew.sh/formula/git-sizer
version: 1.5.0
license: MIT
category: development
tags:
  - cli
  - git
description: Compute various size metrics for a Git repository
source-archive: https://github.com/github/git-sizer/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-sizer
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-sizer
  av: sudo av install brew:git-sizer
  brew: brew install git-sizer
  chocolatey: choco install git-sizer
  debian: sudo apt install git-sizer
  macports: sudo port install git-sizer
  nix: nix profile install nixpkgs#git-sizer
  pacman: sudo pacman -S git-sizer
  scoop: scoop install main/git-sizer
  ubuntu: sudo apt install git-sizer
  winget: winget install --id GitHub.git-sizer -e
provenance:
  formula: git-sizer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
