id: brew:pulledpork
display-name: pulledpork
homepage: https://github.com/shirkdog/pulledpork
repo: https://github.com/shirkdog/pulledpork
docs: https://github.com/shirkdog/pulledpork
package-manager:
  brew: pulledpork
  dnf: pulledpork
package-manager-url: https://formulae.brew.sh/formula/pulledpork
version: 0.7.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Snort rule management
source-archive: https://github.com/shirkdog/pulledpork/archive/refs/tags/v0.7.4.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: pulledpork.pl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pulledpork
  brew: brew install pulledpork
  dnf: sudo dnf install pulledpork
provenance:
  formula: pulledpork
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
