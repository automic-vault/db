id: brew:qo
display-name: qo
homepage: https://github.com/kiki-ki/go-qo
repo: https://github.com/kiki-ki/go-qo
docs: https://github.com/kiki-ki/go-qo
package-manager:
  brew: qo
package-manager-url: https://formulae.brew.sh/formula/qo
version: 0.4.0
license: MIT
category: database
tags:
  - cli
  - json
description: Interactive minimalist TUI to query JSON, CSV, and TSV using SQL
source-archive: https://github.com/kiki-ki/go-qo/archive/refs/tags/v0.4.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: qo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qo
  brew: brew install qo
provenance:
  formula: qo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
