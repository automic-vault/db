id: brew:bashdb
display-name: bashdb
homepage: https://bashdb.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/bashdb/bashdb/5.2-1.2.0/bashdb-5.2-1.2.0.tar.bz2
docs: https://bashdb.sourceforge.net/
package-manager:
  brew: bashdb
  macports: bashdb
  nix: bashdb
package-manager-url: https://formulae.brew.sh/formula/bashdb
version: 5.2-1.2.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Bash shell debugger
source-archive: >
  https://downloads.sourceforge.net/project/bashdb/bashdb/5.2-1.2.0/bashdb-5.2-1.2.0.tar.bz2
dependencies:
  - bash
executables:
  - exposure: global executable
    kind: cli
    name: bashdb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bashdb
  brew: brew install bashdb
  macports: sudo port install bashdb
  nix: nix profile install nixpkgs#bashdb
provenance:
  formula: bashdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
