id: brew:helm-ls
display-name: helm-ls
homepage: https://github.com/mrjosh/helm-ls
repo: https://github.com/mrjosh/helm-ls
docs: https://github.com/mrjosh/helm-ls
package-manager:
  apk: helm-ls
  brew: helm-ls
  nix: helm-ls
  scoop: extras/helm-ls
package-manager-url: https://formulae.brew.sh/formula/helm-ls
version: 0.5.4
license: MIT
category: development
tags:
  - cli
description: Language server for Helm
source-archive: https://github.com/mrjosh/helm-ls/archive/refs/tags/v0.5.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: helm_ls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add helm-ls
  av: sudo av install brew:helm-ls
  brew: brew install helm-ls
  nix: nix profile install nixpkgs#helm-ls
  scoop: scoop install extras/helm-ls
provenance:
  formula: helm-ls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
