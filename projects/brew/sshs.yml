id: brew:sshs
display-name: sshs
homepage: https://github.com/quantumsheep/sshs
repo: https://github.com/quantumsheep/sshs
docs: https://github.com/quantumsheep/sshs
package-manager:
  apk: sshs
  brew: sshs
  macports: sshs
  nix: sshs
  pacman: sshs
  scoop: extras/sshs
package-manager-url: https://formulae.brew.sh/formula/sshs
version: 4.7.2
license: MIT
category: development
tags:
  - cli
description: Graphical command-line client for SSH
source-archive: https://github.com/quantumsheep/sshs/archive/refs/tags/4.7.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sshs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sshs
  av: sudo av install brew:sshs
  brew: brew install sshs
  macports: sudo port install sshs
  nix: nix profile install nixpkgs#sshs
  pacman: sudo pacman -S sshs
  scoop: scoop install extras/sshs
provenance:
  formula: sshs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
