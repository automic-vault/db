id: brew:smlnj
display-name: smlnj
homepage: https://www.smlnj.org/
repo: https://smlnj.org/dist/working/2026.1/smlnj-arm64-unix-2026.1.tgz
docs: https://www.smlnj.org/
package-manager:
  brew: smlnj
  macports: smlnj
  nix: smlnj
  pacman: smlnj
  ubuntu: smlnj
  zypper: smlnj
package-manager-url: https://formulae.brew.sh/formula/smlnj
version: 2026.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Compiler and programming system for Standard ML
source-archive: https://smlnj.org/dist/working/2026.1/smlnj-arm64-unix-2026.1.tgz
build-dependencies:
  - autoconf
  - cmake
  - python@3.14
uses-from-macos:
  - zlib
executables:
  - exposure: global executable
    kind: cli
    name: asdlgen
  - exposure: global executable
    kind: cli
    name: heap2exec
  - exposure: global executable
    kind: cli
    name: ml-antlr
  - exposure: global executable
    kind: cli
    name: ml-build
  - exposure: global executable
    kind: cli
    name: ml-burg
  - exposure: global executable
    kind: cli
    name: ml-makedepend
  - exposure: global executable
    kind: cli
    name: ml-ulex
  - exposure: global executable
    kind: cli
    name: ml-yacc
  - exposure: global executable
    kind: cli
    name: sml
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:smlnj
  brew: brew install smlnj
  macports: sudo port install smlnj
  nix: nix profile install nixpkgs#smlnj
  pacman: sudo pacman -S smlnj
  ubuntu: sudo apt install smlnj
  zypper: sudo zypper install smlnj
provenance:
  formula: smlnj
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
