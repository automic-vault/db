id: brew:cfssl
display-name: cfssl
homepage: https://cfssl.org/
repo: https://github.com/cloudflare/cfssl
docs: https://cfssl.org/
package-manager:
  apk: cfssl
  brew: cfssl
  macports: cfssl
  nix: cfssl
  pacman: cfssl
  scoop: extras/cfssl
package-manager-url: https://formulae.brew.sh/formula/cfssl
version: 1.6.5
license: BSD-2-Clause
category: cloud
tags:
  - cli
description: CloudFlare's PKI toolkit
source-archive: https://github.com/cloudflare/cfssl/archive/refs/tags/v1.6.5.tar.gz
dependencies:
  - libtool
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cfssl
  - exposure: global executable
    kind: cli
    name: cfssl-bundle
  - exposure: global executable
    kind: cli
    name: cfssl-certinfo
  - exposure: global executable
    kind: cli
    name: cfssl-newkey
  - exposure: global executable
    kind: cli
    name: cfssl-scan
  - exposure: global executable
    kind: cli
    name: cfssljson
  - exposure: global executable
    kind: cli
    name: multirootca
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cfssl
  av: sudo av install brew:cfssl
  brew: brew install cfssl
  macports: sudo port install cfssl
  nix: nix profile install nixpkgs#cfssl
  pacman: sudo pacman -S cfssl
  scoop: scoop install extras/cfssl
provenance:
  formula: cfssl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
