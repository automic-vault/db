id: brew:hevi
display-name: hevi
homepage: https://codeberg.org/arnauc/hevi
repo: https://codeberg.org/arnauc/hevi/archive/v1.1.0.tar.gz
docs: https://codeberg.org/arnauc/hevi
package-manager:
  brew: hevi
  nix: hevi
  winget: Arnau478.hevi
package-manager-url: https://formulae.brew.sh/formula/hevi
version: 1.1.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Hex viewer
source-archive: https://codeberg.org/arnauc/hevi/archive/v1.1.0.tar.gz
build-dependencies:
  - zig@0.15
executables:
  - exposure: global executable
    kind: cli
    name: hevi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hevi
  brew: brew install hevi
  nix: nix profile install nixpkgs#hevi
  winget: winget install --id Arnau478.hevi -e
provenance:
  formula: hevi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
