id: brew:halide
display-name: halide
homepage: https://halide-lang.org
repo: https://github.com/halide/Halide
docs: https://halide-lang.org
package-manager:
  brew: halide
  nix: halide
  pacman: gengen
package-manager-url: https://formulae.brew.sh/formula/halide
version: 21.0.0
license: MIT
category: development
tags:
  - cli
description: Language for fast, portable data-parallel computation
source-archive: https://github.com/halide/Halide/archive/refs/tags/v21.0.0.tar.gz
dependencies:
  - flatbuffers
  - jpeg-turbo
  - libpng
  - lld@21
  - llvm@21
  - openssl@3
  - python@3.14
  - wabt
build-dependencies:
  - cmake
  - pybind11
executables:
  - exposure: global executable
    kind: cli
    name: adams2019_retrain_cost_model
  - exposure: global executable
    kind: cli
    name: adams2019_weightsdir_to_weightsfile
  - exposure: global executable
    kind: cli
    name: anderson2021_retrain_cost_model
  - exposure: global executable
    kind: cli
    name: anderson2021_weightsdir_to_weightsfile
  - exposure: global executable
    kind: cli
    name: featurization_to_sample
  - exposure: global executable
    kind: cli
    name: gengen
  - exposure: global executable
    kind: cli
    name: get_host_target
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:halide
  brew: brew install halide
  nix: nix profile install nixpkgs#halide
  pacman: sudo pacman -S gengen
provenance:
  formula: halide
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
