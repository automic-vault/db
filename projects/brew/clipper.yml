id: brew:clipper
display-name: clipper
homepage: https://github.com/wincent/clipper
repo: https://github.com/wincent/clipper
docs: https://github.com/wincent/clipper
package-manager:
  apk: clipper
  brew: clipper
  macports: clipper
  nix: clipper
package-manager-url: https://formulae.brew.sh/formula/clipper
version: 3.0.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Share macOS clipboard with tmux and other local and remote apps
source-archive: https://github.com/wincent/clipper/archive/refs/tags/3.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: clipper
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add clipper
  av: sudo av install brew:clipper
  brew: brew install clipper
  macports: sudo port install clipper
  nix: nix profile install nixpkgs#clipper
provenance:
  formula: clipper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
