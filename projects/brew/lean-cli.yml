id: brew:lean-cli
display-name: lean-cli
homepage: https://github.com/leancloud/lean-cli
repo: https://github.com/leancloud/lean-cli
docs: https://github.com/leancloud/lean-cli
package-manager:
  brew: lean-cli
  scoop: main/lean-cli
package-manager-url: https://formulae.brew.sh/formula/lean-cli
version: 1.2.4
license: Apache-2.0
category: cloud
tags:
  - cli
description: Command-line tool to develop and manage LeanCloud apps
source-archive: https://github.com/leancloud/lean-cli/archive/refs/tags/v1.2.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tds
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lean-cli
  brew: brew install lean-cli
  scoop: scoop install main/lean-cli
provenance:
  formula: lean-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
