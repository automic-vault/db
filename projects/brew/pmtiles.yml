id: brew:pmtiles
display-name: pmtiles
homepage: https://protomaps.com/docs/pmtiles
repo: https://github.com/protomaps/go-pmtiles
docs: https://protomaps.com/docs/pmtiles
package-manager:
  brew: pmtiles
  nix: pmtiles
package-manager-url: https://formulae.brew.sh/formula/pmtiles
version: 1.30.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Single-file executable tool for creating, reading and uploading PMTiles archives
source-archive: https://github.com/protomaps/go-pmtiles/archive/refs/tags/v1.30.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pmtiles
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pmtiles
  brew: brew install pmtiles
  nix: nix profile install nixpkgs#pmtiles
provenance:
  formula: pmtiles
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
