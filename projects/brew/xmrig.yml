id: brew:xmrig
display-name: xmrig
homepage: https://github.com/xmrig/xmrig
repo: https://github.com/xmrig/xmrig
docs: https://github.com/xmrig/xmrig
package-manager:
  apk: xmrig
  brew: xmrig
  debian: xmrig
  nix: xmrig
  pacman: xmrig
  scoop: extras/xmrig
  ubuntu: xmrig
  zypper: xmrig
package-manager-url: https://formulae.brew.sh/formula/xmrig
version: 6.26.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Monero (XMR) CPU miner
source-archive: https://github.com/xmrig/xmrig/archive/refs/tags/v6.26.0.tar.gz
dependencies:
  - hwloc
  - libuv
  - openssl@3
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: xmrig
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xmrig
  av: sudo av install brew:xmrig
  brew: brew install xmrig
  debian: sudo apt install xmrig
  nix: nix profile install nixpkgs#xmrig
  pacman: sudo pacman -S xmrig
  scoop: scoop install extras/xmrig
  ubuntu: sudo apt install xmrig
  zypper: sudo zypper install xmrig
provenance:
  formula: xmrig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
