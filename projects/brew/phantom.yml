id: brew:phantom
display-name: phantom
homepage: https://github.com/phantompane/phantom
repo: https://registry.npmjs.org/@phantompane/cli/-/cli-6.2.0.tgz
docs: https://github.com/phantompane/phantom
package-manager:
  brew: phantom
  nix: phantom
  winget: hammadxcm.go-phantom
package-manager-url: https://formulae.brew.sh/formula/phantom
version: 6.2.0
license: MIT
category: development
tags:
  - cli
  - git
description: CLI tool for seamless parallel development with Git worktrees
source-archive: https://registry.npmjs.org/@phantompane/cli/-/cli-6.2.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: phantom
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:phantom
  brew: brew install phantom
  nix: nix profile install nixpkgs#phantom
  winget: winget install --id hammadxcm.go-phantom -e
provenance:
  formula: phantom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
