id: brew:verilator
display-name: verilator
homepage: https://www.veripool.org/wiki/verilator
repo: https://github.com/verilator/verilator
docs: https://www.veripool.org/wiki/verilator
package-manager:
  apk: verilator
  brew: verilator
  debian: verilator
  dnf: verilator
  macports: verilator
  nix: verilator
  pacman: verilator
  ubuntu: verilator
  zypper: verilator
package-manager-url: https://formulae.brew.sh/formula/verilator
version: 5.048
license: LGPL-3.0-only OR Artistic-2.0
category: development
tags:
  - cli
description: Verilog simulator
source-archive: https://github.com/verilator/verilator/archive/refs/tags/v5.048.tar.gz
build-dependencies:
  - autoconf
  - automake
  - help2man
uses-from-macos:
  - perl
  - python
executables:
  - exposure: global executable
    kind: cli
    name: verilator
  - exposure: global executable
    kind: cli
    name: verilator_bin
  - exposure: global executable
    kind: cli
    name: verilator_bin_dbg
  - exposure: global executable
    kind: cli
    name: verilator_coverage
  - exposure: global executable
    kind: cli
    name: verilator_coverage_bin_dbg
  - exposure: global executable
    kind: cli
    name: verilator_gantt
  - exposure: global executable
    kind: cli
    name: verilator_profcfunc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add verilator
  av: sudo av install brew:verilator
  brew: brew install verilator
  debian: sudo apt install verilator
  dnf: sudo dnf install verilator
  macports: sudo port install verilator
  nix: nix profile install nixpkgs#verilator
  pacman: sudo pacman -S verilator
  ubuntu: sudo apt install verilator
  zypper: sudo zypper install verilator
provenance:
  formula: verilator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
