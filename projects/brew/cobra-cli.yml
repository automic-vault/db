id: brew:cobra-cli
display-name: cobra-cli
homepage: https://cobra.dev
repo: https://github.com/spf13/cobra-cli
docs: https://cobra.dev
package-manager:
  brew: cobra-cli
  debian: cobra-cli
  nix: cobra-cli
  ubuntu: cobra-cli
package-manager-url: https://formulae.brew.sh/formula/cobra-cli
version: 1.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Tool to generate cobra applications and commands
source-archive: https://github.com/spf13/cobra-cli/archive/refs/tags/v1.3.0.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cobra-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cobra-cli
  brew: brew install cobra-cli
  debian: sudo apt install cobra-cli
  nix: nix profile install nixpkgs#cobra-cli
  ubuntu: sudo apt install cobra-cli
provenance:
  formula: cobra-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
