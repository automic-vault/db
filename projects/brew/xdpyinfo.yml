id: brew:xdpyinfo
display-name: xdpyinfo
homepage: https://www.x.org/
repo: https://www.x.org/archive/individual/app/xdpyinfo-1.4.0.tar.xz
docs: https://www.x.org/
package-manager:
  apk: xdpyinfo
  brew: xdpyinfo
  dnf: xdpyinfo
  macports: xdpyinfo
  nix: xdpyinfo
  zypper: xdpyinfo
package-manager-url: https://formulae.brew.sh/formula/xdpyinfo
version: 1.4.0
license: MIT
category: development
tags:
  - cli
description: 'X.Org: Utility for displaying information about an X server'
source-archive: https://www.x.org/archive/individual/app/xdpyinfo-1.4.0.tar.xz
dependencies:
  - libx11
  - libxcb
  - libxext
  - libxi
  - libxtst
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xdpyinfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xdpyinfo
  av: sudo av install brew:xdpyinfo
  brew: brew install xdpyinfo
  dnf: sudo dnf install xdpyinfo
  macports: sudo port install xdpyinfo
  nix: nix profile install nixpkgs#xdpyinfo
  zypper: sudo zypper install xdpyinfo
provenance:
  formula: xdpyinfo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
