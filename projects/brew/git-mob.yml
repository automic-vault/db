id: brew:git-mob
display-name: git-mob
homepage: https://github.com/rkotze/git-mob/blob/master/packages/git-mob
repo: https://registry.npmjs.org/git-mob/-/git-mob-4.0.1.tgz
docs: https://github.com/rkotze/git-mob/blob/master/packages/git-mob
package-manager:
  brew: git-mob
package-manager-url: https://formulae.brew.sh/formula/git-mob
version: 4.0.1
license: MIT
category: development
tags:
  - cli
  - git
description: CLI tool for including co-authors in commits
source-archive: https://registry.npmjs.org/git-mob/-/git-mob-4.0.1.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: git-add-coauthor
  - exposure: global executable
    kind: cli
    name: git-mob
  - exposure: global executable
    kind: cli
    name: git-mob-print
  - exposure: global executable
    kind: cli
    name: git-solo
  - exposure: global executable
    kind: cli
    name: git-suggest-coauthors
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-mob
  brew: brew install git-mob
provenance:
  formula: git-mob
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
