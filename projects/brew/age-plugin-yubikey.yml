id: brew:age-plugin-yubikey
display-name: age-plugin-yubikey
homepage: https://github.com/str4d/age-plugin-yubikey
repo: https://github.com/str4d/age-plugin-yubikey
docs: https://github.com/str4d/age-plugin-yubikey
package-manager:
  brew: age-plugin-yubikey
  macports: age-plugin-yubikey
  nix: age-plugin-yubikey
  pacman: age-plugin-yubikey
package-manager-url: https://formulae.brew.sh/formula/age-plugin-yubikey
version: 0.5.1
license: Apache-2.0 OR MIT
category: security
tags:
  - cli
description: Plugin for encrypting files with age and PIV tokens such as YubiKeys
source-archive: https://github.com/str4d/age-plugin-yubikey/archive/refs/tags/v0.5.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - pcsc-lite
executables:
  - exposure: global executable
    kind: cli
    name: age-plugin-yubikey
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:age-plugin-yubikey
  brew: brew install age-plugin-yubikey
  macports: sudo port install age-plugin-yubikey
  nix: nix profile install nixpkgs#age-plugin-yubikey
  pacman: sudo pacman -S age-plugin-yubikey
provenance:
  formula: age-plugin-yubikey
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
