id: brew:jflex
display-name: jflex
homepage: https://jflex.de/
repo: https://github.com/jflex-de/jflex
docs: https://jflex.de/
package-manager:
  brew: jflex
  debian: jflex
  dnf: jflex
  macports: jflex
  nix: jflex
  ubuntu: jflex
  zypper: jflex
package-manager-url: https://formulae.brew.sh/formula/jflex
version: 1.9.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Lexical analyzer generator for Java, written in Java
source-archive: https://github.com/jflex-de/jflex/releases/download/v1.9.1/jflex-1.9.1.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: jflex
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jflex
  brew: brew install jflex
  debian: sudo apt install jflex
  dnf: sudo dnf install jflex
  macports: sudo port install jflex
  nix: nix profile install nixpkgs#jflex
  ubuntu: sudo apt install jflex
  zypper: sudo zypper install jflex
provenance:
  formula: jflex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
