id: brew:btpd
display-name: btpd
homepage: https://github.com/btpd/btpd
repo: https://github.com/btpd/btpd
docs: https://github.com/btpd/btpd
package-manager:
  apk: btpd
  brew: btpd
  macports: btpd
  ubuntu: btpd
package-manager-url: https://formulae.brew.sh/formula/btpd
version: 0.16
license: BSD-2-Clause
category: development
tags:
  - cli
description: BitTorrent Protocol Daemon
source-archive: https://github.com/btpd/btpd/archive/refs/tags/v0.16.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: btinfo
  - exposure: global executable
    kind: cli
    name: btpd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add btpd
  av: sudo av install brew:btpd
  brew: brew install btpd
  macports: sudo port install btpd
  ubuntu: sudo apt install btpd
provenance:
  formula: btpd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
