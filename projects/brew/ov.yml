id: brew:ov
display-name: ov
homepage: https://noborus.github.io/ov/
repo: https://github.com/noborus/ov
docs: https://noborus.github.io/ov/
package-manager:
  brew: ov
  dnf: ov
  macports: ov
  nix: ov
  scoop: main/ov
  winget: noborus.ov
package-manager-url: https://formulae.brew.sh/formula/ov
version: 0.53.0
license: MIT
category: development
tags:
  - cli
description: Feature-rich terminal-based text viewer
source-archive: https://github.com/noborus/ov/archive/refs/tags/v0.53.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ov
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ov
  brew: brew install ov
  dnf: sudo dnf install ov
  macports: sudo port install ov
  nix: nix profile install nixpkgs#ov
  scoop: scoop install main/ov
  winget: winget install --id noborus.ov -e
provenance:
  formula: ov
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
