id: brew:hotbuild
display-name: hotbuild
homepage: https://hotbuild.rustpub.com/
repo: https://github.com/wandercn/hotbuild
docs: https://hotbuild.rustpub.com/
package-manager:
  brew: hotbuild
package-manager-url: https://formulae.brew.sh/formula/hotbuild
version: 1.0.9
license: MulanPSL-2.0
category: development
tags:
  - cli
description: Cross platform hot compilation tool for go
source-archive: https://github.com/wandercn/hotbuild/archive/refs/tags/v1.0.9.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hotbuild
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hotbuild
  brew: brew install hotbuild
provenance:
  formula: hotbuild
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
