id: brew:cloudformation-guard
display-name: cloudformation-guard
homepage: https://github.com/aws-cloudformation/cloudformation-guard
repo: https://github.com/aws-cloudformation/cloudformation-guard
docs: https://github.com/aws-cloudformation/cloudformation-guard
package-manager:
  brew: cloudformation-guard
package-manager-url: https://formulae.brew.sh/formula/cloudformation-guard
version: 3.2.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Checks CloudFormation templates for compliance using a declarative syntax
source-archive: >
  https://github.com/aws-cloudformation/cloudformation-guard/archive/refs/tags/3.2.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cfn-guard
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloudformation-guard
  brew: brew install cloudformation-guard
provenance:
  formula: cloudformation-guard
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
