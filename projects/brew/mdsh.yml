id: brew:mdsh
display-name: mdsh
homepage: https://zimbatm.github.io/mdsh/
repo: https://github.com/zimbatm/mdsh
docs: https://zimbatm.github.io/mdsh/
package-manager:
  brew: mdsh
  dnf: mdsh
  nix: mdsh
package-manager-url: https://formulae.brew.sh/formula/mdsh
version: 0.9.2
license: MIT
category: development
tags:
  - cli
description: Markdown shell pre-processor
source-archive: https://github.com/zimbatm/mdsh/archive/refs/tags/v0.9.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mdsh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mdsh
  brew: brew install mdsh
  dnf: sudo dnf install mdsh
  nix: nix profile install nixpkgs#mdsh
provenance:
  formula: mdsh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
