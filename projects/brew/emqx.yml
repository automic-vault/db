id: brew:emqx
display-name: emqx
homepage: https://www.emqx.io/
repo: https://github.com/emqx/emqx
docs: https://www.emqx.io/
package-manager:
  brew: emqx
package-manager-url: https://formulae.brew.sh/formula/emqx
version: 5.8.8
license: Apache-2.0
category: development
tags:
  - cli
description: MQTT broker for IoT
source-archive: https://github.com/emqx/emqx/archive/refs/tags/v5.8.8.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - cmake
  - coreutils
  - erlang@26
  - freetds
  - libtool
uses-from-macos:
  - cyrus-sasl
  - krb5
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: emqx
  - exposure: global executable
    kind: cli
    name: emqx-5.8.8
  - exposure: global executable
    kind: cli
    name: emqx_cluster_rescue
  - exposure: global executable
    kind: cli
    name: emqx_ctl
  - exposure: global executable
    kind: cli
    name: emqx_ctl-5.8.8
  - exposure: global executable
    kind: cli
    name: emqx_fw
  - exposure: global executable
    kind: cli
    name: install_upgrade.escript
  - exposure: global executable
    kind: cli
    name: install_upgrade.escript-5.8.8
  - exposure: global executable
    kind: cli
    name: no_dot_erlang.boot
  - exposure: global executable
    kind: cli
    name: node_dump
  - exposure: global executable
    kind: cli
    name: nodetool-5.8.8
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:emqx
  brew: brew install emqx
provenance:
  formula: emqx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
