id: brew:influxdb-cli
display-name: influxdb-cli
homepage: https://influxdata.com/time-series-platform/influxdb/
repo: https://github.com/influxdata/influx-cli
docs: https://influxdata.com/time-series-platform/influxdb/
package-manager:
  brew: influxdb-cli
  winget: InfluxData.InfluxDB.CLI
package-manager-url: https://formulae.brew.sh/formula/influxdb-cli
version: 2.8.0
license: MIT
category: development
tags:
  - cli
description: CLI for managing resources in InfluxDB v2
source-archive: https://github.com/influxdata/influx-cli.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: influx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:influxdb-cli
  brew: brew install influxdb-cli
  winget: winget install --id InfluxData.InfluxDB.CLI -e
provenance:
  formula: influxdb-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
