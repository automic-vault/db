id: brew:wasm-micro-runtime
display-name: wasm-micro-runtime
homepage: https://github.com/bytecodealliance/wasm-micro-runtime
repo: https://github.com/bytecodealliance/wasm-micro-runtime
docs: https://github.com/bytecodealliance/wasm-micro-runtime
package-manager:
  apk: wasm-micro-runtime
  brew: wasm-micro-runtime
package-manager-url: https://formulae.brew.sh/formula/wasm-micro-runtime
version: 2.4.4
license: Apache-2.0 WITH LLVM-exception
category: development
tags:
  - cli
description: WebAssembly Micro Runtime (WAMR)
source-archive: >
  https://github.com/bytecodealliance/wasm-micro-runtime/archive/refs/tags/WAMR-2.4.4.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: iwasm
  - exposure: global executable
    kind: cli
    name: iwasm-2.4.4
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wasm-micro-runtime
  av: sudo av install brew:wasm-micro-runtime
  brew: brew install wasm-micro-runtime
provenance:
  formula: wasm-micro-runtime
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
