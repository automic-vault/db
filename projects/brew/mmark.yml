id: brew:mmark
display-name: mmark
homepage: https://mmark.miek.nl/
repo: https://github.com/mmarkdown/mmark
docs: https://mmark.miek.nl/
package-manager:
  brew: mmark
  debian: mmark
  macports: mmark
  nix: mmark
  ubuntu: mmark
package-manager-url: https://formulae.brew.sh/formula/mmark
version: 2.2.48
license: BSD-2-Clause
category: development
tags:
  - cli
description: Powerful markdown processor in Go geared towards the IETF
source-archive: https://github.com/mmarkdown/mmark/archive/refs/tags/v2.2.48.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mmark
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mmark
  brew: brew install mmark
  debian: sudo apt install mmark
  macports: sudo port install mmark
  nix: nix profile install nixpkgs#mmark
  ubuntu: sudo apt install mmark
provenance:
  formula: mmark
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
