package-manager-url: https://formulae.brew.sh/formula/libimobiledevice
version: 1.4.0
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Library to communicate with iOS devices natively
source-archive: >
  https://github.com/libimobiledevice/libimobiledevice/releases/download/1.4.0/libimobiledevice-1.4.0.tar.bz2
dependencies:
  - libimobiledevice-glue
  - libplist
  - libtasn1
