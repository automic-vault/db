  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libimobiledevice
  av: sudo av install brew:libimobiledevice
  brew: brew install libimobiledevice
  dnf: sudo dnf install libimobiledevice
  macports: sudo port install libimobiledevice
  nix: nix profile install nixpkgs#libimobiledevice
  pacman: sudo pacman -S libimobiledevice
provenance:
  formula: libimobiledevice
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
