id: brew:libimobiledevice
display-name: libimobiledevice
homepage: https://www.libimobiledevice.org/
repo: https://github.com/libimobiledevice/libimobiledevice
docs: https://www.libimobiledevice.org/
package-manager:
  apk: libimobiledevice
  brew: libimobiledevice
  dnf: libimobiledevice
  macports: libimobiledevice
  nix: libimobiledevice
