id: brew:mydumper
display-name: mydumper
homepage: https://github.com/mydumper/mydumper
repo: https://github.com/mydumper/mydumper
docs: https://github.com/mydumper/mydumper
package-manager:
  brew: mydumper
  nix: mydumper
  ubuntu: mydumper
package-manager-url: https://formulae.brew.sh/formula/mydumper
version: 1.0.1-3
license: GPL-3.0-or-later
category: database
tags:
  - cli
description: MySQL logical backup tool
source-archive: https://github.com/mydumper/mydumper/archive/refs/tags/v1.0.1-3.tar.gz
dependencies:
  - glib
  - mariadb-connector-c
  - openssl@3
  - pcre2
build-dependencies:
  - cmake
  - pkgconf
  - sphinx-doc
executables:
  - exposure: global executable
    kind: cli
    name: mydumper
  - exposure: global executable
    kind: cli
    name: myloader
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mydumper
  brew: brew install mydumper
  nix: nix profile install nixpkgs#mydumper
  ubuntu: sudo apt install mydumper
provenance:
  formula: mydumper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
