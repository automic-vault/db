id: brew:webify
display-name: webify
homepage: https://github.com/beefsack/webify
repo: https://github.com/beefsack/webify
docs: https://github.com/beefsack/webify
package-manager:
  brew: webify
  macports: webify
package-manager-url: https://formulae.brew.sh/formula/webify
version: 1.5.0
license: MIT
category: development
tags:
  - cli
description: Wrapper for shell commands as web services
source-archive: https://github.com/beefsack/webify/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: webify
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:webify
  brew: brew install webify
  macports: sudo port install webify
provenance:
  formula: webify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
