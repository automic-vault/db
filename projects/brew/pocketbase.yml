id: brew:pocketbase
display-name: pocketbase
homepage: https://pocketbase.io/
repo: https://github.com/pocketbase/pocketbase
docs: https://pocketbase.io/
package-manager:
  brew: pocketbase
  nix: pocketbase
  scoop: main/pocketbase
  winget: PocketBase.PocketBase
  zypper: pocketbase
package-manager-url: https://formulae.brew.sh/formula/pocketbase
version: 0.38.2
license: MIT
category: development
tags:
  - cli
description: Open source backend for your next project in 1 file
source-archive: https://github.com/pocketbase/pocketbase/archive/refs/tags/v0.38.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pocketbase
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pocketbase
  brew: brew install pocketbase
  nix: nix profile install nixpkgs#pocketbase
  scoop: scoop install main/pocketbase
  winget: winget install --id PocketBase.PocketBase -e
  zypper: sudo zypper install pocketbase
provenance:
  formula: pocketbase
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
