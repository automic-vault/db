id: brew:bootterm
display-name: bootterm
homepage: https://github.com/wtarreau/bootterm
repo: https://github.com/wtarreau/bootterm
docs: https://github.com/wtarreau/bootterm
package-manager:
  apk: bootterm
  brew: bootterm
  debian: bootterm
  nix: bootterm
  scoop: extras/bt
package-manager-url: https://formulae.brew.sh/formula/bootterm
version: 0.5
license: MIT
category: development
tags:
  - cli
description: Simple, reliable and powerful terminal to ease connection to serial ports
source-archive: https://github.com/wtarreau/bootterm/archive/refs/tags/v0.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bootterm
  av: sudo av install brew:bootterm
  brew: brew install bootterm
  debian: sudo apt install bootterm
  nix: nix profile install nixpkgs#bootterm
  scoop: scoop install extras/bt
provenance:
  formula: bootterm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
