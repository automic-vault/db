id: brew:bpython
display-name: bpython
homepage: https://bpython-interpreter.org
repo: >
  https://files.pythonhosted.org/packages/44/29/cd80e9108a6fc6a925ffb915f8f69198a2bb2388e39167a41d743ac2a8f4/bpython-0.26.tar.gz
docs: https://bpython-interpreter.org
package-manager:
