id: brew:dfu-programmer
display-name: dfu-programmer
homepage: https://github.com/dfu-programmer/dfu-programmer
repo: https://github.com/dfu-programmer/dfu-programmer
docs: https://github.com/dfu-programmer/dfu-programmer
package-manager:
  apk: dfu-programmer
  brew: dfu-programmer
  debian: dfu-programmer
  macports: dfu-programmer
  nix: dfu-programmer
  pacman: dfu-programmer
  scoop: extras/dfu-programmer
  ubuntu: dfu-programmer
  zypper: dfu-programmer
package-manager-url: https://formulae.brew.sh/formula/dfu-programmer
version: 1.1.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Device firmware update based USB programmer for Atmel chips
source-archive: >
  https://github.com/dfu-programmer/dfu-programmer/releases/download/v1.1.0/dfu-programmer-1.1.0.tar.gz
dependencies:
  - libusb
executables:
  - exposure: global executable
    kind: cli
    name: dfu-programmer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dfu-programmer
  av: sudo av install brew:dfu-programmer
  brew: brew install dfu-programmer
  debian: sudo apt install dfu-programmer
  macports: sudo port install dfu-programmer
  nix: nix profile install nixpkgs#dfu-programmer
  pacman: sudo pacman -S dfu-programmer
  scoop: scoop install extras/dfu-programmer
  ubuntu: sudo apt install dfu-programmer
  zypper: sudo zypper install dfu-programmer
provenance:
  formula: dfu-programmer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
