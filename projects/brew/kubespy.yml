id: brew:kubespy
display-name: kubespy
homepage: https://github.com/pulumi/kubespy
repo: https://github.com/pulumi/kubespy
docs: https://github.com/pulumi/kubespy
package-manager:
  brew: kubespy
  macports: kubespy
  nix: kubespy
  scoop: extras/kubespy
  zypper: kubespy
package-manager-url: https://formulae.brew.sh/formula/kubespy
version: 0.6.3
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Tools for observing Kubernetes resources in realtime
source-archive: https://github.com/pulumi/kubespy/archive/refs/tags/v0.6.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubespy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubespy
  brew: brew install kubespy
  macports: sudo port install kubespy
  nix: nix profile install nixpkgs#kubespy
  scoop: scoop install extras/kubespy
  zypper: sudo zypper install kubespy
provenance:
  formula: kubespy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
