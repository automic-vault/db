id: brew:extract_url
display-name: extract_url
homepage: https://www.memoryhole.net/~kyle/extract_url/
repo: https://github.com/m3m0ryh0l3/extracturl
docs: https://www.memoryhole.net/~kyle/extract_url/
package-manager:
  brew: extract_url
  nix: extract_url
package-manager-url: https://formulae.brew.sh/formula/extract_url
version: 1.6.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: Perl script to extracts URLs from emails or plain text
source-archive: https://github.com/m3m0ryh0l3/extracturl/archive/refs/tags/v1.6.2.tar.gz
uses-from-macos:
  - ncurses
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: extract_url
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:extract_url
  brew: brew install extract_url
  nix: nix profile install nixpkgs#extract_url
provenance:
  formula: extract_url
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
