id: brew:cbonsai
display-name: cbonsai
homepage: https://gitlab.com/jallbrit/cbonsai
repo: https://gitlab.com/jallbrit/cbonsai/-/archive/v1.4.2/cbonsai-v1.4.2.tar.gz
docs: https://gitlab.com/jallbrit/cbonsai
package-manager:
  apk: cbonsai
  brew: cbonsai
  debian: cbonsai
  dnf: cbonsai
  macports: cbonsai
  nix: cbonsai
  ubuntu: cbonsai
  zypper: cbonsai
package-manager-url: https://formulae.brew.sh/formula/cbonsai
version: 1.4.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Console Bonsai is a bonsai tree generator, written in C using ncurses
source-archive: https://gitlab.com/jallbrit/cbonsai/-/archive/v1.4.2/cbonsai-v1.4.2.tar.gz
dependencies:
  - ncurses
build-dependencies:
  - pkgconf
  - scdoc
executables:
  - exposure: global executable
    kind: cli
    name: cbonsai
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cbonsai
  av: sudo av install brew:cbonsai
  brew: brew install cbonsai
  debian: sudo apt install cbonsai
  dnf: sudo dnf install cbonsai
  macports: sudo port install cbonsai
  nix: nix profile install nixpkgs#cbonsai
  ubuntu: sudo apt install cbonsai
  zypper: sudo zypper install cbonsai
provenance:
  formula: cbonsai
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
