id: brew:lammps
display-name: lammps
homepage: https://docs.lammps.org/
repo: https://github.com/lammps/lammps
docs: https://docs.lammps.org/
package-manager:
  brew: lammps
  debian: lammps
  dnf: lammps
  nix: lammps
  ubuntu: lammps
  zypper: lammps
package-manager-url: https://formulae.brew.sh/formula/lammps
version: 20250722-update4
license: GPL-2.0-only
category: development
tags:
  - cli
description: Molecular Dynamics Simulator
source-archive: https://github.com/lammps/lammps/archive/refs/tags/stable_22Jul2025_update4.tar.gz
dependencies:
  - fftw
  - jpeg-turbo
  - kim-api
  - libomp
  - libpng
  - open-mpi
build-dependencies:
  - cmake
  - pkgconf
  - voro++
uses-from-macos:
  - curl
  - python
executables:
  - exposure: global executable
    kind: cli
    name: lmp_mpi
  - exposure: global executable
    kind: cli
    name: lmp_serial
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lammps
  brew: brew install lammps
  debian: sudo apt install lammps
  dnf: sudo dnf install lammps
  nix: nix profile install nixpkgs#lammps
  ubuntu: sudo apt install lammps
  zypper: sudo zypper install lammps
provenance:
  formula: lammps
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
