id: brew:gtrash
display-name: gtrash
homepage: https://github.com/umlx5h/gtrash
repo: https://github.com/umlx5h/gtrash
docs: https://github.com/umlx5h/gtrash
package-manager:
  brew: gtrash
  nix: gtrash
package-manager-url: https://formulae.brew.sh/formula/gtrash
version: 0.0.6
license: MIT
category: development
tags:
  - cli
description: 'Featureful Trash CLI manager: alternative to rm and trash-cli'
source-archive: https://github.com/umlx5h/gtrash/archive/refs/tags/v0.0.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gtrash
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gtrash
  brew: brew install gtrash
  nix: nix profile install nixpkgs#gtrash
provenance:
  formula: gtrash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
