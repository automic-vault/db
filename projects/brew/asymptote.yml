id: brew:asymptote
display-name: asymptote
homepage: https://asymptote.sourceforge.io
repo: https://downloads.sourceforge.net/project/asymptote/3.11/asymptote-3.11.src.tgz
docs: https://asymptote.sourceforge.io
package-manager:
  apk: asymptote
  brew: asymptote
  debian: asymptote
  dnf: asymptote
  macports: asymptote
  nix: asymptote
  pacman: asymptote
  ubuntu: asymptote
  zypper: asymptote
package-manager-url: https://formulae.brew.sh/formula/asymptote
version: 3.11
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Powerful descriptive vector graphics language
source-archive: https://downloads.sourceforge.net/project/asymptote/3.11/asymptote-3.11.src.tgz
dependencies:
  - bdw-gc
  - fftw
  - ghostscript
  - gsl
  - readline
build-dependencies:
  - cmake
  - glm
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: asy
  - exposure: global executable
    kind: cli
    name: xasy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add asymptote
  av: sudo av install brew:asymptote
  brew: brew install asymptote
  debian: sudo apt install asymptote
  dnf: sudo dnf install asymptote
  macports: sudo port install asymptote
  nix: nix profile install nixpkgs#asymptote
  pacman: sudo pacman -S asymptote
  ubuntu: sudo apt install asymptote
  zypper: sudo zypper install asymptote
provenance:
  formula: asymptote
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
