id: brew:podiff
display-name: podiff
homepage: https://puszcza.gnu.org.ua/software/podiff/
repo: https://download.gnu.org.ua/pub/release/podiff/podiff-1.4.tar.gz
docs: https://puszcza.gnu.org.ua/software/podiff/
package-manager:
  brew: podiff
  debian: podiff
  nix: podiff
package-manager-url: https://formulae.brew.sh/formula/podiff
version: 1.4
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Compare textual information in two PO files
source-archive: https://download.gnu.org.ua/pub/release/podiff/podiff-1.4.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: podiff
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To use with git, add this to your .git/config or global git config file: [diff
    "podiff"] command = $HOMEBREW_PREFIX/bin/podiff -D-u Then add the following line to
    the .gitattributes file in the directory with your PO files: *.po diff=podiff See
    `man podiff` for more information.
  post-install-defined: false
install-lines:
  av: sudo av install brew:podiff
  brew: brew install podiff
  debian: sudo apt install podiff
  nix: nix profile install nixpkgs#podiff
provenance:
  formula: podiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
