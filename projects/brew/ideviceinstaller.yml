id: brew:ideviceinstaller
display-name: ideviceinstaller
homepage: https://libimobiledevice.org/
repo: https://github.com/libimobiledevice/ideviceinstaller
docs: https://libimobiledevice.org/
package-manager:
  apk: ideviceinstaller
  brew: ideviceinstaller
  debian: ideviceinstaller
  dnf: ideviceinstaller
  macports: ideviceinstaller
  nix: ideviceinstaller
  ubuntu: ideviceinstaller
package-manager-url: https://formulae.brew.sh/formula/ideviceinstaller
version: 1.2.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Tool for managing apps on iOS devices
source-archive: >
  https://github.com/libimobiledevice/ideviceinstaller/releases/download/1.2.0/ideviceinstaller-1.2.0.tar.bz2
dependencies:
  - libimobiledevice
  - libplist
  - libzip
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ideviceinstaller
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ideviceinstaller
  av: sudo av install brew:ideviceinstaller
  brew: brew install ideviceinstaller
  debian: sudo apt install ideviceinstaller
  dnf: sudo dnf install ideviceinstaller
  macports: sudo port install ideviceinstaller
  nix: nix profile install nixpkgs#ideviceinstaller
  ubuntu: sudo apt install ideviceinstaller
provenance:
  formula: ideviceinstaller
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
