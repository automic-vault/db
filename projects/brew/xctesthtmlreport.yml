id: brew:xctesthtmlreport
display-name: xctesthtmlreport
homepage: https://github.com/XCTestHTMLReport/XCTestHTMLReport
repo: https://github.com/XCTestHTMLReport/XCTestHTMLReport
docs: https://github.com/XCTestHTMLReport/XCTestHTMLReport
package-manager:
  brew: xctesthtmlreport
package-manager-url: https://formulae.brew.sh/formula/xctesthtmlreport
version: 2.5.1
license: MIT
category: development
tags:
  - cli
description: Xcode-like HTML report for Unit and UI Tests
source-archive: https://github.com/XCTestHTMLReport/XCTestHTMLReport/archive/refs/tags/2.5.1.tar.gz
uses-from-macos:
  - swift
executables:
  - exposure: global executable
    kind: cli
    name: xchtmlreport
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xctesthtmlreport
  brew: brew install xctesthtmlreport
provenance:
  formula: xctesthtmlreport
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
