id: brew:jql
display-name: jql
homepage: https://github.com/yamafaktory/jql
repo: https://github.com/yamafaktory/jql
docs: https://github.com/yamafaktory/jql
package-manager:
  apk: jql
  brew: jql
  dnf: jql
  macports: jql
  nix: jql
package-manager-url: https://formulae.brew.sh/formula/jql
version: 8.1.2
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
  - json
description: JSON query language CLI tool
source-archive: https://github.com/yamafaktory/jql/archive/refs/tags/jql-v8.1.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: jql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jql
  av: sudo av install brew:jql
  brew: brew install jql
  dnf: sudo dnf install jql
  macports: sudo port install jql
  nix: nix profile install nixpkgs#jql
provenance:
  formula: jql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
