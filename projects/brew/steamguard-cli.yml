id: brew:steamguard-cli
display-name: steamguard-cli
homepage: https://github.com/dyc3/steamguard-cli
repo: https://github.com/dyc3/steamguard-cli
docs: https://github.com/dyc3/steamguard-cli
package-manager:
  apk: steamguard-cli
  brew: steamguard-cli
  nix: steamguard-cli
  scoop: extras/steamguard-cli
package-manager-url: https://formulae.brew.sh/formula/steamguard-cli
version: 0.17.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: CLI for steamguard
source-archive: https://github.com/dyc3/steamguard-cli/archive/refs/tags/v0.17.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: steamguard
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add steamguard-cli
  av: sudo av install brew:steamguard-cli
  brew: brew install steamguard-cli
  nix: nix profile install nixpkgs#steamguard-cli
  scoop: scoop install extras/steamguard-cli
provenance:
  formula: steamguard-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
