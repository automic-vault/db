id: brew:sofia-sip
display-name: sofia-sip
homepage: https://sofia-sip.sourceforge.net/
repo: https://github.com/freeswitch/sofia-sip
docs: https://sofia-sip.sourceforge.net/
package-manager:
  apk: sofia-sip
  brew: sofia-sip
  dnf: sofia-sip
  macports: sofia-sip
  nix: sofia_sip
  pacman: sofia-sip
  zypper: sofia-sip
package-manager-url: https://formulae.brew.sh/formula/sofia-sip
version: 1.13.17
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: SIP User-Agent library
source-archive: https://github.com/freeswitch/sofia-sip/archive/refs/tags/v1.13.17.tar.gz
dependencies:
  - gettext
  - glib
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: addrinfo
  - exposure: global executable
    kind: cli
    name: localinfo
  - exposure: global executable
    kind: cli
    name: sip-date
  - exposure: global executable
    kind: cli
    name: sip-dig
  - exposure: global executable
    kind: cli
    name: sip-options
  - exposure: global executable
    kind: cli
    name: stunc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sofia-sip
  av: sudo av install brew:sofia-sip
  brew: brew install sofia-sip
  dnf: sudo dnf install sofia-sip
  macports: sudo port install sofia-sip
  nix: nix profile install nixpkgs#sofia_sip
  pacman: sudo pacman -S sofia-sip
  zypper: sudo zypper install sofia-sip
provenance:
  formula: sofia-sip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
