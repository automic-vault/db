id: brew:erlang-language-platform
display-name: erlang-language-platform
homepage: https://whatsapp.github.io/erlang-language-platform/
repo: https://github.com/WhatsApp/erlang-language-platform
docs: https://whatsapp.github.io/erlang-language-platform/
package-manager:
  brew: erlang-language-platform
  macports: elp
  nix: erlang-language-platform
package-manager-url: https://formulae.brew.sh/formula/erlang-language-platform
version: 2026-02-27
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: LSP server and CLI for the Erlang programming language
source-archive: https://github.com/WhatsApp/erlang-language-platform.git
dependencies:
  - erlang@28
  - openjdk
  - rebar3
build-dependencies:
  - rust
  - sbt
  - scala
executables:
  - exposure: global executable
    kind: cli
    name: elp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:erlang-language-platform
  brew: brew install erlang-language-platform
  macports: sudo port install elp
  nix: nix profile install nixpkgs#erlang-language-platform
provenance:
  formula: erlang-language-platform
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
