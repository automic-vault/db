id: brew:pinact
display-name: pinact
homepage: https://github.com/suzuki-shunsuke/pinact
repo: https://github.com/suzuki-shunsuke/pinact
docs: https://github.com/suzuki-shunsuke/pinact
package-manager:
  brew: pinact
  macports: pinact
  nix: pinact
  winget: suzuki-shunsuke.pinact
  zypper: pinact
package-manager-url: https://formulae.brew.sh/formula/pinact
version: 4.0.0
license: MIT
category: development
tags:
  - cli
description: Pins GitHub Actions to full hashes and versions
source-archive: https://github.com/suzuki-shunsuke/pinact/archive/refs/tags/v4.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pinact
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pinact
  brew: brew install pinact
  macports: sudo port install pinact
  nix: nix profile install nixpkgs#pinact
  winget: winget install --id suzuki-shunsuke.pinact -e
  zypper: sudo zypper install pinact
provenance:
  formula: pinact
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
