id: brew:asciidoc
display-name: asciidoc
homepage: https://asciidoc-py.github.io/
repo: >
  https://files.pythonhosted.org/packages/1d/e7/315a82f2d256e9270977aa3c15e8fe281fd7c40b8e2a0b97e0cb61ca8fa0/asciidoc-10.2.1.tar.gz
docs: https://asciidoc-py.github.io/
package-manager:
  apk: asciidoc
  brew: asciidoc
  debian: asciidoc
  dnf: asciidoc
  macports: asciidoc
  nix: asciidoc
  pacman: asciidoc
  ubuntu: asciidoc
  zypper: asciidoc
package-manager-url: https://formulae.brew.sh/formula/asciidoc
version: 10.2.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Formatter/translator for text files to numerous formats
source-archive: >
  https://files.pythonhosted.org/packages/1d/e7/315a82f2d256e9270977aa3c15e8fe281fd7c40b8e2a0b97e0cb61ca8fa0/asciidoc-10.2.1.tar.gz
dependencies:
  - docbook
  - python@3.14
  - source-highlight
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: a2x
  - exposure: global executable
    kind: cli
    name: asciidoc
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    If you intend to process AsciiDoc files through an XML stage (such as a2x for
    manpage generation) you need to add something like: export
    XML_CATALOG_FILES=$HOMEBREW_PREFIX/etc/xml/catalog to your shell rc file so that
    xmllint can find AsciiDoc's catalog files. See `man 1 xmllint' for more.
  post-install-defined: false
install-lines:
  apk: sudo apk add asciidoc
  av: sudo av install brew:asciidoc
  brew: brew install asciidoc
  debian: sudo apt install asciidoc
  dnf: sudo dnf install asciidoc
  macports: sudo port install asciidoc
  nix: nix profile install nixpkgs#asciidoc
  pacman: sudo pacman -S asciidoc
  ubuntu: sudo apt install asciidoc
  zypper: sudo zypper install asciidoc
provenance:
  formula: asciidoc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
