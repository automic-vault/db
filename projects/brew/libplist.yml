id: brew:libplist
display-name: libplist
homepage: https://libimobiledevice.org/
repo: https://github.com/libimobiledevice/libplist
docs: https://libimobiledevice.org/
package-manager:
  apk: libplist
  brew: libplist
  dnf: libplist
  macports: libplist
  nix: libplist
  pacman: libplist
  zypper: plistutil
package-manager-url: https://formulae.brew.sh/formula/libplist
version: 2.7.0
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Library for Apple Binary- and XML-Property Lists
source-archive: >
  https://github.com/libimobiledevice/libplist/releases/download/2.7.0/libplist-2.7.0.tar.bz2
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: plistutil
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libplist
  av: sudo av install brew:libplist
  brew: brew install libplist
  dnf: sudo dnf install libplist
  macports: sudo port install libplist
  nix: nix profile install nixpkgs#libplist
  pacman: sudo pacman -S libplist
  zypper: sudo zypper install plistutil
provenance:
  formula: libplist
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
