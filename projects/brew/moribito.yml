id: brew:moribito
display-name: moribito
homepage: https://ericschmar.github.io/moribito/
repo: https://github.com/ericschmar/moribito
docs: https://ericschmar.github.io/moribito/
package-manager:
  brew: moribito
  nix: moribito
package-manager-url: https://formulae.brew.sh/formula/moribito
version: 0.2.6
license: MIT
category: development
tags:
  - cli
description: TUI for LDAP Viewing/Queries
source-archive: https://github.com/ericschmar/moribito/archive/refs/tags/v0.2.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: moribito
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:moribito
  brew: brew install moribito
  nix: nix profile install nixpkgs#moribito
provenance:
  formula: moribito
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
