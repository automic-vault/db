id: brew:yek
display-name: yek
homepage: https://github.com/mohsen1/yek
repo: https://github.com/mohsen1/yek
docs: https://github.com/mohsen1/yek
package-manager:
  brew: yek
  nix: yek
  scoop: extras/yek
package-manager-url: https://formulae.brew.sh/formula/yek
version: 0.25.2
license: MIT
category: development
tags:
  - cli
description: Fast Rust based tool to serialize text-based files for LLM consumption
source-archive: https://github.com/mohsen1/yek/archive/refs/tags/v0.25.2.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: yek
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yek
  brew: brew install yek
  nix: nix profile install nixpkgs#yek
  scoop: scoop install extras/yek
provenance:
  formula: yek
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
