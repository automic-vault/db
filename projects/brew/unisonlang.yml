id: brew:unisonlang
display-name: unisonlang
homepage: https://unison-lang.org/
repo: https://github.com/unisonweb/unison
docs: https://unison-lang.org/
package-manager:
  brew: unisonlang
package-manager-url: https://formulae.brew.sh/formula/unisonlang
version: 1.3.0
license: MIT
category: development
tags:
  - cli
description: Friendly programming language from the future
source-archive: https://github.com/unisonweb/unison/archive/refs/tags/release/1.3.0.tar.gz
build-dependencies:
  - elm
  - elm-format
  - ghc@9.10
  - haskell-stack
  - node
executables:
  - exposure: global executable
    kind: cli
    name: ucm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:unisonlang
  brew: brew install unisonlang
provenance:
  formula: unisonlang
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
