id: brew:adaptivecpp
display-name: adaptivecpp
homepage: https://adaptivecpp.github.io/
repo: https://github.com/AdaptiveCpp/AdaptiveCpp
docs: https://adaptivecpp.github.io/
package-manager:
  brew: adaptivecpp
  nix: adaptivecpp
  zypper: adaptivecpp
package-manager-url: https://formulae.brew.sh/formula/adaptivecpp
version: 25.10.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: SYCL and C++ standard parallelism for CPUs and GPUs
source-archive: https://github.com/AdaptiveCpp/AdaptiveCpp/archive/refs/tags/v25.10.0.tar.gz
dependencies:
  - libomp
build-dependencies:
  - cmake
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: acpp
  - exposure: global executable
    kind: cli
    name: acpp-appdb-tool
  - exposure: global executable
    kind: cli
    name: acpp-hcf-tool
  - exposure: global executable
    kind: cli
    name: acpp-info
  - exposure: global executable
    kind: cli
    name: acpp-pcuda-pp
  - exposure: global executable
    kind: cli
    name: syclcc
  - exposure: global executable
    kind: cli
    name: syclcc-clang
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:adaptivecpp
  brew: brew install adaptivecpp
  nix: nix profile install nixpkgs#adaptivecpp
  zypper: sudo zypper install adaptivecpp
provenance:
  formula: adaptivecpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
