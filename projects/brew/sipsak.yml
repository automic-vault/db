id: brew:sipsak
display-name: sipsak
homepage: https://github.com/nils-ohlmeier/sipsak/
repo: https://github.com/nils-ohlmeier/sipsak
docs: https://github.com/nils-ohlmeier/sipsak/
package-manager:
  apk: sipsak
  brew: sipsak
  debian: sipsak
  dnf: sipsak
  nix: sipsak
  ubuntu: sipsak
  zypper: sipsak
package-manager-url: https://formulae.brew.sh/formula/sipsak
version: 0.9.8.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: SIP Swiss army knife
source-archive: https://github.com/nils-ohlmeier/sipsak/releases/download/0.9.8.1/sipsak-0.9.8.1.tar.gz
dependencies:
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: sipsak
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sipsak
  av: sudo av install brew:sipsak
  brew: brew install sipsak
  debian: sudo apt install sipsak
  dnf: sudo dnf install sipsak
  nix: nix profile install nixpkgs#sipsak
  ubuntu: sudo apt install sipsak
  zypper: sudo zypper install sipsak
provenance:
  formula: sipsak
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
