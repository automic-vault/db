id: brew:freeradius-server
display-name: freeradius-server
homepage: https://freeradius.org/
repo: https://github.com/FreeRADIUS/freeradius-server
docs: https://freeradius.org/
package-manager:
  brew: freeradius-server
  zypper: freeradius-server
package-manager-url: https://formulae.brew.sh/formula/freeradius-server
version: 3.2.8
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: High-performance and highly configurable RADIUS server
source-archive: https://github.com/FreeRADIUS/freeradius-server/archive/refs/tags/release_3_2_8.tar.gz
dependencies:
  - collectd
  - json-c
  - openssl@3
  - python@3.14
  - readline
  - sqlite
  - talloc
uses-from-macos:
  - krb5
  - libpcap
  - libxcrypt
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: checkrad
  - exposure: global executable
    kind: cli
    name: dhcpclient
  - exposure: global executable
    kind: cli
    name: map_unit
  - exposure: global executable
    kind: cli
    name: rad_counter
  - exposure: global executable
    kind: cli
    name: radattr
  - exposure: global executable
    kind: cli
    name: radclient
  - exposure: global executable
    kind: cli
    name: radcrypt
  - exposure: global executable
    kind: cli
    name: raddebug
  - exposure: global executable
    kind: cli
    name: radeapclient
  - exposure: global executable
    kind: cli
    name: radiusd
  - exposure: global executable
    kind: cli
    name: radlast
  - exposure: global executable
    kind: cli
    name: radmin
  - exposure: global executable
    kind: cli
    name: radsecret
  - exposure: global executable
    kind: cli
    name: radsniff
  - exposure: global executable
    kind: cli
    name: radsqlrelay
  - exposure: global executable
    kind: cli
    name: radtest
  - exposure: global executable
    kind: cli
    name: radwho
  - exposure: global executable
    kind: cli
    name: radzap
  - exposure: global executable
    kind: cli
    name: rc.radiusd
  - exposure: global executable
    kind: cli
    name: rlm_ippool_tool
  - exposure: global executable
    kind: cli
    name: rlm_sqlippool_tool
  - exposure: global executable
    kind: cli
    name: smbencrypt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:freeradius-server
  brew: brew install freeradius-server
  zypper: sudo zypper install freeradius-server
provenance:
  formula: freeradius-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
