id: brew:picoruby
display-name: picoruby
homepage: https://picoruby.org
repo: https://github.com/picoruby/picoruby
docs: https://picoruby.org
package-manager:
  brew: picoruby
package-manager-url: https://formulae.brew.sh/formula/picoruby
version: 3.4.5
license: MIT
category: development
tags:
  - cli
description: Smallest Ruby implementation for microcontrollers
source-archive: https://github.com/picoruby/picoruby.git
dependencies:
  - openssl@3
build-dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: picorbc
  - exposure: global executable
    kind: cli
    name: picoruby
  - exposure: global executable
    kind: cli
    name: r2p2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:picoruby
  brew: brew install picoruby
provenance:
  formula: picoruby
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
