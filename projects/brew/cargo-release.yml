id: brew:cargo-release
display-name: cargo-release
homepage: https://github.com/crate-ci/cargo-release
repo: https://github.com/crate-ci/cargo-release
docs: https://github.com/crate-ci/cargo-release
package-manager:
  apk: cargo-release
  brew: cargo-release
  nix: cargo-release
  pacman: cargo-release
package-manager-url: https://formulae.brew.sh/formula/cargo-release
version: 1.1.2
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: 'Cargo subcommand release: everything about releasing a rust crate'
source-archive: https://github.com/crate-ci/cargo-release/archive/refs/tags/v1.1.2.tar.gz
dependencies:
  - libgit2
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-release
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-release
  av: sudo av install brew:cargo-release
  brew: brew install cargo-release
  nix: nix profile install nixpkgs#cargo-release
  pacman: sudo pacman -S cargo-release
provenance:
  formula: cargo-release
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
