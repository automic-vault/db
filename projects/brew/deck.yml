id: brew:deck
display-name: deck
homepage: https://github.com/k1LoW/deck
repo: https://github.com/k1LoW/deck
docs: https://github.com/k1LoW/deck
package-manager:
  brew: deck
  debian: deck
  nix: deck
  ubuntu: deck
  winget: sfx101.deck
package-manager-url: https://formulae.brew.sh/formula/deck
version: 1.23.1
license: MIT
category: development
tags:
  - cli
description: Creates slide deck using Markdown and Google Slides
source-archive: https://github.com/k1LoW/deck/archive/refs/tags/v1.23.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: deck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:deck
  brew: brew install deck
  debian: sudo apt install deck
  nix: nix profile install nixpkgs#deck
  ubuntu: sudo apt install deck
  winget: winget install --id sfx101.deck -e
provenance:
  formula: deck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
