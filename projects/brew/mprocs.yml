id: brew:mprocs
display-name: mprocs
homepage: https://github.com/pvolok/mprocs
repo: https://github.com/pvolok/mprocs
docs: https://github.com/pvolok/mprocs
package-manager:
  apk: mprocs
  brew: mprocs
  nix: mprocs
  scoop: main/mprocs
  winget: pvolok.mprocs
package-manager-url: https://formulae.brew.sh/formula/mprocs
version: 0.9.3
license: MIT
category: development
tags:
  - cli
description: Run multiple commands in parallel
source-archive: https://github.com/pvolok/mprocs/archive/refs/tags/v0.9.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dk
  - exposure: global executable
    kind: cli
    name: mprocs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mprocs
  av: sudo av install brew:mprocs
  brew: brew install mprocs
  nix: nix profile install nixpkgs#mprocs
  scoop: scoop install main/mprocs
  winget: winget install --id pvolok.mprocs -e
provenance:
  formula: mprocs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
