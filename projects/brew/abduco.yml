id: brew:abduco
display-name: abduco
homepage: https://www.brain-dump.org/projects/abduco/
repo: https://github.com/martanne/abduco
docs: https://www.brain-dump.org/projects/abduco/
package-manager:
  apk: abduco
  brew: abduco
  dnf: abduco
  macports: abduco
  nix: abduco
  pacman: abduco
package-manager-url: https://formulae.brew.sh/formula/abduco
version: 0.6
license: ISC
category: development
tags:
  - cli
description: 'Provides session management: i.e. separate programs from terminals'
source-archive: https://github.com/martanne/abduco/releases/download/v0.6/abduco-0.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: abduco
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add abduco
  av: sudo av install brew:abduco
  brew: brew install abduco
  dnf: sudo dnf install abduco
  macports: sudo port install abduco
  nix: nix profile install nixpkgs#abduco
  pacman: sudo pacman -S abduco
provenance:
  formula: abduco
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
