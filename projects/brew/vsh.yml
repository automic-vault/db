id: brew:vsh
display-name: vsh
homepage: https://github.com/fishi0x01/vsh
repo: https://github.com/fishi0x01/vsh
docs: https://github.com/fishi0x01/vsh
package-manager:
  brew: vsh
  macports: vsh
  nix: vsh
package-manager-url: https://formulae.brew.sh/formula/vsh
version: 1.0.0
license: MIT
category: security
tags:
  - cli
description: HashiCorp Vault interactive shell
source-archive: https://github.com/fishi0x01/vsh/archive/refs/tags/v1.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vsh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vsh
  brew: brew install vsh
  macports: sudo port install vsh
  nix: nix profile install nixpkgs#vsh
provenance:
  formula: vsh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
