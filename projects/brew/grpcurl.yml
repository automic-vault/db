id: brew:grpcurl
display-name: grpcurl
homepage: https://github.com/fullstorydev/grpcurl
repo: https://github.com/fullstorydev/grpcurl
docs: https://github.com/fullstorydev/grpcurl
package-manager:
  apk: grpcurl
  brew: grpcurl
  dnf: grpcurl
  macports: grpcurl
  nix: grpcurl
  scoop: main/grpcurl
  winget: fullstorydev.grpcurl
package-manager-url: https://formulae.brew.sh/formula/grpcurl
version: 1.9.3
license: MIT
category: development
tags:
  - cli
description: Like cURL, but for gRPC
source-archive: https://github.com/fullstorydev/grpcurl/archive/refs/tags/v1.9.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: grpcurl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add grpcurl
  av: sudo av install brew:grpcurl
  brew: brew install grpcurl
  dnf: sudo dnf install grpcurl
  macports: sudo port install grpcurl
  nix: nix profile install nixpkgs#grpcurl
  scoop: scoop install main/grpcurl
  winget: winget install --id fullstorydev.grpcurl -e
provenance:
  formula: grpcurl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
