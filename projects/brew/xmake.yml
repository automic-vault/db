id: brew:xmake
display-name: xmake
homepage: https://xmake.io/
repo: https://github.com/xmake-io/xmake
docs: https://xmake.io/
package-manager:
  apk: xmake
  brew: xmake
  debian: xmake
  dnf: xmake
  macports: xmake
  nix: xmake
  pacman: xmake
  scoop: main/xmake
  ubuntu: xmake
  winget: Xmake-io.Xmake
package-manager-url: https://formulae.brew.sh/formula/xmake
version: 3.0.9
license: Apache-2.0
category: development
tags:
  - cli
description: Cross-platform build utility based on Lua
source-archive: https://github.com/xmake-io/xmake/releases/download/v3.0.9/xmake-v3.0.9.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: xmake
  - exposure: global executable
    kind: cli
    name: xrepo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xmake
  av: sudo av install brew:xmake
  brew: brew install xmake
  debian: sudo apt install xmake
  dnf: sudo dnf install xmake
  macports: sudo port install xmake
  nix: nix profile install nixpkgs#xmake
  pacman: sudo pacman -S xmake
  scoop: scoop install main/xmake
  ubuntu: sudo apt install xmake
  winget: winget install --id Xmake-io.Xmake -e
provenance:
  formula: xmake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
