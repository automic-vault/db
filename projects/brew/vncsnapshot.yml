id: brew:vncsnapshot
display-name: vncsnapshot
homepage: https://sourceforge.net/projects/vncsnapshot/
repo: >
  https://downloads.sourceforge.net/project/vncsnapshot/vncsnapshot/1.2a/vncsnapshot-1.2a-src.tar.gz
docs: https://sourceforge.net/projects/vncsnapshot/
package-manager:
  brew: vncsnapshot
  debian: vncsnapshot
  ubuntu: vncsnapshot
package-manager-url: https://formulae.brew.sh/formula/vncsnapshot
version: 1.2a
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Command-line utility for taking VNC snapshots
source-archive: >
  https://downloads.sourceforge.net/project/vncsnapshot/vncsnapshot/1.2a/vncsnapshot-1.2a-src.tar.gz
dependencies:
  - jpeg-turbo
executables:
  - exposure: global executable
    kind: cli
    name: vncsnapshot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vncsnapshot
  brew: brew install vncsnapshot
  debian: sudo apt install vncsnapshot
  ubuntu: sudo apt install vncsnapshot
provenance:
  formula: vncsnapshot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
