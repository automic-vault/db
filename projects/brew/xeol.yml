id: brew:xeol
display-name: xeol
homepage: https://github.com/xeol-io/xeol
repo: https://github.com/xeol-io/xeol
docs: https://github.com/xeol-io/xeol
package-manager:
  brew: xeol
  nix: xeol
package-manager-url: https://formulae.brew.sh/formula/xeol
version: 0.10.8
license: Apache-2.0
category: development
tags:
  - cli
description: Xcanner for end-of-life software in container images, filesystems, and SBOMs
source-archive: https://github.com/xeol-io/xeol/archive/refs/tags/v0.10.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: xeol
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xeol
  brew: brew install xeol
  nix: nix profile install nixpkgs#xeol
provenance:
  formula: xeol
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
