id: brew:clog
display-name: clog
homepage: https://gothenburgbitfactory.org/clog/docs/
repo: https://github.com/GothenburgBitFactory/clog
docs: https://gothenburgbitfactory.org/clog/docs/
package-manager:
  brew: clog
  debian: clog
  macports: clog
  ubuntu: clog
package-manager-url: https://formulae.brew.sh/formula/clog
version: 1.3.0
license: MIT
category: development
tags:
  - cli
description: Colorized pattern-matching log tail utility
source-archive: https://github.com/GothenburgBitFactory/clog/releases/download/v1.3.0/clog-1.3.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: clog
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Next step is to create a .clogrc file in your home directory. See 'man clog' for
    details and a sample file.
  post-install-defined: false
install-lines:
  av: sudo av install brew:clog
  brew: brew install clog
  debian: sudo apt install clog
  macports: sudo port install clog
  ubuntu: sudo apt install clog
provenance:
  formula: clog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
