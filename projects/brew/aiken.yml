id: brew:aiken
display-name: aiken
homepage: https://aiken-lang.org/
repo: https://github.com/aiken-lang/aiken
docs: https://aiken-lang.org/
package-manager:
  brew: aiken
  nix: aiken
package-manager-url: https://formulae.brew.sh/formula/aiken
version: 1.1.21
license: Apache-2.0
category: development
tags:
  - cli
description: Modern smart contract platform for Cardano
source-archive: https://github.com/aiken-lang/aiken/archive/refs/tags/v1.1.21.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: aiken
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aiken
  brew: brew install aiken
  nix: nix profile install nixpkgs#aiken
provenance:
  formula: aiken
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
