id: brew:fbthrift
display-name: fbthrift
homepage: https://github.com/facebook/fbthrift
repo: https://github.com/facebook/fbthrift
docs: https://github.com/facebook/fbthrift
package-manager:
  brew: fbthrift
  macports: fbthrift
  nix: fbthrift
package-manager-url: https://formulae.brew.sh/formula/fbthrift
version: 2026.05.25.00
license: Apache-2.0
category: development
tags:
  - cli
description: Facebook's branch of Apache Thrift, including a new C++ server
source-archive: https://github.com/facebook/fbthrift/archive/refs/tags/v2026.05.25.00.tar.gz
dependencies:
  - double-conversion
  - fizz
  - fmt
  - folly
  - gflags
  - glog
  - openssl@3
  - wangle
  - xxhash
build-dependencies:
  - bison
  - cmake
  - mvfst
  - zstd
executables:
  - exposure: global executable
    kind: cli
    name: thrift1
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fbthrift
  brew: brew install fbthrift
  macports: sudo port install fbthrift
  nix: nix profile install nixpkgs#fbthrift
provenance:
  formula: fbthrift
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
