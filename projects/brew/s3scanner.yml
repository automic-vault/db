id: brew:s3scanner
display-name: s3scanner
homepage: https://github.com/sa7mon/S3Scanner
repo: https://github.com/sa7mon/S3Scanner
docs: https://github.com/sa7mon/S3Scanner
package-manager:
  brew: s3scanner
  nix: s3scanner
  winget: sa7mon.S3Scanner
package-manager-url: https://formulae.brew.sh/formula/s3scanner
version: 3.1.1
license: MIT
category: development
tags:
  - cli
description: Scan for misconfigured S3 buckets across S3-compatible APIs!
source-archive: https://github.com/sa7mon/S3Scanner/archive/refs/tags/v3.1.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: s3scanner
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:s3scanner
  brew: brew install s3scanner
  nix: nix profile install nixpkgs#s3scanner
  winget: winget install --id sa7mon.S3Scanner -e
provenance:
  formula: s3scanner
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
