id: brew:staticcheck
display-name: staticcheck
homepage: https://staticcheck.dev/
repo: https://github.com/dominikh/go-tools
docs: https://staticcheck.dev/
package-manager:
  apk: staticcheck
  brew: staticcheck
  dnf: staticcheck
  macports: staticcheck
  pacman: staticcheck
  scoop: main/staticcheck
package-manager-url: https://formulae.brew.sh/formula/staticcheck
version: 2026.1
license: MIT
category: development
tags:
  - cli
description: State of the art linter for the Go programming language
source-archive: https://github.com/dominikh/go-tools/archive/refs/tags/2026.1.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: staticcheck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add staticcheck
  av: sudo av install brew:staticcheck
  brew: brew install staticcheck
  dnf: sudo dnf install staticcheck
  macports: sudo port install staticcheck
  pacman: sudo pacman -S staticcheck
  scoop: scoop install main/staticcheck
provenance:
  formula: staticcheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
