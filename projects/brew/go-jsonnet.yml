id: brew:go-jsonnet
display-name: go-jsonnet
homepage: https://jsonnet.org/
repo: https://github.com/google/go-jsonnet
docs: https://jsonnet.org/
package-manager:
  apk: go-jsonnet
  brew: go-jsonnet
  macports: go-jsonnet
  nix: go-jsonnet
  scoop: main/go-jsonnet
package-manager-url: https://formulae.brew.sh/formula/go-jsonnet
version: 0.22.0
license: Apache-2.0
category: development
tags:
  - cli
  - json
description: Go implementation of configuration language for defining JSON data
source-archive: https://github.com/google/go-jsonnet/archive/refs/tags/v0.22.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jsonnet-deps
  - exposure: global executable
    kind: cli
    name: jsonnet-lint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add go-jsonnet
  av: sudo av install brew:go-jsonnet
  brew: brew install go-jsonnet
  macports: sudo port install go-jsonnet
  nix: nix profile install nixpkgs#go-jsonnet
  scoop: scoop install main/go-jsonnet
provenance:
  formula: go-jsonnet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
