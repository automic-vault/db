id: brew:hut
display-name: hut
homepage: https://sr.ht/~xenrox/hut
repo: https://git.sr.ht/~xenrox/hut/archive/v0.8.0.tar.gz
docs: https://sr.ht/~xenrox/hut
package-manager:
  apk: hut
  brew: hut
  debian: hut
  dnf: hut
  macports: hut
  nix: hut
  pacman: hut
  ubuntu: hut
  zypper: hut
package-manager-url: https://formulae.brew.sh/formula/hut
version: 0.8.0
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: CLI tool for sr.ht
source-archive: https://git.sr.ht/~xenrox/hut/archive/v0.8.0.tar.gz
build-dependencies:
  - go
  - scdoc
executables:
  - exposure: global executable
    kind: cli
    name: hut
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hut
  av: sudo av install brew:hut
  brew: brew install hut
  debian: sudo apt install hut
  dnf: sudo dnf install hut
  macports: sudo port install hut
  nix: nix profile install nixpkgs#hut
  pacman: sudo pacman -S hut
  ubuntu: sudo apt install hut
  zypper: sudo zypper install hut
provenance:
  formula: hut
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
