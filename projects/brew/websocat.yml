id: brew:websocat
display-name: websocat
homepage: https://github.com/vi/websocat
repo: https://github.com/vi/websocat
docs: https://github.com/vi/websocat
package-manager:
  apk: websocat
  brew: websocat
  macports: websocat
  nix: websocat
  pacman: websocat
package-manager-url: https://formulae.brew.sh/formula/websocat
version: 1.14.1
license: MIT
category: development
tags:
  - cli
description: Command-line client for WebSockets
source-archive: https://github.com/vi/websocat/archive/refs/tags/v1.14.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: websocat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add websocat
  av: sudo av install brew:websocat
  brew: brew install websocat
  macports: sudo port install websocat
  nix: nix profile install nixpkgs#websocat
  pacman: sudo pacman -S websocat
provenance:
  formula: websocat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
