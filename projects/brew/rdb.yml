id: brew:rdb
display-name: rdb
homepage: https://github.com/HDT3213/rdb/
repo: https://github.com/HDT3213/rdb
docs: https://github.com/HDT3213/rdb/
package-manager:
  brew: rdb
package-manager-url: https://formulae.brew.sh/formula/rdb
version: 1.3.2
license: Apache-2.0
category: database
tags:
  - cli
description: Redis RDB parser
source-archive: https://github.com/HDT3213/rdb/archive/refs/tags/v1.3.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rdb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rdb
  brew: brew install rdb
provenance:
  formula: rdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
