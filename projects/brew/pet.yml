id: brew:pet
display-name: pet
homepage: https://github.com/knqyf263/pet
repo: https://github.com/knqyf263/pet
docs: https://github.com/knqyf263/pet
package-manager:
  brew: pet
  nix: pet
  scoop: extras/pet
package-manager-url: https://formulae.brew.sh/formula/pet
version: 1.0.1
license: MIT
category: development
tags:
  - cli
description: Simple command-line snippet manager
source-archive: https://github.com/knqyf263/pet/archive/refs/tags/v1.0.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pet
  brew: brew install pet
  nix: nix profile install nixpkgs#pet
  scoop: scoop install extras/pet
provenance:
  formula: pet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
