id: brew:bibtex2html
display-name: bibtex2html
homepage: https://usr.lmf.cnrs.fr/~jcf/bibtex2html/index.en.html
repo: https://usr.lmf.cnrs.fr/~jcf/ftp/bibtex2html/bibtex2html-1.99.tar.gz
docs: https://usr.lmf.cnrs.fr/~jcf/bibtex2html/index.en.html
package-manager:
  brew: bibtex2html
  debian: bibtex2html
  macports: bibtex2html
  nix: bibtex2html
  ubuntu: bibtex2html
package-manager-url: https://formulae.brew.sh/formula/bibtex2html
version: 1.99
license: GPL-2.0-only
category: network
tags:
  - cli
description: BibTeX to HTML converter
source-archive: https://usr.lmf.cnrs.fr/~jcf/ftp/bibtex2html/bibtex2html-1.99.tar.gz
build-dependencies:
  - ocaml
executables:
  - exposure: global executable
    kind: cli
    name: aux2bib
  - exposure: global executable
    kind: cli
    name: bib2bib
  - exposure: global executable
    kind: cli
    name: bibtex2html
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bibtex2html
  brew: brew install bibtex2html
  debian: sudo apt install bibtex2html
  macports: sudo port install bibtex2html
  nix: nix profile install nixpkgs#bibtex2html
  ubuntu: sudo apt install bibtex2html
provenance:
  formula: bibtex2html
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
