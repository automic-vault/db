id: brew:cmusfm
display-name: cmusfm
homepage: https://github.com/Arkq/cmusfm
repo: https://github.com/Arkq/cmusfm
docs: https://github.com/Arkq/cmusfm
package-manager:
  apk: cmusfm
  brew: cmusfm
  nix: cmusfm
package-manager-url: https://formulae.brew.sh/formula/cmusfm
version: 0.5.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Last.fm standalone scrobbler for the cmus music player
source-archive: https://github.com/Arkq/cmusfm/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - autoconf
  - automake
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: cmusfm
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cmusfm
  av: sudo av install brew:cmusfm
  brew: brew install cmusfm
  nix: nix profile install nixpkgs#cmusfm
provenance:
  formula: cmusfm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
