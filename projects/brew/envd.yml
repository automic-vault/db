id: brew:envd
display-name: envd
homepage: https://envd.tensorchord.ai
repo: https://github.com/tensorchord/envd
docs: https://envd.tensorchord.ai
package-manager:
  brew: envd
package-manager-url: https://formulae.brew.sh/formula/envd
version: 1.3.4
license: Apache-2.0
category: development
tags:
  - cli
description: Reproducible development environment for AI/ML
source-archive: https://github.com/tensorchord/envd/archive/refs/tags/v1.3.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: envd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:envd
  brew: brew install envd
provenance:
  formula: envd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
