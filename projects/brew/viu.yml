id: brew:viu
display-name: viu
homepage: https://github.com/atanunq/viu
repo: https://github.com/atanunq/viu
docs: https://github.com/atanunq/viu
package-manager:
  apk: viu
  brew: viu
  macports: viu
  nix: viu
  pacman: viu
  zypper: viu
package-manager-url: https://formulae.brew.sh/formula/viu
version: 1.6.1
license: MIT
category: development
tags:
  - cli
description: Simple terminal image viewer written in Rust
source-archive: https://github.com/atanunq/viu/archive/refs/tags/v1.6.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: viu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add viu
  av: sudo av install brew:viu
  brew: brew install viu
  macports: sudo port install viu
  nix: nix profile install nixpkgs#viu
  pacman: sudo pacman -S viu
  zypper: sudo zypper install viu
provenance:
  formula: viu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
