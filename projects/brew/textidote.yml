id: brew:textidote
display-name: textidote
homepage: https://sylvainhalle.github.io/textidote
repo: https://github.com/sylvainhalle/textidote
docs: https://sylvainhalle.github.io/textidote
package-manager:
  brew: textidote
  nix: textidote
package-manager-url: https://formulae.brew.sh/formula/textidote
version: 0.9
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Spelling, grammar and style checking on LaTeX documents
source-archive: https://github.com/sylvainhalle/textidote/archive/refs/tags/v0.9.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - ant
executables:
  - exposure: global executable
    kind: cli
    name: textidote
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:textidote
  brew: brew install textidote
  nix: nix profile install nixpkgs#textidote
provenance:
  formula: textidote
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
