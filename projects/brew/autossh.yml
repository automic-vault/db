id: brew:autossh
display-name: autossh
homepage: https://www.harding.motd.ca/autossh/
repo: https://www.harding.motd.ca/autossh/autossh-1.4g.tgz
docs: https://www.harding.motd.ca/autossh/
package-manager:
  apk: autossh
  brew: autossh
  debian: autossh
  dnf: autossh
  macports: autossh
  nix: autossh
  pacman: autossh
  scoop: main/autossh
  ubuntu: autossh
  zypper: autossh
package-manager-url: https://formulae.brew.sh/formula/autossh
version: 1.4g
license: BSD-1-Clause
category: network
tags:
  - cli
description: Automatically restart SSH sessions and tunnels
source-archive: https://www.harding.motd.ca/autossh/autossh-1.4g.tgz
executables:
  - exposure: global executable
    kind: cli
    name: autossh
  - exposure: global executable
    kind: cli
    name: rscreen
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add autossh
  av: sudo av install brew:autossh
  brew: brew install autossh
  debian: sudo apt install autossh
  dnf: sudo dnf install autossh
  macports: sudo port install autossh
  nix: nix profile install nixpkgs#autossh
  pacman: sudo pacman -S autossh
  scoop: scoop install main/autossh
  ubuntu: sudo apt install autossh
  zypper: sudo zypper install autossh
provenance:
  formula: autossh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
