id: brew:muffet
display-name: muffet
homepage: https://github.com/raviqqe/muffet
repo: https://github.com/raviqqe/muffet
docs: https://github.com/raviqqe/muffet
package-manager:
  brew: muffet
  nix: muffet
package-manager-url: https://formulae.brew.sh/formula/muffet
version: 2.11.4
license: MIT
category: development
tags:
  - cli
description: Fast website link checker in Go
source-archive: https://github.com/raviqqe/muffet/archive/refs/tags/v2.11.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: muffet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:muffet
  brew: brew install muffet
  nix: nix profile install nixpkgs#muffet
provenance:
  formula: muffet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
