id: brew:efm-langserver
display-name: efm-langserver
homepage: https://github.com/mattn/efm-langserver
repo: https://github.com/mattn/efm-langserver
docs: https://github.com/mattn/efm-langserver
package-manager:
  apk: efm-langserver
  brew: efm-langserver
  debian: efm-langserver
  macports: efm-langserver
  nix: efm-langserver
  ubuntu: efm-langserver
  zypper: efm-langserver
package-manager-url: https://formulae.brew.sh/formula/efm-langserver
version: 0.0.56
license: MIT
category: development
tags:
  - cli
description: General purpose Language Server
source-archive: https://github.com/mattn/efm-langserver/archive/refs/tags/v0.0.56.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: efm-langserver
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add efm-langserver
  av: sudo av install brew:efm-langserver
  brew: brew install efm-langserver
  debian: sudo apt install efm-langserver
  macports: sudo port install efm-langserver
  nix: nix profile install nixpkgs#efm-langserver
  ubuntu: sudo apt install efm-langserver
  zypper: sudo zypper install efm-langserver
provenance:
  formula: efm-langserver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
