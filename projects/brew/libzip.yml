id: brew:libzip
display-name: libzip
homepage: https://libzip.org/
repo: https://libzip.org/download/libzip-1.11.4.tar.xz
docs: https://libzip.org/
package-manager:
  apk: libzip
  brew: libzip
  debian: zipcmp
  dnf: libzip
  macports: libzip
  nix: libzip
  pacman: libzip
  ubuntu: zipcmp
package-manager-url: https://formulae.brew.sh/formula/libzip
version: 1.11.4
license: BSD-3-Clause
category: network
tags:
  - cli
description: C library for reading, creating, and modifying zip archives
source-archive: https://libzip.org/download/libzip-1.11.4.tar.xz
dependencies:
  - xz
  - zstd
build-dependencies:
  - cmake
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: zipcmp
  - exposure: global executable
    kind: cli
    name: zipmerge
  - exposure: global executable
    kind: cli
    name: ziptool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libzip
  av: sudo av install brew:libzip
  brew: brew install libzip
  debian: sudo apt install zipcmp
  dnf: sudo dnf install libzip
  macports: sudo port install libzip
  nix: nix profile install nixpkgs#libzip
  pacman: sudo pacman -S libzip
  ubuntu: sudo apt install zipcmp
provenance:
  formula: libzip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
