id: brew:fennel
display-name: fennel
homepage: https://fennel-lang.org
repo: https://github.com/bakpakin/Fennel
docs: https://fennel-lang.org
package-manager:
  apk: fennel
  brew: fennel
  debian: fennel
  dnf: fennel
  pacman: fennel
package-manager-url: https://formulae.brew.sh/formula/fennel
version: 1.6.1
license: MIT
category: development
tags:
  - cli
description: Lua Lisp Language
source-archive: https://github.com/bakpakin/Fennel/archive/refs/tags/1.6.1.tar.gz
dependencies:
  - lua
build-dependencies:
  - luajit
executables:
  - exposure: global executable
    kind: cli
    name: fennel
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fennel
  av: sudo av install brew:fennel
  brew: brew install fennel
  debian: sudo apt install fennel
  dnf: sudo dnf install fennel
  pacman: sudo pacman -S fennel
provenance:
  formula: fennel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
