id: brew:nextdns
display-name: nextdns
homepage: https://nextdns.io
repo: https://github.com/nextdns/nextdns
docs: https://nextdns.io
package-manager:
  brew: nextdns
  chocolatey: nextdns
  macports: nextdns
  nix: nextdns
  scoop: main/nextdns
  winget: NextDNS.NextDNS
package-manager-url: https://formulae.brew.sh/formula/nextdns
version: 1.47.2
license: MIT
category: development
tags:
  - cli
description: CLI for NextDNS's DNS-over-HTTPS (DoH)
source-archive: https://github.com/nextdns/nextdns/archive/refs/tags/v1.47.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nextdns
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nextdns
  brew: brew install nextdns
  chocolatey: choco install nextdns
  macports: sudo port install nextdns
  nix: nix profile install nixpkgs#nextdns
  scoop: scoop install main/nextdns
  winget: winget install --id NextDNS.NextDNS -e
provenance:
  formula: nextdns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
