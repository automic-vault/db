id: brew:zuban
display-name: zuban
homepage: https://zubanls.com/
repo: https://github.com/zubanls/zuban
docs: https://zubanls.com/
package-manager:
  brew: zuban
  nix: zuban
package-manager-url: https://formulae.brew.sh/formula/zuban
version: 0.7.2
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Python language server and type checker, written in Rust
source-archive: https://github.com/zubanls/zuban.git
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: zmypy
  - exposure: global executable
    kind: cli
    name: zuban
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zuban
  brew: brew install zuban
  nix: nix profile install nixpkgs#zuban
provenance:
  formula: zuban
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
