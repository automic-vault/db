id: brew:hidapi
display-name: hidapi
homepage: https://github.com/libusb/hidapi
repo: https://github.com/libusb/hidapi
docs: https://github.com/libusb/hidapi
package-manager:
  apk: hidapi
  brew: hidapi
  dnf: hidapi
  macports: hidapi
  nix: hidapi
  pacman: hidapi
package-manager-url: https://formulae.brew.sh/formula/hidapi
version: 0.15.0
license: GPL-3.0-only OR BSD-3-Clause OR HIDAPI
category: development
tags:
  - cli
description: Library for communicating with USB and Bluetooth HID devices
source-archive: https://github.com/libusb/hidapi/archive/refs/tags/hidapi-0.15.0.tar.gz
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: hidtest_hidraw
  - exposure: global executable
    kind: cli
    name: hidtest_libusb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hidapi
  av: sudo av install brew:hidapi
  brew: brew install hidapi
  dnf: sudo dnf install hidapi
  macports: sudo port install hidapi
  nix: nix profile install nixpkgs#hidapi
  pacman: sudo pacman -S hidapi
provenance:
  formula: hidapi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
