id: brew:pangene
display-name: pangene
homepage: https://github.com/lh3/pangene
repo: https://github.com/lh3/pangene
docs: https://github.com/lh3/pangene
package-manager:
  brew: pangene
package-manager-url: https://formulae.brew.sh/formula/pangene
version: 1.1
license: MIT
category: development
tags:
  - cli
description: Construct pangenome gene graphs
source-archive: https://github.com/lh3/pangene/archive/refs/tags/v1.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: pangene
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pangene
  brew: brew install pangene
provenance:
  formula: pangene
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
