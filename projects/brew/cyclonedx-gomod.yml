id: brew:cyclonedx-gomod
display-name: cyclonedx-gomod
homepage: https://cyclonedx.org/
repo: https://github.com/CycloneDX/cyclonedx-gomod
docs: https://cyclonedx.org/
package-manager:
  brew: cyclonedx-gomod
  nix: cyclonedx-gomod
package-manager-url: https://formulae.brew.sh/formula/cyclonedx-gomod
version: 1.10.0
license: Apache-2.0
category: development
tags:
  - cli
description: Creates CycloneDX Software Bill of Materials (SBOM) from Go modules
source-archive: https://github.com/CycloneDX/cyclonedx-gomod/archive/refs/tags/v1.10.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cyclonedx-gomod
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cyclonedx-gomod
  brew: brew install cyclonedx-gomod
  nix: nix profile install nixpkgs#cyclonedx-gomod
provenance:
  formula: cyclonedx-gomod
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
