id: brew:httperf
display-name: httperf
homepage: https://github.com/httperf/httperf
repo: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/httperf/httperf-0.9.0.tar.gz
docs: https://github.com/httperf/httperf
package-manager:
  brew: httperf
  debian: httperf
  dnf: httperf
  macports: httperf
  ubuntu: httperf
  zypper: httperf
package-manager-url: https://formulae.brew.sh/formula/httperf
version: 0.9.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Tool for measuring webserver performance
source-archive: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/httperf/httperf-0.9.0.tar.gz
dependencies:
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: httperf
  - exposure: global executable
    kind: cli
    name: idleconn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:httperf
  brew: brew install httperf
  debian: sudo apt install httperf
  dnf: sudo dnf install httperf
  macports: sudo port install httperf
  ubuntu: sudo apt install httperf
  zypper: sudo zypper install httperf
provenance:
  formula: httperf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
