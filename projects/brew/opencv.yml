id: brew:opencv
display-name: opencv
homepage: https://opencv.org/
repo: https://github.com/opencv/opencv
docs: https://opencv.org/
package-manager:
  apk: opencv
  brew: opencv
  chocolatey: OpenCV
  dnf: opencv
  nix: opencv
  pacman: opencv
  scoop: main/opencv
  zypper: opencv
package-manager-url: https://formulae.brew.sh/formula/opencv
version: 4.13.0
license: Apache-2.0
category: development
tags:
  - cli
description: Open source computer vision library
source-archive: https://github.com/opencv/opencv/archive/refs/tags/4.13.0.tar.gz
dependencies:
  - abseil
  - ceres-solver
  - eigen
  - ffmpeg
  - freetype
  - gflags
  - glew
  - glog
  - harfbuzz
  - imath
  - jpeg-turbo
  - jsoncpp
  - libarchive
  - libpng
  - libtiff
  - numpy
  - openblas
  - openexr
  - openjpeg
  - openvino
  - protobuf
  - python@3.14
  - tbb
  - tesseract
  - vtk
  - webp
build-dependencies:
  - cmake
  - pkgconf
  - python-setuptools
executables:
  - exposure: global executable
    kind: cli
    name: opencv_annotation
  - exposure: global executable
    kind: cli
    name: opencv_interactive-calibration
  - exposure: global executable
    kind: cli
    name: opencv_model_diagnostics
  - exposure: global executable
    kind: cli
    name: opencv_version
  - exposure: global executable
    kind: cli
    name: opencv_visualisation
  - exposure: global executable
    kind: cli
    name: opencv_waldboost_detector
  - exposure: global executable
    kind: cli
    name: setup_vars_opencv4.sh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add opencv
  av: sudo av install brew:opencv
  brew: brew install opencv
  chocolatey: choco install OpenCV
  dnf: sudo dnf install opencv
  nix: nix profile install nixpkgs#opencv
  pacman: sudo pacman -S opencv
  scoop: scoop install main/opencv
  zypper: sudo zypper install opencv
provenance:
  formula: opencv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
