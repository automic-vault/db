id: brew:wget
display-name: wget
homepage: https://www.gnu.org/software/wget/
repo: https://ftpmirror.gnu.org/gnu/wget/wget-1.25.0.tar.gz
docs: https://www.gnu.org/software/wget/
package-manager:
  apk: wget
  brew: wget
  chocolatey: Wget
  debian: wget
  macports: wget
  nix: wget
  pacman: wget
  scoop: main/wget
  ubuntu: wget
  winget: JernejSimoncic.Wget
  zypper: wget
package-manager-url: https://formulae.brew.sh/formula/wget
version: 1.25.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Internet file retriever
source-archive: https://ftpmirror.gnu.org/gnu/wget/wget-1.25.0.tar.gz
dependencies:
  - gettext
  - libidn2
  - libunistring
  - openssl@3
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: wget
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wget
  av: sudo av install brew:wget
  brew: brew install wget
  chocolatey: choco install Wget
  debian: sudo apt install wget
  macports: sudo port install wget
  nix: nix profile install nixpkgs#wget
  pacman: sudo pacman -S wget
  scoop: scoop install main/wget
  ubuntu: sudo apt install wget
  winget: winget install --id JernejSimoncic.Wget -e
  zypper: sudo zypper install wget
provenance:
  formula: wget
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
