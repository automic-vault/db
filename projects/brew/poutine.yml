id: brew:poutine
display-name: poutine
homepage: https://boostsecurityio.github.io/poutine/
repo: https://github.com/boostsecurityio/poutine
docs: https://boostsecurityio.github.io/poutine/
package-manager:
  brew: poutine
  nix: poutine
package-manager-url: https://formulae.brew.sh/formula/poutine
version: 1.1.6
license: Apache-2.0
category: security
tags:
  - cli
  - security
description: Security scanner that detects vulnerabilities in build pipelines
source-archive: https://github.com/boostsecurityio/poutine/archive/refs/tags/v1.1.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: poutine
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:poutine
  brew: brew install poutine
  nix: nix profile install nixpkgs#poutine
provenance:
  formula: poutine
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
