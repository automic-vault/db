id: brew:flann
display-name: flann
homepage: https://github.com/flann-lib/flann
repo: https://github.com/flann-lib/flann
docs: https://github.com/flann-lib/flann
package-manager:
  apk: flann
  brew: flann
  dnf: flann
  macports: flann
  nix: flann
  pacman: flann
package-manager-url: https://formulae.brew.sh/formula/flann
version: 1.9.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Fast Library for Approximate Nearest Neighbors
source-archive: https://github.com/flann-lib/flann/archive/refs/tags/1.9.2.tar.gz
dependencies:
  - hdf5
  - lz4
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: flann_example_c
  - exposure: global executable
    kind: cli
    name: flann_example_cpp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add flann
  av: sudo av install brew:flann
  brew: brew install flann
  dnf: sudo dnf install flann
  macports: sudo port install flann
  nix: nix profile install nixpkgs#flann
  pacman: sudo pacman -S flann
provenance:
  formula: flann
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
