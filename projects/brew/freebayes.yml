id: brew:freebayes
display-name: freebayes
homepage: https://github.com/freebayes/freebayes
repo: https://github.com/freebayes/freebayes
docs: https://github.com/freebayes/freebayes
package-manager:
  brew: freebayes
  debian: freebayes
  nix: freebayes
package-manager-url: https://formulae.brew.sh/formula/freebayes
version: 1.3.10
license: MIT
category: development
tags:
  - cli
description: Bayesian haplotype-based genetic polymorphism discovery and genotyping
source-archive: https://github.com/freebayes/freebayes.git
dependencies:
  - htslib
  - tabixpp
build-dependencies:
  - cmake
  - meson
  - ninja
  - pkgconf
  - simde
  - wfa2-lib
executables:
  - exposure: global executable
    kind: cli
    name: bamleftalign
  - exposure: global executable
    kind: cli
    name: freebayes
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:freebayes
  brew: brew install freebayes
  debian: sudo apt install freebayes
  nix: nix profile install nixpkgs#freebayes
provenance:
  formula: freebayes
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
