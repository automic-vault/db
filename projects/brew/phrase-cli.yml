id: brew:phrase-cli
display-name: phrase-cli
homepage: https://phrase.com/
repo: https://github.com/phrase/phrase-cli
docs: https://phrase.com/
package-manager:
  brew: phrase-cli
  nix: phrase-cli
  winget: Phrase.Phrase
package-manager-url: https://formulae.brew.sh/formula/phrase-cli
version: 2.63.0
license: MIT
category: development
tags:
  - cli
description: Tool to interact with the Phrase API
source-archive: https://github.com/phrase/phrase-cli/archive/refs/tags/2.63.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: phrase
  - exposure: global executable
    kind: cli
    name: phrase-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:phrase-cli
  brew: brew install phrase-cli
  nix: nix profile install nixpkgs#phrase-cli
  winget: winget install --id Phrase.Phrase -e
provenance:
  formula: phrase-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
