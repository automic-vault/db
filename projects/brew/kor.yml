id: brew:kor
display-name: kor
homepage: https://github.com/yonahd/kor
repo: https://github.com/yonahd/kor
docs: https://github.com/yonahd/kor
package-manager:
  brew: kor
  nix: kor
  zypper: kor
package-manager-url: https://formulae.brew.sh/formula/kor
version: 0.6.8
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
description: CLI tool to discover unused Kubernetes resources
source-archive: https://github.com/yonahd/kor/archive/refs/tags/v0.6.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kor
  brew: brew install kor
  nix: nix profile install nixpkgs#kor
  zypper: sudo zypper install kor
provenance:
  formula: kor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
