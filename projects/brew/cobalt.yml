id: brew:cobalt
display-name: cobalt
homepage: https://cobalt-org.github.io/
repo: https://github.com/cobalt-org/cobalt.rs
docs: https://cobalt-org.github.io/
package-manager:
  brew: cobalt
  nix: cobalt
  pacman: cobalt
  scoop: main/cobalt
  winget: cobalt-org.cobalt
package-manager-url: https://formulae.brew.sh/formula/cobalt
version: 0.20.4
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Static site generator written in Rust
source-archive: https://github.com/cobalt-org/cobalt.rs/archive/refs/tags/v0.20.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cobalt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cobalt
  brew: brew install cobalt
  nix: nix profile install nixpkgs#cobalt
  pacman: sudo pacman -S cobalt
  scoop: scoop install main/cobalt
  winget: winget install --id cobalt-org.cobalt -e
provenance:
  formula: cobalt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
