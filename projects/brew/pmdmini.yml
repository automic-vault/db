id: brew:pmdmini
display-name: pmdmini
homepage: https://github.com/mistydemeo/pmdmini
repo: https://github.com/mistydemeo/pmdmini
docs: https://github.com/mistydemeo/pmdmini
package-manager:
  brew: pmdmini
package-manager-url: https://formulae.brew.sh/formula/pmdmini
version: 2.0.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Plays music in PC-88/98 PMD chiptune format
source-archive: https://github.com/mistydemeo/pmdmini/archive/refs/tags/v2.0.0.tar.gz
dependencies:
  - sdl2
executables:
  - exposure: global executable
    kind: cli
    name: pmdplay
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pmdmini
  brew: brew install pmdmini
provenance:
  formula: pmdmini
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
