id: brew:nelm
display-name: nelm
homepage: https://github.com/werf/nelm
repo: https://github.com/werf/nelm
docs: https://github.com/werf/nelm
package-manager:
  brew: nelm
  nix: nelm
  zypper: nelm
package-manager-url: https://formulae.brew.sh/formula/nelm
version: 1.23.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes deployment tool that manages and deploys Helm Charts
source-archive: https://github.com/werf/nelm/archive/refs/tags/v1.23.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nelm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nelm
  brew: brew install nelm
  nix: nix profile install nixpkgs#nelm
  zypper: sudo zypper install nelm
provenance:
  formula: nelm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
