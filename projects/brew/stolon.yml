id: brew:stolon
display-name: stolon
homepage: https://github.com/sorintlab/stolon
repo: https://github.com/sorintlab/stolon
docs: https://github.com/sorintlab/stolon
package-manager:
  brew: stolon
package-manager-url: https://formulae.brew.sh/formula/stolon
version: 0.17.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Cloud native PostgreSQL manager for high availability
source-archive: https://github.com/sorintlab/stolon/archive/refs/tags/v0.17.0.tar.gz
dependencies:
  - libpq
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: stolon-keeper
  - exposure: global executable
    kind: cli
    name: stolon-proxy
  - exposure: global executable
    kind: cli
    name: stolon-sentinel
  - exposure: global executable
    kind: cli
    name: stolonctl
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stolon
  brew: brew install stolon
provenance:
  formula: stolon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
