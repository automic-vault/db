id: brew:c-kermit
display-name: c-kermit
homepage: https://www.kermitproject.org/
repo: https://www.kermitproject.org/ftp/kermit/archives/cku302.tar.gz
docs: https://www.kermitproject.org/
package-manager:
  brew: c-kermit
  macports: kermit
  nix: kermit
package-manager-url: https://formulae.brew.sh/formula/c-kermit
version: 9.0.302
license: BSD-3-Clause
category: network
tags:
  - cli
description: Scriptable network and serial communication for UNIX and VMS
source-archive: https://www.kermitproject.org/ftp/kermit/archives/cku302.tar.gz
uses-from-macos:
  - libxcrypt
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ckermit.ini
  - exposure: global executable
    kind: cli
    name: kermit
  - exposure: global executable
    kind: cli
    name: kermit-sshsub
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:c-kermit
  brew: brew install c-kermit
  macports: sudo port install kermit
  nix: nix profile install nixpkgs#kermit
provenance:
  formula: c-kermit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
