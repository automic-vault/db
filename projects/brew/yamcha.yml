id: brew:yamcha
display-name: yamcha
homepage: http://chasen.org/~taku/software/yamcha/
repo: https://deb.debian.org/debian/pool/main/y/yamcha/yamcha_0.33.orig.tar.gz
docs: http://chasen.org/~taku/software/yamcha/
package-manager:
  brew: yamcha
  macports: yamcha
