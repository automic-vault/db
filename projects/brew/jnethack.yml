id: brew:jnethack
display-name: jnethack
homepage: https://github.com/jnethack/jnethack-release
repo: https://github.com/jnethack/jnethack-release
docs: https://github.com/jnethack/jnethack-release
package-manager:
  brew: jnethack
  macports: jnethack
package-manager-url: https://formulae.brew.sh/formula/jnethack
version: 3.6.7-0.1
license: NGPL
category: development
tags:
  - cli
description: Japanese localization of NetHack
source-archive: https://github.com/jnethack/jnethack-release.git
build-dependencies:
  - nkf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: jnethack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:jnethack
  brew: brew install jnethack
  macports: sudo port install jnethack
provenance:
  formula: jnethack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
