id: brew:qodem
display-name: qodem
homepage: https://qodem.sourceforge.io/
repo: https://downloads.sourceforge.net/project/qodem/qodem/1.0.1/qodem-1.0.1.tar.gz
docs: https://qodem.sourceforge.io/
package-manager:
  brew: qodem
  macports: qodem
  nix: qodem
  zypper: qodem
package-manager-url: https://formulae.brew.sh/formula/qodem
version: 1.0.1
license: LicenseRef-Homebrew-public-domain
category: network
tags:
  - cli
description: Terminal emulator and BBS client
source-archive: https://downloads.sourceforge.net/project/qodem/qodem/1.0.1/qodem-1.0.1.tar.gz
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: qodem
  - exposure: global executable
    kind: cli
    name: xqodem
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qodem
  brew: brew install qodem
  macports: sudo port install qodem
  nix: nix profile install nixpkgs#qodem
  zypper: sudo zypper install qodem
provenance:
  formula: qodem
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
