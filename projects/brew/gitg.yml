id: brew:gitg
display-name: gitg
homepage: https://wiki.gnome.org/Apps/Gitg
repo: https://download.gnome.org/sources/gitg/44/gitg-44.tar.xz
docs: https://wiki.gnome.org/Apps/Gitg
package-manager:
  apk: gitg
  brew: gitg
  debian: gitg
  dnf: gitg
  macports: gitg
  nix: gitg
  pacman: gitg
  ubuntu: gitg
  winget: gnome.gitg
  zypper: gitg
package-manager-url: https://formulae.brew.sh/formula/gitg
version: 44
license: GPL-2.0-or-later
category: development
tags:
  - cli
  - git
description: GNOME GUI client to view git repositories
source-archive: https://download.gnome.org/sources/gitg/44/gitg-44.tar.xz
dependencies:
  - adwaita-icon-theme
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gobject-introspection
  - gpgme
  - gspell
  - gtk+3
  - gtksourceview4
  - hicolor-icon-theme
  - json-glib
  - libdazzle
  - libgee
  - libgit2
  - libgit2-glib
  - libhandy
  - libpeas@1
  - libsecret
  - pango
build-dependencies:
  - gettext
  - meson
  - ninja
  - pkgconf
  - vala
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: gitg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add gitg
  av: sudo av install brew:gitg
  brew: brew install gitg
  debian: sudo apt install gitg
  dnf: sudo dnf install gitg
  macports: sudo port install gitg
  nix: nix profile install nixpkgs#gitg
  pacman: sudo pacman -S gitg
  ubuntu: sudo apt install gitg
  winget: winget install --id gnome.gitg -e
  zypper: sudo zypper install gitg
provenance:
  formula: gitg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
