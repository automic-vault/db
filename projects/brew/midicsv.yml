id: brew:midicsv
display-name: midicsv
homepage: https://www.fourmilab.ch/webtools/midicsv/
repo: https://www.fourmilab.ch/webtools/midicsv/midicsv-1.1.tar.gz
docs: https://www.fourmilab.ch/webtools/midicsv/
package-manager:
  brew: midicsv
  debian: midicsv
  nix: midicsv
  scoop: extras/midicsv
  ubuntu: midicsv
package-manager-url: https://formulae.brew.sh/formula/midicsv
version: 1.1
license: LicenseRef-Homebrew-public-domain
category: development
tags:
  - cli
description: Convert MIDI audio files to human-readable CSV format
source-archive: https://www.fourmilab.ch/webtools/midicsv/midicsv-1.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: csvmidi
  - exposure: global executable
    kind: cli
    name: midicsv
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:midicsv
  brew: brew install midicsv
  debian: sudo apt install midicsv
  nix: nix profile install nixpkgs#midicsv
  scoop: scoop install extras/midicsv
  ubuntu: sudo apt install midicsv
provenance:
  formula: midicsv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
