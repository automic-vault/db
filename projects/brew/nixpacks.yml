id: brew:nixpacks
display-name: nixpacks
homepage: https://nixpacks.com/docs/getting-started
repo: https://github.com/railwayapp/nixpacks
docs: https://nixpacks.com/docs/getting-started
package-manager:
  brew: nixpacks
  macports: nixpacks
  nix: nixpacks
  scoop: main/nixpacks
package-manager-url: https://formulae.brew.sh/formula/nixpacks
version: 1.41.0
license: MIT
category: development
tags:
  - cli
  - docker
description: App source + Nix packages + Docker = Image
source-archive: https://github.com/railwayapp/nixpacks/archive/refs/tags/v1.41.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: nixpacks
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nixpacks
  brew: brew install nixpacks
  macports: sudo port install nixpacks
  nix: nix profile install nixpkgs#nixpacks
  scoop: scoop install main/nixpacks
provenance:
  formula: nixpacks
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
