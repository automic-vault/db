id: brew:lspmux
display-name: lspmux
homepage: https://codeberg.org/p2502/lspmux
repo: https://codeberg.org/p2502/lspmux/archive/v0.3.0.tar.gz
docs: https://codeberg.org/p2502/lspmux
package-manager:
  apk: lspmux
  brew: lspmux
  nix: lspmux
package-manager-url: https://formulae.brew.sh/formula/lspmux
version: 0.3.0
license: EUPL-1.2
category: development
tags:
  - cli
description: Share one language instance between multiple LSP clients to save resources
source-archive: https://codeberg.org/p2502/lspmux/archive/v0.3.0.tar.gz
dependencies:
  - rust-analyzer
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: lspmux
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add lspmux
  av: sudo av install brew:lspmux
  brew: brew install lspmux
  nix: nix profile install nixpkgs#lspmux
provenance:
  formula: lspmux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
