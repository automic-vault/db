id: brew:nspr
display-name: nspr
homepage: https://hg.mozilla.org/projects/nspr
repo: https://archive.mozilla.org/pub/nspr/releases/v4.39/src/nspr-4.39.tar.gz
docs: https://hg.mozilla.org/projects/nspr
package-manager:
  apk: nspr
  brew: nspr
  dnf: nspr
  macports: nspr
  nix: nspr
  pacman: nspr
package-manager-url: https://formulae.brew.sh/formula/nspr
version: 4.39
license: MPL-2.0
category: network
tags:
  - cli
description: Platform-neutral API for system-level and libc-like functions
source-archive: https://archive.mozilla.org/pub/nspr/releases/v4.39/src/nspr-4.39.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: nspr-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nspr
  av: sudo av install brew:nspr
  brew: brew install nspr
  dnf: sudo dnf install nspr
  macports: sudo port install nspr
  nix: nix profile install nixpkgs#nspr
  pacman: sudo pacman -S nspr
provenance:
  formula: nspr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
