id: brew:gnu-prolog
display-name: gnu-prolog
homepage: http://www.gprolog.org/
repo: https://ftpmirror.gnu.org/gnu/gprolog/gprolog-1.5.0.tar.gz
docs: http://www.gprolog.org/
package-manager:
  brew: gnu-prolog
  debian: gprolog
  dnf: gprolog
  macports: gprolog
  nix: gprolog
  ubuntu: gprolog
package-manager-url: https://formulae.brew.sh/formula/gnu-prolog
version: 1.5.0
license: LGPL-3.0-or-later OR GPL-2.0-or-later
category: development
tags:
  - cli
description: Prolog compiler with constraint solving
source-archive: https://ftpmirror.gnu.org/gnu/gprolog/gprolog-1.5.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: fd2c
  - exposure: global executable
    kind: cli
    name: gplc
  - exposure: global executable
    kind: cli
    name: gprolog
  - exposure: global executable
    kind: cli
    name: hexgplc
  - exposure: global executable
    kind: cli
    name: ma2asm
  - exposure: global executable
    kind: cli
    name: pl2wam
  - exposure: global executable
    kind: cli
    name: wam2ma
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gnu-prolog
  brew: brew install gnu-prolog
  debian: sudo apt install gprolog
  dnf: sudo dnf install gprolog
  macports: sudo port install gprolog
  nix: nix profile install nixpkgs#gprolog
  ubuntu: sudo apt install gprolog
provenance:
  formula: gnu-prolog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
