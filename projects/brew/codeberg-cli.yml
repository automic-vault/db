id: brew:codeberg-cli
display-name: codeberg-cli
homepage: https://codeberg.org/Aviac/codeberg-cli
repo: https://codeberg.org/Aviac/codeberg-cli/archive/v0.5.5.tar.gz
docs: https://codeberg.org/Aviac/codeberg-cli
package-manager:
  apk: codeberg-cli
  brew: codeberg-cli
  nix: codeberg-cli
package-manager-url: https://formulae.brew.sh/formula/codeberg-cli
version: 0.5.5
license: AGPL-3.0-or-later
category: network
tags:
  - cli
description: CLI for Codeberg
source-archive: https://codeberg.org/Aviac/codeberg-cli/archive/v0.5.5.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: berg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add codeberg-cli
  av: sudo av install brew:codeberg-cli
  brew: brew install codeberg-cli
  nix: nix profile install nixpkgs#codeberg-cli
provenance:
  formula: codeberg-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
