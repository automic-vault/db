id: brew:hub-tool
display-name: hub-tool
homepage: https://github.com/docker/hub-tool
repo: https://github.com/docker/hub-tool
docs: https://github.com/docker/hub-tool
package-manager:
  brew: hub-tool
  scoop: extras/hub-tool
package-manager-url: https://formulae.brew.sh/formula/hub-tool
version: 04.6
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: Docker Hub experimental CLI tool
source-archive: https://github.com/docker/hub-tool/archive/refs/tags/v04.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hub-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hub-tool
  brew: brew install hub-tool
  scoop: scoop install extras/hub-tool
provenance:
  formula: hub-tool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
