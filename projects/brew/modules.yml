id: brew:modules
display-name: modules
homepage: https://modules.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/modules/Modules/modules-5.6.1/modules-5.6.1.tar.bz2
docs: https://modules.sourceforge.net/
package-manager:
  brew: modules
  zypper: Modules
package-manager-url: https://formulae.brew.sh/formula/modules
version: 5.6.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Dynamic modification of a user's environment via modulefiles
source-archive: >
  https://downloads.sourceforge.net/project/modules/Modules/modules-5.6.1/modules-5.6.1.tar.bz2
dependencies:
  - tcl-tk
uses-from-macos:
  - less
executables:
  - exposure: global executable
    kind: cli
    name: add.modules
  - exposure: global executable
    kind: cli
    name: envml
  - exposure: global executable
    kind: cli
    name: mkroot
  - exposure: global executable
    kind: cli
    name: modulecmd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To activate modules, add the following at the end of your .zshrc: source
    $HOMEBREW_PREFIX/opt/modules/init/zsh You will also need to restart your terminal
    for this change to take effect.
  post-install-defined: false
install-lines:
  av: sudo av install brew:modules
  brew: brew install modules
  zypper: sudo zypper install Modules
provenance:
  formula: modules
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
