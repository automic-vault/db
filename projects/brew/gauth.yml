id: brew:gauth
display-name: gauth
homepage: https://github.com/pcarrier/gauth
repo: https://github.com/pcarrier/gauth
docs: https://github.com/pcarrier/gauth
package-manager:
  apk: gauth
  brew: gauth
package-manager-url: https://formulae.brew.sh/formula/gauth
version: 1.5.0
license: ISC
category: development
tags:
  - cli
description: Google Authenticator in your terminal
source-archive: https://github.com/pcarrier/gauth/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gauth
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gauth
  av: sudo av install brew:gauth
  brew: brew install gauth
provenance:
  formula: gauth
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
