id: brew:cbindgen
display-name: cbindgen
homepage: https://github.com/mozilla/cbindgen
repo: https://github.com/mozilla/cbindgen
docs: https://github.com/mozilla/cbindgen
package-manager:
  apk: cbindgen
  brew: cbindgen
  debian: cbindgen
  dnf: cbindgen
  macports: cbindgen
  pacman: cbindgen
  ubuntu: cbindgen
package-manager-url: https://formulae.brew.sh/formula/cbindgen
version: 0.29.2
license: MPL-2.0
category: development
tags:
  - cli
description: Project for generating C bindings from Rust code
source-archive: https://github.com/mozilla/cbindgen/archive/refs/tags/v0.29.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cbindgen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cbindgen
  av: sudo av install brew:cbindgen
  brew: brew install cbindgen
  debian: sudo apt install cbindgen
  dnf: sudo dnf install cbindgen
  macports: sudo port install cbindgen
  pacman: sudo pacman -S cbindgen
  ubuntu: sudo apt install cbindgen
provenance:
  formula: cbindgen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
