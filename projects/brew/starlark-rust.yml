id: brew:starlark-rust
display-name: starlark-rust
homepage: https://github.com/facebook/starlark-rust
repo: https://github.com/facebook/starlark-rust
docs: https://github.com/facebook/starlark-rust
package-manager:
  brew: starlark-rust
  nix: starlark-rust
package-manager-url: https://formulae.brew.sh/formula/starlark-rust
version: 0.13.0
license: Apache-2.0
category: development
tags:
  - cli
description: Rust implementation of the Starlark language
source-archive: https://github.com/facebook/starlark-rust/archive/refs/tags/v0.13.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: starlark
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:starlark-rust
  brew: brew install starlark-rust
  nix: nix profile install nixpkgs#starlark-rust
provenance:
  formula: starlark-rust
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
