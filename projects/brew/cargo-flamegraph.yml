id: brew:cargo-flamegraph
display-name: cargo-flamegraph
homepage: https://github.com/flamegraph-rs/flamegraph
repo: https://github.com/flamegraph-rs/flamegraph
docs: https://github.com/flamegraph-rs/flamegraph
package-manager:
  apk: cargo-flamegraph
  brew: cargo-flamegraph
  dnf: flamegraph
  macports: flamegraph
  nix: cargo-flamegraph
  pacman: cargo-flamegraph
package-manager-url: https://formulae.brew.sh/formula/cargo-flamegraph
version: 0.6.12
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Easy flamegraphs for Rust projects and everything else
source-archive: https://github.com/flamegraph-rs/flamegraph/archive/refs/tags/v0.6.12.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-flamegraph
  - exposure: global executable
    kind: cli
    name: flamegraph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-flamegraph
  av: sudo av install brew:cargo-flamegraph
  brew: brew install cargo-flamegraph
  dnf: sudo dnf install flamegraph
  macports: sudo port install flamegraph
  nix: nix profile install nixpkgs#cargo-flamegraph
  pacman: sudo pacman -S cargo-flamegraph
provenance:
  formula: cargo-flamegraph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
