id: brew:libsepol
display-name: libsepol
homepage: https://github.com/SELinuxProject/selinux
repo: https://github.com/SELinuxProject/selinux
docs: https://github.com/SELinuxProject/selinux
package-manager:
  apk: libsepol
  brew: libsepol
  dnf: libsepol
  nix: libsepol
package-manager-url: https://formulae.brew.sh/formula/libsepol
version: 3.10
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: SELinux binary policy manipulation library
source-archive: https://github.com/SELinuxProject/selinux/releases/download/3.10/libsepol-3.10.tar.gz
build-dependencies:
  - coreutils
executables:
  - exposure: global executable
    kind: cli
    name: chkcon
  - exposure: global executable
    kind: cli
    name: sepol_check_access
  - exposure: global executable
    kind: cli
    name: sepol_compute_av
  - exposure: global executable
    kind: cli
    name: sepol_compute_member
  - exposure: global executable
    kind: cli
    name: sepol_compute_relabel
  - exposure: global executable
    kind: cli
    name: sepol_validate_transition
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libsepol
  av: sudo av install brew:libsepol
  brew: brew install libsepol
  dnf: sudo dnf install libsepol
  nix: nix profile install nixpkgs#libsepol
provenance:
  formula: libsepol
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
