id: brew:lsof
display-name: lsof
homepage: https://github.com/lsof-org/lsof
repo: https://github.com/lsof-org/lsof
docs: https://github.com/lsof-org/lsof
package-manager:
  apk: lsof
  brew: lsof
  debian: lsof
  dnf: lsof
  nix: lsof
  pacman: lsof
  ubuntu: lsof
  zypper: lsof
package-manager-url: https://formulae.brew.sh/formula/lsof
version: 4.99.6
license: lsof
category: development
tags:
  - cli
description: Utility to list open files
source-archive: https://github.com/lsof-org/lsof/archive/refs/tags/4.99.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lsof
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lsof
  av: sudo av install brew:lsof
  brew: brew install lsof
  debian: sudo apt install lsof
  dnf: sudo dnf install lsof
  nix: nix profile install nixpkgs#lsof
  pacman: sudo pacman -S lsof
  ubuntu: sudo apt install lsof
  zypper: sudo zypper install lsof
provenance:
  formula: lsof
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
