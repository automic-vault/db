id: brew:gron
display-name: gron
homepage: https://github.com/tomnomnom/gron
repo: https://github.com/tomnomnom/gron
docs: https://github.com/tomnomnom/gron
package-manager:
  apk: gron
  brew: gron
  debian: gron
  macports: gron
  nix: gron
  pacman: gron
  scoop: main/gron
  ubuntu: gron
  winget: TomHudson.gron
  zypper: gron
package-manager-url: https://formulae.brew.sh/formula/gron
version: 0.7.1
license: MIT
category: development
tags:
  - cli
  - json
description: Make JSON greppable
source-archive: https://github.com/tomnomnom/gron/archive/refs/tags/v0.7.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gron
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gron
  av: sudo av install brew:gron
  brew: brew install gron
  debian: sudo apt install gron
  macports: sudo port install gron
  nix: nix profile install nixpkgs#gron
  pacman: sudo pacman -S gron
  scoop: scoop install main/gron
  ubuntu: sudo apt install gron
  winget: winget install --id TomHudson.gron -e
  zypper: sudo zypper install gron
provenance:
  formula: gron
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
