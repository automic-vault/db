id: brew:miniupnpc
display-name: miniupnpc
homepage: https://miniupnp.tuxfamily.org
repo: https://miniupnp.tuxfamily.org/files/download.php?file=miniupnpc-2.3.3.tar.gz
docs: https://miniupnp.tuxfamily.org
package-manager:
  apk: miniupnpc
  brew: miniupnpc
  debian: miniupnpc
  dnf: miniupnpc
  macports: miniupnpc
  nix: miniupnpc
  pacman: miniupnpc
  ubuntu: miniupnpc
  zypper: miniupnpc
package-manager-url: https://formulae.brew.sh/formula/miniupnpc
version: 2.3.3
license: BSD-3-Clause
category: network
tags:
  - cli
description: UPnP IGD client library and daemon
source-archive: https://miniupnp.tuxfamily.org/files/download.php?file=miniupnpc-2.3.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: external-ip
  - exposure: global executable
    kind: cli
    name: upnp-listdevices
  - exposure: global executable
    kind: cli
    name: upnpc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add miniupnpc
  av: sudo av install brew:miniupnpc
  brew: brew install miniupnpc
  debian: sudo apt install miniupnpc
  dnf: sudo dnf install miniupnpc
  macports: sudo port install miniupnpc
  nix: nix profile install nixpkgs#miniupnpc
  pacman: sudo pacman -S miniupnpc
  ubuntu: sudo apt install miniupnpc
  zypper: sudo zypper install miniupnpc
provenance:
  formula: miniupnpc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
