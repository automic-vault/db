id: brew:glooctl
display-name: glooctl
homepage: https://docs.solo.io/gloo-edge/main/reference/cli/glooctl/
repo: https://github.com/solo-io/gloo
docs: https://docs.solo.io/gloo-edge/main/reference/cli/glooctl/
package-manager:
  brew: glooctl
  nix: glooctl
package-manager-url: https://formulae.brew.sh/formula/glooctl
version: 1.21.6
license: Apache-2.0
category: development
tags:
  - cli
description: Envoy-Powered API Gateway
source-archive: https://github.com/solo-io/gloo/archive/refs/tags/v1.21.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: glooctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:glooctl
  brew: brew install glooctl
  nix: nix profile install nixpkgs#glooctl
provenance:
  formula: glooctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
