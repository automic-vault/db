id: brew:lux
display-name: lux
homepage: https://github.com/iawia002/lux
repo: https://github.com/iawia002/lux
docs: https://github.com/iawia002/lux
package-manager:
  brew: lux
  macports: lux
  nix: lux
  scoop: main/lux
  winget: JackDevey.Lux
  zypper: lux
package-manager-url: https://formulae.brew.sh/formula/lux
version: 0.24.1
license: MIT
category: development
tags:
  - cli
description: Fast and simple video downloader
source-archive: https://github.com/iawia002/lux/archive/refs/tags/v0.24.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lux
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lux
  brew: brew install lux
  macports: sudo port install lux
  nix: nix profile install nixpkgs#lux
  scoop: scoop install main/lux
  winget: winget install --id JackDevey.Lux -e
  zypper: sudo zypper install lux
provenance:
  formula: lux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
