id: brew:fltk
display-name: fltk
homepage: https://www.fltk.org/
repo: https://github.com/fltk/fltk
docs: https://www.fltk.org/
package-manager:
  apk: fltk
  brew: fltk
  debian: fltk-options
  dnf: fltk
  macports: fltk
  nix: fltk
  pacman: fltk
  ubuntu: fluid
package-manager-url: https://formulae.brew.sh/formula/fltk
version: 1.4.5
license: LGPL-2.0-only WITH FLTK-exception
category: development
tags:
  - cli
description: Cross-platform C++ GUI toolkit
source-archive: https://github.com/fltk/fltk/releases/download/release-1.4.5/fltk-1.4.5-source.tar.bz2
dependencies:
  - jpeg-turbo
  - libpng
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fltk-config
  - exposure: global executable
    kind: cli
    name: fltk-options
  - exposure: global executable
    kind: cli
    name: fluid
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fltk
  av: sudo av install brew:fltk
  brew: brew install fltk
  debian: sudo apt install fltk-options
  dnf: sudo dnf install fltk
  macports: sudo port install fltk
  nix: nix profile install nixpkgs#fltk
  pacman: sudo pacman -S fltk
  ubuntu: sudo apt install fluid
provenance:
  formula: fltk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
