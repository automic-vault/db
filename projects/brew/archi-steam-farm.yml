id: brew:archi-steam-farm
display-name: archi-steam-farm
homepage: https://github.com/JustArchiNET/ArchiSteamFarm
repo: https://github.com/JustArchiNET/ArchiSteamFarm
docs: https://github.com/JustArchiNET/ArchiSteamFarm
package-manager:
  brew: archi-steam-farm
  winget: JustArchiNET.ArchiSteamFarm
package-manager-url: https://formulae.brew.sh/formula/archi-steam-farm
version: 6.3.5.1
license: Apache-2.0
category: development
tags:
  - cli
description: Application for idling Steam cards from multiple accounts simultaneously
source-archive: https://github.com/JustArchiNET/ArchiSteamFarm.git
dependencies:
  - dotnet
build-dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: asf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: ASF config files should be placed under $HOMEBREW_PREFIX/etc/asf/.
  post-install-defined: false
install-lines:
  av: sudo av install brew:archi-steam-farm
  brew: brew install archi-steam-farm
  winget: winget install --id JustArchiNET.ArchiSteamFarm -e
provenance:
  formula: archi-steam-farm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
