id: brew:libbladerf
display-name: libbladerf
homepage: https://nuand.com/
repo: https://github.com/Nuand/bladeRF
docs: https://nuand.com/
package-manager:
  brew: libbladerf
  nix: libbladeRF
package-manager-url: https://formulae.brew.sh/formula/libbladerf
version: 2025.10
license: GPL-2.0-or-later AND LGPL-2.1-or-later AND MIT
category: development
tags:
  - cli
description: USB 3.0 Superspeed Software Defined Radio Source
source-archive: https://github.com/Nuand/bladeRF.git
dependencies:
  - libusb
  - ncurses
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - curl
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: bladeRF-cli
  - exposure: global executable
    kind: cli
    name: bladeRF-fsk
  - exposure: global executable
    kind: cli
    name: bladeRF-power
  - exposure: global executable
    kind: cli
    name: bladeRF-update
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libbladerf
  brew: brew install libbladerf
  nix: nix profile install nixpkgs#libbladeRF
provenance:
  formula: libbladerf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
