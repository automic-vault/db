id: brew:sqlx-cli
display-name: sqlx-cli
homepage: https://github.com/launchbadge/sqlx
repo: https://github.com/launchbadge/sqlx
docs: https://github.com/launchbadge/sqlx
package-manager:
  apk: cargo-sqlx
  brew: sqlx-cli
  nix: sqlx-cli
  pacman: sqlx-cli
package-manager-url: https://formulae.brew.sh/formula/sqlx-cli
version: 0.9.0
license: Apache-2.0 OR MIT
category: database
tags:
  - cli
description: Command-line utility for SQLx, the Rust SQL toolkit
source-archive: https://github.com/launchbadge/sqlx/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-sqlx
  - exposure: global executable
    kind: cli
    name: sqlx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-sqlx
  av: sudo av install brew:sqlx-cli
  brew: brew install sqlx-cli
  nix: nix profile install nixpkgs#sqlx-cli
  pacman: sudo pacman -S sqlx-cli
provenance:
  formula: sqlx-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
