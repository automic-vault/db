id: brew:stackql
display-name: stackql
homepage: https://stackql.io/
repo: https://github.com/stackql/stackql
docs: https://stackql.io/
package-manager:
  brew: stackql
  nix: stackql
package-manager-url: https://formulae.brew.sh/formula/stackql
version: 0.10.474
license: MIT
category: database
tags:
  - cli
description: SQL interface for arbitrary resources with full CRUD support
source-archive: https://github.com/stackql/stackql/archive/refs/tags/v0.10.474.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: stackql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stackql
  brew: brew install stackql
  nix: nix profile install nixpkgs#stackql
provenance:
  formula: stackql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
