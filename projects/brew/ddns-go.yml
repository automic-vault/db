id: brew:ddns-go
display-name: ddns-go
homepage: https://github.com/jeessy2/ddns-go
repo: https://github.com/jeessy2/ddns-go
docs: https://github.com/jeessy2/ddns-go
package-manager:
  brew: ddns-go
  nix: ddns-go
  scoop: extras/ddns-go
package-manager-url: https://formulae.brew.sh/formula/ddns-go
version: 6.17.0
license: MIT
category: development
tags:
  - cli
description: Simple and easy-to-use DDNS
source-archive: https://github.com/jeessy2/ddns-go/archive/refs/tags/v6.17.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ddns-go
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ddns-go
  brew: brew install ddns-go
  nix: nix profile install nixpkgs#ddns-go
  scoop: scoop install extras/ddns-go
provenance:
  formula: ddns-go
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
