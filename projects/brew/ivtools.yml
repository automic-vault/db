id: brew:ivtools
display-name: ivtools
homepage: https://github.com/vectaport/ivtools
repo: https://github.com/vectaport/ivtools
docs: https://github.com/vectaport/ivtools
package-manager:
  brew: ivtools
  debian: dclock
  macports: ivtools
  nix: dclock
  ubuntu: dclock
package-manager-url: https://formulae.brew.sh/formula/ivtools
version: 2.1.1
license: MIT
category: development
tags:
  - cli
description: X11 vector graphic servers
source-archive: https://github.com/vectaport/ivtools/archive/refs/tags/ivtools-2.1.1.tar.gz
dependencies:
  - ace
  - libx11
  - libxext
executables:
  - exposure: global executable
    kind: cli
    name: comdraw
  - exposure: global executable
    kind: cli
    name: comterp
  - exposure: global executable
    kind: cli
    name: comterp_run
  - exposure: global executable
    kind: cli
    name: comtest
  - exposure: global executable
    kind: cli
    name: csvfilt
  - exposure: global executable
    kind: cli
    name: dclock
  - exposure: global executable
    kind: cli
    name: drawserv
  - exposure: global executable
    kind: cli
    name: drawtool
  - exposure: global executable
    kind: cli
    name: flipbook
  - exposure: global executable
    kind: cli
    name: gclock
  - exposure: global executable
    kind: cli
    name: glyphterp
  - exposure: global executable
    kind: cli
    name: graphdraw
  - exposure: global executable
    kind: cli
    name: iclass
  - exposure: global executable
    kind: cli
    name: idemo
  - exposure: global executable
    kind: cli
    name: idraw
  - exposure: global executable
    kind: cli
    name: ivgetjpg
  - exposure: global executable
    kind: cli
    name: ivtext
  - exposure: global executable
    kind: cli
    name: ivtiftopnm
  - exposure: global executable
    kind: cli
    name: stdcmapppm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ivtools
  brew: brew install ivtools
  debian: sudo apt install dclock
  macports: sudo port install ivtools
  nix: nix profile install nixpkgs#dclock
  ubuntu: sudo apt install dclock
provenance:
  formula: ivtools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
