id: brew:xinput
display-name: xinput
homepage: https://gitlab.freedesktop.org/xorg/app/xinput
repo: https://www.x.org/pub/individual/app/xinput-1.6.4.tar.xz
docs: https://gitlab.freedesktop.org/xorg/app/xinput
package-manager:
  apk: xinput
  brew: xinput
  debian: xinput
  dnf: xinput
  macports: xinput
  nix: xinput
  ubuntu: xinput
  zypper: xinput
package-manager-url: https://formulae.brew.sh/formula/xinput
version: 1.6.4
license: MIT
category: development
tags:
  - cli
description: Utility to configure and test X input devices
source-archive: https://www.x.org/pub/individual/app/xinput-1.6.4.tar.xz
dependencies:
  - libx11
  - libxext
  - libxi
  - libxinerama
  - libxrandr
build-dependencies:
  - pkgconf
  - xorgproto
executables:
  - exposure: global executable
    kind: cli
    name: xinput
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xinput
  av: sudo av install brew:xinput
  brew: brew install xinput
  debian: sudo apt install xinput
  dnf: sudo dnf install xinput
  macports: sudo port install xinput
  nix: nix profile install nixpkgs#xinput
  ubuntu: sudo apt install xinput
  zypper: sudo zypper install xinput
provenance:
  formula: xinput
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
