id: brew:hydra
display-name: hydra
homepage: https://github.com/vanhauser-thc/thc-hydra
repo: https://github.com/vanhauser-thc/thc-hydra
docs: https://github.com/vanhauser-thc/thc-hydra
package-manager:
  apk: hydra
  brew: hydra
  debian: hydra
  dnf: hydra
  macports: hydra
  nix: hydra
  pacman: hydra
  ubuntu: hydra
  winget: HydraLauncher.Hydra
  zypper: hydra
package-manager-url: https://formulae.brew.sh/formula/hydra
version: 9.6
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Network logon cracker which supports many services
source-archive: https://github.com/vanhauser-thc/thc-hydra/archive/refs/tags/v9.6.tar.gz
dependencies:
  - libssh
  - mariadb-connector-c
  - openssl@3
  - pcre2
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: dpl4hydra.sh
  - exposure: global executable
    kind: cli
    name: hydra
  - exposure: global executable
    kind: cli
    name: hydra-wizard.sh
  - exposure: global executable
    kind: cli
    name: pw-inspector
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hydra
  av: sudo av install brew:hydra
  brew: brew install hydra
  debian: sudo apt install hydra
  dnf: sudo dnf install hydra
  macports: sudo port install hydra
  nix: nix profile install nixpkgs#hydra
  pacman: sudo pacman -S hydra
  ubuntu: sudo apt install hydra
  winget: winget install --id HydraLauncher.Hydra -e
  zypper: sudo zypper install hydra
provenance:
  formula: hydra
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
