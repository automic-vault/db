id: brew:timoni
display-name: timoni
homepage: https://timoni.sh/
repo: https://github.com/stefanprodan/timoni
docs: https://timoni.sh/
package-manager:
  apk: timoni
  brew: timoni
  macports: timoni
  nix: timoni
  scoop: main/timoni
  winget: stefanprodan.timoni
  zypper: timoni
package-manager-url: https://formulae.brew.sh/formula/timoni
version: 0.26.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Package manager for Kubernetes, powered by CUE and inspired by Helm
source-archive: https://github.com/stefanprodan/timoni/archive/refs/tags/v0.26.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: timoni
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add timoni
  av: sudo av install brew:timoni
  brew: brew install timoni
  macports: sudo port install timoni
  nix: nix profile install nixpkgs#timoni
  scoop: scoop install main/timoni
  winget: winget install --id stefanprodan.timoni -e
  zypper: sudo zypper install timoni
provenance:
  formula: timoni
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
