id: brew:lando-cli
display-name: lando-cli
homepage: https://docs.lando.dev/cli
repo: https://github.com/lando/core
docs: https://docs.lando.dev/cli
package-manager:
  brew: lando-cli
  winget: Lando.Lando
package-manager-url: https://formulae.brew.sh/formula/lando-cli
version: 3.26.4
license: MIT
category: development
tags:
  - cli
description: Cli part of Lando
source-archive: https://github.com/lando/core/archive/refs/tags/v3.26.4.tar.gz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: lando
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'To complete the installation: lando setup'
  post-install-defined: false
install-lines:
  av: sudo av install brew:lando-cli
  brew: brew install lando-cli
  winget: winget install --id Lando.Lando -e
provenance:
  formula: lando-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
