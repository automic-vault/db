id: brew:aliae
display-name: aliae
homepage: https://aliae.dev
repo: https://github.com/jandedobbeleer/aliae
docs: https://aliae.dev
package-manager:
  brew: aliae
  nix: aliae
  winget: JanDeDobbeleer.Aliae
package-manager-url: https://formulae.brew.sh/formula/aliae
version: 0.26.6
license: MIT
category: development
tags:
  - cli
description: Cross shell and platform alias management
source-archive: https://github.com/jandedobbeleer/aliae/archive/refs/tags/v0.26.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aliae
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aliae
  brew: brew install aliae
  nix: nix profile install nixpkgs#aliae
  winget: winget install --id JanDeDobbeleer.Aliae -e
provenance:
  formula: aliae
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
