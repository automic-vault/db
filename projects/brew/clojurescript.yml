id: brew:clojurescript
display-name: clojurescript
homepage: https://github.com/clojure/clojurescript
repo: https://github.com/clojure/clojurescript
docs: https://github.com/clojure/clojurescript
package-manager:
  brew: clojurescript
package-manager-url: https://formulae.brew.sh/formula/clojurescript
version: 1.12.134
license: EPL-1.0
category: development
tags:
  - cli
description: Clojure to JS compiler
source-archive: https://github.com/clojure/clojurescript/releases/download/r1.12.134/cljs.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: cljsc
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This formula is useful if you need to use the ClojureScript compiler directly. For a
    more integrated workflow use Leiningen, Boot, or Maven.
  post-install-defined: false
install-lines:
  av: sudo av install brew:clojurescript
  brew: brew install clojurescript
provenance:
  formula: clojurescript
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
