id: brew:mage
display-name: mage
homepage: https://magefile.org
repo: https://github.com/magefile/mage
docs: https://magefile.org
package-manager:
  apk: mage
  brew: mage
  debian: mage
  macports: mage
  nix: mage
  pacman: mage
  scoop: main/mage
  winget: Magefile.mage
  zypper: mage
package-manager-url: https://formulae.brew.sh/formula/mage
version: 1.17.2
license: Apache-2.0
category: development
tags:
  - cli
description: Make/rake-like build tool using Go
source-archive: https://github.com/magefile/mage.git
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mage
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mage
  av: sudo av install brew:mage
  brew: brew install mage
  debian: sudo apt install mage
  macports: sudo port install mage
  nix: nix profile install nixpkgs#mage
  pacman: sudo pacman -S mage
  scoop: scoop install main/mage
  winget: winget install --id Magefile.mage -e
  zypper: sudo zypper install mage
provenance:
  formula: mage
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
