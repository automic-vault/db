id: brew:cf-terraforming
display-name: cf-terraforming
homepage: https://github.com/cloudflare/cf-terraforming
repo: https://github.com/cloudflare/cf-terraforming
docs: https://github.com/cloudflare/cf-terraforming
package-manager:
  brew: cf-terraforming
  nix: cf-terraforming
package-manager-url: https://formulae.brew.sh/formula/cf-terraforming
version: 0.27.0
license: MPL-2.0
category: cloud
tags:
  - cli
description: CLI to facilitate terraforming your existing Cloudflare resources
source-archive: https://github.com/cloudflare/cf-terraforming/archive/refs/tags/v0.27.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cf-terraforming
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cf-terraforming
  brew: brew install cf-terraforming
  nix: nix profile install nixpkgs#cf-terraforming
provenance:
  formula: cf-terraforming
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
