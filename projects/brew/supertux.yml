id: brew:supertux
display-name: supertux
homepage: https://www.supertux.org/
repo: https://github.com/SuperTux/supertux
docs: https://www.supertux.org/
package-manager:
  apk: supertux
  brew: supertux
  debian: supertux
  dnf: supertux
  macports: supertux
  nix: supertux
  pacman: supertux
  ubuntu: supertux
  winget: SuperTux.SuperTux
  zypper: supertux2
package-manager-url: https://formulae.brew.sh/formula/supertux
version: 0.7.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Classic 2D jump'n run sidescroller game
source-archive: >
  https://github.com/SuperTux/supertux/releases/download/v0.7.0/SuperTux-v0.7.0-Source.tar.gz
dependencies:
  - fmt
  - freetype
  - glew
  - glm
  - libogg
  - libpng
  - libvorbis
  - openal-soft
  - physfs
  - sdl2
  - sdl2_image
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: supertux2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add supertux
  av: sudo av install brew:supertux
  brew: brew install supertux
  debian: sudo apt install supertux
  dnf: sudo dnf install supertux
  macports: sudo port install supertux
  nix: nix profile install nixpkgs#supertux
  pacman: sudo pacman -S supertux
  ubuntu: sudo apt install supertux
  winget: winget install --id SuperTux.SuperTux -e
  zypper: sudo zypper install supertux2
provenance:
  formula: supertux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
