id: brew:libsoundio
display-name: libsoundio
homepage: http://libsound.io
repo: https://github.com/andrewrk/libsoundio
docs: http://libsound.io
package-manager:
  apk: libsoundio
  brew: libsoundio
  dnf: libsoundio
  macports: libsoundio
  nix: libsoundio
package-manager-url: https://formulae.brew.sh/formula/libsoundio
version: 2.0.1-7
license: MIT
category: development
tags:
  - cli
description: Cross-platform audio input and output
source-archive: https://github.com/andrewrk/libsoundio/archive/refs/tags/2.0.1-7.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: sio_list_devices
  - exposure: global executable
    kind: cli
    name: sio_microphone
  - exposure: global executable
    kind: cli
    name: sio_record
  - exposure: global executable
    kind: cli
    name: sio_sine
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libsoundio
  av: sudo av install brew:libsoundio
  brew: brew install libsoundio
  dnf: sudo dnf install libsoundio
  macports: sudo port install libsoundio
  nix: nix profile install nixpkgs#libsoundio
provenance:
  formula: libsoundio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
