id: brew:parca
display-name: parca
homepage: https://www.parca.dev/
repo: https://github.com/parca-dev/parca
docs: https://www.parca.dev/
package-manager:
  brew: parca
  nix: parca
package-manager-url: https://formulae.brew.sh/formula/parca
version: 0.27.1
license: Apache-2.0
category: development
tags:
  - cli
description: Continuous profiling for analysis of CPU and memory usage
source-archive: https://github.com/parca-dev/parca/archive/refs/tags/v0.27.1.tar.gz
build-dependencies:
  - go
  - node
  - pnpm
executables:
  - exposure: global executable
    kind: cli
    name: parca
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:parca
  brew: brew install parca
  nix: nix profile install nixpkgs#parca
provenance:
  formula: parca
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
