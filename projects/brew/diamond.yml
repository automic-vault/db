id: brew:diamond
display-name: diamond
homepage: https://github.com/bbuchfink/diamond
repo: https://github.com/bbuchfink/diamond
docs: https://github.com/bbuchfink/diamond
package-manager:
  brew: diamond
  nix: diamond
package-manager-url: https://formulae.brew.sh/formula/diamond
version: 2.2.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Accelerated BLAST compatible local sequence aligner
source-archive: https://github.com/bbuchfink/diamond/archive/refs/tags/v2.2.1.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: diamond
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:diamond
  brew: brew install diamond
  nix: nix profile install nixpkgs#diamond
provenance:
  formula: diamond
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
