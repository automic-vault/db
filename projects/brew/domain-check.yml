id: brew:domain-check
display-name: domain-check
homepage: https://github.com/saidutt46/domain-check
repo: https://github.com/saidutt46/domain-check
docs: https://github.com/saidutt46/domain-check
package-manager:
  brew: domain-check
package-manager-url: https://formulae.brew.sh/formula/domain-check
version: 1.0.2
license: Apache-2.0
category: development
tags:
  - cli
description: CLI tool for checking domain availability using RDAP and WHOIS protocols
source-archive: https://github.com/saidutt46/domain-check/archive/refs/tags/v1.0.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: domain-check
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:domain-check
  brew: brew install domain-check
provenance:
  formula: domain-check
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
