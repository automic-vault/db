id: brew:rqlite
display-name: rqlite
homepage: https://www.rqlite.io/
repo: https://github.com/rqlite/rqlite
docs: https://www.rqlite.io/
package-manager:
  apk: rqlite
  brew: rqlite
  nix: rqlite
  zypper: rqlite
package-manager-url: https://formulae.brew.sh/formula/rqlite
version: 10.1.0
license: MIT
category: database
tags:
  - cli
  - database
description: Lightweight, distributed relational database built on SQLite
source-archive: https://github.com/rqlite/rqlite/archive/refs/tags/v10.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rqbench
  - exposure: global executable
    kind: cli
    name: rqlite
  - exposure: global executable
    kind: cli
    name: rqlited
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rqlite
  av: sudo av install brew:rqlite
  brew: brew install rqlite
  nix: nix profile install nixpkgs#rqlite
  zypper: sudo zypper install rqlite
provenance:
  formula: rqlite
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
