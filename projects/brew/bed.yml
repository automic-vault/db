id: brew:bed
display-name: bed
homepage: https://github.com/itchyny/bed
repo: https://github.com/itchyny/bed
docs: https://github.com/itchyny/bed
package-manager:
  brew: bed
  macports: bed
  nix: bed
package-manager-url: https://formulae.brew.sh/formula/bed
version: 0.2.8
license: MIT
category: development
tags:
  - cli
description: Binary editor written in Go
source-archive: https://github.com/itchyny/bed/archive/refs/tags/v0.2.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bed
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bed
  brew: brew install bed
  macports: sudo port install bed
  nix: nix profile install nixpkgs#bed
provenance:
  formula: bed
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
