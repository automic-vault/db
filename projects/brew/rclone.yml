id: brew:rclone
display-name: rclone
homepage: https://rclone.org/
repo: https://github.com/rclone/rclone
docs: https://rclone.org/
package-manager:
  apk: rclone
  brew: rclone
  chocolatey: rclone
  debian: rclone
  dnf: rclone
  macports: rclone
  nix: rclone
  pacman: rclone
  scoop: main/rclone
  ubuntu: rclone
  winget: Rclone.Rclone
  zypper: rclone
package-manager-url: https://formulae.brew.sh/formula/rclone
version: 1.74.2
license: MIT
category: cloud
tags:
  - cli
  - cloud
description: Rsync for cloud storage
source-archive: https://github.com/rclone/rclone/archive/refs/tags/v1.74.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rclone
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Homebrew's installation does not include the `mount` subcommand on macOS which
    depends on FUSE, use `nfsmount` instead.
  post-install-defined: false
install-lines:
  apk: sudo apk add rclone
  av: sudo av install brew:rclone
  brew: brew install rclone
  chocolatey: choco install rclone
  debian: sudo apt install rclone
  dnf: sudo dnf install rclone
  macports: sudo port install rclone
  nix: nix profile install nixpkgs#rclone
  pacman: sudo pacman -S rclone
  scoop: scoop install main/rclone
  ubuntu: sudo apt install rclone
  winget: winget install --id Rclone.Rclone -e
  zypper: sudo zypper install rclone
provenance:
  formula: rclone
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
