id: brew:librtlsdr
display-name: librtlsdr
homepage: https://osmocom.org/projects/rtl-sdr/wiki
repo: https://github.com/steve-m/librtlsdr
docs: https://osmocom.org/projects/rtl-sdr/wiki
package-manager:
  apk: librtlsdr
  brew: librtlsdr
  debian: rtl-sdr
  dnf: rtl-sdr
  macports: rtl-sdr
  nix: rtl-sdr
  pacman: rtl-sdr
  ubuntu: rtl-sdr
  zypper: rtl-sdr
package-manager-url: https://formulae.brew.sh/formula/librtlsdr
version: 2.0.2
license: GPL-2.0-or-later
category: security
tags:
  - cli
description: Use Realtek DVB-T dongles as a cheap SDR
source-archive: https://github.com/steve-m/librtlsdr/archive/refs/tags/v2.0.2.tar.gz
dependencies:
  - libusb
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rtl_adsb
  - exposure: global executable
    kind: cli
    name: rtl_biast
  - exposure: global executable
    kind: cli
    name: rtl_eeprom
  - exposure: global executable
    kind: cli
    name: rtl_fm
  - exposure: global executable
    kind: cli
    name: rtl_power
  - exposure: global executable
    kind: cli
    name: rtl_sdr
  - exposure: global executable
    kind: cli
    name: rtl_tcp
  - exposure: global executable
    kind: cli
    name: rtl_test
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add librtlsdr
  av: sudo av install brew:librtlsdr
  brew: brew install librtlsdr
  debian: sudo apt install rtl-sdr
  dnf: sudo dnf install rtl-sdr
  macports: sudo port install rtl-sdr
  nix: nix profile install nixpkgs#rtl-sdr
  pacman: sudo pacman -S rtl-sdr
  ubuntu: sudo apt install rtl-sdr
  zypper: sudo zypper install rtl-sdr
provenance:
  formula: librtlsdr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
