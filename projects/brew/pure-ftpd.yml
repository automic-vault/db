id: brew:pure-ftpd
display-name: pure-ftpd
homepage: https://www.pureftpd.org/
repo: https://download.pureftpd.org/pub/pure-ftpd/releases/pure-ftpd-1.0.54.tar.gz
docs: https://www.pureftpd.org/
package-manager:
  apk: pure-ftpd
  brew: pure-ftpd
  debian: pure-ftpd
  dnf: pure-ftpd
  macports: pure-ftpd
  nix: pure-ftpd
  ubuntu: pure-ftpd
  zypper: pure-ftpd
package-manager-url: https://formulae.brew.sh/formula/pure-ftpd
version: 1.0.54
license: BSD-2-Clause AND BSD-3-Clause AND BSD-4-Clause AND ISC
category: network
tags:
  - cli
description: Secure and efficient FTP server
source-archive: https://download.pureftpd.org/pub/pure-ftpd/releases/pure-ftpd-1.0.54.tar.gz
dependencies:
  - libsodium
  - openssl@3
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: pure-authd
  - exposure: global executable
    kind: cli
    name: pure-certd
  - exposure: global executable
    kind: cli
    name: pure-ftpd
  - exposure: global executable
    kind: cli
    name: pure-ftpwho
  - exposure: global executable
    kind: cli
    name: pure-mrtginfo
  - exposure: global executable
    kind: cli
    name: pure-pw
  - exposure: global executable
    kind: cli
    name: pure-pwconvert
  - exposure: global executable
    kind: cli
    name: pure-quotacheck
  - exposure: global executable
    kind: cli
    name: pure-statsdecode
  - exposure: global executable
    kind: cli
    name: pure-uploadscript
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add pure-ftpd
  av: sudo av install brew:pure-ftpd
  brew: brew install pure-ftpd
  debian: sudo apt install pure-ftpd
  dnf: sudo dnf install pure-ftpd
  macports: sudo port install pure-ftpd
  nix: nix profile install nixpkgs#pure-ftpd
  ubuntu: sudo apt install pure-ftpd
  zypper: sudo zypper install pure-ftpd
provenance:
  formula: pure-ftpd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
