id: brew:ntfy
display-name: ntfy
homepage: https://ntfy.sh/
repo: https://github.com/binwiederhier/ntfy
docs: https://ntfy.sh/
package-manager:
  apk: ntfy
  brew: ntfy
  debian: ntfy
  nix: ntfy
  scoop: main/ntfy
package-manager-url: https://formulae.brew.sh/formula/ntfy
version: 2.23.0
license: Apache-2.0 OR GPL-2.0-only
category: development
tags:
  - cli
description: Send push notifications to your phone or desktop via PUT/POST
source-archive: https://github.com/binwiederhier/ntfy/archive/refs/tags/v2.23.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ntfy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ntfy
  av: sudo av install brew:ntfy
  brew: brew install ntfy
  debian: sudo apt install ntfy
  nix: nix profile install nixpkgs#ntfy
  scoop: scoop install main/ntfy
provenance:
  formula: ntfy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
