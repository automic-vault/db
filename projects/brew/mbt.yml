id: brew:mbt
display-name: mbt
homepage: https://sap.github.io/cloud-mta-build-tool
repo: https://github.com/SAP/cloud-mta-build-tool
docs: https://sap.github.io/cloud-mta-build-tool
package-manager:
  apk: mbt
  brew: mbt
  debian: mbt
  nix: mbt
  ubuntu: mbt
package-manager-url: https://formulae.brew.sh/formula/mbt
version: 1.2.49
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Multi-Target Application (MTA) build tool for Cloud Applications
source-archive: https://github.com/SAP/cloud-mta-build-tool/archive/refs/tags/v1.2.49.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mbt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mbt
  av: sudo av install brew:mbt
  brew: brew install mbt
  debian: sudo apt install mbt
  nix: nix profile install nixpkgs#mbt
  ubuntu: sudo apt install mbt
provenance:
  formula: mbt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
