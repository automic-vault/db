id: brew:doggo
display-name: doggo
homepage: https://doggo.mrkaran.dev/
repo: https://github.com/mr-karan/doggo
docs: https://doggo.mrkaran.dev/
package-manager:
  apk: doggo
  brew: doggo
  macports: doggo
  nix: doggo
  pacman: doggo
  scoop: main/doggo
  winget: MrKaran.Doggo
  zypper: doggo
package-manager-url: https://formulae.brew.sh/formula/doggo
version: 1.1.7
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Command-line DNS Client for Humans
source-archive: https://github.com/mr-karan/doggo/archive/refs/tags/v1.1.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: doggo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add doggo
  av: sudo av install brew:doggo
  brew: brew install doggo
  macports: sudo port install doggo
  nix: nix profile install nixpkgs#doggo
  pacman: sudo pacman -S doggo
  scoop: scoop install main/doggo
  winget: winget install --id MrKaran.Doggo -e
  zypper: sudo zypper install doggo
provenance:
  formula: doggo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
