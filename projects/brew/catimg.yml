id: brew:catimg
display-name: catimg
homepage: https://github.com/posva/catimg
repo: https://github.com/posva/catimg
docs: https://github.com/posva/catimg
package-manager:
  apk: catimg
  brew: catimg
  debian: catimg
  dnf: catimg
  nix: catimg
  pacman: catimg
  ubuntu: catimg
  zypper: catimg
package-manager-url: https://formulae.brew.sh/formula/catimg
version: 2.8.0
license: MIT
category: development
tags:
  - cli
description: Insanely fast image printing in your terminal
source-archive: https://github.com/posva/catimg/archive/refs/tags/v2.8.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: catimg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add catimg
  av: sudo av install brew:catimg
  brew: brew install catimg
  debian: sudo apt install catimg
  dnf: sudo dnf install catimg
  nix: nix profile install nixpkgs#catimg
  pacman: sudo pacman -S catimg
  ubuntu: sudo apt install catimg
  zypper: sudo zypper install catimg
provenance:
  formula: catimg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
