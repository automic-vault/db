id: brew:shellspec
display-name: shellspec
homepage: https://shellspec.info/
repo: https://github.com/shellspec/shellspec
docs: https://shellspec.info/
package-manager:
  apk: shellspec
  brew: shellspec
  nix: shellspec
package-manager-url: https://formulae.brew.sh/formula/shellspec
