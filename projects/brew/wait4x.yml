id: brew:wait4x
display-name: wait4x
homepage: https://wait4x.dev
repo: https://github.com/wait4x/wait4x
docs: https://wait4x.dev
package-manager:
  apk: wait4x
  brew: wait4x
  nix: wait4x
  scoop: extras/wait4x
  zypper: wait4x
package-manager-url: https://formulae.brew.sh/formula/wait4x
version: 3.6.0
license: Apache-2.0
category: development
tags:
  - cli
description: Wait for a port or a service to enter the requested state
source-archive: https://github.com/wait4x/wait4x/archive/refs/tags/v3.6.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wait4x
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wait4x
  av: sudo av install brew:wait4x
  brew: brew install wait4x
  nix: nix profile install nixpkgs#wait4x
  scoop: scoop install extras/wait4x
  zypper: sudo zypper install wait4x
provenance:
  formula: wait4x
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
