id: brew:open-ocd
display-name: open-ocd
homepage: https://openocd.org/
repo: https://downloads.sourceforge.net/project/openocd/openocd/0.12.0/openocd-0.12.0.tar.bz2
docs: https://openocd.org/
package-manager:
  apk: openocd
  brew: open-ocd
  debian: openocd
  dnf: openocd
  macports: openocd
  nix: openocd
  pacman: openocd
  scoop: main/openocd
  ubuntu: openocd
  zypper: openocd
package-manager-url: https://formulae.brew.sh/formula/open-ocd
version: 0.12.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: On-chip debugging, in-system programming and boundary-scan testing
source-archive: https://downloads.sourceforge.net/project/openocd/openocd/0.12.0/openocd-0.12.0.tar.bz2
dependencies:
  - capstone
  - hidapi
  - libftdi
  - libusb
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: openocd
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add openocd
  av: sudo av install brew:open-ocd
  brew: brew install open-ocd
  debian: sudo apt install openocd
  dnf: sudo dnf install openocd
  macports: sudo port install openocd
  nix: nix profile install nixpkgs#openocd
  pacman: sudo pacman -S openocd
  scoop: scoop install main/openocd
  ubuntu: sudo apt install openocd
  zypper: sudo zypper install openocd
provenance:
  formula: open-ocd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
