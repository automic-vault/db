id: brew:securefs
display-name: securefs
homepage: https://github.com/netheril96/securefs
repo: https://github.com/netheril96/securefs
docs: https://github.com/netheril96/securefs
package-manager:
  brew: securefs
  debian: securefs
  nix: securefs
  ubuntu: securefs
  winget: netheril96.securefs
package-manager-url: https://formulae.brew.sh/formula/securefs
version: 2.0.0
license: MIT
category: security
tags:
  - cli
description: Filesystem with transparent authenticated encryption
source-archive: https://github.com/netheril96/securefs/archive/refs/tags/v2.0.0.tar.gz
dependencies:
  - abseil
  - argon2
  - cryptopp
  - fruit
  - jsoncpp
  - libfuse@2
  - protobuf
  - sqlite
  - uni-algo
  - utf8proc
build-dependencies:
  - cmake
  - pkgconf
  - tclap
executables:
  - exposure: global executable
    kind: cli
    name: securefs
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:securefs
  brew: brew install securefs
  debian: sudo apt install securefs
  nix: nix profile install nixpkgs#securefs
  ubuntu: sudo apt install securefs
  winget: winget install --id netheril96.securefs -e
provenance:
  formula: securefs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
