id: brew:logdy
display-name: logdy
homepage: https://logdy.dev
repo: https://github.com/logdyhq/logdy-core
docs: https://logdy.dev
package-manager:
  brew: logdy
  nix: logdy
package-manager-url: https://formulae.brew.sh/formula/logdy
version: 0.17.1
license: Apache-2.0
category: development
tags:
  - cli
description: Web based real-time log viewer
source-archive: https://github.com/logdyhq/logdy-core/archive/refs/tags/v0.17.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: logdy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:logdy
  brew: brew install logdy
  nix: nix profile install nixpkgs#logdy
provenance:
  formula: logdy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
