id: brew:fsevents-tools
display-name: fsevents-tools
homepage: https://geoff.greer.fm/fsevents/
repo: https://geoff.greer.fm/fsevents/releases/fsevents-tools-1.0.0.tar.gz
docs: https://geoff.greer.fm/fsevents/
package-manager:
  brew: fsevents-tools
  macports: fsevents-tools
package-manager-url: https://formulae.brew.sh/formula/fsevents-tools
version: 1.0.0
license: Apache-2.0
category: network
tags:
  - cli
description: Command-line utilities for the FSEvents API
source-archive: https://geoff.greer.fm/fsevents/releases/fsevents-tools-1.0.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: autorsync
  - exposure: global executable
    kind: cli
    name: notifyloop
  - exposure: global executable
    kind: cli
    name: notifywait
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fsevents-tools
  brew: brew install fsevents-tools
  macports: sudo port install fsevents-tools
provenance:
  formula: fsevents-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
