id: brew:nkf
display-name: nkf
homepage: https://github.com/nurse/nkf
repo: https://deb.debian.org/debian/pool/main/n/nkf/nkf_2.1.5.orig.tar.gz
docs: https://github.com/nurse/nkf
package-manager:
  brew: nkf
  debian: nkf
  dnf: nkf
  macports: nkf
  nix: nkf
  ubuntu: nkf
  zypper: nkf
package-manager-url: https://formulae.brew.sh/formula/nkf
version: 2.1.5
license: Zlib
category: development
tags:
  - cli
description: Network Kanji code conversion Filter (NKF)
source-archive: https://deb.debian.org/debian/pool/main/n/nkf/nkf_2.1.5.orig.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: nkf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nkf
  brew: brew install nkf
  debian: sudo apt install nkf
  dnf: sudo dnf install nkf
  macports: sudo port install nkf
  nix: nix profile install nixpkgs#nkf
  ubuntu: sudo apt install nkf
  zypper: sudo zypper install nkf
provenance:
  formula: nkf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
