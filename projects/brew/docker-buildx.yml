id: brew:docker-buildx
display-name: docker-buildx
homepage: https://docs.docker.com/buildx/working-with-buildx/
repo: https://github.com/docker/buildx
docs: https://docs.docker.com/buildx/working-with-buildx/
package-manager:
  brew: docker-buildx
  debian: docker-buildx
  dnf: docker-buildx
  nix: docker-buildx
  pacman: docker-buildx
  scoop: main/docker-buildx
  ubuntu: docker-buildx
  winget: Docker.Buildx
  zypper: docker-buildx
package-manager-url: https://formulae.brew.sh/formula/docker-buildx
version: 0.34.1
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: Docker CLI plugin for extended build capabilities with BuildKit
source-archive: https://github.com/docker/buildx/archive/refs/tags/v0.34.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: docker-buildx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    docker-buildx is a Docker plugin. For Docker to find the plugin, add
    "cliPluginsExtraDirs" to ~/.docker/config.json: "cliPluginsExtraDirs": [
    "$HOMEBREW_PREFIX/lib/docker/cli-plugins" ]
  post-install-defined: false
install-lines:
  av: sudo av install brew:docker-buildx
  brew: brew install docker-buildx
  debian: sudo apt install docker-buildx
  dnf: sudo dnf install docker-buildx
  nix: nix profile install nixpkgs#docker-buildx
  pacman: sudo pacman -S docker-buildx
  scoop: scoop install main/docker-buildx
  ubuntu: sudo apt install docker-buildx
  winget: winget install --id Docker.Buildx -e
  zypper: sudo zypper install docker-buildx
provenance:
  formula: docker-buildx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
