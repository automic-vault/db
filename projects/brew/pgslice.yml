id: brew:pgslice
display-name: pgslice
homepage: https://github.com/ankane/pgslice
repo: https://github.com/ankane/pgslice
docs: https://github.com/ankane/pgslice
package-manager:
  brew: pgslice
package-manager-url: https://formulae.brew.sh/formula/pgslice
version: 0.7.2
license: MIT
category: database
tags:
  - cli
description: Postgres partitioning as easy as pie
source-archive: https://github.com/ankane/pgslice/archive/refs/tags/v0.7.2.tar.gz
dependencies:
  - libpq
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: pgslice
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pgslice
  brew: brew install pgslice
provenance:
  formula: pgslice
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
