id: brew:sqlfmt
display-name: sqlfmt
homepage: https://sqlfum.pt/
repo: https://github.com/maddyblue/sqlfmt
docs: https://sqlfum.pt/
package-manager:
  brew: sqlfmt
package-manager-url: https://formulae.brew.sh/formula/sqlfmt
version: 0.5.0
license: Apache-2.0
category: database
tags:
  - cli
description: SQL formatter with width-aware output
source-archive: https://github.com/maddyblue/sqlfmt/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sqlfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sqlfmt
  brew: brew install sqlfmt
provenance:
  formula: sqlfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
