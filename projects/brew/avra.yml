id: brew:avra
display-name: avra
homepage: https://github.com/Ro5bert/avra
repo: https://github.com/Ro5bert/avra
docs: https://github.com/Ro5bert/avra
package-manager:
  apk: avra
  brew: avra
  debian: avra
  dnf: avra
  nix: avra
  ubuntu: avra
package-manager-url: https://formulae.brew.sh/formula/avra
version: 1.4.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Assembler for the Atmel AVR microcontroller family
source-archive: https://github.com/Ro5bert/avra/archive/refs/tags/1.4.2.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: avra
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add avra
  av: sudo av install brew:avra
  brew: brew install avra
  debian: sudo apt install avra
  dnf: sudo dnf install avra
  nix: nix profile install nixpkgs#avra
  ubuntu: sudo apt install avra
provenance:
  formula: avra
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
