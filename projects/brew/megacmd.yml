id: brew:megacmd
display-name: megacmd
homepage: https://github.com/t3rm1n4l/megacmd
repo: https://github.com/t3rm1n4l/megacmd
docs: https://github.com/t3rm1n4l/megacmd
package-manager:
  apk: megacmd
  brew: megacmd
  nix: megacmd
  scoop: main/megacmd
package-manager-url: https://formulae.brew.sh/formula/megacmd
version: 0.016
license: MIT
category: development
tags:
  - cli
description: Command-line client for mega.co.nz storage service
source-archive: https://github.com/t3rm1n4l/megacmd/archive/refs/tags/0.016.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: megacmd
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add megacmd
  av: sudo av install brew:megacmd
  brew: brew install megacmd
  nix: nix profile install nixpkgs#megacmd
  scoop: scoop install main/megacmd
provenance:
  formula: megacmd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
