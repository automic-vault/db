id: brew:cargo-c
display-name: cargo-c
homepage: https://github.com/lu-zero/cargo-c
repo: https://github.com/lu-zero/cargo-c
docs: https://github.com/lu-zero/cargo-c
package-manager:
  apk: cargo-c
  brew: cargo-c
  debian: cargo-c
  dnf: cargo-c
  macports: cargo-c
  nix: cargo-c
  pacman: cargo-c
  ubuntu: cargo-c
  zypper: cargo-c
package-manager-url: https://formulae.brew.sh/formula/cargo-c
version: 0.10.22
license: MIT
category: development
tags:
  - cli
description: Helper program to build and install c-like libraries
source-archive: https://github.com/lu-zero/cargo-c/archive/refs/tags/v0.10.22.tar.gz
dependencies:
  - libgit2
  - libssh2
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: cargo-capi
  - exposure: global executable
    kind: cli
    name: cargo-cbuild
  - exposure: global executable
    kind: cli
    name: cargo-cinstall
  - exposure: global executable
    kind: cli
    name: cargo-ctest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-c
  av: sudo av install brew:cargo-c
  brew: brew install cargo-c
  debian: sudo apt install cargo-c
  dnf: sudo dnf install cargo-c
  macports: sudo port install cargo-c
  nix: nix profile install nixpkgs#cargo-c
  pacman: sudo pacman -S cargo-c
  ubuntu: sudo apt install cargo-c
  zypper: sudo zypper install cargo-c
provenance:
  formula: cargo-c
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
