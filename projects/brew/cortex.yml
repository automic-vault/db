id: brew:cortex
display-name: cortex
homepage: https://cortexmetrics.io/
repo: https://github.com/cortexproject/cortex
docs: https://cortexmetrics.io/
package-manager:
  brew: cortex
package-manager-url: https://formulae.brew.sh/formula/cortex
version: 1.21.0
license: Apache-2.0
category: development
tags:
  - cli
description: Long term storage for Prometheus
source-archive: https://github.com/cortexproject/cortex/archive/refs/tags/v1.21.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cortex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:cortex
  brew: brew install cortex
provenance:
  formula: cortex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
