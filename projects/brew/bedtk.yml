id: brew:bedtk
display-name: bedtk
homepage: https://github.com/lh3/bedtk
repo: https://github.com/lh3/bedtk
docs: https://github.com/lh3/bedtk
package-manager:
  brew: bedtk
package-manager-url: https://formulae.brew.sh/formula/bedtk
version: 1.2
license: MIT
category: development
tags:
  - cli
description: Simple toolset for BED files
source-archive: https://github.com/lh3/bedtk/archive/refs/tags/v1.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bedtk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bedtk
  brew: brew install bedtk
provenance:
  formula: bedtk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
