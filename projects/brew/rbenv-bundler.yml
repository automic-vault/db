id: brew:rbenv-bundler
display-name: rbenv-bundler
homepage: https://github.com/carsomyr/rbenv-bundler
repo: https://github.com/carsomyr/rbenv-bundler
docs: https://github.com/carsomyr/rbenv-bundler
package-manager:
  brew: rbenv-bundler
package-manager-url: https://formulae.brew.sh/formula/rbenv-bundler
version: 1.0.1
license: Apache-2.0
category: development
tags:
  - cli
description: Makes shims aware of bundle install paths
source-archive: https://github.com/carsomyr/rbenv-bundler/archive/refs/tags/1.0.1.tar.gz
dependencies:
  - rbenv
executables:
  - exposure: global executable
    kind: cli
    name: rbenv-bundler
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rbenv-bundler
  brew: brew install rbenv-bundler
provenance:
  formula: rbenv-bundler
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
