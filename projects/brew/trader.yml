id: brew:trader
display-name: trader
homepage: https://www.zap.org.au/projects/trader/
repo: https://ftp.zap.org.au/pub/trader/unix/trader-7.21.tar.xz
docs: https://www.zap.org.au/projects/trader/
package-manager:
  brew: trader
  debian: trader
  dnf: trader
  ubuntu: trader
  zypper: trader
package-manager-url: https://formulae.brew.sh/formula/trader
version: 7.21
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Star Traders
source-archive: https://ftp.zap.org.au/pub/trader/unix/trader-7.21.tar.xz
dependencies:
  - gettext
  - ncurses
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: trader
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:trader
  brew: brew install trader
  debian: sudo apt install trader
  dnf: sudo dnf install trader
  ubuntu: sudo apt install trader
  zypper: sudo zypper install trader
provenance:
  formula: trader
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
