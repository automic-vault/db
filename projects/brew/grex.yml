id: brew:grex
display-name: grex
homepage: https://github.com/pemistahl/grex
repo: https://github.com/pemistahl/grex
docs: https://github.com/pemistahl/grex
package-manager:
  brew: grex
  macports: grex
  nix: grex
  pacman: grex
  scoop: main/grex
  zypper: grex
package-manager-url: https://formulae.brew.sh/formula/grex
version: 1.4.6
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool for generating regular expressions
source-archive: https://github.com/pemistahl/grex/archive/refs/tags/v1.4.6.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: grex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:grex
  brew: brew install grex
  macports: sudo port install grex
  nix: nix profile install nixpkgs#grex
  pacman: sudo pacman -S grex
  scoop: scoop install main/grex
  zypper: sudo zypper install grex
provenance:
  formula: grex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
