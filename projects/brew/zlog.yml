id: brew:zlog
display-name: zlog
homepage: https://github.com/HardySimpson/zlog
repo: https://github.com/HardySimpson/zlog
docs: https://github.com/HardySimpson/zlog
package-manager:
  brew: zlog
  macports: zlog
  nix: zlog
package-manager-url: https://formulae.brew.sh/formula/zlog
version: 1.2.18
license: Apache-2.0
category: development
tags:
  - cli
description: High-performance C logging library
source-archive: https://github.com/HardySimpson/zlog/archive/refs/tags/1.2.18.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: zlog-chk-conf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zlog
  brew: brew install zlog
  macports: sudo port install zlog
  nix: nix profile install nixpkgs#zlog
provenance:
  formula: zlog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
