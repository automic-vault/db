id: brew:code-minimap
display-name: code-minimap
homepage: https://github.com/wfxr/code-minimap
repo: https://github.com/wfxr/code-minimap
docs: https://github.com/wfxr/code-minimap
package-manager:
  apk: code-minimap
  brew: code-minimap
  debian: code-minimap
  macports: code-minimap
  nix: code-minimap
  scoop: extras/code-minimap
  zypper: code-minimap
package-manager-url: https://formulae.brew.sh/formula/code-minimap
version: 0.6.8
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: High performance code minimap generator
source-archive: https://github.com/wfxr/code-minimap/archive/refs/tags/v0.6.8.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: code-minimap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add code-minimap
  av: sudo av install brew:code-minimap
  brew: brew install code-minimap
  debian: sudo apt install code-minimap
  macports: sudo port install code-minimap
  nix: nix profile install nixpkgs#code-minimap
  scoop: scoop install extras/code-minimap
  zypper: sudo zypper install code-minimap
provenance:
  formula: code-minimap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
