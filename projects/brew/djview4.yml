id: brew:djview4
display-name: djview4
homepage: https://djvu.sourceforge.net/djview4.html
repo: https://downloads.sourceforge.net/project/djvu/DjView/4.12/djview-4.12.3.tar.gz
docs: https://djvu.sourceforge.net/djview4.html
package-manager:
  brew: djview4
  debian: djview4
  dnf: djview4
  macports: djview
  nix: djview4
  pacman: djview
  ubuntu: djview4
  winget: DjVuLibre.DjView
package-manager-url: https://formulae.brew.sh/formula/djview4
version: 4.12.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Viewer for the DjVu image format
source-archive: https://downloads.sourceforge.net/project/djvu/DjView/4.12/djview-4.12.3.tar.gz
dependencies:
  - djvulibre
  - libtiff
  - qt5compat
  - qtbase
build-dependencies:
  - autoconf
  - automake
  - librsvg
  - libtool
  - pkgconf
  - qttools
executables:
  - exposure: global executable
    kind: cli
    name: djview
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:djview4
  brew: brew install djview4
  debian: sudo apt install djview4
  dnf: sudo dnf install djview4
  macports: sudo port install djview
  nix: nix profile install nixpkgs#djview4
  pacman: sudo pacman -S djview
  ubuntu: sudo apt install djview4
  winget: winget install --id DjVuLibre.DjView -e
provenance:
  formula: djview4
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
