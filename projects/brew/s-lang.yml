id: brew:s-lang
display-name: s-lang
homepage: https://www.jedsoft.org/slang/
repo: https://www.jedsoft.org/releases/slang/slang-2.3.3.tar.bz2
docs: https://www.jedsoft.org/slang/
package-manager:
  brew: s-lang
  debian: slsh
  ubuntu: slsh
package-manager-url: https://formulae.brew.sh/formula/s-lang
version: 2.3.3
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Library for creating multi-platform software
source-archive: https://www.jedsoft.org/releases/slang/slang-2.3.3.tar.bz2
dependencies:
  - libpng
executables:
  - exposure: global executable
    kind: cli
    name: slsh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:s-lang
  brew: brew install s-lang
  debian: sudo apt install slsh
  ubuntu: sudo apt install slsh
provenance:
  formula: s-lang
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
