id: brew:fnlfmt
display-name: fnlfmt
homepage: https://git.sr.ht/~technomancy/fnlfmt
repo: https://git.sr.ht/~technomancy/fnlfmt/archive/0.3.2.tar.gz
docs: https://git.sr.ht/~technomancy/fnlfmt
package-manager:
  apk: fnlfmt
  brew: fnlfmt
  nix: fnlfmt
  pacman: fnlfmt
package-manager-url: https://formulae.brew.sh/formula/fnlfmt
version: 0.3.2
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Formatter for Fennel code
source-archive: https://git.sr.ht/~technomancy/fnlfmt/archive/0.3.2.tar.gz
dependencies:
  - lua
executables:
  - exposure: global executable
    kind: cli
    name: fnlfmt
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fnlfmt
  av: sudo av install brew:fnlfmt
  brew: brew install fnlfmt
  nix: nix profile install nixpkgs#fnlfmt
  pacman: sudo pacman -S fnlfmt
provenance:
  formula: fnlfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
