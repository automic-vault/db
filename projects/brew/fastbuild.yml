id: brew:fastbuild
display-name: fastbuild
homepage: https://fastbuild.org/
repo: https://github.com/fastbuild/fastbuild
docs: https://fastbuild.org/
package-manager:
  brew: fastbuild
  macports: fbuild
package-manager-url: https://formulae.brew.sh/formula/fastbuild
version: 1.20
license: Zlib
category: development
tags:
  - cli
description: High performance build system for Windows, OSX and Linux
source-archive: https://github.com/fastbuild/fastbuild/archive/refs/tags/v1.20.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: fbuild
  - exposure: global executable
    kind: cli
    name: fbuildworker
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fastbuild
  brew: brew install fastbuild
  macports: sudo port install fbuild
provenance:
  formula: fastbuild
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
