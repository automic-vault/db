id: brew:pympress
display-name: pympress
homepage: https://github.com/Cimbali/pympress/
repo: >
  https://files.pythonhosted.org/packages/87/66/fb9f8f2975740ea8880de293eb16b543965387881c71ca323a00a5d77d8a/pympress-1.8.6.tar.gz
docs: https://github.com/Cimbali/pympress/
package-manager:
  apk: pympress
  brew: pympress
  debian: pympress
  macports: pympress
  nix: pympress
  scoop: extras/pympress
  ubuntu: pympress
  winget: Cimbali.pympress
  zypper: pympress
package-manager-url: https://formulae.brew.sh/formula/pympress
version: 1.8.6
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Simple and powerful dual-screen PDF reader designed for presentations
source-archive: >
  https://files.pythonhosted.org/packages/87/66/fb9f8f2975740ea8880de293eb16b543965387881c71ca323a00a5d77d8a/pympress-1.8.6.tar.gz
dependencies:
  - gobject-introspection
  - gstreamer
  - gtk+3
  - libyaml
  - poppler
  - pygobject3
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: pympress
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pympress
  av: sudo av install brew:pympress
  brew: brew install pympress
  debian: sudo apt install pympress
  macports: sudo port install pympress
  nix: nix profile install nixpkgs#pympress
  scoop: scoop install extras/pympress
  ubuntu: sudo apt install pympress
  winget: winget install --id Cimbali.pympress -e
  zypper: sudo zypper install pympress
provenance:
  formula: pympress
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
