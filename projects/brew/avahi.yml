id: brew:avahi
display-name: avahi
homepage: https://avahi.org
repo: https://github.com/avahi/avahi
docs: https://avahi.org
package-manager:
  apk: avahi
  brew: avahi
  debian: avahi-autoipd
  dnf: avahi
  macports: avahi
  nix: avahi
  pacman: avahi
  ubuntu: avahi-autoipd
  zypper: avahi
package-manager-url: https://formulae.brew.sh/formula/avahi
version: 0.9-rc4
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Service Discovery for Linux using mDNS/DNS-SD
source-archive: https://github.com/avahi/avahi/archive/refs/tags/v0.9-rc4.tar.gz
dependencies:
  - dbus
  - expat
  - gdbm
  - glib
  - libcap
  - libdaemon
  - systemd
build-dependencies:
  - autoconf
  - automake
  - gettext
  - libtool
  - m4
  - perl
  - pkgconf
  - xmltoman
executables:
  - exposure: global executable
    kind: cli
    name: avahi-autoipd
  - exposure: global executable
    kind: cli
    name: avahi-browse
  - exposure: global executable
    kind: cli
    name: avahi-browse-domains
  - exposure: global executable
    kind: cli
    name: avahi-daemon
  - exposure: global executable
    kind: cli
    name: avahi-dnsconfd
  - exposure: global executable
    kind: cli
    name: avahi-publish
  - exposure: global executable
    kind: cli
    name: avahi-publish-address
  - exposure: global executable
    kind: cli
    name: avahi-publish-service
  - exposure: global executable
    kind: cli
    name: avahi-resolve
  - exposure: global executable
    kind: cli
    name: avahi-resolve-address
  - exposure: global executable
    kind: cli
    name: avahi-resolve-host-name
  - exposure: global executable
    kind: cli
    name: avahi-set-host-name
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add avahi
  av: sudo av install brew:avahi
  brew: brew install avahi
  debian: sudo apt install avahi-autoipd
  dnf: sudo dnf install avahi
  macports: sudo port install avahi
  nix: nix profile install nixpkgs#avahi
  pacman: sudo pacman -S avahi
  ubuntu: sudo apt install avahi-autoipd
  zypper: sudo zypper install avahi
provenance:
  formula: avahi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
