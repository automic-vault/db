id: brew:sdb
display-name: sdb
homepage: https://www.radare.org/
repo: https://github.com/radareorg/sdb
docs: https://www.radare.org/
package-manager:
  apk: sdb
  brew: sdb
package-manager-url: https://formulae.brew.sh/formula/sdb
version: 2.4.4
license: MIT
category: development
tags:
  - cli
description: Ondisk/memory hashtable based on CDB
source-archive: https://github.com/radareorg/sdb/archive/refs/tags/2.4.4.tar.gz
dependencies:
  - glib
build-dependencies:
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: sdb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sdb
  av: sudo av install brew:sdb
  brew: brew install sdb
provenance:
  formula: sdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
