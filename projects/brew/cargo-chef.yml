id: brew:cargo-chef
display-name: cargo-chef
homepage: https://github.com/LukeMathWalker/cargo-chef
repo: https://github.com/LukeMathWalker/cargo-chef
docs: https://github.com/LukeMathWalker/cargo-chef
package-manager:
  apk: cargo-chef
  brew: cargo-chef
  nix: cargo-chef
package-manager-url: https://formulae.brew.sh/formula/cargo-chef
version: 0.1.77
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
  - docker
description: Cargo subcommand to speed up Rust Docker builds using Docker layer caching
source-archive: https://github.com/LukeMathWalker/cargo-chef/archive/refs/tags/v0.1.77.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-chef
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-chef
  av: sudo av install brew:cargo-chef
  brew: brew install cargo-chef
  nix: nix profile install nixpkgs#cargo-chef
provenance:
  formula: cargo-chef
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
