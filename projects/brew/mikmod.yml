id: brew:mikmod
display-name: mikmod
homepage: https://mikmod.sourceforge.net/
repo: https://downloads.sourceforge.net/project/mikmod/mikmod/3.2.9/mikmod-3.2.9.tar.gz
docs: https://mikmod.sourceforge.net/
package-manager:
  brew: mikmod
  debian: mikmod
  dnf: mikmod
  macports: mikmod
  nix: mikmod
  ubuntu: mikmod
package-manager-url: https://formulae.brew.sh/formula/mikmod
version: 3.2.9
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Portable tracked music player
source-archive: https://downloads.sourceforge.net/project/mikmod/mikmod/3.2.9/mikmod-3.2.9.tar.gz
dependencies:
  - libmikmod
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: mikmod
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mikmod
  brew: brew install mikmod
  debian: sudo apt install mikmod
  dnf: sudo dnf install mikmod
  macports: sudo port install mikmod
  nix: nix profile install nixpkgs#mikmod
  ubuntu: sudo apt install mikmod
provenance:
  formula: mikmod
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
