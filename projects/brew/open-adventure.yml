id: brew:open-adventure
display-name: open-adventure
homepage: http://www.catb.org/~esr/open-adventure/
repo: https://gitlab.com/esr/open-adventure/-/archive/1.21/open-adventure-1.21.tar.bz2
docs: http://www.catb.org/~esr/open-adventure/
package-manager:
  brew: open-adventure
  nix: open-adventure
  ubuntu: open-adventure
package-manager-url: https://formulae.brew.sh/formula/open-adventure
version: 1.21
license: BSD-2-Clause
category: development
tags:
  - cli
description: Colossal Cave Adventure, the 1995 430-point version
source-archive: https://gitlab.com/esr/open-adventure/-/archive/1.21/open-adventure-1.21.tar.bz2
build-dependencies:
  - asciidoctor
  - libyaml
  - pkgconf
  - python@3.14
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: advent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:open-adventure
  brew: brew install open-adventure
  nix: nix profile install nixpkgs#open-adventure
  ubuntu: sudo apt install open-adventure
provenance:
  formula: open-adventure
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
