id: brew:hilite
display-name: hilite
homepage: https://sourceforge.net/projects/hilite/
repo: https://downloads.sourceforge.net/project/hilite/hilite/1.5/hilite.c
docs: https://sourceforge.net/projects/hilite/
package-manager:
  brew: hilite
  macports: hilite
package-manager-url: https://formulae.brew.sh/formula/hilite
version: 1.5
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: CLI tool that runs a command and highlights STDERR output
source-archive: https://downloads.sourceforge.net/project/hilite/hilite/1.5/hilite.c
executables:
  - exposure: global executable
    kind: cli
    name: hilite
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hilite
  brew: brew install hilite
  macports: sudo port install hilite
provenance:
  formula: hilite
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
