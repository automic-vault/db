id: brew:pachi
display-name: pachi
homepage: https://pachi.or.cz/
repo: https://github.com/pasky/pachi
docs: https://pachi.or.cz/
package-manager:
  brew: pachi
  debian: pachi
  dnf: pachi
  ubuntu: pachi
package-manager-url: https://formulae.brew.sh/formula/pachi
version: 12.90
license: GPL-2.0-only AND BSD-2-Clause
category: development
tags:
  - cli
description: Software for the Board Game of Go/Weiqi/Baduk
source-archive: https://github.com/pasky/pachi/archive/refs/tags/pachi-12.90-homebrew.tar.gz
dependencies:
  - boost
  - gflags
  - glog
  - hdf5
  - katago
  - openblas
  - protobuf
build-dependencies:
  - cmake
  - ninja
  - wget
executables:
  - exposure: global executable
    kind: cli
    name: pachi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pachi
  brew: brew install pachi
  debian: sudo apt install pachi
  dnf: sudo dnf install pachi
  ubuntu: sudo apt install pachi
provenance:
  formula: pachi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
