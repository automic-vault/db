id: brew:fastly
display-name: fastly
homepage: https://www.fastly.com/documentation/reference/cli/
repo: https://github.com/fastly/cli
docs: https://www.fastly.com/documentation/reference/cli/
package-manager:
  brew: fastly
  nix: fastly
package-manager-url: https://formulae.brew.sh/formula/fastly
version: 15.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: Build, deploy and configure Fastly services
source-archive: https://github.com/fastly/cli/archive/refs/tags/v15.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fastly
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fastly
  brew: brew install fastly
  nix: nix profile install nixpkgs#fastly
provenance:
  formula: fastly
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
