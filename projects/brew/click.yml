id: brew:click
display-name: click
homepage: https://github.com/databricks/click
repo: https://github.com/databricks/click
docs: https://github.com/databricks/click
package-manager:
  apk: click
  brew: click
  debian: click
  nix: click
  ubuntu: click
package-manager-url: https://formulae.brew.sh/formula/click
version: 0.6.3
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Command-line interactive controller for Kubernetes
source-archive: https://github.com/databricks/click/archive/refs/tags/v0.6.3.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: click
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add click
  av: sudo av install brew:click
  brew: brew install click
  debian: sudo apt install click
  nix: nix profile install nixpkgs#click
  ubuntu: sudo apt install click
provenance:
  formula: click
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
