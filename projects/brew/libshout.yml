id: brew:libshout
display-name: libshout
homepage: https://icecast.org/
repo: https://ftp.osuosl.org/pub/xiph/releases/libshout/libshout-2.4.6.tar.gz
docs: https://icecast.org/
package-manager:
  apk: libshout
  brew: libshout
  dnf: libshout
  macports: libshout
  nix: libshout
  pacman: libshout
package-manager-url: https://formulae.brew.sh/formula/libshout
version: 2.4.6
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: Data and connectivity library for the Icecast server
source-archive: https://ftp.osuosl.org/pub/xiph/releases/libshout/libshout-2.4.6.tar.gz
dependencies:
  - libogg
  - libvorbis
  - openssl@3
  - speex
  - theora
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: shout
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libshout
  av: sudo av install brew:libshout
  brew: brew install libshout
  dnf: sudo dnf install libshout
  macports: sudo port install libshout
  nix: nix profile install nixpkgs#libshout
  pacman: sudo pacman -S libshout
provenance:
  formula: libshout
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
