id: brew:glasskube
display-name: glasskube
homepage: https://glasskube.dev/products/package-manager/docs/
repo: https://github.com/glasskube/glasskube
docs: https://glasskube.dev/products/package-manager/docs/
package-manager:
  brew: glasskube
  macports: glasskube
  nix: glasskube
package-manager-url: https://formulae.brew.sh/formula/glasskube
version: 0.26.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Missing Package Manager for Kubernetes
source-archive: https://github.com/glasskube/glasskube/archive/refs/tags/v0.26.1.tar.gz
build-dependencies:
  - go
  - node
executables:
  - exposure: global executable
    kind: cli
    name: glasskube
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:glasskube
  brew: brew install glasskube
  macports: sudo port install glasskube
  nix: nix profile install nixpkgs#glasskube
provenance:
  formula: glasskube
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
