id: brew:mcp-toolbox
display-name: mcp-toolbox
homepage: https://github.com/googleapis/genai-toolbox
repo: https://github.com/googleapis/genai-toolbox
docs: https://github.com/googleapis/genai-toolbox
package-manager:
  brew: mcp-toolbox
  dnf: toolbox
  nix: toolbox
  pacman: toolbox
  winget: Japplis.Toolbox
  zypper: toolbox
package-manager-url: https://formulae.brew.sh/formula/mcp-toolbox
version: 1.3.0
license: Apache-2.0
category: database
tags:
  - cli
description: MCP server for databases
source-archive: https://github.com/googleapis/genai-toolbox/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: toolbox
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mcp-toolbox
  brew: brew install mcp-toolbox
  dnf: sudo dnf install toolbox
  nix: nix profile install nixpkgs#toolbox
  pacman: sudo pacman -S toolbox
  winget: winget install --id Japplis.Toolbox -e
  zypper: sudo zypper install toolbox
provenance:
  formula: mcp-toolbox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
