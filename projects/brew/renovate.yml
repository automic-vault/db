id: brew:renovate
display-name: renovate
homepage: https://github.com/renovatebot/renovate
repo: https://github.com/renovatebot/renovate
docs: https://github.com/renovatebot/renovate
package-manager:
  brew: renovate
  nix: renovate
package-manager-url: https://formulae.brew.sh/formula/renovate
version: 43.196.0
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Automated dependency updates. Flexible so you don't need to be
source-archive: https://github.com/renovatebot/renovate/archive/refs/tags/43.196.0.tar.gz
dependencies:
  - node@24
uses-from-macos:
  - git
executables:
  - exposure: global executable
    kind: cli
    name: renovate
  - exposure: global executable
    kind: cli
    name: renovate-config-validator
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:renovate
  brew: brew install renovate
  nix: nix profile install nixpkgs#renovate
provenance:
  formula: renovate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
