id: brew:chuck
display-name: chuck
homepage: https://chuck.cs.princeton.edu/
repo: https://chuck.cs.princeton.edu/release/files/chuck-1.5.5.8.tgz
docs: https://chuck.cs.princeton.edu/
package-manager:
  brew: chuck
  debian: chuck
  macports: chuck
  nix: chuck
  pacman: chuck
  scoop: main/chuck
  ubuntu: chuck
  winget: CCRMA.ChucK
package-manager-url: https://formulae.brew.sh/formula/chuck
version: 1.5.5.8
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Concurrent, on-the-fly audio programming language
source-archive: https://chuck.cs.princeton.edu/release/files/chuck-1.5.5.8.tgz
executables:
  - exposure: global executable
    kind: cli
    name: chuck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chuck
  brew: brew install chuck
  debian: sudo apt install chuck
  macports: sudo port install chuck
  nix: nix profile install nixpkgs#chuck
  pacman: sudo pacman -S chuck
  scoop: scoop install main/chuck
  ubuntu: sudo apt install chuck
  winget: winget install --id CCRMA.ChucK -e
provenance:
  formula: chuck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
