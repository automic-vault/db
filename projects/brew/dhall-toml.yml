id: brew:dhall-toml
display-name: dhall-toml
homepage: https://github.com/dhall-lang/dhall-haskell/tree/main/dhall-toml
repo: https://hackage.haskell.org/package/dhall-toml-1.0.4/dhall-toml-1.0.4.tar.gz
docs: https://github.com/dhall-lang/dhall-haskell/tree/main/dhall-toml
package-manager:
  brew: dhall-toml
package-manager-url: https://formulae.brew.sh/formula/dhall-toml
version: 1.0.4
license: BSD-3-Clause
category: development
tags:
  - cli
description: Convert between Dhall and Toml
source-archive: https://hackage.haskell.org/package/dhall-toml-1.0.4/dhall-toml-1.0.4.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: dhall-to-toml
  - exposure: global executable
    kind: cli
    name: toml-to-dhall
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dhall-toml
  brew: brew install dhall-toml
provenance:
  formula: dhall-toml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
