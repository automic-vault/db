id: brew:lighthouse
display-name: lighthouse
homepage: https://lighthouse.sigmaprime.io/
repo: https://github.com/sigp/lighthouse
docs: https://lighthouse.sigmaprime.io/
package-manager:
  apk: lighthouse
  brew: lighthouse
  nix: lighthouse
package-manager-url: https://formulae.brew.sh/formula/lighthouse
version: 8.1.3
license: Apache-2.0
category: development
tags:
  - cli
description: Rust Ethereum 2.0 Client
source-archive: https://github.com/sigp/lighthouse/archive/refs/tags/v8.1.3.tar.gz
build-dependencies:
  - cmake
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: lighthouse
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lighthouse
  av: sudo av install brew:lighthouse
  brew: brew install lighthouse
  nix: nix profile install nixpkgs#lighthouse
provenance:
  formula: lighthouse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
