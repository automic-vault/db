id: brew:clisp
display-name: clisp
homepage: https://clisp.sourceforge.io/
repo: https://alpha.gnu.org/gnu/clisp/clisp-2.49.92.tar.bz2
docs: https://clisp.sourceforge.io/
package-manager:
  apk: clisp
  brew: clisp
  debian: clisp
  dnf: clisp
  macports: clisp
  nix: clisp
  pacman: clisp
  ubuntu: clisp
  zypper: clisp
package-manager-url: https://formulae.brew.sh/formula/clisp
version: 2.49.92
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: GNU CLISP, a Common Lisp implementation
source-archive: https://alpha.gnu.org/gnu/clisp/clisp-2.49.92.tar.bz2
dependencies:
  - libffcall
  - libsigsegv
  - readline
uses-from-macos:
  - libxcrypt
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: clisp
  - exposure: global executable
    kind: cli
    name: clisp-link
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add clisp
  av: sudo av install brew:clisp
  brew: brew install clisp
  debian: sudo apt install clisp
  dnf: sudo dnf install clisp
  macports: sudo port install clisp
  nix: nix profile install nixpkgs#clisp
  pacman: sudo pacman -S clisp
  ubuntu: sudo apt install clisp
  zypper: sudo zypper install clisp
provenance:
  formula: clisp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
