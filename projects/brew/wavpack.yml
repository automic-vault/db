id: brew:wavpack
display-name: wavpack
homepage: https://www.wavpack.com/
repo: https://www.wavpack.com/wavpack-5.9.0.tar.bz2
docs: https://www.wavpack.com/
package-manager:
  apk: wavpack
  brew: wavpack
  debian: wavpack
  dnf: wavpack
  macports: wavpack
  nix: wavpack
  pacman: wavpack
  scoop: main/wavpack
  ubuntu: wavpack
  zypper: wavpack
package-manager-url: https://formulae.brew.sh/formula/wavpack
version: 5.9.0
license: BSD-3-Clause
category: security
tags:
  - cli
description: Hybrid lossless audio compression
source-archive: https://www.wavpack.com/wavpack-5.9.0.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: wavpack
  - exposure: global executable
    kind: cli
    name: wvgain
  - exposure: global executable
    kind: cli
    name: wvtag
  - exposure: global executable
    kind: cli
    name: wvunpack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wavpack
  av: sudo av install brew:wavpack
  brew: brew install wavpack
  debian: sudo apt install wavpack
  dnf: sudo dnf install wavpack
  macports: sudo port install wavpack
  nix: nix profile install nixpkgs#wavpack
  pacman: sudo pacman -S wavpack
  scoop: scoop install main/wavpack
  ubuntu: sudo apt install wavpack
  zypper: sudo zypper install wavpack
provenance:
  formula: wavpack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
