id: brew:yosys
display-name: yosys
homepage: https://yosyshq.net/yosys/
repo: https://github.com/YosysHQ/yosys
docs: https://yosyshq.net/yosys/
package-manager:
  apk: yosys
  brew: yosys
  debian: yosys
  dnf: yosys
  nix: yosys
  pacman: yosys
  scoop: main/yosys
  ubuntu: yosys
package-manager-url: https://formulae.brew.sh/formula/yosys
version: 0.65
license: ISC
category: development
tags:
  - cli
description: Framework for Verilog RTL synthesis
source-archive: https://github.com/YosysHQ/yosys/releases/download/v0.65/yosys.tar.gz
dependencies:
  - libtommath
  - readline
  - tcl-tk
build-dependencies:
  - bison
  - flex
  - pkgconf
uses-from-macos:
  - libffi
  - python
executables:
  - exposure: global executable
    kind: cli
    name: yosys
  - exposure: global executable
    kind: cli
    name: yosys-abc
  - exposure: global executable
    kind: cli
    name: yosys-config
  - exposure: global executable
    kind: cli
    name: yosys-filterlib
  - exposure: global executable
    kind: cli
    name: yosys-smtbmc
  - exposure: global executable
    kind: cli
    name: yosys-witness
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yosys
  av: sudo av install brew:yosys
  brew: brew install yosys
  debian: sudo apt install yosys
  dnf: sudo dnf install yosys
  nix: nix profile install nixpkgs#yosys
  pacman: sudo pacman -S yosys
  scoop: scoop install main/yosys
  ubuntu: sudo apt install yosys
provenance:
  formula: yosys
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
