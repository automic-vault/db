id: brew:git-tools
display-name: git-tools
homepage: https://github.com/MestreLion/git-tools
repo: https://github.com/MestreLion/git-tools
docs: https://github.com/MestreLion/git-tools
package-manager:
  brew: git-tools
  debian: git-restore-mtime
  dnf: git-tools
  macports: git-tools
  nix: git-tools
  ubuntu: git-restore-mtime
package-manager-url: https://formulae.brew.sh/formula/git-tools
version: 2025.08
license: GPL-3.0-or-later
category: development
tags:
  - cli
  - git
description: Assorted git-related scripts and tools
source-archive: https://github.com/MestreLion/git-tools/archive/refs/tags/v2025.08.tar.gz
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: git-branches-rename
  - exposure: global executable
    kind: cli
    name: git-clone-subset
  - exposure: global executable
    kind: cli
    name: git-find-uncommitted-repos
  - exposure: global executable
    kind: cli
    name: git-rebase-theirs
  - exposure: global executable
    kind: cli
    name: git-restore-mtime
  - exposure: global executable
    kind: cli
    name: git-strip-merge
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-tools
  brew: brew install git-tools
  debian: sudo apt install git-restore-mtime
  dnf: sudo dnf install git-tools
  macports: sudo port install git-tools
  nix: nix profile install nixpkgs#git-tools
  ubuntu: sudo apt install git-restore-mtime
provenance:
  formula: git-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
