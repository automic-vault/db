id: brew:stellar-core
display-name: stellar-core
homepage: https://www.stellar.org/
repo: https://github.com/stellar/stellar-core
docs: https://www.stellar.org/
package-manager:
  brew: stellar-core
  nix: stellar-core
package-manager-url: https://formulae.brew.sh/formula/stellar-core
version: 26.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: Backbone of the Stellar (XLM) network
source-archive: https://github.com/stellar/stellar-core.git
dependencies:
  - libpq
  - libpqxx
  - libsodium
build-dependencies:
  - autoconf
  - automake
  - bison
  - libtool
  - pandoc
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: stellar-core
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stellar-core
  brew: brew install stellar-core
  nix: nix profile install nixpkgs#stellar-core
provenance:
  formula: stellar-core
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
