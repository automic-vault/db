id: brew:purr
display-name: purr
homepage: https://github.com/google/purr
repo: https://github.com/google/purr
docs: https://github.com/google/purr
package-manager:
  brew: purr
package-manager-url: https://formulae.brew.sh/formula/purr
version: 2.0.4
license: Apache-2.0
category: development
tags:
  - cli
description: Versatile zsh CLI tool for viewing and searching through Android logcat output
source-archive: https://github.com/google/purr/archive/refs/tags/2.0.4.tar.gz
dependencies:
  - fzf
build-dependencies:
  - gnu-sed
uses-from-macos:
  - zsh
executables:
  - exposure: global executable
    kind: cli
    name: purr
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    At runtime, adb must be accessible from your PATH. You can install adb from Homebrew
    Cask: brew install --cask android-platform-tools
  post-install-defined: false
install-lines:
  av: sudo av install brew:purr
  brew: brew install purr
provenance:
  formula: purr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
