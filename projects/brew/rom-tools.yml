id: brew:rom-tools
display-name: rom-tools
homepage: https://www.mamedev.org/
repo: https://github.com/mamedev/mame
docs: https://www.mamedev.org/
package-manager:
  brew: rom-tools
package-manager-url: https://formulae.brew.sh/formula/rom-tools
version: 0.287
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Tools for Multiple Arcade Machine Emulator
source-archive: https://github.com/mamedev/mame/archive/refs/tags/mame0287.tar.gz
dependencies:
  - flac
  - sdl3
  - utf8proc
  - zstd
build-dependencies:
  - asio
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: castool
  - exposure: global executable
    kind: cli
    name: chdman
  - exposure: global executable
    kind: cli
    name: floptool
  - exposure: global executable
    kind: cli
    name: imgtool
  - exposure: global executable
    kind: cli
    name: jedutil
  - exposure: global executable
    kind: cli
    name: ldresample
  - exposure: global executable
    kind: cli
    name: ldverify
  - exposure: global executable
    kind: cli
    name: nltool
  - exposure: global executable
    kind: cli
    name: nlwav
  - exposure: global executable
    kind: cli
    name: pngcmp
  - exposure: global executable
    kind: cli
    name: regrep
  - exposure: global executable
    kind: cli
    name: rom-split
  - exposure: global executable
    kind: cli
    name: romcmp
  - exposure: global executable
    kind: cli
    name: srcclean
  - exposure: global executable
    kind: cli
    name: testkeys
  - exposure: global executable
    kind: cli
    name: unidasm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rom-tools
  brew: brew install rom-tools
provenance:
  formula: rom-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
