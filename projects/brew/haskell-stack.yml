id: brew:haskell-stack
display-name: haskell-stack
homepage: https://haskellstack.org/
repo: https://github.com/commercialhaskell/stack
docs: https://haskellstack.org/
package-manager:
  apk: stack
  brew: haskell-stack
  chocolatey: haskell-stack
  debian: haskell-stack
  dnf: stack
  macports: stack
  nix: stack
  pacman: stack
  scoop: main/stack
  ubuntu: haskell-stack
  winget: commercialhaskell.stack
package-manager-url: https://formulae.brew.sh/formula/haskell-stack
version: 3.9.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: Cross-platform program for developing Haskell projects
source-archive: https://github.com/commercialhaskell/stack/archive/refs/tags/v3.9.3.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: stack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add stack
  av: sudo av install brew:haskell-stack
  brew: brew install haskell-stack
  chocolatey: choco install haskell-stack
  debian: sudo apt install haskell-stack
  dnf: sudo dnf install stack
  macports: sudo port install stack
  nix: nix profile install nixpkgs#stack
  pacman: sudo pacman -S stack
  scoop: scoop install main/stack
  ubuntu: sudo apt install haskell-stack
  winget: winget install --id commercialhaskell.stack -e
provenance:
  formula: haskell-stack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
