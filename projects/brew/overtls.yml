id: brew:overtls
display-name: overtls
homepage: https://github.com/ShadowsocksR-Live/overtls
repo: https://github.com/ShadowsocksR-Live/overtls
docs: https://github.com/ShadowsocksR-Live/overtls
package-manager:
  brew: overtls
package-manager-url: https://formulae.brew.sh/formula/overtls
version: 0.3.9
license: MIT
category: security
tags:
  - cli
description: Simple proxy tunnel for bypassing the GFW
source-archive: https://github.com/ShadowsocksR-Live/overtls/archive/refs/tags/v0.3.9.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: overtls-bin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:overtls
  brew: brew install overtls
provenance:
  formula: overtls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
