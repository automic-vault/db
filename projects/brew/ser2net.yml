id: brew:ser2net
display-name: ser2net
homepage: https://ser2net.sourceforge.net/
repo: https://downloads.sourceforge.net/project/ser2net/ser2net/ser2net-4.6.7.tar.gz
docs: https://ser2net.sourceforge.net/
package-manager:
  apk: ser2net
  brew: ser2net
  debian: ser2net
  dnf: ser2net
  nix: ser2net
  pacman: ser2net
  ubuntu: ser2net
  zypper: ser2net
package-manager-url: https://formulae.brew.sh/formula/ser2net
version: 4.6.7
license: GPL-2.0-only
category: network
tags:
  - cli
description: Allow network connections to serial ports
source-archive: https://downloads.sourceforge.net/project/ser2net/ser2net/ser2net-4.6.7.tar.gz
dependencies:
  - gensio
  - libyaml
executables:
  - exposure: global executable
    kind: cli
    name: ser2net
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To configure ser2net, edit the example configuration in
    $HOMEBREW_PREFIX/etc/ser2net/ser2net.yaml
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add ser2net
  av: sudo av install brew:ser2net
  brew: brew install ser2net
  debian: sudo apt install ser2net
  dnf: sudo dnf install ser2net
  nix: nix profile install nixpkgs#ser2net
  pacman: sudo pacman -S ser2net
  ubuntu: sudo apt install ser2net
  zypper: sudo zypper install ser2net
provenance:
  formula: ser2net
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
