id: brew:pgroll
display-name: pgroll
homepage: https://pgroll.com
repo: https://github.com/xataio/pgroll
docs: https://pgroll.com
package-manager:
  brew: pgroll
  macports: pgroll
  nix: pgroll
package-manager-url: https://formulae.brew.sh/formula/pgroll
version: 0.16.2
license: Apache-2.0
category: database
tags:
  - cli
description: Postgres zero-downtime migrations made easy
source-archive: https://github.com/xataio/pgroll/archive/refs/tags/v0.16.2.tar.gz
dependencies:
  - libpg_query
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pgroll
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pgroll
  brew: brew install pgroll
  macports: sudo port install pgroll
  nix: nix profile install nixpkgs#pgroll
provenance:
  formula: pgroll
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
