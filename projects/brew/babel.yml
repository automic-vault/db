id: brew:babel
display-name: babel
homepage: https://babeljs.io/
repo: https://registry.npmjs.org/@babel/cli/-/cli-7.29.7.tgz
docs: https://babeljs.io/
package-manager:
  brew: babel
  dnf: babel
package-manager-url: https://formulae.brew.sh/formula/babel
version: 7.29.7
license: MIT
category: development
tags:
  - cli
description: Compiler for writing next generation JavaScript
source-archive: https://registry.npmjs.org/@babel/cli/-/cli-7.29.7.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: babel
  - exposure: global executable
    kind: cli
    name: babel-external-helpers
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:babel
  brew: brew install babel
  dnf: sudo dnf install babel
provenance:
  formula: babel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
