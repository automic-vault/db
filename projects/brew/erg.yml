id: brew:erg
display-name: erg
homepage: https://github.com/erg-lang/erg
repo: https://github.com/erg-lang/erg
docs: https://github.com/erg-lang/erg
package-manager:
  brew: erg
  nix: erg
package-manager-url: https://formulae.brew.sh/formula/erg
version: 0.6.53
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Statically typed language that can deeply improve the Python ecosystem
source-archive: https://github.com/erg-lang/erg/archive/refs/tags/v0.6.53.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: erg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:erg
  brew: brew install erg
  nix: nix profile install nixpkgs#erg
provenance:
  formula: erg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
