id: brew:jbigkit
display-name: jbigkit
homepage: https://www.cl.cam.ac.uk/~mgk25/jbigkit/
repo: https://www.cl.cam.ac.uk/~mgk25/jbigkit/download/jbigkit-2.1.tar.gz
docs: https://www.cl.cam.ac.uk/~mgk25/jbigkit/
package-manager:
  apk: jbigkit
  brew: jbigkit
  dnf: jbigkit
  macports: jbigkit
  nix: jbigkit
  pacman: jbigkit
  zypper: jbigkit
package-manager-url: https://formulae.brew.sh/formula/jbigkit
version: 2.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: JBIG1 data compression standard implementation
source-archive: https://www.cl.cam.ac.uk/~mgk25/jbigkit/download/jbigkit-2.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: jbgtopbm
  - exposure: global executable
    kind: cli
    name: jbgtopbm85
  - exposure: global executable
    kind: cli
    name: pbmtojbg
  - exposure: global executable
    kind: cli
    name: pbmtojbg85
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jbigkit
  av: sudo av install brew:jbigkit
  brew: brew install jbigkit
  dnf: sudo dnf install jbigkit
  macports: sudo port install jbigkit
  nix: nix profile install nixpkgs#jbigkit
  pacman: sudo pacman -S jbigkit
  zypper: sudo zypper install jbigkit
provenance:
  formula: jbigkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
