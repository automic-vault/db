id: brew:help2man
display-name: help2man
homepage: https://www.gnu.org/software/help2man/
repo: https://ftpmirror.gnu.org/gnu/help2man/help2man-1.49.3.tar.xz
docs: https://www.gnu.org/software/help2man/
package-manager:
  apk: help2man
  brew: help2man
  debian: help2man
  dnf: help2man
  macports: help2man
  nix: help2man
  pacman: help2man
  ubuntu: help2man
  zypper: help2man
package-manager-url: https://formulae.brew.sh/formula/help2man
version: 1.49.3
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Automatically generate simple man pages
source-archive: https://ftpmirror.gnu.org/gnu/help2man/help2man-1.49.3.tar.xz
dependencies:
  - gettext
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: help2man
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add help2man
  av: sudo av install brew:help2man
  brew: brew install help2man
  debian: sudo apt install help2man
  dnf: sudo dnf install help2man
  macports: sudo port install help2man
  nix: nix profile install nixpkgs#help2man
  pacman: sudo pacman -S help2man
  ubuntu: sudo apt install help2man
  zypper: sudo zypper install help2man
provenance:
  formula: help2man
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
