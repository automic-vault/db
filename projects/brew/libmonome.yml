id: brew:libmonome
display-name: libmonome
homepage: https://monome.org/
repo: https://github.com/monome/libmonome
docs: https://monome.org/
package-manager:
  brew: libmonome
package-manager-url: https://formulae.brew.sh/formula/libmonome
version: 1.4.10
license: ISC
category: development
tags:
  - cli
description: Library for easy interaction with monome devices
source-archive: https://github.com/monome/libmonome/archive/refs/tags/v1.4.10.tar.gz
dependencies:
  - liblo
executables:
  - exposure: global executable
    kind: cli
    name: monomeserial
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libmonome
  brew: brew install libmonome
provenance:
  formula: libmonome
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
