id: brew:clippy
display-name: clippy
homepage: https://github.com/neilberkman/clippy
repo: https://github.com/neilberkman/clippy
docs: https://github.com/neilberkman/clippy
package-manager:
  brew: clippy
  dnf: clippy
  winget: 0-don.clippy
package-manager-url: https://formulae.brew.sh/formula/clippy
version: 1.6.9
license: MIT
category: development
tags:
  - cli
description: Copy files from your terminal that actually paste into GUI apps
source-archive: https://github.com/neilberkman/clippy/archive/refs/tags/v1.6.9.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: clippy
  - exposure: global executable
    kind: cli
    name: pasty
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clippy
  brew: brew install clippy
  dnf: sudo dnf install clippy
  winget: winget install --id 0-don.clippy -e
provenance:
  formula: clippy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
