id: brew:pgpdump
display-name: pgpdump
homepage: https://www.mew.org/~kazu/proj/pgpdump/en/
repo: https://github.com/kazu-yamamoto/pgpdump
docs: https://www.mew.org/~kazu/proj/pgpdump/en/
package-manager:
  brew: pgpdump
  debian: pgpdump
  dnf: pgpdump
  macports: pgpdump
  nix: pgpdump
  pacman: pgpdump
  ubuntu: pgpdump
  zypper: pgpdump
package-manager-url: https://formulae.brew.sh/formula/pgpdump
version: 0.37
license: BSD-3-Clause
category: development
tags:
  - cli
description: PGP packet visualizer
source-archive: https://github.com/kazu-yamamoto/pgpdump/archive/refs/tags/v0.37.tar.gz
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: pgpdump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pgpdump
  brew: brew install pgpdump
  debian: sudo apt install pgpdump
  dnf: sudo dnf install pgpdump
  macports: sudo port install pgpdump
  nix: nix profile install nixpkgs#pgpdump
  pacman: sudo pacman -S pgpdump
  ubuntu: sudo apt install pgpdump
  zypper: sudo zypper install pgpdump
provenance:
  formula: pgpdump
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
