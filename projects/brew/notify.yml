id: brew:notify
display-name: notify
homepage: https://docs.projectdiscovery.io/tools/notify/overview
repo: https://github.com/projectdiscovery/notify
docs: https://docs.projectdiscovery.io/tools/notify/overview
package-manager:
  brew: notify
  nix: notify
package-manager-url: https://formulae.brew.sh/formula/notify
version: 1.0.7
license: MIT
category: development
tags:
  - cli
description: Stream the output of any CLI and publish it to a variety of supported platforms
source-archive: https://github.com/projectdiscovery/notify/archive/refs/tags/v1.0.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: notify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:notify
  brew: brew install notify
  nix: nix profile install nixpkgs#notify
provenance:
  formula: notify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
