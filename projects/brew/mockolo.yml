id: brew:mockolo
display-name: mockolo
homepage: https://github.com/uber/mockolo
repo: https://github.com/uber/mockolo
docs: https://github.com/uber/mockolo
package-manager:
  brew: mockolo
package-manager-url: https://formulae.brew.sh/formula/mockolo
version: 2.6.1
license: Apache-2.0
category: development
tags:
  - cli
description: Efficient Mock Generator for Swift
source-archive: https://github.com/uber/mockolo/archive/refs/tags/2.6.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mockolo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mockolo
  brew: brew install mockolo
provenance:
  formula: mockolo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
