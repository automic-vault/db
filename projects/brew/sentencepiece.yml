id: brew:sentencepiece
display-name: sentencepiece
homepage: https://github.com/google/sentencepiece
repo: https://github.com/google/sentencepiece
docs: https://github.com/google/sentencepiece
package-manager:
  brew: sentencepiece
  debian: sentencepiece
  macports: sentencepiece
  nix: sentencepiece
  ubuntu: sentencepiece
package-manager-url: https://formulae.brew.sh/formula/sentencepiece
version: 0.2.1
license: Apache-2.0
category: development
tags:
  - cli
description: Unsupervised text tokenizer and detokenizer
source-archive: https://github.com/google/sentencepiece/archive/refs/tags/v0.2.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: spm_decode
  - exposure: global executable
    kind: cli
    name: spm_encode
  - exposure: global executable
    kind: cli
    name: spm_export_vocab
  - exposure: global executable
    kind: cli
    name: spm_normalize
  - exposure: global executable
    kind: cli
    name: spm_train
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sentencepiece
  brew: brew install sentencepiece
  debian: sudo apt install sentencepiece
  macports: sudo port install sentencepiece
  nix: nix profile install nixpkgs#sentencepiece
  ubuntu: sudo apt install sentencepiece
provenance:
  formula: sentencepiece
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
