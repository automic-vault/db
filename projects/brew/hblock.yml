id: brew:hblock
display-name: hblock
homepage: https://hblock.molinero.dev/
repo: https://github.com/hectorm/hblock
docs: https://hblock.molinero.dev/
package-manager:
  brew: hblock
  nix: hblock
  pacman: hblock
package-manager-url: https://formulae.brew.sh/formula/hblock
version: 3.5.1
license: MIT
category: development
tags:
  - cli
description: Adblocker that creates a hosts file from multiple sources
source-archive: https://github.com/hectorm/hblock/archive/refs/tags/v3.5.1.tar.gz
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: hblock
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hblock
  brew: brew install hblock
  nix: nix profile install nixpkgs#hblock
  pacman: sudo pacman -S hblock
provenance:
  formula: hblock
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
