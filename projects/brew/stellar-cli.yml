id: brew:stellar-cli
display-name: stellar-cli
homepage: https://developers.stellar.org
repo: https://static.crates.io/crates/stellar-cli/stellar-cli-26.0.0.crate
docs: https://developers.stellar.org
package-manager:
  brew: stellar-cli
  winget: Stellar.StellarCLI
package-manager-url: https://formulae.brew.sh/formula/stellar-cli
version: 26.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: Stellar command-line tool for interacting with the Stellar network
source-archive: https://static.crates.io/crates/stellar-cli/stellar-cli-26.0.0.crate
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: stellar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stellar-cli
  brew: brew install stellar-cli
  winget: winget install --id Stellar.StellarCLI -e
provenance:
  formula: stellar-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
