id: brew:chainhook
display-name: chainhook
homepage: https://github.com/hirosystems/chainhook
repo: https://github.com/hirosystems/chainhook
docs: https://github.com/hirosystems/chainhook
package-manager:
  brew: chainhook
  winget: HiroSystems.Chainhook
package-manager-url: https://formulae.brew.sh/formula/chainhook
version: 1.9.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Reorg-aware indexing engine for the Stacks & Bitcoin blockchains
source-archive: https://github.com/hirosystems/chainhook/archive/refs/tags/v1.9.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: chainhook
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chainhook
  brew: brew install chainhook
  winget: winget install --id HiroSystems.Chainhook -e
provenance:
  formula: chainhook
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
