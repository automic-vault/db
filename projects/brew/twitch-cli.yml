id: brew:twitch-cli
display-name: twitch-cli
homepage: https://github.com/twitchdev/twitch-cli
repo: https://github.com/twitchdev/twitch-cli
docs: https://github.com/twitchdev/twitch-cli
package-manager:
  brew: twitch-cli
  chocolatey: twitch
  nix: twitch-cli
  winget: Twitch.TwitchCLI
package-manager-url: https://formulae.brew.sh/formula/twitch-cli
version: 1.1.25
license: Apache-2.0
category: development
tags:
  - cli
description: CLI to make developing on Twitch easier
source-archive: https://github.com/twitchdev/twitch-cli/archive/refs/tags/v1.1.25.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: twitch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:twitch-cli
  brew: brew install twitch-cli
  chocolatey: choco install twitch
  nix: nix profile install nixpkgs#twitch-cli
  winget: winget install --id Twitch.TwitchCLI -e
provenance:
  formula: twitch-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
