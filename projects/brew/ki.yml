id: brew:ki
display-name: ki
homepage: https://github.com/Kotlin/kotlin-interactive-shell
repo: https://github.com/Kotlin/kotlin-interactive-shell
docs: https://github.com/Kotlin/kotlin-interactive-shell
package-manager:
  brew: ki
  nix: ki
package-manager-url: https://formulae.brew.sh/formula/ki
version: 0.5.2
license: Apache-2.0
category: development
tags:
  - cli
description: Kotlin Language Interactive Shell
source-archive: https://github.com/Kotlin/kotlin-interactive-shell/archive/refs/tags/v0.5.2.tar.gz
dependencies:
  - openjdk@21
build-dependencies:
  - maven
executables:
  - exposure: global executable
    kind: cli
    name: ki
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ki
  brew: brew install ki
  nix: nix profile install nixpkgs#ki
provenance:
  formula: ki
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
