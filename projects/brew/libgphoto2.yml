id: brew:libgphoto2
display-name: libgphoto2
homepage: http://www.gphoto.org/proj/libgphoto2/
repo: >
  https://downloads.sourceforge.net/project/gphoto/libgphoto/2.5.33/libgphoto2-2.5.33.tar.bz2
docs: http://www.gphoto.org/proj/libgphoto2/
package-manager:
  apk: libgphoto2
  brew: libgphoto2
  dnf: libgphoto2
  macports: libgphoto2
  nix: libgphoto2
  pacman: libgphoto2
package-manager-url: https://formulae.brew.sh/formula/libgphoto2
version: 2.5.33
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Gphoto2 digital camera library
source-archive: >
  https://downloads.sourceforge.net/project/gphoto/libgphoto/2.5.33/libgphoto2-2.5.33.tar.bz2
dependencies:
  - gd
  - gettext
  - jpeg-turbo
  - libexif
  - libtool
  - libusb
  - libusb-compat
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: gphoto2-config
  - exposure: global executable
    kind: cli
    name: gphoto2-port-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libgphoto2
  av: sudo av install brew:libgphoto2
  brew: brew install libgphoto2
  dnf: sudo dnf install libgphoto2
  macports: sudo port install libgphoto2
  nix: nix profile install nixpkgs#libgphoto2
  pacman: sudo pacman -S libgphoto2
provenance:
  formula: libgphoto2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
