repo: https://github.com/waydabber/m1ddc
docs: https://github.com/waydabber/m1ddc
package-manager:
  brew: m1ddc
  macports: m1ddc
  nix: m1ddc
package-manager-url: https://formulae.brew.sh/formula/m1ddc
version: 1.2.0
license: MIT
