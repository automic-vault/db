id: brew:uutils-diffutils
display-name: uutils-diffutils
homepage: https://uutils.github.io/diffutils/
repo: https://github.com/uutils/diffutils
docs: https://uutils.github.io/diffutils/
package-manager:
  apk: diffutils
  brew: uutils-diffutils
  chocolatey: diffutils
  debian: diffutils
  dnf: diffutils
  macports: diffutils
  nix: uutils-diffutils
  pacman: diffutils
  scoop: main/diffutils
  ubuntu: diffutils
  winget: uutils.diffutils
  zypper: diffutils
package-manager-url: https://formulae.brew.sh/formula/uutils-diffutils
version: 0.5.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Cross-platform Rust rewrite of the GNU diffutils
source-archive: https://github.com/uutils/diffutils/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: diffutils
  - exposure: global executable
    kind: cli
    name: udiffutils
  - exposure: global executable
    kind: cli
    name: uu-cmp
  - exposure: global executable
    kind: cli
    name: uu-diff
  - exposure: global executable
    kind: cli
    name: uu-diffutils
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    All commands have been installed with the prefix "uu-". If you need to use these
    commands with their normal names, you can add a "uubin" directory to your PATH from
    your bashrc like: PATH="$HOMEBREW_PREFIX/opt/uutils-diffutils/libexec/uubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add diffutils
  av: sudo av install brew:uutils-diffutils
  brew: brew install uutils-diffutils
  chocolatey: choco install diffutils
  debian: sudo apt install diffutils
  dnf: sudo dnf install diffutils
  macports: sudo port install diffutils
  nix: nix profile install nixpkgs#uutils-diffutils
  pacman: sudo pacman -S diffutils
  scoop: scoop install main/diffutils
  ubuntu: sudo apt install diffutils
  winget: winget install --id uutils.diffutils -e
  zypper: sudo zypper install diffutils
provenance:
  formula: uutils-diffutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
