id: brew:trdsql
display-name: trdsql
homepage: https://github.com/noborus/trdsql
repo: https://github.com/noborus/trdsql
docs: https://github.com/noborus/trdsql
package-manager:
  brew: trdsql
  macports: trdsql
  nix: trdsql
package-manager-url: https://formulae.brew.sh/formula/trdsql
version: 1.2.1
license: MIT
category: database
tags:
  - cli
  - json
  - yaml
description: CLI tool that can execute SQL queries on CSV, LTSV, JSON, YAML and TBLN
source-archive: https://github.com/noborus/trdsql/archive/refs/tags/v1.2.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: trdsql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:trdsql
  brew: brew install trdsql
  macports: sudo port install trdsql
  nix: nix profile install nixpkgs#trdsql
provenance:
  formula: trdsql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
