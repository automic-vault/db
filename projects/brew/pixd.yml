id: brew:pixd
display-name: pixd
homepage: https://github.com/FireyFly/pixd
repo: https://github.com/FireyFly/pixd
docs: https://github.com/FireyFly/pixd
package-manager:
  brew: pixd
  nix: pixd
  zypper: pixd
package-manager-url: https://formulae.brew.sh/formula/pixd
version: 1.0.0
license: MIT
category: development
tags:
  - cli
description: Visual binary data using a colour palette
source-archive: https://github.com/FireyFly/pixd/archive/refs/tags/v1.0.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: pixd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pixd
  brew: brew install pixd
  nix: nix profile install nixpkgs#pixd
  zypper: sudo zypper install pixd
provenance:
  formula: pixd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
