id: brew:libicns
display-name: libicns
homepage: https://icns.sourceforge.io/
repo: https://downloads.sourceforge.net/project/icns/libicns-0.8.1.tar.gz
docs: https://icns.sourceforge.io/
package-manager:
  brew: libicns
  dnf: libicns
  macports: libicns
  nix: libicns
  pacman: libicns
package-manager-url: https://formulae.brew.sh/formula/libicns
version: 0.8.1
license: LGPL-2.0-or-later OR LGPL-2.1-or-later
category: development
tags:
  - cli
description: Library for manipulation of the macOS .icns resource format
source-archive: https://downloads.sourceforge.net/project/icns/libicns-0.8.1.tar.gz
dependencies:
  - jasper
  - libpng
executables:
  - exposure: global executable
    kind: cli
    name: icns2png
  - exposure: global executable
    kind: cli
    name: icontainer2icns
  - exposure: global executable
    kind: cli
    name: png2icns
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libicns
  brew: brew install libicns
  dnf: sudo dnf install libicns
  macports: sudo port install libicns
  nix: nix profile install nixpkgs#libicns
  pacman: sudo pacman -S libicns
provenance:
  formula: libicns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
