id: brew:notmuch-mutt
display-name: notmuch-mutt
homepage: https://notmuchmail.org/
repo: https://notmuchmail.org/releases/notmuch-0.40.tar.xz
docs: https://notmuchmail.org/
package-manager:
  brew: notmuch-mutt
  debian: notmuch-mutt
  dnf: notmuch-mutt
  nix: notmuch-mutt
  pacman: notmuch-mutt
  ubuntu: notmuch-mutt
package-manager-url: https://formulae.brew.sh/formula/notmuch-mutt
version: 0.40
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Notmuch integration for Mutt
source-archive: https://notmuchmail.org/releases/notmuch-0.40.tar.xz
dependencies:
  - notmuch
  - readline
uses-from-macos:
  - ncurses
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: notmuch-mutt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:notmuch-mutt
  brew: brew install notmuch-mutt
  debian: sudo apt install notmuch-mutt
  dnf: sudo dnf install notmuch-mutt
  nix: nix profile install nixpkgs#notmuch-mutt
  pacman: sudo pacman -S notmuch-mutt
  ubuntu: sudo apt install notmuch-mutt
provenance:
  formula: notmuch-mutt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
