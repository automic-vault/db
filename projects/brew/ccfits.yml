id: brew:ccfits
display-name: ccfits
homepage: https://heasarc.gsfc.nasa.gov/docs/software/fitsio/CCfits/
repo: https://heasarc.gsfc.nasa.gov/FTP/software/fitsio/ccfits/v2.7/CCfits-2.7.tar.gz
docs: https://heasarc.gsfc.nasa.gov/docs/software/fitsio/CCfits/
package-manager:
  brew: ccfits
  dnf: CCfits
  macports: ccfits
  pacman: ccfits
package-manager-url: https://formulae.brew.sh/formula/ccfits
version: 2.7
license: CFITSIO
category: network
tags:
  - cli
description: Object oriented interface to the cfitsio library
source-archive: https://heasarc.gsfc.nasa.gov/FTP/software/fitsio/ccfits/v2.7/CCfits-2.7.tar.gz
dependencies:
  - cfitsio
executables:
  - exposure: global executable
    kind: cli
    name: cookbook
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ccfits
  brew: brew install ccfits
  dnf: sudo dnf install CCfits
  macports: sudo port install ccfits
  pacman: sudo pacman -S ccfits
provenance:
  formula: ccfits
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
