id: brew:cue
display-name: cue
homepage: https://cuelang.org/
repo: https://github.com/cue-lang/cue
docs: https://cuelang.org/
package-manager:
  brew: cue
  macports: cue
  nix: cue
  pacman: cue
  scoop: main/cue
  winget: CueLang.Cue
package-manager-url: https://formulae.brew.sh/formula/cue
version: 0.16.1
license: Apache-2.0
category: development
tags:
  - cli
description: Validate and define text-based and dynamic configuration
source-archive: https://github.com/cue-lang/cue.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cue
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cue
  brew: brew install cue
  macports: sudo port install cue
  nix: nix profile install nixpkgs#cue
  pacman: sudo pacman -S cue
  scoop: scoop install main/cue
  winget: winget install --id CueLang.Cue -e
provenance:
  formula: cue
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
