id: brew:neosync
display-name: neosync
homepage: https://www.neosync.dev/
repo: https://github.com/nucleuscloud/neosync
docs: https://www.neosync.dev/
package-manager:
  brew: neosync
package-manager-url: https://formulae.brew.sh/formula/neosync
version: 0.5.41
license: MIT
category: cloud
tags:
  - cli
description: CLI for interfacing with Neosync
source-archive: https://github.com/nucleuscloud/neosync/archive/refs/tags/v0.5.41.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: neosync
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:neosync
  brew: brew install neosync
provenance:
  formula: neosync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
