id: brew:datafusion
display-name: datafusion
homepage: https://arrow.apache.org/datafusion
repo: >
  https://www.apache.org/dyn/closer.lua?path=datafusion/datafusion-53.1.0/apache-datafusion-53.1.0.tar.gz
docs: https://arrow.apache.org/datafusion
package-manager:
  brew: datafusion
  nix: datafusion-cli
package-manager-url: https://formulae.brew.sh/formula/datafusion
version: 53.1.0
license: Apache-2.0
category: network
tags:
  - cli
description: Apache Arrow DataFusion and Ballista query engines
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=datafusion/datafusion-53.1.0/apache-datafusion-53.1.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: datafusion-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:datafusion
  brew: brew install datafusion
  nix: nix profile install nixpkgs#datafusion-cli
provenance:
  formula: datafusion
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
