id: brew:pyscn
display-name: pyscn
homepage: https://github.com/ludo-technologies/pyscn
repo: https://github.com/ludo-technologies/pyscn
docs: https://github.com/ludo-technologies/pyscn
package-manager:
  brew: pyscn
package-manager-url: https://formulae.brew.sh/formula/pyscn
version: 1.22.3
license: MIT
category: development
tags:
