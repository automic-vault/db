id: brew:clamav
display-name: clamav
homepage: https://www.clamav.net/
repo: https://github.com/Cisco-Talos/clamav
docs: https://www.clamav.net/
package-manager:
  apk: clamav
  brew: clamav
  chocolatey: clamav
  debian: clamav
  dnf: clamav
  macports: clamav
  nix: clamav
  pacman: clamav
  scoop: extras/clamav
  ubuntu: clamav
  winget: Cisco.ClamAV
  zypper: clamav
package-manager-url: https://formulae.brew.sh/formula/clamav
version: 1.5.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Anti-virus software
source-archive: https://github.com/Cisco-Talos/clamav/releases/download/clamav-1.5.2/clamav-1.5.2.tar.gz
dependencies:
  - json-c
  - openssl@3
  - pcre2
  - yara
build-dependencies:
  - cmake
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
  - curl
  - libxml2
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: clamav-config
  - exposure: global executable
    kind: cli
    name: clambc
  - exposure: global executable
    kind: cli
    name: clamconf
  - exposure: global executable
    kind: cli
    name: clamd
  - exposure: global executable
    kind: cli
    name: clamdscan
  - exposure: global executable
    kind: cli
    name: clamdtop
  - exposure: global executable
    kind: cli
    name: clamonacc
  - exposure: global executable
    kind: cli
    name: clamscan
  - exposure: global executable
    kind: cli
    name: clamsubmit
  - exposure: global executable
    kind: cli
    name: freshclam
  - exposure: global executable
    kind: cli
    name: sigtool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To finish installation & run clamav you will need to edit the example conf files at
    $HOMEBREW_PREFIX/etc/clamav/
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add clamav
  av: sudo av install brew:clamav
  brew: brew install clamav
  chocolatey: choco install clamav
  debian: sudo apt install clamav
  dnf: sudo dnf install clamav
  macports: sudo port install clamav
  nix: nix profile install nixpkgs#clamav
  pacman: sudo pacman -S clamav
  scoop: scoop install extras/clamav
  ubuntu: sudo apt install clamav
  winget: winget install --id Cisco.ClamAV -e
  zypper: sudo zypper install clamav
provenance:
  formula: clamav
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
