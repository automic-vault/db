id: brew:structurizr
display-name: structurizr
homepage: https://structurizr.com/
repo: https://github.com/structurizr/structurizr
docs: https://structurizr.com/
package-manager:
  brew: structurizr
package-manager-url: https://formulae.brew.sh/formula/structurizr
version: 2026.05.22
license: Apache-2.0
category: development
tags:
  - cli
description: Software architecture models as code
source-archive: https://github.com/structurizr/structurizr/archive/refs/tags/v2026.05.22.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - maven
executables:
  - exposure: global executable
    kind: cli
    name: structurizr
  - exposure: global executable
    kind: cli
    name: structurizr-mcp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
