id: brew:libpng
display-name: libpng
homepage: https://www.libpng.org/pub/png/libpng.html
repo: https://downloads.sourceforge.net/project/libpng/libpng16/1.6.58/libpng-1.6.58.tar.xz
docs: https://www.libpng.org/pub/png/libpng.html
package-manager:
  apk: libpng
  brew: libpng
  dnf: libpng
  macports: libpng
  nix: libpng
  pacman: libpng
package-manager-url: https://formulae.brew.sh/formula/libpng
version: 1.6.58
license: libpng-2.0
category: media
tags:
  - cli
description: Library for manipulating PNG images
source-archive: https://downloads.sourceforge.net/project/libpng/libpng16/1.6.58/libpng-1.6.58.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: libpng-config
  - exposure: global executable
    kind: cli
    name: libpng16-config
  - exposure: global executable
    kind: cli
    name: png-fix-itxt
  - exposure: global executable
    kind: cli
    name: pngfix
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libpng
  av: sudo av install brew:libpng
  brew: brew install libpng
  dnf: sudo dnf install libpng
  macports: sudo port install libpng
  nix: nix profile install nixpkgs#libpng
  pacman: sudo pacman -S libpng
provenance:
  formula: libpng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
