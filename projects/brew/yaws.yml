id: brew:yaws
display-name: yaws
homepage: https://erlyaws.github.io/
repo: https://github.com/erlyaws/yaws
docs: https://erlyaws.github.io/
package-manager:
  brew: yaws
  debian: yaws
  macports: yaws
  nix: yaws
  ubuntu: yaws
package-manager-url: https://formulae.brew.sh/formula/yaws
version: 2.2.0
license: BSD-3-Clause
category: cloud
tags:
  - cli
description: Webserver for dynamic content (written in Erlang)
source-archive: https://github.com/erlyaws/yaws/archive/refs/tags/yaws-2.2.0.tar.gz
dependencies:
  - erlang
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: yaws
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yaws
  brew: brew install yaws
  debian: sudo apt install yaws
  macports: sudo port install yaws
  nix: nix profile install nixpkgs#yaws
  ubuntu: sudo apt install yaws
provenance:
  formula: yaws
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
