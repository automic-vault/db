id: brew:ttyplot
display-name: ttyplot
homepage: https://github.com/tenox7/ttyplot
repo: https://github.com/tenox7/ttyplot
docs: https://github.com/tenox7/ttyplot
package-manager:
  apk: ttyplot
  brew: ttyplot
  debian: ttyplot
  dnf: ttyplot
  nix: ttyplot
  ubuntu: ttyplot
  zypper: ttyplot
package-manager-url: https://formulae.brew.sh/formula/ttyplot
version: 1.7.1
license: Apache-2.0
category: development
tags:
  - cli
description: Realtime plotting utility for terminal with data input from stdin
source-archive: https://github.com/tenox7/ttyplot/archive/refs/tags/1.7.1.tar.gz
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ttyplot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ttyplot
  av: sudo av install brew:ttyplot
  brew: brew install ttyplot
  debian: sudo apt install ttyplot
  dnf: sudo dnf install ttyplot
  nix: nix profile install nixpkgs#ttyplot
  ubuntu: sudo apt install ttyplot
  zypper: sudo zypper install ttyplot
provenance:
  formula: ttyplot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
