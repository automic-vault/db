id: brew:git-cinnabar
display-name: git-cinnabar
homepage: https://github.com/glandium/git-cinnabar
repo: https://static.crates.io/crates/git-cinnabar/git-cinnabar-0.7.3.crate
docs: https://github.com/glandium/git-cinnabar
package-manager:
  brew: git-cinnabar
  debian: git-cinnabar
  dnf: git-cinnabar
  macports: git-cinnabar
  nix: git-cinnabar
  pacman: git-cinnabar
package-manager-url: https://formulae.brew.sh/formula/git-cinnabar
version: 0.7.3
license: MPL-2.0 AND GPL-2.0-only
category: development
tags:
  - cli
  - git
description: Git remote helper to interact with mercurial repositories
source-archive: https://static.crates.io/crates/git-cinnabar/git-cinnabar-0.7.3.crate
dependencies:
  - mercurial
build-dependencies:
  - rust
uses-from-macos:
  - bzip2
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: git-cinnabar
  - exposure: global executable
    kind: cli
    name: git-remote-hg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-cinnabar
  brew: brew install git-cinnabar
  debian: sudo apt install git-cinnabar
  dnf: sudo dnf install git-cinnabar
  macports: sudo port install git-cinnabar
  nix: nix profile install nixpkgs#git-cinnabar
  pacman: sudo pacman -S git-cinnabar
provenance:
  formula: git-cinnabar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
