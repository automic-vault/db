id: brew:plantuml
display-name: plantuml
homepage: https://plantuml.com/
repo: https://github.com/plantuml/plantuml
docs: https://plantuml.com/
package-manager:
  apk: plantuml
  brew: plantuml
  chocolatey: plantuml
  debian: plantuml
  dnf: plantuml
  macports: plantuml
  nix: plantuml
  pacman: plantuml
  scoop: extras/plantuml
  ubuntu: plantuml
  zypper: plantuml
package-manager-url: https://formulae.brew.sh/formula/plantuml
version: 1.2026.4
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Draw UML diagrams
source-archive: https://github.com/plantuml/plantuml/releases/download/v1.2026.4/plantuml-1.2026.4.jar
dependencies:
  - graphviz
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: plantuml
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add plantuml
  av: sudo av install brew:plantuml
  brew: brew install plantuml
  chocolatey: choco install plantuml
  debian: sudo apt install plantuml
  dnf: sudo dnf install plantuml
  macports: sudo port install plantuml
  nix: nix profile install nixpkgs#plantuml
  pacman: sudo pacman -S plantuml
  scoop: scoop install extras/plantuml
  ubuntu: sudo apt install plantuml
  zypper: sudo zypper install plantuml
provenance:
  formula: plantuml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
