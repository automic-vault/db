id: brew:mlc
display-name: mlc
homepage: https://github.com/becheran/mlc
repo: https://github.com/becheran/mlc
docs: https://github.com/becheran/mlc
package-manager:
  brew: mlc
  nix: mlc
package-manager-url: https://formulae.brew.sh/formula/mlc
version: 1.2.0
license: MIT
category: development
tags:
  - cli
description: Check for broken links in markup files
source-archive: https://github.com/becheran/mlc/archive/refs/tags/v1.2.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mlc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mlc
  brew: brew install mlc
  nix: nix profile install nixpkgs#mlc
provenance:
  formula: mlc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
