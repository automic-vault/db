id: brew:uffizzi
display-name: uffizzi
homepage: https://uffizzi.com
repo: https://github.com/UffizziCloud/uffizzi_cli
docs: https://uffizzi.com
package-manager:
  brew: uffizzi
  debian: faker
  dnf: launchy
  pacman: launchy
  scoop: extras/launchy
  ubuntu: faker
  winget: CodeJelly.Launchy
package-manager-url: https://formulae.brew.sh/formula/uffizzi
version: 2.4.21
license: Apache-2.0
category: cloud
tags:
  - cli
description: Self-serve developer platforms in minutes, not months with k8s virtual clusters
source-archive: https://github.com/UffizziCloud/uffizzi_cli/archive/refs/tags/v2.4.21.tar.gz
dependencies:
  - ruby
  - skaffold
executables:
  - exposure: global executable
    kind: cli
    name: faker
  - exposure: global executable
    kind: cli
    name: launchy
  - exposure: global executable
    kind: cli
    name: setup
  - exposure: global executable
    kind: cli
    name: thor
  - exposure: global executable
    kind: cli
    name: uffizzi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:uffizzi
  brew: brew install uffizzi
  debian: sudo apt install faker
  dnf: sudo dnf install launchy
  pacman: sudo pacman -S launchy
  scoop: scoop install extras/launchy
  ubuntu: sudo apt install faker
  winget: winget install --id CodeJelly.Launchy -e
provenance:
  formula: uffizzi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
