id: brew:bagel
display-name: bagel
homepage: https://boostsecurityio.github.io/bagel/
repo: https://github.com/boostsecurityio/bagel
docs: https://boostsecurityio.github.io/bagel/
package-manager:
  brew: bagel
  debian: bagel
  ubuntu: bagel
package-manager-url: https://formulae.brew.sh/formula/bagel
version: 0.7.0
license: GPL-3.0-or-later
category: security
tags:
  - cli
description: CLI to audit posture and evaluate compromise blast radius
source-archive: https://github.com/boostsecurityio/bagel/archive/refs/tags/v0.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bagel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bagel
  brew: brew install bagel
  debian: sudo apt install bagel
  ubuntu: sudo apt install bagel
provenance:
  formula: bagel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
