bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sleuthkit
  av: sudo av install brew:sleuthkit
  brew: brew install sleuthkit
  debian: sudo apt install sleuthkit
  dnf: sudo dnf install sleuthkit
  macports: sudo port install sleuthkit
  nix: nix profile install nixpkgs#sleuthkit
  pacman: sudo pacman -S sleuthkit
  scoop: scoop install main/sleuthkit
  ubuntu: sudo apt install sleuthkit
  winget: winget install --id Nvidia.ICAT -e
  zypper: sudo zypper install sleuthkit
provenance:
  formula: sleuthkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
