  brew: sleuthkit
  debian: sleuthkit
  dnf: sleuthkit
  macports: sleuthkit
  nix: sleuthkit
  pacman: sleuthkit
  scoop: main/sleuthkit
  ubuntu: sleuthkit
  winget: Nvidia.ICAT
