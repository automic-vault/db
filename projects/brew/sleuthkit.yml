package-manager-url: https://formulae.brew.sh/formula/sleuthkit
version: 4.15.0
license: IPL-1.0 AND CPL-1.0 AND GPL-2.0-or-later
category: development
tags:
  - cli
description: Forensic toolkit
source-archive: >
  https://github.com/sleuthkit/sleuthkit/releases/download/sleuthkit-4.15.0/sleuthkit-4.15.0.tar.gz
dependencies:
