id: brew:mkclean
display-name: mkclean
homepage: https://www.matroska.org/downloads/mkclean.html
repo: https://downloads.sourceforge.net/project/matroska/mkclean/mkclean-0.9.0.tar.bz2
docs: https://www.matroska.org/downloads/mkclean.html
package-manager:
  brew: mkclean
  nix: mkclean
package-manager-url: https://formulae.brew.sh/formula/mkclean
version: 0.9.0
license: BSD-3-Clause
category: network
tags:
  - cli
description: Optimizes Matroska and WebM files
source-archive: https://downloads.sourceforge.net/project/matroska/mkclean/mkclean-0.9.0.tar.bz2
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: mkclean
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mkclean
  brew: brew install mkclean
  nix: nix profile install nixpkgs#mkclean
provenance:
  formula: mkclean
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
