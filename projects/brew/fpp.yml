id: brew:fpp
display-name: fpp
homepage: https://facebook.github.io/PathPicker/
repo: https://github.com/facebook/PathPicker
docs: https://facebook.github.io/PathPicker/
package-manager:
  apk: fpp
  brew: fpp
  macports: fpp
  nix: fpp
package-manager-url: https://formulae.brew.sh/formula/fpp
version: 0.9.5
license: MIT
category: development
tags:
  - cli
description: CLI program that accepts piped input and presents files for selection
source-archive: https://github.com/facebook/PathPicker/archive/refs/tags/0.9.5.tar.gz
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: fpp
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fpp
  av: sudo av install brew:fpp
  brew: brew install fpp
  macports: sudo port install fpp
  nix: nix profile install nixpkgs#fpp
provenance:
  formula: fpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
