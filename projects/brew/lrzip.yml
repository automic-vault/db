id: brew:lrzip
display-name: lrzip
homepage: http://lrzip.kolivas.org
repo: http://ck.kolivas.org/apps/lrzip/lrzip-0.641.tar.xz
docs: http://lrzip.kolivas.org
package-manager:
  apk: lrzip
  brew: lrzip
  debian: lrzip
  macports: lrzip
  nix: lrzip
  pacman: lrzip
  ubuntu: lrzip
  zypper: lrzip
package-manager-url: https://formulae.brew.sh/formula/lrzip
version: 0.641
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Compression program with a very high compression ratio
source-archive: http://ck.kolivas.org/apps/lrzip/lrzip-0.641.tar.xz
dependencies:
  - lz4
  - lzo
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: lrunzip
  - exposure: global executable
    kind: cli
    name: lrzcat
  - exposure: global executable
    kind: cli
    name: lrzip
  - exposure: global executable
    kind: cli
    name: lrztar
  - exposure: global executable
    kind: cli
    name: lrzuntar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lrzip
  av: sudo av install brew:lrzip
  brew: brew install lrzip
  debian: sudo apt install lrzip
  macports: sudo port install lrzip
  nix: nix profile install nixpkgs#lrzip
  pacman: sudo pacman -S lrzip
  ubuntu: sudo apt install lrzip
  zypper: sudo zypper install lrzip
provenance:
  formula: lrzip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
