id: brew:onigmo
display-name: onigmo
homepage: https://github.com/k-takata/Onigmo
repo: https://github.com/k-takata/Onigmo
docs: https://github.com/k-takata/Onigmo
package-manager:
  brew: onigmo
package-manager-url: https://formulae.brew.sh/formula/onigmo
version: 6.2.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Regular expressions library forked from Oniguruma
source-archive: https://github.com/k-takata/Onigmo/releases/download/Onigmo-6.2.0/onigmo-6.2.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: onigmo-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:onigmo
  brew: brew install onigmo
provenance:
  formula: onigmo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
