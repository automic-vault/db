id: brew:gtree
display-name: gtree
homepage: https://ddddddo.github.io/gtree/
repo: https://github.com/ddddddO/gtree
docs: https://ddddddo.github.io/gtree/
package-manager:
  brew: gtree
  macports: gtree
  nix: gtree
package-manager-url: https://formulae.brew.sh/formula/gtree
version: 1.13.6
license: BSD-2-Clause
category: development
tags:
  - cli
description: Generate directory trees and directories using Markdown or programmatically
source-archive: https://github.com/ddddddO/gtree/archive/refs/tags/v1.13.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gtree
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gtree
  brew: brew install gtree
  macports: sudo port install gtree
  nix: nix profile install nixpkgs#gtree
provenance:
  formula: gtree
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
