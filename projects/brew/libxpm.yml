id: brew:libxpm
display-name: libxpm
homepage: https://www.x.org/
repo: https://www.x.org/archive/individual/lib/libXpm-3.5.19.tar.gz
docs: https://www.x.org/
package-manager:
  apk: libxpm
  brew: libxpm
  dnf: libXpm
  nix: libxpm
  pacman: libxpm
package-manager-url: https://formulae.brew.sh/formula/libxpm
version: 3.5.19
license: MIT
category: development
tags:
  - cli
description: 'X.Org: X Pixmap (XPM) image file format library'
source-archive: https://www.x.org/archive/individual/lib/libXpm-3.5.19.tar.gz
dependencies:
  - gettext
  - libx11
build-dependencies:
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cxpm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libxpm
  av: sudo av install brew:libxpm
  brew: brew install libxpm
  dnf: sudo dnf install libXpm
  nix: nix profile install nixpkgs#libxpm
  pacman: sudo pacman -S libxpm
provenance:
  formula: libxpm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
