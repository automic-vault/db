id: brew:jsonnet-bundler
display-name: jsonnet-bundler
homepage: https://github.com/jsonnet-bundler/jsonnet-bundler
repo: https://github.com/jsonnet-bundler/jsonnet-bundler
docs: https://github.com/jsonnet-bundler/jsonnet-bundler
package-manager:
  apk: jsonnet-bundler
  brew: jsonnet-bundler
  macports: jsonnet-bundler
  nix: jsonnet-bundler
package-manager-url: https://formulae.brew.sh/formula/jsonnet-bundler
version: 0.6.0
license: Apache-2.0
category: development
tags:
  - cli
description: Package manager for Jsonnet
source-archive: https://github.com/jsonnet-bundler/jsonnet-bundler.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jsonnet-bundler
  av: sudo av install brew:jsonnet-bundler
  brew: brew install jsonnet-bundler
  macports: sudo port install jsonnet-bundler
  nix: nix profile install nixpkgs#jsonnet-bundler
provenance:
  formula: jsonnet-bundler
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
