id: brew:checkmake
display-name: checkmake
homepage: https://github.com/checkmake/checkmake
repo: https://github.com/checkmake/checkmake
docs: https://github.com/checkmake/checkmake
package-manager:
  brew: checkmake
  dnf: checkmake
  macports: checkmake
  nix: checkmake
package-manager-url: https://formulae.brew.sh/formula/checkmake
version: 0.3.2
license: MIT
category: development
tags:
  - cli
description: Linter/analyzer for Makefiles
source-archive: https://github.com/checkmake/checkmake/archive/refs/tags/v0.3.2.tar.gz
build-dependencies:
  - go
  - pandoc
executables:
  - exposure: global executable
    kind: cli
    name: checkmake
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:checkmake
  brew: brew install checkmake
  dnf: sudo dnf install checkmake
  macports: sudo port install checkmake
  nix: nix profile install nixpkgs#checkmake
provenance:
  formula: checkmake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
