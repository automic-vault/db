id: brew:liquibase
display-name: liquibase
homepage: https://www.liquibase.org/
repo: https://github.com/liquibase/liquibase
docs: https://www.liquibase.org/
package-manager:
  apk: liquibase
  brew: liquibase
  chocolatey: liquibase
  nix: liquibase
  scoop: main/liquibase
  winget: Liquibase.Liquibase
package-manager-url: https://formulae.brew.sh/formula/liquibase
version: 4.33.0
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Library for database change tracking
source-archive: https://github.com/liquibase/liquibase/releases/download/v4.33.0/liquibase-4.33.0.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: liquibase
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You should set the environment variable LIQUIBASE_HOME to
    $HOMEBREW_PREFIX/opt/liquibase/libexec
  post-install-defined: false
install-lines:
  apk: sudo apk add liquibase
  av: sudo av install brew:liquibase
  brew: brew install liquibase
  chocolatey: choco install liquibase
  nix: nix profile install nixpkgs#liquibase
  scoop: scoop install main/liquibase
  winget: winget install --id Liquibase.Liquibase -e
provenance:
  formula: liquibase
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
