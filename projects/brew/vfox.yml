id: brew:vfox
display-name: vfox
homepage: https://vfox.dev/
repo: https://github.com/version-fox/vfox
docs: https://vfox.dev/
package-manager:
  brew: vfox
  nix: vfox
  scoop: main/vfox
  winget: version-fox.vfox
package-manager-url: https://formulae.brew.sh/formula/vfox
version: 1.0.11
license: Apache-2.0
category: development
tags:
  - cli
description: Version manager with support for Java, Node.js, Flutter, .NET & more
source-archive: https://github.com/version-fox/vfox/archive/refs/tags/v1.0.11.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vfox
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vfox
  brew: brew install vfox
  nix: nix profile install nixpkgs#vfox
  scoop: scoop install main/vfox
  winget: winget install --id version-fox.vfox -e
provenance:
  formula: vfox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
