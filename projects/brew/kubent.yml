id: brew:kubent
display-name: kubent
homepage: https://github.com/doitintl/kube-no-trouble
repo: https://github.com/doitintl/kube-no-trouble
docs: https://github.com/doitintl/kube-no-trouble
package-manager:
  brew: kubent
  nix: kubent
  scoop: main/kubent
package-manager-url: https://formulae.brew.sh/formula/kubent
version: 0.7.3
license: MIT
category: development
tags:
  - cli
description: Easily check your clusters for use of deprecated APIs
source-archive: https://github.com/doitintl/kube-no-trouble.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubent
  brew: brew install kubent
  nix: nix profile install nixpkgs#kubent
  scoop: scoop install main/kubent
provenance:
  formula: kubent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
