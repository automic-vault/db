id: brew:vpcs
display-name: vpcs
homepage: https://vpcs.sourceforge.net/
repo: https://github.com/GNS3/vpcs
docs: https://vpcs.sourceforge.net/
package-manager:
  apk: vpcs
  brew: vpcs
  debian: vpcs
  macports: vpcs
  nix: vpcs
  ubuntu: vpcs
  zypper: vpcs
package-manager-url: https://formulae.brew.sh/formula/vpcs
version: 0.8.3
license: BSD-2-Clause
category: development
tags:
  - cli
description: Virtual PC simulator for testing IP routing
source-archive: https://github.com/GNS3/vpcs/archive/refs/tags/v0.8.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: vpcs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vpcs
  av: sudo av install brew:vpcs
  brew: brew install vpcs
  debian: sudo apt install vpcs
  macports: sudo port install vpcs
  nix: nix profile install nixpkgs#vpcs
  ubuntu: sudo apt install vpcs
  zypper: sudo zypper install vpcs
provenance:
  formula: vpcs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
