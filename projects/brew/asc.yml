id: brew:asc
display-name: asc
homepage: https://asccli.sh
repo: https://github.com/rorkai/App-Store-Connect-CLI
docs: https://asccli.sh
package-manager:
  brew: asc
  debian: asc
  dnf: asc
  nix: asc
  ubuntu: asc
package-manager-url: https://formulae.brew.sh/formula/asc
version: 1.5.4
license: MIT
category: development
tags:
  - cli
description: Fast, lightweight CLI for App Store Connect
source-archive: https://github.com/rorkai/App-Store-Connect-CLI/archive/refs/tags/1.5.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: asc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:asc
  brew: brew install asc
  debian: sudo apt install asc
  dnf: sudo dnf install asc
  nix: nix profile install nixpkgs#asc
  ubuntu: sudo apt install asc
provenance:
  formula: asc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
