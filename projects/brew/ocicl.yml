id: brew:ocicl
display-name: ocicl
homepage: https://github.com/ocicl/ocicl
repo: https://github.com/ocicl/ocicl
docs: https://github.com/ocicl/ocicl
package-manager:
  brew: ocicl
  macports: ocicl
  pacman: ocicl
package-manager-url: https://formulae.brew.sh/formula/ocicl
version: 2.16.13
license: MIT
category: development
tags:
  - cli
description: OCI-based ASDF system distribution and management tool for Common Lisp
source-archive: https://github.com/ocicl/ocicl/archive/refs/tags/v2.16.13.tar.gz
dependencies:
  - sbcl
  - zstd
executables:
  - exposure: global executable
    kind: cli
    name: ocicl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ocicl
  brew: brew install ocicl
  macports: sudo port install ocicl
  pacman: sudo pacman -S ocicl
provenance:
  formula: ocicl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
