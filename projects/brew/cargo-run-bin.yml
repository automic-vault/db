id: brew:cargo-run-bin
display-name: cargo-run-bin
homepage: https://github.com/dustinblackman/cargo-run-bin
repo: https://github.com/dustinblackman/cargo-run-bin
docs: https://github.com/dustinblackman/cargo-run-bin
package-manager:
  apk: cargo-run-bin
  brew: cargo-run-bin
  nix: cargo-run-bin
  pacman: cargo-run-bin
package-manager-url: https://formulae.brew.sh/formula/cargo-run-bin
version: 1.7.4
license: MIT
category: development
tags:
  - cli
description: Build, cache, and run binaries from Cargo.toml to avoid global installs
source-archive: https://github.com/dustinblackman/cargo-run-bin/archive/refs/tags/v1.7.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-bin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-run-bin
  av: sudo av install brew:cargo-run-bin
  brew: brew install cargo-run-bin
  nix: nix profile install nixpkgs#cargo-run-bin
  pacman: sudo pacman -S cargo-run-bin
provenance:
  formula: cargo-run-bin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
