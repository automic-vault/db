id: brew:three-body
display-name: three-body
homepage: https://github.com/rustq/3body-lang
repo: https://github.com/rustq/3body-lang
docs: https://github.com/rustq/3body-lang
package-manager:
  brew: three-body
package-manager-url: https://formulae.brew.sh/formula/three-body
version: 0.6.5
license: MIT
category: development
tags:
  - cli
description: 三体编程语言 Three Body Language written in Rust
source-archive: https://github.com/rustq/3body-lang/archive/refs/tags/0.6.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: 3body
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:three-body
  brew: brew install three-body
provenance:
  formula: three-body
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
