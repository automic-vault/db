id: brew:opentofu
display-name: opentofu
homepage: https://opentofu.org/
repo: https://github.com/opentofu/opentofu
docs: https://opentofu.org/
package-manager:
  apk: opentofu
  brew: opentofu
  chocolatey: opentofu
  dnf: opentofu
  nix: opentofu
  pacman: opentofu
  scoop: main/opentofu
  winget: OpenTofu.Tofu
  zypper: opentofu
package-manager-url: https://formulae.brew.sh/formula/opentofu
version: 1.12.1
license: MPL-2.0
category: cloud
tags:
  - cli
description: Drop-in replacement for Terraform. Infrastructure as Code Tool
source-archive: https://github.com/opentofu/opentofu/archive/refs/tags/v1.12.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tofu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add opentofu
  av: sudo av install brew:opentofu
  brew: brew install opentofu
  chocolatey: choco install opentofu
  dnf: sudo dnf install opentofu
  nix: nix profile install nixpkgs#opentofu
  pacman: sudo pacman -S opentofu
  scoop: scoop install main/opentofu
  winget: winget install --id OpenTofu.Tofu -e
  zypper: sudo zypper install opentofu
provenance:
  formula: opentofu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
