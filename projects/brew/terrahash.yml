id: brew:terrahash
display-name: terrahash
homepage: https://github.com/ned1313/terrahash
repo: https://github.com/ned1313/terrahash
docs: https://github.com/ned1313/terrahash
package-manager:
  brew: terrahash
package-manager-url: https://formulae.brew.sh/formula/terrahash
version: 0.1.0
license: MIT
category: cloud
tags:
  - cli
description: Create and store a hash of the Terraform modules used by your configuration
source-archive: https://github.com/ned1313/terrahash/archive/refs/tags/v0.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terrahash
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terrahash
  brew: brew install terrahash
provenance:
  formula: terrahash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
