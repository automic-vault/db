id: brew:ocproxy
display-name: ocproxy
homepage: https://github.com/cernekee/ocproxy
repo: https://github.com/cernekee/ocproxy
docs: https://github.com/cernekee/ocproxy
package-manager:
  brew: ocproxy
  debian: ocproxy
  dnf: ocproxy
  nix: ocproxy
  ubuntu: ocproxy
package-manager-url: https://formulae.brew.sh/formula/ocproxy
version: 1.60
license: BSD-3-Clause
category: development
tags:
  - cli
description: User-level SOCKS and port forwarding proxy
source-archive: https://github.com/cernekee/ocproxy/archive/refs/tags/v1.60.tar.gz
dependencies:
  - libevent
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: ocproxy
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ocproxy
  brew: brew install ocproxy
  debian: sudo apt install ocproxy
  dnf: sudo dnf install ocproxy
  nix: nix profile install nixpkgs#ocproxy
  ubuntu: sudo apt install ocproxy
provenance:
  formula: ocproxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
