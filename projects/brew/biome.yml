id: brew:biome
display-name: biome
homepage: https://biomejs.dev/
repo: https://github.com/biomejs/biome
docs: https://biomejs.dev/
package-manager:
  apk: biome
  brew: biome
  nix: biome
  pacman: biome
  scoop: main/biome
  winget: BiomeJS.Biome
  zypper: biome
package-manager-url: https://formulae.brew.sh/formula/biome
version: 2.4.15
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Toolchain of the web
source-archive: https://github.com/biomejs/biome/archive/refs/tags/@biomejs/biome@2.4.15.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: biome
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add biome
  av: sudo av install brew:biome
  brew: brew install biome
  nix: nix profile install nixpkgs#biome
  pacman: sudo pacman -S biome
  scoop: scoop install main/biome
  winget: winget install --id BiomeJS.Biome -e
  zypper: sudo zypper install biome
provenance:
  formula: biome
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
