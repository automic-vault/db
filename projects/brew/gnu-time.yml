id: brew:gnu-time
display-name: gnu-time
homepage: https://www.gnu.org/software/time/
repo: https://ftpmirror.gnu.org/gnu/time/time-1.10.tar.gz
docs: https://www.gnu.org/software/time/
package-manager:
  apk: time
  brew: gnu-time
  debian: time
  dnf: time
  nix: time
  pacman: time
  scoop: main/time
  ubuntu: time
  zypper: time
package-manager-url: https://formulae.brew.sh/formula/gnu-time
version: 1.10
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU implementation of time utility
source-archive: https://ftpmirror.gnu.org/gnu/time/time-1.10.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: time
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    GNU "time" has been installed as "gtime". If you need to use it as "time", you can
    add a "gnubin" directory to your PATH from your bashrc like:
    PATH="$HOMEBREW_PREFIX/opt/gnu-time/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add time
  av: sudo av install brew:gnu-time
  brew: brew install gnu-time
  debian: sudo apt install time
  dnf: sudo dnf install time
  nix: nix profile install nixpkgs#time
  pacman: sudo pacman -S time
  scoop: scoop install main/time
  ubuntu: sudo apt install time
  zypper: sudo zypper install time
provenance:
  formula: gnu-time
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
