id: brew:pgbadger
display-name: pgbadger
homepage: https://pgbadger.darold.net/
repo: https://github.com/darold/pgbadger
docs: https://pgbadger.darold.net/
package-manager:
  apk: pgbadger
  brew: pgbadger
  debian: pgbadger
  dnf: pgbadger
  macports: pgbadger
  nix: pgbadger
  ubuntu: pgbadger
  zypper: pgbadger
package-manager-url: https://formulae.brew.sh/formula/pgbadger
version: 13.2
license: PostgreSQL
category: database
tags:
  - cli
description: Log analyzer for PostgreSQL
source-archive: https://github.com/darold/pgbadger/archive/refs/tags/v13.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: pgbadger
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You must configure your PostgreSQL server before using pgBadger. Edit
    postgresql.conf (in $HOMEBREW_PREFIX/var/postgres if you use Homebrew's PostgreSQL),
    set the following parameters, and restart PostgreSQL: log_destination = 'stderr'
    log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d ' log_statement = 'none'
    log_duration = off log_min_duration_statement = 0 log_checkpoints = on
    log_connections = on log_disconnections = on log_lock_waits = on log_temp_files = 0
    lc_messages = 'C'
  post-install-defined: false
install-lines:
  apk: sudo apk add pgbadger
  av: sudo av install brew:pgbadger
  brew: brew install pgbadger
  debian: sudo apt install pgbadger
  dnf: sudo dnf install pgbadger
  macports: sudo port install pgbadger
  nix: nix profile install nixpkgs#pgbadger
  ubuntu: sudo apt install pgbadger
  zypper: sudo zypper install pgbadger
provenance:
  formula: pgbadger
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
