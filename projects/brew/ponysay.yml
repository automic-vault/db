id: brew:ponysay
display-name: ponysay
homepage: https://github.com/erkin/ponysay/
repo: https://github.com/erkin/ponysay
docs: https://github.com/erkin/ponysay/
package-manager:
  brew: ponysay
  nix: ponysay
  pacman: ponysay
package-manager-url: https://formulae.brew.sh/formula/ponysay
version: 3.0.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Cowsay but with ponies
source-archive: https://github.com/erkin/ponysay/archive/refs/tags/3.0.3.tar.gz
dependencies:
  - coreutils
  - python@3.14
build-dependencies:
  - gzip
  - texinfo
executables:
  - exposure: global executable
    kind: cli
    name: ponysay
  - exposure: global executable
    kind: cli
    name: ponysay-tool
  - exposure: global executable
    kind: cli
    name: ponythink
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ponysay
  brew: brew install ponysay
  nix: nix profile install nixpkgs#ponysay
  pacman: sudo pacman -S ponysay
provenance:
  formula: ponysay
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
