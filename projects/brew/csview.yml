id: brew:csview
display-name: csview
homepage: https://github.com/wfxr/csview
repo: https://github.com/wfxr/csview
docs: https://github.com/wfxr/csview
package-manager:
  apk: csview
  brew: csview
  macports: csview
  nix: csview
  scoop: main/csview
package-manager-url: https://formulae.brew.sh/formula/csview
version: 1.3.4
license: MIT OR Apache-2.0
category: development
tags:
  - cli
description: High performance csv viewer for cli
source-archive: https://github.com/wfxr/csview/archive/refs/tags/v1.3.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: csview
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add csview
  av: sudo av install brew:csview
  brew: brew install csview
  macports: sudo port install csview
  nix: nix profile install nixpkgs#csview
  scoop: scoop install main/csview
provenance:
  formula: csview
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
