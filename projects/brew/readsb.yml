id: brew:readsb
display-name: readsb
homepage: https://github.com/wiedehopf/readsb
repo: https://github.com/wiedehopf/readsb
docs: https://github.com/wiedehopf/readsb
package-manager:
  brew: readsb
  debian: readsb
  nix: readsb
package-manager-url: https://formulae.brew.sh/formula/readsb
version: 3.16.15
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: ADS-B decoder swiss knife
source-archive: https://github.com/wiedehopf/readsb/archive/refs/tags/v3.16.15.tar.gz
dependencies:
  - librtlsdr
  - libusb
  - zstd
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: readsb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:readsb
  brew: brew install readsb
  debian: sudo apt install readsb
  nix: nix profile install nixpkgs#readsb
provenance:
  formula: readsb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
