id: brew:haxe
display-name: haxe
homepage: https://haxe.org/
repo: https://github.com/HaxeFoundation/haxe
docs: https://haxe.org/
package-manager:
  apk: haxe
  brew: haxe
  chocolatey: haxe
  debian: haxe
  dnf: haxe
  nix: haxe
  pacman: haxe
  scoop: main/haxe
  ubuntu: haxe
  winget: HaxeFoundation.Haxe
  zypper: haxe
package-manager-url: https://formulae.brew.sh/formula/haxe
version: 4.3.7
license: GPL-2.0-or-later AND MIT
category: development
tags:
  - cli
description: Multi-platform programming language
source-archive: https://github.com/HaxeFoundation/haxe.git
dependencies:
  - mbedtls@3
  - neko
  - pcre2
build-dependencies:
  - ocaml
  - opam
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: haxe
  - exposure: global executable
    kind: cli
    name: haxelib
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Add the following line to your .bashrc or equivalent: export
    HAXE_STD_PATH="$HOMEBREW_PREFIX/lib/haxe/std"
  post-install-defined: false
install-lines:
  apk: sudo apk add haxe
  av: sudo av install brew:haxe
  brew: brew install haxe
  chocolatey: choco install haxe
  debian: sudo apt install haxe
  dnf: sudo dnf install haxe
  nix: nix profile install nixpkgs#haxe
  pacman: sudo pacman -S haxe
  scoop: scoop install main/haxe
  ubuntu: sudo apt install haxe
  winget: winget install --id HaxeFoundation.Haxe -e
  zypper: sudo zypper install haxe
provenance:
  formula: haxe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
