id: brew:excel-compare
display-name: excel-compare
homepage: https://github.com/na-ka-na/ExcelCompare
repo: https://github.com/na-ka-na/ExcelCompare
docs: https://github.com/na-ka-na/ExcelCompare
package-manager:
  brew: excel-compare
package-manager-url: https://formulae.brew.sh/formula/excel-compare
version: 0.7.0
license: MIT
category: development
tags:
  - cli
description: Command-line tool (and API) for diffing Excel Workbooks
source-archive: https://github.com/na-ka-na/ExcelCompare/releases/download/0.7.0/ExcelCompare-0.7.0.zip
dependencies:
