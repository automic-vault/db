id: brew:joyce
display-name: joyce
homepage: https://www.seasip.info/Unix/Joyce/index.html
repo: https://www.seasip.info/Unix/Joyce/joyce-2.4.2.tar.gz
docs: https://www.seasip.info/Unix/Joyce/index.html
package-manager:
  brew: joyce
package-manager-url: https://formulae.brew.sh/formula/joyce
version: 2.4.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Emulates the Amstrad PCW on Unix, Windows and macOS
source-archive: https://www.seasip.info/Unix/Joyce/joyce-2.4.2.tar.gz
dependencies:
  - libdsk
  - libpng
  - sdl12-compat
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: dskconv
  - exposure: global executable
    kind: cli
    name: dsklabel
  - exposure: global executable
    kind: cli
    name: lsgotek
  - exposure: global executable
    kind: cli
    name: xanne
  - exposure: global executable
    kind: cli
    name: xjoyce
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:joyce
  brew: brew install joyce
provenance:
  formula: joyce
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
