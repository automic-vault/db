id: brew:httpstat
display-name: httpstat
homepage: https://github.com/reorx/httpstat
repo: https://github.com/reorx/httpstat
docs: https://github.com/reorx/httpstat
package-manager:
  brew: httpstat
  nix: httpstat
  scoop: main/httpstat
package-manager-url: https://formulae.brew.sh/formula/httpstat
version: 1.3.2
license: MIT
category: development
tags:
  - cli
description: Curl statistics made simple
source-archive: https://github.com/reorx/httpstat/archive/refs/tags/1.3.2.tar.gz
uses-from-macos:
  - curl
  - python
executables:
  - exposure: global executable
    kind: cli
    name: httpstat
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:httpstat
  brew: brew install httpstat
  nix: nix profile install nixpkgs#httpstat
  scoop: scoop install main/httpstat
provenance:
  formula: httpstat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
