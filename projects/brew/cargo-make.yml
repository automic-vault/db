id: brew:cargo-make
display-name: cargo-make
homepage: https://github.com/sagiegurari/cargo-make
repo: https://github.com/sagiegurari/cargo-make
docs: https://github.com/sagiegurari/cargo-make
package-manager:
  apk: cargo-make
  brew: cargo-make
  nix: cargo-make
  pacman: cargo-make
package-manager-url: https://formulae.brew.sh/formula/cargo-make
version: 0.37.24
license: Apache-2.0
category: development
tags:
  - cli
description: Rust task runner and build tool
source-archive: https://github.com/sagiegurari/cargo-make/archive/refs/tags/0.37.24.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-make
  - exposure: global executable
    kind: cli
    name: makers
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-make
  av: sudo av install brew:cargo-make
  brew: brew install cargo-make
  nix: nix profile install nixpkgs#cargo-make
  pacman: sudo pacman -S cargo-make
provenance:
  formula: cargo-make
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
