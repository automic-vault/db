id: brew:sgn
display-name: sgn
homepage: https://github.com/EgeBalci/sgn
repo: https://github.com/EgeBalci/sgn
docs: https://github.com/EgeBalci/sgn
package-manager:
  brew: sgn
package-manager-url: https://formulae.brew.sh/formula/sgn
version: 2.0.2
license: MIT
category: development
tags:
  - cli
description: Shikata ga nai (仕方がない) encoder ported into go with several improvements
source-archive: https://github.com/EgeBalci/sgn/archive/refs/tags/v2.0.2.tar.gz
dependencies:
  - keystone
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sgn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sgn
  brew: brew install sgn
provenance:
  formula: sgn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
