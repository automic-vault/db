id: brew:simple-scan
display-name: simple-scan
homepage: https://gitlab.gnome.org/GNOME/simple-scan
repo: https://download.gnome.org/sources/simple-scan/50/simple-scan-50.0.tar.xz
docs: https://gitlab.gnome.org/GNOME/simple-scan
package-manager:
  apk: simple-scan
  brew: simple-scan
  debian: simple-scan
  dnf: simple-scan
  nix: simple-scan
  pacman: simple-scan
  ubuntu: simple-scan
  zypper: simple-scan
package-manager-url: https://formulae.brew.sh/formula/simple-scan
version: 50.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: GNOME document scanning application
source-archive: https://download.gnome.org/sources/simple-scan/50/simple-scan-50.0.tar.xz
dependencies:
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk4
  - libadwaita
  - libgusb
  - sane-backends
  - webp
build-dependencies:
  - gettext
  - itstool
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: simple-scan
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add simple-scan
  av: sudo av install brew:simple-scan
  brew: brew install simple-scan
  debian: sudo apt install simple-scan
  dnf: sudo dnf install simple-scan
  nix: nix profile install nixpkgs#simple-scan
  pacman: sudo pacman -S simple-scan
  ubuntu: sudo apt install simple-scan
  zypper: sudo zypper install simple-scan
provenance:
  formula: simple-scan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
