id: brew:bsc
display-name: bsc
homepage: https://github.com/B-Lang-org/bsc
repo: https://github.com/B-Lang-org/bsc
docs: https://github.com/B-Lang-org/bsc
package-manager:
  brew: bsc
  macports: bsc
  nix: bsc
package-manager-url: https://formulae.brew.sh/formula/bsc
version: 2026.01
license: BSD-3-Clause
category: development
tags:
  - cli
description: Bluespec Compiler (BSC)
source-archive: https://github.com/B-Lang-org/bsc/archive/refs/tags/2026.01.tar.gz
dependencies:
  - gmp
  - icarus-verilog
  - tcl-tk
build-dependencies:
  - autoconf
  - cabal-install
  - ghc
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: bluetcl
  - exposure: global executable
    kind: cli
    name: bsc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bsc
  brew: brew install bsc
  macports: sudo port install bsc
  nix: nix profile install nixpkgs#bsc
provenance:
  formula: bsc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
