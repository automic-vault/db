id: brew:libart
display-name: libart
homepage: https://github.com/armon/libart
repo: https://download.gnome.org/sources/libart_lgpl/2.3/libart_lgpl-2.3.21.tar.bz2
docs: https://github.com/armon/libart
package-manager:
  brew: libart
  dnf: libart
package-manager-url: https://formulae.brew.sh/formula/libart
version: 2.3.21
license: LGPL-2.0-or-later
category: development
tags:
  - cli
description: Library for high-performance 2D graphics
source-archive: https://download.gnome.org/sources/libart_lgpl/2.3/libart_lgpl-2.3.21.tar.bz2
executables:
