id: brew:dafny
display-name: dafny
homepage: https://github.com/dafny-lang/dafny/blob/master/README.md
repo: https://github.com/dafny-lang/dafny
docs: https://github.com/dafny-lang/dafny/blob/master/README.md
package-manager:
  brew: dafny
  nix: dafny
  scoop: main/dafny
  ubuntu: dafny
package-manager-url: https://formulae.brew.sh/formula/dafny
version: 4.11.0
license: MIT
category: development
tags:
  - cli
description: Verification-aware programming language
source-archive: https://github.com/dafny-lang/dafny/archive/refs/tags/v4.11.0.tar.gz
dependencies:
  - dotnet@8
  - z3
build-dependencies:
  - gradle@8
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: dafny
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dafny
  brew: brew install dafny
  nix: nix profile install nixpkgs#dafny
  scoop: scoop install main/dafny
  ubuntu: sudo apt install dafny
provenance:
  formula: dafny
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
