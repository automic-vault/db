id: brew:vramsteg
display-name: vramsteg
homepage: https://gothenburgbitfactory.org/vramsteg/
repo: https://github.com/GothenburgBitFactory/vramsteg
docs: https://gothenburgbitfactory.org/vramsteg/
package-manager:
  brew: vramsteg
  debian: vramsteg
  macports: vramsteg
  ubuntu: vramsteg
package-manager-url: https://formulae.brew.sh/formula/vramsteg
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Add progress bars to command-line applications
source-archive: >
  https://github.com/GothenburgBitFactory/vramsteg/releases/download/v1.1.0/vramsteg-1.1.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: vramsteg
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vramsteg
  brew: brew install vramsteg
  debian: sudo apt install vramsteg
  macports: sudo port install vramsteg
  ubuntu: sudo apt install vramsteg
provenance:
  formula: vramsteg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
