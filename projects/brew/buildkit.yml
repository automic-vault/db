id: brew:buildkit
display-name: buildkit
homepage: https://github.com/moby/buildkit
repo: https://github.com/moby/buildkit
docs: https://github.com/moby/buildkit
package-manager:
  apk: buildkit
  brew: buildkit
  nix: buildkit
  pacman: buildkit
  zypper: buildkit
package-manager-url: https://formulae.brew.sh/formula/buildkit
version: 0.30.0
license: Apache-2.0
category: development
tags:
  - cli
description: Concurrent, cache-efficient, and Dockerfile-agnostic builder toolkit
source-archive: https://github.com/moby/buildkit/archive/refs/tags/v0.30.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: buildctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add buildkit
  av: sudo av install brew:buildkit
  brew: brew install buildkit
  nix: nix profile install nixpkgs#buildkit
  pacman: sudo pacman -S buildkit
  zypper: sudo zypper install buildkit
provenance:
  formula: buildkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
