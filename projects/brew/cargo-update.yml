id: brew:cargo-update
display-name: cargo-update
homepage: https://github.com/nabijaczleweli/cargo-update
repo: https://github.com/nabijaczleweli/cargo-update
docs: https://github.com/nabijaczleweli/cargo-update
package-manager:
  apk: cargo-update
  brew: cargo-update
  nix: cargo-update
  pacman: cargo-update
package-manager-url: https://formulae.brew.sh/formula/cargo-update
version: 20.0.0
license: MIT
category: development
tags:
  - cli
description: Cargo subcommand for checking and applying updates to installed executables
source-archive: https://github.com/nabijaczleweli/cargo-update/archive/refs/tags/v20.0.0.tar.gz
dependencies:
  - libgit2
  - libssh2
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: cargo-install-update
  - exposure: global executable
    kind: cli
    name: cargo-install-update-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-update
  av: sudo av install brew:cargo-update
  brew: brew install cargo-update
  nix: nix profile install nixpkgs#cargo-update
  pacman: sudo pacman -S cargo-update
provenance:
  formula: cargo-update
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
