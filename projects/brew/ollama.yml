id: brew:ollama
display-name: ollama
homepage: https://ollama.com/
repo: https://github.com/ollama/ollama
docs: https://ollama.com/
package-manager:
  apk: ollama
  brew: ollama
  chocolatey: Ollama
  dnf: ollama
  macports: ollama
  nix: ollama
  pacman: ollama
  scoop: main/ollama
  winget: Ollama.Ollama
  zypper: ollama
package-manager-url: https://formulae.brew.sh/formula/ollama
version: 0.24.0
license: MIT
category: development
tags:
  - cli
description: Create, run, and share large language models (LLMs)
source-archive: https://github.com/ollama/ollama.git
dependencies:
  - mlx-c
build-dependencies:
  - cmake
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ollama
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add ollama
  av: sudo av install brew:ollama
  brew: brew install ollama
  chocolatey: choco install Ollama
  dnf: sudo dnf install ollama
  macports: sudo port install ollama
  nix: nix profile install nixpkgs#ollama
  pacman: sudo pacman -S ollama
  scoop: scoop install main/ollama
  winget: winget install --id Ollama.Ollama -e
  zypper: sudo zypper install ollama
provenance:
  formula: ollama
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
