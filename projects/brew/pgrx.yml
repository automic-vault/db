id: brew:pgrx
display-name: pgrx
homepage: https://github.com/pgcentralfoundation/pgrx
repo: https://github.com/pgcentralfoundation/pgrx
docs: https://github.com/pgcentralfoundation/pgrx
package-manager:
  brew: pgrx
  pacman: cargo-pgrx
package-manager-url: https://formulae.brew.sh/formula/pgrx
version: 0.18.0
license: MIT
category: database
tags:
  - cli
description: Build Postgres Extensions with Rust
source-archive: https://github.com/pgcentralfoundation/pgrx/archive/refs/tags/v0.18.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-pgrx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pgrx
  brew: brew install pgrx
  pacman: sudo pacman -S cargo-pgrx
provenance:
  formula: pgrx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
