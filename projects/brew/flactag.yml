id: brew:flactag
display-name: flactag
homepage: https://flactag.sourceforge.net/
repo: https://downloads.sourceforge.net/project/flactag/v2.0.4/flactag-2.0.4.tar.gz
docs: https://flactag.sourceforge.net/
package-manager:
  brew: flactag
  debian: flactag
  ubuntu: flactag
package-manager-url: https://formulae.brew.sh/formula/flactag
version: 2.0.4
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Tag single album FLAC files with MusicBrainz CUE sheets
source-archive: https://downloads.sourceforge.net/project/flactag/v2.0.4/flactag-2.0.4.tar.gz
dependencies:
  - flac
  - jpeg-turbo
  - libdiscid
  - libmusicbrainz
  - neon
  - s-lang
  - unac
build-dependencies:
  - asciidoc
  - docbook-xsl
  - pkgconf
uses-from-macos:
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: checkflac
  - exposure: global executable
    kind: cli
    name: discid
  - exposure: global executable
    kind: cli
    name: flactag
  - exposure: global executable
    kind: cli
    name: ripdataflac
  - exposure: global executable
    kind: cli
    name: ripflac
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flactag
  brew: brew install flactag
  debian: sudo apt install flactag
  ubuntu: sudo apt install flactag
provenance:
  formula: flactag
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
