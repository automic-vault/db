id: brew:libgxps
display-name: libgxps
homepage: https://wiki.gnome.org/Projects/libgxps
repo: https://download.gnome.org/sources/libgxps/0.3/libgxps-0.3.2.tar.xz
docs: https://wiki.gnome.org/Projects/libgxps
package-manager:
  brew: libgxps
  dnf: libgxps
  nix: libgxps
  pacman: libgxps
package-manager-url: https://formulae.brew.sh/formula/libgxps
version: 0.3.2
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: GObject based library for handling and rendering XPS documents
source-archive: https://download.gnome.org/sources/libgxps/0.3/libgxps-0.3.2.tar.xz
dependencies:
  - cairo
  - freetype
  - gettext
  - glib
  - jpeg-turbo
  - libarchive
  - libpng
  - libtiff
  - little-cms2
build-dependencies:
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xpstojpeg
  - exposure: global executable
    kind: cli
    name: xpstopdf
  - exposure: global executable
    kind: cli
    name: xpstopng
  - exposure: global executable
    kind: cli
    name: xpstops
  - exposure: global executable
    kind: cli
    name: xpstosvg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    `ghostscript` now installs a conflicting libgxps.dylib. You may need to `brew unlink
    libgxps` if you have both installed.
  post-install-defined: false
install-lines:
  av: sudo av install brew:libgxps
  brew: brew install libgxps
  dnf: sudo dnf install libgxps
  nix: nix profile install nixpkgs#libgxps
  pacman: sudo pacman -S libgxps
provenance:
  formula: libgxps
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
