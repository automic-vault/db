id: brew:melody
display-name: melody
homepage: https://yoav-lavi.github.io/melody/book
repo: https://github.com/yoav-lavi/melody
docs: https://yoav-lavi.github.io/melody/book
package-manager:
  brew: melody
  nix: melody
package-manager-url: https://formulae.brew.sh/formula/melody
version: 0.20.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Language that compiles to regular expressions
source-archive: https://github.com/yoav-lavi/melody/archive/refs/tags/v0.20.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: melody
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:melody
  brew: brew install melody
  nix: nix profile install nixpkgs#melody
provenance:
  formula: melody
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
