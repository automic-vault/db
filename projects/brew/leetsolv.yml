id: brew:leetsolv
display-name: leetsolv
homepage: https://github.com/eannchen/leetsolv
repo: https://github.com/eannchen/leetsolv
docs: https://github.com/eannchen/leetsolv
package-manager:
  brew: leetsolv
  scoop: extras/leetsolv
package-manager-url: https://formulae.brew.sh/formula/leetsolv
version: 1.2.0
license: MIT
category: development
tags:
  - cli
description: CLI tool for DSA problem revision with spaced repetition
source-archive: https://github.com/eannchen/leetsolv/archive/refs/tags/v1.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: leetsolv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:leetsolv
  brew: brew install leetsolv
  scoop: scoop install extras/leetsolv
provenance:
  formula: leetsolv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
