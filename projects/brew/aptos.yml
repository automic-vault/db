id: brew:aptos
display-name: aptos
homepage: https://aptosfoundation.org/
repo: https://github.com/aptos-labs/aptos-core
docs: https://aptosfoundation.org/
package-manager:
  brew: aptos
  winget: AptosCore.aptos
package-manager-url: https://formulae.brew.sh/formula/aptos
version: 9.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: Layer 1 blockchain built to support fair access to decentralized assets for all
source-archive: https://github.com/aptos-labs/aptos-core/archive/refs/tags/aptos-cli-v9.2.0.tar.gz
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: aptos
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aptos
  brew: brew install aptos
  winget: winget install --id AptosCore.aptos -e
provenance:
  formula: aptos
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
