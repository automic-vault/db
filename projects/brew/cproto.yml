id: brew:cproto
display-name: cproto
homepage: https://invisible-island.net/cproto/
repo: https://invisible-mirror.net/archives/cproto/cproto-4.8.tgz
docs: https://invisible-island.net/cproto/
package-manager:
  apk: cproto
  brew: cproto
  debian: cproto
  dnf: cproto
  macports: cproto
  nix: cproto
  ubuntu: cproto
package-manager-url: https://formulae.brew.sh/formula/cproto
version: 4.8
license: LicenseRef-Homebrew-public-domain
category: network
tags:
  - cli
description: Generate function prototypes for functions in input files
source-archive: https://invisible-mirror.net/archives/cproto/cproto-4.8.tgz
executables:
  - exposure: global executable
    kind: cli
    name: cproto
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cproto
  av: sudo av install brew:cproto
  brew: brew install cproto
  debian: sudo apt install cproto
  dnf: sudo dnf install cproto
  macports: sudo port install cproto
  nix: nix profile install nixpkgs#cproto
  ubuntu: sudo apt install cproto
provenance:
  formula: cproto
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
