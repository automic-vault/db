id: brew:suite-sparse
display-name: suite-sparse
homepage: https://people.engr.tamu.edu/davis/suitesparse.html
repo: https://github.com/DrTimothyAldenDavis/SuiteSparse
docs: https://people.engr.tamu.edu/davis/suitesparse.html
package-manager:
  brew: suite-sparse
  debian: suitesparse-mongoose
  ubuntu: suitesparse-mongoose
  zypper: suitesparse_mongoose
package-manager-url: https://formulae.brew.sh/formula/suite-sparse
version: 7.12.2
license: >
  BSD-3-Clause AND LGPL-2.1-or-later AND GPL-2.0-or-later AND Apache-2.0 AND
  GPL-3.0-only AND (LGPL-3.0-or-later OR GPL-2.0-or-later)
category: development
tags:
  - cli
description: Suite of Sparse Matrix Software
source-archive: https://github.com/DrTimothyAldenDavis/SuiteSparse/archive/refs/tags/v7.12.2.tar.gz
dependencies:
  - gcc
  - gmp
  - libomp
  - mpfr
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: suitesparse_mongoose
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:suite-sparse
  brew: brew install suite-sparse
  debian: sudo apt install suitesparse-mongoose
  ubuntu: sudo apt install suitesparse-mongoose
  zypper: sudo zypper install suitesparse_mongoose
provenance:
  formula: suite-sparse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
