id: brew:srt
display-name: srt
homepage: https://www.srtalliance.org/
repo: https://github.com/Haivision/srt
docs: https://www.srtalliance.org/
package-manager:
  brew: srt
  dnf: srt
  macports: srt
  nix: srt
  pacman: srt
  zypper: srt
package-manager-url: https://formulae.brew.sh/formula/srt
version: 1.5.5
license: MPL-2.0
category: development
tags:
  - cli
description: Secure Reliable Transport
source-archive: https://github.com/Haivision/srt/archive/refs/tags/v1.5.5.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: srt-ffplay
  - exposure: global executable
    kind: cli
    name: srt-file-transmit
  - exposure: global executable
    kind: cli
    name: srt-live-transmit
  - exposure: global executable
    kind: cli
    name: srt-tunnel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:srt
  brew: brew install srt
  dnf: sudo dnf install srt
  macports: sudo port install srt
  nix: nix profile install nixpkgs#srt
  pacman: sudo pacman -S srt
  zypper: sudo zypper install srt
provenance:
  formula: srt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
