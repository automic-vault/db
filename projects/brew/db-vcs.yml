id: brew:db-vcs
display-name: db-vcs
homepage: https://github.com/infostreams/db
repo: https://github.com/infostreams/db
docs: https://github.com/infostreams/db
package-manager:
  apk: db
  brew: db-vcs
  nix: db
  pacman: db
package-manager-url: https://formulae.brew.sh/formula/db-vcs
version: 1.1
license: MIT
category: database
tags:
  - cli
description: Version control for MySQL databases
source-archive: https://github.com/infostreams/db/archive/refs/tags/1.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: db
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add db
  av: sudo av install brew:db-vcs
  brew: brew install db-vcs
  nix: nix profile install nixpkgs#db
  pacman: sudo pacman -S db
provenance:
  formula: db-vcs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
