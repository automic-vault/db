id: brew:dav1d
display-name: dav1d
homepage: https://code.videolan.org/videolan/dav1d
repo: https://code.videolan.org/videolan/dav1d/-/archive/1.5.3/dav1d-1.5.3.tar.bz2
docs: https://code.videolan.org/videolan/dav1d
package-manager:
  apk: dav1d
