id: brew:freeciv
display-name: freeciv
homepage: https://freeciv.org/
repo: >
  https://downloads.sourceforge.net/project/freeciv/Freeciv%203.2/3.2.4/freeciv-3.2.4.tar.xz
docs: https://freeciv.org/
package-manager:
  apk: freeciv
  brew: freeciv
  chocolatey: freeciv
  debian: freeciv
  macports: freeciv
  nix: freeciv
  pacman: freeciv-gtk4
  ubuntu: freeciv
  winget: FreeCiv.FreeCiv
  zypper: freeciv
package-manager-url: https://formulae.brew.sh/formula/freeciv
version: 3.2.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Free and Open Source empire-building strategy game
source-archive: >
  https://downloads.sourceforge.net/project/freeciv/Freeciv%203.2/3.2.4/freeciv-3.2.4.tar.xz
dependencies:
  - adwaita-icon-theme
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk4
  - icu4c@78
  - lua
  - pango
  - readline
  - sdl2
  - sdl2_mixer
  - xz
  - zstd
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - bzip2
  - curl
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: freeciv-gtk4
  - exposure: global executable
    kind: cli
    name: freeciv-manual
  - exposure: global executable
    kind: cli
    name: freeciv-mp-gtk4
  - exposure: global executable
    kind: cli
    name: freeciv-ruleup
  - exposure: global executable
    kind: cli
    name: freeciv-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add freeciv
  av: sudo av install brew:freeciv
  brew: brew install freeciv
  chocolatey: choco install freeciv
  debian: sudo apt install freeciv
  macports: sudo port install freeciv
  nix: nix profile install nixpkgs#freeciv
  pacman: sudo pacman -S freeciv-gtk4
  ubuntu: sudo apt install freeciv
  winget: winget install --id FreeCiv.FreeCiv -e
  zypper: sudo zypper install freeciv
provenance:
  formula: freeciv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
