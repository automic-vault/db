id: brew:bkt
display-name: bkt
homepage: https://github.com/dimo414/bkt
repo: https://github.com/dimo414/bkt
docs: https://github.com/dimo414/bkt
package-manager:
  apk: bkt
  brew: bkt
  debian: bkt
  nix: bkt
  ubuntu: bkt
package-manager-url: https://formulae.brew.sh/formula/bkt
version: 0.8.2
license: MIT
category: development
tags:
  - cli
description: CLI utility for caching the output of subprocesses
source-archive: https://github.com/dimo414/bkt/archive/refs/tags/0.8.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bkt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bkt
  av: sudo av install brew:bkt
  brew: brew install bkt
  debian: sudo apt install bkt
  nix: nix profile install nixpkgs#bkt
  ubuntu: sudo apt install bkt
provenance:
  formula: bkt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
