id: brew:jsvc
display-name: jsvc
homepage: https://commons.apache.org/daemon/jsvc.html
repo: >
  https://www.apache.org/dyn/closer.lua?path=commons/daemon/source/commons-daemon-1.5.1-src.tar.gz
docs: https://commons.apache.org/daemon/jsvc.html
package-manager:
  apk: jsvc
  brew: jsvc
  debian: jsvc
  nix: jsvc
  ubuntu: jsvc
package-manager-url: https://formulae.brew.sh/formula/jsvc
version: 1.5.1
license: Apache-2.0
category: network
tags:
  - cli
description: Wrapper to launch Java applications as daemons
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=commons/daemon/source/commons-daemon-1.5.1-src.tar.gz
dependencies:
  - openjdk@21
executables:
  - exposure: global executable
    kind: cli
    name: jsvc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jsvc
  av: sudo av install brew:jsvc
  brew: brew install jsvc
  debian: sudo apt install jsvc
  nix: nix profile install nixpkgs#jsvc
  ubuntu: sudo apt install jsvc
provenance:
  formula: jsvc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
