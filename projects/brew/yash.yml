id: brew:yash
display-name: yash
homepage: https://magicant.github.io/yash/
repo: https://github.com/magicant/yash
docs: https://magicant.github.io/yash/
package-manager:
  apk: yash
  brew: yash
  dnf: yash
  macports: yash
  nix: yash
  ubuntu: yash
package-manager-url: https://formulae.brew.sh/formula/yash
version: 2.61
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: 'Yet another shell: a POSIX-compliant command-line shell'
source-archive: https://github.com/magicant/yash/releases/download/2.61/yash-2.61.tar.xz
dependencies:
  - gettext
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: yash
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yash
  av: sudo av install brew:yash
  brew: brew install yash
  dnf: sudo dnf install yash
  macports: sudo port install yash
  nix: nix profile install nixpkgs#yash
  ubuntu: sudo apt install yash
provenance:
  formula: yash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
