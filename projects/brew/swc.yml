id: brew:swc
display-name: swc
homepage: https://swc.rs
repo: https://github.com/swc-project/swc
docs: https://swc.rs
package-manager:
  apk: swc
  brew: swc
  nix: swc
  scoop: main/swc
package-manager-url: https://formulae.brew.sh/formula/swc
version: 1.15.40
license: Apache-2.0
category: development
tags:
  - cli
description: Super-fast Rust-based JavaScript/TypeScript compiler
source-archive: https://github.com/swc-project/swc/archive/refs/tags/v1.15.40.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: swc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add swc
  av: sudo av install brew:swc
  brew: brew install swc
  nix: nix profile install nixpkgs#swc
  scoop: scoop install main/swc
provenance:
  formula: swc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
