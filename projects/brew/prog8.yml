id: brew:prog8
display-name: prog8
homepage: https://prog8.readthedocs.io
repo: https://github.com/irmen/prog8
docs: https://prog8.readthedocs.io
package-manager:
  brew: prog8
package-manager-url: https://formulae.brew.sh/formula/prog8
version: 12.1.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: Compiled programming language targeting the 8-bit 6502 CPU family
source-archive: https://github.com/irmen/prog8/archive/refs/tags/v12.1.1.tar.gz
dependencies:
  - openjdk
  - tass64
build-dependencies:
  - gradle
  - kotlin
executables:
  - exposure: global executable
    kind: cli
    name: prog8c
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:prog8
  brew: brew install prog8
provenance:
  formula: prog8
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
