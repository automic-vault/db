id: brew:qman
display-name: qman
homepage: https://github.com/plp13/qman
repo: https://github.com/plp13/qman
docs: https://github.com/plp13/qman
package-manager:
  apk: qman
  brew: qman
package-manager-url: https://formulae.brew.sh/formula/qman
version: 1.5.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: Modern man page viewer
source-archive: https://github.com/plp13/qman/archive/refs/tags/v1.5.1.tar.gz
dependencies:
  - groff
  - ncurses
build-dependencies:
  - cogapp
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: qman
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add qman
  av: sudo av install brew:qman
  brew: brew install qman
provenance:
  formula: qman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
