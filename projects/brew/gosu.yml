id: brew:gosu
display-name: gosu
homepage: https://gosu-lang.github.io/
repo: https://github.com/gosu-lang/gosu-lang
docs: https://gosu-lang.github.io/
package-manager:
  apk: gosu
  brew: gosu
  debian: gosu
  nix: gosu
  ubuntu: gosu
package-manager-url: https://formulae.brew.sh/formula/gosu
version: 1.18.7
license: Apache-2.0
category: development
tags:
  - cli
description: Pragmatic language for the JVM
source-archive: https://github.com/gosu-lang/gosu-lang/archive/refs/tags/v1.18.7.tar.gz
dependencies:
  - openjdk@17
build-dependencies:
  - maven
executables:
  - exposure: global executable
    kind: cli
    name: gosu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gosu
  av: sudo av install brew:gosu
  brew: brew install gosu
  debian: sudo apt install gosu
  nix: nix profile install nixpkgs#gosu
  ubuntu: sudo apt install gosu
provenance:
  formula: gosu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
