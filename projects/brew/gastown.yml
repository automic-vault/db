id: brew:gastown
display-name: gastown
homepage: https://github.com/steveyegge/gastown
repo: https://github.com/steveyegge/gastown
docs: https://github.com/steveyegge/gastown
package-manager:
  brew: gastown
  dnf: gt
  nix: gt
package-manager-url: https://formulae.brew.sh/formula/gastown
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Multi-agent workspace manager
source-archive: https://github.com/steveyegge/gastown/archive/refs/tags/v1.1.0.tar.gz
dependencies:
  - beads
  - icu4c@78
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gastown
  - exposure: global executable
    kind: cli
    name: gt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gastown
  brew: brew install gastown
  dnf: sudo dnf install gt
  nix: nix profile install nixpkgs#gt
provenance:
  formula: gastown
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
