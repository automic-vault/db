id: brew:aravis
display-name: aravis
homepage: https://github.com/AravisProject/aravis
repo: https://github.com/AravisProject/aravis
docs: https://github.com/AravisProject/aravis
package-manager:
  apk: aravis
  brew: aravis
  nix: aravis
  zypper: aravis
package-manager-url: https://formulae.brew.sh/formula/aravis
version: 0.8.36
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Vision library for genicam based cameras
source-archive: https://github.com/AravisProject/aravis/releases/download/0.8.36/aravis-0.8.36.tar.xz
dependencies:
  - adwaita-icon-theme
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gstreamer
  - gtk+3
  - harfbuzz
  - intltool
  - libnotify
  - libusb
  - pango
build-dependencies:
  - gettext
  - gobject-introspection
  - gtk-doc
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: arv-camera-test-0.8
  - exposure: global executable
    kind: cli
    name: arv-fake-gv-camera-0.8
  - exposure: global executable
    kind: cli
    name: arv-test-0.8
  - exposure: global executable
    kind: cli
    name: arv-tool-0.8
  - exposure: global executable
    kind: cli
    name: arv-viewer-0.8
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    For GStreamer to find the bundled plugin: export
    GST_PLUGIN_PATH=$HOMEBREW_PREFIX/opt/aravis/lib/gstreamer-1.0
  post-install-defined: true
install-lines:
  apk: sudo apk add aravis
  av: sudo av install brew:aravis
  brew: brew install aravis
  nix: nix profile install nixpkgs#aravis
  zypper: sudo zypper install aravis
provenance:
  formula: aravis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
