id: brew:pvetui
display-name: pvetui
homepage: https://github.com/devnullvoid/pvetui
repo: https://github.com/devnullvoid/pvetui
docs: https://github.com/devnullvoid/pvetui
package-manager:
  brew: pvetui
  nix: pvetui
  zypper: pvetui
package-manager-url: https://formulae.brew.sh/formula/pvetui
version: 1.4.0
license: MIT
category: development
tags:
  - cli
description: Terminal UI for Proxmox VE
source-archive: https://github.com/devnullvoid/pvetui/archive/refs/tags/v1.4.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pvetui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pvetui
  brew: brew install pvetui
  nix: nix profile install nixpkgs#pvetui
  zypper: sudo zypper install pvetui
provenance:
  formula: pvetui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
