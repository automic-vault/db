id: brew:libpagemaker
display-name: libpagemaker
homepage: https://wiki.documentfoundation.org/DLP/Libraries/libpagemaker
repo: https://dev-www.libreoffice.org/src/libpagemaker/libpagemaker-0.0.4.tar.xz
docs: https://wiki.documentfoundation.org/DLP/Libraries/libpagemaker
package-manager:
  apk: libpagemaker
  brew: libpagemaker
  dnf: libpagemaker
  macports: libpagemaker
  nix: libpagemaker
  pacman: libpagemaker
package-manager-url: https://formulae.brew.sh/formula/libpagemaker
version: 0.0.4
license: MPL-2.0
category: development
tags:
  - cli
description: Imports file format of Aldus/Adobe PageMaker documents
source-archive: https://dev-www.libreoffice.org/src/libpagemaker/libpagemaker-0.0.4.tar.xz
dependencies:
  - librevenge
build-dependencies:
  - boost
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pmd2raw
  - exposure: global executable
    kind: cli
    name: pmd2svg
  - exposure: global executable
    kind: cli
    name: pmd2text
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libpagemaker
  av: sudo av install brew:libpagemaker
  brew: brew install libpagemaker
  dnf: sudo dnf install libpagemaker
  macports: sudo port install libpagemaker
  nix: nix profile install nixpkgs#libpagemaker
  pacman: sudo pacman -S libpagemaker
provenance:
  formula: libpagemaker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
