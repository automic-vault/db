id: brew:newsraft
display-name: newsraft
homepage: https://codeberg.org/newsraft/newsraft
repo: https://codeberg.org/newsraft/newsraft/archive/newsraft-0.36.tar.gz
docs: https://codeberg.org/newsraft/newsraft
package-manager:
  apk: newsraft
  brew: newsraft
  macports: newsraft
  nix: newsraft
package-manager-url: https://formulae.brew.sh/formula/newsraft
version: 0.36
license: ISC
category: network
tags:
  - cli
description: Terminal feed reader
source-archive: https://codeberg.org/newsraft/newsraft/archive/newsraft-0.36.tar.gz
dependencies:
  - gumbo-parser
build-dependencies:
  - scdoc
uses-from-macos:
  - curl
  - expat
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: newsraft
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add newsraft
  av: sudo av install brew:newsraft
  brew: brew install newsraft
  macports: sudo port install newsraft
  nix: nix profile install nixpkgs#newsraft
provenance:
  formula: newsraft
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
