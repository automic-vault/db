id: brew:iproute2mac
display-name: iproute2mac
homepage: https://github.com/brona/iproute2mac
repo: https://github.com/brona/iproute2mac
docs: https://github.com/brona/iproute2mac
package-manager:
  apk: bridge
  brew: iproute2mac
  macports: iproute2mac
  nix: iproute2mac
  winget: Geomitron.Bridge
package-manager-url: https://formulae.brew.sh/formula/iproute2mac
version: 1.7.4
license: MIT
category: development
tags:
  - cli
description: CLI wrapper for basic network utilities on macOS - ip command
source-archive: https://github.com/brona/iproute2mac/releases/download/v1.7.4/iproute2mac-1.7.4.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: bridge
  - exposure: global executable
    kind: cli
    name: ip
  - exposure: global executable
    kind: cli
    name: ss
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bridge
  av: sudo av install brew:iproute2mac
  brew: brew install iproute2mac
  macports: sudo port install iproute2mac
  nix: nix profile install nixpkgs#iproute2mac
  winget: winget install --id Geomitron.Bridge -e
provenance:
  formula: iproute2mac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
