id: brew:timidity
display-name: timidity
homepage: https://timidity.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/timidity/TiMidity++/TiMidity++-2.15.0/TiMidity++-2.15.0.tar.bz2
docs: https://timidity.sourceforge.net/
package-manager:
  brew: timidity
  debian: timidity
  dnf: timidity++
  nix: timidity
  pacman: timidity++
  ubuntu: timidity
  zypper: timidity
package-manager-url: https://formulae.brew.sh/formula/timidity
version: 2.15.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Software synthesizer
source-archive: >
  https://downloads.sourceforge.net/project/timidity/TiMidity++/TiMidity++-2.15.0/TiMidity++-2.15.0.tar.bz2
dependencies:
  - flac
  - libao
  - libogg
  - libvorbis
  - speex
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: timidity
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:timidity
  brew: brew install timidity
  debian: sudo apt install timidity
  dnf: sudo dnf install timidity++
  nix: nix profile install nixpkgs#timidity
  pacman: sudo pacman -S timidity++
  ubuntu: sudo apt install timidity
  zypper: sudo zypper install timidity
provenance:
  formula: timidity
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
