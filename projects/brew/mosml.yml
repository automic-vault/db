id: brew:mosml
display-name: mosml
homepage: https://mosml.org/
repo: https://github.com/kfl/mosml
docs: https://mosml.org/
package-manager:
  brew: mosml
  macports: mosml
  nix: mosml
package-manager-url: https://formulae.brew.sh/formula/mosml
version: 2.10.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Moscow ML
source-archive: https://github.com/kfl/mosml/archive/refs/tags/ver-2.10.1.tar.gz
dependencies:
  - gmp
executables:
  - exposure: global executable
    kind: cli
    name: camlrunm
  - exposure: global executable
    kind: cli
    name: mosml
  - exposure: global executable
    kind: cli
    name: mosmlc
  - exposure: global executable
    kind: cli
    name: mosmllex
  - exposure: global executable
    kind: cli
    name: mosmlyac
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mosml
  brew: brew install mosml
  macports: sudo port install mosml
  nix: nix profile install nixpkgs#mosml
provenance:
  formula: mosml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
