id: brew:cartridge-cli
display-name: cartridge-cli
homepage: https://tarantool.org/
repo: https://github.com/tarantool/cartridge-cli
docs: https://tarantool.org/
package-manager:
  brew: cartridge-cli
package-manager-url: https://formulae.brew.sh/formula/cartridge-cli
version: 2.12.12
license: BSD-2-Clause
category: development
tags:
  - cli
description: Tarantool Cartridge command-line utility
source-archive: https://github.com/tarantool/cartridge-cli.git
build-dependencies:
  - go
  - mage
executables:
  - exposure: global executable
    kind: cli
    name: cartridge
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cartridge-cli
  brew: brew install cartridge-cli
provenance:
  formula: cartridge-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
