id: brew:chainsaw
display-name: chainsaw
homepage: https://github.com/WithSecureLabs/chainsaw
repo: https://github.com/WithSecureLabs/chainsaw
docs: https://github.com/WithSecureLabs/chainsaw
package-manager:
  brew: chainsaw
  nix: chainsaw
package-manager-url: https://formulae.brew.sh/formula/chainsaw
version: 2.16.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Rapidly Search and Hunt through Windows Forensic Artefacts
source-archive: https://github.com/WithSecureLabs/chainsaw/archive/refs/tags/v2.16.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: chainsaw
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chainsaw
  brew: brew install chainsaw
  nix: nix profile install nixpkgs#chainsaw
provenance:
  formula: chainsaw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
