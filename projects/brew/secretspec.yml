id: brew:secretspec
display-name: secretspec
homepage: https://secretspec.dev
repo: https://github.com/cachix/secretspec
docs: https://secretspec.dev
package-manager:
  brew: secretspec
  nix: secretspec
package-manager-url: https://formulae.brew.sh/formula/secretspec
version: 0.11.0
license: Apache-2.0
category: security
tags:
  - cli
description: Declarative secrets management tool
source-archive: https://github.com/cachix/secretspec/archive/refs/tags/v0.11.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: secretspec
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:secretspec
  brew: brew install secretspec
  nix: nix profile install nixpkgs#secretspec
provenance:
  formula: secretspec
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
