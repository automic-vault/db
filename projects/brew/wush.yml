id: brew:wush
display-name: wush
homepage: https://github.com/coder/wush
repo: https://github.com/coder/wush
docs: https://github.com/coder/wush
package-manager:
  brew: wush
  nix: wush
package-manager-url: https://formulae.brew.sh/formula/wush
version: 0.4.1
license: CC0-1.0
category: development
tags:
  - cli
description: Transfer files between computers via WireGuard
source-archive: https://github.com/coder/wush/archive/refs/tags/v0.4.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wush
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wush
  brew: brew install wush
  nix: nix profile install nixpkgs#wush
provenance:
  formula: wush
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
