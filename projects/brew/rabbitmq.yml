id: brew:rabbitmq
display-name: rabbitmq
homepage: https://www.rabbitmq.com
repo: https://github.com/rabbitmq/rabbitmq-server
docs: https://www.rabbitmq.com
package-manager:
  apk: rabbitmq-server
  brew: rabbitmq
  chocolatey: rabbitmq
  debian: rabbitmq-server
  dnf: rabbitmq-server
  macports: rabbitmq-server
  nix: rabbitmq-server
  pacman: rabbitmq
  scoop: extras/rabbitmq
  ubuntu: rabbitmq-server
  zypper: rabbitmq-server
package-manager-url: https://formulae.brew.sh/formula/rabbitmq
version: 4.3.1
license: MPL-2.0
category: development
tags:
  - cli
description: Messaging and streaming broker
source-archive: >
  https://github.com/rabbitmq/rabbitmq-server/releases/download/v4.3.1/rabbitmq-server-generic-unix-4.3.1.tar.xz
dependencies:
  - erlang@28
executables:
  - exposure: global executable
    kind: cli
    name: rabbitmq-defaults
  - exposure: global executable
    kind: cli
    name: rabbitmq-diagnostics
  - exposure: global executable
    kind: cli
    name: rabbitmq-env
  - exposure: global executable
    kind: cli
    name: rabbitmq-plugins
  - exposure: global executable
    kind: cli
    name: rabbitmq-queues
  - exposure: global executable
    kind: cli
    name: rabbitmq-server
  - exposure: global executable
    kind: cli
    name: rabbitmq-streams
  - exposure: global executable
    kind: cli
    name: rabbitmq-upgrade
  - exposure: global executable
    kind: cli
    name: rabbitmqctl
  - exposure: global executable
    kind: cli
    name: vmware-rabbitmq
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Management UI: http://localhost:15672 Homebrew-specific docs:
    https://rabbitmq.com/install-homebrew.html
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add rabbitmq-server
  av: sudo av install brew:rabbitmq
  brew: brew install rabbitmq
  chocolatey: choco install rabbitmq
  debian: sudo apt install rabbitmq-server
  dnf: sudo dnf install rabbitmq-server
  macports: sudo port install rabbitmq-server
  nix: nix profile install nixpkgs#rabbitmq-server
  pacman: sudo pacman -S rabbitmq
  scoop: scoop install extras/rabbitmq
  ubuntu: sudo apt install rabbitmq-server
  zypper: sudo zypper install rabbitmq-server
provenance:
  formula: rabbitmq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
