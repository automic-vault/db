id: brew:globstar
display-name: globstar
homepage: https://globstar.dev
repo: https://github.com/DeepSourceCorp/globstar
docs: https://globstar.dev
package-manager:
  brew: globstar
package-manager-url: https://formulae.brew.sh/formula/globstar
version: 0.7.2
license: MIT
category: development
tags:
  - cli
description: Static analysis toolkit for writing and running code checkers
source-archive: https://github.com/DeepSourceCorp/globstar/archive/refs/tags/v0.7.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: globstar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:globstar
  brew: brew install globstar
provenance:
  formula: globstar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
