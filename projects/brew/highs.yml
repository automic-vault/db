id: brew:highs
display-name: highs
homepage: https://www.maths.ed.ac.uk/hall/HiGHS/
repo: https://github.com/ERGO-Code/HiGHS
docs: https://www.maths.ed.ac.uk/hall/HiGHS/
package-manager:
  brew: highs
  debian: highs
  macports: HiGHS
  nix: highs
  pacman: highs
  scoop: main/highs
package-manager-url: https://formulae.brew.sh/formula/highs
version: 1.14.0
license: MIT
category: development
tags:
  - cli
description: Linear optimization software
source-archive: https://github.com/ERGO-Code/HiGHS/archive/refs/tags/v1.14.0.tar.gz
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: highs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:highs
  brew: brew install highs
  debian: sudo apt install highs
  macports: sudo port install HiGHS
  nix: nix profile install nixpkgs#highs
  pacman: sudo pacman -S highs
  scoop: scoop install main/highs
provenance:
  formula: highs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
