id: brew:luaradio
display-name: luaradio
homepage: https://luaradio.io/
repo: https://github.com/vsergeev/luaradio
docs: https://luaradio.io/
package-manager:
  brew: luaradio
  macports: luaradio
package-manager-url: https://formulae.brew.sh/formula/luaradio
version: 0.11.0
license: MIT
category: development
tags:
  - cli
description: Lightweight, embeddable flow graph signal processing framework for SDR
source-archive: https://github.com/vsergeev/luaradio/archive/refs/tags/v0.11.0.tar.gz
dependencies:
  - fftw
  - liquid-dsp
  - luajit
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: luaradio
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:luaradio
  brew: brew install luaradio
  macports: sudo port install luaradio
provenance:
  formula: luaradio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
