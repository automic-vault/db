id: brew:bcal
display-name: bcal
homepage: https://github.com/jarun/bcal
repo: https://github.com/jarun/bcal
docs: https://github.com/jarun/bcal
package-manager:
  brew: bcal
  debian: bcal
  dnf: bcal
  nix: bcal
  ubuntu: bcal
  zypper: bcal
package-manager-url: https://formulae.brew.sh/formula/bcal
version: 2.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Storage conversion and expression calculator
source-archive: https://github.com/jarun/bcal/archive/refs/tags/v2.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bcal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bcal
  brew: brew install bcal
  debian: sudo apt install bcal
  dnf: sudo dnf install bcal
  nix: nix profile install nixpkgs#bcal
  ubuntu: sudo apt install bcal
  zypper: sudo zypper install bcal
provenance:
  formula: bcal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
