id: brew:r
display-name: r
homepage: https://www.r-project.org/
repo: https://cran.r-project.org/src/base/R-4/R-4.6.0.tar.gz
docs: https://www.r-project.org/
package-manager:
  apk: R
  brew: r
  chocolatey: R
  dnf: R
  macports: R
  nix: R
  pacman: r
  scoop: main/r
  winget: RProject.R
package-manager-url: https://formulae.brew.sh/formula/r
version: 4.6.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Software environment for statistical computing
source-archive: https://cran.r-project.org/src/base/R-4/R-4.6.0.tar.gz
dependencies:
  - cairo
  - fontconfig
  - freetype
  - gcc
  - gettext
  - jpeg-turbo
  - libpng
  - libx11
  - libxau
  - libxcb
  - libxdmcp
  - libxext
  - libxrender
  - openblas
  - pcre2
  - pixman
  - readline
  - tcl-tk
  - xz
  - zstd
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
  - curl
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: R
  - exposure: global executable
    kind: cli
    name: Rscript
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add R
  av: sudo av install brew:r
  brew: brew install r
  chocolatey: choco install R
  dnf: sudo dnf install R
  macports: sudo port install R
  nix: nix profile install nixpkgs#R
  pacman: sudo pacman -S r
  scoop: scoop install main/r
  winget: winget install --id RProject.R -e
provenance:
  formula: r
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
