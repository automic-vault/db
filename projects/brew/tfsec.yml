id: brew:tfsec
display-name: tfsec
homepage: https://aquasecurity.github.io/tfsec/latest/
repo: https://github.com/aquasecurity/tfsec
docs: https://aquasecurity.github.io/tfsec/latest/
package-manager:
  brew: tfsec
  chocolatey: tfsec
  macports: tfsec
  nix: tfsec
  scoop: main/tfsec
package-manager-url: https://formulae.brew.sh/formula/tfsec
version: 1.28.14
license: MIT
category: cloud
tags:
  - cli
  - security
description: Static analysis security scanner for your terraform code
source-archive: https://github.com/aquasecurity/tfsec/archive/refs/tags/v1.28.14.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tfsec
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tfsec
  brew: brew install tfsec
  chocolatey: choco install tfsec
  macports: sudo port install tfsec
  nix: nix profile install nixpkgs#tfsec
  scoop: scoop install main/tfsec
provenance:
  formula: tfsec
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
