id: brew:logrotate
display-name: logrotate
homepage: https://github.com/logrotate/logrotate
repo: https://github.com/logrotate/logrotate
docs: https://github.com/logrotate/logrotate
package-manager:
  apk: logrotate
  brew: logrotate
  chocolatey: LogRotate
  debian: logrotate
  dnf: logrotate
  macports: logrotate
  nix: logrotate
  pacman: logrotate
  ubuntu: logrotate
  zypper: logrotate
package-manager-url: https://formulae.brew.sh/formula/logrotate
version: 3.22.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Rotates, compresses, and mails system logs
source-archive: https://github.com/logrotate/logrotate/releases/download/3.22.0/logrotate-3.22.0.tar.xz
dependencies:
  - popt
executables:
  - exposure: global executable
    kind: cli
    name: logrotate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add logrotate
  av: sudo av install brew:logrotate
  brew: brew install logrotate
  chocolatey: choco install LogRotate
  debian: sudo apt install logrotate
  dnf: sudo dnf install logrotate
  macports: sudo port install logrotate
  nix: nix profile install nixpkgs#logrotate
  pacman: sudo pacman -S logrotate
  ubuntu: sudo apt install logrotate
  zypper: sudo zypper install logrotate
provenance:
  formula: logrotate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
