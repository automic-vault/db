id: brew:heimdal
display-name: heimdal
homepage: https://github.com/heimdal/heimdal
repo: https://github.com/heimdal/heimdal
docs: https://github.com/heimdal/heimdal
package-manager:
  apk: heimdal
  brew: heimdal
  macports: heimdal
  nix: heimdal
package-manager-url: https://formulae.brew.sh/formula/heimdal
version: 7.8.0
license: BSD-3-Clause AND BSD-2-Clause AND HPND-export2-US AND LicenseRef-Homebrew-public-domain
category: development
tags:
  - cli
description: Free Kerberos 5 implementation
source-archive: https://github.com/heimdal/heimdal/releases/download/heimdal-7.8.0/heimdal-7.8.0.tar.gz
dependencies:
  - lmdb
  - openldap
  - openssl@3
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxcrypt
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: bsearch
  - exposure: global executable
    kind: cli
    name: gsstool
  - exposure: global executable
    kind: cli
    name: heimtools
  - exposure: global executable
    kind: cli
    name: hxtool
  - exposure: global executable
    kind: cli
    name: idn-lookup
  - exposure: global executable
    kind: cli
    name: iprop-log
  - exposure: global executable
    kind: cli
    name: kf
  - exposure: global executable
    kind: cli
    name: kgetcred
  - exposure: global executable
    kind: cli
    name: kstash
  - exposure: global executable
    kind: cli
    name: string2key
  - exposure: global executable
    kind: cli
    name: su
  - exposure: global executable
    kind: cli
    name: verify_krb5_conf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add heimdal
  av: sudo av install brew:heimdal
  brew: brew install heimdal
  macports: sudo port install heimdal
  nix: nix profile install nixpkgs#heimdal
provenance:
  formula: heimdal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
