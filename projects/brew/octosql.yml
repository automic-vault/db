id: brew:octosql
display-name: octosql
homepage: https://github.com/cube2222/octosql/
repo: https://github.com/cube2222/octosql
docs: https://github.com/cube2222/octosql/
package-manager:
  brew: octosql
  macports: octosql
  nix: octosql
  scoop: main/octosql
package-manager-url: https://formulae.brew.sh/formula/octosql
version: 0.13.0
license: MPL-2.0
category: database
tags:
  - cli
description: SQL query tool to analyze data from different file formats and databases
source-archive: https://github.com/cube2222/octosql/archive/refs/tags/v0.13.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: octosql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:octosql
  brew: brew install octosql
  macports: sudo port install octosql
  nix: nix profile install nixpkgs#octosql
  scoop: scoop install main/octosql
provenance:
  formula: octosql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
