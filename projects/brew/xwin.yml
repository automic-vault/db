id: brew:xwin
display-name: xwin
homepage: https://github.com/Jake-Shadle/xwin
repo: https://github.com/Jake-Shadle/xwin
docs: https://github.com/Jake-Shadle/xwin
package-manager:
  brew: xwin
  nix: xwin
package-manager-url: https://formulae.brew.sh/formula/xwin
version: 0.9.0
license: Apache-2.0
category: development
tags:
  - cli
description: Microsoft CRT and Windows SDK headers and libraries loader
source-archive: https://github.com/Jake-Shadle/xwin/archive/refs/tags/0.9.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: xwin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xwin
  brew: brew install xwin
  nix: nix profile install nixpkgs#xwin
provenance:
  formula: xwin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
