id: brew:ronn
display-name: ronn
homepage: https://rtomayko.github.io/ronn/
repo: https://github.com/rtomayko/ronn
docs: https://rtomayko.github.io/ronn/
package-manager:
  apk: ronn
  brew: ronn
  debian: ronn
  nix: ronn
  ubuntu: ronn
package-manager-url: https://formulae.brew.sh/formula/ronn
version: 0.7.3
license: MIT
category: development
tags:
  - cli
description: Builds manuals - the opposite of roff
source-archive: https://github.com/rtomayko/ronn/archive/refs/tags/0.7.3.tar.gz
uses-from-macos:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: ronn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ronn
  av: sudo av install brew:ronn
  brew: brew install ronn
  debian: sudo apt install ronn
  nix: nix profile install nixpkgs#ronn
  ubuntu: sudo apt install ronn
provenance:
  formula: ronn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
