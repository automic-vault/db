id: brew:mairix
display-name: mairix
homepage: https://github.com/vandry/mairix
repo: https://github.com/vandry/mairix
docs: https://github.com/vandry/mairix
package-manager:
  brew: mairix
  debian: mairix
  dnf: mairix
  macports: mairix
  nix: mairix
  pacman: mairix
  ubuntu: mairix
  zypper: mairix
package-manager-url: https://formulae.brew.sh/formula/mairix
version: 0.24
license: GPL-2.0-only
category: development
tags:
  - cli
description: Email index and search tool
source-archive: https://github.com/vandry/mairix/releases/download/0.24/mairix-0.24.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mairix
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
