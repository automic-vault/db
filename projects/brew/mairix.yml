  dnf: sudo dnf install mairix
  macports: sudo port install mairix
  nix: nix profile install nixpkgs#mairix
  pacman: sudo pacman -S mairix
  ubuntu: sudo apt install mairix
  zypper: sudo zypper install mairix
provenance:
  formula: mairix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
