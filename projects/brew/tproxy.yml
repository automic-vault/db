id: brew:tproxy
display-name: tproxy
homepage: https://github.com/kevwan/tproxy
repo: https://github.com/kevwan/tproxy
docs: https://github.com/kevwan/tproxy
package-manager:
  brew: tproxy
  nix: tproxy
  scoop: main/tproxy
package-manager-url: https://formulae.brew.sh/formula/tproxy
version: 0.9.2
license: MIT
category: development
tags:
  - cli
description: CLI tool to proxy and analyze TCP connections
source-archive: https://github.com/kevwan/tproxy/archive/refs/tags/v0.9.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tproxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tproxy
  brew: brew install tproxy
  nix: nix profile install nixpkgs#tproxy
  scoop: scoop install main/tproxy
provenance:
  formula: tproxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
