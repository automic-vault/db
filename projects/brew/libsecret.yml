id: brew:libsecret
display-name: libsecret
homepage: https://wiki.gnome.org/Projects/Libsecret
repo: https://download.gnome.org/sources/libsecret/0.21/libsecret-0.21.7.tar.xz
docs: https://wiki.gnome.org/Projects/Libsecret
package-manager:
  apk: libsecret
  brew: libsecret
  dnf: libsecret
  macports: libsecret
  nix: libsecret
  pacman: libsecret
  zypper: secret-tool
package-manager-url: https://formulae.brew.sh/formula/libsecret
version: 0.21.7
license: LGPL-2.1-or-later
category: security
tags:
  - cli
description: Library for storing/retrieving passwords and other secrets
source-archive: https://download.gnome.org/sources/libsecret/0.21/libsecret-0.21.7.tar.xz
dependencies:
  - gettext
  - glib
  - libgcrypt
build-dependencies:
  - docbook-xsl
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - vala
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: secret-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libsecret
  av: sudo av install brew:libsecret
  brew: brew install libsecret
  dnf: sudo dnf install libsecret
  macports: sudo port install libsecret
  nix: nix profile install nixpkgs#libsecret
  pacman: sudo pacman -S libsecret
  zypper: sudo zypper install secret-tool
provenance:
  formula: libsecret
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
