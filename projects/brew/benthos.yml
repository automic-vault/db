id: brew:benthos
display-name: benthos
homepage: https://github.com/redpanda-data/benthos
repo: https://github.com/redpanda-data/benthos
docs: https://github.com/redpanda-data/benthos
package-manager:
  brew: benthos
  nix: benthos
package-manager-url: https://formulae.brew.sh/formula/benthos
version: 4.73.0
license: MIT
category: development
tags:
  - cli
description: Stream processor for mundane tasks written in Go
source-archive: https://github.com/redpanda-data/benthos/archive/refs/tags/v4.73.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: benthos
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:benthos
  brew: brew install benthos
  nix: nix profile install nixpkgs#benthos
provenance:
  formula: benthos
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
