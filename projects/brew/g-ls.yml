id: brew:g-ls
display-name: g-ls
homepage: https://equationzhao.github.io/g/
repo: https://github.com/Equationzhao/g
docs: https://equationzhao.github.io/g/
package-manager:
  apk: g++
  brew: g-ls
  debian: g++
  macports: g-ls
  nix: g-ls
  scoop: main/g
  ubuntu: g++
package-manager-url: https://formulae.brew.sh/formula/g-ls
version: 0.31.2
license: MIT
category: development
tags:
  - cli
description: Powerful and cross-platform ls
source-archive: https://github.com/Equationzhao/g/archive/refs/tags/v0.31.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: g
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add g++
  av: sudo av install brew:g-ls
  brew: brew install g-ls
  debian: sudo apt install g++
  macports: sudo port install g-ls
  nix: nix profile install nixpkgs#g-ls
  scoop: scoop install main/g
  ubuntu: sudo apt install g++
provenance:
  formula: g-ls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
