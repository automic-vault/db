id: brew:numpy
display-name: numpy
homepage: https://www.numpy.org/
repo: >
  https://files.pythonhosted.org/packages/d0/ad/fed0499ce6a338d2a03ebae59cd15093910c8875328855781952abf6c2fe/numpy-2.4.6.tar.gz
docs: https://www.numpy.org/
package-manager:
  brew: numpy
  chocolatey: numpy
package-manager-url: https://formulae.brew.sh/formula/numpy
version: 2.4.6
license: BSD-3-Clause
category: network
tags:
  - cli
description: Package for scientific computing with Python
source-archive: >
  https://files.pythonhosted.org/packages/d0/ad/fed0499ce6a338d2a03ebae59cd15093910c8875328855781952abf6c2fe/numpy-2.4.6.tar.gz
dependencies:
  - openblas
build-dependencies:
  - gcc
  - meson
  - ninja
  - python@3.13
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: f2py
  - exposure: global executable
    kind: cli
    name: numpy-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: To run `f2py`, you may need to `brew install python@3.14`
  post-install-defined: false
install-lines:
  av: sudo av install brew:numpy
  brew: brew install numpy
  chocolatey: choco install numpy
provenance:
  formula: numpy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
