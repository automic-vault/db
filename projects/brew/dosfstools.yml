id: brew:dosfstools
display-name: dosfstools
homepage: https://github.com/dosfstools
repo: https://github.com/dosfstools/dosfstools
docs: https://github.com/dosfstools
package-manager:
  apk: dosfstools
  brew: dosfstools
  debian: dosfstools
  dnf: dosfstools
  macports: dosfstools
  nix: dosfstools
  pacman: dosfstools
  ubuntu: dosfstools
  zypper: dosfstools
package-manager-url: https://formulae.brew.sh/formula/dosfstools
version: 4.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Tools to create, check and label file systems of the FAT family
source-archive: https://github.com/dosfstools/dosfstools/releases/download/v4.2/dosfstools-4.2.tar.gz
build-dependencies:
  - autoconf
  - automake
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dosfsck
  - exposure: global executable
    kind: cli
    name: dosfslabel
  - exposure: global executable
    kind: cli
    name: fatlabel
  - exposure: global executable
    kind: cli
    name: fsck.fat
  - exposure: global executable
    kind: cli
    name: fsck.msdos
  - exposure: global executable
    kind: cli
    name: fsck.vfat
  - exposure: global executable
    kind: cli
    name: mkdosfs
  - exposure: global executable
    kind: cli
    name: mkfs.fat
  - exposure: global executable
    kind: cli
    name: mkfs.msdos
  - exposure: global executable
    kind: cli
    name: mkfs.vfat
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dosfstools
  av: sudo av install brew:dosfstools
  brew: brew install dosfstools
  debian: sudo apt install dosfstools
  dnf: sudo dnf install dosfstools
  macports: sudo port install dosfstools
  nix: nix profile install nixpkgs#dosfstools
  pacman: sudo pacman -S dosfstools
  ubuntu: sudo apt install dosfstools
  zypper: sudo zypper install dosfstools
provenance:
  formula: dosfstools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
