id: brew:plz-cli
display-name: plz-cli
homepage: https://github.com/m1guelpf/plz-cli
repo: https://github.com/m1guelpf/plz-cli
docs: https://github.com/m1guelpf/plz-cli
package-manager:
  brew: plz-cli
package-manager-url: https://formulae.brew.sh/formula/plz-cli
version: 0.1.9
license: MIT
category: development
tags:
  - cli
description: Copilot for your terminal
source-archive: https://github.com/m1guelpf/plz-cli/archive/refs/tags/v0.1.9.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: plz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:plz-cli
  brew: brew install plz-cli
provenance:
  formula: plz-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
