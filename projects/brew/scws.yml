id: brew:scws
display-name: scws
homepage: https://github.com/hightman/scws
repo: https://www.xunsearch.com/scws/down/scws-1.2.3.tar.bz2
docs: https://github.com/hightman/scws
package-manager:
  brew: scws
package-manager-url: https://formulae.brew.sh/formula/scws
version: 1.2.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: Simple Chinese Word Segmentation
source-archive: https://www.xunsearch.com/scws/down/scws-1.2.3.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: scws
  - exposure: global executable
    kind: cli
    name: scws-gen-dict
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:scws
  brew: brew install scws
provenance:
  formula: scws
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
