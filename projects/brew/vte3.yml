id: brew:vte3
display-name: vte3
homepage: https://wiki.gnome.org/Apps/Terminal/VTE
repo: https://download.gnome.org/sources/vte/0.82/vte-0.82.3.tar.xz
docs: https://wiki.gnome.org/Apps/Terminal/VTE
package-manager:
  apk: vte3
  brew: vte3
  pacman: vte3
package-manager-url: https://formulae.brew.sh/formula/vte3
version: 0.82.3
license: LGPL-2.0-or-later
category: network
tags:
  - cli
description: Terminal emulator widget used by GNOME terminal
source-archive: https://download.gnome.org/sources/vte/0.82/vte-0.82.3.tar.xz
dependencies:
  - at-spi2-core
  - cairo
  - fribidi
  - gdk-pixbuf
  - gettext
  - glib
  - gnutls
  - graphene
  - gtk+3
  - gtk4
  - icu4c@78
  - lz4
  - pango
  - pcre2
  - simdutf
build-dependencies:
  - fast_float
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: vte-2.91
  - exposure: global executable
    kind: cli
    name: vte-2.91-gtk4
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vte3
  av: sudo av install brew:vte3
  brew: brew install vte3
  pacman: sudo pacman -S vte3
provenance:
  formula: vte3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
