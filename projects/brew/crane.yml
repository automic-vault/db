id: brew:crane
display-name: crane
homepage: https://github.com/google/go-containerregistry
repo: https://github.com/google/go-containerregistry
docs: https://github.com/google/go-containerregistry
package-manager:
  apk: crane
  brew: crane
  pacman: crane
  zypper: crane
package-manager-url: https://formulae.brew.sh/formula/crane
version: 0.21.6
license: Apache-2.0
category: development
tags:
  - cli
description: Tool for interacting with remote images and registries
source-archive: https://github.com/google/go-containerregistry/archive/refs/tags/v0.21.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: crane
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add crane
  av: sudo av install brew:crane
  brew: brew install crane
  pacman: sudo pacman -S crane
  zypper: sudo zypper install crane
provenance:
  formula: crane
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
