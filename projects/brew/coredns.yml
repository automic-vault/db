id: brew:coredns
display-name: coredns
homepage: https://coredns.io/
repo: https://github.com/coredns/coredns
docs: https://coredns.io/
package-manager:
  apk: coredns
  brew: coredns
  nix: coredns
  scoop: main/coredns
  zypper: coredns
package-manager-url: https://formulae.brew.sh/formula/coredns
version: 1.14.3
license: Apache-2.0
category: development
tags:
  - cli
description: DNS server that chains plugins
source-archive: https://github.com/coredns/coredns/archive/refs/tags/v1.14.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: coredns
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add coredns
  av: sudo av install brew:coredns
  brew: brew install coredns
  nix: nix profile install nixpkgs#coredns
  scoop: scoop install main/coredns
  zypper: sudo zypper install coredns
provenance:
  formula: coredns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
