id: brew:librime
display-name: librime
homepage: https://rime.im
repo: https://github.com/rime/librime
docs: https://rime.im
package-manager:
  apk: librime
  brew: librime
  dnf: librime
  macports: librime
  nix: librime
  pacman: librime
package-manager-url: https://formulae.brew.sh/formula/librime
version: 1.16.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Rime Input Method Engine
source-archive: https://github.com/rime/librime.git
dependencies:
  - capnp
  - gflags
  - glog
  - leveldb
  - lua
  - marisa
  - opencc
  - yaml-cpp
build-dependencies:
  - boost
  - cmake
  - icu4c@78
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rime_deployer
  - exposure: global executable
    kind: cli
    name: rime_dict_manager
  - exposure: global executable
    kind: cli
    name: rime_patch
  - exposure: global executable
    kind: cli
    name: rime_table_decompiler
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add librime
  av: sudo av install brew:librime
  brew: brew install librime
  dnf: sudo dnf install librime
  macports: sudo port install librime
  nix: nix profile install nixpkgs#librime
  pacman: sudo pacman -S librime
provenance:
  formula: librime
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
