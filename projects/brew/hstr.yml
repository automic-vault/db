id: brew:hstr
display-name: hstr
homepage: https://github.com/dvorka/hstr
repo: https://github.com/dvorka/hstr
docs: https://github.com/dvorka/hstr
package-manager:
  apk: hstr
  brew: hstr
  debian: hstr
  dnf: hstr
  macports: hstr
  nix: hstr
  ubuntu: hstr
package-manager-url: https://formulae.brew.sh/formula/hstr
version: 3.2
license: Apache-2.0
category: development
tags:
  - cli
description: Bash and zsh history suggest box
source-archive: https://github.com/dvorka/hstr/archive/refs/tags/v3.2.tar.gz
dependencies:
  - readline
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: hh
  - exposure: global executable
    kind: cli
    name: hstr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hstr
  av: sudo av install brew:hstr
  brew: brew install hstr
  debian: sudo apt install hstr
  dnf: sudo dnf install hstr
  macports: sudo port install hstr
  nix: nix profile install nixpkgs#hstr
  ubuntu: sudo apt install hstr
provenance:
  formula: hstr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
