id: brew:getdns
display-name: getdns
homepage: https://getdnsapi.net
repo: https://getdnsapi.net/releases/getdns-1-7-3/getdns-1.7.3.tar.gz
docs: https://getdnsapi.net
package-manager:
  apk: getdns
  brew: getdns
  dnf: getdns
  macports: getdns
  nix: getdns
  pacman: getdns
package-manager-url: https://formulae.brew.sh/formula/getdns
version: 1.7.3
license: BSD-3-Clause
category: network
tags:
  - cli
description: Modern asynchronous DNS API
source-archive: https://getdnsapi.net/releases/getdns-1-7-3/getdns-1.7.3.tar.gz
dependencies:
  - libev
  - libevent
  - libidn2
  - libuv
  - openssl@3
  - unbound
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: getdns_query
  - exposure: global executable
    kind: cli
    name: getdns_server_mon
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add getdns
  av: sudo av install brew:getdns
  brew: brew install getdns
  dnf: sudo dnf install getdns
  macports: sudo port install getdns
  nix: nix profile install nixpkgs#getdns
  pacman: sudo pacman -S getdns
provenance:
  formula: getdns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
