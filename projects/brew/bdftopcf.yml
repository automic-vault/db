id: brew:bdftopcf
display-name: bdftopcf
homepage: https://gitlab.freedesktop.org/xorg/util/bdftopcf
repo: https://www.x.org/releases/individual/util/bdftopcf-1.1.2.tar.xz
docs: https://gitlab.freedesktop.org/xorg/util/bdftopcf
package-manager:
  apk: bdftopcf
  brew: bdftopcf
  dnf: bdftopcf
  macports: bdftopcf
  nix: bdftopcf
  zypper: bdftopcf
package-manager-url: https://formulae.brew.sh/formula/bdftopcf
version: 1.1.2
license: MIT-open-group
category: development
tags:
  - cli
description: Convert X font from Bitmap Distribution Format to Portable Compiled Format
source-archive: https://www.x.org/releases/individual/util/bdftopcf-1.1.2.tar.xz
build-dependencies:
  - pkgconf
  - xorgproto
executables:
  - exposure: global executable
    kind: cli
    name: bdftopcf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bdftopcf
  av: sudo av install brew:bdftopcf
  brew: brew install bdftopcf
  dnf: sudo dnf install bdftopcf
  macports: sudo port install bdftopcf
  nix: nix profile install nixpkgs#bdftopcf
  zypper: sudo zypper install bdftopcf
provenance:
  formula: bdftopcf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
