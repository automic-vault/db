id: brew:bosh-cli
display-name: bosh-cli
homepage: https://bosh.io/docs/cli-v2/
repo: https://github.com/cloudfoundry/bosh-cli
docs: https://bosh.io/docs/cli-v2/
package-manager:
  brew: bosh-cli
  nix: bosh-cli
package-manager-url: https://formulae.brew.sh/formula/bosh-cli
version: 7.10.5
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Cloud Foundry BOSH CLI v2
source-archive: https://github.com/cloudfoundry/bosh-cli/archive/refs/tags/v7.10.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bosh-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bosh-cli
  brew: brew install bosh-cli
  nix: nix profile install nixpkgs#bosh-cli
provenance:
  formula: bosh-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
