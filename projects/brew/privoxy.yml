id: brew:privoxy
display-name: privoxy
homepage: https://www.privoxy.org/
repo: >
  https://downloads.sourceforge.net/project/ijbswa/Sources/4.1.0%20%28stable%29/privoxy-4.1.0-stable-src.tar.gz
docs: https://www.privoxy.org/
package-manager:
  apk: privoxy
  brew: privoxy
  debian: privoxy
  dnf: privoxy
  macports: privoxy
  nix: privoxy
  pacman: privoxy
  scoop: extras/privoxy
  ubuntu: privoxy
  winget: Privoxy.Privoxy
  zypper: privoxy
package-manager-url: https://formulae.brew.sh/formula/privoxy
version: 4.1.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Advanced filtering web proxy
source-archive: >
  https://downloads.sourceforge.net/project/ijbswa/Sources/4.1.0%20%28stable%29/privoxy-4.1.0-stable-src.tar.gz
dependencies:
  - pcre2
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: privoxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add privoxy
  av: sudo av install brew:privoxy
  brew: brew install privoxy
  debian: sudo apt install privoxy
  dnf: sudo dnf install privoxy
  macports: sudo port install privoxy
  nix: nix profile install nixpkgs#privoxy
  pacman: sudo pacman -S privoxy
  scoop: scoop install extras/privoxy
  ubuntu: sudo apt install privoxy
  winget: winget install --id Privoxy.Privoxy -e
  zypper: sudo zypper install privoxy
provenance:
  formula: privoxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
