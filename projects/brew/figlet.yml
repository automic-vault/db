id: brew:figlet
display-name: figlet
homepage: http://www.figlet.org/
repo: ftp://ftp.figlet.org/pub/figlet/program/unix/figlet-2.2.5.tar.gz
docs: http://www.figlet.org/
package-manager:
  apk: figlet
  brew: figlet
  debian: figlet
  dnf: figlet
  macports: figlet
  nix: figlet
  pacman: figlet
  scoop: main/figlet
  ubuntu: figlet
  zypper: figlet
package-manager-url: https://formulae.brew.sh/formula/figlet
version: 2.2.5
license: BSD-3-Clause
category: network
tags:
  - cli
description: Banner-like program prints strings as ASCII art
source-archive: ftp://ftp.figlet.org/pub/figlet/program/unix/figlet-2.2.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: chkfont
  - exposure: global executable
    kind: cli
    name: figlet
  - exposure: global executable
    kind: cli
    name: figlist
  - exposure: global executable
    kind: cli
    name: showfigfonts
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add figlet
  av: sudo av install brew:figlet
  brew: brew install figlet
  debian: sudo apt install figlet
  dnf: sudo dnf install figlet
  macports: sudo port install figlet
  nix: nix profile install nixpkgs#figlet
  pacman: sudo pacman -S figlet
  scoop: scoop install main/figlet
  ubuntu: sudo apt install figlet
  zypper: sudo zypper install figlet
provenance:
  formula: figlet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
