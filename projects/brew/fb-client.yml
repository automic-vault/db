id: brew:fb-client
display-name: fb-client
homepage: https://paste.xinu.at
repo: https://paste.xinu.at/data/client/fb-2.4.0.tar.gz
docs: https://paste.xinu.at
package-manager:
  brew: fb-client
  pacman: fb-client
package-manager-url: https://formulae.brew.sh/formula/fb-client
version: 2.4.0
license: GPL-3.0-only
category: network
tags:
  - cli
description: Shell-script client for
source-archive: https://paste.xinu.at/data/client/fb-2.4.0.tar.gz
dependencies:
  - curl
  - openssl@3
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: fb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fb-client
  brew: brew install fb-client
  pacman: sudo pacman -S fb-client
provenance:
  formula: fb-client
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
