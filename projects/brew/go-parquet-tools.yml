id: brew:go-parquet-tools
display-name: go-parquet-tools
homepage: https://github.com/hangxie/parquet-tools
repo: https://github.com/hangxie/parquet-tools
docs: https://github.com/hangxie/parquet-tools
package-manager:
  brew: go-parquet-tools
  nix: parquet-tools
package-manager-url: https://formulae.brew.sh/formula/go-parquet-tools
version: 1.49.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: Utility to deal with Parquet data
source-archive: https://github.com/hangxie/parquet-tools/archive/refs/tags/v1.49.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: parquet-tools
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:go-parquet-tools
  brew: brew install go-parquet-tools
  nix: nix profile install nixpkgs#parquet-tools
provenance:
  formula: go-parquet-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
