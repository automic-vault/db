id: brew:atlantis
display-name: atlantis
homepage: https://www.runatlantis.io/
repo: https://github.com/runatlantis/atlantis
docs: https://www.runatlantis.io/
package-manager:
  brew: atlantis
  nix: atlantis
package-manager-url: https://formulae.brew.sh/formula/atlantis
version: 0.43.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Terraform Pull Request Automation tool
source-archive: https://github.com/runatlantis/atlantis/archive/refs/tags/v0.43.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: atlantis
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:atlantis
  brew: brew install atlantis
  nix: nix profile install nixpkgs#atlantis
provenance:
  formula: atlantis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
