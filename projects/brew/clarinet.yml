id: brew:clarinet
display-name: clarinet
homepage: https://stackslabs.com/
repo: https://github.com/stx-labs/clarinet
docs: https://stackslabs.com/
package-manager:
  brew: clarinet
  winget: HiroSystems.Clarinet
package-manager-url: https://formulae.brew.sh/formula/clarinet
version: 3.18.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: Command-line tool and runtime for the Clarity smart contract language
source-archive: https://github.com/stx-labs/clarinet/archive/refs/tags/v3.18.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: clarinet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clarinet
  brew: brew install clarinet
  winget: winget install --id HiroSystems.Clarinet -e
provenance:
  formula: clarinet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
