id: brew:breseq
display-name: breseq
homepage: https://barricklab.org/breseq
repo: https://github.com/barricklab/breseq
docs: https://barricklab.org/breseq
package-manager:
  brew: breseq
package-manager-url: https://formulae.brew.sh/formula/breseq
version: 0.40.1
license: GPL-2.0-or-later AND MIT AND BSD-3-Clause
category: development
tags:
  - cli
description: Computational pipeline for finding mutations in short-read DNA resequencing data
source-archive: https://github.com/barricklab/breseq/archive/refs/tags/v0.40.1.tar.gz
dependencies:
  - bowtie2
  - r
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: breseq
  - exposure: global executable
    kind: cli
    name: gdtools
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:breseq
  brew: brew install breseq
provenance:
  formula: breseq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
