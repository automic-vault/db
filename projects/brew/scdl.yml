  zypper: scdl
package-manager-url: https://formulae.brew.sh/formula/scdl
version: 3.0.5
license: GPL-2.0-only
category: cloud
tags:
  - cli
description: Command-line tool to download music from SoundCloud
source-archive: >
  https://files.pythonhosted.org/packages/a8/2f/147c9b5a90fea98e92409eb168bb3dab286d993c28ec46aff1a9750cde52/scdl-3.0.5.tar.gz
dependencies:
  - certifi
  - cffi
  - ffmpeg
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: scdl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
