id: brew:scdl
display-name: scdl
homepage: https://github.com/scdl-org/scdl
repo: >
  https://files.pythonhosted.org/packages/a8/2f/147c9b5a90fea98e92409eb168bb3dab286d993c28ec46aff1a9750cde52/scdl-3.0.5.tar.gz
docs: https://github.com/scdl-org/scdl
package-manager:
