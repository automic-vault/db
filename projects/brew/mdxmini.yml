id: brew:mdxmini
display-name: mdxmini
homepage: https://github.com/mistydemeo/mdxmini/
repo: https://github.com/mistydemeo/mdxmini
docs: https://github.com/mistydemeo/mdxmini/
package-manager:
  brew: mdxmini
package-manager-url: https://formulae.brew.sh/formula/mdxmini
version: 2.0.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Plays music in X68000 MDX chiptune format
source-archive: https://github.com/mistydemeo/mdxmini/archive/refs/tags/v2.0.0.tar.gz
dependencies:
  - sdl2
executables:
  - exposure: global executable
    kind: cli
    name: mdxplay
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mdxmini
  brew: brew install mdxmini
provenance:
  formula: mdxmini
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
