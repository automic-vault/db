id: brew:hamlib
display-name: hamlib
homepage: http://www.hamlib.org/
repo: https://github.com/Hamlib/Hamlib
docs: http://www.hamlib.org/
package-manager:
  apk: hamlib
  brew: hamlib
  dnf: hamlib
  macports: hamlib
  nix: hamlib
  pacman: hamlib
  zypper: hamlib
package-manager-url: https://formulae.brew.sh/formula/hamlib
version: 4.7.1
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Ham radio control libraries
source-archive: https://github.com/Hamlib/Hamlib/releases/download/4.7.1/hamlib-4.7.1.tar.gz
dependencies:
  - libtool
  - libusb
  - libusb-compat
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ampctl
  - exposure: global executable
    kind: cli
    name: ampctld
  - exposure: global executable
    kind: cli
    name: rigctl
  - exposure: global executable
    kind: cli
    name: rigctlcom
  - exposure: global executable
    kind: cli
    name: rigctld
  - exposure: global executable
    kind: cli
    name: rigctlsync
  - exposure: global executable
    kind: cli
    name: rigctltcp
  - exposure: global executable
    kind: cli
    name: rigmem
  - exposure: global executable
    kind: cli
    name: rigsmtr
  - exposure: global executable
    kind: cli
    name: rigswr
  - exposure: global executable
    kind: cli
    name: rigtestlibusb
  - exposure: global executable
    kind: cli
    name: rigtestmcast
  - exposure: global executable
    kind: cli
    name: rigtestmcastrx
  - exposure: global executable
    kind: cli
    name: rotctl
  - exposure: global executable
    kind: cli
    name: rotctld
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hamlib
  av: sudo av install brew:hamlib
  brew: brew install hamlib
  dnf: sudo dnf install hamlib
  macports: sudo port install hamlib
  nix: nix profile install nixpkgs#hamlib
  pacman: sudo pacman -S hamlib
  zypper: sudo zypper install hamlib
provenance:
  formula: hamlib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
