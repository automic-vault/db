id: brew:swift-section
display-name: swift-section
homepage: https://github.com/MxIris-Reverse-Engineering/MachOSwiftSection
repo: https://github.com/MxIris-Reverse-Engineering/MachOSwiftSection
docs: https://github.com/MxIris-Reverse-Engineering/MachOSwiftSection
package-manager:
  brew: swift-section
package-manager-url: https://formulae.brew.sh/formula/swift-section
version: 0.11.0
license: MIT
category: development
tags:
  - cli
description: CLI tool for parsing mach-o files to obtain Swift information
source-archive: >
  https://github.com/MxIris-Reverse-Engineering/MachOSwiftSection/archive/refs/tags/0.11.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: swift-section
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_tahoe
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swift-section
  brew: brew install swift-section
provenance:
  formula: swift-section
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
