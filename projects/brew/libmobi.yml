id: brew:libmobi
display-name: libmobi
homepage: https://github.com/bfabiszewski/libmobi
repo: https://github.com/bfabiszewski/libmobi
docs: https://github.com/bfabiszewski/libmobi
package-manager:
  brew: libmobi
package-manager-url: https://formulae.brew.sh/formula/libmobi
version: 0.12
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: C library for handling Kindle (MOBI) formats of ebook documents
source-archive: https://github.com/bfabiszewski/libmobi/releases/download/v0.12/libmobi-0.12.tar.gz
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: mobidrm
  - exposure: global executable
    kind: cli
    name: mobimeta
  - exposure: global executable
    kind: cli
    name: mobitool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libmobi
  brew: brew install libmobi
provenance:
  formula: libmobi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
