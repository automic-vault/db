id: brew:latexml
display-name: latexml
homepage: https://dlmf.nist.gov/LaTeXML/
repo: https://dlmf.nist.gov/LaTeXML/releases/LaTeXML-0.8.8.tar.gz
docs: https://dlmf.nist.gov/LaTeXML/
package-manager:
  brew: latexml
  debian: latexml
  dnf: LaTeXML
  macports: LaTeXML
  ubuntu: latexml
  zypper: LaTeXML
package-manager-url: https://formulae.brew.sh/formula/latexml
version: 0.8.8
license: LicenseRef-Homebrew-public-domain
category: network
tags:
  - cli
description: LaTeX to XML/HTML/MathML Converter
source-archive: https://dlmf.nist.gov/LaTeXML/releases/LaTeXML-0.8.8.tar.gz
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
  - libxslt
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: latexml
  - exposure: global executable
    kind: cli
    name: latexmlc
  - exposure: global executable
    kind: cli
    name: latexmlfind
  - exposure: global executable
    kind: cli
    name: latexmlmath
  - exposure: global executable
    kind: cli
    name: latexmlpost
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:latexml
  brew: brew install latexml
  debian: sudo apt install latexml
  dnf: sudo dnf install LaTeXML
  macports: sudo port install LaTeXML
  ubuntu: sudo apt install latexml
  zypper: sudo zypper install LaTeXML
provenance:
  formula: latexml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
