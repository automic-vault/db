id: brew:grafana
display-name: grafana
homepage: https://grafana.com
repo: https://github.com/grafana/grafana
docs: https://grafana.com
package-manager:
  apk: grafana
  brew: grafana
  chocolatey: grafana
  dnf: grafana
  macports: grafana
  nix: grafana
  pacman: grafana
  scoop: extras/grafana
  zypper: grafana
package-manager-url: https://formulae.brew.sh/formula/grafana
version: 13.0.1
license: AGPL-3.0-only
category: database
tags:
  - cli
description: Gorgeous metric visualizations and dashboards for timeseries databases
source-archive: https://github.com/grafana/grafana/archive/refs/tags/v13.0.1.tar.gz
build-dependencies:
  - go
  - node
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: grafana
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add grafana
  av: sudo av install brew:grafana
  brew: brew install grafana
  chocolatey: choco install grafana
  dnf: sudo dnf install grafana
  macports: sudo port install grafana
  nix: nix profile install nixpkgs#grafana
  pacman: sudo pacman -S grafana
  scoop: scoop install extras/grafana
  zypper: sudo zypper install grafana
provenance:
  formula: grafana
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
