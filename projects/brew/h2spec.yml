id: brew:h2spec
display-name: h2spec
homepage: https://github.com/summerwind/h2spec
repo: https://github.com/summerwind/h2spec
docs: https://github.com/summerwind/h2spec
package-manager:
  brew: h2spec
  nix: h2spec
package-manager-url: https://formulae.brew.sh/formula/h2spec
version: 2.6.0
license: MIT
category: development
tags:
  - cli
description: Conformance testing tool for HTTP/2 implementation
source-archive: https://github.com/summerwind/h2spec.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: h2spec
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:h2spec
  brew: brew install h2spec
  nix: nix profile install nixpkgs#h2spec
provenance:
  formula: h2spec
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
