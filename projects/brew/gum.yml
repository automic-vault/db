id: brew:gum
display-name: gum
homepage: https://github.com/charmbracelet/gum
repo: https://github.com/charmbracelet/gum
docs: https://github.com/charmbracelet/gum
package-manager:
  apk: gum
  brew: gum
  debian: gum
  dnf: gum
  macports: gum
  nix: gum
  pacman: gum
  scoop: main/gum
  winget: charmbracelet.gum
  zypper: gum
package-manager-url: https://formulae.brew.sh/formula/gum
version: 0.17.0
license: MIT
category: development
tags:
  - cli
description: Tool for glamorous shell scripts
source-archive: https://github.com/charmbracelet/gum/archive/refs/tags/v0.17.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gum
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gum
  av: sudo av install brew:gum
  brew: brew install gum
  debian: sudo apt install gum
  dnf: sudo dnf install gum
  macports: sudo port install gum
  nix: nix profile install nixpkgs#gum
  pacman: sudo pacman -S gum
  scoop: scoop install main/gum
  winget: winget install --id charmbracelet.gum -e
  zypper: sudo zypper install gum
provenance:
  formula: gum
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
