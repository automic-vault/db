id: brew:ipv6calc
display-name: ipv6calc
homepage: https://www.deepspace6.net/projects/ipv6calc.html
repo: https://github.com/pbiering/ipv6calc
docs: https://www.deepspace6.net/projects/ipv6calc.html
package-manager:
  brew: ipv6calc
  debian: ipv6calc
  dnf: ipv6calc
  macports: ipv6calc
  nix: ipv6calc
  pacman: ipv6calc
  ubuntu: ipv6calc
package-manager-url: https://formulae.brew.sh/formula/ipv6calc
version: 4.4.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: Small utility for manipulating IPv6 addresses
source-archive: https://github.com/pbiering/ipv6calc/archive/refs/tags/4.4.0.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: ipv6calc
  - exposure: global executable
    kind: cli
    name: ipv6loganon
  - exposure: global executable
    kind: cli
    name: ipv6logconv
  - exposure: global executable
    kind: cli
    name: ipv6logstats
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ipv6calc
  brew: brew install ipv6calc
  debian: sudo apt install ipv6calc
  dnf: sudo dnf install ipv6calc
  macports: sudo port install ipv6calc
  nix: nix profile install nixpkgs#ipv6calc
  pacman: sudo pacman -S ipv6calc
  ubuntu: sudo apt install ipv6calc
provenance:
  formula: ipv6calc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
