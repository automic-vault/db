id: brew:squashfuse
display-name: squashfuse
homepage: https://github.com/vasi/squashfuse
repo: https://github.com/vasi/squashfuse
docs: https://github.com/vasi/squashfuse
package-manager:
  apk: squashfuse
  brew: squashfuse
  debian: squashfuse
  dnf: squashfuse
  nix: squashfuse
  pacman: squashfuse
  ubuntu: squashfuse
  zypper: squashfuse
package-manager-url: https://formulae.brew.sh/formula/squashfuse
version: 0.6.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: FUSE filesystem to mount squashfs archives
source-archive: https://github.com/vasi/squashfuse/releases/download/0.6.1/squashfuse-0.6.1.tar.gz
dependencies:
  - libfuse
  - lz4
  - lzo
  - squashfs
  - xz
  - zlib-ng-compat
  - zstd
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: squashfuse
  - exposure: global executable
    kind: cli
    name: squashfuse_ll
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add squashfuse
  av: sudo av install brew:squashfuse
  brew: brew install squashfuse
  debian: sudo apt install squashfuse
  dnf: sudo dnf install squashfuse
  nix: nix profile install nixpkgs#squashfuse
  pacman: sudo pacman -S squashfuse
  ubuntu: sudo apt install squashfuse
  zypper: sudo zypper install squashfuse
provenance:
  formula: squashfuse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
