id: brew:opkssh
display-name: opkssh
homepage: https://eprint.iacr.org/2023/296
repo: https://github.com/openpubkey/opkssh
docs: https://eprint.iacr.org/2023/296
package-manager:
  brew: opkssh
  debian: opkssh
  dnf: opkssh
  nix: opkssh
  winget: openpubkey.opkssh
package-manager-url: https://formulae.brew.sh/formula/opkssh
version: 0.14.0
license: Apache-2.0
category: development
tags:
  - cli
description: Enables SSH to be used with OpenID Connect
source-archive: https://github.com/openpubkey/opkssh/archive/refs/tags/v0.14.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: opkssh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:opkssh
  brew: brew install opkssh
  debian: sudo apt install opkssh
  dnf: sudo dnf install opkssh
  nix: nix profile install nixpkgs#opkssh
  winget: winget install --id openpubkey.opkssh -e
provenance:
  formula: opkssh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
