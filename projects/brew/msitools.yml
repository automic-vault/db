id: brew:msitools
display-name: msitools
homepage: https://wiki.gnome.org/msitools
repo: https://download.gnome.org/sources/msitools/0.106/msitools-0.106.tar.xz
docs: https://wiki.gnome.org/msitools
package-manager:
  apk: msitools
  brew: msitools
  debian: msitools
  dnf: msitools
  nix: msitools
  pacman: msitools
  ubuntu: msitools
  zypper: msitools
package-manager-url: https://formulae.brew.sh/formula/msitools
version: 0.106
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Windows installer (.MSI) tool
source-archive: https://download.gnome.org/sources/msitools/0.106/msitools-0.106.tar.xz
dependencies:
  - gcab
  - gettext
  - glib
  - libgsf
build-dependencies:
  - bison
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - vala
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: msibuild
  - exposure: global executable
    kind: cli
    name: msidiff
  - exposure: global executable
    kind: cli
    name: msidump
  - exposure: global executable
    kind: cli
    name: msiextract
  - exposure: global executable
    kind: cli
    name: msiinfo
  - exposure: global executable
    kind: cli
    name: wixl
  - exposure: global executable
    kind: cli
    name: wixl-heat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add msitools
  av: sudo av install brew:msitools
  brew: brew install msitools
  debian: sudo apt install msitools
  dnf: sudo dnf install msitools
  nix: nix profile install nixpkgs#msitools
  pacman: sudo pacman -S msitools
  ubuntu: sudo apt install msitools
  zypper: sudo zypper install msitools
provenance:
  formula: msitools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
