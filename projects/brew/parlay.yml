id: brew:parlay
display-name: parlay
homepage: https://github.com/snyk/parlay
repo: https://github.com/snyk/parlay
docs: https://github.com/snyk/parlay
package-manager:
  brew: parlay
  nix: parlay
  scoop: main/parlay
package-manager-url: https://formulae.brew.sh/formula/parlay
version: 0.11.0
license: Apache-2.0
category: development
tags:
  - cli
description: Enrich SBOMs with data from third party services
source-archive: https://github.com/snyk/parlay/archive/refs/tags/v0.11.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: parlay
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:parlay
  brew: brew install parlay
  nix: nix profile install nixpkgs#parlay
  scoop: scoop install main/parlay
provenance:
  formula: parlay
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
