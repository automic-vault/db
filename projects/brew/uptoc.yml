id: brew:uptoc
display-name: uptoc
homepage: https://github.com/bonaysoft/uptoc
repo: https://github.com/bonaysoft/uptoc
docs: https://github.com/bonaysoft/uptoc
package-manager:
  brew: uptoc
package-manager-url: https://formulae.brew.sh/formula/uptoc
version: 1.4.3
license: MIT
category: development
tags:
  - cli
description: Convenient static file deployment tool that supports multiple platforms
source-archive: https://github.com/bonaysoft/uptoc.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: uptoc
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:uptoc
  brew: brew install uptoc
provenance:
  formula: uptoc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
