id: brew:freeswitch
display-name: freeswitch
homepage: https://freeswitch.org
repo: https://files.freeswitch.org/releases/freeswitch/freeswitch-1.11.0.-release.tar.gz
docs: https://freeswitch.org
package-manager:
  apk: freeswitch
  brew: freeswitch
  nix: freeswitch
package-manager-url: https://formulae.brew.sh/formula/freeswitch
version: 1.11.0.
license: MPL-1.1 AND LGPL-2.1-only
category: network
tags:
  - cli
description: Telephony platform to route various communication protocols
source-archive: https://files.freeswitch.org/releases/freeswitch/freeswitch-1.11.0.-release.tar.gz
dependencies:
  - freetype
  - jpeg-turbo
  - ldns
  - libks
  - libpng
  - libpq
  - libsndfile
  - libtiff
  - lua
  - opencore-amr
  - openssl@3
  - opus
  - pcre2
  - signalwire-client-c
  - sofia-sip
  - speex
  - speexdsp
  - sqlite
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: freeswitch
  - exposure: global executable
    kind: cli
    name: fs_cli
  - exposure: global executable
    kind: cli
    name: fs_encode
  - exposure: global executable
    kind: cli
    name: fs_ivrd
  - exposure: global executable
    kind: cli
    name: fs_tts
  - exposure: global executable
    kind: cli
    name: fsxs
  - exposure: global executable
    kind: cli
    name: gentls_cert
  - exposure: global executable
    kind: cli
    name: switch_eavesdrop
  - exposure: global executable
    kind: cli
    name: tone2wav
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add freeswitch
  av: sudo av install brew:freeswitch
  brew: brew install freeswitch
  nix: nix profile install nixpkgs#freeswitch
provenance:
  formula: freeswitch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
