id: brew:gplugin
display-name: gplugin
homepage: https://keep.imfreedom.org/gplugin/gplugin/
repo: https://downloads.sourceforge.net/project/pidgin/gplugin/0.44.2/gplugin-0.44.2.tar.xz
docs: https://keep.imfreedom.org/gplugin/gplugin/
package-manager:
  brew: gplugin
  dnf: gplugin
  zypper: gplugin
package-manager-url: https://formulae.brew.sh/formula/gplugin
version: 0.44.2
license: LGPL-2.0-or-later AND GPL-3.0-or-later
category: network
tags:
  - cli
description: GObject based library that implements a reusable plugin system
source-archive: https://downloads.sourceforge.net/project/pidgin/gplugin/0.44.2/gplugin-0.44.2.tar.xz
dependencies:
  - gettext
  - glib
  - gtk4
  - pygobject3
  - python@3.14
build-dependencies:
  - gobject-introspection
  - help2man
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: gplugin-gtk4-viewer
  - exposure: global executable
    kind: cli
    name: gplugin-query
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gplugin
  brew: brew install gplugin
  dnf: sudo dnf install gplugin
  zypper: sudo zypper install gplugin
provenance:
  formula: gplugin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
