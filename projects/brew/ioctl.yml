id: brew:ioctl
display-name: ioctl
homepage: https://docs.iotex.io/
repo: https://github.com/iotexproject/iotex-core
docs: https://docs.iotex.io/
package-manager:
  brew: ioctl
package-manager-url: https://formulae.brew.sh/formula/ioctl
version: 2.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line interface for interacting with the IoTeX blockchain
source-archive: https://github.com/iotexproject/iotex-core/archive/refs/tags/v2.4.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ioctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ioctl
  brew: brew install ioctl
provenance:
  formula: ioctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
