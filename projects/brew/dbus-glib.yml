id: brew:dbus-glib
display-name: dbus-glib
homepage: https://wiki.freedesktop.org/www/Software/DBusBindings/
repo: https://dbus.freedesktop.org/releases/dbus-glib/dbus-glib-0.114.tar.gz
docs: https://wiki.freedesktop.org/www/Software/DBusBindings/
package-manager:
  apk: dbus-glib
  brew: dbus-glib
  dnf: dbus-glib
  macports: dbus-glib
  nix: dbus-glib
  pacman: dbus-glib
package-manager-url: https://formulae.brew.sh/formula/dbus-glib
version: 0.114
license: GPL-2.0-or-later AND (AFL-2.1 OR GPL-2.0-or-later)
category: network
tags:
  - cli
description: GLib bindings for the D-Bus message bus system
source-archive: https://dbus.freedesktop.org/releases/dbus-glib/dbus-glib-0.114.tar.gz
dependencies:
  - dbus
  - gettext
  - glib
build-dependencies:
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: dbus-binding-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dbus-glib
  av: sudo av install brew:dbus-glib
  brew: brew install dbus-glib
  dnf: sudo dnf install dbus-glib
  macports: sudo port install dbus-glib
  nix: nix profile install nixpkgs#dbus-glib
  pacman: sudo pacman -S dbus-glib
provenance:
  formula: dbus-glib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
