id: brew:taktuk
display-name: taktuk
homepage: https://taktuk.gitlabpages.inria.fr/
repo: https://deb.debian.org/debian/pool/main/t/taktuk/taktuk_3.7.8.orig.tar.gz
docs: https://taktuk.gitlabpages.inria.fr/
package-manager:
  brew: taktuk
  debian: taktuk
  nix: taktuk
  ubuntu: taktuk
package-manager-url: https://formulae.brew.sh/formula/taktuk
version: 3.7.8
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Deploy commands to (a potentially large set of) remote nodes
source-archive: https://deb.debian.org/debian/pool/main/t/taktuk/taktuk_3.7.8.orig.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: taktuk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:taktuk
  brew: brew install taktuk
  debian: sudo apt install taktuk
  nix: nix profile install nixpkgs#taktuk
  ubuntu: sudo apt install taktuk
provenance:
  formula: taktuk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
