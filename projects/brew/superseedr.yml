id: brew:superseedr
display-name: superseedr
homepage: https://github.com/Jagalite/superseedr
repo: https://github.com/Jagalite/superseedr
docs: https://github.com/Jagalite/superseedr
package-manager:
  brew: superseedr
package-manager-url: https://formulae.brew.sh/formula/superseedr
version: 1.0.7
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: BitTorrent Client in your Terminal
source-archive: https://github.com/Jagalite/superseedr/archive/refs/tags/v1.0.7.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: superseedr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:superseedr
  brew: brew install superseedr
provenance:
  formula: superseedr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
