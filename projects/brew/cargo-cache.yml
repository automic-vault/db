id: brew:cargo-cache
display-name: cargo-cache
homepage: https://github.com/matthiaskrgr/cargo-cache
repo: https://github.com/matthiaskrgr/cargo-cache
docs: https://github.com/matthiaskrgr/cargo-cache
package-manager:
  brew: cargo-cache
  nix: cargo-cache
  pacman: cargo-cache
package-manager-url: https://formulae.brew.sh/formula/cargo-cache
version: 0.8.3
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Display information on the cargo cache, plus optional cache pruning
source-archive: https://github.com/matthiaskrgr/cargo-cache/archive/refs/tags/0.8.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-cache
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-cache
  brew: brew install cargo-cache
  nix: nix profile install nixpkgs#cargo-cache
  pacman: sudo pacman -S cargo-cache
provenance:
  formula: cargo-cache
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
