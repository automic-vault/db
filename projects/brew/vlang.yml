id: brew:vlang
display-name: vlang
homepage: https://vlang.io
repo: https://github.com/vlang/v
docs: https://vlang.io
package-manager:
  apk: vlang
  brew: vlang
  macports: vlang
  nix: vlang
  scoop: main/v
  zypper: vlang
package-manager-url: https://formulae.brew.sh/formula/vlang
version: 0.5.1
license: MIT
category: development
tags:
  - cli
description: V programming language
source-archive: https://github.com/vlang/v/archive/refs/tags/0.5.1.tar.gz
dependencies:
  - bdw-gc
executables:
  - exposure: global executable
    kind: cli
    name: v
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vlang
  av: sudo av install brew:vlang
  brew: brew install vlang
  macports: sudo port install vlang
  nix: nix profile install nixpkgs#vlang
  scoop: scoop install main/v
  zypper: sudo zypper install vlang
provenance:
  formula: vlang
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
