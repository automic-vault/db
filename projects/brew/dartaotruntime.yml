id: brew:dartaotruntime
display-name: dartaotruntime
homepage: https://dart.dev/tools/dartaotruntime
repo: https://raw.githubusercontent.com/dart-lang/sdk/refs/tags/3.12.1/README.md
docs: https://dart.dev/tools/dartaotruntime
package-manager:
  apk: dartaotruntime
  brew: dartaotruntime
package-manager-url: https://formulae.brew.sh/formula/dartaotruntime
version: 3.12.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Command-line tool for running AOT-compiled snapshots of Dart code
source-archive: https://raw.githubusercontent.com/dart-lang/sdk/refs/tags/3.12.1/README.md
build-dependencies:
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: dartaotruntime
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dartaotruntime
  av: sudo av install brew:dartaotruntime
  brew: brew install dartaotruntime
provenance:
  formula: dartaotruntime
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
