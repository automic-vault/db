id: brew:tio
display-name: tio
homepage: https://tio.github.io
repo: https://github.com/tio/tio
docs: https://tio.github.io
package-manager:
  apk: tio
  brew: tio
  debian: tio
  dnf: tio
  macports: tio
  nix: tio
  ubuntu: tio
  zypper: tio
package-manager-url: https://formulae.brew.sh/formula/tio
version: 3.9
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Simple TTY terminal I/O application
source-archive: https://github.com/tio/tio/releases/download/v3.9/tio-3.9.tar.xz
dependencies:
  - glib
  - lua
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: tio
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tio
  av: sudo av install brew:tio
  brew: brew install tio
  debian: sudo apt install tio
  dnf: sudo dnf install tio
  macports: sudo port install tio
  nix: nix profile install nixpkgs#tio
  ubuntu: sudo apt install tio
  zypper: sudo zypper install tio
provenance:
  formula: tio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
