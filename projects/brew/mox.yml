id: brew:mox
display-name: mox
homepage: https://www.xmox.nl
repo: https://github.com/mjl-/mox
docs: https://www.xmox.nl
package-manager:
  brew: mox
  macports: mox
  nix: mox
package-manager-url: https://formulae.brew.sh/formula/mox
version: 0.0.15
license: MIT
category: development
tags:
  - cli
description: Modern full-featured open source secure mail server
source-archive: https://github.com/mjl-/mox/archive/refs/tags/v0.0.15.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mox
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mox
  brew: brew install mox
  macports: sudo port install mox
  nix: nix profile install nixpkgs#mox
provenance:
  formula: mox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
