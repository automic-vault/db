id: brew:skylighting
display-name: skylighting
homepage: https://github.com/jgm/skylighting
repo: https://hackage.haskell.org/package/skylighting-0.14.7/skylighting-0.14.7.tar.gz
docs: https://github.com/jgm/skylighting
package-manager:
  brew: skylighting
  debian: skylighting
  ubuntu: skylighting
package-manager-url: https://formulae.brew.sh/formula/skylighting
version: 0.14.7
license: GPL-2.0-only
category: development
tags:
  - cli
description: Flexible syntax highlighter using KDE XML syntax descriptions
source-archive: https://hackage.haskell.org/package/skylighting-0.14.7/skylighting-0.14.7.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: skylighting
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:skylighting
  brew: brew install skylighting
  debian: sudo apt install skylighting
  ubuntu: sudo apt install skylighting
provenance:
  formula: skylighting
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
