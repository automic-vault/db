id: brew:nexttrace
display-name: nexttrace
homepage: https://www.nxtrace.org/
repo: https://github.com/nxtrace/NTrace-core
docs: https://www.nxtrace.org/
package-manager:
  brew: nexttrace
  nix: nexttrace
  scoop: extras/nexttrace
  winget: NextTrace.NextTrace.Core
package-manager-url: https://formulae.brew.sh/formula/nexttrace
version: 1.6.5
license: GPL-3.0-only
category: development
tags:
  - cli
description: Open source visual route tracking CLI tool
source-archive: https://github.com/nxtrace/NTrace-core/archive/refs/tags/v1.6.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nexttrace
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    nexttrace requires root privileges so you will need to run `sudo nexttrace <ip>`.
    You should be certain that you trust any software you grant root privileges.
  post-install-defined: false
install-lines:
  av: sudo av install brew:nexttrace
  brew: brew install nexttrace
  nix: nix profile install nixpkgs#nexttrace
  scoop: scoop install extras/nexttrace
  winget: winget install --id NextTrace.NextTrace.Core -e
provenance:
  formula: nexttrace
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
