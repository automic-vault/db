id: brew:vineyard
display-name: vineyard
homepage: https://v6d.io
repo: https://github.com/v6d-io/v6d
docs: https://v6d.io
package-manager:
  brew: vineyard
package-manager-url: https://formulae.brew.sh/formula/vineyard
version: 0.24.4
license: Apache-2.0
category: development
tags:
  - cli
description: In-memory immutable data manager. (Project under CNCF)
source-archive: https://github.com/v6d-io/v6d/releases/download/v0.24.4/v6d-0.24.4.tar.gz
dependencies:
  - apache-arrow
  - boost
  - cpprestsdk
  - etcd
  - etcd-cpp-apiv3
  - gflags
  - glog
  - libgrape-lite
  - open-mpi
build-dependencies:
  - cmake
  - llvm
  - openssl@3
  - python-setuptools
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: vineyard-graph-loader
  - exposure: global executable
    kind: cli
    name: vineyardd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vineyard
  brew: brew install vineyard
provenance:
  formula: vineyard
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
