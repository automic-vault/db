id: brew:cargo-hack
display-name: cargo-hack
homepage: https://github.com/taiki-e/cargo-hack
repo: https://github.com/taiki-e/cargo-hack
docs: https://github.com/taiki-e/cargo-hack
package-manager:
  apk: cargo-hack
  brew: cargo-hack
  nix: cargo-hack
  pacman: cargo-hack
package-manager-url: https://formulae.brew.sh/formula/cargo-hack
version: 0.6.44
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Cargo subcommand to provide options for testing and continuous integration
source-archive: https://github.com/taiki-e/cargo-hack/archive/refs/tags/v0.6.44.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-hack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-hack
  av: sudo av install brew:cargo-hack
  brew: brew install cargo-hack
  nix: nix profile install nixpkgs#cargo-hack
  pacman: sudo pacman -S cargo-hack
provenance:
  formula: cargo-hack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
