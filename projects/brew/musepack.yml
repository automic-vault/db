id: brew:musepack
display-name: musepack
homepage: https://www.musepack.net/
repo: https://files.musepack.net/source/musepack_src_r475.tar.gz
docs: https://www.musepack.net/
package-manager:
  brew: musepack
  zypper: musepack
package-manager-url: https://formulae.brew.sh/formula/musepack
version: r475
license: BSD-3-Clause AND LGPL-2.1-or-later AND GPL-2.0-or-later AND Zlib
category: development
tags:
  - cli
description: Audio compression format and tools
source-archive: https://files.musepack.net/source/musepack_src_r475.tar.gz
dependencies:
  - libcuefile
  - libreplaygain
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: mpc2sv8
  - exposure: global executable
    kind: cli
    name: mpcchap
  - exposure: global executable
    kind: cli
    name: mpccut
  - exposure: global executable
    kind: cli
    name: mpcdec
  - exposure: global executable
    kind: cli
    name: mpcenc
  - exposure: global executable
    kind: cli
    name: mpcgain
  - exposure: global executable
    kind: cli
    name: wavcmp
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:musepack
  brew: brew install musepack
  zypper: sudo zypper install musepack
provenance:
  formula: musepack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
