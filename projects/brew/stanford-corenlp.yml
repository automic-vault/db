id: brew:stanford-corenlp
display-name: stanford-corenlp
homepage: https://stanfordnlp.github.io/CoreNLP/
repo: https://nlp.stanford.edu/software/stanford-corenlp-4.4.0.zip
docs: https://stanfordnlp.github.io/CoreNLP/
package-manager:
  brew: stanford-corenlp
  macports: stanford-corenlp
package-manager-url: https://formulae.brew.sh/formula/stanford-corenlp
version: 4.4.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Java suite of core NLP tools
source-archive: https://nlp.stanford.edu/software/stanford-corenlp-4.4.0.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: corenlp.sh
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
