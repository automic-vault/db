id: brew:retry
display-name: retry
homepage: https://github.com/minfrin/retry
repo: https://github.com/minfrin/retry
docs: https://github.com/minfrin/retry
package-manager:
  brew: retry
  debian: retry
  dnf: retry
  macports: retry
  nix: retry
  pacman: retry
  ubuntu: retry
  zypper: retry
package-manager-url: https://formulae.brew.sh/formula/retry
version: 1.0.6
license: Apache-2.0
category: development
tags:
  - cli
description: Repeat a command until the command succeeds
source-archive: https://github.com/minfrin/retry/releases/download/retry-1.0.6/retry-1.0.6.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: retry
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:retry
  brew: brew install retry
  debian: sudo apt install retry
  dnf: sudo dnf install retry
  macports: sudo port install retry
  nix: nix profile install nixpkgs#retry
  pacman: sudo pacman -S retry
  ubuntu: sudo apt install retry
  zypper: sudo zypper install retry
provenance:
  formula: retry
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
