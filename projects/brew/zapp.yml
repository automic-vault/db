id: brew:zapp
display-name: zapp
homepage: https://github.com/zsa/zapp
repo: https://github.com/zsa/zapp
docs: https://github.com/zsa/zapp
package-manager:
  brew: zapp
package-manager-url: https://formulae.brew.sh/formula/zapp
version: 1.0.1
license: MIT
category: development
tags:
  - cli
description: Flash ZSA keyboards from your terminal
source-archive: https://github.com/zsa/zapp/archive/refs/tags/v1.0.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: zapp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zapp
  brew: brew install zapp
provenance:
  formula: zapp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
