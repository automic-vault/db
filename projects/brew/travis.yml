id: brew:travis
display-name: travis
homepage: https://github.com/travis-ci/travis.rb/
repo: https://github.com/travis-ci/travis.rb
docs: https://github.com/travis-ci/travis.rb/
package-manager:
  brew: travis
  debian: travis
  ubuntu: travis
package-manager-url: https://formulae.brew.sh/formula/travis
version: 1.14.0
license: MIT
category: development
tags:
  - cli
description: Command-line client for Travis CI
source-archive: https://github.com/travis-ci/travis.rb/archive/refs/tags/v1.14.0.tar.gz
dependencies:
  - ruby@3.4
build-dependencies:
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: travis
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:travis
  brew: brew install travis
  debian: sudo apt install travis
  ubuntu: sudo apt install travis
provenance:
  formula: travis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
