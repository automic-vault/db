id: brew:git-remote-gcrypt
display-name: git-remote-gcrypt
homepage: https://spwhitton.name/tech/code/git-remote-gcrypt/
repo: https://github.com/spwhitton/git-remote-gcrypt
docs: https://spwhitton.name/tech/code/git-remote-gcrypt/
package-manager:
  brew: git-remote-gcrypt
