install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dvdbackup
  av: sudo av install brew:dvdbackup
  brew: brew install dvdbackup
  debian: sudo apt install dvdbackup
  dnf: sudo dnf install dvdbackup
  macports: sudo port install dvdbackup
  nix: nix profile install nixpkgs#dvdbackup
  pacman: sudo pacman -S dvdbackup
  ubuntu: sudo apt install dvdbackup
provenance:
  formula: dvdbackup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
