id: brew:dvdbackup
display-name: dvdbackup
homepage: https://dvdbackup.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/dvdbackup/dvdbackup/dvdbackup-0.4.2/dvdbackup-0.4.2.tar.gz
docs: https://dvdbackup.sourceforge.net/
package-manager:
  apk: dvdbackup
  brew: dvdbackup
  debian: dvdbackup
  dnf: dvdbackup
  macports: dvdbackup
  nix: dvdbackup
  pacman: dvdbackup
  ubuntu: dvdbackup
package-manager-url: https://formulae.brew.sh/formula/dvdbackup
version: 0.4.2
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Rip DVD's from the command-line
