id: brew:geogram
display-name: geogram
homepage: https://github.com/BrunoLevy/geogram/wiki
repo: https://github.com/BrunoLevy/geogram
docs: https://github.com/BrunoLevy/geogram/wiki
package-manager:
  brew: geogram
  nix: geogram
  pacman: geogram
  ubuntu: geogram
package-manager-url: https://formulae.brew.sh/formula/geogram
version: 1.9.9
license: BSD-3-Clause AND LicenseRef-Homebrew-public-domain AND LGPL-3.0-or-later AND MIT
category: development
tags:
  - cli
description: Programming library of geometric algorithms
source-archive: https://github.com/BrunoLevy/geogram/releases/download/v1.9.9/geogram_1.9.9.tar.gz
dependencies:
  - glfw
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: geodump
  - exposure: global executable
    kind: cli
    name: vorpalite
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:geogram
  brew: brew install geogram
  nix: nix profile install nixpkgs#geogram
  pacman: sudo pacman -S geogram
  ubuntu: sudo apt install geogram
provenance:
  formula: geogram
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
