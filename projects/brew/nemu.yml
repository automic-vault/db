id: brew:nemu
display-name: nemu
homepage: https://github.com/nemuTUI/nemu
repo: https://github.com/nemuTUI/nemu
docs: https://github.com/nemuTUI/nemu
package-manager:
  apk: nemu
  brew: nemu
  nix: nemu
package-manager-url: https://formulae.brew.sh/formula/nemu
version: 3.4.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Ncurses UI for QEMU
source-archive: https://github.com/nemuTUI/nemu/archive/refs/tags/v3.4.0.tar.gz
dependencies:
  - gettext
  - json-c
  - libarchive
  - ncurses
  - openssl@3
build-dependencies:
  - cmake
  - gettext
  - pkgconf
uses-from-macos:
  - libxml2
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: nemu
  - exposure: global executable
    kind: cli
    name: ntty
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nemu
  av: sudo av install brew:nemu
  brew: brew install nemu
  nix: nix profile install nixpkgs#nemu
provenance:
  formula: nemu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
