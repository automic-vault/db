id: brew:oxipng
display-name: oxipng
homepage: https://github.com/oxipng/oxipng
repo: https://github.com/oxipng/oxipng
docs: https://github.com/oxipng/oxipng
package-manager:
  apk: oxipng
  brew: oxipng
  dnf: oxipng
  macports: oxipng
  nix: oxipng
  pacman: oxipng
  scoop: main/oxipng
  winget: Shssoichiro.Oxipng
  zypper: oxipng
package-manager-url: https://formulae.brew.sh/formula/oxipng
version: 10.1.1
license: MIT
category: development
tags:
  - cli
description: Multithreaded PNG optimizer written in Rust
source-archive: https://github.com/oxipng/oxipng/archive/refs/tags/v10.1.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: oxipng
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add oxipng
  av: sudo av install brew:oxipng
  brew: brew install oxipng
  dnf: sudo dnf install oxipng
  macports: sudo port install oxipng
  nix: nix profile install nixpkgs#oxipng
  pacman: sudo pacman -S oxipng
  scoop: scoop install main/oxipng
  winget: winget install --id Shssoichiro.Oxipng -e
  zypper: sudo zypper install oxipng
provenance:
  formula: oxipng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
