id: brew:jreleaser
display-name: jreleaser
homepage: https://jreleaser.org/
repo: https://github.com/jreleaser/jreleaser
docs: https://jreleaser.org/
package-manager:
  apk: jreleaser
  brew: jreleaser
  macports: jreleaser
  scoop: main/jreleaser
  winget: JReleaser.jreleaser
package-manager-url: https://formulae.brew.sh/formula/jreleaser
version: 1.24.0
license: Apache-2.0
category: development
tags:
  - cli
description: Release projects quickly and easily with JReleaser
source-archive: https://github.com/jreleaser/jreleaser/releases/download/v1.24.0/jreleaser-1.24.0.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: jreleaser
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jreleaser
  av: sudo av install brew:jreleaser
  brew: brew install jreleaser
  macports: sudo port install jreleaser
  scoop: scoop install main/jreleaser
  winget: winget install --id JReleaser.jreleaser -e
provenance:
  formula: jreleaser
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
