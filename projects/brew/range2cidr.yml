id: brew:range2cidr
display-name: range2cidr
homepage: https://ipinfo.io
repo: https://github.com/ipinfo/cli
docs: https://ipinfo.io
package-manager:
  brew: range2cidr
package-manager-url: https://formulae.brew.sh/formula/range2cidr
version: 1.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Converts IP ranges to CIDRs
source-archive: https://github.com/ipinfo/cli/archive/refs/tags/range2cidr-1.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: range2cidr
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:range2cidr
  brew: brew install range2cidr
provenance:
  formula: range2cidr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
