id: brew:kubectl-cnpg
display-name: kubectl-cnpg
homepage: https://cloudnative-pg.io/
repo: https://github.com/cloudnative-pg/cloudnative-pg
docs: https://cloudnative-pg.io/
package-manager:
  apk: kubectl-cnpg
  brew: kubectl-cnpg
  nix: kubectl-cnpg
  zypper: kubectl-cnpg
package-manager-url: https://formulae.brew.sh/formula/kubectl-cnpg
version: 1.29.1
license: Apache-2.0
category: cloud
tags:
  - cli
description: CloudNativePG plugin for kubectl
source-archive: https://github.com/cloudnative-pg/cloudnative-pg.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubectl-cnpg
  - exposure: global executable
    kind: cli
    name: kubectl_complete-cnpg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kubectl-cnpg
  av: sudo av install brew:kubectl-cnpg
  brew: brew install kubectl-cnpg
  nix: nix profile install nixpkgs#kubectl-cnpg
  zypper: sudo zypper install kubectl-cnpg
provenance:
  formula: kubectl-cnpg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
