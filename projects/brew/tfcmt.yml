id: brew:tfcmt
display-name: tfcmt
homepage: https://suzuki-shunsuke.github.io/tfcmt/
repo: https://github.com/suzuki-shunsuke/tfcmt
docs: https://suzuki-shunsuke.github.io/tfcmt/
package-manager:
  brew: tfcmt
package-manager-url: https://formulae.brew.sh/formula/tfcmt
version: 4.14.15
license: MIT
category: cloud
tags:
  - cli
description: Notify the execution result of terraform command
source-archive: https://github.com/suzuki-shunsuke/tfcmt/archive/refs/tags/v4.14.15.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tfcmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tfcmt
  brew: brew install tfcmt
provenance:
  formula: tfcmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
