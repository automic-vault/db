id: brew:mkp224o
display-name: mkp224o
homepage: https://github.com/cathugger/mkp224o
repo: https://github.com/cathugger/mkp224o
docs: https://github.com/cathugger/mkp224o
package-manager:
  brew: mkp224o
  nix: mkp224o
package-manager-url: https://formulae.brew.sh/formula/mkp224o
version: 1.7.0
license: CC0-1.0
category: development
tags:
  - cli
description: Vanity address generator for tor onion v3 (ed25519) hidden services
source-archive: https://github.com/cathugger/mkp224o/releases/download/v1.7.0/mkp224o-1.7.0-src.tar.gz
dependencies:
  - libsodium
executables:
  - exposure: global executable
    kind: cli
    name: mkp224o
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mkp224o
  brew: brew install mkp224o
  nix: nix profile install nixpkgs#mkp224o
provenance:
  formula: mkp224o
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
