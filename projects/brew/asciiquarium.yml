id: brew:asciiquarium
display-name: asciiquarium
homepage: https://robobunny.com/projects/asciiquarium/html/
repo: https://robobunny.com/projects/asciiquarium/asciiquarium_1.1.tar.gz
docs: https://robobunny.com/projects/asciiquarium/html/
package-manager:
  apk: asciiquarium
  brew: asciiquarium
  dnf: asciiquarium
  nix: asciiquarium
  pacman: asciiquarium
package-manager-url: https://formulae.brew.sh/formula/asciiquarium
version: 1.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Aquarium animation in ASCII art
source-archive: https://robobunny.com/projects/asciiquarium/asciiquarium_1.1.tar.gz
dependencies:
  - ncurses
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: asciiquarium
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add asciiquarium
  av: sudo av install brew:asciiquarium
  brew: brew install asciiquarium
  dnf: sudo dnf install asciiquarium
  nix: nix profile install nixpkgs#asciiquarium
  pacman: sudo pacman -S asciiquarium
provenance:
  formula: asciiquarium
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
