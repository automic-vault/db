id: brew:libdatrie
display-name: libdatrie
homepage: https://github.com/tlwg/libdatrie
repo: https://github.com/tlwg/libdatrie
docs: https://github.com/tlwg/libdatrie
package-manager:
  apk: libdatrie
  brew: libdatrie
  dnf: libdatrie
  macports: libdatrie
  nix: libdatrie
  pacman: libdatrie
package-manager-url: https://formulae.brew.sh/formula/libdatrie
version: 0.2.14
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Double-Array Trie Library
source-archive: https://github.com/tlwg/libdatrie/releases/download/v0.2.14/libdatrie-0.2.14.tar.xz
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: trietool
  - exposure: global executable
    kind: cli
    name: trietool-0.2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libdatrie
  av: sudo av install brew:libdatrie
  brew: brew install libdatrie
  dnf: sudo dnf install libdatrie
  macports: sudo port install libdatrie
  nix: nix profile install nixpkgs#libdatrie
  pacman: sudo pacman -S libdatrie
provenance:
  formula: libdatrie
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
