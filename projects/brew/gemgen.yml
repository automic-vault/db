id: brew:gemgen
display-name: gemgen
homepage: https://sr.ht/~kota/gemgen/
repo: https://git.sr.ht/~kota/gemgen/archive/v0.6.0.tar.gz
docs: https://sr.ht/~kota/gemgen/
package-manager:
  brew: gemgen
package-manager-url: https://formulae.brew.sh/formula/gemgen
version: 0.6.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Command-line tool for converting Commonmark Markdown to Gemtext
source-archive: https://git.sr.ht/~kota/gemgen/archive/v0.6.0.tar.gz
build-dependencies:
  - go
  - scdoc
executables:
  - exposure: global executable
    kind: cli
    name: gemgen
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gemgen
  brew: brew install gemgen
provenance:
  formula: gemgen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
