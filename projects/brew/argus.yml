id: brew:argus
display-name: argus
homepage: https://openargus.org
repo: https://github.com/openargus/argus
docs: https://openargus.org
package-manager:
  brew: argus
  dnf: argus
  macports: argus
  nix: argus
  zypper: argus
package-manager-url: https://formulae.brew.sh/formula/argus
version: 5.0.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Audit Record Generation and Utilization System server
source-archive: https://github.com/openargus/argus/archive/refs/tags/v5.0.2.tar.gz
uses-from-macos:
  - cyrus-sasl
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: argus
  - exposure: global executable
    kind: cli
    name: argus-airport
  - exposure: global executable
    kind: cli
    name: argus-extip
  - exposure: global executable
    kind: cli
    name: argus-ipaddr
  - exposure: global executable
    kind: cli
    name: argus-ipmitool
  - exposure: global executable
    kind: cli
    name: argus-lsof
  - exposure: global executable
    kind: cli
    name: argus-netstat
  - exposure: global executable
    kind: cli
    name: argus-snmp
  - exposure: global executable
    kind: cli
    name: argus-stumbler
  - exposure: global executable
    kind: cli
    name: argus-vmstat
  - exposure: global executable
    kind: cli
    name: argusbug
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:argus
  brew: brew install argus
  dnf: sudo dnf install argus
  macports: sudo port install argus
  nix: nix profile install nixpkgs#argus
  zypper: sudo zypper install argus
provenance:
  formula: argus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
