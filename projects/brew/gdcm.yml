id: brew:gdcm
display-name: gdcm
homepage: https://sourceforge.net/projects/gdcm/
repo: https://github.com/malaterre/GDCM
docs: https://sourceforge.net/projects/gdcm/
package-manager:
  apk: gdcm
  brew: gdcm
  dnf: gdcm
  macports: gdcm
  nix: gdcm
  pacman: gdcm
  zypper: gdcm
package-manager-url: https://formulae.brew.sh/formula/gdcm
version: 3.2.6
license: BSD-3-Clause
category: development
tags:
  - cli
description: Grassroots DICOM library and utilities for medical files
source-archive: https://github.com/malaterre/GDCM/archive/refs/tags/v3.2.6.tar.gz
dependencies:
  - charls
  - json-c
  - openjpeg
  - openssl@3
build-dependencies:
  - cmake
  - ninja
  - pkgconf
  - python@3.14
  - swig
uses-from-macos:
  - expat
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: gdcmanon
  - exposure: global executable
    kind: cli
    name: gdcmclean
  - exposure: global executable
    kind: cli
    name: gdcmconv
  - exposure: global executable
    kind: cli
    name: gdcmdiff
  - exposure: global executable
    kind: cli
    name: gdcmdump
  - exposure: global executable
    kind: cli
    name: gdcmgendir
  - exposure: global executable
    kind: cli
    name: gdcmimg
  - exposure: global executable
    kind: cli
    name: gdcminfo
  - exposure: global executable
    kind: cli
    name: gdcmpap3
  - exposure: global executable
    kind: cli
    name: gdcmraw
  - exposure: global executable
    kind: cli
    name: gdcmscanner
  - exposure: global executable
    kind: cli
    name: gdcmscu
  - exposure: global executable
    kind: cli
    name: gdcmtar
  - exposure: global executable
    kind: cli
    name: gdcmxml
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gdcm
  av: sudo av install brew:gdcm
  brew: brew install gdcm
  dnf: sudo dnf install gdcm
  macports: sudo port install gdcm
  nix: nix profile install nixpkgs#gdcm
  pacman: sudo pacman -S gdcm
  zypper: sudo zypper install gdcm
provenance:
  formula: gdcm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
