id: brew:flac
display-name: flac
homepage: https://xiph.org/flac/
repo: https://ftp.osuosl.org/pub/xiph/releases/flac/flac-1.5.0.tar.xz
docs: https://xiph.org/flac/
package-manager:
  apk: flac
  brew: flac
  chocolatey: flac
  debian: flac
  dnf: flac
  macports: flac
  nix: flac
  pacman: flac
  scoop: main/flac
  ubuntu: flac
  winget: Xiph.FLAC
  zypper: flac
package-manager-url: https://formulae.brew.sh/formula/flac
version: 1.5.0
license: >
  BSD-3-Clause AND GPL-2.0-or-later AND ISC AND LGPL-2.0-or-later AND LGPL-2.1-or-later
  AND LicenseRef-Homebrew-public-domain AND (GPL-2.0-or-later OR LGPL-2.1-or-later)
category: security
tags:
  - cli
description: Free lossless audio codec
source-archive: https://ftp.osuosl.org/pub/xiph/releases/flac/flac-1.5.0.tar.xz
dependencies:
  - libogg
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: flac
  - exposure: global executable
    kind: cli
    name: metaflac
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add flac
  av: sudo av install brew:flac
  brew: brew install flac
  chocolatey: choco install flac
  debian: sudo apt install flac
  dnf: sudo dnf install flac
  macports: sudo port install flac
  nix: nix profile install nixpkgs#flac
  pacman: sudo pacman -S flac
  scoop: scoop install main/flac
  ubuntu: sudo apt install flac
  winget: winget install --id Xiph.FLAC -e
  zypper: sudo zypper install flac
provenance:
  formula: flac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
