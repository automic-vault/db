id: brew:maturin
display-name: maturin
homepage: https://github.com/PyO3/maturin
repo: https://github.com/PyO3/maturin
docs: https://github.com/PyO3/maturin
package-manager:
  apk: maturin
  brew: maturin
  dnf: maturin
  nix: maturin
  pacman: maturin
package-manager-url: https://formulae.brew.sh/formula/maturin
version: 1.13.3
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Build and publish Rust crates as Python packages
source-archive: https://github.com/PyO3/maturin/archive/refs/tags/v1.13.3.tar.gz
dependencies:
  - xz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: maturin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add maturin
  av: sudo av install brew:maturin
  brew: brew install maturin
  dnf: sudo dnf install maturin
  nix: nix profile install nixpkgs#maturin
  pacman: sudo pacman -S maturin
provenance:
  formula: maturin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
