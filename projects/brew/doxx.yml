id: brew:doxx
display-name: doxx
homepage: https://github.com/bgreenwell/doxx
repo: https://github.com/bgreenwell/doxx
docs: https://github.com/bgreenwell/doxx
package-manager:
  brew: doxx
  nix: doxx
  pacman: doxx
  zypper: doxx
package-manager-url: https://formulae.brew.sh/formula/doxx
version: 0.1.4
license: MIT
category: development
tags:
  - cli
description: Terminal document viewer for .docx files
source-archive: https://github.com/bgreenwell/doxx/archive/refs/tags/v0.1.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: doxx
  - exposure: global executable
    kind: cli
    name: generate_test_docs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:doxx
  brew: brew install doxx
  nix: nix profile install nixpkgs#doxx
  pacman: sudo pacman -S doxx
  zypper: sudo zypper install doxx
provenance:
  formula: doxx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
