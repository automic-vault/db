id: brew:shadowenv
display-name: shadowenv
homepage: https://shopify.github.io/shadowenv/
repo: https://github.com/Shopify/shadowenv
docs: https://shopify.github.io/shadowenv/
package-manager:
  brew: shadowenv
  nix: shadowenv
package-manager-url: https://formulae.brew.sh/formula/shadowenv
version: 3.4.0
license: MIT
category: development
tags:
  - cli
description: Reversible directory-local environment variable manipulations
source-archive: https://github.com/Shopify/shadowenv/archive/refs/tags/3.4.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: shadowenv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:shadowenv
  brew: brew install shadowenv
  nix: nix profile install nixpkgs#shadowenv
provenance:
  formula: shadowenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
