id: brew:tfenv
display-name: tfenv
homepage: https://github.com/tfutils/tfenv
repo: https://github.com/tfutils/tfenv
docs: https://github.com/tfutils/tfenv
package-manager:
  brew: tfenv
  chocolatey: terraform
  macports: tfenv
  nix: tfenv
  pacman: terraform
  scoop: main/terraform
  winget: Hashicorp.Terraform
package-manager-url: https://formulae.brew.sh/formula/tfenv
version: 3.2.2
license: MIT
category: cloud
tags:
  - cli
description: Terraform version manager inspired by rbenv
source-archive: https://github.com/tfutils/tfenv/archive/refs/tags/v3.2.2.tar.gz
dependencies:
  - grep
uses-from-macos:
  - unzip
executables:
  - exposure: global executable
    kind: cli
    name: terraform
  - exposure: global executable
    kind: cli
    name: tfenv
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tfenv
  brew: brew install tfenv
  chocolatey: choco install terraform
  macports: sudo port install tfenv
  nix: nix profile install nixpkgs#tfenv
  pacman: sudo pacman -S terraform
  scoop: scoop install main/terraform
  winget: winget install --id Hashicorp.Terraform -e
provenance:
  formula: tfenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
