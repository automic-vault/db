id: brew:weaver
display-name: weaver
homepage: https://github.com/scribd/Weaver
repo: https://github.com/scribd/Weaver
docs: https://github.com/scribd/Weaver
package-manager:
  brew: weaver
  nix: weaver
  winget: OpenTelemetry.Weaver
package-manager-url: https://formulae.brew.sh/formula/weaver
version: 1.1.7
license: MIT
category: development
tags:
  - cli
description: Command-line tool for Weaver
source-archive: https://github.com/scribd/Weaver/archive/refs/tags/1.1.7.tar.gz
uses-from-macos:
  - swift
executables:
  - exposure: global executable
    kind: cli
    name: weaver
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:weaver
  brew: brew install weaver
  nix: nix profile install nixpkgs#weaver
  winget: winget install --id OpenTelemetry.Weaver -e
provenance:
  formula: weaver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
