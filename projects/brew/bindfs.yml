id: brew:bindfs
display-name: bindfs
homepage: https://bindfs.org/
repo: https://bindfs.org/downloads/bindfs-1.18.4.tar.gz
docs: https://bindfs.org/
package-manager:
  apk: bindfs
  brew: bindfs
  debian: bindfs
  dnf: bindfs
  macports: bindfs
  nix: bindfs
  ubuntu: bindfs
  zypper: bindfs
package-manager-url: https://formulae.brew.sh/formula/bindfs
version: 1.18.4
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: FUSE file system for mounting to another location
source-archive: https://bindfs.org/downloads/bindfs-1.18.4.tar.gz
dependencies:
  - libfuse
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: bindfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bindfs
  av: sudo av install brew:bindfs
  brew: brew install bindfs
  debian: sudo apt install bindfs
  dnf: sudo dnf install bindfs
  macports: sudo port install bindfs
  nix: nix profile install nixpkgs#bindfs
  ubuntu: sudo apt install bindfs
  zypper: sudo zypper install bindfs
provenance:
  formula: bindfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
