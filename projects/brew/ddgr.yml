id: brew:ddgr
display-name: ddgr
homepage: https://github.com/jarun/ddgr
repo: https://github.com/jarun/ddgr
docs: https://github.com/jarun/ddgr
package-manager:
  apk: ddgr
  brew: ddgr
  debian: ddgr
  dnf: ddgr
  nix: ddgr
  pacman: ddgr
  ubuntu: ddgr
  zypper: ddgr
package-manager-url: https://formulae.brew.sh/formula/ddgr
version: 2.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: DuckDuckGo from the terminal
source-archive: https://github.com/jarun/ddgr/archive/refs/tags/v2.2.tar.gz
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: ddgr
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ddgr
  av: sudo av install brew:ddgr
  brew: brew install ddgr
  debian: sudo apt install ddgr
  dnf: sudo dnf install ddgr
  nix: nix profile install nixpkgs#ddgr
  pacman: sudo pacman -S ddgr
  ubuntu: sudo apt install ddgr
  zypper: sudo zypper install ddgr
provenance:
  formula: ddgr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
