id: brew:vifm
display-name: vifm
homepage: https://vifm.info/
repo: https://github.com/vifm/vifm
docs: https://vifm.info/
package-manager:
  apk: vifm
  brew: vifm
  debian: vifm
  dnf: vifm
  macports: vifm
  nix: vifm
  pacman: vifm
  scoop: extras/vifm
  ubuntu: vifm
  zypper: vifm
package-manager-url: https://formulae.brew.sh/formula/vifm
version: 0.14.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Ncurses-based file manager with vi-like keybindings
source-archive: https://github.com/vifm/vifm/releases/download/v0.14.3/vifm-0.14.3.tar.bz2
dependencies:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: vifm
  - exposure: global executable
    kind: cli
    name: vifm-convert-dircolors
  - exposure: global executable
    kind: cli
    name: vifm-pause
  - exposure: global executable
    kind: cli
    name: vifm-screen-split
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vifm
  av: sudo av install brew:vifm
  brew: brew install vifm
  debian: sudo apt install vifm
  dnf: sudo dnf install vifm
  macports: sudo port install vifm
  nix: nix profile install nixpkgs#vifm
  pacman: sudo pacman -S vifm
  scoop: scoop install extras/vifm
  ubuntu: sudo apt install vifm
  zypper: sudo zypper install vifm
provenance:
  formula: vifm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
