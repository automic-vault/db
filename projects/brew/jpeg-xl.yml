id: brew:jpeg-xl
display-name: jpeg-xl
homepage: https://jpeg.org/jpegxl/index.html
repo: https://github.com/libjxl/libjxl
docs: https://jpeg.org/jpegxl/index.html
package-manager:
  brew: jpeg-xl
  nix: ssimulacra2
package-manager-url: https://formulae.brew.sh/formula/jpeg-xl
version: 0.11.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: New file format for still image compression
source-archive: https://github.com/libjxl/libjxl/archive/refs/tags/v0.11.2.tar.gz
dependencies:
  - brotli
  - giflib
  - highway
  - imath
  - jpeg-turbo
  - libpng
  - little-cms2
  - openexr
build-dependencies:
  - asciidoc
  - cmake
  - docbook-xsl
  - doxygen
  - pkgconf
  - sphinx-doc
  - webp
executables:
  - exposure: global executable
    kind: cli
    name: benchmark_xl
  - exposure: global executable
    kind: cli
    name: butteraugli_main
  - exposure: global executable
    kind: cli
    name: cjxl
  - exposure: global executable
    kind: cli
    name: decode_and_encode
  - exposure: global executable
    kind: cli
    name: display_to_hlg
  - exposure: global executable
    kind: cli
    name: djxl
  - exposure: global executable
    kind: cli
    name: djxl_fuzzer_corpus
  - exposure: global executable
    kind: cli
    name: exr_to_pq
  - exposure: global executable
    kind: cli
    name: generate_lut_template
  - exposure: global executable
    kind: cli
    name: icc_simplify
  - exposure: global executable
    kind: cli
    name: jxl_from_tree
  - exposure: global executable
    kind: cli
    name: jxlinfo
  - exposure: global executable
    kind: cli
    name: local_tone_map
  - exposure: global executable
    kind: cli
    name: pq_to_hlg
  - exposure: global executable
    kind: cli
    name: render_hlg
  - exposure: global executable
    kind: cli
    name: ssimulacra2
  - exposure: global executable
    kind: cli
    name: ssimulacra_main
  - exposure: global executable
    kind: cli
    name: texture_to_cube
  - exposure: global executable
    kind: cli
    name: tone_map
  - exposure: global executable
    kind: cli
    name: xyb_range
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jpeg-xl
  brew: brew install jpeg-xl
  nix: nix profile install nixpkgs#ssimulacra2
provenance:
  formula: jpeg-xl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
