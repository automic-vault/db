id: brew:xkbcomp
display-name: xkbcomp
homepage: https://www.x.org
repo: https://www.x.org/releases/individual/app/xkbcomp-1.5.0.tar.xz
docs: https://www.x.org
package-manager:
  apk: xkbcomp
  brew: xkbcomp
  dnf: xkbcomp
  macports: xkbcomp
  nix: xkbcomp
  zypper: xkbcomp
package-manager-url: https://formulae.brew.sh/formula/xkbcomp
version: 1.5.0
license: HPND AND MIT-open-group
category: development
tags:
  - cli
description: XKB keyboard description compiler
source-archive: https://www.x.org/releases/individual/app/xkbcomp-1.5.0.tar.xz
dependencies:
  - libx11
  - libxkbfile
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xkbcomp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xkbcomp
  av: sudo av install brew:xkbcomp
  brew: brew install xkbcomp
  dnf: sudo dnf install xkbcomp
  macports: sudo port install xkbcomp
  nix: nix profile install nixpkgs#xkbcomp
  zypper: sudo zypper install xkbcomp
provenance:
  formula: xkbcomp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
