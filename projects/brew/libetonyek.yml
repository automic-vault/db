id: brew:libetonyek
display-name: libetonyek
homepage: https://wiki.documentfoundation.org/DLP/Libraries/libetonyek
repo: https://dev-www.libreoffice.org/src/libetonyek/libetonyek-0.1.13.tar.xz
docs: https://wiki.documentfoundation.org/DLP/Libraries/libetonyek
package-manager:
  apk: libetonyek
  brew: libetonyek
  dnf: libetonyek
  macports: libetonyek
  nix: libetonyek
  pacman: libetonyek
package-manager-url: https://formulae.brew.sh/formula/libetonyek
version: 0.1.13
license: MPL-2.0
category: network
tags:
  - cli
description: Interpret and import Apple Keynote presentations
source-archive: https://dev-www.libreoffice.org/src/libetonyek/libetonyek-0.1.13.tar.xz
dependencies:
  - librevenge
build-dependencies:
  - boost
  - glm
  - mdds
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: key2raw
  - exposure: global executable
    kind: cli
    name: key2text
  - exposure: global executable
    kind: cli
    name: key2xhtml
  - exposure: global executable
    kind: cli
    name: numbers2csv
  - exposure: global executable
    kind: cli
    name: numbers2raw
  - exposure: global executable
    kind: cli
    name: numbers2text
  - exposure: global executable
    kind: cli
    name: pages2html
  - exposure: global executable
    kind: cli
    name: pages2raw
  - exposure: global executable
    kind: cli
    name: pages2text
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libetonyek
  av: sudo av install brew:libetonyek
  brew: brew install libetonyek
  dnf: sudo dnf install libetonyek
  macports: sudo port install libetonyek
  nix: nix profile install nixpkgs#libetonyek
  pacman: sudo pacman -S libetonyek
provenance:
  formula: libetonyek
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
