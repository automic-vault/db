id: brew:apr
display-name: apr
homepage: https://apr.apache.org/
repo: https://www.apache.org/dyn/closer.lua?path=apr/apr-1.7.6.tar.bz2
docs: https://apr.apache.org/
package-manager:
  apk: apr
  brew: apr
  dnf: apr
  macports: apr
  nix: apr
  pacman: apr
package-manager-url: https://formulae.brew.sh/formula/apr
version: 1.7.6
license: Apache-2.0
category: network
tags:
  - cli
description: Apache Portable Runtime library
source-archive: https://www.apache.org/dyn/closer.lua?path=apr/apr-1.7.6.tar.bz2
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: apr-1-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add apr
  av: sudo av install brew:apr
  brew: brew install apr
  dnf: sudo dnf install apr
  macports: sudo port install apr
  nix: nix profile install nixpkgs#apr
  pacman: sudo pacman -S apr
provenance:
  formula: apr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
