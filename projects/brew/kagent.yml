id: brew:kagent
display-name: kagent
homepage: https://kagent.dev
repo: https://github.com/kagent-dev/kagent
docs: https://kagent.dev
package-manager:
  brew: kagent
package-manager-url: https://formulae.brew.sh/formula/kagent
version: 0.9.4
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes native framework for building AI agents
source-archive: https://github.com/kagent-dev/kagent/archive/refs/tags/v0.9.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kagent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kagent
  brew: brew install kagent
provenance:
  formula: kagent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
