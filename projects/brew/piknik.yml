id: brew:piknik
display-name: piknik
homepage: https://github.com/jedisct1/piknik
repo: https://github.com/jedisct1/piknik
docs: https://github.com/jedisct1/piknik
package-manager:
  apk: piknik
  brew: piknik
  nix: piknik
package-manager-url: https://formulae.brew.sh/formula/piknik
version: 0.10.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: Copy/paste anything over the network
source-archive: https://github.com/jedisct1/piknik/archive/refs/tags/0.10.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: piknik
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    In order to get convenient shell aliases, add the following to your shell profile
    e.g. ~/.profile or ~/.zshrc: . $HOMEBREW_PREFIX/etc/profile.d/piknik.sh
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add piknik
  av: sudo av install brew:piknik
  brew: brew install piknik
  nix: nix profile install nixpkgs#piknik
provenance:
  formula: piknik
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
