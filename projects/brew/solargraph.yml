id: brew:solargraph
display-name: solargraph
homepage: https://solargraph.org
repo: https://github.com/castwide/solargraph
docs: https://solargraph.org
package-manager:
  brew: solargraph
  nix: solargraph
package-manager-url: https://formulae.brew.sh/formula/solargraph
version: 0.59.2
license: MIT
category: development
tags:
  - cli
description: Ruby language server
source-archive: https://github.com/castwide/solargraph.git
dependencies:
  - ruby
  - xz
executables:
  - exposure: global executable
    kind: cli
    name: solargraph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:solargraph
  brew: brew install solargraph
  nix: nix profile install nixpkgs#solargraph
provenance:
  formula: solargraph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
