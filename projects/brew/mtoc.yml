id: brew:mtoc
display-name: mtoc
homepage: https://opensource.apple.com/
repo: https://github.com/apple-oss-distributions/cctools
docs: https://opensource.apple.com/
package-manager:
  brew: mtoc
package-manager-url: https://formulae.brew.sh/formula/mtoc
version: 1035.1.102
license: APSL-2.0
category: development
tags:
  - cli
description: Mach-O to PE/COFF binary converter
source-archive: >
  https://github.com/apple-oss-distributions/cctools/archive/refs/tags/cctools-1035.1.102.tar.gz
build-dependencies:
  - llvm
executables:
  - exposure: global executable
    kind: cli
    name: mtoc
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mtoc
  brew: brew install mtoc
provenance:
  formula: mtoc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
