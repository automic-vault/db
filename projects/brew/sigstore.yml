id: brew:sigstore
display-name: sigstore
homepage: https://github.com/sigstore/sigstore-python
repo: >
  https://files.pythonhosted.org/packages/98/c3/84ec81173ade0dba5613feea577308cde4e69045cc804d02953e3a40922c/sigstore-4.2.0.tar.gz
docs: https://github.com/sigstore/sigstore-python
package-manager:
  brew: sigstore
package-manager-url: https://formulae.brew.sh/formula/sigstore
version: 4.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: Codesigning tool for Python packages
source-archive: >
  https://files.pythonhosted.org/packages/98/c3/84ec81173ade0dba5613feea577308cde4e69045cc804d02953e3a40922c/sigstore-4.2.0.tar.gz
dependencies:
  - certifi
  - cryptography
  - openssl@3
  - pydantic
  - python@3.14
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sigstore
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sigstore
  brew: brew install sigstore
provenance:
  formula: sigstore
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
