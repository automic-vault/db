id: brew:libvterm
display-name: libvterm
homepage: https://www.leonerd.org.uk/code/libvterm/
repo: https://launchpad.net/libvterm/trunk/v0.3/+download/libvterm-0.3.3.tar.gz
docs: https://www.leonerd.org.uk/code/libvterm/
package-manager:
  apk: libvterm
  brew: libvterm
  dnf: libvterm
  macports: libvterm
  nix: libvterm
  pacman: libvterm
package-manager-url: https://formulae.brew.sh/formula/libvterm
version: 0.3.3
license: MIT
category: network
tags:
  - cli
description: C99 library which implements a VT220 or xterm terminal emulator
source-archive: https://launchpad.net/libvterm/trunk/v0.3/+download/libvterm-0.3.3.tar.gz
build-dependencies:
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: unterm
  - exposure: global executable
    kind: cli
    name: vterm-ctrl
  - exposure: global executable
    kind: cli
    name: vterm-dump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libvterm
  av: sudo av install brew:libvterm
  brew: brew install libvterm
  dnf: sudo dnf install libvterm
  macports: sudo port install libvterm
  nix: nix profile install nixpkgs#libvterm
  pacman: sudo pacman -S libvterm
provenance:
  formula: libvterm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
