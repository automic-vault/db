id: brew:bootloadhid
display-name: bootloadhid
homepage: https://www.obdev.at/products/vusb/bootloadhid.html
repo: https://www.obdev.at/downloads/vusb/bootloadHID.2012-12-08.tar.gz
docs: https://www.obdev.at/products/vusb/bootloadhid.html
package-manager:
  brew: bootloadhid
  nix: bootloadhid
package-manager-url: https://formulae.brew.sh/formula/bootloadhid
version: 2012-12-08
license: GPL-2.0-only OR GPL-3.0-only
category: network
tags:
  - cli
description: HID-based USB bootloader for AVR microcontrollers
source-archive: https://www.obdev.at/downloads/vusb/bootloadHID.2012-12-08.tar.gz
dependencies:
  - libusb-compat
executables:
  - exposure: global executable
    kind: cli
    name: bootloadHID
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bootloadhid
  brew: brew install bootloadhid
  nix: nix profile install nixpkgs#bootloadhid
provenance:
  formula: bootloadhid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
