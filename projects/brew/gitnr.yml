id: brew:gitnr
display-name: gitnr
homepage: https://github.com/reemus-dev/gitnr
repo: https://github.com/reemus-dev/gitnr
docs: https://github.com/reemus-dev/gitnr
package-manager:
  brew: gitnr
  nix: gitnr
package-manager-url: https://formulae.brew.sh/formula/gitnr
version: 0.3.0
license: MIT
category: development
tags:
  - cli
description: Create .gitignore using templates from TopTal, GitHub or your own collection
source-archive: https://github.com/reemus-dev/gitnr/archive/refs/tags/v0.3.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gitnr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gitnr
  brew: brew install gitnr
  nix: nix profile install nixpkgs#gitnr
provenance:
  formula: gitnr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
