id: brew:spack
display-name: spack
homepage: https://spack.io
repo: https://github.com/spack/spack
docs: https://spack.io
package-manager:
  brew: spack
  zypper: spack
package-manager-url: https://formulae.brew.sh/formula/spack
version: 1.1.1
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Package manager that builds multiple versions and configurations of software
source-archive: https://github.com/spack/spack/archive/refs/tags/v1.1.1.tar.gz
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: sbang
  - exposure: global executable
    kind: cli
    name: spack
  - exposure: global executable
    kind: cli
    name: spack-python
  - exposure: global executable
    kind: cli
    name: spack-tmpconfig
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spack
  brew: brew install spack
  zypper: sudo zypper install spack
provenance:
  formula: spack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
