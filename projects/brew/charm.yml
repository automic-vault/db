id: brew:charm
display-name: charm
homepage: https://github.com/juju/charmstore-client
repo: https://github.com/juju/charmstore-client
docs: https://github.com/juju/charmstore-client
package-manager:
  brew: charm
  macports: charm
  nix: charm
  pacman: charm
package-manager-url: https://formulae.brew.sh/formula/charm
version: 2.5.2
license: GPL-3.0-only
category: development
tags:
  - cli
description: Tool for managing Juju Charms
source-archive: https://github.com/juju/charmstore-client/archive/refs/tags/v2.5.2.tar.gz
build-dependencies:
  - breezy
  - go
executables:
  - exposure: global executable
    kind: cli
    name: charm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:charm
  brew: brew install charm
  macports: sudo port install charm
  nix: nix profile install nixpkgs#charm
  pacman: sudo pacman -S charm
provenance:
  formula: charm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
