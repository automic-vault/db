id: brew:gqlplus
display-name: gqlplus
homepage: https://gqlplus.sourceforge.net/
repo: https://downloads.sourceforge.net/project/gqlplus/gqlplus/1.16/gqlplus-1.16.tar.gz
docs: https://gqlplus.sourceforge.net/
package-manager:
  brew: gqlplus
package-manager-url: https://formulae.brew.sh/formula/gqlplus
version: 1.16
license: GPL-2.0-only
category: database
tags:
  - cli
description: Drop-in replacement for sqlplus, an Oracle SQL client
source-archive: https://downloads.sourceforge.net/project/gqlplus/gqlplus/1.16/gqlplus-1.16.tar.gz
dependencies:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: gqlplus
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gqlplus
  brew: brew install gqlplus
provenance:
  formula: gqlplus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
