id: brew:chawan
display-name: chawan
homepage: https://sr.ht/~bptato/chawan/
repo: https://git.sr.ht/~bptato/chawan/archive/v0.4.1.tar.gz
docs: https://sr.ht/~bptato/chawan/
package-manager:
  apk: chawan
  brew: chawan
  nix: chawan
  pacman: chawan
  zypper: chawan
package-manager-url: https://formulae.brew.sh/formula/chawan
version: 0.4.1
license: Unlicense
category: development
tags:
  - cli
description: TUI web browser with CSS, inline image and JavaScript support
source-archive: https://git.sr.ht/~bptato/chawan/archive/v0.4.1.tar.gz
dependencies:
  - brotli
  - libssh2
  - openssl@3
build-dependencies:
  - nim
  - pkgconf
uses-from-macos:
  - curl
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cha
  - exposure: global executable
    kind: cli
    name: mancha
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add chawan
  av: sudo av install brew:chawan
  brew: brew install chawan
  nix: nix profile install nixpkgs#chawan
  pacman: sudo pacman -S chawan
  zypper: sudo zypper install chawan
provenance:
  formula: chawan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
