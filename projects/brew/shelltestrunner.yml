id: brew:shelltestrunner
display-name: shelltestrunner
homepage: https://github.com/simonmichael/shelltestrunner
repo: https://hackage.haskell.org/package/shelltestrunner-1.11/shelltestrunner-1.11.tar.gz
docs: https://github.com/simonmichael/shelltestrunner
package-manager:
  brew: shelltestrunner
  debian: shelltestrunner
  ubuntu: shelltestrunner
package-manager-url: https://formulae.brew.sh/formula/shelltestrunner
version: 1.11
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Portable command-line tool for testing command-line programs
source-archive: https://hackage.haskell.org/package/shelltestrunner-1.11/shelltestrunner-1.11.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: shelltest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:shelltestrunner
  brew: brew install shelltestrunner
  debian: sudo apt install shelltestrunner
  ubuntu: sudo apt install shelltestrunner
provenance:
  formula: shelltestrunner
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
