id: brew:gup
display-name: gup
homepage: https://github.com/nao1215/gup
repo: https://github.com/nao1215/gup
docs: https://github.com/nao1215/gup
package-manager:
  brew: gup
  nix: gup
  winget: nao1215.gup
package-manager-url: https://formulae.brew.sh/formula/gup
version: 1.1.4
license: Apache-2.0
category: development
tags:
  - cli
description: Update binaries installed by go install
source-archive: https://github.com/nao1215/gup/archive/refs/tags/v1.1.4.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gup
  brew: brew install gup
  nix: nix profile install nixpkgs#gup
  winget: winget install --id nao1215.gup -e
provenance:
  formula: gup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
