id: brew:arcadedb
display-name: arcadedb
homepage: https://arcadedb.com
repo: https://github.com/ArcadeData/arcadedb
docs: https://arcadedb.com
package-manager:
  brew: arcadedb
  scoop: extras/arcadedb
package-manager-url: https://formulae.brew.sh/formula/arcadedb
version: 26.5.1
license: Apache-2.0
category: development
tags:
  - cli
description: 'Multi-Model DBMS: Graph, Document, Key/Value, Search, Time Series, Vector'
source-archive: >
  https://github.com/ArcadeData/arcadedb/releases/download/26.5.1/arcadedb-package-26.5.1.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: arcadedb-console
  - exposure: global executable
    kind: cli
    name: arcadedb-server
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To set the root password on first run: arcadedb-server
    -Darcadedb.server.rootPassword=yourpassword Data:
    $HOMEBREW_PREFIX/var/arcadedb/databases Config: $HOMEBREW_PREFIX/var/arcadedb/config
  post-install-defined: true
  service: declared
install-lines:
  av: sudo av install brew:arcadedb
  brew: brew install arcadedb
  scoop: scoop install extras/arcadedb
provenance:
  formula: arcadedb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
