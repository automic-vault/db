id: brew:md4c
display-name: md4c
homepage: https://github.com/mity/md4c
repo: https://github.com/mity/md4c
docs: https://github.com/mity/md4c
package-manager:
  apk: md4c
  brew: md4c
  debian: md2html
  dnf: md4c
  macports: md4c
  nix: md4c
  pacman: md4c
  zypper: md4c
package-manager-url: https://formulae.brew.sh/formula/md4c
version: 0.5.3
license: MIT
category: development
tags:
  - cli
description: C Markdown parser. Fast. SAX-like interface
source-archive: https://github.com/mity/md4c/archive/refs/tags/release-0.5.3.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: md2html
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add md4c
  av: sudo av install brew:md4c
  brew: brew install md4c
  debian: sudo apt install md2html
  dnf: sudo dnf install md4c
  macports: sudo port install md4c
  nix: nix profile install nixpkgs#md4c
  pacman: sudo pacman -S md4c
  zypper: sudo zypper install md4c
provenance:
  formula: md4c
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
