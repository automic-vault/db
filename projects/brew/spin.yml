id: brew:spin
display-name: spin
homepage: https://spinroot.com/spin/whatispin.html
repo: https://github.com/nimble-code/Spin
docs: https://spinroot.com/spin/whatispin.html
package-manager:
  brew: spin
  debian: spin
  macports: spin
  nix: spin
  pacman: spin
  ubuntu: spin
package-manager-url: https://formulae.brew.sh/formula/spin
version: 6.5.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Efficient verification tool of multi-threaded software
source-archive: https://github.com/nimble-code/Spin/archive/refs/tags/version-6.5.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: spin
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spin
  brew: brew install spin
  debian: sudo apt install spin
  macports: sudo port install spin
  nix: nix profile install nixpkgs#spin
  pacman: sudo pacman -S spin
  ubuntu: sudo apt install spin
provenance:
  formula: spin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
