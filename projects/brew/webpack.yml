id: brew:webpack
display-name: webpack
homepage: https://webpack.js.org/
repo: https://registry.npmjs.org/webpack/-/webpack-5.107.2.tgz
docs: https://webpack.js.org/
package-manager:
  brew: webpack
  debian: webpack
  nix: webpack-cli
  ubuntu: webpack
package-manager-url: https://formulae.brew.sh/formula/webpack
version: 5.107.2
license: MIT
category: network
tags:
  - cli
description: Bundler for JavaScript and friends
source-archive: https://registry.npmjs.org/webpack/-/webpack-5.107.2.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: webpack
  - exposure: global executable
    kind: cli
    name: webpack-cli
bottle:
