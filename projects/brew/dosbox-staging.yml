id: brew:dosbox-staging
display-name: dosbox-staging
homepage: https://dosbox-staging.github.io/
repo: https://github.com/dosbox-staging/dosbox-staging
docs: https://dosbox-staging.github.io/
package-manager:
  apk: dosbox-staging
  brew: dosbox-staging
  dnf: dosbox-staging
  macports: dosbox-staging
  nix: dosbox-staging
  scoop: extras/dosbox-staging
  winget: DOSBoxStaging.DOSBoxStaging
package-manager-url: https://formulae.brew.sh/formula/dosbox-staging
version: 0.82.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Modernized DOSBox soft-fork
source-archive: https://github.com/dosbox-staging/dosbox-staging/archive/refs/tags/v0.82.2.tar.gz
dependencies:
  - fluid-synth
  - glib
  - iir1
  - libpng
  - libslirp
  - mt32emu
  - opusfile
  - sdl2
  - sdl2_image
  - sdl2_net
  - speexdsp
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dosbox-staging
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dosbox-staging
  av: sudo av install brew:dosbox-staging
  brew: brew install dosbox-staging
  dnf: sudo dnf install dosbox-staging
  macports: sudo port install dosbox-staging
  nix: nix profile install nixpkgs#dosbox-staging
  scoop: scoop install extras/dosbox-staging
  winget: winget install --id DOSBoxStaging.DOSBoxStaging -e
provenance:
  formula: dosbox-staging
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
