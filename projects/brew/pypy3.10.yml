id: brew:pypy3.10
display-name: pypy3.10
homepage: https://pypy.org/
repo: https://downloads.python.org/pypy/pypy3.10-v7.3.17-src.tar.bz2
docs: https://pypy.org/
package-manager:
  apk: pypy3
  brew: pypy3.10
  debian: pypy3
  dnf: pypy3.10
  nix: pypy3
  pacman: pypy3
  scoop: main/pypy3
  ubuntu: pypy3
package-manager-url: https://formulae.brew.sh/formula/pypy3.10
version: 7.3.17
license: MIT
category: network
tags:
  - cli
description: Implementation of Python 3 in Python
source-archive: https://downloads.python.org/pypy/pypy3.10-v7.3.17-src.tar.bz2
dependencies:
  - gdbm
  - openssl@3
  - sqlite
  - tcl-tk@8
  - xz
build-dependencies:
  - pkgconf
  - pypy
uses-from-macos:
  - bzip2
  - expat
  - libffi
  - ncurses
  - unzip
  - zlib
executables:
  - exposure: global executable
    kind: cli
    name: pypy3
  - exposure: global executable
    kind: cli
    name: pypy3.10
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    A "distutils.cfg" has been written to:
    $HOMEBREW_CELLAR/pypy3.10/7.3.17_1/libexec/lib/pypy3.10/distutils specifying the
    install-scripts folder as: $HOMEBREW_PREFIX/share/pypy3.10 If you install Python
    packages via "pypy3.10 setup.py install" or pip_pypy3.10, any provided scripts will
    go into the install-scripts folder above, so you may want to add it to your PATH
    *after* $HOMEBREW_PREFIX/bin so you don't overwrite tools from CPython. Setuptools
    and pip have been installed, so you can use pip_pypy3.10. To update pip and
    setuptools between pypy3.10 releases, run: pip_pypy3.10 install --upgrade pip
    setuptools See: https://docs.brew.sh/Homebrew-and-Python
  post-install-defined: true
install-lines:
  apk: sudo apk add pypy3
  av: sudo av install brew:pypy3.10
  brew: brew install pypy3.10
  debian: sudo apt install pypy3
  dnf: sudo dnf install pypy3.10
  nix: nix profile install nixpkgs#pypy3
  pacman: sudo pacman -S pypy3
  scoop: scoop install main/pypy3
  ubuntu: sudo apt install pypy3
provenance:
  formula: pypy3.10
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
