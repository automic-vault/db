id: brew:miller
display-name: miller
homepage: https://github.com/johnkerl/miller
repo: https://github.com/johnkerl/miller
docs: https://github.com/johnkerl/miller
package-manager:
  apk: miller
  brew: miller
  debian: miller
  dnf: miller
  macports: miller
  nix: miller
  pacman: miller
  scoop: main/miller
  ubuntu: miller
  winget: Miller.Miller
  zypper: miller
package-manager-url: https://formulae.brew.sh/formula/miller
version: 6.18.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: Like sed, awk, cut, join & sort for name-indexed data such as CSV
source-archive: https://github.com/johnkerl/miller/archive/refs/tags/v6.18.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mlr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add miller
  av: sudo av install brew:miller
  brew: brew install miller
  debian: sudo apt install miller
  dnf: sudo dnf install miller
  macports: sudo port install miller
  nix: nix profile install nixpkgs#miller
  pacman: sudo pacman -S miller
  scoop: scoop install main/miller
  ubuntu: sudo apt install miller
  winget: winget install --id Miller.Miller -e
  zypper: sudo zypper install miller
provenance:
  formula: miller
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
