id: brew:form
display-name: form
homepage: https://www.nikhef.nl/~form/
repo: https://github.com/form-dev/form
docs: https://www.nikhef.nl/~form/
package-manager:
  brew: form
  debian: form
  nix: form
  ubuntu: form
  zypper: form
package-manager-url: https://formulae.brew.sh/formula/form
version: 5.0.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Symbolic manipulation system
source-archive: https://github.com/form-dev/form/releases/download/v5.0.0/form-5.0.0.tar.gz
dependencies:
  - flint
  - gmp
  - mpfr
  - zstd
executables:
  - exposure: global executable
    kind: cli
    name: form
  - exposure: global executable
    kind: cli
    name: tform
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:form
  brew: brew install form
  debian: sudo apt install form
  nix: nix profile install nixpkgs#form
  ubuntu: sudo apt install form
  zypper: sudo zypper install form
provenance:
  formula: form
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
