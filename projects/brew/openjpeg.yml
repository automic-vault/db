id: brew:openjpeg
display-name: openjpeg
homepage: https://www.openjpeg.org/
repo: https://github.com/uclouvain/openjpeg
docs: https://www.openjpeg.org/
package-manager:
  apk: openjpeg
  brew: openjpeg
  dnf: openjpeg
  macports: openjpeg
  nix: openjpeg
package-manager-url: https://formulae.brew.sh/formula/openjpeg
version: 2.5.4
license: BSD-2-Clause
category: development
tags:
  - cli
description: Library for JPEG-2000 image manipulation
source-archive: https://github.com/uclouvain/openjpeg/archive/refs/tags/v2.5.4.tar.gz
dependencies:
  - libpng
  - libtiff
  - little-cms2
build-dependencies:
  - cmake
  - doxygen
executables:
  - exposure: global executable
    kind: cli
    name: opj_compress
  - exposure: global executable
    kind: cli
    name: opj_decompress
  - exposure: global executable
    kind: cli
    name: opj_dump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add openjpeg
  av: sudo av install brew:openjpeg
  brew: brew install openjpeg
  dnf: sudo dnf install openjpeg
  macports: sudo port install openjpeg
  nix: nix profile install nixpkgs#openjpeg
provenance:
  formula: openjpeg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
