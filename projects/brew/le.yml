id: brew:le
display-name: le
homepage: https://github.com/lavv17/le
repo: https://github.com/lavv17/le
docs: https://github.com/lavv17/le
package-manager:
  brew: le
  debian: le
  macports: le
  ubuntu: le
package-manager-url: https://formulae.brew.sh/formula/le
version: 1.16.7
license: GPL-3.0-or-later AND GPL-2.0-or-later
category: development
tags:
  - cli
description: Text editor with block and binary operations
source-archive: https://github.com/lavv17/le/releases/download/v1.16.7/le-1.16.7.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: le
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:le
  brew: brew install le
  debian: sudo apt install le
  macports: sudo port install le
  ubuntu: sudo apt install le
provenance:
  formula: le
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
