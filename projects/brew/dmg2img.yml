id: brew:dmg2img
display-name: dmg2img
homepage: http://vu1tur.eu.org/tools/
repo: https://cdn.netbsd.org/pub/pkgsrc/distfiles/dmg2img-1.6.7.tar.gz
docs: http://vu1tur.eu.org/tools/
package-manager:
  apk: dmg2img
  brew: dmg2img
  debian: dmg2img
  dnf: dmg2img
  macports: dmg2img
  nix: dmg2img
  scoop: main/dmg2img
  ubuntu: dmg2img
package-manager-url: https://formulae.brew.sh/formula/dmg2img
version: 1.6.7
license: GPL-2.0-only AND MIT
category: media
tags:
  - cli
description: Utilities for converting macOS DMG images
source-archive: https://cdn.netbsd.org/pub/pkgsrc/distfiles/dmg2img-1.6.7.tar.gz
dependencies:
  - openssl@4
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: dmg2img
  - exposure: global executable
    kind: cli
    name: vfdecrypt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dmg2img
  av: sudo av install brew:dmg2img
  brew: brew install dmg2img
  debian: sudo apt install dmg2img
  dnf: sudo dnf install dmg2img
  macports: sudo port install dmg2img
  nix: nix profile install nixpkgs#dmg2img
  scoop: scoop install main/dmg2img
  ubuntu: sudo apt install dmg2img
provenance:
  formula: dmg2img
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
