id: brew:hjson
display-name: hjson
homepage: https://hjson.github.io/
repo: https://github.com/hjson/hjson-go
docs: https://hjson.github.io/
package-manager:
  brew: hjson
  nix: hjson
  scoop: main/hjson
package-manager-url: https://formulae.brew.sh/formula/hjson
version: 4.6.0
license: MIT
category: development
tags:
  - cli
  - json
description: Convert JSON to HJSON and vice versa
source-archive: https://github.com/hjson/hjson-go/archive/refs/tags/v4.6.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hjson
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hjson
  brew: brew install hjson
  nix: nix profile install nixpkgs#hjson
  scoop: scoop install main/hjson
provenance:
  formula: hjson
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
