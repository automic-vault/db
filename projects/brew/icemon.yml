id: brew:icemon
display-name: icemon
homepage: https://kfunk.org/tag/icemon/
repo: https://github.com/icecc/icemon
docs: https://kfunk.org/tag/icemon/
package-manager:
  brew: icemon
  dnf: icemon
  nix: icemon
package-manager-url: https://formulae.brew.sh/formula/icemon
version: 3.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Icecream GUI Monitor
source-archive: https://github.com/icecc/icemon/archive/refs/tags/v3.3.tar.gz
dependencies:
  - icecream
  - libarchive
  - lzo
  - qtbase
  - zstd
build-dependencies:
  - cmake
  - extra-cmake-modules
  - pkgconf
  - sphinx-doc
executables:
  - exposure: global executable
    kind: cli
    name: icemon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:icemon
  brew: brew install icemon
  dnf: sudo dnf install icemon
  nix: nix profile install nixpkgs#icemon
provenance:
  formula: icemon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
