id: brew:dsvpn
display-name: dsvpn
homepage: https://github.com/jedisct1/dsvpn
repo: https://github.com/jedisct1/dsvpn
docs: https://github.com/jedisct1/dsvpn
package-manager:
  brew: dsvpn
  nix: dsvpn
  zypper: dsvpn
package-manager-url: https://formulae.brew.sh/formula/dsvpn
version: 0.1.5
license: MIT
category: development
tags:
  - cli
description: Dead Simple VPN
source-archive: https://github.com/jedisct1/dsvpn/archive/refs/tags/0.1.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: dsvpn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    dsvpn requires root privileges so you will need to run `sudo
    $HOMEBREW_PREFIX/sbin/dsvpn`. You should be certain that you trust any software you
    grant root privileges.
  post-install-defined: false
install-lines:
  av: sudo av install brew:dsvpn
  brew: brew install dsvpn
  nix: nix profile install nixpkgs#dsvpn
  zypper: sudo zypper install dsvpn
provenance:
  formula: dsvpn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
