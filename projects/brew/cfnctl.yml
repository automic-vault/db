id: brew:cfnctl
display-name: cfnctl
homepage: https://github.com/rogerwelin/cfnctl
repo: https://github.com/rogerwelin/cfnctl
docs: https://github.com/rogerwelin/cfnctl
package-manager:
  brew: cfnctl
package-manager-url: https://formulae.brew.sh/formula/cfnctl
version: 0.1.1
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: Brings the Terraform cli experience to AWS Cloudformation
source-archive: https://github.com/rogerwelin/cfnctl/archive/refs/tags/v0.1.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cfnctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cfnctl
  brew: brew install cfnctl
provenance:
  formula: cfnctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
