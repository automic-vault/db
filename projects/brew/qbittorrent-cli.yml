id: brew:qbittorrent-cli
display-name: qbittorrent-cli
homepage: https://github.com/ludviglundgren/qbittorrent-cli
repo: https://github.com/ludviglundgren/qbittorrent-cli
docs: https://github.com/ludviglundgren/qbittorrent-cli
package-manager:
  apk: qbittorrent-cli
  brew: qbittorrent-cli
  nix: qbittorrent-cli
package-manager-url: https://formulae.brew.sh/formula/qbittorrent-cli
version: 2.2.0
license: MIT
category: development
tags:
  - cli
description: Command-line interface for qBittorrent written in Go
source-archive: https://github.com/ludviglundgren/qbittorrent-cli/archive/refs/tags/v2.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: qbt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add qbittorrent-cli
  av: sudo av install brew:qbittorrent-cli
  brew: brew install qbittorrent-cli
  nix: nix profile install nixpkgs#qbittorrent-cli
provenance:
  formula: qbittorrent-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
