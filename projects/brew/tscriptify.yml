id: brew:tscriptify
display-name: tscriptify
homepage: https://github.com/tkrajina/typescriptify-golang-structs
repo: https://github.com/tkrajina/typescriptify-golang-structs
docs: https://github.com/tkrajina/typescriptify-golang-structs
package-manager:
  brew: tscriptify
package-manager-url: https://formulae.brew.sh/formula/tscriptify
version: 0.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: Golang struct to TypeScript class/interface converter
source-archive: https://github.com/tkrajina/typescriptify-golang-structs/archive/refs/tags/v0.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tscriptify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tscriptify
  brew: brew install tscriptify
provenance:
  formula: tscriptify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
