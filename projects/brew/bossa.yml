id: brew:bossa
display-name: bossa
homepage: https://github.com/shumatech/BOSSA
repo: https://github.com/shumatech/BOSSA
docs: https://github.com/shumatech/BOSSA
package-manager:
  brew: bossa
  debian: bossa
  macports: bossa
  nix: bossa
  ubuntu: bossa
package-manager-url: https://formulae.brew.sh/formula/bossa
version: 1.9.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Flash utility for Atmel SAM microcontrollers
source-archive: https://github.com/shumatech/BOSSA/archive/refs/tags/1.9.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bossac
  - exposure: global executable
    kind: cli
    name: bossash
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bossa
  brew: brew install bossa
  debian: sudo apt install bossa
  macports: sudo port install bossa
  nix: nix profile install nixpkgs#bossa
  ubuntu: sudo apt install bossa
provenance:
  formula: bossa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
