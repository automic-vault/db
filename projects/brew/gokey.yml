id: brew:gokey
display-name: gokey
homepage: https://github.com/cloudflare/gokey
repo: https://github.com/cloudflare/gokey
docs: https://github.com/cloudflare/gokey
package-manager:
  brew: gokey
  debian: gokey
  macports: gokey
  nix: gokey
  ubuntu: gokey
package-manager-url: https://formulae.brew.sh/formula/gokey
version: 0.2.1
license: BSD-3-Clause
category: cloud
tags:
  - cli
description: Simple vaultless password manager in Go
source-archive: https://github.com/cloudflare/gokey/archive/refs/tags/v0.2.1.tar.gz
build-dependencies:
  - go
  - go-md2man
executables:
  - exposure: global executable
    kind: cli
    name: gokey
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gokey
  brew: brew install gokey
  debian: sudo apt install gokey
  macports: sudo port install gokey
  nix: nix profile install nixpkgs#gokey
  ubuntu: sudo apt install gokey
provenance:
  formula: gokey
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
