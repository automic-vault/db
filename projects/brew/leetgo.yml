id: brew:leetgo
display-name: leetgo
homepage: https://github.com/j178/leetgo
repo: https://github.com/j178/leetgo
docs: https://github.com/j178/leetgo
package-manager:
  brew: leetgo
  nix: leetgo
package-manager-url: https://formulae.brew.sh/formula/leetgo
version: 1.4.17
license: MIT
category: development
tags:
  - cli
description: CLI tool for LeetCode
source-archive: https://github.com/j178/leetgo/archive/refs/tags/v1.4.17.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: leetgo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:leetgo
  brew: brew install leetgo
  nix: nix profile install nixpkgs#leetgo
provenance:
  formula: leetgo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
