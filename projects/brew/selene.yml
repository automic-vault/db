id: brew:selene
display-name: selene
homepage: https://kampfkarren.github.io/selene
repo: https://github.com/Kampfkarren/selene
docs: https://kampfkarren.github.io/selene
package-manager:
  brew: selene
  nix: selene
  pacman: selene
  scoop: extras/selene
package-manager-url: https://formulae.brew.sh/formula/selene
version: 0.31.0
license: MPL-2.0
category: development
tags:
  - cli
description: Blazing-fast modern Lua linter
source-archive: https://github.com/Kampfkarren/selene/archive/refs/tags/0.31.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: selene
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:selene
  brew: brew install selene
  nix: nix profile install nixpkgs#selene
  pacman: sudo pacman -S selene
  scoop: scoop install extras/selene
provenance:
  formula: selene
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
