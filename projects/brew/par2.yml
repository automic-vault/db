id: brew:par2
display-name: par2
homepage: https://github.com/Parchive/par2cmdline
repo: https://github.com/Parchive/par2cmdline
docs: https://github.com/Parchive/par2cmdline
package-manager:
  brew: par2
  debian: par2
  macports: par2
  ubuntu: par2
package-manager-url: https://formulae.brew.sh/formula/par2
version: 1.1.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: 'Parchive: Parity Archive Volume Set for data recovery'
source-archive: >
  https://github.com/Parchive/par2cmdline/releases/download/v1.1.1/par2cmdline-1.1.1.tar.bz2
dependencies:
  - libomp
executables:
  - exposure: global executable
    kind: cli
    name: par2
  - exposure: global executable
    kind: cli
    name: par2create
  - exposure: global executable
    kind: cli
    name: par2repair
  - exposure: global executable
    kind: cli
    name: par2verify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:par2
  brew: brew install par2
  debian: sudo apt install par2
  macports: sudo port install par2
  ubuntu: sudo apt install par2
provenance:
  formula: par2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
