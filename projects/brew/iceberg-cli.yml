id: brew:iceberg-cli
display-name: iceberg-cli
homepage: https://go.iceberg.apache.org/cli.html
repo: https://github.com/apache/iceberg-go
docs: https://go.iceberg.apache.org/cli.html
package-manager:
  brew: iceberg-cli
package-manager-url: https://formulae.brew.sh/formula/iceberg-cli
version: 0.5.0
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line interface for Apache Iceberg
source-archive: https://github.com/apache/iceberg-go/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: iceberg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:iceberg-cli
  brew: brew install iceberg-cli
provenance:
  formula: iceberg-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
