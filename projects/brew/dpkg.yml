id: brew:dpkg
display-name: dpkg
homepage: https://wiki.debian.org/Teams/Dpkg
repo: https://deb.debian.org/debian/pool/main/d/dpkg/dpkg_1.23.7.tar.xz
docs: https://wiki.debian.org/Teams/Dpkg
package-manager:
  apk: dpkg
  brew: dpkg
  debian: dpkg
  dnf: dpkg
  macports: dpkg
  nix: dpkg
  pacman: dpkg
  ubuntu: dpkg
  zypper: dpkg
package-manager-url: https://formulae.brew.sh/formula/dpkg
version: 1.23.7
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Debian package management system
source-archive: https://deb.debian.org/debian/pool/main/d/dpkg/dpkg_1.23.7.tar.xz
dependencies:
  - gettext
  - gnu-tar
  - gpatch
  - libmd
  - perl
  - xz
build-dependencies:
  - pkgconf
  - po4a
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: dpkg
  - exposure: global executable
    kind: cli
    name: dpkg-architecture
  - exposure: global executable
    kind: cli
    name: dpkg-buildapi
  - exposure: global executable
    kind: cli
    name: dpkg-buildflags
  - exposure: global executable
    kind: cli
    name: dpkg-buildpackage
  - exposure: global executable
    kind: cli
    name: dpkg-buildtree
  - exposure: global executable
    kind: cli
    name: dpkg-checkbuilddeps
  - exposure: global executable
    kind: cli
    name: dpkg-deb
  - exposure: global executable
    kind: cli
    name: dpkg-distaddfile
  - exposure: global executable
    kind: cli
    name: dpkg-divert
  - exposure: global executable
    kind: cli
    name: dpkg-genbuildinfo
  - exposure: global executable
    kind: cli
    name: dpkg-genchanges
  - exposure: global executable
    kind: cli
    name: dpkg-gencontrol
  - exposure: global executable
    kind: cli
    name: dpkg-gensymbols
  - exposure: global executable
    kind: cli
    name: dpkg-maintscript-helper
  - exposure: global executable
    kind: cli
    name: dpkg-mergechangelogs
  - exposure: global executable
    kind: cli
    name: dpkg-name
  - exposure: global executable
    kind: cli
    name: dpkg-parsechangelog
  - exposure: global executable
    kind: cli
    name: dpkg-query
  - exposure: global executable
    kind: cli
    name: dpkg-realpath
  - exposure: global executable
    kind: cli
    name: dpkg-scanpackages
  - exposure: global executable
    kind: cli
    name: dpkg-scansources
  - exposure: global executable
    kind: cli
    name: dpkg-shlibdeps
  - exposure: global executable
    kind: cli
    name: dpkg-source
  - exposure: global executable
    kind: cli
    name: dpkg-split
  - exposure: global executable
    kind: cli
    name: dpkg-statoverride
  - exposure: global executable
    kind: cli
    name: dpkg-trigger
  - exposure: global executable
    kind: cli
    name: dpkg-vendor
  - exposure: global executable
    kind: cli
    name: update-alternatives
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This installation of dpkg is not configured to install software, so commands such as
    `dpkg -i`, `dpkg --configure` will fail.
  post-install-defined: false
install-lines:
  apk: sudo apk add dpkg
  av: sudo av install brew:dpkg
  brew: brew install dpkg
  debian: sudo apt install dpkg
  dnf: sudo dnf install dpkg
  macports: sudo port install dpkg
  nix: nix profile install nixpkgs#dpkg
  pacman: sudo pacman -S dpkg
  ubuntu: sudo apt install dpkg
  zypper: sudo zypper install dpkg
provenance:
  formula: dpkg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
