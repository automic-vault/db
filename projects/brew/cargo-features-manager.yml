id: brew:cargo-features-manager
display-name: cargo-features-manager
homepage: https://github.com/ToBinio/cargo-features-manager
repo: https://github.com/ToBinio/cargo-features-manager
docs: https://github.com/ToBinio/cargo-features-manager
package-manager:
  brew: cargo-features-manager
  nix: cargo-features-manager
package-manager-url: https://formulae.brew.sh/formula/cargo-features-manager
version: 0.11.1
license: MIT
category: development
tags:
  - cli
description: TUI like cli tool to manage the features of your rust-project dependencies
source-archive: https://github.com/ToBinio/cargo-features-manager/archive/refs/tags/v0.11.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-features
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-features-manager
  brew: brew install cargo-features-manager
  nix: nix profile install nixpkgs#cargo-features-manager
provenance:
  formula: cargo-features-manager
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
