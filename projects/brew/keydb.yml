id: brew:keydb
display-name: keydb
homepage: https://keydb.dev
repo: https://github.com/Snapchat/KeyDB
docs: https://keydb.dev
package-manager:
  apk: keydb
  brew: keydb
  dnf: keydb
package-manager-url: https://formulae.brew.sh/formula/keydb
version: 6.3.4
license: BSD-3-Clause
category: database
tags:
  - cli
description: Multithreaded fork of Redis
source-archive: https://github.com/Snapchat/KeyDB/archive/refs/tags/v6.3.4.tar.gz
dependencies:
  - openssl@3
  - snappy
  - zstd
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: keydb-benchmark
  - exposure: global executable
    kind: cli
    name: keydb-check-aof
  - exposure: global executable
    kind: cli
    name: keydb-check-rdb
  - exposure: global executable
    kind: cli
    name: keydb-cli
  - exposure: global executable
    kind: cli
    name: keydb-sentinel
  - exposure: global executable
    kind: cli
    name: keydb-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add keydb
  av: sudo av install brew:keydb
  brew: brew install keydb
  dnf: sudo dnf install keydb
provenance:
  formula: keydb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
