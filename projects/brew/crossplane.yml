id: brew:crossplane
display-name: crossplane
homepage: https://github.com/crossplane/cli
repo: https://github.com/crossplane/cli
docs: https://github.com/crossplane/cli
package-manager:
  apk: crossplane
  brew: crossplane
  nix: crossplane
  winget: Crossplane.CrossplaneCli
package-manager-url: https://formulae.brew.sh/formula/crossplane
version: 2.3.1
license: Apache-2.0
category: development
tags:
  - cli
description: Build control planes without needing to write code
source-archive: https://github.com/crossplane/cli/archive/refs/tags/v2.3.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: crossplane
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add crossplane
  av: sudo av install brew:crossplane
  brew: brew install crossplane
  nix: nix profile install nixpkgs#crossplane
  winget: winget install --id Crossplane.CrossplaneCli -e
provenance:
  formula: crossplane
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
