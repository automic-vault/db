id: brew:ulfius
display-name: ulfius
homepage: https://babelouest.github.io/ulfius/
repo: https://github.com/babelouest/ulfius
docs: https://babelouest.github.io/ulfius/
package-manager:
  brew: ulfius
  debian: uwsc
  nix: ulfius
  pacman: ulfius
  ubuntu: uwsc
  winget: stuncloud.uwscr
  zypper: uwsc
package-manager-url: https://formulae.brew.sh/formula/ulfius
version: 2.7.15
license: LGPL-2.1-only
category: development
tags:
  - cli
description: HTTP Framework for REST Applications in C
source-archive: https://github.com/babelouest/ulfius/archive/refs/tags/v2.7.15.tar.gz
dependencies:
  - gnutls
  - jansson
  - libmicrohttpd
  - orcania
  - yder
build-dependencies:
  - cmake
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: uwsc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ulfius
  brew: brew install ulfius
  debian: sudo apt install uwsc
  nix: nix profile install nixpkgs#ulfius
  pacman: sudo pacman -S ulfius
  ubuntu: sudo apt install uwsc
  winget: winget install --id stuncloud.uwscr -e
  zypper: sudo zypper install uwsc
provenance:
  formula: ulfius
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
