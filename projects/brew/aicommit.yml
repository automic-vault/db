id: brew:aicommit
display-name: aicommit
homepage: https://github.com/coder/aicommit
repo: https://github.com/coder/aicommit
docs: https://github.com/coder/aicommit
package-manager:
  brew: aicommit
  winget: RussMckendrick.Aicommit
package-manager-url: https://formulae.brew.sh/formula/aicommit
version: 0.6.5
license: CC0-1.0
category: development
tags:
  - cli
description: AI-powered commit message generator
source-archive: https://github.com/coder/aicommit/archive/refs/tags/v0.6.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aicommit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aicommit
  brew: brew install aicommit
  winget: winget install --id RussMckendrick.Aicommit -e
provenance:
  formula: aicommit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
