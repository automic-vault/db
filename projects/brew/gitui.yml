id: brew:gitui
display-name: gitui
homepage: https://github.com/gitui-org/gitui
repo: https://github.com/gitui-org/gitui
docs: https://github.com/gitui-org/gitui
package-manager:
  apk: gitui
  brew: gitui
  dnf: gitui
  macports: gitui
  nix: gitui
  pacman: gitui
  scoop: main/gitui
  winget: StephanDilly.gitui
  zypper: gitui
package-manager-url: https://formulae.brew.sh/formula/gitui
version: 0.28.1
license: MIT
category: development
tags:
  - cli
  - git
description: Blazing fast terminal-ui for git written in rust
source-archive: https://github.com/gitui-org/gitui/archive/refs/tags/v0.28.1.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - cmake
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gitui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gitui
  av: sudo av install brew:gitui
  brew: brew install gitui
  dnf: sudo dnf install gitui
  macports: sudo port install gitui
  nix: nix profile install nixpkgs#gitui
  pacman: sudo pacman -S gitui
  scoop: scoop install main/gitui
  winget: winget install --id StephanDilly.gitui -e
  zypper: sudo zypper install gitui
provenance:
  formula: gitui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
