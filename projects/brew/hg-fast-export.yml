id: brew:hg-fast-export
display-name: hg-fast-export
homepage: https://repo.or.cz/fast-export.git
repo: https://github.com/frej/fast-export
docs: https://repo.or.cz/fast-export.git
package-manager:
  brew: hg-fast-export
package-manager-url: https://formulae.brew.sh/formula/hg-fast-export
version: 260405
license: GPL-2.0-or-later
category: development
tags:
  - cli
  - git
description: Fast Mercurial to Git converter
source-archive: https://github.com/frej/fast-export/archive/refs/tags/v260405.tar.gz
dependencies:
  - mercurial
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: hg-fast-export.py
  - exposure: global executable
    kind: cli
    name: hg-fast-export.sh
  - exposure: global executable
    kind: cli
    name: hg-reset.py
  - exposure: global executable
    kind: cli
    name: hg-reset.sh
  - exposure: global executable
    kind: cli
    name: hg2git.py
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hg-fast-export
  brew: brew install hg-fast-export
provenance:
  formula: hg-fast-export
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
