id: brew:scala-cli
display-name: scala-cli
homepage: https://scala-cli.virtuslab.org/
repo: https://github.com/VirtusLab/scala-cli
docs: https://scala-cli.virtuslab.org/
package-manager:
  brew: scala-cli
  nix: scala-cli
  scoop: main/scala-cli
  winget: VirtusLab.ScalaCLI
package-manager-url: https://formulae.brew.sh/formula/scala-cli
version: 1.14.0
license: Apache-2.0
category: development
tags:
  - cli
description: Scala language runner and build tool
source-archive: https://github.com/VirtusLab/scala-cli.git
build-dependencies:
  - openjdk@17
executables:
  - exposure: global executable
    kind: cli
    name: scala-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:scala-cli
  brew: brew install scala-cli
  nix: nix profile install nixpkgs#scala-cli
  scoop: scoop install main/scala-cli
  winget: winget install --id VirtusLab.ScalaCLI -e
provenance:
  formula: scala-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
