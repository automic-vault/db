id: brew:exif
display-name: exif
homepage: https://libexif.github.io/
repo: https://github.com/libexif/exif
docs: https://libexif.github.io/
package-manager:
  brew: exif
  debian: exif
  dnf: exif
  macports: exif
  nix: exif
  ubuntu: exif
  winget: OliverBetz.ExifTool
  zypper: exif
package-manager-url: https://formulae.brew.sh/formula/exif
version: 0.6.22
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Read, write, modify, and display EXIF data on the command-line
source-archive: https://github.com/libexif/exif/releases/download/exif-0_6_22-release/exif-0.6.22.tar.xz
dependencies:
  - libexif
  - popt
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: exif
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:exif
  brew: brew install exif
  debian: sudo apt install exif
  dnf: sudo dnf install exif
  macports: sudo port install exif
  nix: nix profile install nixpkgs#exif
  ubuntu: sudo apt install exif
  winget: winget install --id OliverBetz.ExifTool -e
  zypper: sudo zypper install exif
provenance:
  formula: exif
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
