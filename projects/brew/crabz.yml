id: brew:crabz
display-name: crabz
homepage: https://github.com/sstadick/crabz
repo: https://github.com/sstadick/crabz
docs: https://github.com/sstadick/crabz
package-manager:
  brew: crabz
  nix: crabz
package-manager-url: https://formulae.brew.sh/formula/crabz
version: 0.10.0
license: MIT OR Unlicense
category: development
tags:
  - cli
description: Like pigz, but in Rust
source-archive: https://github.com/sstadick/crabz/archive/refs/tags/v0.10.0.tar.gz
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: crabz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:crabz
  brew: brew install crabz
  nix: nix profile install nixpkgs#crabz
provenance:
  formula: crabz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
