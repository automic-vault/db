  scoop: scoop install extras/nicotine-plus
  ubuntu: sudo apt install nicotine
  winget: winget install --id Nicotine+.Nicotine+ -e
provenance:
  formula: nicotine-plus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
