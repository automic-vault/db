  pacman: nicotine+
  scoop: extras/nicotine-plus
  ubuntu: nicotine
  winget: Nicotine+.Nicotine+
package-manager-url: https://formulae.brew.sh/formula/nicotine-plus
version: 3.3.10
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Graphical client for the Soulseek peer-to-peer network
source-archive: >
  https://files.pythonhosted.org/packages/bb/91/b7d2f353828d1bc57bb43cfe9006b0fde4d6ffe1458d5045c58f567ed33a/nicotine_plus-3.3.10.tar.gz
dependencies:
  - adwaita-icon-theme
  - gtk4
  - libadwaita
  - py3cairo
  - pygobject3
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: nicotine
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
