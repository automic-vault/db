id: brew:nicotine-plus
display-name: nicotine-plus
homepage: https://nicotine-plus.org
repo: >
  https://files.pythonhosted.org/packages/bb/91/b7d2f353828d1bc57bb43cfe9006b0fde4d6ffe1458d5045c58f567ed33a/nicotine_plus-3.3.10.tar.gz
docs: https://nicotine-plus.org
package-manager:
  apk: nicotine-plus
