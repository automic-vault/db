id: brew:libbi
display-name: libbi
homepage: https://libbi.org/
repo: https://github.com/lawmurray/LibBi
docs: https://libbi.org/
package-manager:
  brew: libbi
package-manager-url: https://formulae.brew.sh/formula/libbi
version: 1.4.5
license: GPL-2.0-only
category: development
tags:
  - cli
description: Bayesian state-space modelling on parallel computer hardware
source-archive: https://github.com/lawmurray/LibBi/archive/refs/tags/1.4.5.tar.gz
dependencies:
  - automake
  - boost
  - gsl
  - netcdf
  - qrupdate
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: bi
  - exposure: global executable
    kind: cli
    name: libbi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libbi
  brew: brew install libbi
provenance:
  formula: libbi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
