id: brew:block-goose-cli
display-name: block-goose-cli
homepage: https://block.github.io/goose/
repo: https://github.com/block/goose
docs: https://block.github.io/goose/
package-manager:
  brew: block-goose-cli
  dnf: goose
  macports: goose
  nix: goose
  scoop: extras/goose
  winget: Pressly.Goose
package-manager-url: https://formulae.brew.sh/formula/block-goose-cli
version: 1.35.0
license: Apache-2.0
category: development
tags:
  - cli
description: Open source, extensible AI agent that goes beyond code suggestions
source-archive: https://github.com/block/goose/archive/refs/tags/v1.35.0.tar.gz
build-dependencies:
  - cmake
  - pkgconf
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: generate_manpages
  - exposure: global executable
    kind: cli
    name: goose
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:block-goose-cli
  brew: brew install block-goose-cli
  dnf: sudo dnf install goose
  macports: sudo port install goose
  nix: nix profile install nixpkgs#goose
  scoop: scoop install extras/goose
  winget: winget install --id Pressly.Goose -e
provenance:
  formula: block-goose-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
