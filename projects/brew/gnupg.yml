id: brew:gnupg
display-name: gnupg
homepage: https://gnupg.org/
repo: https://gnupg.org/ftp/gcrypt/gnupg/gnupg-2.5.20.tar.bz2
docs: https://gnupg.org/
package-manager:
  apk: gnupg
  brew: gnupg
  chocolatey: gnupg
  debian: gnupg
  nix: gnupg
  pacman: gnupg
  scoop: main/gnupg
  ubuntu: gnupg
  winget: GnuPG.GnuPG
  zypper: dirmngr
package-manager-url: https://formulae.brew.sh/formula/gnupg
version: 2.5.20
license: GPL-3.0-or-later
category: security
tags:
  - cli
description: GNU Privacy Guard (OpenPGP)
source-archive: https://gnupg.org/ftp/gcrypt/gnupg/gnupg-2.5.20.tar.bz2
dependencies:
  - gettext
  - gnutls
  - libassuan
  - libgcrypt
  - libgpg-error
  - libksba
  - libusb
  - npth
  - pinentry
  - readline
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
  - openldap
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: addgnupghome
  - exposure: global executable
    kind: cli
    name: applygnupgdefaults
  - exposure: global executable
    kind: cli
    name: dirmngr
  - exposure: global executable
    kind: cli
    name: dirmngr-client
  - exposure: global executable
    kind: cli
    name: gpg
  - exposure: global executable
    kind: cli
    name: gpg-agent
  - exposure: global executable
    kind: cli
    name: gpg-authcode-sign.sh
  - exposure: global executable
    kind: cli
    name: gpg-card
  - exposure: global executable
    kind: cli
    name: gpg-connect-agent
  - exposure: global executable
    kind: cli
    name: gpg-mail-tube
  - exposure: global executable
    kind: cli
    name: gpg-wks-client
  - exposure: global executable
    kind: cli
    name: gpg-wks-server
  - exposure: global executable
    kind: cli
    name: gpgconf
  - exposure: global executable
    kind: cli
    name: gpgparsemail
  - exposure: global executable
    kind: cli
    name: gpgscm
  - exposure: global executable
    kind: cli
    name: gpgsm
  - exposure: global executable
    kind: cli
    name: gpgsplit
  - exposure: global executable
    kind: cli
    name: gpgtar
  - exposure: global executable
    kind: cli
    name: gpgv
  - exposure: global executable
    kind: cli
    name: kbxutil
  - exposure: global executable
    kind: cli
    name: watchgnupg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add gnupg
  av: sudo av install brew:gnupg
  brew: brew install gnupg
  chocolatey: choco install gnupg
  debian: sudo apt install gnupg
  nix: nix profile install nixpkgs#gnupg
  pacman: sudo pacman -S gnupg
  scoop: scoop install main/gnupg
  ubuntu: sudo apt install gnupg
  winget: winget install --id GnuPG.GnuPG -e
  zypper: sudo zypper install dirmngr
provenance:
  formula: gnupg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
