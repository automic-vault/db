id: brew:qshell
display-name: qshell
homepage: https://github.com/qiniu/qshell
repo: https://github.com/qiniu/qshell
docs: https://github.com/qiniu/qshell
package-manager:
  brew: qshell
  winget: tea4go.QShell
package-manager-url: https://formulae.brew.sh/formula/qshell
version: 2.19.7
license: MIT
category: cloud
tags:
  - cli
  - cloud
description: Shell Tools for Qiniu Cloud
source-archive: https://github.com/qiniu/qshell/archive/refs/tags/v2.19.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: qshell
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qshell
  brew: brew install qshell
  winget: winget install --id tea4go.QShell -e
provenance:
  formula: qshell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
