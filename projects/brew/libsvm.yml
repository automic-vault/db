id: brew:libsvm
display-name: libsvm
homepage: https://www.csie.ntu.edu.tw/~cjlin/libsvm/
repo: https://www.csie.ntu.edu.tw/~cjlin/libsvm/libsvm-3.37.tar.gz
docs: https://www.csie.ntu.edu.tw/~cjlin/libsvm/
package-manager:
  brew: libsvm
  dnf: libsvm
  macports: libsvm
  nix: libsvm
  pacman: libsvm
package-manager-url: https://formulae.brew.sh/formula/libsvm
version: 3.37
license: BSD-3-Clause
category: network
tags:
  - cli
description: Library for support vector machines
source-archive: https://www.csie.ntu.edu.tw/~cjlin/libsvm/libsvm-3.37.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: svm-predict
  - exposure: global executable
    kind: cli
    name: svm-scale
  - exposure: global executable
    kind: cli
    name: svm-train
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libsvm
  brew: brew install libsvm
  dnf: sudo dnf install libsvm
  macports: sudo port install libsvm
  nix: nix profile install nixpkgs#libsvm
  pacman: sudo pacman -S libsvm
provenance:
  formula: libsvm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
