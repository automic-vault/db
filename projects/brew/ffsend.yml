id: brew:ffsend
display-name: ffsend
homepage: https://gitlab.com/timvisee/ffsend
repo: https://github.com/timvisee/ffsend
docs: https://gitlab.com/timvisee/ffsend
package-manager:
  apk: ffsend
  brew: ffsend
  macports: ffsend
  nix: ffsend
  scoop: main/ffsend
  winget: TimVisee.ffsend
package-manager-url: https://formulae.brew.sh/formula/ffsend
version: 0.2.77
license: GPL-3.0-only
category: development
tags:
  - cli
description: Fully featured Firefox Send client
source-archive: https://github.com/timvisee/ffsend/archive/refs/tags/v0.2.77.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ffsend
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ffsend
  av: sudo av install brew:ffsend
  brew: brew install ffsend
  macports: sudo port install ffsend
  nix: nix profile install nixpkgs#ffsend
  scoop: scoop install main/ffsend
  winget: winget install --id TimVisee.ffsend -e
provenance:
  formula: ffsend
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
