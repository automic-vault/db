id: brew:colmap
display-name: colmap
homepage: https://colmap.github.io/
repo: https://github.com/colmap/colmap
docs: https://colmap.github.io/
package-manager:
  brew: colmap
  debian: colmap
  nix: colmap
  ubuntu: colmap
package-manager-url: https://formulae.brew.sh/formula/colmap
version: 4.0.4
license: BSD-3-Clause
category: development
tags:
  - cli
description: Structure-from-Motion and Multi-View Stereo
source-archive: https://github.com/colmap/colmap/archive/refs/tags/4.0.4.tar.gz
dependencies:
  - boost
  - ceres-solver
  - cgal
  - eigen
  - faiss
  - flann
  - gflags
  - glew
  - glog
  - gmp
  - libomp
  - lz4
  - metis
  - mpfr
  - onnx
  - onnxruntime
  - openimageio
  - openssl@3
  - poselib
  - qtbase
  - sqlite
  - suite-sparse
build-dependencies:
  - cmake
uses-from-macos:
  - curl
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: colmap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:colmap
  brew: brew install colmap
  debian: sudo apt install colmap
  nix: nix profile install nixpkgs#colmap
  ubuntu: sudo apt install colmap
provenance:
  formula: colmap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
