id: brew:asn1c
display-name: asn1c
homepage: https://lionet.info/asn1c/blog
repo: https://github.com/vlm/asn1c
docs: https://lionet.info/asn1c/blog
package-manager:
  brew: asn1c
  debian: asn1c
  macports: asn1c
  nix: asn1c
  ubuntu: asn1c
  zypper: asn1c
package-manager-url: https://formulae.brew.sh/formula/asn1c
version: 0.9.28
license: BSD-2-Clause
category: development
tags:
  - cli
description: Compile ASN.1 specifications into C source code
source-archive: https://github.com/vlm/asn1c/releases/download/v0.9.28/asn1c-0.9.28.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: asn1c
  - exposure: global executable
    kind: cli
    name: crfc2asn1.pl
  - exposure: global executable
    kind: cli
    name: enber
  - exposure: global executable
    kind: cli
    name: unber
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:asn1c
  brew: brew install asn1c
  debian: sudo apt install asn1c
  macports: sudo port install asn1c
  nix: nix profile install nixpkgs#asn1c
  ubuntu: sudo apt install asn1c
  zypper: sudo zypper install asn1c
provenance:
  formula: asn1c
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
