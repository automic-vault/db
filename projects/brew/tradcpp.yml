id: brew:tradcpp
display-name: tradcpp
homepage: https://www.netbsd.org/~dholland/tradcpp/
repo: https://cdn.netbsd.org/pub/NetBSD/misc/dholland/tradcpp-0.5.3.tar.gz
docs: https://www.netbsd.org/~dholland/tradcpp/
package-manager:
  brew: tradcpp
  macports: tradcpp
  nix: tradcpp
package-manager-url: https://formulae.brew.sh/formula/tradcpp
version: 0.5.3
license: BSD-2-Clause
category: network
tags:
  - cli
description: K&R-style C preprocessor
source-archive: https://cdn.netbsd.org/pub/NetBSD/misc/dholland/tradcpp-0.5.3.tar.gz
build-dependencies:
  - bmake
executables:
  - exposure: global executable
    kind: cli
    name: tradcpp
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tradcpp
  brew: brew install tradcpp
  macports: sudo port install tradcpp
  nix: nix profile install nixpkgs#tradcpp
provenance:
  formula: tradcpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
