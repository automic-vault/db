id: brew:gotz
display-name: gotz
homepage: https://github.com/merschformann/gotz
repo: https://github.com/merschformann/gotz
docs: https://github.com/merschformann/gotz
package-manager:
  brew: gotz
package-manager-url: https://formulae.brew.sh/formula/gotz
version: 0.1.15
license: MIT
category: development
tags:
  - cli
description: Displays timezones in your terminal
source-archive: https://github.com/merschformann/gotz/archive/refs/tags/v0.1.15.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gotz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gotz
  brew: brew install gotz
provenance:
  formula: gotz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
