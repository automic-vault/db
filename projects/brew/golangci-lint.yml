id: brew:golangci-lint
display-name: golangci-lint
homepage: https://golangci-lint.run/
repo: https://github.com/golangci/golangci-lint
docs: https://golangci-lint.run/
package-manager:
  apk: golangci-lint
  brew: golangci-lint
  chocolatey: golangci-lint
  dnf: golangci-lint
  macports: golangci-lint
  nix: golangci-lint
  pacman: golangci-lint
  scoop: main/golangci-lint
  winget: GolangCI.golangci-lint
  zypper: golangci-lint
package-manager-url: https://formulae.brew.sh/formula/golangci-lint
version: 2.12.2
license: GPL-3.0-only
category: development
tags:
  - cli
description: Fast linters runner for Go
source-archive: https://github.com/golangci/golangci-lint.git
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: golangci-lint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add golangci-lint
  av: sudo av install brew:golangci-lint
  brew: brew install golangci-lint
  chocolatey: choco install golangci-lint
  dnf: sudo dnf install golangci-lint
  macports: sudo port install golangci-lint
  nix: nix profile install nixpkgs#golangci-lint
  pacman: sudo pacman -S golangci-lint
  scoop: scoop install main/golangci-lint
  winget: winget install --id GolangCI.golangci-lint -e
  zypper: sudo zypper install golangci-lint
provenance:
  formula: golangci-lint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
