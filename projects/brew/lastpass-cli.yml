id: brew:lastpass-cli
display-name: lastpass-cli
homepage: https://github.com/lastpass/lastpass-cli
repo: https://github.com/lastpass/lastpass-cli
docs: https://github.com/lastpass/lastpass-cli
package-manager:
  apk: lastpass-cli
  brew: lastpass-cli
  dnf: lastpass-cli
  macports: lastpass-cli
  nix: lastpass-cli
  ubuntu: lastpass-cli
package-manager-url: https://formulae.brew.sh/formula/lastpass-cli
version: 1.6.1
license: GPL-2.0-or-later WITH openvpn-openssl-exception
category: development
tags:
  - cli
description: LastPass command-line interface tool
source-archive: >
  https://github.com/lastpass/lastpass-cli/releases/download/v1.6.1/lastpass-cli-1.6.1.tar.gz
dependencies:
  - curl
  - openssl@3
  - pinentry
build-dependencies:
  - asciidoc
  - cmake
  - docbook-xsl
  - pkgconf
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: lpass
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lastpass-cli
  av: sudo av install brew:lastpass-cli
  brew: brew install lastpass-cli
  dnf: sudo dnf install lastpass-cli
  macports: sudo port install lastpass-cli
  nix: nix profile install nixpkgs#lastpass-cli
  ubuntu: sudo apt install lastpass-cli
provenance:
  formula: lastpass-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
