id: brew:shellcheck
display-name: shellcheck
homepage: https://www.shellcheck.net/
repo: https://github.com/koalaman/shellcheck
docs: https://www.shellcheck.net/
package-manager:
  apk: shellcheck
  brew: shellcheck
  chocolatey: shellcheck
  debian: shellcheck
  dnf: ShellCheck
  macports: shellcheck
  nix: shellcheck
  pacman: shellcheck
  scoop: main/shellcheck
  ubuntu: shellcheck
  winget: koalaman.shellcheck
  zypper: ShellCheck
package-manager-url: https://formulae.brew.sh/formula/shellcheck
version: 0.11.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Static analysis and lint tool, for (ba)sh scripts
source-archive: https://github.com/koalaman/shellcheck/archive/refs/tags/v0.11.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
  - pandoc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: shellcheck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add shellcheck
  av: sudo av install brew:shellcheck
  brew: brew install shellcheck
  chocolatey: choco install shellcheck
  debian: sudo apt install shellcheck
  dnf: sudo dnf install ShellCheck
  macports: sudo port install shellcheck
  nix: nix profile install nixpkgs#shellcheck
  pacman: sudo pacman -S shellcheck
  scoop: scoop install main/shellcheck
  ubuntu: sudo apt install shellcheck
  winget: winget install --id koalaman.shellcheck -e
  zypper: sudo zypper install ShellCheck
provenance:
  formula: shellcheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
