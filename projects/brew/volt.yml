id: brew:volt
display-name: volt
homepage: https://github.com/vim-volt/volt
repo: https://github.com/vim-volt/volt
docs: https://github.com/vim-volt/volt
package-manager:
  brew: volt
  nix: volt
package-manager-url: https://formulae.brew.sh/formula/volt
version: 0.3.7
license: MIT
category: development
tags:
  - cli
description: Meta-level vim package manager
source-archive: https://github.com/vim-volt/volt/archive/refs/tags/v0.3.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: volt
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:volt
  brew: brew install volt
  nix: nix profile install nixpkgs#volt
provenance:
  formula: volt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
