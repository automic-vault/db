id: brew:rhai
display-name: rhai
homepage: https://rhai.rs/
repo: https://github.com/rhaiscript/rhai
docs: https://rhai.rs/
package-manager:
  brew: rhai
package-manager-url: https://formulae.brew.sh/formula/rhai
version: 1.25.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Embedded scripting language for Rust
source-archive: https://github.com/rhaiscript/rhai/archive/refs/tags/v1.25.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rhai-run
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rhai
  brew: brew install rhai
provenance:
  formula: rhai
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
