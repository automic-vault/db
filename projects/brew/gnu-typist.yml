id: brew:gnu-typist
display-name: gnu-typist
homepage: https://www.gnu.org/software/gtypist/
repo: https://ftpmirror.gnu.org/gnu/gtypist/gtypist-2.10.1.tar.xz
docs: https://www.gnu.org/software/gtypist/
package-manager:
  apk: gtypist
  brew: gnu-typist
  debian: gtypist
  dnf: gtypist
  macports: gtypist
  nix: gtypist
  scoop: main/gtypist
  ubuntu: gtypist
  zypper: gtypist
package-manager-url: https://formulae.brew.sh/formula/gnu-typist
version: 2.10.1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU typing tutor
source-archive: https://ftpmirror.gnu.org/gnu/gtypist/gtypist-2.10.1.tar.xz
dependencies:
  - gettext
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: gtypist
  - exposure: global executable
    kind: cli
    name: typefortune
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gtypist
  av: sudo av install brew:gnu-typist
  brew: brew install gnu-typist
  debian: sudo apt install gtypist
  dnf: sudo dnf install gtypist
  macports: sudo port install gtypist
  nix: nix profile install nixpkgs#gtypist
  scoop: scoop install main/gtypist
  ubuntu: sudo apt install gtypist
  zypper: sudo zypper install gtypist
provenance:
  formula: gnu-typist
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
