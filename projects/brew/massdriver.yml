id: brew:massdriver
display-name: massdriver
homepage: https://www.massdriver.cloud/
repo: https://github.com/massdriver-cloud/mass
docs: https://www.massdriver.cloud/
package-manager:
  brew: massdriver
package-manager-url: https://formulae.brew.sh/formula/massdriver
version: 2.1.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Manage applications and infrastructure on Massdriver Cloud
source-archive: https://github.com/massdriver-cloud/mass/archive/refs/tags/2.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mass
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:massdriver
  brew: brew install massdriver
provenance:
  formula: massdriver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
