id: brew:tea
display-name: tea
homepage: https://gitea.com/gitea/tea
repo: https://gitea.com/gitea/tea/archive/v0.14.1.tar.gz
docs: https://gitea.com/gitea/tea
package-manager:
  apk: tea
  brew: tea
  debian: tea
  macports: tea
  nix: tea
  pacman: tea
  scoop: main/tea
  ubuntu: tea
  winget: Gitea.tea
  zypper: tea
package-manager-url: https://formulae.brew.sh/formula/tea
version: 0.14.1
license: MIT
category: development
tags:
  - cli
description: Command-line tool to interact with Gitea servers
source-archive: https://gitea.com/gitea/tea/archive/v0.14.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tea
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tea
  av: sudo av install brew:tea
  brew: brew install tea
  debian: sudo apt install tea
  macports: sudo port install tea
  nix: nix profile install nixpkgs#tea
  pacman: sudo pacman -S tea
  scoop: scoop install main/tea
  ubuntu: sudo apt install tea
  winget: winget install --id Gitea.tea -e
  zypper: sudo zypper install tea
provenance:
  formula: tea
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
