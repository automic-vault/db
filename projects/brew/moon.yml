id: brew:moon
display-name: moon
homepage: https://moonrepo.dev/moon
repo: https://github.com/moonrepo/moon
docs: https://moonrepo.dev/moon
package-manager:
  brew: moon
  nix: moon
  scoop: main/moon
package-manager-url: https://formulae.brew.sh/formula/moon
version: 2.2.5
license: MIT
category: development
tags:
  - cli
description: Task runner and repo management tool for the web ecosystem, written in Rust
source-archive: https://github.com/moonrepo/moon/archive/refs/tags/v2.2.5.tar.gz
build-dependencies:
  - pkgconf
  - protobuf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: moon
  - exposure: global executable
    kind: cli
    name: moonx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:moon
  brew: brew install moon
  nix: nix profile install nixpkgs#moon
  scoop: scoop install main/moon
provenance:
  formula: moon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
