id: brew:vcfanno
display-name: vcfanno
homepage: https://genomebiology.biomedcentral.com/articles/10.1186/s13059-016-0973-5
repo: https://github.com/brentp/vcfanno
docs: https://genomebiology.biomedcentral.com/articles/10.1186/s13059-016-0973-5
package-manager:
  brew: vcfanno
  debian: vcfanno
  ubuntu: vcfanno
package-manager-url: https://formulae.brew.sh/formula/vcfanno
version: 0.3.8
license: MIT
category: development
tags:
  - cli
description: Annotate a VCF with other VCFs/BEDs/tabixed files
source-archive: https://github.com/brentp/vcfanno/archive/refs/tags/v0.3.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vcfanno
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vcfanno
  brew: brew install vcfanno
  debian: sudo apt install vcfanno
  ubuntu: sudo apt install vcfanno
provenance:
  formula: vcfanno
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
