id: brew:oak
display-name: oak
homepage: https://oaklang.org/
repo: https://github.com/thesephist/oak
docs: https://oaklang.org/
package-manager:
  brew: oak
  nix: oak
package-manager-url: https://formulae.brew.sh/formula/oak
version: 0.3
license: MIT
category: development
tags:
  - cli
description: Expressive, simple, dynamic programming language
source-archive: https://github.com/thesephist/oak/archive/refs/tags/v0.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: oak
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oak
  brew: brew install oak
  nix: nix profile install nixpkgs#oak
provenance:
  formula: oak
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
