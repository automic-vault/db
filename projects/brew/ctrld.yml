id: brew:ctrld
display-name: ctrld
homepage: https://github.com/Control-D-Inc/ctrld
repo: https://github.com/Control-D-Inc/ctrld
docs: https://github.com/Control-D-Inc/ctrld
package-manager:
  brew: ctrld
package-manager-url: https://formulae.brew.sh/formula/ctrld
version: 1.5.1
license: MIT
category: development
tags:
  - cli
description: Highly configurable, multi-protocol DNS forwarding proxy
source-archive: https://github.com/Control-D-Inc/ctrld/archive/refs/tags/v1.5.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ctrld
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ctrld
  brew: brew install ctrld
provenance:
  formula: ctrld
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
