id: brew:sql-translator
display-name: sql-translator
homepage: https://github.com/dbsrgits/sql-translator/
repo: https://cpan.metacpan.org/authors/id/V/VE/VEESH/SQL-Translator-1.66.tar.gz
docs: https://github.com/dbsrgits/sql-translator/
package-manager:
  brew: sql-translator
  dnf: sqlt-graph
package-manager-url: https://formulae.brew.sh/formula/sql-translator
version: 1.66
license: Artistic-1.0-Perl OR GPL-1.0-or-later
category: database
tags:
  - cli
description: Manipulate structured data definitions (SQL and more)
source-archive: https://cpan.metacpan.org/authors/id/V/VE/VEESH/SQL-Translator-1.66.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: sqlt
  - exposure: global executable
    kind: cli
    name: sqlt-diagram
  - exposure: global executable
    kind: cli
    name: sqlt-diff
  - exposure: global executable
    kind: cli
    name: sqlt-diff-old
  - exposure: global executable
    kind: cli
    name: sqlt-dumper
  - exposure: global executable
    kind: cli
    name: sqlt-graph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sql-translator
  brew: brew install sql-translator
  dnf: sudo dnf install sqlt-graph
provenance:
  formula: sql-translator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
