id: brew:pgbackrest
display-name: pgbackrest
homepage: https://pgbackrest.org
repo: https://github.com/pgbackrest/pgbackrest
docs: https://pgbackrest.org
package-manager:
  apk: pgbackrest
  brew: pgbackrest
  debian: pgbackrest
  nix: pgbackrest
  pacman: pgbackrest
  ubuntu: pgbackrest
  zypper: pgbackrest
package-manager-url: https://formulae.brew.sh/formula/pgbackrest
version: 2.58.0
license: MIT
category: database
tags:
  - cli
description: Reliable PostgreSQL Backup & Restore
source-archive: https://github.com/pgbackrest/pgbackrest/archive/refs/tags/release/2.58.0.tar.gz
dependencies:
  - libpq
  - libssh2
  - libyaml
  - lz4
  - openssl@3
  - zstd
build-dependencies:
  - cmake
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - bzip2
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: pgbackrest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pgbackrest
  av: sudo av install brew:pgbackrest
  brew: brew install pgbackrest
  debian: sudo apt install pgbackrest
  nix: nix profile install nixpkgs#pgbackrest
  pacman: sudo pacman -S pgbackrest
  ubuntu: sudo apt install pgbackrest
  zypper: sudo zypper install pgbackrest
provenance:
  formula: pgbackrest
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
