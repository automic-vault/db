id: brew:boa
display-name: boa
homepage: https://github.com/boa-dev/boa
repo: https://github.com/boa-dev/boa
docs: https://github.com/boa-dev/boa
package-manager:
  brew: boa
  nix: boa
package-manager-url: https://formulae.brew.sh/formula/boa
version: 0.21.1
license: MIT OR Unlicense
category: development
tags:
  - cli
description: Embeddable and experimental Javascript engine written in Rust
source-archive: https://github.com/boa-dev/boa/archive/refs/tags/v0.21.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: boa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:boa
  brew: brew install boa
  nix: nix profile install nixpkgs#boa
provenance:
  formula: boa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
