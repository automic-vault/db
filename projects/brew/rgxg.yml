id: brew:rgxg
display-name: rgxg
homepage: https://rgxg.github.io
repo: https://github.com/rgxg/rgxg
docs: https://rgxg.github.io
package-manager:
  apk: rgxg
  brew: rgxg
  debian: rgxg
  nix: rgxg
  ubuntu: rgxg
package-manager-url: https://formulae.brew.sh/formula/rgxg
version: 0.1.2
license: Zlib
category: development
tags:
  - cli
description: C library and command-line tool to generate (extended) regular expressions
source-archive: https://github.com/rgxg/rgxg/releases/download/v0.1.2/rgxg-0.1.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: rgxg
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rgxg
  av: sudo av install brew:rgxg
  brew: brew install rgxg
  debian: sudo apt install rgxg
  nix: nix profile install nixpkgs#rgxg
  ubuntu: sudo apt install rgxg
provenance:
  formula: rgxg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
