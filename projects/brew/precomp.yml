id: brew:precomp
display-name: precomp
homepage: http://schnaader.info/precomp.php
repo: https://github.com/schnaader/precomp-cpp
docs: http://schnaader.info/precomp.php
package-manager:
  brew: precomp
package-manager-url: https://formulae.brew.sh/formula/precomp
version: 0.4.7
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line precompressor to achieve better compression
source-archive: https://github.com/schnaader/precomp-cpp/archive/refs/tags/v0.4.7.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: precomp
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:precomp
  brew: brew install precomp
provenance:
  formula: precomp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
