id: brew:emojify
display-name: emojify
homepage: https://github.com/mrowa44/emojify
repo: https://github.com/mrowa44/emojify
docs: https://github.com/mrowa44/emojify
package-manager:
  brew: emojify
  nix: emojify
package-manager-url: https://formulae.brew.sh/formula/emojify
version: 2.2.0
license: MIT
category: development
tags:
  - cli
description: Emoji on the command-line :scream:
source-archive: https://github.com/mrowa44/emojify/archive/refs/tags/2.2.0.tar.gz
dependencies:
  - bash
executables:
  - exposure: global executable
    kind: cli
    name: emojify
bottle:
