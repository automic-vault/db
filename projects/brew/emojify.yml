  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:emojify
  brew: brew install emojify
  nix: nix profile install nixpkgs#emojify
provenance:
  formula: emojify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
