id: brew:trezor-bridge
display-name: trezor-bridge
homepage: https://github.com/trezor/trezord-go
repo: https://github.com/trezor/trezord-go
docs: https://github.com/trezor/trezord-go
package-manager:
  brew: trezor-bridge
  winget: SatoshiLabs.TrezorBridge
package-manager-url: https://formulae.brew.sh/formula/trezor-bridge
version: 2.0.33
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Trezor Communication Daemon
source-archive: https://github.com/trezor/trezord-go.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: trezord-go
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:trezor-bridge
  brew: brew install trezor-bridge
  winget: winget install --id SatoshiLabs.TrezorBridge -e
provenance:
  formula: trezor-bridge
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
