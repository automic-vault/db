id: brew:d2
display-name: d2
homepage: https://d2lang.com/
repo: https://github.com/terrastruct/d2
docs: https://d2lang.com/
package-manager:
  brew: d2
  dnf: d2
  macports: d2
  nix: d2
  pacman: d2
  scoop: main/d2
  winget: Terrastruct.D2
  zypper: d2
package-manager-url: https://formulae.brew.sh/formula/d2
version: 0.7.1
license: MPL-2.0
category: development
tags:
  - cli
description: Modern diagram scripting language that turns text to diagrams
source-archive: https://github.com/terrastruct/d2/archive/refs/tags/v0.7.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: d2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:d2
  brew: brew install d2
  dnf: sudo dnf install d2
  macports: sudo port install d2
  nix: nix profile install nixpkgs#d2
  pacman: sudo pacman -S d2
  scoop: scoop install main/d2
  winget: winget install --id Terrastruct.D2 -e
  zypper: sudo zypper install d2
provenance:
  formula: d2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
