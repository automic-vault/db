id: brew:dicebear
display-name: dicebear
homepage: https://github.com/dicebear/dicebear
repo: https://registry.npmjs.org/dicebear/-/dicebear-9.4.2.tgz
docs: https://github.com/dicebear/dicebear
package-manager:
  brew: dicebear
package-manager-url: https://formulae.brew.sh/formula/dicebear
version: 9.4.2
license: MIT
category: development
tags:
  - cli
description: CLI for DiceBear - An avatar library for designers and developers
source-archive: https://registry.npmjs.org/dicebear/-/dicebear-9.4.2.tgz
dependencies:
  - gettext
  - glib
  - node
  - vips
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dicebear
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dicebear
  brew: brew install dicebear
provenance:
  formula: dicebear
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
