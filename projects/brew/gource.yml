id: brew:gource
display-name: gource
homepage: https://gource.io/
repo: https://github.com/acaudwell/Gource
docs: https://gource.io/
package-manager:
  apk: gource
  brew: gource
  debian: gource
  dnf: gource
  macports: gource
  nix: gource
  pacman: gource
  scoop: main/gource
  ubuntu: gource
  winget: acaudwell.Gource
  zypper: gource
package-manager-url: https://formulae.brew.sh/formula/gource
version: 0.56
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Version Control Visualization Tool
source-archive: https://github.com/acaudwell/Gource/releases/download/gource-0.56/gource-0.56.tar.gz
dependencies:
  - boost
  - freetype
  - glew
  - libpng
  - pcre2
  - sdl2
  - sdl2_image
build-dependencies:
  - glm
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gource
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gource
  av: sudo av install brew:gource
  brew: brew install gource
  debian: sudo apt install gource
  dnf: sudo dnf install gource
  macports: sudo port install gource
  nix: nix profile install nixpkgs#gource
  pacman: sudo pacman -S gource
  scoop: scoop install main/gource
  ubuntu: sudo apt install gource
  winget: winget install --id acaudwell.Gource -e
  zypper: sudo zypper install gource
provenance:
  formula: gource
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
