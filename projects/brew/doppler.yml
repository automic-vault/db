id: brew:doppler
display-name: doppler
homepage: https://docs.doppler.com/docs
repo: https://github.com/DopplerHQ/cli
docs: https://docs.doppler.com/docs
package-manager:
  brew: doppler
  nix: doppler
  winget: Doppler.doppler
package-manager-url: https://formulae.brew.sh/formula/doppler
version: 3.76.0
license: Apache-2.0
category: security
tags:
  - cli
description: CLI for interacting with Doppler secrets and configuration
source-archive: https://github.com/DopplerHQ/cli/archive/refs/tags/3.76.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: doppler
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:doppler
  brew: brew install doppler
  nix: nix profile install nixpkgs#doppler
  winget: winget install --id Doppler.doppler -e
provenance:
  formula: doppler
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
