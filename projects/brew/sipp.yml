id: brew:sipp
display-name: sipp
homepage: https://sipp.sourceforge.net/
repo: https://github.com/SIPp/sipp
docs: https://sipp.sourceforge.net/
package-manager:
  apk: sipp
  brew: sipp
  dnf: sipp
  nix: sipp
  zypper: sipp
package-manager-url: https://formulae.brew.sh/formula/sipp
version: 3.7.7
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Traffic generator for the SIP protocol
source-archive: https://github.com/SIPp/sipp.git
dependencies:
  - openssl@4
build-dependencies:
  - cmake
uses-from-macos:
  - libpcap
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: sipp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sipp
  av: sudo av install brew:sipp
  brew: brew install sipp
  dnf: sudo dnf install sipp
  nix: nix profile install nixpkgs#sipp
  zypper: sudo zypper install sipp
provenance:
  formula: sipp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
