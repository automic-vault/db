id: brew:ruby-lsp
display-name: ruby-lsp
homepage: https://shopify.github.io/ruby-lsp
repo: https://github.com/Shopify/ruby-lsp
docs: https://shopify.github.io/ruby-lsp
package-manager:
  brew: ruby-lsp
  nix: ruby-lsp
  pacman: ruby-lsp
package-manager-url: https://formulae.brew.sh/formula/ruby-lsp
version: 0.26.9
license: MIT
category: development
tags:
  - cli
description: Opinionated language server for Ruby
source-archive: https://github.com/Shopify/ruby-lsp/archive/refs/tags/v0.26.9.tar.gz
dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: ruby-lsp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ruby-lsp
  brew: brew install ruby-lsp
  nix: nix profile install nixpkgs#ruby-lsp
  pacman: sudo pacman -S ruby-lsp
provenance:
  formula: ruby-lsp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
