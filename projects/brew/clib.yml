id: brew:clib
display-name: clib
homepage: https://github.com/clibs/clib
repo: https://github.com/clibs/clib
docs: https://github.com/clibs/clib
package-manager:
  brew: clib
  macports: clib
  nix: clib
package-manager-url: https://formulae.brew.sh/formula/clib
version: 2.8.7
license: MIT
category: development
tags:
  - cli
description: Package manager for C programming
source-archive: https://github.com/clibs/clib/archive/refs/tags/2.8.7.tar.gz
uses-from-macos:
