    name: clib-configure
  - exposure: global executable
    kind: cli
    name: clib-init
  - exposure: global executable
    kind: cli
    name: clib-install
  - exposure: global executable
    kind: cli
    name: clib-search
  - exposure: global executable
    kind: cli
    name: clib-uninstall
  - exposure: global executable
    kind: cli
    name: clib-update
  - exposure: global executable
    kind: cli
    name: clib-upgrade
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
