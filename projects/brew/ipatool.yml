id: brew:ipatool
display-name: ipatool
homepage: https://github.com/majd/ipatool
repo: https://github.com/majd/ipatool
docs: https://github.com/majd/ipatool
package-manager:
  brew: ipatool
  macports: ipatool
  nix: ipatool
  scoop: main/ipatool
package-manager-url: https://formulae.brew.sh/formula/ipatool
version: 2.3.0
license: MIT
category: development
tags:
  - cli
description: CLI tool for searching and downloading app packages from the iOS App Store
source-archive: https://github.com/majd/ipatool/archive/refs/tags/v2.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ipatool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ipatool
  brew: brew install ipatool
  macports: sudo port install ipatool
  nix: nix profile install nixpkgs#ipatool
  scoop: scoop install main/ipatool
provenance:
  formula: ipatool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
