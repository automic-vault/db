id: brew:cfn-format
display-name: cfn-format
homepage: https://github.com/aws-cloudformation/rain
repo: https://github.com/aws-cloudformation/rain
docs: https://github.com/aws-cloudformation/rain
package-manager:
  brew: cfn-format
package-manager-url: https://formulae.brew.sh/formula/cfn-format
version: 1.24.4
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: Command-line tool for formatting AWS CloudFormation templates
source-archive: https://github.com/aws-cloudformation/rain/archive/refs/tags/v1.24.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cfn-format
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cfn-format
  brew: brew install cfn-format
provenance:
  formula: cfn-format
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
