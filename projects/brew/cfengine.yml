id: brew:cfengine
display-name: cfengine
homepage: https://cfengine.com/
repo: >
  https://cfengine-package-repos.s3.amazonaws.com/tarballs/cfengine-community-3.27.1.tar.gz
docs: https://cfengine.com/
package-manager:
  apk: cfengine
  brew: cfengine
package-manager-url: https://formulae.brew.sh/formula/cfengine
version: 3.27.1
license: BSD-3-Clause AND GPL-2.0-or-later AND GPL-3.0-only AND LGPL-2.0-or-later
category: cloud
tags:
  - cli
description: Help manage and understand IT infrastructure
source-archive: >
  https://cfengine-package-repos.s3.amazonaws.com/tarballs/cfengine-community-3.27.1.tar.gz
dependencies:
  - librsync
  - lmdb
  - openssl@3
  - pcre2
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: cf-agent
  - exposure: global executable
    kind: cli
    name: cf-check
  - exposure: global executable
    kind: cli
    name: cf-execd
  - exposure: global executable
    kind: cli
    name: cf-key
  - exposure: global executable
    kind: cli
    name: cf-monitord
  - exposure: global executable
    kind: cli
    name: cf-net
  - exposure: global executable
    kind: cli
    name: cf-promises
  - exposure: global executable
    kind: cli
    name: cf-runagent
  - exposure: global executable
    kind: cli
    name: cf-secret
  - exposure: global executable
    kind: cli
    name: cf-serverd
  - exposure: global executable
    kind: cli
    name: cf-support
  - exposure: global executable
    kind: cli
    name: cf-upgrade
  - exposure: global executable
    kind: cli
    name: rpmvercmp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add cfengine
  av: sudo av install brew:cfengine
  brew: brew install cfengine
provenance:
  formula: cfengine
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
