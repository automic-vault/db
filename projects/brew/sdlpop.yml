id: brew:sdlpop
display-name: sdlpop
homepage: https://github.com/NagyD/SDLPoP
repo: https://github.com/NagyD/SDLPoP
docs: https://github.com/NagyD/SDLPoP
package-manager:
  brew: sdlpop
  nix: sdlpop
  scoop: main/prince
  zypper: sdlpop
package-manager-url: https://formulae.brew.sh/formula/sdlpop
version: 1.23
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Open-source port of Prince of Persia
source-archive: https://github.com/NagyD/SDLPoP/archive/refs/tags/v1.23.tar.gz
dependencies:
  - sdl2
  - sdl2_image
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: prince
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Save and replay files are stored in the following directory: $HOMEBREW_PREFIX/var/sdlpop'
  post-install-defined: false
install-lines:
  av: sudo av install brew:sdlpop
  brew: brew install sdlpop
  nix: nix profile install nixpkgs#sdlpop
  scoop: scoop install main/prince
  zypper: sudo zypper install sdlpop
provenance:
  formula: sdlpop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
