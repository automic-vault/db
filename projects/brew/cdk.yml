id: brew:cdk
display-name: cdk
homepage: https://invisible-island.net/cdk/
repo: https://invisible-mirror.net/archives/cdk/cdk-5.0-20260119.tgz
docs: https://invisible-island.net/cdk/
package-manager:
  brew: cdk
  dnf: cdk
  nix: cdk
package-manager-url: https://formulae.brew.sh/formula/cdk
version: 5.0-20260119
license: X11-distribute-modifications-variant
category: network
tags:
  - cli
description: Curses development kit provides predefined curses widget for apps
source-archive: https://invisible-mirror.net/archives/cdk/cdk-5.0-20260119.tgz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cdk5-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cdk
  brew: brew install cdk
  dnf: sudo dnf install cdk
  nix: nix profile install nixpkgs#cdk
provenance:
  formula: cdk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
