id: brew:kustomize
display-name: kustomize
homepage: https://github.com/kubernetes-sigs/kustomize
repo: https://github.com/kubernetes-sigs/kustomize
docs: https://github.com/kubernetes-sigs/kustomize
package-manager:
  apk: kustomize
  brew: kustomize
  chocolatey: kustomize
  debian: kustomize
  dnf: kustomize
  macports: kustomize
  nix: kustomize
  pacman: kustomize
  scoop: main/kustomize
  winget: Kubernetes.kustomize
  zypper: kustomize
package-manager-url: https://formulae.brew.sh/formula/kustomize
version: 5.8.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
  - yaml
description: Template-free customization of Kubernetes YAML manifests
source-archive: https://github.com/kubernetes-sigs/kustomize/archive/refs/tags/kustomize/v5.8.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kustomize
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kustomize
  av: sudo av install brew:kustomize
  brew: brew install kustomize
  chocolatey: choco install kustomize
  debian: sudo apt install kustomize
  dnf: sudo dnf install kustomize
  macports: sudo port install kustomize
  nix: nix profile install nixpkgs#kustomize
  pacman: sudo pacman -S kustomize
  scoop: scoop install main/kustomize
  winget: winget install --id Kubernetes.kustomize -e
  zypper: sudo zypper install kustomize
provenance:
  formula: kustomize
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
