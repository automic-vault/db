id: brew:libgusb
display-name: libgusb
homepage: https://github.com/hughsie/libgusb
repo: https://github.com/hughsie/libgusb
docs: https://github.com/hughsie/libgusb
package-manager:
  apk: libgusb
  brew: libgusb
  dnf: libgusb
  pacman: libgusb
package-manager-url: https://formulae.brew.sh/formula/libgusb
version: 0.4.9
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: GObject wrappers for libusb1
source-archive: https://github.com/hughsie/libgusb/archive/refs/tags/0.4.9.tar.gz
dependencies:
  - glib
  - json-glib
  - libusb
  - python@3.14
  - usb.ids
build-dependencies:
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - python-setuptools
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: gusbcmd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libgusb
  av: sudo av install brew:libgusb
  brew: brew install libgusb
  dnf: sudo dnf install libgusb
  pacman: sudo pacman -S libgusb
provenance:
  formula: libgusb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
