id: brew:gci
display-name: gci
homepage: https://github.com/daixiang0/gci
repo: https://github.com/daixiang0/gci
docs: https://github.com/daixiang0/gci
package-manager:
  brew: gci
  nix: gci
package-manager-url: https://formulae.brew.sh/formula/gci
version: 0.14.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Control Golang package import order and make it always deterministic
source-archive: https://github.com/daixiang0/gci/archive/refs/tags/v0.14.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gci
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gci
  brew: brew install gci
  nix: nix profile install nixpkgs#gci
provenance:
  formula: gci
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
