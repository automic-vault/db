id: brew:libiconv
display-name: libiconv
homepage: https://www.gnu.org/software/libiconv/
repo: https://ftpmirror.gnu.org/gnu/libiconv/libiconv-1.19.tar.gz
docs: https://www.gnu.org/software/libiconv/
package-manager:
  brew: libiconv
  macports: libiconv
  nix: libiconv
  pacman: libiconv
  scoop: main/iconv
package-manager-url: https://formulae.brew.sh/formula/libiconv
version: 1.19
license: GPL-3.0-or-later AND LGPL-2.0-or-later
category: network
tags:
  - cli
description: Conversion library
source-archive: https://ftpmirror.gnu.org/gnu/libiconv/libiconv-1.19.tar.gz
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - gperf
executables:
  - exposure: global executable
    kind: cli
    name: iconv
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libiconv
  brew: brew install libiconv
  macports: sudo port install libiconv
  nix: nix profile install nixpkgs#libiconv
  pacman: sudo pacman -S libiconv
  scoop: scoop install main/iconv
provenance:
  formula: libiconv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
