id: brew:rye
display-name: rye
homepage: https://rye.astral.sh/
repo: https://github.com/astral-sh/rye
docs: https://rye.astral.sh/
package-manager:
  brew: rye
  macports: rye
  nix: rye
  scoop: main/rye
  winget: Rye.Rye
  zypper: rye
package-manager-url: https://formulae.brew.sh/formula/rye
version: 0.44.0
license: MIT
category: development
tags:
  - cli
description: Package Management Solution for Python
source-archive: https://github.com/astral-sh/rye/archive/refs/tags/0.44.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: rye
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rye
  brew: brew install rye
  macports: sudo port install rye
  nix: nix profile install nixpkgs#rye
  scoop: scoop install main/rye
  winget: winget install --id Rye.Rye -e
  zypper: sudo zypper install rye
provenance:
  formula: rye
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
