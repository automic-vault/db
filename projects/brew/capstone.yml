id: brew:capstone
display-name: capstone
homepage: https://www.capstone-engine.org/
repo: https://github.com/capstone-engine/capstone
docs: https://www.capstone-engine.org/
package-manager:
  apk: capstone
  brew: capstone
  dnf: capstone
  macports: capstone
  nix: capstone
  pacman: capstone
  scoop: main/capstone
  zypper: capstone
package-manager-url: https://formulae.brew.sh/formula/capstone
version: 5.0.8
license: BSD-3-Clause
category: development
tags:
  - cli
description: Multi-platform, multi-architecture disassembly framework
source-archive: https://github.com/capstone-engine/capstone/archive/refs/tags/5.0.8.tar.gz
dependencies:
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: cstool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add capstone
  av: sudo av install brew:capstone
  brew: brew install capstone
  dnf: sudo dnf install capstone
  macports: sudo port install capstone
  nix: nix profile install nixpkgs#capstone
  pacman: sudo pacman -S capstone
  scoop: scoop install main/capstone
  zypper: sudo zypper install capstone
provenance:
  formula: capstone
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
