id: brew:fastjar
display-name: fastjar
homepage: https://savannah.nongnu.org/projects/fastjar
repo: https://download.savannah.nongnu.org/releases/fastjar/fastjar-0.98.tar.gz
docs: https://savannah.nongnu.org/projects/fastjar
package-manager:
  apk: fastjar
  brew: fastjar
  debian: fastjar
  macports: fastjar
  nix: fastjar
  pacman: fastjar
  ubuntu: fastjar
  zypper: fastjar
package-manager-url: https://formulae.brew.sh/formula/fastjar
version: 0.98
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Implementation of Sun's jar tool
source-archive: https://download.savannah.nongnu.org/releases/fastjar/fastjar-0.98.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: fastjar
  - exposure: global executable
    kind: cli
    name: grepjar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fastjar
  av: sudo av install brew:fastjar
  brew: brew install fastjar
  debian: sudo apt install fastjar
  macports: sudo port install fastjar
  nix: nix profile install nixpkgs#fastjar
  pacman: sudo pacman -S fastjar
  ubuntu: sudo apt install fastjar
  zypper: sudo zypper install fastjar
provenance:
  formula: fastjar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
