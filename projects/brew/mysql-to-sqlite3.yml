id: brew:mysql-to-sqlite3
display-name: mysql-to-sqlite3
homepage: https://github.com/techouse/mysql-to-sqlite3
repo: >
  https://files.pythonhosted.org/packages/1e/a1/937179788587d490a94fb8968fc151d118c1b07b67c3503767b9b6b775d8/mysql_to_sqlite3-2.6.0.tar.gz
