id: brew:ios-deploy
display-name: ios-deploy
homepage: https://github.com/ios-control/ios-deploy
repo: https://github.com/ios-control/ios-deploy
docs: https://github.com/ios-control/ios-deploy
package-manager:
  brew: ios-deploy
  macports: ios-deploy
  nix: ios-deploy
package-manager-url: https://formulae.brew.sh/formula/ios-deploy
version: 1.12.2
license: GPL-3.0-or-later AND BSD-3-Clause
category: development
tags:
  - cli
description: Install and debug iPhone apps from the command-line
source-archive: https://github.com/ios-control/ios-deploy/archive/refs/tags/1.12.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ios-deploy
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ios-deploy
  brew: brew install ios-deploy
  macports: sudo port install ios-deploy
  nix: nix profile install nixpkgs#ios-deploy
provenance:
  formula: ios-deploy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
