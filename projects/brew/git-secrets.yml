id: brew:git-secrets
display-name: git-secrets
homepage: https://github.com/awslabs/git-secrets
repo: https://github.com/awslabs/git-secrets
docs: https://github.com/awslabs/git-secrets
package-manager:
  brew: git-secrets
  debian: git-secrets
  dnf: git-secrets
  nix: git-secrets
  ubuntu: git-secrets
package-manager-url: https://formulae.brew.sh/formula/git-secrets
version: 1.3.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - git
description: Prevents you from committing sensitive information to a git repo
source-archive: https://github.com/awslabs/git-secrets/archive/refs/tags/1.3.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: git-secrets
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-secrets
  brew: brew install git-secrets
  debian: sudo apt install git-secrets
  dnf: sudo dnf install git-secrets
  nix: nix profile install nixpkgs#git-secrets
  ubuntu: sudo apt install git-secrets
provenance:
  formula: git-secrets
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
