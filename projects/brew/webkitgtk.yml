id: brew:webkitgtk
display-name: webkitgtk
homepage: https://webkitgtk.org
repo: https://webkitgtk.org/releases/webkitgtk-2.52.3.tar.xz
docs: https://webkitgtk.org
package-manager:
  brew: webkitgtk
package-manager-url: https://formulae.brew.sh/formula/webkitgtk
version: 2.52.3
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GTK interface to WebKit
source-archive: https://webkitgtk.org/releases/webkitgtk-2.52.3.tar.xz
dependencies:
  - at-spi2-core
  - cairo
  - enchant
  - expat
  - fontconfig
  - freetype
  - gdk-pixbuf
  - glib
  - gstreamer
  - gtk+3
  - harfbuzz
  - icu4c@78
  - jpeg-turbo
  - jpeg-xl
  - libavif
  - libdrm
  - libepoxy
  - libgcrypt
  - libnotify
  - libpng
  - libsecret
  - libsoup
  - libtasn1
  - libwpe
  - libx11
  - libxcomposite
  - libxml2
  - libxslt
  - libxt
  - little-cms2
  - mesa
  - openjpeg
  - pango
  - sqlite
  - sysprof
  - systemd
  - wayland
  - webp
  - woff2
  - wpebackend-fdo
  - zlib-ng-compat
build-dependencies:
  - cmake
  - gettext
  - gobject-introspection
  - gperf
  - perl
  - pkgconf
  - python@3.14
  - ruby
  - unifdef
executables:
  - exposure: global executable
    kind: cli
    name: WebKitWebDriver
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:webkitgtk
  brew: brew install webkitgtk
provenance:
  formula: webkitgtk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
