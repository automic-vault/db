id: brew:cpp-peglib
display-name: cpp-peglib
homepage: https://github.com/yhirose/cpp-peglib
repo: https://github.com/yhirose/cpp-peglib
docs: https://github.com/yhirose/cpp-peglib
package-manager:
  brew: cpp-peglib
  macports: cpp-peglib
package-manager-url: https://formulae.brew.sh/formula/cpp-peglib
version: 1.10.3
license: MIT
category: development
tags:
  - cli
description: Header-only PEG (Parsing Expression Grammars) library for C++
source-archive: https://github.com/yhirose/cpp-peglib/archive/refs/tags/v1.10.3.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: peglint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cpp-peglib
  brew: brew install cpp-peglib
  macports: sudo port install cpp-peglib
provenance:
  formula: cpp-peglib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
