id: brew:run
display-name: run
homepage: https://github.com/TekWizely/run
repo: https://github.com/TekWizely/run
docs: https://github.com/TekWizely/run
package-manager:
  brew: run
  macports: run
  nix: run
  winget: Esubaalew.Run
package-manager-url: https://formulae.brew.sh/formula/run
version: 0.11.2
license: MIT
category: development
tags:
  - cli
description: Easily manage and invoke small scripts and wrappers
source-archive: https://github.com/TekWizely/run/archive/refs/tags/v0.11.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: run
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:run
  brew: brew install run
  macports: sudo port install run
  nix: nix profile install nixpkgs#run
  winget: winget install --id Esubaalew.Run -e
provenance:
  formula: run
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
