id: brew:tsshd
display-name: tsshd
homepage: https://trzsz.github.io/tsshd
repo: https://github.com/trzsz/tsshd
docs: https://trzsz.github.io/tsshd
package-manager:
  brew: tsshd
  nix: tsshd
  scoop: extras/tsshd
package-manager-url: https://formulae.brew.sh/formula/tsshd
version: 0.1.8
license: MIT
category: development
tags:
  - cli
description: UDP-based SSH server with roaming support
source-archive: https://github.com/trzsz/tsshd/archive/refs/tags/v0.1.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tsshd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tsshd
  brew: brew install tsshd
  nix: nix profile install nixpkgs#tsshd
  scoop: scoop install extras/tsshd
provenance:
  formula: tsshd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
