id: brew:rlwrap
display-name: rlwrap
homepage: https://github.com/hanslub42/rlwrap
repo: https://github.com/hanslub42/rlwrap
docs: https://github.com/hanslub42/rlwrap
package-manager:
  apk: rlwrap
  brew: rlwrap
  debian: rlwrap
  dnf: rlwrap
  macports: rlwrap
  nix: rlwrap
  pacman: rlwrap
  ubuntu: rlwrap
  zypper: rlwrap
package-manager-url: https://formulae.brew.sh/formula/rlwrap
version: 0.48
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: 'Readline wrapper: adds readline support to tools that lack it'
source-archive: https://github.com/hanslub42/rlwrap/archive/refs/tags/v0.48.tar.gz
dependencies:
  - libptytty
  - readline
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: rlwrap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rlwrap
  av: sudo av install brew:rlwrap
  brew: brew install rlwrap
  debian: sudo apt install rlwrap
  dnf: sudo dnf install rlwrap
  macports: sudo port install rlwrap
  nix: nix profile install nixpkgs#rlwrap
  pacman: sudo pacman -S rlwrap
  ubuntu: sudo apt install rlwrap
  zypper: sudo zypper install rlwrap
provenance:
  formula: rlwrap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
