id: brew:clhep
display-name: clhep
homepage: https://proj-clhep.web.cern.ch/proj-clhep/
repo: https://gitlab.cern.ch/CLHEP/CLHEP/-/archive/CLHEP_2_4_7_2/CLHEP-CLHEP_2_4_7_2.tar.gz
docs: https://proj-clhep.web.cern.ch/proj-clhep/
package-manager:
  brew: clhep
  macports: clhep
  nix: clhep
package-manager-url: https://formulae.brew.sh/formula/clhep
version: 2.4.7.2
license: GPL-3.0-only
category: development
tags:
  - cli
description: Class Library for High Energy Physics
source-archive: https://gitlab.cern.ch/CLHEP/CLHEP/-/archive/CLHEP_2_4_7_2/CLHEP-CLHEP_2_4_7_2.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: Cast-config
  - exposure: global executable
    kind: cli
    name: Evaluator-config
  - exposure: global executable
    kind: cli
    name: Exceptions-config
  - exposure: global executable
    kind: cli
    name: GenericFunctions-config
  - exposure: global executable
    kind: cli
    name: Geometry-config
  - exposure: global executable
    kind: cli
    name: Matrix-config
  - exposure: global executable
    kind: cli
    name: Random-config
  - exposure: global executable
    kind: cli
    name: RandomObjects-config
  - exposure: global executable
    kind: cli
    name: RefCount-config
  - exposure: global executable
    kind: cli
    name: Units-config
  - exposure: global executable
    kind: cli
    name: Utility-config
  - exposure: global executable
    kind: cli
    name: Vector-config
  - exposure: global executable
    kind: cli
    name: clhep-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clhep
  brew: brew install clhep
  macports: sudo port install clhep
  nix: nix profile install nixpkgs#clhep
provenance:
  formula: clhep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
