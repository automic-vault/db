id: brew:i2util
display-name: i2util
homepage: https://github.com/perfsonar/i2util
repo: https://github.com/perfsonar/i2util
docs: https://github.com/perfsonar/i2util
package-manager:
  apk: i2util
  brew: i2util
package-manager-url: https://formulae.brew.sh/formula/i2util
version: 5.2.5
license: Apache-2.0
category: development
tags:
  - cli
description: Internet2 utility tools
source-archive: https://github.com/perfsonar/i2util/archive/refs/tags/v5.2.5.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: aespasswd
  - exposure: global executable
    kind: cli
    name: pfstore
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add i2util
  av: sudo av install brew:i2util
  brew: brew install i2util
provenance:
  formula: i2util
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
