id: brew:groonga
display-name: groonga
homepage: https://groonga.org/
repo: https://github.com/groonga/groonga
docs: https://groonga.org/
package-manager:
  brew: groonga
  debian: groonga
  dnf: groonga
  macports: groonga
  nix: groonga
  ubuntu: groonga
package-manager-url: https://formulae.brew.sh/formula/groonga
version: 16.0.5
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Fulltext search engine and column store
source-archive: https://github.com/groonga/groonga/releases/download/v16.0.5/groonga-16.0.5.tar.gz
dependencies:
  - lz4
  - mecab
  - mecab-ipadic
  - msgpack
  - onigmo
  - simdjson
  - zstd
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: groonga
  - exposure: global executable
    kind: cli
    name: groonga-suggest-create-dataset
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:groonga
  brew: brew install groonga
  debian: sudo apt install groonga
  dnf: sudo dnf install groonga
  macports: sudo port install groonga
  nix: nix profile install nixpkgs#groonga
  ubuntu: sudo apt install groonga
provenance:
  formula: groonga
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
