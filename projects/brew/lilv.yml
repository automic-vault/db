id: brew:lilv
display-name: lilv
homepage: https://drobilla.net/software/lilv.html
repo: https://download.drobilla.net/lilv-0.26.4.tar.xz
docs: https://drobilla.net/software/lilv.html
package-manager:
  apk: lilv
  brew: lilv
  dnf: lilv
  macports: lilv
  nix: lilv
  pacman: lilv
  zypper: lilv
package-manager-url: https://formulae.brew.sh/formula/lilv
version: 0.26.4
license: ISC
category: network
tags:
  - cli
description: C library to use LV2 plugins
source-archive: https://download.drobilla.net/lilv-0.26.4.tar.xz
dependencies:
  - libsndfile
  - lv2
  - serd
  - sord
  - sratom
  - zix
build-dependencies:
  - meson
  - ninja
  - pkgconf
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: lv2apply
  - exposure: global executable
    kind: cli
    name: lv2bench
  - exposure: global executable
    kind: cli
    name: lv2info
  - exposure: global executable
    kind: cli
    name: lv2ls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lilv
  av: sudo av install brew:lilv
  brew: brew install lilv
  dnf: sudo dnf install lilv
  macports: sudo port install lilv
  nix: nix profile install nixpkgs#lilv
  pacman: sudo pacman -S lilv
  zypper: sudo zypper install lilv
provenance:
  formula: lilv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
