id: brew:infisical
display-name: infisical
homepage: https://infisical.com/docs/cli/overview
repo: https://github.com/Infisical/cli
docs: https://infisical.com/docs/cli/overview
package-manager:
  brew: infisical
  macports: infisical
  nix: infisical
  winget: infisical.infisical
package-manager-url: https://formulae.brew.sh/formula/infisical
version: 0.43.87
license: MIT
category: development
tags:
  - cli
description: CLI for Infisical
source-archive: https://github.com/Infisical/cli/archive/refs/tags/v0.43.87.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: infisical
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:infisical
  brew: brew install infisical
  macports: sudo port install infisical
  nix: nix profile install nixpkgs#infisical
  winget: winget install --id infisical.infisical -e
provenance:
  formula: infisical
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
