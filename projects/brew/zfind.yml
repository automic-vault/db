id: brew:zfind
display-name: zfind
homepage: https://github.com/laktak/zfind
repo: https://github.com/laktak/zfind
docs: https://github.com/laktak/zfind
package-manager:
  brew: zfind
  nix: zfind
package-manager-url: https://formulae.brew.sh/formula/zfind
version: 0.4.7
license: MIT
category: database
tags:
  - cli
description: Search for files (even inside tar/zip/7z/rar) using a SQL-WHERE filter
source-archive: https://github.com/laktak/zfind/archive/refs/tags/v0.4.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: zfind
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zfind
  brew: brew install zfind
  nix: nix profile install nixpkgs#zfind
provenance:
  formula: zfind
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
