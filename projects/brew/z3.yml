id: brew:z3
display-name: z3
homepage: https://github.com/Z3Prover/z3
repo: https://github.com/Z3Prover/z3
docs: https://github.com/Z3Prover/z3
package-manager:
  apk: z3
  brew: z3
  debian: z3
  dnf: z3
  macports: z3
  nix: z3
  pacman: z3
  scoop: main/z3
  ubuntu: z3
  zypper: z3
package-manager-url: https://formulae.brew.sh/formula/z3
version: 4.15.4
license: MIT
category: development
tags:
  - cli
description: High-performance theorem prover
source-archive: https://github.com/Z3Prover/z3/archive/refs/tags/z3-4.15.4.tar.gz
build-dependencies:
  - cmake
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: qprofdiff
  - exposure: global executable
    kind: cli
    name: z3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add z3
  av: sudo av install brew:z3
  brew: brew install z3
  debian: sudo apt install z3
  dnf: sudo dnf install z3
  macports: sudo port install z3
  nix: nix profile install nixpkgs#z3
  pacman: sudo pacman -S z3
  scoop: scoop install main/z3
  ubuntu: sudo apt install z3
  zypper: sudo zypper install z3
provenance:
  formula: z3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
