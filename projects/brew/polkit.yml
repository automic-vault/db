id: brew:polkit
display-name: polkit
homepage: https://github.com/polkit-org/polkit
repo: https://github.com/polkit-org/polkit
docs: https://github.com/polkit-org/polkit
package-manager:
  apk: polkit
  brew: polkit
  debian: pkexec
  dnf: polkit
  nix: polkit
  pacman: polkit
  ubuntu: pkexec
  zypper: polkit
package-manager-url: https://formulae.brew.sh/formula/polkit
version: 127
license: LGPL-2.0-or-later
category: development
tags:
  - cli
description: Toolkit for defining and handling authorizations
source-archive: https://github.com/polkit-org/polkit/archive/refs/tags/127.tar.gz
dependencies:
  - duktape
  - gettext
  - glib
build-dependencies:
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: pkaction
  - exposure: global executable
    kind: cli
    name: pkcheck
  - exposure: global executable
    kind: cli
    name: pkexec
  - exposure: global executable
    kind: cli
    name: pkttyagent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add polkit
  av: sudo av install brew:polkit
  brew: brew install polkit
  debian: sudo apt install pkexec
  dnf: sudo dnf install polkit
  nix: nix profile install nixpkgs#polkit
  pacman: sudo pacman -S polkit
  ubuntu: sudo apt install pkexec
  zypper: sudo zypper install polkit
provenance:
  formula: polkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
