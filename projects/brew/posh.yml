install-lines:
  av: sudo av install brew:posh
  brew: brew install posh
  debian: sudo apt install posh
  macports: sudo port install posh
  ubuntu: sudo apt install posh
provenance:
  formula: posh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
