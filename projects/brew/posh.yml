id: brew:posh
display-name: posh
homepage: https://salsa.debian.org/clint/posh
repo: https://salsa.debian.org/clint/posh/-/archive/debian/0.14.5/posh-debian-0.14.5.tar.bz2
docs: https://salsa.debian.org/clint/posh
package-manager:
  brew: posh
  debian: posh
  macports: posh
  ubuntu: posh
package-manager-url: https://formulae.brew.sh/formula/posh
version: 0.14.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Policy-compliant ordinary shell
source-archive: https://salsa.debian.org/clint/posh/-/archive/debian/0.14.5/posh-debian-0.14.5.tar.bz2
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: posh
bottle:
