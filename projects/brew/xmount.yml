id: brew:xmount
display-name: xmount
homepage: https://www.sits.lu/xmount
repo: https://code.sits.lu/foss/xmount/-/archive/1.3.1/xmount-1.3.1.tar.bz2
docs: https://www.sits.lu/xmount
package-manager:
  brew: xmount
  debian: xmount
  dnf: xmount
  ubuntu: xmount
package-manager-url: https://formulae.brew.sh/formula/xmount
version: 1.3.1
license: GPL-3.0-or-later
category: media
tags:
  - cli
description: Convert between multiple input & output disk image types
source-archive: https://code.sits.lu/foss/xmount/-/archive/1.3.1/xmount-1.3.1.tar.bz2
dependencies:
  - afflib
  - libewf
  - libfuse
  - zlib-ng-compat
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xmount
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xmount
  brew: brew install xmount
  debian: sudo apt install xmount
  dnf: sudo dnf install xmount
  ubuntu: sudo apt install xmount
provenance:
  formula: xmount
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
