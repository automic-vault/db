id: brew:kyoto-tycoon
display-name: kyoto-tycoon
homepage: https://dbmx.net/kyototycoon/
repo: https://dbmx.net/kyototycoon/pkg/kyototycoon-0.9.56.tar.gz
docs: https://dbmx.net/kyototycoon/
package-manager:
  brew: kyoto-tycoon
package-manager-url: https://formulae.brew.sh/formula/kyoto-tycoon
version: 0.9.56
license: GPL-3.0-or-later
category: database
tags:
  - cli
  - database
description: Database server with interface to Kyoto Cabinet
source-archive: https://dbmx.net/kyototycoon/pkg/kyototycoon-0.9.56.tar.gz
dependencies:
  - kyoto-cabinet
build-dependencies:
  - lua
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ktremotemgr
  - exposure: global executable
    kind: cli
    name: ktremotetest
  - exposure: global executable
    kind: cli
    name: ktserver
  - exposure: global executable
    kind: cli
    name: kttimedmgr
  - exposure: global executable
    kind: cli
    name: kttimedtest
  - exposure: global executable
    kind: cli
    name: ktutilmgr
  - exposure: global executable
    kind: cli
    name: ktutilserv
  - exposure: global executable
    kind: cli
    name: ktutiltest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kyoto-tycoon
  brew: brew install kyoto-tycoon
provenance:
  formula: kyoto-tycoon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
