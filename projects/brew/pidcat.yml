id: brew:pidcat
display-name: pidcat
homepage: https://github.com/JakeWharton/pidcat
repo: https://github.com/JakeWharton/pidcat
docs: https://github.com/JakeWharton/pidcat
package-manager:
  brew: pidcat
  debian: pidcat
  ubuntu: pidcat
  winget: AbdElMoniemElHifnawy.PidCat
package-manager-url: https://formulae.brew.sh/formula/pidcat
version: 2.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: Colored logcat script to show entries only for specified app
source-archive: https://github.com/JakeWharton/pidcat/archive/refs/tags/2.1.0.tar.gz
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: pidcat
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pidcat
  brew: brew install pidcat
  debian: sudo apt install pidcat
  ubuntu: sudo apt install pidcat
  winget: winget install --id AbdElMoniemElHifnawy.PidCat -e
provenance:
  formula: pidcat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
