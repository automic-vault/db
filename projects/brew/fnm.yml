id: brew:fnm
display-name: fnm
homepage: https://github.com/Schniz/fnm
repo: https://github.com/Schniz/fnm
docs: https://github.com/Schniz/fnm
package-manager:
  apk: fnm
  brew: fnm
  chocolatey: fnm
  macports: fnm
  nix: fnm
  pacman: fnm
  scoop: main/fnm
  winget: Schniz.fnm
  zypper: fnm
package-manager-url: https://formulae.brew.sh/formula/fnm
version: 1.39.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Fast and simple Node.js version manager
source-archive: https://github.com/Schniz/fnm/archive/refs/tags/v1.39.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fnm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fnm
  av: sudo av install brew:fnm
  brew: brew install fnm
  chocolatey: choco install fnm
  macports: sudo port install fnm
  nix: nix profile install nixpkgs#fnm
  pacman: sudo pacman -S fnm
  scoop: scoop install main/fnm
  winget: winget install --id Schniz.fnm -e
  zypper: sudo zypper install fnm
provenance:
  formula: fnm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
