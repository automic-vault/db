id: brew:cargo-outdated
display-name: cargo-outdated
homepage: https://github.com/kbknapp/cargo-outdated
repo: https://github.com/kbknapp/cargo-outdated
docs: https://github.com/kbknapp/cargo-outdated
package-manager:
  apk: cargo-outdated
  brew: cargo-outdated
  debian: cargo-outdated
  nix: cargo-outdated
  pacman: cargo-outdated
  ubuntu: cargo-outdated
package-manager-url: https://formulae.brew.sh/formula/cargo-outdated
version: 0.19.0
license: MIT
category: development
tags:
  - cli
description: Cargo subcommand for displaying when Rust dependencies are out of date
source-archive: https://github.com/kbknapp/cargo-outdated/archive/refs/tags/v0.19.0.tar.gz
dependencies:
  - libgit2
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-outdated
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-outdated
  av: sudo av install brew:cargo-outdated
  brew: brew install cargo-outdated
  debian: sudo apt install cargo-outdated
  nix: nix profile install nixpkgs#cargo-outdated
  pacman: sudo pacman -S cargo-outdated
  ubuntu: sudo apt install cargo-outdated
provenance:
  formula: cargo-outdated
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
