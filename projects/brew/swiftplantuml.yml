id: brew:swiftplantuml
display-name: swiftplantuml
homepage: https://marcoeidinger.github.io/SwiftPlantUML/
repo: https://github.com/MarcoEidinger/SwiftPlantUML
docs: https://marcoeidinger.github.io/SwiftPlantUML/
package-manager:
  brew: swiftplantuml
package-manager-url: https://formulae.brew.sh/formula/swiftplantuml
version: 0.8.1
license: MIT
category: development
tags:
  - cli
description: Generate UML class diagrams from Swift sources
source-archive: https://github.com/MarcoEidinger/SwiftPlantUML/archive/refs/tags/0.8.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: swiftplantuml
bottle:
  available: true
  platforms:
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swiftplantuml
  brew: brew install swiftplantuml
provenance:
  formula: swiftplantuml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
