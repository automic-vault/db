id: brew:ddcutil
display-name: ddcutil
homepage: https://www.ddcutil.com
repo: https://www.ddcutil.com/tarballs/ddcutil-2.2.7.tar.gz
docs: https://www.ddcutil.com
package-manager:
  apk: ddcutil
  brew: ddcutil
  debian: ddcutil
  dnf: ddcutil
  nix: ddcutil
  pacman: ddcutil
  ubuntu: ddcutil
  zypper: ddcutil
package-manager-url: https://formulae.brew.sh/formula/ddcutil
version: 2.2.7
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Control monitor settings using DDC/CI and USB
source-archive: https://www.ddcutil.com/tarballs/ddcutil-2.2.7.tar.gz
dependencies:
  - acl
  - dbus
  - glib
  - i2c-tools
  - jansson
  - kmod
  - libdrm
  - libusb
  - libx11
  - libxext
  - libxrandr
  - systemd
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ddcutil
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ddcutil
  av: sudo av install brew:ddcutil
  brew: brew install ddcutil
  debian: sudo apt install ddcutil
  dnf: sudo dnf install ddcutil
  nix: nix profile install nixpkgs#ddcutil
  pacman: sudo pacman -S ddcutil
  ubuntu: sudo apt install ddcutil
  zypper: sudo zypper install ddcutil
provenance:
  formula: ddcutil
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
