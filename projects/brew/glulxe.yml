id: brew:glulxe
display-name: glulxe
homepage: https://www.eblong.com/zarf/glulx/
repo: https://eblong.com/zarf/glulx/glulxe-061.tar.gz
docs: https://www.eblong.com/zarf/glulx/
package-manager:
