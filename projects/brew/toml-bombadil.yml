id: brew:toml-bombadil
display-name: toml-bombadil
homepage: https://github.com/oknozor/toml-bombadil
repo: https://github.com/oknozor/toml-bombadil
docs: https://github.com/oknozor/toml-bombadil
package-manager:
  brew: toml-bombadil
  pacman: toml-bombadil
package-manager-url: https://formulae.brew.sh/formula/toml-bombadil
version: 4.2.0
license: MIT
category: development
tags:
  - cli
description: Dotfile manager with templating
source-archive: https://github.com/oknozor/toml-bombadil/archive/refs/tags/4.2.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bombadil
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:toml-bombadil
  brew: brew install toml-bombadil
  pacman: sudo pacman -S toml-bombadil
provenance:
  formula: toml-bombadil
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
