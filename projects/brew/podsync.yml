id: brew:podsync
display-name: podsync
homepage: https://github.com/mxpv/podsync
repo: https://github.com/mxpv/podsync
docs: https://github.com/mxpv/podsync
package-manager:
  brew: podsync
package-manager-url: https://formulae.brew.sh/formula/podsync
version: 2.8.0
license: MIT
category: development
tags:
  - cli
description: Turn YouTube or Vimeo channels, users, or playlists into podcast feeds
source-archive: https://github.com/mxpv/podsync/archive/refs/tags/v2.8.0.tar.gz
dependencies:
  - ffmpeg
  - yt-dlp
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: podsync
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:podsync
  brew: brew install podsync
provenance:
  formula: podsync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
