id: brew:ncnn
display-name: ncnn
homepage: https://github.com/Tencent/ncnn
repo: https://github.com/Tencent/ncnn
docs: https://github.com/Tencent/ncnn
package-manager:
  brew: ncnn
  dnf: ncnn
  nix: ncnn
  pacman: ncnn
  zypper: ncnn
package-manager-url: https://formulae.brew.sh/formula/ncnn
version: 20260526
license: BSD-3-Clause
category: development
tags:
  - cli
description: High-performance neural network inference framework
source-archive: https://github.com/Tencent/ncnn/archive/refs/tags/20260526.tar.gz
dependencies:
  - abseil
  - glslang
  - libomp
  - molten-vk
  - protobuf
  - spirv-tools
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: caffe2ncnn
  - exposure: global executable
    kind: cli
    name: darknet2ncnn
  - exposure: global executable
    kind: cli
    name: mxnet2ncnn
  - exposure: global executable
    kind: cli
    name: ncnn2int8
  - exposure: global executable
    kind: cli
    name: ncnn2mem
  - exposure: global executable
    kind: cli
    name: ncnn2table
  - exposure: global executable
    kind: cli
    name: ncnnmerge
  - exposure: global executable
    kind: cli
    name: ncnnoptimize
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ncnn
  brew: brew install ncnn
  dnf: sudo dnf install ncnn
  nix: nix profile install nixpkgs#ncnn
  pacman: sudo pacman -S ncnn
  zypper: sudo zypper install ncnn
provenance:
  formula: ncnn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
