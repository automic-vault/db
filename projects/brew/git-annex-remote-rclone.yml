id: brew:git-annex-remote-rclone
display-name: git-annex-remote-rclone
homepage: https://github.com/git-annex-remote-rclone/git-annex-remote-rclone
repo: https://github.com/git-annex-remote-rclone/git-annex-remote-rclone
docs: https://github.com/git-annex-remote-rclone/git-annex-remote-rclone
