id: brew:cai
display-name: cai
homepage: https://github.com/ad-si/cai
repo: https://github.com/ad-si/cai
docs: https://github.com/ad-si/cai
package-manager:
  brew: cai
package-manager-url: https://formulae.brew.sh/formula/cai
version: 0.13.0
license: ISC
category: development
tags:
  - cli
description: CLI tool for prompting LLMs
source-archive: https://github.com/ad-si/cai/archive/refs/tags/v0.13.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cai
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cai
  brew: brew install cai
provenance:
  formula: cai
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
