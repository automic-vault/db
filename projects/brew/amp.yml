id: brew:amp
display-name: amp
homepage: https://amp.rs
repo: https://github.com/jmacdonald/amp
docs: https://amp.rs
package-manager:
  brew: amp
  macports: amp
  nix: amp
  zypper: amp
package-manager-url: https://formulae.brew.sh/formula/amp
version: 0.7.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Text editor for your terminal
source-archive: https://github.com/jmacdonald/amp/archive/refs/tags/0.7.1.tar.gz
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: amp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:amp
  brew: brew install amp
  macports: sudo port install amp
  nix: nix profile install nixpkgs#amp
  zypper: sudo zypper install amp
provenance:
  formula: amp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
