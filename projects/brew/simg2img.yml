id: brew:simg2img
display-name: simg2img
homepage: https://github.com/anestisb/android-simg2img
repo: https://github.com/anestisb/android-simg2img
docs: https://github.com/anestisb/android-simg2img
package-manager:
  brew: simg2img
  macports: simg2img
  nix: simg2img
package-manager-url: https://formulae.brew.sh/formula/simg2img
version: 1.1.5
license: Apache-2.0
category: development
tags:
  - cli
description: Tool to convert Android sparse images to raw images and back
source-archive: https://github.com/anestisb/android-simg2img/archive/refs/tags/1.1.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: append2simg
  - exposure: global executable
    kind: cli
    name: img2simg
  - exposure: global executable
    kind: cli
    name: simg2img
  - exposure: global executable
    kind: cli
    name: simg2simg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:simg2img
  brew: brew install simg2img
  macports: sudo port install simg2img
  nix: nix profile install nixpkgs#simg2img
provenance:
  formula: simg2img
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
