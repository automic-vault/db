id: brew:vineflower
display-name: vineflower
homepage: https://vineflower.org/
repo: https://github.com/Vineflower/vineflower
docs: https://vineflower.org/
package-manager:
  brew: vineflower
package-manager-url: https://formulae.brew.sh/formula/vineflower
version: 1.12.0
license: Apache-2.0
category: development
tags:
  - cli
description: Java decompiler
source-archive: https://github.com/Vineflower/vineflower/archive/refs/tags/1.12.0.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - gradle@8
executables:
  - exposure: global executable
    kind: cli
    name: vineflower
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vineflower
  brew: brew install vineflower
provenance:
  formula: vineflower
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
