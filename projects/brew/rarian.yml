install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rarian
  av: sudo av install brew:rarian
  brew: brew install rarian
  dnf: sudo dnf install rarian
  macports: sudo port install rarian
provenance:
  formula: rarian
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
