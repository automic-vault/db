id: brew:darcs
display-name: darcs
homepage: https://darcs.net/
repo: https://hackage.haskell.org/package/darcs-2.18.5/darcs-2.18.5.tar.gz
docs: https://darcs.net/
package-manager:
  apk: darcs
  brew: darcs
  debian: darcs
  dnf: darcs
  macports: darcs
  nix: darcs
  pacman: darcs
package-manager-url: https://formulae.brew.sh/formula/darcs
version: 2.18.5
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Distributed version control system that tracks changes, via Haskell
source-archive: https://hackage.haskell.org/package/darcs-2.18.5/darcs-2.18.5.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: darcs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add darcs
  av: sudo av install brew:darcs
  brew: brew install darcs
  debian: sudo apt install darcs
  dnf: sudo dnf install darcs
  macports: sudo port install darcs
  nix: nix profile install nixpkgs#darcs
  pacman: sudo pacman -S darcs
provenance:
  formula: darcs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
