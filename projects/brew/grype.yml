id: brew:grype
display-name: grype
homepage: https://github.com/anchore/grype
repo: https://github.com/anchore/grype
docs: https://github.com/anchore/grype
package-manager:
  apk: grype
  brew: grype
  chocolatey: grype
  macports: grype
  nix: grype
  scoop: main/grype
  winget: Anchore.Grype
  zypper: grype
package-manager-url: https://formulae.brew.sh/formula/grype
version: 0.112.0
license: Apache-2.0
category: development
tags:
  - cli
description: Vulnerability scanner for container images and filesystems
source-archive: https://github.com/anchore/grype/archive/refs/tags/v0.112.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: grype
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add grype
  av: sudo av install brew:grype
  brew: brew install grype
  chocolatey: choco install grype
  macports: sudo port install grype
  nix: nix profile install nixpkgs#grype
  scoop: scoop install main/grype
  winget: winget install --id Anchore.Grype -e
  zypper: sudo zypper install grype
provenance:
  formula: grype
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
