id: brew:astra
display-name: astra
homepage: https://docs.datastax.com/en/astra-cli
repo: https://github.com/datastax/astra-cli
docs: https://docs.datastax.com/en/astra-cli
package-manager:
  brew: astra
  winget: Boof2015.Astra
package-manager-url: https://formulae.brew.sh/formula/astra
version: 1.0.4
license: Apache-2.0
category: development
tags:
  - cli
description: Command-Line Interface for DataStax Astra
source-archive: https://github.com/datastax/astra-cli/archive/refs/tags/v1.0.4.tar.gz
build-dependencies:
  - graalvm
  - gradle
executables:
  - exposure: global executable
    kind: cli
    name: astra
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:astra
  brew: brew install astra
  winget: winget install --id Boof2015.Astra -e
provenance:
  formula: astra
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
