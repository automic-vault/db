id: brew:rosa-cli
display-name: rosa-cli
homepage: https://www.openshift.com/products/amazon-openshift
repo: https://github.com/openshift/rosa
docs: https://www.openshift.com/products/amazon-openshift
package-manager:
  brew: rosa-cli
  nix: rosa
package-manager-url: https://formulae.brew.sh/formula/rosa-cli
version: 1.2.63
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: RedHat OpenShift Service on AWS (ROSA) command-line interface
source-archive: https://github.com/openshift/rosa/archive/refs/tags/v1.2.63.tar.gz
dependencies:
  - awscli
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rosa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rosa-cli
  brew: brew install rosa-cli
  nix: nix profile install nixpkgs#rosa
provenance:
  formula: rosa-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
