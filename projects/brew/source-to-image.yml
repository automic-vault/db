id: brew:source-to-image
display-name: source-to-image
homepage: https://github.com/openshift/source-to-image
repo: https://github.com/openshift/source-to-image
docs: https://github.com/openshift/source-to-image
package-manager:
  brew: source-to-image
  dnf: source-to-image
package-manager-url: https://formulae.brew.sh/formula/source-to-image
version: 1.6.1
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: Tool for building source and injecting into docker images
source-archive: https://github.com/openshift/source-to-image.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: s2i
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:source-to-image
  brew: brew install source-to-image
  dnf: sudo dnf install source-to-image
provenance:
  formula: source-to-image
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
