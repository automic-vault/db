id: brew:rpm
display-name: rpm
homepage: https://rpm.org/
repo: https://github.com/rpm-software-management/rpm
docs: https://rpm.org/
package-manager:
  apk: rpm
  brew: rpm
  debian: rpm
  dnf: rpm
  macports: rpm
  nix: rpm
  ubuntu: rpm
  zypper: rpm
package-manager-url: https://formulae.brew.sh/formula/rpm
version: 4.20.1
license: GPL-2.0-or-later AND LGPL-2.0-or-later
category: development
tags:
  - cli
description: Standard unix software packaging tool
source-archive: >
  https://github.com/rpm-software-management/rpm/releases/download/rpm-4.20.1-release/rpm-4.20.1.tar.bz2
dependencies:
  - gettext
  - libarchive
  - libmagic
  - libomp
  - lua
  - openssl@3
  - pkgconf
  - popt
  - readline
  - sqlite
  - xz
  - zstd
build-dependencies:
  - cmake
  - gettext
  - python@3.14
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: gendiff
  - exposure: global executable
    kind: cli
    name: rpm
  - exposure: global executable
    kind: cli
    name: rpm2archive
  - exposure: global executable
    kind: cli
    name: rpm2cpio
  - exposure: global executable
    kind: cli
    name: rpmbuild
  - exposure: global executable
    kind: cli
    name: rpmdb
  - exposure: global executable
    kind: cli
    name: rpmgraph
  - exposure: global executable
    kind: cli
    name: rpmkeys
  - exposure: global executable
    kind: cli
    name: rpmlua
  - exposure: global executable
    kind: cli
    name: rpmquery
  - exposure: global executable
    kind: cli
    name: rpmsign
  - exposure: global executable
    kind: cli
    name: rpmsort
  - exposure: global executable
    kind: cli
    name: rpmspec
  - exposure: global executable
    kind: cli
    name: rpmverify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add rpm
  av: sudo av install brew:rpm
  brew: brew install rpm
  debian: sudo apt install rpm
  dnf: sudo dnf install rpm
  macports: sudo port install rpm
  nix: nix profile install nixpkgs#rpm
  ubuntu: sudo apt install rpm
  zypper: sudo zypper install rpm
provenance:
  formula: rpm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
