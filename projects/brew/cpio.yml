id: brew:cpio
display-name: cpio
homepage: https://www.gnu.org/software/cpio/
repo: https://ftpmirror.gnu.org/gnu/cpio/cpio-2.15.tar.bz2
docs: https://www.gnu.org/software/cpio/
package-manager:
  apk: cpio
  brew: cpio
  debian: cpio
  dnf: cpio
  macports: cpio
  nix: cpio
  pacman: cpio
  ubuntu: cpio
  winget: GnuWin32.Cpio
  zypper: cpio
package-manager-url: https://formulae.brew.sh/formula/cpio
version: 2.15
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Copies files into or out of a cpio or tar archive
source-archive: https://ftpmirror.gnu.org/gnu/cpio/cpio-2.15.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: cpio
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cpio
  av: sudo av install brew:cpio
  brew: brew install cpio
  debian: sudo apt install cpio
  dnf: sudo dnf install cpio
  macports: sudo port install cpio
  nix: nix profile install nixpkgs#cpio
  pacman: sudo pacman -S cpio
  ubuntu: sudo apt install cpio
  winget: winget install --id GnuWin32.Cpio -e
  zypper: sudo zypper install cpio
provenance:
  formula: cpio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
