    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mailcheck
  brew: brew install mailcheck
  debian: sudo apt install mailcheck
  nix: nix profile install nixpkgs#mailcheck
  ubuntu: sudo apt install mailcheck
provenance:
  formula: mailcheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
