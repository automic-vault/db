id: brew:mailcheck
display-name: mailcheck
homepage: https://mailcheck.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/mailcheck/mailcheck/1.91.2/mailcheck_1.91.2.tar.gz
docs: https://mailcheck.sourceforge.net/
package-manager:
  brew: mailcheck
  debian: mailcheck
