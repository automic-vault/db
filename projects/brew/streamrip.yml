id: brew:streamrip
display-name: streamrip
homepage: https://github.com/nathom/streamrip
repo: >
  https://files.pythonhosted.org/packages/b8/c9/6997772e0217f3081e4e692c7b8b104aaa564c008f2593341e81bbbd2396/streamrip-2.1.0.tar.gz
docs: https://github.com/nathom/streamrip
package-manager:
  brew: streamrip
  nix: streamrip
  scoop: main/rip
package-manager-url: https://formulae.brew.sh/formula/streamrip
version: 2.1.0
license: GPL-3.0-only
category: cloud
tags:
  - cli
description: Scriptable music downloader for Qobuz, Tidal, SoundCloud, and Deezer
source-archive: >
  https://files.pythonhosted.org/packages/b8/c9/6997772e0217f3081e4e692c7b8b104aaa564c008f2593341e81bbbd2396/streamrip-2.1.0.tar.gz
dependencies:
  - certifi
  - cffi
  - ffmpeg
  - pillow
  - python@3.14
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: rip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:streamrip
  brew: brew install streamrip
  nix: nix profile install nixpkgs#streamrip
  scoop: scoop install main/rip
provenance:
  formula: streamrip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
