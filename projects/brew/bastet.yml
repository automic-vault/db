id: brew:bastet
display-name: bastet
homepage: https://fph.altervista.org/prog/bastet.html
repo: https://github.com/fph/bastet
docs: https://fph.altervista.org/prog/bastet.html
package-manager:
  brew: bastet
  debian: bastet
  dnf: bastet
  macports: bastet
