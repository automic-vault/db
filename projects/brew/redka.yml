id: brew:redka
display-name: redka
homepage: https://github.com/nalgeon/redka
repo: https://github.com/nalgeon/redka
docs: https://github.com/nalgeon/redka
package-manager:
  brew: redka
  macports: redka
  nix: redka
package-manager-url: https://formulae.brew.sh/formula/redka
version: 1.0.1
license: BSD-3-Clause
category: database
tags:
  - cli
description: Redis re-implemented with SQLite
source-archive: https://github.com/nalgeon/redka/archive/refs/tags/v1.0.1.tar.gz
build-dependencies:
  - go
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: redka
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:redka
  brew: brew install redka
  macports: sudo port install redka
  nix: nix profile install nixpkgs#redka
provenance:
  formula: redka
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
