id: brew:sdl2
display-name: sdl2
homepage: https://www.libsdl.org/
repo: https://github.com/libsdl-org/SDL
docs: https://www.libsdl.org/
package-manager:
  apk: sdl2
  brew: sdl2
  nix: SDL2
  scoop: extras/sdl2
  zypper: SDL2
package-manager-url: https://formulae.brew.sh/formula/sdl2
version: 2.32.10
license: Zlib
category: development
tags:
  - cli
description: Low-level access to audio, keyboard, mouse, joystick, and graphics
source-archive: https://github.com/libsdl-org/SDL/releases/download/release-2.32.10/SDL2-2.32.10.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: sdl2-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sdl2
  av: sudo av install brew:sdl2
  brew: brew install sdl2
  nix: nix profile install nixpkgs#SDL2
  scoop: scoop install extras/sdl2
  zypper: sudo zypper install SDL2
provenance:
  formula: sdl2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
