id: brew:geos
display-name: geos
homepage: https://libgeos.org/
repo: https://download.osgeo.org/geos/geos-3.14.1.tar.bz2
docs: https://libgeos.org/
package-manager:
  apk: geos
  brew: geos
  dnf: geos
  macports: geos
  nix: geos
  pacman: geos
  zypper: geos
package-manager-url: https://formulae.brew.sh/formula/geos
version: 3.14.1
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Geometry Engine
source-archive: https://download.osgeo.org/geos/geos-3.14.1.tar.bz2
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: geos-config
  - exposure: global executable
    kind: cli
    name: geosop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add geos
  av: sudo av install brew:geos
  brew: brew install geos
  dnf: sudo dnf install geos
  macports: sudo port install geos
  nix: nix profile install nixpkgs#geos
  pacman: sudo pacman -S geos
  zypper: sudo zypper install geos
provenance:
  formula: geos
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
