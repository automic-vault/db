id: brew:xdot
display-name: xdot
homepage: https://github.com/jrfonseca/xdot.py
repo: >
  https://files.pythonhosted.org/packages/32/68/13f80d47bffda03eaf05bd076d1b2ef9a1cf39b461b37e32f303bcf048de/xdot-1.6.tar.gz
docs: https://github.com/jrfonseca/xdot.py
package-manager:
  brew: xdot
  debian: xdot
  nix: xdot
  pacman: xdot
  ubuntu: xdot
package-manager-url: https://formulae.brew.sh/formula/xdot
version: 1.6
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Interactive viewer for graphs written in Graphviz's dot language
source-archive: >
  https://files.pythonhosted.org/packages/32/68/13f80d47bffda03eaf05bd076d1b2ef9a1cf39b461b37e32f303bcf048de/xdot-1.6.tar.gz
dependencies:
  - adwaita-icon-theme
  - graphviz
  - gtk+3
  - numpy
  - py3cairo
  - pygobject3
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: xdot
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xdot
  brew: brew install xdot
  debian: sudo apt install xdot
  nix: nix profile install nixpkgs#xdot
  pacman: sudo pacman -S xdot
  ubuntu: sudo apt install xdot
provenance:
  formula: xdot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
