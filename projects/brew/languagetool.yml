id: brew:languagetool
display-name: languagetool
homepage: https://www.languagetool.org/
repo: https://github.com/languagetool-org/languagetool
docs: https://www.languagetool.org/
package-manager:
  brew: languagetool
  chocolatey: languagetool
  macports: LanguageTool
  nix: languagetool
  pacman: languagetool
  scoop: extras/languagetool
  zypper: languagetool
package-manager-url: https://formulae.brew.sh/formula/languagetool
version: 6.8
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Style and grammar checker
source-archive: https://github.com/languagetool-org/languagetool.git
dependencies:
  - openjdk@17
build-dependencies:
  - maven
executables:
  - exposure: global executable
    kind: cli
    name: languagetool
