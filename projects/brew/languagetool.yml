  macports: sudo port install LanguageTool
  nix: nix profile install nixpkgs#languagetool
  pacman: sudo pacman -S languagetool
  scoop: scoop install extras/languagetool
  zypper: sudo zypper install languagetool
provenance:
  formula: languagetool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
