id: brew:git-pages-cli
display-name: git-pages-cli
homepage: https://codeberg.org/git-pages/git-pages-cli
repo: https://codeberg.org/git-pages/git-pages-cli/archive/v1.8.2.tar.gz
docs: https://codeberg.org/git-pages/git-pages-cli
package-manager:
  brew: git-pages-cli
  nix: git-pages-cli
package-manager-url: https://formulae.brew.sh/formula/git-pages-cli
version: 1.8.2
license: 0BSD
category: development
tags:
  - cli
  - git
description: Tool for publishing a site to a git-pages server
source-archive: https://codeberg.org/git-pages/git-pages-cli/archive/v1.8.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-pages-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-pages-cli
  brew: brew install git-pages-cli
  nix: nix profile install nixpkgs#git-pages-cli
provenance:
  formula: git-pages-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
