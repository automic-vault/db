id: brew:dasht
display-name: dasht
homepage: https://sunaku.github.io/dasht
repo: https://github.com/sunaku/dasht
docs: https://sunaku.github.io/dasht
package-manager:
  apk: dasht
  brew: dasht
  nix: dasht
package-manager-url: https://formulae.brew.sh/formula/dasht
version: 2.4.0
license: ISC
category: development
tags:
  - cli
description: Search API docs offline, in your terminal or browser
source-archive: https://github.com/sunaku/dasht/archive/refs/tags/v2.4.0.tar.gz
dependencies:
  - socat
  - sqlite
  - w3m
  - wget
executables:
  - exposure: global executable
    kind: cli
    name: dasht
  - exposure: global executable
    kind: cli
    name: dasht-docsets
  - exposure: global executable
    kind: cli
    name: dasht-docsets-extract
  - exposure: global executable
    kind: cli
    name: dasht-docsets-install
  - exposure: global executable
    kind: cli
    name: dasht-docsets-remove
  - exposure: global executable
    kind: cli
    name: dasht-docsets-update
  - exposure: global executable
    kind: cli
    name: dasht-query-exec
  - exposure: global executable
    kind: cli
    name: dasht-query-html
  - exposure: global executable
    kind: cli
    name: dasht-query-line
  - exposure: global executable
    kind: cli
    name: dasht-server
  - exposure: global executable
    kind: cli
    name: dasht-server-http
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dasht
  av: sudo av install brew:dasht
  brew: brew install dasht
  nix: nix profile install nixpkgs#dasht
provenance:
  formula: dasht
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
