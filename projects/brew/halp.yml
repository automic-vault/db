id: brew:halp
display-name: halp
homepage: https://halp.cli.rs/
repo: https://github.com/orhun/halp
docs: https://halp.cli.rs/
package-manager:
  apk: halp
  brew: halp
  nix: halp
  pacman: halp
package-manager-url: https://formulae.brew.sh/formula/halp
version: 0.2.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: CLI tool to get help with CLI tools
source-archive: https://github.com/orhun/halp/archive/refs/tags/v0.2.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: halp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add halp
  av: sudo av install brew:halp
  brew: brew install halp
  nix: nix profile install nixpkgs#halp
  pacman: sudo pacman -S halp
provenance:
  formula: halp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
