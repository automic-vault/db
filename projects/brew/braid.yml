id: brew:braid
display-name: braid
homepage: https://cristibalan.github.io/braid/
repo: https://github.com/cristibalan/braid
docs: https://cristibalan.github.io/braid/
package-manager:
  brew: braid
package-manager-url: https://formulae.brew.sh/formula/braid
version: 1.1.10
license: MIT
category: development
tags:
  - cli
  - git
description: Simple tool to help track vendor branches in a Git repository
source-archive: https://github.com/cristibalan/braid/archive/refs/tags/v1.1.10.tar.gz
dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: braid
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:braid
  brew: brew install braid
provenance:
  formula: braid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
