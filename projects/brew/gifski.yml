id: brew:gifski
display-name: gifski
homepage: https://gif.ski/
repo: https://github.com/ImageOptim/gifski
docs: https://gif.ski/
package-manager:
  apk: gifski
  brew: gifski
  macports: gifski
  nix: gifski
  pacman: gifski
  scoop: main/gifski
  winget: ImageOptim.gifski
package-manager-url: https://formulae.brew.sh/formula/gifski
version: 1.34.0
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Highest-quality GIF encoder based on pngquant
source-archive: https://github.com/ImageOptim/gifski/archive/refs/tags/1.34.0.tar.gz
dependencies:
  - ffmpeg
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gifski
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gifski
  av: sudo av install brew:gifski
  brew: brew install gifski
  macports: sudo port install gifski
  nix: nix profile install nixpkgs#gifski
  pacman: sudo pacman -S gifski
  scoop: scoop install main/gifski
  winget: winget install --id ImageOptim.gifski -e
provenance:
  formula: gifski
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
