id: brew:netscanner
display-name: netscanner
homepage: https://github.com/Chleba/netscanner
repo: https://github.com/Chleba/netscanner
docs: https://github.com/Chleba/netscanner
package-manager:
  apk: netscanner
  brew: netscanner
  nix: netscanner
  pacman: netscanner
package-manager-url: https://formulae.brew.sh/formula/netscanner
version: 0.6.41
license: MIT
category: development
tags:
  - cli
description: Network scanner with features like WiFi scanning, packetdump and more
source-archive: https://github.com/Chleba/netscanner/archive/refs/tags/v0.6.41.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: netscanner
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add netscanner
  av: sudo av install brew:netscanner
  brew: brew install netscanner
  nix: nix profile install nixpkgs#netscanner
  pacman: sudo pacman -S netscanner
provenance:
  formula: netscanner
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
