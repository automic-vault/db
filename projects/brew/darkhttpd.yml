id: brew:darkhttpd
display-name: darkhttpd
homepage: https://unix4lyfe.org/darkhttpd/
repo: https://github.com/emikulic/darkhttpd
docs: https://unix4lyfe.org/darkhttpd/
package-manager:
  apk: darkhttpd
  brew: darkhttpd
  dnf: darkhttpd
  macports: darkhttpd
  nix: darkhttpd
  pacman: darkhttpd
  zypper: darkhttpd
package-manager-url: https://formulae.brew.sh/formula/darkhttpd
version: 1.17
license: ISC
category: development
tags:
  - cli
description: Small static webserver without CGI
source-archive: https://github.com/emikulic/darkhttpd/archive/refs/tags/v1.17.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: darkhttpd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add darkhttpd
  av: sudo av install brew:darkhttpd
  brew: brew install darkhttpd
  dnf: sudo dnf install darkhttpd
  macports: sudo port install darkhttpd
  nix: nix profile install nixpkgs#darkhttpd
  pacman: sudo pacman -S darkhttpd
  zypper: sudo zypper install darkhttpd
provenance:
  formula: darkhttpd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
