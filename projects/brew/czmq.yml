id: brew:czmq
display-name: czmq
homepage: http://czmq.zeromq.org/
repo: https://github.com/zeromq/czmq
docs: http://czmq.zeromq.org/
package-manager:
  apk: czmq
  brew: czmq
  dnf: czmq
  macports: czmq
  nix: czmq
  zypper: czmq
package-manager-url: https://formulae.brew.sh/formula/czmq
version: 4.2.1
license: MPL-2.0
category: development
tags:
  - cli
description: High-level C binding for ZeroMQ
source-archive: https://github.com/zeromq/czmq/releases/download/v4.2.1/czmq-4.2.1.tar.gz
dependencies:
  - lz4
  - zeromq
build-dependencies:
  - asciidoc
  - pkgconf
  - xmlto
executables:
  - exposure: global executable
    kind: cli
    name: zmakecert
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add czmq
  av: sudo av install brew:czmq
  brew: brew install czmq
  dnf: sudo dnf install czmq
  macports: sudo port install czmq
  nix: nix profile install nixpkgs#czmq
  zypper: sudo zypper install czmq
provenance:
  formula: czmq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
