id: brew:timelimit
display-name: timelimit
homepage: https://devel.ringlet.net/sysutils/timelimit/
repo: https://devel.ringlet.net/files/sys/timelimit/timelimit-1.9.2.tar.gz
docs: https://devel.ringlet.net/sysutils/timelimit/
package-manager:
  brew: timelimit
  debian: timelimit
  nix: timelimit
  ubuntu: timelimit
package-manager-url: https://formulae.brew.sh/formula/timelimit
version: 1.9.2
license: BSD-2-Clause
category: network
