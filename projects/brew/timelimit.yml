    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:timelimit
  brew: brew install timelimit
  debian: sudo apt install timelimit
  nix: nix profile install nixpkgs#timelimit
  ubuntu: sudo apt install timelimit
provenance:
  formula: timelimit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
