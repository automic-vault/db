id: brew:popeye
display-name: popeye
homepage: https://popeyecli.io
repo: https://github.com/derailed/popeye
docs: https://popeyecli.io
package-manager:
  apk: popeye
  brew: popeye
  macports: popeye
  nix: popeye
  pacman: popeye
  scoop: main/popeye
  zypper: popeye
package-manager-url: https://formulae.brew.sh/formula/popeye
version: 0.22.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes cluster resource sanitizer
source-archive: https://github.com/derailed/popeye/archive/refs/tags/v0.22.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: popeye
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add popeye
  av: sudo av install brew:popeye
  brew: brew install popeye
  macports: sudo port install popeye
  nix: nix profile install nixpkgs#popeye
  pacman: sudo pacman -S popeye
  scoop: scoop install main/popeye
  zypper: sudo zypper install popeye
provenance:
  formula: popeye
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
