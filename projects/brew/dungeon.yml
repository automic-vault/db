id: brew:dungeon
display-name: dungeon
homepage: https://github.com/GOFAI/dungeon
repo: https://github.com/GOFAI/dungeon
docs: https://github.com/GOFAI/dungeon
package-manager:
  brew: dungeon
package-manager-url: https://formulae.brew.sh/formula/dungeon
version: 4.1
license: HPND
category: development
tags:
  - cli
description: Classic text adventure game
source-archive: https://github.com/GOFAI/dungeon/archive/refs/tags/4.1.tar.gz
dependencies:
  - gcc
executables:
  - exposure: global executable
    kind: cli
    name: dungeon
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dungeon
  brew: brew install dungeon
provenance:
  formula: dungeon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
