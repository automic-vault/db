id: brew:latexdiff
display-name: latexdiff
homepage: https://www.ctan.org/pkg/latexdiff
repo: https://github.com/ftilmann/latexdiff
docs: https://www.ctan.org/pkg/latexdiff
package-manager:
  brew: latexdiff
  debian: latexdiff
  macports: latexdiff
  ubuntu: latexdiff
package-manager-url: https://formulae.brew.sh/formula/latexdiff
version: 1.4.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Compare and mark up LaTeX file differences
source-archive: https://github.com/ftilmann/latexdiff/releases/download/1.4.0/latexdiff-1.4.0.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: latexdiff
  - exposure: global executable
    kind: cli
    name: latexdiff-fast
  - exposure: global executable
    kind: cli
    name: latexdiff-so
  - exposure: global executable
    kind: cli
    name: latexdiff-vc
  - exposure: global executable
    kind: cli
    name: latexrevise
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:latexdiff
  brew: brew install latexdiff
  debian: sudo apt install latexdiff
  macports: sudo port install latexdiff
  ubuntu: sudo apt install latexdiff
provenance:
  formula: latexdiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
