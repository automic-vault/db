id: brew:elf2uf2-rs
display-name: elf2uf2-rs
homepage: https://github.com/JoNil/elf2uf2-rs
repo: https://github.com/JoNil/elf2uf2-rs
docs: https://github.com/JoNil/elf2uf2-rs
package-manager:
  brew: elf2uf2-rs
  nix: elf2uf2-rs
  pacman: elf2uf2-rs
package-manager-url: https://formulae.brew.sh/formula/elf2uf2-rs
version: 2.2.0
license: 0BSD
category: development
tags:
  - cli
description: Convert ELF files to UF2 for USB Flashing Bootloaders
source-archive: https://github.com/JoNil/elf2uf2-rs/archive/refs/tags/2.2.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: elf2uf2-rs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:elf2uf2-rs
  brew: brew install elf2uf2-rs
  nix: nix profile install nixpkgs#elf2uf2-rs
  pacman: sudo pacman -S elf2uf2-rs
provenance:
  formula: elf2uf2-rs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
