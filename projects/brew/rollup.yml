id: brew:rollup
display-name: rollup
homepage: https://rollupjs.org/
repo: https://registry.npmjs.org/rollup/-/rollup-4.60.4.tgz
docs: https://rollupjs.org/
package-manager:
  apk: rollup
  brew: rollup
  debian: rollup
  ubuntu: rollup
  zypper: rollup
package-manager-url: https://formulae.brew.sh/formula/rollup
version: 4.60.4
license: ISC AND MIT
category: network
tags:
