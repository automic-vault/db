id: brew:as-tree
display-name: as-tree
homepage: https://github.com/jez/as-tree
repo: https://github.com/jez/as-tree
docs: https://github.com/jez/as-tree
package-manager:
  brew: as-tree
  macports: as-tree
  nix: as-tree
package-manager-url: https://formulae.brew.sh/formula/as-tree
version: 0.12.0
license: BlueOak-1.0.0
category: development
tags:
  - cli
description: Print a list of paths as a tree of paths
source-archive: https://github.com/jez/as-tree/archive/refs/tags/0.12.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: as-tree
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:as-tree
  brew: brew install as-tree
  macports: sudo port install as-tree
  nix: nix profile install nixpkgs#as-tree
provenance:
  formula: as-tree
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
