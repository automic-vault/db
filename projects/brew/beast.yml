id: brew:beast
display-name: beast
homepage: https://beast.community/
repo: https://github.com/beast-dev/beast-mcmc
docs: https://beast.community/
package-manager:
  brew: beast
package-manager-url: https://formulae.brew.sh/formula/beast
version: 10.5.0
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Bayesian Evolutionary Analysis Sampling Trees
source-archive: https://github.com/beast-dev/beast-mcmc/archive/refs/tags/v10.5.0.tar.gz
dependencies:
  - beagle
  - openjdk@25
build-dependencies:
  - ant
executables:
  - exposure: global executable
    kind: cli
    name: beast
  - exposure: global executable
    kind: cli
    name: beauti
  - exposure: global executable
    kind: cli
    name: loganalyser
  - exposure: global executable
    kind: cli
    name: logcombiner
  - exposure: global executable
    kind: cli
    name: treeannotator
  - exposure: global executable
    kind: cli
    name: treestat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:beast
  brew: brew install beast
provenance:
  formula: beast
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
