id: brew:aws-sam-cli
display-name: aws-sam-cli
homepage: https://aws.amazon.com/serverless/sam/
repo: >
  https://files.pythonhosted.org/packages/70/fa/3c34809a6bf157b2211da06a209bb92241c5bf94565fb2a4fe4c44e6b44b/aws_sam_cli-1.161.0.tar.gz
docs: https://aws.amazon.com/serverless/sam/
package-manager:
  brew: aws-sam-cli
  nix: aws-sam-cli
  scoop: main/aws-sam-cli
  winget: Amazon.SAM-CLI
package-manager-url: https://formulae.brew.sh/formula/aws-sam-cli
version: 1.161.0
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: CLI tool to build, test, debug, and deploy Serverless applications using AWS SAM
source-archive: >
  https://files.pythonhosted.org/packages/70/fa/3c34809a6bf157b2211da06a209bb92241c5bf94565fb2a4fe4c44e6b44b/aws_sam_cli-1.161.0.tar.gz
dependencies:
  - certifi
  - cryptography
  - libyaml
  - openssl@3
  - pydantic
  - python@3.14
  - rpds-py
build-dependencies:
  - cmake
  - go
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: sam
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aws-sam-cli
  brew: brew install aws-sam-cli
  nix: nix profile install nixpkgs#aws-sam-cli
  scoop: scoop install main/aws-sam-cli
  winget: winget install --id Amazon.SAM-CLI -e
provenance:
  formula: aws-sam-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
