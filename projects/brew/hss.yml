id: brew:hss
display-name: hss
homepage: https://github.com/six-ddc/hss
repo: https://github.com/six-ddc/hss
docs: https://github.com/six-ddc/hss
package-manager:
  brew: hss
  macports: hss
  nix: hss
  pacman: hss
package-manager-url: https://formulae.brew.sh/formula/hss
version: 1.10
license: MIT
category: development
tags:
  - cli
description: Interactive parallel SSH client
source-archive: https://github.com/six-ddc/hss/archive/refs/tags/1.10.tar.gz
dependencies:
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: hss
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hss
  brew: brew install hss
  macports: sudo port install hss
  nix: nix profile install nixpkgs#hss
  pacman: sudo pacman -S hss
provenance:
  formula: hss
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
