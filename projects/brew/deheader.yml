id: brew:deheader
display-name: deheader
homepage: http://www.catb.org/~esr/deheader/
repo: https://gitlab.com/esr/deheader/-/archive/1.12/deheader-1.12.tar.bz2
docs: http://www.catb.org/~esr/deheader/
package-manager:
  brew: deheader
  debian: deheader
  nix: deheader
  ubuntu: deheader
  zypper: deheader
package-manager-url: https://formulae.brew.sh/formula/deheader
version: 1.12
license: BSD-2-Clause
category: development
tags:
  - cli
description: Analyze C/C++ files for unnecessary headers
source-archive: https://gitlab.com/esr/deheader/-/archive/1.12/deheader-1.12.tar.bz2
build-dependencies:
  - asciidoctor
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: deheader
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:deheader
  brew: brew install deheader
  debian: sudo apt install deheader
  nix: nix profile install nixpkgs#deheader
  ubuntu: sudo apt install deheader
  zypper: sudo zypper install deheader
provenance:
  formula: deheader
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
