id: brew:kubectl-tree
display-name: kubectl-tree
homepage: https://github.com/ahmetb/kubectl-tree
repo: https://github.com/ahmetb/kubectl-tree
docs: https://github.com/ahmetb/kubectl-tree
package-manager:
  brew: kubectl-tree
  nix: kubectl-tree
  zypper: kubectl-tree
package-manager-url: https://formulae.brew.sh/formula/kubectl-tree
version: 0.6.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Kubectl plugin to browse Kubernetes object hierarchies as a tree
source-archive: https://github.com/ahmetb/kubectl-tree/archive/refs/tags/v0.6.0.tar.gz
dependencies:
  - kubernetes-cli
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubectl-tree
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubectl-tree
  brew: brew install kubectl-tree
  nix: nix profile install nixpkgs#kubectl-tree
  zypper: sudo zypper install kubectl-tree
provenance:
  formula: kubectl-tree
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
