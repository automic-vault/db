id: brew:symlinks
display-name: symlinks
homepage: https://github.com/brandt/symlinks
repo: https://github.com/brandt/symlinks
docs: https://github.com/brandt/symlinks
package-manager:
  apk: symlinks
  brew: symlinks
  debian: symlinks
  dnf: symlinks
  macports: symlinks
  nix: symlinks
  pacman: symlinks
  ubuntu: symlinks
package-manager-url: https://formulae.brew.sh/formula/symlinks
version: 1.4.3
license: MIT
category: development
tags:
  - cli
description: Symbolic link maintenance utility
source-archive: https://github.com/brandt/symlinks/archive/refs/tags/v1.4.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: symlinks
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add symlinks
  av: sudo av install brew:symlinks
  brew: brew install symlinks
  debian: sudo apt install symlinks
  dnf: sudo dnf install symlinks
  macports: sudo port install symlinks
  nix: nix profile install nixpkgs#symlinks
  pacman: sudo pacman -S symlinks
  ubuntu: sudo apt install symlinks
provenance:
  formula: symlinks
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
