id: brew:meli
display-name: meli
homepage: https://meli-email.org/
repo: https://git.meli-email.org/meli/meli/archive/v0.8.13.tar.gz
docs: https://meli-email.org/
package-manager:
  apk: meli
  brew: meli
  debian: meli
  macports: meli
  nix: meli
  zypper: meli
package-manager-url: https://formulae.brew.sh/formula/meli
version: 0.8.13
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Terminal e-mail client and e-mail client library
source-archive: https://git.meli-email.org/meli/meli/archive/v0.8.13.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: meli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add meli
  av: sudo av install brew:meli
  brew: brew install meli
  debian: sudo apt install meli
  macports: sudo port install meli
  nix: nix profile install nixpkgs#meli
  zypper: sudo zypper install meli
provenance:
  formula: meli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
