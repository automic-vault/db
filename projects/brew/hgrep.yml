id: brew:hgrep
display-name: hgrep
homepage: https://github.com/rhysd/hgrep
repo: https://github.com/rhysd/hgrep
docs: https://github.com/rhysd/hgrep
package-manager:
  brew: hgrep
  macports: hgrep
  nix: hgrep
package-manager-url: https://formulae.brew.sh/formula/hgrep
version: 0.3.9
license: MIT
category: development
tags:
  - cli
description: Grep with human-friendly search results
source-archive: https://github.com/rhysd/hgrep/archive/refs/tags/v0.3.9.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hgrep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hgrep
  brew: brew install hgrep
  macports: sudo port install hgrep
  nix: nix profile install nixpkgs#hgrep
provenance:
  formula: hgrep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
