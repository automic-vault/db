id: brew:kerl
display-name: kerl
homepage: https://github.com/kerl/kerl
repo: https://github.com/kerl/kerl
docs: https://github.com/kerl/kerl
package-manager:
  brew: kerl
package-manager-url: https://formulae.brew.sh/formula/kerl
version: 4.4.0
license: MIT
category: development
tags:
  - cli
description: Easy building and installing of Erlang/OTP instances
source-archive: https://github.com/kerl/kerl/archive/refs/tags/4.4.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: kerl
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kerl
  brew: brew install kerl
provenance:
  formula: kerl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
