id: brew:mr
display-name: mr
homepage: https://myrepos.branchable.com/
repo: git://myrepos.branchable.com/
docs: https://myrepos.branchable.com/
package-manager:
  brew: mr
  nix: mr
  zypper: mr
package-manager-url: https://formulae.brew.sh/formula/mr
version: 1.20180726
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Multiple Repository management tool
source-archive: git://myrepos.branchable.com/
build-dependencies:
  - pod2man
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: mr
  - exposure: global executable
    kind: cli
    name: webcheckout
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mr
  brew: brew install mr
  nix: nix profile install nixpkgs#mr
  zypper: sudo zypper install mr
provenance:
  formula: mr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
