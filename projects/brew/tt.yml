id: brew:tt
display-name: tt
homepage: https://github.com/tarantool/tt
repo: https://github.com/tarantool/tt
docs: https://github.com/tarantool/tt
package-manager:
  brew: tt
  nix: tt
package-manager-url: https://formulae.brew.sh/formula/tt
version: 2.13.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Command-line utility to manage Tarantool applications
source-archive: https://github.com/tarantool/tt/releases/download/v2.13.0/tt-2.13.0-complete.tar.gz
dependencies:
  - bash-completion
  - openssl@3
build-dependencies:
  - go
  - mage
  - pkgconf
uses-from-macos:
  - curl
  - unzip
  - zip
executables:
  - exposure: global executable
    kind: cli
    name: tt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tt
  brew: brew install tt
  nix: nix profile install nixpkgs#tt
provenance:
  formula: tt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
