id: brew:yaegi
display-name: yaegi
homepage: https://github.com/traefik/yaegi
repo: https://github.com/traefik/yaegi
docs: https://github.com/traefik/yaegi
package-manager:
  apk: yaegi
  brew: yaegi
  macports: yaegi
  nix: yaegi
  pacman: yaegi
  ubuntu: yaegi
package-manager-url: https://formulae.brew.sh/formula/yaegi
version: 0.16.1
license: Apache-2.0
category: development
tags:
  - cli
description: Yet another elegant Go interpreter
source-archive: https://github.com/traefik/yaegi/archive/refs/tags/v0.16.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: yaegi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yaegi
  av: sudo av install brew:yaegi
  brew: brew install yaegi
  macports: sudo port install yaegi
  nix: nix profile install nixpkgs#yaegi
  pacman: sudo pacman -S yaegi
  ubuntu: sudo apt install yaegi
provenance:
  formula: yaegi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
