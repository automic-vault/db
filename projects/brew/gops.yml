id: brew:gops
display-name: gops
homepage: https://github.com/google/gops
repo: https://github.com/google/gops
docs: https://github.com/google/gops
package-manager:
  apk: gops
  brew: gops
  dnf: gops
  nix: gops
  zypper: gops
package-manager-url: https://formulae.brew.sh/formula/gops
version: 0.3.29
license: BSD-3-Clause
category: development
tags:
  - cli
description: Tool to list and diagnose Go processes currently running on your system
source-archive: https://github.com/google/gops/archive/refs/tags/v0.3.29.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gops
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gops
  av: sudo av install brew:gops
  brew: brew install gops
  dnf: sudo dnf install gops
  nix: nix profile install nixpkgs#gops
  zypper: sudo zypper install gops
provenance:
  formula: gops
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
