id: brew:bento
display-name: bento
homepage: https://warpstreamlabs.github.io/bento/
repo: https://github.com/warpstreamlabs/bento
docs: https://warpstreamlabs.github.io/bento/
package-manager:
  brew: bento
  nix: bento
package-manager-url: https://formulae.brew.sh/formula/bento
version: 1.18.0
license: MIT
category: development
tags:
  - cli
description: Fancy stream processing made operationally mundane
source-archive: https://github.com/warpstreamlabs/bento/archive/refs/tags/v1.18.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bento
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bento
  brew: brew install bento
  nix: nix profile install nixpkgs#bento
provenance:
  formula: bento
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
