id: brew:cdncheck
display-name: cdncheck
homepage: https://projectdiscovery.io
repo: https://github.com/projectdiscovery/cdncheck
docs: https://projectdiscovery.io
package-manager:
  brew: cdncheck
  nix: cdncheck
package-manager-url: https://formulae.brew.sh/formula/cdncheck
version: 1.2.37
license: MIT
category: development
tags:
  - cli
description: Utility to detect various technology for a given IP address
source-archive: https://github.com/projectdiscovery/cdncheck/archive/refs/tags/v1.2.37.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cdncheck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cdncheck
  brew: brew install cdncheck
  nix: nix profile install nixpkgs#cdncheck
provenance:
  formula: cdncheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
