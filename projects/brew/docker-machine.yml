id: brew:docker-machine
display-name: docker-machine
homepage: https://docs.gitlab.com/runner/executors/docker_machine.html
repo: >
  https://gitlab.com/gitlab-org/ci-cd/docker-machine/-/archive/v0.16.2-gitlab.47/docker-machine-v0.16.2-gitlab.47.tar.bz2
docs: https://docs.gitlab.com/runner/executors/docker_machine.html
package-manager:
  brew: docker-machine
  chocolatey: docker-machine
  macports: docker-machine
  pacman: docker-machine
  scoop: main/docker-machine
package-manager-url: https://formulae.brew.sh/formula/docker-machine
version: 0.16.2-gitlab.47
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
  - docker
description: Create Docker hosts locally and on cloud providers
source-archive: >
  https://gitlab.com/gitlab-org/ci-cd/docker-machine/-/archive/v0.16.2-gitlab.47/docker-machine-v0.16.2-gitlab.47.tar.bz2
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: docker-machine
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:docker-machine
  brew: brew install docker-machine
  chocolatey: choco install docker-machine
  macports: sudo port install docker-machine
  pacman: sudo pacman -S docker-machine
  scoop: scoop install main/docker-machine
provenance:
  formula: docker-machine
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
