id: brew:codanna
display-name: codanna
homepage: https://github.com/bartolli/codanna
repo: https://github.com/bartolli/codanna
docs: https://github.com/bartolli/codanna
package-manager:
  brew: codanna
package-manager-url: https://formulae.brew.sh/formula/codanna
version: 0.9.22
license: Apache-2.0
category: development
tags:
  - cli
description: Code intelligence system with semantic search
source-archive: https://github.com/bartolli/codanna/archive/refs/tags/v0.9.22.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: codanna
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:codanna
  brew: brew install codanna
provenance:
  formula: codanna
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
