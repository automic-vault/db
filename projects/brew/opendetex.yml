id: brew:opendetex
display-name: opendetex
homepage: https://github.com/pkubowicz/opendetex
repo: https://github.com/pkubowicz/opendetex
docs: https://github.com/pkubowicz/opendetex
package-manager:
  brew: opendetex
  macports: opendetex
package-manager-url: https://formulae.brew.sh/formula/opendetex
version: 2.8.11
license: BSD-3-Clause
category: development
tags:
  - cli
description: Tool to strip TeX or LaTeX commands from documents
source-archive: >
  https://github.com/pkubowicz/opendetex/releases/download/v2.8.11/opendetex-2.8.11.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: delatex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:opendetex
  brew: brew install opendetex
  macports: sudo port install opendetex
provenance:
  formula: opendetex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
