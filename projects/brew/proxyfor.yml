id: brew:proxyfor
display-name: proxyfor
homepage: https://github.com/sigoden/proxyfor
repo: https://github.com/sigoden/proxyfor
docs: https://github.com/sigoden/proxyfor
package-manager:
  brew: proxyfor
package-manager-url: https://formulae.brew.sh/formula/proxyfor
version: 0.5.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Proxy CLI for capturing and inspecting HTTP(S) and WS(S) traffic
source-archive: https://github.com/sigoden/proxyfor/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: proxyfor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:proxyfor
  brew: brew install proxyfor
provenance:
  formula: proxyfor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
