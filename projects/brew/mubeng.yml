id: brew:mubeng
display-name: mubeng
homepage: https://github.com/mubeng/mubeng
repo: https://github.com/mubeng/mubeng
docs: https://github.com/mubeng/mubeng
package-manager:
  brew: mubeng
  nix: mubeng
package-manager-url: https://formulae.brew.sh/formula/mubeng
version: 0.23.0
license: Apache-2.0
category: development
tags:
  - cli
description: Incredibly fast proxy checker & IP rotator with ease
source-archive: https://github.com/mubeng/mubeng/archive/refs/tags/v0.23.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mubeng
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mubeng
  brew: brew install mubeng
  nix: nix profile install nixpkgs#mubeng
provenance:
  formula: mubeng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
