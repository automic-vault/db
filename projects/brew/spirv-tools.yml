id: brew:spirv-tools
display-name: spirv-tools
homepage: https://github.com/KhronosGroup/SPIRV-Tools
repo: https://github.com/KhronosGroup/SPIRV-Tools
docs: https://github.com/KhronosGroup/SPIRV-Tools
package-manager:
  apk: spirv-tools
  brew: spirv-tools
  debian: spirv-tools
  dnf: spirv-tools
  macports: spirv-tools
  nix: spirv-tools
  pacman: spirv-tools
  ubuntu: spirv-tools
  zypper: spirv-tools
package-manager-url: https://formulae.brew.sh/formula/spirv-tools
version: 1.4.350.0
license: Apache-2.0
category: development
tags:
  - cli
description: API and commands for processing SPIR-V modules
source-archive: >
  https://github.com/KhronosGroup/SPIRV-Tools/archive/refs/tags/vulkan-sdk-1.4.350.0.tar.gz
build-dependencies:
  - cmake
  - spirv-headers
executables:
  - exposure: global executable
    kind: cli
    name: spirv-as
  - exposure: global executable
    kind: cli
    name: spirv-cfg
  - exposure: global executable
    kind: cli
    name: spirv-diff
  - exposure: global executable
    kind: cli
    name: spirv-dis
  - exposure: global executable
    kind: cli
    name: spirv-lesspipe.sh
  - exposure: global executable
    kind: cli
    name: spirv-link
  - exposure: global executable
    kind: cli
    name: spirv-lint
  - exposure: global executable
    kind: cli
    name: spirv-objdump
  - exposure: global executable
    kind: cli
    name: spirv-opt
  - exposure: global executable
    kind: cli
    name: spirv-reduce
  - exposure: global executable
    kind: cli
    name: spirv-val
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add spirv-tools
  av: sudo av install brew:spirv-tools
  brew: brew install spirv-tools
  debian: sudo apt install spirv-tools
  dnf: sudo dnf install spirv-tools
  macports: sudo port install spirv-tools
  nix: nix profile install nixpkgs#spirv-tools
  pacman: sudo pacman -S spirv-tools
  ubuntu: sudo apt install spirv-tools
  zypper: sudo zypper install spirv-tools
provenance:
  formula: spirv-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
