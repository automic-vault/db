id: brew:kuzu
display-name: kuzu
homepage: https://github.com/kuzudb/kuzu
repo: https://github.com/kuzudb/kuzu
docs: https://github.com/kuzudb/kuzu
package-manager:
  brew: kuzu
  nix: kuzu
package-manager-url: https://formulae.brew.sh/formula/kuzu
version: 0.11.3
license: MIT
category: database
tags:
  - cli
  - database
description: Embeddable graph database management system built for query speed & scalability
source-archive: https://github.com/kuzudb/kuzu/archive/refs/tags/v0.11.3.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: kuzu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kuzu
  brew: brew install kuzu
  nix: nix profile install nixpkgs#kuzu
provenance:
  formula: kuzu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
