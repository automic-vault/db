id: brew:gh-ost
display-name: gh-ost
homepage: https://github.com/github/gh-ost
repo: https://github.com/github/gh-ost
docs: https://github.com/github/gh-ost
package-manager:
  brew: gh-ost
  nix: gh-ost
package-manager-url: https://formulae.brew.sh/formula/gh-ost
version: 1.1.9
license: MIT
category: database
tags:
  - cli
description: Triggerless online schema migration solution for MySQL
source-archive: https://github.com/github/gh-ost/archive/refs/tags/v1.1.9.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gh-ost
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gh-ost
  brew: brew install gh-ost
  nix: nix profile install nixpkgs#gh-ost
provenance:
  formula: gh-ost
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
