id: brew:cp2k
display-name: cp2k
homepage: https://www.cp2k.org/
repo: https://github.com/cp2k/cp2k
docs: https://www.cp2k.org/
package-manager:
  brew: cp2k
  debian: cp2k
  dnf: cp2k
  nix: cp2k
package-manager-url: https://formulae.brew.sh/formula/cp2k
version: 2026.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Quantum chemistry and solid state physics software package
source-archive: https://github.com/cp2k/cp2k/releases/download/v2026.1/cp2k-2026.1.tar.bz2
dependencies:
  - dbcsr
  - fftw
  - gcc
  - libint
  - libomp
  - libxc
  - open-mpi
  - openblas
  - scalapack
build-dependencies:
  - cmake
  - fypp
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cp2k.psmp
  - exposure: global executable
    kind: cli
    name: dbm_miniapp.psmp
  - exposure: global executable
    kind: cli
    name: dbt_tas_unittest.psmp
  - exposure: global executable
    kind: cli
    name: dbt_unittest.psmp
  - exposure: global executable
    kind: cli
    name: dumpdcd.psmp
  - exposure: global executable
    kind: cli
    name: gemm_square_unittest.psmp
  - exposure: global executable
    kind: cli
    name: graph.psmp
  - exposure: global executable
    kind: cli
    name: grid_miniapp.psmp
  - exposure: global executable
    kind: cli
    name: grid_unittest.psmp
  - exposure: global executable
    kind: cli
    name: gx_ac_unittest.psmp
  - exposure: global executable
    kind: cli
    name: libcp2k_unittest.psmp
  - exposure: global executable
    kind: cli
    name: memory_utilities_unittest.psmp
  - exposure: global executable
    kind: cli
    name: nequip_unittest.psmp
  - exposure: global executable
    kind: cli
    name: parallel_rng_types_unittest.psmp
  - exposure: global executable
    kind: cli
    name: xyz2dcd.psmp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cp2k
  brew: brew install cp2k
  debian: sudo apt install cp2k
  dnf: sudo dnf install cp2k
  nix: nix profile install nixpkgs#cp2k
provenance:
  formula: cp2k
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
