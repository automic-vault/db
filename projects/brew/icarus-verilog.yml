id: brew:icarus-verilog
display-name: icarus-verilog
homepage: https://steveicarus.github.io/iverilog/
repo: https://github.com/steveicarus/iverilog
docs: https://steveicarus.github.io/iverilog/
package-manager:
  apk: iverilog
  brew: icarus-verilog
  chocolatey: iverilog
  debian: iverilog
  dnf: iverilog
  macports: iverilog
  nix: iverilog
  pacman: iverilog
  scoop: main/iverilog
  ubuntu: iverilog
  winget: Icarus.Verilog
  zypper: iverilog
package-manager-url: https://formulae.brew.sh/formula/icarus-verilog
version: 13.0
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: Verilog simulation and synthesis tool
source-archive: https://github.com/steveicarus/iverilog/archive/refs/tags/v13_0.tar.gz
build-dependencies:
  - autoconf
  - bison
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: iverilog
  - exposure: global executable
    kind: cli
    name: iverilog-vpi
  - exposure: global executable
    kind: cli
    name: vvp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add iverilog
  av: sudo av install brew:icarus-verilog
  brew: brew install icarus-verilog
  chocolatey: choco install iverilog
  debian: sudo apt install iverilog
  dnf: sudo dnf install iverilog
  macports: sudo port install iverilog
  nix: nix profile install nixpkgs#iverilog
  pacman: sudo pacman -S iverilog
  scoop: scoop install main/iverilog
  ubuntu: sudo apt install iverilog
  winget: winget install --id Icarus.Verilog -e
  zypper: sudo zypper install iverilog
provenance:
  formula: icarus-verilog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
