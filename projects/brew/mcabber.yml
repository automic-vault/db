id: brew:mcabber
display-name: mcabber
homepage: https://mcabber.com/
repo: https://mcabber.com/files/mcabber-1.1.2.tar.bz2
docs: https://mcabber.com/
package-manager:
  apk: mcabber
  brew: mcabber
  debian: mcabber
  dnf: mcabber
  macports: mcabber
  nix: mcabber
  pacman: mcabber
  ubuntu: mcabber
  zypper: mcabber
package-manager-url: https://formulae.brew.sh/formula/mcabber
version: 1.1.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Console Jabber client
source-archive: https://mcabber.com/files/mcabber-1.1.2.tar.bz2
dependencies:
  - gettext
  - glib
  - gpgme
  - libassuan
  - libgpg-error
  - libidn
  - libotr
  - loudmouth
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: mcabber
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    A configuration file is necessary to start mcabber. The template is here:
    $HOMEBREW_PREFIX/opt/mcabber/share/mcabber/mcabberrc.example And there is a Getting
    Started Guide you will need to setup Mcabber: https://wiki.mcabber.com/#index2h1
  post-install-defined: false
install-lines:
  apk: sudo apk add mcabber
  av: sudo av install brew:mcabber
  brew: brew install mcabber
  debian: sudo apt install mcabber
  dnf: sudo dnf install mcabber
  macports: sudo port install mcabber
  nix: nix profile install nixpkgs#mcabber
  pacman: sudo pacman -S mcabber
  ubuntu: sudo apt install mcabber
  zypper: sudo zypper install mcabber
provenance:
  formula: mcabber
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
