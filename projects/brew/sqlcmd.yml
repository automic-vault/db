id: brew:sqlcmd
display-name: sqlcmd
homepage: https://github.com/microsoft/go-sqlcmd
repo: https://github.com/microsoft/go-sqlcmd
docs: https://github.com/microsoft/go-sqlcmd
package-manager:
  brew: sqlcmd
  chocolatey: sqlcmd
  nix: sqlcmd
  winget: Microsoft.Sqlcmd
package-manager-url: https://formulae.brew.sh/formula/sqlcmd
version: 1.10.0
license: MIT
category: database
tags:
  - cli
description: Microsoft SQL Server command-line interface
source-archive: https://github.com/microsoft/go-sqlcmd/archive/refs/tags/v1.10.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sqlcmd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sqlcmd
  brew: brew install sqlcmd
  chocolatey: choco install sqlcmd
  nix: nix profile install nixpkgs#sqlcmd
  winget: winget install --id Microsoft.Sqlcmd -e
provenance:
  formula: sqlcmd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
