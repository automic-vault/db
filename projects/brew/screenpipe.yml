id: brew:screenpipe
display-name: screenpipe
homepage: https://github.com/mediar-ai/screenpipe
repo: https://github.com/mediar-ai/screenpipe
docs: https://github.com/mediar-ai/screenpipe
package-manager:
  brew: screenpipe
package-manager-url: https://formulae.brew.sh/formula/screenpipe
version: 0.2.13
license: MIT
category: development
tags:
  - cli
description: Library to build personalized AI powered by what you've seen, said, or heard
source-archive: https://github.com/mediar-ai/screenpipe/archive/refs/tags/v0.2.13.tar.gz
dependencies:
  - ffmpeg
build-dependencies:
  - cmake
  - pkgconf
  - rust
uses-from-macos:
  - llvm
executables:
  - exposure: global executable
    kind: cli
    name: screenpipe
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:screenpipe
  brew: brew install screenpipe
provenance:
  formula: screenpipe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
