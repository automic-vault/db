id: brew:thriftgo
display-name: thriftgo
homepage: https://github.com/cloudwego/thriftgo
repo: https://github.com/cloudwego/thriftgo
docs: https://github.com/cloudwego/thriftgo
package-manager:
  brew: thriftgo
package-manager-url: https://formulae.brew.sh/formula/thriftgo
version: 0.4.5
license: Apache-2.0
category: cloud
tags:
  - cli
description: Implementation of thrift compiler in go language with plugin mechanism
source-archive: https://github.com/cloudwego/thriftgo/archive/refs/tags/v0.4.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: thriftgo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:thriftgo
  brew: brew install thriftgo
provenance:
  formula: thriftgo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
