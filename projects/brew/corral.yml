id: brew:corral
display-name: corral
homepage: https://github.com/ponylang/corral
repo: https://github.com/ponylang/corral
docs: https://github.com/ponylang/corral
package-manager:
  brew: corral
package-manager-url: https://formulae.brew.sh/formula/corral
version: 0.9.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: Dependency manager for the Pony language
source-archive: https://github.com/ponylang/corral/archive/refs/tags/0.9.2.tar.gz
dependencies:
  - ponyc
executables:
  - exposure: global executable
    kind: cli
    name: corral
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:corral
  brew: brew install corral
provenance:
  formula: corral
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
