id: brew:cppcms
display-name: cppcms
homepage: http://cppcms.com/wikipp/en/page/main
repo: https://github.com/artyom-beilis/cppcms
docs: http://cppcms.com/wikipp/en/page/main
package-manager:
  brew: cppcms
  nix: cppcms
package-manager-url: https://formulae.brew.sh/formula/cppcms
version: 2.0.1
license: MIT
category: development
tags:
  - cli
description: Free High Performance Web Development Framework
source-archive: https://github.com/artyom-beilis/cppcms/archive/refs/tags/v2.0.1.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - cmake
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: cppcms_config_find_param
  - exposure: global executable
    kind: cli
    name: cppcms_make_key
  - exposure: global executable
    kind: cli
    name: cppcms_run
  - exposure: global executable
    kind: cli
    name: cppcms_scale
  - exposure: global executable
    kind: cli
    name: cppcms_tmpl_cc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cppcms
  brew: brew install cppcms
  nix: nix profile install nixpkgs#cppcms
provenance:
  formula: cppcms
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
