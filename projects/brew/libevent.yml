id: brew:libevent
display-name: libevent
homepage: https://libevent.org/
repo: https://github.com/libevent/libevent
docs: https://libevent.org/
package-manager:
  apk: libevent
  brew: libevent
  dnf: libevent
  macports: libevent
  nix: libevent
  pacman: libevent
package-manager-url: https://formulae.brew.sh/formula/libevent
version: 2.1.12
license: BSD-3-Clause
category: development
tags:
  - cli
description: Asynchronous event library
source-archive: https://github.com/libevent/libevent/archive/refs/tags/release-2.1.12-stable.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: event_rpcgen.py
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libevent
  av: sudo av install brew:libevent
  brew: brew install libevent
  dnf: sudo dnf install libevent
  macports: sudo port install libevent
  nix: nix profile install nixpkgs#libevent
  pacman: sudo pacman -S libevent
provenance:
  formula: libevent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
