id: brew:smpeg
display-name: smpeg
homepage: https://icculus.org/smpeg/
repo: https://github.com/icculus/smpeg
docs: https://icculus.org/smpeg/
package-manager:
  brew: smpeg
  macports: smpeg
  nix: smpeg
  pacman: smpeg
package-manager-url: https://formulae.brew.sh/formula/smpeg
version: 0.4.5
license: LGPL-2.0-or-later
category: development
tags:
  - cli
description: SDL MPEG Player Library
source-archive: https://github.com/icculus/smpeg/archive/refs/tags/release_0_4_5.tar.gz
dependencies:
  - sdl12-compat
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: plaympeg
  - exposure: global executable
    kind: cli
    name: smpeg-config
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:smpeg
  brew: brew install smpeg
  macports: sudo port install smpeg
  nix: nix profile install nixpkgs#smpeg
  pacman: sudo pacman -S smpeg
provenance:
  formula: smpeg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
