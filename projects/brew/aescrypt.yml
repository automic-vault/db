id: brew:aescrypt
display-name: aescrypt
homepage: https://aescrypt.sourceforge.net/
repo: https://aescrypt.sourceforge.net/aescrypt-0.7.tar.gz
docs: https://aescrypt.sourceforge.net/
package-manager:
  brew: aescrypt
  nix: aescrypt
  winget: Terrapane.AESCrypt
package-manager-url: https://formulae.brew.sh/formula/aescrypt
version: 0.7
license: BSD-4-Clause
category: security
tags:
  - cli
description: Program for encryption/decryption
source-archive: https://aescrypt.sourceforge.net/aescrypt-0.7.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: aescrypt
  - exposure: global executable
    kind: cli
    name: aesget
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aescrypt
  brew: brew install aescrypt
  nix: nix profile install nixpkgs#aescrypt
  winget: winget install --id Terrapane.AESCrypt -e
provenance:
  formula: aescrypt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
