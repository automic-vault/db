id: brew:xleak
display-name: xleak
homepage: https://github.com/bgreenwell/xleak
repo: https://github.com/bgreenwell/xleak
docs: https://github.com/bgreenwell/xleak
package-manager:
  brew: xleak
  nix: xleak
  winget: bgreenwell.xleak
package-manager-url: https://formulae.brew.sh/formula/xleak
version: 0.2.6
license: MIT
category: development
tags:
  - cli
description: Terminal Excel viewer with an interactive TUI
source-archive: https://github.com/bgreenwell/xleak/archive/refs/tags/v0.2.6.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: xleak
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xleak
  brew: brew install xleak
  nix: nix profile install nixpkgs#xleak
  winget: winget install --id bgreenwell.xleak -e
provenance:
  formula: xleak
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
