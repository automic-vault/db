id: brew:rad
display-name: rad
homepage: https://amterp.dev/rad/
repo: https://github.com/amterp/rad
docs: https://amterp.dev/rad/
package-manager:
  brew: rad
package-manager-url: https://formulae.brew.sh/formula/rad
version: 0.10.1
license: Apache-2.0
category: development
tags:
  - cli
description: Modern CLI scripts made easy
source-archive: https://github.com/amterp/rad/archive/refs/tags/v0.10.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rad
  - exposure: global executable
    kind: cli
    name: radls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rad
  brew: brew install rad
provenance:
  formula: rad
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
