repo: https://www.chiark.greenend.org.uk/~ian/adns/ftp/adns-1.6.2.tar.gz
docs: https://www.chiark.greenend.org.uk/~ian/adns/
package-manager:
  brew: adns
  dnf: adns
  macports: adns
  nix: adns
  pacman: adns
