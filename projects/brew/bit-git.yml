id: brew:bit-git
display-name: bit-git
homepage: https://github.com/chriswalz/bit
repo: https://github.com/chriswalz/bit
docs: https://github.com/chriswalz/bit
package-manager:
  brew: bit-git
package-manager-url: https://formulae.brew.sh/formula/bit-git
version: 1.1.2
license: Apache-2.0
category: development
tags:
  - cli
  - git
description: Bit is a modern Git CLI
source-archive: https://github.com/chriswalz/bit/archive/refs/tags/v1.1.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bit-git
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bit-git
  brew: brew install bit-git
provenance:
  formula: bit-git
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
