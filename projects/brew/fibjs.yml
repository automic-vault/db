id: brew:fibjs
display-name: fibjs
homepage: https://fibjs.org/
repo: https://github.com/fibjs/fibjs
docs: https://fibjs.org/
package-manager:
  brew: fibjs
package-manager-url: https://formulae.brew.sh/formula/fibjs
version: 0.37.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: JavaScript on Fiber
source-archive: https://github.com/fibjs/fibjs/releases/download/v0.37.0/fullsrc.zip
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: fibjs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fibjs
  brew: brew install fibjs
provenance:
  formula: fibjs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
