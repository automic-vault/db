id: brew:fetch-crl
display-name: fetch-crl
homepage: https://wiki.nikhef.nl/grid/FetchCRL3
repo: https://dist.eugridpma.info/distribution/util/fetch-crl3/fetch-crl-3.0.23.tar.gz
docs: https://wiki.nikhef.nl/grid/FetchCRL3
package-manager:
  brew: fetch-crl
  debian: fetch-crl
  dnf: fetch-crl
  macports: fetch-crl
  ubuntu: fetch-crl
package-manager-url: https://formulae.brew.sh/formula/fetch-crl
version: 3.0.23
license: Apache-2.0
category: network
tags:
  - cli
description: Retrieve certificate revocation lists (CRLs)
source-archive: https://dist.eugridpma.info/distribution/util/fetch-crl3/fetch-crl-3.0.23.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: clean-crl
  - exposure: global executable
    kind: cli
    name: fetch-crl
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fetch-crl
  brew: brew install fetch-crl
  debian: sudo apt install fetch-crl
  dnf: sudo dnf install fetch-crl
  macports: sudo port install fetch-crl
  ubuntu: sudo apt install fetch-crl
provenance:
  formula: fetch-crl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
