id: brew:kargo
display-name: kargo
homepage: https://kargo.io/
repo: https://github.com/akuity/kargo
docs: https://kargo.io/
package-manager:
  brew: kargo
  nix: kargo
package-manager-url: https://formulae.brew.sh/formula/kargo
version: 1.10.4
license: Apache-2.0
category: development
tags:
  - cli
description: Multi-Stage GitOps Continuous Promotion
source-archive: https://github.com/akuity/kargo/archive/refs/tags/v1.10.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kargo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kargo
  brew: brew install kargo
  nix: nix profile install nixpkgs#kargo
provenance:
  formula: kargo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
