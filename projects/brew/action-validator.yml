id: brew:action-validator
display-name: action-validator
homepage: https://github.com/mpalmer/action-validator
repo: https://static.crates.io/crates/action-validator/action-validator-0.9.0.crate
docs: https://github.com/mpalmer/action-validator
package-manager:
  brew: action-validator
  nix: action-validator
package-manager-url: https://formulae.brew.sh/formula/action-validator
version: 0.9.0
license: GPL-3.0-only
category: development
tags:
  - cli
  - yaml
description: Tool to validate GitHub Action and Workflow YAML files
source-archive: https://static.crates.io/crates/action-validator/action-validator-0.9.0.crate
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: action-validator
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:action-validator
  brew: brew install action-validator
  nix: nix profile install nixpkgs#action-validator
provenance:
  formula: action-validator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
