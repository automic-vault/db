id: brew:bsdiff
display-name: bsdiff
homepage: https://www.daemonology.net/bsdiff/
repo: https://deb.debian.org/debian/pool/main/b/bsdiff/bsdiff_4.3.orig.tar.gz
docs: https://www.daemonology.net/bsdiff/
package-manager:
  brew: bsdiff
  debian: bsdiff
  dnf: bsdiff
  macports: bsdiff
  nix: bsdiff
  ubuntu: bsdiff
  zypper: bsdiff
package-manager-url: https://formulae.brew.sh/formula/bsdiff
version: 4.3
license: BSD-2-Clause
category: network
tags:
  - cli
description: Generate and apply patches to binary files
source-archive: https://deb.debian.org/debian/pool/main/b/bsdiff/bsdiff_4.3.orig.tar.gz
build-dependencies:
  - bmake
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: bsdiff
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bsdiff
  brew: brew install bsdiff
  debian: sudo apt install bsdiff
  dnf: sudo dnf install bsdiff
  macports: sudo port install bsdiff
  nix: nix profile install nixpkgs#bsdiff
  ubuntu: sudo apt install bsdiff
  zypper: sudo zypper install bsdiff
provenance:
  formula: bsdiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
