id: brew:kafkactl
display-name: kafkactl
homepage: https://deviceinsight.github.io/kafkactl/
repo: https://github.com/deviceinsight/kafkactl
docs: https://deviceinsight.github.io/kafkactl/
package-manager:
  brew: kafkactl
  nix: kafkactl
  winget: deviceinsight.kafkactl
package-manager-url: https://formulae.brew.sh/formula/kafkactl
version: 5.19.0
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for managing Apache Kafka
source-archive: https://github.com/deviceinsight/kafkactl/archive/refs/tags/v5.19.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kafkactl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kafkactl
  brew: brew install kafkactl
  nix: nix profile install nixpkgs#kafkactl
  winget: winget install --id deviceinsight.kafkactl -e
provenance:
  formula: kafkactl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
