id: brew:spotify_player
display-name: spotify_player
homepage: https://github.com/aome510/spotify-player
repo: https://github.com/aome510/spotify-player
docs: https://github.com/aome510/spotify-player
package-manager:
  apk: spotify-player
  brew: spotify_player
  macports: spotify-player
  nix: spotify-player
  pacman: spotify-player
  scoop: main/spotify-player
  winget: aome510.spotify-player
package-manager-url: https://formulae.brew.sh/formula/spotify_player
version: 0.23.0
license: MIT
category: development
tags:
  - cli
description: Command driven spotify player
source-archive: https://github.com/aome510/spotify-player/archive/refs/tags/v0.23.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: spotify_player
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add spotify-player
  av: sudo av install brew:spotify_player
  brew: brew install spotify_player
  macports: sudo port install spotify-player
  nix: nix profile install nixpkgs#spotify-player
  pacman: sudo pacman -S spotify-player
  scoop: scoop install main/spotify-player
  winget: winget install --id aome510.spotify-player -e
provenance:
  formula: spotify_player
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
