id: brew:metricbeat
display-name: metricbeat
homepage: https://www.elastic.co/beats/metricbeat
repo: https://github.com/elastic/beats
docs: https://www.elastic.co/beats/metricbeat
package-manager:
  brew: metricbeat
  chocolatey: metricbeat
  nix: metricbeat
package-manager-url: https://formulae.brew.sh/formula/metricbeat
version: 9.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: Collect metrics from your systems and services
source-archive: https://github.com/elastic/beats.git
build-dependencies:
  - go
  - mage
executables:
  - exposure: global executable
    kind: cli
    name: metricbeat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:metricbeat
  brew: brew install metricbeat
  chocolatey: choco install metricbeat
  nix: nix profile install nixpkgs#metricbeat
provenance:
  formula: metricbeat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
