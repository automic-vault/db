id: brew:kibi
display-name: kibi
homepage: https://github.com/ilai-deutel/kibi
repo: https://github.com/ilai-deutel/kibi
docs: https://github.com/ilai-deutel/kibi
package-manager:
  apk: kibi
  brew: kibi
  macports: kibi
  nix: kibi
package-manager-url: https://formulae.brew.sh/formula/kibi
version: 0.3.3
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Text editor in ≤1024 lines of code, written in Rust
source-archive: https://github.com/ilai-deutel/kibi/archive/refs/tags/v0.3.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: kibi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kibi
  av: sudo av install brew:kibi
  brew: brew install kibi
  macports: sudo port install kibi
  nix: nix profile install nixpkgs#kibi
provenance:
  formula: kibi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
