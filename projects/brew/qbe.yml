id: brew:qbe
display-name: qbe
homepage: https://c9x.me/compile/
repo: https://c9x.me/compile/release/qbe-1.2.tar.xz
docs: https://c9x.me/compile/
package-manager:
  apk: qbe
  brew: qbe
  debian: qbe
  dnf: qbe
  nix: qbe
  pacman: qbe
  zypper: qbe
package-manager-url: https://formulae.brew.sh/formula/qbe
version: 1.2
license: MIT
category: development
tags:
  - cli
description: Compiler Backend
source-archive: https://c9x.me/compile/release/qbe-1.2.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: qbe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add qbe
  av: sudo av install brew:qbe
  brew: brew install qbe
  debian: sudo apt install qbe
  dnf: sudo dnf install qbe
  nix: nix profile install nixpkgs#qbe
  pacman: sudo pacman -S qbe
  zypper: sudo zypper install qbe
provenance:
  formula: qbe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
