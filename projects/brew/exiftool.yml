id: brew:exiftool
display-name: exiftool
homepage: https://exiftool.org
repo: https://exiftool.org/Image-ExifTool-13.55.tar.gz
docs: https://exiftool.org
package-manager:
  apk: exiftool
  brew: exiftool
  chocolatey: exiftool
  macports: exiftool
  nix: exiftool
  scoop: main/exiftool
  winget: OliverBetz.ExifTool
  zypper: exiftool
package-manager-url: https://formulae.brew.sh/formula/exiftool
version: 13.55
license: Artistic-1.0-Perl OR GPL-1.0-or-later
category: media
tags:
  - cli
description: Perl lib for reading and writing EXIF metadata
source-archive: https://exiftool.org/Image-ExifTool-13.55.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: exiftool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add exiftool
  av: sudo av install brew:exiftool
  brew: brew install exiftool
  chocolatey: choco install exiftool
  macports: sudo port install exiftool
  nix: nix profile install nixpkgs#exiftool
  scoop: scoop install main/exiftool
  winget: winget install --id OliverBetz.ExifTool -e
  zypper: sudo zypper install exiftool
provenance:
  formula: exiftool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
