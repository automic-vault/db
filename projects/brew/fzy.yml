id: brew:fzy
display-name: fzy
homepage: https://github.com/jhawthorn/fzy
repo: https://github.com/jhawthorn/fzy
docs: https://github.com/jhawthorn/fzy
package-manager:
  apk: fzy
  brew: fzy
  debian: fzy
  macports: fzy
  nix: fzy
  pacman: fzy
  ubuntu: fzy
  zypper: fzy
package-manager-url: https://formulae.brew.sh/formula/fzy
version: 1.1
license: MIT
category: development
tags:
  - cli
description: Fast, simple fuzzy text selector with an advanced scoring algorithm
source-archive: https://github.com/jhawthorn/fzy/archive/refs/tags/1.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: fzy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fzy
  av: sudo av install brew:fzy
  brew: brew install fzy
  debian: sudo apt install fzy
  macports: sudo port install fzy
  nix: nix profile install nixpkgs#fzy
  pacman: sudo pacman -S fzy
  ubuntu: sudo apt install fzy
  zypper: sudo zypper install fzy
provenance:
  formula: fzy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
