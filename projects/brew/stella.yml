id: brew:stella
display-name: stella
homepage: https://stella-emu.github.io/
repo: https://github.com/stella-emu/stella
docs: https://stella-emu.github.io/
package-manager:
  brew: stella
  debian: stella
  nix: stella
  pacman: stella
  ubuntu: stella
  winget: TheStellaTeam.Stella
package-manager-url: https://formulae.brew.sh/formula/stella
version: 7.0c
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Atari 2600 VCS emulator
source-archive: https://github.com/stella-emu/stella/archive/refs/tags/7.0c.tar.gz
dependencies:
  - libpng
  - sdl2
build-dependencies:
  - pkgconf
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: stella
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stella
  brew: brew install stella
  debian: sudo apt install stella
  nix: nix profile install nixpkgs#stella
  pacman: sudo pacman -S stella
  ubuntu: sudo apt install stella
  winget: winget install --id TheStellaTeam.Stella -e
provenance:
  formula: stella
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
