id: brew:dcfldd
display-name: dcfldd
homepage: https://github.com/resurrecting-open-source-projects/dcfldd
repo: https://github.com/resurrecting-open-source-projects/dcfldd
docs: https://github.com/resurrecting-open-source-projects/dcfldd
package-manager:
  brew: dcfldd
  debian: dcfldd
  dnf: dcfldd
  macports: dcfldd
  nix: dcfldd
  ubuntu: dcfldd
package-manager-url: https://formulae.brew.sh/formula/dcfldd
version: 1.9.3
license: GPL-2.0-or-later
category: security
tags:
  - cli
  - security
description: Enhanced version of dd for forensics and security
source-archive: >
  https://github.com/resurrecting-open-source-projects/dcfldd/archive/refs/tags/v1.9.3.tar.gz
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dcfldd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dcfldd
  brew: brew install dcfldd
  debian: sudo apt install dcfldd
  dnf: sudo dnf install dcfldd
  macports: sudo port install dcfldd
  nix: nix profile install nixpkgs#dcfldd
  ubuntu: sudo apt install dcfldd
provenance:
  formula: dcfldd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
