id: brew:nethack
display-name: nethack
homepage: https://www.nethack.org/
repo: https://nethack.org/download/5.0.0/nethack-500-src.tgz
docs: https://www.nethack.org/
package-manager:
  apk: nethack
  brew: nethack
  dnf: nethack
  macports: nethack
  nix: nethack
  pacman: nethack
  winget: Nethack.Nethack
  zypper: nethack
package-manager-url: https://formulae.brew.sh/formula/nethack
version: 5.0.0
license: NGPL
category: media
tags:
  - cli
description: Single-player roguelike video game
source-archive: https://nethack.org/download/5.0.0/nethack-500-src.tgz
build-dependencies:
  - groff
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: nethack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add nethack
  av: sudo av install brew:nethack
  brew: brew install nethack
  dnf: sudo dnf install nethack
  macports: sudo port install nethack
  nix: nix profile install nixpkgs#nethack
  pacman: sudo pacman -S nethack
  winget: winget install --id Nethack.Nethack -e
  zypper: sudo zypper install nethack
provenance:
  formula: nethack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
