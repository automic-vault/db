id: brew:pyside
display-name: pyside
homepage: https://wiki.qt.io/Qt_for_Python
repo: >
  https://download.qt.io/official_releases/QtForPython/pyside6/PySide6-6.11.1-src/pyside-setup-everywhere-src-6.11.1.tar.xz
docs: https://wiki.qt.io/Qt_for_Python
package-manager:
  brew: pyside
  debian: shiboken6
  dnf: shiboken6
  pacman: shiboken6
package-manager-url: https://formulae.brew.sh/formula/pyside
version: 6.11.1
license: >
  (GPL-3.0-only WITH Qt-GPL-exception-1.0) AND (LGPL-3.0-only OR GPL-2.0-only OR
  GPL-3.0-only)
category: network
tags:
  - cli
description: Official Python bindings for Qt
source-archive: >
  https://download.qt.io/official_releases/QtForPython/pyside6/PySide6-6.11.1-src/pyside-setup-everywhere-src-6.11.1.tar.xz
dependencies:
  - llvm
  - python@3.14
  - qt3d
  - qtbase
  - qtcanvaspainter
  - qtcharts
  - qtconnectivity
  - qtdatavis3d
  - qtdeclarative
  - qtgraphs
  - qthttpserver
  - qtlocation
  - qtmultimedia
  - qtnetworkauth
  - qtpositioning
  - qtquick3d
  - qtremoteobjects
  - qtscxml
  - qtsensors
  - qtserialbus
  - qtserialport
  - qtshadertools
  - qtspeech
  - qtsvg
  - qttools
  - qtwebchannel
  - qtwebengine
  - qtwebsockets
  - qtwebview
build-dependencies:
  - cmake
  - ninja
  - python-setuptools
  - qtshadertools
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: shiboken6
  - exposure: global executable
    kind: cli
    name: shiboken_tool.py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pyside
  brew: brew install pyside
  debian: sudo apt install shiboken6
  dnf: sudo dnf install shiboken6
  pacman: sudo pacman -S shiboken6
provenance:
  formula: pyside
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
