id: brew:sox_ng
display-name: sox_ng
homepage: https://codeberg.org/sox_ng/sox_ng
repo: >
  https://codeberg.org/sox_ng/sox_ng/releases/download/sox_ng-14.8.0.1/sox_ng-14.8.0.1.tar.gz
docs: https://codeberg.org/sox_ng/sox_ng
package-manager:
  brew: sox_ng
  nix: sox_ng
  winget: sox_ng.sox_ng
package-manager-url: https://formulae.brew.sh/formula/sox_ng
version: 14.8.0.1
license: GPL-2.0-only
category: network
tags:
  - cli
description: Sound eXchange NG
source-archive: >
  https://codeberg.org/sox_ng/sox_ng/releases/download/sox_ng-14.8.0.1/sox_ng-14.8.0.1.tar.gz
dependencies:
  - flac
  - lame
  - libogg
  - libpng
  - libsndfile
  - libvorbis
  - mad
  - opus
  - opusfile
  - wavpack
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: play_ng
  - exposure: global executable
    kind: cli
    name: rec_ng
  - exposure: global executable
    kind: cli
    name: sox_ng
  - exposure: global executable
    kind: cli
    name: soxi_ng
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sox_ng
  brew: brew install sox_ng
  nix: nix profile install nixpkgs#sox_ng
  winget: winget install --id sox_ng.sox_ng -e
provenance:
  formula: sox_ng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
