id: brew:kubo
display-name: kubo
homepage: https://docs.ipfs.tech/how-to/command-line-quick-start/
repo: https://github.com/ipfs/kubo
docs: https://docs.ipfs.tech/how-to/command-line-quick-start/
package-manager:
  apk: kubo
  brew: kubo
  macports: ipfs
  nix: kubo
  pacman: kubo
  scoop: main/kubo
  zypper: kubo
package-manager-url: https://formulae.brew.sh/formula/kubo
version: 0.41.0
license: MIT AND (MIT OR Apache-2.0)
category: development
tags:
  - cli
description: Peer-to-peer hypermedia protocol
source-archive: https://github.com/ipfs/kubo/archive/refs/tags/v0.41.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ipfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add kubo
  av: sudo av install brew:kubo
  brew: brew install kubo
  macports: sudo port install ipfs
  nix: nix profile install nixpkgs#kubo
  pacman: sudo pacman -S kubo
  scoop: scoop install main/kubo
  zypper: sudo zypper install kubo
provenance:
  formula: kubo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
