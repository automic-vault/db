id: brew:chronograf
display-name: chronograf
homepage: https://docs.influxdata.com/chronograf/latest/
repo: https://github.com/influxdata/chronograf
docs: https://docs.influxdata.com/chronograf/latest/
package-manager:
  brew: chronograf
  scoop: main/chronograf
  winget: InfluxData.Chronograf
package-manager-url: https://formulae.brew.sh/formula/chronograf
version: 1.11.3
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Open source monitoring and visualization UI for the TICK stack
source-archive: https://github.com/influxdata/chronograf/archive/refs/tags/1.11.3.tar.gz
dependencies:
  - influxdb
  - kapacitor
build-dependencies:
  - go
  - node
  - pkg-config-wrapper
  - pkgconf
  - rust
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: chronoctl
  - exposure: global executable
    kind: cli
    name: chronograf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:chronograf
  brew: brew install chronograf
  scoop: scoop install main/chronograf
  winget: winget install --id InfluxData.Chronograf -e
provenance:
  formula: chronograf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
