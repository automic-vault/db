id: brew:splint
display-name: splint
homepage: https://splint.org/
repo: https://splint.org/downloads/splint-3.1.2.src.tgz
docs: https://splint.org/
package-manager:
  brew: splint
  debian: splint
  macports: splint
  nix: splint
  pacman: splint
  ubuntu: splint
  zypper: splint
package-manager-url: https://formulae.brew.sh/formula/splint
version: 3.1.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Secure Programming Lint
source-archive: https://splint.org/downloads/splint-3.1.2.src.tgz
uses-from-macos:
  - flex
executables:
  - exposure: global executable
    kind: cli
    name: splint
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:splint
  brew: brew install splint
  debian: sudo apt install splint
  macports: sudo port install splint
  nix: nix profile install nixpkgs#splint
  pacman: sudo pacman -S splint
  ubuntu: sudo apt install splint
  zypper: sudo zypper install splint
provenance:
  formula: splint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
