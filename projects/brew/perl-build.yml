id: brew:perl-build
display-name: perl-build
homepage: https://github.com/tokuhirom/Perl-Build
repo: https://github.com/tokuhirom/Perl-Build
docs: https://github.com/tokuhirom/Perl-Build
package-manager:
  brew: perl-build
package-manager-url: https://formulae.brew.sh/formula/perl-build
version: 1.34
license: Artistic-1.0 OR GPL-1.0-or-later
category: development
tags:
  - cli
description: Perl builder
source-archive: https://github.com/tokuhirom/Perl-Build/archive/refs/tags/1.34.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: perl-build
  - exposure: global executable
    kind: cli
    name: plenv-install
  - exposure: global executable
    kind: cli
    name: plenv-uninstall
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:perl-build
  brew: brew install perl-build
provenance:
  formula: perl-build
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
