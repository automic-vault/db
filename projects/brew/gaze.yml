id: brew:gaze
display-name: gaze
homepage: https://github.com/wtetsu/gaze
repo: https://github.com/wtetsu/gaze
docs: https://github.com/wtetsu/gaze
package-manager:
  brew: gaze
package-manager-url: https://formulae.brew.sh/formula/gaze
version: 1.2.1
license: MIT
category: development
tags:
  - cli
description: Execute commands for you
source-archive: https://github.com/wtetsu/gaze/archive/refs/tags/v1.2.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gaze
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gaze
  brew: brew install gaze
provenance:
  formula: gaze
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
