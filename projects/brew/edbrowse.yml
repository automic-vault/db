id: brew:edbrowse
display-name: edbrowse
homepage: https://edbrowse.org
repo: https://github.com/edbrowse/edbrowse
docs: https://edbrowse.org
package-manager:
  apk: edbrowse
  brew: edbrowse
  debian: edbrowse
  macports: edbrowse
  ubuntu: edbrowse
package-manager-url: https://formulae.brew.sh/formula/edbrowse
version: 3.8.16
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Command-line editor and web browser
source-archive: https://github.com/edbrowse/edbrowse/archive/refs/tags/v3.8.16.tar.gz
dependencies:
  - curl
  - openssl@3
  - pcre2
  - readline
  - unixodbc
build-dependencies:
  - pkgconf
  - quickjs
executables:
  - exposure: global executable
    kind: cli
    name: edbrowse
  - exposure: global executable
    kind: cli
    name: edbrowse-plugin-telnet
  - exposure: global executable
    kind: cli
    name: edbrowse-plugin-zip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add edbrowse
  av: sudo av install brew:edbrowse
  brew: brew install edbrowse
  debian: sudo apt install edbrowse
  macports: sudo port install edbrowse
  ubuntu: sudo apt install edbrowse
provenance:
  formula: edbrowse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
