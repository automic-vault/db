id: brew:dehydrated
display-name: dehydrated
homepage: https://dehydrated.io
repo: https://github.com/dehydrated-io/dehydrated
docs: https://dehydrated.io
package-manager:
  apk: dehydrated
  brew: dehydrated
  debian: dehydrated
  dnf: dehydrated
  nix: dehydrated
  pacman: dehydrated
  ubuntu: dehydrated
  zypper: dehydrated
package-manager-url: https://formulae.brew.sh/formula/dehydrated
version: 0.7.2
license: MIT
category: security
tags:
  - cli
description: LetsEncrypt/acme client implemented as a shell-script
source-archive: https://github.com/dehydrated-io/dehydrated/archive/refs/tags/v0.7.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: dehydrated
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dehydrated
  av: sudo av install brew:dehydrated
  brew: brew install dehydrated
  debian: sudo apt install dehydrated
  dnf: sudo dnf install dehydrated
  nix: nix profile install nixpkgs#dehydrated
  pacman: sudo pacman -S dehydrated
  ubuntu: sudo apt install dehydrated
  zypper: sudo zypper install dehydrated
provenance:
  formula: dehydrated
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
