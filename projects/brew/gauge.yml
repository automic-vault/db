id: brew:gauge
display-name: gauge
homepage: https://gauge.org
repo: https://github.com/getgauge/gauge
docs: https://gauge.org
package-manager:
  brew: gauge
  chocolatey: gauge
  nix: gauge
  scoop: main/gauge
  winget: Gauge.Gauge
package-manager-url: https://formulae.brew.sh/formula/gauge
version: 1.6.31
license: Apache-2.0
category: development
tags:
  - cli
description: Test automation tool that supports executable documentation
source-archive: https://github.com/getgauge/gauge/archive/refs/tags/v1.6.31.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gauge
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gauge
  brew: brew install gauge
  chocolatey: choco install gauge
  nix: nix profile install nixpkgs#gauge
  scoop: scoop install main/gauge
  winget: winget install --id Gauge.Gauge -e
provenance:
  formula: gauge
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
