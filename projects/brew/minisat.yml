id: brew:minisat
display-name: minisat
homepage: https://github.com/stp/minisat
repo: https://github.com/stp/minisat
docs: https://github.com/stp/minisat
package-manager:
  brew: minisat
  debian: minisat
  macports: minisat
  nix: minisat
  pacman: minisat
  ubuntu: minisat
  winget: PolarGoose.minisat
  zypper: minisat
package-manager-url: https://formulae.brew.sh/formula/minisat
version: 2.2.1
license: MIT
category: development
tags:
  - cli
description: Minimalistic and high-performance SAT solver
source-archive: https://github.com/stp/minisat/archive/refs/tags/releases/2.2.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: minisat
  - exposure: global executable
    kind: cli
    name: minisat_core
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:minisat
  brew: brew install minisat
  debian: sudo apt install minisat
  macports: sudo port install minisat
  nix: nix profile install nixpkgs#minisat
  pacman: sudo pacman -S minisat
  ubuntu: sudo apt install minisat
  winget: winget install --id PolarGoose.minisat -e
  zypper: sudo zypper install minisat
provenance:
  formula: minisat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
