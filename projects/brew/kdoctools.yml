id: brew:kdoctools
display-name: kdoctools
homepage: https://l10n.kde.org/docs/doc-primer/
repo: https://download.kde.org/stable/frameworks/6.26/kdoctools-6.26.0.tar.xz
docs: https://l10n.kde.org/docs/doc-primer/
package-manager:
  apk: kdoctools
  brew: kdoctools
  pacman: kdoctools
  zypper: kdoctools
package-manager-url: https://formulae.brew.sh/formula/kdoctools
version: 6.26.0
license: >
  BSD-3-Clause AND GPL-2.0-or-later AND LGPL-2.1-or-later AND (LGPL-2.1-only OR
  LGPL-3.0-only)
category: network
tags:
  - cli
description: Create documentation from DocBook
source-archive: https://download.kde.org/stable/frameworks/6.26/kdoctools-6.26.0.tar.xz
dependencies:
  - docbook-xsl
  - karchive
  - qtbase
build-dependencies:
  - cmake
  - doxygen
  - extra-cmake-modules
  - gettext
  - ki18n
  - qttools
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: checkXML6
  - exposure: global executable
    kind: cli
    name: meinproc6
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kdoctools
  av: sudo av install brew:kdoctools
  brew: brew install kdoctools
  pacman: sudo pacman -S kdoctools
  zypper: sudo zypper install kdoctools
provenance:
  formula: kdoctools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
