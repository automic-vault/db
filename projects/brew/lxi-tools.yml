id: brew:lxi-tools
display-name: lxi-tools
homepage: https://github.com/lxi-tools/lxi-tools
repo: https://github.com/lxi-tools/lxi-tools
docs: https://github.com/lxi-tools/lxi-tools
package-manager:
  brew: lxi-tools
  debian: lxi-tools
  dnf: lxi-tools
  nix: lxi-tools
  ubuntu: lxi-tools
package-manager-url: https://formulae.brew.sh/formula/lxi-tools
version: 2.8
license: BSD-3-Clause
category: development
tags:
  - cli
description: Open source tools for managing network attached LXI compatible instruments
source-archive: https://github.com/lxi-tools/lxi-tools/archive/refs/tags/v2.8.tar.gz
dependencies:
  - cairo
  - desktop-file-utils
  - gdk-pixbuf
  - gettext
  - glib
  - gtk4
  - gtksourceview5
  - hicolor-icon-theme
  - json-glib
  - libadwaita
  - liblxi
  - lua
  - readline
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: lxi
  - exposure: global executable
    kind: cli
    name: lxi-gui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:lxi-tools
  brew: brew install lxi-tools
  debian: sudo apt install lxi-tools
  dnf: sudo dnf install lxi-tools
  nix: nix profile install nixpkgs#lxi-tools
  ubuntu: sudo apt install lxi-tools
provenance:
  formula: lxi-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
