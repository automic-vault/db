id: brew:kubevpn
display-name: kubevpn
homepage: https://www.kubevpn.dev
repo: https://github.com/kubenetworks/kubevpn
docs: https://www.kubevpn.dev
package-manager:
  brew: kubevpn
  nix: kubevpn
  scoop: extras/kubevpn
package-manager-url: https://formulae.brew.sh/formula/kubevpn
version: 2.10.2
license: MIT
category: cloud
tags:
  - cli
  - cloud
description: Offers a Cloud-Native Dev Environment that connects to your K8s cluster network
source-archive: https://github.com/kubenetworks/kubevpn/archive/refs/tags/v2.10.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubevpn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubevpn
  brew: brew install kubevpn
  nix: nix profile install nixpkgs#kubevpn
  scoop: scoop install extras/kubevpn
provenance:
  formula: kubevpn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
