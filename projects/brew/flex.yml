id: brew:flex
display-name: flex
homepage: https://github.com/westes/flex
repo: https://github.com/westes/flex
docs: https://github.com/westes/flex
package-manager:
  apk: flex
  brew: flex
  debian: flex
  dnf: flex
  macports: flex
  nix: flex
  pacman: flex
  ubuntu: flex
  zypper: flex
package-manager-url: https://formulae.brew.sh/formula/flex
version: 2.6.4
license: BSD-2-Clause
category: development
tags:
  - cli
description: Fast Lexical Analyzer, generates Scanners (tokenizers)
source-archive: https://github.com/westes/flex/releases/download/v2.6.4/flex-2.6.4.tar.gz
dependencies:
  - gettext
build-dependencies:
  - help2man
uses-from-macos:
  - m4
executables:
  - exposure: global executable
    kind: cli
    name: flex
  - exposure: global executable
    kind: cli
    name: flex++
  - exposure: global executable
    kind: cli
    name: lex
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add flex
  av: sudo av install brew:flex
  brew: brew install flex
  debian: sudo apt install flex
  dnf: sudo dnf install flex
  macports: sudo port install flex
  nix: nix profile install nixpkgs#flex
  pacman: sudo pacman -S flex
  ubuntu: sudo apt install flex
  zypper: sudo zypper install flex
provenance:
  formula: flex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
