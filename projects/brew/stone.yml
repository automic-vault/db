id: brew:stone
display-name: stone
homepage: https://www.gcd.org/sengoku/stone/
repo: https://www.gcd.org/sengoku/stone/stone-2.4.tar.gz
docs: https://www.gcd.org/sengoku/stone/
package-manager:
  brew: stone
  debian: stone
  nix: stone
  ubuntu: stone
package-manager-url: https://formulae.brew.sh/formula/stone
version: 2.4
license: GPL-2.0-or-later
