    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stone
  brew: brew install stone
  debian: sudo apt install stone
  nix: nix profile install nixpkgs#stone
  ubuntu: sudo apt install stone
provenance:
  formula: stone
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
