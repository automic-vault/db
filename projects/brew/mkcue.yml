id: brew:mkcue
display-name: mkcue
homepage: https://packages.debian.org/sid/mkcue
repo: https://deb.debian.org/debian/pool/main/m/mkcue/mkcue_1.orig.tar.gz
docs: https://packages.debian.org/sid/mkcue
package-manager:
  brew: mkcue
  debian: mkcue
  nix: mkcue
  ubuntu: mkcue
package-manager-url: https://formulae.brew.sh/formula/mkcue
version: 1
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Generate a CUE sheet from a CD
source-archive: https://deb.debian.org/debian/pool/main/m/mkcue/mkcue_1.orig.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mkcue
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mkcue
  brew: brew install mkcue
  debian: sudo apt install mkcue
  nix: nix profile install nixpkgs#mkcue
  ubuntu: sudo apt install mkcue
provenance:
  formula: mkcue
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
