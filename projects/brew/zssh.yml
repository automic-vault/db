id: brew:zssh
display-name: zssh
homepage: https://zssh.sourceforge.net/
repo: https://downloads.sourceforge.net/project/zssh/zssh/1.5/zssh-1.5c.tgz
docs: https://zssh.sourceforge.net/
package-manager:
  brew: zssh
  debian: zssh
  dnf: zssh
  macports: zssh
  nix: zssh
  pacman: zssh
  ubuntu: zssh
package-manager-url: https://formulae.brew.sh/formula/zssh
version: 1.5c
license: GPL-2.0-only
category: network
tags:
  - cli
description: Interactive file transfers over SSH
source-archive: https://downloads.sourceforge.net/project/zssh/zssh/1.5/zssh-1.5c.tgz
dependencies:
  - lrzsz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: zssh
  - exposure: global executable
    kind: cli
    name: ztelnet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zssh
  brew: brew install zssh
  debian: sudo apt install zssh
  dnf: sudo dnf install zssh
  macports: sudo port install zssh
  nix: nix profile install nixpkgs#zssh
  pacman: sudo pacman -S zssh
  ubuntu: sudo apt install zssh
provenance:
  formula: zssh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
