id: brew:oxlint
display-name: oxlint
homepage: https://oxc.rs/
repo: https://github.com/oxc-project/oxc
docs: https://oxc.rs/
package-manager:
  brew: oxlint
  nix: oxlint
  scoop: main/oxlint
  winget: oxc-project.oxlint
package-manager-url: https://formulae.brew.sh/formula/oxlint
version: 1.67.0
license: MIT
category: development
tags:
  - cli
description: High-performance linter for JavaScript and TypeScript written in Rust
source-archive: https://github.com/oxc-project/oxc/archive/refs/tags/oxlint_v1.67.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: oxlint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oxlint
  brew: brew install oxlint
  nix: nix profile install nixpkgs#oxlint
  scoop: scoop install main/oxlint
  winget: winget install --id oxc-project.oxlint -e
provenance:
  formula: oxlint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
