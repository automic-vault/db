id: brew:xcodegen
display-name: xcodegen
homepage: https://github.com/yonaskolb/XcodeGen
repo: https://github.com/yonaskolb/XcodeGen
docs: https://github.com/yonaskolb/XcodeGen
package-manager:
  brew: xcodegen
  macports: xcodegen
  nix: xcodegen
package-manager-url: https://formulae.brew.sh/formula/xcodegen
version: 2.45.4
license: MIT
category: development
tags:
  - cli
description: Generate your Xcode project from a spec file and your folder structure
source-archive: https://github.com/yonaskolb/XcodeGen/archive/refs/tags/2.45.4.tar.gz
uses-from-macos:
  - swift
executables:
  - exposure: global executable
    kind: cli
    name: xcodegen
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xcodegen
  brew: brew install xcodegen
  macports: sudo port install xcodegen
  nix: nix profile install nixpkgs#xcodegen
provenance:
  formula: xcodegen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
