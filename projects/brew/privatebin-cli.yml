id: brew:privatebin-cli
display-name: privatebin-cli
homepage: https://github.com/gearnode/privatebin
repo: https://github.com/gearnode/privatebin
docs: https://github.com/gearnode/privatebin
package-manager:
  brew: privatebin-cli
  debian: privatebin-cli
  nix: privatebin
package-manager-url: https://formulae.brew.sh/formula/privatebin-cli
version: 2.2.1
license: ISC
category: development
tags:
  - cli
description: CLI for creating and managing PrivateBin pastes
source-archive: https://github.com/gearnode/privatebin/archive/refs/tags/v2.2.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: privatebin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:privatebin-cli
  brew: brew install privatebin-cli
  debian: sudo apt install privatebin-cli
  nix: nix profile install nixpkgs#privatebin
provenance:
  formula: privatebin-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
