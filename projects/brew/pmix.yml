id: brew:pmix
display-name: pmix
homepage: https://openpmix.github.io/
repo: https://github.com/openpmix/openpmix
docs: https://openpmix.github.io/
package-manager:
  brew: pmix
  dnf: pmix
  nix: pmix
  zypper: pmix
package-manager-url: https://formulae.brew.sh/formula/pmix
version: 5.0.10
license: BSD-3-Clause
category: development
tags:
  - cli
description: Process Management Interface for HPC environments
source-archive: https://github.com/openpmix/openpmix/releases/download/v5.0.10/pmix-5.0.10.tar.bz2
dependencies:
  - hwloc
  - libevent
executables:
  - exposure: global executable
    kind: cli
    name: palloc
  - exposure: global executable
    kind: cli
    name: pattrs
  - exposure: global executable
    kind: cli
    name: pctrl
  - exposure: global executable
    kind: cli
    name: pevent
  - exposure: global executable
    kind: cli
    name: plookup
  - exposure: global executable
    kind: cli
    name: pmix_info
  - exposure: global executable
    kind: cli
    name: pmixcc
  - exposure: global executable
    kind: cli
    name: pps
  - exposure: global executable
    kind: cli
    name: pquery
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pmix
  brew: brew install pmix
  dnf: sudo dnf install pmix
  nix: nix profile install nixpkgs#pmix
  zypper: sudo zypper install pmix
provenance:
  formula: pmix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
