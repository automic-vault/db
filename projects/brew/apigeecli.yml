id: brew:apigeecli
display-name: apigeecli
homepage: https://cloud.google.com/apigee/docs
repo: https://github.com/apigee/apigeecli
docs: https://cloud.google.com/apigee/docs
package-manager:
  brew: apigeecli
package-manager-url: https://formulae.brew.sh/formula/apigeecli
version: 2.17.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Apigee management API command-line interface
source-archive: https://github.com/apigee/apigeecli/archive/refs/tags/v2.17.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: apigeecli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:apigeecli
  brew: brew install apigeecli
provenance:
  formula: apigeecli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
