id: brew:pass
display-name: pass
homepage: https://www.passwordstore.org/
repo: https://git.zx2c4.com/password-store/snapshot/password-store-1.7.4.tar.xz
docs: https://www.passwordstore.org/
package-manager:
  apk: pass
  brew: pass
  debian: pass
  dnf: pass
  macports: pass
  nix: pass
  pacman: pass
  ubuntu: pass
package-manager-url: https://formulae.brew.sh/formula/pass
version: 1.7.4
license: GPL-2.0-or-later
category: security
tags:
  - cli
description: Password manager
source-archive: https://git.zx2c4.com/password-store/snapshot/password-store-1.7.4.tar.xz
dependencies:
  - gnu-getopt
  - gnupg
  - qrencode
  - tree
executables:
  - exposure: global executable
    kind: cli
    name: pass
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pass
  av: sudo av install brew:pass
  brew: brew install pass
  debian: sudo apt install pass
  dnf: sudo dnf install pass
  macports: sudo port install pass
  nix: nix profile install nixpkgs#pass
  pacman: sudo pacman -S pass
  ubuntu: sudo apt install pass
provenance:
  formula: pass
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
