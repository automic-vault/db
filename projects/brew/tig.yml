id: brew:tig
display-name: tig
homepage: https://jonas.github.io/tig/
repo: https://github.com/jonas/tig
docs: https://jonas.github.io/tig/
package-manager:
  apk: tig
  brew: tig
  debian: tig
  dnf: tig
  macports: tig
  nix: tig
  pacman: tig
  ubuntu: tig
  zypper: tig
package-manager-url: https://formulae.brew.sh/formula/tig
version: 2.6.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
  - git
description: Text interface for Git repositories
source-archive: https://github.com/jonas/tig/releases/download/tig-2.6.0/tig-2.6.0.tar.gz
dependencies:
  - ncurses
  - pcre2
  - readline
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: tig
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    A sample of the default configuration has been installed to:
    $HOMEBREW_PREFIX/opt/tig/share/tig/examples/tigrc to override the system-wide
    default configuration, copy the sample to: $HOMEBREW_PREFIX/etc/tigrc
  post-install-defined: false
install-lines:
  apk: sudo apk add tig
  av: sudo av install brew:tig
  brew: brew install tig
  debian: sudo apt install tig
  dnf: sudo dnf install tig
  macports: sudo port install tig
  nix: nix profile install nixpkgs#tig
  pacman: sudo pacman -S tig
  ubuntu: sudo apt install tig
  zypper: sudo zypper install tig
provenance:
  formula: tig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
