id: brew:homebank
display-name: homebank
homepage: https://www.gethomebank.org/en/index.php
repo: https://www.gethomebank.org/public/sources/homebank-5.10.0.tar.gz
docs: https://www.gethomebank.org/en/index.php
package-manager:
  apk: homebank
  brew: homebank
  chocolatey: homebank
  debian: homebank
  dnf: homebank
  macports: homebank
  nix: homebank
  pacman: homebank
  scoop: extras/homebank
  ubuntu: homebank
  winget: HomeBank.HomeBank
  zypper: homebank
package-manager-url: https://formulae.brew.sh/formula/homebank
version: 5.10.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Manage your personal accounts at home
source-archive: https://www.gethomebank.org/public/sources/homebank-5.10.0.tar.gz
dependencies:
  - adwaita-icon-theme
  - at-spi2-core
  - cairo
  - fontconfig
  - freetype
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - harfbuzz
  - hicolor-icon-theme
  - libofx
  - libsoup
  - pango
build-dependencies:
  - intltool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: homebank
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add homebank
  av: sudo av install brew:homebank
  brew: brew install homebank
  chocolatey: choco install homebank
  debian: sudo apt install homebank
  dnf: sudo dnf install homebank
  macports: sudo port install homebank
  nix: nix profile install nixpkgs#homebank
  pacman: sudo pacman -S homebank
  scoop: scoop install extras/homebank
  ubuntu: sudo apt install homebank
  winget: winget install --id HomeBank.HomeBank -e
  zypper: sudo zypper install homebank
provenance:
  formula: homebank
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
