id: brew:libselinux
display-name: libselinux
homepage: https://github.com/SELinuxProject/selinux
repo: https://github.com/SELinuxProject/selinux
docs: https://github.com/SELinuxProject/selinux
package-manager:
  apk: libselinux
  brew: libselinux
  dnf: libselinux
  nix: libselinux
package-manager-url: https://formulae.brew.sh/formula/libselinux
version: 3.10
license: LicenseRef-Homebrew-public-domain
category: development
tags:
  - cli
description: SELinux library and simple utilities
source-archive: https://github.com/SELinuxProject/selinux/releases/download/3.10/libselinux-3.10.tar.gz
dependencies:
  - libsepol
  - pcre2
build-dependencies:
  - pkgconf
