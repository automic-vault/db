bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libselinux
  av: sudo av install brew:libselinux
  brew: brew install libselinux
  dnf: sudo dnf install libselinux
  nix: nix profile install nixpkgs#libselinux
provenance:
  formula: libselinux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
