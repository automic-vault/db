id: brew:jvgrep
display-name: jvgrep
homepage: https://github.com/mattn/jvgrep
repo: https://github.com/mattn/jvgrep
docs: https://github.com/mattn/jvgrep
package-manager:
  brew: jvgrep
package-manager-url: https://formulae.brew.sh/formula/jvgrep
version: 5.8.16
license: MIT
category: development
tags:
  - cli
description: Grep for Japanese users of Vim
source-archive: https://github.com/mattn/jvgrep/archive/refs/tags/v5.8.16.tar.gz
build-dependencies:
