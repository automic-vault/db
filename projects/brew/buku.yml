id: brew:buku
display-name: buku
homepage: https://github.com/jarun/buku
repo: https://github.com/jarun/buku
docs: https://github.com/jarun/buku
package-manager:
  apk: buku
  brew: buku
  debian: buku
  dnf: buku
  macports: buku
  nix: buku
  ubuntu: buku
package-manager-url: https://formulae.brew.sh/formula/buku
version: 5.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Powerful command-line bookmark manager
source-archive: https://github.com/jarun/buku/archive/refs/tags/v5.1.tar.gz
dependencies:
  - certifi
  - cryptography
  - libyaml
  - python@3.14
  - rpds-py
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: buku
  - exposure: global executable
    kind: cli
    name: bukuserver
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add buku
  av: sudo av install brew:buku
  brew: brew install buku
  debian: sudo apt install buku
  dnf: sudo dnf install buku
  macports: sudo port install buku
  nix: nix profile install nixpkgs#buku
  ubuntu: sudo apt install buku
provenance:
  formula: buku
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
