id: brew:addlicense
display-name: addlicense
homepage: https://github.com/google/addlicense
repo: https://github.com/google/addlicense
docs: https://github.com/google/addlicense
package-manager:
  brew: addlicense
  nix: addlicense
package-manager-url: https://formulae.brew.sh/formula/addlicense
version: 1.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: Scan directories recursively to ensure source files have license headers
source-archive: https://github.com/google/addlicense/archive/refs/tags/v1.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: addlicense
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:addlicense
  brew: brew install addlicense
  nix: nix profile install nixpkgs#addlicense
provenance:
  formula: addlicense
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
