id: brew:pcb
display-name: pcb
homepage: http://pcb.geda-project.org/
repo: https://downloads.sourceforge.net/project/pcb/pcb/pcb-4.3.0/pcb-4.3.0.tar.gz
docs: http://pcb.geda-project.org/
package-manager:
  brew: pcb
  dnf: pcb
  macports: pcb
  nix: pcb
  zypper: pcb
package-manager-url: https://formulae.brew.sh/formula/pcb
version: 4.3.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Interactive printed circuit board editor
source-archive: https://downloads.sourceforge.net/project/pcb/pcb/pcb-4.3.0/pcb-4.3.0.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - dbus
  - gd
  - gdk-pixbuf
  - gettext
  - glib
  - gnu-sed
  - gtk+
  - gtkglext
  - harfbuzz
  - libxrender
  - pango
build-dependencies:
  - intltool
  - pkgconf
uses-from-macos:
  - tcl-tk
executables:
  - exposure: global executable
    kind: cli
    name: MergePCBPS
  - exposure: global executable
    kind: cli
    name: Merge_dimPCBPS
  - exposure: global executable
    kind: cli
    name: pcb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pcb
  brew: brew install pcb
  dnf: sudo dnf install pcb
  macports: sudo port install pcb
  nix: nix profile install nixpkgs#pcb
  zypper: sudo zypper install pcb
provenance:
  formula: pcb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
