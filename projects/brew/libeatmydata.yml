id: brew:libeatmydata
display-name: libeatmydata
homepage: https://www.flamingspork.com/projects/libeatmydata/
repo: https://github.com/stewartsmith/libeatmydata
docs: https://www.flamingspork.com/projects/libeatmydata/
package-manager:
  apk: libeatmydata
  brew: libeatmydata
  debian: eatmydata
  dnf: libeatmydata
  nix: libeatmydata
  pacman: libeatmydata
  ubuntu: eatmydata
  zypper: eatmydata
package-manager-url: https://formulae.brew.sh/formula/libeatmydata
version: 131
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: LD_PRELOAD library and wrapper to transparently disable fsync and related calls
source-archive: >
  https://github.com/stewartsmith/libeatmydata/releases/download/v131/libeatmydata-131.tar.gz
build-dependencies:
  - autoconf
  - autoconf-archive
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: eatmydata
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libeatmydata
  av: sudo av install brew:libeatmydata
  brew: brew install libeatmydata
  debian: sudo apt install eatmydata
  dnf: sudo dnf install libeatmydata
  nix: nix profile install nixpkgs#libeatmydata
  pacman: sudo pacman -S libeatmydata
  ubuntu: sudo apt install eatmydata
  zypper: sudo zypper install eatmydata
provenance:
  formula: libeatmydata
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
