id: brew:simple-obfs
display-name: simple-obfs
homepage: https://github.com/shadowsocks/simple-obfs
repo: https://github.com/shadowsocks/simple-obfs
docs: https://github.com/shadowsocks/simple-obfs
package-manager:
  brew: simple-obfs
  ubuntu: simple-obfs
  zypper: simple-obfs
package-manager-url: https://formulae.brew.sh/formula/simple-obfs
version: 0.0.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Simple obfusacting plugin of shadowsocks-libev
source-archive: https://github.com/shadowsocks/simple-obfs.git
dependencies:
  - libev
build-dependencies:
  - asciidoc
  - autoconf
  - automake
  - libtool
  - xmlto
executables:
  - exposure: global executable
    kind: cli
    name: obfs-local
  - exposure: global executable
    kind: cli
    name: obfs-server
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:simple-obfs
  brew: brew install simple-obfs
  ubuntu: sudo apt install simple-obfs
  zypper: sudo zypper install simple-obfs
provenance:
  formula: simple-obfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
