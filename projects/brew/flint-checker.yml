id: brew:flint-checker
display-name: flint-checker
homepage: https://github.com/pengwynn/flint
repo: https://github.com/pengwynn/flint
docs: https://github.com/pengwynn/flint
package-manager:
  apk: flint
  brew: flint-checker
  dnf: flint
  macports: flint
  nix: flint
  pacman: flint
package-manager-url: https://formulae.brew.sh/formula/flint-checker
version: 0.1.0
license: MIT
category: development
tags:
  - cli
description: Check your project for common sources of contributor friction
source-archive: https://github.com/pengwynn/flint/archive/refs/tags/v0.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: flint
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add flint
  av: sudo av install brew:flint-checker
  brew: brew install flint-checker
  dnf: sudo dnf install flint
  macports: sudo port install flint
  nix: nix profile install nixpkgs#flint
  pacman: sudo pacman -S flint
provenance:
  formula: flint-checker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
