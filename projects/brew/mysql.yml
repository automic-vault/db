bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Upgrading from MySQL <8.4 to MySQL >9.0 requires running MySQL 8.4 first: - brew
    services stop mysql - brew install mysql@8.4 - brew services start mysql@8.4 - brew
    services stop mysql@8.4 - brew services start mysql We've installed your MySQL
    database without a root password. To secure it run: mysql_secure_installation MySQL
    is configured to only allow connections from localhost by default To connect run:
    mysql -u root
  post-install-defined: true
  service: declared
install-lines:
  apk: sudo apk add mysql
  av: sudo av install brew:mysql
  brew: brew install mysql
  chocolatey: choco install mysql
  dnf: sudo dnf install mysql
  pacman: sudo pacman -S mysql++
  scoop: scoop install main/mysql
  ubuntu: sudo apt install mysql-server
  winget: winget install --id Oracle.MySQL -e
provenance:
  formula: mysql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
