id: brew:cyctl
display-name: cyctl
homepage: https://cyclops-ui.com/
repo: https://github.com/cyclops-ui/cyclops
docs: https://cyclops-ui.com/
package-manager:
  brew: cyctl
package-manager-url: https://formulae.brew.sh/formula/cyctl
version: 0.21.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Customizable UI for Kubernetes workloads
source-archive: https://github.com/cyclops-ui/cyclops/archive/refs/tags/v0.21.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cyctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cyctl
  brew: brew install cyctl
provenance:
  formula: cyctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
