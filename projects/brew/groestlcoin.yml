id: brew:groestlcoin
display-name: groestlcoin
homepage: https://www.groestlcoin.org/groestlcoin-core-wallet/
repo: https://github.com/Groestlcoin/groestlcoin
docs: https://www.groestlcoin.org/groestlcoin-core-wallet/
package-manager:
  brew: groestlcoin
  nix: groestlcoin
package-manager-url: https://formulae.brew.sh/formula/groestlcoin
version: 31.0
license: MIT
category: development
tags:
  - cli
description: Decentralized, peer to peer payment network
source-archive: >
  https://github.com/Groestlcoin/groestlcoin/releases/download/v31.0/groestlcoin-31.0.tar.gz
dependencies:
  - capnp
  - libevent
  - zeromq
build-dependencies:
  - boost
  - cmake
  - pkgconf
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: groestlcoin
  - exposure: global executable
    kind: cli
    name: groestlcoin-cli
  - exposure: global executable
    kind: cli
    name: groestlcoin-tx
  - exposure: global executable
    kind: cli
    name: groestlcoin-util
  - exposure: global executable
    kind: cli
    name: groestlcoin-wallet
  - exposure: global executable
    kind: cli
    name: groestlcoind
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:groestlcoin
  brew: brew install groestlcoin
  nix: nix profile install nixpkgs#groestlcoin
provenance:
  formula: groestlcoin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
