id: brew:breezy
display-name: breezy
homepage: https://www.breezy-vcs.org/
repo: >
  https://files.pythonhosted.org/packages/59/1d/68956e351c1af8116ec8525c85faf82ed2484f38f6f4fed4755759073500/breezy-3.3.21.tar.gz
docs: https://www.breezy-vcs.org/
package-manager:
  apk: breezy
  brew: breezy
  chocolatey: bzr
  debian: brz
  dnf: breezy
  macports: bzr
  nix: breezy
  pacman: breezy
  ubuntu: brz
package-manager-url: https://formulae.brew.sh/formula/breezy
version: 3.3.21
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Version control system implemented in Python with multi-format support
source-archive: >
  https://files.pythonhosted.org/packages/59/1d/68956e351c1af8116ec8525c85faf82ed2484f38f6f4fed4755759073500/breezy-3.3.21.tar.gz
dependencies:
  - libyaml
  - python@3.14
build-dependencies:
  - gettext
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: brz
  - exposure: global executable
    kind: cli
    name: bzr
  - exposure: global executable
    kind: cli
    name: bzr-receive-pack
  - exposure: global executable
    kind: cli
    name: bzr-upload-pack
  - exposure: global executable
    kind: cli
    name: git-remote-bzr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add breezy
  av: sudo av install brew:breezy
  brew: brew install breezy
  chocolatey: choco install bzr
  debian: sudo apt install brz
  dnf: sudo dnf install breezy
  macports: sudo port install bzr
  nix: nix profile install nixpkgs#breezy
  pacman: sudo pacman -S breezy
  ubuntu: sudo apt install brz
provenance:
  formula: breezy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
