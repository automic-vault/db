id: brew:mypy
display-name: mypy
homepage: https://www.mypy-lang.org/
repo: >
  https://files.pythonhosted.org/packages/82/15/cca9d88503549ed6fedeaa1d448cdddd542ee8a490232d732e278036fbf2/mypy-2.1.0.tar.gz
docs: https://www.mypy-lang.org/
package-manager:
  brew: mypy
  debian: mypy
  nix: mypy
  pacman: mypy
  ubuntu: mypy
package-manager-url: https://formulae.brew.sh/formula/mypy
version: 2.1.0
license: MIT
category: network
tags:
  - cli
description: Experimental optional static type checker for Python
source-archive: >
  https://files.pythonhosted.org/packages/82/15/cca9d88503549ed6fedeaa1d448cdddd542ee8a490232d732e278036fbf2/mypy-2.1.0.tar.gz
dependencies:
  - python@3.14
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dmypy
  - exposure: global executable
    kind: cli
    name: mypy
  - exposure: global executable
    kind: cli
    name: mypyc
  - exposure: global executable
    kind: cli
    name: stubgen
  - exposure: global executable
    kind: cli
    name: stubtest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mypy
  brew: brew install mypy
  debian: sudo apt install mypy
  nix: nix profile install nixpkgs#mypy
  pacman: sudo pacman -S mypy
  ubuntu: sudo apt install mypy
provenance:
  formula: mypy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
