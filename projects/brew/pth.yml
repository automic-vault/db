id: brew:pth
display-name: pth
homepage: https://www.gnu.org/software/pth/
repo: https://ftpmirror.gnu.org/gnu/pth/pth-2.0.7.tar.gz
docs: https://www.gnu.org/software/pth/
package-manager:
  brew: pth
  macports: pth
  nix: pth
package-manager-url: https://formulae.brew.sh/formula/pth
version: 2.0.7
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: GNU Portable THreads
source-archive: https://ftpmirror.gnu.org/gnu/pth/pth-2.0.7.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: pth-config
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pth
  brew: brew install pth
  macports: sudo port install pth
  nix: nix profile install nixpkgs#pth
provenance:
  formula: pth
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
