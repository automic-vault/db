id: brew:iccdev
display-name: iccdev
homepage: https://github.com/InternationalColorConsortium/iccDEV
repo: https://github.com/InternationalColorConsortium/iccDEV
docs: https://github.com/InternationalColorConsortium/iccDEV
package-manager:
  brew: iccdev
package-manager-url: https://formulae.brew.sh/formula/iccdev
version: 2.3.2.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Developer tools for interacting with and manipulating ICC profiles
source-archive: https://github.com/InternationalColorConsortium/iccDEV/archive/refs/tags/v2.3.2.0.tar.gz
dependencies:
  - jpeg-turbo
  - libpng
  - libtiff
  - wxwidgets
build-dependencies:
  - cmake
  - nlohmann-json
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: iccApplyNamedCmm
  - exposure: global executable
    kind: cli
    name: iccApplyProfiles
  - exposure: global executable
    kind: cli
    name: iccApplySearch
  - exposure: global executable
    kind: cli
    name: iccApplyToLink
  - exposure: global executable
    kind: cli
    name: iccDescribeSinkTest
  - exposure: global executable
    kind: cli
    name: iccDumpProfile
  - exposure: global executable
    kind: cli
    name: iccDumpProfileGui
  - exposure: global executable
    kind: cli
    name: iccFromCube
  - exposure: global executable
    kind: cli
    name: iccFromJson
  - exposure: global executable
    kind: cli
    name: iccFromXml
  - exposure: global executable
    kind: cli
    name: iccPngDump
  - exposure: global executable
    kind: cli
    name: iccProfileVisualize
  - exposure: global executable
    kind: cli
    name: iccRoundTrip
  - exposure: global executable
    kind: cli
    name: iccSpecSepToTiff
  - exposure: global executable
    kind: cli
    name: iccTiffDump
  - exposure: global executable
    kind: cli
    name: iccToJson
  - exposure: global executable
    kind: cli
    name: iccToXml
  - exposure: global executable
    kind: cli
    name: iccV5DspObsToV4Dsp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:iccdev
  brew: brew install iccdev
provenance:
  formula: iccdev
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
