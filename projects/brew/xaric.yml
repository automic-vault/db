id: brew:xaric
display-name: xaric
homepage: https://xaric.org/
repo: https://xaric.org/software/xaric/releases/xaric-0.13.9.tar.gz
docs: https://xaric.org/
package-manager:
  brew: xaric
package-manager-url: https://formulae.brew.sh/formula/xaric
version: 0.13.9
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: IRC client
source-archive: https://xaric.org/software/xaric/releases/xaric-0.13.9.tar.gz
dependencies:
  - openssl@4
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: xaric
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xaric
  brew: brew install xaric
provenance:
  formula: xaric
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
