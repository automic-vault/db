id: brew:tile38
display-name: tile38
homepage: https://tile38.com/
repo: https://github.com/tidwall/tile38
docs: https://tile38.com/
package-manager:
  brew: tile38
  nix: tile38
package-manager-url: https://formulae.brew.sh/formula/tile38
version: 1.37.0
license: MIT
category: development
tags:
  - cli
description: In-memory geolocation data store, spatial index, and realtime geofence
source-archive: https://github.com/tidwall/tile38.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tile38-cli
  - exposure: global executable
    kind: cli
    name: tile38-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:tile38
  brew: brew install tile38
  nix: nix profile install nixpkgs#tile38
provenance:
  formula: tile38
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
