id: brew:dvisvgm
display-name: dvisvgm
homepage: https://dvisvgm.de
repo: https://github.com/mgieseki/dvisvgm
docs: https://dvisvgm.de
package-manager:
  apk: dvisvgm
  brew: dvisvgm
  debian: dvisvgm
  macports: dvisvgm
  pacman: dvisvgm
  ubuntu: dvisvgm
package-manager-url: https://formulae.brew.sh/formula/dvisvgm
version: 3.6
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Fast DVI to SVG converter
source-archive: https://github.com/mgieseki/dvisvgm/releases/download/3.6/dvisvgm-3.6.tar.gz
dependencies:
  - brotli
  - freetype
  - ghostscript
  - potrace
  - texlive
  - woff2
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dvisvgm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dvisvgm
  av: sudo av install brew:dvisvgm
  brew: brew install dvisvgm
  debian: sudo apt install dvisvgm
  macports: sudo port install dvisvgm
  pacman: sudo pacman -S dvisvgm
  ubuntu: sudo apt install dvisvgm
provenance:
  formula: dvisvgm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
