id: brew:libftdi
display-name: libftdi
homepage: https://www.intra2net.com/en/developer/libftdi
repo: https://www.intra2net.com/en/developer/libftdi/download/libftdi1-1.5.tar.bz2
docs: https://www.intra2net.com/en/developer/libftdi
package-manager:
  brew: libftdi
  debian: ftdi-eeprom
  dnf: libftdi
  macports: libftdi
  nix: libftdi
  pacman: libftdi
  ubuntu: ftdi-eeprom
package-manager-url: https://formulae.brew.sh/formula/libftdi
version: 1.5
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Library to talk to FTDI chips
source-archive: https://www.intra2net.com/en/developer/libftdi/download/libftdi1-1.5.tar.bz2
dependencies:
  - boost
  - confuse
  - libusb
build-dependencies:
  - cmake
  - pkgconf
  - swig
executables:
  - exposure: global executable
    kind: cli
    name: ftdi_eeprom
  - exposure: global executable
    kind: cli
    name: libftdi1-config
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libftdi
  brew: brew install libftdi
  debian: sudo apt install ftdi-eeprom
  dnf: sudo dnf install libftdi
  macports: sudo port install libftdi
  nix: nix profile install nixpkgs#libftdi
  pacman: sudo pacman -S libftdi
  ubuntu: sudo apt install ftdi-eeprom
provenance:
  formula: libftdi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
