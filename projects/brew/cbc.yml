id: brew:cbc
display-name: cbc
homepage: https://github.com/coin-or/Cbc
repo: https://github.com/coin-or/Cbc
docs: https://github.com/coin-or/Cbc
package-manager:
  brew: cbc
  nix: cbc
package-manager-url: https://formulae.brew.sh/formula/cbc
version: 2.10.13
license: EPL-2.0
category: development
tags:
  - cli
description: Mixed integer linear programming solver
source-archive: https://github.com/coin-or/Cbc/archive/refs/tags/releases/2.10.13.tar.gz
dependencies:
  - cgl
  - clp
  - coinutils
  - openblas
  - osi
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cbc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cbc
  brew: brew install cbc
  nix: nix profile install nixpkgs#cbc
provenance:
  formula: cbc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
