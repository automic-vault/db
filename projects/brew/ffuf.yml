id: brew:ffuf
display-name: ffuf
homepage: https://github.com/ffuf/ffuf
repo: https://github.com/ffuf/ffuf
docs: https://github.com/ffuf/ffuf
package-manager:
  apk: ffuf
  brew: ffuf
  debian: ffuf
  dnf: ffuf
  macports: ffuf
  nix: ffuf
  scoop: main/ffuf
  ubuntu: ffuf
  winget: ffuf.ffuf
package-manager-url: https://formulae.brew.sh/formula/ffuf
version: 2.1.0
license: MIT
category: development
tags:
  - cli
description: Fast web fuzzer written in Go
source-archive: https://github.com/ffuf/ffuf/archive/refs/tags/v2.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ffuf
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ffuf
  av: sudo av install brew:ffuf
  brew: brew install ffuf
  debian: sudo apt install ffuf
  dnf: sudo dnf install ffuf
  macports: sudo port install ffuf
  nix: nix profile install nixpkgs#ffuf
  scoop: scoop install main/ffuf
  ubuntu: sudo apt install ffuf
  winget: winget install --id ffuf.ffuf -e
provenance:
  formula: ffuf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
