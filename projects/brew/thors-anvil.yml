id: brew:thors-anvil
display-name: thors-anvil
homepage: https://github.com/Loki-Astari/ThorsAnvil
repo: https://github.com/Loki-Astari/ThorsAnvil
docs: https://github.com/Loki-Astari/ThorsAnvil
package-manager:
  brew: thors-anvil
package-manager-url: https://formulae.brew.sh/formula/thors-anvil
version: 10.2.3
license: MIT
category: development
tags:
  - cli
description: Set of modern C++20 libraries for writing interactive Web-Services
source-archive: https://github.com/Loki-Astari/ThorsAnvil.git
dependencies:
  - boost
  - libevent
  - libyaml
  - magic_enum
  - openssl@3
  - snappy
build-dependencies:
  - cmake
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: SlackCLI
  - exposure: global executable
    kind: cli
    name: SlackCLI20
  - exposure: global executable
    kind: cli
    name: SlackCLI20D
  - exposure: global executable
    kind: cli
    name: SlackCLID
  - exposure: global executable
    kind: cli
    name: mug
  - exposure: global executable
    kind: cli
    name: mug20
  - exposure: global executable
    kind: cli
    name: mug20D
  - exposure: global executable
    kind: cli
    name: mugD
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:thors-anvil
  brew: brew install thors-anvil
provenance:
  formula: thors-anvil
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
