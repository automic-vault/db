id: brew:loki
display-name: loki
homepage: https://grafana.com/loki
repo: https://github.com/grafana/loki
docs: https://grafana.com/loki
package-manager:
  apk: loki
  brew: loki
  debian: loki
  nix: loki
  pacman: loki
  ubuntu: loki
  zypper: loki
package-manager-url: https://formulae.brew.sh/formula/loki
version: 3.7.2
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Horizontally-scalable, highly-available log aggregation system
source-archive: https://github.com/grafana/loki/archive/refs/tags/v3.7.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: loki
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add loki
  av: sudo av install brew:loki
  brew: brew install loki
  debian: sudo apt install loki
  nix: nix profile install nixpkgs#loki
  pacman: sudo pacman -S loki
  ubuntu: sudo apt install loki
  zypper: sudo zypper install loki
provenance:
  formula: loki
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
