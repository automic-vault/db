id: brew:librsvg
display-name: librsvg
homepage: https://wiki.gnome.org/Projects/LibRsvg
repo: https://download.gnome.org/sources/librsvg/2.62/librsvg-2.62.2.tar.xz
docs: https://wiki.gnome.org/Projects/LibRsvg
package-manager:
  apk: librsvg
  brew: librsvg
  chocolatey: rsvg-convert
  macports: librsvg
  nix: librsvg
  pacman: librsvg
  zypper: rsvg-convert
package-manager-url: https://formulae.brew.sh/formula/librsvg
version: 2.62.2
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Library to render SVG files using Cairo
source-archive: https://download.gnome.org/sources/librsvg/2.62/librsvg-2.62.2.tar.xz
dependencies:
  - cairo
  - fontconfig
  - freetype
  - gdk-pixbuf
  - gettext
  - glib
  - harfbuzz
  - libpng
  - pango
build-dependencies:
  - cargo-c
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - rust
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: rsvg-convert
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add librsvg
  av: sudo av install brew:librsvg
  brew: brew install librsvg
  chocolatey: choco install rsvg-convert
  macports: sudo port install librsvg
  nix: nix profile install nixpkgs#librsvg
  pacman: sudo pacman -S librsvg
  zypper: sudo zypper install rsvg-convert
provenance:
  formula: librsvg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
