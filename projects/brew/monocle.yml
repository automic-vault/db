id: brew:monocle
display-name: monocle
homepage: https://github.com/bgpkit/monocle
repo: https://github.com/bgpkit/monocle
docs: https://github.com/bgpkit/monocle
package-manager:
  brew: monocle
  nix: monocle
package-manager-url: https://formulae.brew.sh/formula/monocle
version: 1.2.0
license: MIT
category: development
tags:
  - cli
description: See through all BGP data with a monocle
source-archive: https://github.com/bgpkit/monocle/archive/refs/tags/v1.2.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: monocle
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:monocle
  brew: brew install monocle
  nix: nix profile install nixpkgs#monocle
provenance:
  formula: monocle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
