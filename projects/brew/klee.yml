id: brew:klee
display-name: klee
homepage: https://klee-se.org
repo: https://github.com/klee/klee
docs: https://klee-se.org
package-manager:
  brew: klee
  nix: klee
  zypper: klee
package-manager-url: https://formulae.brew.sh/formula/klee
version: 3.2
license: NCSA
category: development
tags:
  - cli
description: Symbolic Execution Engine
source-archive: https://github.com/klee/klee/archive/refs/tags/v3.2.tar.gz
dependencies:
  - cryptominisat
  - gmp
  - gperftools
  - llvm@16
  - minisat
  - python@3.14
  - sqlite
  - stp
  - wllvm
  - z3
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: kleaver
  - exposure: global executable
    kind: cli
    name: klee
  - exposure: global executable
    kind: cli
    name: klee-exec-tree
  - exposure: global executable
    kind: cli
    name: klee-replay
  - exposure: global executable
    kind: cli
    name: klee-stats
  - exposure: global executable
    kind: cli
    name: klee-zesti
  - exposure: global executable
    kind: cli
    name: ktest-gen
  - exposure: global executable
    kind: cli
    name: ktest-randgen
  - exposure: global executable
    kind: cli
    name: ktest-tool
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:klee
  brew: brew install klee
  nix: nix profile install nixpkgs#klee
  zypper: sudo zypper install klee
provenance:
  formula: klee
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
