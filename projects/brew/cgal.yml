id: brew:cgal
display-name: cgal
homepage: https://www.cgal.org/
repo: https://github.com/CGAL/cgal
docs: https://www.cgal.org/
package-manager:
  apk: cgal
  brew: cgal
  nix: cgal
  pacman: cgal
package-manager-url: https://formulae.brew.sh/formula/cgal
version: 6.1.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Computational Geometry Algorithms Library
source-archive: https://github.com/CGAL/cgal/releases/download/v6.1.1/CGAL-6.1.1.tar.xz
dependencies:
  - boost
  - eigen
  - gmp
  - mpfr
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: cgal_create_CMakeLists
  - exposure: global executable
    kind: cli
    name: cgal_create_cmake_script
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cgal
  av: sudo av install brew:cgal
  brew: brew install cgal
  nix: nix profile install nixpkgs#cgal
  pacman: sudo pacman -S cgal
provenance:
  formula: cgal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
