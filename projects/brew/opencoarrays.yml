id: brew:opencoarrays
display-name: opencoarrays
homepage: http://www.opencoarrays.org
repo: https://github.com/sourceryinstitute/OpenCoarrays
docs: http://www.opencoarrays.org
package-manager:
  brew: opencoarrays
  macports: OpenCoarrays
  nix: caf
package-manager-url: https://formulae.brew.sh/formula/opencoarrays
version: 2.10.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: Open-source coarray Fortran ABI, API, and compiler wrapper
source-archive: https://github.com/sourceryinstitute/OpenCoarrays/archive/refs/tags/2.10.3.tar.gz
dependencies:
  - gcc@13
  - open-mpi
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: caf
  - exposure: global executable
    kind: cli
    name: cafrun
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:opencoarrays
  brew: brew install opencoarrays
  macports: sudo port install OpenCoarrays
  nix: nix profile install nixpkgs#caf
provenance:
  formula: opencoarrays
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
