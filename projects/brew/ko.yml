id: brew:ko
display-name: ko
homepage: https://ko.build
repo: https://github.com/ko-build/ko
docs: https://ko.build
package-manager:
  apk: ko
  brew: ko
  macports: ko
  nix: ko
  pacman: ko
  scoop: main/ko
package-manager-url: https://formulae.brew.sh/formula/ko
version: 0.18.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Build and deploy Go applications on Kubernetes
source-archive: https://github.com/ko-build/ko/archive/refs/tags/v0.18.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ko
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ko
  av: sudo av install brew:ko
  brew: brew install ko
  macports: sudo port install ko
  nix: nix profile install nixpkgs#ko
  pacman: sudo pacman -S ko
  scoop: scoop install main/ko
provenance:
  formula: ko
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
