id: brew:dwarfutils
display-name: dwarfutils
homepage: https://www.prevanders.net/dwarf.html
repo: https://www.prevanders.net/libdwarf-2.3.1.tar.xz
docs: https://www.prevanders.net/dwarf.html
package-manager:
  brew: dwarfutils
  debian: dwarfdump
  nix: dwarfdump
  ubuntu: dwarfdump
package-manager-url: https://formulae.brew.sh/formula/dwarfutils
version: 2.3.1
license: BSD-2-Clause AND LGPL-2.1-or-later AND GPL-2.0-or-later
category: development
tags:
  - cli
description: Dump and produce DWARF debug information in ELF objects
source-archive: https://www.prevanders.net/libdwarf-2.3.1.tar.xz
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dwarfdump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dwarfutils
  brew: brew install dwarfutils
  debian: sudo apt install dwarfdump
  nix: nix profile install nixpkgs#dwarfdump
  ubuntu: sudo apt install dwarfdump
provenance:
  formula: dwarfutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
