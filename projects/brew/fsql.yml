id: brew:fsql
display-name: fsql
homepage: https://github.com/kashav/fsql
repo: https://github.com/kashav/fsql
docs: https://github.com/kashav/fsql
package-manager:
  brew: fsql
  macports: fsql
  nix: fsql
package-manager-url: https://formulae.brew.sh/formula/fsql
version: 0.5.2
license: MIT
category: database
tags:
  - cli
description: Search through your filesystem with SQL-esque queries
source-archive: https://github.com/kashav/fsql/archive/refs/tags/v0.5.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fsql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fsql
  brew: brew install fsql
  macports: sudo port install fsql
  nix: nix profile install nixpkgs#fsql
provenance:
  formula: fsql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
