id: brew:debianutils
display-name: debianutils
homepage: https://tracker.debian.org/pkg/debianutils
repo: https://deb.debian.org/debian/pool/main/d/debianutils/debianutils_5.23.2.tar.xz
docs: https://tracker.debian.org/pkg/debianutils
package-manager:
  apk: run-parts
  brew: debianutils
  debian: debianutils
  macports: debianutils
  nix: debianutils
  pacman: run-parts
  ubuntu: debianutils
  zypper: debianutils
package-manager-url: https://formulae.brew.sh/formula/debianutils
version: 5.23.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Miscellaneous utilities specific to Debian
source-archive: https://deb.debian.org/debian/pool/main/d/debianutils/debianutils_5.23.2.tar.xz
build-dependencies:
  - autoconf
  - automake
  - gettext
  - libtool
  - po4a
executables:
  - exposure: global executable
    kind: cli
    name: ischroot
  - exposure: global executable
    kind: cli
    name: run-parts
  - exposure: global executable
    kind: cli
    name: tempfile
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add run-parts
  av: sudo av install brew:debianutils
  brew: brew install debianutils
  debian: sudo apt install debianutils
  macports: sudo port install debianutils
  nix: nix profile install nixpkgs#debianutils
  pacman: sudo pacman -S run-parts
  ubuntu: sudo apt install debianutils
  zypper: sudo zypper install debianutils
provenance:
  formula: debianutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
