id: brew:woof-doom
display-name: woof-doom
homepage: https://github.com/fabiangreffrath/woof
repo: https://github.com/fabiangreffrath/woof
docs: https://github.com/fabiangreffrath/woof
package-manager:
  brew: woof-doom
  debian: woof-doom
  nix: woof-doom
  ubuntu: woof-doom
  winget: ondrejsikax.woof
package-manager-url: https://formulae.brew.sh/formula/woof-doom
version: 15.3.0
license: >
  GPL-2.0-or-later AND GPL-3.0-or-later AND BSD-2-Clause AND BSD-3-Clause AND CC-BY-3.0
  AND CC0-1.0 AND GPL-2.0-only AND MIT AND NCL AND LicenseRef-Homebrew-public-domain
category: development
tags:
  - cli
description: Woof! is a continuation of the Boom/MBF bloodline of Doom source ports
source-archive: https://github.com/fabiangreffrath/woof/archive/refs/tags/woof_15.3.0.tar.gz
dependencies:
  - fluid-synth
  - libebur128
  - libsndfile
  - libxmp
  - openal-soft
  - sdl2
  - sdl2_net
  - yyjson
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: woof
  - exposure: global executable
    kind: cli
    name: woof-setup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:woof-doom
  brew: brew install woof-doom
  debian: sudo apt install woof-doom
  nix: nix profile install nixpkgs#woof-doom
  ubuntu: sudo apt install woof-doom
  winget: winget install --id ondrejsikax.woof -e
provenance:
  formula: woof-doom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
