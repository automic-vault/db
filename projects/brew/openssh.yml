id: brew:openssh
display-name: openssh
homepage: https://www.openssh.com/
repo: https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-10.3p1.tar.gz
docs: https://www.openssh.com/
package-manager:
  apk: openssh
  brew: openssh
  chocolatey: openssh
  debian: ssh
  dnf: openssh
  macports: openssh
  nix: openssh
  pacman: openssh
  scoop: main/openssh
  ubuntu: ssh
  winget: Syncplify.Server
  zypper: openssh
package-manager-url: https://formulae.brew.sh/formula/openssh
version: 10.3p1
license: SSH-OpenSSH
category: network
tags:
  - cli
description: OpenBSD freely-licensed SSH connectivity tools
source-archive: https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-10.3p1.tar.gz
dependencies:
  - ldns
  - libfido2
  - openssl@3
build-dependencies:
  - pkgconf
uses-from-macos:
  - krb5
  - libedit
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: scp
  - exposure: global executable
    kind: cli
    name: sftp
  - exposure: global executable
    kind: cli
    name: slogin
  - exposure: global executable
    kind: cli
    name: ssh
  - exposure: global executable
    kind: cli
    name: ssh-add
  - exposure: global executable
    kind: cli
    name: ssh-agent
  - exposure: global executable
    kind: cli
    name: ssh-keygen
  - exposure: global executable
    kind: cli
    name: ssh-keyscan
  - exposure: global executable
    kind: cli
    name: sshd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add openssh
  av: sudo av install brew:openssh
  brew: brew install openssh
  chocolatey: choco install openssh
  debian: sudo apt install ssh
  dnf: sudo dnf install openssh
  macports: sudo port install openssh
  nix: nix profile install nixpkgs#openssh
  pacman: sudo pacman -S openssh
  scoop: scoop install main/openssh
  ubuntu: sudo apt install ssh
  winget: winget install --id Syncplify.Server -e
  zypper: sudo zypper install openssh
provenance:
  formula: openssh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
