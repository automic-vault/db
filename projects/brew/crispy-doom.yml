id: brew:crispy-doom
display-name: crispy-doom
homepage: https://github.com/fabiangreffrath/crispy-doom
repo: https://github.com/fabiangreffrath/crispy-doom
docs: https://github.com/fabiangreffrath/crispy-doom
package-manager:
  apk: crispy-doom
  brew: crispy-doom
  debian: crispy-doom
  macports: crispy-doom
  nix: crispy-doom
  ubuntu: crispy-doom
  zypper: crispy-doom
package-manager-url: https://formulae.brew.sh/formula/crispy-doom
version: 7.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Limit-removing enhanced-resolution Doom source port based on Chocolate Doom
source-archive: https://github.com/fabiangreffrath/crispy-doom/archive/refs/tags/crispy-doom-7.1.tar.gz
dependencies:
  - fluid-synth
  - libpng
  - libsamplerate
  - sdl2
  - sdl2_mixer
  - sdl2_net
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: crispy-doom
  - exposure: global executable
    kind: cli
    name: crispy-doom-setup
  - exposure: global executable
    kind: cli
    name: crispy-heretic
  - exposure: global executable
    kind: cli
    name: crispy-heretic-setup
  - exposure: global executable
    kind: cli
    name: crispy-hexen
  - exposure: global executable
    kind: cli
    name: crispy-hexen-setup
  - exposure: global executable
    kind: cli
    name: crispy-server
  - exposure: global executable
    kind: cli
    name: crispy-strife
  - exposure: global executable
    kind: cli
    name: crispy-strife-setup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add crispy-doom
  av: sudo av install brew:crispy-doom
  brew: brew install crispy-doom
  debian: sudo apt install crispy-doom
  macports: sudo port install crispy-doom
  nix: nix profile install nixpkgs#crispy-doom
  ubuntu: sudo apt install crispy-doom
  zypper: sudo zypper install crispy-doom
provenance:
  formula: crispy-doom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
