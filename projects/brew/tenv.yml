id: brew:tenv
display-name: tenv
homepage: https://tofuutils.github.io/tenv/
repo: https://github.com/tofuutils/tenv
docs: https://tofuutils.github.io/tenv/
package-manager:
  apk: tenv
  brew: tenv
  macports: tenv
  nix: tenv
  scoop: main/tenv
  ubuntu: tf
  winget: Tofuutils.Tenv
package-manager-url: https://formulae.brew.sh/formula/tenv
version: 4.12.2
license: Apache-2.0
category: cloud
tags:
  - cli
description: OpenTofu / Terraform / Terragrunt / Terramate / Atmos version manager
source-archive: https://github.com/tofuutils/tenv/archive/refs/tags/v4.12.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: atmos
  - exposure: global executable
    kind: cli
    name: tenv
  - exposure: global executable
    kind: cli
    name: terramate
  - exposure: global executable
    kind: cli
    name: tf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tenv
  av: sudo av install brew:tenv
  brew: brew install tenv
  macports: sudo port install tenv
  nix: nix profile install nixpkgs#tenv
  scoop: scoop install main/tenv
  ubuntu: sudo apt install tf
  winget: winget install --id Tofuutils.Tenv -e
provenance:
  formula: tenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
