id: brew:zvbi
display-name: zvbi
homepage: https://github.com/zapping-vbi/zvbi
repo: https://github.com/zapping-vbi/zvbi
docs: https://github.com/zapping-vbi/zvbi
package-manager:
  apk: zvbi
  brew: zvbi
  debian: zvbi
  dnf: zvbi
  macports: zvbi
  nix: zvbi
  pacman: zvbi
  ubuntu: zvbi
  zypper: zvbi
package-manager-url: https://formulae.brew.sh/formula/zvbi
version: 0.2.44
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Vertical Blanking Interval (VBI) decoding library
source-archive: https://github.com/zapping-vbi/zvbi/archive/refs/tags/v0.2.44.tar.gz
dependencies:
  - gettext
  - libpng
build-dependencies:
  - autoconf
  - automake
  - gettext
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: zvbi-atsc-cc
  - exposure: global executable
    kind: cli
    name: zvbi-chains
  - exposure: global executable
    kind: cli
    name: zvbi-ntsc-cc
  - exposure: global executable
    kind: cli
    name: zvbid
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zvbi
  av: sudo av install brew:zvbi
  brew: brew install zvbi
  debian: sudo apt install zvbi
  dnf: sudo dnf install zvbi
  macports: sudo port install zvbi
  nix: nix profile install nixpkgs#zvbi
  pacman: sudo pacman -S zvbi
  ubuntu: sudo apt install zvbi
  zypper: sudo zypper install zvbi
provenance:
  formula: zvbi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
