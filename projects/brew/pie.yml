id: brew:pie
display-name: pie
homepage: https://github.com/php/pie
repo: https://github.com/php/pie
docs: https://github.com/php/pie
package-manager:
  brew: pie
  dnf: pie
package-manager-url: https://formulae.brew.sh/formula/pie
version: 1.4.5
license: BSD-3-Clause
category: development
tags:
  - cli
description: PHP Installer for Extensions
source-archive: https://github.com/php/pie/releases/download/1.4.5/pie.phar
dependencies:
  - php
executables:
  - exposure: global executable
    kind: cli
    name: pie
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pie
  brew: brew install pie
  dnf: sudo dnf install pie
provenance:
  formula: pie
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
