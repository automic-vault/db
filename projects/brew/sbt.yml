id: brew:sbt
display-name: sbt
homepage: https://www.scala-sbt.org/
repo: https://github.com/sbt/sbt
docs: https://www.scala-sbt.org/
package-manager:
  brew: sbt
  chocolatey: sbt
  macports: sbt
  nix: sbt
  pacman: sbt
  scoop: main/sbt
  winget: sbt.sbt
package-manager-url: https://formulae.brew.sh/formula/sbt
version: 1.12.11
license: Apache-2.0
category: development
tags:
  - cli
description: Build tool for Scala projects
source-archive: https://github.com/sbt/sbt/releases/download/v1.12.11/sbt-1.12.11.tgz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: sbt
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You can use $SBT_OPTS to pass additional JVM options to sbt. Project specific
    options should be placed in .sbtopts in the root of your project. Global settings
    should be placed in $HOMEBREW_PREFIX/etc/sbtopts The installation does not include
    `sbtn`.
  post-install-defined: false
install-lines:
  av: sudo av install brew:sbt
  brew: brew install sbt
  chocolatey: choco install sbt
  macports: sudo port install sbt
  nix: nix profile install nixpkgs#sbt
  pacman: sudo pacman -S sbt
  scoop: scoop install main/sbt
  winget: winget install --id sbt.sbt -e
provenance:
  formula: sbt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
