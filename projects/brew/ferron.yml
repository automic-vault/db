id: brew:ferron
display-name: ferron
homepage: https://www.ferronweb.org/
repo: https://github.com/ferronweb/ferron
docs: https://www.ferronweb.org/
package-manager:
  brew: ferron
  nix: ferron
package-manager-url: https://formulae.brew.sh/formula/ferron
version: 2.7.0
license: MIT
category: development
tags:
  - cli
description: Fast, memory-safe web server written in Rust
source-archive: https://github.com/ferronweb/ferron/archive/refs/tags/2.7.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ferron
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ferron
  brew: brew install ferron
  nix: nix profile install nixpkgs#ferron
provenance:
  formula: ferron
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
