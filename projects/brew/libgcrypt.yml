id: brew:libgcrypt
display-name: libgcrypt
homepage: https://gnupg.org/related_software/libgcrypt/
repo: https://gnupg.org/ftp/gcrypt/libgcrypt/libgcrypt-1.12.2.tar.bz2
docs: https://gnupg.org/related_software/libgcrypt/
package-manager:
  apk: libgcrypt
  brew: libgcrypt
  dnf: libgcrypt
  macports: libgcrypt
  nix: libgcrypt
  pacman: libgcrypt
package-manager-url: https://formulae.brew.sh/formula/libgcrypt
version: 1.12.2
license: LGPL-2.1-or-later AND GPL-2.0-or-later
category: security
tags:
  - cli
description: Cryptographic library based on the code from GnuPG
source-archive: https://gnupg.org/ftp/gcrypt/libgcrypt/libgcrypt-1.12.2.tar.bz2
dependencies:
  - libgpg-error
executables:
  - exposure: global executable
    kind: cli
    name: dumpsexp
  - exposure: global executable
    kind: cli
    name: hmac256
  - exposure: global executable
    kind: cli
    name: libgcrypt-config
  - exposure: global executable
    kind: cli
    name: mpicalc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libgcrypt
  av: sudo av install brew:libgcrypt
  brew: brew install libgcrypt
  dnf: sudo dnf install libgcrypt
  macports: sudo port install libgcrypt
  nix: nix profile install nixpkgs#libgcrypt
  pacman: sudo pacman -S libgcrypt
provenance:
  formula: libgcrypt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
