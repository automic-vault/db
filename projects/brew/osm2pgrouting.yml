id: brew:osm2pgrouting
display-name: osm2pgrouting
homepage: https://pgrouting.org/docs/tools/osm2pgrouting.html
repo: https://github.com/pgRouting/osm2pgrouting
docs: https://pgrouting.org/docs/tools/osm2pgrouting.html
package-manager:
  brew: osm2pgrouting
  debian: osm2pgrouting
  macports: osm2pgrouting
  ubuntu: osm2pgrouting
package-manager-url: https://formulae.brew.sh/formula/osm2pgrouting
version: 3.0.0
license: GPL-2.0-or-later
category: database
tags:
  - cli
  - database
description: Import OSM data into pgRouting database
source-archive: https://github.com/pgRouting/osm2pgrouting/archive/refs/tags/v3.0.0.tar.gz
dependencies:
  - boost
  - libpq
  - libpqxx
  - pgrouting
  - postgis
build-dependencies:
  - cmake
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: osm2pgrouting
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:osm2pgrouting
  brew: brew install osm2pgrouting
  debian: sudo apt install osm2pgrouting
  macports: sudo port install osm2pgrouting
  ubuntu: sudo apt install osm2pgrouting
provenance:
  formula: osm2pgrouting
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
