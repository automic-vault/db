id: brew:opencolorio
display-name: opencolorio
homepage: https://opencolorio.org/
repo: https://github.com/AcademySoftwareFoundation/OpenColorIO
docs: https://opencolorio.org/
package-manager:
  apk: opencolorio
  brew: opencolorio
  dnf: OpenColorIO
  macports: opencolorio
  nix: opencolorio
  pacman: opencolorio
package-manager-url: https://formulae.brew.sh/formula/opencolorio
version: 2.5.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Color management solution geared towards motion picture production
source-archive: https://github.com/AcademySoftwareFoundation/OpenColorIO/archive/refs/tags/v2.5.2.tar.gz
dependencies:
  - imath
  - little-cms2
  - minizip-ng
  - openexr
  - pystring
  - yaml-cpp
  - zlib-ng-compat
build-dependencies:
  - cmake
  - pybind11
  - python@3.14
  - sse2neon
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: ocioarchive
  - exposure: global executable
    kind: cli
    name: ociobakelut
  - exposure: global executable
    kind: cli
    name: ociocheck
  - exposure: global executable
    kind: cli
    name: ociochecklut
  - exposure: global executable
    kind: cli
    name: ocioconvert
  - exposure: global executable
    kind: cli
    name: ociocpuinfo
  - exposure: global executable
    kind: cli
    name: ociolutimage
  - exposure: global executable
    kind: cli
    name: ociomakeclf
  - exposure: global executable
    kind: cli
    name: ociomergeconfigs
  - exposure: global executable
    kind: cli
    name: ocioperf
  - exposure: global executable
    kind: cli
    name: ociowrite
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    OpenColorIO requires several environment variables to be set. You can source the
    following script in your shell-startup to do that:
    $HOMEBREW_PREFIX/share/ocio/setup_ocio.sh Alternatively the documentation describes
    what env-variables need set:
    https://opencolorio.org/installation.html#environment-variables You will require a
    config for OCIO to be useful. Sample configuration files and reference images can be
    found at: https://opencolorio.org/downloads.html
  post-install-defined: false
install-lines:
  apk: sudo apk add opencolorio
  av: sudo av install brew:opencolorio
  brew: brew install opencolorio
  dnf: sudo dnf install OpenColorIO
  macports: sudo port install opencolorio
  nix: nix profile install nixpkgs#opencolorio
  pacman: sudo pacman -S opencolorio
provenance:
  formula: opencolorio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
