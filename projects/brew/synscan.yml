id: brew:synscan
display-name: synscan
homepage: https://digit-labs.org/files/tools/synscan/
repo: https://digit-labs.org/files/tools/synscan/releases/synscan-5.02.tar.gz
docs: https://digit-labs.org/files/tools/synscan/
package-manager:
  brew: synscan
package-manager-url: https://formulae.brew.sh/formula/synscan
version: 5.02
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Asynchronous half-open TCP portscanner
source-archive: https://digit-labs.org/files/tools/synscan/releases/synscan-5.02.tar.gz
dependencies:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: sslog
  - exposure: global executable
    kind: cli
    name: synscan
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:synscan
  brew: brew install synscan
provenance:
  formula: synscan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
