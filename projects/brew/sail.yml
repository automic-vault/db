id: brew:sail
display-name: sail
homepage: https://sailed.io
repo: >
  https://files.pythonhosted.org/packages/1c/64/2af3a1a9dfa005dc91a22535a29071e9255efeacf7e61dbefee920d01571/sailed_io-0.10.9.tar.gz
