id: brew:taskwarrior-tui
display-name: taskwarrior-tui
homepage: https://kdheepak.com/taskwarrior-tui/
repo: https://github.com/kdheepak/taskwarrior-tui
docs: https://kdheepak.com/taskwarrior-tui/
package-manager:
  apk: taskwarrior-tui
  brew: taskwarrior-tui
  macports: taskwarrior-tui
  nix: taskwarrior-tui
  pacman: taskwarrior-tui
package-manager-url: https://formulae.brew.sh/formula/taskwarrior-tui
version: 0.27.0
license: MIT
category: development
tags:
  - cli
description: Terminal user interface for taskwarrior
source-archive: https://github.com/kdheepak/taskwarrior-tui/archive/refs/tags/v0.27.0.tar.gz
dependencies:
  - task
build-dependencies:
  - pandoc
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: taskwarrior-tui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add taskwarrior-tui
  av: sudo av install brew:taskwarrior-tui
  brew: brew install taskwarrior-tui
  macports: sudo port install taskwarrior-tui
  nix: nix profile install nixpkgs#taskwarrior-tui
  pacman: sudo pacman -S taskwarrior-tui
provenance:
  formula: taskwarrior-tui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
