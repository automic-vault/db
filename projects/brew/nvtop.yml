id: brew:nvtop
display-name: nvtop
homepage: https://github.com/Syllo/nvtop
repo: https://github.com/Syllo/nvtop
docs: https://github.com/Syllo/nvtop
package-manager:
  apk: nvtop
  brew: nvtop
  debian: nvtop
  dnf: nvtop
  macports: nvtop
  pacman: nvtop
  ubuntu: nvtop
  winget: Nervosys.Nvtop
  zypper: nvtop
package-manager-url: https://formulae.brew.sh/formula/nvtop
version: 3.3.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Interactive GPU process monitor
source-archive: https://github.com/Syllo/nvtop/archive/refs/tags/3.3.2.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: nvtop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nvtop
  av: sudo av install brew:nvtop
  brew: brew install nvtop
  debian: sudo apt install nvtop
  dnf: sudo dnf install nvtop
  macports: sudo port install nvtop
  pacman: sudo pacman -S nvtop
  ubuntu: sudo apt install nvtop
  winget: winget install --id Nervosys.Nvtop -e
  zypper: sudo zypper install nvtop
provenance:
  formula: nvtop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
