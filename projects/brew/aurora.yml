id: brew:aurora
display-name: aurora
homepage: https://xuri.me/aurora/
repo: https://github.com/xuri/aurora
docs: https://xuri.me/aurora/
package-manager:
  brew: aurora
  scoop: extras/aurora
  ubuntu: aurora
  winget: Aurora.Aurora
package-manager-url: https://formulae.brew.sh/formula/aurora
version: 2.2
license: MIT
category: development
tags:
  - cli
description: Beanstalkd queue server console
source-archive: https://github.com/xuri/aurora/archive/refs/tags/2.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aurora
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aurora
  brew: brew install aurora
  scoop: scoop install extras/aurora
  ubuntu: sudo apt install aurora
  winget: winget install --id Aurora.Aurora -e
provenance:
  formula: aurora
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
