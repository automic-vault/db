id: brew:stubby
display-name: stubby
homepage: https://dnsprivacy.org/wiki/display/DP/DNS+Privacy+Daemon+-+Stubby
repo: https://github.com/getdnsapi/stubby
docs: https://dnsprivacy.org/wiki/display/DP/DNS+Privacy+Daemon+-+Stubby
package-manager:
  apk: stubby
  brew: stubby
  debian: stubby
  dnf: stubby
  macports: stubby
  nix: stubby
  pacman: stubby
  ubuntu: stubby
package-manager-url: https://formulae.brew.sh/formula/stubby
version: 0.4.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: DNS privacy enabled stub resolver service based on getdns
source-archive: https://github.com/getdnsapi/stubby/archive/refs/tags/v0.4.3.tar.gz
dependencies:
  - getdns
  - libidn2
  - libyaml
  - openssl@3
  - unbound
build-dependencies:
  - cmake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: stubby
  - exposure: global executable
    kind: cli
    name: stubby-setdns-macos.sh
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add stubby
  av: sudo av install brew:stubby
  brew: brew install stubby
  debian: sudo apt install stubby
  dnf: sudo dnf install stubby
  macports: sudo port install stubby
  nix: nix profile install nixpkgs#stubby
  pacman: sudo pacman -S stubby
  ubuntu: sudo apt install stubby
provenance:
  formula: stubby
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
