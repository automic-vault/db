id: brew:jp
display-name: jp
homepage: https://github.com/sgreben/jp
repo: https://github.com/sgreben/jp
docs: https://github.com/sgreben/jp
package-manager:
  apk: jp
  brew: jp
  debian: jp
  macports: jp
  nix: jp
  scoop: main/jp
  ubuntu: jp
  zypper: jp
package-manager-url: https://formulae.brew.sh/formula/jp
version: 1.1.12
license: MIT
category: development
tags:
  - cli
  - json
description: Dead simple terminal plots from JSON data
source-archive: https://github.com/sgreben/jp/archive/refs/tags/1.1.12.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jp
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jp
  av: sudo av install brew:jp
  brew: brew install jp
  debian: sudo apt install jp
  macports: sudo port install jp
  nix: nix profile install nixpkgs#jp
  scoop: scoop install main/jp
  ubuntu: sudo apt install jp
  zypper: sudo zypper install jp
provenance:
  formula: jp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
