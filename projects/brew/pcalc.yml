id: brew:pcalc
display-name: pcalc
homepage: https://github.com/alt-romes/programmer-calculator
repo: https://github.com/alt-romes/programmer-calculator
docs: https://github.com/alt-romes/programmer-calculator
package-manager:
  brew: pcalc
  nix: pcalc
package-manager-url: https://formulae.brew.sh/formula/pcalc
version: 3.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Calculator for those working with multiple bases, sizes, and close to the bits
source-archive: https://github.com/alt-romes/programmer-calculator/archive/refs/tags/v3.0.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: pcalc
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pcalc
  brew: brew install pcalc
  nix: nix profile install nixpkgs#pcalc
provenance:
  formula: pcalc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
