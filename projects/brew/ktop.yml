id: brew:ktop
display-name: ktop
homepage: https://github.com/vladimirvivien/ktop
repo: https://github.com/vladimirvivien/ktop
docs: https://github.com/vladimirvivien/ktop
package-manager:
  brew: ktop
  nix: ktop
  zypper: ktop
package-manager-url: https://formulae.brew.sh/formula/ktop
version: 0.5.3
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Top-like tool for your Kubernetes clusters
source-archive: https://github.com/vladimirvivien/ktop/archive/refs/tags/v0.5.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ktop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ktop
  brew: brew install ktop
  nix: nix profile install nixpkgs#ktop
  zypper: sudo zypper install ktop
provenance:
  formula: ktop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
