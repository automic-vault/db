id: brew:lxc
display-name: lxc
homepage: https://ubuntu.com/lxd
repo: https://github.com/canonical/lxd
docs: https://ubuntu.com/lxd
package-manager:
  apk: lxc
  brew: lxc
  chocolatey: lxc
  debian: lxc
  dnf: lxc
  nix: lxc
  pacman: lxc
  scoop: main/lxc
  ubuntu: lxc
  zypper: lxc
package-manager-url: https://formulae.brew.sh/formula/lxc
version: 6.8
license: AGPL-3.0-only
category: development
tags:
  - cli
description: CLI client for interacting with LXD
source-archive: https://github.com/canonical/lxd/releases/download/lxd-6.8/lxd-6.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lxc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lxc
  av: sudo av install brew:lxc
  brew: brew install lxc
  chocolatey: choco install lxc
  debian: sudo apt install lxc
  dnf: sudo dnf install lxc
  nix: nix profile install nixpkgs#lxc
  pacman: sudo pacman -S lxc
  scoop: scoop install main/lxc
  ubuntu: sudo apt install lxc
  zypper: sudo zypper install lxc
provenance:
  formula: lxc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
