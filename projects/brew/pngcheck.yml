id: brew:pngcheck
display-name: pngcheck
homepage: https://github.com/pnggroup/pngcheck
repo: https://github.com/pnggroup/pngcheck
docs: https://github.com/pnggroup/pngcheck
package-manager:
  brew: pngcheck
  debian: pngcheck
  dnf: pngcheck
  macports: pngcheck
  nix: pngcheck
  ubuntu: pngcheck
  zypper: pngcheck
package-manager-url: https://formulae.brew.sh/formula/pngcheck
version: 4.0.1
license: HPND
category: development
tags:
  - cli
description: Print info and check PNG, JNG, and MNG files
source-archive: https://github.com/pnggroup/pngcheck/archive/refs/tags/v4.0.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: pngcheck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pngcheck
  brew: brew install pngcheck
  debian: sudo apt install pngcheck
  dnf: sudo dnf install pngcheck
  macports: sudo port install pngcheck
  nix: nix profile install nixpkgs#pngcheck
  ubuntu: sudo apt install pngcheck
  zypper: sudo zypper install pngcheck
provenance:
  formula: pngcheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
