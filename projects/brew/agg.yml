id: brew:agg
display-name: agg
homepage: https://github.com/asciinema/agg
repo: https://github.com/asciinema/agg
docs: https://github.com/asciinema/agg
package-manager:
  brew: agg
  macports: agg
  nix: agg
  scoop: main/agg
  winget: asciinema.agg
package-manager-url: https://formulae.brew.sh/formula/agg
version: 1.8.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Asciicast to GIF converter
source-archive: https://github.com/asciinema/agg/archive/refs/tags/v1.8.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: agg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:agg
  brew: brew install agg
  macports: sudo port install agg
  nix: nix profile install nixpkgs#agg
  scoop: scoop install main/agg
  winget: winget install --id asciinema.agg -e
provenance:
  formula: agg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
