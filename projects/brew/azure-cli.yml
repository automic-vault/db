id: brew:azure-cli
display-name: azure-cli
homepage: https://docs.microsoft.com/cli/azure/overview
repo: https://github.com/Azure/azure-cli
docs: https://docs.microsoft.com/cli/azure/overview
package-manager:
  brew: azure-cli
  chocolatey: azure-cli
  debian: azure-cli
  dnf: azure-cli
  nix: azure-cli
  pacman: azure-cli
  scoop: main/azure-cli
  winget: Microsoft.AzureCLI
  zypper: azure-cli
package-manager-url: https://formulae.brew.sh/formula/azure-cli
version: 2.86.0
license: MIT
category: cloud
tags:
  - cli
description: Microsoft Azure CLI 2.0
source-archive: https://github.com/Azure/azure-cli/archive/refs/tags/azure-cli-2.86.0.tar.gz
dependencies:
  - libsodium
  - libyaml
  - openssl@3
  - python@3.13
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: az
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:azure-cli
  brew: brew install azure-cli
  chocolatey: choco install azure-cli
  debian: sudo apt install azure-cli
  dnf: sudo dnf install azure-cli
  nix: nix profile install nixpkgs#azure-cli
  pacman: sudo pacman -S azure-cli
  scoop: scoop install main/azure-cli
  winget: winget install --id Microsoft.AzureCLI -e
  zypper: sudo zypper install azure-cli
provenance:
  formula: azure-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
