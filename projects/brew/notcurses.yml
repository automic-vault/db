id: brew:notcurses
display-name: notcurses
homepage: https://nick-black.com/dankwiki/index.php/Notcurses
repo: https://github.com/dankamongmen/notcurses
docs: https://nick-black.com/dankwiki/index.php/Notcurses
package-manager:
  apk: notcurses
  brew: notcurses
  dnf: notcurses
  macports: notcurses
  nix: notcurses
  pacman: notcurses
package-manager-url: https://formulae.brew.sh/formula/notcurses
version: 3.0.17
license: Apache-2.0
category: development
tags:
  - cli
description: Blingful character graphics/TUI library
source-archive: https://github.com/dankamongmen/notcurses/archive/refs/tags/v3.0.17.tar.gz
dependencies:
  - ffmpeg
  - libdeflate
  - libunistring
  - ncurses
build-dependencies:
  - cmake
  - doctest
  - pandoc
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ncls
  - exposure: global executable
    kind: cli
    name: ncneofetch
  - exposure: global executable
    kind: cli
    name: ncplayer
  - exposure: global executable
    kind: cli
    name: nctetris
  - exposure: global executable
    kind: cli
    name: notcurses-demo
  - exposure: global executable
    kind: cli
    name: notcurses-info
  - exposure: global executable
    kind: cli
    name: notcurses-input
  - exposure: global executable
    kind: cli
    name: tfman
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add notcurses
  av: sudo av install brew:notcurses
  brew: brew install notcurses
  dnf: sudo dnf install notcurses
  macports: sudo port install notcurses
  nix: nix profile install nixpkgs#notcurses
  pacman: sudo pacman -S notcurses
provenance:
  formula: notcurses
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
