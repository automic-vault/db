id: brew:git-who
display-name: git-who
homepage: https://github.com/sinclairtarget/git-who
repo: https://github.com/sinclairtarget/git-who
docs: https://github.com/sinclairtarget/git-who
package-manager:
  brew: git-who
  macports: git-who
  nix: git-who
  zypper: git-who
package-manager-url: https://formulae.brew.sh/formula/git-who
version: 1.3
license: MIT
category: development
tags:
  - cli
  - git
description: Git blame for file trees
source-archive: https://github.com/sinclairtarget/git-who/archive/refs/tags/v1.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-who
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-who
  brew: brew install git-who
  macports: sudo port install git-who
  nix: nix profile install nixpkgs#git-who
  zypper: sudo zypper install git-who
provenance:
  formula: git-who
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
