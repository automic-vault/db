id: brew:redress
display-name: redress
homepage: https://github.com/goretk/redress
repo: https://github.com/goretk/redress
docs: https://github.com/goretk/redress
package-manager:
  brew: redress
package-manager-url: https://formulae.brew.sh/formula/redress
version: 1.2.67
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Tool for analyzing stripped Go binaries compiled with the Go compiler
source-archive: https://github.com/goretk/redress/archive/refs/tags/v1.2.67.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: redress
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:redress
  brew: brew install redress
provenance:
  formula: redress
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
