id: brew:nylon
display-name: nylon
homepage: https://github.com/smeinecke/nylon
repo: https://monkey.org/~marius/nylon/nylon-1.21.tar.gz
docs: https://github.com/smeinecke/nylon
package-manager:
  brew: nylon
  macports: nylon
  nix: nylon
package-manager-url: https://formulae.brew.sh/formula/nylon
version: 1.21
license: BSD-3-Clause
category: development
tags:
  - cli
description: Proxy server
source-archive: https://monkey.org/~marius/nylon/nylon-1.21.tar.gz
dependencies:
  - libevent
executables:
  - exposure: global executable
    kind: cli
    name: nylon
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nylon
  brew: brew install nylon
  macports: sudo port install nylon
  nix: nix profile install nixpkgs#nylon
provenance:
  formula: nylon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
