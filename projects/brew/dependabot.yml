id: brew:dependabot
display-name: dependabot
homepage: https://github.com/dependabot/cli
repo: https://github.com/dependabot/cli
docs: https://github.com/dependabot/cli
package-manager:
  brew: dependabot
package-manager-url: https://formulae.brew.sh/formula/dependabot
version: 1.87.0
license: MIT
category: development
tags:
  - cli
description: Tool for testing and debugging Dependabot update jobs
source-archive: https://github.com/dependabot/cli/archive/refs/tags/v1.87.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dependabot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dependabot
  brew: brew install dependabot
provenance:
  formula: dependabot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
