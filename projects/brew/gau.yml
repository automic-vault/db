id: brew:gau
display-name: gau
homepage: https://github.com/lc/gau
repo: https://github.com/lc/gau
docs: https://github.com/lc/gau
package-manager:
  brew: gau
  macports: gau
  nix: gau
package-manager-url: https://formulae.brew.sh/formula/gau
version: 2.2.4
license: MIT
category: development
tags:
  - cli
description: Open Threat Exchange, Wayback Machine, and Common Crawl URL fetcher
source-archive: https://github.com/lc/gau/archive/refs/tags/v2.2.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gau
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gau
  brew: brew install gau
  macports: sudo port install gau
  nix: nix profile install nixpkgs#gau
provenance:
  formula: gau
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
