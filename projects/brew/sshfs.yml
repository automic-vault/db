id: brew:sshfs
display-name: sshfs
homepage: https://github.com/libfuse/sshfs
repo: https://github.com/libfuse/sshfs
docs: https://github.com/libfuse/sshfs
package-manager:
  apk: sshfs
  brew: sshfs
  chocolatey: sshfs
  debian: sshfs
  macports: sshfs
  nix: sshfs
  pacman: sshfs
  ubuntu: sshfs
  zypper: sshfs
package-manager-url: https://formulae.brew.sh/formula/sshfs
version: 3.7.5
license: LGPL-2.1-only OR GPL-2.0-only
category: development
tags:
  - cli
description: File system client based on SSH File Transfer Protocol
source-archive: https://github.com/libfuse/sshfs/archive/refs/tags/sshfs-3.7.5.tar.gz
dependencies:
  - glib
  - libfuse
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mount.fuse.sshfs
  - exposure: global executable
    kind: cli
    name: mount.sshfs
  - exposure: global executable
    kind: cli
    name: sshfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sshfs
  av: sudo av install brew:sshfs
  brew: brew install sshfs
  chocolatey: choco install sshfs
  debian: sudo apt install sshfs
  macports: sudo port install sshfs
  nix: nix profile install nixpkgs#sshfs
  pacman: sudo pacman -S sshfs
  ubuntu: sudo apt install sshfs
  zypper: sudo zypper install sshfs
provenance:
  formula: sshfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
