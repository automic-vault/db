id: brew:multi-git-status
display-name: multi-git-status
homepage: https://github.com/fboender/multi-git-status
repo: https://github.com/fboender/multi-git-status
docs: https://github.com/fboender/multi-git-status
package-manager:
  brew: multi-git-status
  debian: mgitstatus
  dnf: multi-git-status
  nix: mgitstatus
  ubuntu: mgitstatus
package-manager-url: https://formulae.brew.sh/formula/multi-git-status
version: 2.3
license: MIT
category: development
tags:
  - cli
  - git
description: Show uncommitted, untracked and unpushed changes for multiple Git repos
source-archive: https://github.com/fboender/multi-git-status/archive/refs/tags/2.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mgitstatus
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:multi-git-status
  brew: brew install multi-git-status
  debian: sudo apt install mgitstatus
  dnf: sudo dnf install multi-git-status
  nix: nix profile install nixpkgs#mgitstatus
  ubuntu: sudo apt install mgitstatus
provenance:
  formula: multi-git-status
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
