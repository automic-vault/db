id: brew:pcsc-lite
display-name: pcsc-lite
homepage: https://pcsclite.apdu.fr/
repo: https://pcsclite.apdu.fr/files/pcsc-lite-2.4.1.tar.xz
docs: https://pcsclite.apdu.fr/
package-manager:
  apk: pcsc-lite
  brew: pcsc-lite
  debian: pcscd
  dnf: pcsc-lite
  ubuntu: pcscd
  zypper: pcsc-lite
package-manager-url: https://formulae.brew.sh/formula/pcsc-lite
version: 2.4.1
license: BSD-3-Clause AND BSD-2-Clause AND GPL-3.0-or-later AND ISC
category: network
tags:
  - cli
description: Middleware to access a smart card using SCard API
source-archive: https://pcsclite.apdu.fr/files/pcsc-lite-2.4.1.tar.xz
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pcsc-spy
  - exposure: global executable
    kind: cli
    name: pcscd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pcsc-lite
  av: sudo av install brew:pcsc-lite
  brew: brew install pcsc-lite
  debian: sudo apt install pcscd
  dnf: sudo dnf install pcsc-lite
  ubuntu: sudo apt install pcscd
  zypper: sudo zypper install pcsc-lite
provenance:
  formula: pcsc-lite
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
