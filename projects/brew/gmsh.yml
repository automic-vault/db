id: brew:gmsh
display-name: gmsh
homepage: https://gmsh.info/
repo: https://gmsh.info/src/gmsh-4.15.2-source.tgz
docs: https://gmsh.info/
package-manager:
  apk: gmsh
  brew: gmsh
  debian: gmsh
  dnf: gmsh
  macports: gmsh
  nix: gmsh
  ubuntu: gmsh
  winget: gmsh.gmsh
  zypper: gmsh
package-manager-url: https://formulae.brew.sh/formula/gmsh
version: 4.15.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: 3D finite element grid generator with CAD engine
source-archive: https://gmsh.info/src/gmsh-4.15.2-source.tgz
dependencies:
  - cairo
  - fltk
  - freetype
  - gmp
  - jpeg-turbo
  - libomp
  - libpng
  - metis
  - opencascade
build-dependencies:
  - cmake
  - eigen
executables:
  - exposure: global executable
    kind: cli
    name: gmsh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gmsh
  av: sudo av install brew:gmsh
  brew: brew install gmsh
  debian: sudo apt install gmsh
  dnf: sudo dnf install gmsh
  macports: sudo port install gmsh
  nix: nix profile install nixpkgs#gmsh
  ubuntu: sudo apt install gmsh
  winget: winget install --id gmsh.gmsh -e
  zypper: sudo zypper install gmsh
provenance:
  formula: gmsh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
