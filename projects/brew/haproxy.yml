id: brew:haproxy
display-name: haproxy
homepage: https://www.haproxy.org/
repo: https://www.haproxy.org/download/3.3/src/haproxy-3.3.10.tar.gz
docs: https://www.haproxy.org/
package-manager:
  apk: haproxy
  brew: haproxy
  debian: haproxy
  dnf: haproxy
  macports: haproxy
  nix: haproxy
  pacman: haproxy
  ubuntu: haproxy
  zypper: haproxy
package-manager-url: https://formulae.brew.sh/formula/haproxy
version: 3.3.10
license: GPL-2.0-or-later WITH openvpn-openssl-exception
category: network
tags:
  - cli
description: Reliable, high performance TCP/HTTP load balancer
source-archive: https://www.haproxy.org/download/3.3/src/haproxy-3.3.10.tar.gz
dependencies:
  - openssl@3
  - pcre2
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: haproxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add haproxy
  av: sudo av install brew:haproxy
  brew: brew install haproxy
  debian: sudo apt install haproxy
  dnf: sudo dnf install haproxy
  macports: sudo port install haproxy
  nix: nix profile install nixpkgs#haproxy
  pacman: sudo pacman -S haproxy
  ubuntu: sudo apt install haproxy
  zypper: sudo zypper install haproxy
provenance:
  formula: haproxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
