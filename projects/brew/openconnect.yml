id: brew:openconnect
display-name: openconnect
homepage: https://www.infradead.org/openconnect/
repo: https://www.infradead.org/openconnect/download/openconnect-9.12.tar.gz
docs: https://www.infradead.org/openconnect/
package-manager:
  apk: openconnect
  brew: openconnect
  debian: openconnect
  dnf: openconnect
  macports: openconnect
  pacman: openconnect
  scoop: main/openconnect
  ubuntu: openconnect
  zypper: openconnect
package-manager-url: https://formulae.brew.sh/formula/openconnect
version: 9.12
license: LGPL-2.1-only
category: network
tags:
  - cli
description: Open client for Cisco AnyConnect VPN
source-archive: https://www.infradead.org/openconnect/download/openconnect-9.12.tar.gz
dependencies:
  - gettext
  - gmp
  - gnutls
  - nettle
  - p11-kit
  - stoken
build-dependencies:
  - gettext
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: openconnect
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: A `vpnc-script` has been installed at $HOMEBREW_PREFIX/etc/vpnc/vpnc-script.
  post-install-defined: true
install-lines:
  apk: sudo apk add openconnect
  av: sudo av install brew:openconnect
  brew: brew install openconnect
  debian: sudo apt install openconnect
  dnf: sudo dnf install openconnect
  macports: sudo port install openconnect
  pacman: sudo pacman -S openconnect
  scoop: scoop install main/openconnect
  ubuntu: sudo apt install openconnect
  zypper: sudo zypper install openconnect
provenance:
  formula: openconnect
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
