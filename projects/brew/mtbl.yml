id: brew:mtbl
display-name: mtbl
homepage: https://github.com/farsightsec/mtbl
repo: https://dl.farsightsecurity.com/dist/mtbl/mtbl-1.7.1.tar.gz
docs: https://github.com/farsightsec/mtbl
package-manager:
  brew: mtbl
package-manager-url: https://formulae.brew.sh/formula/mtbl
version: 1.7.1
license: Apache-2.0
category: security
tags:
  - cli
description: Immutable sorted string table library
source-archive: https://dl.farsightsecurity.com/dist/mtbl/mtbl-1.7.1.tar.gz
dependencies:
  - lz4
  - snappy
  - zstd
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mtbl_dump
  - exposure: global executable
    kind: cli
    name: mtbl_info
  - exposure: global executable
    kind: cli
    name: mtbl_merge
  - exposure: global executable
    kind: cli
    name: mtbl_verify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mtbl
  brew: brew install mtbl
provenance:
  formula: mtbl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
