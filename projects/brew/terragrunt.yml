id: brew:terragrunt
display-name: terragrunt
homepage: https://terragrunt.gruntwork.io/
repo: https://github.com/gruntwork-io/terragrunt
docs: https://terragrunt.gruntwork.io/
package-manager:
  brew: terragrunt
  chocolatey: terragrunt
  macports: terragrunt
  nix: terragrunt
  pacman: terragrunt
  scoop: main/terragrunt
  winget: Gruntwork.Terragrunt
  zypper: terragrunt
package-manager-url: https://formulae.brew.sh/formula/terragrunt
version: 1.0.6
license: MIT
category: cloud
tags:
  - cli
description: Thin wrapper for Terraform e.g. for locking state
source-archive: https://github.com/gruntwork-io/terragrunt/archive/refs/tags/v1.0.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terragrunt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terragrunt
  brew: brew install terragrunt
  chocolatey: choco install terragrunt
  macports: sudo port install terragrunt
  nix: nix profile install nixpkgs#terragrunt
  pacman: sudo pacman -S terragrunt
  scoop: scoop install main/terragrunt
  winget: winget install --id Gruntwork.Terragrunt -e
  zypper: sudo zypper install terragrunt
provenance:
  formula: terragrunt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
