id: brew:nmrpflash
display-name: nmrpflash
homepage: https://github.com/jclehner/nmrpflash
repo: https://github.com/jclehner/nmrpflash
docs: https://github.com/jclehner/nmrpflash
package-manager:
  brew: nmrpflash
  debian: nmrpflash
  nix: nmrpflash
  ubuntu: nmrpflash
package-manager-url: https://formulae.brew.sh/formula/nmrpflash
version: 0.9.27
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Netgear Unbrick Utility
source-archive: https://github.com/jclehner/nmrpflash/archive/refs/tags/v0.9.27.tar.gz
build-dependencies:
  - pkgconf
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: nmrpflash
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nmrpflash
  brew: brew install nmrpflash
  debian: sudo apt install nmrpflash
  nix: nix profile install nixpkgs#nmrpflash
  ubuntu: sudo apt install nmrpflash
provenance:
  formula: nmrpflash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
