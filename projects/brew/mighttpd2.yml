id: brew:mighttpd2
display-name: mighttpd2
homepage: https://kazu-yamamoto.github.io/mighttpd2/
repo: https://hackage.haskell.org/package/mighttpd2-4.0.10/mighttpd2-4.0.10.tar.gz
docs: https://kazu-yamamoto.github.io/mighttpd2/
package-manager:
  brew: mighttpd2
  debian: mighttpd2
  pacman: mighttpd2
  ubuntu: mighttpd2
package-manager-url: https://formulae.brew.sh/formula/mighttpd2
version: 4.0.10
license: BSD-3-Clause
category: development
tags:
  - cli
description: HTTP server
source-archive: https://hackage.haskell.org/package/mighttpd2-4.0.10/mighttpd2-4.0.10.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: mighty
  - exposure: global executable
    kind: cli
    name: mighty-mkindex
  - exposure: global executable
    kind: cli
    name: mightyctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mighttpd2
  brew: brew install mighttpd2
  debian: sudo apt install mighttpd2
  pacman: sudo pacman -S mighttpd2
  ubuntu: sudo apt install mighttpd2
provenance:
  formula: mighttpd2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
