id: brew:pms
display-name: pms
homepage: https://kimtore.github.io/pms/
repo: https://downloads.sourceforge.net/project/pms/pms/0.42/pms-0.42.tar.bz2
docs: https://kimtore.github.io/pms/
package-manager:
  brew: pms
  debian: pms
  nix: pms
  ubuntu: pms
package-manager-url: https://formulae.brew.sh/formula/pms
version: 0.42
license: MIT
category: development
tags:
  - cli
description: Practical Music Search, an ncurses-based MPD client
source-archive: https://downloads.sourceforge.net/project/pms/pms/0.42/pms-0.42.tar.bz2
dependencies:
  - gettext
  - glib
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: pms
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pms
  brew: brew install pms
  debian: sudo apt install pms
  nix: nix profile install nixpkgs#pms
  ubuntu: sudo apt install pms
provenance:
  formula: pms
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
