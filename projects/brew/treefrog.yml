id: brew:treefrog
display-name: treefrog
homepage: https://www.treefrogframework.org/
repo: https://github.com/treefrogframework/treefrog-framework
docs: https://www.treefrogframework.org/
package-manager:
  brew: treefrog
package-manager-url: https://formulae.brew.sh/formula/treefrog
version: 2.11.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: High-speed C++ MVC Framework for Web Application
source-archive: https://github.com/treefrogframework/treefrog-framework/archive/refs/tags/v2.11.2.tar.gz
dependencies:
  - glog
  - lz4
  - mongo-c-driver
  - qtbase
  - qtdeclarative
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: tadpole
  - exposure: global executable
    kind: cli
    name: tmake
  - exposure: global executable
    kind: cli
    name: treefrog
  - exposure: global executable
    kind: cli
    name: tspawn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:treefrog
  brew: brew install treefrog
provenance:
  formula: treefrog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
