id: brew:aubio
display-name: aubio
homepage: https://github.com/aubio/aubio
repo: https://sources.buildroot.net/aubio/aubio-0.4.9.tar.bz2
docs: https://github.com/aubio/aubio
package-manager:
  apk: aubio
  brew: aubio
  dnf: aubio
  macports: aubio
  nix: aubio
  pacman: aubio
package-manager-url: https://formulae.brew.sh/formula/aubio
version: 0.4.9
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Extract annotations from audio signals
source-archive: https://sources.buildroot.net/aubio/aubio-0.4.9.tar.bz2
dependencies:
  - libsndfile
  - numpy
  - python@3.14
build-dependencies:
  - libtool
  - pkgconf
  - python-setuptools
executables:
  - exposure: global executable
    kind: cli
    name: aubio
  - exposure: global executable
    kind: cli
    name: aubiocut
  - exposure: global executable
    kind: cli
    name: aubiomfcc
  - exposure: global executable
    kind: cli
    name: aubionotes
  - exposure: global executable
    kind: cli
    name: aubioonset
  - exposure: global executable
    kind: cli
    name: aubiopitch
  - exposure: global executable
    kind: cli
    name: aubioquiet
  - exposure: global executable
    kind: cli
    name: aubiotrack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add aubio
  av: sudo av install brew:aubio
  brew: brew install aubio
  dnf: sudo dnf install aubio
  macports: sudo port install aubio
  nix: nix profile install nixpkgs#aubio
  pacman: sudo pacman -S aubio
provenance:
  formula: aubio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
