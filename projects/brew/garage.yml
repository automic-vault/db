id: brew:garage
display-name: garage
homepage: https://garagehq.deuxfleurs.fr/
repo: https://git.deuxfleurs.fr/Deuxfleurs/garage/archive/v2.3.0.tar.gz
docs: https://garagehq.deuxfleurs.fr/
package-manager:
  apk: garage
  brew: garage
  macports: garage
  pacman: garage
  zypper: garage
package-manager-url: https://formulae.brew.sh/formula/garage
version: 2.3.0
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: S3 object store so reliable you can run it outside datacenters
source-archive: https://git.deuxfleurs.fr/Deuxfleurs/garage/archive/v2.3.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: garage
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add garage
  av: sudo av install brew:garage
  brew: brew install garage
  macports: sudo port install garage
  pacman: sudo pacman -S garage
  zypper: sudo zypper install garage
provenance:
  formula: garage
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
