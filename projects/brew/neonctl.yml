id: brew:neonctl
display-name: neonctl
homepage: https://neon.tech/docs/reference/neon-cli
repo: https://registry.npmjs.org/neonctl/-/neonctl-2.22.0.tgz
docs: https://neon.tech/docs/reference/neon-cli
package-manager:
  apk: neon
  brew: neonctl
  dnf: neon
  macports: neon
  nix: neon
  pacman: neon
package-manager-url: https://formulae.brew.sh/formula/neonctl
version: 2.22.0
license: Apache-2.0
category: network
tags:
  - cli
description: Neon CLI tool
source-archive: https://registry.npmjs.org/neonctl/-/neonctl-2.22.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: neon
  - exposure: global executable
    kind: cli
    name: neonctl
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add neon
  av: sudo av install brew:neonctl
  brew: brew install neonctl
  dnf: sudo dnf install neon
  macports: sudo port install neon
  nix: nix profile install nixpkgs#neon
  pacman: sudo pacman -S neon
provenance:
  formula: neonctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
