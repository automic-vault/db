id: brew:stockfish
display-name: stockfish
homepage: https://stockfishchess.org/
repo: https://github.com/official-stockfish/Stockfish
docs: https://stockfishchess.org/
package-manager:
  apk: stockfish
  brew: stockfish
  debian: stockfish
  dnf: stockfish
  nix: stockfish
  ubuntu: stockfish
  winget: Stockfish.Stockfish
  zypper: stockfish
package-manager-url: https://formulae.brew.sh/formula/stockfish
version: 18
license: GPL-3.0-only
category: development
tags:
  - cli
description: Strong open-source chess engine
source-archive: https://github.com/official-stockfish/Stockfish/archive/refs/tags/sf_18.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: stockfish
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add stockfish
  av: sudo av install brew:stockfish
  brew: brew install stockfish
  debian: sudo apt install stockfish
  dnf: sudo dnf install stockfish
  nix: nix profile install nixpkgs#stockfish
  ubuntu: sudo apt install stockfish
  winget: winget install --id Stockfish.Stockfish -e
  zypper: sudo zypper install stockfish
provenance:
  formula: stockfish
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
