id: brew:e2tools
display-name: e2tools
homepage: https://e2tools.github.io/
repo: https://github.com/e2tools/e2tools
docs: https://e2tools.github.io/
package-manager:
  apk: e2tools
  brew: e2tools
  debian: e2tools
  dnf: e2tools
  nix: e2tools
  ubuntu: e2tools
package-manager-url: https://formulae.brew.sh/formula/e2tools
version: 0.1.2
license: GPL-2.0-only
category: development
tags:
  - cli
description: Utilities to read, write, and manipulate files in ext2/3/4 filesystems
source-archive: https://github.com/e2tools/e2tools/releases/download/v0.1.2/e2tools-0.1.2.tar.gz
dependencies:
  - e2fsprogs
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: e2cp
  - exposure: global executable
    kind: cli
    name: e2ln
  - exposure: global executable
    kind: cli
    name: e2ls
  - exposure: global executable
    kind: cli
    name: e2mkdir
  - exposure: global executable
    kind: cli
    name: e2mv
  - exposure: global executable
    kind: cli
    name: e2rm
  - exposure: global executable
    kind: cli
    name: e2tail
  - exposure: global executable
    kind: cli
    name: e2tools
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add e2tools
  av: sudo av install brew:e2tools
  brew: brew install e2tools
  debian: sudo apt install e2tools
  dnf: sudo dnf install e2tools
  nix: nix profile install nixpkgs#e2tools
  ubuntu: sudo apt install e2tools
provenance:
  formula: e2tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
