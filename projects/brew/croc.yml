id: brew:croc
display-name: croc
homepage: https://github.com/schollz/croc
repo: https://github.com/schollz/croc
docs: https://github.com/schollz/croc
package-manager:
  apk: croc
  brew: croc
  chocolatey: croc
  macports: croc
  nix: croc
  pacman: croc
  scoop: main/croc
  winget: schollz.croc
package-manager-url: https://formulae.brew.sh/formula/croc
version: 10.4.4
license: MIT
category: development
tags:
  - cli
description: Securely send things from one computer to another
source-archive: https://github.com/schollz/croc/archive/refs/tags/v10.4.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: croc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add croc
  av: sudo av install brew:croc
  brew: brew install croc
  chocolatey: choco install croc
  macports: sudo port install croc
  nix: nix profile install nixpkgs#croc
  pacman: sudo pacman -S croc
  scoop: scoop install main/croc
  winget: winget install --id schollz.croc -e
provenance:
  formula: croc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
