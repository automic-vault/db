id: brew:openj9
display-name: openj9
homepage: https://www.eclipse.org/openj9/
repo: https://github.com/eclipse-openj9/openj9
docs: https://www.eclipse.org/openj9/
package-manager:
  brew: openj9
package-manager-url: https://formulae.brew.sh/formula/openj9
version: 0.59.0
license: >
  EPL-2.0 OR Apache-2.0 OR (GPL-2.0-only WITH Classpath-exception-2.0) OR (GPL-2.0-only
  WITH OpenJDK-assembly-exception-1.0)
category: development
tags:
  - cli
description: High performance, scalable, Java virtual machine
source-archive: https://github.com/eclipse-openj9/openj9/archive/refs/tags/openj9-0.59.0.tar.gz
dependencies:
  - fontconfig
  - freetype
  - giflib
  - harfbuzz
  - jpeg-turbo
  - libpng
  - little-cms2
build-dependencies:
  - autoconf
  - bash
  - cmake
  - openjdk
  - pkgconf
uses-from-macos:
  - cups
  - libffi
  - unzip
  - zip
executables:
  - exposure: global executable
    kind: cli
    name: jdmpview
  - exposure: global executable
    kind: cli
    name: jitserver
  - exposure: global executable
    kind: cli
    name: jpackcore
  - exposure: global executable
    kind: cli
    name: jrunscript
  - exposure: global executable
    kind: cli
    name: traceformat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This formula provides the latest supported LTS JDK. If you need a specific version,
    then you will have to use a different method to install OpenJ9. For the system Java
    wrappers to find this JDK, symlink it with sudo ln -sfn
    $HOMEBREW_PREFIX/opt/openj9/libexec/openj9.jdk
    /Library/Java/JavaVirtualMachines/openj9.jdk
  post-install-defined: false
install-lines:
  av: sudo av install brew:openj9
  brew: brew install openj9
provenance:
  formula: openj9
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
