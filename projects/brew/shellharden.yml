id: brew:shellharden
display-name: shellharden
homepage: https://github.com/anordal/shellharden
repo: https://github.com/anordal/shellharden
docs: https://github.com/anordal/shellharden
package-manager:
  apk: shellharden
  brew: shellharden
  macports: shellharden
  nix: shellharden
  pacman: shellharden
package-manager-url: https://formulae.brew.sh/formula/shellharden
version: 4.3.1
license: MPL-2.0
category: development
tags:
  - cli
description: Bash syntax highlighter that encourages/fixes variables quoting
source-archive: https://github.com/anordal/shellharden/archive/refs/tags/v4.3.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: shellharden
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add shellharden
  av: sudo av install brew:shellharden
  brew: brew install shellharden
  macports: sudo port install shellharden
  nix: nix profile install nixpkgs#shellharden
  pacman: sudo pacman -S shellharden
provenance:
  formula: shellharden
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
