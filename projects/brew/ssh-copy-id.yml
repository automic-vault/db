id: brew:ssh-copy-id
display-name: ssh-copy-id
homepage: https://www.openssh.com/
repo: https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-10.3p1.tar.gz
docs: https://www.openssh.com/
package-manager:
  brew: ssh-copy-id
  nix: ssh-copy-id
  winget: axeprpr.SSHCopyID
package-manager-url: https://formulae.brew.sh/formula/ssh-copy-id
version: 10.3p1
license: SSH-OpenSSH
category: network
tags:
  - cli
description: Add a public key to a remote machine's authorized_keys file
source-archive: https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-10.3p1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ssh-copy-id
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ssh-copy-id
