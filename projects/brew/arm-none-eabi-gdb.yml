id: brew:arm-none-eabi-gdb
display-name: arm-none-eabi-gdb
homepage: https://www.gnu.org/software/gdb/
repo: https://ftpmirror.gnu.org/gnu/gdb/gdb-17.2.tar.xz
docs: https://www.gnu.org/software/gdb/
package-manager:
  brew: arm-none-eabi-gdb
  macports: arm-none-eabi-gdb
  pacman: arm-none-eabi-gdb
package-manager-url: https://formulae.brew.sh/formula/arm-none-eabi-gdb
version: 17.2
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU debugger for arm-none-eabi cross development
source-archive: https://ftpmirror.gnu.org/gnu/gdb/gdb-17.2.tar.xz
dependencies:
  - gmp
  - mpfr
  - ncurses
  - python@3.14
  - readline
  - xz
  - zstd
build-dependencies:
  - pkgconf
  - texinfo
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-gdb
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-gdb-add-index
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-gstack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:arm-none-eabi-gdb
  brew: brew install arm-none-eabi-gdb
  macports: sudo port install arm-none-eabi-gdb
  pacman: sudo pacman -S arm-none-eabi-gdb
provenance:
  formula: arm-none-eabi-gdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
