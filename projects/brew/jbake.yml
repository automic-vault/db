id: brew:jbake
display-name: jbake
homepage: https://jbake.org/
repo: https://github.com/jbake-org/jbake
docs: https://jbake.org/
package-manager:
  brew: jbake
  nix: jbake
package-manager-url: https://formulae.brew.sh/formula/jbake
version: 2.7.0
license: MIT
category: development
tags:
  - cli
description: Java based static site/blog generator
source-archive: https://github.com/jbake-org/jbake/releases/download/v2.7.0/jbake-2.7.0-bin.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: jbake
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jbake
  brew: brew install jbake
  nix: nix profile install nixpkgs#jbake
provenance:
  formula: jbake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
