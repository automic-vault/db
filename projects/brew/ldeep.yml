id: brew:ldeep
display-name: ldeep
homepage: https://github.com/franc-pentest/ldeep
repo: >
  https://files.pythonhosted.org/packages/8e/bf/cadc67e213fecdfc338a722dc51a04ec0e897e3b9738d8025f1a773b263c/ldeep-2.0.3.tar.gz
