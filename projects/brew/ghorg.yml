id: brew:ghorg
display-name: ghorg
homepage: https://github.com/gabrie30/ghorg
repo: https://github.com/gabrie30/ghorg
docs: https://github.com/gabrie30/ghorg
package-manager:
  brew: ghorg
  nix: ghorg
  scoop: main/ghorg
package-manager-url: https://formulae.brew.sh/formula/ghorg
version: 1.11.11
license: Apache-2.0
category: development
tags:
  - cli
description: Quickly clone an entire org's or user's repositories into one directory
source-archive: https://github.com/gabrie30/ghorg/archive/refs/tags/v1.11.11.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ghorg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ghorg
  brew: brew install ghorg
  nix: nix profile install nixpkgs#ghorg
  scoop: scoop install main/ghorg
provenance:
  formula: ghorg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
