id: brew:lima
display-name: lima
homepage: https://lima-vm.io/
repo: https://github.com/lima-vm/lima
docs: https://lima-vm.io/
package-manager:
  apk: lima
  brew: lima
  macports: lima
  nix: lima
  scoop: main/lima
  winget: Lima.Lima
  zypper: lima
package-manager-url: https://formulae.brew.sh/formula/lima
version: 2.1.1
license: Apache-2.0
category: development
tags:
  - cli
description: Linux virtual machines
source-archive: https://github.com/lima-vm/lima/archive/refs/tags/v2.1.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: apptainer.lima
  - exposure: global executable
    kind: cli
    name: docker.lima
  - exposure: global executable
    kind: cli
    name: kubectl.lima
  - exposure: global executable
    kind: cli
    name: lima
  - exposure: global executable
    kind: cli
    name: limactl
  - exposure: global executable
    kind: cli
    name: nerdctl.lima
  - exposure: global executable
    kind: cli
    name: podman.lima
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The guest agents for non-native architectures are now provided in a separate
    formula: brew install lima-additional-guestagents
  post-install-defined: false
install-lines:
  apk: sudo apk add lima
  av: sudo av install brew:lima
  brew: brew install lima
  macports: sudo port install lima
  nix: nix profile install nixpkgs#lima
  scoop: scoop install main/lima
  winget: winget install --id Lima.Lima -e
  zypper: sudo zypper install lima
provenance:
  formula: lima
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
