id: brew:t-rec
display-name: t-rec
homepage: https://github.com/sassman/t-rec-rs
repo: https://github.com/sassman/t-rec-rs
docs: https://github.com/sassman/t-rec-rs
package-manager:
  brew: t-rec
  macports: t-rec
  nix: t-rec
package-manager-url: https://formulae.brew.sh/formula/t-rec
version: 0.8.2
license: GPL-3.0-only
category: development
tags:
  - cli
description: Blazingly fast terminal recorder that generates animated gif images for the web
source-archive: https://github.com/sassman/t-rec-rs/archive/refs/tags/v0.8.2.tar.gz
dependencies:
  - imagemagick
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: t-rec
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:t-rec
  brew: brew install t-rec
  macports: sudo port install t-rec
  nix: nix profile install nixpkgs#t-rec
provenance:
  formula: t-rec
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
