id: brew:torsocks
display-name: torsocks
homepage: https://gitlab.torproject.org/tpo/core/torsocks
repo: https://gitlab.torproject.org/tpo/core/torsocks/-/archive/v2.5.0/torsocks-v2.5.0.tar.bz2
docs: https://gitlab.torproject.org/tpo/core/torsocks
package-manager:
  apk: torsocks
  brew: torsocks
  debian: torsocks
  dnf: torsocks
  macports: torsocks
  nix: torsocks
  pacman: torsocks
  ubuntu: torsocks
package-manager-url: https://formulae.brew.sh/formula/torsocks
version: 2.5.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: Use SOCKS-friendly applications with Tor
source-archive: https://gitlab.torproject.org/tpo/core/torsocks/-/archive/v2.5.0/torsocks-v2.5.0.tar.bz2
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: torsocks
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add torsocks
  av: sudo av install brew:torsocks
  brew: brew install torsocks
  debian: sudo apt install torsocks
  dnf: sudo dnf install torsocks
  macports: sudo port install torsocks
  nix: nix profile install nixpkgs#torsocks
  pacman: sudo pacman -S torsocks
  ubuntu: sudo apt install torsocks
provenance:
  formula: torsocks
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
