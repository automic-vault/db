id: brew:beancount-language-server
display-name: beancount-language-server
homepage: https://github.com/polarmutex/beancount-language-server
repo: https://github.com/polarmutex/beancount-language-server
docs: https://github.com/polarmutex/beancount-language-server
package-manager:
  apk: beancount-language-server
  brew: beancount-language-server
  nix: beancount-language-server
package-manager-url: https://formulae.brew.sh/formula/beancount-language-server
version: 1.9.2
license: MIT
category: development
tags:
  - cli
description: Language server for beancount files
source-archive: https://github.com/polarmutex/beancount-language-server/archive/refs/tags/1.9.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: beancount-language-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add beancount-language-server
  av: sudo av install brew:beancount-language-server
  brew: brew install beancount-language-server
  nix: nix profile install nixpkgs#beancount-language-server
provenance:
  formula: beancount-language-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
