id: brew:jprq
display-name: jprq
homepage: https://jprq.io/
repo: https://github.com/azimjohn/jprq
docs: https://jprq.io/
package-manager:
  brew: jprq
  scoop: main/jprq
package-manager-url: https://formulae.brew.sh/formula/jprq
version: 2.4
license: BSD-3-Clause
category: development
tags:
  - cli
description: Join Public Router, Quickly
source-archive: https://github.com/azimjohn/jprq/archive/refs/tags/2.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jprq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jprq
  brew: brew install jprq
  scoop: scoop install main/jprq
provenance:
  formula: jprq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
