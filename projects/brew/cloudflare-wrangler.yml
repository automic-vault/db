id: brew:cloudflare-wrangler
display-name: cloudflare-wrangler
homepage: https://github.com/cloudflare/workers-sdk
repo: https://registry.npmjs.org/wrangler/-/wrangler-4.94.0.tgz
docs: https://github.com/cloudflare/workers-sdk
package-manager:
  brew: cloudflare-wrangler
  macports: wrangler
  nix: wrangler
  pacman: wrangler
package-manager-url: https://formulae.brew.sh/formula/cloudflare-wrangler
version: 4.94.0
license: Apache-2.0 OR MIT
category: cloud
tags:
  - cli
description: CLI tool for Cloudflare Workers
source-archive: https://registry.npmjs.org/wrangler/-/wrangler-4.94.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: wrangler
  - exposure: global executable
    kind: cli
    name: wrangler2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloudflare-wrangler
  brew: brew install cloudflare-wrangler
  macports: sudo port install wrangler
  nix: nix profile install nixpkgs#wrangler
  pacman: sudo pacman -S wrangler
provenance:
  formula: cloudflare-wrangler
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
