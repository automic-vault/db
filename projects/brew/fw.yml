id: brew:fw
display-name: fw
homepage: https://github.com/brocode/fw
repo: https://github.com/brocode/fw
docs: https://github.com/brocode/fw
package-manager:
  brew: fw
  nix: fw
package-manager-url: https://formulae.brew.sh/formula/fw
version: 2.21.0
license: WTFPL
category: development
tags:
  - cli
description: Workspace productivity booster
source-archive: https://github.com/brocode/fw/archive/refs/tags/v2.21.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fw
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fw
  brew: brew install fw
  nix: nix profile install nixpkgs#fw
provenance:
  formula: fw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
