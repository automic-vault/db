id: brew:rpki-client
display-name: rpki-client
homepage: https://www.rpki-client.org/
repo: https://ftp.openbsd.org/pub/OpenBSD/rpki-client/rpki-client-9.8.tar.gz
docs: https://www.rpki-client.org/
package-manager:
  apk: rpki-client
  brew: rpki-client
  debian: rpki-client
  dnf: rpki-client
  macports: rpki-client
  ubuntu: rpki-client
package-manager-url: https://formulae.brew.sh/formula/rpki-client
version: 9.8
license: ISC
category: network
tags:
  - cli
description: OpenBSD portable rpki-client
source-archive: https://ftp.openbsd.org/pub/OpenBSD/rpki-client/rpki-client-9.8.tar.gz
dependencies:
  - libretls
  - openssl@3
  - rsync
build-dependencies:
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: rpki-client
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rpki-client
  av: sudo av install brew:rpki-client
  brew: brew install rpki-client
  debian: sudo apt install rpki-client
  dnf: sudo dnf install rpki-client
  macports: sudo port install rpki-client
  ubuntu: sudo apt install rpki-client
provenance:
  formula: rpki-client
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
