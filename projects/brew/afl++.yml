bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add afl++
  av: sudo av install brew:afl++
  brew: brew install afl++
  debian: sudo apt install afl++
  macports: sudo port install afl
  pacman: sudo pacman -S afl++
  ubuntu: sudo apt install afl++
  zypper: sudo zypper install afl
provenance:
  formula: afl++
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
