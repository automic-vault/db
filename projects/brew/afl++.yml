id: brew:afl++
display-name: afl++
homepage: https://aflplus.plus/
repo: https://github.com/AFLplusplus/AFLplusplus
docs: https://aflplus.plus/
package-manager:
  apk: afl++
  brew: afl++
  debian: afl++
  macports: afl
  pacman: afl++
  ubuntu: afl++
  zypper: afl
package-manager-url: https://formulae.brew.sh/formula/afl++
version: 4.40c
license: Apache-2.0
category: development
tags:
  - cli
description: American Fuzzy Lop++
source-archive: https://github.com/AFLplusplus/AFLplusplus/archive/refs/tags/v4.40c.tar.gz
dependencies:
  - lld
  - llvm
  - python@3.14
build-dependencies:
  - coreutils
executables:
