    kind: cli
    name: afl-clang-fast++
  - exposure: global executable
    kind: cli
    name: afl-clang-lto
  - exposure: global executable
    kind: cli
    name: afl-clang-lto++
  - exposure: global executable
    kind: cli
    name: afl-cmin
