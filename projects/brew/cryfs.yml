id: brew:cryfs
display-name: cryfs
homepage: https://www.cryfs.org
repo: https://github.com/cryfs/cryfs
docs: https://www.cryfs.org
package-manager:
  brew: cryfs
  debian: cryfs
  dnf: cryfs
  macports: cryfs
  nix: cryfs
  pacman: cryfs
  ubuntu: cryfs
  zypper: cryfs
package-manager-url: https://formulae.brew.sh/formula/cryfs
version: 1.0.3
license: LGPL-3.0-or-later
category: cloud
tags:
  - cli
description: Encrypts your files so you can safely store them in Dropbox, iCloud, etc.
source-archive: https://github.com/cryfs/cryfs/releases/download/1.0.3/cryfs-1.0.3.tar.gz
dependencies:
  - boost
  - fmt
  - libfuse@2
  - spdlog
build-dependencies:
  - cmake
  - curl
  - pkgconf
  - python@3.14
  - range-v3
executables:
  - exposure: global executable
    kind: cli
    name: cryfs
  - exposure: global executable
    kind: cli
    name: cryfs-unmount
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cryfs
  brew: brew install cryfs
  debian: sudo apt install cryfs
  dnf: sudo dnf install cryfs
  macports: sudo port install cryfs
  nix: nix profile install nixpkgs#cryfs
  pacman: sudo pacman -S cryfs
  ubuntu: sudo apt install cryfs
  zypper: sudo zypper install cryfs
provenance:
  formula: cryfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
