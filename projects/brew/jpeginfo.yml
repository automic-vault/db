id: brew:jpeginfo
display-name: jpeginfo
homepage: https://www.kokkonen.net/tjko/projects.html
repo: https://www.kokkonen.net/tjko/src/jpeginfo-1.7.1.tar.gz
docs: https://www.kokkonen.net/tjko/projects.html
package-manager:
  brew: jpeginfo
  debian: jpeginfo
  dnf: jpeginfo
  macports: jpeginfo
  nix: jpeginfo
  ubuntu: jpeginfo
  zypper: jpeginfo
package-manager-url: https://formulae.brew.sh/formula/jpeginfo
version: 1.7.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
