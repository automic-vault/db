  dnf: sudo dnf install jpeginfo
  macports: sudo port install jpeginfo
  nix: nix profile install nixpkgs#jpeginfo
  ubuntu: sudo apt install jpeginfo
  zypper: sudo zypper install jpeginfo
provenance:
  formula: jpeginfo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
