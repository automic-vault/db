id: brew:create-api
display-name: create-api
homepage: https://github.com/CreateAPI/CreateAPI
repo: https://github.com/CreateAPI/CreateAPI
docs: https://github.com/CreateAPI/CreateAPI
package-manager:
  brew: create-api
package-manager-url: https://formulae.brew.sh/formula/create-api
version: 0.2.0
license: MIT
category: development
tags:
  - cli
description: Delightful code generator for OpenAPI specs
source-archive: https://github.com/CreateAPI/CreateAPI/archive/refs/tags/0.2.0.tar.gz
uses-from-macos:
  - swift
executables:
  - exposure: global executable
    kind: cli
    name: create-api
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:create-api
  brew: brew install create-api
provenance:
  formula: create-api
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
