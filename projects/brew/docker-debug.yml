id: brew:docker-debug
display-name: docker-debug
homepage: https://github.com/zeromake/docker-debug
repo: https://github.com/zeromake/docker-debug
docs: https://github.com/zeromake/docker-debug
package-manager:
  brew: docker-debug
package-manager-url: https://formulae.brew.sh/formula/docker-debug
version: 0.7.11
license: MIT
category: development
tags:
  - cli
  - docker
description: Use new container attach on already container go on debug
source-archive: https://github.com/zeromake/docker-debug/archive/refs/tags/v0.7.11.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: docker-debug
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:docker-debug
  brew: brew install docker-debug
provenance:
  formula: docker-debug
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
