id: brew:threatcl
display-name: threatcl
homepage: https://github.com/threatcl/threatcl
repo: https://github.com/threatcl/threatcl
docs: https://github.com/threatcl/threatcl
package-manager:
  brew: threatcl
package-manager-url: https://formulae.brew.sh/formula/threatcl
version: 0.4.11
license: MIT
category: development
tags:
  - cli
description: Documenting your Threat Models with HCL
source-archive: https://github.com/threatcl/threatcl/archive/refs/tags/v0.4.11.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: threatcl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
