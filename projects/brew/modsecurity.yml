id: brew:modsecurity
display-name: modsecurity
homepage: https://github.com/owasp-modsecurity/ModSecurity
repo: https://github.com/owasp-modsecurity/ModSecurity
docs: https://github.com/owasp-modsecurity/ModSecurity
package-manager:
  brew: modsecurity
  zypper: modsecurity
package-manager-url: https://formulae.brew.sh/formula/modsecurity
version: 3.0.15
license: Apache-2.0
category: security
tags:
  - cli
description: Libmodsecurity is one component of the ModSecurity v3 project
source-archive: >
  https://github.com/owasp-modsecurity/ModSecurity/releases/download/v3.0.15/modsecurity-v3.0.15.tar.gz
dependencies:
  - libmaxminddb
  - lua
  - pcre2
  - yajl
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: modsec-rules-check
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:modsecurity
  brew: brew install modsecurity
  zypper: sudo zypper install modsecurity
provenance:
  formula: modsecurity
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
