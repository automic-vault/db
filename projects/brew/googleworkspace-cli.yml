id: brew:googleworkspace-cli
display-name: googleworkspace-cli
homepage: https://developers.google.com/workspace
repo: https://github.com/googleworkspace/cli
docs: https://developers.google.com/workspace
package-manager:
  brew: googleworkspace-cli
  macports: googleworkspace-cli
  nix: gws
  pacman: googleworkspace-cli
  winget: Google.WorkspaceCLI
package-manager-url: https://formulae.brew.sh/formula/googleworkspace-cli
version: 0.22.5
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for Drive, Gmail, Calendar, Sheets, Docs, Chat, Admin, and more
source-archive: https://github.com/googleworkspace/cli/archive/refs/tags/v0.22.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gws
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:googleworkspace-cli
  brew: brew install googleworkspace-cli
  macports: sudo port install googleworkspace-cli
  nix: nix profile install nixpkgs#gws
  pacman: sudo pacman -S googleworkspace-cli
  winget: winget install --id Google.WorkspaceCLI -e
provenance:
  formula: googleworkspace-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
