id: brew:litani
display-name: litani
homepage: https://awslabs.github.io/aws-build-accumulator/
repo: https://github.com/awslabs/aws-build-accumulator
docs: https://awslabs.github.io/aws-build-accumulator/
package-manager:
  brew: litani
package-manager-url: https://formulae.brew.sh/formula/litani
version: 1.29.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Metabuild system
source-archive: https://github.com/awslabs/aws-build-accumulator.git
dependencies:
  - gnuplot
  - graphviz
  - libyaml
  - ninja
  - python@3.14
build-dependencies:
  - coreutils
  - mandoc
  - scdoc
executables:
  - exposure: global executable
    kind: cli
    name: litani
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:litani
  brew: brew install litani
provenance:
  formula: litani
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
