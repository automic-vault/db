id: brew:k3sup
display-name: k3sup
homepage: https://k3sup.dev
repo: https://github.com/alexellis/k3sup
docs: https://k3sup.dev
package-manager:
  apk: k3sup
  brew: k3sup
  macports: k3sup
  nix: k3sup
  scoop: main/k3sup
  zypper: k3sup
package-manager-url: https://formulae.brew.sh/formula/k3sup
version: 0.13.12
license: MIT
category: development
tags:
  - cli
description: Utility to create k3s clusters on any local or remote VM
source-archive: https://github.com/alexellis/k3sup.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: k3sup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add k3sup
  av: sudo av install brew:k3sup
  brew: brew install k3sup
  macports: sudo port install k3sup
  nix: nix profile install nixpkgs#k3sup
  scoop: scoop install main/k3sup
  zypper: sudo zypper install k3sup
provenance:
  formula: k3sup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
