id: brew:nethogs
display-name: nethogs
homepage: https://raboof.github.io/nethogs/
repo: https://github.com/raboof/nethogs
docs: https://raboof.github.io/nethogs/
package-manager:
  apk: nethogs
  brew: nethogs
  debian: nethogs
  dnf: nethogs
  nix: nethogs
  pacman: nethogs
  ubuntu: nethogs
  zypper: nethogs
package-manager-url: https://formulae.brew.sh/formula/nethogs
version: 0.8.8
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Net top tool grouping bandwidth per process
source-archive: https://github.com/raboof/nethogs/archive/refs/tags/v0.8.8.tar.gz
uses-from-macos:
  - libpcap
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: nethogs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nethogs
  av: sudo av install brew:nethogs
  brew: brew install nethogs
  debian: sudo apt install nethogs
  dnf: sudo dnf install nethogs
  nix: nix profile install nixpkgs#nethogs
  pacman: sudo pacman -S nethogs
  ubuntu: sudo apt install nethogs
  zypper: sudo zypper install nethogs
provenance:
  formula: nethogs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
