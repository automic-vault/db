id: brew:code-server
display-name: code-server
homepage: https://github.com/coder/code-server
repo: https://registry.npmjs.org/code-server/-/code-server-4.112.0.tgz
docs: https://github.com/coder/code-server
package-manager:
  brew: code-server
  nix: code-server
package-manager-url: https://formulae.brew.sh/formula/code-server
version: 4.112.0
license: MIT
category: development
tags:
  - cli
description: Access VS Code through the browser
source-archive: https://registry.npmjs.org/code-server/-/code-server-4.112.0.tgz
dependencies:
  - node@22
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: code-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The launchd service runs on http://127.0.0.1:8080. Logs are located at
    $HOMEBREW_PREFIX/var/log/code-server.log.
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:code-server
  brew: brew install code-server
  nix: nix profile install nixpkgs#code-server
provenance:
  formula: code-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
