id: brew:vhs
display-name: vhs
homepage: https://github.com/charmbracelet/vhs
repo: https://github.com/charmbracelet/vhs
docs: https://github.com/charmbracelet/vhs
package-manager:
  apk: vhs
  brew: vhs
  dnf: vhs
  macports: vhs
  nix: vhs
  pacman: vhs
  scoop: main/vhs
  winget: charmbracelet.vhs
  zypper: vhs
package-manager-url: https://formulae.brew.sh/formula/vhs
version: 0.11.0
license: MIT
category: development
tags:
  - cli
description: Your CLI home video recorder
source-archive: https://github.com/charmbracelet/vhs/archive/refs/tags/v0.11.0.tar.gz
dependencies:
  - ffmpeg
  - ttyd
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vhs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vhs
  av: sudo av install brew:vhs
  brew: brew install vhs
  dnf: sudo dnf install vhs
  macports: sudo port install vhs
  nix: nix profile install nixpkgs#vhs
  pacman: sudo pacman -S vhs
  scoop: scoop install main/vhs
  winget: winget install --id charmbracelet.vhs -e
  zypper: sudo zypper install vhs
provenance:
  formula: vhs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
