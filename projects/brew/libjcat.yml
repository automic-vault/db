id: brew:libjcat
display-name: libjcat
homepage: https://github.com/hughsie/libjcat
repo: https://github.com/hughsie/libjcat
docs: https://github.com/hughsie/libjcat
package-manager:
  apk: libjcat
  brew: libjcat
  dnf: libjcat
  nix: libjcat
  pacman: libjcat
  zypper: jcat-tool
package-manager-url: https://formulae.brew.sh/formula/libjcat
version: 0.2.6
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Library for reading Jcat files
source-archive: https://github.com/hughsie/libjcat/releases/download/0.2.6/libjcat-0.2.6.tar.xz
dependencies:
  - gettext
  - glib
  - gnutls
  - json-glib
build-dependencies:
  - gi-docgen
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: jcat-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libjcat
  av: sudo av install brew:libjcat
  brew: brew install libjcat
  dnf: sudo dnf install libjcat
  nix: nix profile install nixpkgs#libjcat
  pacman: sudo pacman -S libjcat
  zypper: sudo zypper install jcat-tool
provenance:
  formula: libjcat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
