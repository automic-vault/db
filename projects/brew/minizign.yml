id: brew:minizign
display-name: minizign
homepage: https://github.com/jedisct1/zig-minisign
repo: https://github.com/jedisct1/zig-minisign
docs: https://github.com/jedisct1/zig-minisign
package-manager:
  brew: minizign
  nix: minizign
  zypper: minizign
package-manager-url: https://formulae.brew.sh/formula/minizign
version: 0.1.13
license: ISC
category: development
tags:
  - cli
description: Minisign reimplemented in Zig
source-archive: https://github.com/jedisct1/zig-minisign/archive/refs/tags/0.1.13.tar.gz
build-dependencies:
  - zig
executables:
  - exposure: global executable
    kind: cli
    name: minizign
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:minizign
  brew: brew install minizign
  nix: nix profile install nixpkgs#minizign
  zypper: sudo zypper install minizign
provenance:
  formula: minizign
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
