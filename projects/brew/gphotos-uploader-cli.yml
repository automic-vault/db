id: brew:gphotos-uploader-cli
display-name: gphotos-uploader-cli
homepage: https://gphotosuploader.github.io/gphotos-uploader-cli/
repo: https://github.com/gphotosuploader/gphotos-uploader-cli
docs: https://gphotosuploader.github.io/gphotos-uploader-cli/
package-manager:
  brew: gphotos-uploader-cli
package-manager-url: https://formulae.brew.sh/formula/gphotos-uploader-cli
version: 5.1.0
license: MIT
category: development
tags:
  - cli
description: Command-line tool to mass upload media folders to Google Photos
source-archive: https://github.com/gphotosuploader/gphotos-uploader-cli/archive/refs/tags/v5.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gphotos-uploader-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gphotos-uploader-cli
  brew: brew install gphotos-uploader-cli
provenance:
  formula: gphotos-uploader-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
