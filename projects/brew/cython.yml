id: brew:cython
display-name: cython
homepage: https://cython.org/
repo: >
  https://files.pythonhosted.org/packages/3f/3b/ebd94c8b85f8e41b5015a9ed94ee3df866024d480d05cd08b774684fb81d/cython-3.2.5.tar.gz
docs: https://cython.org/
package-manager:
  apk: cython
  brew: cython
  pacman: cython
package-manager-url: https://formulae.brew.sh/formula/cython
version: 3.2.5
license: Apache-2.0
category: development
tags:
  - cli
description: Compiler for writing C extensions for the Python language
source-archive: >
  https://files.pythonhosted.org/packages/3f/3b/ebd94c8b85f8e41b5015a9ed94ee3df866024d480d05cd08b774684fb81d/cython-3.2.5.tar.gz
dependencies:
  - python@3.14
build-dependencies:
  - python-setuptools
executables:
  - exposure: global executable
    kind: cli
    name: cygdb
  - exposure: global executable
    kind: cli
    name: cython
  - exposure: global executable
    kind: cli
    name: cythonize
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cython
  av: sudo av install brew:cython
  brew: brew install cython
  pacman: sudo pacman -S cython
provenance:
  formula: cython
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
