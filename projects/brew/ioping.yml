id: brew:ioping
display-name: ioping
homepage: https://github.com/koct9i/ioping
repo: https://github.com/koct9i/ioping
docs: https://github.com/koct9i/ioping
package-manager:
  apk: ioping
  brew: ioping
  debian: ioping
  dnf: ioping
  macports: ioping
  nix: ioping
  pacman: ioping
  ubuntu: ioping
  zypper: ioping
package-manager-url: https://formulae.brew.sh/formula/ioping
version: 1.3
license: GPL-3.0-or-later
