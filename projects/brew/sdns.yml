id: brew:sdns
display-name: sdns
homepage: https://sdns.dev/
repo: https://github.com/semihalev/sdns
docs: https://sdns.dev/
package-manager:
  brew: sdns
  winget: Texnomic.SecureDNS-Terminal
package-manager-url: https://formulae.brew.sh/formula/sdns
version: 1.6.7
license: MIT
category: development
tags:
  - cli
description: Privacy important, fast, recursive dns resolver server with dnssec support
source-archive: https://github.com/semihalev/sdns/archive/refs/tags/v1.6.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sdns
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:sdns
  brew: brew install sdns
  winget: winget install --id Texnomic.SecureDNS-Terminal -e
provenance:
  formula: sdns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
