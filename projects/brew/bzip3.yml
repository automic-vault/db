id: brew:bzip3
display-name: bzip3
homepage: https://github.com/kspalaiologos/bzip3
repo: https://github.com/kspalaiologos/bzip3
docs: https://github.com/kspalaiologos/bzip3
package-manager:
  apk: bzip3
  brew: bzip3
  debian: bzip3
  dnf: bzip3
  macports: bzip3
  nix: bzip3
  pacman: bzip3
  scoop: extras/bzip3
  ubuntu: bzip3
  zypper: bzip3
package-manager-url: https://formulae.brew.sh/formula/bzip3
version: 1.5.3
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Better and stronger spiritual successor to BZip2
source-archive: https://github.com/kspalaiologos/bzip3/releases/download/1.5.3/bzip3-1.5.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bunzip3
  - exposure: global executable
    kind: cli
    name: bz3cat
  - exposure: global executable
    kind: cli
    name: bz3grep
  - exposure: global executable
    kind: cli
    name: bz3less
  - exposure: global executable
    kind: cli
    name: bz3more
  - exposure: global executable
    kind: cli
    name: bz3most
  - exposure: global executable
    kind: cli
    name: bzip3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bzip3
  av: sudo av install brew:bzip3
  brew: brew install bzip3
  debian: sudo apt install bzip3
  dnf: sudo dnf install bzip3
  macports: sudo port install bzip3
  nix: nix profile install nixpkgs#bzip3
  pacman: sudo pacman -S bzip3
  scoop: scoop install extras/bzip3
  ubuntu: sudo apt install bzip3
  zypper: sudo zypper install bzip3
provenance:
  formula: bzip3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
