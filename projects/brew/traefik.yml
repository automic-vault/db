id: brew:traefik
display-name: traefik
homepage: https://traefik.io/
repo: https://github.com/traefik/traefik
docs: https://traefik.io/
package-manager:
  apk: traefik
  brew: traefik
  macports: traefik
  nix: traefik
  pacman: traefik
  scoop: main/traefik
  zypper: traefik
package-manager-url: https://formulae.brew.sh/formula/traefik
version: 3.7.1
license: MIT
category: development
tags:
  - cli
description: Modern reverse proxy
source-archive: https://github.com/traefik/traefik/releases/download/v3.7.1/traefik-v3.7.1.src.tar.gz
build-dependencies:
  - corepack
  - go
  - node
executables:
  - exposure: global executable
    kind: cli
    name: traefik
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add traefik
  av: sudo av install brew:traefik
  brew: brew install traefik
  macports: sudo port install traefik
  nix: nix profile install nixpkgs#traefik
  pacman: sudo pacman -S traefik
  scoop: scoop install main/traefik
  zypper: sudo zypper install traefik
provenance:
  formula: traefik
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
