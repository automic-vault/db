id: brew:ruby-build
display-name: ruby-build
homepage: https://rbenv.org/man/ruby-build.1
repo: https://github.com/rbenv/ruby-build
docs: https://rbenv.org/man/ruby-build.1
package-manager:
  apk: ruby-build
  brew: ruby-build
  debian: ruby-build
  dnf: ruby-build
  macports: ruby-build
  pacman: ruby-build
  ubuntu: ruby-build
  zypper: ruby-build
package-manager-url: https://formulae.brew.sh/formula/ruby-build
version: 20260520
license: MIT
category: development
tags:
  - cli
description: Install various Ruby versions and implementations
source-archive: https://github.com/rbenv/ruby-build/archive/refs/tags/v20260520.tar.gz
dependencies:
  - autoconf
  - libyaml
  - openssl@3
  - pkgconf
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: rbenv-install
  - exposure: global executable
    kind: cli
    name: rbenv-uninstall
  - exposure: global executable
    kind: cli
    name: ruby-build
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ruby-build
  av: sudo av install brew:ruby-build
  brew: brew install ruby-build
  debian: sudo apt install ruby-build
  dnf: sudo dnf install ruby-build
  macports: sudo port install ruby-build
  pacman: sudo pacman -S ruby-build
  ubuntu: sudo apt install ruby-build
  zypper: sudo zypper install ruby-build
provenance:
  formula: ruby-build
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
