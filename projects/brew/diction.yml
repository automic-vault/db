id: brew:diction
display-name: diction
homepage: https://www.gnu.org/software/diction/
repo: https://ftpmirror.gnu.org/gnu/diction/diction-1.11.tar.gz
docs: https://www.gnu.org/software/diction/
package-manager:
  brew: diction
  debian: diction
  dnf: diction
  macports: diction
  nix: diction
  ubuntu: diction
package-manager-url: https://formulae.brew.sh/formula/diction
version: 1.11
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU diction and style
source-archive: https://ftpmirror.gnu.org/gnu/diction/diction-1.11.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: diction
  - exposure: global executable
    kind: cli
    name: style
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:diction
  brew: brew install diction
  debian: sudo apt install diction
  dnf: sudo dnf install diction
  macports: sudo port install diction
  nix: nix profile install nixpkgs#diction
  ubuntu: sudo apt install diction
provenance:
  formula: diction
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
