id: brew:apt
display-name: apt
homepage: https://wiki.debian.org/Apt
repo: https://salsa.debian.org/apt-team/apt/-/archive/3.2.0/apt-3.2.0.tar.bz2
docs: https://wiki.debian.org/Apt
package-manager:
  apk: apt
  brew: apt
  debian: apt
  dnf: apt
  nix: apt
  pacman: apt
  ubuntu: apt
package-manager-url: https://formulae.brew.sh/formula/apt
version: 3.2.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Advanced Package Tool
source-archive: https://salsa.debian.org/apt-team/apt/-/archive/3.2.0/apt-3.2.0.tar.bz2
dependencies:
  - berkeley-db@5
  - bzip2
  - dpkg
  - gcc
  - lz4
  - openssl@3
  - perl
  - sequoia-sqv
  - systemd
  - xxhash
  - xz
  - zlib-ng-compat
  - zstd
build-dependencies:
  - cmake
  - docbook
  - docbook-xsl
  - doxygen
  - gettext
  - libxslt
  - po4a
  - w3m
executables:
  - exposure: global executable
    kind: cli
    name: apt
  - exposure: global executable
    kind: cli
    name: apt-cache
  - exposure: global executable
    kind: cli
    name: apt-cdrom
  - exposure: global executable
    kind: cli
    name: apt-config
  - exposure: global executable
    kind: cli
    name: apt-ftparchive
  - exposure: global executable
    kind: cli
    name: apt-get
  - exposure: global executable
    kind: cli
    name: apt-mark
  - exposure: global executable
    kind: cli
    name: apt-sortpkgs
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add apt
  av: sudo av install brew:apt
  brew: brew install apt
  debian: sudo apt install apt
  dnf: sudo dnf install apt
  nix: nix profile install nixpkgs#apt
  pacman: sudo pacman -S apt
  ubuntu: sudo apt install apt
provenance:
  formula: apt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
