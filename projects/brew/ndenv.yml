id: brew:ndenv
display-name: ndenv
homepage: https://github.com/riywo/ndenv
repo: https://github.com/riywo/ndenv
docs: https://github.com/riywo/ndenv
package-manager:
  brew: ndenv
package-manager-url: https://formulae.brew.sh/formula/ndenv
version: 0.4.0
license: MIT
category: development
tags:
  - cli
description: Node version manager
source-archive: https://github.com/riywo/ndenv/archive/refs/tags/v0.4.0.tar.gz
dependencies:
  - node-build
executables:
  - exposure: global executable
    kind: cli
    name: ndenv
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ndenv
  brew: brew install ndenv
provenance:
  formula: ndenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
