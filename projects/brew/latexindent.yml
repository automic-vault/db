id: brew:latexindent
display-name: latexindent
homepage: https://latexindentpl.readthedocs.io
repo: https://github.com/cmhughes/latexindent.pl
docs: https://latexindentpl.readthedocs.io
package-manager:
  brew: latexindent
  scoop: main/latexindent
package-manager-url: https://formulae.brew.sh/formula/latexindent
version: 4.0.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Add indentation to LaTeX files
source-archive: https://github.com/cmhughes/latexindent.pl/archive/refs/tags/V4.0.1.tar.gz
dependencies:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: latexindent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:latexindent
  brew: brew install latexindent
  scoop: scoop install main/latexindent
provenance:
  formula: latexindent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
