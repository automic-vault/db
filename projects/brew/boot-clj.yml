id: brew:boot-clj
display-name: boot-clj
homepage: https://boot-clj.github.io/
repo: https://github.com/boot-clj/boot
docs: https://boot-clj.github.io/
package-manager:
  brew: boot-clj
  nix: boot
  scoop: extras/boot-clj
package-manager-url: https://formulae.brew.sh/formula/boot-clj
version: 2.8.3
license: EPL-1.0
category: development
tags:
  - cli
description: Build tooling for Clojure
source-archive: https://github.com/boot-clj/boot/releases/download/2.8.3/boot.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: boot
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:boot-clj
  brew: brew install boot-clj
  nix: nix profile install nixpkgs#boot
  scoop: scoop install extras/boot-clj
provenance:
  formula: boot-clj
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
