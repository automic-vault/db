id: brew:container
display-name: container
homepage: https://apple.github.io/container/documentation/
repo: https://github.com/apple/container
docs: https://apple.github.io/container/documentation/
package-manager:
  brew: container
  macports: container
  nix: container
package-manager-url: https://formulae.brew.sh/formula/container
version: 0.12.3
license: Apache-2.0
category: development
tags:
  - cli
description: Create and run Linux containers using lightweight virtual machines
source-archive: https://github.com/apple/container/archive/refs/tags/0.12.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: container
  - exposure: global executable
    kind: cli
    name: container-apiserver
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_tahoe
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
  service: declared
install-lines:
  av: sudo av install brew:container
  brew: brew install container
  macports: sudo port install container
  nix: nix profile install nixpkgs#container
provenance:
  formula: container
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
