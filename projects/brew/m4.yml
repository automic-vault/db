id: brew:m4
display-name: m4
homepage: https://www.gnu.org/software/m4/
repo: https://ftpmirror.gnu.org/gnu/m4/m4-1.4.21.tar.xz
docs: https://www.gnu.org/software/m4/
package-manager:
  apk: m4
  brew: m4
