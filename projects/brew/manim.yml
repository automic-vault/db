id: brew:manim
display-name: manim
homepage: https://www.manim.community
repo: >
  https://files.pythonhosted.org/packages/dc/3b/ad54ce02f3e95d17d016cb1254708ae3795b60d5661f3b2085655940a565/manim-0.20.1.tar.gz
docs: https://www.manim.community
package-manager:
  brew: manim
  chocolatey: manimce
  nix: manim
package-manager-url: https://formulae.brew.sh/formula/manim
version: 0.20.1
license: MIT
category: media
tags:
  - cli
