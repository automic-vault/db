  - ffmpeg
  - fontconfig
  - freetype
  - gettext
  - glib
  - harfbuzz
  - numpy
  - pango
  - pillow
  - py3cairo
  - python@3.14
  - scipy
build-dependencies:
  - cmake
  - ninja
  - pkgconf
executables:
