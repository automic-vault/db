id: brew:fastk
display-name: fastk
homepage: https://github.com/thegenemyers/FASTK
repo: https://github.com/thegenemyers/FASTK
docs: https://github.com/thegenemyers/FASTK
package-manager:
  brew: fastk
package-manager-url: https://formulae.brew.sh/formula/fastk
version: 1.2
license: BSD-3-Clause AND (MIT AND BSD-3-Clause) AND MIT
category: development
tags:
  - cli
description: K-mer counter for high-fidelity shotgun datasets
source-archive: https://github.com/thegenemyers/FASTK/archive/refs/tags/v1.2.tar.gz
dependencies:
  - xz
uses-from-macos:
  - bzip2
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: FastK
  - exposure: global executable
    kind: cli
    name: Fastcat
  - exposure: global executable
    kind: cli
    name: Fastcp
  - exposure: global executable
    kind: cli
    name: Fastmerge
  - exposure: global executable
    kind: cli
    name: Fastmv
  - exposure: global executable
    kind: cli
    name: Fastrm
  - exposure: global executable
    kind: cli
    name: Haplex
  - exposure: global executable
    kind: cli
    name: Histex
  - exposure: global executable
    kind: cli
    name: Homex
  - exposure: global executable
    kind: cli
    name: KmerMap
  - exposure: global executable
    kind: cli
    name: Logex
  - exposure: global executable
    kind: cli
    name: Profex
  - exposure: global executable
    kind: cli
    name: Symmex
  - exposure: global executable
    kind: cli
    name: Tabex
  - exposure: global executable
    kind: cli
    name: Vennex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fastk
  brew: brew install fastk
provenance:
  formula: fastk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
