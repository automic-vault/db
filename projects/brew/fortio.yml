id: brew:fortio
display-name: fortio
homepage: https://fortio.org/
repo: https://github.com/fortio/fortio
docs: https://fortio.org/
package-manager:
  brew: fortio
  macports: fortio
  zypper: fortio
package-manager-url: https://formulae.brew.sh/formula/fortio
version: 1.75.1
license: Apache-2.0
category: development
tags:
  - cli
description: HTTP and gRPC load testing and visualization tool and server
source-archive: https://github.com/fortio/fortio.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fortio
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fortio
  brew: brew install fortio
  macports: sudo port install fortio
  zypper: sudo zypper install fortio
provenance:
  formula: fortio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
