id: brew:xwininfo
display-name: xwininfo
homepage: https://gitlab.freedesktop.org/xorg/app/xwininfo
repo: https://www.x.org/archive/individual/app/xwininfo-1.1.6.tar.xz
docs: https://gitlab.freedesktop.org/xorg/app/xwininfo
package-manager:
  apk: xwininfo
  brew: xwininfo
  dnf: xwininfo
  macports: xwininfo
  nix: xwininfo
  zypper: xwininfo
package-manager-url: https://formulae.brew.sh/formula/xwininfo
version: 1.1.6
license: MIT
category: development
tags:
  - cli
description: Print information about windows on an X server
source-archive: https://www.x.org/archive/individual/app/xwininfo-1.1.6.tar.xz
dependencies:
  - libx11
  - libxcb
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xwininfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xwininfo
  av: sudo av install brew:xwininfo
  brew: brew install xwininfo
  dnf: sudo dnf install xwininfo
  macports: sudo port install xwininfo
  nix: nix profile install nixpkgs#xwininfo
  zypper: sudo zypper install xwininfo
provenance:
  formula: xwininfo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
