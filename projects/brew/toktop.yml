id: brew:toktop
display-name: toktop
homepage: https://github.com/htin1/toktop
repo: https://github.com/htin1/toktop
docs: https://github.com/htin1/toktop
package-manager:
  brew: toktop
package-manager-url: https://formulae.brew.sh/formula/toktop
version: 0.1.5
license: MIT
category: development
tags:
  - cli
description: LLM usage monitor in terminal
source-archive: https://github.com/htin1/toktop/archive/refs/tags/v0.1.5.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: toktop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:toktop
  brew: brew install toktop
provenance:
  formula: toktop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
