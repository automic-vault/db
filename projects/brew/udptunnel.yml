id: brew:udptunnel
display-name: udptunnel
homepage: http://www1.cs.columbia.edu/~lennox/udptunnel/
repo: https://pkg.freebsd.org/ports-distfiles/udptunnel-1.1.tar.gz
docs: http://www1.cs.columbia.edu/~lennox/udptunnel/
package-manager:
  brew: udptunnel
  debian: udptunnel
  nix: udptunnel
  ubuntu: udptunnel
package-manager-url: https://formulae.brew.sh/formula/udptunnel
version: 1.1
license: BSD-3-Clause
category: network
tags:
  - cli
description: Tunnel UDP packets over a TCP connection
source-archive: https://pkg.freebsd.org/ports-distfiles/udptunnel-1.1.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: udptunnel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:udptunnel
  brew: brew install udptunnel
  debian: sudo apt install udptunnel
  nix: nix profile install nixpkgs#udptunnel
  ubuntu: sudo apt install udptunnel
provenance:
  formula: udptunnel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
