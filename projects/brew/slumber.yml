id: brew:slumber
display-name: slumber
homepage: https://slumber.lucaspickering.me/
repo: https://github.com/LucasPickering/slumber
docs: https://slumber.lucaspickering.me/
package-manager:
  brew: slumber
  nix: slumber
  pacman: slumber
package-manager-url: https://formulae.brew.sh/formula/slumber
version: 5.3.0
license: MIT
category: development
tags:
  - cli
description: Terminal-based HTTP/REST client
source-archive: https://github.com/LucasPickering/slumber/archive/refs/tags/v5.3.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: slumber
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:slumber
  brew: brew install slumber
  nix: nix profile install nixpkgs#slumber
  pacman: sudo pacman -S slumber
provenance:
  formula: slumber
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
