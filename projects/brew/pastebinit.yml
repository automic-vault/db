id: brew:pastebinit
display-name: pastebinit
homepage: https://github.com/pastebinit/pastebinit
repo: https://github.com/pastebinit/pastebinit
docs: https://github.com/pastebinit/pastebinit
package-manager:
  brew: pastebinit
  debian: pastebinit
  dnf: pastebinit
  macports: pastebinit
  nix: pastebinit
  pacman: pastebinit
  ubuntu: pastebinit
  zypper: pastebinit
package-manager-url: https://formulae.brew.sh/formula/pastebinit
version: 1.8.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Send things to pastebin from the command-line
source-archive: https://github.com/pastebinit/pastebinit/archive/refs/tags/1.8.0.tar.gz
build-dependencies:
  - docbook2x
  - gettext
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: pastebinit
  - exposure: global executable
    kind: cli
    name: pbget
  - exposure: global executable
    kind: cli
    name: pbput
  - exposure: global executable
    kind: cli
    name: pbputs
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pastebinit
  brew: brew install pastebinit
  debian: sudo apt install pastebinit
  dnf: sudo dnf install pastebinit
  macports: sudo port install pastebinit
  nix: nix profile install nixpkgs#pastebinit
  pacman: sudo pacman -S pastebinit
  ubuntu: sudo apt install pastebinit
  zypper: sudo zypper install pastebinit
provenance:
  formula: pastebinit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
