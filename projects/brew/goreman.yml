id: brew:goreman
display-name: goreman
homepage: https://github.com/mattn/goreman
repo: https://github.com/mattn/goreman
docs: https://github.com/mattn/goreman
package-manager:
  apk: goreman
  brew: goreman
  nix: goreman
  scoop: main/goreman
package-manager-url: https://formulae.brew.sh/formula/goreman
version: 0.3.17
license: MIT
category: development
tags:
  - cli
description: Foreman clone written in Go
source-archive: https://github.com/mattn/goreman/archive/refs/tags/v0.3.17.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goreman
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add goreman
  av: sudo av install brew:goreman
  brew: brew install goreman
  nix: nix profile install nixpkgs#goreman
  scoop: scoop install main/goreman
provenance:
  formula: goreman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
