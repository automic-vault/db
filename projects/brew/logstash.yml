id: brew:logstash
display-name: logstash
homepage: https://www.elastic.co/products/logstash
repo: https://github.com/elastic/logstash
docs: https://www.elastic.co/products/logstash
package-manager:
  brew: logstash
  chocolatey: logstash
  nix: logstash
  scoop: extras/logstash
package-manager-url: https://formulae.brew.sh/formula/logstash
version: 9.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: Tool for managing events and logs
source-archive: https://github.com/elastic/logstash/archive/refs/tags/v9.4.1.tar.gz
dependencies:
  - openjdk@21
build-dependencies:
  - gradle@8
executables:
  - exposure: global executable
    kind: cli
    name: logstash
  - exposure: global executable
    kind: cli
    name: logstash-plugin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: Configuration files are located in $HOMEBREW_PREFIX/etc/logstash/
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:logstash
  brew: brew install logstash
  chocolatey: choco install logstash
  nix: nix profile install nixpkgs#logstash
  scoop: scoop install extras/logstash
provenance:
  formula: logstash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
