id: brew:ad
display-name: ad
homepage: https://github.com/sminez/ad
repo: https://github.com/sminez/ad
docs: https://github.com/sminez/ad
package-manager:
  brew: ad
  nix: ad
package-manager-url: https://formulae.brew.sh/formula/ad
version: 0.4.0
license: MIT
category: development
tags:
  - cli
description: Adaptable text editor inspired by vi, kakoune, and acme
source-archive: https://github.com/sminez/ad/archive/refs/tags/0.4.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ad
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ad
  brew: brew install ad
  nix: nix profile install nixpkgs#ad
provenance:
  formula: ad
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
