id: brew:trojan-go
display-name: trojan-go
homepage: https://p4gefau1t.github.io/trojan-go/
repo: https://github.com/p4gefau1t/trojan-go
docs: https://p4gefau1t.github.io/trojan-go/
package-manager:
  brew: trojan-go
  macports: trojan-go
  nix: trojan-go
package-manager-url: https://formulae.brew.sh/formula/trojan-go
version: 0.10.6
license: GPL-3.0-only
category: development
tags:
  - cli
description: Trojan proxy in Go
source-archive: https://github.com/p4gefau1t/trojan-go.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: trojan-go
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: An example config is installed to $HOMEBREW_PREFIX/etc/trojan-go/config.json
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:trojan-go
  brew: brew install trojan-go
  macports: sudo port install trojan-go
  nix: nix profile install nixpkgs#trojan-go
provenance:
  formula: trojan-go
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
