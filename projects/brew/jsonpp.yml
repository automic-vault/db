id: brew:jsonpp
display-name: jsonpp
homepage: https://jmhodges.github.io/jsonpp/
repo: https://github.com/jmhodges/jsonpp
docs: https://jmhodges.github.io/jsonpp/
package-manager:
  brew: jsonpp
package-manager-url: https://formulae.brew.sh/formula/jsonpp
version: 1.3.0
license: MIT
category: development
tags:
  - cli
  - json
description: Command-line JSON pretty-printer
source-archive: https://github.com/jmhodges/jsonpp/archive/refs/tags/1.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jsonpp
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jsonpp
  brew: brew install jsonpp
provenance:
  formula: jsonpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
