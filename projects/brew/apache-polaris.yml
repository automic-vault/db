id: brew:apache-polaris
display-name: apache-polaris
homepage: https://polaris.apache.org/
repo: https://github.com/apache/polaris
docs: https://polaris.apache.org/
package-manager:
  brew: apache-polaris
package-manager-url: https://formulae.brew.sh/formula/apache-polaris
version: 1.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Interoperable, open source catalog for Apache Iceberg
source-archive: >
  https://github.com/apache/polaris/archive/refs/tags/apache-polaris-1.3.0-incubating.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - gradle
executables:
  - exposure: global executable
    kind: cli
    name: polaris-admin
  - exposure: global executable
    kind: cli
    name: polaris-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:apache-polaris
  brew: brew install apache-polaris
provenance:
  formula: apache-polaris
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
