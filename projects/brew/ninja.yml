id: brew:ninja
display-name: ninja
homepage: https://ninja-build.org/
repo: https://github.com/ninja-build/ninja
docs: https://ninja-build.org/
package-manager:
  brew: ninja
  chocolatey: ninja
  macports: ninja
  nix: ninja
  pacman: ninja
  scoop: main/ninja
  winget: Ninja-build.Ninja
  zypper: ninja
package-manager-url: https://formulae.brew.sh/formula/ninja
version: 1.13.2
license: Apache-2.0
category: development
tags:
  - cli
description: Small build system for use with gyp or CMake
source-archive: https://github.com/ninja-build/ninja/archive/refs/tags/v1.13.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ninja
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ninja
  brew: brew install ninja
  chocolatey: choco install ninja
  macports: sudo port install ninja
  nix: nix profile install nixpkgs#ninja
  pacman: sudo pacman -S ninja
  scoop: scoop install main/ninja
  winget: winget install --id Ninja-build.Ninja -e
  zypper: sudo zypper install ninja
provenance:
  formula: ninja
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
