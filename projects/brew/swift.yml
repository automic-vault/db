id: brew:swift
display-name: swift
homepage: https://www.swift.org
repo: https://github.com/swiftlang/swift
docs: https://www.swift.org
package-manager:
  brew: swift
  debian: swift
  scoop: main/swift
  ubuntu: swift
  winget: Swift.Toolchain
package-manager-url: https://formulae.brew.sh/formula/swift
version: 6.2.4
license: Apache-2.0
category: development
tags:
  - cli
description: High-performance system programming language
source-archive: https://github.com/swiftlang/swift/archive/refs/tags/swift-6.2.4-RELEASE.tar.gz
dependencies:
  - python@3.14
  - zstd
build-dependencies:
  - cmake
  - ninja
uses-from-macos:
  - curl
  - libedit
  - libxml2
  - ncurses
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: sourcekit-lsp
  - exposure: global executable
    kind: cli
    name: sourcekitd-repl
  - exposure: global executable
    kind: cli
    name: swift
  - exposure: global executable
    kind: cli
    name: swift-api-checker.py
  - exposure: global executable
    kind: cli
    name: swift-api-digester
  - exposure: global executable
    kind: cli
    name: swift-api-dump.py
  - exposure: global executable
    kind: cli
    name: swift-ast-script
  - exposure: global executable
    kind: cli
    name: swift-autolink-extract
  - exposure: global executable
    kind: cli
    name: swift-build
  - exposure: global executable
    kind: cli
    name: swift-build-sdk-interfaces
  - exposure: global executable
    kind: cli
    name: swift-build-tool
  - exposure: global executable
    kind: cli
    name: swift-cache-tool
  - exposure: global executable
    kind: cli
    name: swift-compatibility-symbols
  - exposure: global executable
    kind: cli
    name: swift-def-to-strings-converter
  - exposure: global executable
    kind: cli
    name: swift-demangle
  - exposure: global executable
    kind: cli
    name: swift-driver
  - exposure: global executable
    kind: cli
    name: swift-experimental-sdk
  - exposure: global executable
    kind: cli
    name: swift-frontend
  - exposure: global executable
    kind: cli
    name: swift-help
  - exposure: global executable
    kind: cli
    name: swift-legacy-driver
  - exposure: global executable
    kind: cli
    name: swift-package
  - exposure: global executable
    kind: cli
    name: swift-package-collection
  - exposure: global executable
    kind: cli
    name: swift-package-registry
  - exposure: global executable
    kind: cli
    name: swift-plugin-server
  - exposure: global executable
    kind: cli
    name: swift-reflection-dump
  - exposure: global executable
    kind: cli
    name: swift-run
  - exposure: global executable
    kind: cli
    name: swift-scan-test
  - exposure: global executable
    kind: cli
    name: swift-sdk
  - exposure: global executable
    kind: cli
    name: swift-serialize-diagnostics
