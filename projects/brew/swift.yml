    kind: cli
    name: swift-symbolgraph-extract
  - exposure: global executable
    kind: cli
    name: swift-synthesize-interface
  - exposure: global executable
    kind: cli
    name: swift-test
  - exposure: global executable
    kind: cli
    name: swiftc
  - exposure: global executable
    kind: cli
    name: swiftc-legacy-driver
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    An Xcode toolchain has been installed to:
    $HOMEBREW_PREFIX/opt/swift/Swift-6.2.xctoolchain This can be symlinked for use
    within Xcode: ln -s $HOMEBREW_PREFIX/opt/swift/Swift-6.2.xctoolchain
    ~/Library/Developer/Toolchains/Swift-6.2.xctoolchain
  post-install-defined: false
install-lines:
  av: sudo av install brew:swift
  brew: brew install swift
  debian: sudo apt install swift
  scoop: scoop install main/swift
  ubuntu: sudo apt install swift
  winget: winget install --id Swift.Toolchain -e
provenance:
  formula: swift
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
