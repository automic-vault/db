id: brew:gotun
display-name: gotun
homepage: https://github.com/Sesame2/gotun
repo: https://github.com/Sesame2/gotun
docs: https://github.com/Sesame2/gotun
package-manager:
  brew: gotun
  dnf: gotun
package-manager-url: https://formulae.brew.sh/formula/gotun
version: 0.8.1
license: MIT
category: development
tags:
  - cli
description: Lightweight HTTP proxy over SSH
source-archive: https://github.com/Sesame2/gotun/archive/refs/tags/v0.8.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gotun
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gotun
  brew: brew install gotun
  dnf: sudo dnf install gotun
provenance:
  formula: gotun
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
