id: brew:cargo-depgraph
display-name: cargo-depgraph
homepage: https://sr.ht/~jplatte/cargo-depgraph/
repo: https://git.sr.ht/~jplatte/cargo-depgraph/archive/v1.6.0.tar.gz
docs: https://sr.ht/~jplatte/cargo-depgraph/
package-manager:
  brew: cargo-depgraph
  nix: cargo-depgraph
  pacman: cargo-depgraph
package-manager-url: https://formulae.brew.sh/formula/cargo-depgraph
version: 1.6.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Creates dependency graphs for cargo projects
source-archive: https://git.sr.ht/~jplatte/cargo-depgraph/archive/v1.6.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-depgraph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-depgraph
  brew: brew install cargo-depgraph
  nix: nix profile install nixpkgs#cargo-depgraph
  pacman: sudo pacman -S cargo-depgraph
provenance:
  formula: cargo-depgraph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
