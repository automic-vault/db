id: brew:osslsigncode
display-name: osslsigncode
homepage: https://github.com/mtrojnar/osslsigncode
repo: https://github.com/mtrojnar/osslsigncode
docs: https://github.com/mtrojnar/osslsigncode
package-manager:
  brew: osslsigncode
  debian: osslsigncode
  dnf: osslsigncode
  macports: osslsigncode
  nix: osslsigncode
  scoop: main/osslsigncode
  ubuntu: osslsigncode
  winget: MichalTrojnara.osslsigncode
  zypper: osslsigncode
package-manager-url: https://formulae.brew.sh/formula/osslsigncode
version: 2.13
license: GPL-3.0-or-later
category: security
tags:
  - cli
description: OpenSSL based Authenticode signing for PE/MSI/Java CAB files
source-archive: https://github.com/mtrojnar/osslsigncode/archive/refs/tags/2.13.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - cmake
uses-from-macos:
  - curl
  - python
executables:
  - exposure: global executable
    kind: cli
    name: osslsigncode
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:osslsigncode
  brew: brew install osslsigncode
  debian: sudo apt install osslsigncode
  dnf: sudo dnf install osslsigncode
  macports: sudo port install osslsigncode
  nix: nix profile install nixpkgs#osslsigncode
  scoop: scoop install main/osslsigncode
  ubuntu: sudo apt install osslsigncode
  winget: winget install --id MichalTrojnara.osslsigncode -e
  zypper: sudo zypper install osslsigncode
provenance:
  formula: osslsigncode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
