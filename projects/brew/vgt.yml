id: brew:vgt
display-name: vgt
homepage: https://github.com/roblaszczak/vgt
repo: https://github.com/roblaszczak/vgt
docs: https://github.com/roblaszczak/vgt
package-manager:
  brew: vgt
package-manager-url: https://formulae.brew.sh/formula/vgt
version: 1.0.1
license: MIT
category: development
tags:
