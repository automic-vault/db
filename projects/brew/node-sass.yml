id: brew:node-sass
display-name: node-sass
homepage: https://github.com/sass/dart-sass
repo: https://registry.npmjs.org/sass/-/sass-1.100.0.tgz
docs: https://github.com/sass/dart-sass
package-manager:
  brew: node-sass
  chocolatey: sass
  nix: sass
  scoop: main/sass
package-manager-url: https://formulae.brew.sh/formula/node-sass
version: 1.100.0
license: MIT
category: development
tags:
  - cli
description: JavaScript implementation of a Sass compiler
source-archive: https://registry.npmjs.org/sass/-/sass-1.100.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: sass
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:node-sass
  brew: brew install node-sass
  chocolatey: choco install sass
  nix: nix profile install nixpkgs#sass
  scoop: scoop install main/sass
provenance:
  formula: node-sass
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
