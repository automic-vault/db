id: brew:topiary
display-name: topiary
homepage: https://topiary.tweag.io/
repo: https://github.com/tweag/topiary
docs: https://topiary.tweag.io/
package-manager:
  brew: topiary
  nix: topiary
  winget: Tweag.Topiary
package-manager-url: https://formulae.brew.sh/formula/topiary
version: 0.7.3
license: MIT
category: development
tags:
  - cli
description: Uniform formatter for simple languages, as part of the Tree-sitter ecosystem
source-archive: https://github.com/tweag/topiary/archive/refs/tags/v0.7.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: topiary
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:topiary
  brew: brew install topiary
  nix: nix profile install nixpkgs#topiary
  winget: winget install --id Tweag.Topiary -e
provenance:
  formula: topiary
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
