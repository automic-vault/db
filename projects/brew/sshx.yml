id: brew:sshx
display-name: sshx
homepage: https://sshx.io
repo: https://github.com/ekzhang/sshx
docs: https://sshx.io
package-manager:
  brew: sshx
  pacman: sshx
package-manager-url: https://formulae.brew.sh/formula/sshx
version: 0.4.1
license: MIT
category: development
tags:
  - cli
description: Fast, collaborative live terminal sharing over the web
source-archive: https://github.com/ekzhang/sshx/archive/refs/tags/v0.4.1.tar.gz
build-dependencies:
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sshx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sshx
  brew: brew install sshx
  pacman: sudo pacman -S sshx
provenance:
  formula: sshx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
