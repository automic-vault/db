id: brew:cloudmonkey
display-name: cloudmonkey
homepage: https://github.com/apache/cloudstack-cloudmonkey
repo: https://github.com/apache/cloudstack-cloudmonkey
docs: https://github.com/apache/cloudstack-cloudmonkey
package-manager:
  brew: cloudmonkey
  macports: cloudmonkey
  nix: cloudmonkey
package-manager-url: https://formulae.brew.sh/formula/cloudmonkey
version: 6.5.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Apache CloudStack CloudMonkey CLI
source-archive: https://github.com/apache/cloudstack-cloudmonkey/archive/refs/tags/6.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cmk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloudmonkey
  brew: brew install cloudmonkey
  macports: sudo port install cloudmonkey
  nix: nix profile install nixpkgs#cloudmonkey
provenance:
  formula: cloudmonkey
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
