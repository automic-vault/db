id: brew:gosec
display-name: gosec
homepage: https://securego.io/
repo: https://github.com/securego/gosec
docs: https://securego.io/
package-manager:
  apk: gosec
  brew: gosec
  dnf: gosec
  macports: gosec
  nix: gosec
  scoop: main/gosec
  zypper: gosec
package-manager-url: https://formulae.brew.sh/formula/gosec
version: 2.26.1
license: Apache-2.0
category: security
tags:
  - cli
  - security
description: Golang security checker
source-archive: https://github.com/securego/gosec/archive/refs/tags/v2.26.1.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gosec
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gosec
  av: sudo av install brew:gosec
  brew: brew install gosec
  dnf: sudo dnf install gosec
  macports: sudo port install gosec
  nix: nix profile install nixpkgs#gosec
  scoop: scoop install main/gosec
  zypper: sudo zypper install gosec
provenance:
  formula: gosec
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
