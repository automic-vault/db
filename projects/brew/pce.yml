id: brew:pce
display-name: pce
homepage: http://www.hampa.ch/pce/
repo: https://cdn.netbsd.org/pub/pkgsrc/distfiles/pce-0.2.2.tar.gz
docs: http://www.hampa.ch/pce/
package-manager:
  brew: pce
package-manager-url: https://formulae.brew.sh/formula/pce
version: 0.2.2
license: GPL-2.0-only
category: network
tags:
  - cli
description: PC emulator
source-archive: https://cdn.netbsd.org/pub/pkgsrc/distfiles/pce-0.2.2.tar.gz
dependencies:
  - sdl12-compat
build-dependencies:
  - nasm
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: pbit
  - exposure: global executable
    kind: cli
    name: pce-ibmpc
  - exposure: global executable
    kind: cli
    name: pce-img
  - exposure: global executable
    kind: cli
    name: pce-macplus
  - exposure: global executable
    kind: cli
    name: pce-rc759
  - exposure: global executable
    kind: cli
    name: pce-sim405
  - exposure: global executable
    kind: cli
    name: pce-sim6502
  - exposure: global executable
    kind: cli
    name: pce-simarm
  - exposure: global executable
    kind: cli
    name: pce-sims32
  - exposure: global executable
    kind: cli
    name: pfdc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pce
  brew: brew install pce
provenance:
  formula: pce
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
