id: brew:frpc
display-name: frpc
homepage: https://github.com/fatedier/frp
repo: https://github.com/fatedier/frp
docs: https://github.com/fatedier/frp
package-manager:
  brew: frpc
package-manager-url: https://formulae.brew.sh/formula/frpc
version: 0.69.0
license: Apache-2.0
category: development
tags:
  - cli
description: Client app of fast reverse proxy to expose a local server to the internet
source-archive: https://github.com/fatedier/frp/archive/refs/tags/v0.69.0.tar.gz
build-dependencies:
  - go
  - node
executables:
  - exposure: global executable
    kind: cli
    name: frpc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:frpc
  brew: brew install frpc
provenance:
  formula: frpc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
