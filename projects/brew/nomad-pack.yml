id: brew:nomad-pack
display-name: nomad-pack
homepage: https://github.com/hashicorp/nomad-pack
repo: https://github.com/hashicorp/nomad-pack
docs: https://github.com/hashicorp/nomad-pack
package-manager:
  brew: nomad-pack
  nix: nomad-pack
package-manager-url: https://formulae.brew.sh/formula/nomad-pack
version: 0.4.2
license: MPL-2.0
category: development
tags:
  - cli
description: Templating and packaging tool used with HashiCorp Nomad
source-archive: https://github.com/hashicorp/nomad-pack/archive/refs/tags/v0.4.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nomad-pack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nomad-pack
  brew: brew install nomad-pack
  nix: nix profile install nixpkgs#nomad-pack
provenance:
  formula: nomad-pack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
