id: brew:reprepro
display-name: reprepro
homepage: https://salsa.debian.org/debian/reprepro
repo: https://deb.debian.org/debian/pool/main/r/reprepro/reprepro_5.4.8.orig.tar.xz
docs: https://salsa.debian.org/debian/reprepro
package-manager:
  brew: reprepro
  debian: reprepro
  dnf: reprepro
  nix: reprepro
  pacman: reprepro
  ubuntu: reprepro
  zypper: reprepro
package-manager-url: https://formulae.brew.sh/formula/reprepro
version: 5.4.8
license: GPL-2.0-only
category: network
tags:
  - cli
description: Debian package repository manager
source-archive: https://deb.debian.org/debian/pool/main/r/reprepro/reprepro_5.4.8.orig.tar.xz
dependencies:
  - berkeley-db@5
  - gcc
  - gpgme
  - libarchive
  - libgpg-error
  - xz
  - zstd
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: changestool
  - exposure: global executable
    kind: cli
    name: reprepro
  - exposure: global executable
    kind: cli
    name: rredtool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:reprepro
  brew: brew install reprepro
  debian: sudo apt install reprepro
  dnf: sudo dnf install reprepro
  nix: nix profile install nixpkgs#reprepro
  pacman: sudo pacman -S reprepro
  ubuntu: sudo apt install reprepro
  zypper: sudo zypper install reprepro
provenance:
  formula: reprepro
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
