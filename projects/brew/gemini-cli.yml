id: brew:gemini-cli
display-name: gemini-cli
homepage: https://github.com/google-gemini/gemini-cli
repo: https://registry.npmjs.org/@google/gemini-cli/-/gemini-cli-0.43.0.tgz
docs: https://github.com/google-gemini/gemini-cli
package-manager:
  brew: gemini-cli
  macports: gemini-cli
  nix: gemini-cli
  pacman: gemini-cli
  zypper: gemini-cli
package-manager-url: https://formulae.brew.sh/formula/gemini-cli
version: 0.43.0
license: Apache-2.0
category: development
tags:
  - cli
description: Interact with Google Gemini AI models from the command-line
source-archive: https://registry.npmjs.org/@google/gemini-cli/-/gemini-cli-0.43.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: gemini
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gemini-cli
  brew: brew install gemini-cli
  macports: sudo port install gemini-cli
  nix: nix profile install nixpkgs#gemini-cli
  pacman: sudo pacman -S gemini-cli
  zypper: sudo zypper install gemini-cli
provenance:
  formula: gemini-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
