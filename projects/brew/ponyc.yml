id: brew:ponyc
display-name: ponyc
homepage: https://www.ponylang.io/
repo: https://github.com/ponylang/ponyc
docs: https://www.ponylang.io/
package-manager:
  brew: ponyc
  nix: ponyc
  pacman: ponyc
package-manager-url: https://formulae.brew.sh/formula/ponyc
version: 0.63.4
license: BSD-2-Clause
category: development
tags:
  - cli
description: Object-oriented, actor-model, capabilities-secure programming language
source-archive: https://github.com/ponylang/ponyc.git
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: pony-doc
  - exposure: global executable
    kind: cli
    name: pony-lint
  - exposure: global executable
    kind: cli
    name: pony-lsp
  - exposure: global executable
    kind: cli
    name: ponyc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ponyc
  brew: brew install ponyc
  nix: nix profile install nixpkgs#ponyc
  pacman: sudo pacman -S ponyc
provenance:
  formula: ponyc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
