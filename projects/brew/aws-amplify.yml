id: brew:aws-amplify
display-name: aws-amplify
homepage: https://aws.amazon.com/amplify/
repo: https://registry.npmjs.org/@aws-amplify/cli-internal/-/cli-internal-14.5.0.tgz
docs: https://aws.amazon.com/amplify/
package-manager:
  brew: aws-amplify
  scoop: main/aws-amplify
package-manager-url: https://formulae.brew.sh/formula/aws-amplify
version: 14.5.0
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: Build full-stack web and mobile apps in hours. Easy to start, easy to scale
source-archive: https://registry.npmjs.org/@aws-amplify/cli-internal/-/cli-internal-14.5.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: amplify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aws-amplify
  brew: brew install aws-amplify
  scoop: scoop install main/aws-amplify
provenance:
  formula: aws-amplify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
