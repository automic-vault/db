id: brew:sigi
display-name: sigi
homepage: https://sigi-cli.org
repo: https://github.com/sigi-cli/sigi
docs: https://sigi-cli.org
package-manager:
  brew: sigi
  nix: sigi
package-manager-url: https://formulae.brew.sh/formula/sigi
version: 3.7.1
license: GPL-2.0-only
category: development
tags:
  - cli
description: Organizing tool for terminal lovers that hate organizing
source-archive: https://github.com/sigi-cli/sigi/archive/refs/tags/v3.7.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sigi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sigi
  brew: brew install sigi
  nix: nix profile install nixpkgs#sigi
provenance:
  formula: sigi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
