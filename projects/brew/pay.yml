id: brew:pay
display-name: pay
homepage: https://github.com/solana-foundation/pay
repo: https://github.com/solana-foundation/pay
docs: https://github.com/solana-foundation/pay
package-manager:
  brew: pay
  winget: pay-skill.pay
package-manager-url: https://formulae.brew.sh/formula/pay
version: 0.16.0
license: MIT
category: development
tags:
  - cli
description: HTTP client that automatically handles 402 Payment Required
source-archive: https://github.com/solana-foundation/pay/archive/refs/tags/pay-v0.16.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - just
  - node
  - pkgconf
  - pnpm
  - rust
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: pay
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pay
  brew: brew install pay
  winget: winget install --id pay-skill.pay -e
provenance:
  formula: pay
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
