id: brew:immudb
display-name: immudb
homepage: https://immudb.io/
repo: https://github.com/codenotary/immudb
docs: https://immudb.io/
package-manager:
  brew: immudb
  nix: immudb
package-manager-url: https://formulae.brew.sh/formula/immudb
version: 1.11.0
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Lightweight, high-speed immutable database
source-archive: https://github.com/codenotary/immudb/archive/refs/tags/v1.11.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: immuadmin
  - exposure: global executable
    kind: cli
    name: immuclient
  - exposure: global executable
    kind: cli
    name: immudb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:immudb
  brew: brew install immudb
  nix: nix profile install nixpkgs#immudb
provenance:
  formula: immudb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
