id: brew:center-im
display-name: center-im
homepage: https://github.com/petrpavlu/centerim5
repo: https://github.com/petrpavlu/centerim5
docs: https://github.com/petrpavlu/centerim5
package-manager:
  brew: center-im
package-manager-url: https://formulae.brew.sh/formula/center-im
version: 5.0.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Text-mode multi-protocol instant messaging client
source-archive: https://github.com/petrpavlu/centerim5/releases/download/v5.0.1/centerim5-5.0.1.tar.gz
dependencies:
  - gettext
  - glib
  - libsigc++@2
  - ncurses
  - pidgin
build-dependencies:
  - cmake
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: centerim5
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:center-im
  brew: brew install center-im
provenance:
  formula: center-im
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
