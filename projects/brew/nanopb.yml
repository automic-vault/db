id: brew:nanopb
display-name: nanopb
homepage: https://jpa.kapsi.fi/nanopb/docs/index.html
repo: https://jpa.kapsi.fi/nanopb/download/nanopb-0.4.9.1.tar.gz
docs: https://jpa.kapsi.fi/nanopb/docs/index.html
package-manager:
  brew: nanopb
  debian: nanopb
  dnf: nanopb
  nix: nanopb
  ubuntu: nanopb
package-manager-url: https://formulae.brew.sh/formula/nanopb
version: 0.4.9.1
license: Zlib
category: network
tags:
  - cli
description: C library for encoding and decoding Protocol Buffer messages
source-archive: https://jpa.kapsi.fi/nanopb/download/nanopb-0.4.9.1.tar.gz
dependencies:
  - protobuf
  - python@3.14
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: nanopb_generator
  - exposure: global executable
    kind: cli
    name: nanopb_generator.py
  - exposure: global executable
    kind: cli
    name: protoc-gen-nanopb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nanopb
  brew: brew install nanopb
  debian: sudo apt install nanopb
  dnf: sudo dnf install nanopb
  nix: nix profile install nixpkgs#nanopb
  ubuntu: sudo apt install nanopb
provenance:
  formula: nanopb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
