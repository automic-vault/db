id: brew:aarch64-elf-gcc
display-name: aarch64-elf-gcc
homepage: https://gcc.gnu.org
repo: https://ftpmirror.gnu.org/gnu/gcc/gcc-16.1.0/gcc-16.1.0.tar.xz
docs: https://gcc.gnu.org
package-manager:
  brew: aarch64-elf-gcc
package-manager-url: https://formulae.brew.sh/formula/aarch64-elf-gcc
version: 16.1.0
license: GPL-3.0-or-later WITH GCC-exception-3.1
category: development
tags:
  - cli
description: GNU compiler collection for aarch64-elf
source-archive: https://ftpmirror.gnu.org/gnu/gcc/gcc-16.1.0/gcc-16.1.0.tar.xz
dependencies:
  - aarch64-elf-binutils
  - gmp
  - isl
  - libmpc
  - mpfr
  - zstd
executables:
  - exposure: global executable
    kind: cli
    name: aarch64-elf-c++
  - exposure: global executable
    kind: cli
    name: aarch64-elf-cpp
  - exposure: global executable
    kind: cli
    name: aarch64-elf-g++
  - exposure: global executable
    kind: cli
    name: aarch64-elf-gcc
  - exposure: global executable
    kind: cli
    name: aarch64-elf-gcc-16.1.0
  - exposure: global executable
    kind: cli
    name: aarch64-elf-gcc-ar
  - exposure: global executable
    kind: cli
    name: aarch64-elf-gcc-nm
  - exposure: global executable
    kind: cli
    name: aarch64-elf-gcc-ranlib
  - exposure: global executable
    kind: cli
    name: aarch64-elf-gcov
  - exposure: global executable
    kind: cli
    name: aarch64-elf-gcov-dump
  - exposure: global executable
    kind: cli
    name: aarch64-elf-gcov-tool
  - exposure: global executable
    kind: cli
    name: aarch64-elf-lto-dump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aarch64-elf-gcc
  brew: brew install aarch64-elf-gcc
provenance:
  formula: aarch64-elf-gcc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
