id: brew:nco
display-name: nco
homepage: https://nco.sourceforge.net/
repo: https://github.com/nco/nco
docs: https://nco.sourceforge.net/
package-manager:
  brew: nco
  debian: nco
  dnf: nco
  macports: nco
  nix: nco
  ubuntu: nco
  zypper: nco
package-manager-url: https://formulae.brew.sh/formula/nco
version: 5.3.9
license: BSD-3-Clause
category: development
tags:
  - cli
description: Command-line operators for netCDF and HDF files
source-archive: https://github.com/nco/nco/archive/refs/tags/5.3.9.tar.gz
dependencies:
  - gettext
  - gsl
  - netcdf
  - texinfo
  - udunits
build-dependencies:
  - gettext
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: ncap2
  - exposure: global executable
    kind: cli
    name: ncatted
  - exposure: global executable
    kind: cli
    name: ncbo
  - exposure: global executable
    kind: cli
    name: ncchecker
  - exposure: global executable
    kind: cli
    name: ncclimo
  - exposure: global executable
    kind: cli
    name: ncdiff
  - exposure: global executable
    kind: cli
    name: ncea
  - exposure: global executable
    kind: cli
    name: ncecat
  - exposure: global executable
    kind: cli
    name: nces
  - exposure: global executable
    kind: cli
    name: ncflint
  - exposure: global executable
    kind: cli
    name: ncks
  - exposure: global executable
    kind: cli
    name: ncpdq
  - exposure: global executable
    kind: cli
    name: ncra
  - exposure: global executable
    kind: cli
    name: ncrcat
  - exposure: global executable
    kind: cli
    name: ncremap
  - exposure: global executable
    kind: cli
    name: ncrename
  - exposure: global executable
    kind: cli
    name: ncwa
  - exposure: global executable
    kind: cli
    name: ncz2psx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nco
  brew: brew install nco
  debian: sudo apt install nco
  dnf: sudo dnf install nco
  macports: sudo port install nco
  nix: nix profile install nixpkgs#nco
  ubuntu: sudo apt install nco
  zypper: sudo zypper install nco
provenance:
  formula: nco
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
