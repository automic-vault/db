id: brew:lcdproc
display-name: lcdproc
homepage: https://www.lcdproc.org/
repo: https://github.com/lcdproc/lcdproc
docs: https://www.lcdproc.org/
package-manager:
  apk: lcdproc
  brew: lcdproc
  debian: lcdproc
  dnf: lcdproc
  nix: lcdproc
  pacman: lcdproc
  ubuntu: lcdproc
package-manager-url: https://formulae.brew.sh/formula/lcdproc
version: 0.5.9
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Display real-time system information on a LCD
source-archive: https://github.com/lcdproc/lcdproc/releases/download/v0.5.9/lcdproc-0.5.9.tar.gz
dependencies:
  - libftdi
  - libusb
  - libusb-compat
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: LCDd
  - exposure: global executable
    kind: cli
    name: fortune.pl
  - exposure: global executable
    kind: cli
    name: iosock.pl
  - exposure: global executable
    kind: cli
    name: lcdexec
  - exposure: global executable
    kind: cli
    name: lcdident.pl
  - exposure: global executable
    kind: cli
    name: lcdmetar.pl
  - exposure: global executable
    kind: cli
    name: lcdproc
  - exposure: global executable
    kind: cli
    name: lcdvc
  - exposure: global executable
    kind: cli
    name: tail.pl
  - exposure: global executable
    kind: cli
    name: x11amp.pl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lcdproc
  av: sudo av install brew:lcdproc
  brew: brew install lcdproc
  debian: sudo apt install lcdproc
  dnf: sudo dnf install lcdproc
  nix: nix profile install nixpkgs#lcdproc
  pacman: sudo pacman -S lcdproc
  ubuntu: sudo apt install lcdproc
provenance:
  formula: lcdproc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
