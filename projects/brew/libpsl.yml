id: brew:libpsl
display-name: libpsl
homepage: https://rockdaboot.github.io/libpsl
repo: https://github.com/rockdaboot/libpsl
docs: https://rockdaboot.github.io/libpsl
package-manager:
  apk: libpsl
  brew: libpsl
  debian: psl
  dnf: libpsl
  macports: libpsl
  nix: libpsl
  pacman: libpsl
  ubuntu: psl
  zypper: psl
package-manager-url: https://formulae.brew.sh/formula/libpsl
version: 0.21.5
license: MIT
category: development
tags:
  - cli
description: C library for the Public Suffix List
source-archive: https://github.com/rockdaboot/libpsl/releases/download/0.21.5/libpsl-0.21.5.tar.gz
dependencies:
  - libidn2
  - libunistring
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: psl
  - exposure: global executable
    kind: cli
    name: psl-make-dafsa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libpsl
  av: sudo av install brew:libpsl
  brew: brew install libpsl
  debian: sudo apt install psl
  dnf: sudo dnf install libpsl
  macports: sudo port install libpsl
  nix: nix profile install nixpkgs#libpsl
  pacman: sudo pacman -S libpsl
  ubuntu: sudo apt install psl
  zypper: sudo zypper install psl
provenance:
  formula: libpsl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
