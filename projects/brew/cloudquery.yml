id: brew:cloudquery
display-name: cloudquery
homepage: https://www.cloudquery.io
repo: https://github.com/cloudquery/cloudquery
docs: https://www.cloudquery.io
package-manager:
  brew: cloudquery
  chocolatey: cloudquery
package-manager-url: https://formulae.brew.sh/formula/cloudquery
version: 6.36.0
license: MPL-2.0
category: cloud
tags:
  - cli
description: Data movement tool to sync data from any source to any destination
source-archive: https://github.com/cloudquery/cloudquery/archive/refs/tags/cli-v6.36.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cloudquery
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloudquery
  brew: brew install cloudquery
  chocolatey: choco install cloudquery
provenance:
  formula: cloudquery
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
