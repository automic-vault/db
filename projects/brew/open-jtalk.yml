id: brew:open-jtalk
display-name: open-jtalk
homepage: https://open-jtalk.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/open-jtalk/Open%20JTalk/open_jtalk-1.11/open_jtalk-1.11.tar.gz
docs: https://open-jtalk.sourceforge.net/
package-manager:
  brew: open-jtalk
  debian: open-jtalk
  macports: open_jtalk
  ubuntu: open-jtalk
package-manager-url: https://formulae.brew.sh/formula/open-jtalk
version: 1.11
license: BSD-3-Clause AND CC-BY-3.0
category: network
tags:
  - cli
description: Japanese text-to-speech system
source-archive: >
  https://downloads.sourceforge.net/project/open-jtalk/Open%20JTalk/open_jtalk-1.11/open_jtalk-1.11.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: hts_engine
  - exposure: global executable
    kind: cli
    name: open_jtalk
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:open-jtalk
  brew: brew install open-jtalk
  debian: sudo apt install open-jtalk
  macports: sudo port install open_jtalk
  ubuntu: sudo apt install open-jtalk
provenance:
  formula: open-jtalk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
