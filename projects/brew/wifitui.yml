id: brew:wifitui
display-name: wifitui
homepage: https://github.com/shazow/wifitui
repo: https://github.com/shazow/wifitui
docs: https://github.com/shazow/wifitui
package-manager:
  apk: wifitui
  brew: wifitui
  nix: wifitui
package-manager-url: https://formulae.brew.sh/formula/wifitui
version: 0.13.0
license: MIT
category: development
tags:
  - cli
description: Fast featureful friendly wifi terminal UI
source-archive: https://github.com/shazow/wifitui/archive/refs/tags/v0.13.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wifitui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wifitui
  av: sudo av install brew:wifitui
  brew: brew install wifitui
  nix: nix profile install nixpkgs#wifitui
provenance:
  formula: wifitui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
