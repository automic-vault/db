id: brew:picard-tools
display-name: picard-tools
homepage: https://broadinstitute.github.io/picard/
repo: https://github.com/broadinstitute/picard
docs: https://broadinstitute.github.io/picard/
package-manager:
  apk: picard
  brew: picard-tools
  chocolatey: picard
  debian: picard-tools
  dnf: picard
  nix: picard-tools
  pacman: picard
  scoop: extras/picard
  ubuntu: picard-tools
  winget: MusicBrainz.Picard
  zypper: picard
package-manager-url: https://formulae.brew.sh/formula/picard-tools
version: 3.4.0
license: MIT
category: development
tags:
  - cli
description: Tools for manipulating HTS data and formats
source-archive: https://github.com/broadinstitute/picard/releases/download/3.4.0/picard.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: picard
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add picard
  av: sudo av install brew:picard-tools
  brew: brew install picard-tools
  chocolatey: choco install picard
  debian: sudo apt install picard-tools
  dnf: sudo dnf install picard
  nix: nix profile install nixpkgs#picard-tools
  pacman: sudo pacman -S picard
  scoop: scoop install extras/picard
  ubuntu: sudo apt install picard-tools
  winget: winget install --id MusicBrainz.Picard -e
  zypper: sudo zypper install picard
provenance:
  formula: picard-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
