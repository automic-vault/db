    kind: cli
    name: bsdconv-mktable
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bsdconv
  brew: brew install bsdconv
provenance:
  formula: bsdconv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
