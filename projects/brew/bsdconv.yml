id: brew:bsdconv
display-name: bsdconv
homepage: https://github.com/buganini/bsdconv
repo: https://github.com/buganini/bsdconv
docs: https://github.com/buganini/bsdconv
package-manager:
  brew: bsdconv
package-manager-url: https://formulae.brew.sh/formula/bsdconv
version: 11.6
license: BSD-2-Clause
category: development
tags:
  - cli
description: Charset/encoding converter library
source-archive: https://github.com/buganini/bsdconv/archive/refs/tags/11.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bsdconv
  - exposure: global executable
    kind: cli
    name: bsdconv-completion
  - exposure: global executable
    kind: cli
    name: bsdconv-man
