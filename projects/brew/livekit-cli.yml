id: brew:livekit-cli
display-name: livekit-cli
homepage: https://livekit.io
repo: https://github.com/livekit/livekit-cli
docs: https://livekit.io
package-manager:
  brew: livekit-cli
  nix: livekit-cli
  winget: LiveKit.LiveKitCLI
package-manager-url: https://formulae.brew.sh/formula/livekit-cli
version: 2.16.4
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line interface to LiveKit
source-archive: https://github.com/livekit/livekit-cli/archive/refs/tags/v2.16.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: livekit-cli
  - exposure: global executable
    kind: cli
    name: lk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:livekit-cli
  brew: brew install livekit-cli
  nix: nix profile install nixpkgs#livekit-cli
  winget: winget install --id LiveKit.LiveKitCLI -e
provenance:
  formula: livekit-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
