id: brew:go-camo
display-name: go-camo
homepage: https://github.com/cactus/go-camo
repo: https://github.com/cactus/go-camo
docs: https://github.com/cactus/go-camo
package-manager:
  brew: go-camo
  nix: go-camo
package-manager-url: https://formulae.brew.sh/formula/go-camo
version: 2.7.4
license: MIT
category: development
tags:
  - cli
description: Secure image proxy server
source-archive: https://github.com/cactus/go-camo/archive/refs/tags/v2.7.4.tar.gz
build-dependencies:
  - go
executables:
