id: brew:percona-server
display-name: percona-server
homepage: https://www.percona.com
repo: >
  https://downloads.percona.com/downloads/Percona-Server-8.4/Percona-Server-8.4.8-8/source/tarball/percona-server-8.4.8-8.tar.gz
docs: https://www.percona.com
package-manager:
  apk: ldb
  brew: percona-server
  nix: ldb
  pacman: percona-server
package-manager-url: https://formulae.brew.sh/formula/percona-server
version: 8.4.8-8
license: BSD-3-Clause
category: database
tags:
  - cli
description: Drop-in MySQL replacement
source-archive: >
  https://downloads.percona.com/downloads/Percona-Server-8.4/Percona-Server-8.4.8-8/source/tarball/percona-server-8.4.8-8.tar.gz
dependencies:
  - abseil
  - icu4c@78
  - libfido2
  - lz4
  - openldap
  - openssl@3
  - protobuf
  - zlib-ng-compat
  - zstd
build-dependencies:
  - bison
  - cmake
  - pkgconf
uses-from-macos:
  - curl
  - cyrus-sasl
  - krb5
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: ldb
  - exposure: global executable
    kind: cli
    name: ps-admin
  - exposure: global executable
    kind: cli
    name: ps_mysqld_helper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    We've installed your MySQL database without a root password. To secure it run:
    mysql_secure_installation MySQL is configured to only allow connections from
    localhost by default To connect run: mysql -u root
  post-install-defined: true
  service: declared
install-lines:
  apk: sudo apk add ldb
  av: sudo av install brew:percona-server
  brew: brew install percona-server
  nix: nix profile install nixpkgs#ldb
  pacman: sudo pacman -S percona-server
provenance:
  formula: percona-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
