id: brew:polyglot
display-name: polyglot
homepage: https://www.chessprogramming.org/PolyGlot
repo: http://hgm.nubati.net/releases/polyglot-2.0.4.tar.gz
docs: https://www.chessprogramming.org/PolyGlot
package-manager:
  apk: polyglot
  brew: polyglot
  debian: polyglot
  nix: polyglot
  ubuntu: polyglot
package-manager-url: https://formulae.brew.sh/formula/polyglot
version: 2.0.4
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Protocol adapter to run UCI engines under XBoard
source-archive: http://hgm.nubati.net/releases/polyglot-2.0.4.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: polyglot
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add polyglot
  av: sudo av install brew:polyglot
  brew: brew install polyglot
  debian: sudo apt install polyglot
  nix: nix profile install nixpkgs#polyglot
  ubuntu: sudo apt install polyglot
provenance:
  formula: polyglot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
