id: brew:isa-l
display-name: isa-l
homepage: https://github.com/intel/isa-l
repo: https://github.com/intel/isa-l
docs: https://github.com/intel/isa-l
package-manager:
  apk: isa-l
  brew: isa-l
  dnf: isa-l
  nix: isa-l
  pacman: isa-l
  zypper: igzip
package-manager-url: https://formulae.brew.sh/formula/isa-l
version: 2.32.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Intelligent Storage Acceleration Library
source-archive: https://github.com/intel/isa-l/archive/refs/tags/v2.32.0.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: igzip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add isa-l
  av: sudo av install brew:isa-l
  brew: brew install isa-l
  dnf: sudo dnf install isa-l
  nix: nix profile install nixpkgs#isa-l
  pacman: sudo pacman -S isa-l
  zypper: sudo zypper install igzip
provenance:
  formula: isa-l
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
