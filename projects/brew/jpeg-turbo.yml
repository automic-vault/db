id: brew:jpeg-turbo
display-name: jpeg-turbo
homepage: https://www.libjpeg-turbo.org/
repo: https://github.com/libjpeg-turbo/libjpeg-turbo
docs: https://www.libjpeg-turbo.org/
package-manager:
  brew: jpeg-turbo
package-manager-url: https://formulae.brew.sh/formula/jpeg-turbo
version: 3.1.4.1
license: IJG AND Zlib AND BSD-3-Clause
category: development
tags:
  - cli
description: JPEG image codec that aids compression and decompression
source-archive: >
  https://github.com/libjpeg-turbo/libjpeg-turbo/releases/download/3.1.4.1/libjpeg-turbo-3.1.4.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: cjpeg
  - exposure: global executable
    kind: cli
    name: djpeg
  - exposure: global executable
    kind: cli
    name: jpegtran
  - exposure: global executable
    kind: cli
    name: rdjpgcom
  - exposure: global executable
    kind: cli
    name: tjbench
  - exposure: global executable
    kind: cli
    name: wrjpgcom
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jpeg-turbo
  brew: brew install jpeg-turbo
provenance:
  formula: jpeg-turbo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
