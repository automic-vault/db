id: brew:noti
display-name: noti
homepage: https://codeberg.org/roble/noti
repo: https://codeberg.org/roble/noti/archive/3.8.0.tar.gz
docs: https://codeberg.org/roble/noti
package-manager:
  brew: noti
  nix: noti
  scoop: main/noti
package-manager-url: https://formulae.brew.sh/formula/noti
version: 3.8.0
license: MIT
category: network
tags:
  - cli
description: Trigger notifications when a process completes
source-archive: https://codeberg.org/roble/noti/archive/3.8.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: noti
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:noti
  brew: brew install noti
  nix: nix profile install nixpkgs#noti
  scoop: scoop install main/noti
provenance:
  formula: noti
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
