id: brew:doge
display-name: doge
homepage: https://dog.ramfield.net/
repo: https://github.com/Dj-Codeman/dog_community
docs: https://dog.ramfield.net/
package-manager:
  brew: doge
  dnf: doge
  macports: doge
  nix: doge
  pacman: doge
package-manager-url: https://formulae.brew.sh/formula/doge
version: 0.2.9
license: EUPL-1.2
category: development
tags:
  - cli
description: Command-line DNS client
source-archive: https://github.com/Dj-Codeman/dog_community/archive/refs/tags/v0.2.9.tar.gz
build-dependencies:
  - pandoc
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: doge
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:doge
  brew: brew install doge
  dnf: sudo dnf install doge
  macports: sudo port install doge
  nix: nix profile install nixpkgs#doge
  pacman: sudo pacman -S doge
provenance:
  formula: doge
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
