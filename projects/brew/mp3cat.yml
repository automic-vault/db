id: brew:mp3cat
display-name: mp3cat
homepage: https://tomclegg.ca/mp3cat
repo: https://github.com/tomclegg/mp3cat
docs: https://tomclegg.ca/mp3cat
package-manager:
  brew: mp3cat
  macports: mp3cat
  nix: mp3cat
package-manager-url: https://formulae.brew.sh/formula/mp3cat
version: 0.5
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Reads and writes mp3 files
source-archive: https://github.com/tomclegg/mp3cat/archive/refs/tags/0.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mp3cat
  - exposure: global executable
    kind: cli
    name: mp3dirclean
  - exposure: global executable
    kind: cli
    name: mp3http
  - exposure: global executable
    kind: cli
    name: mp3log
  - exposure: global executable
    kind: cli
    name: mp3log-conf
  - exposure: global executable
    kind: cli
    name: mp3stream-conf
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mp3cat
  brew: brew install mp3cat
  macports: sudo port install mp3cat
  nix: nix profile install nixpkgs#mp3cat
provenance:
  formula: mp3cat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
