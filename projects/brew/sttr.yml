id: brew:sttr
display-name: sttr
homepage: https://github.com/abhimanyu003/sttr
repo: https://github.com/abhimanyu003/sttr
docs: https://github.com/abhimanyu003/sttr
package-manager:
  brew: sttr
  macports: sttr
  nix: sttr
  winget: abhimanyu003.sttr
package-manager-url: https://formulae.brew.sh/formula/sttr
version: 0.2.30
license: MIT
category: development
tags:
  - cli
description: CLI to perform various operations on string
source-archive: https://github.com/abhimanyu003/sttr/archive/refs/tags/v0.2.30.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sttr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sttr
  brew: brew install sttr
  macports: sudo port install sttr
  nix: nix profile install nixpkgs#sttr
  winget: winget install --id abhimanyu003.sttr -e
provenance:
  formula: sttr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
