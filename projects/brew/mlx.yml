id: brew:mlx
display-name: mlx
homepage: https://ml-explore.github.io/mlx/build/html/index.html
repo: https://github.com/ml-explore/mlx
docs: https://ml-explore.github.io/mlx/build/html/index.html
package-manager:
  brew: mlx
  macports: mlx
package-manager-url: https://formulae.brew.sh/formula/mlx
version: 0.31.2
license: MIT AND Apache-2.0
category: development
tags:
  - cli
description: Array framework for Apple silicon
source-archive: https://github.com/ml-explore/mlx/archive/refs/tags/v0.31.2.tar.gz
dependencies:
  - python@3.14
build-dependencies:
  - cmake
  - fmt
  - nanobind
  - nlohmann-json
  - python-setuptools
  - robin-map
executables:
  - exposure: global executable
    kind: cli
    name: mlx.distributed_config
  - exposure: global executable
    kind: cli
    name: mlx.launch
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mlx
  brew: brew install mlx
  macports: sudo port install mlx
provenance:
  formula: mlx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
