id: brew:testkube
display-name: testkube
homepage: https://testkube.io
repo: https://github.com/kubeshop/testkube
docs: https://testkube.io
package-manager:
  brew: testkube
  nix: testkube
package-manager-url: https://formulae.brew.sh/formula/testkube
version: 2.9.5
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes-native framework for test definition and execution
source-archive: https://github.com/kubeshop/testkube/archive/refs/tags/2.9.5.tar.gz
dependencies:
  - helm
  - kubernetes-cli
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubectl-testkube
  - exposure: global executable
    kind: cli
    name: testkube
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:testkube
  brew: brew install testkube
  nix: nix profile install nixpkgs#testkube
provenance:
  formula: testkube
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
