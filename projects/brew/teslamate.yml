id: brew:teslamate
display-name: teslamate
homepage: https://docs.teslamate.org
repo: https://github.com/teslamate-org/teslamate
docs: https://docs.teslamate.org
package-manager:
  brew: teslamate
package-manager-url: https://formulae.brew.sh/formula/teslamate
version: 3.0.0
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Self-hosted data logger for your Tesla
source-archive: https://github.com/teslamate-org/teslamate/archive/refs/tags/v3.0.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - elixir
  - erlang
  - node
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: teslamate
  - exposure: global executable
    kind: cli
    name: teslamate_brew_services
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:teslamate
  brew: brew install teslamate
provenance:
  formula: teslamate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
