id: brew:open-sp
display-name: open-sp
homepage: https://openjade.sourceforge.net/
repo: https://downloads.sourceforge.net/project/openjade/opensp/1.5.2/OpenSP-1.5.2.tar.gz
docs: https://openjade.sourceforge.net/
package-manager:
  brew: open-sp
package-manager-url: https://formulae.brew.sh/formula/open-sp
version: 1.5.2
license: X11
category: network
tags:
  - cli
description: SGML parser
source-archive: https://downloads.sourceforge.net/project/openjade/opensp/1.5.2/OpenSP-1.5.2.tar.gz
dependencies:
  - gettext
build-dependencies:
  - autoconf
  - automake
  - docbook
  - ghostscript
  - libtool
  - xmlto
executables:
  - exposure: global executable
    kind: cli
    name: onsgmls
  - exposure: global executable
    kind: cli
    name: osgmlnorm
  - exposure: global executable
    kind: cli
    name: ospam
  - exposure: global executable
    kind: cli
    name: ospcat
  - exposure: global executable
    kind: cli
    name: ospent
  - exposure: global executable
    kind: cli
    name: osx
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:open-sp
  brew: brew install open-sp
provenance:
  formula: open-sp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
