id: brew:pixz
display-name: pixz
homepage: https://github.com/vasi/pixz
repo: https://github.com/vasi/pixz
docs: https://github.com/vasi/pixz
package-manager:
  apk: pixz
  brew: pixz
  debian: pixz
  macports: pixz
  nix: pixz
  pacman: pixz
  ubuntu: pixz
  zypper: pixz
package-manager-url: https://formulae.brew.sh/formula/pixz
version: 1.0.7
license: BSD-2-Clause
category: development
tags:
  - cli
description: Parallel, indexed, xz compressor
source-archive: https://github.com/vasi/pixz/releases/download/v1.0.7/pixz-1.0.7.tar.gz
dependencies:
  - libarchive
  - xz
build-dependencies:
  - asciidoc
  - docbook-xsl
  - pkgconf
uses-from-macos:
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: pixz
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pixz
  av: sudo av install brew:pixz
  brew: brew install pixz
  debian: sudo apt install pixz
  macports: sudo port install pixz
  nix: nix profile install nixpkgs#pixz
  pacman: sudo pacman -S pixz
  ubuntu: sudo apt install pixz
  zypper: sudo zypper install pixz
provenance:
  formula: pixz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
