id: brew:git-branchless
display-name: git-branchless
homepage: https://github.com/arxanas/git-branchless
repo: https://github.com/arxanas/git-branchless
docs: https://github.com/arxanas/git-branchless
package-manager:
  apk: git-branchless
  brew: git-branchless
  macports: git-branchless
  nix: git-branchless
  pacman: git-branchless
  scoop: main/git-branchless
package-manager-url: https://formulae.brew.sh/formula/git-branchless
version: 0.11.1
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
  - git
description: High-velocity, monorepo-scale workflow for Git
source-archive: https://github.com/arxanas/git-branchless/archive/refs/tags/v0.11.1.tar.gz
dependencies:
  - libgit2
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: git-branchless
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-branchless
  av: sudo av install brew:git-branchless
  brew: brew install git-branchless
  macports: sudo port install git-branchless
  nix: nix profile install nixpkgs#git-branchless
  pacman: sudo pacman -S git-branchless
  scoop: scoop install main/git-branchless
provenance:
  formula: git-branchless
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
