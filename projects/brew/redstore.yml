id: brew:redstore
display-name: redstore
homepage: https://www.aelius.com/njh/redstore/
repo: https://www.aelius.com/njh/redstore/redstore-0.5.4.tar.gz
docs: https://www.aelius.com/njh/redstore/
package-manager:
  brew: redstore
  nix: redstore
package-manager-url: https://formulae.brew.sh/formula/redstore
version: 0.5.4
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Lightweight RDF triplestore powered by Redland
source-archive: https://www.aelius.com/njh/redstore/redstore-0.5.4.tar.gz
dependencies:
  - raptor
  - rasqal
  - redland
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: redstore
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:redstore
  brew: brew install redstore
  nix: nix profile install nixpkgs#redstore
provenance:
  formula: redstore
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
