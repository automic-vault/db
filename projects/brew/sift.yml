id: brew:sift
display-name: sift
homepage: https://sift-tool.org/
repo: https://github.com/svent/sift
docs: https://sift-tool.org/
package-manager:
  brew: sift
  chocolatey: Sift
  debian: sift
  macports: sift
  nix: sift
  scoop: main/sift
  ubuntu: sift
package-manager-url: https://formulae.brew.sh/formula/sift
version: 0.9.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: Fast and powerful open source alternative to grep
source-archive: https://github.com/svent/sift/archive/refs/tags/v0.9.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sift
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sift
  brew: brew install sift
  chocolatey: choco install Sift
  debian: sudo apt install sift
  macports: sudo port install sift
  nix: nix profile install nixpkgs#sift
  scoop: scoop install main/sift
  ubuntu: sudo apt install sift
provenance:
  formula: sift
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
