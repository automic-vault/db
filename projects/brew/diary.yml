id: brew:diary
display-name: diary
homepage: https://diary.p0c.ch
repo: https://code.in0rdr.ch/diary/archive/diary-v0.16.tar.gz
docs: https://diary.p0c.ch
package-manager:
  brew: diary
package-manager-url: https://formulae.brew.sh/formula/diary
version: 0.16
license: MIT
category: network
tags:
  - cli
description: Text-based journaling program
source-archive: https://code.in0rdr.ch/diary/archive/diary-v0.16.tar.gz
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
  - libxml2
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: diary
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:diary
  brew: brew install diary
provenance:
  formula: diary
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
