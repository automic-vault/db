id: brew:crosstool-ng
display-name: crosstool-ng
homepage: https://crosstool-ng.github.io/
repo: https://github.com/crosstool-ng/crosstool-ng
docs: https://crosstool-ng.github.io/
package-manager:
  apk: crosstool-ng
  brew: crosstool-ng
  pacman: crosstool-ng
  zypper: crosstool-ng
package-manager-url: https://formulae.brew.sh/formula/crosstool-ng
version: 1.28.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: Tool for building toolchains
source-archive: >
  https://github.com/crosstool-ng/crosstool-ng/releases/download/crosstool-ng-1.28.0/crosstool-ng-1.28.0.tar.xz
dependencies:
  - autoconf
  - automake
  - bash
  - binutils
  - bison
  - coreutils
  - flex
  - gawk
  - gettext
  - gnu-sed
  - grep
  - libtool
  - lzip
  - m4
  - make
  - ncurses
  - python@3.14
  - xz
build-dependencies:
  - help2man
  - texinfo
executables:
  - exposure: global executable
    kind: cli
    name: ct-ng
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add crosstool-ng
  av: sudo av install brew:crosstool-ng
  brew: brew install crosstool-ng
  pacman: sudo pacman -S crosstool-ng
  zypper: sudo zypper install crosstool-ng
provenance:
  formula: crosstool-ng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
