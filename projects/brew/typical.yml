id: brew:typical
display-name: typical
homepage: https://github.com/stepchowfun/typical
repo: https://github.com/stepchowfun/typical
docs: https://github.com/stepchowfun/typical
package-manager:
  brew: typical
  nix: typical
package-manager-url: https://formulae.brew.sh/formula/typical
version: 0.15.0
license: MIT
category: development
tags:
  - cli
description: Data interchange with algebraic data types
source-archive: https://github.com/stepchowfun/typical/archive/refs/tags/v0.15.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: typical
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:typical
  brew: brew install typical
  nix: nix profile install nixpkgs#typical
provenance:
  formula: typical
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
