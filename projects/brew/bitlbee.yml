id: brew:bitlbee
display-name: bitlbee
homepage: https://www.bitlbee.org/
repo: https://get.bitlbee.org/src/bitlbee-3.6.tar.gz
docs: https://www.bitlbee.org/
package-manager:
  apk: bitlbee
  brew: bitlbee
  debian: bitlbee
  dnf: bitlbee
  macports: bitlbee
  nix: bitlbee
  ubuntu: bitlbee
  zypper: bitlbee
package-manager-url: https://formulae.brew.sh/formula/bitlbee
version: 3.6
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: IRC to other chat networks gateway
source-archive: https://get.bitlbee.org/src/bitlbee-3.6.tar.gz
dependencies:
  - gettext
  - glib
  - gnutls
  - libgcrypt
  - libgpg-error
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: bitlbee
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add bitlbee
  av: sudo av install brew:bitlbee
  brew: brew install bitlbee
  debian: sudo apt install bitlbee
  dnf: sudo dnf install bitlbee
  macports: sudo port install bitlbee
  nix: nix profile install nixpkgs#bitlbee
  ubuntu: sudo apt install bitlbee
  zypper: sudo zypper install bitlbee
provenance:
  formula: bitlbee
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
