id: brew:nsh
display-name: nsh
homepage: https://github.com/nuta/nsh
repo: https://github.com/nuta/nsh
docs: https://github.com/nuta/nsh
package-manager:
  apk: nsh
  brew: nsh
  macports: nsh
  nix: nsh
package-manager-url: https://formulae.brew.sh/formula/nsh
version: 0.4.2
license: CC0-1.0 OR MIT
category: development
tags:
  - cli
description: Fish-like, POSIX-compatible shell
source-archive: https://github.com/nuta/nsh/archive/refs/tags/v0.4.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: nsh
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nsh
  av: sudo av install brew:nsh
  brew: brew install nsh
  macports: sudo port install nsh
  nix: nix profile install nixpkgs#nsh
provenance:
  formula: nsh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
