id: brew:opencc
display-name: opencc
homepage: https://github.com/BYVoid/OpenCC
repo: https://github.com/BYVoid/OpenCC
docs: https://github.com/BYVoid/OpenCC
package-manager:
  apk: opencc
  brew: opencc
  debian: opencc
  dnf: opencc
  macports: opencc
  nix: opencc
  pacman: opencc
  ubuntu: opencc
  winget: BYVoid.OpenCC
  zypper: opencc
package-manager-url: https://formulae.brew.sh/formula/opencc
version: 1.3.1
license: Apache-2.0
category: development
tags:
  - cli
description: Simplified-traditional Chinese conversion tool
source-archive: https://github.com/BYVoid/OpenCC/archive/refs/tags/ver.1.3.1.tar.gz
dependencies:
  - marisa
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: opencc
  - exposure: global executable
    kind: cli
    name: opencc_dict
  - exposure: global executable
    kind: cli
    name: opencc_phrase_extract
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add opencc
  av: sudo av install brew:opencc
  brew: brew install opencc
  debian: sudo apt install opencc
  dnf: sudo dnf install opencc
  macports: sudo port install opencc
  nix: nix profile install nixpkgs#opencc
  pacman: sudo pacman -S opencc
  ubuntu: sudo apt install opencc
  winget: winget install --id BYVoid.OpenCC -e
  zypper: sudo zypper install opencc
provenance:
  formula: opencc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
