id: brew:fwupd
display-name: fwupd
homepage: https://github.com/fwupd/fwupd
repo: https://github.com/fwupd/fwupd
docs: https://github.com/fwupd/fwupd
package-manager:
  apk: fwupd
  brew: fwupd
  debian: fwupd
  dnf: fwupd
  nix: fwupd
  pacman: fwupd
  ubuntu: fwupd
  winget: fwupd.fwupd
  zypper: fwupd
package-manager-url: https://formulae.brew.sh/formula/fwupd
version: 2.1.3
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Firmware update daemon
source-archive: https://github.com/fwupd/fwupd/releases/download/2.1.3/fwupd-2.1.3.tar.xz
dependencies:
  - gettext
  - glib
  - gnutls
  - libcbor
  - libjcat
  - libusb
  - libxmlb
  - readline
  - sqlite
  - usb.ids
  - xz
build-dependencies:
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - python@3.14
  - vala
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: dbxtool
  - exposure: global executable
    kind: cli
    name: fwupdtool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fwupd
  av: sudo av install brew:fwupd
  brew: brew install fwupd
  debian: sudo apt install fwupd
  dnf: sudo dnf install fwupd
  nix: nix profile install nixpkgs#fwupd
  pacman: sudo pacman -S fwupd
  ubuntu: sudo apt install fwupd
  winget: winget install --id fwupd.fwupd -e
  zypper: sudo zypper install fwupd
provenance:
  formula: fwupd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
