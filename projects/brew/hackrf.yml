id: brew:hackrf
display-name: hackrf
homepage: https://github.com/greatscottgadgets/hackrf
repo: https://github.com/greatscottgadgets/hackrf
docs: https://github.com/greatscottgadgets/hackrf
package-manager:
  apk: hackrf
  brew: hackrf
  debian: hackrf
  dnf: hackrf
  macports: hackrf
  nix: hackrf
  pacman: hackrf
  ubuntu: hackrf
  zypper: hackrf
package-manager-url: https://formulae.brew.sh/formula/hackrf
version: 2026.01.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Low cost software radio platform
source-archive: >
  https://github.com/greatscottgadgets/hackrf/releases/download/v2026.01.3/hackrf-2026.01.3.tar.xz
dependencies:
  - fftw
  - libusb
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: hackrf_biast
  - exposure: global executable
    kind: cli
    name: hackrf_clock
  - exposure: global executable
    kind: cli
    name: hackrf_cpldjtag
  - exposure: global executable
    kind: cli
    name: hackrf_debug
  - exposure: global executable
    kind: cli
    name: hackrf_info
  - exposure: global executable
    kind: cli
    name: hackrf_operacake
  - exposure: global executable
    kind: cli
    name: hackrf_spiflash
  - exposure: global executable
    kind: cli
    name: hackrf_sweep
  - exposure: global executable
    kind: cli
    name: hackrf_transfer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hackrf
  av: sudo av install brew:hackrf
  brew: brew install hackrf
  debian: sudo apt install hackrf
  dnf: sudo dnf install hackrf
  macports: sudo port install hackrf
  nix: nix profile install nixpkgs#hackrf
  pacman: sudo pacman -S hackrf
  ubuntu: sudo apt install hackrf
  zypper: sudo zypper install hackrf
provenance:
  formula: hackrf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
