id: brew:satellite-tracker
display-name: satellite-tracker
homepage: https://github.com/ShenMian/tracker
repo: https://github.com/ShenMian/tracker
docs: https://github.com/ShenMian/tracker
package-manager:
  brew: satellite-tracker
  debian: tracker
  macports: tracker
  scoop: extras/tracker
  ubuntu: tracker
  winget: OpenSourcePhysics.Tracker
package-manager-url: https://formulae.brew.sh/formula/satellite-tracker
version: 0.1.20
license: Apache-2.0
category: development
tags:
  - cli
description: Terminal-based real-time satellite tracking and orbit prediction application
source-archive: https://github.com/ShenMian/tracker/archive/refs/tags/v0.1.20.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tracker
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:satellite-tracker
  brew: brew install satellite-tracker
  debian: sudo apt install tracker
  macports: sudo port install tracker
  scoop: scoop install extras/tracker
  ubuntu: sudo apt install tracker
  winget: winget install --id OpenSourcePhysics.Tracker -e
provenance:
  formula: satellite-tracker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
