id: brew:incus
display-name: incus
homepage: https://linuxcontainers.org/incus
repo: https://linuxcontainers.org/downloads/incus/incus-7.0.0.tar.xz
docs: https://linuxcontainers.org/incus
package-manager:
  apk: incus
  brew: incus
  debian: incus
  dnf: incus
  macports: incus
  nix: incus
  pacman: incus
  ubuntu: incus
  winget: LinuxContainers.Incus
  zypper: incus
package-manager-url: https://formulae.brew.sh/formula/incus
version: 7.0.0
license: Apache-2.0
category: network
tags:
  - cli
description: CLI client for interacting with Incus
source-archive: https://linuxcontainers.org/downloads/incus/incus-7.0.0.tar.xz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: incus
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add incus
  av: sudo av install brew:incus
  brew: brew install incus
  debian: sudo apt install incus
  dnf: sudo dnf install incus
  macports: sudo port install incus
  nix: nix profile install nixpkgs#incus
  pacman: sudo pacman -S incus
  ubuntu: sudo apt install incus
  winget: winget install --id LinuxContainers.Incus -e
  zypper: sudo zypper install incus
provenance:
  formula: incus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
