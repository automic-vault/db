id: brew:mon
display-name: mon
homepage: https://github.com/tj/mon
repo: https://github.com/tj/mon
docs: https://github.com/tj/mon
package-manager:
  brew: mon
  debian: mon
  dnf: mon
  ubuntu: mon
package-manager-url: https://formulae.brew.sh/formula/mon
version: 1.2.3
license: MIT
category: development
tags:
  - cli
description: Monitor hosts/services/whatever and alert about problems
source-archive: https://github.com/tj/mon/archive/refs/tags/1.2.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mon
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mon
  brew: brew install mon
  debian: sudo apt install mon
  dnf: sudo dnf install mon
  ubuntu: sudo apt install mon
provenance:
  formula: mon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
