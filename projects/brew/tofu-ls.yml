id: brew:tofu-ls
display-name: tofu-ls
homepage: https://github.com/opentofu/tofu-ls
repo: https://github.com/opentofu/tofu-ls
docs: https://github.com/opentofu/tofu-ls
package-manager:
  apk: tofu-ls
  brew: tofu-ls
  nix: tofu-ls
package-manager-url: https://formulae.brew.sh/formula/tofu-ls
version: 0.5.0
license: MPL-2.0
category: development
tags:
  - cli
description: OpenTofu Language Server
source-archive: https://github.com/opentofu/tofu-ls/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tofu-ls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tofu-ls
  av: sudo av install brew:tofu-ls
  brew: brew install tofu-ls
  nix: nix profile install nixpkgs#tofu-ls
provenance:
  formula: tofu-ls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
