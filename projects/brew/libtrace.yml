id: brew:libtrace
display-name: libtrace
homepage: https://github.com/LibtraceTeam/libtrace
repo: https://github.com/LibtraceTeam/libtrace
docs: https://github.com/LibtraceTeam/libtrace
package-manager:
  brew: libtrace
  nix: libtrace
package-manager-url: https://formulae.brew.sh/formula/libtrace
version: 4.0.31
license: GPL-2.0-or-later AND LGPL-3.0-or-later
category: development
tags:
  - cli
description: Library for trace processing supporting multiple inputs
source-archive: https://github.com/LibtraceTeam/libtrace/archive/refs/tags/4.0.31-1.tar.gz
dependencies:
  - openssl@3
  - wandio
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - libpcap
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: traceconvert
  - exposure: global executable
    kind: cli
    name: tracediff
  - exposure: global executable
    kind: cli
    name: traceends
  - exposure: global executable
    kind: cli
    name: tracefilter
  - exposure: global executable
    kind: cli
    name: tracemcast
  - exposure: global executable
    kind: cli
    name: tracemerge
  - exposure: global executable
    kind: cli
    name: tracepktdump
  - exposure: global executable
    kind: cli
    name: tracereplay
  - exposure: global executable
    kind: cli
    name: tracereport
  - exposure: global executable
    kind: cli
    name: tracertstats
  - exposure: global executable
    kind: cli
    name: tracesplit
  - exposure: global executable
    kind: cli
    name: tracesplit_dir
  - exposure: global executable
    kind: cli
    name: tracestats
  - exposure: global executable
    kind: cli
    name: tracesummary
  - exposure: global executable
    kind: cli
    name: tracetop
  - exposure: global executable
    kind: cli
    name: tracetopends
  - exposure: global executable
    kind: cli
    name: traceucast
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libtrace
  brew: brew install libtrace
  nix: nix profile install nixpkgs#libtrace
provenance:
  formula: libtrace
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
