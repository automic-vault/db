id: brew:gdb
display-name: gdb
homepage: https://www.gnu.org/software/gdb/
repo: https://ftpmirror.gnu.org/gnu/gdb/gdb-17.2.tar.xz
docs: https://www.gnu.org/software/gdb/
package-manager:
  apk: gdb
  brew: gdb
  debian: gdb
  dnf: gdb
  macports: gdb
  nix: gdb
  pacman: gdb
  scoop: main/gdb
  ubuntu: gdb
  zypper: gdb
package-manager-url: https://formulae.brew.sh/formula/gdb
version: 17.2
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU debugger
source-archive: https://ftpmirror.gnu.org/gnu/gdb/gdb-17.2.tar.xz
dependencies:
  - gmp
  - mpfr
  - ncurses
  - python@3.14
  - readline
  - xz
  - zstd
build-dependencies:
  - pkgconf
  - texinfo
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: gcore
  - exposure: global executable
    kind: cli
    name: gdb
  - exposure: global executable
    kind: cli
    name: gdb-add-index
  - exposure: global executable
    kind: cli
    name: gdbserver
  - exposure: global executable
    kind: cli
    name: gstack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    gdb requires special privileges to access Mach ports. You will need to codesign the
    binary. For instructions, see: https://sourceware.org/gdb/wiki/PermissionsDarwin
  post-install-defined: false
install-lines:
  apk: sudo apk add gdb
  av: sudo av install brew:gdb
  brew: brew install gdb
  debian: sudo apt install gdb
  dnf: sudo dnf install gdb
  macports: sudo port install gdb
  nix: nix profile install nixpkgs#gdb
  pacman: sudo pacman -S gdb
  scoop: scoop install main/gdb
  ubuntu: sudo apt install gdb
  zypper: sudo zypper install gdb
provenance:
  formula: gdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
