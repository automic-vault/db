id: brew:plotutils
display-name: plotutils
homepage: https://www.gnu.org/software/plotutils/
repo: https://ftpmirror.gnu.org/gnu/plotutils/plotutils-2.6.tar.gz
docs: https://www.gnu.org/software/plotutils/
package-manager:
  apk: ode
  brew: plotutils
  debian: plotutils
  dnf: plotutils
  macports: plotutils
  nix: plotutils
  pacman: plotutils
  ubuntu: plotutils
  zypper: plotutils
package-manager-url: https://formulae.brew.sh/formula/plotutils
version: 2.6
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: C/C++ function library for exporting 2-D vector graphics
source-archive: https://ftpmirror.gnu.org/gnu/plotutils/plotutils-2.6.tar.gz
dependencies:
  - libpng
executables:
  - exposure: global executable
    kind: cli
    name: double
  - exposure: global executable
    kind: cli
    name: graph
  - exposure: global executable
    kind: cli
    name: hersheydemo
  - exposure: global executable
    kind: cli
    name: ode
  - exposure: global executable
    kind: cli
    name: pic2plot
  - exposure: global executable
    kind: cli
    name: plot
  - exposure: global executable
    kind: cli
    name: plotfont
  - exposure: global executable
    kind: cli
    name: spline
  - exposure: global executable
    kind: cli
    name: tek2plot
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ode
  av: sudo av install brew:plotutils
  brew: brew install plotutils
  debian: sudo apt install plotutils
  dnf: sudo dnf install plotutils
  macports: sudo port install plotutils
  nix: nix profile install nixpkgs#plotutils
  pacman: sudo pacman -S plotutils
  ubuntu: sudo apt install plotutils
  zypper: sudo zypper install plotutils
provenance:
  formula: plotutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
