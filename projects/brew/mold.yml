id: brew:mold
display-name: mold
homepage: https://github.com/rui314/mold
repo: https://github.com/rui314/mold
docs: https://github.com/rui314/mold
package-manager:
  apk: mold
  brew: mold
  debian: mold
  dnf: mold
  macports: mold
  nix: mold
  pacman: mold
  scoop: main/mold
  ubuntu: mold
  zypper: mold
package-manager-url: https://formulae.brew.sh/formula/mold
version: 2.41.0
license: MIT
category: development
tags:
  - cli
description: Modern Linker
source-archive: https://github.com/rui314/mold/archive/refs/tags/v2.41.0.tar.gz
dependencies:
  - blake3
  - tbb
  - zstd
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ld.mold
  - exposure: global executable
    kind: cli
    name: mold
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: Support for Mach-O targets has been removed.
  post-install-defined: false
install-lines:
  apk: sudo apk add mold
  av: sudo av install brew:mold
  brew: brew install mold
  debian: sudo apt install mold
  dnf: sudo dnf install mold
  macports: sudo port install mold
  nix: nix profile install nixpkgs#mold
  pacman: sudo pacman -S mold
  scoop: scoop install main/mold
  ubuntu: sudo apt install mold
  zypper: sudo zypper install mold
provenance:
  formula: mold
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
