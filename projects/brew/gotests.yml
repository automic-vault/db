id: brew:gotests
display-name: gotests
homepage: https://github.com/cweill/gotests
repo: https://github.com/cweill/gotests
docs: https://github.com/cweill/gotests
package-manager:
  brew: gotests
  nix: gotests
package-manager-url: https://formulae.brew.sh/formula/gotests
version: 1.9.0
license: Apache-2.0
category: development
tags:
  - cli
description: Automatically generate Go test boilerplate from your source code
source-archive: https://github.com/cweill/gotests/archive/refs/tags/v1.9.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gotests
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gotests
  brew: brew install gotests
  nix: nix profile install nixpkgs#gotests
provenance:
  formula: gotests
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
