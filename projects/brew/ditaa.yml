id: brew:ditaa
display-name: ditaa
homepage: https://ditaa.sourceforge.net/
repo: https://github.com/stathissideris/ditaa
docs: https://ditaa.sourceforge.net/
package-manager:
  brew: ditaa
  debian: ditaa
  dnf: ditaa
  macports: ditaa
  nix: ditaa
  pacman: ditaa
  ubuntu: ditaa
package-manager-url: https://formulae.brew.sh/formula/ditaa
version: 0.11.0
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Convert ASCII diagrams into proper bitmap graphics
source-archive: >
  https://github.com/stathissideris/ditaa/releases/download/v0.11.0/ditaa-0.11.0-standalone.jar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: ditaa
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ditaa
  brew: brew install ditaa
  debian: sudo apt install ditaa
  dnf: sudo dnf install ditaa
  macports: sudo port install ditaa
  nix: nix profile install nixpkgs#ditaa
  pacman: sudo pacman -S ditaa
  ubuntu: sudo apt install ditaa
provenance:
  formula: ditaa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
