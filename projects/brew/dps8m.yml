id: brew:dps8m
display-name: dps8m
homepage: https://dps8m.gitlab.io/
repo: https://dps8m.gitlab.io/dps8m-r3.1.0-archive/R3.1.0/dps8m-r3.1.0-src.tar.gz
docs: https://dps8m.gitlab.io/
package-manager:
  brew: dps8m
  nix: dps8m
package-manager-url: https://formulae.brew.sh/formula/dps8m
version: 3.1.0
license: ICU
category: development
tags:
  - cli
description: Simulator of the 36-bit GE/Honeywell/Bull 600/6000-series mainframe computers
source-archive: https://dps8m.gitlab.io/dps8m-r3.1.0-archive/R3.1.0/dps8m-r3.1.0-src.tar.gz
dependencies:
  - libuv
build-dependencies:
  - lld
  - llvm
uses-from-macos:
  - bash
executables:
  - exposure: global executable
    kind: cli
    name: dps8
  - exposure: global executable
    kind: cli
    name: prt2pdf
  - exposure: global executable
    kind: cli
    name: punutil
  - exposure: global executable
    kind: cli
    name: tap2raw
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dps8m
  brew: brew install dps8m
  nix: nix profile install nixpkgs#dps8m
provenance:
  formula: dps8m
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
