id: brew:argocd
display-name: argocd
homepage: https://argoproj.github.io/cd/
repo: https://github.com/argoproj/argo-cd
docs: https://argoproj.github.io/cd/
package-manager:
  apk: argocd
  brew: argocd
  macports: argocd
  nix: argocd
  pacman: argocd
  scoop: main/argocd
  winget: argoproj.argocd
package-manager-url: https://formulae.brew.sh/formula/argocd
version: 3.4.2
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: GitOps Continuous Delivery for Kubernetes
source-archive: https://github.com/argoproj/argo-cd.git
build-dependencies:
  - go
  - node
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: argocd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add argocd
  av: sudo av install brew:argocd
  brew: brew install argocd
  macports: sudo port install argocd
  nix: nix profile install nixpkgs#argocd
  pacman: sudo pacman -S argocd
  scoop: scoop install main/argocd
  winget: winget install --id argoproj.argocd -e
provenance:
  formula: argocd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
