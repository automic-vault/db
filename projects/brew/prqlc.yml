id: brew:prqlc
display-name: prqlc
homepage: https://prql-lang.org
repo: https://github.com/PRQL/prql
docs: https://prql-lang.org
package-manager:
  brew: prqlc
  nix: prqlc
  scoop: main/prqlc
  winget: PRQL.prqlc
package-manager-url: https://formulae.brew.sh/formula/prqlc
version: 0.13.12
license: Apache-2.0
category: database
tags:
  - cli
description: Simple, powerful, pipelined SQL replacement
source-archive: https://github.com/PRQL/prql/archive/refs/tags/0.13.12.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: prqlc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:prqlc
  brew: brew install prqlc
  nix: nix profile install nixpkgs#prqlc
  scoop: scoop install main/prqlc
  winget: winget install --id PRQL.prqlc -e
provenance:
  formula: prqlc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
