id: brew:mtr
display-name: mtr
homepage: https://www.bitwizard.nl/mtr/
repo: https://github.com/traviscross/mtr
docs: https://www.bitwizard.nl/mtr/
package-manager:
  apk: mtr
  brew: mtr
  debian: mtr
  dnf: mtr
  macports: mtr
  nix: mtr
  pacman: mtr
  ubuntu: mtr
  zypper: mtr
package-manager-url: https://formulae.brew.sh/formula/mtr
version: 0.96
license: GPL-2.0-only AND BSD-3-Clause AND LGPL-2.0-only
category: development
tags:
  - cli
description: "'traceroute' and 'ping' in a single tool"
source-archive: https://github.com/traviscross/mtr/archive/refs/tags/v0.96.tar.gz
dependencies:
  - jansson
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mtr
  - exposure: global executable
    kind: cli
    name: mtr-packet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    mtr requires root privileges so you will need to run `sudo mtr`. You should be
    certain that you trust any software you grant root privileges.
  post-install-defined: false
install-lines:
  apk: sudo apk add mtr
  av: sudo av install brew:mtr
  brew: brew install mtr
  debian: sudo apt install mtr
  dnf: sudo dnf install mtr
  macports: sudo port install mtr
  nix: nix profile install nixpkgs#mtr
  pacman: sudo pacman -S mtr
  ubuntu: sudo apt install mtr
  zypper: sudo zypper install mtr
provenance:
  formula: mtr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
