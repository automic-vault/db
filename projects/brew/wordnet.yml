id: brew:wordnet
display-name: wordnet
homepage: https://wordnet.princeton.edu/
repo: https://wordnetcode.princeton.edu/3.0/WordNet-3.0.tar.bz2
docs: https://wordnet.princeton.edu/
package-manager:
  brew: wordnet
  debian: wordnet
  dnf: wordnet
  macports: wordnet
  nix: wordnet
  ubuntu: wordnet
  zypper: wordnet
package-manager-url: https://formulae.brew.sh/formula/wordnet
version: 3.1
license: LicenseRef-Homebrew-cannot-represent
category: database
tags:
  - cli
  - database
description: Lexical database for the English language
source-archive: https://wordnetcode.princeton.edu/3.0/WordNet-3.0.tar.bz2
dependencies:
  - tcl-tk@8
executables:
  - exposure: global executable
    kind: cli
    name: wishwn
  - exposure: global executable
    kind: cli
    name: wn
  - exposure: global executable
    kind: cli
    name: wnb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wordnet
  brew: brew install wordnet
  debian: sudo apt install wordnet
  dnf: sudo dnf install wordnet
  macports: sudo port install wordnet
  nix: nix profile install nixpkgs#wordnet
  ubuntu: sudo apt install wordnet
  zypper: sudo zypper install wordnet
provenance:
  formula: wordnet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
