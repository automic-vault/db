id: brew:gittype
display-name: gittype
homepage: https://github.com/unhappychoice/gittype
repo: https://github.com/unhappychoice/gittype
docs: https://github.com/unhappychoice/gittype
package-manager:
  brew: gittype
  nix: gittype
package-manager-url: https://formulae.brew.sh/formula/gittype
version: 0.10.0
license: MIT
category: development
tags:
  - cli
description: CLI code-typing game that turns your source code into typing challenges
source-archive: https://github.com/unhappychoice/gittype/archive/refs/tags/v0.10.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gittype
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gittype
  brew: brew install gittype
  nix: nix profile install nixpkgs#gittype
provenance:
  formula: gittype
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
