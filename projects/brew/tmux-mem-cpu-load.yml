id: brew:tmux-mem-cpu-load
display-name: tmux-mem-cpu-load
homepage: https://github.com/thewtex/tmux-mem-cpu-load
repo: https://github.com/thewtex/tmux-mem-cpu-load
docs: https://github.com/thewtex/tmux-mem-cpu-load
package-manager:
  brew: tmux-mem-cpu-load
  macports: tmux-mem-cpu-load
