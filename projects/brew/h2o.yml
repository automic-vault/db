id: brew:h2o
display-name: h2o
homepage: https://github.com/h2o/h2o/
repo: https://github.com/h2o/h2o
docs: https://github.com/h2o/h2o/
package-manager:
  brew: h2o
  macports: h2o
  nix: h2o
  ubuntu: h2o
package-manager-url: https://formulae.brew.sh/formula/h2o
version: 2.2.6
license: MIT
category: development
tags:
  - cli
description: HTTP server with support for HTTP/1.x and HTTP/2
source-archive: https://github.com/h2o/h2o/archive/refs/tags/v2.2.6.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: h2o
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    A basic example configuration file has been placed in $HOMEBREW_PREFIX/etc/h2o. You
    can find fuller, unmodified examples in $HOMEBREW_PREFIX/opt/h2o/share/h2o/examples.
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:h2o
  brew: brew install h2o
  macports: sudo port install h2o
  nix: nix profile install nixpkgs#h2o
  ubuntu: sudo apt install h2o
provenance:
  formula: h2o
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
