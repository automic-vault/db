id: brew:topydo
display-name: topydo
homepage: https://github.com/topydo/topydo
repo: >
  https://files.pythonhosted.org/packages/11/6a/8278ac5a59ec633322dcdff278bf74ce8c9d513370cf41d1ecfa5e0376d0/topydo-0.16.tar.gz
docs: https://github.com/topydo/topydo
package-manager:
