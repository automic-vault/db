id: brew:rustypaste
display-name: rustypaste
homepage: https://blog.orhun.dev/blazingly-fast-file-sharing
repo: https://github.com/orhun/rustypaste
docs: https://blog.orhun.dev/blazingly-fast-file-sharing
package-manager:
  apk: rustypaste
  brew: rustypaste
  nix: rustypaste
  pacman: rustypaste
package-manager-url: https://formulae.brew.sh/formula/rustypaste
version: 0.17.0
license: MIT
category: development
tags:
  - cli
description: Minimal file upload/pastebin service
source-archive: https://github.com/orhun/rustypaste/archive/refs/tags/v0.17.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rustypaste
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    An example config is installed to
    $HOMEBREW_PREFIX/opt/rustypaste/share/rustypaste/config.toml
  post-install-defined: false
install-lines:
  apk: sudo apk add rustypaste
  av: sudo av install brew:rustypaste
  brew: brew install rustypaste
  nix: nix profile install nixpkgs#rustypaste
  pacman: sudo pacman -S rustypaste
provenance:
  formula: rustypaste
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
