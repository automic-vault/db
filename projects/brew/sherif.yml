id: brew:sherif
display-name: sherif
homepage: https://github.com/QuiiBz/sherif
repo: https://registry.npmjs.org/sherif/-/sherif-1.11.1.tgz
docs: https://github.com/QuiiBz/sherif
package-manager:
  brew: sherif
package-manager-url: https://formulae.brew.sh/formula/sherif
version: 1.11.1
license: MIT
category: development
tags:
  - cli
description: Opinionated, zero-config linter for JavaScript monorepos
source-archive: https://registry.npmjs.org/sherif/-/sherif-1.11.1.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: sherif
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sherif
  brew: brew install sherif
provenance:
  formula: sherif
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
