id: brew:hadolint
display-name: hadolint
homepage: https://github.com/hadolint/hadolint
repo: https://github.com/hadolint/hadolint
docs: https://github.com/hadolint/hadolint
package-manager:
  brew: hadolint
  dnf: hadolint
  macports: hadolint
  nix: hadolint
  scoop: main/hadolint
  winget: hadolint.hadolint
package-manager-url: https://formulae.brew.sh/formula/hadolint
version: 2.14.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Smarter Dockerfile linter to validate best practices
source-archive: https://github.com/hadolint/hadolint/archive/refs/tags/v2.14.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
  - xz
executables:
  - exposure: global executable
    kind: cli
    name: hadolint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hadolint
  brew: brew install hadolint
  dnf: sudo dnf install hadolint
  macports: sudo port install hadolint
  nix: nix profile install nixpkgs#hadolint
  scoop: scoop install main/hadolint
  winget: winget install --id hadolint.hadolint -e
provenance:
  formula: hadolint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
