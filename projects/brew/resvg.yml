id: brew:resvg
display-name: resvg
homepage: https://github.com/linebender/resvg
repo: https://github.com/linebender/resvg
docs: https://github.com/linebender/resvg
package-manager:
  apk: resvg
  brew: resvg
  debian: resvg
  nix: resvg
  pacman: resvg
  scoop: main/resvg
  zypper: resvg
package-manager-url: https://formulae.brew.sh/formula/resvg
version: 0.47.0
license: MPL-2.0
category: development
tags:
  - cli
description: SVG rendering tool and library
source-archive: https://github.com/linebender/resvg/archive/refs/tags/v0.47.0.tar.gz
build-dependencies:
  - cargo-c
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: resvg
  - exposure: global executable
    kind: cli
    name: usvg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add resvg
  av: sudo av install brew:resvg
  brew: brew install resvg
  debian: sudo apt install resvg
  nix: nix profile install nixpkgs#resvg
  pacman: sudo pacman -S resvg
  scoop: scoop install main/resvg
  zypper: sudo zypper install resvg
provenance:
  formula: resvg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
