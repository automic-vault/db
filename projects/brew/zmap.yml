id: brew:zmap
display-name: zmap
homepage: https://zmap.io
repo: https://github.com/zmap/zmap
docs: https://zmap.io
package-manager:
  apk: zmap
  brew: zmap
  debian: zmap
  dnf: zmap
  macports: zmap
  nix: zmap
  pacman: zmap
  ubuntu: zmap
package-manager-url: https://formulae.brew.sh/formula/zmap
version: 4.3.4
license: Apache-2.0
category: development
tags:
  - cli
description: Network scanner for Internet-wide network studies
source-archive: https://github.com/zmap/zmap/archive/refs/tags/v4.3.4.tar.gz
dependencies:
  - gmp
  - json-c
  - judy
  - libdnet
  - libunistring
build-dependencies:
  - byacc
  - cmake
  - gengetopt
  - pkgconf
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: zblocklist
  - exposure: global executable
    kind: cli
    name: ziterate
  - exposure: global executable
    kind: cli
    name: zmap
  - exposure: global executable
    kind: cli
    name: ztee
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zmap
  av: sudo av install brew:zmap
  brew: brew install zmap
  debian: sudo apt install zmap
  dnf: sudo dnf install zmap
  macports: sudo port install zmap
  nix: nix profile install nixpkgs#zmap
  pacman: sudo pacman -S zmap
  ubuntu: sudo apt install zmap
provenance:
  formula: zmap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
