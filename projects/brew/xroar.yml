id: brew:xroar
display-name: xroar
homepage: https://www.6809.org.uk/xroar/
repo: https://www.6809.org.uk/xroar/dl/xroar-1.11.tar.gz
docs: https://www.6809.org.uk/xroar/
package-manager:
  brew: xroar
package-manager-url: https://formulae.brew.sh/formula/xroar
version: 1.11
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Dragon and Tandy 8-bit computer emulator
source-archive: https://www.6809.org.uk/xroar/dl/xroar-1.11.tar.gz
dependencies:
  - libpng
  - libsndfile
  - sdl2
executables:
  - exposure: global executable
    kind: cli
    name: xroar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xroar
  brew: brew install xroar
provenance:
  formula: xroar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
