id: brew:fourmolu
display-name: fourmolu
homepage: https://github.com/fourmolu/fourmolu
repo: https://hackage.haskell.org/package/fourmolu-0.19.0.1/fourmolu-0.19.0.1.tar.gz
docs: https://github.com/fourmolu/fourmolu
package-manager:
  brew: fourmolu
  nix: fourmolu
package-manager-url: https://formulae.brew.sh/formula/fourmolu
version: 0.19.0.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Formatter for Haskell source code
source-archive: https://hackage.haskell.org/package/fourmolu-0.19.0.1/fourmolu-0.19.0.1.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc@9.12
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: fourmolu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fourmolu
  brew: brew install fourmolu
  nix: nix profile install nixpkgs#fourmolu
provenance:
  formula: fourmolu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
