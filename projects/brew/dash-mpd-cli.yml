id: brew:dash-mpd-cli
display-name: dash-mpd-cli
homepage: https://emarsden.github.io/dash-mpd-cli/
repo: https://github.com/emarsden/dash-mpd-cli
docs: https://emarsden.github.io/dash-mpd-cli/
package-manager:
  brew: dash-mpd-cli
  nix: dash-mpd-cli
package-manager-url: https://formulae.brew.sh/formula/dash-mpd-cli
version: 0.2.33
license: MIT
category: development
tags:
  - cli
description: Download media content from a DASH-MPEG or DASH-WebM MPD manifest
source-archive: https://github.com/emarsden/dash-mpd-cli/archive/refs/tags/v0.2.33.tar.gz
dependencies:
  - bento4
  - ffmpeg
  - mkvtoolnix
build-dependencies:
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dash-mpd-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dash-mpd-cli
  brew: brew install dash-mpd-cli
  nix: nix profile install nixpkgs#dash-mpd-cli
provenance:
  formula: dash-mpd-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
