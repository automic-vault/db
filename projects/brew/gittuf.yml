id: brew:gittuf
display-name: gittuf
homepage: https://gittuf.dev/
repo: https://github.com/gittuf/gittuf
docs: https://gittuf.dev/
package-manager:
  brew: gittuf
  debian: gittuf
  nix: gittuf
  winget: gittuf.gittuf
package-manager-url: https://formulae.brew.sh/formula/gittuf
version: 0.14.1
license: Apache-2.0
category: security
tags:
  - cli
  - git
  - security
description: Security layer for Git repositories
source-archive: https://github.com/gittuf/gittuf/archive/refs/tags/v0.14.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-remote-gittuf
  - exposure: global executable
    kind: cli
    name: gittuf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gittuf
  brew: brew install gittuf
  debian: sudo apt install gittuf
  nix: nix profile install nixpkgs#gittuf
  winget: winget install --id gittuf.gittuf -e
provenance:
  formula: gittuf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
