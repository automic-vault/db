id: brew:protoc-gen-grpc-swift
display-name: protoc-gen-grpc-swift
homepage: https://github.com/grpc/grpc-swift-protobuf
repo: https://github.com/grpc/grpc-swift-protobuf
docs: https://github.com/grpc/grpc-swift-protobuf
package-manager:
  brew: protoc-gen-grpc-swift
package-manager-url: https://formulae.brew.sh/formula/protoc-gen-grpc-swift
version: 2.4.0
license: Apache-2.0
category: development
tags:
  - cli
description: Protoc plugin for generating gRPC Swift stubs
source-archive: https://github.com/grpc/grpc-swift-protobuf/archive/refs/tags/2.4.0.tar.gz
dependencies:
  - protobuf
  - swift-protobuf
executables:
  - exposure: global executable
    kind: cli
    name: protoc-gen-grpc-swift-2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:protoc-gen-grpc-swift
  brew: brew install protoc-gen-grpc-swift
provenance:
  formula: protoc-gen-grpc-swift
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
