id: brew:notmuch
display-name: notmuch
homepage: https://notmuchmail.org/
repo: https://notmuchmail.org/releases/notmuch-0.40.tar.xz
docs: https://notmuchmail.org/
package-manager:
  apk: notmuch
  brew: notmuch
  debian: notmuch
  dnf: notmuch
  macports: notmuch
  nix: notmuch
  pacman: notmuch
  ubuntu: notmuch
  zypper: notmuch
package-manager-url: https://formulae.brew.sh/formula/notmuch
version: 0.40
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Thread-based email index, search, and tagging
source-archive: https://notmuchmail.org/releases/notmuch-0.40.tar.xz
dependencies:
  - cffi
  - gettext
  - glib
  - gmime
  - python@3.14
  - sfsexp
  - talloc
  - xapian
build-dependencies:
  - doxygen
  - emacs
  - gnupg
  - libgpg-error
  - pkgconf
  - sphinx-doc
executables:
  - exposure: global executable
    kind: cli
    name: notmuch
  - exposure: global executable
    kind: cli
    name: notmuch-emacs-mua
  - exposure: global executable
    kind: cli
    name: notmuch-git
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add notmuch
  av: sudo av install brew:notmuch
  brew: brew install notmuch
  debian: sudo apt install notmuch
  dnf: sudo dnf install notmuch
  macports: sudo port install notmuch
  nix: nix profile install nixpkgs#notmuch
  pacman: sudo pacman -S notmuch
  ubuntu: sudo apt install notmuch
  zypper: sudo zypper install notmuch
provenance:
  formula: notmuch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
