id: brew:api-linter
display-name: api-linter
homepage: https://linter.aip.dev/
repo: https://github.com/googleapis/api-linter
docs: https://linter.aip.dev/
package-manager:
  brew: api-linter
  nix: api-linter
package-manager-url: https://formulae.brew.sh/formula/api-linter
version: 2.3.1
license: Apache-2.0
category: development
tags:
  - cli
description: Linter for APIs defined in protocol buffers
source-archive: https://github.com/googleapis/api-linter/archive/refs/tags/v2.3.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: api-linter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:api-linter
  brew: brew install api-linter
  nix: nix profile install nixpkgs#api-linter
provenance:
  formula: api-linter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
