id: brew:envoy
display-name: envoy
homepage: https://www.envoyproxy.io/index.html
repo: https://github.com/envoyproxy/envoy
docs: https://www.envoyproxy.io/index.html
package-manager:
  brew: envoy
  nix: envoy
package-manager-url: https://formulae.brew.sh/formula/envoy
version: 1.38.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Cloud-native high-performance edge/middle/service proxy
source-archive: https://github.com/envoyproxy/envoy/archive/refs/tags/v1.38.0.tar.gz
build-dependencies:
  - aspell
  - autoconf
  - automake
  - bazelisk
  - clang-format
  - cmake
  - go
  - libtool
  - llvm@18
  - ninja
  - pkgconf
  - wget
  - yq
executables:
  - exposure: global executable
    kind: cli
    name: envoy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:envoy
  brew: brew install envoy
  nix: nix profile install nixpkgs#envoy
provenance:
  formula: envoy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
