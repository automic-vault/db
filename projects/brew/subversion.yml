id: brew:subversion
display-name: subversion
homepage: https://subversion.apache.org/
repo: https://www.apache.org/dyn/closer.lua?path=subversion/subversion-1.14.5.tar.bz2
docs: https://subversion.apache.org/
package-manager:
  apk: subversion
  brew: subversion
  chocolatey: svn
  debian: subversion
  dnf: subversion
  macports: subversion
  pacman: subversion
  ubuntu: subversion
  zypper: subversion
package-manager-url: https://formulae.brew.sh/formula/subversion
version: 1.14.5
license: Apache-2.0
category: network
tags:
  - cli
description: Version control system designed to be a better CVS
source-archive: https://www.apache.org/dyn/closer.lua?path=subversion/subversion-1.14.5.tar.bz2
dependencies:
  - apache-serf
  - apr
  - apr-util
  - gettext
  - lz4
  - utf8proc
build-dependencies:
  - gettext
  - pkgconf
  - python-setuptools
  - python@3.14
  - swig
uses-from-macos:
  - expat
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: svn
  - exposure: global executable
    kind: cli
    name: svnadmin
  - exposure: global executable
    kind: cli
    name: svnbench
  - exposure: global executable
    kind: cli
    name: svndumpfilter
  - exposure: global executable
    kind: cli
    name: svnfsfs
  - exposure: global executable
    kind: cli
    name: svnlook
  - exposure: global executable
    kind: cli
    name: svnmucc
  - exposure: global executable
    kind: cli
    name: svnrdump
  - exposure: global executable
    kind: cli
    name: svnserve
  - exposure: global executable
    kind: cli
    name: svnsync
  - exposure: global executable
    kind: cli
    name: svnversion
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    svntools have been installed to: $HOMEBREW_PREFIX/opt/subversion/libexec The perl
    bindings are located in various subdirectories of:
    $HOMEBREW_PREFIX/opt/subversion/lib/perl5
  post-install-defined: false
install-lines:
  apk: sudo apk add subversion
  av: sudo av install brew:subversion
  brew: brew install subversion
  chocolatey: choco install svn
  debian: sudo apt install subversion
  dnf: sudo dnf install subversion
  macports: sudo port install subversion
  pacman: sudo pacman -S subversion
  ubuntu: sudo apt install subversion
  zypper: sudo zypper install subversion
provenance:
  formula: subversion
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
