id: brew:sleepwatcher
display-name: sleepwatcher
homepage: https://www.bernhard-baehr.de/
repo: https://www.bernhard-baehr.de/sleepwatcher_2.2.1.tgz
docs: https://www.bernhard-baehr.de/
package-manager:
  brew: sleepwatcher
  macports: sleepwatcher
  nix: sleepwatcher
package-manager-url: https://formulae.brew.sh/formula/sleepwatcher
version: 2.2.1
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Monitors sleep, wakeup, and idleness of a Mac
source-archive: https://www.bernhard-baehr.de/sleepwatcher_2.2.1.tgz
executables:
  - exposure: global executable
    kind: cli
    name: sleepwatcher
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    For SleepWatcher to work, you will need to write sleep and wakeup scripts, located
    here when using brew services: ~/.sleep ~/.wakeup
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:sleepwatcher
  brew: brew install sleepwatcher
  macports: sudo port install sleepwatcher
  nix: nix profile install nixpkgs#sleepwatcher
provenance:
  formula: sleepwatcher
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
