id: brew:cargo-zigbuild
display-name: cargo-zigbuild
homepage: https://github.com/rust-cross/cargo-zigbuild
repo: https://github.com/rust-cross/cargo-zigbuild
docs: https://github.com/rust-cross/cargo-zigbuild
package-manager:
  apk: cargo-zigbuild
  brew: cargo-zigbuild
  nix: cargo-zigbuild
  pacman: cargo-zigbuild
package-manager-url: https://formulae.brew.sh/formula/cargo-zigbuild
version: 0.22.3
license: MIT
category: development
tags:
  - cli
description: Compile Cargo project with zig as linker
source-archive: https://github.com/rust-cross/cargo-zigbuild/archive/refs/tags/v0.22.3.tar.gz
dependencies:
  - zig
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-zigbuild
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-zigbuild
  av: sudo av install brew:cargo-zigbuild
  brew: brew install cargo-zigbuild
  nix: nix profile install nixpkgs#cargo-zigbuild
  pacman: sudo pacman -S cargo-zigbuild
provenance:
  formula: cargo-zigbuild
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
