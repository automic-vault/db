id: brew:atac
display-name: atac
homepage: https://atac.julien-cpsn.com/
repo: https://github.com/Julien-cpsn/ATAC
docs: https://atac.julien-cpsn.com/
package-manager:
  apk: atac
  brew: atac
  debian: atac
  nix: atac
  pacman: atac
  scoop: main/atac
  ubuntu: atac
package-manager-url: https://formulae.brew.sh/formula/atac
version: 0.23.0
license: MIT
category: development
tags:
  - cli
description: Simple API client (Postman-like) in your terminal
source-archive: https://github.com/Julien-cpsn/ATAC/archive/refs/tags/v0.23.0.tar.gz
dependencies:
  - oniguruma
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: atac
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add atac
  av: sudo av install brew:atac
  brew: brew install atac
  debian: sudo apt install atac
  nix: nix profile install nixpkgs#atac
  pacman: sudo pacman -S atac
  scoop: scoop install main/atac
  ubuntu: sudo apt install atac
provenance:
  formula: atac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
