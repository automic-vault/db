id: brew:gaffitter
display-name: gaffitter
homepage: https://gaffitter.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/gaffitter/gaffitter/1.0.0/gaffitter-1.0.0.tar.gz
docs: https://gaffitter.sourceforge.net/
package-manager:
  brew: gaffitter
  debian: gaffitter
  ubuntu: gaffitter
package-manager-url: https://formulae.brew.sh/formula/gaffitter
version: 1.0.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Efficiently fit files/folders to fixed size volumes (like DVDs)
source-archive: >
  https://downloads.sourceforge.net/project/gaffitter/gaffitter/1.0.0/gaffitter-1.0.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: fit
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gaffitter
  brew: brew install gaffitter
  debian: sudo apt install gaffitter
  ubuntu: sudo apt install gaffitter
provenance:
  formula: gaffitter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
