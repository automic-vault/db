id: brew:oh-my-posh
display-name: oh-my-posh
homepage: https://ohmyposh.dev
repo: https://github.com/JanDeDobbeleer/oh-my-posh
docs: https://ohmyposh.dev
package-manager:
  brew: oh-my-posh
  chocolatey: oh-my-posh
  dnf: oh-my-posh
  macports: oh-my-posh
  nix: oh-my-posh
  scoop: main/oh-my-posh
  winget: JanDeDobbeleer.OhMyPosh
package-manager-url: https://formulae.brew.sh/formula/oh-my-posh
version: 29.14.0
license: MIT
category: development
tags:
  - cli
description: Prompt theme engine for any shell
source-archive: https://github.com/JanDeDobbeleer/oh-my-posh/archive/refs/tags/v29.14.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: oh-my-posh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oh-my-posh
  brew: brew install oh-my-posh
  chocolatey: choco install oh-my-posh
  dnf: sudo dnf install oh-my-posh
  macports: sudo port install oh-my-posh
  nix: nix profile install nixpkgs#oh-my-posh
  scoop: scoop install main/oh-my-posh
  winget: winget install --id JanDeDobbeleer.OhMyPosh -e
provenance:
  formula: oh-my-posh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
