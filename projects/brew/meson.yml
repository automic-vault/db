id: brew:meson
display-name: meson
homepage: https://mesonbuild.com/
repo: https://github.com/mesonbuild/meson
docs: https://mesonbuild.com/
package-manager:
  apk: meson
  brew: meson
  chocolatey: meson
  debian: meson
  dnf: meson
  macports: meson
  nix: meson
  pacman: meson
  scoop: main/meson
  ubuntu: meson
  winget: mesonbuild.meson
  zypper: meson
package-manager-url: https://formulae.brew.sh/formula/meson
version: 1.11.1
license: Apache-2.0
category: development
tags:
  - cli
description: Fast and user friendly build system
source-archive: https://github.com/mesonbuild/meson/releases/download/1.11.1/meson-1.11.1.tar.gz
dependencies:
  - ninja
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: meson
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add meson
  av: sudo av install brew:meson
  brew: brew install meson
  chocolatey: choco install meson
  debian: sudo apt install meson
  dnf: sudo dnf install meson
  macports: sudo port install meson
  nix: nix profile install nixpkgs#meson
  pacman: sudo pacman -S meson
  scoop: scoop install main/meson
  ubuntu: sudo apt install meson
  winget: winget install --id mesonbuild.meson -e
  zypper: sudo zypper install meson
provenance:
  formula: meson
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
