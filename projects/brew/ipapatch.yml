id: brew:ipapatch
display-name: ipapatch
homepage: https://github.com/asdfzxcvbn/ipapatch
repo: https://github.com/asdfzxcvbn/ipapatch
docs: https://github.com/asdfzxcvbn/ipapatch
package-manager:
  brew: ipapatch
package-manager-url: https://formulae.brew.sh/formula/ipapatch
version: 2.1.3
license: MIT
category: development
tags:
  - cli
description: CLI tool to patch iOS IPA files and their plugins
source-archive: https://github.com/asdfzxcvbn/ipapatch/archive/refs/tags/v2.1.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ipapatch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ipapatch
  brew: brew install ipapatch
provenance:
  formula: ipapatch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
