id: brew:libucl
display-name: libucl
homepage: https://github.com/vstakhov/libucl
repo: https://github.com/vstakhov/libucl
docs: https://github.com/vstakhov/libucl
package-manager:
  apk: libucl
  brew: libucl
  dnf: libucl
  macports: libucl
  nix: libucl
package-manager-url: https://formulae.brew.sh/formula/libucl
version: 0.9.4
license: BSD-2-Clause
category: development
tags:
  - cli
description: Universal configuration library parser
source-archive: https://github.com/vstakhov/libucl/archive/refs/tags/0.9.4.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ucl_chargen
  - exposure: global executable
    kind: cli
    name: ucl_objdump
  - exposure: global executable
    kind: cli
    name: ucl_tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libucl
  av: sudo av install brew:libucl
  brew: brew install libucl
  dnf: sudo dnf install libucl
  macports: sudo port install libucl
  nix: nix profile install nixpkgs#libucl
provenance:
  formula: libucl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
