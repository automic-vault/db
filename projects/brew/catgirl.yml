id: brew:catgirl
display-name: catgirl
homepage: https://git.causal.agency/catgirl/about/
repo: https://git.causal.agency/catgirl/snapshot/catgirl-2.2a.tar.gz
docs: https://git.causal.agency/catgirl/about/
package-manager:
  apk: catgirl
  brew: catgirl
  debian: catgirl
  macports: catgirl
  nix: catgirl
  scoop: extras/sandman
  ubuntu: catgirl
  zypper: catgirl
package-manager-url: https://formulae.brew.sh/formula/catgirl
version: 2.2a
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Terminal IRC client
source-archive: https://git.causal.agency/catgirl/snapshot/catgirl-2.2a.tar.gz
dependencies:
  - libretls
build-dependencies:
  - pkgconf
  - universal-ctags
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: catgirl
  - exposure: global executable
    kind: cli
    name: sandman
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add catgirl
  av: sudo av install brew:catgirl
  brew: brew install catgirl
  debian: sudo apt install catgirl
  macports: sudo port install catgirl
  nix: nix profile install nixpkgs#catgirl
  scoop: scoop install extras/sandman
  ubuntu: sudo apt install catgirl
  zypper: sudo zypper install catgirl
provenance:
  formula: catgirl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
