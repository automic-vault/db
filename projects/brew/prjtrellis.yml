id: brew:prjtrellis
display-name: prjtrellis
homepage: https://github.com/YosysHQ/prjtrellis
repo: https://github.com/YosysHQ/prjtrellis
docs: https://github.com/YosysHQ/prjtrellis
package-manager:
  apk: prjtrellis
  brew: prjtrellis
  pacman: prjtrellis
package-manager-url: https://formulae.brew.sh/formula/prjtrellis
version: 1.4
license: ISC AND MIT
category: development
tags:
  - cli
description: Documenting the Lattice ECP5 bit-stream format
source-archive: https://github.com/YosysHQ/prjtrellis/archive/refs/tags/1.4.tar.gz
dependencies:
  - boost
  - boost-python3
  - python@3.14
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ecpbram
  - exposure: global executable
    kind: cli
    name: ecpmulti
  - exposure: global executable
    kind: cli
    name: ecppack
  - exposure: global executable
    kind: cli
    name: ecppll
  - exposure: global executable
    kind: cli
    name: ecpunpack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add prjtrellis
  av: sudo av install brew:prjtrellis
  brew: brew install prjtrellis
  pacman: sudo pacman -S prjtrellis
provenance:
  formula: prjtrellis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
