id: brew:kubefwd
display-name: kubefwd
homepage: https://kubefwd.com
repo: https://github.com/txn2/kubefwd
docs: https://kubefwd.com
package-manager:
  brew: kubefwd
  nix: kubefwd
  scoop: main/kubefwd
  winget: txn2.kubefwd
package-manager-url: https://formulae.brew.sh/formula/kubefwd
version: 1.25.14
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Bulk port forwarding Kubernetes services for local development
source-archive: https://github.com/txn2/kubefwd/archive/refs/tags/v1.25.14.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubefwd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubefwd
  brew: brew install kubefwd
  nix: nix profile install nixpkgs#kubefwd
  scoop: scoop install main/kubefwd
  winget: winget install --id txn2.kubefwd -e
provenance:
  formula: kubefwd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
