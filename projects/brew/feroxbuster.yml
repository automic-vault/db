id: brew:feroxbuster
display-name: feroxbuster
homepage: https://epi052.github.io/feroxbuster
repo: https://github.com/epi052/feroxbuster
docs: https://epi052.github.io/feroxbuster
package-manager:
  brew: feroxbuster
  nix: feroxbuster
  scoop: main/feroxbuster
  winget: epi052.feroxbuster
  zypper: feroxbuster
package-manager-url: https://formulae.brew.sh/formula/feroxbuster
version: 2.13.1
license: MIT
category: development
tags:
  - cli
description: Fast, simple, recursive content discovery tool written in Rust
source-archive: https://github.com/epi052/feroxbuster/archive/refs/tags/v2.13.1.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: feroxbuster
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:feroxbuster
  brew: brew install feroxbuster
  nix: nix profile install nixpkgs#feroxbuster
  scoop: scoop install main/feroxbuster
  winget: winget install --id epi052.feroxbuster -e
  zypper: sudo zypper install feroxbuster
provenance:
  formula: feroxbuster
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
