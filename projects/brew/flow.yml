id: brew:flow
display-name: flow
homepage: https://flow.org/
repo: https://github.com/facebook/flow
docs: https://flow.org/
package-manager:
  brew: flow
  macports: flow
  nix: flow
  scoop: main/flow
  winget: MadrasCheck.flow
package-manager-url: https://formulae.brew.sh/formula/flow
version: 0.314.0
license: MIT
category: development
tags:
  - cli
description: Static type checker for JavaScript
source-archive: https://github.com/facebook/flow/archive/refs/tags/v0.314.0.tar.gz
build-dependencies:
  - ocaml
  - opam
executables:
  - exposure: global executable
    kind: cli
    name: flow
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flow
  brew: brew install flow
  macports: sudo port install flow
  nix: nix profile install nixpkgs#flow
  scoop: scoop install main/flow
  winget: winget install --id MadrasCheck.flow -e
provenance:
  formula: flow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
