id: brew:galen
display-name: galen
homepage: https://galenframework.com/
repo: https://github.com/galenframework/galen
docs: https://galenframework.com/
package-manager:
  brew: galen
  nix: galen
package-manager-url: https://formulae.brew.sh/formula/galen
version: 2.4.4
license: Apache-2.0
category: development
tags:
  - cli
description: Automated testing of look and feel for responsive websites
source-archive: >
  https://github.com/galenframework/galen/releases/download/galen-2.4.4/galen-bin-2.4.4.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: galen
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:galen
  brew: brew install galen
  nix: nix profile install nixpkgs#galen
provenance:
  formula: galen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
