id: brew:buildifier
display-name: buildifier
homepage: https://github.com/bazelbuild/buildtools
repo: https://github.com/bazelbuild/buildtools
docs: https://github.com/bazelbuild/buildtools
package-manager:
  brew: buildifier
  nix: buildifier
package-manager-url: https://formulae.brew.sh/formula/buildifier
version: 8.5.1
license: Apache-2.0
category: development
tags:
  - cli
description: Format bazel BUILD files with a standard convention
source-archive: https://github.com/bazelbuild/buildtools/archive/refs/tags/v8.5.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: buildifier
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:buildifier
  brew: brew install buildifier
  nix: nix profile install nixpkgs#buildifier
provenance:
  formula: buildifier
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
