id: brew:libopenmpt
display-name: libopenmpt
homepage: https://lib.openmpt.org/libopenmpt/
repo: https://lib.openmpt.org/files/libopenmpt/src/libopenmpt-0.8.7+release.autotools.tar.gz
docs: https://lib.openmpt.org/libopenmpt/
package-manager:
  apk: libopenmpt
  brew: libopenmpt
  debian: openmpt123
  dnf: libopenmpt
  macports: libopenmpt
  nix: libopenmpt
  pacman: libopenmpt
  ubuntu: openmpt123
  zypper: openmpt123
package-manager-url: https://formulae.brew.sh/formula/libopenmpt
version: 0.8.7
license: BSD-3-Clause
category: network
tags:
  - cli
description: Software library to decode tracked music files
source-archive: https://lib.openmpt.org/files/libopenmpt/src/libopenmpt-0.8.7+release.autotools.tar.gz
dependencies:
  - flac
  - libogg
  - libsndfile
  - libvorbis
  - mpg123
  - portaudio
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: openmpt123
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libopenmpt
  av: sudo av install brew:libopenmpt
  brew: brew install libopenmpt
  debian: sudo apt install openmpt123
  dnf: sudo dnf install libopenmpt
  macports: sudo port install libopenmpt
  nix: nix profile install nixpkgs#libopenmpt
  pacman: sudo pacman -S libopenmpt
  ubuntu: sudo apt install openmpt123
  zypper: sudo zypper install openmpt123
provenance:
  formula: libopenmpt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
