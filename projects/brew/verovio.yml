id: brew:verovio
display-name: verovio
homepage: https://www.verovio.org
repo: https://github.com/rism-digital/verovio
docs: https://www.verovio.org
package-manager:
  apk: verovio
  brew: verovio
package-manager-url: https://formulae.brew.sh/formula/verovio
version: 6.2.1
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Command-line MEI music notation engraver
source-archive: https://github.com/rism-digital/verovio/archive/refs/tags/version-6.2.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: verovio
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add verovio
  av: sudo av install brew:verovio
  brew: brew install verovio
provenance:
  formula: verovio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
