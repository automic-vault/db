id: brew:votca
display-name: votca
homepage: https://www.votca.org/
repo: https://github.com/votca/votca
docs: https://www.votca.org/
package-manager:
  brew: votca
  debian: votca
  dnf: votca
  ubuntu: votca
  zypper: votca
package-manager-url: https://formulae.brew.sh/formula/votca
version: 2026
license: Apache-2.0
category: development
tags:
  - cli
description: Versatile Object-oriented Toolkit for Coarse-graining Applications
source-archive: https://github.com/votca/votca/archive/refs/tags/v2026.tar.gz
dependencies:
  - boost
  - eigen
  - fftw
  - gromacs
  - hdf5
  - libecpint
  - libint
  - libomp
  - libxc
build-dependencies:
  - cmake
  - pkgconf
  - python@3.14
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: csg_density
  - exposure: global executable
    kind: cli
    name: csg_dlptopol
  - exposure: global executable
    kind: cli
    name: csg_dump
  - exposure: global executable
    kind: cli
    name: csg_fluctuations
  - exposure: global executable
    kind: cli
    name: csg_fmatch
  - exposure: global executable
    kind: cli
    name: csg_gmxtopol
  - exposure: global executable
    kind: cli
    name: csg_imc_solve
  - exposure: global executable
    kind: cli
    name: csg_map
  - exposure: global executable
    kind: cli
    name: csg_orientcorr
  - exposure: global executable
    kind: cli
    name: csg_part_dist
  - exposure: global executable
    kind: cli
    name: csg_partial_rdf
  - exposure: global executable
    kind: cli
    name: csg_radii
  - exposure: global executable
    kind: cli
    name: csg_reupdate
  - exposure: global executable
    kind: cli
    name: csg_sphericalorder
  - exposure: global executable
    kind: cli
    name: csg_stat
  - exposure: global executable
    kind: cli
    name: csg_traj_force
  - exposure: global executable
    kind: cli
    name: xtp_map
  - exposure: global executable
    kind: cli
    name: xtp_parallel
  - exposure: global executable
    kind: cli
    name: xtp_run
  - exposure: global executable
    kind: cli
    name: xtp_tools
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:votca
  brew: brew install votca
  debian: sudo apt install votca
  dnf: sudo dnf install votca
  ubuntu: sudo apt install votca
  zypper: sudo zypper install votca
provenance:
  formula: votca
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
