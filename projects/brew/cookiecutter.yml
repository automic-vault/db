id: brew:cookiecutter
display-name: cookiecutter
homepage: https://github.com/cookiecutter/cookiecutter
repo: >
  https://files.pythonhosted.org/packages/92/03/f4c96d8fd4f5e8af0210bf896eb63927f35d3014a8e8f3bf9d2c43ad3332/cookiecutter-2.7.1.tar.gz
docs: https://github.com/cookiecutter/cookiecutter
package-manager:
