id: brew:rabbitmq-c
display-name: rabbitmq-c
homepage: https://github.com/alanxz/rabbitmq-c
repo: https://github.com/alanxz/rabbitmq-c
docs: https://github.com/alanxz/rabbitmq-c
package-manager:
  apk: rabbitmq-c
  brew: rabbitmq-c
  macports: rabbitmq-c
  nix: rabbitmq-c
package-manager-url: https://formulae.brew.sh/formula/rabbitmq-c
version: 0.15.0
license: MIT
category: development
tags:
  - cli
description: C AMQP client library for RabbitMQ
source-archive: https://github.com/alanxz/rabbitmq-c/archive/refs/tags/v0.15.0.tar.gz
dependencies:
  - openssl@3
  - popt
build-dependencies:
  - cmake
  - pkgconf
  - xmlto
executables:
  - exposure: global executable
    kind: cli
    name: amqp-consume
  - exposure: global executable
    kind: cli
    name: amqp-declare-queue
  - exposure: global executable
    kind: cli
    name: amqp-delete-queue
  - exposure: global executable
    kind: cli
    name: amqp-get
  - exposure: global executable
    kind: cli
    name: amqp-publish
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rabbitmq-c
  av: sudo av install brew:rabbitmq-c
  brew: brew install rabbitmq-c
  macports: sudo port install rabbitmq-c
  nix: nix profile install nixpkgs#rabbitmq-c
provenance:
  formula: rabbitmq-c
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
