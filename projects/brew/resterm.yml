id: brew:resterm
display-name: resterm
homepage: https://github.com/unkn0wn-root/resterm
repo: https://github.com/unkn0wn-root/resterm
docs: https://github.com/unkn0wn-root/resterm
package-manager:
  brew: resterm
  nix: resterm
  scoop: main/resterm
package-manager-url: https://formulae.brew.sh/formula/resterm
version: 0.39.5
license: Apache-2.0
category: development
tags:
  - cli
description: Terminal client for .http/.rest files with HTTP, GraphQL, and gRPC support
source-archive: https://github.com/unkn0wn-root/resterm/archive/refs/tags/v0.39.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: resterm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:resterm
  brew: brew install resterm
  nix: nix profile install nixpkgs#resterm
  scoop: scoop install main/resterm
provenance:
  formula: resterm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
