id: brew:goctl
display-name: goctl
homepage: https://go-zero.dev
repo: https://github.com/zeromicro/go-zero
docs: https://go-zero.dev
package-manager:
  brew: goctl
  nix: goctl
package-manager-url: https://formulae.brew.sh/formula/goctl
version: 1.10.1
license: MIT
category: development
tags:
  - cli
description: Generates server-side and client-side code for web and RPC services
source-archive: https://github.com/zeromicro/go-zero/archive/refs/tags/tools/goctl/v1.10.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:goctl
  brew: brew install goctl
  nix: nix profile install nixpkgs#goctl
provenance:
  formula: goctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
