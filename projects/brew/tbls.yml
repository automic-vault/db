id: brew:tbls
display-name: tbls
homepage: https://github.com/k1LoW/tbls
repo: https://github.com/k1LoW/tbls
docs: https://github.com/k1LoW/tbls
package-manager:
  brew: tbls
  macports: tbls
  nix: tbls
package-manager-url: https://formulae.brew.sh/formula/tbls
version: 1.94.5
license: MIT
category: database
tags:
  - cli
  - database
description: CI-Friendly tool to document a database
source-archive: https://github.com/k1LoW/tbls/archive/refs/tags/v1.94.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tbls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
