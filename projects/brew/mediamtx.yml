id: brew:mediamtx
display-name: mediamtx
homepage: https://github.com/bluenviron/mediamtx
repo: https://github.com/bluenviron/mediamtx
docs: https://github.com/bluenviron/mediamtx
package-manager:
  brew: mediamtx
  nix: mediamtx
  scoop: main/mediamtx
  winget: bluenviron.mediamtx
package-manager-url: https://formulae.brew.sh/formula/mediamtx
version: 1.18.2
license: MIT
category: development
tags:
  - cli
description: Zero-dependency real-time media server and media proxy
source-archive: https://github.com/bluenviron/mediamtx.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mediamtx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:mediamtx
  brew: brew install mediamtx
  nix: nix profile install nixpkgs#mediamtx
  scoop: scoop install main/mediamtx
  winget: winget install --id bluenviron.mediamtx -e
provenance:
  formula: mediamtx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
