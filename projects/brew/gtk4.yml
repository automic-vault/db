id: brew:gtk4
display-name: gtk4
homepage: https://gtk.org/
repo: https://download.gnome.org/sources/gtk/4.22/gtk-4.22.4.tar.xz
docs: https://gtk.org/
package-manager:
  brew: gtk4
  dnf: gtk4
  macports: gtk4
  nix: gtk4
  pacman: gtk4
package-manager-url: https://formulae.brew.sh/formula/gtk4
version: 4.22.4
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Toolkit for creating graphical user interfaces
source-archive: https://download.gnome.org/sources/gtk/4.22/gtk-4.22.4.tar.xz
dependencies:
  - cairo
  - fontconfig
  - fribidi
  - gdk-pixbuf
  - gettext
  - glib
  - graphene
  - harfbuzz
  - hicolor-icon-theme
  - jpeg-turbo
  - libepoxy
  - libpng
  - librsvg
  - libtiff
  - pango
build-dependencies:
  - dart-sass
  - docbook
  - docbook-xsl
  - docutils
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - cups
executables:
  - exposure: global executable
    kind: cli
    name: gtk4-builder-tool
  - exposure: global executable
    kind: cli
    name: gtk4-demo
  - exposure: global executable
    kind: cli
    name: gtk4-demo-application
  - exposure: global executable
    kind: cli
    name: gtk4-encode-symbolic-svg
  - exposure: global executable
    kind: cli
    name: gtk4-icon-editor
  - exposure: global executable
    kind: cli
    name: gtk4-image-tool
  - exposure: global executable
    kind: cli
    name: gtk4-launch
  - exposure: global executable
    kind: cli
    name: gtk4-node-editor
  - exposure: global executable
    kind: cli
    name: gtk4-path-tool
  - exposure: global executable
    kind: cli
    name: gtk4-print-editor
  - exposure: global executable
    kind: cli
    name: gtk4-query-settings
  - exposure: global executable
    kind: cli
    name: gtk4-rendernode-tool
  - exposure: global executable
    kind: cli
    name: gtk4-update-icon-cache
  - exposure: global executable
    kind: cli
    name: gtk4-widget-factory
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:gtk4
  brew: brew install gtk4
  dnf: sudo dnf install gtk4
  macports: sudo port install gtk4
  nix: nix profile install nixpkgs#gtk4
  pacman: sudo pacman -S gtk4
provenance:
  formula: gtk4
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
