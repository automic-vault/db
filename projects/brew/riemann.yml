id: brew:riemann
display-name: riemann
homepage: https://riemann.io/
repo: https://github.com/riemann/riemann
docs: https://riemann.io/
package-manager:
  brew: riemann
  nix: riemann
package-manager-url: https://formulae.brew.sh/formula/riemann
version: 0.3.12
license: EPL-1.0
category: development
tags:
  - cli
description: Event stream processor
source-archive: https://github.com/riemann/riemann/releases/download/0.3.12/riemann-0.3.12.tar.bz2
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: riemann
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'You may also wish to install these Ruby gems: riemann-client riemann-tools riemann-dash'
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:riemann
  brew: brew install riemann
  nix: nix profile install nixpkgs#riemann
provenance:
  formula: riemann
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
