id: brew:owfs
display-name: owfs
homepage: https://owfs.org/
repo: https://github.com/owfs/owfs
docs: https://owfs.org/
package-manager:
  apk: owfs
  brew: owfs
  debian: owfs
  ubuntu: owfs
package-manager-url: https://formulae.brew.sh/formula/owfs
version: 3.2p4
license: GPL-2.0-only
category: development
tags:
  - cli
description: Monitor and control physical environment using Dallas/Maxim 1-wire system
source-archive: https://github.com/owfs/owfs/releases/download/v3.2p4/owfs-3.2p4.tar.gz
dependencies:
  - libftdi
  - libusb
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: owdir
  - exposure: global executable
    kind: cli
    name: owexist
  - exposure: global executable
    kind: cli
    name: owexternal
  - exposure: global executable
    kind: cli
    name: owftpd
  - exposure: global executable
    kind: cli
    name: owget
  - exposure: global executable
    kind: cli
    name: owhttpd
  - exposure: global executable
    kind: cli
    name: owmon
  - exposure: global executable
    kind: cli
    name: owpresent
  - exposure: global executable
    kind: cli
    name: owread
  - exposure: global executable
    kind: cli
    name: owserver
  - exposure: global executable
    kind: cli
    name: owtap
  - exposure: global executable
    kind: cli
    name: owusbprobe
  - exposure: global executable
    kind: cli
    name: owwrite
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add owfs
  av: sudo av install brew:owfs
  brew: brew install owfs
  debian: sudo apt install owfs
  ubuntu: sudo apt install owfs
provenance:
  formula: owfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
