id: brew:fleet-cli
display-name: fleet-cli
homepage: https://github.com/rancher/fleet
repo: https://github.com/rancher/fleet
docs: https://github.com/rancher/fleet
package-manager:
  brew: fleet-cli
  nix: fleet
  zypper: fleet-cli
package-manager-url: https://formulae.brew.sh/formula/fleet-cli
version: 0.15.2
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Manage large fleets of Kubernetes clusters
source-archive: https://github.com/rancher/fleet/archive/refs/tags/v0.15.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fleet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fleet-cli
  brew: brew install fleet-cli
  nix: nix profile install nixpkgs#fleet
  zypper: sudo zypper install fleet-cli
provenance:
  formula: fleet-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
