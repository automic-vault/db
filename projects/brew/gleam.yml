id: brew:gleam
display-name: gleam
homepage: https://gleam.run
repo: https://github.com/gleam-lang/gleam
docs: https://gleam.run
package-manager:
  apk: gleam
  brew: gleam
  macports: gleam
  nix: gleam
  pacman: gleam
  scoop: main/gleam
  winget: Gleam.Gleam
  zypper: gleam
package-manager-url: https://formulae.brew.sh/formula/gleam
version: 1.16.0
license: Apache-2.0
category: development
tags:
  - cli
description: Statically typed language for the Erlang VM
source-archive: https://github.com/gleam-lang/gleam/archive/refs/tags/v1.16.0.tar.gz
dependencies:
  - erlang
  - rebar3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gleam
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gleam
  av: sudo av install brew:gleam
  brew: brew install gleam
  macports: sudo port install gleam
  nix: nix profile install nixpkgs#gleam
  pacman: sudo pacman -S gleam
  scoop: scoop install main/gleam
  winget: winget install --id Gleam.Gleam -e
  zypper: sudo zypper install gleam
provenance:
  formula: gleam
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
