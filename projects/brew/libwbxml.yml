id: brew:libwbxml
display-name: libwbxml
homepage: https://github.com/libwbxml/libwbxml
repo: https://github.com/libwbxml/libwbxml
docs: https://github.com/libwbxml/libwbxml
package-manager:
  apk: libwbxml
  brew: libwbxml
  dnf: libwbxml
  nix: libwbxml
package-manager-url: https://formulae.brew.sh/formula/libwbxml
version: 0.11.10
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Library and tools to parse and encode WBXML documents
source-archive: https://github.com/libwbxml/libwbxml/archive/refs/tags/libwbxml-0.11.10.tar.gz
dependencies:
  - wget
build-dependencies:
  - cmake
  - doxygen
  - graphviz
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: wbxml2xml
  - exposure: global executable
    kind: cli
    name: xml2wbxml
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libwbxml
  av: sudo av install brew:libwbxml
  brew: brew install libwbxml
  dnf: sudo dnf install libwbxml
  nix: nix profile install nixpkgs#libwbxml
provenance:
  formula: libwbxml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
