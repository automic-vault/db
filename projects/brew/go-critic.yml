id: brew:go-critic
display-name: go-critic
homepage: https://go-critic.com
repo: https://github.com/go-critic/go-critic
docs: https://go-critic.com
package-manager:
  brew: go-critic
  macports: go-critic
  nix: go-critic
package-manager-url: https://formulae.brew.sh/formula/go-critic
version: 0.14.3
license: MIT
category: development
tags:
  - cli
description: Opinionated Go source code linter
source-archive: https://github.com/go-critic/go-critic/archive/refs/tags/v0.14.3.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gocritic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:go-critic
  brew: brew install go-critic
  macports: sudo port install go-critic
  nix: nix profile install nixpkgs#go-critic
provenance:
  formula: go-critic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
