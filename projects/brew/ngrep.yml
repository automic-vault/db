id: brew:ngrep
display-name: ngrep
homepage: https://github.com/jpr5/ngrep
repo: https://github.com/jpr5/ngrep
docs: https://github.com/jpr5/ngrep
package-manager:
  apk: ngrep
  brew: ngrep
  debian: ngrep
  dnf: ngrep
  macports: ngrep
  nix: ngrep
  pacman: ngrep
  ubuntu: ngrep
  zypper: ngrep
package-manager-url: https://formulae.brew.sh/formula/ngrep
version: 1.49.0
license: ngrep
category: development
tags:
  - cli
description: Network grep
source-archive: https://github.com/jpr5/ngrep/archive/refs/tags/v1.49.0.tar.gz
dependencies:
  - libpcap
  - pcre2
executables:
  - exposure: global executable
    kind: cli
    name: ngrep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ngrep
  av: sudo av install brew:ngrep
  brew: brew install ngrep
  debian: sudo apt install ngrep
  dnf: sudo dnf install ngrep
  macports: sudo port install ngrep
  nix: nix profile install nixpkgs#ngrep
  pacman: sudo pacman -S ngrep
  ubuntu: sudo apt install ngrep
  zypper: sudo zypper install ngrep
provenance:
  formula: ngrep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
