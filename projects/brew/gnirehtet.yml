id: brew:gnirehtet
display-name: gnirehtet
homepage: https://github.com/Genymobile/gnirehtet
repo: https://github.com/Genymobile/gnirehtet
docs: https://github.com/Genymobile/gnirehtet
package-manager:
  brew: gnirehtet
  nix: gnirehtet
  scoop: main/gnirehtet
package-manager-url: https://formulae.brew.sh/formula/gnirehtet
version: 2.5.1
license: Apache-2.0
category: development
tags:
  - cli
description: Reverse tethering tool for Android
source-archive: https://github.com/Genymobile/gnirehtet/archive/refs/tags/v2.5.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gnirehtet
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    At runtime, adb must be accessible from your PATH. You can install adb from Homebrew
    Cask: brew install --cask android-platform-tools
  post-install-defined: false
install-lines:
  av: sudo av install brew:gnirehtet
  brew: brew install gnirehtet
  nix: nix profile install nixpkgs#gnirehtet
  scoop: scoop install main/gnirehtet
provenance:
  formula: gnirehtet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
