id: brew:goclone
display-name: goclone
homepage: https://github.com/goclone-dev/goclone
repo: https://github.com/goclone-dev/goclone
docs: https://github.com/goclone-dev/goclone
package-manager:
  brew: goclone
package-manager-url: https://formulae.brew.sh/formula/goclone
version: 1.2.2
license: MIT
category: development
tags:
  - cli
description: Website Cloner
source-archive: https://github.com/goclone-dev/goclone/archive/refs/tags/v1.2.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goclone
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:goclone
  brew: brew install goclone
provenance:
  formula: goclone
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
