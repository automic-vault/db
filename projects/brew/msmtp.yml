id: brew:msmtp
display-name: msmtp
homepage: https://marlam.de/msmtp/
repo: https://marlam.de/msmtp/releases/msmtp-1.8.32.tar.xz
docs: https://marlam.de/msmtp/
package-manager:
  apk: msmtp
  brew: msmtp
  debian: msmtp
  dnf: msmtp
  macports: msmtp
  nix: msmtp
  pacman: msmtp
  ubuntu: msmtp
  zypper: msmtp
package-manager-url: https://formulae.brew.sh/formula/msmtp
version: 1.8.32
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: SMTP client that can be used as an SMTP plugin for Mutt
source-archive: https://marlam.de/msmtp/releases/msmtp-1.8.32.tar.xz
dependencies:
  - gettext
  - gnutls
  - libidn2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: msmtp
  - exposure: global executable
    kind: cli
    name: msmtpd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add msmtp
  av: sudo av install brew:msmtp
  brew: brew install msmtp
  debian: sudo apt install msmtp
  dnf: sudo dnf install msmtp
  macports: sudo port install msmtp
  nix: nix profile install nixpkgs#msmtp
  pacman: sudo pacman -S msmtp
  ubuntu: sudo apt install msmtp
  zypper: sudo zypper install msmtp
provenance:
  formula: msmtp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
