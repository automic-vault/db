id: brew:gdrive-downloader
display-name: gdrive-downloader
homepage: https://github.com/Akianonymus/gdrive-downloader
repo: https://github.com/Akianonymus/gdrive-downloader
docs: https://github.com/Akianonymus/gdrive-downloader
package-manager:
  brew: gdrive-downloader
  dnf: gdl
  macports: gdl
  nix: gdl
package-manager-url: https://formulae.brew.sh/formula/gdrive-downloader
version: 2.0
license: Unlicense
category: development
tags:
  - cli
description: Download a gdrive folder or file easily, shell ftw
source-archive: https://github.com/Akianonymus/gdrive-downloader/archive/refs/tags/v2.0.tar.gz
dependencies:
  - bash
executables:
  - exposure: global executable
    kind: cli
    name: gdl
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gdrive-downloader
  brew: brew install gdrive-downloader
  dnf: sudo dnf install gdl
  macports: sudo port install gdl
  nix: nix profile install nixpkgs#gdl
provenance:
  formula: gdrive-downloader
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
