id: brew:wzprof
display-name: wzprof
homepage: https://github.com/dispatchrun/wzprof
repo: https://github.com/dispatchrun/wzprof
docs: https://github.com/dispatchrun/wzprof
package-manager:
  brew: wzprof
package-manager-url: https://formulae.brew.sh/formula/wzprof
version: 0.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: Profiling for Wazero
source-archive: https://github.com/dispatchrun/wzprof/archive/refs/tags/v0.2.0.tar.gz
build-dependencies:
