id: brew:custom-install
display-name: custom-install
homepage: https://github.com/ihaveamac/custom-install
repo: https://github.com/ihaveamac/custom-install
docs: https://github.com/ihaveamac/custom-install
package-manager:
  brew: custom-install
package-manager-url: https://formulae.brew.sh/formula/custom-install
version: 2.1
license: MIT
category: development
tags:
  - cli
description: Install CIA files directly to Nintendo 3DS SD card
source-archive: https://github.com/ihaveamac/custom-install/archive/refs/tags/v2.1.tar.gz
dependencies:
  - python@3.14
  - save3ds_fuse
executables:
  - exposure: global executable
    kind: cli
    name: custom-install
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:custom-install
  brew: brew install custom-install
provenance:
  formula: custom-install
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
