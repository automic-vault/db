id: brew:ox
display-name: ox
homepage: https://github.com/curlpipe/ox
repo: https://github.com/curlpipe/ox
docs: https://github.com/curlpipe/ox
package-manager:
  brew: ox
  macports: ox
  nix: ox
  winget: curlpipe.ox
package-manager-url: https://formulae.brew.sh/formula/ox
version: 0.7.7
license: GPL-2.0-only
category: development
tags:
  - cli
description: Independent Rust text editor that runs in your terminal
source-archive: https://github.com/curlpipe/ox/archive/refs/tags/0.7.7.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ox
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ox
  brew: brew install ox
  macports: sudo port install ox
  nix: nix profile install nixpkgs#ox
  winget: winget install --id curlpipe.ox -e
provenance:
  formula: ox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
