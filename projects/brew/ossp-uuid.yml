id: brew:ossp-uuid
display-name: ossp-uuid
homepage: http://www.ossp.org/pkg/lib/uuid/
repo: https://deb.debian.org/debian/pool/main/o/ossp-uuid/ossp-uuid_1.6.2.orig.tar.gz
docs: http://www.ossp.org/pkg/lib/uuid/
package-manager:
  apk: ossp-uuid
  brew: ossp-uuid
  debian: uuid
  dnf: uuid
  macports: ossp-uuid
  ubuntu: uuid
  zypper: ossp-uuid
package-manager-url: https://formulae.brew.sh/formula/ossp-uuid
version: 1.6.2
license: BSD-1-Clause
category: network
tags:
  - cli
description: ISO-C API and CLI for generating UUIDs
source-archive: https://deb.debian.org/debian/pool/main/o/ossp-uuid/ossp-uuid_1.6.2.orig.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: uuid
  - exposure: global executable
    kind: cli
    name: uuid-config
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ossp-uuid
  av: sudo av install brew:ossp-uuid
  brew: brew install ossp-uuid
  debian: sudo apt install uuid
  dnf: sudo dnf install uuid
  macports: sudo port install ossp-uuid
  ubuntu: sudo apt install uuid
  zypper: sudo zypper install ossp-uuid
provenance:
  formula: ossp-uuid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
