id: brew:arttime
display-name: arttime
homepage: https://github.com/poetaman/arttime
repo: https://github.com/poetaman/arttime
docs: https://github.com/poetaman/arttime
package-manager:
  brew: arttime
package-manager-url: https://formulae.brew.sh/formula/arttime
version: 2.4.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Clock, timer, time manager and ASCII+ text-art viewer for the terminal
source-archive: https://github.com/poetaman/arttime/archive/refs/tags/v2.4.0.tar.gz
dependencies:
  - fzf
executables:
  - exposure: global executable
    kind: cli
    name: artprint
  - exposure: global executable
    kind: cli
    name: arttime
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:arttime
  brew: brew install arttime
provenance:
  formula: arttime
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
