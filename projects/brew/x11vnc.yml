id: brew:x11vnc
display-name: x11vnc
homepage: https://github.com/LibVNC/x11vnc
repo: https://github.com/LibVNC/x11vnc
docs: https://github.com/LibVNC/x11vnc
package-manager:
  apk: x11vnc
  brew: x11vnc
  debian: x11vnc
  dnf: x11vnc
  nix: x11vnc
  pacman: x11vnc
  ubuntu: x11vnc
  zypper: x11vnc
package-manager-url: https://formulae.brew.sh/formula/x11vnc
version: 0.9.17
license: GPL-2.0-or-later WITH x11vnc-openssl-exception
category: development
tags:
  - cli
description: VNC server for real X displays
source-archive: https://github.com/LibVNC/x11vnc/archive/refs/tags/0.9.17.tar.gz
dependencies:
  - libvncserver
  - openssl@4
build-dependencies:
  - autoconf
  - automake
  - pkgconf
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: x11vnc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add x11vnc
  av: sudo av install brew:x11vnc
  brew: brew install x11vnc
  debian: sudo apt install x11vnc
  dnf: sudo dnf install x11vnc
  nix: nix profile install nixpkgs#x11vnc
  pacman: sudo pacman -S x11vnc
  ubuntu: sudo apt install x11vnc
  zypper: sudo zypper install x11vnc
provenance:
  formula: x11vnc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
