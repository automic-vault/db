id: brew:soapyremote
display-name: soapyremote
homepage: https://github.com/pothosware/SoapyRemote/wiki
repo: https://github.com/pothosware/SoapyRemote
docs: https://github.com/pothosware/SoapyRemote/wiki
package-manager:
  brew: soapyremote
  macports: SoapyRemote
  nix: soapyremote
  pacman: soapyremote
package-manager-url: https://formulae.brew.sh/formula/soapyremote
version: 0.5.2
license: BSL-1.0
category: development
tags:
  - cli
description: Use any Soapy SDR remotely
source-archive: https://github.com/pothosware/SoapyRemote/archive/refs/tags/soapy-remote-0.5.2.tar.gz
dependencies:
  - soapysdr
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: SoapySDRServer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:soapyremote
  brew: brew install soapyremote
  macports: sudo port install SoapyRemote
  nix: nix profile install nixpkgs#soapyremote
  pacman: sudo pacman -S soapyremote
provenance:
  formula: soapyremote
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
