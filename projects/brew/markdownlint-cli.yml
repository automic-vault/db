id: brew:markdownlint-cli
display-name: markdownlint-cli
homepage: https://github.com/igorshubovych/markdownlint-cli
repo: https://registry.npmjs.org/markdownlint-cli/-/markdownlint-cli-0.48.0.tgz
docs: https://github.com/igorshubovych/markdownlint-cli
package-manager:
  brew: markdownlint-cli
  chocolatey: markdownlint-cli
  debian: markdownlint
  nix: markdownlint-cli
  pacman: markdownlint-cli
  scoop: extras/.markdownlint
  ubuntu: markdownlint
package-manager-url: https://formulae.brew.sh/formula/markdownlint-cli
version: 0.48.0
license: MIT
category: development
tags:
  - cli
description: CLI for Node.js style checker and lint tool for Markdown files
source-archive: https://registry.npmjs.org/markdownlint-cli/-/markdownlint-cli-0.48.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: markdownlint
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:markdownlint-cli
  brew: brew install markdownlint-cli
  chocolatey: choco install markdownlint-cli
  debian: sudo apt install markdownlint
  nix: nix profile install nixpkgs#markdownlint-cli
  pacman: sudo pacman -S markdownlint-cli
  scoop: scoop install extras/.markdownlint
  ubuntu: sudo apt install markdownlint
provenance:
  formula: markdownlint-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
