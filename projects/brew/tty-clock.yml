id: brew:tty-clock
display-name: tty-clock
homepage: https://github.com/xorg62/tty-clock
repo: https://github.com/xorg62/tty-clock
docs: https://github.com/xorg62/tty-clock
package-manager:
  apk: tty-clock
  brew: tty-clock
  debian: tty-clock
  nix: tty-clock
  ubuntu: tty-clock
package-manager-url: https://formulae.brew.sh/formula/tty-clock
version: 2.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: Digital clock in ncurses
source-archive: https://github.com/xorg62/tty-clock/archive/refs/tags/v2.3.tar.gz
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: tty-clock
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tty-clock
  av: sudo av install brew:tty-clock
  brew: brew install tty-clock
  debian: sudo apt install tty-clock
  nix: nix profile install nixpkgs#tty-clock
  ubuntu: sudo apt install tty-clock
provenance:
  formula: tty-clock
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
