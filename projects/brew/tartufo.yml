id: brew:tartufo
display-name: tartufo
homepage: https://tartufo.readthedocs.io/en/stable/
repo: https://github.com/godaddy/tartufo
docs: https://tartufo.readthedocs.io/en/stable/
package-manager:
  brew: tartufo
  nix: tartufo
package-manager-url: https://formulae.brew.sh/formula/tartufo
version: 6.0.0
license: GPL-2.0-only
category: security
tags:
  - cli
  - git
description: Searches through git repositories for high entropy strings and secrets
source-archive: https://github.com/godaddy/tartufo/archive/refs/tags/v6.0.0.tar.gz
dependencies:
  - pygit2
  - python@3.14
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: tartufo
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tartufo
  brew: brew install tartufo
  nix: nix profile install nixpkgs#tartufo
provenance:
  formula: tartufo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
