id: brew:ecflow-ui
display-name: ecflow-ui
homepage: https://ecflow.readthedocs.io
repo: https://confluence.ecmwf.int/download/attachments/8650755/ecFlow-5.16.0-Source.tar.gz
docs: https://ecflow.readthedocs.io
package-manager:
  brew: ecflow-ui
  debian: ecflow-client
  ubuntu: ecflow-client
package-manager-url: https://formulae.brew.sh/formula/ecflow-ui
version: 5.16.0
license: Apache-2.0
category: network
tags:
  - cli
description: User interface for client/server workflow package
source-archive: https://confluence.ecmwf.int/download/attachments/8650755/ecFlow-5.16.0-Source.tar.gz
dependencies:
  - openssl@3
  - qt5compat
  - qtbase
  - qtcharts
  - qtsvg
build-dependencies:
  - boost
  - cmake
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: ecflow_client
  - exposure: global executable
    kind: cli
    name: ecflow_ui
  - exposure: global executable
    kind: cli
    name: ecflow_ui.x
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ecflow-ui
  brew: brew install ecflow-ui
  debian: sudo apt install ecflow-client
  ubuntu: sudo apt install ecflow-client
provenance:
  formula: ecflow-ui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
