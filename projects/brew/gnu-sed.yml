id: brew:gnu-sed
display-name: gnu-sed
homepage: https://www.gnu.org/software/sed/
repo: https://ftpmirror.gnu.org/gnu/sed/sed-4.10.tar.xz
docs: https://www.gnu.org/software/sed/
package-manager:
  apk: sed
  brew: gnu-sed
  chocolatey: sed
  debian: sed
  dnf: sed
  pacman: sed
  scoop: main/sed
  ubuntu: sed
  winget: mbuilov.sed
  zypper: sed
package-manager-url: https://formulae.brew.sh/formula/gnu-sed
version: 4.10
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU implementation of the famous stream editor
source-archive: https://ftpmirror.gnu.org/gnu/sed/sed-4.10.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: sed
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    GNU "sed" has been installed as "gsed". If you need to use it as "sed", you can add
    a "gnubin" directory to your PATH from your bashrc like:
    PATH="$HOMEBREW_PREFIX/opt/gnu-sed/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add sed
  av: sudo av install brew:gnu-sed
  brew: brew install gnu-sed
  chocolatey: choco install sed
  debian: sudo apt install sed
  dnf: sudo dnf install sed
  pacman: sudo pacman -S sed
  scoop: scoop install main/sed
  ubuntu: sudo apt install sed
  winget: winget install --id mbuilov.sed -e
  zypper: sudo zypper install sed
provenance:
  formula: gnu-sed
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
