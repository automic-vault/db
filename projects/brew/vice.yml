id: brew:vice
display-name: vice
homepage: https://sourceforge.net/projects/vice-emu/
repo: https://downloads.sourceforge.net/project/vice-emu/releases/vice-3.10.tar.gz
docs: https://sourceforge.net/projects/vice-emu/
package-manager:
  apk: vice
  brew: vice
  debian: vice
  nix: vice
  pacman: vice
  ubuntu: vice
  winget: VICE-Team.VICE.GTK3
package-manager-url: https://formulae.brew.sh/formula/vice
version: 3.10
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Versatile Commodore Emulator
source-archive: https://downloads.sourceforge.net/project/vice-emu/releases/vice-3.10.tar.gz
dependencies:
  - adwaita-icon-theme
  - at-spi2-core
  - cairo
  - flac
  - gdk-pixbuf
  - gettext
  - giflib
  - glew
  - glib
  - gtk+3
  - harfbuzz
  - libogg
  - libpng
  - libvorbis
  - pango
build-dependencies:
  - autoconf
  - automake
  - dos2unix
  - pkgconf
  - texinfo
  - xa
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: c1541
  - exposure: global executable
    kind: cli
    name: cartconv
  - exposure: global executable
    kind: cli
    name: petcat
  - exposure: global executable
    kind: cli
    name: vsid
  - exposure: global executable
    kind: cli
    name: x128
  - exposure: global executable
    kind: cli
    name: x64
  - exposure: global executable
    kind: cli
    name: x64dtv
  - exposure: global executable
    kind: cli
    name: x64sc
  - exposure: global executable
    kind: cli
    name: xcbm2
  - exposure: global executable
    kind: cli
    name: xcbm5x0
  - exposure: global executable
    kind: cli
    name: xpet
  - exposure: global executable
    kind: cli
    name: xplus4
  - exposure: global executable
    kind: cli
    name: xscpu64
  - exposure: global executable
    kind: cli
    name: xvic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vice
  av: sudo av install brew:vice
  brew: brew install vice
  debian: sudo apt install vice
  nix: nix profile install nixpkgs#vice
  pacman: sudo pacman -S vice
  ubuntu: sudo apt install vice
  winget: winget install --id VICE-Team.VICE.GTK3 -e
provenance:
  formula: vice
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
