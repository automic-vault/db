id: brew:ejdb
display-name: ejdb
homepage: https://ejdb.org
repo: https://github.com/Softmotions/ejdb
docs: https://ejdb.org
package-manager:
  brew: ejdb
  chocolatey: jbs
package-manager-url: https://formulae.brew.sh/formula/ejdb
version: 2.73
license: MIT
category: database
tags:
  - cli
  - database
  - json
description: Embeddable JSON Database engine C11 library
source-archive: https://github.com/Softmotions/ejdb.git
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: jbs
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ejdb
  brew: brew install ejdb
  chocolatey: choco install jbs
provenance:
  formula: ejdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
