id: brew:bup
display-name: bup
homepage: https://bup.github.io/
repo: https://github.com/bup/bup
docs: https://bup.github.io/
package-manager:
  brew: bup
  debian: bup
  nix: bup
  pacman: bup
  ubuntu: bup
  zypper: bup
package-manager-url: https://formulae.brew.sh/formula/bup
version: 0.33.10
license: BSD-2-Clause AND LGPL-2.0-only
category: development
tags:
  - cli
description: Backup tool
source-archive: https://github.com/bup/bup/archive/refs/tags/0.33.10.tar.gz
dependencies:
  - python@3.14
  - readline
build-dependencies:
  - pandoc
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: bup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bup
  brew: brew install bup
  debian: sudo apt install bup
  nix: nix profile install nixpkgs#bup
  pacman: sudo pacman -S bup
  ubuntu: sudo apt install bup
  zypper: sudo zypper install bup
provenance:
  formula: bup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
