id: brew:mp4ff
display-name: mp4ff
homepage: https://github.com/Eyevinn/mp4ff
repo: https://github.com/Eyevinn/mp4ff
docs: https://github.com/Eyevinn/mp4ff
package-manager:
  brew: mp4ff
  macports: mp4ff
package-manager-url: https://formulae.brew.sh/formula/mp4ff
version: 0.52.0
license: MIT
category: development
tags:
  - cli
description: Tools for parsing and manipulating MP4/ISOBMFF files
source-archive: https://github.com/Eyevinn/mp4ff/archive/refs/tags/v0.52.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mp4ff-crop
  - exposure: global executable
    kind: cli
    name: mp4ff-decrypt
  - exposure: global executable
    kind: cli
    name: mp4ff-encrypt
  - exposure: global executable
    kind: cli
    name: mp4ff-info
  - exposure: global executable
    kind: cli
    name: mp4ff-nallister
  - exposure: global executable
    kind: cli
    name: mp4ff-pslister
  - exposure: global executable
    kind: cli
    name: mp4ff-subslister
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mp4ff
  brew: brew install mp4ff
  macports: sudo port install mp4ff
provenance:
  formula: mp4ff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
