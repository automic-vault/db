id: brew:jwt-cli
display-name: jwt-cli
homepage: https://github.com/mike-engel/jwt-cli
repo: https://github.com/mike-engel/jwt-cli
docs: https://github.com/mike-engel/jwt-cli
package-manager:
  apk: jwt-cli
  brew: jwt-cli
  debian: jwt
  macports: jwt-cli
  nix: jwt-cli
  pacman: jwt-cli
  scoop: main/jwt-cli
  ubuntu: jwt
package-manager-url: https://formulae.brew.sh/formula/jwt-cli
version: 6.2.0
license: MIT
category: development
tags:
  - cli
description: Super fast CLI tool to decode and encode JWTs built in Rust
source-archive: https://github.com/mike-engel/jwt-cli/archive/refs/tags/6.2.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: jwt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jwt-cli
  av: sudo av install brew:jwt-cli
  brew: brew install jwt-cli
  debian: sudo apt install jwt
  macports: sudo port install jwt-cli
  nix: nix profile install nixpkgs#jwt-cli
  pacman: sudo pacman -S jwt-cli
  scoop: scoop install main/jwt-cli
  ubuntu: sudo apt install jwt
provenance:
  formula: jwt-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
