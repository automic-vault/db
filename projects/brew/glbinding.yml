id: brew:glbinding
display-name: glbinding
homepage: https://glbinding.org/
repo: https://github.com/cginternals/glbinding
docs: https://glbinding.org/
package-manager:
  brew: glbinding
  nix: glbinding
  pacman: glbinding
package-manager-url: https://formulae.brew.sh/formula/glbinding
version: 3.5.0
license: MIT
category: development
tags:
  - cli
description: C++ binding for the OpenGL API
source-archive: https://github.com/cginternals/glbinding/archive/refs/tags/v3.5.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: glbinding-glmeta
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:glbinding
  brew: brew install glbinding
  nix: nix profile install nixpkgs#glbinding
  pacman: sudo pacman -S glbinding
provenance:
  formula: glbinding
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
