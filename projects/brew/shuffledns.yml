id: brew:shuffledns
display-name: shuffledns
homepage: https://github.com/projectdiscovery/shuffledns
repo: https://github.com/projectdiscovery/shuffledns
docs: https://github.com/projectdiscovery/shuffledns
package-manager:
  brew: shuffledns
  nix: shuffledns
package-manager-url: https://formulae.brew.sh/formula/shuffledns
version: 1.2.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Enumerate subdomains using active bruteforce & resolve subdomains with wildcards
source-archive: https://github.com/projectdiscovery/shuffledns/archive/refs/tags/v1.2.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: shuffledns
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:shuffledns
  brew: brew install shuffledns
  nix: nix profile install nixpkgs#shuffledns
provenance:
  formula: shuffledns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
