id: brew:umockdev
display-name: umockdev
homepage: https://github.com/martinpitt/umockdev
repo: https://github.com/martinpitt/umockdev
docs: https://github.com/martinpitt/umockdev
package-manager:
  apk: umockdev
  brew: umockdev
  debian: umockdev
  dnf: umockdev
  nix: umockdev
  pacman: umockdev
  ubuntu: umockdev
  zypper: umockdev
package-manager-url: https://formulae.brew.sh/formula/umockdev
version: 0.19.7
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Mock hardware devices for creating unit tests and bug reporting
source-archive: https://github.com/martinpitt/umockdev/releases/download/0.19.7/umockdev-0.19.7.tar.xz
dependencies:
  - glib
  - libpcap
  - systemd
build-dependencies:
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: umockdev-record
  - exposure: global executable
    kind: cli
    name: umockdev-run
  - exposure: global executable
    kind: cli
    name: umockdev-wrapper
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add umockdev
  av: sudo av install brew:umockdev
  brew: brew install umockdev
  debian: sudo apt install umockdev
  dnf: sudo dnf install umockdev
  nix: nix profile install nixpkgs#umockdev
  pacman: sudo pacman -S umockdev
  ubuntu: sudo apt install umockdev
  zypper: sudo zypper install umockdev
provenance:
  formula: umockdev
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
