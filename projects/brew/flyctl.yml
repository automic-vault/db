id: brew:flyctl
display-name: flyctl
homepage: https://fly.io
repo: https://github.com/superfly/flyctl
docs: https://fly.io
package-manager:
  brew: flyctl
  chocolatey: flyctl
  macports: flyctl
  nix: flyctl
  scoop: main/flyctl
  winget: Fly-io.flyctl
  zypper: fly
package-manager-url: https://formulae.brew.sh/formula/flyctl
version: 0.4.56
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tools for fly.io services
source-archive: https://github.com/superfly/flyctl.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fly
  - exposure: global executable
    kind: cli
    name: flyctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flyctl
  brew: brew install flyctl
  chocolatey: choco install flyctl
  macports: sudo port install flyctl
  nix: nix profile install nixpkgs#flyctl
  scoop: scoop install main/flyctl
  winget: winget install --id Fly-io.flyctl -e
  zypper: sudo zypper install fly
provenance:
  formula: flyctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
