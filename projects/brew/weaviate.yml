id: brew:weaviate
display-name: weaviate
homepage: https://weaviate.io/developers/weaviate/
repo: https://github.com/weaviate/weaviate
docs: https://weaviate.io/developers/weaviate/
package-manager:
  brew: weaviate
  nix: weaviate
package-manager-url: https://formulae.brew.sh/formula/weaviate
version: 1.37.5
license: BSD-3-Clause
category: database
tags:
  - cli
  - database
description: Open-source vector database that stores both objects and vectors
source-archive: https://github.com/weaviate/weaviate/archive/refs/tags/v1.37.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: weaviate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:weaviate
  brew: brew install weaviate
  nix: nix profile install nixpkgs#weaviate
provenance:
  formula: weaviate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
