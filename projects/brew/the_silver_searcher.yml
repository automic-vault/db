id: brew:the_silver_searcher
display-name: the_silver_searcher
homepage: https://geoff.greer.fm/ag/
repo: https://github.com/ggreer/the_silver_searcher
docs: https://geoff.greer.fm/ag/
package-manager:
  apk: the_silver_searcher
  brew: the_silver_searcher
  chocolatey: ag
  dnf: the_silver_searcher
  macports: the_silver_searcher
  pacman: the_silver_searcher
  scoop: main/ag
  winget: JFLarvoire.Ag
package-manager-url: https://formulae.brew.sh/formula/the_silver_searcher
version: 2.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: Code-search similar to ack
source-archive: https://github.com/ggreer/the_silver_searcher/archive/refs/tags/2.2.0.tar.gz
dependencies:
  - pcre2
  - xz
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ag
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add the_silver_searcher
  av: sudo av install brew:the_silver_searcher
  brew: brew install the_silver_searcher
  chocolatey: choco install ag
  dnf: sudo dnf install the_silver_searcher
  macports: sudo port install the_silver_searcher
  pacman: sudo pacman -S the_silver_searcher
  scoop: scoop install main/ag
  winget: winget install --id JFLarvoire.Ag -e
provenance:
  formula: the_silver_searcher
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
