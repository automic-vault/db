id: brew:the-way
display-name: the-way
homepage: https://github.com/out-of-cheese-error/the-way
repo: https://github.com/out-of-cheese-error/the-way
docs: https://github.com/out-of-cheese-error/the-way
package-manager:
  brew: the-way
  nix: the-way
package-manager-url: https://formulae.brew.sh/formula/the-way
version: 0.20.3
license: MIT
category: development
tags:
  - cli
description: Code snippets manager for your terminal
source-archive: https://github.com/out-of-cheese-error/the-way/archive/refs/tags/v0.20.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: the-way
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:the-way
  brew: brew install the-way
  nix: nix profile install nixpkgs#the-way
provenance:
  formula: the-way
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
