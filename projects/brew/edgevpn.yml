id: brew:edgevpn
display-name: edgevpn
homepage: https://mudler.github.io/edgevpn
repo: https://github.com/mudler/edgevpn
docs: https://mudler.github.io/edgevpn
package-manager:
  brew: edgevpn
package-manager-url: https://formulae.brew.sh/formula/edgevpn
version: 0.32.2
license: Apache-2.0
category: development
tags:
  - cli
description: Immutable, decentralized, statically built p2p VPN
source-archive: https://github.com/mudler/edgevpn/archive/refs/tags/v0.32.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: edgevpn
bottle:
