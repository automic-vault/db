id: brew:typos-cli
display-name: typos-cli
homepage: https://github.com/crate-ci/typos
repo: https://github.com/crate-ci/typos
docs: https://github.com/crate-ci/typos
package-manager:
  apk: typos
  brew: typos-cli
  nix: typos
  pacman: typos
  scoop: main/typos
  winget: Crate-CI.Typos
package-manager-url: https://formulae.brew.sh/formula/typos-cli
version: 1.46.3
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Source code spell checker
source-archive: https://github.com/crate-ci/typos/archive/refs/tags/v1.46.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: typos
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add typos
  av: sudo av install brew:typos-cli
  brew: brew install typos-cli
  nix: nix profile install nixpkgs#typos
  pacman: sudo pacman -S typos
  scoop: scoop install main/typos
  winget: winget install --id Crate-CI.Typos -e
provenance:
  formula: typos-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
