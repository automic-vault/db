id: brew:k2tf
display-name: k2tf
homepage: https://github.com/sl1pm4t/k2tf
repo: https://github.com/sl1pm4t/k2tf
docs: https://github.com/sl1pm4t/k2tf
package-manager:
  brew: k2tf
  macports: k2tf
  nix: k2tf
  scoop: main/k2tf
package-manager-url: https://formulae.brew.sh/formula/k2tf
version: 0.8.0
license: MPL-2.0
category: cloud
tags:
  - cli
  - kubernetes
  - yaml
description: Kubernetes YAML to Terraform HCL converter
source-archive: https://github.com/sl1pm4t/k2tf/archive/refs/tags/v0.8.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: k2tf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:k2tf
  brew: brew install k2tf
  macports: sudo port install k2tf
  nix: nix profile install nixpkgs#k2tf
  scoop: scoop install main/k2tf
provenance:
  formula: k2tf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
