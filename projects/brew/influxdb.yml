id: brew:influxdb
display-name: influxdb
homepage: https://influxdata.com/time-series-platform/influxdb/
repo: https://github.com/influxdata/influxdb
docs: https://influxdata.com/time-series-platform/influxdb/
package-manager:
  brew: influxdb
  debian: influxdb
  macports: influxdb
  nix: influxdb
  pacman: influxdb
  scoop: main/influxdb
  ubuntu: influxdb
  zypper: influxdb
package-manager-url: https://formulae.brew.sh/formula/influxdb
version: 3.9.2
license: Apache-2.0 OR MIT
category: database
tags:
  - cli
  - database
description: Time series, events, and metrics database
source-archive: https://github.com/influxdata/influxdb.git
dependencies:
  - python@3.14
build-dependencies:
  - pkgconf
  - protobuf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: influxdb3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:influxdb
  brew: brew install influxdb
  debian: sudo apt install influxdb
  macports: sudo port install influxdb
  nix: nix profile install nixpkgs#influxdb
  pacman: sudo pacman -S influxdb
  scoop: scoop install main/influxdb
  ubuntu: sudo apt install influxdb
  zypper: sudo zypper install influxdb
provenance:
  formula: influxdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
