id: brew:proto
display-name: proto
homepage: https://moonrepo.dev/proto
repo: https://github.com/moonrepo/proto
docs: https://moonrepo.dev/proto
package-manager:
  brew: proto
  nix: proto
package-manager-url: https://formulae.brew.sh/formula/proto
version: 0.57.2
license: MIT
category: development
tags:
  - cli
description: Pluggable multi-language version manager
source-archive: https://github.com/moonrepo/proto/archive/refs/tags/v0.57.2.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: proto
  - exposure: global executable
    kind: cli
    name: proto-shim
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'To finish the installation, run: proto setup'
  post-install-defined: false
install-lines:
  av: sudo av install brew:proto
  brew: brew install proto
  nix: nix profile install nixpkgs#proto
provenance:
  formula: proto
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
