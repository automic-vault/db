id: brew:vfkit
display-name: vfkit
homepage: https://github.com/crc-org/vfkit
repo: https://github.com/crc-org/vfkit
docs: https://github.com/crc-org/vfkit
package-manager:
  brew: vfkit
  macports: vfkit
  nix: vfkit
package-manager-url: https://formulae.brew.sh/formula/vfkit
version: 0.6.3
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line hypervisor using Apple's Virtualization Framework
source-archive: https://github.com/crc-org/vfkit.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vfkit
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vfkit
  brew: brew install vfkit
  macports: sudo port install vfkit
  nix: nix profile install nixpkgs#vfkit
provenance:
  formula: vfkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
