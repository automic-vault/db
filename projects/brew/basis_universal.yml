id: brew:basis_universal
display-name: basis_universal
homepage: https://github.com/BinomialLLC/basis_universal
repo: https://github.com/BinomialLLC/basis_universal
docs: https://github.com/BinomialLLC/basis_universal
package-manager:
  apk: basisu
  brew: basis_universal
  pacman: basis-universal
package-manager-url: https://formulae.brew.sh/formula/basis_universal
version: 2.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: Basis Universal GPU texture codec command-line compression tool
source-archive: https://github.com/BinomialLLC/basis_universal/archive/refs/tags/v2_1_0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: basisu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add basisu
  av: sudo av install brew:basis_universal
  brew: brew install basis_universal
  pacman: sudo pacman -S basis-universal
provenance:
  formula: basis_universal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
