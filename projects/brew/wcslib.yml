id: brew:wcslib
display-name: wcslib
homepage: https://www.atnf.csiro.au/computing/software/wcs/
repo: https://www.atnf.csiro.au/computing/software/wcs/wcslib-releases/wcslib-8.8.tar.bz2
docs: https://www.atnf.csiro.au/computing/software/wcs/
package-manager:
  apk: wcslib
  brew: wcslib
  dnf: wcslib
  macports: wcslib
  nix: wcslib
  pacman: wcslib
package-manager-url: https://formulae.brew.sh/formula/wcslib
version: 8.8
license: LGPL-3.0-or-later
category: network
tags:
  - cli
description: Library and utilities for the FITS World Coordinate System
source-archive: https://www.atnf.csiro.au/computing/software/wcs/wcslib-releases/wcslib-8.8.tar.bz2
dependencies:
  - cfitsio
executables:
  - exposure: global executable
    kind: cli
    name: HPXcvt
  - exposure: global executable
    kind: cli
    name: fitshdr
  - exposure: global executable
    kind: cli
    name: sundazel
  - exposure: global executable
    kind: cli
    name: tofits
  - exposure: global executable
    kind: cli
    name: wcsware
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wcslib
  av: sudo av install brew:wcslib
  brew: brew install wcslib
  dnf: sudo dnf install wcslib
  macports: sudo port install wcslib
  nix: nix profile install nixpkgs#wcslib
  pacman: sudo pacman -S wcslib
provenance:
  formula: wcslib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
