id: brew:lf
display-name: lf
homepage: https://godoc.org/github.com/gokcehan/lf
repo: https://github.com/gokcehan/lf
docs: https://godoc.org/github.com/gokcehan/lf
package-manager:
  apk: lf
  brew: lf
  debian: lf
  macports: lf
  nix: lf
  pacman: lf
  scoop: main/lf
  ubuntu: lf
  winget: LlamaFarm.CLI
  zypper: lf
package-manager-url: https://formulae.brew.sh/formula/lf
version: 41
license: MIT
category: development
tags:
  - cli
description: Terminal file manager
source-archive: https://github.com/gokcehan/lf/archive/refs/tags/r41.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lf
  av: sudo av install brew:lf
  brew: brew install lf
  debian: sudo apt install lf
  macports: sudo port install lf
  nix: nix profile install nixpkgs#lf
  pacman: sudo pacman -S lf
  scoop: scoop install main/lf
  ubuntu: sudo apt install lf
  winget: winget install --id LlamaFarm.CLI -e
  zypper: sudo zypper install lf
provenance:
  formula: lf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
