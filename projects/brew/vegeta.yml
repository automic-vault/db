id: brew:vegeta
display-name: vegeta
homepage: https://github.com/tsenart/vegeta
repo: https://github.com/tsenart/vegeta
docs: https://github.com/tsenart/vegeta
package-manager:
  brew: vegeta
  macports: vegeta
  nix: vegeta
  pacman: vegeta
  scoop: main/vegeta
  zypper: vegeta
package-manager-url: https://formulae.brew.sh/formula/vegeta
version: 12.13.0
license: MIT
category: development
tags:
  - cli
description: HTTP load testing tool and library
source-archive: https://github.com/tsenart/vegeta/archive/refs/tags/v12.13.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vegeta
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vegeta
  brew: brew install vegeta
  macports: sudo port install vegeta
  nix: nix profile install nixpkgs#vegeta
  pacman: sudo pacman -S vegeta
  scoop: scoop install main/vegeta
  zypper: sudo zypper install vegeta
provenance:
  formula: vegeta
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
