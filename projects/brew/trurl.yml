id: brew:trurl
display-name: trurl
homepage: https://curl.se/trurl/
repo: https://github.com/curl/trurl
docs: https://curl.se/trurl/
package-manager:
  apk: trurl
  brew: trurl
  debian: trurl
  dnf: trurl
  macports: trurl
  nix: trurl
  pacman: trurl
  ubuntu: trurl
  zypper: trurl
package-manager-url: https://formulae.brew.sh/formula/trurl
version: 0.16.1
license: curl
category: development
tags:
  - cli
description: Command-line tool for URL parsing and manipulation
source-archive: https://github.com/curl/trurl/releases/download/trurl-0.16.1/trurl-0.16.1.tar.gz
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: trurl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add trurl
  av: sudo av install brew:trurl
  brew: brew install trurl
  debian: sudo apt install trurl
  dnf: sudo dnf install trurl
  macports: sudo port install trurl
  nix: nix profile install nixpkgs#trurl
  pacman: sudo pacman -S trurl
  ubuntu: sudo apt install trurl
  zypper: sudo zypper install trurl
provenance:
  formula: trurl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
