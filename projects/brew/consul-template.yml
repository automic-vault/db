id: brew:consul-template
display-name: consul-template
homepage: https://github.com/hashicorp/consul-template
repo: https://github.com/hashicorp/consul-template
docs: https://github.com/hashicorp/consul-template
package-manager:
  apk: consul-template
  brew: consul-template
  chocolatey: consul-template
  nix: consul-template
  pacman: consul-template
package-manager-url: https://formulae.brew.sh/formula/consul-template
version: 0.42.0
license: MPL-2.0
category: development
tags:
  - cli
description: Generic template rendering and notifications with Consul
source-archive: https://github.com/hashicorp/consul-template/archive/refs/tags/v0.42.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: consul-template
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add consul-template
  av: sudo av install brew:consul-template
  brew: brew install consul-template
  chocolatey: choco install consul-template
  nix: nix profile install nixpkgs#consul-template
  pacman: sudo pacman -S consul-template
provenance:
  formula: consul-template
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
