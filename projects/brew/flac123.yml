id: brew:flac123
display-name: flac123
homepage: https://github.com/flac123/flac123
repo: https://github.com/flac123/flac123
docs: https://github.com/flac123/flac123
package-manager:
  brew: flac123
  dnf: flac123
  nix: flac123
package-manager-url: https://formulae.brew.sh/formula/flac123
version: 2.1.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Command-line program for playing FLAC audio files
source-archive: https://github.com/flac123/flac123/archive/refs/tags/v2.1.1.tar.gz
dependencies:
  - flac
  - libao
  - libogg
  - popt
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: flac123
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flac123
  brew: brew install flac123
  dnf: sudo dnf install flac123
  nix: nix profile install nixpkgs#flac123
provenance:
  formula: flac123
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
