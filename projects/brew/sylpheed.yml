id: brew:sylpheed
display-name: sylpheed
homepage: https://sylpheed.sraoss.jp/en/
repo: https://sylpheed.sraoss.jp/sylpheed/v3.7/sylpheed-3.7.0.tar.bz2
docs: https://sylpheed.sraoss.jp/en/
package-manager:
  brew: sylpheed
  debian: sylpheed
  dnf: sylpheed
  macports: sylpheed
  ubuntu: sylpheed
package-manager-url: https://formulae.brew.sh/formula/sylpheed
version: 3.7.0
license: GPL-2.0-or-later AND LGPL-2.1-or-later AND MIT AND LicenseRef-Homebrew-public-domain
category: network
tags:
  - cli
description: Simple, lightweight email-client
source-archive: https://sylpheed.sraoss.jp/sylpheed/v3.7/sylpheed-3.7.0.tar.bz2
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gpgme
  - gtk+
  - harfbuzz
  - libassuan
  - libgpg-error
  - openssl@3
  - pango
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: sylpheed
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sylpheed
  brew: brew install sylpheed
  debian: sudo apt install sylpheed
  dnf: sudo dnf install sylpheed
  macports: sudo port install sylpheed
  ubuntu: sudo apt install sylpheed
provenance:
  formula: sylpheed
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
