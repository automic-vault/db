id: brew:vsearch
display-name: vsearch
homepage: https://github.com/torognes/vsearch
repo: https://github.com/torognes/vsearch
docs: https://github.com/torognes/vsearch
package-manager:
  brew: vsearch
  debian: vsearch
  ubuntu: vsearch
package-manager-url: https://formulae.brew.sh/formula/vsearch
version: 2.31.0
license: BSD-2-Clause OR GPL-3.0-or-later
category: development
tags:
  - cli
description: Versatile open-source tool for microbiome analysis
source-archive: https://github.com/torognes/vsearch/archive/refs/tags/v2.31.0.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: vsearch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vsearch
  brew: brew install vsearch
  debian: sudo apt install vsearch
  ubuntu: sudo apt install vsearch
provenance:
  formula: vsearch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
