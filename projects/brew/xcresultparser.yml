id: brew:xcresultparser
display-name: xcresultparser
homepage: https://github.com/a7ex/xcresultparser
repo: https://github.com/a7ex/xcresultparser
docs: https://github.com/a7ex/xcresultparser
package-manager:
  brew: xcresultparser
package-manager-url: https://formulae.brew.sh/formula/xcresultparser
version: 2.0.1
license: MIT
category: development
tags:
  - cli
description: Parse binary .xcresult bundles from Xcode builds and test runs
source-archive: https://github.com/a7ex/xcresultparser/archive/refs/tags/2.0.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: xcresultparser
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xcresultparser
  brew: brew install xcresultparser
provenance:
  formula: xcresultparser
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
