id: brew:librsync
display-name: librsync
homepage: https://librsync.github.io/
repo: https://github.com/librsync/librsync
docs: https://librsync.github.io/
package-manager:
  apk: librsync
  brew: librsync
  debian: rdiff
  dnf: librsync
  macports: librsync
  nix: librsync
  pacman: librsync
  ubuntu: rdiff
  zypper: rdiff
package-manager-url: https://formulae.brew.sh/formula/librsync
version: 2.3.4
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Library that implements the rsync remote-delta algorithm
source-archive: https://github.com/librsync/librsync/archive/refs/tags/v2.3.4.tar.gz
dependencies:
  - popt
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: rdiff
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add librsync
  av: sudo av install brew:librsync
  brew: brew install librsync
  debian: sudo apt install rdiff
  dnf: sudo dnf install librsync
  macports: sudo port install librsync
  nix: nix profile install nixpkgs#librsync
  pacman: sudo pacman -S librsync
  ubuntu: sudo apt install rdiff
  zypper: sudo zypper install rdiff
provenance:
  formula: librsync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
