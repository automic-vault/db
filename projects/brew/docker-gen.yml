id: brew:docker-gen
display-name: docker-gen
homepage: https://github.com/nginx-proxy/docker-gen
repo: https://github.com/nginx-proxy/docker-gen
docs: https://github.com/nginx-proxy/docker-gen
package-manager:
  brew: docker-gen
package-manager-url: https://formulae.brew.sh/formula/docker-gen
version: 0.16.4
license: MIT
category: development
tags:
  - cli
  - docker
description: Generate files from docker container metadata
source-archive: https://github.com/nginx-proxy/docker-gen/archive/refs/tags/0.16.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: docker-gen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:docker-gen
  brew: brew install docker-gen
provenance:
  formula: docker-gen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
