id: brew:recode
display-name: recode
homepage: https://github.com/rrthomas/recode
repo: https://github.com/rrthomas/recode
docs: https://github.com/rrthomas/recode
package-manager:
  apk: recode
  brew: recode
  debian: recode
  dnf: recode
  macports: recode
  nix: recode
  pacman: recode
  ubuntu: recode
  zypper: recode
package-manager-url: https://formulae.brew.sh/formula/recode
version: 3.7.15
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Convert character set (charsets)
source-archive: https://github.com/rrthomas/recode/releases/download/v3.7.15/recode-3.7.15.tar.gz
dependencies:
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: recode
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add recode
  av: sudo av install brew:recode
  brew: brew install recode
  debian: sudo apt install recode
  dnf: sudo dnf install recode
  macports: sudo port install recode
  nix: nix profile install nixpkgs#recode
  pacman: sudo pacman -S recode
  ubuntu: sudo apt install recode
  zypper: sudo zypper install recode
provenance:
  formula: recode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
