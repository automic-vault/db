id: brew:prettyping
display-name: prettyping
homepage: https://denilsonsa.github.io/prettyping/
repo: https://github.com/denilsonsa/prettyping
docs: https://denilsonsa.github.io/prettyping/
package-manager:
  brew: prettyping
  debian: prettyping
  dnf: prettyping
  macports: prettyping
  nix: prettyping
  pacman: prettyping
  ubuntu: prettyping
package-manager-url: https://formulae.brew.sh/formula/prettyping
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Wrapper to colorize and simplify ping's output
source-archive: https://github.com/denilsonsa/prettyping/archive/refs/tags/v1.1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: prettyping
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:prettyping
  brew: brew install prettyping
  debian: sudo apt install prettyping
  dnf: sudo dnf install prettyping
  macports: sudo port install prettyping
  nix: nix profile install nixpkgs#prettyping
  pacman: sudo pacman -S prettyping
  ubuntu: sudo apt install prettyping
provenance:
  formula: prettyping
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
