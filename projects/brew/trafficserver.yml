id: brew:trafficserver
display-name: trafficserver
homepage: https://trafficserver.apache.org/
repo: https://www.apache.org/dyn/closer.lua?path=trafficserver/trafficserver-10.1.2.tar.bz2
docs: https://trafficserver.apache.org/
package-manager:
  brew: trafficserver
  dnf: trafficserver
  nix: trafficserver
  ubuntu: trafficserver
package-manager-url: https://formulae.brew.sh/formula/trafficserver
version: 10.1.2
license: Apache-2.0
category: network
tags:
  - cli
description: HTTP/1.1 and HTTP/2 compliant caching proxy server
source-archive: https://www.apache.org/dyn/closer.lua?path=trafficserver/trafficserver-10.1.2.tar.bz2
dependencies:
  - brotli
  - hwloc
  - imagemagick
  - libmaxminddb
  - luajit
  - nuraft
  - openssl@3
  - pcre
  - pcre2
  - xz
  - yaml-cpp
build-dependencies:
  - cmake
  - ninja
  - pkgconf
uses-from-macos:
  - curl
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: traffic_cache_tool
  - exposure: global executable
    kind: cli
    name: traffic_crashlog
  - exposure: global executable
    kind: cli
    name: traffic_ctl
  - exposure: global executable
    kind: cli
    name: traffic_layout
  - exposure: global executable
    kind: cli
    name: traffic_logcat
  - exposure: global executable
    kind: cli
    name: traffic_logstats
  - exposure: global executable
    kind: cli
    name: traffic_server
  - exposure: global executable
    kind: cli
    name: traffic_top
  - exposure: global executable
    kind: cli
    name: traffic_via
  - exposure: global executable
    kind: cli
    name: trafficserver
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:trafficserver
  brew: brew install trafficserver
  dnf: sudo dnf install trafficserver
  nix: nix profile install nixpkgs#trafficserver
  ubuntu: sudo apt install trafficserver
provenance:
  formula: trafficserver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
