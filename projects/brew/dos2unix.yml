id: brew:dos2unix
display-name: dos2unix
homepage: https://waterlan.home.xs4all.nl/dos2unix.html
repo: https://waterlan.home.xs4all.nl/dos2unix/dos2unix-7.5.5.tar.gz
docs: https://waterlan.home.xs4all.nl/dos2unix.html
package-manager:
  apk: dos2unix
  brew: dos2unix
  chocolatey: dos2unix
  debian: dos2unix
  dnf: dos2unix
  macports: dos2unix
  nix: dos2unix
  pacman: dos2unix
  scoop: main/dos2unix
  ubuntu: dos2unix
  winget: waterlan.dos2unix
  zypper: dos2unix
package-manager-url: https://formulae.brew.sh/formula/dos2unix
version: 7.5.5
license: BSD-2-Clause
category: development
tags:
  - cli
description: Convert text between DOS, UNIX, and Mac formats
source-archive: https://waterlan.home.xs4all.nl/dos2unix/dos2unix-7.5.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: dos2unix
  - exposure: global executable
    kind: cli
    name: mac2unix
  - exposure: global executable
    kind: cli
    name: unix2dos
  - exposure: global executable
    kind: cli
    name: unix2mac
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dos2unix
  av: sudo av install brew:dos2unix
  brew: brew install dos2unix
  chocolatey: choco install dos2unix
  debian: sudo apt install dos2unix
  dnf: sudo dnf install dos2unix
  macports: sudo port install dos2unix
  nix: nix profile install nixpkgs#dos2unix
  pacman: sudo pacman -S dos2unix
  scoop: scoop install main/dos2unix
  ubuntu: sudo apt install dos2unix
  winget: winget install --id waterlan.dos2unix -e
  zypper: sudo zypper install dos2unix
provenance:
  formula: dos2unix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
