id: brew:gitlab-runner
display-name: gitlab-runner
homepage: https://gitlab.com/gitlab-org/gitlab-runner
repo: https://gitlab.com/gitlab-org/gitlab-runner
docs: https://gitlab.com/gitlab-org/gitlab-runner
package-manager:
  apk: gitlab-runner
  brew: gitlab-runner
  chocolatey: gitlab-runner
  macports: gitlab-runner
  nix: gitlab-runner
  pacman: gitlab-runner
  scoop: main/gitlab-runner
  winget: Gitlab.Runner
package-manager-url: https://formulae.brew.sh/formula/gitlab-runner
version: 19.0.0
license: MIT
category: development
tags:
  - cli
description: Official GitLab CI runner
source-archive: https://gitlab.com/gitlab-org/gitlab-runner.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gitlab-runner
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add gitlab-runner
  av: sudo av install brew:gitlab-runner
  brew: brew install gitlab-runner
  chocolatey: choco install gitlab-runner
  macports: sudo port install gitlab-runner
  nix: nix profile install nixpkgs#gitlab-runner
  pacman: sudo pacman -S gitlab-runner
  scoop: scoop install main/gitlab-runner
  winget: winget install --id Gitlab.Runner -e
provenance:
  formula: gitlab-runner
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
