id: brew:dcd
display-name: dcd
homepage: https://github.com/dlang-community/DCD
repo: https://github.com/dlang-community/DCD
docs: https://github.com/dlang-community/DCD
package-manager:
  brew: dcd
  macports: dcd
  pacman: dcd
package-manager-url: https://formulae.brew.sh/formula/dcd
version: 0.16.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Auto-complete program for the D programming language
source-archive: https://github.com/dlang-community/DCD.git
build-dependencies:
  - ldc
executables:
  - exposure: global executable
    kind: cli
    name: dcd-client
  - exposure: global executable
    kind: cli
    name: dcd-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dcd
  brew: brew install dcd
  macports: sudo port install dcd
  pacman: sudo pacman -S dcd
provenance:
  formula: dcd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
