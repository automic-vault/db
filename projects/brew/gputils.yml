id: brew:gputils
display-name: gputils
homepage: https://gputils.sourceforge.io/
repo: https://downloads.sourceforge.net/project/gputils/gputils/1.5.0/gputils-1.5.2.tar.bz2
docs: https://gputils.sourceforge.io/
package-manager:
  brew: gputils
  debian: gputils
  dnf: gputils
  macports: gputils
  nix: gputils
  pacman: gputils
  ubuntu: gputils
  zypper: gputils
package-manager-url: https://formulae.brew.sh/formula/gputils
version: 1.5.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: GNU PIC Utilities
source-archive: https://downloads.sourceforge.net/project/gputils/gputils/1.5.0/gputils-1.5.2.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: gpasm
  - exposure: global executable
    kind: cli
    name: gpdasm
  - exposure: global executable
    kind: cli
    name: gplib
  - exposure: global executable
    kind: cli
    name: gplink
  - exposure: global executable
    kind: cli
    name: gpstrip
  - exposure: global executable
    kind: cli
    name: gpvc
  - exposure: global executable
    kind: cli
    name: gpvo
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gputils
  brew: brew install gputils
  debian: sudo apt install gputils
  dnf: sudo dnf install gputils
  macports: sudo port install gputils
  nix: nix profile install nixpkgs#gputils
  pacman: sudo pacman -S gputils
  ubuntu: sudo apt install gputils
  zypper: sudo zypper install gputils
provenance:
  formula: gputils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
