id: brew:gforth
display-name: gforth
homepage: https://www.gnu.org/software/gforth/
repo: https://ftpmirror.gnu.org/gnu/gforth/gforth-0.7.3.tar.gz
docs: https://www.gnu.org/software/gforth/
package-manager:
  brew: gforth
  dnf: gforth
  macports: gforth
  nix: gforth
  ubuntu: gforth
  winget: GNU.Gforth
package-manager-url: https://formulae.brew.sh/formula/gforth
version: 0.7.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Implementation of the ANS Forth language
source-archive: https://ftpmirror.gnu.org/gnu/gforth/gforth-0.7.3.tar.gz
dependencies:
  - libtool
build-dependencies:
  - emacs
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: gforth
  - exposure: global executable
    kind: cli
    name: gforth-0.7.3
  - exposure: global executable
    kind: cli
    name: gforth-fast
  - exposure: global executable
    kind: cli
    name: gforth-fast-0.7.3
  - exposure: global executable
    kind: cli
    name: gforth-itc
  - exposure: global executable
    kind: cli
    name: gforth-itc-0.7.3
  - exposure: global executable
    kind: cli
    name: gforthmi
  - exposure: global executable
    kind: cli
    name: gforthmi-0.7.3
  - exposure: global executable
    kind: cli
    name: vmgen
  - exposure: global executable
    kind: cli
    name: vmgen-0.7.3
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gforth
  brew: brew install gforth
  dnf: sudo dnf install gforth
  macports: sudo port install gforth
  nix: nix profile install nixpkgs#gforth
  ubuntu: sudo apt install gforth
  winget: winget install --id GNU.Gforth -e
provenance:
  formula: gforth
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
