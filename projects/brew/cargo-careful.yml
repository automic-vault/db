id: brew:cargo-careful
display-name: cargo-careful
homepage: https://github.com/RalfJung/cargo-careful
repo: https://github.com/RalfJung/cargo-careful
docs: https://github.com/RalfJung/cargo-careful
package-manager:
  brew: cargo-careful
  nix: cargo-careful
package-manager-url: https://formulae.brew.sh/formula/cargo-careful
version: 0.4.10
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Execute Rust code carefully, with extra checking along the way
source-archive: https://github.com/RalfJung/cargo-careful/archive/refs/tags/v0.4.10.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-careful
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-careful
  brew: brew install cargo-careful
  nix: nix profile install nixpkgs#cargo-careful
provenance:
  formula: cargo-careful
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
