id: brew:supermodel
display-name: supermodel
homepage: https://github.com/trzy/Supermodel
repo: https://github.com/trzy/Supermodel
docs: https://github.com/trzy/Supermodel
package-manager:
  brew: supermodel
  nix: supermodel
package-manager-url: https://formulae.brew.sh/formula/supermodel
version: 0.3a-20260506-git-9c9e7b7
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Sega Model 3 arcade emulator
source-archive: https://github.com/trzy/Supermodel/archive/refs/tags/v0.3a-20260506-git-9c9e7b7.tar.gz
dependencies:
  - sdl2
  - sdl2_net
executables:
  - exposure: global executable
    kind: cli
    name: supermodel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Config, Saves, and NVRAM are located in the following directory:
    $HOMEBREW_PREFIX/var/supermodel/
  post-install-defined: false
install-lines:
  av: sudo av install brew:supermodel
  brew: brew install supermodel
  nix: nix profile install nixpkgs#supermodel
provenance:
  formula: supermodel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
