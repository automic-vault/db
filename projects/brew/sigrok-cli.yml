id: brew:sigrok-cli
display-name: sigrok-cli
homepage: https://sigrok.org/
repo: https://sigrok.org/download/source/sigrok-cli/sigrok-cli-0.7.2.tar.gz
docs: https://sigrok.org/
package-manager:
  apk: sigrok-cli
  brew: sigrok-cli
  debian: sigrok-cli
  dnf: sigrok-cli
  nix: sigrok-cli
  pacman: sigrok-cli
  ubuntu: sigrok-cli
  zypper: sigrok-cli
package-manager-url: https://formulae.brew.sh/formula/sigrok-cli
version: 0.7.2
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Sigrok command-line interface to use logic analyzers and more
source-archive: https://sigrok.org/download/source/sigrok-cli/sigrok-cli-0.7.2.tar.gz
dependencies:
  - gettext
  - glib
  - libsigrok
  - libsigrokdecode
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: sigrok-cli
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sigrok-cli
  av: sudo av install brew:sigrok-cli
  brew: brew install sigrok-cli
  debian: sudo apt install sigrok-cli
  dnf: sudo dnf install sigrok-cli
  nix: nix profile install nixpkgs#sigrok-cli
  pacman: sudo pacman -S sigrok-cli
  ubuntu: sudo apt install sigrok-cli
  zypper: sudo zypper install sigrok-cli
provenance:
  formula: sigrok-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
