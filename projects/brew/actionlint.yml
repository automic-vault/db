id: brew:actionlint
display-name: actionlint
homepage: https://rhysd.github.io/actionlint/
repo: https://github.com/rhysd/actionlint
docs: https://rhysd.github.io/actionlint/
package-manager:
  apk: actionlint
  brew: actionlint
  macports: actionlint
  nix: actionlint
  pacman: actionlint
  scoop: main/actionlint
  winget: rhysd.actionlint
package-manager-url: https://formulae.brew.sh/formula/actionlint
version: 1.7.12
license: MIT
category: development
tags:
  - cli
description: Static checker for GitHub Actions workflow files
source-archive: https://github.com/rhysd/actionlint/archive/refs/tags/v1.7.12.tar.gz
dependencies:
  - shellcheck
build-dependencies:
  - go
  - ronn
executables:
  - exposure: global executable
    kind: cli
    name: actionlint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add actionlint
  av: sudo av install brew:actionlint
  brew: brew install actionlint
  macports: sudo port install actionlint
  nix: nix profile install nixpkgs#actionlint
  pacman: sudo pacman -S actionlint
  scoop: scoop install main/actionlint
  winget: winget install --id rhysd.actionlint -e
provenance:
  formula: actionlint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
