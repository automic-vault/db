id: brew:smlpkg
display-name: smlpkg
homepage: https://github.com/diku-dk/smlpkg
repo: https://github.com/diku-dk/smlpkg
docs: https://github.com/diku-dk/smlpkg
package-manager:
  brew: smlpkg
  macports: smlpkg
  nix: smlpkg
package-manager-url: https://formulae.brew.sh/formula/smlpkg
version: 0.1.7
license: MIT
category: development
tags:
  - cli
description: Package manager for Standard ML libraries and programs
source-archive: https://github.com/diku-dk/smlpkg/archive/refs/tags/v0.1.7.tar.gz
dependencies:
  - gmp
build-dependencies:
  - mlton
executables:
  - exposure: global executable
    kind: cli
    name: smlpkg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:smlpkg
  brew: brew install smlpkg
  macports: sudo port install smlpkg
  nix: nix profile install nixpkgs#smlpkg
provenance:
  formula: smlpkg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
