id: brew:forgejo-cli
display-name: forgejo-cli
homepage: https://codeberg.org/forgejo-contrib/forgejo-cli
repo: https://codeberg.org/forgejo-contrib/forgejo-cli/archive/v0.5.0.tar.gz
docs: https://codeberg.org/forgejo-contrib/forgejo-cli
package-manager:
  brew: forgejo-cli
  nix: forgejo-cli
  pacman: forgejo-cli
  zypper: forgejo-cli
package-manager-url: https://formulae.brew.sh/formula/forgejo-cli
version: 0.5.0
license: Apache-2.0 OR MIT
category: network
tags:
  - cli
description: CLI tool for interacting with Forgejo
source-archive: https://codeberg.org/forgejo-contrib/forgejo-cli/archive/v0.5.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fj
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:forgejo-cli
  brew: brew install forgejo-cli
  nix: nix profile install nixpkgs#forgejo-cli
  pacman: sudo pacman -S forgejo-cli
  zypper: sudo zypper install forgejo-cli
provenance:
  formula: forgejo-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
