id: brew:ginac
display-name: ginac
homepage: https://www.ginac.de/
repo: https://www.ginac.de/ginac-1.8.10.tar.bz2
docs: https://www.ginac.de/
package-manager:
  apk: ginac
  brew: ginac
  dnf: ginac
  macports: GiNaC
  nix: ginac
  pacman: ginac
  zypper: ginac
package-manager-url: https://formulae.brew.sh/formula/ginac
version: 1.8.10
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Not a Computer algebra system
source-archive: https://www.ginac.de/ginac-1.8.10.tar.bz2
dependencies:
  - cln
  - python@3.14
  - readline
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ginsh
  - exposure: global executable
    kind: cli
    name: viewgar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ginac
  av: sudo av install brew:ginac
  brew: brew install ginac
  dnf: sudo dnf install ginac
  macports: sudo port install GiNaC
  nix: nix profile install nixpkgs#ginac
  pacman: sudo pacman -S ginac
  zypper: sudo zypper install ginac
provenance:
  formula: ginac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
