id: brew:newsboat
display-name: newsboat
homepage: https://newsboat.org/
repo: https://newsboat.org/releases/2.43/newsboat-2.43.tar.xz
docs: https://newsboat.org/
package-manager:
  apk: newsboat
  brew: newsboat
  debian: newsboat
  dnf: newsboat
  macports: newsboat
  nix: newsboat
  pacman: newsboat
  zypper: newsboat
package-manager-url: https://formulae.brew.sh/formula/newsboat
version: 2.43
license: MIT
category: network
tags:
  - cli
description: RSS/Atom feed reader for text terminals
source-archive: https://newsboat.org/releases/2.43/newsboat-2.43.tar.xz
dependencies:
  - gettext
  - json-c
build-dependencies:
  - asciidoctor
  - gettext
  - llvm
  - make
  - pkgconf
  - rust
  - xz
uses-from-macos:
  - curl
  - libxml2
  - libxslt
  - ncurses
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: newsboat
  - exposure: global executable
    kind: cli
    name: podboat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add newsboat
  av: sudo av install brew:newsboat
  brew: brew install newsboat
  debian: sudo apt install newsboat
  dnf: sudo dnf install newsboat
  macports: sudo port install newsboat
  nix: nix profile install nixpkgs#newsboat
  pacman: sudo pacman -S newsboat
  zypper: sudo zypper install newsboat
provenance:
  formula: newsboat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
