id: brew:hayagriva
display-name: hayagriva
homepage: https://github.com/typst/hayagriva
repo: https://github.com/typst/hayagriva
docs: https://github.com/typst/hayagriva
package-manager:
  brew: hayagriva
  nix: hayagriva
  zypper: hayagriva
package-manager-url: https://formulae.brew.sh/formula/hayagriva
version: 0.9.1
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Bibliography management tool
source-archive: https://github.com/typst/hayagriva/archive/refs/tags/v0.9.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hayagriva
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hayagriva
  brew: brew install hayagriva
  nix: nix profile install nixpkgs#hayagriva
  zypper: sudo zypper install hayagriva
provenance:
  formula: hayagriva
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
