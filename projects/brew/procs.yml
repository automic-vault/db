id: brew:procs
display-name: procs
homepage: https://github.com/dalance/procs
repo: https://github.com/dalance/procs
docs: https://github.com/dalance/procs
package-manager:
  apk: procs
  brew: procs
  debian: procs
  dnf: procs
  macports: procs
  nix: procs
  pacman: procs
  scoop: main/procs
  winget: dalance.procs
  zypper: procs
package-manager-url: https://formulae.brew.sh/formula/procs
version: 0.14.11
license: MIT
category: development
tags:
  - cli
description: Modern replacement for ps written in Rust
source-archive: https://github.com/dalance/procs/archive/refs/tags/v0.14.11.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: procs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add procs
  av: sudo av install brew:procs
  brew: brew install procs
  debian: sudo apt install procs
  dnf: sudo dnf install procs
  macports: sudo port install procs
  nix: nix profile install nixpkgs#procs
  pacman: sudo pacman -S procs
  scoop: scoop install main/procs
  winget: winget install --id dalance.procs -e
  zypper: sudo zypper install procs
provenance:
  formula: procs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
