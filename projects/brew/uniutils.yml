id: brew:uniutils
display-name: uniutils
homepage: https://billposer.org/Software/unidesc.html
repo: https://billposer.org/Software/Downloads/uniutils-2.28.tar.gz
docs: https://billposer.org/Software/unidesc.html
package-manager:
  brew: uniutils
  debian: uniutils
  ubuntu: uniutils
  zypper: uniutils
package-manager-url: https://formulae.brew.sh/formula/uniutils
version: 2.28
license: GPL-2.0-or-later AND GPL-3.0-only
category: network
tags:
  - cli
description: Manipulate and analyze Unicode text
source-archive: https://billposer.org/Software/Downloads/uniutils-2.28.tar.gz
dependencies:
  - gettext
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: ExplicateUTF8
  - exposure: global executable
    kind: cli
    name: unidesc
  - exposure: global executable
    kind: cli
    name: unifuzz
  - exposure: global executable
    kind: cli
    name: unihist
  - exposure: global executable
    kind: cli
    name: uniname
  - exposure: global executable
    kind: cli
    name: unireverse
  - exposure: global executable
    kind: cli
    name: unisurrogate
  - exposure: global executable
    kind: cli
    name: utf8lookup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:uniutils
  brew: brew install uniutils
  debian: sudo apt install uniutils
  ubuntu: sudo apt install uniutils
  zypper: sudo zypper install uniutils
provenance:
  formula: uniutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
