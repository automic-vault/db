id: brew:swiftgen
display-name: swiftgen
homepage: https://github.com/SwiftGen/SwiftGen
repo: https://github.com/SwiftGen/SwiftGen
docs: https://github.com/SwiftGen/SwiftGen
package-manager:
  brew: swiftgen
package-manager-url: https://formulae.brew.sh/formula/swiftgen
version: 6.6.3
license: MIT
category: development
tags:
  - cli
description: Swift code generator for assets, storyboards, Localizable.strings, etc.
source-archive: https://github.com/SwiftGen/SwiftGen/archive/refs/tags/6.6.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: swiftgen
bottle:
  available: true
  platforms:
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:swiftgen
  brew: brew install swiftgen
provenance:
  formula: swiftgen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
