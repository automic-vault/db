id: brew:tinyice
display-name: tinyice
homepage: https://github.com/DatanoiseTV/tinyice
repo: https://github.com/DatanoiseTV/tinyice
docs: https://github.com/DatanoiseTV/tinyice
package-manager:
  brew: tinyice
package-manager-url: https://formulae.brew.sh/formula/tinyice
version: 2.6.3
license: Apache-2.0
category: development
tags:
  - cli
description: Modern, all-in-one Icecast-compatible audio/video streaming server
source-archive: https://github.com/DatanoiseTV/tinyice/archive/refs/tags/v2.6.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tinyice
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:tinyice
  brew: brew install tinyice
provenance:
  formula: tinyice
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
