id: brew:msc-generator
display-name: msc-generator
homepage: https://gitlab.com/msc-generator/msc-generator
repo: >
  https://gitlab.com/api/v4/projects/31167732/packages/generic/msc-generator/8.6.4/msc-generator-8.6.4.tar.gz
docs: https://gitlab.com/msc-generator/msc-generator
package-manager:
  brew: msc-generator
  debian: msc-generator
  ubuntu: msc-generator
package-manager-url: https://formulae.brew.sh/formula/msc-generator
version: 8.6.4
license: AGPL-3.0-or-later
category: cloud
tags:
  - cli
description: Draws signalling charts from textual description
source-archive: >
  https://gitlab.com/api/v4/projects/31167732/packages/generic/msc-generator/8.6.4/msc-generator-8.6.4.tar.gz
dependencies:
  - cairo
  - fontconfig
  - gcc
  - glpk
  - graphviz
  - libpng
  - sdl2
  - tinyxml2
build-dependencies:
  - autoconf
  - automake
  - bison
  - gnu-sed
  - help2man
  - make
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: msc-gen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:msc-generator
  brew: brew install msc-generator
  debian: sudo apt install msc-generator
  ubuntu: sudo apt install msc-generator
provenance:
  formula: msc-generator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
