id: brew:activemq-cpp
display-name: activemq-cpp
homepage: https://activemq.apache.org/components/cms/
repo: >
  https://www.apache.org/dyn/closer.lua?path=activemq/activemq-cpp/3.9.5/activemq-cpp-library-3.9.5-src.tar.bz2
docs: https://activemq.apache.org/components/cms/
package-manager:
  brew: activemq-cpp
  dnf: activemq-cpp
package-manager-url: https://formulae.brew.sh/formula/activemq-cpp
version: 3.9.5
license: Apache-2.0
category: network
tags:
  - cli
description: C++ API for message brokers such as Apache ActiveMQ
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=activemq/activemq-cpp/3.9.5/activemq-cpp-library-3.9.5-src.tar.bz2
dependencies:
  - apr
  - openssl@3
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: activemqcpp-config
  - exposure: global executable
    kind: cli
    name: example
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:activemq-cpp
  brew: brew install activemq-cpp
  dnf: sudo dnf install activemq-cpp
provenance:
  formula: activemq-cpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
