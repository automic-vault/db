id: brew:tun2proxy
display-name: tun2proxy
homepage: https://github.com/tun2proxy/tun2proxy
repo: https://github.com/tun2proxy/tun2proxy
docs: https://github.com/tun2proxy/tun2proxy
package-manager:
  brew: tun2proxy
  nix: tun2proxy
package-manager-url: https://formulae.brew.sh/formula/tun2proxy
version: 0.8.0
license: MIT
category: development
tags:
  - cli
description: Tunnel (TUN) interface for SOCKS and HTTP proxies
source-archive: https://github.com/tun2proxy/tun2proxy/archive/refs/tags/v0.8.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tun2proxy-bin
  - exposure: global executable
    kind: cli
    name: udpgw-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tun2proxy
  brew: brew install tun2proxy
  nix: nix profile install nixpkgs#tun2proxy
provenance:
  formula: tun2proxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
