id: brew:dislocker
display-name: dislocker
homepage: https://github.com/Aorimn/dislocker
repo: https://github.com/Aorimn/dislocker
docs: https://github.com/Aorimn/dislocker
package-manager:
  apk: dislocker
  brew: dislocker
  debian: dislocker
  dnf: dislocker
  nix: dislocker
  ubuntu: dislocker
package-manager-url: https://formulae.brew.sh/formula/dislocker
version: 0.7.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: FUSE driver to read/write Windows' BitLocker-ed volumes
source-archive: https://github.com/Aorimn/dislocker/archive/refs/tags/v0.7.3.tar.gz
dependencies:
  - libfuse
  - mbedtls@3
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dislocker
  - exposure: global executable
    kind: cli
    name: dislocker-bek
  - exposure: global executable
    kind: cli
    name: dislocker-file
  - exposure: global executable
    kind: cli
    name: dislocker-fuse
  - exposure: global executable
    kind: cli
    name: dislocker-metadata
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dislocker
  av: sudo av install brew:dislocker
  brew: brew install dislocker
  debian: sudo apt install dislocker
  dnf: sudo dnf install dislocker
  nix: nix profile install nixpkgs#dislocker
  ubuntu: sudo apt install dislocker
provenance:
  formula: dislocker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
