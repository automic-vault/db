id: brew:poster
display-name: poster
homepage: https://schrfr.github.io/poster/
repo: https://github.com/schrfr/poster
docs: https://schrfr.github.io/poster/
package-manager:
  brew: poster
  debian: poster
  dnf: poster
  ubuntu: poster
  zypper: poster
package-manager-url: https://formulae.brew.sh/formula/poster
version: 1.0.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Create large posters out of PostScript pages
source-archive: https://github.com/schrfr/poster/archive/refs/tags/1.0.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: poster
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:poster
  brew: brew install poster
  debian: sudo apt install poster
  dnf: sudo dnf install poster
  ubuntu: sudo apt install poster
  zypper: sudo zypper install poster
provenance:
  formula: poster
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
