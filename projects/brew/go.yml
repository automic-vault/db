id: brew:go
display-name: go
homepage: https://go.dev/
repo: https://go.dev/dl/go1.26.3.src.tar.gz
docs: https://go.dev/
package-manager:
  apk: go
  brew: go
  chocolatey: go
  macports: go
  nix: go
  pacman: go
  scoop: main/go
  winget: GoLang.Go
  zypper: go
package-manager-url: https://formulae.brew.sh/formula/go
version: 1.26.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: Open source programming language to build simple/reliable/efficient software
source-archive: https://go.dev/dl/go1.26.3.src.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: go
  - exposure: global executable
    kind: cli
    name: gofmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add go
  av: sudo av install brew:go
  brew: brew install go
  chocolatey: choco install go
  macports: sudo port install go
  nix: nix profile install nixpkgs#go
  pacman: sudo pacman -S go
  scoop: scoop install main/go
  winget: winget install --id GoLang.Go -e
  zypper: sudo zypper install go
provenance:
  formula: go
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
