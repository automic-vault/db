id: brew:netlify-cli
display-name: netlify-cli
homepage: https://www.netlify.com/docs/cli
repo: https://registry.npmjs.org/netlify-cli/-/netlify-cli-26.0.2.tgz
docs: https://www.netlify.com/docs/cli
package-manager:
  brew: netlify-cli
  debian: node-gyp
  dnf: ntl
  macports: ntl
  nix: netlify-cli
  pacman: node-gyp
  ubuntu: node-gyp
package-manager-url: https://formulae.brew.sh/formula/netlify-cli
version: 26.0.2
license: MIT
category: network
tags:
  - cli
description: Netlify command-line tool
source-archive: https://registry.npmjs.org/netlify-cli/-/netlify-cli-26.0.2.tgz
dependencies:
  - gettext
  - glib
  - node
  - vips
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: netlify
  - exposure: global executable
    kind: cli
    name: node-gyp
  - exposure: global executable
    kind: cli
    name: ntl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:netlify-cli
  brew: brew install netlify-cli
  debian: sudo apt install node-gyp
  dnf: sudo dnf install ntl
  macports: sudo port install ntl
  nix: nix profile install nixpkgs#netlify-cli
  pacman: sudo pacman -S node-gyp
  ubuntu: sudo apt install node-gyp
provenance:
  formula: netlify-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
