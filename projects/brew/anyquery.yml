id: brew:anyquery
display-name: anyquery
homepage: https://anyquery.dev
repo: https://github.com/julien040/anyquery
docs: https://anyquery.dev
package-manager:
  brew: anyquery
  winget: JulienCagniart.anyquery
package-manager-url: https://formulae.brew.sh/formula/anyquery
version: 0.4.4
license: AGPL-3.0-only
category: database
tags:
  - cli
description: Query anything with SQL
source-archive: https://github.com/julien040/anyquery/archive/refs/tags/0.4.4.tar.gz
build-dependencies:
  - go@1.25
executables:
  - exposure: global executable
    kind: cli
    name: anyquery
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:anyquery
  brew: brew install anyquery
  winget: winget install --id JulienCagniart.anyquery -e
provenance:
  formula: anyquery
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
