id: brew:ctl
display-name: ctl
homepage: https://github.com/ampas/CTL
repo: https://github.com/ampas/CTL
docs: https://github.com/ampas/CTL
package-manager:
  brew: ctl
  dnf: CTL
  zypper: ctl
package-manager-url: https://formulae.brew.sh/formula/ctl
version: 1.5.5
license: AMPAS
category: development
tags:
  - cli
description: Programming language for digital color management
source-archive: https://github.com/ampas/CTL/archive/refs/tags/ctl-1.5.5.tar.gz
dependencies:
  - aces_container
  - imath
  - libtiff
  - openexr
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: ctlrender
  - exposure: global executable
    kind: cli
    name: exr_ctl_exr
  - exposure: global executable
    kind: cli
    name: exrdpx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ctl
  brew: brew install ctl
  dnf: sudo dnf install CTL
  zypper: sudo zypper install ctl
provenance:
  formula: ctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
