id: brew:squashfs
display-name: squashfs
homepage: https://github.com/plougher/squashfs-tools
repo: https://github.com/plougher/squashfs-tools
docs: https://github.com/plougher/squashfs-tools
package-manager:
  brew: squashfs
  zypper: squashfs
package-manager-url: https://formulae.brew.sh/formula/squashfs
version: 4.7.5
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Compressed read-only file system for Linux
source-archive: https://github.com/plougher/squashfs-tools/archive/refs/tags/4.7.5.tar.gz
dependencies:
  - lz4
  - lzo
  - xz
  - zstd
build-dependencies:
  - gnu-sed
  - help2man
executables:
  - exposure: global executable
    kind: cli
    name: mksquashfs
  - exposure: global executable
    kind: cli
    name: sqfscat
  - exposure: global executable
    kind: cli
    name: sqfstar
  - exposure: global executable
    kind: cli
    name: unsquashfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:squashfs
  brew: brew install squashfs
  zypper: sudo zypper install squashfs
provenance:
  formula: squashfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
