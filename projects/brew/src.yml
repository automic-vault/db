id: brew:src
display-name: src
homepage: http://www.catb.org/~esr/src/
repo: https://gitlab.com/esr/src/-/archive/1.45/src-1.45.tar.bz2
docs: http://www.catb.org/~esr/src/
package-manager:
  brew: src
  dnf: src
package-manager-url: https://formulae.brew.sh/formula/src
version: 1.45
license: BSD-2-Clause
category: development
tags:
  - cli
description: 'Simple revision control: RCS reloaded with a modern UI'
source-archive: https://gitlab.com/esr/src/-/archive/1.45/src-1.45.tar.bz2
dependencies:
  - rcs
build-dependencies:
  - asciidoctor
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: src
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:src
  brew: brew install src
  dnf: sudo dnf install src
provenance:
  formula: src
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
