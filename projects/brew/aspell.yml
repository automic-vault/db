id: brew:aspell
display-name: aspell
homepage: http://aspell.net/
repo: https://ftpmirror.gnu.org/gnu/aspell/aspell-0.60.8.2.tar.gz
docs: http://aspell.net/
package-manager:
  apk: aspell
  brew: aspell
  debian: aspell
  dnf: aspell
  macports: aspell
  nix: aspell
  pacman: aspell
  scoop: main/aspell
  ubuntu: aspell
  zypper: aspell
package-manager-url: https://formulae.brew.sh/formula/aspell
version: 0.60.8.2
license: LGPL-2.1-only
category: network
tags:
  - cli
description: Spell checker with better logic than ispell
source-archive: https://ftpmirror.gnu.org/gnu/aspell/aspell-0.60.8.2.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: aspell
  - exposure: global executable
    kind: cli
    name: aspell-import
  - exposure: global executable
    kind: cli
    name: precat
  - exposure: global executable
    kind: cli
    name: preunzip
  - exposure: global executable
    kind: cli
    name: prezip
  - exposure: global executable
    kind: cli
    name: prezip-bin
  - exposure: global executable
    kind: cli
    name: pspell-config
  - exposure: global executable
    kind: cli
    name: run-with-aspell
  - exposure: global executable
    kind: cli
    name: word-list-compress
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add aspell
  av: sudo av install brew:aspell
  brew: brew install aspell
  debian: sudo apt install aspell
  dnf: sudo dnf install aspell
  macports: sudo port install aspell
  nix: nix profile install nixpkgs#aspell
  pacman: sudo pacman -S aspell
  scoop: scoop install main/aspell
  ubuntu: sudo apt install aspell
  zypper: sudo zypper install aspell
provenance:
  formula: aspell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
