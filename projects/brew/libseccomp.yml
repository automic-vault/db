id: brew:libseccomp
display-name: libseccomp
homepage: https://github.com/seccomp/libseccomp
repo: https://github.com/seccomp/libseccomp
docs: https://github.com/seccomp/libseccomp
package-manager:
  apk: libseccomp
  brew: libseccomp
  dnf: libseccomp
  nix: libseccomp
  pacman: libseccomp
package-manager-url: https://formulae.brew.sh/formula/libseccomp
version: 2.6.0
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Interface to the Linux Kernel's syscall filtering mechanism
source-archive: https://github.com/seccomp/libseccomp/releases/download/v2.6.0/libseccomp-2.6.0.tar.gz
build-dependencies:
  - gperf
executables:
  - exposure: global executable
    kind: cli
    name: scmp_sys_resolver
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libseccomp
  av: sudo av install brew:libseccomp
  brew: brew install libseccomp
  dnf: sudo dnf install libseccomp
  nix: nix profile install nixpkgs#libseccomp
  pacman: sudo pacman -S libseccomp
provenance:
  formula: libseccomp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
