id: brew:raxml-ng
display-name: raxml-ng
homepage: https://cme.h-its.org/exelixis/web/software/raxml/
repo: https://github.com/amkozlov/raxml-ng
docs: https://cme.h-its.org/exelixis/web/software/raxml/
package-manager:
  brew: raxml-ng
package-manager-url: https://formulae.brew.sh/formula/raxml-ng
version: 2.0.1
license: AGPL-3.0-or-later
category: development
tags:
