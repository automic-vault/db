id: brew:mkfontscale
display-name: mkfontscale
homepage: https://www.x.org/
repo: https://www.x.org/releases/individual/app/mkfontscale-1.2.4.tar.xz
docs: https://www.x.org/
package-manager:
  apk: mkfontscale
  brew: mkfontscale
  dnf: mkfontscale
  macports: mkfontscale
  nix: mkfontscale
  zypper: mkfontscale
package-manager-url: https://formulae.brew.sh/formula/mkfontscale
version: 1.2.4
license: X11
category: network
tags:
  - cli
description: Create an index of scalable font files for X
source-archive: https://www.x.org/releases/individual/app/mkfontscale-1.2.4.tar.xz
dependencies:
  - freetype
  - libfontenc
build-dependencies:
  - pkgconf
  - xorgproto
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: mkfontdir
  - exposure: global executable
    kind: cli
    name: mkfontscale
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mkfontscale
  av: sudo av install brew:mkfontscale
  brew: brew install mkfontscale
  dnf: sudo dnf install mkfontscale
  macports: sudo port install mkfontscale
  nix: nix profile install nixpkgs#mkfontscale
  zypper: sudo zypper install mkfontscale
provenance:
  formula: mkfontscale
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
