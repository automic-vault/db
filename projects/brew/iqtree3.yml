id: brew:iqtree3
display-name: iqtree3
homepage: http://www.iqtree.org
repo: https://github.com/iqtree/iqtree3
docs: http://www.iqtree.org
package-manager:
  brew: iqtree3
  macports: iqtree3
package-manager-url: https://formulae.brew.sh/formula/iqtree3
version: 3.1.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Phylogenetics by maximum likelihood
source-archive: https://github.com/iqtree/iqtree3/archive/refs/tags/v3.1.2.tar.gz
build-dependencies:
  - boost
  - cmake
  - eigen
uses-from-macos:
  - zlib
executables:
  - exposure: global executable
    kind: cli
    name: iqtree3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:iqtree3
  brew: brew install iqtree3
  macports: sudo port install iqtree3
provenance:
  formula: iqtree3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
