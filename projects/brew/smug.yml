id: brew:smug
display-name: smug
homepage: https://github.com/ivaaaan/smug
repo: https://github.com/ivaaaan/smug
docs: https://github.com/ivaaaan/smug
package-manager:
  brew: smug
  macports: smug
  nix: smug
package-manager-url: https://formulae.brew.sh/formula/smug
version: 0.3.18
license: MIT
category: development
tags:
  - cli
description: Automate your tmux workflow
source-archive: https://github.com/ivaaaan/smug/archive/refs/tags/v0.3.18.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: smug
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:smug
  brew: brew install smug
  macports: sudo port install smug
  nix: nix profile install nixpkgs#smug
provenance:
  formula: smug
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
