id: brew:sk
display-name: sk
homepage: https://github.com/skim-rs/skim
repo: https://github.com/skim-rs/skim
docs: https://github.com/skim-rs/skim
package-manager:
  brew: sk
package-manager-url: https://formulae.brew.sh/formula/sk
version: 4.7.0
license: MIT
category: development
tags:
  - cli
description: Fuzzy Finder in rust!
source-archive: https://github.com/skim-rs/skim/archive/refs/tags/v4.7.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sk
  - exposure: global executable
    kind: cli
    name: sk-tmux
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sk
  brew: brew install sk
provenance:
  formula: sk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
