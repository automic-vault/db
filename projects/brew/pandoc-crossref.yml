id: brew:pandoc-crossref
display-name: pandoc-crossref
homepage: https://github.com/lierdakil/pandoc-crossref
repo: https://github.com/lierdakil/pandoc-crossref
docs: https://github.com/lierdakil/pandoc-crossref
package-manager:
  brew: pandoc-crossref
  pacman: pandoc-crossref
  scoop: main/pandoc-crossref
package-manager-url: https://formulae.brew.sh/formula/pandoc-crossref
version: 0.3.24a
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Pandoc filter for numbering and cross-referencing
source-archive: https://github.com/lierdakil/pandoc-crossref/archive/refs/tags/v0.3.24a.tar.gz
dependencies:
  - gmp
  - pandoc
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: pandoc-crossref
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pandoc-crossref
  brew: brew install pandoc-crossref
  pacman: sudo pacman -S pandoc-crossref
  scoop: scoop install main/pandoc-crossref
provenance:
  formula: pandoc-crossref
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
