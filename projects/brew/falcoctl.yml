id: brew:falcoctl
display-name: falcoctl
homepage: https://github.com/falcosecurity/falcoctl
repo: https://github.com/falcosecurity/falcoctl
docs: https://github.com/falcosecurity/falcoctl
package-manager:
  brew: falcoctl
  nix: falcoctl
  zypper: falcoctl
package-manager-url: https://formulae.brew.sh/formula/falcoctl
version: 0.12.2
license: Apache-2.0
category: security
tags:
  - cli
description: CLI tool for working with Falco and its ecosystem components
source-archive: https://github.com/falcosecurity/falcoctl/archive/refs/tags/v0.12.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: falcoctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:falcoctl
  brew: brew install falcoctl
  nix: nix profile install nixpkgs#falcoctl
  zypper: sudo zypper install falcoctl
provenance:
  formula: falcoctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
