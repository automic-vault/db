id: brew:mk-configure
display-name: mk-configure
homepage: https://github.com/cheusov/mk-configure
repo: >
  https://downloads.sourceforge.net/project/mk-configure/mk-configure/mk-configure-0.40.0/mk-configure-0.40.0.tar.gz
docs: https://github.com/cheusov/mk-configure
package-manager:
  apk: mk-configure
  brew: mk-configure
  debian: mk-configure
  dnf: mk-configure
  macports: mk-configure
  pacman: mk-configure
  ubuntu: mk-configure
  zypper: mk-configure
package-manager-url: https://formulae.brew.sh/formula/mk-configure
version: 0.40.0
license: BSD-2-Clause AND BSD-3-Clause AND MIT AND MIT-CMU
category: development
tags:
  - cli
description: Lightweight replacement for GNU autotools
source-archive: >
  https://downloads.sourceforge.net/project/mk-configure/mk-configure/mk-configure-0.40.0/mk-configure-0.40.0.tar.gz
dependencies:
  - bmake
  - makedepend
executables:
  - exposure: global executable
    kind: cli
    name: mkc_check_compiler
  - exposure: global executable
    kind: cli
    name: mkc_check_custom
  - exposure: global executable
    kind: cli
    name: mkc_check_decl
  - exposure: global executable
    kind: cli
    name: mkc_check_funclib
  - exposure: global executable
    kind: cli
    name: mkc_check_header
  - exposure: global executable
    kind: cli
    name: mkc_check_prog
  - exposure: global executable
    kind: cli
    name: mkc_check_sizeof
  - exposure: global executable
    kind: cli
    name: mkc_check_version
  - exposure: global executable
    kind: cli
    name: mkc_compiler_settings
  - exposure: global executable
    kind: cli
    name: mkc_install
  - exposure: global executable
    kind: cli
    name: mkc_which
  - exposure: global executable
    kind: cli
    name: mkcmake
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mk-configure
  av: sudo av install brew:mk-configure
  brew: brew install mk-configure
  debian: sudo apt install mk-configure
  dnf: sudo dnf install mk-configure
  macports: sudo port install mk-configure
  pacman: sudo pacman -S mk-configure
  ubuntu: sudo apt install mk-configure
  zypper: sudo zypper install mk-configure
provenance:
  formula: mk-configure
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
