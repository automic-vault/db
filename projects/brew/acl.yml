id: brew:acl
display-name: acl
homepage: https://savannah.nongnu.org/projects/acl/
repo: https://download.savannah.nongnu.org/releases/acl/acl-2.3.2.tar.gz
docs: https://savannah.nongnu.org/projects/acl/
package-manager:
  apk: acl
  brew: acl
  debian: acl
  dnf: acl
  nix: acl
  pacman: acl
  ubuntu: acl
  zypper: acl
package-manager-url: https://formulae.brew.sh/formula/acl
version: 2.3.2
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: network
tags:
  - cli
description: Commands for manipulating POSIX access control lists
source-archive: https://download.savannah.nongnu.org/releases/acl/acl-2.3.2.tar.gz
build-dependencies:
  - attr
executables:
  - exposure: global executable
    kind: cli
    name: chacl
  - exposure: global executable
    kind: cli
    name: getfacl
  - exposure: global executable
    kind: cli
    name: setfacl
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add acl
  av: sudo av install brew:acl
  brew: brew install acl
  debian: sudo apt install acl
  dnf: sudo dnf install acl
  nix: nix profile install nixpkgs#acl
  pacman: sudo pacman -S acl
  ubuntu: sudo apt install acl
  zypper: sudo zypper install acl
provenance:
  formula: acl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
