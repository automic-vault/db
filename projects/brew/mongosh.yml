id: brew:mongosh
display-name: mongosh
homepage: https://github.com/mongodb-js/mongosh
repo: https://registry.npmjs.org/@mongosh/cli-repl/-/cli-repl-2.8.3.tgz
docs: https://github.com/mongodb-js/mongosh
package-manager:
  brew: mongosh
  nix: mongosh
  scoop: extras/mongosh
package-manager-url: https://formulae.brew.sh/formula/mongosh
version: 2.8.3
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: MongoDB Shell to connect, configure, query, and work with your MongoDB database
source-archive: https://registry.npmjs.org/@mongosh/cli-repl/-/cli-repl-2.8.3.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: mongosh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mongosh
  brew: brew install mongosh
  nix: nix profile install nixpkgs#mongosh
  scoop: scoop install extras/mongosh
provenance:
  formula: mongosh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
