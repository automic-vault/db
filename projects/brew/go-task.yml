id: brew:go-task
display-name: go-task
homepage: https://taskfile.dev/
repo: https://github.com/go-task/task
docs: https://taskfile.dev/
package-manager:
  apk: go-task
  brew: go-task
  chocolatey: go-task
  dnf: go-task
  macports: go-task
  nix: go-task
  pacman: go-task
  scoop: main/task
  winget: Task.Task
package-manager-url: https://formulae.brew.sh/formula/go-task
version: 3.51.1
license: MIT
category: development
tags:
  - cli
description: Task is a task runner/build tool that aims to be simpler and easier to use
source-archive: https://github.com/go-task/task/archive/refs/tags/v3.51.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: task
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add go-task
  av: sudo av install brew:go-task
  brew: brew install go-task
  chocolatey: choco install go-task
  dnf: sudo dnf install go-task
  macports: sudo port install go-task
  nix: nix profile install nixpkgs#go-task
  pacman: sudo pacman -S go-task
  scoop: scoop install main/task
  winget: winget install --id Task.Task -e
provenance:
  formula: go-task
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
