id: brew:gerbv
display-name: gerbv
homepage: https://gerbv.github.io/
repo: https://github.com/gerbv/gerbv
docs: https://gerbv.github.io/
package-manager:
  brew: gerbv
  debian: gerbv
  dnf: gerbv
  macports: gerbv
  nix: gerbv
  ubuntu: gerbv
  zypper: gerbv
package-manager-url: https://formulae.brew.sh/formula/gerbv
version: 2.11.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Gerber (RS-274X) viewer
source-archive: https://github.com/gerbv/gerbv/archive/refs/tags/v2.11.1.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+
  - harfbuzz
  - pango
build-dependencies:
  - cmake
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gerbv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gerbv
  brew: brew install gerbv
  debian: sudo apt install gerbv
  dnf: sudo dnf install gerbv
  macports: sudo port install gerbv
  nix: nix profile install nixpkgs#gerbv
  ubuntu: sudo apt install gerbv
  zypper: sudo zypper install gerbv
provenance:
  formula: gerbv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
