id: brew:ssh3
display-name: ssh3
homepage: https://github.com/francoismichel/ssh3
repo: https://github.com/francoismichel/ssh3
docs: https://github.com/francoismichel/ssh3
package-manager:
  brew: ssh3
  macports: ssh3
  scoop: main/ssh3
package-manager-url: https://formulae.brew.sh/formula/ssh3
version: 0.1.7
license: Apache-2.0
category: development
tags:
  - cli
description: Faster and richer secure shell using HTTP/3
source-archive: https://github.com/francoismichel/ssh3/archive/refs/tags/v0.1.7.tar.gz
build-dependencies:
  - go
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: ssh3
  - exposure: global executable
    kind: cli
    name: ssh3-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ssh3
  brew: brew install ssh3
  macports: sudo port install ssh3
  scoop: scoop install main/ssh3
provenance:
  formula: ssh3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
