id: brew:qsv
display-name: qsv
homepage: https://qsv.dathere.com/
repo: https://github.com/dathere/qsv
docs: https://qsv.dathere.com/
package-manager:
  brew: qsv
  macports: qsv
  nix: qsv
  pacman: qsv
  scoop: main/qsv
package-manager-url: https://formulae.brew.sh/formula/qsv
version: 20.1.0
license: MIT OR Unlicense
category: development
tags:
  - cli
description: Ultra-fast CSV data-wrangling toolkit
source-archive: https://github.com/dathere/qsv/archive/refs/tags/20.1.0.tar.gz
build-dependencies:
  - cmake
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: qsv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qsv
  brew: brew install qsv
  macports: sudo port install qsv
  nix: nix profile install nixpkgs#qsv
  pacman: sudo pacman -S qsv
  scoop: scoop install main/qsv
provenance:
  formula: qsv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
