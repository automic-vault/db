id: brew:rathole
display-name: rathole
homepage: https://github.com/rathole-org/rathole
repo: https://github.com/rathole-org/rathole
docs: https://github.com/rathole-org/rathole
package-manager:
  apk: rathole
  brew: rathole
  nix: rathole
  pacman: rathole
  scoop: main/rathole
package-manager-url: https://formulae.brew.sh/formula/rathole
version: 0.5.0
license: Apache-2.0
category: development
tags:
  - cli
description: Reverse proxy for NAT traversal
source-archive: https://github.com/rathole-org/rathole/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rathole
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add rathole
  av: sudo av install brew:rathole
  brew: brew install rathole
  nix: nix profile install nixpkgs#rathole
  pacman: sudo pacman -S rathole
  scoop: scoop install main/rathole
provenance:
  formula: rathole
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
