id: brew:opam
display-name: opam
homepage: https://opam.ocaml.org
repo: https://github.com/ocaml/opam
docs: https://opam.ocaml.org
package-manager:
  apk: opam
  brew: opam
  debian: opam
  dnf: opam
  macports: opam
  nix: opam
  pacman: opam
  scoop: main/opam
  ubuntu: opam
  winget: OCaml.opam
  zypper: opam
package-manager-url: https://formulae.brew.sh/formula/opam
version: 2.5.1
license: LGPL-2.1-only
category: development
tags:
  - cli
description: OCaml package manager
source-archive: https://github.com/ocaml/opam/releases/download/2.5.1/opam-full-2.5.1.tar.gz
dependencies:
  - rsync
build-dependencies:
  - ocaml
uses-from-macos:
  - unzip
executables:
  - exposure: global executable
    kind: cli
    name: opam
  - exposure: global executable
    kind: cli
    name: opam-installer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    OPAM uses ~/.opam by default for its package database, so you need to initialize it
    first by running: $ opam init
  post-install-defined: false
install-lines:
  apk: sudo apk add opam
  av: sudo av install brew:opam
  brew: brew install opam
  debian: sudo apt install opam
  dnf: sudo dnf install opam
  macports: sudo port install opam
  nix: nix profile install nixpkgs#opam
  pacman: sudo pacman -S opam
  scoop: scoop install main/opam
  ubuntu: sudo apt install opam
  winget: winget install --id OCaml.opam -e
  zypper: sudo zypper install opam
provenance:
  formula: opam
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
