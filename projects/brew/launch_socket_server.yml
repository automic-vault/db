id: brew:launch_socket_server
display-name: launch_socket_server
homepage: https://github.com/mistydemeo/launch_socket_server
repo: https://github.com/mistydemeo/launch_socket_server
docs: https://github.com/mistydemeo/launch_socket_server
package-manager:
  brew: launch_socket_server
package-manager-url: https://formulae.brew.sh/formula/launch_socket_server
version: 2.0.0
license: MIT
category: development
tags:
  - cli
description: Bind to privileged ports without running a server as root
source-archive: https://github.com/mistydemeo/launch_socket_server/archive/refs/tags/v2.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: launch_socket_server
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:launch_socket_server
  brew: brew install launch_socket_server
provenance:
  formula: launch_socket_server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
