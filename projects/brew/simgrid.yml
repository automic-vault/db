id: brew:simgrid
display-name: simgrid
homepage: https://simgrid.org/
repo: https://gitlab.inria.fr/simgrid/simgrid/-/archive/v4.1/simgrid-v4.1.tar.bz2
docs: https://simgrid.org/
package-manager:
  brew: simgrid
  nix: simgrid
package-manager-url: https://formulae.brew.sh/formula/simgrid
version: 4.1
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Studies behavior of large-scale distributed systems
source-archive: https://gitlab.inria.fr/simgrid/simgrid/-/archive/v4.1/simgrid-v4.1.tar.bz2
dependencies:
  - boost
  - graphviz
build-dependencies:
  - cmake
  - doxygen
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: graphicator
  - exposure: global executable
    kind: cli
    name: simgrid-mc
  - exposure: global executable
    kind: cli
    name: simgrid_convert_TI_traces
  - exposure: global executable
    kind: cli
    name: simgrid_update_xml
  - exposure: global executable
    kind: cli
    name: smpicc
  - exposure: global executable
    kind: cli
    name: smpicxx
  - exposure: global executable
    kind: cli
    name: smpirun
  - exposure: global executable
    kind: cli
    name: tesh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:simgrid
  brew: brew install simgrid
  nix: nix profile install nixpkgs#simgrid
provenance:
  formula: simgrid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
