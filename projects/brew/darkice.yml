id: brew:darkice
display-name: darkice
homepage: http://www.darkice.org/
repo: https://github.com/rafael2k/darkice
docs: http://www.darkice.org/
package-manager:
  apk: darkice
  brew: darkice
  debian: darkice
  macports: darkice
  nix: darkice
  ubuntu: darkice
package-manager-url: https://formulae.brew.sh/formula/darkice
version: 1.6
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Live audio streamer
source-archive: https://github.com/rafael2k/darkice/archive/refs/tags/v1.6.tar.gz
dependencies:
  - faac
  - fdk-aac
  - jack
  - lame
  - libogg
  - libsamplerate
  - libvorbis
  - two-lame
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: darkice
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add darkice
  av: sudo av install brew:darkice
  brew: brew install darkice
  debian: sudo apt install darkice
  macports: sudo port install darkice
  nix: nix profile install nixpkgs#darkice
  ubuntu: sudo apt install darkice
provenance:
  formula: darkice
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
