id: brew:onioncat
display-name: onioncat
homepage: https://github.com/rahra/onioncat
repo: https://github.com/rahra/onioncat
docs: https://github.com/rahra/onioncat
package-manager:
  apk: onioncat
  brew: onioncat
  macports: onioncat
  scoop: extras/ocat
  winget: ic005k.OCAuxiliaryTools
  zypper: onioncat
package-manager-url: https://formulae.brew.sh/formula/onioncat
version: 4.11.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: VPN-adapter that provides location privacy using Tor or I2P
source-archive: https://github.com/rahra/onioncat/archive/refs/tags/v4.11.0.tar.gz
dependencies:
  - tor
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: ocat
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add onioncat
  av: sudo av install brew:onioncat
  brew: brew install onioncat
  macports: sudo port install onioncat
  scoop: scoop install extras/ocat
  winget: winget install --id ic005k.OCAuxiliaryTools -e
  zypper: sudo zypper install onioncat
provenance:
  formula: onioncat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
