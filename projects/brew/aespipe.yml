id: brew:aespipe
display-name: aespipe
homepage: https://loop-aes.sourceforge.net/
repo: https://loop-aes.sourceforge.net/aespipe/aespipe-v2.4j.tar.bz2
docs: https://loop-aes.sourceforge.net/
package-manager:
  brew: aespipe
  debian: aespipe
  dnf: aespipe
  nix: aespipe
  ubuntu: aespipe
  zypper: aespipe
package-manager-url: https://formulae.brew.sh/formula/aespipe
version: 2.4j
license: GPL-2.0-or-later
category: security
tags:
  - cli
description: AES encryption or decryption for pipes
source-archive: https://loop-aes.sourceforge.net/aespipe/aespipe-v2.4j.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: aespipe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
