  dnf: sudo dnf install aespipe
  nix: nix profile install nixpkgs#aespipe
  ubuntu: sudo apt install aespipe
  zypper: sudo zypper install aespipe
provenance:
  formula: aespipe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
