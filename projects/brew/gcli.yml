id: brew:gcli
display-name: gcli
homepage: https://herrhotzenplotz.de/gcli/
repo: https://github.com/herrhotzenplotz/gcli
docs: https://herrhotzenplotz.de/gcli/
package-manager:
  apk: gcli
  brew: gcli
  debian: gcli
  macports: gcli
  nix: gcli
  ubuntu: gcli
package-manager-url: https://formulae.brew.sh/formula/gcli
version: 2.11.0
license: BSD-2-Clause
category: development
tags:
  - cli
  - git
description: Portable Git(hub|lab|tea)/Forgejo/Bugzilla CLI tool
source-archive: https://github.com/herrhotzenplotz/gcli/archive/refs/tags/v2.11.0.tar.gz
dependencies:
  - lowdown
  - openssl@3
build-dependencies:
  - pkgconf
  - readline
uses-from-macos:
  - curl
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: gcli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gcli
  av: sudo av install brew:gcli
  brew: brew install gcli
  debian: sudo apt install gcli
  macports: sudo port install gcli
  nix: nix profile install nixpkgs#gcli
  ubuntu: sudo apt install gcli
provenance:
  formula: gcli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
