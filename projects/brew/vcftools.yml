    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vcftools
  brew: brew install vcftools
  debian: sudo apt install vcftools
  dnf: sudo dnf install vcftools
  macports: sudo port install vcftools
  nix: nix profile install nixpkgs#vcftools
  ubuntu: sudo apt install vcftools
provenance:
  formula: vcftools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
