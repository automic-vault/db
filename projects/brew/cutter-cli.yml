id: brew:cutter-cli
display-name: cutter-cli
homepage: https://github.com/clear-code/cutter
repo: https://github.com/clear-code/cutter
docs: https://github.com/clear-code/cutter
package-manager:
  apk: cutter
  brew: cutter-cli
  macports: cutter
  nix: cutter
  pacman: cutter
  scoop: extras/cutter
  winget: Rizin.Cutter
package-manager-url: https://formulae.brew.sh/formula/cutter-cli
version: 1.2.9
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Unit Testing Framework for C and C++
source-archive: https://github.com/clear-code/cutter/archive/refs/tags/1.2.9.tar.gz
dependencies:
  - gettext
  - glib
build-dependencies:
  - autoconf
  - automake
  - gettext
  - gtk-doc
  - intltool
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cut-diff
  - exposure: global executable
    kind: cli
    name: cutter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cutter
  av: sudo av install brew:cutter-cli
  brew: brew install cutter-cli
  macports: sudo port install cutter
  nix: nix profile install nixpkgs#cutter
  pacman: sudo pacman -S cutter
  scoop: scoop install extras/cutter
  winget: winget install --id Rizin.Cutter -e
provenance:
  formula: cutter-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
