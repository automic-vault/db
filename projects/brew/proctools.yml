id: brew:proctools
display-name: proctools
homepage: https://proctools.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/proctools/proctools/0.4pre1/proctools-0.4pre1.tar.gz
docs: https://proctools.sourceforge.net/
package-manager:
  brew: proctools
  macports: proctools
package-manager-url: https://formulae.brew.sh/formula/proctools
version: 0.4pre1
license: BSD-3-Clause AND BSD-4-Clause-UC
category: network
tags:
  - cli
description: OpenBSD and Darwin versions of pgrep, pkill, and pfind
source-archive: >
  https://downloads.sourceforge.net/project/proctools/proctools/0.4pre1/proctools-0.4pre1.tar.gz
build-dependencies:
  - bsdmake
executables:
  - exposure: global executable
    kind: cli
    name: pfind
  - exposure: global executable
    kind: cli
    name: pgrep
  - exposure: global executable
    kind: cli
    name: pkill
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:proctools
  brew: brew install proctools
  macports: sudo port install proctools
provenance:
  formula: proctools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
