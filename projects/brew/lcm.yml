id: brew:lcm
display-name: lcm
homepage: https://lcm-proj.github.io/
repo: https://github.com/lcm-proj/lcm
docs: https://lcm-proj.github.io/
package-manager:
  brew: lcm
  nix: lcm
package-manager-url: https://formulae.brew.sh/formula/lcm
version: 1.5.2
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Libraries and tools for message passing and data marshalling
source-archive: https://github.com/lcm-proj/lcm/archive/refs/tags/v1.5.2.tar.gz
dependencies:
  - glib
  - lua
  - openjdk
  - python@3.14
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: lcm-gen
  - exposure: global executable
    kind: cli
    name: lcm-logger
  - exposure: global executable
    kind: cli
    name: lcm-logplayer
  - exposure: global executable
    kind: cli
    name: lcm-logplayer-gui
  - exposure: global executable
    kind: cli
    name: lcm-spy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lcm
  brew: brew install lcm
  nix: nix profile install nixpkgs#lcm
provenance:
  formula: lcm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
