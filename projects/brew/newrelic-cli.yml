id: brew:newrelic-cli
display-name: newrelic-cli
homepage: https://github.com/newrelic/newrelic-cli
repo: https://github.com/newrelic/newrelic-cli
docs: https://github.com/newrelic/newrelic-cli
package-manager:
  brew: newrelic-cli
  chocolatey: newrelic-cli
package-manager-url: https://formulae.brew.sh/formula/newrelic-cli
version: 0.112.8
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line interface for New Relic
source-archive: https://github.com/newrelic/newrelic-cli/archive/refs/tags/v0.112.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: newrelic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:newrelic-cli
  brew: brew install newrelic-cli
  chocolatey: choco install newrelic-cli
provenance:
  formula: newrelic-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
