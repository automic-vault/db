id: brew:glib
display-name: glib
homepage: https://docs.gtk.org/glib/
repo: https://download.gnome.org/sources/glib/2.88/glib-2.88.1.tar.xz
docs: https://docs.gtk.org/glib/
package-manager:
  apk: glib
  brew: glib
  dnf: glib
  nix: glib
package-manager-url: https://formulae.brew.sh/formula/glib
version: 2.88.1
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Core application library for C
source-archive: https://download.gnome.org/sources/glib/2.88/glib-2.88.1.tar.xz
dependencies:
  - gettext
  - pcre2
build-dependencies:
  - bison
  - gettext
  - meson
  - ninja
  - pkgconf
  - python-setuptools
  - python@3.14
uses-from-macos:
  - libffi
  - python
executables:
  - exposure: global executable
    kind: cli
    name: gapplication
  - exposure: global executable
    kind: cli
    name: gdbus
  - exposure: global executable
    kind: cli
    name: gdbus-codegen
  - exposure: global executable
    kind: cli
    name: gi-compile-repository
  - exposure: global executable
    kind: cli
    name: gi-decompile-typelib
  - exposure: global executable
    kind: cli
    name: gi-inspect-typelib
  - exposure: global executable
    kind: cli
    name: gio
  - exposure: global executable
    kind: cli
    name: gio-querymodules
  - exposure: global executable
    kind: cli
    name: glib-compile-resources
  - exposure: global executable
    kind: cli
    name: glib-compile-schemas
  - exposure: global executable
    kind: cli
    name: glib-genmarshal
  - exposure: global executable
    kind: cli
    name: glib-gettextize
  - exposure: global executable
    kind: cli
    name: glib-mkenums
  - exposure: global executable
    kind: cli
    name: gobject-query
  - exposure: global executable
    kind: cli
    name: gresource
  - exposure: global executable
    kind: cli
    name: gsettings
  - exposure: global executable
    kind: cli
    name: gtester
  - exposure: global executable
    kind: cli
    name: gtester-report
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add glib
  av: sudo av install brew:glib
  brew: brew install glib
  dnf: sudo dnf install glib
  nix: nix profile install nixpkgs#glib
provenance:
  formula: glib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
