id: brew:cek
display-name: cek
homepage: https://github.com/bschaatsbergen/cek
repo: https://github.com/bschaatsbergen/cek
docs: https://github.com/bschaatsbergen/cek
package-manager:
  brew: cek
package-manager-url: https://formulae.brew.sh/formula/cek
version: 0.2.0
license: MIT
category: development
tags:
  - cli
description: Explore the (overlay) filesystem and layers of OCI container images
source-archive: https://github.com/bschaatsbergen/cek/archive/refs/tags/v0.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cek
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cek
  brew: brew install cek
provenance:
  formula: cek
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
