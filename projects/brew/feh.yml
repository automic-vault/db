id: brew:feh
display-name: feh
homepage: https://feh.finalrewind.org/
repo: https://feh.finalrewind.org/feh-3.12.2.tar.bz2
docs: https://feh.finalrewind.org/
package-manager:
  apk: feh
  brew: feh
  debian: feh
  dnf: feh
  macports: feh
  nix: feh
  pacman: feh
  ubuntu: feh
  zypper: feh
package-manager-url: https://formulae.brew.sh/formula/feh
version: 3.12.2
license: MIT-feh
category: media
tags:
  - cli
description: X11 image viewer
source-archive: https://feh.finalrewind.org/feh-3.12.2.tar.bz2
dependencies:
  - imlib2
  - libexif
  - libpng
  - libx11
  - libxinerama
  - libxt
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: feh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add feh
  av: sudo av install brew:feh
  brew: brew install feh
  debian: sudo apt install feh
  dnf: sudo dnf install feh
  macports: sudo port install feh
  nix: nix profile install nixpkgs#feh
  pacman: sudo pacman -S feh
  ubuntu: sudo apt install feh
  zypper: sudo zypper install feh
provenance:
  formula: feh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
