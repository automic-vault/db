id: brew:chaoskube
display-name: chaoskube
homepage: https://github.com/linki/chaoskube
repo: https://github.com/linki/chaoskube
docs: https://github.com/linki/chaoskube
package-manager:
  brew: chaoskube
package-manager-url: https://formulae.brew.sh/formula/chaoskube
version: 0.38.0
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
description: Periodically kills random pods in your Kubernetes cluster
source-archive: https://github.com/linki/chaoskube/archive/refs/tags/v0.38.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: chaoskube
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chaoskube
  brew: brew install chaoskube
provenance:
  formula: chaoskube
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
