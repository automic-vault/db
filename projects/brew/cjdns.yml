id: brew:cjdns
display-name: cjdns
homepage: https://github.com/cjdelisle/cjdns/
repo: https://github.com/cjdelisle/cjdns
docs: https://github.com/cjdelisle/cjdns/
package-manager:
  apk: cjdns
  brew: cjdns
  macports: cjdns
  nix: cjdns
  pacman: cjdns
package-manager-url: https://formulae.brew.sh/formula/cjdns
version: 22.3
license: GPL-3.0-or-later AND GPL-2.0-or-later AND BSD-3-Clause AND MIT
category: security
tags:
  - cli
description: Advanced mesh routing system with cryptographic addressing
source-archive: https://github.com/cjdelisle/cjdns/archive/refs/tags/cjdns-v22.3.tar.gz
dependencies:
  - libsodium
build-dependencies:
  - node
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cjdnstool
  - exposure: global executable
    kind: cli
    name: cjdroute
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cjdns
  av: sudo av install brew:cjdns
  brew: brew install cjdns
  macports: sudo port install cjdns
  nix: nix profile install nixpkgs#cjdns
  pacman: sudo pacman -S cjdns
provenance:
  formula: cjdns
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
