id: brew:slides
display-name: slides
homepage: https://maaslalani.com/slides/
repo: https://github.com/maaslalani/slides
docs: https://maaslalani.com/slides/
package-manager:
  apk: slides
  brew: slides
  macports: slides
  nix: slides
package-manager-url: https://formulae.brew.sh/formula/slides
version: 0.9.0
license: MIT
category: development
tags:
  - cli
description: Terminal based presentation tool
source-archive: https://github.com/maaslalani/slides/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: slides
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add slides
  av: sudo av install brew:slides
  brew: brew install slides
  macports: sudo port install slides
  nix: nix profile install nixpkgs#slides
provenance:
  formula: slides
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
