id: brew:ncmpc
display-name: ncmpc
homepage: https://www.musicpd.org/clients/ncmpc/
repo: https://www.musicpd.org/download/ncmpc/0/ncmpc-0.52.tar.xz
docs: https://www.musicpd.org/clients/ncmpc/
package-manager:
  apk: ncmpc
  brew: ncmpc
  debian: ncmpc
  dnf: ncmpc
  macports: ncmpc
  nix: ncmpc
  pacman: ncmpc
  scoop: extras/ncmpc
  ubuntu: ncmpc
package-manager-url: https://formulae.brew.sh/formula/ncmpc
version: 0.52
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Curses Music Player Daemon (MPD) client
source-archive: https://www.musicpd.org/download/ncmpc/0/ncmpc-0.52.tar.xz
dependencies:
  - fmt
  - gettext
  - libmpdclient
  - pcre2
build-dependencies:
  - boost
  - gettext
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ncmpc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ncmpc
  av: sudo av install brew:ncmpc
  brew: brew install ncmpc
  debian: sudo apt install ncmpc
  dnf: sudo dnf install ncmpc
  macports: sudo port install ncmpc
  nix: nix profile install nixpkgs#ncmpc
  pacman: sudo pacman -S ncmpc
  scoop: scoop install extras/ncmpc
  ubuntu: sudo apt install ncmpc
provenance:
  formula: ncmpc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
