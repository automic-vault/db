id: brew:openmotif
display-name: openmotif
homepage: https://motif.ics.com/motif
repo: >
  https://downloads.sourceforge.net/project/motif/Motif%202.3.8%20Source%20Code/motif-2.3.8.tar.gz
docs: https://motif.ics.com/motif
package-manager:
  apk: mwm
  brew: openmotif
  debian: mwm
  macports: openmotif
  pacman: openmotif
  ubuntu: mwm
package-manager-url: https://formulae.brew.sh/formula/openmotif
version: 2.3.8
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: LGPL release of the Motif toolkit
source-archive: >
  https://downloads.sourceforge.net/project/motif/Motif%202.3.8%20Source%20Code/motif-2.3.8.tar.gz
dependencies:
  - fontconfig
  - freetype
  - jpeg-turbo
  - libice
  - libpng
  - libsm
  - libx11
  - libxext
  - libxft
  - libxmu
  - libxp
  - libxt
  - xbitmaps
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mwm
  - exposure: global executable
    kind: cli
    name: uil
  - exposure: global executable
    kind: cli
    name: xmbind
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mwm
  av: sudo av install brew:openmotif
  brew: brew install openmotif
  debian: sudo apt install mwm
  macports: sudo port install openmotif
  pacman: sudo pacman -S openmotif
  ubuntu: sudo apt install mwm
provenance:
  formula: openmotif
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
