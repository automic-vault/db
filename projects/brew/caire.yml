id: brew:caire
display-name: caire
homepage: https://github.com/esimov/caire
repo: https://github.com/esimov/caire
docs: https://github.com/esimov/caire
package-manager:
  brew: caire
package-manager-url: https://formulae.brew.sh/formula/caire
version: 1.5.0
license: MIT
category: development
tags:
  - cli
description: Content aware image resize tool
source-archive: https://github.com/esimov/caire/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: caire
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:caire
  brew: brew install caire
provenance:
  formula: caire
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
