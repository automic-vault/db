id: brew:kepubify
display-name: kepubify
homepage: https://pgaskin.net/kepubify/
repo: https://github.com/pgaskin/kepubify
docs: https://pgaskin.net/kepubify/
package-manager:
  brew: kepubify
  nix: kepubify
package-manager-url: https://formulae.brew.sh/formula/kepubify
version: 4.0.4
license: MIT
category: development
tags:
  - cli
description: Convert ebooks from epub to kepub
source-archive: https://github.com/pgaskin/kepubify/archive/refs/tags/v4.0.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: covergen
  - exposure: global executable
    kind: cli
    name: kepubify
  - exposure: global executable
    kind: cli
    name: seriesmeta
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kepubify
  brew: brew install kepubify
  nix: nix profile install nixpkgs#kepubify
provenance:
  formula: kepubify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
