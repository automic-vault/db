id: brew:ripgrep-all
display-name: ripgrep-all
homepage: https://github.com/phiresky/ripgrep-all
repo: https://github.com/phiresky/ripgrep-all
docs: https://github.com/phiresky/ripgrep-all
package-manager:
  brew: ripgrep-all
  macports: ripgrep-all
  nix: ripgrep-all
  pacman: ripgrep-all
  scoop: main/rga
package-manager-url: https://formulae.brew.sh/formula/ripgrep-all
version: 0.10.10
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Wrapper around ripgrep that adds multiple rich file types
source-archive: https://github.com/phiresky/ripgrep-all/archive/refs/tags/v0.10.10.tar.gz
dependencies:
  - ripgrep
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rga
  - exposure: global executable
    kind: cli
    name: rga-fzf
  - exposure: global executable
    kind: cli
    name: rga-fzf-open
  - exposure: global executable
    kind: cli
    name: rga-preproc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ripgrep-all
  brew: brew install ripgrep-all
  macports: sudo port install ripgrep-all
  nix: nix profile install nixpkgs#ripgrep-all
  pacman: sudo pacman -S ripgrep-all
  scoop: scoop install main/rga
provenance:
  formula: ripgrep-all
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
