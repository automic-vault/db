id: brew:veryfasttree
display-name: veryfasttree
homepage: https://github.com/citiususc/veryfasttree
repo: https://github.com/citiususc/veryfasttree
docs: https://github.com/citiususc/veryfasttree
package-manager:
  brew: veryfasttree
  debian: veryfasttree
  macports: veryfasttree
  nix: veryfasttree
  ubuntu: veryfasttree
package-manager-url: https://formulae.brew.sh/formula/veryfasttree
version: 4.0.5
license: GPL-3.0-only AND BSD-3-Clause AND MPL-2.0
category: development
tags:
  - cli
description: Efficient phylogenetic tree inference for massive taxonomic datasets
source-archive: https://github.com/citiususc/veryfasttree/archive/refs/tags/v4.0.5.tar.gz
dependencies:
  - libomp
build-dependencies:
  - boost
  - cmake
  - robin-map
  - xxhash
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: VeryFastTree
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:veryfasttree
  brew: brew install veryfasttree
  debian: sudo apt install veryfasttree
  macports: sudo port install veryfasttree
  nix: nix profile install nixpkgs#veryfasttree
  ubuntu: sudo apt install veryfasttree
provenance:
  formula: veryfasttree
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
