id: brew:docker-agent
display-name: docker-agent
homepage: https://docker.github.io/docker-agent/
repo: https://github.com/docker/docker-agent
docs: https://docker.github.io/docker-agent/
package-manager:
  brew: docker-agent
  winget: Docker.Agent
package-manager-url: https://formulae.brew.sh/formula/docker-agent
version: 1.66.0
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: Agent Builder and Runtime by Docker Engineering
source-archive: https://github.com/docker/docker-agent/archive/refs/tags/v1.66.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: docker-agent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:docker-agent
  brew: brew install docker-agent
  winget: winget install --id Docker.Agent -e
provenance:
  formula: docker-agent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
