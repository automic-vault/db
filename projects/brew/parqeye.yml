id: brew:parqeye
display-name: parqeye
homepage: https://github.com/kaushiksrini/parqeye
repo: https://github.com/kaushiksrini/parqeye
docs: https://github.com/kaushiksrini/parqeye
package-manager:
  brew: parqeye
  macports: parqeye
package-manager-url: https://formulae.brew.sh/formula/parqeye
version: 0.0.2
license: MIT
category: development
tags:
  - cli
description: Peek inside Parquet files right from your terminal
source-archive: https://github.com/kaushiksrini/parqeye/archive/refs/tags/v0.0.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: parqeye
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:parqeye
  brew: brew install parqeye
  macports: sudo port install parqeye
provenance:
  formula: parqeye
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
