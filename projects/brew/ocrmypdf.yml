id: brew:ocrmypdf
display-name: ocrmypdf
homepage: https://ocrmypdf.readthedocs.io/en/latest/
repo: >
  https://files.pythonhosted.org/packages/6a/ba/26dd03706f5f387acb5d0e11d33dbe716f5cbce95e033e68404636eb3de5/ocrmypdf-17.4.2.tar.gz
docs: https://ocrmypdf.readthedocs.io/en/latest/
package-manager:
  apk: ocrmypdf
  brew: ocrmypdf
  debian: ocrmypdf
  dnf: ocrmypdf
  macports: ocrmypdf
  nix: ocrmypdf
  ubuntu: ocrmypdf
package-manager-url: https://formulae.brew.sh/formula/ocrmypdf
version: 17.4.2
license: MPL-2.0
category: network
tags:
  - cli
description: Adds an OCR text layer to scanned PDF files
source-archive: >
  https://files.pythonhosted.org/packages/6a/ba/26dd03706f5f387acb5d0e11d33dbe716f5cbce95e033e68404636eb3de5/ocrmypdf-17.4.2.tar.gz
dependencies:
  - cryptography
  - freetype
  - ghostscript
  - img2pdf
  - jbig2enc
  - libheif
  - libpng
  - pillow
  - pngquant
  - pybind11
  - pydantic
  - python@3.14
  - qpdf
  - tesseract
  - unpaper
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - libffi
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: ocrmypdf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ocrmypdf
  av: sudo av install brew:ocrmypdf
  brew: brew install ocrmypdf
  debian: sudo apt install ocrmypdf
  dnf: sudo dnf install ocrmypdf
  macports: sudo port install ocrmypdf
  nix: nix profile install nixpkgs#ocrmypdf
  ubuntu: sudo apt install ocrmypdf
provenance:
  formula: ocrmypdf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
