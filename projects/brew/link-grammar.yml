id: brew:link-grammar
display-name: link-grammar
homepage: https://github.com/opencog/link-grammar
repo: https://github.com/opencog/link-grammar
docs: https://github.com/opencog/link-grammar
package-manager:
  brew: link-grammar
  debian: link-grammar
  dnf: link-grammar
  macports: link-grammar
  nix: link-grammar
  pacman: link-grammar
  ubuntu: link-grammar
  zypper: link-grammar
package-manager-url: https://formulae.brew.sh/formula/link-grammar
version: 5.13.0
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Carnegie Mellon University's link grammar parser
source-archive: https://github.com/opencog/link-grammar/archive/refs/tags/link-grammar-5.13.0.tar.gz
build-dependencies:
  - ant
  - autoconf
  - autoconf-archive
  - automake
  - libtool
  - pkgconf
  - python@3.14
  - swig
uses-from-macos:
  - libedit
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: link-generator
  - exposure: global executable
    kind: cli
    name: link-parser
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:link-grammar
  brew: brew install link-grammar
  debian: sudo apt install link-grammar
  dnf: sudo dnf install link-grammar
  macports: sudo port install link-grammar
  nix: nix profile install nixpkgs#link-grammar
  pacman: sudo pacman -S link-grammar
  ubuntu: sudo apt install link-grammar
  zypper: sudo zypper install link-grammar
provenance:
  formula: link-grammar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
