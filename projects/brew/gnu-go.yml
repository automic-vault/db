id: brew:gnu-go
display-name: gnu-go
homepage: https://www.gnu.org/software/gnugo/gnugo.html
repo: https://ftpmirror.gnu.org/gnu/gnugo/gnugo-3.8.tar.gz
docs: https://www.gnu.org/software/gnugo/gnugo.html
package-manager:
  brew: gnu-go
  debian: gnugo
  dnf: gnugo
  macports: gnugo
  nix: gnugo
  pacman: gnugo
  ubuntu: gnugo
  zypper: gnugo
package-manager-url: https://formulae.brew.sh/formula/gnu-go
version: 3.8
license: >
  GPL-3.0-or-later AND LicenseRef-Homebrew-public-domain AND
  LicenseRef-Homebrew-cannot-represent
category: network
tags:
  - cli
description: Plays the game of Go
source-archive: https://ftpmirror.gnu.org/gnu/gnugo/gnugo-3.8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: gnugo
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gnu-go
  brew: brew install gnu-go
  debian: sudo apt install gnugo
  dnf: sudo dnf install gnugo
  macports: sudo port install gnugo
  nix: nix profile install nixpkgs#gnugo
  pacman: sudo pacman -S gnugo
  ubuntu: sudo apt install gnugo
  zypper: sudo zypper install gnugo
provenance:
  formula: gnu-go
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
