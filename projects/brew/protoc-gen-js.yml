id: brew:protoc-gen-js
display-name: protoc-gen-js
homepage: https://github.com/protocolbuffers/protobuf-javascript
repo: https://github.com/protocolbuffers/protobuf-javascript
docs: https://github.com/protocolbuffers/protobuf-javascript
package-manager:
  apk: protoc-gen-js
  brew: protoc-gen-js
  nix: protoc-gen-js
package-manager-url: https://formulae.brew.sh/formula/protoc-gen-js
version: 4.0.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Protocol buffers JavaScript generator plugin
source-archive: https://github.com/protocolbuffers/protobuf-javascript/archive/refs/tags/v4.0.2.tar.gz
dependencies:
  - abseil
  - protobuf
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: protoc-gen-js
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add protoc-gen-js
  av: sudo av install brew:protoc-gen-js
  brew: brew install protoc-gen-js
  nix: nix profile install nixpkgs#protoc-gen-js
provenance:
  formula: protoc-gen-js
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
