id: brew:clangql
display-name: clangql
homepage: https://github.com/AmrDeveloper/ClangQL
repo: https://github.com/AmrDeveloper/ClangQL
docs: https://github.com/AmrDeveloper/ClangQL
package-manager:
  brew: clangql
package-manager-url: https://formulae.brew.sh/formula/clangql
version: 0.23.0
license: MIT
category: database
tags:
  - cli
description: Run a SQL like language to perform queries on C/C++ files
source-archive: https://github.com/AmrDeveloper/ClangQL/archive/refs/tags/0.23.0.tar.gz
dependencies:
  - llvm
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: clangql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clangql
  brew: brew install clangql
provenance:
  formula: clangql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
