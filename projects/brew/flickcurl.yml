id: brew:flickcurl
display-name: flickcurl
homepage: https://librdf.org/flickcurl/
repo: https://download.dajobe.org/flickcurl/flickcurl-1.26.tar.gz
docs: https://librdf.org/flickcurl/
package-manager:
  apk: flickcurl
  brew: flickcurl
  dnf: flickcurl
  macports: flickcurl
  pacman: flickcurl
  zypper: flickcurl
package-manager-url: https://formulae.brew.sh/formula/flickcurl
version: 1.26
license: GPL-2.0-or-later OR LGPL-2.1-or-later
category: network
tags:
  - cli
description: Library for the Flickr API
source-archive: https://download.dajobe.org/flickcurl/flickcurl-1.26.tar.gz
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: flickcurl
  - exposure: global executable
    kind: cli
    name: flickcurl-config
  - exposure: global executable
    kind: cli
    name: flickrdf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add flickcurl
  av: sudo av install brew:flickcurl
  brew: brew install flickcurl
  dnf: sudo dnf install flickcurl
  macports: sudo port install flickcurl
  pacman: sudo pacman -S flickcurl
  zypper: sudo zypper install flickcurl
provenance:
  formula: flickcurl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
