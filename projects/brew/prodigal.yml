id: brew:prodigal
display-name: prodigal
homepage: https://github.com/hyattpd/Prodigal
repo: https://github.com/hyattpd/Prodigal
docs: https://github.com/hyattpd/Prodigal
package-manager:
  brew: prodigal
  debian: prodigal
  nix: prodigal
  ubuntu: prodigal
package-manager-url: https://formulae.brew.sh/formula/prodigal
version: 2.6.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Microbial gene prediction
source-archive: https://github.com/hyattpd/Prodigal/archive/refs/tags/v2.6.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: prodigal
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:prodigal
  brew: brew install prodigal
  debian: sudo apt install prodigal
  nix: nix profile install nixpkgs#prodigal
  ubuntu: sudo apt install prodigal
provenance:
  formula: prodigal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
