id: brew:squealer
display-name: squealer
homepage: https://github.com/owenrumney/squealer
repo: https://github.com/owenrumney/squealer
docs: https://github.com/owenrumney/squealer
package-manager:
  brew: squealer
package-manager-url: https://formulae.brew.sh/formula/squealer
version: 1.2.12
license: Apache-2.0
category: security
tags:
  - cli
  - git
description: Scans Git repositories or filesystems for secrets in commit histories
source-archive: https://github.com/owenrumney/squealer/archive/refs/tags/v1.2.12.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: squealer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:squealer
  brew: brew install squealer
provenance:
  formula: squealer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
