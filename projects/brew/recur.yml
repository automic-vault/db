id: brew:recur
display-name: recur
homepage: https://github.com/dbohdan/recur
repo: https://github.com/dbohdan/recur
docs: https://github.com/dbohdan/recur
package-manager:
  brew: recur
package-manager-url: https://formulae.brew.sh/formula/recur
version: 3.3.0
license: MIT
category: development
tags:
  - cli
description: Retry a command with exponential backoff and jitter
source-archive: https://github.com/dbohdan/recur/archive/refs/tags/v3.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: recur
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:recur
  brew: brew install recur
provenance:
  formula: recur
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
