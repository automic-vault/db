id: brew:xcbeautify
display-name: xcbeautify
homepage: https://github.com/cpisciotta/xcbeautify
repo: https://github.com/cpisciotta/xcbeautify
docs: https://github.com/cpisciotta/xcbeautify
package-manager:
  brew: xcbeautify
  macports: xcbeautify
  nix: xcbeautify
package-manager-url: https://formulae.brew.sh/formula/xcbeautify
version: 3.2.1
license: MIT
category: development
tags:
  - cli
description: Little beautifier tool for xcodebuild
source-archive: https://github.com/cpisciotta/xcbeautify/archive/refs/tags/3.2.1.tar.gz
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: xcbeautify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xcbeautify
  brew: brew install xcbeautify
  macports: sudo port install xcbeautify
  nix: nix profile install nixpkgs#xcbeautify
provenance:
  formula: xcbeautify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
