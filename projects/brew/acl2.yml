id: brew:acl2
display-name: acl2
homepage: https://www.cs.utexas.edu/~moore/acl2/
repo: https://github.com/acl2/acl2
docs: https://www.cs.utexas.edu/~moore/acl2/
package-manager:
  brew: acl2
  debian: acl2
  macports: acl2
  nix: acl2
  ubuntu: acl2
package-manager-url: https://formulae.brew.sh/formula/acl2
version: 8.7
license: BSD-3-Clause
category: development
tags:
  - cli
description: Logic and programming language in which you can model computer systems
source-archive: https://github.com/acl2/acl2/archive/refs/tags/8.7.tar.gz
dependencies:
  - sbcl
executables:
  - exposure: global executable
    kind: cli
    name: acl2
  - exposure: global executable
    kind: cli
    name: acl2p
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:acl2
  brew: brew install acl2
  debian: sudo apt install acl2
  macports: sudo port install acl2
  nix: nix profile install nixpkgs#acl2
  ubuntu: sudo apt install acl2
provenance:
  formula: acl2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
