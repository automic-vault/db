id: brew:cassandra-reaper
display-name: cassandra-reaper
homepage: https://cassandra-reaper.io/
repo: https://github.com/thelastpickle/cassandra-reaper
docs: https://cassandra-reaper.io/
package-manager:
  brew: cassandra-reaper
package-manager-url: https://formulae.brew.sh/formula/cassandra-reaper
version: 4.2.3
license: Apache-2.0
category: development
tags:
  - cli
description: Management interface for Cassandra
source-archive: >
  https://github.com/thelastpickle/cassandra-reaper/releases/download/4.2.3/cassandra-reaper-4.2.3-release.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: cassandra-reaper
  - exposure: global executable
    kind: cli
    name: spreaper
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:cassandra-reaper
  brew: brew install cassandra-reaper
provenance:
  formula: cassandra-reaper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
