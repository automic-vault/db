id: brew:pssh
display-name: pssh
homepage: https://github.com/lilydjwg/pssh
repo: https://github.com/lilydjwg/pssh
docs: https://github.com/lilydjwg/pssh
package-manager:
  apk: pssh
  brew: pssh
  debian: pssh
  dnf: pssh
  macports: pssh
  nix: pssh
  ubuntu: pssh
  zypper: pssh
package-manager-url: https://formulae.brew.sh/formula/pssh
version: 2.3.6
license: BSD-3-Clause
category: development
tags:
  - cli
description: Parallel versions of OpenSSH and related tools
source-archive: https://github.com/lilydjwg/pssh/archive/refs/tags/v2.3.6.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: pnuke
  - exposure: global executable
    kind: cli
    name: prsync
  - exposure: global executable
    kind: cli
    name: pslurp
  - exposure: global executable
    kind: cli
    name: pssh
  - exposure: global executable
    kind: cli
    name: pssh-askpass
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pssh
  av: sudo av install brew:pssh
  brew: brew install pssh
  debian: sudo apt install pssh
  dnf: sudo dnf install pssh
  macports: sudo port install pssh
  nix: nix profile install nixpkgs#pssh
  ubuntu: sudo apt install pssh
  zypper: sudo zypper install pssh
provenance:
  formula: pssh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
