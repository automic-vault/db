id: brew:eslint
display-name: eslint
homepage: https://eslint.org
repo: https://registry.npmjs.org/eslint/-/eslint-10.4.0.tgz
docs: https://eslint.org
package-manager:
  brew: eslint
  debian: eslint
  nix: eslint
  pacman: eslint
  ubuntu: eslint
package-manager-url: https://formulae.brew.sh/formula/eslint
version: 10.4.0
license: MIT
category: development
tags:
  - cli
description: AST-based pattern checker for JavaScript
source-archive: https://registry.npmjs.org/eslint/-/eslint-10.4.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: eslint
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:eslint
  brew: brew install eslint
  debian: sudo apt install eslint
  nix: nix profile install nixpkgs#eslint
  pacman: sudo pacman -S eslint
  ubuntu: sudo apt install eslint
provenance:
  formula: eslint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
