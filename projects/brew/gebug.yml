id: brew:gebug
display-name: gebug
homepage: https://github.com/moshebe/gebug
repo: https://github.com/moshebe/gebug
docs: https://github.com/moshebe/gebug
package-manager:
  brew: gebug
package-manager-url: https://formulae.brew.sh/formula/gebug
version: 1.0.7
license: Apache-2.0
category: development
tags:
  - cli
description: Debug Dockerized Go applications better
source-archive: https://github.com/moshebe/gebug/archive/refs/tags/v1.0.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gebug
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gebug
  brew: brew install gebug
provenance:
  formula: gebug
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
