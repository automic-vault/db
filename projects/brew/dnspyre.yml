id: brew:dnspyre
display-name: dnspyre
homepage: https://tantalor93.github.io/dnspyre/
repo: https://github.com/Tantalor93/dnspyre
docs: https://tantalor93.github.io/dnspyre/
package-manager:
  brew: dnspyre
package-manager-url: https://formulae.brew.sh/formula/dnspyre
version: 3.11.1
license: MIT
category: development
