id: brew:todoist-cli
display-name: todoist-cli
homepage: https://github.com/Doist/todoist-cli
repo: https://registry.npmjs.org/@doist/todoist-cli/-/todoist-cli-1.69.2.tgz
docs: https://github.com/Doist/todoist-cli
package-manager:
  brew: todoist-cli
  macports: todoist-cli
  nix: td
package-manager-url: https://formulae.brew.sh/formula/todoist-cli
version: 1.69.2
license: MIT
category: development
tags:
  - cli
description: Official command-line interface for Todoist
source-archive: https://registry.npmjs.org/@doist/todoist-cli/-/todoist-cli-1.69.2.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: td
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Looking for the third-party Go CLI previously published under this name (by
    sachaos)? It has been renamed. Install it with: brew install todoist-cli-go
  post-install-defined: false
install-lines:
  av: sudo av install brew:todoist-cli
  brew: brew install todoist-cli
  macports: sudo port install todoist-cli
  nix: nix profile install nixpkgs#td
provenance:
  formula: todoist-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
