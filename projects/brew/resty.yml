id: brew:resty
display-name: resty
homepage: https://github.com/micha/resty
repo: https://github.com/micha/resty
docs: https://github.com/micha/resty
package-manager:
  brew: resty
package-manager-url: https://formulae.brew.sh/formula/resty
version: 3.0
license: MIT
category: development
tags:
  - cli
description: Command-line REST client that can be used in pipelines
source-archive: https://github.com/micha/resty/archive/refs/tags/v3.0.tar.gz
uses-from-macos:
  - perl
  - python
executables:
  - exposure: global executable
    kind: cli
    name: pypp
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To activate the resty, add the following to your shell profile e.g. ~/.profile or
    ~/.zshrc: source $HOMEBREW_PREFIX/opt/resty/share/resty/resty
  post-install-defined: false
install-lines:
  av: sudo av install brew:resty
  brew: brew install resty
provenance:
  formula: resty
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
