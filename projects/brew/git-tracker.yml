id: brew:git-tracker
display-name: git-tracker
homepage: https://github.com/stevenharman/git_tracker
repo: https://github.com/stevenharman/git_tracker
docs: https://github.com/stevenharman/git_tracker
package-manager:
  brew: git-tracker
package-manager-url: https://formulae.brew.sh/formula/git-tracker
version: 2.0.0
license: MIT
category: development
tags:
  - cli
  - git
description: Integrate Pivotal Tracker into your Git workflow
source-archive: https://github.com/stevenharman/git_tracker/archive/refs/tags/v2.0.0.tar.gz
uses-from-macos:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: git-tracker
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-tracker
  brew: brew install git-tracker
provenance:
  formula: git-tracker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
