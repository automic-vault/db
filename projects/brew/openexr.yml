id: brew:openexr
display-name: openexr
homepage: https://www.openexr.com/
repo: https://github.com/AcademySoftwareFoundation/openexr
docs: https://www.openexr.com/
package-manager:
  apk: openexr
  brew: openexr
  debian: openexr
  dnf: openexr
  macports: openexr
  nix: openexr
  pacman: openexr
  ubuntu: openexr
  zypper: openexr
package-manager-url: https://formulae.brew.sh/formula/openexr
version: 3.4.12
license: BSD-3-Clause
category: development
tags:
  - cli
description: High dynamic-range image file format
source-archive: https://github.com/AcademySoftwareFoundation/openexr/archive/refs/tags/v3.4.12.tar.gz
dependencies:
  - imath
  - libdeflate
  - openjph
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: exr2aces
  - exposure: global executable
    kind: cli
    name: exrenvmap
  - exposure: global executable
    kind: cli
    name: exrheader
  - exposure: global executable
    kind: cli
    name: exrinfo
  - exposure: global executable
    kind: cli
    name: exrmakepreview
  - exposure: global executable
    kind: cli
    name: exrmaketiled
  - exposure: global executable
    kind: cli
    name: exrmanifest
  - exposure: global executable
    kind: cli
    name: exrmetrics
  - exposure: global executable
    kind: cli
    name: exrmultipart
  - exposure: global executable
    kind: cli
    name: exrmultiview
  - exposure: global executable
    kind: cli
    name: exrstdattr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add openexr
  av: sudo av install brew:openexr
  brew: brew install openexr
  debian: sudo apt install openexr
  dnf: sudo dnf install openexr
  macports: sudo port install openexr
  nix: nix profile install nixpkgs#openexr
  pacman: sudo pacman -S openexr
  ubuntu: sudo apt install openexr
  zypper: sudo zypper install openexr
provenance:
  formula: openexr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
