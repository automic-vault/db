id: brew:teamtype
display-name: teamtype
homepage: https://github.com/teamtype/teamtype
repo: https://github.com/teamtype/teamtype
docs: https://github.com/teamtype/teamtype
package-manager:
  brew: teamtype
  nix: teamtype
  pacman: teamtype
package-manager-url: https://formulae.brew.sh/formula/teamtype
version: 0.9.1
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Peer-to-peer, editor-agnostic collaborative editing of local text files
source-archive: https://github.com/teamtype/teamtype/archive/refs/tags/v0.9.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: teamtype
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:teamtype
  brew: brew install teamtype
  nix: nix profile install nixpkgs#teamtype
  pacman: sudo pacman -S teamtype
provenance:
  formula: teamtype
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
