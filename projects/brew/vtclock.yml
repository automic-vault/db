id: brew:vtclock
display-name: vtclock
homepage: https://github.com/dse/vtclock
repo: https://github.com/dse/vtclock
docs: https://github.com/dse/vtclock
package-manager:
  brew: vtclock
package-manager-url: https://formulae.brew.sh/formula/vtclock
version: 0.99.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Text-mode fullscreen digital clock
source-archive: https://github.com/dse/vtclock/archive/refs/tags/v0.99.1.tar.gz
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: vtclock
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vtclock
  brew: brew install vtclock
provenance:
  formula: vtclock
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
