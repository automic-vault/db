id: brew:scalaenv
display-name: scalaenv
homepage: https://github.com/scalaenv/scalaenv
repo: https://github.com/scalaenv/scalaenv
docs: https://github.com/scalaenv/scalaenv
package-manager:
  brew: scalaenv
package-manager-url: https://formulae.brew.sh/formula/scalaenv
version: 0.1.14
license: MIT
category: development
tags:
  - cli
description: Command-line tool to manage Scala environments
source-archive: https://github.com/scalaenv/scalaenv/archive/refs/tags/version/0.1.14.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: scala-build
  - exposure: global executable
    kind: cli
    name: scalaenv
  - exposure: global executable
    kind: cli
    name: scalaenv-install
  - exposure: global executable
    kind: cli
    name: scalaenv-uninstall
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:scalaenv
  brew: brew install scalaenv
provenance:
  formula: scalaenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
