id: brew:libxmlsec1
display-name: libxmlsec1
homepage: https://www.aleksey.com/xmlsec/
repo: https://github.com/lsh123/xmlsec
docs: https://www.aleksey.com/xmlsec/
package-manager:
  brew: libxmlsec1
  debian: xmlsec1
  dnf: xmlsec1
  ubuntu: xmlsec1
  zypper: xmlsec1
package-manager-url: https://formulae.brew.sh/formula/libxmlsec1
version: 1.3.11
license: MIT
category: security
tags:
  - cli
  - security
description: XML security library
source-archive: https://github.com/lsh123/xmlsec/releases/download/1.3.11/xmlsec1-1.3.11.tar.gz
dependencies:
  - gnutls
  - libxml2
  - openssl@3
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: xmlsec1
  - exposure: global executable
    kind: cli
    name: xmlsec1-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libxmlsec1
  brew: brew install libxmlsec1
  debian: sudo apt install xmlsec1
  dnf: sudo dnf install xmlsec1
  ubuntu: sudo apt install xmlsec1
  zypper: sudo zypper install xmlsec1
provenance:
  formula: libxmlsec1
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
