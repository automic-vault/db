id: brew:creduce
display-name: creduce
homepage: https://github.com/csmith-project/creduce
repo: https://github.com/csmith-project/creduce
docs: https://github.com/csmith-project/creduce
package-manager:
  brew: creduce
  debian: creduce
  macports: creduce
  nix: creduce
  ubuntu: creduce
package-manager-url: https://formulae.brew.sh/formula/creduce
version: 2.10.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Reduce a C/C++ program while keeping a property of interest
source-archive: https://github.com/csmith-project/creduce/archive/refs/tags/creduce-2.10.0.tar.gz
dependencies:
  - astyle
  - llvm@20
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: creduce
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:creduce
  brew: brew install creduce
  debian: sudo apt install creduce
  macports: sudo port install creduce
  nix: nix profile install nixpkgs#creduce
  ubuntu: sudo apt install creduce
provenance:
  formula: creduce
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
