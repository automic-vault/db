id: brew:pbzip2
display-name: pbzip2
homepage: http://compression.great-site.net/pbzip2/
repo: https://launchpad.net/pbzip2/1.1/1.1.13/+download/pbzip2-1.1.13.tar.gz
docs: http://compression.great-site.net/pbzip2/
package-manager:
  brew: pbzip2
  debian: pbzip2
  dnf: pbzip2
  macports: pbzip2
  nix: pbzip2
  pacman: pbzip2
  ubuntu: pbzip2
  zypper: pbzip2
package-manager-url: https://formulae.brew.sh/formula/pbzip2
version: 1.1.13
license: bzip2-1.0.6
category: network
tags:
  - cli
description: Parallel bzip2
source-archive: https://launchpad.net/pbzip2/1.1/1.1.13/+download/pbzip2-1.1.13.tar.gz
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: pbunzip2
  - exposure: global executable
    kind: cli
    name: pbzcat
  - exposure: global executable
    kind: cli
    name: pbzip2
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pbzip2
  brew: brew install pbzip2
  debian: sudo apt install pbzip2
  dnf: sudo dnf install pbzip2
  macports: sudo port install pbzip2
  nix: nix profile install nixpkgs#pbzip2
  pacman: sudo pacman -S pbzip2
  ubuntu: sudo apt install pbzip2
  zypper: sudo zypper install pbzip2
provenance:
  formula: pbzip2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
