id: brew:aws-spiffe-workload-helper
display-name: aws-spiffe-workload-helper
homepage: https://github.com/spiffe/aws-spiffe-workload-helper
repo: https://github.com/spiffe/aws-spiffe-workload-helper
docs: https://github.com/spiffe/aws-spiffe-workload-helper
package-manager:
  brew: aws-spiffe-workload-helper
package-manager-url: https://formulae.brew.sh/formula/aws-spiffe-workload-helper
version: 0.0.5
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: Helper for providing AWS credentials to workloads using their SPIFFE identity
source-archive: https://github.com/spiffe/aws-spiffe-workload-helper/archive/refs/tags/v0.0.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aws-spiffe-workload-helper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aws-spiffe-workload-helper
  brew: brew install aws-spiffe-workload-helper
provenance:
  formula: aws-spiffe-workload-helper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
