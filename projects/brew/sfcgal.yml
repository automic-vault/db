id: brew:sfcgal
display-name: sfcgal
homepage: https://sfcgal.gitlab.io/SFCGAL/
repo: https://gitlab.com/sfcgal/SFCGAL/-/archive/v2.2.0/SFCGAL-v2.2.0.tar.gz
docs: https://sfcgal.gitlab.io/SFCGAL/
package-manager:
  apk: sfcgal
  brew: sfcgal
  dnf: SFCGAL
  macports: sfcgal
  nix: sfcgal
  zypper: sfcgal
package-manager-url: https://formulae.brew.sh/formula/sfcgal
version: 2.2.0
license: LGPL-2.0-or-later
category: development
tags:
  - cli
description: C++ wrapper library around CGAL
source-archive: https://gitlab.com/sfcgal/SFCGAL/-/archive/v2.2.0/SFCGAL-v2.2.0.tar.gz
dependencies:
  - boost
  - cgal
  - gmp
  - mpfr
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: sfcgal-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sfcgal
  av: sudo av install brew:sfcgal
  brew: brew install sfcgal
  dnf: sudo dnf install SFCGAL
  macports: sudo port install sfcgal
  nix: nix profile install nixpkgs#sfcgal
  zypper: sudo zypper install sfcgal
provenance:
  formula: sfcgal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
