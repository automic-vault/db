id: brew:tz
display-name: tz
homepage: https://github.com/oz/tz
repo: https://github.com/oz/tz
docs: https://github.com/oz/tz
package-manager:
  apk: tz
  brew: tz
  nix: tz
package-manager-url: https://formulae.brew.sh/formula/tz
version: 0.8.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: CLI time zone visualizer
source-archive: https://github.com/oz/tz/archive/refs/tags/v0.8.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tz
  av: sudo av install brew:tz
  brew: brew install tz
  nix: nix profile install nixpkgs#tz
provenance:
  formula: tz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
