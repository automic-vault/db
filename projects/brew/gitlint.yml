id: brew:gitlint
display-name: gitlint
homepage: https://jorisroovers.com/gitlint/
repo: >
  https://files.pythonhosted.org/packages/73/51/b59270264aabcab5b933f3eb9bfb022464ca9205b04feef1bdc1635fd9b4/gitlint_core-0.19.1.tar.gz
docs: https://jorisroovers.com/gitlint/
package-manager:
  apk: gitlint
  brew: gitlint
  debian: gitlint
  dnf: gitlint
  macports: gitlint
  nix: gitlint
  ubuntu: gitlint
package-manager-url: https://formulae.brew.sh/formula/gitlint
version: 0.19.1
license: MIT
category: development
tags:
  - cli
  - git
description: Linting for your git commit messages
source-archive: >
  https://files.pythonhosted.org/packages/73/51/b59270264aabcab5b933f3eb9bfb022464ca9205b04feef1bdc1635fd9b4/gitlint_core-0.19.1.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: gitlint
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gitlint
  av: sudo av install brew:gitlint
  brew: brew install gitlint
  debian: sudo apt install gitlint
  dnf: sudo dnf install gitlint
  macports: sudo port install gitlint
  nix: nix profile install nixpkgs#gitlint
  ubuntu: sudo apt install gitlint
provenance:
  formula: gitlint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
