id: brew:dtop
display-name: dtop
homepage: https://dtop.dev/
repo: https://github.com/amir20/dtop
docs: https://dtop.dev/
package-manager:
  brew: dtop
  nix: dtop
package-manager-url: https://formulae.brew.sh/formula/dtop
version: 0.7.6
license: MIT
category: development
tags:
  - cli
  - docker
description: Terminal dashboard for Docker monitoring across multiple hosts
source-archive: https://github.com/amir20/dtop/archive/refs/tags/v0.7.6.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dtop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dtop
  brew: brew install dtop
  nix: nix profile install nixpkgs#dtop
provenance:
  formula: dtop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
