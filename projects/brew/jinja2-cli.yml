id: brew:jinja2-cli
display-name: jinja2-cli
homepage: https://github.com/mattrobenolt/jinja2-cli
repo: >
  https://files.pythonhosted.org/packages/91/b3/19afd8cfe9b6664fcc200befbc71a393cbbe343bb76a6acbeff1709d0c83/jinja2_cli-1.0.1.tar.gz
docs: https://github.com/mattrobenolt/jinja2-cli
package-manager:
  apk: jinja2-cli
  brew: jinja2-cli
  nix: jinja2-cli
package-manager-url: https://formulae.brew.sh/formula/jinja2-cli
version: 1.0.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: CLI for the Jinja2 templating language
source-archive: >
  https://files.pythonhosted.org/packages/91/b3/19afd8cfe9b6664fcc200befbc71a393cbbe343bb76a6acbeff1709d0c83/jinja2_cli-1.0.1.tar.gz
dependencies:
  - libyaml
  - python@3.14
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: jinja2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jinja2-cli
  av: sudo av install brew:jinja2-cli
  brew: brew install jinja2-cli
  nix: nix profile install nixpkgs#jinja2-cli
provenance:
  formula: jinja2-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
