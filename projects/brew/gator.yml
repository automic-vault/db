id: brew:gator
display-name: gator
homepage: https://open-policy-agent.github.io/gatekeeper/
repo: https://github.com/open-policy-agent/gatekeeper
docs: https://open-policy-agent.github.io/gatekeeper/
package-manager:
  brew: gator
package-manager-url: https://formulae.brew.sh/formula/gator
version: 3.22.2
license: Apache-2.0
category: development
tags:
  - cli
description: CLI Utility for Open Policy Agent Gatekeeper
source-archive: https://github.com/open-policy-agent/gatekeeper/archive/refs/tags/v3.22.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gator
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gator
  brew: brew install gator
provenance:
  formula: gator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
