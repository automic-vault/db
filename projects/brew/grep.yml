id: brew:grep
display-name: grep
homepage: https://www.gnu.org/software/grep/
repo: https://ftpmirror.gnu.org/gnu/grep/grep-3.12.tar.xz
docs: https://www.gnu.org/software/grep/
package-manager:
  apk: grep
  brew: grep
  chocolatey: grep
  debian: grep
  dnf: grep
  macports: grep
  pacman: grep
  scoop: main/grep
  ubuntu: grep
  zypper: grep
package-manager-url: https://formulae.brew.sh/formula/grep
version: 3.12
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU grep, egrep and fgrep
source-archive: https://ftpmirror.gnu.org/gnu/grep/grep-3.12.tar.xz
dependencies:
  - pcre2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: egrep
  - exposure: global executable
    kind: cli
    name: fgrep
  - exposure: global executable
    kind: cli
    name: grep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    All commands have been installed with the prefix "g". If you need to use these
    commands with their normal names, you can add a "gnubin" directory to your PATH from
    your bashrc like: PATH="$HOMEBREW_PREFIX/opt/grep/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add grep
  av: sudo av install brew:grep
  brew: brew install grep
  chocolatey: choco install grep
  debian: sudo apt install grep
  dnf: sudo dnf install grep
  macports: sudo port install grep
  pacman: sudo pacman -S grep
  scoop: scoop install main/grep
  ubuntu: sudo apt install grep
  zypper: sudo zypper install grep
provenance:
  formula: grep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
