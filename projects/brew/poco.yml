id: brew:poco
display-name: poco
homepage: https://pocoproject.org/
repo: https://pocoproject.org/releases/poco-1.15.3/poco-1.15.3-all.tar.bz2
docs: https://pocoproject.org/
package-manager:
  apk: poco
  brew: poco
  macports: poco
  nix: poco
  pacman: poco
package-manager-url: https://formulae.brew.sh/formula/poco
version: 1.15.3
license: BSL-1.0
category: development
tags:
  - cli
description: C++ class libraries for building network and internet-based applications
source-archive: https://pocoproject.org/releases/poco-1.15.3/poco-1.15.3-all.tar.bz2
dependencies:
  - openssl@3
  - pcre2
  - utf8proc
build-dependencies:
  - cmake
uses-from-macos:
  - expat
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: cpspc
  - exposure: global executable
    kind: cli
    name: f2cpsp
  - exposure: global executable
    kind: cli
    name: poco-arc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add poco
  av: sudo av install brew:poco
  brew: brew install poco
  macports: sudo port install poco
  nix: nix profile install nixpkgs#poco
  pacman: sudo pacman -S poco
provenance:
  formula: poco
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
