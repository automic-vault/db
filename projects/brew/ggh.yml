id: brew:ggh
display-name: ggh
homepage: https://github.com/byawitz/ggh
repo: https://github.com/byawitz/ggh
docs: https://github.com/byawitz/ggh
package-manager:
  brew: ggh
  nix: ggh
package-manager-url: https://formulae.brew.sh/formula/ggh
version: 0.1.5
license: Apache-2.0
category: development
tags:
  - cli
description: Recall your SSH sessions
source-archive: https://github.com/byawitz/ggh/archive/refs/tags/v0.1.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ggh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ggh
  brew: brew install ggh
  nix: nix profile install nixpkgs#ggh
provenance:
  formula: ggh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
