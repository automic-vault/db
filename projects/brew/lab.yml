id: brew:lab
display-name: lab
homepage: https://zaquestion.github.io/lab
repo: https://github.com/zaquestion/lab
docs: https://zaquestion.github.io/lab
package-manager:
  apk: lab
  brew: lab
  macports: lab
  nix: lab
  scoop: main/lab
package-manager-url: https://formulae.brew.sh/formula/lab
version: 0.25.1
license: CC0-1.0
category: development
tags:
  - cli
  - git
description: Git wrapper for GitLab
source-archive: https://github.com/zaquestion/lab/archive/refs/tags/v0.25.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lab
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lab
  av: sudo av install brew:lab
  brew: brew install lab
  macports: sudo port install lab
  nix: nix profile install nixpkgs#lab
  scoop: scoop install main/lab
provenance:
  formula: lab
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
