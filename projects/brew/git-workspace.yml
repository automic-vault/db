id: brew:git-workspace
display-name: git-workspace
homepage: https://github.com/orf/git-workspace
repo: https://github.com/orf/git-workspace
docs: https://github.com/orf/git-workspace
package-manager:
  brew: git-workspace
  nix: git-workspace
package-manager-url: https://formulae.brew.sh/formula/git-workspace
version: 1.10.1
license: MIT
category: development
tags:
  - cli
  - git
description: Sync personal and work git repositories from multiple providers
source-archive: https://github.com/orf/git-workspace/archive/refs/tags/v1.10.1.tar.gz
dependencies:
  - libgit2
  - libssh2
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: git-workspace
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-workspace
  brew: brew install git-workspace
  nix: nix profile install nixpkgs#git-workspace
provenance:
  formula: git-workspace
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
