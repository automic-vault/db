id: brew:rig
display-name: rig
homepage: https://rig.sourceforge.net/
repo: https://downloads.sourceforge.net/project/rig/rig/1.11/rig-1.11.tar.gz
docs: https://rig.sourceforge.net/
package-manager:
  brew: rig
  chocolatey: rig
  debian: rig
  dnf: rig
  nix: rig
  ubuntu: rig
  winget: Posit.rig
package-manager-url: https://formulae.brew.sh/formula/rig
version: 1.11
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Provides fake name and address data
source-archive: https://downloads.sourceforge.net/project/rig/rig/1.11/rig-1.11.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: rig
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rig
  brew: brew install rig
  chocolatey: choco install rig
  debian: sudo apt install rig
  dnf: sudo dnf install rig
  nix: nix profile install nixpkgs#rig
  ubuntu: sudo apt install rig
  winget: winget install --id Posit.rig -e
provenance:
  formula: rig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
