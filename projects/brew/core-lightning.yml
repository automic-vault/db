id: brew:core-lightning
display-name: core-lightning
homepage: https://github.com/ElementsProject/lightning
repo: https://github.com/ElementsProject/lightning
docs: https://github.com/ElementsProject/lightning
package-manager:
  brew: core-lightning
package-manager-url: https://formulae.brew.sh/formula/core-lightning
version: 26.04.1
license: MIT
category: development
tags:
  - cli
description: Lightning Network implementation focusing on spec compliance and performance
source-archive: >
  https://github.com/ElementsProject/lightning/releases/download/v26.04.1/clightning-v26.04.1.zip
dependencies:
  - bitcoin
  - libsodium
  - sqlite
build-dependencies:
  - autoconf
  - automake
  - gettext
  - gnu-sed
  - libtool
  - lowdown
  - pkgconf
  - protobuf
  - python@3.14
  - rust
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: lightning-cli
  - exposure: global executable
    kind: cli
    name: lightning-hsmtool
  - exposure: global executable
    kind: cli
    name: lightningd
  - exposure: global executable
    kind: cli
    name: reckless
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:core-lightning
  brew: brew install core-lightning
provenance:
  formula: core-lightning
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
