id: brew:mcpp
display-name: mcpp
homepage: https://mcpp.sourceforge.net/
repo: https://downloads.sourceforge.net/project/mcpp/mcpp/V.2.7.2/mcpp-2.7.2.tar.gz
docs: https://mcpp.sourceforge.net/
package-manager:
  brew: mcpp
  debian: mcpp
  macports: mcpp
  nix: mcpp
  pacman: mcpp
  ubuntu: mcpp
  zypper: mcpp
package-manager-url: https://formulae.brew.sh/formula/mcpp
version: 2.7.2
license: BSD-2-Clause
category: network
tags:
  - cli
description: Alternative C/C++ preprocessor
source-archive: https://downloads.sourceforge.net/project/mcpp/mcpp/V.2.7.2/mcpp-2.7.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mcpp
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mcpp
  brew: brew install mcpp
  debian: sudo apt install mcpp
  macports: sudo port install mcpp
  nix: nix profile install nixpkgs#mcpp
  pacman: sudo pacman -S mcpp
  ubuntu: sudo apt install mcpp
  zypper: sudo zypper install mcpp
provenance:
  formula: mcpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
