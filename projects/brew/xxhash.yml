id: brew:xxhash
display-name: xxhash
homepage: https://xxhash.com
repo: https://github.com/Cyan4973/xxHash
docs: https://xxhash.com
package-manager:
  apk: xxhash
  brew: xxhash
  debian: xxhash
  dnf: xxhash
  macports: xxhash
  nix: xxhash
  pacman: xxhash
  scoop: main/xxhash
  ubuntu: xxhash
  zypper: xxhash
package-manager-url: https://formulae.brew.sh/formula/xxhash
version: 0.8.3
license: BSD-2-Clause AND GPL-2.0-or-later
category: security
tags:
  - cli
description: Extremely fast non-cryptographic hash algorithm
source-archive: https://github.com/Cyan4973/xxHash/archive/refs/tags/v0.8.3.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: xxh128sum
  - exposure: global executable
    kind: cli
    name: xxh32sum
  - exposure: global executable
    kind: cli
    name: xxh3sum
  - exposure: global executable
    kind: cli
    name: xxh64sum
  - exposure: global executable
    kind: cli
    name: xxhsum
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xxhash
  av: sudo av install brew:xxhash
  brew: brew install xxhash
  debian: sudo apt install xxhash
  dnf: sudo dnf install xxhash
  macports: sudo port install xxhash
  nix: nix profile install nixpkgs#xxhash
  pacman: sudo pacman -S xxhash
  scoop: scoop install main/xxhash
  ubuntu: sudo apt install xxhash
  zypper: sudo zypper install xxhash
provenance:
  formula: xxhash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
