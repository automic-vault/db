id: brew:gitoxide
display-name: gitoxide
homepage: https://github.com/GitoxideLabs/gitoxide
repo: https://github.com/GitoxideLabs/gitoxide
docs: https://github.com/GitoxideLabs/gitoxide
package-manager:
  apk: gitoxide
  brew: gitoxide
  macports: gitoxide
  nix: gitoxide
  pacman: gitoxide
  scoop: main/gitoxide
  zypper: gitoxide
package-manager-url: https://formulae.brew.sh/formula/gitoxide
version: 0.54.0
license: Apache-2.0
category: development
tags:
  - cli
  - git
description: Idiomatic, lean, fast & safe pure Rust implementation of Git
source-archive: https://github.com/GitoxideLabs/gitoxide/archive/refs/tags/v0.54.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: ein
  - exposure: global executable
    kind: cli
    name: gix
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gitoxide
  av: sudo av install brew:gitoxide
  brew: brew install gitoxide
  macports: sudo port install gitoxide
  nix: nix profile install nixpkgs#gitoxide
  pacman: sudo pacman -S gitoxide
  scoop: scoop install main/gitoxide
  zypper: sudo zypper install gitoxide
provenance:
  formula: gitoxide
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
