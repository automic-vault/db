id: brew:rolesanywhere-credential-helper
display-name: rolesanywhere-credential-helper
homepage: https://github.com/aws/rolesanywhere-credential-helper
repo: https://github.com/aws/rolesanywhere-credential-helper
docs: https://github.com/aws/rolesanywhere-credential-helper
package-manager:
  brew: rolesanywhere-credential-helper
  nix: aws-signing-helper
package-manager-url: https://formulae.brew.sh/formula/rolesanywhere-credential-helper
version: 1.8.3
license: Apache-2.0
category: cloud
tags:
  - cli
  - security
description: Manages getting temporary security credentials from IAM Roles Anywhere
source-archive: https://github.com/aws/rolesanywhere-credential-helper/archive/refs/tags/v1.8.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aws_signing_helper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rolesanywhere-credential-helper
  brew: brew install rolesanywhere-credential-helper
  nix: nix profile install nixpkgs#aws-signing-helper
provenance:
  formula: rolesanywhere-credential-helper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
