id: brew:lazydocker
display-name: lazydocker
homepage: https://github.com/jesseduffield/lazydocker
repo: https://github.com/jesseduffield/lazydocker
docs: https://github.com/jesseduffield/lazydocker
package-manager:
  apk: lazydocker
  brew: lazydocker
  macports: lazydocker
  nix: lazydocker
  pacman: lazydocker
  scoop: main/lazydocker
  winget: JesseDuffield.Lazydocker
package-manager-url: https://formulae.brew.sh/formula/lazydocker
version: 0.25.2
license: MIT
category: development
tags:
  - cli
  - docker
description: Lazier way to manage everything docker
source-archive: https://github.com/jesseduffield/lazydocker/archive/refs/tags/v0.25.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lazydocker
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lazydocker
  av: sudo av install brew:lazydocker
  brew: brew install lazydocker
  macports: sudo port install lazydocker
  nix: nix profile install nixpkgs#lazydocker
  pacman: sudo pacman -S lazydocker
  scoop: scoop install main/lazydocker
  winget: winget install --id JesseDuffield.Lazydocker -e
provenance:
  formula: lazydocker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
