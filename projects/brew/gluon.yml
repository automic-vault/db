id: brew:gluon
display-name: gluon
homepage: https://gluon-lang.org
repo: https://github.com/gluon-lang/gluon
docs: https://gluon-lang.org
package-manager:
  brew: gluon
package-manager-url: https://formulae.brew.sh/formula/gluon
version: 0.18.2
license: MIT
category: development
tags:
  - cli
description: Static, type inferred and embeddable language written in Rust
source-archive: https://github.com/gluon-lang/gluon/archive/refs/tags/v0.18.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gluon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gluon
  brew: brew install gluon
provenance:
  formula: gluon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
