id: brew:rhash
display-name: rhash
homepage: https://sourceforge.net/projects/rhash/
repo: https://downloads.sourceforge.net/project/rhash/rhash/1.4.6/rhash-1.4.6-src.tar.gz
docs: https://sourceforge.net/projects/rhash/
package-manager:
  apk: rhash
  brew: rhash
  debian: rhash
  dnf: rhash
  macports: RHash
  nix: rhash
  pacman: rhash
  scoop: main/rhash
  ubuntu: rhash
  winget: RHash.RHash
  zypper: rhash
package-manager-url: https://formulae.brew.sh/formula/rhash
version: 1.4.6
license: 0BSD
category: network
tags:
  - cli
description: Utility for computing and verifying hash sums of files
source-archive: https://downloads.sourceforge.net/project/rhash/rhash/1.4.6/rhash-1.4.6-src.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ed2k-link
  - exposure: global executable
    kind: cli
    name: edonr256-hash
  - exposure: global executable
    kind: cli
    name: edonr512-hash
  - exposure: global executable
    kind: cli
    name: gost12-256-hash
  - exposure: global executable
    kind: cli
    name: gost12-512-hash
  - exposure: global executable
    kind: cli
    name: has160-hash
  - exposure: global executable
    kind: cli
    name: magnet-link
  - exposure: global executable
    kind: cli
    name: rhash
  - exposure: global executable
    kind: cli
    name: sfv-hash
  - exposure: global executable
    kind: cli
    name: tiger-hash
  - exposure: global executable
    kind: cli
    name: tth-hash
  - exposure: global executable
    kind: cli
    name: whirlpool-hash
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rhash
  av: sudo av install brew:rhash
  brew: brew install rhash
  debian: sudo apt install rhash
  dnf: sudo dnf install rhash
  macports: sudo port install RHash
  nix: nix profile install nixpkgs#rhash
  pacman: sudo pacman -S rhash
  scoop: scoop install main/rhash
  ubuntu: sudo apt install rhash
  winget: winget install --id RHash.RHash -e
  zypper: sudo zypper install rhash
provenance:
  formula: rhash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
