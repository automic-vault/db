id: brew:yelp-tools
display-name: yelp-tools
homepage: https://gitlab.gnome.org/GNOME/yelp-tools
repo: https://download.gnome.org/sources/yelp-tools/42/yelp-tools-42.1.tar.xz
docs: https://gitlab.gnome.org/GNOME/yelp-tools
package-manager:
  apk: yelp-tools
  brew: yelp-tools
  debian: yelp-tools
  dnf: yelp-tools
  macports: yelp-tools
  nix: yelp-tools
  pacman: yelp-tools
  ubuntu: yelp-tools
  zypper: yelp-tools
package-manager-url: https://formulae.brew.sh/formula/yelp-tools
version: 42.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Tools that help create and edit Mallard or DocBook documentation
source-archive: https://download.gnome.org/sources/yelp-tools/42/yelp-tools-42.1.tar.xz
dependencies:
  - itstool
  - libxml2
  - python@3.14
  - yelp-xsl
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: yelp-build
  - exposure: global executable
    kind: cli
    name: yelp-check
  - exposure: global executable
    kind: cli
    name: yelp-new
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yelp-tools
  av: sudo av install brew:yelp-tools
  brew: brew install yelp-tools
  debian: sudo apt install yelp-tools
  dnf: sudo dnf install yelp-tools
  macports: sudo port install yelp-tools
  nix: nix profile install nixpkgs#yelp-tools
  pacman: sudo pacman -S yelp-tools
  ubuntu: sudo apt install yelp-tools
  zypper: sudo zypper install yelp-tools
provenance:
  formula: yelp-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
