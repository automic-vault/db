id: brew:latino
display-name: latino
homepage: https://www.lenguajelatino.org/
repo: https://github.com/lenguaje-latino/latino
docs: https://www.lenguajelatino.org/
package-manager:
  brew: latino
package-manager-url: https://formulae.brew.sh/formula/latino
version: 1.4.4
license: MIT
category: development
tags:
  - cli
description: Open source programming language for Latinos and Hispanic speakers
source-archive: https://github.com/lenguaje-latino/latino.git
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: latino
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:latino
  brew: brew install latino
provenance:
  formula: latino
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
