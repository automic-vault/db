id: brew:moe
display-name: moe
homepage: https://www.gnu.org/software/moe/moe.html
repo: https://ftpmirror.gnu.org/gnu/moe/moe-1.16.tar.lz
docs: https://www.gnu.org/software/moe/moe.html
package-manager:
  apk: moe
  brew: moe
  dnf: moe
  macports: moe
  nix: moe
  zypper: moe
package-manager-url: https://formulae.brew.sh/formula/moe
version: 1.16
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Console text editor for ISO-8859 and ASCII
source-archive: https://ftpmirror.gnu.org/gnu/moe/moe-1.16.tar.lz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: moe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add moe
  av: sudo av install brew:moe
  brew: brew install moe
  dnf: sudo dnf install moe
  macports: sudo port install moe
  nix: nix profile install nixpkgs#moe
  zypper: sudo zypper install moe
provenance:
  formula: moe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
