id: brew:tracy
display-name: tracy
homepage: https://github.com/wolfpld/tracy
repo: https://github.com/wolfpld/tracy
docs: https://github.com/wolfpld/tracy
package-manager:
  brew: tracy
  nix: tracy
  scoop: extras/tracy
  winget: wolfpld.tracy
package-manager-url: https://formulae.brew.sh/formula/tracy
version: 0.13.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Real-time, nanosecond resolution frame profiler
source-archive: https://github.com/wolfpld/tracy/archive/refs/tags/v0.13.1.tar.gz
dependencies:
  - aklomp-base64
  - freetype
  - glfw
  - md4c
  - nativefiledialog-extended
  - pugixml
  - tidy-html5
  - zstd
build-dependencies:
  - cmake
  - nlohmann-json
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: tracy
  - exposure: global executable
    kind: cli
    name: tracy-capture
  - exposure: global executable
    kind: cli
    name: tracy-csvexport
  - exposure: global executable
    kind: cli
    name: tracy-import-chrome
  - exposure: global executable
    kind: cli
    name: tracy-import-fuchsia
  - exposure: global executable
    kind: cli
    name: tracy-profiler
  - exposure: global executable
    kind: cli
    name: tracy-update
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tracy
  brew: brew install tracy
  nix: nix profile install nixpkgs#tracy
  scoop: scoop install extras/tracy
  winget: winget install --id wolfpld.tracy -e
provenance:
  formula: tracy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
