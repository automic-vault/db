id: brew:shadowsocks-libev
display-name: shadowsocks-libev
homepage: https://github.com/shadowsocks/shadowsocks-libev
repo: https://github.com/shadowsocks/shadowsocks-libev
docs: https://github.com/shadowsocks/shadowsocks-libev
package-manager:
  apk: shadowsocks-libev
  brew: shadowsocks-libev
  debian: shadowsocks-libev
  macports: shadowsocks-libev
  nix: shadowsocks-libev
  ubuntu: shadowsocks-libev
  zypper: shadowsocks-libev
package-manager-url: https://formulae.brew.sh/formula/shadowsocks-libev
version: 3.3.6
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Libev port of shadowsocks
source-archive: https://github.com/shadowsocks/shadowsocks-libev.git
dependencies:
  - c-ares
  - libev
  - libsodium
  - mbedtls@3
  - pcre2
build-dependencies:
  - asciidoc
  - cmake
  - xmlto
executables:
  - exposure: global executable
    kind: cli
    name: ss-local
  - exposure: global executable
    kind: cli
    name: ss-manager
  - exposure: global executable
    kind: cli
    name: ss-nat
  - exposure: global executable
    kind: cli
    name: ss-redir
  - exposure: global executable
    kind: cli
    name: ss-server
  - exposure: global executable
    kind: cli
    name: ss-setup
  - exposure: global executable
    kind: cli
    name: ss-tunnel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add shadowsocks-libev
  av: sudo av install brew:shadowsocks-libev
  brew: brew install shadowsocks-libev
  debian: sudo apt install shadowsocks-libev
  macports: sudo port install shadowsocks-libev
  nix: nix profile install nixpkgs#shadowsocks-libev
  ubuntu: sudo apt install shadowsocks-libev
  zypper: sudo zypper install shadowsocks-libev
provenance:
  formula: shadowsocks-libev
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
