id: brew:sysdig
display-name: sysdig
homepage: https://sysdig.com/
repo: https://github.com/draios/sysdig
docs: https://sysdig.com/
package-manager:
  brew: sysdig
  macports: sysdig
  nix: sysdig
  pacman: sysdig
  ubuntu: sysdig
package-manager-url: https://formulae.brew.sh/formula/sysdig
version: 0.41.4
license: Apache-2.0 AND (GPL-2.0-only OR MIT) AND (GPL-2.0-only WITH Linux-syscall-note)
category: development
tags:
  - cli
description: System-level exploration and troubleshooting tool
source-archive: https://github.com/draios/sysdig/archive/refs/tags/0.41.4.tar.gz
dependencies:
  - jsoncpp
  - luajit
  - ncurses
  - re2
  - tbb
  - uthash
  - yaml-cpp
build-dependencies:
  - cmake
  - nlohmann-json
  - pkgconf
  - valijson
executables:
  - exposure: global executable
    kind: cli
    name: csysdig
  - exposure: global executable
    kind: cli
    name: scap-driver-loader
  - exposure: global executable
    kind: cli
    name: sysdig
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sysdig
  brew: brew install sysdig
  macports: sudo port install sysdig
  nix: nix profile install nixpkgs#sysdig
  pacman: sudo pacman -S sysdig
  ubuntu: sudo apt install sysdig
provenance:
  formula: sysdig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
