id: brew:cloud-provider-kind
display-name: cloud-provider-kind
homepage: https://github.com/kubernetes-sigs/cloud-provider-kind
repo: https://github.com/kubernetes-sigs/cloud-provider-kind
docs: https://github.com/kubernetes-sigs/cloud-provider-kind
package-manager:
  brew: cloud-provider-kind
  nix: cloud-provider-kind
package-manager-url: https://formulae.brew.sh/formula/cloud-provider-kind
version: 0.10.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Cloud provider for KIND clusters
source-archive: https://github.com/kubernetes-sigs/cloud-provider-kind/archive/refs/tags/v0.10.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cloud-provider-kind
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloud-provider-kind
  brew: brew install cloud-provider-kind
  nix: nix profile install nixpkgs#cloud-provider-kind
provenance:
  formula: cloud-provider-kind
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
