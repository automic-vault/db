id: brew:cassandra
display-name: cassandra
homepage: https://cassandra.apache.org
repo: >
  https://www.apache.org/dyn/closer.lua?path=cassandra/5.0.8/apache-cassandra-5.0.8-bin.tar.gz
docs: https://cassandra.apache.org
package-manager:
  brew: cassandra
  macports: cassandra
  nix: cassandra
package-manager-url: https://formulae.brew.sh/formula/cassandra
version: 5.0.8
license: Apache-2.0
category: network
tags:
  - cli
description: Eventually consistent, distributed key-value store
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=cassandra/5.0.8/apache-cassandra-5.0.8-bin.tar.gz
dependencies:
  - libev
  - openjdk@17
  - python@3.11
executables:
  - exposure: global executable
    kind: cli
    name: auditlogviewer
  - exposure: global executable
    kind: cli
    name: cassandra
  - exposure: global executable
    kind: cli
    name: cassandra-stress
  - exposure: global executable
    kind: cli
    name: compaction-stress
  - exposure: global executable
    kind: cli
    name: cqlsh
  - exposure: global executable
    kind: cli
    name: cqlsh.py
  - exposure: global executable
    kind: cli
    name: debug-cql
  - exposure: global executable
    kind: cli
    name: fqltool
  - exposure: global executable
    kind: cli
    name: generatetokens
  - exposure: global executable
    kind: cli
    name: hash_password
  - exposure: global executable
    kind: cli
    name: jmxtool
  - exposure: global executable
    kind: cli
    name: nodetool
  - exposure: global executable
    kind: cli
    name: sstabledump
  - exposure: global executable
    kind: cli
    name: sstableexpiredblockers
  - exposure: global executable
    kind: cli
    name: sstablelevelreset
  - exposure: global executable
    kind: cli
    name: sstableloader
  - exposure: global executable
    kind: cli
    name: sstablemetadata
  - exposure: global executable
    kind: cli
    name: sstableofflinerelevel
  - exposure: global executable
    kind: cli
    name: sstablepartitions
  - exposure: global executable
    kind: cli
    name: sstablerepairedset
  - exposure: global executable
    kind: cli
    name: sstablescrub
  - exposure: global executable
    kind: cli
    name: sstablesplit
  - exposure: global executable
    kind: cli
    name: sstableupgrade
  - exposure: global executable
    kind: cli
    name: sstableutil
  - exposure: global executable
    kind: cli
    name: sstableverify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:cassandra
  brew: brew install cassandra
  macports: sudo port install cassandra
  nix: nix profile install nixpkgs#cassandra
provenance:
  formula: cassandra
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
