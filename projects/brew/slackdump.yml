id: brew:slackdump
display-name: slackdump
homepage: https://github.com/rusq/slackdump
repo: https://github.com/rusq/slackdump
docs: https://github.com/rusq/slackdump
package-manager:
  brew: slackdump
  nix: slackdump
package-manager-url: https://formulae.brew.sh/formula/slackdump
version: 4.3.0
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Export Slack data without admin privileges
source-archive: https://github.com/rusq/slackdump/archive/refs/tags/v4.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: slackdump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:slackdump
  brew: brew install slackdump
  nix: nix profile install nixpkgs#slackdump
provenance:
  formula: slackdump
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
