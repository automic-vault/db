id: brew:detox
display-name: detox
homepage: https://detox.sourceforge.net/
repo: https://github.com/dharple/detox
docs: https://detox.sourceforge.net/
package-manager:
  apk: detox
  brew: detox
  debian: detox
  dnf: detox
  macports: detox
  nix: detox
  pacman: detox
  ubuntu: detox
package-manager-url: https://formulae.brew.sh/formula/detox
version: 3.0.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Utility to replace problematic characters in filenames
source-archive: https://github.com/dharple/detox/archive/refs/tags/v3.0.1.tar.gz
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: detox
  - exposure: global executable
    kind: cli
    name: inline-detox
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add detox
  av: sudo av install brew:detox
  brew: brew install detox
  debian: sudo apt install detox
  dnf: sudo dnf install detox
  macports: sudo port install detox
  nix: nix profile install nixpkgs#detox
  pacman: sudo pacman -S detox
  ubuntu: sudo apt install detox
provenance:
  formula: detox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
