id: brew:liblo
display-name: liblo
homepage: https://liblo.sourceforge.net/
repo: https://downloads.sourceforge.net/project/liblo/liblo/0.35/liblo-0.35.tar.gz
docs: https://liblo.sourceforge.net/
package-manager:
  apk: liblo
  brew: liblo
  dnf: liblo
  macports: liblo
  nix: liblo
  pacman: liblo
package-manager-url: https://formulae.brew.sh/formula/liblo
version: 0.35
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Lightweight Open Sound Control implementation
source-archive: https://downloads.sourceforge.net/project/liblo/liblo/0.35/liblo-0.35.tar.gz
build-dependencies:
  - doxygen
executables:
  - exposure: global executable
    kind: cli
    name: oscdump
  - exposure: global executable
    kind: cli
    name: oscsend
  - exposure: global executable
    kind: cli
    name: oscsendfile
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add liblo
  av: sudo av install brew:liblo
  brew: brew install liblo
  dnf: sudo dnf install liblo
  macports: sudo port install liblo
  nix: nix profile install nixpkgs#liblo
  pacman: sudo pacman -S liblo
provenance:
  formula: liblo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
