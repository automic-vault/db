id: brew:datadog-static-analyzer
display-name: datadog-static-analyzer
homepage: https://docs.datadoghq.com/security/code_security/static_analysis/
repo: https://github.com/DataDog/datadog-static-analyzer
docs: https://docs.datadoghq.com/security/code_security/static_analysis/
package-manager:
  brew: datadog-static-analyzer
package-manager-url: https://formulae.brew.sh/formula/datadog-static-analyzer
version: 0.8.4
license: Apache-2.0
category: security
tags:
  - cli
  - security
description: Static analysis tool for code quality and security
source-archive: https://github.com/DataDog/datadog-static-analyzer/archive/refs/tags/0.8.4.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: datadog-static-analyzer
  - exposure: global executable
    kind: cli
    name: datadog-static-analyzer-git-hook
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:datadog-static-analyzer
  brew: brew install datadog-static-analyzer
provenance:
  formula: datadog-static-analyzer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
