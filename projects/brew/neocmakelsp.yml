id: brew:neocmakelsp
display-name: neocmakelsp
homepage: https://neocmakelsp.github.io/
repo: https://github.com/neocmakelsp/neocmakelsp
docs: https://neocmakelsp.github.io/
package-manager:
  apk: neocmakelsp
  brew: neocmakelsp
  macports: neocmakelsp
  nix: neocmakelsp
  zypper: neocmakelsp
package-manager-url: https://formulae.brew.sh/formula/neocmakelsp
version: 0.10.2
license: MIT
category: development
tags:
  - cli
description: Another cmake lsp
source-archive: https://github.com/neocmakelsp/neocmakelsp/archive/refs/tags/v0.10.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: neocmakelsp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add neocmakelsp
  av: sudo av install brew:neocmakelsp
  brew: brew install neocmakelsp
  macports: sudo port install neocmakelsp
  nix: nix profile install nixpkgs#neocmakelsp
  zypper: sudo zypper install neocmakelsp
provenance:
  formula: neocmakelsp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
