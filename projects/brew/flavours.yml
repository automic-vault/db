id: brew:flavours
display-name: flavours
homepage: https://github.com/Misterio77/flavours
repo: https://github.com/Misterio77/flavours
docs: https://github.com/Misterio77/flavours
package-manager:
  brew: flavours
  nix: flavours
package-manager-url: https://formulae.brew.sh/formula/flavours
version: 0.7.1
license: MIT
category: development
tags:
  - cli
description: Easy to use base16 scheme manager that integrates with any workflow
source-archive: https://github.com/Misterio77/flavours/archive/refs/tags/v0.7.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: flavours
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flavours
  brew: brew install flavours
  nix: nix profile install nixpkgs#flavours
provenance:
  formula: flavours
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
