id: brew:dotenv-linter
display-name: dotenv-linter
homepage: https://dotenv-linter.github.io
repo: https://github.com/dotenv-linter/dotenv-linter
docs: https://dotenv-linter.github.io
package-manager:
  apk: dotenv-linter
  brew: dotenv-linter
  nix: dotenv-linter
package-manager-url: https://formulae.brew.sh/formula/dotenv-linter
version: 4.0.0
license: MIT
category: development
tags:
  - cli
description: Lightning-fast linter for .env files written in Rust
source-archive: https://github.com/dotenv-linter/dotenv-linter/archive/refs/tags/v4.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dotenv-linter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dotenv-linter
  av: sudo av install brew:dotenv-linter
  brew: brew install dotenv-linter
  nix: nix profile install nixpkgs#dotenv-linter
provenance:
  formula: dotenv-linter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
