id: brew:agent-browser
display-name: agent-browser
homepage: https://agent-browser.dev/
repo: https://registry.npmjs.org/agent-browser/-/agent-browser-0.27.0.tgz
docs: https://agent-browser.dev/
package-manager:
  brew: agent-browser
  nix: agent-browser
  scoop: main/agent-browser
package-manager-url: https://formulae.brew.sh/formula/agent-browser
version: 0.27.0
license: Apache-2.0
category: network
tags:
  - cli
description: Browser automation CLI for AI agents
source-archive: https://registry.npmjs.org/agent-browser/-/agent-browser-0.27.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: agent-browser
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'To complete the installation, run: agent-browser install'
  post-install-defined: false
install-lines:
  av: sudo av install brew:agent-browser
  brew: brew install agent-browser
  nix: nix profile install nixpkgs#agent-browser
  scoop: scoop install main/agent-browser
provenance:
  formula: agent-browser
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
