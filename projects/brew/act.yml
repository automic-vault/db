id: brew:act
display-name: act
homepage: https://github.com/nektos/act
repo: https://github.com/nektos/act
docs: https://github.com/nektos/act
package-manager:
  apk: act
  brew: act
  dnf: act
  macports: act
  nix: act
  pacman: act
  scoop: main/act
  winget: nektos.act
  zypper: act
package-manager-url: https://formulae.brew.sh/formula/act
version: 0.2.88
license: MIT
category: development
tags:
  - cli
description: Run your GitHub Actions locally
source-archive: https://github.com/nektos/act/archive/refs/tags/v0.2.88.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: act
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add act
  av: sudo av install brew:act
  brew: brew install act
  dnf: sudo dnf install act
  macports: sudo port install act
  nix: nix profile install nixpkgs#act
  pacman: sudo pacman -S act
  scoop: scoop install main/act
  winget: winget install --id nektos.act -e
  zypper: sudo zypper install act
provenance:
  formula: act
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
