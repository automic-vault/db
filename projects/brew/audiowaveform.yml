id: brew:audiowaveform
display-name: audiowaveform
homepage: https://codeberg.org/chrisn/audiowaveform
repo: https://codeberg.org/chrisn/audiowaveform/archive/1.11.1.tar.gz
docs: https://codeberg.org/chrisn/audiowaveform
package-manager:
  brew: audiowaveform
  nix: audiowaveform
  scoop: main/audiowaveform
package-manager-url: https://formulae.brew.sh/formula/audiowaveform
version: 1.11.1
license: GPL-3.0-only
category: media
tags:
  - cli
description: Generate waveform data and render waveform images from audio files
source-archive: https://codeberg.org/chrisn/audiowaveform/archive/1.11.1.tar.gz
dependencies:
  - boost
  - gd
  - libid3tag
  - libsndfile
  - mad
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: audiowaveform
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:audiowaveform
  brew: brew install audiowaveform
  nix: nix profile install nixpkgs#audiowaveform
  scoop: scoop install main/audiowaveform
provenance:
  formula: audiowaveform
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
