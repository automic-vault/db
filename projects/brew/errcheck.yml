id: brew:errcheck
display-name: errcheck
homepage: https://github.com/kisielk/errcheck
repo: https://github.com/kisielk/errcheck
docs: https://github.com/kisielk/errcheck
package-manager:
  brew: errcheck
  nix: errcheck
package-manager-url: https://formulae.brew.sh/formula/errcheck
version: 1.20.0
license: MIT
category: development
tags:
  - cli
description: Finds silently ignored errors in Go code
source-archive: https://github.com/kisielk/errcheck/archive/refs/tags/v1.20.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: errcheck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:errcheck
  brew: brew install errcheck
  nix: nix profile install nixpkgs#errcheck
provenance:
  formula: errcheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
