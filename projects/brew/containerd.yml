id: brew:containerd
display-name: containerd
homepage: https://containerd.io
repo: https://github.com/containerd/containerd
docs: https://containerd.io
package-manager:
  apk: containerd
  brew: containerd
  debian: containerd
  dnf: containerd
  nix: containerd
  pacman: containerd
  scoop: main/containerd
  ubuntu: containerd
  zypper: containerd
package-manager-url: https://formulae.brew.sh/formula/containerd
version: 2.3.1
license: Apache-2.0
category: development
tags:
  - cli
description: Open and reliable container runtime
source-archive: https://github.com/containerd/containerd/archive/refs/tags/v2.3.1.tar.gz
build-dependencies:
  - go
  - go-md2man
executables:
  - exposure: global executable
    kind: cli
    name: containerd
  - exposure: global executable
    kind: cli
    name: containerd-shim-runc-v2
  - exposure: global executable
    kind: cli
    name: containerd-stress
  - exposure: global executable
    kind: cli
    name: ctr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The macOS version of containerd does not natively support running containers. You
    need to install an additional runtime plugin such as nerdbox (not packaged in
    Homebrew yet) to run containers on this build of containerd. To run the Linux native
    version of containerd in Linux Machine (Lima), execute the following commands: brew
    install lima limactl start
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add containerd
  av: sudo av install brew:containerd
  brew: brew install containerd
  debian: sudo apt install containerd
  dnf: sudo dnf install containerd
  nix: nix profile install nixpkgs#containerd
  pacman: sudo pacman -S containerd
  scoop: scoop install main/containerd
  ubuntu: sudo apt install containerd
  zypper: sudo zypper install containerd
provenance:
  formula: containerd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
