id: brew:graphite2
display-name: graphite2
homepage: https://graphite.sil.org/
repo: https://github.com/silnrsi/graphite
docs: https://graphite.sil.org/
package-manager:
  apk: graphite2
  brew: graphite2
  dnf: graphite2
  macports: graphite2
  nix: graphite2
  zypper: graphite2
package-manager-url: https://formulae.brew.sh/formula/graphite2
version: 1.3.14
license: GPL-2.0-or-later OR LGPL-2.1-or-later OR MPL-1.1+
category: development
tags:
  - cli
description: Smart font renderer for non-Roman scripts
source-archive: https://github.com/silnrsi/graphite/releases/download/1.3.14/graphite2-1.3.14.tgz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: gr2fonttest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add graphite2
  av: sudo av install brew:graphite2
  brew: brew install graphite2
  dnf: sudo dnf install graphite2
  macports: sudo port install graphite2
  nix: nix profile install nixpkgs#graphite2
  zypper: sudo zypper install graphite2
provenance:
  formula: graphite2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
