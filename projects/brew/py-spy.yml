id: brew:py-spy
display-name: py-spy
homepage: https://github.com/benfred/py-spy
repo: https://github.com/benfred/py-spy
docs: https://github.com/benfred/py-spy
package-manager:
  apk: py-spy
  brew: py-spy
  nix: py-spy
package-manager-url: https://formulae.brew.sh/formula/py-spy
version: 0.4.2
license: MIT
category: development
tags:
  - cli
description: Sampling profiler for Python programs
source-archive: https://github.com/benfred/py-spy/archive/refs/tags/v0.4.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: py-spy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add py-spy
  av: sudo av install brew:py-spy
  brew: brew install py-spy
  nix: nix profile install nixpkgs#py-spy
provenance:
  formula: py-spy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
