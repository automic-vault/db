id: brew:versitygw
display-name: versitygw
homepage: https://www.versity.com/products/versitygw/
repo: https://github.com/versity/versitygw
docs: https://www.versity.com/products/versitygw/
package-manager:
  brew: versitygw
  nix: versitygw
package-manager-url: https://formulae.brew.sh/formula/versitygw
version: 1.4.1
license: Apache-2.0
category: development
tags:
