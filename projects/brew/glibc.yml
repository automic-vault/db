id: brew:glibc
display-name: glibc
homepage: https://www.gnu.org/software/libc/
repo: https://ftpmirror.gnu.org/gnu/glibc/glibc-2.39.tar.gz
docs: https://www.gnu.org/software/libc/
package-manager:
  brew: glibc
  debian: nscd
  dnf: glibc
  nix: glibc
  pacman: glibc
  ubuntu: nscd
  zypper: glibc
package-manager-url: https://formulae.brew.sh/formula/glibc
version: 2.39
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: network
tags:
  - cli
description: GNU C Library
source-archive: https://ftpmirror.gnu.org/gnu/glibc/glibc-2.39.tar.gz
dependencies:
  - linux-headers@6.8
executables:
  - exposure: global executable
    kind: cli
    name: gencat
  - exposure: global executable
    kind: cli
    name: getconf
  - exposure: global executable
    kind: cli
    name: getent
  - exposure: global executable
    kind: cli
    name: iconvconfig
  - exposure: global executable
    kind: cli
    name: ld.so
  - exposure: global executable
    kind: cli
    name: ldconfig
  - exposure: global executable
    kind: cli
    name: ldd
  - exposure: global executable
    kind: cli
    name: locale
  - exposure: global executable
    kind: cli
    name: localedef
  - exposure: global executable
    kind: cli
    name: makedb
  - exposure: global executable
    kind: cli
    name: mtrace
  - exposure: global executable
    kind: cli
    name: nscd
  - exposure: global executable
    kind: cli
    name: pcprofiledump
  - exposure: global executable
    kind: cli
    name: pldd
  - exposure: global executable
    kind: cli
    name: sln
  - exposure: global executable
    kind: cli
    name: sotruss
  - exposure: global executable
    kind: cli
    name: sprof
  - exposure: global executable
    kind: cli
    name: tzselect
  - exposure: global executable
    kind: cli
    name: xtrace
  - exposure: global executable
    kind: cli
    name: zdump
  - exposure: global executable
    kind: cli
    name: zic
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The Homebrew's Glibc has been installed with the following executables:
    $HOMEBREW_PREFIX/opt/glibc/bin/ldd $HOMEBREW_PREFIX/opt/glibc/bin/ld.so
    $HOMEBREW_PREFIX/opt/glibc/sbin/ldconfig By default, Homebrew's linker will not
    search for the system's libraries. If you want Homebrew to do so, run: cp
    "$HOMEBREW_PREFIX/etc/ld.so.conf.d/99-system-ld.so.conf.example"
    "$HOMEBREW_PREFIX/etc/ld.so.conf.d/99-system-ld.so.conf" brew postinstall glibc to
    append the system libraries to Homebrew's ld search paths. This is risky and
    **highly not recommended**, because it may cause linkage to Homebrew libraries mixed
    with system libraries.
  post-install-defined: true
install-lines:
  av: sudo av install brew:glibc
  brew: brew install glibc
  debian: sudo apt install nscd
  dnf: sudo dnf install glibc
  nix: nix profile install nixpkgs#glibc
  pacman: sudo pacman -S glibc
  ubuntu: sudo apt install nscd
  zypper: sudo zypper install glibc
provenance:
  formula: glibc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
