id: brew:sqlsmith
display-name: sqlsmith
homepage: https://github.com/anse1/sqlsmith
repo: https://github.com/anse1/sqlsmith
docs: https://github.com/anse1/sqlsmith
package-manager:
  brew: sqlsmith
  debian: sqlsmith
  pacman: sqlsmith
  ubuntu: sqlsmith
package-manager-url: https://formulae.brew.sh/formula/sqlsmith
version: 1.5
license: GPL-3.0-only
category: database
tags:
  - cli
description: Random SQL query generator
source-archive: https://github.com/anse1/sqlsmith/archive/refs/tags/v1.5.tar.gz
dependencies:
  - libpq
  - libpqxx
build-dependencies:
  - autoconf
  - autoconf-archive
  - automake
  - pkgconf
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: sqlsmith
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sqlsmith
  brew: brew install sqlsmith
  debian: sudo apt install sqlsmith
  pacman: sudo pacman -S sqlsmith
  ubuntu: sudo apt install sqlsmith
provenance:
  formula: sqlsmith
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
