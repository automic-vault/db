id: brew:harfbuzz
display-name: harfbuzz
homepage: https://github.com/harfbuzz/harfbuzz
repo: https://github.com/harfbuzz/harfbuzz
docs: https://github.com/harfbuzz/harfbuzz
package-manager:
  apk: harfbuzz
  brew: harfbuzz
  dnf: harfbuzz
  macports: harfbuzz
  nix: harfbuzz
  pacman: harfbuzz
  scoop: main/harfbuzz
package-manager-url: https://formulae.brew.sh/formula/harfbuzz
version: 14.2.0
license: MIT
category: development
tags:
  - cli
description: OpenType text shaping engine
source-archive: https://github.com/harfbuzz/harfbuzz/releases/download/14.2.0/harfbuzz-14.2.0.tar.xz
dependencies:
  - cairo
  - freetype
  - glib
  - graphite2
  - icu4c@78
  - libpng
build-dependencies:
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: hb-info
  - exposure: global executable
    kind: cli
    name: hb-raster
  - exposure: global executable
    kind: cli
    name: hb-shape
  - exposure: global executable
    kind: cli
    name: hb-subset
  - exposure: global executable
    kind: cli
    name: hb-vector
  - exposure: global executable
    kind: cli
    name: hb-view
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add harfbuzz
  av: sudo av install brew:harfbuzz
  brew: brew install harfbuzz
  dnf: sudo dnf install harfbuzz
  macports: sudo port install harfbuzz
  nix: nix profile install nixpkgs#harfbuzz
  pacman: sudo pacman -S harfbuzz
  scoop: scoop install main/harfbuzz
provenance:
  formula: harfbuzz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
