id: brew:dependency-check
display-name: dependency-check
homepage: https://owasp.org/www-project-dependency-check/
repo: https://github.com/dependency-check/DependencyCheck
docs: https://owasp.org/www-project-dependency-check/
package-manager:
  brew: dependency-check
  scoop: main/dependency-check
package-manager-url: https://formulae.brew.sh/formula/dependency-check
version: 12.2.2
license: Apache-2.0
category: development
tags:
  - cli
description: OWASP dependency-check
source-archive: >
  https://github.com/dependency-check/DependencyCheck/releases/download/v12.2.2/dependency-check-12.2.2-release.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: dependency-check
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dependency-check
  brew: brew install dependency-check
  scoop: scoop install main/dependency-check
provenance:
  formula: dependency-check
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
