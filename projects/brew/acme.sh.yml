id: brew:acme.sh
display-name: acme.sh
homepage: https://github.com/acmesh-official/acme.sh
repo: https://github.com/acmesh-official/acme.sh
docs: https://github.com/acmesh-official/acme.sh
package-manager:
  apk: acme.sh
  brew: acme.sh
  debian: acme.sh
  nix: acme-sh
  pacman: acme.sh
package-manager-url: https://formulae.brew.sh/formula/acme.sh
version: 3.1.3
license: GPL-3.0-only
category: development
tags:
  - cli
description: ACME client
source-archive: https://github.com/acmesh-official/acme.sh/archive/refs/tags/3.1.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: acme.sh
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add acme.sh
  av: sudo av install brew:acme.sh
  brew: brew install acme.sh
  debian: sudo apt install acme.sh
  nix: nix profile install nixpkgs#acme-sh
  pacman: sudo pacman -S acme.sh
provenance:
  formula: acme.sh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
