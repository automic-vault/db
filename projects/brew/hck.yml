id: brew:hck
display-name: hck
homepage: https://github.com/sstadick/hck
repo: https://github.com/sstadick/hck
docs: https://github.com/sstadick/hck
package-manager:
  brew: hck
  macports: hck
  nix: hck
  pacman: hck
package-manager-url: https://formulae.brew.sh/formula/hck
version: 0.11.5
license: MIT OR Unlicense
category: development
tags:
  - cli
description: Sharp cut(1) clone
source-archive: https://github.com/sstadick/hck/archive/refs/tags/v0.11.5.tar.gz
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hck
  brew: brew install hck
  macports: sudo port install hck
  nix: nix profile install nixpkgs#hck
  pacman: sudo pacman -S hck
provenance:
  formula: hck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
