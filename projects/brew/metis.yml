id: brew:metis
display-name: metis
homepage: https://karypis.github.io/glaros/software/metis/overview.html
repo: https://karypis.github.io/glaros/files/sw/metis/metis-5.1.0.tar.gz
docs: https://karypis.github.io/glaros/software/metis/overview.html
package-manager:
  brew: metis
  debian: metis
  dnf: metis
  macports: metis
  nix: metis
  ubuntu: metis
  zypper: metis
package-manager-url: https://formulae.brew.sh/formula/metis
version: 5.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: Programs that partition graphs and order matrices
source-archive: https://karypis.github.io/glaros/files/sw/metis/metis-5.1.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: cmpfillin
  - exposure: global executable
    kind: cli
    name: gpmetis
  - exposure: global executable
    kind: cli
    name: graphchk
  - exposure: global executable
    kind: cli
    name: m2gmetis
  - exposure: global executable
    kind: cli
    name: mpmetis
  - exposure: global executable
    kind: cli
    name: ndmetis
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:metis
  brew: brew install metis
  debian: sudo apt install metis
  dnf: sudo dnf install metis
  macports: sudo port install metis
  nix: nix profile install nixpkgs#metis
  ubuntu: sudo apt install metis
  zypper: sudo zypper install metis
provenance:
  formula: metis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
