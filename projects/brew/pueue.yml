id: brew:pueue
display-name: pueue
homepage: https://github.com/Nukesor/pueue
repo: https://github.com/Nukesor/pueue
docs: https://github.com/Nukesor/pueue
package-manager:
  apk: pueue
  brew: pueue
  macports: pueue
  nix: pueue
  pacman: pueue
  scoop: main/pueue
  zypper: pueue
package-manager-url: https://formulae.brew.sh/formula/pueue
version: 4.0.4
license: MIT
category: development
tags:
  - cli
description: Command-line tool for managing long-running shell commands
source-archive: https://github.com/Nukesor/pueue/archive/refs/tags/v4.0.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: pueue
  - exposure: global executable
    kind: cli
    name: pueued
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add pueue
  av: sudo av install brew:pueue
  brew: brew install pueue
  macports: sudo port install pueue
  nix: nix profile install nixpkgs#pueue
  pacman: sudo pacman -S pueue
  scoop: scoop install main/pueue
  zypper: sudo zypper install pueue
provenance:
  formula: pueue
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
