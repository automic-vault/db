id: brew:xh
display-name: xh
homepage: https://github.com/ducaale/xh
repo: https://github.com/ducaale/xh
docs: https://github.com/ducaale/xh
package-manager:
  apk: xh
  brew: xh
  debian: xh
  macports: xh
  nix: xh
  pacman: xh
  scoop: main/xh
  winget: ducaale.xh
  zypper: xh
package-manager-url: https://formulae.brew.sh/formula/xh
version: 0.25.3
license: MIT
category: development
tags:
  - cli
description: Friendly and fast tool for sending HTTP requests
source-archive: https://github.com/ducaale/xh/archive/refs/tags/v0.25.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: xh
  - exposure: global executable
    kind: cli
    name: xhs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xh
  av: sudo av install brew:xh
  brew: brew install xh
  debian: sudo apt install xh
  macports: sudo port install xh
  nix: nix profile install nixpkgs#xh
  pacman: sudo pacman -S xh
  scoop: scoop install main/xh
  winget: winget install --id ducaale.xh -e
  zypper: sudo zypper install xh
provenance:
  formula: xh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
