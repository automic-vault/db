id: brew:gnu-units
display-name: gnu-units
homepage: https://www.gnu.org/software/units/
repo: https://ftpmirror.gnu.org/gnu/units/units-2.27.tar.gz
docs: https://www.gnu.org/software/units/
package-manager:
  apk: units
  brew: gnu-units
  debian: units
  dnf: units
  nix: units
  scoop: main/units
  ubuntu: units
  winget: GNU.Units
  zypper: units
package-manager-url: https://formulae.brew.sh/formula/gnu-units
version: 2.27
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU unit conversion tool
source-archive: https://ftpmirror.gnu.org/gnu/units/units-2.27.tar.gz
dependencies:
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: units
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    All commands have been installed with the prefix "g". If you need to use these
    commands with their normal names, you can add a "gnubin" directory to your PATH from
    your bashrc like: PATH="$HOMEBREW_PREFIX/opt/gnu-units/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add units
  av: sudo av install brew:gnu-units
  brew: brew install gnu-units
  debian: sudo apt install units
  dnf: sudo dnf install units
  nix: nix profile install nixpkgs#units
  scoop: scoop install main/units
  ubuntu: sudo apt install units
  winget: winget install --id GNU.Units -e
  zypper: sudo zypper install units
provenance:
  formula: gnu-units
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
