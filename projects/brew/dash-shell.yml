id: brew:dash-shell
display-name: dash-shell
homepage: http://gondor.apana.org.au/~herbert/dash/
repo: https://cdn.netbsd.org/pub/pkgsrc/distfiles/dash-0.5.13.4.tar.gz
docs: http://gondor.apana.org.au/~herbert/dash/
package-manager:
  apk: dash
  brew: dash-shell
  debian: dash
  dnf: dash
  macports: dash
  nix: dash
  pacman: dash
  ubuntu: dash
  zypper: dash
package-manager-url: https://formulae.brew.sh/formula/dash-shell
version: 0.5.13.4
license: BSD-3-Clause
category: network
tags:
  - cli
description: POSIX-compliant descendant of NetBSD's ash (the Almquist SHell)
source-archive: https://cdn.netbsd.org/pub/pkgsrc/distfiles/dash-0.5.13.4.tar.gz
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: dash
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dash
  av: sudo av install brew:dash-shell
  brew: brew install dash-shell
  debian: sudo apt install dash
  dnf: sudo dnf install dash
  macports: sudo port install dash
  nix: nix profile install nixpkgs#dash
  pacman: sudo pacman -S dash
  ubuntu: sudo apt install dash
  zypper: sudo zypper install dash
provenance:
  formula: dash-shell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
