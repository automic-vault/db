id: brew:git-get
display-name: git-get
homepage: https://github.com/grdl/git-get
repo: https://github.com/grdl/git-get
docs: https://github.com/grdl/git-get
package-manager:
  brew: git-get
  nix: git-get
  winget: grdl.git-get
package-manager-url: https://formulae.brew.sh/formula/git-get
version: 0.6.1
license: MIT
category: development
tags:
  - cli
  - git
description: Better way to clone, organize and manage multiple git repositories
source-archive: https://github.com/grdl/git-get/archive/refs/tags/v0.6.1.tar.gz
build-dependencies:
  - go
  - go-md2man
executables:
  - exposure: global executable
    kind: cli
    name: git-list
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-get
  brew: brew install git-get
  nix: nix profile install nixpkgs#git-get
  winget: winget install --id grdl.git-get -e
provenance:
  formula: git-get
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
