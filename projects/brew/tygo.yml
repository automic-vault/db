id: brew:tygo
display-name: tygo
homepage: https://github.com/gzuidhof/tygo
repo: https://github.com/gzuidhof/tygo
docs: https://github.com/gzuidhof/tygo
package-manager:
  brew: tygo
  nix: tygo
package-manager-url: https://formulae.brew.sh/formula/tygo
version: 0.2.21
license: MIT
category: development
tags:
  - cli
description: Generate Typescript types from Golang source code
source-archive: https://github.com/gzuidhof/tygo.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tygo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tygo
  brew: brew install tygo
  nix: nix profile install nixpkgs#tygo
provenance:
  formula: tygo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
