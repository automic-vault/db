id: brew:vet
display-name: vet
homepage: https://safedep.io/
repo: https://github.com/safedep/vet
docs: https://safedep.io/
package-manager:
  brew: vet
package-manager-url: https://formulae.brew.sh/formula/vet
version: 1.17.2
license: Apache-2.0
category: development
tags:
  - cli
description: Policy driven vetting of open source dependencies
source-archive: https://github.com/safedep/vet/archive/refs/tags/v1.17.2.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vet
  brew: brew install vet
provenance:
  formula: vet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
