id: brew:caddy
display-name: caddy
homepage: https://caddyserver.com/
repo: https://github.com/caddyserver/caddy
docs: https://caddyserver.com/
package-manager:
  apk: caddy
  brew: caddy
  chocolatey: caddy
  debian: caddy
  dnf: caddy
  macports: caddy
  nix: caddy
  pacman: caddy
  scoop: main/caddy
  ubuntu: caddy
  winget: CaddyServer.Caddy
  zypper: caddy
package-manager-url: https://formulae.brew.sh/formula/caddy
version: 2.11.3
license: Apache-2.0
category: development
tags:
  - cli
description: Powerful, enterprise-ready, open source web server with automatic HTTPS
source-archive: https://github.com/caddyserver/caddy/archive/refs/tags/v2.11.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: caddy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    When running the provided service, caddy's data dir will be set as
    `$HOMEBREW_PREFIX/var/lib` instead of the default location found at
    https://caddyserver.com/docs/conventions#data-directory
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add caddy
  av: sudo av install brew:caddy
  brew: brew install caddy
  chocolatey: choco install caddy
  debian: sudo apt install caddy
  dnf: sudo dnf install caddy
  macports: sudo port install caddy
  nix: nix profile install nixpkgs#caddy
  pacman: sudo pacman -S caddy
  scoop: scoop install main/caddy
  ubuntu: sudo apt install caddy
  winget: winget install --id CaddyServer.Caddy -e
  zypper: sudo zypper install caddy
provenance:
  formula: caddy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
