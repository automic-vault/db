id: brew:mapproxy
display-name: mapproxy
homepage: https://mapproxy.org/
repo: >
  https://files.pythonhosted.org/packages/7d/5e/972a52a0b3f646a53dd3e8a552256a649548b8fb84b4fbb1b43b90de86ea/mapproxy-6.0.1.tar.gz
docs: https://mapproxy.org/
package-manager:
  brew: mapproxy
  debian: mapproxy
  nix: mapproxy
  ubuntu: mapproxy
package-manager-url: https://formulae.brew.sh/formula/mapproxy
version: 6.0.1
license: Apache-2.0
category: network
tags:
  - cli
description: Accelerating web map proxy
source-archive: >
  https://files.pythonhosted.org/packages/7d/5e/972a52a0b3f646a53dd3e8a552256a649548b8fb84b4fbb1b43b90de86ea/mapproxy-6.0.1.tar.gz
dependencies:
  - certifi
  - geos
  - libyaml
  - numpy
  - pillow
  - proj
  - python@3.14
  - rpds-py
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: mapproxy-seed
  - exposure: global executable
    kind: cli
    name: mapproxy-util
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mapproxy
  brew: brew install mapproxy
  debian: sudo apt install mapproxy
  nix: nix profile install nixpkgs#mapproxy
  ubuntu: sudo apt install mapproxy
provenance:
  formula: mapproxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
