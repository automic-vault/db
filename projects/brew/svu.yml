id: brew:svu
display-name: svu
homepage: https://github.com/caarlos0/svu
repo: https://github.com/caarlos0/svu
docs: https://github.com/caarlos0/svu
package-manager:
  brew: svu
  macports: svu
  nix: svu
package-manager-url: https://formulae.brew.sh/formula/svu
version: 3.4.1
license: MIT
category: development
tags:
  - cli
description: Semantic version utility
source-archive: https://github.com/caarlos0/svu/archive/refs/tags/v3.4.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: svu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:svu
  brew: brew install svu
  macports: sudo port install svu
  nix: nix profile install nixpkgs#svu
provenance:
  formula: svu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
