id: brew:landrun
display-name: landrun
homepage: https://github.com/Zouuup/landrun
repo: https://github.com/Zouuup/landrun
docs: https://github.com/Zouuup/landrun
package-manager:
  brew: landrun
  nix: landrun
package-manager-url: https://formulae.brew.sh/formula/landrun
version: 0.1.15
license: MIT
category: development
tags:
  - cli
description: Lightweight, secure sandbox for running Linux processes using Landlock LSM
source-archive: https://github.com/Zouuup/landrun/archive/refs/tags/v0.1.15.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: landrun
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:landrun
  brew: brew install landrun
  nix: nix profile install nixpkgs#landrun
provenance:
  formula: landrun
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
