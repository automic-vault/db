id: brew:libxspf
display-name: libxspf
homepage: https://libspiff.sourceforge.net/
repo: https://downloads.sourceforge.net/project/libspiff/Sources/1.2.1/libxspf-1.2.1.tar.bz2
docs: https://libspiff.sourceforge.net/
package-manager:
  apk: libxspf
  brew: libxspf
  macports: libxspf
package-manager-url: https://formulae.brew.sh/formula/libxspf
version: 1.2.1
license: BSD-3-Clause
category: network
tags:
  - cli
description: C++ library for XSPF playlist reading and writing
source-archive: https://downloads.sourceforge.net/project/libspiff/Sources/1.2.1/libxspf-1.2.1.tar.bz2
dependencies:
  - uriparser
build-dependencies:
  - cpptest
  - pkgconf
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: xspf_check
  - exposure: global executable
    kind: cli
    name: xspf_strip
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libxspf
  av: sudo av install brew:libxspf
  brew: brew install libxspf
  macports: sudo port install libxspf
provenance:
  formula: libxspf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
