id: brew:seqtk
display-name: seqtk
homepage: https://github.com/lh3/seqtk
repo: https://github.com/lh3/seqtk
docs: https://github.com/lh3/seqtk
package-manager:
  brew: seqtk
  debian: seqtk
  nix: seqtk
  ubuntu: seqtk
package-manager-url: https://formulae.brew.sh/formula/seqtk
version: 1.5
license: MIT
category: development
tags:
  - cli
description: Toolkit for processing sequences in FASTA/Q formats
source-archive: https://github.com/lh3/seqtk/archive/refs/tags/v1.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: seqtk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:seqtk
  brew: brew install seqtk
  debian: sudo apt install seqtk
  nix: nix profile install nixpkgs#seqtk
  ubuntu: sudo apt install seqtk
provenance:
  formula: seqtk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
