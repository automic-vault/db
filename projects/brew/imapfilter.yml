id: brew:imapfilter
display-name: imapfilter
homepage: https://github.com/lefcha/imapfilter/
repo: https://github.com/lefcha/imapfilter
docs: https://github.com/lefcha/imapfilter/
package-manager:
  apk: imapfilter
  brew: imapfilter
  debian: imapfilter
  dnf: imapfilter
  macports: imapfilter
  nix: imapfilter
  ubuntu: imapfilter
  zypper: imapfilter
package-manager-url: https://formulae.brew.sh/formula/imapfilter
version: 2.8.5
license: MIT
category: development
tags:
  - cli
description: IMAP message processor/filter
source-archive: https://github.com/lefcha/imapfilter/archive/refs/tags/v2.8.5.tar.gz
dependencies:
  - lua
  - openssl@3
  - pcre2
executables:
  - exposure: global executable
    kind: cli
    name: imapfilter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You will need to create a ~/.imapfilter/config.lua file. Samples can be found in:
    $HOMEBREW_CELLAR/imapfilter/2.8.5/samples
  post-install-defined: false
install-lines:
  apk: sudo apk add imapfilter
  av: sudo av install brew:imapfilter
  brew: brew install imapfilter
  debian: sudo apt install imapfilter
  dnf: sudo dnf install imapfilter
  macports: sudo port install imapfilter
  nix: nix profile install nixpkgs#imapfilter
  ubuntu: sudo apt install imapfilter
  zypper: sudo zypper install imapfilter
provenance:
  formula: imapfilter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
