id: brew:vamp-plugin-sdk
display-name: vamp-plugin-sdk
homepage: https://www.vamp-plugins.org/
repo: >
  https://deb.debian.org/debian/pool/main/v/vamp-plugin-sdk/vamp-plugin-sdk_2.10.0.orig.tar.gz
docs: https://www.vamp-plugins.org/
package-manager:
  brew: vamp-plugin-sdk
  debian: vamp-plugin-sdk
  dnf: vamp-plugin-sdk
  nix: vamp-plugin-sdk
  pacman: vamp-plugin-sdk
  ubuntu: vamp-plugin-sdk
  zypper: vamp-plugin-sdk
package-manager-url: https://formulae.brew.sh/formula/vamp-plugin-sdk
version: 2.10.0
license: X11 AND BSD-3-Clause
category: media
tags:
  - cli
description: Audio processing plugin system sdk
source-archive: >
  https://deb.debian.org/debian/pool/main/v/vamp-plugin-sdk/vamp-plugin-sdk_2.10.0.orig.tar.gz
dependencies:
  - flac
  - libogg
  - libsndfile
build-dependencies:
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: vamp-rdf-template-generator
  - exposure: global executable
    kind: cli
    name: vamp-simple-host
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vamp-plugin-sdk
  brew: brew install vamp-plugin-sdk
  debian: sudo apt install vamp-plugin-sdk
  dnf: sudo dnf install vamp-plugin-sdk
  nix: nix profile install nixpkgs#vamp-plugin-sdk
  pacman: sudo pacman -S vamp-plugin-sdk
  ubuntu: sudo apt install vamp-plugin-sdk
  zypper: sudo zypper install vamp-plugin-sdk
provenance:
  formula: vamp-plugin-sdk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
