id: brew:freeling
display-name: freeling
homepage: https://nlp.lsi.upc.edu/freeling/
repo: https://github.com/TALP-UPC/FreeLing
docs: https://nlp.lsi.upc.edu/freeling/
package-manager:
  brew: freeling
  macports: freeling
package-manager-url: https://formulae.brew.sh/formula/freeling
version: 4.2.1
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Suite of language analyzers
source-archive: https://github.com/TALP-UPC/FreeLing/releases/download/4.2/FreeLing-src-4.2.1.tar.gz
dependencies:
  - boost
  - dynet
  - icu4c@78
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: analyzer
  - exposure: global executable
    kind: cli
    name: analyzer_client
  - exposure: global executable
    kind: cli
    name: convert_model
  - exposure: global executable
    kind: cli
    name: crfsuite
  - exposure: global executable
    kind: cli
    name: threaded_analyzer
  - exposure: global executable
    kind: cli
    name: treeler
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:freeling
  brew: brew install freeling
  macports: sudo port install freeling
provenance:
  formula: freeling
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
