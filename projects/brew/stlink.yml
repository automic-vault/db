id: brew:stlink
display-name: stlink
homepage: https://github.com/stlink-org/stlink
repo: https://github.com/stlink-org/stlink
docs: https://github.com/stlink-org/stlink
package-manager:
  apk: stlink
  brew: stlink
  dnf: stlink
  macports: stlink
  nix: stlink
  pacman: stlink
  scoop: main/stlink
  zypper: stlink
package-manager-url: https://formulae.brew.sh/formula/stlink
version: 1.8.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: STM32 discovery line Linux programmer
source-archive: https://github.com/stlink-org/stlink/archive/refs/tags/v1.8.0.tar.gz
dependencies:
  - libusb
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: st-flash
  - exposure: global executable
    kind: cli
    name: st-info
  - exposure: global executable
    kind: cli
    name: st-trace
  - exposure: global executable
    kind: cli
    name: st-util
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add stlink
  av: sudo av install brew:stlink
  brew: brew install stlink
  dnf: sudo dnf install stlink
  macports: sudo port install stlink
  nix: nix profile install nixpkgs#stlink
  pacman: sudo pacman -S stlink
  scoop: scoop install main/stlink
  zypper: sudo zypper install stlink
provenance:
  formula: stlink
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
