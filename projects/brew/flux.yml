id: brew:flux
display-name: flux
homepage: https://www.influxdata.com/products/flux/
repo: https://github.com/influxdata/flux
docs: https://www.influxdata.com/products/flux/
package-manager:
  apk: flux
  brew: flux
  chocolatey: flux
  macports: flux
  nix: flux
  scoop: extras/flux
  winget: FluxCD.Flux
package-manager-url: https://formulae.brew.sh/formula/flux
version: 0.200.0
license: MIT
category: database
tags:
  - cli
description: Lightweight scripting language for querying databases
source-archive: https://github.com/influxdata/flux.git
build-dependencies:
  - go
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: flux
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add flux
  av: sudo av install brew:flux
  brew: brew install flux
  chocolatey: choco install flux
  macports: sudo port install flux
  nix: nix profile install nixpkgs#flux
  scoop: scoop install extras/flux
  winget: winget install --id FluxCD.Flux -e
provenance:
  formula: flux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
