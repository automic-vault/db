id: brew:cfn-lint
display-name: cfn-lint
homepage: https://github.com/aws-cloudformation/cfn-lint/
repo: >
  https://files.pythonhosted.org/packages/f8/17/084b8f3f2624a8326f5e149a22b22221ed9f388e4798e3febb0ab2a938fa/cfn_lint-1.51.1.tar.gz
docs: https://github.com/aws-cloudformation/cfn-lint/
package-manager:
  brew: cfn-lint
package-manager-url: https://formulae.brew.sh/formula/cfn-lint
version: 1.51.1
license: MIT-0
category: cloud
tags:
  - cli
description: Validate CloudFormation templates against the CloudFormation spec
source-archive: >
  https://files.pythonhosted.org/packages/f8/17/084b8f3f2624a8326f5e149a22b22221ed9f388e4798e3febb0ab2a938fa/cfn_lint-1.51.1.tar.gz
dependencies:
  - libyaml
  - pydantic
  - python@3.14
  - rpds-py
executables:
  - exposure: global executable
    kind: cli
    name: cfn-lint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cfn-lint
  brew: brew install cfn-lint
provenance:
  formula: cfn-lint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
