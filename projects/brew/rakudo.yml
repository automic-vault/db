id: brew:rakudo
display-name: rakudo
homepage: https://rakudo.org
repo: https://github.com/rakudo/rakudo
docs: https://rakudo.org
package-manager:
  apk: rakudo
  brew: rakudo
  debian: rakudo
  dnf: rakudo
  macports: rakudo
  nix: rakudo
  ubuntu: rakudo
  winget: Rakudo.Rakudo
  zypper: rakudo
package-manager-url: https://formulae.brew.sh/formula/rakudo
version: 2026.05
license: Artistic-2.0
category: development
tags:
  - cli
description: Mature, production-ready implementation of the Raku language
source-archive: https://github.com/rakudo/rakudo/releases/download/2026.05/rakudo-2026.05.tar.gz
dependencies:
  - moarvm
  - nqp
executables:
  - exposure: global executable
    kind: cli
    name: raku-install-dist
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rakudo
  av: sudo av install brew:rakudo
  brew: brew install rakudo
  debian: sudo apt install rakudo
  dnf: sudo dnf install rakudo
  macports: sudo port install rakudo
  nix: nix profile install nixpkgs#rakudo
  ubuntu: sudo apt install rakudo
  winget: winget install --id Rakudo.Rakudo -e
  zypper: sudo zypper install rakudo
provenance:
  formula: rakudo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
