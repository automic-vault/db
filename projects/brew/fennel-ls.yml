id: brew:fennel-ls
display-name: fennel-ls
homepage: https://git.sr.ht/~xerool/fennel-ls/
repo: https://git.sr.ht/~xerool/fennel-ls/archive/0.2.4.tar.gz
docs: https://git.sr.ht/~xerool/fennel-ls/
package-manager:
  brew: fennel-ls
  nix: fennel-ls
package-manager-url: https://formulae.brew.sh/formula/fennel-ls
version: 0.2.4
license: MIT
category: development
tags:
