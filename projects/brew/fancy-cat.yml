id: brew:fancy-cat
display-name: fancy-cat
homepage: https://github.com/freref/fancy-cat
repo: https://github.com/freref/fancy-cat
docs: https://github.com/freref/fancy-cat
package-manager:
  brew: fancy-cat
  nix: fancy-cat
package-manager-url: https://formulae.brew.sh/formula/fancy-cat
version: 0.6.0
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: PDF reader for terminal emulators using the Kitty image protocol
source-archive: https://github.com/freref/fancy-cat/archive/refs/tags/v0.6.0.tar.gz
dependencies:
  - mujs
  - mupdf
build-dependencies:
  - zig@0.15
executables:
  - exposure: global executable
    kind: cli
    name: fancy-cat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fancy-cat
  brew: brew install fancy-cat
  nix: nix profile install nixpkgs#fancy-cat
provenance:
  formula: fancy-cat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
