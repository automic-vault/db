id: brew:pandoc
display-name: pandoc
homepage: https://pandoc.org/
repo: https://github.com/jgm/pandoc
docs: https://pandoc.org/
package-manager:
  brew: pandoc
  chocolatey: pandoc
  debian: pandoc
  macports: pandoc
  nix: pandoc
  scoop: main/pandoc
  ubuntu: pandoc
  winget: JohnMacFarlane.Pandoc
package-manager-url: https://formulae.brew.sh/formula/pandoc
version: 3.9.0.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Swiss-army knife of markup format conversion
source-archive: https://github.com/jgm/pandoc/archive/refs/tags/3.9.0.2.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: pandoc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pandoc
  brew: brew install pandoc
  chocolatey: choco install pandoc
  debian: sudo apt install pandoc
  macports: sudo port install pandoc
  nix: nix profile install nixpkgs#pandoc
  scoop: scoop install main/pandoc
  ubuntu: sudo apt install pandoc
  winget: winget install --id JohnMacFarlane.Pandoc -e
provenance:
  formula: pandoc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
