id: brew:lsyncd
display-name: lsyncd
homepage: https://github.com/lsyncd/lsyncd
repo: https://github.com/lsyncd/lsyncd
docs: https://github.com/lsyncd/lsyncd
package-manager:
  apk: lsyncd
  brew: lsyncd
  debian: lsyncd
  dnf: lsyncd
  nix: lsyncd
  ubuntu: lsyncd
  zypper: lsyncd
package-manager-url: https://formulae.brew.sh/formula/lsyncd
version: 2.3.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Synchronize local directories with remote targets
source-archive: https://github.com/lsyncd/lsyncd/archive/refs/tags/release-2.3.1.tar.gz
dependencies:
  - lua@5.4
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: lsyncd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lsyncd
  av: sudo av install brew:lsyncd
  brew: brew install lsyncd
  debian: sudo apt install lsyncd
  dnf: sudo dnf install lsyncd
  nix: nix profile install nixpkgs#lsyncd
  ubuntu: sudo apt install lsyncd
  zypper: sudo zypper install lsyncd
provenance:
  formula: lsyncd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
