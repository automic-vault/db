id: brew:wumpus
display-name: wumpus
homepage: http://www.catb.org/~esr/wumpus/
repo: https://gitlab.com/esr/wumpus/-/archive/1.12/wumpus-1.12.tar.bz2
docs: http://www.catb.org/~esr/wumpus/
package-manager:
  brew: wumpus
  macports: wumpus
  zypper: wumpus
package-manager-url: https://formulae.brew.sh/formula/wumpus
version: 1.12
license: BSD-2-Clause
category: development
tags:
  - cli
description: Exact clone of the ancient BASIC Hunt the Wumpus game
source-archive: https://gitlab.com/esr/wumpus/-/archive/1.12/wumpus-1.12.tar.bz2
build-dependencies:
  - asciidoctor
executables:
  - exposure: global executable
    kind: cli
    name: superhack
  - exposure: global executable
    kind: cli
    name: wumpus
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wumpus
  brew: brew install wumpus
  macports: sudo port install wumpus
  zypper: sudo zypper install wumpus
provenance:
  formula: wumpus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
