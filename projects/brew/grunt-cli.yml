id: brew:grunt-cli
display-name: grunt-cli
homepage: https://gruntjs.com/
repo: https://registry.npmjs.org/grunt-cli/-/grunt-cli-1.5.0.tgz
docs: https://gruntjs.com/
package-manager:
  brew: grunt-cli
  debian: grunt
  nix: grunt-cli
  pacman: grunt-cli
  ubuntu: grunt
  winget: Grunt.Grunt
package-manager-url: https://formulae.brew.sh/formula/grunt-cli
version: 1.5.0
license: MIT
category: network
tags:
  - cli
description: JavaScript Task Runner
source-archive: https://registry.npmjs.org/grunt-cli/-/grunt-cli-1.5.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: grunt
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:grunt-cli
  brew: brew install grunt-cli
  debian: sudo apt install grunt
  nix: nix profile install nixpkgs#grunt-cli
  pacman: sudo pacman -S grunt-cli
  ubuntu: sudo apt install grunt
  winget: winget install --id Grunt.Grunt -e
provenance:
  formula: grunt-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
