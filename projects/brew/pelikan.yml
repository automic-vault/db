id: brew:pelikan
display-name: pelikan
homepage: https://twitter.github.io/pelikan
repo: https://github.com/twitter/pelikan
docs: https://twitter.github.io/pelikan
package-manager:
  brew: pelikan
package-manager-url: https://formulae.brew.sh/formula/pelikan
version: 0.1.2
license: Apache-2.0
category: development
tags:
  - cli
description: Production-ready cache services
source-archive: https://github.com/twitter/pelikan/archive/refs/tags/0.1.2.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: pelikan_pingserver
  - exposure: global executable
    kind: cli
    name: pelikan_slimcache
  - exposure: global executable
    kind: cli
    name: pelikan_twemcache
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pelikan
  brew: brew install pelikan
provenance:
  formula: pelikan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
