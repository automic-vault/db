id: brew:fdroidcl
display-name: fdroidcl
homepage: https://github.com/Hoverth/fdroidcl
repo: https://github.com/Hoverth/fdroidcl
docs: https://github.com/Hoverth/fdroidcl
package-manager:
  brew: fdroidcl
  debian: fdroidcl
  nix: fdroidcl
  ubuntu: fdroidcl
  winget: Hoverth.fdroidcl
package-manager-url: https://formulae.brew.sh/formula/fdroidcl
version: 0.8.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: F-Droid desktop client
source-archive: https://github.com/Hoverth/fdroidcl/archive/refs/tags/v0.8.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fdroidcl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fdroidcl
  brew: brew install fdroidcl
  debian: sudo apt install fdroidcl
  nix: nix profile install nixpkgs#fdroidcl
  ubuntu: sudo apt install fdroidcl
  winget: winget install --id Hoverth.fdroidcl -e
provenance:
  formula: fdroidcl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
