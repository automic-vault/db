id: brew:liblzf
display-name: liblzf
homepage: https://oldhome.schmorp.de/marc/liblzf.html
repo: https://dist.schmorp.de/liblzf/liblzf-3.6.tar.gz
docs: https://oldhome.schmorp.de/marc/liblzf.html
package-manager:
  apk: liblzf
  brew: liblzf
  dnf: liblzf
  nix: liblzf
  pacman: liblzf
package-manager-url: https://formulae.brew.sh/formula/liblzf
version: 3.6
license: BSD-2-Clause AND (BSD-2-Clause OR GPL-2.0-or-later)
category: network
tags:
  - cli
description: Very small, very fast data compression library
source-archive: https://dist.schmorp.de/liblzf/liblzf-3.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lzf
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add liblzf
  av: sudo av install brew:liblzf
  brew: brew install liblzf
  dnf: sudo dnf install liblzf
  nix: nix profile install nixpkgs#liblzf
  pacman: sudo pacman -S liblzf
provenance:
  formula: liblzf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
