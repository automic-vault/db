id: brew:libtool
display-name: libtool
homepage: https://www.gnu.org/software/libtool/
repo: https://ftpmirror.gnu.org/gnu/libtool/libtool-2.5.4.tar.xz
docs: https://www.gnu.org/software/libtool/
package-manager:
  apk: libtool
  brew: libtool
  debian: libtool
  dnf: libtool
  macports: libtool
  nix: libtool
  pacman: libtool
  ubuntu: libtool
  zypper: libtool
package-manager-url: https://formulae.brew.sh/formula/libtool
version: 2.5.4
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Generic library support script
source-archive: https://ftpmirror.gnu.org/gnu/libtool/libtool-2.5.4.tar.xz
dependencies:
  - m4
executables:
  - exposure: global executable
    kind: cli
    name: glibtool
  - exposure: global executable
    kind: cli
    name: glibtoolize
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sequoia
    - sonoma
    - tahoe
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    All commands have been installed with the prefix "g". If you need to use these
    commands with their normal names, you can add a "gnubin" directory to your PATH from
    your bashrc like: PATH="$HOMEBREW_PREFIX/opt/libtool/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add libtool
  av: sudo av install brew:libtool
  brew: brew install libtool
  debian: sudo apt install libtool
  dnf: sudo dnf install libtool
  macports: sudo port install libtool
  nix: nix profile install nixpkgs#libtool
  pacman: sudo pacman -S libtool
  ubuntu: sudo apt install libtool
  zypper: sudo zypper install libtool
provenance:
  formula: libtool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
