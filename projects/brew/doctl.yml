id: brew:doctl
display-name: doctl
homepage: https://github.com/digitalocean/doctl
repo: https://github.com/digitalocean/doctl
docs: https://github.com/digitalocean/doctl
package-manager:
  apk: doctl
  brew: doctl
  dnf: doctl
  macports: doctl
  nix: doctl
  pacman: doctl
  scoop: main/doctl
  winget: DigitalOcean.Doctl
package-manager-url: https://formulae.brew.sh/formula/doctl
version: 1.160.0
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool for DigitalOcean
source-archive: https://github.com/digitalocean/doctl/archive/refs/tags/v1.160.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: doctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add doctl
  av: sudo av install brew:doctl
  brew: brew install doctl
  dnf: sudo dnf install doctl
  macports: sudo port install doctl
  nix: nix profile install nixpkgs#doctl
  pacman: sudo pacman -S doctl
  scoop: scoop install main/doctl
  winget: winget install --id DigitalOcean.Doctl -e
provenance:
  formula: doctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
