id: brew:mani
display-name: mani
homepage: https://manicli.com
repo: https://github.com/alajmo/mani
docs: https://manicli.com
package-manager:
  brew: mani
  macports: mani
  nix: mani
package-manager-url: https://formulae.brew.sh/formula/mani
version: 0.32.1
license: MIT
category: development
tags:
  - cli
description: CLI tool to help you manage repositories
source-archive: https://github.com/alajmo/mani/archive/refs/tags/v0.32.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mani
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mani
  brew: brew install mani
  macports: sudo port install mani
  nix: nix profile install nixpkgs#mani
provenance:
  formula: mani
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
