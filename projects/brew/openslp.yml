id: brew:openslp
display-name: openslp
homepage: http://www.openslp.org
repo: >
  https://downloads.sourceforge.net/project/openslp/2.0.0/2.0.0%20Release/openslp-2.0.0.tar.gz
docs: http://www.openslp.org
package-manager:
  brew: openslp
  dnf: openslp
  macports: openslp
  nix: openslp
  zypper: openslp
package-manager-url: https://formulae.brew.sh/formula/openslp
version: 2.0.0
license: BSD-3-Clause
category: network
tags:
  - cli
description: Implementation of Service Location Protocol
source-archive: >
  https://downloads.sourceforge.net/project/openslp/2.0.0/2.0.0%20Release/openslp-2.0.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: slpd
  - exposure: global executable
    kind: cli
    name: slptool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:openslp
  brew: brew install openslp
  dnf: sudo dnf install openslp
  macports: sudo port install openslp
  nix: nix profile install nixpkgs#openslp
  zypper: sudo zypper install openslp
provenance:
  formula: openslp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
