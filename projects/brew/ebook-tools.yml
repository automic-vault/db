id: brew:ebook-tools
display-name: ebook-tools
homepage: https://sourceforge.net/projects/ebook-tools/
repo: >
  https://downloads.sourceforge.net/project/ebook-tools/ebook-tools/0.2.2/ebook-tools-0.2.2.tar.gz
docs: https://sourceforge.net/projects/ebook-tools/
package-manager:
  apk: ebook-tools
  brew: ebook-tools
  dnf: ebook-tools
  macports: ebook-tools
  nix: ebook_tools
  pacman: ebook-tools
  zypper: ebook-tools
package-manager-url: https://formulae.brew.sh/formula/ebook-tools
version: 0.2.2
license: MIT
category: development
tags:
  - cli
description: Access and convert several ebook formats
source-archive: >
  https://downloads.sourceforge.net/project/ebook-tools/ebook-tools/0.2.2/ebook-tools-0.2.2.tar.gz
dependencies:
  - libzip
build-dependencies:
  - cmake
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: einfo
  - exposure: global executable
    kind: cli
    name: lit2epub
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ebook-tools
  av: sudo av install brew:ebook-tools
  brew: brew install ebook-tools
  dnf: sudo dnf install ebook-tools
  macports: sudo port install ebook-tools
  nix: nix profile install nixpkgs#ebook_tools
  pacman: sudo pacman -S ebook-tools
  zypper: sudo zypper install ebook-tools
provenance:
  formula: ebook-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
