id: brew:archivemount
display-name: archivemount
homepage: https://git.sr.ht/~nabijaczleweli/archivemount-ng
repo: https://git.sr.ht/~nabijaczleweli/archivemount-ng/archive/1b.tar.gz
docs: https://git.sr.ht/~nabijaczleweli/archivemount-ng
package-manager:
  apk: archivemount
  brew: archivemount
  debian: archivemount
  dnf: archivemount
  macports: archivemount
  nix: archivemount
  ubuntu: archivemount
package-manager-url: https://formulae.brew.sh/formula/archivemount
version: 1b
license: LGPL-2.0-or-later
category: development
tags:
  - cli
description: File system for accessing archives using libarchive
source-archive: https://git.sr.ht/~nabijaczleweli/archivemount-ng/archive/1b.tar.gz
dependencies:
  - libarchive
  - libfuse
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: archivemount
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add archivemount
  av: sudo av install brew:archivemount
  brew: brew install archivemount
  debian: sudo apt install archivemount
  dnf: sudo dnf install archivemount
  macports: sudo port install archivemount
  nix: nix profile install nixpkgs#archivemount
  ubuntu: sudo apt install archivemount
provenance:
  formula: archivemount
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
