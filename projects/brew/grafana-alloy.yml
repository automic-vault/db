id: brew:grafana-alloy
display-name: grafana-alloy
homepage: https://grafana.com/oss/alloy-opentelemetry-collector/
repo: https://github.com/grafana/alloy
docs: https://grafana.com/oss/alloy-opentelemetry-collector/
package-manager:
  apk: alloy
  brew: grafana-alloy
  chocolatey: grafana-alloy
  nix: grafana-alloy
  pacman: grafana-alloy
  winget: GrafanaLabs.Alloy
  zypper: alloy
package-manager-url: https://formulae.brew.sh/formula/grafana-alloy
version: 1.16.1
license: Apache-2.0
category: development
tags:
  - cli
description: OpenTelemetry Collector distribution with programmable pipelines
source-archive: https://github.com/grafana/alloy/archive/refs/tags/v1.16.1.tar.gz
build-dependencies:
  - go
  - node
executables:
  - exposure: global executable
    kind: cli
    name: alloy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: Alloy configuration directory is $HOMEBREW_PREFIX/etc/grafana-alloy
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add alloy
  av: sudo av install brew:grafana-alloy
  brew: brew install grafana-alloy
  chocolatey: choco install grafana-alloy
  nix: nix profile install nixpkgs#grafana-alloy
  pacman: sudo pacman -S grafana-alloy
  winget: winget install --id GrafanaLabs.Alloy -e
  zypper: sudo zypper install alloy
provenance:
  formula: grafana-alloy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
