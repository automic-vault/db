id: brew:eza
display-name: eza
homepage: https://github.com/eza-community/eza
repo: https://github.com/eza-community/eza
docs: https://github.com/eza-community/eza
package-manager:
  apk: eza
  brew: eza
  debian: eza
  dnf: eza
  macports: eza
  nix: eza
  pacman: eza
  scoop: main/eza
  ubuntu: eza
  winget: eza-community.eza
  zypper: eza
package-manager-url: https://formulae.brew.sh/formula/eza
version: 0.23.4
license: EUPL-1.2
category: development
tags:
  - cli
description: Modern, maintained replacement for ls
source-archive: https://github.com/eza-community/eza/archive/refs/tags/v0.23.4.tar.gz
dependencies:
  - libgit2
build-dependencies:
  - pandoc
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: eza
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add eza
  av: sudo av install brew:eza
  brew: brew install eza
  debian: sudo apt install eza
  dnf: sudo dnf install eza
  macports: sudo port install eza
  nix: nix profile install nixpkgs#eza
  pacman: sudo pacman -S eza
  scoop: scoop install main/eza
  ubuntu: sudo apt install eza
  winget: winget install --id eza-community.eza -e
  zypper: sudo zypper install eza
provenance:
  formula: eza
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
