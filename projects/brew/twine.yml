id: brew:twine
display-name: twine
homepage: https://github.com/pypa/twine
repo: >
  https://files.pythonhosted.org/packages/e0/a8/949edebe3a82774c1ec34f637f5dd82d1cf22c25e963b7d63771083bbee5/twine-6.2.0.tar.gz
docs: https://github.com/pypa/twine
package-manager:
  apk: twine
  brew: twine
  debian: twine
  dnf: twine
  macports: twine
  nix: twine
  pacman: twine
  scoop: extras/twine
  ubuntu: twine
  winget: ChrisKlimas.Twine
package-manager-url: https://formulae.brew.sh/formula/twine
version: 6.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: Utilities for interacting with PyPI
source-archive: >
  https://files.pythonhosted.org/packages/e0/a8/949edebe3a82774c1ec34f637f5dd82d1cf22c25e963b7d63771083bbee5/twine-6.2.0.tar.gz
dependencies:
  - certifi
  - python@3.14
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: twine
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
