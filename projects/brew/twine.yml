  nix: nix profile install nixpkgs#twine
  pacman: sudo pacman -S twine
  scoop: scoop install extras/twine
  ubuntu: sudo apt install twine
  winget: winget install --id ChrisKlimas.Twine -e
provenance:
  formula: twine
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
