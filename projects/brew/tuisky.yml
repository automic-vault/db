id: brew:tuisky
display-name: tuisky
homepage: https://github.com/sugyan/tuisky
repo: https://github.com/sugyan/tuisky
docs: https://github.com/sugyan/tuisky
package-manager:
  brew: tuisky
  nix: tuisky
package-manager-url: https://formulae.brew.sh/formula/tuisky
version: 0.2.2
license: MIT
category: development
tags:
  - cli
description: TUI client for bluesky
source-archive: https://github.com/sugyan/tuisky/archive/refs/tags/v0.2.2.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tuisky
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tuisky
  brew: brew install tuisky
  nix: nix profile install nixpkgs#tuisky
provenance:
  formula: tuisky
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
