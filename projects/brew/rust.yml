id: brew:rust
display-name: rust
homepage: https://www.rust-lang.org/
repo: https://static.rust-lang.org/dist/rustc-1.95.0-src.tar.gz
docs: https://www.rust-lang.org/
package-manager:
  apk: rust
  brew: rust
  chocolatey: rust
  debian: cargo
  dnf: rust
  macports: rust
  nix: rust
  pacman: rust
  scoop: main/rust
  ubuntu: cargo
  zypper: rust
package-manager-url: https://formulae.brew.sh/formula/rust
version: 1.95.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Safe, concurrent, practical language
source-archive: https://static.rust-lang.org/dist/rustc-1.95.0-src.tar.gz
dependencies:
  - libgit2
  - libssh2
  - llvm
  - openssl@3
  - pkgconf
  - zstd
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: cargo
  - exposure: global executable
    kind: cli
    name: cargo-clippy
  - exposure: global executable
    kind: cli
    name: cargo-fmt
  - exposure: global executable
    kind: cli
    name: clippy-driver
  - exposure: global executable
    kind: cli
    name: rust-gdb
  - exposure: global executable
    kind: cli
    name: rust-gdbgui
  - exposure: global executable
    kind: cli
    name: rust-lldb
  - exposure: global executable
    kind: cli
    name: rustc
  - exposure: global executable
    kind: cli
    name: rustdoc
  - exposure: global executable
    kind: cli
    name: rustfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Link this toolchain with `rustup` under the name `system` with: rustup toolchain
    link system "$(brew --prefix rust)" If you use rustup, avoid PATH conflicts by
    following instructions in: brew info rustup
  post-install-defined: false
install-lines:
  apk: sudo apk add rust
  av: sudo av install brew:rust
  brew: brew install rust
  chocolatey: choco install rust
  debian: sudo apt install cargo
  dnf: sudo dnf install rust
  macports: sudo port install rust
  nix: nix profile install nixpkgs#rust
  pacman: sudo pacman -S rust
  scoop: scoop install main/rust
  ubuntu: sudo apt install cargo
  zypper: sudo zypper install rust
provenance:
  formula: rust
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
