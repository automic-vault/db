id: brew:allureofthestars
display-name: allureofthestars
homepage: https://allureofthestars.com/
repo: https://hackage.haskell.org/package/Allure-0.11.0.0/Allure-0.11.0.0.tar.gz
docs: https://allureofthestars.com/
package-manager:
  brew: allureofthestars
  debian: allure
  nix: allure
  pacman: allure
  scoop: main/allure
  ubuntu: allure
package-manager-url: https://formulae.brew.sh/formula/allureofthestars
version: 0.11.0.0
license: AGPL-3.0-or-later AND GPL-2.0-or-later AND OFL-1.1 AND MIT AND Bitstream-Vera
category: network
tags:
  - cli
description: Near-future Sci-Fi roguelike and tactical squad combat game
source-archive: https://hackage.haskell.org/package/Allure-0.11.0.0/Allure-0.11.0.0.tar.gz
dependencies:
  - gmp
  - sdl2
  - sdl2_ttf
build-dependencies:
  - cabal-install
  - ghc
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: Allure
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:allureofthestars
  brew: brew install allureofthestars
  debian: sudo apt install allure
  nix: nix profile install nixpkgs#allure
  pacman: sudo pacman -S allure
  scoop: scoop install main/allure
  ubuntu: sudo apt install allure
provenance:
  formula: allureofthestars
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
