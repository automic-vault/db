id: brew:mkcert
display-name: mkcert
homepage: https://github.com/FiloSottile/mkcert
repo: https://github.com/FiloSottile/mkcert
docs: https://github.com/FiloSottile/mkcert
package-manager:
  apk: mkcert
  brew: mkcert
  chocolatey: mkcert
  debian: mkcert
  dnf: mkcert
  macports: mkcert
  nix: mkcert
  pacman: mkcert
  scoop: extras/mkcert
  ubuntu: mkcert
  winget: FiloSottile.mkcert
  zypper: mkcert
package-manager-url: https://formulae.brew.sh/formula/mkcert
version: 1.4.4
license: BSD-3-Clause
category: development
tags:
  - cli
description: Simple tool to make locally trusted development certificates
source-archive: https://github.com/FiloSottile/mkcert/archive/refs/tags/v1.4.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mkcert
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mkcert
  av: sudo av install brew:mkcert
  brew: brew install mkcert
  chocolatey: choco install mkcert
  debian: sudo apt install mkcert
  dnf: sudo dnf install mkcert
  macports: sudo port install mkcert
  nix: nix profile install nixpkgs#mkcert
  pacman: sudo pacman -S mkcert
  scoop: scoop install extras/mkcert
  ubuntu: sudo apt install mkcert
  winget: winget install --id FiloSottile.mkcert -e
  zypper: sudo zypper install mkcert
provenance:
  formula: mkcert
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
