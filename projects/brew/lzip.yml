id: brew:lzip
display-name: lzip
homepage: https://www.nongnu.org/lzip/
repo: https://download-mirror.savannah.gnu.org/releases/lzip/lzip-1.26.tar.gz
docs: https://www.nongnu.org/lzip/
package-manager:
  apk: lzip
  brew: lzip
  debian: lzip
  dnf: lzip
  macports: lzip
  nix: lzip
  pacman: lzip
  scoop: main/lzip
  ubuntu: lzip
  zypper: lzip
package-manager-url: https://formulae.brew.sh/formula/lzip
version: 1.26
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: LZMA-based compression program similar to gzip or bzip2
source-archive: https://download-mirror.savannah.gnu.org/releases/lzip/lzip-1.26.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lzip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lzip
  av: sudo av install brew:lzip
  brew: brew install lzip
  debian: sudo apt install lzip
  dnf: sudo dnf install lzip
  macports: sudo port install lzip
  nix: nix profile install nixpkgs#lzip
  pacman: sudo pacman -S lzip
  scoop: scoop install main/lzip
  ubuntu: sudo apt install lzip
  zypper: sudo zypper install lzip
provenance:
  formula: lzip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
