id: brew:checkpwn
display-name: checkpwn
homepage: https://github.com/brycx/checkpwn
repo: https://static.crates.io/crates/checkpwn/checkpwn-0.6.0.crate
docs: https://github.com/brycx/checkpwn
package-manager:
  brew: checkpwn
  nix: checkpwn
package-manager-url: https://formulae.brew.sh/formula/checkpwn
version: 0.6.0
license: MIT
category: security
tags:
  - cli
description: Check Have I Been Pwned and see if it's time for you to change passwords
source-archive: https://static.crates.io/crates/checkpwn/checkpwn-0.6.0.crate
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: checkpwn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:checkpwn
  brew: brew install checkpwn
  nix: nix profile install nixpkgs#checkpwn
provenance:
  formula: checkpwn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
