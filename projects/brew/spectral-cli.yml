id: brew:spectral-cli
display-name: spectral-cli
homepage: https://stoplight.io/open-source/spectral
repo: https://registry.npmjs.org/@stoplight/spectral-cli/-/spectral-cli-6.16.0.tgz
docs: https://stoplight.io/open-source/spectral
package-manager:
  brew: spectral-cli
  winget: Stoplight.Spectral
package-manager-url: https://formulae.brew.sh/formula/spectral-cli
version: 6.16.0
license: MIT
category: development
tags:
  - cli
  - json
  - yaml
description: JSON/YAML linter and support OpenAPI v3.1/v3.0/v2.0, and AsyncAPI v2.x
source-archive: https://registry.npmjs.org/@stoplight/spectral-cli/-/spectral-cli-6.16.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: spectral
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spectral-cli
  brew: brew install spectral-cli
  winget: winget install --id Stoplight.Spectral -e
provenance:
  formula: spectral-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
