id: brew:git-lfs
display-name: git-lfs
homepage: https://git-lfs.com/
repo: https://github.com/git-lfs/git-lfs
docs: https://git-lfs.com/
package-manager:
  apk: git-lfs
  brew: git-lfs
  chocolatey: git-lfs
  debian: git-lfs
  dnf: git-lfs
  macports: git-lfs
  nix: git-lfs
  pacman: git-lfs
  scoop: main/git-lfs
  ubuntu: git-lfs
  winget: GitHub.GitLFS
  zypper: git-lfs
package-manager-url: https://formulae.brew.sh/formula/git-lfs
version: 3.7.1
license: MIT
category: development
tags:
  - cli
  - git
description: Git extension for versioning large files
source-archive: https://github.com/git-lfs/git-lfs/releases/download/v3.7.1/git-lfs-v3.7.1.tar.gz
build-dependencies:
  - asciidoctor
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-lfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Update your git config to finish installation: # Update global git config $ git lfs
    install # Update system git config $ git lfs install --system
  post-install-defined: false
install-lines:
  apk: sudo apk add git-lfs
  av: sudo av install brew:git-lfs
  brew: brew install git-lfs
  chocolatey: choco install git-lfs
  debian: sudo apt install git-lfs
  dnf: sudo dnf install git-lfs
  macports: sudo port install git-lfs
  nix: nix profile install nixpkgs#git-lfs
  pacman: sudo pacman -S git-lfs
  scoop: scoop install main/git-lfs
  ubuntu: sudo apt install git-lfs
  winget: winget install --id GitHub.GitLFS -e
  zypper: sudo zypper install git-lfs
provenance:
  formula: git-lfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
