id: brew:halibut
display-name: halibut
homepage: https://www.chiark.greenend.org.uk/~sgtatham/halibut/
repo: https://www.chiark.greenend.org.uk/~sgtatham/halibut/halibut-1.3/halibut-1.3.tar.gz
docs: https://www.chiark.greenend.org.uk/~sgtatham/halibut/
package-manager:
  brew: halibut
  debian: halibut
  dnf: halibut
  nix: halibut
  pacman: halibut
  ubuntu: halibut
  zypper: halibut
package-manager-url: https://formulae.brew.sh/formula/halibut
version: 1.3
license: MIT AND APAFML
category: network
tags:
  - cli
description: Yet another free document preparation system
source-archive: https://www.chiark.greenend.org.uk/~sgtatham/halibut/halibut-1.3/halibut-1.3.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: halibut
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:halibut
  brew: brew install halibut
  debian: sudo apt install halibut
  dnf: sudo dnf install halibut
  nix: nix profile install nixpkgs#halibut
  pacman: sudo pacman -S halibut
  ubuntu: sudo apt install halibut
  zypper: sudo zypper install halibut
provenance:
  formula: halibut
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
