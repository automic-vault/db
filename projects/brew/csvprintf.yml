id: brew:csvprintf
display-name: csvprintf
homepage: https://github.com/archiecobbs/csvprintf
repo: https://github.com/archiecobbs/csvprintf
docs: https://github.com/archiecobbs/csvprintf
package-manager:
  brew: csvprintf
  zypper: csvprintf
package-manager-url: https://formulae.brew.sh/formula/csvprintf
version: 1.3.4
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line utility for parsing CSV files
source-archive: https://github.com/archiecobbs/csvprintf/archive/refs/tags/1.3.4.tar.gz
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: csvprintf
  - exposure: global executable
    kind: cli
    name: xml2csv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:csvprintf
  brew: brew install csvprintf
  zypper: sudo zypper install csvprintf
provenance:
  formula: csvprintf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
