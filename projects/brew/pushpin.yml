id: brew:pushpin
display-name: pushpin
homepage: https://pushpin.org/
repo: https://github.com/fastly/pushpin
docs: https://pushpin.org/
package-manager:
  brew: pushpin
  ubuntu: pushpin
package-manager-url: https://formulae.brew.sh/formula/pushpin
version: 1.41.0
license: Apache-2.0
category: development
tags:
  - cli
description: Reverse proxy for realtime web services
source-archive: https://github.com/fastly/pushpin/releases/download/v1.41.0/pushpin-1.41.0.tar.bz2
dependencies:
  - openssl@3
  - python@3.14
  - qtbase
  - zeromq
  - zurl
build-dependencies:
  - boost
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: m2adapter
  - exposure: global executable
    kind: cli
    name: pushpin
  - exposure: global executable
    kind: cli
    name: pushpin-condure
  - exposure: global executable
    kind: cli
    name: pushpin-connmgr
  - exposure: global executable
    kind: cli
    name: pushpin-handler
  - exposure: global executable
    kind: cli
    name: pushpin-proxy
  - exposure: global executable
    kind: cli
    name: pushpin-publish
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pushpin
  brew: brew install pushpin
  ubuntu: sudo apt install pushpin
provenance:
  formula: pushpin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
