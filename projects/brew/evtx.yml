id: brew:evtx
display-name: evtx
homepage: https://github.com/omerbenamram/evtx
repo: https://github.com/omerbenamram/evtx
docs: https://github.com/omerbenamram/evtx
package-manager:
  brew: evtx
  nix: evtx
package-manager-url: https://formulae.brew.sh/formula/evtx
version: 0.11.2
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Windows XML Event Log parser
source-archive: https://github.com/omerbenamram/evtx/archive/refs/tags/v0.11.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bench_evtx_dump_loop
  - exposure: global executable
    kind: cli
    name: bench_tree_build
  - exposure: global executable
    kind: cli
    name: bench_tree_build_direct
  - exposure: global executable
    kind: cli
    name: bench_utf16_escape_matrix
  - exposure: global executable
    kind: cli
    name: evtx_dump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:evtx
  brew: brew install evtx
  nix: nix profile install nixpkgs#evtx
provenance:
  formula: evtx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
