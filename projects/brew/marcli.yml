id: brew:marcli
display-name: marcli
homepage: https://github.com/hectorcorrea/marcli
repo: https://github.com/hectorcorrea/marcli
docs: https://github.com/hectorcorrea/marcli
package-manager:
  brew: marcli
package-manager-url: https://formulae.brew.sh/formula/marcli
version: 1.3.1
license: MIT
category: development
tags:
  - cli
description: Parse MARC (ISO 2709) files
source-archive: https://github.com/hectorcorrea/marcli/archive/refs/tags/v1.3.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: marcli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:marcli
  brew: brew install marcli
provenance:
  formula: marcli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
