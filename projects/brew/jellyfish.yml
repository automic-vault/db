id: brew:jellyfish
display-name: jellyfish
homepage: https://github.com/gmarcais/Jellyfish
repo: https://github.com/gmarcais/Jellyfish
docs: https://github.com/gmarcais/Jellyfish
package-manager:
  brew: jellyfish
  debian: jellyfish
  nix: jellyfish
  ubuntu: jellyfish
package-manager-url: https://formulae.brew.sh/formula/jellyfish
version: 2.3.1
license: BSD-3-Clause OR GPL-3.0-or-later
category: development
tags:
  - cli
description: Fast, memory-efficient counting of DNA k-mers
source-archive: https://github.com/gmarcais/Jellyfish/releases/download/v2.3.1/jellyfish-2.3.1.tar.gz
dependencies:
  - htslib
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: jellyfish
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jellyfish
  brew: brew install jellyfish
  debian: sudo apt install jellyfish
  nix: nix profile install nixpkgs#jellyfish
  ubuntu: sudo apt install jellyfish
provenance:
  formula: jellyfish
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
