id: brew:csound
display-name: csound
homepage: https://csound.com
repo: https://github.com/csound/csound
docs: https://csound.com
package-manager:
  brew: csound
  debian: csound
  macports: csound
  nix: csound
  pacman: csound
  ubuntu: csound
  zypper: csound
package-manager-url: https://formulae.brew.sh/formula/csound
version: 6.18.1
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Sound and music computing system
source-archive: https://github.com/csound/csound.git
dependencies:
  - faust
  - fltk
  - fluid-synth
  - gettext
  - hdf5
  - jack
  - lame
  - liblo
  - libpng
  - libsamplerate
  - libsndfile
  - libwebsockets
  - numpy
  - openjdk
  - openssl@3
  - portaudio
  - portmidi
  - python@3.14
  - stk
  - wiiuse
build-dependencies:
  - asio
  - cmake
  - eigen
  - swig
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: atsa
  - exposure: global executable
    kind: cli
    name: cs
  - exposure: global executable
