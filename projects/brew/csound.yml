  - exposure: global executable
    kind: cli
    name: dnoise
  - exposure: global executable
    kind: cli
    name: envext
  - exposure: global executable
    kind: cli
    name: extract
  - exposure: global executable
    kind: cli
    name: extractor
  - exposure: global executable
    kind: cli
    name: het_export
  - exposure: global executable
    kind: cli
    name: het_import
  - exposure: global executable
    kind: cli
