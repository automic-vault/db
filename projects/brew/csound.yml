  - exposure: global executable
    kind: cli
    name: sdif2ad
  - exposure: global executable
    kind: cli
    name: sndinfo
  - exposure: global executable
    kind: cli
    name: src_conv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To use the Java bindings, you may need to add to your shell profile e.g. ~/.profile
    or ~/.zshrc: export CLASSPATH="$HOMEBREW_PREFIX/opt/csound/libexec/csnd6.jar:." and
    link the native shared library into your Java Extensions folder: mkdir -p
    ~/Library/Java/Extensions ln -s
    "$HOMEBREW_PREFIX/opt/csound/libexec/lib_jcsound6.jnilib" ~/Library/Java/Extensions
  post-install-defined: false
install-lines:
  av: sudo av install brew:csound
  brew: brew install csound
  debian: sudo apt install csound
  macports: sudo port install csound
  nix: nix profile install nixpkgs#csound
  pacman: sudo pacman -S csound
  ubuntu: sudo apt install csound
  zypper: sudo zypper install csound
provenance:
  formula: csound
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
