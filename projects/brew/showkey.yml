id: brew:showkey
display-name: showkey
homepage: http://www.catb.org/~esr/showkey/
repo: https://gitlab.com/esr/showkey/-/archive/1.10/showkey-1.10.tar.bz2
docs: http://www.catb.org/~esr/showkey/
package-manager:
  brew: showkey
  macports: showkey
package-manager-url: https://formulae.brew.sh/formula/showkey
version: 1.10
license: MIT
category: development
tags:
  - cli
description: Simple keystroke visualizer
source-archive: https://gitlab.com/esr/showkey/-/archive/1.10/showkey-1.10.tar.bz2
build-dependencies:
  - asciidoctor
executables:
  - exposure: global executable
    kind: cli
    name: showkey
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:showkey
  brew: brew install showkey
  macports: sudo port install showkey
provenance:
  formula: showkey
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
