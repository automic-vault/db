id: brew:dockerfmt
display-name: dockerfmt
homepage: https://github.com/reteps/dockerfmt
repo: https://github.com/reteps/dockerfmt
docs: https://github.com/reteps/dockerfmt
package-manager:
  brew: dockerfmt
  nix: dockerfmt
package-manager-url: https://formulae.brew.sh/formula/dockerfmt
version: 0.5.2
license: MIT
category: development
tags:
  - cli
description: Dockerfile format and parser. a modern dockfmt
source-archive: https://github.com/reteps/dockerfmt/archive/refs/tags/v0.5.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dockerfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dockerfmt
  brew: brew install dockerfmt
  nix: nix profile install nixpkgs#dockerfmt
provenance:
  formula: dockerfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
