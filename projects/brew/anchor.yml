id: brew:anchor
display-name: anchor
homepage: https://anchor-lang.com
repo: https://github.com/solana-foundation/anchor
docs: https://anchor-lang.com
package-manager:
  brew: anchor
  nix: anchor
package-manager-url: https://formulae.brew.sh/formula/anchor
version: 1.0.2
license: Apache-2.0
category: development
tags:
  - cli
description: Solana Program Framework
source-archive: https://github.com/solana-foundation/anchor/archive/refs/tags/v1.0.2.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: anchor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:anchor
  brew: brew install anchor
  nix: nix profile install nixpkgs#anchor
provenance:
  formula: anchor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
