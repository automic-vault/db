id: brew:calceph
display-name: calceph
homepage: https://www.imcce.fr/inpop/calceph
repo: https://www.imcce.fr/content/medias/recherche/equipes/asd/calceph/calceph-4.0.5.tar.gz
docs: https://www.imcce.fr/inpop/calceph
package-manager:
  brew: calceph
  debian: calceph
  dnf: calceph
  nix: calceph
package-manager-url: https://formulae.brew.sh/formula/calceph
version: 4.0.5
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: C library to access the binary planetary ephemeris files
source-archive: https://www.imcce.fr/content/medias/recherche/equipes/asd/calceph/calceph-4.0.5.tar.gz
dependencies:
  - gcc
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: calceph_inspector
  - exposure: global executable
    kind: cli
    name: calceph_queryorientation
  - exposure: global executable
    kind: cli
    name: calceph_queryposition
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:calceph
  brew: brew install calceph
  debian: sudo apt install calceph
  dnf: sudo dnf install calceph
  nix: nix profile install nixpkgs#calceph
provenance:
  formula: calceph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
