id: brew:gitea
display-name: gitea
homepage: https://about.gitea.com/
repo: https://dl.gitea.com/gitea/1.26.2/gitea-src-1.26.2.tar.gz
docs: https://about.gitea.com/
package-manager:
  apk: gitea
  brew: gitea
  chocolatey: gitea
  nix: gitea
  pacman: gitea
  scoop: main/gitea
package-manager-url: https://formulae.brew.sh/formula/gitea
version: 1.26.2
license: MIT
category: development
tags:
  - cli
description: Painless self-hosted all-in-one software development service
source-archive: https://dl.gitea.com/gitea/1.26.2/gitea-src-1.26.2.tar.gz
build-dependencies:
  - go
  - node
  - yarn
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: gitea
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add gitea
  av: sudo av install brew:gitea
  brew: brew install gitea
  chocolatey: choco install gitea
  nix: nix profile install nixpkgs#gitea
  pacman: sudo pacman -S gitea
  scoop: scoop install main/gitea
provenance:
  formula: gitea
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
