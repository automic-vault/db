id: brew:dopewars
display-name: dopewars
homepage: https://dopewars.sourceforge.io
repo: https://downloads.sourceforge.net/project/dopewars/dopewars/1.6.2/dopewars-1.6.2.tar.gz
docs: https://dopewars.sourceforge.io
package-manager:
  brew: dopewars
  debian: dopewars
  macports: dopewars
  nix: dopewars
  pacman: dopewars
  ubuntu: dopewars
package-manager-url: https://formulae.brew.sh/formula/dopewars
version: 1.6.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Free rewrite of a game originally based on "Drug Wars"
source-archive: https://downloads.sourceforge.net/project/dopewars/dopewars/1.6.2/dopewars-1.6.2.tar.gz
dependencies:
  - gettext
  - glib
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: dopewars
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dopewars
  brew: brew install dopewars
  debian: sudo apt install dopewars
  macports: sudo port install dopewars
  nix: nix profile install nixpkgs#dopewars
  pacman: sudo pacman -S dopewars
  ubuntu: sudo apt install dopewars
provenance:
  formula: dopewars
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
