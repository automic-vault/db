id: brew:disktype
display-name: disktype
homepage: https://disktype.sourceforge.net/
repo: https://downloads.sourceforge.net/project/disktype/disktype/9/disktype-9.tar.gz
docs: https://disktype.sourceforge.net/
package-manager:
  brew: disktype
  debian: disktype
  dnf: disktype
  macports: disktype
  ubuntu: disktype
package-manager-url: https://formulae.brew.sh/formula/disktype
version: 9
license: MIT
category: development
tags:
  - cli
description: Detect content format of a disk or disk image
source-archive: https://downloads.sourceforge.net/project/disktype/disktype/9/disktype-9.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: disktype
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:disktype
  brew: brew install disktype
  debian: sudo apt install disktype
  dnf: sudo dnf install disktype
  macports: sudo port install disktype
  ubuntu: sudo apt install disktype
provenance:
  formula: disktype
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
