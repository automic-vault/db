id: brew:cling
display-name: cling
homepage: https://root.cern/cling/
repo: https://github.com/root-project/cling
docs: https://root.cern/cling/
package-manager:
  brew: cling
  nix: cling
package-manager-url: https://formulae.brew.sh/formula/cling
version: 1.3
license: (LGPL-2.1-only OR NCSA) AND (Apache-2.0 WITH LLVM-exception)
category: development
tags:
  - cli
description: C++ interpreter
source-archive: https://github.com/root-project/cling/archive/refs/tags/v1.3.tar.gz
dependencies:
  - zstd
build-dependencies:
  - cmake
uses-from-macos:
  - libedit
  - libxml2
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cling
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cling
  brew: brew install cling
  nix: nix profile install nixpkgs#cling
provenance:
  formula: cling
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
