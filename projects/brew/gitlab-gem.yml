id: brew:gitlab-gem
display-name: gitlab-gem
homepage: https://narkoz.github.io/gitlab/
repo: https://github.com/NARKOZ/gitlab
docs: https://narkoz.github.io/gitlab/
package-manager:
  brew: gitlab-gem
  nix: gitlab
  pacman: gitlab
package-manager-url: https://formulae.brew.sh/formula/gitlab-gem
version: 6.1.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Ruby client and CLI for GitLab API
source-archive: https://github.com/NARKOZ/gitlab/archive/refs/tags/v6.1.0.tar.gz
dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: gitlab
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gitlab-gem
  brew: brew install gitlab-gem
  nix: nix profile install nixpkgs#gitlab
  pacman: sudo pacman -S gitlab
provenance:
  formula: gitlab-gem
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
