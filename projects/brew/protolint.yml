id: brew:protolint
display-name: protolint
homepage: https://github.com/yoheimuta/protolint
repo: https://github.com/yoheimuta/protolint
docs: https://github.com/yoheimuta/protolint
package-manager:
  brew: protolint
  nix: protolint
  scoop: main/protolint
package-manager-url: https://formulae.brew.sh/formula/protolint
version: 0.56.4
license: MIT
category: development
tags:
  - cli
description: Pluggable linter and fixer to enforce Protocol Buffer style and conventions
source-archive: https://github.com/yoheimuta/protolint/archive/refs/tags/v0.56.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: protoc-gen-protolint
  - exposure: global executable
    kind: cli
    name: protolint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:protolint
  brew: brew install protolint
  nix: nix profile install nixpkgs#protolint
  scoop: scoop install main/protolint
provenance:
  formula: protolint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
