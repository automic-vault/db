id: brew:libpostal-rest
display-name: libpostal-rest
homepage: https://github.com/johnlonganecker/libpostal-rest
repo: https://github.com/johnlonganecker/libpostal-rest
docs: https://github.com/johnlonganecker/libpostal-rest
package-manager:
  brew: libpostal-rest
package-manager-url: https://formulae.brew.sh/formula/libpostal-rest
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: REST API for libpostal
source-archive: https://github.com/johnlonganecker/libpostal-rest/archive/refs/tags/v1.1.0.tar.gz
dependencies:
  - libpostal
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: libpostal-rest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libpostal-rest
  brew: brew install libpostal-rest
provenance:
  formula: libpostal-rest
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
