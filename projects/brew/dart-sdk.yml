id: brew:dart-sdk
display-name: dart-sdk
homepage: https://dart.dev
repo: https://github.com/dart-lang/sdk
docs: https://dart.dev
package-manager:
  apk: dart-sdk
  brew: dart-sdk
  chocolatey: dart-sdk
  macports: dart-sdk
  nix: dart
  pacman: dart
  scoop: main/dart
  winget: Google.DartSDK
package-manager-url: https://formulae.brew.sh/formula/dart-sdk
version: 3.12.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Dart Language SDK, including the VM, dart2js, core libraries, and more
source-archive: https://github.com/dart-lang/sdk/archive/refs/tags/3.12.1.tar.gz
build-dependencies:
  - ninja
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dart
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dart-sdk
  av: sudo av install brew:dart-sdk
  brew: brew install dart-sdk
  chocolatey: choco install dart-sdk
  macports: sudo port install dart-sdk
  nix: nix profile install nixpkgs#dart
  pacman: sudo pacman -S dart
  scoop: scoop install main/dart
  winget: winget install --id Google.DartSDK -e
provenance:
  formula: dart-sdk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
