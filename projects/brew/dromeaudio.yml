id: brew:dromeaudio
display-name: dromeaudio
homepage: https://github.com/joshb/dromeaudio/
repo: https://github.com/joshb/DromeAudio
docs: https://github.com/joshb/dromeaudio/
package-manager:
  brew: dromeaudio
package-manager-url: https://formulae.brew.sh/formula/dromeaudio
version: 0.3.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Small C++ audio manipulation and playback library
source-archive: https://github.com/joshb/DromeAudio/archive/refs/tags/v0.3.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: DromeAudioPlayer
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dromeaudio
  brew: brew install dromeaudio
provenance:
  formula: dromeaudio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
