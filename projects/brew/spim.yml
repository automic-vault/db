id: brew:spim
display-name: spim
homepage: https://spimsimulator.sourceforge.net/
repo: https://svn.code.sf.net/p/spimsimulator/code
docs: https://spimsimulator.sourceforge.net/
package-manager:
  brew: spim
  debian: spim
  dnf: spim
  macports: spim
  ubuntu: spim
  winget: JamesLarus.SPIM
package-manager-url: https://formulae.brew.sh/formula/spim
version: 9.1.24
license: BSD-3-Clause
category: network
tags:
  - cli
description: MIPS32 simulator
source-archive: https://svn.code.sf.net/p/spimsimulator/code
executables:
  - exposure: global executable
    kind: cli
    name: spim
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spim
  brew: brew install spim
  debian: sudo apt install spim
  dnf: sudo dnf install spim
  macports: sudo port install spim
  ubuntu: sudo apt install spim
  winget: winget install --id JamesLarus.SPIM -e
provenance:
  formula: spim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
