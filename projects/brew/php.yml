id: brew:php
display-name: php
homepage: https://www.php.net/
repo: https://www.php.net/distributions/php-8.5.6.tar.xz
docs: https://www.php.net/
package-manager:
  brew: php
  chocolatey: php
  debian: php
  dnf: php
  macports: php
  nix: php
  pacman: php
  scoop: main/php
  ubuntu: php
package-manager-url: https://formulae.brew.sh/formula/php
version: 8.5.6
license: >
  PHP-3.01 AND Zend-2.0 AND BSL-1.0 AND MIT AND Apache-1.0 AND Apache-2.0 AND
  bcrypt-Solar-Designer AND BSD-2-Clause-Darwin AND BSD-2-Clause AND BSD-3-Clause AND
  BSD-4-Clause-UC AND ISC AND LGPL-2.1-only AND LGPL-2.1-or-later AND OLDAP-2.8 AND TCL
  AND Zlib
category: development
tags:
  - cli
description: General-purpose scripting language
source-archive: https://www.php.net/distributions/php-8.5.6.tar.xz
dependencies:
  - apr
  - apr-util
  - argon2
  - autoconf
  - curl
  - freetds
  - gd
  - gettext
  - gmp
  - icu4c@78
  - libpq
  - libsodium
  - libzip
  - net-snmp
  - oniguruma
  - openldap
  - openssl@3
  - pcre2
  - sqlite
  - tidy-html5
  - unixodbc
build-dependencies:
  - httpd
  - pkgconf
uses-from-macos:
  - bzip2
  - libedit
  - libffi
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: pear
  - exposure: global executable
    kind: cli
    name: peardev
  - exposure: global executable
    kind: cli
    name: pecl
  - exposure: global executable
    kind: cli
    name: phar
  - exposure: global executable
    kind: cli
    name: phar.phar
  - exposure: global executable
    kind: cli
    name: php
  - exposure: global executable
    kind: cli
    name: php-cgi
  - exposure: global executable
    kind: cli
    name: php-config
  - exposure: global executable
    kind: cli
    name: php-fpm
  - exposure: global executable
    kind: cli
    name: phpdbg
  - exposure: global executable
    kind: cli
    name: phpize
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To enable PHP in Apache add the following to httpd.conf and restart Apache:
    LoadModule php_module $HOMEBREW_PREFIX/opt/php/lib/httpd/modules/libphp.so
    <FilesMatch \.php$> SetHandler application/x-httpd-php </FilesMatch> Finally, check
    DirectoryIndex includes index.php DirectoryIndex index.php index.html The php.ini
    and php-fpm.ini file can be found in: $HOMEBREW_PREFIX/etc/php/8.5/
  post-install-defined: true
  service: declared
install-lines:
  av: sudo av install brew:php
  brew: brew install php
  chocolatey: choco install php
  debian: sudo apt install php
  dnf: sudo dnf install php
  macports: sudo port install php
  nix: nix profile install nixpkgs#php
  pacman: sudo pacman -S php
  scoop: scoop install main/php
  ubuntu: sudo apt install php
provenance:
  formula: php
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
