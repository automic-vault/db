id: brew:cucumber-ruby
display-name: cucumber-ruby
homepage: https://cucumber.io
repo: https://github.com/cucumber/cucumber-ruby
docs: https://cucumber.io
package-manager:
  brew: cucumber-ruby
  debian: cucumber
  nix: cucumber
  ubuntu: cucumber
package-manager-url: https://formulae.brew.sh/formula/cucumber-ruby
version: 11.0.0
license: MIT
category: development
tags:
  - cli
description: Cucumber for Ruby
source-archive: https://github.com/cucumber/cucumber-ruby/archive/refs/tags/v11.0.0.tar.gz
dependencies:
  - ruby
build-dependencies:
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: cucumber
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cucumber-ruby
  brew: brew install cucumber-ruby
  debian: sudo apt install cucumber
  nix: nix profile install nixpkgs#cucumber
  ubuntu: sudo apt install cucumber
provenance:
  formula: cucumber-ruby
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
