id: brew:nkt
display-name: nkt
homepage: https://git.sr.ht/~fjebaker/nkt
repo: https://git.sr.ht/~fjebaker/nkt/archive/0.3.1.tar.gz
docs: https://git.sr.ht/~fjebaker/nkt
package-manager:
  brew: nkt
package-manager-url: https://formulae.brew.sh/formula/nkt
version: 0.3.1
license: GPL-3.0-or-later
category: database
tags:
  - cli
  - database
description: TUI for fast and simple interacting with your BibLaTeX database
source-archive: https://git.sr.ht/~fjebaker/nkt/archive/0.3.1.tar.gz
build-dependencies:
  - zig@0.15
executables:
  - exposure: global executable
    kind: cli
    name: nkt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nkt
  brew: brew install nkt
provenance:
  formula: nkt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
