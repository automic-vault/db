id: brew:biodiff
display-name: biodiff
homepage: https://github.com/8051Enthusiast/biodiff
repo: https://github.com/8051Enthusiast/biodiff
docs: https://github.com/8051Enthusiast/biodiff
package-manager:
  brew: biodiff
  nix: biodiff
  pacman: biodiff
  scoop: main/biodiff
  winget: 8051Enthusiast.biodiff
  zypper: biodiff
package-manager-url: https://formulae.brew.sh/formula/biodiff
version: 1.2.1
license: MIT
category: development
tags:
  - cli
description: Hex diff viewer using alignment algorithms from biology
source-archive: https://github.com/8051Enthusiast/biodiff.git
build-dependencies:
  - cmake
  - rust
uses-from-macos:
  - llvm
executables:
  - exposure: global executable
    kind: cli
    name: biodiff
  - exposure: global executable
    kind: cli
    name: git-biodiff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:biodiff
  brew: brew install biodiff
  nix: nix profile install nixpkgs#biodiff
  pacman: sudo pacman -S biodiff
  scoop: scoop install main/biodiff
  winget: winget install --id 8051Enthusiast.biodiff -e
  zypper: sudo zypper install biodiff
provenance:
  formula: biodiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
