id: brew:kubeone
display-name: kubeone
homepage: https://kubeone.io
repo: https://github.com/kubermatic/kubeone
docs: https://kubeone.io
package-manager:
  brew: kubeone
  nix: kubeone
  pacman: kubeone
  zypper: kubeone
package-manager-url: https://formulae.brew.sh/formula/kubeone
version: 1.13.5
license: Apache-2.0
category: development
tags:
  - cli
description: Automate cluster operations on all your environments
source-archive: https://github.com/kubermatic/kubeone/archive/refs/tags/v1.13.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubeone
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubeone
  brew: brew install kubeone
  nix: nix profile install nixpkgs#kubeone
  pacman: sudo pacman -S kubeone
  zypper: sudo zypper install kubeone
provenance:
  formula: kubeone
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
