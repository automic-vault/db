id: brew:mercurial
display-name: mercurial
homepage: https://mercurial-scm.org/
repo: https://www.mercurial-scm.org/release/mercurial-7.2.2.tar.gz
docs: https://mercurial-scm.org/
package-manager:
  apk: mercurial
  brew: mercurial
  chocolatey: hg
  debian: mercurial
  dnf: mercurial
  macports: mercurial
  nix: mercurial
  pacman: mercurial
  scoop: main/mercurial
  ubuntu: mercurial
  winget: Mercurial.Mercurial
  zypper: mercurial
package-manager-url: https://formulae.brew.sh/formula/mercurial
version: 7.2.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Scalable distributed version control system
source-archive: https://www.mercurial-scm.org/release/mercurial-7.2.2.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: chg
  - exposure: global executable
    kind: cli
    name: hg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add mercurial
  av: sudo av install brew:mercurial
  brew: brew install mercurial
  chocolatey: choco install hg
  debian: sudo apt install mercurial
  dnf: sudo dnf install mercurial
  macports: sudo port install mercurial
  nix: nix profile install nixpkgs#mercurial
  pacman: sudo pacman -S mercurial
  scoop: scoop install main/mercurial
  ubuntu: sudo apt install mercurial
  winget: winget install --id Mercurial.Mercurial -e
  zypper: sudo zypper install mercurial
provenance:
  formula: mercurial
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
