id: brew:literate-git
display-name: literate-git
homepage: https://github.com/bennorth/literate-git
repo: >
  https://files.pythonhosted.org/packages/61/ef/443d7a7db6d72b4f905fe43ea34b3f7f6ca5b2edc0ad241290671ef6c454/literategit-0.5.3.tar.gz
docs: https://github.com/bennorth/literate-git
package-manager:
  brew: literate-git
package-manager-url: https://formulae.brew.sh/formula/literate-git
version: 0.5.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
  - git
description: Render hierarchical git repositories into HTML
source-archive: >
  https://files.pythonhosted.org/packages/61/ef/443d7a7db6d72b4f905fe43ea34b3f7f6ca5b2edc0ad241290671ef6c454/literategit-0.5.3.tar.gz
dependencies:
  - pygit2
  - python@3.14
build-dependencies:
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: git-dump-all-trees
  - exposure: global executable
    kind: cli
    name: git-literate-render
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:literate-git
  brew: brew install literate-git
provenance:
  formula: literate-git
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
