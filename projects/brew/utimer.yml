id: brew:utimer
display-name: utimer
homepage: https://launchpad.net/utimer
repo: https://launchpad.net/utimer/0.4/0.4/+download/utimer-0.4.tar.gz
docs: https://launchpad.net/utimer
package-manager:
  brew: utimer
  macports: utimer
package-manager-url: https://formulae.brew.sh/formula/utimer
version: 0.4
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Multifunction timer tool
source-archive: https://launchpad.net/utimer/0.4/0.4/+download/utimer-0.4.tar.gz
dependencies:
  - gettext
  - glib
build-dependencies:
  - gettext
  - intltool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: utimer
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:utimer
  brew: brew install utimer
  macports: sudo port install utimer
provenance:
  formula: utimer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
