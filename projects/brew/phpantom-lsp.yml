id: brew:phpantom-lsp
display-name: phpantom-lsp
homepage: https://github.com/AJenbo/phpantom_lsp
repo: https://github.com/AJenbo/phpantom_lsp
docs: https://github.com/AJenbo/phpantom_lsp
package-manager:
  brew: phpantom-lsp
  nix: phpantom-lsp
package-manager-url: https://formulae.brew.sh/formula/phpantom-lsp
version: 0.8.0
license: MIT
category: development
tags:
  - cli
description: Fast PHP language server written in Rust
source-archive: https://github.com/AJenbo/phpantom_lsp/archive/refs/tags/0.8.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: phpantom_lsp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:phpantom-lsp
  brew: brew install phpantom-lsp
  nix: nix profile install nixpkgs#phpantom-lsp
provenance:
  formula: phpantom-lsp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
