id: brew:opensaml
display-name: opensaml
homepage: https://wiki.shibboleth.net/confluence/display/OpenSAML/Home
repo: https://shibboleth.net/downloads/c++-opensaml/3.3.1/opensaml-3.3.1.tar.bz2
docs: https://wiki.shibboleth.net/confluence/display/OpenSAML/Home
package-manager:
  brew: opensaml
  macports: opensaml
package-manager-url: https://formulae.brew.sh/formula/opensaml
version: 3.3.1
license: Apache-2.0
category: security
tags:
  - cli
  - security
description: Library for Security Assertion Markup Language
source-archive: https://shibboleth.net/downloads/c++-opensaml/3.3.1/opensaml-3.3.1.tar.bz2
dependencies:
  - log4shib
  - openssl@3
  - xerces-c
  - xml-security-c
  - xml-tooling-c
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: samlsign
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:opensaml
  brew: brew install opensaml
  macports: sudo port install opensaml
provenance:
  formula: opensaml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
