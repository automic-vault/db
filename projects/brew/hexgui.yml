id: brew:hexgui
display-name: hexgui
homepage: https://sourceforge.net/p/benzene/hexgui/
repo: https://github.com/apetresc/hexgui
docs: https://sourceforge.net/p/benzene/hexgui/
package-manager:
  brew: hexgui
  nix: hexgui
package-manager-url: https://formulae.brew.sh/formula/hexgui
version: 0.9.4
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: GUI for playing Hex over Hex Text Protocol
source-archive: https://github.com/apetresc/hexgui/archive/refs/tags/v0.9.4.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - ant
executables:
  - exposure: global executable
    kind: cli
    name: hexgui
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hexgui
  brew: brew install hexgui
  nix: nix profile install nixpkgs#hexgui
provenance:
  formula: hexgui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
