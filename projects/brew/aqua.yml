id: brew:aqua
display-name: aqua
homepage: https://aquaproj.github.io/
repo: https://github.com/aquaproj/aqua
docs: https://aquaproj.github.io/
package-manager:
  brew: aqua
  scoop: main/aqua
  winget: aquaproj.aqua
package-manager-url: https://formulae.brew.sh/formula/aqua
version: 2.59.1
license: MIT
category: development
tags:
  - cli
description: Declarative CLI Version manager
source-archive: https://github.com/aquaproj/aqua/archive/refs/tags/v2.59.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aqua
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aqua
  brew: brew install aqua
  scoop: scoop install main/aqua
  winget: winget install --id aquaproj.aqua -e
provenance:
  formula: aqua
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
