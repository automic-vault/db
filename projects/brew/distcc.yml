id: brew:distcc
display-name: distcc
homepage: https://github.com/distcc/distcc/
repo: https://github.com/distcc/distcc
docs: https://github.com/distcc/distcc/
package-manager:
  apk: distcc
  brew: distcc
  debian: distcc
  dnf: distcc
  macports: distcc
  nix: distcc
  pacman: distcc
  ubuntu: distcc
  zypper: distcc
package-manager-url: https://formulae.brew.sh/formula/distcc
version: 3.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Distributed compiler client and server
source-archive: https://github.com/distcc/distcc/releases/download/v3.4/distcc-3.4.tar.gz
dependencies:
  - python@3.14
build-dependencies:
  - python-setuptools
executables:
  - exposure: global executable
    kind: cli
    name: distcc
  - exposure: global executable
    kind: cli
    name: distccd
  - exposure: global executable
    kind: cli
    name: distccmon-text
  - exposure: global executable
    kind: cli
    name: lsdistcc
  - exposure: global executable
    kind: cli
    name: pump
  - exposure: global executable
    kind: cli
    name: update-distcc-symlinks
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add distcc
  av: sudo av install brew:distcc
  brew: brew install distcc
  debian: sudo apt install distcc
  dnf: sudo dnf install distcc
  macports: sudo port install distcc
  nix: nix profile install nixpkgs#distcc
  pacman: sudo pacman -S distcc
  ubuntu: sudo apt install distcc
  zypper: sudo zypper install distcc
provenance:
  formula: distcc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
