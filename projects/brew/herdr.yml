id: brew:herdr
display-name: herdr
homepage: https://herdr.dev
repo: https://github.com/ogulcancelik/herdr
docs: https://herdr.dev
package-manager:
  brew: herdr
package-manager-url: https://formulae.brew.sh/formula/herdr
version: 0.6.2
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Agent multiplexer that lives in your terminal
source-archive: https://github.com/ogulcancelik/herdr/archive/refs/tags/v0.6.2.tar.gz
build-dependencies:
  - rust
  - zig@0.15
executables:
  - exposure: global executable
    kind: cli
    name: herdr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:herdr
  brew: brew install herdr
provenance:
  formula: herdr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
