id: brew:pkgconf
display-name: pkgconf
homepage: https://github.com/pkgconf/pkgconf
repo: https://distfiles.ariadne.space/pkgconf/pkgconf-2.5.1.tar.xz
docs: https://github.com/pkgconf/pkgconf
package-manager:
  apk: pkgconf
  brew: pkgconf
  debian: pkgconf
  dnf: pkgconf
  macports: pkgconf
  nix: pkgconf
  pacman: pkgconf
  scoop: main/pkg-config
  ubuntu: pkgconf
  zypper: pkgconf
package-manager-url: https://formulae.brew.sh/formula/pkgconf
version: 2.5.1
license: ISC
category: development
tags:
  - cli
description: Package compiler and linker metadata toolkit
source-archive: https://distfiles.ariadne.space/pkgconf/pkgconf-2.5.1.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: bomtool
  - exposure: global executable
    kind: cli
    name: pkg-config
  - exposure: global executable
    kind: cli
    name: pkgconf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sequoia
    - sonoma
    - tahoe
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pkgconf
  av: sudo av install brew:pkgconf
  brew: brew install pkgconf
  debian: sudo apt install pkgconf
  dnf: sudo dnf install pkgconf
  macports: sudo port install pkgconf
  nix: nix profile install nixpkgs#pkgconf
  pacman: sudo pacman -S pkgconf
  scoop: scoop install main/pkg-config
  ubuntu: sudo apt install pkgconf
  zypper: sudo zypper install pkgconf
provenance:
  formula: pkgconf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
