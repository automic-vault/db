id: brew:cqlkit
display-name: cqlkit
homepage: https://github.com/tenmax/cqlkit
repo: https://github.com/tenmax/cqlkit
docs: https://github.com/tenmax/cqlkit
package-manager:
  brew: cqlkit
package-manager-url: https://formulae.brew.sh/formula/cqlkit
version: 0.3.3
license: Apache-2.0
category: development
tags:
  - cli
  - json
description: CLI tool to export Cassandra query as CSV and JSON format
source-archive: https://github.com/tenmax/cqlkit/releases/download/v0.3.3/cqlkit-0.3.3.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: cql2cql
  - exposure: global executable
    kind: cli
    name: cql2csv
  - exposure: global executable
    kind: cli
    name: cql2json
  - exposure: global executable
    kind: cli
    name: cqlkit
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cqlkit
  brew: brew install cqlkit
provenance:
  formula: cqlkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
