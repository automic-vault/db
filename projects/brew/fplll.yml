id: brew:fplll
display-name: fplll
homepage: https://github.com/fplll/fplll
repo: https://github.com/fplll/fplll
docs: https://github.com/fplll/fplll
package-manager:
  apk: fplll
  brew: fplll
  macports: fplll
  nix: fplll
  pacman: fplll
  zypper: fplll
package-manager-url: https://formulae.brew.sh/formula/fplll
version: 5.5.0
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Lattice algorithms using floating-point arithmetic
source-archive: https://github.com/fplll/fplll/releases/download/5.5.0/fplll-5.5.0.tar.gz
dependencies:
  - gmp
  - mpfr
build-dependencies:
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: fplll
  - exposure: global executable
    kind: cli
    name: latticegen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fplll
  av: sudo av install brew:fplll
  brew: brew install fplll
  macports: sudo port install fplll
  nix: nix profile install nixpkgs#fplll
  pacman: sudo pacman -S fplll
  zypper: sudo zypper install fplll
provenance:
  formula: fplll
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
