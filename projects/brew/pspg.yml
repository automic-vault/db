id: brew:pspg
display-name: pspg
homepage: https://github.com/okbob/pspg
repo: https://github.com/okbob/pspg
docs: https://github.com/okbob/pspg
package-manager:
  apk: pspg
  brew: pspg
  debian: pspg
  dnf: pspg
  macports: pspg
  nix: pspg
  ubuntu: pspg
  zypper: pspg
package-manager-url: https://formulae.brew.sh/formula/pspg
version: 5.8.16
license: BSD-2-Clause
category: database
tags:
  - cli
description: Unix pager optimized for psql
source-archive: https://github.com/okbob/pspg/archive/refs/tags/5.8.16.tar.gz
dependencies:
  - libpq
  - ncurses
  - readline
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pspg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Add the following line to your psql profile (e.g. ~/.psqlrc) \setenv PAGER pspg
    \pset border 2 \pset linestyle unicode
  post-install-defined: false
install-lines:
  apk: sudo apk add pspg
  av: sudo av install brew:pspg
  brew: brew install pspg
  debian: sudo apt install pspg
  dnf: sudo dnf install pspg
  macports: sudo port install pspg
  nix: nix profile install nixpkgs#pspg
  ubuntu: sudo apt install pspg
  zypper: sudo zypper install pspg
provenance:
  formula: pspg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
