id: brew:aws-iam-authenticator
display-name: aws-iam-authenticator
homepage: https://github.com/kubernetes-sigs/aws-iam-authenticator
repo: https://github.com/kubernetes-sigs/aws-iam-authenticator
docs: https://github.com/kubernetes-sigs/aws-iam-authenticator
package-manager:
  brew: aws-iam-authenticator
  chocolatey: aws-iam-authenticator
  macports: aws-iam-authenticator
  nix: aws-iam-authenticator
  scoop: main/aws-iam-authenticator
  winget: Kubernetes.aws-iam-authenticator
package-manager-url: https://formulae.brew.sh/formula/aws-iam-authenticator
version: 0.7.16
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
  - kubernetes
description: Use AWS IAM credentials to authenticate to Kubernetes
source-archive: >
  https://github.com/kubernetes-sigs/aws-iam-authenticator/archive/refs/tags/v0.7.16.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aws-iam-authenticator
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aws-iam-authenticator
  brew: brew install aws-iam-authenticator
  chocolatey: choco install aws-iam-authenticator
  macports: sudo port install aws-iam-authenticator
  nix: nix profile install nixpkgs#aws-iam-authenticator
  scoop: scoop install main/aws-iam-authenticator
  winget: winget install --id Kubernetes.aws-iam-authenticator -e
provenance:
  formula: aws-iam-authenticator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
