id: brew:lfe
display-name: lfe
homepage: https://lfe.io/
repo: https://github.com/lfe/lfe
docs: https://lfe.io/
package-manager:
  apk: lfe
  brew: lfe
package-manager-url: https://formulae.brew.sh/formula/lfe
version: 2.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: Concurrent Lisp for the Erlang VM
source-archive: https://github.com/lfe/lfe/archive/refs/tags/v2.2.0.tar.gz
dependencies:
  - erlang
build-dependencies:
  - emacs
executables:
  - exposure: global executable
    kind: cli
    name: lfe
  - exposure: global executable
    kind: cli
    name: lfe-first-try
  - exposure: global executable
    kind: cli
    name: lfe-test
  - exposure: global executable
    kind: cli
    name: lfec
  - exposure: global executable
    kind: cli
    name: lfedoc
  - exposure: global executable
    kind: cli
    name: lfeexec
  - exposure: global executable
    kind: cli
    name: lfescript
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lfe
  av: sudo av install brew:lfe
  brew: brew install lfe
provenance:
  formula: lfe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
