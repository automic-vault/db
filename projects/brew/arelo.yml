id: brew:arelo
display-name: arelo
homepage: https://github.com/makiuchi-d/arelo
repo: https://github.com/makiuchi-d/arelo
docs: https://github.com/makiuchi-d/arelo
package-manager:
  brew: arelo
package-manager-url: https://formulae.brew.sh/formula/arelo
version: 1.15.4
license: MIT
category: development
tags:
  - cli
description: Simple auto reload (live reload) utility
source-archive: https://github.com/makiuchi-d/arelo/archive/refs/tags/v1.15.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: arelo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:arelo
  brew: brew install arelo
provenance:
  formula: arelo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
