id: brew:nerdctl
display-name: nerdctl
homepage: https://github.com/containerd/nerdctl
repo: https://github.com/containerd/nerdctl
docs: https://github.com/containerd/nerdctl
package-manager:
  apk: nerdctl
  brew: nerdctl
  nix: nerdctl
  pacman: nerdctl
  scoop: main/nerdctl
  zypper: nerdctl
package-manager-url: https://formulae.brew.sh/formula/nerdctl
version: 2.3.1
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: ContaiNERD CTL - Docker-compatible CLI for containerd
source-archive: https://github.com/containerd/nerdctl/archive/refs/tags/v2.3.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: containerd-rootless-setuptool.sh
  - exposure: global executable
    kind: cli
    name: containerd-rootless.sh
  - exposure: global executable
    kind: cli
    name: nerdctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nerdctl
  av: sudo av install brew:nerdctl
  brew: brew install nerdctl
  nix: nix profile install nixpkgs#nerdctl
  pacman: sudo pacman -S nerdctl
  scoop: scoop install main/nerdctl
  zypper: sudo zypper install nerdctl
provenance:
  formula: nerdctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
