id: brew:fits
display-name: fits
homepage: https://harvard-lts.github.io/fits/
repo: https://github.com/harvard-lts/fits
docs: https://harvard-lts.github.io/fits/
package-manager:
  brew: fits
package-manager-url: https://formulae.brew.sh/formula/fits
version: 1.6.0
license: LGPL-2.1-only
category: development
tags:
  - cli
description: File Information Tool Set
source-archive: https://github.com/harvard-lts/fits/releases/download/1.6.0/fits-1.6.0.zip
dependencies:
  - exiftool
  - libmediainfo
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: fits
  - exposure: global executable
    kind: cli
    name: fits-ngserver
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fits
  brew: brew install fits
provenance:
  formula: fits
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
