id: brew:xpipe
display-name: xpipe
homepage: https://www.netmeister.org/apps/xpipe.html
repo: https://www.netmeister.org/apps/xpipe-2.2.tar.gz
docs: https://www.netmeister.org/apps/xpipe.html
package-manager:
  brew: xpipe
  chocolatey: xpipe
  nix: xpipe
  scoop: extras/xpipe
  winget: xpipe-io.xpipe
package-manager-url: https://formulae.brew.sh/formula/xpipe
version: 2.2
license: BSD-2-Clause
category: network
tags:
  - cli
description: Split input and feed it into the given utility
source-archive: https://www.netmeister.org/apps/xpipe-2.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: xpipe
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xpipe
  brew: brew install xpipe
  chocolatey: choco install xpipe
  nix: nix profile install nixpkgs#xpipe
  scoop: scoop install extras/xpipe
  winget: winget install --id xpipe-io.xpipe -e
provenance:
  formula: xpipe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
