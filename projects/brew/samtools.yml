id: brew:samtools
display-name: samtools
homepage: https://www.htslib.org/
repo: https://github.com/samtools/samtools
docs: https://www.htslib.org/
package-manager:
  brew: samtools
  debian: samtools
  dnf: samtools
  macports: samtools
  nix: samtools
  ubuntu: samtools
  zypper: samtools
package-manager-url: https://formulae.brew.sh/formula/samtools
version: 1.23.1
license: MIT
category: development
tags:
  - cli
description: Tools for manipulating next-generation sequencing data
source-archive: https://github.com/samtools/samtools/releases/download/1.23.1/samtools-1.23.1.tar.bz2
dependencies:
  - htslib
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ace2sam
  - exposure: global executable
    kind: cli
    name: blast2sam.pl
  - exposure: global executable
    kind: cli
    name: bowtie2sam.pl
  - exposure: global executable
    kind: cli
    name: export2sam.pl
  - exposure: global executable
    kind: cli
    name: fasta-sanitize.pl
  - exposure: global executable
    kind: cli
    name: interpolate_sam.pl
  - exposure: global executable
    kind: cli
    name: maq2sam-long
  - exposure: global executable
    kind: cli
    name: maq2sam-short
  - exposure: global executable
    kind: cli
    name: md5fa
  - exposure: global executable
    kind: cli
    name: md5sum-lite
  - exposure: global executable
    kind: cli
    name: novo2sam.pl
  - exposure: global executable
    kind: cli
    name: plot-ampliconstats
  - exposure: global executable
    kind: cli
    name: plot-bamstats
  - exposure: global executable
    kind: cli
    name: psl2sam.pl
  - exposure: global executable
    kind: cli
    name: sam2vcf.pl
  - exposure: global executable
    kind: cli
    name: samtools
  - exposure: global executable
    kind: cli
    name: samtools.pl
  - exposure: global executable
    kind: cli
    name: seq_cache_populate.pl
  - exposure: global executable
    kind: cli
    name: soap2sam.pl
  - exposure: global executable
    kind: cli
    name: wgsim
  - exposure: global executable
    kind: cli
    name: wgsim_eval.pl
  - exposure: global executable
    kind: cli
    name: zoom2sam.pl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:samtools
  brew: brew install samtools
  debian: sudo apt install samtools
  dnf: sudo dnf install samtools
  macports: sudo port install samtools
  nix: nix profile install nixpkgs#samtools
  ubuntu: sudo apt install samtools
  zypper: sudo zypper install samtools
provenance:
  formula: samtools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
