id: brew:baobab
display-name: baobab
homepage: https://apps.gnome.org/Baobab/
repo: https://download.gnome.org/sources/baobab/50/baobab-50.0.tar.xz
docs: https://apps.gnome.org/Baobab/
package-manager:
  apk: baobab
  brew: baobab
  debian: baobab
  dnf: baobab
  macports: baobab
  nix: baobab
  pacman: baobab
  ubuntu: baobab
  zypper: baobab
package-manager-url: https://formulae.brew.sh/formula/baobab
version: 50.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Gnome disk usage analyzer
source-archive: https://download.gnome.org/sources/baobab/50/baobab-50.0.tar.xz
dependencies:
  - adwaita-icon-theme
  - cairo
  - gettext
  - glib
  - graphene
  - gtk4
  - hicolor-icon-theme
  - libadwaita
  - pango
build-dependencies:
  - desktop-file-utils
  - gettext
  - itstool
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: baobab
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add baobab
  av: sudo av install brew:baobab
  brew: brew install baobab
  debian: sudo apt install baobab
  dnf: sudo dnf install baobab
  macports: sudo port install baobab
  nix: nix profile install nixpkgs#baobab
  pacman: sudo pacman -S baobab
  ubuntu: sudo apt install baobab
  zypper: sudo zypper install baobab
provenance:
  formula: baobab
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
