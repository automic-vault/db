id: brew:bandwhich
display-name: bandwhich
homepage: https://github.com/imsnif/bandwhich
repo: https://github.com/imsnif/bandwhich
docs: https://github.com/imsnif/bandwhich
package-manager:
  apk: bandwhich
  brew: bandwhich
  macports: bandwhich
  nix: bandwhich
  pacman: bandwhich
  scoop: main/bandwhich
package-manager-url: https://formulae.brew.sh/formula/bandwhich
version: 0.23.1
license: MIT
category: development
tags:
  - cli
description: Terminal bandwidth utilization tool
source-archive: https://github.com/imsnif/bandwhich/archive/refs/tags/v0.23.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bandwhich
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bandwhich
  av: sudo av install brew:bandwhich
  brew: brew install bandwhich
  macports: sudo port install bandwhich
  nix: nix profile install nixpkgs#bandwhich
  pacman: sudo pacman -S bandwhich
  scoop: scoop install main/bandwhich
provenance:
  formula: bandwhich
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
