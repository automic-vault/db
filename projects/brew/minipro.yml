id: brew:minipro
display-name: minipro
homepage: https://gitlab.com/DavidGriffith/minipro/
repo: https://gitlab.com/DavidGriffith/minipro
docs: https://gitlab.com/DavidGriffith/minipro/
package-manager:
  apk: minipro
  brew: minipro
  dnf: minipro
  macports: minipro
  nix: minipro
package-manager-url: https://formulae.brew.sh/formula/minipro
version: 0.7.4
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Open controller for the MiniPRO TL866xx series of chip programmers
source-archive: https://gitlab.com/DavidGriffith/minipro.git
dependencies:
  - libusb
  - srecord
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dump-alg-minipro.bash
  - exposure: global executable
    kind: cli
    name: minipro
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add minipro
  av: sudo av install brew:minipro
  brew: brew install minipro
  dnf: sudo dnf install minipro
  macports: sudo port install minipro
  nix: nix profile install nixpkgs#minipro
provenance:
  formula: minipro
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
