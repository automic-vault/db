id: brew:nfdump
display-name: nfdump
homepage: https://github.com/phaag/nfdump
repo: https://github.com/phaag/nfdump
docs: https://github.com/phaag/nfdump
package-manager:
  apk: nfdump
  brew: nfdump
  debian: nfdump
  dnf: nfdump
  macports: nfdump
  nix: nfdump
  ubuntu: nfdump
  zypper: nfdump
package-manager-url: https://formulae.brew.sh/formula/nfdump
version: 1.7.8
license: BSD-3-Clause
category: development
tags:
  - cli
description: Tools to collect and process netflow data on the command-line
source-archive: https://github.com/phaag/nfdump/archive/refs/tags/v1.7.8.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - bzip2
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: geolookup
  - exposure: global executable
    kind: cli
    name: nfanon
  - exposure: global executable
    kind: cli
    name: nfcapd
  - exposure: global executable
    kind: cli
    name: nfdump
  - exposure: global executable
    kind: cli
    name: nfexpire
  - exposure: global executable
    kind: cli
    name: nfreplay
  - exposure: global executable
    kind: cli
    name: sfcapd
  - exposure: global executable
    kind: cli
    name: torlookup
  - exposure: global executable
    kind: cli
    name: updateGeoDB.sh
  - exposure: global executable
    kind: cli
    name: updateTorDB.sh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nfdump
  av: sudo av install brew:nfdump
  brew: brew install nfdump
  debian: sudo apt install nfdump
  dnf: sudo dnf install nfdump
  macports: sudo port install nfdump
  nix: nix profile install nixpkgs#nfdump
  ubuntu: sudo apt install nfdump
  zypper: sudo zypper install nfdump
provenance:
  formula: nfdump
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
