id: brew:udunits
display-name: udunits
homepage: https://docs.unidata.ucar.edu/udunits/current/
repo: https://downloads.unidata.ucar.edu/udunits/2.2.28/udunits-2.2.28.tar.gz
docs: https://docs.unidata.ucar.edu/udunits/current/
package-manager:
  apk: udunits
  brew: udunits
  dnf: udunits2
  macports: udunits
  nix: udunits
  zypper: udunits2
package-manager-url: https://formulae.brew.sh/formula/udunits
version: 2.2.28
license: UCAR
category: network
tags:
  - cli
description: Unidata unit conversion library
source-archive: https://downloads.unidata.ucar.edu/udunits/2.2.28/udunits-2.2.28.tar.gz
build-dependencies:
  - texinfo
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: udunits2
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add udunits
  av: sudo av install brew:udunits
  brew: brew install udunits
  dnf: sudo dnf install udunits2
  macports: sudo port install udunits
  nix: nix profile install nixpkgs#udunits
  zypper: sudo zypper install udunits2
provenance:
  formula: udunits
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
