id: brew:sandvault
display-name: sandvault
homepage: https://github.com/webcoyote/sandvault
repo: https://github.com/webcoyote/sandvault
docs: https://github.com/webcoyote/sandvault
package-manager:
  brew: sandvault
package-manager-url: https://formulae.brew.sh/formula/sandvault
version: 1.20.0
license: Apache-2.0
category: security
tags:
  - cli
description: Run AI agents isolated in a sandboxed macOS user account
source-archive: https://github.com/webcoyote/sandvault/archive/refs/tags/v1.20.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: sv
  - exposure: global executable
    kind: cli
    name: sv-agentsview-setup
  - exposure: global executable
    kind: cli
    name: sv-clone
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sandvault
  brew: brew install sandvault
provenance:
  formula: sandvault
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
