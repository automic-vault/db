id: brew:mpgtx
display-name: mpgtx
homepage: https://mpgtx.sourceforge.net/
repo: https://downloads.sourceforge.net/project/mpgtx/mpgtx/1.3.1/mpgtx-1.3.1.tar.gz
docs: https://mpgtx.sourceforge.net/
package-manager:
  brew: mpgtx
  macports: mpgtx
  pacman: mpgtx
  ubuntu: mpgtx
package-manager-url: https://formulae.brew.sh/formula/mpgtx
version: 1.3.1
license: GPL-2.0-only
category: network
tags:
  - cli
description: Toolbox to manipulate MPEG files
source-archive: https://downloads.sourceforge.net/project/mpgtx/mpgtx/1.3.1/mpgtx-1.3.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mpgcat
  - exposure: global executable
    kind: cli
    name: mpgdemux
  - exposure: global executable
    kind: cli
    name: mpginfo
  - exposure: global executable
    kind: cli
    name: mpgjoin
  - exposure: global executable
    kind: cli
    name: mpgsplit
  - exposure: global executable
    kind: cli
    name: mpgtx
  - exposure: global executable
    kind: cli
    name: tagmp3
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mpgtx
  brew: brew install mpgtx
  macports: sudo port install mpgtx
  pacman: sudo pacman -S mpgtx
  ubuntu: sudo apt install mpgtx
provenance:
  formula: mpgtx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
