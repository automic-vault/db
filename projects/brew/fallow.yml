id: brew:fallow
display-name: fallow
homepage: https://docs.fallow.tools
repo: https://github.com/fallow-rs/fallow
docs: https://docs.fallow.tools
package-manager:
  brew: fallow
package-manager-url: https://formulae.brew.sh/formula/fallow
version: 2.82.0
license: MIT
category: development
tags:
  - cli
description: Codebase intelligence for TypeScript and JavaScript
source-archive: https://github.com/fallow-rs/fallow/archive/refs/tags/v2.82.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fallow
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fallow
  brew: brew install fallow
provenance:
  formula: fallow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
