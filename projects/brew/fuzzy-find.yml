id: brew:fuzzy-find
display-name: fuzzy-find
homepage: https://github.com/silentbicycle/ff
repo: https://github.com/silentbicycle/ff
docs: https://github.com/silentbicycle/ff
package-manager:
  brew: fuzzy-find
  macports: fuzzy-find
package-manager-url: https://formulae.brew.sh/formula/fuzzy-find
version: 0.6.0
license: MIT
category: development
tags:
