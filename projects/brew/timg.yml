id: brew:timg
display-name: timg
homepage: https://timg.sh/
repo: https://github.com/hzeller/timg
docs: https://timg.sh/
package-manager:
  apk: timg
  brew: timg
  debian: timg
  dnf: timg
  macports: timg
  nix: timg
  ubuntu: timg
  zypper: timg
package-manager-url: https://formulae.brew.sh/formula/timg
version: 1.6.3
license: GPL-2.0-only
category: development
tags:
  - cli
description: Terminal image and video viewer
source-archive: https://github.com/hzeller/timg/archive/refs/tags/v1.6.3.tar.gz
dependencies:
  - cairo
  - ffmpeg
  - gdk-pixbuf
  - gettext
  - glib
  - graphicsmagick
  - jpeg-turbo
  - libdeflate
  - libexif
  - libpng
  - librsvg
  - libsixel
  - openslide
  - poppler
  - webp
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: timg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add timg
  av: sudo av install brew:timg
  brew: brew install timg
  debian: sudo apt install timg
  dnf: sudo dnf install timg
  macports: sudo port install timg
  nix: nix profile install nixpkgs#timg
  ubuntu: sudo apt install timg
  zypper: sudo zypper install timg
provenance:
  formula: timg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
