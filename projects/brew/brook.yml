id: brew:brook
display-name: brook
homepage: https://brook.app/
repo: https://github.com/txthinking/brook
docs: https://brook.app/
package-manager:
  brew: brook
  macports: brook
  nix: brook
  pacman: brook
package-manager-url: https://formulae.brew.sh/formula/brook
version: 20260101
license: GPL-3.0-only
category: security
tags:
  - cli
description: Cross-platform strong encryption and not detectable proxy. Zero-Configuration
source-archive: https://github.com/txthinking/brook/archive/refs/tags/v20260101.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: brook
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:brook
  brew: brew install brook
  macports: sudo port install brook
  nix: nix profile install nixpkgs#brook
  pacman: sudo pacman -S brook
provenance:
  formula: brook
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
