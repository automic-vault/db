id: brew:doxygen
display-name: doxygen
homepage: https://www.doxygen.nl/
repo: https://doxygen.nl/files/doxygen-1.17.0.src.tar.gz
docs: https://www.doxygen.nl/
package-manager:
  apk: doxygen
  brew: doxygen
  debian: doxygen
  dnf: doxygen
  macports: doxygen
  nix: doxygen
  pacman: doxygen
  scoop: main/doxygen
  ubuntu: doxygen
  winget: DimitriVanHeesch.Doxygen
  zypper: doxygen
package-manager-url: https://formulae.brew.sh/formula/doxygen
version: 1.17.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: Generate documentation for several programming languages
source-archive: https://doxygen.nl/files/doxygen-1.17.0.src.tar.gz
build-dependencies:
  - bison
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: doxygen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add doxygen
  av: sudo av install brew:doxygen
  brew: brew install doxygen
  debian: sudo apt install doxygen
  dnf: sudo dnf install doxygen
  macports: sudo port install doxygen
  nix: nix profile install nixpkgs#doxygen
  pacman: sudo pacman -S doxygen
  scoop: scoop install main/doxygen
  ubuntu: sudo apt install doxygen
  winget: winget install --id DimitriVanHeesch.Doxygen -e
  zypper: sudo zypper install doxygen
provenance:
  formula: doxygen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
