id: brew:pacparser
display-name: pacparser
homepage: https://github.com/manugarg/pacparser
repo: https://github.com/manugarg/pacparser
docs: https://github.com/manugarg/pacparser
package-manager:
  apk: pacparser
  brew: pacparser
  macports: pacparser
  nix: pacparser
  pacman: pacparser
  scoop: main/pacparser
package-manager-url: https://formulae.brew.sh/formula/pacparser
version: 1.5.1
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Library to parse proxy auto-config (PAC) files
source-archive: https://github.com/manugarg/pacparser/archive/refs/tags/v1.5.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: pactester
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pacparser
  av: sudo av install brew:pacparser
  brew: brew install pacparser
  macports: sudo port install pacparser
  nix: nix profile install nixpkgs#pacparser
  pacman: sudo pacman -S pacparser
  scoop: scoop install main/pacparser
provenance:
  formula: pacparser
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
