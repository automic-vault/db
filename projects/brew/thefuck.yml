id: brew:thefuck
display-name: thefuck
homepage: https://github.com/nvbn/thefuck
repo: >
  https://files.pythonhosted.org/packages/ac/d0/0c256afd3ba1d05882154d16aa0685018f21c60a6769a496558da7d9d8f1/thefuck-3.32.tar.gz
docs: https://github.com/nvbn/thefuck
package-manager:
  apk: thefuck
  brew: thefuck
  debian: thefuck
  dnf: thefuck
  macports: thefuck
  pacman: thefuck
  ubuntu: thefuck
package-manager-url: https://formulae.brew.sh/formula/thefuck
version: 3.32
license: MIT
category: development
tags:
  - cli
description: Programmatically correct mistyped console commands
source-archive: >
  https://files.pythonhosted.org/packages/ac/d0/0c256afd3ba1d05882154d16aa0685018f21c60a6769a496558da7d9d8f1/thefuck-3.32.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: fuck
  - exposure: global executable
    kind: cli
    name: thefuck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Add the following to your .bash_profile, .bashrc or .zshrc: eval $(thefuck --alias)
    For other shells, check https://github.com/nvbn/thefuck/wiki/Shell-aliases
  post-install-defined: false
install-lines:
  apk: sudo apk add thefuck
  av: sudo av install brew:thefuck
  brew: brew install thefuck
  debian: sudo apt install thefuck
  dnf: sudo dnf install thefuck
  macports: sudo port install thefuck
  pacman: sudo pacman -S thefuck
  ubuntu: sudo apt install thefuck
provenance:
  formula: thefuck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
