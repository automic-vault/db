id: brew:hl
display-name: hl
homepage: https://github.com/pamburus/hl
repo: https://github.com/pamburus/hl
docs: https://github.com/pamburus/hl
package-manager:
  brew: hl
  pacman: hl
  scoop: main/hl
package-manager-url: https://formulae.brew.sh/formula/hl
version: 0.36.2
license: MIT
category: development
tags:
  - cli
description: Fast and powerful log viewer and processor
source-archive: https://github.com/pamburus/hl/archive/refs/tags/v0.36.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hl
  brew: brew install hl
  pacman: sudo pacman -S hl
  scoop: scoop install main/hl
provenance:
  formula: hl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
