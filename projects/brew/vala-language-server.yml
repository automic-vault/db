id: brew:vala-language-server
display-name: vala-language-server
homepage: https://github.com/vala-lang/vala-language-server
repo: https://github.com/vala-lang/vala-language-server
docs: https://github.com/vala-lang/vala-language-server
package-manager:
  apk: vala-language-server
  brew: vala-language-server
  dnf: vala-language-server
  nix: vala-language-server
package-manager-url: https://formulae.brew.sh/formula/vala-language-server
version: 0.48.7
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Code Intelligence for Vala & Genie
source-archive: >
  https://github.com/vala-lang/vala-language-server/releases/download/0.48.7/vala-language-server-0.48.7.tar.xz
dependencies:
  - gettext
  - glib
  - json-glib
  - jsonrpc-glib
  - libgee
  - vala
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: vala-language-server
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vala-language-server
  av: sudo av install brew:vala-language-server
  brew: brew install vala-language-server
  dnf: sudo dnf install vala-language-server
  nix: nix profile install nixpkgs#vala-language-server
provenance:
  formula: vala-language-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
