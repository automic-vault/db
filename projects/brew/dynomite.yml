id: brew:dynomite
display-name: dynomite
homepage: https://github.com/Netflix/dynomite
repo: https://github.com/Netflix/dynomite
docs: https://github.com/Netflix/dynomite
package-manager:
  brew: dynomite
package-manager-url: https://formulae.brew.sh/formula/dynomite
version: 0.6.22
license: Apache-2.0
category: development
tags:
  - cli
description: Generic dynamo implementation for different k-v storage engines
source-archive: https://github.com/Netflix/dynomite/archive/refs/tags/v0.6.22.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: dynomite
  - exposure: global executable
    kind: cli
    name: dynomite-hash-tool
  - exposure: global executable
    kind: cli
    name: dynomite-test
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dynomite
  brew: brew install dynomite
provenance:
  formula: dynomite
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
