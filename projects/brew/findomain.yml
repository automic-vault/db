id: brew:findomain
display-name: findomain
homepage: https://github.com/Findomain/Findomain
repo: https://github.com/Findomain/Findomain
docs: https://github.com/Findomain/Findomain
package-manager:
  brew: findomain
  nix: findomain
  pacman: findomain
package-manager-url: https://formulae.brew.sh/formula/findomain
version: 10.0.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Cross-platform subdomain enumerator
source-archive: https://github.com/Findomain/Findomain/archive/refs/tags/10.0.1.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: findomain
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:findomain
  brew: brew install findomain
  nix: nix profile install nixpkgs#findomain
  pacman: sudo pacman -S findomain
provenance:
  formula: findomain
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
