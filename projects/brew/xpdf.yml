id: brew:xpdf
display-name: xpdf
homepage: https://www.xpdfreader.com/
repo: https://dl.xpdfreader.com/xpdf-4.06.tar.gz
docs: https://www.xpdfreader.com/
package-manager:
  apk: xpdf
  brew: xpdf
  debian: xpdf
  dnf: xpdf
  macports: xpdf
  nix: xpdf
  pacman: xpdf
  ubuntu: xpdf
package-manager-url: https://formulae.brew.sh/formula/xpdf
version: 4.06
license: GPL-2.0-only OR GPL-3.0-only
category: network
tags:
  - cli
description: PDF viewer
source-archive: https://dl.xpdfreader.com/xpdf-4.06.tar.gz
dependencies:
  - fontconfig
  - freetype
  - libpng
  - qtbase
  - qtsvg
build-dependencies:
  - cmake
uses-from-macos:
  - cups
executables:
  - exposure: global executable
    kind: cli
    name: pdftopng
  - exposure: global executable
    kind: cli
    name: xpdf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xpdf
  av: sudo av install brew:xpdf
  brew: brew install xpdf
  debian: sudo apt install xpdf
  dnf: sudo dnf install xpdf
  macports: sudo port install xpdf
  nix: nix profile install nixpkgs#xpdf
  pacman: sudo pacman -S xpdf
  ubuntu: sudo apt install xpdf
provenance:
  formula: xpdf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
