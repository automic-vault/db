id: brew:angle-grinder
display-name: angle-grinder
homepage: https://github.com/rcoh/angle-grinder
repo: https://github.com/rcoh/angle-grinder
docs: https://github.com/rcoh/angle-grinder
package-manager:
  brew: angle-grinder
  macports: angle-grinder
  nix: angle-grinder
  pacman: angle-grinder
package-manager-url: https://formulae.brew.sh/formula/angle-grinder
version: 0.19.6
license: MIT
category: development
tags:
  - cli
description: Slice and dice log files on the command-line
source-archive: https://github.com/rcoh/angle-grinder/archive/refs/tags/v0.19.6.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: agrind
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:angle-grinder
  brew: brew install angle-grinder
  macports: sudo port install angle-grinder
  nix: nix profile install nixpkgs#angle-grinder
  pacman: sudo pacman -S angle-grinder
provenance:
  formula: angle-grinder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
