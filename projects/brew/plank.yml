id: brew:plank
display-name: plank
homepage: https://pinterest.github.io/plank/
repo: https://github.com/pinterest/plank
docs: https://pinterest.github.io/plank/
package-manager:
  brew: plank
  debian: plank
  dnf: plank
  nix: plank
  pacman: plank
  ubuntu: plank
package-manager-url: https://formulae.brew.sh/formula/plank
version: 1.6
license: Apache-2.0
category: development
tags:
  - cli
description: Framework for generating immutable model objects
source-archive: https://github.com/pinterest/plank/archive/refs/tags/v1.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: plank
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:plank
  brew: brew install plank
  debian: sudo apt install plank
  dnf: sudo dnf install plank
  nix: nix profile install nixpkgs#plank
  pacman: sudo pacman -S plank
  ubuntu: sudo apt install plank
provenance:
  formula: plank
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
