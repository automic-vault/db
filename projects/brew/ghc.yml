id: brew:ghc
display-name: ghc
homepage: https://haskell.org/ghc/
repo: https://downloads.haskell.org/~ghc/9.14.1/ghc-9.14.1-src.tar.xz
docs: https://haskell.org/ghc/
package-manager:
  apk: ghc
  brew: ghc
  chocolatey: ghc
  debian: ghc
  dnf: ghc
  macports: ghc
  nix: ghc
  pacman: ghc
  ubuntu: ghc
  zypper: ghc
package-manager-url: https://formulae.brew.sh/formula/ghc
version: 9.14.1
license: BSD-3-Clause
category: network
tags:
  - cli
description: Glorious Glasgow Haskell Compilation System
source-archive: https://downloads.haskell.org/~ghc/9.14.1/ghc-9.14.1-src.tar.xz
dependencies:
  - gmp
build-dependencies:
  - autoconf
  - automake
  - python@3.14
  - sphinx-doc
  - xz
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: ghc
  - exposure: global executable
    kind: cli
    name: ghc-9.14.1
  - exposure: global executable
    kind: cli
    name: ghc-pkg
  - exposure: global executable
    kind: cli
    name: ghc-pkg-9.14.1
  - exposure: global executable
    kind: cli
    name: ghci
  - exposure: global executable
    kind: cli
    name: ghci-9.14.1
  - exposure: global executable
    kind: cli
    name: haddock
  - exposure: global executable
    kind: cli
    name: haddock-ghc-9.14.1
  - exposure: global executable
    kind: cli
    name: hp2ps
  - exposure: global executable
    kind: cli
    name: hp2ps-ghc-9.14.1
  - exposure: global executable
    kind: cli
    name: hpc
  - exposure: global executable
    kind: cli
    name: hpc-ghc-9.14.1
  - exposure: global executable
    kind: cli
    name: hsc2hs
  - exposure: global executable
    kind: cli
    name: hsc2hs-ghc-9.14.1
  - exposure: global executable
    kind: cli
    name: runghc
  - exposure: global executable
    kind: cli
    name: runghc-9.14.1
  - exposure: global executable
    kind: cli
    name: runhaskell
  - exposure: global executable
    kind: cli
    name: runhaskell-9.14.1
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add ghc
  av: sudo av install brew:ghc
  brew: brew install ghc
  chocolatey: choco install ghc
  debian: sudo apt install ghc
  dnf: sudo dnf install ghc
  macports: sudo port install ghc
  nix: nix profile install nixpkgs#ghc
  pacman: sudo pacman -S ghc
  ubuntu: sudo apt install ghc
  zypper: sudo zypper install ghc
provenance:
  formula: ghc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
