id: brew:cppinsights
display-name: cppinsights
homepage: https://cppinsights.io/
repo: https://github.com/andreasfertig/cppinsights
docs: https://cppinsights.io/
package-manager:
  brew: cppinsights
package-manager-url: https://formulae.brew.sh/formula/cppinsights
version: 21.1
license: MIT
category: development
tags:
  - cli
description: See your source code with the eyes of a compiler
source-archive: https://github.com/andreasfertig/cppinsights/archive/refs/tags/v_21.1.tar.gz
dependencies:
  - llvm@21
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: insights
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cppinsights
  brew: brew install cppinsights
provenance:
  formula: cppinsights
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
