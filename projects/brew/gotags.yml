id: brew:gotags
display-name: gotags
homepage: https://github.com/jstemmer/gotags
repo: https://github.com/jstemmer/gotags
docs: https://github.com/jstemmer/gotags
package-manager:
  brew: gotags
  nix: gotags
package-manager-url: https://formulae.brew.sh/formula/gotags
version: 1.4.1
license: MIT
category: development
tags:
  - cli
description: Tag generator for Go, compatible with ctags
source-archive: https://github.com/jstemmer/gotags/archive/refs/tags/v1.4.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gotags
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gotags
  brew: brew install gotags
  nix: nix profile install nixpkgs#gotags
provenance:
  formula: gotags
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
