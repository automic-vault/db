id: brew:dooit
display-name: dooit
homepage: https://github.com/dooit-org/dooit
repo: >
  https://files.pythonhosted.org/packages/a1/dd/96bfcde11415f846d8e4bf2ec494432aae4e6938c6b3ef1e9db3a854b45e/dooit-3.3.4.tar.gz
