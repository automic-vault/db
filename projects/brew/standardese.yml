id: brew:standardese
display-name: standardese
homepage: https://standardese.github.io
repo: https://github.com/standardese/standardese
docs: https://standardese.github.io
package-manager:
  brew: standardese
package-manager-url: https://formulae.brew.sh/formula/standardese
version: 0.5.2
license: MIT
category: development
tags:
  - cli
description: Next-gen documentation generator for C++
source-archive: https://github.com/standardese/standardese.git
dependencies:
  - boost
  - cmark-gfm
  - llvm
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: standardese
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:standardese
  brew: brew install standardese
provenance:
  formula: standardese
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
