id: brew:ems-flasher
display-name: ems-flasher
homepage: https://lacklustre.net/projects/ems-flasher/
repo: https://lacklustre.net/projects/ems-flasher/ems-flasher-0.03.tgz
docs: https://lacklustre.net/projects/ems-flasher/
package-manager:
  brew: ems-flasher
package-manager-url: https://formulae.brew.sh/formula/ems-flasher
version: 0.03
license: MIT
category: network
tags:
  - cli
description: Software for flashing the EMS Gameboy USB cart
source-archive: https://lacklustre.net/projects/ems-flasher/ems-flasher-0.03.tgz
dependencies:
  - libusb
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ems-flasher
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ems-flasher
  brew: brew install ems-flasher
provenance:
  formula: ems-flasher
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
