id: brew:node_exporter
display-name: node_exporter
homepage: https://prometheus.io/
repo: https://github.com/prometheus/node_exporter
docs: https://prometheus.io/
package-manager:
  brew: node_exporter
  dnf: node-exporter
  macports: node_exporter
package-manager-url: https://formulae.brew.sh/formula/node_exporter
version: 1.11.1
license: Apache-2.0
category: development
tags:
  - cli
description: Prometheus exporter for machine metrics
source-archive: https://github.com/prometheus/node_exporter/archive/refs/tags/v1.11.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: node_exporter
  - exposure: global executable
    kind: cli
    name: node_exporter_brew_services
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    When run from `brew services`, `node_exporter` is run from
    `node_exporter_brew_services` and uses the flags in:
    $HOMEBREW_PREFIX/etc/node_exporter.args
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:node_exporter
  brew: brew install node_exporter
  dnf: sudo dnf install node-exporter
  macports: sudo port install node_exporter
provenance:
  formula: node_exporter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
