id: brew:gitter-cli
display-name: gitter-cli
homepage: https://github.com/RodrigoEspinosa/gitter-cli
repo: https://github.com/RodrigoEspinosa/gitter-cli
docs: https://github.com/RodrigoEspinosa/gitter-cli
package-manager:
  brew: gitter-cli
package-manager-url: https://formulae.brew.sh/formula/gitter-cli
version: 0.8.5
license: MIT
category: development
tags:
  - cli
description: Extremely simple Gitter client for terminals
source-archive: https://github.com/RodrigoEspinosa/gitter-cli/archive/refs/tags/v0.8.5.tar.gz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: gitter-cli
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gitter-cli
  brew: brew install gitter-cli
provenance:
  formula: gitter-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
