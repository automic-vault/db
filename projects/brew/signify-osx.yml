id: brew:signify-osx
display-name: signify-osx
homepage: https://man.openbsd.org/signify.1
repo: https://github.com/jpouellet/signify-osx
docs: https://man.openbsd.org/signify.1
package-manager:
  apk: signify
  brew: signify-osx
  debian: signify
  dnf: signify
  macports: signify
  nix: signify
  pacman: signify
