id: brew:fio
display-name: fio
homepage: https://github.com/axboe/fio
repo: https://github.com/axboe/fio
docs: https://github.com/axboe/fio
package-manager:
  apk: fio
  brew: fio
  chocolatey: fio
  debian: fio
  dnf: fio
  nix: fio
  pacman: fio
  scoop: main/fio
  ubuntu: fio
  winget: fio.fio
  zypper: fio
package-manager-url: https://formulae.brew.sh/formula/fio
version: 3.42
license: GPL-2.0-only
category: development
tags:
  - cli
description: I/O benchmark and stress test
source-archive: https://github.com/axboe/fio/archive/refs/tags/fio-3.42.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: fio
  - exposure: global executable
    kind: cli
    name: fio-btrace2fio
  - exposure: global executable
    kind: cli
    name: fio-dedupe
  - exposure: global executable
    kind: cli
    name: fio-genzipf
  - exposure: global executable
    kind: cli
    name: fio-histo-log-pctiles.py
  - exposure: global executable
    kind: cli
    name: fio-verify-state
  - exposure: global executable
    kind: cli
    name: fio2gnuplot
  - exposure: global executable
    kind: cli
    name: fio_generate_plots
  - exposure: global executable
    kind: cli
    name: fio_jsonplus_clat2csv
  - exposure: global executable
    kind: cli
    name: fiologparser.py
  - exposure: global executable
    kind: cli
    name: fiologparser_hist.py
  - exposure: global executable
    kind: cli
    name: genfio
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fio
  av: sudo av install brew:fio
  brew: brew install fio
  chocolatey: choco install fio
  debian: sudo apt install fio
  dnf: sudo dnf install fio
  nix: nix profile install nixpkgs#fio
  pacman: sudo pacman -S fio
  scoop: scoop install main/fio
  ubuntu: sudo apt install fio
  winget: winget install --id fio.fio -e
  zypper: sudo zypper install fio
provenance:
  formula: fio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
