id: brew:roapi
display-name: roapi
homepage: https://roapi.github.io/docs
repo: https://github.com/roapi/roapi
docs: https://roapi.github.io/docs
package-manager:
  brew: roapi
  macports: roapi
package-manager-url: https://formulae.brew.sh/formula/roapi
version: 0.13.0
license: Apache-2.0
category: development
tags:
  - cli
description: Full-fledged APIs for static datasets without writing a single line of code
source-archive: https://github.com/roapi/roapi/archive/refs/tags/roapi-v0.13.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: roapi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:roapi
  brew: brew install roapi
  macports: sudo port install roapi
provenance:
  formula: roapi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
