id: brew:teem
display-name: teem
homepage: https://teem.sourceforge.net/
repo: https://downloads.sourceforge.net/project/teem/teem/1.11.0/teem-1.11.0-src.tar.gz
docs: https://teem.sourceforge.net/
package-manager:
  brew: teem
  dnf: teem
  winget: lkurcak.tend
package-manager-url: https://formulae.brew.sh/formula/teem
version: 1.11.0
license: LicenseRef-Homebrew-cannot-represent
category: network
tags:
  - cli
description: Libraries for scientific raster data
source-archive: https://downloads.sourceforge.net/project/teem/teem/1.11.0/teem-1.11.0-src.tar.gz
dependencies:
  - libpng
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: gprobe
  - exposure: global executable
    kind: cli
    name: ilk
  - exposure: global executable
    kind: cli
    name: miter
  - exposure: global executable
    kind: cli
    name: mrender
  - exposure: global executable
    kind: cli
    name: nrrdSanity
  - exposure: global executable
    kind: cli
    name: overrgb
  - exposure: global executable
    kind: cli
    name: puller
  - exposure: global executable
    kind: cli
    name: tend
  - exposure: global executable
    kind: cli
    name: unu
  - exposure: global executable
    kind: cli
    name: vprobe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:teem
  brew: brew install teem
  dnf: sudo dnf install teem
  winget: winget install --id lkurcak.tend -e
provenance:
  formula: teem
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
