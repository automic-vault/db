id: brew:waffle
display-name: waffle
homepage: https://waffle.freedesktop.org/
repo: https://waffle.freedesktop.org/files/release/waffle-1.8.1/waffle-1.8.1.tar.xz
docs: https://waffle.freedesktop.org/
package-manager:
  apk: waffle
  brew: waffle
  dnf: waffle
  nix: waffle
  zypper: waffle
package-manager-url: https://formulae.brew.sh/formula/waffle
version: 1.8.1
license: BSD-2-Clause
category: network
tags:
  - cli
description: C library for selecting an OpenGL API and window system at runtime
source-archive: https://waffle.freedesktop.org/files/release/waffle-1.8.1/waffle-1.8.1.tar.xz
build-dependencies:
  - docbook-xsl
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: wflinfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add waffle
  av: sudo av install brew:waffle
  brew: brew install waffle
  dnf: sudo dnf install waffle
  nix: nix profile install nixpkgs#waffle
  zypper: sudo zypper install waffle
provenance:
  formula: waffle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
