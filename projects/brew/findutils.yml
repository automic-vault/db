id: brew:findutils
display-name: findutils
homepage: https://www.gnu.org/software/findutils/
repo: https://ftpmirror.gnu.org/gnu/findutils/findutils-4.10.0.tar.xz
docs: https://www.gnu.org/software/findutils/
package-manager:
  apk: findutils
  brew: findutils
  chocolatey: findutils
  debian: findutils
  dnf: findutils
  macports: findutils
  nix: findutils
  pacman: findutils
  scoop: main/findutils
  ubuntu: findutils
  zypper: findutils
package-manager-url: https://formulae.brew.sh/formula/findutils
version: 4.10.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Collection of GNU find, xargs, and locate
source-archive: https://ftpmirror.gnu.org/gnu/findutils/findutils-4.10.0.tar.xz
executables:
  - exposure: global executable
    kind: cli
    name: find
  - exposure: global executable
    kind: cli
    name: locate
  - exposure: global executable
    kind: cli
    name: updatedb
  - exposure: global executable
    kind: cli
    name: xargs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    All commands have been installed with the prefix "g". If you need to use these
    commands with their normal names, you can add a "gnubin" directory to your PATH from
    your bashrc like: PATH="$HOMEBREW_PREFIX/opt/findutils/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add findutils
  av: sudo av install brew:findutils
  brew: brew install findutils
  chocolatey: choco install findutils
  debian: sudo apt install findutils
  dnf: sudo dnf install findutils
  macports: sudo port install findutils
  nix: nix profile install nixpkgs#findutils
  pacman: sudo pacman -S findutils
  scoop: scoop install main/findutils
  ubuntu: sudo apt install findutils
  zypper: sudo zypper install findutils
provenance:
  formula: findutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
