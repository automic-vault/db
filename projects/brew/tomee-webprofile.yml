id: brew:tomee-webprofile
display-name: tomee-webprofile
homepage: https://tomee.apache.org/
repo: >
  https://www.apache.org/dyn/closer.lua?path=tomee/tomee-10.1.5/apache-tomee-10.1.5-webprofile.tar.gz
docs: https://tomee.apache.org/
package-manager:
  brew: tomee-webprofile
package-manager-url: https://formulae.brew.sh/formula/tomee-webprofile
version: 10.1.5
license: Apache-2.0
category: network
tags:
  - cli
description: All-Apache Java EE 7 Web Profile stack
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=tomee/tomee-10.1.5/apache-tomee-10.1.5-webprofile.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: tomee-webprofile-startup
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The home of Apache TomEE Web is: $HOMEBREW_PREFIX/opt/tomee-webprofile/libexec To
    run Apache TomEE:
    $HOMEBREW_PREFIX/opt/tomee-webprofile/libexec/bin/tomee-webprofile-startup
  post-install-defined: false
install-lines:
  av: sudo av install brew:tomee-webprofile
  brew: brew install tomee-webprofile
provenance:
  formula: tomee-webprofile
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
