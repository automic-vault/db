bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The following tools are not supported for macOS, and are therefore not included:
    addpart agetty blkdiscard blkzone blockdev chcpu chmem choom chrt ctrlaltdel delpart
    dmesg eject fallocate fdformat fincore findmnt fsck fsfreeze fstrim hwclock ionice
    ipcrm ipcs kill last ldattach losetup lsblk lscpu lsipc lslocks lslogins lsmem lsns
    mount mountpoint nsenter partx pivot_root prlimit raw readprofile resizepart rfkill
    rtcwake script scriptlive setarch setterm sulogin swapoff swapon switch_root taskset
    umount unshare utmpdump uuidd wall wdctl zramctl
  post-install-defined: false
install-lines:
  apk: sudo apk add util-linux
  av: sudo av install brew:util-linux
  brew: brew install util-linux
  debian: sudo apt install util-linux
  dnf: sudo dnf install util-linux
  macports: sudo port install util-linux
  nix: nix profile install nixpkgs#util-linux
  pacman: sudo pacman -S util-linux
  ubuntu: sudo apt install util-linux
  winget: winget install --id Cal.Cal -e
  zypper: sudo zypper install util-linux
provenance:
  formula: util-linux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
