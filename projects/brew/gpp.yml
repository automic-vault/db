id: brew:gpp
display-name: gpp
homepage: https://logological.org/gpp
repo: https://files.nothingisreal.com/software/gpp/gpp-2.28.tar.bz2
docs: https://logological.org/gpp
package-manager:
  brew: gpp
  debian: gpp
  macports: gpp
  nix: gpp
  ubuntu: gpp
  zypper: gpp
package-manager-url: https://formulae.brew.sh/formula/gpp
version: 2.28
license: LGPL-3.0-only
category: network
tags:
  - cli
description: General-purpose preprocessor with customizable syntax
source-archive: https://files.nothingisreal.com/software/gpp/gpp-2.28.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: gpp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gpp
  brew: brew install gpp
  debian: sudo apt install gpp
  macports: sudo port install gpp
  nix: nix profile install nixpkgs#gpp
  ubuntu: sudo apt install gpp
  zypper: sudo zypper install gpp
provenance:
  formula: gpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
