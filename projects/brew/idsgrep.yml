id: brew:idsgrep
display-name: idsgrep
homepage: https://tsukurimashou.org/idsgrep.php.en
repo: https://tsukurimashou.org/files/idsgrep-0.6.tar.gz
docs: https://tsukurimashou.org/idsgrep.php.en
package-manager:
  brew: idsgrep
package-manager-url: https://formulae.brew.sh/formula/idsgrep
version: 0.6
license: GPL-3.0-only
category: network
tags:
  - cli
description: Grep for Extended Ideographic Description Sequences
source-archive: https://tsukurimashou.org/files/idsgrep-0.6.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: idsgrep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:idsgrep
  brew: brew install idsgrep
provenance:
  formula: idsgrep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
