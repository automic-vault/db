id: brew:tinysparql
display-name: tinysparql
homepage: https://tinysparql.org/
repo: https://download.gnome.org/sources/tinysparql/3.11/tinysparql-3.11.1.tar.xz
docs: https://tinysparql.org/
package-manager:
  apk: tinysparql
  brew: tinysparql
  debian: tinysparql
  dnf: tinysparql
  nix: tinysparql
  pacman: tinysparql
  zypper: tinysparql
package-manager-url: https://formulae.brew.sh/formula/tinysparql
version: 3.11.1
license: LGPL-2.1-or-later AND GPL-2.0-or-later
category: network
tags:
  - cli
description: Low-footprint RDF triple store with SPARQL 1.1 interface
source-archive: https://download.gnome.org/sources/tinysparql/3.11/tinysparql-3.11.1.tar.xz
dependencies:
  - dbus
  - gettext
  - glib
  - icu4c@78
  - json-glib
  - libsoup
  - sqlite
build-dependencies:
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - vala
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: tinysparql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tinysparql
  av: sudo av install brew:tinysparql
  brew: brew install tinysparql
  debian: sudo apt install tinysparql
  dnf: sudo dnf install tinysparql
  nix: nix profile install nixpkgs#tinysparql
  pacman: sudo pacman -S tinysparql
  zypper: sudo zypper install tinysparql
provenance:
  formula: tinysparql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
