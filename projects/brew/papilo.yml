id: brew:papilo
display-name: papilo
homepage: https://www.scipopt.org
repo: https://github.com/scipopt/papilo
docs: https://www.scipopt.org
package-manager:
  brew: papilo
  debian: papilo
  dnf: papilo
  macports: papilo
  nix: papilo
  pacman: papilo
package-manager-url: https://formulae.brew.sh/formula/papilo
version: 3.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: Parallel Presolve for Integer and Linear Optimization
source-archive: https://github.com/scipopt/papilo/archive/refs/tags/v3.0.0.tar.gz
dependencies:
  - boost
  - gcc
  - gmp
  - openblas
  - tbb
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: papilo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:papilo
  brew: brew install papilo
  debian: sudo apt install papilo
  dnf: sudo dnf install papilo
  macports: sudo port install papilo
  nix: nix profile install nixpkgs#papilo
  pacman: sudo pacman -S papilo
provenance:
  formula: papilo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
