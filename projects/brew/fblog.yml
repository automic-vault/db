id: brew:fblog
display-name: fblog
homepage: https://github.com/brocode/fblog
repo: https://github.com/brocode/fblog
docs: https://github.com/brocode/fblog
package-manager:
  brew: fblog
  nix: fblog
package-manager-url: https://formulae.brew.sh/formula/fblog
version: 4.17.0
license: WTFPL
category: development
tags:
  - cli
  - json
description: Small command-line JSON log viewer
source-archive: https://github.com/brocode/fblog/archive/refs/tags/v4.17.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fblog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fblog
  brew: brew install fblog
  nix: nix profile install nixpkgs#fblog
provenance:
  formula: fblog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
