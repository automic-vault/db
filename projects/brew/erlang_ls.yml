id: brew:erlang_ls
display-name: erlang_ls
homepage: https://erlang-ls.github.io/
repo: https://github.com/erlang-ls/erlang_ls
docs: https://erlang-ls.github.io/
package-manager:
  apk: erlang-ls
  brew: erlang_ls
package-manager-url: https://formulae.brew.sh/formula/erlang_ls
version: 1.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: Erlang Language Server
source-archive: https://github.com/erlang-ls/erlang_ls/archive/refs/tags/1.1.0.tar.gz
dependencies:
  - erlang
  - rebar3
executables:
  - exposure: global executable
    kind: cli
    name: erlang_ls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add erlang-ls
  av: sudo av install brew:erlang_ls
  brew: brew install erlang_ls
provenance:
  formula: erlang_ls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
