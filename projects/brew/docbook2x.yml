id: brew:docbook2x
display-name: docbook2x
homepage: https://docbook2x.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/docbook2x/docbook2x/0.8.8/docbook2X-0.8.8.tar.gz
docs: https://docbook2x.sourceforge.net/
package-manager:
  apk: docbook2x
  brew: docbook2x
  debian: docbook2x
  dnf: docbook2X
  macports: docbook2X
  nix: docbook2x
  pacman: docbook2x
  ubuntu: docbook2x
  zypper: docbook2x
package-manager-url: https://formulae.brew.sh/formula/docbook2x
version: 0.8.8
license: MIT AND DocBook-XML
category: network
tags:
  - cli
description: Convert DocBook to UNIX manpages and GNU TeXinfo
source-archive: >
  https://downloads.sourceforge.net/project/docbook2x/docbook2x/0.8.8/docbook2X-0.8.8.tar.gz
dependencies:
  - docbook
uses-from-macos:
  - expat
  - libxslt
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: db2x_manxml
  - exposure: global executable
    kind: cli
    name: db2x_texixml
  - exposure: global executable
    kind: cli
    name: db2x_xsltproc
  - exposure: global executable
    kind: cli
    name: docbook2man
  - exposure: global executable
    kind: cli
    name: docbook2texi
  - exposure: global executable
    kind: cli
    name: sgml2xml-isoent
  - exposure: global executable
    kind: cli
    name: utf8trans
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add docbook2x
  av: sudo av install brew:docbook2x
  brew: brew install docbook2x
  debian: sudo apt install docbook2x
  dnf: sudo dnf install docbook2X
  macports: sudo port install docbook2X
  nix: nix profile install nixpkgs#docbook2x
  pacman: sudo pacman -S docbook2x
  ubuntu: sudo apt install docbook2x
  zypper: sudo zypper install docbook2x
provenance:
  formula: docbook2x
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
