id: brew:dwdiff
display-name: dwdiff
homepage: https://os.ghalkes.nl/dwdiff.html
repo: https://os.ghalkes.nl/dist/dwdiff-2.1.4.tar.bz2
docs: https://os.ghalkes.nl/dwdiff.html
package-manager:
  brew: dwdiff
  debian: dwdiff
  macports: dwdiff
  nix: dwdiff
  ubuntu: dwdiff
package-manager-url: https://formulae.brew.sh/formula/dwdiff
version: 2.1.4
license: GPL-3.0-only
category: network
tags:
  - cli
description: Diff that operates at the word level
source-archive: https://os.ghalkes.nl/dist/dwdiff-2.1.4.tar.bz2
dependencies:
  - gettext
  - icu4c@78
build-dependencies:
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dwdiff
  - exposure: global executable
    kind: cli
    name: dwfilter
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dwdiff
  brew: brew install dwdiff
  debian: sudo apt install dwdiff
  macports: sudo port install dwdiff
  nix: nix profile install nixpkgs#dwdiff
  ubuntu: sudo apt install dwdiff
provenance:
  formula: dwdiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
