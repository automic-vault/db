id: brew:libusb-compat
display-name: libusb-compat
homepage: https://libusb.info/
repo: >
  https://downloads.sourceforge.net/project/libusb/libusb-compat-0.1/libusb-compat-0.1.9/libusb-compat-0.1.9.tar.bz2
docs: https://libusb.info/
package-manager:
  apk: libusb-compat
  brew: libusb-compat
  macports: libusb-compat
  pacman: libusb-compat
package-manager-url: https://formulae.brew.sh/formula/libusb-compat
version: 0.1.9
license: LGPL-2.1-or-later AND (LGPL-2.1-or-later OR BSD-3-Clause)
category: network
tags:
  - cli
description: Library for USB device access
source-archive: >
  https://downloads.sourceforge.net/project/libusb/libusb-compat-0.1/libusb-compat-0.1.9/libusb-compat-0.1.9.tar.bz2
dependencies:
  - libusb
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: libusb-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libusb-compat
  av: sudo av install brew:libusb-compat
  brew: brew install libusb-compat
  macports: sudo port install libusb-compat
  pacman: sudo pacman -S libusb-compat
provenance:
  formula: libusb-compat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
