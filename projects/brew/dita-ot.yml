id: brew:dita-ot
display-name: dita-ot
homepage: https://www.dita-ot.org/
repo: https://github.com/dita-ot/dita-ot
docs: https://www.dita-ot.org/
package-manager:
  brew: dita-ot
  nix: dita-ot
  ubuntu: dita-ot
  zypper: dita
package-manager-url: https://formulae.brew.sh/formula/dita-ot
version: 4.4
license: Apache-2.0
category: development
tags:
  - cli
description: DITA Open Toolkit is an implementation of the OASIS DITA specification
source-archive: https://github.com/dita-ot/dita-ot/releases/download/4.4/dita-ot-4.4.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: dita
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dita-ot
  brew: brew install dita-ot
  nix: nix profile install nixpkgs#dita-ot
  ubuntu: sudo apt install dita-ot
  zypper: sudo zypper install dita
provenance:
  formula: dita-ot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
