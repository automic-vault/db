id: brew:openbao
display-name: openbao
homepage: https://openbao.org/
repo: https://github.com/openbao/openbao
docs: https://openbao.org/
package-manager:
  apk: openbao
  brew: openbao
  dnf: openbao
  macports: openbao
  nix: openbao
  pacman: openbao
  zypper: openbao
package-manager-url: https://formulae.brew.sh/formula/openbao
version: 2.5.4
license: MPL-2.0
category: development
tags:
  - cli
description: Provides a software solution to manage, store, and distribute sensitive data
source-archive: https://github.com/openbao/openbao.git
build-dependencies:
  - go
  - node@22
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: bao
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add openbao
  av: sudo av install brew:openbao
  brew: brew install openbao
  dnf: sudo dnf install openbao
  macports: sudo port install openbao
  nix: nix profile install nixpkgs#openbao
  pacman: sudo pacman -S openbao
  zypper: sudo zypper install openbao
provenance:
  formula: openbao
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
