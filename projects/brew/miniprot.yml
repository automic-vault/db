id: brew:miniprot
display-name: miniprot
homepage: https://lh3.github.io/miniprot/
repo: https://github.com/lh3/miniprot
docs: https://lh3.github.io/miniprot/
package-manager:
  brew: miniprot
package-manager-url: https://formulae.brew.sh/formula/miniprot
version: 0.18
license: MIT
category: development
tags:
  - cli
description: Align proteins to genomes with splicing and frameshift
source-archive: https://github.com/lh3/miniprot/archive/refs/tags/v0.18.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: miniprot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:miniprot
  brew: brew install miniprot
provenance:
  formula: miniprot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
