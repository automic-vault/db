id: brew:qbec
display-name: qbec
homepage: https://qbec.io
repo: https://github.com/splunk/qbec
docs: https://qbec.io
package-manager:
  brew: qbec
  nix: qbec
package-manager-url: https://formulae.brew.sh/formula/qbec
version: 0.31.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Configure Kubernetes objects on multiple clusters using jsonnet
source-archive: https://github.com/splunk/qbec/archive/refs/tags/v0.31.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: qbec
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qbec
  brew: brew install qbec
  nix: nix profile install nixpkgs#qbec
provenance:
  formula: qbec
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
