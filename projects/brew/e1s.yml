id: brew:e1s
display-name: e1s
homepage: https://github.com/keidarcy/e1s
repo: https://github.com/keidarcy/e1s
docs: https://github.com/keidarcy/e1s
package-manager:
  brew: e1s
  nix: e1s
package-manager-url: https://formulae.brew.sh/formula/e1s
version: 1.0.53
license: MIT
category: cloud
tags:
  - aws
  - cli
description: TUI for managing AWS ECS, inspired by k9s
source-archive: https://github.com/keidarcy/e1s/archive/refs/tags/v1.0.53.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: e1s
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:e1s
  brew: brew install e1s
  nix: nix profile install nixpkgs#e1s
provenance:
  formula: e1s
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
