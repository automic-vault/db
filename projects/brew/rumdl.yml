id: brew:rumdl
display-name: rumdl
homepage: https://github.com/rvben/rumdl
repo: https://github.com/rvben/rumdl
docs: https://github.com/rvben/rumdl
package-manager:
  brew: rumdl
  nix: rumdl
  pacman: rumdl
  scoop: main/rumdl
  winget: rvben.rumdl
  zypper: rumdl
package-manager-url: https://formulae.brew.sh/formula/rumdl
version: 0.2.2
license: MIT
category: development
tags:
  - cli
description: Markdown Linter and Formatter written in Rust
source-archive: https://github.com/rvben/rumdl/archive/refs/tags/v0.2.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rumdl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rumdl
  brew: brew install rumdl
  nix: nix profile install nixpkgs#rumdl
  pacman: sudo pacman -S rumdl
  scoop: scoop install main/rumdl
  winget: winget install --id rvben.rumdl -e
  zypper: sudo zypper install rumdl
provenance:
  formula: rumdl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
