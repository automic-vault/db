id: brew:htmlcxx
display-name: htmlcxx
homepage: https://htmlcxx.sourceforge.net/
repo: https://downloads.sourceforge.net/project/htmlcxx/v0.87/htmlcxx-0.87.tar.gz
docs: https://htmlcxx.sourceforge.net/
package-manager:
