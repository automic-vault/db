id: brew:twm
display-name: twm
homepage: https://gitlab.freedesktop.org/xorg/app/twm
repo: https://www.x.org/releases/individual/app/twm-1.0.13.1.tar.xz
docs: https://gitlab.freedesktop.org/xorg/app/twm
package-manager:
  apk: twm
  brew: twm
  debian: twm
  macports: twm
  nix: twm
  ubuntu: twm
  zypper: twm
package-manager-url: https://formulae.brew.sh/formula/twm
version: 1.0.13.1
license: X11
category: development
tags:
  - cli
description: Tab Window Manager for X Window System
source-archive: https://www.x.org/releases/individual/app/twm-1.0.13.1.tar.xz
dependencies:
  - libice
  - libsm
  - libx11
  - libxext
  - libxmu
  - libxrandr
  - libxt
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: twm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add twm
  av: sudo av install brew:twm
  brew: brew install twm
  debian: sudo apt install twm
  macports: sudo port install twm
  nix: nix profile install nixpkgs#twm
  ubuntu: sudo apt install twm
  zypper: sudo zypper install twm
provenance:
  formula: twm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
