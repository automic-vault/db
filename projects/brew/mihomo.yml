id: brew:mihomo
display-name: mihomo
homepage: https://wiki.metacubex.one
repo: https://github.com/MetaCubeX/mihomo
docs: https://wiki.metacubex.one
package-manager:
  brew: mihomo
  macports: mihomo
  nix: mihomo
  scoop: main/mihomo
  winget: MetaCubeX.Mihomo
package-manager-url: https://formulae.brew.sh/formula/mihomo
version: 1.19.25
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Another rule-based tunnel in Go, formerly known as ClashMeta
source-archive: https://github.com/MetaCubeX/mihomo/archive/refs/tags/v1.19.25.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mihomo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: You need to customize $HOMEBREW_PREFIX/etc/mihomo/config.yaml.
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:mihomo
  brew: brew install mihomo
  macports: sudo port install mihomo
  nix: nix profile install nixpkgs#mihomo
  scoop: scoop install main/mihomo
  winget: winget install --id MetaCubeX.Mihomo -e
provenance:
  formula: mihomo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
