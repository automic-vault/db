id: brew:nodebrew
display-name: nodebrew
homepage: https://github.com/hokaccha/nodebrew
repo: https://github.com/hokaccha/nodebrew
docs: https://github.com/hokaccha/nodebrew
package-manager:
  brew: nodebrew
package-manager-url: https://formulae.brew.sh/formula/nodebrew
version: 1.2.0
license: MIT
category: development
tags:
  - cli
description: Node.js version manager
source-archive: https://github.com/hokaccha/nodebrew/archive/refs/tags/v1.2.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: nodebrew
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You need to manually run setup_dirs to create directories required by nodebrew:
    $HOMEBREW_PREFIX/opt/nodebrew/bin/nodebrew setup_dirs Add path: export
    PATH=$HOME/.nodebrew/current/bin:$PATH To use Homebrew's directories rather than
    ~/.nodebrew add to your profile: export NODEBREW_ROOT=$HOMEBREW_PREFIX/var/nodebrew
  post-install-defined: false
install-lines:
  av: sudo av install brew:nodebrew
  brew: brew install nodebrew
provenance:
  formula: nodebrew
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
