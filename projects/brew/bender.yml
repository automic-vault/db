id: brew:bender
display-name: bender
homepage: https://github.com/pulp-platform/bender
repo: https://github.com/pulp-platform/bender
docs: https://github.com/pulp-platform/bender
package-manager:
  brew: bender
  nix: bender
package-manager-url: https://formulae.brew.sh/formula/bender
version: 0.31.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Dependency management tool for hardware projects
source-archive: https://github.com/pulp-platform/bender/archive/refs/tags/v0.31.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bender
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bender
  brew: brew install bender
  nix: nix profile install nixpkgs#bender
provenance:
  formula: bender
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
