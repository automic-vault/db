id: brew:micropython
display-name: micropython
homepage: https://www.micropython.org/
repo: https://github.com/micropython/micropython
docs: https://www.micropython.org/
package-manager:
  apk: micropython
  brew: micropython
  debian: micropython
  dnf: micropython
  macports: micropython
  nix: micropython
  ubuntu: micropython
  zypper: micropython
package-manager-url: https://formulae.brew.sh/formula/micropython
version: 1.27.0
license: MIT
category: development
tags:
  - cli
description: Python implementation for microcontrollers and constrained systems
source-archive: >
  https://github.com/micropython/micropython/releases/download/v1.27.0/micropython-1.27.0.tar.xz
build-dependencies:
  - pkgconf
uses-from-macos:
  - libffi
  - python
executables:
  - exposure: global executable
    kind: cli
    name: micropython
  - exposure: global executable
    kind: cli
    name: mpy-cross
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add micropython
  av: sudo av install brew:micropython
  brew: brew install micropython
  debian: sudo apt install micropython
  dnf: sudo dnf install micropython
  macports: sudo port install micropython
  nix: nix profile install nixpkgs#micropython
  ubuntu: sudo apt install micropython
  zypper: sudo zypper install micropython
provenance:
  formula: micropython
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
