id: brew:passwdqc
display-name: passwdqc
homepage: https://www.openwall.com/passwdqc/
repo: https://www.openwall.com/passwdqc/passwdqc-2.1.0.tar.gz
docs: https://www.openwall.com/passwdqc/
package-manager:
  brew: passwdqc
  debian: passwdqc
  dnf: passwdqc
  nix: passwdqc
  ubuntu: passwdqc
  zypper: passwdqc
package-manager-url: https://formulae.brew.sh/formula/passwdqc
version: 2.1.0
license: 0BSD
category: security
tags:
  - cli
description: Password/passphrase strength checking and enforcement toolset
source-archive: https://www.openwall.com/passwdqc/passwdqc-2.1.0.tar.gz
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: pwqcheck
  - exposure: global executable
    kind: cli
    name: pwqfilter
  - exposure: global executable
    kind: cli
    name: pwqgen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:passwdqc
  brew: brew install passwdqc
  debian: sudo apt install passwdqc
  dnf: sudo dnf install passwdqc
  nix: nix profile install nixpkgs#passwdqc
  ubuntu: sudo apt install passwdqc
  zypper: sudo zypper install passwdqc
provenance:
  formula: passwdqc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
