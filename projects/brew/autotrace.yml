id: brew:autotrace
display-name: autotrace
homepage: https://autotrace.sourceforge.net/
repo: https://github.com/autotrace/autotrace
docs: https://autotrace.sourceforge.net/
package-manager:
  brew: autotrace
  dnf: autotrace
  macports: autotrace
  nix: autotrace
  zypper: autotrace
package-manager-url: https://formulae.brew.sh/formula/autotrace
version: 0.31.10
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: Convert bitmap to vector graphics
source-archive: https://github.com/autotrace/autotrace/archive/refs/tags/0.31.10.tar.gz
dependencies:
  - fontconfig
  - freetype
  - gettext
  - glib
  - imagemagick
  - liblqr
  - libomp
  - libpng
  - libtiff
  - libtool
  - little-cms2
  - pstoedit
build-dependencies:
  - autoconf
  - automake
  - gettext
  - intltool
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: autotrace
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:autotrace
  brew: brew install autotrace
  dnf: sudo dnf install autotrace
  macports: sudo port install autotrace
  nix: nix profile install nixpkgs#autotrace
  zypper: sudo zypper install autotrace
provenance:
  formula: autotrace
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
