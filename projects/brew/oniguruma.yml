id: brew:oniguruma
display-name: oniguruma
homepage: https://github.com/kkos/oniguruma/
repo: https://github.com/kkos/oniguruma
docs: https://github.com/kkos/oniguruma/
package-manager:
  apk: oniguruma
  brew: oniguruma
  dnf: oniguruma
  nix: oniguruma
  pacman: oniguruma
package-manager-url: https://formulae.brew.sh/formula/oniguruma
version: 6.9.10
license: BSD-2-Clause
category: development
tags:
  - cli
description: Regular expressions library
source-archive: https://github.com/kkos/oniguruma/releases/download/v6.9.10/onig-6.9.10.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: onig-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add oniguruma
  av: sudo av install brew:oniguruma
  brew: brew install oniguruma
  dnf: sudo dnf install oniguruma
  nix: nix profile install nixpkgs#oniguruma
  pacman: sudo pacman -S oniguruma
provenance:
  formula: oniguruma
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
