id: brew:ta-lib
display-name: ta-lib
homepage: https://ta-lib.org/
repo: https://github.com/ta-lib/ta-lib
docs: https://ta-lib.org/
package-manager:
  brew: ta-lib
  macports: ta-lib
  nix: ta-lib
package-manager-url: https://formulae.brew.sh/formula/ta-lib
version: 0.6.4
license: BSD-3-Clause
category: development
tags:
  - cli
description: Tools for market analysis
source-archive: https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib-0.6.4-src.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: ta_regtest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ta-lib
  brew: brew install ta-lib
  macports: sudo port install ta-lib
  nix: nix profile install nixpkgs#ta-lib
provenance:
  formula: ta-lib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
