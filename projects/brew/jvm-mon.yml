id: brew:jvm-mon
display-name: jvm-mon
homepage: https://github.com/ajermakovics/jvm-mon
repo: https://github.com/ajermakovics/jvm-mon
docs: https://github.com/ajermakovics/jvm-mon
package-manager:
  brew: jvm-mon
package-manager-url: https://formulae.brew.sh/formula/jvm-mon
version: 1.3
license: Apache-2.0
category: development
tags:
  - cli
description: Console-based JVM monitoring
source-archive: https://github.com/ajermakovics/jvm-mon/archive/refs/tags/1.3.tar.gz
build-dependencies:
  - go
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: jvm-mon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jvm-mon
  brew: brew install jvm-mon
provenance:
  formula: jvm-mon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
