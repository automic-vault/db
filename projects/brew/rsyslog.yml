id: brew:rsyslog
display-name: rsyslog
homepage: https://www.rsyslog.com/
repo: https://www.rsyslog.com/files/download/rsyslog/rsyslog-8.2604.0.tar.gz
docs: https://www.rsyslog.com/
package-manager:
  apk: rsyslog
  brew: rsyslog
  debian: rsyslog
  dnf: rsyslog
  nix: rsyslog
  ubuntu: rsyslog
  zypper: rsyslog
package-manager-url: https://formulae.brew.sh/formula/rsyslog
version: 8.2604.0
license: Apache-2.0 AND GPL-3.0-or-later AND LGPL-3.0-or-later
category: network
tags:
  - cli
description: Enhanced, multi-threaded syslogd
source-archive: https://www.rsyslog.com/files/download/rsyslog/rsyslog-8.2604.0.tar.gz
dependencies:
  - gnutls
  - libestr
  - libfastjson
  - protobuf-c
  - snappy
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: msggen
  - exposure: global executable
    kind: cli
    name: rsyslog_diag_hostname
  - exposure: global executable
    kind: cli
    name: rsyslogd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add rsyslog
  av: sudo av install brew:rsyslog
  brew: brew install rsyslog
  debian: sudo apt install rsyslog
  dnf: sudo dnf install rsyslog
  nix: nix profile install nixpkgs#rsyslog
  ubuntu: sudo apt install rsyslog
  zypper: sudo zypper install rsyslog
provenance:
  formula: rsyslog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
