id: brew:gssh
display-name: gssh
homepage: https://gradle-ssh-plugin.github.io/
repo: https://github.com/int128/groovy-ssh
docs: https://gradle-ssh-plugin.github.io/
package-manager:
  brew: gssh
package-manager-url: https://formulae.brew.sh/formula/gssh
version: 2.12.0
license: Apache-2.0
category: development
tags:
  - cli
description: SSH automation tool based on Groovy DSL
source-archive: https://github.com/int128/groovy-ssh/archive/refs/tags/2.12.0.tar.gz
dependencies:
  - openjdk@21
build-dependencies:
  - gradle@8
executables:
  - exposure: global executable
    kind: cli
    name: gssh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gssh
  brew: brew install gssh
provenance:
  formula: gssh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
