id: brew:ultralist
display-name: ultralist
homepage: https://ultralist.io
repo: https://github.com/gammons/ultralist
docs: https://ultralist.io
package-manager:
  brew: ultralist
  macports: ultralist
  nix: ultralist
package-manager-url: https://formulae.brew.sh/formula/ultralist
version: 1.7.0
license: MIT
category: development
tags:
  - cli
description: Simple GTD-style task management for the command-line
source-archive: https://github.com/gammons/ultralist/archive/refs/tags/1.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ultralist
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ultralist
  brew: brew install ultralist
  macports: sudo port install ultralist
  nix: nix profile install nixpkgs#ultralist
provenance:
  formula: ultralist
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
