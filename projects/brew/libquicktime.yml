id: brew:libquicktime
display-name: libquicktime
homepage: https://libquicktime.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/libquicktime/libquicktime/1.2.4/libquicktime-1.2.4.tar.gz
docs: https://libquicktime.sourceforge.net/
package-manager:
  brew: libquicktime
  dnf: libquicktime
  macports: libquicktime
  zypper: libquicktime
package-manager-url: https://formulae.brew.sh/formula/libquicktime
version: 1.2.4
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Library for reading and writing quicktime files
source-archive: >
  https://downloads.sourceforge.net/project/libquicktime/libquicktime/1.2.4/libquicktime-1.2.4.tar.gz
dependencies:
  - gettext
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: lqt_transcode
  - exposure: global executable
    kind: cli
    name: lqtremux
  - exposure: global executable
    kind: cli
    name: qt2text
  - exposure: global executable
    kind: cli
    name: qtdechunk
  - exposure: global executable
    kind: cli
    name: qtdump
  - exposure: global executable
    kind: cli
    name: qtinfo
  - exposure: global executable
    kind: cli
    name: qtrechunk
  - exposure: global executable
    kind: cli
    name: qtstreamize
  - exposure: global executable
    kind: cli
    name: qtyuv4toyuv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libquicktime
  brew: brew install libquicktime
  dnf: sudo dnf install libquicktime
  macports: sudo port install libquicktime
  zypper: sudo zypper install libquicktime
provenance:
  formula: libquicktime
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
