id: brew:pfetch-rs
display-name: pfetch-rs
homepage: https://github.com/Gobidev/pfetch-rs
repo: https://github.com/Gobidev/pfetch-rs
docs: https://github.com/Gobidev/pfetch-rs
package-manager:
  apk: pfetch-rs
  brew: pfetch-rs
  macports: pfetch
  nix: pfetch-rs
  pacman: pfetch-rs
package-manager-url: https://formulae.brew.sh/formula/pfetch-rs
version: 2.11.1
license: MIT
category: development
tags:
  - cli
description: Pretty system information tool written in Rust
source-archive: https://github.com/Gobidev/pfetch-rs/archive/refs/tags/v2.11.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: pfetch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pfetch-rs
  av: sudo av install brew:pfetch-rs
  brew: brew install pfetch-rs
  macports: sudo port install pfetch
  nix: nix profile install nixpkgs#pfetch-rs
  pacman: sudo pacman -S pfetch-rs
provenance:
  formula: pfetch-rs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
