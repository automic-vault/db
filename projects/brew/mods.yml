id: brew:mods
display-name: mods
homepage: https://github.com/charmbracelet/mods
repo: https://github.com/charmbracelet/mods
docs: https://github.com/charmbracelet/mods
package-manager:
  apk: mods
  brew: mods
  nix: mods
  scoop: main/mods
  winget: charmbracelet.mods
package-manager-url: https://formulae.brew.sh/formula/mods
version: 1.8.1
license: MIT
category: development
tags:
  - cli
description: AI on the command-line
source-archive: https://github.com/charmbracelet/mods/archive/refs/tags/v1.8.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mods
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mods
  av: sudo av install brew:mods
  brew: brew install mods
  nix: nix profile install nixpkgs#mods
  scoop: scoop install main/mods
  winget: winget install --id charmbracelet.mods -e
provenance:
  formula: mods
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
