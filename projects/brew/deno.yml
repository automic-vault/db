id: brew:deno
display-name: deno
homepage: https://deno.com/
repo: https://github.com/denoland/deno
docs: https://deno.com/
package-manager:
  apk: deno
  brew: deno
  chocolatey: deno
  debian: dx
  dnf: dx
  macports: deno
  nix: deno
  pacman: deno
  scoop: main/deno
  ubuntu: dx
  winget: DenoLand.Deno
  zypper: deno
package-manager-url: https://formulae.brew.sh/formula/deno
version: 2.8.0
license: MIT
category: development
tags:
  - cli
description: Secure runtime for JavaScript and TypeScript
source-archive: https://github.com/denoland/deno/releases/download/v2.8.0/deno_src.tar.gz
dependencies:
  - little-cms2
  - sqlite
build-dependencies:
  - cmake
  - lld
  - llvm
  - ninja
  - pkgconf
  - rust
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: deno
  - exposure: global executable
    kind: cli
    name: dx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add deno
  av: sudo av install brew:deno
  brew: brew install deno
  chocolatey: choco install deno
  debian: sudo apt install dx
  dnf: sudo dnf install dx
  macports: sudo port install deno
  nix: nix profile install nixpkgs#deno
  pacman: sudo pacman -S deno
  scoop: scoop install main/deno
  ubuntu: sudo apt install dx
  winget: winget install --id DenoLand.Deno -e
  zypper: sudo zypper install deno
provenance:
  formula: deno
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
