id: brew:backplane-cli
display-name: backplane-cli
homepage: https://github.com/openshift/backplane-cli
repo: https://github.com/openshift/backplane-cli
docs: https://github.com/openshift/backplane-cli
package-manager:
  brew: backplane-cli
package-manager-url: https://formulae.brew.sh/formula/backplane-cli
version: 0.10.0
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for interacting with the OpenShift Backplane API
source-archive: https://github.com/openshift/backplane-cli/archive/refs/tags/v0.10.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ocm-backplane
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:backplane-cli
  brew: brew install backplane-cli
provenance:
  formula: backplane-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
