id: brew:github-release
display-name: github-release
homepage: https://github.com/github-release/github-release
repo: https://github.com/github-release/github-release
docs: https://github.com/github-release/github-release
package-manager:
  brew: github-release
  nix: github-release
package-manager-url: https://formulae.brew.sh/formula/github-release
version: 0.11.0
license: MIT
category: development
tags:
  - cli
description: Create and edit releases on Github (and upload artifacts)
source-archive: https://github.com/github-release/github-release/archive/refs/tags/v0.11.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: github-release
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:github-release
  brew: brew install github-release
  nix: nix profile install nixpkgs#github-release
provenance:
  formula: github-release
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
