id: brew:unitycatalog
display-name: unitycatalog
homepage: https://unitycatalog.io/
repo: https://github.com/unitycatalog/unitycatalog
docs: https://unitycatalog.io/
package-manager:
  brew: unitycatalog
  chocolatey: uc
  winget: Alibaba.UC
package-manager-url: https://formulae.brew.sh/formula/unitycatalog
version: 0.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: Open, Multi-modal Catalog for Data & AI
source-archive: https://github.com/unitycatalog/unitycatalog/archive/refs/tags/v0.4.1.tar.gz
dependencies:
  - openjdk@21
build-dependencies:
  - sbt
executables:
  - exposure: global executable
    kind: cli
    name: start-uc-server
  - exposure: global executable
    kind: cli
    name: uc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:unitycatalog
  brew: brew install unitycatalog
  chocolatey: choco install uc
  winget: winget install --id Alibaba.UC -e
provenance:
  formula: unitycatalog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
