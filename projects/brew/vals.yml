id: brew:vals
display-name: vals
homepage: https://github.com/helmfile/vals
repo: https://github.com/helmfile/vals
docs: https://github.com/helmfile/vals
package-manager:
  apk: vals
  brew: vals
  macports: vals
  nix: vals
  pacman: vals
  scoop: main/vals
package-manager-url: https://formulae.brew.sh/formula/vals
version: 0.44.0
license: Apache-2.0
category: development
tags:
  - cli
description: Helm-like configuration values loader with support for various sources
source-archive: https://github.com/helmfile/vals/archive/refs/tags/v0.44.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vals
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vals
  av: sudo av install brew:vals
  brew: brew install vals
  macports: sudo port install vals
  nix: nix profile install nixpkgs#vals
  pacman: sudo pacman -S vals
  scoop: scoop install main/vals
provenance:
  formula: vals
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
