id: brew:spark
display-name: spark
homepage: https://zachholman.com/spark/
repo: https://github.com/holman/spark
docs: https://zachholman.com/spark/
package-manager:
  apk: spark
  brew: spark
  chocolatey: Spark
  macports: spark
  nix: spark
  scoop: main/spark
package-manager-url: https://formulae.brew.sh/formula/spark
version: 1.0.1
license: MIT
category: development
tags:
  - cli
description: Sparklines for the shell
source-archive: https://github.com/holman/spark/archive/refs/tags/v1.0.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: spark
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add spark
  av: sudo av install brew:spark
  brew: brew install spark
  chocolatey: choco install Spark
  macports: sudo port install spark
  nix: nix profile install nixpkgs#spark
  scoop: scoop install main/spark
provenance:
  formula: spark
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
