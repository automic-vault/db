id: brew:libotr
display-name: libotr
homepage: https://otr.cypherpunks.ca/
repo: https://otr.cypherpunks.ca/libotr-4.1.1.tar.gz
docs: https://otr.cypherpunks.ca/
package-manager:
  apk: libotr
  brew: libotr
  dnf: libotr
  macports: libotr
  nix: libotr
  pacman: libotr
package-manager-url: https://formulae.brew.sh/formula/libotr
version: 4.1.1
license: LGPL-2.1-only AND GPL-2.0-only
category: network
tags:
  - cli
description: Off-The-Record (OTR) messaging library
source-archive: https://otr.cypherpunks.ca/libotr-4.1.1.tar.gz
dependencies:
  - libgcrypt
  - libgpg-error
executables:
  - exposure: global executable
    kind: cli
    name: otr_mackey
  - exposure: global executable
    kind: cli
    name: otr_modify
  - exposure: global executable
    kind: cli
    name: otr_parse
  - exposure: global executable
    kind: cli
    name: otr_readforge
  - exposure: global executable
    kind: cli
    name: otr_remac
  - exposure: global executable
    kind: cli
    name: otr_sesskeys
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libotr
  av: sudo av install brew:libotr
  brew: brew install libotr
  dnf: sudo dnf install libotr
  macports: sudo port install libotr
  nix: nix profile install nixpkgs#libotr
  pacman: sudo pacman -S libotr
provenance:
  formula: libotr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
