id: brew:innotop
display-name: innotop
homepage: https://github.com/innotop/innotop/
repo: https://github.com/innotop/innotop
docs: https://github.com/innotop/innotop/
package-manager:
  brew: innotop
  dnf: innotop
  zypper: innotop
package-manager-url: https://formulae.brew.sh/formula/innotop
version: 1.16.0
license: GPL-2.0-only OR Artistic-1.0-Perl
category: database
tags:
  - cli
description: Top clone for MySQL
source-archive: https://github.com/innotop/innotop/archive/refs/tags/v1.16.0.tar.gz
dependencies:
  - perl-dbd-mysql
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: innotop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:innotop
  brew: brew install innotop
  dnf: sudo dnf install innotop
  zypper: sudo zypper install innotop
provenance:
  formula: innotop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
