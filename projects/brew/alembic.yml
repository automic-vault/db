id: brew:alembic
display-name: alembic
homepage: http://www.alembic.io/
repo: https://github.com/alembic/alembic
docs: http://www.alembic.io/
package-manager:
  apk: alembic
  brew: alembic
  debian: alembic
  dnf: alembic
  macports: alembic
  nix: alembic
  pacman: alembic
  ubuntu: alembic
package-manager-url: https://formulae.brew.sh/formula/alembic
version: 1.8.11
license: BSD-3-Clause
category: development
tags:
  - cli
description: Open computer graphics interchange framework
source-archive: https://github.com/alembic/alembic/archive/refs/tags/1.8.11.tar.gz
dependencies:
  - hdf5
  - imath
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: abcconvert
  - exposure: global executable
    kind: cli
    name: abcdiff
  - exposure: global executable
    kind: cli
    name: abcecho
  - exposure: global executable
    kind: cli
    name: abcechobounds
  - exposure: global executable
    kind: cli
    name: abcls
  - exposure: global executable
    kind: cli
    name: abcstitcher
  - exposure: global executable
    kind: cli
    name: abctree
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add alembic
  av: sudo av install brew:alembic
  brew: brew install alembic
  debian: sudo apt install alembic
  dnf: sudo dnf install alembic
  macports: sudo port install alembic
  nix: nix profile install nixpkgs#alembic
  pacman: sudo pacman -S alembic
  ubuntu: sudo apt install alembic
provenance:
  formula: alembic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
