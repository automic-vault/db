id: brew:leaps
display-name: leaps
homepage: https://github.com/jeffail/leaps
repo: https://github.com/Jeffail/leaps
docs: https://github.com/jeffail/leaps
package-manager:
  brew: leaps
  nix: leaps
package-manager-url: https://formulae.brew.sh/formula/leaps
version: 0.9.1
license: MIT
category: development
tags:
  - cli
description: Collaborative web-based text editing service written in Golang
source-archive: https://github.com/Jeffail/leaps/archive/refs/tags/v0.9.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: leaps
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:leaps
  brew: brew install leaps
  nix: nix profile install nixpkgs#leaps
provenance:
  formula: leaps
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
