id: brew:macchanger
display-name: macchanger
homepage: https://github.com/shilch/macchanger
repo: https://github.com/shilch/macchanger
docs: https://github.com/shilch/macchanger
package-manager:
  apk: macchanger
  brew: macchanger
  debian: macchanger
  dnf: macchanger
  macports: macchanger
  nix: macchanger
  pacman: macchanger
  ubuntu: macchanger
  zypper: macchanger
package-manager-url: https://formulae.brew.sh/formula/macchanger
version: 0.2.1
license: GPL-2.0-only
category: development
tags:
  - cli
description: Change your mac address, for macOS
source-archive: https://github.com/shilch/macchanger/archive/refs/tags/v0.2.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: macchanger
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add macchanger
  av: sudo av install brew:macchanger
  brew: brew install macchanger
  debian: sudo apt install macchanger
  dnf: sudo dnf install macchanger
  macports: sudo port install macchanger
  nix: nix profile install nixpkgs#macchanger
  pacman: sudo pacman -S macchanger
  ubuntu: sudo apt install macchanger
  zypper: sudo zypper install macchanger
provenance:
  formula: macchanger
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
