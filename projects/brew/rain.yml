id: brew:rain
display-name: rain
homepage: https://github.com/aws-cloudformation/rain
repo: https://github.com/aws-cloudformation/rain
docs: https://github.com/aws-cloudformation/rain
package-manager:
  brew: rain
  nix: rain
  scoop: main/rain
package-manager-url: https://formulae.brew.sh/formula/rain
version: 1.24.4
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: Command-line tool for working with AWS CloudFormation
source-archive: https://github.com/aws-cloudformation/rain/archive/refs/tags/v1.24.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rain
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Deploying CloudFormation stacks with rain requires the AWS CLI to be installed. All
    other functionality works without the AWS CLI.
  post-install-defined: false
install-lines:
  av: sudo av install brew:rain
  brew: brew install rain
  nix: nix profile install nixpkgs#rain
  scoop: scoop install main/rain
provenance:
  formula: rain
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
