id: brew:pike
display-name: pike
homepage: https://pike.lysator.liu.se/
repo: https://pike.lysator.liu.se/pub/pike/latest-stable/Pike-v8.0.1956.tar.gz
docs: https://pike.lysator.liu.se/
package-manager:
  apk: pike
  brew: pike
  macports: pike
  nix: pike
package-manager-url: https://formulae.brew.sh/formula/pike
version: 8.0.1956
license: GPL-2.0-only OR LGPL-2.1-only OR MPL-1.1
category: development
tags:
  - cli
description: Dynamic programming language
source-archive: https://pike.lysator.liu.se/pub/pike/latest-stable/Pike-v8.0.1956.tar.gz
dependencies:
  - gettext
  - gmp
  - jpeg-turbo
  - libtiff
  - nettle@3
  - webp
build-dependencies:
  - gnu-sed
uses-from-macos:
  - bzip2
  - krb5
  - libxcrypt
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: pike
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pike
  av: sudo av install brew:pike
  brew: brew install pike
  macports: sudo port install pike
  nix: nix profile install nixpkgs#pike
provenance:
  formula: pike
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
