id: brew:rubberband
display-name: rubberband
homepage: https://breakfastquay.com/rubberband/
repo: https://breakfastquay.com/files/releases/rubberband-4.0.0.tar.bz2
docs: https://breakfastquay.com/rubberband/
package-manager:
  apk: rubberband
  brew: rubberband
  dnf: rubberband
  macports: rubberband
  nix: rubberband
  pacman: rubberband
  scoop: main/rubberband
package-manager-url: https://formulae.brew.sh/formula/rubberband
version: 4.0.0
license: GPL-2.0-or-later
category: media
tags:
  - cli
description: Audio time stretcher tool and library
source-archive: https://breakfastquay.com/files/releases/rubberband-4.0.0.tar.bz2
dependencies:
  - libsamplerate
  - libsndfile
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rubberband
  - exposure: global executable
    kind: cli
    name: rubberband-r3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rubberband
  av: sudo av install brew:rubberband
  brew: brew install rubberband
  dnf: sudo dnf install rubberband
  macports: sudo port install rubberband
  nix: nix profile install nixpkgs#rubberband
  pacman: sudo pacman -S rubberband
  scoop: scoop install main/rubberband
provenance:
  formula: rubberband
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
