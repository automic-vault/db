id: brew:microsocks
display-name: microsocks
homepage: https://github.com/rofl0r/microsocks
repo: https://github.com/rofl0r/microsocks
docs: https://github.com/rofl0r/microsocks
package-manager:
  apk: microsocks
  brew: microsocks
  debian: microsocks
  nix: microsocks
  pacman: microsocks
  ubuntu: microsocks
package-manager-url: https://formulae.brew.sh/formula/microsocks
version: 1.0.5
license: MIT
category: development
tags:
  - cli
description: Tiny, portable SOCKS5 server with very moderate resource usage
source-archive: https://github.com/rofl0r/microsocks/archive/refs/tags/v1.0.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: microsocks
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add microsocks
  av: sudo av install brew:microsocks
  brew: brew install microsocks
  debian: sudo apt install microsocks
  nix: nix profile install nixpkgs#microsocks
  pacman: sudo pacman -S microsocks
  ubuntu: sudo apt install microsocks
provenance:
  formula: microsocks
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
