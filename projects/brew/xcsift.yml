id: brew:xcsift
display-name: xcsift
homepage: https://github.com/ldomaradzki/xcsift
repo: https://github.com/ldomaradzki/xcsift
docs: https://github.com/ldomaradzki/xcsift
package-manager:
  brew: xcsift
package-manager-url: https://formulae.brew.sh/formula/xcsift
version: 1.3.0
license: MIT
category: development
tags:
  - cli
description: Swift tool to parse xcodebuild output for coding agents
source-archive: https://github.com/ldomaradzki/xcsift/archive/refs/tags/v1.3.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: xcsift
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xcsift
  brew: brew install xcsift
provenance:
  formula: xcsift
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
