id: brew:svgbob
display-name: svgbob
homepage: https://ivanceras.github.io/svgbob-editor/
repo: https://github.com/ivanceras/svgbob
docs: https://ivanceras.github.io/svgbob-editor/
package-manager:
  apk: svgbob
  brew: svgbob
  nix: svgbob
package-manager-url: https://formulae.brew.sh/formula/svgbob
version: 0.7.6
license: Apache-2.0
category: development
tags:
  - cli
description: Convert your ascii diagram scribbles into happy little SVG
source-archive: https://github.com/ivanceras/svgbob/archive/refs/tags/0.7.6.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: svgbob
  - exposure: global executable
    kind: cli
    name: svgbob_cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add svgbob
  av: sudo av install brew:svgbob
  brew: brew install svgbob
  nix: nix profile install nixpkgs#svgbob
provenance:
  formula: svgbob
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
