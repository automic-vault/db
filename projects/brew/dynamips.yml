id: brew:dynamips
display-name: dynamips
homepage: https://github.com/GNS3/dynamips
repo: https://github.com/GNS3/dynamips
docs: https://github.com/GNS3/dynamips
package-manager:
  apk: dynamips
  brew: dynamips
  debian: dynamips
  macports: dynamips
  nix: dynamips
  ubuntu: dynamips
  zypper: dynamips
package-manager-url: https://formulae.brew.sh/formula/dynamips
version: 0.2.24
license: GPL-2.0-only
category: development
tags:
  - cli
description: Cisco 7200/3600/3725/3745/2600/1700 Router Emulator
source-archive: https://github.com/GNS3/dynamips/archive/refs/tags/v0.2.24.tar.gz
build-dependencies:
  - cmake
  - libelf
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: dynamips
  - exposure: global executable
    kind: cli
    name: nvram_export
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dynamips
  av: sudo av install brew:dynamips
  brew: brew install dynamips
  debian: sudo apt install dynamips
  macports: sudo port install dynamips
  nix: nix profile install nixpkgs#dynamips
  ubuntu: sudo apt install dynamips
  zypper: sudo zypper install dynamips
provenance:
  formula: dynamips
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
