id: brew:proj
display-name: proj
homepage: https://proj.org/
repo: https://github.com/OSGeo/PROJ
docs: https://proj.org/
package-manager:
  apk: proj
  brew: proj
  debian: cct
  dnf: proj
  macports: proj
  nix: proj
  pacman: proj
  ubuntu: cct
  zypper: proj
package-manager-url: https://formulae.brew.sh/formula/proj
version: 9.8.1
license: MIT
category: development
tags:
  - cli
description: Cartographic Projections Library
source-archive: https://github.com/OSGeo/PROJ/releases/download/9.8.1/proj-9.8.1.tar.gz
dependencies:
  - libtiff
build-dependencies:
  - cmake
  - libtool
  - pkgconf
uses-from-macos:
  - curl
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: cct
  - exposure: global executable
    kind: cli
    name: cs2cs
  - exposure: global executable
    kind: cli
    name: geod
  - exposure: global executable
    kind: cli
    name: gie
  - exposure: global executable
    kind: cli
    name: invgeod
  - exposure: global executable
    kind: cli
    name: invproj
  - exposure: global executable
    kind: cli
    name: proj
  - exposure: global executable
    kind: cli
    name: projinfo
  - exposure: global executable
    kind: cli
    name: projsync
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add proj
  av: sudo av install brew:proj
  brew: brew install proj
  debian: sudo apt install cct
  dnf: sudo dnf install proj
  macports: sudo port install proj
  nix: nix profile install nixpkgs#proj
  pacman: sudo pacman -S proj
  ubuntu: sudo apt install cct
  zypper: sudo zypper install proj
provenance:
  formula: proj
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
