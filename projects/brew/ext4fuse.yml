id: brew:ext4fuse
display-name: ext4fuse
homepage: https://github.com/gerard/ext4fuse
repo: https://github.com/gerard/ext4fuse
docs: https://github.com/gerard/ext4fuse
package-manager:
  brew: ext4fuse
  macports: ext4fuse
  nix: ext4fuse
package-manager-url: https://formulae.brew.sh/formula/ext4fuse
version: 0.1.3
license: GPL-2.0-only
category: development
tags:
  - cli
description: Read-only implementation of ext4 for FUSE
source-archive: https://github.com/gerard/ext4fuse/archive/refs/tags/v0.1.3.tar.gz
dependencies:
  - libfuse@2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ext4fuse
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ext4fuse
  brew: brew install ext4fuse
  macports: sudo port install ext4fuse
  nix: nix profile install nixpkgs#ext4fuse
provenance:
  formula: ext4fuse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
