id: brew:hcl2json
display-name: hcl2json
homepage: https://github.com/tmccombs/hcl2json
repo: https://github.com/tmccombs/hcl2json
docs: https://github.com/tmccombs/hcl2json
package-manager:
  brew: hcl2json
  macports: hcl2json
  nix: hcl2json
package-manager-url: https://formulae.brew.sh/formula/hcl2json
version: 0.6.9
license: Apache-2.0
category: development
tags:
  - cli
  - json
description: Convert HCL2 to JSON
source-archive: https://github.com/tmccombs/hcl2json/archive/refs/tags/v0.6.9.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hcl2json
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hcl2json
  brew: brew install hcl2json
  macports: sudo port install hcl2json
  nix: nix profile install nixpkgs#hcl2json
provenance:
  formula: hcl2json
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
