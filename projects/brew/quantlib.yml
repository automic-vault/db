id: brew:quantlib
display-name: quantlib
homepage: https://www.quantlib.org/
repo: https://github.com/lballabio/QuantLib
docs: https://www.quantlib.org/
package-manager:
  brew: quantlib
  dnf: QuantLib
  macports: QuantLib
  nix: quantlib
package-manager-url: https://formulae.brew.sh/formula/quantlib
version: 1.42.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Library for quantitative finance
source-archive: https://github.com/lballabio/QuantLib/releases/download/v1.42.1/QuantLib-1.42.1.tar.gz
dependencies:
  - boost
executables:
  - exposure: global executable
    kind: cli
    name: quantlib-config
  - exposure: global executable
    kind: cli
    name: quantlib-test-suite
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:quantlib
  brew: brew install quantlib
  dnf: sudo dnf install QuantLib
  macports: sudo port install QuantLib
  nix: nix profile install nixpkgs#quantlib
provenance:
  formula: quantlib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
