id: brew:mg
display-name: mg
homepage: https://github.com/ibara/mg
repo: https://github.com/ibara/mg
docs: https://github.com/ibara/mg
package-manager:
  apk: mg
  brew: mg
  debian: mg
  dnf: mg
  macports: mg
  nix: mg
  pacman: mg
  ubuntu: mg
  zypper: mg
package-manager-url: https://formulae.brew.sh/formula/mg
version: 7.3
license: >
  LicenseRef-Homebrew-public-domain AND ISC AND BSD-2-Clause AND BSD-3-Clause AND
  BSD-4-Clause
category: development
tags:
  - cli
description: Small Emacs-like editor
source-archive: https://github.com/ibara/mg/releases/download/mg-7.3/mg-7.3.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: mg
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mg
  av: sudo av install brew:mg
  brew: brew install mg
  debian: sudo apt install mg
  dnf: sudo dnf install mg
  macports: sudo port install mg
  nix: nix profile install nixpkgs#mg
  pacman: sudo pacman -S mg
  ubuntu: sudo apt install mg
  zypper: sudo zypper install mg
provenance:
  formula: mg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
