id: brew:cpdf
display-name: cpdf
homepage: https://github.com/johnwhitington/cpdf-source
repo: https://github.com/johnwhitington/cpdf-source
docs: https://github.com/johnwhitington/cpdf-source
package-manager:
  apk: cpdf
  brew: cpdf
  dnf: cpdf
  winget: CoherentGraphics.Cpdf
package-manager-url: https://formulae.brew.sh/formula/cpdf
version: 2.9
license: AGPL-3.0-only
category: development
tags:
  - cli
description: PDF Command-line Tools
source-archive: https://github.com/johnwhitington/cpdf-source/archive/refs/tags/v2.9.tar.gz
dependencies:
  - camlpdf
  - ocaml
build-dependencies:
  - ocaml-findlib
executables:
  - exposure: global executable
    kind: cli
    name: cpdf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cpdf
  av: sudo av install brew:cpdf
  brew: brew install cpdf
  dnf: sudo dnf install cpdf
  winget: winget install --id CoherentGraphics.Cpdf -e
provenance:
  formula: cpdf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
