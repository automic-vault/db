id: brew:desktop-file-utils
display-name: desktop-file-utils
homepage: https://wiki.freedesktop.org/www/Software/desktop-file-utils/
repo: >
  https://www.freedesktop.org/software/desktop-file-utils/releases/desktop-file-utils-0.28.tar.xz
docs: https://wiki.freedesktop.org/www/Software/desktop-file-utils/
package-manager:
  apk: desktop-file-utils
  brew: desktop-file-utils
  debian: desktop-file-utils
  dnf: desktop-file-utils
  macports: desktop-file-utils
  nix: desktop-file-utils
  pacman: desktop-file-utils
  ubuntu: desktop-file-utils
  zypper: desktop-file-utils
package-manager-url: https://formulae.brew.sh/formula/desktop-file-utils
version: 0.28
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Command-line utilities for working with desktop entries
source-archive: >
  https://www.freedesktop.org/software/desktop-file-utils/releases/desktop-file-utils-0.28.tar.xz
dependencies:
  - gettext
  - glib
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: desktop-file-edit
  - exposure: global executable
    kind: cli
    name: desktop-file-install
  - exposure: global executable
    kind: cli
    name: desktop-file-validate
  - exposure: global executable
    kind: cli
    name: update-desktop-database
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add desktop-file-utils
  av: sudo av install brew:desktop-file-utils
  brew: brew install desktop-file-utils
  debian: sudo apt install desktop-file-utils
  dnf: sudo dnf install desktop-file-utils
  macports: sudo port install desktop-file-utils
  nix: nix profile install nixpkgs#desktop-file-utils
  pacman: sudo pacman -S desktop-file-utils
  ubuntu: sudo apt install desktop-file-utils
  zypper: sudo zypper install desktop-file-utils
provenance:
  formula: desktop-file-utils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
