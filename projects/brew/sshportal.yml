id: brew:sshportal
display-name: sshportal
homepage: https://v1.manfred.life/sshportal/
repo: https://github.com/moul/sshportal
docs: https://v1.manfred.life/sshportal/
package-manager:
  brew: sshportal
  nix: sshportal
package-manager-url: https://formulae.brew.sh/formula/sshportal
version: 1.19.5
license: Apache-2.0
category: development
tags:
  - cli
description: SSH & Telnet bastion server
source-archive: https://github.com/moul/sshportal/archive/refs/tags/v1.19.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sshportal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sshportal
  brew: brew install sshportal
  nix: nix profile install nixpkgs#sshportal
provenance:
  formula: sshportal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
