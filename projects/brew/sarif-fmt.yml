id: brew:sarif-fmt
display-name: sarif-fmt
homepage: https://docs.rs/crate/sarif-fmt/latest
repo: https://github.com/psastras/sarif-rs
docs: https://docs.rs/crate/sarif-fmt/latest
package-manager:
  brew: sarif-fmt
  dnf: sarif-fmt
  nix: sarif-fmt
package-manager-url: https://formulae.brew.sh/formula/sarif-fmt
version: 0.8.0
license: MIT
category: development
tags:
  - cli
description: Pretty print SARIF files to easy human readable output
source-archive: https://github.com/psastras/sarif-rs/archive/refs/tags/sarif-fmt-v0.8.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sarif-fmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sarif-fmt
  brew: brew install sarif-fmt
  dnf: sudo dnf install sarif-fmt
  nix: nix profile install nixpkgs#sarif-fmt
provenance:
  formula: sarif-fmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
