id: brew:koji
display-name: koji
homepage: https://github.com/cococonscious/koji
repo: https://github.com/cococonscious/koji
docs: https://github.com/cococonscious/koji
package-manager:
  brew: koji
  dnf: koji
  nix: koji
package-manager-url: https://formulae.brew.sh/formula/koji
version: 3.4.0
license: MIT
category: development
tags:
  - cli
description: Interactive CLI for creating conventional commits
source-archive: https://github.com/cococonscious/koji/archive/refs/tags/v3.4.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: koji
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:koji
  brew: brew install koji
  dnf: sudo dnf install koji
  nix: nix profile install nixpkgs#koji
provenance:
  formula: koji
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
