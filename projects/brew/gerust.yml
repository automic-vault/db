id: brew:gerust
display-name: gerust
homepage: https://gerust.rs/
repo: https://github.com/mainmatter/gerust
docs: https://gerust.rs/
package-manager:
  brew: gerust
package-manager-url: https://formulae.brew.sh/formula/gerust
version: 0.0.6
license: MIT
category: development
tags:
  - cli
description: Project generator for Rust backend projects
source-archive: https://github.com/mainmatter/gerust/archive/refs/tags/v0.0.6.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gerust
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gerust
  brew: brew install gerust
provenance:
  formula: gerust
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
