id: brew:carrot2
display-name: carrot2
homepage: https://search.carrot2.org/
repo: https://github.com/carrot2/carrot2
docs: https://search.carrot2.org/
package-manager:
  brew: carrot2
package-manager-url: https://formulae.brew.sh/formula/carrot2
version: 4.8.6
license: Apache-2.0
category: development
tags:
  - cli
description: Search results clustering engine
source-archive: https://github.com/carrot2/carrot2.git
dependencies:
  - openjdk
build-dependencies:
  - gradle
  - node@22
  - yarn
executables:
  - exposure: global executable
    kind: cli
    name: carrot2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:carrot2
  brew: brew install carrot2
provenance:
  formula: carrot2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
