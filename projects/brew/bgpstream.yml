id: brew:bgpstream
display-name: bgpstream
homepage: https://bgpstream.caida.org/
repo: https://github.com/CAIDA/libbgpstream
docs: https://bgpstream.caida.org/
package-manager:
  brew: bgpstream
package-manager-url: https://formulae.brew.sh/formula/bgpstream
version: 2.3.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: For live and historical BGP data analysis
source-archive: https://github.com/CAIDA/libbgpstream/releases/download/v2.3.0/libbgpstream-2.3.0.tar.gz
dependencies:
  - librdkafka
  - wandio
executables:
  - exposure: global executable
    kind: cli
    name: bgpreader
  - exposure: global executable
    kind: cli
    name: parsebgp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bgpstream
  brew: brew install bgpstream
provenance:
  formula: bgpstream
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
