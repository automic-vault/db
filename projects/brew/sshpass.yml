id: brew:sshpass
display-name: sshpass
homepage: https://sourceforge.net/projects/sshpass/
repo: https://master.dl.sourceforge.net/project/sshpass/sshpass/1.10/sshpass-1.10.tar.gz
docs: https://sourceforge.net/projects/sshpass/
package-manager:
  apk: sshpass
  brew: sshpass
  debian: sshpass
  dnf: sshpass
  macports: sshpass
  nix: sshpass
  pacman: sshpass
  scoop: main/sshpass
  ubuntu: sshpass
  winget: xhcoding.sshpass-win32
  zypper: sshpass
package-manager-url: https://formulae.brew.sh/formula/sshpass
version: 1.10
license: GPL-2.0-only
category: security
tags:
  - cli
description: Non-interactive SSH password auth
source-archive: https://master.dl.sourceforge.net/project/sshpass/sshpass/1.10/sshpass-1.10.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: sshpass
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Sshpass is a tool for non-interactively performing password authentication with
    SSH's so called "interactive keyboard password authentication". Most users should
    use SSH's more secure public key authentication instead. See `man sshpass` for more
    information.
  post-install-defined: false
install-lines:
  apk: sudo apk add sshpass
  av: sudo av install brew:sshpass
  brew: brew install sshpass
  debian: sudo apt install sshpass
  dnf: sudo dnf install sshpass
  macports: sudo port install sshpass
  nix: nix profile install nixpkgs#sshpass
  pacman: sudo pacman -S sshpass
  scoop: scoop install main/sshpass
  ubuntu: sudo apt install sshpass
  winget: winget install --id xhcoding.sshpass-win32 -e
  zypper: sudo zypper install sshpass
provenance:
  formula: sshpass
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
