id: brew:kvazaar
display-name: kvazaar
homepage: https://github.com/ultravideo/kvazaar
repo: https://github.com/ultravideo/kvazaar
docs: https://github.com/ultravideo/kvazaar
package-manager:
  brew: kvazaar
  debian: kvazaar
  macports: kvazaar
  nix: kvazaar
  pacman: kvazaar
package-manager-url: https://formulae.brew.sh/formula/kvazaar
version: 2.3.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Ultravideo HEVC encoder
source-archive: https://github.com/ultravideo/kvazaar/archive/refs/tags/v2.3.2.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: kvazaar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kvazaar
  brew: brew install kvazaar
  debian: sudo apt install kvazaar
  macports: sudo port install kvazaar
  nix: nix profile install nixpkgs#kvazaar
  pacman: sudo pacman -S kvazaar
provenance:
  formula: kvazaar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
