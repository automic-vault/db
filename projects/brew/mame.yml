id: brew:mame
display-name: mame
homepage: https://mamedev.org/
repo: https://github.com/mamedev/mame
docs: https://mamedev.org/
package-manager:
  apk: mame
  brew: mame
  debian: mame
  dnf: mame
  macports: mame
  nix: mame
  pacman: mame
  ubuntu: mame
  zypper: mame
package-manager-url: https://formulae.brew.sh/formula/mame
version: 0.287
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Multiple Arcade Machine Emulator
source-archive: https://github.com/mamedev/mame/archive/refs/tags/mame0287.tar.gz
dependencies:
  - flac
  - jpeg-turbo
  - portaudio
  - portmidi
  - pugixml
  - sdl3
  - sqlite
  - utf8proc
  - zstd
build-dependencies:
  - glm
  - pkgconf
  - rapidjson
  - sphinx-doc
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: mame
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mame
  av: sudo av install brew:mame
  brew: brew install mame
  debian: sudo apt install mame
  dnf: sudo dnf install mame
  macports: sudo port install mame
  nix: nix profile install nixpkgs#mame
  pacman: sudo pacman -S mame
  ubuntu: sudo apt install mame
  zypper: sudo zypper install mame
provenance:
  formula: mame
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
