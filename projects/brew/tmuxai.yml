id: brew:tmuxai
display-name: tmuxai
homepage: https://tmuxai.dev/
repo: https://github.com/BoringDystopiaDevelopment/tmuxai
docs: https://tmuxai.dev/
package-manager:
  brew: tmuxai
  nix: tmuxai
package-manager-url: https://formulae.brew.sh/formula/tmuxai
version: 2.2.2
license: Apache-2.0
category: development
tags:
  - cli
description: AI-powered, non-intrusive terminal assistant
source-archive: https://github.com/BoringDystopiaDevelopment/tmuxai/archive/refs/tags/v2.2.2.tar.gz
dependencies:
  - tmux
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tmuxai
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tmuxai
  brew: brew install tmuxai
  nix: nix profile install nixpkgs#tmuxai
provenance:
  formula: tmuxai
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
