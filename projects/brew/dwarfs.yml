id: brew:dwarfs
display-name: dwarfs
homepage: https://github.com/mhx/dwarfs
repo: https://github.com/mhx/dwarfs
docs: https://github.com/mhx/dwarfs
package-manager:
  brew: dwarfs
  nix: dwarfs
  zypper: dwarfs
package-manager-url: https://formulae.brew.sh/formula/dwarfs
version: 0.15.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Fast high compression read-only file system for Linux, Windows, and macOS
source-archive: https://github.com/mhx/dwarfs/releases/download/v0.15.3/dwarfs-0.15.3.tar.xz
dependencies:
  - boost
  - brotli
  - flac
  - fmt
  - howard-hinnant-date
  - libarchive
  - lz4
  - nlohmann-json
  - openssl@3
  - parallel-hashmap
  - range-v3
  - utf8cpp
  - xxhash
  - xz
  - zstd
build-dependencies:
  - cmake
  - googletest
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dwarfsck
  - exposure: global executable
    kind: cli
    name: dwarfsextract
  - exposure: global executable
    kind: cli
    name: mkdwarfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dwarfs
  brew: brew install dwarfs
  nix: nix profile install nixpkgs#dwarfs
  zypper: sudo zypper install dwarfs
provenance:
  formula: dwarfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
