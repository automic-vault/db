id: brew:cuetools
display-name: cuetools
homepage: https://github.com/svend/cuetools
repo: https://github.com/svend/cuetools
docs: https://github.com/svend/cuetools
package-manager:
  apk: cuetools
  brew: cuetools
  debian: cuetools
  dnf: cuetools
  macports: cuetools
  nix: cuetools
  pacman: cuetools
  scoop: extras/cuetools
  ubuntu: cuetools
  winget: gchudov.CUETools
package-manager-url: https://formulae.brew.sh/formula/cuetools
version: 1.4.1
license: GPL-2.0-only
category: development
tags:
  - cli
description: Utilities for .cue and .toc files
source-archive: https://github.com/svend/cuetools/archive/refs/tags/1.4.1.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: cuebreakpoints
  - exposure: global executable
    kind: cli
    name: cueconvert
  - exposure: global executable
    kind: cli
    name: cueprint
  - exposure: global executable
    kind: cli
    name: cuetag.sh
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cuetools
  av: sudo av install brew:cuetools
  brew: brew install cuetools
  debian: sudo apt install cuetools
  dnf: sudo dnf install cuetools
  macports: sudo port install cuetools
  nix: nix profile install nixpkgs#cuetools
  pacman: sudo pacman -S cuetools
  scoop: scoop install extras/cuetools
  ubuntu: sudo apt install cuetools
  winget: winget install --id gchudov.CUETools -e
provenance:
  formula: cuetools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
