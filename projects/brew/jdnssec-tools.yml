id: brew:jdnssec-tools
display-name: jdnssec-tools
homepage: https://github.com/dblacka/jdnssec-tools
repo: https://github.com/dblacka/jdnssec-tools
docs: https://github.com/dblacka/jdnssec-tools
package-manager:
  brew: jdnssec-tools
package-manager-url: https://formulae.brew.sh/formula/jdnssec-tools
version: 0.20.1
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Java command-line tools for DNSSEC
source-archive: >
  https://github.com/dblacka/jdnssec-tools/releases/download/v0.20.1/jdnssec-tools-0.20.1.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: jdnssec-dstool
  - exposure: global executable
    kind: cli
    name: jdnssec-keygen
  - exposure: global executable
    kind: cli
    name: jdnssec-keyinfo
  - exposure: global executable
    kind: cli
    name: jdnssec-signkeyset
  - exposure: global executable
    kind: cli
    name: jdnssec-signrrset
  - exposure: global executable
    kind: cli
    name: jdnssec-signzone
  - exposure: global executable
    kind: cli
    name: jdnssec-tools
  - exposure: global executable
    kind: cli
    name: jdnssec-verifyzone
  - exposure: global executable
    kind: cli
    name: jdnssec-zoneformat
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jdnssec-tools
  brew: brew install jdnssec-tools
provenance:
  formula: jdnssec-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
