id: brew:rockcraft
display-name: rockcraft
homepage: https://documentation.ubuntu.com/rockcraft/
repo: https://github.com/canonical/rockcraft
docs: https://documentation.ubuntu.com/rockcraft/
package-manager:
  brew: rockcraft
package-manager-url: https://formulae.brew.sh/formula/rockcraft
version: 1.19.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Tool to create OCI images using the language from Snapcraft and Charmcraft
source-archive: https://github.com/canonical/rockcraft.git
dependencies:
  - certifi
  - cryptography
  - libsodium
  - libyaml
  - lxc
  - pydantic
  - pygit2
  - python@3.14
uses-from-macos:
  - libffi
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: rockcraft
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rockcraft
  brew: brew install rockcraft
provenance:
  formula: rockcraft
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
