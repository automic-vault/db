id: brew:mapcrafter
display-name: mapcrafter
homepage: https://github.com/mapcrafter/mapcrafter
repo: https://github.com/mapcrafter/mapcrafter
docs: https://github.com/mapcrafter/mapcrafter
package-manager:
  brew: mapcrafter
package-manager-url: https://formulae.brew.sh/formula/mapcrafter
version: 2.4
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Minecraft map renderer
source-archive: https://github.com/mapcrafter/mapcrafter/archive/refs/tags/v.2.4.tar.gz
dependencies:
  - boost
  - jpeg-turbo
  - libpng
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: mapcrafter
  - exposure: global executable
    kind: cli
    name: mapcrafter_export
  - exposure: global executable
    kind: cli
    name: mapcrafter_markers
  - exposure: global executable
    kind: cli
    name: mapcrafter_png-it.py
  - exposure: global executable
    kind: cli
    name: mapcrafter_textures.py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mapcrafter
  brew: brew install mapcrafter
provenance:
  formula: mapcrafter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
