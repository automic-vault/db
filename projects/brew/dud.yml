id: brew:dud
display-name: dud
homepage: https://kevin-hanselman.github.io/dud/
repo: https://github.com/kevin-hanselman/dud
docs: https://kevin-hanselman.github.io/dud/
package-manager:
  brew: dud
  macports: dud
package-manager-url: https://formulae.brew.sh/formula/dud
version: 0.4.5
license: BSD-3-Clause
category: development
tags:
  - cli
description: CLI tool for versioning data
source-archive: https://github.com/kevin-hanselman/dud/archive/refs/tags/v0.4.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dud
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dud
  brew: brew install dud
  macports: sudo port install dud
provenance:
  formula: dud
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
