id: brew:evans
display-name: evans
homepage: https://github.com/ktr0731/evans
repo: https://github.com/ktr0731/evans
docs: https://github.com/ktr0731/evans
package-manager:
  brew: evans
  macports: evans
  nix: evans
  scoop: main/evans
package-manager-url: https://formulae.brew.sh/formula/evans
version: 0.10.11
license: MIT
category: development
tags:
  - cli
description: More expressive universal gRPC client
source-archive: https://github.com/ktr0731/evans/archive/refs/tags/v0.10.11.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: evans
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:evans
  brew: brew install evans
  macports: sudo port install evans
  nix: nix profile install nixpkgs#evans
  scoop: scoop install main/evans
provenance:
  formula: evans
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
