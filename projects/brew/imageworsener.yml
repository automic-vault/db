id: brew:imageworsener
display-name: imageworsener
homepage: https://entropymine.com/imageworsener/
repo: https://entropymine.com/imageworsener/imageworsener-1.3.5.tar.gz
docs: https://entropymine.com/imageworsener/
package-manager:
  brew: imageworsener
  nix: imageworsener
package-manager-url: https://formulae.brew.sh/formula/imageworsener
version: 1.3.5
license: MIT
category: media
tags:
  - cli
description: Utility and library for image scaling and processing
source-archive: https://entropymine.com/imageworsener/imageworsener-1.3.5.tar.gz
dependencies:
  - jpeg-turbo
  - libpng
executables:
  - exposure: global executable
    kind: cli
    name: imagew
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:imageworsener
  brew: brew install imageworsener
  nix: nix profile install nixpkgs#imageworsener
provenance:
  formula: imageworsener
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
