id: brew:glyr
display-name: glyr
homepage: https://github.com/sahib/glyr
repo: https://github.com/sahib/glyr
docs: https://github.com/sahib/glyr
package-manager:
  brew: glyr
  debian: glyrc
  nix: glyr
  pacman: glyr
  ubuntu: glyrc
  zypper: glyrc
package-manager-url: https://formulae.brew.sh/formula/glyr
version: 1.0.10
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Music related metadata search engine with command-line interface and C API
source-archive: https://github.com/sahib/glyr/archive/refs/tags/1.0.10.tar.gz
dependencies:
  - gettext
  - glib
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - curl
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: glyrc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:glyr
  brew: brew install glyr
  debian: sudo apt install glyrc
  nix: nix profile install nixpkgs#glyr
  pacman: sudo pacman -S glyr
  ubuntu: sudo apt install glyrc
  zypper: sudo zypper install glyrc
provenance:
  formula: glyr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
