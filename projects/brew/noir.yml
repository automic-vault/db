id: brew:noir
display-name: noir
homepage: https://owasp.org/www-project-noir/
repo: https://github.com/owasp-noir/noir
docs: https://owasp.org/www-project-noir/
package-manager:
  brew: noir
package-manager-url: https://formulae.brew.sh/formula/noir
version: 1.0.0
license: MIT
category: development
tags:
  - cli
description: Attack surface detector that identifies endpoints by static analysis
source-archive: https://github.com/owasp-noir/noir/archive/refs/tags/v1.0.0.tar.gz
dependencies:
  - bdw-gc
  - libevent
  - libyaml
  - openssl@3
  - pcre2
build-dependencies:
  - crystal
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: noir
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:noir
  brew: brew install noir
provenance:
  formula: noir
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
