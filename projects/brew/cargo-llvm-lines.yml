id: brew:cargo-llvm-lines
display-name: cargo-llvm-lines
homepage: https://github.com/dtolnay/cargo-llvm-lines
repo: https://github.com/dtolnay/cargo-llvm-lines
docs: https://github.com/dtolnay/cargo-llvm-lines
package-manager:
  brew: cargo-llvm-lines
  nix: cargo-llvm-lines
package-manager-url: https://formulae.brew.sh/formula/cargo-llvm-lines
version: 0.4.46
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Count lines of LLVM IR per generic function
source-archive: https://github.com/dtolnay/cargo-llvm-lines/archive/refs/tags/0.4.46.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-llvm-lines
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-llvm-lines
  brew: brew install cargo-llvm-lines
  nix: nix profile install nixpkgs#cargo-llvm-lines
provenance:
  formula: cargo-llvm-lines
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
