id: brew:tinc
display-name: tinc
homepage: https://www.tinc-vpn.org/
repo: https://tinc-vpn.org/packages/tinc-1.0.37.tar.gz
docs: https://www.tinc-vpn.org/
package-manager:
  apk: tinc
  brew: tinc
  debian: tinc
  dnf: tinc
  macports: tinc
  nix: tinc
  pacman: tinc
  ubuntu: tinc
  zypper: tinc
package-manager-url: https://formulae.brew.sh/formula/tinc
version: 1.0.37
license: GPL-2.0-or-later WITH openvpn-openssl-exception
category: network
tags:
  - cli
description: Virtual Private Network (VPN) tool
source-archive: https://tinc-vpn.org/packages/tinc-1.0.37.tar.gz
dependencies:
  - lzo
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: tincd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add tinc
  av: sudo av install brew:tinc
  brew: brew install tinc
  debian: sudo apt install tinc
  dnf: sudo dnf install tinc
  macports: sudo port install tinc
  nix: nix profile install nixpkgs#tinc
  pacman: sudo pacman -S tinc
  ubuntu: sudo apt install tinc
  zypper: sudo zypper install tinc
provenance:
  formula: tinc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
