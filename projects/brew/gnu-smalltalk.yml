id: brew:gnu-smalltalk
display-name: gnu-smalltalk
homepage: https://www.gnu.org/software/smalltalk/
repo: https://ftpmirror.gnu.org/gnu/smalltalk/smalltalk-3.2.5.tar.xz
docs: https://www.gnu.org/software/smalltalk/
package-manager:
  brew: gnu-smalltalk
  dnf: gst
  macports: gst
  nix: gnu-smalltalk
package-manager-url: https://formulae.brew.sh/formula/gnu-smalltalk
version: 3.2.5
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Implementation of the Smalltalk language
source-archive: https://ftpmirror.gnu.org/gnu/smalltalk/smalltalk-3.2.5.tar.xz
dependencies:
  - gdbm
  - gmp
  - gnutls
  - libsigsegv
  - libtool
  - readline
build-dependencies:
  - autoconf
  - automake
  - gawk
  - pkgconf
uses-from-macos:
  - expat
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: gst
  - exposure: global executable
    kind: cli
    name: gst-blox
  - exposure: global executable
    kind: cli
    name: gst-browser
  - exposure: global executable
    kind: cli
    name: gst-config
  - exposure: global executable
    kind: cli
    name: gst-convert
  - exposure: global executable
    kind: cli
    name: gst-doc
  - exposure: global executable
    kind: cli
    name: gst-load
  - exposure: global executable
    kind: cli
    name: gst-package
  - exposure: global executable
    kind: cli
    name: gst-profile
  - exposure: global executable
    kind: cli
    name: gst-reload
  - exposure: global executable
    kind: cli
    name: gst-remote
  - exposure: global executable
    kind: cli
    name: gst-sunit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gnu-smalltalk
  brew: brew install gnu-smalltalk
  dnf: sudo dnf install gst
  macports: sudo port install gst
  nix: nix profile install nixpkgs#gnu-smalltalk
provenance:
  formula: gnu-smalltalk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
