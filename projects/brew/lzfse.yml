id: brew:lzfse
display-name: lzfse
homepage: https://github.com/lzfse/lzfse
repo: https://github.com/lzfse/lzfse
docs: https://github.com/lzfse/lzfse
package-manager:
  apk: lzfse
  brew: lzfse
  debian: lzfse
  dnf: lzfse
  macports: lzfse
  nix: lzfse
  ubuntu: lzfse
  zypper: lzfse
package-manager-url: https://formulae.brew.sh/formula/lzfse
version: 1.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Apple LZFSE compression library and command-line tool
source-archive: https://github.com/lzfse/lzfse/archive/refs/tags/lzfse-1.0.tar.gz
build-dependencies:
