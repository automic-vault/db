    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lzfse
  av: sudo av install brew:lzfse
  brew: brew install lzfse
  debian: sudo apt install lzfse
  dnf: sudo dnf install lzfse
  macports: sudo port install lzfse
  nix: nix profile install nixpkgs#lzfse
  ubuntu: sudo apt install lzfse
  zypper: sudo zypper install lzfse
provenance:
  formula: lzfse
