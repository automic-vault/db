id: brew:energy
display-name: energy
homepage: https://energye.github.io
repo: https://github.com/energye/energy
docs: https://energye.github.io
package-manager:
  brew: energy
package-manager-url: https://formulae.brew.sh/formula/energy
version: 2.5.6
license: Apache-2.0
category: development
tags:
  - cli
description: CLI is used to initialize the Energy development environment tools
source-archive: https://github.com/energye/energy/archive/refs/tags/v2.5.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: energy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:energy
  brew: brew install energy
provenance:
  formula: energy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
