id: brew:harsh
display-name: harsh
homepage: https://github.com/wakatara/harsh
repo: https://github.com/wakatara/harsh
docs: https://github.com/wakatara/harsh
package-manager:
  apk: harsh
  brew: harsh
  nix: harsh
package-manager-url: https://formulae.brew.sh/formula/harsh
version: 0.14.4
license: MIT
category: development
tags:
  - cli
description: Habit tracking for geeks
source-archive: https://github.com/wakatara/harsh/archive/refs/tags/v0.14.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: harsh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add harsh
  av: sudo av install brew:harsh
  brew: brew install harsh
  nix: nix profile install nixpkgs#harsh
provenance:
  formula: harsh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
