id: brew:opendht
display-name: opendht
homepage: https://github.com/savoirfairelinux/opendht
repo: https://github.com/savoirfairelinux/opendht
docs: https://github.com/savoirfairelinux/opendht
package-manager:
  apk: opendht
  brew: opendht
  nix: opendht
  pacman: opendht
  ubuntu: dhtnode
package-manager-url: https://formulae.brew.sh/formula/opendht
version: 3.7.1
license: MIT
category: development
tags:
  - cli
description: C++17 Distributed Hash Table implementation
source-archive: https://github.com/savoirfairelinux/opendht/archive/refs/tags/v3.7.1.tar.gz
dependencies:
  - argon2
  - asio
  - fmt
  - gnutls
  - msgpack-cxx
  - nettle
  - readline
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dhtnode
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add opendht
  av: sudo av install brew:opendht
  brew: brew install opendht
  nix: nix profile install nixpkgs#opendht
  pacman: sudo pacman -S opendht
  ubuntu: sudo apt install dhtnode
provenance:
  formula: opendht
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
