id: brew:clang-uml
display-name: clang-uml
homepage: https://github.com/bkryza/clang-uml
repo: https://github.com/bkryza/clang-uml
docs: https://github.com/bkryza/clang-uml
package-manager:
  brew: clang-uml
  macports: clang-uml
  nix: clang-uml
  winget: bkryza.clang-uml
package-manager-url: https://formulae.brew.sh/formula/clang-uml
version: 0.6.2
license: Apache-2.0
category: development
tags:
  - cli
description: Customizable automatic UML diagram generator for C++ based on Clang
source-archive: https://github.com/bkryza/clang-uml/archive/refs/tags/0.6.2.tar.gz
dependencies:
  - llvm@21
  - yaml-cpp
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: clang-uml
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clang-uml
  brew: brew install clang-uml
  macports: sudo port install clang-uml
  nix: nix profile install nixpkgs#clang-uml
  winget: winget install --id bkryza.clang-uml -e
provenance:
  formula: clang-uml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
