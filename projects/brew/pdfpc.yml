id: brew:pdfpc
display-name: pdfpc
homepage: https://pdfpc.github.io/
repo: https://github.com/pdfpc/pdfpc
docs: https://pdfpc.github.io/
package-manager:
  brew: pdfpc
  dnf: pdfpc
  macports: pdfpc
  nix: pdfpc
  pacman: pdfpc
package-manager-url: https://formulae.brew.sh/formula/pdfpc
version: 4.7.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Presenter console with multi-monitor support for PDF files
source-archive: https://github.com/pdfpc/pdfpc/archive/refs/tags/v4.7.0.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - discount
  - gdk-pixbuf
  - gettext
  - glib
  - gstreamer
  - gtk+3
  - harfbuzz
  - json-glib
  - libgee
  - librsvg
  - libx11
  - pango
  - poppler
build-dependencies:
  - cmake
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: pdfpc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pdfpc
  brew: brew install pdfpc
  dnf: sudo dnf install pdfpc
  macports: sudo port install pdfpc
  nix: nix profile install nixpkgs#pdfpc
  pacman: sudo pacman -S pdfpc
provenance:
  formula: pdfpc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
