id: brew:blink1
display-name: blink1
homepage: https://blink1.thingm.com/
repo: https://github.com/todbot/blink1-tool
docs: https://blink1.thingm.com/
package-manager:
  brew: blink1
  nix: blink1-tool
  scoop: main/blink1-tool
package-manager-url: https://formulae.brew.sh/formula/blink1
version: 2.5.0
license: CC-BY-SA-4.0 OR MIT
category: development
tags:
  - cli
description: Control blink(1) indicator light
source-archive: https://github.com/todbot/blink1-tool.git
executables:
  - exposure: global executable
    kind: cli
    name: blink1-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:blink1
  brew: brew install blink1
  nix: nix profile install nixpkgs#blink1-tool
  scoop: scoop install main/blink1-tool
provenance:
  formula: blink1
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
