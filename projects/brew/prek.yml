id: brew:prek
display-name: prek
homepage: https://github.com/j178/prek
repo: https://github.com/j178/prek
docs: https://github.com/j178/prek
package-manager:
  brew: prek
  macports: prek
  nix: prek
  scoop: main/prek
  winget: j178.Prek
  zypper: prek
package-manager-url: https://formulae.brew.sh/formula/prek
version: 0.4.3
license: MIT
category: development
tags:
  - cli
  - git
description: Fast Git hook manager written in Rust, drop-in alternative to pre-commit
source-archive: https://github.com/j178/prek/archive/refs/tags/v0.4.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: prek
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:prek
  brew: brew install prek
  macports: sudo port install prek
  nix: nix profile install nixpkgs#prek
  scoop: scoop install main/prek
  winget: winget install --id j178.Prek -e
  zypper: sudo zypper install prek
provenance:
  formula: prek
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
