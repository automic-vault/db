id: brew:flix
display-name: flix
homepage: https://flix.dev/
repo: https://github.com/flix/flix
docs: https://flix.dev/
package-manager:
  brew: flix
  nix: flix
package-manager-url: https://formulae.brew.sh/formula/flix
version: 0.72.0
license: Apache-2.0
category: development
tags:
  - cli
description: Statically typed functional, imperative, and logic programming language
source-archive: https://github.com/flix/flix/archive/refs/tags/v0.72.0.tar.gz
dependencies:
  - openjdk
build-dependencies:
  - mill
  - scala
executables:
  - exposure: global executable
    kind: cli
    name: flix
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flix
  brew: brew install flix
  nix: nix profile install nixpkgs#flix
provenance:
  formula: flix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
