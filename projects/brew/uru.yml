id: brew:uru
display-name: uru
homepage: https://bitbucket.org/jonforums/uru
repo: https://bitbucket.org/jonforums/uru/get/v0.8.5.tar.gz
docs: https://bitbucket.org/jonforums/uru
package-manager:
  brew: uru
package-manager-url: https://formulae.brew.sh/formula/uru
version: 0.8.5
license: BSD-3-Clause
category: network
tags:
  - cli
description: Use multiple rubies on multiple platforms
source-archive: https://bitbucket.org/jonforums/uru/get/v0.8.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: uru_rt
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Append to ~/.profile on Ubuntu, or to ~/.zshrc on Zsh $ echo 'eval "$(uru_rt admin
    install)"' >> ~/.bash_profile
  post-install-defined: false
install-lines:
  av: sudo av install brew:uru
  brew: brew install uru
provenance:
  formula: uru
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
