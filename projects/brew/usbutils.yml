id: brew:usbutils
display-name: usbutils
homepage: http://www.linux-usb.org/
repo: https://mirrors.edge.kernel.org/pub/linux/utils/usb/usbutils/usbutils-019.tar.gz
docs: http://www.linux-usb.org/
package-manager:
  apk: usbutils
  brew: usbutils
  debian: usbutils
  dnf: usbutils
  macports: usbutils
  nix: usbutils
  pacman: usbutils
  ubuntu: usbutils
  zypper: usbutils
package-manager-url: https://formulae.brew.sh/formula/usbutils
version: 019
license: GPL-2.0-only AND GPL-2.0-or-later AND (GPL-2.0-only OR GPL-3.0-only)
category: network
tags:
  - cli
description: List detailed info about USB devices
source-archive: https://mirrors.edge.kernel.org/pub/linux/utils/usb/usbutils/usbutils-019.tar.gz
dependencies:
  - libusb
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: usbhid-dump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    usbhid-dump requires either proper code signing with com.apple.vm.device-access
    entitlement or root privilege
  post-install-defined: false
install-lines:
  apk: sudo apk add usbutils
  av: sudo av install brew:usbutils
  brew: brew install usbutils
  debian: sudo apt install usbutils
  dnf: sudo dnf install usbutils
  macports: sudo port install usbutils
  nix: nix profile install nixpkgs#usbutils
  pacman: sudo pacman -S usbutils
  ubuntu: sudo apt install usbutils
  zypper: sudo zypper install usbutils
provenance:
  formula: usbutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
