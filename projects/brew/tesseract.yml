id: brew:tesseract
display-name: tesseract
homepage: https://tesseract-ocr.github.io/
repo: https://github.com/tesseract-ocr/tesseract
docs: https://tesseract-ocr.github.io/
package-manager:
  brew: tesseract
  chocolatey: tesseract
  dnf: tesseract
  macports: tesseract
  nix: tesseract
  pacman: tesseract
  scoop: main/tesseract
  winget: Tesseract.Tesseract.Stable
  zypper: tesseract
package-manager-url: https://formulae.brew.sh/formula/tesseract
version: 5.5.2
license: Apache-2.0
category: development
tags:
  - cli
description: OCR (Optical Character Recognition) engine
source-archive: https://github.com/tesseract-ocr/tesseract/archive/refs/tags/5.5.2.tar.gz
dependencies:
  - cairo
  - fontconfig
  - freetype
  - gettext
  - glib
  - harfbuzz
  - icu4c@78
  - leptonica
  - libarchive
  - pango
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ambiguous_words
  - exposure: global executable
    kind: cli
    name: classifier_tester
  - exposure: global executable
    kind: cli
    name: cntraining
  - exposure: global executable
    kind: cli
    name: combine_lang_model
  - exposure: global executable
    kind: cli
    name: combine_tessdata
  - exposure: global executable
    kind: cli
    name: dawg2wordlist
  - exposure: global executable
    kind: cli
    name: lstmeval
  - exposure: global executable
    kind: cli
    name: lstmtraining
  - exposure: global executable
    kind: cli
    name: merge_unicharsets
  - exposure: global executable
    kind: cli
    name: mftraining
  - exposure: global executable
    kind: cli
    name: set_unicharset_properties
  - exposure: global executable
    kind: cli
    name: shapeclustering
  - exposure: global executable
    kind: cli
    name: tesseract
  - exposure: global executable
    kind: cli
    name: text2image
  - exposure: global executable
    kind: cli
    name: unicharset_extractor
  - exposure: global executable
    kind: cli
    name: wordlist2dawg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    This formula contains only the "eng", "osd", and "snum" language data files. If you
    need any other supported languages, run `brew install tesseract-lang`.
  post-install-defined: false
install-lines:
  av: sudo av install brew:tesseract
  brew: brew install tesseract
  chocolatey: choco install tesseract
  dnf: sudo dnf install tesseract
  macports: sudo port install tesseract
  nix: nix profile install nixpkgs#tesseract
  pacman: sudo pacman -S tesseract
  scoop: scoop install main/tesseract
  winget: winget install --id Tesseract.Tesseract.Stable -e
  zypper: sudo zypper install tesseract
provenance:
  formula: tesseract
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
