id: brew:oras
display-name: oras
homepage: https://github.com/oras-project/oras
repo: https://github.com/oras-project/oras
docs: https://github.com/oras-project/oras
package-manager:
  brew: oras
  debian: oras
  nix: oras
  scoop: extras/oras
  winget: ORASProject.ORAS
  zypper: oras
package-manager-url: https://formulae.brew.sh/formula/oras
version: 1.3.2
license: Apache-2.0
category: development
tags:
  - cli
description: OCI Registry As Storage
source-archive: https://github.com/oras-project/oras/archive/refs/tags/v1.3.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: oras
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oras
  brew: brew install oras
  debian: sudo apt install oras
  nix: nix profile install nixpkgs#oras
  scoop: scoop install extras/oras
  winget: winget install --id ORASProject.ORAS -e
  zypper: sudo zypper install oras
provenance:
  formula: oras
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
