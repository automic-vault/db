id: brew:mailcatcher
display-name: mailcatcher
homepage: https://mailcatcher.me
repo: https://github.com/sj26/mailcatcher
docs: https://mailcatcher.me
package-manager:
  brew: mailcatcher
  nix: mailcatcher
package-manager-url: https://formulae.brew.sh/formula/mailcatcher
version: 0.10.0
license: MIT
category: development
tags:
  - cli
description: Catches mail and serves it through a dream
source-archive: https://github.com/sj26/mailcatcher/archive/refs/tags/v0.10.0.tar.gz
dependencies:
  - libyaml
  - openssl@3
  - ruby
build-dependencies:
  - pkgconf
uses-from-macos:
  - libedit
  - libffi
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: catchmail
  - exposure: global executable
    kind: cli
    name: mailcatcher
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:mailcatcher
  brew: brew install mailcatcher
  nix: nix profile install nixpkgs#mailcatcher
provenance:
  formula: mailcatcher
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
