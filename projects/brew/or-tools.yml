id: brew:or-tools
display-name: or-tools
homepage: https://developers.google.com/optimization/
repo: https://github.com/google/or-tools
docs: https://developers.google.com/optimization/
package-manager:
  brew: or-tools
  nix: or-tools
package-manager-url: https://formulae.brew.sh/formula/or-tools
version: 9.15
license: Apache-2.0
category: development
tags:
  - cli
description: Google's Operations Research tools
source-archive: https://github.com/google/or-tools/archive/refs/tags/v9.15.tar.gz
dependencies:
  - abseil
  - cbc
  - cgl
  - clp
  - coinutils
  - eigen
  - gmp
  - highs
  - mpfr
  - openblas
  - osi
  - protobuf
  - re2
  - scip
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: fzn-cp-sat
  - exposure: global executable
    kind: cli
    name: sat_runner
  - exposure: global executable
    kind: cli
    name: solve
  - exposure: global executable
    kind: cli
    name: vector_bin_packing
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:or-tools
  brew: brew install or-tools
  nix: nix profile install nixpkgs#or-tools
provenance:
  formula: or-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
