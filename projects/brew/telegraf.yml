id: brew:telegraf
display-name: telegraf
homepage: https://www.influxdata.com/time-series-platform/telegraf/
repo: https://github.com/influxdata/telegraf
docs: https://www.influxdata.com/time-series-platform/telegraf/
package-manager:
  apk: telegraf
  brew: telegraf
  chocolatey: telegraf
  macports: telegraf
  nix: telegraf
  scoop: main/telegraf
  winget: InfluxData.Telegraf
  zypper: telegraf
package-manager-url: https://formulae.brew.sh/formula/telegraf
version: 1.38.4
license: MIT
category: development
tags:
  - cli
description: Plugin-driven server agent for collecting & reporting metrics
source-archive: https://github.com/influxdata/telegraf/archive/refs/tags/v1.38.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: telegraf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add telegraf
  av: sudo av install brew:telegraf
  brew: brew install telegraf
  chocolatey: choco install telegraf
  macports: sudo port install telegraf
  nix: nix profile install nixpkgs#telegraf
  scoop: scoop install main/telegraf
  winget: winget install --id InfluxData.Telegraf -e
  zypper: sudo zypper install telegraf
provenance:
  formula: telegraf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
