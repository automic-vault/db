id: brew:chart-releaser
display-name: chart-releaser
homepage: https://github.com/helm/chart-releaser/
repo: https://github.com/helm/chart-releaser
docs: https://github.com/helm/chart-releaser/
package-manager:
  brew: chart-releaser
package-manager-url: https://formulae.brew.sh/formula/chart-releaser
version: 1.8.1
license: Apache-2.0
category: development
tags:
  - cli
description: Hosting Helm Charts via GitHub Pages and Releases
source-archive: https://github.com/helm/chart-releaser/archive/refs/tags/v1.8.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chart-releaser
  brew: brew install chart-releaser
provenance:
  formula: chart-releaser
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
