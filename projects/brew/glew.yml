id: brew:glew
display-name: glew
homepage: https://glew.sourceforge.net/
repo: https://downloads.sourceforge.net/project/glew/glew/2.3.1/glew-2.3.1.tgz
docs: https://glew.sourceforge.net/
package-manager:
  apk: glew
  brew: glew
  dnf: glew
  macports: glew
  nix: glew
  pacman: glew
  zypper: glew
package-manager-url: https://formulae.brew.sh/formula/glew
version: 2.3.1
license: BSD-3-Clause
category: network
tags:
  - cli
description: OpenGL Extension Wrangler Library
source-archive: https://downloads.sourceforge.net/project/glew/glew/2.3.1/glew-2.3.1.tgz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: glewinfo
  - exposure: global executable
    kind: cli
    name: visualinfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add glew
  av: sudo av install brew:glew
  brew: brew install glew
  dnf: sudo dnf install glew
  macports: sudo port install glew
  nix: nix profile install nixpkgs#glew
  pacman: sudo pacman -S glew
  zypper: sudo zypper install glew
provenance:
  formula: glew
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
