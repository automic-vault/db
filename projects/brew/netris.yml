id: brew:netris
display-name: netris
homepage: https://packages.debian.org/sid/netris
repo: https://deb.debian.org/debian/pool/main/n/netris/netris_0.52.orig.tar.gz
docs: https://packages.debian.org/sid/netris
package-manager:
  brew: netris
  macports: netris
  nix: netris
  ubuntu: netris
package-manager-url: https://formulae.brew.sh/formula/netris
version: 0.52
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Networked variant of tetris
source-archive: https://deb.debian.org/debian/pool/main/n/netris/netris_0.52.orig.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: netris
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:netris
  brew: brew install netris
  macports: sudo port install netris
  nix: nix profile install nixpkgs#netris
  ubuntu: sudo apt install netris
provenance:
  formula: netris
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
