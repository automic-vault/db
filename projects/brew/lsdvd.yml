id: brew:lsdvd
display-name: lsdvd
homepage: https://sourceforge.net/projects/lsdvd/
repo: https://git.code.sf.net/p/lsdvd/git
docs: https://sourceforge.net/projects/lsdvd/
package-manager:
  apk: lsdvd
  brew: lsdvd
  debian: lsdvd
  dnf: lsdvd
  macports: lsdvd
  nix: lsdvd
  pacman: lsdvd
  ubuntu: lsdvd
  zypper: lsdvd
package-manager-url: https://formulae.brew.sh/formula/lsdvd
version: 0.21
license: GPL-2.0-only
category: development
tags:
  - cli
description: Read the content info of a DVD
source-archive: https://git.code.sf.net/p/lsdvd/git.git
dependencies:
  - libdvdcss
  - libdvdread
  - libxml2
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: lsdvd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lsdvd
  av: sudo av install brew:lsdvd
  brew: brew install lsdvd
  debian: sudo apt install lsdvd
  dnf: sudo dnf install lsdvd
  macports: sudo port install lsdvd
  nix: nix profile install nixpkgs#lsdvd
  pacman: sudo pacman -S lsdvd
  ubuntu: sudo apt install lsdvd
  zypper: sudo zypper install lsdvd
provenance:
  formula: lsdvd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
