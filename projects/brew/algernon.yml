id: brew:algernon
display-name: algernon
homepage: https://github.com/xyproto/algernon
repo: https://github.com/xyproto/algernon
docs: https://github.com/xyproto/algernon
package-manager:
  brew: algernon
  pacman: algernon
  scoop: main/algernon
  winget: xyproto.algernon
package-manager-url: https://formulae.brew.sh/formula/algernon
version: 1.17.8
license: BSD-3-Clause
category: development
tags:
  - cli
description: Pure Go web server with Lua, Markdown, HTTP/2 and template support
source-archive: https://github.com/xyproto/algernon/archive/refs/tags/v1.17.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: algernon
  - exposure: global executable
    kind: cli
    name: mdview
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:algernon
  brew: brew install algernon
  pacman: sudo pacman -S algernon
  scoop: scoop install main/algernon
  winget: winget install --id xyproto.algernon -e
provenance:
  formula: algernon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
