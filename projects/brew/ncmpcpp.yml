id: brew:ncmpcpp
display-name: ncmpcpp
homepage: https://rybczak.net/ncmpcpp/
repo: https://github.com/ncmpcpp/ncmpcpp
docs: https://rybczak.net/ncmpcpp/
package-manager:
  apk: ncmpcpp
  brew: ncmpcpp
  debian: ncmpcpp
  dnf: ncmpcpp
  macports: ncmpcpp
  nix: ncmpcpp
  pacman: ncmpcpp
  ubuntu: ncmpcpp
  zypper: ncmpcpp
package-manager-url: https://formulae.brew.sh/formula/ncmpcpp
version: 0.10.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Ncurses-based client for the Music Player Daemon
source-archive: https://github.com/ncmpcpp/ncmpcpp/archive/refs/tags/0.10.1.tar.gz
dependencies:
  - boost
  - fftw
  - icu4c@78
  - libmpdclient
  - ncurses
  - readline
  - taglib
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: ncmpcpp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ncmpcpp
  av: sudo av install brew:ncmpcpp
  brew: brew install ncmpcpp
  debian: sudo apt install ncmpcpp
  dnf: sudo dnf install ncmpcpp
  macports: sudo port install ncmpcpp
  nix: nix profile install nixpkgs#ncmpcpp
  pacman: sudo pacman -S ncmpcpp
  ubuntu: sudo apt install ncmpcpp
  zypper: sudo zypper install ncmpcpp
provenance:
  formula: ncmpcpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
