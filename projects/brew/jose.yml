id: brew:jose
display-name: jose
homepage: https://github.com/latchset/jose
repo: https://github.com/latchset/jose
docs: https://github.com/latchset/jose
package-manager:
  apk: jose
  brew: jose
  debian: jose
  dnf: jose
  nix: jose
  pacman: jose
  ubuntu: jose
  zypper: jose
package-manager-url: https://formulae.brew.sh/formula/jose
version: 14
license: Apache-2.0
category: security
tags:
  - cli
description: C-language implementation of Javascript Object Signing and Encryption
source-archive: https://github.com/latchset/jose/releases/download/v14/jose-14.tar.xz
dependencies:
  - jansson
  - openssl@4
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: jose
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jose
  av: sudo av install brew:jose
  brew: brew install jose
  debian: sudo apt install jose
  dnf: sudo dnf install jose
  nix: nix profile install nixpkgs#jose
  pacman: sudo pacman -S jose
  ubuntu: sudo apt install jose
  zypper: sudo zypper install jose
provenance:
  formula: jose
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
