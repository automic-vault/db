id: brew:openiked
display-name: openiked
homepage: https://openiked.org
repo: https://cdn.openbsd.org/pub/OpenBSD/OpenIKED/openiked-7.4.tar.gz
docs: https://openiked.org
package-manager:
  brew: openiked
  debian: openiked
  dnf: openiked
  macports: openiked
  ubuntu: openiked
package-manager-url: https://formulae.brew.sh/formula/openiked
version: 7.4
license: ISC
category: network
tags:
  - cli
description: IKEv2 daemon - portable version of OpenBSD iked
source-archive: https://cdn.openbsd.org/pub/OpenBSD/OpenIKED/openiked-7.4.tar.gz
dependencies:
  - libevent
  - openssl@3
build-dependencies:
  - cmake
uses-from-macos:
  - bison
executables:
  - exposure: global executable
    kind: cli
    name: ikectl
  - exposure: global executable
    kind: cli
    name: iked
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    config file can be found here: $HOMEBREW_PREFIX/etc/iked.conf necessary files for
    configuration can be found here: $HOMEBREW_PREFIX/etc/iked/
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:openiked
  brew: brew install openiked
  debian: sudo apt install openiked
  dnf: sudo dnf install openiked
  macports: sudo port install openiked
  ubuntu: sudo apt install openiked
provenance:
  formula: openiked
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
