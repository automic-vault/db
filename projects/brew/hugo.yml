id: brew:hugo
display-name: hugo
homepage: https://gohugo.io/
repo: https://github.com/gohugoio/hugo
docs: https://gohugo.io/
package-manager:
  apk: hugo
  brew: hugo
  chocolatey: hugo
  debian: hugo
  dnf: hugo
  macports: hugo
  nix: hugo
  pacman: hugo
  scoop: main/hugo
  ubuntu: hugo
  winget: Hugo.Hugo
  zypper: hugo
package-manager-url: https://formulae.brew.sh/formula/hugo
version: 0.162.0
license: Apache-2.0
category: development
tags:
  - cli
description: Configurable static site generator
source-archive: https://github.com/gohugoio/hugo/archive/refs/tags/v0.162.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hugo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hugo
  av: sudo av install brew:hugo
  brew: brew install hugo
  chocolatey: choco install hugo
  debian: sudo apt install hugo
  dnf: sudo dnf install hugo
  macports: sudo port install hugo
  nix: nix profile install nixpkgs#hugo
  pacman: sudo pacman -S hugo
  scoop: scoop install main/hugo
  ubuntu: sudo apt install hugo
  winget: winget install --id Hugo.Hugo -e
  zypper: sudo zypper install hugo
provenance:
  formula: hugo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
