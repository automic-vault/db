id: brew:augustus
display-name: augustus
homepage: https://bioinf.uni-greifswald.de/augustus/
repo: https://github.com/Gaius-Augustus/Augustus
docs: https://bioinf.uni-greifswald.de/augustus/
package-manager:
  brew: augustus
  debian: augustus
  nix: augustus
  pacman: augustus
  ubuntu: augustus
package-manager-url: https://formulae.brew.sh/formula/augustus
version: 3.5.0
license: Artistic-1.0
category: development
tags:
  - cli
description: Predict genes in eukaryotic genomic sequences
source-archive: https://github.com/Gaius-Augustus/Augustus/archive/refs/tags/v3.5.0.tar.gz
dependencies:
  - bamtools
  - boost
  - htslib
executables:
  - exposure: global executable
    kind: cli
    name: aln2wig
  - exposure: global executable
    kind: cli
    name: augustus
  - exposure: global executable
    kind: cli
    name: bam2hints
  - exposure: global executable
    kind: cli
    name: bam2wig
  - exposure: global executable
    kind: cli
    name: compileSpliceCands
  - exposure: global executable
    kind: cli
    name: etraining
  - exposure: global executable
    kind: cli
    name: fastBlockSearch
  - exposure: global executable
    kind: cli
    name: filterBam
  - exposure: global executable
    kind: cli
    name: homGeneMapping
  - exposure: global executable
    kind: cli
    name: joingenes
  - exposure: global executable
    kind: cli
    name: pp_simScore
  - exposure: global executable
    kind: cli
    name: prepareAlign
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:augustus
  brew: brew install augustus
  debian: sudo apt install augustus
  nix: nix profile install nixpkgs#augustus
  pacman: sudo pacman -S augustus
  ubuntu: sudo apt install augustus
provenance:
  formula: augustus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
