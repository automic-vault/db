id: brew:lsd
display-name: lsd
homepage: https://github.com/lsd-rs/lsd
repo: https://github.com/lsd-rs/lsd
docs: https://github.com/lsd-rs/lsd
package-manager:
  apk: lsd
  brew: lsd
  debian: lsd
  dnf: lsd
  macports: lsd
  nix: lsd
  pacman: lsd
  scoop: main/lsd
  ubuntu: lsd
  winget: lsd-rs.lsd
  zypper: lsd
package-manager-url: https://formulae.brew.sh/formula/lsd
version: 1.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: Clone of ls with colorful output, file type icons, and more
source-archive: https://github.com/lsd-rs/lsd/archive/refs/tags/v1.2.0.tar.gz
build-dependencies:
  - pandoc
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: lsd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lsd
  av: sudo av install brew:lsd
  brew: brew install lsd
  debian: sudo apt install lsd
  dnf: sudo dnf install lsd
  macports: sudo port install lsd
  nix: nix profile install nixpkgs#lsd
  pacman: sudo pacman -S lsd
  scoop: scoop install main/lsd
  ubuntu: sudo apt install lsd
  winget: winget install --id lsd-rs.lsd -e
  zypper: sudo zypper install lsd
provenance:
  formula: lsd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
