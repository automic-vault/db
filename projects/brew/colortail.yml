id: brew:colortail
display-name: colortail
homepage: https://github.com/joakim666/colortail
repo: https://github.com/joakim666/colortail
docs: https://github.com/joakim666/colortail
package-manager:
  brew: colortail
  debian: colortail
  ubuntu: colortail
package-manager-url: https://formulae.brew.sh/formula/colortail
version: 0.3.5
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Like tail(1), but with various colors for specified output
source-archive: https://github.com/joakim666/colortail/releases/download/0.3.5/colortail-0.3.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: colortail
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:colortail
  brew: brew install colortail
  debian: sudo apt install colortail
  ubuntu: sudo apt install colortail
provenance:
  formula: colortail
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
