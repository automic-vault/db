id: brew:jpegoptim
display-name: jpegoptim
homepage: https://github.com/tjko/jpegoptim
repo: https://github.com/tjko/jpegoptim
docs: https://github.com/tjko/jpegoptim
package-manager:
  apk: jpegoptim
  brew: jpegoptim
  debian: jpegoptim
  dnf: jpegoptim
  macports: jpegoptim
  nix: jpegoptim
  pacman: jpegoptim
  scoop: main/jpegoptim
  ubuntu: jpegoptim
  winget: TimoKokkonen.Jpegoptim
  zypper: jpegoptim
package-manager-url: https://formulae.brew.sh/formula/jpegoptim
version: 1.5.6
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Utility to optimize JPEG files
source-archive: https://github.com/tjko/jpegoptim/archive/refs/tags/v1.5.6.tar.gz
dependencies:
  - jpeg-turbo
executables:
  - exposure: global executable
    kind: cli
    name: jpegoptim
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jpegoptim
  av: sudo av install brew:jpegoptim
  brew: brew install jpegoptim
  debian: sudo apt install jpegoptim
  dnf: sudo dnf install jpegoptim
  macports: sudo port install jpegoptim
  nix: nix profile install nixpkgs#jpegoptim
  pacman: sudo pacman -S jpegoptim
  scoop: scoop install main/jpegoptim
  ubuntu: sudo apt install jpegoptim
  winget: winget install --id TimoKokkonen.Jpegoptim -e
  zypper: sudo zypper install jpegoptim
provenance:
  formula: jpegoptim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
