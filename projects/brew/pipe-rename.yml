id: brew:pipe-rename
display-name: pipe-rename
homepage: https://github.com/marcusbuffett/pipe-rename
repo: https://github.com/marcusbuffett/pipe-rename
docs: https://github.com/marcusbuffett/pipe-rename
package-manager:
  brew: pipe-rename
  chocolatey: renamer
  nix: pipe-rename
  pacman: pipe-rename
  scoop: extras/renamer
  winget: mtimkovich.pipe-rename
package-manager-url: https://formulae.brew.sh/formula/pipe-rename
version: 1.6.7
license: MIT
category: development
tags:
  - cli
description: Rename your files using your favorite text editor
source-archive: https://github.com/marcusbuffett/pipe-rename/archive/refs/tags/1.6.7.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: renamer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pipe-rename
  brew: brew install pipe-rename
  chocolatey: choco install renamer
  nix: nix profile install nixpkgs#pipe-rename
  pacman: sudo pacman -S pipe-rename
  scoop: scoop install extras/renamer
  winget: winget install --id mtimkovich.pipe-rename -e
provenance:
  formula: pipe-rename
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
