id: brew:libtiff
display-name: libtiff
homepage: https://libtiff.gitlab.io/libtiff/
repo: https://download.osgeo.org/libtiff/tiff-4.7.1.tar.gz
docs: https://libtiff.gitlab.io/libtiff/
package-manager:
  brew: libtiff
  dnf: libtiff
  nix: libtiff
  pacman: libtiff
package-manager-url: https://formulae.brew.sh/formula/libtiff
version: 4.7.1
license: libtiff
category: development
tags:
  - cli
description: TIFF library and utilities
source-archive: https://download.osgeo.org/libtiff/tiff-4.7.1.tar.gz
dependencies:
  - jpeg-turbo
  - xz
  - zstd
executables:
  - exposure: global executable
    kind: cli
    name: fax2ps
  - exposure: global executable
    kind: cli
    name: fax2tiff
  - exposure: global executable
    kind: cli
    name: pal2rgb
  - exposure: global executable
    kind: cli
    name: ppm2tiff
  - exposure: global executable
    kind: cli
    name: raw2tiff
  - exposure: global executable
    kind: cli
    name: tiff2bw
  - exposure: global executable
    kind: cli
    name: tiff2pdf
  - exposure: global executable
    kind: cli
    name: tiff2ps
  - exposure: global executable
    kind: cli
    name: tiff2rgba
  - exposure: global executable
    kind: cli
    name: tiffcmp
  - exposure: global executable
    kind: cli
    name: tiffcp
  - exposure: global executable
    kind: cli
    name: tiffcrop
  - exposure: global executable
    kind: cli
    name: tiffdither
  - exposure: global executable
    kind: cli
    name: tiffdump
  - exposure: global executable
    kind: cli
    name: tiffinfo
  - exposure: global executable
    kind: cli
    name: tiffmedian
  - exposure: global executable
    kind: cli
    name: tiffset
  - exposure: global executable
    kind: cli
    name: tiffsplit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libtiff
  brew: brew install libtiff
  dnf: sudo dnf install libtiff
  nix: nix profile install nixpkgs#libtiff
  pacman: sudo pacman -S libtiff
provenance:
  formula: libtiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
