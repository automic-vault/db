id: brew:freedink
display-name: freedink
homepage: https://www.gnu.org/software/freedink/
repo: https://ftpmirror.gnu.org/gnu/freedink/freedink-109.6.tar.gz
docs: https://www.gnu.org/software/freedink/
package-manager:
  brew: freedink
  debian: freedink
  dnf: freedink
  macports: freedink
  nix: freedink
  ubuntu: freedink
  winget: Pranav435.Dink
package-manager-url: https://formulae.brew.sh/formula/freedink
version: 109.6
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Portable version of the Dink Smallwood game engine
source-archive: https://ftpmirror.gnu.org/gnu/freedink/freedink-109.6.tar.gz
dependencies:
  - fontconfig
  - gettext
  - sdl2
  - sdl2_gfx
  - sdl2_image
  - sdl2_mixer
  - sdl2_ttf
build-dependencies:
  - glm
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dink
  - exposure: global executable
    kind: cli
    name: dinkedit
  - exposure: global executable
    kind: cli
    name: freedink
  - exposure: global executable
    kind: cli
    name: freedinkedit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:freedink
  brew: brew install freedink
  debian: sudo apt install freedink
  dnf: sudo dnf install freedink
  macports: sudo port install freedink
  nix: nix profile install nixpkgs#freedink
  ubuntu: sudo apt install freedink
  winget: winget install --id Pranav435.Dink -e
provenance:
  formula: freedink
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
