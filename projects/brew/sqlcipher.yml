id: brew:sqlcipher
display-name: sqlcipher
homepage: https://www.zetetic.net/sqlcipher/
repo: https://github.com/sqlcipher/sqlcipher
docs: https://www.zetetic.net/sqlcipher/
package-manager:
  apk: sqlcipher
  brew: sqlcipher
  debian: sqlcipher
  dnf: sqlcipher
  macports: sqlcipher
  nix: sqlcipher
  pacman: sqlcipher
  ubuntu: sqlcipher
  zypper: sqlcipher
package-manager-url: https://formulae.brew.sh/formula/sqlcipher
version: 4.16.0
license: BSD-3-Clause AND blessing
category: database
tags:
  - cli
description: SQLite extension providing 256-bit AES encryption
source-archive: https://github.com/sqlcipher/sqlcipher/archive/refs/tags/v4.16.0.tar.gz
dependencies:
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: sqlcipher
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sqlcipher
  av: sudo av install brew:sqlcipher
  brew: brew install sqlcipher
  debian: sudo apt install sqlcipher
  dnf: sudo dnf install sqlcipher
  macports: sudo port install sqlcipher
  nix: nix profile install nixpkgs#sqlcipher
  pacman: sudo pacman -S sqlcipher
  ubuntu: sudo apt install sqlcipher
  zypper: sudo zypper install sqlcipher
provenance:
  formula: sqlcipher
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
