id: brew:tml
display-name: tml
homepage: https://github.com/liamg/tml
repo: https://github.com/liamg/tml
docs: https://github.com/liamg/tml
package-manager:
  brew: tml
  debian: tml
  nix: tml
  ubuntu: tml
package-manager-url: https://formulae.brew.sh/formula/tml
version: 0.7.1
license: Unlicense
category: development
tags:
  - cli
description: Tiny markup language for terminal output
source-archive: https://github.com/liamg/tml/archive/refs/tags/v0.7.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tml
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tml
  brew: brew install tml
  debian: sudo apt install tml
  nix: nix profile install nixpkgs#tml
  ubuntu: sudo apt install tml
provenance:
  formula: tml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
