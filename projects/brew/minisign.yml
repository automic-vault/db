id: brew:minisign
display-name: minisign
homepage: https://jedisct1.github.io/minisign/
repo: https://github.com/jedisct1/minisign
docs: https://jedisct1.github.io/minisign/
package-manager:
  apk: minisign
  brew: minisign
  debian: minisign
  dnf: minisign
  macports: minisign
  nix: minisign
  pacman: minisign
  scoop: main/minisign
  ubuntu: minisign
  winget: jedisct1.minisign
  zypper: minisign
package-manager-url: https://formulae.brew.sh/formula/minisign
version: 0.12
license: ISC
category: development
tags:
  - cli
description: Sign files & verify signatures. Works with signify in OpenBSD
source-archive: https://github.com/jedisct1/minisign/archive/refs/tags/0.12.tar.gz
dependencies:
  - libsodium
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: minisign
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add minisign
  av: sudo av install brew:minisign
  brew: brew install minisign
  debian: sudo apt install minisign
  dnf: sudo dnf install minisign
  macports: sudo port install minisign
  nix: nix profile install nixpkgs#minisign
  pacman: sudo pacman -S minisign
  scoop: scoop install main/minisign
  ubuntu: sudo apt install minisign
  winget: winget install --id jedisct1.minisign -e
  zypper: sudo zypper install minisign
provenance:
  formula: minisign
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
