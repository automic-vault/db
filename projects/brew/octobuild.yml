id: brew:octobuild
display-name: octobuild
homepage: https://github.com/octobuild/octobuild
repo: https://github.com/octobuild/octobuild
docs: https://github.com/octobuild/octobuild
package-manager:
  brew: octobuild
  winget: octobuild.octobuild
package-manager-url: https://formulae.brew.sh/formula/octobuild
version: 1.8.1
license: MIT
category: development
tags:
  - cli
description: Compiler cache for Unreal Engine
source-archive: https://github.com/octobuild/octobuild/archive/refs/tags/1.8.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ib_console
  - exposure: global executable
    kind: cli
    name: octo_agent
  - exposure: global executable
    kind: cli
    name: octo_builder
  - exposure: global executable
    kind: cli
    name: octo_cl
  - exposure: global executable
    kind: cli
    name: octo_clang
  - exposure: global executable
    kind: cli
    name: octo_coordinator
  - exposure: global executable
    kind: cli
    name: xgConsole
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:octobuild
  brew: brew install octobuild
  winget: winget install --id octobuild.octobuild -e
provenance:
  formula: octobuild
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
