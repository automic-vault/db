id: brew:actions-batch
display-name: actions-batch
homepage: https://github.com/alexellis/actions-batch
repo: https://github.com/alexellis/actions-batch
docs: https://github.com/alexellis/actions-batch
package-manager:
  brew: actions-batch
package-manager-url: https://formulae.brew.sh/formula/actions-batch
version: 0.0.3
license: MIT
category: development
tags:
  - cli
description: Time-sharing supercomputer built on GitHub Actions
source-archive: https://github.com/alexellis/actions-batch/archive/refs/tags/v0.0.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: actions-batch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:actions-batch
  brew: brew install actions-batch
provenance:
  formula: actions-batch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
