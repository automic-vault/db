id: brew:pdf-diff
display-name: pdf-diff
homepage: https://github.com/serhack/pdf-diff
repo: https://github.com/serhack/pdf-diff
docs: https://github.com/serhack/pdf-diff
package-manager:
  brew: pdf-diff
package-manager-url: https://formulae.brew.sh/formula/pdf-diff
version: 0.0.1
license: MIT
category: development
tags:
  - cli
description: Tool for visualizing differences between two pdf files
source-archive: https://github.com/serhack/pdf-diff/archive/refs/tags/v0.0.1.tar.gz
dependencies:
  - poppler
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pdf-diff
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pdf-diff
  brew: brew install pdf-diff
provenance:
  formula: pdf-diff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
