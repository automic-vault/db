id: brew:gollama
display-name: gollama
homepage: https://smcleod.net
repo: https://github.com/sammcj/gollama
docs: https://smcleod.net
package-manager:
  brew: gollama
  nix: gollama
package-manager-url: https://formulae.brew.sh/formula/gollama
version: 2.0.4
license: MIT
category: development
tags:
  - cli
description: Go manage your Ollama models
source-archive: https://github.com/sammcj/gollama/archive/refs/tags/v2.0.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gollama
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gollama
  brew: brew install gollama
  nix: nix profile install nixpkgs#gollama
provenance:
  formula: gollama
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
