install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mole
  brew: brew install mole
  macports: sudo port install mole
  nix: nix profile install nixpkgs#mole
provenance:
  formula: mole
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
