id: brew:mole
display-name: mole
homepage: https://github.com/tw93/Mole
repo: https://github.com/tw93/Mole
docs: https://github.com/tw93/Mole
package-manager:
  brew: mole
  macports: mole
  nix: mole
package-manager-url: https://formulae.brew.sh/formula/mole
version: 1.39.1
license: MIT
category: development
tags:
  - cli
description: Deep clean and optimize your Mac
source-archive: https://github.com/tw93/Mole/archive/refs/tags/V1.39.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mo
  - exposure: global executable
    kind: cli
    name: mole
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
