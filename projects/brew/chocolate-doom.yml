id: brew:chocolate-doom
display-name: chocolate-doom
homepage: https://www.chocolate-doom.org/
repo: https://github.com/chocolate-doom/chocolate-doom
docs: https://www.chocolate-doom.org/
package-manager:
  apk: chocolate-doom
  brew: chocolate-doom
  debian: chocolate-doom
  dnf: chocolate-doom
  nix: chocolate-doom
  ubuntu: chocolate-doom
  zypper: chocolate-doom
package-manager-url: https://formulae.brew.sh/formula/chocolate-doom
version: 3.1.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Accurate source port of Doom
source-archive: >
  https://github.com/chocolate-doom/chocolate-doom/archive/refs/tags/chocolate-doom-3.1.1.tar.gz
dependencies:
  - fluid-synth
  - libpng
  - libsamplerate
  - sdl2
  - sdl2_mixer
  - sdl2_net
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: chocolate-doom
  - exposure: global executable
    kind: cli
    name: chocolate-doom-setup
  - exposure: global executable
    kind: cli
    name: chocolate-heretic
  - exposure: global executable
    kind: cli
    name: chocolate-heretic-setup
  - exposure: global executable
    kind: cli
    name: chocolate-hexen
  - exposure: global executable
    kind: cli
    name: chocolate-hexen-setup
  - exposure: global executable
    kind: cli
    name: chocolate-server
  - exposure: global executable
    kind: cli
    name: chocolate-strife
  - exposure: global executable
    kind: cli
    name: chocolate-strife-setup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Note that this formula only installs a Doom game engine, and no actual levels. The
    original Doom levels are still under copyright, so you can copy them over and play
    them if you already own them. Otherwise, there are tons of free levels available
    online. Try starting here: https://www.chocolate-doom.org/
  post-install-defined: false
install-lines:
  apk: sudo apk add chocolate-doom
  av: sudo av install brew:chocolate-doom
  brew: brew install chocolate-doom
  debian: sudo apt install chocolate-doom
  dnf: sudo dnf install chocolate-doom
  nix: nix profile install nixpkgs#chocolate-doom
  ubuntu: sudo apt install chocolate-doom
  zypper: sudo zypper install chocolate-doom
provenance:
  formula: chocolate-doom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
