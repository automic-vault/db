id: brew:flif
display-name: flif
homepage: https://flif.info/
repo: https://github.com/FLIF-hub/FLIF
docs: https://flif.info/
package-manager:
  brew: flif
package-manager-url: https://formulae.brew.sh/formula/flif
version: 0.4
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Free Loseless Image Format
source-archive: https://github.com/FLIF-hub/FLIF/archive/refs/tags/v0.4.tar.gz
dependencies:
  - libpng
  - sdl2
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: apng2flif
  - exposure: global executable
    kind: cli
    name: dflif
  - exposure: global executable
    kind: cli
    name: flif
  - exposure: global executable
    kind: cli
    name: gif2flif
  - exposure: global executable
    kind: cli
    name: viewflif
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flif
  brew: brew install flif
provenance:
  formula: flif
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
