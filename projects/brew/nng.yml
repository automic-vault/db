id: brew:nng
display-name: nng
homepage: https://nng.nanomsg.org/
repo: https://github.com/nanomsg/nng
docs: https://nng.nanomsg.org/
package-manager:
  apk: nng
  brew: nng
  dnf: nng
  macports: nng
  nix: nng
  pacman: nng
package-manager-url: https://formulae.brew.sh/formula/nng
version: 1.11
license: MIT
category: development
tags:
  - cli
description: Nanomsg-next-generation -- light-weight brokerless messaging
source-archive: https://github.com/nanomsg/nng/archive/refs/tags/v1.11.tar.gz
build-dependencies:
  - asciidoctor
  - cmake
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: nngcat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nng
  av: sudo av install brew:nng
  brew: brew install nng
  dnf: sudo dnf install nng
  macports: sudo port install nng
  nix: nix profile install nixpkgs#nng
  pacman: sudo pacman -S nng
provenance:
  formula: nng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
