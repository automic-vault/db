id: brew:semver
display-name: semver
homepage: https://github.com/npm/node-semver
repo: https://github.com/npm/node-semver
docs: https://github.com/npm/node-semver
package-manager:
  brew: semver
  nix: semver
  pacman: semver
package-manager-url: https://formulae.brew.sh/formula/semver
version: 7.8.1
license: ISC
category: development
tags:
  - cli
description: Semantic version parser for node (the one npm uses)
source-archive: https://github.com/npm/node-semver/archive/refs/tags/v7.8.1.tar.gz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: semver
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:semver
  brew: brew install semver
  nix: nix profile install nixpkgs#semver
  pacman: sudo pacman -S semver
provenance:
  formula: semver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
