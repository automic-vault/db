id: brew:mosh
display-name: mosh
homepage: https://mosh.org
repo: https://github.com/mobile-shell/mosh
docs: https://mosh.org
package-manager:
  apk: mosh
  brew: mosh
  debian: mosh
  dnf: mosh
  macports: mosh
  nix: mosh
  pacman: mosh
  scoop: main/mosh-client
  ubuntu: mosh
  zypper: mosh
package-manager-url: https://formulae.brew.sh/formula/mosh
version: 1.4.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Remote terminal application
source-archive: https://github.com/mobile-shell/mosh/releases/download/mosh-1.4.0/mosh-1.4.0.tar.gz
dependencies:
  - protobuf
build-dependencies:
  - pkgconf
  - tmux
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: mosh
  - exposure: global executable
    kind: cli
    name: mosh-client
  - exposure: global executable
    kind: cli
    name: mosh-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mosh
  av: sudo av install brew:mosh
  brew: brew install mosh
  debian: sudo apt install mosh
  dnf: sudo dnf install mosh
  macports: sudo port install mosh
  nix: nix profile install nixpkgs#mosh
  pacman: sudo pacman -S mosh
  scoop: scoop install main/mosh-client
  ubuntu: sudo apt install mosh
  zypper: sudo zypper install mosh
provenance:
  formula: mosh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
