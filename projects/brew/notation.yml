id: brew:notation
display-name: notation
homepage: https://notaryproject.dev/
repo: https://github.com/notaryproject/notation
docs: https://notaryproject.dev/
package-manager:
  brew: notation
  nix: notation
  winget: NotaryProject.Notation
package-manager-url: https://formulae.brew.sh/formula/notation
version: 1.3.2
license: Apache-2.0
category: development
tags:
  - cli
description: CLI tool to sign and verify OCI artifacts and container images
source-archive: https://github.com/notaryproject/notation/archive/refs/tags/v1.3.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: notation
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:notation
  brew: brew install notation
  nix: nix profile install nixpkgs#notation
  winget: winget install --id NotaryProject.Notation -e
provenance:
  formula: notation
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
