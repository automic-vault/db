id: brew:immich-go
display-name: immich-go
homepage: https://github.com/simulot/immich-go
repo: https://github.com/simulot/immich-go
docs: https://github.com/simulot/immich-go
package-manager:
  brew: immich-go
  nix: immich-go
  pacman: immich-go
  winget: simulot.immich-go
package-manager-url: https://formulae.brew.sh/formula/immich-go
version: 0.31.0
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Alternative to the official immich-CLI command written in Go
source-archive: https://github.com/simulot/immich-go/archive/refs/tags/v0.31.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: immich-go
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:immich-go
  brew: brew install immich-go
  nix: nix profile install nixpkgs#immich-go
  pacman: sudo pacman -S immich-go
  winget: winget install --id simulot.immich-go -e
provenance:
  formula: immich-go
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
