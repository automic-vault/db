id: brew:unixodbc
display-name: unixodbc
homepage: https://www.unixodbc.org/
repo: https://www.unixodbc.org/unixODBC-2.3.14.tar.gz
docs: https://www.unixodbc.org/
package-manager:
  apk: unixodbc
  brew: unixodbc
  debian: unixodbc
  dnf: unixODBC
  macports: unixODBC
  nix: unixodbc
  pacman: unixodbc
  ubuntu: unixodbc
  zypper: unixODBC
package-manager-url: https://formulae.brew.sh/formula/unixodbc
version: 2.3.14
license: LGPL-2.1-or-later AND GPL-2.0-or-later
category: network
tags:
  - cli
description: ODBC 3 connectivity for UNIX
source-archive: https://www.unixodbc.org/unixODBC-2.3.14.tar.gz
dependencies:
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: dltest
  - exposure: global executable
    kind: cli
    name: isql
  - exposure: global executable
    kind: cli
    name: iusql
  - exposure: global executable
    kind: cli
    name: odbc_config
  - exposure: global executable
    kind: cli
    name: odbcinst
  - exposure: global executable
    kind: cli
    name: slencheck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add unixodbc
  av: sudo av install brew:unixodbc
  brew: brew install unixodbc
  debian: sudo apt install unixodbc
  dnf: sudo dnf install unixODBC
  macports: sudo port install unixODBC
  nix: nix profile install nixpkgs#unixodbc
  pacman: sudo pacman -S unixodbc
  ubuntu: sudo apt install unixodbc
  zypper: sudo zypper install unixODBC
provenance:
  formula: unixodbc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
