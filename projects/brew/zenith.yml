id: brew:zenith
display-name: zenith
homepage: https://github.com/bvaisvil/zenith/
repo: https://github.com/bvaisvil/zenith
docs: https://github.com/bvaisvil/zenith/
package-manager:
  apk: zenith
  brew: zenith
  macports: zenith
  nix: zenith
  pacman: zenith
  winget: MakotoArai.Zenith
  zypper: zenith
package-manager-url: https://formulae.brew.sh/formula/zenith
version: 0.15.0
license: MIT
category: development
tags:
  - cli
description: In terminal graphical metrics for your *nix system
source-archive: https://github.com/bvaisvil/zenith/archive/refs/tags/0.15.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: zenith
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zenith
  av: sudo av install brew:zenith
  brew: brew install zenith
  macports: sudo port install zenith
  nix: nix profile install nixpkgs#zenith
  pacman: sudo pacman -S zenith
  winget: winget install --id MakotoArai.Zenith -e
  zypper: sudo zypper install zenith
provenance:
  formula: zenith
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
