id: brew:autoconf
display-name: autoconf
homepage: https://www.gnu.org/software/autoconf/
repo: https://ftpmirror.gnu.org/gnu/autoconf/autoconf-2.73.tar.gz
docs: https://www.gnu.org/software/autoconf/
package-manager:
  apk: autoconf
  brew: autoconf
  debian: autoconf
  dnf: autoconf
  macports: autoconf
  nix: autoconf
  pacman: autoconf
  ubuntu: autoconf
  zypper: autoconf
package-manager-url: https://formulae.brew.sh/formula/autoconf
version: 2.73
license: GPL-3.0-or-later AND (GPL-3.0-or-later WITH Autoconf-exception-3.0)
category: development
tags:
  - cli
description: Automatic configure script builder
source-archive: https://ftpmirror.gnu.org/gnu/autoconf/autoconf-2.73.tar.gz
dependencies:
  - m4
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: autoconf
  - exposure: global executable
    kind: cli
    name: autoheader
  - exposure: global executable
    kind: cli
    name: autom4te
  - exposure: global executable
    kind: cli
    name: autoreconf
  - exposure: global executable
    kind: cli
    name: autoscan
  - exposure: global executable
    kind: cli
    name: autoupdate
  - exposure: global executable
    kind: cli
    name: ifnames
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add autoconf
  av: sudo av install brew:autoconf
  brew: brew install autoconf
  debian: sudo apt install autoconf
  dnf: sudo dnf install autoconf
  macports: sudo port install autoconf
  nix: nix profile install nixpkgs#autoconf
  pacman: sudo pacman -S autoconf
  ubuntu: sudo apt install autoconf
  zypper: sudo zypper install autoconf
provenance:
  formula: autoconf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
