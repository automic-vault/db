id: brew:netcat
display-name: netcat
homepage: https://netcat.sourceforge.net/
repo: https://downloads.sourceforge.net/project/netcat/netcat/0.7.1/netcat-0.7.1.tar.bz2
docs: https://netcat.sourceforge.net/
package-manager:
  brew: netcat
  dnf: netcat
  nix: netcat
  scoop: main/netcat
package-manager-url: https://formulae.brew.sh/formula/netcat
version: 0.7.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Utility for managing network connections
source-archive: https://downloads.sourceforge.net/project/netcat/netcat/0.7.1/netcat-0.7.1.tar.bz2
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: nc
  - exposure: global executable
    kind: cli
    name: netcat
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:netcat
  brew: brew install netcat
  dnf: sudo dnf install netcat
  nix: nix profile install nixpkgs#netcat
  scoop: scoop install main/netcat
provenance:
  formula: netcat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
