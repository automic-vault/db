id: brew:pandocomatic
display-name: pandocomatic
homepage: https://heerdebeer.org/Software/markdown/pandocomatic/
repo: https://github.com/htdebeer/pandocomatic
docs: https://heerdebeer.org/Software/markdown/pandocomatic/
package-manager:
  brew: pandocomatic
package-manager-url: https://formulae.brew.sh/formula/pandocomatic
version: 2.2.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Automate the use of pandoc
source-archive: https://github.com/htdebeer/pandocomatic/archive/refs/tags/2.2.0.tar.gz
dependencies:
  - libyaml
  - pandoc
  - ruby@3.4
executables:
  - exposure: global executable
    kind: cli
    name: pandocomatic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pandocomatic
  brew: brew install pandocomatic
provenance:
  formula: pandocomatic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
