id: brew:gpa
display-name: gpa
homepage: https://www.gnupg.org/related_software/gpa/
repo: https://gnupg.org/ftp/gcrypt/gpa/gpa-0.11.1.tar.bz2
docs: https://www.gnupg.org/related_software/gpa/
package-manager:
  brew: gpa
  nix: gpa
  ubuntu: gpa
  zypper: gpa
package-manager-url: https://formulae.brew.sh/formula/gpa
version: 0.11.1
license: GPL-3.0-or-later
category: security
tags:
  - cli
description: Graphical user interface for the GnuPG
source-archive: https://gnupg.org/ftp/gcrypt/gpa/gpa-0.11.1.tar.bz2
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gpgme
  - gtk+3
  - harfbuzz
  - libassuan
  - libgpg-error
  - pango
build-dependencies:
  - desktop-file-utils
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gpa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gpa
  brew: brew install gpa
  nix: nix profile install nixpkgs#gpa
  ubuntu: sudo apt install gpa
  zypper: sudo zypper install gpa
provenance:
  formula: gpa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
