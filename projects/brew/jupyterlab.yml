id: brew:jupyterlab
display-name: jupyterlab
homepage: https://jupyter.org/
repo: >
  https://files.pythonhosted.org/packages/2b/22/8440ec827762146e7cdecf04335bd348795899d29dc6ae82238707353a2c/jupyterlab-4.5.7.tar.gz
docs: https://jupyter.org/
package-manager:
  apk: jupyterlab
  brew: jupyterlab
  debian: jupyterlab
  dnf: jupyterlab
  nix: jupyter
  pacman: jupyterlab
  ubuntu: jupyter
  winget: ProjectJupyter.JupyterLab
  zypper: jupyter-nbconvert
package-manager-url: https://formulae.brew.sh/formula/jupyterlab
version: 4.5.7
license: BSD-3-Clause AND MIT
category: network
tags:
  - cli
description: Interactive environments for writing and running code
source-archive: >
  https://files.pythonhosted.org/packages/2b/22/8440ec827762146e7cdecf04335bd348795899d29dc6ae82238707353a2c/jupyterlab-4.5.7.tar.gz
dependencies:
  - certifi
  - cffi
  - libyaml
  - node
  - pandoc
  - python@3.14
  - rpds-py
  - zeromq
build-dependencies:
  - cmake
  - ninja
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: jlpm
  - exposure: global executable
    kind: cli
    name: jupyter
  - exposure: global executable
    kind: cli
    name: jupyter-console
  - exposure: global executable
    kind: cli
    name: jupyter-dejavu
  - exposure: global executable
    kind: cli
    name: jupyter-events
  - exposure: global executable
    kind: cli
    name: jupyter-execute
  - exposure: global executable
    kind: cli
    name: jupyter-kernel
  - exposure: global executable
    kind: cli
    name: jupyter-kernelspec
  - exposure: global executable
    kind: cli
    name: jupyter-lab
  - exposure: global executable
    kind: cli
    name: jupyter-labextension
  - exposure: global executable
    kind: cli
    name: jupyter-labhub
  - exposure: global executable
    kind: cli
    name: jupyter-migrate
  - exposure: global executable
    kind: cli
    name: jupyter-nbconvert
  - exposure: global executable
    kind: cli
    name: jupyter-run
  - exposure: global executable
    kind: cli
    name: jupyter-server
  - exposure: global executable
    kind: cli
    name: jupyter-troubleshoot
  - exposure: global executable
    kind: cli
    name: jupyter-trust
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Additional kernels can be installed into the shared jupyter directory
    $HOMEBREW_PREFIX/etc/jupyter
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add jupyterlab
  av: sudo av install brew:jupyterlab
  brew: brew install jupyterlab
  debian: sudo apt install jupyterlab
  dnf: sudo dnf install jupyterlab
  nix: nix profile install nixpkgs#jupyter
  pacman: sudo pacman -S jupyterlab
  ubuntu: sudo apt install jupyter
  winget: winget install --id ProjectJupyter.JupyterLab -e
  zypper: sudo zypper install jupyter-nbconvert
provenance:
  formula: jupyterlab
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
