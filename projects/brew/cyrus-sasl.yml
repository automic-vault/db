id: brew:cyrus-sasl
display-name: cyrus-sasl
homepage: https://www.cyrusimap.org/sasl/
repo: https://github.com/cyrusimap/cyrus-sasl
docs: https://www.cyrusimap.org/sasl/
package-manager:
  apk: cyrus-sasl
  brew: cyrus-sasl
  dnf: cyrus-sasl
  nix: cyrus_sasl
  pacman: cyrus-sasl
  zypper: cyrus-sasl
package-manager-url: https://formulae.brew.sh/formula/cyrus-sasl
version: 2.1.28
license: BSD-3-Clause-Attribution
category: security
tags:
  - cli
  - security
description: Simple Authentication and Security Layer
source-archive: >
  https://github.com/cyrusimap/cyrus-sasl/releases/download/cyrus-sasl-2.1.28/cyrus-sasl-2.1.28.tar.gz
dependencies:
  - krb5
  - openssl@3
uses-from-macos:
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: pluginviewer
  - exposure: global executable
    kind: cli
    name: saslauthd
  - exposure: global executable
    kind: cli
    name: sasldblistusers2
  - exposure: global executable
    kind: cli
    name: saslpasswd2
  - exposure: global executable
    kind: cli
    name: testsaslauthd
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cyrus-sasl
  av: sudo av install brew:cyrus-sasl
  brew: brew install cyrus-sasl
  dnf: sudo dnf install cyrus-sasl
  nix: nix profile install nixpkgs#cyrus_sasl
  pacman: sudo pacman -S cyrus-sasl
  zypper: sudo zypper install cyrus-sasl
provenance:
  formula: cyrus-sasl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
