id: brew:socat
display-name: socat
homepage: http://www.dest-unreach.org/socat/
repo: https://distfiles.alpinelinux.org/distfiles/edge/socat-1.8.1.1.tar.gz
docs: http://www.dest-unreach.org/socat/
package-manager:
  apk: socat
  brew: socat
  debian: socat
  dnf: socat
  macports: socat
  nix: socat
  pacman: socat
  ubuntu: socat
  zypper: socat
package-manager-url: https://formulae.brew.sh/formula/socat
version: 1.8.1.1
license: GPL-2.0-only
category: network
tags:
  - cli
description: 'SOcket CAT: netcat on steroids'
source-archive: https://distfiles.alpinelinux.org/distfiles/edge/socat-1.8.1.1.tar.gz
dependencies:
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: filan
  - exposure: global executable
    kind: cli
    name: procan
  - exposure: global executable
    kind: cli
    name: socat
  - exposure: global executable
    kind: cli
    name: socat-broker.sh
  - exposure: global executable
    kind: cli
    name: socat-chain.sh
  - exposure: global executable
    kind: cli
    name: socat-mux.sh
  - exposure: global executable
    kind: cli
    name: socat1
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add socat
  av: sudo av install brew:socat
  brew: brew install socat
  debian: sudo apt install socat
  dnf: sudo dnf install socat
  macports: sudo port install socat
  nix: nix profile install nixpkgs#socat
  pacman: sudo pacman -S socat
  ubuntu: sudo apt install socat
  zypper: sudo zypper install socat
provenance:
  formula: socat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
