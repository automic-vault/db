id: brew:prips
display-name: prips
homepage: https://devel.ringlet.net/sysutils/prips/
repo: https://devel.ringlet.net/files/sys/prips/prips-1.3.1.tar.xz
docs: https://devel.ringlet.net/sysutils/prips/
package-manager:
  brew: prips
  debian: prips
  macports: prips
  ubuntu: prips
package-manager-url: https://formulae.brew.sh/formula/prips
version: 1.3.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Print the IP addresses in a given range
source-archive: https://devel.ringlet.net/files/sys/prips/prips-1.3.1.tar.xz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: prips
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:prips
  brew: brew install prips
  debian: sudo apt install prips
  macports: sudo port install prips
  ubuntu: sudo apt install prips
provenance:
  formula: prips
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
