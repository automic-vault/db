id: brew:prefixsuffix
display-name: prefixsuffix
homepage: https://github.com/murraycu/prefixsuffix
repo: https://download.gnome.org/sources/prefixsuffix/0.6/prefixsuffix-0.6.9.tar.xz
docs: https://github.com/murraycu/prefixsuffix
package-manager:
  brew: prefixsuffix
package-manager-url: https://formulae.brew.sh/formula/prefixsuffix
version: 0.6.9
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: GUI batch renaming utility
source-archive: https://download.gnome.org/sources/prefixsuffix/0.6/prefixsuffix-0.6.9.tar.xz
dependencies:
  - at-spi2-core
  - atkmm@2.28
  - cairo
  - cairomm@1.14
  - gdk-pixbuf
  - gettext
  - glib
  - glibmm@2.66
  - gtk+3
  - gtkmm3
  - harfbuzz
  - libsigc++@2
  - pango
  - pangomm@2.46
build-dependencies:
  - gettext
  - intltool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: prefixsuffix
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:prefixsuffix
  brew: brew install prefixsuffix
provenance:
  formula: prefixsuffix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
