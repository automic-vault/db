id: brew:dockutil
display-name: dockutil
homepage: https://github.com/kcrawford/dockutil
repo: https://github.com/kcrawford/dockutil
docs: https://github.com/kcrawford/dockutil
package-manager:
  brew: dockutil
  nix: dockutil
package-manager-url: https://formulae.brew.sh/formula/dockutil
version: 3.1.3
license: Apache-2.0
category: development
tags:
  - cli
description: Tool for managing dock items
source-archive: https://github.com/kcrawford/dockutil/archive/refs/tags/3.1.3.tar.gz
uses-from-macos:
  - swift
executables:
  - exposure: global executable
    kind: cli
    name: dockutil
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dockutil
  brew: brew install dockutil
  nix: nix profile install nixpkgs#dockutil
provenance:
  formula: dockutil
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
