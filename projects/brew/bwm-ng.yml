id: brew:bwm-ng
display-name: bwm-ng
homepage: https://www.gropp.org/?id=projects&sub=bwm-ng
repo: https://github.com/vgropp/bwm-ng
docs: https://www.gropp.org/?id=projects&sub=bwm-ng
package-manager:
  apk: bwm-ng
  brew: bwm-ng
  debian: bwm-ng
  dnf: bwm-ng
  macports: bwm-ng
  nix: bwm_ng
  pacman: bwm-ng
  ubuntu: bwm-ng
  zypper: bwm-ng
package-manager-url: https://formulae.brew.sh/formula/bwm-ng
version: 0.6.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Console-based live network and disk I/O bandwidth monitor
source-archive: https://github.com/vgropp/bwm-ng/archive/refs/tags/v0.6.3.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: bwm-ng
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
