    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bwm-ng
  av: sudo av install brew:bwm-ng
  brew: brew install bwm-ng
  debian: sudo apt install bwm-ng
  dnf: sudo dnf install bwm-ng
  macports: sudo port install bwm-ng
  nix: nix profile install nixpkgs#bwm_ng
  pacman: sudo pacman -S bwm-ng
  ubuntu: sudo apt install bwm-ng
  zypper: sudo zypper install bwm-ng
provenance:
  formula: bwm-ng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
