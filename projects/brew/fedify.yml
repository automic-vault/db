id: brew:fedify
display-name: fedify
homepage: https://fedify.dev/cli
repo: https://github.com/fedify-dev/fedify
docs: https://fedify.dev/cli
package-manager:
  brew: fedify
  scoop: main/fedify
package-manager-url: https://formulae.brew.sh/formula/fedify
version: 2.2.3
license: MIT
category: development
tags:
  - cli
description: CLI toolchain for Fedify
source-archive: https://github.com/fedify-dev/fedify/archive/refs/tags/2.2.3.tar.gz
build-dependencies:
  - deno
executables:
  - exposure: global executable
    kind: cli
    name: fedify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:fedify
  brew: brew install fedify
  scoop: scoop install main/fedify
provenance:
  formula: fedify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
