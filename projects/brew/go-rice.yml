id: brew:go-rice
display-name: go-rice
homepage: https://github.com/GeertJohan/go.rice
repo: https://github.com/GeertJohan/go.rice
docs: https://github.com/GeertJohan/go.rice
package-manager:
  brew: go-rice
  nix: go-rice
package-manager-url: https://formulae.brew.sh/formula/go-rice
version: 1.0.3
license: BSD-2-Clause
category: development
tags:
  - cli
description: Easily embed resources like HTML, JS, CSS, images, and templates in Go
source-archive: https://github.com/GeertJohan/go.rice/archive/refs/tags/v1.0.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rice
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:go-rice
  brew: brew install go-rice
  nix: nix profile install nixpkgs#go-rice
provenance:
  formula: go-rice
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
