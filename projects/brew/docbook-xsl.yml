id: brew:docbook-xsl
display-name: docbook-xsl
homepage: https://github.com/docbook/xslt10-stylesheets
repo: https://github.com/docbook/xslt10-stylesheets
docs: https://github.com/docbook/xslt10-stylesheets
package-manager:
  apk: docbook-xsl
  brew: docbook-xsl
  debian: docbook-xsl
  macports: docbook-xsl
  nix: docbook_xsl
  pacman: docbook-xsl
  ubuntu: docbook-xsl
package-manager-url: https://formulae.brew.sh/formula/docbook-xsl
version: 1.79.2
license: MIT
category: development
tags:
  - cli
description: XML vocabulary to create presentation-neutral documents
source-archive: >
  https://github.com/docbook/xslt10-stylesheets/releases/download/release%2F1.79.2/docbook-xsl-nons-1.79.2.tar.bz2
dependencies:
  - docbook
executables:
  - exposure: global executable
    kind: cli
    name: dbtoepub
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add docbook-xsl
  av: sudo av install brew:docbook-xsl
  brew: brew install docbook-xsl
  debian: sudo apt install docbook-xsl
  macports: sudo port install docbook-xsl
  nix: nix profile install nixpkgs#docbook_xsl
  pacman: sudo pacman -S docbook-xsl
  ubuntu: sudo apt install docbook-xsl
provenance:
  formula: docbook-xsl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
