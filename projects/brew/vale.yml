id: brew:vale
display-name: vale
homepage: https://vale.sh/
repo: https://github.com/errata-ai/vale
docs: https://vale.sh/
package-manager:
  apk: vale
  brew: vale
  chocolatey: vale
  macports: vale
  nix: vale
  pacman: vale
  scoop: main/vale
  winget: errata-ai.Vale
  zypper: vale
package-manager-url: https://formulae.brew.sh/formula/vale
version: 3.14.2
license: MIT
category: development
tags:
  - cli
description: Syntax-aware linter for prose
source-archive: https://github.com/errata-ai/vale/archive/refs/tags/v3.14.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vale
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vale
  av: sudo av install brew:vale
  brew: brew install vale
  chocolatey: choco install vale
  macports: sudo port install vale
  nix: nix profile install nixpkgs#vale
  pacman: sudo pacman -S vale
  scoop: scoop install main/vale
  winget: winget install --id errata-ai.Vale -e
  zypper: sudo zypper install vale
provenance:
  formula: vale
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
