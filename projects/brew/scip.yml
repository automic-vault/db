id: brew:scip
display-name: scip
homepage: https://scipopt.org
repo: https://scipopt.org/download/release/scip-10.0.2.tgz
docs: https://scipopt.org
package-manager:
  brew: scip
  dnf: scip
  macports: scip
  nix: scip
  pacman: scip
package-manager-url: https://formulae.brew.sh/formula/scip
version: 10.0.2
license: Apache-2.0
category: network
tags:
  - cli
description: Solver for mixed integer programming and mixed integer nonlinear programming
source-archive: https://scipopt.org/download/release/scip-10.0.2.tgz
dependencies:
  - boost
  - cppad
  - gcc
  - gmp
  - ipopt
  - mpfr
  - openblas
  - readline
  - tbb
build-dependencies:
  - cmake
  - papilo
  - soplex
executables:
  - exposure: global executable
    kind: cli
    name: scip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:scip
  brew: brew install scip
  dnf: sudo dnf install scip
  macports: sudo port install scip
  nix: nix profile install nixpkgs#scip
  pacman: sudo pacman -S scip
provenance:
  formula: scip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
