id: brew:bk
display-name: bk
homepage: https://github.com/aeosynth/bk
repo: https://github.com/aeosynth/bk
docs: https://github.com/aeosynth/bk
package-manager:
  brew: bk
  nix: bk
  zypper: bk
package-manager-url: https://formulae.brew.sh/formula/bk
version: 0.6.0
license: MIT
category: development
tags:
  - cli
description: Terminal EPUB Reader
source-archive: https://github.com/aeosynth/bk/archive/refs/tags/v0.6.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bk
  brew: brew install bk
  nix: nix profile install nixpkgs#bk
  zypper: sudo zypper install bk
provenance:
  formula: bk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
