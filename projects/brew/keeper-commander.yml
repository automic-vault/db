id: brew:keeper-commander
display-name: keeper-commander
homepage: https://docs.keeper.io/en/privileged-access-manager/commander-cli/overview
repo: >
  https://files.pythonhosted.org/packages/e7/13/c9839da01b16e288e4444b39fee5677d1d00dccb59859b5bd1009a0980a8/keepercommander-18.0.3.tar.gz
docs: https://docs.keeper.io/en/privileged-access-manager/commander-cli/overview
package-manager:
  brew: keeper-commander
  chocolatey: keeper
  winget: KeeperSecurity.Commander
package-manager-url: https://formulae.brew.sh/formula/keeper-commander
version: 18.0.3
license: MIT
category: security
tags:
  - cli
description: Command-line and SDK interface to Keeper Password Manager
source-archive: >
  https://files.pythonhosted.org/packages/e7/13/c9839da01b16e288e4444b39fee5677d1d00dccb59859b5bd1009a0980a8/keepercommander-18.0.3.tar.gz
dependencies:
  - certifi
  - cryptography
  - ffmpeg
  - libvpx
  - libyaml
  - openssl@3
  - opus
  - pillow
  - pydantic
  - python@3.14
  - srtp
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: keeper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:keeper-commander
  brew: brew install keeper-commander
  chocolatey: choco install keeper
  winget: winget install --id KeeperSecurity.Commander -e
provenance:
  formula: keeper-commander
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
