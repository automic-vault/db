id: brew:weave
display-name: weave
homepage: https://github.com/Ataraxy-Labs/weave
repo: https://github.com/Ataraxy-Labs/weave
docs: https://github.com/Ataraxy-Labs/weave
package-manager:
  brew: weave
package-manager-url: https://formulae.brew.sh/formula/weave
version: 0.3.4
license: MIT OR Apache-2.0
category: development
tags:
  - cli
  - git
description: Entity-level semantic merge driver for Git using tree-sitter
source-archive: https://github.com/Ataraxy-Labs/weave/archive/refs/tags/v0.3.4.tar.gz
dependencies:
  - libgit2
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: weave-driver
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:weave
  brew: brew install weave
provenance:
  formula: weave
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
