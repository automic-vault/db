    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cbmc
  brew: brew install cbmc
  debian: sudo apt install cbmc
  dnf: sudo dnf install cbmc
  nix: nix profile install nixpkgs#cbmc
  ubuntu: sudo apt install cbmc
provenance:
  formula: cbmc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
