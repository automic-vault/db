  - exposure: global executable
    kind: cli
    name: goto-inspect
  - exposure: global executable
    kind: cli
    name: goto-instrument
  - exposure: global executable
    kind: cli
    name: goto-ld
  - exposure: global executable
    kind: cli
    name: goto-synthesizer
  - exposure: global executable
    kind: cli
