id: brew:tfautomv
display-name: tfautomv
homepage: https://tfautomv.dev/
repo: https://github.com/busser/tfautomv
docs: https://tfautomv.dev/
package-manager:
  brew: tfautomv
  nix: tfautomv
package-manager-url: https://formulae.brew.sh/formula/tfautomv
version: 0.7.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Generate Terraform moved blocks automatically for painless refactoring
source-archive: https://github.com/busser/tfautomv/archive/refs/tags/v0.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tfautomv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tfautomv
  brew: brew install tfautomv
  nix: nix profile install nixpkgs#tfautomv
provenance:
  formula: tfautomv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
