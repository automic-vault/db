id: brew:shunit2
display-name: shunit2
homepage: https://github.com/kward/shunit2
repo: https://github.com/kward/shunit2
docs: https://github.com/kward/shunit2
package-manager:
  apk: shunit2
  brew: shunit2
  debian: shunit2
  dnf: shunit2
  macports: shunit2
  nix: shunit2
  pacman: shunit2
  ubuntu: shunit2
  zypper: shunit2
package-manager-url: https://formulae.brew.sh/formula/shunit2
version: 2.1.8
license: Apache-2.0
category: development
tags:
  - cli
description: Unit testing framework for Bourne-based shell scripts
source-archive: https://github.com/kward/shunit2/archive/refs/tags/v2.1.8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: shunit2
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add shunit2
  av: sudo av install brew:shunit2
  brew: brew install shunit2
  debian: sudo apt install shunit2
  dnf: sudo dnf install shunit2
  macports: sudo port install shunit2
  nix: nix profile install nixpkgs#shunit2
  pacman: sudo pacman -S shunit2
  ubuntu: sudo apt install shunit2
  zypper: sudo zypper install shunit2
provenance:
  formula: shunit2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
