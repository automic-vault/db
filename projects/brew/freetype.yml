id: brew:freetype
display-name: freetype
homepage: https://www.freetype.org/
repo: >
  https://downloads.sourceforge.net/project/freetype/freetype2/2.14.3/freetype-2.14.3.tar.xz
docs: https://www.freetype.org/
package-manager:
  apk: freetype
  brew: freetype
  dnf: freetype
  macports: freetype
  nix: freetype
package-manager-url: https://formulae.brew.sh/formula/freetype
version: 2.14.3
license: FTL
category: network
tags:
  - cli
description: Software library to render fonts
source-archive: >
  https://downloads.sourceforge.net/project/freetype/freetype2/2.14.3/freetype-2.14.3.tar.xz
dependencies:
  - libpng
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: freetype-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add freetype
  av: sudo av install brew:freetype
  brew: brew install freetype
  dnf: sudo dnf install freetype
  macports: sudo port install freetype
  nix: nix profile install nixpkgs#freetype
provenance:
  formula: freetype
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
