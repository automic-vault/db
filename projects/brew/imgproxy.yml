id: brew:imgproxy
display-name: imgproxy
homepage: https://imgproxy.net
repo: https://github.com/imgproxy/imgproxy
docs: https://imgproxy.net
package-manager:
  brew: imgproxy
  nix: imgproxy
package-manager-url: https://formulae.brew.sh/formula/imgproxy
version: 4.0.3
license: Apache-2.0
category: development
tags:
  - cli
description: Fast and secure server for resizing and converting remote images
source-archive: https://github.com/imgproxy/imgproxy/archive/refs/tags/v4.0.3.tar.gz
dependencies:
  - gettext
  - glib
  - vips
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: imgproxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:imgproxy
  brew: brew install imgproxy
  nix: nix profile install nixpkgs#imgproxy
provenance:
  formula: imgproxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
