id: brew:binsider
display-name: binsider
homepage: https://binsider.dev/
repo: https://github.com/orhun/binsider
docs: https://binsider.dev/
package-manager:
  brew: binsider
  nix: binsider
  pacman: binsider
  scoop: main/binsider
  zypper: binsider
package-manager-url: https://formulae.brew.sh/formula/binsider
version: 0.3.2
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Analyzes ELF binaries
source-archive: https://github.com/orhun/binsider/archive/refs/tags/v0.3.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: binsider
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:binsider
  brew: brew install binsider
  nix: nix profile install nixpkgs#binsider
  pacman: sudo pacman -S binsider
  scoop: scoop install main/binsider
  zypper: sudo zypper install binsider
provenance:
  formula: binsider
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
