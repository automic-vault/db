id: brew:mpc
display-name: mpc
homepage: https://www.musicpd.org/clients/mpc/
repo: https://www.musicpd.org/download/mpc/0/mpc-0.35.tar.xz
docs: https://www.musicpd.org/clients/mpc/
package-manager:
  apk: mpc
  brew: mpc
  debian: mpc
  dnf: mpc
  macports: mpc
  nix: mpc
  pacman: mpc
  scoop: extras/mpc
  ubuntu: mpc
package-manager-url: https://formulae.brew.sh/formula/mpc
version: 0.35
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Command-line music player client for mpd
source-archive: https://www.musicpd.org/download/mpc/0/mpc-0.35.tar.xz
dependencies:
  - libmpdclient
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mpc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mpc
  av: sudo av install brew:mpc
  brew: brew install mpc
  debian: sudo apt install mpc
  dnf: sudo dnf install mpc
  macports: sudo port install mpc
  nix: nix profile install nixpkgs#mpc
  pacman: sudo pacman -S mpc
  scoop: scoop install extras/mpc
  ubuntu: sudo apt install mpc
provenance:
  formula: mpc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
