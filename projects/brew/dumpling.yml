id: brew:dumpling
display-name: dumpling
homepage: https://github.com/pingcap/tidb
repo: https://github.com/pingcap/tidb
docs: https://github.com/pingcap/tidb
package-manager:
  brew: dumpling
package-manager-url: https://formulae.brew.sh/formula/dumpling
version: 26.3.0
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Creating SQL dump from a MySQL-compatible database
source-archive: https://github.com/pingcap/tidb/archive/refs/tags/v26.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dumpling
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dumpling
  brew: brew install dumpling
provenance:
  formula: dumpling
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
