id: brew:weggli
display-name: weggli
homepage: https://github.com/weggli-rs/weggli
repo: https://github.com/weggli-rs/weggli
docs: https://github.com/weggli-rs/weggli
package-manager:
  apk: weggli
  brew: weggli
  nix: weggli
  zypper: weggli
package-manager-url: https://formulae.brew.sh/formula/weggli
version: 0.2.4
license: Apache-2.0
category: development
tags:
  - cli
description: Fast and robust semantic search tool for C and C++ codebases
source-archive: https://github.com/weggli-rs/weggli/archive/refs/tags/v0.2.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: weggli
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add weggli
  av: sudo av install brew:weggli
  brew: brew install weggli
  nix: nix profile install nixpkgs#weggli
  zypper: sudo zypper install weggli
provenance:
  formula: weggli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
