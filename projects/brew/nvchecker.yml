id: brew:nvchecker
display-name: nvchecker
homepage: https://github.com/lilydjwg/nvchecker
repo: >
  https://files.pythonhosted.org/packages/e6/ab/2950ee964979aa31efb3e0e960f2055d6b1efec5c6239483f88ca6713fc9/nvchecker-2.20.tar.gz
docs: https://github.com/lilydjwg/nvchecker
package-manager:
  apk: nvchecker
  brew: nvchecker
  macports: nvchecker
  nix: nvchecker
  pacman: nvchecker
  ubuntu: nvchecker
package-manager-url: https://formulae.brew.sh/formula/nvchecker
version: 2.20
license: MIT
category: development
tags:
  - cli
description: New version checker for software releases
source-archive: >
  https://files.pythonhosted.org/packages/e6/ab/2950ee964979aa31efb3e0e960f2055d6b1efec5c6239483f88ca6713fc9/nvchecker-2.20.tar.gz
dependencies:
  - curl
  - openssl@3
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: nvchecker
  - exposure: global executable
    kind: cli
    name: nvchecker-ini2toml
  - exposure: global executable
    kind: cli
    name: nvchecker-notify
  - exposure: global executable
    kind: cli
    name: nvcmp
  - exposure: global executable
    kind: cli
    name: nvtake
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nvchecker
  av: sudo av install brew:nvchecker
  brew: brew install nvchecker
  macports: sudo port install nvchecker
  nix: nix profile install nixpkgs#nvchecker
  pacman: sudo pacman -S nvchecker
  ubuntu: sudo apt install nvchecker
provenance:
  formula: nvchecker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
