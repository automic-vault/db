id: brew:rustpython
display-name: rustpython
homepage: https://rustpython.github.io
repo: https://github.com/RustPython/RustPython
docs: https://rustpython.github.io
package-manager:
  brew: rustpython
  macports: rustpython
  nix: rustpython
package-manager-url: https://formulae.brew.sh/formula/rustpython
version: 0.5.0
license: MIT
category: development
tags:
  - cli
description: Python Interpreter written in Rust
source-archive: https://github.com/RustPython/RustPython/archive/refs/tags/0.5.0.tar.gz
build-dependencies:
  - rust
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: rustpython
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rustpython
  brew: brew install rustpython
  macports: sudo port install rustpython
  nix: nix profile install nixpkgs#rustpython
provenance:
  formula: rustpython
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
