id: brew:primesieve
display-name: primesieve
homepage: https://github.com/kimwalisch/primesieve
repo: https://github.com/kimwalisch/primesieve
docs: https://github.com/kimwalisch/primesieve
package-manager:
  apk: primesieve
  brew: primesieve
  debian: primesieve
  dnf: primesieve
  macports: primesieve
  nix: primesieve
  pacman: primesieve
  scoop: main/primesieve
  ubuntu: primesieve
  winget: Primesieve.Primesieve
  zypper: primesieve
package-manager-url: https://formulae.brew.sh/formula/primesieve
version: 12.14
license: BSD-2-Clause
category: development
tags:
  - cli
description: Fast C/C++ prime number generator
source-archive: https://github.com/kimwalisch/primesieve/archive/refs/tags/v12.14.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: primesieve
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add primesieve
  av: sudo av install brew:primesieve
  brew: brew install primesieve
  debian: sudo apt install primesieve
  dnf: sudo dnf install primesieve
  macports: sudo port install primesieve
  nix: nix profile install nixpkgs#primesieve
  pacman: sudo pacman -S primesieve
  scoop: scoop install main/primesieve
  ubuntu: sudo apt install primesieve
  winget: winget install --id Primesieve.Primesieve -e
  zypper: sudo zypper install primesieve
provenance:
  formula: primesieve
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
