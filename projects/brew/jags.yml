id: brew:jags
display-name: jags
homepage: https://mcmc-jags.sourceforge.io
repo: https://downloads.sourceforge.net/project/mcmc-jags/JAGS/4.x/Source/JAGS-4.3.2.tar.gz
docs: https://mcmc-jags.sourceforge.io
package-manager:
  brew: jags
  debian: jags
  macports: jags
  nix: jags
  ubuntu: jags
package-manager-url: https://formulae.brew.sh/formula/jags
version: 4.3.2
license: GPL-2.0-only
category: network
tags:
  - cli
description: Just Another Gibbs Sampler for Bayesian MCMC simulation
source-archive: https://downloads.sourceforge.net/project/mcmc-jags/JAGS/4.x/Source/JAGS-4.3.2.tar.gz
dependencies:
  - openblas
build-dependencies:
  - gcc
executables:
  - exposure: global executable
    kind: cli
    name: jags
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jags
  brew: brew install jags
  debian: sudo apt install jags
  macports: sudo port install jags
  nix: nix profile install nixpkgs#jags
  ubuntu: sudo apt install jags
provenance:
  formula: jags
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
