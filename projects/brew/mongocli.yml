id: brew:mongocli
display-name: mongocli
homepage: https://www.mongodb.com/docs/mongocli/current/
repo: https://github.com/mongodb/mongodb-cli
docs: https://www.mongodb.com/docs/mongocli/current/
package-manager:
  brew: mongocli
  macports: mongocli
package-manager-url: https://formulae.brew.sh/formula/mongocli
version: 2.0.7
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: MongoDB CLI enables you to manage your MongoDB in the Cloud
source-archive: https://github.com/mongodb/mongodb-cli/archive/refs/tags/mongocli/v2.0.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mongocli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mongocli
  brew: brew install mongocli
  macports: sudo port install mongocli
provenance:
  formula: mongocli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
