id: brew:cargo-cyclonedx
display-name: cargo-cyclonedx
homepage: https://cyclonedx.org/
repo: https://github.com/CycloneDX/cyclonedx-rust-cargo
docs: https://cyclonedx.org/
package-manager:
  apk: cargo-cyclonedx
  brew: cargo-cyclonedx
  dnf: cargo-cyclonedx
  nix: cargo-cyclonedx
  pacman: cargo-cyclonedx
package-manager-url: https://formulae.brew.sh/formula/cargo-cyclonedx
version: 0.5.9
license: Apache-2.0
category: development
tags:
  - cli
description: Creates CycloneDX Software Bill of Materials (SBOM) from Rust (Cargo) projects
source-archive: >
  https://github.com/CycloneDX/cyclonedx-rust-cargo/archive/refs/tags/cargo-cyclonedx-0.5.9.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-cyclonedx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-cyclonedx
  av: sudo av install brew:cargo-cyclonedx
  brew: brew install cargo-cyclonedx
  dnf: sudo dnf install cargo-cyclonedx
  nix: nix profile install nixpkgs#cargo-cyclonedx
  pacman: sudo pacman -S cargo-cyclonedx
provenance:
  formula: cargo-cyclonedx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
