id: brew:dnsdist
display-name: dnsdist
homepage: https://www.dnsdist.org/
repo: https://downloads.powerdns.com/releases/dnsdist-2.0.6.tar.xz
docs: https://www.dnsdist.org/
package-manager:
  apk: dnsdist
  brew: dnsdist
  debian: dnsdist
  dnf: dnsdist
  nix: dnsdist
  pacman: dnsdist
  ubuntu: dnsdist
  zypper: dnsdist
package-manager-url: https://formulae.brew.sh/formula/dnsdist
version: 2.0.6
license: GPL-2.0-only
category: network
tags:
  - cli
description: Highly DNS-, DoS- and abuse-aware loadbalancer
source-archive: https://downloads.powerdns.com/releases/dnsdist-2.0.6.tar.xz
dependencies:
  - fstrm
  - libnghttp2
  - libsodium
  - luajit
  - openssl@3
  - re2
  - tinycdb
build-dependencies:
  - boost
  - libyaml
  - pkgconf
  - python@3.14
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: dnsdist
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dnsdist
  av: sudo av install brew:dnsdist
  brew: brew install dnsdist
  debian: sudo apt install dnsdist
  dnf: sudo dnf install dnsdist
  nix: nix profile install nixpkgs#dnsdist
  pacman: sudo pacman -S dnsdist
  ubuntu: sudo apt install dnsdist
  zypper: sudo zypper install dnsdist
provenance:
  formula: dnsdist
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
