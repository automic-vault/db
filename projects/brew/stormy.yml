id: brew:stormy
display-name: stormy
homepage: https://github.com/ashish0kumar/stormy
repo: https://github.com/ashish0kumar/stormy
docs: https://github.com/ashish0kumar/stormy
package-manager:
  brew: stormy
package-manager-url: https://formulae.brew.sh/formula/stormy
version: 0.3.3
license: MIT
category: development
tags:
  - cli
description: Minimal, customizable and neofetch-like weather CLI based on rainy
source-archive: https://github.com/ashish0kumar/stormy/archive/refs/tags/v0.3.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: stormy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stormy
  brew: brew install stormy
provenance:
  formula: stormy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
