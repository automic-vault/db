id: brew:volta
display-name: volta
homepage: https://volta.sh
repo: https://github.com/volta-cli/volta
docs: https://volta.sh
package-manager:
  brew: volta
  chocolatey: volta
  macports: volta
  nix: volta
  scoop: main/volta
  winget: Volta.Volta
package-manager-url: https://formulae.brew.sh/formula/volta
version: 2.0.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: JavaScript toolchain manager for reproducible environments
source-archive: https://github.com/volta-cli/volta/archive/refs/tags/v2.0.2.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: volta
  - exposure: global executable
    kind: cli
    name: volta-migrate
  - exposure: global executable
    kind: cli
    name: volta-shim
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:volta
  brew: brew install volta
  chocolatey: choco install volta
  macports: sudo port install volta
  nix: nix profile install nixpkgs#volta
  scoop: scoop install main/volta
  winget: winget install --id Volta.Volta -e
provenance:
  formula: volta
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
