id: brew:check_postgres
display-name: check_postgres
homepage: https://bucardo.org/wiki/Check_postgres
repo: https://bucardo.org/downloads/check_postgres-2.26.0.tar.gz
docs: https://bucardo.org/wiki/Check_postgres
package-manager:
  apk: check_postgres
  brew: check_postgres
  debian: check-postgres
  dnf: check_postgres
  ubuntu: check-postgres
  zypper: check_postgres
package-manager-url: https://formulae.brew.sh/formula/check_postgres
version: 2.26.0
license: BSD-2-Clause
category: database
tags:
  - cli
description: Monitor Postgres databases
source-archive: https://bucardo.org/downloads/check_postgres-2.26.0.tar.gz
dependencies:
  - libpq
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: check_postgres
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add check_postgres
  av: sudo av install brew:check_postgres
  brew: brew install check_postgres
  debian: sudo apt install check-postgres
  dnf: sudo dnf install check_postgres
  ubuntu: sudo apt install check-postgres
  zypper: sudo zypper install check_postgres
provenance:
  formula: check_postgres
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
