id: brew:tfmv
display-name: tfmv
homepage: https://github.com/suzuki-shunsuke/tfmv
repo: https://github.com/suzuki-shunsuke/tfmv
docs: https://github.com/suzuki-shunsuke/tfmv
package-manager:
  brew: tfmv
  macports: tfmv
package-manager-url: https://formulae.brew.sh/formula/tfmv
version: 1.0.0
license: MIT
category: cloud
tags:
  - cli
description: CLI to rename Terraform resources and generate moved blocks
source-archive: https://github.com/suzuki-shunsuke/tfmv/archive/refs/tags/v1.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tfmv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tfmv
  brew: brew install tfmv
  macports: sudo port install tfmv
provenance:
  formula: tfmv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
