id: brew:grc
display-name: grc
homepage: https://kassiopeia.juls.savba.sk/~garabik/software/grc.html
repo: https://github.com/garabik/grc
docs: https://kassiopeia.juls.savba.sk/~garabik/software/grc.html
package-manager:
  brew: grc
  debian: grc
  dnf: grc
  macports: grc
  nix: grc
  pacman: grc
  ubuntu: grc
  zypper: grc
package-manager-url: https://formulae.brew.sh/formula/grc
version: 1.13
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Colorize logfiles and command output
source-archive: https://github.com/garabik/grc/archive/refs/tags/v1.13.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: grc
  - exposure: global executable
    kind: cli
    name: grcat
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:grc
  brew: brew install grc
  debian: sudo apt install grc
  dnf: sudo dnf install grc
  macports: sudo port install grc
  nix: nix profile install nixpkgs#grc
  pacman: sudo pacman -S grc
  ubuntu: sudo apt install grc
  zypper: sudo zypper install grc
provenance:
  formula: grc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
