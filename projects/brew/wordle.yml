id: brew:wordle
display-name: wordle
homepage: https://git.hanabi.in/wordle-cli
repo: https://git.hanabi.in/repos/wordle-cli
docs: https://git.hanabi.in/wordle-cli
package-manager:
  brew: wordle
package-manager-url: https://formulae.brew.sh/formula/wordle
version: 2.0.0
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Play wordle in command-line
source-archive: https://git.hanabi.in/repos/wordle-cli.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wordle
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wordle
  brew: brew install wordle
provenance:
  formula: wordle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
