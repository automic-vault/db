id: brew:typtea
display-name: typtea
homepage: https://github.com/ashish0kumar/typtea
repo: https://github.com/ashish0kumar/typtea
docs: https://github.com/ashish0kumar/typtea
package-manager:
  brew: typtea
  nix: typtea
package-manager-url: https://formulae.brew.sh/formula/typtea
version: 0.1.6
license: MIT
category: development
tags:
  - cli
description: Minimal terminal-based typing speed tester
source-archive: https://github.com/ashish0kumar/typtea/archive/refs/tags/v0.1.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: typtea
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:typtea
  brew: brew install typtea
  nix: nix profile install nixpkgs#typtea
provenance:
  formula: typtea
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
