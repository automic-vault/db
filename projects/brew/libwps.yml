id: brew:libwps
display-name: libwps
homepage: https://libwps.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/libwps/libwps/libwps-0.4.14/libwps-0.4.14.tar.xz
docs: https://libwps.sourceforge.net/
package-manager:
  apk: libwps
  brew: libwps
  dnf: libwps
  macports: libwps
  nix: libwps
  pacman: libwps
package-manager-url: https://formulae.brew.sh/formula/libwps
version: 0.4.14
license: LGPL-2.1-or-later OR MPL-2.0
category: development
tags:
  - cli
description: Library to import files in MS Works format
source-archive: >
  https://downloads.sourceforge.net/project/libwps/libwps/libwps-0.4.14/libwps-0.4.14.tar.xz
dependencies:
  - librevenge
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: wks2csv
  - exposure: global executable
    kind: cli
    name: wks2raw
  - exposure: global executable
    kind: cli
    name: wks2text
  - exposure: global executable
    kind: cli
    name: wps2html
  - exposure: global executable
    kind: cli
    name: wps2raw
  - exposure: global executable
    kind: cli
    name: wps2text
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libwps
  av: sudo av install brew:libwps
  brew: brew install libwps
  dnf: sudo dnf install libwps
  macports: sudo port install libwps
  nix: nix profile install nixpkgs#libwps
  pacman: sudo pacman -S libwps
provenance:
  formula: libwps
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
