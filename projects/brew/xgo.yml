id: brew:xgo
display-name: xgo
homepage: https://xgo.dev/
repo: https://github.com/goplus/xgo
docs: https://xgo.dev/
package-manager:
  brew: xgo
package-manager-url: https://formulae.brew.sh/formula/xgo
version: 1.7.1
license: Apache-2.0
category: development
tags:
