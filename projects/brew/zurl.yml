id: brew:zurl
display-name: zurl
homepage: https://github.com/fanout/zurl
repo: https://github.com/fanout/zurl
docs: https://github.com/fanout/zurl
package-manager:
  brew: zurl
  debian: zurl
  ubuntu: zurl
package-manager-url: https://formulae.brew.sh/formula/zurl
version: 1.12.0
license: GPL-3.0-or-later AND LGPL-2.1-or-later AND curl AND MIT
category: development
tags:
  - cli
description: HTTP and WebSocket client worker with ZeroMQ interface
source-archive: https://github.com/fanout/zurl/releases/download/v1.12.0/zurl-1.12.0.tar.bz2
dependencies:
  - qtbase
  - zeromq
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: zurl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zurl
  brew: brew install zurl
  debian: sudo apt install zurl
  ubuntu: sudo apt install zurl
provenance:
  formula: zurl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
