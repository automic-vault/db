id: brew:bb-cli
display-name: bb-cli
homepage: https://bb-cli.github.io
repo: https://github.com/bb-cli/bb-cli
docs: https://bb-cli.github.io
package-manager:
  brew: bb-cli
  debian: bb
  nix: bb
  ubuntu: bb
  winget: vriesdemichael.bb
  zypper: bb
package-manager-url: https://formulae.brew.sh/formula/bb-cli
version: 1.4.1
license: MIT
category: development
tags:
  - cli
description: Bitbucket Rest API CLI written in pure PHP
source-archive: https://github.com/bb-cli/bb-cli/releases/download/1.4.1/bb
dependencies:
  - php
executables:
  - exposure: global executable
    kind: cli
    name: bb
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bb-cli
  brew: brew install bb-cli
  debian: sudo apt install bb
  nix: nix profile install nixpkgs#bb
  ubuntu: sudo apt install bb
  winget: winget install --id vriesdemichael.bb -e
  zypper: sudo zypper install bb
provenance:
  formula: bb-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
