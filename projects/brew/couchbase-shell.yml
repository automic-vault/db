id: brew:couchbase-shell
display-name: couchbase-shell
homepage: https://couchbase.sh
repo: https://github.com/couchbaselabs/couchbase-shell
docs: https://couchbase.sh
package-manager:
  brew: couchbase-shell
  nix: couchbase-shell
package-manager-url: https://formulae.brew.sh/formula/couchbase-shell
version: 1.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Modern and fun shell for Couchbase Server and Capella
source-archive: https://github.com/couchbaselabs/couchbase-shell/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cbsh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:couchbase-shell
  brew: brew install couchbase-shell
  nix: nix profile install nixpkgs#couchbase-shell
provenance:
  formula: couchbase-shell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
