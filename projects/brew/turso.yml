id: brew:turso
display-name: turso
homepage: https://github.com/tursodatabase/turso
repo: https://github.com/tursodatabase/turso
docs: https://github.com/tursodatabase/turso
package-manager:
  brew: turso
  nix: turso
package-manager-url: https://formulae.brew.sh/formula/turso
version: 0.6.1
license: MIT
category: database
tags:
  - cli
description: Interactive SQL shell for Turso
source-archive: https://github.com/tursodatabase/turso/archive/refs/tags/v0.6.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tursodb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:turso
  brew: brew install turso
  nix: nix profile install nixpkgs#turso
provenance:
  formula: turso
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
