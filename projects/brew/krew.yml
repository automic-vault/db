id: brew:krew
display-name: krew
homepage: https://sigs.k8s.io/krew/
repo: https://github.com/kubernetes-sigs/krew
docs: https://sigs.k8s.io/krew/
package-manager:
  apk: kubectl-krew
  brew: krew
  macports: krew
  nix: krew
  pacman: krew
  scoop: main/krew
  winget: Kubernetes.krew
package-manager-url: https://formulae.brew.sh/formula/krew
version: 0.5.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: Package manager for kubectl plugins
source-archive: https://github.com/kubernetes-sigs/krew.git
dependencies:
  - kubernetes-cli
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubectl-krew
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kubectl-krew
  av: sudo av install brew:krew
  brew: brew install krew
  macports: sudo port install krew
  nix: nix profile install nixpkgs#krew
  pacman: sudo pacman -S krew
  scoop: scoop install main/krew
  winget: winget install --id Kubernetes.krew -e
provenance:
  formula: krew
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
