id: brew:mediaconch
display-name: mediaconch
homepage: https://mediaarea.net/MediaConch
repo: >
  https://mediaarea.net/download/binary/mediaconch/25.04/MediaConch_CLI_25.04_GNU_FromSource.tar.bz2
docs: https://mediaarea.net/MediaConch
package-manager:
  brew: mediaconch
  debian: mediaconch
  dnf: mediaconch
  ubuntu: mediaconch
package-manager-url: https://formulae.brew.sh/formula/mediaconch
version: 25.04
license: BSD-2-Clause
category: network
tags:
  - cli
description: Conformance checker and technical metadata reporter
source-archive: >
  https://mediaarea.net/download/binary/mediaconch/25.04/MediaConch_CLI_25.04_GNU_FromSource.tar.bz2
dependencies:
  - jansson
  - libevent
  - libmediainfo
  - libzen
  - sqlite
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: mediaconch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mediaconch
  brew: brew install mediaconch
  debian: sudo apt install mediaconch
  dnf: sudo dnf install mediaconch
  ubuntu: sudo apt install mediaconch
provenance:
  formula: mediaconch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
