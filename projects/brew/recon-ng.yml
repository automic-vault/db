id: brew:recon-ng
display-name: recon-ng
homepage: https://github.com/lanmaster53/recon-ng
repo: https://github.com/lanmaster53/recon-ng
docs: https://github.com/lanmaster53/recon-ng
package-manager:
  apk: recon-ng
  brew: recon-ng
  debian: recon-ng
  nix: recon-ng
package-manager-url: https://formulae.brew.sh/formula/recon-ng
version: 5.1.2
license: GPL-3.0-only
category: development
tags:
  - cli
description: Web Reconnaissance Framework
source-archive: https://github.com/lanmaster53/recon-ng/archive/refs/tags/v5.1.2.tar.gz
dependencies:
  - certifi
  - libyaml
  - python@3.14
  - rpds-py
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: recon-cli
  - exposure: global executable
    kind: cli
    name: recon-ng
  - exposure: global executable
    kind: cli
    name: recon-web
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add recon-ng
  av: sudo av install brew:recon-ng
  brew: brew install recon-ng
  debian: sudo apt install recon-ng
  nix: nix profile install nixpkgs#recon-ng
provenance:
  formula: recon-ng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
