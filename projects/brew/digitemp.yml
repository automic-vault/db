id: brew:digitemp
display-name: digitemp
homepage: https://www.digitemp.com/
repo: https://github.com/bcl/digitemp
docs: https://www.digitemp.com/
package-manager:
  brew: digitemp
  debian: digitemp
  dnf: digitemp
  nix: digitemp
  ubuntu: digitemp
package-manager-url: https://formulae.brew.sh/formula/digitemp
version: 3.7.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Read temperature sensors in a 1-Wire net
source-archive: https://github.com/bcl/digitemp/archive/refs/tags/v3.7.2.tar.gz
dependencies:
  - libusb-compat
executables:
  - exposure: global executable
    kind: cli
    name: digitemp_DS2490
  - exposure: global executable
    kind: cli
    name: digitemp_DS9097
  - exposure: global executable
    kind: cli
    name: digitemp_DS9097U
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:digitemp
  brew: brew install digitemp
  debian: sudo apt install digitemp
  dnf: sudo dnf install digitemp
  nix: nix profile install nixpkgs#digitemp
  ubuntu: sudo apt install digitemp
provenance:
  formula: digitemp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
