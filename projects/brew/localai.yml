id: brew:localai
display-name: localai
homepage: https://localai.io
repo: https://github.com/mudler/LocalAI
docs: https://localai.io
package-manager:
  brew: localai
  nix: local-ai
package-manager-url: https://formulae.brew.sh/formula/localai
version: 4.3.1
license: MIT
category: development
tags:
  - cli
description: OpenAI alternative
source-archive: https://github.com/mudler/LocalAI/archive/refs/tags/v4.3.1.tar.gz
build-dependencies:
  - go
  - node
  - protobuf
  - protoc-gen-go
  - protoc-gen-go-grpc
executables:
  - exposure: global executable
    kind: cli
    name: local-ai
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:localai
  brew: brew install localai
  nix: nix profile install nixpkgs#local-ai
provenance:
  formula: localai
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
