id: brew:baidupcs-go
display-name: baidupcs-go
homepage: https://github.com/qjfoidnh/BaiduPCS-Go
repo: https://github.com/qjfoidnh/BaiduPCS-Go
docs: https://github.com/qjfoidnh/BaiduPCS-Go
package-manager:
  brew: baidupcs-go
  nix: baidupcs-go
  pacman: baidupcs-go
  winget: qjfoidnh.BaiduPCS-Go
package-manager-url: https://formulae.brew.sh/formula/baidupcs-go
version: 4.0.1
license: Apache-2.0
category: development
tags:
  - cli
description: Terminal utility for Baidu Network Disk
source-archive: https://github.com/qjfoidnh/BaiduPCS-Go/archive/refs/tags/v4.0.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: baidupcs-go
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:baidupcs-go
  brew: brew install baidupcs-go
  nix: nix profile install nixpkgs#baidupcs-go
  pacman: sudo pacman -S baidupcs-go
  winget: winget install --id qjfoidnh.BaiduPCS-Go -e
provenance:
  formula: baidupcs-go
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
