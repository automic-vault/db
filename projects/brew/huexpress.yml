id: brew:huexpress
display-name: huexpress
homepage: https://github.com/kallisti5/huexpress
repo: https://github.com/kallisti5/huexpress
docs: https://github.com/kallisti5/huexpress
package-manager:
  brew: huexpress
package-manager-url: https://formulae.brew.sh/formula/huexpress
version: 3.0.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: PC Engine emulator
source-archive: https://github.com/kallisti5/huexpress/archive/refs/tags/3.0.4.tar.gz
dependencies:
  - gettext
  - glib
  - libvorbis
  - libzip
  - sdl2
  - sdl2_mixer
build-dependencies:
  - pkgconf
  - scons
executables:
  - exposure: global executable
    kind: cli
    name: hucrc
  - exposure: global executable
    kind: cli
    name: huexpress
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:huexpress
  brew: brew install huexpress
provenance:
  formula: huexpress
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
