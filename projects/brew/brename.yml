id: brew:brename
display-name: brename
homepage: https://github.com/shenwei356/brename
repo: https://github.com/shenwei356/brename
docs: https://github.com/shenwei356/brename
package-manager:
  brew: brename
  scoop: main/brename
package-manager-url: https://formulae.brew.sh/formula/brename
version: 2.14.0
license: MIT
category: development
tags:
  - cli
description: Cross-platform command-line tool for safe batch renaming via regular expressions
source-archive: https://github.com/shenwei356/brename/archive/refs/tags/v2.14.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: brename
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:brename
  brew: brew install brename
  scoop: scoop install main/brename
provenance:
  formula: brename
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
