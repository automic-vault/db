id: brew:nickel
display-name: nickel
homepage: https://nickel-lang.org/
repo: https://github.com/tweag/nickel
docs: https://nickel-lang.org/
package-manager:
  apk: nickel
  brew: nickel
  nix: nickel
  pacman: nickel
package-manager-url: https://formulae.brew.sh/formula/nickel
version: 1.16.0
license: MIT
category: development
tags:
  - cli
description: Better configuration for less
source-archive: https://github.com/tweag/nickel/archive/refs/tags/1.16.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: nickel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nickel
  av: sudo av install brew:nickel
  brew: brew install nickel
  nix: nix profile install nixpkgs#nickel
  pacman: sudo pacman -S nickel
provenance:
  formula: nickel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
