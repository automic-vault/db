id: brew:tundra
display-name: tundra
homepage: https://github.com/deplinenoise/tundra
repo: https://github.com/deplinenoise/tundra
docs: https://github.com/deplinenoise/tundra
package-manager:
  brew: tundra
package-manager-url: https://formulae.brew.sh/formula/tundra
version: 2.17.1
license: MIT
category: development
tags:
  - cli
description: Code build system that tries to be fast for incremental builds
source-archive: https://github.com/deplinenoise/tundra/archive/refs/tags/v2.17.1.tar.gz
build-dependencies:
  - googletest
executables:
  - exposure: global executable
    kind: cli
    name: t2-inspect
  - exposure: global executable
    kind: cli
    name: t2-lua
  - exposure: global executable
    kind: cli
    name: tundra2
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tundra
  brew: brew install tundra
provenance:
  formula: tundra
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
