id: brew:sleek
display-name: sleek
homepage: https://github.com/nrempel/sleek
repo: https://github.com/nrempel/sleek
docs: https://github.com/nrempel/sleek
package-manager:
  brew: sleek
  nix: sleek
  scoop: extras/sleek
  winget: ransome1.sleek
package-manager-url: https://formulae.brew.sh/formula/sleek
version: 0.5.0
license: MIT
category: database
tags:
  - cli
description: CLI tool for formatting SQL
source-archive: https://github.com/nrempel/sleek/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sleek
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sleek
  brew: brew install sleek
  nix: nix profile install nixpkgs#sleek
  scoop: scoop install extras/sleek
  winget: winget install --id ransome1.sleek -e
provenance:
  formula: sleek
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
