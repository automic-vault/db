id: brew:hz
display-name: hz
homepage: https://github.com/cloudwego/hertz
repo: https://github.com/cloudwego/hertz
docs: https://github.com/cloudwego/hertz
package-manager:
  brew: hz
package-manager-url: https://formulae.brew.sh/formula/hz
version: 0.9.7
license: Apache-2.0
category: cloud
tags:
  - cli
description: Golang HTTP framework for microservices
source-archive: https://github.com/cloudwego/hertz/archive/refs/tags/cmd/hz/v0.9.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hz
  - exposure: global executable
    kind: cli
    name: protoc-gen-hertz
  - exposure: global executable
    kind: cli
    name: thrift-gen-hertz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hz
  brew: brew install hz
provenance:
  formula: hz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
