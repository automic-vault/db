id: brew:pdf2svg
display-name: pdf2svg
homepage: https://cityinthesky.co.uk/opensource/pdf2svg
repo: https://github.com/dawbarton/pdf2svg
docs: https://cityinthesky.co.uk/opensource/pdf2svg
package-manager:
  apk: pdf2svg
  brew: pdf2svg
  debian: pdf2svg
  dnf: pdf2svg
  macports: pdf2svg
  nix: pdf2svg
  pacman: pdf2svg
  scoop: main/pdf2svg
  ubuntu: pdf2svg
  zypper: pdf2svg
package-manager-url: https://formulae.brew.sh/formula/pdf2svg
version: 0.2.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: PDF converter to SVG
source-archive: https://github.com/dawbarton/pdf2svg/archive/refs/tags/v0.2.4.tar.gz
dependencies:
  - cairo
  - gettext
  - glib
  - poppler
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pdf2svg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pdf2svg
  av: sudo av install brew:pdf2svg
  brew: brew install pdf2svg
  debian: sudo apt install pdf2svg
  dnf: sudo dnf install pdf2svg
  macports: sudo port install pdf2svg
  nix: nix profile install nixpkgs#pdf2svg
  pacman: sudo pacman -S pdf2svg
  scoop: scoop install main/pdf2svg
  ubuntu: sudo apt install pdf2svg
  zypper: sudo zypper install pdf2svg
provenance:
  formula: pdf2svg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
