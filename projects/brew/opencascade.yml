id: brew:opencascade
display-name: opencascade
homepage: https://dev.opencascade.org/
repo: https://github.com/Open-Cascade-SAS/OCCT
docs: https://dev.opencascade.org/
package-manager:
  apk: opencascade
  brew: opencascade
  macports: opencascade
  pacman: opencascade
package-manager-url: https://formulae.brew.sh/formula/opencascade
version: 7.9.3
license: LGPL-2.1-only
category: development
tags:
  - cli
description: 3D modeling and numerical simulation software for CAD/CAM/CAE
source-archive: https://github.com/Open-Cascade-SAS/OCCT/archive/refs/tags/V7_9_3.tar.gz
dependencies:
  - fontconfig
  - freetype
  - tbb
  - tcl-tk@8
build-dependencies:
  - cmake
  - doxygen
  - rapidjson
executables:
  - exposure: global executable
    kind: cli
    name: DRAWEXE
  - exposure: global executable
    kind: cli
    name: DRAWEXE-7.9.3
  - exposure: global executable
    kind: cli
    name: ExpToCasExe
  - exposure: global executable
    kind: cli
    name: ExpToCasExe-7.9.3
  - exposure: global executable
    kind: cli
    name: custom.sh
  - exposure: global executable
    kind: cli
    name: custom_gcc_64.sh
  - exposure: global executable
    kind: cli
    name: draw.sh
  - exposure: global executable
    kind: cli
    name: env.sh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add opencascade
  av: sudo av install brew:opencascade
  brew: brew install opencascade
  macports: sudo port install opencascade
  pacman: sudo pacman -S opencascade
provenance:
  formula: opencascade
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
