id: brew:pnpm
display-name: pnpm
homepage: https://pnpm.io/
repo: https://registry.npmjs.org/pnpm/-/pnpm-11.3.0.tgz
docs: https://pnpm.io/
package-manager:
  apk: pnpm
  brew: pnpm
  chocolatey: pnpm
  dnf: pnpm
  macports: pnpm
  nix: pnpm
  pacman: pnpm
  scoop: main/pnpm
  winget: pnpm.pnpm
  zypper: pnpm
package-manager-url: https://formulae.brew.sh/formula/pnpm
version: 11.3.0
license: MIT
category: network
tags:
  - cli
description: Fast, disk space efficient package manager
source-archive: https://registry.npmjs.org/pnpm/-/pnpm-11.3.0.tgz
build-dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: pn
  - exposure: global executable
    kind: cli
    name: pnpm
  - exposure: global executable
    kind: cli
    name: pnpx
  - exposure: global executable
    kind: cli
    name: pnx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    pnpm requires a Node installation to function. You can install one with: brew
    install node
  post-install-defined: false
install-lines:
  apk: sudo apk add pnpm
  av: sudo av install brew:pnpm
  brew: brew install pnpm
  chocolatey: choco install pnpm
  dnf: sudo dnf install pnpm
  macports: sudo port install pnpm
  nix: nix profile install nixpkgs#pnpm
  pacman: sudo pacman -S pnpm
  scoop: scoop install main/pnpm
  winget: winget install --id pnpm.pnpm -e
  zypper: sudo zypper install pnpm
provenance:
  formula: pnpm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
