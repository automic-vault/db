id: brew:intercept
display-name: intercept
homepage: https://intercept.cc
repo: https://github.com/xfhg/intercept
docs: https://intercept.cc
package-manager:
  brew: intercept
package-manager-url: https://formulae.brew.sh/formula/intercept
version: 1.0.12
license: EUPL-1.2
category: security
tags:
  - cli
  - security
description: Static Application Security Testing (SAST) tool
source-archive: https://github.com/xfhg/intercept/archive/refs/tags/v1.0.12.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: intercept
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:intercept
  brew: brew install intercept
provenance:
  formula: intercept
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
