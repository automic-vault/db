id: brew:tailor
display-name: tailor
homepage: https://sleekbyte.github.io/tailor/
repo: https://github.com/sleekbyte/tailor
docs: https://sleekbyte.github.io/tailor/
package-manager:
  brew: tailor
  macports: tailor
package-manager-url: https://formulae.brew.sh/formula/tailor
version: 0.12.0
license: MIT
category: development
tags:
  - cli
description: Cross-platform static analyzer and linter for Swift
source-archive: https://github.com/sleekbyte/tailor/releases/download/v0.12.0/tailor-0.12.0.tar
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: tailor
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tailor
  brew: brew install tailor
  macports: sudo port install tailor
provenance:
  formula: tailor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
