id: brew:snap
display-name: snap
homepage: https://snapcraft.io/
repo: https://github.com/canonical/snapd
docs: https://snapcraft.io/
package-manager:
  brew: snap
  debian: snap
  ubuntu: snap
package-manager-url: https://formulae.brew.sh/formula/snap
version: 2.75.2
license: GPL-3.0-only
category: development
tags:
  - cli
description: Tool to work with .snap files
source-archive: https://github.com/canonical/snapd/releases/download/2.75.2/snapd_2.75.2.vendor.tar.xz
dependencies:
  - squashfs
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: snap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:snap
  brew: brew install snap
  debian: sudo apt install snap
  ubuntu: sudo apt install snap
provenance:
  formula: snap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
