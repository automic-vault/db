id: brew:goproxy
display-name: goproxy
homepage: https://goproxy.io/
repo: https://github.com/goproxyio/goproxy
docs: https://goproxy.io/
package-manager:
  brew: goproxy
package-manager-url: https://formulae.brew.sh/formula/goproxy
version: 2.0.7
license: MIT
category: development
tags:
  - cli
description: Global proxy for Go modules
source-archive: https://github.com/goproxyio/goproxy/archive/refs/tags/v2.0.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goproxy
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:goproxy
  brew: brew install goproxy
provenance:
  formula: goproxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
