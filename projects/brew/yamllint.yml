id: brew:yamllint
display-name: yamllint
homepage: https://github.com/adrienverge/yamllint
repo: >
  https://files.pythonhosted.org/packages/28/a0/8fc2d68e132cf918f18273fdc8a1b8432b60d75ac12fdae4b0ef5c9d2e8d/yamllint-1.38.0.tar.gz
docs: https://github.com/adrienverge/yamllint
package-manager:
  apk: yamllint
  brew: yamllint
  debian: yamllint
  dnf: yamllint
  macports: yamllint
  nix: yamllint
  pacman: yamllint
  ubuntu: yamllint
package-manager-url: https://formulae.brew.sh/formula/yamllint
version: 1.38.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
  - yaml
description: Linter for YAML files
source-archive: >
  https://files.pythonhosted.org/packages/28/a0/8fc2d68e132cf918f18273fdc8a1b8432b60d75ac12fdae4b0ef5c9d2e8d/yamllint-1.38.0.tar.gz
dependencies:
  - libyaml
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: yamllint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add yamllint
