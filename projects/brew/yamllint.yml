  dnf: sudo dnf install yamllint
  macports: sudo port install yamllint
  nix: nix profile install nixpkgs#yamllint
  pacman: sudo pacman -S yamllint
  ubuntu: sudo apt install yamllint
provenance:
  formula: yamllint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
