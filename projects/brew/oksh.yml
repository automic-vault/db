id: brew:oksh
display-name: oksh
homepage: https://github.com/ibara/oksh
repo: https://github.com/ibara/oksh
docs: https://github.com/ibara/oksh
package-manager:
  apk: oksh
  brew: oksh
  dnf: oksh
  macports: oksh
  nix: oksh
package-manager-url: https://formulae.brew.sh/formula/oksh
version: 7.8
license: LicenseRef-Homebrew-public-domain AND BSD-3-Clause AND ISC
category: development
tags:
  - cli
description: Portable OpenBSD ksh, based on the public domain Korn shell (pdksh)
source-archive: https://github.com/ibara/oksh/releases/download/oksh-7.8/oksh-7.8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: oksh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add oksh
  av: sudo av install brew:oksh
  brew: brew install oksh
  dnf: sudo dnf install oksh
  macports: sudo port install oksh
  nix: nix profile install nixpkgs#oksh
provenance:
  formula: oksh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
