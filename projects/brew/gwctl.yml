id: brew:gwctl
display-name: gwctl
homepage: https://github.com/kubernetes-sigs/gwctl
repo: https://github.com/kubernetes-sigs/gwctl
docs: https://github.com/kubernetes-sigs/gwctl
package-manager:
  brew: gwctl
package-manager-url: https://formulae.brew.sh/formula/gwctl
version: 0.2.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: CLI for managing and inspecting Gateway API resources in Kubernetes clusters
source-archive: https://github.com/kubernetes-sigs/gwctl/archive/refs/tags/v0.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gwctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gwctl
  brew: brew install gwctl
provenance:
  formula: gwctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
