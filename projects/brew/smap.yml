id: brew:smap
display-name: smap
homepage: https://github.com/s0md3v/Smap
repo: https://github.com/s0md3v/Smap
docs: https://github.com/s0md3v/Smap
package-manager:
  brew: smap
  nix: smap
package-manager-url: https://formulae.brew.sh/formula/smap
version: 0.1.12
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Drop-in replacement for Nmap powered by shodan.io
source-archive: https://github.com/s0md3v/Smap/archive/refs/tags/0.1.12.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: smap
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:smap
  brew: brew install smap
  nix: nix profile install nixpkgs#smap
provenance:
  formula: smap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
