id: brew:feedgnuplot
display-name: feedgnuplot
homepage: https://github.com/dkogan/feedgnuplot
repo: https://github.com/dkogan/feedgnuplot
docs: https://github.com/dkogan/feedgnuplot
package-manager:
  brew: feedgnuplot
  debian: feedgnuplot
  nix: feedgnuplot
  ubuntu: feedgnuplot
package-manager-url: https://formulae.brew.sh/formula/feedgnuplot
version: 1.64
license: GPL-1.0-or-later OR Artistic-1.0
category: development
tags:
  - cli
description: Tool to plot realtime and stored data from the command-line
source-archive: https://github.com/dkogan/feedgnuplot/archive/refs/tags/v1.64.tar.gz
dependencies:
  - gnuplot
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: feedgnuplot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:feedgnuplot
  brew: brew install feedgnuplot
  debian: sudo apt install feedgnuplot
  nix: nix profile install nixpkgs#feedgnuplot
  ubuntu: sudo apt install feedgnuplot
provenance:
  formula: feedgnuplot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
