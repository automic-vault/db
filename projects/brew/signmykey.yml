id: brew:signmykey
display-name: signmykey
homepage: https://signmykey.io/
repo: https://github.com/signmykeyio/signmykey
docs: https://signmykey.io/
package-manager:
  brew: signmykey
package-manager-url: https://formulae.brew.sh/formula/signmykey
version: 0.8.9
license: MIT
category: development
tags:
