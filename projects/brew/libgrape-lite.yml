id: brew:libgrape-lite
display-name: libgrape-lite
homepage: https://github.com/alibaba/libgrape-lite
repo: https://github.com/alibaba/libgrape-lite
docs: https://github.com/alibaba/libgrape-lite
package-manager:
  brew: libgrape-lite
package-manager-url: https://formulae.brew.sh/formula/libgrape-lite
version: 0.3.5
license: Apache-2.0
category: development
tags:
  - cli
description: C++ library for parallel graph processing
source-archive: https://github.com/alibaba/libgrape-lite/archive/refs/tags/v0.3.5.tar.gz
dependencies:
  - gflags
  - glog
  - open-mpi
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: run_app
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libgrape-lite
  brew: brew install libgrape-lite
provenance:
  formula: libgrape-lite
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
