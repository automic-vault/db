id: brew:go-passbolt-cli
display-name: go-passbolt-cli
homepage: https://www.passbolt.com/
repo: https://github.com/passbolt/go-passbolt-cli
docs: https://www.passbolt.com/
package-manager:
  apk: go-passbolt-cli
  brew: go-passbolt-cli
  nix: go-passbolt-cli
  zypper: go-passbolt-cli
package-manager-url: https://formulae.brew.sh/formula/go-passbolt-cli
version: 0.4.2
license: MIT
category: development
tags:
  - cli
description: CLI for passbolt
source-archive: https://github.com/passbolt/go-passbolt-cli/archive/refs/tags/v0.4.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: passbolt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add go-passbolt-cli
  av: sudo av install brew:go-passbolt-cli
  brew: brew install go-passbolt-cli
  nix: nix profile install nixpkgs#go-passbolt-cli
  zypper: sudo zypper install go-passbolt-cli
provenance:
  formula: go-passbolt-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
