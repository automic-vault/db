id: brew:cloudflare-speed-cli
display-name: cloudflare-speed-cli
homepage: https://github.com/kavehtehrani/cloudflare-speed-cli
repo: https://github.com/kavehtehrani/cloudflare-speed-cli
docs: https://github.com/kavehtehrani/cloudflare-speed-cli
package-manager:
  brew: cloudflare-speed-cli
  macports: cloudflare-speed-cli
  pacman: cloudflare-speed-cli
package-manager-url: https://formulae.brew.sh/formula/cloudflare-speed-cli
version: 1.0.1
license: GPL-3.0-only
category: cloud
tags:
  - cli
description: Cloudflare-based speed test with optional TUI
source-archive: https://github.com/kavehtehrani/cloudflare-speed-cli/archive/refs/tags/v1.0.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cloudflare-speed-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloudflare-speed-cli
  brew: brew install cloudflare-speed-cli
  macports: sudo port install cloudflare-speed-cli
  pacman: sudo pacman -S cloudflare-speed-cli
provenance:
  formula: cloudflare-speed-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
