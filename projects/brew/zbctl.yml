id: brew:zbctl
display-name: zbctl
homepage: https://docs.camunda.io/docs/apis-tools/community-clients/cli-client/
repo: https://github.com/camunda-community-hub/zeebe-client-go
docs: https://docs.camunda.io/docs/apis-tools/community-clients/cli-client/
package-manager:
  brew: zbctl
  nix: zbctl
package-manager-url: https://formulae.brew.sh/formula/zbctl
version: 8.6.0
license: Apache-2.0
category: development
tags:
  - cli
description: Zeebe CLI client
source-archive: https://github.com/camunda-community-hub/zeebe-client-go/archive/refs/tags/v8.6.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: zbctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zbctl
  brew: brew install zbctl
  nix: nix profile install nixpkgs#zbctl
provenance:
  formula: zbctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
