id: brew:docker-language-server
display-name: docker-language-server
homepage: https://www.docker.com
repo: https://github.com/docker/docker-language-server
docs: https://www.docker.com
package-manager:
  brew: docker-language-server
  nix: docker-language-server
package-manager-url: https://formulae.brew.sh/formula/docker-language-server
version: 0.20.1
license: Apache-2.0
category: development
tags:
  - cli
  - docker
description: Language server for Dockerfiles, Compose files, and Bake files
source-archive: https://github.com/docker/docker-language-server/archive/refs/tags/v0.20.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: docker-language-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:docker-language-server
  brew: brew install docker-language-server
  nix: nix profile install nixpkgs#docker-language-server
provenance:
  formula: docker-language-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
