id: brew:harper
display-name: harper
homepage: https://github.com/Automattic/harper
repo: https://github.com/Automattic/harper
docs: https://github.com/Automattic/harper
package-manager:
  apk: harper
  brew: harper
  nix: harper
  pacman: harper
  scoop: main/harper
  winget: Automattic.harper-ls
package-manager-url: https://formulae.brew.sh/formula/harper
version: 2.2.1
license: Apache-2.0
category: development
tags:
  - cli
description: Grammar Checker for Developers
source-archive: https://github.com/Automattic/harper/archive/refs/tags/v2.2.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: harper-cli
  - exposure: global executable
    kind: cli
    name: harper-ls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add harper
  av: sudo av install brew:harper
  brew: brew install harper
  nix: nix profile install nixpkgs#harper
  pacman: sudo pacman -S harper
  scoop: scoop install main/harper
  winget: winget install --id Automattic.harper-ls -e
provenance:
  formula: harper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
