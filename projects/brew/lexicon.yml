id: brew:lexicon
display-name: lexicon
homepage: https://github.com/dns-lexicon/dns-lexicon
repo: >
  https://files.pythonhosted.org/packages/4b/37/291063606930c749681b2ad0612952b1bc5374ab2037346566812ba8f2c9/dns_lexicon-3.25.2.tar.gz
docs: https://github.com/dns-lexicon/dns-lexicon
package-manager:
  brew: lexicon
  nix: lexicon
  ubuntu: lexicon
package-manager-url: https://formulae.brew.sh/formula/lexicon
version: 3.25.2
license: MIT
category: development
tags:
  - cli
description: Manipulate DNS records on various DNS providers in a standardized way
source-archive: >
  https://files.pythonhosted.org/packages/4b/37/291063606930c749681b2ad0612952b1bc5374ab2037346566812ba8f2c9/dns_lexicon-3.25.2.tar.gz
dependencies:
  - certifi
  - cryptography
  - libyaml
  - python@3.14
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: lexicon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lexicon
  brew: brew install lexicon
  nix: nix profile install nixpkgs#lexicon
  ubuntu: sudo apt install lexicon
provenance:
  formula: lexicon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
