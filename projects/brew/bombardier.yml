id: brew:bombardier
display-name: bombardier
homepage: https://github.com/codesenberg/bombardier
repo: https://github.com/codesenberg/bombardier
docs: https://github.com/codesenberg/bombardier
package-manager:
  brew: bombardier
  debian: bombardier
  dnf: bombardier
  macports: bombardier
  nix: bombardier
  scoop: main/bombardier
  ubuntu: bombardier
package-manager-url: https://formulae.brew.sh/formula/bombardier
version: 2.0.2
license: MIT
category: development
tags:
  - cli
description: Cross-platform HTTP benchmarking tool
source-archive: https://github.com/codesenberg/bombardier/archive/refs/tags/v2.0.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bombardier
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bombardier
  brew: brew install bombardier
  debian: sudo apt install bombardier
  dnf: sudo dnf install bombardier
  macports: sudo port install bombardier
  nix: nix profile install nixpkgs#bombardier
  scoop: scoop install main/bombardier
  ubuntu: sudo apt install bombardier
provenance:
  formula: bombardier
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
