id: brew:kubehound
display-name: kubehound
homepage: https://kubehound.io
repo: https://github.com/DataDog/KubeHound
docs: https://kubehound.io
package-manager:
  brew: kubehound
package-manager-url: https://formulae.brew.sh/formula/kubehound
version: 1.6.7
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Tool for building Kubernetes attack paths
source-archive: https://github.com/DataDog/KubeHound/archive/refs/tags/v1.6.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubehound
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubehound
  brew: brew install kubehound
provenance:
  formula: kubehound
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
