id: brew:odin
display-name: odin
homepage: https://odin-lang.org/
repo: https://github.com/odin-lang/Odin
docs: https://odin-lang.org/
package-manager:
  apk: odin
  brew: odin
  debian: odin
  macports: odin
  nix: odin
  pacman: odin
  scoop: versions/odin
  ubuntu: odin
  winget: AsimAftab.Odin
package-manager-url: https://formulae.brew.sh/formula/odin
version: 2026-05
license: Zlib
category: development
tags:
  - cli
description: Programming language with focus on simplicity, performance and modern systems
source-archive: https://github.com/odin-lang/Odin.git
dependencies:
  - glfw
  - lld
  - llvm
  - raylib
executables:
  - exposure: global executable
    kind: cli
    name: odin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add odin
  av: sudo av install brew:odin
  brew: brew install odin
  debian: sudo apt install odin
  macports: sudo port install odin
  nix: nix profile install nixpkgs#odin
  pacman: sudo pacman -S odin
  scoop: scoop install versions/odin
  ubuntu: sudo apt install odin
  winget: winget install --id AsimAftab.Odin -e
provenance:
  formula: odin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
