id: brew:libavif
display-name: libavif
homepage: https://github.com/AOMediaCodec/libavif
repo: https://github.com/AOMediaCodec/libavif
docs: https://github.com/AOMediaCodec/libavif
package-manager:
  apk: libavif
  brew: libavif
  dnf: libavif
  macports: libavif
  nix: libavif
  pacman: libavif
  scoop: main/libavif
package-manager-url: https://formulae.brew.sh/formula/libavif
version: 1.4.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: Library for encoding and decoding .avif files
source-archive: https://github.com/AOMediaCodec/libavif/archive/refs/tags/v1.4.2.tar.gz
dependencies:
  - aom
  - dav1d
  - jpeg-turbo
  - libpng
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: avifdec
  - exposure: global executable
    kind: cli
    name: avifenc
  - exposure: global executable
    kind: cli
    name: avifgainmaputil
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libavif
  av: sudo av install brew:libavif
  brew: brew install libavif
  dnf: sudo dnf install libavif
  macports: sudo port install libavif
  nix: nix profile install nixpkgs#libavif
  pacman: sudo pacman -S libavif
  scoop: scoop install main/libavif
provenance:
  formula: libavif
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
