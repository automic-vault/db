id: brew:libwpg
display-name: libwpg
homepage: https://libwpg.sourceforge.net/
repo: https://dev-www.libreoffice.org/src/libwpg-0.3.4.tar.xz
docs: https://libwpg.sourceforge.net/
package-manager:
  apk: libwpg
  brew: libwpg
  dnf: libwpg
  nix: libwpg
  pacman: libwpg
package-manager-url: https://formulae.brew.sh/formula/libwpg
version: 0.3.4
license: LGPL-2.1-only AND MPL-2.0
category: development
tags:
  - cli
description: Library for reading and parsing Word Perfect Graphics format
source-archive: https://dev-www.libreoffice.org/src/libwpg-0.3.4.tar.xz
dependencies:
  - librevenge
  - libwpd
build-dependencies:
  - boost
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: wpg2raw
  - exposure: global executable
    kind: cli
    name: wpg2svg
  - exposure: global executable
    kind: cli
    name: wpg2svgbatch.pl
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libwpg
  av: sudo av install brew:libwpg
  brew: brew install libwpg
  dnf: sudo dnf install libwpg
  nix: nix profile install nixpkgs#libwpg
  pacman: sudo pacman -S libwpg
provenance:
  formula: libwpg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
