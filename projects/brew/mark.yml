id: brew:mark
display-name: mark
homepage: https://github.com/kovetskiy/mark
repo: https://github.com/kovetskiy/mark
docs: https://github.com/kovetskiy/mark
package-manager:
  brew: mark
  nix: mark
package-manager-url: https://formulae.brew.sh/formula/mark
version: 16.4.0
license: Apache-2.0
category: development
tags:
  - cli
description: Sync your markdown files with Confluence pages
source-archive: https://github.com/kovetskiy/mark/archive/refs/tags/v16.4.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mark
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mark
  brew: brew install mark
  nix: nix profile install nixpkgs#mark
provenance:
  formula: mark
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
