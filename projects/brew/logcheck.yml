id: brew:logcheck
display-name: logcheck
homepage: https://packages.debian.org/sid/logcheck
repo: https://deb.debian.org/debian/pool/main/l/logcheck/logcheck_1.4.7.tar.xz
docs: https://packages.debian.org/sid/logcheck
package-manager:
  apk: logcheck
  brew: logcheck
  debian: logcheck
  nix: logcheck
  ubuntu: logcheck
  zypper: logtail
package-manager-url: https://formulae.brew.sh/formula/logcheck
version: 1.4.7
license: GPL-2.0-only
category: network
tags:
  - cli
description: Mail anomalies in the system logfiles to the administrator
source-archive: https://deb.debian.org/debian/pool/main/l/logcheck/logcheck_1.4.7.tar.xz
build-dependencies:
  - gnu-sed
executables:
  - exposure: global executable
    kind: cli
    name: logcheck
  - exposure: global executable
    kind: cli
    name: logcheck-test
  - exposure: global executable
    kind: cli
    name: logtail
  - exposure: global executable
    kind: cli
    name: logtail2
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add logcheck
  av: sudo av install brew:logcheck
  brew: brew install logcheck
  debian: sudo apt install logcheck
  nix: nix profile install nixpkgs#logcheck
  ubuntu: sudo apt install logcheck
  zypper: sudo zypper install logtail
provenance:
  formula: logcheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
