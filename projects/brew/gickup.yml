id: brew:gickup
display-name: gickup
homepage: https://cooperspencer.github.io/gickup-documentation/
repo: https://github.com/cooperspencer/gickup
docs: https://cooperspencer.github.io/gickup-documentation/
package-manager:
  brew: gickup
  nix: gickup
package-manager-url: https://formulae.brew.sh/formula/gickup
version: 0.10.44
license: Apache-2.0
category: development
tags:
  - cli
description: Backup all your repositories with Ease
source-archive: https://github.com/cooperspencer/gickup/archive/refs/tags/v0.10.44.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gickup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gickup
  brew: brew install gickup
  nix: nix profile install nixpkgs#gickup
provenance:
  formula: gickup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
