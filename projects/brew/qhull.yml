id: brew:qhull
display-name: qhull
homepage: http://www.qhull.org/
repo: https://deb.debian.org/debian/pool/main/q/qhull/qhull_2020.2.orig.tar.gz
docs: http://www.qhull.org/
package-manager:
  apk: qhull
  brew: qhull
  dnf: qhull
  macports: qhull
  nix: qhull
  pacman: qhull
  zypper: qhull
package-manager-url: https://formulae.brew.sh/formula/qhull
version: 2020.2
license: Qhull
category: network
tags:
  - cli
description: Computes convex hulls in n dimensions
source-archive: https://deb.debian.org/debian/pool/main/q/qhull/qhull_2020.2.orig.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: qconvex
  - exposure: global executable
    kind: cli
    name: qdelaunay
  - exposure: global executable
    kind: cli
    name: qhalf
  - exposure: global executable
    kind: cli
    name: qhull
  - exposure: global executable
    kind: cli
    name: qvoronoi
  - exposure: global executable
    kind: cli
    name: rbox
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add qhull
  av: sudo av install brew:qhull
  brew: brew install qhull
  dnf: sudo dnf install qhull
  macports: sudo port install qhull
  nix: nix profile install nixpkgs#qhull
  pacman: sudo pacman -S qhull
  zypper: sudo zypper install qhull
provenance:
  formula: qhull
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
