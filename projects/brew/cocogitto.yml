id: brew:cocogitto
display-name: cocogitto
homepage: https://docs.cocogitto.io/
repo: https://github.com/cocogitto/cocogitto
docs: https://docs.cocogitto.io/
package-manager:
  apk: cocogitto
  brew: cocogitto
  debian: cog
  macports: cocogitto
  nix: cocogitto
  pacman: cocogitto
  scoop: main/cocogitto
  zypper: cog
package-manager-url: https://formulae.brew.sh/formula/cocogitto
version: 7.0.0
license: MIT
category: development
tags:
  - cli
description: Conventional Commits toolbox
source-archive: https://github.com/cocogitto/cocogitto/archive/refs/tags/7.0.0.tar.gz
dependencies:
  - libgit2
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cocogitto
  av: sudo av install brew:cocogitto
  brew: brew install cocogitto
  debian: sudo apt install cog
  macports: sudo port install cocogitto
  nix: nix profile install nixpkgs#cocogitto
  pacman: sudo pacman -S cocogitto
  scoop: scoop install main/cocogitto
  zypper: sudo zypper install cog
provenance:
  formula: cocogitto
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
