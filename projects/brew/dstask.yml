id: brew:dstask
display-name: dstask
homepage: https://github.com/naggie/dstask
repo: https://github.com/naggie/dstask
docs: https://github.com/naggie/dstask
package-manager:
  apk: dstask
  brew: dstask
  macports: dstask
  nix: dstask
package-manager-url: https://formulae.brew.sh/formula/dstask
version: 1.0.1
license: MIT
category: development
tags:
  - cli
  - git
description: Git-powered personal task tracker
source-archive: https://github.com/naggie/dstask/archive/refs/tags/v1.0.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dstask
  - exposure: global executable
    kind: cli
    name: dstask-import
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dstask
  av: sudo av install brew:dstask
  brew: brew install dstask
  macports: sudo port install dstask
  nix: nix profile install nixpkgs#dstask
provenance:
  formula: dstask
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
