id: brew:thrax
display-name: thrax
homepage: https://www.openfst.org/twiki/bin/view/GRM/Thrax
repo: https://www.openfst.org/twiki/pub/GRM/ThraxDownload/thrax-1.3.10.tar.gz
docs: https://www.openfst.org/twiki/bin/view/GRM/Thrax
package-manager:
  brew: thrax
package-manager-url: https://formulae.brew.sh/formula/thrax
version: 1.3.10
license: Apache-2.0
category: network
tags:
  - cli
description: Tools for compiling grammars into finite state transducers
source-archive: https://www.openfst.org/twiki/pub/GRM/ThraxDownload/thrax-1.3.10.tar.gz
dependencies:
  - openfst
build-dependencies:
  - autoconf
  - automake
  - libtool
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: thraxcompiler
  - exposure: global executable
    kind: cli
    name: thraxmakedep
  - exposure: global executable
    kind: cli
    name: thraxrandom-generator
  - exposure: global executable
    kind: cli
    name: thraxrewrite-tester
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:thrax
  brew: brew install thrax
provenance:
  formula: thrax
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
