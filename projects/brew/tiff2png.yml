id: brew:tiff2png
display-name: tiff2png
homepage: http://www.libpng.org/pub/png/apps/tiff2png.html
repo: https://github.com/rillian/tiff2png
docs: http://www.libpng.org/pub/png/apps/tiff2png.html
package-manager:
  brew: tiff2png
package-manager-url: https://formulae.brew.sh/formula/tiff2png
version: 0.92
license: ISC
category: development
tags:
  - cli
description: TIFF to PNG converter
source-archive: https://github.com/rillian/tiff2png/archive/refs/tags/v0.92.tar.gz
dependencies:
  - jpeg-turbo
  - libpng
  - libtiff
executables:
  - exposure: global executable
    kind: cli
    name: tiff2png
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tiff2png
  brew: brew install tiff2png
provenance:
  formula: tiff2png
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
