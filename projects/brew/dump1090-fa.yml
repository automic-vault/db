id: brew:dump1090-fa
display-name: dump1090-fa
homepage: https://github.com/flightaware/dump1090
repo: https://github.com/flightaware/dump1090
docs: https://github.com/flightaware/dump1090
package-manager:
  apk: dump1090
  brew: dump1090-fa
  dnf: dump1090
  nix: dump1090-fa
  zypper: dump1090-fa
package-manager-url: https://formulae.brew.sh/formula/dump1090-fa
version: 11.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: FlightAware ADS-B Ground Station System for SDRs
source-archive: https://github.com/flightaware/dump1090/archive/refs/tags/v11.0.tar.gz
dependencies:
  - libbladerf
  - librtlsdr
  - ncurses
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dump1090
  - exposure: global executable
    kind: cli
    name: view1090
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dump1090
  av: sudo av install brew:dump1090-fa
  brew: brew install dump1090-fa
  dnf: sudo dnf install dump1090
  nix: nix profile install nixpkgs#dump1090-fa
  zypper: sudo zypper install dump1090-fa
provenance:
  formula: dump1090-fa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
