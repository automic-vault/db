id: brew:ladspa-sdk
display-name: ladspa-sdk
homepage: https://www.ladspa.org
repo: https://www.ladspa.org/download/ladspa_sdk_1.17.tgz
docs: https://www.ladspa.org
package-manager:
  brew: ladspa-sdk
  debian: ladspa-sdk
  nix: ladspa-sdk
  ubuntu: ladspa-sdk
package-manager-url: https://formulae.brew.sh/formula/ladspa-sdk
version: 1.17
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Linux Audio Developer's Simple Plugin
source-archive: https://www.ladspa.org/download/ladspa_sdk_1.17.tgz
dependencies:
  - libsndfile
executables:
  - exposure: global executable
    kind: cli
    name: analyseplugin
  - exposure: global executable
    kind: cli
    name: applyplugin
  - exposure: global executable
    kind: cli
    name: listplugins
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ladspa-sdk
  brew: brew install ladspa-sdk
  debian: sudo apt install ladspa-sdk
  nix: nix profile install nixpkgs#ladspa-sdk
  ubuntu: sudo apt install ladspa-sdk
provenance:
  formula: ladspa-sdk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
