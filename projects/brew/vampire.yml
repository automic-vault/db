id: brew:vampire
display-name: vampire
homepage: https://vprover.github.io/
repo: https://github.com/vprover/vampire
docs: https://vprover.github.io/
package-manager:
  brew: vampire
  macports: vampire
  nix: vampire
package-manager-url: https://formulae.brew.sh/formula/vampire
version: 5.0.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: High-performance theorem prover
source-archive: https://github.com/vprover/vampire/releases/download/v5.0.1/vampire.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: vampire
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vampire
  brew: brew install vampire
  macports: sudo port install vampire
  nix: nix profile install nixpkgs#vampire
provenance:
  formula: vampire
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
