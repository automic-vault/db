id: brew:jlog
display-name: jlog
homepage: https://labs.omniti.com/labs/jlog
repo: https://github.com/omniti-labs/jlog
docs: https://labs.omniti.com/labs/jlog
package-manager:
  brew: jlog
package-manager-url: https://formulae.brew.sh/formula/jlog
version: 2.6.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Pure C message queue with subscribers and publishers for logs
source-archive: https://github.com/omniti-labs/jlog/archive/refs/tags/2.6.0.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: jlog_change_endian
  - exposure: global executable
    kind: cli
    name: jlog_sanity_check
  - exposure: global executable
    kind: cli
    name: jlogctl
  - exposure: global executable
    kind: cli
    name: jlogtail
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jlog
  brew: brew install jlog
provenance:
  formula: jlog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
