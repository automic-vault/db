id: brew:levant
display-name: levant
homepage: https://github.com/hashicorp/levant
repo: https://github.com/hashicorp/levant
docs: https://github.com/hashicorp/levant
package-manager:
  brew: levant
  nix: levant
package-manager-url: https://formulae.brew.sh/formula/levant
version: 0.4.0
license: MPL-2.0
category: development
tags:
  - cli
description: Templating and deployment tool for HashiCorp Nomad jobs
source-archive: https://github.com/hashicorp/levant/archive/refs/tags/v0.4.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: levant
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:levant
  brew: brew install levant
  nix: nix profile install nixpkgs#levant
provenance:
  formula: levant
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
