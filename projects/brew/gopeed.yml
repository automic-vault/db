id: brew:gopeed
display-name: gopeed
homepage: https://gopeed.com
repo: https://github.com/GopeedLab/gopeed
docs: https://gopeed.com
package-manager:
  brew: gopeed
  nix: gopeed
  scoop: extras/gopeed
  winget: monkeyWie.Gopeed
package-manager-url: https://formulae.brew.sh/formula/gopeed
version: 1.9.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Modern download manager that supports all platform
source-archive: https://github.com/GopeedLab/gopeed/archive/refs/tags/v1.9.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gopeed
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gopeed
  brew: brew install gopeed
  nix: nix profile install nixpkgs#gopeed
  scoop: scoop install extras/gopeed
  winget: winget install --id monkeyWie.Gopeed -e
provenance:
  formula: gopeed
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
