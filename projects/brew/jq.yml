id: brew:jq
display-name: jq
homepage: https://jqlang.github.io/jq/
repo: https://github.com/jqlang/jq
docs: https://jqlang.github.io/jq/
package-manager:
  apk: jq
  brew: jq
  chocolatey: jq
  debian: jq
  dnf: jq
  macports: jq
  nix: jq
  pacman: jq
  scoop: main/jq
  ubuntu: jq
  winget: jqlang.jq
  zypper: jq
package-manager-url: https://formulae.brew.sh/formula/jq
version: 1.8.1
license: MIT
category: development
tags:
  - cli
  - json
description: Lightweight and flexible command-line JSON processor
source-archive: https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-1.8.1.tar.gz
dependencies:
  - oniguruma
executables:
  - exposure: global executable
    kind: cli
    name: jq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jq
  av: sudo av install brew:jq
  brew: brew install jq
  chocolatey: choco install jq
  debian: sudo apt install jq
  dnf: sudo dnf install jq
  macports: sudo port install jq
  nix: nix profile install nixpkgs#jq
  pacman: sudo pacman -S jq
  scoop: scoop install main/jq
  ubuntu: sudo apt install jq
  winget: winget install --id jqlang.jq -e
  zypper: sudo zypper install jq
provenance:
  formula: jq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
