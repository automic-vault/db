id: brew:jenkins-lts
display-name: jenkins-lts
homepage: https://www.jenkins.io/
repo: https://get.jenkins.io/war-stable/2.555.2/jenkins.war
docs: https://www.jenkins.io/
package-manager:
  brew: jenkins-lts
  scoop: main/jenkins-lts
package-manager-url: https://formulae.brew.sh/formula/jenkins-lts
version: 2.555.2
license: MIT
category: network
tags:
  - cli
description: Extendable open source continuous integration server
source-archive: https://get.jenkins.io/war-stable/2.555.2/jenkins.war
dependencies:
  - openjdk@21
executables:
  - exposure: global executable
    kind: cli
    name: jenkins-lts
  - exposure: global executable
    kind: cli
    name: jenkins-lts-cli
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Note: When using launchctl the port will be 8080.'
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:jenkins-lts
  brew: brew install jenkins-lts
  scoop: scoop install main/jenkins-lts
provenance:
  formula: jenkins-lts
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
