id: brew:libirecovery
display-name: libirecovery
homepage: https://www.libimobiledevice.org/
repo: https://github.com/libimobiledevice/libirecovery
docs: https://www.libimobiledevice.org/
package-manager:
  apk: libirecovery
  brew: libirecovery
  debian: irecovery
  dnf: libirecovery
  macports: libirecovery
  nix: libirecovery
  ubuntu: irecovery
package-manager-url: https://formulae.brew.sh/formula/libirecovery
version: 1.3.1
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Library and utility to talk to iBoot/iBSS via USB
source-archive: >
  https://github.com/libimobiledevice/libirecovery/releases/download/1.3.1/libirecovery-1.3.1.tar.bz2
dependencies:
  - libimobiledevice-glue
  - libplist
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: irecovery
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libirecovery
  av: sudo av install brew:libirecovery
  brew: brew install libirecovery
  debian: sudo apt install irecovery
  dnf: sudo dnf install libirecovery
  macports: sudo port install libirecovery
  nix: nix profile install nixpkgs#libirecovery
  ubuntu: sudo apt install irecovery
provenance:
  formula: libirecovery
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
