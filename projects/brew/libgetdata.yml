id: brew:libgetdata
display-name: libgetdata
homepage: https://getdata.sourceforge.net/
repo: https://downloads.sourceforge.net/project/getdata/getdata/0.11.0/getdata-0.11.0.tar.xz
docs: https://getdata.sourceforge.net/
package-manager:
  brew: libgetdata
package-manager-url: https://formulae.brew.sh/formula/libgetdata
version: 0.11.0
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Reference implementation of the Dirfile Standards
source-archive: https://downloads.sourceforge.net/project/getdata/getdata/0.11.0/getdata-0.11.0.tar.xz
dependencies:
  - libtool
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: checkdirfile
  - exposure: global executable
    kind: cli
    name: dirfile2ascii
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libgetdata
  brew: brew install libgetdata
provenance:
  formula: libgetdata
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
