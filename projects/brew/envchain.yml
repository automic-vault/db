id: brew:envchain
display-name: envchain
homepage: https://github.com/sorah/envchain
repo: https://github.com/sorah/envchain
docs: https://github.com/sorah/envchain
package-manager:
  brew: envchain
  nix: envchain
package-manager-url: https://formulae.brew.sh/formula/envchain
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Secure your credentials in environment variables
source-archive: https://github.com/sorah/envchain/archive/refs/tags/v1.1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: envchain
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:envchain
  brew: brew install envchain
  nix: nix profile install nixpkgs#envchain
provenance:
  formula: envchain
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
