id: brew:blocky
display-name: blocky
homepage: https://0xerr0r.github.io/blocky/
repo: https://github.com/0xerr0r/blocky
docs: https://0xerr0r.github.io/blocky/
package-manager:
  apk: blocky
  brew: blocky
  nix: blocky
package-manager-url: https://formulae.brew.sh/formula/blocky
version: 0.30.0
license: Apache-2.0
category: development
tags:
  - cli
description: Fast and lightweight DNS proxy as ad-blocker for local network
source-archive: https://github.com/0xerr0r/blocky/archive/refs/tags/v0.30.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: blocky
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add blocky
  av: sudo av install brew:blocky
  brew: brew install blocky
  nix: nix profile install nixpkgs#blocky
provenance:
  formula: blocky
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
