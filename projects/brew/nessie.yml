id: brew:nessie
display-name: nessie
homepage: https://projectnessie.org
repo: https://github.com/projectnessie/nessie
docs: https://projectnessie.org
package-manager:
  brew: nessie
package-manager-url: https://formulae.brew.sh/formula/nessie
version: 0.107.6
license: Apache-2.0
category: development
tags:
  - cli
  - git
description: Transactional Catalog for Data Lakes with Git-like semantics
source-archive: https://github.com/projectnessie/nessie/archive/refs/tags/nessie-0.107.6.tar.gz
dependencies:
  - openjdk@21
build-dependencies:
  - gradle
executables:
  - exposure: global executable
    kind: cli
    name: nessie
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:nessie
  brew: brew install nessie
provenance:
  formula: nessie
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
