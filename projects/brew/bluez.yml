id: brew:bluez
display-name: bluez
homepage: https://www.bluez.org
repo: https://mirrors.edge.kernel.org/pub/linux/bluetooth/bluez-5.86.tar.xz
docs: https://www.bluez.org
package-manager:
  apk: bluez
  brew: bluez
  debian: bluez
  dnf: bluez
  macports: bluemoon
  nix: bluez
  pacman: bluez
  ubuntu: bluez
  zypper: bluez
package-manager-url: https://formulae.brew.sh/formula/bluez
version: 5.86
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Bluetooth protocol stack for Linux
source-archive: https://mirrors.edge.kernel.org/pub/linux/bluetooth/bluez-5.86.tar.xz
dependencies:
  - dbus
  - glib
  - libical
  - readline
  - systemd
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: bluemoon
  - exposure: global executable
    kind: cli
    name: bluetoothctl
  - exposure: global executable
    kind: cli
    name: btattach
  - exposure: global executable
    kind: cli
    name: btmon
  - exposure: global executable
    kind: cli
    name: hex2hcd
  - exposure: global executable
    kind: cli
    name: isotest
  - exposure: global executable
    kind: cli
    name: l2ping
  - exposure: global executable
    kind: cli
    name: l2test
  - exposure: global executable
    kind: cli
    name: mpris-proxy
  - exposure: global executable
    kind: cli
    name: rctest
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bluez
  av: sudo av install brew:bluez
  brew: brew install bluez
  debian: sudo apt install bluez
  dnf: sudo dnf install bluez
  macports: sudo port install bluemoon
  nix: nix profile install nixpkgs#bluez
  pacman: sudo pacman -S bluez
  ubuntu: sudo apt install bluez
  zypper: sudo zypper install bluez
provenance:
  formula: bluez
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
