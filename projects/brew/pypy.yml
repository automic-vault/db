id: brew:pypy
display-name: pypy
homepage: https://pypy.org/
repo: https://downloads.python.org/pypy/pypy2.7-v7.3.23-src.tar.bz2
docs: https://pypy.org/
package-manager:
  apk: pypy
  brew: pypy
  dnf: pypy
  macports: pypy
  nix: pypy
  pacman: pypy
package-manager-url: https://formulae.brew.sh/formula/pypy
version: 7.3.23
license: MIT
category: network
tags:
  - cli
description: Highly performant implementation of Python 2 in Python
source-archive: https://downloads.python.org/pypy/pypy2.7-v7.3.23-src.tar.bz2
dependencies:
  - gdbm
  - openssl@3
  - sqlite
  - tcl-tk@8
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
  - expat
  - libffi
  - ncurses
  - unzip
executables:
  - exposure: global executable
    kind: cli
    name: pypy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    A "distutils.cfg" has been written to:
    $HOMEBREW_CELLAR/pypy/7.3.23/libexec/lib-python/2.7/distutils specifying the
    install-scripts folder as: $HOMEBREW_PREFIX/share/pypy If you install Python
    packages via "pypy setup.py install", easy_install_pypy, or pip_pypy, any provided
    scripts will go into the install-scripts folder above, so you may want to add it to
    your PATH *after* $HOMEBREW_PREFIX/bin so you don't overwrite tools from CPython.
    Setuptools and pip have been installed, so you can use easy_install_pypy and
    pip_pypy. To update setuptools and pip between pypy releases, run: pip_pypy install
    --upgrade pip setuptools See: https://docs.brew.sh/Homebrew-and-Python
  post-install-defined: true
install-lines:
  apk: sudo apk add pypy
  av: sudo av install brew:pypy
  brew: brew install pypy
  dnf: sudo dnf install pypy
  macports: sudo port install pypy
  nix: nix profile install nixpkgs#pypy
  pacman: sudo pacman -S pypy
provenance:
  formula: pypy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
