id: brew:sylph
display-name: sylph
homepage: https://github.com/bluenote-1577/sylph
repo: https://github.com/bluenote-1577/sylph
docs: https://github.com/bluenote-1577/sylph
package-manager:
  brew: sylph
package-manager-url: https://formulae.brew.sh/formula/sylph
version: 0.9.0
license: MIT
category: development
tags:
  - cli
description: Ultrafast taxonomic profiling and genome querying for metagenomic samples
source-archive: https://github.com/bluenote-1577/sylph/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sylph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sylph
  brew: brew install sylph
provenance:
  formula: sylph
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
