id: brew:tenyr
display-name: tenyr
homepage: https://kulp.github.io/tenyr/
repo: https://github.com/kulp/tenyr
docs: https://kulp.github.io/tenyr/
package-manager:
  brew: tenyr
package-manager-url: https://formulae.brew.sh/formula/tenyr
version: 0.9.9
license: MIT
category: development
tags:
  - cli
description: 32-bit computing environment (including simulated CPU)
source-archive: https://github.com/kulp/tenyr/archive/refs/tags/v0.9.9.tar.gz
dependencies:
  - sdl2
  - sdl2_image
build-dependencies:
  - bison
executables:
  - exposure: global executable
    kind: cli
    name: tas
  - exposure: global executable
    kind: cli
    name: tld
  - exposure: global executable
    kind: cli
    name: tsim
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tenyr
  brew: brew install tenyr
provenance:
  formula: tenyr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
