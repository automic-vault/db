id: brew:conserver
display-name: conserver
homepage: https://www.conserver.com/
repo: https://github.com/bstansell/conserver
docs: https://www.conserver.com/
package-manager:
  apk: conserver
  brew: conserver
  dnf: conserver
  nix: conserver
package-manager-url: https://formulae.brew.sh/formula/conserver
version: 8.3.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Allows multiple users to watch a serial console at the same time
source-archive: https://github.com/bstansell/conserver/releases/download/v8.3.0/conserver-8.3.0.tar.gz
dependencies:
  - openssl@3
uses-from-macos:
  - krb5
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: conserver
  - exposure: global executable
    kind: cli
    name: console
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add conserver
  av: sudo av install brew:conserver
  brew: brew install conserver
  dnf: sudo dnf install conserver
  nix: nix profile install nixpkgs#conserver
provenance:
  formula: conserver
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
