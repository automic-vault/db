id: brew:cava
display-name: cava
homepage: https://github.com/karlstav/cava
repo: https://github.com/karlstav/cava
docs: https://github.com/karlstav/cava
package-manager:
  apk: cava
  brew: cava
  debian: cava
  dnf: cava
  macports: cava
  nix: cava
  pacman: cava
  ubuntu: cava
  winget: karlstav.cava
  zypper: cava
package-manager-url: https://formulae.brew.sh/formula/cava
version: 0.10.7
license: MIT
category: development
tags:
  - cli
description: Console-based Audio Visualizer for ALSA
source-archive: https://github.com/karlstav/cava/archive/refs/tags/0.10.7.tar.gz
dependencies:
  - fftw
  - iniparser
  - portaudio
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cava
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cava
  av: sudo av install brew:cava
  brew: brew install cava
  debian: sudo apt install cava
  dnf: sudo dnf install cava
  macports: sudo port install cava
  nix: nix profile install nixpkgs#cava
  pacman: sudo pacman -S cava
  ubuntu: sudo apt install cava
  winget: winget install --id karlstav.cava -e
  zypper: sudo zypper install cava
provenance:
  formula: cava
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
