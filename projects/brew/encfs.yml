id: brew:encfs
display-name: encfs
homepage: https://vgough.github.io/encfs/
repo: https://github.com/vgough/encfs
docs: https://vgough.github.io/encfs/
package-manager:
  apk: encfs
  brew: encfs
  debian: encfs
  macports: encfs
  nix: encfs
  pacman: encfs
  ubuntu: encfs
  zypper: encfs
package-manager-url: https://formulae.brew.sh/formula/encfs
version: 1.9.5
license: GPL-3.0-or-later
category: security
tags:
  - cli
description: Encrypted pass-through FUSE file system
source-archive: https://github.com/vgough/encfs/archive/refs/tags/v1.9.5.tar.gz
dependencies:
  - libfuse@2
  - openssl@4
  - tinyxml2
build-dependencies:
  - cmake
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: encfs
  - exposure: global executable
    kind: cli
    name: encfsctl
  - exposure: global executable
    kind: cli
    name: encfssh
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add encfs
  av: sudo av install brew:encfs
  brew: brew install encfs
  debian: sudo apt install encfs
  macports: sudo port install encfs
  nix: nix profile install nixpkgs#encfs
  pacman: sudo pacman -S encfs
  ubuntu: sudo apt install encfs
  zypper: sudo zypper install encfs
provenance:
  formula: encfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
