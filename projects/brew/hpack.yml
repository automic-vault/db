id: brew:hpack
display-name: hpack
homepage: https://github.com/sol/hpack
repo: https://hackage.haskell.org/package/hpack-0.39.5/hpack-0.39.5.tar.gz
docs: https://github.com/sol/hpack
package-manager:
  brew: hpack
  debian: hpack
  nix: hpack
  ubuntu: hpack
package-manager-url: https://formulae.brew.sh/formula/hpack
version: 0.39.5
license: MIT
category: development
tags:
  - cli
description: Modern format for Haskell packages
source-archive: https://hackage.haskell.org/package/hpack-0.39.5/hpack-0.39.5.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: hpack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hpack
  brew: brew install hpack
  debian: sudo apt install hpack
  nix: nix profile install nixpkgs#hpack
  ubuntu: sudo apt install hpack
provenance:
  formula: hpack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
