id: brew:trzsz-ssh
display-name: trzsz-ssh
homepage: https://trzsz.github.io/tssh
repo: https://github.com/trzsz/trzsz-ssh
docs: https://trzsz.github.io/tssh
package-manager:
  brew: trzsz-ssh
  nix: trzsz-ssh
  scoop: main/tssh
  winget: trzsz.tssh
package-manager-url: https://formulae.brew.sh/formula/trzsz-ssh
version: 0.1.25
license: MIT
category: development
tags:
  - cli
description: Highly OpenSSH-compatible client with extended features
source-archive: https://github.com/trzsz/trzsz-ssh/archive/refs/tags/v0.1.25.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tssh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:trzsz-ssh
  brew: brew install trzsz-ssh
  nix: nix profile install nixpkgs#trzsz-ssh
  scoop: scoop install main/tssh
  winget: winget install --id trzsz.tssh -e
provenance:
  formula: trzsz-ssh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
