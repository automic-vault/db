id: brew:prestd
display-name: prestd
homepage: https://github.com/prest/prest
repo: https://github.com/prest/prest
docs: https://github.com/prest/prest
package-manager:
  brew: prestd
package-manager-url: https://formulae.brew.sh/formula/prestd
version: 1.5.5
license: MIT
category: database
tags:
  - cli
description: Simplify and accelerate development on any Postgres application, existing or new
source-archive: https://github.com/prest/prest/archive/refs/tags/v1.5.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: prestd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:prestd
  brew: brew install prestd
provenance:
  formula: prestd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
