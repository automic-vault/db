id: brew:wllvm
display-name: wllvm
homepage: https://pypi.org/project/wllvm/
repo: >
  https://files.pythonhosted.org/packages/4b/df/31d7519052bc21d0e9771e9a6540d6310bfb13bae7dacde060d8f647b8d3/wllvm-1.3.1.tar.gz
docs: https://pypi.org/project/wllvm/
package-manager:
  brew: wllvm
  nix: wllvm
package-manager-url: https://formulae.brew.sh/formula/wllvm
version: 1.3.1
license: MIT
category: development
tags:
  - cli
description: Toolkit for building whole-program LLVM bitcode files
source-archive: >
  https://files.pythonhosted.org/packages/4b/df/31d7519052bc21d0e9771e9a6540d6310bfb13bae7dacde060d8f647b8d3/wllvm-1.3.1.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: extract-bc
  - exposure: global executable
    kind: cli
    name: wfortran
  - exposure: global executable
    kind: cli
    name: wllvm
  - exposure: global executable
    kind: cli
    name: wllvm++
  - exposure: global executable
    kind: cli
    name: wllvm-as
  - exposure: global executable
    kind: cli
    name: wllvm-sanity-checker
  - exposure: global executable
    kind: cli
    name: wparse-args
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wllvm
  brew: brew install wllvm
  nix: nix profile install nixpkgs#wllvm
provenance:
  formula: wllvm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
