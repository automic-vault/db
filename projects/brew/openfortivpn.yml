id: brew:openfortivpn
display-name: openfortivpn
homepage: https://github.com/adrienverge/openfortivpn
repo: https://github.com/adrienverge/openfortivpn
docs: https://github.com/adrienverge/openfortivpn
package-manager:
  apk: openfortivpn
  brew: openfortivpn
  debian: openfortivpn
  dnf: openfortivpn
  macports: openfortivpn
  nix: openfortivpn
  pacman: openfortivpn
  ubuntu: openfortivpn
  zypper: openfortivpn
package-manager-url: https://formulae.brew.sh/formula/openfortivpn
version: 1.24.1
license: GPL-3.0-or-later WITH cryptsetup-OpenSSL-exception
category: security
tags:
  - cli
description: Open Fortinet client for PPP+TLS VPN tunnel services
source-archive: https://github.com/adrienverge/openfortivpn/archive/refs/tags/v1.24.1.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: openfortivpn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add openfortivpn
  av: sudo av install brew:openfortivpn
  brew: brew install openfortivpn
  debian: sudo apt install openfortivpn
  dnf: sudo dnf install openfortivpn
  macports: sudo port install openfortivpn
  nix: nix profile install nixpkgs#openfortivpn
  pacman: sudo pacman -S openfortivpn
  ubuntu: sudo apt install openfortivpn
  zypper: sudo zypper install openfortivpn
provenance:
  formula: openfortivpn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
