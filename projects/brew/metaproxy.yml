id: brew:metaproxy
display-name: metaproxy
homepage: https://www.indexdata.com/resources/software/metaproxy/
repo: https://ftp.indexdata.com/pub/metaproxy/metaproxy-1.22.4.tar.gz
docs: https://www.indexdata.com/resources/software/metaproxy/
package-manager:
  brew: metaproxy
  macports: metaproxy
package-manager-url: https://formulae.brew.sh/formula/metaproxy
version: 1.22.4
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Z39.50 proxy and router utilizing Yaz toolkit
source-archive: https://ftp.indexdata.com/pub/metaproxy/metaproxy-1.22.4.tar.gz
dependencies:
  - boost
  - yaz
  - yazpp
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: metaproxy
  - exposure: global executable
    kind: cli
    name: metaproxy-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:metaproxy
  brew: brew install metaproxy
  macports: sudo port install metaproxy
provenance:
  formula: metaproxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
