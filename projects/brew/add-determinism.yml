id: brew:add-determinism
display-name: add-determinism
homepage: https://github.com/keszybz/add-determinism
repo: https://github.com/keszybz/add-determinism
docs: https://github.com/keszybz/add-determinism
package-manager:
  brew: add-determinism
  dnf: add-determinism
  nix: add-determinism
  pacman: add-determinism
package-manager-url: https://formulae.brew.sh/formula/add-determinism
version: 0.7.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Build postprocessor to reset metadata fields for build reproducibility
source-archive: https://github.com/keszybz/add-determinism/archive/refs/tags/v0.7.3.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: add-det
  - exposure: global executable
    kind: cli
    name: linkdupes
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:add-determinism
  brew: brew install add-determinism
  dnf: sudo dnf install add-determinism
  nix: nix profile install nixpkgs#add-determinism
  pacman: sudo pacman -S add-determinism
provenance:
  formula: add-determinism
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
