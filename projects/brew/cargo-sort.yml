id: brew:cargo-sort
display-name: cargo-sort
homepage: https://github.com/devinr528/cargo-sort
repo: https://github.com/DevinR528/cargo-sort
docs: https://github.com/devinr528/cargo-sort
package-manager:
  apk: cargo-sort
  brew: cargo-sort
  nix: cargo-sort
  pacman: cargo-sort
package-manager-url: https://formulae.brew.sh/formula/cargo-sort
version: 2.1.4
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Tool to check that your Cargo.toml dependencies are sorted alphabetically
source-archive: https://github.com/DevinR528/cargo-sort/archive/refs/tags/v2.1.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-sort
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-sort
  av: sudo av install brew:cargo-sort
  brew: brew install cargo-sort
  nix: nix profile install nixpkgs#cargo-sort
  pacman: sudo pacman -S cargo-sort
provenance:
  formula: cargo-sort
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
