id: brew:libexosip
display-name: libexosip
homepage: https://savannah.nongnu.org/projects/exosip
repo: https://download.savannah.gnu.org/releases/exosip/libexosip2-5.3.0.tar.gz
docs: https://savannah.nongnu.org/projects/exosip
package-manager:
  brew: libexosip
  nix: libexosip
package-manager-url: https://formulae.brew.sh/formula/libexosip
version: 5.3.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Toolkit for eXosip2
source-archive: https://download.savannah.gnu.org/releases/exosip/libexosip2-5.3.0.tar.gz
dependencies:
  - c-ares
  - libosip
  - openssl@3
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: sip_monitor
  - exposure: global executable
    kind: cli
    name: sip_reg
  - exposure: global executable
    kind: cli
    name: sip_storm
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libexosip
  brew: brew install libexosip
  nix: nix profile install nixpkgs#libexosip
provenance:
  formula: libexosip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
