id: brew:fd
display-name: fd
homepage: https://github.com/sharkdp/fd
repo: https://github.com/sharkdp/fd
docs: https://github.com/sharkdp/fd
package-manager:
  apk: fd
  brew: fd
  chocolatey: fd
  macports: fd
  nix: fd
  pacman: fd
  scoop: main/fd
  winget: sharkdp.fd
  zypper: fd
package-manager-url: https://formulae.brew.sh/formula/fd
version: 10.4.2
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Simple, fast and user-friendly alternative to find
source-archive: https://github.com/sharkdp/fd/archive/refs/tags/v10.4.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fd
  av: sudo av install brew:fd
  brew: brew install fd
  chocolatey: choco install fd
  macports: sudo port install fd
  nix: nix profile install nixpkgs#fd
  pacman: sudo pacman -S fd
  scoop: scoop install main/fd
  winget: winget install --id sharkdp.fd -e
  zypper: sudo zypper install fd
provenance:
  formula: fd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
