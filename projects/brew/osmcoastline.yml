id: brew:osmcoastline
display-name: osmcoastline
homepage: https://osmcode.org/osmcoastline/
repo: https://github.com/osmcode/osmcoastline
docs: https://osmcode.org/osmcoastline/
package-manager:
  brew: osmcoastline
  debian: osmcoastline
  ubuntu: osmcoastline
package-manager-url: https://formulae.brew.sh/formula/osmcoastline
version: 2.5.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Extracts coastline data from OpenStreetMap planet file
source-archive: https://github.com/osmcode/osmcoastline/archive/refs/tags/v2.5.0.tar.gz
dependencies:
  - gdal
  - geos
  - libspatialite
  - lz4
build-dependencies:
  - cmake
  - libosmium
  - protozero
uses-from-macos:
  - bzip2
  - expat
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: osmcoastline
  - exposure: global executable
    kind: cli
    name: osmcoastline_filter
  - exposure: global executable
    kind: cli
    name: osmcoastline_readmeta
  - exposure: global executable
    kind: cli
    name: osmcoastline_segments
  - exposure: global executable
    kind: cli
    name: osmcoastline_ways
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:osmcoastline
  brew: brew install osmcoastline
  debian: sudo apt install osmcoastline
  ubuntu: sudo apt install osmcoastline
provenance:
  formula: osmcoastline
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
