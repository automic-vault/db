id: brew:terraform-module-versions
display-name: terraform-module-versions
homepage: https://github.com/keilerkonzept/terraform-module-versions
repo: https://github.com/keilerkonzept/terraform-module-versions
docs: https://github.com/keilerkonzept/terraform-module-versions
package-manager:
  brew: terraform-module-versions
package-manager-url: https://formulae.brew.sh/formula/terraform-module-versions
version: 3.3.13
license: MIT
category: cloud
tags:
  - cli
description: CLI that checks Terraform code for module updates
source-archive: >
  https://github.com/keilerkonzept/terraform-module-versions/archive/refs/tags/v3.3.13.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terraform-module-versions
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terraform-module-versions
  brew: brew install terraform-module-versions
provenance:
  formula: terraform-module-versions
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
