id: brew:gnu-tar
display-name: gnu-tar
homepage: https://www.gnu.org/software/tar/
repo: https://ftpmirror.gnu.org/gnu/tar/tar-1.35.tar.gz
docs: https://www.gnu.org/software/tar/
package-manager:
  brew: gnu-tar
package-manager-url: https://formulae.brew.sh/formula/gnu-tar
version: 1.35
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU version of the tar archiving utility
source-archive: https://ftpmirror.gnu.org/gnu/tar/tar-1.35.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: gtar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    GNU "tar" has been installed as "gtar". If you need to use it as "tar", you can add
    a "gnubin" directory to your PATH from your bashrc like:
    PATH="$HOMEBREW_PREFIX/opt/gnu-tar/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  av: sudo av install brew:gnu-tar
  brew: brew install gnu-tar
provenance:
  formula: gnu-tar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
