id: brew:tmuxinator
display-name: tmuxinator
homepage: https://github.com/tmuxinator/tmuxinator
repo: https://github.com/tmuxinator/tmuxinator
docs: https://github.com/tmuxinator/tmuxinator
package-manager:
  apk: tmuxinator
  brew: tmuxinator
  debian: tmuxinator
  nix: tmuxinator
  ubuntu: tmuxinator
package-manager-url: https://formulae.brew.sh/formula/tmuxinator
version: 3.4.0
license: MIT
category: development
tags:
  - cli
description: Manage complex tmux sessions easily
source-archive: https://github.com/tmuxinator/tmuxinator/archive/refs/tags/v3.4.0.tar.gz
dependencies:
  - ruby
  - tmux
  - tmuxinator-completion
executables:
  - exposure: global executable
    kind: cli
    name: tmuxinator
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tmuxinator
  av: sudo av install brew:tmuxinator
  brew: brew install tmuxinator
  debian: sudo apt install tmuxinator
  nix: nix profile install nixpkgs#tmuxinator
  ubuntu: sudo apt install tmuxinator
provenance:
  formula: tmuxinator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
