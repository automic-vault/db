id: brew:mdfried
display-name: mdfried
homepage: https://github.com/benjajaja/mdfried
repo: https://github.com/benjajaja/mdfried
docs: https://github.com/benjajaja/mdfried
package-manager:
  brew: mdfried
  macports: mdfried
  nix: mdfried
  pacman: mdfried
package-manager-url: https://formulae.brew.sh/formula/mdfried
version: 0.20.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Terminal markdown viewer
source-archive: https://github.com/benjajaja/mdfried/archive/refs/tags/v0.20.2.tar.gz
dependencies:
  - chafa
  - gettext
  - glib
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mdfried
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mdfried
  brew: brew install mdfried
  macports: sudo port install mdfried
  nix: nix profile install nixpkgs#mdfried
  pacman: sudo pacman -S mdfried
provenance:
  formula: mdfried
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
