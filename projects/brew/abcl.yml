id: brew:abcl
display-name: abcl
homepage: https://github.com/armedbear/abcl
repo: https://deb.debian.org/debian/pool/main/a/abcl/abcl_1.9.2.orig.tar.gz
docs: https://github.com/armedbear/abcl
package-manager:
  apk: abcl
  brew: abcl
  debian: abcl
  macports: abcl
  nix: abcl
  ubuntu: abcl
package-manager-url: https://formulae.brew.sh/formula/abcl
version: 1.9.2
license: GPL-2.0-or-later WITH Classpath-exception-2.0
category: development
tags:
  - cli
description: 'Armed Bear Common Lisp: a full implementation of Common Lisp'
source-archive: https://deb.debian.org/debian/pool/main/a/abcl/abcl_1.9.2.orig.tar.gz
dependencies:
  - openjdk
  - rlwrap
build-dependencies:
  - ant
executables:
  - exposure: global executable
    kind: cli
    name: abcl
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add abcl
  av: sudo av install brew:abcl
  brew: brew install abcl
  debian: sudo apt install abcl
  macports: sudo port install abcl
  nix: nix profile install nixpkgs#abcl
  ubuntu: sudo apt install abcl
provenance:
  formula: abcl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
