id: brew:multitail
display-name: multitail
homepage: https://vanheusden.com/multitail/
repo: https://github.com/folkertvanheusden/multitail
docs: https://vanheusden.com/multitail/
package-manager:
  apk: multitail
  brew: multitail
  debian: multitail
  dnf: multitail
  macports: multitail
  nix: multitail
  ubuntu: multitail
  zypper: multitail
package-manager-url: https://formulae.brew.sh/formula/multitail
version: 7.1.5
license: MIT
category: development
tags:
  - cli
description: Tail multiple files in one terminal simultaneously
source-archive: https://github.com/folkertvanheusden/multitail/archive/refs/tags/7.1.5.tar.gz
dependencies:
  - ncurses
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: multitail
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add multitail
  av: sudo av install brew:multitail
  brew: brew install multitail
  debian: sudo apt install multitail
  dnf: sudo dnf install multitail
  macports: sudo port install multitail
  nix: nix profile install nixpkgs#multitail
  ubuntu: sudo apt install multitail
  zypper: sudo zypper install multitail
provenance:
  formula: multitail
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
