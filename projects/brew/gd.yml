id: brew:gd
display-name: gd
homepage: https://libgd.github.io/
repo: https://github.com/libgd/libgd
docs: https://libgd.github.io/
package-manager:
  apk: gd
  brew: gd
  dnf: gd
  nix: gd
  pacman: gd
  zypper: gd
package-manager-url: https://formulae.brew.sh/formula/gd
version: 2.3.3
license: GD
category: development
tags:
  - cli
description: Graphics library to dynamically manipulate images
source-archive: https://github.com/libgd/libgd/releases/download/gd-2.3.3/libgd-2.3.3.tar.xz
dependencies:
  - fontconfig
  - freetype
  - jpeg-turbo
  - libavif
  - libpng
  - libtiff
  - webp
executables:
  - exposure: global executable
    kind: cli
    name: annotate
  - exposure: global executable
    kind: cli
    name: bdftogd
  - exposure: global executable
    kind: cli
    name: gd2copypal
  - exposure: global executable
    kind: cli
    name: gd2togif
  - exposure: global executable
    kind: cli
    name: gd2topng
  - exposure: global executable
    kind: cli
    name: gdcmpgif
  - exposure: global executable
    kind: cli
    name: gdparttopng
  - exposure: global executable
    kind: cli
    name: gdtopng
  - exposure: global executable
    kind: cli
    name: giftogd2
  - exposure: global executable
    kind: cli
    name: pngtogd
  - exposure: global executable
    kind: cli
    name: pngtogd2
  - exposure: global executable
    kind: cli
    name: webpng
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gd
  av: sudo av install brew:gd
  brew: brew install gd
  dnf: sudo dnf install gd
  nix: nix profile install nixpkgs#gd
  pacman: sudo pacman -S gd
  zypper: sudo zypper install gd
provenance:
  formula: gd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
