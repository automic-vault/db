id: brew:fish-lsp
display-name: fish-lsp
homepage: https://www.fish-lsp.dev
repo: https://registry.npmjs.org/fish-lsp/-/fish-lsp-1.1.3.tgz
docs: https://www.fish-lsp.dev
package-manager:
  brew: fish-lsp
  nix: fish-lsp
package-manager-url: https://formulae.brew.sh/formula/fish-lsp
version: 1.1.3
license: MIT
category: development
tags:
  - cli
description: LSP implementation for the fish shell language
source-archive: https://registry.npmjs.org/fish-lsp/-/fish-lsp-1.1.3.tgz
dependencies:
  - node
build-dependencies:
  - fish
executables:
  - exposure: global executable
    kind: cli
    name: fish-lsp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fish-lsp
  brew: brew install fish-lsp
  nix: nix profile install nixpkgs#fish-lsp
provenance:
  formula: fish-lsp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
