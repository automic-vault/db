id: brew:tuc
display-name: tuc
homepage: https://github.com/riquito/tuc
repo: https://github.com/riquito/tuc
docs: https://github.com/riquito/tuc
package-manager:
  apk: tuc
  brew: tuc
  macports: tuc
  nix: tuc
  zypper: tuc
package-manager-url: https://formulae.brew.sh/formula/tuc
version: 1.3.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Text manipulation and cutting tool
source-archive: https://github.com/riquito/tuc/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tuc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tuc
  av: sudo av install brew:tuc
  brew: brew install tuc
  macports: sudo port install tuc
  nix: nix profile install nixpkgs#tuc
  zypper: sudo zypper install tuc
provenance:
  formula: tuc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
