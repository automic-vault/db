id: brew:miniserve
display-name: miniserve
homepage: https://github.com/svenstaro/miniserve
repo: https://github.com/svenstaro/miniserve
docs: https://github.com/svenstaro/miniserve
package-manager:
  apk: miniserve
  brew: miniserve
  macports: miniserve
  nix: miniserve
  pacman: miniserve
  scoop: main/miniserve
  winget: svenstaro.miniserve
package-manager-url: https://formulae.brew.sh/formula/miniserve
version: 0.35.0
license: MIT
category: development
tags:
  - cli
description: High performance static file server
source-archive: https://github.com/svenstaro/miniserve/archive/refs/tags/v0.35.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: miniserve
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add miniserve
  av: sudo av install brew:miniserve
  brew: brew install miniserve
  macports: sudo port install miniserve
  nix: nix profile install nixpkgs#miniserve
  pacman: sudo pacman -S miniserve
  scoop: scoop install main/miniserve
  winget: winget install --id svenstaro.miniserve -e
provenance:
  formula: miniserve
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
