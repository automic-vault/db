id: brew:caesiumclt
display-name: caesiumclt
homepage: https://github.com/Lymphatus/caesium-clt
repo: https://github.com/Lymphatus/caesium-clt
docs: https://github.com/Lymphatus/caesium-clt
package-manager:
  brew: caesiumclt
  winget: SaeraSoft.CaesiumCLT
package-manager-url: https://formulae.brew.sh/formula/caesiumclt
version: 1.3.0
license: Apache-2.0
category: security
tags:
  - cli
description: Fast and efficient lossy and/or lossless image compression tool
source-archive: https://github.com/Lymphatus/caesium-clt/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: caesiumclt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:caesiumclt
  brew: brew install caesiumclt
  winget: winget install --id SaeraSoft.CaesiumCLT -e
provenance:
  formula: caesiumclt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
