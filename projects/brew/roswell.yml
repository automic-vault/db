id: brew:roswell
display-name: roswell
homepage: https://github.com/roswell/roswell
repo: https://github.com/roswell/roswell
docs: https://github.com/roswell/roswell
package-manager:
  apk: roswell
  brew: roswell
  macports: roswell
  nix: roswell
  pacman: roswell
  scoop: main/roswell
package-manager-url: https://formulae.brew.sh/formula/roswell
version: 26.02.116
license: MIT
category: development
tags:
  - cli
description: Lisp installer and launcher for major environments
source-archive: https://github.com/roswell/roswell/archive/refs/tags/v26.02.116.tar.gz
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: ros
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add roswell
  av: sudo av install brew:roswell
  brew: brew install roswell
  macports: sudo port install roswell
  nix: nix profile install nixpkgs#roswell
  pacman: sudo pacman -S roswell
  scoop: scoop install main/roswell
provenance:
  formula: roswell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
