id: brew:ifacemaker
display-name: ifacemaker
homepage: https://github.com/vburenin/ifacemaker
repo: https://github.com/vburenin/ifacemaker
docs: https://github.com/vburenin/ifacemaker
package-manager:
  brew: ifacemaker
package-manager-url: https://formulae.brew.sh/formula/ifacemaker
version: 1.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Generate interfaces from structure methods
source-archive: https://github.com/vburenin/ifacemaker/archive/refs/tags/v1.3.0.tar.gz
dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ifacemaker
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ifacemaker
  brew: brew install ifacemaker
provenance:
  formula: ifacemaker
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
