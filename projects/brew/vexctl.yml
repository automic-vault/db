id: brew:vexctl
display-name: vexctl
homepage: https://openssf.org/projects/openvex/
repo: https://github.com/openvex/vexctl
docs: https://openssf.org/projects/openvex/
package-manager:
  brew: vexctl
  nix: vexctl
  zypper: vexctl
package-manager-url: https://formulae.brew.sh/formula/vexctl
version: 0.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: Tool to create, transform and attest VEX metadata
source-archive: https://github.com/openvex/vexctl/archive/refs/tags/v0.4.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vexctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vexctl
  brew: brew install vexctl
  nix: nix profile install nixpkgs#vexctl
  zypper: sudo zypper install vexctl
provenance:
  formula: vexctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
