id: brew:xcp
display-name: xcp
homepage: https://github.com/wojciech-kulik/XcodeProjectCLI
repo: https://github.com/wojciech-kulik/XcodeProjectCLI
docs: https://github.com/wojciech-kulik/XcodeProjectCLI
package-manager:
  brew: xcp
  nix: xcp
package-manager-url: https://formulae.brew.sh/formula/xcp
version: 1.2.1
license: MIT
category: development
tags:
  - cli
description: Fast & lightweight command-line tool for managing Xcode projects, built in Swift
source-archive: https://github.com/wojciech-kulik/XcodeProjectCLI/archive/refs/tags/v1.2.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: xcp
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xcp
  brew: brew install xcp
  nix: nix profile install nixpkgs#xcp
provenance:
  formula: xcp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
