id: brew:mako
display-name: mako
homepage: https://makojs.dev
repo: https://registry.npmjs.org/@umijs/mako/-/mako-0.11.15.tgz
docs: https://makojs.dev
package-manager:
  apk: mako
  brew: mako
  dnf: mako
  nix: mako
  pacman: mako
  zypper: mako
package-manager-url: https://formulae.brew.sh/formula/mako
version: 0.11.15
license: MIT
category: network
tags:
  - cli
description: Production-grade web bundler based on Rust
source-archive: https://registry.npmjs.org/@umijs/mako/-/mako-0.11.15.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: mako
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mako
  av: sudo av install brew:mako
  brew: brew install mako
  dnf: sudo dnf install mako
  nix: nix profile install nixpkgs#mako
  pacman: sudo pacman -S mako
  zypper: sudo zypper install mako
provenance:
  formula: mako
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
