id: brew:beanstalkd
display-name: beanstalkd
homepage: https://beanstalkd.github.io/
repo: https://github.com/beanstalkd/beanstalkd
docs: https://beanstalkd.github.io/
package-manager:
  apk: beanstalkd
  brew: beanstalkd
  debian: beanstalkd
  dnf: beanstalkd
  macports: beanstalkd
  nix: beanstalkd
  ubuntu: beanstalkd
package-manager-url: https://formulae.brew.sh/formula/beanstalkd
version: 1.13
license: MIT
category: development
tags:
  - cli
description: Generic work queue originally designed to reduce web latency
source-archive: https://github.com/beanstalkd/beanstalkd/archive/refs/tags/v1.13.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: beanstalkd
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add beanstalkd
  av: sudo av install brew:beanstalkd
  brew: brew install beanstalkd
  debian: sudo apt install beanstalkd
  dnf: sudo dnf install beanstalkd
  macports: sudo port install beanstalkd
  nix: nix profile install nixpkgs#beanstalkd
  ubuntu: sudo apt install beanstalkd
provenance:
  formula: beanstalkd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
