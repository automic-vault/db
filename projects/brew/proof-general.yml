id: brew:proof-general
display-name: proof-general
homepage: https://proofgeneral.github.io
repo: https://github.com/ProofGeneral/PG
docs: https://proofgeneral.github.io
package-manager:
  brew: proof-general
package-manager-url: https://formulae.brew.sh/formula/proof-general
version: 4.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Emacs-based generic interface for theorem provers
source-archive: https://github.com/ProofGeneral/PG/archive/refs/tags/v4.5.tar.gz
dependencies:
  - emacs
build-dependencies:
  - texi2html
  - texinfo
executables:
  - exposure: global executable
    kind: cli
    name: coqtags
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'HTML documentation is available in: $HOMEBREW_PREFIX/share/doc/proof-general'
  post-install-defined: false
install-lines:
  av: sudo av install brew:proof-general
  brew: brew install proof-general
provenance:
  formula: proof-general
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
