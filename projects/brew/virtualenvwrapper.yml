id: brew:virtualenvwrapper
display-name: virtualenvwrapper
homepage: https://virtualenvwrapper.readthedocs.io/
repo: >
  https://files.pythonhosted.org/packages/97/0b/1f6daec2e0bd25275953256f83f98fb337b78b9d03d44b7eb9619b72b046/virtualenvwrapper-6.1.1.tar.gz
docs: https://virtualenvwrapper.readthedocs.io/
package-manager:
  brew: virtualenvwrapper
  debian: virtualenvwrapper
  ubuntu: virtualenvwrapper
package-manager-url: https://formulae.brew.sh/formula/virtualenvwrapper
version: 6.1.1
license: MIT
category: network
tags:
  - cli
description: Python virtualenv extensions
source-archive: >
  https://files.pythonhosted.org/packages/97/0b/1f6daec2e0bd25275953256f83f98fb337b78b9d03d44b7eb9619b72b046/virtualenvwrapper-6.1.1.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: virtualenvwrapper.sh
  - exposure: global executable
    kind: cli
    name: virtualenvwrapper_lazy.sh
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To activate virtualenvwrapper, add the following to your shell profile e.g.
    ~/.profile or ~/.zshrc source virtualenvwrapper.sh
  post-install-defined: false
install-lines:
  av: sudo av install brew:virtualenvwrapper
  brew: brew install virtualenvwrapper
  debian: sudo apt install virtualenvwrapper
  ubuntu: sudo apt install virtualenvwrapper
provenance:
  formula: virtualenvwrapper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
