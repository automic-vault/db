id: brew:rbspy
display-name: rbspy
homepage: https://rbspy.github.io/
repo: https://github.com/rbspy/rbspy
docs: https://rbspy.github.io/
package-manager:
  apk: rbspy
  brew: rbspy
  dnf: rbspy
  nix: rbspy
package-manager-url: https://formulae.brew.sh/formula/rbspy
version: 0.48.0
license: MIT
category: development
tags:
  - cli
description: Sampling profiler for Ruby
source-archive: https://github.com/rbspy/rbspy/archive/refs/tags/v0.48.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rbspy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rbspy
  av: sudo av install brew:rbspy
  brew: brew install rbspy
  dnf: sudo dnf install rbspy
  nix: nix profile install nixpkgs#rbspy
provenance:
  formula: rbspy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
