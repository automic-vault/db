id: brew:tf-summarize
display-name: tf-summarize
homepage: https://github.com/dineshba/tf-summarize
repo: https://github.com/dineshba/tf-summarize
docs: https://github.com/dineshba/tf-summarize
package-manager:
  brew: tf-summarize
  nix: tf-summarize
  scoop: main/tf-summarize
package-manager-url: https://formulae.brew.sh/formula/tf-summarize
version: 0.3.20
license: MIT
category: cloud
tags:
  - cli
description: CLI to print the summary of the terraform plan
source-archive: https://github.com/dineshba/tf-summarize/archive/refs/tags/v0.3.20.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tf-summarize
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tf-summarize
  brew: brew install tf-summarize
  nix: nix profile install nixpkgs#tf-summarize
  scoop: scoop install main/tf-summarize
provenance:
  formula: tf-summarize
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
