id: brew:chainloop-cli
display-name: chainloop-cli
homepage: https://docs.chainloop.dev
repo: https://github.com/chainloop-dev/chainloop
docs: https://docs.chainloop.dev
package-manager:
  brew: chainloop-cli
package-manager-url: https://formulae.brew.sh/formula/chainloop-cli
version: 1.98.6
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for interacting with Chainloop
source-archive: https://github.com/chainloop-dev/chainloop/archive/refs/tags/v1.98.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: chainloop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chainloop-cli
  brew: brew install chainloop-cli
provenance:
  formula: chainloop-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
