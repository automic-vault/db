id: brew:gcsfuse
display-name: gcsfuse
homepage: https://github.com/googlecloudplatform/gcsfuse
repo: https://github.com/GoogleCloudPlatform/gcsfuse
docs: https://github.com/googlecloudplatform/gcsfuse
package-manager:
  brew: gcsfuse
  nix: gcsfuse
package-manager-url: https://formulae.brew.sh/formula/gcsfuse
version: 3.9.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: User-space file system for interacting with Google Cloud
source-archive: https://github.com/GoogleCloudPlatform/gcsfuse/archive/refs/tags/v3.9.1.tar.gz
dependencies:
  - libfuse
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gcsfuse
  - exposure: global executable
    kind: cli
    name: mount.fuse.gcsfuse
  - exposure: global executable
    kind: cli
    name: mount.gcsfuse
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gcsfuse
  brew: brew install gcsfuse
  nix: nix profile install nixpkgs#gcsfuse
provenance:
  formula: gcsfuse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
