id: brew:ata
display-name: ata
homepage: https://github.com/transformrs/ata
repo: https://github.com/transformrs/ata
docs: https://github.com/transformrs/ata
package-manager:
  brew: ata
  macports: ata
package-manager-url: https://formulae.brew.sh/formula/ata
version: 2.0.4
license: MIT
category: development
tags:
  - cli
description: ChatGPT in the terminal
source-archive: https://github.com/transformrs/ata/archive/refs/tags/v2.0.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ata
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ata
  brew: brew install ata
  macports: sudo port install ata
provenance:
  formula: ata
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
