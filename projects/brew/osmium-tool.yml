id: brew:osmium-tool
display-name: osmium-tool
homepage: https://osmcode.org/osmium-tool/
repo: https://github.com/osmcode/osmium-tool
docs: https://osmcode.org/osmium-tool/
package-manager:
  brew: osmium-tool
  debian: osmium-tool
  dnf: osmium-tool
  macports: osmium-tool
  nix: osmium-tool
  ubuntu: osmium-tool
package-manager-url: https://formulae.brew.sh/formula/osmium-tool
version: 1.19.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Libosmium-based command-line tool for processing OpenStreetMap data
source-archive: https://github.com/osmcode/osmium-tool/archive/refs/tags/v1.19.1.tar.gz
dependencies:
  - boost
  - lz4
build-dependencies:
  - cmake
  - libosmium
  - nlohmann-json
  - pandoc
  - protozero
uses-from-macos:
  - bzip2
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: osmium
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:osmium-tool
  brew: brew install osmium-tool
  debian: sudo apt install osmium-tool
  dnf: sudo dnf install osmium-tool
  macports: sudo port install osmium-tool
  nix: nix profile install nixpkgs#osmium-tool
  ubuntu: sudo apt install osmium-tool
provenance:
  formula: osmium-tool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
