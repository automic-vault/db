id: brew:ansible-creator
display-name: ansible-creator
homepage: https://ansible.readthedocs.io/projects/creator/
repo: >
  https://files.pythonhosted.org/packages/29/43/b6d5e389fb41f689459fd0d148c6f4f7e7bc3c30f1d8ec9e3386415973e8/ansible_creator-26.4.3.tar.gz
docs: https://ansible.readthedocs.io/projects/creator/
