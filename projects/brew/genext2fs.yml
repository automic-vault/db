id: brew:genext2fs
display-name: genext2fs
homepage: https://genext2fs.sourceforge.net/
repo: https://github.com/bestouff/genext2fs
docs: https://genext2fs.sourceforge.net/
package-manager:
  apk: genext2fs
  brew: genext2fs
  debian: genext2fs
  dnf: genext2fs
  macports: genext2fs
  nix: genext2fs
  ubuntu: genext2fs
package-manager-url: https://formulae.brew.sh/formula/genext2fs
version: 1.6.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Generates an ext2 filesystem as a normal (non-root) user
source-archive: https://github.com/bestouff/genext2fs/archive/refs/tags/v1.6.2.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: genext2fs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add genext2fs
  av: sudo av install brew:genext2fs
  brew: brew install genext2fs
  debian: sudo apt install genext2fs
  dnf: sudo dnf install genext2fs
  macports: sudo port install genext2fs
  nix: nix profile install nixpkgs#genext2fs
  ubuntu: sudo apt install genext2fs
provenance:
  formula: genext2fs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
