id: brew:jump
display-name: jump
homepage: https://github.com/gsamokovarov/jump
repo: https://github.com/gsamokovarov/jump
docs: https://github.com/gsamokovarov/jump
package-manager:
  brew: jump
  macports: jump
  nix: jump
package-manager-url: https://formulae.brew.sh/formula/jump
version: 0.67.0
license: MIT
category: development
tags:
  - cli
description: Helps you navigate your file system faster by learning your habits
source-archive: https://github.com/gsamokovarov/jump/archive/refs/tags/v0.67.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jump
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jump
  brew: brew install jump
  macports: sudo port install jump
  nix: nix profile install nixpkgs#jump
provenance:
  formula: jump
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
