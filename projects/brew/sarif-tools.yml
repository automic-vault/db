id: brew:sarif-tools
display-name: sarif-tools
homepage: https://github.com/microsoft/sarif-tools
repo: >
  https://files.pythonhosted.org/packages/16/3c/68e41db88aa15124175936017928e99182b3df8e6913c5e194c67d641996/sarif_tools-3.0.5.tar.gz
docs: https://github.com/microsoft/sarif-tools
package-manager:
  brew: sarif-tools
  nix: sarif-tools
package-manager-url: https://formulae.brew.sh/formula/sarif-tools
version: 3.0.5
license: MIT
category: development
tags:
  - cli
description: Set of command-line tools and Python library for working with SARIF files
source-archive: >
  https://files.pythonhosted.org/packages/16/3c/68e41db88aa15124175936017928e99182b3df8e6913c5e194c67d641996/sarif_tools-3.0.5.tar.gz
dependencies:
  - freetype
  - jpeg-turbo
  - libraqm
  - libtiff
  - libyaml
  - little-cms2
  - numpy
  - pillow
  - python@3.14
  - webp
build-dependencies:
  - cmake
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: sarif
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sarif-tools
  brew: brew install sarif-tools
  nix: nix profile install nixpkgs#sarif-tools
provenance:
  formula: sarif-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
