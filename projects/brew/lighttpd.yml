id: brew:lighttpd
display-name: lighttpd
homepage: https://www.lighttpd.net/
repo: https://download.lighttpd.net/lighttpd/releases-1.4.x/lighttpd-1.4.82.tar.xz
docs: https://www.lighttpd.net/
package-manager:
  apk: lighttpd
  brew: lighttpd
  debian: lighttpd
  dnf: lighttpd
  macports: lighttpd
  nix: lighttpd
  pacman: lighttpd
  scoop: extras/lighttpd
  ubuntu: lighttpd
  zypper: lighttpd
package-manager-url: https://formulae.brew.sh/formula/lighttpd
version: 1.4.82
license: BSD-3-Clause
category: network
tags:
  - cli
description: Small memory footprint, flexible web-server
source-archive: https://download.lighttpd.net/lighttpd/releases-1.4.x/lighttpd-1.4.82.tar.xz
dependencies:
  - openldap
  - openssl@3
  - pcre2
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - bzip2
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: lighttpd
  - exposure: global executable
    kind: cli
    name: lighttpd-angel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Docroot is: $HOMEBREW_PREFIX/var/www The default port has been set in
    $HOMEBREW_PREFIX/etc/lighttpd/lighttpd.conf to 8080 so that lighttpd can run without
    sudo.
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add lighttpd
  av: sudo av install brew:lighttpd
  brew: brew install lighttpd
  debian: sudo apt install lighttpd
  dnf: sudo dnf install lighttpd
  macports: sudo port install lighttpd
  nix: nix profile install nixpkgs#lighttpd
  pacman: sudo pacman -S lighttpd
  scoop: scoop install extras/lighttpd
  ubuntu: sudo apt install lighttpd
  zypper: sudo zypper install lighttpd
provenance:
  formula: lighttpd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
