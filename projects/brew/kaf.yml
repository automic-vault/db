id: brew:kaf
display-name: kaf
homepage: https://github.com/birdayz/kaf
repo: https://github.com/birdayz/kaf
docs: https://github.com/birdayz/kaf
package-manager:
  brew: kaf
  macports: kaf
  nix: kaf
  scoop: main/kaf
package-manager-url: https://formulae.brew.sh/formula/kaf
version: 0.2.14
license: Apache-2.0
category: development
tags:
  - cli
description: Modern CLI for Apache Kafka
source-archive: https://github.com/birdayz/kaf/archive/refs/tags/v0.2.14.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kaf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kaf
  brew: brew install kaf
  macports: sudo port install kaf
  nix: nix profile install nixpkgs#kaf
  scoop: scoop install main/kaf
provenance:
  formula: kaf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
