id: brew:wal-g
display-name: wal-g
homepage: https://github.com/wal-g/wal-g
repo: https://github.com/wal-g/wal-g
docs: https://github.com/wal-g/wal-g
package-manager:
  brew: wal-g
  nix: wal-g
package-manager-url: https://formulae.brew.sh/formula/wal-g
version: 3.0.8
license: Apache-2.0
category: database
tags:
  - cli
description: Archival restoration tool for databases
source-archive: https://github.com/wal-g/wal-g/archive/refs/tags/v3.0.8.tar.gz
dependencies:
  - brotli
  - libsodium
  - lzo
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: wal-g-etcd
  - exposure: global executable
    kind: cli
    name: wal-g-fdb
  - exposure: global executable
    kind: cli
    name: wal-g-gp
  - exposure: global executable
    kind: cli
    name: wal-g-mongo
  - exposure: global executable
    kind: cli
    name: wal-g-mysql
  - exposure: global executable
    kind: cli
    name: wal-g-pg
  - exposure: global executable
    kind: cli
    name: wal-g-redis
  - exposure: global executable
    kind: cli
    name: wal-g-sqlserver
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wal-g
  brew: brew install wal-g
  nix: nix profile install nixpkgs#wal-g
provenance:
  formula: wal-g
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
