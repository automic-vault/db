id: brew:utftex
display-name: utftex
homepage: https://github.com/bartp5/libtexprintf
repo: https://github.com/bartp5/libtexprintf
docs: https://github.com/bartp5/libtexprintf
package-manager:
  brew: utftex
package-manager-url: https://formulae.brew.sh/formula/utftex
version: 1.31
license: GPL-3.0-only
category: development
tags:
  - cli
description: Pretty print math in monospace fonts, using a TeX-like syntax
source-archive: https://github.com/bartp5/libtexprintf/archive/refs/tags/v1.31.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: utfstringinfo
  - exposure: global executable
    kind: cli
    name: utftex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:utftex
  brew: brew install utftex
provenance:
  formula: utftex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
