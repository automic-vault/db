id: brew:forgit
display-name: forgit
homepage: https://github.com/wfxr/forgit
repo: https://github.com/wfxr/forgit
docs: https://github.com/wfxr/forgit
package-manager:
  brew: forgit
package-manager-url: https://formulae.brew.sh/formula/forgit
version: 26.05.0
license: MIT
category: development
tags:
  - cli
  - git
description: Interactive git commands in the terminal
source-archive: https://github.com/wfxr/forgit/releases/download/26.05.0/forgit-26.05.0.tar.gz
dependencies:
  - fzf
executables:
  - exposure: global executable
    kind: cli
    name: git-forgit
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    A shell plugin has been installed to:
    $HOMEBREW_PREFIX/opt/forgit/share/forgit/forgit.plugin.zsh
    $HOMEBREW_PREFIX/opt/forgit/share/forgit/forgit.plugin.sh
    $HOMEBREW_PREFIX/opt/forgit/share/forgit/forgit.plugin.fish
  post-install-defined: false
install-lines:
  av: sudo av install brew:forgit
  brew: brew install forgit
provenance:
  formula: forgit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
