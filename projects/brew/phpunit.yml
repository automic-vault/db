id: brew:phpunit
display-name: phpunit
homepage: https://phpunit.de
repo: https://phar.phpunit.de/phpunit-13.1.12.phar
docs: https://phpunit.de
package-manager:
  apk: phpunit
  brew: phpunit
  debian: phpunit
  nix: phpunit
  ubuntu: phpunit
package-manager-url: https://formulae.brew.sh/formula/phpunit
version: 13.1.12
license: BSD-3-Clause
category: network
tags:
  - cli
description: Programmer-oriented testing framework for PHP
source-archive: https://phar.phpunit.de/phpunit-13.1.12.phar
executables:
  - exposure: global executable
    kind: cli
    name: phpunit
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add phpunit
  av: sudo av install brew:phpunit
  brew: brew install phpunit
  debian: sudo apt install phpunit
  nix: nix profile install nixpkgs#phpunit
  ubuntu: sudo apt install phpunit
provenance:
  formula: phpunit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
