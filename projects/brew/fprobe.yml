id: brew:fprobe
display-name: fprobe
homepage: https://sourceforge.net/projects/fprobe/
repo: https://downloads.sourceforge.net/project/fprobe/fprobe/1.1/fprobe-1.1.tar.bz2
docs: https://sourceforge.net/projects/fprobe/
package-manager:
  apk: fprobe
  brew: fprobe
  debian: fprobe
  macports: fprobe
  ubuntu: fprobe
package-manager-url: https://formulae.brew.sh/formula/fprobe
version: 1.1
license: GPL-2.0-only
category: network
tags:
  - cli
description: Libpcap-based NetFlow probe
source-archive: https://downloads.sourceforge.net/project/fprobe/fprobe/1.1/fprobe-1.1.tar.bz2
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: fprobe
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fprobe
  av: sudo av install brew:fprobe
  brew: brew install fprobe
  debian: sudo apt install fprobe
  macports: sudo port install fprobe
  ubuntu: sudo apt install fprobe
provenance:
  formula: fprobe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
