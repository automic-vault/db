id: brew:gnumeric
display-name: gnumeric
homepage: https://projects.gnome.org/gnumeric/
repo: https://download.gnome.org/sources/gnumeric/1.12/gnumeric-1.12.61.tar.xz
docs: https://projects.gnome.org/gnumeric/
package-manager:
  apk: gnumeric
  brew: gnumeric
  debian: gnumeric
  dnf: gnumeric
  macports: gnumeric
  nix: gnumeric
  pacman: gnumeric
  ubuntu: gnumeric
  zypper: gnumeric
package-manager-url: https://formulae.brew.sh/formula/gnumeric
version: 1.12.61
license: GPL-3.0-only OR GPL-2.0-only
category: network
tags:
  - cli
description: GNOME Spreadsheet Application
source-archive: https://download.gnome.org/sources/gnumeric/1.12/gnumeric-1.12.61.tar.xz
dependencies:
  - adwaita-icon-theme
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - goffice
  - gtk+3
  - harfbuzz
  - libgsf
  - libxml2
  - pango
build-dependencies:
  - gettext
  - intltool
  - itstool
  - pkgconf
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: gnumeric
  - exposure: global executable
    kind: cli
    name: gnumeric-1.12.61
  - exposure: global executable
    kind: cli
    name: ssconvert
  - exposure: global executable
    kind: cli
    name: ssdiff
  - exposure: global executable
    kind: cli
    name: ssgrep
  - exposure: global executable
    kind: cli
    name: ssindex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add gnumeric
  av: sudo av install brew:gnumeric
  brew: brew install gnumeric
  debian: sudo apt install gnumeric
  dnf: sudo dnf install gnumeric
  macports: sudo port install gnumeric
  nix: nix profile install nixpkgs#gnumeric
  pacman: sudo pacman -S gnumeric
  ubuntu: sudo apt install gnumeric
  zypper: sudo zypper install gnumeric
provenance:
  formula: gnumeric
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
