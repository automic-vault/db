id: brew:librist
display-name: librist
homepage: https://code.videolan.org/rist/
repo: https://code.videolan.org/rist/librist/-/archive/v0.2.15/librist-v0.2.15.tar.gz
docs: https://code.videolan.org/rist/
package-manager:
  apk: librist
  brew: librist
  dnf: librist
  nix: librist
  pacman: librist
package-manager-url: https://formulae.brew.sh/formula/librist
version: 0.2.15
license: BSD-2-Clause
category: media
tags:
  - cli
description: Reliable Internet Stream Transport (RIST)
source-archive: https://code.videolan.org/rist/librist/-/archive/v0.2.15/librist-v0.2.15.tar.gz
dependencies:
  - cjson
  - libmicrohttpd
  - mbedtls@3
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: rist2rist
  - exposure: global executable
    kind: cli
    name: ristreceiver
  - exposure: global executable
    kind: cli
    name: ristsender
  - exposure: global executable
    kind: cli
    name: ristsrppasswd
  - exposure: global executable
    kind: cli
    name: risttunnel
  - exposure: global executable
    kind: cli
    name: udp2udp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add librist
  av: sudo av install brew:librist
  brew: brew install librist
  dnf: sudo dnf install librist
  nix: nix profile install nixpkgs#librist
  pacman: sudo pacman -S librist
provenance:
  formula: librist
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
