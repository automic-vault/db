id: brew:rp
display-name: rp
homepage: https://github.com/0vercl0k/rp
repo: https://github.com/0vercl0k/rp
docs: https://github.com/0vercl0k/rp
package-manager:
  brew: rp
  nix: rp
package-manager-url: https://formulae.brew.sh/formula/rp
version: 2.1.5
license: MIT
category: development
tags:
  - cli
description: Tool to find ROP sequences in PE/Elf/Mach-O x86/x64 binaries
source-archive: https://github.com/0vercl0k/rp/archive/refs/tags/v2.1.5.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: rp-lin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rp
  brew: brew install rp
  nix: nix profile install nixpkgs#rp
provenance:
  formula: rp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
