id: brew:soplex
display-name: soplex
homepage: https://soplex.zib.de/
repo: https://soplex.zib.de/download/release/soplex-8.0.2.tgz
docs: https://soplex.zib.de/
package-manager:
  brew: soplex
  debian: soplex
  dnf: soplex
  macports: soplex
  nix: soplex
  pacman: soplex
  ubuntu: soplex
package-manager-url: https://formulae.brew.sh/formula/soplex
version: 8.0.2
license: Apache-2.0
category: network
tags:
  - cli
description: Optimization package for solving linear programming problems (LPs)
source-archive: https://soplex.zib.de/download/release/soplex-8.0.2.tgz
dependencies:
  - boost
  - gmp
  - mpfr
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: soplex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:soplex
  brew: brew install soplex
  debian: sudo apt install soplex
  dnf: sudo dnf install soplex
  macports: sudo port install soplex
  nix: nix profile install nixpkgs#soplex
  pacman: sudo pacman -S soplex
  ubuntu: sudo apt install soplex
provenance:
  formula: soplex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
