id: brew:lsix
display-name: lsix
homepage: https://github.com/hackerb9/lsix
repo: https://github.com/hackerb9/lsix
docs: https://github.com/hackerb9/lsix
package-manager:
  apk: lsix
  brew: lsix
  debian: lsix
  nix: lsix
  pacman: lsix
  scoop: main/lsix
package-manager-url: https://formulae.brew.sh/formula/lsix
version: 1.9.1
license: GPL-3.0-or-later OR X11
category: development
tags:
  - cli
description: Shows thumbnails in terminal using sixel graphics
source-archive: https://github.com/hackerb9/lsix/archive/refs/tags/1.9.1.tar.gz
dependencies:
  - bash
  - imagemagick
executables:
  - exposure: global executable
    kind: cli
    name: lsix
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lsix
  av: sudo av install brew:lsix
  brew: brew install lsix
  debian: sudo apt install lsix
  nix: nix profile install nixpkgs#lsix
  pacman: sudo pacman -S lsix
  scoop: scoop install main/lsix
provenance:
  formula: lsix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
