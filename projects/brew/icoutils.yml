id: brew:icoutils
display-name: icoutils
homepage: https://www.nongnu.org/icoutils/
repo: https://download.savannah.gnu.org/releases/icoutils/icoutils-0.32.3.tar.bz2
docs: https://www.nongnu.org/icoutils/
package-manager:
  apk: icoutils
  brew: icoutils
  debian: icoutils
  dnf: icoutils
  macports: icoutils
  nix: icoutils
  pacman: icoutils
  ubuntu: icoutils
  zypper: icoutils
package-manager-url: https://formulae.brew.sh/formula/icoutils
version: 0.32.3
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Create and extract MS Windows icons and cursors
source-archive: https://download.savannah.gnu.org/releases/icoutils/icoutils-0.32.3.tar.bz2
dependencies:
  - libpng
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: extresso
  - exposure: global executable
    kind: cli
    name: genresscript
  - exposure: global executable
    kind: cli
    name: icotool
  - exposure: global executable
    kind: cli
    name: wrestool
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add icoutils
  av: sudo av install brew:icoutils
  brew: brew install icoutils
  debian: sudo apt install icoutils
  dnf: sudo dnf install icoutils
  macports: sudo port install icoutils
  nix: nix profile install nixpkgs#icoutils
  pacman: sudo pacman -S icoutils
  ubuntu: sudo apt install icoutils
  zypper: sudo zypper install icoutils
provenance:
  formula: icoutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
