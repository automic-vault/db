id: brew:docker-machine-driver-vmware
display-name: docker-machine-driver-vmware
homepage: https://www.vmware.com/products/personal-desktop-virtualization.html
repo: https://github.com/machine-drivers/docker-machine-driver-vmware
docs: https://www.vmware.com/products/personal-desktop-virtualization.html
