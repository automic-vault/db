id: brew:terraform-inventory
display-name: terraform-inventory
homepage: https://github.com/adammck/terraform-inventory
repo: https://github.com/adammck/terraform-inventory
docs: https://github.com/adammck/terraform-inventory
package-manager:
  brew: terraform-inventory
  nix: terraform-inventory
package-manager-url: https://formulae.brew.sh/formula/terraform-inventory
version: 0.10
license: MIT
category: cloud
tags:
  - cli
description: Go app which generates a dynamic Ansible inventory from a Terraform state file
source-archive: https://github.com/adammck/terraform-inventory/archive/refs/tags/v0.10.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terraform-inventory
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:terraform-inventory
  brew: brew install terraform-inventory
  nix: nix profile install nixpkgs#terraform-inventory
provenance:
  formula: terraform-inventory
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
