id: brew:tuios
display-name: tuios
homepage: https://github.com/Gaurav-Gosain/tuios
repo: https://github.com/Gaurav-Gosain/tuios
docs: https://github.com/Gaurav-Gosain/tuios
package-manager:
  apk: tuios
  brew: tuios
  nix: tuios
package-manager-url: https://formulae.brew.sh/formula/tuios
version: 0.7.0
license: MIT
category: development
tags:
  - cli
description: Terminal UI OS (Terminal Multiplexer)
source-archive: https://github.com/Gaurav-Gosain/tuios/archive/refs/tags/v0.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tuios
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tuios
  av: sudo av install brew:tuios
  brew: brew install tuios
  nix: nix profile install nixpkgs#tuios
provenance:
  formula: tuios
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
