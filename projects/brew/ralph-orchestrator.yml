id: brew:ralph-orchestrator
display-name: ralph-orchestrator
homepage: https://github.com/mikeyobrien/ralph-orchestrator
repo: https://github.com/mikeyobrien/ralph-orchestrator
docs: https://github.com/mikeyobrien/ralph-orchestrator
package-manager:
  brew: ralph-orchestrator
package-manager-url: https://formulae.brew.sh/formula/ralph-orchestrator
version: 2.9.3
license: MIT
category: development
tags:
  - cli
description: Multi-agent orchestration framework for autonomous AI task completion
source-archive: https://github.com/mikeyobrien/ralph-orchestrator/archive/refs/tags/v2.9.3.tar.gz
build-dependencies:
