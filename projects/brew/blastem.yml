id: brew:blastem
display-name: blastem
homepage: https://www.retrodev.com/blastem/
repo: https://www.retrodev.com/repos/blastem/archive/v0.6.2.tar.gz
docs: https://www.retrodev.com/blastem/
package-manager:
  brew: blastem
  debian: blastem
  nix: blastem
  ubuntu: blastem
package-manager-url: https://formulae.brew.sh/formula/blastem
version: 0.6.2
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Fast and accurate Genesis emulator
source-archive: https://www.retrodev.com/repos/blastem/archive/v0.6.2.tar.gz
dependencies:
  - glew
  - sdl2
build-dependencies:
  - imagemagick
  - pillow
  - pkgconf
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: blastem
bottle:
  available: true
  platforms:
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:blastem
  brew: brew install blastem
  debian: sudo apt install blastem
  nix: nix profile install nixpkgs#blastem
  ubuntu: sudo apt install blastem
provenance:
  formula: blastem
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
