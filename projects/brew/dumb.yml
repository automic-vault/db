id: brew:dumb
display-name: dumb
homepage: https://dumb.sourceforge.net/
repo: https://github.com/kode54/dumb
docs: https://dumb.sourceforge.net/
package-manager:
  brew: dumb
  dnf: dumb
  pacman: dumb
  zypper: dumb
package-manager-url: https://formulae.brew.sh/formula/dumb
version: 2.0.3
license: LicenseRef-Homebrew-cannot-represent
category: development
tags:
  - cli
description: IT, XM, S3M and MOD player library
source-archive: https://github.com/kode54/dumb/archive/refs/tags/2.0.3.tar.gz
dependencies:
  - argtable
  - sdl2
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: dumbout
  - exposure: global executable
    kind: cli
    name: dumbplay
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dumb
  brew: brew install dumb
  dnf: sudo dnf install dumb
  pacman: sudo pacman -S dumb
  zypper: sudo zypper install dumb
provenance:
  formula: dumb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
