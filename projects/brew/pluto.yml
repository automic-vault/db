id: brew:pluto
display-name: pluto
homepage: https://fairwinds.com
repo: https://github.com/FairwindsOps/pluto
docs: https://fairwinds.com
package-manager:
  brew: pluto
  nix: pluto
  scoop: main/pluto
  zypper: pluto
package-manager-url: https://formulae.brew.sh/formula/pluto
version: 5.24.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: CLI tool to help discover deprecated apiVersions in Kubernetes
source-archive: https://github.com/FairwindsOps/pluto/archive/refs/tags/v5.24.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pluto
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pluto
  brew: brew install pluto
  nix: nix profile install nixpkgs#pluto
  scoop: scoop install main/pluto
  zypper: sudo zypper install pluto
provenance:
  formula: pluto
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
