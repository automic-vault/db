id: brew:nftables
display-name: nftables
homepage: https://netfilter.org/projects/nftables/
repo: https://www.netfilter.org/pub/nftables/nftables-1.1.6.tar.xz
docs: https://netfilter.org/projects/nftables/
package-manager:
  apk: nftables
  brew: nftables
  debian: nftables
  dnf: nftables
  nix: nftables
  pacman: nftables
  ubuntu: nftables
  zypper: nftables
package-manager-url: https://formulae.brew.sh/formula/nftables
version: 1.1.6
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Netfilter tables userspace tools
source-archive: https://www.netfilter.org/pub/nftables/nftables-1.1.6.tar.xz
dependencies:
  - gmp
  - jansson
  - libedit
  - libmnl
  - libnftnl
  - ncurses
  - readline
build-dependencies:
  - pkgconf
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: nft
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nftables
  av: sudo av install brew:nftables
  brew: brew install nftables
  debian: sudo apt install nftables
  dnf: sudo dnf install nftables
  nix: nix profile install nixpkgs#nftables
  pacman: sudo pacman -S nftables
  ubuntu: sudo apt install nftables
  zypper: sudo zypper install nftables
provenance:
  formula: nftables
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
