id: brew:bpytop
display-name: bpytop
homepage: https://github.com/aristocratos/bpytop
repo: https://github.com/aristocratos/bpytop
docs: https://github.com/aristocratos/bpytop
package-manager:
  brew: bpytop
  debian: bpytop
  macports: bpytop
  pacman: bpytop
  ubuntu: bpytop
package-manager-url: https://formulae.brew.sh/formula/bpytop
version: 1.0.68
license: Apache-2.0
category: development
tags:
  - cli
description: Linux/OSX/FreeBSD resource monitor
source-archive: https://github.com/aristocratos/bpytop/archive/refs/tags/v1.0.68.tar.gz
dependencies:
  - osx-cpu-temp
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: bpytop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bpytop
  brew: brew install bpytop
  debian: sudo apt install bpytop
  macports: sudo port install bpytop
  pacman: sudo pacman -S bpytop
  ubuntu: sudo apt install bpytop
provenance:
  formula: bpytop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
