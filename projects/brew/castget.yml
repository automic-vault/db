id: brew:castget
display-name: castget
homepage: https://castget.johndal.com/
repo: https://download.savannah.gnu.org/releases/castget/castget-2.0.1.tar.bz2
docs: https://castget.johndal.com/
package-manager:
  brew: castget
  dnf: castget
  nix: castget
  pacman: castget
package-manager-url: https://formulae.brew.sh/formula/castget
version: 2.0.1
license: LGPL-2.1-only
category: network
tags:
  - cli
description: Command-line podcast and RSS enclosure downloader
source-archive: https://download.savannah.gnu.org/releases/castget/castget-2.0.1.tar.bz2
dependencies:
  - gettext
  - glib
  - id3lib
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: castget
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:castget
  brew: brew install castget
  dnf: sudo dnf install castget
  nix: nix profile install nixpkgs#castget
  pacman: sudo pacman -S castget
provenance:
  formula: castget
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
