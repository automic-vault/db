id: brew:povray
display-name: povray
homepage: https://www.povray.org/
repo: https://github.com/POV-Ray/povray
docs: https://www.povray.org/
package-manager:
  brew: povray
  debian: povray
  dnf: povray
  macports: povray
  nix: povray
  pacman: povray
  ubuntu: povray
  zypper: povray
package-manager-url: https://formulae.brew.sh/formula/povray
version: 3.7.0.10
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Persistence Of Vision RAYtracer (POVRAY)
source-archive: https://github.com/POV-Ray/povray/archive/refs/tags/v3.7.0.10.tar.gz
dependencies:
  - boost
  - imath
  - jpeg-turbo
  - libpng
  - libtiff
  - openexr
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: povray
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:povray
  brew: brew install povray
  debian: sudo apt install povray
  dnf: sudo dnf install povray
  macports: sudo port install povray
  nix: nix profile install nixpkgs#povray
  pacman: sudo pacman -S povray
  ubuntu: sudo apt install povray
  zypper: sudo zypper install povray
provenance:
  formula: povray
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
