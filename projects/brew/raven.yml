id: brew:raven
display-name: raven
homepage: https://github.com/CycodeLabs/raven
repo: >
  https://files.pythonhosted.org/packages/d8/b6/4bc5aecae28382720fca4e9492a623e3d821d96e8f4d06e4335c77779ebd/raven_cycode-1.0.9.tar.gz
docs: https://github.com/CycodeLabs/raven
package-manager:
