package-manager-url: https://formulae.brew.sh/formula/raven
version: 1.0.9
license: Apache-2.0
category: development
tags:
  - cli
description: Risk Analysis and Vulnerability Enumeration for CI/CD
source-archive: >
  https://files.pythonhosted.org/packages/d8/b6/4bc5aecae28382720fca4e9492a623e3d821d96e8f4d06e4335c77779ebd/raven_cycode-1.0.9.tar.gz
dependencies:
  - certifi
  - libyaml
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: raven
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
