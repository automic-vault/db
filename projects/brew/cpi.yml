id: brew:cpi
display-name: cpi
homepage: https://treefrogframework.github.io/cpi/
repo: https://github.com/treefrogframework/cpi
docs: https://treefrogframework.github.io/cpi/
package-manager:
  brew: cpi
  macports: cpi
package-manager-url: https://formulae.brew.sh/formula/cpi
version: 2.2.3
license: MIT
category: development
tags:
  - cli
description: Tiny c++ interpreter
source-archive: https://github.com/treefrogframework/cpi/archive/refs/tags/v2.2.3.tar.gz
dependencies:
  - qtbase
uses-from-macos:
  - llvm
executables:
  - exposure: global executable
    kind: cli
    name: cpi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cpi
  brew: brew install cpi
  macports: sudo port install cpi
provenance:
  formula: cpi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
