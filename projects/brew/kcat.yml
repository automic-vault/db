id: brew:kcat
display-name: kcat
homepage: https://github.com/edenhill/kcat
repo: https://github.com/edenhill/kcat
docs: https://github.com/edenhill/kcat
package-manager:
  apk: kcat
  brew: kcat
  debian: kcat
  dnf: kcat
  macports: kcat
  nix: kcat
  ubuntu: kcat
package-manager-url: https://formulae.brew.sh/formula/kcat
version: 1.7.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Generic command-line non-JVM Apache Kafka producer and consumer
source-archive: https://github.com/edenhill/kcat.git
dependencies:
  - avro-c
  - librdkafka
  - libserdes
  - yajl
executables:
  - exposure: global executable
    kind: cli
    name: kcat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kcat
  av: sudo av install brew:kcat
  brew: brew install kcat
  debian: sudo apt install kcat
  dnf: sudo dnf install kcat
  macports: sudo port install kcat
  nix: nix profile install nixpkgs#kcat
  ubuntu: sudo apt install kcat
provenance:
  formula: kcat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
