id: brew:doltgres
display-name: doltgres
homepage: https://github.com/dolthub/doltgresql
repo: https://github.com/dolthub/doltgresql
docs: https://github.com/dolthub/doltgresql
package-manager:
  brew: doltgres
package-manager-url: https://formulae.brew.sh/formula/doltgres
version: 0.56.3
license: Apache-2.0
category: database
tags:
  - cli
description: Dolt for Postgres
source-archive: https://github.com/dolthub/doltgresql/archive/refs/tags/v0.56.3.tar.gz
dependencies:
  - icu4c@78
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: doltgres
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:doltgres
  brew: brew install doltgres
provenance:
  formula: doltgres
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
