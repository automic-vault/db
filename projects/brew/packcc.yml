id: brew:packcc
display-name: packcc
homepage: https://github.com/arithy/packcc
repo: https://github.com/arithy/packcc
docs: https://github.com/arithy/packcc
package-manager:
  brew: packcc
  nix: packcc
package-manager-url: https://formulae.brew.sh/formula/packcc
version: 3.1.0
license: MIT
category: development
tags:
  - cli
description: Parser generator for C
source-archive: https://github.com/arithy/packcc/archive/refs/tags/v3.1.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: packcc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:packcc
  brew: brew install packcc
  nix: nix profile install nixpkgs#packcc
provenance:
  formula: packcc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
