id: brew:conman
display-name: conman
homepage: https://github.com/dun/conman
repo: https://github.com/dun/conman
docs: https://github.com/dun/conman
package-manager:
  brew: conman
  debian: conman
  dnf: conman
  nix: conman
  ubuntu: conman
  zypper: conman
package-manager-url: https://formulae.brew.sh/formula/conman
version: 0.3.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Serial console management program supporting a large number of devices
source-archive: https://github.com/dun/conman/archive/refs/tags/conman-0.3.1.tar.gz
dependencies:
  - freeipmi
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: conman
  - exposure: global executable
    kind: cli
    name: conmand
  - exposure: global executable
    kind: cli
    name: conmen
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Before starting the conmand service, configure some consoles in
    $HOMEBREW_PREFIX/etc/conman.conf.
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:conman
  brew: brew install conman
  debian: sudo apt install conman
  dnf: sudo dnf install conman
  nix: nix profile install nixpkgs#conman
  ubuntu: sudo apt install conman
  zypper: sudo zypper install conman
provenance:
  formula: conman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
