id: brew:luarocks
display-name: luarocks
homepage: https://luarocks.org/
repo: https://luarocks.org/releases/luarocks-3.13.0.tar.gz
docs: https://luarocks.org/
package-manager:
  apk: luarocks
  brew: luarocks
  chocolatey: luarocks
  debian: luarocks
  dnf: luarocks
  nix: luarocks
  pacman: luarocks
  scoop: main/luarocks
  ubuntu: luarocks
package-manager-url: https://formulae.brew.sh/formula/luarocks
version: 3.13.0
license: MIT
category: development
tags:
  - cli
description: Package manager for the Lua programming language
source-archive: https://luarocks.org/releases/luarocks-3.13.0.tar.gz
dependencies:
  - lua
uses-from-macos:
  - unzip
executables:
  - exposure: global executable
    kind: cli
    name: luarocks
  - exposure: global executable
    kind: cli
    name: luarocks-admin
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add luarocks
  av: sudo av install brew:luarocks
  brew: brew install luarocks
  chocolatey: choco install luarocks
  debian: sudo apt install luarocks
  dnf: sudo dnf install luarocks
  nix: nix profile install nixpkgs#luarocks
  pacman: sudo pacman -S luarocks
  scoop: scoop install main/luarocks
  ubuntu: sudo apt install luarocks
provenance:
  formula: luarocks
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
