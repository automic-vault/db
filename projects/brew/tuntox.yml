id: brew:tuntox
display-name: tuntox
homepage: https://gdr.name/tuntox/
repo: https://github.com/gjedeer/tuntox
docs: https://gdr.name/tuntox/
package-manager:
  brew: tuntox
  nix: tuntox
  pacman: tuntox
package-manager-url: https://formulae.brew.sh/formula/tuntox
version: 0.0.10.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: Tunnel TCP connections over the Tox protocol
source-archive: https://github.com/gjedeer/tuntox/archive/refs/tags/0.0.10.1.tar.gz
dependencies:
  - toxcore
build-dependencies:
  - cscope
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: tuntox
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tuntox
  brew: brew install tuntox
  nix: nix profile install nixpkgs#tuntox
  pacman: sudo pacman -S tuntox
provenance:
  formula: tuntox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
