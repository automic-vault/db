id: brew:garmintools
display-name: garmintools
homepage: https://code.google.com/archive/p/garmintools/
repo: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/garmintools/garmintools-0.10.tar.gz
docs: https://code.google.com/archive/p/garmintools/
package-manager:
  brew: garmintools
  dnf: garmintools
  nix: garmintools
package-manager-url: https://formulae.brew.sh/formula/garmintools
version: 0.10
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Interface to the Garmin Forerunner GPS units
source-archive: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/garmintools/garmintools-0.10.tar.gz
dependencies:
  - libusb-compat
executables:
  - exposure: global executable
    kind: cli
    name: garmin_dump
  - exposure: global executable
    kind: cli
    name: garmin_gchart
  - exposure: global executable
    kind: cli
    name: garmin_get_info
  - exposure: global executable
    kind: cli
    name: garmin_gmap
  - exposure: global executable
    kind: cli
    name: garmin_gpx
  - exposure: global executable
    kind: cli
    name: garmin_save_runs
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:garmintools
  brew: brew install garmintools
  dnf: sudo dnf install garmintools
  nix: nix profile install nixpkgs#garmintools
provenance:
  formula: garmintools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
