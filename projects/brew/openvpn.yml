id: brew:openvpn
display-name: openvpn
homepage: https://openvpn.net/community/
repo: https://swupdate.openvpn.org/community/releases/openvpn-2.7.4.tar.gz
docs: https://openvpn.net/community/
package-manager:
  apk: openvpn
  brew: openvpn
  chocolatey: openvpn
  debian: openvpn
  dnf: openvpn
  nix: openvpn
  pacman: openvpn
  scoop: extras/openvpn
  ubuntu: openvpn
  winget: OpenVPNTechnologies.OpenVPN
  zypper: openvpn
package-manager-url: https://formulae.brew.sh/formula/openvpn
version: 2.7.4
license: GPL-2.0-only WITH openvpn-openssl-exception
category: security
tags:
  - cli
description: SSL/TLS VPN implementing OSI layer 2 or 3 secure network extension
source-archive: https://swupdate.openvpn.org/community/releases/openvpn-2.7.4.tar.gz
dependencies:
  - lz4
  - lzo
  - openssl@3
  - pkcs11-helper
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: openvpn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add openvpn
  av: sudo av install brew:openvpn
  brew: brew install openvpn
  chocolatey: choco install openvpn
  debian: sudo apt install openvpn
  dnf: sudo dnf install openvpn
  nix: nix profile install nixpkgs#openvpn
  pacman: sudo pacman -S openvpn
  scoop: scoop install extras/openvpn
  ubuntu: sudo apt install openvpn
  winget: winget install --id OpenVPNTechnologies.OpenVPN -e
  zypper: sudo zypper install openvpn
provenance:
  formula: openvpn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
