id: brew:granted
display-name: granted
homepage: https://granted.dev/
repo: https://github.com/fwdcloudsec/granted
docs: https://granted.dev/
package-manager:
  brew: granted
  nix: granted
  scoop: main/granted
package-manager-url: https://formulae.brew.sh/formula/granted
version: 0.39.0
license: MIT
category: cloud
tags:
  - cli
  - cloud
description: Easiest way to access your cloud
source-archive: https://github.com/fwdcloudsec/granted/archive/refs/tags/v0.39.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: assume
  - exposure: global executable
    kind: cli
    name: assume.fish
  - exposure: global executable
    kind: cli
    name: assumego
  - exposure: global executable
    kind: cli
    name: granted
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:granted
  brew: brew install granted
  nix: nix profile install nixpkgs#granted
  scoop: scoop install main/granted
provenance:
  formula: granted
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
