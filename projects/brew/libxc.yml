id: brew:libxc
display-name: libxc
homepage: https://libxc.gitlab.io/
repo: https://gitlab.com/libxc/libxc/-/archive/7.0.0/libxc-7.0.0.tar.bz2
docs: https://libxc.gitlab.io/
package-manager:
  brew: libxc
  dnf: libxc
  macports: libxc
  nix: libxc
package-manager-url: https://formulae.brew.sh/formula/libxc
version: 7.0.0
license: MPL-2.0
category: development
tags:
  - cli
description: Library of exchange and correlation functionals for codes
source-archive: https://gitlab.com/libxc/libxc/-/archive/7.0.0/libxc-7.0.0.tar.bz2
dependencies:
  - gcc
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: xc-info
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libxc
  brew: brew install libxc
  dnf: sudo dnf install libxc
  macports: sudo port install libxc
  nix: nix profile install nixpkgs#libxc
provenance:
  formula: libxc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
