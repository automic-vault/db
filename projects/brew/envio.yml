id: brew:envio
display-name: envio
homepage: https://github.com/humblepenguinn/envio
repo: https://github.com/humblepenguinn/envio
docs: https://github.com/humblepenguinn/envio
package-manager:
  brew: envio
  nix: envio
package-manager-url: https://formulae.brew.sh/formula/envio
version: 0.7.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Modern And Secure CLI Tool For Managing Environment Variables
source-archive: https://github.com/humblepenguinn/envio/archive/refs/tags/v0.7.0.tar.gz
dependencies:
  - gpgme
  - libgpg-error
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: envio
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:envio
  brew: brew install envio
  nix: nix profile install nixpkgs#envio
provenance:
  formula: envio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
