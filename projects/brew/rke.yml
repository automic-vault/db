id: brew:rke
display-name: rke
homepage: https://rke.docs.rancher.com/
repo: https://github.com/rancher/rke
docs: https://rke.docs.rancher.com/
package-manager:
  apk: rke
  brew: rke
  macports: rke
  nix: rke
  scoop: main/rke
  zypper: rke
package-manager-url: https://formulae.brew.sh/formula/rke
version: 1.8.13
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Rancher Kubernetes Engine, a Kubernetes installer that works everywhere
source-archive: https://github.com/rancher/rke/archive/refs/tags/v1.8.13.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rke
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rke
  av: sudo av install brew:rke
  brew: brew install rke
  macports: sudo port install rke
  nix: nix profile install nixpkgs#rke
  scoop: scoop install main/rke
  zypper: sudo zypper install rke
provenance:
  formula: rke
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
