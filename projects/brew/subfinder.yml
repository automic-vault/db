id: brew:subfinder
display-name: subfinder
homepage: https://github.com/projectdiscovery/subfinder
repo: https://github.com/projectdiscovery/subfinder
docs: https://github.com/projectdiscovery/subfinder
package-manager:
  brew: subfinder
  dnf: subfinder
  nix: subfinder
  zypper: subfinder
package-manager-url: https://formulae.brew.sh/formula/subfinder
version: 2.14.0
license: MIT
category: development
tags:
  - cli
description: Subdomain discovery tool
source-archive: https://github.com/projectdiscovery/subfinder/archive/refs/tags/v2.14.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: subfinder
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:subfinder
  brew: brew install subfinder
  dnf: sudo dnf install subfinder
  nix: nix profile install nixpkgs#subfinder
  zypper: sudo zypper install subfinder
provenance:
  formula: subfinder
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
