id: brew:vroom
display-name: vroom
homepage: http://vroom-project.org/
repo: https://github.com/VROOM-Project/vroom
docs: http://vroom-project.org/
package-manager:
  brew: vroom
package-manager-url: https://formulae.brew.sh/formula/vroom
version: 1.15.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Vehicle Routing Open-Source Optimization Machine
source-archive: https://github.com/VROOM-Project/vroom.git
dependencies:
  - openssl@3
build-dependencies:
  - asio
  - cxxopts
  - pkgconf
  - rapidjson
executables:
  - exposure: global executable
    kind: cli
    name: vroom
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vroom
  brew: brew install vroom
provenance:
  formula: vroom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
