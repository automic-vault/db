id: brew:fork-cleaner
display-name: fork-cleaner
homepage: https://github.com/caarlos0/fork-cleaner
repo: https://github.com/caarlos0/fork-cleaner
docs: https://github.com/caarlos0/fork-cleaner
package-manager:
  brew: fork-cleaner
  macports: fork-cleaner
  nix: fork-cleaner
  winget: caarlos0.fork-cleaner
package-manager-url: https://formulae.brew.sh/formula/fork-cleaner
version: 2.4.0
license: MIT
category: development
tags:
  - cli
description: Cleans up old and inactive forks on your GitHub account
source-archive: https://github.com/caarlos0/fork-cleaner/archive/refs/tags/v2.4.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fork-cleaner
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fork-cleaner
  brew: brew install fork-cleaner
  macports: sudo port install fork-cleaner
  nix: nix profile install nixpkgs#fork-cleaner
  winget: winget install --id caarlos0.fork-cleaner -e
provenance:
  formula: fork-cleaner
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
