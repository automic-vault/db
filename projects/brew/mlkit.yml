id: brew:mlkit
display-name: mlkit
homepage: https://melsman.github.io/mlkit
repo: https://github.com/melsman/mlkit
docs: https://melsman.github.io/mlkit
package-manager:
  brew: mlkit
  nix: mlkit
package-manager-url: https://formulae.brew.sh/formula/mlkit
version: 4.7.14
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Compiler for the Standard ML programming language
source-archive: https://github.com/melsman/mlkit/archive/refs/tags/v4.7.14.tar.gz
dependencies:
  - gmp
build-dependencies:
  - autoconf
  - mlton
executables:
  - exposure: global executable
    kind: cli
    name: kittester
  - exposure: global executable
    kind: cli
    name: mlkit
  - exposure: global executable
    kind: cli
    name: mlkit-mllex
  - exposure: global executable
    kind: cli
    name: mlkit-mlyacc
  - exposure: global executable
    kind: cli
    name: reml
  - exposure: global executable
    kind: cli
    name: rp2ps
bottle:
  available: true
  platforms:
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mlkit
  brew: brew install mlkit
  nix: nix profile install nixpkgs#mlkit
provenance:
  formula: mlkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
