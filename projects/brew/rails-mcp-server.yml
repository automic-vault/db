id: brew:rails-mcp-server
display-name: rails-mcp-server
homepage: https://github.com/maquina-app/rails-mcp-server
repo: https://github.com/maquina-app/rails-mcp-server
docs: https://github.com/maquina-app/rails-mcp-server
package-manager:
  brew: rails-mcp-server
package-manager-url: https://formulae.brew.sh/formula/rails-mcp-server
version: 1.5.1
license: MIT
category: development
tags:
  - cli
description: MCP server for Rails applications
source-archive: https://github.com/maquina-app/rails-mcp-server/archive/refs/tags/v1.5.1.tar.gz
dependencies:
  - openssl@3
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: rails-mcp-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rails-mcp-server
  brew: brew install rails-mcp-server
provenance:
  formula: rails-mcp-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
