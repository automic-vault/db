id: brew:hunspell
display-name: hunspell
homepage: https://hunspell.github.io
repo: https://github.com/hunspell/hunspell
docs: https://hunspell.github.io
package-manager:
  apk: hunspell
  brew: hunspell
  debian: hunspell
  dnf: hunspell
  macports: hunspell
  nix: hunspell
  pacman: hunspell
  ubuntu: hunspell
  winget: FSFhu.Hunspell
  zypper: hunspell
package-manager-url: https://formulae.brew.sh/formula/hunspell
version: 1.7.3
license: MPL-1.1 OR GPL-2.0-or-later OR LGPL-2.1-or-later
category: development
tags:
  - cli
description: Spell checker and morphological analyzer
source-archive: https://github.com/hunspell/hunspell/releases/download/v1.7.3/hunspell-1.7.3.tar.gz
dependencies:
  - gettext
  - readline
build-dependencies:
  - coreutils
  - gettext
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: affixcompress
  - exposure: global executable
    kind: cli
    name: analyze
  - exposure: global executable
    kind: cli
    name: chmorph
  - exposure: global executable
    kind: cli
    name: hunspell
  - exposure: global executable
    kind: cli
    name: hunzip
  - exposure: global executable
    kind: cli
    name: hzip
  - exposure: global executable
    kind: cli
    name: ispellaff2myspell
  - exposure: global executable
    kind: cli
    name: makealias
  - exposure: global executable
    kind: cli
    name: munch
  - exposure: global executable
    kind: cli
    name: unmunch
  - exposure: global executable
    kind: cli
    name: wordforms
  - exposure: global executable
    kind: cli
    name: wordlist2hunspell
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Dictionary files (*.aff and *.dic) should be placed in ~/Library/Spelling/ or
    /Library/Spelling/. Homebrew itself provides no dictionaries for Hunspell, but you
    can download compatible dictionaries from other sources, such as
    https://cgit.freedesktop.org/libreoffice/dictionaries/tree/ .
  post-install-defined: false
install-lines:
  apk: sudo apk add hunspell
  av: sudo av install brew:hunspell
  brew: brew install hunspell
  debian: sudo apt install hunspell
  dnf: sudo dnf install hunspell
  macports: sudo port install hunspell
  nix: nix profile install nixpkgs#hunspell
  pacman: sudo pacman -S hunspell
  ubuntu: sudo apt install hunspell
  winget: winget install --id FSFhu.Hunspell -e
  zypper: sudo zypper install hunspell
provenance:
  formula: hunspell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
