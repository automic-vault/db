id: brew:arturo
display-name: arturo
homepage: https://arturo-lang.io/
repo: https://github.com/arturo-lang/arturo
docs: https://arturo-lang.io/
package-manager:
  apk: arturo
  brew: arturo
  macports: arturo
  winget: ArturoLang.Arturo
package-manager-url: https://formulae.brew.sh/formula/arturo
version: 0.10.0
license: MIT
category: development
tags:
  - cli
description: Simple, modern and portable programming language for efficient scripting
source-archive: https://github.com/arturo-lang/arturo/archive/refs/tags/v0.10.0.tar.gz
dependencies:
  - gmp
  - mpfr
  - openssl@3
  - pcre2
build-dependencies:
  - nim
executables:
  - exposure: global executable
    kind: cli
    name: arturo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add arturo
  av: sudo av install brew:arturo
  brew: brew install arturo
  macports: sudo port install arturo
  winget: winget install --id ArturoLang.Arturo -e
provenance:
  formula: arturo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
