id: brew:tgif
display-name: tgif
homepage: https://sourceforge.net/projects/tgif/
repo: https://downloads.sourceforge.net/project/tgif/tgif/4.2.5/tgif-QPL-4.2.5.tar.gz
docs: https://sourceforge.net/projects/tgif/
package-manager:
  brew: tgif
  debian: tgif
  dnf: tgif
  macports: tgif
  ubuntu: tgif
package-manager-url: https://formulae.brew.sh/formula/tgif
version: 4.2.5
license: QPL-1.0
category: network
tags:
  - cli
description: Xlib-based interactive 2D drawing tool
source-archive: https://downloads.sourceforge.net/project/tgif/tgif/4.2.5/tgif-QPL-4.2.5.tar.gz
dependencies:
  - libice
  - libidn
  - libsm
  - libx11
  - libxext
  - libxmu
  - libxt
executables:
  - exposure: global executable
    kind: cli
    name: tgif
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tgif
  brew: brew install tgif
  debian: sudo apt install tgif
  dnf: sudo dnf install tgif
  macports: sudo port install tgif
  ubuntu: sudo apt install tgif
provenance:
  formula: tgif
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
