id: brew:nvimpager
display-name: nvimpager
homepage: https://github.com/lucc/nvimpager
repo: https://github.com/lucc/nvimpager
docs: https://github.com/lucc/nvimpager
package-manager:
  apk: nvimpager
  brew: nvimpager
  macports: nvimpager
  nix: nvimpager
  zypper: nvimpager
package-manager-url: https://formulae.brew.sh/formula/nvimpager
version: 0.14.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Use NeoVim as a pager to view manpages, diffs, etc.
source-archive: https://github.com/lucc/nvimpager/archive/refs/tags/v0.14.0.tar.gz
dependencies:
  - neovim
build-dependencies:
  - scdoc
executables:
  - exposure: global executable
    kind: cli
    name: nvimpager
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To use nvimpager as your default pager, add `export PAGER=nvimpager` to your shell
    configuration.
  post-install-defined: false
install-lines:
  apk: sudo apk add nvimpager
  av: sudo av install brew:nvimpager
  brew: brew install nvimpager
  macports: sudo port install nvimpager
  nix: nix profile install nixpkgs#nvimpager
  zypper: sudo zypper install nvimpager
provenance:
  formula: nvimpager
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
