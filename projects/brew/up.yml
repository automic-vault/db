id: brew:up
display-name: up
homepage: https://github.com/akavel/up
repo: https://github.com/akavel/up
docs: https://github.com/akavel/up
package-manager:
  apk: up
  brew: up
  macports: up
  nix: up
  pacman: up
  scoop: main/up
package-manager-url: https://formulae.brew.sh/formula/up
version: 0.4
license: Apache-2.0
category: development
tags:
  - cli
description: Tool for writing command-line pipes with instant live preview
source-archive: https://github.com/akavel/up/archive/refs/tags/v0.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: up
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add up
  av: sudo av install brew:up
  brew: brew install up
  macports: sudo port install up
  nix: nix profile install nixpkgs#up
  pacman: sudo pacman -S up
  scoop: scoop install main/up
provenance:
  formula: up
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
