id: brew:libsolv
display-name: libsolv
homepage: https://github.com/openSUSE/libsolv
repo: https://github.com/openSUSE/libsolv
docs: https://github.com/openSUSE/libsolv
package-manager:
  brew: libsolv
  dnf: libsolv
  macports: libsolv
  nix: libsolv
  pacman: libsolv
package-manager-url: https://formulae.brew.sh/formula/libsolv
version: 0.7.38
license: BSD-3-Clause
category: development
tags:
  - cli
description: Library for solving packages and reading repositories
source-archive: https://github.com/openSUSE/libsolv/archive/refs/tags/0.7.38.tar.gz
dependencies:
  - rpm
  - xz
  - zstd
build-dependencies:
  - cmake
uses-from-macos:
  - bzip2
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: appdata2solv
  - exposure: global executable
    kind: cli
    name: archpkgs2solv
  - exposure: global executable
    kind: cli
    name: archrepo2solv
  - exposure: global executable
    kind: cli
    name: comps2solv
  - exposure: global executable
    kind: cli
    name: conda2solv
  - exposure: global executable
    kind: cli
    name: deb2solv
  - exposure: global executable
    kind: cli
    name: deltainfoxml2solv
  - exposure: global executable
    kind: cli
    name: dumpsolv
  - exposure: global executable
    kind: cli
    name: helix2solv
  - exposure: global executable
    kind: cli
    name: installcheck
  - exposure: global executable
    kind: cli
    name: mdk2solv
  - exposure: global executable
    kind: cli
    name: mergesolv
  - exposure: global executable
    kind: cli
    name: repo2solv
  - exposure: global executable
    kind: cli
    name: repomdxml2solv
  - exposure: global executable
    kind: cli
    name: rpmdb2solv
  - exposure: global executable
    kind: cli
    name: rpmmd2solv
  - exposure: global executable
    kind: cli
    name: rpms2solv
  - exposure: global executable
    kind: cli
    name: susetags2solv
  - exposure: global executable
    kind: cli
    name: testsolv
  - exposure: global executable
    kind: cli
    name: updateinfoxml2solv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libsolv
  brew: brew install libsolv
  dnf: sudo dnf install libsolv
  macports: sudo port install libsolv
  nix: nix profile install nixpkgs#libsolv
  pacman: sudo pacman -S libsolv
provenance:
  formula: libsolv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
