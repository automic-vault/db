id: brew:fjira
display-name: fjira
homepage: https://github.com/mk-5/fjira
repo: https://github.com/mk-5/fjira
docs: https://github.com/mk-5/fjira
package-manager:
  brew: fjira
package-manager-url: https://formulae.brew.sh/formula/fjira
version: 1.5.3
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Fuzzy-find cli jira interface
source-archive: https://github.com/mk-5/fjira/archive/refs/tags/1.5.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fjira
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fjira
  brew: brew install fjira
provenance:
  formula: fjira
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
