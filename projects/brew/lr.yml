id: brew:lr
display-name: lr
homepage: https://github.com/leahneukirchen/lr
repo: https://github.com/leahneukirchen/lr
docs: https://github.com/leahneukirchen/lr
package-manager:
  brew: lr
  debian: lr
  nix: lr
  ubuntu: lr
package-manager-url: https://formulae.brew.sh/formula/lr
version: 2.0.1
license: MIT
category: development
tags:
  - cli
description: File list utility with features from ls(1), find(1), stat(1), and du(1)
source-archive: https://github.com/leahneukirchen/lr/archive/refs/tags/v2.0.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lr
  brew: brew install lr
  debian: sudo apt install lr
  nix: nix profile install nixpkgs#lr
  ubuntu: sudo apt install lr
provenance:
  formula: lr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
