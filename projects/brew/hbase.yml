id: brew:hbase
display-name: hbase
homepage: https://hbase.apache.org
repo: https://www.apache.org/dyn/closer.lua?path=hbase/2.6.5/hbase-2.6.5-bin.tar.gz
docs: https://hbase.apache.org
package-manager:
  brew: hbase
  nix: hbase
package-manager-url: https://formulae.brew.sh/formula/hbase
version: 2.6.5
license: Apache-2.0 AND GPL-3.0-or-later
category: database
tags:
  - cli
  - database
description: 'Hadoop database: a distributed, scalable, big data store'
source-archive: https://www.apache.org/dyn/closer.lua?path=hbase/2.6.5/hbase-2.6.5-bin.tar.gz
dependencies:
  - lzo
  - openjdk@17
build-dependencies:
  - ant
executables:
  - exposure: global executable
    kind: cli
    name: hbase
  - exposure: global executable
    kind: cli
    name: start-hbase.sh
  - exposure: global executable
    kind: cli
    name: stop-hbase.sh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:hbase
  brew: brew install hbase
  nix: nix profile install nixpkgs#hbase
provenance:
  formula: hbase
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
