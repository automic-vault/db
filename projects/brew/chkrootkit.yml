id: brew:chkrootkit
display-name: chkrootkit
homepage: https://www.chkrootkit.org/
repo: ftp://ftp.chkrootkit.org/pub/seg/pac/chkrootkit-0.59.tar.gz
docs: https://www.chkrootkit.org/
package-manager:
  brew: chkrootkit
  debian: chkrootkit
  dnf: chkrootkit
  macports: chkrootkit
  ubuntu: chkrootkit
package-manager-url: https://formulae.brew.sh/formula/chkrootkit
version: 0.59
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Rootkit detector
source-archive: ftp://ftp.chkrootkit.org/pub/seg/pac/chkrootkit-0.59.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: check_wtmpx
  - exposure: global executable
    kind: cli
    name: chkdirs
  - exposure: global executable
    kind: cli
    name: chklastlog
  - exposure: global executable
    kind: cli
    name: chkproc
  - exposure: global executable
    kind: cli
    name: chkrootkit
  - exposure: global executable
    kind: cli
    name: chkutmp
  - exposure: global executable
    kind: cli
    name: chkwtmp
  - exposure: global executable
    kind: cli
    name: ifpromisc
  - exposure: global executable
    kind: cli
    name: strings-static
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:chkrootkit
  brew: brew install chkrootkit
  debian: sudo apt install chkrootkit
  dnf: sudo dnf install chkrootkit
  macports: sudo port install chkrootkit
  ubuntu: sudo apt install chkrootkit
provenance:
  formula: chkrootkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
