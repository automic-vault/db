id: brew:aircrack-ng
display-name: aircrack-ng
homepage: https://aircrack-ng.org/
repo: https://download.aircrack-ng.org/aircrack-ng-1.7.tar.gz
docs: https://aircrack-ng.org/
package-manager:
  apk: aircrack-ng
  brew: aircrack-ng
  debian: aircrack-ng
  dnf: aircrack-ng
  macports: aircrack-ng
  nix: aircrack-ng
  pacman: aircrack-ng
  scoop: extras/aircrack-ng
  ubuntu: aircrack-ng
  zypper: aircrack-ng
package-manager-url: https://formulae.brew.sh/formula/aircrack-ng
version: 1.7
license: >
  BSD-3-Clause AND GPL-2.0-or-later AND (GPL-2.0-or-later WITH
  cryptsetup-OpenSSL-exception)
category: network
tags:
  - cli
description: Next-generation aircrack with lots of new features
source-archive: https://download.aircrack-ng.org/aircrack-ng-1.7.tar.gz
dependencies:
  - openssl@4
  - pcre2
  - sqlite
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: airbase-ng
  - exposure: global executable
    kind: cli
    name: aircrack-ng
  - exposure: global executable
    kind: cli
    name: airdecap-ng
  - exposure: global executable
    kind: cli
    name: airdecloak-ng
  - exposure: global executable
    kind: cli
    name: aireplay-ng
  - exposure: global executable
    kind: cli
    name: airmon-ng
  - exposure: global executable
    kind: cli
    name: airodump-ng
  - exposure: global executable
    kind: cli
    name: airodump-ng-oui-update
  - exposure: global executable
    kind: cli
    name: airolib-ng
  - exposure: global executable
    kind: cli
    name: airserv-ng
  - exposure: global executable
    kind: cli
    name: airtun-ng
  - exposure: global executable
    kind: cli
    name: airventriloquist-ng
  - exposure: global executable
    kind: cli
    name: besside-ng
  - exposure: global executable
    kind: cli
    name: besside-ng-crawler
  - exposure: global executable
    kind: cli
    name: buddy-ng
  - exposure: global executable
    kind: cli
    name: easside-ng
  - exposure: global executable
    kind: cli
    name: ivstools
  - exposure: global executable
    kind: cli
    name: kstats
  - exposure: global executable
    kind: cli
    name: makeivs-ng
  - exposure: global executable
    kind: cli
    name: packetforge-ng
  - exposure: global executable
    kind: cli
    name: tkiptun-ng
  - exposure: global executable
    kind: cli
    name: wesside-ng
  - exposure: global executable
    kind: cli
    name: wpaclean
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: Run `airodump-ng-oui-update` install or update the Airodump-ng OUI file.
  post-install-defined: false
install-lines:
  apk: sudo apk add aircrack-ng
  av: sudo av install brew:aircrack-ng
  brew: brew install aircrack-ng
  debian: sudo apt install aircrack-ng
  dnf: sudo dnf install aircrack-ng
  macports: sudo port install aircrack-ng
  nix: nix profile install nixpkgs#aircrack-ng
  pacman: sudo pacman -S aircrack-ng
  scoop: scoop install extras/aircrack-ng
  ubuntu: sudo apt install aircrack-ng
  zypper: sudo zypper install aircrack-ng
provenance:
  formula: aircrack-ng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
