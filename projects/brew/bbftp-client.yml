id: brew:bbftp-client
display-name: bbftp-client
homepage: https://gitlab.in2p3.fr/cc-in2p3-hpss-service/bbftp
repo: https://pkg.freebsd.org/ports-distfiles/bbftp-client-3.2.1.tar.gz
docs: https://gitlab.in2p3.fr/cc-in2p3-hpss-service/bbftp
package-manager:
  brew: bbftp-client
package-manager-url: https://formulae.brew.sh/formula/bbftp-client
version: 3.2.1
license: GPL-2.0-or-later
category: development
tags:
