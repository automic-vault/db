id: brew:tarsnap
display-name: tarsnap
homepage: https://www.tarsnap.com/
repo: https://www.tarsnap.com/download/tarsnap-autoconf-1.0.41.tgz
docs: https://www.tarsnap.com/
package-manager:
  brew: tarsnap
  macports: tarsnap
  nix: tarsnap
  pacman: tarsnap
package-manager-url: https://formulae.brew.sh/formula/tarsnap
version: 1.0.41
license: 0BSD
category: network
tags:
  - cli
description: Online backups for the truly paranoid
source-archive: https://www.tarsnap.com/download/tarsnap-autoconf-1.0.41.tgz
dependencies:
  - openssl@3
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: tarsnap
  - exposure: global executable
    kind: cli
    name: tarsnap-keygen
  - exposure: global executable
    kind: cli
    name: tarsnap-keymgmt
  - exposure: global executable
    kind: cli
    name: tarsnap-keyregen
  - exposure: global executable
    kind: cli
    name: tarsnap-recrypt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tarsnap
  brew: brew install tarsnap
  macports: sudo port install tarsnap
  nix: nix profile install nixpkgs#tarsnap
  pacman: sudo pacman -S tarsnap
provenance:
  formula: tarsnap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
