id: brew:scummvm
display-name: scummvm
homepage: https://www.scummvm.org/
repo: https://downloads.scummvm.org/frs/scummvm/2026.2.0/scummvm-2026.2.0.tar.xz
docs: https://www.scummvm.org/
package-manager:
  apk: scummvm
  brew: scummvm
  debian: scummvm
  dnf: scummvm
  macports: scummvm
  nix: scummvm
  pacman: scummvm
  ubuntu: scummvm
  winget: ScummVM.ScummVM
  zypper: scummvm
package-manager-url: https://formulae.brew.sh/formula/scummvm
version: 2026.2.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Graphic adventure game interpreter
source-archive: https://downloads.scummvm.org/frs/scummvm/2026.2.0/scummvm-2026.2.0.tar.xz
dependencies:
  - a52dec
  - faad2
  - flac
  - fluid-synth
  - freetype
  - fribidi
  - giflib
  - jpeg-turbo
  - libmpeg2
  - libogg
  - libopenmpt
  - libpng
  - libvorbis
  - libvpx
  - mad
  - musepack
  - sdl2
  - theora
executables:
  - exposure: global executable
    kind: cli
    name: scummvm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add scummvm
  av: sudo av install brew:scummvm
  brew: brew install scummvm
  debian: sudo apt install scummvm
  dnf: sudo dnf install scummvm
  macports: sudo port install scummvm
  nix: nix profile install nixpkgs#scummvm
  pacman: sudo pacman -S scummvm
  ubuntu: sudo apt install scummvm
  winget: winget install --id ScummVM.ScummVM -e
  zypper: sudo zypper install scummvm
provenance:
  formula: scummvm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
