id: brew:dura
display-name: dura
homepage: https://github.com/tkellogg/dura
repo: https://github.com/tkellogg/dura
docs: https://github.com/tkellogg/dura
package-manager:
  brew: dura
  macports: dura
  nix: dura
package-manager-url: https://formulae.brew.sh/formula/dura
version: 0.2.0
license: Apache-2.0
category: development
tags:
  - cli
  - git
description: Backs up your work automatically via Git commits
source-archive: https://github.com/tkellogg/dura/archive/refs/tags/v0.2.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dura
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:dura
  brew: brew install dura
  macports: sudo port install dura
  nix: nix profile install nixpkgs#dura
provenance:
  formula: dura
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
