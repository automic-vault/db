id: brew:maven
display-name: maven
homepage: https://maven.apache.org/
repo: >
  https://www.apache.org/dyn/closer.lua?path=maven/maven-3/3.9.16/binaries/apache-maven-3.9.16-bin.tar.gz
docs: https://maven.apache.org/
package-manager:
  apk: maven
  brew: maven
  chocolatey: maven
  debian: maven
  dnf: maven
  nix: maven
  pacman: maven
  scoop: main/maven
  ubuntu: maven
  zypper: maven
package-manager-url: https://formulae.brew.sh/formula/maven
version: 3.9.16
license: Apache-2.0
category: network
tags:
  - cli
description: Java-based project management
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=maven/maven-3/3.9.16/binaries/apache-maven-3.9.16-bin.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: mvn
  - exposure: global executable
    kind: cli
    name: mvnDebug
  - exposure: global executable
    kind: cli
    name: mvnyjp
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add maven
  av: sudo av install brew:maven
  brew: brew install maven
  chocolatey: choco install maven
  debian: sudo apt install maven
  dnf: sudo dnf install maven
  nix: nix profile install nixpkgs#maven
  pacman: sudo pacman -S maven
  scoop: scoop install main/maven
  ubuntu: sudo apt install maven
  zypper: sudo zypper install maven
provenance:
  formula: maven
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
