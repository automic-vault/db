id: brew:ratchet
display-name: ratchet
homepage: https://github.com/sethvargo/ratchet
repo: https://github.com/sethvargo/ratchet
docs: https://github.com/sethvargo/ratchet
package-manager:
  brew: ratchet
  macports: ratchet
  nix: ratchet
package-manager-url: https://formulae.brew.sh/formula/ratchet
version: 0.11.4
license: Apache-2.0
category: development
tags:
  - cli
description: Tool for securing CI/CD workflows with version pinning
source-archive: https://github.com/sethvargo/ratchet/archive/refs/tags/v0.11.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ratchet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ratchet
  brew: brew install ratchet
  macports: sudo port install ratchet
  nix: nix profile install nixpkgs#ratchet
provenance:
  formula: ratchet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
