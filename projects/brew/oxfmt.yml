id: brew:oxfmt
display-name: oxfmt
homepage: https://oxc.rs/
repo: https://registry.npmjs.org/oxfmt/-/oxfmt-0.52.0.tgz
docs: https://oxc.rs/
package-manager:
  brew: oxfmt
  nix: oxfmt
  winget: oxc-project.oxfmt
package-manager-url: https://formulae.brew.sh/formula/oxfmt
version: 0.52.0
license: MIT
category: development
tags:
  - cli
description: High-performance formatting tool for JavaScript and TypeScript
source-archive: https://registry.npmjs.org/oxfmt/-/oxfmt-0.52.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: oxfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oxfmt
  brew: brew install oxfmt
  nix: nix profile install nixpkgs#oxfmt
  winget: winget install --id oxc-project.oxfmt -e
provenance:
  formula: oxfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
