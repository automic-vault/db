id: brew:mrboom
display-name: mrboom
homepage: http://mrboom.mumblecore.org/
repo: https://github.com/Javanaise/mrboom-libretro
docs: http://mrboom.mumblecore.org/
package-manager:
  brew: mrboom
  debian: mrboom
  ubuntu: mrboom
  zypper: mrboom
package-manager-url: https://formulae.brew.sh/formula/mrboom
version: 5.5
license: MIT
category: development
tags:
  - cli
description: Eight player Bomberman clone
source-archive: https://github.com/Javanaise/mrboom-libretro/releases/download/5.5/MrBoom-src-5.5.tar.gz
dependencies:
  - libmodplug
  - minizip
  - sdl2
  - sdl2_mixer
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: mrboom
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mrboom
  brew: brew install mrboom
  debian: sudo apt install mrboom
  ubuntu: sudo apt install mrboom
  zypper: sudo zypper install mrboom
provenance:
  formula: mrboom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
