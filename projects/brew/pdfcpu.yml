id: brew:pdfcpu
display-name: pdfcpu
homepage: https://pdfcpu.io
repo: https://github.com/pdfcpu/pdfcpu
docs: https://pdfcpu.io
package-manager:
  apk: pdfcpu
  brew: pdfcpu
  macports: pdfcpu
  nix: pdfcpu
  scoop: main/pdfcpu
  winget: pdfcpu.pdfcpu
package-manager-url: https://formulae.brew.sh/formula/pdfcpu
version: 0.12.1
license: Apache-2.0
category: development
tags:
  - cli
description: PDF processor written in Go
source-archive: https://github.com/pdfcpu/pdfcpu/archive/refs/tags/v0.12.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pdfcpu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pdfcpu
  av: sudo av install brew:pdfcpu
  brew: brew install pdfcpu
  macports: sudo port install pdfcpu
  nix: nix profile install nixpkgs#pdfcpu
  scoop: scoop install main/pdfcpu
  winget: winget install --id pdfcpu.pdfcpu -e
provenance:
  formula: pdfcpu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
