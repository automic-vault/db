id: brew:miruo
display-name: miruo
homepage: https://github.com/KLab/miruo/
repo: https://github.com/KLab/miruo
docs: https://github.com/KLab/miruo/
package-manager:
  brew: miruo
package-manager-url: https://formulae.brew.sh/formula/miruo
version: 0.9.6b
license: GPL-3.0-only
category: development
tags:
  - cli
description: Pretty-print TCP session monitor/analyzer
source-archive: https://github.com/KLab/miruo/archive/refs/tags/0.9.6b.tar.gz
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: miruo
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:miruo
  brew: brew install miruo
provenance:
  formula: miruo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
