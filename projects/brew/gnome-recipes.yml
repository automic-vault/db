id: brew:gnome-recipes
display-name: gnome-recipes
homepage: https://wiki.gnome.org/Apps/Recipes
repo: https://download.gnome.org/sources/gnome-recipes/2.0/gnome-recipes-2.0.4.tar.xz
docs: https://wiki.gnome.org/Apps/Recipes
package-manager:
  brew: gnome-recipes
  debian: gnome-recipes
  pacman: gnome-recipes
  zypper: gnome-recipes
package-manager-url: https://formulae.brew.sh/formula/gnome-recipes
version: 2.0.4
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Formula for GNOME recipes
source-archive: https://download.gnome.org/sources/gnome-recipes/2.0/gnome-recipes-2.0.4.tar.xz
dependencies:
  - adwaita-icon-theme
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gnome-autoar
  - gspell
  - gtk+3
  - json-glib
  - libcanberra
  - libgoa
  - librest
  - libsoup
  - pango
build-dependencies:
  - gettext
  - itstool
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gnome-recipes
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:gnome-recipes
  brew: brew install gnome-recipes
  debian: sudo apt install gnome-recipes
  pacman: sudo pacman -S gnome-recipes
  zypper: sudo zypper install gnome-recipes
provenance:
  formula: gnome-recipes
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
