id: brew:rustypaste-cli
display-name: rustypaste-cli
homepage: https://blog.orhun.dev/blazingly-fast-file-sharing
repo: https://github.com/orhun/rustypaste-cli
docs: https://blog.orhun.dev/blazingly-fast-file-sharing
package-manager:
  apk: rustypaste-cli
  brew: rustypaste-cli
  nix: rustypaste-cli
  pacman: rustypaste-cli
package-manager-url: https://formulae.brew.sh/formula/rustypaste-cli
version: 0.9.5
license: MIT
category: development
tags:
  - cli
description: CLI tool for rustypaste
source-archive: https://github.com/orhun/rustypaste-cli/archive/refs/tags/v0.9.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rpaste
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    An example config is installed to
    $HOMEBREW_PREFIX/opt/rustypaste-cli/share/rustypaste-cli/config.toml
  post-install-defined: false
install-lines:
  apk: sudo apk add rustypaste-cli
  av: sudo av install brew:rustypaste-cli
  brew: brew install rustypaste-cli
  nix: nix profile install nixpkgs#rustypaste-cli
  pacman: sudo pacman -S rustypaste-cli
provenance:
  formula: rustypaste-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
