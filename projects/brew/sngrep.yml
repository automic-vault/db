id: brew:sngrep
display-name: sngrep
homepage: https://github.com/irontec/sngrep
repo: https://github.com/irontec/sngrep
docs: https://github.com/irontec/sngrep
package-manager:
  apk: sngrep
  brew: sngrep
  debian: sngrep
  dnf: sngrep
  nix: sngrep
  ubuntu: sngrep
  zypper: sngrep
package-manager-url: https://formulae.brew.sh/formula/sngrep
version: 1.8.3
license: GPL-3.0-or-later WITH cryptsetup-OpenSSL-exception
category: development
tags:
  - cli
description: Command-line tool for displaying SIP calls message flows
source-archive: https://github.com/irontec/sngrep/releases/download/v1.8.3/sngrep-1.8.3.tar.gz
dependencies:
  - ncurses
  - openssl@4
build-dependencies:
  - autoconf
  - automake
  - pkgconf
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: sngrep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sngrep
  av: sudo av install brew:sngrep
  brew: brew install sngrep
  debian: sudo apt install sngrep
  dnf: sudo dnf install sngrep
  nix: nix profile install nixpkgs#sngrep
  ubuntu: sudo apt install sngrep
  zypper: sudo zypper install sngrep
provenance:
  formula: sngrep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
