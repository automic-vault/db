id: brew:tetra
display-name: tetra
homepage: https://tetragon.io/
repo: https://github.com/cilium/tetragon
docs: https://tetragon.io/
package-manager:
  brew: tetra
package-manager-url: https://formulae.brew.sh/formula/tetra
version: 1.7.0
license: Apache-2.0
category: development
tags:
  - cli
description: Tetragon CLI to observe, manage and troubleshoot Tetragon instances
source-archive: https://github.com/cilium/tetragon/archive/refs/tags/v1.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tetra
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tetra
  brew: brew install tetra
provenance:
  formula: tetra
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
