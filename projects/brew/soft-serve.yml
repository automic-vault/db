id: brew:soft-serve
display-name: soft-serve
homepage: https://github.com/charmbracelet/soft-serve
repo: https://github.com/charmbracelet/soft-serve
docs: https://github.com/charmbracelet/soft-serve
package-manager:
  brew: soft-serve
  nix: soft-serve
  pacman: soft-serve
  winget: charmbracelet.soft-serve
package-manager-url: https://formulae.brew.sh/formula/soft-serve
version: 0.11.6
license: MIT
category: development
tags:
  - cli
  - git
description: Mighty, self-hostable Git server for the command-line
source-archive: >
  https://github.com/charmbracelet/soft-serve/releases/download/v0.11.6/soft-serve-0.11.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: soft
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:soft-serve
  brew: brew install soft-serve
  nix: nix profile install nixpkgs#soft-serve
  pacman: sudo pacman -S soft-serve
  winget: winget install --id charmbracelet.soft-serve -e
provenance:
  formula: soft-serve
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
