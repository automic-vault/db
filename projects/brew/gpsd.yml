id: brew:gpsd
display-name: gpsd
homepage: https://gpsd.gitlab.io/gpsd/
repo: https://download.savannah.gnu.org/releases/gpsd/gpsd-3.27.5.tar.xz
docs: https://gpsd.gitlab.io/gpsd/
package-manager:
  apk: gpsd
  brew: gpsd
  debian: gpsd
  dnf: gpsd
  macports: gpsd
  nix: gpsd
  pacman: gpsd
  ubuntu: gpsd
  zypper: gpsd
package-manager-url: https://formulae.brew.sh/formula/gpsd
version: 3.27.5
license: BSD-2-Clause
category: development
tags:
  - cli
description: Global Positioning System (GPS) daemon
source-archive: https://download.savannah.gnu.org/releases/gpsd/gpsd-3.27.5.tar.xz
build-dependencies:
  - asciidoctor
  - scons
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cgps
  - exposure: global executable
    kind: cli
    name: gps2udp
  - exposure: global executable
    kind: cli
    name: gpsctl
  - exposure: global executable
    kind: cli
    name: gpsd
  - exposure: global executable
    kind: cli
    name: gpsdctl
  - exposure: global executable
    kind: cli
    name: gpsdebuginfo
  - exposure: global executable
    kind: cli
    name: gpsdecode
  - exposure: global executable
    kind: cli
    name: gpsmon
  - exposure: global executable
    kind: cli
    name: gpspipe
  - exposure: global executable
    kind: cli
    name: gpsrinex
  - exposure: global executable
    kind: cli
    name: gpssnmp
  - exposure: global executable
    kind: cli
    name: gpxlogger
  - exposure: global executable
    kind: cli
    name: lcdgps
  - exposure: global executable
    kind: cli
    name: ntpshmmon
  - exposure: global executable
    kind: cli
    name: ppscheck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    gpsd does not automatically detect GPS device addresses. Once started, you need to
    force it to connect to your GPS: GPSD_SOCKET="$HOMEBREW_PREFIX/var/gpsd.sock"
    $HOMEBREW_CELLAR/gpsd/3.27.5/sbin/gpsdctl add /dev/tty.usbserial-XYZ
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add gpsd
  av: sudo av install brew:gpsd
  brew: brew install gpsd
  debian: sudo apt install gpsd
  dnf: sudo dnf install gpsd
  macports: sudo port install gpsd
  nix: nix profile install nixpkgs#gpsd
  pacman: sudo pacman -S gpsd
  ubuntu: sudo apt install gpsd
  zypper: sudo zypper install gpsd
provenance:
  formula: gpsd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
