id: brew:awsweeper
display-name: awsweeper
homepage: https://github.com/jckuester/awsweeper/
repo: https://github.com/jckuester/awsweeper
docs: https://github.com/jckuester/awsweeper/
package-manager:
  brew: awsweeper
  nix: awsweeper
package-manager-url: https://formulae.brew.sh/formula/awsweeper
version: 0.12.0
license: MPL-2.0
category: cloud
tags:
  - aws
  - cli
description: CLI tool for cleaning your AWS account
source-archive: https://github.com/jckuester/awsweeper/archive/refs/tags/v0.12.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: awsweeper
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:awsweeper
  brew: brew install awsweeper
  nix: nix profile install nixpkgs#awsweeper
provenance:
  formula: awsweeper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
