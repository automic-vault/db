id: brew:nova-fairwinds
display-name: nova-fairwinds
homepage: https://github.com/FairwindsOps/nova
repo: https://github.com/FairwindsOps/nova
docs: https://github.com/FairwindsOps/nova
package-manager:
  brew: nova-fairwinds
  nix: nova
  scoop: main/nova
  winget: Jasmine.Nova
  zypper: nova
package-manager-url: https://formulae.brew.sh/formula/nova-fairwinds
version: 3.12.0
license: Apache-2.0
category: development
tags:
  - cli
description: Find outdated or deprecated Helm charts running in your cluster
source-archive: https://github.com/FairwindsOps/nova/archive/refs/tags/v3.12.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nova
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nova-fairwinds
  brew: brew install nova-fairwinds
  nix: nix profile install nixpkgs#nova
  scoop: scoop install main/nova
  winget: winget install --id Jasmine.Nova -e
  zypper: sudo zypper install nova
provenance:
  formula: nova-fairwinds
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
