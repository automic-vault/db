id: brew:spirv-cross
display-name: spirv-cross
homepage: https://github.com/KhronosGroup/SPIRV-Cross
repo: https://github.com/KhronosGroup/SPIRV-Cross
docs: https://github.com/KhronosGroup/SPIRV-Cross
package-manager:
  brew: spirv-cross
  debian: spirv-cross
  macports: spirv-cross
  nix: spirv-cross
  pacman: spirv-cross
  ubuntu: spirv-cross
  zypper: spirv-cross
package-manager-url: https://formulae.brew.sh/formula/spirv-cross
version: 1.4.350.0
license: Apache-2.0 AND MIT AND CC-BY-4.0 AND MIT-Khronos-old
category: development
tags:
  - cli
description: Performing reflection and disassembling SPIR-V
source-archive: >
  https://github.com/KhronosGroup/SPIRV-Cross/archive/refs/tags/vulkan-sdk-1.4.350.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: spirv-cross
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spirv-cross
  brew: brew install spirv-cross
  debian: sudo apt install spirv-cross
  macports: sudo port install spirv-cross
  nix: nix profile install nixpkgs#spirv-cross
  pacman: sudo pacman -S spirv-cross
  ubuntu: sudo apt install spirv-cross
  zypper: sudo zypper install spirv-cross
provenance:
  formula: spirv-cross
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
