id: brew:geni
display-name: geni
homepage: https://github.com/emilpriver/geni
repo: https://github.com/emilpriver/geni
docs: https://github.com/emilpriver/geni
package-manager:
  brew: geni
package-manager-url: https://formulae.brew.sh/formula/geni
version: 1.3.2
license: MIT
category: database
tags:
  - cli
  - database
description: Standalone database migration tool
source-archive: https://github.com/emilpriver/geni/archive/refs/tags/v1.3.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: geni
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:geni
  brew: brew install geni
provenance:
  formula: geni
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
