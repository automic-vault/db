id: brew:gjs
display-name: gjs
homepage: https://gitlab.gnome.org/GNOME/gjs/wikis/Home
repo: https://download.gnome.org/sources/gjs/1.88/gjs-1.88.0.tar.xz
docs: https://gitlab.gnome.org/GNOME/gjs/wikis/Home
package-manager:
  apk: gjs
  brew: gjs
  debian: gjs
  dnf: gjs
  macports: gjs
  nix: gjs
  pacman: gjs
  ubuntu: gjs
  zypper: gjs
package-manager-url: https://formulae.brew.sh/formula/gjs
version: 1.88.0
license: LGPL-2.0-or-later AND MIT
category: development
tags:
  - cli
description: JavaScript Bindings for GNOME
source-archive: https://download.gnome.org/sources/gjs/1.88/gjs-1.88.0.tar.xz
dependencies:
  - cairo
  - gettext
  - glib
  - gobject-introspection
  - libx11
  - readline
  - spidermonkey
build-dependencies:
  - meson
  - ninja
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: gjs
  - exposure: global executable
    kind: cli
    name: gjs-console
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add gjs
  av: sudo av install brew:gjs
  brew: brew install gjs
  debian: sudo apt install gjs
  dnf: sudo dnf install gjs
  macports: sudo port install gjs
  nix: nix profile install nixpkgs#gjs
  pacman: sudo pacman -S gjs
  ubuntu: sudo apt install gjs
  zypper: sudo zypper install gjs
provenance:
  formula: gjs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
