id: brew:kimi-cli
display-name: kimi-cli
homepage: https://github.com/MoonshotAI/kimi-cli
repo: >
  https://files.pythonhosted.org/packages/fc/d4/612707e894bb4acf44bd82162eeae4321fba6ad81e45b8f8e55044991bcf/kimi_cli-1.44.0.tar.gz
docs: https://github.com/MoonshotAI/kimi-cli
package-manager:
  brew: kimi-cli
  scoop: main/kimi-cli
  winget: MoonshotAI.KimiCLI
package-manager-url: https://formulae.brew.sh/formula/kimi-cli
version: 1.44.0
license: Apache-2.0
category: development
tags:
  - cli
description: CLI agent for MoonshotAI Kimi platform
source-archive: >
  https://files.pythonhosted.org/packages/fc/d4/612707e894bb4acf44bd82162eeae4321fba6ad81e45b8f8e55044991bcf/kimi_cli-1.44.0.tar.gz
dependencies:
  - certifi
  - cryptography
  - libyaml
  - pillow
  - pydantic
  - python@3.14
  - re2
  - rpds-py
build-dependencies:
  - pkgconf
  - pybind11
  - rust
uses-from-macos:
  - libffi
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: kimi
  - exposure: global executable
    kind: cli
    name: kimi-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kimi-cli
  brew: brew install kimi-cli
  scoop: scoop install main/kimi-cli
  winget: winget install --id MoonshotAI.KimiCLI -e
provenance:
  formula: kimi-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
