id: brew:sbjson
display-name: sbjson
homepage: https://github.com/SBJson/SBJson
repo: https://github.com/SBJson/SBJson
docs: https://github.com/SBJson/SBJson
package-manager:
  brew: sbjson
package-manager-url: https://formulae.brew.sh/formula/sbjson
version: 5.0.4
license: BSD-3-Clause
category: development
tags:
  - cli
  - json
description: JSON CLI parser & reformatter based on SBJson v5
source-archive: https://github.com/SBJson/SBJson/archive/refs/tags/v5.0.4.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: sbjson
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sbjson
  brew: brew install sbjson
provenance:
  formula: sbjson
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
