id: brew:kona
display-name: kona
homepage: https://github.com/kevinlawler/kona
repo: https://github.com/kevinlawler/kona
docs: https://github.com/kevinlawler/kona
package-manager:
  brew: kona
  nix: kona
  winget: Tencent.WeSing
package-manager-url: https://formulae.brew.sh/formula/kona
version: 20211225
license: ISC
category: development
tags:
  - cli
description: Open-source implementation of the K programming language
source-archive: https://github.com/kevinlawler/kona/archive/refs/tags/Win64-20211225.tar.gz
executables:
