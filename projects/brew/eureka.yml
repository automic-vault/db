id: brew:eureka
display-name: eureka
homepage: https://github.com/simeg/eureka
repo: https://github.com/simeg/eureka
docs: https://github.com/simeg/eureka
package-manager:
  brew: eureka
  debian: eureka
  dnf: eureka
  macports: eureka
  ubuntu: eureka
  zypper: eureka
package-manager-url: https://formulae.brew.sh/formula/eureka
version: 2.0.0
license: MIT
category: development
tags:
  - cli
description: CLI tool to input and store your ideas without leaving the terminal
source-archive: https://github.com/simeg/eureka/archive/refs/tags/v2.0.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: eureka
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:eureka
  brew: brew install eureka
  debian: sudo apt install eureka
  dnf: sudo dnf install eureka
  macports: sudo port install eureka
  ubuntu: sudo apt install eureka
  zypper: sudo zypper install eureka
provenance:
  formula: eureka
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
