id: brew:pcre2
display-name: pcre2
homepage: https://www.pcre.org/
repo: https://github.com/PCRE2Project/pcre2
docs: https://www.pcre.org/
package-manager:
  apk: pcre2
  brew: pcre2
  dnf: pcre2
  nix: pcre2
  pacman: pcre2
  scoop: main/pcre2grep
package-manager-url: https://formulae.brew.sh/formula/pcre2
version: 10.47
license: BSD-3-Clause
category: development
tags:
  - cli
description: Perl compatible regular expressions library with a new API
source-archive: https://github.com/PCRE2Project/pcre2/releases/download/pcre2-10.47/pcre2-10.47.tar.bz2
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: pcre2-config
  - exposure: global executable
    kind: cli
    name: pcre2grep
  - exposure: global executable
    kind: cli
    name: pcre2test
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pcre2
  av: sudo av install brew:pcre2
  brew: brew install pcre2
  dnf: sudo dnf install pcre2
  nix: nix profile install nixpkgs#pcre2
  pacman: sudo pacman -S pcre2
  scoop: scoop install main/pcre2grep
provenance:
  formula: pcre2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
