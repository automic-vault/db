id: brew:little-cms2
display-name: little-cms2
homepage: https://www.littlecms.com/
repo: https://downloads.sourceforge.net/project/lcms/lcms/2.19/lcms2-2.19.tar.gz
docs: https://www.littlecms.com/
package-manager:
  brew: little-cms2
package-manager-url: https://formulae.brew.sh/formula/little-cms2
version: 2.19
license: MIT
category: network
tags:
  - cli
description: Color management engine supporting ICC profiles
source-archive: https://downloads.sourceforge.net/project/lcms/lcms/2.19/lcms2-2.19.tar.gz
dependencies:
  - jpeg-turbo
  - libtiff
executables:
  - exposure: global executable
    kind: cli
    name: jpgicc
  - exposure: global executable
    kind: cli
    name: linkicc
  - exposure: global executable
    kind: cli
    name: psicc
  - exposure: global executable
    kind: cli
    name: tificc
  - exposure: global executable
    kind: cli
    name: transicc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:little-cms2
  brew: brew install little-cms2
provenance:
  formula: little-cms2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
