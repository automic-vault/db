id: brew:evernote2md
display-name: evernote2md
homepage: https://github.com/wormi4ok/evernote2md
repo: https://github.com/wormi4ok/evernote2md
docs: https://github.com/wormi4ok/evernote2md
package-manager:
  brew: evernote2md
  macports: evernote2md
package-manager-url: https://formulae.brew.sh/formula/evernote2md
version: 0.22.2
license: MIT
category: development
tags:
  - cli
description: Convert Evernote .enex file to Markdown
source-archive: https://github.com/wormi4ok/evernote2md/archive/refs/tags/v0.22.2.tar.gz
build-dependencies:
