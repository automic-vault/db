id: brew:nu
display-name: nu
homepage: https://programming.nu/
repo: https://github.com/programming-nu/nu
docs: https://programming.nu/
package-manager:
  brew: nu
  dnf: nu
  macports: nu
  nix: nufmt
  scoop: main/nu
  winget: Nushell.Nushell
package-manager-url: https://formulae.brew.sh/formula/nu
version: 2.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Object-oriented, Lisp-like programming language
source-archive: https://github.com/programming-nu/nu/archive/refs/tags/v2.3.0.tar.gz
dependencies:
  - libffi
  - pcre
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: nubake
  - exposure: global executable
    kind: cli
    name: nudoc
  - exposure: global executable
    kind: cli
    name: nufmt
  - exposure: global executable
    kind: cli
    name: nuke
  - exposure: global executable
    kind: cli
    name: nush
  - exposure: global executable
    kind: cli
    name: nutemplate
  - exposure: global executable
    kind: cli
    name: nutest
  - exposure: global executable
    kind: cli
    name: nutmbundle
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Nu.framework was installed to: $HOMEBREW_CELLAR/nu/2.3.0_4/Frameworks/Nu.framework
    You may want to symlink this Framework to a standard macOS location, such as: ln -s
    "$HOMEBREW_CELLAR/nu/2.3.0_4/Frameworks/Nu.framework" /Library/Frameworks
  post-install-defined: false
install-lines:
  av: sudo av install brew:nu
  brew: brew install nu
  dnf: sudo dnf install nu
  macports: sudo port install nu
  nix: nix profile install nixpkgs#nufmt
  scoop: scoop install main/nu
  winget: winget install --id Nushell.Nushell -e
provenance:
  formula: nu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
