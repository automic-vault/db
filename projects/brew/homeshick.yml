id: brew:homeshick
display-name: homeshick
homepage: https://github.com/andsens/homeshick
repo: https://github.com/andsens/homeshick
docs: https://github.com/andsens/homeshick
package-manager:
  brew: homeshick
  zypper: homeshick
package-manager-url: https://formulae.brew.sh/formula/homeshick
version: 2.0.1
license: MIT
category: development
tags:
  - cli
  - git
description: Git dotfiles synchronizer written in bash
source-archive: https://github.com/andsens/homeshick/archive/refs/tags/v2.0.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: homeshick
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To enable the `homeshick cd <CASTLE>` command, you need to `export
    HOMESHICK_DIR=$HOMEBREW_PREFIX/opt/homeshick` and `source
    "$HOMEBREW_PREFIX/opt/homeshick/homeshick.sh"` in your $HOME/.bashrc
  post-install-defined: false
install-lines:
  av: sudo av install brew:homeshick
  brew: brew install homeshick
  zypper: sudo zypper install homeshick
provenance:
  formula: homeshick
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
