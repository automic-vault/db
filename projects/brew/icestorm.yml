id: brew:icestorm
display-name: icestorm
homepage: https://prjicestorm.readthedocs.io
repo: https://github.com/YosysHQ/icestorm
docs: https://prjicestorm.readthedocs.io
package-manager:
  apk: icestorm
  brew: icestorm
  dnf: icestorm
  nix: icestorm
package-manager-url: https://formulae.brew.sh/formula/icestorm
version: 1.1
license: ISC
category: development
tags:
  - cli
description: Tools for analyzing and creating Lattice iCE40 FPGA bitstream files
source-archive: https://github.com/YosysHQ/icestorm/archive/refs/tags/v1.1.tar.gz
dependencies:
  - libftdi
  - libusb
  - python@3.14
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: icebox_asc2hlc
  - exposure: global executable
    kind: cli
    name: icebox_chipdb
  - exposure: global executable
    kind: cli
    name: icebox_colbuf
  - exposure: global executable
    kind: cli
    name: icebox_diff
  - exposure: global executable
    kind: cli
    name: icebox_explain
  - exposure: global executable
    kind: cli
    name: icebox_hlc2asc
  - exposure: global executable
    kind: cli
    name: icebox_html
  - exposure: global executable
    kind: cli
    name: icebox_maps
  - exposure: global executable
    kind: cli
    name: icebox_stat
  - exposure: global executable
    kind: cli
    name: icebox_vlog
  - exposure: global executable
    kind: cli
    name: icebram
  - exposure: global executable
    kind: cli
    name: icemulti
  - exposure: global executable
    kind: cli
    name: icepack
  - exposure: global executable
    kind: cli
    name: icepll
  - exposure: global executable
    kind: cli
    name: iceprog
  - exposure: global executable
    kind: cli
    name: icetime
  - exposure: global executable
    kind: cli
    name: iceunpack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add icestorm
  av: sudo av install brew:icestorm
  brew: brew install icestorm
  dnf: sudo dnf install icestorm
  nix: nix profile install nixpkgs#icestorm
provenance:
  formula: icestorm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
