id: brew:ferium
display-name: ferium
homepage: https://github.com/gorilla-devs/ferium
repo: https://github.com/gorilla-devs/ferium
docs: https://github.com/gorilla-devs/ferium
package-manager:
  brew: ferium
  macports: ferium
  nix: ferium
  winget: GorillaDevs.Ferium
package-manager-url: https://formulae.brew.sh/formula/ferium
version: 4.7.1
license: MPL-2.0
category: development
tags:
  - cli
description: Fast and multi-source CLI program for managing Minecraft mods and modpacks
source-archive: https://github.com/gorilla-devs/ferium/archive/refs/tags/v4.7.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: ferium
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ferium
  brew: brew install ferium
  macports: sudo port install ferium
  nix: nix profile install nixpkgs#ferium
  winget: winget install --id GorillaDevs.Ferium -e
provenance:
  formula: ferium
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
