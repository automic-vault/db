id: brew:displayplacer
display-name: displayplacer
homepage: https://github.com/jakehilborn/displayplacer
repo: https://github.com/jakehilborn/displayplacer
docs: https://github.com/jakehilborn/displayplacer
package-manager:
  brew: displayplacer
  macports: displayplacer
package-manager-url: https://formulae.brew.sh/formula/displayplacer
version: 1.4.0
license: MIT
category: development
tags:
  - cli
description: Utility to configure multi-display resolutions and arrangements
source-archive: https://github.com/jakehilborn/displayplacer/archive/refs/tags/v1.4.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: displayplacer
bottle:
  available: true
  platforms:
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:displayplacer
  brew: brew install displayplacer
  macports: sudo port install displayplacer
provenance:
  formula: displayplacer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
