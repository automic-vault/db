  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:x86_64-linux-gnu-binutils
  brew: brew install x86_64-linux-gnu-binutils
provenance:
  formula: x86_64-linux-gnu-binutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
