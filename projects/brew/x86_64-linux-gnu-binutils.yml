  - exposure: global executable
    kind: cli
    name: x86_64-linux-gnu-as
  - exposure: global executable
    kind: cli
    name: x86_64-linux-gnu-c++filt
  - exposure: global executable
    kind: cli
    name: x86_64-linux-gnu-elfedit
  - exposure: global executable
    kind: cli
    name: x86_64-linux-gnu-gprof
  - exposure: global executable
    kind: cli
    name: x86_64-linux-gnu-ld
  - exposure: global executable
    kind: cli
    name: x86_64-linux-gnu-ld.bfd
  - exposure: global executable
    kind: cli
    name: x86_64-linux-gnu-nm
  - exposure: global executable
    kind: cli
    name: x86_64-linux-gnu-objcopy
  - exposure: global executable
    kind: cli
    name: x86_64-linux-gnu-objdump
