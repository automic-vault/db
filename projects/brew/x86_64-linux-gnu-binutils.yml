id: brew:x86_64-linux-gnu-binutils
display-name: x86_64-linux-gnu-binutils
homepage: https://www.gnu.org/software/binutils/binutils.html
repo: https://ftpmirror.gnu.org/gnu/binutils/binutils-2.46.0.tar.bz2
docs: https://www.gnu.org/software/binutils/binutils.html
package-manager:
  brew: x86_64-linux-gnu-binutils
package-manager-url: https://formulae.brew.sh/formula/x86_64-linux-gnu-binutils
version: 2.46.0
license: GPL-3.0-or-later
category: network
tags:
