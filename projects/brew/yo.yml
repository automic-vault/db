id: brew:yo
display-name: yo
homepage: https://yeoman.io
repo: https://registry.npmjs.org/yo/-/yo-7.0.1.tgz
docs: https://yeoman.io
package-manager:
  brew: yo
  chocolatey: yo
  nix: yo
package-manager-url: https://formulae.brew.sh/formula/yo
version: 7.0.1
license: BSD-2-Clause
category: network
tags:
  - cli
description: CLI tool for running Yeoman generators
source-archive: https://registry.npmjs.org/yo/-/yo-7.0.1.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: yo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yo
  brew: brew install yo
  chocolatey: choco install yo
  nix: nix profile install nixpkgs#yo
provenance:
  formula: yo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
