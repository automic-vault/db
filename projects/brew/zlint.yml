id: brew:zlint
display-name: zlint
homepage: https://zmap.io/
repo: https://github.com/zmap/zlint
docs: https://zmap.io/
package-manager:
  brew: zlint
  debian: zlint
  macports: zlint
  nix: zlint
package-manager-url: https://formulae.brew.sh/formula/zlint
version: 3.7.1
license: Apache-2.0
category: development
tags:
  - cli
description: X.509 Certificate Linter focused on Web PKI standards and requirements
source-archive: https://github.com/zmap/zlint/archive/refs/tags/v3.7.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: zlint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zlint
  brew: brew install zlint
  debian: sudo apt install zlint
  macports: sudo port install zlint
  nix: nix profile install nixpkgs#zlint
provenance:
  formula: zlint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
