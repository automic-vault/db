id: brew:jimtcl
display-name: jimtcl
homepage: https://jim.tcl.tk/index.html
repo: https://github.com/msteveb/jimtcl
docs: https://jim.tcl.tk/index.html
package-manager:
  apk: jimtcl
  brew: jimtcl
  debian: jimsh
  dnf: jimtcl
  macports: jimtcl
  nix: jimtcl
  pacman: jimtcl
  ubuntu: jimsh
  zypper: jimtcl
package-manager-url: https://formulae.brew.sh/formula/jimtcl
version: 0.83
license: BSD-2-Clause
category: development
tags:
  - cli
description: Small footprint implementation of Tcl
source-archive: https://github.com/msteveb/jimtcl/archive/refs/tags/0.83.tar.gz
dependencies:
  - openssl@3
  - readline
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: build-jim-ext
  - exposure: global executable
    kind: cli
    name: jimdb
  - exposure: global executable
    kind: cli
    name: jimsh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jimtcl
  av: sudo av install brew:jimtcl
  brew: brew install jimtcl
  debian: sudo apt install jimsh
  dnf: sudo dnf install jimtcl
  macports: sudo port install jimtcl
  nix: nix profile install nixpkgs#jimtcl
  pacman: sudo pacman -S jimtcl
  ubuntu: sudo apt install jimsh
  zypper: sudo zypper install jimtcl
provenance:
  formula: jimtcl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
