id: brew:taplo
display-name: taplo
homepage: https://taplo.tamasfe.dev
repo: https://github.com/tamasfe/taplo
docs: https://taplo.tamasfe.dev
package-manager:
  apk: taplo
  brew: taplo
  macports: taplo
  nix: taplo
  scoop: main/taplo
  winget: tamasfe.taplo
  zypper: taplo
package-manager-url: https://formulae.brew.sh/formula/taplo
version: 0.10.0
license: MIT
category: development
tags:
  - cli
description: TOML toolkit written in Rust
source-archive: https://github.com/tamasfe/taplo/archive/refs/tags/0.10.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: taplo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add taplo
  av: sudo av install brew:taplo
  brew: brew install taplo
  macports: sudo port install taplo
  nix: nix profile install nixpkgs#taplo
  scoop: scoop install main/taplo
  winget: winget install --id tamasfe.taplo -e
  zypper: sudo zypper install taplo
provenance:
  formula: taplo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
