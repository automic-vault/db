id: brew:ktmpl
display-name: ktmpl
homepage: https://github.com/jimmycuadra/ktmpl
repo: https://github.com/jimmycuadra/ktmpl
docs: https://github.com/jimmycuadra/ktmpl
package-manager:
  brew: ktmpl
package-manager-url: https://formulae.brew.sh/formula/ktmpl
version: 0.9.1
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
description: Parameterized templates for Kubernetes manifests
source-archive: https://github.com/jimmycuadra/ktmpl/archive/refs/tags/0.9.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ktmpl
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ktmpl
  brew: brew install ktmpl
provenance:
  formula: ktmpl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
