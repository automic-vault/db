id: brew:gocryptfs
display-name: gocryptfs
homepage: https://nuetzlich.net/gocryptfs/
repo: https://github.com/rfjakob/gocryptfs
docs: https://nuetzlich.net/gocryptfs/
package-manager:
  apk: gocryptfs
  brew: gocryptfs
  debian: gocryptfs
  dnf: gocryptfs
  macports: gocryptfs
  nix: gocryptfs
  pacman: gocryptfs
  ubuntu: gocryptfs
  zypper: gocryptfs
package-manager-url: https://formulae.brew.sh/formula/gocryptfs
version: 2.6.1
license: MIT
category: security
tags:
  - cli
description: Encrypted overlay filesystem written in Go
source-archive: >
  https://github.com/rfjakob/gocryptfs/releases/download/v2.6.1/gocryptfs_v2.6.1_src-deps.tar.gz
dependencies:
  - libfuse
  - openssl@4
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gocryptfs
  - exposure: global executable
    kind: cli
    name: gocryptfs-xray
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gocryptfs
  av: sudo av install brew:gocryptfs
  brew: brew install gocryptfs
  debian: sudo apt install gocryptfs
  dnf: sudo dnf install gocryptfs
  macports: sudo port install gocryptfs
  nix: nix profile install nixpkgs#gocryptfs
  pacman: sudo pacman -S gocryptfs
  ubuntu: sudo apt install gocryptfs
  zypper: sudo zypper install gocryptfs
provenance:
  formula: gocryptfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
