id: brew:clblas
display-name: clblas
homepage: https://github.com/clMathLibraries/clBLAS
repo: https://github.com/clMathLibraries/clBLAS
docs: https://github.com/clMathLibraries/clBLAS
package-manager:
  brew: clblas
  macports: clblas
  nix: clblas
package-manager-url: https://formulae.brew.sh/formula/clblas
version: 2.12
license: Apache-2.0
category: development
tags:
  - cli
description: Library containing BLAS functions written in OpenCL
source-archive: https://github.com/clMathLibraries/clBLAS/archive/refs/tags/v2.12.tar.gz
build-dependencies:
  - boost
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: clBLAS-tune
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clblas
  brew: brew install clblas
  macports: sudo port install clblas
  nix: nix profile install nixpkgs#clblas
provenance:
  formula: clblas
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
