id: brew:helmfile
display-name: helmfile
homepage: https://github.com/helmfile/helmfile
repo: https://github.com/helmfile/helmfile
docs: https://github.com/helmfile/helmfile
package-manager:
  apk: helmfile
  brew: helmfile
  macports: helmfile
  nix: helmfile
  pacman: helmfile
  scoop: main/helmfile
  zypper: helmfile
package-manager-url: https://formulae.brew.sh/formula/helmfile
version: 1.5.2
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
description: Deploy Kubernetes Helm Charts
source-archive: https://github.com/helmfile/helmfile/archive/refs/tags/v1.5.2.tar.gz
dependencies:
  - helm
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: helmfile
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add helmfile
  av: sudo av install brew:helmfile
  brew: brew install helmfile
  macports: sudo port install helmfile
  nix: nix profile install nixpkgs#helmfile
  pacman: sudo pacman -S helmfile
  scoop: scoop install main/helmfile
  zypper: sudo zypper install helmfile
provenance:
  formula: helmfile
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
