id: brew:specify
display-name: specify
homepage: https://github.com/github/spec-kit
repo: https://github.com/github/spec-kit
docs: https://github.com/github/spec-kit
package-manager:
  brew: specify
package-manager-url: https://formulae.brew.sh/formula/specify
version: 0.8.14
license: MIT
category: development
tags:
  - cli
description: Toolkit to help you get started with Spec-Driven Development
source-archive: https://github.com/github/spec-kit/archive/refs/tags/v0.8.14.tar.gz
dependencies:
  - certifi
  - libyaml
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: specify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:specify
  brew: brew install specify
provenance:
  formula: specify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
