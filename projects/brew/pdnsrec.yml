id: brew:pdnsrec
display-name: pdnsrec
homepage: https://www.powerdns.com/powerdns-recursor
repo: https://downloads.powerdns.com/releases/pdns-recursor-5.4.1.tar.xz
docs: https://www.powerdns.com/powerdns-recursor
package-manager:
  apk: pdns-recursor
  brew: pdnsrec
  debian: pdns-recursor
  dnf: pdns-recursor
  macports: pdns-recursor
  nix: pdns-recursor
  ubuntu: pdns-recursor
  zypper: pdns-recursor
package-manager-url: https://formulae.brew.sh/formula/pdnsrec
version: 5.4.1
license: GPL-2.0-only
category: network
tags:
  - cli
description: Non-authoritative/recursing DNS server
source-archive: https://downloads.powerdns.com/releases/pdns-recursor-5.4.1.tar.xz
dependencies:
  - boost
  - lua
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: pdns_recursor
  - exposure: global executable
    kind: cli
    name: rec_control
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pdns-recursor
  av: sudo av install brew:pdnsrec
  brew: brew install pdnsrec
  debian: sudo apt install pdns-recursor
  dnf: sudo dnf install pdns-recursor
  macports: sudo port install pdns-recursor
  nix: nix profile install nixpkgs#pdns-recursor
  ubuntu: sudo apt install pdns-recursor
  zypper: sudo zypper install pdns-recursor
provenance:
  formula: pdnsrec
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
