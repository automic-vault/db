id: brew:tth
display-name: tth
homepage: http://silas.psfc.mit.edu/tth/
repo: https://downloads.sourceforge.net/project/tth/tth4.16.tar.gz
docs: http://silas.psfc.mit.edu/tth/
package-manager:
  brew: tth
  debian: tth
  dnf: tth
  macports: tth
  ubuntu: tth
package-manager-url: https://formulae.brew.sh/formula/tth
version: 4.16
license: GPL-2.0-only
category: network
tags:
  - cli
description: TeX/LaTeX to HTML converter
source-archive: https://downloads.sourceforge.net/project/tth/tth4.16.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: latex2gif
  - exposure: global executable
    kind: cli
    name: ps2gif
  - exposure: global executable
    kind: cli
    name: tth
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tth
  brew: brew install tth
  debian: sudo apt install tth
  dnf: sudo dnf install tth
  macports: sudo port install tth
  ubuntu: sudo apt install tth
provenance:
  formula: tth
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
