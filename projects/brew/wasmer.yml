id: brew:wasmer
display-name: wasmer
homepage: https://wasmer.io
repo: https://github.com/wasmerio/wasmer
docs: https://wasmer.io
package-manager:
  brew: wasmer
  macports: wasmer
  nix: wasmer
  pacman: wasmer
  scoop: main/wasmer
  winget: Wasmer.Wasmer
package-manager-url: https://formulae.brew.sh/formula/wasmer
version: 7.1.0
license: MIT
category: development
tags:
  - cli
description: Universal WebAssembly Runtime
source-archive: https://github.com/wasmerio/wasmer.git
build-dependencies:
  - cmake
  - pkgconf
  - rust
  - wabt
executables:
  - exposure: global executable
    kind: cli
    name: wasmer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wasmer
  brew: brew install wasmer
  macports: sudo port install wasmer
  nix: nix profile install nixpkgs#wasmer
  pacman: sudo pacman -S wasmer
  scoop: scoop install main/wasmer
  winget: winget install --id Wasmer.Wasmer -e
provenance:
  formula: wasmer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
