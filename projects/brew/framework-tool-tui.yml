id: brew:framework-tool-tui
display-name: framework-tool-tui
homepage: https://github.com/grouzen/framework-tool-tui
repo: https://github.com/grouzen/framework-tool-tui
docs: https://github.com/grouzen/framework-tool-tui
package-manager:
  brew: framework-tool-tui
  nix: framework-tool-tui
package-manager-url: https://formulae.brew.sh/formula/framework-tool-tui
version: 0.8.3
license: MIT
category: development
tags:
