id: brew:jailkit
display-name: jailkit
homepage: https://olivier.sessink.nl/jailkit/
repo: https://olivier.sessink.nl/jailkit/jailkit-2.23.tar.bz2
docs: https://olivier.sessink.nl/jailkit/
package-manager:
  brew: jailkit
  debian: jailkit
  macports: jailkit
  ubuntu: jailkit
package-manager-url: https://formulae.brew.sh/formula/jailkit
version: 2.23
license: BSD-3-Clause AND LGPL-2.0-or-later
category: network
tags:
  - cli
description: Utilities to create limited user accounts in a chroot jail
source-archive: https://olivier.sessink.nl/jailkit/jailkit-2.23.tar.bz2
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: jk_check
  - exposure: global executable
    kind: cli
    name: jk_chrootlaunch
  - exposure: global executable
    kind: cli
    name: jk_chrootsh
  - exposure: global executable
    kind: cli
    name: jk_cp
  - exposure: global executable
    kind: cli
    name: jk_init
  - exposure: global executable
    kind: cli
    name: jk_jailuser
  - exposure: global executable
    kind: cli
    name: jk_list
  - exposure: global executable
    kind: cli
    name: jk_lsh
  - exposure: global executable
    kind: cli
    name: jk_socketd
  - exposure: global executable
    kind: cli
    name: jk_uchroot
  - exposure: global executable
    kind: cli
    name: jk_update
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jailkit
  brew: brew install jailkit
  debian: sudo apt install jailkit
  macports: sudo port install jailkit
  ubuntu: sudo apt install jailkit
provenance:
  formula: jailkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
