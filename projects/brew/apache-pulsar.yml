id: brew:apache-pulsar
display-name: apache-pulsar
homepage: https://pulsar.apache.org/
repo: >
  https://www.apache.org/dyn/closer.lua?path=pulsar/pulsar-4.2.1/apache-pulsar-4.2.1-src.tar.gz
docs: https://pulsar.apache.org/
package-manager:
  brew: apache-pulsar
  chocolatey: pulsar
  nix: pulsar
  scoop: extras/pulsar
  winget: Pulsar-Edit.Pulsar
package-manager-url: https://formulae.brew.sh/formula/apache-pulsar
version: 4.2.1
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Cloud-native distributed messaging and streaming platform
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=pulsar/pulsar-4.2.1/apache-pulsar-4.2.1-src.tar.gz
dependencies:
  - openjdk@21
build-dependencies:
  - maven
  - protoc-gen-grpc-java
executables:
  - exposure: global executable
    kind: cli
    name: bookkeeper
  - exposure: global executable
    kind: cli
    name: function-localrunner
  - exposure: global executable
    kind: cli
    name: pulsar
  - exposure: global executable
    kind: cli
    name: pulsar-admin
  - exposure: global executable
    kind: cli
    name: pulsar-client
  - exposure: global executable
    kind: cli
    name: pulsar-daemon
  - exposure: global executable
    kind: cli
    name: pulsar-managed-ledger-admin
  - exposure: global executable
    kind: cli
    name: pulsar-perf
  - exposure: global executable
    kind: cli
    name: pulsar-shell
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:apache-pulsar
  brew: brew install apache-pulsar
  chocolatey: choco install pulsar
  nix: nix profile install nixpkgs#pulsar
  scoop: scoop install extras/pulsar
  winget: winget install --id Pulsar-Edit.Pulsar -e
provenance:
  formula: apache-pulsar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
