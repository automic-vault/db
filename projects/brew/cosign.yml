id: brew:cosign
display-name: cosign
homepage: https://github.com/sigstore/cosign
repo: https://github.com/sigstore/cosign
docs: https://github.com/sigstore/cosign
package-manager:
  apk: cosign
  brew: cosign
  debian: cosign
  macports: cosign
  nix: cosign
  pacman: cosign
  scoop: main/cosign
  winget: Sigstore.Cosign
  zypper: cosign
package-manager-url: https://formulae.brew.sh/formula/cosign
version: 3.0.6
license: Apache-2.0
category: development
tags:
  - cli
description: Container Signing
source-archive: https://github.com/sigstore/cosign.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cosign
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cosign
  av: sudo av install brew:cosign
  brew: brew install cosign
  debian: sudo apt install cosign
  macports: sudo port install cosign
  nix: nix profile install nixpkgs#cosign
  pacman: sudo pacman -S cosign
  scoop: scoop install main/cosign
  winget: winget install --id Sigstore.Cosign -e
  zypper: sudo zypper install cosign
provenance:
  formula: cosign
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
