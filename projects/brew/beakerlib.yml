id: brew:beakerlib
display-name: beakerlib
homepage: https://github.com/beakerlib/beakerlib
repo: https://github.com/beakerlib/beakerlib
docs: https://github.com/beakerlib/beakerlib
package-manager:
  brew: beakerlib
  dnf: beakerlib
package-manager-url: https://formulae.brew.sh/formula/beakerlib
version: 1.33.3
license: GPL-2.0-only
category: development
tags:
  - cli
description: Shell-level integration testing library
source-archive: https://github.com/beakerlib/beakerlib/archive/refs/tags/1.33.3.tar.gz
dependencies:
  - coreutils
  - gnu-getopt
executables:
  - exposure: global executable
    kind: cli
    name: beakerlib-deja-summarize
  - exposure: global executable
    kind: cli
    name: beakerlib-journalcmp
  - exposure: global executable
    kind: cli
    name: beakerlib-journalling
  - exposure: global executable
    kind: cli
    name: beakerlib-lsb_release
  - exposure: global executable
    kind: cli
    name: beakerlib-rlMemAvg
  - exposure: global executable
    kind: cli
    name: beakerlib-rlMemPeak
  - exposure: global executable
    kind: cli
    name: beakerlib-testwatcher
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:beakerlib
  brew: brew install beakerlib
  dnf: sudo dnf install beakerlib
provenance:
  formula: beakerlib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
