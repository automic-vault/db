id: brew:biosig
display-name: biosig
homepage: https://biosig.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/biosig/BioSig%20for%20C_C%2B%2B/src/biosig-3.9.5.src.tar.xz
docs: https://biosig.sourceforge.net/
package-manager:
  brew: biosig
package-manager-url: https://formulae.brew.sh/formula/biosig
version: 3.9.5
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Tools for biomedical signal processing and data conversion
source-archive: >
  https://downloads.sourceforge.net/project/biosig/BioSig%20for%20C_C%2B%2B/src/biosig-3.9.5.src.tar.xz
dependencies:
  - dcmtk
  - suite-sparse
build-dependencies:
  - gawk
  - libb64
executables:
  - exposure: global executable
    kind: cli
    name: bin2rec
  - exposure: global executable
    kind: cli
    name: biosig2gdf
  - exposure: global executable
    kind: cli
    name: biosig_fhir
  - exposure: global executable
    kind: cli
    name: heka2itx
  - exposure: global executable
    kind: cli
    name: physicalunits
  - exposure: global executable
    kind: cli
    name: rec2bin
  - exposure: global executable
    kind: cli
    name: save2aecg
  - exposure: global executable
    kind: cli
    name: save2gdf
  - exposure: global executable
    kind: cli
    name: save2scp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:biosig
  brew: brew install biosig
provenance:
  formula: biosig
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
