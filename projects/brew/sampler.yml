id: brew:sampler
display-name: sampler
homepage: https://sampler.dev
repo: https://github.com/sqshq/sampler
docs: https://sampler.dev
package-manager:
  brew: sampler
  macports: sampler
  nix: sampler
  scoop: main/sampler
package-manager-url: https://formulae.brew.sh/formula/sampler
version: 1.1.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Tool for shell commands execution, visualization and alerting
source-archive: https://github.com/sqshq/sampler/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sampler
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sampler
  brew: brew install sampler
  macports: sudo port install sampler
  nix: nix profile install nixpkgs#sampler
  scoop: scoop install main/sampler
provenance:
  formula: sampler
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
