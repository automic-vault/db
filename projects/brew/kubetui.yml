id: brew:kubetui
display-name: kubetui
homepage: https://github.com/sarub0b0/kubetui
repo: https://github.com/sarub0b0/kubetui
docs: https://github.com/sarub0b0/kubetui
package-manager:
  brew: kubetui
  nix: kubetui
  pacman: kubetui
  winget: kosay.kubetui
  zypper: kubetui
package-manager-url: https://formulae.brew.sh/formula/kubetui
version: 1.13.0
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
description: TUI tool for monitoring and exploration of Kubernetes resources
source-archive: https://github.com/sarub0b0/kubetui/archive/refs/tags/v1.13.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: kubetui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubetui
  brew: brew install kubetui
  nix: nix profile install nixpkgs#kubetui
  pacman: sudo pacman -S kubetui
  winget: winget install --id kosay.kubetui -e
  zypper: sudo zypper install kubetui
provenance:
  formula: kubetui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
