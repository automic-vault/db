id: brew:ghostunnel
display-name: ghostunnel
homepage: https://github.com/ghostunnel/ghostunnel
repo: https://github.com/ghostunnel/ghostunnel
docs: https://github.com/ghostunnel/ghostunnel
package-manager:
  brew: ghostunnel
  nix: ghostunnel
package-manager-url: https://formulae.brew.sh/formula/ghostunnel
version: 1.10.0
license: Apache-2.0
category: security
tags:
  - cli
description: Simple SSL/TLS proxy with mutual authentication
source-archive: https://github.com/ghostunnel/ghostunnel/archive/refs/tags/v1.10.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ghostunnel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ghostunnel
  brew: brew install ghostunnel
  nix: nix profile install nixpkgs#ghostunnel
provenance:
  formula: ghostunnel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
