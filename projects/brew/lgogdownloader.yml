id: brew:lgogdownloader
display-name: lgogdownloader
homepage: https://sites.google.com/site/gogdownloader/
repo: https://github.com/Sude-/lgogdownloader
docs: https://sites.google.com/site/gogdownloader/
package-manager:
  apk: lgogdownloader
  brew: lgogdownloader
  debian: lgogdownloader
  dnf: lgogdownloader
  nix: lgogdownloader
  ubuntu: lgogdownloader
package-manager-url: https://formulae.brew.sh/formula/lgogdownloader
version: 3.18
license: WTFPL
category: development
tags:
  - cli
description: Unofficial downloader for GOG.com games
source-archive: >
  https://github.com/Sude-/lgogdownloader/releases/download/v3.18/lgogdownloader-3.18.tar.gz
dependencies:
  - boost
  - htmlcxx
  - jsoncpp
  - rhash
  - tidy-html5
  - tinyxml2
build-dependencies:
  - cmake
  - help2man
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: lgogdownloader
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lgogdownloader
  av: sudo av install brew:lgogdownloader
  brew: brew install lgogdownloader
  debian: sudo apt install lgogdownloader
  dnf: sudo dnf install lgogdownloader
  nix: nix profile install nixpkgs#lgogdownloader
  ubuntu: sudo apt install lgogdownloader
provenance:
  formula: lgogdownloader
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
