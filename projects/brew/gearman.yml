id: brew:gearman
display-name: gearman
homepage: https://gearman.org/
repo: https://github.com/gearman/gearmand
docs: https://gearman.org/
package-manager:
  apk: gearmand
  brew: gearman
  debian: gearman
  macports: gearmand
  pacman: gearmand
  ubuntu: gearman
package-manager-url: https://formulae.brew.sh/formula/gearman
version: 1.1.22
license: BSD-3-Clause
category: development
tags:
  - cli
description: Application framework to farm out work to other machines or processes
source-archive: https://github.com/gearman/gearmand/releases/download/1.1.22/gearmand-1.1.22.tar.gz
dependencies:
  - boost
  - libevent
  - libmemcached
build-dependencies:
  - pkgconf
  - sphinx-doc
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: gearadmin
  - exposure: global executable
    kind: cli
    name: gearman
  - exposure: global executable
    kind: cli
    name: gearmand
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add gearmand
  av: sudo av install brew:gearman
  brew: brew install gearman
  debian: sudo apt install gearman
  macports: sudo port install gearmand
  pacman: sudo pacman -S gearmand
  ubuntu: sudo apt install gearman
provenance:
  formula: gearman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
