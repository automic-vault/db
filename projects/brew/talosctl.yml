id: brew:talosctl
display-name: talosctl
homepage: https://www.talos.dev/
repo: https://github.com/siderolabs/talos
docs: https://www.talos.dev/
package-manager:
  brew: talosctl
  nix: talosctl
  pacman: talosctl
  scoop: main/talosctl
  winget: Sidero.talosctl
  zypper: talosctl
package-manager-url: https://formulae.brew.sh/formula/talosctl
version: 1.13.3
license: MPL-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: CLI for out-of-band management of Kubernetes nodes created by Talos
source-archive: https://github.com/siderolabs/talos/archive/refs/tags/v1.13.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: talosctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:talosctl
  brew: brew install talosctl
  nix: nix profile install nixpkgs#talosctl
  pacman: sudo pacman -S talosctl
  scoop: scoop install main/talosctl
  winget: winget install --id Sidero.talosctl -e
  zypper: sudo zypper install talosctl
provenance:
  formula: talosctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
