id: brew:duti
display-name: duti
homepage: https://github.com/moretension/duti/
repo: https://github.com/moretension/duti
docs: https://github.com/moretension/duti/
package-manager:
  brew: duti
  macports: duti
  nix: duti
package-manager-url: https://formulae.brew.sh/formula/duti
version: 1.5.4
license: LicenseRef-Homebrew-public-domain
category: development
tags:
  - cli
description: Select default apps for documents and URL schemes on macOS
source-archive: https://github.com/moretension/duti/archive/refs/tags/duti-1.5.4.tar.gz
build-dependencies:
  - autoconf
executables:
  - exposure: global executable
    kind: cli
    name: duti
bottle:
  available: true
  platforms:
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:duti
  brew: brew install duti
  macports: sudo port install duti
  nix: nix profile install nixpkgs#duti
provenance:
  formula: duti
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
