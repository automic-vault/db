id: brew:unxip
display-name: unxip
homepage: https://github.com/saagarjha/unxip
repo: https://github.com/saagarjha/unxip
docs: https://github.com/saagarjha/unxip
package-manager:
  brew: unxip
  macports: unxip
package-manager-url: https://formulae.brew.sh/formula/unxip
version: 3.3
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Fast Xcode unarchiver
source-archive: https://github.com/saagarjha/unxip/archive/refs/tags/v3.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: unxip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:unxip
  brew: brew install unxip
  macports: sudo port install unxip
provenance:
  formula: unxip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
