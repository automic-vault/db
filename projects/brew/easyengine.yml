id: brew:easyengine
display-name: easyengine
homepage: https://easyengine.io/
repo: https://github.com/EasyEngine/easyengine
docs: https://easyengine.io/
package-manager:
  brew: easyengine
  macports: ee
  nix: ee
package-manager-url: https://formulae.brew.sh/formula/easyengine
version: 4.10.2
license: MIT
category: development
tags:
  - cli
description: Command-line control panel to manage WordPress sites
source-archive: https://github.com/EasyEngine/easyengine/releases/download/v4.10.2/easyengine.phar
dependencies:
  - dnsmasq
  - php
executables:
  - exposure: global executable
    kind: cli
    name: ee
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:easyengine
  brew: brew install easyengine
  macports: sudo port install ee
  nix: nix profile install nixpkgs#ee
provenance:
  formula: easyengine
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
