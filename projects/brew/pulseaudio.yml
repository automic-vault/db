id: brew:pulseaudio
display-name: pulseaudio
homepage: https://wiki.freedesktop.org/www/Software/PulseAudio/
repo: https://www.freedesktop.org/software/pulseaudio/releases/pulseaudio-17.0.tar.xz
docs: https://wiki.freedesktop.org/www/Software/PulseAudio/
package-manager:
  apk: pulseaudio
  brew: pulseaudio
  debian: pulseaudio
  dnf: pulseaudio
  macports: pulseaudio
  nix: pulseaudio
  pacman: pulseaudio
  ubuntu: pulseaudio
  zypper: pulseaudio
package-manager-url: https://formulae.brew.sh/formula/pulseaudio
version: 17.0
license: GPL-2.0-or-later AND LGPL-2.1-or-later AND BSD-3-Clause
category: media
tags:
  - cli
description: Sound system for POSIX OSes
source-archive: https://www.freedesktop.org/software/pulseaudio/releases/pulseaudio-17.0.tar.xz
dependencies:
  - gettext
  - glib
  - libsndfile
  - libsoxr
  - libtool
  - openssl@3
  - orc
  - speexdsp
build-dependencies:
  - gettext
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pa-info
  - exposure: global executable
    kind: cli
    name: pacat
  - exposure: global executable
    kind: cli
    name: pacmd
  - exposure: global executable
    kind: cli
    name: pactl
  - exposure: global executable
    kind: cli
    name: padsp
  - exposure: global executable
    kind: cli
    name: pamon
  - exposure: global executable
    kind: cli
    name: paplay
  - exposure: global executable
    kind: cli
    name: parec
  - exposure: global executable
    kind: cli
    name: parecord
  - exposure: global executable
    kind: cli
    name: pasuspender
  - exposure: global executable
    kind: cli
    name: pulseaudio
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add pulseaudio
  av: sudo av install brew:pulseaudio
  brew: brew install pulseaudio
  debian: sudo apt install pulseaudio
  dnf: sudo dnf install pulseaudio
  macports: sudo port install pulseaudio
  nix: nix profile install nixpkgs#pulseaudio
  pacman: sudo pacman -S pulseaudio
  ubuntu: sudo apt install pulseaudio
  zypper: sudo zypper install pulseaudio
provenance:
  formula: pulseaudio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
