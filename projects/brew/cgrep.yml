id: brew:cgrep
display-name: cgrep
homepage: https://awgn.github.io/cgrep/
repo: https://hackage.haskell.org/package/cgrep-9.2.3/cgrep-9.2.3.tar.gz
docs: https://awgn.github.io/cgrep/
package-manager:
  brew: cgrep
  pacman: cgrep
package-manager-url: https://formulae.brew.sh/formula/cgrep
version: 9.2.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Context-aware grep for source code
source-archive: https://hackage.haskell.org/package/cgrep-9.2.3/cgrep-9.2.3.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: cgrep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cgrep
  brew: brew install cgrep
  pacman: sudo pacman -S cgrep
provenance:
  formula: cgrep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
