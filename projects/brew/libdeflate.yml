id: brew:libdeflate
display-name: libdeflate
homepage: https://github.com/ebiggers/libdeflate
repo: https://github.com/ebiggers/libdeflate
docs: https://github.com/ebiggers/libdeflate
package-manager:
  apk: libdeflate
  brew: libdeflate
  dnf: libdeflate
  macports: libdeflate
  nix: libdeflate
  pacman: libdeflate
package-manager-url: https://formulae.brew.sh/formula/libdeflate
version: 1.25
license: MIT
category: development
tags:
  - cli
description: Heavily optimized DEFLATE/zlib/gzip compression and decompression
source-archive: https://github.com/ebiggers/libdeflate/archive/refs/tags/v1.25.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: libdeflate-gunzip
  - exposure: global executable
    kind: cli
    name: libdeflate-gzip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libdeflate
  av: sudo av install brew:libdeflate
  brew: brew install libdeflate
  dnf: sudo dnf install libdeflate
  macports: sudo port install libdeflate
  nix: nix profile install nixpkgs#libdeflate
  pacman: sudo pacman -S libdeflate
provenance:
  formula: libdeflate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
