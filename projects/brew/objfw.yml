id: brew:objfw
display-name: objfw
homepage: https://objfw.nil.im/
repo: https://objfw.nil.im/downloads/objfw-1.5.4.tar.gz
docs: https://objfw.nil.im/
package-manager:
  apk: objfw
  brew: objfw
  debian: objfw
  dnf: objfw
  nix: objfw
package-manager-url: https://formulae.brew.sh/formula/objfw
version: 1.5.4
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Portable, lightweight framework for the Objective-C language
source-archive: https://objfw.nil.im/downloads/objfw-1.5.4.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: objfw-compile
  - exposure: global executable
    kind: cli
    name: objfw-config
  - exposure: global executable
    kind: cli
    name: objfw-embed
  - exposure: global executable
    kind: cli
    name: objfw-new
  - exposure: global executable
    kind: cli
    name: ofarc
  - exposure: global executable
    kind: cli
    name: ofdns
  - exposure: global executable
    kind: cli
    name: ofgctester
  - exposure: global executable
    kind: cli
    name: ofhash
  - exposure: global executable
    kind: cli
    name: ofhttp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add objfw
  av: sudo av install brew:objfw
  brew: brew install objfw
  debian: sudo apt install objfw
  dnf: sudo dnf install objfw
  nix: nix profile install nixpkgs#objfw
provenance:
  formula: objfw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
