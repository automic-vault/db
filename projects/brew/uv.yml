id: brew:uv
display-name: uv
homepage: https://docs.astral.sh/uv/
repo: https://github.com/astral-sh/uv
docs: https://docs.astral.sh/uv/
package-manager:
  apk: uv
  brew: uv
  chocolatey: uv
  dnf: uv
  macports: uv
  nix: uv
  pacman: uv
  scoop: main/uv
  winget: astral-sh.uv
package-manager-url: https://formulae.brew.sh/formula/uv
version: 0.11.16
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Extremely fast Python package installer and resolver, written in Rust
source-archive: https://github.com/astral-sh/uv/archive/refs/tags/0.11.16.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
  - xz
executables:
  - exposure: global executable
    kind: cli
    name: uv
  - exposure: global executable
    kind: cli
    name: uvx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add uv
  av: sudo av install brew:uv
  brew: brew install uv
  chocolatey: choco install uv
  dnf: sudo dnf install uv
  macports: sudo port install uv
  nix: nix profile install nixpkgs#uv
  pacman: sudo pacman -S uv
  scoop: scoop install main/uv
  winget: winget install --id astral-sh.uv -e
provenance:
  formula: uv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
