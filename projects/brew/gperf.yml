id: brew:gperf
display-name: gperf
homepage: https://www.gnu.org/software/gperf/
repo: https://ftpmirror.gnu.org/gnu/gperf/gperf-3.3.tar.gz
docs: https://www.gnu.org/software/gperf/
package-manager:
  apk: gperf
  brew: gperf
  chocolatey: gperf
  debian: gperf
  dnf: gperf
  macports: gperf
  nix: gperf
  pacman: gperf
  ubuntu: gperf
  winget: oss-winget.gperf
  zypper: gperf
package-manager-url: https://formulae.brew.sh/formula/gperf
version: 3.3
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Perfect hash function generator
source-archive: https://ftpmirror.gnu.org/gnu/gperf/gperf-3.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: gperf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gperf
  av: sudo av install brew:gperf
  brew: brew install gperf
  chocolatey: choco install gperf
  debian: sudo apt install gperf
  dnf: sudo dnf install gperf
  macports: sudo port install gperf
  nix: nix profile install nixpkgs#gperf
  pacman: sudo pacman -S gperf
  ubuntu: sudo apt install gperf
  winget: winget install --id oss-winget.gperf -e
  zypper: sudo zypper install gperf
provenance:
  formula: gperf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
