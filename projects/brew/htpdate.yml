id: brew:htpdate
display-name: htpdate
homepage: https://www.vervest.org/htp/
repo: https://github.com/twekkel/htpdate
docs: https://www.vervest.org/htp/
package-manager:
  apk: htpdate
  brew: htpdate
  debian: htpdate
  macports: htpdate
  nix: htpdate
  ubuntu: htpdate
package-manager-url: https://formulae.brew.sh/formula/htpdate
version: 2.0.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Synchronize time with remote web servers
source-archive: https://github.com/twekkel/htpdate/archive/refs/tags/v2.0.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: htpdate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add htpdate
  av: sudo av install brew:htpdate
  brew: brew install htpdate
  debian: sudo apt install htpdate
  macports: sudo port install htpdate
  nix: nix profile install nixpkgs#htpdate
  ubuntu: sudo apt install htpdate
provenance:
  formula: htpdate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
