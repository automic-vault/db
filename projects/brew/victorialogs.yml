id: brew:victorialogs
display-name: victorialogs
homepage: https://docs.victoriametrics.com/victorialogs/
repo: https://github.com/VictoriaMetrics/VictoriaLogs
docs: https://docs.victoriametrics.com/victorialogs/
package-manager:
  apk: victoria-logs
  brew: victorialogs
  nix: victorialogs
package-manager-url: https://formulae.brew.sh/formula/victorialogs
version: 1.50.0
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Open source user-friendly database for logs from VictoriaMetrics
source-archive: https://github.com/VictoriaMetrics/VictoriaLogs/archive/refs/tags/v1.50.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: victoria-logs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add victoria-logs
  av: sudo av install brew:victorialogs
  brew: brew install victorialogs
  nix: nix profile install nixpkgs#victorialogs
provenance:
  formula: victorialogs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
