id: brew:trippy
display-name: trippy
homepage: https://trippy.rs/
repo: https://github.com/fujiapple852/trippy
docs: https://trippy.rs/
package-manager:
  apk: trippy
  brew: trippy
  debian: trippy
  nix: trippy
  pacman: trippy
  scoop: main/trippy
  winget: FujiApple.Trippy
  zypper: trippy
package-manager-url: https://formulae.brew.sh/formula/trippy
version: 0.13.0
license: Apache-2.0
category: development
tags:
  - cli
description: Network diagnostic tool, inspired by mtr
source-archive: https://github.com/fujiapple852/trippy/archive/refs/tags/0.13.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: trip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add trippy
  av: sudo av install brew:trippy
  brew: brew install trippy
  debian: sudo apt install trippy
  nix: nix profile install nixpkgs#trippy
  pacman: sudo pacman -S trippy
  scoop: scoop install main/trippy
  winget: winget install --id FujiApple.Trippy -e
  zypper: sudo zypper install trippy
provenance:
  formula: trippy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
