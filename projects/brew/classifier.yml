id: brew:classifier
display-name: classifier
homepage: https://rubyclassifier.com
repo: https://github.com/cardmagic/classifier
docs: https://rubyclassifier.com
package-manager:
  brew: classifier
package-manager-url: https://formulae.brew.sh/formula/classifier
version: 2.4.0
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Text classification with Bayesian, LSI, Logistic Regression, and kNN
source-archive: https://github.com/cardmagic/classifier/archive/refs/tags/v2.4.0.tar.gz
dependencies:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: classifier
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:classifier
  brew: brew install classifier
provenance:
  formula: classifier
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
