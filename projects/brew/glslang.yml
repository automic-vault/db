id: brew:glslang
display-name: glslang
homepage: https://www.khronos.org/opengles/sdk/Reference-Compiler/
repo: https://github.com/KhronosGroup/glslang
docs: https://www.khronos.org/opengles/sdk/Reference-Compiler/
package-manager:
  apk: glslang
  brew: glslang
  dnf: glslang
  macports: glslang
  nix: glslang
  pacman: glslang
  scoop: main/glslang
package-manager-url: https://formulae.brew.sh/formula/glslang
version: 16.3.0
license: BSD-3-Clause AND GPL-3.0-or-later AND MIT AND Apache-2.0
category: development
tags:
  - cli
description: OpenGL and OpenGL ES reference compiler for shading languages
source-archive: https://github.com/KhronosGroup/glslang/archive/refs/tags/16.3.0.tar.gz
dependencies:
  - spirv-headers
  - spirv-tools
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: glslang
  - exposure: global executable
    kind: cli
    name: glslangValidator
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add glslang
  av: sudo av install brew:glslang
  brew: brew install glslang
  dnf: sudo dnf install glslang
  macports: sudo port install glslang
  nix: nix profile install nixpkgs#glslang
  pacman: sudo pacman -S glslang
  scoop: scoop install main/glslang
provenance:
  formula: glslang
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
