id: brew:meilisearch
display-name: meilisearch
homepage: https://docs.meilisearch.com/
repo: https://github.com/meilisearch/meilisearch
docs: https://docs.meilisearch.com/
package-manager:
  brew: meilisearch
  nix: meilisearch
  pacman: meilisearch
  scoop: main/meilisearch
package-manager-url: https://formulae.brew.sh/formula/meilisearch
version: 1.43.1
license: MIT
category: development
tags:
  - cli
description: Ultra relevant, instant and typo-tolerant full-text search API
source-archive: https://github.com/meilisearch/meilisearch/archive/refs/tags/v1.43.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: meilisearch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:meilisearch
  brew: brew install meilisearch
  nix: nix profile install nixpkgs#meilisearch
  pacman: sudo pacman -S meilisearch
  scoop: scoop install main/meilisearch
provenance:
  formula: meilisearch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
