id: brew:trezor-agent
display-name: trezor-agent
homepage: https://github.com/romanz/trezor-agent
repo: >
  https://files.pythonhosted.org/packages/d9/b1/e533c417259dc112a067226d4c95cb772d7c090b696a61a065e1e41429d6/trezor_agent-0.13.0.tar.gz
docs: https://github.com/romanz/trezor-agent
package-manager:
  brew: trezor-agent
  nix: trezor-agent
package-manager-url: https://formulae.brew.sh/formula/trezor-agent
version: 0.13.0
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Hardware SSH/GPG agent for Trezor and Ledger
source-archive: >
  https://files.pythonhosted.org/packages/d9/b1/e533c417259dc112a067226d4c95cb772d7c090b696a61a065e1e41429d6/trezor_agent-0.13.0.tar.gz
dependencies:
  - certifi
  - cryptography
  - hidapi
  - libsodium
  - libusb
  - python@3.14
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: age-plugin-trezor
  - exposure: global executable
    kind: cli
    name: trezor-agent
  - exposure: global executable
    kind: cli
    name: trezor-gpg
  - exposure: global executable
    kind: cli
    name: trezor-gpg-agent
  - exposure: global executable
    kind: cli
    name: trezor-signify
  - exposure: global executable
    kind: cli
    name: trezor_agent.py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:trezor-agent
  brew: brew install trezor-agent
  nix: nix profile install nixpkgs#trezor-agent
provenance:
  formula: trezor-agent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
