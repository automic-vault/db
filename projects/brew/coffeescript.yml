id: brew:coffeescript
display-name: coffeescript
homepage: https://coffeescript.org/
repo: https://registry.npmjs.org/coffeescript/-/coffeescript-2.7.0.tgz
docs: https://coffeescript.org/
package-manager:
  brew: coffeescript
  debian: coffeescript
  nix: coffeescript
  pacman: coffeescript
  scoop: main/cake
  ubuntu: coffeescript
  winget: StevenCole.Coffee
package-manager-url: https://formulae.brew.sh/formula/coffeescript
version: 2.7.0
license: MIT
category: network
tags:
  - cli
description: Unfancy JavaScript
source-archive: https://registry.npmjs.org/coffeescript/-/coffeescript-2.7.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: cake
  - exposure: global executable
    kind: cli
    name: coffee
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:coffeescript
  brew: brew install coffeescript
  debian: sudo apt install coffeescript
  nix: nix profile install nixpkgs#coffeescript
  pacman: sudo pacman -S coffeescript
  scoop: scoop install main/cake
  ubuntu: sudo apt install coffeescript
  winget: winget install --id StevenCole.Coffee -e
provenance:
  formula: coffeescript
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
