id: brew:signal-cli
display-name: signal-cli
homepage: https://github.com/AsamK/signal-cli
repo: https://github.com/AsamK/signal-cli
docs: https://github.com/AsamK/signal-cli
package-manager:
  apk: signal-cli
  brew: signal-cli
  nix: signal-cli
  scoop: main/signal-cli
package-manager-url: https://formulae.brew.sh/formula/signal-cli
version: 0.14.4.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: CLI and dbus interface for WhisperSystems/libsignal-service-java
source-archive: https://github.com/AsamK/signal-cli/archive/refs/tags/v0.14.4.1.tar.gz
build-dependencies:
  - asciidoc
  - cmake
  - docbook-xsl
  - graalvm
  - gradle
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: signal-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add signal-cli
  av: sudo av install brew:signal-cli
  brew: brew install signal-cli
  nix: nix profile install nixpkgs#signal-cli
  scoop: scoop install main/signal-cli
provenance:
  formula: signal-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
