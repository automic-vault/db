id: brew:ghz
display-name: ghz
homepage: https://ghz.sh
repo: https://github.com/bojand/ghz
docs: https://ghz.sh
package-manager:
  brew: ghz
  macports: ghz
  nix: ghz
  scoop: main/ghz
package-manager-url: https://formulae.brew.sh/formula/ghz
version: 0.121.0
license: Apache-2.0
category: development
tags:
  - cli
description: Simple gRPC benchmarking and load testing tool
source-archive: https://github.com/bojand/ghz/archive/refs/tags/v0.121.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ghz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ghz
  brew: brew install ghz
  macports: sudo port install ghz
  nix: nix profile install nixpkgs#ghz
  scoop: scoop install main/ghz
provenance:
  formula: ghz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
