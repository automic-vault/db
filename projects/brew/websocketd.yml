id: brew:websocketd
display-name: websocketd
homepage: http://websocketd.com
repo: https://github.com/joewalnes/websocketd
docs: http://websocketd.com
package-manager:
  apk: websocketd
  brew: websocketd
  debian: websocketd
  macports: websocketd
  nix: websocketd
  ubuntu: websocketd
package-manager-url: https://formulae.brew.sh/formula/websocketd
version: 0.4.1
license: BSD-2-Clause
category: development
tags:
  - cli
description: WebSockets the Unix way
source-archive: https://github.com/joewalnes/websocketd/archive/refs/tags/v0.4.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: websocketd
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add websocketd
  av: sudo av install brew:websocketd
  brew: brew install websocketd
  debian: sudo apt install websocketd
  macports: sudo port install websocketd
  nix: nix profile install nixpkgs#websocketd
  ubuntu: sudo apt install websocketd
provenance:
  formula: websocketd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
