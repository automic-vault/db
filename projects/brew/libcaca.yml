id: brew:libcaca
display-name: libcaca
homepage: http://caca.zoy.org/wiki/libcaca
repo: https://github.com/cacalabs/libcaca
docs: http://caca.zoy.org/wiki/libcaca
package-manager:
  apk: libcaca
  brew: libcaca
  dnf: libcaca
  macports: libcaca
  nix: libcaca
  pacman: libcaca
package-manager-url: https://formulae.brew.sh/formula/libcaca
version: 0.99.beta20
license: WTFPL
category: development
tags:
  - cli
description: Convert pixel information into colored ASCII art
source-archive: >
  https://github.com/cacalabs/libcaca/releases/download/v0.99.beta20/libcaca-0.99.beta20.tar.bz2
dependencies:
  - imlib2
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: caca-config
  - exposure: global executable
    kind: cli
    name: cacaclock
  - exposure: global executable
    kind: cli
    name: cacademo
  - exposure: global executable
    kind: cli
    name: cacafire
  - exposure: global executable
    kind: cli
    name: cacaplay
  - exposure: global executable
    kind: cli
    name: cacaserver
  - exposure: global executable
    kind: cli
    name: cacaview
  - exposure: global executable
    kind: cli
    name: img2txt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libcaca
  av: sudo av install brew:libcaca
  brew: brew install libcaca
  dnf: sudo dnf install libcaca
  macports: sudo port install libcaca
  nix: nix profile install nixpkgs#libcaca
  pacman: sudo pacman -S libcaca
provenance:
  formula: libcaca
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
