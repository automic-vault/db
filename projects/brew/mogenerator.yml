id: brew:mogenerator
display-name: mogenerator
homepage: https://rentzsch.github.io/mogenerator/
repo: https://github.com/rentzsch/mogenerator
docs: https://rentzsch.github.io/mogenerator/
package-manager:
  brew: mogenerator
  macports: mogenerator
package-manager-url: https://formulae.brew.sh/formula/mogenerator
version: 1.32
license: MIT
category: development
tags:
  - cli
description: Generate Objective-C & Swift classes from your Core Data model
source-archive: https://github.com/rentzsch/mogenerator/archive/refs/tags/1.32.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mogenerator
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mogenerator
  brew: brew install mogenerator
  macports: sudo port install mogenerator
provenance:
  formula: mogenerator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
