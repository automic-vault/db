id: brew:unison
display-name: unison
homepage: https://www.cis.upenn.edu/~bcpierce/unison/
repo: https://github.com/bcpierce00/unison
docs: https://www.cis.upenn.edu/~bcpierce/unison/
package-manager:
  apk: unison
  brew: unison
  chocolatey: unison
  debian: unison
  dnf: unison
  macports: unison
  nix: unison
  pacman: unison
  scoop: main/unison
  ubuntu: unison
  winget: bcpierce00.unison
  zypper: unison
package-manager-url: https://formulae.brew.sh/formula/unison
version: 2.54.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: File synchronization tool
source-archive: https://github.com/bcpierce00/unison/archive/refs/tags/v2.54.0.tar.gz
build-dependencies:
  - ocaml
executables:
  - exposure: global executable
    kind: cli
    name: unison
  - exposure: global executable
    kind: cli
    name: unison-fsmonitor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add unison
  av: sudo av install brew:unison
  brew: brew install unison
  chocolatey: choco install unison
  debian: sudo apt install unison
  dnf: sudo dnf install unison
  macports: sudo port install unison
  nix: nix profile install nixpkgs#unison
  pacman: sudo pacman -S unison
  scoop: scoop install main/unison
  ubuntu: sudo apt install unison
  winget: winget install --id bcpierce00.unison -e
  zypper: sudo zypper install unison
provenance:
  formula: unison
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
