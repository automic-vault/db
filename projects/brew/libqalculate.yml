id: brew:libqalculate
display-name: libqalculate
homepage: https://qalculate.github.io/
repo: https://github.com/Qalculate/libqalculate
docs: https://qalculate.github.io/
package-manager:
  apk: libqalculate
  brew: libqalculate
  debian: qalc
  dnf: libqalculate
  macports: libqalculate
  nix: libqalculate
  pacman: libqalculate
  ubuntu: qalc
package-manager-url: https://formulae.brew.sh/formula/libqalculate
version: 5.11.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Library for Qalculate! program
source-archive: >
  https://github.com/Qalculate/libqalculate/releases/download/v5.11.0/libqalculate-5.11.0.tar.gz
dependencies:
  - gettext
  - gmp
  - gnuplot
  - mpfr
  - readline
build-dependencies:
  - gettext
  - intltool
  - pkgconf
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: qalc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libqalculate
  av: sudo av install brew:libqalculate
  brew: brew install libqalculate
  debian: sudo apt install qalc
  dnf: sudo dnf install libqalculate
  macports: sudo port install libqalculate
  nix: nix profile install nixpkgs#libqalculate
  pacman: sudo pacman -S libqalculate
  ubuntu: sudo apt install qalc
provenance:
  formula: libqalculate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
