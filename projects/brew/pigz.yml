id: brew:pigz
display-name: pigz
homepage: https://zlib.net/pigz/
repo: https://zlib.net/pigz/pigz-2.8.tar.gz
docs: https://zlib.net/pigz/
package-manager:
  apk: pigz
  brew: pigz
  debian: pigz
  dnf: pigz
  macports: pigz
  nix: pigz
  pacman: pigz
  ubuntu: pigz
  zypper: pigz
package-manager-url: https://formulae.brew.sh/formula/pigz
version: 2.8
license: Zlib
category: network
tags:
  - cli
description: Parallel gzip
source-archive: https://zlib.net/pigz/pigz-2.8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: pigz
  - exposure: global executable
    kind: cli
    name: unpigz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pigz
  av: sudo av install brew:pigz
  brew: brew install pigz
  debian: sudo apt install pigz
  dnf: sudo dnf install pigz
  macports: sudo port install pigz
  nix: nix profile install nixpkgs#pigz
  pacman: sudo pacman -S pigz
  ubuntu: sudo apt install pigz
  zypper: sudo zypper install pigz
provenance:
  formula: pigz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
