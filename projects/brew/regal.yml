id: brew:regal
display-name: regal
homepage: https://www.openpolicyagent.org/projects/regal
repo: https://github.com/open-policy-agent/regal
docs: https://www.openpolicyagent.org/projects/regal
package-manager:
  apk: regal
  brew: regal
  nix: regal
  zypper: regal
package-manager-url: https://formulae.brew.sh/formula/regal
version: 0.40.0
license: Apache-2.0
category: development
tags:
  - cli
description: Linter and language server for Rego
source-archive: https://github.com/open-policy-agent/regal/archive/refs/tags/v0.40.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: regal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add regal
  av: sudo av install brew:regal
  brew: brew install regal
  nix: nix profile install nixpkgs#regal
  zypper: sudo zypper install regal
provenance:
  formula: regal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
