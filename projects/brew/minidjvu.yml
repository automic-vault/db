id: brew:minidjvu
display-name: minidjvu
homepage: https://minidjvu.sourceforge.net/
repo: https://downloads.sourceforge.net/project/minidjvu/minidjvu/0.8/minidjvu-0.8.tar.gz
docs: https://minidjvu.sourceforge.net/
package-manager:
  brew: minidjvu
  debian: minidjvu
  macports: minidjvu
  nix: minidjvu
  ubuntu: minidjvu
package-manager-url: https://formulae.brew.sh/formula/minidjvu
version: 0.8
license: GPL-2.0-only
category: network
tags:
  - cli
description: DjVu multipage encoder, single page encoder/decoder
source-archive: https://downloads.sourceforge.net/project/minidjvu/minidjvu/0.8/minidjvu-0.8.tar.gz
dependencies:
  - djvulibre
  - libtiff
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: minidjvu
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:minidjvu
  brew: brew install minidjvu
  debian: sudo apt install minidjvu
  macports: sudo port install minidjvu
  nix: nix profile install nixpkgs#minidjvu
  ubuntu: sudo apt install minidjvu
provenance:
  formula: minidjvu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
