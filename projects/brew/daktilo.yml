id: brew:daktilo
display-name: daktilo
homepage: https://daktilo.cli.rs
repo: https://github.com/orhun/daktilo
docs: https://daktilo.cli.rs
package-manager:
  apk: daktilo
  brew: daktilo
  macports: daktilo
  nix: daktilo
  pacman: daktilo
package-manager-url: https://formulae.brew.sh/formula/daktilo
version: 0.6.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Plays typewriter sounds every time you press a key
source-archive: https://github.com/orhun/daktilo/archive/refs/tags/v0.6.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: daktilo
  - exposure: global executable
    kind: cli
    name: daktilo-completions
  - exposure: global executable
    kind: cli
    name: daktilo-mangen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add daktilo
  av: sudo av install brew:daktilo
  brew: brew install daktilo
  macports: sudo port install daktilo
  nix: nix profile install nixpkgs#daktilo
  pacman: sudo pacman -S daktilo
provenance:
  formula: daktilo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
