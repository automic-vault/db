id: brew:h26forge
display-name: h26forge
homepage: https://github.com/h26forge/h26forge
repo: https://github.com/h26forge/h26forge
docs: https://github.com/h26forge/h26forge
package-manager:
  apk: h26forge
  brew: h26forge
package-manager-url: https://formulae.brew.sh/formula/h26forge
version: 2024-07-06
license: MIT
category: development
tags:
  - cli
description: Tool for making syntactically valid but semantically spec-noncompliant videos
source-archive: https://github.com/h26forge/h26forge/archive/refs/tags/2024-07-06.tar.gz
build-dependencies:
  - rust
uses-from-macos:
  - llvm
executables:
  - exposure: global executable
    kind: cli
    name: h26forge
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add h26forge
  av: sudo av install brew:h26forge
  brew: brew install h26forge
provenance:
  formula: h26forge
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
