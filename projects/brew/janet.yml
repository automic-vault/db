id: brew:janet
display-name: janet
homepage: https://janet-lang.org
repo: https://github.com/janet-lang/janet
docs: https://janet-lang.org
package-manager:
  apk: janet
  brew: janet
  dnf: janet
  macports: janet
  nix: janet
  scoop: main/janet
  winget: JanetLang.Janet
  zypper: janet
package-manager-url: https://formulae.brew.sh/formula/janet
version: 1.41.2
license: MIT
category: development
tags:
  - cli
description: Dynamic language and bytecode vm
source-archive: https://github.com/janet-lang/janet/archive/refs/tags/v1.41.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: janet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    When uninstalling Janet, please delete the following manually: -
    $HOMEBREW_PREFIX/lib/janet - $HOMEBREW_PREFIX/bin/jpm -
    $HOMEBREW_PREFIX/share/man/man1/jpm.1
  post-install-defined: true
install-lines:
  apk: sudo apk add janet
  av: sudo av install brew:janet
  brew: brew install janet
  dnf: sudo dnf install janet
  macports: sudo port install janet
  nix: nix profile install nixpkgs#janet
  scoop: scoop install main/janet
  winget: winget install --id JanetLang.Janet -e
  zypper: sudo zypper install janet
provenance:
  formula: janet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
