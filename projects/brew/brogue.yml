id: brew:brogue
display-name: brogue
homepage: https://sites.google.com/site/broguegame/
repo: https://github.com/tmewett/BrogueCE
docs: https://sites.google.com/site/broguegame/
package-manager:
  apk: brogue
  brew: brogue
package-manager-url: https://formulae.brew.sh/formula/brogue
version: 1.15.1
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Roguelike game
source-archive: https://github.com/tmewett/BrogueCE/archive/refs/tags/v1.15.1.tar.gz
dependencies:
  - sdl2
  - sdl2_image
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: brogue
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add brogue
  av: sudo av install brew:brogue
  brew: brew install brogue
provenance:
  formula: brogue
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
