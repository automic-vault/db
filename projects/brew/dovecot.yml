id: brew:dovecot
display-name: dovecot
homepage: https://dovecot.org/
repo: https://dovecot.org/releases/2.4/dovecot-2.4.3.tar.gz
docs: https://dovecot.org/
package-manager:
  apk: dovecot
  brew: dovecot
  dnf: dovecot
  macports: dovecot
  nix: dovecot
  pacman: dovecot
  zypper: dovecot
package-manager-url: https://formulae.brew.sh/formula/dovecot
version: 2.4.3
license: >
  BSD-3-Clause AND LGPL-2.1-or-later AND MIT AND Unicode-DFS-2016 AND
  LicenseRef-Homebrew-public-domain
category: network
tags:
  - cli
description: IMAP/POP3 server
source-archive: https://dovecot.org/releases/2.4/dovecot-2.4.3.tar.gz
dependencies:
  - lua@5.4
  - openldap
  - openssl@3
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
  - libxcrypt
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: doveadm
  - exposure: global executable
    kind: cli
    name: doveconf
  - exposure: global executable
    kind: cli
    name: dovecot
  - exposure: global executable
    kind: cli
    name: dovecot-sysreport
  - exposure: global executable
    kind: cli
    name: sieve-dump
  - exposure: global executable
    kind: cli
    name: sieve-filter
  - exposure: global executable
    kind: cli
    name: sieve-test
  - exposure: global executable
    kind: cli
    name: sievec
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    For Dovecot to work, you may need to create a dovecot user and group depending on
    your configuration file options.
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add dovecot
  av: sudo av install brew:dovecot
  brew: brew install dovecot
  dnf: sudo dnf install dovecot
  macports: sudo port install dovecot
  nix: nix profile install nixpkgs#dovecot
  pacman: sudo pacman -S dovecot
  zypper: sudo zypper install dovecot
provenance:
  formula: dovecot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
