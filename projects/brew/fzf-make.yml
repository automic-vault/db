id: brew:fzf-make
display-name: fzf-make
homepage: https://github.com/kyu08/fzf-make
repo: https://github.com/kyu08/fzf-make
docs: https://github.com/kyu08/fzf-make
package-manager:
  brew: fzf-make
  nix: fzf-make
package-manager-url: https://formulae.brew.sh/formula/fzf-make
version: 0.69.0
license: MIT
category: development
tags:
  - cli
description: Fuzzy finder with preview window for various command runners including make
source-archive: https://github.com/kyu08/fzf-make/archive/refs/tags/v0.69.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fzf-make
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fzf-make
  brew: brew install fzf-make
  nix: nix profile install nixpkgs#fzf-make
provenance:
  formula: fzf-make
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
