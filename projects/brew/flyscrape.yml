id: brew:flyscrape
display-name: flyscrape
homepage: https://flyscrape.com/
repo: https://github.com/philippta/flyscrape
docs: https://flyscrape.com/
package-manager:
  brew: flyscrape
package-manager-url: https://formulae.brew.sh/formula/flyscrape
version: 0.9.0
license: MPL-2.0
category: development
tags:
  - cli
description: Standalone and scriptable web scraper
source-archive: https://github.com/philippta/flyscrape/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - go
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: flyscrape
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flyscrape
  brew: brew install flyscrape
provenance:
  formula: flyscrape
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
