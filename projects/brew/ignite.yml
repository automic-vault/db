id: brew:ignite
display-name: ignite
homepage: https://docs.ignite.com/
repo: https://github.com/ignite/cli
docs: https://docs.ignite.com/
package-manager:
  brew: ignite
package-manager-url: https://formulae.brew.sh/formula/ignite
version: 29.10.0
license: Apache-2.0
category: security
tags:
  - cli
description: Build, launch, and maintain any crypto application with Ignite CLI
source-archive: https://github.com/ignite/cli/archive/refs/tags/v29.10.0.tar.gz
dependencies:
  - go
  - node
executables:
  - exposure: global executable
    kind: cli
    name: ignite
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ignite
  brew: brew install ignite
provenance:
  formula: ignite
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
