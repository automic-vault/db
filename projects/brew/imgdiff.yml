    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add imgdiff
  av: sudo av install brew:imgdiff
  brew: brew install imgdiff
provenance:
  formula: imgdiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
