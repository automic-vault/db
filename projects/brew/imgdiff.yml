id: brew:imgdiff
display-name: imgdiff
homepage: https://github.com/n7olkachev/imgdiff
repo: https://github.com/n7olkachev/imgdiff
docs: https://github.com/n7olkachev/imgdiff
package-manager:
  apk: imgdiff
  brew: imgdiff
package-manager-url: https://formulae.brew.sh/formula/imgdiff
version: 1.0.2
license: MIT
category: development
tags:
  - cli
description: Pixel-by-pixel image difference tool
source-archive: https://github.com/n7olkachev/imgdiff/archive/refs/tags/v1.0.2.tar.gz
build-dependencies:
  - go
executables:
