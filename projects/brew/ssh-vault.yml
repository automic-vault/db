id: brew:ssh-vault
display-name: ssh-vault
homepage: https://ssh-vault.com/
repo: https://github.com/ssh-vault/ssh-vault
docs: https://ssh-vault.com/
package-manager:
  brew: ssh-vault
  nix: ssh-vault
package-manager-url: https://formulae.brew.sh/formula/ssh-vault
version: 1.2.8
license: BSD-3-Clause
category: security
tags:
  - cli
description: Encrypt/decrypt using SSH keys
source-archive: https://github.com/ssh-vault/ssh-vault/archive/refs/tags/1.2.8.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ssh-vault
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ssh-vault
  brew: brew install ssh-vault
  nix: nix profile install nixpkgs#ssh-vault
provenance:
  formula: ssh-vault
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
