id: brew:adapterremoval
display-name: adapterremoval
homepage: https://github.com/MikkelSchubert/adapterremoval
repo: https://github.com/MikkelSchubert/adapterremoval
docs: https://github.com/MikkelSchubert/adapterremoval
package-manager:
  brew: adapterremoval
  debian: adapterremoval
  ubuntu: adapterremoval
package-manager-url: https://formulae.brew.sh/formula/adapterremoval
version: 3.0.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Rapid adapter trimming, identification, and read merging
source-archive: https://github.com/MikkelSchubert/adapterremoval/archive/refs/tags/v3.0.0.tar.gz
dependencies:
  - isa-l
  - libdeflate
build-dependencies:
  - meson
  - ninja
  - pkgconf
  - sphinx-doc
executables:
  - exposure: global executable
    kind: cli
    name: adapterremoval3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:adapterremoval
  brew: brew install adapterremoval
  debian: sudo apt install adapterremoval
  ubuntu: sudo apt install adapterremoval
provenance:
  formula: adapterremoval
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
