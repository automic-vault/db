id: brew:znc
display-name: znc
homepage: https://wiki.znc.in/ZNC
repo: https://znc.in/releases/znc-1.10.2.tar.gz
docs: https://wiki.znc.in/ZNC
package-manager:
  apk: znc
  brew: znc
  debian: znc
  dnf: znc
  macports: znc
  nix: znc
  pacman: znc
  ubuntu: znc
  zypper: znc
package-manager-url: https://formulae.brew.sh/formula/znc
version: 1.10.2
license: Apache-2.0
category: network
tags:
  - cli
description: Advanced IRC bouncer
source-archive: https://znc.in/releases/znc-1.10.2.tar.gz
dependencies:
  - boost
  - cctz
  - icu4c@78
  - openssl@3
  - python@3.14
build-dependencies:
  - cmake
  - gettext
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: znc
  - exposure: global executable
    kind: cli
    name: znc-buildmod
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add znc
  av: sudo av install brew:znc
  brew: brew install znc
  debian: sudo apt install znc
  dnf: sudo dnf install znc
  macports: sudo port install znc
  nix: nix profile install nixpkgs#znc
  pacman: sudo pacman -S znc
  ubuntu: sudo apt install znc
  zypper: sudo zypper install znc
provenance:
  formula: znc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
