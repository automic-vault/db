id: brew:pipemeter
display-name: pipemeter
homepage: https://launchpad.net/pipemeter
repo: https://launchpad.net/pipemeter/trunk/1.1.5/+download/pipemeter-1.1.5.tar.gz
docs: https://launchpad.net/pipemeter
package-manager:
  brew: pipemeter
  debian: pipemeter
  ubuntu: pipemeter
package-manager-url: https://formulae.brew.sh/formula/pipemeter
version: 1.1.5
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Shows speed of data moving from input to output
source-archive: https://launchpad.net/pipemeter/trunk/1.1.5/+download/pipemeter-1.1.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: pipemeter
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pipemeter
  brew: brew install pipemeter
  debian: sudo apt install pipemeter
  ubuntu: sudo apt install pipemeter
provenance:
  formula: pipemeter
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
