id: brew:openshift-cli
display-name: openshift-cli
homepage: https://www.openshift.com/
repo: >
  https://mirror.openshift.com/pub/openshift-v4/clients/ocp/4.21.16/openshift-client-src.tar.gz
docs: https://www.openshift.com/
package-manager:
  brew: openshift-cli
  chocolatey: openshift-cli
  macports: oc
  zypper: oc
package-manager-url: https://formulae.brew.sh/formula/openshift-cli
version: 4.21.16
license: Apache-2.0
category: network
tags:
  - cli
description: OpenShift command-line interface tools
source-archive: >
  https://mirror.openshift.com/pub/openshift-v4/clients/ocp/4.21.16/openshift-client-src.tar.gz
build-dependencies:
  - go
uses-from-macos:
  - krb5
executables:
  - exposure: global executable
    kind: cli
    name: oc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:openshift-cli
  brew: brew install openshift-cli
  chocolatey: choco install openshift-cli
  macports: sudo port install oc
  zypper: sudo zypper install oc
provenance:
  formula: openshift-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
