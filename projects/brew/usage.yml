id: brew:usage
display-name: usage
homepage: https://usage.jdx.dev/
repo: https://github.com/jdx/usage
docs: https://usage.jdx.dev/
package-manager:
  brew: usage
  nix: usage
  pacman: usage
package-manager-url: https://formulae.brew.sh/formula/usage
version: 3.3.0
license: MIT
category: development
tags:
  - cli
description: Tool for working with usage-spec CLIs
source-archive: https://github.com/jdx/usage/archive/refs/tags/v3.3.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: usage
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:usage
  brew: brew install usage
  nix: nix profile install nixpkgs#usage
  pacman: sudo pacman -S usage
provenance:
  formula: usage
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
