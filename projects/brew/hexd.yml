id: brew:hexd
display-name: hexd
homepage: https://github.com/FireyFly/hexd
repo: https://github.com/FireyFly/hexd
docs: https://github.com/FireyFly/hexd
package-manager:
  brew: hexd
  nix: hexd
  zypper: hexd
package-manager-url: https://formulae.brew.sh/formula/hexd
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Colourful, human-friendly hexdump tool
source-archive: https://github.com/FireyFly/hexd/archive/refs/tags/v1.1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: hexd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hexd
  brew: brew install hexd
  nix: nix profile install nixpkgs#hexd
  zypper: sudo zypper install hexd
provenance:
  formula: hexd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
