id: brew:kapp
display-name: kapp
homepage: https://carvel.dev/kapp/
repo: https://github.com/carvel-dev/kapp
docs: https://carvel.dev/kapp/
package-manager:
  apk: kapp
  brew: kapp
  macports: kapp
  nix: kapp
  scoop: main/kapp
package-manager-url: https://formulae.brew.sh/formula/kapp
version: 0.65.3
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: CLI tool for Kubernetes users to group and manage bulk resources
source-archive: https://github.com/carvel-dev/kapp/archive/refs/tags/v0.65.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kapp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kapp
  av: sudo av install brew:kapp
  brew: brew install kapp
  macports: sudo port install kapp
  nix: nix profile install nixpkgs#kapp
  scoop: scoop install main/kapp
provenance:
  formula: kapp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
