id: brew:mavsdk
display-name: mavsdk
homepage: https://mavsdk.mavlink.io/main/en/index.html
repo: https://github.com/mavlink/MAVSDK
docs: https://mavsdk.mavlink.io/main/en/index.html
package-manager:
  brew: mavsdk
package-manager-url: https://formulae.brew.sh/formula/mavsdk
version: 3.17.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: API and library for MAVLink compatible systems written in C++17
source-archive: https://github.com/mavlink/MAVSDK.git
dependencies:
  - abseil
  - c-ares
  - curl
  - grpc
  - jsoncpp
  - openssl@3
  - protobuf
  - re2
  - tinyxml2
  - xz
build-dependencies:
  - cmake
  - python@3.14
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mavsdk_server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mavsdk
  brew: brew install mavsdk
provenance:
  formula: mavsdk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
