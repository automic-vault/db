id: brew:lightgbm
display-name: lightgbm
homepage: https://github.com/lightgbm-org/LightGBM
repo: https://github.com/lightgbm-org/LightGBM
docs: https://github.com/lightgbm-org/LightGBM
package-manager:
  brew: lightgbm
  macports: LightGBM
  nix: lightgbm
  winget: Microsoft.LightGBM
package-manager-url: https://formulae.brew.sh/formula/lightgbm
version: 4.6.0
license: MIT
category: development
tags:
  - cli
description: Fast, distributed, high performance gradient boosting framework
source-archive: https://github.com/lightgbm-org/LightGBM.git
dependencies:
  - libomp
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: lightgbm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lightgbm
  brew: brew install lightgbm
  macports: sudo port install LightGBM
  nix: nix profile install nixpkgs#lightgbm
  winget: winget install --id Microsoft.LightGBM -e
provenance:
  formula: lightgbm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
