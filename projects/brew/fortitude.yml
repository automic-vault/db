id: brew:fortitude
display-name: fortitude
homepage: https://fortitude.readthedocs.io/en/stable/
repo: https://github.com/PlasmaFAIR/fortitude
docs: https://fortitude.readthedocs.io/en/stable/
package-manager:
  brew: fortitude
  nix: fortitude
package-manager-url: https://formulae.brew.sh/formula/fortitude
version: 0.9.0
license: MIT
category: development
tags:
  - cli
description: Fortran linter
source-archive: https://github.com/PlasmaFAIR/fortitude/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fortitude
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fortitude
  brew: brew install fortitude
  nix: nix profile install nixpkgs#fortitude
provenance:
  formula: fortitude
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
