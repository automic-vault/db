id: brew:maigret
display-name: maigret
homepage: https://github.com/soxoj/maigret
repo: >
  https://files.pythonhosted.org/packages/e3/d6/2e342593372b0e215f3080af6c0c3493250a1321c3348a54a018fc173963/maigret-0.6.1.tar.gz
docs: https://github.com/soxoj/maigret
package-manager:
  brew: maigret
  macports: maigret
  nix: maigret
package-manager-url: https://formulae.brew.sh/formula/maigret
version: 0.6.1
license: MIT
category: development
tags:
  - cli
description: Collect a dossier on a person by username from thousands of sites
source-archive: >
  https://files.pythonhosted.org/packages/e3/d6/2e342593372b0e215f3080af6c0c3493250a1321c3348a54a018fc173963/maigret-0.6.1.tar.gz
dependencies:
  - certifi
  - pillow
  - python@3.14
build-dependencies:
  - cmake
  - rust
uses-from-macos:
  - libffi
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: maigret
  - exposure: global executable
    kind: cli
    name: update_sitesmd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:maigret
  brew: brew install maigret
  macports: sudo port install maigret
  nix: nix profile install nixpkgs#maigret
provenance:
  formula: maigret
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
