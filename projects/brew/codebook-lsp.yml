id: brew:codebook-lsp
display-name: codebook-lsp
homepage: https://github.com/blopker/codebook
repo: https://github.com/blopker/codebook
docs: https://github.com/blopker/codebook
package-manager:
  brew: codebook-lsp
  pacman: codebook-lsp
package-manager-url: https://formulae.brew.sh/formula/codebook-lsp
version: 0.3.41
license: MIT
category: development
tags:
  - cli
description: Code-aware spell checker language server
source-archive: https://github.com/blopker/codebook/archive/refs/tags/v0.3.41.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: codebook-lsp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:codebook-lsp
  brew: brew install codebook-lsp
  pacman: sudo pacman -S codebook-lsp
provenance:
  formula: codebook-lsp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
