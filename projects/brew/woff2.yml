id: brew:woff2
display-name: woff2
homepage: https://github.com/google/woff2
repo: https://github.com/google/woff2
docs: https://github.com/google/woff2
package-manager:
  apk: woff2
  brew: woff2
  debian: woff2
  dnf: woff2
  macports: woff2
  nix: woff2
  pacman: woff2
  ubuntu: woff2
  zypper: woff2
package-manager-url: https://formulae.brew.sh/formula/woff2
version: 1.0.2
license: MIT
category: development
tags:
  - cli
description: Utilities to create and convert Web Open Font File (WOFF) files
source-archive: https://github.com/google/woff2/archive/refs/tags/v1.0.2.tar.gz
dependencies:
  - brotli
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: woff2_compress
  - exposure: global executable
    kind: cli
    name: woff2_decompress
  - exposure: global executable
    kind: cli
    name: woff2_info
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add woff2
  av: sudo av install brew:woff2
  brew: brew install woff2
  debian: sudo apt install woff2
  dnf: sudo dnf install woff2
  macports: sudo port install woff2
  nix: nix profile install nixpkgs#woff2
  pacman: sudo pacman -S woff2
  ubuntu: sudo apt install woff2
  zypper: sudo zypper install woff2
provenance:
  formula: woff2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
