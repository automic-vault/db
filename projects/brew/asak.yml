id: brew:asak
display-name: asak
homepage: https://github.com/chaosprint/asak
repo: https://github.com/chaosprint/asak
docs: https://github.com/chaosprint/asak
package-manager:
  brew: asak
  nix: asak
package-manager-url: https://formulae.brew.sh/formula/asak
version: 0.4.0
license: MIT
category: development
tags:
  - cli
description: Cross-platform audio recording/playback CLI tool with TUI
source-archive: https://github.com/chaosprint/asak/archive/refs/tags/v0.4.0.tar.gz
dependencies:
  - jack
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: asak
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:asak
  brew: brew install asak
  nix: nix profile install nixpkgs#asak
provenance:
  formula: asak
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
