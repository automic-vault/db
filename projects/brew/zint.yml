id: brew:zint
display-name: zint
homepage: https://www.zint.org.uk/
repo: https://downloads.sourceforge.net/project/zint/zint/2.16.0/zint-2.16.0-src.tar.gz
docs: https://www.zint.org.uk/
package-manager:
  apk: zint
  brew: zint
  debian: zint
  dnf: zint
  macports: zint
  pacman: zint
  ubuntu: zint
  winget: Zint.Zint
  zypper: zint
package-manager-url: https://formulae.brew.sh/formula/zint
version: 2.16.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Barcode encoding library supporting over 50 symbologies
source-archive: https://downloads.sourceforge.net/project/zint/zint/2.16.0/zint-2.16.0-src.tar.gz
dependencies:
  - libpng
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: zint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zint
  av: sudo av install brew:zint
  brew: brew install zint
  debian: sudo apt install zint
  dnf: sudo dnf install zint
  macports: sudo port install zint
  pacman: sudo pacman -S zint
  ubuntu: sudo apt install zint
  winget: winget install --id Zint.Zint -e
  zypper: sudo zypper install zint
provenance:
  formula: zint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
