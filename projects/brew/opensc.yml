id: brew:opensc
display-name: opensc
homepage: https://github.com/OpenSC/OpenSC/wiki
repo: https://github.com/OpenSC/OpenSC
docs: https://github.com/OpenSC/OpenSC/wiki
package-manager:
  apk: opensc
  brew: opensc
  chocolatey: opensc
  debian: opensc
  dnf: opensc
  macports: opensc
  nix: opensc
  pacman: opensc
  ubuntu: opensc
  winget: OpenSC.OpenSC
  zypper: opensc
package-manager-url: https://formulae.brew.sh/formula/opensc
version: 0.27.1
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Tools and libraries for smart cards
source-archive: https://github.com/OpenSC/OpenSC/releases/download/0.27.1/opensc-0.27.1.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - docbook-xsl
  - pkgconf
uses-from-macos:
  - pcsc-lite
executables:
  - exposure: global executable
    kind: cli
    name: cardos-tool
  - exposure: global executable
    kind: cli
    name: cryptoflex-tool
  - exposure: global executable
    kind: cli
    name: dnie-tool
  - exposure: global executable
    kind: cli
    name: dtrust-tool
  - exposure: global executable
    kind: cli
    name: egk-tool
  - exposure: global executable
    kind: cli
    name: eidenv
  - exposure: global executable
    kind: cli
    name: gids-tool
  - exposure: global executable
    kind: cli
    name: goid-tool
  - exposure: global executable
    kind: cli
    name: iasecc-tool
  - exposure: global executable
    kind: cli
    name: netkey-tool
  - exposure: global executable
    kind: cli
    name: openpgp-tool
  - exposure: global executable
    kind: cli
    name: opensc-asn1
  - exposure: global executable
    kind: cli
    name: opensc-explorer
  - exposure: global executable
    kind: cli
    name: opensc-notify
  - exposure: global executable
    kind: cli
    name: opensc-tool
  - exposure: global executable
    kind: cli
    name: piv-tool
  - exposure: global executable
    kind: cli
    name: pkcs11-register
  - exposure: global executable
    kind: cli
    name: pkcs11-tool
  - exposure: global executable
    kind: cli
    name: pkcs15-crypt
  - exposure: global executable
    kind: cli
    name: pkcs15-init
  - exposure: global executable
    kind: cli
    name: pkcs15-tool
  - exposure: global executable
    kind: cli
    name: sc-hsm-tool
  - exposure: global executable
    kind: cli
    name: westcos-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The OpenSSH PKCS11 smartcard integration will not work. If you need this
    functionality, unlink this formula, then install the OpenSC cask.
  post-install-defined: false
install-lines:
  apk: sudo apk add opensc
  av: sudo av install brew:opensc
  brew: brew install opensc
  chocolatey: choco install opensc
  debian: sudo apt install opensc
  dnf: sudo dnf install opensc
  macports: sudo port install opensc
  nix: nix profile install nixpkgs#opensc
  pacman: sudo pacman -S opensc
  ubuntu: sudo apt install opensc
  winget: winget install --id OpenSC.OpenSC -e
  zypper: sudo zypper install opensc
provenance:
  formula: opensc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
