id: brew:sprocket
display-name: sprocket
homepage: https://sprocket.bio
repo: https://github.com/stjude-rust-labs/sprocket
docs: https://sprocket.bio
package-manager:
  brew: sprocket
package-manager-url: https://formulae.brew.sh/formula/sprocket
version: 0.25.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Bioinformatics workflow engine built on the Workflow Description Language (WDL)
source-archive: https://github.com/stjude-rust-labs/sprocket/archive/refs/tags/v0.25.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sprocket
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sprocket
  brew: brew install sprocket
provenance:
  formula: sprocket
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
