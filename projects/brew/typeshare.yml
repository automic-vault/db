id: brew:typeshare
display-name: typeshare
homepage: https://github.com/1Password/typeshare
repo: https://github.com/1Password/typeshare
docs: https://github.com/1Password/typeshare
package-manager:
  brew: typeshare
  nix: typeshare
package-manager-url: https://formulae.brew.sh/formula/typeshare
version: 1.13.4
license: Apache-2.0 OR MIT
category: security
tags:
  - cli
description: Synchronize type definitions between Rust and other languages for seamless FFI
source-archive: https://github.com/1Password/typeshare/archive/refs/tags/v1.13.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: typeshare
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:typeshare
  brew: brew install typeshare
  nix: nix profile install nixpkgs#typeshare
provenance:
  formula: typeshare
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
