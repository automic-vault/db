id: brew:sshguard
display-name: sshguard
homepage: https://www.sshguard.net/
repo: https://downloads.sourceforge.net/project/sshguard/sshguard/2.5.1/sshguard-2.5.1.tar.gz
docs: https://www.sshguard.net/
package-manager:
  apk: sshguard
  brew: sshguard
  debian: sshguard
  dnf: sshguard
  macports: sshguard
  nix: sshguard
  pacman: sshguard
  ubuntu: sshguard
  zypper: sshguard
package-manager-url: https://formulae.brew.sh/formula/sshguard
version: 2.5.1
license: ISC
category: network
tags:
  - cli
description: Protect from brute force attacks against SSH
source-archive: https://downloads.sourceforge.net/project/sshguard/sshguard/2.5.1/sshguard-2.5.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: sshguard
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Add the following lines to /etc/pf.conf to block entries in the sshguard table
    (replace $ext_if with your WAN interface): table <sshguard> persist block in quick
    on $ext_if proto tcp from <sshguard> to any port 22 label "ssh bruteforce" Then run
    sudo pfctl -f /etc/pf.conf to reload the rules.
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add sshguard
  av: sudo av install brew:sshguard
  brew: brew install sshguard
  debian: sudo apt install sshguard
  dnf: sudo dnf install sshguard
  macports: sudo port install sshguard
  nix: nix profile install nixpkgs#sshguard
  pacman: sudo pacman -S sshguard
  ubuntu: sudo apt install sshguard
  zypper: sudo zypper install sshguard
provenance:
  formula: sshguard
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
