id: brew:dssim
display-name: dssim
homepage: https://github.com/kornelski/dssim
repo: https://github.com/kornelski/dssim
docs: https://github.com/kornelski/dssim
package-manager:
  apk: dssim
  brew: dssim
  winget: Kornelski.DSSIM
  zypper: dssim
package-manager-url: https://formulae.brew.sh/formula/dssim
version: 3.4.0
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: RGBA Structural Similarity Rust implementation
source-archive: https://github.com/kornelski/dssim/archive/refs/tags/3.4.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dssim
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dssim
  av: sudo av install brew:dssim
  brew: brew install dssim
  winget: winget install --id Kornelski.DSSIM -e
  zypper: sudo zypper install dssim
provenance:
  formula: dssim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
