id: brew:json-glib
display-name: json-glib
homepage: https://wiki.gnome.org/Projects/JsonGlib
repo: https://download.gnome.org/sources/json-glib/1.10/json-glib-1.10.8.tar.xz
docs: https://wiki.gnome.org/Projects/JsonGlib
package-manager:
  apk: json-glib
  brew: json-glib
  dnf: json-glib
  macports: json-glib
  nix: json-glib
  pacman: json-glib
package-manager-url: https://formulae.brew.sh/formula/json-glib
version: 1.10.8
license: LGPL-2.1-or-later
category: network
tags:
  - cli
  - json
description: Library for JSON, based on GLib
source-archive: https://download.gnome.org/sources/json-glib/1.10/json-glib-1.10.8.tar.xz
dependencies:
  - gettext
  - glib
build-dependencies:
  - docutils
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: json-glib-format
  - exposure: global executable
    kind: cli
    name: json-glib-validate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add json-glib
  av: sudo av install brew:json-glib
  brew: brew install json-glib
  dnf: sudo dnf install json-glib
  macports: sudo port install json-glib
  nix: nix profile install nixpkgs#json-glib
  pacman: sudo pacman -S json-glib
provenance:
  formula: json-glib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
