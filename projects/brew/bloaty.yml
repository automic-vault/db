id: brew:bloaty
display-name: bloaty
homepage: https://github.com/google/bloaty
repo: https://github.com/google/bloaty
docs: https://github.com/google/bloaty
package-manager:
  apk: bloaty
  brew: bloaty
  dnf: bloaty
  macports: bloaty
  nix: bloaty
  pacman: bloaty
package-manager-url: https://formulae.brew.sh/formula/bloaty
version: 1.1
license: Apache-2.0
category: development
tags:
  - cli
description: Size profiler for binaries
source-archive: https://github.com/google/bloaty/releases/download/v1.1/bloaty-1.1.tar.bz2
dependencies:
  - abseil
  - capstone
  - protobuf
  - re2
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: bloaty
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bloaty
  av: sudo av install brew:bloaty
  brew: brew install bloaty
  dnf: sudo dnf install bloaty
  macports: sudo port install bloaty
  nix: nix profile install nixpkgs#bloaty
  pacman: sudo pacman -S bloaty
provenance:
  formula: bloaty
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
