id: brew:libressl
display-name: libressl
homepage: https://www.libressl.org/
repo: https://ftp.openbsd.org/pub/OpenBSD/LibreSSL/libressl-4.3.2.tar.gz
docs: https://www.libressl.org/
package-manager:
  apk: libressl
  brew: libressl
  chocolatey: openssl
  debian: openssl
  dnf: openssl
  macports: libressl
  nix: libressl
  pacman: libressl
  scoop: main/openssl
  ubuntu: openssl
  winget: ShiningLight.OpenSSL.Dev
  zypper: libressl
package-manager-url: https://formulae.brew.sh/formula/libressl
version: 4.3.2
license: OpenSSL
category: security
tags:
  - cli
description: Version of the SSL/TLS protocol forked from OpenSSL
source-archive: https://ftp.openbsd.org/pub/OpenBSD/LibreSSL/libressl-4.3.2.tar.gz
dependencies:
  - ca-certificates
executables:
  - exposure: global executable
    kind: cli
    name: ocspcheck
  - exposure: global executable
    kind: cli
    name: openssl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    A CA file has been bootstrapped using certificates from the SystemRoots keychain. To
    add additional certificates (e.g. the certificates added in the System keychain),
    place .pem files in $HOMEBREW_PREFIX/etc/libressl/certs and run
    $HOMEBREW_PREFIX/opt/libressl/bin/openssl certhash
    $HOMEBREW_PREFIX/etc/libressl/certs
  post-install-defined: true
install-lines:
  apk: sudo apk add libressl
  av: sudo av install brew:libressl
  brew: brew install libressl
  chocolatey: choco install openssl
  debian: sudo apt install openssl
  dnf: sudo dnf install openssl
  macports: sudo port install libressl
  nix: nix profile install nixpkgs#libressl
  pacman: sudo pacman -S libressl
  scoop: scoop install main/openssl
  ubuntu: sudo apt install openssl
  winget: winget install --id ShiningLight.OpenSSL.Dev -e
  zypper: sudo zypper install libressl
provenance:
  formula: libressl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
