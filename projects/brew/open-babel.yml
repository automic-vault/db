id: brew:open-babel
display-name: open-babel
homepage: https://github.com/openbabel/openbabel
repo: https://github.com/openbabel/openbabel
docs: https://github.com/openbabel/openbabel
package-manager:
  brew: open-babel
package-manager-url: https://formulae.brew.sh/formula/open-babel
version: 3.1.1
license: GPL-2.0-only
category: development
tags:
  - cli
description: Chemical toolbox
source-archive: >
  https://github.com/openbabel/openbabel/releases/download/openbabel-3-1-1/openbabel-3.1.1-source.tar.bz2
dependencies:
  - cairo
  - eigen
  - inchi
  - python@3.14
build-dependencies:
  - cmake
  - pkgconf
  - rapidjson
  - swig
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: obabel
  - exposure: global executable
    kind: cli
    name: obconformer
  - exposure: global executable
    kind: cli
    name: obdistgen
  - exposure: global executable
    kind: cli
    name: obenergy
  - exposure: global executable
    kind: cli
    name: obfit
  - exposure: global executable
    kind: cli
    name: obfitall
  - exposure: global executable
    kind: cli
    name: obgen
  - exposure: global executable
    kind: cli
    name: obgrep
  - exposure: global executable
    kind: cli
    name: obminimize
  - exposure: global executable
    kind: cli
    name: obmm
  - exposure: global executable
    kind: cli
    name: obprobe
  - exposure: global executable
    kind: cli
    name: obprop
  - exposure: global executable
    kind: cli
    name: obrms
  - exposure: global executable
    kind: cli
    name: obrotamer
  - exposure: global executable
    kind: cli
    name: obrotate
  - exposure: global executable
    kind: cli
    name: obspectrophore
  - exposure: global executable
    kind: cli
    name: obsym
  - exposure: global executable
    kind: cli
    name: obtautomer
  - exposure: global executable
    kind: cli
    name: obthermo
  - exposure: global executable
    kind: cli
    name: roundtrip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:open-babel
  brew: brew install open-babel
provenance:
  formula: open-babel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
