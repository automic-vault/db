    kind: cli
    name: pyi-archive_viewer
  - exposure: global executable
    kind: cli
    name: pyi-bindepend
  - exposure: global executable
    kind: cli
    name: pyi-grab_version
  - exposure: global executable
    kind: cli
    name: pyi-makespec
  - exposure: global executable
    kind: cli
    name: pyi-set_version
  - exposure: global executable
    kind: cli
    name: pyinstaller
bottle:
