id: brew:barman
display-name: barman
homepage: https://www.pgbarman.org/
repo: https://github.com/EnterpriseDB/barman
docs: https://www.pgbarman.org/
package-manager:
  apk: barman
  brew: barman
  debian: barman
  dnf: barman
  macports: barman
  nix: barman
  ubuntu: barman
package-manager-url: https://formulae.brew.sh/formula/barman
version: 3.19.0
license: GPL-3.0-or-later
category: database
tags:
  - cli
description: Backup and Recovery Manager for PostgreSQL
source-archive: >
  https://github.com/EnterpriseDB/barman/releases/download/release%2F3.19.0/barman-3.19.0.tar.gz
dependencies:
  - libpq
  - openssl@3
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: barman
  - exposure: global executable
    kind: cli
    name: barman-cloud-backup
  - exposure: global executable
    kind: cli
    name: barman-cloud-backup-delete
  - exposure: global executable
    kind: cli
    name: barman-cloud-backup-keep
  - exposure: global executable
    kind: cli
    name: barman-cloud-backup-list
  - exposure: global executable
    kind: cli
    name: barman-cloud-backup-show
  - exposure: global executable
    kind: cli
    name: barman-cloud-check-wal-archive
  - exposure: global executable
    kind: cli
    name: barman-cloud-restore
  - exposure: global executable
    kind: cli
    name: barman-cloud-wal-archive
  - exposure: global executable
    kind: cli
    name: barman-cloud-wal-restore
  - exposure: global executable
    kind: cli
    name: barman-wal-archive
  - exposure: global executable
    kind: cli
    name: barman-wal-restore
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add barman
  av: sudo av install brew:barman
  brew: brew install barman
  debian: sudo apt install barman
  dnf: sudo dnf install barman
  macports: sudo port install barman
  nix: nix profile install nixpkgs#barman
  ubuntu: sudo apt install barman
provenance:
  formula: barman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
