id: brew:eralchemy
display-name: eralchemy
homepage: https://github.com/eralchemy/eralchemy
repo: >
  https://files.pythonhosted.org/packages/1b/cc/d41f21c662b244efedabac91705834c59dcf43b09e74dbc2b5ff32ea8b1c/eralchemy-1.7.0.tar.gz
