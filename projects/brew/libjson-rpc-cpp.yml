id: brew:libjson-rpc-cpp
display-name: libjson-rpc-cpp
homepage: https://github.com/cinemast/libjson-rpc-cpp
repo: https://github.com/cinemast/libjson-rpc-cpp
docs: https://github.com/cinemast/libjson-rpc-cpp
package-manager:
  brew: libjson-rpc-cpp
  nix: libjson-rpc-cpp
package-manager-url: https://formulae.brew.sh/formula/libjson-rpc-cpp
version: 1.4.1
license: MIT
category: development
tags:
  - cli
  - json
description: C++ framework for json-rpc
source-archive: https://github.com/cinemast/libjson-rpc-cpp/archive/refs/tags/v1.4.1.tar.gz
dependencies:
  - argtable
  - hiredis
  - jsoncpp
  - libmicrohttpd
build-dependencies:
  - cmake
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: jsonrpcstub
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libjson-rpc-cpp
  brew: brew install libjson-rpc-cpp
  nix: nix profile install nixpkgs#libjson-rpc-cpp
provenance:
  formula: libjson-rpc-cpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
