id: brew:open-mpi
display-name: open-mpi
homepage: https://www.open-mpi.org/
repo: https://download.open-mpi.org/release/open-mpi/v5.0/openmpi-5.0.9.tar.bz2
docs: https://www.open-mpi.org/
package-manager:
  brew: open-mpi
  debian: pcc
  macports: pcc
  ubuntu: pcc
package-manager-url: https://formulae.brew.sh/formula/open-mpi
version: 5.0.9
license: BSD-3-Clause
category: network
tags:
  - cli
description: High performance message passing library
source-archive: https://download.open-mpi.org/release/open-mpi/v5.0/openmpi-5.0.9.tar.bz2
dependencies:
  - gcc
  - hwloc
  - libevent
  - pmix
executables:
  - exposure: global executable
    kind: cli
    name: mpiCC
  - exposure: global executable
    kind: cli
    name: mpic++
  - exposure: global executable
    kind: cli
    name: mpicc
  - exposure: global executable
    kind: cli
    name: mpicxx
  - exposure: global executable
    kind: cli
    name: mpiexec
  - exposure: global executable
    kind: cli
    name: mpif77
  - exposure: global executable
    kind: cli
    name: mpif90
  - exposure: global executable
    kind: cli
    name: mpifort
  - exposure: global executable
    kind: cli
    name: mpirun
  - exposure: global executable
    kind: cli
    name: ompi_info
  - exposure: global executable
    kind: cli
    name: opal_wrapper
  - exposure: global executable
    kind: cli
    name: oshrun
  - exposure: global executable
    kind: cli
    name: pcc
  - exposure: global executable
    kind: cli
    name: prte
  - exposure: global executable
    kind: cli
    name: prte-term
  - exposure: global executable
    kind: cli
    name: prte_info
  - exposure: global executable
    kind: cli
    name: prted
  - exposure: global executable
    kind: cli
    name: prterun
  - exposure: global executable
    kind: cli
    name: prun
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:open-mpi
  brew: brew install open-mpi
  debian: sudo apt install pcc
  macports: sudo port install pcc
  ubuntu: sudo apt install pcc
provenance:
  formula: open-mpi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
