id: brew:ain
display-name: ain
homepage: https://github.com/jonaslu/ain
repo: https://github.com/jonaslu/ain
docs: https://github.com/jonaslu/ain
package-manager:
  brew: ain
  macports: ain
  nix: ain
package-manager-url: https://formulae.brew.sh/formula/ain
version: 1.6.0
license: MIT
category: development
tags:
  - cli
description: HTTP API client for the terminal
source-archive: https://github.com/jonaslu/ain/archive/refs/tags/v1.6.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ain
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ain
  brew: brew install ain
  macports: sudo port install ain
  nix: nix profile install nixpkgs#ain
provenance:
  formula: ain
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
