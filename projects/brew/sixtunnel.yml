id: brew:sixtunnel
display-name: sixtunnel
homepage: https://github.com/wojtekka/6tunnel
repo: https://github.com/wojtekka/6tunnel
docs: https://github.com/wojtekka/6tunnel
package-manager:
  apk: 6tunnel
  brew: sixtunnel
  debian: 6tunnel
  dnf: 6tunnel
  macports: 6tunnel
  nix: _6tunnel
  pacman: 6tunnel
  ubuntu: 6tunnel
  zypper: 6tunnel
package-manager-url: https://formulae.brew.sh/formula/sixtunnel
version: 0.14
license: GPL-2.0-only
category: development
tags:
  - cli
description: Tunnelling for application that don't speak IPv6
source-archive: https://github.com/wojtekka/6tunnel/releases/download/0.14/6tunnel-0.14.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: 6tunnel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add 6tunnel
  av: sudo av install brew:sixtunnel
  brew: brew install sixtunnel
  debian: sudo apt install 6tunnel
  dnf: sudo dnf install 6tunnel
  macports: sudo port install 6tunnel
  nix: nix profile install nixpkgs#_6tunnel
  pacman: sudo pacman -S 6tunnel
  ubuntu: sudo apt install 6tunnel
  zypper: sudo zypper install 6tunnel
provenance:
  formula: sixtunnel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
