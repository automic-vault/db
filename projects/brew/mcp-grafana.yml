id: brew:mcp-grafana
display-name: mcp-grafana
homepage: https://github.com/grafana/mcp-grafana
repo: https://github.com/grafana/mcp-grafana
docs: https://github.com/grafana/mcp-grafana
package-manager:
  brew: mcp-grafana
  nix: mcp-grafana
package-manager-url: https://formulae.brew.sh/formula/mcp-grafana
version: 0.14.0
license: Apache-2.0
category: development
tags:
  - cli
description: MCP server for Grafana
source-archive: https://github.com/grafana/mcp-grafana/archive/refs/tags/v0.14.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mcp-grafana
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mcp-grafana
  brew: brew install mcp-grafana
  nix: nix profile install nixpkgs#mcp-grafana
provenance:
  formula: mcp-grafana
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
