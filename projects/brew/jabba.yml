id: brew:jabba
display-name: jabba
homepage: https://github.com/Jabba-Team/jabba
repo: https://github.com/Jabba-Team/jabba
docs: https://github.com/Jabba-Team/jabba
package-manager:
  brew: jabba
  scoop: main/jabba
  winget: jabba-team.jabba
package-manager-url: https://formulae.brew.sh/formula/jabba
version: 0.15.0
license: Apache-2.0
category: development
tags:
  - cli
description: Cross-platform Java Version Manager
source-archive: https://github.com/Jabba-Team/jabba/archive/refs/tags/0.15.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jabba
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Add the following line to your ~/.bashrc or ~/.zshrc file: [ -s
    "$HOMEBREW_PREFIX/opt/jabba/jabba.sh" ] && . "$HOMEBREW_PREFIX/opt/jabba/jabba.sh"
    If you use the Fish shell then add the following line to your
    ~/.config/fish/config.fish: [ -s "$HOMEBREW_PREFIX/opt/jabba/jabba.fish" ]; and
    source "$HOMEBREW_PREFIX/opt/jabba/jabba.fish"
  post-install-defined: false
install-lines:
  av: sudo av install brew:jabba
  brew: brew install jabba
  scoop: scoop install main/jabba
  winget: winget install --id jabba-team.jabba -e
provenance:
  formula: jabba
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
