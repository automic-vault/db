id: brew:libxml2
display-name: libxml2
homepage: http://xmlsoft.org/
repo: https://download.gnome.org/sources/libxml2/2.15/libxml2-2.15.3.tar.xz
docs: http://xmlsoft.org/
package-manager:
  apk: libxml2
  brew: libxml2
  debian: libxml2
  dnf: libxml2
  macports: libxml2
  pacman: libxml2
  scoop: main/libxml2
  ubuntu: libxml2
package-manager-url: https://formulae.brew.sh/formula/libxml2
version: 2.15.3
license: MIT
category: network
tags:
  - cli
description: GNOME XML library
source-archive: https://download.gnome.org/sources/libxml2/2.15/libxml2-2.15.3.tar.xz
dependencies:
  - readline
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xml2-config
  - exposure: global executable
    kind: cli
    name: xmlcatalog
  - exposure: global executable
    kind: cli
    name: xmllint
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libxml2
  av: sudo av install brew:libxml2
  brew: brew install libxml2
  debian: sudo apt install libxml2
  dnf: sudo dnf install libxml2
  macports: sudo port install libxml2
  pacman: sudo pacman -S libxml2
  scoop: scoop install main/libxml2
  ubuntu: sudo apt install libxml2
provenance:
  formula: libxml2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
