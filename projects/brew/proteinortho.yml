id: brew:proteinortho
display-name: proteinortho
homepage: https://gitlab.com/paulklemm_PHD/proteinortho
repo: >
  https://gitlab.com/paulklemm_PHD/proteinortho/-/archive/v6.3.6/proteinortho-v6.3.6.tar.gz
docs: https://gitlab.com/paulklemm_PHD/proteinortho
package-manager:
  brew: proteinortho
  debian: proteinortho
  ubuntu: proteinortho
package-manager-url: https://formulae.brew.sh/formula/proteinortho
version: 6.3.6
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Detecting orthologous genes within different species
source-archive: >
  https://gitlab.com/paulklemm_PHD/proteinortho/-/archive/v6.3.6/proteinortho-v6.3.6.tar.gz
dependencies:
  - diamond
  - libomp
  - openblas
executables:
  - exposure: global executable
    kind: cli
    name: proteinortho
  - exposure: global executable
    kind: cli
    name: proteinortho2html.pl
  - exposure: global executable
    kind: cli
    name: proteinortho2tree.pl
  - exposure: global executable
    kind: cli
    name: proteinortho2xml.pl
  - exposure: global executable
    kind: cli
    name: proteinortho6.pl
  - exposure: global executable
    kind: cli
    name: proteinortho_cleanupblastgraph
  - exposure: global executable
    kind: cli
    name: proteinortho_clustering
  - exposure: global executable
    kind: cli
    name: proteinortho_compareProteinorthoGraphs.pl
  - exposure: global executable
    kind: cli
    name: proteinortho_do_mcl.pl
  - exposure: global executable
    kind: cli
    name: proteinortho_extract_from_graph.pl
  - exposure: global executable
    kind: cli
    name: proteinortho_ffadj_mcs.py
  - exposure: global executable
    kind: cli
    name: proteinortho_formatUsearch.pl
  - exposure: global executable
    kind: cli
    name: proteinortho_grab_proteins.pl
  - exposure: global executable
    kind: cli
    name: proteinortho_graphMinusRemovegraph
  - exposure: global executable
    kind: cli
    name: proteinortho_history.pl
  - exposure: global executable
    kind: cli
    name: proteinortho_singletons.pl
  - exposure: global executable
    kind: cli
    name: proteinortho_summary.pl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:proteinortho
  brew: brew install proteinortho
  debian: sudo apt install proteinortho
  ubuntu: sudo apt install proteinortho
provenance:
  formula: proteinortho
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
