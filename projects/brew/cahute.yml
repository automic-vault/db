id: brew:cahute
display-name: cahute
homepage: https://cahuteproject.org/
repo: https://ftp.cahuteproject.org/releases/cahute-0.6.tar.gz
docs: https://cahuteproject.org/
package-manager:
  brew: cahute
package-manager-url: https://formulae.brew.sh/formula/cahute
version: 0.6
license: CECILL-2.1
category: network
tags:
  - cli
description: Library and set of utilities to interact with Casio calculators
source-archive: https://ftp.cahuteproject.org/releases/cahute-0.6.tar.gz
dependencies:
  - libusb
  - sdl2
build-dependencies:
  - cmake
  - pkgconf
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: p7
  - exposure: global executable
    kind: cli
    name: p7os
  - exposure: global executable
    kind: cli
    name: p7screen
  - exposure: global executable
    kind: cli
    name: xfer9860
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cahute
  brew: brew install cahute
provenance:
  formula: cahute
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
