id: brew:xmp
display-name: xmp
homepage: https://xmp.sourceforge.net/
repo: https://github.com/libxmp/xmp-cli
docs: https://xmp.sourceforge.net/
package-manager:
  apk: xmp
  brew: xmp
  debian: xmp
  dnf: xmp
  macports: xmp
  nix: xmp
  ubuntu: xmp
  winget: Thunder.Xmp
  zypper: xmp
package-manager-url: https://formulae.brew.sh/formula/xmp
version: 4.3.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Command-line player for module music formats (MOD, S3M, IT, etc)
source-archive: https://github.com/libxmp/xmp-cli/releases/download/xmp-4.3.0/xmp-4.3.0.tar.gz
dependencies:
  - libxmp
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xmp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xmp
  av: sudo av install brew:xmp
  brew: brew install xmp
  debian: sudo apt install xmp
  dnf: sudo dnf install xmp
  macports: sudo port install xmp
  nix: nix profile install nixpkgs#xmp
  ubuntu: sudo apt install xmp
  winget: winget install --id Thunder.Xmp -e
  zypper: sudo zypper install xmp
provenance:
  formula: xmp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
