id: brew:azure-dev
display-name: azure-dev
homepage: https://aka.ms/azd
repo: https://github.com/Azure/azure-dev
docs: https://aka.ms/azd
package-manager:
  brew: azure-dev
  chocolatey: azd
  scoop: extras/azd
  winget: Microsoft.Azd
package-manager-url: https://formulae.brew.sh/formula/azure-dev
version: 1.25.2
license: MIT
category: cloud
tags:
  - cli
description: Developer CLI that provides commands for working with Azure resources
source-archive: https://github.com/Azure/azure-dev/archive/refs/tags/azure-dev-cli_1.25.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: azd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:azure-dev
  brew: brew install azure-dev
  chocolatey: choco install azd
  scoop: scoop install extras/azd
  winget: winget install --id Microsoft.Azd -e
provenance:
  formula: azure-dev
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
