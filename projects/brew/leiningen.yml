id: brew:leiningen
display-name: leiningen
homepage: https://github.com/technomancy/leiningen
repo: https://github.com/technomancy/leiningen
docs: https://github.com/technomancy/leiningen
package-manager:
  apk: leiningen
  brew: leiningen
  chocolatey: Lein
  debian: leiningen
  macports: leiningen
  nix: leiningen
  pacman: leiningen
  scoop: main/leiningen
  ubuntu: leiningen
  zypper: leiningen
package-manager-url: https://formulae.brew.sh/formula/leiningen
version: 2.12.0
license: EPL-1.0
category: development
tags:
  - cli
description: Build tool for Clojure
source-archive: https://github.com/technomancy/leiningen/archive/refs/tags/2.12.0.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: lein
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Dependencies will be installed to: $HOME/.m2/repository To play around with Clojure
    run `lein repl` or `lein help`.
  post-install-defined: false
install-lines:
  apk: sudo apk add leiningen
  av: sudo av install brew:leiningen
  brew: brew install leiningen
  chocolatey: choco install Lein
  debian: sudo apt install leiningen
  macports: sudo port install leiningen
  nix: nix profile install nixpkgs#leiningen
  pacman: sudo pacman -S leiningen
  scoop: scoop install main/leiningen
  ubuntu: sudo apt install leiningen
  zypper: sudo zypper install leiningen
provenance:
  formula: leiningen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
