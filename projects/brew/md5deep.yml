id: brew:md5deep
display-name: md5deep
homepage: https://github.com/jessek/hashdeep
repo: https://github.com/jessek/hashdeep
docs: https://github.com/jessek/hashdeep
package-manager:
  brew: md5deep
  debian: hashdeep
  dnf: md5deep
  macports: md5deep
  nix: hashdeep
  ubuntu: hashdeep
  zypper: hashdeep
package-manager-url: https://formulae.brew.sh/formula/md5deep
version: 4.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Recursively compute digests on files/directories
source-archive: https://github.com/jessek/hashdeep/archive/refs/tags/release-4.4.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: hashdeep
  - exposure: global executable
    kind: cli
    name: md5deep
  - exposure: global executable
    kind: cli
    name: sha1deep
  - exposure: global executable
    kind: cli
    name: sha256deep
  - exposure: global executable
    kind: cli
    name: tigerdeep
  - exposure: global executable
    kind: cli
    name: whirlpooldeep
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:md5deep
  brew: brew install md5deep
  debian: sudo apt install hashdeep
  dnf: sudo dnf install md5deep
  macports: sudo port install md5deep
  nix: nix profile install nixpkgs#hashdeep
  ubuntu: sudo apt install hashdeep
  zypper: sudo zypper install hashdeep
provenance:
  formula: md5deep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
