id: brew:wakatime-cli
display-name: wakatime-cli
homepage: https://wakatime.com/
repo: https://github.com/wakatime/wakatime-cli
docs: https://wakatime.com/
package-manager:
  brew: wakatime-cli
  nix: wakatime-cli
  scoop: main/wakatime-cli
  winget: Wakatime.CLIWakatime
package-manager-url: https://formulae.brew.sh/formula/wakatime-cli
version: 2.14.8
license: BSD-3-Clause
category: development
tags:
  - cli
description: Command-line interface to the WakaTime api
source-archive: https://github.com/wakatime/wakatime-cli.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wakatime-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wakatime-cli
  brew: brew install wakatime-cli
  nix: nix profile install nixpkgs#wakatime-cli
  scoop: scoop install main/wakatime-cli
  winget: winget install --id Wakatime.CLIWakatime -e
provenance:
  formula: wakatime-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
