id: brew:mqttui
display-name: mqttui
homepage: https://github.com/EdJoPaTo/mqttui
repo: https://github.com/EdJoPaTo/mqttui
docs: https://github.com/EdJoPaTo/mqttui
package-manager:
  apk: mqttui
  brew: mqttui
  macports: mqttui
  nix: mqttui
  pacman: mqttui
package-manager-url: https://formulae.brew.sh/formula/mqttui
version: 0.23.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Subscribe to a MQTT Topic or publish something quickly from the terminal
source-archive: https://github.com/EdJoPaTo/mqttui/archive/refs/tags/v0.23.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mqttui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mqttui
  av: sudo av install brew:mqttui
  brew: brew install mqttui
  macports: sudo port install mqttui
  nix: nix profile install nixpkgs#mqttui
  pacman: sudo pacman -S mqttui
provenance:
  formula: mqttui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
