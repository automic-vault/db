id: brew:fatsort
display-name: fatsort
homepage: https://fatsort.sourceforge.io/
repo: https://downloads.sourceforge.net/project/fatsort/fatsort-1.7.679.tar.xz
docs: https://fatsort.sourceforge.io/
package-manager:
  brew: fatsort
  debian: fatsort
  dnf: fatsort
  macports: fatsort
  nix: fatsort
  pacman: fatsort
  ubuntu: fatsort
  zypper: fatsort
package-manager-url: https://formulae.brew.sh/formula/fatsort
version: 1.7.679
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Sorts FAT16 and FAT32 partitions
source-archive: https://downloads.sourceforge.net/project/fatsort/fatsort-1.7.679.tar.xz
dependencies:
  - help2man
executables:
  - exposure: global executable
    kind: cli
    name: fatsort
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fatsort
  brew: brew install fatsort
  debian: sudo apt install fatsort
  dnf: sudo dnf install fatsort
  macports: sudo port install fatsort
  nix: nix profile install nixpkgs#fatsort
  pacman: sudo pacman -S fatsort
  ubuntu: sudo apt install fatsort
  zypper: sudo zypper install fatsort
provenance:
  formula: fatsort
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
