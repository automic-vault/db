id: brew:scala
display-name: scala
homepage: https://scala-lang.org/
repo: https://github.com/scala/scala3
docs: https://scala-lang.org/
package-manager:
  brew: scala
  chocolatey: scala
  debian: scala
  macports: scala
  nix: scala
  scoop: main/scala
  ubuntu: scala
  winget: Scala.Scala.2
  zypper: scala
package-manager-url: https://formulae.brew.sh/formula/scala
version: 3.8.3
license: Apache-2.0
category: development
tags:
  - cli
description: JVM-based programming language
source-archive: https://github.com/scala/scala3/releases/download/3.8.3/scala3-3.8.3.tar.gz
dependencies:
  - openjdk
  - scala-cli
executables:
  - exposure: global executable
    kind: cli
    name: scala
  - exposure: global executable
    kind: cli
    name: scalac
  - exposure: global executable
    kind: cli
    name: scaladoc
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'To use with IntelliJ, set the Scala home to: $HOMEBREW_PREFIX/opt/scala/idea'
  post-install-defined: false
install-lines:
  av: sudo av install brew:scala
  brew: brew install scala
  chocolatey: choco install scala
  debian: sudo apt install scala
  macports: sudo port install scala
  nix: nix profile install nixpkgs#scala
  scoop: scoop install main/scala
  ubuntu: sudo apt install scala
  winget: winget install --id Scala.Scala.2 -e
  zypper: sudo zypper install scala
provenance:
  formula: scala
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
