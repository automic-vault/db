id: brew:llmfit
display-name: llmfit
homepage: https://github.com/AlexsJones/llmfit
repo: https://static.crates.io/crates/llmfit/llmfit-0.9.28.crate
docs: https://github.com/AlexsJones/llmfit
package-manager:
  brew: llmfit
  macports: llmfit
  nix: llmfit
