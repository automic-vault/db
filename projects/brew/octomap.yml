id: brew:octomap
display-name: octomap
homepage: https://octomap.github.io/
repo: https://github.com/OctoMap/octomap
docs: https://octomap.github.io/
package-manager:
  brew: octomap
  dnf: octomap
  nix: octomap
package-manager-url: https://formulae.brew.sh/formula/octomap
version: 1.10.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Efficient probabilistic 3D mapping framework based on octrees
source-archive: https://github.com/OctoMap/octomap/archive/refs/tags/v1.10.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: binvox2bt
  - exposure: global executable
    kind: cli
    name: bt2vrml
  - exposure: global executable
    kind: cli
    name: compare_octrees
  - exposure: global executable
    kind: cli
    name: convert_octree
  - exposure: global executable
    kind: cli
    name: edit_octree
  - exposure: global executable
    kind: cli
    name: eval_octree_accuracy
  - exposure: global executable
    kind: cli
    name: graph2tree
  - exposure: global executable
    kind: cli
    name: log2graph
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:octomap
  brew: brew install octomap
  dnf: sudo dnf install octomap
  nix: nix profile install nixpkgs#octomap
provenance:
  formula: octomap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
