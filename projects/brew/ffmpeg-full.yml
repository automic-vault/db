id: brew:ffmpeg-full
display-name: ffmpeg-full
homepage: https://ffmpeg.org/
repo: https://ffmpeg.org/releases/ffmpeg-8.1.1.tar.xz
docs: https://ffmpeg.org/
package-manager:
  brew: ffmpeg-full
  chocolatey: ffmpeg-full
package-manager-url: https://formulae.brew.sh/formula/ffmpeg-full
version: 8.1.1
license: GPL-3.0-or-later
category: media
tags:
  - cli
description: Play, record, convert, and stream many audio and video codecs
source-archive: https://ffmpeg.org/releases/ffmpeg-8.1.1.tar.xz
dependencies:
  - aom
  - aribb24
  - dav1d
  - fontconfig
  - freetype
  - frei0r
  - ggml
  - gnutls
  - harfbuzz
  - jpeg-xl
  - lame
  - libarchive
  - libass
  - libbluray
  - libogg
  - libplacebo
  - librist
  - libsamplerate
  - libsoxr
  - libssh
  - libvidstab
  - libvmaf
  - libvorbis
  - libvpx
  - libx11
  - libxcb
  - opencore-amr
  - openjpeg
  - opus
  - rav1e
  - rubberband
  - sdl2
  - snappy
  - speex
  - srt
  - svt-av1
  - tesseract
  - theora
  - webp
  - whisper-cpp
  - x264
  - x265
  - xvid
  - xz
  - zeromq
  - zimg
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: zmqsend
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    ffmpeg-full includes additional tools and libraries that are not included in the
    regular ffmpeg formula.
  post-install-defined: false
install-lines:
  av: sudo av install brew:ffmpeg-full
  brew: brew install ffmpeg-full
  chocolatey: choco install ffmpeg-full
provenance:
  formula: ffmpeg-full
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
