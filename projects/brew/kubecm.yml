id: brew:kubecm
display-name: kubecm
homepage: https://kubecm.cloud
repo: https://github.com/sunny0826/kubecm
docs: https://kubecm.cloud
package-manager:
  brew: kubecm
  nix: kubecm
package-manager-url: https://formulae.brew.sh/formula/kubecm
version: 0.35.1
license: Apache-2.0
category: cloud
tags:
  - cli
description: KubeConfig Manager
source-archive: https://github.com/sunny0826/kubecm/archive/refs/tags/v0.35.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubecm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubecm
  brew: brew install kubecm
  nix: nix profile install nixpkgs#kubecm
provenance:
  formula: kubecm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
