id: brew:sysprof
display-name: sysprof
homepage: https://gitlab.gnome.org/GNOME/sysprof
repo: https://download.gnome.org/sources/sysprof/50/sysprof-50.0.tar.xz
docs: https://gitlab.gnome.org/GNOME/sysprof
package-manager:
  apk: sysprof
  brew: sysprof
  debian: sysprof
  dnf: sysprof
  nix: sysprof
  pacman: sysprof
  ubuntu: sysprof
  zypper: sysprof
package-manager-url: https://formulae.brew.sh/formula/sysprof
version: 50.0
license: >
  GPL-2.0-or-later AND GPL-3.0-or-later AND LGPL-2.0-or-later AND LGPL-3.0-or-later AND
  BSD-2-Clause-Patent AND BSD-3-Clause AND LicenseRef-Homebrew-public-domain
category: development
tags:
  - cli
description: Statistical, system-wide profiler
source-archive: https://download.gnome.org/sources/sysprof/50/sysprof-50.0.tar.xz
dependencies:
  - cairo
  - elfutils
  - glib
  - graphene
  - gtk4
  - hicolor-icon-theme
  - json-glib
  - libadwaita
  - libdex
  - libpanel
  - libunwind
  - pango
  - polkit
  - systemd
build-dependencies:
  - desktop-file-utils
  - gettext
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: sysprof
  - exposure: global executable
    kind: cli
    name: sysprof-agent
  - exposure: global executable
    kind: cli
    name: sysprof-cat
  - exposure: global executable
    kind: cli
    name: sysprof-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add sysprof
  av: sudo av install brew:sysprof
  brew: brew install sysprof
  debian: sudo apt install sysprof
  dnf: sudo dnf install sysprof
  nix: nix profile install nixpkgs#sysprof
  pacman: sudo pacman -S sysprof
  ubuntu: sudo apt install sysprof
  zypper: sudo zypper install sysprof
provenance:
  formula: sysprof
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
