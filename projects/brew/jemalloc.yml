id: brew:jemalloc
display-name: jemalloc
homepage: https://jemalloc.net/
repo: https://github.com/jemalloc/jemalloc
docs: https://jemalloc.net/
package-manager:
  apk: jemalloc
  brew: jemalloc
  dnf: jemalloc
  macports: jemalloc
  nix: jemalloc
  pacman: jemalloc
  zypper: jemalloc
package-manager-url: https://formulae.brew.sh/formula/jemalloc
version: 5.3.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Implementation of malloc emphasizing fragmentation avoidance
source-archive: https://github.com/jemalloc/jemalloc/releases/download/5.3.0/jemalloc-5.3.0.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: jemalloc-config
  - exposure: global executable
    kind: cli
    name: jemalloc.sh
  - exposure: global executable
    kind: cli
    name: jeprof
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jemalloc
  av: sudo av install brew:jemalloc
  brew: brew install jemalloc
  dnf: sudo dnf install jemalloc
  macports: sudo port install jemalloc
  nix: nix profile install nixpkgs#jemalloc
  pacman: sudo pacman -S jemalloc
  zypper: sudo zypper install jemalloc
provenance:
  formula: jemalloc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
