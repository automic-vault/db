id: brew:cloudfoundry-cli
display-name: cloudfoundry-cli
homepage: https://docs.cloudfoundry.org/cf-cli
repo: https://github.com/cloudfoundry/cli
docs: https://docs.cloudfoundry.org/cf-cli
package-manager:
  apk: cloudfoundry-cli
  brew: cloudfoundry-cli
  chocolatey: cloudfoundry-cli
  nix: cloudfoundry-cli
  scoop: extras/cloudfoundry-cli
package-manager-url: https://formulae.brew.sh/formula/cloudfoundry-cli
version: 8.18.3
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Official command-line client for Cloud Foundry
source-archive: https://github.com/cloudfoundry/cli/archive/refs/tags/v8.18.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cloudfoundry-cli
  av: sudo av install brew:cloudfoundry-cli
  brew: brew install cloudfoundry-cli
  chocolatey: choco install cloudfoundry-cli
  nix: nix profile install nixpkgs#cloudfoundry-cli
  scoop: scoop install extras/cloudfoundry-cli
provenance:
  formula: cloudfoundry-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
