id: brew:ophcrack
display-name: ophcrack
homepage: https://ophcrack.sourceforge.io/
repo: https://downloads.sourceforge.net/project/ophcrack/ophcrack/3.8.0/ophcrack-3.8.0.tar.bz2
docs: https://ophcrack.sourceforge.io/
package-manager:
  brew: ophcrack
  debian: ophcrack
  dnf: ophcrack
  macports: ophcrack
  nix: ophcrack
  ubuntu: ophcrack
package-manager-url: https://formulae.brew.sh/formula/ophcrack
version: 3.8.0
license: GPL-2.0-or-later WITH openvpn-openssl-exception
category: security
tags:
  - cli
description: Microsoft Windows password cracker using rainbow tables
source-archive: https://downloads.sourceforge.net/project/ophcrack/ophcrack/3.8.0/ophcrack-3.8.0.tar.bz2
dependencies:
  - openssl@4
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: ophcrack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ophcrack
  brew: brew install ophcrack
  debian: sudo apt install ophcrack
  dnf: sudo dnf install ophcrack
  macports: sudo port install ophcrack
  nix: nix profile install nixpkgs#ophcrack
  ubuntu: sudo apt install ophcrack
provenance:
  formula: ophcrack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
