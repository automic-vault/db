id: brew:xinit
display-name: xinit
homepage: https://gitlab.freedesktop.org/xorg/app/xinit
repo: https://www.x.org/releases/individual/app/xinit-1.4.4.tar.xz
docs: https://gitlab.freedesktop.org/xorg/app/xinit
package-manager:
  apk: xinit
  brew: xinit
  debian: xinit
  macports: xinit
  nix: xinit
  ubuntu: xinit
  zypper: xinit
package-manager-url: https://formulae.brew.sh/formula/xinit
version: 1.4.4
license: MIT AND APSL-2.0
category: development
tags:
  - cli
description: Start the X Window System server
source-archive: https://www.x.org/releases/individual/app/xinit-1.4.4.tar.xz
dependencies:
  - libx11
  - quartz-wm
  - xauth
  - xmodmap
  - xrdb
  - xterm
build-dependencies:
  - lndir
  - mkfontscale
  - pkgconf
  - tradcpp
executables:
  - exposure: global executable
    kind: cli
    name: font_cache
  - exposure: global executable
    kind: cli
    name: startx
  - exposure: global executable
    kind: cli
    name: xinit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To start privileged xinit now and restart at login: sudo brew services start xinit
    --file=$HOMEBREW_PREFIX/opt/xinit/homebrew.mxcl.privileged_startx.plist
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add xinit
  av: sudo av install brew:xinit
  brew: brew install xinit
  debian: sudo apt install xinit
  macports: sudo port install xinit
  nix: nix profile install nixpkgs#xinit
  ubuntu: sudo apt install xinit
  zypper: sudo zypper install xinit
provenance:
  formula: xinit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
