id: brew:nim
display-name: nim
homepage: https://nim-lang.org/
repo: https://nim-lang.org/download/nim-2.2.10.tar.xz
docs: https://nim-lang.org/
package-manager:
  apk: nim
  brew: nim
  chocolatey: nim
  macports: nim
  nix: nim
  pacman: nim
  scoop: main/nim
  ubuntu: nim
  zypper: nim
package-manager-url: https://formulae.brew.sh/formula/nim
version: 2.2.10
license: MIT
category: development
tags:
  - cli
description: Statically typed compiled systems programming language
source-archive: https://nim-lang.org/download/nim-2.2.10.tar.xz
build-dependencies:
  - help2man
executables:
  - exposure: global executable
    kind: cli
    name: nim
  - exposure: global executable
    kind: cli
    name: nimble
  - exposure: global executable
    kind: cli
    name: nimgrep
  - exposure: global executable
    kind: cli
    name: nimpretty
  - exposure: global executable
    kind: cli
    name: nimsuggest
  - exposure: global executable
    kind: cli
    name: testament
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nim
  av: sudo av install brew:nim
  brew: brew install nim
  chocolatey: choco install nim
  macports: sudo port install nim
  nix: nix profile install nixpkgs#nim
  pacman: sudo pacman -S nim
  scoop: scoop install main/nim
  ubuntu: sudo apt install nim
  zypper: sudo zypper install nim
provenance:
  formula: nim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
