id: brew:httpx
display-name: httpx
homepage: https://github.com/projectdiscovery/httpx
repo: https://github.com/projectdiscovery/httpx
docs: https://github.com/projectdiscovery/httpx
package-manager:
  apk: httpx
  brew: httpx
  nix: httpx
package-manager-url: https://formulae.brew.sh/formula/httpx
version: 1.9.0
license: MIT
category: development
tags:
  - cli
description: Fast and multi-purpose HTTP toolkit
source-archive: https://github.com/projectdiscovery/httpx/archive/refs/tags/v1.9.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: httpx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add httpx
  av: sudo av install brew:httpx
  brew: brew install httpx
  nix: nix profile install nixpkgs#httpx
provenance:
  formula: httpx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
