id: brew:pla
display-name: pla
homepage: https://www.arpalert.org/pla.html
repo: https://github.com/thierry-f-78/pla
docs: https://www.arpalert.org/pla.html
package-manager:
  brew: pla
package-manager-url: https://formulae.brew.sh/formula/pla
version: 1.3
license: GPL-2.0-only
category: development
tags:
  - cli
description: Tool for building Gantt charts in PNG, EPS, PDF or SVG format
source-archive: https://github.com/thierry-f-78/pla/archive/refs/tags/1.3.tar.gz
dependencies:
  - cairo
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pla
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pla
  brew: brew install pla
provenance:
  formula: pla
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
