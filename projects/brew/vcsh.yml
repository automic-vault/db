id: brew:vcsh
display-name: vcsh
homepage: https://github.com/RichiH/vcsh
repo: https://github.com/RichiH/vcsh
docs: https://github.com/RichiH/vcsh
package-manager:
  apk: vcsh
  brew: vcsh
  debian: vcsh
  dnf: vcsh
  macports: vcsh
  nix: vcsh
  pacman: vcsh
  ubuntu: vcsh
  zypper: vcsh
package-manager-url: https://formulae.brew.sh/formula/vcsh
version: 2.0.10
license: GPL-2.0-or-later
category: development
tags:
  - cli
  - git
description: Config manager based on git
source-archive: https://github.com/RichiH/vcsh/releases/download/v2.0.10/vcsh-2.0.10.tar.zst
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: vcsh
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vcsh
  av: sudo av install brew:vcsh
  brew: brew install vcsh
  debian: sudo apt install vcsh
  dnf: sudo dnf install vcsh
  macports: sudo port install vcsh
  nix: nix profile install nixpkgs#vcsh
  pacman: sudo pacman -S vcsh
  ubuntu: sudo apt install vcsh
  zypper: sudo zypper install vcsh
provenance:
  formula: vcsh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
