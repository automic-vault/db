id: brew:lilypond
display-name: lilypond
homepage: https://lilypond.org
repo: https://lilypond.org/download/sources/v2.26/lilypond-2.26.0.tar.gz
docs: https://lilypond.org
package-manager:
  apk: lilypond
  brew: lilypond
  debian: lilypond
  dnf: lilypond
  macports: lilypond
  nix: lilypond
  pacman: lilypond
  scoop: main/lilypond
  ubuntu: lilypond
  winget: LilyPond.LilyPond
  zypper: lilypond
package-manager-url: https://formulae.brew.sh/formula/lilypond
version: 2.26.0
license: >
  GPL-3.0-or-later AND GPL-3.0-only AND OFL-1.1-RFN AND GFDL-1.3-no-invariants-or-later
  AND LicenseRef-Homebrew-public-domain AND MIT AND AGPL-3.0-only AND LPPL-1.3c
category: network
tags:
  - cli
description: Music engraving system
source-archive: https://lilypond.org/download/sources/v2.26/lilypond-2.26.0.tar.gz
dependencies:
  - bdw-gc
  - cairo
  - fontconfig
  - freetype
  - gettext
  - ghostscript
  - glib
  - guile
  - harfbuzz
  - libpng
  - pango
  - python@3.14
build-dependencies:
  - bison
  - fontforge
  - gettext
  - make
  - pkgconf
  - t1utils
  - texinfo
  - texlive
executables:
  - exposure: global executable
    kind: cli
    name: abc2ly
  - exposure: global executable
    kind: cli
    name: convert-ly
  - exposure: global executable
    kind: cli
    name: etf2ly
  - exposure: global executable
    kind: cli
    name: lilymidi
  - exposure: global executable
    kind: cli
    name: lilypond
  - exposure: global executable
    kind: cli
    name: lilypond-book
  - exposure: global executable
    kind: cli
    name: lilypond-invoke-editor
  - exposure: global executable
    kind: cli
    name: midi2ly
  - exposure: global executable
    kind: cli
    name: musicxml2ly
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lilypond
  av: sudo av install brew:lilypond
  brew: brew install lilypond
  debian: sudo apt install lilypond
  dnf: sudo dnf install lilypond
  macports: sudo port install lilypond
  nix: nix profile install nixpkgs#lilypond
  pacman: sudo pacman -S lilypond
  scoop: scoop install main/lilypond
  ubuntu: sudo apt install lilypond
  winget: winget install --id LilyPond.LilyPond -e
  zypper: sudo zypper install lilypond
provenance:
  formula: lilypond
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
