id: brew:pstree
display-name: pstree
homepage: https://github.com/FredHucht/pstree
repo: https://github.com/FredHucht/pstree
docs: https://github.com/FredHucht/pstree
package-manager:
  apk: pstree
  brew: pstree
  macports: pstree
  nix: pstree
package-manager-url: https://formulae.brew.sh/formula/pstree
version: 2.40
license: GPL-3.0-only
category: development
tags:
  - cli
description: Show ps output as a tree
source-archive: https://github.com/FredHucht/pstree/archive/refs/tags/v2.40.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: pstree
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pstree
  av: sudo av install brew:pstree
  brew: brew install pstree
  macports: sudo port install pstree
  nix: nix profile install nixpkgs#pstree
provenance:
  formula: pstree
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
