id: brew:termframe
display-name: termframe
homepage: https://github.com/pamburus/termframe
repo: https://github.com/pamburus/termframe
docs: https://github.com/pamburus/termframe
package-manager:
  brew: termframe
package-manager-url: https://formulae.brew.sh/formula/termframe
version: 0.8.5
license: MIT
category: development
tags:
  - cli
description: Terminal output SVG screenshot tool
source-archive: https://github.com/pamburus/termframe/archive/refs/tags/v0.8.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: termframe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:termframe
  brew: brew install termframe
provenance:
  formula: termframe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
