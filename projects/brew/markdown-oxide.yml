id: brew:markdown-oxide
display-name: markdown-oxide
homepage: https://oxide.md
repo: https://github.com/Feel-ix-343/markdown-oxide
docs: https://oxide.md
package-manager:
  apk: markdown-oxide
  brew: markdown-oxide
  nix: markdown-oxide
  pacman: markdown-oxide
  scoop: main/markdown-oxide
  winget: FelixZeller.markdown-oxide
  zypper: markdown-oxide
package-manager-url: https://formulae.brew.sh/formula/markdown-oxide
version: 0.25.10
license: Apache-2.0
category: development
tags:
  - cli
description: Personal Knowledge Management System for the LSP
source-archive: https://github.com/Feel-ix-343/markdown-oxide/archive/refs/tags/v0.25.10.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: markdown-oxide
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add markdown-oxide
  av: sudo av install brew:markdown-oxide
  brew: brew install markdown-oxide
  nix: nix profile install nixpkgs#markdown-oxide
  pacman: sudo pacman -S markdown-oxide
  scoop: scoop install main/markdown-oxide
  winget: winget install --id FelixZeller.markdown-oxide -e
  zypper: sudo zypper install markdown-oxide
provenance:
  formula: markdown-oxide
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
