id: brew:samply
display-name: samply
homepage: https://github.com/mstange/samply
repo: https://github.com/mstange/samply
docs: https://github.com/mstange/samply
package-manager:
  brew: samply
  nix: samply
  pacman: samply
  zypper: samply
package-manager-url: https://formulae.brew.sh/formula/samply
version: 0.13.1
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: CLI sampling profiler
source-archive: https://github.com/mstange/samply/archive/refs/tags/samply-v0.13.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: samply
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:samply
  brew: brew install samply
  nix: nix profile install nixpkgs#samply
  pacman: sudo pacman -S samply
  zypper: sudo zypper install samply
provenance:
  formula: samply
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
