id: brew:foundry
display-name: foundry
homepage: https://github.com/foundry-rs/foundry
repo: https://github.com/foundry-rs/foundry
docs: https://github.com/foundry-rs/foundry
package-manager:
  apk: foundry
  brew: foundry
  dnf: foundry
  nix: foundry
  pacman: foundry
  scoop: main/chisel
  winget: Microsoft.FoundryLocal
  zypper: foundry
package-manager-url: https://formulae.brew.sh/formula/foundry
version: 1.7.1
license: MIT OR Apache-2.0
category: development
tags:
  - cli
description: Blazing fast, portable and modular toolkit for Ethereum application development
source-archive: https://github.com/foundry-rs/foundry.git
dependencies:
  - libusb
build-dependencies:
  - help2man
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: anvil
  - exposure: global executable
    kind: cli
    name: cast
  - exposure: global executable
    kind: cli
    name: chisel
  - exposure: global executable
    kind: cli
    name: forge
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add foundry
  av: sudo av install brew:foundry
  brew: brew install foundry
  dnf: sudo dnf install foundry
  nix: nix profile install nixpkgs#foundry
  pacman: sudo pacman -S foundry
  scoop: scoop install main/chisel
  winget: winget install --id Microsoft.FoundryLocal -e
  zypper: sudo zypper install foundry
provenance:
  formula: foundry
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
