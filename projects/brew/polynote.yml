id: brew:polynote
display-name: polynote
homepage: https://polynote.org/
repo: https://github.com/polynote/polynote
docs: https://polynote.org/
package-manager:
  brew: polynote
package-manager-url: https://formulae.brew.sh/formula/polynote
version: 0.7.2
license: Apache-2.0
category: development
tags:
  - cli
description: Polyglot notebook with first-class Scala support
source-archive: https://github.com/polynote/polynote/archive/refs/tags/0.7.2.tar.gz
dependencies:
  - numpy
  - openjdk
  - python@3.14
build-dependencies:
  - node
  - python-setuptools
  - sbt
executables:
  - exposure: global executable
    kind: cli
    name: polynote
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:polynote
  brew: brew install polynote
provenance:
  formula: polynote
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
