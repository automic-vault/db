id: brew:gotop
display-name: gotop
homepage: https://github.com/xxxserxxx/gotop
repo: https://github.com/xxxserxxx/gotop
docs: https://github.com/xxxserxxx/gotop
package-manager:
  apk: gotop
  brew: gotop
  macports: gotop
  nix: gotop
  scoop: main/gotop
package-manager-url: https://formulae.brew.sh/formula/gotop
version: 4.2.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Terminal based graphical activity monitor inspired by gtop and vtop
source-archive: https://github.com/xxxserxxx/gotop/archive/refs/tags/v4.2.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gotop
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gotop
  av: sudo av install brew:gotop
  brew: brew install gotop
  macports: sudo port install gotop
  nix: nix profile install nixpkgs#gotop
  scoop: scoop install main/gotop
provenance:
  formula: gotop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
