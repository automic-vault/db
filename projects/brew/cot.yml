id: brew:cot
display-name: cot
homepage: https://cot.rs
repo: https://github.com/cot-rs/cot
docs: https://cot.rs
package-manager:
  brew: cot
  nix: cot
package-manager-url: https://formulae.brew.sh/formula/cot
version: 0.6.0
license: Apache-2.0
category: development
tags:
  - cli
description: Rust web framework for lazy developers
source-archive: https://github.com/cot-rs/cot/archive/refs/tags/cot-v0.6.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cot
  brew: brew install cot
  nix: nix profile install nixpkgs#cot
provenance:
  formula: cot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
