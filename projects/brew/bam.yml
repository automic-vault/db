id: brew:bam
display-name: bam
homepage: https://matricks.github.io/bam/
repo: https://github.com/matricks/bam
docs: https://matricks.github.io/bam/
package-manager:
  apk: bam
  brew: bam
  debian: bam
  dnf: bam
  macports: bam
  nix: bam
  pacman: bam
  ubuntu: bam
  zypper: bam
package-manager-url: https://formulae.brew.sh/formula/bam
version: 0.5.1
license: Zlib
category: development
tags:
  - cli
description: Build system that uses Lua to describe the build process
source-archive: https://github.com/matricks/bam/archive/refs/tags/v0.5.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bam
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bam
  av: sudo av install brew:bam
  brew: brew install bam
  debian: sudo apt install bam
  dnf: sudo dnf install bam
  macports: sudo port install bam
  nix: nix profile install nixpkgs#bam
  pacman: sudo pacman -S bam
  ubuntu: sudo apt install bam
  zypper: sudo zypper install bam
provenance:
  formula: bam
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
