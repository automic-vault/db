id: brew:grails
display-name: grails
homepage: https://grails.apache.org/
repo: https://github.com/apache/grails-core
docs: https://grails.apache.org/
package-manager:
  brew: grails
  chocolatey: Grails
  macports: grails
  nix: grails
  scoop: main/grails
package-manager-url: https://formulae.brew.sh/formula/grails
version: 7.1.1
license: Apache-2.0
category: development
tags:
  - cli
description: Web application framework for the Groovy language
source-archive: >
  https://github.com/apache/grails-core/releases/download/v7.1.1/apache-grails-7.1.1-bin.zip
dependencies:
  - openjdk@21
executables:
  - exposure: global executable
    kind: cli
    name: grails
  - exposure: global executable
    kind: cli
    name: grails-forge-cli
  - exposure: global executable
    kind: cli
    name: grails-shell-cli
  - exposure: global executable
    kind: cli
    name: grails_forge_cli_completion
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'The GRAILS_HOME directory is: $HOMEBREW_PREFIX/opt/grails/libexec'
  post-install-defined: false
install-lines:
  av: sudo av install brew:grails
  brew: brew install grails
  chocolatey: choco install Grails
  macports: sudo port install grails
  nix: nix profile install nixpkgs#grails
  scoop: scoop install main/grails
provenance:
  formula: grails
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
