id: brew:rainbarf
display-name: rainbarf
homepage: https://github.com/creaktive/rainbarf
repo: https://github.com/creaktive/rainbarf
docs: https://github.com/creaktive/rainbarf
package-manager:
  brew: rainbarf
  macports: rainbarf
package-manager-url: https://formulae.brew.sh/formula/rainbarf
version: 1.4
license: Artistic-1.0-Perl OR GPL-1.0-or-later
category: development
tags:
  - cli
description: CPU/RAM/battery stats chart bar for tmux (and GNU screen)
source-archive: https://github.com/creaktive/rainbarf/archive/refs/tags/v1.4.tar.gz
build-dependencies:
  - pod2man
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: rainbarf
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rainbarf
  brew: brew install rainbarf
  macports: sudo port install rainbarf
provenance:
  formula: rainbarf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
