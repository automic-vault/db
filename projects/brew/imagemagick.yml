id: brew:imagemagick
display-name: imagemagick
homepage: https://imagemagick.org/index.php
repo: https://github.com/ImageMagick/ImageMagick
docs: https://imagemagick.org/index.php
package-manager:
  apk: imagemagick
  brew: imagemagick
  chocolatey: imagemagick
  debian: imagemagick
  dnf: ImageMagick
  macports: ImageMagick
  nix: imagemagick
  pacman: imagemagick
  scoop: main/imagemagick
  ubuntu: imagemagick
  winget: JiriPolasek.DevNumbersforCommandPalette
  zypper: ImageMagick
package-manager-url: https://formulae.brew.sh/formula/imagemagick
version: 7.1.2-24
license: ImageMagick
category: development
tags:
  - cli
description: Tools and libraries to manipulate images in select formats
source-archive: >
  https://github.com/ImageMagick/ImageMagick/releases/download/7.1.2-24/ImageMagick-7.1.2-24.7z
dependencies:
  - freetype
  - jpeg-turbo
  - libheif
  - libpng
  - libtiff
  - libtool
  - little-cms2
  - webp
  - xz
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: Magick++-config
  - exposure: global executable
    kind: cli
    name: MagickCore-config
  - exposure: global executable
    kind: cli
    name: MagickWand-config
  - exposure: global executable
    kind: cli
    name: animate
  - exposure: global executable
    kind: cli
    name: compare
  - exposure: global executable
    kind: cli
    name: composite
  - exposure: global executable
    kind: cli
    name: conjure
  - exposure: global executable
    kind: cli
    name: convert
  - exposure: global executable
    kind: cli
    name: display
  - exposure: global executable
    kind: cli
    name: identify
  - exposure: global executable
    kind: cli
    name: import
  - exposure: global executable
    kind: cli
    name: magick
  - exposure: global executable
    kind: cli
    name: magick-script
  - exposure: global executable
    kind: cli
    name: mogrify
  - exposure: global executable
    kind: cli
    name: montage
  - exposure: global executable
    kind: cli
    name: stream
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    imagemagick-full includes additional tools and libraries that are not included in
    the regular imagemagick formula.
  post-install-defined: false
install-lines:
  apk: sudo apk add imagemagick
  av: sudo av install brew:imagemagick
  brew: brew install imagemagick
  chocolatey: choco install imagemagick
  debian: sudo apt install imagemagick
  dnf: sudo dnf install ImageMagick
  macports: sudo port install ImageMagick
  nix: nix profile install nixpkgs#imagemagick
  pacman: sudo pacman -S imagemagick
  scoop: scoop install main/imagemagick
  ubuntu: sudo apt install imagemagick
  winget: winget install --id JiriPolasek.DevNumbersforCommandPalette -e
  zypper: sudo zypper install ImageMagick
provenance:
  formula: imagemagick
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
