id: brew:davix
display-name: davix
homepage: https://github.com/cern-fts/davix
repo: https://github.com/cern-fts/davix
docs: https://github.com/cern-fts/davix
package-manager:
  brew: davix
  debian: davix
  dnf: davix
  macports: davix
  nix: davix
  pacman: davix
  ubuntu: davix
  zypper: davix
package-manager-url: https://formulae.brew.sh/formula/davix
version: 0.8.10
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Library and tools for advanced file I/O with HTTP-based protocols
source-archive: https://github.com/cern-fts/davix/releases/download/R_0_8_10/davix-0.8.10.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - cmake
  - doxygen
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: davix-get
  - exposure: global executable
    kind: cli
    name: davix-http
  - exposure: global executable
    kind: cli
    name: davix-ls
  - exposure: global executable
    kind: cli
    name: davix-mkdir
  - exposure: global executable
    kind: cli
    name: davix-mv
  - exposure: global executable
    kind: cli
    name: davix-put
  - exposure: global executable
    kind: cli
    name: davix-rm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:davix
  brew: brew install davix
  debian: sudo apt install davix
  dnf: sudo dnf install davix
  macports: sudo port install davix
  nix: nix profile install nixpkgs#davix
  pacman: sudo pacman -S davix
  ubuntu: sudo apt install davix
  zypper: sudo zypper install davix
provenance:
  formula: davix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
