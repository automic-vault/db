id: brew:retdec
display-name: retdec
homepage: https://github.com/avast/retdec
repo: https://github.com/avast/retdec
docs: https://github.com/avast/retdec
package-manager:
  brew: retdec
  macports: retdec
  nix: retdec
  scoop: main/retdec
package-manager-url: https://formulae.brew.sh/formula/retdec
version: 5.0
license: MIT AND Zlib
category: development
tags:
  - cli
description: Retargetable machine-code decompiler based on LLVM
source-archive: https://github.com/avast/retdec.git
dependencies:
  - openssl@3
  - python@3.14
build-dependencies:
  - autoconf
  - automake
  - cmake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: retdec-ar-extractor
  - exposure: global executable
    kind: cli
    name: retdec-archive-decompiler.py
  - exposure: global executable
    kind: cli
    name: retdec-bin2pat
  - exposure: global executable
    kind: cli
    name: retdec-decompiler
  - exposure: global executable
    kind: cli
    name: retdec-fileinfo
  - exposure: global executable
    kind: cli
    name: retdec-fileinfo.py
  - exposure: global executable
    kind: cli
    name: retdec-getsig
  - exposure: global executable
    kind: cli
    name: retdec-idr2pat
  - exposure: global executable
    kind: cli
    name: retdec-macho-extractor
  - exposure: global executable
    kind: cli
    name: retdec-pat2yara
  - exposure: global executable
    kind: cli
    name: retdec-signature-from-library-creator.py
  - exposure: global executable
    kind: cli
    name: retdec-stacofin
  - exposure: global executable
    kind: cli
    name: retdec-unpacker
  - exposure: global executable
    kind: cli
    name: retdec-unpacker.py
  - exposure: global executable
    kind: cli
    name: retdec-utils.py
  - exposure: global executable
    kind: cli
    name: retdec-yarac
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:retdec
  brew: brew install retdec
  macports: sudo port install retdec
  nix: nix profile install nixpkgs#retdec
  scoop: scoop install main/retdec
provenance:
  formula: retdec
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
