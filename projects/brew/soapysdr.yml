id: brew:soapysdr
display-name: soapysdr
homepage: https://github.com/pothosware/SoapySDR/wiki
repo: https://github.com/pothosware/SoapySDR
docs: https://github.com/pothosware/SoapySDR/wiki
package-manager:
  brew: soapysdr
  dnf: SoapySDR
  macports: SoapySDR
  nix: soapysdr
  pacman: soapysdr
package-manager-url: https://formulae.brew.sh/formula/soapysdr
version: 0.8.1
license: BSL-1.0
category: development
tags:
  - cli
description: Vendor and platform neutral SDR support library
source-archive: https://github.com/pothosware/SoapySDR/archive/refs/tags/soapy-sdr-0.8.1.tar.gz
dependencies:
  - python@3.14
build-dependencies:
  - cmake
  - swig
executables:
  - exposure: global executable
    kind: cli
    name: SoapySDRUtil
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:soapysdr
  brew: brew install soapysdr
  dnf: sudo dnf install SoapySDR
  macports: sudo port install SoapySDR
  nix: nix profile install nixpkgs#soapysdr
  pacman: sudo pacman -S soapysdr
provenance:
  formula: soapysdr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
