id: brew:dex2jar
display-name: dex2jar
homepage: https://github.com/pxb1988/dex2jar
repo: https://github.com/pxb1988/dex2jar
docs: https://github.com/pxb1988/dex2jar
package-manager:
  brew: dex2jar
  chocolatey: dex2jar
  macports: dex2jar
  nix: dex2jar
package-manager-url: https://formulae.brew.sh/formula/dex2jar
version: 2.4
license: Apache-2.0
category: development
tags:
  - cli
description: Tools to work with Android .dex and Java .class files
source-archive: https://github.com/pxb1988/dex2jar/releases/download/v2.4/dex-tools-v2.4.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: d2j-apk-sign
  - exposure: global executable
    kind: cli
    name: d2j-asm-verify
  - exposure: global executable
    kind: cli
    name: d2j-baksmali
  - exposure: global executable
    kind: cli
    name: d2j-class-version-switch
  - exposure: global executable
    kind: cli
    name: d2j-decrypt-string
  - exposure: global executable
    kind: cli
    name: d2j-dex-recompute-checksum
  - exposure: global executable
    kind: cli
    name: d2j-dex-weaver
  - exposure: global executable
    kind: cli
    name: d2j-dex2jar
  - exposure: global executable
    kind: cli
    name: d2j-dex2smali
  - exposure: global executable
    kind: cli
    name: d2j-jar-access
  - exposure: global executable
    kind: cli
    name: d2j-jar-weaver
  - exposure: global executable
    kind: cli
    name: d2j-jar2dex
  - exposure: global executable
    kind: cli
    name: d2j-jar2jasmin
  - exposure: global executable
    kind: cli
    name: d2j-jasmin2jar
  - exposure: global executable
    kind: cli
    name: d2j-smali
  - exposure: global executable
    kind: cli
    name: d2j-std-apk
  - exposure: global executable
    kind: cli
    name: d2j_invoke
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dex2jar
  brew: brew install dex2jar
  chocolatey: choco install dex2jar
  macports: sudo port install dex2jar
  nix: nix profile install nixpkgs#dex2jar
provenance:
  formula: dex2jar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
