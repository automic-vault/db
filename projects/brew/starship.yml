id: brew:starship
display-name: starship
homepage: https://starship.rs/
repo: https://github.com/starship/starship
docs: https://starship.rs/
package-manager:
  apk: starship
  brew: starship
  chocolatey: starship
  debian: starship
  macports: starship
  nix: starship
  pacman: starship
  scoop: main/starship
  winget: Starship.Starship
  zypper: starship
package-manager-url: https://formulae.brew.sh/formula/starship
version: 1.25.1
license: ISC
category: development
tags:
  - cli
description: Cross-shell prompt for astronauts
source-archive: https://github.com/starship/starship/archive/refs/tags/v1.25.1.tar.gz
build-dependencies:
  - cmake
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: starship
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add starship
  av: sudo av install brew:starship
  brew: brew install starship
  chocolatey: choco install starship
  debian: sudo apt install starship
  macports: sudo port install starship
  nix: nix profile install nixpkgs#starship
  pacman: sudo pacman -S starship
  scoop: scoop install main/starship
  winget: winget install --id Starship.Starship -e
  zypper: sudo zypper install starship
provenance:
  formula: starship
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
