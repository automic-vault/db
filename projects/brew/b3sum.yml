id: brew:b3sum
display-name: b3sum
homepage: https://github.com/BLAKE3-team/BLAKE3
repo: https://github.com/BLAKE3-team/BLAKE3
docs: https://github.com/BLAKE3-team/BLAKE3
package-manager:
  apk: b3sum
  brew: b3sum
  debian: b3sum
