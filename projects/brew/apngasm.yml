id: brew:apngasm
display-name: apngasm
homepage: https://github.com/apngasm/apngasm
repo: https://github.com/apngasm/apngasm
docs: https://github.com/apngasm/apngasm
package-manager:
  brew: apngasm
  debian: apngasm
  nix: apngasm
  scoop: main/apngasm
  ubuntu: apngasm
package-manager-url: https://formulae.brew.sh/formula/apngasm
version: 3.1.10
license: Zlib
category: development
tags:
  - cli
description: Next generation of apngasm, the APNG assembler
source-archive: https://github.com/apngasm/apngasm/archive/refs/tags/3.1.10.tar.gz
dependencies:
  - boost
  - icu4c@78
  - libpng
  - lzlib
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: apngasm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:apngasm
  brew: brew install apngasm
  debian: sudo apt install apngasm
  nix: nix profile install nixpkgs#apngasm
  scoop: scoop install main/apngasm
  ubuntu: sudo apt install apngasm
provenance:
  formula: apngasm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
