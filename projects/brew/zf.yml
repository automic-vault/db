id: brew:zf
display-name: zf
homepage: https://github.com/natecraddock/zf
repo: https://github.com/natecraddock/zf
docs: https://github.com/natecraddock/zf
package-manager:
  brew: zf
  nix: zf
package-manager-url: https://formulae.brew.sh/formula/zf
version: 0.10.4
license: MIT
category: development
tags:
  - cli
description: Command-line fuzzy finder that prioritizes matches on filenames
source-archive: https://github.com/natecraddock/zf/archive/refs/tags/0.10.4.tar.gz
build-dependencies:
  - zig@0.15
executables:
  - exposure: global executable
    kind: cli
    name: zf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zf
  brew: brew install zf
  nix: nix profile install nixpkgs#zf
provenance:
  formula: zf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
