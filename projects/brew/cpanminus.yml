id: brew:cpanminus
display-name: cpanminus
homepage: https://github.com/miyagawa/cpanminus
repo: https://cpan.metacpan.org/authors/id/M/MI/MIYAGAWA/App-cpanminus-1.7049.tar.gz
docs: https://github.com/miyagawa/cpanminus
package-manager:
  brew: cpanminus
  debian: cpanminus
  pacman: cpanminus
  ubuntu: cpanminus
package-manager-url: https://formulae.brew.sh/formula/cpanminus
version: 1.7049
license: Artistic-1.0-Perl OR GPL-1.0-or-later
category: development
tags:
  - cli
description: Get, unpack, build, and install modules from CPAN
source-archive: https://cpan.metacpan.org/authors/id/M/MI/MIYAGAWA/App-cpanminus-1.7049.tar.gz
build-dependencies:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: cpanm
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cpanminus
  brew: brew install cpanminus
  debian: sudo apt install cpanminus
  pacman: sudo pacman -S cpanminus
  ubuntu: sudo apt install cpanminus
provenance:
  formula: cpanminus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
