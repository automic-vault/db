id: brew:rsyncy
display-name: rsyncy
homepage: https://github.com/laktak/rsyncy
repo: https://github.com/laktak/rsyncy
docs: https://github.com/laktak/rsyncy
package-manager:
  brew: rsyncy
  nix: rsyncy
package-manager-url: https://formulae.brew.sh/formula/rsyncy
version: 2.2.0
license: MIT
category: development
tags:
  - cli
description: Status/progress bar for rsync
source-archive: https://github.com/laktak/rsyncy/archive/refs/tags/v2.2.0.tar.gz
dependencies:
  - rsync
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rsyncy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rsyncy
  brew: brew install rsyncy
  nix: nix profile install nixpkgs#rsyncy
provenance:
  formula: rsyncy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
