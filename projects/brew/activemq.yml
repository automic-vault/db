id: brew:activemq
display-name: activemq
homepage: https://activemq.apache.org/
repo: >
  https://www.apache.org/dyn/closer.lua?path=activemq/6.2.5/apache-activemq-6.2.5-bin.tar.gz
docs: https://activemq.apache.org/
package-manager:
  brew: activemq
  chocolatey: ActiveMQ
  debian: activemq
  nix: activemq
  scoop: extras/activemq
  ubuntu: activemq
package-manager-url: https://formulae.brew.sh/formula/activemq
version: 6.2.5
license: Apache-2.0
category: network
tags:
  - cli
description: 'Apache ActiveMQ: powerful open source messaging server'
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=activemq/6.2.5/apache-activemq-6.2.5-bin.tar.gz
dependencies:
  - java-service-wrapper
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: activemq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:activemq
  brew: brew install activemq
  chocolatey: choco install ActiveMQ
  debian: sudo apt install activemq
  nix: nix profile install nixpkgs#activemq
  scoop: scoop install extras/activemq
  ubuntu: sudo apt install activemq
provenance:
  formula: activemq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
