install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zsync
  brew: brew install zsync
  debian: sudo apt install zsync
  dnf: sudo dnf install zsync
  macports: sudo port install zsync
  nix: nix profile install nixpkgs#zsync
  pacman: sudo pacman -S zsync
  ubuntu: sudo apt install zsync
  zypper: sudo zypper install zsync
provenance:
  formula: zsync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
