id: brew:zsync
display-name: zsync
homepage: https://zsync.moria.org.uk/
repo: https://zsync.moria.org.uk/download/zsync-0.7.0.tar.gz
docs: https://zsync.moria.org.uk/
package-manager:
  brew: zsync
  debian: zsync
  dnf: zsync
  macports: zsync
  nix: zsync
  pacman: zsync
  ubuntu: zsync
  zypper: zsync
package-manager-url: https://formulae.brew.sh/formula/zsync
version: 0.7.0
license: Artistic-2.0
category: network
tags:
  - cli
description: File transfer program
source-archive: https://zsync.moria.org.uk/download/zsync-0.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: zsync
  - exposure: global executable
    kind: cli
    name: zsyncmake
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
