id: brew:castxml
display-name: castxml
homepage: https://github.com/CastXML/CastXML
repo: https://github.com/CastXML/CastXML
docs: https://github.com/CastXML/CastXML
package-manager:
  brew: castxml
  debian: castxml
  dnf: castxml
  macports: castxml
  nix: castxml
  pacman: castxml
  scoop: main/castxml
  ubuntu: castxml
package-manager-url: https://formulae.brew.sh/formula/castxml
version: 0.7.0
license: Apache-2.0
category: development
tags:
  - cli
description: C-family Abstract Syntax Tree XML Output
source-archive: https://github.com/CastXML/CastXML/archive/refs/tags/v0.7.0.tar.gz
dependencies:
  - llvm
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: castxml
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:castxml
  brew: brew install castxml
  debian: sudo apt install castxml
  dnf: sudo dnf install castxml
  macports: sudo port install castxml
  nix: nix profile install nixpkgs#castxml
  pacman: sudo pacman -S castxml
  scoop: scoop install main/castxml
  ubuntu: sudo apt install castxml
provenance:
  formula: castxml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
