id: brew:yutu
display-name: yutu
homepage: https://github.com/eat-pray-ai/yutu
repo: https://github.com/eat-pray-ai/yutu
docs: https://github.com/eat-pray-ai/yutu
package-manager:
  brew: yutu
  winget: eat-pray-ai.yutu
package-manager-url: https://formulae.brew.sh/formula/yutu
version: 0.10.8
license: Apache-2.0
category: development
tags:
  - cli
description: MCP server and CLI for YouTube
source-archive: https://github.com/eat-pray-ai/yutu/archive/refs/tags/v0.10.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: yutu
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yutu
  brew: brew install yutu
  winget: winget install --id eat-pray-ai.yutu -e
provenance:
  formula: yutu
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
