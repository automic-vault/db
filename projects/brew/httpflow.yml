id: brew:httpflow
display-name: httpflow
homepage: https://github.com/six-ddc/httpflow
repo: https://github.com/six-ddc/httpflow
docs: https://github.com/six-ddc/httpflow
package-manager:
  brew: httpflow
package-manager-url: https://formulae.brew.sh/formula/httpflow
version: 0.0.9
license: MIT
category: development
tags:
  - cli
description: Packet capture and analysis utility similar to tcpdump for HTTP
source-archive: https://github.com/six-ddc/httpflow/archive/refs/tags/0.0.9.tar.gz
dependencies:
  - pcre
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: httpflow
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:httpflow
  brew: brew install httpflow
provenance:
  formula: httpflow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
