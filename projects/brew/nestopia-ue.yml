id: brew:nestopia-ue
display-name: nestopia-ue
homepage: http://0ldsk00l.ca/nestopia/
repo: https://github.com/0ldsk00l/nestopia
docs: http://0ldsk00l.ca/nestopia/
package-manager:
  brew: nestopia-ue
  debian: nestopia
  nix: nestopia-ue
  ubuntu: nestopia
  zypper: nestopia
package-manager-url: https://formulae.brew.sh/formula/nestopia-ue
version: 1.53.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: NES emulator
source-archive: https://github.com/0ldsk00l/nestopia/archive/refs/tags/1.53.2.tar.gz
dependencies:
  - fltk
  - libarchive
  - libepoxy
  - libsamplerate
  - sdl2
build-dependencies:
  - autoconf
  - autoconf-archive
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: nestopia
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nestopia-ue
  brew: brew install nestopia-ue
  debian: sudo apt install nestopia
  nix: nix profile install nixpkgs#nestopia-ue
  ubuntu: sudo apt install nestopia
  zypper: sudo zypper install nestopia
provenance:
  formula: nestopia-ue
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
