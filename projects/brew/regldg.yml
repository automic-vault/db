id: brew:regldg
display-name: regldg
homepage: https://regldg.com/
repo: https://github.com/PatrickCronin/regldg
docs: https://regldg.com/
package-manager:
  brew: regldg
package-manager-url: https://formulae.brew.sh/formula/regldg
version: 1.0.1
license: MIT
category: development
tags:
  - cli
description: Regular expression grammar language dictionary generator
source-archive: https://github.com/PatrickCronin/regldg/releases/download/v1.0.1/regldg-1.0.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: regldg
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:regldg
  brew: brew install regldg
provenance:
  formula: regldg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
