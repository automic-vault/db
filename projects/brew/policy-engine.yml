id: brew:policy-engine
display-name: policy-engine
homepage: https://github.com/snyk/policy-engine
repo: https://github.com/snyk/policy-engine
docs: https://github.com/snyk/policy-engine
package-manager:
  brew: policy-engine
package-manager-url: https://formulae.brew.sh/formula/policy-engine
version: 1.1.4
license: Apache-2.0
category: development
tags:
  - cli
description: Unified Policy Engine
source-archive: https://github.com/snyk/policy-engine/archive/refs/tags/v1.1.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: policy-engine
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:policy-engine
  brew: brew install policy-engine
provenance:
  formula: policy-engine
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
