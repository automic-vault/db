id: brew:tfmigrate
display-name: tfmigrate
homepage: https://github.com/minamijoyo/tfmigrate
repo: https://github.com/minamijoyo/tfmigrate
docs: https://github.com/minamijoyo/tfmigrate
package-manager:
  brew: tfmigrate
  macports: tfmigrate
  nix: tfmigrate
package-manager-url: https://formulae.brew.sh/formula/tfmigrate
version: 0.4.5
license: MIT
category: cloud
tags:
  - cli
description: Terraform/OpenTofu state migration tool for GitOps
source-archive: https://github.com/minamijoyo/tfmigrate/archive/refs/tags/v0.4.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tfmigrate
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tfmigrate
  brew: brew install tfmigrate
  macports: sudo port install tfmigrate
  nix: nix profile install nixpkgs#tfmigrate
provenance:
  formula: tfmigrate
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
