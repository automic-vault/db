id: brew:etl
display-name: etl
homepage: https://synfig.org
repo: https://github.com/synfig/synfig
docs: https://synfig.org
package-manager:
  brew: etl
  pacman: etl
package-manager-url: https://formulae.brew.sh/formula/etl
version: 1.5.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Extensible Template Library
source-archive: https://github.com/synfig/synfig/releases/download/v1.5.5/ETL-1.5.5.tar.gz
dependencies:
  - glibmm@2.66
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ETL-config
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:etl
  brew: brew install etl
  pacman: sudo pacman -S etl
provenance:
  formula: etl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
