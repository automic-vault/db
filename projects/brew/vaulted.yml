id: brew:vaulted
display-name: vaulted
homepage: https://github.com/miquella/vaulted
repo: https://github.com/miquella/vaulted
docs: https://github.com/miquella/vaulted
package-manager:
  brew: vaulted
package-manager-url: https://formulae.brew.sh/formula/vaulted
version: 3.0.0
license: MIT
category: security
tags:
  - cli
description: Allows the secure storage and execution of environments
source-archive: https://github.com/miquella/vaulted/archive/refs/tags/v3.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: vaulted
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vaulted
  brew: brew install vaulted
provenance:
  formula: vaulted
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
