id: brew:stk
display-name: stk
homepage: https://ccrma.stanford.edu/software/stk/
repo: https://ccrma.stanford.edu/software/stk/release/stk-5.0.1.tar.gz
docs: https://ccrma.stanford.edu/software/stk/
package-manager:
  brew: stk
  debian: stk
  dnf: stk
  macports: stk
  pacman: stk
  ubuntu: stk
package-manager-url: https://formulae.brew.sh/formula/stk
version: 5.0.1
license: MIT
category: network
tags:
  - cli
description: Sound Synthesis Toolkit
source-archive: https://ccrma.stanford.edu/software/stk/release/stk-5.0.1.tar.gz
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: treesed
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The header files have been put in a standard search path, it is possible to use an
    include statement in programs as follows: #include "stk/FileLoop.h" #include
    "stk/FileWvOut.h" src/ projects/ and rawwaves/ have all been copied to
    $HOMEBREW_PREFIX/opt/stk/share/stk
  post-install-defined: false
install-lines:
  av: sudo av install brew:stk
  brew: brew install stk
  debian: sudo apt install stk
  dnf: sudo dnf install stk
  macports: sudo port install stk
  pacman: sudo pacman -S stk
  ubuntu: sudo apt install stk
provenance:
  formula: stk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
