id: brew:serie
display-name: serie
homepage: https://github.com/lusingander/serie
repo: https://github.com/lusingander/serie
docs: https://github.com/lusingander/serie
package-manager:
  apk: serie
  brew: serie
  nix: serie
  pacman: serie
package-manager-url: https://formulae.brew.sh/formula/serie
version: 0.8.0
license: MIT
category: development
tags:
  - cli
  - git
description: Rich git commit graph in your terminal
source-archive: https://github.com/lusingander/serie/archive/refs/tags/v0.8.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: serie
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add serie
  av: sudo av install brew:serie
  brew: brew install serie
  nix: nix profile install nixpkgs#serie
  pacman: sudo pacman -S serie
provenance:
  formula: serie
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
