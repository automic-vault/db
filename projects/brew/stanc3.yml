id: brew:stanc3
display-name: stanc3
homepage: https://github.com/stan-dev/stanc3
repo: https://github.com/stan-dev/stanc3
docs: https://github.com/stan-dev/stanc3
package-manager:
  brew: stanc3
  macports: stanc3
  nix: stanc
package-manager-url: https://formulae.brew.sh/formula/stanc3
version: 2.39.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Stan transpiler
source-archive: https://github.com/stan-dev/stanc3.git
build-dependencies:
  - ocaml
  - opam
executables:
  - exposure: global executable
    kind: cli
    name: stanc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stanc3
  brew: brew install stanc3
  macports: sudo port install stanc3
  nix: nix profile install nixpkgs#stanc
provenance:
  formula: stanc3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
