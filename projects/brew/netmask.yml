id: brew:netmask
display-name: netmask
homepage: https://github.com/tlby/netmask
repo: https://github.com/tlby/netmask
docs: https://github.com/tlby/netmask
package-manager:
  brew: netmask
  debian: netmask
  dnf: netmask
  nix: netmask
  ubuntu: netmask
package-manager-url: https://formulae.brew.sh/formula/netmask
version: 2.5.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: IP address netmask generation utility
source-archive: https://github.com/tlby/netmask/archive/refs/tags/v2.5.0.tar.gz
dependencies:
  - check
build-dependencies:
  - autoconf
  - autoconf-archive
  - automake
  - pkgconf
  - texinfo
executables:
  - exposure: global executable
    kind: cli
    name: netmask
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:netmask
  brew: brew install netmask
  debian: sudo apt install netmask
  dnf: sudo dnf install netmask
  nix: nix profile install nixpkgs#netmask
  ubuntu: sudo apt install netmask
provenance:
  formula: netmask
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
