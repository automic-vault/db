id: brew:with-readline
display-name: with-readline
homepage: https://www.greenend.org.uk/rjk/sw/withreadline.html
repo: https://www.greenend.org.uk/rjk/sw/with-readline-0.1.1.tar.gz
docs: https://www.greenend.org.uk/rjk/sw/withreadline.html
package-manager:
  brew: with-readline
package-manager-url: https://formulae.brew.sh/formula/with-readline
version: 0.1.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Allow GNU Readline to be used with arbitrary programs
source-archive: https://www.greenend.org.uk/rjk/sw/with-readline-0.1.1.tar.gz
dependencies:
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: with-readline
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:with-readline
  brew: brew install with-readline
provenance:
  formula: with-readline
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
