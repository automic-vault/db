id: brew:safe-rm
display-name: safe-rm
homepage: https://launchpad.net/safe-rm
repo: https://launchpad.net/safe-rm/trunk/1.1.0/+download/safe-rm-1.1.0.tar.gz
docs: https://launchpad.net/safe-rm
package-manager:
  brew: safe-rm
  debian: safe-rm
  nix: safe-rm
  ubuntu: safe-rm
package-manager-url: https://formulae.brew.sh/formula/safe-rm
version: 1.1.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Wraps rm to prevent dangerous deletion of files
source-archive: https://launchpad.net/safe-rm/trunk/1.1.0/+download/safe-rm-1.1.0.tar.gz
build-dependencies:
  - rust
executables:
