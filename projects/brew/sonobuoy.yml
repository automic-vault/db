id: brew:sonobuoy
display-name: sonobuoy
homepage: https://sonobuoy.io/
repo: https://github.com/vmware-tanzu/sonobuoy
docs: https://sonobuoy.io/
package-manager:
  brew: sonobuoy
  nix: sonobuoy
  zypper: sonobuoy
package-manager-url: https://formulae.brew.sh/formula/sonobuoy
version: 0.57.4
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes component that generates reports on cluster conformance
source-archive: https://github.com/vmware-tanzu/sonobuoy/archive/refs/tags/v0.57.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sonobuoy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sonobuoy
  brew: brew install sonobuoy
  nix: nix profile install nixpkgs#sonobuoy
  zypper: sudo zypper install sonobuoy
provenance:
  formula: sonobuoy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
