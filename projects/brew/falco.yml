id: brew:falco
display-name: falco
homepage: https://github.com/ysugimoto/falco
repo: https://github.com/ysugimoto/falco
docs: https://github.com/ysugimoto/falco
package-manager:
  brew: falco
package-manager-url: https://formulae.brew.sh/formula/falco
version: 2.3.0
license: MIT
category: development
tags:
  - cli
description: VCL parser and linter optimized for Fastly
source-archive: https://github.com/ysugimoto/falco/archive/refs/tags/v2.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: falco
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:falco
  brew: brew install falco
provenance:
  formula: falco
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
