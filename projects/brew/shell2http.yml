id: brew:shell2http
display-name: shell2http
homepage: https://github.com/msoap/shell2http
repo: https://github.com/msoap/shell2http
docs: https://github.com/msoap/shell2http
package-manager:
  brew: shell2http
  nix: shell2http
package-manager-url: https://formulae.brew.sh/formula/shell2http
version: 1.17.0
license: MIT
category: development
tags:
  - cli
description: Executing shell commands via HTTP server
source-archive: https://github.com/msoap/shell2http/archive/refs/tags/v1.17.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: shell2http
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:shell2http
  brew: brew install shell2http
  nix: nix profile install nixpkgs#shell2http
provenance:
  formula: shell2http
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
