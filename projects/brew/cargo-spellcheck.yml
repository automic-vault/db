id: brew:cargo-spellcheck
display-name: cargo-spellcheck
homepage: https://github.com/drahnr/cargo-spellcheck
repo: https://github.com/drahnr/cargo-spellcheck
docs: https://github.com/drahnr/cargo-spellcheck
package-manager:
  brew: cargo-spellcheck
  nix: cargo-spellcheck
  pacman: cargo-spellcheck
package-manager-url: https://formulae.brew.sh/formula/cargo-spellcheck
version: 0.15.7
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Checks rust documentation for spelling and grammar mistakes
source-archive: https://github.com/drahnr/cargo-spellcheck/archive/refs/tags/v0.15.7.tar.gz
dependencies:
  - hunspell
build-dependencies:
  - llvm
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-spellcheck
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-spellcheck
  brew: brew install cargo-spellcheck
  nix: nix profile install nixpkgs#cargo-spellcheck
  pacman: sudo pacman -S cargo-spellcheck
provenance:
  formula: cargo-spellcheck
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
