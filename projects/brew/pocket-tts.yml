id: brew:pocket-tts
display-name: pocket-tts
homepage: https://github.com/kyutai-labs/pocket-tts
repo: >
  https://files.pythonhosted.org/packages/f9/2c/7445f57163bb40e2b2fab4df70d18a4216c4965cdf74196344d95859fc07/pocket_tts-2.1.0.tar.gz
docs: https://github.com/kyutai-labs/pocket-tts
package-manager:
  brew: pocket-tts
  nix: pocket-tts
package-manager-url: https://formulae.brew.sh/formula/pocket-tts
version: 2.1.0
license: MIT
category: development
tags:
  - cli
description: Text-to-speech application designed to run efficiently on CPUs
source-archive: >
  https://files.pythonhosted.org/packages/f9/2c/7445f57163bb40e2b2fab4df70d18a4216c4965cdf74196344d95859fc07/pocket_tts-2.1.0.tar.gz
dependencies:
  - certifi
  - libyaml
  - pydantic
  - python@3.14
  - pytorch
  - scipy
build-dependencies:
  - cmake
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: pocket-tts
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pocket-tts
  brew: brew install pocket-tts
  nix: nix profile install nixpkgs#pocket-tts
provenance:
  formula: pocket-tts
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
