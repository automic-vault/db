id: brew:cargo-docset
display-name: cargo-docset
homepage: https://github.com/Robzz/cargo-docset
repo: https://github.com/Robzz/cargo-docset
docs: https://github.com/Robzz/cargo-docset
package-manager:
  brew: cargo-docset
  nix: cargo-docset
package-manager-url: https://formulae.brew.sh/formula/cargo-docset
version: 0.3.1
license: Apache-2.0
category: development
tags:
  - cli
description: Cargo subcommand to generate a Dash/Zeal docset for your Rust packages
source-archive: https://github.com/Robzz/cargo-docset/archive/refs/tags/v0.3.1.tar.gz
build-dependencies:
  - rust
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: cargo-docset
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-docset
  brew: brew install cargo-docset
  nix: nix profile install nixpkgs#cargo-docset
provenance:
  formula: cargo-docset
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
