id: brew:garnet
display-name: garnet
homepage: https://microsoft.github.io/garnet/
repo: https://github.com/microsoft/garnet
docs: https://microsoft.github.io/garnet/
package-manager:
  brew: garnet
  nix: garnet
  scoop: main/garnet
package-manager-url: https://formulae.brew.sh/formula/garnet
version: 1.1.9
license: MIT
category: development
tags:
  - cli
description: High-performance cache-store
source-archive: https://github.com/microsoft/garnet/archive/refs/tags/v1.1.9.tar.gz
dependencies:
  - dotnet
executables:
  - exposure: global executable
    kind: cli
    name: GarnetServer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:garnet
  brew: brew install garnet
  nix: nix profile install nixpkgs#garnet
  scoop: scoop install main/garnet
provenance:
  formula: garnet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
