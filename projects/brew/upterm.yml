id: brew:upterm
display-name: upterm
homepage: https://github.com/owenthereal/upterm
repo: https://github.com/owenthereal/upterm
docs: https://github.com/owenthereal/upterm
package-manager:
  apk: upterm
  brew: upterm
  nix: upterm
  pacman: upterm
package-manager-url: https://formulae.brew.sh/formula/upterm
version: 0.24.0
license: Apache-2.0
category: development
tags:
  - cli
description: Instant terminal sharing
source-archive: https://github.com/owenthereal/upterm/archive/refs/tags/v0.24.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: upterm
  - exposure: global executable
    kind: cli
    name: uptermd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add upterm
  av: sudo av install brew:upterm
  brew: brew install upterm
  nix: nix profile install nixpkgs#upterm
  pacman: sudo pacman -S upterm
provenance:
  formula: upterm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
