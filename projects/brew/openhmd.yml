id: brew:openhmd
display-name: openhmd
homepage: http://openhmd.net
repo: https://github.com/OpenHMD/OpenHMD
docs: http://openhmd.net
package-manager:
  apk: openhmd
  brew: openhmd
  dnf: openhmd
package-manager-url: https://formulae.brew.sh/formula/openhmd
version: 0.3.0
license: BSL-1.0
category: development
tags:
  - cli
description: Free and open source API and drivers for immersive technology
source-archive: https://github.com/OpenHMD/OpenHMD/archive/refs/tags/0.3.0.tar.gz
dependencies:
  - hidapi
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: simple
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add openhmd
  av: sudo av install brew:openhmd
  brew: brew install openhmd
  dnf: sudo dnf install openhmd
provenance:
  formula: openhmd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
