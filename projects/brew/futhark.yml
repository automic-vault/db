id: brew:futhark
display-name: futhark
homepage: https://futhark-lang.org/
repo: https://github.com/diku-dk/futhark
docs: https://futhark-lang.org/
package-manager:
  apk: futhark
  brew: futhark
  debian: futhark
  nix: futhark
package-manager-url: https://formulae.brew.sh/formula/futhark
version: 0.26.2
license: ISC
category: development
tags:
  - cli
description: Data-parallel functional programming language
source-archive: https://github.com/diku-dk/futhark/archive/refs/tags/v0.26.2.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
  - sphinx-doc
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: futhark
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add futhark
  av: sudo av install brew:futhark
  brew: brew install futhark
  debian: sudo apt install futhark
  nix: nix profile install nixpkgs#futhark
provenance:
  formula: futhark
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
