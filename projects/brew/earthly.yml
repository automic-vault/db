id: brew:earthly
display-name: earthly
homepage: https://earthly.dev/
repo: https://github.com/earthly/earthly
docs: https://earthly.dev/
package-manager:
  brew: earthly
  nix: earthly
  scoop: main/earthly
package-manager-url: https://formulae.brew.sh/formula/earthly
version: 0.8.16
license: MPL-2.0
category: development
tags:
  - cli
description: Build automation tool for the container era
source-archive: https://github.com/earthly/earthly.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: earthly
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:earthly
  brew: brew install earthly
  nix: nix profile install nixpkgs#earthly
  scoop: scoop install main/earthly
provenance:
  formula: earthly
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
