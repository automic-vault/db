  dnf: sudo dnf install tinycdb
  macports: sudo port install tinycdb
  nix: nix profile install nixpkgs#tinycdb
  pacman: sudo pacman -S tinycdb
  ubuntu: sudo apt install tinycdb
provenance:
  formula: tinycdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
