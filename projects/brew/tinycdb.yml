package-manager-url: https://formulae.brew.sh/formula/tinycdb
version: 0.81
license: LicenseRef-Homebrew-public-domain
category: database
tags:
  - cli
description: Create and read constant databases
source-archive: https://www.corpit.ru/mjt/tinycdb/tinycdb-0.81.tar.gz
executables:
