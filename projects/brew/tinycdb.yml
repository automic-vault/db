id: brew:tinycdb
display-name: tinycdb
homepage: https://www.corpit.ru/mjt/tinycdb.html
repo: https://www.corpit.ru/mjt/tinycdb/tinycdb-0.81.tar.gz
docs: https://www.corpit.ru/mjt/tinycdb.html
package-manager:
  brew: tinycdb
  debian: tinycdb
  dnf: tinycdb
