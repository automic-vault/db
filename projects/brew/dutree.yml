id: brew:dutree
display-name: dutree
homepage: https://github.com/nachoparker/dutree
repo: https://github.com/nachoparker/dutree
docs: https://github.com/nachoparker/dutree
package-manager:
  brew: dutree
  dnf: dutree
  nix: dutree
package-manager-url: https://formulae.brew.sh/formula/dutree
version: 0.2.18
license: GPL-3.0-only
category: development
tags:
  - cli
description: Tool to analyze file system usage written in Rust
source-archive: https://github.com/nachoparker/dutree/archive/refs/tags/v0.2.18.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dutree
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dutree
  brew: brew install dutree
  dnf: sudo dnf install dutree
  nix: nix profile install nixpkgs#dutree
provenance:
  formula: dutree
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
