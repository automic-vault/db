id: brew:nfcutils
display-name: nfcutils
homepage: https://github.com/nfc-tools/nfcutils
repo: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/nfc-tools/nfcutils-0.3.2.tar.gz
docs: https://github.com/nfc-tools/nfcutils
package-manager:
  brew: nfcutils
  zypper: nfcutils
package-manager-url: https://formulae.brew.sh/formula/nfcutils
version: 0.3.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Near Field Communication (NFC) tools under POSIX systems
source-archive: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/nfc-tools/nfcutils-0.3.2.tar.gz
dependencies:
  - libnfc
  - libusb
  - libusb-compat
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: lsnfc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nfcutils
  brew: brew install nfcutils
  zypper: sudo zypper install nfcutils
provenance:
  formula: nfcutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
