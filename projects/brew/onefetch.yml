id: brew:onefetch
display-name: onefetch
homepage: https://onefetch.dev/
repo: https://github.com/o2sh/onefetch
docs: https://onefetch.dev/
package-manager:
  apk: onefetch
  brew: onefetch
  dnf: onefetch
  macports: onefetch
  nix: onefetch
  pacman: onefetch
  scoop: extras/onefetch
  winget: o2sh.onefetch
  zypper: onefetch
package-manager-url: https://formulae.brew.sh/formula/onefetch
version: 2.27.1
license: MIT
category: development
tags:
  - cli
  - git
description: Command-line Git information tool
source-archive: https://github.com/o2sh/onefetch/archive/refs/tags/2.27.1.tar.gz
dependencies:
  - zstd
build-dependencies:
  - cmake
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: onefetch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add onefetch
  av: sudo av install brew:onefetch
  brew: brew install onefetch
  dnf: sudo dnf install onefetch
  macports: sudo port install onefetch
  nix: nix profile install nixpkgs#onefetch
  pacman: sudo pacman -S onefetch
  scoop: scoop install extras/onefetch
  winget: winget install --id o2sh.onefetch -e
  zypper: sudo zypper install onefetch
provenance:
  formula: onefetch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
