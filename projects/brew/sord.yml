id: brew:sord
display-name: sord
homepage: https://drobilla.net/software/sord.html
repo: https://download.drobilla.net/sord-0.16.22.tar.xz
docs: https://drobilla.net/software/sord.html
package-manager:
  apk: sord
  brew: sord
  debian: sordi
  dnf: sord
  macports: sord
  nix: sord
  pacman: sord
  ubuntu: sordi
  zypper: sord
package-manager-url: https://formulae.brew.sh/formula/sord
version: 0.16.22
license: ISC
category: network
tags:
  - cli
description: C library for storing RDF data in memory
source-archive: https://download.drobilla.net/sord-0.16.22.tar.xz
dependencies:
  - pcre2
  - serd
  - zix
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: sord_validate
  - exposure: global executable
    kind: cli
    name: sordi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sord
  av: sudo av install brew:sord
  brew: brew install sord
  debian: sudo apt install sordi
  dnf: sudo dnf install sord
  macports: sudo port install sord
  nix: nix profile install nixpkgs#sord
  pacman: sudo pacman -S sord
  ubuntu: sudo apt install sordi
  zypper: sudo zypper install sord
provenance:
  formula: sord
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
