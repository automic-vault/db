bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add busctl
  av: sudo av install brew:systemd
  brew: brew install systemd
  debian: sudo apt install systemd
  dnf: sudo dnf install systemd
  nix: nix profile install nixpkgs#systemd
  pacman: sudo pacman -S systemd
  ubuntu: sudo apt install systemd
  zypper: sudo zypper install systemd
provenance:
  formula: systemd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
