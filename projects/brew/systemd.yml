id: brew:systemd
display-name: systemd
homepage: https://systemd.io
repo: https://github.com/systemd/systemd
docs: https://systemd.io
package-manager:
  apk: busctl
  brew: systemd
  debian: systemd
  dnf: systemd
  nix: systemd
  pacman: systemd
  ubuntu: systemd
  zypper: systemd
package-manager-url: https://formulae.brew.sh/formula/systemd
version: 260.2
license: >
  LGPL-2.1-or-later AND GPL-2.0-or-later AND CC0-1.0 AND LGPL-2.0-or-later AND MIT AND
  MIT-0 AND LicenseRef-Homebrew-public-domain AND (LGPL-2.0-or-later WITH
  Linux-syscall-note) AND (GPL-1.0-or-later WITH Linux-syscall-note) AND
  (GPL-2.0-or-later WITH Linux-syscall-note) AND (GPL-2.0-only WITH Linux-syscall-note)
  AND (BSD-3-Clause OR (GPL-2.0-only WITH Linux-syscall-note)) AND (MIT OR (GPL-2.0-only
  WITH Linux-syscall-note)) AND (MIT OR (GPL-2.0-or-later WITH Linux-syscall-note)) AND
  (GPL-2.0-only OR BSD-2-Clause)
category: development
tags:
  - cli
description: System and service manager
source-archive: https://github.com/systemd/systemd/archive/refs/tags/v260.2.tar.gz
dependencies:
