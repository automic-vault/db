id: brew:azqr
display-name: azqr
homepage: https://azure.github.io/azqr/
repo: https://github.com/Azure/azqr
docs: https://azure.github.io/azqr/
package-manager:
  brew: azqr
  winget: Microsoft.Azure.QuickReview
package-manager-url: https://formulae.brew.sh/formula/azqr
version: 3.1.2
license: MIT
category: cloud
tags:
  - cli
description: Azure Quick Review
source-archive: https://github.com/Azure/azqr.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: azqr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:azqr
  brew: brew install azqr
  winget: winget install --id Microsoft.Azure.QuickReview -e
provenance:
  formula: azqr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
