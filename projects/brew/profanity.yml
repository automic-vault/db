id: brew:profanity
display-name: profanity
homepage: https://profanity-im.github.io
repo: https://profanity-im.github.io/tarballs/profanity-0.18.1.tar.xz
docs: https://profanity-im.github.io
package-manager:
  apk: profanity
  brew: profanity
  debian: profanity
  dnf: profanity
  macports: profanity
  nix: profanity
  pacman: profanity
  ubuntu: profanity
  zypper: profanity
package-manager-url: https://formulae.brew.sh/formula/profanity
version: 0.18.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Console based XMPP client
source-archive: https://profanity-im.github.io/tarballs/profanity-0.18.1.tar.xz
dependencies:
  - gdk-pixbuf
  - glib
  - gpgme
  - gtk+3
  - libgcrypt
  - libomemo-c
  - libotr
  - libstrophe
  - libx11
  - libxscrnsaver
  - python@3.14
  - qrencode
  - readline
  - sqlite
  - terminal-notifier
build-dependencies:
  - meson
  - ninja
  - pkgconf
uses-from-macos:
  - curl
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: profanity
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add profanity
  av: sudo av install brew:profanity
  brew: brew install profanity
  debian: sudo apt install profanity
  dnf: sudo dnf install profanity
  macports: sudo port install profanity
  nix: nix profile install nixpkgs#profanity
  pacman: sudo pacman -S profanity
  ubuntu: sudo apt install profanity
  zypper: sudo zypper install profanity
provenance:
  formula: profanity
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
