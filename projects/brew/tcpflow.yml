id: brew:tcpflow
display-name: tcpflow
homepage: https://github.com/simsong/tcpflow
repo: https://corp.digitalcorpora.org/downloads/tcpflow/tcpflow-1.6.1.tar.gz
docs: https://github.com/simsong/tcpflow
package-manager:
  apk: tcpflow
  brew: tcpflow
  debian: tcpflow
  dnf: tcpflow
  macports: tcpflow
  nix: tcpflow
  pacman: tcpflow
  ubuntu: tcpflow
  zypper: tcpflow
package-manager-url: https://formulae.brew.sh/formula/tcpflow
version: 1.6.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: TCP/IP packet demultiplexer
source-archive: https://corp.digitalcorpora.org/downloads/tcpflow/tcpflow-1.6.1.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - boost
uses-from-macos:
  - bzip2
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: tcpflow
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tcpflow
  av: sudo av install brew:tcpflow
  brew: brew install tcpflow
  debian: sudo apt install tcpflow
  dnf: sudo dnf install tcpflow
  macports: sudo port install tcpflow
  nix: nix profile install nixpkgs#tcpflow
  pacman: sudo pacman -S tcpflow
  ubuntu: sudo apt install tcpflow
  zypper: sudo zypper install tcpflow
provenance:
  formula: tcpflow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
