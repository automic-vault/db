id: brew:fracturedjson
display-name: fracturedjson
homepage: https://github.com/j-brooke/FracturedJson
repo: https://github.com/j-brooke/FracturedJson
docs: https://github.com/j-brooke/FracturedJson
package-manager:
  brew: fracturedjson
package-manager-url: https://formulae.brew.sh/formula/fracturedjson
version: 1.0.1
license: MIT
category: development
tags:
  - cli
  - json
description: JSON formatter that produces highly readable but fairly compact output
source-archive: https://github.com/j-brooke/FracturedJson/archive/refs/tags/cli-v1.0.1.tar.gz
build-dependencies:
  - dotnet
executables:
  - exposure: global executable
    kind: cli
    name: fracjson
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fracturedjson
  brew: brew install fracturedjson
provenance:
  formula: fracturedjson
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
