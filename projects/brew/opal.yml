id: brew:opal
display-name: opal
homepage: https://opalrb.com/
repo: https://github.com/opal/opal
docs: https://opalrb.com/
package-manager:
  brew: opal
package-manager-url: https://formulae.brew.sh/formula/opal
version: 1.8.3
license: MIT
category: development
tags:
  - cli
description: Ruby to JavaScript transpiler
source-archive: https://github.com/opal/opal.git
uses-from-macos:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: opal
  - exposure: global executable
    kind: cli
    name: opal-build
  - exposure: global executable
    kind: cli
    name: opal-repl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:opal
  brew: brew install opal
provenance:
  formula: opal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
