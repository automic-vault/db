id: brew:runc
display-name: runc
homepage: https://github.com/opencontainers/runc
repo: https://github.com/opencontainers/runc
docs: https://github.com/opencontainers/runc
package-manager:
  apk: runc
  brew: runc
  debian: runc
  dnf: runc
  nix: runc
  pacman: runc
  ubuntu: runc
  zypper: runc
package-manager-url: https://formulae.brew.sh/formula/runc
version: 1.4.2
license: Apache-2.0
category: development
tags:
  - cli
description: CLI tool for spawning and running containers according to the OCI specification
source-archive: https://github.com/opencontainers/runc/releases/download/v1.4.2/runc.tar.xz
dependencies:
  - libseccomp
build-dependencies:
  - go
  - go-md2man
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: runc
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add runc
  av: sudo av install brew:runc
  brew: brew install runc
  debian: sudo apt install runc
  dnf: sudo dnf install runc
  nix: nix profile install nixpkgs#runc
  pacman: sudo pacman -S runc
  ubuntu: sudo apt install runc
  zypper: sudo zypper install runc
provenance:
  formula: runc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
