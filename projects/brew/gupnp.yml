id: brew:gupnp
display-name: gupnp
homepage: https://gitlab.gnome.org/GNOME/gupnp
repo: https://download.gnome.org/sources/gupnp/1.6/gupnp-1.6.10.tar.xz
docs: https://gitlab.gnome.org/GNOME/gupnp
package-manager:
  apk: gupnp
  brew: gupnp
  dnf: gupnp
  macports: gupnp
  nix: gupnp
  pacman: gupnp
package-manager-url: https://formulae.brew.sh/formula/gupnp
version: 1.6.10
license: LGPL-2.0-or-later
category: development
tags:
  - cli
description: Framework for creating UPnP devices and control points
source-archive: https://download.gnome.org/sources/gupnp/1.6/gupnp-1.6.10.tar.xz
dependencies:
  - glib
  - gssdp
  - libsoup
  - libxml2
  - python@3.14
build-dependencies:
  - docbook-xsl
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: gupnp-binding-tool-1.6
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gupnp
  av: sudo av install brew:gupnp
  brew: brew install gupnp
  dnf: sudo dnf install gupnp
  macports: sudo port install gupnp
  nix: nix profile install nixpkgs#gupnp
  pacman: sudo pacman -S gupnp
provenance:
  formula: gupnp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
