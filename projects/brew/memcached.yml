id: brew:memcached
display-name: memcached
homepage: https://memcached.org/
repo: https://www.memcached.org/files/memcached-1.6.42.tar.gz
docs: https://memcached.org/
package-manager:
  apk: memcached
  brew: memcached
  debian: memcached
  dnf: memcached
  macports: memcached
  nix: memcached
  pacman: memcached
  scoop: main/memcached
  ubuntu: memcached
  zypper: memcached
package-manager-url: https://formulae.brew.sh/formula/memcached
version: 1.6.42
license: BSD-3-Clause
category: network
tags:
  - cli
description: High performance, distributed memory object caching system
source-archive: https://www.memcached.org/files/memcached-1.6.42.tar.gz
dependencies:
  - libevent
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: memcached
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add memcached
  av: sudo av install brew:memcached
  brew: brew install memcached
  debian: sudo apt install memcached
  dnf: sudo dnf install memcached
  macports: sudo port install memcached
  nix: nix profile install nixpkgs#memcached
  pacman: sudo pacman -S memcached
  scoop: scoop install main/memcached
  ubuntu: sudo apt install memcached
  zypper: sudo zypper install memcached
provenance:
  formula: memcached
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
