id: brew:btllib
display-name: btllib
homepage: https://github.com/bcgsc/btllib
repo: https://github.com/bcgsc/btllib
docs: https://github.com/bcgsc/btllib
package-manager:
  brew: btllib
package-manager-url: https://formulae.brew.sh/formula/btllib
version: 1.7.8
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Bioinformatics Technology Lab common code library
source-archive: https://github.com/bcgsc/btllib/releases/download/v1.7.8/btllib-1.7.8.tar.gz
dependencies:
  - libomp
build-dependencies:
  - cmake
  - meson
  - ninja
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: indexlr
  - exposure: global executable
    kind: cli
    name: mi_bf_generate
  - exposure: global executable
    kind: cli
    name: randseq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:btllib
  brew: brew install btllib
provenance:
  formula: btllib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
