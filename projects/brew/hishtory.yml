id: brew:hishtory
display-name: hishtory
homepage: https://hishtory.dev
repo: https://github.com/ddworken/hishtory
docs: https://hishtory.dev
package-manager:
  brew: hishtory
  nix: hishtory
package-manager-url: https://formulae.brew.sh/formula/hishtory
version: 0.335
license: MIT
category: development
tags:
  - cli
description: 'Your shell history: synced, queryable, and in context'
source-archive: https://github.com/ddworken/hishtory/archive/refs/tags/v0.335.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hishtory
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hishtory
  brew: brew install hishtory
  nix: nix profile install nixpkgs#hishtory
provenance:
  formula: hishtory
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
