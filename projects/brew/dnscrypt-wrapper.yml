id: brew:dnscrypt-wrapper
display-name: dnscrypt-wrapper
homepage: https://cofyc.github.io/dnscrypt-wrapper/
repo: https://github.com/cofyc/dnscrypt-wrapper
docs: https://cofyc.github.io/dnscrypt-wrapper/
package-manager:
  apk: dnscrypt-wrapper
  brew: dnscrypt-wrapper
  pacman: dnscrypt-wrapper
package-manager-url: https://formulae.brew.sh/formula/dnscrypt-wrapper
version: 0.4.2
license: ISC
category: security
tags:
  - cli
description: Server-side proxy that adds dnscrypt support to name resolvers
source-archive: https://github.com/cofyc/dnscrypt-wrapper/archive/refs/tags/v0.4.2.tar.gz
dependencies:
  - libevent
  - libsodium
build-dependencies:
  - autoconf
executables:
  - exposure: global executable
    kind: cli
    name: dnscrypt-wrapper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dnscrypt-wrapper
  av: sudo av install brew:dnscrypt-wrapper
  brew: brew install dnscrypt-wrapper
  pacman: sudo pacman -S dnscrypt-wrapper
provenance:
  formula: dnscrypt-wrapper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
