id: brew:aws-vault
display-name: aws-vault
homepage: https://github.com/ByteNess/aws-vault
repo: https://github.com/ByteNess/aws-vault
docs: https://github.com/ByteNess/aws-vault
package-manager:
  brew: aws-vault
  chocolatey: aws-vault
  macports: aws-vault
  nix: aws-vault
  pacman: aws-vault
  scoop: main/aws-vault
  winget: 99designs.aws-vault
package-manager-url: https://formulae.brew.sh/formula/aws-vault
version: 7.10.8
license: MIT
category: cloud
tags:
  - aws
  - cli
description: Securely store and access AWS credentials in development environments
source-archive: https://github.com/ByteNess/aws-vault/archive/refs/tags/v7.10.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aws-vault
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aws-vault
  brew: brew install aws-vault
  chocolatey: choco install aws-vault
  macports: sudo port install aws-vault
  nix: nix profile install nixpkgs#aws-vault
  pacman: sudo pacman -S aws-vault
  scoop: scoop install main/aws-vault
  winget: winget install --id 99designs.aws-vault -e
provenance:
  formula: aws-vault
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
