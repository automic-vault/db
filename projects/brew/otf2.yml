id: brew:otf2
display-name: otf2
homepage: https://www.vi-hps.org/projects/score-p/overview/overview.html
repo: https://perftools.pages.jsc.fz-juelich.de/cicd/otf2/tags/otf2-3.1.1/otf2-3.1.1.tar.gz
docs: https://www.vi-hps.org/projects/score-p/overview/overview.html
package-manager:
  brew: otf2
  dnf: otf2
  nix: otf2
package-manager-url: https://formulae.brew.sh/formula/otf2
version: 3.1.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Open Trace Format 2 file handling library
source-archive: https://perftools.pages.jsc.fz-juelich.de/cicd/otf2/tags/otf2-3.1.1/otf2-3.1.1.tar.gz
dependencies:
  - open-mpi
  - python@3.14
build-dependencies:
  - sphinx-doc
executables:
  - exposure: global executable
    kind: cli
    name: otf2-config
  - exposure: global executable
    kind: cli
    name: otf2-estimator
  - exposure: global executable
    kind: cli
    name: otf2-marker
  - exposure: global executable
    kind: cli
    name: otf2-print
  - exposure: global executable
    kind: cli
    name: otf2-snapshots
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:otf2
  brew: brew install otf2
  dnf: sudo dnf install otf2
  nix: nix profile install nixpkgs#otf2
provenance:
  formula: otf2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
