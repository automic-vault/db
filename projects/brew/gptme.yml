id: brew:gptme
display-name: gptme
homepage: https://gptme.org/docs/
repo: >
  https://files.pythonhosted.org/packages/1a/20/57d7b444abc582b5aa09b98aa6821fefa728eb056a1c4371d475d19514dd/gptme-0.31.0.tar.gz
docs: https://gptme.org/docs/
package-manager:
  brew: gptme
package-manager-url: https://formulae.brew.sh/formula/gptme
version: 0.31.0
license: MIT
category: network
tags:
  - cli
description: AI assistant in your terminal
source-archive: >
  https://files.pythonhosted.org/packages/1a/20/57d7b444abc582b5aa09b98aa6821fefa728eb056a1c4371d475d19514dd/gptme-0.31.0.tar.gz
dependencies:
  - certifi
  - cryptography
  - libyaml
  - pillow
  - pydantic
  - python@3.14
  - rpds-py
build-dependencies:
  - rust
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: gptme
  - exposure: global executable
    kind: cli
    name: gptme-dspy
  - exposure: global executable
    kind: cli
    name: gptme-eval
  - exposure: global executable
    kind: cli
    name: gptme-nc
  - exposure: global executable
    kind: cli
    name: gptme-server
  - exposure: global executable
    kind: cli
    name: gptme-util
  - exposure: global executable
    kind: cli
    name: gptme-wut
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gptme
  brew: brew install gptme
provenance:
  formula: gptme
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
