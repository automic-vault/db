id: brew:solana
display-name: solana
homepage: https://www.anza.xyz/
repo: https://github.com/anza-xyz/agave
docs: https://www.anza.xyz/
package-manager:
  brew: solana
package-manager-url: https://formulae.brew.sh/formula/solana
version: 4.0.0
license: Apache-2.0
category: development
tags:
  - cli
description: Web-Scale Blockchain for decentralized apps and marketplaces
source-archive: https://github.com/anza-xyz/agave/archive/refs/tags/v4.0.0.tar.gz
dependencies:
  - openssl@3
  - rocksdb
build-dependencies:
  - llvm
  - pkgconf
  - protobuf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: agave-ledger-tool
  - exposure: global executable
    kind: cli
    name: agave-validator
  - exposure: global executable
    kind: cli
    name: agave-watchtower
  - exposure: global executable
    kind: cli
    name: solana
  - exposure: global executable
    kind: cli
    name: solana-keygen
  - exposure: global executable
    kind: cli
    name: solana-stake-accounts
  - exposure: global executable
    kind: cli
    name: solana-test-validator
  - exposure: global executable
    kind: cli
    name: solana-tokens
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:solana
  brew: brew install solana
provenance:
  formula: solana
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
