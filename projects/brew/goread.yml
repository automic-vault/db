id: brew:goread
display-name: goread
homepage: https://github.com/TypicalAM/goread
repo: https://github.com/TypicalAM/goread
docs: https://github.com/TypicalAM/goread
package-manager:
  brew: goread
  nix: goread
package-manager-url: https://formulae.brew.sh/formula/goread
version: 1.7.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: RSS/Atom feeds in the terminal
source-archive: https://github.com/TypicalAM/goread/archive/refs/tags/v1.7.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goread
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:goread
  brew: brew install goread
  nix: nix profile install nixpkgs#goread
provenance:
  formula: goread
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
