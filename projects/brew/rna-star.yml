id: brew:rna-star
display-name: rna-star
homepage: https://github.com/alexdobin/STAR
repo: https://github.com/alexdobin/STAR
docs: https://github.com/alexdobin/STAR
package-manager:
  brew: rna-star
  debian: rna-star
  dnf: star
  macports: star
  nix: star
  ubuntu: rna-star
  zypper: star
package-manager-url: https://formulae.brew.sh/formula/rna-star
version: 2.7.11b
license: MIT AND BSD-2-Clause
category: development
tags:
  - cli
description: RNA-seq aligner
source-archive: https://github.com/alexdobin/STAR/archive/refs/tags/2.7.11b.tar.gz
dependencies:
  - libomp
executables:
  - exposure: global executable
    kind: cli
    name: STAR
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rna-star
  brew: brew install rna-star
  debian: sudo apt install rna-star
  dnf: sudo dnf install star
  macports: sudo port install star
  nix: nix profile install nixpkgs#star
  ubuntu: sudo apt install rna-star
  zypper: sudo zypper install star
provenance:
  formula: rna-star
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
