id: brew:patchpal
display-name: patchpal
homepage: https://gitlab.com/patchpal-ai/patchpal-gui
repo: https://gitlab.com/patchpal-ai/patchpal-gui/-/archive/v0.7.1/patchpal-gui-v0.7.1.tar.bz2
docs: https://gitlab.com/patchpal-ai/patchpal-gui
package-manager:
  brew: patchpal
package-manager-url: https://formulae.brew.sh/formula/patchpal
version: 0.7.1
license: Apache-2.0
category: development
tags:
  - cli
description: AI Assisted Patch Backporting Tool Frontend
source-archive: https://gitlab.com/patchpal-ai/patchpal-gui/-/archive/v0.7.1/patchpal-gui-v0.7.1.tar.bz2
dependencies:
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - graphene
  - gtk4
  - harfbuzz
  - llvm
  - pango
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: benchmark_apply
  - exposure: global executable
    kind: cli
    name: patchpal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:patchpal
  brew: brew install patchpal
provenance:
  formula: patchpal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
