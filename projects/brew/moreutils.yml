id: brew:moreutils
display-name: moreutils
homepage: https://joeyh.name/code/moreutils/
repo: https://git.joeyh.name/index.cgi/moreutils.git/snapshot/moreutils-0.70.tar.gz
docs: https://joeyh.name/code/moreutils/
package-manager:
  apk: moreutils
  brew: moreutils
  debian: moreutils
  dnf: moreutils
  macports: moreutils
  nix: moreutils
  pacman: moreutils
  ubuntu: moreutils
  winget: xdpxi.sponge
  zypper: moreutils
package-manager-url: https://formulae.brew.sh/formula/moreutils
version: 0.70
license: GPL-2.0-or-later AND (GPL-2.0-only OR Artistic-2.0)
category: development
tags:
  - cli
description: Collection of tools that nobody wrote when UNIX was young
source-archive: https://git.joeyh.name/index.cgi/moreutils.git/snapshot/moreutils-0.70.tar.gz
build-dependencies:
  - docbook-xsl
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: chronic
  - exposure: global executable
    kind: cli
    name: combine
  - exposure: global executable
    kind: cli
    name: errno
  - exposure: global executable
    kind: cli
    name: ifdata
  - exposure: global executable
    kind: cli
    name: ifne
  - exposure: global executable
    kind: cli
    name: isutf8
  - exposure: global executable
    kind: cli
    name: lckdo
  - exposure: global executable
    kind: cli
    name: mispipe
  - exposure: global executable
    kind: cli
    name: pee
  - exposure: global executable
    kind: cli
    name: sponge
  - exposure: global executable
    kind: cli
    name: ts
  - exposure: global executable
    kind: cli
    name: vidir
  - exposure: global executable
    kind: cli
    name: vipe
  - exposure: global executable
    kind: cli
    name: zrun
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add moreutils
  av: sudo av install brew:moreutils
  brew: brew install moreutils
  debian: sudo apt install moreutils
  dnf: sudo dnf install moreutils
  macports: sudo port install moreutils
  nix: nix profile install nixpkgs#moreutils
  pacman: sudo pacman -S moreutils
  ubuntu: sudo apt install moreutils
  winget: winget install --id xdpxi.sponge -e
  zypper: sudo zypper install moreutils
provenance:
  formula: moreutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
