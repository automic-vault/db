id: brew:filen-cli
display-name: filen-cli
homepage: https://github.com/FilenCloudDienste/filen-cli
repo: https://registry.npmjs.org/@filen/cli/-/cli-0.0.34.tgz
docs: https://github.com/FilenCloudDienste/filen-cli
package-manager:
  brew: filen-cli
  nix: filen-cli
  winget: FilenCloud.Filen-cli
package-manager-url: https://formulae.brew.sh/formula/filen-cli
version: 0.0.34
license: AGPL-3.0-or-later
category: cloud
tags:
  - cli
  - cloud
description: Interface with Filen, an end-to-end encrypted cloud storage service
source-archive: https://registry.npmjs.org/@filen/cli/-/cli-0.0.34.tgz
dependencies:
  - node
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: filen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:filen-cli
  brew: brew install filen-cli
  nix: nix profile install nixpkgs#filen-cli
  winget: winget install --id FilenCloud.Filen-cli -e
provenance:
  formula: filen-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
