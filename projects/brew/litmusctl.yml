id: brew:litmusctl
display-name: litmusctl
homepage: https://litmuschaos.io
repo: https://github.com/litmuschaos/litmusctl
docs: https://litmuschaos.io
package-manager:
  brew: litmusctl
  nix: litmusctl
package-manager-url: https://formulae.brew.sh/formula/litmusctl
version: 1.26.0
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line interface for interacting with LitmusChaos
source-archive: https://github.com/litmuschaos/litmusctl/archive/refs/tags/1.26.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: litmusctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:litmusctl
  brew: brew install litmusctl
  nix: nix profile install nixpkgs#litmusctl
provenance:
  formula: litmusctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
