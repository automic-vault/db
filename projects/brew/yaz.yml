id: brew:yaz
display-name: yaz
homepage: https://www.indexdata.com/resources/software/yaz/
repo: https://ftp.indexdata.com/pub/yaz/yaz-5.37.3.tar.gz
docs: https://www.indexdata.com/resources/software/yaz/
package-manager:
  brew: yaz
  debian: yaz
  dnf: yaz
  macports: yaz
  pacman: yaz
  ubuntu: yaz
  zypper: yaz
package-manager-url: https://formulae.brew.sh/formula/yaz
version: 5.37.3
license: BSD-3-Clause
category: network
tags:
  - cli
description: Toolkit for Z39.50/SRW/SRU clients/servers
source-archive: https://ftp.indexdata.com/pub/yaz/yaz-5.37.3.tar.gz
dependencies:
  - gnutls
  - icu4c@78
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: yaz-asncomp
  - exposure: global executable
    kind: cli
    name: yaz-client
  - exposure: global executable
    kind: cli
    name: yaz-config
  - exposure: global executable
    kind: cli
    name: yaz-iconv
  - exposure: global executable
    kind: cli
    name: yaz-icu
  - exposure: global executable
    kind: cli
    name: yaz-illclient
  - exposure: global executable
    kind: cli
    name: yaz-json-parse
  - exposure: global executable
    kind: cli
    name: yaz-marcdump
  - exposure: global executable
    kind: cli
    name: yaz-record-conv
  - exposure: global executable
    kind: cli
    name: yaz-url
  - exposure: global executable
    kind: cli
    name: yaz-ztest
  - exposure: global executable
    kind: cli
    name: zoomsh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yaz
  brew: brew install yaz
  debian: sudo apt install yaz
  dnf: sudo dnf install yaz
  macports: sudo port install yaz
  pacman: sudo pacman -S yaz
  ubuntu: sudo apt install yaz
  zypper: sudo zypper install yaz
provenance:
  formula: yaz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
