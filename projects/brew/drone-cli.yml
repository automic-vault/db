id: brew:drone-cli
display-name: drone-cli
homepage: https://drone.io
repo: https://github.com/harness/drone-cli
docs: https://drone.io
package-manager:
  apk: drone-cli
  brew: drone-cli
  nix: drone-cli
  pacman: drone-cli
  scoop: main/drone
package-manager-url: https://formulae.brew.sh/formula/drone-cli
version: 1.9.0
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line client for the Drone continuous integration server
source-archive: https://github.com/harness/drone-cli/archive/refs/tags/v1.9.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: drone
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add drone-cli
  av: sudo av install brew:drone-cli
  brew: brew install drone-cli
  nix: nix profile install nixpkgs#drone-cli
  pacman: sudo pacman -S drone-cli
  scoop: scoop install main/drone
provenance:
  formula: drone-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
