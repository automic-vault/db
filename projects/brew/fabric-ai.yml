id: brew:fabric-ai
display-name: fabric-ai
homepage: https://github.com/danielmiessler/fabric
repo: https://github.com/danielmiessler/fabric
docs: https://github.com/danielmiessler/fabric
package-manager:
  brew: fabric-ai
  nix: fabric-ai
  scoop: main/fabric-ai
package-manager-url: https://formulae.brew.sh/formula/fabric-ai
version: 1.4.452
license: MIT
category: security
tags:
  - cli
description: Open-source framework for augmenting humans using AI
source-archive: https://github.com/danielmiessler/fabric/archive/refs/tags/v1.4.452.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fabric-ai
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fabric-ai
  brew: brew install fabric-ai
  nix: nix profile install nixpkgs#fabric-ai
  scoop: scoop install main/fabric-ai
provenance:
  formula: fabric-ai
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
