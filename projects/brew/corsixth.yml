id: brew:corsixth
display-name: corsixth
homepage: https://github.com/CorsixTH/CorsixTH
repo: https://github.com/CorsixTH/CorsixTH
docs: https://github.com/CorsixTH/CorsixTH
package-manager:
  brew: corsixth
  macports: corsixth
  winget: CorsixTH.CorsixTH
  zypper: CorsixTH
package-manager-url: https://formulae.brew.sh/formula/corsixth
version: 0.69.2
license: MIT
category: development
tags:
  - cli
description: Open source clone of Theme Hospital
source-archive: https://github.com/CorsixTH/CorsixTH/archive/refs/tags/v0.69.2.tar.gz
dependencies:
  - ffmpeg
  - freetype
  - lpeg
  - lua@5.4
  - sdl2
  - sdl2_mixer
build-dependencies:
  - cmake
  - luarocks
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: CorsixTH
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:corsixth
  brew: brew install corsixth
  macports: sudo port install corsixth
  winget: winget install --id CorsixTH.CorsixTH -e
  zypper: sudo zypper install CorsixTH
provenance:
  formula: corsixth
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
