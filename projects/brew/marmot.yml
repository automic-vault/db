id: brew:marmot
display-name: marmot
homepage: https://marmotdata.io
repo: https://github.com/marmotdata/marmot
docs: https://marmotdata.io
package-manager:
  brew: marmot
package-manager-url: https://formulae.brew.sh/formula/marmot
version: 0.9.0
license: MIT
category: development
tags:
  - cli
description: Open-source data catalog exposing metadata to AI agents
source-archive: https://github.com/marmotdata/marmot/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: marmot
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:marmot
  brew: brew install marmot
provenance:
  formula: marmot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
