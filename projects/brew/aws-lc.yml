id: brew:aws-lc
display-name: aws-lc
homepage: https://github.com/aws/aws-lc
repo: https://github.com/aws/aws-lc
docs: https://github.com/aws/aws-lc
package-manager:
  apk: aws-lc
  brew: aws-lc
  nix: aws-lc
  zypper: aws-lc
package-manager-url: https://formulae.brew.sh/formula/aws-lc
version: 1.73.0
license: Apache-2.0 AND ISC AND OpenSSL AND MIT AND BSD-3-Clause
category: cloud
tags:
  - aws
  - cli
description: General-purpose cryptographic library
source-archive: https://github.com/aws/aws-lc/archive/refs/tags/v1.73.0.tar.gz
build-dependencies:
  - cmake
  - go
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: bssl
  - exposure: global executable
    kind: cli
    name: c_rehash
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add aws-lc
  av: sudo av install brew:aws-lc
  brew: brew install aws-lc
  nix: nix profile install nixpkgs#aws-lc
  zypper: sudo zypper install aws-lc
provenance:
  formula: aws-lc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
