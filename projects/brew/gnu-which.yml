id: brew:gnu-which
display-name: gnu-which
homepage: https://savannah.gnu.org/projects/which/
repo: https://ftpmirror.gnu.org/gnu/which/which-2.25.tar.gz
docs: https://savannah.gnu.org/projects/which/
package-manager:
  apk: which
  brew: gnu-which
  chocolatey: which
  debian: gnu-which
  dnf: which
  nix: which
  pacman: which
  scoop: main/which
  ubuntu: gnu-which
  winget: GnuWin32.Which
  zypper: which
package-manager-url: https://formulae.brew.sh/formula/gnu-which
version: 2.25
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU implementation of which utility
source-archive: https://ftpmirror.gnu.org/gnu/which/which-2.25.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: which
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    GNU "which" has been installed as "gwhich". If you need to use it as "which", you
    can add a "gnubin" directory to your PATH from your bashrc like:
    PATH="$HOMEBREW_PREFIX/opt/gnu-which/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add which
  av: sudo av install brew:gnu-which
  brew: brew install gnu-which
  chocolatey: choco install which
  debian: sudo apt install gnu-which
  dnf: sudo dnf install which
  nix: nix profile install nixpkgs#which
  pacman: sudo pacman -S which
  scoop: scoop install main/which
  ubuntu: sudo apt install gnu-which
  winget: winget install --id GnuWin32.Which -e
  zypper: sudo zypper install which
provenance:
  formula: gnu-which
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
