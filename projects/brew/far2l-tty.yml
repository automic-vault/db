id: brew:far2l-tty
display-name: far2l-tty
homepage: https://github.com/elfmz/far2l
repo: https://github.com/elfmz/far2l
docs: https://github.com/elfmz/far2l
package-manager:
  brew: far2l-tty
  debian: far2l
  nix: far2l
  ubuntu: far2l
package-manager-url: https://formulae.brew.sh/formula/far2l-tty
version: 2.8.0
license: GPL-2.0-only
category: development
tags:
  - cli
description: Unix TTY port of FAR Manager v2 (with NetRocks support)
source-archive: https://github.com/elfmz/far2l/archive/refs/tags/v_2.8.0.tar.gz
dependencies:
  - libarchive
  - libnfs
  - libssh
  - neon
  - openssl@3
  - uchardet
build-dependencies:
  - cmake
  - gperf
  - ninja
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: far2l
  - exposure: global executable
    kind: cli
    name: far2ledit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:far2l-tty
  brew: brew install far2l-tty
  debian: sudo apt install far2l
  nix: nix profile install nixpkgs#far2l
  ubuntu: sudo apt install far2l
provenance:
  formula: far2l-tty
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
