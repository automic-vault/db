id: brew:lft
display-name: lft
homepage: https://pwhois.org/lft/
repo: https://pwhois.org/dl/index.who?file=lft-3.98.tar.gz
docs: https://pwhois.org/lft/
package-manager:
  brew: lft
  debian: lft
  macports: lft
  ubuntu: lft
package-manager-url: https://formulae.brew.sh/formula/lft
version: 3.98
license: VOSTROM
category: network
tags:
  - cli
description: Layer Four Traceroute (LFT), an advanced traceroute tool
source-archive: https://pwhois.org/dl/index.who?file=lft-3.98.tar.gz
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: lft
  - exposure: global executable
    kind: cli
    name: whob
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lft
  brew: brew install lft
  debian: sudo apt install lft
  macports: sudo port install lft
  ubuntu: sudo apt install lft
provenance:
  formula: lft
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
