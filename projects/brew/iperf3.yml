id: brew:iperf3
display-name: iperf3
homepage: https://github.com/esnet/iperf
repo: https://downloads.es.net/pub/iperf/iperf-3.21.tar.gz
docs: https://github.com/esnet/iperf
package-manager:
  apk: iperf3
  brew: iperf3
  chocolatey: iperf3
  debian: iperf3
  dnf: iperf3
  macports: iperf3
  nix: iperf3
  pacman: iperf3
  scoop: main/iperf3
  ubuntu: iperf3
  winget: ar51an.iPerf3
package-manager-url: https://formulae.brew.sh/formula/iperf3
version: 3.21
license: BSD-3-Clause
category: development
tags:
  - cli
description: 'Update of iperf: measures TCP, UDP, and SCTP bandwidth'
source-archive: https://downloads.es.net/pub/iperf/iperf-3.21.tar.gz
dependencies:
  - openssl@4
executables:
  - exposure: global executable
    kind: cli
    name: iperf3
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add iperf3
  av: sudo av install brew:iperf3
  brew: brew install iperf3
  chocolatey: choco install iperf3
  debian: sudo apt install iperf3
  dnf: sudo dnf install iperf3
  macports: sudo port install iperf3
  nix: nix profile install nixpkgs#iperf3
  pacman: sudo pacman -S iperf3
  scoop: scoop install main/iperf3
  ubuntu: sudo apt install iperf3
  winget: winget install --id ar51an.iPerf3 -e
provenance:
  formula: iperf3
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
