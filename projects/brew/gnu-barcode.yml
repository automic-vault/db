id: brew:gnu-barcode
display-name: gnu-barcode
homepage: https://www.gnu.org/software/barcode/
repo: https://ftpmirror.gnu.org/gnu/barcode/barcode-0.99.tar.gz
docs: https://www.gnu.org/software/barcode/
package-manager:
  apk: barcode
  brew: gnu-barcode
  debian: barcode
  dnf: barcode
  macports: barcode
  nix: barcode
  pacman: barcode
  ubuntu: barcode
  zypper: barcode
package-manager-url: https://formulae.brew.sh/formula/gnu-barcode
version: 0.99
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Convert text strings to printed bars
source-archive: https://ftpmirror.gnu.org/gnu/barcode/barcode-0.99.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: barcode
  - exposure: global executable
    kind: cli
    name: sample
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add barcode
  av: sudo av install brew:gnu-barcode
  brew: brew install gnu-barcode
  debian: sudo apt install barcode
  dnf: sudo dnf install barcode
  macports: sudo port install barcode
  nix: nix profile install nixpkgs#barcode
  pacman: sudo pacman -S barcode
  ubuntu: sudo apt install barcode
  zypper: sudo zypper install barcode
provenance:
  formula: gnu-barcode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
