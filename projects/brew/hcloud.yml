id: brew:hcloud
display-name: hcloud
homepage: https://github.com/hetznercloud/cli
repo: https://github.com/hetznercloud/cli
docs: https://github.com/hetznercloud/cli
package-manager:
  apk: hcloud
  brew: hcloud
  dnf: hcloud
  macports: hcloud
  nix: hcloud
  pacman: hcloud
  scoop: main/hcloud
  winget: HetznerCloud.CLI
package-manager-url: https://formulae.brew.sh/formula/hcloud
version: 1.65.0
license: MIT
category: cloud
tags:
  - cli
  - cloud
description: Command-line interface for Hetzner Cloud
source-archive: https://github.com/hetznercloud/cli/archive/refs/tags/v1.65.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hcloud
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hcloud
  av: sudo av install brew:hcloud
  brew: brew install hcloud
  dnf: sudo dnf install hcloud
  macports: sudo port install hcloud
  nix: nix profile install nixpkgs#hcloud
  pacman: sudo pacman -S hcloud
  scoop: scoop install main/hcloud
  winget: winget install --id HetznerCloud.CLI -e
provenance:
  formula: hcloud
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
