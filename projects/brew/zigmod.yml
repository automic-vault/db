id: brew:zigmod
display-name: zigmod
homepage: https://nektro.github.io/zigmod/
repo: https://github.com/nektro/zigmod
docs: https://nektro.github.io/zigmod/
package-manager:
  brew: zigmod
package-manager-url: https://formulae.brew.sh/formula/zigmod
version: 99
license: MIT
category: development
tags:
  - cli
description: Package manager for the Zig programming language
source-archive: https://github.com/nektro/zigmod/archive/refs/tags/r99.tar.gz
dependencies:
  - zig@0.14
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: zigmod
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zigmod
  brew: brew install zigmod
provenance:
  formula: zigmod
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
