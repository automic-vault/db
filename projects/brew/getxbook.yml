id: brew:getxbook
display-name: getxbook
homepage: https://njw.name/getxbook/
repo: https://njw.name/getxbook/getxbook-1.2.tar.xz
docs: https://njw.name/getxbook/
package-manager:
  brew: getxbook
  nix: getxbook
package-manager-url: https://formulae.brew.sh/formula/getxbook
version: 1.2
license: ISC
category: network
tags:
  - cli
description: Tools to download ebooks from various sources
source-archive: https://njw.name/getxbook/getxbook-1.2.tar.xz
dependencies:
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: getabook
  - exposure: global executable
    kind: cli
    name: getbnbook
  - exposure: global executable
    kind: cli
    name: getgbook
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:getxbook
  brew: brew install getxbook
  nix: nix profile install nixpkgs#getxbook
provenance:
  formula: getxbook
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
