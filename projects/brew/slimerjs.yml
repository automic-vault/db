id: brew:slimerjs
display-name: slimerjs
homepage: https://slimerjs.org/
repo: https://github.com/laurentj/slimerjs
docs: https://slimerjs.org/
package-manager:
  brew: slimerjs
package-manager-url: https://formulae.brew.sh/formula/slimerjs
version: 1.0.0
license: MPL-2.0
category: development
tags:
  - cli
description: Scriptable browser for Web developers
source-archive: https://github.com/laurentj/slimerjs/archive/refs/tags/1.0.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: slimerjs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The configuration file was installed in:
    $HOMEBREW_CELLAR/slimerjs/1.0.0/libexec/application.ini
  post-install-defined: false
install-lines:
  av: sudo av install brew:slimerjs
  brew: brew install slimerjs
provenance:
  formula: slimerjs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
