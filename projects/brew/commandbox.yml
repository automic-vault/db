id: brew:commandbox
display-name: commandbox
homepage: https://www.ortussolutions.com/products/commandbox
repo: >
  https://downloads.ortussolutions.com/ortussolutions/commandbox/6.3.3/commandbox-bin-6.3.3.zip
docs: https://www.ortussolutions.com/products/commandbox
package-manager:
  brew: commandbox
  scoop: extras/commandbox
  winget: Box.Box
package-manager-url: https://formulae.brew.sh/formula/commandbox
version: 6.3.3
license: Apache-2.0
category: network
tags:
  - cli
description: CFML embedded server, package manager, and app scaffolding tools
source-archive: >
  https://downloads.ortussolutions.com/ortussolutions/commandbox/6.3.3/commandbox-bin-6.3.3.zip
dependencies:
  - openjdk@21
executables:
  - exposure: global executable
    kind: cli
    name: box
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:commandbox
  brew: brew install commandbox
  scoop: scoop install extras/commandbox
  winget: winget install --id Box.Box -e
provenance:
  formula: commandbox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
