id: brew:kubescape
display-name: kubescape
homepage: https://kubescape.io
repo: https://github.com/kubescape/kubescape
docs: https://kubescape.io
package-manager:
  brew: kubescape
  macports: kubescape
  nix: kubescape
  scoop: main/kubescape
  winget: kubescape.kubescape
  zypper: kubescape
package-manager-url: https://formulae.brew.sh/formula/kubescape
version: 4.0.8
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes testing according to Hardening Guidance by NSA and CISA
source-archive: https://github.com/kubescape/kubescape.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubescape
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubescape
  brew: brew install kubescape
  macports: sudo port install kubescape
  nix: nix profile install nixpkgs#kubescape
  scoop: scoop install main/kubescape
  winget: winget install --id kubescape.kubescape -e
  zypper: sudo zypper install kubescape
provenance:
  formula: kubescape
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
