id: brew:morse
display-name: morse
homepage: http://www.catb.org/~esr/morse/
repo: https://gitlab.com/esr/morse-classic/-/archive/2.7/morse-classic-2.7.tar.bz2
docs: http://www.catb.org/~esr/morse/
package-manager:
  brew: morse
  debian: morse
  ubuntu: morse
package-manager-url: https://formulae.brew.sh/formula/morse
version: 2.7
license: BSD-2-Clause
category: development
tags:
  - cli
description: QSO generator and morse code trainer
source-archive: https://gitlab.com/esr/morse-classic/-/archive/2.7/morse-classic-2.7.tar.bz2
dependencies:
  - pulseaudio
build-dependencies:
  - pkgconf
  - xmlto
executables:
  - exposure: global executable
    kind: cli
    name: QSO
  - exposure: global executable
    kind: cli
    name: morse
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:morse
  brew: brew install morse
  debian: sudo apt install morse
  ubuntu: sudo apt install morse
provenance:
  formula: morse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
