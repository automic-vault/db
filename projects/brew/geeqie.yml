id: brew:geeqie
display-name: geeqie
homepage: https://www.geeqie.org/
repo: https://github.com/BestImageViewer/geeqie
docs: https://www.geeqie.org/
package-manager:
  apk: geeqie
  brew: geeqie
  debian: geeqie
  dnf: geeqie
  macports: geeqie
  nix: geeqie
  pacman: geeqie
  ubuntu: geeqie
  zypper: geeqie
package-manager-url: https://formulae.brew.sh/formula/geeqie
version: 2.7
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Lightweight Gtk+ based image viewer
source-archive: https://github.com/BestImageViewer/geeqie/releases/download/v2.7/geeqie-2.7.tar.xz
dependencies:
  - adwaita-icon-theme
  - cairo
  - djvulibre
  - exiv2
  - ffmpegthumbnailer
  - gdk-pixbuf
  - gettext
  - glib
  - gspell
  - gtk+3
  - imagemagick
  - imath
  - jpeg-turbo
  - jpeg-xl
  - libarchive
  - libheif
  - libraw
  - libtiff
  - little-cms2
  - openexr
  - openjpeg
  - pango
  - poppler
  - webp
build-dependencies:
  - gettext
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: geeqie
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add geeqie
  av: sudo av install brew:geeqie
  brew: brew install geeqie
  debian: sudo apt install geeqie
  dnf: sudo dnf install geeqie
  macports: sudo port install geeqie
  nix: nix profile install nixpkgs#geeqie
  pacman: sudo pacman -S geeqie
  ubuntu: sudo apt install geeqie
  zypper: sudo zypper install geeqie
provenance:
  formula: geeqie
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
