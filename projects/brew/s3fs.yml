id: brew:s3fs
display-name: s3fs
homepage: https://github.com/s3fs-fuse/s3fs-fuse/wiki
repo: https://github.com/s3fs-fuse/s3fs-fuse
docs: https://github.com/s3fs-fuse/s3fs-fuse/wiki
package-manager:
  brew: s3fs
  debian: s3fs
  macports: s3fs
  nix: s3fs
  ubuntu: s3fs
  zypper: s3fs
package-manager-url: https://formulae.brew.sh/formula/s3fs
version: 1.97
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: FUSE-based file system backed by Amazon S3
source-archive: https://github.com/s3fs-fuse/s3fs-fuse/archive/refs/tags/v1.97.tar.gz
dependencies:
  - curl
  - libfuse
  - libxml2
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: s3fs
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:s3fs
  brew: brew install s3fs
  debian: sudo apt install s3fs
  macports: sudo port install s3fs
  nix: nix profile install nixpkgs#s3fs
  ubuntu: sudo apt install s3fs
  zypper: sudo zypper install s3fs
provenance:
  formula: s3fs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
