id: brew:watchexec
display-name: watchexec
homepage: https://watchexec.github.io/
repo: https://github.com/watchexec/watchexec
docs: https://watchexec.github.io/
package-manager:
  apk: watchexec
  brew: watchexec
  macports: watchexec
  nix: watchexec
  pacman: watchexec
  scoop: main/watchexec
  zypper: watchexec
package-manager-url: https://formulae.brew.sh/formula/watchexec
version: 2.5.1
license: Apache-2.0
category: development
tags:
  - cli
description: Execute commands when watched files change
source-archive: https://github.com/watchexec/watchexec/archive/refs/tags/v2.5.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: watchexec
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add watchexec
  av: sudo av install brew:watchexec
  brew: brew install watchexec
  macports: sudo port install watchexec
  nix: nix profile install nixpkgs#watchexec
  pacman: sudo pacman -S watchexec
  scoop: scoop install main/watchexec
  zypper: sudo zypper install watchexec
provenance:
  formula: watchexec
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
