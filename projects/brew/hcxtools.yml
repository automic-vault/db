id: brew:hcxtools
display-name: hcxtools
homepage: https://github.com/ZerBea/hcxtools
repo: https://github.com/ZerBea/hcxtools
docs: https://github.com/ZerBea/hcxtools
package-manager:
  brew: hcxtools
  debian: hcxtools
  dnf: hcxtools
  nix: hcxtools
  pacman: hcxtools
  ubuntu: hcxtools
package-manager-url: https://formulae.brew.sh/formula/hcxtools
version: 7.1.2
license: MIT
category: development
tags:
  - cli
description: Utils for conversion of cap/pcap/pcapng WiFi dump files
source-archive: https://github.com/ZerBea/hcxtools/archive/refs/tags/7.1.2.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: hcxeiutool
  - exposure: global executable
    kind: cli
    name: hcxhash2cap
  - exposure: global executable
    kind: cli
    name: hcxhashtool
  - exposure: global executable
    kind: cli
    name: hcxpcapngtool
  - exposure: global executable
    kind: cli
    name: hcxpmktool
  - exposure: global executable
    kind: cli
    name: hcxpottool
  - exposure: global executable
    kind: cli
    name: hcxpsktool
  - exposure: global executable
    kind: cli
    name: hcxwltool
  - exposure: global executable
    kind: cli
    name: whoismac
  - exposure: global executable
    kind: cli
    name: wlancap2wpasec
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hcxtools
  brew: brew install hcxtools
  debian: sudo apt install hcxtools
  dnf: sudo dnf install hcxtools
  nix: nix profile install nixpkgs#hcxtools
  pacman: sudo pacman -S hcxtools
  ubuntu: sudo apt install hcxtools
provenance:
  formula: hcxtools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
