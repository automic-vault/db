id: brew:confd
display-name: confd
homepage: https://github.com/kelseyhightower/confd
repo: https://github.com/kelseyhightower/confd
docs: https://github.com/kelseyhightower/confd
package-manager:
  apk: confd
  brew: confd
  nix: confd
package-manager-url: https://formulae.brew.sh/formula/confd
version: 0.16.0
license: MIT
category: development
tags:
  - cli
description: Manage local application configuration files using templates
source-archive: https://github.com/kelseyhightower/confd/archive/refs/tags/v0.16.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: confd
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add confd
  av: sudo av install brew:confd
  brew: brew install confd
  nix: nix profile install nixpkgs#confd
provenance:
  formula: confd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
