id: brew:lucky-commit
display-name: lucky-commit
homepage: https://github.com/not-an-aardvark/lucky-commit
repo: https://github.com/not-an-aardvark/lucky-commit
docs: https://github.com/not-an-aardvark/lucky-commit
package-manager:
  brew: lucky-commit
  macports: lucky-commit
  nix: lucky-commit
  pacman: lucky-commit
package-manager-url: https://formulae.brew.sh/formula/lucky-commit
version: 2.2.5
license: MIT
category: development
tags:
  - cli
  - git
description: Customize your git commit hashes!
source-archive: https://github.com/not-an-aardvark/lucky-commit/archive/refs/tags/v2.2.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: lucky_commit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lucky-commit
  brew: brew install lucky-commit
  macports: sudo port install lucky-commit
  nix: nix profile install nixpkgs#lucky-commit
  pacman: sudo pacman -S lucky-commit
provenance:
  formula: lucky-commit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
