id: brew:ntopng
display-name: ntopng
homepage: https://www.ntop.org/products/traffic-analysis/ntop/
repo: https://github.com/ntop/ntopng
docs: https://www.ntop.org/products/traffic-analysis/ntop/
package-manager:
  brew: ntopng
  nix: ntopng
  ubuntu: ntopng
package-manager-url: https://formulae.brew.sh/formula/ntopng
version: 6.6
license: GPL-3.0-only
category: development
tags:
  - cli
description: Next generation version of the original ntop
source-archive: https://github.com/ntop/ntopng/archive/refs/tags/6.6.tar.gz
dependencies:
  - hiredis
  - json-c
  - libmaxminddb
  - libsodium
  - mariadb-connector-c
  - ndpi
  - openssl@3
  - rrdtool
  - sqlite
  - zeromq
  - zstd
build-dependencies:
  - autoconf
  - automake
  - cmake
  - libtool
  - pkgconf
uses-from-macos:
  - curl
  - expat
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: ntopng
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ntopng
  brew: brew install ntopng
  nix: nix profile install nixpkgs#ntopng
  ubuntu: sudo apt install ntopng
provenance:
  formula: ntopng
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
