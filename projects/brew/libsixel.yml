id: brew:libsixel
display-name: libsixel
homepage: https://github.com/saitoha/sixel
repo: https://github.com/libsixel/libsixel
docs: https://github.com/saitoha/sixel
package-manager:
  apk: libsixel
  brew: libsixel
  dnf: libsixel
  macports: libsixel
  nix: libsixel
  pacman: libsixel
package-manager-url: https://formulae.brew.sh/formula/libsixel
version: 1.10.5
license: MIT
category: development
tags:
  - cli
description: SIXEL encoder/decoder implementation
source-archive: https://github.com/libsixel/libsixel/archive/refs/tags/v1.10.5.tar.gz
dependencies:
  - jpeg-turbo
  - libpng
build-dependencies:
  - meson
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: img2sixel
  - exposure: global executable
    kind: cli
    name: libsixel-config
  - exposure: global executable
    kind: cli
    name: sixel2png
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libsixel
  av: sudo av install brew:libsixel
  brew: brew install libsixel
  dnf: sudo dnf install libsixel
  macports: sudo port install libsixel
  nix: nix profile install nixpkgs#libsixel
  pacman: sudo pacman -S libsixel
provenance:
  formula: libsixel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
