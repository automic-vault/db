id: brew:icecream
display-name: icecream
homepage: https://en.opensuse.org/Icecream
repo: https://github.com/icecc/icecream
docs: https://en.opensuse.org/Icecream
package-manager:
  brew: icecream
  debian: icecream
  dnf: icecream
  nix: icecream
  ubuntu: icecream
  zypper: icecream
package-manager-url: https://formulae.brew.sh/formula/icecream
version: 1.4
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Distributed compiler with a central scheduler to share build load
source-archive: https://github.com/icecc/icecream/archive/refs/tags/1.4.tar.gz
dependencies:
  - libarchive
  - lzo
  - zstd
build-dependencies:
  - autoconf
  - automake
  - docbook2x
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: icecc
  - exposure: global executable
    kind: cli
    name: icecc-create-env
  - exposure: global executable
    kind: cli
    name: icecc-scheduler
  - exposure: global executable
    kind: cli
    name: icecc-test-env
  - exposure: global executable
    kind: cli
    name: iceccd
  - exposure: global executable
    kind: cli
    name: icerun
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To override the toolset with icecc, add to your path:
    $HOMEBREW_PREFIX/opt/icecream/libexec/icecc/bin
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:icecream
  brew: brew install icecream
  debian: sudo apt install icecream
  dnf: sudo dnf install icecream
  nix: nix profile install nixpkgs#icecream
  ubuntu: sudo apt install icecream
  zypper: sudo zypper install icecream
provenance:
  formula: icecream
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
