id: brew:kube-score
display-name: kube-score
homepage: https://kube-score.com
repo: https://github.com/zegl/kube-score
docs: https://kube-score.com
package-manager:
  brew: kube-score
  nix: kube-score
package-manager-url: https://formulae.brew.sh/formula/kube-score
version: 1.20.0
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
  - security
description: Kubernetes object analysis recommendations for improved reliability and security
source-archive: https://github.com/zegl/kube-score.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kube-score
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kube-score
  brew: brew install kube-score
  nix: nix profile install nixpkgs#kube-score
provenance:
  formula: kube-score
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
