id: brew:nsq
display-name: nsq
homepage: https://nsq.io/
repo: https://github.com/nsqio/nsq
docs: https://nsq.io/
package-manager:
  apk: nsq
  brew: nsq
  nix: nsq
package-manager-url: https://formulae.brew.sh/formula/nsq
version: 1.3.0
license: MIT
category: development
tags:
  - cli
description: Realtime distributed messaging platform
source-archive: https://github.com/nsqio/nsq/archive/refs/tags/v1.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nsq_stat
  - exposure: global executable
    kind: cli
    name: nsq_tail
  - exposure: global executable
    kind: cli
    name: nsq_to_file
  - exposure: global executable
    kind: cli
    name: nsq_to_http
  - exposure: global executable
    kind: cli
    name: nsq_to_nsq
  - exposure: global executable
    kind: cli
    name: nsqadmin
  - exposure: global executable
    kind: cli
    name: nsqd
  - exposure: global executable
    kind: cli
    name: nsqlookupd
  - exposure: global executable
    kind: cli
    name: to_nsq
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add nsq
  av: sudo av install brew:nsq
  brew: brew install nsq
  nix: nix profile install nixpkgs#nsq
provenance:
  formula: nsq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
