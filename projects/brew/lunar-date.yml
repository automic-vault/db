id: brew:lunar-date
display-name: lunar-date
homepage: https://github.com/yetist/lunar-date
repo: https://github.com/yetist/lunar-date
docs: https://github.com/yetist/lunar-date
package-manager:
  brew: lunar-date
  debian: lunar-date
  ubuntu: lunar-date
  zypper: lunar-date
package-manager-url: https://formulae.brew.sh/formula/lunar-date
version: 3.2.0
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Chinese lunar date library
source-archive: https://github.com/yetist/lunar-date/releases/download/v3.2.0/lunar-date-3.2.0.tar.xz
dependencies:
  - gettext
  - glib
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: lunar-date
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lunar-date
  brew: brew install lunar-date
  debian: sudo apt install lunar-date
  ubuntu: sudo apt install lunar-date
  zypper: sudo zypper install lunar-date
provenance:
  formula: lunar-date
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
