id: brew:reflex
display-name: reflex
homepage: https://github.com/cespare/reflex
repo: https://github.com/cespare/reflex
docs: https://github.com/cespare/reflex
package-manager:
  apk: reflex
  brew: reflex
  debian: reflex
  macports: reflex
  nix: reflex
  ubuntu: reflex
package-manager-url: https://formulae.brew.sh/formula/reflex
version: 0.3.2
license: MIT
category: development
tags:
  - cli
description: Run a command when files change
source-archive: https://github.com/cespare/reflex/archive/refs/tags/v0.3.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: reflex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add reflex
  av: sudo av install brew:reflex
  brew: brew install reflex
  debian: sudo apt install reflex
  macports: sudo port install reflex
  nix: nix profile install nixpkgs#reflex
  ubuntu: sudo apt install reflex
provenance:
  formula: reflex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
