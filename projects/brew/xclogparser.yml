id: brew:xclogparser
display-name: xclogparser
homepage: https://github.com/MobileNativeFoundation/XCLogParser
repo: https://github.com/MobileNativeFoundation/XCLogParser
docs: https://github.com/MobileNativeFoundation/XCLogParser
package-manager:
  brew: xclogparser
package-manager-url: https://formulae.brew.sh/formula/xclogparser
version: 0.2.47
license: Apache-2.0
category: development
tags:
  - cli
description: Tool to parse the SLF serialization format used by Xcode
source-archive: https://github.com/MobileNativeFoundation/XCLogParser/archive/refs/tags/v0.2.47.tar.gz
uses-from-macos:
  - swift
executables:
  - exposure: global executable
    kind: cli
    name: xclogparser
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xclogparser
  brew: brew install xclogparser
provenance:
  formula: xclogparser
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
