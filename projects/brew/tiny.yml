id: brew:tiny
display-name: tiny
homepage: https://github.com/osa1/tiny
repo: https://github.com/osa1/tiny
docs: https://github.com/osa1/tiny
package-manager:
  apk: tiny
  brew: tiny
  nix: tiny
  pacman: tiny
  zypper: tiny
package-manager-url: https://formulae.brew.sh/formula/tiny
version: 0.13.0
license: MIT
category: development
tags:
  - cli
description: Terminal IRC client
source-archive: https://github.com/osa1/tiny/archive/refs/tags/v0.13.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tiny
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tiny
  av: sudo av install brew:tiny
  brew: brew install tiny
  nix: nix profile install nixpkgs#tiny
  pacman: sudo pacman -S tiny
  zypper: sudo zypper install tiny
provenance:
  formula: tiny
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
