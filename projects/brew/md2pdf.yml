id: brew:md2pdf
display-name: md2pdf
homepage: https://github.com/solworktech/md2pdf
repo: https://github.com/solworktech/md2pdf
docs: https://github.com/solworktech/md2pdf
package-manager:
  brew: md2pdf
  nix: md2pdf
package-manager-url: https://formulae.brew.sh/formula/md2pdf
version: 2.2.18
license: MIT
category: development
tags:
  - cli
description: CLI utility that generates PDF from Markdown
source-archive: https://github.com/solworktech/md2pdf/archive/refs/tags/v2.2.18.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: md2pdf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:md2pdf
  brew: brew install md2pdf
  nix: nix profile install nixpkgs#md2pdf
provenance:
  formula: md2pdf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
