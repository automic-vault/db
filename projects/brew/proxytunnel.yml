id: brew:proxytunnel
display-name: proxytunnel
homepage: https://github.com/proxytunnel/proxytunnel
repo: https://github.com/proxytunnel/proxytunnel
docs: https://github.com/proxytunnel/proxytunnel
package-manager:
  brew: proxytunnel
  debian: proxytunnel
  dnf: proxytunnel
  macports: proxytunnel
  nix: proxytunnel
  pacman: proxytunnel
  ubuntu: proxytunnel
package-manager-url: https://formulae.brew.sh/formula/proxytunnel
version: 1.12.3
license: GPL-2.0-or-later WITH x11vnc-openssl-exception
category: development
tags:
  - cli
description: Create TCP tunnels through HTTPS proxies
source-archive: https://github.com/proxytunnel/proxytunnel/archive/refs/tags/v1.12.3.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - asciidoc
  - xmlto
executables:
  - exposure: global executable
    kind: cli
    name: proxytunnel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:proxytunnel
  brew: brew install proxytunnel
  debian: sudo apt install proxytunnel
  dnf: sudo dnf install proxytunnel
  macports: sudo port install proxytunnel
  nix: nix profile install nixpkgs#proxytunnel
  pacman: sudo pacman -S proxytunnel
  ubuntu: sudo apt install proxytunnel
provenance:
  formula: proxytunnel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
