id: brew:protoc-gen-go
display-name: protoc-gen-go
homepage: https://github.com/protocolbuffers/protobuf-go
repo: https://github.com/protocolbuffers/protobuf-go
docs: https://github.com/protocolbuffers/protobuf-go
package-manager:
  apk: protoc-gen-go
  brew: protoc-gen-go
  debian: protoc-gen-go
  nix: protoc-gen-go
  ubuntu: protoc-gen-go
  zypper: protoc-gen-go
package-manager-url: https://formulae.brew.sh/formula/protoc-gen-go
version: 1.36.11
license: BSD-3-Clause
category: development
tags:
  - cli
description: Go support for Google's protocol buffers
source-archive: https://github.com/protocolbuffers/protobuf-go/archive/refs/tags/v1.36.11.tar.gz
dependencies:
  - protobuf
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: protoc-gen-go
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add protoc-gen-go
  av: sudo av install brew:protoc-gen-go
  brew: brew install protoc-gen-go
  debian: sudo apt install protoc-gen-go
  nix: nix profile install nixpkgs#protoc-gen-go
  ubuntu: sudo apt install protoc-gen-go
  zypper: sudo zypper install protoc-gen-go
provenance:
  formula: protoc-gen-go
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
