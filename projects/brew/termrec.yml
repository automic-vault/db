id: brew:termrec
display-name: termrec
homepage: https://angband.pl/termrec.html
repo: https://github.com/kilobyte/termrec
docs: https://angband.pl/termrec.html
package-manager:
  apk: termrec
  brew: termrec
  ubuntu: termrec
  zypper: termrec
package-manager-url: https://formulae.brew.sh/formula/termrec
version: 0.19
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Record videos of terminal output
source-archive: https://github.com/kilobyte/termrec/archive/refs/tags/v0.19.tar.gz
dependencies:
  - xz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: termcat
  - exposure: global executable
    kind: cli
    name: termplay
  - exposure: global executable
    kind: cli
    name: termrec
  - exposure: global executable
    kind: cli
    name: termtime
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add termrec
  av: sudo av install brew:termrec
  brew: brew install termrec
  ubuntu: sudo apt install termrec
  zypper: sudo zypper install termrec
provenance:
  formula: termrec
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
