id: brew:hsd
display-name: hsd
homepage: https://handshake.org
repo: https://github.com/handshake-org/hsd
docs: https://handshake.org
package-manager:
  brew: hsd
  nix: hsd
package-manager-url: https://formulae.brew.sh/formula/hsd
version: 8.0.0
license: MIT
category: development
tags:
  - cli
description: Handshake Daemon & Full Node
source-archive: https://github.com/handshake-org/hsd/archive/refs/tags/v8.0.0.tar.gz
dependencies:
  - node
  - unbound
executables:
  - exposure: global executable
    kind: cli
    name: hs-seeder
  - exposure: global executable
    kind: cli
    name: hs-wallet
  - exposure: global executable
    kind: cli
    name: hsd
  - exposure: global executable
    kind: cli
    name: hsd-cli
  - exposure: global executable
    kind: cli
    name: hsd-node
  - exposure: global executable
    kind: cli
    name: hsd-rpc
  - exposure: global executable
    kind: cli
    name: hsd-spvnode
  - exposure: global executable
    kind: cli
    name: hsw-cli
  - exposure: global executable
    kind: cli
    name: hsw-rpc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hsd
  brew: brew install hsd
  nix: nix profile install nixpkgs#hsd
provenance:
  formula: hsd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
