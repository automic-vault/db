id: brew:buildapp
display-name: buildapp
homepage: https://www.xach.com/lisp/buildapp/
repo: https://github.com/xach/buildapp
docs: https://www.xach.com/lisp/buildapp/
package-manager:
  brew: buildapp
  debian: buildapp
  ubuntu: buildapp
package-manager-url: https://formulae.brew.sh/formula/buildapp
version: 1.5.6
license: BSD-2-Clause
category: development
tags:
  - cli
description: Creates executables with SBCL
source-archive: https://github.com/xach/buildapp/archive/refs/tags/release-1.5.6.tar.gz
dependencies:
  - sbcl
  - zstd
executables:
  - exposure: global executable
    kind: cli
    name: buildapp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:buildapp
  brew: brew install buildapp
  debian: sudo apt install buildapp
  ubuntu: sudo apt install buildapp
provenance:
  formula: buildapp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
