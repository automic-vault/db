id: brew:ldapvi
display-name: ldapvi
homepage: http://www.lichteblau.com/ldapvi/
repo: https://github.com/ldapvi/ldapvi
docs: http://www.lichteblau.com/ldapvi/
package-manager:
  apk: ldapvi
  brew: ldapvi
  debian: ldapvi
  dnf: ldapvi
  macports: ldapvi
  nix: ldapvi
  ubuntu: ldapvi
package-manager-url: https://formulae.brew.sh/formula/ldapvi
version: 1.8
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Update LDAP entries with a text editor
source-archive: https://github.com/ldapvi/ldapvi/releases/download/1.8/ldapvi-1.8.tar.gz
dependencies:
  - gettext
  - glib
  - libxcrypt
  - openssl@3
  - popt
  - readline
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
  - openldap
executables:
  - exposure: global executable
    kind: cli
    name: ldapvi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ldapvi
  av: sudo av install brew:ldapvi
  brew: brew install ldapvi
  debian: sudo apt install ldapvi
  dnf: sudo dnf install ldapvi
  macports: sudo port install ldapvi
  nix: nix profile install nixpkgs#ldapvi
  ubuntu: sudo apt install ldapvi
provenance:
  formula: ldapvi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
