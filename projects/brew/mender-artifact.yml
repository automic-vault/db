id: brew:mender-artifact
display-name: mender-artifact
homepage: https://mender.io
repo: https://github.com/mendersoftware/mender-artifact
docs: https://mender.io
package-manager:
  brew: mender-artifact
  debian: mender-artifact
  ubuntu: mender-artifact
package-manager-url: https://formulae.brew.sh/formula/mender-artifact
version: 4.4.0
license: Apache-2.0
category: development
tags:
  - cli
description: CLI tool for managing Mender artifact files
source-archive: https://github.com/mendersoftware/mender-artifact/archive/refs/tags/4.4.0.tar.gz
dependencies:
  - dosfstools
  - e2fsprogs
  - mtools
  - openssl@3
build-dependencies:
  - go
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mender-artifact
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mender-artifact
  brew: brew install mender-artifact
  debian: sudo apt install mender-artifact
  ubuntu: sudo apt install mender-artifact
provenance:
  formula: mender-artifact
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
