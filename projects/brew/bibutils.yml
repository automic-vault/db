bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bibutils
  brew: brew install bibutils
  debian: sudo apt install bibutils
  dnf: sudo dnf install bibutils
  macports: sudo port install bibutils
  nix: nix profile install nixpkgs#bibutils
  pacman: sudo pacman -S bibutils
  ubuntu: sudo apt install bibutils
provenance:
  formula: bibutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
