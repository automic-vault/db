id: brew:clock-rs
display-name: clock-rs
homepage: https://github.com/Oughie/clock-rs
repo: https://github.com/Oughie/clock-rs
docs: https://github.com/Oughie/clock-rs
package-manager:
  brew: clock-rs
  nix: clock-rs
package-manager-url: https://formulae.brew.sh/formula/clock-rs
version: 0.2.1
license: Apache-2.0
category: security
tags:
  - cli
description: Modern, digital clock that effortlessly runs in your terminal
source-archive: https://github.com/Oughie/clock-rs/archive/refs/tags/v0.2.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: clock-rs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clock-rs
  brew: brew install clock-rs
  nix: nix profile install nixpkgs#clock-rs
provenance:
  formula: clock-rs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
