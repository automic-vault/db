id: brew:precice
display-name: precice
homepage: https://precice.org/
repo: https://github.com/precice/precice
docs: https://precice.org/
package-manager:
  brew: precice
  nix: precice
package-manager-url: https://formulae.brew.sh/formula/precice
version: 3.4.1
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Coupling library for partitioned multi-physics simulations
source-archive: https://github.com/precice/precice/archive/refs/tags/v3.4.1.tar.gz
dependencies:
  - boost
  - eigen
  - ginkgo
  - kokkos
  - libomp
  - numpy
  - open-mpi
  - petsc
  - python@3.14
build-dependencies:
  - cmake
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: precice-config-doc
  - exposure: global executable
    kind: cli
    name: precice-config-validate
  - exposure: global executable
    kind: cli
    name: precice-profiling
  - exposure: global executable
    kind: cli
    name: precice-tools
  - exposure: global executable
    kind: cli
    name: precice-version
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:precice
  brew: brew install precice
  nix: nix profile install nixpkgs#precice
provenance:
  formula: precice
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
