id: brew:lsusb
display-name: lsusb
homepage: https://github.com/jlhonora/lsusb
repo: https://github.com/jlhonora/lsusb
docs: https://github.com/jlhonora/lsusb
package-manager:
  brew: lsusb
package-manager-url: https://formulae.brew.sh/formula/lsusb
version: 1.0
license: MIT
category: development
tags:
  - cli
description: List USB devices, just like the Linux lsusb command
source-archive: https://github.com/jlhonora/lsusb/releases/download/1.0/lsusb-1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lsusb
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lsusb
  brew: brew install lsusb
provenance:
  formula: lsusb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
