id: brew:cargo-expand
display-name: cargo-expand
homepage: https://github.com/dtolnay/cargo-expand
repo: https://github.com/dtolnay/cargo-expand
docs: https://github.com/dtolnay/cargo-expand
package-manager:
  apk: cargo-expand
  brew: cargo-expand
  nix: cargo-expand
  pacman: cargo-expand
package-manager-url: https://formulae.brew.sh/formula/cargo-expand
version: 1.0.122
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Show what Rust code looks like with macros expanded
source-archive: https://github.com/dtolnay/cargo-expand/archive/refs/tags/1.0.122.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-expand
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-expand
  av: sudo av install brew:cargo-expand
  brew: brew install cargo-expand
  nix: nix profile install nixpkgs#cargo-expand
  pacman: sudo pacman -S cargo-expand
provenance:
  formula: cargo-expand
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
