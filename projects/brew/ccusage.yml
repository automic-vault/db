id: brew:ccusage
display-name: ccusage
homepage: https://github.com/ryoppippi/ccusage
repo: https://github.com/ryoppippi/ccusage
docs: https://github.com/ryoppippi/ccusage
package-manager:
  brew: ccusage
package-manager-url: https://formulae.brew.sh/formula/ccusage
version: 20.0.5
license: MIT
category: development
tags:
  - cli
description: CLI tool for analyzing Claude Code usage from local JSONL files
source-archive: https://github.com/ryoppippi/ccusage/archive/refs/tags/v20.0.5.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ccusage
  - exposure: global executable
    kind: cli
    name: generate-config-schema
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ccusage
  brew: brew install ccusage
provenance:
  formula: ccusage
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
