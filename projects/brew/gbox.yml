id: brew:gbox
display-name: gbox
homepage: https://gbox.ai
repo: https://github.com/babelcloud/gbox
docs: https://gbox.ai
package-manager:
  brew: gbox
package-manager-url: https://formulae.brew.sh/formula/gbox
version: 0.1.20
license: Apache-2.0
category: cloud
tags:
  - cli
description: Provides environments for AI Agents to operate computer and mobile devices
source-archive: https://github.com/babelcloud/gbox/releases/download/v0.1.20/gbox-v0.1.20.tar.gz
dependencies:
  - frpc
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gbox
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gbox
  brew: brew install gbox
provenance:
  formula: gbox
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
