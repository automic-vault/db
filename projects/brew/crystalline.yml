id: brew:crystalline
display-name: crystalline
homepage: https://github.com/elbywan/crystalline
repo: https://github.com/elbywan/crystalline
docs: https://github.com/elbywan/crystalline
package-manager:
  brew: crystalline
  nix: crystalline
package-manager-url: https://formulae.brew.sh/formula/crystalline
version: 0.17.1
license: MIT
category: development
tags:
  - cli
description: Language Server Protocol implementation for Crystal
source-archive: https://github.com/elbywan/crystalline/archive/refs/tags/v0.17.1.tar.gz
dependencies:
  - bdw-gc
  - crystal
  - libevent
  - libyaml
  - llvm
  - pcre2
executables:
  - exposure: global executable
    kind: cli
    name: crystalline
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:crystalline
  brew: brew install crystalline
  nix: nix profile install nixpkgs#crystalline
provenance:
  formula: crystalline
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
