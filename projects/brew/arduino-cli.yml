id: brew:arduino-cli
display-name: arduino-cli
homepage: https://arduino.github.io/arduino-cli/latest/
repo: https://github.com/arduino/arduino-cli
docs: https://arduino.github.io/arduino-cli/latest/
package-manager:
  apk: arduino-cli
  brew: arduino-cli
  chocolatey: arduino-cli
  macports: arduino-cli
  nix: arduino-cli
  pacman: arduino-cli
  scoop: main/arduino-cli
  winget: ArduinoSA.CLI
package-manager-url: https://formulae.brew.sh/formula/arduino-cli
version: 1.5.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Arduino command-line interface
source-archive: https://github.com/arduino/arduino-cli/archive/refs/tags/v1.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: arduino-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add arduino-cli
  av: sudo av install brew:arduino-cli
  brew: brew install arduino-cli
  chocolatey: choco install arduino-cli
  macports: sudo port install arduino-cli
  nix: nix profile install nixpkgs#arduino-cli
  pacman: sudo pacman -S arduino-cli
  scoop: scoop install main/arduino-cli
  winget: winget install --id ArduinoSA.CLI -e
provenance:
  formula: arduino-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
