id: brew:libfuse
display-name: libfuse
homepage: https://github.com/libfuse/libfuse
repo: https://github.com/libfuse/libfuse
docs: https://github.com/libfuse/libfuse
package-manager:
  brew: libfuse
package-manager-url: https://formulae.brew.sh/formula/libfuse
version: 3.18.2
license: LGPL-2.1-only AND GPL-2.0-only
category: development
tags:
  - cli
description: Reference implementation of the Linux FUSE interface
source-archive: https://github.com/libfuse/libfuse/releases/download/fuse-3.18.2/fuse-3.18.2.tar.gz
build-dependencies:
  - meson
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: fusermount3
  - exposure: global executable
    kind: cli
    name: mount.fuse3
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libfuse
  brew: brew install libfuse
provenance:
  formula: libfuse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
