id: brew:zrepl
display-name: zrepl
homepage: https://zrepl.github.io
repo: https://github.com/zrepl/zrepl
docs: https://zrepl.github.io
package-manager:
  apk: zrepl
  brew: zrepl
  nix: zrepl
package-manager-url: https://formulae.brew.sh/formula/zrepl
version: 0.7.0
license: MIT
category: development
tags:
  - cli
description: One-stop ZFS backup & replication solution
source-archive: https://github.com/zrepl/zrepl/archive/refs/tags/v0.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: zrepl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add zrepl
  av: sudo av install brew:zrepl
  brew: brew install zrepl
  nix: nix profile install nixpkgs#zrepl
provenance:
  formula: zrepl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
