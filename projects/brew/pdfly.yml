id: brew:pdfly
display-name: pdfly
homepage: https://pdfly.readthedocs.io/en/latest/
repo: >
  https://files.pythonhosted.org/packages/48/ae/70f161c80b3f39d8fe4ff784c78045225820d10375c81c2097c0e85ac0fc/pdfly-0.5.1.tar.gz
docs: https://pdfly.readthedocs.io/en/latest/
package-manager:
  brew: pdfly
package-manager-url: https://formulae.brew.sh/formula/pdfly
version: 0.5.1
license: BSD-3-Clause
category: network
tags:
  - cli
description: CLI tool to extract (meta)data from PDF and manipulate PDF files
source-archive: >
  https://files.pythonhosted.org/packages/48/ae/70f161c80b3f39d8fe4ff784c78045225820d10375c81c2097c0e85ac0fc/pdfly-0.5.1.tar.gz
dependencies:
  - certifi
  - cryptography
  - libsodium
  - openssl@3
  - pillow
  - pydantic
  - python@3.14
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: pdfly
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pdfly
  brew: brew install pdfly
provenance:
  formula: pdfly
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
