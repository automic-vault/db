id: brew:putty
display-name: putty
homepage: https://putty.software/
repo: https://the.earth.li/~sgtatham/putty/0.84/putty-0.84.tar.gz
docs: https://putty.software/
package-manager:
  apk: putty
  brew: putty
  chocolatey: putty
  debian: putty
  dnf: putty
  macports: putty
  nix: putty
  pacman: putty
  scoop: extras/putty
  ubuntu: putty
  winget: PuTTY.PuTTY
  zypper: putty
package-manager-url: https://formulae.brew.sh/formula/putty
version: 0.84
license: MIT
category: network
tags:
  - cli
description: Implementation of Telnet and SSH
source-archive: https://the.earth.li/~sgtatham/putty/0.84/putty-0.84.tar.gz
dependencies:
  - cairo
  - gdk-pixbuf
  - glib
  - gtk+3
  - pango
build-dependencies:
  - cmake
  - halibut
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: pageant
  - exposure: global executable
    kind: cli
    name: plink
  - exposure: global executable
    kind: cli
    name: pscp
  - exposure: global executable
    kind: cli
    name: psftp
  - exposure: global executable
    kind: cli
    name: psusan
  - exposure: global executable
    kind: cli
    name: pterm
  - exposure: global executable
    kind: cli
    name: putty
  - exposure: global executable
    kind: cli
    name: puttygen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add putty
  av: sudo av install brew:putty
  brew: brew install putty
  chocolatey: choco install putty
  debian: sudo apt install putty
  dnf: sudo dnf install putty
  macports: sudo port install putty
  nix: nix profile install nixpkgs#putty
  pacman: sudo pacman -S putty
  scoop: scoop install extras/putty
  ubuntu: sudo apt install putty
  winget: winget install --id PuTTY.PuTTY -e
  zypper: sudo zypper install putty
provenance:
  formula: putty
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
