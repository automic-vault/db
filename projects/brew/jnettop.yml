id: brew:jnettop
display-name: jnettop
homepage: https://sourceforge.net/projects/jnettop/
repo: https://downloads.sourceforge.net/project/jnettop/jnettop/0.13/jnettop-0.13.0.tar.gz
docs: https://sourceforge.net/projects/jnettop/
package-manager:
  brew: jnettop
  debian: jnettop
  nix: jnettop
  pacman: jnettop
  ubuntu: jnettop
package-manager-url: https://formulae.brew.sh/formula/jnettop
version: 0.13.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: View hosts/ports taking up the most network traffic
source-archive: https://downloads.sourceforge.net/project/jnettop/jnettop/0.13/jnettop-0.13.0.tar.gz
dependencies:
  - gettext
  - glib
build-dependencies:
  - pkgconf
uses-from-macos:
  - libpcap
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: jnettop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jnettop
  brew: brew install jnettop
  debian: sudo apt install jnettop
  nix: nix profile install nixpkgs#jnettop
  pacman: sudo pacman -S jnettop
  ubuntu: sudo apt install jnettop
provenance:
  formula: jnettop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
