id: brew:lstr
display-name: lstr
homepage: https://github.com/bgreenwell/lstr
repo: https://github.com/bgreenwell/lstr
docs: https://github.com/bgreenwell/lstr
package-manager:
  brew: lstr
  nix: lstr
package-manager-url: https://formulae.brew.sh/formula/lstr
version: 0.2.1
license: MIT
category: development
tags:
  - cli
description: Fast, minimalist directory tree viewer
source-archive: https://github.com/bgreenwell/lstr/archive/refs/tags/v0.2.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: lstr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lstr
  brew: brew install lstr
  nix: nix profile install nixpkgs#lstr
provenance:
  formula: lstr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
