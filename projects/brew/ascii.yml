id: brew:ascii
display-name: ascii
homepage: http://www.catb.org/~esr/ascii/
repo: https://gitlab.com/esr/ascii/-/archive/3.32/ascii-3.32.tar.bz2
docs: http://www.catb.org/~esr/ascii/
package-manager:
  brew: ascii
  debian: ascii
  dnf: ascii
  macports: ascii
  nix: ascii
  pacman: ascii
  ubuntu: ascii
  zypper: ascii
package-manager-url: https://formulae.brew.sh/formula/ascii
version: 3.32
license: BSD-2-Clause
category: development
tags:
  - cli
description: List ASCII idiomatic names and octal/decimal code-point forms
source-archive: https://gitlab.com/esr/ascii/-/archive/3.32/ascii-3.32.tar.bz2
build-dependencies:
  - asciidoctor
executables:
  - exposure: global executable
    kind: cli
    name: ascii
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ascii
  brew: brew install ascii
  debian: sudo apt install ascii
  dnf: sudo dnf install ascii
  macports: sudo port install ascii
  nix: nix profile install nixpkgs#ascii
  pacman: sudo pacman -S ascii
  ubuntu: sudo apt install ascii
  zypper: sudo zypper install ascii
provenance:
  formula: ascii
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
