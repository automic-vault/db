id: brew:omekasy
display-name: omekasy
homepage: https://github.com/ikanago/omekasy
repo: https://github.com/ikanago/omekasy
docs: https://github.com/ikanago/omekasy
package-manager:
  brew: omekasy
  nix: omekasy
package-manager-url: https://formulae.brew.sh/formula/omekasy
version: 1.3.3
license: MIT
category: development
tags:
  - cli
description: Converts alphanumeric input to various Unicode styles
source-archive: https://github.com/ikanago/omekasy/archive/refs/tags/v1.3.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: omekasy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:omekasy
  brew: brew install omekasy
  nix: nix profile install nixpkgs#omekasy
provenance:
  formula: omekasy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
