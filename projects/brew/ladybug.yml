id: brew:ladybug
display-name: ladybug
homepage: https://ladybugdb.com/
repo: https://github.com/LadybugDB/ladybug
docs: https://ladybugdb.com/
package-manager:
  brew: ladybug
package-manager-url: https://formulae.brew.sh/formula/ladybug
version: 0.16.1
license: MIT
category: database
tags:
  - cli
  - database
description: Embedded graph database built for query speed and scalability
source-archive: https://github.com/LadybugDB/ladybug/archive/refs/tags/v0.16.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: lbug
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ladybug
  brew: brew install ladybug
provenance:
  formula: ladybug
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
