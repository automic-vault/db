id: brew:ent
display-name: ent
homepage: https://www.fourmilab.ch/random/
repo: https://github.com/psm14/ent
docs: https://www.fourmilab.ch/random/
package-manager:
  brew: ent
  debian: ent
  macports: ent
  nix: ent
  ubuntu: ent
package-manager-url: https://formulae.brew.sh/formula/ent
version: 1.0
license: LicenseRef-Homebrew-public-domain
category: development
tags:
  - cli
description: Pseudorandom number sequence test program
source-archive: https://github.com/psm14/ent/archive/refs/tags/1.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ent
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ent
  brew: brew install ent
  debian: sudo apt install ent
  macports: sudo port install ent
  nix: nix profile install nixpkgs#ent
  ubuntu: sudo apt install ent
provenance:
  formula: ent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
