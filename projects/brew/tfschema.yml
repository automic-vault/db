id: brew:tfschema
display-name: tfschema
homepage: https://github.com/minamijoyo/tfschema
repo: https://github.com/minamijoyo/tfschema
docs: https://github.com/minamijoyo/tfschema
package-manager:
  brew: tfschema
package-manager-url: https://formulae.brew.sh/formula/tfschema
version: 0.7.10
license: MIT
category: cloud
tags:
  - cli
description: Schema inspector for Terraform/OpenTofu providers
source-archive: https://github.com/minamijoyo/tfschema/archive/refs/tags/v0.7.10.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tfschema
bottle:
