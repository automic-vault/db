id: brew:vipsdisp
display-name: vipsdisp
homepage: https://github.com/jcupitt/vipsdisp
repo: https://github.com/jcupitt/vipsdisp
docs: https://github.com/jcupitt/vipsdisp
package-manager:
  brew: vipsdisp
  macports: vipsdisp
  nix: vipsdisp
  scoop: extras/vipsdisp
package-manager-url: https://formulae.brew.sh/formula/vipsdisp
version: 4.1.4
license: MIT
category: development
tags:
  - cli
description: Viewer for large images
source-archive: https://github.com/jcupitt/vipsdisp/releases/download/v4.1.4/vipsdisp-4.1.4.tar.xz
dependencies:
  - cairo
  - gdk-pixbuf
  - glib
  - graphene
  - gtk4
  - hicolor-icon-theme
  - vips
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: vipsdisp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  av: sudo av install brew:vipsdisp
  brew: brew install vipsdisp
  macports: sudo port install vipsdisp
  nix: nix profile install nixpkgs#vipsdisp
  scoop: scoop install extras/vipsdisp
provenance:
  formula: vipsdisp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
