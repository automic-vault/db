id: brew:cargo-udeps
display-name: cargo-udeps
homepage: https://github.com/est31/cargo-udeps
repo: https://github.com/est31/cargo-udeps
docs: https://github.com/est31/cargo-udeps
package-manager:
  apk: cargo-udeps
  brew: cargo-udeps
  nix: cargo-udeps
  pacman: cargo-udeps
package-manager-url: https://formulae.brew.sh/formula/cargo-udeps
version: 0.1.61
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Find unused dependencies in Cargo.toml
source-archive: https://github.com/est31/cargo-udeps/archive/refs/tags/v0.1.61.tar.gz
dependencies:
  - libgit2
  - libssh2
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-udeps
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cargo-udeps
  av: sudo av install brew:cargo-udeps
  brew: brew install cargo-udeps
  nix: nix profile install nixpkgs#cargo-udeps
  pacman: sudo pacman -S cargo-udeps
provenance:
  formula: cargo-udeps
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
