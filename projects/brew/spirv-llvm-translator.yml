id: brew:spirv-llvm-translator
display-name: spirv-llvm-translator
homepage: https://github.com/KhronosGroup/SPIRV-LLVM-Translator
repo: https://github.com/KhronosGroup/SPIRV-LLVM-Translator
docs: https://github.com/KhronosGroup/SPIRV-LLVM-Translator
package-manager:
  apk: spirv-llvm-translator
  brew: spirv-llvm-translator
  dnf: spirv-llvm-translator
  nix: spirv-llvm-translator
  pacman: spirv-llvm-translator
package-manager-url: https://formulae.brew.sh/formula/spirv-llvm-translator
version: 22.1.2
license: Apache-2.0 WITH LLVM-exception
category: development
tags:
  - cli
description: Tool and a library for bi-directional translation between SPIR-V and LLVM IR
source-archive: https://github.com/KhronosGroup/SPIRV-LLVM-Translator/archive/refs/tags/v22.1.2.tar.gz
dependencies:
  - llvm
build-dependencies:
  - cmake
  - pkgconf
  - spirv-headers
executables:
  - exposure: global executable
    kind: cli
    name: llvm-spirv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add spirv-llvm-translator
  av: sudo av install brew:spirv-llvm-translator
  brew: brew install spirv-llvm-translator
  dnf: sudo dnf install spirv-llvm-translator
  nix: nix profile install nixpkgs#spirv-llvm-translator
  pacman: sudo pacman -S spirv-llvm-translator
provenance:
  formula: spirv-llvm-translator
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
