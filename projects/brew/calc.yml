id: brew:calc
display-name: calc
homepage: http://www.isthe.com/chongo/tech/comp/calc/
repo: https://github.com/lcn2/calc
docs: http://www.isthe.com/chongo/tech/comp/calc/
package-manager:
  brew: calc
  debian: calc
  dnf: calc
  macports: calc
  nix: calc
  pacman: calc
  ubuntu: calc
  zypper: calc
package-manager-url: https://formulae.brew.sh/formula/calc
version: 2.17.0.0
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Arbitrary precision calculator
source-archive: https://github.com/lcn2/calc/archive/refs/tags/v2.17.0.0.tar.gz
dependencies:
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: calc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:calc
  brew: brew install calc
  debian: sudo apt install calc
  dnf: sudo dnf install calc
  macports: sudo port install calc
  nix: nix profile install nixpkgs#calc
  pacman: sudo pacman -S calc
  ubuntu: sudo apt install calc
  zypper: sudo zypper install calc
provenance:
  formula: calc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
