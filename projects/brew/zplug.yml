id: brew:zplug
display-name: zplug
homepage: https://github.com/zplug/zplug/
repo: https://github.com/zplug/zplug
docs: https://github.com/zplug/zplug/
package-manager:
  brew: zplug
  debian: zplug
  nix: zplug
  ubuntu: zplug
package-manager-url: https://formulae.brew.sh/formula/zplug
version: 2.4.2
license: MIT
category: development
tags:
  - cli
description: Next-generation plugin manager for zsh
source-archive: https://github.com/zplug/zplug/archive/refs/tags/2.4.2.tar.gz
uses-from-macos:
  - zsh
executables:
  - exposure: global executable
    kind: cli
    name: zplug-env
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    In order to use zplug, please add the following to your .zshrc: export
    ZPLUG_HOME=$HOMEBREW_PREFIX/opt/zplug source $ZPLUG_HOME/init.zsh
  post-install-defined: false
install-lines:
  av: sudo av install brew:zplug
  brew: brew install zplug
  debian: sudo apt install zplug
  nix: nix profile install nixpkgs#zplug
  ubuntu: sudo apt install zplug
provenance:
  formula: zplug
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
