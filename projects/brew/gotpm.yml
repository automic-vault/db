id: brew:gotpm
display-name: gotpm
homepage: https://github.com/google/go-tpm-tools
repo: https://github.com/google/go-tpm-tools
docs: https://github.com/google/go-tpm-tools
package-manager:
  brew: gotpm
package-manager-url: https://formulae.brew.sh/formula/gotpm
version: 0.4.8
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for using TPM 2.0
source-archive: https://github.com/google/go-tpm-tools/archive/refs/tags/v0.4.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gotpm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gotpm
  brew: brew install gotpm
provenance:
  formula: gotpm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
