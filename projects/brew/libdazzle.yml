id: brew:libdazzle
display-name: libdazzle
homepage: https://gitlab.gnome.org/GNOME/libdazzle
repo: https://download.gnome.org/sources/libdazzle/3.44/libdazzle-3.44.0.tar.xz
docs: https://gitlab.gnome.org/GNOME/libdazzle
package-manager:
  apk: libdazzle
  brew: libdazzle
  dnf: libdazzle
  macports: libdazzle
  nix: libdazzle
  pacman: libdazzle
  zypper: dazzle-list-counters
package-manager-url: https://formulae.brew.sh/formula/libdazzle
version: 3.44.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: GNOME companion library to GObject and Gtk+
source-archive: https://download.gnome.org/sources/libdazzle/3.44/libdazzle-3.44.0.tar.xz
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - harfbuzz
  - pango
build-dependencies:
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: dazzle-list-counters
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libdazzle
  av: sudo av install brew:libdazzle
  brew: brew install libdazzle
  dnf: sudo dnf install libdazzle
  macports: sudo port install libdazzle
  nix: nix profile install nixpkgs#libdazzle
  pacman: sudo pacman -S libdazzle
  zypper: sudo zypper install dazzle-list-counters
provenance:
  formula: libdazzle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
