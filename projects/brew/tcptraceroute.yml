id: brew:tcptraceroute
display-name: tcptraceroute
homepage: https://github.com/mct/tcptraceroute
repo: https://github.com/mct/tcptraceroute
docs: https://github.com/mct/tcptraceroute
package-manager:
  apk: tcptraceroute
  brew: tcptraceroute
  debian: tcptraceroute
  macports: tcptraceroute
  nix: tcptraceroute
  ubuntu: tcptraceroute
package-manager-url: https://formulae.brew.sh/formula/tcptraceroute
version: 1.5beta7
license: GPL-2.0-only
category: development
tags:
  - cli
description: Traceroute implementation using TCP packets
source-archive: https://github.com/mct/tcptraceroute/archive/refs/tags/tcptraceroute-1.5beta7.tar.gz
dependencies:
  - libnet
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: tcptraceroute
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    tcptraceroute requires root privileges so you will need to run `sudo tcptraceroute`.
    You should be certain that you trust any software you grant root privileges.
  post-install-defined: false
install-lines:
  apk: sudo apk add tcptraceroute
  av: sudo av install brew:tcptraceroute
  brew: brew install tcptraceroute
  debian: sudo apt install tcptraceroute
  macports: sudo port install tcptraceroute
  nix: nix profile install nixpkgs#tcptraceroute
  ubuntu: sudo apt install tcptraceroute
provenance:
  formula: tcptraceroute
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
