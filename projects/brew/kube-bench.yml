id: brew:kube-bench
display-name: kube-bench
homepage: https://github.com/aquasecurity/kube-bench
repo: https://github.com/aquasecurity/kube-bench
docs: https://github.com/aquasecurity/kube-bench
package-manager:
  brew: kube-bench
  nix: kube-bench
package-manager-url: https://formulae.brew.sh/formula/kube-bench
version: 0.15.5
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
  - security
description: Checks Kubernetes deployment against security best practices (CIS Benchmark)
source-archive: https://github.com/aquasecurity/kube-bench/archive/refs/tags/v0.15.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kube-bench
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kube-bench
  brew: brew install kube-bench
  nix: nix profile install nixpkgs#kube-bench
provenance:
  formula: kube-bench
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
