id: brew:ott
display-name: ott
homepage: https://www.cl.cam.ac.uk/~pes20/ott/
repo: https://github.com/ott-lang/ott
docs: https://www.cl.cam.ac.uk/~pes20/ott/
package-manager:
  brew: ott
  macports: ott
  nix: ott
package-manager-url: https://formulae.brew.sh/formula/ott
version: 0.34
license: BSD-3-Clause
category: development
tags:
  - cli
description: Tool for writing definitions of programming languages and calculi
source-archive: https://github.com/ott-lang/ott/archive/refs/tags/0.34.tar.gz
build-dependencies:
  - gmp
  - ocaml
  - opam
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ott
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ott
  brew: brew install ott
  macports: sudo port install ott
  nix: nix profile install nixpkgs#ott
provenance:
  formula: ott
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
