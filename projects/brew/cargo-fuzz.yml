id: brew:cargo-fuzz
display-name: cargo-fuzz
homepage: https://rust-fuzz.github.io/book/cargo-fuzz.html
repo: https://github.com/rust-fuzz/cargo-fuzz
docs: https://rust-fuzz.github.io/book/cargo-fuzz.html
package-manager:
  brew: cargo-fuzz
  nix: cargo-fuzz
  pacman: cargo-fuzz
package-manager-url: https://formulae.brew.sh/formula/cargo-fuzz
version: 0.13.1
license: Apache-2.0 AND MIT
category: development
tags:
  - cli
description: Command-line helpers for fuzzing
source-archive: https://github.com/rust-fuzz/cargo-fuzz/archive/refs/tags/0.13.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-fuzz
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-fuzz
  brew: brew install cargo-fuzz
  nix: nix profile install nixpkgs#cargo-fuzz
  pacman: sudo pacman -S cargo-fuzz
provenance:
  formula: cargo-fuzz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
