id: brew:dpcmd
display-name: dpcmd
homepage: https://github.com/DediProgSW/SF100Linux
repo: https://github.com/DediProgSW/SF100Linux
docs: https://github.com/DediProgSW/SF100Linux
package-manager:
  brew: dpcmd
package-manager-url: https://formulae.brew.sh/formula/dpcmd
version: 1.14.21
license: GPL-2.0-only
category: development
tags:
  - cli
description: Linux software for DediProg SF100/SF600
source-archive: https://github.com/DediProgSW/SF100Linux/archive/refs/tags/V1.14.21,x.tar.gz
dependencies:
  - libusb
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dpcmd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dpcmd
  brew: brew install dpcmd
provenance:
  formula: dpcmd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
