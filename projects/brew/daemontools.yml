id: brew:daemontools
display-name: daemontools
homepage: https://cr.yp.to/daemontools.html
repo: https://cr.yp.to/daemontools/daemontools-0.76.tar.gz
docs: https://cr.yp.to/daemontools.html
package-manager:
  apk: daemontools
  brew: daemontools
  debian: daemontools
  macports: daemontools
  nix: daemontools
  ubuntu: daemontools
package-manager-url: https://formulae.brew.sh/formula/daemontools
version: 0.76
license: LicenseRef-Homebrew-public-domain
category: network
tags:
  - cli
description: Collection of tools for managing UNIX services
source-archive: https://cr.yp.to/daemontools/daemontools-0.76.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: envdir
  - exposure: global executable
    kind: cli
    name: envuidgid
  - exposure: global executable
    kind: cli
    name: fghack
  - exposure: global executable
    kind: cli
    name: multilog
  - exposure: global executable
    kind: cli
    name: pgrphack
  - exposure: global executable
    kind: cli
    name: readproctitle
  - exposure: global executable
    kind: cli
    name: setlock
  - exposure: global executable
    kind: cli
    name: setuidgid
  - exposure: global executable
    kind: cli
    name: softlimit
  - exposure: global executable
    kind: cli
    name: supervise
  - exposure: global executable
    kind: cli
    name: svc
  - exposure: global executable
    kind: cli
    name: svok
  - exposure: global executable
    kind: cli
    name: svscan
  - exposure: global executable
    kind: cli
    name: svscanboot
  - exposure: global executable
    kind: cli
    name: svstat
  - exposure: global executable
    kind: cli
    name: tai64n
  - exposure: global executable
    kind: cli
    name: tai64nlocal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Services are stored in: $HOMEBREW_PREFIX/etc/service/'
  post-install-defined: true
  service: declared
install-lines:
  apk: sudo apk add daemontools
  av: sudo av install brew:daemontools
  brew: brew install daemontools
  debian: sudo apt install daemontools
  macports: sudo port install daemontools
  nix: nix profile install nixpkgs#daemontools
  ubuntu: sudo apt install daemontools
provenance:
  formula: daemontools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
