id: brew:img2pdf
display-name: img2pdf
homepage: https://gitlab.mister-muffin.de/josch/img2pdf
repo: >
  https://files.pythonhosted.org/packages/8e/97/ca44c467131b93fda82d2a2f21b738c8bcf63b5259e3b8250e928b8dd52a/img2pdf-0.6.3.tar.gz
docs: https://gitlab.mister-muffin.de/josch/img2pdf
package-manager:
  brew: img2pdf
  debian: img2pdf
  macports: img2pdf
  nix: img2pdf
  pacman: img2pdf
  ubuntu: img2pdf
package-manager-url: https://formulae.brew.sh/formula/img2pdf
version: 0.6.3
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Convert images to PDF via direct JPEG inclusion
source-archive: >
  https://files.pythonhosted.org/packages/8e/97/ca44c467131b93fda82d2a2f21b738c8bcf63b5259e3b8250e928b8dd52a/img2pdf-0.6.3.tar.gz
dependencies:
  - pillow
  - python@3.14
  - qpdf
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: img2pdf
  - exposure: global executable
    kind: cli
    name: img2pdf-gui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:img2pdf
  brew: brew install img2pdf
  debian: sudo apt install img2pdf
  macports: sudo port install img2pdf
  nix: nix profile install nixpkgs#img2pdf
  pacman: sudo pacman -S img2pdf
  ubuntu: sudo apt install img2pdf
provenance:
  formula: img2pdf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
