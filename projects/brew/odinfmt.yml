id: brew:odinfmt
display-name: odinfmt
homepage: https://github.com/DanielGavin/ols
repo: https://github.com/DanielGavin/ols
docs: https://github.com/DanielGavin/ols
package-manager:
  brew: odinfmt
  pacman: odinfmt
package-manager-url: https://formulae.brew.sh/formula/odinfmt
version: 2026-05
license: MIT
category: development
tags:
  - cli
description: Formatter for The Odin Programming Language
source-archive: https://github.com/DanielGavin/ols/archive/refs/tags/dev-2026-05.tar.gz
build-dependencies:
  - odin
executables:
  - exposure: global executable
    kind: cli
    name: odinfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:odinfmt
  brew: brew install odinfmt
  pacman: sudo pacman -S odinfmt
provenance:
  formula: odinfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
