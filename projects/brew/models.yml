id: brew:models
display-name: models
homepage: https://github.com/arimxyer/models
repo: https://github.com/arimxyer/models
docs: https://github.com/arimxyer/models
package-manager:
  brew: models
  scoop: extras/models
package-manager-url: https://formulae.brew.sh/formula/models
version: 0.11.52
license: MIT
category: development
tags:
  - cli
description: Fast TUI and CLI for browsing AI models, benchmarks, and coding agents
source-archive: https://github.com/arimxyer/models/archive/refs/tags/v0.11.52.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: models
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:models
  brew: brew install models
  scoop: scoop install extras/models
provenance:
  formula: models
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
