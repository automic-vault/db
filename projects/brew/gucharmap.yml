id: brew:gucharmap
display-name: gucharmap
homepage: https://wiki.gnome.org/Apps/Gucharmap
repo: https://gitlab.gnome.org/GNOME/gucharmap/-/archive/17.0.2/gucharmap-17.0.2.tar.bz2
docs: https://wiki.gnome.org/Apps/Gucharmap
package-manager:
  apk: gucharmap
  brew: gucharmap
  debian: gucharmap
  dnf: gucharmap
  macports: gucharmap
  nix: gucharmap
  pacman: gucharmap
  ubuntu: gucharmap
  zypper: gucharmap
package-manager-url: https://formulae.brew.sh/formula/gucharmap
version: 17.0.2
license: GPL-3.0-or-later
category: database
tags:
  - cli
  - database
description: GNOME Character Map, based on the Unicode Character Database
source-archive: https://gitlab.gnome.org/GNOME/gucharmap/-/archive/17.0.2/gucharmap-17.0.2.tar.bz2
dependencies:
  - at-spi2-core
  - cairo
  - gettext
  - glib
  - gtk+3
  - pango
  - pcre2
build-dependencies:
  - desktop-file-utils
  - gobject-introspection
  - gtk-doc
  - itstool
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: gucharmap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add gucharmap
  av: sudo av install brew:gucharmap
  brew: brew install gucharmap
  debian: sudo apt install gucharmap
  dnf: sudo dnf install gucharmap
  macports: sudo port install gucharmap
  nix: nix profile install nixpkgs#gucharmap
  pacman: sudo pacman -S gucharmap
  ubuntu: sudo apt install gucharmap
  zypper: sudo zypper install gucharmap
provenance:
  formula: gucharmap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
