id: brew:zip
display-name: zip
homepage: https://infozip.sourceforge.net/Zip.html
repo: >
  https://downloads.sourceforge.net/project/infozip/Zip%203.x%20%28latest%29/3.0/zip30.tar.gz
docs: https://infozip.sourceforge.net/Zip.html
package-manager:
  apk: zip
  brew: zip
  chocolatey: zip
  debian: zip
  dnf: zip
  macports: zip
  nix: zip
  pacman: zip
  scoop: main/zip
  ubuntu: zip
  winget: Diorser.LiteMonitor
  zypper: zip
package-manager-url: https://formulae.brew.sh/formula/zip
version: 3.0
license: Info-ZIP
category: network
tags:
  - cli
description: Compression and file packaging/archive utility
source-archive: >
  https://downloads.sourceforge.net/project/infozip/Zip%203.x%20%28latest%29/3.0/zip30.tar.gz
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: zip
  - exposure: global executable
    kind: cli
    name: zipcloak
  - exposure: global executable
    kind: cli
    name: zipnote
  - exposure: global executable
    kind: cli
    name: zipsplit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add zip
  av: sudo av install brew:zip
  brew: brew install zip
  chocolatey: choco install zip
  debian: sudo apt install zip
  dnf: sudo dnf install zip
  macports: sudo port install zip
  nix: nix profile install nixpkgs#zip
  pacman: sudo pacman -S zip
  scoop: scoop install main/zip
  ubuntu: sudo apt install zip
  winget: winget install --id Diorser.LiteMonitor -e
  zypper: sudo zypper install zip
provenance:
  formula: zip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
