id: brew:perceptualdiff
display-name: perceptualdiff
homepage: https://pdiff.sourceforge.net/
repo: https://github.com/myint/perceptualdiff
docs: https://pdiff.sourceforge.net/
package-manager:
  brew: perceptualdiff
  debian: perceptualdiff
  dnf: PerceptualDiff
  ubuntu: perceptualdiff
package-manager-url: https://formulae.brew.sh/formula/perceptualdiff
version: 2.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Perceptual image comparison tool
source-archive: https://github.com/myint/perceptualdiff/archive/refs/tags/v2.1.tar.gz
dependencies:
  - freeimage
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: perceptualdiff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:perceptualdiff
  brew: brew install perceptualdiff
  debian: sudo apt install perceptualdiff
  dnf: sudo dnf install PerceptualDiff
  ubuntu: sudo apt install perceptualdiff
provenance:
  formula: perceptualdiff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
