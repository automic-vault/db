id: brew:wxmaxima
display-name: wxmaxima
homepage: https://wxmaxima-developers.github.io/wxmaxima/
repo: https://github.com/wxMaxima-developers/wxmaxima
docs: https://wxmaxima-developers.github.io/wxmaxima/
package-manager:
  brew: wxmaxima
  debian: wxmaxima
  dnf: wxMaxima
  macports: wxMaxima
  nix: wxmaxima
  ubuntu: wxmaxima
  zypper: wxMaxima
package-manager-url: https://formulae.brew.sh/formula/wxmaxima
version: 26.05.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Cross platform GUI for Maxima
source-archive: https://github.com/wxMaxima-developers/wxmaxima/archive/refs/tags/Version-26.05.0.tar.gz
dependencies:
  - maxima
  - wxwidgets
build-dependencies:
  - cmake
  - gettext
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: wxmaxima
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    When you start wxMaxima the first time, set the path to Maxima (e.g.
    $HOMEBREW_PREFIX/bin/maxima) in the Preferences. Enable gnuplot functionality by
    setting the following variables in ~/.maxima/maxima-init.mac:
    gnuplot_command:"$HOMEBREW_PREFIX/bin/gnuplot"$
    draw_command:"$HOMEBREW_PREFIX/bin/gnuplot"$
  post-install-defined: false
install-lines:
  av: sudo av install brew:wxmaxima
  brew: brew install wxmaxima
  debian: sudo apt install wxmaxima
  dnf: sudo dnf install wxMaxima
  macports: sudo port install wxMaxima
  nix: nix profile install nixpkgs#wxmaxima
  ubuntu: sudo apt install wxmaxima
  zypper: sudo zypper install wxMaxima
provenance:
  formula: wxmaxima
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
