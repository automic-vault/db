id: brew:thanos
display-name: thanos
homepage: https://thanos.io
repo: https://github.com/thanos-io/thanos
docs: https://thanos.io
package-manager:
  apk: thanos
  brew: thanos
  nix: thanos
package-manager-url: https://formulae.brew.sh/formula/thanos
version: 0.41.0
license: Apache-2.0
category: development
tags:
  - cli
description: Highly available Prometheus setup with long term storage capabilities
source-archive: https://github.com/thanos-io/thanos/archive/refs/tags/v0.41.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: thanos
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add thanos
  av: sudo av install brew:thanos
  brew: brew install thanos
  nix: nix profile install nixpkgs#thanos
provenance:
  formula: thanos
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
