id: brew:bacon-ls
display-name: bacon-ls
homepage: https://github.com/crisidev/bacon-ls
repo: https://github.com/crisidev/bacon-ls
docs: https://github.com/crisidev/bacon-ls
package-manager:
  brew: bacon-ls
package-manager-url: https://formulae.brew.sh/formula/bacon-ls
version: 0.29.0
license: MIT
category: development
tags:
  - cli
description: Rust diagnostic provider based on Bacon
source-archive: https://github.com/crisidev/bacon-ls/archive/refs/tags/0.29.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bacon-ls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bacon-ls
  brew: brew install bacon-ls
provenance:
  formula: bacon-ls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
