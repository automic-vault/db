id: brew:nuclei
display-name: nuclei
homepage: https://docs.projectdiscovery.io/tools/nuclei/overview
repo: https://github.com/projectdiscovery/nuclei
docs: https://docs.projectdiscovery.io/tools/nuclei/overview
package-manager:
  apk: nuclei
  brew: nuclei
  dnf: nuclei
  macports: nuclei
  nix: nuclei
  scoop: main/nuclei
package-manager-url: https://formulae.brew.sh/formula/nuclei
version: 3.8.0
license: MIT
category: development
tags:
  - cli
  - yaml
description: HTTP/DNS scanner configurable via YAML templates
source-archive: https://github.com/projectdiscovery/nuclei/archive/refs/tags/v3.8.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: nuclei
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nuclei
  av: sudo av install brew:nuclei
  brew: brew install nuclei
  dnf: sudo dnf install nuclei
  macports: sudo port install nuclei
  nix: nix profile install nixpkgs#nuclei
  scoop: scoop install main/nuclei
provenance:
  formula: nuclei
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
