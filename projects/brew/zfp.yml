id: brew:zfp
display-name: zfp
homepage: https://zfp.llnl.gov
repo: https://github.com/llnl/zfp
docs: https://zfp.llnl.gov
package-manager:
  brew: zfp
  debian: zfp
  dnf: zfp
  macports: zfp
  nix: zfp
  pacman: zfp
  ubuntu: zfp
  zypper: zfp
package-manager-url: https://formulae.brew.sh/formula/zfp
version: 1.0.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Compressed numerical arrays that support high-speed random access
source-archive: https://github.com/llnl/zfp/archive/refs/tags/1.0.1.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: zfp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zfp
  brew: brew install zfp
  debian: sudo apt install zfp
  dnf: sudo dnf install zfp
  macports: sudo port install zfp
  nix: nix profile install nixpkgs#zfp
  pacman: sudo pacman -S zfp
  ubuntu: sudo apt install zfp
  zypper: sudo zypper install zfp
provenance:
  formula: zfp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
