id: brew:sidekick
display-name: sidekick
homepage: https://github.com/MightyMoud/sidekick
repo: https://github.com/MightyMoud/sidekick
docs: https://github.com/MightyMoud/sidekick
package-manager:
  brew: sidekick
  macports: sidekick
  nix: sidekick
package-manager-url: https://formulae.brew.sh/formula/sidekick
version: 0.6.6
license: GPL-3.0-only
category: development
tags:
  - cli
description: Deploy applications to your VPS
source-archive: https://github.com/MightyMoud/sidekick/archive/refs/tags/v0.6.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sidekick
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sidekick
  brew: brew install sidekick
  macports: sudo port install sidekick
  nix: nix profile install nixpkgs#sidekick
provenance:
  formula: sidekick
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
