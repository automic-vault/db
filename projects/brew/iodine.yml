id: brew:iodine
display-name: iodine
homepage: https://code.kryo.se/iodine
repo: https://github.com/yarrick/iodine
docs: https://code.kryo.se/iodine
package-manager:
  apk: iodine
  brew: iodine
  debian: iodine
  dnf: iodine
  macports: iodine
  nix: iodine
  pacman: iodine
  ubuntu: iodine
  zypper: iodine
package-manager-url: https://formulae.brew.sh/formula/iodine
version: 0.8.0
license: ISC
category: development
tags:
  - cli
description: Tunnel IPv4 traffic through a DNS server
source-archive: https://github.com/yarrick/iodine/archive/refs/tags/v0.8.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: iodine
  - exposure: global executable
    kind: cli
    name: iodined
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add iodine
  av: sudo av install brew:iodine
  brew: brew install iodine
  debian: sudo apt install iodine
  dnf: sudo dnf install iodine
  macports: sudo port install iodine
  nix: nix profile install nixpkgs#iodine
  pacman: sudo pacman -S iodine
  ubuntu: sudo apt install iodine
  zypper: sudo zypper install iodine
provenance:
  formula: iodine
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
