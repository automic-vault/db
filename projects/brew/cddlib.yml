    kind: cli
    name: cddexec_gmp
  - exposure: global executable
    kind: cli
    name: fourier
  - exposure: global executable
    kind: cli
    name: fourier_gmp
  - exposure: global executable
    kind: cli
    name: lcdd
  - exposure: global executable
    kind: cli
    name: lcdd_gmp
  - exposure: global executable
    kind: cli
    name: projection
  - exposure: global executable
    kind: cli
    name: projection_gmp
  - exposure: global executable
    kind: cli
    name: redcheck
  - exposure: global executable
    kind: cli
    name: redcheck_gmp
  - exposure: global executable
    kind: cli
    name: scdd
  - exposure: global executable
    kind: cli
    name: scdd_gmp
  - exposure: global executable
    kind: cli
    name: testcdd1
  - exposure: global executable
    kind: cli
    name: testcdd1_gmp
  - exposure: global executable
    kind: cli
    name: testcdd2
  - exposure: global executable
    kind: cli
    name: testcdd2_gmp
  - exposure: global executable
    kind: cli
    name: testlp1
  - exposure: global executable
    kind: cli
    name: testlp1_gmp
  - exposure: global executable
    kind: cli
    name: testlp2
  - exposure: global executable
    kind: cli
    name: testlp2_gmp
  - exposure: global executable
    kind: cli
    name: testlp3
  - exposure: global executable
    kind: cli
    name: testlp3_gmp
  - exposure: global executable
    kind: cli
    name: testshoot
  - exposure: global executable
    kind: cli
    name: testshoot_gmp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cddlib
  av: sudo av install brew:cddlib
  brew: brew install cddlib
  dnf: sudo dnf install cddlib
  macports: sudo port install cddlib
  nix: nix profile install nixpkgs#cddlib
  pacman: sudo pacman -S cddlib
provenance:
  formula: cddlib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
