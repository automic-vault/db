id: brew:cddlib
display-name: cddlib
homepage: https://www.inf.ethz.ch/personal/fukudak/cdd_home/
repo: https://github.com/cddlib/cddlib
docs: https://www.inf.ethz.ch/personal/fukudak/cdd_home/
package-manager:
  apk: cddlib
  brew: cddlib
  dnf: cddlib
  macports: cddlib
  nix: cddlib
  pacman: cddlib
package-manager-url: https://formulae.brew.sh/formula/cddlib
version: 0.94n
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Double description method for general polyhedral cones
source-archive: https://github.com/cddlib/cddlib/releases/download/0.94n/cddlib-0.94n.tar.gz
dependencies:
  - gmp
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: adjacency
  - exposure: global executable
    kind: cli
    name: adjacency_gmp
  - exposure: global executable
    kind: cli
    name: allfaces
  - exposure: global executable
    kind: cli
    name: allfaces_gmp
  - exposure: global executable
    kind: cli
    name: cddexec
