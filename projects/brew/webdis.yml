id: brew:webdis
display-name: webdis
homepage: https://webd.is/
repo: https://github.com/nicolasff/webdis
docs: https://webd.is/
package-manager:
  brew: webdis
  debian: webdis
  nix: webdis
  ubuntu: webdis
package-manager-url: https://formulae.brew.sh/formula/webdis
version: 0.1.25
license: BSD-2-Clause
category: database
tags:
  - cli
  - json
description: Redis HTTP interface with JSON output
source-archive: https://github.com/nicolasff/webdis/archive/refs/tags/0.1.25.tar.gz
dependencies:
  - libevent
executables:
  - exposure: global executable
    kind: cli
    name: webdis
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:webdis
  brew: brew install webdis
  debian: sudo apt install webdis
  nix: nix profile install nixpkgs#webdis
  ubuntu: sudo apt install webdis
provenance:
  formula: webdis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
