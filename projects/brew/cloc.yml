id: brew:cloc
display-name: cloc
homepage: https://github.com/AlDanial/cloc/
repo: https://github.com/AlDanial/cloc
docs: https://github.com/AlDanial/cloc/
package-manager:
  apk: cloc
  brew: cloc
  chocolatey: CLOC
  debian: cloc
  dnf: cloc
  macports: cloc
  nix: cloc
  pacman: cloc
  scoop: main/cloc
  ubuntu: cloc
  winget: AlDanial.Cloc
package-manager-url: https://formulae.brew.sh/formula/cloc
version: 2.08
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Statistics utility to count lines of code
source-archive: https://github.com/AlDanial/cloc/archive/refs/tags/v2.08.tar.gz
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: cloc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cloc
  av: sudo av install brew:cloc
  brew: brew install cloc
  chocolatey: choco install CLOC
  debian: sudo apt install cloc
  dnf: sudo dnf install cloc
  macports: sudo port install cloc
  nix: nix profile install nixpkgs#cloc
  pacman: sudo pacman -S cloc
  scoop: scoop install main/cloc
  ubuntu: sudo apt install cloc
  winget: winget install --id AlDanial.Cloc -e
provenance:
  formula: cloc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
