id: brew:pdsh
display-name: pdsh
homepage: https://github.com/chaos/pdsh
repo: https://github.com/chaos/pdsh
docs: https://github.com/chaos/pdsh
package-manager:
  apk: pdsh
  brew: pdsh
  debian: pdsh
  dnf: pdsh
  macports: pdsh
  nix: pdsh
  ubuntu: pdsh
  zypper: pdsh
package-manager-url: https://formulae.brew.sh/formula/pdsh
version: 2.36
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Efficient rsh-like utility, for using hosts in parallel
source-archive: https://github.com/chaos/pdsh/releases/download/pdsh-2.36/pdsh-2.36.tar.gz
dependencies:
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: dshbak
  - exposure: global executable
    kind: cli
    name: pdcp
  - exposure: global executable
    kind: cli
    name: pdsh
  - exposure: global executable
    kind: cli
    name: rpdcp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pdsh
  av: sudo av install brew:pdsh
  brew: brew install pdsh
  debian: sudo apt install pdsh
  dnf: sudo dnf install pdsh
  macports: sudo port install pdsh
  nix: nix profile install nixpkgs#pdsh
  ubuntu: sudo apt install pdsh
  zypper: sudo zypper install pdsh
provenance:
  formula: pdsh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
