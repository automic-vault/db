id: brew:raptor
display-name: raptor
homepage: https://librdf.org/raptor/
repo: https://download.librdf.org/source/raptor2-2.0.16.tar.gz
docs: https://librdf.org/raptor/
package-manager:
  brew: raptor
  pacman: raptor
  zypper: raptor
package-manager-url: https://formulae.brew.sh/formula/raptor
version: 2.0.16
license: LGPL-2.1-or-later OR GPL-2.0-or-later OR Apache-2.0
category: network
tags:
  - cli
description: RDF parser toolkit
source-archive: https://download.librdf.org/source/raptor2-2.0.16.tar.gz
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: rapper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:raptor
  brew: brew install raptor
  pacman: sudo pacman -S raptor
  zypper: sudo zypper install raptor
provenance:
  formula: raptor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
