id: brew:webdav
display-name: webdav
homepage: https://github.com/hacdias/webdav
repo: https://github.com/hacdias/webdav
docs: https://github.com/hacdias/webdav
package-manager:
  brew: webdav
  nix: webdav
package-manager-url: https://formulae.brew.sh/formula/webdav
version: 5.11.9
license: MIT
category: development
tags:
  - cli
description: Simple and standalone WebDAV server
source-archive: https://github.com/hacdias/webdav/archive/refs/tags/v5.11.9.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: webdav
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:webdav
  brew: brew install webdav
  nix: nix profile install nixpkgs#webdav
provenance:
  formula: webdav
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
