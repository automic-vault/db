id: brew:pngpaste
display-name: pngpaste
homepage: https://github.com/jcsalterego/pngpaste
repo: https://github.com/jcsalterego/pngpaste
docs: https://github.com/jcsalterego/pngpaste
package-manager:
  brew: pngpaste
  macports: pngpaste
  nix: pngpaste
package-manager-url: https://formulae.brew.sh/formula/pngpaste
version: 0.2.3
license: BSD-2-Clause
category: development
tags:
  - cli
description: Paste PNG into files
source-archive: https://github.com/jcsalterego/pngpaste/archive/refs/tags/0.2.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: pngpaste
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pngpaste
  brew: brew install pngpaste
  macports: sudo port install pngpaste
  nix: nix profile install nixpkgs#pngpaste
provenance:
  formula: pngpaste
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
