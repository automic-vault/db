id: brew:sloth-cli
display-name: sloth-cli
homepage: https://sloth.dev/
repo: https://github.com/slok/sloth
docs: https://sloth.dev/
package-manager:
  brew: sloth-cli
  macports: sloth
  nix: sloth
package-manager-url: https://formulae.brew.sh/formula/sloth-cli
version: 0.16.0
license: Apache-2.0
category: development
tags:
  - cli
description: Prometheus SLO generator
source-archive: https://github.com/slok/sloth/archive/refs/tags/v0.16.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: sloth
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sloth-cli
  brew: brew install sloth-cli
  macports: sudo port install sloth
  nix: nix profile install nixpkgs#sloth
provenance:
  formula: sloth-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
