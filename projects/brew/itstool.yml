id: brew:itstool
display-name: itstool
homepage: https://itstool.org/
repo: https://files.itstool.org/itstool/itstool-2.0.7.tar.bz2
docs: https://itstool.org/
package-manager:
  apk: itstool
  brew: itstool
  debian: itstool
  dnf: itstool
  macports: itstool
  nix: itstool
  pacman: itstool
  ubuntu: itstool
  zypper: itstool
package-manager-url: https://formulae.brew.sh/formula/itstool
version: 2.0.7
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Make XML documents translatable through PO files
source-archive: https://files.itstool.org/itstool/itstool-2.0.7.tar.bz2
dependencies:
  - libxml2
  - python@3.14
build-dependencies:
  - doxygen
  - pkgconf
  - python-setuptools
executables:
  - exposure: global executable
    kind: cli
    name: itstool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add itstool
  av: sudo av install brew:itstool
  brew: brew install itstool
  debian: sudo apt install itstool
  dnf: sudo dnf install itstool
  macports: sudo port install itstool
  nix: nix profile install nixpkgs#itstool
  pacman: sudo pacman -S itstool
  ubuntu: sudo apt install itstool
  zypper: sudo zypper install itstool
provenance:
  formula: itstool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
