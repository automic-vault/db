id: brew:hdr10plus_tool
display-name: hdr10plus_tool
homepage: https://github.com/quietvoid/hdr10plus_tool
repo: https://github.com/quietvoid/hdr10plus_tool
docs: https://github.com/quietvoid/hdr10plus_tool
package-manager:
  apk: hdr10plus-tool
  brew: hdr10plus_tool
  nix: hdr10plus_tool
  pacman: hdr10plus-tool
package-manager-url: https://formulae.brew.sh/formula/hdr10plus_tool
version: 1.7.2
license: MIT
category: development
tags:
  - cli
description: CLI utility to work with HDR10+ in HEVC files
source-archive: https://github.com/quietvoid/hdr10plus_tool/archive/refs/tags/1.7.2.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hdr10plus_tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add hdr10plus-tool
  av: sudo av install brew:hdr10plus_tool
  brew: brew install hdr10plus_tool
  nix: nix profile install nixpkgs#hdr10plus_tool
  pacman: sudo pacman -S hdr10plus-tool
provenance:
  formula: hdr10plus_tool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
