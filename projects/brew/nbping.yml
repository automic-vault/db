id: brew:nbping
display-name: nbping
homepage: https://github.com/hanshuaikang/Nping
repo: https://github.com/hanshuaikang/Nping
docs: https://github.com/hanshuaikang/Nping
package-manager:
  brew: nbping
  nix: nbping
  scoop: main/nbping
  zypper: nbping
package-manager-url: https://formulae.brew.sh/formula/nbping
version: 0.7.0
license: MIT
category: development
tags:
  - cli
description: Ping Tool in Rust with Real-Time Data and Visualizations
source-archive: https://github.com/hanshuaikang/Nping/archive/refs/tags/v0.7.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: nbping
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nbping
  brew: brew install nbping
  nix: nix profile install nixpkgs#nbping
  scoop: scoop install main/nbping
  zypper: sudo zypper install nbping
provenance:
  formula: nbping
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
