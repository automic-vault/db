    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'All plugins have been installed in: $HOMEBREW_PREFIX/sbin'
  post-install-defined: false
install-lines:
  apk: sudo apk add nagios-plugins
