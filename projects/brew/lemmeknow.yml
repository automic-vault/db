id: brew:lemmeknow
display-name: lemmeknow
homepage: https://github.com/swanandx/lemmeknow
repo: https://github.com/swanandx/lemmeknow
docs: https://github.com/swanandx/lemmeknow
package-manager:
  brew: lemmeknow
  macports: lemmeknow
  nix: lemmeknow
package-manager-url: https://formulae.brew.sh/formula/lemmeknow
version: 0.8.0
license: MIT
category: development
tags:
  - cli
description: Fastest way to identify anything!
source-archive: https://github.com/swanandx/lemmeknow/archive/refs/tags/v0.8.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: lemmeknow
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lemmeknow
  brew: brew install lemmeknow
  macports: sudo port install lemmeknow
  nix: nix profile install nixpkgs#lemmeknow
provenance:
  formula: lemmeknow
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
