id: brew:ripgrep
display-name: ripgrep
homepage: https://github.com/BurntSushi/ripgrep
repo: https://github.com/BurntSushi/ripgrep
docs: https://github.com/BurntSushi/ripgrep
package-manager:
  apk: ripgrep
  brew: ripgrep
  chocolatey: ripgrep
  debian: ripgrep
  dnf: ripgrep
  macports: ripgrep
  nix: ripgrep
  pacman: ripgrep
  scoop: main/ripgrep
  ubuntu: ripgrep
  winget: BurntSushi.ripgrep.GNU
  zypper: ripgrep
package-manager-url: https://formulae.brew.sh/formula/ripgrep
version: 15.1.0
license: Unlicense
category: development
tags:
  - cli
description: Search tool like grep and The Silver Searcher
source-archive: https://github.com/BurntSushi/ripgrep/archive/refs/tags/15.1.0.tar.gz
dependencies:
  - pcre2
build-dependencies:
  - asciidoctor
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ripgrep
  av: sudo av install brew:ripgrep
  brew: brew install ripgrep
  chocolatey: choco install ripgrep
  debian: sudo apt install ripgrep
  dnf: sudo dnf install ripgrep
  macports: sudo port install ripgrep
  nix: nix profile install nixpkgs#ripgrep
  pacman: sudo pacman -S ripgrep
  scoop: scoop install main/ripgrep
  ubuntu: sudo apt install ripgrep
  winget: winget install --id BurntSushi.ripgrep.GNU -e
  zypper: sudo zypper install ripgrep
provenance:
  formula: ripgrep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
