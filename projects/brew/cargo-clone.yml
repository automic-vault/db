id: brew:cargo-clone
display-name: cargo-clone
homepage: https://github.com/JanLikar/cargo-clone
repo: https://github.com/JanLikar/cargo-clone
docs: https://github.com/JanLikar/cargo-clone
package-manager:
  brew: cargo-clone
  nix: cargo-clone
  pacman: cargo-clone
package-manager-url: https://formulae.brew.sh/formula/cargo-clone
version: 1.2.4
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Cargo subcommand to fetch the source code of a Rust crate
source-archive: https://github.com/JanLikar/cargo-clone/archive/refs/tags/v1.2.4.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: cargo-clone
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-clone
  brew: brew install cargo-clone
  nix: nix profile install nixpkgs#cargo-clone
  pacman: sudo pacman -S cargo-clone
provenance:
  formula: cargo-clone
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
