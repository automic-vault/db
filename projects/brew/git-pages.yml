id: brew:git-pages
display-name: git-pages
homepage: https://codeberg.org/git-pages/git-pages
repo: https://codeberg.org/git-pages/git-pages/archive/v0.9.0.tar.gz
docs: https://codeberg.org/git-pages/git-pages
package-manager:
  brew: git-pages
package-manager-url: https://formulae.brew.sh/formula/git-pages
version: 0.9.0
license: 0BSD
category: development
tags:
  - cli
  - git
description: Scalable static site server for Git forges
source-archive: https://codeberg.org/git-pages/git-pages/archive/v0.9.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-pages
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-pages
  brew: brew install git-pages
provenance:
  formula: git-pages
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
