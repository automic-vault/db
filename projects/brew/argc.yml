id: brew:argc
display-name: argc
homepage: https://github.com/sigoden/argc
repo: https://github.com/sigoden/argc
docs: https://github.com/sigoden/argc
package-manager:
  brew: argc
  macports: argc
  nix: argc
package-manager-url: https://formulae.brew.sh/formula/argc
version: 1.24.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Easily create and use cli based on bash script
source-archive: https://github.com/sigoden/argc/archive/refs/tags/v1.24.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: argc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:argc
  brew: brew install argc
  macports: sudo port install argc
  nix: nix profile install nixpkgs#argc
provenance:
  formula: argc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
