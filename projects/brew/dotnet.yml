id: brew:dotnet
display-name: dotnet
homepage: https://dotnet.microsoft.com/
repo: https://github.com/dotnet/dotnet
docs: https://dotnet.microsoft.com/
package-manager:
  brew: dotnet
  chocolatey: dotnet
package-manager-url: https://formulae.brew.sh/formula/dotnet
version: 10.0.107
license: MIT
category: development
tags:
  - cli
description: .NET Core
source-archive: https://github.com/dotnet/dotnet/archive/refs/tags/v10.0.107.tar.gz
dependencies:
  - brotli
  - icu4c@78
  - openssl@3
build-dependencies:
  - cmake
  - grep
  - pkgconf
  - rapidjson
uses-from-macos:
  - krb5
executables:
  - exposure: global executable
    kind: cli
    name: dotnet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    For other software to find dotnet you may need to set: export
    DOTNET_ROOT="$HOMEBREW_PREFIX/opt/dotnet/libexec"
  post-install-defined: false
install-lines:
  av: sudo av install brew:dotnet
  brew: brew install dotnet
  chocolatey: choco install dotnet
provenance:
  formula: dotnet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
