id: brew:gyb
display-name: gyb
homepage: https://github.com/GAM-team/got-your-back/
repo: https://github.com/GAM-team/got-your-back
docs: https://github.com/GAM-team/got-your-back/
package-manager:
  brew: gyb
  nix: gyb
  winget: GAM-Team.GotYourBack
package-manager-url: https://formulae.brew.sh/formula/gyb
version: 1.95
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for backing up and restoring Gmail messages
source-archive: https://github.com/GAM-team/got-your-back/archive/refs/tags/v1.95.tar.gz
dependencies:
  - certifi
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: gyb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Default config_folder: $HOMEBREW_PREFIX/etc/gyb'
  post-install-defined: false
install-lines:
  av: sudo av install brew:gyb
  brew: brew install gyb
  nix: nix profile install nixpkgs#gyb
  winget: winget install --id GAM-Team.GotYourBack -e
provenance:
  formula: gyb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
