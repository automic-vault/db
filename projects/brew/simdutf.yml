id: brew:simdutf
display-name: simdutf
homepage: https://simdutf.github.io/simdutf/
repo: https://github.com/simdutf/simdutf
docs: https://simdutf.github.io/simdutf/
package-manager:
  apk: simdutf
  brew: simdutf
  dnf: simdutf
  nix: simdutf
package-manager-url: https://formulae.brew.sh/formula/simdutf
version: 9.0.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Unicode conversion routines, fast
source-archive: https://github.com/simdutf/simdutf/archive/refs/tags/v9.0.0.tar.gz
dependencies:
  - icu4c@78
build-dependencies:
  - aklomp-base64
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: fastbase64
  - exposure: global executable
    kind: cli
    name: fastbase64.coreutils
  - exposure: global executable
    kind: cli
    name: sutf
  - exposure: global executable
    kind: cli
    name: sutf-benchmark
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add simdutf
  av: sudo av install brew:simdutf
  brew: brew install simdutf
  dnf: sudo dnf install simdutf
  nix: nix profile install nixpkgs#simdutf
provenance:
  formula: simdutf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
