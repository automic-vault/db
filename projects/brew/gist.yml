id: brew:gist
display-name: gist
homepage: https://defunkt.io/gist/
repo: https://github.com/defunkt/gist
docs: https://defunkt.io/gist/
package-manager:
  brew: gist
  debian: gist
  nix: gist
  pacman: gist
  ubuntu: gist
package-manager-url: https://formulae.brew.sh/formula/gist
version: 6.0.0
license: MIT
category: development
tags:
  - cli
description: Command-line utility for uploading Gists
source-archive: https://github.com/defunkt/gist/archive/refs/tags/v6.0.0.tar.gz
uses-from-macos:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: gist
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gist
  brew: brew install gist
  debian: sudo apt install gist
  nix: nix profile install nixpkgs#gist
  pacman: sudo pacman -S gist
  ubuntu: sudo apt install gist
provenance:
  formula: gist
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
