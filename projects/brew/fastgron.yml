id: brew:fastgron
display-name: fastgron
homepage: https://github.com/adamritter/fastgron
repo: https://github.com/adamritter/fastgron
docs: https://github.com/adamritter/fastgron
package-manager:
  brew: fastgron
  nix: fastgron
package-manager-url: https://formulae.brew.sh/formula/fastgron
version: 0.7.7
license: MIT
category: development
tags:
  - cli
  - json
description: High-performance JSON to GRON converter
source-archive: https://github.com/adamritter/fastgron/archive/refs/tags/v0.7.7.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: fastgron
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fastgron
  brew: brew install fastgron
  nix: nix profile install nixpkgs#fastgron
provenance:
  formula: fastgron
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
