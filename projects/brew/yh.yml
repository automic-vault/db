id: brew:yh
display-name: yh
homepage: https://github.com/andreazorzetto/yh
repo: https://github.com/andreazorzetto/yh
docs: https://github.com/andreazorzetto/yh
package-manager:
  brew: yh
package-manager-url: https://formulae.brew.sh/formula/yh
version: 0.4.0
license: Apache-2.0
category: development
tags:
  - cli
  - yaml
description: YAML syntax highlighter to bring colours where only jq could
source-archive: https://github.com/andreazorzetto/yh/archive/refs/tags/v0.4.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: yh
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yh
  brew: brew install yh
provenance:
  formula: yh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
