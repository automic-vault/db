id: brew:nrm
display-name: nrm
homepage: https://github.com/Pana/nrm
repo: https://registry.npmjs.org/nrm/-/nrm-2.1.0.tgz
docs: https://github.com/Pana/nrm
package-manager:
  brew: nrm
  nix: nrm
package-manager-url: https://formulae.brew.sh/formula/nrm
version: 2.1.0
license: MIT
category: development
tags:
  - cli
description: NPM registry manager, fast switch between different registries
source-archive: https://registry.npmjs.org/nrm/-/nrm-2.1.0.tgz
dependencies:
