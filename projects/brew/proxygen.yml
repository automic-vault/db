id: brew:proxygen
display-name: proxygen
homepage: https://github.com/facebook/proxygen
repo: https://github.com/facebook/proxygen
docs: https://github.com/facebook/proxygen
package-manager:
  brew: proxygen
  macports: proxygen
package-manager-url: https://formulae.brew.sh/formula/proxygen
version: 2026.05.25.00
license: BSD-3-Clause
category: development
tags:
  - cli
description: Collection of C++ HTTP libraries
source-archive: >
  https://github.com/facebook/proxygen/releases/download/v2026.05.25.00/proxygen-v2026.05.25.00.tar.gz
dependencies:
  - boost
  - c-ares
  - double-conversion
  - fizz
  - fmt
  - folly
  - gflags
  - glog
  - mvfst
  - openssl@3
  - wangle
  - zstd
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: hq
  - exposure: global executable
    kind: cli
    name: proxygen_cocurl
  - exposure: global executable
    kind: cli
    name: proxygen_curl
  - exposure: global executable
    kind: cli
    name: proxygen_echo
  - exposure: global executable
    kind: cli
    name: proxygen_h3datagram_client
  - exposure: global executable
    kind: cli
    name: proxygen_httperf2
  - exposure: global executable
    kind: cli
    name: proxygen_proxy
  - exposure: global executable
    kind: cli
    name: proxygen_push
  - exposure: global executable
    kind: cli
    name: proxygen_static
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:proxygen
  brew: brew install proxygen
  macports: sudo port install proxygen
provenance:
  formula: proxygen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
