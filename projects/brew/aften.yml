id: brew:aften
display-name: aften
homepage: https://aften.sourceforge.net/
repo: https://downloads.sourceforge.net/project/aften/aften/0.0.8/aften-0.0.8.tar.bz2
docs: https://aften.sourceforge.net/
package-manager:
  brew: aften
  macports: aften
  nix: aften
  ubuntu: aften
package-manager-url: https://formulae.brew.sh/formula/aften
version: 0.0.8
license: LGPL-2.1-or-later
category: media
tags:
  - cli
description: Audio encoder which generates ATSC A/52 compressed audio streams
source-archive: https://downloads.sourceforge.net/project/aften/aften/0.0.8/aften-0.0.8.tar.bz2
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: aften
  - exposure: global executable
    kind: cli
    name: wavfilter
  - exposure: global executable
    kind: cli
    name: wavinfo
  - exposure: global executable
    kind: cli
    name: wavrms
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aften
  brew: brew install aften
  macports: sudo port install aften
  nix: nix profile install nixpkgs#aften
  ubuntu: sudo apt install aften
provenance:
  formula: aften
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
