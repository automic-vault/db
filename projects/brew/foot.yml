id: brew:foot
display-name: foot
homepage: https://codeberg.org/dnkl/foot
repo: https://codeberg.org/dnkl/foot/archive/1.27.0.tar.gz
docs: https://codeberg.org/dnkl/foot
package-manager:
  apk: foot
  brew: foot
  debian: foot
  dnf: foot
  nix: foot
  pacman: foot
  ubuntu: foot
  zypper: foot
package-manager-url: https://formulae.brew.sh/formula/foot
version: 1.27.0
license: MIT
category: network
tags:
  - cli
description: Fast, lightweight and minimalistic Wayland terminal emulator
source-archive: https://codeberg.org/dnkl/foot/archive/1.27.0.tar.gz
dependencies:
  - fcft
  - fontconfig
  - freetype
  - libxkbcommon
  - pixman
  - utf8proc
  - wayland
build-dependencies:
  - cmake
  - meson
  - ninja
  - pkgconf
  - scdoc
  - tllist
  - wayland-protocols
executables:
  - exposure: global executable
    kind: cli
    name: foot
  - exposure: global executable
    kind: cli
    name: footclient
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add foot
  av: sudo av install brew:foot
  brew: brew install foot
  debian: sudo apt install foot
  dnf: sudo dnf install foot
  nix: nix profile install nixpkgs#foot
  pacman: sudo pacman -S foot
  ubuntu: sudo apt install foot
  zypper: sudo zypper install foot
provenance:
  formula: foot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
