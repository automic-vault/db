id: brew:kore
display-name: kore
homepage: https://kore.io/
repo: https://kore.io/releases/kore-4.2.3.tar.gz
docs: https://kore.io/
package-manager:
  brew: kore
  nix: kore
  ubuntu: kore
package-manager-url: https://formulae.brew.sh/formula/kore
version: 4.2.3
license: ISC
category: network
tags:
  - cli
description: Web application framework for writing web APIs in C
source-archive: https://kore.io/releases/kore-4.2.3.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: kodev
  - exposure: global executable
    kind: cli
    name: kore
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kore
  brew: brew install kore
  nix: nix profile install nixpkgs#kore
  ubuntu: sudo apt install kore
provenance:
  formula: kore
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
