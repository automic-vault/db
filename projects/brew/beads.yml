id: brew:beads
display-name: beads
homepage: https://github.com/steveyegge/beads
repo: https://github.com/steveyegge/beads
docs: https://github.com/steveyegge/beads
package-manager:
  brew: beads
  debian: beads
  macports: bd
  nix: beads
  ubuntu: beads
  winget: GasTownHall.Beads
package-manager-url: https://formulae.brew.sh/formula/beads
version: 1.0.4
license: MIT
category: development
tags:
  - cli
description: Memory upgrade for your coding agent
source-archive: https://github.com/steveyegge/beads/archive/refs/tags/v1.0.4.tar.gz
dependencies:
  - dolt
  - icu4c@78
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bd
  - exposure: global executable
    kind: cli
    name: beads
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:beads
  brew: brew install beads
  debian: sudo apt install beads
  macports: sudo port install bd
  nix: nix profile install nixpkgs#beads
  ubuntu: sudo apt install beads
  winget: winget install --id GasTownHall.Beads -e
provenance:
  formula: beads
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
