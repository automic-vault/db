id: brew:xmlstarlet
display-name: xmlstarlet
homepage: https://xmlstar.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/xmlstar/xmlstarlet/1.6.1/xmlstarlet-1.6.1.tar.gz
docs: https://xmlstar.sourceforge.net/
package-manager:
  apk: xmlstarlet
  brew: xmlstarlet
  chocolatey: xmlstarlet
  debian: xmlstarlet
  dnf: xmlstarlet
  macports: xmlstarlet
  nix: xmlstarlet
  pacman: xmlstarlet
  scoop: main/xmlstarlet
  ubuntu: xmlstarlet
  zypper: xmlstarlet
package-manager-url: https://formulae.brew.sh/formula/xmlstarlet
version: 1.6.1
license: MIT
category: network
tags:
  - cli
description: XML command-line utilities
source-archive: >
  https://downloads.sourceforge.net/project/xmlstar/xmlstarlet/1.6.1/xmlstarlet-1.6.1.tar.gz
uses-from-macos:
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: xml
  - exposure: global executable
    kind: cli
    name: xmlstarlet
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xmlstarlet
  av: sudo av install brew:xmlstarlet
  brew: brew install xmlstarlet
  chocolatey: choco install xmlstarlet
  debian: sudo apt install xmlstarlet
  dnf: sudo dnf install xmlstarlet
  macports: sudo port install xmlstarlet
  nix: nix profile install nixpkgs#xmlstarlet
  pacman: sudo pacman -S xmlstarlet
  scoop: scoop install main/xmlstarlet
  ubuntu: sudo apt install xmlstarlet
  zypper: sudo zypper install xmlstarlet
provenance:
  formula: xmlstarlet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
