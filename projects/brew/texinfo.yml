id: brew:texinfo
display-name: texinfo
homepage: https://www.gnu.org/software/texinfo/
repo: https://ftpmirror.gnu.org/gnu/texinfo/texinfo-7.3.tar.xz
docs: https://www.gnu.org/software/texinfo/
package-manager:
  apk: texinfo
  brew: texinfo
  debian: texinfo
  dnf: texinfo
  macports: texinfo
  nix: texinfo
  pacman: texinfo
  ubuntu: texinfo
  zypper: texinfo
package-manager-url: https://formulae.brew.sh/formula/texinfo
version: 7.3
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Official documentation format of the GNU project
source-archive: https://ftpmirror.gnu.org/gnu/texinfo/texinfo-7.3.tar.xz
uses-from-macos:
  - ncurses
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: info
  - exposure: global executable
    kind: cli
    name: install-info
  - exposure: global executable
    kind: cli
    name: makeinfo
  - exposure: global executable
    kind: cli
    name: pdftexi2dvi
  - exposure: global executable
    kind: cli
    name: pod2texi
  - exposure: global executable
    kind: cli
    name: texi2any
  - exposure: global executable
    kind: cli
    name: texi2dvi
  - exposure: global executable
    kind: cli
    name: texi2pdf
  - exposure: global executable
    kind: cli
    name: texindex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: true
install-lines:
  apk: sudo apk add texinfo
  av: sudo av install brew:texinfo
  brew: brew install texinfo
  debian: sudo apt install texinfo
  dnf: sudo dnf install texinfo
  macports: sudo port install texinfo
  nix: nix profile install nixpkgs#texinfo
  pacman: sudo pacman -S texinfo
  ubuntu: sudo apt install texinfo
  zypper: sudo zypper install texinfo
provenance:
  formula: texinfo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
