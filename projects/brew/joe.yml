id: brew:joe
display-name: joe
homepage: https://joe-editor.sourceforge.io/
repo: >
  https://downloads.sourceforge.net/project/joe-editor/JOE%20sources/joe-4.8/joe-4.8.tar.gz
docs: https://joe-editor.sourceforge.io/
package-manager:
  apk: joe
  brew: joe
  debian: joe
  dnf: joe
  macports: joe
  nix: joe
  pacman: joe
  scoop: extras/joe
  ubuntu: joe
  zypper: joe
package-manager-url: https://formulae.brew.sh/formula/joe
version: 4.8
license: GPL-1.0-or-later
category: network
tags:
  - cli
description: Full featured terminal-based screen editor
source-archive: >
  https://downloads.sourceforge.net/project/joe-editor/JOE%20sources/joe-4.8/joe-4.8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: jmacs
  - exposure: global executable
    kind: cli
    name: joe
  - exposure: global executable
    kind: cli
    name: jpico
  - exposure: global executable
    kind: cli
    name: jstar
  - exposure: global executable
    kind: cli
    name: rjoe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add joe
  av: sudo av install brew:joe
  brew: brew install joe
  debian: sudo apt install joe
  dnf: sudo dnf install joe
  macports: sudo port install joe
  nix: nix profile install nixpkgs#joe
  pacman: sudo pacman -S joe
  scoop: scoop install extras/joe
  ubuntu: sudo apt install joe
  zypper: sudo zypper install joe
provenance:
  formula: joe
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
