id: brew:git
display-name: git
homepage: https://git-scm.com
repo: https://mirrors.edge.kernel.org/pub/software/scm/git/git-2.54.0.tar.xz
docs: https://git-scm.com
package-manager:
  apk: git
  brew: git
  chocolatey: git
  debian: git
  dnf: git
  macports: git
  nix: git
  pacman: git
  scoop: main/git
  ubuntu: git
  winget: DuckStudio.ChineseGit
  zypper: git
package-manager-url: https://formulae.brew.sh/formula/git
version: 2.54.0
license: GPL-2.0-only AND GPL-2.0-or-later AND LGPL-2.1-or-later AND BSD-3-Clause AND MIT
category: development
tags:
  - cli
  - git
description: Distributed revision control system
source-archive: https://mirrors.edge.kernel.org/pub/software/scm/git/git-2.54.0.tar.xz
dependencies:
  - gettext
  - pcre2
build-dependencies:
  - gettext
  - pkgconf
uses-from-macos:
  - curl
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: git
  - exposure: global executable
    kind: cli
    name: git-cvsserver
  - exposure: global executable
    kind: cli
    name: git-receive-pack
  - exposure: global executable
    kind: cli
    name: git-shell
  - exposure: global executable
    kind: cli
    name: git-upload-archive
  - exposure: global executable
    kind: cli
    name: git-upload-pack
  - exposure: global executable
    kind: cli
    name: scalar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The Tcl/Tk GUIs (e.g. gitk, git-gui) are now in the `git-gui` formula. Subversion
    interoperability (git-svn) is now in the `git-svn` formula.
  post-install-defined: false
install-lines:
  apk: sudo apk add git
  av: sudo av install brew:git
  brew: brew install git
  chocolatey: choco install git
  debian: sudo apt install git
  dnf: sudo dnf install git
  macports: sudo port install git
  nix: nix profile install nixpkgs#git
  pacman: sudo pacman -S git
  scoop: scoop install main/git
  ubuntu: sudo apt install git
  winget: winget install --id DuckStudio.ChineseGit -e
  zypper: sudo zypper install git
provenance:
  formula: git
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
