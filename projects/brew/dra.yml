id: brew:dra
display-name: dra
homepage: https://github.com/devmatteini/dra
repo: https://github.com/devmatteini/dra
docs: https://github.com/devmatteini/dra
package-manager:
  brew: dra
  pacman: dra
  scoop: extras/dra
  winget: CosimoMatteini.DRA
package-manager-url: https://formulae.brew.sh/formula/dra
version: 0.10.1
license: MIT
category: development
tags:
  - cli
description: Command-line tool to download release assets from GitHub
source-archive: https://github.com/devmatteini/dra/archive/refs/tags/0.10.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dra
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dra
  brew: brew install dra
  pacman: sudo pacman -S dra
  scoop: scoop install extras/dra
  winget: winget install --id CosimoMatteini.DRA -e
provenance:
  formula: dra
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
