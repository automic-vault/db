id: brew:moor
display-name: moor
homepage: https://github.com/walles/moor
repo: https://github.com/walles/moor
docs: https://github.com/walles/moor
package-manager:
  apk: moor
  brew: moor
  macports: moor
  nix: moor
  pacman: moor
  scoop: extras/moor
  winget: walles.moor
package-manager-url: https://formulae.brew.sh/formula/moor
version: 2.13.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: Nice to use pager for humans
source-archive: https://github.com/walles/moor/archive/refs/tags/v2.13.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: moar
  - exposure: global executable
    kind: cli
    name: moor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add moor
  av: sudo av install brew:moor
  brew: brew install moor
  macports: sudo port install moor
  nix: nix profile install nixpkgs#moor
  pacman: sudo pacman -S moor
  scoop: scoop install extras/moor
  winget: winget install --id walles.moor -e
provenance:
  formula: moor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
