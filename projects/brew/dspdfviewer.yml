id: brew:dspdfviewer
display-name: dspdfviewer
homepage: https://dspdfviewer.danny-edel.de/
repo: https://github.com/dannyedel/dspdfviewer
docs: https://dspdfviewer.danny-edel.de/
package-manager:
  brew: dspdfviewer
  debian: dspdfviewer
  macports: dspdfviewer
  ubuntu: dspdfviewer
package-manager-url: https://formulae.brew.sh/formula/dspdfviewer
version: 1.15.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Dual-Screen PDF Viewer for latex-beamer
source-archive: https://github.com/dannyedel/dspdfviewer/archive/refs/tags/v1.15.1.tar.gz
dependencies:
  - boost
  - cairo
  - fontconfig
  - freetype
  - gettext
  - glib
  - jpeg-turbo
  - libpng
  - libtiff
  - openjpeg
  - poppler-qt5
  - qt@5
build-dependencies:
  - cmake
  - gobject-introspection
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dspdfviewer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dspdfviewer
  brew: brew install dspdfviewer
  debian: sudo apt install dspdfviewer
  macports: sudo port install dspdfviewer
  ubuntu: sudo apt install dspdfviewer
provenance:
  formula: dspdfviewer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
