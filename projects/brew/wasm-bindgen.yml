id: brew:wasm-bindgen
display-name: wasm-bindgen
homepage: https://wasm-bindgen.github.io/wasm-bindgen/
repo: https://github.com/wasm-bindgen/wasm-bindgen
docs: https://wasm-bindgen.github.io/wasm-bindgen/
package-manager:
  apk: wasm-bindgen
  brew: wasm-bindgen
  pacman: wasm-bindgen
  zypper: wasm-bindgen
package-manager-url: https://formulae.brew.sh/formula/wasm-bindgen
version: 0.2.122
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Facilitating high-level interactions between Wasm modules and JavaScript
source-archive: https://github.com/wasm-bindgen/wasm-bindgen/archive/refs/tags/0.2.122.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: wasm-bindgen
  - exposure: global executable
    kind: cli
    name: wasm-bindgen-test-runner
  - exposure: global executable
    kind: cli
    name: wasm2es6js
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wasm-bindgen
  av: sudo av install brew:wasm-bindgen
  brew: brew install wasm-bindgen
  pacman: sudo pacman -S wasm-bindgen
  zypper: sudo zypper install wasm-bindgen
provenance:
  formula: wasm-bindgen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
