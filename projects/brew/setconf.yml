id: brew:setconf
display-name: setconf
homepage: https://setconf.roboticoverlords.org/
repo: https://setconf.roboticoverlords.org/setconf-0.7.7.tar.xz
docs: https://setconf.roboticoverlords.org/
package-manager:
  apk: setconf
  brew: setconf
  dnf: setconf
  nix: setconf
  pacman: setconf
  zypper: setconf
package-manager-url: https://formulae.brew.sh/formula/setconf
version: 0.7.7
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Utility for easily changing settings in configuration files
source-archive: https://setconf.roboticoverlords.org/setconf-0.7.7.tar.xz
uses-from-macos:
  - python
executables:
  - exposure: global executable
    kind: cli
    name: setconf
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add setconf
  av: sudo av install brew:setconf
  brew: brew install setconf
  dnf: sudo dnf install setconf
  nix: nix profile install nixpkgs#setconf
  pacman: sudo pacman -S setconf
  zypper: sudo zypper install setconf
provenance:
  formula: setconf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
