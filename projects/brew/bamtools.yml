id: brew:bamtools
display-name: bamtools
homepage: https://github.com/pezmaster31/bamtools
repo: https://github.com/pezmaster31/bamtools
docs: https://github.com/pezmaster31/bamtools
package-manager:
  brew: bamtools
  debian: bamtools
  macports: bamtools
  nix: bamtools
  ubuntu: bamtools
package-manager-url: https://formulae.brew.sh/formula/bamtools
version: 2.5.3
license: MIT
category: development
tags:
  - cli
description: C++ API and command-line toolkit for BAM data
source-archive: https://github.com/pezmaster31/bamtools/archive/refs/tags/v2.5.3.tar.gz
dependencies:
  - jsoncpp
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: bamtools
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bamtools
  brew: brew install bamtools
  debian: sudo apt install bamtools
  macports: sudo port install bamtools
  nix: nix profile install nixpkgs#bamtools
  ubuntu: sudo apt install bamtools
provenance:
  formula: bamtools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
