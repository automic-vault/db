id: brew:apib
display-name: apib
homepage: https://github.com/apigee/apib
repo: https://github.com/apigee/apib
docs: https://github.com/apigee/apib
package-manager:
  brew: apib
package-manager-url: https://formulae.brew.sh/formula/apib
version: 1.2.1
license: Apache-2.0
category: development
tags:
  - cli
description: HTTP performance-testing tool
source-archive: https://github.com/apigee/apib/archive/refs/tags/APIB_1_2_1.tar.gz
dependencies:
  - libev
  - openssl@3
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: apib
  - exposure: global executable
    kind: cli
    name: apibmon
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:apib
  brew: brew install apib
provenance:
  formula: apib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
