id: brew:tomcat
display-name: tomcat
homepage: https://tomcat.apache.org/
repo: >
  https://www.apache.org/dyn/closer.lua?path=tomcat/tomcat-11/v11.0.22/bin/apache-tomcat-11.0.22.tar.gz
docs: https://tomcat.apache.org/
package-manager:
  brew: tomcat
  chocolatey: Tomcat
  dnf: tomcat
  nix: tomcat
  scoop: extras/tomcat
  zypper: tomcat
package-manager-url: https://formulae.brew.sh/formula/tomcat
version: 11.0.22
license: Apache-2.0
category: network
tags:
  - cli
description: Implementation of Java Servlet and JavaServer Pages
source-archive: >
  https://www.apache.org/dyn/closer.lua?path=tomcat/tomcat-11/v11.0.22/bin/apache-tomcat-11.0.22.tar.gz
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: catalina
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'Configuration files: $HOMEBREW_PREFIX/etc/tomcat'
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:tomcat
  brew: brew install tomcat
  chocolatey: choco install Tomcat
  dnf: sudo dnf install tomcat
  nix: nix profile install nixpkgs#tomcat
  scoop: scoop install extras/tomcat
  zypper: sudo zypper install tomcat
provenance:
  formula: tomcat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
