id: brew:mummer
display-name: mummer
homepage: https://github.com/mummer4/mummer
repo: https://github.com/mummer4/mummer
docs: https://github.com/mummer4/mummer
package-manager:
  brew: mummer
  debian: mummer
  ubuntu: mummer
package-manager-url: https://formulae.brew.sh/formula/mummer
version: 4.0.1
license: Artistic-2.0
category: development
tags:
  - cli
description: Genome alignment tool
source-archive: https://github.com/mummer4/mummer/releases/download/v4.0.1/mummer-4.0.1.tar.gz
dependencies:
  - gcc
executables:
  - exposure: global executable
    kind: cli
    name: combineMUMs
  - exposure: global executable
    kind: cli
    name: delta-filter
  - exposure: global executable
    kind: cli
    name: dnadiff
  - exposure: global executable
    kind: cli
    name: exact-tandems
  - exposure: global executable
    kind: cli
    name: mummer
  - exposure: global executable
    kind: cli
    name: mummerplot
  - exposure: global executable
    kind: cli
    name: nucmer
  - exposure: global executable
    kind: cli
    name: promer
  - exposure: global executable
    kind: cli
    name: repeat-match
  - exposure: global executable
    kind: cli
    name: show-aligns
  - exposure: global executable
    kind: cli
    name: show-coords
  - exposure: global executable
    kind: cli
    name: show-diff
  - exposure: global executable
    kind: cli
    name: show-snps
  - exposure: global executable
    kind: cli
    name: show-tiling
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mummer
  brew: brew install mummer
  debian: sudo apt install mummer
  ubuntu: sudo apt install mummer
provenance:
  formula: mummer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
