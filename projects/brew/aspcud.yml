id: brew:aspcud
display-name: aspcud
homepage: https://potassco.org/aspcud/
repo: https://github.com/potassco/aspcud
docs: https://potassco.org/aspcud/
package-manager:
  apk: aspcud
  brew: aspcud
  debian: aspcud
  macports: aspcud
  nix: aspcud
  ubuntu: aspcud
package-manager-url: https://formulae.brew.sh/formula/aspcud
version: 1.9.6
license: MIT
category: development
tags:
  - cli
description: Package dependency solver
source-archive: https://github.com/potassco/aspcud/archive/refs/tags/v1.9.6.tar.gz
dependencies:
  - clingo
build-dependencies:
  - boost
  - cmake
  - re2c
executables:
  - exposure: global executable
    kind: cli
    name: aspcud
  - exposure: global executable
    kind: cli
    name: cudf2lp
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add aspcud
  av: sudo av install brew:aspcud
  brew: brew install aspcud
  debian: sudo apt install aspcud
  macports: sudo port install aspcud
  nix: nix profile install nixpkgs#aspcud
  ubuntu: sudo apt install aspcud
provenance:
  formula: aspcud
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
