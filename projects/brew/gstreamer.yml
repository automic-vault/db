id: brew:gstreamer
display-name: gstreamer
homepage: https://gstreamer.freedesktop.org/
repo: >
  https://gitlab.freedesktop.org/gstreamer/gstreamer/-/archive/1.28.3/gstreamer-1.28.3.tar.bz2
docs: https://gstreamer.freedesktop.org/
package-manager:
  apk: gstreamer
  brew: gstreamer
  chocolatey: gstreamer
  pacman: gstreamer
  winget: gstreamerproject.gstreamer
  zypper: gstreamer
package-manager-url: https://formulae.brew.sh/formula/gstreamer
version: 1.28.3
license: LGPL-2.0-or-later AND LGPL-2.1-or-later AND MIT
category: development
tags:
  - cli
description: Development framework for multimedia applications
source-archive: >
  https://gitlab.freedesktop.org/gstreamer/gstreamer/-/archive/1.28.3/gstreamer-1.28.3.tar.bz2
dependencies:
  - aom
  - cairo
  - dav1d
  - faac
  - faad2
  - fdk-aac
  - ffmpeg
  - flac
  - gdk-pixbuf
  - gettext
  - glib
  - graphene
  - gtk+3
  - gtk4
  - harfbuzz
  - imath
  - jpeg-turbo
  - json-glib
  - lame
  - libass
  - libnice
  - libogg
  - libpng
  - librsvg
  - libshout
  - libsndfile
  - libsodium
  - libsoup
  - libusrsctp
  - libvmaf
  - libvorbis
  - libvpx
  - libx11
  - libxcb
  - libxext
  - libxfixes
  - libxi
  - libxtst
  - little-cms2
  - mpg123
  - musepack
  - nettle
  - opencore-amr
  - openexr
  - openjpeg
  - openssl@3
  - opus
  - orc
  - pango
  - pygobject3
  - python@3.14
  - rtmpdump
  - speex
  - srt
  - srtp
  - svt-av1
  - taglib
  - theora
  - webp
  - x264
  - x265
build-dependencies:
  - bison
  - cargo-c
  - cmake
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: ges-launch-1.0
  - exposure: global executable
    kind: cli
    name: gst-device-monitor-1.0
  - exposure: global executable
    kind: cli
    name: gst-discoverer-1.0
  - exposure: global executable
    kind: cli
    name: gst-dots-viewer
  - exposure: global executable
    kind: cli
    name: gst-inspect-1.0
  - exposure: global executable
    kind: cli
    name: gst-launch-1.0
  - exposure: global executable
    kind: cli
    name: gst-play-1.0
  - exposure: global executable
    kind: cli
    name: gst-stats-1.0
  - exposure: global executable
    kind: cli
    name: gst-transcoder-1.0
  - exposure: global executable
    kind: cli
    name: gst-typefind-1.0
  - exposure: global executable
    kind: cli
    name: gst-validate-1.0
  - exposure: global executable
    kind: cli
    name: gst-validate-images-check-1.0
  - exposure: global executable
    kind: cli
    name: gst-validate-launcher
  - exposure: global executable
    kind: cli
    name: gst-validate-media-check-1.0
  - exposure: global executable
    kind: cli
    name: gst-validate-rtsp-server-1.0
  - exposure: global executable
    kind: cli
    name: gst-validate-transcoding-1.0
  - exposure: global executable
    kind: cli
    name: gst-webrtc-signalling-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    All gst-* GStreamer plugins are now bundled in this formula. For GStreamer to find
    your own plugins, add their paths to `GST_PLUGIN_PATH`. For example, if you have
    plugins in `~/.local/lib/gstreamer-1.0`: export
    GST_PLUGIN_PATH="~/.local/lib/gstreamer-1.0" Do not install plugins into GStreamer's
    prefix. They will be deleted by `brew upgrade`.
  post-install-defined: false
install-lines:
  apk: sudo apk add gstreamer
  av: sudo av install brew:gstreamer
  brew: brew install gstreamer
  chocolatey: choco install gstreamer
  pacman: sudo pacman -S gstreamer
  winget: winget install --id gstreamerproject.gstreamer -e
  zypper: sudo zypper install gstreamer
provenance:
  formula: gstreamer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
