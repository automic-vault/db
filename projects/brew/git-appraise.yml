id: brew:git-appraise
display-name: git-appraise
homepage: https://github.com/google/git-appraise
repo: https://github.com/google/git-appraise
docs: https://github.com/google/git-appraise
package-manager:
  brew: git-appraise
  nix: git-appraise
package-manager-url: https://formulae.brew.sh/formula/git-appraise
version: 0.7
license: Apache-2.0
category: development
tags:
  - cli
  - git
description: Distributed code review system for Git repos
source-archive: https://github.com/google/git-appraise/archive/refs/tags/v0.7.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: git-appraise
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:git-appraise
  brew: brew install git-appraise
  nix: nix profile install nixpkgs#git-appraise
provenance:
  formula: git-appraise
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
