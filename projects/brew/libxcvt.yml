id: brew:libxcvt
display-name: libxcvt
homepage: https://www.x.org
repo: https://www.x.org/releases/individual/lib/libxcvt-0.1.3.tar.xz
docs: https://www.x.org
package-manager:
  apk: libxcvt
  brew: libxcvt
  dnf: libxcvt
  nix: libxcvt
  pacman: libxcvt
  zypper: libxcvt
package-manager-url: https://formulae.brew.sh/formula/libxcvt
version: 0.1.3
license: MIT
category: network
tags:
  - cli
description: VESA CVT standard timing modelines generator
source-archive: https://www.x.org/releases/individual/lib/libxcvt-0.1.3.tar.xz
build-dependencies:
  - meson
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: cvt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libxcvt
  av: sudo av install brew:libxcvt
  brew: brew install libxcvt
  dnf: sudo dnf install libxcvt
  nix: nix profile install nixpkgs#libxcvt
  pacman: sudo pacman -S libxcvt
  zypper: sudo zypper install libxcvt
provenance:
  formula: libxcvt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
