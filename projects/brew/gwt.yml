id: brew:gwt
display-name: gwt
homepage: https://www.gwtproject.org/
repo: https://github.com/gwtproject/gwt
docs: https://www.gwtproject.org/
package-manager:
  brew: gwt
package-manager-url: https://formulae.brew.sh/formula/gwt
version: 2.13.0
license: Apache-2.0
category: development
tags:
  - cli
description: Google web toolkit
source-archive: https://github.com/gwtproject/gwt/releases/download/2.13.0/gwt-2.13.0.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: i18nCreator
  - exposure: global executable
    kind: cli
    name: webAppCreator
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gwt
  brew: brew install gwt
provenance:
  formula: gwt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
