id: brew:apache-brooklyn-cli
display-name: apache-brooklyn-cli
homepage: https://brooklyn.apache.org
repo: https://github.com/apache/brooklyn-client
docs: https://brooklyn.apache.org
package-manager:
  brew: apache-brooklyn-cli
package-manager-url: https://formulae.brew.sh/formula/apache-brooklyn-cli
version: 1.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: Apache Brooklyn command-line interface
source-archive: >
  https://github.com/apache/brooklyn-client/archive/refs/tags/rel/apache-brooklyn-1.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: br
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:apache-brooklyn-cli
  brew: brew install apache-brooklyn-cli
provenance:
  formula: apache-brooklyn-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
