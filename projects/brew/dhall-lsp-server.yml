id: brew:dhall-lsp-server
display-name: dhall-lsp-server
homepage: https://github.com/dhall-lang/dhall-haskell/tree/main/dhall-lsp-server
repo: https://hackage.haskell.org/package/dhall-lsp-server-1.1.4/dhall-lsp-server-1.1.4.tar.gz
docs: https://github.com/dhall-lang/dhall-haskell/tree/main/dhall-lsp-server
package-manager:
  brew: dhall-lsp-server
  nix: dhall-lsp-server
  pacman: dhall-lsp-server
package-manager-url: https://formulae.brew.sh/formula/dhall-lsp-server
version: 1.1.4
license: BSD-3-Clause
category: development
tags:
  - cli
description: Language Server Protocol (LSP) server for Dhall
source-archive: https://hackage.haskell.org/package/dhall-lsp-server-1.1.4/dhall-lsp-server-1.1.4.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: dhall-lsp-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dhall-lsp-server
  brew: brew install dhall-lsp-server
  nix: nix profile install nixpkgs#dhall-lsp-server
  pacman: sudo pacman -S dhall-lsp-server
provenance:
  formula: dhall-lsp-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
