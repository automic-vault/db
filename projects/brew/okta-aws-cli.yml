id: brew:okta-aws-cli
display-name: okta-aws-cli
homepage: https://github.com/okta/okta-aws-cli
repo: https://github.com/okta/okta-aws-cli
docs: https://github.com/okta/okta-aws-cli
package-manager:
  brew: okta-aws-cli
  nix: okta-aws-cli
package-manager-url: https://formulae.brew.sh/formula/okta-aws-cli
version: 2.6.0
license: Apache-2.0
category: cloud
tags:
  - aws
  - cli
description: Okta federated identity for AWS CLI
source-archive: https://github.com/okta/okta-aws-cli/archive/refs/tags/v2.6.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: okta-aws-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:okta-aws-cli
  brew: brew install okta-aws-cli
  nix: nix profile install nixpkgs#okta-aws-cli
provenance:
  formula: okta-aws-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
