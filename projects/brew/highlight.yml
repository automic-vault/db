id: brew:highlight
display-name: highlight
homepage: http://andre-simon.de/doku/highlight/en/highlight.php
repo: https://gitlab.com/saalen/highlight/-/archive/v4.20/highlight-v4.20.tar.gz
docs: http://andre-simon.de/doku/highlight/en/highlight.php
package-manager:
  apk: highlight
  brew: highlight
  chocolatey: highlight
  debian: highlight
  dnf: highlight
  macports: highlight
  nix: highlight
  pacman: highlight
  scoop: main/highlight
  ubuntu: highlight
  zypper: highlight
package-manager-url: https://formulae.brew.sh/formula/highlight
version: 4.20
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Convert source code to formatted text with syntax highlighting
source-archive: https://gitlab.com/saalen/highlight/-/archive/v4.20/highlight-v4.20.tar.gz
dependencies:
  - lua
build-dependencies:
  - boost
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: highlight
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add highlight
  av: sudo av install brew:highlight
  brew: brew install highlight
  chocolatey: choco install highlight
  debian: sudo apt install highlight
  dnf: sudo dnf install highlight
  macports: sudo port install highlight
  nix: nix profile install nixpkgs#highlight
  pacman: sudo pacman -S highlight
  scoop: scoop install main/highlight
  ubuntu: sudo apt install highlight
  zypper: sudo zypper install highlight
provenance:
  formula: highlight
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
