id: brew:yara-x
display-name: yara-x
homepage: https://virustotal.github.io/yara-x/
repo: https://github.com/VirusTotal/yara-x
docs: https://virustotal.github.io/yara-x/
package-manager:
  brew: yara-x
  nix: yara-x
  scoop: main/yara-x
  winget: VirusTotal.YARA-X
package-manager-url: https://formulae.brew.sh/formula/yara-x
version: 1.16.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Tool to do pattern matching for malware research
source-archive: https://github.com/VirusTotal/yara-x/archive/refs/tags/v1.16.0.tar.gz
build-dependencies:
  - cargo-c
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: yr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:yara-x
  brew: brew install yara-x
  nix: nix profile install nixpkgs#yara-x
  scoop: scoop install main/yara-x
  winget: winget install --id VirusTotal.YARA-X -e
provenance:
  formula: yara-x
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
