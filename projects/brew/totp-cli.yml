id: brew:totp-cli
display-name: totp-cli
homepage: https://yitsushi.github.io/totp-cli/
repo: https://github.com/yitsushi/totp-cli
docs: https://yitsushi.github.io/totp-cli/
package-manager:
  brew: totp-cli
  macports: totp-cli
  nix: totp-cli
  winget: yitsushi.totp-cli
package-manager-url: https://formulae.brew.sh/formula/totp-cli
version: 1.9.2
license: MIT
category: development
tags:
  - cli
description: Authy/Google Authenticator like TOTP CLI tool written in Go
source-archive: https://github.com/yitsushi/totp-cli/archive/refs/tags/v1.9.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: totp-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:totp-cli
  brew: brew install totp-cli
  macports: sudo port install totp-cli
  nix: nix profile install nixpkgs#totp-cli
  winget: winget install --id yitsushi.totp-cli -e
provenance:
  formula: totp-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
