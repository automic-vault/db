id: brew:pulumictl
display-name: pulumictl
homepage: https://github.com/pulumi/pulumictl
repo: https://github.com/pulumi/pulumictl
docs: https://github.com/pulumi/pulumictl
package-manager:
  brew: pulumictl
  nix: pulumictl
package-manager-url: https://formulae.brew.sh/formula/pulumictl
version: 0.0.50
license: Apache-2.0
category: development
tags:
  - cli
description: Swiss army knife for Pulumi development
source-archive: https://github.com/pulumi/pulumictl/archive/refs/tags/v0.0.50.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pulumictl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pulumictl
  brew: brew install pulumictl
  nix: nix profile install nixpkgs#pulumictl
provenance:
  formula: pulumictl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
