id: brew:libemf2svg
display-name: libemf2svg
homepage: https://github.com/kakwa/libemf2svg
repo: https://github.com/kakwa/libemf2svg
docs: https://github.com/kakwa/libemf2svg
package-manager:
  apk: libemf2svg
  brew: libemf2svg
  nix: libemf2svg
  zypper: emf2svg-conv
package-manager-url: https://formulae.brew.sh/formula/libemf2svg
version: 1.8.1
license: GPL-2.0-only
category: development
tags:
  - cli
description: Microsoft (MS) EMF to SVG conversion library
source-archive: https://github.com/kakwa/libemf2svg/archive/refs/tags/1.8.1.tar.gz
dependencies:
  - fontconfig
  - freetype
  - libpng
build-dependencies:
  - argp-standalone
  - cmake
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: emf2svg-conv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libemf2svg
  av: sudo av install brew:libemf2svg
  brew: brew install libemf2svg
  nix: nix profile install nixpkgs#libemf2svg
  zypper: sudo zypper install emf2svg-conv
provenance:
  formula: libemf2svg
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
