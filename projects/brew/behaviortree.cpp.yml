id: brew:behaviortree.cpp
display-name: behaviortree.cpp
homepage: https://www.behaviortree.dev/
repo: https://github.com/BehaviorTree/BehaviorTree.CPP
docs: https://www.behaviortree.dev/
package-manager:
  brew: behaviortree.cpp
package-manager-url: https://formulae.brew.sh/formula/behaviortree.cpp
version: 4.9.0
license: MIT
category: development
tags:
  - cli
description: Behavior Trees Library in C++
source-archive: https://github.com/BehaviorTree/BehaviorTree.CPP/archive/refs/tags/4.9.0.tar.gz
dependencies:
  - cppzmq
  - zeromq
build-dependencies:
  - cmake
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: bt4_nodes_model
  - exposure: global executable
    kind: cli
    name: bt4_plugin_manifest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:behaviortree.cpp
  brew: brew install behaviortree.cpp
provenance:
  formula: behaviortree.cpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
