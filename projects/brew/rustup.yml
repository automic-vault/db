id: brew:rustup
display-name: rustup
homepage: https://rust-lang.github.io/rustup/
repo: https://github.com/rust-lang/rustup
docs: https://rust-lang.github.io/rustup/
package-manager:
  apk: rustup
  brew: rustup
  chocolatey: rust-analyzer
  debian: rustup
  dnf: rustup
  macports: rustup
  nix: rustup
  pacman: rustup
  scoop: main/rustup
  ubuntu: rustup
  zypper: rustup
package-manager-url: https://formulae.brew.sh/formula/rustup
version: 1.29.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Rust toolchain installer
source-archive: https://github.com/rust-lang/rustup/archive/refs/tags/1.29.0.tar.gz
build-dependencies:
  - rust
uses-from-macos:
  - curl
  - xz
executables:
  - exposure: global executable
    kind: cli
    name: cargo-miri
  - exposure: global executable
    kind: cli
    name: rls
  - exposure: global executable
    kind: cli
    name: rust-analyzer
  - exposure: global executable
    kind: cli
    name: rustup
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To use rustup, ensure you have "$(brew --prefix rustup)/bin" in your $PATH:
    [4mhttps://rust-lang.github.io/rustup/installation/already-installed-rust.html[24m
    This formula does not provide `rustup-init`.
  post-install-defined: true
install-lines:
  apk: sudo apk add rustup
  av: sudo av install brew:rustup
  brew: brew install rustup
  chocolatey: choco install rust-analyzer
  debian: sudo apt install rustup
  dnf: sudo dnf install rustup
  macports: sudo port install rustup
  nix: nix profile install nixpkgs#rustup
  pacman: sudo pacman -S rustup
  scoop: scoop install main/rustup
  ubuntu: sudo apt install rustup
  zypper: sudo zypper install rustup
provenance:
  formula: rustup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
