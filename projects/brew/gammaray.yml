id: brew:gammaray
display-name: gammaray
homepage: https://www.kdab.com/software-technologies/developer-tools/gammaray/
repo: https://github.com/KDAB/GammaRay
docs: https://www.kdab.com/software-technologies/developer-tools/gammaray/
package-manager:
  apk: gammaray
  brew: gammaray
  debian: gammaray
  dnf: gammaray
  nix: gammaray
  pacman: gammaray
  ubuntu: gammaray
package-manager-url: https://formulae.brew.sh/formula/gammaray
version: 3.4.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Examine and manipulate Qt application internals at runtime
source-archive: https://github.com/KDAB/GammaRay/releases/download/v3.4.0/gammaray-3.4.0.tar.gz
dependencies:
  - graphviz
  - qt3d
  - qtbase
  - qtconnectivity
  - qtdeclarative
  - qtlocation
  - qtpositioning
  - qtscxml
  - qtsvg
  - qttools
  - qtwebchannel
  - qtwebengine
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: gammaray
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gammaray
  av: sudo av install brew:gammaray
  brew: brew install gammaray
  debian: sudo apt install gammaray
  dnf: sudo dnf install gammaray
  nix: nix profile install nixpkgs#gammaray
  pacman: sudo pacman -S gammaray
  ubuntu: sudo apt install gammaray
provenance:
  formula: gammaray
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
