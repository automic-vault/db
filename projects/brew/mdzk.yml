id: brew:mdzk
display-name: mdzk
homepage: https://mdzk.app/
repo: https://github.com/mdzk-rs/mdzk
docs: https://mdzk.app/
package-manager:
  brew: mdzk
  nix: mdzk
package-manager-url: https://formulae.brew.sh/formula/mdzk
version: 0.5.2
license: MPL-2.0
category: development
tags:
  - cli
description: Plain text Zettelkasten based on mdBook
source-archive: https://github.com/mdzk-rs/mdzk/archive/refs/tags/0.5.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mdzk
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mdzk
  brew: brew install mdzk
  nix: nix profile install nixpkgs#mdzk
provenance:
  formula: mdzk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
