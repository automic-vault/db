id: brew:faketty
display-name: faketty
homepage: https://github.com/dtolnay/faketty
repo: https://github.com/dtolnay/faketty
docs: https://github.com/dtolnay/faketty
package-manager:
  brew: faketty
  nix: faketty
package-manager-url: https://formulae.brew.sh/formula/faketty
version: 1.0.20
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Wrapper to exec a command in a pty, even if redirecting the output
source-archive: https://github.com/dtolnay/faketty/archive/refs/tags/1.0.20.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: faketty
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:faketty
  brew: brew install faketty
  nix: nix profile install nixpkgs#faketty
provenance:
  formula: faketty
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
