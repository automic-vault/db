id: brew:sispmctl
display-name: sispmctl
homepage: https://sispmctl.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/sispmctl/sispmctl/sispmctl-4.12/sispmctl-4.12.tar.gz
docs: https://sispmctl.sourceforge.net/
package-manager:
  brew: sispmctl
  debian: sispmctl
  macports: sispmctl
  nix: sispmctl
  ubuntu: sispmctl
  zypper: sispmctl
package-manager-url: https://formulae.brew.sh/formula/sispmctl
version: 4.12
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Control Gembird SIS-PM programmable power outlet strips
source-archive: >
  https://downloads.sourceforge.net/project/sispmctl/sispmctl/sispmctl-4.12/sispmctl-4.12.tar.gz
dependencies:
  - libusb-compat
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: sispmctl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sispmctl
  brew: brew install sispmctl
  debian: sudo apt install sispmctl
  macports: sudo port install sispmctl
  nix: nix profile install nixpkgs#sispmctl
  ubuntu: sudo apt install sispmctl
  zypper: sudo zypper install sispmctl
provenance:
  formula: sispmctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
