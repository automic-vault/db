id: brew:amass
display-name: amass
homepage: https://owasp.org/www-project-amass/
repo: https://github.com/owasp-amass/amass
docs: https://owasp.org/www-project-amass/
package-manager:
  brew: amass
  macports: amass
  nix: amass
  scoop: main/amass
  winget: OWASP.Amass
package-manager-url: https://formulae.brew.sh/formula/amass
version: 5.1.1
license: Apache-2.0
category: development
tags:
  - cli
description: In-depth attack surface mapping and asset discovery
source-archive: https://github.com/owasp-amass/amass/archive/refs/tags/v5.1.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: amass
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:amass
  brew: brew install amass
  macports: sudo port install amass
  nix: nix profile install nixpkgs#amass
  scoop: scoop install main/amass
  winget: winget install --id OWASP.Amass -e
provenance:
  formula: amass
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
