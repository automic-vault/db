id: brew:xnvme
display-name: xnvme
homepage: https://xnvme.io/
repo: https://github.com/xnvme/xnvme
docs: https://xnvme.io/
package-manager:
  apk: xnvme
  brew: xnvme
  dnf: xnvme
package-manager-url: https://formulae.brew.sh/formula/xnvme
version: 0.7.5
license: BSD-3-Clause
category: development
tags:
  - cli
description: Cross-platform libraries and tools for efficient I/O and low-level control
source-archive: https://github.com/xnvme/xnvme/releases/download/v0.7.5/xnvme-fat-0.7.5.tar.gz
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: kvs
  - exposure: global executable
    kind: cli
    name: lblk
  - exposure: global executable
    kind: cli
    name: xdd
  - exposure: global executable
    kind: cli
    name: xnvme
  - exposure: global executable
    kind: cli
    name: xnvme-driver
  - exposure: global executable
    kind: cli
    name: xnvme_file
  - exposure: global executable
    kind: cli
    name: zoned
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xnvme
  av: sudo av install brew:xnvme
  brew: brew install xnvme
  dnf: sudo dnf install xnvme
provenance:
  formula: xnvme
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
