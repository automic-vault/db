id: brew:entr
display-name: entr
homepage: https://eradman.com/entrproject/
repo: https://eradman.com/entrproject/code/entr-5.8.tar.gz
docs: https://eradman.com/entrproject/
package-manager:
  apk: entr
  brew: entr
  debian: entr
  dnf: entr
  macports: entr
  nix: entr
  pacman: entr
  ubuntu: entr
  zypper: entr
package-manager-url: https://formulae.brew.sh/formula/entr
version: 5.8
license: ISC
category: network
tags:
  - cli
description: Run arbitrary commands when files change
source-archive: https://eradman.com/entrproject/code/entr-5.8.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: entr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add entr
  av: sudo av install brew:entr
  brew: brew install entr
  debian: sudo apt install entr
  dnf: sudo dnf install entr
  macports: sudo port install entr
  nix: nix profile install nixpkgs#entr
  pacman: sudo pacman -S entr
  ubuntu: sudo apt install entr
  zypper: sudo zypper install entr
provenance:
  formula: entr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
