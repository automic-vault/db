id: brew:web-ext
display-name: web-ext
homepage: https://github.com/mozilla/web-ext
repo: https://registry.npmjs.org/web-ext/-/web-ext-10.2.0.tgz
docs: https://github.com/mozilla/web-ext
package-manager:
  brew: web-ext
  macports: web-ext
  nix: web-ext
package-manager-url: https://formulae.brew.sh/formula/web-ext
version: 10.2.0
license: MPL-2.0
category: development
tags:
  - cli
description: Command-line tool to help build, run, and test web extensions
source-archive: https://registry.npmjs.org/web-ext/-/web-ext-10.2.0.tgz
dependencies:
  - node
  - terminal-notifier
executables:
