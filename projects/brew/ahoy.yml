id: brew:ahoy
display-name: ahoy
homepage: https://github.com/ahoy-cli/ahoy/
repo: https://github.com/ahoy-cli/ahoy
docs: https://github.com/ahoy-cli/ahoy/
package-manager:
  brew: ahoy
  nix: ahoy
  scoop: main/ahoy
  winget: Ahoy.Ahoy
package-manager-url: https://formulae.brew.sh/formula/ahoy
version: 2.5.0
license: MIT
category: development
tags:
  - cli
  - yaml
description: Creates self documenting CLI programs from commands in YAML files
source-archive: https://github.com/ahoy-cli/ahoy/archive/refs/tags/v2.5.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ahoy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ahoy
  brew: brew install ahoy
  nix: nix profile install nixpkgs#ahoy
  scoop: scoop install main/ahoy
  winget: winget install --id Ahoy.Ahoy -e
provenance:
  formula: ahoy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
