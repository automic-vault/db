id: brew:tpix
display-name: tpix
homepage: https://github.com/jesvedberg/tpix
repo: https://github.com/jesvedberg/tpix
docs: https://github.com/jesvedberg/tpix
package-manager:
  brew: tpix
package-manager-url: https://formulae.brew.sh/formula/tpix
version: 1.0.3
license: MIT
category: development
tags:
  - cli
description: Simple terminal image viewer using the Kitty graphics protocol
source-archive: https://github.com/jesvedberg/tpix/archive/refs/tags/v1.0.3.tar.gz
build-dependencies:
  - nim
executables:
  - exposure: global executable
    kind: cli
    name: tpix
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tpix
  brew: brew install tpix
provenance:
  formula: tpix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
