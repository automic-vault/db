id: brew:killport
display-name: killport
homepage: https://github.com/jkfran/killport
repo: https://github.com/jkfran/killport
docs: https://github.com/jkfran/killport
package-manager:
  brew: killport
  macports: killport
  nix: killport
  zypper: killport
package-manager-url: https://formulae.brew.sh/formula/killport
version: 2.0.0
license: MIT
category: development
tags:
  - cli
description: Command-line tool to kill processes listening on a specific port
source-archive: https://github.com/jkfran/killport/archive/refs/tags/v2.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: killport
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:killport
  brew: brew install killport
  macports: sudo port install killport
  nix: nix profile install nixpkgs#killport
  zypper: sudo zypper install killport
provenance:
  formula: killport
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
