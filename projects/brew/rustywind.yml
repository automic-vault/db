id: brew:rustywind
display-name: rustywind
homepage: https://github.com/avencera/rustywind
repo: https://github.com/avencera/rustywind
docs: https://github.com/avencera/rustywind
package-manager:
  brew: rustywind
  nix: rustywind
package-manager-url: https://formulae.brew.sh/formula/rustywind
version: 0.24.3
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for organizing Tailwind CSS classes
source-archive: https://github.com/avencera/rustywind/archive/refs/tags/v0.24.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rustywind
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rustywind
  brew: brew install rustywind
  nix: nix profile install nixpkgs#rustywind
provenance:
  formula: rustywind
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
