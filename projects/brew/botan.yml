id: brew:botan
display-name: botan
homepage: https://botan.randombit.net/
repo: https://botan.randombit.net/releases/Botan-3.12.0.tar.xz
docs: https://botan.randombit.net/
package-manager:
  brew: botan
  debian: botan
  dnf: botan
  macports: botan
  pacman: botan
  ubuntu: botan
  zypper: Botan
package-manager-url: https://formulae.brew.sh/formula/botan
version: 3.12.0
license: BSD-2-Clause
category: security
tags:
  - cli
description: Cryptographic algorithms and formats library in C++
source-archive: https://botan.randombit.net/releases/Botan-3.12.0.tar.xz
dependencies:
  - ca-certificates
  - python@3.14
  - sqlite
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: botan
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:botan
  brew: brew install botan
  debian: sudo apt install botan
  dnf: sudo dnf install botan
  macports: sudo port install botan
  pacman: sudo pacman -S botan
  ubuntu: sudo apt install botan
  zypper: sudo zypper install Botan
provenance:
  formula: botan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
