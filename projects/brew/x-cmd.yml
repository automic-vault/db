id: brew:x-cmd
display-name: x-cmd
homepage: https://x-cmd.com
repo: https://github.com/x-cmd/x-cmd
docs: https://x-cmd.com
package-manager:
  brew: x-cmd
package-manager-url: https://formulae.brew.sh/formula/x-cmd
version: 0.9.4
license: Apache-2.0 AND MIT AND BSD-3-Clause
category: development
tags:
  - cli
description: Bootstrap 1000+ command-line tools in seconds
source-archive: https://github.com/x-cmd/x-cmd/archive/refs/tags/v0.9.4.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: x-cmd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:x-cmd
  brew: brew install x-cmd
provenance:
  formula: x-cmd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
