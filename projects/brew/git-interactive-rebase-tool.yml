id: brew:git-interactive-rebase-tool
display-name: git-interactive-rebase-tool
homepage: https://gitrebasetool.mitmaro.ca/
repo: https://github.com/MitMaro/git-interactive-rebase-tool
docs: https://gitrebasetool.mitmaro.ca/
package-manager:
  apk: git-interactive-rebase-tool
  brew: git-interactive-rebase-tool
  dnf: git-interactive-rebase-tool
  macports: git-interactive-rebase-tool
  nix: git-interactive-rebase-tool
  scoop: main/git-interactive-rebase-tool
package-manager-url: https://formulae.brew.sh/formula/git-interactive-rebase-tool
version: 2.4.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
  - git
description: Native sequence editor for Git interactive rebase
source-archive: https://github.com/MitMaro/git-interactive-rebase-tool/archive/refs/tags/2.4.1.tar.gz
dependencies:
  - libgit2
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: interactive-rebase-tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-interactive-rebase-tool
  av: sudo av install brew:git-interactive-rebase-tool
  brew: brew install git-interactive-rebase-tool
  dnf: sudo dnf install git-interactive-rebase-tool
  macports: sudo port install git-interactive-rebase-tool
  nix: nix profile install nixpkgs#git-interactive-rebase-tool
  scoop: scoop install main/git-interactive-rebase-tool
provenance:
  formula: git-interactive-rebase-tool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
