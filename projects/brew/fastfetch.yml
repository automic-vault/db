id: brew:fastfetch
display-name: fastfetch
homepage: https://github.com/fastfetch-cli/fastfetch
repo: https://github.com/fastfetch-cli/fastfetch
docs: https://github.com/fastfetch-cli/fastfetch
package-manager:
  apk: fastfetch
  brew: fastfetch
  chocolatey: fastfetch
  debian: fastfetch
  dnf: fastfetch
  macports: fastfetch
  nix: fastfetch
  pacman: fastfetch
  scoop: main/fastfetch
  winget: Fastfetch-cli.Fastfetch
  zypper: fastfetch
package-manager-url: https://formulae.brew.sh/formula/fastfetch
version: 2.63.1
license: MIT
category: development
tags:
  - cli
description: Like neofetch, but much faster because written mostly in C
source-archive: https://github.com/fastfetch-cli/fastfetch/archive/refs/tags/2.63.1.tar.gz
dependencies:
  - yyjson
build-dependencies:
  - chafa
  - cmake
  - glib
  - imagemagick
  - pkgconf
  - python@3.14
  - vulkan-loader
executables:
  - exposure: global executable
    kind: cli
    name: fastfetch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fastfetch
  av: sudo av install brew:fastfetch
  brew: brew install fastfetch
  chocolatey: choco install fastfetch
  debian: sudo apt install fastfetch
  dnf: sudo dnf install fastfetch
  macports: sudo port install fastfetch
  nix: nix profile install nixpkgs#fastfetch
  pacman: sudo pacman -S fastfetch
  scoop: scoop install main/fastfetch
  winget: winget install --id Fastfetch-cli.Fastfetch -e
  zypper: sudo zypper install fastfetch
provenance:
  formula: fastfetch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
