id: brew:libpcap
display-name: libpcap
homepage: https://www.tcpdump.org/
repo: https://www.tcpdump.org/release/libpcap-1.10.6.tar.gz
docs: https://www.tcpdump.org/
package-manager:
  apk: libpcap
  brew: libpcap
  dnf: libpcap
  macports: libpcap
  nix: libpcap
  pacman: libpcap
package-manager-url: https://formulae.brew.sh/formula/libpcap
version: 1.10.6
license: BSD-3-Clause
category: network
tags:
  - cli
description: Portable library for network traffic capture
source-archive: https://www.tcpdump.org/release/libpcap-1.10.6.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: pcap-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libpcap
  av: sudo av install brew:libpcap
  brew: brew install libpcap
  dnf: sudo dnf install libpcap
  macports: sudo port install libpcap
  nix: nix profile install nixpkgs#libpcap
  pacman: sudo pacman -S libpcap
provenance:
  formula: libpcap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
