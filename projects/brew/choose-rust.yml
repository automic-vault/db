id: brew:choose-rust
display-name: choose-rust
homepage: https://github.com/theryangeary/choose
repo: https://github.com/theryangeary/choose
docs: https://github.com/theryangeary/choose
package-manager:
  apk: choose
  brew: choose-rust
  macports: choose
  nix: choose
  pacman: choose
  zypper: choose
package-manager-url: https://formulae.brew.sh/formula/choose-rust
version: 1.3.7
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Human-friendly and fast alternative to cut and (sometimes) awk
source-archive: https://github.com/theryangeary/choose/archive/refs/tags/v1.3.7.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: choose
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add choose
  av: sudo av install brew:choose-rust
  brew: brew install choose-rust
  macports: sudo port install choose
  nix: nix profile install nixpkgs#choose
  pacman: sudo pacman -S choose
  zypper: sudo zypper install choose
provenance:
  formula: choose-rust
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
