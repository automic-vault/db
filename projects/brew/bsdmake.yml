id: brew:bsdmake
display-name: bsdmake
homepage: https://opensource.apple.com/
repo: https://github.com/apple-oss-distributions/bsdmake
docs: https://opensource.apple.com/
package-manager:
  brew: bsdmake
  macports: bsdmake
package-manager-url: https://formulae.brew.sh/formula/bsdmake
version: 24
license: BSD-2-Clause AND BSD-3-Clause AND BSD-4-Clause-UC
category: development
tags:
  - cli
description: BSD version of the Make build tool
source-archive: https://github.com/apple-oss-distributions/bsdmake/archive/refs/tags/bsdmake-24.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: bsdmake
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bsdmake
  brew: brew install bsdmake
  macports: sudo port install bsdmake
provenance:
  formula: bsdmake
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
