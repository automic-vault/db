id: brew:cxxtest
display-name: cxxtest
homepage: https://github.com/CxxTest/cxxtest
repo: https://github.com/CxxTest/cxxtest
docs: https://github.com/CxxTest/cxxtest
package-manager:
  brew: cxxtest
  debian: cxxtest
  dnf: cxxtest
  nix: cxxtest
  ubuntu: cxxtest
package-manager-url: https://formulae.brew.sh/formula/cxxtest
version: 4.4
license: LGPL-3.0-only
category: development
tags:
  - cli
description: C++ unit testing framework similar to JUnit, CppUnit and xUnit
source-archive: https://github.com/CxxTest/cxxtest/releases/download/4.4/cxxtest-4.4.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: cxxtestgen
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cxxtest
  brew: brew install cxxtest
  debian: sudo apt install cxxtest
  dnf: sudo dnf install cxxtest
  nix: nix profile install nixpkgs#cxxtest
  ubuntu: sudo apt install cxxtest
provenance:
  formula: cxxtest
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
