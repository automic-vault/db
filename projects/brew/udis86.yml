id: brew:udis86
display-name: udis86
homepage: https://sourceforge.net/projects/udis86/
repo: https://downloads.sourceforge.net/project/udis86/udis86/1.7/udis86-1.7.2.tar.gz
docs: https://sourceforge.net/projects/udis86/
package-manager:
  brew: udis86
  debian: udcli
  dnf: udis86
  macports: udis86
  nix: udis86
package-manager-url: https://formulae.brew.sh/formula/udis86
version: 1.7.2
license: BSD-2-Clause
category: network
tags:
  - cli
description: Minimalistic disassembler library for x86
source-archive: https://downloads.sourceforge.net/project/udis86/udis86/1.7/udis86-1.7.2.tar.gz
build-dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: udcli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:udis86
  brew: brew install udis86
  debian: sudo apt install udcli
  dnf: sudo dnf install udis86
  macports: sudo port install udis86
  nix: nix profile install nixpkgs#udis86
provenance:
  formula: udis86
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
