id: brew:pgsync
display-name: pgsync
homepage: https://github.com/ankane/pgsync
repo: https://github.com/ankane/pgsync
docs: https://github.com/ankane/pgsync
package-manager:
  brew: pgsync
  nix: pgsync
package-manager-url: https://formulae.brew.sh/formula/pgsync
version: 0.8.1
license: MIT
category: database
tags:
  - cli
description: Sync Postgres data between databases
source-archive: https://github.com/ankane/pgsync/archive/refs/tags/v0.8.1.tar.gz
dependencies:
  - libpq
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: pgsync
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pgsync
  brew: brew install pgsync
  nix: nix profile install nixpkgs#pgsync
provenance:
  formula: pgsync
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
