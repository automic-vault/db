id: brew:libcdio-paranoia
display-name: libcdio-paranoia
homepage: https://github.com/libcdio/libcdio-paranoia
repo: https://github.com/libcdio/libcdio-paranoia
docs: https://github.com/libcdio/libcdio-paranoia
package-manager:
  apk: libcdio-paranoia
  brew: libcdio-paranoia
  debian: cd-paranoia
  dnf: libcdio-paranoia
  macports: libcdio-paranoia
  nix: libcdio-paranoia
  pacman: libcdio-paranoia
  ubuntu: cd-paranoia
  zypper: cd-paranoia
package-manager-url: https://formulae.brew.sh/formula/libcdio-paranoia
version: 10.2-2.0.2
license: GPL-3.0-only
category: development
tags:
  - cli
description: CD paranoia on top of libcdio
source-archive: >
  https://github.com/libcdio/libcdio-paranoia/releases/download/release-10.2%2B2.0.2/libcdio-paranoia-10.2+2.0.2.tar.gz
dependencies:
  - libcdio
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: cd-paranoia
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libcdio-paranoia
  av: sudo av install brew:libcdio-paranoia
  brew: brew install libcdio-paranoia
  debian: sudo apt install cd-paranoia
  dnf: sudo dnf install libcdio-paranoia
  macports: sudo port install libcdio-paranoia
  nix: nix profile install nixpkgs#libcdio-paranoia
  pacman: sudo pacman -S libcdio-paranoia
  ubuntu: sudo apt install cd-paranoia
  zypper: sudo zypper install cd-paranoia
provenance:
  formula: libcdio-paranoia
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
