id: brew:pdftilecut
display-name: pdftilecut
homepage: https://github.com/oxplot/pdftilecut
repo: https://github.com/oxplot/pdftilecut
docs: https://github.com/oxplot/pdftilecut
package-manager:
  brew: pdftilecut
package-manager-url: https://formulae.brew.sh/formula/pdftilecut
version: 0.6
license: BSD-3-Clause
category: development
tags:
  - cli
description: Sub-divide a PDF page(s) into smaller pages so you can print them
source-archive: https://github.com/oxplot/pdftilecut/archive/refs/tags/v0.6.tar.gz
dependencies:
  - jpeg-turbo
  - qpdf
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pdftilecut
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pdftilecut
  brew: brew install pdftilecut
provenance:
  formula: pdftilecut
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
