id: brew:aria2
display-name: aria2
homepage: https://aria2.github.io/
repo: https://github.com/aria2/aria2
docs: https://aria2.github.io/
package-manager:
  apk: aria2
  brew: aria2
  chocolatey: aria2
  debian: aria2
  dnf: aria2
  macports: aria2
  nix: aria2
  pacman: aria2
  scoop: main/aria2
  ubuntu: aria2
  winget: aria2.aria2
  zypper: aria2
package-manager-url: https://formulae.brew.sh/formula/aria2
version: 1.37.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Download with resuming and segmented downloading
source-archive: https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0.tar.xz
dependencies:
  - c-ares
  - gettext
  - libssh2
  - openssl@3
  - sqlite
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: aria2c
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add aria2
  av: sudo av install brew:aria2
  brew: brew install aria2
  chocolatey: choco install aria2
  debian: sudo apt install aria2
  dnf: sudo dnf install aria2
  macports: sudo port install aria2
  nix: nix profile install nixpkgs#aria2
  pacman: sudo pacman -S aria2
  scoop: scoop install main/aria2
  ubuntu: sudo apt install aria2
  winget: winget install --id aria2.aria2 -e
  zypper: sudo zypper install aria2
provenance:
  formula: aria2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
