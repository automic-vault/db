id: brew:authz0
display-name: authz0
homepage: https://authz0.hahwul.com/
repo: https://github.com/hahwul/authz0
docs: https://authz0.hahwul.com/
package-manager:
  brew: authz0
  nix: authz0
package-manager-url: https://formulae.brew.sh/formula/authz0
version: 1.1.2
license: MIT
category: development
tags:
  - cli
description: Automated authorization test tool
source-archive: https://github.com/hahwul/authz0/archive/refs/tags/v1.1.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: authz0
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:authz0
  brew: brew install authz0
  nix: nix profile install nixpkgs#authz0
provenance:
  formula: authz0
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
