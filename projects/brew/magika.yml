id: brew:magika
display-name: magika
homepage: https://securityresearch.google/magika/
repo: https://github.com/google/magika
docs: https://securityresearch.google/magika/
package-manager:
  apk: magika
  brew: magika
  nix: magika
  winget: Google.Magika
package-manager-url: https://formulae.brew.sh/formula/magika
version: 1.0.2
license: Apache-2.0
category: security
tags:
  - cli
description: Fast and accurate AI powered file content types detection
source-archive: https://github.com/google/magika/archive/refs/tags/cli/v1.0.2.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: magika
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add magika
  av: sudo av install brew:magika
  brew: brew install magika
  nix: nix profile install nixpkgs#magika
  winget: winget install --id Google.Magika -e
provenance:
  formula: magika
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
