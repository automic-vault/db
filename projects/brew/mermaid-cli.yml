id: brew:mermaid-cli
display-name: mermaid-cli
homepage: https://github.com/mermaid-js/mermaid-cli
repo: https://registry.npmjs.org/@mermaid-js/mermaid-cli/-/mermaid-cli-11.15.0.tgz
docs: https://github.com/mermaid-js/mermaid-cli
package-manager:
  brew: mermaid-cli
  nix: mermaid-cli
  pacman: mermaid-cli
package-manager-url: https://formulae.brew.sh/formula/mermaid-cli
version: 11.15.0
license: MIT
category: development
tags:
  - cli
description: CLI for Mermaid library
source-archive: https://registry.npmjs.org/@mermaid-js/mermaid-cli/-/mermaid-cli-11.15.0.tgz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: mmdc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mermaid-cli
  brew: brew install mermaid-cli
  nix: nix profile install nixpkgs#mermaid-cli
  pacman: sudo pacman -S mermaid-cli
provenance:
  formula: mermaid-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
