id: brew:qalculate-qt
display-name: qalculate-qt
homepage: https://qalculate.github.io/
repo: https://github.com/Qalculate/qalculate-qt
docs: https://qalculate.github.io/
package-manager:
  apk: qalculate-qt
  brew: qalculate-qt
  debian: qalculate-qt
  dnf: qalculate-qt
  macports: qalculate-qt
  nix: qalculate-qt
  pacman: qalculate-qt
  zypper: qalculate-qt
package-manager-url: https://formulae.brew.sh/formula/qalculate-qt
version: 5.11.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Multi-purpose desktop calculator
source-archive: >
  https://github.com/Qalculate/qalculate-qt/releases/download/v5.11.0/qalculate-qt-5.11.0.tar.gz
dependencies:
  - gmp
  - libqalculate
  - mpfr
  - qtbase
build-dependencies:
  - pkgconf
  - qttools
executables:
  - exposure: global executable
    kind: cli
    name: qalculate-qt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add qalculate-qt
  av: sudo av install brew:qalculate-qt
  brew: brew install qalculate-qt
  debian: sudo apt install qalculate-qt
  dnf: sudo dnf install qalculate-qt
  macports: sudo port install qalculate-qt
  nix: nix profile install nixpkgs#qalculate-qt
  pacman: sudo pacman -S qalculate-qt
  zypper: sudo zypper install qalculate-qt
provenance:
  formula: qalculate-qt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
