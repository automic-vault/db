id: brew:cliproxyapi
display-name: cliproxyapi
homepage: https://github.com/router-for-me/CLIProxyAPI
repo: https://github.com/router-for-me/CLIProxyAPI
docs: https://github.com/router-for-me/CLIProxyAPI
package-manager:
  brew: cliproxyapi
package-manager-url: https://formulae.brew.sh/formula/cliproxyapi
version: 7.1.20
license: MIT
category: development
tags:
  - cli
description: Wrap Gemini CLI, Codex, Claude Code, Qwen Code as an API service
source-archive: https://github.com/router-for-me/CLIProxyAPI/archive/refs/tags/v7.1.20.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cliproxyapi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:cliproxyapi
  brew: brew install cliproxyapi
provenance:
  formula: cliproxyapi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
