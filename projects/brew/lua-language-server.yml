id: brew:lua-language-server
display-name: lua-language-server
homepage: https://github.com/LuaLS/lua-language-server
repo: https://github.com/LuaLS/lua-language-server
docs: https://github.com/LuaLS/lua-language-server
package-manager:
  apk: lua-language-server
  brew: lua-language-server
  chocolatey: lua-language-server
  macports: lua-language-server
  nix: lua-language-server
  pacman: lua-language-server
  scoop: main/lua-language-server
  winget: LuaLS.lua-language-server
  zypper: lua-language-server
package-manager-url: https://formulae.brew.sh/formula/lua-language-server
version: 3.18.2
license: MIT
category: development
tags:
  - cli
description: Language Server for the Lua language
source-archive: https://github.com/LuaLS/lua-language-server.git
build-dependencies:
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: lua-language-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lua-language-server
  av: sudo av install brew:lua-language-server
  brew: brew install lua-language-server
  chocolatey: choco install lua-language-server
  macports: sudo port install lua-language-server
  nix: nix profile install nixpkgs#lua-language-server
  pacman: sudo pacman -S lua-language-server
  scoop: scoop install main/lua-language-server
  winget: winget install --id LuaLS.lua-language-server -e
  zypper: sudo zypper install lua-language-server
provenance:
  formula: lua-language-server
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
