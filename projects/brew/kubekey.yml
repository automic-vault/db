id: brew:kubekey
display-name: kubekey
homepage: https://kubesphere.io
repo: https://github.com/kubesphere/kubekey
docs: https://kubesphere.io
package-manager:
  brew: kubekey
package-manager-url: https://formulae.brew.sh/formula/kubekey
version: 4.0.4
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
  - kubernetes
description: Installer for Kubernetes and / or KubeSphere, and related cloud-native add-ons
source-archive: https://github.com/kubesphere/kubekey.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubekey
  brew: brew install kubekey
provenance:
  formula: kubekey
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
