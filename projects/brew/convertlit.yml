id: brew:convertlit
display-name: convertlit
homepage: http://www.convertlit.com/
repo: http://www.convertlit.com/clit18src.zip
docs: http://www.convertlit.com/
package-manager:
  brew: convertlit
  macports: convertlit
  nix: convertlit
  pacman: convertlit
package-manager-url: https://formulae.brew.sh/formula/convertlit
version: 1.8
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Convert Microsoft Reader format eBooks into open format
source-archive: http://www.convertlit.com/clit18src.zip
dependencies:
  - libtommath
executables:
  - exposure: global executable
    kind: cli
    name: clit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:convertlit
  brew: brew install convertlit
  macports: sudo port install convertlit
  nix: nix profile install nixpkgs#convertlit
  pacman: sudo pacman -S convertlit
provenance:
  formula: convertlit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
