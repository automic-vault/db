id: brew:cpm
display-name: cpm
homepage: https://metacpan.org/pod/cpm
repo: https://cpan.metacpan.org/authors/id/S/SK/SKAJI/App-cpm-v1.1.1.tar.gz
docs: https://metacpan.org/pod/cpm
package-manager:
  brew: cpm
  debian: cpm
package-manager-url: https://formulae.brew.sh/formula/cpm
version: 1.1.1
license: Artistic-1.0-Perl OR GPL-1.0-or-later
category: network
tags:
  - cli
description: Fast CPAN module installer
source-archive: https://cpan.metacpan.org/authors/id/S/SK/SKAJI/App-cpm-v1.1.1.tar.gz
dependencies:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: cpm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cpm
  brew: brew install cpm
  debian: sudo apt install cpm
provenance:
  formula: cpm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
