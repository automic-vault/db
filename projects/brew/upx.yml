id: brew:upx
display-name: upx
homepage: https://upx.github.io/
repo: https://github.com/upx/upx
docs: https://upx.github.io/
package-manager:
  apk: upx
  brew: upx
  chocolatey: upx
  dnf: upx
  macports: upx
  nix: upx
  pacman: upx
  scoop: main/upx
  winget: UPX.UPX
  zypper: upx
package-manager-url: https://formulae.brew.sh/formula/upx
version: 5.1.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Compress/expand executable files
source-archive: https://github.com/upx/upx/releases/download/v5.1.1/upx-5.1.1-src.tar.xz
build-dependencies:
  - cmake
  - ucl
executables:
  - exposure: global executable
    kind: cli
    name: upx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add upx
  av: sudo av install brew:upx
  brew: brew install upx
  chocolatey: choco install upx
  dnf: sudo dnf install upx
  macports: sudo port install upx
  nix: nix profile install nixpkgs#upx
  pacman: sudo pacman -S upx
  scoop: scoop install main/upx
  winget: winget install --id UPX.UPX -e
  zypper: sudo zypper install upx
provenance:
  formula: upx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
