id: brew:risor
display-name: risor
homepage: https://risor.io/
repo: https://github.com/deepnoodle-ai/risor
docs: https://risor.io/
package-manager:
  brew: risor
  nix: risor
package-manager-url: https://formulae.brew.sh/formula/risor
version: 2.1.0
license: Apache-2.0
category: development
tags:
  - cli
description: Fast and flexible scripting for Go developers and DevOps
source-archive: https://github.com/deepnoodle-ai/risor/archive/refs/tags/v2.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: risor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:risor
  brew: brew install risor
  nix: nix profile install nixpkgs#risor
provenance:
  formula: risor
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
