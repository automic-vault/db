id: brew:gsasl
display-name: gsasl
homepage: https://www.gnu.org/software/gsasl/
repo: https://ftpmirror.gnu.org/gnu/gsasl/gsasl-2.2.3.tar.gz
docs: https://www.gnu.org/software/gsasl/
package-manager:
  brew: gsasl
  debian: gsasl
  nix: gsasl
  pacman: gsasl
  ubuntu: gsasl
  zypper: gsasl
package-manager-url: https://formulae.brew.sh/formula/gsasl
version: 2.2.3
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: SASL library command-line interface
source-archive: https://ftpmirror.gnu.org/gnu/gsasl/gsasl-2.2.3.tar.gz
dependencies:
  - gettext
  - libgcrypt
executables:
  - exposure: global executable
    kind: cli
    name: gsasl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gsasl
  brew: brew install gsasl
  debian: sudo apt install gsasl
  nix: nix profile install nixpkgs#gsasl
  pacman: sudo pacman -S gsasl
  ubuntu: sudo apt install gsasl
  zypper: sudo zypper install gsasl
provenance:
  formula: gsasl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
