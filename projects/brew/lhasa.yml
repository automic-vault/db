id: brew:lhasa
display-name: lhasa
homepage: https://fragglet.github.io/lhasa/
repo: https://github.com/fragglet/lhasa
docs: https://fragglet.github.io/lhasa/
package-manager:
  apk: lha
  brew: lhasa
  debian: lhasa
  dnf: lhasa
  macports: lha
  nix: lhasa
  pacman: lhasa
  ubuntu: lhasa
  zypper: lhasa
package-manager-url: https://formulae.brew.sh/formula/lhasa
version: 0.5.0
license: ISC
category: development
tags:
  - cli
description: LHA implementation to decompress .lzh and .lzs archives
source-archive: https://github.com/fragglet/lhasa/archive/refs/tags/v0.5.0.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: lha
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lha
  av: sudo av install brew:lhasa
  brew: brew install lhasa
  debian: sudo apt install lhasa
  dnf: sudo dnf install lhasa
  macports: sudo port install lha
  nix: nix profile install nixpkgs#lhasa
  pacman: sudo pacman -S lhasa
  ubuntu: sudo apt install lhasa
  zypper: sudo zypper install lhasa
provenance:
  formula: lhasa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
