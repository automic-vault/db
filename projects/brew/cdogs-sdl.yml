id: brew:cdogs-sdl
display-name: cdogs-sdl
homepage: https://cxong.github.io/cdogs-sdl/
repo: https://github.com/cxong/cdogs-sdl
docs: https://cxong.github.io/cdogs-sdl/
package-manager:
  apk: cdogs-sdl
  brew: cdogs-sdl
  debian: cdogs-sdl
  dnf: cdogs-sdl
  nix: cdogs-sdl
  ubuntu: cdogs-sdl
  winget: CongusBongus.CDogsSDL
  zypper: cdogs-sdl
package-manager-url: https://formulae.brew.sh/formula/cdogs-sdl
version: 2.4.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Classic overhead run-and-gun game
source-archive: https://github.com/cxong/cdogs-sdl/archive/refs/tags/2.4.0.tar.gz
dependencies:
  - python@3.14
  - sdl2
  - sdl2_image
  - sdl2_mixer
build-dependencies:
  - cmake
  - pkgconf
  - protobuf
executables:
  - exposure: global executable
    kind: cli
    name: cdogs-sdl
  - exposure: global executable
    kind: cli
    name: cdogs-sdl-editor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cdogs-sdl
  av: sudo av install brew:cdogs-sdl
  brew: brew install cdogs-sdl
  debian: sudo apt install cdogs-sdl
  dnf: sudo dnf install cdogs-sdl
  nix: nix profile install nixpkgs#cdogs-sdl
  ubuntu: sudo apt install cdogs-sdl
  winget: winget install --id CongusBongus.CDogsSDL -e
  zypper: sudo zypper install cdogs-sdl
provenance:
  formula: cdogs-sdl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
