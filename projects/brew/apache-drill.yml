id: brew:apache-drill
display-name: apache-drill
homepage: https://drill.apache.org
repo: https://www.apache.org/dyn/closer.lua?path=drill/1.22.0/apache-drill-1.22.0.tar.gz
docs: https://drill.apache.org
package-manager:
  brew: apache-drill
  debian: sqlline
  nix: sqlline
  ubuntu: sqlline
package-manager-url: https://formulae.brew.sh/formula/apache-drill
version: 1.22.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: Schema-free SQL Query Engine for Hadoop, NoSQL and Cloud Storage
source-archive: https://www.apache.org/dyn/closer.lua?path=drill/1.22.0/apache-drill-1.22.0.tar.gz
dependencies:
  - openjdk@21
executables:
  - exposure: global executable
    kind: cli
    name: auto-setup.sh
  - exposure: global executable
    kind: cli
    name: drill-am.sh
  - exposure: global executable
    kind: cli
    name: drill-conf
  - exposure: global executable
    kind: cli
    name: drill-config.sh
  - exposure: global executable
    kind: cli
    name: drill-embedded
  - exposure: global executable
    kind: cli
    name: drill-localhost
  - exposure: global executable
    kind: cli
    name: drill-on-yarn.sh
  - exposure: global executable
    kind: cli
    name: drillbit.sh
  - exposure: global executable
    kind: cli
    name: runbit
  - exposure: global executable
    kind: cli
    name: sqlline
  - exposure: global executable
    kind: cli
    name: submit_plan
  - exposure: global executable
    kind: cli
    name: yarn-drillbit.sh
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:apache-drill
  brew: brew install apache-drill
  debian: sudo apt install sqlline
  nix: nix profile install nixpkgs#sqlline
  ubuntu: sudo apt install sqlline
provenance:
  formula: apache-drill
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
