id: brew:mac
display-name: mac
homepage: https://www.monkeysaudio.com
repo: https://monkeysaudio.com/files/MAC_1298_SDK.zip
docs: https://www.monkeysaudio.com
package-manager:
  brew: mac
  dnf: mac
  pacman: mac
  zypper: mac
package-manager-url: https://formulae.brew.sh/formula/mac
version: 12.98
license: BSD-3-Clause
category: security
tags:
  - cli
description: Monkey's Audio lossless codec
source-archive: https://monkeysaudio.com/files/MAC_1298_SDK.zip
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: mac
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mac
  brew: brew install mac
  dnf: sudo dnf install mac
  pacman: sudo pacman -S mac
  zypper: sudo zypper install mac
provenance:
  formula: mac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
