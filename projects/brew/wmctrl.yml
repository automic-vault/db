id: brew:wmctrl
display-name: wmctrl
homepage: https://packages.debian.org/sid/wmctrl
repo: https://deb.debian.org/debian/pool/main/w/wmctrl/wmctrl_1.07.orig.tar.gz
docs: https://packages.debian.org/sid/wmctrl
package-manager:
  apk: wmctrl
  brew: wmctrl
  debian: wmctrl
  dnf: wmctrl
  macports: wmctrl
  nix: wmctrl
  pacman: wmctrl
  ubuntu: wmctrl
  zypper: wmctrl
package-manager-url: https://formulae.brew.sh/formula/wmctrl
version: 1.07
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: UNIX/Linux command-line tool to interact with an EWMH/NetWM
source-archive: https://deb.debian.org/debian/pool/main/w/wmctrl/wmctrl_1.07.orig.tar.gz
dependencies:
  - gettext
  - glib
  - libice
  - libsm
  - libx11
  - libxmu
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: wmctrl
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wmctrl
  av: sudo av install brew:wmctrl
  brew: brew install wmctrl
  debian: sudo apt install wmctrl
  dnf: sudo dnf install wmctrl
  macports: sudo port install wmctrl
  nix: nix profile install nixpkgs#wmctrl
  pacman: sudo pacman -S wmctrl
  ubuntu: sudo apt install wmctrl
  zypper: sudo zypper install wmctrl
provenance:
  formula: wmctrl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
