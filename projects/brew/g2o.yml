id: brew:g2o
display-name: g2o
homepage: https://openslam-org.github.io/g2o.html
repo: https://github.com/RainerKuemmerle/g2o
docs: https://openslam-org.github.io/g2o.html
package-manager:
  brew: g2o
  nix: g2o
package-manager-url: https://formulae.brew.sh/formula/g2o
version: 20241228
license: BSD-2-Clause
category: development
tags:
  - cli
description: General framework for graph optimization
source-archive: https://github.com/RainerKuemmerle/g2o/archive/refs/tags/20241228_git.tar.gz
dependencies:
  - eigen
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: g2o
  - exposure: global executable
    kind: cli
    name: g2o_simulator2d
  - exposure: global executable
    kind: cli
    name: g2o_simulator3d
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:g2o
  brew: brew install g2o
  nix: nix profile install nixpkgs#g2o
provenance:
  formula: g2o
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
