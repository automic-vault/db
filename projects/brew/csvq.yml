id: brew:csvq
display-name: csvq
homepage: https://mithrandie.github.io/csvq
repo: https://github.com/mithrandie/csvq
docs: https://mithrandie.github.io/csvq
package-manager:
  apk: csvq
  brew: csvq
  nix: csvq
package-manager-url: https://formulae.brew.sh/formula/csvq
version: 1.18.1
license: MIT
category: database
tags:
  - cli
description: SQL-like query language for csv
source-archive: https://github.com/mithrandie/csvq/archive/refs/tags/v1.18.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: csvq
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add csvq
  av: sudo av install brew:csvq
  brew: brew install csvq
  nix: nix profile install nixpkgs#csvq
provenance:
  formula: csvq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
