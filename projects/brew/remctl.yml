id: brew:remctl
display-name: remctl
homepage: https://www.eyrie.org/~eagle/software/remctl/
repo: https://archives.eyrie.org/software/kerberos/remctl-3.18.tar.xz
docs: https://www.eyrie.org/~eagle/software/remctl/
package-manager:
  brew: remctl
  macports: remctl
  nix: remctl
package-manager-url: https://formulae.brew.sh/formula/remctl
version: 3.18
license: MIT
category: network
tags:
  - cli
description: Client/server application for remote execution of tasks
source-archive: https://archives.eyrie.org/software/kerberos/remctl-3.18.tar.xz
dependencies:
  - libevent
  - pcre2
uses-from-macos:
  - krb5
executables:
  - exposure: global executable
    kind: cli
    name: remctl
  - exposure: global executable
    kind: cli
    name: remctl-shell
  - exposure: global executable
    kind: cli
    name: remctld
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:remctl
  brew: brew install remctl
  macports: sudo port install remctl
  nix: nix profile install nixpkgs#remctl
provenance:
  formula: remctl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
