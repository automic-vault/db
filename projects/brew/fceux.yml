id: brew:fceux
display-name: fceux
homepage: https://fceux.com/
repo: https://github.com/TASEmulators/fceux
docs: https://fceux.com/
package-manager:
  apk: fceux
  brew: fceux
  debian: fceux
  nix: fceux
  pacman: fceux
  ubuntu: fceux
  winget: FCEUX.FCEUX
package-manager-url: https://formulae.brew.sh/formula/fceux
version: 2.6.6
license: GPL-2.0-or-later AND LGPL-2.1-or-later AND MIT
category: development
tags:
  - cli
description: All-in-one NES/Famicom Emulator
source-archive: https://github.com/TASEmulators/fceux.git
dependencies:
  - ffmpeg
  - libarchive
  - minizip
  - qtbase
  - sdl2
  - x264
  - x265
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fceux
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fceux
  av: sudo av install brew:fceux
  brew: brew install fceux
  debian: sudo apt install fceux
  nix: nix profile install nixpkgs#fceux
  pacman: sudo pacman -S fceux
  ubuntu: sudo apt install fceux
  winget: winget install --id FCEUX.FCEUX -e
provenance:
  formula: fceux
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
