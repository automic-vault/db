id: brew:picoc
display-name: picoc
homepage: https://gitlab.com/zsaleeba/picoc
repo: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/picoc/picoc-2.1.tar.bz2
docs: https://gitlab.com/zsaleeba/picoc
package-manager:
  brew: picoc
  nix: picoc
package-manager-url: https://formulae.brew.sh/formula/picoc
version: 2.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: C interpreter for scripting
source-archive: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/picoc/picoc-2.1.tar.bz2
executables:
