id: brew:cozyhr
display-name: cozyhr
homepage: https://github.com/cozystack/cozyhr
repo: https://github.com/cozystack/cozyhr
docs: https://github.com/cozystack/cozyhr
package-manager:
  brew: cozyhr
package-manager-url: https://formulae.brew.sh/formula/cozyhr
version: 1.6.1
license: Apache-2.0
category: development
tags:
  - cli
description: Cozy wrapper around Helm and Flux CD for local development
source-archive: https://github.com/cozystack/cozyhr/archive/refs/tags/v1.6.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cozyhr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cozyhr
  brew: brew install cozyhr
provenance:
  formula: cozyhr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
