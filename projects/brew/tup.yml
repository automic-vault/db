id: brew:tup
display-name: tup
homepage: https://gittup.org/tup/
repo: https://github.com/gittup/tup
docs: https://gittup.org/tup/
package-manager:
  apk: tup
  brew: tup
  debian: tup
  macports: tup
  nix: tup
  pacman: tup
  scoop: main/tup
  ubuntu: tup
  zypper: tup
package-manager-url: https://formulae.brew.sh/formula/tup
version: 0.8
license: GPL-2.0-only
category: development
tags:
  - cli
description: File-based build system
source-archive: https://github.com/gittup/tup/archive/refs/tags/v0.8.tar.gz
dependencies:
  - libfuse
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: tup
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tup
  av: sudo av install brew:tup
  brew: brew install tup
  debian: sudo apt install tup
  macports: sudo port install tup
  nix: nix profile install nixpkgs#tup
  pacman: sudo pacman -S tup
  scoop: scoop install main/tup
  ubuntu: sudo apt install tup
  zypper: sudo zypper install tup
provenance:
  formula: tup
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
