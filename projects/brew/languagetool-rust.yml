id: brew:languagetool-rust
display-name: languagetool-rust
homepage: https://docs.rs/languagetool-rust
repo: https://github.com/jeertmans/languagetool-rust
docs: https://docs.rs/languagetool-rust
package-manager:
  brew: languagetool-rust
  nix: languagetool-rust
package-manager-url: https://formulae.brew.sh/formula/languagetool-rust
version: 3.0.1
license: MIT
category: development
tags:
  - cli
description: LanguageTool API in Rust
source-archive: https://github.com/jeertmans/languagetool-rust/archive/refs/tags/v3.0.1.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ltrs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:languagetool-rust
  brew: brew install languagetool-rust
  nix: nix profile install nixpkgs#languagetool-rust
provenance:
  formula: languagetool-rust
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
