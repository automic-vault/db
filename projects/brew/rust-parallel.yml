id: brew:rust-parallel
display-name: rust-parallel
homepage: https://github.com/aaronriekenberg/rust-parallel
repo: https://github.com/aaronriekenberg/rust-parallel
docs: https://github.com/aaronriekenberg/rust-parallel
package-manager:
  brew: rust-parallel
  nix: rust-parallel
package-manager-url: https://formulae.brew.sh/formula/rust-parallel
version: 1.23.0
license: MIT
category: development
tags:
  - cli
description: Run commands in parallel with Rust's Tokio framework
source-archive: https://github.com/aaronriekenberg/rust-parallel/archive/refs/tags/v1.23.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rust-parallel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rust-parallel
  brew: brew install rust-parallel
  nix: nix profile install nixpkgs#rust-parallel
provenance:
  formula: rust-parallel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
