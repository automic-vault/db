id: brew:cctz
display-name: cctz
homepage: https://github.com/google/cctz
repo: https://github.com/google/cctz
docs: https://github.com/google/cctz
package-manager:
  brew: cctz
  dnf: cctz
  nix: cctz
package-manager-url: https://formulae.brew.sh/formula/cctz
version: 2.5
license: Apache-2.0
category: development
tags:
  - cli
description: C++ library for translating between absolute and civil times
source-archive: https://github.com/google/cctz/archive/refs/tags/v2.5.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: time_tool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cctz
  brew: brew install cctz
  dnf: sudo dnf install cctz
  nix: nix profile install nixpkgs#cctz
provenance:
  formula: cctz
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
