    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dtach
  av: sudo av install brew:dtach
  brew: brew install dtach
  debian: sudo apt install dtach
  dnf: sudo dnf install dtach
  macports: sudo port install dtach
  nix: nix profile install nixpkgs#dtach
  ubuntu: sudo apt install dtach
  zypper: sudo zypper install dtach
provenance:
  formula: dtach
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
