id: brew:dtach
display-name: dtach
homepage: https://dtach.sourceforge.net/
repo: https://downloads.sourceforge.net/project/dtach/dtach/0.9/dtach-0.9.tar.gz
docs: https://dtach.sourceforge.net/
package-manager:
  apk: dtach
  brew: dtach
  debian: dtach
  dnf: dtach
  macports: dtach
  nix: dtach
  ubuntu: dtach
  zypper: dtach
package-manager-url: https://formulae.brew.sh/formula/dtach
version: 0.9
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Emulates the detach feature of screen
source-archive: https://downloads.sourceforge.net/project/dtach/dtach/0.9/dtach-0.9.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: dtach
bottle:
