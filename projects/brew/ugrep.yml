id: brew:ugrep
display-name: ugrep
homepage: https://ugrep.com/
repo: https://github.com/Genivia/ugrep
docs: https://ugrep.com/
package-manager:
  apk: ugrep
  brew: ugrep
  chocolatey: ugrep
  debian: ugrep
  dnf: ugrep
  macports: ugrep
  nix: ugrep
  pacman: ugrep
  scoop: main/ugrep
  ubuntu: ugrep
  winget: Genivia.ugrep
  zypper: ugrep
package-manager-url: https://formulae.brew.sh/formula/ugrep
version: 7.8.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Ultra fast grep with query UI, fuzzy search, archive search, and more
source-archive: https://github.com/Genivia/ugrep/archive/refs/tags/v7.8.2.tar.gz
dependencies:
  - brotli
  - lz4
  - pcre2
  - xz
  - zstd
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: ug
  - exposure: global executable
    kind: cli
    name: ug+
  - exposure: global executable
    kind: cli
    name: ugrep
  - exposure: global executable
    kind: cli
    name: ugrep+
  - exposure: global executable
    kind: cli
    name: ugrep-indexer
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ugrep
  av: sudo av install brew:ugrep
  brew: brew install ugrep
  chocolatey: choco install ugrep
  debian: sudo apt install ugrep
  dnf: sudo dnf install ugrep
  macports: sudo port install ugrep
  nix: nix profile install nixpkgs#ugrep
  pacman: sudo pacman -S ugrep
  scoop: scoop install main/ugrep
  ubuntu: sudo apt install ugrep
  winget: winget install --id Genivia.ugrep -e
  zypper: sudo zypper install ugrep
provenance:
  formula: ugrep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
