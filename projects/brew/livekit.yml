id: brew:livekit
display-name: livekit
homepage: https://livekit.io
repo: https://github.com/livekit/livekit
docs: https://livekit.io
package-manager:
  brew: livekit
  nix: livekit
package-manager-url: https://formulae.brew.sh/formula/livekit
version: 1.12.0
license: Apache-2.0
category: development
tags:
  - cli
description: Scalable, high-performance WebRTC server
source-archive: https://github.com/livekit/livekit/archive/refs/tags/v1.12.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: livekit-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:livekit
  brew: brew install livekit
  nix: nix profile install nixpkgs#livekit
provenance:
  formula: livekit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
