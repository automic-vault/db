id: brew:astroterm
display-name: astroterm
homepage: https://github.com/da-luce/astroterm
repo: https://github.com/da-luce/astroterm
docs: https://github.com/da-luce/astroterm
package-manager:
  apk: astroterm
  brew: astroterm
  dnf: astroterm
  nix: astroterm
  pacman: astroterm
  zypper: astroterm
package-manager-url: https://formulae.brew.sh/formula/astroterm
version: 1.2.0
license: MIT
category: development
tags:
  - cli
description: Planetarium for your terminal
source-archive: https://github.com/da-luce/astroterm/archive/refs/tags/v1.2.0.tar.gz
dependencies:
  - argtable3
build-dependencies:
  - meson
  - ninja
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: astroterm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add astroterm
  av: sudo av install brew:astroterm
  brew: brew install astroterm
  dnf: sudo dnf install astroterm
  nix: nix profile install nixpkgs#astroterm
  pacman: sudo pacman -S astroterm
  zypper: sudo zypper install astroterm
provenance:
  formula: astroterm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
