id: brew:rainfrog
display-name: rainfrog
homepage: https://github.com/achristmascarl/rainfrog
repo: https://github.com/achristmascarl/rainfrog
docs: https://github.com/achristmascarl/rainfrog
package-manager:
  brew: rainfrog
  nix: rainfrog
  pacman: rainfrog
  scoop: main/rainfrog
package-manager-url: https://formulae.brew.sh/formula/rainfrog
version: 0.3.18
license: MIT
category: database
tags:
  - cli
  - database
description: Database management TUI for PostgreSQL/MySQL/SQLite
source-archive: https://github.com/achristmascarl/rainfrog/archive/refs/tags/v0.3.18.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rainfrog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rainfrog
  brew: brew install rainfrog
  nix: nix profile install nixpkgs#rainfrog
  pacman: sudo pacman -S rainfrog
  scoop: scoop install main/rainfrog
provenance:
  formula: rainfrog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
