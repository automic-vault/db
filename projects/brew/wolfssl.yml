id: brew:wolfssl
display-name: wolfssl
homepage: https://www.wolfssl.com
repo: https://github.com/wolfSSL/wolfssl
docs: https://www.wolfssl.com
package-manager:
  apk: wolfssl
  brew: wolfssl
  macports: wolfssl
  pacman: wolfssl
package-manager-url: https://formulae.brew.sh/formula/wolfssl
version: 5.9.1
license: GPL-3.0-or-later
category: security
tags:
  - cli
description: Embedded SSL Library written in C
source-archive: https://github.com/wolfSSL/wolfssl.git
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: wolfssl-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wolfssl
  av: sudo av install brew:wolfssl
  brew: brew install wolfssl
  macports: sudo port install wolfssl
  pacman: sudo pacman -S wolfssl
provenance:
  formula: wolfssl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
