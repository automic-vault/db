id: brew:svg2pdf
display-name: svg2pdf
homepage: https://cairographics.org/
repo: https://cairographics.org/snapshots/svg2pdf-0.1.3.tar.gz
docs: https://cairographics.org/
package-manager:
  brew: svg2pdf
  nix: svg2pdf
package-manager-url: https://formulae.brew.sh/formula/svg2pdf
version: 0.1.3
license: HPND-sell-variant
category: media
tags:
  - cli
description: Renders SVG images to a PDF file (using Cairo)
source-archive: https://cairographics.org/snapshots/svg2pdf-0.1.3.tar.gz
dependencies:
  - cairo
  - jpeg-turbo
  - libpng
  - libsvg
  - libsvg-cairo
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: svg2pdf
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:svg2pdf
  brew: brew install svg2pdf
  nix: nix profile install nixpkgs#svg2pdf
provenance:
  formula: svg2pdf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
