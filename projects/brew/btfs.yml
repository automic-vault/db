id: brew:btfs
display-name: btfs
homepage: https://github.com/johang/btfs
repo: https://github.com/johang/btfs
docs: https://github.com/johang/btfs
package-manager:
  apk: btfs
  brew: btfs
  debian: btfs
  macports: btfs
  nix: btfs
  pacman: btfs
  ubuntu: btfs
  zypper: btfs
package-manager-url: https://formulae.brew.sh/formula/btfs
version: 3.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: BitTorrent filesystem based on FUSE
source-archive: https://github.com/johang/btfs/archive/refs/tags/v3.1.tar.gz
dependencies:
  - curl
  - libfuse
  - libtorrent-rasterbar
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: btfs
  - exposure: global executable
    kind: cli
    name: btfsstat
  - exposure: global executable
    kind: cli
    name: btplay
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add btfs
  av: sudo av install brew:btfs
  brew: brew install btfs
  debian: sudo apt install btfs
  macports: sudo port install btfs
  nix: nix profile install nixpkgs#btfs
  pacman: sudo pacman -S btfs
  ubuntu: sudo apt install btfs
  zypper: sudo zypper install btfs
provenance:
  formula: btfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
