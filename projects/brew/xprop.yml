id: brew:xprop
display-name: xprop
homepage: https://gitlab.freedesktop.org/xorg/app/xprop
repo: https://www.x.org/archive/individual/app/xprop-1.2.8.tar.xz
docs: https://gitlab.freedesktop.org/xorg/app/xprop
package-manager:
  apk: xprop
  brew: xprop
  dnf: xprop
  macports: xprop
  nix: xprop
  zypper: xprop
package-manager-url: https://formulae.brew.sh/formula/xprop
version: 1.2.8
license: MIT-open-group
category: development
tags:
  - cli
description: Property displayer for X
source-archive: https://www.x.org/archive/individual/app/xprop-1.2.8.tar.xz
dependencies:
  - libx11
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xprop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xprop
  av: sudo av install brew:xprop
  brew: brew install xprop
  dnf: sudo dnf install xprop
  macports: sudo port install xprop
  nix: nix profile install nixpkgs#xprop
  zypper: sudo zypper install xprop
provenance:
  formula: xprop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
