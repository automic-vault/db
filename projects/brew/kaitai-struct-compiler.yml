id: brew:kaitai-struct-compiler
display-name: kaitai-struct-compiler
homepage: https://kaitai.io/
repo: https://github.com/kaitai-io/kaitai_struct_compiler
docs: https://kaitai.io/
package-manager:
  brew: kaitai-struct-compiler
  nix: kaitai-struct-compiler
  winget: Kaitai.StructCompiler
package-manager-url: https://formulae.brew.sh/formula/kaitai-struct-compiler
version: 0.11
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Compiler for generating binary data parsers
source-archive: >
  https://github.com/kaitai-io/kaitai_struct_compiler/releases/download/0.11/kaitai-struct-compiler-0.11.zip
dependencies:
  - openjdk
executables:
  - exposure: global executable
    kind: cli
    name: kaitai-struct-compiler
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kaitai-struct-compiler
  brew: brew install kaitai-struct-compiler
  nix: nix profile install nixpkgs#kaitai-struct-compiler
  winget: winget install --id Kaitai.StructCompiler -e
provenance:
  formula: kaitai-struct-compiler
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
