id: brew:mapcidr
display-name: mapcidr
homepage: https://projectdiscovery.io
repo: https://github.com/projectdiscovery/mapcidr
docs: https://projectdiscovery.io
package-manager:
  brew: mapcidr
  nix: mapcidr
package-manager-url: https://formulae.brew.sh/formula/mapcidr
version: 1.1.97
license: MIT
category: development
tags:
  - cli
description: Subnet/CIDR operation utility
source-archive: https://github.com/projectdiscovery/mapcidr/archive/refs/tags/v1.1.97.tar.gz
build-dependencies:
