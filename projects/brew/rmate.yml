id: brew:rmate
display-name: rmate
homepage: https://github.com/textmate/rmate
repo: https://github.com/textmate/rmate
docs: https://github.com/textmate/rmate
package-manager:
  brew: rmate
  nix: rmate
package-manager-url: https://formulae.brew.sh/formula/rmate
version: 1.5.8
license: MIT
category: development
tags:
  - cli
description: Edit files from an SSH session in TextMate
source-archive: https://github.com/textmate/rmate/archive/refs/tags/v1.5.8.tar.gz
uses-from-macos:
