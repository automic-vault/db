id: brew:molecule
display-name: molecule
homepage: https://molecule.readthedocs.io
repo: >
  https://files.pythonhosted.org/packages/09/e0/f671b5b0742a60b6067cbe9e57720b600ded5e0fcabb837663dd21b57568/molecule-26.4.0.tar.gz
docs: https://molecule.readthedocs.io
package-manager:
  brew: molecule
  nix: molecule
  pacman: molecule
  zypper: molecule
package-manager-url: https://formulae.brew.sh/formula/molecule
version: 26.4.0
license: MIT
category: network
tags:
  - cli
description: Automated testing for Ansible roles
source-archive: >
  https://files.pythonhosted.org/packages/09/e0/f671b5b0742a60b6067cbe9e57720b600ded5e0fcabb837663dd21b57568/molecule-26.4.0.tar.gz
dependencies:
  - ansible
  - certifi
  - cryptography
  - libyaml
  - python@3.14
  - rpds-py
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: molecule
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:molecule
  brew: brew install molecule
  nix: nix profile install nixpkgs#molecule
  pacman: sudo pacman -S molecule
  zypper: sudo zypper install molecule
provenance:
  formula: molecule
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
