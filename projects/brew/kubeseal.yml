id: brew:kubeseal
display-name: kubeseal
homepage: https://github.com/bitnami-labs/sealed-secrets
repo: https://github.com/bitnami-labs/sealed-secrets
docs: https://github.com/bitnami-labs/sealed-secrets
package-manager:
  apk: kubeseal
  brew: kubeseal
  macports: kubeseal
  nix: kubeseal
  pacman: kubeseal
  scoop: main/kubeseal
  zypper: kubeseal
package-manager-url: https://formulae.brew.sh/formula/kubeseal
version: 0.37.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Kubernetes controller and tool for one-way encrypted Secrets
source-archive: https://github.com/bitnami-labs/sealed-secrets.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubeseal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kubeseal
  av: sudo av install brew:kubeseal
  brew: brew install kubeseal
  macports: sudo port install kubeseal
  nix: nix profile install nixpkgs#kubeseal
  pacman: sudo pacman -S kubeseal
  scoop: scoop install main/kubeseal
  zypper: sudo zypper install kubeseal
provenance:
  formula: kubeseal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
