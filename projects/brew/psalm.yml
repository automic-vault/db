id: brew:psalm
display-name: psalm
homepage: https://psalm.dev
repo: https://github.com/vimeo/psalm
docs: https://psalm.dev
package-manager:
  brew: psalm
  pacman: psalm
package-manager-url: https://formulae.brew.sh/formula/psalm
version: 6.16.1
license: MIT
category: development
tags:
  - cli
description: PHP Static Analysis Tool
source-archive: https://github.com/vimeo/psalm/releases/download/6.16.1/psalm.phar
dependencies:
  - php
executables:
  - exposure: global executable
    kind: cli
    name: psalm
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:psalm
  brew: brew install psalm
  pacman: sudo pacman -S psalm
provenance:
  formula: psalm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
