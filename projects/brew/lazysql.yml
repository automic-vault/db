id: brew:lazysql
display-name: lazysql
homepage: https://github.com/jorgerojas26/lazysql
repo: https://github.com/jorgerojas26/lazysql
docs: https://github.com/jorgerojas26/lazysql
package-manager:
  brew: lazysql
  macports: lazysql
  nix: lazysql
  scoop: extras/lazysql
package-manager-url: https://formulae.brew.sh/formula/lazysql
version: 0.5.1
license: MIT
category: database
tags:
  - cli
  - database
description: Cross-platform TUI database management tool
source-archive: https://github.com/jorgerojas26/lazysql/archive/refs/tags/v0.5.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lazysql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lazysql
  brew: brew install lazysql
  macports: sudo port install lazysql
  nix: nix profile install nixpkgs#lazysql
  scoop: scoop install extras/lazysql
provenance:
  formula: lazysql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
