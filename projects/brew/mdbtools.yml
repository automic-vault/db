id: brew:mdbtools
display-name: mdbtools
homepage: https://github.com/mdbtools/mdbtools/
repo: https://github.com/mdbtools/mdbtools
docs: https://github.com/mdbtools/mdbtools/
package-manager:
  apk: mdbtools
  brew: mdbtools
  debian: mdbtools
  dnf: mdbtools
  macports: mdbtools
  nix: mdbtools
  ubuntu: mdbtools
  zypper: mdbtools
package-manager-url: https://formulae.brew.sh/formula/mdbtools
version: 1.0.1
license: GPL-2.0-or-later
category: database
tags:
  - cli
description: Tools to facilitate the use of Microsoft Access databases
source-archive: https://github.com/mdbtools/mdbtools/releases/download/v1.0.1/mdbtools-1.0.1.tar.gz
dependencies:
  - gettext
  - glib
  - readline
  - unixodbc
build-dependencies:
  - bison
  - gawk
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mdb-array
  - exposure: global executable
    kind: cli
    name: mdb-count
  - exposure: global executable
    kind: cli
    name: mdb-export
  - exposure: global executable
    kind: cli
    name: mdb-header
  - exposure: global executable
    kind: cli
    name: mdb-hexdump
  - exposure: global executable
    kind: cli
    name: mdb-json
  - exposure: global executable
    kind: cli
    name: mdb-parsecsv
  - exposure: global executable
    kind: cli
    name: mdb-prop
  - exposure: global executable
    kind: cli
    name: mdb-queries
  - exposure: global executable
    kind: cli
    name: mdb-schema
  - exposure: global executable
    kind: cli
    name: mdb-sql
  - exposure: global executable
    kind: cli
    name: mdb-tables
  - exposure: global executable
    kind: cli
    name: mdb-ver
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mdbtools
  av: sudo av install brew:mdbtools
  brew: brew install mdbtools
  debian: sudo apt install mdbtools
  dnf: sudo dnf install mdbtools
  macports: sudo port install mdbtools
  nix: nix profile install nixpkgs#mdbtools
  ubuntu: sudo apt install mdbtools
  zypper: sudo zypper install mdbtools
provenance:
  formula: mdbtools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
