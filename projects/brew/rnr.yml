id: brew:rnr
display-name: rnr
homepage: https://github.com/ismaelgv/rnr
repo: https://github.com/ismaelgv/rnr
docs: https://github.com/ismaelgv/rnr
package-manager:
  brew: rnr
  nix: rnr
  scoop: main/rnr
package-manager-url: https://formulae.brew.sh/formula/rnr
version: 0.5.1
license: MIT
category: development
tags:
  - cli
description: Command-line tool to batch rename files and directories
source-archive: https://github.com/ismaelgv/rnr/archive/refs/tags/v0.5.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rnr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rnr
  brew: brew install rnr
  nix: nix profile install nixpkgs#rnr
  scoop: scoop install main/rnr
provenance:
  formula: rnr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
