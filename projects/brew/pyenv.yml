id: brew:pyenv
display-name: pyenv
homepage: https://github.com/pyenv/pyenv
repo: https://github.com/pyenv/pyenv
docs: https://github.com/pyenv/pyenv
package-manager:
  brew: pyenv
  debian: pyenv
  nix: pyenv
  pacman: pyenv
  scoop: main/pyenv
  zypper: pyenv
package-manager-url: https://formulae.brew.sh/formula/pyenv
version: 2.6.31
license: MIT
category: development
tags:
  - cli
description: Python version management
source-archive: https://github.com/pyenv/pyenv/archive/refs/tags/v2.6.31.tar.gz
dependencies:
  - autoconf
  - openssl@3
  - pkgconf
  - readline
uses-from-macos:
  - bzip2
  - libffi
  - ncurses
  - xz
executables:
  - exposure: global executable
    kind: cli
    name: pyenv
  - exposure: global executable
    kind: cli
    name: pyenv-install
  - exposure: global executable
    kind: cli
    name: pyenv-uninstall
  - exposure: global executable
    kind: cli
    name: python-build
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pyenv
  brew: brew install pyenv
  debian: sudo apt install pyenv
  nix: nix profile install nixpkgs#pyenv
  pacman: sudo pacman -S pyenv
  scoop: scoop install main/pyenv
  zypper: sudo zypper install pyenv
provenance:
  formula: pyenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
