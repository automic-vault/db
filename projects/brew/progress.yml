id: brew:progress
display-name: progress
homepage: https://github.com/Xfennec/progress
repo: https://github.com/Xfennec/progress
docs: https://github.com/Xfennec/progress
package-manager:
  apk: progress
  brew: progress
  debian: progress
  dnf: progress
  macports: progress
  nix: progress
  pacman: progress
  ubuntu: progress
  zypper: progress
package-manager-url: https://formulae.brew.sh/formula/progress
version: 0.17
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Coreutils progress viewer
source-archive: https://github.com/Xfennec/progress/archive/refs/tags/v0.17.tar.gz
build-dependencies:
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: progress
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add progress
  av: sudo av install brew:progress
  brew: brew install progress
  debian: sudo apt install progress
  dnf: sudo dnf install progress
  macports: sudo port install progress
  nix: nix profile install nixpkgs#progress
  pacman: sudo pacman -S progress
  ubuntu: sudo apt install progress
  zypper: sudo zypper install progress
provenance:
  formula: progress
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
