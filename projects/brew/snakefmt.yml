id: brew:snakefmt
display-name: snakefmt
homepage: https://github.com/snakemake/snakefmt/
repo: >
  https://files.pythonhosted.org/packages/8e/0a/ce930eafdc3ea5999c6fd65cb473c33a3f310606907e6de0241ec5e5f149/snakefmt-2.0.0.tar.gz
docs: https://github.com/snakemake/snakefmt/
package-manager:
  brew: snakefmt
  nix: snakefmt
package-manager-url: https://formulae.brew.sh/formula/snakefmt
version: 2.0.0
license: MIT
category: development
tags:
  - cli
description: Snakemake code formatter
source-archive: >
  https://files.pythonhosted.org/packages/8e/0a/ce930eafdc3ea5999c6fd65cb473c33a3f310606907e6de0241ec5e5f149/snakefmt-2.0.0.tar.gz
dependencies:
  - python@3.14
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: snakefmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:snakefmt
  brew: brew install snakefmt
  nix: nix profile install nixpkgs#snakefmt
provenance:
  formula: snakefmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
