id: brew:gawk
display-name: gawk
homepage: https://www.gnu.org/software/gawk/
repo: https://ftpmirror.gnu.org/gnu/gawk/gawk-5.4.0.tar.xz
docs: https://www.gnu.org/software/gawk/
package-manager:
  apk: gawk
  brew: gawk
  chocolatey: gawk
  debian: gawk
  dnf: gawk
  macports: gawk
  nix: gawk
  pacman: gawk
  scoop: main/gawk
  ubuntu: gawk
  zypper: gawk
package-manager-url: https://formulae.brew.sh/formula/gawk
version: 5.4.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU awk utility
source-archive: https://ftpmirror.gnu.org/gnu/gawk/gawk-5.4.0.tar.xz
dependencies:
  - gettext
  - gmp
  - mpfr
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: awk
  - exposure: global executable
    kind: cli
    name: gawk
  - exposure: global executable
    kind: cli
    name: gawk-5.4.0
  - exposure: global executable
    kind: cli
    name: gawkbug
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    GNU "awk" has been installed as "gawk". If you need to use it as "awk", you can add
    a "gnubin" directory to your PATH from your ~/.bashrc and/or ~/.zshrc like:
    PATH="$HOMEBREW_PREFIX/opt/gawk/libexec/gnubin:$PATH"
  post-install-defined: false
install-lines:
  apk: sudo apk add gawk
  av: sudo av install brew:gawk
  brew: brew install gawk
  chocolatey: choco install gawk
  debian: sudo apt install gawk
  dnf: sudo dnf install gawk
  macports: sudo port install gawk
  nix: nix profile install nixpkgs#gawk
  pacman: sudo pacman -S gawk
  scoop: scoop install main/gawk
  ubuntu: sudo apt install gawk
  zypper: sudo zypper install gawk
provenance:
  formula: gawk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
