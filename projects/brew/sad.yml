id: brew:sad
display-name: sad
homepage: https://github.com/ms-jpq/sad
repo: https://github.com/ms-jpq/sad
docs: https://github.com/ms-jpq/sad
package-manager:
  apk: sad
  brew: sad
  dnf: sad
  macports: sad
  nix: sad
  pacman: sad
  scoop: main/sad
  zypper: sad
package-manager-url: https://formulae.brew.sh/formula/sad
version: 0.4.32
license: MIT
category: development
tags:
  - cli
description: CLI search and replace | Space Age seD
source-archive: https://github.com/ms-jpq/sad/archive/refs/tags/v0.4.32.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sad
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sad
  av: sudo av install brew:sad
  brew: brew install sad
  dnf: sudo dnf install sad
  macports: sudo port install sad
  nix: nix profile install nixpkgs#sad
  pacman: sudo pacman -S sad
  scoop: scoop install main/sad
  zypper: sudo zypper install sad
provenance:
  formula: sad
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
