id: brew:ethereum
display-name: ethereum
homepage: https://geth.ethereum.org/
repo: https://github.com/ethereum/go-ethereum
docs: https://geth.ethereum.org/
package-manager:
  apk: geth
  brew: ethereum
  macports: clef
  nix: era
  scoop: main/geth
  winget: Ethereum.geth
package-manager-url: https://formulae.brew.sh/formula/ethereum
version: 1.17.3
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Official Go implementation of the Ethereum protocol
source-archive: https://github.com/ethereum/go-ethereum/archive/refs/tags/v1.17.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: abidump
  - exposure: global executable
    kind: cli
    name: abigen
  - exposure: global executable
    kind: cli
    name: blsync
  - exposure: global executable
    kind: cli
    name: clef
  - exposure: global executable
    kind: cli
    name: devp2p
  - exposure: global executable
    kind: cli
    name: era
  - exposure: global executable
    kind: cli
    name: ethkey
  - exposure: global executable
    kind: cli
    name: evm
  - exposure: global executable
    kind: cli
    name: fetchpayload
  - exposure: global executable
    kind: cli
    name: geth
  - exposure: global executable
    kind: cli
    name: rlpdump
  - exposure: global executable
    kind: cli
    name: workload
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add geth
  av: sudo av install brew:ethereum
  brew: brew install ethereum
  macports: sudo port install clef
  nix: nix profile install nixpkgs#era
  scoop: scoop install main/geth
  winget: winget install --id Ethereum.geth -e
provenance:
  formula: ethereum
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
