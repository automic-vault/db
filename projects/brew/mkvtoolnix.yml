id: brew:mkvtoolnix
display-name: mkvtoolnix
homepage: https://mkvtoolnix.download/
repo: https://mkvtoolnix.download/sources/mkvtoolnix-99.0.tar.xz
docs: https://mkvtoolnix.download/
package-manager:
  apk: mkvtoolnix
  brew: mkvtoolnix
  chocolatey: mkvtoolnix
  debian: mkvtoolnix
  dnf: mkvtoolnix
  macports: mkvtoolnix
  nix: mkvtoolnix
  scoop: extras/mkvtoolnix
  ubuntu: mkvtoolnix
  winget: MoritzBunkus.MKVToolNix
  zypper: mkvtoolnix
package-manager-url: https://formulae.brew.sh/formula/mkvtoolnix
version: 99.0
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Matroska media files manipulation tools
source-archive: https://mkvtoolnix.download/sources/mkvtoolnix-99.0.tar.xz
dependencies:
  - boost
  - flac
  - fmt
  - gettext
  - gmp
  - libebml
  - libmatroska
  - libogg
  - libvorbis
  - pugixml
  - qtbase
build-dependencies:
  - docbook-xsl
  - gettext
  - nlohmann-json
  - pkgconf
  - utf8cpp
executables:
  - exposure: global executable
    kind: cli
    name: mkvextract
  - exposure: global executable
    kind: cli
    name: mkvinfo
  - exposure: global executable
    kind: cli
    name: mkvmerge
  - exposure: global executable
    kind: cli
    name: mkvpropedit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mkvtoolnix
  av: sudo av install brew:mkvtoolnix
  brew: brew install mkvtoolnix
  chocolatey: choco install mkvtoolnix
  debian: sudo apt install mkvtoolnix
  dnf: sudo dnf install mkvtoolnix
  macports: sudo port install mkvtoolnix
  nix: nix profile install nixpkgs#mkvtoolnix
  scoop: scoop install extras/mkvtoolnix
  ubuntu: sudo apt install mkvtoolnix
  winget: winget install --id MoritzBunkus.MKVToolNix -e
  zypper: sudo zypper install mkvtoolnix
provenance:
  formula: mkvtoolnix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
