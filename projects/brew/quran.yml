id: brew:quran
display-name: quran
homepage: https://git.hanabi.in/quran-go
repo: https://git.hanabi.in/repos/quran-go
docs: https://git.hanabi.in/quran-go
package-manager:
  brew: quran
package-manager-url: https://formulae.brew.sh/formula/quran
version: 1.0.1
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Print Qur'an chapters and verses right in the terminal
source-archive: https://git.hanabi.in/repos/quran-go.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: quran
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:quran
  brew: brew install quran
provenance:
  formula: quran
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
