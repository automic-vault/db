id: brew:minimap2
display-name: minimap2
homepage: https://lh3.github.io/minimap2
repo: https://github.com/lh3/minimap2
docs: https://lh3.github.io/minimap2
package-manager:
  brew: minimap2
  debian: minimap2
  nix: minimap2
  ubuntu: minimap2
package-manager-url: https://formulae.brew.sh/formula/minimap2
version: 2.31
license: MIT
category: development
tags:
  - cli
description: Versatile pairwise aligner for genomic and spliced nucleotide sequences
source-archive: https://github.com/lh3/minimap2/archive/refs/tags/v2.31.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: minimap2
  - exposure: global executable
    kind: cli
    name: sdust
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:minimap2
  brew: brew install minimap2
  debian: sudo apt install minimap2
  nix: nix profile install nixpkgs#minimap2
  ubuntu: sudo apt install minimap2
provenance:
  formula: minimap2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
