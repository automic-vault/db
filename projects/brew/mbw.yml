id: brew:mbw
display-name: mbw
homepage: https://github.com/raas/mbw/
repo: https://github.com/raas/mbw
docs: https://github.com/raas/mbw/
package-manager:
  brew: mbw
  debian: mbw
  ubuntu: mbw
package-manager-url: https://formulae.brew.sh/formula/mbw
version: 2.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Memory Bandwidth Benchmark
source-archive: https://github.com/raas/mbw/archive/refs/tags/v2.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: mbw
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mbw
  brew: brew install mbw
  debian: sudo apt install mbw
  ubuntu: sudo apt install mbw
provenance:
  formula: mbw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
