id: brew:portable-ruby
display-name: portable-ruby
homepage: https://www.ruby-lang.org/
repo: https://cache.ruby-lang.org/pub/ruby/4.0/ruby-4.0.5.tar.gz
docs: https://www.ruby-lang.org/
package-manager:
  brew: portable-ruby
package-manager-url: https://formulae.brew.sh/formula/portable-ruby
version: 4.0.5
license: Ruby
category: development
tags:
  - cli
description: Powerful, clean, object-oriented scripting language
source-archive: https://cache.ruby-lang.org/pub/ruby/4.0/ruby-4.0.5.tar.gz
build-dependencies:
  - pkgconf
  - portable-libyaml
  - portable-openssl
executables:
  - exposure: global executable
    kind: cli
    name: bootsnap
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - catalina
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:portable-ruby
  brew: brew install portable-ruby
provenance:
  formula: portable-ruby
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
