id: brew:cpulimit
display-name: cpulimit
homepage: https://github.com/opsengine/cpulimit
repo: https://github.com/opsengine/cpulimit
docs: https://github.com/opsengine/cpulimit
package-manager:
  apk: cpulimit
  brew: cpulimit
  debian: cpulimit
  dnf: cpulimit
  nix: cpulimit
  ubuntu: cpulimit
  zypper: cpulimit
package-manager-url: https://formulae.brew.sh/formula/cpulimit
version: 0.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: CPU usage limiter
source-archive: https://github.com/opsengine/cpulimit/archive/refs/tags/v0.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: cpulimit
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cpulimit
  av: sudo av install brew:cpulimit
  brew: brew install cpulimit
  debian: sudo apt install cpulimit
  dnf: sudo dnf install cpulimit
  nix: nix profile install nixpkgs#cpulimit
  ubuntu: sudo apt install cpulimit
  zypper: sudo zypper install cpulimit
provenance:
  formula: cpulimit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
