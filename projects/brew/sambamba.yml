id: brew:sambamba
display-name: sambamba
homepage: https://lomereiter.github.io/sambamba/
repo: https://github.com/biod/sambamba
docs: https://lomereiter.github.io/sambamba/
package-manager:
  brew: sambamba
  debian: sambamba
  nix: sambamba
  ubuntu: sambamba
package-manager-url: https://formulae.brew.sh/formula/sambamba
version: 1.0.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Tools for working with SAM/BAM data
source-archive: https://github.com/biod/sambamba/archive/refs/tags/v1.0.1.tar.gz
dependencies:
  - lz4
build-dependencies:
  - ldc
executables:
  - exposure: global executable
    kind: cli
    name: sambamba
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sambamba
  brew: brew install sambamba
  debian: sudo apt install sambamba
  nix: nix profile install nixpkgs#sambamba
  ubuntu: sudo apt install sambamba
provenance:
  formula: sambamba
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
