id: brew:tarsnapper
display-name: tarsnapper
homepage: https://github.com/miracle2k/tarsnapper
repo: >
  https://files.pythonhosted.org/packages/4e/c5/0a08950e5faba96e211715571c68ef64ee37b399ef4f0c4ab55e66c3c4fe/tarsnapper-0.5.0.tar.gz
docs: https://github.com/miracle2k/tarsnapper
package-manager:
