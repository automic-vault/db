id: brew:osrm-backend
display-name: osrm-backend
homepage: https://project-osrm.org/
repo: https://github.com/Project-OSRM/osrm-backend
docs: https://project-osrm.org/
package-manager:
  brew: osrm-backend
  nix: osrm-backend
package-manager-url: https://formulae.brew.sh/formula/osrm-backend
version: 26.5.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: High performance routing engine
source-archive: https://github.com/Project-OSRM/osrm-backend/archive/refs/tags/v26.5.0.tar.gz
dependencies:
  - boost
  - libarchive
  - lua
  - tbb
build-dependencies:
  - cmake
  - flatbuffers
  - fmt
  - libosmium
  - pkgconf
  - protozero
  - rapidjson
  - sol2
  - vtzero
uses-from-macos:
  - bzip2
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: osrm-components
  - exposure: global executable
    kind: cli
    name: osrm-contract
  - exposure: global executable
    kind: cli
    name: osrm-customize
  - exposure: global executable
    kind: cli
    name: osrm-datastore
  - exposure: global executable
    kind: cli
    name: osrm-extract
  - exposure: global executable
    kind: cli
    name: osrm-io-benchmark
  - exposure: global executable
    kind: cli
    name: osrm-partition
  - exposure: global executable
    kind: cli
    name: osrm-routed
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:osrm-backend
  brew: brew install osrm-backend
  nix: nix profile install nixpkgs#osrm-backend
provenance:
  formula: osrm-backend
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
