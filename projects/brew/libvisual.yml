id: brew:libvisual
display-name: libvisual
homepage: https://github.com/Libvisual/libvisual
repo: https://github.com/Libvisual/libvisual
docs: https://github.com/Libvisual/libvisual
package-manager:
  brew: libvisual
  debian: lv-tool-0.4
  dnf: libvisual
  ubuntu: lv-tool-0.4
package-manager-url: https://formulae.brew.sh/formula/libvisual
version: 0.4.2
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: Audio Visualization tool and library
source-archive: >
  https://github.com/Libvisual/libvisual/releases/download/libvisual-0.4.2/libvisual-0.4.2.tar.gz
dependencies:
  - sdl12-compat
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: lv-tool-0.4
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libvisual
  brew: brew install libvisual
  debian: sudo apt install lv-tool-0.4
  dnf: sudo dnf install libvisual
  ubuntu: sudo apt install lv-tool-0.4
provenance:
  formula: libvisual
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
