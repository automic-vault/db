id: brew:caracal
display-name: caracal
homepage: https://github.com/crytic/caracal
repo: https://github.com/crytic/caracal
docs: https://github.com/crytic/caracal
package-manager:
  brew: caracal
package-manager-url: https://formulae.brew.sh/formula/caracal
version: 0.2.3
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Static analyzer for Starknet smart contracts
source-archive: https://github.com/crytic/caracal/archive/refs/tags/v0.2.3.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: caracal
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
