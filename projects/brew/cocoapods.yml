id: brew:cocoapods
display-name: cocoapods
homepage: https://cocoapods.org/
repo: https://github.com/CocoaPods/CocoaPods
docs: https://cocoapods.org/
package-manager:
  brew: cocoapods
  nix: cocoapods
package-manager-url: https://formulae.brew.sh/formula/cocoapods
version: 1.16.2
license: MIT
category: development
tags:
  - cli
description: Dependency manager for Cocoa projects
source-archive: https://github.com/CocoaPods/CocoaPods/archive/refs/tags/1.16.2.tar.gz
dependencies:
  - ruby
build-dependencies:
  - pkgconf
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: pod
  - exposure: global executable
    kind: cli
    name: xcodeproj
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cocoapods
  brew: brew install cocoapods
  nix: nix profile install nixpkgs#cocoapods
provenance:
  formula: cocoapods
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
