id: brew:gurk
display-name: gurk
homepage: https://github.com/boxdot/gurk-rs
repo: https://github.com/boxdot/gurk-rs
docs: https://github.com/boxdot/gurk-rs
package-manager:
  brew: gurk
  pacman: gurk
package-manager-url: https://formulae.brew.sh/formula/gurk
version: 0.9.3
license: AGPL-3.0-only
category: development
tags:
  - cli
description: Signal Messenger client for terminal
source-archive: https://github.com/boxdot/gurk-rs/archive/refs/tags/v0.9.3.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gurk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gurk
  brew: brew install gurk
  pacman: sudo pacman -S gurk
provenance:
  formula: gurk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
