id: brew:lame
display-name: lame
homepage: https://lame.sourceforge.io/
repo: https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz
docs: https://lame.sourceforge.io/
package-manager:
  apk: lame
  brew: lame
  chocolatey: lame
  debian: lame
  dnf: lame
  macports: lame
  nix: lame
  pacman: lame
  scoop: main/lame
  ubuntu: lame
  winget: LAME.LAME
  zypper: lame
package-manager-url: https://formulae.brew.sh/formula/lame
version: 3.100
license: LGPL-2.0-or-later
category: media
tags:
  - cli
description: High quality MPEG Audio Layer III (MP3) encoder
source-archive: https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: lame
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lame
  av: sudo av install brew:lame
  brew: brew install lame
  chocolatey: choco install lame
  debian: sudo apt install lame
  dnf: sudo dnf install lame
  macports: sudo port install lame
  nix: nix profile install nixpkgs#lame
  pacman: sudo pacman -S lame
  scoop: scoop install main/lame
  ubuntu: sudo apt install lame
  winget: winget install --id LAME.LAME -e
  zypper: sudo zypper install lame
provenance:
  formula: lame
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
