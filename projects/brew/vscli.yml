id: brew:vscli
display-name: vscli
homepage: https://github.com/michidk/vscli
repo: https://github.com/michidk/vscli
docs: https://github.com/michidk/vscli
package-manager:
  brew: vscli
  winget: michidk.vscli
package-manager-url: https://formulae.brew.sh/formula/vscli
version: 1.3.1
license: MIT
category: development
tags:
  - cli
description: CLI/TUI that launches VSCode projects, with a focus on dev containers
source-archive: https://github.com/michidk/vscli/archive/refs/tags/v1.3.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: vscli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vscli
  brew: brew install vscli
  winget: winget install --id michidk.vscli -e
provenance:
  formula: vscli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
