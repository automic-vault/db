id: brew:jless
display-name: jless
homepage: https://jless.io/
repo: https://github.com/PaulJuliusMartinez/jless
docs: https://jless.io/
package-manager:
  apk: jless
  brew: jless
  macports: jless
  nix: jless
  pacman: jless
  zypper: jless
package-manager-url: https://formulae.brew.sh/formula/jless
version: 0.9.0
license: MIT
category: development
tags:
  - cli
  - json
description: Command-line pager for JSON data
source-archive: https://github.com/PaulJuliusMartinez/jless/archive/refs/tags/v0.9.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: jless
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jless
  av: sudo av install brew:jless
  brew: brew install jless
  macports: sudo port install jless
  nix: nix profile install nixpkgs#jless
  pacman: sudo pacman -S jless
  zypper: sudo zypper install jless
provenance:
  formula: jless
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
