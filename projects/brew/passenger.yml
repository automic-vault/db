id: brew:passenger
display-name: passenger
homepage: https://www.phusionpassenger.com/
repo: https://github.com/phusion/passenger
docs: https://www.phusionpassenger.com/
package-manager:
  brew: passenger
  debian: passenger
  pacman: passenger
  ubuntu: passenger
package-manager-url: https://formulae.brew.sh/formula/passenger
version: 6.1.3
license: MIT
category: development
tags:
  - cli
description: Server for Ruby, Python, and Node.js apps via Apache/NGINX
source-archive: >
  https://github.com/phusion/passenger/releases/download/release-6.1.3/passenger-6.1.3.tar.gz
dependencies:
  - apr
  - apr-util
  - openssl@3
  - pcre2
build-dependencies:
  - httpd
  - nginx
uses-from-macos:
  - curl
  - libxcrypt
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: passenger
  - exposure: global executable
    kind: cli
    name: passenger-config
  - exposure: global executable
    kind: cli
    name: passenger-install-apache2-module
  - exposure: global executable
    kind: cli
    name: passenger-install-nginx-module
  - exposure: global executable
    kind: cli
    name: passenger-memory-stats
  - exposure: global executable
    kind: cli
    name: passenger-status
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To activate Phusion Passenger for Nginx, run: brew install nginx And add the
    following to $HOMEBREW_PREFIX/etc/nginx/nginx.conf at the top scope (outside
    http{}): load_module
    $HOMEBREW_PREFIX/opt/passenger/libexec/modules/ngx_http_passenger_module.so; And add
    the following to $HOMEBREW_PREFIX/etc/nginx/nginx.conf in the http scope:
    passenger_root
    $HOMEBREW_PREFIX/opt/passenger/libexec/src/ruby_supportlib/phusion_passenger/locations.ini;
    passenger_ruby /usr/bin/ruby; To activate Phusion Passenger for Apache, create
    /etc/apache2/other/passenger.conf: LoadModule passenger_module
    $HOMEBREW_PREFIX/opt/passenger/libexec/buildout/apache2/mod_passenger.so
    PassengerRoot
    $HOMEBREW_PREFIX/opt/passenger/libexec/src/ruby_supportlib/phusion_passenger/locations.ini
    PassengerDefaultRuby /usr/bin/ruby
  post-install-defined: false
install-lines:
  av: sudo av install brew:passenger
  brew: brew install passenger
  debian: sudo apt install passenger
  pacman: sudo pacman -S passenger
  ubuntu: sudo apt install passenger
provenance:
  formula: passenger
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
