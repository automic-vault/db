id: brew:riscv64-elf-gdb
display-name: riscv64-elf-gdb
homepage: https://www.gnu.org/software/gdb/
repo: https://ftpmirror.gnu.org/gnu/gdb/gdb-17.2.tar.xz
docs: https://www.gnu.org/software/gdb/
package-manager:
  brew: riscv64-elf-gdb
  pacman: riscv64-elf-gdb
package-manager-url: https://formulae.brew.sh/formula/riscv64-elf-gdb
version: 17.2
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU debugger for riscv64-elf cross development
source-archive: https://ftpmirror.gnu.org/gnu/gdb/gdb-17.2.tar.xz
dependencies:
  - gmp
  - mpfr
  - ncurses
  - python@3.14
  - readline
  - xz
  - zstd
build-dependencies:
  - pkgconf
  - texinfo
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: riscv64-elf-gdb
  - exposure: global executable
    kind: cli
    name: riscv64-elf-gdb-add-index
  - exposure: global executable
    kind: cli
    name: riscv64-elf-gstack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:riscv64-elf-gdb
  brew: brew install riscv64-elf-gdb
  pacman: sudo pacman -S riscv64-elf-gdb
provenance:
  formula: riscv64-elf-gdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
