id: brew:mimic
display-name: mimic
homepage: https://github.com/MycroftAI/mimic1
repo: https://github.com/MycroftAI/mimic1
docs: https://github.com/MycroftAI/mimic1
package-manager:
  brew: mimic
  debian: mimic
  nix: mimic
  zypper: mimic
package-manager-url: https://formulae.brew.sh/formula/mimic
version: 1.3.0.1
license: >
  MIT-Festival AND BSD-2-Clause AND BSD-3-Clause AND Spencer-86 AND Apache-2.0 AND
  LicenseRef-Homebrew-cannot-represent
category: development
tags:
  - cli
description: Lightweight text-to-speech engine based on CMU Flite
source-archive: https://github.com/MycroftAI/mimic1/archive/refs/tags/1.3.0.1.tar.gz
dependencies:
  - pcre2
  - portaudio
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: compile_regexes
  - exposure: global executable
    kind: cli
    name: mimic
  - exposure: global executable
    kind: cli
    name: mimic_time
  - exposure: global executable
    kind: cli
    name: mimicvox_info
  - exposure: global executable
    kind: cli
    name: t2p
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mimic
  brew: brew install mimic
  debian: sudo apt install mimic
  nix: nix profile install nixpkgs#mimic
  zypper: sudo zypper install mimic
provenance:
  formula: mimic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
