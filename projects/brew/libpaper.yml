id: brew:libpaper
display-name: libpaper
homepage: https://github.com/rrthomas/libpaper
repo: https://github.com/rrthomas/libpaper
docs: https://github.com/rrthomas/libpaper
package-manager:
  apk: libpaper
  brew: libpaper
  dnf: libpaper
  macports: libpaper
  nix: libpaper
  pacman: libpaper
  zypper: libpaper
package-manager-url: https://formulae.brew.sh/formula/libpaper
version: 2.2.8
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Library for handling paper characteristics
source-archive: https://github.com/rrthomas/libpaper/releases/download/v2.2.8/libpaper-2.2.8.tar.gz
build-dependencies:
  - help2man
executables:
  - exposure: global executable
    kind: cli
    name: paper
  - exposure: global executable
    kind: cli
    name: paperconf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libpaper
  av: sudo av install brew:libpaper
  brew: brew install libpaper
  dnf: sudo dnf install libpaper
  macports: sudo port install libpaper
  nix: nix profile install nixpkgs#libpaper
  pacman: sudo pacman -S libpaper
  zypper: sudo zypper install libpaper
provenance:
  formula: libpaper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
