id: brew:protoc-gen-doc
display-name: protoc-gen-doc
homepage: https://github.com/pseudomuto/protoc-gen-doc
repo: https://github.com/pseudomuto/protoc-gen-doc
docs: https://github.com/pseudomuto/protoc-gen-doc
package-manager:
  apk: protoc-gen-doc
  brew: protoc-gen-doc
  nix: protoc-gen-doc
package-manager-url: https://formulae.brew.sh/formula/protoc-gen-doc
version: 1.5.1
license: MIT
category: development
tags:
  - cli
description: Documentation generator plugin for Google Protocol Buffers
source-archive: https://github.com/pseudomuto/protoc-gen-doc/archive/refs/tags/v1.5.1.tar.gz
dependencies:
  - protobuf
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: protoc-gen-doc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add protoc-gen-doc
  av: sudo av install brew:protoc-gen-doc
  brew: brew install protoc-gen-doc
  nix: nix profile install nixpkgs#protoc-gen-doc
provenance:
  formula: protoc-gen-doc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
