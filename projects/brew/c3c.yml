id: brew:c3c
display-name: c3c
homepage: https://github.com/c3lang/c3c
repo: https://github.com/c3lang/c3c
docs: https://github.com/c3lang/c3c
package-manager:
  brew: c3c
  nix: c3c
  pacman: c3c
package-manager-url: https://formulae.brew.sh/formula/c3c
version: 0.8.0
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Compiler for the C3 language
source-archive: https://github.com/c3lang/c3c/archive/refs/tags/v0.8.0.tar.gz
dependencies:
  - lld
  - llvm
build-dependencies:
  - cmake
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: c3c
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:c3c
  brew: brew install c3c
  nix: nix profile install nixpkgs#c3c
  pacman: sudo pacman -S c3c
provenance:
  formula: c3c
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
