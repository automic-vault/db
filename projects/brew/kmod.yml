id: brew:kmod
display-name: kmod
homepage: https://git.kernel.org/pub/scm/utils/kernel/kmod/kmod.git
repo: https://mirrors.edge.kernel.org/pub/linux/utils/kernel/kmod/kmod-34.2.tar.xz
docs: https://git.kernel.org/pub/scm/utils/kernel/kmod/kmod.git
package-manager:
  apk: kmod
  brew: kmod
  debian: kmod
  dnf: kmod
  nix: kmod
  pacman: kmod
  ubuntu: kmod
  zypper: kmod
package-manager-url: https://formulae.brew.sh/formula/kmod
version: 34.2
license: LGPL-2.1-or-later AND GPL-2.0-or-later
category: development
tags:
  - cli
description: Linux kernel module handling
source-archive: https://mirrors.edge.kernel.org/pub/linux/utils/kernel/kmod/kmod-34.2.tar.xz
dependencies:
  - openssl@3
  - xz
  - zlib-ng-compat
  - zstd
build-dependencies:
  - meson
  - ninja
  - pkgconf
  - scdoc
executables:
  - exposure: global executable
    kind: cli
    name: depmod
  - exposure: global executable
    kind: cli
    name: insmod
  - exposure: global executable
    kind: cli
    name: kmod
  - exposure: global executable
    kind: cli
    name: lsmod
  - exposure: global executable
    kind: cli
    name: modinfo
  - exposure: global executable
    kind: cli
    name: modprobe
  - exposure: global executable
    kind: cli
    name: rmmod
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kmod
  av: sudo av install brew:kmod
  brew: brew install kmod
  debian: sudo apt install kmod
  dnf: sudo dnf install kmod
  nix: nix profile install nixpkgs#kmod
  pacman: sudo pacman -S kmod
  ubuntu: sudo apt install kmod
  zypper: sudo zypper install kmod
provenance:
  formula: kmod
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
