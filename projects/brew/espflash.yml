id: brew:espflash
display-name: espflash
homepage: https://github.com/esp-rs/espflash
repo: https://github.com/esp-rs/espflash
docs: https://github.com/esp-rs/espflash
package-manager:
  brew: espflash
  nix: espflash
  pacman: espflash
package-manager-url: https://formulae.brew.sh/formula/espflash
version: 4.4.0
license: MIT OR Apache-2.0
category: development
tags:
  - cli
description: Serial flasher utility for Espressif SoCs and modules based on esptool.py
source-archive: https://github.com/esp-rs/espflash/archive/refs/tags/v4.4.0.tar.gz
build-dependencies:
  - libuv
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: espflash
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:espflash
  brew: brew install espflash
  nix: nix profile install nixpkgs#espflash
  pacman: sudo pacman -S espflash
provenance:
  formula: espflash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
