id: brew:wgo
display-name: wgo
homepage: https://github.com/bokwoon95/wgo
repo: https://github.com/bokwoon95/wgo
docs: https://github.com/bokwoon95/wgo
package-manager:
  brew: wgo
  nix: wgo
package-manager-url: https://formulae.brew.sh/formula/wgo
version: 0.6.4
license: MIT
category: development
tags:
  - cli
description: Watch arbitrary files and respond with arbitrary commands
source-archive: https://github.com/bokwoon95/wgo/archive/refs/tags/v0.6.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wgo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wgo
  brew: brew install wgo
  nix: nix profile install nixpkgs#wgo
provenance:
  formula: wgo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
