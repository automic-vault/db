id: brew:clifm
display-name: clifm
homepage: https://github.com/leo-arch/clifm
repo: https://github.com/leo-arch/clifm
docs: https://github.com/leo-arch/clifm
package-manager:
  apk: clifm
  brew: clifm
  dnf: clifm
  macports: clifm
  nix: clifm
package-manager-url: https://formulae.brew.sh/formula/clifm
version: 1.27.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Command-line Interface File Manager
source-archive: https://github.com/leo-arch/clifm/archive/refs/tags/v1.27.1.tar.gz
dependencies:
  - gettext
  - libmagic
  - readline
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: clifm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add clifm
  av: sudo av install brew:clifm
  brew: brew install clifm
  dnf: sudo dnf install clifm
  macports: sudo port install clifm
  nix: nix profile install nixpkgs#clifm
provenance:
  formula: clifm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
