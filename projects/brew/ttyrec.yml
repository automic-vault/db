id: brew:ttyrec
display-name: ttyrec
homepage: http://0xcc.net/ttyrec/
repo: https://deb.debian.org/debian/pool/main/t/ttyrec/ttyrec_1.0.8.orig.tar.gz
docs: http://0xcc.net/ttyrec/
package-manager:
  brew: ttyrec
  debian: ttyrec
  macports: ttyrec
  ubuntu: ttyrec
package-manager-url: https://formulae.brew.sh/formula/ttyrec
version: 1.0.8
license: BSD-4-Clause
category: network
tags:
  - cli
description: Terminal interaction recorder and player
source-archive: https://deb.debian.org/debian/pool/main/t/ttyrec/ttyrec_1.0.8.orig.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ttyplay
  - exposure: global executable
    kind: cli
    name: ttyrec
  - exposure: global executable
    kind: cli
    name: ttytime
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ttyrec
  brew: brew install ttyrec
  debian: sudo apt install ttyrec
  macports: sudo port install ttyrec
  ubuntu: sudo apt install ttyrec
provenance:
  formula: ttyrec
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
