id: brew:sound-touch
display-name: sound-touch
homepage: https://www.surina.net/soundtouch/
repo: https://codeberg.org/soundtouch/soundtouch/archive/2.4.1.tar.gz
docs: https://www.surina.net/soundtouch/
package-manager:
  brew: sound-touch
  debian: soundstretch
  ubuntu: soundstretch
package-manager-url: https://formulae.brew.sh/formula/sound-touch
version: 2.4.1
license: LGPL-2.1-or-later
category: media
tags:
  - cli
description: Audio processing library
source-archive: https://codeberg.org/soundtouch/soundtouch/archive/2.4.1.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: soundstretch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sound-touch
  brew: brew install sound-touch
  debian: sudo apt install soundstretch
  ubuntu: sudo apt install soundstretch
provenance:
  formula: sound-touch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
