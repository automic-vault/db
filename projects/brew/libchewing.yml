id: brew:libchewing
display-name: libchewing
homepage: https://chewing.im/
repo: https://github.com/chewing/libchewing
docs: https://chewing.im/
package-manager:
  apk: libchewing
  brew: libchewing
  dnf: libchewing
  macports: libchewing
  nix: libchewing
  pacman: libchewing
  zypper: chewing-cli
package-manager-url: https://formulae.brew.sh/formula/libchewing
version: 0.12.0
license: LGPL-2.1-only
category: development
tags:
  - cli
description: Intelligent phonetic input method library
source-archive: >
  https://github.com/chewing/libchewing/releases/download/v0.12.0/libchewing-0.12.0.tar.zst
build-dependencies:
  - cmake
  - corrosion
  - rust
  - texinfo
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: chewing-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libchewing
  av: sudo av install brew:libchewing
  brew: brew install libchewing
  dnf: sudo dnf install libchewing
  macports: sudo port install libchewing
  nix: nix profile install nixpkgs#libchewing
  pacman: sudo pacman -S libchewing
  zypper: sudo zypper install chewing-cli
provenance:
  formula: libchewing
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
