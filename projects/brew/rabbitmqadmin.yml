id: brew:rabbitmqadmin
display-name: rabbitmqadmin
homepage: https://www.rabbitmq.com/docs/management-cli
repo: https://github.com/rabbitmq/rabbitmqadmin-ng
docs: https://www.rabbitmq.com/docs/management-cli
package-manager:
  brew: rabbitmqadmin
  pacman: rabbitmqadmin
  scoop: extras/rabbitmqadmin
package-manager-url: https://formulae.brew.sh/formula/rabbitmqadmin
version: 2.31.0
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool for RabbitMQ that uses the HTTP API
source-archive: https://github.com/rabbitmq/rabbitmqadmin-ng/archive/refs/tags/v2.31.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rabbitmqadmin
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rabbitmqadmin
  brew: brew install rabbitmqadmin
  pacman: sudo pacman -S rabbitmqadmin
  scoop: scoop install extras/rabbitmqadmin
provenance:
  formula: rabbitmqadmin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
