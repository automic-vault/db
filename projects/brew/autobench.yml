id: brew:autobench
display-name: autobench
homepage: http://www.xenoclast.org/autobench/
repo: https://distfiles.macports.org/autobench/autobench-2.1.2.tar.gz
docs: http://www.xenoclast.org/autobench/
package-manager:
  brew: autobench
  macports: autobench
  zypper: autobench
package-manager-url: https://formulae.brew.sh/formula/autobench
version: 2.1.2
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Automatic webserver benchmark tool
source-archive: https://distfiles.macports.org/autobench/autobench-2.1.2.tar.gz
dependencies:
  - httperf
executables:
  - exposure: global executable
    kind: cli
    name: autobench
  - exposure: global executable
    kind: cli
    name: autobench_admin
  - exposure: global executable
    kind: cli
    name: autobenchd
  - exposure: global executable
    kind: cli
    name: bench2graph
  - exposure: global executable
    kind: cli
    name: crfile
  - exposure: global executable
    kind: cli
    name: sesslog
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:autobench
  brew: brew install autobench
  macports: sudo port install autobench
  zypper: sudo zypper install autobench
provenance:
  formula: autobench
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
