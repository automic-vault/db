id: brew:esniper
display-name: esniper
homepage: https://sourceforge.net/projects/esniper/
repo: https://downloads.sourceforge.net/project/esniper/esniper/2.35.0/esniper-2-35-0.tgz
docs: https://sourceforge.net/projects/esniper/
package-manager:
