id: brew:goodls
display-name: goodls
homepage: https://github.com/tanaikech/goodls
repo: https://github.com/tanaikech/goodls
docs: https://github.com/tanaikech/goodls
package-manager:
  brew: goodls
package-manager-url: https://formulae.brew.sh/formula/goodls
version: 3.2.2
license: MIT
category: development
tags:
  - cli
description: CLI tool to download shared files and folders from Google Drive
source-archive: https://github.com/tanaikech/goodls/archive/refs/tags/v3.2.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goodls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:goodls
  brew: brew install goodls
provenance:
  formula: goodls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
