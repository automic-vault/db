id: brew:ansible-cmdb
display-name: ansible-cmdb
homepage: https://github.com/fboender/ansible-cmdb
repo: https://github.com/fboender/ansible-cmdb
docs: https://github.com/fboender/ansible-cmdb
package-manager:
  brew: ansible-cmdb
  nix: ansible-cmdb
  zypper: ansible-cmdb
package-manager-url: https://formulae.brew.sh/formula/ansible-cmdb
version: 1.31
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Generates static HTML overview page from Ansible facts
source-archive: https://github.com/fboender/ansible-cmdb/archive/refs/tags/1.31.tar.gz
dependencies:
  - libyaml
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: ansible-cmdb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ansible-cmdb
  brew: brew install ansible-cmdb
  nix: nix profile install nixpkgs#ansible-cmdb
  zypper: sudo zypper install ansible-cmdb
provenance:
  formula: ansible-cmdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
