id: brew:xdotool
display-name: xdotool
homepage: https://www.semicomplete.com/projects/xdotool/
repo: https://github.com/jordansissel/xdotool
docs: https://www.semicomplete.com/projects/xdotool/
package-manager:
  apk: xdotool
  brew: xdotool
  debian: xdotool
  dnf: xdotool
  macports: xdotool
  nix: xdotool
  pacman: xdotool
  ubuntu: xdotool
  zypper: xdotool
package-manager-url: https://formulae.brew.sh/formula/xdotool
version: 4.20260303.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Fake keyboard/mouse input and window management for X
source-archive: https://github.com/jordansissel/xdotool/archive/refs/tags/v4.20260303.1.tar.gz
dependencies:
  - libx11
  - libxi
  - libxinerama
  - libxkbcommon
  - libxtst
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xdotool
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    You will probably want to enable XTEST in your X11 server now by running: defaults
    write org.x.X11 enable_test_extensions -boolean true For the source of this useful
    hint:
    https://stackoverflow.com/questions/1264210/does-mac-x11-have-the-xtest-extension
  post-install-defined: false
install-lines:
  apk: sudo apk add xdotool
  av: sudo av install brew:xdotool
  brew: brew install xdotool
  debian: sudo apt install xdotool
  dnf: sudo dnf install xdotool
  macports: sudo port install xdotool
  nix: nix profile install nixpkgs#xdotool
  pacman: sudo pacman -S xdotool
  ubuntu: sudo apt install xdotool
  zypper: sudo zypper install xdotool
provenance:
  formula: xdotool
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
