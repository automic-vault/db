id: brew:stm32flash
display-name: stm32flash
homepage: https://sourceforge.net/projects/stm32flash/
repo: https://downloads.sourceforge.net/project/stm32flash/stm32flash-0.7.tar.gz
docs: https://sourceforge.net/projects/stm32flash/
package-manager:
  apk: stm32flash
  brew: stm32flash
  debian: stm32flash
  macports: stm32flash
  nix: stm32flash
  ubuntu: stm32flash
  zypper: stm32flash
package-manager-url: https://formulae.brew.sh/formula/stm32flash
version: 0.7
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Open source flash program for STM32 using the ST serial bootloader
source-archive: https://downloads.sourceforge.net/project/stm32flash/stm32flash-0.7.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: stm32flash
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add stm32flash
  av: sudo av install brew:stm32flash
  brew: brew install stm32flash
  debian: sudo apt install stm32flash
  macports: sudo port install stm32flash
  nix: nix profile install nixpkgs#stm32flash
  ubuntu: sudo apt install stm32flash
  zypper: sudo zypper install stm32flash
provenance:
  formula: stm32flash
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
