id: brew:snzip
display-name: snzip
homepage: https://github.com/kubo/snzip
repo: https://github.com/kubo/snzip
docs: https://github.com/kubo/snzip
package-manager:
  brew: snzip
  nix: snzip
package-manager-url: https://formulae.brew.sh/formula/snzip
version: 1.0.5
license: BSD-2-Clause
category: development
tags:
  - cli
description: Compression/decompression tool based on snappy
source-archive: https://github.com/kubo/snzip/releases/download/v1.0.5/snzip-1.0.5.tar.gz
dependencies:
  - snappy
executables:
  - exposure: global executable
    kind: cli
    name: snunzip
  - exposure: global executable
    kind: cli
    name: snzcat
  - exposure: global executable
    kind: cli
    name: snzip
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:snzip
  brew: brew install snzip
  nix: nix profile install nixpkgs#snzip
provenance:
  formula: snzip
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
