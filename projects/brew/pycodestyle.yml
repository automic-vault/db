id: brew:pycodestyle
display-name: pycodestyle
homepage: https://pycodestyle.pycqa.org/
repo: https://github.com/PyCQA/pycodestyle
docs: https://pycodestyle.pycqa.org/
package-manager:
  brew: pycodestyle
  debian: pycodestyle
  ubuntu: pycodestyle
package-manager-url: https://formulae.brew.sh/formula/pycodestyle
version: 2.14.0
license: MIT
category: development
tags:
  - cli
description: Simple Python style checker in one Python file
source-archive: https://github.com/PyCQA/pycodestyle/archive/refs/tags/2.14.0.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: pycodestyle
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pycodestyle
  brew: brew install pycodestyle
  debian: sudo apt install pycodestyle
  ubuntu: sudo apt install pycodestyle
provenance:
  formula: pycodestyle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
