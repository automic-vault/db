id: brew:restish
display-name: restish
homepage: https://rest.sh/
repo: https://github.com/rest-sh/restish
docs: https://rest.sh/
package-manager:
  brew: restish
  macports: restish
  nix: restish
  scoop: extras/restish
package-manager-url: https://formulae.brew.sh/formula/restish
version: 2.0.0
license: MIT
category: development
tags:
  - cli
description: CLI tool for interacting with REST-ish HTTP APIs
source-archive: https://github.com/rest-sh/restish/archive/refs/tags/v2.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: restish
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:restish
  brew: brew install restish
  macports: sudo port install restish
  nix: nix profile install nixpkgs#restish
  scoop: scoop install extras/restish
provenance:
  formula: restish
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
