id: brew:diesel
display-name: diesel
homepage: https://diesel.rs
repo: https://github.com/diesel-rs/diesel
docs: https://diesel.rs
package-manager:
  brew: diesel
package-manager-url: https://formulae.brew.sh/formula/diesel
version: 2.3.9
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Command-line tool for Rust ORM Diesel
source-archive: https://github.com/diesel-rs/diesel/archive/refs/tags/v2.3.9.tar.gz
dependencies:
  - libpq
  - mariadb-connector-c
build-dependencies:
  - rust
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: diesel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:diesel
  brew: brew install diesel
provenance:
  formula: diesel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
