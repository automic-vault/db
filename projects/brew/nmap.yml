id: brew:nmap
display-name: nmap
homepage: https://nmap.org/
repo: https://nmap.org/dist/nmap-7.99.tar.bz2
docs: https://nmap.org/
package-manager:
  apk: nmap
  brew: nmap
  chocolatey: nmap
  debian: nmap
  dnf: nmap
  macports: nmap
  nix: nmap
  pacman: nmap
  scoop: main/nmap
  ubuntu: nmap
  winget: Insecure.Nmap
package-manager-url: https://formulae.brew.sh/formula/nmap
version: 7.99
license: LicenseRef-Homebrew-cannot-represent
category: network
tags:
  - cli
description: Port scanning utility for large networks
source-archive: https://nmap.org/dist/nmap-7.99.tar.bz2
dependencies:
  - liblinear
  - libssh2
  - lua
  - openssl@3
  - pcre2
  - python@3.14
build-dependencies:
  - python-setuptools
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: ncat
  - exposure: global executable
    kind: cli
    name: ndiff
  - exposure: global executable
    kind: cli
    name: nmap
  - exposure: global executable
    kind: cli
    name: nping
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nmap
  av: sudo av install brew:nmap
  brew: brew install nmap
  chocolatey: choco install nmap
  debian: sudo apt install nmap
  dnf: sudo dnf install nmap
  macports: sudo port install nmap
  nix: nix profile install nixpkgs#nmap
  pacman: sudo pacman -S nmap
  scoop: scoop install main/nmap
  ubuntu: sudo apt install nmap
  winget: winget install --id Insecure.Nmap -e
provenance:
  formula: nmap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
