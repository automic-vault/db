id: brew:ykpers
display-name: ykpers
homepage: https://developers.yubico.com/yubikey-personalization/
repo: https://developers.yubico.com/yubikey-personalization/Releases/ykpers-1.20.0.tar.gz
docs: https://developers.yubico.com/yubikey-personalization/
package-manager:
  apk: ykpers
  brew: ykpers
  dnf: ykpers
  macports: ykpers
  zypper: ykpers
package-manager-url: https://formulae.brew.sh/formula/ykpers
version: 1.20.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: YubiKey personalization library and tool
source-archive: https://developers.yubico.com/yubikey-personalization/Releases/ykpers-1.20.0.tar.gz
dependencies:
  - json-c
  - libyubikey
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ykchalresp
  - exposure: global executable
    kind: cli
    name: ykinfo
  - exposure: global executable
    kind: cli
    name: ykpersonalize
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ykpers
  av: sudo av install brew:ykpers
  brew: brew install ykpers
  dnf: sudo dnf install ykpers
  macports: sudo port install ykpers
  zypper: sudo zypper install ykpers
provenance:
  formula: ykpers
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
