id: brew:pyrefly
display-name: pyrefly
homepage: https://pyrefly.org/
repo: https://github.com/facebook/pyrefly
docs: https://pyrefly.org/
package-manager:
  brew: pyrefly
  nix: pyrefly
  scoop: main/pyrefly
package-manager-url: https://formulae.brew.sh/formula/pyrefly
version: 1.0.0
license: MIT
category: development
tags:
  - cli
description: Fast type checker and IDE for Python
source-archive: https://github.com/facebook/pyrefly/archive/refs/tags/1.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: pyrefly
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pyrefly
  brew: brew install pyrefly
  nix: nix profile install nixpkgs#pyrefly
  scoop: scoop install main/pyrefly
provenance:
  formula: pyrefly
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
