id: brew:openapv
display-name: openapv
homepage: https://github.com/AcademySoftwareFoundation/openapv
repo: https://github.com/AcademySoftwareFoundation/openapv
docs: https://github.com/AcademySoftwareFoundation/openapv
package-manager:
  brew: openapv
  dnf: openapv
  nix: openapv
  zypper: openapv
package-manager-url: https://formulae.brew.sh/formula/openapv
version: 0.2.1.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: Open Advanced Professional Video Codec
source-archive: https://github.com/AcademySoftwareFoundation/openapv/archive/refs/tags/v0.2.1.3.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: oapv_app_dec
  - exposure: global executable
    kind: cli
    name: oapv_app_enc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:openapv
  brew: brew install openapv
  dnf: sudo dnf install openapv
  nix: nix profile install nixpkgs#openapv
  zypper: sudo zypper install openapv
provenance:
  formula: openapv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
