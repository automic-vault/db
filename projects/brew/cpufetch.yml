id: brew:cpufetch
display-name: cpufetch
homepage: https://github.com/Dr-Noob/cpufetch
repo: https://github.com/Dr-Noob/cpufetch
docs: https://github.com/Dr-Noob/cpufetch
package-manager:
  apk: cpufetch
  brew: cpufetch
  debian: cpufetch
  dnf: cpufetch
  macports: cpufetch
  nix: cpufetch
  pacman: cpufetch
  scoop: main/cpufetch
  ubuntu: cpufetch
  winget: Dr-Noob.cpufetch
  zypper: cpufetch
package-manager-url: https://formulae.brew.sh/formula/cpufetch
version: 1.07
license: GPL-2.0-only
category: development
tags:
  - cli
description: CPU architecture fetching tool
source-archive: https://github.com/Dr-Noob/cpufetch/archive/refs/tags/v1.07.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: cpufetch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cpufetch
  av: sudo av install brew:cpufetch
  brew: brew install cpufetch
  debian: sudo apt install cpufetch
  dnf: sudo dnf install cpufetch
  macports: sudo port install cpufetch
  nix: nix profile install nixpkgs#cpufetch
  pacman: sudo pacman -S cpufetch
  scoop: scoop install main/cpufetch
  ubuntu: sudo apt install cpufetch
  winget: winget install --id Dr-Noob.cpufetch -e
  zypper: sudo zypper install cpufetch
provenance:
  formula: cpufetch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
