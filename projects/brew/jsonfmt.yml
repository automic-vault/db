id: brew:jsonfmt
display-name: jsonfmt
homepage: https://github.com/caarlos0/jsonfmt
repo: https://github.com/caarlos0/jsonfmt
docs: https://github.com/caarlos0/jsonfmt
package-manager:
  brew: jsonfmt
  nix: jsonfmt
package-manager-url: https://formulae.brew.sh/formula/jsonfmt
version: 0.5.2
license: MIT
category: development
tags:
  - cli
  - json
description: Like gofmt, but for JSON files
source-archive: https://github.com/caarlos0/jsonfmt/archive/refs/tags/v0.5.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jsonfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jsonfmt
  brew: brew install jsonfmt
  nix: nix profile install nixpkgs#jsonfmt
provenance:
  formula: jsonfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
