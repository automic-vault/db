id: brew:gocloc
display-name: gocloc
homepage: https://github.com/hhatto/gocloc
repo: https://github.com/hhatto/gocloc
docs: https://github.com/hhatto/gocloc
package-manager:
  brew: gocloc
package-manager-url: https://formulae.brew.sh/formula/gocloc
version: 0.7.0
license: MIT
category: development
tags:
  - cli
description: Little fast LoC counter
source-archive: https://github.com/hhatto/gocloc/archive/refs/tags/v0.7.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gocloc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gocloc
  brew: brew install gocloc
provenance:
  formula: gocloc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
