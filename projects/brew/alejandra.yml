id: brew:alejandra
display-name: alejandra
homepage: https://kamadorueda.com/alejandra/
repo: https://github.com/kamadorueda/alejandra
docs: https://kamadorueda.com/alejandra/
package-manager:
  brew: alejandra
  nix: alejandra
package-manager-url: https://formulae.brew.sh/formula/alejandra
version: 4.0.0
license: Unlicense
category: development
tags:
  - cli
description: Command-line tool for formatting Nix Code
source-archive: https://github.com/kamadorueda/alejandra/archive/refs/tags/4.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: alejandra
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:alejandra
  brew: brew install alejandra
  nix: nix profile install nixpkgs#alejandra
provenance:
  formula: alejandra
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
