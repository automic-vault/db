id: brew:instead
display-name: instead
homepage: https://instead.hugeping.ru/
repo: https://github.com/instead-hub/instead
docs: https://instead.hugeping.ru/
package-manager:
  brew: instead
  debian: instead
  nix: instead
  ubuntu: instead
package-manager-url: https://formulae.brew.sh/formula/instead
version: 3.5.2
license: MIT
category: development
tags:
  - cli
description: Interpreter of simple text adventures
source-archive: https://github.com/instead-hub/instead/archive/refs/tags/3.5.2.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - harfbuzz
  - luajit
  - pango
  - sdl2
  - sdl2_image
  - sdl2_mixer
  - sdl2_ttf
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: instead
  - exposure: global executable
    kind: cli
    name: sdl-instead
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:instead
  brew: brew install instead
  debian: sudo apt install instead
  nix: nix profile install nixpkgs#instead
  ubuntu: sudo apt install instead
provenance:
  formula: instead
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
