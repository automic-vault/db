id: brew:ndpi
display-name: ndpi
homepage: https://www.ntop.org/products/deep-packet-inspection/ndpi/
repo: https://github.com/ntop/nDPI
docs: https://www.ntop.org/products/deep-packet-inspection/ndpi/
package-manager:
  apk: ndpi
  brew: ndpi
  nix: ndpi
package-manager-url: https://formulae.brew.sh/formula/ndpi
version: 5.0
license: LGPL-3.0-or-later
category: development
tags:
  - cli
description: Deep Packet Inspection (DPI) library
source-archive: https://github.com/ntop/nDPI/archive/refs/tags/5.0.tar.gz
dependencies:
  - json-c
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: ndpiReader
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ndpi
  av: sudo av install brew:ndpi
  brew: brew install ndpi
  nix: nix profile install nixpkgs#ndpi
provenance:
  formula: ndpi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
