id: brew:libstatgrab
display-name: libstatgrab
homepage: https://libstatgrab.org/
repo: https://github.com/libstatgrab/libstatgrab
docs: https://libstatgrab.org/
package-manager:
  apk: libstatgrab
  brew: libstatgrab
  debian: saidar
  dnf: libstatgrab
  nix: libstatgrab
  pacman: libstatgrab
  ubuntu: saidar
  zypper: saidar
package-manager-url: https://formulae.brew.sh/formula/libstatgrab
version: 0.92.1
license: GPL-2.0-or-later AND LGPL-2.1-or-later
category: development
tags:
  - cli
description: Provides cross-platform access to statistics about the system
source-archive: >
  https://github.com/libstatgrab/libstatgrab/releases/download/LIBSTATGRAB_0_92_1/libstatgrab-0.92.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: saidar
  - exposure: global executable
    kind: cli
    name: statgrab
  - exposure: global executable
    kind: cli
    name: statgrab-make-mrtg-config
  - exposure: global executable
    kind: cli
    name: statgrab-make-mrtg-index
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libstatgrab
  av: sudo av install brew:libstatgrab
  brew: brew install libstatgrab
  debian: sudo apt install saidar
  dnf: sudo dnf install libstatgrab
  nix: nix profile install nixpkgs#libstatgrab
  pacman: sudo pacman -S libstatgrab
  ubuntu: sudo apt install saidar
  zypper: sudo zypper install saidar
provenance:
  formula: libstatgrab
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
