id: brew:git-crypt
display-name: git-crypt
homepage: https://www.agwa.name/projects/git-crypt/
repo: https://www.agwa.name/projects/git-crypt/downloads/git-crypt-0.8.0.tar.gz
docs: https://www.agwa.name/projects/git-crypt/
package-manager:
  apk: git-crypt
  brew: git-crypt
  debian: git-crypt
  dnf: git-crypt
  macports: git-crypt
  nix: git-crypt
  pacman: git-crypt
  scoop: main/git-crypt
  ubuntu: git-crypt
  zypper: git-crypt
package-manager-url: https://formulae.brew.sh/formula/git-crypt
version: 0.8.0
license: GPL-3.0-or-later
category: security
tags:
  - cli
  - git
description: Enable transparent encryption/decryption of files in a git repo
source-archive: https://www.agwa.name/projects/git-crypt/downloads/git-crypt-0.8.0.tar.gz
dependencies:
  - openssl@4
build-dependencies:
  - docbook
  - docbook-xsl
executables:
  - exposure: global executable
    kind: cli
    name: git-crypt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-crypt
  av: sudo av install brew:git-crypt
  brew: brew install git-crypt
  debian: sudo apt install git-crypt
  dnf: sudo dnf install git-crypt
  macports: sudo port install git-crypt
  nix: nix profile install nixpkgs#git-crypt
  pacman: sudo pacman -S git-crypt
  scoop: scoop install main/git-crypt
  ubuntu: sudo apt install git-crypt
  zypper: sudo zypper install git-crypt
provenance:
  formula: git-crypt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
