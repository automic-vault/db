id: brew:admesh
display-name: admesh
homepage: https://github.com/admesh/admesh
repo: https://github.com/admesh/admesh
docs: https://github.com/admesh/admesh
package-manager:
  apk: admesh
  brew: admesh
  debian: admesh
  dnf: admesh
  macports: admesh
  ubuntu: admesh
package-manager-url: https://formulae.brew.sh/formula/admesh
version: 0.98.5
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Processes triangulated solid meshes
source-archive: https://github.com/admesh/admesh/releases/download/v0.98.5/admesh-0.98.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: admesh
bottle:
