    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add admesh
  av: sudo av install brew:admesh
  brew: brew install admesh
  debian: sudo apt install admesh
  dnf: sudo dnf install admesh
  macports: sudo port install admesh
  ubuntu: sudo apt install admesh
provenance:
  formula: admesh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
