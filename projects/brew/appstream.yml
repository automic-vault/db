id: brew:appstream
display-name: appstream
homepage: https://www.freedesktop.org/wiki/Distributions/AppStream/
repo: https://github.com/ximion/appstream
docs: https://www.freedesktop.org/wiki/Distributions/AppStream/
package-manager:
  apk: appstream
  brew: appstream
  debian: appstream
  dnf: appstream
  macports: appstream
  nix: appstream
  pacman: appstream
  ubuntu: appstream
  zypper: AppStream
package-manager-url: https://formulae.brew.sh/formula/appstream
version: 1.1.2
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Tools and libraries to work with AppStream metadata
source-archive: https://github.com/ximion/appstream/archive/refs/tags/v1.1.2.tar.gz
dependencies:
  - gettext
  - glib
  - libfyaml
  - libxmlb
  - zstd
build-dependencies:
  - gobject-introspection
  - gtk-doc
  - itstool
  - meson
  - ninja
  - pkgconf
  - vala
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: appstreamcli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add appstream
  av: sudo av install brew:appstream
  brew: brew install appstream
  debian: sudo apt install appstream
  dnf: sudo dnf install appstream
  macports: sudo port install appstream
  nix: nix profile install nixpkgs#appstream
  pacman: sudo pacman -S appstream
  ubuntu: sudo apt install appstream
  zypper: sudo zypper install AppStream
provenance:
  formula: appstream
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
