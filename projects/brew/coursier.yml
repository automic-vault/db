id: brew:coursier
display-name: coursier
homepage: https://get-coursier.io/
repo: https://github.com/coursier/coursier
docs: https://get-coursier.io/
package-manager:
  brew: coursier
  nix: coursier
  scoop: main/coursier
package-manager-url: https://formulae.brew.sh/formula/coursier
version: 2.1.24
license: Apache-2.0
category: development
tags:
