id: brew:msedit
display-name: msedit
homepage: https://github.com/microsoft/edit
repo: https://github.com/microsoft/edit
docs: https://github.com/microsoft/edit
package-manager:
  apk: edit
  brew: msedit
  dnf: msedit
  macports: edit
  nix: msedit
  pacman: msedit
  scoop: main/edit
  winget: Microsoft.Edit
  zypper: msedit
package-manager-url: https://formulae.brew.sh/formula/msedit
version: 2.0.0
license: MIT
category: development
tags:
  - cli
description: Simple text editor with clickable interface
source-archive: https://github.com/microsoft/edit/archive/refs/tags/v2.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: edit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add edit
  av: sudo av install brew:msedit
  brew: brew install msedit
  dnf: sudo dnf install msedit
  macports: sudo port install edit
  nix: nix profile install nixpkgs#msedit
  pacman: sudo pacman -S msedit
  scoop: scoop install main/edit
  winget: winget install --id Microsoft.Edit -e
  zypper: sudo zypper install msedit
provenance:
  formula: msedit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
