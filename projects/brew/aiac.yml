id: brew:aiac
display-name: aiac
homepage: https://github.com/gofireflyio/aiac
repo: https://github.com/gofireflyio/aiac
docs: https://github.com/gofireflyio/aiac
package-manager:
  brew: aiac
  nix: aiac
package-manager-url: https://formulae.brew.sh/formula/aiac
version: 5.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Artificial Intelligence Infrastructure-as-Code Generator
source-archive: https://github.com/gofireflyio/aiac/archive/refs/tags/v5.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: aiac
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aiac
  brew: brew install aiac
  nix: nix profile install nixpkgs#aiac
provenance:
  formula: aiac
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
