id: brew:pixi
display-name: pixi
homepage: https://pixi.sh
repo: https://github.com/prefix-dev/pixi
docs: https://pixi.sh
package-manager:
  apk: pixi
  brew: pixi
  nix: pixi
  pacman: pixi
  scoop: main/pixi
  winget: prefix-dev.pixi
package-manager-url: https://formulae.brew.sh/formula/pixi
version: 0.69.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Package management made easy
source-archive: https://github.com/prefix-dev/pixi/archive/refs/tags/v0.69.0.tar.gz
build-dependencies:
  - cmake
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: pixi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pixi
  av: sudo av install brew:pixi
  brew: brew install pixi
  nix: nix profile install nixpkgs#pixi
  pacman: sudo pacman -S pixi
  scoop: scoop install main/pixi
  winget: winget install --id prefix-dev.pixi -e
provenance:
  formula: pixi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
