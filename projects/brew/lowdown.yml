id: brew:lowdown
display-name: lowdown
homepage: https://kristaps.bsd.lv/lowdown
repo: https://kristaps.bsd.lv/lowdown/snapshots/lowdown-3.0.1.tar.gz
docs: https://kristaps.bsd.lv/lowdown
package-manager:
  apk: lowdown
  brew: lowdown
  debian: lowdown
  dnf: lowdown
  macports: lowdown
  nix: lowdown
  pacman: lowdown
  ubuntu: lowdown
  zypper: lowdown
package-manager-url: https://formulae.brew.sh/formula/lowdown
version: 3.0.1
license: ISC
category: network
tags:
  - cli
description: Simple markdown translator
source-archive: https://kristaps.bsd.lv/lowdown/snapshots/lowdown-3.0.1.tar.gz
build-dependencies:
  - bmake
executables:
  - exposure: global executable
    kind: cli
    name: lowdown
  - exposure: global executable
    kind: cli
    name: lowdown-diff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lowdown
  av: sudo av install brew:lowdown
  brew: brew install lowdown
  debian: sudo apt install lowdown
  dnf: sudo dnf install lowdown
  macports: sudo port install lowdown
  nix: nix profile install nixpkgs#lowdown
  pacman: sudo pacman -S lowdown
  ubuntu: sudo apt install lowdown
  zypper: sudo zypper install lowdown
provenance:
  formula: lowdown
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
