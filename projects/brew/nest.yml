id: brew:nest
display-name: nest
homepage: https://www.nest-simulator.org/
repo: https://github.com/nest/nest-simulator
docs: https://www.nest-simulator.org/
package-manager:
  brew: nest
  dnf: nest
  nix: nest
package-manager-url: https://formulae.brew.sh/formula/nest
version: 3.9
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Neural Simulation Tool (NEST) with Python3 bindings (PyNEST)
source-archive: https://github.com/nest/nest-simulator/archive/refs/tags/v3.9.tar.gz
dependencies:
  - gsl
  - libomp
  - libtool
  - numpy
  - python@3.14
  - readline
build-dependencies:
  - cmake
  - cython
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: nest
  - exposure: global executable
    kind: cli
    name: nest-config
  - exposure: global executable
    kind: cli
    name: nest-server
  - exposure: global executable
    kind: cli
    name: nest-server-mpi
  - exposure: global executable
    kind: cli
    name: nest_indirect
  - exposure: global executable
    kind: cli
    name: nest_serial
  - exposure: global executable
    kind: cli
    name: nest_vars.sh
  - exposure: global executable
    kind: cli
    name: sli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    The PyNEST bindings and its dependencies are installed with the python@3.14 formula.
    If you want to use PyNEST, use the Python interpreter from this path:
    $HOMEBREW_CELLAR/python@3.14/3.14.5/bin You may want to add this to your PATH.
  post-install-defined: false
install-lines:
  av: sudo av install brew:nest
  brew: brew install nest
  dnf: sudo dnf install nest
  nix: nix profile install nixpkgs#nest
provenance:
  formula: nest
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
