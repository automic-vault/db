id: brew:theharvester
display-name: theharvester
homepage: https://www.edge-security.com
repo: https://github.com/laramies/theHarvester
docs: https://www.edge-security.com
package-manager:
  brew: theharvester
  nix: theharvester
package-manager-url: https://formulae.brew.sh/formula/theharvester
version: 4.11.0
license: GPL-2.0-only
category: security
tags:
  - cli
description: Gather materials from public sources (for pen testers)
source-archive: https://github.com/laramies/theHarvester/archive/refs/tags/4.11.0.tar.gz
dependencies:
  - certifi
  - cffi
  - libyaml
  - pydantic
  - python@3.14
build-dependencies:
  - cmake
uses-from-macos:
  - libffi
  - libxml2
  - libxslt
executables:
  - exposure: global executable
    kind: cli
    name: restfulHarvest
  - exposure: global executable
    kind: cli
    name: theHarvester
  - exposure: global executable
    kind: cli
    name: theharvester
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:theharvester
  brew: brew install theharvester
  nix: nix profile install nixpkgs#theharvester
provenance:
  formula: theharvester
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
