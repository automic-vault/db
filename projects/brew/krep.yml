id: brew:krep
display-name: krep
homepage: https://github.com/davidesantangelo/krep
repo: https://github.com/davidesantangelo/krep
docs: https://github.com/davidesantangelo/krep
package-manager:
  brew: krep
  macports: krep
  nix: krep
package-manager-url: https://formulae.brew.sh/formula/krep
version: 2.4.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: High-Performance String Search Utility
source-archive: https://github.com/davidesantangelo/krep/archive/refs/tags/v2.4.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: krep
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:krep
  brew: brew install krep
  macports: sudo port install krep
  nix: nix profile install nixpkgs#krep
provenance:
  formula: krep
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
