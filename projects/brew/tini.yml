id: brew:tini
display-name: tini
homepage: https://github.com/krallin/tini
repo: https://github.com/krallin/tini
docs: https://github.com/krallin/tini
package-manager:
  apk: tini
  brew: tini
  debian: tini
  dnf: tini
  nix: tini
  ubuntu: tini
  zypper: tini
package-manager-url: https://formulae.brew.sh/formula/tini
version: 0.19.0
license: MIT
category: development
tags:
  - cli
description: Tiny but valid init for containers
source-archive: https://github.com/krallin/tini/archive/refs/tags/v0.19.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: docker-init
  - exposure: global executable
    kind: cli
    name: tini
  - exposure: global executable
    kind: cli
    name: tini-static
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tini
  av: sudo av install brew:tini
  brew: brew install tini
  debian: sudo apt install tini
  dnf: sudo dnf install tini
  nix: nix profile install nixpkgs#tini
  ubuntu: sudo apt install tini
  zypper: sudo zypper install tini
provenance:
  formula: tini
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
