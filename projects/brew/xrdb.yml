id: brew:xrdb
display-name: xrdb
homepage: https://gitlab.freedesktop.org/xorg/app/xrdb
repo: https://www.x.org/releases/individual/app/xrdb-1.2.2.tar.xz
docs: https://gitlab.freedesktop.org/xorg/app/xrdb
package-manager:
  apk: xrdb
  brew: xrdb
  dnf: xrdb
  macports: xrdb
  nix: xrdb
  zypper: xrdb
package-manager-url: https://formulae.brew.sh/formula/xrdb
version: 1.2.2
license: MIT-open-group AND HPND-DEC
category: database
tags:
  - cli
  - database
description: X resource database utility
source-archive: https://www.x.org/releases/individual/app/xrdb-1.2.2.tar.xz
dependencies:
  - libx11
  - libxmu
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: xrdb
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add xrdb
  av: sudo av install brew:xrdb
  brew: brew install xrdb
  dnf: sudo dnf install xrdb
  macports: sudo port install xrdb
  nix: nix profile install nixpkgs#xrdb
  zypper: sudo zypper install xrdb
provenance:
  formula: xrdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
