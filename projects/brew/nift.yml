id: brew:nift
display-name: nift
homepage: https://nift.dev/
repo: https://github.com/nifty-site-manager/nsm
docs: https://nift.dev/
package-manager:
  brew: nift
package-manager-url: https://formulae.brew.sh/formula/nift
version: 3.0.3
license: MIT
category: development
tags:
  - cli
description: Cross-platform open source framework for managing and generating websites
source-archive: https://github.com/nifty-site-manager/nsm/archive/refs/tags/v3.0.3.tar.gz
dependencies:
  - luajit
executables:
  - exposure: global executable
    kind: cli
    name: nift
  - exposure: global executable
    kind: cli
    name: nsm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nift
  brew: brew install nift
provenance:
  formula: nift
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
