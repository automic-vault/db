id: brew:webhook
display-name: webhook
homepage: https://github.com/adnanh/webhook
repo: https://github.com/adnanh/webhook
docs: https://github.com/adnanh/webhook
package-manager:
  apk: webhook
  brew: webhook
  debian: webhook
  macports: webhook
  nix: webhook
  pacman: webhook
  scoop: main/webhook
  ubuntu: webhook
package-manager-url: https://formulae.brew.sh/formula/webhook
version: 2.8.3
license: MIT
category: development
tags:
  - cli
description: Lightweight, configurable incoming webhook server
source-archive: https://github.com/adnanh/webhook/archive/refs/tags/2.8.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: webhook
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add webhook
  av: sudo av install brew:webhook
  brew: brew install webhook
  debian: sudo apt install webhook
  macports: sudo port install webhook
  nix: nix profile install nixpkgs#webhook
  pacman: sudo pacman -S webhook
  scoop: scoop install main/webhook
  ubuntu: sudo apt install webhook
provenance:
  formula: webhook
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
