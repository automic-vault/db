id: brew:mactop
display-name: mactop
homepage: https://github.com/metaspartan/mactop
repo: https://github.com/metaspartan/mactop
docs: https://github.com/metaspartan/mactop
package-manager:
  brew: mactop
  macports: mactop
  nix: mactop
package-manager-url: https://formulae.brew.sh/formula/mactop
version: 2.1.3
license: MIT
category: development
tags:
  - cli
description: Apple Silicon Monitor Top written in Go Lang
source-archive: https://github.com/metaspartan/mactop/archive/refs/tags/v2.1.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mactop
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:mactop
  brew: brew install mactop
  macports: sudo port install mactop
  nix: nix profile install nixpkgs#mactop
provenance:
  formula: mactop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
