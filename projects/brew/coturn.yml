id: brew:coturn
display-name: coturn
homepage: https://github.com/coturn/coturn
repo: https://github.com/coturn/coturn
docs: https://github.com/coturn/coturn
package-manager:
  apk: coturn
  brew: coturn
  debian: coturn
  dnf: coturn
  nix: coturn
  pacman: coturn
  ubuntu: coturn
  zypper: coturn
package-manager-url: https://formulae.brew.sh/formula/coturn
version: 4.12.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Free open source implementation of TURN and STUN Server
source-archive: https://github.com/coturn/coturn/archive/refs/tags/4.12.0.tar.gz
dependencies:
  - hiredis
  - libevent
  - libpq
  - openssl@3
build-dependencies:
  - pkgconf
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: turnadmin
  - exposure: global executable
    kind: cli
    name: turnserver
  - exposure: global executable
    kind: cli
    name: turnutils_natdiscovery
  - exposure: global executable
    kind: cli
    name: turnutils_oauth
  - exposure: global executable
    kind: cli
    name: turnutils_peer
  - exposure: global executable
    kind: cli
    name: turnutils_stunclient
  - exposure: global executable
    kind: cli
    name: turnutils_uclient
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add coturn
  av: sudo av install brew:coturn
  brew: brew install coturn
  debian: sudo apt install coturn
  dnf: sudo dnf install coturn
  nix: nix profile install nixpkgs#coturn
  pacman: sudo pacman -S coturn
  ubuntu: sudo apt install coturn
  zypper: sudo zypper install coturn
provenance:
  formula: coturn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
