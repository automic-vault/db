id: brew:scm-manager
display-name: scm-manager
homepage: https://www.scm-manager.org
repo: >
  https://packages.scm-manager.org/repository/releases/sonia/scm/packaging/unix/3.11.9/unix-3.11.9.tar.gz
docs: https://www.scm-manager.org
package-manager:
  brew: scm-manager
package-manager-url: https://formulae.brew.sh/formula/scm-manager
version: 3.11.9
license: Apache-2.0 AND MIT
category: development
tags:
  - cli
  - git
description: Manage Git, Mercurial, and Subversion repos over HTTP
source-archive: >
  https://packages.scm-manager.org/repository/releases/sonia/scm/packaging/unix/3.11.9/unix-3.11.9.tar.gz
dependencies:
  - jsvc
  - openjdk@21
executables:
  - exposure: global executable
    kind: cli
    name: scm-server
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:scm-manager
  brew: brew install scm-manager
provenance:
  formula: scm-manager
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
