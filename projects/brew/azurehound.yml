id: brew:azurehound
display-name: azurehound
homepage: https://github.com/SpecterOps/AzureHound
repo: https://github.com/SpecterOps/AzureHound
docs: https://github.com/SpecterOps/AzureHound
package-manager:
  brew: azurehound
  nix: azurehound
package-manager-url: https://formulae.brew.sh/formula/azurehound
version: 2.12.1
license: GPL-3.0-or-later
category: cloud
tags:
  - cli
description: Azure Data Exporter for BloodHound
source-archive: https://github.com/SpecterOps/AzureHound/archive/refs/tags/v2.12.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: azurehound
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:azurehound
  brew: brew install azurehound
  nix: nix profile install nixpkgs#azurehound
provenance:
  formula: azurehound
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
