id: brew:clojure
display-name: clojure
homepage: https://clojure.org
repo: https://github.com/clojure/brew-install
docs: https://clojure.org
package-manager:
  apk: clojure
  brew: clojure
  debian: clojure
  dnf: clojure
  macports: clojure
  nix: clojure
  pacman: clojure
  ubuntu: clojure
  zypper: clojure
package-manager-url: https://formulae.brew.sh/formula/clojure
version: 1.12.5.1645
license: EPL-1.0
category: development
tags:
  - cli
description: Dynamic, general-purpose programming language
source-archive: >
  https://github.com/clojure/brew-install/releases/download/1.12.5.1645/clojure-tools-1.12.5.1645.tar.gz
dependencies:
  - openjdk
  - rlwrap
executables:
  - exposure: global executable
    kind: cli
    name: clj
  - exposure: global executable
    kind: cli
    name: clojure
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add clojure
  av: sudo av install brew:clojure
  brew: brew install clojure
  debian: sudo apt install clojure
  dnf: sudo dnf install clojure
  macports: sudo port install clojure
  nix: nix profile install nixpkgs#clojure
  pacman: sudo pacman -S clojure
  ubuntu: sudo apt install clojure
  zypper: sudo zypper install clojure
provenance:
  formula: clojure
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
