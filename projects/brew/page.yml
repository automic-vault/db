id: brew:page
display-name: page
homepage: https://github.com/I60R/page
repo: https://github.com/I60R/page
docs: https://github.com/I60R/page
package-manager:
  brew: page
  nix: page
package-manager-url: https://formulae.brew.sh/formula/page
version: 4.6.3
license: MIT
category: development
tags:
  - cli
description: Use Neovim as pager
source-archive: https://github.com/I60R/page/archive/refs/tags/v4.6.3.tar.gz
dependencies:
  - neovim
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: nv
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:page
  brew: brew install page
  nix: nix profile install nixpkgs#page
provenance:
  formula: page
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
