id: brew:decasify
display-name: decasify
homepage: https://github.com/alerque/decasify
repo: https://github.com/alerque/decasify
docs: https://github.com/alerque/decasify
package-manager:
  brew: decasify
  nix: decasify
  pacman: decasify
package-manager-url: https://formulae.brew.sh/formula/decasify
version: 0.11.3
license: LGPL-3.0-only
category: development
tags:
  - cli
description: Utility for casting strings to title-case according to locale-aware style guides
source-archive: https://github.com/alerque/decasify/releases/download/v0.11.3/decasify-0.11.3.tar.zst
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: decasify
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:decasify
  brew: brew install decasify
  nix: nix profile install nixpkgs#decasify
  pacman: sudo pacman -S decasify
provenance:
  formula: decasify
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
