id: brew:k3d
display-name: k3d
homepage: https://k3d.io
repo: https://github.com/k3d-io/k3d
docs: https://k3d.io
package-manager:
  brew: k3d
  chocolatey: k3d
  macports: k3d
  nix: k3d
  scoop: main/k3d
  winget: k3d.k3d
package-manager-url: https://formulae.brew.sh/formula/k3d
version: 5.8.3
license: MIT
category: development
tags:
  - cli
  - docker
description: Little helper to run CNCF's k3s in Docker
source-archive: https://github.com/k3d-io/k3d/archive/refs/tags/v5.8.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: k3d
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:k3d
  brew: brew install k3d
  chocolatey: choco install k3d
  macports: sudo port install k3d
  nix: nix profile install nixpkgs#k3d
  scoop: scoop install main/k3d
  winget: winget install --id k3d.k3d -e
provenance:
  formula: k3d
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
