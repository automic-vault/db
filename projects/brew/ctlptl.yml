id: brew:ctlptl
display-name: ctlptl
homepage: https://github.com/tilt-dev/ctlptl
repo: https://github.com/tilt-dev/ctlptl
docs: https://github.com/tilt-dev/ctlptl
package-manager:
  brew: ctlptl
  nix: ctlptl
  zypper: ctlptl
package-manager-url: https://formulae.brew.sh/formula/ctlptl
version: 0.9.3
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Making local Kubernetes clusters fun and easy to set up
source-archive: https://github.com/tilt-dev/ctlptl/archive/refs/tags/v0.9.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ctlptl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ctlptl
  brew: brew install ctlptl
  nix: nix profile install nixpkgs#ctlptl
  zypper: sudo zypper install ctlptl
provenance:
  formula: ctlptl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
