id: brew:talhelper
display-name: talhelper
homepage: https://budimanjojo.github.io/talhelper/latest/
repo: https://github.com/budimanjojo/talhelper
docs: https://budimanjojo.github.io/talhelper/latest/
package-manager:
  brew: talhelper
  nix: talhelper
  pacman: talhelper
  winget: talhelper.talhelper
  zypper: talhelper
package-manager-url: https://formulae.brew.sh/formula/talhelper
version: 3.1.10
license: BSD-3-Clause
category: development
tags:
  - cli
description: Configuration helper for talos clusters
source-archive: https://github.com/budimanjojo/talhelper/archive/refs/tags/v3.1.10.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: talhelper
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:talhelper
  brew: brew install talhelper
  nix: nix profile install nixpkgs#talhelper
  pacman: sudo pacman -S talhelper
  winget: winget install --id talhelper.talhelper -e
  zypper: sudo zypper install talhelper
provenance:
  formula: talhelper
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
