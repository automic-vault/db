id: brew:git-open
display-name: git-open
homepage: https://github.com/jeffreyiacono/git-open
repo: https://github.com/jeffreyiacono/git-open
docs: https://github.com/jeffreyiacono/git-open
package-manager:
  brew: git-open
  nix: git-open
package-manager-url: https://formulae.brew.sh/formula/git-open
version: 1.3
license: MIT
category: development
tags:
  - cli
  - git
