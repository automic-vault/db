id: brew:afflib
display-name: afflib
homepage: https://github.com/sshock/AFFLIBv3
repo: https://github.com/sshock/AFFLIBv3
docs: https://github.com/sshock/AFFLIBv3
package-manager:
  brew: afflib
  dnf: afflib
  macports: afflib
  nix: afflib
package-manager-url: https://formulae.brew.sh/formula/afflib
version: 3.7.22
license: BSD-4-Clause AND LicenseRef-Homebrew-public-domain
category: development
tags:
  - cli
description: Advanced Forensic Format
source-archive: https://github.com/sshock/AFFLIBv3/archive/refs/tags/v3.7.22.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
  - python@3.14
uses-from-macos:
  - curl
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: affcat
  - exposure: global executable
    kind: cli
    name: affcompare
  - exposure: global executable
    kind: cli
    name: affconvert
  - exposure: global executable
    kind: cli
    name: affcopy
  - exposure: global executable
    kind: cli
    name: affcrypto
  - exposure: global executable
    kind: cli
    name: affdiskprint
  - exposure: global executable
    kind: cli
    name: affinfo
  - exposure: global executable
    kind: cli
    name: affix
  - exposure: global executable
    kind: cli
    name: affrecover
  - exposure: global executable
    kind: cli
    name: affsegment
  - exposure: global executable
    kind: cli
    name: affsign
  - exposure: global executable
    kind: cli
    name: affstats
  - exposure: global executable
    kind: cli
    name: affuse
  - exposure: global executable
    kind: cli
    name: affverify
  - exposure: global executable
    kind: cli
    name: affxml
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:afflib
  brew: brew install afflib
  dnf: sudo dnf install afflib
  macports: sudo port install afflib
  nix: nix profile install nixpkgs#afflib
provenance:
  formula: afflib
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
