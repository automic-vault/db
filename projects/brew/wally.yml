id: brew:wally
display-name: wally
homepage: https://github.com/UpliftGames/wally
repo: https://github.com/UpliftGames/wally
docs: https://github.com/UpliftGames/wally
package-manager:
  brew: wally
  nix: wally
  winget: Ty&Neal.Wally
package-manager-url: https://formulae.brew.sh/formula/wally
version: 0.3.2
license: MPL-2.0
category: development
tags:
  - cli
description: Modern package manager for Roblox projects inspired by Cargo
source-archive: https://github.com/UpliftGames/wally/archive/refs/tags/v0.3.2.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: wally
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wally
  brew: brew install wally
  nix: nix profile install nixpkgs#wally
  winget: winget install --id Ty&Neal.Wally -e
provenance:
  formula: wally
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
