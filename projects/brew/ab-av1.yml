id: brew:ab-av1
display-name: ab-av1
homepage: https://github.com/alexheretic/ab-av1
repo: https://github.com/alexheretic/ab-av1
docs: https://github.com/alexheretic/ab-av1
package-manager:
  brew: ab-av1
  macports: ab-av1
  nix: ab-av1
  scoop: extras/ab-av1
  zypper: ab-av1
package-manager-url: https://formulae.brew.sh/formula/ab-av1
version: 0.11.2
license: MIT
category: development
tags:
  - cli
description: AV1 re-encoding using ffmpeg, svt-av1 & vmaf
source-archive: https://github.com/alexheretic/ab-av1/archive/refs/tags/v0.11.2.tar.gz
dependencies:
  - ffmpeg
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: ab-av1
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ab-av1
  brew: brew install ab-av1
  macports: sudo port install ab-av1
  nix: nix profile install nixpkgs#ab-av1
  scoop: scoop install extras/ab-av1
  zypper: sudo zypper install ab-av1
provenance:
  formula: ab-av1
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
