id: brew:ncrack
display-name: ncrack
homepage: https://nmap.org/ncrack/
repo: https://github.com/nmap/ncrack
docs: https://nmap.org/ncrack/
package-manager:
  brew: ncrack
  debian: ncrack
  dnf: ncrack
  nix: ncrack
  pacman: ncrack
  ubuntu: ncrack
package-manager-url: https://formulae.brew.sh/formula/ncrack
version: 0.7
license: LicenseRef-Homebrew-cannot-represent
category: development
tags:
  - cli
description: Network authentication cracking tool
source-archive: https://github.com/nmap/ncrack/archive/refs/tags/0.7.tar.gz
dependencies:
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: ncrack
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ncrack
  brew: brew install ncrack
  debian: sudo apt install ncrack
  dnf: sudo dnf install ncrack
  nix: nix profile install nixpkgs#ncrack
  pacman: sudo pacman -S ncrack
  ubuntu: sudo apt install ncrack
provenance:
  formula: ncrack
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
