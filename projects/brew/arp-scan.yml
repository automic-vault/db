id: brew:arp-scan
display-name: arp-scan
homepage: https://github.com/royhills/arp-scan
repo: https://github.com/royhills/arp-scan
docs: https://github.com/royhills/arp-scan
package-manager:
  apk: arp-scan
  brew: arp-scan
  debian: arp-scan
  dnf: arp-scan
  macports: arp-scan
  nix: arp-scan
  pacman: arp-scan
  ubuntu: arp-scan
  zypper: arp-scan
package-manager-url: https://formulae.brew.sh/formula/arp-scan
version: 1.10.0
license: GPL-3.0-or-later AND BSD-3-Clause AND ISC
category: development
tags:
  - cli
description: ARP scanning and fingerprinting tool
source-archive: https://github.com/royhills/arp-scan/archive/refs/tags/1.10.0.tar.gz
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: arp-fingerprint
  - exposure: global executable
    kind: cli
    name: arp-scan
  - exposure: global executable
    kind: cli
    name: get-iab
  - exposure: global executable
    kind: cli
    name: get-oui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add arp-scan
  av: sudo av install brew:arp-scan
  brew: brew install arp-scan
  debian: sudo apt install arp-scan
  dnf: sudo dnf install arp-scan
  macports: sudo port install arp-scan
  nix: nix profile install nixpkgs#arp-scan
  pacman: sudo pacman -S arp-scan
  ubuntu: sudo apt install arp-scan
  zypper: sudo zypper install arp-scan
provenance:
  formula: arp-scan
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
