id: brew:jikken
display-name: jikken
homepage: https://jikken.io/
repo: https://github.com/jikkenio/jikken
docs: https://jikken.io/
package-manager:
  brew: jikken
  nix: jikken
package-manager-url: https://formulae.brew.sh/formula/jikken
version: 0.8.4
license: MIT
category: development
tags:
  - cli
description: Powerful, source control friendly REST API testing toolkit
source-archive: https://github.com/jikkenio/jikken/archive/refs/tags/v0.8.4.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: jk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jikken
  brew: brew install jikken
  nix: nix profile install nixpkgs#jikken
provenance:
  formula: jikken
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
