id: brew:bfs
display-name: bfs
homepage: https://tavianator.com/projects/bfs.html
repo: https://github.com/tavianator/bfs
docs: https://tavianator.com/projects/bfs.html
package-manager:
  apk: bfs
  brew: bfs
  debian: bfs
  dnf: bfs
  macports: bfs
  nix: bfs
  pacman: bfs
  ubuntu: bfs
package-manager-url: https://formulae.brew.sh/formula/bfs
version: 4.1.2
license: 0BSD
category: development
tags:
  - cli
description: Breadth-first version of find
source-archive: https://github.com/tavianator/bfs/archive/refs/tags/4.1.2.tar.gz
dependencies:
  - oniguruma
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: bfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bfs
  av: sudo av install brew:bfs
  brew: brew install bfs
  debian: sudo apt install bfs
  dnf: sudo dnf install bfs
  macports: sudo port install bfs
  nix: nix profile install nixpkgs#bfs
  pacman: sudo pacman -S bfs
  ubuntu: sudo apt install bfs
provenance:
  formula: bfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
