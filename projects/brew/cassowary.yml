id: brew:cassowary
display-name: cassowary
homepage: https://github.com/rogerwelin/cassowary
repo: https://github.com/rogerwelin/cassowary
docs: https://github.com/rogerwelin/cassowary
package-manager:
  brew: cassowary
  nix: cassowary
package-manager-url: https://formulae.brew.sh/formula/cassowary
version: 0.19.0
license: MIT
category: development
tags:
  - cli
description: Modern cross-platform HTTP load-testing tool written in Go
source-archive: https://github.com/rogerwelin/cassowary/archive/refs/tags/v0.19.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cassowary
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cassowary
  brew: brew install cassowary
  nix: nix profile install nixpkgs#cassowary
provenance:
  formula: cassowary
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
