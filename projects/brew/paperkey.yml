id: brew:paperkey
display-name: paperkey
homepage: https://www.jabberwocky.com/software/paperkey/
repo: https://www.jabberwocky.com/software/paperkey/paperkey-1.6.tar.gz
docs: https://www.jabberwocky.com/software/paperkey/
package-manager:
  apk: paperkey
