id: brew:file-formula
display-name: file-formula
homepage: https://darwinsys.com/file/
repo: https://astron.com/pub/file/file-5.47.tar.gz
docs: https://darwinsys.com/file/
package-manager:
  apk: file
  brew: file-formula
  chocolatey: file
  debian: file
  dnf: file
  macports: file
  nix: file
  pacman: file
  scoop: main/file
  ubuntu: file
  winget: GnuWin32.File
  zypper: file
package-manager-url: https://formulae.brew.sh/formula/file-formula
version: 5.47
license: BSD-2-Clause-Darwin
category: network
tags:
  - cli
description: Utility to determine file types
source-archive: https://astron.com/pub/file/file-5.47.tar.gz
dependencies:
  - libmagic
executables:
  - exposure: global executable
    kind: cli
    name: file
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add file
  av: sudo av install brew:file-formula
  brew: brew install file-formula
  chocolatey: choco install file
  debian: sudo apt install file
  dnf: sudo dnf install file
  macports: sudo port install file
  nix: nix profile install nixpkgs#file
  pacman: sudo pacman -S file
  scoop: scoop install main/file
  ubuntu: sudo apt install file
  winget: winget install --id GnuWin32.File -e
  zypper: sudo zypper install file
provenance:
  formula: file-formula
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
