id: brew:mdserve
display-name: mdserve
homepage: https://github.com/jfernandez/mdserve
repo: https://github.com/jfernandez/mdserve
docs: https://github.com/jfernandez/mdserve
package-manager:
  brew: mdserve
  nix: mdserve
  pacman: mdserve
package-manager-url: https://formulae.brew.sh/formula/mdserve
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Fast markdown preview server with live reload and theme support
source-archive: https://github.com/jfernandez/mdserve/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: mdserve
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mdserve
  brew: brew install mdserve
  nix: nix profile install nixpkgs#mdserve
  pacman: sudo pacman -S mdserve
provenance:
  formula: mdserve
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
