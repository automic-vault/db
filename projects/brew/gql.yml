id: brew:gql
display-name: gql
homepage: https://amrdeveloper.github.io/GQL/
repo: https://github.com/AmrDeveloper/GQL
docs: https://amrdeveloper.github.io/GQL/
package-manager:
  brew: gql
  macports: gql
  nix: gql
  scoop: main/gitql
  winget: amrdeveloper.gitql
package-manager-url: https://formulae.brew.sh/formula/gql
version: 0.43.0
license: MIT
category: database
tags:
  - cli
  - git
description: Git Query language is a SQL like language to perform queries on .git files
source-archive: https://github.com/AmrDeveloper/GQL/archive/refs/tags/0.43.0.tar.gz
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: gitql
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gql
  brew: brew install gql
  macports: sudo port install gql
  nix: nix profile install nixpkgs#gql
  scoop: scoop install main/gitql
  winget: winget install --id amrdeveloper.gitql -e
provenance:
  formula: gql
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
