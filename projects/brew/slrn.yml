  debian: sudo apt install slrn
  dnf: sudo dnf install slrn
  macports: sudo port install slrn
  ubuntu: sudo apt install slrn
provenance:
  formula: slrn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
