id: brew:slrn
display-name: slrn
homepage: https://slrn.info/
repo: https://jedsoft.org/releases/slrn/slrn-1.0.3a.tar.bz2
docs: https://slrn.info/
package-manager:
  apk: slrn
  brew: slrn
  debian: slrn
  dnf: slrn
  macports: slrn
  ubuntu: slrn
package-manager-url: https://formulae.brew.sh/formula/slrn
version: 1.0.3a
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Powerful console-based newsreader
source-archive: https://jedsoft.org/releases/slrn/slrn-1.0.3a.tar.bz2
dependencies:
