id: brew:grokj2k
display-name: grokj2k
homepage: https://github.com/GrokImageCompression/grok
repo: https://github.com/GrokImageCompression/grok
docs: https://github.com/GrokImageCompression/grok
package-manager:
  brew: grokj2k
package-manager-url: https://formulae.brew.sh/formula/grokj2k
version: 20.3.3
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: JPEG 2000 Library
source-archive: >
  https://github.com/GrokImageCompression/grok/releases/download/v20.3.3/source-full.tar.gz
dependencies:
  - fmt
  - jpeg-turbo
  - libpng
  - libtiff
  - little-cms2
  - xz
  - zstd
build-dependencies:
  - cmake
  - doxygen
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: grk_compress
  - exposure: global executable
    kind: cli
    name: grk_decompress
  - exposure: global executable
    kind: cli
    name: grk_dump
  - exposure: global executable
    kind: cli
    name: grk_transcode
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:grokj2k
  brew: brew install grokj2k
provenance:
  formula: grokj2k
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
