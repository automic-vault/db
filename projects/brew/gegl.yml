id: brew:gegl
display-name: gegl
homepage: https://www.gegl.org/
repo: https://download.gimp.org/pub/gegl/0.4/gegl-0.4.70.tar.xz
docs: https://www.gegl.org/
package-manager:
  apk: gegl
  brew: gegl
  debian: gegl
  macports: gegl
  nix: gegl
  pacman: gegl
  ubuntu: gegl
  zypper: gegl
package-manager-url: https://formulae.brew.sh/formula/gegl
version: 0.4.70
license: LGPL-3.0-or-later AND GPL-3.0-or-later AND BSD-3-Clause AND MIT
category: media
tags:
  - cli
description: Graph based image processing framework
source-archive: https://download.gimp.org/pub/gegl/0.4/gegl-0.4.70.tar.xz
dependencies:
  - babl
  - cairo
  - gettext
  - glib
  - jpeg-turbo
  - json-glib
  - libpng
  - libtiff
  - little-cms2
build-dependencies:
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gegl
  - exposure: global executable
    kind: cli
    name: gegl-imgcmp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add gegl
  av: sudo av install brew:gegl
  brew: brew install gegl
  debian: sudo apt install gegl
  macports: sudo port install gegl
  nix: nix profile install nixpkgs#gegl
  pacman: sudo pacman -S gegl
  ubuntu: sudo apt install gegl
  zypper: sudo zypper install gegl
provenance:
  formula: gegl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
