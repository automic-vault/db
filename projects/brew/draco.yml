id: brew:draco
display-name: draco
homepage: https://google.github.io/draco/
repo: https://github.com/google/draco
docs: https://google.github.io/draco/
package-manager:
  apk: draco
  brew: draco
  debian: draco
  dnf: draco
  macports: draco
  nix: draco
  pacman: draco
  ubuntu: draco
  zypper: draco
package-manager-url: https://formulae.brew.sh/formula/draco
version: 1.5.7
license: Apache-2.0
category: cloud
tags:
  - cli
  - cloud
description: 3D geometric mesh and point cloud compression library
source-archive: https://github.com/google/draco/archive/refs/tags/1.5.7.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: draco_decoder
  - exposure: global executable
    kind: cli
    name: draco_decoder-1.5.7
  - exposure: global executable
    kind: cli
    name: draco_encoder
  - exposure: global executable
    kind: cli
    name: draco_encoder-1.5.7
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add draco
  av: sudo av install brew:draco
  brew: brew install draco
  debian: sudo apt install draco
  dnf: sudo dnf install draco
  macports: sudo port install draco
  nix: nix profile install nixpkgs#draco
  pacman: sudo pacman -S draco
  ubuntu: sudo apt install draco
  zypper: sudo zypper install draco
provenance:
  formula: draco
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
