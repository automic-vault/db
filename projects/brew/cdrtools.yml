id: brew:cdrtools
display-name: cdrtools
homepage: https://cdrtools.sourceforge.net/private/cdrecord.html
repo: https://downloads.sourceforge.net/project/cdrtools/alpha/cdrtools-3.02a09.tar.gz
docs: https://cdrtools.sourceforge.net/private/cdrecord.html
package-manager:
