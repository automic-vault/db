  brew: cdrtools
  macports: cdrtools
  nix: cdrtools
  pacman: cdrtools
  scoop: main/cdrtools
  zypper: btcflash
package-manager-url: https://formulae.brew.sh/formula/cdrtools
version: 3.02a09
license: CDDL-1.0
category: network
tags:
  - cli
description: CD/DVD/Blu-ray premastering and recording software
source-archive: https://downloads.sourceforge.net/project/cdrtools/alpha/cdrtools-3.02a09.tar.gz
build-dependencies:
  - smake
executables:
  - exposure: global executable
    kind: cli
    name: btcflash
  - exposure: global executable
    kind: cli
    name: cdda2mp3
  - exposure: global executable
    kind: cli
    name: cdda2ogg
  - exposure: global executable
    kind: cli
    name: cdda2wav
  - exposure: global executable
    kind: cli
    name: cdrecord
  - exposure: global executable
    kind: cli
    name: devdump
  - exposure: global executable
    kind: cli
    name: isodebug
  - exposure: global executable
    kind: cli
    name: isodump
  - exposure: global executable
    kind: cli
    name: isoinfo
  - exposure: global executable
    kind: cli
    name: isovfy
  - exposure: global executable
    kind: cli
    name: mkhybrid
  - exposure: global executable
    kind: cli
    name: mkisofs
  - exposure: global executable
    kind: cli
    name: readcd
  - exposure: global executable
    kind: cli
    name: rscsi
  - exposure: global executable
    kind: cli
    name: scgcheck
  - exposure: global executable
    kind: cli
    name: scgskeleton
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add isoinfo
  av: sudo av install brew:cdrtools
  brew: brew install cdrtools
  macports: sudo port install cdrtools
  nix: nix profile install nixpkgs#cdrtools
  pacman: sudo pacman -S cdrtools
  scoop: scoop install main/cdrtools
  zypper: sudo zypper install btcflash
provenance:
  formula: cdrtools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
