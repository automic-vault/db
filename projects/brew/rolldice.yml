id: brew:rolldice
display-name: rolldice
homepage: https://github.com/sstrickl/rolldice
repo: https://github.com/sstrickl/rolldice
docs: https://github.com/sstrickl/rolldice
package-manager:
  brew: rolldice
  debian: rolldice
  ubuntu: rolldice
package-manager-url: https://formulae.brew.sh/formula/rolldice
version: 1.16
license: GPL-2.0-only
category: development
tags:
  - cli
description: Rolls an amount of virtual dice
source-archive: https://github.com/sstrickl/rolldice/archive/refs/tags/v1.16.tar.gz
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: rolldice
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rolldice
  brew: brew install rolldice
  debian: sudo apt install rolldice
  ubuntu: sudo apt install rolldice
provenance:
  formula: rolldice
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
