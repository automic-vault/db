id: brew:gcab
display-name: gcab
homepage: https://wiki.gnome.org/msitools
repo: https://download.gnome.org/sources/gcab/1.6/gcab-1.6.tar.xz
docs: https://wiki.gnome.org/msitools
package-manager:
  brew: gcab
  debian: gcab
  dnf: gcab
  macports: gcab
  nix: gcab
  pacman: gcab
  ubuntu: gcab
  zypper: gcab
package-manager-url: https://formulae.brew.sh/formula/gcab
version: 1.6
license: LGPL-2.1-or-later
category: network
tags:
  - cli
description: Windows installer (.MSI) tool
source-archive: https://download.gnome.org/sources/gcab/1.6/gcab-1.6.tar.xz
dependencies:
  - gettext
  - glib
build-dependencies:
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: gcab
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gcab
  brew: brew install gcab
  debian: sudo apt install gcab
  dnf: sudo dnf install gcab
  macports: sudo port install gcab
  nix: nix profile install nixpkgs#gcab
  pacman: sudo pacman -S gcab
  ubuntu: sudo apt install gcab
  zypper: sudo zypper install gcab
provenance:
  formula: gcab
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
