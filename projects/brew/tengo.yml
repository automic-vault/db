id: brew:tengo
display-name: tengo
homepage: https://tengolang.com
repo: https://github.com/d5/tengo
docs: https://tengolang.com
package-manager:
  brew: tengo
package-manager-url: https://formulae.brew.sh/formula/tengo
version: 3.0.0
license: MIT
category: development
tags:
  - cli
description: Fast script language for Go
source-archive: https://github.com/d5/tengo/archive/refs/tags/v3.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tengo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tengo
  brew: brew install tengo
provenance:
  formula: tengo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
