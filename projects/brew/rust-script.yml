id: brew:rust-script
display-name: rust-script
homepage: https://rust-script.org
repo: https://github.com/fornwall/rust-script
docs: https://rust-script.org
package-manager:
  apk: rust-script
  brew: rust-script
  macports: rust-script
  nix: rust-script
  pacman: rust-script
  winget: FredrikFornwall.Rust-Script
package-manager-url: https://formulae.brew.sh/formula/rust-script
version: 0.36.0
license: Apache-2.0
category: development
tags:
  - cli
description: Run Rust files and expressions as scripts without any setup or compilation step
source-archive: https://github.com/fornwall/rust-script/archive/refs/tags/0.36.0.tar.gz
dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rust-script
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add rust-script
  av: sudo av install brew:rust-script
  brew: brew install rust-script
  macports: sudo port install rust-script
  nix: nix profile install nixpkgs#rust-script
  pacman: sudo pacman -S rust-script
  winget: winget install --id FredrikFornwall.Rust-Script -e
provenance:
  formula: rust-script
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
