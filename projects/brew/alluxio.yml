id: brew:alluxio
display-name: alluxio
homepage: https://www.alluxio.io/
repo: https://downloads.alluxio.io/downloads/files/2.9.5/alluxio-2.9.5-bin.tar.gz
docs: https://www.alluxio.io/
package-manager:
  brew: alluxio
package-manager-url: https://formulae.brew.sh/formula/alluxio
version: 2.9.5
license: Apache-2.0
category: network
tags:
  - cli
description: Open Source Memory Speed Virtual Distributed Storage
source-archive: https://downloads.alluxio.io/downloads/files/2.9.5/alluxio-2.9.5-bin.tar.gz
dependencies:
  - openjdk@11
executables:
  - exposure: global executable
    kind: cli
    name: alluxio
  - exposure: global executable
    kind: cli
    name: alluxio-common.sh
  - exposure: global executable
    kind: cli
    name: alluxio-masters.sh
  - exposure: global executable
    kind: cli
    name: alluxio-monitor.sh
  - exposure: global executable
    kind: cli
    name: alluxio-mount.sh
  - exposure: global executable
    kind: cli
    name: alluxio-start.sh
  - exposure: global executable
    kind: cli
    name: alluxio-stop.sh
  - exposure: global executable
    kind: cli
    name: alluxio-workers.sh
  - exposure: global executable
    kind: cli
    name: launch-process
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To configure alluxio, edit $HOMEBREW_PREFIX/etc/alluxio/alluxio-env.sh
    $HOMEBREW_PREFIX/etc/alluxio/alluxio-site.properties To use `alluxio-fuse` on macOS:
    brew install --cask macfuse
  post-install-defined: false
install-lines:
  av: sudo av install brew:alluxio
  brew: brew install alluxio
provenance:
  formula: alluxio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
