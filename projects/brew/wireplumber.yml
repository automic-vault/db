id: brew:wireplumber
display-name: wireplumber
homepage: https://pipewire.pages.freedesktop.org/wireplumber/
repo: >
  https://gitlab.freedesktop.org/pipewire/wireplumber/-/archive/0.5.14/wireplumber-0.5.14.tar.bz2
docs: https://pipewire.pages.freedesktop.org/wireplumber/
package-manager:
  apk: wireplumber
  brew: wireplumber
  debian: wireplumber
  dnf: wireplumber
  nix: wireplumber
  pacman: wireplumber
  ubuntu: wireplumber
  zypper: wireplumber
package-manager-url: https://formulae.brew.sh/formula/wireplumber
version: 0.5.14
license: MIT
category: development
tags:
  - cli
description: Session / policy manager implementation for PipeWire
source-archive: >
  https://gitlab.freedesktop.org/pipewire/wireplumber/-/archive/0.5.14/wireplumber-0.5.14.tar.bz2
dependencies:
  - glib
  - lua
  - pipewire
  - systemd
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: wireplumber
  - exposure: global executable
    kind: cli
    name: wpctl
  - exposure: global executable
    kind: cli
    name: wpexec
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wireplumber
  av: sudo av install brew:wireplumber
  brew: brew install wireplumber
  debian: sudo apt install wireplumber
  dnf: sudo dnf install wireplumber
  nix: nix profile install nixpkgs#wireplumber
  pacman: sudo pacman -S wireplumber
  ubuntu: sudo apt install wireplumber
  zypper: sudo zypper install wireplumber
provenance:
  formula: wireplumber
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
