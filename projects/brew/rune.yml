id: brew:rune
display-name: rune
homepage: https://rune-rs.github.io
repo: https://github.com/rune-rs/rune
docs: https://rune-rs.github.io
package-manager:
  brew: rune
  macports: rune
  nix: rune
  scoop: extras/rune
package-manager-url: https://formulae.brew.sh/formula/rune
version: 0.14.2
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Embeddable dynamic programming language for Rust
source-archive: https://github.com/rune-rs/rune/archive/refs/tags/0.14.2.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rune
  - exposure: global executable
    kind: cli
    name: rune-languageserver
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rune
  brew: brew install rune
  macports: sudo port install rune
  nix: nix profile install nixpkgs#rune
  scoop: scoop install extras/rune
provenance:
  formula: rune
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
