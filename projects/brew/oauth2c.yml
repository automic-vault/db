id: brew:oauth2c
display-name: oauth2c
homepage: https://github.com/cloudentity/oauth2c
repo: https://github.com/cloudentity/oauth2c
docs: https://github.com/cloudentity/oauth2c
package-manager:
  brew: oauth2c
  macports: oauth2c
  nix: oauth2c
  scoop: main/oauth2c
package-manager-url: https://formulae.brew.sh/formula/oauth2c
version: 1.20.0
license: Apache-2.0
category: cloud
tags:
  - cli
description: User-friendly CLI for OAuth2
source-archive: https://github.com/cloudentity/oauth2c/archive/refs/tags/v1.20.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: oauth2c
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oauth2c
  brew: brew install oauth2c
  macports: sudo port install oauth2c
  nix: nix profile install nixpkgs#oauth2c
  scoop: scoop install main/oauth2c
provenance:
  formula: oauth2c
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
