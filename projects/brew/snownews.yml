id: brew:snownews
display-name: snownews
homepage: https://sourceforge.net/projects/snownews/
repo: https://downloads.sourceforge.net/project/snownews/snownews-1.11.tar.gz
docs: https://sourceforge.net/projects/snownews/
package-manager:
  brew: snownews
  dnf: snownews
  macports: snownews
package-manager-url: https://formulae.brew.sh/formula/snownews
version: 1.11
license: GPL-3.0-only
category: network
tags:
  - cli
description: Text mode RSS newsreader
source-archive: https://downloads.sourceforge.net/project/snownews/snownews-1.11.tar.gz
dependencies:
  - gettext
  - ncurses
  - openssl@3
build-dependencies:
  - gettext
  - pkgconf
uses-from-macos:
  - curl
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: snownews
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:snownews
  brew: brew install snownews
  dnf: sudo dnf install snownews
  macports: sudo port install snownews
provenance:
  formula: snownews
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
