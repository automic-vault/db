id: brew:libnet
display-name: libnet
homepage: https://github.com/libnet/libnet
repo: https://github.com/libnet/libnet
docs: https://github.com/libnet/libnet
package-manager:
  apk: libnet
  brew: libnet
  dnf: libnet
  macports: libnet
  nix: libnet
  pacman: libnet
package-manager-url: https://formulae.brew.sh/formula/libnet
version: 1.3
license: BSD-2-Clause
category: development
tags:
  - cli
description: C library for creating IP packets
source-archive: https://github.com/libnet/libnet/releases/download/v1.3/libnet-1.3.tar.gz
build-dependencies:
  - doxygen
executables:
  - exposure: global executable
    kind: cli
    name: libnet-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libnet
  av: sudo av install brew:libnet
  brew: brew install libnet
  dnf: sudo dnf install libnet
  macports: sudo port install libnet
  nix: nix profile install nixpkgs#libnet
  pacman: sudo pacman -S libnet
provenance:
  formula: libnet
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
