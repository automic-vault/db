  macports: sudo port install terraform-ls
  nix: nix profile install nixpkgs#terraform-ls
  scoop: scoop install main/terraform-ls
  winget: winget install --id Hashicorp.TerraformLanguageServer -e
provenance:
  formula: terraform-ls
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
