id: brew:terraform-ls
display-name: terraform-ls
homepage: https://github.com/hashicorp/terraform-ls
repo: https://github.com/hashicorp/terraform-ls
docs: https://github.com/hashicorp/terraform-ls
package-manager:
  brew: terraform-ls
  macports: terraform-ls
  nix: terraform-ls
  scoop: main/terraform-ls
  winget: Hashicorp.TerraformLanguageServer
package-manager-url: https://formulae.brew.sh/formula/terraform-ls
version: 0.38.6
license: MPL-2.0
category: cloud
tags:
  - cli
description: Terraform Language Server
source-archive: https://github.com/hashicorp/terraform-ls/archive/refs/tags/v0.38.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: terraform-ls
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
