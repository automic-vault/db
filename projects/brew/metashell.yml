id: brew:metashell
display-name: metashell
homepage: http://metashell.org
repo: https://github.com/metashell/metashell
docs: http://metashell.org
package-manager:
  brew: metashell
package-manager-url: https://formulae.brew.sh/formula/metashell
version: 5.0.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Metaprogramming shell for C++ templates
source-archive: https://github.com/metashell/metashell/archive/refs/tags/v5.0.0.tar.gz
dependencies:
  - zstd
build-dependencies:
  - cmake
uses-from-macos:
  - libedit
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: metashell
  - exposure: global executable
    kind: cli
    name: templight_metashell
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:metashell
  brew: brew install metashell
provenance:
  formula: metashell
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
