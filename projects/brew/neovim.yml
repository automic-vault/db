id: brew:neovim
display-name: neovim
homepage: https://neovim.io/
repo: https://github.com/neovim/neovim
docs: https://neovim.io/
package-manager:
  apk: neovim
  brew: neovim
  chocolatey: neovim
  debian: neovim
  dnf: neovim
  macports: neovim
  nix: neovim
  pacman: neovim
  scoop: main/neovim
  ubuntu: neovim
  winget: Neovim.Neovim
  zypper: neovim
package-manager-url: https://formulae.brew.sh/formula/neovim
version: 0.12.2
license: Apache-2.0
category: development
tags:
  - cli
description: Ambitious Vim-fork focused on extensibility and agility
source-archive: https://github.com/neovim/neovim/archive/refs/tags/v0.12.2.tar.gz
dependencies:
  - gettext
  - libuv
  - lpeg
  - luajit
  - luv
  - tree-sitter
  - unibilium
  - utf8proc
build-dependencies:
  - cmake
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: nvim
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add neovim
  av: sudo av install brew:neovim
  brew: brew install neovim
  chocolatey: choco install neovim
  debian: sudo apt install neovim
  dnf: sudo dnf install neovim
  macports: sudo port install neovim
  nix: nix profile install nixpkgs#neovim
  pacman: sudo pacman -S neovim
  scoop: scoop install main/neovim
  ubuntu: sudo apt install neovim
  winget: winget install --id Neovim.Neovim -e
  zypper: sudo zypper install neovim
provenance:
  formula: neovim
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
