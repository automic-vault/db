id: brew:htop
display-name: htop
homepage: https://htop.dev/
repo: https://github.com/htop-dev/htop
docs: https://htop.dev/
package-manager:
  apk: htop
  brew: htop
  debian: htop
  dnf: htop
  macports: htop
  nix: htop
  pacman: htop
  ubuntu: htop
  zypper: htop
package-manager-url: https://formulae.brew.sh/formula/htop
version: 3.5.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Improved top (interactive process viewer)
source-archive: https://github.com/htop-dev/htop/archive/refs/tags/3.5.1.tar.gz
dependencies:
  - ncurses
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: htop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    htop requires root privileges to correctly display all running processes, so you
    will need to run `sudo htop`. You should be certain that you trust any software you
    grant root privileges.
  post-install-defined: false
install-lines:
  apk: sudo apk add htop
  av: sudo av install brew:htop
  brew: brew install htop
  debian: sudo apt install htop
  dnf: sudo dnf install htop
  macports: sudo port install htop
  nix: nix profile install nixpkgs#htop
  pacman: sudo pacman -S htop
  ubuntu: sudo apt install htop
  zypper: sudo zypper install htop
provenance:
  formula: htop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
