id: brew:reckoner
display-name: reckoner
homepage: https://github.com/FairwindsOps/reckoner
repo: https://github.com/FairwindsOps/reckoner
docs: https://github.com/FairwindsOps/reckoner
package-manager:
  brew: reckoner
package-manager-url: https://formulae.brew.sh/formula/reckoner
version: 6.3.0
license: Apache-2.0
category: development
tags:
  - cli
description: Declaratively install and manage multiple Helm chart releases
source-archive: https://github.com/FairwindsOps/reckoner/archive/refs/tags/v6.3.0.tar.gz
dependencies:
  - helm
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: reckoner
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:reckoner
  brew: brew install reckoner
provenance:
  formula: reckoner
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
