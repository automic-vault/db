id: brew:physfs
display-name: physfs
homepage: https://icculus.org/physfs/
repo: https://github.com/icculus/physfs
docs: https://icculus.org/physfs/
package-manager:
  apk: physfs
  brew: physfs
  dnf: physfs
  macports: physfs
  pacman: physfs
package-manager-url: https://formulae.brew.sh/formula/physfs
version: 3.2.0
license: Zlib
category: development
tags:
  - cli
description: Library to provide abstract access to various archives
source-archive: https://github.com/icculus/physfs/archive/refs/tags/release-3.2.0.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: test_physfs
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add physfs
  av: sudo av install brew:physfs
  brew: brew install physfs
  dnf: sudo dnf install physfs
  macports: sudo port install physfs
  pacman: sudo pacman -S physfs
provenance:
  formula: physfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
