id: brew:homeworlds
display-name: homeworlds
homepage: https://github.com/Quuxplusone/Homeworlds/
repo: https://github.com/Quuxplusone/Homeworlds
docs: https://github.com/Quuxplusone/Homeworlds/
package-manager:
  brew: homeworlds
package-manager-url: https://formulae.brew.sh/formula/homeworlds
version: 1.1.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: C++ framework for the game of Binary Homeworlds
source-archive: https://github.com/Quuxplusone/Homeworlds/archive/refs/tags/v1.1.0.tar.gz
dependencies:
  - wxwidgets
executables:
  - exposure: global executable
    kind: cli
    name: homeworlds-cli
  - exposure: global executable
    kind: cli
    name: homeworlds-wx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:homeworlds
  brew: brew install homeworlds
provenance:
  formula: homeworlds
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
