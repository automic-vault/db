id: brew:dcp
display-name: dcp
homepage: https://github.com/exdx/dcp
repo: https://github.com/exdx/dcp
docs: https://github.com/exdx/dcp
package-manager:
  brew: dcp
  nix: dcp
package-manager-url: https://formulae.brew.sh/formula/dcp
version: 0.4.1
license: MIT
category: development
tags:
  - cli
  - docker
description: Docker cp made easy
source-archive: https://github.com/exdx/dcp/archive/refs/tags/v0.4.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dcp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dcp
  brew: brew install dcp
  nix: nix profile install nixpkgs#dcp
provenance:
  formula: dcp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
