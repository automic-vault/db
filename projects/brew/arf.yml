id: brew:arf
display-name: arf
homepage: https://github.com/eitsupi/arf
repo: https://github.com/eitsupi/arf
docs: https://github.com/eitsupi/arf
package-manager:
  brew: arf
  winget: eitsupi.arf
package-manager-url: https://formulae.brew.sh/formula/arf
version: 0.3.4
license: MIT
category: development
tags:
  - cli
description: Modern R console with syntax highlighting and fuzzy search
source-archive: https://github.com/eitsupi/arf/archive/refs/tags/v0.3.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: arf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:arf
  brew: brew install arf
  winget: winget install --id eitsupi.arf -e
provenance:
  formula: arf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
