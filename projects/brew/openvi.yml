id: brew:openvi
display-name: openvi
homepage: https://github.com/johnsonjh/OpenVi
repo: https://github.com/johnsonjh/OpenVi
docs: https://github.com/johnsonjh/OpenVi
package-manager:
  apk: openvi
  brew: openvi
  nix: openvi
package-manager-url: https://formulae.brew.sh/formula/openvi
version: 7.7.32
license: BSD-3-Clause
category: development
tags:
  - cli
description: Portable OpenBSD vi for UNIX systems
source-archive: https://github.com/johnsonjh/OpenVi/archive/refs/tags/7.7.32.tar.gz
dependencies:
  - ncurses
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: oex
  - exposure: global executable
    kind: cli
    name: ovi
  - exposure: global executable
    kind: cli
    name: oview
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add openvi
  av: sudo av install brew:openvi
  brew: brew install openvi
  nix: nix profile install nixpkgs#openvi
provenance:
  formula: openvi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
