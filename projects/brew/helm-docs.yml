id: brew:helm-docs
display-name: helm-docs
homepage: https://github.com/norwoodj/helm-docs
repo: https://github.com/norwoodj/helm-docs
docs: https://github.com/norwoodj/helm-docs
package-manager:
  brew: helm-docs
  nix: helm-docs
  scoop: main/helm-docs
  zypper: helm-docs
package-manager-url: https://formulae.brew.sh/formula/helm-docs
version: 1.14.2
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Tool for automatically generating markdown documentation for helm charts
source-archive: https://github.com/norwoodj/helm-docs/archive/refs/tags/v1.14.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: helm-docs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:helm-docs
  brew: brew install helm-docs
  nix: nix profile install nixpkgs#helm-docs
  scoop: scoop install main/helm-docs
  zypper: sudo zypper install helm-docs
provenance:
  formula: helm-docs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
