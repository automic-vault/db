id: brew:tldx
display-name: tldx
homepage: https://brandonyoung.dev/blog/introducing-tldx/
repo: https://github.com/brandonyoungdev/tldx
docs: https://brandonyoung.dev/blog/introducing-tldx/
package-manager:
  brew: tldx
  nix: tldx
  winget: brandonyoungdev.tldx
package-manager-url: https://formulae.brew.sh/formula/tldx
version: 1.4.0
license: Apache-2.0
category: development
tags:
  - cli
description: Domain Availability Research Tool
source-archive: https://github.com/brandonyoungdev/tldx/archive/refs/tags/v1.4.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tldx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tldx
  brew: brew install tldx
  nix: nix profile install nixpkgs#tldx
  winget: winget install --id brandonyoungdev.tldx -e
provenance:
  formula: tldx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
