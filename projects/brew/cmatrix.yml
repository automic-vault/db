id: brew:cmatrix
display-name: cmatrix
homepage: https://github.com/abishekvashok/cmatrix/
repo: https://github.com/abishekvashok/cmatrix
docs: https://github.com/abishekvashok/cmatrix/
package-manager:
  apk: cmatrix
  brew: cmatrix
  debian: cmatrix
  dnf: cmatrix
  macports: cmatrix
  nix: cmatrix
  pacman: cmatrix
  ubuntu: cmatrix
  zypper: cmatrix
package-manager-url: https://formulae.brew.sh/formula/cmatrix
version: 2.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Console Matrix
source-archive: https://github.com/abishekvashok/cmatrix/archive/refs/tags/v2.0.tar.gz
build-dependencies:
  - autoconf
  - automake
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cmatrix
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cmatrix
  av: sudo av install brew:cmatrix
  brew: brew install cmatrix
  debian: sudo apt install cmatrix
  dnf: sudo dnf install cmatrix
  macports: sudo port install cmatrix
  nix: nix profile install nixpkgs#cmatrix
  pacman: sudo pacman -S cmatrix
  ubuntu: sudo apt install cmatrix
  zypper: sudo zypper install cmatrix
provenance:
  formula: cmatrix
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
