id: brew:biber
display-name: biber
homepage: https://sourceforge.net/projects/biblatex-biber/
repo: https://github.com/plk/biber
docs: https://sourceforge.net/projects/biblatex-biber/
package-manager:
  apk: biber
  brew: biber
  debian: biber
  dnf: biber
  nix: biber
  pacman: biber
  scoop: main/biber
  ubuntu: biber
package-manager-url: https://formulae.brew.sh/formula/biber
version: 2.21
license: Artistic-2.0
category: development
tags:
  - cli
description: Backend processor for BibLaTeX
source-archive: https://github.com/plk/biber/archive/refs/tags/v2.21.tar.gz
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
  - libxslt
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: biber
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add biber
  av: sudo av install brew:biber
  brew: brew install biber
  debian: sudo apt install biber
  dnf: sudo dnf install biber
  nix: nix profile install nixpkgs#biber
  pacman: sudo pacman -S biber
  scoop: scoop install main/biber
  ubuntu: sudo apt install biber
provenance:
  formula: biber
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
