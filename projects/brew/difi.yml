id: brew:difi
display-name: difi
homepage: https://github.com/oug-t/difi
repo: https://github.com/oug-t/difi
docs: https://github.com/oug-t/difi
package-manager:
  brew: difi
package-manager-url: https://formulae.brew.sh/formula/difi
version: 0.2.6
license: MIT
category: development
tags:
  - cli
description: Pixel-perfect terminal diff viewer
source-archive: https://github.com/oug-t/difi/archive/refs/tags/v0.2.6.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: difi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:difi
  brew: brew install difi
provenance:
  formula: difi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
