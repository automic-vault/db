id: brew:skaffold
display-name: skaffold
homepage: https://skaffold.dev/
repo: https://github.com/GoogleContainerTools/skaffold
docs: https://skaffold.dev/
package-manager:
  brew: skaffold
  chocolatey: skaffold
  macports: skaffold
  nix: skaffold
  pacman: skaffold
  scoop: extras/skaffold
  winget: Google.ContainerTools.Skaffold
  zypper: skaffold
package-manager-url: https://formulae.brew.sh/formula/skaffold
version: 2.21.0
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Easy and Repeatable Kubernetes Development
source-archive: https://github.com/GoogleContainerTools/skaffold.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: skaffold
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:skaffold
  brew: brew install skaffold
  chocolatey: choco install skaffold
  macports: sudo port install skaffold
  nix: nix profile install nixpkgs#skaffold
  pacman: sudo pacman -S skaffold
  scoop: scoop install extras/skaffold
  winget: winget install --id Google.ContainerTools.Skaffold -e
  zypper: sudo zypper install skaffold
provenance:
  formula: skaffold
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
