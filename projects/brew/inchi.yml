id: brew:inchi
display-name: inchi
homepage: https://www.inchi-trust.org/
repo: https://github.com/IUPAC-InChI/InChI
docs: https://www.inchi-trust.org/
package-manager:
  brew: inchi
  dnf: inchi
  macports: inchi-1
  nix: inchi
  pacman: inchi
  zypper: inchi
package-manager-url: https://formulae.brew.sh/formula/inchi
version: 1.07.5
license: MIT
category: development
tags:
  - cli
description: IUPAC International Chemical Identifier
source-archive: https://github.com/IUPAC-InChI/InChI/archive/refs/tags/v1.07.5.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: inchi-1
  - exposure: global executable
    kind: cli
    name: inchi_main
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:inchi
  brew: brew install inchi
  dnf: sudo dnf install inchi
  macports: sudo port install inchi-1
  nix: nix profile install nixpkgs#inchi
  pacman: sudo pacman -S inchi
  zypper: sudo zypper install inchi
provenance:
  formula: inchi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
