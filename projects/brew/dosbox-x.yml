id: brew:dosbox-x
display-name: dosbox-x
homepage: https://dosbox-x.com/
repo: https://github.com/joncampbell123/dosbox-x
docs: https://dosbox-x.com/
package-manager:
  brew: dosbox-x
  debian: dosbox-x
  macports: dosbox-x
  nix: dosbox-x
  scoop: extras/dosbox-x
  ubuntu: dosbox-x
  winget: joncampbell123.DOSBox-X
package-manager-url: https://formulae.brew.sh/formula/dosbox-x
version: 2026.05.02
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: DOSBox with accurate emulation and wide testing
source-archive: https://github.com/joncampbell123/dosbox-x/archive/refs/tags/dosbox-x-v2026.05.02.tar.gz
dependencies:
  - fluid-synth
  - freetype
  - gettext
  - glib
  - libpng
  - libslirp
  - sdl2
  - sdl2_net
build-dependencies:
  - autoconf
  - automake
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: dosbox-x
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dosbox-x
  brew: brew install dosbox-x
  debian: sudo apt install dosbox-x
  macports: sudo port install dosbox-x
  nix: nix profile install nixpkgs#dosbox-x
  scoop: scoop install extras/dosbox-x
  ubuntu: sudo apt install dosbox-x
  winget: winget install --id joncampbell123.DOSBox-X -e
provenance:
  formula: dosbox-x
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
