id: brew:bcoin
display-name: bcoin
homepage: https://bcoin.io
repo: https://github.com/bcoin-org/bcoin
docs: https://bcoin.io
package-manager:
  brew: bcoin
package-manager-url: https://formulae.brew.sh/formula/bcoin
version: 2.2.0
license: MIT
category: development
tags:
  - cli
description: Javascript bitcoin library for node.js and browsers
source-archive: https://github.com/bcoin-org/bcoin/archive/refs/tags/v2.2.0.tar.gz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: bcoin
  - exposure: global executable
    kind: cli
    name: bcoin-cli
  - exposure: global executable
    kind: cli
    name: bcoin-node
  - exposure: global executable
    kind: cli
    name: bcoin-spvnode
  - exposure: global executable
    kind: cli
    name: bwallet
  - exposure: global executable
    kind: cli
    name: bwallet-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bcoin
  brew: brew install bcoin
provenance:
  formula: bcoin
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
