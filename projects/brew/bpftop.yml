id: brew:bpftop
display-name: bpftop
homepage: https://github.com/Netflix/bpftop
repo: https://github.com/Netflix/bpftop
docs: https://github.com/Netflix/bpftop
package-manager:
  apk: bpftop
  brew: bpftop
  debian: bpftop
  dnf: bpftop
  nix: bpftop
  pacman: bpftop
  zypper: bpftop
package-manager-url: https://formulae.brew.sh/formula/bpftop
version: 0.9.0
license: Apache-2.0
category: development
tags:
  - cli
description: Dynamic real-time view of running eBPF programs
source-archive: https://github.com/Netflix/bpftop/archive/refs/tags/v0.9.0.tar.gz
dependencies:
  - elfutils
  - zlib-ng-compat
build-dependencies:
  - llvm
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: bpftop
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add bpftop
  av: sudo av install brew:bpftop
  brew: brew install bpftop
  debian: sudo apt install bpftop
  dnf: sudo dnf install bpftop
  nix: nix profile install nixpkgs#bpftop
  pacman: sudo pacman -S bpftop
  zypper: sudo zypper install bpftop
provenance:
  formula: bpftop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
