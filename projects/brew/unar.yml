id: brew:unar
display-name: unar
homepage: https://theunarchiver.com/command-line
repo: https://github.com/MacPaw/XADMaster
docs: https://theunarchiver.com/command-line
package-manager:
  brew: unar
  debian: unar
  dnf: unar
  macports: unar
  nix: unar
  scoop: main/unar
  ubuntu: unar
  zypper: unar
package-manager-url: https://formulae.brew.sh/formula/unar
version: 1.10.8
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Command-line unarchiving tools supporting multiple formats
source-archive: https://github.com/MacPaw/XADMaster/archive/refs/tags/v1.10.8.tar.gz
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: lsar
  - exposure: global executable
    kind: cli
    name: unar
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:unar
  brew: brew install unar
  debian: sudo apt install unar
  dnf: sudo dnf install unar
  macports: sudo port install unar
  nix: nix profile install nixpkgs#unar
  scoop: scoop install main/unar
  ubuntu: sudo apt install unar
  zypper: sudo zypper install unar
provenance:
  formula: unar
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
