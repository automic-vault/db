id: brew:mcphost
display-name: mcphost
homepage: https://github.com/mark3labs/mcphost
repo: https://github.com/mark3labs/mcphost
docs: https://github.com/mark3labs/mcphost
package-manager:
  brew: mcphost
  nix: mcphost
  zypper: mcphost
package-manager-url: https://formulae.brew.sh/formula/mcphost
version: 0.34.0
license: MIT
category: development
tags:
  - cli
description: CLI host for LLMs to interact with tools via MCP
source-archive: https://github.com/mark3labs/mcphost/archive/refs/tags/v0.34.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mcphost
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mcphost
  brew: brew install mcphost
  nix: nix profile install nixpkgs#mcphost
  zypper: sudo zypper install mcphost
provenance:
  formula: mcphost
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
