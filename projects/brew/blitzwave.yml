id: brew:blitzwave
display-name: blitzwave
homepage: https://oschulz.github.io/blitzwave/
repo: https://github.com/oschulz/blitzwave
docs: https://oschulz.github.io/blitzwave/
package-manager:
  brew: blitzwave
  macports: blitzwave
package-manager-url: https://formulae.brew.sh/formula/blitzwave
version: 0.8.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: C++ wavelet library
source-archive: https://github.com/oschulz/blitzwave/archive/refs/tags/v0.8.0.tar.gz
dependencies:
  - blitz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: blitzwave-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:blitzwave
  brew: brew install blitzwave
  macports: sudo port install blitzwave
provenance:
  formula: blitzwave
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
