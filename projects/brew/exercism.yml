id: brew:exercism
display-name: exercism
homepage: https://exercism.io/cli/
repo: https://github.com/exercism/cli
docs: https://exercism.io/cli/
package-manager:
  apk: exercism
  brew: exercism
  dnf: exercism
  macports: exercism
  nix: exercism
  scoop: main/exercism
  winget: Exercism.CLI
package-manager-url: https://formulae.brew.sh/formula/exercism
version: 3.5.8
license: MIT
category: development
tags:
  - cli
description: Command-line tool to interact with exercism.io
source-archive: https://github.com/exercism/cli/archive/refs/tags/v3.5.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: exercism
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add exercism
  av: sudo av install brew:exercism
  brew: brew install exercism
  dnf: sudo dnf install exercism
  macports: sudo port install exercism
  nix: nix profile install nixpkgs#exercism
  scoop: scoop install main/exercism
  winget: winget install --id Exercism.CLI -e
provenance:
  formula: exercism
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
