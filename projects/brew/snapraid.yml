id: brew:snapraid
display-name: snapraid
homepage: https://www.snapraid.it/
repo: https://github.com/amadvance/snapraid
docs: https://www.snapraid.it/
package-manager:
  apk: snapraid
  brew: snapraid
  debian: snapraid
  dnf: snapraid
  macports: snapraid
  nix: snapraid
  scoop: main/snapraid
  ubuntu: snapraid
  zypper: snapraid
package-manager-url: https://formulae.brew.sh/formula/snapraid
version: 14.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Backup program for disk arrays
source-archive: https://github.com/amadvance/snapraid/releases/download/v14.5/snapraid-14.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: snapraid
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add snapraid
  av: sudo av install brew:snapraid
  brew: brew install snapraid
  debian: sudo apt install snapraid
  dnf: sudo dnf install snapraid
  macports: sudo port install snapraid
  nix: nix profile install nixpkgs#snapraid
  scoop: scoop install main/snapraid
  ubuntu: sudo apt install snapraid
  zypper: sudo zypper install snapraid
provenance:
  formula: snapraid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
