id: brew:mabel
display-name: mabel
homepage: https://github.com/smmr-software/mabel
repo: https://github.com/smmr-software/mabel
docs: https://github.com/smmr-software/mabel
package-manager:
  brew: mabel
  macports: mabel
package-manager-url: https://formulae.brew.sh/formula/mabel
version: 0.1.7
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Fancy BitTorrent client for the terminal
source-archive: https://github.com/smmr-software/mabel.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mabel
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mabel
  brew: brew install mabel
  macports: sudo port install mabel
provenance:
  formula: mabel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
