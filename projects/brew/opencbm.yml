id: brew:opencbm
display-name: opencbm
homepage: https://spiro.trikaliotis.net/opencbm
repo: https://github.com/OpenCBM/OpenCBM
docs: https://spiro.trikaliotis.net/opencbm
package-manager:
  brew: opencbm
  nix: opencbm
package-manager-url: https://formulae.brew.sh/formula/opencbm
version: 0.4.99.104
license: GPL-2.0-only
category: development
tags:
  - cli
description: Provides access to various floppy drive formats
source-archive: https://github.com/OpenCBM/OpenCBM/archive/refs/tags/v0.4.99.104.tar.gz
dependencies:
  - libusb
build-dependencies:
  - cc65
  - pkgconf
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: cbmcopy
  - exposure: global executable
    kind: cli
    name: cbmctrl
  - exposure: global executable
    kind: cli
    name: cbmformat
  - exposure: global executable
    kind: cli
    name: cbmforng
  - exposure: global executable
    kind: cli
    name: cbmlinetester
  - exposure: global executable
    kind: cli
    name: cbmread
  - exposure: global executable
    kind: cli
    name: cbmrpm41
  - exposure: global executable
    kind: cli
    name: cbmwrite
  - exposure: global executable
    kind: cli
    name: d64copy
  - exposure: global executable
    kind: cli
    name: d82copy
  - exposure: global executable
    kind: cli
    name: frm_analyzer
  - exposure: global executable
    kind: cli
    name: imgcopy
  - exposure: global executable
    kind: cli
    name: opencbm_plugin_helper_tools
  - exposure: global executable
    kind: cli
    name: samplelibtransf
  - exposure: global executable
    kind: cli
    name: testlines
  - exposure: global executable
    kind: cli
    name: xum1541cfg
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:opencbm
  brew: brew install opencbm
  nix: nix profile install nixpkgs#opencbm
provenance:
  formula: opencbm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
