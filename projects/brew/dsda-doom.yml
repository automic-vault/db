id: brew:dsda-doom
display-name: dsda-doom
homepage: https://github.com/kraflab/dsda-doom
repo: https://github.com/kraflab/dsda-doom
docs: https://github.com/kraflab/dsda-doom
package-manager:
  brew: dsda-doom
  debian: dsda-doom
  dnf: dsda-doom
  nix: dsda-doom
  ubuntu: dsda-doom
  zypper: dsda-doom
package-manager-url: https://formulae.brew.sh/formula/dsda-doom
version: 0.29.4
license: GPL-2.0-only
category: development
tags:
  - cli
description: Fork of prboom+ with a focus on speedrunning
source-archive: https://github.com/kraflab/dsda-doom/archive/refs/tags/v0.29.4.tar.gz
dependencies:
  - fluid-synth
  - libsndfile
  - libvorbis
  - libxmp
  - libzip
  - mad
  - portmidi
  - sdl2
  - sdl2_image
  - sdl2_mixer
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dsda-doom
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: 'For DSDA-Doom to find your WAD files, place them in: $HOMEBREW_PREFIX/share/games/doom'
  post-install-defined: true
install-lines:
  av: sudo av install brew:dsda-doom
  brew: brew install dsda-doom
  debian: sudo apt install dsda-doom
  dnf: sudo dnf install dsda-doom
  nix: nix profile install nixpkgs#dsda-doom
  ubuntu: sudo apt install dsda-doom
  zypper: sudo zypper install dsda-doom
provenance:
  formula: dsda-doom
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
