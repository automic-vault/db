id: brew:talm
display-name: talm
homepage: https://github.com/cozystack/talm
repo: https://github.com/cozystack/talm
docs: https://github.com/cozystack/talm
package-manager:
  brew: talm
  nix: talm
package-manager-url: https://formulae.brew.sh/formula/talm
version: 0.30.0
license: Apache-2.0
category: development
tags:
  - cli
description: Manage Talos Linux configurations the GitOps way
source-archive: https://github.com/cozystack/talm/archive/refs/tags/v0.30.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: talm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:talm
  brew: brew install talm
  nix: nix profile install nixpkgs#talm
provenance:
  formula: talm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
