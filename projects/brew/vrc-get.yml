id: brew:vrc-get
display-name: vrc-get
homepage: https://github.com/vrc-get/vrc-get
repo: https://github.com/vrc-get/vrc-get
docs: https://github.com/vrc-get/vrc-get
package-manager:
  brew: vrc-get
  macports: vrc-get
  nix: vrc-get
  winget: anatawa12.vrc-get
package-manager-url: https://formulae.brew.sh/formula/vrc-get
version: 1.9.1
license: MIT
category: development
tags:
  - cli
description: Open Source alternative of Command-line client of VRChat Package Manager
source-archive: https://github.com/vrc-get/vrc-get/archive/refs/tags/v1.9.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: vrc-get
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:vrc-get
  brew: brew install vrc-get
  macports: sudo port install vrc-get
  nix: nix profile install nixpkgs#vrc-get
  winget: winget install --id anatawa12.vrc-get -e
provenance:
  formula: vrc-get
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
