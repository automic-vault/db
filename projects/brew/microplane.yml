id: brew:microplane
display-name: microplane
homepage: https://github.com/Clever/microplane
repo: https://github.com/Clever/microplane
docs: https://github.com/Clever/microplane
package-manager:
  brew: microplane
  dnf: mp
  macports: microplane
  nix: microplane
  zypper: mp
package-manager-url: https://formulae.brew.sh/formula/microplane
version: 0.0.37
license: Apache-2.0
category: development
tags:
  - cli
  - git
description: CLI tool to make git changes across many repos
source-archive: https://github.com/Clever/microplane/archive/refs/tags/v0.0.37.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:microplane
  brew: brew install microplane
  dnf: sudo dnf install mp
  macports: sudo port install microplane
  nix: nix profile install nixpkgs#microplane
  zypper: sudo zypper install mp
provenance:
  formula: microplane
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
