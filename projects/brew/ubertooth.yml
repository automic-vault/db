id: brew:ubertooth
display-name: ubertooth
homepage: https://greatscottgadgets.com/ubertoothone/
repo: https://github.com/greatscottgadgets/ubertooth
docs: https://greatscottgadgets.com/ubertoothone/
package-manager:
  brew: ubertooth
  debian: ubertooth
  dnf: ubertooth
  macports: ubertooth
  nix: ubertooth
  ubuntu: ubertooth
package-manager-url: https://formulae.brew.sh/formula/ubertooth
version: 2020-12-R1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Host tools for Project Ubertooth
source-archive: >
  https://github.com/greatscottgadgets/ubertooth/releases/download/2020-12-R1/ubertooth-2020-12-R1.tar.xz
dependencies:
  - libbtbb
  - libusb
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ubertooth-afh
  - exposure: global executable
    kind: cli
    name: ubertooth-btle
  - exposure: global executable
    kind: cli
    name: ubertooth-debug
  - exposure: global executable
    kind: cli
    name: ubertooth-dfu
  - exposure: global executable
    kind: cli
    name: ubertooth-ducky
  - exposure: global executable
    kind: cli
    name: ubertooth-dump
  - exposure: global executable
    kind: cli
    name: ubertooth-ego
  - exposure: global executable
    kind: cli
    name: ubertooth-rx
  - exposure: global executable
    kind: cli
    name: ubertooth-specan
  - exposure: global executable
    kind: cli
    name: ubertooth-tx
  - exposure: global executable
    kind: cli
    name: ubertooth-util
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ubertooth
  brew: brew install ubertooth
  debian: sudo apt install ubertooth
  dnf: sudo dnf install ubertooth
  macports: sudo port install ubertooth
  nix: nix profile install nixpkgs#ubertooth
  ubuntu: sudo apt install ubertooth
provenance:
  formula: ubertooth
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
