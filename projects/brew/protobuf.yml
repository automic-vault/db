id: brew:protobuf
display-name: protobuf
homepage: https://protobuf.dev/
repo: https://github.com/protocolbuffers/protobuf
docs: https://protobuf.dev/
package-manager:
  apk: protobuf
  brew: protobuf
  chocolatey: protoc
  dnf: protobuf
  macports: protobuf
  nix: protobuf
  pacman: protobuf
  scoop: extras/protobuf
  winget: Google.Protobuf
package-manager-url: https://formulae.brew.sh/formula/protobuf
version: 35.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Protocol buffers (Google's data interchange format)
source-archive: https://github.com/protocolbuffers/protobuf/releases/download/v35.0/protobuf-35.0.tar.gz
dependencies:
  - abseil
build-dependencies:
  - cmake
  - googletest
executables:
  - exposure: global executable
    kind: cli
    name: protoc
  - exposure: global executable
    kind: cli
    name: protoc-35.0.0
  - exposure: global executable
    kind: cli
    name: protoc-gen-upb
  - exposure: global executable
    kind: cli
    name: protoc-gen-upb-35.0.0
  - exposure: global executable
    kind: cli
    name: protoc-gen-upb_minitable
  - exposure: global executable
    kind: cli
    name: protoc-gen-upb_minitable-35.0.0
  - exposure: global executable
    kind: cli
    name: protoc-gen-upbdefs
  - exposure: global executable
    kind: cli
    name: protoc-gen-upbdefs-35.0.0
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add protobuf
  av: sudo av install brew:protobuf
  brew: brew install protobuf
  chocolatey: choco install protoc
  dnf: sudo dnf install protobuf
  macports: sudo port install protobuf
  nix: nix profile install nixpkgs#protobuf
  pacman: sudo pacman -S protobuf
  scoop: scoop install extras/protobuf
  winget: winget install --id Google.Protobuf -e
provenance:
  formula: protobuf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
