id: brew:gnmic
display-name: gnmic
homepage: https://gnmic.openconfig.net
repo: https://github.com/openconfig/gnmic
docs: https://gnmic.openconfig.net
package-manager:
  brew: gnmic
  nix: gnmic
package-manager-url: https://formulae.brew.sh/formula/gnmic
version: 0.46.0
license: Apache-2.0
category: development
tags:
  - cli
description: GNMI CLI client and collector
source-archive: https://github.com/openconfig/gnmic/archive/refs/tags/v0.46.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gnmic
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gnmic
  brew: brew install gnmic
  nix: nix profile install nixpkgs#gnmic
provenance:
  formula: gnmic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
