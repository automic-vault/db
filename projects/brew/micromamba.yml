id: brew:micromamba
display-name: micromamba
homepage: https://github.com/mamba-org/mamba
repo: https://github.com/mamba-org/mamba
docs: https://github.com/mamba-org/mamba
package-manager:
  brew: micromamba
  dnf: mamba
  nix: micromamba
  winget: Mamba.Micromamba
package-manager-url: https://formulae.brew.sh/formula/micromamba
version: 2.6.2
license: BSD-3-Clause
category: development
tags:
  - cli
description: Fast Cross-Platform Package Manager
source-archive: https://github.com/mamba-org/mamba/archive/refs/tags/2.6.2.tar.gz
dependencies:
  - fmt
  - libarchive
  - libsolv
  - lz4
  - msgpack
  - openssl@3
  - reproc
  - simdjson
  - xz
  - yaml-cpp
  - zstd
build-dependencies:
  - cli11
  - cmake
  - nlohmann-json
  - pkgconf
  - spdlog
  - tl-expected
uses-from-macos:
  - bzip2
  - curl
  - krb5
executables:
  - exposure: global executable
    kind: cli
    name: mamba
  - exposure: global executable
    kind: cli
    name: micromamba
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    Please run the following to setup your shell:
    $HOMEBREW_PREFIX/opt/micromamba/bin/mamba shell init --shell <your-shell>
    --root-prefix ~/mamba and restart your terminal.
  post-install-defined: false
install-lines:
  av: sudo av install brew:micromamba
  brew: brew install micromamba
  dnf: sudo dnf install mamba
  nix: nix profile install nixpkgs#micromamba
  winget: winget install --id Mamba.Micromamba -e
provenance:
  formula: micromamba
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
