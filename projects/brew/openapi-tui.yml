id: brew:openapi-tui
display-name: openapi-tui
homepage: https://github.com/zaghaghi/openapi-tui
repo: https://github.com/zaghaghi/openapi-tui
docs: https://github.com/zaghaghi/openapi-tui
package-manager:
  apk: openapi-tui
  brew: openapi-tui
  nix: openapi-tui
  pacman: openapi-tui
package-manager-url: https://formulae.brew.sh/formula/openapi-tui
version: 0.10.2
license: MIT
category: development
tags:
  - cli
description: TUI to list, browse and run APIs defined with openapi spec
source-archive: https://github.com/zaghaghi/openapi-tui/archive/refs/tags/0.10.2.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: openapi-tui
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add openapi-tui
  av: sudo av install brew:openapi-tui
  brew: brew install openapi-tui
  nix: nix profile install nixpkgs#openapi-tui
  pacman: sudo pacman -S openapi-tui
provenance:
  formula: openapi-tui
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
