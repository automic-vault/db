id: brew:tree
display-name: tree
homepage: https://oldmanprogrammer.net/source.php?dir=projects/tree
repo: https://github.com/Old-Man-Programmer/tree
docs: https://oldmanprogrammer.net/source.php?dir=projects/tree
package-manager:
  apk: tree
  brew: tree
  chocolatey: tree
  debian: tree
  dnf: tree
  macports: tree
  nix: tree
  pacman: tree
  ubuntu: tree
  zypper: tree
package-manager-url: https://formulae.brew.sh/formula/tree
version: 2.3.2
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Display directories as trees (with optional color/HTML output)
source-archive: https://github.com/Old-Man-Programmer/tree/archive/refs/tags/2.3.2.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: tree
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tree
  av: sudo av install brew:tree
  brew: brew install tree
  chocolatey: choco install tree
  debian: sudo apt install tree
  dnf: sudo dnf install tree
  macports: sudo port install tree
  nix: nix profile install nixpkgs#tree
  pacman: sudo pacman -S tree
  ubuntu: sudo apt install tree
  zypper: sudo zypper install tree
provenance:
  formula: tree
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
