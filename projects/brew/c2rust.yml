id: brew:c2rust
display-name: c2rust
homepage: https://c2rust.com/
repo: https://github.com/immunant/c2rust
docs: https://c2rust.com/
package-manager:
  apk: c2rust
  brew: c2rust
package-manager-url: https://formulae.brew.sh/formula/c2rust
version: 0.22.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Migrate C code to Rust
source-archive: https://github.com/immunant/c2rust/archive/refs/tags/v0.22.1.tar.gz
dependencies:
  - llvm@21
build-dependencies:
  - cmake
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: c2rust
  - exposure: global executable
    kind: cli
    name: c2rust-transpile
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add c2rust
  av: sudo av install brew:c2rust
  brew: brew install c2rust
provenance:
  formula: c2rust
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
