id: brew:tanka
display-name: tanka
homepage: https://tanka.dev
repo: https://github.com/grafana/tanka
docs: https://tanka.dev
package-manager:
  apk: tanka
  brew: tanka
  debian: tk
  dnf: tk
  macports: tanka
  nix: tanka
  pacman: tanka
  ubuntu: tk
  zypper: tk
package-manager-url: https://formulae.brew.sh/formula/tanka
version: 0.37.2
license: Apache-2.0
category: cloud
tags:
  - cli
  - kubernetes
description: Flexible, reusable and concise configuration for Kubernetes using Jsonnet
source-archive: https://github.com/grafana/tanka/archive/refs/tags/v0.37.2.tar.gz
dependencies:
  - kubernetes-cli
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tanka
  av: sudo av install brew:tanka
  brew: brew install tanka
  debian: sudo apt install tk
  dnf: sudo dnf install tk
  macports: sudo port install tanka
  nix: nix profile install nixpkgs#tanka
  pacman: sudo pacman -S tanka
  ubuntu: sudo apt install tk
  zypper: sudo zypper install tk
provenance:
  formula: tanka
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
