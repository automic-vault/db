id: brew:somagic-tools
display-name: somagic-tools
homepage: https://code.google.com/archive/p/easycap-somagic-linux/
repo: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/easycap-somagic-linux/somagic-easycap-tools_1.1.tar.gz
docs: https://code.google.com/archive/p/easycap-somagic-linux/
package-manager:
  brew: somagic-tools
package-manager-url: https://formulae.brew.sh/formula/somagic-tools
version: 1.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Tools to extract firmware from EasyCAP
source-archive: >
  https://storage.googleapis.com/google-code-archive-downloads/v2/code.google.com/easycap-somagic-linux/somagic-easycap-tools_1.1.tar.gz
dependencies:
  - libgcrypt
  - libusb
executables:
  - exposure: global executable
    kind: cli
    name: somagic-extract-firmware
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:somagic-tools
  brew: brew install somagic-tools
provenance:
  formula: somagic-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
