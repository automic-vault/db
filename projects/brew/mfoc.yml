id: brew:mfoc
display-name: mfoc
homepage: https://github.com/nfc-tools/mfoc
repo: https://github.com/nfc-tools/mfoc
docs: https://github.com/nfc-tools/mfoc
package-manager:
  brew: mfoc
  debian: mfoc
  nix: mfoc
  pacman: mfoc
  ubuntu: mfoc
  zypper: mfoc
package-manager-url: https://formulae.brew.sh/formula/mfoc
version: 0.10.7
license: GPL-2.0-or-later AND BSD-2-Clause
category: development
tags:
  - cli
description: Implementation of 'offline nested' attack by Nethemba
source-archive: https://github.com/nfc-tools/mfoc/archive/refs/tags/mfoc-0.10.7.tar.gz
dependencies:
  - libnfc
  - libusb-compat
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mfoc
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mfoc
  brew: brew install mfoc
  debian: sudo apt install mfoc
  nix: nix profile install nixpkgs#mfoc
  pacman: sudo pacman -S mfoc
  ubuntu: sudo apt install mfoc
  zypper: sudo zypper install mfoc
provenance:
  formula: mfoc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
