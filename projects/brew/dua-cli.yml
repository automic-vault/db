id: brew:dua-cli
display-name: dua-cli
homepage: https://lib.rs/crates/dua-cli
repo: https://github.com/Byron/dua-cli
docs: https://lib.rs/crates/dua-cli
package-manager:
  apk: dua
  brew: dua-cli
  dnf: dua-cli
  macports: dua-cli
  nix: dua
  pacman: dua-cli
  scoop: main/dua
  winget: Byron.dua-cli
package-manager-url: https://formulae.brew.sh/formula/dua-cli
version: 2.34.0
license: MIT
category: development
tags:
  - cli
description: View disk space usage and delete unwanted data, fast
source-archive: https://github.com/Byron/dua-cli/archive/refs/tags/v2.34.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: dua
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dua
  av: sudo av install brew:dua-cli
  brew: brew install dua-cli
  dnf: sudo dnf install dua-cli
  macports: sudo port install dua-cli
  nix: nix profile install nixpkgs#dua
  pacman: sudo pacman -S dua-cli
  scoop: scoop install main/dua
  winget: winget install --id Byron.dua-cli -e
provenance:
  formula: dua-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
