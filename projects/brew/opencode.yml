id: brew:opencode
display-name: opencode
homepage: https://opencode.ai
repo: https://registry.npmjs.org/opencode-ai/-/opencode-ai-1.15.10.tgz
docs: https://opencode.ai
package-manager:
  brew: opencode
  chocolatey: opencode
  macports: opencode
  nix: opencode
  pacman: opencode
  scoop: main/opencode
  winget: SST.OpenCodeDesktop
package-manager-url: https://formulae.brew.sh/formula/opencode
version: 1.15.10
license: MIT
category: network
tags:
  - cli
description: AI coding agent, built for the terminal
source-archive: https://registry.npmjs.org/opencode-ai/-/opencode-ai-1.15.10.tgz
dependencies:
  - node
  - ripgrep
executables:
  - exposure: global executable
    kind: cli
    name: opencode
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:opencode
  brew: brew install opencode
  chocolatey: choco install opencode
  macports: sudo port install opencode
  nix: nix profile install nixpkgs#opencode
  pacman: sudo pacman -S opencode
  scoop: scoop install main/opencode
  winget: winget install --id SST.OpenCodeDesktop -e
provenance:
  formula: opencode
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
