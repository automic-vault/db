id: brew:ngircd
display-name: ngircd
homepage: https://ngircd.barton.de/
repo: https://ngircd.barton.de/pub/ngircd/ngircd-27.tar.xz
docs: https://ngircd.barton.de/
package-manager:
  apk: ngircd
  brew: ngircd
  debian: ngircd
  dnf: ngircd
  macports: ngircd
  nix: ngircd
  ubuntu: ngircd
package-manager-url: https://formulae.brew.sh/formula/ngircd
version: 27
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Lightweight Internet Relay Chat server
source-archive: https://ngircd.barton.de/pub/ngircd/ngircd-27.tar.xz
dependencies:
  - libident
  - openssl@3
executables:
  - exposure: global executable
    kind: cli
    name: ngircd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ngircd
  av: sudo av install brew:ngircd
  brew: brew install ngircd
  debian: sudo apt install ngircd
  dnf: sudo dnf install ngircd
  macports: sudo port install ngircd
  nix: nix profile install nixpkgs#ngircd
  ubuntu: sudo apt install ngircd
provenance:
  formula: ngircd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
