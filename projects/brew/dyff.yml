id: brew:dyff
display-name: dyff
homepage: https://github.com/homeport/dyff
repo: https://github.com/homeport/dyff
docs: https://github.com/homeport/dyff
package-manager:
  brew: dyff
  macports: dyff
  nix: dyff
  scoop: main/dyff
  zypper: dyff
package-manager-url: https://formulae.brew.sh/formula/dyff
version: 1.12.0
license: MIT
category: development
tags:
  - cli
  - json
  - yaml
description: Diff tool for YAML files, and sometimes JSON
source-archive: https://github.com/homeport/dyff/archive/refs/tags/v1.12.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dyff
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dyff
  brew: brew install dyff
  macports: sudo port install dyff
  nix: nix profile install nixpkgs#dyff
  scoop: scoop install main/dyff
  zypper: sudo zypper install dyff
provenance:
  formula: dyff
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
