id: brew:hcledit
display-name: hcledit
homepage: https://github.com/minamijoyo/hcledit
repo: https://github.com/minamijoyo/hcledit
docs: https://github.com/minamijoyo/hcledit
package-manager:
  brew: hcledit
  nix: hcledit
package-manager-url: https://formulae.brew.sh/formula/hcledit
version: 0.2.18
license: MIT
category: development
tags:
  - cli
description: Command-line editor for HCL
source-archive: https://github.com/minamijoyo/hcledit/archive/refs/tags/v0.2.18.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hcledit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hcledit
  brew: brew install hcledit
  nix: nix profile install nixpkgs#hcledit
provenance:
  formula: hcledit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
