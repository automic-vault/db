id: brew:diffnav
display-name: diffnav
homepage: https://github.com/dlvhdr/diffnav
repo: https://github.com/dlvhdr/diffnav
docs: https://github.com/dlvhdr/diffnav
package-manager:
  brew: diffnav
  macports: diffnav
  nix: diffnav
  pacman: diffnav
  scoop: main/diffnav
package-manager-url: https://formulae.brew.sh/formula/diffnav
version: 0.11.0
license: MIT
category: development
tags:
  - cli
  - git
description: Git diff pager based on delta but with a file tree
source-archive: https://github.com/dlvhdr/diffnav/archive/refs/tags/v0.11.0.tar.gz
dependencies:
  - git-delta
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: diffnav
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:diffnav
  brew: brew install diffnav
  macports: sudo port install diffnav
  nix: nix profile install nixpkgs#diffnav
  pacman: sudo pacman -S diffnav
  scoop: scoop install main/diffnav
provenance:
  formula: diffnav
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
