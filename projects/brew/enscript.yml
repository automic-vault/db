id: brew:enscript
display-name: enscript
homepage: https://www.gnu.org/software/enscript/
repo: https://ftpmirror.gnu.org/gnu/enscript/enscript-1.6.6.tar.gz
docs: https://www.gnu.org/software/enscript/
package-manager:
  apk: enscript
  brew: enscript
  debian: enscript
  dnf: enscript
  macports: enscript
  nix: enscript
  pacman: enscript
  ubuntu: enscript
  zypper: enscript
package-manager-url: https://formulae.brew.sh/formula/enscript
version: 1.6.6
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Convert text to Postscript, HTML, or RTF, with syntax highlighting
source-archive: https://ftpmirror.gnu.org/gnu/enscript/enscript-1.6.6.tar.gz
dependencies:
  - gettext
executables:
  - exposure: global executable
    kind: cli
    name: diffpp
  - exposure: global executable
    kind: cli
    name: enscript
  - exposure: global executable
    kind: cli
    name: mkafmmap
  - exposure: global executable
    kind: cli
    name: over
  - exposure: global executable
    kind: cli
    name: sliceprint
  - exposure: global executable
    kind: cli
    name: states
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add enscript
  av: sudo av install brew:enscript
  brew: brew install enscript
  debian: sudo apt install enscript
  dnf: sudo dnf install enscript
  macports: sudo port install enscript
  nix: nix profile install nixpkgs#enscript
  pacman: sudo pacman -S enscript
  ubuntu: sudo apt install enscript
  zypper: sudo zypper install enscript
provenance:
  formula: enscript
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
