id: brew:acme
display-name: acme
homepage: https://sourceforge.net/projects/acme-crossass/
repo: https://svn.code.sf.net/p/acme-crossass/code-0/trunk
docs: https://sourceforge.net/projects/acme-crossass/
package-manager:
  brew: acme
  debian: acme
  nix: acme
  pacman: acme
  ubuntu: acme
package-manager-url: https://formulae.brew.sh/formula/acme
version: 0.97
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Crossassembler for multiple environments
source-archive: https://svn.code.sf.net/p/acme-crossass/code-0/trunk
executables:
  - exposure: global executable
    kind: cli
    name: acme
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:acme
  brew: brew install acme
  debian: sudo apt install acme
  nix: nix profile install nixpkgs#acme
  pacman: sudo pacman -S acme
  ubuntu: sudo apt install acme
provenance:
  formula: acme
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
