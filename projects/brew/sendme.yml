id: brew:sendme
display-name: sendme
homepage: https://iroh.computer/sendme
repo: https://github.com/n0-computer/sendme
docs: https://iroh.computer/sendme
package-manager:
  brew: sendme
  nix: sendme
  pacman: sendme
  scoop: main/sendme
  winget: n0-computer.sendme
package-manager-url: https://formulae.brew.sh/formula/sendme
version: 0.34.0
license: MIT
category: development
tags:
  - cli
description: Tool to send files and directories, based on iroh
source-archive: https://github.com/n0-computer/sendme/archive/refs/tags/v0.34.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: sendme
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sendme
  brew: brew install sendme
  nix: nix profile install nixpkgs#sendme
  pacman: sudo pacman -S sendme
  scoop: scoop install main/sendme
  winget: winget install --id n0-computer.sendme -e
provenance:
  formula: sendme
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
