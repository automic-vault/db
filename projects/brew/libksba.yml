id: brew:libksba
display-name: libksba
homepage: https://www.gnupg.org/related_software/libksba/
repo: https://gnupg.org/ftp/gcrypt/libksba/libksba-1.8.0.tar.bz2
docs: https://www.gnupg.org/related_software/libksba/
package-manager:
  apk: libksba
  brew: libksba
  dnf: libksba
  macports: libksba
  nix: libksba
  pacman: libksba
package-manager-url: https://formulae.brew.sh/formula/libksba
version: 1.8.0
license: LGPL-3.0-or-later OR GPL-2.0-or-later
category: security
tags:
  - cli
description: X.509 and CMS library
source-archive: https://gnupg.org/ftp/gcrypt/libksba/libksba-1.8.0.tar.bz2
dependencies:
  - libgpg-error
executables:
  - exposure: global executable
    kind: cli
    name: ksba-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libksba
  av: sudo av install brew:libksba
  brew: brew install libksba
  dnf: sudo dnf install libksba
  macports: sudo port install libksba
  nix: nix profile install nixpkgs#libksba
  pacman: sudo pacman -S libksba
provenance:
  formula: libksba
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
