id: brew:php-cs-fixer
display-name: php-cs-fixer
homepage: https://cs.symfony.com/
repo: https://github.com/PHP-CS-Fixer/PHP-CS-Fixer
docs: https://cs.symfony.com/
package-manager:
  brew: php-cs-fixer
  dnf: php-cs-fixer
  zypper: php-cs-fixer
package-manager-url: https://formulae.brew.sh/formula/php-cs-fixer
version: 3.95.2
license: MIT
category: development
tags:
  - cli
description: Tool to automatically fix PHP coding standards issues
source-archive: https://github.com/PHP-CS-Fixer/PHP-CS-Fixer/releases/download/v3.95.2/php-cs-fixer.phar
dependencies:
  - php
executables:
  - exposure: global executable
    kind: cli
    name: php-cs-fixer
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:php-cs-fixer
  brew: brew install php-cs-fixer
  dnf: sudo dnf install php-cs-fixer
  zypper: sudo zypper install php-cs-fixer
provenance:
  formula: php-cs-fixer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
