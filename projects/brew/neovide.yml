id: brew:neovide
display-name: neovide
homepage: https://neovide.dev/
repo: https://github.com/neovide/neovide
docs: https://neovide.dev/
package-manager:
  apk: neovide
  brew: neovide
  chocolatey: neovide
  nix: neovide
  pacman: neovide
  scoop: extras/neovide
  winget: Neovide.Neovide
  zypper: neovide
package-manager-url: https://formulae.brew.sh/formula/neovide
version: 0.16.2
license: MIT
category: development
tags:
  - cli
description: No Nonsense Neovim Client in Rust
source-archive: https://github.com/neovide/neovide/archive/refs/tags/0.16.2.tar.gz
dependencies:
  - neovim
build-dependencies:
  - cargo-bundle
  - ninja
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: neovide
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add neovide
  av: sudo av install brew:neovide
  brew: brew install neovide
  chocolatey: choco install neovide
  nix: nix profile install nixpkgs#neovide
  pacman: sudo pacman -S neovide
  scoop: scoop install extras/neovide
  winget: winget install --id Neovide.Neovide -e
  zypper: sudo zypper install neovide
provenance:
  formula: neovide
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
