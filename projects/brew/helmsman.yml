id: brew:helmsman
display-name: helmsman
homepage: https://github.com/mkubaczyk/helmsman
repo: https://github.com/mkubaczyk/helmsman
docs: https://github.com/mkubaczyk/helmsman
package-manager:
  brew: helmsman
  nix: helmsman
  zypper: helmsman
package-manager-url: https://formulae.brew.sh/formula/helmsman
version: 4.0.5
license: MIT
category: development
tags:
  - cli
description: Helm Charts as Code tool
source-archive: https://github.com/mkubaczyk/helmsman/archive/refs/tags/v4.0.5.tar.gz
dependencies:
  - helm
  - kubernetes-cli
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: helmsman
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:helmsman
  brew: brew install helmsman
  nix: nix profile install nixpkgs#helmsman
  zypper: sudo zypper install helmsman
provenance:
  formula: helmsman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
