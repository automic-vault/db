id: brew:postgrest
display-name: postgrest
homepage: https://github.com/PostgREST/postgrest
repo: https://github.com/PostgREST/postgrest
docs: https://github.com/PostgREST/postgrest
package-manager:
  brew: postgrest
  nix: postgrest
  pacman: postgrest
  scoop: main/postgrest
package-manager-url: https://formulae.brew.sh/formula/postgrest
version: 14.12
license: MIT
category: database
tags:
  - cli
  - database
description: Serves a fully RESTful API from any existing PostgreSQL database
source-archive: https://github.com/PostgREST/postgrest/archive/refs/tags/v14.12.tar.gz
dependencies:
  - gmp
  - libpq
build-dependencies:
  - cabal-install
  - ghc@9.12
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: postgrest
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:postgrest
  brew: brew install postgrest
  nix: nix profile install nixpkgs#postgrest
  pacman: sudo pacman -S postgrest
  scoop: scoop install main/postgrest
provenance:
  formula: postgrest
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
