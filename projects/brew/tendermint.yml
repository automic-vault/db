id: brew:tendermint
display-name: tendermint
homepage: https://tendermint.com/
repo: https://github.com/tendermint/tendermint
docs: https://tendermint.com/
package-manager:
  brew: tendermint
  nix: tendermint
package-manager-url: https://formulae.brew.sh/formula/tendermint
version: 0.35.9
license: Apache-2.0
category: development
tags:
  - cli
description: BFT state machine replication for applications in any programming languages
source-archive: https://github.com/tendermint/tendermint/archive/refs/tags/v0.35.9.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tendermint
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tendermint
  brew: brew install tendermint
  nix: nix profile install nixpkgs#tendermint
provenance:
  formula: tendermint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
