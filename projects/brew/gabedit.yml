id: brew:gabedit
display-name: gabedit
homepage: https://gabedit.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/gabedit/gabedit/Gabedit251/GabeditSrc251.tar.gz
docs: https://gabedit.sourceforge.net/
package-manager:
  brew: gabedit
  dnf: gabedit
  ubuntu: gabedit
package-manager-url: https://formulae.brew.sh/formula/gabedit
version: 2.5.1
license: MIT
category: network
tags:
  - cli
description: GUI to computational chemistry packages like Gamess-US, Gaussian, etc.
source-archive: >
  https://downloads.sourceforge.net/project/gabedit/gabedit/Gabedit251/GabeditSrc251.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+
  - gtkglext
  - harfbuzz
  - pango
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: gabedit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gabedit
  brew: brew install gabedit
  dnf: sudo dnf install gabedit
  ubuntu: sudo apt install gabedit
provenance:
  formula: gabedit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
