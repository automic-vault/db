id: brew:packetry
display-name: packetry
homepage: https://github.com/greatscottgadgets/packetry
repo: https://github.com/greatscottgadgets/packetry
docs: https://github.com/greatscottgadgets/packetry
package-manager:
  brew: packetry
  nix: packetry
  zypper: packetry
package-manager-url: https://formulae.brew.sh/formula/packetry
version: 0.5.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Fast, intuitive USB 2.0 protocol analysis application for use with Cynthion
source-archive: https://github.com/greatscottgadgets/packetry/archive/refs/tags/v0.5.0.tar.gz
dependencies:
  - cairo
  - gdk-pixbuf
  - gettext
  - glib
  - graphene
  - gtk4
  - harfbuzz
  - pango
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: packetry
  - exposure: global executable
    kind: cli
    name: packetry-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:packetry
  brew: brew install packetry
  nix: nix profile install nixpkgs#packetry
  zypper: sudo zypper install packetry
provenance:
  formula: packetry
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
