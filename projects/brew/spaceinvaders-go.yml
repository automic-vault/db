id: brew:spaceinvaders-go
display-name: spaceinvaders-go
homepage: https://github.com/asib/spaceinvaders
repo: https://github.com/asib/spaceinvaders
docs: https://github.com/asib/spaceinvaders
package-manager:
  brew: spaceinvaders-go
package-manager-url: https://formulae.brew.sh/formula/spaceinvaders-go
version: 1.2.1
license: MIT
category: development
