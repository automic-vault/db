id: brew:wgcf
display-name: wgcf
homepage: https://github.com/ViRb3/wgcf
repo: https://github.com/ViRb3/wgcf
docs: https://github.com/ViRb3/wgcf
package-manager:
  apk: wgcf
  brew: wgcf
  nix: wgcf
  pacman: wgcf
  scoop: main/wgcf
  winget: ViRb3.wgcf
package-manager-url: https://formulae.brew.sh/formula/wgcf
version: 2.2.31
license: MIT
category: cloud
tags:
  - cli
description: Generate WireGuard profile from Cloudflare Warp account
source-archive: https://github.com/ViRb3/wgcf/archive/refs/tags/v2.2.31.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: wgcf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add wgcf
  av: sudo av install brew:wgcf
  brew: brew install wgcf
  nix: nix profile install nixpkgs#wgcf
  pacman: sudo pacman -S wgcf
  scoop: scoop install main/wgcf
  winget: winget install --id ViRb3.wgcf -e
provenance:
  formula: wgcf
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
