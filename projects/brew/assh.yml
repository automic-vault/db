id: brew:assh
display-name: assh
homepage: https://v1.manfred.life/assh/
repo: https://github.com/moul/assh
docs: https://v1.manfred.life/assh/
package-manager:
  brew: assh
  macports: assh
  nix: assh
package-manager-url: https://formulae.brew.sh/formula/assh
version: 2.17.2
license: MIT
category: development
tags:
  - cli
description: Advanced SSH config - Regex, aliases, gateways, includes and dynamic hosts
source-archive: https://github.com/moul/assh/archive/refs/tags/v2.17.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: assh
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:assh
  brew: brew install assh
  macports: sudo port install assh
  nix: nix profile install nixpkgs#assh
provenance:
  formula: assh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
