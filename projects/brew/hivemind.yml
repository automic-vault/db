id: brew:hivemind
display-name: hivemind
homepage: https://github.com/DarthSim/hivemind
repo: https://github.com/DarthSim/hivemind
docs: https://github.com/DarthSim/hivemind
package-manager:
  brew: hivemind
  nix: hivemind
package-manager-url: https://formulae.brew.sh/formula/hivemind
version: 1.1.0
license: MIT
category: development
tags:
  - cli
description: Process manager for Procfile-based applications
source-archive: https://github.com/DarthSim/hivemind/archive/refs/tags/v1.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: hivemind
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hivemind
  brew: brew install hivemind
  nix: nix profile install nixpkgs#hivemind
provenance:
  formula: hivemind
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
