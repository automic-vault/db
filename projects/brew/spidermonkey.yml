id: brew:spidermonkey
display-name: spidermonkey
homepage: https://spidermonkey.dev
repo: >
  https://archive.mozilla.org/pub/firefox/releases/140.11.0esr/source/firefox-140.11.0esr.source.tar.xz
docs: https://spidermonkey.dev
package-manager:
  brew: spidermonkey
  macports: spidermonkey
  pacman: js140
package-manager-url: https://formulae.brew.sh/formula/spidermonkey
version: 140.11.0
license: MPL-2.0
category: network
tags:
  - cli
description: JavaScript-C Engine
source-archive: >
  https://archive.mozilla.org/pub/firefox/releases/140.11.0esr/source/firefox-140.11.0esr.source.tar.xz
dependencies:
  - icu4c@78
  - nspr
  - readline
build-dependencies:
  - cbindgen
  - pkgconf
  - python@3.14
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: js
  - exposure: global executable
    kind: cli
    name: js140
  - exposure: global executable
    kind: cli
    name: js140-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spidermonkey
  brew: brew install spidermonkey
  macports: sudo port install spidermonkey
  pacman: sudo pacman -S js140
provenance:
  formula: spidermonkey
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
