id: brew:pastel
display-name: pastel
homepage: https://github.com/sharkdp/pastel
repo: https://github.com/sharkdp/pastel
docs: https://github.com/sharkdp/pastel
package-manager:
  apk: pastel
  brew: pastel
  dnf: pastel
  macports: pastel
  nix: pastel
  pacman: pastel
  scoop: main/pastel
  winget: Japplis.Pastel
  zypper: pastel
package-manager-url: https://formulae.brew.sh/formula/pastel
version: 0.12.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Command-line tool to generate, analyze, convert and manipulate colors
source-archive: https://github.com/sharkdp/pastel/archive/refs/tags/v0.12.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: pastel
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pastel
  av: sudo av install brew:pastel
  brew: brew install pastel
  dnf: sudo dnf install pastel
  macports: sudo port install pastel
  nix: nix profile install nixpkgs#pastel
  pacman: sudo pacman -S pastel
  scoop: scoop install main/pastel
  winget: winget install --id Japplis.Pastel -e
  zypper: sudo zypper install pastel
provenance:
  formula: pastel
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
