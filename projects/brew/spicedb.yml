id: brew:spicedb
display-name: spicedb
homepage: https://authzed.com/docs/spicedb/getting-started/discovering-spicedb
repo: https://github.com/authzed/spicedb
docs: https://authzed.com/docs/spicedb/getting-started/discovering-spicedb
package-manager:
  brew: spicedb
  nix: spicedb
package-manager-url: https://formulae.brew.sh/formula/spicedb
version: 1.53.0
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Open Source, Google Zanzibar-inspired database
source-archive: https://github.com/authzed/spicedb/archive/refs/tags/v1.53.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: spicedb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:spicedb
  brew: brew install spicedb
  nix: nix profile install nixpkgs#spicedb
provenance:
  formula: spicedb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
