id: brew:opencl-icd-loader
display-name: opencl-icd-loader
homepage: https://www.khronos.org/registry/OpenCL/
repo: https://github.com/KhronosGroup/OpenCL-ICD-Loader
docs: https://www.khronos.org/registry/OpenCL/
package-manager:
  apk: opencl-icd-loader
  brew: opencl-icd-loader
  dnf: OpenCL-ICD-Loader
package-manager-url: https://formulae.brew.sh/formula/opencl-icd-loader
version: 2025.07.22
license: Apache-2.0
category: development
tags:
  - cli
description: OpenCL Installable Client Driver (ICD) Loader
source-archive: https://github.com/KhronosGroup/OpenCL-ICD-Loader/archive/refs/tags/v2025.07.22.tar.gz
build-dependencies:
  - cmake
  - opencl-headers
executables:
  - exposure: global executable
    kind: cli
    name: cllayerinfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: The default vendors directory is $HOMEBREW_PREFIX/etc/OpenCL/vendors
  post-install-defined: false
install-lines:
  apk: sudo apk add opencl-icd-loader
  av: sudo av install brew:opencl-icd-loader
  brew: brew install opencl-icd-loader
  dnf: sudo dnf install OpenCL-ICD-Loader
provenance:
  formula: opencl-icd-loader
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
