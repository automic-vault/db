id: brew:todoman
display-name: todoman
homepage: https://todoman.readthedocs.io/
repo: >
  https://files.pythonhosted.org/packages/d9/9e/063e7e63e5fb1d595b139916f3d2477bedcae9fa0d23ba8119f45ccf1c8d/todoman-4.7.0.tar.gz
docs: https://todoman.readthedocs.io/
package-manager:
  apk: todoman
  brew: todoman
  debian: todoman
  nix: todoman
  pacman: todoman
  ubuntu: todoman
  winget: evestudio.todo-list
package-manager-url: https://formulae.brew.sh/formula/todoman
version: 4.7.0
license: ISC
category: network
tags:
  - cli
description: Simple CalDAV-based todo manager
source-archive: >
  https://files.pythonhosted.org/packages/d9/9e/063e7e63e5fb1d595b139916f3d2477bedcae9fa0d23ba8119f45ccf1c8d/todoman-4.7.0.tar.gz
dependencies:
  - jq
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: todo
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add todoman
  av: sudo av install brew:todoman
  brew: brew install todoman
  debian: sudo apt install todoman
  nix: nix profile install nixpkgs#todoman
  pacman: sudo pacman -S todoman
  ubuntu: sudo apt install todoman
  winget: winget install --id evestudio.todo-list -e
provenance:
  formula: todoman
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
