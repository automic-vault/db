id: brew:whodb-cli
display-name: whodb-cli
homepage: https://whodb.com/
repo: https://github.com/clidey/whodb
docs: https://whodb.com/
package-manager:
  brew: whodb-cli
package-manager-url: https://formulae.brew.sh/formula/whodb-cli
version: 0.111.0
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: Database management CLI with TUI interface, MCP server support, AI, and more
source-archive: https://github.com/clidey/whodb/archive/refs/tags/0.111.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: whodb-cli
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:whodb-cli
  brew: brew install whodb-cli
provenance:
  formula: whodb-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
