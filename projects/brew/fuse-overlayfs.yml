id: brew:fuse-overlayfs
display-name: fuse-overlayfs
homepage: https://github.com/containers/fuse-overlayfs
repo: https://github.com/containers/fuse-overlayfs
docs: https://github.com/containers/fuse-overlayfs
package-manager:
  apk: fuse-overlayfs
  brew: fuse-overlayfs
  debian: fuse-overlayfs
  dnf: fuse-overlayfs
  nix: fuse-overlayfs
  pacman: fuse-overlayfs
  ubuntu: fuse-overlayfs
  zypper: fuse-overlayfs
package-manager-url: https://formulae.brew.sh/formula/fuse-overlayfs
version: 1.16
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: FUSE implementation for overlayfs
source-archive: https://github.com/containers/fuse-overlayfs/archive/refs/tags/v1.16.tar.gz
dependencies:
  - libfuse
build-dependencies:
  - autoconf
  - automake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fuse-overlayfs
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fuse-overlayfs
  av: sudo av install brew:fuse-overlayfs
  brew: brew install fuse-overlayfs
  debian: sudo apt install fuse-overlayfs
  dnf: sudo dnf install fuse-overlayfs
  nix: nix profile install nixpkgs#fuse-overlayfs
  pacman: sudo pacman -S fuse-overlayfs
  ubuntu: sudo apt install fuse-overlayfs
  zypper: sudo zypper install fuse-overlayfs
provenance:
  formula: fuse-overlayfs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
