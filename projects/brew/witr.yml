id: brew:witr
display-name: witr
homepage: https://github.com/pranshuparmar/witr
repo: https://github.com/pranshuparmar/witr
docs: https://github.com/pranshuparmar/witr
package-manager:
  brew: witr
  macports: witr
  nix: witr
  scoop: main/witr
  winget: PranshuParmar.witr
package-manager-url: https://formulae.brew.sh/formula/witr
version: 0.3.2
license: Apache-2.0
category: development
tags:
  - cli
description: Why is this running?
source-archive: https://github.com/pranshuparmar/witr/archive/refs/tags/v0.3.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: witr
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:witr
  brew: brew install witr
  macports: sudo port install witr
  nix: nix profile install nixpkgs#witr
  scoop: scoop install main/witr
  winget: winget install --id PranshuParmar.witr -e
provenance:
  formula: witr
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
