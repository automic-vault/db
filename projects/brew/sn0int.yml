id: brew:sn0int
display-name: sn0int
homepage: https://sn0int.readthedocs.io/en/stable/
repo: https://github.com/kpcyrd/sn0int
docs: https://sn0int.readthedocs.io/en/stable/
package-manager:
  apk: sn0int
  brew: sn0int
  nix: sn0int
  pacman: sn0int
package-manager-url: https://formulae.brew.sh/formula/sn0int
version: 0.26.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Semi-automatic OSINT framework and package manager
source-archive: https://github.com/kpcyrd/sn0int/archive/refs/tags/v0.26.1.tar.gz
dependencies:
  - libsodium
build-dependencies:
  - pkgconf
  - rust
  - sphinx-doc
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: sn0int
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add sn0int
  av: sudo av install brew:sn0int
  brew: brew install sn0int
  nix: nix profile install nixpkgs#sn0int
  pacman: sudo pacman -S sn0int
provenance:
  formula: sn0int
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
