id: brew:mpssh
display-name: mpssh
homepage: https://github.com/ndenev/mpssh
repo: https://github.com/ndenev/mpssh
docs: https://github.com/ndenev/mpssh
package-manager:
  brew: mpssh
  dnf: mpssh
package-manager-url: https://formulae.brew.sh/formula/mpssh
version: 1.3.3
license: BSD-3-Clause
category: development
tags:
  - cli
description: Mass parallel ssh
source-archive: https://github.com/ndenev/mpssh/archive/refs/tags/1.3.3.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: mpssh
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mpssh
  brew: brew install mpssh
  dnf: sudo dnf install mpssh
provenance:
  formula: mpssh
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
