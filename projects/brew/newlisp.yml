id: brew:newlisp
display-name: newlisp
homepage: https://www.newlisp.org/
repo: https://www.newlisp.org/downloads/newlisp-10.7.5.tgz
docs: https://www.newlisp.org/
package-manager:
  brew: newlisp
  debian: newlisp
  dnf: newlisp
  macports: newlisp
  nix: newlisp
  ubuntu: newlisp
package-manager-url: https://formulae.brew.sh/formula/newlisp
version: 10.7.5
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Lisp-like, general-purpose scripting language
source-archive: https://www.newlisp.org/downloads/newlisp-10.7.5.tgz
dependencies:
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: newlisp
  - exposure: global executable
    kind: cli
    name: newlisp-10.7.5
  - exposure: global executable
    kind: cli
    name: newlispdoc
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    If you have brew in a custom prefix, the included examples will need to be be
    pointed to your newlisp executable.
  post-install-defined: false
install-lines:
  av: sudo av install brew:newlisp
  brew: brew install newlisp
  debian: sudo apt install newlisp
  dnf: sudo dnf install newlisp
  macports: sudo port install newlisp
  nix: nix profile install nixpkgs#newlisp
  ubuntu: sudo apt install newlisp
provenance:
  formula: newlisp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
