id: brew:pscale
display-name: pscale
homepage: https://www.planetscale.com/
repo: https://github.com/planetscale/cli
docs: https://www.planetscale.com/
package-manager:
  brew: pscale
  nix: pscale
package-manager-url: https://formulae.brew.sh/formula/pscale
version: 0.284.0
license: Apache-2.0
category: database
tags:
  - cli
  - database
description: CLI for PlanetScale Database
source-archive: https://github.com/planetscale/cli/archive/refs/tags/v0.284.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: pscale
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pscale
  brew: brew install pscale
  nix: nix profile install nixpkgs#pscale
provenance:
  formula: pscale
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
