id: brew:ex-vi
display-name: ex-vi
homepage: https://ex-vi.sourceforge.net/
repo: https://downloads.sourceforge.net/project/ex-vi/ex-vi/050325/ex-050325.tar.bz2
docs: https://ex-vi.sourceforge.net/
package-manager:
  brew: ex-vi
  macports: ex-vi
package-manager-url: https://formulae.brew.sh/formula/ex-vi
version: 050325
license: BSD-4-Clause AND BSD-4-Clause-UC
category: network
tags:
  - cli
description: UTF8-friendly version of traditional vi
source-archive: https://downloads.sourceforge.net/project/ex-vi/ex-vi/050325/ex-050325.tar.bz2
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: vedit
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ex-vi
  brew: brew install ex-vi
  macports: sudo port install ex-vi
provenance:
  formula: ex-vi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
