id: brew:lemon
display-name: lemon
homepage: https://www.hwaci.com/sw/lemon/
repo: https://www.sqlite.org/2026/sqlite-src-3530100.zip
docs: https://www.hwaci.com/sw/lemon/
package-manager:
  brew: lemon
  debian: lemon
  dnf: lemon
  macports: lemon
  nix: lemon
  pacman: lemon
  ubuntu: lemon
  zypper: lemon
package-manager-url: https://formulae.brew.sh/formula/lemon
version: 3.53.1
license: blessing
category: database
tags:
  - cli
description: LALR(1) parser generator like yacc or bison
source-archive: https://www.sqlite.org/2026/sqlite-src-3530100.zip
executables:
  - exposure: global executable
    kind: cli
    name: lemon
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sequoia
    - sonoma
    - tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lemon
  brew: brew install lemon
  debian: sudo apt install lemon
  dnf: sudo dnf install lemon
  macports: sudo port install lemon
  nix: nix profile install nixpkgs#lemon
  pacman: sudo pacman -S lemon
  ubuntu: sudo apt install lemon
  zypper: sudo zypper install lemon
provenance:
  formula: lemon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
