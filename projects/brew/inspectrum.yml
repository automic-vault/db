id: brew:inspectrum
display-name: inspectrum
homepage: https://github.com/miek/inspectrum
repo: https://github.com/miek/inspectrum
docs: https://github.com/miek/inspectrum
package-manager:
  brew: inspectrum
  debian: inspectrum
  macports: inspectrum
  nix: inspectrum
  pacman: inspectrum
  ubuntu: inspectrum
  zypper: inspectrum
package-manager-url: https://formulae.brew.sh/formula/inspectrum
version: 0.4.0
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Offline radio signal analyser
source-archive: https://github.com/miek/inspectrum/archive/refs/tags/v0.4.0.tar.gz
dependencies:
  - fftw
  - liquid-dsp
  - qtbase
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: inspectrum
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:inspectrum
  brew: brew install inspectrum
  debian: sudo apt install inspectrum
  macports: sudo port install inspectrum
  nix: nix profile install nixpkgs#inspectrum
  pacman: sudo pacman -S inspectrum
  ubuntu: sudo apt install inspectrum
  zypper: sudo zypper install inspectrum
provenance:
  formula: inspectrum
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
