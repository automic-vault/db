id: brew:ncdc
display-name: ncdc
homepage: https://dev.yorhel.nl/ncdc
repo: https://dev.yorhel.nl/download/ncdc-1.25.tar.gz
docs: https://dev.yorhel.nl/ncdc
package-manager:
  brew: ncdc
  debian: ncdc
  dnf: ncdc
  macports: ncdc
  nix: ncdc
  ubuntu: ncdc
package-manager-url: https://formulae.brew.sh/formula/ncdc
version: 1.25
license: MIT
category: network
tags:
  - cli
description: NCurses direct connect
source-archive: https://dev.yorhel.nl/download/ncdc-1.25.tar.gz
dependencies:
  - gettext
  - glib
  - gnutls
  - ncurses
  - sqlite
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: ncdc
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ncdc
  brew: brew install ncdc
  debian: sudo apt install ncdc
  dnf: sudo dnf install ncdc
  macports: sudo port install ncdc
  nix: nix profile install nixpkgs#ncdc
  ubuntu: sudo apt install ncdc
provenance:
  formula: ncdc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
