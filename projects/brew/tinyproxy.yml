id: brew:tinyproxy
display-name: tinyproxy
homepage: https://tinyproxy.github.io/
repo: https://github.com/tinyproxy/tinyproxy
docs: https://tinyproxy.github.io/
package-manager:
  apk: tinyproxy
  brew: tinyproxy
  debian: tinyproxy
  dnf: tinyproxy
  macports: tinyproxy
  nix: tinyproxy
  pacman: tinyproxy
  ubuntu: tinyproxy
  zypper: tinyproxy
package-manager-url: https://formulae.brew.sh/formula/tinyproxy
version: 1.11.3
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: HTTP/HTTPS proxy for POSIX systems
source-archive: https://github.com/tinyproxy/tinyproxy/releases/download/1.11.3/tinyproxy-1.11.3.tar.xz
build-dependencies:
  - asciidoc
  - docbook-xsl
executables:
  - exposure: global executable
    kind: cli
    name: tinyproxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add tinyproxy
  av: sudo av install brew:tinyproxy
  brew: brew install tinyproxy
  debian: sudo apt install tinyproxy
  dnf: sudo dnf install tinyproxy
  macports: sudo port install tinyproxy
  nix: nix profile install nixpkgs#tinyproxy
  pacman: sudo pacman -S tinyproxy
  ubuntu: sudo apt install tinyproxy
  zypper: sudo zypper install tinyproxy
provenance:
  formula: tinyproxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
