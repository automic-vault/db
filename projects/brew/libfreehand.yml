id: brew:libfreehand
display-name: libfreehand
homepage: https://wiki.documentfoundation.org/DLP/Libraries/libfreehand
repo: https://dev-www.libreoffice.org/src/libfreehand/libfreehand-0.1.3.tar.xz
docs: https://wiki.documentfoundation.org/DLP/Libraries/libfreehand
package-manager:
  apk: libfreehand
  brew: libfreehand
  dnf: libfreehand
  macports: libfreehand
  nix: libfreehand
  pacman: libfreehand
package-manager-url: https://formulae.brew.sh/formula/libfreehand
version: 0.1.3
license: MPL-2.0
category: network
tags:
  - cli
description: Interpret and import Aldus/Macromedia/Adobe FreeHand documents
source-archive: https://dev-www.libreoffice.org/src/libfreehand/libfreehand-0.1.3.tar.xz
dependencies:
  - librevenge
  - little-cms2
build-dependencies:
  - boost
  - icu4c@78
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: fh2raw
  - exposure: global executable
    kind: cli
    name: fh2svg
  - exposure: global executable
    kind: cli
    name: fh2text
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libfreehand
  av: sudo av install brew:libfreehand
  brew: brew install libfreehand
  dnf: sudo dnf install libfreehand
  macports: sudo port install libfreehand
  nix: nix profile install nixpkgs#libfreehand
  pacman: sudo pacman -S libfreehand
provenance:
  formula: libfreehand
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
