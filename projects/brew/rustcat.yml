id: brew:rustcat
display-name: rustcat
homepage: https://github.com/robiot/rustcat
repo: https://github.com/robiot/rustcat
docs: https://github.com/robiot/rustcat
package-manager:
  brew: rustcat
  dnf: rustcat
  nix: rustcat
package-manager-url: https://formulae.brew.sh/formula/rustcat
version: 3.0.0
license: GPL-3.0-only
category: development
tags:
  - cli
description: Modern Port listener and Reverse shell
source-archive: https://github.com/robiot/rustcat/archive/refs/tags/v3.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: rcat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rustcat
  brew: brew install rustcat
  dnf: sudo dnf install rustcat
  nix: nix profile install nixpkgs#rustcat
provenance:
  formula: rustcat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
