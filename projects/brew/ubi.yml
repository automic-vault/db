id: brew:ubi
display-name: ubi
homepage: https://github.com/houseabsolute/ubi
repo: https://github.com/houseabsolute/ubi
docs: https://github.com/houseabsolute/ubi
package-manager:
  brew: ubi
  winget: houseabsolute.ubi
package-manager-url: https://formulae.brew.sh/formula/ubi
version: 0.9.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Universal Binary Installer
source-archive: https://github.com/houseabsolute/ubi/archive/refs/tags/v0.9.0.tar.gz
dependencies:
  - xz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: ubi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ubi
  brew: brew install ubi
  winget: winget install --id houseabsolute.ubi -e
provenance:
  formula: ubi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
