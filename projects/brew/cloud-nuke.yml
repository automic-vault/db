id: brew:cloud-nuke
display-name: cloud-nuke
homepage: https://gruntwork.io/
repo: https://github.com/gruntwork-io/cloud-nuke
docs: https://gruntwork.io/
package-manager:
  brew: cloud-nuke
  nix: cloud-nuke
  scoop: main/cloud-nuke
  winget: Gruntwork.cloud-nuke
package-manager-url: https://formulae.brew.sh/formula/cloud-nuke
version: 0.50.0
license: MIT
category: cloud
tags:
  - cli
  - cloud
description: CLI tool to nuke (delete) cloud resources
source-archive: https://github.com/gruntwork-io/cloud-nuke/archive/refs/tags/v0.50.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: cloud-nuke
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cloud-nuke
  brew: brew install cloud-nuke
  nix: nix profile install nixpkgs#cloud-nuke
  scoop: scoop install main/cloud-nuke
  winget: winget install --id Gruntwork.cloud-nuke -e
provenance:
  formula: cloud-nuke
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
