id: brew:dolt
display-name: dolt
homepage: https://github.com/dolthub/dolt
repo: https://github.com/dolthub/dolt
docs: https://github.com/dolthub/dolt
package-manager:
  apk: dolt
  brew: dolt
  chocolatey: dolt
  macports: dolt
  nix: dolt
  pacman: dolt
  scoop: main/dolt
  winget: DoltHub.Dolt
package-manager-url: https://formulae.brew.sh/formula/dolt
version: 2.0.7
license: Apache-2.0
category: development
tags:
  - cli
  - git
description: Git for Data
source-archive: https://github.com/dolthub/dolt/archive/refs/tags/v2.0.7.tar.gz
dependencies:
  - icu4c@78
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dolt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add dolt
  av: sudo av install brew:dolt
  brew: brew install dolt
  chocolatey: choco install dolt
  macports: sudo port install dolt
  nix: nix profile install nixpkgs#dolt
  pacman: sudo pacman -S dolt
  scoop: scoop install main/dolt
  winget: winget install --id DoltHub.Dolt -e
provenance:
  formula: dolt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
