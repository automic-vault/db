id: brew:ludusavi
display-name: ludusavi
homepage: https://github.com/mtkennerly/ludusavi
repo: https://github.com/mtkennerly/ludusavi
docs: https://github.com/mtkennerly/ludusavi
package-manager:
  brew: ludusavi
  nix: ludusavi
  scoop: extras/ludusavi
  winget: mtkennerly.ludusavi
package-manager-url: https://formulae.brew.sh/formula/ludusavi
version: 0.31.0
license: MIT
category: development
tags:
  - cli
description: Backup tool for PC game saves
source-archive: https://github.com/mtkennerly/ludusavi/archive/refs/tags/v0.31.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: ludusavi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ludusavi
  brew: brew install ludusavi
  nix: nix profile install nixpkgs#ludusavi
  scoop: scoop install extras/ludusavi
  winget: winget install --id mtkennerly.ludusavi -e
provenance:
  formula: ludusavi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
