id: brew:tokei
display-name: tokei
homepage: https://github.com/XAMPPRocky/tokei
repo: https://github.com/XAMPPRocky/tokei
docs: https://github.com/XAMPPRocky/tokei
package-manager:
  apk: tokei
  brew: tokei
  debian: tokei
  dnf: tokei
  macports: tokei
  nix: tokei
  pacman: tokei
  scoop: main/tokei
  winget: XAMPPRocky.Tokei
  zypper: tokei
package-manager-url: https://formulae.brew.sh/formula/tokei
version: 14.0.0
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Program that allows you to count code, quickly
source-archive: https://github.com/XAMPPRocky/tokei/archive/refs/tags/v14.0.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tokei
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tokei
  av: sudo av install brew:tokei
  brew: brew install tokei
  debian: sudo apt install tokei
  dnf: sudo dnf install tokei
  macports: sudo port install tokei
  nix: nix profile install nixpkgs#tokei
  pacman: sudo pacman -S tokei
  scoop: scoop install main/tokei
  winget: winget install --id XAMPPRocky.Tokei -e
  zypper: sudo zypper install tokei
provenance:
  formula: tokei
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
