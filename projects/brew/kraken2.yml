id: brew:kraken2
display-name: kraken2
homepage: https://github.com/DerrickWood/kraken2
repo: https://github.com/DerrickWood/kraken2
docs: https://github.com/DerrickWood/kraken2
package-manager:
  apk: k2
  brew: kraken2
  debian: kraken2
  ubuntu: kraken2
package-manager-url: https://formulae.brew.sh/formula/kraken2
version: 2.17.1
license: MIT
category: development
tags:
  - cli
description: Taxonomic sequence classification system
source-archive: https://github.com/DerrickWood/kraken2/archive/refs/tags/v2.17.1.tar.gz
dependencies:
  - gperftools
  - libomp
  - python@3.14
  - wget
uses-from-macos:
  - perl
  - rsync
executables:
  - exposure: global executable
    kind: cli
    name: k2
  - exposure: global executable
    kind: cli
    name: kraken2
  - exposure: global executable
    kind: cli
    name: kraken2-build
  - exposure: global executable
    kind: cli
    name: kraken2-inspect
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add k2
  av: sudo av install brew:kraken2
  brew: brew install kraken2
  debian: sudo apt install kraken2
  ubuntu: sudo apt install kraken2
provenance:
  formula: kraken2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
