id: brew:ipcalc
display-name: ipcalc
homepage: https://jodies.de/ipcalc
repo: https://github.com/kjokjo/ipcalc
docs: https://jodies.de/ipcalc
package-manager:
  apk: ipcalc
  brew: ipcalc
  debian: ipcalc
  dnf: ipcalc
  macports: ipcalc
  nix: ipcalc
  pacman: ipcalc
  scoop: main/ipcalc
  ubuntu: ipcalc
  zypper: ipcalc
package-manager-url: https://formulae.brew.sh/formula/ipcalc
version: 0.51
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Calculate various network masks, etc. from a given IP address
source-archive: https://github.com/kjokjo/ipcalc/archive/refs/tags/0.51.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: ipcalc
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ipcalc
  av: sudo av install brew:ipcalc
  brew: brew install ipcalc
  debian: sudo apt install ipcalc
  dnf: sudo dnf install ipcalc
  macports: sudo port install ipcalc
  nix: nix profile install nixpkgs#ipcalc
  pacman: sudo pacman -S ipcalc
  scoop: scoop install main/ipcalc
  ubuntu: sudo apt install ipcalc
  zypper: sudo zypper install ipcalc
provenance:
  formula: ipcalc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
