id: brew:podofo
display-name: podofo
homepage: https://github.com/podofo/podofo
repo: https://github.com/podofo/podofo
docs: https://github.com/podofo/podofo
package-manager:
  apk: podofo
  brew: podofo
  dnf: podofo
  macports: podofo
  nix: podofo
  pacman: podofo
package-manager-url: https://formulae.brew.sh/formula/podofo
version: 1.1.0
license: >
  (LGPL-2.0-or-later OR MPL-2.0) AND GPL-2.0-or-later AND Apache-2.0 AND MIT AND
  ((LGPL-2.0-or-later WITH cryptsetup-OpenSSL-exception) OR MPL-2.0)
category: development
tags:
  - cli
description: Library to work with the PDF file format
source-archive: https://github.com/podofo/podofo/archive/refs/tags/1.1.0.tar.gz
dependencies:
  - fontconfig
  - freetype
  - jpeg-turbo
  - libpng
  - libtiff
  - openssl@3
build-dependencies:
  - cmake
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: podofobox
  - exposure: global executable
    kind: cli
    name: podofocolor
  - exposure: global executable
    kind: cli
    name: podofocountpages
  - exposure: global executable
    kind: cli
    name: podofocrop
  - exposure: global executable
    kind: cli
    name: podofoencrypt
  - exposure: global executable
    kind: cli
    name: podofogc
  - exposure: global executable
    kind: cli
    name: podofoimg2pdf
  - exposure: global executable
    kind: cli
    name: podofoimgextract
  - exposure: global executable
    kind: cli
    name: podofoimpose
  - exposure: global executable
    kind: cli
    name: podofoincrementalupdates
  - exposure: global executable
    kind: cli
    name: podofomerge
  - exposure: global executable
    kind: cli
    name: podofonooc
  - exposure: global executable
    kind: cli
    name: podofopages
  - exposure: global executable
    kind: cli
    name: podofopdfinfo
  - exposure: global executable
    kind: cli
    name: podofosign
  - exposure: global executable
    kind: cli
    name: podofotxt2pdf
  - exposure: global executable
    kind: cli
    name: podofotxtextract
  - exposure: global executable
    kind: cli
    name: podofouncompress
  - exposure: global executable
    kind: cli
    name: podofoxmp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add podofo
  av: sudo av install brew:podofo
  brew: brew install podofo
  dnf: sudo dnf install podofo
  macports: sudo port install podofo
  nix: nix profile install nixpkgs#podofo
  pacman: sudo pacman -S podofo
provenance:
  formula: podofo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
