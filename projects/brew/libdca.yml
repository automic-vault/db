id: brew:libdca
display-name: libdca
homepage: https://www.videolan.org/developers/libdca.html
repo: https://download.videolan.org/pub/videolan/libdca/0.0.7/libdca-0.0.7.tar.bz2
docs: https://www.videolan.org/developers/libdca.html
package-manager:
  apk: dcadec
  brew: libdca
  dnf: libdca
  macports: libdca
  nix: dcadec
  pacman: libdca
package-manager-url: https://formulae.brew.sh/formula/libdca
version: 0.0.7
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Library for decoding DTS Coherent Acoustics streams
source-archive: https://download.videolan.org/pub/videolan/libdca/0.0.7/libdca-0.0.7.tar.bz2
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: dcadec
  - exposure: global executable
    kind: cli
    name: dtsdec
  - exposure: global executable
    kind: cli
    name: extract_dca
  - exposure: global executable
    kind: cli
    name: extract_dts
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dcadec
  av: sudo av install brew:libdca
  brew: brew install libdca
  dnf: sudo dnf install libdca
  macports: sudo port install libdca
  nix: nix profile install nixpkgs#dcadec
  pacman: sudo pacman -S libdca
provenance:
  formula: libdca
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
