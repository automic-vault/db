id: brew:heartbeat
display-name: heartbeat
homepage: https://www.elastic.co/beats/heartbeat
repo: https://github.com/elastic/beats
docs: https://www.elastic.co/beats/heartbeat
package-manager:
  brew: heartbeat
  debian: heartbeat
  nix: heartbeat
  ubuntu: heartbeat
  winget: HeartbeatChat.Heartbeat
package-manager-url: https://formulae.brew.sh/formula/heartbeat
version: 9.4.1
license: Apache-2.0
category: development
tags:
  - cli
description: Lightweight Shipper for Uptime Monitoring
source-archive: https://github.com/elastic/beats.git
build-dependencies:
  - go
  - mage
executables:
  - exposure: global executable
    kind: cli
    name: heartbeat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:heartbeat
  brew: brew install heartbeat
  debian: sudo apt install heartbeat
  nix: nix profile install nixpkgs#heartbeat
  ubuntu: sudo apt install heartbeat
  winget: winget install --id HeartbeatChat.Heartbeat -e
provenance:
  formula: heartbeat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
