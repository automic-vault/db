id: brew:nmstatectl
display-name: nmstatectl
homepage: https://nmstate.io/
repo: https://github.com/nmstate/nmstate
docs: https://nmstate.io/
package-manager:
  brew: nmstatectl
package-manager-url: https://formulae.brew.sh/formula/nmstatectl
version: 2.2.60
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool that manages host networking settings in a declarative manner
source-archive: https://github.com/nmstate/nmstate/releases/download/v2.2.60/nmstate-2.2.60.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: nmstatectl
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nmstatectl
  brew: brew install nmstatectl
provenance:
  formula: nmstatectl
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
