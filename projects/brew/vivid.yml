id: brew:vivid
display-name: vivid
homepage: https://github.com/sharkdp/vivid
repo: https://github.com/sharkdp/vivid
docs: https://github.com/sharkdp/vivid
package-manager:
  apk: vivid
  brew: vivid
  debian: vivid
  macports: vivid
  nix: vivid
  pacman: vivid
  scoop: main/vivid
  ubuntu: vivid
  winget: sharkdp.vivid
package-manager-url: https://formulae.brew.sh/formula/vivid
version: 0.11.1
license: MIT OR Apache-2.0
category: development
tags:
  - cli
description: Generator for LS_COLORS with support for multiple color themes
source-archive: https://github.com/sharkdp/vivid/archive/refs/tags/v0.11.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: vivid
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add vivid
  av: sudo av install brew:vivid
  brew: brew install vivid
  debian: sudo apt install vivid
  macports: sudo port install vivid
  nix: nix profile install nixpkgs#vivid
  pacman: sudo pacman -S vivid
  scoop: scoop install main/vivid
  ubuntu: sudo apt install vivid
  winget: winget install --id sharkdp.vivid -e
provenance:
  formula: vivid
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
