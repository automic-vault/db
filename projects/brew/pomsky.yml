id: brew:pomsky
display-name: pomsky
homepage: https://pomsky-lang.org/
repo: https://github.com/pomsky-lang/pomsky
docs: https://pomsky-lang.org/
package-manager:
  brew: pomsky
  nix: pomsky
  scoop: main/pomsky
package-manager-url: https://formulae.brew.sh/formula/pomsky
version: 0.12
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Regular expression language
source-archive: https://github.com/pomsky-lang/pomsky/archive/refs/tags/v0.12.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: pomsky
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pomsky
  brew: brew install pomsky
  nix: nix profile install nixpkgs#pomsky
  scoop: scoop install main/pomsky
provenance:
  formula: pomsky
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
