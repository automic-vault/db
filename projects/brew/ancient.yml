id: brew:ancient
display-name: ancient
homepage: https://github.com/temisu/ancient
repo: https://github.com/temisu/ancient
docs: https://github.com/temisu/ancient
package-manager:
  brew: ancient
  debian: ancient
  dnf: ancient
  macports: ancient
  ubuntu: ancient
  zypper: ancient
package-manager-url: https://formulae.brew.sh/formula/ancient
version: 2.3.0
license: BSD-2-Clause
category: development
tags:
  - cli
description: Decompression routines for ancient formats
source-archive: https://github.com/temisu/ancient/archive/refs/tags/v2.3.0.tar.gz
build-dependencies:
  - autoconf
  - autoconf-archive
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ancient
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ancient
  brew: brew install ancient
  debian: sudo apt install ancient
  dnf: sudo dnf install ancient
  macports: sudo port install ancient
  ubuntu: sudo apt install ancient
  zypper: sudo zypper install ancient
provenance:
  formula: ancient
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
