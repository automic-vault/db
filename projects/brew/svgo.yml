id: brew:svgo
display-name: svgo
homepage: https://svgo.dev/
repo: https://github.com/svg/svgo
docs: https://svgo.dev/
package-manager:
  brew: svgo
  nix: svgo
  pacman: svgo
package-manager-url: https://formulae.brew.sh/formula/svgo
version: 4.0.1
license: MIT
category: development
tags:
  - cli
description: Nodejs-based tool for optimizing SVG vector graphics files
source-archive: https://github.com/svg/svgo/archive/refs/tags/v4.0.1.tar.gz
dependencies:
  - node
executables:
  - exposure: global executable
    kind: cli
    name: svgo
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:svgo
  brew: brew install svgo
  nix: nix profile install nixpkgs#svgo
  pacman: sudo pacman -S svgo
provenance:
  formula: svgo
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
