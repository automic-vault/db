id: brew:git-quick-stats
display-name: git-quick-stats
homepage: https://git-quick-stats.sh/
repo: https://github.com/git-quick-stats/git-quick-stats
docs: https://git-quick-stats.sh/
package-manager:
  apk: git-quick-stats
  brew: git-quick-stats
  debian: git-quick-stats
  nix: git-quick-stats
  scoop: main/git-quick-stats
  ubuntu: git-quick-stats
package-manager-url: https://formulae.brew.sh/formula/git-quick-stats
version: 2.11.0
license: MIT
category: development
tags:
  - cli
  - git
description: Simple and efficient way to access statistics in git
source-archive: https://github.com/git-quick-stats/git-quick-stats/archive/refs/tags/2.11.0.tar.gz
dependencies:
  - coreutils
executables:
  - exposure: global executable
    kind: cli
    name: git-quick-stats
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add git-quick-stats
  av: sudo av install brew:git-quick-stats
  brew: brew install git-quick-stats
  debian: sudo apt install git-quick-stats
  nix: nix profile install nixpkgs#git-quick-stats
  scoop: scoop install main/git-quick-stats
  ubuntu: sudo apt install git-quick-stats
provenance:
  formula: git-quick-stats
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
