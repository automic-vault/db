id: brew:termscp
display-name: termscp
homepage: https://github.com/veeso/termscp
repo: https://github.com/veeso/termscp
docs: https://github.com/veeso/termscp
package-manager:
  brew: termscp
  macports: termscp
  nix: termscp
  pacman: termscp
  scoop: main/termscp
  zypper: termscp
package-manager-url: https://formulae.brew.sh/formula/termscp
version: 1.0.0
license: MIT
category: development
tags:
  - cli
description: Feature rich terminal file transfer and explorer
source-archive: https://github.com/veeso/termscp/archive/refs/tags/v1.0.0.tar.gz
dependencies:
  - openssl@3
  - samba
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: termscp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:termscp
  brew: brew install termscp
  macports: sudo port install termscp
  nix: nix profile install nixpkgs#termscp
  pacman: sudo pacman -S termscp
  scoop: scoop install main/termscp
  zypper: sudo zypper install termscp
provenance:
  formula: termscp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
