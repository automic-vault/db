id: brew:nuget
display-name: nuget
homepage: https://www.nuget.org/
repo: https://dist.nuget.org/win-x86-commandline/v7.6.0/nuget.exe
docs: https://www.nuget.org/
package-manager:
  brew: nuget
  dnf: nuget
  nix: nuget
  pacman: nuget
  scoop: main/nuget
  winget: Microsoft.NuGet
package-manager-url: https://formulae.brew.sh/formula/nuget
version: 7.6.0
license: MIT
category: network
tags:
  - cli
description: Package manager for Microsoft development platform including .NET
source-archive: https://dist.nuget.org/win-x86-commandline/v7.6.0/nuget.exe
dependencies:
  - mono
executables:
  - exposure: global executable
    kind: cli
    name: nuget
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nuget
  brew: brew install nuget
  dnf: sudo dnf install nuget
  nix: nix profile install nixpkgs#nuget
  pacman: sudo pacman -S nuget
  scoop: scoop install main/nuget
  winget: winget install --id Microsoft.NuGet -e
provenance:
  formula: nuget
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
