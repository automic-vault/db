id: brew:hawkeye
display-name: hawkeye
homepage: https://github.com/korandoru/hawkeye
repo: https://github.com/korandoru/hawkeye
docs: https://github.com/korandoru/hawkeye
package-manager:
  brew: hawkeye
  nix: hawkeye
  pacman: hawkeye
package-manager-url: https://formulae.brew.sh/formula/hawkeye
version: 6.5.1
license: Apache-2.0
category: development
tags:
  - cli
description: Simple license header checker and formatter, in multiple distribution forms
source-archive: https://github.com/korandoru/hawkeye/archive/refs/tags/v6.5.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: hawkeye
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hawkeye
  brew: brew install hawkeye
  nix: nix profile install nixpkgs#hawkeye
  pacman: sudo pacman -S hawkeye
provenance:
  formula: hawkeye
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
