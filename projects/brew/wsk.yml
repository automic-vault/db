id: brew:wsk
display-name: wsk
homepage: https://openwhisk.apache.org/
repo: https://github.com/apache/openwhisk-cli
docs: https://openwhisk.apache.org/
package-manager:
  brew: wsk
package-manager-url: https://formulae.brew.sh/formula/wsk
version: 1.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: OpenWhisk Command-Line Interface (CLI)
source-archive: https://github.com/apache/openwhisk-cli/archive/refs/tags/1.2.0.tar.gz
build-dependencies:
  - go
  - go-bindata
executables:
  - exposure: global executable
    kind: cli
    name: wsk
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:wsk
  brew: brew install wsk
provenance:
  formula: wsk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
