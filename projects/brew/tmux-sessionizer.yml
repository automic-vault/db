id: brew:tmux-sessionizer
display-name: tmux-sessionizer
homepage: https://github.com/jrmoulton/tmux-sessionizer/
repo: https://github.com/jrmoulton/tmux-sessionizer
docs: https://github.com/jrmoulton/tmux-sessionizer/
package-manager:
  brew: tmux-sessionizer
  nix: tmux-sessionizer
package-manager-url: https://formulae.brew.sh/formula/tmux-sessionizer
version: 0.6.0
license: MIT
category: development
tags:
  - cli
  - git
description: Tool for opening git repositories as tmux sessions
source-archive: https://github.com/jrmoulton/tmux-sessionizer/archive/refs/tags/v0.6.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: tms
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tmux-sessionizer
  brew: brew install tmux-sessionizer
  nix: nix profile install nixpkgs#tmux-sessionizer
provenance:
  formula: tmux-sessionizer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
