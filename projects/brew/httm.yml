id: brew:httm
display-name: httm
homepage: https://github.com/kimono-koans/httm
repo: https://github.com/kimono-koans/httm
docs: https://github.com/kimono-koans/httm
package-manager:
  apk: httm
  brew: httm
  nix: httm
package-manager-url: https://formulae.brew.sh/formula/httm
version: 0.49.9
license: MPL-2.0
category: development
