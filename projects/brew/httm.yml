    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add httm
  av: sudo av install brew:httm
  brew: brew install httm
  nix: nix profile install nixpkgs#httm
provenance:
  formula: httm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
