id: brew:ncompress
display-name: ncompress
homepage: https://vapier.github.io/ncompress/
repo: https://github.com/vapier/ncompress
docs: https://vapier.github.io/ncompress/
package-manager:
  brew: ncompress
  debian: ncompress
  dnf: ncompress
  macports: ncompress
  nix: ncompress
  pacman: ncompress
  ubuntu: ncompress
  zypper: ncompress
package-manager-url: https://formulae.brew.sh/formula/ncompress
version: 5.0
license: Unlicense
category: development
tags:
  - cli
description: Fast, simple LZW file compressor
source-archive: https://github.com/vapier/ncompress/archive/refs/tags/v5.0.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: compress
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ncompress
  brew: brew install ncompress
  debian: sudo apt install ncompress
  dnf: sudo dnf install ncompress
  macports: sudo port install ncompress
  nix: nix profile install nixpkgs#ncompress
  pacman: sudo pacman -S ncompress
  ubuntu: sudo apt install ncompress
  zypper: sudo zypper install ncompress
provenance:
  formula: ncompress
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
