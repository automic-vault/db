id: brew:oasis
display-name: oasis
homepage: https://github.com/oasisprotocol/cli
repo: https://github.com/oasisprotocol/cli
docs: https://github.com/oasisprotocol/cli
package-manager:
  brew: oasis
  debian: oasis
  ubuntu: oasis
package-manager-url: https://formulae.brew.sh/formula/oasis
version: 0.19.0
license: Apache-2.0
category: development
tags:
  - cli
description: CLI for interacting with the Oasis Protocol network
source-archive: https://github.com/oasisprotocol/cli/archive/refs/tags/v0.19.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: oasis
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oasis
  brew: brew install oasis
  debian: sudo apt install oasis
  ubuntu: sudo apt install oasis
provenance:
  formula: oasis
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
