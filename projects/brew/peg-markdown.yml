id: brew:peg-markdown
display-name: peg-markdown
homepage: https://github.com/jgm/peg-markdown
repo: https://github.com/jgm/peg-markdown
docs: https://github.com/jgm/peg-markdown
package-manager:
  brew: peg-markdown
package-manager-url: https://formulae.brew.sh/formula/peg-markdown
version: 0.4.14
license: GPL-2.0-or-later OR MIT
category: development
tags:
  - cli
description: Markdown implementation based on a PEG grammar
source-archive: https://github.com/jgm/peg-markdown/archive/refs/tags/0.4.14.tar.gz
dependencies:
  - gettext
  - glib
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: peg-markdown
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:peg-markdown
  brew: brew install peg-markdown
provenance:
  formula: peg-markdown
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
