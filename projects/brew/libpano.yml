id: brew:libpano
display-name: libpano
homepage: https://panotools.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/panotools/libpano13/libpano13-2.9.23/libpano13-2.9.23.tar.gz
docs: https://panotools.sourceforge.net/
package-manager:
  brew: libpano
package-manager-url: https://formulae.brew.sh/formula/libpano
version: 2.9.23
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Build panoramic images from a set of overlapping images
source-archive: >
  https://downloads.sourceforge.net/project/panotools/libpano13/libpano13-2.9.23/libpano13-2.9.23.tar.gz
dependencies:
  - jpeg-turbo
  - libpng
  - libtiff
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: PTblender
  - exposure: global executable
    kind: cli
    name: PTcrop
  - exposure: global executable
    kind: cli
    name: PTinfo
  - exposure: global executable
    kind: cli
    name: PTmasker
  - exposure: global executable
    kind: cli
    name: PTmender
  - exposure: global executable
    kind: cli
    name: PToptimizer
  - exposure: global executable
    kind: cli
    name: PTroller
  - exposure: global executable
    kind: cli
    name: PTtiff2psd
  - exposure: global executable
    kind: cli
    name: PTtiffdump
  - exposure: global executable
    kind: cli
    name: PTuncrop
  - exposure: global executable
    kind: cli
    name: panoinfo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libpano
  brew: brew install libpano
provenance:
  formula: libpano
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
