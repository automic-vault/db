id: brew:dhcping
display-name: dhcping
homepage: http://www.mavetju.org/unix/general.php
repo: https://deb.debian.org/debian/pool/main/d/dhcping/dhcping_1.2.orig.tar.gz
docs: http://www.mavetju.org/unix/general.php
package-manager:
  apk: dhcping
  brew: dhcping
  debian: dhcping
  macports: dhcping
  nix: dhcping
  pacman: dhcping
  ubuntu: dhcping
package-manager-url: https://formulae.brew.sh/formula/dhcping
version: 1.2
license: BSD-2-Clause
category: network
tags:
  - cli
description: Perform a dhcp-request to check whether a dhcp-server is running
source-archive: https://deb.debian.org/debian/pool/main/d/dhcping/dhcping_1.2.orig.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: dhcping
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dhcping
  av: sudo av install brew:dhcping
  brew: brew install dhcping
  debian: sudo apt install dhcping
  macports: sudo port install dhcping
  nix: nix profile install nixpkgs#dhcping
  pacman: sudo pacman -S dhcping
  ubuntu: sudo apt install dhcping
provenance:
  formula: dhcping
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
