id: brew:ask-cli
display-name: ask-cli
homepage: https://github.com/alexa/ask-cli
repo: https://registry.npmjs.org/ask-cli/-/ask-cli-2.30.7.tgz
docs: https://github.com/alexa/ask-cli
package-manager:
  brew: ask-cli
package-manager-url: https://formulae.brew.sh/formula/ask-cli
version: 2.30.7
license: Apache-2.0
category: development
tags:
