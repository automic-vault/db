id: brew:pex
display-name: pex
homepage: https://github.com/petere/pex
repo: https://github.com/petere/pex
docs: https://github.com/petere/pex
package-manager:
  brew: pex
  debian: pex
  ubuntu: pex
package-manager-url: https://formulae.brew.sh/formula/pex
version: 1.20140409
license: MIT
category: database
tags:
  - cli
description: Package manager for PostgreSQL
source-archive: https://github.com/petere/pex/archive/refs/tags/1.20140409.tar.gz
dependencies:
  - libpq
executables:
  - exposure: global executable
    kind: cli
    name: pex
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    If installing for the first time, perform the following in order to setup the
    necessary directory structure: pex init
  post-install-defined: false
install-lines:
  av: sudo av install brew:pex
  brew: brew install pex
  debian: sudo apt install pex
  ubuntu: sudo apt install pex
provenance:
  formula: pex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
