id: brew:ninvaders
display-name: ninvaders
homepage: https://ninvaders.sourceforge.net/
repo: >
  https://downloads.sourceforge.net/project/ninvaders/ninvaders/0.1.1/ninvaders-0.1.1.tar.gz
docs: https://ninvaders.sourceforge.net/
package-manager:
  brew: ninvaders
  debian: ninvaders
  nix: ninvaders
  ubuntu: ninvaders
  zypper: ninvaders
package-manager-url: https://formulae.brew.sh/formula/ninvaders
version: 0.1.1
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Space Invaders in the terminal
source-archive: >
  https://downloads.sourceforge.net/project/ninvaders/ninvaders/0.1.1/ninvaders-0.1.1.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: nInvaders
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ninvaders
  brew: brew install ninvaders
  debian: sudo apt install ninvaders
  nix: nix profile install nixpkgs#ninvaders
  ubuntu: sudo apt install ninvaders
  zypper: sudo zypper install ninvaders
provenance:
  formula: ninvaders
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
