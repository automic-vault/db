id: brew:dtc
display-name: dtc
homepage: https://git.kernel.org/pub/scm/utils/dtc/dtc.git
repo: https://mirrors.edge.kernel.org/pub/software/utils/dtc/dtc-1.8.0.tar.xz
docs: https://git.kernel.org/pub/scm/utils/dtc/dtc.git
package-manager:
  apk: dtc
  brew: dtc
  dnf: dtc
  macports: dtc
  nix: dtc
  pacman: dtc
  winget: oss-winget.dtc
  zypper: dtc
package-manager-url: https://formulae.brew.sh/formula/dtc
version: 1.8.0
license: GPL-2.0-or-later OR BSD-2-Clause
category: development
tags:
  - cli
description: Device tree compiler
source-archive: https://mirrors.edge.kernel.org/pub/software/utils/dtc/dtc-1.8.0.tar.xz
dependencies:
  - libyaml
build-dependencies:
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: convert-dtsv0
  - exposure: global executable
    kind: cli
    name: dtc
  - exposure: global executable
    kind: cli
    name: dtdiff
  - exposure: global executable
    kind: cli
    name: fdtdump
  - exposure: global executable
    kind: cli
    name: fdtget
  - exposure: global executable
    kind: cli
    name: fdtoverlay
  - exposure: global executable
    kind: cli
    name: fdtput
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add dtc
  av: sudo av install brew:dtc
  brew: brew install dtc
  dnf: sudo dnf install dtc
  macports: sudo port install dtc
  nix: nix profile install nixpkgs#dtc
  pacman: sudo pacman -S dtc
  winget: winget install --id oss-winget.dtc -e
  zypper: sudo zypper install dtc
provenance:
  formula: dtc
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
