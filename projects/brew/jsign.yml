id: brew:jsign
display-name: jsign
homepage: https://ebourg.github.io/jsign/
repo: https://github.com/ebourg/jsign
docs: https://ebourg.github.io/jsign/
package-manager:
  brew: jsign
  nix: jsign
  scoop: main/jsign
package-manager-url: https://formulae.brew.sh/formula/jsign
version: 7.4
license: Apache-2.0
category: development
tags:
  - cli
description: Tool for signing Windows executable files, installers and scripts
source-archive: https://github.com/ebourg/jsign/archive/refs/tags/7.4.tar.gz
dependencies:
  - openjdk@21
build-dependencies:
  - maven
executables:
  - exposure: global executable
    kind: cli
    name: jsign
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:jsign
  brew: brew install jsign
  nix: nix profile install nixpkgs#jsign
  scoop: scoop install main/jsign
provenance:
  formula: jsign
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
