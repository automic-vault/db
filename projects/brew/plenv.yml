id: brew:plenv
display-name: plenv
homepage: https://github.com/tokuhirom/plenv
repo: https://github.com/tokuhirom/plenv
docs: https://github.com/tokuhirom/plenv
package-manager:
  brew: plenv
package-manager-url: https://formulae.brew.sh/formula/plenv
version: 2.3.1
license: Artistic-1.0-Perl OR GPL-1.0-or-later
category: development
tags:
  - cli
description: Perl binary manager
source-archive: https://github.com/tokuhirom/plenv/archive/refs/tags/2.3.1.tar.gz
dependencies:
  - perl-build
executables:
  - exposure: global executable
    kind: cli
    name: plenv
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To enable shims add to your profile: if which plenv > /dev/null; then eval "$(plenv
    init -)"; fi With zsh, add to your .zshrc: if which plenv > /dev/null; then eval
    "$(plenv init - zsh)"; fi With fish, add to your config.fish if plenv > /dev/null;
    plenv init - | source ; end
  post-install-defined: false
install-lines:
  av: sudo av install brew:plenv
  brew: brew install plenv
provenance:
  formula: plenv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
