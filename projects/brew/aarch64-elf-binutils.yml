id: brew:aarch64-elf-binutils
display-name: aarch64-elf-binutils
homepage: https://www.gnu.org/software/binutils/
repo: https://ftpmirror.gnu.org/gnu/binutils/binutils-2.46.0.tar.bz2
docs: https://www.gnu.org/software/binutils/
package-manager:
  brew: aarch64-elf-binutils
  macports: aarch64-elf-binutils
package-manager-url: https://formulae.brew.sh/formula/aarch64-elf-binutils
version: 2.46.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU Binutils for aarch64-elf cross development
source-archive: https://ftpmirror.gnu.org/gnu/binutils/binutils-2.46.0.tar.bz2
dependencies:
  - zstd
build-dependencies:
  - pkgconf
  - texinfo
executables:
  - exposure: global executable
    kind: cli
    name: aarch64-elf-addr2line
  - exposure: global executable
    kind: cli
    name: aarch64-elf-ar
  - exposure: global executable
    kind: cli
    name: aarch64-elf-as
  - exposure: global executable
    kind: cli
    name: aarch64-elf-c++filt
  - exposure: global executable
    kind: cli
    name: aarch64-elf-elfedit
  - exposure: global executable
    kind: cli
    name: aarch64-elf-gprof
  - exposure: global executable
    kind: cli
    name: aarch64-elf-ld
  - exposure: global executable
    kind: cli
    name: aarch64-elf-ld.bfd
  - exposure: global executable
    kind: cli
    name: aarch64-elf-nm
  - exposure: global executable
    kind: cli
    name: aarch64-elf-objcopy
  - exposure: global executable
    kind: cli
    name: aarch64-elf-objdump
  - exposure: global executable
    kind: cli
    name: aarch64-elf-ranlib
  - exposure: global executable
    kind: cli
    name: aarch64-elf-readelf
  - exposure: global executable
    kind: cli
    name: aarch64-elf-size
  - exposure: global executable
    kind: cli
    name: aarch64-elf-strings
  - exposure: global executable
    kind: cli
    name: aarch64-elf-strip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:aarch64-elf-binutils
  brew: brew install aarch64-elf-binutils
  macports: sudo port install aarch64-elf-binutils
provenance:
  formula: aarch64-elf-binutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
