id: brew:goawk
display-name: goawk
homepage: https://benhoyt.com/writings/goawk/
repo: https://github.com/benhoyt/goawk
docs: https://benhoyt.com/writings/goawk/
package-manager:
  apk: goawk
  brew: goawk
  debian: goawk
  macports: goawk
  nix: goawk
package-manager-url: https://formulae.brew.sh/formula/goawk
version: 1.31.0
license: MIT
category: development
tags:
  - cli
description: POSIX-compliant AWK interpreter written in Go
source-archive: https://github.com/benhoyt/goawk/archive/refs/tags/v1.31.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: goawk
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add goawk
  av: sudo av install brew:goawk
  brew: brew install goawk
  debian: sudo apt install goawk
  macports: sudo port install goawk
  nix: nix profile install nixpkgs#goawk
provenance:
  formula: goawk
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
