id: brew:nzbget
display-name: nzbget
homepage: https://nzbget.com
repo: https://github.com/nzbgetcom/nzbget
docs: https://nzbget.com
package-manager:
  apk: nzbget
  brew: nzbget
  debian: nzbget
  macports: nzbget
  nix: nzbget
  pacman: nzbget
  ubuntu: nzbget
  winget: nzbget.nzbget
package-manager-url: https://formulae.brew.sh/formula/nzbget
version: 26.1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Binary newsgrabber for nzb files
source-archive: https://github.com/nzbgetcom/nzbget/archive/refs/tags/v26.1.tar.gz
dependencies:
  - boost
  - openssl@3
  - sevenzip
build-dependencies:
  - cmake
uses-from-macos:
  - libxml2
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: nzbget
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add nzbget
  av: sudo av install brew:nzbget
  brew: brew install nzbget
  debian: sudo apt install nzbget
  macports: sudo port install nzbget
  nix: nix profile install nixpkgs#nzbget
  pacman: sudo pacman -S nzbget
  ubuntu: sudo apt install nzbget
  winget: winget install --id nzbget.nzbget -e
provenance:
  formula: nzbget
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
