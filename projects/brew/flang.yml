id: brew:flang
display-name: flang
homepage: https://flang.llvm.org/
repo: https://github.com/llvm/llvm-project
docs: https://flang.llvm.org/
package-manager:
  brew: flang
  debian: flang
  dnf: flang
  nix: flang
  ubuntu: flang
package-manager-url: https://formulae.brew.sh/formula/flang
version: 22.1.6
license: Apache-2.0 WITH LLVM-exception
category: development
tags:
  - cli
description: LLVM Fortran Frontend
source-archive: >
  https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.6/llvm-project-22.1.6.src.tar.xz
dependencies:
  - llvm
build-dependencies:
  - cmake
  - ninja
executables:
  - exposure: global executable
    kind: cli
    name: bbc
  - exposure: global executable
    kind: cli
    name: f18-parse-demo
  - exposure: global executable
    kind: cli
    name: fir-lsp-server
  - exposure: global executable
    kind: cli
    name: fir-opt
  - exposure: global executable
    kind: cli
    name: flang
  - exposure: global executable
    kind: cli
    name: flang-22
  - exposure: global executable
    kind: cli
    name: flang-new
  - exposure: global executable
    kind: cli
    name: tco
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:flang
  brew: brew install flang
  debian: sudo apt install flang
  dnf: sudo dnf install flang
  nix: nix profile install nixpkgs#flang
  ubuntu: sudo apt install flang
provenance:
  formula: flang
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
