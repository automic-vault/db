id: brew:curlpp
display-name: curlpp
homepage: https://www.curlpp.org/
repo: https://github.com/jpbarrette/curlpp
docs: https://www.curlpp.org/
package-manager:
  brew: curlpp
  dnf: curlpp
  nix: curlpp
package-manager-url: https://formulae.brew.sh/formula/curlpp
version: 0.8.1
license: MIT
category: development
tags:
  - cli
description: C++ wrapper for libcURL
source-archive: https://github.com/jpbarrette/curlpp/archive/refs/tags/v0.8.1.tar.gz
build-dependencies:
  - cmake
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: curlpp-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:curlpp
  brew: brew install curlpp
  dnf: sudo dnf install curlpp
  nix: nix profile install nixpkgs#curlpp
provenance:
  formula: curlpp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
