id: brew:traildb
display-name: traildb
homepage: https://traildb.io/
repo: https://github.com/traildb/traildb
docs: https://traildb.io/
package-manager:
  apk: tdb
  brew: traildb
  macports: tdb
  nix: tdb
  pacman: tdb
package-manager-url: https://formulae.brew.sh/formula/traildb
version: 0.6
license: MIT
category: database
tags:
  - cli
  - database
description: Blazingly-fast database for log-structured data
source-archive: https://github.com/traildb/traildb/archive/refs/tags/0.6.tar.gz
dependencies:
  - judy
  - libarchive
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: tdb
  - exposure: global executable
    kind: cli
    name: traildb_bench
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add tdb
  av: sudo av install brew:traildb
  brew: brew install traildb
  macports: sudo port install tdb
  nix: nix profile install nixpkgs#tdb
  pacman: sudo pacman -S tdb
provenance:
  formula: traildb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
