id: brew:s5cmd
display-name: s5cmd
homepage: https://github.com/peak/s5cmd/
repo: https://github.com/peak/s5cmd
docs: https://github.com/peak/s5cmd/
package-manager:
  apk: s5cmd
  brew: s5cmd
  macports: s5cmd
  nix: s5cmd
  scoop: main/s5cmd
package-manager-url: https://formulae.brew.sh/formula/s5cmd
version: 2.3.0
license: MIT
category: development
tags:
  - cli
description: Parallel S3 and local filesystem execution tool
source-archive: https://github.com/peak/s5cmd/archive/refs/tags/v2.3.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: s5cmd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add s5cmd
  av: sudo av install brew:s5cmd
  brew: brew install s5cmd
  macports: sudo port install s5cmd
  nix: nix profile install nixpkgs#s5cmd
  scoop: scoop install main/s5cmd
provenance:
  formula: s5cmd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
