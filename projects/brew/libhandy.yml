id: brew:libhandy
display-name: libhandy
homepage: https://gitlab.gnome.org/GNOME/libhandy
repo: https://gitlab.gnome.org/GNOME/libhandy/-/archive/1.8.3/libhandy-1.8.3.tar.gz
docs: https://gitlab.gnome.org/GNOME/libhandy
package-manager:
  brew: libhandy
  dnf: libhandy
  macports: libhandy
  nix: libhandy
  pacman: libhandy
package-manager-url: https://formulae.brew.sh/formula/libhandy
version: 1.8.3
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Building blocks for modern adaptive GNOME apps
source-archive: https://gitlab.gnome.org/GNOME/libhandy/-/archive/1.8.3/libhandy-1.8.3.tar.gz
dependencies:
  - at-spi2-core
  - cairo
  - fribidi
  - gdk-pixbuf
  - gettext
  - glib
  - gtk+3
  - harfbuzz
  - pango
build-dependencies:
  - gettext
  - gobject-introspection
  - meson
  - ninja
  - pkgconf
  - vala
executables:
  - exposure: global executable
    kind: cli
    name: handy-1-demo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libhandy
  brew: brew install libhandy
  dnf: sudo dnf install libhandy
  macports: sudo port install libhandy
  nix: nix profile install nixpkgs#libhandy
  pacman: sudo pacman -S libhandy
provenance:
  formula: libhandy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
