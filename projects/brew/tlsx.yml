id: brew:tlsx
display-name: tlsx
homepage: https://github.com/projectdiscovery/tlsx
repo: https://github.com/projectdiscovery/tlsx
docs: https://github.com/projectdiscovery/tlsx
package-manager:
  brew: tlsx
  nix: tlsx
package-manager-url: https://formulae.brew.sh/formula/tlsx
version: 1.2.2
license: MIT
category: security
tags:
  - cli
description: Fast and configurable TLS grabber focused on TLS based data collection
source-archive: https://github.com/projectdiscovery/tlsx/archive/refs/tags/v1.2.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: tlsx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:tlsx
  brew: brew install tlsx
  nix: nix profile install nixpkgs#tlsx
provenance:
  formula: tlsx
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
