id: brew:s-search
display-name: s-search
homepage: https://github.com/zquestz/s
repo: https://github.com/zquestz/s
docs: https://github.com/zquestz/s
package-manager:
  brew: s-search
  nix: s-search
  scoop: main/s
package-manager-url: https://formulae.brew.sh/formula/s-search
version: 0.7.5
license: MIT
category: development
tags:
  - cli
description: Web search from the terminal
source-archive: https://github.com/zquestz/s/archive/refs/tags/v0.7.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: s
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:s-search
  brew: brew install s-search
  nix: nix profile install nixpkgs#s-search
  scoop: scoop install main/s
provenance:
  formula: s-search
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
