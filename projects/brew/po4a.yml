id: brew:po4a
display-name: po4a
homepage: https://po4a.org
repo: https://github.com/mquinson/po4a
docs: https://po4a.org
package-manager:
  apk: po4a
  brew: po4a
  debian: po4a
  dnf: po4a
  macports: po4a
  nix: po4a
  pacman: po4a
  ubuntu: po4a
  zypper: po4a
package-manager-url: https://formulae.brew.sh/formula/po4a
version: 0.74
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Documentation translation maintenance tool
source-archive: https://github.com/mquinson/po4a/archive/refs/tags/v0.74.tar.gz
dependencies:
  - gettext
build-dependencies:
  - docbook-xsl
uses-from-macos:
  - libxslt
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: msguntypot
  - exposure: global executable
    kind: cli
    name: po4a
  - exposure: global executable
    kind: cli
    name: po4a-display-man
  - exposure: global executable
    kind: cli
    name: po4a-display-pod
  - exposure: global executable
    kind: cli
    name: po4a-gettextize
  - exposure: global executable
    kind: cli
    name: po4a-normalize
  - exposure: global executable
    kind: cli
    name: po4a-translate
  - exposure: global executable
    kind: cli
    name: po4a-updatepo
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add po4a
  av: sudo av install brew:po4a
  brew: brew install po4a
  debian: sudo apt install po4a
  dnf: sudo dnf install po4a
  macports: sudo port install po4a
  nix: nix profile install nixpkgs#po4a
  pacman: sudo pacman -S po4a
  ubuntu: sudo apt install po4a
  zypper: sudo zypper install po4a
provenance:
  formula: po4a
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
