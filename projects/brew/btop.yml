id: brew:btop
display-name: btop
homepage: https://github.com/aristocratos/btop
repo: https://github.com/aristocratos/btop
docs: https://github.com/aristocratos/btop
package-manager:
  apk: btop
  brew: btop
  debian: btop
  dnf: btop
  macports: btop
  nix: btop
  pacman: btop
  scoop: main/btop
  ubuntu: btop
  winget: aristocratos.btop4win
  zypper: btop
package-manager-url: https://formulae.brew.sh/formula/btop
version: 1.4.7
license: Apache-2.0
category: development
tags:
  - cli
description: Resource monitor. C++ version and continuation of bashtop and bpytop
source-archive: https://github.com/aristocratos/btop/archive/refs/tags/v1.4.7.tar.gz
build-dependencies:
  - coreutils
  - lowdown
executables:
  - exposure: global executable
    kind: cli
    name: btop
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add btop
  av: sudo av install brew:btop
  brew: brew install btop
  debian: sudo apt install btop
  dnf: sudo dnf install btop
  macports: sudo port install btop
  nix: nix profile install nixpkgs#btop
  pacman: sudo pacman -S btop
  scoop: scoop install main/btop
  ubuntu: sudo apt install btop
  winget: winget install --id aristocratos.btop4win -e
  zypper: sudo zypper install btop
provenance:
  formula: btop
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
