id: brew:libbtbb
display-name: libbtbb
homepage: https://github.com/greatscottgadgets/libbtbb
repo: https://github.com/greatscottgadgets/libbtbb
docs: https://github.com/greatscottgadgets/libbtbb
package-manager:
  brew: libbtbb
  dnf: libbtbb
  macports: libbtbb
  nix: libbtbb
package-manager-url: https://formulae.brew.sh/formula/libbtbb
version: 2020-12-R1
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Bluetooth baseband decoding library
source-archive: https://github.com/greatscottgadgets/libbtbb/archive/refs/tags/2020-12-R1.tar.gz
dependencies:
  - python@3.14
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: btaptap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:libbtbb
  brew: brew install libbtbb
  dnf: sudo dnf install libbtbb
  macports: sudo port install libbtbb
  nix: nix profile install nixpkgs#libbtbb
provenance:
  formula: libbtbb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
