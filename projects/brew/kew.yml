id: brew:kew
display-name: kew
homepage: https://github.com/ravachol/kew
repo: https://github.com/ravachol/kew
docs: https://github.com/ravachol/kew
package-manager:
  apk: kew
  brew: kew
  debian: kew
  nix: kew
  pacman: kew
  ubuntu: kew
  zypper: kew
package-manager-url: https://formulae.brew.sh/formula/kew
version: 4.0.0
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Command-line music player
source-archive: https://github.com/ravachol/kew/archive/refs/tags/v4.0.0.tar.gz
dependencies:
  - chafa
  - faad2
  - fftw
  - gdk-pixbuf
  - gettext
  - glib
  - libogg
  - libvorbis
  - opus
  - opusfile
  - taglib
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
executables:
  - exposure: global executable
    kind: cli
    name: kew
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add kew
  av: sudo av install brew:kew
  brew: brew install kew
  debian: sudo apt install kew
  nix: nix profile install nixpkgs#kew
  pacman: sudo pacman -S kew
  ubuntu: sudo apt install kew
  zypper: sudo zypper install kew
provenance:
  formula: kew
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
