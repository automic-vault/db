id: brew:clickhouse-sql-parser
display-name: clickhouse-sql-parser
homepage: https://github.com/AfterShip/clickhouse-sql-parser
repo: https://github.com/AfterShip/clickhouse-sql-parser
docs: https://github.com/AfterShip/clickhouse-sql-parser
package-manager:
  brew: clickhouse-sql-parser
package-manager-url: https://formulae.brew.sh/formula/clickhouse-sql-parser
version: 0.5.1
license: MIT
category: database
tags:
