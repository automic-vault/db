id: brew:cargo-binstall
display-name: cargo-binstall
homepage: https://github.com/cargo-bins/cargo-binstall
repo: https://github.com/cargo-bins/cargo-binstall
docs: https://github.com/cargo-bins/cargo-binstall
package-manager:
  brew: cargo-binstall
  nix: cargo-binstall
  pacman: cargo-binstall
  scoop: main/cargo-binstall
package-manager-url: https://formulae.brew.sh/formula/cargo-binstall
version: 1.19.1
license: GPL-3.0-only
category: development
tags:
  - cli
description: Binary installation for rust projects
source-archive: https://github.com/cargo-bins/cargo-binstall/archive/refs/tags/v1.19.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cargo-binstall
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cargo-binstall
  brew: brew install cargo-binstall
  nix: nix profile install nixpkgs#cargo-binstall
  pacman: sudo pacman -S cargo-binstall
  scoop: scoop install main/cargo-binstall
provenance:
  formula: cargo-binstall
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
