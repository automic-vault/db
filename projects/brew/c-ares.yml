id: brew:c-ares
display-name: c-ares
homepage: https://c-ares.org/
repo: https://github.com/c-ares/c-ares
docs: https://c-ares.org/
package-manager:
  apk: c-ares
  brew: c-ares
  dnf: c-ares
  macports: c-ares
  nix: c-ares
  pacman: c-ares
package-manager-url: https://formulae.brew.sh/formula/c-ares
version: 1.34.6
license: MIT
category: development
tags:
  - cli
description: Asynchronous DNS library
source-archive: https://github.com/c-ares/c-ares/releases/download/v1.34.6/c-ares-1.34.6.tar.gz
build-dependencies:
  - cmake
executables:
  - exposure: global executable
    kind: cli
    name: adig
  - exposure: global executable
    kind: cli
    name: ahost
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add c-ares
  av: sudo av install brew:c-ares
  brew: brew install c-ares
  dnf: sudo dnf install c-ares
  macports: sudo port install c-ares
  nix: nix profile install nixpkgs#c-ares
  pacman: sudo pacman -S c-ares
provenance:
  formula: c-ares
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
