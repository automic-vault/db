id: brew:drogon
display-name: drogon
homepage: https://drogon.org
repo: https://github.com/drogonframework/drogon
docs: https://drogon.org
package-manager:
  apk: drogon
  brew: drogon
  debian: drogon
  nix: drogon
  pacman: benchmark
  ubuntu: drogon
package-manager-url: https://formulae.brew.sh/formula/drogon
version: 1.9.13
license: MIT
category: development
tags:
  - cli
description: Modern C++ web application framework
source-archive: https://github.com/drogonframework/drogon.git
dependencies:
  - brotli
  - c-ares
  - jsoncpp
  - openssl@3
build-dependencies:
  - cmake
uses-from-macos:
  - sqlite
executables:
  - exposure: global executable
    kind: cli
    name: _drogon_ctl
  - exposure: global executable
    kind: cli
    name: async_stream
  - exposure: global executable
    kind: cli
    name: benchmark
  - exposure: global executable
    kind: cli
    name: client
  - exposure: global executable
    kind: cli
    name: cors
  - exposure: global executable
    kind: cli
    name: dg_ctl
  - exposure: global executable
    kind: cli
    name: drogon_ctl
  - exposure: global executable
    kind: cli
    name: file_upload
  - exposure: global executable
    kind: cli
    name: helloworld
  - exposure: global executable
    kind: cli
    name: jsonstore
  - exposure: global executable
    kind: cli
    name: login_session
  - exposure: global executable
    kind: cli
    name: redis_chat
  - exposure: global executable
    kind: cli
    name: redis_simple
  - exposure: global executable
    kind: cli
    name: websocket_client
  - exposure: global executable
    kind: cli
    name: websocket_server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add drogon
  av: sudo av install brew:drogon
  brew: brew install drogon
  debian: sudo apt install drogon
  nix: nix profile install nixpkgs#drogon
  pacman: sudo pacman -S benchmark
  ubuntu: sudo apt install drogon
provenance:
  formula: drogon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
