id: brew:fvm
display-name: fvm
homepage: https://fvm.app
repo: https://github.com/leoafarias/fvm
docs: https://fvm.app
package-manager:
  brew: fvm
  chocolatey: fvm
  macports: fvm
  nix: fvm
  pacman: fvm
  scoop: extras/fvm
package-manager-url: https://formulae.brew.sh/formula/fvm
version: 4.1.0
license: MIT
category: development
tags:
  - cli
description: Manage Flutter SDK versions per project
source-archive: https://github.com/leoafarias/fvm/archive/refs/tags/4.1.0.tar.gz
dependencies:
  - dartaotruntime
build-dependencies:
  - dart-sdk
executables:
  - exposure: global executable
    kind: cli
    name: fvm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fvm
  brew: brew install fvm
  chocolatey: choco install fvm
  macports: sudo port install fvm
  nix: nix profile install nixpkgs#fvm
  pacman: sudo pacman -S fvm
  scoop: scoop install extras/fvm
provenance:
  formula: fvm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
