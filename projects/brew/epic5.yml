id: brew:epic5
display-name: epic5
homepage: https://www.epicsol.org/
repo: https://ftp.epicsol.org/pub/epic/EPIC5-PRODUCTION/epic5-3.0.3.tar.xz
docs: https://www.epicsol.org/
package-manager:
  apk: epic5
  brew: epic5
  macports: epic5
  nix: epic5
  ubuntu: epic5
package-manager-url: https://formulae.brew.sh/formula/epic5
version: 3.0.3
license: BSD-3-Clause
category: network
tags:
  - cli
description: Enhanced, programmable IRC client
source-archive: https://ftp.epicsol.org/pub/epic/EPIC5-PRODUCTION/epic5-3.0.3.tar.xz
dependencies:
  - openssl@3
uses-from-macos:
  - libxcrypt
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: epic5
  - exposure: global executable
    kind: cli
    name: epic5-2157
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add epic5
  av: sudo av install brew:epic5
  brew: brew install epic5
  macports: sudo port install epic5
  nix: nix profile install nixpkgs#epic5
  ubuntu: sudo apt install epic5
provenance:
  formula: epic5
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
