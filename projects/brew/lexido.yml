id: brew:lexido
display-name: lexido
homepage: https://github.com/micr0-dev/lexido
repo: https://github.com/micr0-dev/lexido
docs: https://github.com/micr0-dev/lexido
package-manager:
  brew: lexido
  nix: lexido
package-manager-url: https://formulae.brew.sh/formula/lexido
version: 1.4.3
license: AGPL-3.0-or-later
category: development
tags:
  - cli
description: Innovative assistant for the command-line
source-archive: https://github.com/micr0-dev/lexido/archive/refs/tags/v1.4.3.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: lexido
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lexido
  brew: brew install lexido
  nix: nix profile install nixpkgs#lexido
provenance:
  formula: lexido
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
