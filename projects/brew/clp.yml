id: brew:clp
display-name: clp
homepage: https://github.com/coin-or/Clp
repo: https://github.com/coin-or/Clp
docs: https://github.com/coin-or/Clp
package-manager:
  brew: clp
  nix: clp
package-manager-url: https://formulae.brew.sh/formula/clp
version: 1.17.11
license: EPL-2.0
category: development
tags:
  - cli
description: Linear programming solver
source-archive: https://github.com/coin-or/Clp/archive/refs/tags/releases/1.17.11.tar.gz
dependencies:
  - coinutils
  - openblas
  - osi
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: clp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clp
  brew: brew install clp
  nix: nix profile install nixpkgs#clp
provenance:
  formula: clp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
