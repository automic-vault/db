id: brew:net-tools
display-name: net-tools
homepage: https://sourceforge.net/projects/net-tools/
repo: https://downloads.sourceforge.net/project/net-tools/net-tools-2.10.tar.xz
docs: https://sourceforge.net/projects/net-tools/
package-manager:
  apk: net-tools
  brew: net-tools
  debian: net-tools
  dnf: net-tools
  nix: net-tools
  pacman: net-tools
  ubuntu: net-tools
  zypper: net-tools
package-manager-url: https://formulae.brew.sh/formula/net-tools
version: 2.10
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: Linux networking base tools
source-archive: https://downloads.sourceforge.net/project/net-tools/net-tools-2.10.tar.xz
dependencies:
  - libdnet
executables:
  - exposure: global executable
    kind: cli
    name: arp
  - exposure: global executable
    kind: cli
    name: dnsdomainname
  - exposure: global executable
    kind: cli
    name: domainname
  - exposure: global executable
    kind: cli
    name: hostname
  - exposure: global executable
    kind: cli
    name: ifconfig
  - exposure: global executable
    kind: cli
    name: ipmaddr
  - exposure: global executable
    kind: cli
    name: iptunnel
  - exposure: global executable
    kind: cli
    name: mii-tool
  - exposure: global executable
    kind: cli
    name: nameif
  - exposure: global executable
    kind: cli
    name: netstat
  - exposure: global executable
    kind: cli
    name: nisdomainname
  - exposure: global executable
    kind: cli
    name: plipconfig
  - exposure: global executable
    kind: cli
    name: rarp
  - exposure: global executable
    kind: cli
    name: route
  - exposure: global executable
    kind: cli
    name: slattach
  - exposure: global executable
    kind: cli
    name: ypdomainname
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add net-tools
  av: sudo av install brew:net-tools
  brew: brew install net-tools
  debian: sudo apt install net-tools
  dnf: sudo dnf install net-tools
  nix: nix profile install nixpkgs#net-tools
  pacman: sudo pacman -S net-tools
  ubuntu: sudo apt install net-tools
  zypper: sudo zypper install net-tools
provenance:
  formula: net-tools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
