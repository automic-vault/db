id: brew:one-ml
display-name: one-ml
homepage: https://people.mpi-sws.org/~rossberg/1ml/
repo: https://people.mpi-sws.org/~rossberg/1ml/1ml-0.1.zip
docs: https://people.mpi-sws.org/~rossberg/1ml/
package-manager:
  brew: one-ml
package-manager-url: https://formulae.brew.sh/formula/one-ml
version: 0.1
license: Apache-2.0
category: network
tags:
  - cli
description: Reboot of ML, unifying its core and (now first-class) module layers
source-archive: https://people.mpi-sws.org/~rossberg/1ml/1ml-0.1.zip
build-dependencies:
  - ocaml
executables:
  - exposure: global executable
    kind: cli
    name: 1ml
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:one-ml
  brew: brew install one-ml
provenance:
  formula: one-ml
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
