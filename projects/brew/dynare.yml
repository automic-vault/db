id: brew:dynare
display-name: dynare
homepage: https://www.dynare.org/
repo: https://www.dynare.org/release/source/dynare-6.5.tar.xz
docs: https://www.dynare.org/
package-manager:
  brew: dynare
  debian: dynare
  ubuntu: dynare
  winget: Dynare.Dynare
  zypper: dynare
package-manager-url: https://formulae.brew.sh/formula/dynare
version: 6.5
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Platform for economic models, particularly DSGE and OLG models
source-archive: https://www.dynare.org/release/source/dynare-6.5.tar.xz
dependencies:
  - gcc
  - gsl
  - libmatio
  - libomp
  - octave
  - openblas
  - slicot
  - suite-sparse
build-dependencies:
  - bison
  - boost
  - cweb
  - flex
  - meson
  - ninja
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: dynare-preprocessor
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To get started with Dynare, open Octave and type addpath
    $HOMEBREW_PREFIX/opt/dynare/lib/dynare/matlab
  post-install-defined: false
install-lines:
  av: sudo av install brew:dynare
  brew: brew install dynare
  debian: sudo apt install dynare
  ubuntu: sudo apt install dynare
  winget: winget install --id Dynare.Dynare -e
  zypper: sudo zypper install dynare
provenance:
  formula: dynare
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
