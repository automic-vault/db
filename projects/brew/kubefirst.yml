id: brew:kubefirst
display-name: kubefirst
homepage: https://kubefirst.konstruct.io/docs/
repo: https://github.com/konstructio/kubefirst
docs: https://kubefirst.konstruct.io/docs/
package-manager:
  brew: kubefirst
  nix: kubefirst
  zypper: kubefirst
package-manager-url: https://formulae.brew.sh/formula/kubefirst
version: 2.10.5
license: MIT
category: cloud
tags:
  - cli
  - kubernetes
description: GitOps Infrastructure & Application Delivery Platform for kubernetes
source-archive: https://github.com/konstructio/kubefirst/archive/refs/tags/v2.10.5.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kubefirst
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kubefirst
  brew: brew install kubefirst
  nix: nix profile install nixpkgs#kubefirst
  zypper: sudo zypper install kubefirst
provenance:
  formula: kubefirst
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
