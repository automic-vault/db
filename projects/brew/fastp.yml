id: brew:fastp
display-name: fastp
homepage: https://github.com/OpenGene/fastp
repo: https://github.com/OpenGene/fastp
docs: https://github.com/OpenGene/fastp
package-manager:
  brew: fastp
  debian: fastp
  nix: fastp
  ubuntu: fastp
package-manager-url: https://formulae.brew.sh/formula/fastp
version: 1.3.3
license: MIT
category: development
tags:
  - cli
description: Ultra-fast all-in-one FASTQ preprocessor
source-archive: https://github.com/OpenGene/fastp/archive/refs/tags/v1.3.3.tar.gz
dependencies:
  - highway
  - isa-l
  - libdeflate
executables:
  - exposure: global executable
    kind: cli
    name: fastp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fastp
  brew: brew install fastp
  debian: sudo apt install fastp
  nix: nix profile install nixpkgs#fastp
  ubuntu: sudo apt install fastp
provenance:
  formula: fastp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
