id: brew:defaultbrowser
display-name: defaultbrowser
homepage: https://github.com/kerma/defaultbrowser
repo: https://github.com/kerma/defaultbrowser
docs: https://github.com/kerma/defaultbrowser
package-manager:
  brew: defaultbrowser
  macports: defaultbrowser
  nix: defaultbrowser
package-manager-url: https://formulae.brew.sh/formula/defaultbrowser
version: 1.1
license: MIT
category: development
tags:
  - cli
description: Command-line tool for getting & setting the default browser
source-archive: https://github.com/kerma/defaultbrowser/archive/refs/tags/1.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: defaultbrowser
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:defaultbrowser
  brew: brew install defaultbrowser
  macports: sudo port install defaultbrowser
  nix: nix profile install nixpkgs#defaultbrowser
provenance:
  formula: defaultbrowser
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
