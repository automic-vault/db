id: brew:bettercap
display-name: bettercap
homepage: https://www.bettercap.org/
repo: https://github.com/bettercap/bettercap
docs: https://www.bettercap.org/
package-manager:
  apk: bettercap
  brew: bettercap
  debian: bettercap
  macports: bettercap
  nix: bettercap
  pacman: bettercap
  ubuntu: bettercap
  zypper: bettercap
package-manager-url: https://formulae.brew.sh/formula/bettercap
version: 2.41.7
license: GPL-3.0-only
category: development
tags:
  - cli
description: Swiss army knife for network attacks and monitoring
source-archive: https://github.com/bettercap/bettercap/archive/refs/tags/v2.41.7.tar.gz
dependencies:
  - libusb
build-dependencies:
  - go
  - pkgconf
uses-from-macos:
  - libpcap
executables:
  - exposure: global executable
    kind: cli
    name: bettercap
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    bettercap requires root privileges so you will need to run `sudo bettercap`. You
    should be certain that you trust any software you grant root privileges.
  post-install-defined: false
install-lines:
  apk: sudo apk add bettercap
  av: sudo av install brew:bettercap
  brew: brew install bettercap
  debian: sudo apt install bettercap
  macports: sudo port install bettercap
  nix: nix profile install nixpkgs#bettercap
  pacman: sudo pacman -S bettercap
  ubuntu: sudo apt install bettercap
  zypper: sudo zypper install bettercap
provenance:
  formula: bettercap
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
