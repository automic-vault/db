id: brew:periphery
display-name: periphery
homepage: https://github.com/peripheryapp/periphery
repo: https://github.com/peripheryapp/periphery
docs: https://github.com/peripheryapp/periphery
package-manager:
  brew: periphery
package-manager-url: https://formulae.brew.sh/formula/periphery
version: 3.7.4
license: MIT
category: development
tags:
  - cli
description: Identify unused code in Swift projects
source-archive: https://github.com/peripheryapp/periphery/archive/refs/tags/3.7.4.tar.gz
uses-from-macos:
  - curl
  - libxml2
  - swift
executables:
  - exposure: global executable
    kind: cli
    name: periphery
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_tahoe
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:periphery
  brew: brew install periphery
provenance:
  formula: periphery
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
