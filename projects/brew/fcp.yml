id: brew:fcp
display-name: fcp
homepage: https://github.com/Svetlitski/fcp/
repo: https://github.com/Svetlitski/fcp
docs: https://github.com/Svetlitski/fcp/
package-manager:
  brew: fcp
  nix: fcp
package-manager-url: https://formulae.brew.sh/formula/fcp
version: 0.2.1
license: BSD-3-Clause
category: development
tags:
  - cli
description: Significantly faster alternative to the classic Unix cp(1) command
source-archive: https://github.com/Svetlitski/fcp/archive/refs/tags/v0.2.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: fcp
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:fcp
  brew: brew install fcp
  nix: nix profile install nixpkgs#fcp
provenance:
  formula: fcp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
