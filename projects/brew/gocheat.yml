id: brew:gocheat
display-name: gocheat
homepage: https://github.com/Achno/gocheat
repo: https://github.com/Achno/gocheat
docs: https://github.com/Achno/gocheat
package-manager:
  brew: gocheat
  nix: gocheat
package-manager-url: https://formulae.brew.sh/formula/gocheat
version: 0.1.1
license: MIT
category: development
tags:
  - cli
description: TUI Cheatsheet for keybindings, hotkeys and more
source-archive: https://github.com/Achno/gocheat/archive/refs/tags/v0.1.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: gocheat
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gocheat
  brew: brew install gocheat
  nix: nix profile install nixpkgs#gocheat
provenance:
  formula: gocheat
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
