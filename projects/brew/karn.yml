id: brew:karn
display-name: karn
homepage: https://github.com/prydonius/karn
repo: https://github.com/prydonius/karn
docs: https://github.com/prydonius/karn
package-manager:
  brew: karn
package-manager-url: https://formulae.brew.sh/formula/karn
version: 0.1.0
license: MIT
category: development
tags:
  - cli
  - git
description: Manage multiple Git identities
source-archive: https://github.com/prydonius/karn/archive/refs/tags/v0.1.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: karn
bottle:
