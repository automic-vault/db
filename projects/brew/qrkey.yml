id: brew:qrkey
display-name: qrkey
homepage: https://github.com/Techwolf12/qrkey
repo: https://github.com/Techwolf12/qrkey
docs: https://github.com/Techwolf12/qrkey
package-manager:
  brew: qrkey
package-manager-url: https://formulae.brew.sh/formula/qrkey
version: 0.0.1
license: MIT
category: development
tags:
  - cli
description: Generate and recover QR codes from files for offline private key backup
source-archive: https://github.com/Techwolf12/qrkey/archive/refs/tags/v0.0.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: qrkey
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:qrkey
  brew: brew install qrkey
provenance:
  formula: qrkey
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
