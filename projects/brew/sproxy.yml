id: brew:sproxy
display-name: sproxy
homepage: https://www.joedog.org/sproxy-home/
repo: https://download.joedog.org/sproxy/sproxy-1.02.tar.gz
docs: https://www.joedog.org/sproxy-home/
package-manager:
  brew: sproxy
package-manager-url: https://formulae.brew.sh/formula/sproxy
version: 1.02
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: HTTP proxy server collecting URLs in a 'siege-friendly' manner
source-archive: https://download.joedog.org/sproxy/sproxy-1.02.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
uses-from-macos:
  - perl
executables:
  - exposure: global executable
    kind: cli
    name: sproxy
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:sproxy
  brew: brew install sproxy
provenance:
  formula: sproxy
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
