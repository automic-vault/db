id: brew:jfrog-cli
display-name: jfrog-cli
homepage: https://docs.jfrog.com/integrations/docs/jfrog-cli
repo: https://github.com/jfrog/jfrog-cli
docs: https://docs.jfrog.com/integrations/docs/jfrog-cli
package-manager:
  apk: jfrog-cli
  brew: jfrog-cli
  chocolatey: jfrog-cli
  dnf: jfrog-cli
  nix: jfrog-cli
  scoop: main/jfrog
  winget: JFrog.Cli
  zypper: jfrog-cli
package-manager-url: https://formulae.brew.sh/formula/jfrog-cli
version: 2.104.1
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line interface for JFrog products
source-archive: https://github.com/jfrog/jfrog-cli/archive/refs/tags/v2.104.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: jf
  - exposure: global executable
    kind: cli
    name: jfrog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add jfrog-cli
  av: sudo av install brew:jfrog-cli
  brew: brew install jfrog-cli
  chocolatey: choco install jfrog-cli
  dnf: sudo dnf install jfrog-cli
  nix: nix profile install nixpkgs#jfrog-cli
  scoop: scoop install main/jfrog
  winget: winget install --id JFrog.Cli -e
  zypper: sudo zypper install jfrog-cli
provenance:
  formula: jfrog-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
