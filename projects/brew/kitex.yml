id: brew:kitex
display-name: kitex
homepage: https://github.com/cloudwego/kitex
repo: https://github.com/cloudwego/kitex
docs: https://github.com/cloudwego/kitex
package-manager:
  brew: kitex
  nix: kitex
package-manager-url: https://formulae.brew.sh/formula/kitex
version: 0.16.2
license: Apache-2.0
category: cloud
tags:
  - cli
description: Golang RPC framework for microservices
source-archive: https://github.com/cloudwego/kitex/archive/refs/tags/v0.16.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: kitex
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:kitex
  brew: brew install kitex
  nix: nix profile install nixpkgs#kitex
provenance:
  formula: kitex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
