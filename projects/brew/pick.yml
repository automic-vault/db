id: brew:pick
display-name: pick
homepage: https://github.com/mptre/pick
repo: https://github.com/mptre/pick
docs: https://github.com/mptre/pick
package-manager:
  apk: pick
  brew: pick
  debian: pick
  dnf: pick
  macports: pick
  nix: pick
  ubuntu: pick
  winget: aryanbhosale.pick
package-manager-url: https://formulae.brew.sh/formula/pick
version: 4.0.0
license: MIT
category: development
tags:
  - cli
description: Utility to choose one option from a set of choices
source-archive: https://github.com/mptre/pick/releases/download/v4.0.0/pick-4.0.0.tar.gz
uses-from-macos:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: pick
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add pick
  av: sudo av install brew:pick
  brew: brew install pick
  debian: sudo apt install pick
  dnf: sudo dnf install pick
  macports: sudo port install pick
  nix: nix profile install nixpkgs#pick
  ubuntu: sudo apt install pick
  winget: winget install --id aryanbhosale.pick -e
provenance:
  formula: pick
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
