id: brew:cookcli
display-name: cookcli
homepage: https://cooklang.org
repo: https://github.com/cooklang/cookcli
docs: https://cooklang.org
package-manager:
  brew: cookcli
  macports: cook
package-manager-url: https://formulae.brew.sh/formula/cookcli
version: 0.30.0
license: MIT
category: development
tags:
  - cli
description: CLI-tool for cooking recipes formated using Cooklang
source-archive: https://github.com/cooklang/cookcli/archive/refs/tags/v0.30.0.tar.gz
build-dependencies:
  - node
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: cook
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:cookcli
  brew: brew install cookcli
  macports: sudo port install cook
provenance:
  formula: cookcli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
