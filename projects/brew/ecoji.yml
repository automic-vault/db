id: brew:ecoji
display-name: ecoji
homepage: https://github.com/keith-turner/ecoji
repo: https://github.com/keith-turner/ecoji
docs: https://github.com/keith-turner/ecoji
package-manager:
  brew: ecoji
package-manager-url: https://formulae.brew.sh/formula/ecoji
version: 2.0.2
license: Apache-2.0
category: development
tags:
  - cli
description: Encodes (and decodes) data as emojis
source-archive: https://github.com/keith-turner/ecoji/archive/refs/tags/v2.0.2.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: ecoji
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:ecoji
  brew: brew install ecoji
provenance:
  formula: ecoji
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
