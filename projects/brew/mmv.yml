id: brew:mmv
display-name: mmv
homepage: https://github.com/rrthomas/mmv
repo: https://github.com/rrthomas/mmv
docs: https://github.com/rrthomas/mmv
package-manager:
  brew: mmv
  debian: mmv
  dnf: mmv
  macports: mmv
  nix: mmv
  ubuntu: mmv
  winget: goreleaser.mcp
  zypper: mmv
package-manager-url: https://formulae.brew.sh/formula/mmv
version: 2.10
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Move, copy, append, and link multiple files
source-archive: https://github.com/rrthomas/mmv/releases/download/v2.10/mmv-2.10.tar.gz
dependencies:
  - bdw-gc
build-dependencies:
  - help2man
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: mad
  - exposure: global executable
    kind: cli
    name: mcp
  - exposure: global executable
    kind: cli
    name: mln
  - exposure: global executable
    kind: cli
    name: mmv
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mmv
  brew: brew install mmv
  debian: sudo apt install mmv
  dnf: sudo dnf install mmv
  macports: sudo port install mmv
  nix: nix profile install nixpkgs#mmv
  ubuntu: sudo apt install mmv
  winget: winget install --id goreleaser.mcp -e
  zypper: sudo zypper install mmv
provenance:
  formula: mmv
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
