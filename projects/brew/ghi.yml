id: brew:ghi
display-name: ghi
homepage: https://github.com/drazisil/ghi
repo: https://github.com/drazisil/ghi
docs: https://github.com/drazisil/ghi
package-manager:
  apk: ghi
  brew: ghi
  nix: ghi
package-manager-url: https://formulae.brew.sh/formula/ghi
version: 1.2.1
license: MIT
category: development
tags:
  - cli
description: Work on GitHub issues on the command-line
source-archive: https://github.com/drazisil/ghi/archive/refs/tags/1.2.1.tar.gz
uses-from-macos:
  - ruby
executables:
  - exposure: global executable
    kind: cli
    name: ghi
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ghi
  av: sudo av install brew:ghi
  brew: brew install ghi
  nix: nix profile install nixpkgs#ghi
provenance:
  formula: ghi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
