id: brew:scriptisto
display-name: scriptisto
homepage: https://github.com/igor-petruk/scriptisto
repo: https://github.com/igor-petruk/scriptisto
docs: https://github.com/igor-petruk/scriptisto
package-manager:
  brew: scriptisto
  debian: scriptisto
  nix: scriptisto
package-manager-url: https://formulae.brew.sh/formula/scriptisto
version: 2.2.0
license: Apache-2.0
category: development
tags:
  - cli
description: Language-agnostic "shebang interpreter" to write scripts in compiled languages
source-archive: https://github.com/igor-petruk/scriptisto/archive/refs/tags/v2.2.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: scriptisto
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:scriptisto
  brew: brew install scriptisto
  debian: sudo apt install scriptisto
  nix: nix profile install nixpkgs#scriptisto
provenance:
  formula: scriptisto
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
