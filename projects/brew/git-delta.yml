id: brew:git-delta
display-name: git-delta
homepage: https://github.com/dandavison/delta
repo: https://github.com/dandavison/delta
docs: https://github.com/dandavison/delta
package-manager:
  apk: delta
  brew: git-delta
  chocolatey: delta
  debian: git-delta
  dnf: git-delta
  macports: git-delta
  nix: delta
  pacman: git-delta
  scoop: main/delta
  ubuntu: git-delta
  winget: dandavison.delta
  zypper: git-delta
package-manager-url: https://formulae.brew.sh/formula/git-delta
version: 0.19.2
license: MIT
category: development
tags:
  - cli
  - git
description: Syntax-highlighting pager for git and diff output
source-archive: https://github.com/dandavison/delta/archive/refs/tags/0.19.2.tar.gz
dependencies:
  - libgit2
  - oniguruma
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: delta
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add delta
  av: sudo av install brew:git-delta
  brew: brew install git-delta
  chocolatey: choco install delta
  debian: sudo apt install git-delta
  dnf: sudo dnf install git-delta
  macports: sudo port install git-delta
  nix: nix profile install nixpkgs#delta
  pacman: sudo pacman -S git-delta
  scoop: scoop install main/delta
  ubuntu: sudo apt install git-delta
  winget: winget install --id dandavison.delta -e
  zypper: sudo zypper install git-delta
provenance:
  formula: git-delta
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
