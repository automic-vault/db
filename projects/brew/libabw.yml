id: brew:libabw
display-name: libabw
homepage: https://wiki.documentfoundation.org/DLP/Libraries/libabw
repo: https://dev-www.libreoffice.org/src/libabw/libabw-0.1.4.tar.xz
docs: https://wiki.documentfoundation.org/DLP/Libraries/libabw
package-manager:
  apk: libabw
  brew: libabw
  dnf: libabw
  macports: libabw
  nix: libabw
  pacman: libabw
package-manager-url: https://formulae.brew.sh/formula/libabw
version: 0.1.4
license: MPL-2.0
category: network
tags:
  - cli
description: Library for parsing AbiWord documents
source-archive: https://dev-www.libreoffice.org/src/libabw/libabw-0.1.4.tar.xz
dependencies:
  - librevenge
build-dependencies:
  - boost
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: abw2html
  - exposure: global executable
    kind: cli
    name: abw2raw
  - exposure: global executable
    kind: cli
    name: abw2text
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add libabw
  av: sudo av install brew:libabw
  brew: brew install libabw
  dnf: sudo dnf install libabw
  macports: sudo port install libabw
  nix: nix profile install nixpkgs#libabw
  pacman: sudo pacman -S libabw
provenance:
  formula: libabw
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
