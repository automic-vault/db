id: brew:nono
display-name: nono
homepage: https://github.com/always-further/nono
repo: https://github.com/always-further/nono
docs: https://github.com/always-further/nono
package-manager:
  brew: nono
  nix: nono
package-manager-url: https://formulae.brew.sh/formula/nono
version: 0.59.0
license: Apache-2.0
category: development
tags:
  - cli
description: Capability-based sandbox shell for AI agents with OS-enforced isolation
source-archive: https://github.com/always-further/nono/archive/refs/tags/v0.59.0.tar.gz
build-dependencies:
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: nono
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nono
  brew: brew install nono
  nix: nix profile install nixpkgs#nono
provenance:
  formula: nono
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
