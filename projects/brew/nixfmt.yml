id: brew:nixfmt
display-name: nixfmt
homepage: https://github.com/NixOS/nixfmt
repo: https://github.com/NixOS/nixfmt
docs: https://github.com/NixOS/nixfmt
package-manager:
  brew: nixfmt
  nix: nixfmt
package-manager-url: https://formulae.brew.sh/formula/nixfmt
version: 1.2.0
license: MPL-2.0
category: development
tags:
  - cli
description: Command-line tool to format Nix language code
source-archive: https://github.com/NixOS/nixfmt/archive/refs/tags/v1.2.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: nixfmt
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nixfmt
  brew: brew install nixfmt
  nix: nix profile install nixpkgs#nixfmt
provenance:
  formula: nixfmt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
