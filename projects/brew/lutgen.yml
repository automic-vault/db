id: brew:lutgen
display-name: lutgen
homepage: https://ozwaldorf.github.io/lutgen-rs/
repo: https://github.com/ozwaldorf/lutgen-rs
docs: https://ozwaldorf.github.io/lutgen-rs/
package-manager:
  apk: lutgen
  brew: lutgen
  nix: lutgen
  scoop: main/lutgen
package-manager-url: https://formulae.brew.sh/formula/lutgen
version: 1.1.1
license: MIT
category: development
tags:
  - cli
description: Blazingly fast interpolated LUT generator and applicator for color palettes
source-archive: https://github.com/ozwaldorf/lutgen-rs/archive/refs/tags/lutgen-v1.1.1.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: lutgen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lutgen
  av: sudo av install brew:lutgen
  brew: brew install lutgen
  nix: nix profile install nixpkgs#lutgen
  scoop: scoop install main/lutgen
provenance:
  formula: lutgen
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
