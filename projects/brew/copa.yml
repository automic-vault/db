id: brew:copa
display-name: copa
homepage: https://github.com/project-copacetic/copacetic
repo: https://github.com/project-copacetic/copacetic
docs: https://github.com/project-copacetic/copacetic
package-manager:
  brew: copa
package-manager-url: https://formulae.brew.sh/formula/copa
version: 0.14.1
license: Apache-2.0
category: development
tags:
  - cli
description: Tool to directly patch container images given the vulnerability scanning results
source-archive: https://github.com/project-copacetic/copacetic/archive/refs/tags/v0.14.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: copa
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:copa
  brew: brew install copa
provenance:
  formula: copa
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
