id: brew:darklua
display-name: darklua
homepage: https://darklua.com/
repo: https://github.com/seaofvoices/darklua
docs: https://darklua.com/
package-manager:
  brew: darklua
  nix: darklua
package-manager-url: https://formulae.brew.sh/formula/darklua
version: 0.18.0
license: MIT
category: development
tags:
  - cli
description: Command-line tool that transforms Lua code
source-archive: https://github.com/seaofvoices/darklua/archive/refs/tags/v0.18.0.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: darklua
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:darklua
  brew: brew install darklua
  nix: nix profile install nixpkgs#darklua
provenance:
  formula: darklua
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
