id: brew:smartmontools
display-name: smartmontools
homepage: https://www.smartmontools.org/
repo: >
  https://downloads.sourceforge.net/project/smartmontools/smartmontools/7.5/smartmontools-7.5.tar.gz
docs: https://www.smartmontools.org/
package-manager:
  apk: smartmontools
  brew: smartmontools
  chocolatey: smartmontools
  debian: smartmontools
  dnf: smartmontools
  macports: smartmontools
  nix: smartmontools
  pacman: smartmontools
  scoop: main/smartmontools
  ubuntu: smartmontools
  winget: smartmontools.smartmontools
  zypper: smartmontools
package-manager-url: https://formulae.brew.sh/formula/smartmontools
version: 7.5
license: GPL-2.0-or-later
category: network
tags:
  - cli
description: SMART hard drive monitoring
source-archive: >
  https://downloads.sourceforge.net/project/smartmontools/smartmontools/7.5/smartmontools-7.5.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: smartctl
  - exposure: global executable
    kind: cli
    name: smartd
  - exposure: global executable
    kind: cli
    name: update-smart-drivedb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add smartmontools
  av: sudo av install brew:smartmontools
  brew: brew install smartmontools
  chocolatey: choco install smartmontools
  debian: sudo apt install smartmontools
  dnf: sudo dnf install smartmontools
  macports: sudo port install smartmontools
  nix: nix profile install nixpkgs#smartmontools
  pacman: sudo pacman -S smartmontools
  scoop: scoop install main/smartmontools
  ubuntu: sudo apt install smartmontools
  winget: winget install --id smartmontools.smartmontools -e
  zypper: sudo zypper install smartmontools
provenance:
  formula: smartmontools
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
