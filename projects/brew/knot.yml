id: brew:knot
display-name: knot
homepage: https://www.knot-dns.cz/
repo: https://knot-dns.nic.cz/release/knot-3.5.4.tar.xz
docs: https://www.knot-dns.cz/
package-manager:
  apk: knot
  brew: knot
  debian: knot
  dnf: knot
  macports: knot
  pacman: knot
  ubuntu: knot
  zypper: knot
package-manager-url: https://formulae.brew.sh/formula/knot
version: 3.5.4
license: GPL-3.0-or-later AND 0BSD AND BSD-3-Clause AND LGPL-2.0-or-later AND MIT
category: network
tags:
  - cli
description: High-performance authoritative-only DNS server
source-archive: https://knot-dns.nic.cz/release/knot-3.5.4.tar.xz
dependencies:
  - fstrm
  - gnutls
  - libidn2
  - libnghttp2
  - lmdb
  - protobuf-c
  - userspace-rcu
build-dependencies:
  - pkgconf
  - sphinx-doc
uses-from-macos:
  - libedit
executables:
  - exposure: global executable
    kind: cli
    name: kcatalogprint
  - exposure: global executable
    kind: cli
    name: kdig
  - exposure: global executable
    kind: cli
    name: keymgr
  - exposure: global executable
    kind: cli
    name: khost
  - exposure: global executable
    kind: cli
    name: kjournalprint
  - exposure: global executable
    kind: cli
    name: knotc
  - exposure: global executable
    kind: cli
    name: knotd
  - exposure: global executable
    kind: cli
    name: knsec3hash
  - exposure: global executable
    kind: cli
    name: knsupdate
  - exposure: global executable
    kind: cli
    name: kzonecheck
  - exposure: global executable
    kind: cli
    name: kzonesign
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add knot
  av: sudo av install brew:knot
  brew: brew install knot
  debian: sudo apt install knot
  dnf: sudo dnf install knot
  macports: sudo port install knot
  pacman: sudo pacman -S knot
  ubuntu: sudo apt install knot
  zypper: sudo zypper install knot
provenance:
  formula: knot
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
