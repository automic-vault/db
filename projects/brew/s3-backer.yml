id: brew:s3-backer
display-name: s3-backer
homepage: https://github.com/archiecobbs/s3backer
repo: https://s3.amazonaws.com/archie-public/s3backer/s3backer-2.1.6.tar.gz
docs: https://github.com/archiecobbs/s3backer
package-manager:
  brew: s3-backer
  debian: s3backer
  nix: s3backer
  ubuntu: s3backer
  zypper: s3backer
package-manager-url: https://formulae.brew.sh/formula/s3-backer
version: 2.1.6
license: GPL-2.0-or-later
category: cloud
tags:
  - cli
description: FUSE-based single file backing store via Amazon S3
source-archive: https://s3.amazonaws.com/archie-public/s3backer/s3backer-2.1.6.tar.gz
dependencies:
  - curl
  - expat
  - libfuse
  - openssl@3
  - zlib-ng-compat
  - zstd
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: s3backer
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:s3-backer
  brew: brew install s3-backer
  debian: sudo apt install s3backer
  nix: nix profile install nixpkgs#s3backer
  ubuntu: sudo apt install s3backer
  zypper: sudo zypper install s3backer
provenance:
  formula: s3-backer
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
