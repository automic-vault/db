id: brew:openvdb
display-name: openvdb
homepage: https://www.openvdb.org/
repo: https://github.com/AcademySoftwareFoundation/openvdb
docs: https://www.openvdb.org/
package-manager:
  apk: openvdb
  brew: openvdb
  dnf: openvdb
  macports: openvdb
  nix: openvdb
  pacman: openvdb
package-manager-url: https://formulae.brew.sh/formula/openvdb
version: 13.0.0
license: MPL-2.0
category: development
tags:
  - cli
description: Sparse volumetric data processing toolkit
source-archive: https://github.com/AcademySoftwareFoundation/openvdb/archive/refs/tags/v13.0.0.tar.gz
dependencies:
  - boost
  - c-blosc
  - jemalloc
  - openexr
  - tbb
build-dependencies:
  - cmake
  - doxygen
executables:
  - exposure: global executable
    kind: cli
    name: nanovdb_print
  - exposure: global executable
    kind: cli
    name: nanovdb_validate
  - exposure: global executable
    kind: cli
    name: vdb_print
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add openvdb
  av: sudo av install brew:openvdb
  brew: brew install openvdb
  dnf: sudo dnf install openvdb
  macports: sudo port install openvdb
  nix: nix profile install nixpkgs#openvdb
  pacman: sudo pacman -S openvdb
provenance:
  formula: openvdb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
