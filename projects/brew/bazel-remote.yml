id: brew:bazel-remote
display-name: bazel-remote
homepage: https://github.com/buchgr/bazel-remote/
repo: https://github.com/buchgr/bazel-remote
docs: https://github.com/buchgr/bazel-remote/
package-manager:
  brew: bazel-remote
  nix: bazel-remote
package-manager-url: https://formulae.brew.sh/formula/bazel-remote
version: 2.6.1
license: Apache-2.0
category: development
tags:
  - cli
description: Remote cache for Bazel
source-archive: https://github.com/buchgr/bazel-remote/archive/refs/tags/v2.6.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: bazel-remote
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:bazel-remote
  brew: brew install bazel-remote
  nix: nix profile install nixpkgs#bazel-remote
provenance:
  formula: bazel-remote
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
