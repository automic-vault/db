id: brew:redex
display-name: redex
homepage: https://fbredex.com/
repo: https://github.com/facebook/redex
docs: https://fbredex.com/
package-manager:
  brew: redex
package-manager-url: https://formulae.brew.sh/formula/redex
version: 2025.09.18
license: MIT
category: development
tags:
  - cli
description: Bytecode optimizer for Android apps
source-archive: https://github.com/facebook/redex/archive/refs/tags/v2025.09.18.tar.gz
dependencies:
  - boost
  - jsoncpp
  - python@3.14
build-dependencies:
  - cmake
  - libevent
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: redex.py
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:redex
  brew: brew install redex
provenance:
  formula: redex
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
