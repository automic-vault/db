id: brew:rinetd
display-name: rinetd
homepage: https://github.com/samhocevar/rinetd
repo: https://github.com/samhocevar/rinetd
docs: https://github.com/samhocevar/rinetd
package-manager:
  apk: rinetd
  brew: rinetd
  debian: rinetd
  nix: rinetd
  ubuntu: rinetd
package-manager-url: https://formulae.brew.sh/formula/rinetd
version: 0.73
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Internet TCP redirection server
source-archive: https://github.com/samhocevar/rinetd/releases/download/v0.73/rinetd-0.73.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: rinetd
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  apk: sudo apk add rinetd
  av: sudo av install brew:rinetd
  brew: brew install rinetd
  debian: sudo apt install rinetd
  nix: nix profile install nixpkgs#rinetd
  ubuntu: sudo apt install rinetd
provenance:
  formula: rinetd
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
