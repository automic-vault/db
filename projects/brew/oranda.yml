id: brew:oranda
display-name: oranda
homepage: https://github.com/axodotdev/oranda
repo: https://github.com/axodotdev/oranda
docs: https://github.com/axodotdev/oranda
package-manager:
  brew: oranda
  nix: oranda
  scoop: extras/oranda
package-manager-url: https://formulae.brew.sh/formula/oranda
version: 0.6.5
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Generate beautiful landing pages for your developer tools
source-archive: https://github.com/axodotdev/oranda/archive/refs/tags/v0.6.5.tar.gz
dependencies:
  - oniguruma
build-dependencies:
  - node
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: oranda
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:oranda
  brew: brew install oranda
  nix: nix profile install nixpkgs#oranda
  scoop: scoop install extras/oranda
provenance:
  formula: oranda
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
