id: brew:fetch
display-name: fetch
homepage: https://www.gruntwork.io/
repo: https://github.com/gruntwork-io/fetch
docs: https://www.gruntwork.io/
package-manager:
  apk: fetch
  brew: fetch
  macports: fetch
  winget: MattWhitwam.Fetch
package-manager-url: https://formulae.brew.sh/formula/fetch
version: 0.4.8
license: MIT
category: development
tags:
  - cli
description: Download assets from a commit, branch, or tag of GitHub repositories
source-archive: https://github.com/gruntwork-io/fetch/archive/refs/tags/v0.4.8.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: fetch
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add fetch
  av: sudo av install brew:fetch
  brew: brew install fetch
  macports: sudo port install fetch
  winget: winget install --id MattWhitwam.Fetch -e
provenance:
  formula: fetch
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
