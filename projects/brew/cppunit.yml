id: brew:cppunit
display-name: cppunit
homepage: https://wiki.freedesktop.org/www/Software/cppunit/
repo: https://dev-www.libreoffice.org/src/cppunit-1.15.1.tar.gz
docs: https://wiki.freedesktop.org/www/Software/cppunit/
package-manager:
  apk: cppunit
  brew: cppunit
  dnf: cppunit
  macports: cppunit
  nix: cppunit
  pacman: cppunit
package-manager-url: https://formulae.brew.sh/formula/cppunit
version: 1.15.1
license: LGPL-2.1-only
category: network
tags:
  - cli
description: Unit testing framework for C++
source-archive: https://dev-www.libreoffice.org/src/cppunit-1.15.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: DllPlugInTester
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cppunit
  av: sudo av install brew:cppunit
  brew: brew install cppunit
  dnf: sudo dnf install cppunit
  macports: sudo port install cppunit
  nix: nix profile install nixpkgs#cppunit
  pacman: sudo pacman -S cppunit
provenance:
  formula: cppunit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
