id: brew:pianod
display-name: pianod
homepage: https://deviousfish.com/pianod/
repo: https://deviousfish.com/Downloads/pianod2/pianod2-420.tar.gz
docs: https://deviousfish.com/pianod/
package-manager:
  brew: pianod
  macports: pianod
package-manager-url: https://formulae.brew.sh/formula/pianod
version: 420
license: MIT
category: network
tags:
  - cli
description: Pandora client with multiple control interfaces
source-archive: https://deviousfish.com/Downloads/pianod2/pianod2-420.tar.gz
dependencies:
  - gettext
  - glib
  - gnutls
  - gstreamer
  - taglib
build-dependencies:
  - pkgconf
uses-from-macos:
  - curl
  - libxcrypt
executables:
  - exposure: global executable
    kind: cli
    name: piano
  - exposure: global executable
    kind: cli
    name: pianod
  - exposure: global executable
    kind: cli
    name: runmix
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:pianod
  brew: brew install pianod
  macports: sudo port install pianod
provenance:
  formula: pianod
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
