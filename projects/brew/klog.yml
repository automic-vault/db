id: brew:klog
display-name: klog
homepage: https://klog.jotaen.net
repo: https://github.com/jotaen/klog
docs: https://klog.jotaen.net
package-manager:
  brew: klog
  debian: klog
  dnf: klog
  macports: klog
  nix: klog
  ubuntu: klog
  winget: EA4K.KLog
  zypper: klog
package-manager-url: https://formulae.brew.sh/formula/klog
version: 7.1
license: MIT
category: development
tags:
  - cli
description: Command-line tool for time tracking in a human-readable, plain-text file format
source-archive: https://github.com/jotaen/klog/archive/refs/tags/v7.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: klog
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:klog
  brew: brew install klog
  debian: sudo apt install klog
  dnf: sudo dnf install klog
  macports: sudo port install klog
  nix: nix profile install nixpkgs#klog
  ubuntu: sudo apt install klog
  winget: winget install --id EA4K.KLog -e
  zypper: sudo zypper install klog
provenance:
  formula: klog
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
