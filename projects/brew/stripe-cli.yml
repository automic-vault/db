id: brew:stripe-cli
display-name: stripe-cli
homepage: https://docs.stripe.com/stripe-cli
repo: https://github.com/stripe/stripe-cli
docs: https://docs.stripe.com/stripe-cli
package-manager:
  brew: stripe-cli
  chocolatey: stripe-cli
  macports: stripe-cli
  nix: stripe-cli
  scoop: main/stripe-cli
  winget: Stripe.StripeCli
package-manager-url: https://formulae.brew.sh/formula/stripe-cli
version: 1.42.0
license: Apache-2.0
category: development
tags:
  - cli
description: Command-line tool for Stripe
source-archive: https://github.com/stripe/stripe-cli/archive/refs/tags/v1.42.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: stripe
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:stripe-cli
  brew: brew install stripe-cli
  chocolatey: choco install stripe-cli
  macports: sudo port install stripe-cli
  nix: nix profile install nixpkgs#stripe-cli
  scoop: scoop install main/stripe-cli
  winget: winget install --id Stripe.StripeCli -e
provenance:
  formula: stripe-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
