id: brew:dep-tree
display-name: dep-tree
homepage: https://github.com/gabotechs/dep-tree
repo: https://github.com/gabotechs/dep-tree
docs: https://github.com/gabotechs/dep-tree
package-manager:
  brew: dep-tree
  nix: dep-tree
package-manager-url: https://formulae.brew.sh/formula/dep-tree
version: 0.23.4
license: MIT
category: development
tags:
  - cli
description: Tool for visualizing dependencies between files and enforcing dependency rules
source-archive: https://github.com/gabotechs/dep-tree/archive/refs/tags/v0.23.4.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: dep-tree
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:dep-tree
  brew: brew install dep-tree
  nix: nix profile install nixpkgs#dep-tree
provenance:
  formula: dep-tree
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
