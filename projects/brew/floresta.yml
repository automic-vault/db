id: brew:floresta
display-name: floresta
homepage: https://getfloresta.org
repo: https://github.com/getfloresta/Floresta
docs: https://getfloresta.org
package-manager:
  brew: floresta
package-manager-url: https://formulae.brew.sh/formula/floresta
version: 0.9.1
license: MIT OR Apache-2.0
category: development
tags:
  - cli
description: Lightweight and embeddable Bitcoin client, built for sovereignty
source-archive: https://github.com/getfloresta/Floresta/archive/refs/tags/v0.9.1.tar.gz
build-dependencies:
  - boost
  - cmake
  - gcc
  - llvm
  - pkgconf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: floresta-cli
  - exposure: global executable
    kind: cli
    name: florestad
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:floresta
  brew: brew install floresta
provenance:
  formula: floresta
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
