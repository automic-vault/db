id: brew:elm-format
display-name: elm-format
homepage: https://github.com/avh4/elm-format
repo: https://github.com/avh4/elm-format
docs: https://github.com/avh4/elm-format
package-manager:
  brew: elm-format
package-manager-url: https://formulae.brew.sh/formula/elm-format
version: 0.8.8
license: BSD-3-Clause
category: development
tags:
  - cli
description: Elm source code formatter, inspired by gofmt
source-archive: https://github.com/avh4/elm-format.git
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc
  - hpack
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: elm-format
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:elm-format
  brew: brew install elm-format
provenance:
  formula: elm-format
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
