id: brew:termusic
display-name: termusic
homepage: https://github.com/tramhao/termusic
repo: https://github.com/tramhao/termusic
docs: https://github.com/tramhao/termusic
package-manager:
  brew: termusic
  macports: termusic
  nix: termusic
  pacman: termusic
  scoop: main/termusic
package-manager-url: https://formulae.brew.sh/formula/termusic
version: 0.13.2
license: MIT AND GPL-3.0-or-later
category: development
tags:
  - cli
description: Music Player TUI written in Rust
source-archive: https://github.com/tramhao/termusic/archive/refs/tags/v0.13.2.tar.gz
dependencies:
  - opus
build-dependencies:
  - pkgconf
  - protobuf
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: termusic
  - exposure: global executable
    kind: cli
    name: termusic-server
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:termusic
  brew: brew install termusic
  macports: sudo port install termusic
  nix: nix profile install nixpkgs#termusic
  pacman: sudo pacman -S termusic
  scoop: scoop install main/termusic
provenance:
  formula: termusic
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
