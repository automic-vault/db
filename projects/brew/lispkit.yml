id: brew:lispkit
display-name: lispkit
homepage: https://lisppad.app
repo: https://github.com/objecthub/swift-lispkit
docs: https://lisppad.app
package-manager:
  brew: lispkit
package-manager-url: https://formulae.brew.sh/formula/lispkit
version: 2.6.1
license: Apache-2.0
category: development
tags:
  - cli
description: Scheme framework for extension and scripting languages on macOS and iOS
source-archive: https://github.com/objecthub/swift-lispkit/archive/refs/tags/2.6.1.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: lispkit
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:lispkit
  brew: brew install lispkit
provenance:
  formula: lispkit
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
