id: brew:mtm
display-name: mtm
homepage: https://github.com/deadpixi/mtm
repo: https://github.com/deadpixi/mtm
docs: https://github.com/deadpixi/mtm
package-manager:
  apk: mtm
  brew: mtm
  macports: mtm
  nix: mtm
package-manager-url: https://formulae.brew.sh/formula/mtm
version: 1.2.1
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: Micro terminal multiplexer
source-archive: https://github.com/deadpixi/mtm/archive/refs/tags/1.2.1/1.2.1.tar.gz
dependencies:
  - ncurses
executables:
  - exposure: global executable
    kind: cli
    name: mtm
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mtm
  av: sudo av install brew:mtm
  brew: brew install mtm
  macports: sudo port install mtm
  nix: nix profile install nixpkgs#mtm
provenance:
  formula: mtm
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
