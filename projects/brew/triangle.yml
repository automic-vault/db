id: brew:triangle
display-name: triangle
homepage: https://github.com/esimov/triangle
repo: https://github.com/esimov/triangle
docs: https://github.com/esimov/triangle
package-manager:
  brew: triangle
  macports: triangle
package-manager-url: https://formulae.brew.sh/formula/triangle
version: 2.0.0
license: MIT
category: development
tags:
  - cli
description: Convert images to computer generated art using Delaunay triangulation
source-archive: https://github.com/esimov/triangle/archive/refs/tags/v2.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: triangle
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:triangle
  brew: brew install triangle
  macports: sudo port install triangle
provenance:
  formula: triangle
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
