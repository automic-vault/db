id: brew:ifuse
display-name: ifuse
homepage: https://libimobiledevice.org/
repo: https://github.com/libimobiledevice/ifuse
docs: https://libimobiledevice.org/
package-manager:
  apk: ifuse
  brew: ifuse
  debian: ifuse
  dnf: ifuse
  macports: ifuse
  nix: ifuse
  pacman: ifuse
  ubuntu: ifuse
  zypper: ifuse
package-manager-url: https://formulae.brew.sh/formula/ifuse
version: 1.2.1
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: FUSE module for iOS devices
source-archive: https://github.com/libimobiledevice/ifuse/archive/refs/tags/1.2.1.tar.gz
dependencies:
  - glib
  - libfuse
  - libimobiledevice
  - libplist
build-dependencies:
  - autoconf
  - automake
  - libtool
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: ifuse
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add ifuse
  av: sudo av install brew:ifuse
  brew: brew install ifuse
  debian: sudo apt install ifuse
  dnf: sudo dnf install ifuse
  macports: sudo port install ifuse
  nix: nix profile install nixpkgs#ifuse
  pacman: sudo pacman -S ifuse
  ubuntu: sudo apt install ifuse
  zypper: sudo zypper install ifuse
provenance:
  formula: ifuse
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
