id: brew:lavinmq
display-name: lavinmq
homepage: https://lavinmq.com
repo: https://github.com/cloudamqp/lavinmq
docs: https://lavinmq.com
package-manager:
  brew: lavinmq
package-manager-url: https://formulae.brew.sh/formula/lavinmq
version: 2.8.1
license: Apache-2.0
category: cloud
tags:
  - cli
description: Message broker implementing the AMQP 0-9-1 and MQTT protocols
source-archive: https://github.com/cloudamqp/lavinmq/archive/refs/tags/v2.8.1.tar.gz
dependencies:
  - bdw-gc
  - lz4
  - openssl@3
  - pcre2
build-dependencies:
  - coreutils
  - crystal
  - help2man
executables:
  - exposure: global executable
    kind: cli
    name: lavinmq
  - exposure: global executable
    kind: cli
    name: lavinmqctl
  - exposure: global executable
    kind: cli
    name: lavinmqperf
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:lavinmq
  brew: brew install lavinmq
provenance:
  formula: lavinmq
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
