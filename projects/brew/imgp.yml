id: brew:imgp
display-name: imgp
homepage: https://github.com/jarun/imgp
repo: https://github.com/jarun/imgp
docs: https://github.com/jarun/imgp
package-manager:
  brew: imgp
  debian: imgp
  dnf: imgp
  nix: imgp
  ubuntu: imgp
  zypper: imgp
package-manager-url: https://formulae.brew.sh/formula/imgp
version: 2.9
license: GPL-3.0-or-later
category: development
tags:
  - cli
description: High-performance CLI batch image resizer & rotator
source-archive: https://github.com/jarun/imgp/archive/refs/tags/v2.9.tar.gz
dependencies:
  - pillow
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: imgp
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:imgp
  brew: brew install imgp
  debian: sudo apt install imgp
  dnf: sudo dnf install imgp
  nix: nix profile install nixpkgs#imgp
  ubuntu: sudo apt install imgp
  zypper: sudo zypper install imgp
provenance:
  formula: imgp
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
