id: brew:partio
display-name: partio
homepage: https://github.com/wdas/partio
repo: https://github.com/wdas/partio
docs: https://github.com/wdas/partio
package-manager:
  brew: partio
  dnf: partio
  macports: partio
  nix: partio
  zypper: partio
package-manager-url: https://formulae.brew.sh/formula/partio
version: 1.20.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Particle library for 3D graphics
source-archive: https://github.com/wdas/partio/archive/refs/tags/v1.20.0.tar.gz
dependencies:
  - python@3.14
build-dependencies:
  - cmake
  - doxygen
executables:
  - exposure: global executable
    kind: cli
    name: partattr
  - exposure: global executable
    kind: cli
    name: partconvert
  - exposure: global executable
    kind: cli
    name: partedit
  - exposure: global executable
    kind: cli
    name: partinfo
  - exposure: global executable
    kind: cli
    name: partinspect
  - exposure: global executable
    kind: cli
    name: partjson
  - exposure: global executable
    kind: cli
    name: partview
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:partio
  brew: brew install partio
  dnf: sudo dnf install partio
  macports: sudo port install partio
  nix: nix profile install nixpkgs#partio
  zypper: sudo zypper install partio
provenance:
  formula: partio
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
