id: brew:nnn
display-name: nnn
homepage: https://github.com/jarun/nnn
repo: https://github.com/jarun/nnn
docs: https://github.com/jarun/nnn
package-manager:
  apk: nnn
  brew: nnn
  debian: nnn
  dnf: nnn
  macports: nnn
  nix: nnn
  pacman: nnn
  ubuntu: nnn
  zypper: nnn
package-manager-url: https://formulae.brew.sh/formula/nnn
version: 5.2
license: BSD-2-Clause
category: development
tags:
  - cli
description: Tiny, lightning fast, feature-packed file manager
source-archive: https://github.com/jarun/nnn/archive/refs/tags/v5.2.tar.gz
dependencies:
  - gnu-sed
  - ncurses
  - readline
executables:
  - exposure: global executable
    kind: cli
    name: nnn
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nnn
  av: sudo av install brew:nnn
  brew: brew install nnn
  debian: sudo apt install nnn
  dnf: sudo dnf install nnn
  macports: sudo port install nnn
  nix: nix profile install nixpkgs#nnn
  pacman: sudo pacman -S nnn
  ubuntu: sudo apt install nnn
  zypper: sudo zypper install nnn
provenance:
  formula: nnn
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
