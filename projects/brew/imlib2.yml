id: brew:imlib2
display-name: imlib2
homepage: https://sourceforge.net/projects/enlightenment/
repo: >
  https://downloads.sourceforge.net/project/enlightenment/imlib2-src/1.12.6/imlib2-1.12.6.tar.gz
docs: https://sourceforge.net/projects/enlightenment/
package-manager:
  apk: imlib2
  brew: imlib2
  dnf: imlib2
  macports: imlib2
  nix: imlib2
  pacman: imlib2
  zypper: imlib2
package-manager-url: https://formulae.brew.sh/formula/imlib2
version: 1.12.6
license: Imlib2
category: media
tags:
  - cli
description: Image loading and rendering library
source-archive: >
  https://downloads.sourceforge.net/project/enlightenment/imlib2-src/1.12.6/imlib2-1.12.6.tar.gz
dependencies:
  - freetype
  - giflib
  - jpeg-turbo
  - libpng
  - libtiff
  - libx11
  - libxcb
  - libxext
  - xz
build-dependencies:
  - pkgconf
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: imlib2_bumpmap
  - exposure: global executable
    kind: cli
    name: imlib2_colorspace
  - exposure: global executable
    kind: cli
    name: imlib2_conv
  - exposure: global executable
    kind: cli
    name: imlib2_grab
  - exposure: global executable
    kind: cli
    name: imlib2_load
  - exposure: global executable
    kind: cli
    name: imlib2_poly
  - exposure: global executable
    kind: cli
    name: imlib2_show
  - exposure: global executable
    kind: cli
    name: imlib2_test
  - exposure: global executable
    kind: cli
    name: imlib2_view
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add imlib2
  av: sudo av install brew:imlib2
  brew: brew install imlib2
  dnf: sudo dnf install imlib2
  macports: sudo port install imlib2
  nix: nix profile install nixpkgs#imlib2
  pacman: sudo pacman -S imlib2
  zypper: sudo zypper install imlib2
provenance:
  formula: imlib2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
