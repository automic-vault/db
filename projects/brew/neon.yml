id: brew:neon
display-name: neon
homepage: https://notroj.github.io/neon/
repo: https://notroj.github.io/neon/neon-0.37.1.tar.gz
docs: https://notroj.github.io/neon/
package-manager:
  apk: neon
  brew: neon
  dnf: neon
  macports: neon
  nix: neon
  pacman: neon
package-manager-url: https://formulae.brew.sh/formula/neon
version: 0.37.1
license: LGPL-2.0-or-later
category: development
tags:
  - cli
description: HTTP and WebDAV client library with a C interface
source-archive: https://notroj.github.io/neon/neon-0.37.1.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - pkgconf
  - xmlto
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: neon-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add neon
  av: sudo av install brew:neon
  brew: brew install neon
  dnf: sudo dnf install neon
  macports: sudo port install neon
  nix: nix profile install nixpkgs#neon
  pacman: sudo pacman -S neon
provenance:
  formula: neon
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
