id: brew:xk6
display-name: xk6
homepage: https://k6.io
repo: https://github.com/grafana/xk6
docs: https://k6.io
package-manager:
  brew: xk6
  nix: xk6
package-manager-url: https://formulae.brew.sh/formula/xk6
version: 1.4.3
license: Apache-2.0
category: development
tags:
  - cli
description: Build k6 with extensions
source-archive: https://github.com/grafana/xk6/archive/refs/tags/v1.4.3.tar.gz
dependencies:
  - go
  - gosec
  - govulncheck
executables:
  - exposure: global executable
    kind: cli
    name: xk6
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:xk6
  brew: brew install xk6
  nix: nix profile install nixpkgs#xk6
provenance:
  formula: xk6
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
