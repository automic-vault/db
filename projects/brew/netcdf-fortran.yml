id: brew:netcdf-fortran
display-name: netcdf-fortran
homepage: https://www.unidata.ucar.edu/software/netcdf/
repo: https://github.com/Unidata/netcdf-fortran
docs: https://www.unidata.ucar.edu/software/netcdf/
package-manager:
  apk: netcdf-fortran
  brew: netcdf-fortran
  dnf: netcdf-fortran
  macports: netcdf-fortran
  pacman: netcdf-fortran
package-manager-url: https://formulae.brew.sh/formula/netcdf-fortran
version: 4.6.2
license: NetCDF
category: development
tags:
  - cli
description: Fortran libraries and utilities for NetCDF
source-archive: https://github.com/Unidata/netcdf-fortran/archive/refs/tags/v4.6.2.tar.gz
dependencies:
  - gcc
  - netcdf
build-dependencies:
  - cmake
  - hdf5
executables:
  - exposure: global executable
    kind: cli
    name: nf-config
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add netcdf-fortran
  av: sudo av install brew:netcdf-fortran
  brew: brew install netcdf-fortran
  dnf: sudo dnf install netcdf-fortran
  macports: sudo port install netcdf-fortran
  pacman: sudo pacman -S netcdf-fortran
provenance:
  formula: netcdf-fortran
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
