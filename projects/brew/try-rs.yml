id: brew:try-rs
display-name: try-rs
homepage: https://try-rs.org/
repo: https://github.com/tassiovirginio/try-rs
docs: https://try-rs.org/
package-manager:
  brew: try-rs
package-manager-url: https://formulae.brew.sh/formula/try-rs
version: 1.7.9
license: MIT
category: development
tags:
  - cli
description: Temporary workspace manager for fast experimentation in the terminal
source-archive: https://github.com/tassiovirginio/try-rs/archive/refs/tags/v1.7.9.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: try-rs
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:try-rs
  brew: brew install try-rs
provenance:
  formula: try-rs
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
