id: brew:dbus
display-name: dbus
homepage: https://wiki.freedesktop.org/www/Software/dbus
repo: https://dbus.freedesktop.org/releases/dbus/dbus-1.16.2.tar.xz
docs: https://wiki.freedesktop.org/www/Software/dbus
package-manager:
  apk: dbus
  brew: dbus
  debian: dbus
  dnf: dbus
  macports: dbus
  nix: dbus
  pacman: dbus
  ubuntu: dbus
package-manager-url: https://formulae.brew.sh/formula/dbus
version: 1.16.2
license: AFL-2.1 OR GPL-2.0-or-later
category: network
tags:
  - cli
description: Message bus system, providing inter-application communication
source-archive: https://dbus.freedesktop.org/releases/dbus/dbus-1.16.2.tar.xz
build-dependencies:
  - docbook
  - docbook-xsl
  - meson
  - ninja
  - pkgconf
  - xmlto
uses-from-macos:
  - expat
executables:
  - exposure: global executable
    kind: cli
    name: dbus-cleanup-sockets
  - exposure: global executable
    kind: cli
    name: dbus-daemon
  - exposure: global executable
    kind: cli
    name: dbus-launch
  - exposure: global executable
    kind: cli
    name: dbus-monitor
  - exposure: global executable
    kind: cli
    name: dbus-run-session
  - exposure: global executable
    kind: cli
    name: dbus-send
  - exposure: global executable
    kind: cli
    name: dbus-test-tool
  - exposure: global executable
    kind: cli
    name: dbus-update-activation-environment
  - exposure: global executable
    kind: cli
    name: dbus-uuidgen
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: >
    To start the session bus now and at login: brew services start dbus To start the
    system bus now and on boot, install and activate the included daemon: sudo cp -f
    $(brew --prefix dbus)/org.freedesktop.dbus-system.plist /Library/LaunchDaemons sudo
    launchctl bootstrap system /Library/LaunchDaemons/org.freedesktop.dbus-system.plist
    If the daemon is already installed and running, restart it: sudo launchctl kickstart
    -k system/org.freedesktop.dbus-system
  post-install-defined: true
  service: declared
install-lines:
  apk: sudo apk add dbus
  av: sudo av install brew:dbus
  brew: brew install dbus
  debian: sudo apt install dbus
  dnf: sudo dnf install dbus
  macports: sudo port install dbus
  nix: nix profile install nixpkgs#dbus
  pacman: sudo pacman -S dbus
  ubuntu: sudo apt install dbus
provenance:
  formula: dbus
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
