id: brew:hindent
display-name: hindent
homepage: https://github.com/mihaimaruseac/hindent
repo: https://github.com/mihaimaruseac/hindent
docs: https://github.com/mihaimaruseac/hindent
package-manager:
  brew: hindent
  macports: hindent
  pacman: hindent
  ubuntu: hindent
package-manager-url: https://formulae.brew.sh/formula/hindent
version: 6.3.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Haskell pretty printer
source-archive: https://github.com/mihaimaruseac/hindent/archive/refs/tags/v6.3.0.tar.gz
dependencies:
  - gmp
build-dependencies:
  - cabal-install
  - ghc@9.12
uses-from-macos:
  - libffi
executables:
  - exposure: global executable
    kind: cli
    name: hindent
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:hindent
  brew: brew install hindent
  macports: sudo port install hindent
  pacman: sudo pacman -S hindent
  ubuntu: sudo apt install hindent
provenance:
  formula: hindent
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
