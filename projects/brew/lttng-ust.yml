id: brew:lttng-ust
display-name: lttng-ust
homepage: https://lttng.org/
repo: https://lttng.org/files/lttng-ust/lttng-ust-2.15.0.tar.bz2
docs: https://lttng.org/
package-manager:
  apk: lttng-ust
  brew: lttng-ust
  dnf: lttng-ust
  nix: lttng-ust
  pacman: lttng-ust
package-manager-url: https://formulae.brew.sh/formula/lttng-ust
version: 2.15.0
license: >
  LGPL-2.1-only AND MIT AND GPL-2.0-only AND BSD-3-Clause AND BSD-2-Clause AND
  GPL-3.0-or-later
category: network
tags:
  - cli
description: Linux Trace Toolkit Next Generation Userspace Tracer
source-archive: https://lttng.org/files/lttng-ust/lttng-ust-2.15.0.tar.bz2
dependencies:
  - numactl
  - userspace-rcu
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: lttng-gen-tp
bottle:
  available: true
  platforms:
    - arm64_linux
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add lttng-ust
  av: sudo av install brew:lttng-ust
  brew: brew install lttng-ust
  dnf: sudo dnf install lttng-ust
  nix: nix profile install nixpkgs#lttng-ust
  pacman: sudo pacman -S lttng-ust
provenance:
  formula: lttng-ust
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
