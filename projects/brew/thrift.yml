id: brew:thrift
display-name: thrift
homepage: https://thrift.apache.org/
repo: https://www.apache.org/dyn/closer.lua?path=thrift/0.23.0/thrift-0.23.0.tar.gz
docs: https://thrift.apache.org/
package-manager:
  apk: thrift
  brew: thrift
  dnf: thrift
  macports: thrift
  nix: thrift
  pacman: thrift
  scoop: main/thrift
  zypper: thrift
package-manager-url: https://formulae.brew.sh/formula/thrift
version: 0.23.0
license: Apache-2.0
category: development
tags:
  - cli
description: Framework for scalable cross-language services development
source-archive: https://www.apache.org/dyn/closer.lua?path=thrift/0.23.0/thrift-0.23.0.tar.gz
dependencies:
  - openssl@3
build-dependencies:
  - bison
  - boost
executables:
  - exposure: global executable
    kind: cli
    name: thrift
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add thrift
  av: sudo av install brew:thrift
  brew: brew install thrift
  dnf: sudo dnf install thrift
  macports: sudo port install thrift
  nix: nix profile install nixpkgs#thrift
  pacman: sudo pacman -S thrift
  scoop: scoop install main/thrift
  zypper: sudo zypper install thrift
provenance:
  formula: thrift
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
