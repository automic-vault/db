id: brew:intercal
display-name: intercal
homepage: http://catb.org/~esr/intercal/
repo: http://catb.org/~esr/intercal/intercal-0.34.tar.gz
docs: http://catb.org/~esr/intercal/
package-manager:
  brew: intercal
  debian: intercal
  nix: intercal
  ubuntu: intercal
package-manager-url: https://formulae.brew.sh/formula/intercal
version: 0.34
license: GPL-2.0-or-later
category: development
tags:
  - cli
description: Esoteric, parody programming language
source-archive: http://catb.org/~esr/intercal/intercal-0.34.tar.gz
executables:
  - exposure: global executable
    kind: cli
    name: convickt
  - exposure: global executable
    kind: cli
    name: ick
bottle:
  available: true
  platforms:
    - arm64_linux
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:intercal
  brew: brew install intercal
  debian: sudo apt install intercal
  nix: nix profile install nixpkgs#intercal
  ubuntu: sudo apt install intercal
provenance:
  formula: intercal
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
