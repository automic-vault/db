id: brew:zsign
display-name: zsign
homepage: https://github.com/zhlynn/zsign
repo: https://github.com/zhlynn/zsign
docs: https://github.com/zhlynn/zsign
package-manager:
  brew: zsign
  nix: zsign
package-manager-url: https://formulae.brew.sh/formula/zsign
version: 1.0.4
license: MIT
category: development
tags:
  - cli
description: Cross-platform codesigning tool for iOS apps
source-archive: https://github.com/zhlynn/zsign/archive/refs/tags/v1.0.4.tar.gz
dependencies:
  - minizip-ng
  - openssl@3
build-dependencies:
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: zsign
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:zsign
  brew: brew install zsign
  nix: nix profile install nixpkgs#zsign
provenance:
  formula: zsign
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
