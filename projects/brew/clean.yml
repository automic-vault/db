id: brew:clean
display-name: clean
homepage: https://clean.sourceforge.net/
repo: https://downloads.sourceforge.net/project/clean/clean/3.4/clean-3.4.tar.bz2
docs: https://clean.sourceforge.net/
package-manager:
  brew: clean
  nix: clean
package-manager-url: https://formulae.brew.sh/formula/clean
version: 3.4
license: LicenseRef-Homebrew-public-domain
category: network
tags:
  - cli
description: Search for files matching a regex and delete them
source-archive: https://downloads.sourceforge.net/project/clean/clean/3.4/clean-3.4.tar.bz2
executables:
  - exposure: global executable
    kind: cli
    name: clean
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:clean
  brew: brew install clean
  nix: nix profile install nixpkgs#clean
provenance:
  formula: clean
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
