id: brew:alevin-fry
display-name: alevin-fry
homepage: https://github.com/COMBINE-lab/alevin-fry
repo: https://github.com/COMBINE-lab/alevin-fry
docs: https://github.com/COMBINE-lab/alevin-fry
package-manager:
  brew: alevin-fry
package-manager-url: https://formulae.brew.sh/formula/alevin-fry
version: 0.15.0
license: BSD-3-Clause
category: development
tags:
  - cli
description: Efficient and flexible tool for processing single-cell sequencing data
source-archive: https://github.com/COMBINE-lab/alevin-fry/archive/refs/tags/v0.15.0.tar.gz
build-dependencies:
  - cmake
  - rust
uses-from-macos:
  - bzip2
executables:
  - exposure: global executable
    kind: cli
    name: alevin-fry
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:alevin-fry
  brew: brew install alevin-fry
provenance:
  formula: alevin-fry
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
