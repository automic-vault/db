id: brew:nomino
display-name: nomino
homepage: https://github.com/yaa110/nomino
repo: https://github.com/yaa110/nomino
docs: https://github.com/yaa110/nomino
package-manager:
  brew: nomino
  macports: nomino
  nix: nomino
  scoop: main/nomino
  zypper: nomino
package-manager-url: https://formulae.brew.sh/formula/nomino
version: 1.6.4
license: Apache-2.0 OR MIT
category: development
tags:
  - cli
description: Batch rename utility
source-archive: https://github.com/yaa110/nomino/archive/refs/tags/1.6.4.tar.gz
build-dependencies:
  - rust
executables:
  - exposure: global executable
    kind: cli
    name: nomino
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:nomino
  brew: brew install nomino
  macports: sudo port install nomino
  nix: nix profile install nixpkgs#nomino
  scoop: scoop install main/nomino
  zypper: sudo zypper install nomino
provenance:
  formula: nomino
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
