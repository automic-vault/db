id: brew:nghttp2
display-name: nghttp2
homepage: https://nghttp2.org/
repo: https://github.com/nghttp2/nghttp2
docs: https://nghttp2.org/
package-manager:
  apk: nghttp2
  brew: nghttp2
  debian: nghttp2
  dnf: nghttp2
  macports: nghttp2
  nix: nghttp2
  ubuntu: nghttp2
  zypper: nghttp2
package-manager-url: https://formulae.brew.sh/formula/nghttp2
version: 1.69.0
license: MIT
category: development
tags:
  - cli
description: HTTP/2 C Library
source-archive: https://github.com/nghttp2/nghttp2/releases/download/v1.69.0/nghttp2-1.69.0.tar.gz
dependencies:
  - c-ares
  - jemalloc
  - libev
  - libnghttp2
  - openssl@3
build-dependencies:
  - pkgconf
uses-from-macos:
  - libxml2
executables:
  - exposure: global executable
    kind: cli
    name: h2load
  - exposure: global executable
    kind: cli
    name: nghttp
  - exposure: global executable
    kind: cli
    name: nghttpd
  - exposure: global executable
    kind: cli
    name: nghttpx
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add nghttp2
  av: sudo av install brew:nghttp2
  brew: brew install nghttp2
  debian: sudo apt install nghttp2
  dnf: sudo dnf install nghttp2
  macports: sudo port install nghttp2
  nix: nix profile install nixpkgs#nghttp2
  ubuntu: sudo apt install nghttp2
  zypper: sudo zypper install nghttp2
provenance:
  formula: nghttp2
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
