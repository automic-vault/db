id: brew:mmdbinspect
display-name: mmdbinspect
homepage: https://github.com/maxmind/mmdbinspect
repo: https://github.com/maxmind/mmdbinspect
docs: https://github.com/maxmind/mmdbinspect
package-manager:
  brew: mmdbinspect
  nix: mmdbinspect
package-manager-url: https://formulae.brew.sh/formula/mmdbinspect
version: 2.0.0
license: Apache-2.0 OR MIT
category: database
tags:
  - cli
description: Look up records for one or more IPs/networks in one or more .mmdb databases
source-archive: https://github.com/maxmind/mmdbinspect/archive/refs/tags/v2.0.0.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: mmdbinspect
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:mmdbinspect
  brew: brew install mmdbinspect
  nix: nix profile install nixpkgs#mmdbinspect
provenance:
  formula: mmdbinspect
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
