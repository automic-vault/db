id: brew:rancher-cli
display-name: rancher-cli
homepage: https://github.com/rancher/cli
repo: https://github.com/rancher/cli
docs: https://github.com/rancher/cli
package-manager:
  brew: rancher-cli
  macports: rancher-cli
  nix: rancher
  scoop: main/rancher-cli
  zypper: rancher-cli
package-manager-url: https://formulae.brew.sh/formula/rancher-cli
version: 2.14.1
license: Apache-2.0
category: development
tags:
  - cli
description: Unified tool to manage your Rancher server
source-archive: https://github.com/rancher/cli/archive/refs/tags/v2.14.1.tar.gz
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: rancher
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:rancher-cli
  brew: brew install rancher-cli
  macports: sudo port install rancher-cli
  nix: nix profile install nixpkgs#rancher
  scoop: scoop install main/rancher-cli
  zypper: sudo zypper install rancher-cli
provenance:
  formula: rancher-cli
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
