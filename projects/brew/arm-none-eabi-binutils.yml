id: brew:arm-none-eabi-binutils
display-name: arm-none-eabi-binutils
homepage: https://www.gnu.org/software/binutils/
repo: https://ftpmirror.gnu.org/gnu/binutils/binutils-2.46.0.tar.bz2
docs: https://www.gnu.org/software/binutils/
package-manager:
  brew: arm-none-eabi-binutils
  macports: arm-none-eabi-binutils
  pacman: arm-none-eabi-binutils
package-manager-url: https://formulae.brew.sh/formula/arm-none-eabi-binutils
version: 2.46.0
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: GNU Binutils for arm-none-eabi cross development
source-archive: https://ftpmirror.gnu.org/gnu/binutils/binutils-2.46.0.tar.bz2
dependencies:
  - zstd
build-dependencies:
  - pkgconf
  - texinfo
executables:
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-addr2line
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-ar
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-as
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-c++filt
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-elfedit
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-gprof
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-ld
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-ld.bfd
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-nm
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-objcopy
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-objdump
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-ranlib
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-readelf
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-size
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-strings
  - exposure: global executable
    kind: cli
    name: arm-none-eabi-strip
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:arm-none-eabi-binutils
  brew: brew install arm-none-eabi-binutils
  macports: sudo port install arm-none-eabi-binutils
  pacman: sudo pacman -S arm-none-eabi-binutils
provenance:
  formula: arm-none-eabi-binutils
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
