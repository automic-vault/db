id: brew:mapnik
display-name: mapnik
homepage: https://mapnik.org/
repo: https://github.com/mapnik/mapnik
docs: https://mapnik.org/
package-manager:
  apk: mapnik
  brew: mapnik
  dnf: mapnik
  macports: mapnik
  nix: mapnik
  pacman: mapnik
package-manager-url: https://formulae.brew.sh/formula/mapnik
version: 4.2.2
license: LGPL-2.1-or-later
category: development
tags:
  - cli
description: Toolkit for developing mapping applications
source-archive: https://github.com/mapnik/mapnik/releases/download/v4.2.2/mapnik-v4.2.2.tar.bz2
dependencies:
  - boost
  - cairo
  - freetype
  - gdal
  - harfbuzz
  - icu4c@78
  - jpeg-turbo
  - libavif
  - libpng
  - libpq
  - libtiff
  - libxml2
  - openssl@3
  - proj
  - protozero
  - sqlite
  - webp
build-dependencies:
  - cmake
  - pkgconf
executables:
  - exposure: global executable
    kind: cli
    name: geometry_to_wkb
  - exposure: global executable
    kind: cli
    name: mapnik-index
  - exposure: global executable
    kind: cli
    name: mapnik-render
  - exposure: global executable
    kind: cli
    name: pgsql2sqlite
  - exposure: global executable
    kind: cli
    name: shapeindex
  - exposure: global executable
    kind: cli
    name: svg2png
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - sonoma
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add mapnik
  av: sudo av install brew:mapnik
  brew: brew install mapnik
  dnf: sudo dnf install mapnik
  macports: sudo port install mapnik
  nix: nix profile install nixpkgs#mapnik
  pacman: sudo pacman -S mapnik
provenance:
  formula: mapnik
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
