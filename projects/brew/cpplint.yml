id: brew:cpplint
display-name: cpplint
homepage: https://pypi.org/project/cpplint/
repo: >
  https://files.pythonhosted.org/packages/c5/83/47a9e7513ba4d943a9dac2f6752b444377c91880f4f4968799b4f42d89cc/cpplint-2.0.2.tar.gz
docs: https://pypi.org/project/cpplint/
package-manager:
  apk: cpplint
  brew: cpplint
  debian: cpplint
  nix: cpplint
  ubuntu: cpplint
package-manager-url: https://formulae.brew.sh/formula/cpplint
version: 2.0.2
license: Apache-2.0
category: development
tags:
  - cli
description: Static code checker for C++
source-archive: >
  https://files.pythonhosted.org/packages/c5/83/47a9e7513ba4d943a9dac2f6752b444377c91880f4f4968799b4f42d89cc/cpplint-2.0.2.tar.gz
dependencies:
  - python@3.14
executables:
  - exposure: global executable
    kind: cli
    name: cpplint
bottle:
  available: true
  platforms:
    - all
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add cpplint
  av: sudo av install brew:cpplint
  brew: brew install cpplint
  debian: sudo apt install cpplint
  nix: nix profile install nixpkgs#cpplint
  ubuntu: sudo apt install cpplint
provenance:
  formula: cpplint
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
