id: brew:neatvi
display-name: neatvi
homepage: https://repo.or.cz/neatvi.git
repo: https://repo.or.cz/neatvi
docs: https://repo.or.cz/neatvi.git
package-manager:
  apk: neatvi
  brew: neatvi
package-manager-url: https://formulae.brew.sh/formula/neatvi
version: 19
license: ISC
category: development
tags:
  - cli
description: Clone of ex/vi for editing bidirectional utf-8 text
source-archive: https://repo.or.cz/neatvi.git
executables:
  - exposure: global executable
    kind: cli
    name: neatvi
bottle:
