install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add neatvi
  av: sudo av install brew:neatvi
  brew: brew install neatvi
provenance:
  formula: neatvi
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
