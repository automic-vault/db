id: brew:freealut
display-name: freealut
homepage: https://github.com/vancegroup/freealut
repo: https://deb.debian.org/debian/pool/main/f/freealut/freealut_1.1.0.orig.tar.gz
docs: https://github.com/vancegroup/freealut
package-manager:
  apk: freealut
  brew: freealut
  dnf: freealut
  macports: freealut
  nix: freealut
  pacman: freealut
package-manager-url: https://formulae.brew.sh/formula/freealut
version: 1.1.0
license: LGPL-2.0-only
category: development
tags:
  - cli
description: Implementation of OpenAL's ALUT standard
source-archive: https://deb.debian.org/debian/pool/main/f/freealut/freealut_1.1.0.orig.tar.gz
build-dependencies:
  - autoconf
  - automake
  - libtool
executables:
  - exposure: global executable
    kind: cli
    name: freealut-config
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - catalina
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  apk: sudo apk add freealut
  av: sudo av install brew:freealut
  brew: brew install freealut
  dnf: sudo dnf install freealut
  macports: sudo port install freealut
  nix: nix profile install nixpkgs#freealut
  pacman: sudo pacman -S freealut
provenance:
  formula: freealut
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
