id: brew:batt
display-name: batt
homepage: https://github.com/charlie0129/batt
repo: https://github.com/charlie0129/batt
docs: https://github.com/charlie0129/batt
package-manager:
  brew: batt
package-manager-url: https://formulae.brew.sh/formula/batt
version: 0.7.3
license: GPL-2.0-only
category: development
tags:
  - cli
description: Control and limit battery charging on Apple Silicon MacBooks
source-archive: https://github.com/charlie0129/batt.git
build-dependencies:
  - go
executables:
  - exposure: global executable
    kind: cli
    name: batt
bottle:
  available: true
  platforms:
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  caveats: The batt service must be running before most of batt's commands will work.
  post-install-defined: false
  service: declared
install-lines:
  av: sudo av install brew:batt
  brew: brew install batt
provenance:
  formula: batt
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
