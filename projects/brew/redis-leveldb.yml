id: brew:redis-leveldb
display-name: redis-leveldb
homepage: https://github.com/KDr2/redis-leveldb
repo: https://github.com/KDr2/redis-leveldb
docs: https://github.com/KDr2/redis-leveldb
package-manager:
  brew: redis-leveldb
package-manager-url: https://formulae.brew.sh/formula/redis-leveldb
version: 1.4
license: MIT
category: database
tags:
  - cli
description: Redis-protocol compatible frontend to leveldb
source-archive: https://github.com/KDr2/redis-leveldb/archive/refs/tags/v1.4.tar.gz
dependencies:
  - gmp
  - leveldb
  - libev
  - snappy
executables:
  - exposure: global executable
    kind: cli
    name: redis-leveldb
bottle:
  available: true
  platforms:
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:redis-leveldb
  brew: brew install redis-leveldb
provenance:
  formula: redis-leveldb
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
