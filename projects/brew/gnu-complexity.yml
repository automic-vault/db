id: brew:gnu-complexity
display-name: gnu-complexity
homepage: https://www.gnu.org/software/complexity/
repo: https://ftpmirror.gnu.org/gnu/complexity/complexity-1.13.tar.xz
docs: https://www.gnu.org/software/complexity/
package-manager:
  brew: gnu-complexity
  debian: complexity
  nix: complexity
  ubuntu: complexity
  zypper: complexity
package-manager-url: https://formulae.brew.sh/formula/gnu-complexity
version: 1.13
license: GPL-3.0-or-later
category: network
tags:
  - cli
description: Measures complexity of C source
source-archive: https://ftpmirror.gnu.org/gnu/complexity/complexity-1.13.tar.xz
dependencies:
  - autogen
build-dependencies:
  - autoconf
  - automake
executables:
  - exposure: global executable
    kind: cli
    name: complexity
  - exposure: global executable
    kind: cli
    name: cx-vs-mc
bottle:
  available: true
  platforms:
    - arm64_big_sur
    - arm64_linux
    - arm64_monterey
    - arm64_sequoia
    - arm64_sonoma
    - arm64_tahoe
    - arm64_ventura
    - big_sur
    - monterey
    - sonoma
    - ventura
    - x86_64_linux
  root-url: https://ghcr.io/v2/homebrew/core
install-behavior:
  post-install-defined: false
install-lines:
  av: sudo av install brew:gnu-complexity
  brew: brew install gnu-complexity
  debian: sudo apt install complexity
  nix: nix profile install nixpkgs#complexity
  ubuntu: sudo apt install complexity
  zypper: sudo zypper install complexity
provenance:
  formula: gnu-complexity
  provider: brew
  source: https://formulae.brew.sh/api/formula.json
