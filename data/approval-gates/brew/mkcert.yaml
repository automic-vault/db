schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: mkcert
  displayName: mkcert
  description: Simple tool to make locally trusted development certificates
  aliases: [mkcert]
  upstream:
    homepage: https://github.com/FiloSottile/mkcert
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 19
  installOnRequest: 743064
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers trust store mutation and local CA/private-key material generation.
entrypoints:
  - name: mkcert
    kind: cli
    argvGrammar: mkcert-options
unknownCommandPolicy:
  relaxed: allow
  normal: notify
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: mkcert.install
    description: Install the local CA into system or browser trust stores.
    entrypoint: mkcert
    match:
      argv:
        contains: "-install"
    consequences:
      - type: trust_policy_change
      - type: system_write
      - type: credential_issue
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Installs a local CA into trust stores.
  - id: mkcert.uninstall
    description: Remove the local CA from trust stores.
    entrypoint: mkcert
    match:
      argv:
        contains: "-uninstall"
    consequences:
      - type: trust_policy_change
      - type: system_write
      - type: auth_boundary_change
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Removes a local CA from trust stores.
  - id: mkcert.generate
    description: Generate local certificates and private keys.
    entrypoint: mkcert
    match:
      argv:
        positional:
          index: 0
          matches: ".+"
    consequences:
      - type: credential_issue
      - type: local_write
      - type: secret_read
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Generates local certificate and key files.
  - id: mkcert.output-paths
    description: Write certificate or key files to caller-specified paths.
    entrypoint: mkcert
    composition: merge
    match:
      argv:
        containsAny: ["-cert-file", "-key-file", "-p12-file", "-client"]
    consequences:
      - type: local_write
      - type: secret_read
      - type: credential_issue
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Writes certificate material to explicit paths.

