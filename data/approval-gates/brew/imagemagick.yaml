schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: imagemagick
  displayName: ImageMagick
  description: Tools and libraries to manipulate images in select formats
  aliases: [magick, convert, mogrify, identify]
  upstream:
    homepage: https://imagemagick.org/index.php
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 14
  installOnRequest: 801526
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers in-place overwrites, file indirection reads, and remote resource access.
entrypoints:
  - name: magick
    kind: cli
    argvGrammar: imagemagick-options
  - name: convert
    kind: cli
    argvGrammar: imagemagick-options
  - name: mogrify
    kind: cli
    argvGrammar: imagemagick-options
  - name: identify
    kind: cli
    argvGrammar: imagemagick-options
unknownCommandPolicy:
  relaxed: allow
  normal: notify
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: imagemagick.mogrify
    description: Rewrite image files in place.
    entrypoint: mogrify
    match:
      argv:
        positional:
          index: 0
          matches: ".+"
    consequences:
      - type: local_overwrite
      - type: local_write
      - type: bulk
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Rewrites image files in place.
  - id: imagemagick.output.write
    description: Write converted image output.
    entrypoint: magick
    match:
      argv:
        positional:
          index: -1
          matches: "^[^:-].+"
    consequences:
      - type: local_write
      - type: local_overwrite
    severity: medium
    confidence: medium
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Writes image output.
  - id: imagemagick.write-option
    description: Write additional images using -write.
    entrypoint: magick
    match:
      argv:
        contains: "-write"
    consequences:
      - type: local_write
      - type: local_overwrite
      - type: bulk
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Writes additional image outputs.
  - id: imagemagick.file-indirection
    description: Read a file through ImageMagick @file syntax.
    entrypoint: magick
    match:
      argv:
        positional:
          index: 0
          matches: "@.+"
    consequences:
      - type: local_read
      - type: secret_read
    severity: high
    confidence: medium
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Reads local files through @file syntax.
  - id: imagemagick.remote-input
    description: Fetch image input from a remote URL.
    entrypoint: magick
    match:
      argv:
        positional:
          index: 0
          matches: "^(http|https|ftp)://"
    consequences:
      - type: network_read
      - type: local_write
    severity: medium
    confidence: medium
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Reads image input from a remote URL.

