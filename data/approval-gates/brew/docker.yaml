schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: docker
  displayName: Docker CLI
  description: Pack, ship and run any application as a lightweight container
  aliases: [docker]
  upstream:
    homepage: https://www.docker.com/
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 18
  installOnRequest: 756811
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers registry credentials, image publishing, privileged containers, host mounts, and destructive cleanup.
entrypoints:
  - name: docker
    kind: cli
    argvGrammar: positional-subcommands
unknownCommandPolicy:
  relaxed: notify
  normal: approve_once
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: docker.login
    description: Store registry credentials.
    entrypoint: docker
    match:
      argv:
        startsWith: ["login"]
    consequences:
      - type: credential_issue
      - type: auth_boundary_change
      - type: local_write
      - type: identity_use
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Changes Docker registry credentials.
  - id: docker.push
    description: Push an image to a registry.
    entrypoint: docker
    match:
      argv:
        startsWith: ["push"]
    consequences:
      - type: publish
        resource: container.image
      - type: remote_write
      - type: supply_chain_mutation
      - type: identity_use
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Pushes a container image.
  - id: docker.run.privileged
    description: Run a container with elevated host privileges.
    entrypoint: docker
    match:
      all:
        - argv:
            startsWith: ["run"]
        - argv:
            contains: "--privileged"
    consequences:
      - type: permission_change
      - type: system_write
      - type: local_execute
      - type: identity_use
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Runs a privileged container.
  - id: docker.run.host-mount
    description: Mount host paths into a container.
    entrypoint: docker
    match:
      all:
        - argv:
            startsWith: ["run"]
        - argv:
            containsAny: ["-v", "--volume", "--mount"]
    consequences:
      - type: local_read
      - type: local_write
      - type: secret_read
      - type: secret_egress
      - type: system_write
    severity: critical
    confidence: medium
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Mounts host paths into a container.
  - id: docker.rm.force
    description: Force-remove containers, images, volumes, networks, or system data.
    entrypoint: docker
    match:
      any:
        - argv: {startsWith: ["rm", "-f"]}
        - argv: {startsWith: ["rmi"]}
        - argv: {startsWith: ["volume", "rm"]}
        - argv: {startsWith: ["network", "rm"]}
        - argv: {startsWith: ["system", "prune"]}
    consequences:
      - type: local_delete
      - type: bulk
      - type: irreversible
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Deletes Docker resources.
  - id: docker.exec
    description: Execute a command inside a running container.
    entrypoint: docker
    match:
      argv:
        startsWith: ["exec"]
    consequences:
      - type: remote_execute
      - type: local_execute
      - type: secret_egress
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Executes a command inside a container.

