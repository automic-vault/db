schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: cmake
  displayName: CMake
  description: Cross-platform make
  aliases: [cmake, ctest, cpack]
  upstream:
    homepage: https://www.cmake.org/
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 7
  installOnRequest: 1223308
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers script execution, build execution, install writes, package generation, and test execution.
entrypoints:
  - name: cmake
    kind: cli
    argvGrammar: cmake-options
  - name: ctest
    kind: cli
    argvGrammar: positional-subcommands
  - name: cpack
    kind: cli
    argvGrammar: positional-subcommands
unknownCommandPolicy:
  relaxed: allow
  normal: notify
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: cmake.script
    description: Execute a CMake script with -P.
    entrypoint: cmake
    match:
      argv:
        contains: "-P"
    consequences:
      - type: local_execute
      - type: local_read
      - type: local_write
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Executes a CMake script.
  - id: cmake.build
    description: Invoke the configured native build tool.
    entrypoint: cmake
    match:
      argv:
        startsWith: ["--build"]
    consequences:
      - type: local_execute
      - type: local_write
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Runs a build through CMake.
  - id: cmake.install
    description: Install build outputs to a destination prefix.
    entrypoint: cmake
    match:
      any:
        - argv: {startsWith: ["--install"]}
        - all:
            - argv: {startsWith: ["--build"]}
            - argv: {containsAny: ["--target", "-t"]}
            - argv: {contains: "install"}
    consequences:
      - type: local_write
      - type: system_write
      - type: local_execute
    severity: high
    confidence: medium
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Installs build outputs.
  - id: cmake.remove
    description: Remove paths through CMake command mode.
    entrypoint: cmake
    match:
      any:
        - argv: {startsWith: ["-E", "remove"]}
        - argv: {startsWith: ["-E", "rm"]}
        - argv: {startsWith: ["-E", "remove_directory"]}
    consequences:
      - type: local_delete
      - type: recursive
      - type: irreversible
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Deletes files through CMake.
  - id: ctest.run
    description: Execute project tests.
    entrypoint: ctest
    match:
      argv:
        positional:
          index: 0
          matches: ".*"
    consequences:
      - type: local_execute
      - type: local_write
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Runs project test executables.
  - id: cpack.package
    description: Generate release packages or installers.
    entrypoint: cpack
    match:
      argv:
        positional:
          index: 0
          matches: ".*"
    consequences:
      - type: local_write
      - type: supply_chain_mutation
    severity: medium
    confidence: medium
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Creates package artifacts.

