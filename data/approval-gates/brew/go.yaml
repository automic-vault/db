schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: go
  displayName: Go
  description: Open source programming language to build simple/reliable/efficient software
  aliases: [go, gofmt]
  upstream:
    homepage: https://go.dev/
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 8
  installOnRequest: 1218093
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers module mutation, remote package execution, test execution, and persistent env changes.
entrypoints:
  - name: go
    kind: cli
    argvGrammar: positional-subcommands
  - name: gofmt
    kind: cli
    argvGrammar: gofmt-options
unknownCommandPolicy:
  relaxed: allow
  normal: notify
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: go.run
    description: Compile and run Go packages or files.
    entrypoint: go
    match:
      argv:
        startsWith: ["run"]
    consequences:
      - type: local_execute
      - type: network_read
        note: Modules may be fetched during resolution.
      - type: local_write
        note: Module and build caches may be updated.
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Compiles and runs Go code.
  - id: go.install.remote
    description: Install Go commands, often from remote module paths.
    entrypoint: go
    match:
      argv:
        startsWith: ["install"]
    consequences:
      - type: network_read
      - type: local_execute
      - type: local_write
      - type: supply_chain_mutation
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Installs Go command binaries.
  - id: go.get
    description: Change module requirements.
    entrypoint: go
    match:
      argv:
        startsWith: ["get"]
    consequences:
      - type: local_write
      - type: network_read
      - type: supply_chain_mutation
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Mutates Go module dependencies.
  - id: go.test
    description: Compile and execute tests.
    entrypoint: go
    match:
      argv:
        startsWith: ["test"]
    consequences:
      - type: local_execute
      - type: network_read
      - type: local_write
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Runs Go tests.
  - id: go.env.write
    description: Persist Go environment configuration.
    entrypoint: go
    match:
      argv:
        startsWith: ["env", "-w"]
    consequences:
      - type: local_write
      - type: auth_boundary_change
        note: GOPRIVATE, GOPROXY, and GONOSUMDB can change dependency trust behavior.
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Changes persistent Go environment settings.
  - id: go.clean.cache
    description: Delete Go build, module, fuzz, or test caches.
    entrypoint: go
    match:
      argv:
        startsWith: ["clean"]
    consequences:
      - type: local_delete
      - type: local_write
    severity: low
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Deletes Go caches or build outputs.
  - id: gofmt.write
    description: Rewrite Go source files in place.
    entrypoint: gofmt
    match:
      argv:
        contains: "-w"
    consequences:
      - type: local_overwrite
      - type: local_write
    severity: low
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Rewrites Go files in place.

