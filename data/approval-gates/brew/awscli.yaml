schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: awscli
  displayName: AWS CLI
  description: Official Amazon AWS command-line interface
  aliases: [aws]
  upstream:
    homepage: https://aws.amazon.com/cli/
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 3
  installOnRequest: 2284962
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers common credential, storage, IAM, compute, and infrastructure mutations.
entrypoints:
  - name: aws
    kind: cli
    argvGrammar: service-operation
    globals:
      options:
        - names: ["--profile"]
          value: aws.profile
        - names: ["--region"]
          value: aws.region
unknownCommandPolicy:
  relaxed: notify
  normal: approve_once
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: aws.configure.export-credentials
    description: Export AWS credentials to stdout or process environment formats.
    entrypoint: aws
    match:
      argv:
        startsWith: ["configure", "export-credentials"]
    consequences:
      - type: secret_egress
        resource: aws.credentials
      - type: credential_issue
      - type: identity_use
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Exports AWS credentials.
  - id: aws.sts.assume-role
    description: Assume an AWS role and receive temporary credentials.
    entrypoint: aws
    match:
      argv:
        startsWith: ["sts", "assume-role"]
    consequences:
      - type: credential_issue
      - type: identity_use
      - type: cross_account
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Assumes an AWS role.
  - id: aws.secretsmanager.get-secret-value
    description: Read and print a secret from AWS Secrets Manager.
    entrypoint: aws
    match:
      argv:
        startsWith: ["secretsmanager", "get-secret-value"]
    consequences:
      - type: secret_egress
        resource: aws.secret
      - type: identity_use
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Reads an AWS secret value.
  - id: aws.s3.delete
    description: Delete S3 objects or buckets.
    entrypoint: aws
    match:
      any:
        - argv: {startsWith: ["s3", "rm"]}
        - argv: {startsWith: ["s3", "rb"]}
        - argv: {startsWith: ["s3api", "delete-object"]}
        - argv: {startsWith: ["s3api", "delete-bucket"]}
    consequences:
      - type: remote_delete
        resource: aws.s3
      - type: identity_use
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Deletes S3 data.
  - id: aws.s3.recursive
    description: Recursively mutate S3 objects.
    entrypoint: aws
    composition: merge
    match:
      all:
        - argv:
            startsWith: ["s3"]
        - argv:
            contains: "--recursive"
    consequences:
      - type: recursive
      - type: bulk
      - type: remote_write
        resource: aws.s3
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Recursively mutates S3 objects.
  - id: aws.iam.access-key-mutate
    description: Create, update, or delete IAM access keys.
    entrypoint: aws
    match:
      any:
        - argv: {startsWith: ["iam", "create-access-key"]}
        - argv: {startsWith: ["iam", "update-access-key"]}
        - argv: {startsWith: ["iam", "delete-access-key"]}
    consequences:
      - type: credential_issue
      - type: auth_boundary_change
      - type: remote_write
      - type: identity_use
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Mutates IAM access keys.
  - id: aws.cloudformation.mutate
    description: Create, update, deploy, or delete CloudFormation stacks.
    entrypoint: aws
    match:
      any:
        - argv: {startsWith: ["cloudformation", "deploy"]}
        - argv: {startsWith: ["cloudformation", "create-stack"]}
        - argv: {startsWith: ["cloudformation", "update-stack"]}
        - argv: {startsWith: ["cloudformation", "delete-stack"]}
    consequences:
      - type: remote_write
      - type: cost_commit
      - type: production
      - type: identity_use
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Mutates AWS infrastructure stacks.
  - id: aws.lambda.invoke
    description: Invoke AWS Lambda functions.
    entrypoint: aws
    match:
      argv:
        startsWith: ["lambda", "invoke"]
    consequences:
      - type: remote_execute
      - type: cost_commit
      - type: identity_use
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Invokes an AWS Lambda function.

