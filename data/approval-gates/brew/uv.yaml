schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: uv
  displayName: uv
  description: Extremely fast Python package installer and resolver, written in Rust
  aliases: [uv, uvx]
  upstream:
    homepage: https://docs.astral.sh/uv/
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 6
  installOnRequest: 1446687
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers package publishing, environment mutation, tool execution, and lockfile changes.
entrypoints:
  - name: uv
    kind: cli
    argvGrammar: positional-subcommands
  - name: uvx
    kind: cli
    argvGrammar: package-runner
unknownCommandPolicy:
  relaxed: allow
  normal: notify
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: uv.publish
    description: Publish distributions to a Python package index.
    entrypoint: uv
    match:
      argv:
        startsWith: ["publish"]
    consequences:
      - type: publish
        resource: python.package
      - type: remote_write
      - type: supply_chain_mutation
      - type: identity_use
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Publishes Python package artifacts.
  - id: uv.pip.install
    description: Install Python packages into an environment.
    entrypoint: uv
    match:
      argv:
        startsWith: ["pip", "install"]
    consequences:
      - type: local_write
      - type: local_execute
        note: Build backends and install hooks can execute code.
      - type: network_read
      - type: supply_chain_mutation
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Installs Python packages.
  - id: uv.pip.uninstall
    description: Remove Python packages from an environment.
    entrypoint: uv
    match:
      argv:
        startsWith: ["pip", "uninstall"]
    consequences:
      - type: local_delete
      - type: supply_chain_mutation
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Uninstalls Python packages.
  - id: uv.run
    description: Resolve dependencies and execute a command or script.
    entrypoint: uv
    match:
      argv:
        startsWith: ["run"]
    consequences:
      - type: local_execute
      - type: network_read
      - type: local_write
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Executes code through uv.
  - id: uv.sync
    description: Synchronize an environment to lockfile or project metadata.
    entrypoint: uv
    match:
      argv:
        startsWith: ["sync"]
    consequences:
      - type: local_write
      - type: local_delete
      - type: network_read
      - type: supply_chain_mutation
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Mutates a Python environment.
  - id: uvx.execute
    description: Download and execute a Python tool package.
    entrypoint: uvx
    match:
      argv:
        positional:
          index: 0
          matches: ".+"
    consequences:
      - type: network_read
      - type: local_execute
      - type: supply_chain_mutation
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Downloads and runs a Python tool.

