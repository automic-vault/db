schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: python@3.13
  displayName: Python 3.13
  description: Interpreted, interactive, object-oriented programming language
  aliases: [python3.13, python3, pip3.13, pip3]
  upstream:
    homepage: https://www.python.org/
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 12
  installOnRequest: 828012
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers Python execution, pip mutation, local servers, and virtual environment writes.
entrypoints:
  - name: python3.13
    kind: cli
    argvGrammar: python-options
  - name: python3
    kind: cli
    argvGrammar: python-options
  - name: pip3.13
    kind: cli
    argvGrammar: positional-subcommands
  - name: pip3
    kind: cli
    argvGrammar: positional-subcommands
unknownCommandPolicy:
  relaxed: allow
  normal: notify
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: python.command
    description: Execute inline Python code.
    entrypoint: python3.13
    match:
      argv:
        containsAny: ["-c", "-m"]
    consequences:
      - type: local_execute
      - type: local_read
      - type: network_read
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Executes Python code.
  - id: python.module.pip.install
    description: Install packages using pip as a Python module.
    entrypoint: python3.13
    match:
      argv:
        startsWith: ["-m", "pip", "install"]
    consequences:
      - type: local_write
      - type: local_execute
      - type: network_read
      - type: supply_chain_mutation
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Installs Python packages.
  - id: pip.install
    description: Install Python packages.
    entrypoint: pip3.13
    match:
      argv:
        startsWith: ["install"]
    consequences:
      - type: local_write
      - type: local_execute
      - type: network_read
      - type: supply_chain_mutation
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Installs Python packages.
  - id: pip.uninstall
    description: Uninstall Python packages.
    entrypoint: pip3.13
    match:
      argv:
        startsWith: ["uninstall"]
    consequences:
      - type: local_delete
      - type: supply_chain_mutation
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Uninstalls Python packages.
  - id: python.http-server
    description: Serve local files over HTTP.
    entrypoint: python3.13
    match:
      argv:
        startsWith: ["-m", "http.server"]
    consequences:
      - type: local_read
      - type: secret_egress
      - type: remote_write
        note: Exposes local files to network clients.
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Serves local files over HTTP.
  - id: python.venv
    description: Create a Python virtual environment.
    entrypoint: python3.13
    match:
      argv:
        startsWith: ["-m", "venv"]
    consequences:
      - type: local_write
      - type: supply_chain_mutation
    severity: low
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Creates a Python virtual environment.

