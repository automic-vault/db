schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: coreutils
  displayName: GNU Coreutils
  description: GNU File, Shell, and Text utilities
  aliases: [gcp, gmv, grm, gchmod, gchown, gdd, gshred, gtruncate, ginstall]
  upstream:
    homepage: https://www.gnu.org/software/coreutils/
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 10
  installOnRequest: 935374
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers destructive GNU-prefixed utilities commonly exposed by Homebrew on macOS.
entrypoints:
  - name: grm
    kind: cli
    argvGrammar: file-utility
  - name: gcp
    kind: cli
    argvGrammar: file-utility
  - name: gmv
    kind: cli
    argvGrammar: file-utility
  - name: gchmod
    kind: cli
    argvGrammar: file-utility
  - name: gchown
    kind: cli
    argvGrammar: file-utility
  - name: gdd
    kind: cli
    argvGrammar: file-utility
  - name: gshred
    kind: cli
    argvGrammar: file-utility
  - name: gtruncate
    kind: cli
    argvGrammar: file-utility
  - name: ginstall
    kind: cli
    argvGrammar: file-utility
unknownCommandPolicy:
  relaxed: allow
  normal: allow
  cautious: notify
  strict: approve_once
  locked: block
rules:
  - id: coreutils.rm
    description: Delete files or directories.
    entrypoint: grm
    match:
      argv:
        positional:
          index: 0
          matches: ".+"
    consequences:
      - type: local_delete
      - type: irreversible
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Deletes local files.
  - id: coreutils.rm.recursive
    description: Recursively delete files or directories.
    entrypoint: grm
    composition: merge
    match:
      argv:
        containsAny: ["-r", "-R", "--recursive"]
    consequences:
      - type: recursive
      - type: bulk
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Recursively deletes local files.
  - id: coreutils.copy-or-move
    description: Copy or move files, possibly overwriting destinations.
    entrypoint: gcp
    match:
      argv:
        positional:
          index: 0
          matches: ".+"
    consequences:
      - type: local_write
      - type: local_overwrite
    severity: medium
    confidence: medium
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Copies local files.
  - id: coreutils.move
    description: Move or rename files, possibly overwriting destinations.
    entrypoint: gmv
    match:
      argv:
        positional:
          index: 0
          matches: ".+"
    consequences:
      - type: local_write
      - type: local_delete
      - type: local_overwrite
    severity: high
    confidence: medium
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Moves local files.
  - id: coreutils.permission-change
    description: Change permissions or ownership.
    entrypoint: gchmod
    match:
      argv:
        positional:
          index: 0
          matches: ".+"
    consequences:
      - type: permission_change
      - type: local_write
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Changes file permissions.
  - id: coreutils.ownership-change
    description: Change file ownership.
    entrypoint: gchown
    match:
      argv:
        positional:
          index: 0
          matches: ".+"
    consequences:
      - type: permission_change
      - type: system_write
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Changes file ownership.
  - id: coreutils.dd
    description: Copy raw bytes to files or devices.
    entrypoint: gdd
    match:
      argv:
        containsAny: ["of=", "conv=notrunc"]
    consequences:
      - type: local_overwrite
      - type: system_write
      - type: irreversible
    severity: critical
    confidence: medium
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Writes raw bytes to an output target.
  - id: coreutils.shred
    description: Overwrite files to make recovery difficult.
    entrypoint: gshred
    match:
      argv:
        positional:
          index: 0
          matches: ".+"
    consequences:
      - type: local_overwrite
      - type: irreversible
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Shreds local files.

