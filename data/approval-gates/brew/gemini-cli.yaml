schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: gemini-cli
  displayName: Gemini CLI
  description: Interact with Google Gemini AI models from the command-line
  aliases: [gemini]
  upstream:
    homepage: https://github.com/google-gemini/gemini-cli
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 16
  installOnRequest: 785354
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers AI prompt egress, broad file context, approval bypass modes, and tool execution.
entrypoints:
  - name: gemini
    kind: cli
    argvGrammar: ai-agent-options
unknownCommandPolicy:
  relaxed: notify
  normal: approve_once
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: gemini.prompt
    description: Send a prompt to a remote Gemini model.
    entrypoint: gemini
    match:
      argv:
        containsAny: ["--prompt", "-p"]
    consequences:
      - type: remote_write
        resource: google.gemini.prompt
      - type: secret_egress
      - type: identity_use
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Sends prompt content to Gemini.
  - id: gemini.all-files
    description: Include broad workspace file context in a Gemini session.
    entrypoint: gemini
    match:
      argv:
        containsAny: ["--all-files", "-a"]
    consequences:
      - type: local_read
      - type: secret_read
      - type: secret_egress
      - type: bulk
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Sends broad local file context to Gemini.
  - id: gemini.yolo
    description: Run with reduced approval prompts or automatic tool execution.
    entrypoint: gemini
    match:
      any:
        - argv: {contains: "--yolo"}
        - argv: {contains: "--approval-mode=yolo"}
        - all:
            - argv: {contains: "--approval-mode"}
            - argv: {contains: "yolo"}
    consequences:
      - type: local_execute
      - type: local_write
      - type: remote_write
      - type: secret_egress
    severity: critical
    confidence: medium
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Reduces Gemini tool approval friction.
  - id: gemini.checkpointing
    description: Enable checkpointing that writes session state to disk.
    entrypoint: gemini
    match:
      argv:
        contains: "--checkpointing"
    consequences:
      - type: local_write
      - type: secret_read
        note: Session state may contain sensitive context.
    severity: medium
    confidence: medium
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Writes Gemini session checkpoints.
  - id: gemini.mcp
    description: Configure or use MCP servers from the Gemini CLI.
    entrypoint: gemini
    match:
      argv:
        containsAny: ["mcp", "--mcp-server", "--allowed-mcp-server-names"]
    consequences:
      - type: local_execute
      - type: remote_write
      - type: credential_issue
      - type: secret_egress
    severity: critical
    confidence: medium
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Uses or configures MCP tool servers.

