schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: xcbeautify
  displayName: xcbeautify
  description: Little beautifier tool for xcodebuild
  aliases: [xcbeautify]
  upstream:
    homepage: https://github.com/cpisciotta/xcbeautify
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 15
  installOnRequest: 796658
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - xcbeautify mainly transforms build logs; report writing can persist derived paths and failures.
entrypoints:
  - name: xcbeautify
    kind: cli
    argvGrammar: xcbeautify-options
unknownCommandPolicy:
  relaxed: allow
  normal: allow
  cautious: notify
  strict: approve_once
  locked: block
rules:
  - id: xcbeautify.report
    description: Write formatted test or build reports.
    entrypoint: xcbeautify
    match:
      argv:
        containsAny: ["--report", "--report-path", "--junit-report", "--quieter"]
    consequences:
      - type: local_write
      - type: secret_egress
        note: Build logs can include local paths, environment values, or signing diagnostics.
    severity: medium
    confidence: medium
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Writes derived build reports.
  - id: xcbeautify.github-actions-renderer
    description: Emit GitHub Actions annotations from build logs.
    entrypoint: xcbeautify
    match:
      argv:
        containsAny: ["--renderer", "github-actions"]
    consequences:
      - type: secret_egress
      - type: webhook_trigger
        note: CI log annotations can affect remote workflow surfaces.
    severity: medium
    confidence: low
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Emits CI annotations from build logs.

