schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: mise
  displayName: mise
  description: Polyglot runtime manager (asdf rust clone)
  aliases: [mise]
  upstream:
    homepage: https://mise.jdx.dev/
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 20
  installOnRequest: 710929
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers tool installation, trusted config, task execution, and runtime selection writes.
entrypoints:
  - name: mise
    kind: cli
    argvGrammar: positional-subcommands
unknownCommandPolicy:
  relaxed: allow
  normal: notify
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: mise.install
    description: Install runtimes or tools.
    entrypoint: mise
    match:
      argv:
        startsWith: ["install"]
    consequences:
      - type: network_read
      - type: local_execute
      - type: local_write
      - type: supply_chain_mutation
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Installs runtimes or tools.
  - id: mise.uninstall
    description: Uninstall runtimes or tools.
    entrypoint: mise
    match:
      argv:
        startsWith: ["uninstall"]
    consequences:
      - type: local_delete
      - type: supply_chain_mutation
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Uninstalls runtimes or tools.
  - id: mise.exec
    description: Execute a command inside a mise-managed environment.
    entrypoint: mise
    match:
      any:
        - argv: {startsWith: ["exec"]}
        - argv: {startsWith: ["x"]}
        - argv: {startsWith: ["run"]}
    consequences:
      - type: local_execute
      - type: secret_read
      - type: local_write
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Executes commands through mise.
  - id: mise.trust
    description: Trust project configuration.
    entrypoint: mise
    match:
      argv:
        startsWith: ["trust"]
    consequences:
      - type: trust_policy_change
      - type: local_write
      - type: local_execute
        note: Trusted config can enable future task and environment behavior.
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Trusts mise project configuration.
  - id: mise.use
    description: Change project or global runtime selection.
    entrypoint: mise
    match:
      argv:
        startsWith: ["use"]
    consequences:
      - type: local_write
      - type: supply_chain_mutation
      - type: auth_boundary_change
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Changes runtime selection.
  - id: mise.settings
    description: Persist mise settings.
    entrypoint: mise
    match:
      argv:
        startsWith: ["settings"]
    consequences:
      - type: local_write
      - type: trust_policy_change
    severity: high
    confidence: medium
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Changes mise settings.

