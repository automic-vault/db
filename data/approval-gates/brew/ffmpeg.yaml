schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: ffmpeg
  displayName: FFmpeg
  description: Play, record, convert, and stream select audio and video codecs
  aliases: [ffmpeg, ffprobe, ffplay]
  upstream:
    homepage: https://ffmpeg.org/
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 5
  installOnRequest: 1533662
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers file overwrite, streaming output, device capture, and protocol expansion.
entrypoints:
  - name: ffmpeg
    kind: cli
    argvGrammar: ffmpeg-options
  - name: ffprobe
    kind: cli
    argvGrammar: ffmpeg-options
  - name: ffplay
    kind: cli
    argvGrammar: ffmpeg-options
unknownCommandPolicy:
  relaxed: allow
  normal: notify
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: ffmpeg.output.overwrite
    description: Overwrite output files without an interactive prompt.
    entrypoint: ffmpeg
    match:
      argv:
        contains: "-y"
    consequences:
      - type: local_overwrite
      - type: local_write
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Allows FFmpeg to overwrite output files.
  - id: ffmpeg.output.network
    description: Send generated media to a network endpoint.
    entrypoint: ffmpeg
    match:
      argv:
        positional:
          index: -1
          matches: "^(rtmp|rtmps|http|https|srt|udp|tcp)://"
    consequences:
      - type: remote_write
      - type: secret_egress
        note: Media content may contain private information.
      - type: network_read
    severity: high
    confidence: medium
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Streams media to a network endpoint.
  - id: ffmpeg.capture.device
    description: Capture from local audio, video, screen, or device inputs.
    entrypoint: ffmpeg
    match:
      argv:
        containsAny: ["avfoundation", "x11grab", "gdigrab", "dshow", "alsa", "pulse"]
    consequences:
      - type: local_read
      - type: secret_egress
        note: Captured media can expose private local content.
    severity: high
    confidence: medium
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Captures local device media.
  - id: ffmpeg.protocol-whitelist
    description: Expand allowed protocols for nested media inputs.
    entrypoint: ffmpeg
    match:
      argv:
        contains: "-protocol_whitelist"
    consequences:
      - type: network_read
      - type: local_read
      - type: secret_read
    severity: high
    confidence: medium
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Expands FFmpeg protocol access.

