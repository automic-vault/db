schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: pyenv
  displayName: pyenv
  description: Python version management
  aliases: [pyenv]
  upstream:
    homepage: https://github.com/pyenv/pyenv
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 9
  installOnRequest: 998553
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers Python runtime install/delete and version selection state.
entrypoints:
  - name: pyenv
    kind: cli
    argvGrammar: positional-subcommands
unknownCommandPolicy:
  relaxed: allow
  normal: notify
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: pyenv.install
    description: Download, compile, and install a Python runtime.
    entrypoint: pyenv
    match:
      argv:
        startsWith: ["install"]
    consequences:
      - type: network_read
      - type: local_execute
      - type: local_write
      - type: supply_chain_mutation
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Installs a Python runtime.
  - id: pyenv.uninstall
    description: Delete an installed Python runtime.
    entrypoint: pyenv
    match:
      argv:
        startsWith: ["uninstall"]
    consequences:
      - type: local_delete
      - type: irreversible
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Deletes a Python runtime.
  - id: pyenv.global
    description: Change the global Python version selection.
    entrypoint: pyenv
    match:
      argv:
        startsWith: ["global"]
    consequences:
      - type: local_write
      - type: auth_boundary_change
        note: Alters which Python executable future commands resolve.
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Changes global Python selection.
  - id: pyenv.local
    description: Write a project-local Python version file.
    entrypoint: pyenv
    match:
      argv:
        startsWith: ["local"]
    consequences:
      - type: local_write
      - type: supply_chain_mutation
        note: Changes runtime resolution for this project.
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Changes project Python selection.
  - id: pyenv.exec
    description: Execute a command under pyenv shims.
    entrypoint: pyenv
    match:
      argv:
        startsWith: ["exec"]
    consequences:
      - type: local_execute
      - type: local_read
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Executes a command through pyenv.

