schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: pkgconf
  displayName: pkgconf
  description: Package compiler and linker metadata toolkit
  aliases: [pkgconf, pkg-config]
  upstream:
    homepage: https://github.com/pkgconf/pkgconf
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 11
  installOnRequest: 878381
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - pkgconf is primarily read-only metadata inspection; risk comes from path expansion and build flag egress.
entrypoints:
  - name: pkgconf
    kind: cli
    argvGrammar: pkg-config-options
  - name: pkg-config
    kind: cli
    argvGrammar: pkg-config-options
unknownCommandPolicy:
  relaxed: allow
  normal: allow
  cautious: notify
  strict: approve_once
  locked: block
rules:
  - id: pkgconf.libs-cflags
    description: Print compiler or linker flags derived from package metadata.
    entrypoint: pkgconf
    match:
      argv:
        containsAny: ["--libs", "--cflags", "--libs-only-L", "--cflags-only-I"]
    consequences:
      - type: local_read
      - type: secret_egress
        note: Build paths can expose local usernames, SDK paths, or private prefixes.
    severity: low
    confidence: high
    gate: {relaxed: allow, normal: allow, cautious: notify, strict: approve_once, locked: block}
    explain:
      summary: Prints local build metadata.
  - id: pkgconf.with-path
    description: Add caller-supplied package metadata search paths.
    entrypoint: pkgconf
    match:
      argv:
        containsAny: ["--with-path", "--define-prefix"]
    consequences:
      - type: local_read
      - type: supply_chain_mutation
        note: Build dependency resolution can be redirected.
    severity: medium
    confidence: medium
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Changes package metadata resolution paths.
  - id: pkgconf.env-path
    description: Use environment-controlled package metadata search paths.
    entrypoint: pkgconf
    composition: merge
    match:
      env:
        containsAny: ["PKG_CONFIG_PATH", "PKG_CONFIG_LIBDIR", "PKG_CONFIG_SYSROOT_DIR"]
    consequences:
      - type: local_read
      - type: supply_chain_mutation
    severity: medium
    confidence: medium
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Uses environment-controlled pkg-config paths.

