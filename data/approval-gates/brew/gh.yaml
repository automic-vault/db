schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: gh
  displayName: GitHub CLI
  description: GitHub command-line tool
  aliases: [gh]
  upstream:
    homepage: https://cli.github.com/
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 1
  installOnRequest: 2507412
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers high-risk repository, release, auth, and workflow mutations.
entrypoints:
  - name: gh
    kind: cli
    argvGrammar: positional-subcommands
    globals:
      options:
        - names: ["--repo", "-R"]
          value: github.repository
        - names: ["--hostname"]
          value: github.hostname
unknownCommandPolicy:
  relaxed: allow
  normal: notify
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: gh.auth.token
    description: Print the active GitHub authentication token.
    entrypoint: gh
    match:
      argv:
        startsWith: ["auth", "token"]
    consequences:
      - type: secret_egress
        resource: github.token
      - type: identity_use
        identity: github.account
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Prints a GitHub token.
  - id: gh.auth.login
    description: Create or refresh local GitHub authentication state.
    entrypoint: gh
    match:
      argv:
        startsWith: ["auth", "login"]
    consequences:
      - type: credential_issue
        resource: github.token
      - type: auth_boundary_change
      - type: local_write
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Changes GitHub login credentials.
  - id: gh.repo.delete
    description: Delete a GitHub repository.
    entrypoint: gh
    match:
      argv:
        startsWith: ["repo", "delete"]
    consequences:
      - type: remote_delete
        resource: github.repository
      - type: irreversible
      - type: identity_use
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Deletes a GitHub repository.
  - id: gh.repo.edit
    description: Change repository settings, visibility, topics, or metadata.
    entrypoint: gh
    match:
      argv:
        startsWith: ["repo", "edit"]
    consequences:
      - type: remote_write
        resource: github.repository
      - type: identity_use
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Changes GitHub repository settings.
  - id: gh.pr.merge
    description: Merge a pull request.
    entrypoint: gh
    match:
      argv:
        startsWith: ["pr", "merge"]
    consequences:
      - type: remote_write
        resource: github.pull_request
      - type: source_history_rewrite
        note: Squash, rebase, and admin options can alter branch history or bypass protections.
      - type: identity_use
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Merges a GitHub pull request.
  - id: gh.release.mutate
    description: Create, upload to, edit, or delete GitHub releases.
    entrypoint: gh
    match:
      any:
        - argv: {startsWith: ["release", "create"]}
        - argv: {startsWith: ["release", "upload"]}
        - argv: {startsWith: ["release", "edit"]}
        - argv: {startsWith: ["release", "delete"]}
    consequences:
      - type: publish
        resource: github.release
      - type: supply_chain_mutation
      - type: identity_use
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Mutates GitHub release artifacts.
  - id: gh.workflow.run
    description: Trigger a GitHub Actions workflow.
    entrypoint: gh
    match:
      argv:
        startsWith: ["workflow", "run"]
    consequences:
      - type: webhook_trigger
      - type: remote_execute
      - type: cost_commit
      - type: identity_use
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Triggers a GitHub Actions workflow.

