schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: jq
  displayName: jq
  description: Lightweight and flexible command-line JSON processor
  aliases: [jq]
  upstream:
    homepage: https://jqlang.github.io/jq/
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 17
  installOnRequest: 773231
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - jq is usually read-only; risk comes from reading additional files and emitting shell-escaped secret values.
entrypoints:
  - name: jq
    kind: cli
    argvGrammar: jq-options
unknownCommandPolicy:
  relaxed: allow
  normal: allow
  cautious: notify
  strict: approve_once
  locked: block
rules:
  - id: jq.slurpfile
    description: Read additional JSON data from local files.
    entrypoint: jq
    match:
      argv:
        containsAny: ["--slurpfile", "--rawfile"]
    consequences:
      - type: local_read
      - type: secret_read
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Reads additional local files.
  - id: jq.run-tests
    description: Read and execute jq test definitions.
    entrypoint: jq
    match:
      argv:
        contains: "--run-tests"
    consequences:
      - type: local_read
      - type: local_execute
        note: jq filters are interpreted programs, not native subprocesses.
    severity: low
    confidence: high
    gate: {relaxed: allow, normal: allow, cautious: notify, strict: approve_once, locked: block}
    explain:
      summary: Runs jq test programs.
  - id: jq.shell-escape
    description: Emit shell-escaped strings that may be consumed by another command.
    entrypoint: jq
    match:
      argv:
        contains: "@sh"
    consequences:
      - type: secret_egress
      - type: local_execute
        note: Downstream shell evaluation is outside jq but commonly chained.
    severity: medium
    confidence: medium
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Emits shell-escaped output.

