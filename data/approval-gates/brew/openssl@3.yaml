schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: openssl@3
  displayName: OpenSSL 3
  description: Cryptography and SSL/TLS Toolkit
  aliases: [openssl]
  upstream:
    homepage: https://openssl-library.org
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 13
  installOnRequest: 825096
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers private key generation, key material printing, certificate trust artifacts, and network TLS probes.
entrypoints:
  - name: openssl
    kind: cli
    argvGrammar: positional-subcommands
unknownCommandPolicy:
  relaxed: allow
  normal: notify
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: openssl.keygen
    description: Generate private keys or key pairs.
    entrypoint: openssl
    match:
      any:
        - argv:
            startsWith: ["genpkey"]
        - argv:
            startsWith: ["genrsa"]
        - argv:
            startsWith: ["ecparam"]
    consequences:
      - type: local_write
      - type: credential_issue
      - type: secret_read
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Generates private key material.
  - id: openssl.private-key-text
    description: Print private key details in text form.
    entrypoint: openssl
    match:
      all:
        - any:
            - argv:
                startsWith: ["rsa"]
            - argv:
                startsWith: ["pkey"]
            - argv:
                startsWith: ["ec"]
        - argv:
            contains: "-text"
    consequences:
      - type: secret_egress
        resource: private_key
      - type: local_read
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Prints private key material.
  - id: openssl.pkcs12.export
    description: Export certificates and keys into PKCS#12 bundles.
    entrypoint: openssl
    match:
      all:
        - argv:
            startsWith: ["pkcs12"]
        - argv:
            contains: "-export"
    consequences:
      - type: secret_read
      - type: secret_egress
      - type: local_write
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Exports key material to a PKCS#12 bundle.
  - id: openssl.s-client
    description: Connect to a remote TLS service and print handshake material.
    entrypoint: openssl
    match:
      argv:
        startsWith: ["s_client"]
    consequences:
      - type: network_read
      - type: secret_egress
        note: Client certificate and key options can send identity material.
      - type: identity_use
    severity: medium
    confidence: medium
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Connects to a remote TLS service.
  - id: openssl.enc.out
    description: Encrypt or decrypt data to an output file.
    entrypoint: openssl
    match:
      all:
        - argv:
            startsWith: ["enc"]
        - argv:
            contains: "-out"
    consequences:
      - type: local_write
      - type: local_overwrite
      - type: secret_read
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Writes encrypted or decrypted output.
