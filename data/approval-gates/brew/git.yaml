schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: git
  displayName: Git
  description: Distributed revision control system
  aliases: [git]
  upstream:
    homepage: https://git-scm.com
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 4
  installOnRequest: 1575630
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers history rewrite, remote writes, destructive local cleanup, and credential helper surfaces.
entrypoints:
  - name: git
    kind: cli
    argvGrammar: positional-subcommands
unknownCommandPolicy:
  relaxed: allow
  normal: allow
  cautious: notify
  strict: approve_once
  locked: block
rules:
  - id: git.push
    description: Push commits, tags, or refs to a remote repository.
    entrypoint: git
    match:
      argv:
        startsWith: ["push"]
    consequences:
      - type: remote_write
        resource: git.remote
      - type: identity_use
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Pushes to a Git remote.
  - id: git.push.force
    description: Force-push or delete remote refs.
    entrypoint: git
    composition: merge
    match:
      all:
        - argv:
            startsWith: ["push"]
        - argv:
            containsAny: ["--force", "-f", "--force-with-lease", "--mirror", "--delete"]
    consequences:
      - type: source_history_rewrite
      - type: remote_delete
      - type: irreversible
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Rewrites or deletes remote Git refs.
  - id: git.reset.hard
    description: Reset local worktree and index destructively.
    entrypoint: git
    match:
      all:
        - argv:
            startsWith: ["reset"]
        - argv:
            contains: "--hard"
    consequences:
      - type: local_delete
      - type: local_overwrite
      - type: irreversible
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Destructively resets local files.
  - id: git.clean.force
    description: Delete untracked files from the worktree.
    entrypoint: git
    match:
      all:
        - argv:
            startsWith: ["clean"]
        - argv:
            containsAny: ["-f", "--force", "-ff"]
    consequences:
      - type: local_delete
      - type: irreversible
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Deletes untracked local files.
  - id: git.credential
    description: Read, approve, reject, or fill credentials through Git credential helpers.
    entrypoint: git
    match:
      argv:
        startsWith: ["credential"]
    consequences:
      - type: secret_read
      - type: secret_egress
      - type: auth_boundary_change
    severity: critical
    confidence: medium
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Uses Git credential helper state.
  - id: git.config.credential-helper
    description: Change credential helper configuration.
    entrypoint: git
    match:
      all:
        - argv:
            startsWith: ["config"]
        - argv:
            contains: "credential.helper"
    consequences:
      - type: auth_boundary_change
      - type: local_write
      - type: secret_egress
        note: A malicious helper can capture future credentials.
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Changes Git credential helper behavior.

