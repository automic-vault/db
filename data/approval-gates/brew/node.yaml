schemaVersion: package-approval-manifest.v0
package:
  namespace: brew
  name: node
  displayName: Node.js
  description: Open-source, cross-platform JavaScript runtime environment
  aliases: [node, npm, npx, corepack]
  upstream:
    homepage: https://nodejs.org/
analytics:
  source: https://formulae.brew.sh/api/analytics/install-on-request/365d.json
  period: 365d
  rank: 2
  installOnRequest: 2495502
coverage:
  status: partial
  reviewedAt: "2026-05-21"
  notes:
    - Covers Node runtime execution and bundled npm/npx supply-chain actions.
entrypoints:
  - name: node
    kind: cli
    argvGrammar: node-options-script
  - name: npm
    kind: cli
    argvGrammar: positional-subcommands
  - name: npx
    kind: cli
    argvGrammar: package-runner
  - name: corepack
    kind: cli
    argvGrammar: positional-subcommands
unknownCommandPolicy:
  relaxed: allow
  normal: notify
  cautious: approve_once
  strict: approve_once
  locked: block
rules:
  - id: node.eval
    description: Execute inline JavaScript supplied on the command line.
    entrypoint: node
    match:
      argv:
        containsAny: ["-e", "--eval", "--print", "-p"]
    consequences:
      - type: local_execute
      - type: local_read
      - type: network_read
        note: JavaScript can open network connections.
    severity: medium
    confidence: high
    gate: {relaxed: allow, normal: notify, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Executes inline JavaScript.
  - id: node.loader
    description: Load custom import hooks or require hooks before executing code.
    entrypoint: node
    match:
      argv:
        containsAny: ["--loader", "--experimental-loader", "--require", "-r", "--import"]
    consequences:
      - type: local_execute
      - type: local_read
      - type: supply_chain_mutation
        note: Hooks can alter module loading and executed code.
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Runs Node.js with preloaded code hooks.
  - id: npm.publish
    description: Publish a package to the npm registry.
    entrypoint: npm
    match:
      argv:
        startsWith: ["publish"]
    consequences:
      - type: publish
        resource: npm.package
      - type: remote_write
      - type: supply_chain_mutation
      - type: identity_use
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Publishes a package to npm.
  - id: npm.install.global
    description: Install npm packages into a global executable location.
    entrypoint: npm
    match:
      all:
        - argv:
            containsAny: ["install", "i", "add"]
        - argv:
            containsAny: ["--global", "-g"]
    consequences:
      - type: system_write
      - type: local_execute
      - type: supply_chain_mutation
      - type: network_read
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Installs global npm executables.
  - id: npm.unpublish
    description: Remove package versions from the npm registry.
    entrypoint: npm
    match:
      argv:
        startsWith: ["unpublish"]
    consequences:
      - type: remote_delete
      - type: supply_chain_mutation
      - type: irreversible
      - type: identity_use
    severity: critical
    confidence: high
    gate: {relaxed: approve_once, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Removes package versions from npm.
  - id: npx.remote-package
    description: Download and execute a package by name.
    entrypoint: npx
    match:
      argv:
        positional:
          index: 0
          matches: "^[^./-][^ ]*"
    consequences:
      - type: network_read
      - type: local_execute
      - type: supply_chain_mutation
    severity: high
    confidence: medium
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Downloads and runs an npm package.
  - id: corepack.prepare.activate
    description: Download and activate a package-manager shim.
    entrypoint: corepack
    match:
      all:
        - argv:
            startsWith: ["prepare"]
        - argv:
            contains: "--activate"
    consequences:
      - type: local_write
      - type: network_read
      - type: supply_chain_mutation
    severity: high
    confidence: high
    gate: {relaxed: notify, normal: approve_once, cautious: approve_once, strict: approve_once, locked: block}
    explain:
      summary: Activates a downloaded package-manager shim.

