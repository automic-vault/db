id: brew:hive
display-name: Apache Hive
repo: https://github.com/apache/hive
docs:
  - https://hive.apache.org/docs/latest
  - https://hive.apache.org/development/gettingstarted-latest
config-file-location:
  unix:
    - $HIVE_CONF_DIR/hive-site.xml
    - $HIVE_CONF_DIR/hivemetastore-site.xml
    - $HIVE_CONF_DIR/hiveserver2-site.xml
    - $HIVE_HOME/conf/hive-site.xml
credentials-file-location:
  unix:
    - ${user.home}/.beeline/beeline-hs2-connection.xml
    - $HIVE_CONF_DIR/beeline-hs2-connection.xml
    - /etc/hive/conf/beeline-hs2-connection.xml
  windows:
    - ${user.home}\beeline\beeline-hs2-connection.xml
tags:
  - analytics
  - big-data
  - cli
  - data-warehouse
  - hadoop
  - sql
geiger:
  category: runtime
  color: yellow
  confidence: medium
  reason: broad file, network, media, or database tool signal
  reasons:
    - broad file, network, media, or database tool signal
    - generalized runtime or code generation signal
  signals:
    - text:repl
    - text:sql,server
provenance:
  category-sources:
    - >
      source_facts.description identifies Hadoop-based data summarization, query, and
      analysis; official Apache Hive site describes a distributed data warehouse for
      analytics at massive scale.
  display-name-sources:
    - >
      source_facts.homepage is hive.apache.org; official Apache Hive site and repository
      use the Apache Hive name.
  docs-sources:
    - >
      Official Apache Hive site provides a dedicated latest documentation section and
      getting started guide.
  repo-sources:
    - >
      source_facts.repo was empty; official Apache Hive site links to GitHub, and the
      official apache/hive repository identifies itself as Apache Hive.
  tags-sources:
    - >
      source_facts.description names Hadoop query and analysis; official Apache Hive
      README describes SQL access, Hadoop, data warehousing, reporting, and large
      datasets.
