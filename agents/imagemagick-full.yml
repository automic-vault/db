id: brew:imagemagick-full
display-name: ImageMagick Full
repo: null
docs:
  - https://imagemagick.org/
  - https://imagemagick.org/command-line-tools
  - https://imagemagick.org/resources
  - https://imagemagick.org/security-policy
config-file-location:
  unix:
    - $MAGICK_CONFIGURE_PATH
    - $PREFIX/etc/ImageMagick-7
    - $PREFIX/share/ImageMagick-7
    - $XDG_CACHE_HOME/ImageMagick
    - ~/.config/ImageMagick
    - <client path>/etc/ImageMagick
  windows:
    - $MAGICK_CONFIGURE_PATH
    - <windows registry>
    - $PREFIX/config
    - $USERPROFILE/.config/ImageMagick
    - <client path>
credentials-file-location: null
tags:
  - cli
  - conversion
  - graphics
  - image-processing
  - imagemagick
  - media
  - raster-images
provenance:
  category-sources:
    - >
      source_facts.description; official ImageMagick tools page says ImageMagick
      command-line tools modify and manipulate images.
  display-name-sources:
    - >
      source_facts.name; official project name is ImageMagick; Homebrew formula is
      imagemagick-full.
  docs-sources:
    - >
      Official ImageMagick command-line tools page documents the tools; official
      resources page documents configuration files, modules, fonts, and environment
      variables.
  repo-sources:
    - >
      source_facts.repo already contains https://github.com/ImageMagick/ImageMagick; per
      instruction repo is returned as null when supplied.
  tags-sources:
    - >
      source_facts.description; official command-line tools page lists conversion,
      resize, crop, compare, identify, montage, and stream tools.
category-confidence: high
category-path:
  - media
  - image-processing
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
