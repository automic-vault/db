  reasons:
    - infrastructure mutation or orchestration signal
  signals:
    - text:cluster
provenance:
  category-sources:
    - NCBI manual documents BLAST command-line applications for sequence searching
    - source_facts.description is Basic Local Alignment Search Tool
  display-name-sources:
    - NCBI Bookshelf title is BLAST Command Line Applications User Manual
    - Official BLAST Help page heading uses BLAST
  docs-sources:
    - >
      NCBI Bookshelf BLAST Command Line Applications User Manual says it documents BLAST
      command line applications developed at NCBI
    - >
      Official BLAST Help page links BLAST+ executables, developer information, and the
      command-line applications user manual
  repo-sources:
    - >
      NCBI BLAST developer information says the maintained BLAST implementation is part
      of the NCBI C++ Toolkit:
      https://blast.ncbi.nlm.nih.gov/doc/blast-help/developerinfo.html
    - >
      Official ncbi/ncbi-cxx-toolkit-public GitHub repository describes itself as NCBI
      C++ Toolkit package sources
  tags-sources:
    - >
      Official BLAST Help describes BLAST+ as command-line tools for BLAST searches on a
      server
    - >
      source_facts.executables lists BLAST+ command-line tools such as blastn, blastp,
      blastx, makeblastdb, and update_blastdb.pl
