id: brew:commitlint
display-name: commitlint
repo: https://github.com/conventional-changelog/commitlint
docs:
  - https://commitlint.js.org/
config-file-location:
  unix:
    - ./commitlint.config.js
    - ./commitlint.config.cjs
    - ./commitlint.config.mjs
    - ./commitlint.config.ts
    - ./commitlint.config.cts
    - ./commitlint.config.mts
    - ./.commitlintrc
    - ./.commitlintrc.json
    - ./.commitlintrc.yaml
    - ./.commitlintrc.yml
    - ./.commitlintrc.js
    - ./.commitlintrc.cjs
    - ./.commitlintrc.mjs
    - ./.commitlintrc.ts
    - ./.commitlintrc.cts
    - ./.commitlintrc.mts
    - ./package.json
credentials-file-location: null
tags:
  - cli
  - commit-messages
  - conventional-commits
  - git
  - linting
geiger:
  category: appliance
  color: green
  confidence: low
  reason: no executable entrypoint in the package index
  reasons:
    - no executable entrypoint in the package index
  signals:
    - metadata:no-indexed-executables
provenance:
  category-sources:
    - >
      source_facts.description says it lints commit messages according to a commit
      convention; official README says commitlint checks conventional commit format.
  display-name-sources:
    - >
      source_facts.name is commitlint; official site and GitHub repository use the
      commitlint name.
  docs-sources:
    - >
      source_facts.homepage is the official commitlint documentation site; official
      GitHub README points users to the main website for documentation.
  repo-sources:
    - >
      Official GitHub repository conventional-changelog/commitlint is linked from
      commitlint documentation and describes the project as linting commit messages.
  tags-sources:
    - >
      source_facts.executables lists commitlint; source_facts.description and official
      README describe conventional commit-message linting.
category-confidence: high
category-path:
  - developer-tools
  - version-control
  - commit-linting
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
