id: brew:proj
display-name: PROJ
repo: null
docs:
  - https://proj.org/en/stable
config-file-location:
  linux:
    - $XDG_DATA_HOME/proj/proj.ini
    - ~/.local/share/proj/proj.ini
  macos:
    - ~/Library/Application Support/proj/proj.ini
  windows:
    - '%LOCALAPPDATA%\proj\proj.ini'
credentials-file-location: null
tags:
  - cartography
  - cli
  - coordinate-transforms
  - geospatial
  - gis
  - projections
geiger:
  category: tool
  color: blue
  confidence: medium
  reason: broad file, network, media, or database tool signal
  reasons:
    - broad file, network, media, or database tool signal
  signals:
    - text:sync
provenance:
  category-sources:
    - Official PROJ documentation describes development and use of the PROJ library.
    - source_facts.description identifies PROJ as a cartographic projections library.
  display-name-sources:
    - source_facts.homepage is the official PROJ site.
    - source_facts.repo uses the official OSGeo/PROJ repository name.
  docs-sources:
    - >
      source_facts.homepage points to proj.org; official stable documentation is hosted
      under /en/stable/.
  repo-sources:
    - >
      source_facts.repo is already populated with https://github.com/OSGeo/PROJ, so repo
      is returned as null per instruction.
  tags-sources:
    - source_facts.description identifies cartographic projections.
    - >
      source_facts.executables lists PROJ coordinate transformation tools such as proj,
      cs2cs, geod, cct, and projinfo.
