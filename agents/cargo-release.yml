id: brew:cargo-release
display-name: cargo-release
repo: null
docs:
  - https://github.com/crate-ci/cargo-release/blob/master/docs/reference.md
  - https://github.com/crate-ci/cargo-release#readme
config-file-location:
  linux:
    - ~/.config/cargo-release/release.toml
  macos:
    - ~/Library/Application Support/cargo-release/release.toml
  unix:
    - $CRATE/Cargo.toml ([package.metadata.release])
    - $CRATE/release.toml
    - $WORKSPACE/Cargo.toml ([workspace.metadata.release])
    - $WORKSPACE/release.toml
    - ~/.release.toml
  windows:
    - '%FOLDERID_RoamingAppData%/cargo-release/release.toml'
credentials-file-location: null
tags:
  - cargo
  - cli
  - publishing
  - release-automation
  - release-management
  - rust
  - versioning
geiger:
  category: appliance
  color: green
  confidence: low
  reason: narrow executable package without higher-risk signals
  reasons:
    - narrow executable package without higher-risk signals
  signals:
    - metadata:no-higher-risk-signals
provenance:
  category-sources:
    - >
      Official README describes cargo-release as extending cargo publish with
      validation, version management, tagging, and pushing
  display-name-sources:
    - >
      Official README title: cargo release; package and command are cargo-release/cargo
      release
  docs-sources:
    - >
      Official README at https://github.com/crate-ci/cargo-release#readme links to
      docs/reference.md for CLI arguments and configuration file format
  repo-sources:
    - source_facts.repo is already populated, so prompt requires returning repo as null
  tags-sources:
    - >
      Official README and reference document release automation, publishing, versioning,
      workspaces, tags, and push behavior
category-confidence: high
category-path:
  - developer-tools
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
