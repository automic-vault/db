id: brew:pnpm@10
display-name: pnpm 10
repo: https://github.com/pnpm/pnpm
docs:
  - https://pnpm.io/10.x
  - https://pnpm.io/10.x/cli/config
  - https://pnpm.io/10.x/npmrc
config-file-location:
  linux:
    - ~/.config/pnpm/config.yaml
    - ~/.config/pnpm/rc
  macos:
    - ~/Library/Preferences/pnpm/config.yaml
    - ~/Library/Preferences/pnpm/rc
  unix:
    - ./pnpm-workspace.yaml
    - ./.npmrc
    - $XDG_CONFIG_HOME/pnpm/config.yaml
    - $XDG_CONFIG_HOME/pnpm/rc
  windows:
    - ~/AppData/Local/pnpm/config/config.yaml
    - ~/AppData/Local/pnpm/config/rc
credentials-file-location:
  linux:
    - ~/.config/pnpm/auth.ini
  unix:
    - ./.npmrc
    - $XDG_CONFIG_HOME/pnpm/auth.ini
    - ~/.npmrc
  windows:
    - ~/AppData/Local/pnpm/config/auth.ini
tags:
  - cli
  - javascript
  - nodejs
  - package-management
  - workspace
provenance:
  category-sources:
    - 'source_facts.description: Fast, disk space efficient package manager'
  display-name-sources:
    - 'official project name: pnpm'
    - 'source_facts.name: pnpm@10'
  docs-sources:
    - official pnpm 10.x docs, config docs, and authentication settings docs
  repo-sources:
    - official pnpm docs navbar links to https://github.com/pnpm/pnpm
  tags-sources:
    - official docs describe pnpm as a package manager with workspace support
    - 'source_facts.executables: pnpm, pnpx'
category-confidence: high
category-path:
  - developer-tools
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
