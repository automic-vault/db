repo: null
docs:
  - https://biomejs.dev/guides/configure-biome
  - https://biomejs.dev/guides/getting-started
  - https://biomejs.dev/reference/configuration
config-file-location:
  linux:
    - biome.json, biome.jsonc, .biome.json,
    - .biome.jsonc in the current working directory
    - parent folders
    - $XDG_CONFIG_HOME/biome
    - ~/.config/biome
  macos:
    - biome.json, biome.jsonc, .biome.json,
    - .biome.jsonc in the current working directory
    - parent folders
    - /Users/$USER/Library/Application Support/biome
  windows:
    - biome.json, biome.jsonc, .biome.json,
    - .biome.jsonc in the current working directory
    - parent folders
    - C:\Users\$USER\AppData\Roaming\biome\config
credentials-file-location: null
