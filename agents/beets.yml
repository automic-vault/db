id: brew:beets
display-name: beets
repo: https://github.com/beetbox/beets
docs:
  - https://beets.readthedocs.io/
  - https://beets.readthedocs.io/en/stable/reference/config.html
config-file-location:
  unix:
    - ~/.config/beets/config.yaml
  windows:
    - '%APPDATA%\beets\config.yaml'
    - C:\Users\You\AppData\Roaming\beets\config.yaml
    - macos?
credentials-file-location: null
tags:
  - cli
  - library-manager
  - metadata
  - music
  - musicbrainz
  - tagging
provenance:
  category-sources:
    - >
      Official beets homepage describes beets as a media library management system for
      music collections: https://beets.io/
    - 'source_facts.description: Music library manager and tagger'
  display-name-sources:
    - 'Official homepage uses the beets project name: https://beets.io/'
    - source_facts.name
  docs-sources:
    - Official configuration documentation documents config.yaml locations
    - Official homepage links to documentation on beets.readthedocs.io
  repo-sources:
    - GitHub repository identifies beetbox/beets as the beets project
    - source_facts.repo is empty; official homepage Project section links to GitHub
  tags-sources:
    - >
      Official homepage describes cataloging music collections and improving metadata
      using MusicBrainz
    - source_facts.description
category-confidence: high
category-path:
  - media
  - music-library
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
