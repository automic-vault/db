id: brew:dvc
display-name: DVC
repo: https://github.com/treeverse/dvc
docs:
  - https://doc.dvc.org
config-file-location:
  linux:
    - ~/.config/dvc/config
    - /etc/xdg/dvc/config
  macos:
    - ~/Library/Application Support/dvc/config
    - /Library/Application Support/dvc/config
  unix:
    - .dvc/config.local
    - .dvc/config
  windows:
    - .dvc\config.local
    - .dvc\config
    - '%LocalAppData%\iterative\dvc\config'
    - '%AllUsersProfile%\Application Data\iterative\dvc\config'
credentials-file-location:
  unix:
    - .dvc/config.local
tags:
