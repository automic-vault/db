id: brew:helm@3
display-name: Helm
repo: null
docs:
  - https://helm.sh/docs
  - https://v3.helm.sh/docs/helm/helm
  - https://v3.helm.sh/docs/helm/helm_registry_login
config-file-location:
  linux:
    - ~/.config/helm/repositories.yaml
    - ~/.config/helm/registry/config.json
  macos:
    - ~/Library/Preferences/helm/repositories.yaml
    - ~/Library/Preferences/helm/registry/config.json
  windows:
    - '%APPDATA%\helm\repositories.yaml'
    - '%APPDATA%\helm\registry\config.json'
credentials-file-location:
  linux:
    - ~/.config/helm/registry/config.json
  macos:
    - ~/Library/Preferences/helm/registry/config.json
  windows:
    - '%APPDATA%\helm\registry\config.json'
tags:
  - charts
  - cli
  - cncf
  - helm-charts
  - kubernetes
  - oci-registry
  - package-manager
provenance:
  category-sources:
    - https://v3.helm.sh/docs/helm/helm/ describes Helm as the Kubernetes package manager.
    - 'source_facts.description: Kubernetes package manager'
  display-name-sources:
    - https://helm.sh/docs/ official docs and source_facts.homepage use Helm.
  docs-sources:
    - https://helm.sh/docs/ is the official Helm documentation home.
    - https://v3.helm.sh/docs/helm/helm/ is the official Helm v3 CLI reference.
    - >
      https://v3.helm.sh/docs/helm/helm_registry_login/ documents registry login and
      registry config.
  repo-sources:
    - >
      source_facts.repo already provides https://github.com/helm/helm; per instruction,
      repo is returned as null when source_facts.repo has a value.
  tags-sources:
    - >
      https://v3.helm.sh/docs/helm/helm/ lists chart actions and notes Helm is a CNCF
      graduated project.
    - https://v3.helm.sh/docs/helm/helm_registry_login/ documents OCI registry login.
    - source_facts.description identifies Kubernetes package manager.
category-confidence: high
category-path:
  - cloud-infrastructure
  - kubernetes
  - package-management
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
