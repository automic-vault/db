id: brew:mariadb@11.8
display-name: MariaDB 11.8
repo: https://github.com/MariaDB/server
docs:
  - https://mariadb.com/docs/server
  - >
    https://mariadb.com/docs/server/server-management/install-and-upgrade-mariadb/configuring-mariadb/configuring-mariadb-with-option-files
config-file-location:
  unix:
    - /etc/my.cnf
    - /etc/mysql/my.cnf
    - $MARIADB_HOME/my.cnf
    - $MYSQL_HOME/my.cnf
    - ~/.my.cnf
  windows:
    - System Windows Directory\my.ini
    - System Windows Directory\my.cnf
    - Windows Directory\my.ini
    - Windows Directory\my.cnf
    - C:\my.ini
    - C:\my.cnf
    - installdir\my.ini
    - installdir\my.cnf
    - installdir\data\my.ini
    - installdir\data\my.cnf
    - '%MARIADB_HOME%\my.ini'
    - '%MARIADB_HOME%\my.cnf'
    - '%MYSQL_HOME%\my.ini'
    - '%MYSQL_HOME%\my.cnf'
credentials-file-location:
  unix:
    - /etc/my.cnf
    - /etc/mysql/my.cnf
    - $MARIADB_HOME/my.cnf
    - $MYSQL_HOME/my.cnf
    - ~/.my.cnf
  windows:
    - System Windows Directory\my.ini
    - System Windows Directory\my.cnf
    - Windows Directory\my.ini
    - Windows Directory\my.cnf
    - C:\my.ini
    - C:\my.cnf
    - installdir\my.ini
    - installdir\my.cnf
    - installdir\data\my.ini
    - installdir\data\my.cnf
    - '%MARIADB_HOME%\my.ini'
    - '%MARIADB_HOME%\my.cnf'
    - '%MYSQL_HOME%\my.ini'
    - '%MYSQL_HOME%\my.cnf'
tags:
  - cli
  - database
  - mariadb
  - mysql-compatible
  - rdbms
  - sql
provenance:
  category-sources:
    - source_facts.description says MariaDB is a drop-in replacement for MySQL.
  display-name-sources:
    - source_facts.name mariadb@11.8 and official MariaDB versioning.
  docs-sources:
    - Official MariaDB server docs document server usage and option-file locations.
  repo-sources:
    - Official MariaDB server README is in the MariaDB/server GitHub repository.
  tags-sources:
    - >
      Official MariaDB README describes MariaDB as an open source database compatible
      with MySQL.
category-confidence: high
category-path:
  - data
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
