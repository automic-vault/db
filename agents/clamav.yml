id: brew:clamav
display-name: ClamAV
repo: null
docs:
  - https://docs.clamav.net/
config-file-location:
  linux:
    - /etc/clamav/freshclam.conf
    - /etc/clamav/clamd.conf
  macos:
    - /usr/local/etc/clamav/freshclam.conf
    - /usr/local/etc/clamav/clamd.conf
    - /opt/local/etc/freshclam.conf
    - /opt/local/etc/clamd.conf
  unix:
    - /usr/local/etc/freshclam.conf
    - /usr/local/etc/clamd.conf
    - /usr/local/etc/clamav-milter.conf
  windows:
    - HKEY_LOCAL_MACHINE/Software/ClamAV/ConfDir
    - C:\Program Files\ClamAV
    - C:\ClamAV
credentials-file-location: null
tags:
  - antivirus
  - cli
  - daemon
  - malware-detection
  - security
  - signatures
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      source_facts.description says ClamAV is anti-virus software; official docs
      describe scanning, daemon, signature update, and malware-detection tools.
  display-name-sources:
    - >
      source_facts.name, source_facts.homepage, and official docs identify the project
      as ClamAV.
  docs-sources:
    - >
      source_facts.homepage points to ClamAV; current_curation.docs and official site
      use https://docs.clamav.net/ for documentation.
  repo-sources:
    - >
      source_facts.repo is already populated with https://github.com/Cisco-Talos/clamav;
      prompt requires repo=null when source_facts.repo is already set.
  tags-sources:
    - >
      source_facts.executables and official ClamAV usage/configuration docs cover
      clamscan, clamd, freshclam, signatures, and daemon-based scanning.
