      https://www.elastic.co/docs/reference/beats/auditbeat
  display-name-sources:
    - >
      Elastic official documentation page title and heading use Auditbeat:
      https://www.elastic.co/docs/reference/beats/auditbeat
  docs-sources:
    - >
      Elastic Auditbeat reference page documents Auditbeat as a lightweight shipper for
      user/process audit activity and file integrity monitoring:
      https://www.elastic.co/docs/reference/beats/auditbeat
    - >
      Elastic configuration docs state the default configuration file is auditbeat.yml,
      with location determined by platform; directory layout documents /etc/auditbeat
