id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
config-file-location:
  unix:
    - '{path.config}/auditbeat.yml'
credentials-file-location:
  unix:
    - '{path.data}'
tags:
  - audit
  - beats
  - cli
  - elastic
  - monitoring
  - security
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic describes Auditbeat as auditing user and process activity, centralizing
      Linux audit events, and detecting critical file changes/security policy
      violations: https://www.elastic.co/docs/reference/beats/auditbeat
  display-name-sources:
    - >
      Official Elastic documentation title uses Auditbeat:
      https://www.elastic.co/docs/reference/beats/auditbeat
  docs-sources:
    - >
      Elastic Auditbeat reference identifies Auditbeat as a lightweight shipper for
      audit events and security policy monitoring:
      https://www.elastic.co/docs/reference/beats/auditbeat
    - >
      Elastic configuration docs name auditbeat.yml as the default configuration file
      and point to Directory layout; command docs define default auditbeat.yml relative
      to path.config:
      https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
      and https://www.elastic.co/docs/reference/beats/auditbeat/command-line-options
    - >
      Elastic keystore docs say Auditbeat stores sensitive settings in its keystore and
      creates it in the directory defined by path.data:
      https://www.elastic.co/docs/reference/beats/auditbeat/keystore
  repo-sources:
    - >
      source_facts.repo already provides https://github.com/elastic/beats; prompt
      requires repo null when source_facts.repo is populated.
  tags-sources:
    - >
      Elastic Auditbeat reference covers audit events, monitoring/security use cases,
      and the Elastic Beat/libbeat basis:
      https://www.elastic.co/docs/reference/beats/auditbeat
    - source_facts.executables lists auditbeat as a command-line executable.
category-confidence: high
category-path:
  - security
  - audit-monitoring
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
