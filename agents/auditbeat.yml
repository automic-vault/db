id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
config-file-location:
  linux:
    - /etc/auditbeat/auditbeat.yml
    - '{extract.path}/auditbeat.yml'
  macos:
    - '{extract.path}/auditbeat.yml'
credentials-file-location:
  unix:
    - ${path.data}
tags:
  - audit
  - beats
  - cli
  - elastic
  - linux-audit
  - monitoring
  - security
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Official Elastic Auditbeat docs describe auditing system user/process activity,
      Linux Audit Framework events, critical file changes, and security policy
      violations.
  display-name-sources:
    - Official Elastic docs use the product name Auditbeat.
  docs-sources:
    - >
      Official Elastic Auditbeat reference at
      https://www.elastic.co/docs/reference/beats/auditbeat describes Auditbeat as a
      lightweight shipper for auditing users, processes, Linux Audit Framework events,
      and file integrity changes.
    - >
      Official Elastic configuration docs state the default configuration file is
      auditbeat.yml and directory layout places deb/rpm config files in /etc/auditbeat
      and archive config files in {extract.path}.
    - >
      Official Elastic secrets keystore docs state Auditbeat stores sensitive settings
      in a keystore created under the path.data directory.
  repo-sources:
    - >
      source_facts.repo is already populated with https://github.com/elastic/beats, so
      repo is returned as null per prompt.
  tags-sources:
    - >
      Official Elastic Auditbeat docs identify Auditbeat as an Elastic Beat for audit
      activity, Linux Audit Framework events, file integrity changes, and
      monitoring/security use cases.
category-confidence: high
category-path:
  - security
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
