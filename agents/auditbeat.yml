id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
  - https://www.elastic.co/docs/reference/beats/auditbeat/keystore
config-file-location:
  unix:
    - /etc/auditbeat/auditbeat.yml
    - '{path.home}/auditbeat.yml'
credentials-file-location:
  unix:
    - ${path.config}/beats.keystore
tags:
  - audit
  - cli
  - elastic
  - monitoring
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic describes Auditbeat as collecting audit data and source_facts.description
      says Lightweight Shipper for Audit Data.
  display-name-sources:
    - Elastic official docs title and source_facts.name use Auditbeat/auditbeat.
  docs-sources:
    - Elastic Auditbeat docs are under https://www.elastic.co/docs/reference/beats/auditbeat.
    - >
      Elastic Configure Auditbeat says the default config file is auditbeat.yml and its
      location varies by platform.
    - >
      Elastic Directory layout lists /etc/auditbeat as the deb/rpm config directory and
      {path.home} for archive installs.
    - >
      Elastic auditbeat.reference.yml documents keystore.path as
      ${path.config}/beats.keystore.
  repo-sources:
    - >
      source_facts.repo already contains https://github.com/elastic/beats; prompt
      requires repo=null when present.
  tags-sources:
    - >
      Elastic Auditbeat docs and source_facts.description identify audit data
      shipping/monitoring.
    - source_facts.executables lists the auditbeat CLI.
category-confidence: high
category-path:
  - system
  - audit
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
