id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
config-file-location:
  unix:
    - ${path.config}/auditbeat.yml
    - /etc/auditbeat/auditbeat.yml
    - '{extract.path}/auditbeat.yml'
  windows:
    - C:\Program Files\Auditbeat\auditbeat.yml
credentials-file-location:
  unix:
    - ${path.data}
    - ${path.config}/beats.keystore
tags:
  - audit
  - cli
  - elastic
  - monitoring
  - security
  - system
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic Auditbeat reference describes auditing users/processes, Linux Audit
      Framework events, critical file changes, and security policy violations:
      https://www.elastic.co/docs/reference/beats/auditbeat
  display-name-sources:
    - >
      Elastic official reference page title uses Auditbeat:
      https://www.elastic.co/docs/reference/beats/auditbeat
  docs-sources:
    - >
      Elastic Auditbeat reference identifies Auditbeat as a lightweight shipper for
      auditing users/processes and critical file changes:
      https://www.elastic.co/docs/reference/beats/auditbeat
    - >
      Elastic Directory layout documents path.config defaults, including /etc/auditbeat
      for deb/rpm and {extract.path} for archives:
      https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
    - >
      Elastic auditbeat.reference.yml documents keystore.path as
      ${path.config}/beats.keystore:
      https://www.elastic.co/docs/reference/beats/auditbeat/auditbeat-reference-yml
    - >
      Elastic command reference says the default config file is auditbeat.yml relative
      to path.config:
      https://www.elastic.co/docs/reference/beats/auditbeat/command-line-options
    - >
      Elastic secrets keystore docs say Auditbeat stores sensitive settings in a
      keystore created under path.data:
      https://www.elastic.co/docs/reference/beats/auditbeat/keystore
  repo-sources:
    - >
      source_facts.repo is already set to https://github.com/elastic/beats; prompt
      requires repo=null when source_facts.repo is present.
  tags-sources:
    - >
      Elastic Auditbeat reference documents audit data collection, Linux Audit
      Framework, critical file change detection, and Elastic Beats integration:
      https://www.elastic.co/docs/reference/beats/auditbeat
    - 'source_facts.description: Lightweight Shipper for Audit Data'
category-confidence: high
category-path:
  - security
  - audit-monitoring
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
