id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/guide/en/beats/auditbeat/8.19/configuring-howto-auditbeat.html
  - https://www.elastic.co/guide/en/beats/auditbeat/8.19/directory-layout.html
  - https://www.elastic.co/guide/en/beats/auditbeat/8.19/index.html
config-file-location:
  linux:
    - /etc/auditbeat/auditbeat.yml
    - /usr/share/auditbeat/auditbeat.yml
    - '{extract.path}/auditbeat.yml'
  macos:
    - '{extract.path}/auditbeat.yml'
  windows:
    - C:\Program Files\Auditbeat\auditbeat.yml
credentials-file-location: null
tags:
  - audit
  - cli
  - elastic
  - monitoring
  - security
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic Auditbeat overview describes Auditbeat as auditing user/process activity,
      collecting Linux Audit Framework events, detecting critical-file changes, and
      identifying potential security policy violations:
      https://www.elastic.co/guide/en/beats/auditbeat/8.19/auditbeat-overview.html
  display-name-sources:
    - >
      Elastic official documentation uses the product name Auditbeat:
      https://www.elastic.co/guide/en/beats/auditbeat/8.19/index.html
  docs-sources:
    - >
      Elastic Auditbeat Reference index lists the official Auditbeat documentation
      sections, including configure, directory layout, modules, and security topics:
      https://www.elastic.co/guide/en/beats/auditbeat/8.19/index.html
    - >
      Elastic Configure Auditbeat says the default configuration file is auditbeat.yml
      and that its location varies by platform:
      https://www.elastic.co/guide/en/beats/auditbeat/8.19/configuring-howto-auditbeat.html
    - >
      Elastic Directory layout gives default config directories for deb/rpm, docker, and
      archive installs:
      https://www.elastic.co/guide/en/beats/auditbeat/8.19/directory-layout.html
    - >
      Elastic Secrets keystore docs say the keystore is created under path.data but do
      not document a stable credentials-file path:
      https://www.elastic.co/guide/en/beats/auditbeat/8.19/keystore.html
  repo-sources:
    - >
      source_facts.repo is already https://github.com/elastic/beats; prompt requires
      returning repo as null when source_facts.repo is present.
  tags-sources:
    - >
      Elastic Auditbeat overview supports audit, security, monitoring, and Elastic tags:
      https://www.elastic.co/guide/en/beats/auditbeat/8.19/auditbeat-overview.html
    - source_facts.executables lists auditbeat, supporting the cli tag.
category-confidence: high
category-path:
  - security
  - audit-monitoring
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
