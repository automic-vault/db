  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic describes Auditbeat as collecting Linux audit framework data and
      monitoring file integrity: https://www.elastic.co/docs/reference/beats/auditbeat
  display-name-sources:
    - >
      Elastic official docs use the product name Auditbeat:
      https://www.elastic.co/docs/reference/beats/auditbeat
  docs-sources:
    - >
      Elastic Auditbeat directory layout documents /etc/auditbeat and {extract.path}
      config/data paths:
      https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
    - >
      Elastic Auditbeat keystore docs place the keystore under path.data:
      https://www.elastic.co/docs/reference/beats/auditbeat/keystore
    - 'Elastic Auditbeat reference: https://www.elastic.co/docs/reference/beats/auditbeat'
  repo-sources:
