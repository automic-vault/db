id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
config-file-location:
  unix:
    - /etc/auditbeat/auditbeat.yml
    - /usr/share/auditbeat/auditbeat.yml
    - '{extract.path}/auditbeat.yml'
credentials-file-location:
  unix:
    - ${path.config}/beats.keystore
tags:
  - audit
  - cli
  - elastic-stack
  - file-integrity
  - linux
  - monitoring
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic describes Auditbeat as collecting audit information and documents auditd
      and file_integrity modules:
      https://www.elastic.co/docs/reference/beats/auditbeat/auditbeat-installation-configuration
  display-name-sources:
    - >
      Elastic official docs use the product name Auditbeat:
      https://www.elastic.co/docs/reference/beats/auditbeat
  docs-sources:
    - >
      Elastic Auditbeat reference index is the official documentation surface:
      https://www.elastic.co/docs/reference/beats/auditbeat
    - >
      Elastic Configure Auditbeat says the default configuration file is auditbeat.yml
      and points to Directory layout for platform paths:
      https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
    - >
      Elastic Directory layout documents config directories for deb/rpm, Docker, and
      archive installs:
      https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
    - >
      Elastic auditbeat.reference.yml documents keystore.path default as
      ${path.config}/beats.keystore:
      https://www.elastic.co/docs/reference/beats/auditbeat/auditbeat-reference-yml
  repo-sources:
    - >
      source_facts.repo is already populated with https://github.com/elastic/beats;
      prompt instructs repo=null when source_facts.repo has a value.
  tags-sources:
    - >
      Elastic Auditbeat module docs cover auditd and file_integrity data collection for
      audit and monitoring use:
      https://www.elastic.co/docs/reference/beats/auditbeat/configuration-auditbeat
category-confidence: high
category-path:
  - security
  - audit-monitoring
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
