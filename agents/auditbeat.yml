id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
  - https://www.elastic.co/docs/reference/beats/auditbeat/keystore
config-file-location:
  linux:
    - /etc/auditbeat/auditbeat.yml
    - '{extract.path}/auditbeat.yml'
  macos:
    - '{extract.path}/auditbeat.yml'
  windows:
    - C:\Program Files\Auditbeat\auditbeat.yml
credentials-file-location:
  linux:
    - /var/lib/auditbeat
  macos:
    - '{extract.path}/data'
  windows:
    - C:\Program Files\Auditbeat-Data
tags:
  - audit
  - cli
  - elastic
  - monitoring
  - security
  - system
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic Auditbeat docs describe auditing user/process activity, Linux Audit
      Framework collection, file integrity change detection, and security policy
      violations.
  display-name-sources:
    - Elastic official docs use the product name Auditbeat.
  docs-sources:
    - >
      Elastic Auditbeat docs describe Auditbeat as a lightweight shipper for auditing
      users/processes and detecting file/security policy changes:
      https://www.elastic.co/docs/reference/beats/auditbeat
    - >
      Elastic Configure Auditbeat docs name auditbeat.yml as the default configuration
      file and point to Directory layout for location:
      https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
    - >
      Elastic Directory layout documents /etc/auditbeat for deb/rpm config,
      {extract.path} for archive config, and data paths:
      https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
    - >
      Elastic Secrets keystore docs state Auditbeat creates the keystore in path.data
      and stores sensitive values such as Elasticsearch credentials:
      https://www.elastic.co/docs/reference/beats/auditbeat/keystore
    - >
      Elastic Windows install docs place Auditbeat under C:\Program Files\Auditbeat and
      data under C:\Program Files\Auditbeat-Data:
      https://www.elastic.co/docs/reference/beats/auditbeat/auditbeat-installation-configuration
  repo-sources:
    - >
      source_facts.repo already contains https://github.com/elastic/beats; prompt
      requires returning repo null when source_facts.repo is populated.
  tags-sources:
    - >
      Elastic Auditbeat docs describe audit activity, monitoring/security use cases,
      Elastic Beat lineage, and system file/process auditing.
category-confidence: high
category-path:
  - security
  - audit-monitoring
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
