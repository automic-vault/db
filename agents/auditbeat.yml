id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
  - https://www.elastic.co/docs/reference/beats/auditbeat/keystore
config-file-location:
  linux:
    - /etc/auditbeat/auditbeat.yml
    - /usr/share/auditbeat/auditbeat.yml
    - '{extract.path}/auditbeat.yml'
  macos:
    - '{extract.path}/auditbeat.yml'
credentials-file-location:
  linux:
    - /var/lib/auditbeat
    - /usr/share/auditbeat/data
    - '{extract.path}/data'
  macos:
    - '{extract.path}/data'
tags:
  - audit
  - cli
  - elastic
  - file-integrity
  - monitoring
  - security
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic Auditbeat product page at https://www.elastic.co/beats/auditbeat says
      Auditbeat collects Linux audit framework data, monitors file integrity, and ships
      events to Elastic Stack.
  display-name-sources:
    - Elastic product page and docs use the product name Auditbeat.
  docs-sources:
    - >
      Elastic Auditbeat docs at https://www.elastic.co/docs/reference/beats/auditbeat
      describe Auditbeat as a lightweight shipper for auditing user/process activity and
      Linux Audit Framework events.
    - >
      Elastic Configure Auditbeat docs at
      https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
      state the default configuration file is auditbeat.yml and point to Directory
      layout for platform locations.
    - >
      Elastic Directory layout docs at
      https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout list config
      directories /etc/auditbeat for deb/rpm, /usr/share/auditbeat for Docker, and
      {extract.path} for archive installs; the same page lists data directories
      /var/lib/auditbeat, /usr/share/auditbeat/data, and {extract.path}/data.
    - >
      Elastic Secrets keystore docs at
      https://www.elastic.co/docs/reference/beats/auditbeat/keystore state Auditbeat
      stores sensitive settings in its keystore and creates it in the path.data
      directory.
  repo-sources:
    - >
      source_facts.repo already contains https://github.com/elastic/beats; prompt
      requires returning repo as null when source_facts.repo is present.
  tags-sources:
    - >
      Elastic Auditbeat product page at https://www.elastic.co/beats/auditbeat describes
      audit data collection, Linux systems monitoring, file integrity monitoring, and
      Elastic Stack shipping.
    - source_facts.executables lists auditbeat, supporting cli tag.
category-confidence: high
category-path:
  - security
  - audit-monitoring
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
