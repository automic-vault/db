id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
config-file-location:
  linux:
    - /etc/auditbeat/auditbeat.yml
    - /usr/share/auditbeat/auditbeat.yml
    - '{extract.path}/auditbeat.yml'
credentials-file-location: null
tags:
  - audit
  - cli
  - elastic
  - monitoring
  - security
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      https://www.elastic.co/docs/reference/beats/auditbeat identifies Auditbeat as an
      Elastic Beat for audit data.
    - 'source_facts.description: Lightweight Shipper for Audit Data.'
  display-name-sources:
    - source_facts.name is auditbeat; official Elastic docs use Auditbeat.
  docs-sources:
    - >
      https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
      says the default configuration file is auditbeat.yml.
    - >
      https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout documents
      default config paths for deb/rpm, docker, and archive installations.
    - >
      https://www.elastic.co/docs/reference/beats/auditbeat/keystore documents a secrets
      keystore but only its path.data directory, not a credentials file path.
  repo-sources:
    - >
      source_facts.repo already contains https://github.com/elastic/beats; prompt
      requires repo null when source_facts.repo is present.
  tags-sources:
    - >
      https://www.elastic.co/docs/reference/beats/auditbeat/keystore documents
      Elasticsearch credential use via Auditbeat configuration.
    - >
      source_facts.description and current_curation.tags mention audit, monitoring,
      Elastic, and cli.
category-confidence: high
