id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
config-file-location:
  linux:
    - /etc/auditbeat/auditbeat.yml
    - '{extract.path}/auditbeat.yml'
  macos:
    - '{extract.path}/auditbeat.yml'
credentials-file-location:
  linux:
    - /etc/auditbeat/beats.keystore
    - '{extract.path}/beats.keystore'
  macos:
    - '{extract.path}/beats.keystore'
tags:
  - audit
  - cli
  - elastic
  - monitoring
  - security
  - shipper
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic Auditbeat docs describe collecting Linux audit events and detecting
      changes to critical files and security policy violations.
  display-name-sources:
    - Elastic official documentation and product pages use the display name Auditbeat.
  docs-sources:
    - Elastic Auditbeat reference identifies Auditbeat as the official documentation surface.
    - Elastic Configure Auditbeat docs name auditbeat.yml as the default configuration file.
    - >
      Elastic Directory layout docs list /etc/auditbeat as the deb/rpm config directory
      and {extract.path} as the archive config directory.
    - >
      Elastic auditbeat.reference.yml documents keystore.path defaulting to
      ${path.config}/beats.keystore.
  repo-sources:
    - >
      source_facts.repo is already populated with https://github.com/elastic/beats;
      prompt requires returning repo as null when source_facts.repo has a value.
  tags-sources:
    - >
      Elastic Auditbeat docs describe audit data shipping, monitoring, file integrity,
      Elastic Stack outputs, and security policy use cases.
category-confidence: high
category-path:
  - security
  - audit-monitoring
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
