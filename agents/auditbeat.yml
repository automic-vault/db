      return repo null when source_facts.repo is present.
  tags-sources:
    - >
      Elastic Auditbeat docs cover auditd and file_integrity modules:
      https://www.elastic.co/docs/reference/beats/auditbeat
    - 'source_facts.description: Lightweight Shipper for Audit Data'
