id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
  - https://www.elastic.co/docs/reference/beats/auditbeat/keystore
config-file-location:
  linux:
    - /etc/auditbeat/auditbeat.yml
    - /usr/share/auditbeat/auditbeat.yml
  macos:
    - '{extract.path}/auditbeat.yml'
  windows:
    - '{extract.path}\auditbeat.yml'
credentials-file-location:
  linux:
    - /var/lib/auditbeat
    - /usr/share/auditbeat/data
  unix:
    - '{path.data}'
  windows:
    - '{path.data}'
tags:
  - audit
  - beats
  - cli
  - elastic
  - monitoring
  - security
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic Auditbeat reference describes auditing users and processes and
      centralizing Linux Audit Framework events.
  display-name-sources:
    - Elastic official documentation uses the product name Auditbeat.
  docs-sources:
    - >
      Elastic Auditbeat reference identifies Auditbeat as a lightweight shipper for
      auditing users/processes and links setup/configuration docs.
    - >
      Elastic Configure Auditbeat says the default config file is auditbeat.yml and
      points to Directory layout for platform locations.
    - >
      Elastic Directory layout lists default config paths for deb/rpm, docker, and
      archive installs.
    - >
      Elastic Secrets keystore says Auditbeat creates the keystore in the directory
      defined by path.data.
  repo-sources:
    - >
      source_facts.repo already provides https://github.com/elastic/beats, so repo is
      returned as null per prompt.
  tags-sources:
    - >
      Elastic Auditbeat reference describes Auditbeat as an Elastic Beat for audit
      activity, Linux Audit Framework events, file integrity, and security policy
      monitoring.
category-confidence: high
category-path:
  - system
  - audit-monitoring
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
