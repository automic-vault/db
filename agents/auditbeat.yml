provenance:
  category-sources:
    - >
      Elastic's official Auditbeat reference describes Auditbeat as collecting audit
      events from the Linux Audit Framework and detecting changes to critical files for
      security policy violations.
    - 'source_facts.description says: Lightweight Shipper for Audit Data.'
  display-name-sources:
    - Elastic's official Auditbeat reference title uses Auditbeat.
    - source_facts.name is auditbeat.
  docs-sources:
    - >
      Elastic's official Auditbeat reference is at
      https://www.elastic.co/docs/reference/beats/auditbeat.
    - >
      Elastic's official Configure Auditbeat page says the default configuration file is
      auditbeat.yml and links to Directory layout.
    - >
      Elastic's official Directory layout page documents path.config as the
      configuration-files location and default Unix package paths such as
      /etc/auditbeat.
    - >
      Elastic's official auditbeat.reference.yml documents keystore.path as
      ${path.config}/beats.keystore for keys and sensitive values.
  repo-sources:
