id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
  - https://www.elastic.co/docs/reference/beats/auditbeat/keystore
config-file-location:
  linux:
    - /etc/auditbeat/auditbeat.yml
  unix:
    - '{extract.path}/auditbeat.yml'
credentials-file-location:
  linux:
    - /var/lib/auditbeat/
  unix:
    - '{path.data}/'
tags:
  - audit
  - cli
  - elastic
  - monitoring
  - security
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic quick start describes collecting audit data and streaming events to
      Elasticsearch.
    - source_facts.description says Auditbeat is a lightweight shipper for audit data.
  display-name-sources:
    - Elastic documentation uses the product name Auditbeat.
  docs-sources:
    - >
      Elastic Auditbeat docs identify Auditbeat as a Beat and provide dedicated
      reference docs.
    - >
      Elastic Configure Auditbeat docs state the default configuration file is
      auditbeat.yml and link to directory layout.
    - >
      Elastic Directory layout docs list archive config location as {extract.path} and
      deb/rpm config location as /etc/auditbeat.
    - >
      Elastic Secrets keystore docs state Auditbeat creates the keystore in the
      directory defined by path.data.
  repo-sources:
    - >
      source_facts.repo is already populated with https://github.com/elastic/beats;
      prompt requires returned repo null when source_facts.repo is present.
  tags-sources:
    - >
      Elastic docs describe audit data collection, modules, Elasticsearch output, and
      the secrets keystore.
    - source_facts.executables lists auditbeat as a CLI executable.
category-confidence: high
category-path:
  - security
  - audit-monitoring
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
