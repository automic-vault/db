id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
config-file-location:
  linux:
    - /etc/auditbeat/auditbeat.yml
    - /usr/share/auditbeat/auditbeat.yml
    - '{extract.path}/auditbeat.yml'
credentials-file-location:
  unix:
    - ${path.config}/beats.keystore
tags:
  - audit
  - cli
  - elastic
  - linux
  - monitoring
  - security
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic Auditbeat docs describe auditing user/process activity, Linux Audit
      Framework events, critical file changes, and security policy violations.
  display-name-sources:
    - >
      Elastic official docs page title is Auditbeat:
      https://www.elastic.co/docs/reference/beats/auditbeat
  docs-sources:
    - >
      Elastic Auditbeat docs identify Auditbeat as an Elastic Beat for collecting audit
      events and detecting critical file changes:
      https://www.elastic.co/docs/reference/beats/auditbeat
    - >
      Elastic configuration docs say the default config file is auditbeat.yml and
      directory layout lists config paths for deb/rpm, docker, and archive installs:
      https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
      and https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
    - >
      Elastic reference config documents keystore.path as the keystore containing keys
      and sensitive values:
      https://www.elastic.co/docs/reference/beats/auditbeat/auditbeat-reference-yml
  repo-sources:
    - >
      source_facts.repo is already set to https://github.com/elastic/beats; prompt
      requires repo:null when source_facts.repo is present.
  tags-sources:
    - >
      Elastic Auditbeat docs describe an audit-data shipper for Linux audit events,
      monitoring critical file changes, and Elastic Beats.
category-confidence: high
category-path:
  - security
  - audit-monitoring
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
