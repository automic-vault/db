id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
config-file-location:
  linux:
    - /etc/auditbeat/auditbeat.yml
  macos:
    - '{extract.path}/auditbeat.yml'
  windows:
    - C:\Program Files\Auditbeat\auditbeat.yml
credentials-file-location: null
tags:
  - audit
  - cli
  - elastic
  - monitoring
  - observability
  - security
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic Auditbeat docs describe modules for auditd, file integrity, and system
      data collection.
    - source_facts.description says Auditbeat is a lightweight shipper for audit data.
  display-name-sources:
    - >
      Elastic official documentation and source_facts.name use the product name
      Auditbeat/auditbeat.
  docs-sources:
    - >
      Elastic Auditbeat docs at https://www.elastic.co/docs/reference/beats/auditbeat
      are the official reference documentation.
    - >
      Elastic Configure Auditbeat docs state the default config file is auditbeat.yml
      and that its location varies by platform.
    - >
      Elastic Directory layout docs list deb/rpm config path as /etc/auditbeat, archive
      config path as {extract.path}, and Windows install location as C:\Program
      Files\Auditbeat in the quick start.
  repo-sources:
    - >
      source_facts.repo is already populated with https://github.com/elastic/beats;
      prompt requires returning repo as null when source_facts.repo has a value.
  tags-sources:
    - Elastic Auditbeat docs describe auditd, file integrity, and system modules.
    - >
      source_facts.description identifies audit data shipping; source_facts.homepage is
      Elastic's official Auditbeat page.
category-confidence: high
category-path:
  - system
  - monitoring
  - audit
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
