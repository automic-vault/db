provenance:
  category-sources:
    - >
      Elastic Auditbeat reference says it audits user/process activity, collects Linux
      Audit Framework events, detects critical file changes, and identifies potential
      security policy violations: https://www.elastic.co/docs/reference/beats/auditbeat
  display-name-sources:
    - >
      Elastic documentation page title and product navigation use Auditbeat:
      https://www.elastic.co/docs/reference/beats/auditbeat
  docs-sources:
    - >
      Elastic Auditbeat reference identifies Auditbeat as a lightweight shipper for
      auditing user and process activity and detecting critical file changes:
      https://www.elastic.co/docs/reference/beats/auditbeat
    - >
      Elastic Configure Auditbeat documents the default configuration file name
      auditbeat.yml:
      https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
    - >
      Elastic Directory layout documents deb/rpm config path /etc/auditbeat and data
      path /var/lib/auditbeat:
      https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
    - >
      Elastic Secrets keystore page documents storing sensitive settings in the
      Auditbeat keystore created under path.data:
      https://www.elastic.co/docs/reference/beats/auditbeat/keystore
  repo-sources:
    - >
      source_facts.repo already provides https://github.com/elastic/beats; prompt
      requires returning repo as null when source_facts.repo is populated.
  tags-sources:
    - >
      Elastic Auditbeat reference describes audit events, user/process activity, file
      change detection, and security policy violation detection:
      https://www.elastic.co/docs/reference/beats/auditbeat
    - source_facts.description says Lightweight Shipper for Audit Data.
