credentials-file-location:
  unix:
    - ${path.config}/beats.keystore
tags:
  - audit
  - cli
  - elastic
  - file-integrity
  - linux-audit
  - monitoring
  - security
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic Auditbeat reference says it audits user/process activity, Linux Audit
      Framework events, and critical file changes:
      https://www.elastic.co/docs/reference/beats/auditbeat
  display-name-sources:
    - >
      Elastic official documentation page title is Auditbeat:
      https://www.elastic.co/docs/reference/beats/auditbeat
  docs-sources:
    - >
      Elastic Auditbeat reference describes Auditbeat as a lightweight shipper for
      auditing user and process activity and file changes:
      https://www.elastic.co/docs/reference/beats/auditbeat
    - >
      Elastic Configure Auditbeat says the default config file is auditbeat.yml and
      points to Directory layout for location:
      https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
    - >
      Elastic Directory layout documents path.config defaults including /etc/auditbeat
      for deb/rpm and {extract.path} for archives:
      https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
    - >
      Elastic auditbeat.reference.yml documents keystore.path as
      ${path.config}/beats.keystore for sensitive values:
      https://www.elastic.co/docs/reference/beats/auditbeat/auditbeat-reference-yml
  repo-sources:
    - >
      source_facts.repo already provides https://github.com/elastic/beats; prompt
      requires repo=null when source_facts.repo is populated.
  tags-sources:
    - >
      Elastic Auditbeat reference and module docs support audit, security, monitoring,
      linux-audit, and file-integrity tags:
      https://www.elastic.co/docs/reference/beats/auditbeat
category-confidence: high
