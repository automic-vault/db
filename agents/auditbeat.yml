id: brew:auditbeat
display-name: Auditbeat
repo: null
docs:
  - https://www.elastic.co/docs/reference/beats/auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/configuring-howto-auditbeat
  - https://www.elastic.co/docs/reference/beats/auditbeat/directory-layout
config-file-location:
  linux:
    - /etc/auditbeat/auditbeat.yml
  unix:
    - '{path.config}/auditbeat.yml'
credentials-file-location:
  linux:
    - /etc/auditbeat/beats.keystore
  unix:
    - ${path.config}/beats.keystore
tags:
  - audit
  - cli
  - elastic
  - monitoring
  - security
  - shipper
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Elastic official Auditbeat reference describes auditing Linux Audit Framework
      activity and detecting security policy violations.
  display-name-sources:
    - Elastic official documentation consistently uses the product name Auditbeat.
  docs-sources:
    - >
      Elastic official Auditbeat reference identifies Auditbeat as a lightweight shipper
      for auditing user and process activity and detecting critical file changes.
    - >
      Elastic official Configure Auditbeat page says the default configuration file is
      auditbeat.yml and points to Directory layout for its location.
    - >
      Elastic official Directory layout page lists path.config defaults, including
      /etc/auditbeat for deb/rpm; Elastic's official auditbeat.reference.yml documents
      keystore.path as ${path.config}/beats.keystore.
  repo-sources:
    - >
      source_facts.repo is already set to https://github.com/elastic/beats; prompt
      requires returning repo as null when source_facts.repo is present.
  tags-sources:
    - >
      Elastic official Auditbeat reference and source_facts.description describe audit
      data shipping, monitoring, Elastic, and CLI usage.
category-confidence: high
category-path:
  - security
  - audit-monitoring
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
