id: brew:animdl
display-name: animdl
repo: https://github.com/justfoolingaround/animdl
docs:
  - https://github.com/justfoolingaround/animdl
config-file-location:
  unix:
    - ~/.config/animdl/config.yml
    - animdl_config.yml in the working directory
    - path specified by ANIMDL_CONFIG
  windows:
    - '%USERPROFILE%/.animdl/config.yml'
    - animdl_config.yml in the working directory
    - path specified by ANIMDL_CONFIG
credentials-file-location: null
tags:
  - anime
  - cli
  - downloader
  - streaming
geiger:
  category: tool
  color: blue
  confidence: medium
  reason: broad file, network, media, or database tool signal
  reasons:
    - broad file, network, media, or database tool signal
  signals:
    - text:download,stream
provenance:
  category-sources:
    - official GitHub README describes animdl as an anime scraper/downloader/streamer
    - 'source_facts.description: Anime downloader and streamer'
  display-name-sources:
    - official GitHub repository name
    - source_facts.name
  docs-sources:
    - official GitHub README is the primary documentation surface
  repo-sources:
    - source_facts.homepage is the official GitHub repository
    - source_facts.repo is empty
  tags-sources:
    - official GitHub README usage lists stream, download, grab, schedule, and search commands
    - source_facts.description
category-confidence: high
category-path:
  - media
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
