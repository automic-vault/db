id: brew:burp
display-name: Burp
repo: null
docs:
  - https://burp.grke.org/docs.html
  - https://burp.grke.org/docs/add-remove.html
  - https://burp.grke.org/docs/burp_ca.html
  - https://burp.grke.org/docs/manpage.html
  - https://burp.grke.org/docs/quickstart.html
  - https://burp.grke.org/docs/server-basics.html
config-file-location:
  linux:
    - /etc/burp/burp.conf
    - /etc/burp/burp-server.conf
    - /etc/burp/clientconfdir
  macos:
    - /usr/local/etc/burp/burp.conf
  windows:
    - '%PROGRAMFILES%\Burp\burp.conf'
    - C:/Program Files/Burp/burp.conf
credentials-file-location:
  linux:
    - /etc/burp/clientconfdir/<client>
    - /etc/burp/ssl_cert-server.key
    - /etc/burp/ssl_cert-client.key
  macos:
    - /usr/local/etc/burp/burp.conf
  windows:
    - '%PROGRAMFILES%\Burp\burp.conf'
    - C:/Program Files/Burp/burp.conf
tags:
  - backup
  - cli
  - client-server
  - compression
  - deduplication
  - network-backup
  - restore
  - scheduling
  - ssl
  - vss
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      Official Burp homepage https://burp.grke.org/index.html describes Burp as a
      network backup and restore program.
  display-name-sources:
    - >
      Official Burp man page https://burp.grke.org/docs/manpage.html names the project
      "Burp - BackUp and Restore Program".
  docs-sources:
    - >
      Official Burp docs index at https://burp.grke.org/docs.html links quickstart,
      server basics, add/remove clients, certificate authority, and man page
      documentation.
  repo-sources:
    - >
      source_facts.repo is already set to https://github.com/grke/burp; prompt requires
      repo null when source_facts.repo has a value.
  tags-sources:
    - >
      Official Burp features page https://burp.grke.org/features.html lists network
      backups, deduplication, compression, SSL, scheduling, VSS, and restore support.
    - >
      Official Burp man page https://burp.grke.org/docs/manpage.html documents the
      command-line burp binary and backup/restore actions.
category-confidence: high
category-path:
  - system
  - backup
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
