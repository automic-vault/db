id: brew:syncthing
display-name: Syncthing
repo: null
docs:
  - https://docs.syncthing.net/
config-file-location:
  unix:
    - $XDG_STATE_HOME/syncthing/config.xml
    - ~/.local/state/syncthing/config.xml
  windows:
    - '%LOCALAPPDATA%\Syncthing\config.xml'
credentials-file-location:
  unix:
    - $XDG_STATE_HOME/syncthing/cert.pem
    - $XDG_STATE_HOME/syncthing/key.pem
    - ~/.local/state/syncthing/cert.pem
    - ~/.local/state/syncthing/key.pem
  windows:
    - '%LOCALAPPDATA%\Syncthing\cert.pem'
    - '%LOCALAPPDATA%\Syncthing\key.pem'
tags:
  - cli
  - continuous-sync
  - file-sync
  - open-source
  - peer-to-peer
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      source_facts.description says Syncthing is an open source continuous file
      synchronization application.
  display-name-sources:
    - source_facts.homepage and source_facts.repo use the official Syncthing project name.
  docs-sources:
    - Official Syncthing documentation is hosted at docs.syncthing.net.
  repo-sources:
    - source_facts.repo already has a value, so repo is returned as null per instruction.
  tags-sources:
    - >
      source_facts.description identifies continuous file synchronization;
      source_facts.executables lists the syncthing executable.
category-confidence: high
category-path:
  - productivity
  - file-sync
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
