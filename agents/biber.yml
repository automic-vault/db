id: brew:biber
display-name: Biber
repo: null
docs:
  - >
    https://sourceforge.net/projects/biblatex-biber/files/biblatex-biber/current/documentation/biber.pdf/download
  - https://biblatex-biber.sourceforge.net/
config-file-location:
  linux:
    - ./biber.conf
    - ~/.biber.conf
    - $XDG_CONFIG_HOME/biber/biber.conf
    - kpsewhich biber.conf
  macos:
    - ./biber.conf
    - ~/.biber.conf
    - $XDG_CONFIG_HOME/biber/biber.conf
    - ~/Library/biber/biber.conf
    - kpsewhich biber.conf
  windows:
    - ./biber.conf
    - '%APPDATA%\biber.conf'
    - kpsewhich biber.conf
credentials-file-location: null
tags:
  - biblatex
  - bibliography
  - bibtex
  - cli
  - latex
geiger:
  category: appliance
  color: green
  confidence: low
  reason: narrow executable package without higher-risk signals
  reasons:
    - narrow executable package without higher-risk signals
  signals:
    - metadata:no-higher-risk-signals
provenance:
  category-sources:
    - >
      Official Biber homepage describes Biber as a bibliography processing backend for
      the LaTeX biblatex package.
  display-name-sources:
    - Official Biber homepage uses the display name Biber.
  docs-sources:
    - >
      Official Biber homepage says the comprehensive PDF manual is in the SourceForge
      release documentation folder; official SourceForge files provide the current
      biber.pdf download.
  repo-sources:
    - >
      source_facts.repo is already https://github.com/plk/biber; prompt requires
      returning repo as null when source_facts.repo is set.
  tags-sources:
    - >
      source_facts.description says Biber is a backend processor for BibLaTeX; official
      homepage describes it as a BibTeX replacement for biblatex.
category-confidence: high
category-path:
  - productivity
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
