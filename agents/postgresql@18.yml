id: brew:postgresql@18
display-name: PostgreSQL 18
repo: https://git.postgresql.org/gitweb?p=postgresql.git
docs:
  - https://www.postgresql.org/docs/18/index.html
  - https://www.postgresql.org/docs/18/libpq-pgpass.html
  - https://www.postgresql.org/docs/18/runtime-config-file-locations.html
config-file-location:
  unix:
    - $PGDATA/postgresql.conf
    - $PGDATA/pg_hba.conf
    - $PGDATA/pg_ident.conf
credentials-file-location:
  unix:
    - ~/.pgpass
  windows:
    - '%APPDATA%\postgresql\pgpass.conf'
tags:
  - cli
  - database
  - postgresql
  - rdbms
  - server
  - sql
provenance:
  category-sources:
    - source_facts.description says object-relational database system.
  display-name-sources:
    - source_facts.name and official PostgreSQL versioned docs.
  docs-sources:
    - Official PostgreSQL 18 documentation, file locations, and password file pages.
  repo-sources:
    - >
      source_facts.repo is empty; official PostgreSQL gitweb page identifies
      postgresql.git as the main repository.
  tags-sources:
    - source_facts.description and executables list PostgreSQL server and client tools.
category-confidence: high
category-path:
  - data
  - database
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
