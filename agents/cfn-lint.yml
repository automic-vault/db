id: brew:cfn-lint
display-name: cfn-lint
repo: https://github.com/aws-cloudformation/cfn-lint
docs:
  - https://github.com/aws-cloudformation/cfn-lint/tree/main/docs/getting_started
  - https://github.com/aws-cloudformation/cfn-lint#readme
config-file-location:
  unix:
    - .cfnlintrc
    - .cfnlintrc.yaml
    - .cfnlintrc.yml
    - ~/.cfnlintrc
credentials-file-location: null
tags:
  - aws
  - cli
  - cloudformation
  - infrastructure-as-code
  - linting
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: infrastructure mutation or orchestration signal
  reasons:
    - infrastructure mutation or orchestration signal
  signals:
    - text:cloud
provenance:
  category-sources:
    - >
      Official README says cfn-lint validates AWS CloudFormation YAML/JSON templates
      against CloudFormation resource provider schemas.
  display-name-sources:
    - source_facts.name and official README use cfn-lint.
  docs-sources:
    - >
      Official repository README documents usage and configuration; official
      docs/getting_started directory provides additional guides.
  repo-sources:
    - >
      source_facts.homepage is the official GitHub repository; README identifies the
      project as AWS CloudFormation Linter.
  tags-sources:
    - >
      Official README describes a CLI linter for AWS CloudFormation templates and
      infrastructure-as-code validation.
category-confidence: high
category-path:
  - cloud-infrastructure
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
