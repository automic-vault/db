id: brew:depsguard
display-name: DepsGuard
repo: null
docs:
  - https://depsguard.com/
  - https://github.com/arnica/depsguard#readme
config-file-location:
  linux:
    - ~/.npmrc
    - ~/.config/pnpm/rc
    - ~/.config/pnpm/config.yaml
    - ~/.yarnrc.yml
    - $XDG_CONFIG_HOME/.bunfig.toml
    - ~/.config/uv/uv.toml
    - ~/.config/pip/pip.conf
    - ~/.config/pypoetry/config.toml
  macos:
    - ~/.npmrc
    - ~/Library/Preferences/pnpm/rc
    - ~/Library/Preferences/pnpm/config.yaml
    - ~/.yarnrc.yml
    - ~/.bunfig.toml
    - ~/.config/uv/uv.toml
    - ~/Library/Application Support/pip/pip.conf
    - ~/Library/Application Support/pypoetry/config.toml
  windows:
    - '%LOCALAPPDATA%\pnpm\config\rc'
    - '%LOCALAPPDATA%\pnpm\config\config.yaml'
    - '%APPDATA%\uv\uv.toml'
    - '%APPDATA%\pip\pip.ini'
    - '%APPDATA%\pypoetry\config.toml'
credentials-file-location: null
tags:
  - cli
  - dependency-security
  - hardening
  - package-manager
  - supply-chain-security
provenance:
  category-sources:
    - >
      Official homepage describes DepsGuard as a command-line tool for npm, pnpm, yarn,
      bun, aube, uv, pip, and poetry config hardening.
    - >
      source_facts.description says it hardens package-manager configs against
      supply-chain attacks.
  display-name-sources:
    - Official homepage title and heading use DepsGuard.
    - source_facts.name is depsguard.
  docs-sources:
    - >
      Official homepage contains install, usage, supported settings, config file
      locations, troubleshooting, and links to the README.
    - >
      Official homepage says full documentation, config file locations, and
      troubleshooting tips are in the GitHub README.
  repo-sources:
    - >
      source_facts.repo already supplied as https://github.com/arnica/depsguard; per
      instruction, repo was not re-determined.
  tags-sources:
    - >
      Official homepage describes scanning and fixing package-manager configs for
      security best practices.
    - source_facts.description.
category-confidence: high
category-path:
  - security
  - supply-chain-security
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
