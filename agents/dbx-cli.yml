id: brew:dbx-cli
display-name: DBX CLI
repo: https://github.com/t8y2/dbx
docs:
  - https://github.com/t8y2/dbx/blob/main/packages/cli/README.md
config-file-location:
  linux:
    - $DBX_DATA_DIR/dbx.db
    - ~/.local/share/com.dbx.app/dbx.db
  macos:
    - $DBX_DATA_DIR/dbx.db
    - ~/Library/Application Support/com.dbx.app/dbx.db
  windows:
    - '%DBX_DATA_DIR%\dbx.db'
    - '%APPDATA%\com.dbx.app\dbx.db'
credentials-file-location:
  linux:
    - $DBX_DATA_DIR/dbx.db
    - ~/.local/share/com.dbx.app/dbx.db
  macos:
    - $DBX_DATA_DIR/dbx.db
    - ~/Library/Application Support/com.dbx.app/dbx.db
  windows:
    - '%DBX_DATA_DIR%\dbx.db'
    - '%APPDATA%\com.dbx.app\dbx.db'
tags:
  - cli
  - database-client
  - dbx
  - query-tool
  - schema-inspection
  - sql
provenance:
  category-sources:
    - Official GitHub README describes DBX as a database client supporting 50+ databases
  display-name-sources:
    - 'Official CLI README heading: DBX CLI'
  docs-sources:
    - >
      Official repository includes packages/cli/README.md with install, usage, commands,
      output, and query controls
  repo-sources:
    - >
      source_facts.homepage is the official GitHub repository and the repository README
      documents dbx-cli installation
  tags-sources:
    - >
      Official CLI README describes database connections, schema inspection, safe
      queries, and SQL output modes
category-confidence: high
category-path:
  - data
  - database-tools
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
