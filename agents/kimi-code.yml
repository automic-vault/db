id: brew:kimi-code
display-name: Kimi Code CLI
repo: https://github.com/MoonshotAI/kimi-code
docs:
  - https://github.com/MoonshotAI/kimi-code#readme
  - https://moonshotai.github.io/kimi-code/en
config-file-location:
  unix:
    - ~/.kimi-code/config.toml
    - ~/.kimi-code/tui.toml
    - ~/.kimi-code/mcp.json
    - <project-root>/.kimi-code/local.toml
    - <project-root>/.kimi-code/mcp.json
credentials-file-location:
  unix:
    - ~/.kimi-code/config.toml
    - ~/.kimi-code/credentials/<name>.json
    - ~/.kimi-code/credentials/mcp/<key>-<suffix>.json
tags:
  - ai-agent
  - cli
  - coding-agent
  - developer-tool
  - terminal
provenance:
  category-sources:
    - source_facts.description and official README describe a terminal AI coding agent.
  display-name-sources:
    - Official README title and documentation title.
  docs-sources:
    - Official Kimi Code docs document config files and data locations under ~/.kimi-code/.
  repo-sources:
    - Official Kimi Code README links to https://github.com/MoonshotAI/kimi-code.
  tags-sources:
    - >
      Official README and docs describe a terminal coding agent with MCP, ACP, plugins,
      and provider configuration.
category-confidence: high
category-path:
  - developer-tools
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
