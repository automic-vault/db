id: brew:apache-spark
display-name: Apache Spark
repo: https://github.com/apache/spark
docs:
  - https://spark.apache.org/docs/latest
  - https://spark.apache.org/docs/latest/configuration.html
config-file-location:
  unix:
    - $SPARK_HOME/conf/spark-defaults.conf
    - $SPARK_HOME/conf/spark-env.sh
    - $SPARK_HOME/conf/log4j2.properties
credentials-file-location: null
tags:
  - analytics
  - apache
  - cli
  - data-processing
  - distributed-computing
  - spark
geiger:
  category: runtime
  color: yellow
  confidence: medium
  reason: broad file, network, media, or database tool signal
  reasons:
    - broad file, network, media, or database tool signal
    - generalized runtime or code generation signal
  signals:
    - text:shell
    - text:sql,image
provenance:
  category-sources:
    - >
      Apache Spark official docs describe Spark configuration for applications and
      cluster deployment.
    - 'source_facts.description: Engine for large-scale data processing'
  display-name-sources:
    - Official project name on https://spark.apache.org/
    - current_curation.display-name
  docs-sources:
    - >
      Apache Spark configuration page documents conf/spark-defaults.conf,
      conf/spark-env.sh, and log4j2.properties.
    - Apache Spark official documentation at spark.apache.org/docs/latest
  repo-sources:
    - >
      source_facts.repo is empty, so repo was determined from the official Apache Spark
      GitHub repository page: https://github.com/apache/spark
  tags-sources:
    - Apache Spark official docs
    - source_facts.description
    - source_facts.executables
category-confidence: high
