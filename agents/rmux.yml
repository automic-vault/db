id: brew:rmux
display-name: RMUX
repo: https://github.com/Helvesec/rmux
docs:
  - https://rmux.io/docs/get-started
  - https://github.com/Helvesec/rmux#readme
  - https://rmux.io/
config-file-location:
  unix:
    - /etc/rmux.conf
    - ~/.rmux.conf
    - $XDG_CONFIG_HOME/rmux/rmux.conf
    - ~/.config/rmux/rmux.conf
    - /etc/tmux.conf
    - ~/.tmux.conf
    - $XDG_CONFIG_HOME/tmux/tmux.conf
    - ~/.config/tmux/tmux.conf
  windows:
    - '%XDG_CONFIG_HOME%\rmux\rmux.conf'
    - '%USERPROFILE%\.rmux.conf'
    - '%APPDATA%\rmux\rmux.conf'
    - '%RMUX_CONFIG_FILE%'
    - '%XDG_CONFIG_HOME%\tmux\tmux.conf'
    - '%USERPROFILE%\.tmux.conf'
    - '%APPDATA%\tmux\tmux.conf'
credentials-file-location: null
tags:
  - cli
  - daemon
  - multiplexer
  - terminal
  - tmux-compatible
provenance:
  category-sources:
    - Official rmux.io docs describe RMUX as a local terminal multiplexer with SDK automation.
  display-name-sources:
    - Official homepage and README use RMUX.
  docs-sources:
    - Official rmux.io docs describe getting started, configuration, and GitHub source.
  repo-sources:
    - Official rmux.io homepage links the Helvesec/rmux GitHub repository.
  tags-sources:
    - >
      Official docs mention terminal multiplexer, daemon-owned shells, tmux-compatible
      config, and CLI usage.
category-confidence: high
category-path:
  - developer-tools
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
