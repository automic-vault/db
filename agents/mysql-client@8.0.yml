id: brew:mysql-client@8.0
display-name: MySQL Client 8.0
repo: https://github.com/mysql/mysql-server
docs:
  - https://dev.mysql.com/doc/refman/8.0/en
  - https://dev.mysql.com/doc/refman/8.0/en/option-files.html
config-file-location:
  unix:
    - /etc/my.cnf
    - /etc/mysql/my.cnf
    - SYSCONFDIR/my.cnf
    - ~/.my.cnf
  windows:
    - '%WINDIR%\my.ini'
    - '%WINDIR%\my.cnf'
    - C:\my.ini
    - C:\my.cnf
    - '%APPDATA%\MySQL\.mylogin.cnf'
credentials-file-location:
  unix:
    - ~/.my.cnf
    - ~/.mylogin.cnf
  windows:
    - '%APPDATA%\MySQL\.mylogin.cnf'
tags:
  - cli
  - client
  - database
  - mysql
  - sql
provenance:
  category-sources:
    - 'source_facts.description: open source relational database management system.'
  display-name-sources:
    - source_facts.name mysql-client@8.0 normalized to MySQL Client 8.0.
  docs-sources:
    - Official MySQL 8.0 Reference Manual documents option files.
  repo-sources:
    - source_facts.homepage is the official MySQL Server GitHub repository.
  tags-sources:
    - >
      source_facts.executables include mysql, mysqladmin, mysqldump, and related MySQL
      client tools.
category-confidence: high
category-path:
  - data
display-name-confidence: high
docs-confidence: high
repo-confidence: high
