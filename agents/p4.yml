id: cask:p4
display-name: P4
repo: null
docs:
  - >
    https://help.perforce.com/helix-core/server-apps/cmdref/current/Content/CmdRef/Home-cmdref.html
  - https://www.perforce.com/products/helix-core-apps/command-line-client
config-file-location:
  unix:
    - P4CONFIG-named file in the current working directory
    - a parent directory, for example .p4config.txt
  windows:
    - P4CONFIG-named file in the current working directory
    - a parent directory, for example .p4config.txt
    - Perforce settings stored by p4 set in the Windows registry
credentials-file-location:
  unix:
    - ~/.p4tickets
  windows:
    - '%USERPROFILE%\p4tickets.txt'
    - P4PASSWD in the Windows registry when set with p4 set
    - P4V
tags:
  - cli
  - helix-core
  - perforce
  - scm
  - version-control
provenance:
  category-sources:
    - source_facts.homepage identifies the Helix Core command-line client.
  display-name-sources:
    - Official Perforce documentation names the command-line client p4/P4.
  docs-sources:
    - Official Perforce P4 CLI command reference and source_facts.homepage.
  repo-sources:
    - >
      Perforce distributes the proprietary P4 command-line client from official Perforce
      pages; no official source-control repository is documented.
  tags-sources:
    - >
      source_facts.name, source_facts.executables, and official Perforce product
      documentation.
category-confidence: high
category-path:
  - developer-tools
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
