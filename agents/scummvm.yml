id: brew:scummvm
display-name: ScummVM
repo: https://github.com/scummvm/scummvm
docs:
  - https://docs.scummvm.org/
config-file-location:
  linux:
    - ~/.config/scummvm/scummvm.ini
    - ~/snap/scummvm/current/.config/scummvm/scummvm.ini
    - ~/.scummvmrc
  macos:
    - ~/Library/Preferences/ScummVM Preferences
    - ~/.scummvmrc
  windows:
    - '%APPDATA%\ScummVM\scummvm.ini'
    - C:\WINDOWS\scummvm.ini
credentials-file-location: null
tags:
  - adventure-games
  - cli
  - cross-platform
  - emulation
  - game-interpreter
geiger:
  category: runtime
  color: yellow
  confidence: medium
  reason: generalized runtime or code generation signal
  reasons:
    - generalized runtime or code generation signal
  signals:
    - text:interpreter
provenance:
  category-sources:
    - >
      Official ScummVM docs describe playing classic point-and-click adventure games,
      text adventures, and RPGs with ScummVM.
    - source_facts.description says it is a graphic adventure game interpreter.
  display-name-sources:
    - Official homepage and documentation use the display name ScummVM.
    - source_facts.name is scummvm.
  docs-sources:
    - Official ScummVM documentation site is a dedicated docs domain.
  repo-sources:
    - >
      Verified official ScummVM GitHub organization lists scummvm/scummvm as the main
      repository.
    - source_facts.repo is empty.
  tags-sources:
    - >
      Official docs describe ScummVM as software for playing supported classic adventure
      games and RPGs.
    - source_facts.description identifies a graphic adventure game interpreter.
category-confidence: high
category-path:
  - games
  - emulation
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
