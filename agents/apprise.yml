  display-name-sources:
    - Official GitHub repository title and README use Apprise.
  docs-sources:
    - >
      Official GitHub wiki says documentation moved to AppriseIt.com and lists current
      Configuration, CLI guides, and Developer documentation links.
  repo-sources:
    - >
      source_facts.repo is empty; official GitHub wiki Source Repositories lists Apprise
      core as https://github.com/caronc/apprise.
  tags-sources:
    - >
      GitHub README describes the apprise command-line tool and many notification
      services including webhook/token URL examples.
