id: brew:pup
display-name: pup
repo: null
docs:
  - https://github.com/DataDog/pup/tree/main/docs
  - https://github.com/DataDog/pup#readme
config-file-location:
  linux:
    - ~/.config/pup/config.yaml
    - ~/.config/pup/aliases.yaml
  macos:
    - ~/Library/Application Support/pup/aliases.yaml
  windows:
    - '%APPDATA%\pup\aliases.yaml'
credentials-file-location:
  linux:
    - Linux Secret Service
    - ~/.config/pup/tokens_<site>.json
    - ~/.config/pup/client_<site>.json
  macos:
    - macOS Keychain
    - ~/.config/pup/tokens_<site>.json
    - ~/.config/pup/client_<site>.json
  windows:
    - Windows Credential Manager
    - '%APPDATA%\pup\tokens_<site>.json'
    - '%APPDATA%\pup\client_<site>.json'
tags:
  - cli
  - datadog
  - developer-tool
  - observability
provenance:
  category-sources:
    - 'source_facts.description: CLI companion with commands across Datadog products.'
  display-name-sources:
    - source_facts.name and official GitHub repository name use pup.
  docs-sources:
    - >
      Official DataDog GitHub README and docs describe CLI usage, config.yaml,
      aliases.yaml, and token storage.
  repo-sources:
    - source_facts.repo already provided; repo not re-determined per batch instructions.
  tags-sources:
    - Official README describes a Datadog CLI companion and authentication flows.
category-confidence: high
category-path:
  - developer-tools
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
