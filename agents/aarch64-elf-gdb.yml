id: brew:aarch64-elf-gdb
display-name: GDB for aarch64-elf
repo: https://sourceware.org/git/binutils-gdb.git
docs:
  - https://www.gnu.org/software/gdb/documentation
  - https://sourceware.org/gdb/current/onlinedocs/gdb.html
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/gdb/gdbearlyinit
    - ~/.config/gdb/gdbearlyinit
    - ~/.gdbearlyinit
    - $XDG_CONFIG_HOME/gdb/gdbinit
    - ~/.config/gdb/gdbinit
    - ~/.gdbinit
    - .gdbinit
  macos:
    - ~/Library/Preferences/gdb/gdbearlyinit
    - ~/.gdbearlyinit
    - ~/Library/Preferences/gdb/gdbinit
    - ~/.gdbinit
    - .gdbinit
credentials-file-location: null
tags:
  - aarch64
  - cli
  - cross-debugging
  - debugger
  - gdb
geiger:
  category: escape-surveillance-offensive
  color: red
  confidence: medium
  reason: escape, surveillance, or offensive capability signal
  reasons:
    - escape, surveillance, or offensive capability signal
  signals:
    - text:debugger
provenance:
  category-sources:
    - >
      GDB documentation page identifies GDB as the GNU Project Debugger:
      https://www.gnu.org/software/gdb/documentation/
    - current_curation.category_path
  display-name-sources:
    - 'GDB official documentation page: https://www.gnu.org/software/gdb/documentation/'
    - source_facts.description
  docs-sources:
    - >
      Current GDB manual startup/init files section:
      https://sourceware.org/gdb/current/onlinedocs/gdb.html/Initialization-Files.html
    - >
      GDB official documentation page links online GDB User Manual:
      https://www.gnu.org/software/gdb/documentation/
  repo-sources:
    - >
      GDB official documentation page links current git; source_facts.repo is empty:
      https://www.gnu.org/software/gdb/documentation/
    - current_curation.repo
  tags-sources:
    - GDB official documentation page
    - current_curation.tags
    - source_facts.description
category-confidence: high
category-path:
  - developer-tools
  - debugging
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
