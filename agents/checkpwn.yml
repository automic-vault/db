id: brew:checkpwn
display-name: checkpwn
repo: https://github.com/brycx/checkpwn
docs:
  - https://github.com/brycx/checkpwn#readme
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/checkpwn/checkpwn.yml
    - ~/.config/checkpwn/checkpwn.yml
  macos:
    - ~/Library/Application Support/checkpwn/checkpwn.yml
  windows:
    - '%APPDATA%\checkpwn\checkpwn.yml'
credentials-file-location:
  linux:
    - $XDG_CONFIG_HOME/checkpwn/checkpwn.yml
    - ~/.config/checkpwn/checkpwn.yml
  macos:
    - ~/Library/Application Support/checkpwn/checkpwn.yml
  windows:
    - '%APPDATA%\checkpwn\checkpwn.yml'
tags:
  - cli
  - data-breach
  - hibp
  - passwords
  - rust
  - security
geiger:
  category: appliance
  color: green
  confidence: low
  reason: narrow executable package without higher-risk signals
  reasons:
    - narrow executable package without higher-risk signals
  signals:
    - metadata:no-higher-risk-signals
provenance:
  category-sources:
    - >
      Official README describes checking Have I Been Pwned accounts/passwords and saving
      an API key for account checks.
  display-name-sources:
    - Official GitHub repository and README use the display name checkpwn.
  docs-sources:
    - >
      Official GitHub README documents checkpwn installation, register, account, and
      password commands.
    - >
      Official README says checkpwn register creates checkpwn.yml in the user's
      configuration directory and saves the API key; official source src/config.rs
      appends checkpwn/checkpwn.yml to dirs_next::config_dir().
  repo-sources:
    - >
      Official GitHub repository https://github.com/brycx/checkpwn is the upstream
      source for checkpwn.
  tags-sources:
    - >
      Official README and GitHub topics identify security, password, HIBP, Have I Been
      Pwned, and data-breach usage; repository language metadata is Rust.
category-confidence: high
category-path:
  - security
  - passwords
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
