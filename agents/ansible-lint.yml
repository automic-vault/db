id: brew:ansible-lint
display-name: ansible-lint
repo: https://github.com/ansible/ansible-lint
docs:
  - https://docs.ansible.com/projects/lint
  - https://docs.ansible.com/projects/lint/configuring
config-file-location:
  unix:
    - .ansible-lint
    - .ansible-lint.yml
    - .ansible-lint.yaml
    - .config/ansible-lint.yml
    - .config/ansible-lint.yaml
credentials-file-location: null
tags:
  - ansible
  - automation
  - cli
  - code-quality
  - linter
geiger:
  category: appliance
  color: green
  confidence: low
  reason: no executable entrypoint in the package index
  reasons:
    - no executable entrypoint in the package index
  signals:
    - metadata:no-indexed-executables
provenance:
  category-sources:
    - >
      Official Ansible Lint docs describe linting playbooks, roles, and collections for
      Ansible users.
  display-name-sources:
    - Official docs title Ansible Lint Documentation; source_facts.name.
  docs-sources:
    - Official Ansible Lint docs and configuration page at docs.ansible.com.
  repo-sources:
    - >
      Official docs link GitHub; GitHub repository ansible/ansible-lint README describes
      ansible-lint.
  tags-sources:
    - >
      Official docs describe ansible-lint as a command-line linter for playbooks, roles,
      and collections; configuration docs list local config files.
category-confidence: high
category-path:
  - cloud-infrastructure
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
