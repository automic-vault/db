id: brew:bitcoin
display-name: Bitcoin Core
repo: https://github.com/bitcoin/bitcoin
docs:
  - https://bitcoincore.org/en/doc
  - https://doxygen.bitcoincore.org/
  - https://github.com/bitcoin/bitcoin/tree/master/doc
config-file-location:
  linux:
    - ~/.bitcoin/bitcoin.conf
  macos:
    - ~/Library/Application Support/Bitcoin/bitcoin.conf
  windows:
    - '%LOCALAPPDATA%\Bitcoin\bitcoin.conf'
credentials-file-location:
  linux:
    - ~/.bitcoin/.cookie
  macos:
    - ~/Library/Application Support/Bitcoin/.cookie
  windows:
    - '%LOCALAPPDATA%\Bitcoin\.cookie'
tags:
  - bitcoin
  - blockchain
  - cli
  - full-node
  - p2p
  - wallet
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: broad file, network, media, or database tool signal
  reasons:
    - broad file, network, media, or database tool signal
    - formula declares a Homebrew service
  signals:
    - metadata:service
    - text:network
provenance:
  category-sources:
    - >
      Official Bitcoin Core README says it connects to the Bitcoin peer-to-peer network
      and fully validates blocks and transactions.
  display-name-sources:
    - Official Bitcoin Core site and repository brand the software as Bitcoin Core.
  docs-sources:
    - >
      Official Bitcoin Core documentation index at https://bitcoincore.org/en/doc/;
      official repository documentation at
      https://github.com/bitcoin/bitcoin/tree/master/doc.
  repo-sources:
    - >
      Official Bitcoin Core GitHub repository at https://github.com/bitcoin/bitcoin
      identifies the project as Bitcoin Core.
  tags-sources:
    - >
      Official Bitcoin Core README describes P2P network validation, wallet support,
      GUI, and command-line tools.
category-confidence: high
category-path:
  - networking
  - cryptocurrency
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
