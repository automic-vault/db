id: brew:tlrc
display-name: tlrc
repo: null
docs:
  - https://github.com/tldr-pages/tlrc#readme
  - https://tldr.sh/tlrc
config-file-location:
  linux:
    - $XDG_CONFIG_HOME/tlrc/config.toml
    - ~/.config/tlrc/config.toml
  macos:
    - ~/Library/Application Support/tlrc/config.toml
  windows:
    - '%ROAMINGAPPDATA%\tlrc\config.toml'
credentials-file-location: null
tags:
  - cli
  - documentation
  - rust
  - terminal
  - tldr
provenance:
  category-sources:
    - Official README describes tlrc as a tldr client written in Rust.
  display-name-sources:
    - 'Official README heading: tlrc.'
  docs-sources:
    - Official README points to online manpage https://tldr.sh/tlrc and configuration docs.
  repo-sources:
    - source_facts.repo is already populated; prompt requires repo=null.
  tags-sources:
    - >
      Official README and manpage describe tldr pages, Rust client, terminal CLI and
      config/cache behavior.
category-confidence: high
category-path:
  - developer-tools
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
