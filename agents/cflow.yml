id: brew:cflow
display-name: GNU cflow
repo: https://git.savannah.gnu.org/cgit/cflow.git
docs:
  - https://www.gnu.org/software/cflow/manual
  - https://www.gnu.org/software/cflow
config-file-location:
  unix:
    - ~/.cflow.d/*.cfo
    - ~/.cflow.d/default.cfo
    - /usr/share/cflow/site-init/*.cfo
    - /usr/share/cflow/site-init/1.8/*.cfo
    - /usr/local/share/cflow/site-init/*.cfo
    - /usr/local/share/cflow/site-init/1.8/*.cfo
    - $CFLOWRC
    - ~/.cflowrc
credentials-file-location: null
tags:
  - c
  - call-graphs
  - cli
  - gnu
  - static-analysis
geiger:
  category: appliance
  color: green
  confidence: low
  reason: narrow executable package without higher-risk signals
  reasons:
    - narrow executable package without higher-risk signals
  signals:
    - metadata:no-higher-risk-signals
provenance:
  category-sources:
    - >
      https://www.gnu.org/software/cflow/ describes a command-line program that analyzes
      C source code and generates flowgraphs.
  display-name-sources:
    - https://savannah.gnu.org/projects/cflow/ shows the project name as GNU cflow.
  docs-sources:
    - >
      https://www.gnu.org/software/cflow/ links online documentation at
      /software/cflow/manual/ and describes GNU cflow as analyzing C source files to
      print control-flow graphs.
    - >
      https://www.gnu.org/software/cflow/manual/cflow.html documents profile search
      paths, default.cfo, CFLOWRC, and ~/.cflowrc.
  repo-sources:
    - >
      https://savannah.gnu.org/projects/cflow/ lists GNU cflow as official GNU software
      and links its Git repository browser at git.savannah.gnu.org/cgit/cflow.git.
  tags-sources:
    - >
      https://www.gnu.org/software/cflow/ documents C-source flowgraphs, direct/inverted
      graphs, cross-reference output, and POSIX/GNU output formats.
category-confidence: high
category-path:
  - developer-tools
  - static-analysis
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
