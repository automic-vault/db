id: brew:yamllint
display-name: yamllint
repo: https://github.com/adrienverge/yamllint
docs:
  - https://yamllint.readthedocs.io/
config-file-location:
  unix:
    - .yamllint
    - .yamllint.yaml
    - .yamllint.yml
    - $YAMLLINT_CONFIG_FILE
    - $XDG_CONFIG_HOME/yamllint/config
    - ~/.config/yamllint/config
credentials-file-location: null
tags:
  - cli
  - linter
  - python
  - yaml
geiger:
  category: appliance
  color: green
  confidence: low
  reason: narrow executable package without higher-risk signals
  reasons:
    - narrow executable package without higher-risk signals
  signals:
    - metadata:no-higher-risk-signals
provenance:
  category-sources:
    - official yamllint documentation describes yamllint as a YAML linter
    - source_facts.description says it is a linter for YAML files
  display-name-sources:
    - official yamllint documentation title
    - source_facts.name
  docs-sources:
    - official yamllint Read the Docs documentation
  repo-sources:
    - >
      source_facts.homepage points to the official GitHub project and source_facts.repo
      is empty
  tags-sources:
    - official yamllint documentation
    - source_facts.description
    - source_facts.executables
category-confidence: high
category-path:
  - developer-tools
  - linters
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
