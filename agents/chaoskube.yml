  category-sources:
    - >
      Official README says chaoskube periodically kills random pods in a Kubernetes
      cluster to test behavior under pod failures.
  display-name-sources:
    - Official README title and source_facts.name both identify the project as chaoskube.
  docs-sources:
    - >
      Kubernetes official docs at
      https://kubernetes.io/docs/concepts/configuration/organize-cluster-access-kubeconfig/
      document $HOME/.kube/config as the default kubeconfig path.
    - >
      Official README at https://github.com/linki/chaoskube#readme documents chaoskube
      usage, configuration flags, Helm install, and kubeconfig behavior.
  repo-sources:
    - >
      source_facts.repo already supplies https://github.com/linki/chaoskube; prompt
      requires repo=null when source_facts.repo is present.
  tags-sources:
    - >
      Official README documents Kubernetes pod termination, target filtering, Helm
      installation, CLI flags/env vars, and resilience testing purpose; official go.mod
      identifies the Go module.
