id: brew:cayley
display-name: Cayley
repo: null
docs:
  - https://cayley.gitbook.io/cayley
  - https://github.com/cayleygraph/cayley#readme
config-file-location:
  unix:
    - '--config/-c path'
    - $CAYLEY_CFG
    - ./cayley.yml
    - ./cayley.json
    - ~/.cayley/cayley.yml
    - ~/.cayley/cayley.json
    - /etc/cayley.yml
    - /etc/cayley.json
credentials-file-location: null
tags:
  - cli
  - go
  - graph-database
  - linked-data
  - query-language
  - rdf
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: broad file, network, media, or database tool signal
  reasons:
    - broad file, network, media, or database tool signal
    - formula declares a Homebrew service
  signals:
    - metadata:service
    - text:database
provenance:
  category-sources:
    - >
      Official Cayley docs and README describe Cayley as a graph database with linked
      data and query-language support.
    - >
      source_facts.description says Cayley is a graph database inspired by Freebase and
      Knowledge Graph.
  display-name-sources:
    - Official Cayley documentation and repository use the display name Cayley.
    - source_facts.name is cayley and current_curation.display-name is Cayley.
  docs-sources:
    - >
      Official Cayley configuration docs describe --config/-c, CAYLEY_CFG,
      current-directory cayley.yml/json, $HOME/.cayley, and /etc search locations; no
      separate credentials file is documented.
    - >
      Official Cayley documentation is hosted at https://cayley.gitbook.io/cayley and
      the official repository README is https://github.com/cayleygraph/cayley#readme.
  repo-sources:
    - >
      source_facts.repo is already set to https://github.com/cayleygraph/cayley; prompt
      requires returning repo as null when present.
  tags-sources:
    - >
      source_facts.description and official Cayley docs support graph-database,
      linked-data, query-language, and RDF tags; source_facts.license and repo identify
      the Go implementation.
    - source_facts.executables lists the cayley CLI.
category-confidence: high
category-path:
  - data
  - graph-database
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
