id: brew:libpq@16
display-name: libpq@16
repo: https://git.postgresql.org/git/postgresql.git
docs:
  - https://www.postgresql.org/docs/16/app-psql.html
  - https://www.postgresql.org/docs/16/libpq.html
config-file-location:
  unix:
    - psqlrc in the directory reported by pg_config --sysconfdir
    - ~/.psqlrc
    - pg_service.conf in the directory reported by pg_config --sysconfdir
    - ~/.pg_service.conf
  windows:
    - '%APPDATA%\postgresql\psqlrc.conf'
    - '%APPDATA%\postgresql\.pg_service.conf'
credentials-file-location:
  unix:
    - ~/.pgpass
  windows:
    - '%APPDATA%\postgresql\pgpass.conf'
tags:
  - c-api
  - cli
  - client-library
  - database
  - postgresql
provenance:
  category-sources:
    - 'source_facts.description: Postgres C API library.'
  display-name-sources:
    - source_facts.name.
  docs-sources:
    - >
      source_facts.homepage is the official PostgreSQL 16 libpq documentation;
      PostgreSQL 16 docs also include psql.
  repo-sources:
    - >
      Official PostgreSQL Gitweb summary says postgresql.git is the main PostgreSQL git
      repository and lists this HTTPS URL.
  tags-sources:
    - source_facts.description and source_facts.executables.
category-confidence: high
category-path:
  - developer-tools
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
