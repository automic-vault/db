    - >
      Official check_postgres docs describe it as a script for monitoring Postgres
      databases for Nagios, MRTG, Cacti, and standalone scripts.
  display-name-sources:
    - Official Bucardo page and manual use the project name 'check_postgres'.
  docs-sources:
    - >
      Official Bucardo check_postgres page says documentation is available locally via
      man check_postgres and in HTML format.
    - >
      Official check_postgres HTML manual documents version 2.26.0, usage, database
      connection options, files, environment variables, and actions.
  repo-sources:
    - >
      Official Bucardo check_postgres page links 'check_postgres on GitHub' and says the
