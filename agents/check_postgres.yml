id: brew:check_postgres
display-name: check_postgres
repo: https://github.com/bucardo/check_postgres
docs:
  - https://bucardo.org/check_postgres
  - https://bucardo.org/check_postgres/check_postgres.pl.html
config-file-location:
  unix:
    - .check_postgresrc
    - ~/.check_postgresrc
    - /etc/check_postgresrc
