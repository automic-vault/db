id: brew:couchdb
display-name: Apache CouchDB
repo: https://github.com/apache/couchdb
docs:
  - https://docs.couchdb.org/en/stable
config-file-location:
  macos:
    - Applications/Apache CouchDB.app/Contents/Resources/couchdbx-core/etc
    - /Users/<your-user>/Library/Application Support/CouchDB2/etc/couchdb
    - /Users/<your-user>/Library/Preferences/couchdb2-local.ini
  unix:
    - etc/default.ini
    - etc/default.d/*.ini
    - etc/local.ini
    - etc/local.d/*.ini
credentials-file-location:
  macos:
    - /Users/<your-user>/Library/Application Support/CouchDB2/etc/couchdb
    - /Users/<your-user>/Library/Preferences/couchdb2-local.ini
  unix:
    - etc/local.ini
    - etc/local.d/*.ini
    - /opt/couchdb/etc/local.ini
    - /opt/couchdb/etc/local.d/10-admins.ini
tags:
  - cli
  - database
  - document-database
  - http-json-api
  - nosql
  - replication
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: formula declares a Homebrew service
  reasons:
    - formula declares a Homebrew service
  signals:
    - metadata:service
provenance:
  category-sources:
    - >
      source_facts.description says Apache CouchDB is a database server; official Apache
      CouchDB site describes CouchDB as a database with HTTP/JSON API and replication.
  display-name-sources:
    - >
      source_facts.description uses Apache CouchDB; official Apache CouchDB homepage and
      documentation use Apache CouchDB.
  docs-sources:
    - Official CouchDB documentation is hosted at docs.couchdb.org.
  repo-sources:
    - >
      source_facts.repo is empty; official Apache CouchDB homepage links to CouchDB on
      GitHub, and the apache/couchdb repository is the official source-control project
      URL.
  tags-sources:
    - >
      source_facts.description says Apache CouchDB database server; official Apache
      CouchDB site and docs describe document storage, HTTP/JSON API, and replication.
category-confidence: high
category-path:
  - data
  - database
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
