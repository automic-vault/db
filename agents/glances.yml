id: brew:glances
display-name: Glances
repo: https://github.com/nicolargo/glances
docs:
  - https://glances.readthedocs.io/
  - https://nicolargo.github.io/glances
config-file-location:
  linux:
    - ~/.config/glances/glances.conf
    - /etc/glances/glances.conf
    - /usr/share/doc/glances/glances.conf
  macos:
    - ~/.config/glances/glances.conf
    - ~/Library/Application Support/glances/glances.conf
    - /usr/local/etc/glances/glances.conf
    - /usr/share/doc/glances/glances.conf
  windows:
    - '%APPDATA%\glances\glances.conf'
credentials-file-location: null
tags:
  - cli
  - cross-platform
  - python
  - system-monitoring
  - top
geiger:
  category: appliance
  color: green
  confidence: low
  reason: no executable entrypoint in the package index
  reasons:
    - no executable entrypoint in the package index
  signals:
    - metadata:no-indexed-executables
provenance:
  category-sources:
    - >
      source_facts.description says alternative to top/htop; official homepage and
      repository describe Glances as a system monitoring tool.
  display-name-sources:
    - source_facts.name is glances; official homepage and repository use Glances.
  docs-sources:
    - >
      source_facts.homepage is the official documentation site; Read the Docs is
      linked/used for Glances documentation.
  repo-sources:
    - >
      Official project homepage is nicolargo.github.io/glances; official documentation
      and repository references point to nicolargo/glances on GitHub.
  tags-sources:
    - >
      source_facts.description identifies top/htop alternative; source_facts.executables
      lists glances CLI; official docs/repository describe cross-platform system
      monitoring.
category-confidence: high
category-path:
  - system
