id: brew:ant
display-name: Apache Ant
repo: https://gitbox.apache.org/repos/asf/ant.git
docs:
  - https://ant.apache.org/manual
  - https://ant.apache.org/manual/running.html
config-file-location:
  unix:
    - ./build.xml
    - ~/.antrc
  windows:
    - build.xml in current directory
    - '%HOME%\antrc_pre.bat'
    - '%HOME%\antrc_post.bat'
credentials-file-location: null
tags:
  - apache
  - build-tool
  - cli
  - java
  - xml
geiger:
  category: runtime
  color: yellow
  confidence: medium
  reason: generalized runtime or code generation signal
  reasons:
    - generalized runtime or code generation signal
  signals:
    - text:build tool
provenance:
  category-sources:
    - >
      source_facts.description: Java build tool; Apache Ant manual documents build files
      and command-line usage.
  display-name-sources:
    - Official Apache Ant manual and homepage use Apache Ant; current_curation.display-name.
  docs-sources:
    - Official Apache Ant User Manual and Running Apache Ant page.
  repo-sources:
    - >
      Official Apache Ant Git Repositories page lists
      https://gitbox.apache.org/repos/asf/ant.git as the main Ant module.
  tags-sources:
    - >
      Official manual states Ant buildfiles are XML; source_facts.description identifies
      it as a Java build tool.
