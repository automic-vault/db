id: brew:gradle
display-name: Gradle
repo: https://github.com/gradle/gradle
docs:
  - https://docs.gradle.org/current
  - https://gradle.org/docs.html
config-file-location:
  unix:
    - ~/.gradle/gradle.properties
    - ~/.gradle/init.d/*.gradle
    - ./gradle.properties
    - ./settings.gradle(.kts)
    - ./build.gradle(.kts)
  windows:
    - C:\Users\<USERNAME>\.gradle\gradle.properties
    - C:\Users\<USERNAME>\.gradle\init.d\*.gradle
    - .\gradle.properties
    - .\settings.gradle(.kts)
    - .\build.gradle(.kts)
credentials-file-location: null
tags:
  - build-automation
  - cli
  - dependency-management
  - gradle
  - groovy
  - java
  - jvm
  - kotlin
geiger:
  category: runtime
  color: yellow
  confidence: high
  reason: build system capable of executing project logic
  reasons:
    - build system capable of executing project logic
  signals:
    - override:gradle
provenance:
  category-sources:
    - >
      source_facts.description identifies Gradle as an open-source build automation
      tool; official https://github.com/gradle/gradle describes it as a build automation
      tool.
  display-name-sources:
    - >
      source_facts.homepage is https://www.gradle.org/ and the official
      repository/README uses the name Gradle Build Tool.
  docs-sources:
    - >
      Official Gradle repository links to https://docs.gradle.org/ and gradle.org
      publishes a documentation index at https://gradle.org/docs.html.
  repo-sources:
    - >
      source_facts.repo is empty; official Gradle repository is linked from the Gradle
      GitHub organization and README at https://github.com/gradle/gradle.
  tags-sources:
    - >
      source_facts.description names build automation based on Groovy and Kotlin DSL;
      official repository topics include java, kotlin, groovy, gradle, and build-tool.
category-confidence: high
category-path:
  - developer-tools
  - build-tools
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
