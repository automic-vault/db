id: brew:mariadb-connector-c
display-name: MariaDB Connector/C
repo: https://github.com/mariadb-corporation/mariadb-connector-c
docs:
  - https://mariadb.com/docs/connectors/mariadb-connector-c
  - >
    https://mariadb.com/docs/connectors/mariadb-connector-c/configuring-mariadb-connectorc-with-option-files
config-file-location:
  unix:
    - /etc/my.cnf
    - /etc/mysql/my.cnf
    - $MARIADB_HOME/my.cnf
    - $MYSQL_HOME/my.cnf
    - ~/.my.cnf
  windows:
    - System Windows Directory\my.ini
    - System Windows Directory\my.cnf
    - Windows Directory\my.ini
    - Windows Directory\my.cnf
    - C:\my.ini
    - C:\my.cnf
    - installdir\my.ini
    - installdir\my.cnf
    - installdir\data\my.ini
    - installdir\data\my.cnf
    - '%MARIADB_HOME%\my.ini'
    - '%MARIADB_HOME%\my.cnf'
    - '%MYSQL_HOME%\my.ini'
    - '%MYSQL_HOME%\my.cnf'
credentials-file-location:
  unix:
    - /etc/my.cnf
    - /etc/mysql/my.cnf
    - $MARIADB_HOME/my.cnf
    - $MYSQL_HOME/my.cnf
    - ~/.my.cnf
  windows:
    - System Windows Directory\my.ini
    - System Windows Directory\my.cnf
    - Windows Directory\my.ini
    - Windows Directory\my.cnf
    - C:\my.ini
    - C:\my.cnf
    - installdir\my.ini
    - installdir\my.cnf
    - installdir\data\my.ini
    - installdir\data\my.cnf
    - '%MARIADB_HOME%\my.ini'
    - '%MARIADB_HOME%\my.cnf'
    - '%MYSQL_HOME%\my.ini'
    - '%MYSQL_HOME%\my.cnf'
tags:
  - c
  - cli
  - client-library
  - connector
  - database
  - mariadb
  - mysql
provenance:
  category-sources:
    - source_facts.description says this is a MariaDB database connector for C applications.
  display-name-sources:
    - Official MariaDB documentation title uses MariaDB Connector/C.
  docs-sources:
    - Official MariaDB Connector/C docs describe Connector/C and option-file configuration.
  repo-sources:
    - >
      Official MariaDB Connector/C GitHub repository is
      mariadb-corporation/mariadb-connector-c.
  tags-sources:
    - >
      Official Connector/C docs describe C/C++ applications connecting to MariaDB and
      MySQL databases.
category-confidence: high
category-path:
  - developer-tools
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
