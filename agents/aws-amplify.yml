id: brew:aws-amplify
display-name: AWS Amplify CLI
repo: https://github.com/aws-amplify/amplify-cli
docs:
  - https://docs.amplify.aws/gen1/javascript/tools/cli
  - https://docs.amplify.aws/gen1/react/tools/cli/reference/files
config-file-location:
  unix:
    - amplify/.config/
    - amplify/backend/backend-config.json
    - amplify/#current-cloud-backend/backend-config.json
    - amplify/team-provider-info.json
    - amplify/cli.json
    - ~/.amplify/amplify-configuration.json
    - ~/.amplify/plugins.json
    - ~/.aws/amplify/deployment-secrets.json
credentials-file-location:
  unix:
    - ~/.aws/credentials
  windows:
    - '%USERPROFILE%\.aws\credentials'
tags:
  - amplify
  - aws
  - cli
  - cloudformation
  - serverless
geiger:
  category: appliance
  color: green
  confidence: low
  reason: no executable entrypoint in the package index
  reasons:
    - no executable entrypoint in the package index
  signals:
    - metadata:no-indexed-executables
provenance:
  category-sources:
    - >
      Official AWS Amplify CLI docs say it creates, integrates, and manages AWS cloud
      services for apps.
  display-name-sources:
    - Official aws-amplify/amplify-cli README heading is AWS Amplify CLI (Gen 1).
  docs-sources:
    - Official AWS Amplify Gen 1 CLI documentation describes the CLI as a unified toolchain.
    - >
      Official AWS Amplify files-and-folders reference documents project and shared
      config files.
  repo-sources:
    - >
      Official aws-amplify/amplify-cli GitHub README identifies AWS Amplify CLI as the
      toolchain and repository.
  tags-sources:
    - >
      Official aws-amplify/amplify-cli README says the CLI uses AWS CloudFormation and
      nested stacks for app development.
category-confidence: high
category-path:
  - cloud-infrastructure
  - app-development
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
