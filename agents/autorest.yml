  color: green
  confidence: low
  reason: narrow executable package without higher-risk signals
  reasons:
    - narrow executable package without higher-risk signals
  signals:
    - metadata:no-higher-risk-signals
provenance:
  category-sources:
    - >
      Official Azure/autorest README says AutoRest generates client libraries from
      OpenAPI specifications.
  display-name-sources:
    - Official Azure/autorest README uses the heading AutoRest.
  docs-sources:
    - >
      Official Azure/autorest docs/generate/readme.md documents AutoRest command usage
      and config-file arguments.
    - >
      Official Azure/autorest docs/user/configuration.md documents YAML, JSON, and
      Markdown configuration files.
    - >
      Official Azure/autorest docs/user/literate-file-formats/configuration.md documents
      literate configuration discovery.
  repo-sources:
    - >
      source_facts.homepage identifies https://github.com/Azure/autorest; official
      GitHub repository page is Azure/autorest.
  tags-sources:
