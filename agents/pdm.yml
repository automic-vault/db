id: brew:pdm
display-name: PDM
repo: https://github.com/pdm-project/pdm
docs:
  - https://pdm-project.org/en/latest
config-file-location:
  linux:
    - <PROJECT_ROOT>/pdm.toml
    - $XDG_CONFIG_HOME/pdm/config.toml
    - ~/.config/pdm/config.toml
    - $XDG_CONFIG_DIRS/pdm/config.toml
    - /etc/xdg/pdm/config.toml
    - $XDG_CONFIG_HOME/pdm/global-project/pdm.toml
  macos:
    - <PROJECT_ROOT>/pdm.toml
    - ~/Library/Application Support/pdm/config.toml
    - /Library/Application Support/pdm/config.toml
    - ~/Library/Application Support/pdm/global-project/pdm.toml
  windows:
    - <PROJECT_ROOT>\pdm.toml
    - '%USERPROFILE%\AppData\Local\pdm\pdm\config.toml'
    - '%ProgramData%\pdm\pdm\config.toml'
    - '%USERPROFILE%\AppData\Local\pdm\pdm\global-project\pdm.toml'
credentials-file-location:
  linux:
    - $XDG_CONFIG_HOME/pdm/config.toml
    - ~/.config/pdm/config.toml
  macos:
    - ~/Library/Application Support/pdm/config.toml
  windows:
    - '%USERPROFILE%\AppData\Local\pdm\pdm\config.toml'
tags:
  - cli
  - dependency-management
  - package-manager
  - packaging
  - python
geiger:
  category: infrastructure
  color: orange
  confidence: medium
  reason: infrastructure mutation or orchestration signal
  reasons:
    - infrastructure mutation or orchestration signal
  signals:
    - text:dependency manager
