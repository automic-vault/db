id: brew:bacon
display-name: bacon
repo: null
docs:
  - https://dystroy.org/bacon
  - https://dystroy.org/bacon/config
config-file-location:
  unix:
    - prefs.toml
    - $BACON_PREFS
    - Cargo.toml workspace.metadata.bacon
    - workspace-root/bacon.toml
    - workspace-root/.config/bacon.toml
    - Cargo.toml package.metadata.bacon
    - package-root/bacon.toml
    - package-root/.config/bacon.toml
    - $BACON_CONFIG
credentials-file-location: null
tags:
  - cli
  - code-check
  - rust
geiger:
  category: appliance
  color: green
  confidence: low
  reason: no executable entrypoint in the package index
  reasons:
    - no executable entrypoint in the package index
  signals:
    - metadata:no-indexed-executables
provenance:
  category-sources:
    - >
      source_facts.description says 'Background rust code check'; official Bacon
      overview says it watches Rust code and reports warnings/errors/test failures.
  display-name-sources:
    - source_facts.name is bacon; official Bacon site uses the name bacon.
  docs-sources:
    - >
      Official Bacon configuration page at https://dystroy.org/bacon/config/ documents
      config files and load order.
    - >
      Official Bacon overview at https://dystroy.org/bacon/ describes bacon as a
      background code checker and links to configuration docs.
  repo-sources:
    - >
      source_facts.repo is already set to https://github.com/Canop/bacon; prompt
      requires repo null when source_facts.repo is present.
  tags-sources:
    - >
      source_facts.executables lists bacon; official Bacon overview documents CLI usage
      and Rust cargo checks.
category-confidence: high
category-path:
  - developer-tools
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
