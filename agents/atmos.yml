id: brew:atmos
display-name: Atmos
repo: null
docs:
  - https://atmos.tools/
  - https://atmos.tools/cli/configuration
config-file-location:
  unix:
    - ./atmos.yaml
    - repo-root/atmos.yaml
    - 'parent directories: atmos.yaml'
    - ~/.atmos/atmos.yaml
    - /usr/local/etc/atmos/atmos.yaml
  windows:
    - ./atmos.yaml
    - repo-root/atmos.yaml
    - 'parent directories: atmos.yaml'
    - '%LOCALAPPDATA%/atmos/atmos.yaml'
credentials-file-location: null
tags:
  - ansible
  - cli
  - cloud-automation
  - devops
  - helmfile
  - iac
  - opentofu
  - terraform
provenance:
  category-sources:
    - >
      official homepage https://atmos.tools/ describes Atmos as an IaC framework for
      Terraform, OpenTofu, Packer, Helmfile, Ansible, and Devcontainers.
    - 'source_facts.description: Universal Tool for DevOps and Cloud Automation'
  display-name-sources:
    - current_curation.display-name
    - official docs site title and navigation use “atmos”; homepage product copy uses “Atmos”.
  docs-sources:
    - official CLI configuration documentation at https://atmos.tools/cli/configuration/
    - official documentation homepage at https://atmos.tools/
  repo-sources:
    - >
      source_facts.repo already provides https://github.com/cloudposse/atmos; per
      instruction, repo returned as null and not re-evaluated.
  tags-sources:
    - >
      official homepage describes orchestration for Terraform, OpenTofu, Packer,
      Helmfile, Ansible, and Devcontainers.
    - source_facts.description
category-confidence: high
category-path:
  - cloud-infrastructure
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
