id: brew:code-cli
display-name: Visual Studio Code CLI
repo: null
docs:
  - https://code.visualstudio.com/docs/configure/settings
  - https://code.visualstudio.com/docs/editor/command-line
config-file-location:
  linux:
    - ~/.config/Code/User/settings.json
    - .vscode/settings.json
  macos:
    - ~/Library/Application Support/Code/User/settings.json
    - .vscode/settings.json
  windows:
    - '%APPDATA%\Code\User\settings.json'
    - .vscode\settings.json
credentials-file-location: null
tags:
  - cli
  - developer-tools
  - editor
  - extensions
  - vscode
geiger:
  category: appliance
  color: green
  confidence: low
  reason: no executable entrypoint in the package index
  reasons:
    - no executable entrypoint in the package index
  signals:
    - metadata:no-indexed-executables
provenance:
  category-sources:
    - >
      https://code.visualstudio.com/docs/editor/command-line documents the code command
      for opening files, folders, and editor windows.
  display-name-sources:
    - >
      https://code.visualstudio.com/docs/editor/command-line is titled for the Visual
      Studio Code command line.
    - >
      source_facts.description identifies this as the command-line interface built into
      Visual Studio Code.
  docs-sources:
    - >
      https://code.visualstudio.com/docs/configure/settings documents user and workspace
      settings.json locations.
    - >
      https://code.visualstudio.com/docs/editor/command-line is the official VS Code
      command-line documentation.
  repo-sources:
    - >
      source_facts.repo already contains https://github.com/microsoft/vscode; batch
      instructions require repo=null when source_facts.repo is present.
  tags-sources:
    - >
      https://code.visualstudio.com/docs/editor/command-line covers CLI usage;
      https://code.visualstudio.com/docs/configure/settings covers editor settings and
      extension-related configuration.
category-confidence: high
category-path:
