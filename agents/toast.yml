id: brew:toast
display-name: Toast
repo: null
docs:
  - https://github.com/stepchowfun/toast#readme
config-file-location:
  macos:
    - ~/Library/Application Support/toast/toast.yml
  unix:
    - ./toast.yml
    - $XDG_CONFIG_HOME/toast/toast.yml
    - ~/.config/toast/toast.yml
  windows:
    - '%APPDATA%\toast\toast.yml'
credentials-file-location: null
tags:
  - cli
  - containers
  - tasks
  - workflow
  - yaml
provenance:
  category-sources:
    - 'source_facts.description: Tool for running tasks in containers.'
  display-name-sources:
    - source_facts.name.
  docs-sources:
    - source_facts.homepage points to the official GitHub repository README.
  repo-sources:
    - source_facts.repo is present; prompt requires repo=null instead of rechecking it.
  tags-sources:
    - >
      Official README describes Toast tasks, containers, toast.yml toastfiles, and YAML
      configuration.
category-confidence: high
category-path:
  - developer-tools
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
