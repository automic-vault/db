    - ~/.htcfg2
    - FILENAME.htcfg
  windows:
    - ht.cfg2 (where ht.exe resides)
    - FILENAME.htcfg
credentials-file-location: null
tags:
  - binary-analysis
  - cli
  - disassembler
  - executable-editor
  - hex-editor
  - tui
provenance:
  category-sources:
    - >
      Official documentation at https://hte.sourceforge.net/doc.html describes HT as a
      file editor/viewer/analyzer for executables
  display-name-sources:
    - >
      Official homepage title and documentation at https://hte.sourceforge.net/ and
      https://hte.sourceforge.net/doc.html use "HT Editor"
  docs-sources:
    - >
      Official HT homepage documentation page; official GitHub README linked from the HT
      documentation page
  repo-sources:
    - >
      Official HT homepage news says the official source repository moved to GitHub and
      links to https://github.com/sebastianbiallas/ht
  tags-sources:
    - >
      Official documentation and README describe executable viewing/editing/analysis,
      hex editing, disassembly, and supported executable formats
