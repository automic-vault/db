id: brew:awscli
display-name: AWS CLI
repo: null
docs:
  - https://docs.aws.amazon.com/cli/latest/userguide/cli-chap-welcome.html
  - https://docs.aws.amazon.com/cli/latest/userguide/cli-configure-files.html
config-file-location:
  unix:
    - ~/.aws/config
  windows:
    - '%USERPROFILE%\.aws\config'
credentials-file-location:
  unix:
    - ~/.aws/credentials
  windows:
    - '%USERPROFILE%\.aws\credentials'
tags:
  - automation
  - aws
  - cli
  - cloud
provenance:
  category-sources:
    - >
      Official AWS CLI User Guide describes AWS CLI as a tool for interacting with AWS
      services and AWS infrastructure APIs.
  display-name-sources:
    - Official AWS documentation uses the name AWS CLI.
  docs-sources:
    - >
      Official AWS CLI version 2 User Guide documents AWS CLI purpose, setup,
      configuration, and credential files.
  repo-sources:
    - >
      source_facts.repo is already https://github.com/aws/aws-cli; prompt requires repo
      null when source_facts.repo is present.
  tags-sources:
    - >
      Official AWS CLI User Guide describes command-line AWS service automation;
      source_facts.description says Official Amazon AWS command-line interface.
category-confidence: high
category-path:
  - cloud-infrastructure
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
