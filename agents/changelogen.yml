id: brew:changelogen
display-name: changelogen
repo: https://github.com/unjs/changelogen
docs:
  - https://github.com/unjs/changelogen#readme
  - https://unjs.io/packages/changelogen
config-file-location:
  unix:
    - ./changelog.config.json
    - ./changelog.config.ts
    - ./changelog.config.js
    - ./changelog.config.mjs
    - ./changelog.config.cjs
    - ./.changelogrc
    - ./package.json#changelog
credentials-file-location:
  unix:
    - ./.env
    - ~/.changlogenrc
tags:
  - changelog
  - cli
  - conventional-commits
  - github-releases
  - release-automation
  - typescript
  - versioning
geiger:
  category: appliance
  color: green
  confidence: low
  reason: narrow executable package without higher-risk signals
  reasons:
    - narrow executable package without higher-risk signals
  signals:
    - metadata:no-higher-risk-signals
provenance:
  category-sources:
    - >
      Official README describes changelogen as a CLI that generates changelogs from
      Conventional Commits and automates package versioning/releases.
  display-name-sources:
    - Official README title and UnJS package page use the display name changelogen.
  docs-sources:
    - >
      Official README https://github.com/unjs/changelogen#readme documents CLI usage,
      GitHub release integration, configuration files, .env token variables, and
      ~/.changlogenrc token storage.
    - >
      Official UnJS package page https://unjs.io/packages/changelogen is the package
      documentation and links to the GitHub README.
  repo-sources:
    - >
      Official GitHub repository metadata at
      https://api.github.com/repos/unjs/changelogen identifies
      https://github.com/unjs/changelogen.
  tags-sources:
    - >
      Official README documents Conventional Commits changelog generation, CLI flags,
      GitHub release syncing, npm publish support, and TypeScript config options.
category-confidence: high
category-path:
  - developer-tools
  - release-automation
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
