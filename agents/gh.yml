id: brew:gh
display-name: GitHub CLI
repo: null
docs:
  - https://docs.github.com/en/github-cli/github-cli/about-github-cli
  - https://cli.github.com/manual/gh
config-file-location:
  unix:
    - $XDG_CONFIG_HOME/gh/config.yml
    - ~/.config/gh/config.yml
  windows:
    - '%AppData%\GitHub CLI\config.yml'
credentials-file-location:
  unix:
    - $XDG_CONFIG_HOME/gh/hosts.yml
    - ~/.config/gh/hosts.yml
  windows:
    - '%AppData%\GitHub CLI\hosts.yml'
tags:
  - automation
  - cli
  - developer-tools
  - git
  - github
geiger:
  category: tool
  color: blue
  confidence: high
  reason: broad networked developer tool
  reasons:
    - broad networked developer tool
  signals:
    - override:gh
provenance:
  category-sources:
    - >
      GitHub official docs describe GitHub CLI as a command-line tool for pull requests,
      issues, GitHub Actions, repositories, and other GitHub features.
  display-name-sources:
    - source_facts.name is gh; GitHub official docs use the display name GitHub CLI.
  docs-sources:
    - >
      GitHub official docs provide the GitHub CLI overview, and cli.github.com provides
      the official gh manual.
  repo-sources:
    - >
      source_facts.repo is already populated with https://github.com/cli/cli, so repo is
      returned as null per instruction.
  tags-sources:
    - >
      GitHub official docs list repository, issue, pull request, workflow, release,
      gist, codespace, and API operations exposed through GitHub CLI.
category-confidence: high
category-path:
  - developer-tools
  - github
display-name-confidence: high
docs-confidence: high
repo-confidence: high
tags-confidence: high
